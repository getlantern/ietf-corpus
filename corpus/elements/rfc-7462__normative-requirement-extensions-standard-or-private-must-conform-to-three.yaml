document: rfc-7462
kind: normative-requirement
summary: 'Extensions (standard or private) MUST conform to three principles: a new <alert-category> must be independent of all existing ones; a multi-part new <alert-identifier> must be a semantic refinement of its parent; and sibling <alert-identifier>s must have no semantic overlap.'
section: "10.1"
rfc2119_level: MUST
topics:
