document: rfc-7679
kind: protocol-element
summary: Type-P-One-way-Delay is defined as the time dT such that Src sent the first bit of a Type-P packet at wire time T and Dst received the last bit at wire time T+dT. If the packet does not arrive within the loss threshold Tmax, the value is undefined (informally, infinite).
section: "3.4"
topics:
