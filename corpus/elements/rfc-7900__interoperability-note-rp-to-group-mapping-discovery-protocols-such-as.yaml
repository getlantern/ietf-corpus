document: rfc-7900
kind: interoperability-note
summary: RP-to-group mapping discovery protocols such as the Bootstrap Router (BSR) mechanism (RFC 5059) cannot be assumed to operate automatically across extranet VPN boundaries; their use in extranet contexts is outside the scope of this document.
section: 1.2.1
topics:
