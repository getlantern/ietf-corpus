document: rfc-9746
kind: normative-requirement
summary: All NVEs attached to an ES with an operational SHT value of 10 MUST advertise a valid, non-zero ESI Label. If the operational SHT value is 01, the ESI Label MAY be zero.
section: "2.4"
rfc2119_level: MUST
topics:
