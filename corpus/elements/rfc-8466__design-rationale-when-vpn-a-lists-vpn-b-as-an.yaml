document: rfc-8466
kind: design-rationale
summary: When VPN A lists VPN B as an extranet target, all sites in VPN B gain access to all sites in VPN A — the relationship is bidirectional despite only VPN A requiring explicit configuration. This non-obvious side-effect is explicitly called out and must be understood by operators.
section: 5.2.4
topics:
    - yang
    - netconf
