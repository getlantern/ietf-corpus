document: rfc-2741
kind: protocol-element
summary: The agentx-Register-PDU allows a subagent to claim a MIB region, with fields r.timeout (per-region timeout override), r.priority (1–255, lower wins, default 127), r.subtree (OID), and optionally r.range_subid and r.upper_bound to register a range of sub-identifier values in a single PDU.
section: 6.2.3
topics:
