document: rfc-3530
kind: security-consideration
summary: 56-bit DES used in Kerberos V5 Kerberos security triples is no longer considered state-of-the-art against brute-force attacks. Implementors are urged to incorporate AES once RFC 1964 is revised to add AES support, and users are urged to migrate to AES.
section: 3.2.1.1
topics:
    - security
    - crypto
