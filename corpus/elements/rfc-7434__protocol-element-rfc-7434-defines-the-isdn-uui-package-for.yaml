document: rfc-7434
kind: protocol-element
summary: RFC 7434 defines the 'isdn-uui' package for the User-to-User header field (RFC 7433) to enable SIP interworking with the ISDN User-to-User Signalling (UUS) supplementary service. The package is identified by the value 'isdn-uui' of the 'purpose' header field parameter.
