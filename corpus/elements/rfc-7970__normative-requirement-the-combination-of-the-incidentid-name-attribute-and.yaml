document: rfc-7970
kind: normative-requirement
summary: The combination of the IncidentID name attribute and element content MUST be a globally unique identifier. CSIRTs MUST NOT reuse the same IncidentID value unless referencing the same incident.
section: "3.4"
rfc2119_level: MUST NOT
