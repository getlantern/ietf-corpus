document: rfc-6672
kind: normative-requirement
summary: If the DNAME substitution would overflow the legal size for a domain name (255 octets), the server MUST set RCODE to YXDOMAIN and include the DNAME record and its signature in the answer.
section: "2.2"
rfc2119_level: MUST
topics:
