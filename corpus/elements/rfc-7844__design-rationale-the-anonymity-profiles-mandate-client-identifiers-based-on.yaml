document: rfc-7844
kind: design-rationale
summary: The anonymity profiles mandate client identifiers based on the link-layer address (contradicting RFC 4361), because hardware-independent stable identifiers enable efficient cross-network tracking of mobile clients, negating the benefit of MAC address randomization.
