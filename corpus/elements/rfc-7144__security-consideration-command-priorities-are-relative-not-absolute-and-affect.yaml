document: rfc-7144
kind: security-consideration
summary: Command priorities are relative, not absolute, and affect collections of commands rather than individual commands; if command priority is supported, it should be implemented to avoid unwanted reduction or denial of service. All security text from RFC 3723 and RFC 7143 applies to this document.
section: "8"
topics:
