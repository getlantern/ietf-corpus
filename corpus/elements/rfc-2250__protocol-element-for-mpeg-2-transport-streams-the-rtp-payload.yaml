document: rfc-2250
kind: protocol-element
summary: For MPEG-2 Transport Streams, the RTP payload MUST contain an integral number of 188-byte MTS packets. Multiple small MTS packets are aggregated into a single RTP packet; the count is computed by dividing the RTP payload length by 188.
