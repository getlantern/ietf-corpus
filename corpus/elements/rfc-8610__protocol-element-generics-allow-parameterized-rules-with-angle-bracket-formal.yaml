document: rfc-8610
kind: protocol-element
summary: 'Generics allow parameterized rules with angle-bracket formal parameters, e.g., ''message<t, v> = {type: t, value: v}''. At the call site actual arguments are substituted within the generic rule''s scope as if additional rules of the form ''parameter = argument'' were prepended.'
section: "3.10"
