document: rfc-5373
kind: normative-requirement
summary: When making an authorization decision for automatic answering, the UAS MUST consider the risk model of the media session and MUST NOT answer without user input where the privacy or security of the user would be compromised.
section: "4"
rfc2119_level: MUST NOT
