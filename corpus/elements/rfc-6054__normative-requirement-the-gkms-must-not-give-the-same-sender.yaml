document: rfc-6054
kind: normative-requirement
summary: The GKMS MUST NOT give the same sender identifier to more than one active group member for a given SA. If the GKMS is uncertain about a member's SID, it MUST allocate a new one.
section: "4"
rfc2119_level: MUST NOT
topics:
