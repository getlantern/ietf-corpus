document: rfc-9061
kind: protocol-element
summary: The ESP algorithms configuration supports a list of encryption algorithms (encr-alg-t, uint16 from IANA, default ENCR_AES_GCM_16=20 with 128-bit key) and a list of integrity algorithms (intr-alg-t, uint16 from IANA), plus a TFC padding flag. When AEAD is used, the integrity leaf is not used.
section: 5.1.1
topics:
    - ipsec
    - crypto
    - yang
