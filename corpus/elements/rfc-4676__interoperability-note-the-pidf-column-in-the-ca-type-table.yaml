document: rfc-4676
kind: interoperability-note
summary: The PIDF column in the CA type table maps CA types to PIDF-LO element names (RFC 4119). Some CA types (e.g., CAtypes 35–39) were added after PIDF-LO was completed and currently have no PIDF-LO equivalent, requiring careful handling when converting between formats.
section: "3.4"
