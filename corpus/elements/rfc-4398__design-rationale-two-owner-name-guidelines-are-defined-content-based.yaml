document: rfc-4398
kind: design-rationale
summary: 'Two owner name guidelines are defined: content-based (derived from certificate content such as Subject field or OpenPGP User ID) and purpose-based (a name the client already knows, such as TLS server hostname or email address). Purpose-based names are preferred because clients may not know all certificate content fields prior to retrieval.'
