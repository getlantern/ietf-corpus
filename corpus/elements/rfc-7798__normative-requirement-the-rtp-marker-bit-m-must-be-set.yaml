document: rfc-7798
kind: normative-requirement
summary: The RTP marker bit (M) MUST be set for the last packet of the access unit in the current RTP stream. In MRST or MRMT, if an access unit appears in multiple RTP streams, the marker bit is set on each stream's last packet of that access unit.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
