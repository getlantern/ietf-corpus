document: rfc-8152
kind: wire-format
summary: 'COSE_Encrypt0 is a CBOR array [Headers, ciphertext: bstr/nil] for single-recipient encryption where the key is known implicitly. CBOR tag 16 marks a tagged COSE_Encrypt0. When a key must be identified to the recipient, COSE_Encrypt should be used instead.'
section: "5.2"
