document: rfc-2518
kind: protocol-element
summary: 'The DAV response header advertises server compliance level. A value of ''1'' indicates Class 1 compliance (all DAV methods except LOCK/UNLOCK); a value of ''2'' indicates Class 2 compliance (adds locking support). Resources that are collections but not DAV compliant MUST NOT return DAV: 1.'
section: "9.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
