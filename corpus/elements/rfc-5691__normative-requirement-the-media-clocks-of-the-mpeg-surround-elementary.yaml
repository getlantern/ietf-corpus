document: rfc-5691
kind: normative-requirement
summary: The media clocks of the MPEG Surround elementary stream and the downmix stream SHALL operate in the same clock domain (derived from a common clock) and MUST NOT drift. RTCP sender reports MUST indicate that stream timestamps are not drifting.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
