document: rfc-5019
kind: normative-requirement
summary: OCSPRequests conformant to this profile MUST include only one Request in the OCSPRequest.RequestList structure, and clients MUST use SHA1 as the hashing algorithm for CertID.issuerNameHash and CertID.issuerKeyHash values.
section: 2.1.1
rfc2119_level: MUST
topics:
