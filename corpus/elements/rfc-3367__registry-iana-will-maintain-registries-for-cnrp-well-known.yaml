document: rfc-3367
kind: registry
summary: IANA will maintain registries for CNRP well-known properties (requiring property name, default type, and description), property types (requiring type name, applicable properties, and description), and status messages (requiring the X.Y.ZZZ code and brief description). All registrations are on a First Come First Served basis with no expert review.
