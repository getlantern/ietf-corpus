document: rfc-6876
kind: wire-format
summary: 'The Version Request message payload is 4 bytes: Reserved (8 bits), Min Vers (8 bits), Max Vers (8 bits), and Pref Vers (8 bits). Currently all three version fields MUST be set to 1; responders MUST tolerate other values for forward compatibility.'
