document: rfc-4568
kind: wire-format
summary: 'The SRTP inline key format is: ''inline:<key||salt> ["|"] [lifetime] ["|"] [MKI ":" length]''. The key and salt are concatenated and base64-encoded; lifetime is expressed as a decimal integer or power-of-2 (e.g., 2^20); MKI is a positive decimal integer followed by a colon and its byte length (1–128).'
section: "6.1"
topics:
