document: rfc-3851
kind: normative-requirement
summary: An S/MIME implementation MUST be able to receive and process arbitrarily nested S/MIME messages within reasonable resource limits. Sending agents MUST decide whether weak encryption is acceptable before sending and MUST NOT use RC2/40 if weak encryption is deemed unacceptable.
section: "3.6"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
