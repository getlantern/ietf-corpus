document: rfc-8669
kind: design-rationale
summary: TLV type value 2 (previously IPv6 SID TLV) was deprecated and removed; support for Segment Routing over the IPv6 data plane (SRv6) via the BGP Prefix-SID attribute was deferred to future specifications. This explains the gap in the TLV type number sequence.
