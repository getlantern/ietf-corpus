document: rfc-6032
kind: normative-requirement
summary: Implementations that support EnvelopedData or EncryptedData to encapsulate with this content type MUST support an EncryptedKeyPackage that encapsulates a SignedData further encapsulating either a SymmetricKeyPackage (RFC 6031) or an AsymmetricKeyPackage (RFC 5958).
section: "2"
rfc2119_level: MUST
topics:
