document: rfc-4563
kind: design-rationale
summary: Security policy is delivered with the MSK rather than each MTK because MTK delivery can be as frequent as a few seconds apart, making per-MTK policy delivery prohibitively expensive in bandwidth. 3GPP decided session policy would not change during a session.
