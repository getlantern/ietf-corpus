summary: 'Each AppleSingle/AppleDouble entry descriptor is 12 bytes: Entry ID (4 bytes unsigned), Offset from file start (4 bytes unsigned), Length of data (4 bytes unsigned, may be 0). Entry ID 0 is invalid; Apple reserves IDs 1–0x7FFFFFFF.'
