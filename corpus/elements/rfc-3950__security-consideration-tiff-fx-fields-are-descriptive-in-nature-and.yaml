document: rfc-3950
kind: security-consideration
summary: TIFF-FX fields are descriptive in nature and do not induce particular behavior by the recipient application, so they do not in themselves create additional security risks. However, TIFF-FX's extensible structure means future fields could theoretically induce recipient actions, though this is inconsistent with the specification's goals.
section: "5"
topics:
    - security
