document: rfc-5109
kind: normative-requirement
summary: For a media packet to be protected at level p, it MUST also be protected at level p-1 in some FEC packet (not necessarily the same one). If a ULP FEC packet contains protection at level p, it MUST also contain protection at level p-1.
section: "7.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
