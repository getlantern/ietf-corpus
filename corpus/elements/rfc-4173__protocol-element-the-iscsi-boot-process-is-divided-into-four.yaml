summary: 'The iSCSI boot process is divided into four sequential stages: Software Stage (optional, loads iSCSI initiator software), DHCP Stage (obtains IP address and boot server info), Discovery Service Stage (resolves targetname to IP/port if server address unknown), and Boot Stage (opens iSCSI session and boots).'
