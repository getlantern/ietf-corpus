document: rfc-7888
kind: normative-requirement
summary: When LITERAL- is advertised, non-synchronizing literals MUST NOT be larger than 4096 bytes. Any literal larger than 4096 bytes MUST be sent as a synchronizing literal.
section: "5"
rfc2119_level: MUST NOT
