document: rfc-9393
kind: interoperability-note
summary: The 'swidpath' URI scheme carries XPath queries that MUST use SWID XML attribute names (CamelCase), not CoSWID CDDL names (KebabCase). This specification does not define how to resolve an XPath query in the context of CBOR.
