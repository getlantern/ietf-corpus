document: rfc-6816
kind: security-consideration
summary: Modification of the FEC Encoding ID in the FFCI causes the receiver to apply the wrong FEC scheme, enabling a Denial of Service. Modification of n1m3 similarly causes the receiver to construct a different parity check matrix, also enabling DoS.
section: "6.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
