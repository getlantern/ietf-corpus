document: rfc-7293
kind: normative-requirement
summary: An MDA implementing the SMTP extension MUST return a 550 error to the RCPT command if the destination address is not a role account and has not been under continuous ownership since the RRVS-specified timestamp.
section: "5.1"
rfc2119_level: MUST
topics:
