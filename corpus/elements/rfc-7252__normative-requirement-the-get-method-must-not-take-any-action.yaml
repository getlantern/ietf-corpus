document: rfc-7252
kind: normative-requirement
summary: The GET method MUST NOT take any action on a resource other than retrieval. GET, PUT, and DELETE MUST be performed in an idempotent manner. POST is not idempotent.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - http
