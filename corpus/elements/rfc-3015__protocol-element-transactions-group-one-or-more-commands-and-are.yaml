document: rfc-3015
kind: protocol-element
summary: 'Transactions group one or more Commands and are the unit of reliable exchange. Three message types are defined: TransactionRequest (carries commands), TransactionReply (carries results including error codes), and TransactionPending (acknowledges receipt while processing continues, to prevent premature retransmission).'
section: "8.2"
topics:
