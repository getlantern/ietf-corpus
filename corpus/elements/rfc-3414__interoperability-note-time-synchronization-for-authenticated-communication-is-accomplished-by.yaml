document: rfc-3414
kind: interoperability-note
summary: Time synchronization for authenticated communication is accomplished by sending an authenticated request with msgAuthoritativeEngineBoots and msgAuthoritativeEngineTime set to zero; the authoritative engine returns a notInTimeWindow Report PDU with its current boots and time values, which the non-authoritative engine uses to synchronize (step 7b).
