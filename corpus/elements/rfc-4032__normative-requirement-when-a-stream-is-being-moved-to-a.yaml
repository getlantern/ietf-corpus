document: rfc-4032
kind: normative-requirement
summary: When a stream is being moved to a new transport address, the offerer MUST set all current status values about which it does not have local information to 'No', treating the move as equivalent to establishing a new stream.
section: "4.1"
rfc2119_level: MUST
topics:
