document: rfc-1694
kind: normative-requirement
summary: The compliance statement (smdsCompliance) mandates sipLevel3Stuff for all SMDS interfaces. sipLevel2Stuff, sipDS1PLCPStuff, sipDS3PLCPStuff, sipIPApplicationsStuff, and sipDxiStuff are each mandatory only for interfaces that run the corresponding protocol (SIP L2, DS1 PLCP, DS3 PLCP, IP-over-SMDS per RFC 1209, or DXI respectively).
section: "4.8"
rfc2119_level: REQUIRED
