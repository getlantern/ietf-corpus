document: rfc-7752
kind: protocol-element
summary: The BGP-LS Attribute (BGP path attribute code 29) is an optional, non-transitive attribute carrying link, node, and prefix properties as TLV triplets. Node Attribute TLVs (1024–1029) include Node Flag Bits, Node Name, IS-IS Area Identifier, and local IPv4/IPv6 Router-IDs.
