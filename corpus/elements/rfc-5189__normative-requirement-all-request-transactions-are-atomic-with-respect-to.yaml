document: rfc-5189
kind: normative-requirement
summary: 'All request transactions are atomic with respect to each other: processing of a request at the middlebox is never interrupted by another concurrent or queued request, including those from different sessions. Asynchronous transactions may, however, interrupt or terminate request processing at any time.'
section: 2.1.4
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
