document: rfc-9811
kind: normative-requirement
summary: When pushing announcement messages, PKIMessage structures MUST be sent as the content of an HTTP POST request. The recipient MUST acknowledge receipt with an HTTP response having an appropriate status code and empty content.
section: "3.5"
rfc2119_level: MUST
