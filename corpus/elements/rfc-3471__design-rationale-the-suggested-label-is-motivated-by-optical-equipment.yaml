document: rfc-3471
kind: design-rationale
summary: The Suggested Label is motivated by optical equipment (e.g., micro-mirror-based OXCs) that takes tens of milliseconds per hop to configure its switching fabric. Without early label suggestion, the Resv/MAPPING message must be delayed at each hop, causing significant setup latency. The suggested label also aids rapid restoration after nodal faults.
section: "3.4"
topics:
    - mpls
    - routing
