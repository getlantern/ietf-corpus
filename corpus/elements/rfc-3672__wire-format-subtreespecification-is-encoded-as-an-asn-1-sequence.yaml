kind: wire-format
summary: SubtreeSpecification is encoded as an ASN.1 SEQUENCE with optional base (LocalName), specificExclusions (SET OF chopBefore/chopAfter LocalName), minimum (BaseDistance INTEGER, default 0), maximum (BaseDistance INTEGER), and specificationFilter (Refinement CHOICE of item/and/or/not). The LDAP-specific string encoding is defined by the Generic String Encoding Rules (RFC 3641).
