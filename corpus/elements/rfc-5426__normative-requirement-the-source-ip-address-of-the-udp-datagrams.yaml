document: rfc-5426
kind: normative-requirement
summary: The source IP address of the UDP datagrams SHOULD NOT be interpreted as the identifier for the host that originated the syslog message, as the sending entity could be merely a relay. The syslog message itself contains the originator identifier.
section: "3.4"
rfc2119_level: SHOULD NOT
topics:
    - syslog
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
