document: rfc-3281
kind: wire-format
summary: AttributeCertificate is a SEQUENCE of AttributeCertificateInfo (acinfo), AlgorithmIdentifier (signatureAlgorithm), and BIT STRING (signatureValue). AttributeCertificateInfo contains version, holder, issuer, signature, serialNumber, attrCertValidityPeriod, a SEQUENCE OF Attribute, optional issuerUniqueID, and optional extensions.
