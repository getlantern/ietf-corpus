document: rfc-5282
kind: protocol-element
summary: 'Data integrity coverage via authenticated encryption encompasses the entire IKEv2 message: associated data (A) covers the IKE header through the Encrypted Payload header; the IV is implicitly covered by the integrity check (a successful check verifies the correct IV was used); and the plaintext (payloads, padding, pad length) is covered by the AEAD integrity check.'
section: "5.2"
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
