document: rfc-9906
kind: design-rationale
summary: GOST R 34.10-2001 and GOST R 34.11-94 were deprecated by Rosstandart (Russia's Federal Agency for Technical Regulation and Metrology) in August 2012 and superseded by GOST 34.10-2012 and GOST 34.11-2012. The newer 2012 algorithms remain supported in DNSSEC via RFC 9558 and are unaffected by this document.
