document: rfc-9176
kind: interoperability-note
summary: 'Although all examples use CoAP, the RD REST interfaces can equally be realized using HTTP. Multicast discovery and simple registration are exceptions: they rely on CoAP-specific mechanisms unavailable in HTTP, so only unicast discovery is supported over HTTP.'
section: "4"
topics:
