document: rfc-4724
kind: normative-requirement
summary: The End-of-RIB marker MUST be sent by a BGP speaker to its peer once it completes the initial routing update (including the case when there is no update to send) for an address family after the BGP session is established.
section: "4"
rfc2119_level: MUST
topics:
