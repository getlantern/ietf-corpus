document: rfc-8098
kind: normative-requirement
summary: An MDN MUST NOT itself contain a Disposition-Notification-To header field, and MUST NOT be generated in response to another MDN, preventing notification loops.
section: "2.1"
rfc2119_level: MUST NOT
