document: rfc-4007
kind: protocol-element
summary: 'Every IPv6 address (other than the unspecified address) has a specific scope encoded as part of the address — a topological span within which it may be used as a unique identifier for an interface or set of interfaces. For unicast, two scopes are defined: link-local and global. For multicast, fourteen scopes are defined ranging from interface-local to global.'
section: "4"
topics:
