document: rfc-7350
kind: design-rationale
summary: DTLS-over-UDP offers the same security advantages as TLS-over-TCP but without TCP's undesirable properties for real-time communications. TCP (and TLS-over-TCP) is not optimal when STUN is used to support multimedia sessions, which is its originally intended purpose.
section: "1"
topics:
