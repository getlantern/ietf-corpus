document: rfc-4370
kind: normative-requirement
summary: A single Proxy Authorization Control may be included in any search, compare, modify, add, delete, modify DN, or extended operation request. It MUST NOT be used with extensions that cause changes in authentication, authorization, or data confidentiality, such as Start TLS.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ldap
    - security
