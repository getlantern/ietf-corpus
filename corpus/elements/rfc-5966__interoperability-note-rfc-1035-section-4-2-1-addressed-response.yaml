document: rfc-5966
kind: interoperability-note
summary: 'RFC 1035 Section 4.2.1 addressed response reordering only in the context of UDP. This document clarifies that the same reordering requirement applies over TCP: resolvers must not assume responses arrive in request order on any transport.'
section: "6"
topics:
