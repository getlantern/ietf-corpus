document: rfc-2266
kind: protocol-element
summary: 'vgRptrPortAllowedTrainType is an explicit security object (read-write) that restricts which device types may train on a port: allowEndNodesOnly, allowPromiscuousEndNodes, allowEndNodesOrRepeaters, or allowAnything. The effective policy is the intersection of this object and hardware capability reported by vgRptrPortSupportedPromiscMode/CascadeMode.'
section: "3"
topics:
    - snmp
    - security
