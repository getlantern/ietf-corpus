document: rfc-4836
kind: normative-requirement
summary: An Expert Review, as defined in RFC 2434, is REQUIRED for addition of new MAU types, Media Available states, Auto-Negotiation capabilities, and/or Jack types to the IANA-maintained IANA-MAU-MIB. When new MAU types require additional managed objects or have side effects on existing objects, a standards-track specification is also REQUIRED.
section: 3.5.1
rfc2119_level: REQUIRED
topics:
    - snmp
    - registry
