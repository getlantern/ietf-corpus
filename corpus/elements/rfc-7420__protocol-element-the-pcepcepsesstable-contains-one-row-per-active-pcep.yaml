document: rfc-7420
kind: protocol-element
summary: The pcePcepSessTable contains one row per active PCEP session (non-idle), indexed by pcePcepEntityIndex + peer address + pcePcepSessInitiator. Statistics here apply to the current session only, in contrast to the aggregate statistics in pcePcepPeerTable. The entry is removed when the session returns to idle.
section: "3.3"
topics:
