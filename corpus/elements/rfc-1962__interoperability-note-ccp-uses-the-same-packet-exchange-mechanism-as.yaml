document: rfc-1962
kind: interoperability-note
summary: CCP uses the same packet exchange mechanism as LCP with codes 1-7 (Configure-Request through Code-Reject) plus two additional codes 14 and 15. Other unrecognized codes should result in Code-Rejects, maintaining LCP-compatible behavior.
