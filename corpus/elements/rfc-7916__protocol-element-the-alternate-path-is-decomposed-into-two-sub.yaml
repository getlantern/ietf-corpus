kind: protocol-element
summary: 'The alternate path is decomposed into two sub-paths: PLR-to-alternate and alternate-to-destination. Path attributes (SRLG, link color, node color, bandwidth) are gathered across both sub-paths and classified as cumulative (recorded on every element) or unitary (recorded only on the first element).'
