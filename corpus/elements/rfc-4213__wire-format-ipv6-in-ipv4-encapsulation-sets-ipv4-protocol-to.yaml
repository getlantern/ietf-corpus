document: rfc-4213
kind: wire-format
summary: IPv6-in-IPv4 encapsulation sets IPv4 Protocol to 41 (assigned payload type for IPv6), Version to 4, IHL to 5 (no options), Total Length to IPv6 payload length plus 60 bytes, and Source/Destination Address to the configured tunnel endpoint addresses. The DF bit is set or cleared per the applicable MTU scheme.
section: "3.5"
topics:
