document: rfc-6779
kind: normative-requirement
summary: A router SHOULD NOT originate expected notifications until a predefined time interval has elapsed after NHDP is first enabled on an interface. It is RECOMMENDED that this interval be at least 3 × nhdpHelloInterval, so that symmetric neighbors are discovered before notification emission begins.
section: 5.1.3.1
rfc2119_level: SHOULD NOT
topics:
    - snmp
