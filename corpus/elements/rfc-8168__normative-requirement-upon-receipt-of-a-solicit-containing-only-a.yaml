document: rfc-8168
kind: normative-requirement
summary: Upon receipt of a Solicit containing only a prefix-length hint, the server SHOULD first check its prefix pool for a prefix whose length matches the hint value regardless of prior interaction records. If no exact match exists, the server SHOULD provide the prefix whose length is shorter and closest to the hint.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
