summary: The mplsLdpFecTable stores FEC (Forwarding Equivalence Class) element information configurable by the operator, and the mplsLdpLspFecTable associates FECs with LSPs. These are the only tables in MPLS-LDP-STD-MIB not exclusively populated by the LDP protocol.
