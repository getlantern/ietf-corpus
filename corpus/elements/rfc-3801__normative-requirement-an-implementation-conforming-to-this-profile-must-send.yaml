document: rfc-3801
kind: normative-requirement
summary: An implementation conforming to this profile MUST send Audio/32KADPCM by default for voice content. Receivers MUST be able to accept and decode Audio/32KADPCM; if an implementation can handle only one voice body, multiple voice bodies SHOULD be concatenated and MUST NOT be discarded.
section: 4.4.3
rfc2119_level: MUST
topics:
    - email
