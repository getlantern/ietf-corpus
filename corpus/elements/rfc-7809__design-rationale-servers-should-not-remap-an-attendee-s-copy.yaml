document: rfc-7809
kind: design-rationale
summary: Servers should not remap an attendee's copy of an event to a standard time zone, because the organizer's calendar user agent will expect to see the original time zone definition in any iTIP replies sent by the attendee.
section: 3.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
