document: rfc-3261
kind: security-consideration
summary: Registration hijacking occurs when an attacker forges REGISTER requests to redirect a victim's incoming calls. Mitigation requires authenticating REGISTER requests via HTTP Digest or mutual TLS to ensure only the legitimate user can update location bindings.
section: 26.1.1
topics:
    - sip
    - security
