document: rfc-4479
kind: design-rationale
summary: 'The absence of a presence attribute from a document makes no definitive statement about its value—it may be withheld due to privacy filtering or unsupported by the presentity''s software. This follows the RFC 3840 precedent for capability declarations: omission means ''unknown'', not ''not present''.'
section: "3.6"
topics:
    - sip
    - realtime
    - privacy
