document: rfc-9328
kind: normative-requirement
summary: During de-packetization, NAL-unit-like structures with NAL unit type values 28 to 31, inclusive (the AP and FU type identifiers), MUST NOT be passed to the decoder; only values 0 to 27 may be passed.
