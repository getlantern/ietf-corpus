document: rfc-5151
kind: normative-requirement
summary: For reoptimization of a contiguous inter-domain TE LSP, the make-before-break signaling MUST be initiated by the ingress node as defined in RFC 3209. The RFC 4736 mechanisms SHOULD be used for reoptimization of contiguous inter-domain TE LSPs.
