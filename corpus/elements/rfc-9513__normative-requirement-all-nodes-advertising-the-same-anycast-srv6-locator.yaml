document: rfc-9513
kind: normative-requirement
summary: All nodes advertising the same anycast SRv6 Locator MUST instantiate the exact same set of SIDs under that anycast locator. Failure to do so may result in traffic being dropped or misrouted.
section: "6"
rfc2119_level: MUST
topics:
