document: rfc-3575
kind: interoperability-note
summary: Packet Type Codes 6-10, 12-13, 21-34, and 50-51 have no meaning defined by an IETF RFC but are reserved to avoid interoperability problems with software implementing non-standard RADIUS extensions that are or have been in use on the Internet.
