document: rfc-1829
kind: security-consideration
summary: Differential cryptanalysis (Biham & Shamir 1993) requires 2^47 chosen plaintext-ciphertext pairs and linear cryptanalysis (Matsui 1994) requires 2^43 known-plaintext pairs to break DES. While not yet considered fully practical, these attacks must be taken into account.
section: Security Considerations
