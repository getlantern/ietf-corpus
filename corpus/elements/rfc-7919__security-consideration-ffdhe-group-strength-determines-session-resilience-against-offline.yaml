document: rfc-7919
kind: security-consideration
summary: FFDHE group strength determines session resilience against offline confidentiality attacks. For long-term confidentiality, stronger groups should be preferred. ENISA recommends at least 3072-bit groups for future systems; ffdhe3072 is intended for that use.
section: "8.2"
topics:
