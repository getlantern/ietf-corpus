document: rfc-3744
kind: design-rationale
summary: ACE inheritance (dynamic sharing of an ACE from a parent resource) is explicitly distinguished from ACL initialization (the default ACL assigned when a resource is created). The mechanism for either is intentionally left unspecified to give implementations flexibility.
section: 5.5.4
topics:
    - security
