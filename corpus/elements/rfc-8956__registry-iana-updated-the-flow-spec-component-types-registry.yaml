kind: registry
summary: IANA updated the 'Flow Spec Component Types' registry to contain both IPv4 and IPv6 Flow Specification component type numbers. The registry template now includes IPv4 Name and IPv6 Name columns. Type 13 is newly assigned as 'Flow Label' for IPv6 (previously Unassigned for IPv4).
