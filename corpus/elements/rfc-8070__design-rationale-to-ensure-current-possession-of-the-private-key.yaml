document: rfc-8070
kind: design-rationale
summary: To ensure current possession of the private key, the signed PKAuthenticator must include information the client could not have predicted. A KDC-provided freshness token—included in the signed portion of the KRB_AS_REQ—serves this purpose by introducing unpredictable data.
section: "1"
