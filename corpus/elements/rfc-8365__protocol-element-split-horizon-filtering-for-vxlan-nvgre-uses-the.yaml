document: rfc-8365
kind: protocol-element
summary: 'Split-horizon filtering for VXLAN/NVGRE uses the ''Local Bias'' mechanism: every NVE tracks IP addresses of other NVEs sharing multihomed ESs, and filters incoming multi-destination frames on all local interfaces connected to ESs shared with the ingress NVE based on the source IP in the tunnel header.'
section: 8.3.1
topics:
    - routing
