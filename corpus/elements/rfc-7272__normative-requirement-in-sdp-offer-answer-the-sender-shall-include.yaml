document: rfc-7272
kind: normative-requirement
summary: In SDP offer/answer, the sender SHALL include the rtcp-idms attribute in its answer; if the offered SyncGroupId is non-empty, the sender SHOULD NOT change it. If the SyncGroupId is empty (0) and the sender cannot determine the proper value, it SHALL remove the attribute from its answer.
section: "11.1"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
