document: rfc-7293
kind: normative-requirement
summary: When the no-support action is unspecified or 'R' and a downstream MTA does not advertise RRVS support, the relaying MTA MUST reject the message by returning a 550 error to DATA or generating a DSN and terminating relay attempts.
section: 5.1.1
rfc2119_level: MUST
topics:
