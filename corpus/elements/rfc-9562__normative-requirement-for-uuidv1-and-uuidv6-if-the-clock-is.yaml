document: rfc-9562
kind: normative-requirement
summary: For UUIDv1 and UUIDv6, if the clock is set backwards and the generator cannot guarantee no UUIDs were produced with larger timestamps, the clock sequence MUST be changed — incremented if the previous value is known, otherwise set to a random or high-quality pseudorandom value.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
