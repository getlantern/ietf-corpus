document: rfc-5890
kind: protocol-element
summary: An LDH label is a DNS label consisting solely of ASCII letters, digits, and the hyphen-minus character, with the constraint that hyphens cannot appear at the beginning or end of the string. Its total length must not exceed 63 octets. LDH labels are subdivided into Reserved LDH (R-LDH) and Non-Reserved LDH (NR-LDH) labels.
section: 2.3.1
topics:
    - dns
