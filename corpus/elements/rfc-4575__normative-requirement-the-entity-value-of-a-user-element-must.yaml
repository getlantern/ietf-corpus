document: rfc-4575
kind: normative-requirement
summary: The 'entity' value of a <user> element MUST be unique among all participants. If identity is not revealed, the host portion MUST use the .invalid top-level domain; the anonymous URI generation method of RFC 3323 MUST be followed for privacy-requesting participants.
section: "5.6"
rfc2119_level: MUST
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
