document: rfc-6793
kind: interoperability-note
summary: In environments where an AS with OLD BGP speakers peers with multiple ASes using AS_TRANS, the MULTI_EXIT_DISC attribute may influence route selection among routes received from different neighboring ASes in unintended ways, since the source AS identity is obscured by AS_TRANS.
section: "7"
topics:
