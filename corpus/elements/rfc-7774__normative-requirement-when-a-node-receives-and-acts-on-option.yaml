document: rfc-7774
kind: normative-requirement
summary: When a node receives and acts on OPTION_MPL_PARAMETERS, it SHOULD join the MPL Domain identified by the option and act as an MPL Forwarder, and SHOULD configure its MPL Forwarder with the given parameter set. Failure to join due to resource constraints is permitted.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
