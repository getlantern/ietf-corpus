document: rfc-2688
kind: normative-requirement
summary: When deciding whether to admit a flow, admission control MUST compute the impact of header compression (Van Jacobson or Casner-Jacobson), prefix elision, CCP, fragment header option used, and fragmentation vs. suspend/resume approach on MTU size, rate, and fragment size.
section: "4.2"
rfc2119_level: MUST
topics:
