summary: 'Fragment recipients use a four-tuple to identify all link fragments belonging to a given datagram: (1) sender''s 802.15.4 source address (or Originator Address from Mesh header), (2) destination''s 802.15.4 address (or Final Destination from Mesh header), (3) datagram_size, and (4) datagram_tag.'
