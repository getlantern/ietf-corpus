document: rfc-1327
kind: design-rationale
summary: The addressing mapping is asymmetric rather than global/symmetric because RFC 822 and X.400 syntaxes are sufficiently different, and full symmetry would require administrative cooperation between the two worlds that cannot generally be assumed. Symmetry is achievable only where appropriate administrative control exists.
