document: rfc-8518
kind: interoperability-note
summary: 'For MT IS-IS with standard unicast topology MT-ID #0, if both IPv4 and IPv6 address families are present, network congruency (same AFs on all links and nodes) is required for LFA computation; a single LFA computation from all eligible neighbors yields all potential alternatives for both AFs.'
