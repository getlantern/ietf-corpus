document: rfc-8561
kind: interoperability-note
summary: The RLT 'id' leaf and CT 'carrier-id' leaf are used by each end of a radio hop to verify it is connected to the correct far-end terminal/carrier. The carrier-id should be the same on both sides of the hop; it defaults to 'A' and is left at default when MIMO and XPIC are not in use.
