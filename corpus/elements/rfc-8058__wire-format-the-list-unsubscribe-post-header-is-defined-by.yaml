document: rfc-8058
kind: wire-format
summary: 'The List-Unsubscribe-Post header is defined by the ABNF: ''list-unsubscribe-post = "List-Unsubscribe-Post:" 0*1WSP postarg CRLF'' where ''postarg = "List-Unsubscribe=One-Click"''. The fixed postarg value prevents injection of arbitrary form fields.'
