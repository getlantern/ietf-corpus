document: rfc-5601
kind: protocol-element
summary: 'The PW-STD-MIB module defines six tables: pwTable (generic config/status), pwPerfCurrentTable (15-min current stats), pwPerfIntervalTable (historical 15-min intervals, up to 96), pwPerf1DayIntervalTable (daily intervals, up to 31), pwIndexMappingTable (reverse mapping by peer IP/PW type/PW ID), and pwGenFecIndexMappingTable (reverse mapping for generalized FEC).'
