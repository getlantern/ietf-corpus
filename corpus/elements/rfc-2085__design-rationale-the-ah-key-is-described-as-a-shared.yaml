document: rfc-2085
kind: design-rationale
summary: 'The AH key is described as a shared secret rather than a traditional cryptographic key: it is hashed with the transmitted data so an intervening party cannot duplicate the authentication data. The strength of the transform lies in the singular mapping of key and IP datagram to authentication data.'
section: "1.2"
