document: rfc-3643
kind: protocol-element
summary: The CRC field (word 6, 32 bits) covers words 0-5 of the FC Encapsulation Header and is computed using the FC-FS polynomial, initial value, and bit order. When CRCV=0 the CRC field SHALL contain zero; when CRCV=1 it SHALL contain the computed CRC converted to FC-2 format.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
