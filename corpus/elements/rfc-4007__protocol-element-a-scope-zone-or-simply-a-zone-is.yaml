document: rfc-4007
kind: protocol-element
summary: A scope zone (or simply a zone) is a connected region of topology of a given scope. The zone to which a particular non-global address pertains is not encoded in the address itself but determined by context, such as the interface from which it is sent or received, allowing the same non-global address to be reused in different zones of that scope.
section: "5"
topics:
