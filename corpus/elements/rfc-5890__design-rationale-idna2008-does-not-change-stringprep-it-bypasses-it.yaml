document: rfc-5890
kind: design-rationale
summary: IDNA2008 does not change Stringprep; it bypasses it entirely. This means that upgrades to other protocols that depend on Stringprep are independent of the IDNA2008 changes and can be handled by experts on those protocols without entangling IDNA concerns.
section: "4.7"
topics:
    - dns
    - security
