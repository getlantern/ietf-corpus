document: rfc-9089
kind: normative-requirement
summary: When an OSPF ASBR redistributes a prefix from another instance of OSPF or another protocol, it SHOULD preserve the ELC signaling and originate an Extended Prefix Opaque LSA including the ELC setting. The flooding scope of the Extended Prefix Opaque LSA MUST match the flooding scope of the LSA the ASBR originates as a result of redistribution.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
