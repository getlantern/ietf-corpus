document: rfc-2931
kind: design-rationale
summary: The signed data for SIG(0) was changed from RFC 2535 to include the SIG(0) RDATA (other than the signature itself), securing the signature inception and expiration times and thereby improving replay attack resistance. This is a non-interoperable change from RFC 2535.
section: Appendix
topics:
    - dns
    - security
    - crypto
