document: rfc-8438
kind: normative-requirement
summary: The SIZE data item value MUST be equal to or greater than the sum of the RFC822.SIZE FETCH message data item values of all messages in the mailbox. It is not required to be an exact value.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
