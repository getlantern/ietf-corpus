document: rfc-8317
kind: protocol-element
summary: For single-homed Leaf site BUM traffic, the ingress PE adds a per-PE Leaf label advertised using the E-Tree extended community along with an EAD-ES route with ESI=0 and RTs for all EVIs that have at least one Leaf site. Multiple EAD-ES routes are used if the RT count exceeds a single route's limit.
section: 4.2.1
topics:
    - routing
    - mpls
    - multicast
