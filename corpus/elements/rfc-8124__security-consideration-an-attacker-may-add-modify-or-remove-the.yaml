document: rfc-8124
kind: security-consideration
summary: An attacker may add, modify, or remove the 'a=websocket-uri' attribute from an SDP session description, causing undesirable application behavior. It is RECOMMENDED that integrity protection (e.g., S/MIME for SIP-carried SDP) be applied to session descriptions.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - security
    - websocket
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
