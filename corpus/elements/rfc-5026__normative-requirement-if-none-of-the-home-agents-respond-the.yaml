document: rfc-5026
kind: normative-requirement
summary: If none of the Home Agents respond, the Mobile Node SHOULD try again after a configurable period of time. If IKEv2 authentication fails with all Home Agents, it is an unrecoverable error.
section: 5.1.2
rfc2119_level: SHOULD
topics:
    - mobility
