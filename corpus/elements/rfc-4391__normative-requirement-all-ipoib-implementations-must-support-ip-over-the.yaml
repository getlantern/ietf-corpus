document: rfc-4391
kind: normative-requirement
summary: All IPoIB implementations MUST support IP over the UD (Unreliable Datagram) transport mode of IBA. UD is the only universal transmission method and supports multicasting, partitioning, and 32-bit CRC.
section: "2"
rfc2119_level: MUST
topics:
    - ip
    - multicast
