document: rfc-2215
kind: design-rationale
summary: 'The minimum policed unit [m] bounds the bandwidth overhead consumed by link-level headers: without it, worst-case overhead would require assuming every flow sends minimum-sized packets. With [m], the overhead is bounded by the ratio of link-level header size to [m].'
