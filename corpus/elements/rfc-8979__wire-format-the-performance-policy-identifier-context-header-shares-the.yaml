document: rfc-8979
kind: wire-format
summary: 'The Performance Policy Identifier Context Header shares the same 32-bit fixed header layout as the Subscriber Identifier header (Metadata Class: 16 bits, Type: 8 bits, U bit: 1 bit, Length: 7 bits) followed by a variable-length opaque Performance Policy Identifier field. Metadata Class MUST be 0x0, Type is 0x01.'
