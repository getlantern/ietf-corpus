document: rfc-2327
kind: security-consideration
summary: Software parsing an SDP description MUST NOT be able to start software other than what is specifically configured for multimedia session participation. A session description arriving by announcement, email, invitation, or WWW SHOULD NOT deliver the user into an interactive multimedia session without the user first being informed and giving consent.
section: "7"
rfc2119_level: MUST NOT
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
