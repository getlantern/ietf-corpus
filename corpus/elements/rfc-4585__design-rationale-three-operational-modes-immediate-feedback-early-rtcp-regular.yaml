document: rfc-4585
kind: design-rationale
summary: Three operational modes (Immediate Feedback, Early RTCP, Regular RTCP) are defined as soft, application-specific thresholds with no requirement that all participants agree on a common mode boundary. The algorithm scales smoothly across all modes; the mode labels are conceptual guidance for application designers rather than protocol state.
