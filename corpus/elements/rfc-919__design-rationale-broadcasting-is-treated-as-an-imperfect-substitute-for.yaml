document: rfc-919
kind: design-rationale
summary: 'Broadcasting is treated as an imperfect substitute for multicasting: packets are broadcast at the hardware layer, but filtering in receiving hosts achieves the effect of multicast. It is most useful for gateway discovery, ARP-style address resolution, and reaching servers (name, time) without wired-in addresses.'
