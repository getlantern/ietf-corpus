document: rfc-5989
kind: wire-format
summary: For resource renaming, the message/http start line contains a 3xx-class HTTP response (e.g., '301 Moved Permanently') and SHOULD contain a Location header with the new resource name. For deletion, the start line contains a 4xx-class response (e.g., '404 Not Found' or '410 Gone').
