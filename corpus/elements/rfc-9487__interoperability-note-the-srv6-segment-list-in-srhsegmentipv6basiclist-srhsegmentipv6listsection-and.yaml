document: rfc-9487
kind: interoperability-note
summary: The SRv6 Segment List in srhSegmentIPv6BasicList, srhSegmentIPv6ListSection, and destinationIPv6Address may contain compressed-SID containers (draft-ietf-spring-srv6-srh-compression). Collectors can decompose these using srhSegmentIPv6EndpointBehavior to identify SR Endpoint Flavors and srhSegmentIPv6LocatorLength to identify the common most-significant locator bits.
section: "6.2"
topics:
    - ip
    - routing
