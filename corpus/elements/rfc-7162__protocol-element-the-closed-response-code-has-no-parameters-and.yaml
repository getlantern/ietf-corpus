document: rfc-7162
kind: protocol-element
summary: The CLOSED response code has no parameters and is returned when the currently selected mailbox is implicitly closed via SELECT/EXAMINE on another mailbox. Any server advertising QRESYNC or CONDSTORE MUST return it to serve as a clear boundary between responses for the old and new mailboxes.
section: 3.2.11
topics:
    - email
