document: rfc-9352
kind: wire-format
summary: The SRv6 End.X SID sub-TLV (type 43) carries a 1-octet Flags field (B/S/P flags), a 1-octet Algorithm, a 1-octet Weight, a 2-octet Endpoint Behavior, a 16-octet SID, and optional sub-sub-TLVs. It is advertised in TLVs 22, 23, 25, 141, 222, and 223 for point-to-point adjacencies.
section: "8.1"
