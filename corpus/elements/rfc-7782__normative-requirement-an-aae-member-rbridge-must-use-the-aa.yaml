document: rfc-7782
kind: normative-requirement
summary: An AAE member RBridge MUST use the AA-LAALP-GROUP-MAC APPsub-TLV to advertise in ESADI any MAC addresses learned from plain local (non-LAALP) links whose Data Labels are covered by the Data Labels of any attached LAALP, because remote RBridges will have disabled data-plane learning for those Data Labels.
section: 4.1.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
