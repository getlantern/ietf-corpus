document: rfc-4704
kind: interoperability-note
summary: Servers SHOULD send the complete fully qualified domain name in Client FQDN options. If a server modifies or substitutes the domain name, the domain name returned to the client may differ between two DHCPv6 exchanges (e.g., after conflict resolution), requiring clients to handle name changes gracefully.
section: "6.1"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
