document: rfc-5650
kind: interoperability-note
summary: The ifStackTable must be used to associate physical, fast, and interleaved channel ifEntries with higher-layer entries (e.g., ATM), because configuration parameters are stored only in profile tables associated with the physical-layer ifEntry; channel ifEntrys require the stack table to locate their configuration.
section: 2.1.1.3
topics:
    - snmp
