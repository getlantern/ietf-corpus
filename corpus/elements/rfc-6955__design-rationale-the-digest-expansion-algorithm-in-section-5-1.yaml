document: rfc-6955
kind: design-rationale
summary: The digest expansion algorithm in Section 5.1 does not add security beyond the b-bit hash output; its sole purpose is to produce a value of sufficient length to cover the range [0, q-1] when q is larger than b bits, making signature reversal harder without increasing the true entropy.
section: "5.1"
topics:
    - crypto
