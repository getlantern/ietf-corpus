document: rfc-9855
kind: interoperability-note
summary: Q-space computation requiring a reverse SPT per destination raises scaling concerns (noted in RFC 7490). TI-LFA implementations must determine their own tradeoff between scaling and optimization accuracy when computing Q-space.
