document: rfc-2752
kind: normative-requirement
summary: An RSVP message MAY contain multiple AUTH_DATA policy elements. When an INTEGRITY object is not computed for the RSVP message, an INTEGRITY object SHOULD be computed for the POLICY_DATA object containing AUTH_DATA and SHOULD be inserted as a Policy Data option.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - security
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
