document: rfc-2508
kind: normative-requirement
summary: IP/UDP/RTP compression SHOULD maintain state for multiple simultaneous session contexts. It is RECOMMENDED that implementations use a table-driven delta encoder and decoder to allow per-session negotiation of encoding tables, possibly including optimal Huffman encoding.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
