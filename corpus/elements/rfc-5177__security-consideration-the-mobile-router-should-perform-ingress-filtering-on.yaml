document: rfc-5177
kind: security-consideration
summary: The Mobile Router should perform ingress filtering on packets from the Mobile Network before reverse tunneling them to the Home Agent, and must drop packets whose source address does not belong to the Mobile Network, protecting against IP spoofing attacks through the bi-directional tunnel.
section: "10"
topics:
