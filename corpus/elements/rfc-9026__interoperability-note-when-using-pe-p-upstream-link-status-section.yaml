document: rfc-9026
kind: interoperability-note
summary: When using PE-P upstream link status (Section 3.1.2) in conjunction with fast restoration (e.g., MPLS FRR), it is recommended to use longer detection intervals at higher layers—a multiplier of 3 or larger is suggested (e.g., 10 ms for link, at least 100 ms for tunnel)—to avoid uncorrelated timers causing unnecessary switchovers.
section: 3.1.2
topics:
    - vpn
    - multicast
    - routing
    - mpls
