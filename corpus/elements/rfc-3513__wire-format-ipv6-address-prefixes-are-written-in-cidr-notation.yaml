document: rfc-3513
kind: wire-format
summary: IPv6 address prefixes are written in CIDR notation as 'ipv6-address/prefix-length', where prefix-length is the number of leftmost contiguous bits comprising the prefix. Trailing zeros within a 16-bit chunk of the address portion left of '/' must not be dropped.
section: "2.3"
topics:
    - ip
    - v6ops
