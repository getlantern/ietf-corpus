document: rfc-1542
kind: interoperability-note
summary: The 'ciaddr' field has been subject to multiple conflicting interpretations. Placing a non-zero value in 'ciaddr' can prevent the BOOTREPLY from reaching the client if the client is not yet listening on or is on the wrong subnet for that address; placing 0.0.0.0 is the safest and most interoperable behavior.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
