document: rfc-9678
kind: protocol-element
summary: 'Two ECDHE groups are specified: X25519 (Curve25519, RFC 7748) identified by FS KDF value 1, and P-256 (NIST secp256r1 / SEC group secp256r1) identified by FS KDF value 2. The group selection is implicit in the AT_KDF_FS value; no separate group negotiation is needed.'
