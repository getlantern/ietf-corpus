document: rfc-5120
kind: protocol-element
summary: MT Intermediate Systems TLV (TLV 222) extends IS reachability TLV type 22 with an additional 2-byte MT membership header containing 4 reserved bits and a 12-bit MT ID, followed by standard extended IS TLV format entries. It can contain up to 23 neighbors of the same MT if no sub-TLVs are used.
section: "7.2"
topics:
    - routing
