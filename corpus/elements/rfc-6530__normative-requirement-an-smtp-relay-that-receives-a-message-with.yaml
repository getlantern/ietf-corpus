document: rfc-6530
kind: normative-requirement
summary: An SMTP relay that receives a message with non-ASCII addresses MUST either explicitly recognize the internationalized format by agreeing via an ESMTP option, or reject the message (or, if necessary, return a non-delivery notification) so the sender can make another plan.
section: "7.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
