document: rfc-9642
kind: security-consideration
summary: Built-in key types SHOULD be hidden and/or encrypted (not cleartext). If this is not possible, NACM access control SHOULD be used to limit access to the key's secret data to only the most trusted authorized clients such as an organization's crypto officer.
section: "5.3"
topics:
    - yang
    - netconf
    - crypto
    - security
