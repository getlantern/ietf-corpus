document: rfc-7639
kind: design-rationale
summary: The ALPN header field carries an indication of client intent only and no negotiation takes place using it. In TLS, the final application protocol choice is made by the server from the set presented by the client; the header field merely signals what the client expects to use.
section: "1"
topics:
    - http
    - tls
