document: rfc-7731
kind: protocol-element
summary: 'MPL maintains four information sets per forwarder: the Local Interface Set (unicast addresses per interface), the Domain Set (interfaces per MPL Domain Address), a Seed Set per domain (sliding window of acceptable sequence numbers per seed), and a Buffered Message Set per domain (recently received MPL Data Messages from each seed).'
section: "4.2"
