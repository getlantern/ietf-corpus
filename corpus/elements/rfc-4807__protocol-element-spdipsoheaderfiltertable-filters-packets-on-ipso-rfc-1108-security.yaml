document: rfc-4807
kind: protocol-element
summary: 'spdIpsoHeaderFilterTable filters packets on IPSO (RFC 1108) security headers. spdIpsoHeadFiltType bits select which fields to check: classificationLevel (topSecret=61, secret=90, confidential=150, unclassified=171) and/or protectionAuthority (genser=0, siopesi=1, sci=2, nsa=3, doe=4).'
