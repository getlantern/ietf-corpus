document: rfc-4467
kind: protocol-element
summary: The GENURLAUTH command requests that the server generate URLAUTH-authorized URLs for one or more supplied URL/mechanism pairs. The server validates each URL for mailbox existence, valid owner userid, valid access identifier, and optionally uid/section validity, then returns the complete URLAUTH-authorized URLs in a GENURLAUTH response.
section: BASE.6.3.GENURLAUTH
topics:
    - email
    - security
