document: rfc-7513
kind: privacy-consideration
summary: SAVI-DHCP maintains a persistent mapping between IP addresses and binding anchors (which may include MAC addresses and physical port identifiers), enabling fine-grained tracking of device location and network activity. This information could facilitate surveillance and should be treated as sensitive.
section: "11.6"
topics:
