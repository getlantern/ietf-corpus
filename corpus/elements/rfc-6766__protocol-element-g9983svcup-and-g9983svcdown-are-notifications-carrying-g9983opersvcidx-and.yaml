document: rfc-6766
kind: protocol-element
summary: g9983SvcUp and g9983SvcDown are notifications carrying g9983OperSvcIdx and g9983SvcIfIdx, fired (unless disabled or rate-limited) when g9983OperSvcState transitions out of or into 'down' while the port ifOperStatus is 'up'. Generation is controlled by g9983PortConfSvcUpDownEnable.
