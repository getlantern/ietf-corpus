document: rfc-5150
kind: normative-requirement
summary: The region-boundary crossing trigger defined in RFC 4206 for dynamic FA-LSP creation MUST NOT be used for creation of an S-LSP for LSP stitching. For stitching, switching capabilities of the previous hop and next hop TE links MUST be the same, and local policies SHOULD be used for dynamic S-LSP creation.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
