document: rfc-7737
kind: normative-requirement
summary: The Reply Mode Order TLV MUST contain at least one Reply Mode value. Reply Mode value 1 (Do not reply) MUST NOT appear in the TLV. Any Reply Mode value other than 5 MUST NOT be repeated in the TLV.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
