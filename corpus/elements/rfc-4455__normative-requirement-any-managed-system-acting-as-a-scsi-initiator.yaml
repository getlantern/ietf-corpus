document: rfc-4455
kind: normative-requirement
summary: Any managed system acting as a SCSI initiator or target/initiator device and port MUST support the scsiInitiatorDeviceGroup, which contains all managed information related to local SCSI initiator devices, ports, and monitored attached SCSI target devices.
