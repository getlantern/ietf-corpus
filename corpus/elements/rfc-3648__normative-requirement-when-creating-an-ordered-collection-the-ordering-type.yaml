document: rfc-3648
kind: normative-requirement
summary: When creating an ordered collection, the Ordering-Type header precondition DAV:ordered-collections-supported requires that the server MUST support ordered collections in the part of the URL namespace identified by the request URL. The postcondition DAV:ordering-type-set requires that the collection MUST be ordered unless the ordering type is DAV:unordered.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
