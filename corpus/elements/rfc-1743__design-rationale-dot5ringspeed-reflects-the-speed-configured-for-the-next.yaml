document: rfc-1743
kind: design-rationale
summary: dot5RingSpeed reflects the speed configured for the next insertion rather than the current operational speed (ifSpeed). When set to unknown(1), the ring's actual ring-speed is used at insertion time. This separation allows pre-configuration of speed changes without disrupting the current ring session.
