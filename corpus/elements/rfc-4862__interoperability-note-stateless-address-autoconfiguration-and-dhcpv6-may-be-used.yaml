document: rfc-4862
kind: interoperability-note
summary: Stateless address autoconfiguration and DHCPv6 may be used simultaneously on the same interface. If configuration parameters (e.g., MTU, hop limit) are received inconsistently from multiple sources, it is not a fatal error; hosts accept the union, and more recently obtained values SHOULD take precedence. Securely obtained information SHOULD take precedence over unsecured information.
section: "5.6"
topics:
    - ip
    - v6ops
