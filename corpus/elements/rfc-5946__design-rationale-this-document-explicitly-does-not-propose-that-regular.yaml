document: rfc-5946
kind: design-rationale
summary: This document explicitly does NOT propose that regular RSVP receivers generate PathErr messages on reservation failure. The rationale is that with an RSVP-capable receiver the current receiver-driven model of RFC 2205 is fully applicable, and modifying existing deployed behavior would require very strong motivation that does not exist.
section: 3.1.4
topics:
