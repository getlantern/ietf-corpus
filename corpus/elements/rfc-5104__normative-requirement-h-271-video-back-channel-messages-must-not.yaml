document: rfc-5104
kind: normative-requirement
summary: H.271 Video Back Channel Messages MUST NOT be used in multicast environments unless all multicast safety issues are fully understood and accounted for by all endpoints. They MUST NOT be used in centralized multipoint unless both mixer and endpoints handle all known aggregation issues.
section: 3.5.3
rfc2119_level: MUST NOT
topics:
