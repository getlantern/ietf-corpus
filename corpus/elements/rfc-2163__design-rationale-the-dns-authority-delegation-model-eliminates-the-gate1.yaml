document: rfc-2163
kind: design-rationale
summary: 'The DNS authority delegation model eliminates the gate1/gate2 ambiguity inherent in static tables: the authority controlling an RFC822 DNS zone exclusively decides whether its domain uses Standard Attributes (table2) or DDA encoding (gate2), and similarly for X.400 zones choosing between SA (table1) and LHS encoding (gate1).'
section: "4.4"
topics:
