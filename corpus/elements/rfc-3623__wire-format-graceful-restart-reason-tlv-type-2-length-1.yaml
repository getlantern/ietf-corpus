document: rfc-3623
kind: wire-format
summary: 'Graceful Restart Reason TLV (Type=2, Length=1): encodes the restart reason as one of 0 (unknown), 1 (software restart), 2 (software reload/upgrade), or 3 (switch to redundant control processor). This TLV MUST always appear in a grace-LSA.'
