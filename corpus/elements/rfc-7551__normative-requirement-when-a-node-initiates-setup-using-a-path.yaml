document: rfc-7551
kind: normative-requirement
summary: When a node initiates setup using a Path message with Association Type set to 'Single-Sided Associated Bidirectional LSP', the Path message MUST carry the REVERSE_LSP Object to trigger creation of a reverse LSP on the egress node.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
