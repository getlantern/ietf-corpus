document: rfc-5991
kind: design-rationale
summary: 'The cone bit is deprecated because it reveals the security posture of the network: a set cone bit signals that the NAT is open to incoming connections, potentially inviting port scans. Deprecating it prevents a priori revelation of NAT security posture to attackers.'
section: "1"
topics:
    - ip
    - v6ops
    - security
    - nat
