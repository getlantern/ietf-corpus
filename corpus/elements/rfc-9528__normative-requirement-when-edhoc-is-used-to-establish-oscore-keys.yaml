document: rfc-9528
kind: normative-requirement
summary: When EDHOC is used to establish OSCORE keys, the Initiator and Responder MUST NOT select connection identifiers that result in the same OSCORE Recipient ID, because connection identifiers map directly to OSCORE Recipient IDs.
section: 3.3.3
rfc2119_level: MUST NOT
