summary: 'ospfIfState tracks OSPF interface states: down(1), loopback(2), waiting(3), pointToPoint(4), designatedRouter(5), backupDesignatedRouter(6), otherDesignatedRouter(7). Transitions are driven by interface events such as interface up/down, DR election completion, and neighbor discovery.'
