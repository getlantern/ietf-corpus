document: rfc-1734
kind: normative-requirement
summary: If the client wishes to cancel an authentication exchange, it should issue a line with a single "*". If the server receives such an answer, it must reject the AUTH command by sending a negative response.
section: "2"
rfc2119_level: MUST
topics:
    - security
