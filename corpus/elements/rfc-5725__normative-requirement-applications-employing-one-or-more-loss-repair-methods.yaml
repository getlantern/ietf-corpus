document: rfc-5725
kind: normative-requirement
summary: Applications employing one or more loss-repair methods MAY use Post-repair Loss RLE reports for every packet received or for a set of specific packets, meaning the coverage of post-repair Loss RLEs may or may not be contiguous.
section: "1"
rfc2119_level: MAY
topics:
