document: rfc-3015
kind: design-rationale
summary: The connection model separates Terminations (sources/sinks of media) from Contexts (their associations), allowing a single MGC to manage complex topologies such as conferencing, call-waiting, and hold by moving Terminations between Contexts atomically, without re-establishing bearers.
