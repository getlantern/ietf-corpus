document: rfc-6327
kind: state-machine
summary: 'Each TRILL LAN adjacency passes through four states: Down (non-existent), Detect (neighbor seen but not 2-way on Designated VLAN), 2-Way (bidirectional on Designated VLAN but MTU not confirmed), and Report (full adjacency reported in LSPs). Transitions are driven by events A0–A8, including Hello receipt on/off Designated VLAN, timer expiry, MTU test success/failure, and port going down.'
