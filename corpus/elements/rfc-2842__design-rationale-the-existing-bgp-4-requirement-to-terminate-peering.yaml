document: rfc-2842
kind: design-rationale
summary: The existing BGP-4 requirement to terminate peering upon receiving an unrecognized Optional Parameter complicates introduction of new capabilities. The Capabilities Optional Parameter allows graceful capability advertisement without requiring peering termination.
section: "1"
topics:
