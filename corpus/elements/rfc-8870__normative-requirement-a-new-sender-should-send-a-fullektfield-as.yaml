document: rfc-8870
kind: normative-requirement
summary: A new sender SHOULD send a FullEKTField as soon as possible, ideally in its initial SRTP packet. It is RECOMMENDED that the FullEKTField be transmitted in three consecutive packets to accommodate packet loss.
section: "4.6"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
