document: rfc-5749
kind: protocol-element
summary: 'The Key Distribution Exchange (KDE) is an abstract protocol template for distributing EMSK-derived root keys (USRK, DSRK, DSUSRK) from a Key Delivering Server (KDS) to a Key Requesting Server (KRS) over a AAA protocol. It consists of one round-trip: a KDE-Request carrying a Key Request Token (KRT) and a KDE-Response carrying a Key Delivery Token (KDT). The template must be instantiated for a specific AAA protocol (e.g., RADIUS or Diameter) before it can be implemented.'
section: "4"
topics:
    - security
    - crypto
    - diameter
    - radius
