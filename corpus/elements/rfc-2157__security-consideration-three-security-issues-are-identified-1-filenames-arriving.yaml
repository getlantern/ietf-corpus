document: rfc-2157
kind: security-consideration
summary: 'Three security issues are identified: (1) filenames arriving in body part headers (section 2.3.2) must be sanitized before use on a local filesystem; (2) gateways handling encrypted or signed content (sections 7.3/7.4) compromise end-to-end security; (3) a gateway fetching message/external-body on behalf of a recipient may be tricked into inappropriate actions by malicious senders.'
section: "9"
topics:
    - email
    - security
