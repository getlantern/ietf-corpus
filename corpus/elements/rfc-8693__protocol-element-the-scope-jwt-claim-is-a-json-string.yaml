document: rfc-8693
kind: protocol-element
summary: The 'scope' JWT claim is a JSON string containing a space-separated list of scopes associated with the token, consistent with RFC 6749 Section 3.3 format. The 'client_id' JWT claim carries the OAuth 2.0 client identifier that requested the token.
