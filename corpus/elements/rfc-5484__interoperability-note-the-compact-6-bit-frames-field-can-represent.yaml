document: rfc-5484
kind: interoperability-note
summary: The compact 6-bit frames field can represent values 0–63, exceeding the SMPTE 12M BCD maximum of 29 (limited by a 2-bit tens digit). Implementations must not assume the compact and full forms carry equivalent frame-count ranges.
