document: rfc-4363
kind: design-rationale
summary: Devices that implement Extended Forwarding Services (IEEE 802.1D) but not virtual bridged LANs should implement dot1qTpGroupTable, dot1qForwardAllTable, and dot1qForwardUnregisteredTable with a fixed dot1qFdbId or dot1qVlanIndex of 1, rather than omitting these tables entirely.
