document: rfc-9810
kind: security-consideration
summary: Using a KEM key pair recurrently for message protection across many transactions creates a long-term relationship between the KEM private key and the protected messages, which may weaken forward secrecy; implementers should consider key rotation policies for KEM protection keys.
section: "8.8"
topics:
    - pkix
    - crypto
    - security
