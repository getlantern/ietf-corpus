document: rfc-9248
kind: protocol-element
summary: 'The RUE Configuration service exposes two HTTPS endpoints: ''/ProviderConfig'' (unauthenticated, returns signup, dial-around, and help desk data) and ''/RueConfig'' (authenticated, returns per-subscriber configuration including phone-number, provider-domain, SIP credentials, ICE servers, MWI/videomail URIs, and CardDAV details). Both accept optional ''apiKey'' and required ''instanceId'' query parameters.'
section: "9.2"
