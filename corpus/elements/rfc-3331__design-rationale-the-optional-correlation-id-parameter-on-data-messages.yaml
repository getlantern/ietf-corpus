document: rfc-3331
kind: design-rationale
summary: The optional Correlation Id parameter on Data messages allows an SGP implementation to obtain confirmation that an MSU was delivered to the M2UA peer before acknowledging it to the SS7 peer, eliminating the risk of message loss due to SCTP association failure or congestion.
section: 3.3.1.2
topics:
    - realtime
    - sctp
