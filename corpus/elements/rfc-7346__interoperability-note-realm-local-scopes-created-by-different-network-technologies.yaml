document: rfc-7346
kind: interoperability-note
summary: Realm-Local scopes created by different network technologies are considered independent and will have different zone indices (per RFC 4007 Section 6). A router with interfaces on links using different network technologies does not forward traffic between the Realm-Local multicast scopes defined by those technologies.
section: "2"
topics:
    - ip
    - multicast
