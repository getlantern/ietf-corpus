document: rfc-2511
kind: security-consideration
summary: 'The dhMAC proof of possession provides a dual guarantee: the entity possesses the private key corresponding to the requested public key (needed to compute the shared secret), and only the intended CA can verify the request (because the CA requires its own private key to compute the same shared secret), protecting against rogue CAs.'
