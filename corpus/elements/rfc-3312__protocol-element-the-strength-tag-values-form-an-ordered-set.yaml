summary: 'The strength-tag values form an ordered set: ''none'' < ''optional'' < ''mandatory'', plus ''failure'' and ''unknown'' for error reporting. The direction-tag values are ''none'', ''send'', ''recv'', ''sendrecv''. The status-type values are ''e2e'', ''local'', and ''remote''.'
