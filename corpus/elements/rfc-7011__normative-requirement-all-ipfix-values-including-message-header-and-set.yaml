document: rfc-7011
kind: normative-requirement
summary: All IPFIX values, including Message Header and Set Header fields and all Information Elements (except string and octetArray), MUST be encoded in network byte order (big-endian). Signed integral types use two's complement. Float types use IEEE 754 binary32/binary64 in network byte order.
section: "6"
rfc2119_level: MUST
topics:
    - measurement
