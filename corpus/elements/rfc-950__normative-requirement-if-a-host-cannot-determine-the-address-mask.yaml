document: rfc-950
kind: normative-requirement
summary: If a host cannot determine the address mask after a reasonable number of tries, it should use a mask identical to the Internet network number mask (no subnetting assumed), as this is the safest default and will not prevent transmissions that would otherwise succeed.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - ip
