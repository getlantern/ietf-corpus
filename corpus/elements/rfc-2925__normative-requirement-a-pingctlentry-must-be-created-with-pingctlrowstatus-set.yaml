document: rfc-2925
kind: normative-requirement
summary: A pingCtlEntry MUST be created with pingCtlRowStatus set to active(1) before the test is started via pingCtlAdminStatus. A value MUST be set for pingCtlTargetAddress prior to transitioning the entry to active(1) state.
section: 3.1.2
rfc2119_level: MUST
