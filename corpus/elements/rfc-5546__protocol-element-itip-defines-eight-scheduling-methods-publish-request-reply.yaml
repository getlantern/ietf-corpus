document: rfc-5546
kind: protocol-element
summary: 'iTIP defines eight scheduling methods: PUBLISH, REQUEST, REPLY, ADD, CANCEL, REFRESH, COUNTER, and DECLINECOUNTER. Organizers may send PUBLISH, REQUEST, ADD, CANCEL, and DECLINECOUNTER; Attendees may send REPLY, REFRESH, COUNTER, and REQUEST (only when delegating).'
section: "1.4"
topics:
