document: rfc-6790
kind: normative-requirement
summary: Transit LSRs MUST NOT use reserved labels (values 0–15) as keys for the load-balancing function. If a transit LSR recognizes the ELI, it MAY load balance solely on the following label (the EL); otherwise it SHOULD use as much of the whole label stack as feasible.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
