document: rfc-4769
kind: design-rationale
summary: The subtype is needed to identify the specific Enumservice intended because when only one URI scheme is associated with a given service, an additional URI scheme may be added later; the subtype thus future-proofs the registration by distinguishing between 'pstn:tel' and 'pstn:sip'.
