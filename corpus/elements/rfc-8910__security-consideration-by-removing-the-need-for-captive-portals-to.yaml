document: rfc-8910
kind: security-consideration
summary: By removing the need for captive portals to perform MITM hijacking, this mechanism makes the portal and its actions visible rather than hidden, reduces the likelihood users will disable security safeguards like DNSSEC or VPNs, and allows systems to avoid sending cookies or credentials while in captive portal mode.
