document: rfc-3473
kind: normative-requirement
summary: The Restart_Cap object MUST NOT be sent when there is no mechanism to detect data channel failures independent of control channel failures. Nodes supporting state recovery MUST include the Restart_Cap object in all Hello messages.
section: "9"
rfc2119_level: MUST NOT
topics:
