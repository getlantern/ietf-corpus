document: rfc-8502
kind: wire-format
summary: L2L3VpnMcastProviderTunnelId is an OCTET STRING with size constrained to (0|4|8|12|16|17|24|29|32) octets. The actual size depends on address family (IPv4 or IPv6) and the corresponding tunnel type; for example, rsvpP2mp is 12 octets in IPv4 and 24 in IPv6, while ingressReplication is 4 octets (IPv4) or 16 octets (IPv6).
section: "4.1"
topics:
    - multicast
    - vpn
    - snmp
    - mpls
