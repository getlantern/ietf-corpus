document: rfc-8830
kind: protocol-element
summary: During offer generation, for each media description with an associated outgoing MediaStreamTrack, the offerer adds one 'a=msid' attribute per MediaStream the track belongs to. The msid-id is the WebIDL 'id' of the MediaStream; msid-appdata is the WebIDL 'id' of the MediaStreamTrack if the sender wishes to signal it.
section: 3.2.1
topics:
    - webrtc
    - realtime
