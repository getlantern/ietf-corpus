document: rfc-3108
kind: wire-format
summary: 'The ''eecid'' attribute value consists of up to 8 hex digits (equivalent to 4 octets) with no ''0x'' prefix, since it is always hexadecimal. Hex digits to the left are more significant. Syntax: a=eecid:<eecid>.'
section: 5.6.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
