document: rfc-2128
kind: protocol-element
summary: callHistoryTable stores completed call records indexed by {callActiveSetupTime, callActiveIndex}. It retains successful, unsuccessful, and rejected calls and is controlled by callHistoryTableMaxLength and callHistoryRetainTimer (in minutes); when full, the oldest entry is deleted.
