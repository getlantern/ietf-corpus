document: rfc-9003
kind: wire-format
summary: The Cease NOTIFICATION message with a Shutdown Communication consists of Error Code 6, a Subcode byte (2 or 4), an 8-bit Length field indicating the byte length of the Shutdown Communication, and the variable-length UTF-8 Shutdown Communication field. When Length is zero, no Shutdown Communication field follows.
