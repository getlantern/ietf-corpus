document: rfc-9760
kind: normative-requirement
summary: TimeTransmitter Clocks MUST obey the standard Best TimeTransmitter Clock Algorithm as defined in IEEE 1588-2019. A PTP Port MUST NOT be in the timeTransmitter state unless the clock has a current value for the number of UTC leap seconds.
section: "8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
