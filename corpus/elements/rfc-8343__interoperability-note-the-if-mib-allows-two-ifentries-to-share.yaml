document: rfc-8343
kind: interoperability-note
summary: The IF-MIB allows two ifEntries to share the same ifName; devices supporting this feature cannot maintain a 1-1 mapping between the 'name' leaf and ifName. Additionally, ifMtu, ifDescr, ifConnectorPresent, and ifPromiscuousMode are not mapped to 'ietf-interfaces' and are expected to be provided by interface-type-specific augmenting modules.
section: "4"
topics:
