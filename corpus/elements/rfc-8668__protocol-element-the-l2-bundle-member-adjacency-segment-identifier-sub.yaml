document: rfc-8668
kind: protocol-element
summary: The L2 Bundle Member Adjacency Segment Identifier Sub-TLV (Type 41) advertises Adj-SIDs for L2 Bundle Members associated with a point-to-point parent L3 adjacency. It carries a 1-octet flags field (F, V, L, S, P flags), a 1-octet weight, and one SID/Index/Label descriptor per L2 Bundle Member listed in the preceding L2 Bundle Attribute Descriptor.
section: "4.1"
topics:
    - routing
    - mpls
