document: rfc-7795
kind: protocol-element
summary: In the S-PE protection scenario, two MS-PWs are switched at S-PE1 and S-PE2 respectively. PW1 (primary) is switched at S-PE1 with PW1-Seg2 as primary segment, and PW2 (secondary) is switched at S-PE2, providing both S-PE node protection and multi-homed T-PE resiliency.
