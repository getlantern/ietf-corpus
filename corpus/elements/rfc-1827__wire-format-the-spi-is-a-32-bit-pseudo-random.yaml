document: rfc-1827
kind: wire-format
summary: The SPI is a 32-bit pseudo-random value identifying the security association for the datagram. If no security association has been established, the SPI field value SHALL be 0x00000000. SPI values 0x00000001 through 0x000000FF are reserved for IANA.
section: "3.1"
