document: rfc-2661
kind: normative-requirement
summary: Sequence numbers (Ns and Nr fields, indicated by the S bit) are required to be present in all control messages. The S bit MUST be set to 1 for control messages. The L bit and O bit are also MUST/MUST-NOT for control messages (L=1, O=0, P=0).
section: "3.1"
rfc2119_level: MUST
topics:
    - vpn
