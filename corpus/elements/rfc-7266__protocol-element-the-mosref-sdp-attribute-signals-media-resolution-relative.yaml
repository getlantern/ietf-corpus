document: rfc-7266
kind: protocol-element
summary: 'The ''mosref'' SDP attribute signals media resolution relative reference with three values: ''l'' (lower resolution, e.g., narrowband speech or SD video), ''m'' (wideband speech or SD-to-HD video), and ''h'' (super-wideband speech or HD+ video). It is used to disambiguate MOS scores that occupy the same numeric range across different resolutions.'
section: "4.1"
