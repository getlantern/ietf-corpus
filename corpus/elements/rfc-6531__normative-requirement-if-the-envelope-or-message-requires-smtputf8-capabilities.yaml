document: rfc-6531
kind: normative-requirement
summary: If the envelope or message requires SMTPUTF8 capabilities, the SMTPUTF8-aware SMTP client MUST supply the SMTPUTF8 parameter with the MAIL command. If neither the envelope nor message requires SMTPUTF8 capabilities, it SHOULD NOT supply the parameter.
section: "3.4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
