document: rfc-1055
kind: interoperability-note
summary: There is no formal SLIP standard, so no single authoritative maximum packet size exists. The Berkeley UNIX driver limit of 1006 bytes is presented as the de facto interoperability baseline that new implementations should observe for compatibility with deployed systems.
