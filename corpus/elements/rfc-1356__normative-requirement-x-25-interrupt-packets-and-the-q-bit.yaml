document: rfc-1356
kind: normative-requirement
summary: X.25 interrupt packets and the Q bit MUST NOT be used. The D bit SHOULD NOT be used because it interferes with M-bit PDU sequencing; the D-bit modification facility MUST NOT be subscribed.
section: "3.13"
