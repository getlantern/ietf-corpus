document: rfc-9930
kind: protocol-element
summary: The Crypto-Binding TLV proves that both peer and server participated in tunnel establishment and the full sequence of authentications; it also verifies the TEAP type, version negotiated, and Outer TLVs exchanged before tunnel establishment. It MUST be exchanged after each successful inner authentication and before the final Result TLV.
section: 4.2.13
