document: rfc-5090
kind: normative-requirement
summary: A RADIUS client MUST send zero or exactly one credential to the RADIUS server, and MUST choose the credential of the (Proxy-)Authorization header if the realm directive matches its locally configured realm.
section: 2.1.1
rfc2119_level: MUST
