document: rfc-5046
kind: wire-format
summary: The iSER Header (Section 9.1, Figure 2) is an 8-byte structure prepended to iSCSI PDUs sent over RDMA Send messages. It carries an opcode field identifying the message type (control PDU, Hello, or HelloReply) and STag fields advertising I/O buffers. No length field is present in the iSER header because the RCaP layer supplies the message length.
section: "9.1"
