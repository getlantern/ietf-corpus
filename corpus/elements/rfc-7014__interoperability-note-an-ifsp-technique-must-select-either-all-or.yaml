document: rfc-7014
kind: interoperability-note
summary: An IFSP technique must select either all or none of the packets of a Complete Flow; techniques that cannot guarantee this (e.g., flow-state dependent packet selection) must be classified as packet selection techniques under RFC 5475 rather than as IFSP techniques.
section: "3"
