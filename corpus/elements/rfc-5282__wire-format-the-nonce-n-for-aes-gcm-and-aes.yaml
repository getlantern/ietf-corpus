document: rfc-5282
kind: wire-format
summary: 'The nonce (N) for AES GCM and AES CCM uses a partially implicit format: the implicit portion is a salt from IKEv2 keying material (not included in the payload), and the explicit portion is the IV from the Encrypted Payload. The nonce is constructed by concatenating salt then IV.'
