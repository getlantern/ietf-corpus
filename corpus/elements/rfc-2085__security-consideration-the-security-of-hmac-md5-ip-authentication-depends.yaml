document: rfc-2085
kind: security-consideration
summary: The security of HMAC-MD5 IP authentication depends on the strength of MD5, correctness of the algorithm implementation, security and correctness of the key management mechanism, strength of the associated secret key, and correctness of all participating system implementations. Implementations should consult [HMAC-MD5] for a detailed discussion of MD5 strengths and weaknesses.
section: "3"
topics:
    - ipsec
    - security
    - crypto
