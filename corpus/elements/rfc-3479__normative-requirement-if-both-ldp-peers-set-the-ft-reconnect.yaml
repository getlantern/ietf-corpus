document: rfc-3479
kind: normative-requirement
summary: If both LDP peers set the FT Reconnect Flag to 1, both MUST complete any label operations on Sequence Numbered FT Labels that were interrupted by the failure. If either peer could not pend operations during TCP failure, it MUST set the FT Reconnect Flag to 0 on reconnection.
section: "4.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
