document: rfc-7950
kind: normative-requirement
summary: A module or submodule MUST NOT include submodules from other modules, and a submodule MUST NOT import its own module. A submodule MUST NOT include different revisions of other submodules than the revisions that its parent module includes.
section: "5.1"
rfc2119_level: MUST NOT
