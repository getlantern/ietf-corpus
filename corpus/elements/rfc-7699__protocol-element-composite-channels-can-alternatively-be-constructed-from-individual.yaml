document: rfc-7699
kind: protocol-element
summary: Composite channels can alternatively be constructed from individual LSPs using single flexi-grid slots managed as a group (analogous to RFC 6344 for TDM), without requiring compound labels; in this case, standard single-slot labels suffice and no additional label definitions are needed.
section: "4.3"
topics:
