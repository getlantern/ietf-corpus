document: rfc-2178
kind: protocol-element
summary: Stub areas do not receive AS-external-LSAs; routing to external destinations uses a per-area default route advertised by area border routers in summary-LSAs. AS boundary routers cannot reside inside stub areas, and virtual links cannot be configured through stub areas.
section: "3.6"
topics:
    - routing
