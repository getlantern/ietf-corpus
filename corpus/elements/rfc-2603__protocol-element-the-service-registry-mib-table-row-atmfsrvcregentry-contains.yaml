summary: 'The Service Registry MIB table row (AtmfSrvcRegEntry) contains five fields: atmfSrvcRegPort (ATM port number), atmfSrvcRegServiceID (OID identifying the service type), atmfSrvcRegATMAddress (full ATM address of the service), atmfSrvcRegAddressIndex (integer differentiating multiple rows for the same service), and atmfSrvcRegParm1 (protocol-specific parameter octet string).'
