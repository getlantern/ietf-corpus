document: rfc-2456
kind: normative-requirement
summary: Notifications are only sent for row deletion if the last state of the row was active (or operational). For a deleted row whose last state was active, the notification MUST indicate an inactive state, since a deleted resource can no longer be active.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
