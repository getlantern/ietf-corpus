document: rfc-9034
kind: protocol-element
summary: Deadline-6LoRHE is a new Elective 6LoWPAN Routing Header (6LoRHE) type that carries the Deadline Time (DT) for an IPv6 datagram in compressed form, optionally accompanied by an Origination Time Delta (OTD) field. It enables intermediate nodes to make forwarding and scheduling decisions to meet end-to-end delay bounds in time-synchronized LLNs.
section: "4"
