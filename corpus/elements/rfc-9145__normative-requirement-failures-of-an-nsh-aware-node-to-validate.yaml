document: rfc-9145
kind: normative-requirement
summary: Failures of an NSH-aware node to validate the integrity of the NSH data MUST cause that packet to be discarded; a notification alarm MAY be sent to an SFC control element. Notification alarm details SHOULD be configurable.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
