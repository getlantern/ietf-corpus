document: rfc-5177
kind: design-rationale
summary: Nested Mobile Networks (a Mobile Router attaching to another Mobile Router's Mobile Network) are supported with no restriction on nesting levels. However, physical loops in a nested aggregation are neither detected nor solved, and deep nesting introduces significant per-level tunnel header overhead that reduces usable MTU for applications lacking MTU discovery.
section: "8"
topics:
