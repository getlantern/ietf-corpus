document: rfc-3921
kind: normative-requirement
summary: If a user sends directed presence to an entity not in the roster with subscription 'from' or 'both', the server MUST route the stanza but MUST NOT include that entity in subsequent available presence broadcasts; however, if the resource becomes unavailable, the server MUST send unavailable presence to that entity.
section: 5.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
