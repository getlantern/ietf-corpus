document: rfc-6858
kind: protocol-element
summary: Each internationalized email address in the header fields Bcc, Cc, From, Reply-To, Resent-Bcc, Resent-Cc, Resent-From, Resent-Sender, Resent-To, Return-Path, Sender, and To is replaced with an invalid email address (using the .invalid TLD) whose display-name communicates what happened. Addresses in other fields such as Received are not affected.
section: "2.1"
topics:
    - email
