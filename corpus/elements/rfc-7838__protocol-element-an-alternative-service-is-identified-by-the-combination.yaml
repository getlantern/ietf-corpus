document: rfc-7838
kind: protocol-element
summary: An Alternative Service is identified by the combination of an ALPN protocol name (per RFC 7301), a host (per RFC 3986 Section 3.2.2), and a port (per RFC 3986 Section 3.2.3). Alternative services are considered authoritative for an origin's resources and do not replace or change the origin for any given resource.
section: "2"
