document: rfc-6464
kind: protocol-element
summary: The audio level magnitude is packed into the 7 least significant bits of the extension byte, expressed in -dBov. Values 0 to 127 represent 0 to -127 dBov, where dBov is the level relative to the overload point of the system (the highest-intensity encodable signal).
