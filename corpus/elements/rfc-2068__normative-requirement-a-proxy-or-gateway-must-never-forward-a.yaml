document: rfc-2068
kind: normative-requirement
summary: A proxy or gateway MUST never forward a message with a version indicator greater than its actual version. If a higher-version request is received, the proxy MUST either downgrade the request version, respond with an error, or switch to tunnel behavior.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
