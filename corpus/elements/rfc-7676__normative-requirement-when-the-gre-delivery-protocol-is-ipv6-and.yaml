document: rfc-7676
kind: normative-requirement
summary: When the GRE delivery protocol is IPv6 and the GRE header immediately follows the delivery header, the Next Header field in the IPv6 header MUST be set to 47. If extension headers intervene, the Next Header field in the last extension header MUST be set to 47.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
