document: rfc-7666
kind: protocol-element
summary: The vmCpuAffinityTable maps virtual CPUs to physical CPUs, indexed by vmIndex, vmCpuIndex, and vmCpuPhysIndex. The vmCpuAffinity object indicates whether a given virtual CPU is pinned (enabled) or not (disabled) to the physical CPU identified by vmCpuPhysIndex.
