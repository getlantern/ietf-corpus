document: rfc-977
kind: design-rationale
summary: NNTP is modelled on RFC 850 (USENET news article format) but makes few demands on article structure, content, or storage, so it can be adapted to non-USENET news systems. The server is a pure database interface; user-friendly functions are left to client programs which better understand their operating environment.
section: "1.4"
topics:
