document: rfc-9901
kind: protocol-element
summary: Decoy digests—hashes of random values with no corresponding Disclosure—may be added to `_sd` arrays or inline arrays to obscure the actual number of claims or array elements. No Disclosure is sent for decoy digests, so the Holder sees digests that match nothing.
section: 4.2.5
topics:
    - jose
    - privacy
