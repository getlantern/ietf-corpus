document: rfc-5692
kind: interoperability-note
summary: The Ethernet over IEEE 802.16 link model maintains full compatibility with standard IP over Ethernet behavior (RFC 894 for IPv4, RFC 2464 for IPv6), allowing existing Ethernet-based IP mechanisms to operate without modification at the IP layer.
