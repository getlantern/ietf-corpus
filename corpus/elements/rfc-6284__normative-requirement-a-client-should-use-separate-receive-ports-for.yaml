document: rfc-6284
kind: normative-requirement
summary: A client SHOULD use separate receive ports for subsequent unicast sessions unless each stream has a distinct SSRC. After a sufficient time (two minutes is RECOMMENDED), a previously used port can be reused.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
