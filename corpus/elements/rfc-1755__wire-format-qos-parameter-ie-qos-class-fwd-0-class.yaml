document: rfc-1755
kind: wire-format
summary: 'QoS Parameter IE: qos_class_fwd=0 (Class 0 - Unspecified), qos_class_bkw=0. Class 0 is the only QoS class all networks must support and the only class allowed with Best Effort service. The coding standard field SHOULD be set to ''00'' per ITU-T standardization.'
