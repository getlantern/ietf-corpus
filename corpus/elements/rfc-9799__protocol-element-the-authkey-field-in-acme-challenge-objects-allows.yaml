document: rfc-9799
kind: protocol-element
summary: The authKey field in ACME challenge objects allows the ACME server to advertise its Ed25519 public key (encoded per RFC 8037) that it will use to authenticate itself when retrieving the Hidden Service Descriptor for services that use client authentication. ACME servers MUST NOT use the same public key with multiple Hidden Services.
section: "4"
topics:
