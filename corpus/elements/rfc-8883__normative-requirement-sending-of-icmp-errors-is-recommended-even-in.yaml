document: rfc-8883
kind: normative-requirement
summary: Sending of ICMP errors is RECOMMENDED even in cases where a node is discarding packets per nonconformant behavior (e.g., dropping packets to extract transport-layer info for filtering). The rationale is that providing some reason is better than a silent drop.
section: "1.3"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
