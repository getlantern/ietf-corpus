document: rfc-7496
kind: normative-requirement
summary: It is an error to use SCTP_{CURRENT|ALL|FUTURE}_ASSOC in sprstat_assoc_id for SCTP_PR_STREAM_STATUS, and an error to use SCTP_PR_SCTP_NONE in sprstat_policy. If SCTP_PR_SCTP_ALL is used, counters are aggregated over all supported policies.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - sctp
