document: rfc-7224
kind: interoperability-note
summary: The identity 'ethernetCsmacd' covers all Ethernet-like interfaces regardless of speed as per RFC 3635. Identities 'iso88023Csmacd', 'starLan', 'fastEther', 'fastEtherFX', and 'gigabitEthernet' are all deprecated in favor of 'ethernetCsmacd'.
