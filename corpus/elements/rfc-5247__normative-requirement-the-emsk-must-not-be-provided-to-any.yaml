document: rfc-5247
kind: normative-requirement
summary: The EMSK MUST NOT be provided to any entity outside the EAP server or peer. It is not permitted to pass any quantity to an outside entity from which the EMSK could be computed without breaking a cryptographic assumption, such as inverting a one-way function.
section: "1.4"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
