document: rfc-5042
kind: protocol-element
summary: 'The STag has a 32-bit namespace with configurable scope: Protection Domain scope (valid on any Stream within the PD) or Single Stream scope (valid on exactly one Stream). The scope is a primary mechanism for controlling which remote peers may access an Advertised buffer.'
