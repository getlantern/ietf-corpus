document: rfc-3850
kind: security-consideration
summary: MD2 is discouraged for new certificate signatures because Rogier and Chauvaud (SAC '95) demonstrated an attack that can nearly find collisions; md2WithRSAEncryption MAY still be used to verify existing signatures since finding collisions does not enable forging messages with a previously computed hash.
section: "5"
topics:
