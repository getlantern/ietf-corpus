document: rfc-2279
kind: protocol-element
summary: 'Encoding from UCS-4 to UTF-8 proceeds in three steps: (1) determine octet count from the character value range; (2) set the high-order prefix bits per the encoding table; (3) fill the x-bits from the character value starting at the least significant bits into the last octet and working left. There is exactly one valid encoding for each UCS-4 value; the rows of the table are mutually exclusive.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
