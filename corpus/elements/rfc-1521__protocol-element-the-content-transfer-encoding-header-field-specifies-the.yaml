document: rfc-1521
kind: protocol-element
summary: 'The Content-Transfer-Encoding header field specifies the encoding applied to the body for transport. Defined mechanisms are: 7bit, quoted-printable, base64, 8bit, binary, and x-token (non-standard). The default is 7bit when the field is absent. New encoding values are explicitly and strongly discouraged.'
