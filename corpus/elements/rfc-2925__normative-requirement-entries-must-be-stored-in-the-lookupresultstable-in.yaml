document: rfc-2925
kind: normative-requirement
summary: Entries MUST be stored in the lookupResultsTable in the order they are retrieved, with lookupResultsIndex values starting at 1 and increasing. The official host name returned by gethostbyaddr() MUST be assigned a lookupResultsIndex of 1.
section: 3.3.3
rfc2119_level: MUST
topics:
