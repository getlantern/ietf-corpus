document: rfc-9895
kind: normative-requirement
summary: Any implementation that indicates use of the IEEE 802.1Q Aware Credit Window Extension MUST support all message types, Data Items, the Ethernet Traffic Classification Sub-Data Item, and all related processing defined in RFC 9892 and RFC 9893.
