document: rfc-5630
kind: design-rationale
summary: SIPS URIs are not suitable for 'best-effort TLS'; they imply TLS-only on every hop such that if TLS cannot be established the request fails rather than being delivered insecurely. Using a plain SIP URI over TLS provides best-effort behavior instead.
section: 3.1.3
topics:
    - sip
    - tls
    - security
