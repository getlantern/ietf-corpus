document: rfc-8299
kind: protocol-element
summary: Multicast service is configured globally per VPN via the `multicast` container, which specifies customer tree flavors (bidirectional, shared, source-based), RP-to-group mappings (provider-managed or customer-managed), RP redundancy, optimal delivery, and RP discovery mechanisms (`auto-rp`, `static-rp`, `bsr-rp`; default is `static-rp` for ASM). A single RP discovery mechanism is permitted per VPN.
section: 6.2.3
topics:
    - yang
    - vpn
    - multicast
