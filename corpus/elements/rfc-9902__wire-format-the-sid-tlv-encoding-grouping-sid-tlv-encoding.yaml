document: rfc-9902
kind: wire-format
summary: 'The SID TLV encoding (grouping sid-tlv-encoding) represents either a 20-bit MPLS label (label-value, uint32 range 0..1048575) or a 32-bit SID index (index-value, uint32). Interpretation depends on V-Flag and L-Flag: V=0,L=0 means 4-octet index; V=1,L=1 means 3-octet local label using the 20 rightmost bits.'
section: "3"
