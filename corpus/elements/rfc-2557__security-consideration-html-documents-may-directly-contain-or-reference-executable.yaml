document: rfc-2557
kind: security-consideration
summary: HTML documents may directly contain or reference executable content (JavaScript, Java applets). A receiving UA MUST apply careful restrictions before executing such content received in a mail message, as it is exceedingly dangerous to execute it without constraints.
section: "11.1"
topics:
    - security
    - email
