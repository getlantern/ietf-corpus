document: rfc-6010
kind: wire-format
summary: CMSContentConstraints is a SEQUENCE SIZE (1..MAX) OF ContentTypeConstraint. Each ContentTypeConstraint contains a contentType OID, an optional canSource enumeration (canSource(0)/cannotSource(1), DEFAULT canSource), and an optional AttrConstraintList. AttrConstraint contains attrType (AttributeType OID) and attrValues (SET SIZE (1..MAX) OF AttributeValue).
