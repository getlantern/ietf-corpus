document: rfc-5304
kind: normative-requirement
summary: ISes implementing HMAC-MD5 authentication and initiating LSP purges MUST remove the body of the LSP and add the authentication TLV. ISes MUST NOT accept unauthenticated purges, and MUST NOT accept purges that contain TLVs other than the authentication TLV.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
