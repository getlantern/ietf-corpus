document: rfc-3023
kind: interoperability-note
summary: The UTF-16 family of charsets is not allowed for the top-level MIME type 'text' except over HTTP, which uses a MIME-like mechanism exempt from those restrictions. Entities encoded in UTF-16, UCS-4, or UTF-32 cannot be labeled as text/xml outside of HTTP.
section: "3"
topics:
    - http
