document: rfc-3591
kind: design-rationale
summary: The MIB intentionally omits laser temperature monitoring and mid-stage power monitoring because no industry consensus was reached regarding their benefit or which lasers to monitor. Implementations wishing to capture these may use a proprietary MIB or the ENTITY-SENSOR-MIB (RFC 3433).
section: 2.6.2
topics:
