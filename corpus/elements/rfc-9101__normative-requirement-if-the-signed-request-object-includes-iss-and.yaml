document: rfc-9101
kind: normative-requirement
summary: If the signed Request Object includes 'iss' and 'aud' claims, SHOULD be present with the 'aud' value set to the authorization server's 'issuer' as defined in RFC 8414. The 'request' and 'request_uri' parameters MUST NOT appear inside a Request Object.
section: "4"
rfc2119_level: SHOULD
topics:
    - oauth
    - jose
