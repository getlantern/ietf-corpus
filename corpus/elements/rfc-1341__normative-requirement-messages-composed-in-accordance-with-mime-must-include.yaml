document: rfc-1341
kind: normative-requirement
summary: Messages composed in accordance with MIME MUST include a MIME-Version header field with the verbatim value '1.0'. This field is required at the top level of a message but not for individual body parts of a multipart entity; it is required for embedded message headers only if the embedded message is itself claimed to be MIME-compliant.
section: "3"
rfc2119_level: MUST
topics:
    - email
