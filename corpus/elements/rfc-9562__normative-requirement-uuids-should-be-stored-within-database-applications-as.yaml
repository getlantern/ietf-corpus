document: rfc-9562
kind: normative-requirement
summary: UUIDs SHOULD be stored within database applications as the underlying 128-bit binary value rather than as text. The text form requires 288 bits to represent a 128-bit UUID value.
section: "6.13"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
