document: rfc-2847
kind: normative-requirement
summary: SPKM-3 implementations MUST set the target-certif-data-required bit to 1 in the REQ-TOKEN Options field when dhKeyAgreement is the only K-ALG in the key-estb-set, which normally occurs when the implementation cannot resolve the target name to a certificate.
section: 2.4.1.2.1
rfc2119_level: MUST
topics:
