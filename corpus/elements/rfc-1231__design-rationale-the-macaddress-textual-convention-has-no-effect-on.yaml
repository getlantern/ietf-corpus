document: rfc-1231
kind: design-rationale
summary: The MacAddress textual convention has no effect on the syntax or encoding of managed objects; objects defined using it are encoded by the rules of their primitive type (OCTET STRING). No changes to the SMI or SNMP are required; the convention exists purely for human readers.
section: "4.2"
topics:
