document: rfc-1657
kind: wire-format
summary: 'bgp4PathAttrASPathSegment is an OCTET STRING (2..255 octets) encoding AS path segments as triples: a 1-octet type (1=AS_SET, 2=AS_SEQUENCE), a 1-octet length (number of ASes), and value octets where each AS number is encoded as two octets (first-byte = ASNumber/256, second-byte = ASNumber & 255).'
