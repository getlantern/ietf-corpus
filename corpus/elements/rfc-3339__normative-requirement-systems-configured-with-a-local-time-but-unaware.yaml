document: rfc-3339
kind: normative-requirement
summary: Systems configured with a local time but unaware of the corresponding UTC offset that depend on time synchronization with other Internet systems MUST use a mechanism that ensures correct synchronization with UTC (e.g., NTP).
section: "4.4"
rfc2119_level: MUST
topics:
    - ntp
