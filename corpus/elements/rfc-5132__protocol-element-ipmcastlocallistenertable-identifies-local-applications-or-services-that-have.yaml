document: rfc-5132
kind: protocol-element
summary: ipMcastLocalListenerTable identifies local applications or services that have joined multicast groups as listeners, using ipMcastLocalListenerRunIndex to reference the sysApplRunIndex. A value of zero means one or more unidentified applications have joined.
