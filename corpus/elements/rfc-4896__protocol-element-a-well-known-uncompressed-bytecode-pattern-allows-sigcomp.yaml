document: rfc-4896
kind: protocol-element
summary: A well-known uncompressed bytecode pattern allows SigComp messages to be sent effectively uncompressed. The 13-byte bytecode (0xf8, 0x00, 0xa1, 0x1c, 0x01, 0x86, 0x09, 0x22, 0x86, 0x01, 0x16, 0xf9, 0x23) loops reading one byte at a time with INPUT-BYTES and outputting it with OUTPUT until exhausted, then calls END-MESSAGE.
section: "11"
