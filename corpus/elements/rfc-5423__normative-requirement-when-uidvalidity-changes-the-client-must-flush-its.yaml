document: rfc-5423
kind: normative-requirement
summary: When UIDVALIDITY changes, the client MUST flush its cache. UIDVALIDITY is critical to correct caching behavior and MUST be included with event notifications related to message addition or removal.
section: "2"
rfc2119_level: MUST
