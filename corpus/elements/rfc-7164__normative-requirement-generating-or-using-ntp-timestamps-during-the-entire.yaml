document: rfc-7164
kind: normative-requirement
summary: Generating or using NTP timestamps during the entire last second of a day on which a positive leap second has been scheduled SHOULD be avoided. The period to be avoided has a real-time duration of two seconds.
section: "5"
rfc2119_level: SHOULD
topics:
    - rtp
    - ntp
    - realtime
