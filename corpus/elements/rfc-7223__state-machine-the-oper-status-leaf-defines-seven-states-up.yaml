document: rfc-7223
kind: state-machine
summary: 'The ''oper-status'' leaf defines seven states: ''up'' (ready to pass packets), ''down'' (not passing packets), ''testing'' (in test mode), ''unknown'' (status cannot be determined), ''dormant'' (waiting for external event), ''not-present'' (hardware missing), and ''lower-layer-down'' (down due to lower-layer interface state). These mirror ifOperStatus from IF-MIB.'
section: "5"
