document: rfc-6170
kind: design-rationale
summary: Certificate images were introduced because applications lack out-of-band knowledge to interpret semantics of identity attributes (serialNumber, organizationName, country, etc.), making it difficult to label and organize certificate information meaningfully in a UI. A complete visual representation authored by the issuer solves this display challenge.
