document: rfc-7781
kind: normative-requirement
summary: Member RBridges SHOULD share learned {Data Label, MAC address, ingress nickname} correspondences with other members of the same LAALP via ESADI-LSPs using MAC-RI TLVs, to avoid unnecessary flooding when returning traffic arrives at a different member than the one that originally learned the address.
section: "7"
rfc2119_level: SHOULD
topics:
    - routing
