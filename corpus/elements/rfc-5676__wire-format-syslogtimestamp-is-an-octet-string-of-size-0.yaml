document: rfc-5676
kind: wire-format
summary: SyslogTimeStamp is an OCTET STRING of SIZE (0 | 10 | 13) encoding year (2 octets, network byte order), month, day, hour, minutes, seconds, microseconds (3 octets, network byte order), UTC direction, UTC hours, and UTC minutes. A zero-length string indicates a missing timestamp.
