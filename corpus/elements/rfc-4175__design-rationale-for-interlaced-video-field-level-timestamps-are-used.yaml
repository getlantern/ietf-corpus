document: rfc-4175
kind: design-rationale
summary: For interlaced video, field-level timestamps are used rather than a frame timestamp plus a field indicator bit. This is specifically required to support reverse 3-2 pulldown, where fields within a frame have different sampling instants.
section: "4.1"
