document: rfc-1213
kind: wire-format
summary: 'sysServices is an INTEGER (0..127) encoding OSI service layers as a bitfield sum: 2^(L-1) for each layer L served, where 1=physical, 2=datalink, 3=internet, 4=end-to-end, 7=applications. A host offering IP and application services would have value 72.'
section: "6.3"
