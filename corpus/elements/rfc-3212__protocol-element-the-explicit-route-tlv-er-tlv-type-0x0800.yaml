document: rfc-3212
kind: protocol-element
summary: The Explicit Route TLV (ER-TLV, type 0x0800) specifies the path to be taken by the LSP being established. It is composed of one or more ER-Hop TLVs, each identifying a node or abstract node (group of nodes) along the constraint-based route.
section: "4.1"
topics:
