document: rfc-3472
kind: normative-requirement
summary: When a waveband is switched to another waveband with wavelength mirroring about a center frequency, the Start and End labels in the Waveband Label TLV MUST be swapped before forwarding with the new Waveband Id. This operation MUST be performed in both directions when a bidirectional waveband tunnel is being established.
section: 2.3.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
