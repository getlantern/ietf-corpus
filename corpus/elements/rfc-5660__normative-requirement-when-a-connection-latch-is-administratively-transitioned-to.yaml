document: rfc-5660
kind: normative-requirement
summary: When a connection latch is administratively transitioned to CLOSED, connection-oriented ULPs MUST act as though the connection was reset by the peer; non-connection-oriented ULPs MUST drop inbound and MUST NOT send further packets.
section: "2.3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
