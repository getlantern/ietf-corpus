document: rfc-7428
kind: wire-format
summary: 'The 6LoWPAN Dispatch Header consists of: 6LoWPAN CmdCls (1 octet, MUST be 0x4F), Dispatch (1 octet identifying the following header type), and a Type-specific header. Frames with CmdCls other than 0x4F MUST be ignored.'
section: "3.1"
