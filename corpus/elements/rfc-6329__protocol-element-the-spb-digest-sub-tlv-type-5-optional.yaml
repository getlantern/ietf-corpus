document: rfc-6329
kind: protocol-element
summary: The SPB-Digest sub-TLV (type 5, optional, carried in MT-Port-Cap TLV in IIH) carries an Agreement Digest computed over all SPB adjacencies in all MT instances. V bit (digest valid), A bits (2-bit Agreement Number), and D bits (2-bit Discarded Agreement Number) govern loop prevention during topology convergence.
section: "13.2"
topics:
