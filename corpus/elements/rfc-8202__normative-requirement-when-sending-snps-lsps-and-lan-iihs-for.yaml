document: rfc-8202
kind: normative-requirement
summary: When sending SNPs, LSPs, and LAN IIHs for any non-zero IID on a broadcast circuit, an MI-RTR MUST use one of two dedicated Layer 2 multicast addresses (AllL1MI-ISs or AllL2MI-ISs) as the destination address.
section: 3.6.1
rfc2119_level: MUST
topics:
