document: rfc-2845
kind: security-consideration
summary: Strong random shared secrets are essential; the secret MUST be at least as long as the keyed message digest — 16 bytes for HMAC-MD5, 20 bytes for HMAC-SHA1 (per RFC1750). Secrets should be changed periodically.
section: "5.3"
topics:
    - dns
    - security
    - crypto
