document: rfc-5056
kind: normative-requirement
summary: The name of the type of channel binding MUST be used by the application and/or authentication protocol to avoid ambiguity about which of several possible channel types is being bound. If nested instances of the same type of channel are available, then the innermost channel MUST be used.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
