document: rfc-5459
kind: protocol-element
summary: 'The G.729.1 SID has an embedded structure: the core SID is identical to the legacy G.729 SID (G.729 Annex B), the first enhancement layer adds narrowband comfort noise parameters, and the second adds wideband information. The SID can be 2, 3, or 6 octets long.'
