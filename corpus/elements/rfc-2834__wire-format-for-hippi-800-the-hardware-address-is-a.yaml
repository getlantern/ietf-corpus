document: rfc-2834
kind: wire-format
summary: For HIPPI-800, the Hardware Address is a 10-byte unit containing a Mode Byte, two zero bytes, a 12-bit HIPPI logical switch address (XXX), and a 6-byte ULA. For HIPPI-6400, the hardware address is ONLY the 6-byte ULA; the length field (ar$rhl/ar$thl) of 10 versus 6 bytes distinguishes HIPPI-800 from HIPPI-6400.
