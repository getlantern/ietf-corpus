document: rfc-5888
kind: normative-requirement
summary: '''a=group'' lines MUST NOT contain identification-tags that correspond to ''m'' lines with the port set to zero. When identification-tags in the answer are a subset of those in the offer, the ''group'' value to be used in the session MUST be the one present in the answer.'
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
