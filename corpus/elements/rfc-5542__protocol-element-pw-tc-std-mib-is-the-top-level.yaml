summary: PW-TC-STD-MIB is the top-level MIB module defining textual conventions for pseudowire edge-to-edge (PWE3) management, assigned OBJECT IDENTIFIER { mib-2 188 }. It imports from SNMPv2-SMI and SNMPv2-TC and is intended to be imported by PW-specific MIB modules rather than defining management objects itself.
