document: rfc-8783
kind: normative-requirement
summary: When DOTS gateways are involved, the same 'cdid' (client domain identifier) handling rules from RFC 8782 MUST be followed. A DOTS gateway MUST strip the 'cdid' parameter from a PUT response before forwarding it to the DOTS client.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
