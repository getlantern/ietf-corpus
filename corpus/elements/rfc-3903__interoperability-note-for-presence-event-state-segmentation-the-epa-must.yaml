document: rfc-3903
kind: interoperability-note
summary: For presence event state segmentation, the EPA MUST keep tuple 'id' attributes consistent across publications within the same entity-tag context. A missing 'id' signals tuple removal; a new 'id' signals addition. The ESC interprets each tuple relative to the entity-tag of the arriving request.
section: "10.4"
topics:
