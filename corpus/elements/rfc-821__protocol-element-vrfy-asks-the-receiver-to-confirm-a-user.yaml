document: rfc-821
kind: protocol-element
summary: VRFY asks the receiver to confirm a user name and return the full name and fully-specified mailbox. EXPN asks the receiver to expand a mailing list and return all member mailboxes in a multiline reply. Both are optional and not required to work across relays.
section: "3.3"
topics:
