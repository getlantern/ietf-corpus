document: rfc-2157
kind: wire-format
summary: FTBP body parts encapsulated in MIME use the content-type 'application/x-ftbp.' followed by the dot-notation OID digits from FileTransferParameters.environment.application-reference.registered-identifier. This is an intentionally unregistered x- type; if IANA namespace registration becomes possible the x- prefix may be dropped.
