document: rfc-9244
kind: normative-requirement
summary: DOTS agents MUST NOT send pre-or-ongoing-mitigation telemetry notifications to the same peer more frequently than once every 'telemetry-notify-interval'. When block-wise transfer is used, all individual blocks of a single notification count as one notification for rate-limiting purposes.
section: "8"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
