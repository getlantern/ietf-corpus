document: rfc-8586
kind: protocol-element
summary: The CDN-Loop request header field identifies when an incoming HTTP request has already passed through a given CDN's servers, enabling loop detection. It carries one or more cdn-info entries, each identifying a CDN by a hostname or pseudonym with optional semicolon-separated parameters.
