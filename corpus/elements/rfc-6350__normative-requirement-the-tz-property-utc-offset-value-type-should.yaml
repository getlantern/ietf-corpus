document: rfc-6350
kind: normative-requirement
summary: The TZ property utc-offset value type SHOULD NOT be used because UTC offsets vary with daylight saving time shifts and regional re-basing; named timezone identifiers (e.g., from the Olson database) are preferred.
section: 6.5.1
rfc2119_level: SHOULD NOT
