document: rfc-9760
kind: normative-requirement
summary: Clocks operating in the Enterprise Profile MUST avoid any optional feature that requires Announce messages to be altered by Transparent Clocks, as this would prevent timeReceivers from discovering the timeTransmitter's protocol address.
section: "13"
rfc2119_level: MUST
