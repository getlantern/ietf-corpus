document: rfc-8047
kind: protocol-element
summary: LOCATOR_SET may be sent in R1, I2, or R2 packets (in addition to UPDATE packets defined in RFC 8046), enabling multihoming address advertisement during the HIP base exchange itself for fault-tolerance or load-balancing purposes.
