document: rfc-4551
kind: normative-requirement
summary: Whenever the state of a flag actually changes (added where not set, or removed where set), the mod-sequence for the message MUST be updated. Adding a flag already present or removing one already absent SHOULD NOT change the mod-sequence.
section: "1"
rfc2119_level: MUST
topics:
    - email
