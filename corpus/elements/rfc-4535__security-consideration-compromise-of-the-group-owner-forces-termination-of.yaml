document: rfc-4535
kind: security-consideration
summary: Compromise of the Group Owner forces termination of the entire group. Compromise of an S-GC/KS forces re-registration of all GMs under its control. GMs detect either compromise by finding the relevant party's certificate on a Certificate Revocation List (CRL) supplied by a service such as LDAP.
section: "3.1"
topics:
    - security
    - pkix
    - ldap
