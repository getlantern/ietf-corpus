document: rfc-4043
kind: protocol-element
summary: When both assigner and identifierValue are absent, the serialNumber attribute from the deepest relevant RDN is used as identifierValue and the identifier is local to the CA. Two such identifiers match if the issuer DNs match and the serialNumber attributes match using caseIgnoreMatch.
