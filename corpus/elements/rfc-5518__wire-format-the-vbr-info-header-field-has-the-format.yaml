document: rfc-5518
kind: wire-format
summary: 'The VBR-Info header field has the format: `VBR-Info: md=<domain>; mc=<type-string>; mv=<certifier-list>;`. The certifier-list is one or more domain names separated by colons. No white space is permitted within any of the three parameter values.'
