document: rfc-6827
kind: normative-requirement
summary: A single OSPF router (acting as the Protocol Controller) MUST be able to advertise TE information on behalf of multiple transport-layer nodes, since the control-plane routing adjacency topology and the transport topology are not assumed to be congruent.
