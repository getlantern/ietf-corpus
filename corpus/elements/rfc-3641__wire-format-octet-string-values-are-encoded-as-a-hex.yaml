document: rfc-3641
kind: wire-format
summary: OCTET STRING values are encoded as a hex string (hstring) where octets appear in order, each as two hexadecimal digits with the high nibble first. An odd number of hex digits is permitted; missing low nibble is assumed zero.
section: "3.11"
