document: rfc-7964
kind: design-rationale
summary: The MULTI_EXIT_DISC (MED) attribute has played a pivotal role in virtually all known persistent IBGP route oscillations caused by Route Reflection or Confederation. The document uses the term 'MED-induced route oscillation' to refer specifically to these persistent oscillations where MED is a contributing factor.
