document: rfc-9114
kind: protocol-element
summary: Server push assigns each pushed response a unique push ID. The push ID space starts at zero and is bounded by MAX_PUSH_ID. PUSH_PROMISE frames carry the promised request headers; a push stream with the matching push ID fulfills the promise. CANCEL_PUSH allows either side to cancel a push.
section: "4.6"
