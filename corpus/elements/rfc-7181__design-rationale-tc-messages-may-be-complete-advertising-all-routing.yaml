document: rfc-7181
kind: design-rationale
summary: TC messages may be 'complete' (advertising all routing MPR selectors) or 'incomplete' (reporting only additions), allowing a router to report incremental changes rapidly without repeating unchanged information, while periodic complete messages ensure eventual consistency.
