document: rfc-2630
kind: wire-format
summary: SigningTime uses UTCTime (YYMMDDHHMMSSZ) for dates 1950–2049 and GeneralizedTime (YYYYMMDDHHMMSSZ) for dates outside that range. Both forms must be in GMT (Zulu), include seconds, and GeneralizedTime must not include fractional seconds.
