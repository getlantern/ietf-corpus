document: rfc-7273
kind: interoperability-note
summary: Clock source parameters (e.g., PTP grandmaster identity) may change during a session due to events such as a PTP Best Master Clock Algorithm election. SIP supports re-signalling updated SDP, but other protocols may need additional notification mechanisms.
section: "4.8"
topics:
