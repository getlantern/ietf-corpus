document: rfc-5643
kind: design-rationale
summary: The OSPFv3 MIB defines three separate Link State Database tables — one each for AS-scope, Area-scope, and Link-scope LSAs — reflecting OSPFv3's generalized flooding scope, which is explicitly encoded in the LSA's LS type field rather than implied by context.
