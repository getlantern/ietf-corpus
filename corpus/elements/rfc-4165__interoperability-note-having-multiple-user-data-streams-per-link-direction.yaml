document: rfc-4165
kind: interoperability-note
summary: Having multiple User Data streams per link direction is not currently supported because MTP3 provides only one XCO/XCA message during changeover, making it impossible to unambiguously perform buffer updating across streams without risk of message loss or duplication. Support would require a multi-BSNT XCO/XCA extension outside this document's scope.
section: 4.2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
