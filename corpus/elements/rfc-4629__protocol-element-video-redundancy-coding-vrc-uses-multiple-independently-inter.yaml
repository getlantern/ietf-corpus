document: rfc-4629
kind: protocol-element
summary: Video Redundancy Coding (VRC) uses multiple independently inter-frame predicted threads; damage to one frame distorts only its own thread. Threads periodically converge to sync frames (INTRA or redundantly represented non-INTRA pictures) from which independent threads restart.
section: "5.2"
topics:
    - rtp
    - realtime
