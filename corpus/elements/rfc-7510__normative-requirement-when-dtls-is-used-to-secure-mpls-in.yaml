document: rfc-7510
kind: normative-requirement
summary: When DTLS is used to secure MPLS-in-UDP, the UDP Destination Port MUST be set to the IANA-assigned value 6636 (MPLS-UDP-DTLS) and MUST NOT be used for other traffic; both source and destination IP addresses MUST be unicast — multicast is not supported with DTLS.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
