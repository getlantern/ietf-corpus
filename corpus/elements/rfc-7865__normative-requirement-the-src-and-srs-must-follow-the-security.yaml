document: rfc-7865
kind: normative-requirement
summary: The SRC and SRS MUST follow the security procedures in RFC 7866 for mutual authentication and to protect recording metadata content. For data minimization, the SRS MUST NOT record additional metadata that is not explicitly required by local policy.
section: "10"
rfc2119_level: MUST NOT
