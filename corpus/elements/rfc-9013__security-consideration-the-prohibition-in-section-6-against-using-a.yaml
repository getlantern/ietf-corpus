document: rfc-9013
kind: security-consideration
summary: The prohibition in Section 6 against using a tunnel toward a destination not reachable via a route in the same OSPF domain prevents a compromised OSPF router from redirecting traffic to arbitrary external destinations (e.g., for inspection or interception).
