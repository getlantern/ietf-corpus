document: rfc-8149
kind: normative-requirement
summary: If a midpoint LSR does not receive all fragments within a configurable time interval, it SHOULD trigger re-evaluation of all S2L sub-LSPs of the P2MP-TE LSP transiting on the node, but MUST receive at least one fragment to trigger this behavior.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
