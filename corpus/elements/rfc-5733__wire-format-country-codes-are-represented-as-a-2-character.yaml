document: rfc-5733
kind: wire-format
summary: Country codes are represented as a 2-character string constrained to ISO 3166-1 values (ccType with exactly length 2). Postal codes are optPostalLineType with a maximum of 16 characters. Postal name/street/city/province lines are postalLineType with 1–255 characters.
