document: rfc-8253
kind: normative-requirement
summary: Any connection established with a peer that cannot be properly identified SHALL be terminated before any PCEP exchange takes place. PCEPS implementations MUST provide a mechanism for establishing a default access level for properly identified peers.
section: "3.5"
rfc2119_level: MUST
topics:
    - tls
    - security
    - routing
