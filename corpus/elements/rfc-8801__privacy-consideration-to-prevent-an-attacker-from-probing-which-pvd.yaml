document: rfc-8801
kind: privacy-consideration
summary: To prevent an attacker from probing which PvD IDs are allowed by a host, hosts SHOULD either fetch Additional Information for all eligible PvD IDs on a given local network or fetch it for none of them, rather than selectively fetching based on internal allow-lists.
section: "7"
topics:
