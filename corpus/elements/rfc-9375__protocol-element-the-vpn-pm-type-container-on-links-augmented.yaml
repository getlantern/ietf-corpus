document: rfc-9375
kind: protocol-element
summary: 'The ''vpn-pm-type'' container on links (augmented when ''service'' container is present) supports two VPN measurement methods: ''inter-vpn-access-interface'' PM (logical PE-PE connections between VPN access interfaces) and ''vpn-tunnel'' PM (e.g., GRE or Geneve tunnels). Only one method is typically used since inter-VPN-access includes PE-PE monitoring.'
section: "4.4"
topics:
    - yang
    - vpn
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
