document: rfc-9740
kind: protocol-element
summary: ipv6ExtensionHeaderChainLengthList (IE 519, type subTemplateList) is used for Flows with varying extension header chains and reports each chain with both its header bitmap (ipv6ExtensionHeadersFull) and its byte length (ipv6ExtensionHeadersChainLength). Each distinct chain is exported in a separate IE instance.
