document: rfc-7097
kind: normative-requirement
summary: When both early and late discarded packets must be reported, two Discard RLE report blocks MUST be included. Individual packets MUST only be reported as either early or late and MUST NOT appear marked in both blocks; conflicting packets are ignored.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
