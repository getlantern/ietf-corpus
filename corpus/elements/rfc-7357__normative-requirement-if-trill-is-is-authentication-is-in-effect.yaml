document: rfc-7357
kind: normative-requirement
summary: If TRILL IS-IS authentication is in effect for LSP PDUs at a TRILL switch, ESADI PDUs from that switch MUST use the same algorithm in their Authentication TLVs, with keying material derived as HMAC-SHA256('TRILL ESADI', IS-IS-LSP-shared-key), unless explicitly configured otherwise.
section: "6.3"
rfc2119_level: MUST
topics:
    - routing
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
