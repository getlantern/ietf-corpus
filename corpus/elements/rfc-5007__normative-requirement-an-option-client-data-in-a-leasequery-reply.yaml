document: rfc-5007
kind: normative-requirement
summary: An OPTION_CLIENT_DATA in a LEASEQUERY-REPLY MUST minimally contain OPTION_CLIENTID, OPTION_IAADDR and/or OPTION_IAPREFIX, and OPTION_CLT_TIME. The server MUST return all statefully assigned addresses and delegated prefixes with non-zero valid lifetime on the link.
section: 4.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
