document: rfc-9070
kind: design-rationale
summary: The model is split into 'base' (ietf-mpls-ldp) and 'extended' (ietf-mpls-ldp-extended) categories. Base covers fundamental RFC 5036 features with no 'if-feature' allowed; extended covers non-base features such as LDP IPv6, label policies, and IGP sync. This separation allows small deployments to use only the base module.
section: "1.1"
topics:
