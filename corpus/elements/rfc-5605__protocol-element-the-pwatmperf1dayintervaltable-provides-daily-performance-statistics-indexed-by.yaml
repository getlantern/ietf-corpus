document: rfc-5605
kind: protocol-element
summary: 'The pwAtmPerf1DayIntervalTable provides daily performance statistics indexed by pwAtmPerf1DayIntervalNumber (1..365), covering up to one month of one-day intervals. Counters use Counter32 (versus PerfIntervalCount in the 15-minute table) and include the same eight metrics: missing packets, reordered packets, misordered packets, timeout packets, cells transmitted, cells dropped, cells received, and unknown cells.'
section: "9"
