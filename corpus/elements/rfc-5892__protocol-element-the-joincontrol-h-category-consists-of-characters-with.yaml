summary: The JoinControl (H) category consists of characters with Join_Control(cp) = True — specifically U+200C (ZERO WIDTH NON-JOINER) and U+200D (ZERO WIDTH JOINER). These are assigned CONTEXTJ and require a contextual rule to be used in any IDN label.
