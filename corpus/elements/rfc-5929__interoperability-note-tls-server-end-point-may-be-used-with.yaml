document: rfc-5929
kind: interoperability-note
summary: '''tls-server-end-point'' may be used with existing TLS server-side proxies (concentrators) without modification, whereas ''tls-unique'' may require firmware or software updates to proxies. Therefore ''tls-server-end-point'' may interoperate in proxy deployments where ''tls-unique'' does not.'
section: "6"
topics:
    - tls
    - security
