document: rfc-3195
kind: normative-requirement
summary: Upon receiving a 'path' element, the peer MUST verify that 'fromIP'/'fromFQDN' and 'toIP'/'toFQDN' match the underlying transport connection, that 'linkprops' flags match actual session attributes, and that 'pathID' is unique among all 'path' elements received on this channel.
