document: rfc-3543
kind: normative-requirement
summary: Upon receiving a valid revocation message from the home agent, the foreign agent MUST verify the authenticator, 'A' bit, and Identifier; MUST identify and revoke the binding; and MUST respond with a revocation acknowledgment. The timestamp of the accepted registration MUST precede the revocation message.
section: 4.2.2.2
rfc2119_level: MUST
topics:
    - mobility
