document: rfc-9375
kind: interoperability-note
summary: The module is designed as an augmentation to RFC 8345 ('ietf-network' and 'ietf-network-topology') and imports types from RFC 6991, RFC 8345, RFC 8532, and RFC 9181. Controllers must first establish topology visibility using RFC 8345 and related VPN models (L3NM RFC 9182, L2NM RFC 9291) before using the PM module.
