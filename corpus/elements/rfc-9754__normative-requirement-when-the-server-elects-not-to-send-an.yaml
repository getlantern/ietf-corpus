document: rfc-9754
kind: normative-requirement
summary: When the server elects not to send an open stateid in response to OPEN4_SHARE_ACCESS_WANT_OPEN_XOR_DELEGATION, it MUST indicate this with the OPEN4_RESULT_NO_OPEN_STATEID result flag, and OPEN4resok.stateid MUST be set to the special all-zero stateid.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
