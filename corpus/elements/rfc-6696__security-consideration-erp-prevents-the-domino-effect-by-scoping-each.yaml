document: rfc-6696
kind: security-consideration
summary: 'ERP prevents the domino effect by scoping each rMSK to a single authenticator: compromise of one authenticator does not compromise sessions or keys held by any other authenticator. However, if a DSRK is delivered to a local ER server via a compromised proxy, all domain-specific keys for that domain are at risk.'
section: "8"
topics:
    - security
