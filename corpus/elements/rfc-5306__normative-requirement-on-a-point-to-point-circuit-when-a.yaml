document: rfc-5306
kind: normative-requirement
summary: On a Point-to-Point circuit, when a restarting router's three-way state would result in an UP adjacency to a non-restart-capable neighbor without the neighbor reinitializing, the restarting router MUST force adjacency reinitialization by setting local Adjacency Three-Way State to DOWN and sending a normal IIH, to guarantee SRMflags are set on the neighbor's database.
section: 3.3.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
