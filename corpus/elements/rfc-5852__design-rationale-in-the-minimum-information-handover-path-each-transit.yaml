document: rfc-5852
kind: design-rationale
summary: In the minimum-information Handover path, each transit node looks up the cross-connection table in the DP to determine the next hop's outgoing interface and labels, replacing LABEL_SET and UPSTREAM_LABEL Object content hop by hop. This enables Handover even when the MP cannot supply full LSP details.
