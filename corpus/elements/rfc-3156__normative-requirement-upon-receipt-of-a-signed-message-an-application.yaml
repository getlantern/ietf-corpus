document: rfc-3156
kind: normative-requirement
summary: 'Upon receipt of a signed message, an application MUST: (1) convert line endings to the canonical <CR><LF> sequence before verifying the signature; (2) pass both the signed data, its content headers, and the OpenPGP signature to the signature verification service.'
