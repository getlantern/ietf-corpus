document: rfc-1493
kind: state-machine
summary: 'STP port state (dot1dStpPortState) defines six states: disabled(1), blocking(2), listening(3), learning(4), forwarding(5), broken(6). A port progresses from blocking through listening and learning toward forwarding; the bridge places a malfunctioning port into broken(6). Disabled ports report disabled(1).'
section: "5.3"
