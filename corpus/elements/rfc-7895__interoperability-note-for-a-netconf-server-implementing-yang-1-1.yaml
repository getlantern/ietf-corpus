document: rfc-7895
kind: interoperability-note
summary: For a NETCONF server implementing YANG 1.1, a change in 'module-set-id' results in a new value for the ':yang-library' capability. If the server also implements NETCONF notifications (RFC 5277) and 'netconf-capability-change' (RFC 6470), a 'netconf-capability-change' notification is generated alongside 'yang-library-change'.
section: 2.1.1
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
