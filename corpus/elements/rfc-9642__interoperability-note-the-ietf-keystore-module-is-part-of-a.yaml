document: rfc-9642
kind: interoperability-note
summary: The 'ietf-keystore' module is part of a layered suite of YANG modules for NETCONF/RESTCONF client-server configuration. It depends on 'ietf-crypto-types' (RFC 9640) and is itself a dependency of 'tls-client-server' (RFC 9645), 'ssh-client-server' (RFC 9644), and the NETCONF/RESTCONF client-server modules.
