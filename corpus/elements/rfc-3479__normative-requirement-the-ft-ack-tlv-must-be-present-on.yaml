document: rfc-3479
kind: normative-requirement
summary: The FT ACK TLV MUST be present on the LDP Initialization message if and only if the FT Reconnect Flag is set in the accompanying FT Session TLV. It reports the last FT message successfully secured before the previous session failure.
section: "7.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
