document: rfc-8781
kind: design-rationale
summary: NAT64 requires routing to be configured, which in turn requires receiving an IPv6 RA; distributing the NAT64 prefix via RAs ensures 'fate sharing' so that NAT64 reachability information is always consistent with the rest of the host's network configuration.
