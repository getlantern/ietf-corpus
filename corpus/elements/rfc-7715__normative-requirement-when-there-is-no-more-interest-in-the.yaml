document: rfc-7715
kind: normative-requirement
summary: When there is no more interest in the tLDP session between the MPT and PLR after reconvergence, the session MAY be taken down; it is RECOMMENDED to apply a delay before tearing down the session to avoid flapping.
section: 4.1.3
rfc2119_level: RECOMMENDED
