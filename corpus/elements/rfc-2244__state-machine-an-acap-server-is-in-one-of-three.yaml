document: rfc-2244
kind: state-machine
summary: 'An ACAP server is in one of three states: Non-Authenticated (entered on connection), Authenticated (entered after successful AUTHENTICATE), and Logout (entered via LOGOUT command, server shutdown, or connection close). Commands are only valid in certain states; issuing a command in an inappropriate state results in a BAD response.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
