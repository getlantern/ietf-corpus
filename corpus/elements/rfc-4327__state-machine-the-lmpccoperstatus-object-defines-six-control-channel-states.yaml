summary: 'The lmpCcOperStatus object defines six control channel states: up(1), down(2), configSnd(3) — Config sent awaiting reply, configRcv(4) — Config received, active(5), goingDown(6). Transitions follow LMP control channel establishment and teardown per RFC 4204.'
