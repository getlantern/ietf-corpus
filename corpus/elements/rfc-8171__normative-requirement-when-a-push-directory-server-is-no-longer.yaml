document: rfc-8171
kind: normative-requirement
summary: When a Push Directory server is no longer data reachable (as indicated by the IS-IS link-state database), other TRILL switches MUST ignore any Push Directory data from that server, because it is no longer being updated and may be stale.
section: "2.5"
rfc2119_level: MUST
topics:
    - routing
    - security
