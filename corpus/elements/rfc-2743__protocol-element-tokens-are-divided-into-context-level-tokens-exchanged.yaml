document: rfc-2743
kind: protocol-element
summary: Tokens are divided into context-level tokens (exchanged to establish and manage a security context) and per-message tokens (protecting data messages on established contexts). The first context-level token from GSS_Init_sec_context must begin with a globally-interpretable mechanism OID; all remaining token content is mechanism-specific and opaque to callers.
section: 1.1.2
topics:
    - security
    - crypto
