document: rfc-8570
kind: design-rationale
summary: The A bit was intentionally omitted from the Delay Variation sub-TLV (type 35) to help mitigate oscillations. Sub-TLVs lacking the A bit cannot be used for failover purposes, which is a deliberate trade-off to reduce routing instability.
