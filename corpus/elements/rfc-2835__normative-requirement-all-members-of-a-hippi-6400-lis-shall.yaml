document: rfc-2835
kind: normative-requirement
summary: All members of a HIPPI-6400 LIS SHALL have the same IP network/subnet address and address mask. The HARP method and classical LIS routing model MUST be available to any IP member client in the LIS.
section: "3.1"
rfc2119_level: MUST
