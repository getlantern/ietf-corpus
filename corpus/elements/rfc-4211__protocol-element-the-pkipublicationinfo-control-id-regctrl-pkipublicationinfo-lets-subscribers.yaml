document: rfc-4211
kind: protocol-element
summary: The pkiPublicationInfo control (id-regCtrl-pkiPublicationInfo) lets subscribers request that the CA publish or not publish their certificate, and optionally specify publication locations (x500, web, ldap) via SinglePubInfo structures. This control is advisory and CAs/RAs may ignore it.
