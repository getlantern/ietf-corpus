document: rfc-2661
kind: normative-requirement
summary: The Ver field in the L2TP header MUST be 2. Packets received with an unknown Ver field MUST be discarded. The value 1 is reserved to allow detection of intermixed L2F packets.
section: "3.1"
rfc2119_level: MUST
topics:
