document: rfc-7072
kind: design-rationale
summary: Using URI templates (RFC 6570) rather than a fixed query URL format allows reputation service providers to extend the query parameter set and gives servers flexibility in their URI structure, while keeping the base parameters (application, service, subject, assertion) standardized.
