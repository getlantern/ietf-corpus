document: rfc-4880
kind: protocol-element
summary: 'Signature types (0x00–0x50) encode the meaning of a Signature packet. Key types include: 0x10–0x13 (User ID certifications of increasing rigor), 0x18 (Subkey Binding), 0x19 (Primary Key Binding), 0x20 (Key Revocation), 0x28 (Subkey Revocation), 0x30 (Certification Revocation), 0x50 (Third-Party Confirmation).'
section: 5.2.1
