document: rfc-9641
kind: protocol-element
summary: Each public key in a public-key-bag is defined by a 'name' (string), 'public-key-format' (identityref), and 'public-key' (binary), using the 'public-key-grouping' from RFC 9640. The format identity allows for SSH public key format and SubjectPublicKeyInfo format among others.
