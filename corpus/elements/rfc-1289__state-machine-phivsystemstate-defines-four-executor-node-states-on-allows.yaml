document: rfc-1289
kind: state-machine
summary: 'phivSystemState defines four executor node states: ON (allows logical links), OFF (no new links, terminates existing links, stops routing), SHUT (no new links, preserves existing until gone, then transitions to OFF), and RESTRICTED (no new incoming logical links from other nodes). The same state model applies to phivEndRemoteState for remote nodes.'
