document: rfc-9930
kind: security-consideration
summary: TEAP provides mutual authentication and integrity protection via a TLS-protected tunnel. The Crypto-Binding TLV cryptographically binds inner authentication methods to the outer TLS tunnel, preventing on-path attacks that could otherwise substitute or replay inner method exchanges.
section: "8.1"
topics:
    - security
    - tls
    - crypto
