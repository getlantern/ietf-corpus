document: rfc-3972
kind: privacy-consideration
summary: 'CGAs can provide the same level of pseudonymity as RFC 3041 privacy extensions: hosts generate multiple CGAs using different random initial modifier values. When privacy protection is needed, the random number generator SHOULD be strong enough to produce unpredictable, unlinkable values.'
section: "7.3"
rfc2119_level: SHOULD
topics:
    - ip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
