document: rfc-7965
kind: protocol-element
summary: The T (Tunnel Representation) bit in the PSN Tunnel Binding TLV indicates whether the tunnel is identified by tunnel information only (T=1, LSP Number fields MUST be zero) or by both tunnel and LSP information (T=0, LSP Number fields carry actual LSP IDs).
section: "3.1"
