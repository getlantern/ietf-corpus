document: rfc-4442
kind: normative-requirement
summary: To prevent replay attacks, a freshness guarantee MUST be provided; the TESLA bootstrapping message exchange MUST be unique and fresh, and the session key MUST be bound to the protocol session including the exchanged parameters.
section: "5.4"
rfc2119_level: MUST
topics:
