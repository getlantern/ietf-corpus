document: rfc-3723
kind: normative-requirement
summary: Conformant implementations MUST support IKE Main Mode and SHOULD support Aggressive Mode. IKE Main Mode with pre-shared key SHOULD NOT be used when either peer uses a dynamically assigned IP address, as it forces use of a group pre-shared key vulnerable to man-in-the-middle attack.
section: 2.3.3
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
