document: rfc-8955
kind: wire-format
summary: The traffic-action Extended Community (0x8007) is 6 octets; only bits 47 (Terminal Action, T) and 46 (Sample, S) are defined. T causes the filtering engine to continue evaluating subsequent Flow Specifications; S enables traffic sampling and logging. All other bits MUST be set to 0 on encoding.
section: "7.3"
topics:
    - bgp
    - routing
