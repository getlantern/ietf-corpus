document: rfc-1573
kind: interoperability-note
summary: Connection-oriented sub-layers (e.g., Frame Relay, X.25) are strongly recommended not to have a separate ifTable row per virtual circuit, to avoid proliferation of rows with redundant information. An exception is when a virtual circuit itself acts as a sub-layer (e.g., PPP over an X.25 VC).
section: 3.2.4
topics:
    - snmp
