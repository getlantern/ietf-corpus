document: rfc-2942
kind: protocol-element
summary: The ACCEPT sub-option 'IAC SB AUTHENTICATION REPLY <authentication-type-pair> ACCEPT IAC SE' indicates successful authentication. If AUTH_HOW_MUTUAL is set in the authentication-type-pair, a RESPONSE command must be sent before ACCEPT.
