document: rfc-7843
kind: normative-requirement
summary: If an identifier does not align to an octet boundary (e.g., a 20-bit MPLS label), padding is done by appending 0 bits until the byte boundary is reached, after which the padding rules of RFC 6887 apply.
section: "4"
rfc2119_level: REQUIRED
