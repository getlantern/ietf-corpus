document: rfc-2543
kind: wire-format
summary: SIP URLs have the syntax sip:[userinfo@]hostport[;url-parameters][?headers]. URL parameters include transport (udp|tcp), ttl (0–255), maddr (server/multicast address), user (phone|ip), and method. The transport, maddr, ttl, and headers elements MUST NOT appear in From, To, or Request-URI and are ignored if present.
section: "2"
topics:
