document: rfc-2338
kind: normative-requirement
summary: The Master MUST respond to ARP requests for virtual router IP addresses with the virtual MAC address, and MUST NOT respond with its physical MAC address. This ensures clients always cache the same MAC regardless of which physical router is currently Master.
section: "8.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
