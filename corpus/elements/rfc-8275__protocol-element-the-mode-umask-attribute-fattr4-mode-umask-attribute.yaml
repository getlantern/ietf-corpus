document: rfc-8275
kind: protocol-element
summary: The mode_umask attribute (FATTR4_MODE_UMASK, attribute ID 81) is a new NFSv4.2 OPTIONAL write-only fattr4 attribute that carries both the unmodified create-time mode and the process umask. It is defined as data type mode_umask4.
