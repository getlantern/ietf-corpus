document: rfc-2453
kind: interoperability-note
summary: 'Implementations SHOULD provide a per-interface compatibility switch with four settings: RIP-1 (broadcast RIP-1 only), RIP-1 compatibility (broadcast RIP-2), RIP-2 (multicast RIP-2), and none. The recommended default is RIP-1 or RIP-2; RIP-1 compatibility SHOULD only be used when all consequences are understood by the administrator. A receive control switch for filtering accepted versions is also recommended.'
section: "5.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
