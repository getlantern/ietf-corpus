document: rfc-2461
kind: wire-format
summary: Neighbor Advertisement (Type 136) carries three 1-bit flags (R=Router, S=Solicited, O=Override), a 29-bit Reserved field (initialized to zero, ignored), and a 128-bit Target Address (MUST NOT be multicast). The S-bit serves as reachability confirmation for NUD; the O-bit controls whether the advertisement overrides an existing cached link-layer address.
section: "4.4"
topics:
