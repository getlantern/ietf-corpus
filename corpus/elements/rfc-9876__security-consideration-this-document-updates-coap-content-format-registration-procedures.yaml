document: rfc-9876
kind: security-consideration
summary: This document updates CoAP Content-Format registration procedures to reduce the chances of malicious manipulation of the registry. The introduction of Expert Review for most ranges and a detailed checklist prevents erroneous or deliberately invalid registrations. Otherwise, the security considerations of RFC 7252 remain unchanged.
section: "3"
topics:
    - security
    - registry
