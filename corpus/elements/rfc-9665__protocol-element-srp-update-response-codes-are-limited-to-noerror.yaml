document: rfc-9665
kind: protocol-element
summary: 'SRP Update response codes are limited to: NoError (success), ServFail (server error), Refused (malformed or unauthorized update), and YXDomain (name conflict with different key). The SRP requester MUST NOT attempt to validate any RRs included in non-NoError responses.'
section: 3.3.5
topics:
