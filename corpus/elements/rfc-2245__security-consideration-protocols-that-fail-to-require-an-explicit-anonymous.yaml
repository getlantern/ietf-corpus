document: rfc-2245
kind: security-consideration
summary: Protocols that fail to require an explicit anonymous login step are more susceptible to break-ins. Unix servers may start as root and switch user IDs only after explicit login; without explicit anonymous login, protective measures like chroot cannot be applied and the data access machinery is exposed.
section: "4"
topics:
    - security
