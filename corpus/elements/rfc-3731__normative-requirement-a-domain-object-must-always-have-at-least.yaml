document: rfc-3731
kind: normative-requirement
summary: A domain object MUST always have at least one associated status value. A client MUST NOT alter status values set by the server; a server MAY alter or override client-set status values subject to local policy.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
