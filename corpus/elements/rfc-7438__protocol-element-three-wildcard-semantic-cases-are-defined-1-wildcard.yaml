document: rfc-7438
kind: protocol-element
summary: 'Three wildcard semantic cases are defined: (1) wildcard source with a non-SSM ASM group address identifies a PIM-SM shared tree (*,G); (2) wildcard source with an SSM group address identifies the collection of PIM trees for that group; (3) non-zero source with a wildcard group identifies the collection of PIM-SSM trees rooted at that source (S,*).'
