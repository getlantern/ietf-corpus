document: rfc-7151
kind: normative-requirement
summary: The hostname parameter SHOULD be the same hostname used to obtain the IP address for the FTP control connection, after converting abbreviations to fully qualified domain names but before resolving CNAME aliases to canonical names.
section: "3.1"
rfc2119_level: SHOULD
