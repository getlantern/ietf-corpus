document: rfc-8665
kind: wire-format
summary: The SR Local Block TLV (SRLB TLV, Type 14) advertises the range of labels reserved for Local SIDs, using the same format as the SID/Label Range TLV. It MAY appear multiple times; only a single SID/Label Sub-TLV MAY be present per instance.
