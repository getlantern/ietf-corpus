document: rfc-4702
kind: normative-requirement
summary: When a client desires the server to perform DNS updates (S=1), the S bit MUST be 1 and the O and N bits MUST be 0 in the Client FQDN option sent in DHCPREQUEST.
section: "3.3"
rfc2119_level: MUST
