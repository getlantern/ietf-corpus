document: rfc-9460
kind: wire-format
summary: The SVCB RDATA consists of a 2-octet SvcPriority in network byte order, a fully qualified uncompressed TargetName encoded as length-prefixed labels per RFC 1035, and zero or more SvcParams. Each SvcParam is a 2-octet SvcParamKey, a 2-octet SvcParamValue length, and the value bytes; SvcParamKeys MUST appear in strictly increasing numeric order.
section: "2.2"
topics:
    - dns
    - registry
