document: rfc-9674
kind: normative-requirement
summary: The Relying Party MUST verify whether the 'uri' attributes in the Update Notification File are of the same origin as the Update Notification File itself. If verification fails, the file MUST be rejected and RRDP cannot be used.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
    - routing
