document: rfc-8196
kind: interoperability-note
summary: IS-IS autoconfiguration is scoped to single-area, level-1-only deployments in small networks (tens of devices). Multiple IS-IS instances, multi-area or level-2 routing, and interworking with other routing protocols are explicitly not supported.
section: "2"
topics:
