document: rfc-7925
kind: normative-requirement
summary: IoT devices MUST provide support for a server certificate chain of at least 3 (not including the trust anchor) and MAY reject connections from servers offering chains longer than 3. IoT devices MAY have client certificate chains of any length.
section: 4.4.4
rfc2119_level: MUST
topics:
