document: rfc-6352
kind: normative-requirement
summary: The DAV:getetag property MUST be defined and set to a strong entity tag on every address object resource; a GET response on such a resource MUST include an ETag header with the current strong entity tag.
section: 6.3.2.3
rfc2119_level: MUST
topics:
    - http
