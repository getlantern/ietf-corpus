document: rfc-6188
kind: protocol-element
summary: AES_192_CM_PRF is the AES-192 counter mode key derivation function (KDF) for SRTP. It uses the same counter block structure as the AES_CM PRF (RFC 3711 Section 4.3.3) with a 112-bit salt, using an 8-bit label field and a block counter b_c, but operates with AES-192.
section: "3"
