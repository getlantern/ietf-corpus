document: rfc-5373
kind: protocol-element
summary: The Answer-Mode header field is used in SIP INVITE requests to request specific user-interface handling. Its values are 'Manual' (defer acceptance until user confirms) or 'Auto' (accept without user input). It may also appear in 200 OK responses to indicate how the UAS handled the request.
