document: rfc-2251
kind: normative-requirement
summary: Servers which perform caching or shadowing MUST ensure that they do not violate any access control constraints placed on the data by the originating server. Shadow servers will return referrals or contact other servers if modification operations are requested.
section: "3.2"
rfc2119_level: MUST
topics:
    - ldap
    - security
