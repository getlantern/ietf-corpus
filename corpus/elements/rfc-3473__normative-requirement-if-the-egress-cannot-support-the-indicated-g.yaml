document: rfc-3473
kind: normative-requirement
summary: If the egress cannot support the indicated G-PID, it MUST generate a PathErr with 'Routing problem/Unsupported L3PID'. In the PSC penultimate-hop-popping case, if the G-PID is unsupported the penultimate hop MUST generate a ResvErr with 'Routing problem/Unacceptable label value'.
section: 2.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
