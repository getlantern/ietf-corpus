document: rfc-9458
kind: interoperability-note
summary: The encapsulation format can be repurposed for payload types other than binary HTTP by defining a new media type and using that type's string as the HPKE info and exporter context inputs instead of 'message/bhttp request'/'message/bhttp response'. For example, DNS messages could use 'application/dns-message request'.
section: "4.6"
topics:
    - http
    - crypto
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
