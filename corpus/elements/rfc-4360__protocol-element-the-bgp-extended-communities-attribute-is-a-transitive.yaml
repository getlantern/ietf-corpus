document: rfc-4360
kind: protocol-element
summary: The BGP Extended Communities Attribute is a transitive optional BGP-4 attribute with Type Code 16. It consists of a set of extended communities, each encoded as an 8-octet quantity. All routes carrying this attribute belong to the communities listed.
