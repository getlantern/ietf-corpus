document: rfc-5247
kind: protocol-element
summary: 'EAP key derivation proceeds in four phases: Phase 0 (Discovery), Phase 1a (EAP authentication), Phase 1b (optional AAA key transport from backend server to authenticator), and Phase 2 (Secure Association Protocol for unicast and optional multicast security associations). Phases 0, 1b, and 2 are handled external to EAP.'
