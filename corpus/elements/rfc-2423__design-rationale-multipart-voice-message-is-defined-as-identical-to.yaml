document: rfc-2423
kind: design-rationale
summary: multipart/voice-message is defined as identical to multipart/mixed so that pre-MIME or non-VPIM systems can still process the content, losing only the identification as a voice message. A preamble can be inserted for pre-MIME software recipients.
section: "3.1"
topics:
