document: rfc-1850
kind: protocol-element
summary: ospfIfMetricTable provides per-interface, per-TOS metrics indexed by interface address, addressless index, and TOSType. The default TOS 0 metric is computed as 10^8 / ifSpeed, yielding values such as 1 for >=100 Mbps, 10 for Ethernet, 65 for T1, and 10416 for 9.6 kbps.
