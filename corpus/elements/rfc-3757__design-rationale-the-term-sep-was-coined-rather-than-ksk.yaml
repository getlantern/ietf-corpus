document: rfc-3757
kind: design-rationale
summary: The term 'SEP' was coined rather than 'KSK' because a key pair can act as both KSK and ZSK simultaneously; using SEP avoids confusion and also removed the temptation to define separate KSK and ZSK flag bits.
