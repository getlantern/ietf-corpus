document: rfc-9067
kind: security-consideration
summary: Unauthorized modification of prefix-sets, neighbor-sets, or tag-sets can enable DoS attacks by redirecting or dropping traffic, or by leaking large numbers of routes into a routing protocol domain (e.g., BGP). Read access to these sets also reveals which prefixes and neighbors are susceptible to attack.
section: "8"
topics:
