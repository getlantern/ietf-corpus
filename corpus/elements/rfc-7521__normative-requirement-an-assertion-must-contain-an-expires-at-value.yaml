document: rfc-7521
kind: normative-requirement
summary: An assertion MUST contain an Expires At value limiting its validity window. The authorization server MUST reject expired assertions (subject to allowable clock skew), and MAY also reject assertions whose Expires At is unreasonably far in the future.
section: "5.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
