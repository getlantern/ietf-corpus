document: rfc-7551
kind: security-consideration
summary: The two new Association Types for the (Extended) ASSOCIATION Object introduce no additional information to signaling beyond what RFC 6780 already covers; the related security considerations from RFC 6780 apply. The REVERSE_LSP Object can convey additional reverse-LSP parameters, but this information is not fundamentally different from what is already carried in bidirectional LSP messages, and its processing is subject to existing local policy and MPLS/GMPLS security framework (RFC 5920).
section: "7"
topics:
