document: rfc-7396
kind: protocol-element
summary: 'The MergePatch algorithm is a recursive function taking a Target (any JSON value or undefined) and a Patch (any JSON value). If Patch is an Object, it iterates name/value pairs: null values remove target members, non-null values recursively merge. If Patch is not an Object, it returns Patch directly.'
section: "2"
topics:
