document: rfc-3776
kind: normative-requirement
summary: If IKEv1 is used with preshared secrets, aggressive mode MUST be used because main mode determines the shared secret from the peer IP address, which may be a care-of address and does not identify the mobile node.
section: "4.4"
rfc2119_level: MUST
