document: rfc-2334
kind: normative-requirement
summary: Until the HFSM reaches Bidirectional Connection state, any properly formed SCSP messages other than Hello messages that are received MUST be ignored. This handles point-to-multipoint scenarios where messages from other leaves may arrive prematurely.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
