summary: 'The module defines two YANG features: ''b4'' (a dual-stack-capable node or CPE that creates a tunnel to an AFTR) and ''aftr'' (a combination of an IPv4-in-IPv6 tunnel endpoint and an IPv4-IPv4 NAT on the same node), following RFC 6333 Sections 5 and 6 respectively.'
