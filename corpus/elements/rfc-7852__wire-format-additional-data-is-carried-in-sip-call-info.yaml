summary: Additional data is carried in SIP Call-Info header fields with a 'purpose' parameter of the form 'EmergencyCallData.<SubtypeRoot>' (e.g., 'EmergencyCallData.ProviderInfo'). The URI is either an HTTPS URL (by reference) or a CID URL (by value, referencing a MIME body part with matching Content-ID).
