document: rfc-2945
kind: interoperability-note
summary: SRP can be used with hash functions other than SHA-1, including MD5 (used in earlier versions) or HMAC constructions. Any hash function used should produce at least 16 bytes of output and exhibit significant nonlinear avalanche on small input changes.
section: "3.2"
topics:
    - crypto
    - security
