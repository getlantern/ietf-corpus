document: rfc-2959
kind: design-rationale
summary: Two separate compliance profiles (rtpHostCompliance and rtpMonitorCompliance) are defined because host systems have direct access to RTP packet data (payload type, octet counts, local address) while monitors may receive only RTCP and therefore cannot populate those objects.
