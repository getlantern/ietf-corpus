document: rfc-2590
kind: wire-format
summary: IPv6 packets over Frame Relay are encapsulated using the NLPID frame format per [ENCAPS]. The NLPID value for IPv6 is 0x8E, placed after the Q.922 address and UI control byte (0x03). The Q.922 address is 2 or 4 octets in length.
