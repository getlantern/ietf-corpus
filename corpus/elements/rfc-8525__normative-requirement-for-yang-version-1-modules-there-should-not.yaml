document: rfc-8525
kind: normative-requirement
summary: For YANG version 1 modules, there SHOULD NOT be more than one 'module' entry (in the legacy /modules-state list) for a particular module name with conformance-type 'implement', since YANG 1.1 requires at most one revision be implemented.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - yang
    - netconf
