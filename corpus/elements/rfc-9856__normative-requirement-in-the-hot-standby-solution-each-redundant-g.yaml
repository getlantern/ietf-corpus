document: rfc-9856
kind: normative-requirement
summary: In the Hot Standby solution, each redundant G-source MUST be associated with an ES (S-ESI) on the upstream PEs, for both single-homed and multi-homed G-sources. S-ESI labels are used for RPF checks on downstream PEs.
section: "5.1"
rfc2119_level: MUST
topics:
