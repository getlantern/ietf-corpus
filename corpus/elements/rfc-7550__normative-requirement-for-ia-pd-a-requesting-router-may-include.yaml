document: rfc-7550
kind: normative-requirement
summary: For IA_PD, a requesting router MAY include IA_PD options without any prefixes (or with IPv6 prefix field set to 0) in Renew or Rebind messages to request bindings it desires but has been unable to obtain. The delegating router SHOULD assign prefixes in response to such requests per its configuration.
section: 4.4.8
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
