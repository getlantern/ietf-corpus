document: rfc-2127
kind: protocol-element
summary: ISDN interface layering uses the ifStack table of the Interfaces MIB to correlate B channels (ifType ds0(81)), LAPD (ifType lapd(77)), D channel Network Layer/Terminal Endpoints (ifType isdn(63) or x25ple(40)), and physical interfaces (ifType isdns(75), isdnu(76), or ds1(18)) into a coherent hierarchy.
