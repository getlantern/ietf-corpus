document: rfc-8841
kind: normative-requirement
summary: Implementations MUST treat all ICE candidate pairs associated with an SCTP-over-DTLS association as part of the same DTLS association. Shifting between candidate pairs, including between UDP and TCP pairs, MUST NOT trigger a new SCTP or DTLS handshake.
section: "12.2"
rfc2119_level: MUST
topics:
    - sctp
    - webrtc
    - nat
    - realtime
