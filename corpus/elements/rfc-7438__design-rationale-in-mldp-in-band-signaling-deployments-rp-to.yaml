document: rfc-7438
kind: design-rationale
summary: In mLDP in-band signaling deployments, RP-to-group mappings are typically statically configured rather than dynamically distributed over the MPLS core. Configuring an Anycast RP address at each multicast site is advisable to provide redundancy, avoiding a single point of failure at the RP.
section: "8"
topics:
