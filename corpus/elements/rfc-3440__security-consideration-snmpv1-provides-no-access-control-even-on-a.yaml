document: rfc-3440
kind: security-consideration
summary: SNMPv1 provides no access control even on a secure network; implementors are recommended to use SNMPv3 with the User-based Security Model (RFC 3414) and the View-based Access Control Model (RFC 3415) to restrict object access to authorized principals.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - security
    - snmp
