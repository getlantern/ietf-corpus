document: rfc-9167
kind: protocol-element
summary: The <maint:environment> element has a REQUIRED 'type' attribute that MUST be 'production', 'ote', 'staging', 'dev', or 'custom'. An optional 'name' attribute provides the custom environment name when type is 'custom'.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
