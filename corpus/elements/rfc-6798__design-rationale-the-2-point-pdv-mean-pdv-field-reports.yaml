document: rfc-6798
kind: design-rationale
summary: The 2-point PDV Mean PDV field reports the mean of per-packet 2-point PDV values, capturing arrival time of the first media packet relative to the session mean; a single session value may not be useful alone, but averages across sessions can diagnose startup delay caused by head-of-line blocking behind signaling packets.
section: "3.2"
topics:
