document: rfc-4803
kind: protocol-element
summary: The gmplsInterfaceSignalingCaps object is a BITS type with values unknown(0), rsvpGmpls(1), crldpGmpls(2) (deprecated), and otherGmpls(3). Setting no bits means all LSPs must be manually provisioned; if 'unknown' is set, no other bit may be set. Default is rsvpGmpls.
