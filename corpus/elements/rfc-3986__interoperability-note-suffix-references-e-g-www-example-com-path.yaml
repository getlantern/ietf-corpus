document: rfc-3986
kind: interoperability-note
summary: Suffix references (e.g., "www.example.com/path") used in traditional media are not standard URI references and rely on context-dependent heuristics that change over time. They should be avoided whenever possible and never used where long-term references are expected.
section: "4.5"
topics:
    - http
