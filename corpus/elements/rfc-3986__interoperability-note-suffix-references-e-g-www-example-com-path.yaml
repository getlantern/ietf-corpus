document: rfc-3986
kind: interoperability-note
summary: Suffix references (e.g., "www.example.com/path" without a scheme) should be avoided in machine-readable contexts; they share syntax with relative-path references, cannot be used where a relative reference is expected, and rely on heuristics that change over time.
section: "4.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
