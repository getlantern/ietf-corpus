document: rfc-9903
kind: protocol-element
summary: The OSPFv3 Extended Prefix Range TLV ('ospfv3-extended-prefix-range-tlvs') differs from OSPFv2 in using inet:ip-prefix (supporting both IPv4 and IPv6) instead of inet:ipv4-prefix, and omits the IA-flag since OSPFv3 advertises separate Inter-Area extended-LSAs, per RFC 8666 Section 5.
section: "3"
topics:
    - mpls
    - routing
