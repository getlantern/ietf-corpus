document: rfc-2834
kind: normative-requirement
summary: In the operational phase, the client SHALL send HARP_REQUESTs to the authoritative address and receive HARP_REPLYs to build its HARP table. A port is the target of an address resolution request if its IP address matches ar$tpa, its non-zero ULA matches the ULA in ar$tha, its switch address matches the Target Switch Address in ar$tha, or it is a HARP server.
section: 5.1.3
rfc2119_level: SHALL
topics:
    - ip
