document: rfc-8686
kind: state-machine
summary: The discovery procedure sequentially performs DNS U-NAPTR lookups starting from the most-specific domain name (longest prefix) and falling back to shorter prefixes. It terminates successfully on first match, or unsuccessfully after exhausting all candidates from columns 3 and 4 of the lookup table.
section: "3.4"
