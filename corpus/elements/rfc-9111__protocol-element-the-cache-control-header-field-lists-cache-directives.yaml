document: rfc-9111
kind: protocol-element
summary: The Cache-Control header field lists cache directives that are unidirectional (request directives do not imply the same directive in the response). A proxy MUST pass cache directives through in forwarded messages regardless of their significance to the proxy.
section: "5.2"
topics:
    - http
