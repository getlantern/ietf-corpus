document: rfc-5497
kind: normative-requirement
summary: All nodes in the MANET MUST use the same value of the constant C (specified in seconds), and C MUST be greater than 0 seconds. A protocol using this time representation MUST define the value of C.
section: "5"
rfc2119_level: MUST
topics:
    - routing
