document: rfc-749
kind: normative-requirement
summary: Because IAC WON'T SUPDUP-OUTPUT is highly optional, the user TELNET process should be prepared to send the terminal parameter subnegotiation block each time IAC WILL SUPDUP-OUTPUT is received, even if it believes the option is already in effect.
section: "5"
rfc2119_level: SHOULD
