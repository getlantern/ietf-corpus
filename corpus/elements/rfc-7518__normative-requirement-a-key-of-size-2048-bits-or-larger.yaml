document: rfc-7518
kind: normative-requirement
summary: A key of size 2048 bits or larger MUST be used with RSASSA-PSS algorithms (PS256/PS384/PS512). Salt size equals hash output size; MGF1 uses the same hash function as the main RSASSA-PSS hash.
section: "3.5"
rfc2119_level: MUST
topics:
    - jose
    - crypto
