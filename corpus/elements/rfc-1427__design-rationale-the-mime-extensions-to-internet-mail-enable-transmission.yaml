document: rfc-1427
kind: design-rationale
summary: The MIME extensions to Internet mail enable transmission of many new data types, causing SMTP to carry a much wider range of message sizes than previously. This creates resource pressure (e.g., disk space) on SMTP servers, motivating the need for a pre-transfer size negotiation mechanism.
section: "2"
topics:
    - email
