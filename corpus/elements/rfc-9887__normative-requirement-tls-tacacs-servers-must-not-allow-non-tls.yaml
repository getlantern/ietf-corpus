document: rfc-9887
kind: normative-requirement
summary: TLS TACACS+ servers MUST NOT allow non-TLS connections to prevent downgrade attacks or misconfiguration. TACACS+ clients MUST NOT fall back to a non-TLS connection if a TLS connection fails, including during migration.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
    - tls
    - security
