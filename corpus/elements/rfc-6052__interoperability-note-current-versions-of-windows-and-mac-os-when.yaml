document: rfc-6052
kind: interoperability-note
summary: Current versions of Windows and Mac OS, when presented with an IPv4-mapped prefix (::ffff:0:0/96), generate IPv4 packets rather than IPv6 packets. Reusing that prefix for translation would therefore prevent these hosts from participating in translation-based connectivity without modification.
section: "4.2"
topics:
    - ip
    - v6ops
    - nat
