document: rfc-2287
kind: protocol-element
summary: 'The sysApplMapTable provides a backward mapping: given a known process identifier (sysApplElmtRunIndex), it returns the corresponding invoked application (sysApplRunIndex), installed element (sysApplInstallElmtIndex), and installed package (sysApplInstallPkgIndex). Management applications use GETNEXT with the PID as partial instance identifier to retrieve all mapping values at once.'
section: "5.3"
