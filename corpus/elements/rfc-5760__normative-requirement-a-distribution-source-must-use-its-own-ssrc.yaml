document: rfc-5760
kind: normative-requirement
summary: A Distribution Source MUST use its own SSRC for summarization, MUST perform SSRC collision detection and resolution, and MUST send at least one RSI packet per reporting interval. It MUST forward all RTCP SR packets from Media Senders to receivers without alteration.
section: "7"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
