document: rfc-6780
kind: protocol-element
summary: Upstream-initiated association is carried in ASSOCIATION objects in Path messages and associates RSVP Path state across MPLS Tunnels/RSVP sessions. Downstream-initiated association is carried in ASSOCIATION objects in Resv messages and associates RSVP Resv state. Association is never made across Path state and Resv state.
section: "3"
topics:
    - mpls
    - routing
