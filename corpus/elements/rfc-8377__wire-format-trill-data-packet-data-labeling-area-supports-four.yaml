document: rfc-8377
kind: wire-format
summary: 'TRILL Data packet data labeling area supports four standardized content varieties: (1) C-VLAN (0x8100 + PRI/D/VLAN-ID), (2) FGL (two 0x893B words with high/low FGL parts), (3) MT C-VLAN (0x9A22 MT label followed by C-VLAN), and (4) MT FGL (0x9A22 MT label followed by two FGL words). Packets with any other data labeling are discarded.'
section: 2.4.3
