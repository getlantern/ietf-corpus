document: rfc-3323
kind: normative-requirement
summary: User agents SHOULD include a Privacy header when network-provided privacy is required. Intermediaries SHOULD only add Privacy headers if operating at a user's behest. An intermediary MUST NOT modify the Privacy header in any way if the 'none' priv-value is already specified.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
