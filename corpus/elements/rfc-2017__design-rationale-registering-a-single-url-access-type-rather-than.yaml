document: rfc-2017
kind: design-rationale
summary: Registering a single 'URL' access-type rather than individual access-types per URL scheme provides message/external-body access to all current and future URL-based retrieval mechanisms, avoiding the need to register a new MIME access-type for each new URL scheme.
