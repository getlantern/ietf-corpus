document: rfc-5040
kind: normative-requirement
summary: Send Messages MUST be Delivered to the ULP at the Remote Peer in the order they were submitted at the Local Peer. RDMA Read Response Messages MUST be Delivered to the ULP in the order that RDMA Read Request Messages were received by the Data Source RDMAP layer.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
