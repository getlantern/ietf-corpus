document: rfc-8484
kind: security-consideration
summary: Session-level encryption has well-known weaknesses against traffic analysis, which may be acute for DNS queries. Mitigation options include HTTP/2 padding and compression controls, and DNS padding via RFC 7830 if the client requests it.
