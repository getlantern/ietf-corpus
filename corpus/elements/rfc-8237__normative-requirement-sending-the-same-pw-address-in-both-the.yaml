document: rfc-8237
kind: normative-requirement
summary: Sending the same PW address in both the PW ID Configured List and PW ID Unconfigured List sub-TLVs in the same configuration message is a fatal session error; the session is terminated by entering STARTUP state with error code 'PW Configuration TLV conflict'.
section: 5.2.3
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
