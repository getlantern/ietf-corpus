summary: 'The Privacy Pass issuance protocol is a one-round, two-message HTTP-based protocol: the Client sends a TokenRequest and the Issuer returns a TokenResponse. Two variants are defined—privately verifiable (OPRF-based) and publicly verifiable (blind RSA-based).'
