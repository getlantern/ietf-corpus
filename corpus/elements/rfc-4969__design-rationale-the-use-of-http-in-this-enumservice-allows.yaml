document: rfc-4969
kind: design-rationale
summary: The use of HTTP in this Enumservice allows built-in authentication, authorization, and session control mechanisms (e.g., HTTP Digest Authentication) to restrict access to vCards and even synthesize different vCards based on the client's identity, making access control feasible without additional protocol machinery.
