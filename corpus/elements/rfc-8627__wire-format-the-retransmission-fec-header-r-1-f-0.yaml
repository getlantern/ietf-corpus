document: rfc-8627
kind: wire-format
summary: 'The retransmission FEC header (R=1, F=0) mirrors the standard RTP header layout: 1-bit R, 1-bit F, P, X, CC, M, Payload Type, 16-bit Sequence Number, 32-bit Timestamp, and 32-bit SSRC. The source SSRC is carried in the FEC header itself, not in the RTP CSRC list.'
section: 4.2.2.3
topics:
    - rtp
    - realtime
