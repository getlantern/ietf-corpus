document: rfc-2883
kind: wire-format
summary: The SACK option (Kind=5, variable Length) contains up to four blocks, each with a 4-byte Left Edge (first sequence number) and 4-byte Right Edge (sequence number immediately following the last byte) of a received contiguous range. For D-SACK, the first block's left and right edges bound the duplicate contiguous sequence received in the most recent packet.
