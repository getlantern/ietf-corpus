document: rfc-9491
kind: interoperability-note
summary: The NSH-based SFC scenario is applicable across multiple domains or where traffic-engineered paths are needed between SFFs. It can also be implemented using end-to-end segment routing between SFFs, in which case intermediate DC-GW nodes forward based on SR instructions without examining the NSH header.
