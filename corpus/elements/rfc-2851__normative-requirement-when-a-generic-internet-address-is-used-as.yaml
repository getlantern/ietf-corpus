document: rfc-2851
kind: normative-requirement
summary: When a generic Internet address is used as a table index, both InetAddressType and InetAddress objects MUST be used, with InetAddressType MUST come immediately before InetAddress in the INDEX clause.
section: "4.1"
rfc2119_level: MUST
