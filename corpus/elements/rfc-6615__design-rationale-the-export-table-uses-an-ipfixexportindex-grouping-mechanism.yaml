document: rfc-6615
kind: design-rationale
summary: The Export Table uses an ipfixExportIndex grouping mechanism to represent Transport Session groups rather than encoding the relationship in the Transport Session Table itself, keeping session identity and export policy orthogonal and allowing the same session to participate in different group roles.
