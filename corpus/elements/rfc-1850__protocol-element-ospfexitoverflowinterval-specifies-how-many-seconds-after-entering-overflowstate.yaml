document: rfc-1850
kind: protocol-element
summary: ospfExitOverflowInterval specifies how many seconds after entering OverflowState a router will attempt to leave it and resume originating non-default AS-external-LSAs. A value of 0 (default) means the router will not leave OverflowState until restarted.
section: "3.1"
topics:
    - routing
