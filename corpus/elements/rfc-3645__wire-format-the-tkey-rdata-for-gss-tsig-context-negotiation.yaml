document: rfc-3645
kind: wire-format
summary: 'The TKEY RDATA for GSS-TSIG context negotiation includes: Algorithm Name = ''gss-tsig'', Mode = 3 (GSS-API negotiation), Key Size = size of output_token in octets, Key Data = output_token. Remaining fields (Inception, Expiration, Error, Other Size and Data) MUST be set per RFC 2930.'
