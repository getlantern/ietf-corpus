document: rfc-2806
kind: design-rationale
summary: The tel/fax/modem URL schemes deliberately do not use hierarchical URL syntax and have no relative URL forms, because phone numbers do not have a universal hierarchical decomposition. The URLs are always absolute and always case-insensitive (except for future-extension values).
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
