document: rfc-7530
kind: protocol-element
summary: All state held by an NFS client (opens, byte-range locks, delegations) is managed under a server-defined lease. If the client does not renew its lease within the lease period via RENEW or other operations, all associated state may be released by the server.
section: "9.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
