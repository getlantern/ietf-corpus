document: rfc-8466
kind: protocol-element
summary: The extranet-vpns container allows a VPN to access resources in another VPN. A local-sites-role leaf specifies the role (e.g., spoke-role) that local sites assume in the target extranet VPN topology. No service configuration is required on the target VPN.
section: 5.2.4
topics:
