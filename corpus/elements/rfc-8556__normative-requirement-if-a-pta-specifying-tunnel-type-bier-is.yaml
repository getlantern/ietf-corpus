document: rfc-8556
kind: normative-requirement
summary: If a PTA specifying tunnel type BIER is attached to an x-PMSI A-D route, the route MUST NOT be distributed beyond the boundaries of a BIER domain; all routers receiving the route must be in the same BIER domain as the originator.
section: "2"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
