document: rfc-3034
kind: wire-format
summary: The top MPLS label on a Frame Relay interface is carried in the DLCI field of the Q.922 data link header. The DLCI is encoded in canonical bit order and may be 10 bits (2-octet header) or 23 bits (4-octet header). Remaining label stack entries and EXP/S/TTL fields follow in a generic MPLS encapsulation immediately after the Q.922 address.
