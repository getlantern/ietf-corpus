document: rfc-5786
kind: registry
summary: 'IANA assigned type value 5 to the Node Attribute TLV from the top-level types in TE LSAs registry (range 3–32767, per RFC 3630). IANA also created a sub-registry for sub-TLVs of the Node Attribute TLV: value 1 is Node IPv4 Local Address, value 2 is Node IPv6 Local Address, types 3–32767 require Standards Action, types 32768–32777 are experimental (not to be mentioned in RFCs), and types 32778–65535 are unassigned pending a future Standards Track RFC.'
section: "6"
topics:
