document: rfc-7611
kind: protocol-element
summary: ACCEPT_OWN is a new well-known BGP community with IANA-assigned value 0xFFFF0001, defined in the First Come First Served range. It enables a route reflector to re-advertise a VPN route back to its originating PE with a modified Route Target list, allowing intra-PE VRF-to-VRF route import.
section: "2"
topics:
    - bgp
    - routing
