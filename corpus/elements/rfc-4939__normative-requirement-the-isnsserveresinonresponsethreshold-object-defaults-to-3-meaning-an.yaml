document: rfc-4939
kind: normative-requirement
summary: The isnsServerEsiNonResponseThreshold object defaults to 3, meaning an iSNS server will deregister an entity after 3 unanswered ESI (Entity Status Inquiry) messages. A value of 0 disables deregistration due to ESI non-response.
section: "5"
rfc2119_level: SHOULD
