document: rfc-2211
kind: security-consideration
summary: Any mechanism used to invoke controlled-load service (RSVP, SNMP, or proprietary) must provide sufficient security to prevent unauthorized traffic from obtaining preferential treatment, because such treatment directly and quantifiably degrades service for other flows.
