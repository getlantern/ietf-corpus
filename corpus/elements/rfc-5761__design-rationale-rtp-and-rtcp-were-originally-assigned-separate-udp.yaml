document: rfc-5761
kind: design-rationale
summary: 'RTP and RTCP were originally assigned separate UDP ports for three reasons: simplicity (clean separation of data and control planes), efficiency (demultiplexing at a single transport layer point), and support for third-party monitors in multicast sessions that can receive RTCP without access to data packets.'
