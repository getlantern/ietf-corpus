document: rfc-7795
kind: normative-requirement
summary: On the multi-homed side, where both S-PE and T-PEs work in Independent mode, the PW segment that has both local and remote Up/Down status as Up AND both local and remote Preferential Forwarding status as Active MUST be selected for traffic forwarding.
