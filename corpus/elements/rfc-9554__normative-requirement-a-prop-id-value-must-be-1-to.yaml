document: rfc-9554
kind: normative-requirement
summary: A PROP-ID value MUST be 1 to 255 octets and MUST contain only ASCII alphanumeric characters (A-Za-z0-9), hyphen (-), or underscore (_). If an application uses PROP-ID, it SHOULD assign a unique identifier to each sibling property of the same name within a vCard component.
section: "4.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
