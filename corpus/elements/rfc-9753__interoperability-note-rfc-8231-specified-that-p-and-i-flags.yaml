document: rfc-9753
kind: interoperability-note
summary: RFC 8231 specified that P and I flags of PCEP objects are set to 0 on transmission and ignored on receipt in stateful PCE contexts, and failed to mention behavior of objects defined outside RFC 8231, causing ambiguity. This document resolves that ambiguity by introducing the R flag negotiation mechanism.
section: "3.1"
topics:
    - routing
    - mpls
