document: rfc-6230
kind: design-rationale
summary: SIP is used for Control Channel establishment to ensure the URI for session establishment resolves to the same node as the node for session control. Using SIP routing and having the server initiate the TCP connection back guarantees this, whereas HTTP URIs may resolve to entirely different hosts than SIP URIs for the same logical server.
section: "3"
topics:
    - sip
