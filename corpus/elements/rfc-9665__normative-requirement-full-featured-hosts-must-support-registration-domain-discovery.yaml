document: rfc-9665
kind: normative-requirement
summary: Full-featured hosts MUST support registration domain discovery as described in Section 11 of RFC 6763 and discover the SRP registrar via the '_dnssd-srp._tcp.<zone>' (or '_dnssd-srp-tls._tcp.<zone>' for TLS) SRV record.
section: 3.2.2
rfc2119_level: MUST
