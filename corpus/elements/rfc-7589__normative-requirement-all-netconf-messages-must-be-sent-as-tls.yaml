document: rfc-7589
kind: normative-requirement
summary: All NETCONF messages MUST be sent as TLS 'application data'. Multiple NETCONF messages may be contained in one TLS record, or a NETCONF message may be transferred across multiple TLS records.
section: "3"
rfc2119_level: MUST
