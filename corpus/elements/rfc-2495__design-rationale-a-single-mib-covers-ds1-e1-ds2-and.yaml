document: rfc-2495
kind: design-rationale
summary: A single MIB covers DS1, E1, DS2, and E2 because the various line disciplines are similar enough that separate MIBs are unwarranted. The design decision was made to closely align the MIB with objects that can generally be read from currently deployed devices rather than supporting all theoretically possible management objects.
section: "2.3"
