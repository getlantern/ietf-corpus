document: rfc-2672
kind: normative-requirement
summary: The DNS name compression scheme of RFC 1035 MUST NOT be applied to the RDATA portion of a DNAME record unless the sending server has some way of knowing that the receiver understands the DNAME record format.
section: "3"
rfc2119_level: MUST NOT
