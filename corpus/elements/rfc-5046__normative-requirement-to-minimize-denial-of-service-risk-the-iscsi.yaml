document: rfc-5046
kind: normative-requirement
summary: To minimize denial-of-service risk, the iSCSI layer MUST NOT request iSER layer connection resource allocation (Allocate_Connection_Resources) until after the SecurityNegotiation stage completes; resource allocation must be deferred to the LoginOperationalNegotiation stage.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
    - security
