document: rfc-7441
kind: interoperability-note
summary: Per BGP-ERR Section 5.4 (Typed NLRI), if the Route Type field of a received MCAST-VPN NLRI contains an unrecognized value, the route is discarded. This applies to the new mLDP route types when received by implementations that do not yet support them.
section: "3"
topics:
