document: rfc-5962
kind: privacy-consideration
summary: While a series of location snapshots already allows guessing future positions, explicitly including speed and heading in PIDF-LO makes future-location inference substantially easier. The privacy and security requirements of RFC 4119, RFC 3694, and RFC 3693 apply with greater urgency to documents carrying dynamic elements.
section: "5"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
