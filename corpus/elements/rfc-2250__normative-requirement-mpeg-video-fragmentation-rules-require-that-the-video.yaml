document: rfc-2250
kind: normative-requirement
summary: MPEG video fragmentation rules require that the Video_Sequence_Header always appear at the beginning of an RTP payload, a GOP_header always appears at the beginning or immediately after a Video_Sequence_Header, and a Picture_Header always appears at the beginning or immediately after a GOP_header.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
