document: rfc-3588
kind: normative-requirement
summary: The End-to-End Identifier MUST remain locally unique for at least 4 minutes even across reboots, MUST NOT be modified by any Diameter agent, and MUST be echoed unchanged in answers. Duplicate requests SHOULD elicit the same answer and MUST NOT alter state set when the original was processed.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
