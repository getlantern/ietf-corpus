document: rfc-6901
kind: interoperability-note
summary: No Unicode character normalization is performed when matching reference tokens to JSON object member names; equality requires the same number of Unicode characters with byte-by-byte equal code points. If a member name is not unique within an object, the referenced member is undefined and evaluation fails.
section: "4"
topics:
    - json
