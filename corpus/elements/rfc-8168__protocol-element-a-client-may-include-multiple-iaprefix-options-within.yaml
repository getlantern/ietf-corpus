document: rfc-8168
kind: protocol-element
summary: A client may include multiple IAPREFIX options within a single IA_PD option to simultaneously express a preference for a previously delegated prefix and a fallback prefix-length hint. There is no required ordering between the two IAPREFIX options.
section: "3.1"
