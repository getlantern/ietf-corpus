document: rfc-7151
kind: wire-format
summary: 'The HOST command has the syntax: ''HOST SP hostname CRLF'', where hostname is either a domain name (sub-domain *(''.'' sub-domain)) or an IP-literal (IPv6 address in square brackets or IPv4 address). The success response is ''220 [SP *TCHAR] CRLF''.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
