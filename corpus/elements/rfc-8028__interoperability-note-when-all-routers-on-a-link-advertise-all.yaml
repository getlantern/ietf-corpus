document: rfc-8028
kind: interoperability-note
summary: When all routers on a link advertise all prefixes (e.g., because they run a routing protocol and share configuration), the host may deliver packets to a suboptimal router, incurring an extra local hop. This is a residual issue not resolved by this specification.
