document: rfc-9867
kind: security-consideration
summary: Unlike RFC 8784, this specification protects the IKE_AUTH exchange itself — ID payloads and other sensitive content are encrypted under keys already mixed with the PPK, providing quantum resistance even against an active attacker. This also protects the initial IKE SA from the moment it is created.
