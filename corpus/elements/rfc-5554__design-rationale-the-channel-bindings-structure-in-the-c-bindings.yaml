document: rfc-5554
kind: design-rationale
summary: The channel bindings structure in the C-bindings specification (RFC 2744) is actually generic in nature despite being expressed in C syntax; this document generalizes it using pseudo-ASN.1 to make it accessible to all language bindings, fixing an incomplete treatment in the base RFC 2743 specification.
