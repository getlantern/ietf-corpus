document: rfc-9611
kind: normative-requirement
summary: When rekeying a Child SA, SA_RESOURCE_INFO MAY be included, but regardless, the rekeyed Child SA should be bound to the same resource(s) as the Child SA being rekeyed. Rekeying SHOULD use the same or wider Traffic Selectors.
section: "3"
rfc2119_level: SHOULD
topics:
    - ipsec
    - vpn
