document: rfc-3963
kind: normative-requirement
summary: If a Mobile Router receives a Binding Acknowledgement with the R flag not set, it concludes the Home Agent does not support Mobile Routers and MUST de-register with that Home Agent before attempting Dynamic Home Agent Address Discovery to find a supporting Home Agent.
section: "5.3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
