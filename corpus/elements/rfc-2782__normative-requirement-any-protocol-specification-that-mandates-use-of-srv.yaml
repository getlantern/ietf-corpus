document: rfc-2782
kind: normative-requirement
summary: Any protocol specification that mandates use of SRV records MUST define the symbolic name for the Service field and MUST include security considerations. Service SRV records SHOULD NOT be used in the absence of such a protocol specification.
section: Applicability Statement
rfc2119_level: MUST
topics:
    - dns
    - security
