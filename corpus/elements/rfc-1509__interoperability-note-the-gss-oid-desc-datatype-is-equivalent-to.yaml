document: rfc-1509
kind: interoperability-note
summary: The gss_OID_desc datatype is equivalent to the X/Open OM_object_identifier datatype, and platforms supporting the xom.h X/Open header may use it for the definitions of OM_uint32 and gss_OID_desc. Individual GSSAPI implementations may augment the standard routine set with mechanism-specific extensions for functionality unavailable in the generic forms.
section: 2.1.4
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
