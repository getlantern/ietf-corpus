document: rfc-4998
kind: design-rationale
summary: The EncryptionInfo structure uses an OID-dispatched type/value pair rather than a fixed scheme because the specific re-encryption parameters are heavily mechanism-dependent and must be defined in separate specifications; the client inserts these values so the LTA never sees the private encryption parameters.
