document: rfc-9735
kind: protocol-element
summary: 'DN-EID lookups support longest-match: if a less specific name is registered than what is requested, the Map-Server returns the registered name with its registered EID Mask-Len length. For example, a request for ''ietf.lisp'' (80 bits) may return ''ietf'' (40 bits).'
section: "4"
