document: rfc-3090
kind: interoperability-note
summary: Resolvers following the most restrictive DNSSEC verification rules will see only globally secured zones as secured; locally secured zones appear unsecured to them. Resolvers implementing additional algorithms beyond the mandatory set may see some locally secured zones as secured.
section: "2.4"
topics:
    - dns
    - security
