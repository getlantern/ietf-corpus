document: rfc-5583
kind: wire-format
summary: 'The ''depend'' media-level attribute uses ABNF syntax: ''a=depend:'' followed by a dependent-fmt, a SP, and a dependency-tag, with additional semicolon-separated pairs. The dependency-tag encodes a dependency-type (''lay'', ''mdc'', or token) optionally followed by an identification-tag and colon-separated fmt-dependency values.'
section: 5.2.2
topics:
