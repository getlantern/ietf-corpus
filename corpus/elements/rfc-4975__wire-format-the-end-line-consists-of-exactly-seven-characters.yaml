document: rfc-4975
kind: wire-format
summary: 'The end-line consists of exactly seven ''-'' characters, the transaction identifier, and a continuation flag: ''$'' for final chunk of a message, ''#'' for abort, ''+'' for more chunks to follow. A CRLF preceding the end-line is not part of the body.'
