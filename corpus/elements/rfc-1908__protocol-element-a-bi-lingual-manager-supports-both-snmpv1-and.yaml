document: rfc-1908
kind: protocol-element
summary: A bi-lingual manager supports both SNMPv1 and SNMPv2 protocols. When contacting an agent, it consults a local database to select the correct protocol version, and must map operations as if acting as a proxy agent to provide transparency to management applications.
