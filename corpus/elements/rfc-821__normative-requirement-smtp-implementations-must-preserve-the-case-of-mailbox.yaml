document: rfc-821
kind: normative-requirement
summary: SMTP implementations must preserve the case of mailbox user names exactly as they appear in mailbox arguments. Commands and host names are case-insensitive, but mailbox user names are case-sensitive on some hosts.
section: "2"
rfc2119_level: MUST
topics:
    - email
