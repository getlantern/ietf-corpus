document: rfc-7110
kind: wire-format
summary: The Reply TC TLV (Type 22) has a 2-octet Type field, 2-octet Length field (fixed value 4), and a 4-octet value field where the top 3 bits carry the TC (Traffic Class) value and remaining bits MUST be zero. It allows the echo request originator to request a specific TC marking on the echo reply's return path LSP.
section: "4.4"
topics:
    - mpls
