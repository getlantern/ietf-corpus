document: rfc-5104
kind: wire-format
summary: 'TSTR/TSTN FCI entry (64 bits): SSRC (32 bits) of the media sender; Seq nr (8 bits); 19 reserved bits; Index (5 bits, value 0–31) for the requested or chosen temporal/spatial trade-off. TSTN uses the identical format with the Index reflecting the encoder''s actual decision.'
