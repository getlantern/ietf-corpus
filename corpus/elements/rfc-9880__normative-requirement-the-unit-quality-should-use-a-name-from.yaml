document: rfc-9880
kind: normative-requirement
summary: The unit quality SHOULD use a name from the SenML Units or Secondary Units registry (RFC 8428, RFC 8798). URNs from the urn:ietf:params:unit sub-namespace MUST NOT be used as unit values except where the unit name contains a colon and cannot otherwise be expressed.
section: "4.7"
rfc2119_level: MUST NOT
topics:
