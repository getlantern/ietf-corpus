document: rfc-8530
kind: security-consideration
summary: 'The bind-lne-name leaf is a high-impact configuration parameter: removing an interface from an LNE is similar to physically removing a hardware interface and can severely disrupt the LNE''s operation. Implementations should carefully control when changes to this leaf are permitted.'
