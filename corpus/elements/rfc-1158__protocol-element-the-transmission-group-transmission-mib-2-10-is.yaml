document: rfc-1158
kind: protocol-element
summary: 'The Transmission group (transmission ::= { mib-2 10 }) is an OID namespace for media-specific MIB definitions. By convention, each media type is assigned sub-identifier matching its ifType integer value: type OBJECT IDENTIFIER ::= { transmission number }. Definitions reside under experimental until standardized.'
