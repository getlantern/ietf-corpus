document: rfc-8534
kind: normative-requirement
summary: The LIR-pF flag is only specified for use with 6514-tunnel-types. For non-6514-tunnel-types, the originator SHOULD NOT set LIR-pF, and the receiver SHOULD treat LIR-pF as if not set, unless a separate specification covers that tunnel type's use with LIR-pF.
section: "2"
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
