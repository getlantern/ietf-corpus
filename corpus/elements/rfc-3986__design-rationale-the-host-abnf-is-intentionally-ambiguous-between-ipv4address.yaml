document: rfc-3986
kind: design-rationale
summary: 'The host ABNF is intentionally ambiguous between IPv4address and reg-name; the "first-match-wins" rule resolves this: if host matches IPv4address, treat it as an IPv4 literal. Square brackets are used exclusively to delimit IP literals to allow future IP literal formats via the IPvFuture rule.'
section: 3.2.2
topics:
    - http
    - ip
