document: rfc-7213
kind: normative-requirement
summary: Where a link changes type (e.g., point-to-point to point-to-multipoint), the network operator SHOULD be informed. If the new link type is incompatible with the Ethernet addressing method in use, the system MUST take the action configured for that circumstance.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
