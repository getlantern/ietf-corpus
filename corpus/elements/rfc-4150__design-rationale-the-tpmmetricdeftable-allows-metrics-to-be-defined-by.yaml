document: rfc-4150
kind: design-rationale
summary: The tpmMetricDefTable allows metrics to be defined by reference to external IETF, ITU, or enterprise standards rather than embedding metric semantics in the MIB itself. The tpmMetricDefGlobalID object points to the IPPM-REGISTRY-MIB OID (RFC4148) for IPPM-defined metrics; metrics without a registered OID use the value 0.0.
section: "2.7"
topics:
