document: rfc-7866
kind: security-consideration
summary: The SRC and SRS MUST support mutual TLS authentication and SHOULD support SIP Digest authentication. An SRS MUST verify that it is authorized to receive recordings from the SRC; the SRC MUST verify the SRS identity before sending recorded media and metadata to prevent unauthorized capture.
section: "12.1"
topics:
    - security
    - tls
    - sip
