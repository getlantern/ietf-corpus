summary: 'VCCV defines two type spaces: Control Channel (CC) Types specifying how VCCV messages are encapsulated, and Connectivity Verification (CV) Types specifying what OAM protocol runs over the control channel. Only one CC Type may be active at a time, but multiple CV Types can be supported concurrently.'
