document: rfc-8512
kind: security-consideration
summary: Connection-limits and mapping-limits controls prevent a single subscriber from exhausting NAT CPU and memory resources, enforcing fairness among subscribers and protecting the NAT implementation from resource exhaustion attacks. Rate-limit thresholds are configurable per subscriber, per instance, and per protocol.
section: "2.9"
topics:
    - nat
    - security
