document: rfc-6408
kind: protocol-element
summary: The S-NAPTR application protocol tags for Diameter transport are formatted as 'diameter.<transport>' where transport is one of 'tcp', 'sctp', or 'tls.tcp'. The delimiter '.' improves readability but does not imply any namespace hierarchy.
