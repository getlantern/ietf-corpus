document: rfc-7711
kind: normative-requirement
summary: POSH operations MUST be complete before any application-layer data is exchanged for the source domain. In cases where the POSH client initiates the connection, it SHOULD perform all POSH retrievals before initiating the connection.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
