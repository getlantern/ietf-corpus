document: rfc-8831
kind: protocol-element
summary: The WebRTC data channel stack is SCTP over DTLS over ICE/UDP. SCTP provides data transport; DTLS provides confidentiality, authentication, and integrity; ICE/UDP provides NAT traversal. All can share a single UDP port with SRTP media.
