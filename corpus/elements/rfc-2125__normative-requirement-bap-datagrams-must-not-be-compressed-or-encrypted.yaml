document: rfc-2125
kind: normative-requirement
summary: BAP datagrams MUST NOT be compressed or encrypted because ISDN Terminal Adapters may need to intercept BAP datagrams to control the multilink connection. Address-and-Control-Field-Compression and Protocol-Field-Compression are still permitted if negotiated.
section: "5.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
