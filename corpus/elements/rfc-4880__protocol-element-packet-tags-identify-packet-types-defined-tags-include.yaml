document: rfc-4880
kind: protocol-element
summary: 'Packet tags identify packet types. Defined tags include: 1 (Public-Key ESK), 2 (Signature), 3 (Symmetric-Key ESK), 4 (One-Pass Signature), 5 (Secret-Key), 6 (Public-Key), 7 (Secret-Subkey), 8 (Compressed Data), 9 (Symmetrically Encrypted Data), 11 (Literal Data), 13 (User ID), 14 (Public-Subkey), 17 (User Attribute), 18 (Sym. Encrypted Integrity Protected Data), 19 (MDC). Tag 0 is reserved and MUST NOT be used.'
section: "4.3"
topics:
    - security
