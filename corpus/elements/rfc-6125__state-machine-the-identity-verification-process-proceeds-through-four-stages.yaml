document: rfc-6125
kind: state-machine
summary: 'The identity verification process proceeds through four stages: (1) client constructs reference identifier list from source domain; (2) server presents PKIX certificate with identifiers; (3) client checks reference identifiers against presented identifiers; (4) outcome is Match Found (success), No Match/Pinned (success if pinned cert matches), or No Match/No Pin (fallback/failure).'
section: "6.1"
topics:
    - tls
    - pkix
    - security
