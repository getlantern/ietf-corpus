document: rfc-6311
kind: interoperability-note
summary: 'Session resumption (RFC 5723) and SA counter synchronization after failover are mutually exclusive: resumption is initiated by the peer detecting a need to re-establish, whereas counter synchronization is initiated by the newly active gateway. Both can coexist in the same implementation without interaction.'
section: "10"
topics:
