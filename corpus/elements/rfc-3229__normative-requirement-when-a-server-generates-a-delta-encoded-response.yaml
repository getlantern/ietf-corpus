document: rfc-3229
kind: normative-requirement
summary: When a server generates a delta-encoded response, the list of content-codings used SHOULD be a prefix of the list it would have used without delta encoding, enabling the client to apply the delta without additional content-coding operations.
section: 10.7.1
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
