document: rfc-9811
kind: normative-requirement
summary: If the announced issue was successfully stored in a database or was already present, the answer MUST be an HTTP response with a 201 (Created) status code and empty content. A receiver MUST answer with a suitable 4xx or 5xx error code when a problem occurs.
section: "3.5"
rfc2119_level: MUST
topics:
    - http
    - pkix
