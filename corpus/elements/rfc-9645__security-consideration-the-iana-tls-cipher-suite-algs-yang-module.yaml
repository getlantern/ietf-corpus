document: rfc-9645
kind: security-consideration
summary: The iana-tls-cipher-suite-algs YANG module enumerates cipher suites from an IANA-maintained registry; implementations must ensure only cryptographically strong cipher suites are enabled, as weakly configured cipher-suite lists can compromise TLS session security.
section: "5.1"
topics:
    - tls
    - yang
    - security
    - registry
