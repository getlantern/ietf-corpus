document: rfc-3175
kind: design-rationale
summary: Multicast aggregation is limited to aggregating classification and scheduling state only (not full reservation state), because correctly determining per-link resource allocations for heterogeneous multicast receivers would require retaining per-E2E-reservation state, negating the benefit of aggregation.
section: 1.4.8
topics:
    - multicast
    - qos
