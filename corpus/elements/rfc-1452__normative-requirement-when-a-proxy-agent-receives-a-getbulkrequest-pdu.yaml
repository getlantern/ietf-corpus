document: rfc-1452
kind: normative-requirement
summary: When a proxy agent receives a GetBulkRequest-PDU destined for a SNMPv1 agent, it must set the non-repeaters and max-repetitions fields to zero and change the PDU tag to GetNextRequest-PDU. GetRequest-PDU, GetNextRequest-PDU, and SetRequest-PDU are passed unaltered.
section: 3.1.1
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
