document: rfc-7197
kind: design-rationale
summary: The 'duplication-delay' attribute is applicable to both RTP and non-RTP streams, though the primary focus is RTP-based transport. For RTP, duplicate suppression uses the RTP sequence number; non-RTP applications must use their own unique identifiers or comparison approaches.
