document: rfc-4436
kind: normative-requirement
summary: A host wishing to reclaim a previously used IPv4 Link-Local address MUST perform the full probing and announcement process required by RFC3927 and MUST NOT attempt to use DNAv4 as a shortcut to bypass that process, since Link-Local address claims are only valid while the host remains actively connected and defending the address.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
