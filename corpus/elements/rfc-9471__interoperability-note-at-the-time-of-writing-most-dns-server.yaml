document: rfc-9471
kind: interoperability-note
summary: At the time of writing, most DNS server implementations set TC only if none of the available glue records fit in a UDP response. The updated requirements may increase the fraction of UDP responses with TC=1 and consequently increase TCP query volume.
section: "5"
topics:
