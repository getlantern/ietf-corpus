document: rfc-3537
kind: wire-format
summary: 'The LKEYPAD structure used in AES wrapping is: LENGTH (1 octet) || KEY (LENGTH octets) || PAD (0–7 random octets). AES wrapping (RFC 3394) adds an 8-octet integrity check value, so the wrapped output length is len(LKEYPAD) + 8.'
section: "4.1"
