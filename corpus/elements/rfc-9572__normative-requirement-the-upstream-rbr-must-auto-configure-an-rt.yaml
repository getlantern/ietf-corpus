document: rfc-9572
kind: normative-requirement
summary: The upstream RBR MUST (auto-)configure an RT with the Global Administrator field set to the Next Hop in the re-advertised I/S-PMSI A-D route and with the Local Administrator field set to 0, enabling constrained BGP route distribution per RFC 4684.
section: "6.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
