summary: phivCircuitLineIndex is defined to be the same value as IfIndex from the standard Internet MIB, linking DECnet circuit entries to the standard interface table. Similarly phivCountersIndex and phivDDCMPLineCountIndex equal IfIndex for their respective tables.
