document: rfc-3209
kind: design-rationale
summary: The Extended Tunnel ID in the LSP_TUNNEL SESSION object is normally zero (widest scope) but an ingress node may place its own IPv4 address there to narrow the SESSION to a unique ingress-egress pair, enabling multiple distinct TE tunnels between the same endpoints without SESSION collision.
section: 4.6.1.1
topics:
    - mpls
    - routing
