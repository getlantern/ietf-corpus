document: rfc-2108
kind: design-rationale
summary: Group-level monitoring counters (rptrMonitorGroupTable) are deprecated in this MIB. Management applications are recommended to use repeater-level counters in rptrMonTable, which provides the same aggregate information. Group counters were redundant summations already available via per-port objects.
section: "3"
topics:
