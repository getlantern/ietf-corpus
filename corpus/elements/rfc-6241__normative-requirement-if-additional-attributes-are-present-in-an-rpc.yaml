document: rfc-6241
kind: normative-requirement
summary: If additional attributes are present in an <rpc> element, a NETCONF peer MUST return them unmodified in the <rpc-reply>, including xmlns attributes. This enables clients to use custom attributes as opaque correlation handles.
section: "4.1"
rfc2119_level: MUST
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
