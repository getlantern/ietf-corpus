document: rfc-8264
kind: security-consideration
summary: Visually similar ('confusable') Unicode characters pose significant security risks enabling phishing and spoofing. Since there are no comprehensive technical solutions, application services SHOULD restrict allowed scripts/blocks for registration and SHOULD forbid strings mixing code points from more than one script. The PRECIS framework itself does not map or prohibit confusable characters.
section: "12.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
