document: rfc-2821
kind: registry
summary: 'IANA maintains a registry of SMTP service extensions. Each registered extension requires a formal standards-track or IESG-approved experimental document specifying: the extension name, EHLO keyword, parameter syntax, any new SMTP verbs, MAIL/RCPT parameter additions, and behavioral description. Keywords beginning with ''X'' are local-use only and MUST NOT be registered.'
section: 2.2.2
rfc2119_level: MUST
topics:
