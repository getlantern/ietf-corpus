document: rfc-2631
kind: design-rationale
summary: partyAInfo is required in Static-Static mode because ZZ is identical for every message exchanged between the same pair of static keys; varying partyAInfo is the only mechanism to produce distinct KEKs per message without changing key material.
section: 2.1.2
topics:
