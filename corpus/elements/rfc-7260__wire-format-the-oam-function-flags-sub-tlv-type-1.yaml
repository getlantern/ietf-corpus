summary: 'The OAM Function Flags Sub-TLV (Type=1) contains a 16-bit Type, 16-bit Length, and an extensible bitmap of OAM functions padded to 4-octet alignment. Defined bits (0-5) indicate: CC, CV, FMS, PM/Loss, PM/Delay, PM/Throughput.'
