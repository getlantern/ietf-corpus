document: rfc-7684
kind: design-rationale
summary: The flooding scope of an Extended Prefix Opaque LSA may intentionally exceed the scope of the prefixes it carries (e.g., a mapping server in a segment routing deployment advertising prefixes from a larger scope). Route Type 0 (Unspecified) accommodates the case where the advertising entity does not know the prefix's route type.
section: "2"
topics:
    - routing
