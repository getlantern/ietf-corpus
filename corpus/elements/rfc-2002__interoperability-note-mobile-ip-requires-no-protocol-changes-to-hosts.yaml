document: rfc-2002
kind: interoperability-note
summary: Mobile IP requires no protocol changes to hosts or routers not acting as mobile nodes, home agents, or foreign agents. Correspondent nodes communicate with a mobile node's permanent home address without awareness of its current location, ensuring full backward compatibility with existing IP stacks.
section: "1.1"
topics:
