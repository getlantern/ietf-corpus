document: rfc-1647
kind: normative-requirement
summary: TN3270E clients MUST provide a key mapping for the 3270 ATTN key that transmits a Telnet IP command. Servers MUST translate the received IP into an SNA SIGNAL RU to the host application. Non-SNA servers MUST ignore Telnet IP commands.
section: "11"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
