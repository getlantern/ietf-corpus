document: rfc-4143
kind: security-consideration
summary: ENUM stores data in a globally distributed DNS database visible to anyone anonymously, exposing data subjects to automatic harvesting without notification. Publication of a telephone number linked to an IFax service can enable 'junk fax' spam.
section: "3"
topics:
