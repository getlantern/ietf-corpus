document: rfc-4430
kind: normative-requirement
summary: A KINK peer MUST NOT conclude that a peer is dead based solely on unprotected routing information such as ICMP messages. A peer MUST NOT make any inferences about a lack of STATUS messages from another peer; dead peer detection is not periodic keepalives.
section: "3.7"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
