document: rfc-8917
kind: interoperability-note
summary: A LoST client implemented prior to the 'LoST-Validation' tag will use the 'LoST' tag to resolve an AUS. If the contacted mapping server refuses validation, the client retries later, or the server may return a redirect with a different AUS pointing to a designated validation server.
section: "4"
topics:
