document: rfc-5116
kind: normative-requirement
summary: Each AEAD algorithm specification MUST include the values K_LEN, P_MAX, A_MAX, N_MIN, N_MAX, and C_MAX. The relationship between plaintext and ciphertext lengths MUST NOT depend on external parameters such as authentication tag length.
