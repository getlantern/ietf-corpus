document: rfc-8782
kind: normative-requirement
summary: DOTS clients MUST include the 'lifetime' parameter in mitigation requests. The DOTS server MUST always indicate the actual lifetime in the response and remaining lifetime in status messages. A lifetime of '0' is invalid and MUST be rejected with 4.00.
section: 4.4.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
