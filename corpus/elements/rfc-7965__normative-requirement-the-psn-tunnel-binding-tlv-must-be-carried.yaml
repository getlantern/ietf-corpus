document: rfc-7965
kind: normative-requirement
summary: The PSN Tunnel Binding TLV MUST be carried in the LDP Label Mapping message if PW-to-LSP binding is required. The U-bit MUST be set to 1 so that unknown receivers silently ignore it; the F-bit MUST be set to 0 to prevent forwarding when unknown.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
