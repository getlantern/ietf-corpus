document: rfc-3878
kind: protocol-element
summary: arcIndex (ResourceId) uniquely identifies the managed resource under ARC control, e.g., pointing to an ifIndex instance. arcAlarmType (IANAItuProbableCauseOrZero) identifies the alarm condition type; value 0 implies all applicable probable causes. arcNotificationId (OBJECT IDENTIFIER) identifies the notification type to suppress; value 0.0 implies all applicable notification types.
