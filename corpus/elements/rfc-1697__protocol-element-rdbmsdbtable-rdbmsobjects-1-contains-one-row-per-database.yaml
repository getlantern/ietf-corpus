document: rfc-1697
kind: protocol-element
summary: rdbmsDbTable (rdbmsObjects 1) contains one row per database installed on a host, indexed by rdbmsDbIndex. Fields include rdbmsDbPrivateMibOID, rdbmsDbVendorName, rdbmsDbName, and rdbmsDbContact. Whether a database appears in this table may depend on its activity level.
