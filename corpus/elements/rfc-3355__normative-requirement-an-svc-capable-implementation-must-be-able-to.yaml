document: rfc-3355
kind: normative-requirement
summary: An SVC-capable implementation MUST be able to both originate and respond to SVC setup requests. It MUST accept incoming calls offering LLC encapsulated L2TP, and MUST reject calls offering only an unsupported encapsulation.
section: "7.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
