document: rfc-6551
kind: wire-format
summary: 'The NE sub-object Flags byte encodes: bits 7–4 reserved, bit 3 ''I'' (included/excluded), bits 2–1 ''T'' (node type), and bit 0 ''E'' (estimation present). The following 8-bit E_E field gives estimated percentage of remaining energy and MUST be set to 0 when the ''E'' flag is cleared.'
section: "3.2"
