document: rfc-7184
kind: protocol-element
summary: WillingnessTC encodes a router's willingness to serve as an MPR (flooding or routing) as an Unsigned32 in range 0 (WILL_NEVER) to 15 (WILL_ALWAYS). Olsrv2StatusTC is an INTEGER with values enabled(1) and disabled(2) controlling OLSRv2 operation per-device and per-interface.
