document: rfc-8581
kind: normative-requirement
summary: If a reacting node receives an OC-OLR AVP of type PEER-REPORT and the SourceID does not match the DiameterIdentity of the Diameter peer from which the response was received, the reacting node MUST ignore the Overload report.
section: 6.2.3
rfc2119_level: MUST
topics:
    - diameter
    - security
