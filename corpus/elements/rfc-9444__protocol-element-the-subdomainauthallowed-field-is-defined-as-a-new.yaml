document: rfc-9444
kind: protocol-element
summary: The subdomainAuthAllowed field is defined as a new ACME directory metadata field (optional boolean). An ACME server can advertise support for subdomain authorization by including this flag with value true in its directory metadata. If not specified, the assumed default is false.
section: "4.4"
topics:
