document: rfc-4960
kind: wire-format
summary: Each SCTP chunk is encoded as Chunk Type (8 bits), Chunk Flags (8 bits), Chunk Length (16 bits, includes type/flags/length but not padding), and variable-length Chunk Value. Chunks are padded to a multiple of 4 bytes with at most 3 zero bytes not counted in the Length field.
section: "3.2"
topics:
