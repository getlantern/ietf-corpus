summary: 'Inverse ARP (RFC 1293) is supported for resolving a protocol address when the DLCI (hardware address) is already known, following the same source-hardware-address replacement pattern as ARP and RARP: the receiving station inserts the Q.922 address from the frame header into the ar$sha field.'
