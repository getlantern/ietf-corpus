document: rfc-5496
kind: design-rationale
summary: A router that discards a Vector Attribute MAY insert a new one, to handle topologies where a PIM Join must pass through a sequence of edge routers, each pair separated by a core without external routes. Vectors expire along with the corresponding (S,G) state in the absence of periodic refreshment.
section: 3.3.2
topics:
    - multicast
    - routing
