document: rfc-8163
kind: wire-format
summary: 'The MS/TP COBS-encoded frame has the following fields in order: two-octet preamble (0x55, 0xFF), one-octet Frame Type, one-octet Destination Address, one-octet Source Address, two-octet Length (MSB first), one-octet Header CRC, 2–1506 octet Encoded Data, five-octet Encoded CRC-32K, and an optional single 0xFF trailer octet.'
