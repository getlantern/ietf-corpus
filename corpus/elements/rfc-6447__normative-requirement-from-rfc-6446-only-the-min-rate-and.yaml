document: rfc-6447
kind: normative-requirement
summary: From RFC 6446, only the 'min-rate' and 'max-rate' Event header field parameters are required to be implemented. When time since the most recent notification exceeds 1/'min-rate' seconds, the current state MUST be sent in its entirety.
section: "3.6"
rfc2119_level: REQUIRED
topics:
