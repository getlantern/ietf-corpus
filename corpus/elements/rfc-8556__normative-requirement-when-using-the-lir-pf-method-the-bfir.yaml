document: rfc-8556
kind: normative-requirement
summary: When using the LIR-pF method, the BFIR MUST originate a wildcard S-PMSI A-D route with the LIR-pF flag set, tunnel type BIER, and a non-zero MPLS label. A BFIR MUST NOT use this method unless it knows all relevant BFERs support the LIR-pF flag.
section: 2.2.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
