document: rfc-6768
kind: interoperability-note
summary: 'Compliance with G9981-MIB requires compliance with two external compliance statements: IF-MIB ifCompliance3 and GBOND-MIB gBondCompliance. The G9981-MIB only defines ATM-specific extensions; generic GBS port configuration, capabilities, status, and PM are in GBOND-MIB.'
