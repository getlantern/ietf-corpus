document: rfc-4396
kind: design-rationale
summary: The LEN field is included in the common header primarily to ease interoperability with RFC 3640, which requires an Access Unit length indication. For standalone RTP use, UDP already provides length information, so LEN is redundant but retained for interoperability.
section: "2.5"
topics:
    - rtp
    - realtime
