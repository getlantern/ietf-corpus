document: rfc-7293
kind: privacy-consideration
summary: 'The privacy tradeoff favors RRVS: automatically generated mail (account credentials, password resets) delivered to a wrong party after mailbox reassignment poses far greater risk than leaking mailbox history information. MSPs that allow address recycling create the underlying vulnerability; RRVS exposes only limited metadata about mailbox history.'
section: "14.1"
topics:
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
