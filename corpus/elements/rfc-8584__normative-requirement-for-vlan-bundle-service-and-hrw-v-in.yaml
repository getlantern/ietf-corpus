document: rfc-8584
kind: normative-requirement
summary: For VLAN Bundle service (and HRW), V in the DF algorithm denotes the lowest VLAN in the bundle, consistent with the 'lowest VLAN in bundle' logic of RFC 7432. Under AC-DF with the default algorithm, the numerically lowest VLAN value in the bundle MUST be used in the modulo function.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
