document: rfc-6116
kind: normative-requirement
summary: ENUM clients MUST be prepared to encounter referential loops in sequences of non-terminal NAPTRs and MUST be able to detect and recover from such loops without failure. Clients MAY treat a chain of more than 5 non-terminal NAPTRs as an indication of a loop.
section: 5.2.1
rfc2119_level: MUST
topics:
    - dns
