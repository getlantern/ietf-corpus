document: rfc-2661
kind: registry
summary: IANA maintains registries for L2TP AVP Attribute Types (Section 10.1), Message Type AVP Values (Section 10.2), Result Code AVP values for both StopCCN and CDN (Section 10.3), Framing and Bearer Capabilities bits (Section 10.4), Proxy Authen Type values (Section 10.5), and AVP Header Bits (Section 10.6). Vendor-specific AVPs use IANA-assigned SMI Enterprise Codes as Vendor ID.
