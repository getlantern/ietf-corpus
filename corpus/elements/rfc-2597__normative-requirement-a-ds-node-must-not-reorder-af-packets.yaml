document: rfc-2597
kind: normative-requirement
summary: A DS node MUST NOT reorder AF packets of the same microflow when they belong to the same AF class regardless of their drop precedence. There are no quantifiable timing requirements associated with the forwarding of AF packets.
section: "2"
rfc2119_level: MUST NOT
topics:
    - diffserv
    - qos
