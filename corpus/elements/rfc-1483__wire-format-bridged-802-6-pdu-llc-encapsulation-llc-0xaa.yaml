document: rfc-1483
kind: wire-format
summary: 'Bridged 802.6 PDU (LLC encapsulation): LLC 0xAA-AA-03 + OUI 0x00-80-C2 + PID 0x00-0B + Common PDU Header (Reserved 1 octet, BEtag 1 octet, BAsize 2 octets) + MAC destination address + remainder + Common PDU Trailer. Only one PID value (no FCS variant) because 802.6 CRC presence is indicated by the CIB bit in the MAC frame header.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
