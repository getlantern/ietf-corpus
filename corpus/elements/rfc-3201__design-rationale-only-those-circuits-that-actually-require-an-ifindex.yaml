document: rfc-3201
kind: design-rationale
summary: Only those circuits that actually require an ifIndex are added to the ifTable. This prevents over-populating the ifTable with unused indices, since the Interfaces Group MIB strongly recommends against adding conceptual rows for virtual circuits that do not need individual management.
section: "3.1"
