document: rfc-1426
kind: wire-format
summary: 'The BODY parameter value for the extended MAIL FROM command is defined as: body-value ::= "7BIT" / "8BITMIME". ''8BITMIME'' indicates a MIME message with arbitrary octet-aligned content; ''7BIT'' indicates strict 7-bit ASCII content.'
