document: rfc-5670
kind: design-rationale
summary: The excess-traffic-meter SHOULD NOT re-meter already excess-traffic-marked packets in order to avoid over-termination at multiple bottlenecks in the PCN-domain; the behaviour is SHOULD NOT (rather than MUST NOT) because checking prior mark state may be harder to implement.
section: B.6
topics:
    - qos
    - congestion
