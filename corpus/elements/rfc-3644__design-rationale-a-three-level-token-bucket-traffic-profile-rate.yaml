document: rfc-3644
kind: design-rationale
summary: A three-level token bucket traffic profile (rate, normal burst, excess burst) is defined rather than the two-level meter from [DIFF-MIB], because three levels are needed to construct AF provisioning actions that mark conforming, exceeding, and violating traffic with different DSCPs (e.g., AF11/AF12/AF13).
section: 3.3.1
topics:
