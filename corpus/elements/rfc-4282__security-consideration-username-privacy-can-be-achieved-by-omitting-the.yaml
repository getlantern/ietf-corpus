document: rfc-4282
kind: security-consideration
summary: Username privacy can be achieved by omitting the username from the NAI, but only when a separate authentication method (e.g., an EAP method using pseudonyms per RFC 3748) transfers the true username securely. Neither approach protects the realm portion of the NAI.
section: "3"
topics:
    - security
    - privacy
