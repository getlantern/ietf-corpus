document: rfc-6347
kind: normative-requirement
summary: When responding to a HelloVerifyRequest, the client MUST use the same parameter values (version, random, session_id, cipher_suites, compression_method) as in the original ClientHello, allowing the server to use those values when generating and verifying the cookie.
section: 4.2.1
rfc2119_level: MUST
topics:
