document: rfc-7250
kind: design-rationale
summary: The server_certificate_type extension in the ServerHello provides an explicit indication of the certificate type in the Certificate payload to avoid parsing ambiguities, since the Certificate message may contain either an X.509 certificate or a SubjectPublicKeyInfo structure depending on negotiation.
section: "4.2"
topics:
