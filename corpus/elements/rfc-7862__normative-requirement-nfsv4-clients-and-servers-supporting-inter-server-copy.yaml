document: rfc-7862
kind: normative-requirement
summary: NFSv4 clients and servers supporting inter-server COPY are REQUIRED to implement RPCSEC_GSSv3 including the copy_to_auth, copy_from_auth, and copy_confirm_auth structured privileges, and to support rejecting COPY_NOTIFY requests that do not use RPCSEC_GSS with privacy.
section: "4.9"
rfc2119_level: REQUIRED
topics:
