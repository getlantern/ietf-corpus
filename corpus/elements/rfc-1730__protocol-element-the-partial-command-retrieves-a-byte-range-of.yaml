document: rfc-1730
kind: protocol-element
summary: The PARTIAL command retrieves a byte range of a single message data item (RFC822, RFC822.HEADER, RFC822.TEXT, or BODY[section]) by starting octet (1-based) and count. The response does not indicate the range; multiple concurrent PARTIALs of the same item cannot be streamed without synchronization.
section: 6.4.6
topics:
    - email
