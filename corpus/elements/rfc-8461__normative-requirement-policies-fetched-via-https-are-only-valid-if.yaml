document: rfc-8461
kind: normative-requirement
summary: Policies fetched via HTTPS are only valid if the HTTP response code is 200 (OK). HTTP 3xx redirects MUST NOT be followed, and HTTP caching (as specified in RFC 7234) MUST NOT be used when fetching MTA-STS policies.
section: "3.3"
rfc2119_level: MUST NOT
topics:
