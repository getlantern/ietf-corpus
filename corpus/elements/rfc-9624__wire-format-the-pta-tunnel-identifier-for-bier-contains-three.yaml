document: rfc-9624
kind: wire-format
summary: 'The PTA Tunnel Identifier for BIER contains three subfields: (1) one octet for the BIER sub-domain-id, (2) two octets for the BFR-id within that sub-domain, and (3) the BFR-Prefix as either a /32 IPv4 or /128 IPv6 address (inferred from total PTA length).'
section: "2"
