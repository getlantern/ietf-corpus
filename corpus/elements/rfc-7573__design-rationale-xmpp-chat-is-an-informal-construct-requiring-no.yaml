document: rfc-7573
kind: design-rationale
summary: XMPP chat is an informal construct requiring no session negotiation, whereas MSRP requires a formally negotiated SIP session. To bridge these paradigms, an XMPP-to-MSRP gateway must maintain additional state on behalf of the XMPP user.
section: "1"
topics:
