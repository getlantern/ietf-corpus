document: rfc-1583
kind: state-machine
summary: 'The interface state machine defines seven states: Down, Loopback, Waiting, Point-to-Point, DROther, Backup, and DR. Key triggers include InterfaceUp (Down→Waiting or Point-to-Point), WaitTimer expiry (Waiting→DR/Backup/DROther), and NeighborChange (re-evaluating DR/BDR role).'
section: "9.3"
topics:
    - routing
