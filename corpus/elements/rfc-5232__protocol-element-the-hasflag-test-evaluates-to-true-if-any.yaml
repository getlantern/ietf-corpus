document: rfc-5232
kind: protocol-element
summary: 'The hasflag test evaluates to true if any of the named variables (or the internal variable if omitted) contains any of the specified flag names. The default match type is '':is'' and the default comparator is ''i;ascii-casemap''. Usage: hasflag [MATCH-TYPE] [COMPARATOR] [<variable-list: string-list>] <list-of-flags: string-list>.'
