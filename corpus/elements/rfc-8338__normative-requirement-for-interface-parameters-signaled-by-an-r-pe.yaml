document: rfc-8338
kind: normative-requirement
summary: For interface parameters signaled by an R-PE, each L-PE must check that its configured threshold values (e.g., MTU size) are less than or equal to the R-PE's value; for other parameters like CEP/TDM Payload Bytes, the value MUST exactly match the values signaled by the R-PE.
section: 3.2.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
