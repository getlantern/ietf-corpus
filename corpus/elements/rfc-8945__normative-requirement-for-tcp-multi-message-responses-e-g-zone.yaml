document: rfc-8945
kind: normative-requirement
summary: For TCP multi-message responses (e.g., zone transfers), the TSIG MUST be included on all DNS messages. For backward compatibility, a verifying client MUST accept up to 99 intermediary messages without a TSIG but MUST verify that both the first and last message contain a TSIG.
section: 5.3.1
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
