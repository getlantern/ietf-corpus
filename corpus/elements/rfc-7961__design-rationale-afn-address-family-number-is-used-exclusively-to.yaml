document: rfc-7961
kind: design-rationale
summary: AFN (Address Family Number) is used exclusively to represent address field types in the IA APPsub-TLV rather than Ethertype or hardware address type, even though other IETF protocols use those alternatives, because AFN provides a unified namespace for all address families.
