document: rfc-5815
kind: protocol-element
summary: The Transport Session Table (ipfixTransportSessionTable) lists all established Transport Sessions between Exporters and Collectors. Each entry captures transport protocol, source/destination addresses and ports (for TCP/UDP), SCTP association ID, device mode (exporting or collecting), template refresh parameters (UDP only), IPFIX version, and session status (unknown/inactive/active).
section: "5.1"
