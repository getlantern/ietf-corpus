document: rfc-3284
kind: normative-requirement
summary: The Win_Indicator byte MUST NOT have more than one of VCD_SOURCE and VCD_TARGET bits set. It MAY have neither bit set, in which case the target window was encoded without reference to any external source window.
section: "4.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
