document: rfc-8855
kind: state-machine
summary: 'A floor request transitions through states encoded in the REQUEST-STATUS attribute: Pending (server awaiting floor chair contact), Accepted (chair accepted; in queue), Granted, Denied, Cancelled, Released, and Revoked. An 8-bit Queue Position field accompanies the Accepted state when applicable.'
