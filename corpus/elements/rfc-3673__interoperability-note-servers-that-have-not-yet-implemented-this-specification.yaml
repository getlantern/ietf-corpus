document: rfc-3673
kind: interoperability-note
summary: Servers that have not yet implemented this specification should ignore "+" as an unrecognized attribute description per RFC 2251 Section 4.5.1. From the client perspective, a server not returning all operational attributes when "+" is requested should be treated as having access restrictions.
