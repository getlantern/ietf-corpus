document: rfc-6154
kind: interoperability-note
summary: The METADATA mechanism (/private/specialuse) provides an alternative path for clients to read and potentially modify special-use attributes on existing mailboxes, bridging between the static CREATE-time assignment and runtime reconfiguration, but only when the server supports both this extension and RFC 5464.
