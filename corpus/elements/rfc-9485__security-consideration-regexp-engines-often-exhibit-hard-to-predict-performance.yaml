document: rfc-9485
kind: security-consideration
summary: Regexp engines often exhibit hard-to-predict performance, enabling denial-of-service attacks via attacker-controlled expressions. I-Regexp is designed to allow implementations that run in linear time and space in the input, and that detect when this cannot be guaranteed.
