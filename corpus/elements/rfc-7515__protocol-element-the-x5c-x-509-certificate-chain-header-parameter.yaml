document: rfc-7515
kind: protocol-element
summary: The 'x5c' (X.509 Certificate Chain) Header Parameter contains a JSON array of base64-encoded (not base64url) DER PKIX certificate values. The first certificate MUST contain the signing public key. Recipients MUST validate the certificate chain according to RFC 5280.
section: 4.1.6
topics:
    - jose
    - pkix
    - crypto
