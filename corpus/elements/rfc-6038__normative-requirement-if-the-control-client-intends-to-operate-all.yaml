document: rfc-6038
kind: normative-requirement
summary: If the Control-Client intends to operate all test sessions using one or both new modes, it MUST set the Mode field bit corresponding to each function in the Setup Response message. The Control-Client MAY set multiple Mode field bits.
section: "4.1"
rfc2119_level: MUST
topics:
    - measurement
