document: rfc-4557
kind: protocol-element
summary: A new Kerberos pre-authentication type PA-PK-OCSP-RESPONSE (value 18) is defined to carry OCSP responses in-band during PKINIT authentication exchanges. Both clients and the KDC may include this padata in AS-REQ and AS-REP messages respectively.
