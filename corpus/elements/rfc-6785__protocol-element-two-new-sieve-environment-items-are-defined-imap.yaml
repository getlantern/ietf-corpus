document: rfc-6785
kind: protocol-element
summary: 'Two new Sieve environment items are defined: ''imap.user'' (the IMAP login ID of the user who caused the action) and ''imap.email'' (the primary email address of that user). Both MUST be the empty string when accessed during normal final-delivery Sieve processing.'
section: "4.2"
