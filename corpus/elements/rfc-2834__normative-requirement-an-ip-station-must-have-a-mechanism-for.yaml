document: rfc-2834
kind: normative-requirement
summary: An IP station MUST have a mechanism for determining permanent (static) ARP table entries. These permanent entries allow interoperability with legacy HIPPI adapters that do not implement dynamic HARP. Permanent entries are not aged.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
