document: rfc-9509
kind: interoperability-note
summary: The id-kp-jwt KeyPurposeId covers both JWS signature validation and JWE decryption contexts for JWT; the distinction between the two is determined solely by the Key Usage (KU) extension value — digitalSignature/nonRepudiation for JWS, keyEncipherment for JWE — not by separate KeyPurposeIds.
