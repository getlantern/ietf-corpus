document: rfc-7301
kind: design-rationale
summary: The ServerHello ALPN extension is sent in plaintext to permit network elements to provide differentiated service for the connection when the TCP or UDP port number is not definitive for the application-layer protocol. Placing ownership of protocol selection on the server facilitates scenarios in which certificate selection or connection rerouting may be based on the negotiated protocol.
section: "4"
topics:
