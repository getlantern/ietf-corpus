document: rfc-9328
kind: normative-requirement
summary: The RTP timestamp MUST use a 90 kHz clock rate. For NAL units without their own timing (e.g., parameter sets, SEI NAL units), the RTP timestamp MUST be set to the RTP timestamp of the coded pictures of the access unit in which the NAL unit is included.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
