document: rfc-8002
kind: wire-format
summary: The CERT parameter wire format is a TLV with 16-bit Type (768) and 16-bit Length fields, followed by 8-bit CERT group, 8-bit CERT count, 8-bit CERT ID, 8-bit CERT type, variable-length Certificate, and variable-length zero-padded Padding to align to 8-byte boundaries. Length excludes Type, Length, and Padding.
section: "2"
