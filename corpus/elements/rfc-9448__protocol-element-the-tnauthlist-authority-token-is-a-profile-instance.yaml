document: rfc-9448
kind: protocol-element
summary: The TNAuthList Authority Token is a profile instance of the ACME Authority Token (RFC 9447). Its protected header must comply with ACME Request Authentication, and its payload must include 'exp', 'jti', and 'atc' mandatory claims, with 'iss' as an optional claim.
