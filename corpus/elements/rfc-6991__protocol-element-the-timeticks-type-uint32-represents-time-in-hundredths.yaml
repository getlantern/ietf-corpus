document: rfc-6991
kind: protocol-element
summary: The timeticks type (uint32) represents time in hundredths of a second modulo 2^32 between two epochs, equivalent to SMIv2 TimeTicks. The timestamp type derives from timeticks and records the timeticks value at which a specific occurrence happened, resetting to zero when the associated timeticks wraps.
