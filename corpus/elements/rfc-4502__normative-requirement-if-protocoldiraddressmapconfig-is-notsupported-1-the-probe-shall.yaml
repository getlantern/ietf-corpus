document: rfc-4502
kind: normative-requirement
summary: If protocolDirAddressMapConfig is notSupported(1), the probe shall not allow this object to be changed to any other value. When this value changes from supportedOn(3) to supportedOff(2), the probe shall delete all related entries in the addressMapTable.
