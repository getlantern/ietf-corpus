document: rfc-4825
kind: normative-requirement
summary: When creating or replacing an XML element, the PUT request MUST carry Content-Type 'application/xcap-el+xml'. When creating or replacing an attribute, the request MUST carry Content-Type 'application/xcap-att+xml'. Document-level PUTs MUST use the MIME type defined by the application usage.
section: "7.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
