document: rfc-1288
kind: protocol-element
summary: Finger uses TCP port 79. The local host opens a TCP connection to the remote host on the Finger port, sends a one-line query, waits for the RUIP (Remote User Information Program) to respond, and the RUIP initiates the close of the connection after returning an answer.
section: "2.1"
topics:
    - tcp
