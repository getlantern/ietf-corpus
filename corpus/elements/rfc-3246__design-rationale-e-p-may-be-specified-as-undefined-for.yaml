document: rfc-3246
kind: design-rationale
summary: E_p may be specified as 'undefined' for schedulers performing non-FIFO intra-aggregate scheduling (e.g., per-microflow scheduling within EF). For such implementations, providing a meaningful worst-case bound on individual packet delay that holds for any traffic pattern may not be feasible.
section: "2.2"
topics:
