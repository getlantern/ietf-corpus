document: rfc-5797
kind: interoperability-note
summary: Deployed FTP clients still make use of the deprecated XCUP/XCWD/XMKD/XPWD/XRMD commands, and most FTP servers support them as aliases for the standard RFC 959 successors. Implementations should be aware of this widespread practice.
section: "2.5"
topics:
