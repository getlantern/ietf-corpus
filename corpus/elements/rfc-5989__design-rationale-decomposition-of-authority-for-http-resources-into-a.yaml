document: rfc-5989
kind: design-rationale
summary: Decomposition of authority for HTTP resources into a separate HTTP server and SIP Events server is anticipated as useful for scalability. The PUBLISH mechanism (RFC 3903) is recommended for communicating state changes from the HTTP server to the SIP Events server in such deployments.
section: "4.11"
topics:
    - sip
    - http
