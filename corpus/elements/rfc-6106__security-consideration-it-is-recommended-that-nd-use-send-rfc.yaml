document: rfc-6106
kind: security-consideration
summary: It is RECOMMENDED that ND use SEND (RFC 3971) so that RDNSS and DNSSL options are covered by the RA integrity signature, preventing spoofing. Network devices are RECOMMENDED to block unauthorized nodes from sending RA messages containing RDNSS and DNSSL options, analogous to DHCPv6 server port-blocking.
section: "7.2"
topics:
    - dns
    - security
    - ip
    - v6ops
