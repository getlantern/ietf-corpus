document: rfc-4254
kind: normative-requirement
summary: It is RECOMMENDED that the x11 authentication cookie sent in an x11-req channel request be a fake, random cookie, and that it be checked and replaced by the real cookie when a connection request is received, to prevent cookie theft.
section: 6.3.1
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
