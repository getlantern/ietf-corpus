document: rfc-5768
kind: design-rationale
summary: 'The ''sip.ice'' media feature tag is introduced to support gateway deployments: when some UAs in a domain do not support ICE, a registrar tracking the tag allows proxies to route calls through ICE-capable gateways only when the terminating UA lacks ICE support.'
section: "3.1"
