document: rfc-5246
kind: state-machine
summary: 'Full TLS handshake: client sends ClientHello; server responds with ServerHello, Certificate*, ServerKeyExchange*, CertificateRequest*, ServerHelloDone; client sends Certificate*, ClientKeyExchange, CertificateVerify*, ChangeCipherSpec, Finished; server responds with ChangeCipherSpec, Finished. Application data MUST NOT be sent before the first handshake completes.'
