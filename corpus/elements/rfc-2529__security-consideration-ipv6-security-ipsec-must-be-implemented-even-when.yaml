document: rfc-2529
kind: security-consideration
summary: IPv6 security (IPsec) MUST be implemented even when IPv4 security is available, because IPv4 security does not protect IPv6 traffic once it leaves the 6over4 domain. Redundant double-encryption SHOULD be avoided for efficiency; apply security at the IPv6 layer.
section: "9"
topics:
    - security
    - ip
    - v6ops
    - ipsec
