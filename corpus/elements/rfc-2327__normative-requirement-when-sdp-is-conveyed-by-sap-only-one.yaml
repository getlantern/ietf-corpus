document: rfc-2327
kind: normative-requirement
summary: When SDP is conveyed by SAP, only one session description is allowed per packet. The SDP text payload should be no greater than 1 Kbyte in length. When conveyed by other means, multiple SDP session descriptions may be concatenated, with 'v=' indicating the start of each new description.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
