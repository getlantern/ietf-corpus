document: rfc-4467
kind: design-rationale
summary: GENURLAUTH allows a server to return a tagged OK with a dummy generated key when an invalid userid is supplied, rather than always returning BAD, to prevent an attacker from using the command to enumerate valid userids on the server.
section: BASE.6.3.GENURLAUTH
topics:
