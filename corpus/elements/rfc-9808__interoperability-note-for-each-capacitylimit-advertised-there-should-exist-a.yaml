document: rfc-9808
kind: interoperability-note
summary: For each CapacityLimit advertised, there should exist a corresponding Telemetry Source providing current utilization data for that limit. The FCI.CapacityLimits and FCI.Telemetry objects are designed to be used together, linked via the CapacityLimitTelemetrySource Object.
