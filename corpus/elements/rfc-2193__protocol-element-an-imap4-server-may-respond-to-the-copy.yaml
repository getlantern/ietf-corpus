document: rfc-2193
kind: protocol-element
summary: An IMAP4 server MAY respond to the COPY command with one or more IMAP mailbox referrals indicating the destination mailbox is on a remote server. The client MAY simulate COPY by issuing constituent FETCH and APPEND commands against both servers.
section: "4.4"
topics:
    - email
