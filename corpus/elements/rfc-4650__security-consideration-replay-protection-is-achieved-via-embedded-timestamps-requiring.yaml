document: rfc-4650
kind: security-consideration
summary: Replay protection is achieved via embedded timestamps requiring loosely synchronized clocks. If clock synchronization is lost, replayed messages cannot be detected, secure key establishment fails, and a denial-of-service results. Operators should consult RFC 3830 sections 5.4 and 9.3 for guidance.
section: "5.3"
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
