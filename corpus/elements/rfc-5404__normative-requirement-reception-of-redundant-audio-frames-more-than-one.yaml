document: rfc-5404
kind: normative-requirement
summary: Reception of redundant audio frames (more than one audio frame from the same source for the same time slot) MUST be supported. If multiple frames at different bitrates are received for the same slot, it is RECOMMENDED to keep the one with the highest bitrate.
section: 5.6.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
