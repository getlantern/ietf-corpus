document: rfc-7904
kind: normative-requirement
summary: To resolve an AOR, a RELOAD user SHALL fetch Kind SIP-REGISTRATION at the Resource-ID for the AOR (without specifying dictionary keys to retrieve all values), recursively resolving any non-GRUU AORs until only GRUUs and destination lists remain.
section: "4.2"
rfc2119_level: SHALL
topics:
