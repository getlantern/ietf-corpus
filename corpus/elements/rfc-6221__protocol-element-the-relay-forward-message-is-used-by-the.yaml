document: rfc-6221
kind: protocol-element
summary: 'The Relay-Forward message is used by the LDRA to forward client messages toward the server. It carries three key parameters: link-address (always set to the Unspecified Address by an LDRA), peer-address (copied from the client''s IP source address), and the Interface-ID option identifying the client-facing interface.'
section: "5.1"
topics:
