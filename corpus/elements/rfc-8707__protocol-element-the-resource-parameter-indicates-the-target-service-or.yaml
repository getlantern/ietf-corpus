document: rfc-8707
kind: protocol-element
summary: The 'resource' parameter indicates the target service or resource to which access is being requested. Its value MUST be an absolute URI per RFC 3986, MUST NOT include a fragment component, and SHOULD NOT include a query component. Multiple 'resource' parameters MAY be used to indicate that the requested token is intended to be used at multiple resources.
section: "2"
topics:
