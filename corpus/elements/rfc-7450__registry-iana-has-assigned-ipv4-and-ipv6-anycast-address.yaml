document: rfc-7450
kind: registry
summary: IANA has assigned IPv4 and IPv6 anycast address prefixes for advertising and discovering publicly accessible AMT relays. The Relay Discovery Address for each prefix is the prefix address with its low-order octet set to 1; all remaining addresses in each prefix are reserved.
section: "7.1"
