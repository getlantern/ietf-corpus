document: rfc-3805
kind: protocol-element
summary: Alerts are classified as binary change events (paired leading/trailing edge, e.g., paper jam) or unary change events (e.g., configuration change). Only leading-edge binary events create table entries; the trailing edge removes them. Unary events create entries with no natural removal trigger.
section: 2.2.13.4
