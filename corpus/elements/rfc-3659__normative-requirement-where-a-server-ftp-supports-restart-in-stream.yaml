document: rfc-3659
kind: normative-requirement
summary: Where a server-FTP supports RESTart in STREAM mode, it MUST include 'REST STREAM' in its FEAT response. Where REST is not supported or supported only in block/compressed modes, the REST line MUST NOT be included.
section: "5.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
