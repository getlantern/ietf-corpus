document: rfc-1902
kind: design-rationale
summary: Conceptual rows should contain no more than approximately 20 columnar objects, grouped along functional lines (e.g., statistics versus configuration parameters, or commonly accessed versus rarely accessed), so that typical management operations on a row fit within a single PDU. Splitting rows into many tables solely to achieve optionality is explicitly discouraged.
