document: rfc-3945
kind: protocol-element
summary: GMPLS supports bi-directional LSP establishment with contention resolution. For a bi-directional LSP, an Upstream Label is carried in the Path/Label Request message to identify the label for the upstream direction, and the upstream node selects a component link in each direction.
section: "7.10"
topics:
    - routing
