document: rfc-9159
kind: wire-format
summary: 'Non-link-local source address compression: if the first 48 bits of the IID match the latest registered address but the address is not the latest, the last 16 bits SHALL be carried inline (SAC=1, SAM=10); if the first 48 bits do not match, the full 64-bit IID SHALL be carried inline (SAC=1, SAM=01).'
section: 3.3.3
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
