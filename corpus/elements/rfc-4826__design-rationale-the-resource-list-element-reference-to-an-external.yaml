document: rfc-4826
kind: design-rationale
summary: 'The <resource-list> element (reference to an external list) and inline <list> element are both supported in <service> to allow trade-offs: an inline list enables single-operation creation but is hidden from other usages, while <resource-list> enables list reuse across multiple application usages at the cost of a separate XCAP document.'
section: "4.1"
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
