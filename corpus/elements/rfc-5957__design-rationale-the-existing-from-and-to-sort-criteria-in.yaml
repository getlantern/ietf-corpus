document: rfc-5957
kind: design-rationale
summary: The existing FROM and TO sort criteria in RFC 5256 sort lexically on addr-mailbox, which does not match what users typically see. DISPLAYFROM/DISPLAYTO address this by sorting on addr-name (the display name), providing a user-visible ordering.
section: "1"
topics:
    - email
