document: rfc-2252
kind: normative-requirement
summary: Servers which support matching rules and the extensibleMatch SHOULD implement all matching rules defined in section 8. Privately-defined matching rules MUST be published in the subschema matchingRules attribute; if extensibleMatch is supported, applicability to attributes MUST be published in matchingRuleUse.
section: "4.5"
rfc2119_level: MUST
