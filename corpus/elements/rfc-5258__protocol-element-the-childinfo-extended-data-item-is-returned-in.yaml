document: rfc-5258
kind: protocol-element
summary: The CHILDINFO extended data item is returned in a LIST response when RECURSIVEMATCH is specified; it describes the selection criteria that caused the parent to be returned and indicates that the mailbox has at least one descendant matching those criteria. It carries the selection criteria as a parenthesized list of quoted option names.
section: "3.5"
topics:
    - email
