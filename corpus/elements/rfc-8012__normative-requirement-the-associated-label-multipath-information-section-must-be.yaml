document: rfc-8012
kind: normative-requirement
summary: The Associated Label Multipath Information section MUST be omitted in MPLS echo request messages. A midpoint that pushes ELI/EL SHOULD include Associated Label Multipath Information in its echo reply, and each associated label MUST map one-to-one to an IP address or label in the corresponding IP or Label Multipath Information section.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
