document: rfc-5044
kind: security-consideration
summary: CRC suppression is only permissible when end-to-end data integrity equivalent to CRC32c is guaranteed by another mechanism. End-to-end IPsec with cryptographic integrity check is explicitly cited as a qualifying mechanism; use of channel bindings by the ULP can provide assurance that IPsec protection scope is truly end-to-end.
section: "4.4"
topics:
    - security
    - ipsec
    - tcp
