document: rfc-8141
kind: design-rationale
summary: URN resolution is intentionally more flexible than URL dereferencing. A URN may resolve to locators, to metadata only, to representations conditionally (based on authorization), or not at all. This flexibility is a deliberate architectural choice to accommodate a wide range of use cases beyond simple document retrieval.
section: 1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
