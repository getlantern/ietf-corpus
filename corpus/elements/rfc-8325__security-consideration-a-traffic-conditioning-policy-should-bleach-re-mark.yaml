document: rfc-8325
kind: security-consideration
summary: A traffic-conditioning policy should 'bleach' (re-mark to DSCP DF / UP 0) any packets from unauthorized users, applications, or endpoints. EF-marked flows should additionally be policed per RFC 2474 Section 7 and RFC 3246 Section 3.
section: "8.1"
