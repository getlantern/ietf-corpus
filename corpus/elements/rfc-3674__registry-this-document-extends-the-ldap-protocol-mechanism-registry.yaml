document: rfc-3674
kind: registry
summary: This document extends the LDAP Protocol Mechanism registry (RFC 3383) to support registration of values of the 'supportedFeatures' attribute, managed by IANA. A 'Feature' usage in a registration template indicates the value is an LDAP feature.
