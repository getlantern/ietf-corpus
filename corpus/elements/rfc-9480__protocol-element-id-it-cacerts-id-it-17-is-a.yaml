document: rfc-9480
kind: protocol-element
summary: id-it-caCerts (id-it 17) is a new general message type allowing a client to request CA certificates. The GenMsg body is absent; the GenRep body contains a SEQUENCE SIZE (1..MAX) OF CMPCertificate or is absent if no certificates are available.
