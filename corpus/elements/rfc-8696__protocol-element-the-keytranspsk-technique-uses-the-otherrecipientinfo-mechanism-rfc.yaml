document: rfc-8696
kind: protocol-element
summary: The keyTransPSK technique uses the OtherRecipientInfo mechanism (RFC 5652 Section 6.2.5) identified by id-ori-keyTransPSK (1.2.840.113549.1.9.16.13.1). The sender encrypts a randomly generated key-derivation key (KDK) in each recipient's public key, then runs the KDF over the PSK and KDK to produce the key-encryption key (KEK), which wraps the content-encryption key (CEK).
section: "3"
topics:
