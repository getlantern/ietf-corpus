document: rfc-6435
kind: protocol-element
summary: The Lock Instruct (LI) message is carried in the Generic ACH and identified by PW ACH Type 0x0026. It provides in-band coordination to complement management-plane Lock commands, allowing both ends of a transport path to be locked within a tight time window.
