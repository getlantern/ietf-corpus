document: rfc-2401
kind: normative-requirement
summary: A compliant implementation MUST NOT allow instantiation of an ESP SA that employs both a NULL encryption and a NULL authentication algorithm. An attempt to negotiate such an SA is an auditable event.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
