document: rfc-4112
kind: security-consideration
summary: ECML fields contain sensitive information that must be protected from unauthorized modification and kept confidential; appropriate mechanisms include object security (XMLDSIG, XML encryption, CMS) or channel security (TLS, IPsec). Systems that store and forward ECML data will typically find object security most appropriate.
section: "4"
topics:
    - security
    - tls
    - crypto
