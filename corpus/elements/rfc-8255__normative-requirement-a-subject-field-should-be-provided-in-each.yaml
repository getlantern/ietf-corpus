document: rfc-8255
kind: normative-requirement
summary: A Subject field SHOULD be provided in each language message part, containing a translation of the email subject appropriate for that language. The subject presented to the recipient SHOULD be taken from the selected language part; if absent, the top-level Subject header value is used.
section: "7"
rfc2119_level: SHOULD
topics:
    - email
