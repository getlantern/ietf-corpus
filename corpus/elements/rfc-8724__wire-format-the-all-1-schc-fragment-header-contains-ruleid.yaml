document: rfc-8724
kind: wire-format
summary: 'The All-1 SCHC Fragment header contains: RuleID, optional DTag (T bits), optional W (M bits), FCN with all bits set to 1, optional RCS (U bits), and optional Fragment Payload. At least one of the RCS field or Fragment Payload MUST be present. Only this fragment may require padding.'
section: 8.3.1.2
