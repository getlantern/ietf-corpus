document: rfc-1444
kind: interoperability-note
summary: If a SYNTAX clause and WRITE-SYNTAX clause are both present in a VARIATION or OBJECT clause, the SYNTAX clause only applies when instances of the object are read, while WRITE-SYNTAX applies when instances are written, allowing different value ranges for reading versus writing.
section: 5.5.2.1
topics:
    - snmp
