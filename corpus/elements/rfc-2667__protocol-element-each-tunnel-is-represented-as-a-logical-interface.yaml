document: rfc-2667
kind: protocol-element
summary: Each tunnel is represented as a logical interface (ifEntry) in the Interfaces MIB with ifType set to 131 ('tunnel'). The ifStack table correlates tunnel interfaces to the underlying physical interfaces on which the local IPv4 addresses are configured.
