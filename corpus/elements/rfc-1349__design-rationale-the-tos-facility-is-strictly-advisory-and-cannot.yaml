document: rfc-1349
kind: design-rationale
summary: The TOS facility is strictly advisory and cannot provide service guarantees because (1) not all networks will consider TOS when routing, and (2) TOS cannot quantify a specific service level (e.g., a specific bandwidth). Discarding packets because no suitable TOS path is available would violate the no-penalty principle.
section: C.1
topics:
    - ip
    - qos
