document: rfc-5534
kind: wire-format
summary: The Keepalive Timeout Option (Type=10, Length=4) carries a 16-bit Keepalive Timeout value in seconds and a 16-bit Reserved field. It is sent in I2, I2bis, R2, or UPDATE messages to communicate the sender's preferred Keepalive Timeout to the peer.
section: "5.3"
