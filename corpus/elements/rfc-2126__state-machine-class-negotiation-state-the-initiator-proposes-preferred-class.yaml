document: rfc-2126
kind: state-machine
summary: 'Class negotiation state: the initiator proposes preferred class and optional alternative in the CR TPDU; the responder selects: if preferred=0/alternative=none then class 0; if preferred=2/alternative=0 then class 2 or 0; if preferred=2/alternative=none then class 2. If the selected class differs from preferred, the initiator adjusts operation on receipt of CC.'
section: "6.3"
topics:
