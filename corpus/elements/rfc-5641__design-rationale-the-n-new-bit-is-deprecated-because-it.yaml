document: rfc-5641
kind: design-rationale
summary: 'The (N) New bit is deprecated because it is of little or no use: the information it conveys (new vs. existing circuit) can already be inferred from the L2TP control message type, and it is uncertain what actionable use the receiving PE can make of it beyond logging.'
