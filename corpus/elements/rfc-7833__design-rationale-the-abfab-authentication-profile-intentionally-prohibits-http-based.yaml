document: rfc-7833
kind: design-rationale
summary: The ABFAB Authentication Profile intentionally prohibits HTTP-based bindings, requires all SAML messages to use the SAML RADIUS binding, forbids naming the Subject in AuthnRequest, and restricts responses to a single assertion with exactly one authentication statement — all to reduce the number of bindings implementations must support and simplify interoperability.
section: "7.2"
topics:
    - radius
    - security
