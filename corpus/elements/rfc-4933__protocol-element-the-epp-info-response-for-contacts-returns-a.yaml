document: rfc-4933
kind: protocol-element
summary: The EPP <info> response for contacts returns a <contact:infData> element containing id, roid, one or more status elements, up to two postalInfo elements (int/loc types), optional voice/fax, email, clID, crID, crDate, optional upID/upDate/trDate, conditional authInfo (only for sponsoring client), and optional disclose.
section: 3.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
