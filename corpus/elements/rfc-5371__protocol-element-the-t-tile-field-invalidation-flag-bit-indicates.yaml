document: rfc-5371
kind: protocol-element
summary: The T (Tile field invalidation flag) bit indicates whether the tile number field is valid (T=0) or invalid (T=1). A sender MUST set T=1 when the packet holds only the main header or when multiple tile-parts are packed together.
section: "4.2"
