document: rfc-5322
kind: design-rationale
summary: The zone '+0000' SHOULD be used to indicate UTC, while '-0000' also indicates UTC but specifically signals that the generating system may be in an unknown local time zone — i.e., that the date-time contains no information about the actual local time. This distinction allows receivers to distinguish known-UTC from unknown-offset messages.
section: "3.3"
topics:
