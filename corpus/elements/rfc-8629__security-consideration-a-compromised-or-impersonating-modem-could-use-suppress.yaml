document: rfc-8629
kind: security-consideration
summary: A compromised or impersonating modem could use Suppress Forwarding to disable transmission by the router. TLS (as defined in RFC 8175) is required to protect against impersonating attackers on unprotected modem-router links.
section: "4"
topics:
    - security
    - tls
