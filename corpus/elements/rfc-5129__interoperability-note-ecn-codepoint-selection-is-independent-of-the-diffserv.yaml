document: rfc-5129
kind: interoperability-note
summary: ECN codepoint selection is independent of the Diffserv tunneling model (uniform, short pipe, or pipe as defined in RFC 3270). The tunneling model governs PHB encoding in the EXP value; the choice of CM vs. Not-CM codepoint for ECN always follows the procedures in Section 4 regardless of which model is in use.
section: "4.7"
topics:
    - mpls
    - ecn
    - diffserv
    - congestion
