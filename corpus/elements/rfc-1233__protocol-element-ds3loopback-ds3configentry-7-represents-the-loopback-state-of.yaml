document: rfc-1233
kind: protocol-element
summary: 'ds3Loopback (ds3ConfigEntry 7) represents the loopback state of the CSU with five values: ds3NoLoop, ds3LocalLoopbackLocalSide, ds3LocalLoopbackRemoteSide, ds3RemoteLoopbackLocalSide, and ds3RemoteLoopbackRemoteSide. Devices supporting read/write access should return badValue for unsupported loopback states.'
