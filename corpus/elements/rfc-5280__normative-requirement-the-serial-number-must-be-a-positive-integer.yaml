document: rfc-5280
kind: normative-requirement
summary: The serial number MUST be a positive integer, MUST be unique for each certificate issued by a given CA, and MUST NOT exceed 20 octets. Certificate users MUST be able to handle serialNumber values up to 20 octets.
section: 4.1.2.2
rfc2119_level: MUST
