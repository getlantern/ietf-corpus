document: rfc-8842
kind: wire-format
summary: 'The ''tls-id'' attribute value syntax is: tls-id-value = 20*255(tls-id-char), where tls-id-char = ALPHA / DIGIT / "+" / "/" / "-" / "_". The value must be between 20 and 255 characters drawn from this base64url-like alphabet.'
