document: rfc-7456
kind: normative-requirement
summary: Upon receiving an SLM packet with valid destination MEP and MD level, the reflector MUST increment its TRX counter and generate an SLR that is identical to the SLM except for updated OpCode, TRX counter, Reflector MEP ID, and transport headers.
section: 4.2.2
rfc2119_level: MUST
topics:
    - routing
    - measurement
