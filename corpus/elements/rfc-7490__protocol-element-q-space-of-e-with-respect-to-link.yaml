document: rfc-7490
kind: protocol-element
summary: Q-space of E with respect to link S-E is the set of routers from which E can be reached by normal forwarding without traversing S-E. Computed via a reverse SPT rooted at E with the subtree potentially traversing S-E excised. In cost terms, {Q} are nodes for which D_opt(Q,E) < D_opt(Q,S) + D_opt(S,E).
section: "2"
topics:
