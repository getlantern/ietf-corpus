document: rfc-1043
kind: security-consideration
summary: 'RFC 1043 contains no dedicated Security Considerations section, reflecting 1988 era practice. The DET Protection attribute (values 0–3: none, protected, alphabetic-only, numeric-only) is a UI data-entry constraint enforced by the terminal, not a cryptographic or access-control mechanism. The protocol operates over plaintext TELNET with no confidentiality, integrity, or authentication guarantees.'
section: "5"
