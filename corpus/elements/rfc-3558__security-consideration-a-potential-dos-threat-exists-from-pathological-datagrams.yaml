document: rfc-3558
kind: security-consideration
summary: A potential DoS threat exists from pathological datagrams with high decoder computational load; however, EVRC and SMV encodings do not exhibit significant non-uniformity in decoding cost. Receivers may also be overloaded by excessive packet volume from undesired sources.
