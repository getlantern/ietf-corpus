document: rfc-6871
kind: interoperability-note
summary: Media capabilities provided at the session level may be referenced by any 'pcfg' or 'lcfg' attribute at the media level (consistent with media type), while capabilities at the media level may only be referenced within that media description's 'pcfg' or 'lcfg'. Regardless of where capabilities are defined, they always instantiate as media-level attributes.
section: "3.3"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
