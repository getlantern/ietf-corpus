document: rfc-4003
kind: normative-requirement
summary: If an ERO is used to specify outgoing interface information at the egress and label recording is indicated for the LSP, the egress should include the specified interface information and the specified label or labels in the corresponding RRO.
section: "2.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
