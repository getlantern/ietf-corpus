document: rfc-3246
kind: design-rationale
summary: 'Loss conformance is handled by an off-line test: lost packets are notionally removed from the input stream, and the equations are verified against the packets that successfully traversed the node. This avoids the impossibility of requiring conformance for packets that never departed.'
