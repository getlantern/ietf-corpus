document: rfc-8739
kind: security-consideration
summary: STAR certificates eliminate explicit revocation; expiration replaces it. If an attacker obtains the private key and a post-dated first certificate during the window between Order creation and start-date, cancellation is ineffective. It is RECOMMENDED that IdOs place Orders close to the Order's start-date to minimize this window.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
    - acme
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
