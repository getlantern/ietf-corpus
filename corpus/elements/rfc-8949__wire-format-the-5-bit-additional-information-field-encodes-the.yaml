document: rfc-8949
kind: wire-format
summary: 'The 5-bit additional information field encodes the argument: values 0–23 are the argument itself; 24/25/26/27 indicate 1/2/4/8 following bytes in network byte order; values 28–30 are reserved and render the item not well-formed; value 31 signals indefinite-length encoding or the ''break'' stop code.'
