document: rfc-6088
kind: protocol-element
summary: 'The IPv6 traffic selector extends the IPv4 variant with 128-bit address ranges and adds IPv6-specific fields: a 32-bit flow label range (with the actual 24-bit flow label zero-padded to 32 bits) and an 8-bit next header range, replacing the IPv4 protocol field. Flags A through P indicate presence of each field.'
section: "3.2"
topics:
    - ip
    - mobility
