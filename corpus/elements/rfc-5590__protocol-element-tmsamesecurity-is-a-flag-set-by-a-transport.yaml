document: rfc-5590
kind: protocol-element
summary: tmSameSecurity is a flag set by a transport-aware Security Model indicating whether the Transport Model MUST enforce same-session semantics for request/response pairs. tmSessionID is a model-specific and implementation-dependent session identifier used by the Transport Model to verify that the session used for the response matches the session used for the original request.
section: 5.2.4
topics:
    - snmp
    - security
