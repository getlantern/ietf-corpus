document: rfc-6665
kind: design-rationale
summary: The SIP event notification mechanism is explicitly NOT intended to be a general-purpose infrastructure for all classes of event subscription and notification. It is scoped to SIP-specific use cases where SIP's user mobility features are relevant; use cases like network management or high-frequency GPS updates are explicitly out of scope.
section: "1"
topics:
    - sip
    - realtime
