document: rfc-8919
kind: normative-requirement
summary: Maximum reservable link bandwidth and unreserved bandwidth are RSVP-TE-specific; when advertised in the ASLA sub-TLV, bits other than the RSVP-TE R-bit MUST NOT be set. Advertisements with other bits set MUST be ignored.
section: 4.2.2
rfc2119_level: MUST NOT
