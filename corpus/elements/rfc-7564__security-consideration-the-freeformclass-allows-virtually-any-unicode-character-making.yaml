document: rfc-7564
kind: security-consideration
summary: The FreeformClass allows virtually any Unicode character, making it highly expressive but hazardous. Protocol designers are warned about code points they may not understand and are encouraged to profile the IdentifierClass wherever feasible, or to restrict FreeformClass profiles as tightly as possible.
section: "12.3"
topics:
    - security
