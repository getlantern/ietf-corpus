document: rfc-5793
kind: design-rationale
summary: PB-TNC supports half-duplex operation to enable use over EAP-based PT protocols. Although half-duplex could slow multi-round-trip exchanges, endpoint assessments rarely involve many round trips or multimedia, so the benefit of broad transport compatibility outweighs the limitation. Full-duplex is additionally supported for re-initialization scenarios.
section: "3.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
