document: rfc-5602
kind: protocol-element
summary: The pwMplsOutboundTable augments pwMplsEntry and reports or configures the current outbound MPLS tunnel or physical interface carrying PW traffic. It includes objects for MPLS-TE tunnel indexes, non-TE XC index, physical ifIndex, and the currently active tunnel type via pwMplsOutboundTunnelTypeInUse.
