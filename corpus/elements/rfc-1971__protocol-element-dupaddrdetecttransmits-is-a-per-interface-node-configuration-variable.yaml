document: rfc-1971
kind: protocol-element
summary: DupAddrDetectTransmits is a per-interface node configuration variable specifying the number of consecutive Neighbor Solicitations sent during Duplicate Address Detection. A value of zero disables DAD; the default is 1, but may be overridden by a link-type specific document.
