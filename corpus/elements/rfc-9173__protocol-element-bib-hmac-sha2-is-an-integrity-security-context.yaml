document: rfc-9173
kind: protocol-element
summary: 'BIB-HMAC-SHA2 is an integrity security context providing a keyed-hash MAC over plaintext (the IPPT) using HMAC combined with SHA-2. It supports three variants: HMAC 256/256, HMAC 384/384, and HMAC 512/512, selected via a security context parameter. The security context identifier is assigned value 1 in the BPSec Security Context Identifiers registry.'
section: "3.1"
topics:
