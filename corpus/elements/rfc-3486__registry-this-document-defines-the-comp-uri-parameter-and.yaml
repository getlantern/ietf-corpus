document: rfc-3486
kind: registry
summary: This document defines the 'comp' uri-parameter and via-extension. New values are registered by IANA when new signalling compression schemes are published in standards track RFCs. Each registration must include the scheme name and a token (SHOULD be no more than ten characters). The initial entry is 'sigcomp' for Signaling Compression.
