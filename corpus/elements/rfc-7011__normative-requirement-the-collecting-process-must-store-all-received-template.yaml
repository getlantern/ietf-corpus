document: rfc-7011
kind: normative-requirement
summary: The Collecting Process MUST store all received Template Record information for the duration of each Transport Session and MUST NOT use Templates from one Transport Session to decode Data Sets in a subsequent Transport Session. Template IDs from a given Exporting Process MUST NOT be assumed to refer to the same Templates across sessions.
section: "8"
rfc2119_level: MUST NOT
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
