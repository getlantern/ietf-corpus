document: rfc-4206
kind: normative-requirement
summary: The holding priority of an FA-LSP must be the minimum of its configured holding priority and the holding priorities of all LSPs tunneling through it, promoting the FA-LSP to higher priority when a higher-priority LSP traverses it. If configured, the holding priority of an FA-LSP is restricted to 0.
section: "6.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
