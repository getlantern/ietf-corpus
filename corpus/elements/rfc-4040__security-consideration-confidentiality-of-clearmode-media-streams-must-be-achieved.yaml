document: rfc-4040
kind: security-consideration
summary: Confidentiality of Clearmode media streams must be achieved by encryption, for example by applying the Secure RTP (SRTP) profile (RFC 3711). The payload format itself defines no additional security services beyond those in RFC 3550.
