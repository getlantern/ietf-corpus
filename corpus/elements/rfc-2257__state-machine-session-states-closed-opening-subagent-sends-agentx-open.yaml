document: rfc-2257
kind: state-machine
summary: 'Session states: Closed → Opening (subagent sends agentx-Open-PDU) → Open (master responds with assigned sessionID) → Closing (agentx-Close-PDU sent by either side or connection lost) → Closed. Session close triggers release of all MIB registrations, index allocations, and advertised agent capabilities.'
