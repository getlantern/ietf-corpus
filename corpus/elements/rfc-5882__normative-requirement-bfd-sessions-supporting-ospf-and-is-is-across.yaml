document: rfc-5882
kind: normative-requirement
summary: BFD sessions supporting OSPF and IS-IS across a single IP hop MUST operate in accordance with BFD for IPv4 and IPv6 Single Hop (RFC 5881). For OSPF Virtual Links, which may traverse an arbitrary number of hops, the multihop BFD mechanism (RFC 5883) MUST be used.
section: "10.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
