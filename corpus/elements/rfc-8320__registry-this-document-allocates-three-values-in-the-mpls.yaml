document: rfc-8320
kind: registry
summary: 'This document allocates three values in the ''MPLS Multi-Topology Identifiers'' registry (RFC 7307): 3945 (Rainbow MRT MPLS MT-ID), 3946 (Default Profile MRT-Red MPLS MT-ID), and 3947 (Default Profile MRT-Blue MPLS MT-ID). It also redesignates the range 3948-3995 as ''Unassigned (for future MRT-related values)'' with Standards Action registration procedure.'
