document: rfc-8909
kind: interoperability-note
summary: 'The definitions of ''Incremental'' and ''Differential'' deposits in this document differ from their common meanings in data backup contexts: Incremental is relative to the last Full Deposit, while Differential is relative to the last deposit of any type (Full, Incremental, or Differential).'
