document: rfc-7110
kind: normative-requirement
summary: If the Reply via Specified Path mode is requested, the Reply Path TLV MUST be included in the echo request message; its absence is treated as a malformed echo request. Furthermore, if a Reply Path TLV is included in an echo request, a Reply Path TLV MUST be included in the corresponding echo reply.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
