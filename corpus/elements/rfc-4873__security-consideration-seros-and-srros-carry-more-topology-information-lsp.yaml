document: rfc-4873
kind: security-consideration
summary: SEROs and SRROs carry more topology information (LSP path details) than simple EROs and RROs, meaning interception of a signaling message reveals slightly more network state. This is judged a minor risk since the information is already available via routing. No new signaling messages or changed control-plane adjacency relationships are introduced.
section: "8"
topics:
    - security
    - routing
    - mpls
