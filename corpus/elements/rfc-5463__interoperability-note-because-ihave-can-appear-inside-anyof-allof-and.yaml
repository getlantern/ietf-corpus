document: rfc-5463
kind: interoperability-note
summary: Because 'ihave' can appear inside 'anyof', 'allof', and 'not' tests, full parse-time checking of 'ihave' is very difficult to implement; the spec acknowledges this and permits deferring all checking to run time.
