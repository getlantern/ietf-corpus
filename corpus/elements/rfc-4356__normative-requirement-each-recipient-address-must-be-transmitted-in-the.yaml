document: rfc-4356
kind: normative-requirement
summary: Each recipient address MUST be transmitted in the SMTP envelope as a RCPT TO value. At least one 'To:', 'Cc:', or 'Bcc:' header MUST be present in the Internet message; if none exist, a 'To:' header using empty group syntax SHOULD be created.
section: 2.1.3.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
