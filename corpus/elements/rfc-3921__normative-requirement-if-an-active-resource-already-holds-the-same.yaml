document: rfc-3921
kind: normative-requirement
summary: If an active resource already holds the same resource identifier, the server MUST either terminate the existing active resource and allow the new session, or disallow the new session while maintaining the existing one; implementing the first case is RECOMMENDED.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
