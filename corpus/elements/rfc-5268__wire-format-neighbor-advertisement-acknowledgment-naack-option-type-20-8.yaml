document: rfc-5268
kind: wire-format
summary: 'Neighbor Advertisement Acknowledgment (NAACK) option (Type 20): 8-byte Neighbor Discovery option with an 8-bit Status field. Status values 1–4 direct the MN to reconfigure its CoA; Status 128 indicates unrecognized link-layer address. Length is 3 when a new CoA is present.'
