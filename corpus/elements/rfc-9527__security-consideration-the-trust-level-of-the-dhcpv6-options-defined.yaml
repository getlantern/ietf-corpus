document: rfc-9527
kind: security-consideration
summary: The trust level of the DHCPv6 options defined here is comparable to that of the IP prefix provisioned via DHCPv6; an attacker who can subvert DHCPv6 can redirect the HNA to a malicious DM or RDM. The security considerations of RFC 8415 apply.
section: "7"
topics:
    - security
    - dns
