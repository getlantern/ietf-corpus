document: rfc-3946
kind: wire-format
summary: 'The SONET/SDH label (SUKLM format) is a 32-bit field: S (16 bits, index of STS-3/AUG-1 within STS-N/STM-N), U (4 bits, index of STS-1_SPE/VC-3 within STS-3/AUG-1), K (4 bits, index of TUG-3 within VC-4), L (4 bits, index of VT_Group/TUG-2), and M (4 bits, index of specific VT or VC signal within VT_Group/TUG-2). Fields use 1-based indexing; zero indicates non-significant or ignored.'
