document: rfc-3720
kind: normative-requirement
summary: An iSCSI name MUST be a UTF-8 encoding of a Unicode string in Normalization Form C, using only characters allowed by the iSCSI stringprep template (RFC 3722), and MUST NOT exceed 223 bytes. The stringprep process converts strings to equivalent lower-case representations.
section: 3.2.6.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
