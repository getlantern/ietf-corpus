document: rfc-9147
kind: normative-requirement
summary: TLS_AES_128_CCM_8_SHA256 MUST NOT be used in DTLS without additional safeguards against forgery, because AEAD_AES_128_CCM_8 has no single authentication-failure limit that both bounds forgery probability and avoids denial-of-service risk simultaneously.
section: 4.5.3
rfc2119_level: MUST NOT
topics:
    - tls
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
