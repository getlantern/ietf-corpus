kind: protocol-element
summary: 'rpMauJabberState (and ifMauJabberState) reports jabber condition with values: other(1), unknown(2), noJabber(3), jabbering(4). Agents must always return other(1) for MAU type dot3MauTypeAUI; for AUI/100BASE-T4/TX/FX, the jabberingStateEnters counter always reads zero.'
