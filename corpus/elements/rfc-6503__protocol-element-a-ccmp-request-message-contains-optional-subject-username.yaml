summary: 'A CCMP request message contains: optional <subject> (username/password), optional <confUserID> (XCON-USERID, REQUIRED except for a first-time user entry), optional <confObjID> (XCON-URI of target object), optional <operation> (REQUIRED in all requests except blueprintsRequest and confsRequest), optional <conference-password>, and a REQUIRED specialized request message element.'
