summary: 'IANA updated the ''EAP-AKA and EAP-SIM Parameters'' registry: AT_KDF_INPUT (23) and AT_KDF (24) in the Non-Skippable Attributes subregistry, and AT_BIDDING (136) in the Skippable Attributes subregistry, now reference RFC 9048. The ''EAP-AKA'' AT_KDF Key Derivation Function Values'' subregistry defines value 0 (Reserved) and value 1 (EAP-AKA'' with CK''/IK''), with new values requiring Specification Required policy.'
