document: rfc-7112
kind: wire-format
summary: The ICMPv6 error message for a non-compliant First Fragment uses Type 4 ("Parameter Problem"), Code 3 ("First Fragment has incomplete IPv6 Header Chain"), with the Pointer field set to zero. This format is the same whether originated by a host or an intermediate system.
