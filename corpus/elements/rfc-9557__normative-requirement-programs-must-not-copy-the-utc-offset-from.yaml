document: rfc-9557
kind: normative-requirement
summary: Programs MUST NOT copy the UTC offset from a timestamp into an offset time zone suffix merely to satisfy a program requiring a time zone suffix. Doing so incorrectly asserts that the local UTC offset will never change, producing wrong results for date arithmetic across DST transitions.
section: "1.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
