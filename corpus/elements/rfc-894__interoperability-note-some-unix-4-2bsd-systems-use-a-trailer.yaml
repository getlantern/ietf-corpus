document: rfc-894
kind: interoperability-note
summary: Some Unix 4.2bsd systems use a trailer encapsulation method for better performance with VAX virtual memory architecture. No host is required to implement it, and datagrams in trailer format must not be sent to a host unless the sender has positive knowledge the recipient can interpret them.
section: Trailer Formats
topics:
    - ip
