document: rfc-3287
kind: normative-requirement
summary: In dsmonHostCtlTable, the protocolDirLocalIndex in the INDEX clause MUST identify a network protocol encapsulation that contains a DS field (e.g., IPv4 or IPv6). For multi-layer encapsulations, the innermost network protocol layer is used.
section: 3.2.4
