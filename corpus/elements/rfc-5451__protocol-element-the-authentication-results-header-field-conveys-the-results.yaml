document: rfc-5451
kind: protocol-element
summary: The Authentication-Results header field conveys the results of message authentication checks (DKIM, SPF, Sender-ID, SMTP AUTH, iprev) in a machine-readable format. It consists of an authserv-id, optional version, and one or more method=result statements with optional reason and property=value pairs.
section: "2.1"
topics:
