document: rfc-4790
kind: interoperability-note
summary: ACAP and Sieve used collations prior to this specification and do not meet all application protocol requirements in Section 5. Both allow i;octet working directly on UTF-8 data. In Sieve, 'undefined' and 'no-match' results are treated as false; in IMAP, the default collation is i;ascii-casemap.
section: "6"
topics:
