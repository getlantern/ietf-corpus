document: rfc-8967
kind: normative-requirement
summary: If the packet contains no PC TLV, the packet MUST be dropped. If the neighbour's Index is absent or differs from the Index in the received PC TLV, a challenge MUST be sent and the packet MUST be dropped.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
