document: rfc-3597
kind: design-rationale
summary: Deploying a new RR type previously required changes to authoritative servers, slave servers, caching resolvers, and forwarders. This memo addresses the slow and expensive nature of DNS server software deployment by enabling transparent handling of unknown types without server changes.
section: "1"
topics:
    - dns
