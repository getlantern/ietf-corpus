document: rfc-6276
kind: normative-requirement
summary: DHCPv6 messages from the mobile router to the home agent MUST use the Home Address destination option (unicast from home address to home agent's global unicast address). DHCPv6 replies from the home agent to the mobile router MUST be sent using Routing Header type 2.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
