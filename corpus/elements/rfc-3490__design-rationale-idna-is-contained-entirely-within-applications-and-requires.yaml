document: rfc-3490
kind: design-rationale
summary: IDNA is contained entirely within applications and requires no changes to DNS servers, resolvers, or protocol elements, because the ASCII name service provided by existing DNS is entirely sufficient. This enables IDNs to be introduced with no changes to any shared infrastructure.
section: "1"
topics:
