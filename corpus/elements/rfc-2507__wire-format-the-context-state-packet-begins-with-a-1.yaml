document: rfc-2507
kind: wire-format
summary: The CONTEXT_STATE packet begins with a 1-octet type code (value 3 for TCP header requests), followed by a 1-octet count of CIDs, then that many 1-octet CIDs identifying TCP streams that have lost synchronization. The packet requires no IP header because it is sent over a single link.
