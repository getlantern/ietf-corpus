document: rfc-1406
kind: design-rationale
summary: A design decision was made to closely align the MIB with the set of objects that can generally be read from DS1 devices currently deployed. The intent is to facilitate common management of all devices with DS1 interfaces (multiplexors, CSUs, DSUs) rather than exhaustively modeling all conceivable DS1 management functions.
section: "3.2"
topics:
