document: rfc-8838
kind: normative-requirement
summary: An agent indicating Trickle ICE support via the 'trickle' ICE option MUST provide that token either at the session level or for every data stream; an agent MUST NOT specify Trickle ICE support for some data streams but not others.
section: "3"
rfc2119_level: MUST NOT
