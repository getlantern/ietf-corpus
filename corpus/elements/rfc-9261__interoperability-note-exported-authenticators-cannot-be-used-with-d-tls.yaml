document: rfc-9261
kind: interoperability-note
summary: Exported Authenticators cannot be used with (D)TLS 1.2 ciphersuites that do not use the TLS PRF, nor with TLS 1.3 ciphersuites lacking an associated hash function. The minimum supported versions are TLS 1.2 and DTLS 1.2.
section: "5.1"
topics:
    - tls
