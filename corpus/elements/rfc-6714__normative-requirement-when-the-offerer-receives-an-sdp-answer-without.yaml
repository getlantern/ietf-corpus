document: rfc-6714
kind: normative-requirement
summary: When the offerer receives an SDP answer without an 'msrp-cema' attribute and certain mismatch conditions hold (middlebox detected in c/m-line with passive role, offerer-uses-relay with active role, or answerer-uses-relay with active offerer), the offerer MUST fall back to RFC 4975 behavior and send a new SDP offer without 'msrp-cema'.
section: "4.2"
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
