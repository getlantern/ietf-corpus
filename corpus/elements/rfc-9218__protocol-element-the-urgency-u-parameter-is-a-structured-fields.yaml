document: rfc-9218
kind: protocol-element
summary: The urgency (u) parameter is a Structured Fields Integer between 0 (highest priority) and 7 (lowest) inclusive, with a default of 3. Urgency 7 is reserved for background tasks such as software updates and SHOULD NOT be used for responses that affect user interaction.
