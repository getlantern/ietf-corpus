document: rfc-3203
kind: interoperability-note
summary: When a client uses DHCP INFORM (address obtained via other means), FORCERENEW triggers a new INFORM request only; it must not override manually configured parameters, and its scope is limited to DHCP-eligible options.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
