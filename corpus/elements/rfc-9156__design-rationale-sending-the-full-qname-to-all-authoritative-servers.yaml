document: rfc-9156
kind: design-rationale
summary: Sending the full QNAME to all authoritative servers was a tradition rather than a protocol requirement, originating from a desire to optimise request counts when the same name server was authoritative for many zones or was both recursive and authoritative — conditions far less common in modern DNS.
section: "1"
topics:
    - dns
    - privacy
