document: rfc-9323
kind: design-rationale
summary: The transport mechanism for RSC files is deliberately left unspecified. The RFC gives examples including USB sticks, HTTPS-secured web interfaces, PGP-signed email, QR code T-shirts, and carrier pigeons, reflecting that RSCs are decoupled from the RPKI repository infrastructure.
section: "2"
topics:
