document: rfc-9793
kind: normative-requirement
summary: If the label associated with the Maximum SI exceeds the 20-bit range, the BIER MPLS Encapsulation sub-TLV containing the error MUST be ignored. If the same BitString length is repeated in multiple BIER MPLS Encapsulation sub-TLVs inside the same BIER TLV, all such sub-TLVs MUST be ignored.
section: "3.1"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
