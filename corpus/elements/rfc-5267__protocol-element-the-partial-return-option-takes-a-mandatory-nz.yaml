document: rfc-5267
kind: protocol-element
summary: The PARTIAL return option takes a mandatory nz-number:nz-number range argument (first result = 1) and causes the server to return only that window of results in a PARTIAL return data item; if the range extends beyond available results, the server returns only the results that exist, and NIL if there are none.
section: "4.4"
topics:
    - email
