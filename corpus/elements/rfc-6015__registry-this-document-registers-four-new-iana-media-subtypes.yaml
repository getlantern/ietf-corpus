document: rfc-6015
kind: registry
summary: 'This document registers four new IANA media subtypes: audio/1d-interleaved-parityfec, video/1d-interleaved-parityfec, text/1d-interleaved-parityfec, and application/1d-interleaved-parityfec. All four require parameters rate (Hz), L (columns, 1–255), D (rows, 1–255), and repair-window (microseconds); all are restricted to RTP transport.'
section: "5.1"
topics:
    - rtp
    - realtime
    - registry
