document: rfc-5040
kind: state-machine
summary: 'RDMAP Stream lifecycle has two teardown modes: graceful termination (RDMAP Graceful Termination, Section 6.2) allows all in-progress and pending RDMA Operations to complete, while abortive termination (Section 6.2.1) closes the RDMAP Stream immediately via a Terminate Message without completing pending operations.'
section: "6"
