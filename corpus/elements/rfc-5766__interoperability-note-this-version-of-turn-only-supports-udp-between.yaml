document: rfc-5766
kind: interoperability-note
summary: This version of TURN only supports UDP between the server and peers and only supports IPv4. Extensions for TCP relay (TURN-TCP) and IPv6/IPv4-IPv6 relaying (TURN-IPv6) are planned in separate specifications.
