document: rfc-3264
kind: state-machine
summary: 'Session lifecycle: an agent begins with no session; an initial offer starts a pending state; if answered the session is established; if rejected the session reverts to its prior state. At any time either party may issue a new offer to modify the session, but not while a prior offer is outstanding.'
