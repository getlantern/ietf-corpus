document: rfc-7158
kind: interoperability-note
summary: Good number interoperability can be achieved by implementations that expect no more precision or range than IEEE 754-2008 binary64 (double precision). Integers in the range [-(2**53)+1, (2**53)-1] are exactly interoperable; numbers like 1E400 or high-precision decimals indicate potential interoperability problems.
