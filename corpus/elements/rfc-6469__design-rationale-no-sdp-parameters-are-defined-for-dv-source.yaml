document: rfc-6469
kind: design-rationale
summary: No SDP parameters are defined for DV 'source' and 'source control' attributes (video signal type, frame rate, aspect ratio, audio parameters) because describing all combinations would require excessively large signaling descriptions. Instead, this information is carried in-band via VAUX and AAUX DIF blocks.
section: "2.3"
topics:
