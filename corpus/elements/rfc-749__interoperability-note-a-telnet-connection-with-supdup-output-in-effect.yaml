document: rfc-749
kind: interoperability-note
summary: A TELNET connection with SUPDUP-OUTPUT in effect but with no subnegotiation blocks transmitted is indistinguishable from a normal TELNET connection; IAC IP and all other TELNET commands remain valid throughout.
