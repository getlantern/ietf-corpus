document: rfc-4310
kind: security-consideration
summary: 'Acceptance of a false key by a server operator can produce significant operational consequences: child and parent zones MUST be consistent to secure the delegation properly, and inconsistent signatures will cause the delegation to disappear from the secure namespace, yielding untrustworthy query responses.'
