document: rfc-7792
kind: interoperability-note
summary: There are no differences between the signaling procedures for LSP control in flexi-grid networks (RFC 7698) and those for fixed-grid networks (RFC 7689); only the TSpec, FlowSpec, and label formats differ. Both distributed SA and centralized SA procedures can be applied.
