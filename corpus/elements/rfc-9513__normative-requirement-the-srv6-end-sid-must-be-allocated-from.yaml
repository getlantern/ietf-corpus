document: rfc-9513
kind: normative-requirement
summary: The SRv6 End SID MUST be allocated from its associated locator; End SIDs not allocated from the associated locator MUST be ignored. Every SRv6-enabled OSPFv3 router SHOULD advertise at least one End SID for itself.
section: "8"
rfc2119_level: MUST
topics:
    - routing
    - ip
