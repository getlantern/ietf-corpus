document: rfc-2631
kind: normative-requirement
summary: Leading zeros in ZZ MUST be preserved so that ZZ occupies as many octets as p. For example, if p is 1024 bits, ZZ must be 128 bytes long.
section: 2.1.2
rfc2119_level: MUST
