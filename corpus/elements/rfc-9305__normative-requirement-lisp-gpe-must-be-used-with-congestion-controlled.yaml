document: rfc-9305
kind: normative-requirement
summary: LISP-GPE MUST be used with congestion-controlled traffic or within a traffic-managed controlled environment (TMCE) to avoid congestion, since LISP-GPE itself provides no congestion-control functionality.
section: "4.2"
rfc2119_level: MUST
topics:
