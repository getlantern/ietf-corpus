document: rfc-2022
kind: protocol-element
summary: A Cluster is defined as the set of ATM interfaces choosing to participate in direct ATM connections for multicasting AAL_SDUs between themselves, all sharing a common MARS. Each cluster has a ClusterControlVC (point-to-multipoint VC from MARS to all cluster members) and, when MCSs are in use, a ServerControlVC (point-to-multipoint VC to all registered MCSs).
section: "1.2"
topics:
    - multicast
