document: rfc-2997
kind: design-rationale
summary: The Null Service does not require per-flow RSVP processing at every network node. Significant benefits can be realized even when RSVP messages are processed only at key nodes such as domain boundaries, first-hop routers, or PEPs. Individual nodes should be enabled or disabled for RSVP processing at the network administrator's discretion.
section: 3.1.1
topics:
