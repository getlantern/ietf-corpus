document: rfc-8012
kind: security-consideration
summary: The security measures of RFC 4379, RFC 6424, and RFC 6790 all apply to this extension. RFC 4379 already covers Denial-of-Service attacks by regulating LSP ping traffic going to the control plane. RFC 6424 provides guidelines for operators who want to prevent tracing or avoid exposing tunnel details.
section: "10"
topics:
