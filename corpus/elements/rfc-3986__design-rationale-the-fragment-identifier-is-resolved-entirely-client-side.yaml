document: rfc-3986
kind: design-rationale
summary: The fragment identifier is resolved entirely client-side and is not sent to the origin server. This design prevents information providers from denying reference authors the right to link selectively to portions of a resource, and keeps fragment semantics extensible via media type definitions without requiring new URI schemes.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
