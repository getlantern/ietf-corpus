document: rfc-5755
kind: protocol-element
summary: The noRevAvail extension (id-ce-noRevAvail, { id-ce 56 }) signals that no revocation information will be made available for the AC. Its DER encoding is NULL ('0500'H) and it MUST be non-critical. An AC MUST NOT contain both noRevAvail and a pointer-in-AC revocation extension.
section: 4.3.6
topics:
    - pkix
    - security
