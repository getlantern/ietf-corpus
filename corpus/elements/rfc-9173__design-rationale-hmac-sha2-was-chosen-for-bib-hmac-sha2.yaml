document: rfc-9173
kind: design-rationale
summary: HMAC-SHA2 was chosen for BIB-HMAC-SHA2 because symmetric keys allow it to be used where public-key infrastructure is impractical (as in DTN environments) and because HMAC-SHA2 is a well-supported, well-understood mechanism with multiple available implementations.
