document: rfc-7689
kind: design-rationale
summary: The WSON Processing Hop Attribute TLV is encoded as an attributes TLV per RFC 5420 and carried in ERO/RRO Hop Attributes subobjects per RFC 7570, reusing existing GMPLS per-hop attribute machinery rather than defining a new signaling object, allowing targeted per-node configuration along an LSP.
section: "4.2"
topics:
