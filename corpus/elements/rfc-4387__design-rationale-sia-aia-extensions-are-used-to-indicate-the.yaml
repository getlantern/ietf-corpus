document: rfc-4387
kind: design-rationale
summary: SIA/AIA extensions are used to indicate the CRL store interface rather than the CRLDistributionPoint (CRLDP) extension because CRLDP points to a single static CRL for one certificate, while SIA/AIA indicates how to access CA information and services for any certificate issued by the CA.
section: 3.5.3
