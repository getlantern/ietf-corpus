document: rfc-3643
kind: protocol-element
summary: The Frame Length field (10 bits) contains the total length of the FC Encapsulated frame including the header and the FC frame (with SOF and EOF), expressed in units of 32-bit words. The -Frame Length field contains its one's complement.
