document: rfc-5886
kind: normative-requirement
summary: When the C (Overload) bit is set in the MONITORING object of a request, an OVERLOAD object MUST be inserted in the corresponding PCMonRep or PCRep message if the PCE is experiencing a congested state.
section: "4.1"
rfc2119_level: MUST
topics:
