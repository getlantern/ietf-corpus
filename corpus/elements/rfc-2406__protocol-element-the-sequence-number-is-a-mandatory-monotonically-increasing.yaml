document: rfc-2406
kind: protocol-element
summary: The Sequence Number is a mandatory, monotonically increasing unsigned 32-bit counter that is always present even if the receiver does not enable anti-replay. Both sender and receiver counters are initialized to 0 when an SA is established; the first packet has Sequence Number 1.
section: "2.2"
topics:
    - ipsec
    - security
