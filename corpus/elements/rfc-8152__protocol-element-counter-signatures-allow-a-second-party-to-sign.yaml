document: rfc-8152
kind: protocol-element
summary: Counter signatures allow a second party to sign an existing COSE object (e.g., a timestamp proof). They may appear as an unprotected attribute in COSE_Sign1, COSE_Signature, COSE_Encrypt, COSE_recipient, COSE_Encrypt0, COSE_Mac, or COSE_Mac0. Only signature-with-appendix algorithms may be used for counter signatures.
section: "4.5"
topics:
    - crypto
    - security
