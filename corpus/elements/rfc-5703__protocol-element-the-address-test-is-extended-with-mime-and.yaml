document: rfc-5703
kind: protocol-element
summary: The 'address' test is extended with ':mime' and ':anychild' tagged arguments, causing it to parse MIME header lines as address headers. Without ':mime'/':anychild', it operates only on top-level header fields as in RFC 5228.
section: "4.2"
topics:
    - email
