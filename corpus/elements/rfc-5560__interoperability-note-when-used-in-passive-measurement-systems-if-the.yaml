document: rfc-5560
kind: interoperability-note
summary: When used in passive measurement systems, if the source can send two identical packets within [T, T+T0], they will be incorrectly labeled as duplicates (false positive). The implementor must estimate whether this scenario is likely and what false positive rate is acceptable.
section: "2.5"
topics:
    - measurement
