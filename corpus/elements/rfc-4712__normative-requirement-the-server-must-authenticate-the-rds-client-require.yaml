document: rfc-4712
kind: normative-requirement
summary: The server MUST authenticate the RDS client (require a client certificate and private-key proof) when deployment is susceptible to man-in-the-middle or spoofing attacks. Deployments requiring sensitive data protection MUST negotiate a ciphersuite with a bulk encryption algorithm of appropriate strength.
section: 2.2.1.6
rfc2119_level: MUST
topics:
    - tls
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
