document: rfc-7581
kind: protocol-element
summary: The Resource Block Set (RB Set) Field identifies one or more resource blocks within a WSON node. It uses an Action field (8 bits) to indicate either an inclusive list (Action=0) or inclusive range(s) (Action=1) of 32-bit RB identifiers, plus a Connectivity (C) bit, a Reserved field, a 16-bit Length, and variable-length RB Identifier entries.
section: "2.1"
topics:
