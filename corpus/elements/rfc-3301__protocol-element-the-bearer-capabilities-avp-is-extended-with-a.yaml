document: rfc-3301
kind: protocol-element
summary: 'The Bearer Capabilities AVP is extended with a B bit: if set, the sender supports broadband (ATM) access. Outgoing call attempts with Bearer Type B while Bearer Capabilities lacks B are rejected with Result Code 5.'
