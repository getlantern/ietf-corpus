document: rfc-8323
kind: design-rationale
summary: Although block-wise transfer is no longer required for IP-fragmentation avoidance over TCP, it remains applicable for large messages (to avoid head-of-line blocking) and for UDP-to-TCP gateways that cannot reconstruct a complete body without block context.
