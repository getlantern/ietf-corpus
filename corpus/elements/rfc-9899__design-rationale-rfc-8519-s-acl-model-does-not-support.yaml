document: rfc-9899
kind: design-rationale
summary: RFC 8519's ACL model does not support lists of IP prefixes, requiring a separate ACE per prefix. This leads to suboptimal configuration for DDoS mitigation and large-scale networks where hundreds of prefixes may be involved. The enhanced module introduces prefix sets to address this gap.
section: A.1
topics:
    - yang
    - netconf
    - security
