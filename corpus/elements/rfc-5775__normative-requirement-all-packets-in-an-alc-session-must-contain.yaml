document: rfc-5775
kind: normative-requirement
summary: All packets in an ALC session MUST contain an FEC Payload ID in a format compliant with the FEC Scheme in use. The receiver MUST use the FEC Payload ID to determine how encoding symbols in the packet payload were generated from the object.
section: "2.3"
rfc2119_level: MUST
topics:
    - multicast
    - realtime
