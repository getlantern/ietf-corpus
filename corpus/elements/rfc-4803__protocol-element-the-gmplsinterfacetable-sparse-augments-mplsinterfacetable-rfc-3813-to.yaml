document: rfc-4803
kind: protocol-element
summary: 'The gmplsInterfaceTable sparse-augments mplsInterfaceTable (RFC 3813) to enable GMPLS capability on MPLS interfaces. It contains two objects: gmplsInterfaceSignalingCaps (BITS indicating RSVP-GMPLS, CR-LDP-GMPLS, or other signaling) and gmplsInterfaceRsvpHelloPeriod (Unsigned32, milliseconds, default 3000).'
