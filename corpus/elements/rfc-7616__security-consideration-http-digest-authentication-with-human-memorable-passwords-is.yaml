document: rfc-7616
kind: security-consideration
summary: HTTP Digest Authentication with human-memorable passwords is vulnerable to dictionary attacks. It SHOULD be used only with passwords of at least 128 bits of entropy, and SHOULD be used only over a secure channel such as HTTPS.
section: "5.1"
topics:
    - security
    - http
