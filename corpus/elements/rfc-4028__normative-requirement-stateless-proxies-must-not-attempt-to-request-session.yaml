document: rfc-4028
kind: normative-requirement
summary: Stateless proxies MUST NOT attempt to request session timers. Proxies that ask for session timers SHOULD record-route, as they won't receive refreshes if they don't.
section: "8"
rfc2119_level: MUST NOT
