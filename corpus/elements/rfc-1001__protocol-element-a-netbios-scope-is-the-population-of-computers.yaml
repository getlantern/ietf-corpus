document: rfc-1001
kind: protocol-element
summary: A NetBIOS Scope is the population of computers across which a registered NetBIOS name is known; it is identified by a scope identifier that meets DNS domain name syntax requirements. An internet may support multiple non-intersecting NetBIOS scopes.
