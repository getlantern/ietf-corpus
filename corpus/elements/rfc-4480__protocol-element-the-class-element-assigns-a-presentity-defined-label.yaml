document: rfc-4480
kind: protocol-element
summary: The <class> element assigns a presentity-defined label grouping similar person, device, or service elements within a presence document. Each person, service, or device may carry only one class label; its content is not presented to watchers but is used for filtering or authorization.
section: "3.3"
