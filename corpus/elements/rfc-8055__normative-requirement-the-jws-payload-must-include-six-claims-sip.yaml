document: rfc-8055
kind: normative-requirement
summary: 'The JWS Payload MUST include six claims: ''sip_from_tag'' (From tag), ''sip_date'' (Date header in NumericDate format), ''sip_callid'' (Call-ID), ''sip_cseq_num'' (CSeq numeric value), ''sip_via_branch'' (Via branch parameter), and ''sip_via_opid'' (operator identifier from the same Via field).'
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
