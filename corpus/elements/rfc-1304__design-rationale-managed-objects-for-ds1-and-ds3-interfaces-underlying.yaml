kind: design-rationale
summary: Managed objects for DS1 and DS3 interfaces underlying SIP (the physical layer) are explicitly excluded from this MIB and delegated to RFC 1232 and RFC 1233 respectively. This document covers only the SIP-specific protocol levels (L2, L3, PLCP) to avoid duplication.
