document: rfc-6864
kind: normative-requirement
summary: All devices that examine IPv4 headers MUST ignore the IPv4 ID field of atomic datagrams. This applies to intermediate routers, destination hosts, NATs, firewalls, and tunnel egresses.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - nat
