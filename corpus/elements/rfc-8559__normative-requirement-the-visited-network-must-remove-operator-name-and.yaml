document: rfc-8559
kind: normative-requirement
summary: The visited network MUST remove Operator-Name and Operator-NAS-Identifier from a CoA packet prior to sending it to the final CoA server (NAS), and MUST ensure the packet contains one of NAS-IP-Address, NAS-IPv6-Address, or NAS-Identifier before delivery to the NAS.
section: "4.2"
rfc2119_level: MUST
topics:
    - radius
