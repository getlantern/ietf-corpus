document: rfc-2603
kind: design-rationale
summary: ILMI-based Server Discovery was introduced to eliminate the need for static ATM address configuration on each NHRP host or router, and to enable diskless hosts (which cannot have local configuration) to use NHRP. This solves the cumbersome and error-prone nature of manual NHRP configuration.
