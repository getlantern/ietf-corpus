document: rfc-4145
kind: normative-requirement
summary: As soon as an endpoint notices that it needs to terminate a TCP connection, it SHOULD do so. Endpoints typically do not close until session expiry, explicit termination, or a new connection value is provided.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - tcp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
