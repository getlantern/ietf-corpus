document: rfc-6389
kind: normative-requirement
summary: An LSR that generates an upstream-assigned label request to a neighbor for a given FEC MUST NOT send a downstream label mapping to that neighbor for that FEC unless it first withdraws the upstream-assigned label binding, and vice versa.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
