document: rfc-8030
kind: protocol-element
summary: 'The Urgency header field accepts one of four values: ''very-low'', ''low'', ''normal'', or ''high'', indicating message urgency. A push message without the Urgency header field defaults to ''normal''. Multiple Urgency values MUST NOT be included in a single request.'
section: "5.3"
topics:
    - http
