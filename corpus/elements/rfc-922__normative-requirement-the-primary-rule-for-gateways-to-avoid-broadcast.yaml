document: rfc-922
kind: normative-requirement
summary: 'The primary rule for gateways to avoid broadcast loops is: never retransmit a broadcast datagram on the hardware network it was received on. Simply avoiding repetition of self-originated datagrams is insufficient because multiple gateways on the same network can still create loops.'
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - ip
