document: rfc-9855
kind: design-rationale
summary: SR eliminates the need for Targeted LDP sessions required by RLFA and DLFA, since all SIDs needed for repair paths are present in the IGP Link State Database. This removes the need to prefer LFAs over RLFAs/DLFAs or to minimize the number of repair nodes.
