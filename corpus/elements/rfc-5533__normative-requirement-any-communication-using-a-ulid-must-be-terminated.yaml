document: rfc-5533
kind: normative-requirement
summary: Any communication using a ULID MUST be terminated when the ULID becomes invalid (i.e., when its underlying prefix becomes invalid). This prevents the prefix from being reassigned to another site while it is still in use via a different locator.
section: "1.5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
