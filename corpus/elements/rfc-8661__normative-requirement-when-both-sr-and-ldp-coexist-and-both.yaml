document: rfc-8661
kind: normative-requirement
summary: When both SR and LDP coexist and both propose an IP2MPLS entry for the same IP prefix, the LDP route SHOULD be selected by default, because SR is typically introduced into networks containing non-SR routers and LDP preference avoids traffic disruption.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
