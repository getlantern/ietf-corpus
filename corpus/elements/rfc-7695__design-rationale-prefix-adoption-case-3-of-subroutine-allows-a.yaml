document: rfc-7695
kind: design-rationale
summary: Prefix adoption (case 3 of subroutine) allows a Node connected to the same Shared Link to continue advertising a prefix after the original advertiser disappears, providing seamless assignment transfer and avoiding renumbering on Node failure. Adoption SHOULD be preferred over destroying and reassigning.
section: "4.1"
topics:
    - routing
    - ip
