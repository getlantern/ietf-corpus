document: rfc-7105
kind: protocol-element
summary: The 'source' element, added to the 'geopriv' element of a PIDF-LO, identifies the type of measurement source contributing to location information. Defined values are 'lis' (LIS-validated data), 'device' (unvalidated Device-provided data, MUST be included if applicable), and 'other' (third-party data, MUST be included unless the third party is trusted).
section: "4.4"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
