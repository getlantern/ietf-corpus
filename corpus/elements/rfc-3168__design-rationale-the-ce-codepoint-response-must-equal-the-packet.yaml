document: rfc-3168
kind: design-rationale
summary: 'The CE codepoint response MUST equal the packet-drop response to ensure fairness during incremental deployment: if CE triggered a weaker reaction than a drop, flows routed through ECN-capable routers would be advantaged over those routed through drop-only routers.'
