document: rfc-1533
kind: protocol-element
summary: Vendor Specific Information option (code 43, minimum 1 octet) allows clients and servers to exchange opaque vendor-specific data. If a vendor encodes multiple items, the content SHOULD use encapsulated code/length/value sub-options using the same TLV syntax, but without a magic cookie, and with codes redefinable by the vendor.
section: "8.4"
topics:
    - ip
