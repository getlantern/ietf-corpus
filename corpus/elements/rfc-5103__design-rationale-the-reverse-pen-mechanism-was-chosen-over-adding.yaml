document: rfc-5103
kind: design-rationale
summary: The Reverse PEN mechanism was chosen over adding explicit reverse IEs to the IANA registry because new IEs can be freely added to the IANA-managed space without concern for reverse counterparts. Once the PEN is allocated, there is no additional maintenance overhead for supporting Reverse IEs in the IPFIX Information Model.
section: "6.1"
topics:
    - measurement
    - registry
