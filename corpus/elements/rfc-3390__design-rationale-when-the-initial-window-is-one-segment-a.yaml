document: rfc-3390
kind: design-rationale
summary: When the initial window is one segment, a receiver using delayed ACKs must wait for a timeout (up to 200–500 ms) before generating an ACK. An initial window of at least two segments eliminates this wait, motivating the increase.
section: "3"
topics:
