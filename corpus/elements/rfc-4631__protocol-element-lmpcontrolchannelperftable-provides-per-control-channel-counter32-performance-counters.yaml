document: rfc-4631
kind: protocol-element
summary: 'lmpControlChannelPerfTable provides per-control-channel Counter32 performance counters for all LMP message families: Config, Hello, BeginVerify/EndVerify, TestStatusSuccess/Failure, LinkSummary, ChannelStatus, and ChannelStatusRequest/Response, plus octet, discard, and error counts. lmpCcCounterDiscontinuityTime tracks counter resets.'
