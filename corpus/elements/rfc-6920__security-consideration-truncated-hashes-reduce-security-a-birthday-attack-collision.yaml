document: rfc-6920
kind: security-consideration
summary: 'Truncated hashes reduce security: a birthday-attack collision requires O(2^(N/2)) work against an N-bit hash. 32-bit truncated hashes are essentially useless for security; applications using less than 100-bit hashes have limited security properties.'
section: "10"
topics:
