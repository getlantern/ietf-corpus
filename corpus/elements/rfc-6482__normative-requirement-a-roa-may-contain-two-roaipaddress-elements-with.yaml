document: rfc-6482
kind: normative-requirement
summary: A ROA MAY contain two ROAIPAddress elements with identical IP address prefixes, but this is NOT RECOMMENDED because the element with the shorter maxLength grants no additional privileges and can be omitted without changing the ROA's meaning.
