document: rfc-5231
kind: normative-requirement
summary: An implementation MUST ensure that the test for envelope 'to' only reflects the delivery to the current user; it MUST NOT be possible for a user to determine if the message was delivered to someone else.
section: "10"
rfc2119_level: MUST
topics:
    - email
    - security
    - privacy
