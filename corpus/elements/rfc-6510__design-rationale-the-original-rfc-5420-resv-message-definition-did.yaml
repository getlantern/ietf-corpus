document: rfc-6510
kind: design-rationale
summary: The original RFC 5420 Resv message definition did not provide BNF and was ambiguous for P2MP LSPs, preventing different egress LSRs from reporting different operational statuses per S2L sub-LSP. This document adds the S2L sub-LSP flow descriptor placement rule to correct that limitation.
section: "3"
topics:
