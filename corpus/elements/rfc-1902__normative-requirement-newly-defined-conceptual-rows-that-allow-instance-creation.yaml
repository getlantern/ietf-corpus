document: rfc-1902
kind: normative-requirement
summary: Newly-defined conceptual rows that allow instance creation or deletion should include exactly one columnar object with SYNTAX RowStatus and MAX-ACCESS read-create as the status column. If any columnar object has MAX-ACCESS read-create, no other columnar object of the same row may have MAX-ACCESS read-write.
section: 7.1.12.1
rfc2119_level: SHOULD
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
