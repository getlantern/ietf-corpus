document: rfc-5882
kind: normative-requirement
summary: If the control protocol supports planned restart signaling and a BFD session failure occurs during such a restart, the Graceful Restart SHOULD NOT be aborted and the session failure SHOULD NOT result in a topology change, since BFD shares fate with the control plane and the failure is a side effect of the restart.
section: 4.3.2.1
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
