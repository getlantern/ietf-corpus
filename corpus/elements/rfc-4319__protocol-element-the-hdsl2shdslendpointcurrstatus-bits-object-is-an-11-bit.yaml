summary: The hdsl2ShdslEndpointCurrStatus BITS object is an 11-bit bitmask covering noDefect(0), powerBackoff(1), deviceFault(2), dcContinuityFault(3), snrMarginAlarm(4), loopAttenuationAlarm(5), loswFailureAlarm(6), configInitFailure(7), protocolInitFailure(8), noNeighborPresent(9), and loopbackActive(10). There is a 1:1 relationship between status bits and notification thresholds.
