document: rfc-1426
kind: protocol-element
summary: 'The usual SMTP data-stuffing algorithm still applies to 8-bit content: a sequence <CR><LF><DOT><CR><LF> or content beginning with <DOT><CR><LF> would prematurely terminate transfer, so stuffing must be performed. The CR-LF pair immediately preceding the final dot is part of the content.'
