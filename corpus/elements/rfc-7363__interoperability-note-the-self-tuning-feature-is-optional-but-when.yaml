document: rfc-7363
kind: interoperability-note
summary: The self-tuning feature is optional but when used MUST be supported by all peers in the RELOAD overlay network. Its use is indicated in the RELOAD overlay configuration document via the CHORD-SELF-TUNING algorithm name in the topology-plugin element.
