document: rfc-4141
kind: normative-requirement
summary: The Content-Convert header field MUST be carried unmodified and delivered to the recipient. If it is absent, intermediaries SHOULD NOT perform content conversion. If Content-Convert is present, a Content-Features header field MUST also be present.
section: "7"
rfc2119_level: MUST
topics:
    - email
