document: rfc-2126
kind: normative-requirement
summary: The Expedited Data TCP connection must be between the same pair of hosts as the Normal Data TCP connection, must not be shared among Transport Connections, and must remain established until the Transport Connection is terminated, at which time it must be closed.
section: 4.2.2
rfc2119_level: MUST
topics:
    - tcp
