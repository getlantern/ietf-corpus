document: rfc-6849
kind: normative-requirement
summary: For any form of NAT traversal to function, symmetric RTP/RTCP (RFC 4961) MUST be used, unless the mirror can control the NAT(s) in its path to create explicit pinholes via a mechanism such as PCP.
section: "5.5"
rfc2119_level: MUST
topics:
    - rtp
    - nat
    - realtime
