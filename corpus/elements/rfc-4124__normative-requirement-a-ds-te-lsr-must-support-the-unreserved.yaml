document: rfc-4124
kind: normative-requirement
summary: 'A DS-TE LSR MUST support the Unreserved Bandwidth sub-TLV with generalized semantics: the eight values now correspond to unreserved bandwidth for each of the eight TE-Classes (not preemption priorities), and a DS-TE LSR MUST NOT assume any ordered relationship among these values.'
section: "5.2"
rfc2119_level: MUST
topics:
