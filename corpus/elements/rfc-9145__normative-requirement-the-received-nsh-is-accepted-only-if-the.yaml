document: rfc-9145
kind: normative-requirement
summary: 'The received NSH is accepted only if the Timestamp (TS) satisfies: -Delta < (TSrt - TS) < +Delta, where the default Delta is 2 seconds. If the timestamp is outside this window, the SFC data plane element MUST discard the NSH message.'
section: "7.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
