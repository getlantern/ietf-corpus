document: rfc-9374
kind: normative-requirement
summary: An RAA MUST provide services to allocate HDAs to organizations, and MUST at minimum maintain a DNS zone for HDA zone delegation for discovering HIP RVS servers. It SHOULD have a public policy on obtaining an HDA.
section: 3.3.1
rfc2119_level: MUST
