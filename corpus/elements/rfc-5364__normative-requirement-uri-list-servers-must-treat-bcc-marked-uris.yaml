document: rfc-5364
kind: normative-requirement
summary: 'URI-list servers MUST treat ''bcc''-marked URIs in one of two ways: either remove all ''bcc'' URIs from recipient-history lists (sending the same list to everyone), or preserve only the individual recipient''s ''bcc'' URI in their personalized recipient-history list while removing all other ''bcc'' URIs.'
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
