document: rfc-4327
kind: protocol-element
summary: 'Retransmission behavior per neighbor is governed by three objects in lmpNbrTable: lmpNbrRetransmitInterval (initial interval, default 500 ms), lmpNbrRetryLimit (max retries, default 3; 0 = infinite), and lmpNbrRetransmitDelta (exponential backoff power, default 1), implementing RFC 2914 congestion control.'
