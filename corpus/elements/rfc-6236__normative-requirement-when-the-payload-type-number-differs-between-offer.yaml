document: rfc-6236
kind: normative-requirement
summary: 'When the payload type number differs between offer and answer, the image attribute in the answer MUST be split: use the offer''s PT for the send direction and the answer''s PT for the recv direction. Using wildcard in either the offer or answer instead MUST NOT be used.'
section: 3.2.2
rfc2119_level: MUST
topics:
    - realtime
