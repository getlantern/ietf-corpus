document: rfc-7909
kind: normative-requirement
summary: Canonicalization requires that date/time fields be converted to UTC RFC 3339 format, AS numbers be represented in ASPLAIN syntax (RFC 5396), IPv6 addresses conform to RFC 5952 canonical form, and IPv4 addresses use the ipv4-address type from RPSL (RFC 2622). All IP prefixes MUST use CIDR notation (RFC 4632).
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
