document: rfc-749
kind: interoperability-note
summary: SUPDUP-OUTPUT is incompatible with the full SUPDUP protocol (RFC 734) and the TELNET SUPDUP option (RFC 736), both of which require all post-negotiation communication to follow the RFC 734 protocol exclusively, giving the server total screen management responsibility.
section: "4"
