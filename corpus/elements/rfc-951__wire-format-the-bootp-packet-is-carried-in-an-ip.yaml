document: rfc-951
kind: wire-format
summary: 'The BOOTP packet is carried in an IP/UDP datagram and uses fixed-length fields in network byte order. Control fields: op (1 byte, 1=BOOTREQUEST/2=BOOTREPLY), htype (1 byte, ARP hardware type), hlen (1 byte, hardware address length), hops (1 byte, gateway hop count), xid (4 bytes, random transaction ID), secs (2 bytes, elapsed boot seconds), unused (2 bytes).'
section: "3"
