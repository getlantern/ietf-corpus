document: rfc-6265
kind: design-rationale
summary: 'The specification defines two compliance targets: servers SHOULD follow a well-behaved profile (Section 4) to maximize compatibility, while user agents MUST implement more liberal processing rules (Section 5) to interoperate with servers that do not conform to that profile. This asymmetry reflects the reality that deployed servers vary widely.'
section: "1"
topics:
