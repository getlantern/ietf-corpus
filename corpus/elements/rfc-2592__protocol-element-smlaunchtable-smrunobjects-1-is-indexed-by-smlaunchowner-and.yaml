summary: 'smLaunchTable (smRunObjects 1) is indexed by smLaunchOwner and smLaunchName and carries: smLaunchScriptOwner/Name (identifying the target script), smLaunchArgument (OCTET STRING), smLaunchMaxRunning (Unsigned32, default 1), smLaunchMaxCompleted (Unsigned32, default 1), smLaunchLifeTime (TimeInterval, default 360000 centi-seconds), smLaunchExpireTime (TimeInterval), smLaunchStart (Integer32), smLaunchControl (abort/suspend/resume/nop), and smLaunchRunIndexNext (read-only, suggests next available smRunIndex).'
