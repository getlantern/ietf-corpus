document: rfc-9329
kind: design-rationale
summary: The "IKETCP" stream prefix is required at the start of each TCP connection to identify and validate that the connection is being used for TCP encapsulation as defined in this document, avoiding conflicts with prevalent non-standard protocols that historically used TCP port 4500.
