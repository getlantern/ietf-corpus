document: rfc-4202
kind: normative-requirement
summary: A Link State Advertisement carries the ISCD(s) only of the near-end (the advertising LSR's side). For a unidirectional link, the far-end ISCD is assumed identical to the near-end; thus a unidirectional link is required to have the same interface switching capabilities at both ends.
section: "2.4"
rfc2119_level: REQUIRED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
