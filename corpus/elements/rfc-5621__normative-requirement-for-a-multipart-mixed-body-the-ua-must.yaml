document: rfc-5621
kind: normative-requirement
summary: For a 'multipart/mixed' body, the UA MUST set 'handling' to 'required' if processing the multipart body as a whole is required, otherwise MUST set it to 'optional'. The 'handling' parameters of top-level body parts within are set independently.
section: "8.2"
rfc2119_level: MUST
topics:
