summary: 'The DWDM wavelength label is 32 bits: Grid (bits 0-2, 3 bits), C.S. (bits 3-6, 4 bits), Identifier (bits 7-15, 9 bits), and n (bits 16-31, 16-bit two''s-complement integer). Grid=1 for ITU-T DWDM; C.S. values encode channel spacing in GHz (1=100, 2=50, 3=25, 4=12.5).'
