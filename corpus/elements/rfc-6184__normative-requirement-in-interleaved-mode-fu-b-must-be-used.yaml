document: rfc-6184
kind: normative-requirement
summary: In interleaved mode, FU-B MUST be used for the first fragmentation unit of each fragmented NAL unit and MUST NOT be used in any other case (subsequent fragments use FU-A). STAPs and MTAPs MUST NOT be fragmented. FUs MUST NOT be nested.
section: "5.8"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
