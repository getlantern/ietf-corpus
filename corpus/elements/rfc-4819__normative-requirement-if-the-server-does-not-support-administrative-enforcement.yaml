document: rfc-4819
kind: normative-requirement
summary: If the server does not support administrative enforcement of attributes, it MUST return false in the compulsory field of listattributes responses. An implementation MAY choose not to support the listattributes request at all.
section: "4.4"
rfc2119_level: MUST
topics:
