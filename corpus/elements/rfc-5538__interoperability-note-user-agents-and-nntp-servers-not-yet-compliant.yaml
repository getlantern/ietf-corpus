document: rfc-5538
kind: interoperability-note
summary: User agents and NNTP servers not yet compliant with RFC 3977 do not implement all parts of the wildmat extension, so 'news' URIs using wildcard newsgroup patterns beyond a single '*' may not be universally supported.
