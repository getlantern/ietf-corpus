document: rfc-9427
kind: normative-requirement
summary: When a TEAP client certificate is sent outside the TLS tunnel, it MUST include Identity-Type as an outer TLV to signal whether the certificate identifies a User (1) or Machine (2), as TLS 1.3 no longer sends client certificates in the clear.
section: 2.2.1
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
