document: rfc-8528
kind: normative-requirement
summary: Nodes in the mounted schema are all made read-only ('config false') if the mount point is itself 'config false' OR if the 'config' leaf in the corresponding 'mount-point' list entry is set to 'false'.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - yang
    - netconf
