document: rfc-4209
kind: design-rationale
summary: LMP is extended to operate between a peer node (e.g., OXC) and an adjacent optical line system (OLS), not just between peer nodes. This allows the OLS to communicate link configuration and state to peer nodes, reducing manual configuration and enhancing fault detection and recovery.
section: "1"
topics:
