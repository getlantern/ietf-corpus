document: rfc-4388
kind: protocol-element
summary: The DHCPLEASEQUERY message is transmitted from a relay agent (access concentrator) to a DHCP server using UDP on port 67, reusing the standard DHCP message format from RFC 2131. It is a query-only message and does not affect the state of IP address bindings.
