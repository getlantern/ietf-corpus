document: rfc-5440
kind: normative-requirement
summary: 'The Request-ID-number value 0x00000000 is invalid. Request-ID-numbers MUST be changed for each new request. If unknown request references are received at a rate ≥ MAX-UNKNOWN-REQUESTS (recommended: 5) per minute, the peer MUST send a Close message and MUST close the TCP session.'
section: 7.4.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
