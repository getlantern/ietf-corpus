document: rfc-3730
kind: protocol-element
summary: The EPP <response> element contains one or more <result> elements (each with 'code' attribute and <msg> child), an optional <msgQ> for queued message notification (with 'count' and 'id' attributes), optional <resData> for command-specific data, optional <extension>, and a required <trID> containing <clTRID> and <svTRID>.
