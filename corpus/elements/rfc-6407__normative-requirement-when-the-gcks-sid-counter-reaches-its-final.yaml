document: rfc-6407
kind: normative-requirement
summary: When the GCKS SID-counter reaches its final value, the GCKS MUST delete the existing Data-Security SAs, create new ones, and reset the SID-counter before distributing any new SID values, preventing IV reuse across the counter-mode nonce space.
section: "3.5"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
