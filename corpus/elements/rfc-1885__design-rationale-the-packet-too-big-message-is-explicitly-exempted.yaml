document: rfc-1885
kind: design-rationale
summary: The Packet Too Big message is explicitly exempted from the rule prohibiting ICMPv6 errors in response to multicast packets, so that Path MTU Discovery (RFC 1191) can function correctly for IPv6 multicast traffic.
