document: rfc-8325
kind: normative-requirement
summary: OAM traffic marked CS2 is RECOMMENDED to be mapped to UP 0 (AC_BE) rather than the default UP 2 (AC_BK), because AC_BK contradicts the intent in RFC 4594 for OAM traffic to receive at-least-best-effort service.
section: 4.1.2
rfc2119_level: RECOMMENDED
topics:
