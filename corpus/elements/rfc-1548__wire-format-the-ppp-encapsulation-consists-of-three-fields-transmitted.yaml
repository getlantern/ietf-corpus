document: rfc-1548
kind: wire-format
summary: 'The PPP encapsulation consists of three fields transmitted left to right: Protocol (16 bits), Information (variable), and Padding (variable). The Protocol field identifies the network-layer datagram type; the Information field carries the datagram; Padding may be added up to the MRU.'
