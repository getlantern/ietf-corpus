summary: When used with GMPLS routing protocols OSPF (RFC 4203) and IS-IS (RFC 5307), the information fields defined here are intended to appear as nested sub-TLVs; the specific sub-TLV nesting and encapsulation are to be defined in the respective protocol extension documents, not in this RFC.
