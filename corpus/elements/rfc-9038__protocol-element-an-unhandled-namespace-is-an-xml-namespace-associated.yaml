document: rfc-9038
kind: protocol-element
summary: An 'unhandled namespace' is an XML namespace associated with a response extension not included in the client-specified EPP login services (i.e., not listed in <objURI> or <extURI> elements of the EPP <login> command). The server may have information in such a namespace that it cannot return in the standard location of the response.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
