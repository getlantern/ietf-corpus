document: rfc-7264
kind: normative-requirement
summary: If the destination peer receives a retransmit with SRR preference on a message it is currently responding to via RPR, it SHOULD abort the RPR response and use SRR instead.
section: 5.4.1
rfc2119_level: SHOULD
topics:
    - routing
