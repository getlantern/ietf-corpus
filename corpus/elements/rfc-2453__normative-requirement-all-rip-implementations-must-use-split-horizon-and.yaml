document: rfc-2453
kind: normative-requirement
summary: All RIP implementations MUST use split horizon, and SHOULD also use split horizon with poisoned reverse (advertising reverse routes with metric 16). A configuration option to disable poisoned reverse is permitted. Implementors may alternatively implement simple split horizon (omitting reverse routes) or configurable hybrid schemes.
section: 3.4.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
