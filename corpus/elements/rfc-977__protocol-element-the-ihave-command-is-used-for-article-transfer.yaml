document: rfc-977
kind: protocol-element
summary: The IHAVE command is used for article transfer between servers. The client sends IHAVE <messageid>; if the server wants the article it replies 335, and the client transmits the full article terminated by CR-LF.CR-LF. The server replies 235 on success, 435 if not wanted, 436 for transient failure (retry later), or 437 for permanent rejection.
section: "3.4"
topics:
