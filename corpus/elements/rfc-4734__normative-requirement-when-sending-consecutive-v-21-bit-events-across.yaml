document: rfc-4734
kind: normative-requirement
summary: When sending consecutive V.21 bit events across packets, the sending gateway MUST ensure individual event durations do not cause the last event of one packet to overlap with the first event of the next, and MUST derive event durations as successive differences between event starting times.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
