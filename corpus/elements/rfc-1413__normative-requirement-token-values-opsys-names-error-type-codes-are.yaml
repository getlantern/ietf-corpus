document: rfc-1413
kind: normative-requirement
summary: Token values (OPSYS names, ERROR-TYPE codes) are limited to 64 characters. No new standard token will be defined exceeding this length, and non-standard error tokens must begin with 'X' and be 2–64 characters.
section: "5"
rfc2119_level: MUST
