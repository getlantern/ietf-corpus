document: rfc-7212
kind: normative-requirement
summary: Any auto-configuration based on GAP information MUST be disabled by default. The receiver SHOULD prevent oscillation where each endpoint tries to adjust its configuration to match the other.
section: "5.2"
rfc2119_level: MUST
