document: rfc-4143
kind: protocol-element
summary: The IFax ENUM service is identified by the service name 'E2U+ifax', with type 'ifax' and subtype 'mailto'. An IFax client queries ENUM using the target telephone number and receives a NAPTR record specifying a mailto URI for the target system.
