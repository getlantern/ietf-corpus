document: rfc-2305
kind: normative-requirement
summary: Sending IFax devices MUST be able to write minimum set TIFF files per the S profile (RFC 2301). Receiving IFax devices MUST be able to read minimum set TIFF files. Senders SHOULD NOT use TIFF fields and values beyond the minimum subset unless they have prior knowledge of the recipient's capabilities.
section: "4"
rfc2119_level: MUST
topics:
    - email
