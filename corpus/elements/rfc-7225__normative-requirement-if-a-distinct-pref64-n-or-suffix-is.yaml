document: rfc-7225
kind: normative-requirement
summary: If a distinct Pref64::/n or suffix is configured to the PCP-controlled NAT64 device, the PCP server SHOULD issue an unsolicited PCP ANNOUNCE message to inform the PCP client about the new Pref64::/n and/or suffix.
section: "4.2"
rfc2119_level: SHOULD
