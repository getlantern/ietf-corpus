summary: 'Number interoperability is tied to IEEE 754-2008 binary64 (double precision): integers in the range [-(2**53)+1, (2**53)-1] are exactly interoperable. Numbers with greater magnitude or precision than binary64 can represent may indicate interoperability problems.'
