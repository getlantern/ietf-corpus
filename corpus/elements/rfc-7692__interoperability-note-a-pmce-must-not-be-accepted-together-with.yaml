document: rfc-7692
kind: interoperability-note
summary: A PMCE MUST NOT be accepted together with another extension if the PMCE would be applied to the output of that extension and the extension either requires frame-boundary preservation or uses Extension data / reserved header bits as per-frame attributes. Violating this causes the client to Fail the WebSocket Connection.
section: "5"
topics:
    - websocket
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
