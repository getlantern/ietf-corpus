document: rfc-5041
kind: normative-requirement
summary: At the Data Source, DDP MUST transmit DDP Messages in the order they were submitted and SHOULD transmit segments within a message in increasing MO order (Untagged) or increasing TO order (Tagged). At the Data Sink, DDP MUST deliver messages in the order they were sent.
section: "5.3"
rfc2119_level: MUST
topics:
    - realtime
