document: rfc-3264
kind: design-rationale
summary: RTP payload type mappings MUST remain fixed for the duration of a session because of loose synchronization between signaling exchanges of SDP and the media stream; changing them mid-session could cause misinterpretation of already-in-flight packets.
section: 8.3.2
topics:
    - realtime
    - rtp
