document: rfc-3812
kind: protocol-element
summary: 'Three affinity (administrative group) constraint objects on each tunnel entry control link selection during path computation: mplsTunnelIncludeAnyAffinity (link must share at least one group, or constraint is zero), mplsTunnelIncludeAllAffinity (link must contain all specified groups), and mplsTunnelExcludeAnyAffinity (link must contain none of the specified groups).'
