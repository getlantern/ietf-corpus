document: rfc-8748
kind: normative-requirement
summary: If a <fee:fee> element has a 'grace-period' attribute, it MUST also be refundable (the 'refundable' attribute MUST be true). If the 'refundable' attribute is false, the element MUST NOT have a 'grace-period' attribute. These two attributes are mutually constrained.
section: 3.4.3
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
