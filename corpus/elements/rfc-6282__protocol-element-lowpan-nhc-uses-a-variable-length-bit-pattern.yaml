document: rfc-6282
kind: protocol-element
summary: LOWPAN_NHC uses a variable-length bit-pattern identifier to distinguish compression formats for different next headers. The number of bits used for the NHC ID SHOULD reflect the expected frequency of use and respect octet alignment.
