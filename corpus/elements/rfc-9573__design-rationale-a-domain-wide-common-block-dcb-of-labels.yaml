document: rfc-9573
kind: design-rationale
summary: A Domain-wide Common Block (DCB) of labels, reserved on all PEs and assigned by a central entity, reduces the label count for N VPNs/BDs/ESs from O(PEs × N) to O(N). This is analogous to using identical SRGBs across all nodes in Segment Routing [RFC8402].
section: "3"
topics:
    - mpls
    - routing
