document: rfc-3537
kind: normative-requirement
summary: When the same HMAC key is wrapped in different 3DES KEKs, a fresh initialization vector (IV) MUST be generated for each invocation of the HMAC key wrap algorithm (step 6 of the wrap procedure).
section: "3.1"
rfc2119_level: MUST
