document: rfc-3220
kind: privacy-consideration
summary: The protocol reveals the mobile node's current location to the home agent and any foreign agent with which it registers. Movement patterns, home address, and care-of address are exposed. No privacy mechanisms are defined within this specification; external encryption (e.g., IPsec ESP) is required to protect location information.
section: "5.5"
topics:
    - mobility
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
