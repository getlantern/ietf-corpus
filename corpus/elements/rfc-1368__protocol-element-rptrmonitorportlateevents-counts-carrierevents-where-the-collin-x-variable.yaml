document: rfc-1368
kind: protocol-element
summary: rptrMonitorPortLateEvents counts CarrierEvents where the CollIn(X) variable transitions to SQE while ActivityDuration exceeds LateEventThreshold (>480 and <565 bit times). Such events are counted both as a collision and as a lateEvent.
