document: rfc-4194
kind: normative-requirement
summary: An SHF consumer SHALL assure that it can handle a given Word length before beginning to parse blocks. Failure to check Word length may cause buffer overflows and endanger the stability and security of the consuming system.
section: "5"
rfc2119_level: REQUIRED
