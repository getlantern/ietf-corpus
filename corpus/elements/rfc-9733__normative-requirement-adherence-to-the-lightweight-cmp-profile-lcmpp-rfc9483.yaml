document: rfc-9733
kind: normative-requirement
summary: Adherence to the Lightweight CMP Profile (LCMPP) [RFC9483] is REQUIRED when using CMP in BRSKI-AE. The CMP client within the pledge MUST validate server responses based on the trust anchor established via the BRSKI voucher (the pinned-domain-cert).
section: "5.1"
rfc2119_level: REQUIRED
topics:
    - pkix
    - crypto
    - security
