document: rfc-9208
kind: interoperability-note
summary: 'When RFC 4314 ACL is also implemented: GETQUOTA requires no ACL right; GETQUOTAROOT requires ''r'' right for MESSAGE or STORAGE resources (as they reveal message counts/sizes), but no right for MAILBOX; SETQUOTA requires the ''a'' (administer) right.'
