document: rfc-7150
kind: design-rationale
summary: The existing PCEP METRIC Object supports new standardized metrics but has no facility for vendor-specific metrics, and there is no general mechanism in PCEP for complex vendor-specific information; the Vendor Information object and TLV fill this gap without modifying existing objects.
