document: rfc-2273
kind: normative-requirement
summary: Before sending a notification to a management target, a notification originator MUST check access via isAccessAllowed for each variable-binding. If isAccessAllowed does not return accessAllowed, the notification MUST NOT be sent to that management target.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
