document: rfc-8895
kind: normative-requirement
summary: If multiple ALTO clients create update streams from the same update stream resource with identical parameters, the server MUST send the same updates to all of them, though it MAY pack changes into different patch events per client provided the net result is identical.
section: 6.7.2
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
