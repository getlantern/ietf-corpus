document: rfc-9140
kind: normative-requirement
summary: The server MUST determine the exchange type (Initial, Completion, Waiting, or Reconnect) based on the combination of peer and server states per Table 14. All other state combinations are error situations requiring user action, and the server SHOULD send error code 2002 to the peer.
section: 3.2.1
rfc2119_level: MUST
