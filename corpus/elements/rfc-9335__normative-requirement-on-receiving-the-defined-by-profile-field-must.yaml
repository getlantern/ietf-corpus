document: rfc-9335
kind: normative-requirement
summary: On receiving, the 'defined by profile' field MUST be checked; if it does not match a Cryptex value and Cryptex is mandatory, the implementation MUST stop processing the RTP packet and report an error.
section: "5.2"
rfc2119_level: MUST
