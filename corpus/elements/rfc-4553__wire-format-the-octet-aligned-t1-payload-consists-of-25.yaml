kind: wire-format
summary: The octet-aligned T1 payload consists of 25-byte subframes, each carrying 193 bits of TDM data followed by 7 padding bits. A default payload of 200 bytes (eight 25-byte subframes) represents exactly 1 millisecond of TDM data.
