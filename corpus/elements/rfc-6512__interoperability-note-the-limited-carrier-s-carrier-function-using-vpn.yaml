document: rfc-6512
kind: interoperability-note
summary: The limited Carrier's Carrier function using VPN-Recursive Opaque Values is only applicable when both the inner and outer carrier use non-segmented mLDP P-tunnels, and the inner carrier is not aggregating the outer carrier's P-tunnels. The inter-AS and Carrier's Carrier cases are distinguished by whether mLDP messages are exchanged on VRF or non-VRF interfaces.
section: 3.2.2
topics:
    - mpls
    - routing
    - vpn
