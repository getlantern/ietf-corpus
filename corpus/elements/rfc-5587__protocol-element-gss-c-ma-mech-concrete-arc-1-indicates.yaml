summary: GSS_C_MA_MECH_CONCRETE (arc 1) indicates a mechanism is neither a pseudo-mechanism nor a composite mechanism. GSS_C_MA_MECH_PSEUDO (arc 2) indicates a pseudo-mechanism. GSS_C_MA_MECH_COMPOSITE (arc 3) is reserved for stackable pseudo-mechanisms.
