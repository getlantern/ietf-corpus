document: rfc-5360
kind: normative-requirement
summary: A relay executing a translation SHOULD add a Trigger-Consent header field to the outgoing request. The URI in that header field MUST have a target-uri parameter identifying the translation's target URI, enabling recipients to revoke permissions even if they have lost the original permission document URIs.
section: 5.11.1
rfc2119_level: SHOULD
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
