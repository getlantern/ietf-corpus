summary: 'CertRequest is a SEQUENCE of certReqId (INTEGER for matching request/reply), certTemplate (CertTemplate), and optional Controls. CertTemplate carries up to ten optional fields: version, serialNumber, signingAlg, issuer, validity, subject, publicKey, issuerUID, subjectUID, and extensions.'
