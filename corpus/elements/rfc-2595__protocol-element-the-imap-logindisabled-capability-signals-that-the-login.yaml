document: rfc-2595
kind: protocol-element
summary: The IMAP LOGINDISABLED capability signals that the LOGIN command is disabled; a server MUST respond with a tagged NO to any attempt to use LOGIN when this capability is present. This capability prevents compliant clients from sending unencrypted passwords but provides no protection against active attacks.
section: "3.2"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
