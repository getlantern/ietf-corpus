document: rfc-1583
kind: protocol-element
summary: 'Two types of AS external metrics are defined: Type 1 (equivalent to internal link-state metric, added to the internal cost to the ASBR) and Type 2 (treated as greater than any internal path cost). When both are present, Type 1 always takes precedence.'
