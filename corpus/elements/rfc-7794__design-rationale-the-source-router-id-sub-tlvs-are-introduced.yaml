document: rfc-7794
kind: design-rationale
summary: The Source Router ID sub-TLVs are introduced because when a reachability advertisement is leaked from one level to another, the source of the original advertisement is otherwise unknown. This is especially useful when the advertisement identifies the advertising router (N-flag set).
