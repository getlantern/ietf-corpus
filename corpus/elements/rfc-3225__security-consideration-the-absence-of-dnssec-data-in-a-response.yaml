document: rfc-3225
kind: security-consideration
summary: The absence of DNSSEC data in a response to a query with DO set MUST NOT be interpreted as meaning no security information is available for the zone, because the response may be forged or may be a non-forged response to an altered (DO-cleared) query.
section: Security Considerations
rfc2119_level: MUST NOT
topics:
    - dns
    - security
