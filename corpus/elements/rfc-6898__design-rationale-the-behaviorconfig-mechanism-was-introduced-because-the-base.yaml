document: rfc-6898
kind: design-rationale
summary: The BehaviorConfig mechanism was introduced because the base LMP specification (RFC 4204) defined no general capability discovery procedure for adjacent nodes. RFC 4209 had defined an ad-hoc mechanism specific to that document; this document generalizes it so future LMP extensions can reuse the same negotiation framework.
