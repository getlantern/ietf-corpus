document: rfc-8200
kind: interoperability-note
summary: When computing TCP's Maximum Segment Size (MSS) over IPv6, upper-layer protocols must subtract 60 octets (not 40 as for IPv4) from the maximum packet size, because the minimum-length IPv6 header is 20 octets longer than a minimum-length IPv4 header.
section: "8.3"
topics:
    - ip
    - tcp
