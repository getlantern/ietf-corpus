document: rfc-7179
kind: security-consideration
summary: It is critical that the critical summary bits be set correctly. If set when the corresponding critical extensions are absent, frames are unnecessarily discarded. If not set when critical extensions are present, frames may be mishandled or corrupted, and intended security policies may be violated.
