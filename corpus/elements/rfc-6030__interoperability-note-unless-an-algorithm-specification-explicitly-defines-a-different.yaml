document: rfc-6030
kind: interoperability-note
summary: Unless an algorithm specification explicitly defines a different encoding, all key OCTET STRING encodings in PSKC MUST follow the AES Key Value Encoding (first octet = MSB index 0). Implementers must verify test vectors from FIPS 197 Appendix A match when decoding the canonical base64 PlainValue.
section: "4.2"
topics:
    - crypto
    - security
