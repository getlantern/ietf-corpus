document: rfc-3720
kind: state-machine
summary: 'Connection states for initiators and targets are: FREE (no transport), XPT_WAIT (TCP SYN sent), XPT_UP (transport established, pre-login), IN_LOGIN (login exchange underway), LOGGED_IN (Full Feature Phase active), IN_LOGOUT (logout in progress), LOGOUT_REQUESTED (target requested logout), and CLEANUP_WAIT (awaiting connection cleanup before recovery).'
section: "7.1"
