document: rfc-6286
kind: interoperability-note
summary: In a BGP Confederation, the whole confederation is treated as one AS for the purpose of AS-wide Unique BGP Identifier support. A BGP Identifier allocated per RFC 4271 (as a valid IPv4 address) remains conformant with the relaxed definition.
