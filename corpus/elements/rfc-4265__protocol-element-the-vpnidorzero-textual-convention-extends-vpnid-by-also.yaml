document: rfc-4265
kind: protocol-element
summary: The VPNIdOrZero Textual Convention extends VPNId by also permitting a zero-length OCTET STRING (SIZE (0 | 7)). The zero-length value's semantics are object-specific and must be defined in the description of each object that uses this syntax, covering use cases such as referencing no VPN or all VPNs.
section: "3.2"
topics:
    - vpn
    - snmp
