document: rfc-2595
kind: security-consideration
summary: When the PLAIN mechanism is used, the server gains the ability to impersonate the user to all services with the same password, regardless of TLS encryption. Clients are encouraged to have an operational mode where all mechanisms likely to reveal the user's password to the server are disabled.
section: "9"
topics:
    - tls
    - security
