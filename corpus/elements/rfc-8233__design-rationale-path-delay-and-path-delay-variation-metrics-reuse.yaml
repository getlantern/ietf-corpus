document: rfc-8233
kind: design-rationale
summary: Path Delay and Path Delay Variation metrics reuse the existing Minimum Cost Path (MCP) objective function from RFC 5541 rather than defining new ones, since minimizing cost already applies to these metrics. New objective functions (MPLP, MUP, MRUP) are defined only where existing OFs are insufficient.
section: "3.3"
topics:
