document: rfc-8049
kind: protocol-element
summary: 'The YANG module ''ietf-l3vpn-svc'' is structured around two top-level containers: ''vpn-services'' (global VPN parameters per customer, keyed by vpn-id) and ''sites'' (per-site configuration including network accesses). This separation reflects the service abstraction: VPN-level policies and site-level connectivity are managed independently.'
