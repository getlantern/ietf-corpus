document: rfc-7275
kind: normative-requirement
summary: The ICCP connection for an RG MUST be operational before any client application can make use of ICCP services in that RG. A PE that receives a NAK TLV rejecting its RG Connect MUST stop attempting to bring up the connection immediately.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
