document: rfc-6960
kind: protocol-element
summary: 'Error responses (not signed) are defined for five cases: malformedRequest, internalError, tryLater, sigRequired, and unauthorized. The ''unauthorized'' response covers cases where the client is not authorized or the server cannot respond authoritatively.'
