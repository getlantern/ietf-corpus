document: rfc-7587
kind: interoperability-note
summary: Any compliant Opus decoder is capable of ignoring FEC information when not needed, so encoding with FEC cannot cause interoperability problems. Every receiver MUST be able to receive and decode stereo signals regardless of the 'stereo' parameter preference.
section: "3.3"
topics:
