document: rfc-4975
kind: normative-requirement
summary: All MSRP endpoints MUST be able to receive the multipart/mixed and multipart/alternative media types. If a SEND request contains an unsupported Content-Type and Failure-Report is not 'no', the receiver MUST respond with status code 415.
section: 7.3.1
rfc2119_level: MUST
topics:
    - realtime
