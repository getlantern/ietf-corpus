document: rfc-9014
kind: normative-requirement
summary: If BGP Auto-discovery and FEC129-based PWs are used between the GW MAC-VRF and WAN Edge VSI, provisioning of the VPLS-ID MUST be supported on the MAC-VRF and MUST match the VPLS-ID used in the WAN Edge VSI.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
