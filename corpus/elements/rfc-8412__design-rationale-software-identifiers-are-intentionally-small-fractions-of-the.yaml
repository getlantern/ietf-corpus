document: rfc-8412
kind: design-rationale
summary: Software Identifiers are intentionally small fractions of the full records, enabling bandwidth-efficient inventory exchanges. A SWIMA-PV can track software presence over time using only identifiers, requesting full records via targeted requests only when necessary. This design supports the scalability requirement for enterprises with tens of thousands of endpoints.
section: 3.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
