document: rfc-4623
kind: interoperability-note
summary: IPv6 packets MUST NOT be fragmented at the IP level before entering a PW. IPv4 packets with the DF bit clear may be fragmented by the PE before PW encapsulation, which is transparent to the PW itself; IPv6 does not permit this.
section: "3"
topics:
    - ip
    - v6ops
