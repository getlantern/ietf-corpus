document: rfc-6047
kind: normative-requirement
summary: The handling of a MIME part MUST be based on its RFC 2045 Content-Type and not on the file extension specified in the Content-Disposition header, because malware is known to exploit Content-Disposition extension mismatches to trick UAs.
section: "2.6"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
