document: rfc-3339
kind: normative-requirement
summary: Applications that generate the Internet Date/Time Format SHOULD use upper-case letters for the 'T' separator and 'Z' suffix. Specifications operating in case-sensitive environments MAY further restrict these to uppercase only.
section: "5.6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
