document: rfc-3339
kind: normative-requirement
summary: Applications that generate the Internet Date/Time Format SHOULD use upper case letters for 'T' and 'Z'. Specifications operating in case-sensitive environments MAY further restrict the syntax to require upper case.
section: "5.6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
