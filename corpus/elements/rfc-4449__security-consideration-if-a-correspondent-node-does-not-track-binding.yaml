document: rfc-4449
kind: security-consideration
summary: If a correspondent node does not track Binding Update sequence numbers, it could accept an old care-of address value. If that address was reallocated to another IPv6 node, that node would be vulnerable to unwanted traffic from the correspondent node.
section: "4"
topics:
    - mobility
    - security
