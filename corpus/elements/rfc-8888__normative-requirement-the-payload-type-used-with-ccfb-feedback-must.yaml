document: rfc-8888
kind: normative-requirement
summary: The payload type used with "ccfb" feedback MUST be the wildcard type ("*"), implying that congestion control feedback is sent for all payload types in use in the session, including FEC and retransmission payload types.
section: "6"
rfc2119_level: MUST
topics:
