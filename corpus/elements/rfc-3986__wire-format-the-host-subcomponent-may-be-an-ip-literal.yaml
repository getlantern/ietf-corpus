document: rfc-3986
kind: wire-format
summary: 'The host subcomponent may be an IP-literal (IPv6 or IPvFuture enclosed in square brackets), an IPv4address in dotted-decimal notation, or a registered name. ABNF: host = IP-literal / IPv4address / reg-name. Square brackets appear only here.'
