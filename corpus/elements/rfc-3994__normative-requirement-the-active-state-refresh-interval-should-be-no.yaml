document: rfc-3994
kind: normative-requirement
summary: The active-state refresh interval SHOULD be no shorter than 60 seconds. The composer MAY omit the refresh interval entirely, which causes the receiver to assume idle after 120 seconds.
section: "3.2"
rfc2119_level: SHOULD
