document: rfc-6884
kind: interoperability-note
summary: EVRC-NW modes 0, 1, and 7 are interoperable with EVRC-WB; modes 1 through 7 are interoperable with EVRC-B. By default, EVRC-NW supports narrowband modes 1–7; wideband mode 0 support is optional. Mode changes among supported modes cause bit-rate changes but do not cause decoding problems at the receiver.
