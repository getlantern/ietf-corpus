document: rfc-4860
kind: normative-requirement
summary: A sender or Aggregator wishing to use a shared reservation across senders MUST set Extended vDstPort to all zeros; a sender wishing to narrow scope to the sender-receiver pair SHOULD place its IP address in Extended vDstPort as a globally unique identifier.
section: "2.1"
rfc2119_level: MUST
topics:
    - qos
    - diffserv
