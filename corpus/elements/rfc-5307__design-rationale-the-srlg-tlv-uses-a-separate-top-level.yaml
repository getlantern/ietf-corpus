document: rfc-5307
kind: design-rationale
summary: The SRLG TLV uses a separate top-level TLV (type 138) rather than a sub-TLV of the extended IS reachability TLV because SRLG membership is a link property that must be identified by both endpoints' System IDs, pseudonode number, and interface addresses, requiring more addressing context than a sub-TLV allows.
section: "1.4"
topics:
    - routing
    - mpls
