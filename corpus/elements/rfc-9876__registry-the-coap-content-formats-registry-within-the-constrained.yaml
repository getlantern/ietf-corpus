summary: 'The ''CoAP Content-Formats'' registry within the ''Constrained RESTful Environments (CoRE) Parameters'' registry group is updated with new range-based registration procedures: 0-255 (Expert Review), 256-9999 (IETF Review with Expert Review or IESG Approval with Expert Review), 10000-19999 (Expert Review), 20000-32999 (First Come First Served with conditions), 33000-64997 (Expert Review), 64998-64999 (Reserved for Documentation), and 65000-65535 (Experimental Use).'
