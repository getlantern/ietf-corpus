document: rfc-1938
kind: wire-format
summary: The challenge format is 'otp-<algorithm identifier> <sequence integer> <seed>'. Tokens MUST be separated by whitespace and the entire string MUST be terminated with a space or newline. The string 'otp-' MUST be in lower case; algorithm identifiers are case sensitive and currently all lower case.
section: "6.0"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
