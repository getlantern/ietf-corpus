document: rfc-6440
kind: protocol-element
summary: The DHCPv6 ERP Local Domain Name option (OPTION_ERP_LOCAL_DOMAIN_NAME, code 65) allows a DHCPv6 server to inform ERP clients of the local domain name. The option carries the erp-local-domain-name field encoded as a DNS name per RFC 3315 Section 8.
section: "3.1"
topics:
    - security
    - registry
