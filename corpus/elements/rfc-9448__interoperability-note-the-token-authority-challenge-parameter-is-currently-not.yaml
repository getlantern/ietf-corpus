document: rfc-9448
kind: interoperability-note
summary: The 'token-authority' challenge parameter is currently not used by the SHAKEN (ATIS-1000080) certificate framework governance but may be used by other VoIP frameworks. Its absence requires the ACME client to use locally configured information to identify the Token Authority.
