document: rfc-6779
kind: protocol-element
summary: nhdpLibRemovedIfAddrSetTable records recently removed local interface addresses as Removed Interface Address Tuples containing (IR_local_iface_addr, IR_time). Entries expire at the time indicated by nhdpLibRemovedIfAddrSetIRTime. If local addresses are immutable, this table is always empty and may be omitted.
