document: rfc-4012
kind: security-consideration
summary: 'RPSLng extensions introduce no new security functionality or threats beyond those in RFC 2622 and RFC 2725. However, the original RPSL standard includes weak authentication mechanisms: MAIL-FROM (vulnerable to spoofing), CRYPT-PW (vulnerable to dictionary attacks and password sniffing over unencrypted channels), and NONE (no protection).'
section: "6"
topics:
