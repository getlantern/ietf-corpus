document: rfc-9483
kind: normative-requirement
summary: The formal ASN.1 syntax of the whole CMP message MUST be compliant with RFC 4210, RFC 9480, RFC 4211, RFC 5652, and RFC 8933. The pvno MUST be cmp2000(2) or cmp2021(3). The transactionID MUST be present.
section: "3.5"
rfc2119_level: MUST
topics:
