document: rfc-5621
kind: normative-requirement
summary: UAs SHOULD assign 'multipart/mixed' bodies a disposition type of 'render', since a disposition type is required in order to set the 'handling' parameter. The actual disposition type of the whole 'multipart/mixed' is irrelevant to how the inner body parts are processed.
section: "8.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
