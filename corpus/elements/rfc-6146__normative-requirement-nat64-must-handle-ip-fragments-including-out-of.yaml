document: rfc-6146
kind: normative-requirement
summary: NAT64 MUST handle IP fragments, including out-of-order arrival. It MUST limit resources devoted to fragment storage to protect against DoS attacks, and MUST allow fragments to arrive over a configurable time interval whose default MUST be at least FRAGMENT_MIN.
section: "3.4"
rfc2119_level: MUST
topics:
    - nat
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
