document: rfc-5438
kind: security-consideration
summary: IMDNs may be forged to falsely indicate that an IM was delivered or displayed. Message-IDs MUST use at least 64 bits of cryptographic randomness to prevent off-path attackers from forging valid IMDNs. Endpoints wishing to make automatic use of IMDNs should take precautions against denial-of-service from forged or unsolicited IMDNs.
section: "14.1"
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
