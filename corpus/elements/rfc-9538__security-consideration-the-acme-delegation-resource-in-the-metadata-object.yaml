document: rfc-9538
kind: security-consideration
summary: The acme-delegation resource in the Metadata object is only accessible to the holder of the account key and must be fetched exclusively via POST-as-GET (per Section 2.3.1.2 of RFC 9115). The dCDN's ACME account is relevant to the privacy of the entire scheme.
section: "5"
topics:
    - security
    - privacy
    - acme
