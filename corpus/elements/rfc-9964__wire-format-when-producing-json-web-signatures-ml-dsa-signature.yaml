summary: When producing JSON Web Signatures, ML-DSA signature byte strings are base64url encoded, making the encoded signature larger than the raw byte sizes in Table 1. When producing COSE signatures, no encoding is needed; signatures are raw byte strings per RFC 9052 Section 4.
