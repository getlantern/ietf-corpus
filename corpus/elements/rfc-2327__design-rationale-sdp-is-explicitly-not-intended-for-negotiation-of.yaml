document: rfc-2327
kind: design-rationale
summary: SDP is explicitly not intended for negotiation of session content or media encodings; it is a description-only format. Negotiation is viewed as outside the scope of session description and is left to signalling protocols such as SIP that transport SDP.
section: "2"
topics:
