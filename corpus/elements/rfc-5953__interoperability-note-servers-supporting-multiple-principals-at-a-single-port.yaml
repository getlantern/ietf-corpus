document: rfc-5953
kind: interoperability-note
summary: Servers supporting multiple principals at a single port SHOULD use the TLS Server Name Indication extension (RFC 4366 Section 3.1) to allow server-side principal selection, enabling notifications to a specific principal at a given TCP or UDP port.
