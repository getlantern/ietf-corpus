document: rfc-1542
kind: interoperability-note
summary: The bit ordering of hardware addresses in 'chaddr' SHOULD follow the ARP convention for the client's link-layer network. As a consequence, an IEEE 802.5 client's 'chaddr' bit ordering is the opposite of a DIX Ethernet client's, and relay agents must not alter it.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
