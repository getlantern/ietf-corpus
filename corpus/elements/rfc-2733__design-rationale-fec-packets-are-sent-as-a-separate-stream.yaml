document: rfc-2733
kind: design-rationale
summary: FEC packets are sent as a separate stream (rather than in-band) to maintain backwards compatibility with non-FEC receivers and to allow the media stream to function independently. The payload format does not mandate the definition of 'separate streams', leaving that to applications and higher-level protocols.
section: "3"
topics:
