document: rfc-2238
kind: protocol-element
summary: hprRtpTable (hprRtp 2) contains one entry per RTP connection, indexed by the pair (hprRtpLocNceId, hprRtpLocTcid). Each entry records remote CP name, NCE IDs, TCIDs, state, timers, ARB send rates, round-trip delay, packet/byte counters, and path-switch statistics.
