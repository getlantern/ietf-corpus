document: rfc-5881
kind: normative-requirement
summary: BFD Control packets MUST be transmitted in UDP packets with destination port 3784. The source port MUST be in the range 49152 through 65535, the same source port number MUST be used for all packets in a session, and the source port SHOULD be unique among all BFD sessions on the system.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - udp
