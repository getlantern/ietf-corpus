document: rfc-9176
kind: normative-requirement
summary: If the base URI of a registration contains a link-local address, the RD MUST NOT show its links unless the lookup was made from the link on which the registered endpoint can be reached. The RD MUST NOT include zone identifiers in resolved URIs.
section: "6.1"
rfc2119_level: MUST
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
