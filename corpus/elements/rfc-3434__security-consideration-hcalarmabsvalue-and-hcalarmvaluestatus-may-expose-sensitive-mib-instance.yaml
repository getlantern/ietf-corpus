document: rfc-3434
kind: security-consideration
summary: hcAlarmAbsValue and hcAlarmValueStatus may expose sensitive MIB instance values identified by hcAlarmVariable. SNMPv3 with USM (RFC 3414) and VACM (RFC 3415) is recommended to secure access to these read-write and read-create objects.
section: "10"
topics:
