document: rfc-4362
kind: security-consideration
summary: All security considerations of ROHC RTP (RFC 3095, Section 7) apply. An additional threat is a denial-of-service attack where an intruder injects bogus CCP packets with random CRC values, causing unnecessary context invalidation, feedback messages, and refresh packets at the decompressor.
section: "7"
topics:
    - security
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
