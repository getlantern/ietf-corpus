document: rfc-9567
kind: protocol-element
summary: The EDNS0 Report-Channel option (OPTION-CODE 18) is included unsolicited by the authoritative server in responses to indicate the agent domain to which validating resolvers should send error reports. Its presence in a response signals that the authoritative server supports DNS error reporting.
section: "4"
