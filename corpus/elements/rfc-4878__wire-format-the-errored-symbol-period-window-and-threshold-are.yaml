document: rfc-4878
kind: wire-format
summary: 'The Errored Symbol Period window and threshold are each encoded as a pair of Unsigned32 objects (Hi and Lo) forming an unsigned 64-bit integer: value = (2^32 * Hi) + Lo. This accommodates symbol counts that exceed 32-bit range on high-speed physical layers.'
section: "6"
