document: rfc-7248
kind: design-rationale
summary: The XMPP <show/> element (qualified by the 'jabber:client' namespace) can be included directly in PIDF XML rather than requiring a new PIDF extension, since PIDF is already extensible. This approach is RECOMMENDED to preserve availability state detail across the gateway.
