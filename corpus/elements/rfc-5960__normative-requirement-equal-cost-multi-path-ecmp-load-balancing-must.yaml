document: rfc-5960
kind: normative-requirement
summary: Equal-Cost Multi-Path (ECMP) load-balancing MUST NOT be performed on an MPLS-TP LSP. If the server layer supports load-balancing, it MUST operate transparently to MPLS-TP.
section: 3.1.1
rfc2119_level: MUST NOT
topics:
