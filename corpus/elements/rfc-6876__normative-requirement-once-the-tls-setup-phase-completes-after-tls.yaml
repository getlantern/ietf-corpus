document: rfc-6876
kind: normative-requirement
summary: Once the TLS Setup phase completes (after TLS Finished messages), the TLS session MUST NOT be renegotiated. TLS session renegotiation MAY be used before the TLS Setup phase ends.
section: 3.4.2.1
rfc2119_level: MUST NOT
topics:
    - tls
    - security
