document: rfc-3744
kind: design-rationale
summary: Abstract privileges allow server implementations that cannot separate certain access capabilities (e.g., DAV:read from DAV:read-acl) to still present the standard privilege model by wrapping both under a non-abstract aggregate, making the standard privileges abstract on that resource.
