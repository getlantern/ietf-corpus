document: rfc-5626
kind: normative-requirement
summary: Each UA MUST have an Instance Identifier URN that uniquely identifies the device. This URN MUST be persistent across power cycles and MUST NOT change as the device moves from one network to another.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - security
