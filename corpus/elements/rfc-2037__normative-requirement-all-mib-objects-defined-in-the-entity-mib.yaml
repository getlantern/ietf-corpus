document: rfc-2037
kind: normative-requirement
summary: 'All MIB objects defined in the Entity MIB have at most read-only MAX-ACCESS; none are writable. A compliant SNMP agent must implement all five mandatory groups: entityPhysicalGroup, entityLogicalGroup, entityMappingGroup, entityGeneralGroup, and entityNotificationsGroup.'
section: "3.9"
rfc2119_level: REQUIRED
