document: rfc-9254
kind: protocol-element
summary: 'SIDs used as CBOR map keys are encoded as deltas: signed integers added to a reference SID. The reference SID for an outermost map is zero unless conferred by the environment; for inner maps it is the SID of the enclosing map entry. Absolute SIDs in key positions require CBOR tag 47.'
section: "3.2"
topics:
