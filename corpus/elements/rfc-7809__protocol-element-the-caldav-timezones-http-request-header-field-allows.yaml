document: rfc-7809
kind: protocol-element
summary: The 'CalDAV-Timezones' HTTP request header field allows a client to indicate to the server whether it wants VTIMEZONE components returned in iCalendar data. Value 'T' requests time zone data; value 'F' requests omission of time zone data.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
