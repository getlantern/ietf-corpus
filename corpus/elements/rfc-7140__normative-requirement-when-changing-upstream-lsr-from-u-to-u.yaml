document: rfc-7140
kind: normative-requirement
summary: When changing upstream LSR from U to U', the recommended default behavior is to remove the HSMP LSP to U before setting up to U'. Whether to add before or after removing is a local matter; procedures for FEC processing differ from RFC 6388 Section 2.4.3.
section: "3.6"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
