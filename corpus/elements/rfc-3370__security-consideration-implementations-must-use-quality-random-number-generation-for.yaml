document: rfc-3370
kind: security-consideration
summary: Implementations must use quality random number generation for content-encryption keys, message-authentication keys, IVs, one-time DSA k values, and key pairs. Inadequate PRNGs can reduce security to near zero by enabling an attacker to reproduce the PRNG state and search a small key space.
section: "9"
topics:
