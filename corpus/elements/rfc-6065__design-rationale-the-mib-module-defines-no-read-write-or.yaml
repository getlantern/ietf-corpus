document: rfc-6065
kind: design-rationale
summary: The MIB module defines no read-write or read-create objects, eliminating the risk that an intruder can alter or create management objects via direct SNMP SET operations. All dynamic updates are driven solely by internal session establishment and termination procedures.
section: "9.2"
topics:
    - snmp
    - security
