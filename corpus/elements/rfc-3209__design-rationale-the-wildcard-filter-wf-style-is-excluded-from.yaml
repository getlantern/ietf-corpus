kind: design-rationale
summary: The Wildcard Filter (WF) style is excluded from this specification because its merging rules are incompatible with EXPLICIT_ROUTE objects, and because it cannot provide proper per-link reservations when all senders transmit simultaneously, making it unsuitable for traffic engineering.
