document: rfc-9925
kind: normative-requirement
summary: Senders SHOULD omit the authority key identifier and issuer alternative name extensions, as these describe the certificate issuer and are not meaningful for an unsigned certificate. This document updates RFC 5280 to permit omitting the authority key identifier in unsigned certificates.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
