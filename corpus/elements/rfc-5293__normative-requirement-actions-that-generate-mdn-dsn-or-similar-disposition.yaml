document: rfc-5293
kind: normative-requirement
summary: Actions that generate MDN, DSN, or similar disposition messages MUST do so using the original, unmodified message header. Similarly, if a script error triggers an implicit keep, the original header MUST be used.
section: "7"
rfc2119_level: MUST
topics:
