document: rfc-7233
kind: normative-requirement
summary: If a 206 response contains a Content-Range with a range unit the recipient does not understand, the recipient MUST NOT attempt to recombine it with a stored representation. A proxy that receives such a message SHOULD forward it downstream.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - http
