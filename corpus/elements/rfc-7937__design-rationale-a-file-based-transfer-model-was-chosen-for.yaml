document: rfc-7937
kind: design-rationale
summary: A file-based transfer model was chosen for CDNI Logging because it is the most common practice for exchange of logging information within and across CDNs today. Near-real-time (sub-minute) exchange is explicitly out of scope and left for further study.
section: "2.1"
