document: rfc-3033
kind: security-consideration
summary: The information field and protocol identifier assignments specified in this document do not weaken the security of B-ISDN signaling. In the called party, if the incoming SETUP message contains a calling party number that is verified and passed by the ATM network or provided by the network, that number can be used for partial calling party authentication to strengthen security.
section: "7"
