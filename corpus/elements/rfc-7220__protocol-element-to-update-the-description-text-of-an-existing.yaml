document: rfc-7220
kind: protocol-element
summary: To update the description text of an existing mapping, the PCP client sends a MAP/PEER renewal request containing a DESCRIPTION option with the new text. The server validates as for a normal refresh, then replaces the old description and returns the (possibly truncated) new value in the response.
section: "3"
extracted_by: claude-sonnet-4-6
