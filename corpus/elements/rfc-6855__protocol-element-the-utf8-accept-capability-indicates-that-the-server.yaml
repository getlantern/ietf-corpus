document: rfc-6855
kind: protocol-element
summary: The "UTF8=ACCEPT" capability indicates that the server supports opening mailboxes containing internationalized messages via SELECT and EXAMINE, and can provide UTF-8 responses to LIST, LSUB, NAMESPACE, and ACL commands. A server supports "UTF8=ACCEPT" if it advertises either "UTF8=ACCEPT" or "UTF8=ONLY".
section: "3"
