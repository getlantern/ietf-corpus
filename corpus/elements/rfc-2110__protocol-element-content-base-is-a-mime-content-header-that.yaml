document: rfc-2110
kind: protocol-element
summary: Content-Base is a MIME content header that provides a base URI for resolving relative URIs in other headers and in HTML documents lacking a BASE element. Its value MUST be an absolute URI. It is valid only for the content heading or message heading where it occurs, not for parts inside multipart headings.
section: "4.2"
topics:
