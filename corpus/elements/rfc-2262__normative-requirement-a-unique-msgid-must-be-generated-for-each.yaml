document: rfc-2262
kind: normative-requirement
summary: A unique msgID MUST be generated for each outgoing request; the value MUST NOT be the same as any outstanding request. Values should not have been used recently to provide protection against some replay attacks.
section: "7.1"
rfc2119_level: MUST NOT
