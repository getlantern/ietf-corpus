document: rfc-8210
kind: normative-requirement
summary: Caches and routers MUST implement unprotected TCP transport on port rpki-rtr (323). If unprotected TCP is the transport, the cache and routers MUST be on the same trusted and controlled network. When a more protected transport is available, caches and routers MUST use it; TCP-AO SHOULD be preferred.
section: "9"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
