document: rfc-5533
kind: interoperability-note
summary: The Shim6 layer is placed between the IP endpoint sublayer (handling fragmentation/reassembly) and the IP routing sublayer. This ensures that fragment reassembly is robust even when different fragments of the same datagram arrive via different source locators due to broken multipath routing.
section: "1.6"
topics:
