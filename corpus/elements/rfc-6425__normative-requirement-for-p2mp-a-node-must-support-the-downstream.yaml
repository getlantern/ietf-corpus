document: rfc-6425
kind: normative-requirement
summary: For P2MP, a node MUST support the Downstream Detailed Mapping TLV (RFC 6424). The Downstream Mapping TLV from RFC 4379 is deprecated for P2MP and MUST NOT be included in an echo request message targeting a P2MP FEC.
section: "3.5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
