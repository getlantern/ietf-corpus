document: rfc-5553
kind: normative-requirement
summary: When the signaling message crosses a domain boundary, the CPS MAY be replaced in the RRO with a PKS. For a Resv RRO the PKS used SHOULD be the one originally signaled in the ERO; for a Path RRO the PKS SHOULD identify the replacing LSR and provide an expandable Path Key retained for at least the LSP lifetime.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
