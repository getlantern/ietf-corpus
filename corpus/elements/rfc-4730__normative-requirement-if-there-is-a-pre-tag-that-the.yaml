document: rfc-4730
kind: normative-requirement
summary: If there is a <pre> tag that the User Interface matched but the User Interface is unable to suppress the User Input, it MUST set the 'suppressed' attribute to 'false'. Once a NOTIFY reporting the match is sent, the User Interface MUST stop suppression.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
