document: rfc-6513
kind: wire-format
summary: For MPLS encapsulation on P2MP LSPs, C-multicast packets carry an upstream-assigned MPLS label on the label stack when the P-tunnel is aggregated (multiple MVPNs). For non-aggregated tunnels, the LSP label alone identifies the PMSI. Placement in the label stack is specified in Sections 12.1.3 and 12.2.
section: 12.1.3
topics:
    - mpls
    - multicast
    - routing
