document: rfc-7252
kind: normative-requirement
summary: The server MUST echo the client's Token unmodified in any resulting response. A client sending a request without TLS SHOULD use a nontrivial, randomized token to guard against response spoofing; a client connected to the general Internet SHOULD use at least 32 bits of randomness.
section: 5.3.1
rfc2119_level: MUST
topics:
    - http
    - udp
    - security
