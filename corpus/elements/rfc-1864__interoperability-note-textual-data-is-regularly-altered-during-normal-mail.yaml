document: rfc-1864
kind: interoperability-note
summary: Textual data is regularly altered during normal mail delivery; addition or deletion of trailing whitespace produces a different MD5 digest. Therefore, when Content-MD5 is used, either quoted-printable or base64 SHOULD be employed as the content-transfer-encoding to prevent spurious integrity failures.
section: "2"
topics:
    - email
    - security
