document: rfc-9061
kind: protocol-element
summary: The IKE-less case removes IKEv2 from the NSF entirely. The I2NSF Controller performs all key management functions including IV generation, SPI generation, prevention of counter resets, cryptographic key generation, IPsec SA creation on sadb-acquire notifications, rekeying on expire notifications, and NAT traversal discovery.
section: "3.2"
