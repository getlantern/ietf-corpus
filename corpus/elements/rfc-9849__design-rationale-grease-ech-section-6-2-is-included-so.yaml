document: rfc-9849
kind: design-rationale
summary: GREASE ECH (Section 6.2) is included so that ECH-capable clients without an ECHConfig still send a fake ECH extension, providing 'cover' for real ECH connections and disincentivizing middleboxes from differentially blocking the extension. This addresses the RFC 8744 requirement to 'not stick out'.
section: 10.10.4
topics:
    - tls
    - privacy
    - censorship
