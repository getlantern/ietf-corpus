document: rfc-5198
kind: design-rationale
summary: NFC normalization was selected over NFKC and other forms because it is closest to actual use in practice, minimizes side-effects from treating characters as equivalent that may not be in all situations, and typically requires the least work converting from non-Unicode encodings.
section: "3"
