document: rfc-5026
kind: interoperability-note
summary: The MIP6_HOME_PREFIX attribute provides only a single prefix and does not carry all information present in an IPv6 router advertisement. It is used solely for Home Address auto-configuration during bootstrapping and does not replace Mobile Prefix Discovery (RFC 3775) for its defined purposes.
section: 5.3.2
topics:
    - mobility
    - ip
