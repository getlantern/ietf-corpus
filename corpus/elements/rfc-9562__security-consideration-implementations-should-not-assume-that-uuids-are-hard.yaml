document: rfc-9562
kind: security-consideration
summary: Implementations SHOULD NOT assume that UUIDs are hard to guess. UUIDs MUST NOT be used as security capabilities (identifiers whose mere possession grants access). Discovery of predictability in a random number source will result in a vulnerability.
section: "8"
topics:
    - security
