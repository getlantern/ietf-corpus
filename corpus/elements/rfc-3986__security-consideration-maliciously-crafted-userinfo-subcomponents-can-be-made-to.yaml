document: rfc-3986
kind: security-consideration
summary: Maliciously crafted userinfo subcomponents can be made to visually resemble trusted domain names (e.g., "http://trusted.example@evil.example/"). Applications should visually distinguish userinfo from the host; scheme-specific parsers should flag such URIs as errors.
section: "7.6"
topics:
    - security
