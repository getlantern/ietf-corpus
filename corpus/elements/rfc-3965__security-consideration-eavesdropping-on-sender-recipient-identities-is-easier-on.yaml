document: rfc-3965
kind: security-consideration
summary: Eavesdropping on sender/recipient identities is easier on the Internet than on GSTN. Message encryption does not prevent traffic analysis; channel security (VPN, TLS, IPSec) helps frustrate traffic analysis.
section: 5.2.7
