document: rfc-7195
kind: security-consideration
summary: An attacker could trick an endpoint into actively dialing a circuit-switched number (potentially premium-rate). Endpoints MUST authenticate remote endpoints that wish to remain passive; it is RECOMMENDED to have local policies restricting calls to certain number ranges and to obtain end-user consent before initiating circuit-switched connections.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
