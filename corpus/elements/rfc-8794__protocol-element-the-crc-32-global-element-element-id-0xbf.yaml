document: rfc-8794
kind: protocol-element
summary: The CRC-32 Global Element (Element ID 0xBF) may appear as a Child Element of any Master Element and stores a 32-bit CRC covering all Element Data of its Parent except the CRC-32 Element itself. The Void Element (Element ID 0xEC) is used to overwrite data or reserve space.
section: "11.3"
topics:
    - security
