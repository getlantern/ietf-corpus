document: rfc-3775
kind: normative-requirement
summary: The mobile node and home agent MUST use an IPsec security association to protect the integrity and authenticity of Binding Updates and Acknowledgements. Both MUST support and SHOULD use ESP in transport mode with a non-NULL payload authentication algorithm providing data origin authentication and connectionless integrity.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - ip
    - mobility
