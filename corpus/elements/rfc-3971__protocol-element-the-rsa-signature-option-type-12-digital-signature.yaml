summary: 'The RSA Signature Option (Type 12) Digital Signature field is computed over: (1) a 128-bit CGA Message Type tag for SEND (0x086FCA5E10B200C99C8CE001642...77C08), (2) source and destination IPv6 addresses, (3) ICMPv6 Type, Code, and Checksum, (4) the NDP message header, and (5) all NDP options preceding the RSA Signature option.'
