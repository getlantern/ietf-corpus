document: rfc-5262
kind: normative-requirement
summary: Conformant XML processors MUST support both UTF-8 and UTF-16 encodings. UTF-8 is the RECOMMENDED encoding for this partial presence format. If a receiving application accepted a character set in an initial <pidf-full>, it MUST continue to accept that same character set in subsequent <pidf-diff> documents but MUST NOT need to accept a character set change.
section: "10"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
