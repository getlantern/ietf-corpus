document: rfc-2571
kind: protocol-element
summary: 'PDUs are classified by function into seven classes: Read, Write, Response, Notification, and Internal (functional), plus Confirmed (expects a response) and Unconfirmed (not acknowledged). GetRequest, GetNextRequest, GetBulkRequest, SetRequest, and InformRequest are Confirmed; Trapv2 and Report are Unconfirmed.'
