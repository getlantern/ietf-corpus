document: rfc-9211
kind: normative-requirement
summary: An intermediary SHOULD NOT append a Cache-Status member to responses that it generates locally, even if that intermediary contains a cache, unless the generated response is based upon a stored response (e.g., 304 or 206).
section: "2"
rfc2119_level: SHOULD NOT
topics:
    - http
