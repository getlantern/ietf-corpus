document: rfc-7263
kind: design-rationale
summary: In closed or managed P2P networks where all peers are in the same address realm, DRR can safely be used as the preferred mode because NAT traversal issues do not apply. In open networks, DRR should only be tried if the administrator has sufficient topology knowledge.
section: 3.2.1
topics:
    - routing
    - nat
