document: rfc-9545
kind: interoperability-note
summary: Under ECMP conditions, SR packets may traverse multiple paths, meaning the PSID can only identify the SID list rather than the actual forwarding path. Introducing a PSID to an existing flow may also cause it to take a different ECMP path, potentially invalidating performance measurement results.
section: "2.1"
topics:
    - mpls
    - routing
    - measurement
