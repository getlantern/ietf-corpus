document: rfc-5429
kind: normative-requirement
summary: If the SMTP/LMTP server supports RFC 2034 Enhanced Error Codes, it MUST prepend an appropriate Enhanced Error Code to the reason text. Enhanced Error codes 5.7.1 or 5.7.0 are RECOMMENDED.
section: "2.5"
rfc2119_level: MUST
topics:
