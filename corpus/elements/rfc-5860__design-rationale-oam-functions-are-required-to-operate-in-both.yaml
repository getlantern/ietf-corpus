document: rfc-5860
kind: design-rationale
summary: OAM functions are required to operate in both IP-capable and non-IP-capable MPLS-TP environments because MPLS-TP deployments may or may not include IP in the data plane; this decoupling ensures OAM is universally applicable across all MPLS-TP scenarios.
