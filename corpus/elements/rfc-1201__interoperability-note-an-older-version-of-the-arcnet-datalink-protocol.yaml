document: rfc-1201
kind: interoperability-note
summary: 'An older version of the ARCNET datalink protocol definition allowed only two fragments per packet (legal split flags: 0, 1, 2). Compatibility with that older standard can be maintained by configuring the maximum client data length to 1008 octets.'
