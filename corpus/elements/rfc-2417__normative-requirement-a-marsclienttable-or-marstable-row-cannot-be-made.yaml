document: rfc-2417
kind: normative-requirement
summary: A marsClientTable or marsTable row cannot be made 'active' until the agent has also created a corresponding row in the associated statistics table (marsClientStatTable or marsStatTable, respectively). This coupling ensures statistics are always available for active entities.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
