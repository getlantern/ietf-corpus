document: rfc-8668
kind: normative-requirement
summary: Reserved bits in the flags fields of TLV 25, sub-TLV 41, and sub-TLV 42 MUST be set to zero when originated and MUST be ignored when received. The starred (*) bit position in sub-TLVs 41/42 (used in the L3 Adj-SID sub-TLV) SHOULD be sent as 0 and MUST be ignored on receipt.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
