document: rfc-2594
kind: state-machine
summary: 'WwwOperStatus defines five operational states for a WWW service: down(1) — service unavailable; running(2) — operational and available; halted(3) — operational but not accepting requests; congested(4) — no additional inbound associations can be accommodated; restarting(5) — temporarily unavailable but coming back.'
