document: rfc-4171
kind: normative-requirement
summary: A maximum of one logical backup iSNS server SHALL exist at any individual IP address, to avoid conflicts from multiple servers listening on the same canonical iSNS TCP or UDP port number.
section: "2.8"
rfc2119_level: MUST
