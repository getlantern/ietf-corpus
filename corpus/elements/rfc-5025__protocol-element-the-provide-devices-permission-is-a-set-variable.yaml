document: rfc-5025
kind: protocol-element
summary: The <provide-devices> permission is a set variable controlling watcher visibility into <device> elements. Set members identify devices by <class>, <deviceID> (URI equivalence), or <occurrence-id> (case-sensitive equality). The special value <all-devices> grants access to all device occurrences.
section: 3.3.1.1
topics:
    - sip
    - privacy
