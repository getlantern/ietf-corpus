document: rfc-3031
kind: protocol-element
summary: Loop control for non-TTL LSP segments (where TTL cannot protect against forwarding loops) requires all LSRs that may attach to such segments to support a common loop detection technique, though use is optional. The loop detection technique is specified in [MPLS-ATM] and [MPLS-LDP], not in this architecture document.
section: "3.24"
topics:
    - routing
    - security
