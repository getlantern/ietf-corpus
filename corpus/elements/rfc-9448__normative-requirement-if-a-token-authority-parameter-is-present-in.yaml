document: rfc-9448
kind: normative-requirement
summary: If a 'token-authority' parameter is present in the challenge, the ACME client MAY use it to identify the Token Authority URL. If it is not present, the ACME client MUST identify the Token Authority based on locally configured information or local policies.
section: "4"
rfc2119_level: MUST
topics:
