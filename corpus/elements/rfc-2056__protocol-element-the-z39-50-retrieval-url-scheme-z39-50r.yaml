document: rfc-2056
kind: protocol-element
summary: The Z39.50 Retrieval URL (scheme z39.50r) allows a Z39.50 session to be used as a transparent transfer mechanism to retrieve a specific information object. Host and database are required; a docid is required to make the retrieval meaningful. After receiving the record, the client may close or keep the session.
section: "4"
extracted_by: claude-sonnet-4-6
