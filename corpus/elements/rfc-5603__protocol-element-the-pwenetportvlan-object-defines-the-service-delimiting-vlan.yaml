document: rfc-5603
kind: protocol-element
summary: The pwEnetPortVlan object defines the service-delimiting VLAN on the original physical or virtual CE-bound port. Value 4095 means all port traffic maps to the same PW (port mode); value 0 means untagged frames. This object MUST equal pwEnetPwVlan when pwEnetVlanMode is noChange.
