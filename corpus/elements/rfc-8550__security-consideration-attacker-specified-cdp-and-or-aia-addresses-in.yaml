document: rfc-8550
kind: security-consideration
summary: Attacker-specified CDP and/or AIA addresses in fake certificates could be used to mount denial-of-service attacks or to allow the originator to detect receipt of the message even if signature verification fails. Caution should be taken when processing certificates that have not first been validated to a trust anchor.
section: "6"
topics:
    - email
    - pkix
    - security
