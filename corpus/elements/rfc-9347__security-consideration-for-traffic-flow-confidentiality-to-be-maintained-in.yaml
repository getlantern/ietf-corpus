document: rfc-9347
kind: security-consideration
summary: For Traffic Flow Confidentiality to be maintained in congestion-controlled mode, the shape and timing of the encapsulated inner traffic must not be directly affecting outer network congestion in a predictable way; if it would be, non-congestion-controlled mode should be used instead.
section: "8"
topics:
