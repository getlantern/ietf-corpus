document: rfc-5685
kind: wire-format
summary: The REDIRECT payload wire format includes the standard IKEv2 Notify header (Next Payload, C bit, RESERVED, Payload Length, Protocol ID=0, SPI Size=0, Notify Message Type=16407), followed by GW Ident Type (1 octet), GW Ident Len (1 octet), New Responder GW Identity (variable), and Nonce Data (variable, 16–256 bytes, present only in IKE_SA_INIT responses).
section: "9.2"
topics:
