summary: 'The ''pty-req'' channel request includes: TERM variable (string), terminal width/height in characters and pixels (four uint32s), and encoded terminal modes (string). Zero dimension parameters MUST be ignored; character/row dimensions override pixel dimensions when nonzero.'
