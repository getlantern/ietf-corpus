document: rfc-7616
kind: protocol-element
summary: Username hashing computes username = H(unq(username) ":" unq(realm)) using the same algorithm as the credential hash. The client MUST include userhash=true in the Authorization field when sending a hashed username.
section: 3.4.4
topics:
