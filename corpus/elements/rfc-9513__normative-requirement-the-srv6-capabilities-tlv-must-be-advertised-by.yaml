document: rfc-9513
kind: normative-requirement
summary: The SRv6 Capabilities TLV MUST be advertised by every SRv6-enabled router exactly once in the Router Information LSA; area-scoped flooding is REQUIRED. When multiple instances exist, the area-scoped one takes precedence; among same-scope instances, the one with the numerically smallest Link State ID MUST be used.
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
