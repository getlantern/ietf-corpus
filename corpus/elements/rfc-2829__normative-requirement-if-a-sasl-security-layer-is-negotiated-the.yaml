document: rfc-2829
kind: normative-requirement
summary: If a SASL security layer is negotiated, the client MUST discard all information about the server fetched prior to SASL. The client SHOULD fetch supportedSASLMechanisms both before and after SASL security layer negotiation and verify the value has not changed, to detect active attacks removing supported mechanisms.
section: "4"
rfc2119_level: MUST
topics:
    - ldap
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
