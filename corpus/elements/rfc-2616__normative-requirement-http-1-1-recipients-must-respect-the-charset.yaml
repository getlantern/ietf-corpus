document: rfc-2616
kind: normative-requirement
summary: HTTP/1.1 recipients MUST respect the charset label provided by the sender; user agents that can guess a charset MUST use the charset from the content-type field if supported, rather than the recipient's preference, when initially displaying a document.
section: 3.4.1
rfc2119_level: MUST
topics:
    - http
