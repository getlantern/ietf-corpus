document: rfc-2155
kind: protocol-element
summary: 'The APPN MIB module (appnMIB, OID snanauMIB 4 / mib-2 34 4) defines six object groups: appnNode, appnNn, appnLocalTopology, appnDir, appnCos, and appnSessIntermediate, plus appnTraps for SNA/MS alert notification. It covers configuration monitoring, operational statistics, and limited control (port/link activation) but explicitly excludes node configuration, endpoint sessions, DLUR, and HPR management.'
section: "3.1"
topics:
    - snmp
