document: rfc-2730
kind: wire-format
summary: 'Number of Addresses Requested option (code 7, length 4): two 16-bit unsigned integers (minimum, desired). The minimum MUST be less than or equal to desired; violation triggers an Invalid Request error. Servers MUST allocate between minimum and desired addresses in their response.'
section: "3.8"
