document: rfc-1406
kind: protocol-element
summary: 'dsx1Fdl is a read-write bitmap describing facilities data link usage: other(1), dsx1Ansi-T1-403(2) for ANSI-recommended FDL exchange, dsx1Att-54016(4) for AT&T ESF FDL exchanges, dsx1Fdl-none(8) indicating the device does not use the FDL. The bitmap allows simultaneous capabilities to be indicated.'
section: 4.1.1
