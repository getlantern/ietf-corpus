document: rfc-2752
kind: normative-requirement
summary: If the PDP fails to verify the AUTH_DATA policy element, it MUST return a policy control failure (Error Code = 02) to the PEP, and SHOULD supply a POLICY_DATA object with AUTH_DATA containing A-Type=POLICY_ERROR_CODE with details on the failure.
