document: rfc-6994
kind: design-rationale
summary: The optional 32-bit ExID provides byte alignment in the TCP header that matches what a future conventionally-assigned TCP option codepoint would have, reducing implementation errors (especially word-alignment padding) when software is later migrated to an assigned codepoint.
section: "3.1"
topics:
