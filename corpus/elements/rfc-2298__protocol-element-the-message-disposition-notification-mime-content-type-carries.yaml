document: rfc-2298
kind: protocol-element
summary: The message/disposition-notification MIME content-type carries the machine-readable portion of an MDN. It must use 7bit encoding and is structured as a series of RFC 822-style header fields. It is used as the second component inside a multipart/report with report-type=disposition-notification.
section: "3.1"
