document: rfc-5424
kind: wire-format
summary: 'The syslog message ABNF structure is: SYSLOG-MSG = HEADER SP STRUCTURED-DATA [SP MSG], where HEADER = PRI VERSION SP TIMESTAMP SP HOSTNAME SP APP-NAME SP PROCID SP MSGID. Each HEADER field is separated by a single SP (%d32). MSG is optional.'
section: "6"
