document: rfc-5259
kind: protocol-element
summary: The AVAILABLECONVERSIONS[section-part] data item returns the list of target MIME types a given body part can be converted to; it MUST return a subset of what CONVERSIONS command returns, and must filter out types incompatible with specified conversion parameters.
