document: rfc-6388
kind: protocol-element
summary: The P2MP Capability Parameter TLV (type 0x0508) is a new LDP Capability Parameter used to advertise support for P2MP LSP setup. It consists of a 16-bit type, 16-bit length (=1), and an 8-bit field containing the S bit as specified in RFC 5561.
section: "2.1"
topics:
