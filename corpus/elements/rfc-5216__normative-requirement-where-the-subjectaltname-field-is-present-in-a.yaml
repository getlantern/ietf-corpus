document: rfc-5216
kind: normative-requirement
summary: Where the subjectAltName field is present in a peer or server certificate, the Peer-Id or Server-Id MUST be set to the contents of the subjectAltName. NAI identities MUST use rfc822Name in the subjectAltName; use of emailAddress RDN in the subject field is deprecated and MUST NOT be used.
section: "5.2"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
