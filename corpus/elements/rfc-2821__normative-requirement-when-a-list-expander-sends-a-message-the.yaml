document: rfc-2821
kind: normative-requirement
summary: When a list expander sends a message, the reverse-path (MAIL FROM:) MUST be changed to the address of the list administrator. The message header's 'From' field MUST be left unchanged.
section: "3.10"
rfc2119_level: MUST
topics:
    - email
