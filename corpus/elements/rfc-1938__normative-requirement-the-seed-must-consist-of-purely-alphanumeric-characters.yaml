document: rfc-1938
kind: normative-requirement
summary: The seed MUST consist of purely alphanumeric characters and MUST be 1 to 16 characters in length. The seed MUST be case insensitive and MUST be internally converted to lower case before processing.
section: "6.0"
rfc2119_level: MUST
topics:
    - security
