document: rfc-6376
kind: protocol-element
summary: 'The DKIM DNS TXT key record uses a tag=value format with tags: v= (version, RECOMMENDED, must be ''DKIM1''), h= (hash algorithms), k= (key type, default ''rsa''), n= (notes), p= (public key data, REQUIRED; empty value means revoked), s= (service type), t= (flags).'
