document: rfc-6275
kind: normative-requirement
summary: Home and care-of addresses MUST be unicast routable addresses. Unique-local IPv6 unicast addresses (ULAs) SHOULD NOT be used as home or care-of addresses when other address choices are available, because ULAs at a foreign site cannot successfully reach the mobile node's home agent.
section: "4.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
