document: rfc-5593
kind: normative-requirement
summary: 'Additional access identifiers MUST take one of two forms: either a plain application name (e.g., ''exampleapp'') or an application name followed by ''+'' and a userid (e.g., ''exampleapp3+testuser'').'
section: "3.3"
rfc2119_level: MUST
topics:
