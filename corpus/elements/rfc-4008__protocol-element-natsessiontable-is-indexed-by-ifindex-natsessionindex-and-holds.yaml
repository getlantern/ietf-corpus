document: rfc-4008
kind: protocol-element
summary: natSessionTable is indexed by (ifIndex, natSessionIndex) and holds active NAT sessions. Each entry links private-realm and public-realm session 5-tuples (address, port, protocol) via bind IDs (natSessionPrivateSrcEPBindId, natSessionPrivateDstEPBindId) and includes session direction, up time, and per-session translation counters.
