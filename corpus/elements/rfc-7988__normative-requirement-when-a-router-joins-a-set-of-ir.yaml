document: rfc-7988
kind: normative-requirement
summary: When a router joins a set of IR P-tunnels via an Intra-AS I-PMSI A-D route (Leaf Information Required bit not set), the MPLS Label field of the PTA MUST be set to a non-zero value and the label-to-I-PMSI binding MUST be one to one.
section: 4.1.2
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
