document: rfc-2594
kind: security-consideration
summary: SNMPv1 is not a secure environment; even on an IPsec-protected network there is no access control over who can read or modify MIB objects. Implementers are recommended to use SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575).
section: "8"
topics:
    - snmp
    - security
