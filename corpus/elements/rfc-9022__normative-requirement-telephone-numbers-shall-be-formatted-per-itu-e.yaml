document: rfc-9022
kind: normative-requirement
summary: Telephone numbers SHALL be formatted per ITU-E.164 and MUST begin with a plus sign ('+', ASCII 0x2B), followed by a country code, a dot ('.', ASCII 0x2E), and a digit sequence.
