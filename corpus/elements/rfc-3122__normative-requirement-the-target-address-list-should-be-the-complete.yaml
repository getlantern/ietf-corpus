document: rfc-3122
kind: normative-requirement
summary: The Target Address List SHOULD be the complete list of addresses of the target interface. If it does not fit in one Advertisement, one or more additional IND Advertisement messages SHOULD follow with the remaining addresses.
section: "3.1"
rfc2119_level: SHOULD
