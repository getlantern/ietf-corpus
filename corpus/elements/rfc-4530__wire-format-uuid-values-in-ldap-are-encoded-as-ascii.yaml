document: rfc-4530
kind: wire-format
summary: UUID values in LDAP are encoded as ASCII character strings in the format described in RFC 4122, e.g., '597ae2f6-16a6-1027-98f4-d28b5365dc14'. The underlying ASN.1 type is OCTET STRING of SIZE(16) (128 bits).
section: "2.1"
