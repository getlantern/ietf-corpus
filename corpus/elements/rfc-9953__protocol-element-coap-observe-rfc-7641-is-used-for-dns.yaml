document: rfc-9953
kind: protocol-element
summary: CoAP Observe (RFC 7641) is used for DNS Push-like subscriptions in DoC. The DoC server maintains a list of observers per DNS query; when the list empties, the server SHOULD cancel any corresponding upstream DNS Push subscription.
section: "5.1"
topics:
    - dns
