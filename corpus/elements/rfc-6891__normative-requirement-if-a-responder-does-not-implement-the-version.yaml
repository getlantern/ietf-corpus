document: rfc-6891
kind: normative-requirement
summary: If a responder does not implement the VERSION level of the request, it MUST respond with RCODE=BADVERS. All responses MUST be limited in format to the VERSION level of the request, but the VERSION of each response SHOULD be the highest implementation level of the responder.
section: 6.1.3
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
