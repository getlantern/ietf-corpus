document: rfc-9115
kind: normative-requirement
summary: If the server accepts a client's request for unauthenticated GET, it MUST reflect the 'allow-certificate-get' attribute setting in the resulting order object. Even when unauthenticated GET is allowed, the server MUST also allow POST-as-GET requests to the certificate resource.
section: 2.3.5
rfc2119_level: MUST
topics:
    - acme
    - pkix
