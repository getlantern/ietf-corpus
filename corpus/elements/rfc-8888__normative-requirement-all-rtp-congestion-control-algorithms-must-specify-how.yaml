document: rfc-8888
kind: normative-requirement
summary: All RTP congestion control algorithms MUST specify how they respond to loss of feedback packets, since RTCP packets carry no sequence number and loss must be inferred from elapsed time since the last feedback packet.
section: "5"
rfc2119_level: MUST
topics:
