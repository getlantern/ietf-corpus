document: rfc-6501
kind: protocol-element
summary: The <available-media> element describes conference media via <entry> child elements, each containing <mixing-mode> (moderator-controlled, FCFS, or automatic), <codecs> (with 'decision' attribute and codec/subtype children referencing the RTP Payload Format media types registry), and <controls> (mute, pause-video, gain, video-layout).
