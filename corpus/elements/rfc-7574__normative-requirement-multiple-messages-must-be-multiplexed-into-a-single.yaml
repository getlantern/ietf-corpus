document: rfc-7574
kind: normative-requirement
summary: Multiple messages MUST be multiplexed into a single datagram for transmission. Messages in a single datagram MUST be processed in the strict order in which they appear. If an invalid message is found in a datagram, the remaining messages MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
    - udp
