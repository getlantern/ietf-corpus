document: rfc-6562
kind: normative-requirement
summary: The overhang period length MUST be randomly chosen such that it is computationally infeasible for an attacker to reliably estimate the talkspurt length. Audio data comprising the overhang MUST be packetized and transmitted in a manner indistinguishable from other talkspurt data.
section: "4"
rfc2119_level: MUST
topics:
