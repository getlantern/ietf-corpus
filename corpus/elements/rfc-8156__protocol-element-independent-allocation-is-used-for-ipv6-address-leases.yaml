document: rfc-8156
kind: protocol-element
summary: 'Independent allocation is used for IPv6 address leases: available addresses are permanently split between the primary and secondary servers based on the low-order bit (bit 127) of the address. The primary allocates addresses where bit 127 = 1; the secondary allocates where bit 127 = 0. No message exchange is required to distribute this allocation.'
section: 4.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
