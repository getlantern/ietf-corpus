document: rfc-3030
kind: normative-requirement
summary: After a failed BDAT command, a RSET command MUST be issued to clear the transaction before additional commands may be sent. The RSET clears all segments sent during that transaction and resets the session.
section: "2"
rfc2119_level: MUST
topics:
