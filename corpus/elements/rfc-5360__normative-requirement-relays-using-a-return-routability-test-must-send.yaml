document: rfc-5360
kind: normative-requirement
summary: Relays using a return routability test MUST send the MESSAGE request with the permission document to a SIPS URI. Permission documents sent by such relays MUST only contain secure URIs (SIPS and HTTPS), and a portion of those URIs MUST be cryptographically random with at least 32 bits of randomness.
section: 5.6.1.3
rfc2119_level: MUST
topics:
    - sip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
