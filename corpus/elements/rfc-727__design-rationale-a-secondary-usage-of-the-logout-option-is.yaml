document: rfc-727
kind: design-rationale
summary: A secondary usage of the LOGOUT option is for a server to warn a user of an impending auto-logout due to inactivity by sending IAC WILL LOGOUT, allowing the user to respond with DON'T LOGOUT to continue the session.
