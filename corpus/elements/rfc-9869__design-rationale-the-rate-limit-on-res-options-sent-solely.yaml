document: rfc-9869
kind: design-rationale
summary: 'The rate limit on RES Options sent solely in response to REQ Options exists to mitigate a DoS amplification vector: a sender could otherwise use DPLPMTUD probe packets to elicit a stream of responses from a victim receiver.'
