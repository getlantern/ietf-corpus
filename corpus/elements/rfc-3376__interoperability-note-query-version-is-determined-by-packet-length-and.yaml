document: rfc-3376
kind: interoperability-note
summary: 'Query version is determined by packet length and Max Resp Code: IGMPv1 Query has length=8 octets and Max Resp Code=0; IGMPv2 Query has length=8 octets and Max Resp Code≠0; IGMPv3 Query has length≥12 octets. Queries not matching any condition MUST be silently ignored.'
section: "7.1"
rfc2119_level: MUST
topics:
    - multicast
