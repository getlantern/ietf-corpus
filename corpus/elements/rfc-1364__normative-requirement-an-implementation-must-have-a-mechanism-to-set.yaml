document: rfc-1364
kind: normative-requirement
summary: An implementation must have a mechanism to set a minimum elapsed time between learning a new OSPF route and advertising it via BGP; the default value must be 0, meaning the route is advertised instantly.
section: "2.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
