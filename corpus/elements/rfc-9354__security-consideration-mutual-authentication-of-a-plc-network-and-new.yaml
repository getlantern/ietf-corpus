document: rfc-9354
kind: security-consideration
summary: Mutual authentication of a PLC network and new devices is important to prevent malicious devices from joining. Methods include TLS/DTLS Profile (RFC 7925), Constrained Join Protocol CoJP (RFC 9031), Zero-Touch Secure Join, and EAP methods via PANA (RFC 5191). No specific mechanism is mandated.
section: "8"
