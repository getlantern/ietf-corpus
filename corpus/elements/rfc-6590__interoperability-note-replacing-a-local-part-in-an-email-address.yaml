document: rfc-6590
kind: interoperability-note
summary: Replacing a local-part in an email address with transformation output containing an "@" character (0x40) or space (0x20) is not permitted by the SMTP local-part specification (RFC 5321), so such output must be base64-encoded before substitution to remain syntactically valid.
