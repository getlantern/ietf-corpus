document: rfc-7670
kind: wire-format
summary: The IKEv2 Certificate payload (from RFC 7296 Section 3.6) carries a 1-octet Cert Encoding field set to 15 for Raw Public Key, followed by a variable-length Certificate Data field containing the DER-encoded SubjectPublicKeyInfo structure. For example, a 256-bit ECDSA key produces a 91-byte SubjectPublicKeyInfo and a 96-byte Certificate payload.
section: "3"
