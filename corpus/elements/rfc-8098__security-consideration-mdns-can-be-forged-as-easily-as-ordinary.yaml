document: rfc-8098
kind: security-consideration
summary: MDNs can be forged as easily as ordinary Internet email. A forged spam or phishing message can include Disposition-Notification-To to trick recipients into sending MDNs revealing that addresses are active. MDN processing SHOULD only be invoked after verifying the authenticity of the triggering message.
section: "6.1"
topics:
    - email
    - security
