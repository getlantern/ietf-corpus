summary: The procedure is backward compatible with both RFC 3209 and RFC 3473. It uses the IPv4/IPv6 source address as local node_id and IPv4/IPv6 destination address as remote node_id, without modifying TTL/Hop Limit setting and processing or Hello Processing for State Recovery defined in RFC 3473 Section 9.3.
