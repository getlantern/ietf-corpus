kind: protocol-element
summary: The AlgorithmIdentifier for an XMSS public key uses OID id-alg-xmss-hashsig (1.3.6.1.5.5.7.6.34). The parameters field MUST be absent. Hash function and tree height are identified within the public key and signature values themselves.
