document: rfc-6572
kind: normative-requirement
summary: When the LMA delegates MN-HNP assignment to the HAAA, the PMIP6-Home-HN-Prefix attribute MUST contain all zeroes ('::') in the Access-Request and Prefix-Length MUST be set to 128. The attribute MUST be present in the Access-Accept if the prior request included one and SHOULD carry the assigned MN-HNP.
section: "4.8"
rfc2119_level: MUST
topics:
    - mobility
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
