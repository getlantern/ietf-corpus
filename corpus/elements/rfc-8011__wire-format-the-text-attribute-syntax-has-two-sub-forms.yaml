document: rfc-8011
kind: wire-format
summary: 'The ''text'' attribute syntax has two sub-forms: ''textWithoutLanguage'' (natural language inferred from the ''attributes-natural-language'' operation attribute) and ''textWithLanguage'' (embeds an explicit language tag override alongside the text). Maximum size is specified per-attribute in octets; values exceeding the limit SHOULD be truncated at a natural word boundary.'
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
