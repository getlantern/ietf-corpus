document: rfc-7230
kind: normative-requirement
summary: A recipient MUST be able to parse the chunked transfer coding because it is crucial for framing messages when payload body size is unknown in advance. A sender MUST NOT apply chunked more than once; chunked MUST be the final transfer coding when any other coding is applied to a request payload.
section: 3.3.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
