document: rfc-9722
kind: normative-requirement
summary: If a PE recovers during the discovery window and does not support or advertise the T-bit, all PEs in the current peering sequence SHALL immediately revert to the default timer-based behavior described in RFC 7432.
section: "3.1"
rfc2119_level: SHALL
