document: rfc-5672
kind: protocol-element
summary: The Identity Assessor is a module that consumes DKIM's mandatory payload (the SDID). It is dedicated to assessment of the delivered identifier; other DKIM and non-DKIM values may also be delivered to it, but such additional activity is outside the scope of the DKIM signature specification.
