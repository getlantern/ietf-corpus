document: rfc-2710
kind: interoperability-note
summary: An Ethernet-attached router must configure its Ethernet address reception filter to accept all Ethernet multicast addresses starting with 3333 (hexadecimal) for IPv6 multicasts. If the interface does not support range filtering, it must accept ALL Ethernet multicast addresses.
section: "4"
topics:
