document: rfc-3585
kind: interoperability-note
summary: IPsecPolicyForEndpoint associates a PolicyGroup with a specific IPProtocolEndpoint (interface). If that association is absent, the system-wide IPsecPolicyForSystem PolicyGroup is used as the default fallback for that endpoint. An endpoint may have at most one associated PolicyGroup.
section: "4.4"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
