document: rfc-2622
kind: interoperability-note
summary: RPSL obsoletes RFC 2280 and replaces RIPE-181 (RFC 1786). RIPE-81 was the first Internet routing policy language; RIPE-181 succeeded it but was found unable to express certain policies, motivating RPSL's more generalized design.
