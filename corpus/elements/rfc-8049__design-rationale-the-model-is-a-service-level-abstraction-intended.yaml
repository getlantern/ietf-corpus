document: rfc-8049
kind: design-rationale
summary: The model is a service-level abstraction intended for instantiation at the management/orchestration layer, not directly on network elements. A management system translates it into element-level configuration via NETCONF, CLI, or other mechanisms. How network elements are configured is explicitly out of scope.
