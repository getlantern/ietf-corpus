document: rfc-7564
kind: protocol-element
summary: 'PRECIS defines three actions: Preparation (ensuring characters are allowed by the string class), Enforcement (applying all rules of a profile to determine if a string can be used in a protocol slot), and Comparison (applying rules to two strings to determine equivalence). Servers are responsible for enforcement; clients for preparation.'
section: "3"
extracted_by: claude-sonnet-4-6
