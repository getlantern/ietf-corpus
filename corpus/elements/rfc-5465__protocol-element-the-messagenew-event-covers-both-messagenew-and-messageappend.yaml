document: rfc-5465
kind: protocol-element
summary: The MessageNew event covers both MessageNew and MessageAppend from RFC 5423. For the selected mailbox, the server sends an unsolicited EXISTS response followed by an unsolicited FETCH response with client-requested attributes. For other mailboxes, an unsolicited STATUS (UIDNEXT MESSAGES) is sent.
section: "5.2"
