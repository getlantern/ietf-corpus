document: rfc-3281
kind: security-consideration
summary: Implementers SHOULD be very careful when mapping authenticated identities (from TLS, S/MIME, etc.) to the AC holder field when non-PKC authentication is used. AC issuers MUST encode distinguished names in holder.entityName identically to the holder's PKC to prevent recognition failures.
section: "8"
topics:
    - pkix
    - security
    - tls
