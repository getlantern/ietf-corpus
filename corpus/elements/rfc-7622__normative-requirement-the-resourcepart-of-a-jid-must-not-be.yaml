document: rfc-7622
kind: normative-requirement
summary: The resourcepart of a JID MUST NOT be zero octets and MUST NOT exceed 1023 octets in length after normalization and UTF-8 encoding. It MUST conform to the OpaqueString profile of the PRECIS FreeformClass as specified in RFC 7613.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
