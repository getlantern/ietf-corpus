document: rfc-1587
kind: protocol-element
summary: The P-bit (propagate bit) appears in the options field of the Type-7 LSA header. It signals the NSSA area border router to translate the type-7 LSA into a type-5 LSA for flooding into the backbone. It is not used in Hello or Database Description packets.
section: Appendix B
topics:
    - routing
