document: rfc-7826
kind: protocol-element
summary: An RTSP session is a stateful entity established by a successful SETUP request (200 OK response). It persists until timed out by the server or explicitly removed by TEARDOWN. A session can aggregate one or more media streams under common control.
section: "3.2"
topics:
    - realtime
