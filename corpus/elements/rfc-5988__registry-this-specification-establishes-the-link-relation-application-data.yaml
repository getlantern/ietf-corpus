document: rfc-5988
kind: registry
summary: This specification establishes the Link Relation Application Data registry, allowing per-application metadata to be attached to entries in the Link Relation Type registry. Registration requires Specification Required with a Designated Expert; each entry requires an Application Name, Description, and Default Value.
