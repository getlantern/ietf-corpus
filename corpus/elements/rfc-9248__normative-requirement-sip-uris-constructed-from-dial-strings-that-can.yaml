document: rfc-9248
kind: normative-requirement
summary: SIP URIs constructed from dial strings that can be expressed as E.164 numbers MUST use a SIP URI with ';user=phone' tag and the user part MUST conform to 'global-number' per RFC 3966 without any 'visual-separator' characters. Non-E.164 dial strings MUST use dialstring URIs per RFC 4967.
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
