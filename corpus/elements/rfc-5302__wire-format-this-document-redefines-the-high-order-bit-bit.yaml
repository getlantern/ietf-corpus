document: rfc-5302
kind: wire-format
summary: This document redefines the high-order bit (bit 8) of the default Metric field in TLVs 128 and 130 as the 'up/down bit'. Previously reserved and set to zero, this bit now signals L2->L1 inter-area routes. It is a single bit within the 1-byte default metric sub-field of the 4-byte TOS metric field.
section: "2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
