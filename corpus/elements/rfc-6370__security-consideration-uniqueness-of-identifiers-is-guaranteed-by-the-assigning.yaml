document: rfc-6370
kind: security-consideration
summary: Uniqueness of identifiers is guaranteed by the assigning authority (IANA for ASNs used in Global_ID, operators for Node_IDs and IF_Nums). Failure to use unique values within specified scoping can cause operational problems; for example, a non-unique MEP value could result in failure to detect a mis-merged LSP.
section: "8"
topics:
    - routing
    - security
