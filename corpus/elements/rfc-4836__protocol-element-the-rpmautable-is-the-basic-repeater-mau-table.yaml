document: rfc-4836
kind: protocol-element
summary: The rpMauTable is the basic repeater MAU table, indexed by {rpMauGroupIndex, rpMauPortIndex, rpMauIndex}. Each entry carries rpMauType (OID identifying the MAU type), rpMauStatus (admin/operational state), rpMauMediaAvailable, rpMauMediaAvailableStateExits (Counter32), rpMauJabberState, rpMauJabberingStateEnters (Counter32), and rpMauFalseCarriers (Counter32).
