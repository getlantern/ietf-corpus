document: rfc-9632
kind: design-rationale
summary: RPKI-based authentication of geofeed files is explicitly optional. RPSL in many repositories is weakly authenticated, providing at best limited assurance; the RPKI approach is described as 'unfortunately complex,' and making signatures mandatory was not considered feasible for near-term deployment.
