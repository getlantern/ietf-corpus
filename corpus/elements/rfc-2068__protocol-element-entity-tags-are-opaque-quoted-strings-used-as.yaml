document: rfc-2068
kind: protocol-element
summary: Entity tags are opaque quoted strings used as cache validators, optionally prefixed by 'W/' to indicate weakness. A strong entity tag requires byte-for-byte equivalence; a weak tag ('W/"etag"') indicates semantic equivalence and may only be used for weak comparison.
section: "3.11"
topics:
    - http
