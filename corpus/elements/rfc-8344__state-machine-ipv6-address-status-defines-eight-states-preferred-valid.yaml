document: rfc-8344
kind: state-machine
summary: 'IPv6 address status defines eight states: ''preferred'' (valid, usable as source/destination), ''deprecated'' (valid but should not be used as new source), ''invalid'' (not a valid address), ''inaccessible'' (interface not operational), ''unknown'', ''tentative'' (DAD in progress, not for general use), ''duplicate'' (DAD failed, must not be used), and ''optimistic'' (available with restrictions while DAD is in progress). States correspond to RFC 4862 SLAAC protocol.'
section: "4"
