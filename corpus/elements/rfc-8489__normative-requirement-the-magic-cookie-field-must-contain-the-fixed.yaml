document: rfc-8489
kind: normative-requirement
summary: The Magic Cookie field MUST contain the fixed value 0x2112A442 in network byte order. This value enables servers to detect RFC 5389-era clients and aids demultiplexing when STUN is mixed with other protocols on the same port.
section: "5"
rfc2119_level: MUST
topics:
    - nat
