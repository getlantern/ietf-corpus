document: rfc-6564
kind: design-rationale
summary: Several deployed IPv6 routers and firewalls, contrary to RFC 2460, parse past or ignore all currently defined extension headers at wire speed using custom ASICs. Any new extension header not following a predictable format risks breaking these deployed capabilities.
section: "1"
topics:
    - ip
