document: rfc-6798
kind: design-rationale
summary: When PDV type is 2-point PDV and both Positive and Negative PDV Percentiles are set to 100.0, the Threshold/Peak fields carry peak values for the interval; the difference between positive and negative peak values then defines the total 2-point PDV range, allowing peak-range reporting without a separate field.
section: "3.2"
