document: rfc-9800
kind: protocol-element
summary: 'The NEXT-CSID flavor compresses a segment list where each CSID container is a fully formed SRv6 SID: its Locator-Node+Function are those of the first CSID and its Argument carries subsequent CSIDs. Contiguous NEXT-CSID containers are independent and can be treated as separate CSID sequences.'
section: "4.1"
topics:
    - routing
    - ip
