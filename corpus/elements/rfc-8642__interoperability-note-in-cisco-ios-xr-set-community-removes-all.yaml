document: rfc-8642
kind: interoperability-note
summary: 'In Cisco IOS XR, ''set community'' removes all communities except six preserved well-known ones: internet (0:0), graceful-shutdown (65535:0), accept-own (65535:1), NO_EXPORT (65535:65281), NO_ADVERTISE (65535:65282), and NO_EXPORT_SUBCONFED/local-AS (65535:65283). Removing these requires explicit per-community enumeration.'
