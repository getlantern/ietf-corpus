document: rfc-7879
kind: design-rationale
summary: B2BUAs deployed for address hiding or media latching can perform those functions while only terminating at the IP and UDP/TCP layers, without acting as a DTLS proxy. TURN and ICE are expected to be used more often than B2BUAs for NAT traversal because they provide better security properties.
section: "1.1"
topics:
    - sip
    - tls
    - nat
    - security
