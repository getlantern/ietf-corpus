document: rfc-4933
kind: wire-format
summary: Telephone numbers MUST begin with a plus sign ('+', 0x002B), followed by a country code per ITU E.164, a dot ('.', 0x002E), and digits. Maximum length is 17 characters. An optional 'x' attribute carries extension information.
section: "2.5"
