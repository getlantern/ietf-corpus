document: rfc-8308
kind: normative-requirement
summary: A party that has signaled support for 'delay-compression' MUST NOT initiate key re-exchange until it has sent its compression trigger message (if using delay-compression) or until SSH_MSG_USERAUTH_SUCCESS has been sent/received (if delay-compression was not negotiated).
section: 3.2.1
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
