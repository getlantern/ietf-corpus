document: rfc-8833
kind: security-consideration
summary: On shared computing platforms, other web applications with access to microphones or cameras may be able to sample confidential audio or video. Implementations MAY choose to limit concurrent access to input devices during confidential communication sessions.
section: "4"
rfc2119_level: MAY
topics:
    - webrtc
    - security
    - privacy
