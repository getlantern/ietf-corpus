document: rfc-5731
kind: normative-requirement
summary: Domain and host name syntax MUST conform to RFC 0952 and RFC 1123. The trailing dot required for DNS zone storage is implicit and MUST NOT be provided when exchanging host and domain names via EPP.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
