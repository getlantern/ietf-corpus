document: rfc-9928
kind: normative-requirement
summary: For IPv4 topology discovery via DHCP, only the first Relay Agent SHOULD set the giaddr field (per Section 3.1 of RFC 7969), meaning in networks with multiple relay agents, only part of the topology is conveyed via DHCPv4.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
