document: rfc-7712
kind: design-rationale
summary: 'POSH was introduced to handle multi-tenant hosting without requiring DNSSEC: a hosting provider need not hold the tenant''s private key, and the service domain''s web server can publish certificate hashes over HTTPS, achieving secure delegation via the existing PKI chain of trust without changes to DNS infrastructure.'
