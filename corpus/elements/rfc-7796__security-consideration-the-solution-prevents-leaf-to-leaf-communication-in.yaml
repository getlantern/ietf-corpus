document: rfc-7796
kind: security-consideration
summary: The solution prevents leaf-to-leaf communication in the VPLS data plane, enhancing security for customers by blocking network attacks from one leaf to another. However, if a PE is compromised or misconfigured and treats a leaf node as a root, a leaf may receive traffic from other leaves inappropriately. LDP authenticity and integrity per RFC 5036 must be considered.
section: "10"
topics:
    - security
    - mpls
