document: rfc-6731
kind: normative-requirement
summary: In the case of a validated NXDOMAIN response received from an RDNSS that can provide answers for the queried name, a node MUST NOT accept non-validated replies from other RDNSSes.
section: "4.1"
rfc2119_level: MUST NOT
