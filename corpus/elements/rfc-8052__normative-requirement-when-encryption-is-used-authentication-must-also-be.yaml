document: rfc-8052
kind: normative-requirement
summary: When encryption is used, authentication MUST also be provided either by an authenticated encryption algorithm (e.g., AES-GCM-128) or by a specific authentication algorithm (e.g., HMAC-SHA-256). Setting authentication to NONE with a non-authenticating confidentiality algorithm MUST NOT be done.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
