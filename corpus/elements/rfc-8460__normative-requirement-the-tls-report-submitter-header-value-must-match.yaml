document: rfc-8460
kind: normative-requirement
summary: The 'TLS-Report-Submitter' header value MUST match the domain of the 'contact-info' in the report body. Both 'TLS-Report-Domain' and 'TLS-Report-Submitter' MUST be included and SHOULD be covered by the DKIM signature.
section: "5.3"
rfc2119_level: MUST
topics:
    - email
    - security
