document: rfc-6135
kind: normative-requirement
summary: MSRP UAs MUST NOT use the SDP a=connection attribute. RFC 4975 defines connection reuse procedures for MSRP and this document does not modify those. If an MSRP UA receives an a=connection attribute, it MUST ignore it.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
