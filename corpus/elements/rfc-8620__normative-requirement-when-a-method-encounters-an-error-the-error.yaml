document: rfc-8620
kind: normative-requirement
summary: When a method encounters an error, the error response MUST be inserted at the current position in methodResponses and further method calls in the request MUST continue to be processed. Method-level errors MUST NOT generate an HTTP-level error response.
section: 3.6.2
rfc2119_level: MUST
topics:
    - json
