document: rfc-8534
kind: interoperability-note
summary: Leaf A-D routes constructed per Section 5.2 of this document can always be distinguished from those of RFC 7524 Section 6.2.2 because this document's routes never set RD to 0 or -1, while RFC 7524's global table multicast Leaf A-D routes always use RD of 0 or -1.
section: "5.2"
topics:
    - multicast
    - mpls
    - routing
