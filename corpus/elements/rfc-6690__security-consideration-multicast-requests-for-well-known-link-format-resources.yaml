document: rfc-6690
kind: security-consideration
summary: Multicast requests for well-known link-format resources could be used to perform denial of service on a constrained network. A multicast request SHOULD only be accepted if the request is sufficiently authenticated and secured using, e.g., IPsec or an appropriate object security mechanism.
section: "6"
rfc2119_level: SHOULD
topics:
    - security
    - multicast
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
