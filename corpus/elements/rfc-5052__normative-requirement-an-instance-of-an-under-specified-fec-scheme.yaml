document: rfc-5052
kind: normative-requirement
summary: An instance of an Under-Specified FEC scheme is fully identified by the tuple (FEC Encoding ID, FEC Instance ID). This tuple MUST identify a single scheme instance with at least one implementation, and the owning party MUST be able to provide information on how to obtain the scheme instance.
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
