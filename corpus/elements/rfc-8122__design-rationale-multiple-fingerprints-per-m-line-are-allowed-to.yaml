document: rfc-8122
kind: design-rationale
summary: Multiple fingerprints per 'm' line are allowed to support hash agility and scenarios where multiple certificates may be used (e.g., separate certificates for RTP and RTCP) or where the specific certificate to be used is not known at fingerprint exchange time.
