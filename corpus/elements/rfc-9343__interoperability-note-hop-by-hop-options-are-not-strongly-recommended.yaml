document: rfc-9343
kind: interoperability-note
summary: Hop-by-Hop Options are not strongly recommended by RFC 7045 and RFC 8200 in general; however, their use is justified here for OAM purposes. In practice, packets with Hop-by-Hop Options may be processed in the slow path or dropped by some implementations, a known deployment risk noted by the authors.
