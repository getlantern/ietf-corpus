document: rfc-9642
kind: protocol-element
summary: 'Four ''inline-or-keystore'' groupings provide a YANG choice between defining a key inline (guarded by ''inline-definitions-supported'') and referencing a key in the central keystore (guarded by ''central-keystore-supported''). The four variants cover: symmetric keys, asymmetric keys without certs, asymmetric keys with certs, and end-entity cert with key.'
section: 2.1.3.3
topics:
