document: rfc-8686
kind: design-rationale
summary: For Endpoint Cost Service queries with multiple sources or destinations, all queries should be sent to a single ALTO server (discovered via the single source or destination address) to ensure cost values are comparable, since 'routingcost' lacks a well-defined base unit across servers.
section: "4.4"
