document: rfc-9835
kind: protocol-element
summary: The SAP model (RFC 9408) is augmented with an 'ac' list under each SAP node, referencing ACs by leafref triplet (ac-ref, node-ref, network-ref). This allows controllers to filter available SAPs by service type and retrieve the ACs bound to each SAP.
