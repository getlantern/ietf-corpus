document: rfc-7828
kind: normative-requirement
summary: A DNS client that sent the edns-tcp-keepalive option but receives a response without it SHOULD assume the server does not support keepalive and follow RFC 7766 guidance, even if a previous option exchange occurred on the same connection.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
