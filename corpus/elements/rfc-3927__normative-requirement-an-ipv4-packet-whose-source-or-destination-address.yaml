document: rfc-3927
kind: normative-requirement
summary: An IPv4 packet whose source or destination address is in the 169.254/16 prefix MUST NOT be sent to any router for forwarding, and any network device receiving such a packet MUST NOT forward it regardless of the TTL value. This also applies to multicast packets with a Link-Local source address.
section: "2.7"
rfc2119_level: MUST
topics:
    - ip
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
