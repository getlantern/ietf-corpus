document: rfc-7441
kind: design-rationale
summary: 'RFC 6514''s encoding of mLDP FECs in MCAST-VPN NLRI required three restrictive conditions: (1) the customer must not use both PIM/IGMP and mLDP simultaneously, (2) only P2MP FEC Elements (not MP2MP) are used, and (3) the Opaque Value must be exactly 32 or 128 bits. This document removes all three restrictions.'
section: "2"
topics:
