document: rfc-4168
kind: design-rationale
summary: SCTP's fast retransmit (via SACK) allows SIP message loss to be detected much faster than with UDP (which requires at least 500 ms), making SCTP's most significant advantage for SIP the improvement in call setup times under packet loss conditions.
