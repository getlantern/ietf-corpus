document: rfc-5534
kind: wire-format
summary: The Probe message (Type=67) contains a 47-bit Receiver Context Tag, a 4-bit Psent field (number of sent probes), a 4-bit Precvd field (number of received probes), a 2-bit Sta (State) field, and repeated sets of 128-bit Probe Source Address, 128-bit Probe Destination Address, 32-bit Probe Nonce, and 32-bit Probe Data fields.
