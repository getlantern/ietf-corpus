document: rfc-5462
kind: normative-requirement
summary: All references in RFC 5129 to the EXP field now refer to the TC field. In the per-domain ECT checking scheme, if an interior LSR has marked ECN in the TC field of the shim header but the IP header says endpoints are not ECN-capable, the edge or penultimate router drops the packet.
section: "2.3"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - ecn
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
