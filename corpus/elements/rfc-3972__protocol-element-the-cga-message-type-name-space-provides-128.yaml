document: rfc-3972
kind: protocol-element
summary: The CGA Message Type name space provides 128-bit type tags prepended to signed messages to prevent cross-protocol replay attacks. The randomly chosen 128-bit values prevent accidental collisions even with protocols that use no type tagging.
