document: rfc-9801
kind: wire-format
summary: 'The PLE Control Word is 4 bytes: bits 0–3 are 0000b (distinguishing it from IP/Ethernet), followed by L bit (attachment circuit fault), R bit (backward fault/packet-loss indication), 2 RSV bits, 2 FRG bits (always zero), 6-bit LEN field (always zero), and a 16-bit sequence number.'
section: 5.2.1
