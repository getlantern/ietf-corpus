document: rfc-7420
kind: protocol-element
summary: 'pcePcepPeerRole identifies the role a peer played in its last established session: unknown(0), pcc(1), pce(2), or pccAndPce(3). Response-time statistics (pcePcepPeerAvgRspTime, LWMRspTime, HWMRspTime) are meaningless and set to zero when the peer role is pcc, since PCCs do not respond to path computation requests.'
section: "4.1"
topics:
