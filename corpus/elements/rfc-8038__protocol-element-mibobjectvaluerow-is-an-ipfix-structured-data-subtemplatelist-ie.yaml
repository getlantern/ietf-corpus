document: rfc-8038
kind: protocol-element
summary: mibObjectValueRow is an IPFIX Structured Data subTemplateList IE used to export a complete or partial conceptual row; the referenced Options Template MUST use the INDEX clause fields as Scope Fields in the same order as the INDEX clause, and the full OID of the SEQUENCE entry (not the table) MUST be exported.
