document: rfc-5124
kind: normative-requirement
summary: In RTSP-based negotiation, the RTSP client MUST select exactly one profile per media stream in the SETUP request, indicating the chosen RTP profile and the full server transport address in the Transport header. The server's response MUST confirm this profile selection or refuse the SETUP.
section: 3.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
