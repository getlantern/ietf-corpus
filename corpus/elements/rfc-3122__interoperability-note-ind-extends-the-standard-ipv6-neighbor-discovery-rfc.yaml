document: rfc-3122
kind: interoperability-note
summary: IND extends the standard IPv6 Neighbor Discovery (RFC 2461) and reuses ND options, cache structures, and timers (RetransTimer, MAX_MULTICAST_SOLICIT). Information learned from IND MAY be stored in the Neighbor Discovery cache as with standard ND.
