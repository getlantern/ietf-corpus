document: rfc-9965
kind: normative-requirement
summary: RADIUS servers supporting RFC 7585 dynamic discovery SHOULD perform domain filtering, and names in the eap.arpa. domain MUST NOT be looked up in DNS, to avoid spurious DNS queries for a domain that does not exist.
section: "3.7"
rfc2119_level: MUST NOT
