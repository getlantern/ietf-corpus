document: rfc-7781
kind: design-rationale
summary: Different member RBridges of an RBv use different distribution trees (via the Coordinated Multicast Trees mechanism in RFC 7783 and the Affinity sub-TLV) to ingress multi-destination frames, resolving RPF check violations that would otherwise drop traffic when multiple members ingressframes using the shared pseudo-nickname.
section: "5.1"
topics:
    - routing
