document: rfc-9140
kind: protocol-element
summary: 'The persistent EAP-NOOB association MUST store at minimum: PeerId, Verp, Cryptosuitep, NAI, and Kz (32-byte persistent key material). The peer additionally stores CryptosuitepPrev and KzPrev to enable cryptosuite upgrade rollback upon detection of a lost final response (Type=9) in a previous Reconnect Exchange.'
section: 3.4.1
topics:
    - security
    - crypto
