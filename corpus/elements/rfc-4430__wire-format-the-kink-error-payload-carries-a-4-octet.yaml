document: rfc-4430
kind: wire-format
summary: The KINK_ERROR payload carries a 4-octet ErrorCode in network byte order. Defined codes include KINK_OK (0), KINK_PROTOERR (1), KINK_INVDOI (2), KINK_INVMAJ (3), KINK_INTERR (5), KINK_BADQMVERS (6), and KINK_U2UDENIED (7).
