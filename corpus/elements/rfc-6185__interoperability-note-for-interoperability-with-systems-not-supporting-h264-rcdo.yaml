document: rfc-6185
kind: interoperability-note
summary: For interoperability with systems not supporting H264-RCDO, it is RECOMMENDED to offer the H264 media subtype as well. Listing H264-RCDO before H264 on the SDP 'm=' line signals preference per RFC 3264 Offer/Answer rules.
section: "7.1"
topics:
    - realtime
    - rtp
    - sip
