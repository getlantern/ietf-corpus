document: rfc-7030
kind: protocol-element
summary: Linking of identity and proof-of-possession is achieved by embedding the TLS session's tls-unique value (RFC 5929) as a base64-encoded string in the CSR challenge-password field (RFC 2985 Section 5.4.1). This proves that the authenticated TLS client possesses the private key and generated the CSR after the TLS session was established.
section: "3.5"
topics:
    - pkix
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
