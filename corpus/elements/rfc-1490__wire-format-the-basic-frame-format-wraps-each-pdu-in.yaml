kind: wire-format
summary: 'The basic frame format wraps each PDU in a Q.922 Annex A frame containing: flag (0x7E), Q.922 Address (2–4 octets with 10-bit DLCI), Control (UI = 0x03), optional pad (0x00), NLPID, Data, and two-octet FCS, terminated by a closing flag (0x7E).'
