document: rfc-7117
kind: wire-format
summary: 'The MCAST-VPLS NLRI used in S-PMSI A-D routes contains: Route Distinguisher (8 octets), Multicast Source Length (1 octet), Multicast Source (variable), Multicast Group Length (1 octet), Multicast Group (variable), and Originating Router''s IP Address. A wildcard source or group is encoded as address value 0.'
