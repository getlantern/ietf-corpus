document: rfc-6111
kind: normative-requirement
summary: Unless otherwise specified, if a well-known principal name is used but not supported in any other place in Kerberos messages, authentication MUST fail with KRB_AP_ERR_PRINCIPAL_UNKNOWN.
section: "3.1"
rfc2119_level: MUST
