document: rfc-9960
kind: design-rationale
summary: The Replication-ID of the Replication segment control plane identifier was updated from a variable-length field (RFC 9524) to the structured tuple <Root, Tree-ID, Instance-ID> because length alone is an imprecise indicator of the actual structure of the Replication-ID.
