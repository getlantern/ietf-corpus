document: rfc-9208
kind: design-rationale
summary: RFC 2087 saw little client deployment because resource meanings were implementation-dependent, making it impossible for clients to determine which resources were supported or which mailboxes belonged to a quota root without prior knowledge; this document standardizes resource types and capability advertisement to fix this.
