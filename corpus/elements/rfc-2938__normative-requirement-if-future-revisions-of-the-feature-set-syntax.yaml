document: rfc-2938
kind: normative-requirement
summary: If future revisions of the feature set syntax permit non-US-ASCII characters, a canonical representation must be defined for calculating hash values, with UTF-8 suggested as one option. Currently, feature set expressions consist only of US-ASCII characters.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
