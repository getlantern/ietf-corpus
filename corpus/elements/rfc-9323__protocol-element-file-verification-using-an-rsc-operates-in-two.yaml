document: rfc-9323
kind: protocol-element
summary: 'File verification using an RSC operates in two modes: ''filename-aware'' (used when the verifier has a filesystem path) and ''filename-unaware'' (used for nameless data). In filename-aware mode, exactly one matching FileNameAndHash MUST have a fileName matching the object''s filename; in filename-unaware mode, exactly one match MUST have fileName omitted.'
section: "6"
topics:
