document: rfc-1572
kind: protocol-element
summary: The SEND sub-command (IAC SB NEW-ENVIRON SEND [type...] IAC SE) requests the remote side to send environment variables. Type may be VAR (well-known) or USERVAR (user-defined). If no list is specified, the entire default environment of both types is sent.
section: "2"
