document: rfc-1971
kind: interoperability-note
summary: When both stateless and stateful autoconfiguration are active simultaneously, configuration parameters such as MTU and hop limit may be received from multiple sources with inconsistent values. Hosts accept the union of all information; the most recently obtained values always take precedence. Inconsistency is not a fatal error.
section: "5.6"
topics:
    - ip
    - v6ops
