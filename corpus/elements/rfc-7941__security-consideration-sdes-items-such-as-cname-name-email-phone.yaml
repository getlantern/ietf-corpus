document: rfc-7941
kind: security-consideration
summary: SDES items such as CNAME, NAME, EMAIL, PHONE, LOC, and H323-CADDR may be sensitive from a user privacy perspective. A CNAME of the form user@host has privacy concerns, and one derived from a MAC address has long-term tracking implications. Confidentiality for RTCP must be extended to RTP header extensions carrying these items.
section: "6"
topics:
    - rtp
    - security
    - privacy
    - realtime
