document: rfc-4447
kind: security-consideration
summary: LDP MD5 authentication (RFC 3036 section 2.9) MUST be implemented to provide integrity and authentication for LDP control messages; it does not protect against replay attacks due to its reliance on pre-shared keys, and does not provide privacy.
section: "8.2"
topics:
