document: rfc-9431
kind: normative-requirement
summary: During reauthentication within the same TLS session, the Client MUST NOT use TLS-exporter-based PoP (Section 2.2.4.2.1) to avoid reusing the same challenge; it MUST instead use the challenge-response PoP method.
section: "4"
rfc2119_level: MUST NOT
topics:
    - tls
    - oauth
    - security
    - crypto
