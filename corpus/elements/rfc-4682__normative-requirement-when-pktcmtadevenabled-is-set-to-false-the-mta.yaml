document: rfc-4682
kind: normative-requirement
summary: When pktcMtaDevEnabled is set to 'false', the MTA MUST immediately shut down all media sessions and NCS signaling via Restart in Progress procedures for all endpoints, MUST maintain SNMP management and key management interfaces, and MUST NOT continue Kerberized key management with CMSes until re-enabled.
section: "4"
rfc2119_level: MUST
topics:
