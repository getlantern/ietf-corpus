document: rfc-2835
kind: normative-requirement
summary: The HARP Request Address List (HRAL) MUST contain at least two HIPPI HW addresses. The first MUST be the broadcast address FF:FF:FF:FF:FF:FF and the second MUST be the standard HARP server address 00:10:3B:FF:FF:E0. All HARP clients MUST be configured identically with the same HRAL.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
