document: rfc-8106
kind: normative-requirement
summary: RDNSS addresses in the RDNSS option MAY be link-local addresses. When a resolver sends a DNS query to an RDNSS identified by a link-local address, it MUST use the corresponding link.
section: "5.1"
rfc2119_level: MUST
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
