document: rfc-6125
kind: normative-requirement
summary: Each reference identifier in the client's list SHOULD be based on the source domain and SHOULD NOT be based on a derived domain (e.g., a host name discovered via DNS SRV resolution), since only a match between user inputs and a presented identifier ensures the certificate legitimately secures the communication.
section: 6.2.1
rfc2119_level: SHOULD NOT
topics:
    - tls
    - pkix
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
