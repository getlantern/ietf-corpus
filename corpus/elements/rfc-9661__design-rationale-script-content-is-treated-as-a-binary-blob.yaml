document: rfc-9661
kind: design-rationale
summary: Script content is treated as a binary blob and uploaded/downloaded via JMAP blob mechanisms (RFC 8620 Sections 6.1/6.2 or RFC 9404 Blob/get and Blob/upload). This decouples content transfer from metadata management and aligns with JMAP's general blob handling model.
section: "2.2"
topics:
