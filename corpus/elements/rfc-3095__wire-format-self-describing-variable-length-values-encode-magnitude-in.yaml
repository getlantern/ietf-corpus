document: rfc-3095
kind: wire-format
summary: 'Self-describing variable-length values encode magnitude in leading bits: first bit 0 = 1 octet (7 bits, up to 127); first bits 10 = 2 octets (14 bits, up to 16383); first bits 110 = 3 octets (21 bits, up to 2097151). Used for TS_STRIDE and other widely-varying compression parameters.'
