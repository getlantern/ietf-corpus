document: rfc-6492
kind: normative-requirement
summary: Errors in message checks 1–6 (CMS well-formedness through signing time) MUST cause the server to generate an HTTP 400 Bad Request response. A version error (check 7) MUST cause the server to generate a Request-Not-Performed error response.
section: "3.2"
rfc2119_level: MUST
