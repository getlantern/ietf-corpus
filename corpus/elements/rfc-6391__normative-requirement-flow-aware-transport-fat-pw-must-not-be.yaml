document: rfc-6391
kind: normative-requirement
summary: Flow-aware transport (FAT-PW) MUST NOT be deployed in a network conforming to MPLS-TP unless the integrity requirements specified in the applicable SLA (no reordering or corruption) can be satisfied, because the flow LSE defeats MPLS-TP fate sharing between OAM and data.
section: "8.5"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
