document: rfc-6491
kind: interoperability-note
summary: This document does not address BGP routing policy, which is under the policy control of the organizations operating BGP systems. Local overrides of IANA-issued RPKI objects (e.g., to use reserved space locally) are handled via Local Trust Anchor Management as described in the TA-MGMT draft.
