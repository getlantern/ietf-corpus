document: rfc-6719
kind: normative-requirement
summary: A MRHOF implementation MUST support the DODAG Configuration option as described in RFC 6550 and apply the parameters it specifies, including MaxRankIncrease, which must be coordinated with PARENT_SWITCH_THRESHOLD to avoid nodes leaving the topology unnecessarily.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
