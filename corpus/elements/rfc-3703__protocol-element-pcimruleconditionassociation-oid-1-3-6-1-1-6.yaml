document: rfc-3703
kind: protocol-element
summary: pcimRuleConditionAssociation (OID 1.3.6.1.1.6.1.8) is a structural class held under pcimRule via DIT containment. It MUST carry pcimConditionGroupNumber (non-negative integer identifying DNF/CNF group) and pcimConditionNegated (Boolean), and MAY carry pcimConditionName and pcimConditionDN (DN to reusable condition).
section: "5.4"
