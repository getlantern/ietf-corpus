document: rfc-3748
kind: security-consideration
summary: EAP methods that use passwords or shared secrets without dictionary attack protection (such as MD5-Challenge) are vulnerable to offline dictionary attacks by an eavesdropper who captures the exchange. Methods intended for use in hostile environments SHOULD provide dictionary attack resistance.
section: "7.6"
topics:
    - security
    - crypto
