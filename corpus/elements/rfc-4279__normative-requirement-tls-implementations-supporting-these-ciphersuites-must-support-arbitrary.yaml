document: rfc-4279
kind: normative-requirement
summary: TLS implementations supporting these ciphersuites MUST support arbitrary PSK identities up to 128 octets in length and arbitrary PSKs up to 64 octets in length. Supporting longer identities and keys is RECOMMENDED.
section: "5.3"
rfc2119_level: MUST
