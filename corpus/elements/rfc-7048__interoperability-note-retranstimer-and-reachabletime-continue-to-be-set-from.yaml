document: rfc-7048
kind: interoperability-note
summary: RetransTimer and ReachableTime continue to be set from protocol constants RETRANS_TIMER and REACHABLE_TIME by default and are overridden by values advertised in Router Advertisements as specified in RFC 4861; this behavior is unchanged by RFC 7048.
