document: rfc-2661
kind: state-machine
summary: 'Control connection states are: idle → (send/receive SCCRQ) → wait-ctl-reply or wait-ctl-conn → (exchange SCCRP/SCCCN) → established → (StopCCN or timeout) → idle. Both sides authenticate via CHAP-style challenge/response during the three-way handshake if tunnel authentication is required.'
