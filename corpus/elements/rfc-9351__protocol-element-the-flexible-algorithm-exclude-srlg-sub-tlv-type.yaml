document: rfc-9351
kind: protocol-element
summary: The Flexible Algorithm Exclude SRLG sub-TLV (Type 1045) carries one or more 4-octet SRLG values; links associated with any listed SRLG are excluded from the algorithm's computation. Its Length MUST be a non-zero multiple of 4 octets.
