document: rfc-2245
kind: privacy-consideration
summary: A client which sends the user's correct email address as trace information without explicit permission may violate that user's privacy, particularly for access to sensitive subjects. Clients should not send the email address without explicit user permission and should offer the option of supplying no trace token.
section: "4"
topics:
    - privacy
    - security
