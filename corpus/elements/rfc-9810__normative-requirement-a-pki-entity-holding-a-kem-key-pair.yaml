document: rfc-9810
kind: normative-requirement
summary: A PKI entity holding a KEM key pair and wishing to use it for MAC-based protection MUST support KEM Decapsulate(); the verifying entity MUST support KEM Encapsulate(). Bob encapsulates and sends the ciphertext; Alice decapsulates and derives the MAC key via a KDF.
section: 5.1.3.4
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
