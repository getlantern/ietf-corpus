document: rfc-5778
kind: protocol-element
summary: The MIP-MAC-Mobility-Data AVP (AVP Code 489, OctetString) contains the MAC_Mobility_Data calculated by the HA for the MN-AAA Mobility Message Authentication Option as defined in RFC 4285. It MUST be present in the MIR when MIP6-Auth-Mode is MIP6_AUTH_MN_AAA.
section: "6.9"
topics:
