document: rfc-6797
kind: normative-requirement
summary: User agents SHOULD implement IDNA2008 (RFC 5890) for domain name canonicalization. If a UA does not implement IDNA2008, it MUST implement IDNA2003 (RFC 3490). All domain names must be IDNA-canonicalized before HSTS processing.
section: "13"
rfc2119_level: SHOULD
topics:
    - dns
    - security
