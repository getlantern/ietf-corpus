document: rfc-6917
kind: normative-requirement
summary: The Media Server MUST reply with status 200 on success; 400 on syntax/schema error; 420 when an unrecognized attribute or element is present; 406 when a create request uses an already-existing 'id'; 404 when update/remove references a nonexistent subscription; and 401/402/403 for resource-exhaustion failures matching the action type.
section: 5.1.4
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
