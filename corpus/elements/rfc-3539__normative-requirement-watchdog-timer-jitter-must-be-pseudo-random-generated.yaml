document: rfc-3539
kind: normative-requirement
summary: Watchdog timer jitter MUST be pseudo-random, generated by a PRNG seeded as per RFC 1750, with a value randomly drawn between -2 and 2 seconds added to Twinit. Alternative calculations to create jitter MAY be used.
