document: rfc-1933
kind: protocol-element
summary: 'In automatic tunneling the tunnel endpoint is derived from the destination IPv6 packet''s IPv4-compatible address: the low-order 32 bits are extracted and used as the IPv4 destination. A static routing table entry for prefix 0:0:0:0:0:0/96 directs all IPv4-compatible destinations to a pseudo-interface that performs automatic tunneling.'
section: "4.3"
topics:
