document: rfc-7550
kind: design-rationale
summary: This document assumes all DHCPv6 servers on a network belong to a single provisioning domain, consistent with RFC 3315 and RFC 3633. Support for multiple provisioning domains — where a client obtains different IA types from different servers — is explicitly out of scope.
section: "4.7"
topics:
