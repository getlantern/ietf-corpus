document: rfc-6450
kind: normative-requirement
summary: Unless otherwise specified, an option MUST NOT be used multiple times in the same message. The Multicast Prefix option (type 10) is explicitly excepted and MAY be included multiple times to specify multiple prefixes.
section: "3"
rfc2119_level: MUST NOT
topics:
    - multicast
