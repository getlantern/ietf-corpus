document: rfc-826
kind: design-rationale
summary: Each ARP packet resolves exactly one <protocol, address> pair. Multiplexing multiple resolutions into a single packet would complicate parsing and deliver mostly gratuitous information (e.g., a four-protocol bridge advertising all its addresses to a single-protocol workstation).
section: Why is it done this way??
topics:
    - ip
