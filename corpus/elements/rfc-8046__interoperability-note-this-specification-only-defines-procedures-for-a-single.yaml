document: rfc-8046
kind: interoperability-note
summary: This specification only defines procedures for a single LOCATOR_SET and single ESP_INFO parameter per UPDATE packet; reception of multiple LOCATOR_SET parameters in one packet, or in HIP packets other than UPDATE, is outside the scope of this specification.
