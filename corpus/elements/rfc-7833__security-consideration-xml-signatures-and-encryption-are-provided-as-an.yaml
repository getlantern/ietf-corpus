document: rfc-7833
kind: security-consideration
summary: XML signatures and encryption are provided as an OPTIONAL end-to-end security mechanism that protects SAML messages from modification by RADIUS proxies. They are appropriate when end-to-end security is required but proxies cannot be removed, or when SAML messages must be verifiable after the authentication exchange.
section: "10"
topics:
