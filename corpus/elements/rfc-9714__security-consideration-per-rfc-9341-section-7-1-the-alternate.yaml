document: rfc-9714
kind: security-consideration
summary: Per RFC 9341 Section 7.1, the Alternate-Marking Method MUST only be applied to controlled domains. The MPLS encapsulation and related procedures defined in this document therefore MUST only be applied to controlled domains to avoid the attacks discussed in RFC 9341 Section 10.
