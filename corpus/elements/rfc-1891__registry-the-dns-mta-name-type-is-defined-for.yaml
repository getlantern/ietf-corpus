document: rfc-1891
kind: registry
summary: The 'dns' MTA-name-type is defined for use in Reporting-MTA DSN fields, representing fully-qualified Internet domain names. The name must be registered in DNS and Postmaster@{mta-name} must be valid; domain-literals containing IP addresses are acceptable when domain names are unavailable.
section: "9.3"
topics:
    - email
    - registry
