document: rfc-4648
kind: wire-format
summary: Base64 encodes 3 octets (24 bits) into 4 characters. If the final quantum is 8 bits, output is 2 characters followed by '=='; if 16 bits, output is 3 characters followed by '='; if a multiple of 24 bits, no padding is needed.
