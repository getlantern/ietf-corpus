document: rfc-3981
kind: design-rationale
summary: Entity classes (e.g., 'name-server' vs. 'network') are used to avoid collisions with entity names within a registry type and to allow server implementations to narrow search or lookup scopes quickly to a single index, since the same name (e.g., '192.0.2.0') may refer to different entities in different classes.
section: 4.3.3
topics:
    - registry
