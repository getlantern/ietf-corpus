document: rfc-9237
kind: protocol-element
summary: AIF is defined generically as AIF-Generic<Toid, Tperm> = [* [Toid, Tperm]], a list of pairs of object identifiers and permission sets. The commonly used specific form is AIF-Specific = AIF-Generic<tstr, uint>, where object identifiers are text strings and permissions are bit-encoded numbers.
