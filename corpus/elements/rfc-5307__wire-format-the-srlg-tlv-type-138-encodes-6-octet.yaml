document: rfc-5307
kind: wire-format
summary: 'The SRLG TLV (type 138) encodes: 6-octet System ID, 1-octet Pseudonode Number, 1-octet Flags, 4 octets of IPv4 interface address or Link Local Identifier, 4 octets of IPv4 neighbor address or Link Remote Identifier, followed by a variable-length list of 4-octet SRLG values. Total length = 16 + 4*(number of SRLG values).'
section: "1.4"
topics:
    - routing
    - mpls
