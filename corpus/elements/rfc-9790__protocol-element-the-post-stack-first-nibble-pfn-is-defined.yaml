document: rfc-9790
kind: protocol-element
summary: The Post-stack First Nibble (PFN) is defined as the most significant four bits of the first octet immediately following the MPLS label stack. Its correct interpretation can be made only in the context established through the control or management plane by the Label Stack Entry (or group of LSEs) that characterizes the PSH type; it cannot be used alone to deduce the PSH type.
section: "1.2"
topics:
