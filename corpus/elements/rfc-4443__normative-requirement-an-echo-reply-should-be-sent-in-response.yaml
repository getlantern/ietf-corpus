document: rfc-4443
kind: normative-requirement
summary: An Echo Reply SHOULD be sent in response to an Echo Request sent to an IPv6 multicast or anycast address; in this case the source address of the reply MUST be a unicast address belonging to the interface on which the Echo Request was received.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
