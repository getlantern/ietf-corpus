document: rfc-7828
kind: normative-requirement
summary: If a client includes the edns-tcp-keepalive option in the first query, it SHOULD include an EDNS0 OPT RR periodically in further messages during the TCP session to increase the chance of receiving updated timeout values from the server.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
