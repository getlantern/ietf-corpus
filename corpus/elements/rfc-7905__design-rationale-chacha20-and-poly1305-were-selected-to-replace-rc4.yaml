document: rfc-7905
kind: design-rationale
summary: ChaCha20 and Poly1305 were selected to replace RC4 and address CBC-mode vulnerabilities because they are designed for high-performance software implementations, require few resources and inexpensive operations, and minimize information leakage through side-channels. They provide a secure stream cipher comparable to RC4 in speed across a wide range of platforms.
