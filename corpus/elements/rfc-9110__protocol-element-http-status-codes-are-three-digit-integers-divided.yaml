document: rfc-9110
kind: protocol-element
summary: 'HTTP status codes are three-digit integers divided into five classes: 1xx Informational, 2xx Successful, 3xx Redirection, 4xx Client Error, and 5xx Server Error. An unrecognized status code MUST be treated as the x00 code of its class (e.g., 499 treated as 400).'
section: "15.1"
topics:
    - http
