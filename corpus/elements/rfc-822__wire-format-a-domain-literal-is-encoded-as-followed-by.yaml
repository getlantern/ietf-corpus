document: rfc-822
kind: wire-format
summary: A domain-literal is encoded as '[' followed by dtext or quoted-pair characters and terminated by ']'. In the ARPA Internet, domain-literals encode 32-bit IPv4 addresses as four decimal octets, e.g., [10.0.3.19].
section: 6.2.3
