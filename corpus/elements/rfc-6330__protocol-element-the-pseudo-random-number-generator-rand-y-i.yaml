document: rfc-6330
kind: protocol-element
summary: The pseudo-random number generator Rand[y,i,m] = (V0[x0] XOR V1[x1] XOR V2[x2] XOR V3[x3]) mod m, where x0..x3 are the four bytes of y each XORed with i mod 256. It uses four fixed 256-entry tables V0–V3 of 32-bit unsigned integers specified in Section 5.5.
section: 5.3.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
