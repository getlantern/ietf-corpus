document: rfc-1572
kind: design-rationale
summary: The USERVAR type was added to allow transmission of arbitrary user-supplied variable/value pairs, distinct from implementation-derived well-known variables. This lets implementations apply different trust levels, though paranoid implementations will treat both types with equal distrust. Name-space collisions between well-known and user variables are implementation-specific.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
