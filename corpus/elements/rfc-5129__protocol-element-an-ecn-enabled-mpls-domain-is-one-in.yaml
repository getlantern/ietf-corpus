document: rfc-5129
kind: protocol-element
summary: An ECN-enabled MPLS domain is one in which all egress LSRs are configured to perform per-domain ECT checking. Interior LSRs may lack ECN capability; only egress LSRs (or penultimate-hop routers when PHP is used) must be ECN-capable.
section: "3"
topics:
    - mpls
    - ecn
    - congestion
