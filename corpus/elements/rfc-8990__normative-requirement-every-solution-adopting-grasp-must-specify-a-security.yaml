document: rfc-8990
kind: normative-requirement
summary: Every solution adopting GRASP MUST specify a security and transport substrate. The substrate MUST enforce sending and receiving GRASP messages only between members of a mutually trusted group, MUST use cryptographic member authentication and message integrity, and MUST provide mechanisms to remove untrusted members from the group.
section: 2.5.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
