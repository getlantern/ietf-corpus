document: rfc-4675
kind: design-rationale
summary: The Tag Indication values in Egress-VLAN-Name (0x31 for tagged, 0x32 for untagged) were chosen as the ASCII characters '1' and '2' to make them easier for users to enter, unlike the numeric 0x31/0x32 values used in Egress-VLANID.
