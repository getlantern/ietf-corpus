document: rfc-3034
kind: interoperability-note
summary: A hybrid Frame Relay switch (Ships in the Night) can simultaneously run both the MPLS label switching control component and the ITU/Frame Relay Forum control component on the same switch and interfaces. The two control components operate independently; only the partition of DLCI space between them needs to be coordinated.
section: "6.1"
