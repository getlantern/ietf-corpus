document: rfc-9370
kind: normative-requirement
summary: The responder MUST include the ADDITIONAL_KEY_EXCHANGE notification in a CREATE_CHILD_SA or IKE_FOLLOWUP_KE response message when a further IKE_FOLLOWUP_KE exchange is expected. The initiator MUST send this notification back intact in the next IKE_FOLLOWUP_KE request.
section: 2.2.4
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
