document: rfc-8152
kind: protocol-element
summary: 'COSE defines six message structures, each identified by a CBOR tag: COSE_Sign (98), COSE_Sign1 (18), COSE_Encrypt (96), COSE_Encrypt0 (16), COSE_Mac (97), and COSE_Mac0 (17). Messages may be tagged or untagged; the type can alternatively be identified by context, the ''cose-type'' media type parameter, or CoAP Content-Format.'
