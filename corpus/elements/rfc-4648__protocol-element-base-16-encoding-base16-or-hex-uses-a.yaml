kind: protocol-element
summary: Base 16 encoding ('base16' or 'hex') uses a 16-character US-ASCII subset of digits 0–9 and uppercase letters A–F. It represents 8-bit input groups as 2 encoded output characters (4 bits per character) and requires no padding.
