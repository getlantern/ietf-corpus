document: rfc-3471
kind: normative-requirement
summary: The Reserved field in the Administrative Status Information object MUST be set to zero on transmission and MUST be ignored on receipt; transit nodes SHOULD pass these bits through unmodified. The Reflect (R) bit MUST NOT be set in state change request (Notify) messages.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
