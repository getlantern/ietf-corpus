document: rfc-2141
kind: normative-requirement
summary: Identifiers containing characters outside the URN character set MUST be translated into canonical NSS form by UTF-8-encoding each such character and then percent-encoding each resulting octet before use as protocol elements.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
