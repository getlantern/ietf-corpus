document: rfc-9070
kind: security-consideration
summary: Writable nodes in the model (e.g., authentication keys, hello/session timers, label policies, graceful-restart parameters) are sensitive. Unauthorized write access could disrupt LDP sessions, corrupt label bindings, or allow introduction of rogue peers.
section: 10.1.1
topics:
