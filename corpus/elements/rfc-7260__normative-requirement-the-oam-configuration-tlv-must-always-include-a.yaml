document: rfc-7260
kind: normative-requirement
summary: 'The OAM Configuration TLV MUST always include a single instance of the OAM Function Flags Sub-TLV, and it MUST always be the first sub-TLV. If the selected OAM functions are not supported, an error MUST be generated: ''OAM Problem/Unsupported OAM Function''.'
section: 4.2.1
rfc2119_level: MUST
topics:
