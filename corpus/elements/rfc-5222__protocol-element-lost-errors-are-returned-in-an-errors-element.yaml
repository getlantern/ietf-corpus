document: rfc-5222
kind: protocol-element
summary: LoST errors are returned in an <errors> element when no useful response can be produced; warnings are returned in a <warnings> element alongside a partial response. Both carry a 'source' attribute naming the originating server. Defined conditions include badRequest, forbidden, internalError, loop, locationInvalid, locationProfileUnrecognized, notFound, serviceNotImplemented, serverTimeout, and serverError.
section: "13.1"
topics:
    - realtime
