document: rfc-3659
kind: normative-requirement
summary: The Telnet IAC character, if part of a pathname sent over the FTP control connection, MUST be correctly escaped as defined by the Telnet protocol. Telnet option negotiation MUST NOT be attempted over FTP control connections.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
