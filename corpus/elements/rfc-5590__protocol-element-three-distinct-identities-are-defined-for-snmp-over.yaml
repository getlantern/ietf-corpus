document: rfc-5590
kind: protocol-element
summary: 'Three distinct identities are defined for SNMP over secure transport: (1) the transport principal (mechanism-specific, only used within the Transport Model); (2) tmSecurityName (human-readable snmpAdminString, used by Transport and Security Models); (3) securityName (model-independent human-readable name used by Applications, Access Control, Message Processing, and Security Subsystems).'
section: 5.2.2
topics:
    - snmp
    - security
