document: rfc-4561
kind: state-machine
summary: 'MP selection at the PLR has two cases: Case 1 — if the backup tunnel destination equals the MP''s node-id, the PLR compares the backup tunnel destination directly against node-ids in the primary tunnel''s RRO; Case 2 — if the backup tunnel destination differs from the MP''s node-id, the PLR compares node-id sub-objects present in both primary and backup tunnel RROs.'
section: "4"
topics:
