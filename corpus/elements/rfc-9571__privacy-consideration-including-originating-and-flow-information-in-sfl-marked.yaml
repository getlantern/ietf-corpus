document: rfc-9571
kind: privacy-consideration
summary: Including originating and flow information in SFL-marked packets degrades privacy by enabling flow identification, though it does not directly reveal the originating node without inspecting the network at ingress or the control protocol. Mitigations include encrypting control protocol packets, regularly rotating synonymous labels, and concurrently using multiple such labels.
section: "11"
topics:
    - mpls
    - privacy
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
