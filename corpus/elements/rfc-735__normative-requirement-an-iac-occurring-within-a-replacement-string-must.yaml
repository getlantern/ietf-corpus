document: rfc-735
kind: normative-requirement
summary: An IAC occurring within a replacement string must be doubled so that it will be interpreted later as an IAC; to be later interpreted as data byte 255, it must be quadrupled in the original DEFINE replacement string specification.
section: "2"
rfc2119_level: MUST
