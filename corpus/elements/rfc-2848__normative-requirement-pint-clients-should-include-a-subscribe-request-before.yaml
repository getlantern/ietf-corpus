document: rfc-2848
kind: normative-requirement
summary: 'PINT clients SHOULD include a SUBSCRIBE request before a service session terminates if they know they will want status information after termination, because a PINT gateway is only required to keep state about a call for as long as indicated by its Expires: header.'
section: 3.5.3.1
rfc2119_level: SHOULD
topics:
    - realtime
    - sip
