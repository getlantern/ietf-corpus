document: rfc-5066
kind: protocol-element
summary: The efmCuLowRateCrossing NOTIFICATION-TYPE is sent when the EFMCu port data rate crosses the efmCuThreshLowRate threshold in either direction. It carries ifSpeed and efmCuThreshLowRate, applies only to -O subtype ports while Up, and a debouncing period of 2.5 seconds is RECOMMENDED to avoid simultaneous LinkUp/LinkDown and rate-crossing notifications.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
