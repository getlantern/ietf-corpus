document: rfc-7474
kind: normative-requirement
summary: When XORing Ko with Ipad or Opad during HMAC computation, Ko MUST be padded with zeros to the length of Ipad or Opad. This was previously unspecified in RFC 5709.
section: "6"
rfc2119_level: MUST
