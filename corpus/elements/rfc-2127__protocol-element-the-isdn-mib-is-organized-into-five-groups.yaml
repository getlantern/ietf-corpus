kind: protocol-element
summary: 'The ISDN MIB is organized into five groups: isdnMibBasicRateGroup (BRI physical interfaces), isdnMibBearerGroup (B channels), isdnMibSignalingGroup (D channels including LAPD and signaling tables), optional isdnMibEndpointGroup (Terminal Endpoints, TEI, SPID), and optional isdnMibDirectoryGroup (directory numbers per signaling channel).'
