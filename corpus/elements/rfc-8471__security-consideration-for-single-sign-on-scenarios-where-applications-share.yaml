document: rfc-8471
kind: security-consideration
summary: For single sign-on scenarios where applications share tokens, those applications will also need to share Token Binding keys. Care must be taken to restrict Token Binding key sharing to exactly the same group of applications that shares tokens.
section: "7.3"
topics:
