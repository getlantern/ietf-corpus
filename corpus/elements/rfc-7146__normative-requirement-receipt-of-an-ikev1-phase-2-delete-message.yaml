document: rfc-7146
kind: normative-requirement
summary: Receipt of an IKEv1 Phase 2 delete message or an IKEv2 INFORMATIONAL exchange deleting an SA SHOULD NOT be interpreted as a reason to tear down the block storage protocol connection; if additional traffic is sent, a new SA will be created.
section: "3"
rfc2119_level: SHOULD NOT
topics:
