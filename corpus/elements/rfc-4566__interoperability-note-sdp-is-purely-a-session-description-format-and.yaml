document: rfc-4566
kind: interoperability-note
summary: SDP is purely a session description format and deliberately does not incorporate a transport protocol or support media negotiation. It is designed for use with SAP, SIP, RTSP, email (MIME), and HTTP, each of which supplies its own transport security and authentication properties that SDP itself cannot provide.
section: "1"
topics:
