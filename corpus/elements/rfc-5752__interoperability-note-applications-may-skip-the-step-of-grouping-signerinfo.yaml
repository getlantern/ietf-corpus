document: rfc-5752
kind: interoperability-note
summary: Applications may skip the step of grouping SignerInfo objects by signer identity, treating each SignerInfo as fully independent. However, such applications must be aware that algorithm rollover will not work correctly in this case.
section: "5.2"
topics:
