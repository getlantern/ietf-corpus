document: rfc-5429
kind: normative-requirement
summary: 'The ''reject'' action MAY refuse delivery over SMTP/LMTP (instead of MDN) only if: (1) the reason string is US-ASCII or both parties support a UTF-8 SMTP extension, AND (2) LMTP is used, or SMTP with a single recipient, or SMTP where all recipients refused delivery.'
section: "2.2"
rfc2119_level: MAY
topics:
    - email
