document: rfc-4420
kind: protocol-element
summary: The RRO Attributes Subobject (Type=0x05) is carried in the RECORD_ROUTE object to report per-hop attribute flags. Its format includes a 1-byte Type, 1-byte Length (minimum 8, multiple of 4), 2-byte Reserved field, and a variable-length Attribute Flags field using the same bit numbering as the Attributes Flags TLV.
section: "7.2"
topics:
