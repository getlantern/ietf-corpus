document: rfc-1725
kind: protocol-element
summary: The optional UIDL command (TRANSACTION state) returns unique-id listings. Each listing is 'msg-number unique-id', where the unique-id is a server-assigned string of printable ASCII characters (0x21–0x7E) that persists across sessions and is never reused within a maildrop.
section: "7"
