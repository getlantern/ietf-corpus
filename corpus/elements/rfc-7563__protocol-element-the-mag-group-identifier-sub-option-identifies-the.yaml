document: rfc-7563
kind: protocol-element
summary: The MAG-Group-Identifier sub-option identifies the group affiliation of the MAG within its PMIPv6 domain. The group identifier is not assumed to be globally unique; operators spanning multiple domains SHOULD use it together with the Operator-Identifier sub-option from RFC 6757.
section: "3.2"
topics:
    - mobility
    - ip
