document: rfc-3744
kind: normative-requirement
summary: DAV:write MUST contain DAV:bind, DAV:unbind, DAV:write-properties, and DAV:write-content. Forbidden cross-containment rules prohibit DAV:read-acl from containing DAV:read or DAV:write, and vice-versa, to preserve fine-grained privilege separation.
section: "3.12"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
