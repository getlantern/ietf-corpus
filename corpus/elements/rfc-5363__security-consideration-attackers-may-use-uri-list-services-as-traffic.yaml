document: rfc-5363
kind: security-consideration
summary: Attackers may use URI-list services as traffic amplifiers for DoS attacks by submitting URI lists whose host parts route to victims. Mitigation requires authentication, authorization, and opt-in consent from destinations before any fan-out occurs.
section: "5.2"
topics:
