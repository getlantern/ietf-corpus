document: rfc-8397
kind: wire-format
summary: The NickBlockFlags APPsub-TLV has a 16-bit Type field (value 24), a 16-bit Length field (value 2 + 4*K where K is the number of nickname blocks), a 1-bit OK flag, 15 reserved bits (RESV), followed by K Nickname Blocks each consisting of a 16-bit starting nickname and a 16-bit ending nickname.
section: "4.3"
