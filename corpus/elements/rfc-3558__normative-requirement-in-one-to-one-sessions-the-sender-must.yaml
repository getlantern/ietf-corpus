document: rfc-3558
kind: normative-requirement
summary: In one-to-one sessions, the sender MUST respect the receiver's maxptime and maxinterleave values and MUST NOT interleave/bundle beyond those limits. The sender MUST NOT increase LLL to exceed the signaled maxinterleave during a session.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
