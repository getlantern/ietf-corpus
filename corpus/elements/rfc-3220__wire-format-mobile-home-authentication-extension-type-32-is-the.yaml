document: rfc-3220
kind: wire-format
summary: 'Mobile-Home Authentication Extension (Type 32) is the mandatory authorization-enabling extension in all Registration Requests and Replies: Type (1 byte), Length (1 byte, 4 plus authenticator length), SPI (4 bytes), Authenticator (variable). HMAC-MD5 over the UDP payload, all prior extensions, and the Type/Length/SPI fields is the default algorithm.'
section: 3.5.2
topics:
