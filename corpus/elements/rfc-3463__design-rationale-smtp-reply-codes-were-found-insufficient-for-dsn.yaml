document: rfc-3463
kind: design-rationale
summary: 'SMTP reply codes were found insufficient for DSN use: only about 12 useful codes exist, all are overloaded to indicate multiple conditions, and the remaining available code space is too small to accommodate mail system errors plus MIME/security categories without incompatible changes to SMTP.'
