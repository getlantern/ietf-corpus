document: rfc-4780
kind: protocol-element
summary: 'sipCommonCfgServiceOperStatus defines seven operational states for a SIP entity: unknown(1), up(2), down(3), congested(4), restarting(5), quiescing(6), and testing(7). The ''testing'' state maps to ''up'' in the NETWORK-SERVICES-MIB applOperStatus.'
section: "7.2"
topics:
