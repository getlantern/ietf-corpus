document: rfc-2625
kind: normative-requirement
summary: The FC TYPE field in the FC Header MUST indicate ISO 8802-2 LLC/SNAP Encapsulation (Type 5) for all FC-4 IP and ARP packets. The DF_CTL field MUST indicate the presence of a Network_Header on the first logical frame of FC-4 sequences.
section: "7.1"
rfc2119_level: MUST
topics:
    - ip
