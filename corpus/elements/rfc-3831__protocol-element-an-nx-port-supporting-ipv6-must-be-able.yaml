document: rfc-3831
kind: protocol-element
summary: An Nx_Port supporting IPv6 MUST be able to map a received broadcast Class 3 Device_Data FC frame to an implicit Port Login context to handle IPv6 multicast packets; the receive data field size of this implicit Port Login MUST be the same across all Nx_Ports on the same Fabric.
section: "9"
topics:
    - ip
    - multicast
