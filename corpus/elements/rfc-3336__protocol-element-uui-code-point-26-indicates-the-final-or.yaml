document: rfc-3336
kind: protocol-element
summary: UUI code-point 26 indicates the final (or only) SSSAR frame of a PPP packet; UUI code-point 27 indicates a non-final (intermediate) fragment. All intermediate frames carry UUI=27 and the last carries UUI=26.
section: 6.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
