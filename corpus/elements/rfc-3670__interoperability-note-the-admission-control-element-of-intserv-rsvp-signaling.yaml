document: rfc-3670
kind: interoperability-note
summary: The admission control element of IntServ (RSVP signaling, reservation management, policy server interaction) is explicitly outside the scope of this model; only the datapath forwarding aspects of IntServ are modeled. A future document is expected to address IntServ admission control.
