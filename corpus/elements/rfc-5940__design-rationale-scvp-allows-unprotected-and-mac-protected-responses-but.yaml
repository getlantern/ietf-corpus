document: rfc-5940
kind: design-rationale
summary: SCVP allows unprotected and MAC-protected responses, but these cannot be validated by third parties who lack the connection context or shared key. This is why only digitally signed SCVP responses are permitted in SCVPReqRes when conveyed to third parties.
