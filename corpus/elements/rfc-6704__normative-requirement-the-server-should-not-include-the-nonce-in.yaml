document: rfc-6704
kind: normative-requirement
summary: The server SHOULD NOT include the nonce in an ACK when responding to a renew unless a new nonce was generated, to minimize the number of times the nonce is sent over the wire.
section: 3.1.3
rfc2119_level: SHOULD NOT
