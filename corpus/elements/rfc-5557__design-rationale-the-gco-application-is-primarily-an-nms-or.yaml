document: rfc-5557
kind: design-rationale
summary: The GCO application is primarily an NMS- or PCE-Server-based solution. The management-based PCE architecture (Section 5.5 of RFC 4655) is considered most suitable; other architectural alternatives such as distributed LSRs performing GCO via complex synchronization are NOT RECOMMENDED due to synchronization overhead and potential network stability issues.
section: "1"
topics:
