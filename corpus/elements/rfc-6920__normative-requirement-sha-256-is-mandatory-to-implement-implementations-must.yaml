document: rfc-6920
kind: normative-requirement
summary: 'SHA-256 is mandatory to implement: implementations MUST be able to generate/send and accept/process names based on a sha-256 hash. Implementations MAY support additional hash algorithms and MAY use those for specific names.'
section: "2"
rfc2119_level: MUST
