document: rfc-8474
kind: design-rationale
summary: ObjectIDs are restricted to 1–255 characters from a 64-codepoint safe subset (a-z, A-Z, 0-9, _, -) to reduce encoding mistakes and allow clients to allocate bounded storage; these are the same characters as base64url.
section: "8.1"
