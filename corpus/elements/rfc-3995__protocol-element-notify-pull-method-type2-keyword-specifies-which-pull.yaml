document: rfc-3995
kind: protocol-element
summary: '''notify-pull-method'' (type2 keyword) specifies which Pull Delivery Method to use. Its value MUST be one of the values in the Printer''s ''notify-pull-method-supported'' attribute. If unsupported, the Printer MUST NOT create the Subscription Object and MUST return ''client-error-attributes-or-values-not-supported'' in the Subscription Attributes Group.'
section: 5.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
