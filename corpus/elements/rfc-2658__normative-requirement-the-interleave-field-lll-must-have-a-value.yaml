document: rfc-2658
kind: normative-requirement
summary: The Interleave field (LLL) MUST have a value between 0 and 5 inclusive; values 6 and 7 MUST NOT be used by senders. All receivers MUST support interleaving; senders MAY support it, and senders that do not support interleaving MUST set LLL and NNN to zero.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
