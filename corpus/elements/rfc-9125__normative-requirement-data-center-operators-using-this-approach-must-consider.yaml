document: rfc-9125
kind: normative-requirement
summary: Data center operators using this approach MUST consider using gateway-to-gateway encryption to protect data center traffic, given that gateways and ASBRs are connected by tunnels that may run across untrusted network segments. Due consideration MUST also be given to encrypting end-to-end traffic.
section: "8"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - routing
