document: rfc-7854
kind: normative-requirement
summary: BMP operates over TCP. No BMP message is ever sent from the monitoring station to the monitored router; the monitored router MAY take steps to prevent the monitoring station from sending data or MAY silently discard any data sent by the monitoring station.
section: "3.2"
rfc2119_level: MAY
topics:
    - bgp
    - measurement
    - tcp
