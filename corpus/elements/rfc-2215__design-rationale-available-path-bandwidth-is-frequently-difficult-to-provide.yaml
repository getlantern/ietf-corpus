document: rfc-2215
kind: design-rationale
summary: AVAILABLE_PATH_BANDWIDTH is frequently difficult to provide accurately before a specific QoS request is in place (destination, service type, and policy may affect available bandwidth). When the parameter cannot be provided accurately, overestimating is acceptable; zero should be exported to signal 'unknown'.
section: "3.3"
topics:
    - qos
