document: rfc-5163
kind: normative-requirement
summary: Systems unable to insert TimeStamps at 1-microsecond resolution MUST pad the unused least-significant bits with zero. Receivers MAY process or skip the TimeStamp Extension but MUST continue to process the remainder of the SNDU and forward the encapsulated PDU.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
