document: rfc-4544
kind: protocol-element
summary: The IscsiName textual convention is defined as OCTET STRING (SIZE(0 | 16..223)) with DISPLAY-HINT '223t'. A zero-length string indicates the absence of an iSCSI name; valid names are 16–223 bytes, encoded per RFC 3720 Section 3.2.6.
