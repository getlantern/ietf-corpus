document: rfc-5592
kind: security-consideration
summary: Session statistics in the snmpSshtmSession MIB group can reveal the configured capabilities of a remote SSH server, which could help an attacker focus an attack. Even read-only access to these objects should be controlled, and their values should be encrypted when transmitted via SNMP.
section: "9.7"
topics:
    - snmp
    - security
