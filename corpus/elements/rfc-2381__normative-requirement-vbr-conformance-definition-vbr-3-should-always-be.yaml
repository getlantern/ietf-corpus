summary: VBR conformance definition VBR.3 SHOULD always be used with VBR service supporting IP integrated services, as it is the only VBR conformance definition that supports tagging and applies dual GCRAs (one for PCR on aggregate CLP=0+1, another for SCR on CLP=0 only).
