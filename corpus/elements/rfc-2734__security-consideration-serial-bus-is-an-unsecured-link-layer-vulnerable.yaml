document: rfc-2734
kind: security-consideration
summary: Serial Bus is an unsecured link layer vulnerable to denial-of-service attacks, eavesdropping, and identity spoofing. Implementers using Serial Bus for IPv4 SHOULD apply appropriate countermeasures at application or higher layers, as no security is provided at the 1394 link level.
section: "11"
rfc2119_level: SHOULD
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
