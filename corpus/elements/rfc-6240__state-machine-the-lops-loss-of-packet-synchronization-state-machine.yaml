document: rfc-6240
kind: state-machine
summary: 'The LOPS (Loss of Packet Synchronization) state machine has two states: in-sync and LOPS. The trigger to enter LOPS is pwCepCfgConsecMissingOutSync consecutive missing packets (default 10); the trigger to exit LOPS is pwCepCfgConsecPktsInsync consecutive in-sequence packets (default 2).'
