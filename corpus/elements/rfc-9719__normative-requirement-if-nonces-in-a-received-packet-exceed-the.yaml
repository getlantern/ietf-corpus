document: rfc-9719
kind: normative-requirement
summary: If nonces in a received packet exceed the range defined by maximum-nonce-delta (range 1..5), the packet MUST be discarded. This configurable window defines the replay-protection vulnerability surface per RFC 9692 Section 6.9.4.
section: "3"
rfc2119_level: MUST
topics:
