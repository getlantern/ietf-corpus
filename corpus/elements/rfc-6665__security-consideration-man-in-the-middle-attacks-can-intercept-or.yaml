document: rfc-6665
kind: security-consideration
summary: Man-in-the-middle attacks can intercept or modify SUBSCRIBE/NOTIFY messages. SIP authentication mechanisms (S/MIME or TLS transport) SHOULD be used; proxies cannot rely on being able to access S/MIME-encrypted SUBSCRIBE/NOTIFY content.
section: "6.5"
topics:
    - security
    - sip
    - tls
