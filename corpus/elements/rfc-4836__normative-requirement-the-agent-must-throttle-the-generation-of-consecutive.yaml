document: rfc-4836
kind: normative-requirement
summary: The agent MUST throttle the generation of consecutive rpMauJabberTraps (and ifMauJabberTraps) so that there is at least a five-second gap between them when a MAU is in or re-enters the jabber state.
section: "4"
rfc2119_level: MUST
