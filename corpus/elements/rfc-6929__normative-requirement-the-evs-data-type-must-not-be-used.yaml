document: rfc-6929
kind: normative-requirement
summary: The EVS data type MUST NOT be used in standard RADIUS attributes, TLVs, or VSAs; it MAY only appear in Extended Type or Long Extended Type attribute definitions. EVS-Value MUST NOT itself be of data type 'evs'.
section: "2.4"
rfc2119_level: MUST NOT
