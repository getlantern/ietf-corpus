document: rfc-7766
kind: security-consideration
summary: Operators of recursive servers are advised to use Access Control Lists (ACLs) to accept connections only from expected clients. For UDP this guards against reflection attacks (RFC 5358); for TCP it prevents unknown clients from exhausting concurrent connection limits.
section: "10"
topics:
