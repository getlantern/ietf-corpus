document: rfc-6531
kind: normative-requirement
summary: If the SMTPUTF8 extension is not offered by the server, an SMTPUTF8-aware client MUST NOT transmit an internationalized email address and MUST NOT transmit a mail message containing internationalized headers at any level within its MIME structure.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - email
