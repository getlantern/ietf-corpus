document: rfc-4591
kind: state-machine
summary: PVC states are ACTIVE and INACTIVE. An LCCE MAY initiate an L2TP session immediately upon PVC creation or wait until the PVC becomes ACTIVE. State changes are signalled via SLI with the Circuit Status AVP; PVC deletion triggers CDN and tears down the L2TP session.
section: "3.1"
topics:
