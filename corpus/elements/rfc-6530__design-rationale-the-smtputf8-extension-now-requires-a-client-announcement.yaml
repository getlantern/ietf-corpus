document: rfc-6530
kind: design-rationale
summary: The SMTPUTF8 extension now requires a client announcement when the extension is needed, unlike the experimental version where only a server announcement was necessary. This change reflects the lesson from experimentation that explicit client opt-in is required for reliable interoperability.
