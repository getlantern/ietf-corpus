document: rfc-8855
kind: normative-requirement
summary: Over unreliable transport, floor participants and chairs MUST acknowledge subsequent server-initiated FloorRequestStatus messages with FloorRequestStatusAck, and subsequent FloorStatus messages with FloorStatusAck. This stops the server's retransmission timer T2.
section: 5.3.14
rfc2119_level: MUST
topics:
    - realtime
    - udp
