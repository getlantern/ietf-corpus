document: rfc-8777
kind: normative-requirement
summary: Gateways restarting discovery due to absence of traffic MUST use a hold-down timer that removes the unresponsive relay from consideration during subsequent rounds. The hold-down SHOULD last no less than 3 minutes and no more than 10 minutes.
section: 3.3.4.1
rfc2119_level: MUST
topics:
    - multicast
