document: rfc-9504
kind: design-rationale
summary: In WDM networks, path computation is tightly coupled with label (lambda) selection due to lambda continuity and feasibility constraints. This requires the PCE to provide label information (Explicit Label Control, ELC) to the PCC when initiating GMPLS LSPs under the active stateful PCE model.
