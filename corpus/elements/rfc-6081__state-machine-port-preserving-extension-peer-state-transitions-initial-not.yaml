document: rfc-6081
kind: state-machine
summary: 'Port-Preserving Extension peer state transitions: initial ''not-trusted'' state moves to ''trusted'' on first accepted direct bubble on either primary or random port. If mappings change after >30 seconds of inactivity, state reverts to ''not-trusted'' and an indirect bubble is sent to re-establish. Direct Receive on Primary Port and Direct Receive on Random Port flags track which port received successful communication.'
section: 5.4.4.5
topics:
    - nat
    - v6ops
