document: rfc-6652
kind: interoperability-note
summary: This document updates RFC 4408 (SPF) by establishing the IANA SPF Modifier Names registry, preventing future modifier namespace collisions. The 'ra=', 'rp=', and 'rr=' modifiers defined here extend RFC 4408's modifier framework as defined in its Section 4.6.1.
