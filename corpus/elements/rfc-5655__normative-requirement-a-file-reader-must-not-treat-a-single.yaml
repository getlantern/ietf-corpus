document: rfc-5655
kind: normative-requirement
summary: A File Reader MUST NOT treat a single IPFIX File as containing multiple Transport Sessions; in the general case a File SHOULD be treated as a single Transport Session, though a File Reader MAY be configurable to treat a collection of Files as one session.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - measurement
