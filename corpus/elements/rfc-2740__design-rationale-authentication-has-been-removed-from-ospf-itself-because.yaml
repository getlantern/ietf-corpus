document: rfc-2740
kind: design-rationale
summary: Authentication has been removed from OSPF itself because IPv6 already provides the Authentication Header (AH) and Encapsulating Security Payload (ESP) for integrity and confidentiality. The AuType and Authentication fields present in OSPFv2 have been deleted from the packet header and all interface/area structures.
section: "2.6"
topics:
    - security
    - routing
