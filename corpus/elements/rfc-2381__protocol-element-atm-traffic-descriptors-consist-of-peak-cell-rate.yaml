document: rfc-2381
kind: protocol-element
summary: ATM traffic descriptors consist of Peak Cell Rate (PCR), and for VBR services also Sustainable Cell Rate (SCR) and Maximum Burst Size (MBS). SCR and MBS form a leaky bucket pair. CDVT (bucket depth for PCR) is not signalled but is determined by the network operator.
section: "2.5"
topics:
