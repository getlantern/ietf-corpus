document: rfc-5653
kind: design-rationale
summary: The GSSManager provider preference API (addProviderAtFront, addProviderAtEnd) is designed to be usable without knowledge of any specific SPI. The SPI specification is explicitly deferred; its existence is not mandatory for adoption of this API specification.
