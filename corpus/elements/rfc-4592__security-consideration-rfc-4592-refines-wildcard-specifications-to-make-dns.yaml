document: rfc-4592
kind: security-consideration
summary: RFC 4592 refines wildcard specifications to make DNS security (DNSSEC) additions more predictable. The original ambiguity in RFC 1034's wildcard definition entangled the design of authenticated denial of existence in DNSSEC; clarifying wildcard semantics was a prerequisite for sound DNSSEC engineering.
section: "5"
topics:
