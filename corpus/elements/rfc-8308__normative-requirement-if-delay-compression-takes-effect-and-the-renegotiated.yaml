document: rfc-8308
kind: normative-requirement
summary: If 'delay-compression' takes effect and the renegotiated algorithm is the same as the already-enabled algorithm in one or both directions, the internal compression state MUST be reset for each such direction at the time the renegotiated algorithm takes effect.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
