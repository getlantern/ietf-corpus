document: rfc-3586
kind: design-rationale
summary: IPSP is designed as a decentralized framework because two hosts can establish an SA even without a common security policy or mutual trust. SA parameters acceptable to a pair of hosts will often not be specified in advance and must be negotiated on-the-fly.
section: "2"
topics:
