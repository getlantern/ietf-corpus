document: rfc-5892
kind: interoperability-note
summary: Unicode property changes that do not alter the algorithm's output (e.g., General_Category shifting from So to Sm or Lo to Ll) have no effect on IDN code point status. This design allows the IDNA2008 algorithm to remain stable across Unicode versions without requiring periodic re-review of the standard itself.
