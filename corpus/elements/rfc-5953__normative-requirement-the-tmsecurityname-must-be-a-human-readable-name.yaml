document: rfc-5953
kind: normative-requirement
summary: The tmSecurityName MUST be a human-readable name in snmpAdminString format and MUST be constant for all traffic passing through a single TLSTM session. Messages MUST NOT be sent through an existing (D)TLS connection established using a different tmSecurityName.
section: 4.4.1.1
rfc2119_level: MUST
topics:
    - snmp
    - tls
    - security
