document: rfc-9438
kind: normative-requirement
summary: When cwnd ≤ ssthresh, CUBIC MUST employ a slow start algorithm. CUBIC SHOULD use HyStart++ (RFC 9406) or MAY use Reno slow start in rare cases where HyStart++ is not suitable.
section: "4.10"
rfc2119_level: MUST
topics:
    - congestion
    - tcp
