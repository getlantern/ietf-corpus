document: rfc-9594
kind: protocol-element
summary: The 'control_uri' parameter in a Join Request specifies a URI at the Client acting as a CoAP server. The KDC MAY use this URI to push one-to-one rekeying material (Section 6.1) or to notify the Client of its removal from the group (Section 5). The URI MUST NOT be /ace-group/GROUPNAME.
section: 4.3.1
topics:
    - security
extracted_by: claude-sonnet-4-6
