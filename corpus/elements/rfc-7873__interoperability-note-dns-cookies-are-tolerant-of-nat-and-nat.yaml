document: rfc-7873
kind: interoperability-note
summary: DNS Cookies are tolerant of NAT and NAT-PT address translation as long as the external IP mapping is relatively stable; an occasional address change is treated similarly to a Client Secret rollover. Port-mapping NAT requires the Server Cookie to incorporate the Client Cookie to distinguish co-located clients.
section: "6"
topics:
    - dns
    - nat
