document: rfc-5760
kind: normative-requirement
summary: If a Feedback Target Address sub-report block is used, it MUST be included in every RTCP packet originated by the Distribution Source to ensure consistent receiver behavior in the face of packet loss or late arrivals. When received, receivers MUST override static SDP Feedback Target address information with the dynamic address in the block.
section: 7.1.8
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
