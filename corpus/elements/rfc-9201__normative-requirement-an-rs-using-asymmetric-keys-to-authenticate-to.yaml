document: rfc-9201
kind: normative-requirement
summary: An RS using asymmetric keys to authenticate to the client MUST NOT hold several different asymmetric key pairs applicable to the same authentication algorithm (e.g., when using DTLS, MUST NOT hold several asymmetric key pairs applicable to the same cipher suite).
section: "7"
rfc2119_level: MUST NOT
topics:
