document: rfc-9442
kind: design-rationale
summary: The SCHC ACK REQ message is not used in SCHC over Sigfox; instead, the All-1 SCHC Fragment serves as the ACK request. This avoids an extra message type and leverages the existing All-1 end-of-window signalling that already triggers a Downlink opportunity.
section: 3.6.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
