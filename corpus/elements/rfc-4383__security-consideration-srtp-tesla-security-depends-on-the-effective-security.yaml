document: rfc-4383
kind: security-consideration
summary: SRTP TESLA security depends on the effective security of external systems that perform bootstrapping (key commitment) and time synchronization (clock-drift bound D_t). Compromise of these external systems undermines the TESLA source authentication guarantees; they are explicitly out of scope for this specification.
section: "7"
topics:
    - rtp
    - realtime
    - security
