document: rfc-3825
kind: interoperability-note
summary: Wireless hosts can use this option to learn the location of their radio access point at configuration time, but obtaining their own precise location requires additional mechanisms such as GPS or a future DHCP option carrying a list of nearby access point geo-locations.
