document: rfc-6266
kind: interoperability-note
summary: The IANA registry for disposition values and parameters (RFC 2183, Section 9) is shared across protocols including MIME and HTTP; not all registered disposition parameters (e.g., 'creation-date', 'modification-date', 'size') are applicable in the HTTP context.
section: "4.5"
topics:
