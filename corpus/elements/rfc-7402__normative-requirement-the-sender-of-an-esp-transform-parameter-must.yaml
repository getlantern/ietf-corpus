document: rfc-7402
kind: normative-requirement
summary: The sender of an ESP_TRANSFORM parameter MUST ensure no more than six Suite IDs are included; a recipient MUST be prepared to handle parameters containing more than six Suite IDs. The parameter MUST contain at least one mandatory Suite ID.
section: 5.1.2
rfc2119_level: MUST
topics:
    - ipsec
