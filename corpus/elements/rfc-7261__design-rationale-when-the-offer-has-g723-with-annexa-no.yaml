document: rfc-7261
kind: design-rationale
summary: When the offer has G723 with annexa=no or G729 with annexb=no, the answer is not mandated to also carry the no value because existing implementations commonly omit the annexa/annexb parameter in the answer; the offerer and answerer still proceed as if the codec is negotiated with the no value.
section: "3.2"
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
