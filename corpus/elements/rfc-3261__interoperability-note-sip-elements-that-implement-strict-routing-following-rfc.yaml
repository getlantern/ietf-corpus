document: rfc-3261
kind: interoperability-note
summary: SIP elements that implement strict routing (following RFC 2543 rules) will place themselves in the Request-URI rather than a Route header when Record-Route is used, breaking loose-routing proxies. Section 16.12.1.2 defines specific procedures for a loose-routing proxy to detect and correct for a strict-routing proxy in the path.
section: 16.12.1.2
topics:
    - sip
