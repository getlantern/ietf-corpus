document: rfc-3262
kind: protocol-element
summary: The 100rel option tag is used in Supported and Require headers to negotiate reliable provisional responses. In Supported it signals capability; in Require (in a request) it mandates reliability; in Require (in a reliable provisional response) it signals the response must be acknowledged.
section: "8.1"
