document: rfc-9136
kind: protocol-element
summary: The Interface-less IP-VRF-to-IP-VRF model (Section 4.4.1) has GW IP = ESI = 0 with a non-zero MPLS label/VNI. IP-VRFs connect directly through NVO tunnels with no SBD; the EVPN Router's MAC Extended Community carries the NVE's MAC for inner destination addressing in Ethernet NVO tunnels.
section: 4.4.1
