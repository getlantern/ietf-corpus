document: rfc-8401
kind: normative-requirement
summary: When the Prefix Attributes Flags sub-TLV is present, the N flag MUST be set and the R flag MUST NOT be set in BIER advertisements. BIER sub-TLVs MUST be included when a prefix reachability advertisement is leaked between levels.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
