document: rfc-3111
kind: normative-requirement
summary: A multihomed DA MUST respond to active DA discovery requests using the same scope as the request. The DA MUST multicast unsolicited DAAdverts on each interface using link-local and site-local source addresses (or link-local only if no higher-scope address is configured).
section: 4.2.4.4
rfc2119_level: MUST
topics:
    - multicast
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
