document: rfc-1532
kind: design-rationale
summary: The 'secs' field was left vague in RFC 951, leading to implementations that used a constant value or incorrect byte-ordering. This memo clarifies it as elapsed time since the first BOOTREQUEST, enabling servers and relay agents to implement threshold-based policies for handling long-waiting clients.
section: "3.2"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
