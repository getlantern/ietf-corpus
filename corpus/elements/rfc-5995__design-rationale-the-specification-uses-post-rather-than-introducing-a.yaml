document: rfc-5995
kind: design-rationale
summary: The specification uses POST rather than introducing a new HTTP method (previously proposed as ADDMEMBER) because POST's original semantics already cover the use case of adding a member to a collection. Reviewers pointed out that a new method would duplicate existing POST semantics, so this approach avoids HTTP method proliferation.
