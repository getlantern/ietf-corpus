document: rfc-5463
kind: normative-requirement
summary: Implementations MUST NOT allow 'ihave' to be used with extensions that change the underlying Sieve grammar or that change how script content is interpreted (e.g., encoded-character, variables). If such usage is attempted, the 'ihave' test MUST fail and the extension MUST NOT be enabled.
section: "4"
rfc2119_level: MUST NOT
topics:
    - email
