document: rfc-5222
kind: protocol-element
summary: The <locationValidation> response element enumerates civic address tokens as <valid> (used for mapping), <invalid> (checked but incorrect), or <unchecked> (not evaluated). Tokens absent from all three lists are implicitly unchecked. The server SHOULD include this when 'validateLocation' was true in the request.
section: 8.4.2
topics:
    - realtime
