document: rfc-4035
kind: normative-requirement
summary: A security-aware resolver SHOULD cache each response as a single atomic entry containing the entire answer including the named RRset and any associated DNSSEC RRs, and SHOULD discard the entire atomic entry when any of the RRs contained in it expire.
section: "4.5"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
