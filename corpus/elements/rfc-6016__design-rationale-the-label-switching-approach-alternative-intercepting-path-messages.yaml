document: rfc-6016
kind: design-rationale
summary: The 'Label Switching Approach' alternative (intercepting Path messages by inspecting IP headers inside MPLS labels at egress PE) was rejected because it imposes new MPLS forwarding requirements on all data packets and requires using encapsulating labels to identify RSVP state, which is incompatible with COPS/RSVP extensions that re-encapsulate RSVP messages.
section: A.2
topics:
    - qos
    - routing
