document: rfc-3393
kind: protocol-element
summary: One-way-ipdv values are bounded by the interval (L-U, U-L), where U is the upper bound on one-way-delay (the loss timeout) and L is the lower bound (propagation + transmission + nodal transit delay with no queuing). ipdv values within any finite interval can be positive, negative, or zero.
section: "4.2"
topics:
