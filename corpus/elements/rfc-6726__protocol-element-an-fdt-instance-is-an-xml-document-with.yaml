kind: protocol-element
summary: An FDT Instance is an XML document with root element 'FDT-Instance' containing one or more 'File' child elements. It carries a mandatory 'Expires' timestamp (32 most significant bits of a 64-bit NTP value as UTF-8 decimal) and an optional 'Complete' boolean attribute.
