document: rfc-8974
kind: design-rationale
summary: The trial-and-error discovery mechanism deliberately omits any indication of the maximum supported token length. Because a stateless client chooses the shortest token that satisfies its use case, it would likely be unable to reduce the token length further even if the server signaled a lower limit, making the information useless.
section: 2.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
