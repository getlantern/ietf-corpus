document: rfc-5893
kind: design-rationale
summary: The Bidi rule is stated strictly in terms of Unicode Bidi properties rather than character repertoires, so that the rule can be validated algorithmically and is not tied to any specific script. Two explicit goals are Label Uniqueness and Character Grouping under the Unicode Bidi algorithm.
