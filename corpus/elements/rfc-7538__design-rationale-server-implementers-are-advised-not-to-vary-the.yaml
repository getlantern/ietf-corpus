document: rfc-7538
kind: design-rationale
summary: Server implementers are advised not to vary the 308 status code based on request characteristics such as the User-Agent header field ('User-Agent Sniffing'), as this creates code that is hard to maintain and debug and requires special attention to caching (requiring a Vary response header).
section: "4"
topics:
