document: rfc-5415
kind: normative-requirement
summary: When a WTP enters the Sulking state due to failed AC discovery or repeated DTLS failures, it MUST start the SilentInterval timer. While sulking, the WTP MUST ignore all received CAPWAP and DTLS protocol messages to minimize DoS attack surface.
section: 2.3.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
