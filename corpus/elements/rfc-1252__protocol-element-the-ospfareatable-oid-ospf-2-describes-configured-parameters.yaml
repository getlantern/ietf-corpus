document: rfc-1252
kind: protocol-element
summary: The ospfAreaTable (OID ospf 2) describes configured parameters and cumulative statistics for each OSPF area the router is attached to, indexed by ospfAreaId. Fields include ospfAuthType (0=none, 1=simplePassword), ospfImportASExtern, ospfSpfRuns (Dijkstra SPF calculation count), ospfAreaBdrRtrCount, ospfASBdrRtrCount, ospfAreaLSACount, and ospfAreaLSACksumSum.
section: "5.2"
topics:
