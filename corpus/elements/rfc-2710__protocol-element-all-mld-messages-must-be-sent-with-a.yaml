document: rfc-2710
kind: protocol-element
summary: All MLD messages MUST be sent with a link-local IPv6 Source Address, an IPv6 Hop Limit of 1, and an IPv6 Router Alert option in a Hop-by-Hop Options header. The Router Alert is required to cause routers to examine MLD messages sent to multicast addresses in which the routers themselves have no interest.
section: "3"
topics:
    - multicast
    - ip
