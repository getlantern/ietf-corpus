document: rfc-3122
kind: normative-requirement
summary: 'A node MUST silently discard any received IND Advertisement that fails validity checks including: Hop Limit 255, valid ICMP checksum, Code 0, ICMP length >= 48 octets, Source Link-Layer Address present, Target Link-Layer Address present, Target Address List present with length >= 3, and all options have length > 0.'
section: 4.3.2
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
