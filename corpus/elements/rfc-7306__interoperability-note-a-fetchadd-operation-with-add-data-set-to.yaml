document: rfc-7306
kind: interoperability-note
summary: A FetchAdd operation with 'Add Data' set to 0 can safely probe whether a remote peer supports Atomic Operations without modifying the contents of its memory. A Remote Operation Error or Unexpected OpCode error from the remote peer indicates Atomic Operations are unsupported.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
