document: rfc-4754
kind: wire-format
summary: The IKE/IKEv2 authentication payload for ECDSA is a concatenation of integers r and s, each zero-padded to a fixed bit length. ECDSA-256 produces a 512-bit (64-byte) signature; ECDSA-384 produces 768 bits (96 bytes); ECDSA-521 produces 1056 bits (132 bytes).
section: "7"
