document: rfc-8443
kind: protocol-element
summary: The 'rph' PASSporT claim provides an assertion of authorization for information in the SIP 'Resource-Priority' header field. The PASSporT header includes a 'ppt' value of 'rph', and the claim contains an 'auth' key whose value is a JSON array of r-values (namespace.priority strings) from the SIP 'Resource-Priority' header field.
section: "3"
topics:
