document: rfc-9171
kind: wire-format
summary: 'Each canonical (non-primary) block SHALL be a CBOR array of 5 elements (CRC type zero) or 6 elements (CRC present). Fields in order: block type code (unsigned integer), block number (unsigned integer), block processing control flags, CRC type, block-type-specific data (definite-length CBOR byte string), and optional CRC.'
section: 4.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
