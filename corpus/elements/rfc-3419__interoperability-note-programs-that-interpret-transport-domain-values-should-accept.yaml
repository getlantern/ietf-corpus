document: rfc-3419
kind: interoperability-note
summary: Programs that interpret transport domain values should accept both the SNMPv2-TM domain values (for SNMP-specific endpoints) and the domain values defined in this memo, to provide interoperability in cases where distinguishing the protocol running over a transport endpoint is not possible or desirable.
