document: rfc-3947
kind: normative-requirement
summary: In transport mode, both ends MUST send both original Initiator and Responder NAT-OA addresses to the other end. For tunnel mode, both ends SHOULD NOT send original addresses. The initiator MUST send NAT-OA payloads if it proposes any UDP-Encapsulated-Transport mode; the responder MUST send them only if it selects UDP-Encapsulated-Transport mode.
section: "5.2"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
