document: rfc-7095
kind: normative-requirement
summary: Array elements within structured property values MUST have the primitive type matching the jCard type identifier. For RFC 6350 structured text values, only JSON strings are used; extensions defining structured number or boolean values MUST use JSON number or boolean types.
section: 3.3.1.3
rfc2119_level: MUST
topics:
