document: rfc-8044
kind: wire-format
summary: The 'long-extended' data type (value 16) adds a flags octet containing a 1-bit More (M) flag, a 1-bit Truncation (T) flag, and 6 Reserved bits after the Extended-Type. The M flag signals fragmentation across multiple consecutive attributes of the same Type and Extended-Type.
section: "3.16"
