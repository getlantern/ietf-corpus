document: rfc-4244
kind: security-consideration
summary: Gaps in hi-index values can indicate that an entry has been maliciously removed or removed for privacy reasons. Applications SHOULD evaluate indices for gaps and MAY choose not to process History-Info when entries appear to be missing.
section: 4.3.1
topics:
    - sip
    - security
    - realtime
