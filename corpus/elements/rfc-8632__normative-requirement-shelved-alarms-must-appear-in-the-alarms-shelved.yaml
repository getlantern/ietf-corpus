document: rfc-8632
kind: normative-requirement
summary: Shelved alarms MUST appear in the /alarms/shelved-alarms/shelved-alarm list; non-matching alarms MUST appear in /alarms/alarm-list/alarm. The server MUST maintain state changes (e.g., severity) for shelved alarms and MUST NOT send notifications for them.
section: 4.1.1
rfc2119_level: MUST
topics:
