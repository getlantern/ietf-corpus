document: rfc-4868
kind: normative-requirement
summary: When used as a data origin authentication and integrity verification algorithm in ESP, AH, IKE, or IKEv2, a truncated value using the first nnn/2 bits MUST be supported. No other authenticator value lengths are supported by this specification.
section: "2.3"
rfc2119_level: MUST
topics:
