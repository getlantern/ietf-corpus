document: rfc-7380
kind: protocol-element
summary: CAT_error_count is a 16-bit unsigned count of CAT errors. A CAT error occurs when PID 0x0001 contains a table with table_id other than 0x01, or when scrambling is employed but no table with table_id 0x01 (CAT) is present. Value 0xFFFF indicates measurement unavailable.
