document: rfc-4255
kind: interoperability-note
summary: The SSHFP method is one of potentially several host key verification methods; others include local known-hosts files and future methods such as LDAP-based storage. A configurable policy ordering is needed to interoperate with existing SSH implementations that use local key databases.
section: "2.2"
topics:
    - dns
    - security
