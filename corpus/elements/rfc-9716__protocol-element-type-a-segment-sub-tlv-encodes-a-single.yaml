document: rfc-9716
kind: protocol-element
summary: Type-A Segment sub-TLV encodes a single SID in the form of an MPLS label. It carries a 20-bit Label value, 3-bit TC, 1-bit S (reserved, must be zero), and 1-octet TTL. If the originator wants the receiver to choose TC, it MUST set TC to zero; if it wants the receiver to choose TTL, it MUST set TTL to 255.
section: "4.1"
topics:
    - routing
