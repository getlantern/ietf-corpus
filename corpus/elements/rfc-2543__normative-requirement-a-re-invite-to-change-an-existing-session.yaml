document: rfc-2543
kind: normative-requirement
summary: A re-INVITE to change an existing session MUST use the same Call-ID as the original but with a higher CSeq than any previous request from the client to the server. The user agent MUST update internal state if session parameters change.
section: 1.4.6
rfc2119_level: MUST
topics:
    - sip
    - realtime
