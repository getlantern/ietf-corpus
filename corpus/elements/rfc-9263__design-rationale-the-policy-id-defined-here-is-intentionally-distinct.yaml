document: rfc-9263
kind: design-rationale
summary: The Policy ID defined here is intentionally distinct from the Performance Policy ID in RFC 8979, which has narrowly scoped use; this general Policy ID covers cases like URL filtering and transcoding that are not addressed by RFC 8979.
