summary: MT IS Neighbor Attribute TLV (Type 223) is defined, identical in format to the MT-ISN TLV (222), for advertising MT neighbor attribute information in Extended LSPs. Both TLVs 23 and 223 MAY appear in Original or Extended LSPs.
