document: rfc-9140
kind: protocol-element
summary: The Waiting Exchange (Type=4) is sent when the OOB Step has not yet occurred; it always ends in EAP-Failure. The server MAY include a SleepTime value (integer 0–3600 seconds) to rate-limit peer probing attempts.
section: 3.2.5
