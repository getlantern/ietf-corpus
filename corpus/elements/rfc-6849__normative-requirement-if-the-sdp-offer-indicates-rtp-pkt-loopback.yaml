document: rfc-6849
kind: normative-requirement
summary: If the SDP offer indicates rtp-pkt-loopback support, the offer MUST also contain at least one of the encapsulated (encaprtp) or direct (rtploopback) loopback encoding format names. If only rtp-media-loopback is offered, these encoding formats MUST NOT appear.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
