document: rfc-8896
kind: normative-requirement
summary: The 'calendar-start-time' attribute in Calendar responses MUST be specified as an HTTP 'Date' header field using the IMF-fixdate format defined in Section 7.1.1.1 of RFC 7231, expressed in GMT. Its value SHOULD NOT be later than the request date.
section: "5"
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
