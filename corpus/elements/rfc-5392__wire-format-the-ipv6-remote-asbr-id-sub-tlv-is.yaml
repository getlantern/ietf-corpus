document: rfc-5392
kind: wire-format
summary: The IPv6 Remote ASBR ID sub-TLV is TLV type 24 and is 16 octets in length, carrying a stable, routable, global IPv6 address of the remote ASBR. Use of the TE Router IPv6 Address as specified in the IPv6 Router Address TLV is RECOMMENDED.
section: 3.3.3
topics:
