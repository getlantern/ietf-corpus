document: rfc-9260
kind: protocol-element
summary: 'Chunk Type values 0–14 are assigned (DATA, INIT, INIT ACK, SACK, HEARTBEAT, HEARTBEAT ACK, ABORT, SHUTDOWN, SHUTDOWN ACK, ERROR, COOKIE ECHO, COOKIE ACK, reserved ECNE/CWR, SHUTDOWN COMPLETE). The high-order 2 bits of an unrecognized Chunk Type encode the action: 00=stop/discard, 01=stop/discard/report, 10=skip, 11=skip/report.'
section: "3.2"
topics:
