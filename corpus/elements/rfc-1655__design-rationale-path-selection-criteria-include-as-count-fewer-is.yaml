document: rfc-1655
kind: design-rationale
summary: Path selection criteria include AS count (fewer is better), policy considerations, presence/absence of specific AS's, path origin (BGP-learned is better than EGP-learned), AS path subsets (shorter subsets preferred), and link dynamics (stable paths preferred over unstable). Link dynamics criteria must be used carefully to avoid routing instability.
