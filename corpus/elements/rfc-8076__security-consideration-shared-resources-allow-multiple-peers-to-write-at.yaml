document: rfc-8076
kind: security-consideration
summary: Shared Resources allow multiple peers to write at a single Resource-ID, potentially storing an arbitrary number of entries such as ACL delegations, leading to enhanced resource consumption at storing overlay nodes; this can be mitigated by imposing <max-size> limits in the configuration document.
section: "8.1"
topics:
    - security
