document: rfc-5192
kind: security-consideration
summary: If an adversary modifies the DHCP server response or inserts its own response, a PANA Client could be directed to contact a rogue PANA Authentication Agent that intercepts authentication requests and/or denies network access. The DHCP exchange prior to network access authentication is typically neither integrity-protected nor origin-authenticated.
section: "7"
topics:
    - security
