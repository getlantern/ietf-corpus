document: rfc-2406
kind: security-consideration
summary: Use of confidentiality without integrity/authentication (either in ESP or separately in AH) may subject traffic to certain forms of active attacks that could undermine the confidentiality service, as described in [Bel96]. Implementations should carefully consider the security implications of selecting confidentiality alone.
section: "1"
topics:
    - ipsec
    - security
    - crypto
