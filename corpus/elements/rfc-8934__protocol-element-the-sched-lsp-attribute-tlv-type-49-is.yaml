document: rfc-8934
kind: protocol-element
summary: The SCHED-LSP-ATTRIBUTE TLV (Type 49) is an optional TLV within the LSP object for normal LSP scheduling. It has a fixed length of 16 octets and carries flags (R, C, A, G), Start-Time (32-bit, seconds), Duration (32-bit, seconds), and GrB/Elastic-Lower-Bound and GrA/Elastic-Upper-Bound (each 16 bits).
section: 5.2.1
topics:
