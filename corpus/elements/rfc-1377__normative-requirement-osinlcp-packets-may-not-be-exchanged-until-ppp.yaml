document: rfc-1377
kind: normative-requirement
summary: OSINLCP packets may not be exchanged until PPP has reached the Network-Layer Protocol phase. OSINLCP packets received before this phase is reached should be silently discarded.
section: "2"
rfc2119_level: MUST NOT
