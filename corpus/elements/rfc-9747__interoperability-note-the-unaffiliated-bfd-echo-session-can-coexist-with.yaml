document: rfc-9747
kind: interoperability-note
summary: The Unaffiliated BFD Echo session can coexist with other BFD session types on the same local device. The remote system for the Unaffiliated BFD Echo session must differ from the remote system for any other BFD session, and local discriminators for different sessions must be distinct.
section: "4"
topics:
