document: rfc-8253
kind: normative-requirement
summary: 'For PKIX trust model: implementations MUST allow configuration of trusted CAs; certificate validation MUST include verification rules per RFC 5280; peer validation MUST follow RFC 6125 rules, including checking DNS names or IP addresses against the certificate. DNS-ID takes precedence over CN-ID for DNS validation; subjectAltName:iPAddr takes precedence over CN-ID for IP validation.'
section: "3.4"
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
    - crypto
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
