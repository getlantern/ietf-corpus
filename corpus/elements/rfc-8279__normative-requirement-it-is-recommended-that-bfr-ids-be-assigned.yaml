document: rfc-8279
kind: normative-requirement
summary: It is RECOMMENDED that BFR-ids be assigned densely from the numbering space (e.g., [1,N] for N BFERs) to minimize the number of SIs required and maximize the number of BFERs representable in a single BitString. It is also RECOMMENDED that the BFR-prefix be a loopback address.
section: "2"
rfc2119_level: RECOMMENDED
topics:
    - routing
