document: rfc-9960
kind: normative-requirement
summary: One and only one PTI MUST be the active instance of a CP. If more than one PTI of a CP is active at the same time, and that CP is the active CP of the SR P2MP Policy, then duplicate traffic may be delivered to the Leaf nodes.
section: "2.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
