document: rfc-6544
kind: design-rationale
summary: The active candidate's port is set to 9 (Discard) because it is meaningless — the actual port is chosen at connection time. The spec sets a port value anyway to keep active candidate encoding consistent with passive and S-O candidates, allowing uniform SDP parsing.
section: "4.5"
topics:
