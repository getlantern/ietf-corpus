document: rfc-8970
kind: interoperability-note
summary: When preview is not generated from message body content and the LANGUAGE extension (RFC 5255) is supported, the preview text SHOULD be generated according to language rules for human-readable text, enabling appropriate localization of auto-generated descriptions (e.g., for image-only messages).
section: "3.3"
topics:
