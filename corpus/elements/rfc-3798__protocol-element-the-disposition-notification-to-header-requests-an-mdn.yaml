document: rfc-3798
kind: protocol-element
summary: 'The Disposition-Notification-To header requests an MDN from the recipient''s MUA. Its syntax is: "Disposition-Notification-To" ":" mailbox *("," mailbox). Its presence is a request only; recipients are always free to silently ignore it.'
