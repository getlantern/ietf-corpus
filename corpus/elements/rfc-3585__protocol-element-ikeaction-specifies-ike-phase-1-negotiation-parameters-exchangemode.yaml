document: rfc-3585
kind: protocol-element
summary: 'IKEAction specifies IKE phase 1 negotiation parameters: ExchangeMode (1=base, 2=main, 4=aggressive), UseIKEIdentityType (per IKE DOI), VendorID payload value, and AggressiveModeGroupId. It is derived from IKENegotiationAction and carries phase 1-specific parameters alongside the inherited MinLifetimeSeconds, MinLifetimeKilobytes, and IdleDurationSeconds.'
section: "6.14"
topics:
    - ipsec
    - security
