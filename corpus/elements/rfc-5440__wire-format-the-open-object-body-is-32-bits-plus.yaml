kind: wire-format
summary: 'The OPEN object body is 32 bits plus optional TLVs: Ver (3 bits), Flags (5 bits, reserved), Keepalive (8 bits, seconds between messages, min=1, recommended=30, 0=disabled), DeadTimer (8 bits, recommended=4×Keepalive), and SID/session ID (8 bits, incremented per session, used for logging).'
