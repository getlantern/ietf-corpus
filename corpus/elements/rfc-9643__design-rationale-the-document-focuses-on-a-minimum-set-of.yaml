document: rfc-9643
kind: design-rationale
summary: The document focuses on a minimum set of required TCP parameters—address/port binding, keepalives, and proxy traversal—rather than exposing the full TCP socket API. This intentionally narrow scope allows the groupings to serve as a stable foundation for higher-level protocol modules without overfitting to any single application.
