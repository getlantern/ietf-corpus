document: rfc-9468
kind: normative-requirement
summary: When the passive side receives an incoming BFD Control packet on a numbered interface, the source address MUST belong to the subnet of the receiving interface; otherwise the packet MUST NOT be processed.
section: "2"
rfc2119_level: MUST
