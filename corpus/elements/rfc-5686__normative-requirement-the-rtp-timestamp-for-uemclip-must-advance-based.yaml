document: rfc-5686
kind: normative-requirement
summary: The RTP timestamp for UEMCLIP MUST advance based on a clock at either 8000 or 16000 Hz. When the audio sampling rate can change during a session, the RTP timestamp rate MUST be equal to the maximum rate given in the mode range, and MUST NOT change during a session.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
