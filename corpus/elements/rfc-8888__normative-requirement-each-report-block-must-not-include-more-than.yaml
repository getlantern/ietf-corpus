document: rfc-8888
kind: normative-requirement
summary: Each report block MUST NOT include more than 16384 packet metric blocks, i.e., it MUST NOT report on more than one quarter of the RTP sequence number space in a single report.
section: "3.1"
rfc2119_level: MUST NOT
