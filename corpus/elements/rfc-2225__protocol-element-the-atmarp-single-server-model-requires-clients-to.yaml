document: rfc-2225
kind: protocol-element
summary: The ATMARP single-server model requires clients to establish a point-to-point LLC/SNAP VC to the server, then register by sending an ATMARP_Request for their own IP address. The server builds its table from source address information in received ATMARP_Requests.
section: "8.3"
rfc2119_level: MUST
topics:
