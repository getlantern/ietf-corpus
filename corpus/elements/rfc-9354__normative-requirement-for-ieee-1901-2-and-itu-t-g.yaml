summary: 'For IEEE 1901.2 and ITU-T G.9903, the 64-bit IID MUST be derived from the 16-bit PAN ID, zero bits, and 16-bit short address by inserting 0xFFFE, forming: 16_bit_PAN:00FF:FE00:16_bit_short_address.'
