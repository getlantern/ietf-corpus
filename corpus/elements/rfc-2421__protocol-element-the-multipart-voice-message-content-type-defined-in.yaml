document: rfc-2421
kind: protocol-element
summary: 'The multipart/voice-message content type (defined in RFC 2423) is the mandatory container for a VPIM voice message. Its semantics are identical to multipart/mixed and may be interpreted as such by non-VPIM systems. It MUST contain only profiled media types: audio/*, image/*, message/rfc822, and text/directory.'
section: 4.3.1
topics:
