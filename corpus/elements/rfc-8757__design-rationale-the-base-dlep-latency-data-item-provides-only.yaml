document: rfc-8757
kind: design-rationale
summary: The base DLEP Latency Data Item provides only a single, implementation-dependent latency value. This extension adds minimum and maximum latency fields to allow communicating the full range of latency observable on a link, enabling more informed routing decisions.
section: "1"
topics:
    - routing
