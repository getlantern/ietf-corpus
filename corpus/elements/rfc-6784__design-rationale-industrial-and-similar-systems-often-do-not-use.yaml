document: rfc-6784
kind: design-rationale
summary: Industrial and similar systems often do not use DNS (they have their own namespaces and name resolution, including preconfigured device tables, and do not use FQDNs), but most do use DHCP. Adding a DNS server to such environments decreases reliability and increases management cost, motivating a DHCP-based mechanism for KDC discovery.
section: "1"
topics:
