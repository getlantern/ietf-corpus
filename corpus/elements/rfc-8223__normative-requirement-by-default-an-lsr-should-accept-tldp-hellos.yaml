document: rfc-8223
kind: normative-requirement
summary: By default, an LSR SHOULD accept tLDP Hellos in order to then accept or reject the tLDP session based on the application information. An LSR SHOULD allow configuration of any TA-Id to facilitate private TA-Ids by network operators.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - mpls
