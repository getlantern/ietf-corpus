document: rfc-5722
kind: normative-requirement
summary: When reassembling an IPv6 datagram, if one or more constituent fragments is determined to be an overlapping fragment, the entire datagram (and any constituent fragments, including those not yet received) MUST be silently discarded.
section: "4"
rfc2119_level: MUST
topics:
