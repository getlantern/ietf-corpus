document: rfc-3977
kind: security-consideration
summary: The base NNTP protocol provides weak authentication and access control. Servers relying solely on source IP address for access control are vulnerable to IP spoofing. Extensions AUTHINFO (SASL) and STARTTLS are required for strong authentication and encryption of the connection.
section: "12.3"
topics:
    - security
