document: rfc-749
kind: design-rationale
summary: SUPDUP-OUTPUT was created to let occasional display-oriented programs on non-display-oriented servers use SUPDUP's standardized virtual display support without requiring the server to assume total screen management for the entire connection — the key limitation of both RFC 734 and RFC 736.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
