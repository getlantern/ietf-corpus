document: rfc-7361
kind: normative-requirement
summary: The PE-rs that supports the MAC Flush Parameters TLV MUST support the RFC 4762 MAC flushing procedures, since this document only augments them. Implementations SHOULD provide administrative control to select the desired MAC flushing action towards each PE-rs device.
section: "6"
rfc2119_level: MUST
