document: rfc-9755
kind: design-rationale
summary: The FETCH BODYSTRUCTURE media-message syntax was made optional (MAY treat message/global like message/rfc822) because IMAP4rev1 and IMAP4rev2 differ slightly in this area, and implementers were not previously informed of the difference. Clients must parse both varieties to support both protocol versions anyway.
section: B.2
