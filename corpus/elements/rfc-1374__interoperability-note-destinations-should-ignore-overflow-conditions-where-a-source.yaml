document: rfc-1374
kind: interoperability-note
summary: Destinations should ignore overflow conditions where a Source adds fill bytes sufficient to overflow the destination input buffer, and should verify only that at least the number of bytes indicated by the IP header actually arrived.
section: Protocol/Packet Format
topics:
