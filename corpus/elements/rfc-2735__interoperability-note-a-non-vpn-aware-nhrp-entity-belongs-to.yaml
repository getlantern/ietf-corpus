document: rfc-2735
kind: interoperability-note
summary: A non-VPN-aware NHRP entity belongs to exactly one VPN without being aware of it; to interoperate with VPN-aware entities, the VPN-aware entity must be administratively pre-configured to associate the correct VPN-ID with traffic from the non-VPN-aware entity.
section: "3.2"
topics:
    - vpn
