document: rfc-3501
kind: protocol-element
summary: Message sequence numbers are relative positions from 1 to the number of messages in the mailbox, ordered by ascending UID. Unlike UIDs, sequence numbers can be reassigned during a session; they are decremented for all subsequent messages when a message is expunged.
section: 2.3.1.2
topics:
    - email
