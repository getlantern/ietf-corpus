document: rfc-9303
kind: registry
summary: 'IANA created five new subregistries in ''Locator/ID Separation Protocol (LISP) Parameters'': (1) LISP ECM Authentication Data Types (0–255, value 1 = LISP-SEC-ECM-EXT), (2) LISP Map-Reply Authentication Data Types (0–255, value 1 = LISP-SEC-MR-EXT), (3) LISP-SEC Preferred Authentication Data HMAC IDs (0–65535), (4) LISP-SEC Authentication Data Key Wrap IDs (0–65535), and (5) LISP-SEC Authentication Data Key Derivation Function IDs (0–65535). All use Specification Required policy.'
