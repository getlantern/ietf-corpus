document: rfc-6396
kind: interoperability-note
summary: MRT Type Codes 0-10 are deprecated. Types 0-4 are informational collector-state signals never known to be implemented; types 5-10 (BGP, RIP, IDRP, RIPNG, BGP4PLUS, BGP4PLUS_01) are superseded by BGP4MP and TABLE_DUMP_V2. Historical MRT archives may contain these types, and researchers may need to support them for backward compatibility.
section: B
topics:
