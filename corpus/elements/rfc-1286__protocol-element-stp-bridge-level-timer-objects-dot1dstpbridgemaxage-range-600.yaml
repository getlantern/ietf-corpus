document: rfc-1286
kind: protocol-element
summary: 'STP bridge-level timer objects: dot1dStpBridgeMaxAge (range 600–4000 in 1/100 s), dot1dStpBridgeHelloTime (100–1000), and dot1dStpBridgeForwardDelay (400–3000) are read-write and represent the values this bridge would advertise if it became root. An agent MAY return badValue for non-whole-second values.'
