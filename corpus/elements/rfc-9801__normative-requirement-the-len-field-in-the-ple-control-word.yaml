document: rfc-9801
kind: normative-requirement
summary: The LEN field in the PLE control word MUST always be set to zero because no padding is added. If the actual packet size is inconsistent with the expected payload size defined in Section 6, the packet MUST be considered malformed.
section: 5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
