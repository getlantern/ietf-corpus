document: rfc-8038
kind: wire-format
summary: The mibObjectIdentifier field carries an SNMP Object Identifier encoded in ASN.1/BER (X.690) format within an octetArray; variable-length encoding (field length = 65535) is RECOMMENDED so that OIDs of different lengths can be exported efficiently and the MIB Field Options Template can be reused.
