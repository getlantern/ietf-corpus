document: rfc-7727
kind: normative-requirement
summary: Upon recovery from a previous fault, a PE device SHOULD NOT reclaim the role of the virtual root for the STP network even if it has the numerically lowest BridgeIdentifier among the RG, to minimize traffic disruption.
section: 4.2.4
rfc2119_level: SHOULD NOT
topics:
    - routing
