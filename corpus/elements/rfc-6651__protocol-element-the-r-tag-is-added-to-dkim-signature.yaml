document: rfc-6651
kind: protocol-element
summary: The 'r=' tag is added to DKIM-Signature header fields to request that Verifiers generate a failure report. The only legal value is the single character 'y', encoded as lowercase. Its presence triggers the DKIM reporting algorithm.
section: "3.1"
topics:
