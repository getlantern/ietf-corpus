document: rfc-3633
kind: interoperability-note
summary: If a delegating router communicates with a requesting router through a relay agent, the delegating router may need a protocol or other out-of-band communication to add routing information for delegated prefixes into the provider edge router. No in-band mechanism is defined for this.
section: "14"
