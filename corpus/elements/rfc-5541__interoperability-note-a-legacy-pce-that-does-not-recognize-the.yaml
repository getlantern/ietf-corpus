document: rfc-5541
kind: interoperability-note
summary: 'A legacy PCE that does not recognize the OF flag in the RP object will ignore it and send a PCRep without an OF object. The PCC''s behavior in this case is an implementation choice: it may discard the reply or accept it without knowledge of the applied objective function.'
section: 3.3.1
topics:
    - routing
