document: rfc-4993
kind: wire-format
summary: 'The 1-octet payload header encodes: bits 0–1 = version (''V''), bit 2 = request/response flag (''RR''), bit 3 = payload deflated (''PD''), bit 4 = deflate supported (''DS''), bit 5 = reserved (MUST be 0), bits 6–7 = payload type (''PT'').'
section: 3.1.3
