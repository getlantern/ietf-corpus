document: rfc-7988
kind: protocol-element
summary: The 'switch-parents-delay' timer governs how long a child node continues to accept packets from the old UMH after modifying its Leaf A-D route's RT. It SHOULD default to 30 seconds, SHOULD be configurable, and expires early if a packet from the new UMH is received.
section: "10"
topics:
    - routing
    - multicast
