document: rfc-8638
kind: normative-requirement
summary: Once an (S,G,rpt) state machine changes to NoInfo (NI) state — meaning the corresponding downstream AFBR has switched to receive multicast data for (S,G) along the RPT again — the interface agent MUST send a Join(S,G,rpt) to the PIM-SM module immediately.
section: "6.4"
rfc2119_level: MUST
topics:
    - multicast
    - ip
