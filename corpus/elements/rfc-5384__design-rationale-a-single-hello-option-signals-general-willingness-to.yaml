document: rfc-5384
kind: design-rationale
summary: A single Hello option signals general willingness to receive type 1 Encoded-Source Addresses rather than per-attribute-type options, because there is no immediate way to act on a neighbor's inability to process specific attribute types and per-type options would not be useful.
section: "3.2"
topics:
    - multicast
