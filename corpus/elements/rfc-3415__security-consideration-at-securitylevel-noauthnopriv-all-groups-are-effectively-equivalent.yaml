document: rfc-3415
kind: security-consideration
summary: At securityLevel noAuthNoPriv, all groups are effectively equivalent because the assumption that the securityName has been authenticated does not hold. Security administrators must use the securityLevel index in vacmAccessTable to enforce separation between unauthenticated and authenticated access.
