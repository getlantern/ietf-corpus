document: rfc-7916
kind: normative-requirement
summary: When selecting the best alternate, the selection algorithm MUST consider all available alternates, both connected and tunnel-based (remote). For remote LFAs, computation of PQ sets SHOULD be performed before selecting the best alternate.
section: 6.2.1
rfc2119_level: MUST
topics:
