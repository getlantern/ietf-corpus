document: rfc-2253
kind: interoperability-note
summary: This specification obsoletes RFC 1779 and is more restrictive in the encodings it generates, while remaining backward-compatible in parsing. Implementations must accept RFC 1779 input but must not produce RFC 1779-only constructs (such as quoted attribute values or certain whitespace forms) in their output.
section: "4"
topics:
