document: rfc-7919
kind: normative-requirement
summary: A compatible TLS server that receives the Supported Groups extension with FFDHE codepoints and selects an FFDHE cipher suite MUST select one of the client's offered groups. A server MUST NOT select a named FFDHE group that was not offered by the client.
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - crypto
