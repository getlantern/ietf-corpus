document: rfc-5404
kind: design-rationale
summary: Interleaving is supported as an optional feature rather than mandatory because, while it improves packet-loss resilience for streaming, it increases end-to-end delay and buffering requirements that are unacceptable for conversational applications with tight delay bounds.
