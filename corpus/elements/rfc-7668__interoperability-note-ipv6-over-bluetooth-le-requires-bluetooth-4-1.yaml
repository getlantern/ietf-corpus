document: rfc-7668
kind: interoperability-note
summary: IPv6 over Bluetooth LE requires Bluetooth 4.1 or newer and IPSP 1.0 or newer. Bluetooth 4.0 devices do not support IPv6 because version 4.1 is required for the necessary capabilities.
