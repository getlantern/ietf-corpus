document: rfc-2863
kind: interoperability-note
summary: The non-unicast counters ifInNUcastPkts and ifOutNUcastPkts are deprecated in favor of separate multicast and broadcast counters (ifInMulticastPkts, ifInBroadcastPkts, ifOutMulticastPkts, ifOutBroadcastPkts) defined in this memo. The combined non-unicast counters became redundant once separate counters were available.
section: 3.1.8
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
