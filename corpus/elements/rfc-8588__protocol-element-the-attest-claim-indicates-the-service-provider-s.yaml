document: rfc-8588
kind: protocol-element
summary: 'The ''attest'' claim indicates the service provider''s level of confidence in the calling identity. It MUST be one of three string values: ''A'' (Full Attestation), ''B'' (Partial Attestation), or ''C'' (Gateway Attestation), as defined in ATIS-1000074.'
