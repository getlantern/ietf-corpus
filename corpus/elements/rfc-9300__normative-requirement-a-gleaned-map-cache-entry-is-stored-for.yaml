document: rfc-9300
kind: normative-requirement
summary: A gleaned Map-Cache entry is stored for a recommended period of 3 seconds pending verification. Verification MUST be performed by sending a Map-Request to the source EID of the received encapsulated packet, and the gleaning mechanism MUST NOT be used over the public Internet.
section: "9"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
