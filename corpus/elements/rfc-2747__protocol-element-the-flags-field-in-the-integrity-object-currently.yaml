document: rfc-2747
kind: protocol-element
summary: 'The Flags field in the INTEGRITY object currently defines one flag: Handshake Flag (HF) at bit 0. Senders willing to respond to integrity handshake messages SHOULD set HF=1; those that will reject such messages SHOULD set HF=0. All other flag bits are reserved and MUST be set to 0.'
section: "2.1"
rfc2119_level: SHOULD
topics:
    - security
