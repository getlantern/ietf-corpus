document: rfc-9048
kind: normative-requirement
summary: When creating an AKA challenge, the server MUST set the AMF separation bit to 1 in the AKA algorithm. The peer MUST check that the AMF separation bit is set to 1; if not, the peer fails the authentication as if AUTN were incorrect.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
