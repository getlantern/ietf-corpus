document: rfc-3025
kind: normative-requirement
summary: Multiple TLVs with types CVSE-TYPE-NUMBER and NVSE-TYPE-NUMBER can be included in a message and can be placed anywhere after the fixed portion of the Mobile IP message; they are expected to be protected by the corresponding authenticator as necessary.
