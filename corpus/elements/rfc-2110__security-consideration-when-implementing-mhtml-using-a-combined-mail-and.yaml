document: rfc-2110
kind: security-consideration
summary: When implementing MHTML using a combined mail and WWW proxy server shared by multiple users, methods MUST be employed to ensure body parts of a message to one person are not retrievable by another. Password/ticket mechanisms are recommended; some caching proxy servers may not distinguish between email and HTTP objects, creating a security risk.
section: "12"
topics:
    - security
    - email
