document: rfc-2022
kind: wire-format
summary: 'Every MARS control message begins with a fixed header: mar$afn (16-bit address family), mar$pro (56-bit protocol identification), mar$hdrrsv (24-bit reserved), mar$chksum (16-bit IP checksum), mar$extoff (16-bit extensions offset), mar$op (16-bit operation code), mar$shtl (8-bit source ATM number type/length), mar$sstl (8-bit source ATM subaddress type/length). The overall message structure is [Fixed header][Mandatory fields][Addresses][Supplementary TLVs].'
section: "4.3"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
