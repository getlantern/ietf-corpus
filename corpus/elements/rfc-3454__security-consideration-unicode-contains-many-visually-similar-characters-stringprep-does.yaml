document: rfc-3454
kind: security-consideration
summary: Unicode contains many visually similar characters. Stringprep does not map similar-looking characters together or prohibit characters because they resemble others, as doing so without full font context would be unreliable. User confusion from visual similarity (spoofing) remains a residual risk that applications must address independently.
section: "9.1"
topics:
    - security
