document: rfc-6223
kind: protocol-element
summary: The "keep" Via header field parameter allows adjacent SIP entities to explicitly negotiate NAT keep-alive usage. Inserted in the topmost Via of a request to indicate willingness to send keep-alives; a parameter value is added in the response to indicate willingness to receive them.
section: "3"
topics:
