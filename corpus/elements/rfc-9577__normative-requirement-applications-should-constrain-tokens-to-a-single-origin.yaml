document: rfc-9577
kind: normative-requirement
summary: Applications SHOULD constrain tokens to a single Origin unless the use case can accommodate replay attacks. If token redemption produces side effects, Origins SHOULD implement an anti-replay mechanism.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
