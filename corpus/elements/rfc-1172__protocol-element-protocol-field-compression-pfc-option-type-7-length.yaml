document: rfc-1172
kind: protocol-element
summary: Protocol-Field-Compression (PFC) option (Type=7, Length=2) enables ISO 3309 extension mechanism to compress two-octet Protocol fields to one octet for protocol values less than 256. The FCS is calculated on the compressed frame. LCP packets MUST never use a compressed Protocol field.
section: "2.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
