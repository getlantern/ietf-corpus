document: rfc-5848
kind: protocol-element
summary: The Signature Group (SG) and Signature Priority (SPRI) fields together define how syslog messages are grouped for signing. SG=0 means one group for all messages; SG=1 means each PRI value is its own group; SG=2 means groups cover PRI ranges; SG=3 means groups assigned by an out-of-band scheme.
section: 4.2.3
topics:
    - syslog
