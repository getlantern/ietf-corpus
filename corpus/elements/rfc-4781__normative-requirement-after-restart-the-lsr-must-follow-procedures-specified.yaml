document: rfc-4781
kind: normative-requirement
summary: After restart, the LSR MUST follow procedures specified in RFC 4724, and if MPLS forwarding state was preserved, SHOULD advertise this by setting the Flag for Address Family field in the Graceful Restart Capability for all applicable AFI/SAFI pairs.
section: "2"
rfc2119_level: SHOULD
