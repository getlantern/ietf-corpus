document: rfc-8437
kind: normative-requirement
summary: A server advertising SEARCHRES (RFC 5182) MUST discard any saved search results after UNAUTHENTICATE, so that '$' subsequently represents the empty set. A server advertising LANGUAGE (RFC 5255) reverts to the 'i-default' language.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
