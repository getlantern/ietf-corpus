document: rfc-9709
kind: privacy-consideration
summary: If the message-digest attribute is included in AuthAttributes, its value is the unencrypted one-way hash of the plaintext, enabling content tracking and candidate matching. Implementations SHOULD NOT include the message-digest attribute in AuthAttributes.
section: "7"
rfc2119_level: SHOULD NOT
topics:
    - privacy
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
