document: rfc-5936
kind: normative-requirement
summary: 'Name compression in AXFR messages SHOULD be performed in a case-preserving manner: ''a'' is not equal to ''A'' for compression matching purposes in AXFR, unlike in normal DNS responses. RDATA compression MUST abide by RFC 3597 Section 4.'
section: "3.4"
rfc2119_level: SHOULD
topics:
