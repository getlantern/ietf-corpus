document: rfc-8357
kind: wire-format
summary: 'The DHCPv6 Relay Source Port Option encodes as: Option-Code = 135 (16-bit), Option-Len = 2 (16-bit), Downstream Source Port (16-bit). Total wire size is 6 octets. The Downstream Source Port carries the UDP port used by the downstream relay, or zero if inapplicable.'
