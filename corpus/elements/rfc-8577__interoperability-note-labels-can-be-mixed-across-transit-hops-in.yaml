document: rfc-8577
kind: interoperability-note
summary: 'Labels can be mixed across transit hops in a single MPLS RSVP-TE LSP: certain LSRs use TE link labels while others use regular labels. The ingress constructs the label stack based on the label type recorded from each transit LSR in the RRO, providing backward compatibility with LSRs that do not support TE link labels.'
