document: rfc-3448
kind: normative-requirement
summary: TFRC SHOULD NOT be used with n significantly greater than 8 loss intervals for traffic competing on the global Internet with TCP. Safe operation with larger n would require a more severe response to two or more RTTs of heavy loss.
section: "5.4"
rfc2119_level: SHOULD NOT
topics:
    - congestion
    - tcp
