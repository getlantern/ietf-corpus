document: rfc-2303
kind: normative-requirement
summary: 'Written separator elements (written-sep: ''-'' or ''.'') in a pstn-mbox MUST be ignored by all conformant implementations. User Agents SHOULD remove written-sep elements before submitting messages to the MTA.'
section: "2.1"
rfc2119_level: MUST
