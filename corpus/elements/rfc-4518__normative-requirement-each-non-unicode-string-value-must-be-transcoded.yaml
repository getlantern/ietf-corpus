document: rfc-4518
kind: normative-requirement
summary: Each non-Unicode string value must be transcoded to Unicode as the first step. PrintableString transcodes directly; UniversalString, UTF8String, and bmpString need not be transcoded; TeletexString transcoding is left a local matter.
section: "2.1"
rfc2119_level: REQUIRED
