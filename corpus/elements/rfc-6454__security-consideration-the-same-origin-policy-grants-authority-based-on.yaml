document: rfc-6454
kind: security-consideration
summary: 'The same-origin policy grants authority based on URI rather than on which objects the content can designate, an example of ambient authority. This enables cross-site scripting: injected scripts run with the document origin''s authority, potentially accessing sensitive resources.'
section: "8.3"
topics:
    - security
