document: rfc-9336
kind: design-rationale
summary: Vendor-defined KeyPurposeIds used outside their originally intended vendor-controlled environment can introduce problems of difficult-to-determine impact. A public, general-purpose Document-Signing KeyPurposeId is therefore preferable for non-vendor-governed document signing.
section: "1"
topics:
    - pkix
    - security
