document: rfc-7171
kind: normative-requirement
summary: PT-EAP implementers SHOULD support tls-unique channel binding countermeasures against NEA Asokan attacks by providing the tls-unique value to higher layers (Posture Broker Clients, Posture Broker Servers, Posture Collectors, and Posture Validators). If implemented, tls-unique must be verified before any other attestations.
section: 4.2.5
rfc2119_level: SHOULD
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
