document: rfc-4055
kind: protocol-element
summary: MGF1 is the sole supported mask generation function, identified by id-mgf1 (pkcs-1 8). Its AlgorithmIdentifier parameters field MUST contain a HashAlgorithm identifying the hash function used with MGF1; implementations MUST support sha1Identifier as the default and MAY support sha224, sha256, sha384, or sha512.
section: "2.2"
topics:
