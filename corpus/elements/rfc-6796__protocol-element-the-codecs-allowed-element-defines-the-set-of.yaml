document: rfc-6796
kind: protocol-element
summary: The <codecs-allowed> element defines the set of permitted codecs; all codecs not listed MUST NOT be used. A policy MUST allow at least one codec per media type. It MUST NOT coexist with <codecs-excluded> in the same container.
section: "5.5"
topics:
    - sip
    - realtime
