document: rfc-2001
kind: interoperability-note
summary: Fast retransmit first appeared in the 4.3BSD Tahoe release (followed by slow start), while fast recovery was introduced in the 4.3BSD Reno release. Implementations without fast recovery will fall back to slow start after a fast retransmit.
