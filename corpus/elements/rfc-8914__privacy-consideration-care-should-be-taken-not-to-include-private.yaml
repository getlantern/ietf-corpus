document: rfc-8914
kind: privacy-consideration
summary: Care should be taken not to include private information in the EXTRA-TEXT field that an observer would not otherwise have access to, such as account numbers. The EXTRA-TEXT field is intended for human consumption and may be visible in transit.
section: "2"
