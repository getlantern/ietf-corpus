document: rfc-4293
kind: protocol-element
summary: ipAddressTable lists all IPv4 and IPv6 addresses in use by this entity, including information about how and when each address was formed. It is required for all IP entities and replaces both ipAddrTable (IPv4) and ipv6AddrTable (IPv6).
