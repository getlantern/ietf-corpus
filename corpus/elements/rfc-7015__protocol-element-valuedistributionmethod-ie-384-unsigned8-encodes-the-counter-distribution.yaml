document: rfc-7015
kind: protocol-element
summary: 'valueDistributionMethod (IE 384, unsigned8) encodes the counter distribution method applied to non-key fields in associated Aggregated Flows: 0=Unspecified, 1=Start Interval (assumed default if absent), 2=End Interval, 3=Mid Interval, 4=Simple Uniform Distribution, 5=Proportional Uniform Distribution, 6=Simulated Process, 7=Direct. The originalFlowsInitiated and originalFlowsCompleted IEs are exempt from this method as they imply their own distribution.'
section: 7.4.2
topics:
    - measurement
    - registry
