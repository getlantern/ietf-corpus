document: rfc-6098
kind: registry
summary: 'A new GNAM Code number space is defined: 0 = notification accepted; 64–69 = error codes from the FA; 128–133 = error codes from the HA; 192–197 = error codes from the MN. Specific codes include authentication failure (67/131/195), ID mismatch (69/133/197), and administrative prohibition (65/129/193). New Code values require expert review.'
