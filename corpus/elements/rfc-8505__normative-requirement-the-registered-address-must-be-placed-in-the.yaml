document: rfc-8505
kind: normative-requirement
summary: The Registered Address MUST be placed in the Target Address field of NS/NA messages, not the Source Address field as specified in RFC 6775. This enables proxy registrations and avoids using an address as Source Address before it is registered.
section: "5.5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
