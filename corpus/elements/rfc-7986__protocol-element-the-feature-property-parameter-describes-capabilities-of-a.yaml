document: rfc-7986
kind: protocol-element
summary: The FEATURE property parameter describes capabilities of a conference system on a CONFERENCE property. Values include AUDIO, CHAT, FEED, MODERATOR, PHONE, SCREEN, VIDEO, plus extensible x-name and iana-token values. Multiple values may be specified.
section: "6.3"
