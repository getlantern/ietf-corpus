document: rfc-7578
kind: protocol-element
summary: A form field with entry name '_charset_' and type 'hidden' may carry the default charset for all 'text/plain' parts that lack an explicit charset parameter. HTML 5 recognizes this convention as the primary source for the form-charset.
section: "4.6"
