document: rfc-4349
kind: design-rationale
summary: The HDLCPW operates in an 'interface to interface' or 'port to port' fashion, passing all HDLC data and control PDUs transparently. This allows any protocol with HDLC-like framing (PPP, Frame-Relay, X.25/LAPB) to be transported without LCCE participation in higher-layer negotiations.
section: "4.1"
topics:
    - vpn
