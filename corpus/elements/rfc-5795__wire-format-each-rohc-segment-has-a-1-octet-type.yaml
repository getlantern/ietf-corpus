document: rfc-5795
kind: wire-format
summary: Each ROHC segment has a 1-octet type field (1111111F) where F is the Final bit; a 4-octet 32-bit CRC is appended at the end of the last segment's reconstructed unit. Segments carry no per-segment CID.
