document: rfc-5990
kind: protocol-element
summary: The RSAPublicKey type used for encoding the RSA public key is a SEQUENCE of modulus (INTEGER n) and publicExponent (INTEGER e), DER-encoded and carried in the subjectPublicKey BIT STRING within SubjectPublicKeyInfo. This encoding is used regardless of which AlgorithmIdentifier (rsaEncryption or id-rsa-kem) identifies the key.
section: "2.3"
topics:
