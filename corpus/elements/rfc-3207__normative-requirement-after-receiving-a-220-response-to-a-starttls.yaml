document: rfc-3207
kind: normative-requirement
summary: After receiving a 220 response to a STARTTLS command, the client MUST start the TLS negotiation before giving any other SMTP commands. If the client cannot actually start the TLS handshake, it SHOULD abort the connection.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - tls
