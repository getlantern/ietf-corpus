document: rfc-2602
kind: design-rationale
summary: ILMI-based server discovery was introduced because static configuration of MARS server ATM addresses on each host/router is cumbersome, error-prone, and prevents diskless hosts from using MARS. Dynamic discovery via ILMI eliminates the need for local configuration.
