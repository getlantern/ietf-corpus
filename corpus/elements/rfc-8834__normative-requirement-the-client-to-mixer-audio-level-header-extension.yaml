document: rfc-8834
kind: normative-requirement
summary: The client-to-mixer audio level header extension (RFC 6464) MUST be implemented. Implementations are REQUIRED to be capable of encrypting this header extension per RFC 6904 because the audio level data is considered sensitive; use of encryption is RECOMMENDED.
section: 5.2.2
rfc2119_level: MUST
topics:
