document: rfc-8824
kind: interoperability-note
summary: SCHC compression for CoAP MAY be performed independently of lower-layer (IPv6/UDP) SCHC compression, or in conjunction with it. The two compression techniques are independent and follow the same SCHC principles defined in RFC 8724.
section: "2"
