document: rfc-9535
kind: protocol-element
summary: A Normalized Path is a unique JSONPath expression that identifies exactly one node in a query argument, using only single-quoted name selectors and non-negative index selectors within child segments ($['name'][0]...). Every node in a JSON value has exactly one Normalized Path.
section: "2.7"
