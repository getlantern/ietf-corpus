document: rfc-1981
kind: protocol-element
summary: PMTU information may be stored per destination address (integrating with the Neighbor Discovery destination cache), per flow id for finer granularity when flows are in use, or per source route for source-routed packets. The initial PMTU value is assumed to be the MTU of the first-hop link.
section: "5.2"
topics:
