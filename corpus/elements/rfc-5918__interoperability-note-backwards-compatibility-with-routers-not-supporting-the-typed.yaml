document: rfc-5918
kind: interoperability-note
summary: 'Backwards compatibility with routers not supporting the Typed Wildcard FEC Element is ensured by RFC 5036 FEC procedures: an LSR that encounters an unknown FEC Element type SHOULD stop decoding the FEC TLV, abort processing, and send an ''Unknown FEC'' Notification message to its peer.'
