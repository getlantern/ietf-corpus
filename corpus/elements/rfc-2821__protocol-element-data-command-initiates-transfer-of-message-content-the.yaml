document: rfc-2821
kind: protocol-element
summary: DATA command initiates transfer of message content. The server responds with 354, then accepts lines until the end-of-data indicator '<CRLF>.<CRLF>'. On successful receipt the server must return 250 OK, taking full responsibility for delivery; partial delivery failures are not allowed at this point.
section: 4.1.1.4
topics:
    - email
