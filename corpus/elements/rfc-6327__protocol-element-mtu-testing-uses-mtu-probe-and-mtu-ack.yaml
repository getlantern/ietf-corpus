document: rfc-6327
kind: protocol-element
summary: MTU testing uses MTU-probe and MTU-ack PDUs. RB1 determines desired campus link MTU as the minimum of all RBridges' originatingL1LSPBufferSize (range 1,470–65,535 bytes in TRILL, not less than 1,470), and reports the largest size passing the MTU test in its TRILL Neighbor TLV.
