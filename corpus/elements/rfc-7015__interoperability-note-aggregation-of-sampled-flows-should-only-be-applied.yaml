document: rfc-7015
kind: interoperability-note
summary: Aggregation of sampled Flows should only be applied to Original Flows sampled using the same sampling rate and algorithm, or Flows that have been normalized to an equivalent sampling rate before aggregation, to maximize comparability of the resulting Aggregated Flows.
section: "6.3"
