document: rfc-9347
kind: protocol-element
summary: AGGFRAG mode introduces a new ESP Next Header value AGGFRAG_PAYLOAD (144) that aggregates and fragments inner IP packets into fixed-size IPsec tunnel packets, enabling Traffic Flow Confidentiality by obscuring the size and frequency of IP traffic.
section: "2.1"
topics:
    - ipsec
    - vpn
    - privacy
    - security
