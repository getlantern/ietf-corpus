document: rfc-5752
kind: wire-format
summary: SignAttrsHash is an ASN.1 SEQUENCE containing algID (DigestAlgorithmIdentifier) and hash (OCTET STRING). The algID must match the digest algorithm of the SignerInfo that contains this attribute value, and hash holds the hash of the referenced SignerInfo's signedAttrs.
