document: rfc-7350
kind: normative-requirement
summary: Perfect Forward Secrecy (PFS) cipher suites MUST be preferred over non-PFS cipher suites. Cipher suites with known weaknesses such as those based on (single) DES and RC4 MUST NOT be used. Implementations MUST disable TLS-level compression.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - security
