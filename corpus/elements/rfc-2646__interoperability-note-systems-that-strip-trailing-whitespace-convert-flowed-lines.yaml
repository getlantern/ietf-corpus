document: rfc-2646
kind: interoperability-note
summary: Systems that strip trailing whitespace convert flowed lines to fixed lines, resulting in a message no worse than if Format=Flowed had not been used. Systems that add trailing whitespace may cause malformed display or replies.
section: "6.1"
