document: rfc-3280
kind: protocol-element
summary: 'The Key Usage extension is a BIT STRING with nine named bits: digitalSignature(0), nonRepudiation(1), keyEncipherment(2), dataEncipherment(3), keyAgreement(4), keyCertSign(5), cRLSign(6), encipherOnly(7), decipherOnly(8). The encipherOnly and decipherOnly bits have undefined meaning in the absence of the keyAgreement bit.'
