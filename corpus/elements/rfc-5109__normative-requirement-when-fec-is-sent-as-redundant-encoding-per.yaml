document: rfc-5109
kind: normative-requirement
summary: When FEC is sent as redundant encoding per RFC 2198, the FEC MUST protect only the main codec. The FEC payload MUST be generated from virtual RTP packets derived from the main codec data, not directly from the RED packets.
section: "14.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
