document: rfc-3782
kind: normative-requirement
summary: The TCP sender MAY use timestamp- or ACK-advancement-based heuristics to decide to invoke Fast Retransmit even when three duplicate ACKs do not cover more than 'recover', to distinguish dropped retransmissions from unnecessary retransmissions.
section: "6"
rfc2119_level: MAY
topics:
    - tcp
    - congestion
