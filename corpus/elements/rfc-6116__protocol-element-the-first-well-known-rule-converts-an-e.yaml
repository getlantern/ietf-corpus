document: rfc-6116
kind: protocol-element
summary: 'The First Well Known Rule converts an E.164 AUS into a DNS FQDN by: (1) removing all non-digit characters including ''+'', (2) reversing the digit order, (3) inserting dots between each digit, and (4) appending ''.e164.arpa.'' to produce the query domain name.'
section: "3.2"
topics:
    - dns
