document: rfc-5811
kind: normative-requirement
summary: The LP channel MUST use SCTP-PR (partial reliability) with lower timeout values than the MP channel. PL priorities 1-2 MUST be used; PacketRedirect (priority 2) and Heartbeat (priority 1) MUST use the LP channel.
section: 4.2.1.4
rfc2119_level: MUST
