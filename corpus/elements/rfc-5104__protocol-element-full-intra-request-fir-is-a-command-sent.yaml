document: rfc-5104
kind: protocol-element
summary: Full Intra Request (FIR) is a command sent to a media sender requiring delivery of a Decoder Refresh Point at the earliest opportunity. It is used by mixers when switching sources or adding new video sources, and must not be used for error recovery (PLI serves that purpose).
section: 3.5.1
topics:
    - rtp
    - realtime
