document: rfc-3977
kind: protocol-element
summary: 'The GROUP command selects a newsgroup and returns ''211 number low high group'': an estimated article count (MUST be at least the actual count and no more than high−low+1), the reported low water mark, and the high water mark. Selecting a valid non-empty group sets the current article number to the first article.'
section: 6.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
