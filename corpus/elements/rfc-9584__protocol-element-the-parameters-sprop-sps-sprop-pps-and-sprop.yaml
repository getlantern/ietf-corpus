document: rfc-9584
kind: protocol-element
summary: The parameters sprop-sps, sprop-pps, and sprop-sei allow out-of-band conveyance of SPS, PPS, and SEI NAL units as comma-separated base64-encoded values in SDP a=fmtp or via the RFC 5576 fmtp source attribute. SEI messages conveyed in sprop-sei apply for the entire session duration regardless of their in-bitstream persistence scope.
section: "7.2"
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
