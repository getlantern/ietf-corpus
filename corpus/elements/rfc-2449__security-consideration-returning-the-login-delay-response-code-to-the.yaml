document: rfc-2449
kind: security-consideration
summary: Returning the LOGIN-DELAY response code to the USER command reveals that the specified username exists. Servers are strongly recommended not to issue this response code to USER unless user names are not secret, server access is restricted, or the server can verify the connection is from the same user.
section: 8.1.1
topics:
    - email
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
