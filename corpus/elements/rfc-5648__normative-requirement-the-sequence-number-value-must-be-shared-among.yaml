document: rfc-5648
kind: normative-requirement
summary: The sequence number value MUST be shared among all Binding Update List entries related to Binding Updates sent to a particular home agent or correspondent node. Whenever a mobile node sends an individual or bulk Binding Update, the sequence number is incremented.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
