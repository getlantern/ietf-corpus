document: rfc-4610
kind: security-consideration
summary: An RP can be configured with a unique SA and SPI per Anycast-RP peer, but this creates a key management burden. For domains under single administrative control, it is preferable to use the same authentication algorithm parameters (including the key) for all registered packets domain-wide.
section: "6.2"
topics:
    - security
    - multicast
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
