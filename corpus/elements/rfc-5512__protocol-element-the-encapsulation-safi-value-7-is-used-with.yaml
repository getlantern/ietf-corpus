document: rfc-5512
kind: protocol-element
summary: The Encapsulation SAFI (value 7) is used with AFI 1 (IPv4) or AFI 2 (IPv6) to carry tunnel encapsulation information. The NLRI consists solely of the endpoint address (4 octets for IPv4, 16 octets for IPv6) identifying the BGP speaker originating the update.
