document: rfc-7369
kind: protocol-element
summary: A Maintenance Association Identifier (MAID) consists of an optional MD Name and a mandatory Short MA Name; both MEPs at each end of a bidirectional connection must be configured with identical MAID values. The combined MD Name + Short MA Name length is limited to 44 bytes.
section: "3.1"
topics:
    - mpls
    - routing
