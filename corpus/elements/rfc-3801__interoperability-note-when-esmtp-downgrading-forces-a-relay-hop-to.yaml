document: rfc-3801
kind: interoperability-note
summary: When ESMTP downgrading forces a relay hop to forward a VPIM message without DSN support, the downgrading system SHOULD continue delivery but MUST send an appropriate DSN to the originator noting that the DSN chain may be broken beyond that hop.
section: "5.3"
topics:
    - email
