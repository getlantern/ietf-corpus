document: rfc-5991
kind: normative-requirement
summary: Teredo clients SHOULD completely skip the first phase of the qualification procedure and implement only the second phase using the Teredo link-local address with the cone bit set to zero, effectively deprecating cone NAT detection.
section: "3.2"
rfc2119_level: SHOULD
