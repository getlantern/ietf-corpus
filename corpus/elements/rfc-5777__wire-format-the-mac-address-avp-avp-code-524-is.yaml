document: rfc-5777
kind: wire-format
summary: The MAC-Address AVP (AVP Code 524) is of type OctetString encoded as a 6-octet MAC-48 address in the order it appears in the frame header. The MAC-Address-Mask-Pattern AVP (AVP Code 526) is also 6 octets specifying which bit positions are used for matching.
