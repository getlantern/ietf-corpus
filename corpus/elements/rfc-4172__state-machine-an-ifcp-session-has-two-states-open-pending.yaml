document: rfc-4172
kind: state-machine
summary: 'An iFCP session has two states: OPEN PENDING (CBIND issued, no response yet received — no FC frames may be sent) and OPEN (CBIND Success received — FC frames may be sent and received). A duplicate CBIND collision is resolved by comparing Source N_PORT Names; the greater name wins.'
section: 5.2.2.2
