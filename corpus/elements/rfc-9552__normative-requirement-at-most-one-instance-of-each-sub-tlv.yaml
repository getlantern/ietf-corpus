document: rfc-9552
kind: normative-requirement
summary: At most one instance of each sub-TLV type MUST be present in any Node Descriptor. Sub-TLVs within a Node Descriptor MUST be arranged in ascending order by sub-TLV type to enable binary NLRI comparison and incremental deployment of new key sub-TLVs.
section: 5.2.1.4
rfc2119_level: MUST
topics:
    - bgp
    - routing
