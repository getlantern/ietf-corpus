document: rfc-9815
kind: normative-requirement
summary: BGP-LS-SPF NLRI MUST be readvertised to all BGP-LS-SPF peers immediately upon receipt, prior to or independent of SPF computation. The BGP MinASOriginationIntervalTimer is not applicable; MinRouteAdvertisementIntervalTimer applies with a suggested default of 5 seconds.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
