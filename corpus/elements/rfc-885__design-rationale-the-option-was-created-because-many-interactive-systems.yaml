document: rfc-885
kind: design-rationale
summary: The option was created because many interactive systems use normal data characters (e.g., carriage-return, line-feed, escape) to mark end of record, while others use special keys. This option provides a standard, unambiguous mechanism for communicating data unit boundaries over Telnet.
section: "4"
topics:
