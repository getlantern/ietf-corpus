document: rfc-8075
kind: protocol-element
summary: If the HC Proxy receives a CoAP response with an unrecognized Content-Format, it SHALL return the payload with the generic 'application/coap-payload;cf=<N>' media type, where N is the numeric CoAP Content-Format value.
section: "6.2"
topics:
