document: rfc-4974
kind: normative-requirement
summary: When a single LINK_CAPABILITY object reports multiple links, each link MUST be identified by an identifier subobject (Type 1, 2, or 4), and capability subobjects (Types 64, 65) MUST be placed after the identifier subobject for the link or bundle to which they refer.
section: "5.3"
rfc2119_level: MUST
