document: rfc-5583
kind: normative-requirement
summary: The signaling mechanisms defined in this document MUST NOT be used to negotiate between using the AVP and SAVP RTP profiles. Both profiles MAY be used separately or jointly with the DDP signaling mechanism.
section: "6.3"
rfc2119_level: MUST NOT
topics:
