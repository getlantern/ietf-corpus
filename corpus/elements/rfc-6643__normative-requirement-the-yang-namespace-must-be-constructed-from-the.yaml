document: rfc-6643
kind: normative-requirement
summary: The YANG namespace MUST be constructed from the IANA-registered prefix 'urn:ietf:params:xml:ns:yang:smiv2:' followed by the SMIv2 module name; since SMIv2 module names are unique, this guarantees a unique YANG namespace.
section: "3"
rfc2119_level: MUST
topics:
