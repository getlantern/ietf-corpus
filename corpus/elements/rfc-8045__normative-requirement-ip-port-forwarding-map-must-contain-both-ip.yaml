summary: IP-Port-Forwarding-Map MUST contain both IP-Port-Int-Port and IP-Port-Ext-Port TLVs. If the internal realm uses IPv4, it MUST include IP-Port-Int-IPv4-Addr TLV; if IPv6, it MUST include IP-Port-Int-IPv6-Addr TLV.
