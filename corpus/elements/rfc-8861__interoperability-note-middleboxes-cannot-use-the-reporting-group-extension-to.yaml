document: rfc-8861
kind: interoperability-note
summary: Middleboxes cannot use the Reporting Group extension to group RTCP packets from SSRCs they are forwarding; the extension only applies to the middlebox's own SSRCs. Middleboxes MUST forward RGRP SDES items and RGRS packets from Reporting Group members they relay, or compatibility problems arise.
section: "3.5"
topics:
    - rtp
    - realtime
    - nat
