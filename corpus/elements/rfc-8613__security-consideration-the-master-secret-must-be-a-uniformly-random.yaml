document: rfc-8613
kind: security-consideration
summary: The Master Secret must be a uniformly random byte string. Compromise of the Master Secret allows an attacker to derive all session keys and decrypt all communications. The security context establishment mechanism is out of scope for OSCORE itself and must be handled by a separate key establishment protocol or out-of-band provisioning.
section: "12.3"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
