document: rfc-792
kind: normative-requirement
summary: A redirect message is not sent for datagrams with the IP source route option even if a better route exists; the gateway simply forwards using the next address in the source route.
section: Redirect Message
rfc2119_level: MUST NOT
topics:
    - ip
    - routing
