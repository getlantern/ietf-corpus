document: rfc-4509
kind: security-consideration
summary: SHA-256 is considered more resilient than SHA-1 and is the better choice for DS records; users of DNSSEC are encouraged to deploy SHA-256 as soon as software implementations allow, given eroding confidence in SHA-1 due to announced attacks.
section: "6.2"
topics:
    - dns
    - security
    - crypto
