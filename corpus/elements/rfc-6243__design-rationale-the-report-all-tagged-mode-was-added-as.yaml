document: rfc-6243
kind: design-rationale
summary: The 'report-all-tagged' mode was added as a special variant (not a basic mode) to allow a client to distinguish default from non-default data within a single retrieval operation, without requiring the server to adopt it as its fundamental default-handling strategy.
