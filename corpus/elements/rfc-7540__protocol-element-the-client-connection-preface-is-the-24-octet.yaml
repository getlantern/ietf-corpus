document: rfc-7540
kind: protocol-element
summary: 'The client connection preface is the 24-octet magic string ''PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n'' (hex: 0x505249202a20485454502f322e300d0a0d0a534d0d0a0d0a) followed immediately by a SETTINGS frame. The server connection preface is a (potentially empty) SETTINGS frame that MUST be the first frame the server sends. Both endpoints MUST send their preface upon connection establishment.'
section: "3.5"
topics:
    - http
