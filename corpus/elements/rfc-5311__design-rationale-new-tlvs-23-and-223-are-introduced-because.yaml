document: rfc-5311
kind: design-rationale
summary: New TLVs 23 and 223 are introduced because restrictions prevent TLV 22 and 222 from appearing in Extended LSPs (except for the Originating System neighbor). Without these new TLVs, TE sub-TLV information for the Originating System's neighbors could not be advertised in Extended LSPs.
section: "4.5"
topics:
    - routing
