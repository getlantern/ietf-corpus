document: rfc-6321
kind: protocol-element
summary: 'The IC:recur element maps the iCalendar RECUR value type using child elements for each rule part: IC:freq, IC:until or IC:count, IC:interval, IC:byday, IC:bymonth, IC:wkst, etc. Each rule part becomes its own typed XML element rather than a semicolon-delimited key=value string.'
section: 3.6.10
extracted_by: claude-sonnet-4-6
