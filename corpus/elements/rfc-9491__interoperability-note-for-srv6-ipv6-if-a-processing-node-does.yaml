document: rfc-9491
kind: interoperability-note
summary: For SRv6/IPv6, if a processing node does not recognize the NSH, it should follow the procedures in RFC 8200 Section 4 (IPv6 unknown next header handling). For SR-MPLS, unrecognized NSH should follow RFC 3031 Section 3.18 procedures.
