document: rfc-7545
kind: protocol-element
summary: INIT_REQ is the initialization request message; required fields are deviceDesc (DeviceDescriptor) and location (GeoLocation). The Database MUST return OUTSIDE_COVERAGE if the location falls outside all supported regulatory domains. If no ruleset IDs are included in deviceDesc, the database returns all rulesets it supports at that location.
section: 4.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
