document: rfc-866
kind: security-consideration
summary: RFC 866 contains no security considerations section. The service exposes a list of currently logged-in users to any host that connects or sends a UDP datagram, with no authentication or access control, which constitutes an information disclosure risk by modern standards.
topics:
    - security
    - measurement
