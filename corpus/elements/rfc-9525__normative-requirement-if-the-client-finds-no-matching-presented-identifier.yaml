document: rfc-9525
kind: normative-requirement
summary: If the client finds no matching presented identifier, an automated application SHOULD terminate the communication attempt with a bad certificate error. The application MAY provide a configuration setting to disable this, but MUST NOT disable this security control by default.
section: "6.6"
rfc2119_level: SHOULD
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
