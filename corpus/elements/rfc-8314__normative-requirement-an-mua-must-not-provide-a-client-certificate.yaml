document: rfc-8314
kind: normative-requirement
summary: An MUA MUST NOT provide a client certificate during the TLS handshake unless the server requests one and the MUA has been explicitly authorized to use that certificate with that account. Installing a certificate for one account MUST NOT automatically authorize its use with other accounts.
section: "5.5"
rfc2119_level: MUST NOT
topics:
    - tls
    - email
    - security
    - pkix
