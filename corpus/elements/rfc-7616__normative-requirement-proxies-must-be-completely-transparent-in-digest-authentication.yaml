document: rfc-7616
kind: normative-requirement
summary: 'Proxies MUST be completely transparent in Digest authentication: they MUST forward the WWW-Authenticate, Authentication-Info, and Authorization header fields untouched. Proxy authentication uses the separate Proxy-Authenticate and Proxy-Authorization header fields.'
section: "3.6"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
