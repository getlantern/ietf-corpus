document: rfc-5388
kind: protocol-element
summary: The root 'traceRoute' XML element contains an optional 'RequestMetadata' element and 0 to 2,147,483,647 'Measurement' elements. Each 'Measurement' holds an optional 'MeasurementMetadata' and 0 to 2,147,483,647 'MeasurementResult' elements, enabling a single file to store one or many traceroute measurements.
