document: rfc-6076
kind: design-rationale
summary: ISA response codes (408, 500, 503, 504) were chosen to indicate overloaded or failed proxy/UA conditions, analogous to Ineffective Machine Attempts (IMAs) from Telcordia GR-512-CORE. The 408 response may indicate overload but can have other causes, which operators should note.
section: "4.8"
