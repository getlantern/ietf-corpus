document: rfc-9763
kind: design-rationale
summary: The mechanism is designed specifically to support non-composite hybrid authentication, enabling an entity to use two separate certificates (e.g., one traditional, one post-quantum) that can be presented together or independently in protocols like TLS and IKEv2, without requiring a composite certificate format. This minimizes changes to the certificate format and existing PKI best practices.
