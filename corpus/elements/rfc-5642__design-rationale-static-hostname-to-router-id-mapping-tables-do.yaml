document: rfc-5642
kind: design-rationale
summary: Static hostname-to-Router-ID mapping tables do not scale because every router must maintain entries for all routers in the network, and manual updates are error-prone. DNS-based centralized mapping introduces a single point of failure and may be unreachable precisely when needed for problem resolution.
section: "2"
topics:
    - routing
