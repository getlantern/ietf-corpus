document: rfc-8839
kind: security-consideration
summary: The voice hammer attack is an amplification attack in which a malicious participant includes a victim's address as the media destination. ICE mitigates this by requiring connectivity checks to succeed before media is sent; a third-party target will fail the checks. RFC 7675 (STUN consent freshness) provides additional protection.
section: "9.3"
topics:
    - security
    - webrtc
    - realtime
