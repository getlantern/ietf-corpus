document: rfc-8601
kind: security-consideration
summary: Authentication-Results header fields inside message/rfc822 MIME attachments reflect historical authentication checks and MUST NOT be trusted. MUAs MUST ignore such encapsulated instances, and agents extracting messages to other media should strip these header fields.
section: "7.10"
topics:
    - email
    - security
