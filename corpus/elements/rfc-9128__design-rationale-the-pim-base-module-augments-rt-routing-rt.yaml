document: rfc-9128
kind: design-rationale
summary: The PIM base module augments /rt:routing/rt:control-plane-protocols (not /rt:routing/rt:control-plane-protocols/rt:control-plane-protocol) to prevent multiple PIM protocol instances, because PIM is designed to be enabled or disabled as a single protocol instance on a network instance.
