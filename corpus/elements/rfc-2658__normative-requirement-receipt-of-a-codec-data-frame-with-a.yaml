document: rfc-2658
kind: normative-requirement
summary: Receipt of a CODEC data frame with a reserved value in octet 0 MUST be considered invalid data. The erasure rate octet value (14) SHOULD NOT be transmitted by senders, and reserved rate value 5 SHOULD be treated as reserved by receivers.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
