document: rfc-2085
kind: normative-requirement
summary: If an out-of-order window is supported, the implementation shall ensure that any and all packets accepted out of order are guaranteed not to have arrived before — each packet is accepted at most once.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
