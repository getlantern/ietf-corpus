document: rfc-5996
kind: normative-requirement
summary: The REKEY_SA notification MUST be included in a CREATE_CHILD_SA exchange that replaces an existing ESP or AH SA; it identifies the SA being rekeyed by the initiator's inbound SPI. When rekeying a Child SA, the new SA SHOULD NOT have different Traffic Selectors or algorithms than the old one.
section: 1.3.3
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
