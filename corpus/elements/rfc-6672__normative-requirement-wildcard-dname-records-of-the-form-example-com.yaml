document: rfc-6672
kind: normative-requirement
summary: Wildcard DNAME records of the form '*.example.com DNAME example.net' SHOULD NOT be used because the interaction between wildcard expansion and DNAME redirection is non-deterministic, preventing DNSSEC validation.
section: "3.3"
rfc2119_level: SHOULD NOT
topics:
    - dns
    - security
