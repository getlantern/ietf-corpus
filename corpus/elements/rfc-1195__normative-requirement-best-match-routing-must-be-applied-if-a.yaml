document: rfc-1195
kind: normative-requirement
summary: 'Best-match routing MUST be applied: if a destination IP address matches more than one [IP address, subnet mask] entry, the entry with the most ''1'' bits in the subnet mask (the most specific match) is preferred.'
section: "3.10"
rfc2119_level: MUST
topics:
