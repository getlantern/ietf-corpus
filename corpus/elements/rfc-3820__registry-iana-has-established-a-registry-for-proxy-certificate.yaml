document: rfc-3820
kind: registry
summary: 'IANA has established a registry for Proxy Certificate policy languages. Registration of policy languages in IETF OID space requires an IETF standards action; private policy languages should use organizational OIDs but authors are encouraged to list them in the IANA registry with a pointer to a specification. Pre-registered entries: id-ppl-inheritAll (1.3.6.1.5.5.7.21.1) and id-ppl-independent (1.3.6.1.5.5.7.21.2).'
section: "7"
