document: rfc-9899
kind: design-rationale
summary: RFC 8519 does not support payload-based filtering or filtering of encapsulated traffic (e.g., QUIC over UDP). A new 'match-on-payload' feature was introduced using offset type, length, operator, and binary pattern to inspect packet payloads at L2/L3/L4/payload offsets.
section: A.7
topics:
