document: rfc-4601
kind: protocol-element
summary: The Rendezvous Point (RP) is the root of the shared (*,G) distribution tree. Receivers send Joins toward the RP, and sources' DRs encapsulate traffic to the RP in PIM Register messages until native forwarding is established. The RP address is discovered via Bootstrap Router (BSR) mechanism, embedded-RP, or static configuration.
section: "2.1"
topics:
    - multicast
    - routing
