document: rfc-6422
kind: normative-requirement
summary: If the server receives an RSOO, it SHOULD add options from the RSOO for which it has no internal candidate to the list of options to send to the client, and SHOULD discard any RSOO options for which it already has one or more candidates.
section: "6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
