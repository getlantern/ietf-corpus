document: rfc-5451
kind: protocol-element
summary: 'The ''iprev'' method verifies that a connecting client''s IP address has consistent forward and reverse DNS mappings. Result values are: pass (reverse and forward DNS agree), fail (results disagree or forward lookup returned no result), temperror (transient DNS error), permerror (no PTR data published). There is no ''none'' result since any TCP connection has an IP address.'
section: 2.4.3
topics:
    - email
    - dns
    - security
