document: rfc-3032
kind: protocol-element
summary: Label value 1 is the Router Alert Label, legal anywhere in the stack except the bottom. A packet with this label at the top is delivered to local software for processing; if forwarded, the Router Alert Label must be pushed back before forwarding. It is analogous to the IP Router Alert Option.
section: "2.1"
topics:
    - mpls
