document: rfc-8030
kind: normative-requirement
summary: 'To acknowledge receipt of a push message, the user agent MUST perform an HTTP DELETE on the push message resource. The push service MUST support delivery confirmations when the application server requests them via the Prefer: respond-async header.'
section: "6.2"
rfc2119_level: MUST
topics:
    - http
