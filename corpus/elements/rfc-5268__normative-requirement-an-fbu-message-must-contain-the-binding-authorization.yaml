document: rfc-5268
kind: normative-requirement
summary: An FBU message MUST contain the Binding Authorization Data for FMIPv6 (BADF) option to ensure that only a legitimate MN owning the PCoA can establish a binding. This applies whether the FBU is sent from the PAR's link or the NAR's link.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
