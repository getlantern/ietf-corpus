document: rfc-2272
kind: normative-requirement
summary: A unique msgID MUST be generated for each outgoing request; the value must not have been used recently and must not duplicate any outstanding request's msgID. This provides replay-attack protection.
section: "7.1"
rfc2119_level: MUST
topics:
    - snmp
    - security
