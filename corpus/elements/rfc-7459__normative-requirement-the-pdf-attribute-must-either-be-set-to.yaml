document: rfc-7459
kind: normative-requirement
summary: The PDF attribute MUST either be set to 'unknown' or omitted if the distribution does not approximately fit normal or rectangular shapes. Indicating a particular PDF only signifies an approximate fit based on the generation method.
section: "4.1"
rfc2119_level: MUST
