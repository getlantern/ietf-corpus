document: rfc-8341
kind: protocol-element
summary: The recovery session is a special administrative session that bypasses all NACM access control enforcement, intended for initializing or repairing the NACM configuration. The mechanism for identifying recovery sessions is implementation-specific and outside the scope of this document.
