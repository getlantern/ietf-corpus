document: rfc-4901
kind: wire-format
summary: 'The Configuration Option Format (RFC 3241) for ROHC contains: Type (1 octet, value 2), Length (>=10), IP-Compression-Protocol (0x0003), MAX_CID (2 octets, suggested 15, max 16383), MRRU (2 octets, suggested 0), MAX_HEADER (2 octets, suggested 168 octets), followed by suboptions. The PROFILES suboption (Type 1) carries n octet-pairs in ascending order specifying supported ROHC profiles.'
section: 4.2.5
