document: rfc-3865
kind: protocol-element
summary: Solicitation class keywords begin with a reversed domain name followed by a colon (e.g., 'com.example:'), then an arbitrary suffix of allowed characters. Any domain name registrant may define their own solicitation class keywords; discovery is out of scope.
section: "2.2"
topics:
