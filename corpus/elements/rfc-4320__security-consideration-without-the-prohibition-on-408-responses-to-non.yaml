document: rfc-4320
kind: security-consideration
summary: Without the prohibition on 408 responses to non-INVITE transactions, an attacker could entice user agents to send non-INVITE requests to a black hole (via social engineering or DNS poisoning) or selectively drop responses, exploiting the automatic 408 storm to flood the network.
