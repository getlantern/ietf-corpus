document: rfc-3010
kind: wire-format
summary: nfstime4 encodes time as a struct with int64 seconds (since January 1, 1970 UTC) and uint32 nseconds; nseconds values greater than 999,999,999 are invalid. Negative seconds represent dates before the epoch.
