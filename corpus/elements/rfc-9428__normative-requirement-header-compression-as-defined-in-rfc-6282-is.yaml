document: rfc-9428
kind: normative-requirement
summary: Header compression as defined in RFC 6282 is REQUIRED for IPv6 over NFC. All headers MUST be compressed according to RFC 6282 encoding formats. Implementations MUST also support Generic Header Compression (GHC) as described in RFC 7400.
section: "4.6"
rfc2119_level: REQUIRED
topics:
    - ip
