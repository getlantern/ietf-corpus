document: rfc-8601
kind: protocol-element
summary: The 'iprev' method verifies that a connecting IP address maps via PTR to one or more names that in turn map back to that IP via A/AAAA queries. Result values are pass, fail, temperror, and permerror; there is no 'none' since every TCP connection has an IP address. Results use ptype 'policy' and property 'iprev'.
section: 2.7.3
topics:
    - email
    - dns
