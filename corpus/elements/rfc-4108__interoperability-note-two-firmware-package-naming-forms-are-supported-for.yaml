document: rfc-4108
kind: interoperability-note
summary: 'Two firmware package naming forms are supported for backward compatibility: a legacy octet-string form with no imposed structure (to accommodate existing configuration management systems) and a preferred OID-plus-integer form with richer rollback semantics. Bootstrap loaders must support both.'
