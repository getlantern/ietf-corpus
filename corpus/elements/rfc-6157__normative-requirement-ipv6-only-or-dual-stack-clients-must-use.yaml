document: rfc-6157
kind: normative-requirement
summary: IPv6-only or dual-stack clients MUST use getaddrinfo() (rather than the legacy gethostbyname()) to translate a target hostname to IP addresses, so that the RFC 3484 Source and Destination Address Selection algorithms are applied.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - v6ops
    - dns
