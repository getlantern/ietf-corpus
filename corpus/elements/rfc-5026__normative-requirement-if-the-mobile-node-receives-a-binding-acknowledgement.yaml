document: rfc-5026
kind: normative-requirement
summary: If the Mobile Node receives a Binding Acknowledgement with status 134 (DAD failed), it MUST stop using the current Home Address, configure a new HoA, and run an IKEv2 CREATE_CHILD_SA exchange for the new HoA before sending a new Binding Update.
section: 5.3.2
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
