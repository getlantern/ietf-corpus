document: rfc-6190
kind: normative-requirement
summary: If the OPTIONAL mst-mode media type parameter is not present, SST MUST be used; if mst-mode is present, MST MUST be used. The MST packetization mode in use MUST be signaled by the value of the mst-mode parameter.
section: "4.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
