document: rfc-7671
kind: normative-requirement
summary: Servers employing '2 1 0' (DANE-TA(2) SPKI(1) Full(0)) TLSA records MUST include the corresponding TA certificate in their certificate chain, because without the full certificate a client cannot verify the chain from only a public key.
section: 5.2.3
rfc2119_level: MUST
topics:
    - tls
    - dns
    - security
    - pkix
