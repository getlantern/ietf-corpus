document: rfc-3776
kind: normative-requirement
summary: When the mobile node returns home and de-registers, the IPsec security policy entries used for protecting tunneled traffic MUST be made inactive; manually-configured security associations MUST be retained for reuse when the node later moves away again.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
