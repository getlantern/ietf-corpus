document: rfc-7701
kind: normative-requirement
summary: Any new nickname requested MUST be prepared and compared with nicknames already in use following the rules defined in RFC 7700 (Nicknames profile of PRECIS). The switch MUST respond 424 for malformed nicknames and 425 for reserved or already-in-use nicknames.
section: "7.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
