document: rfc-8311
kind: design-rationale
summary: ECT(1) was reserved for the ECN nonce (RFC 3540) to deter receivers from exploiting ECN to improve throughput unfairly, but the nonce saw no widespread Internet deployment. New approaches to discouraging receiver exploitation have emerged, and new experiments need ECT(1), so the nonce experiment is declared concluded and ECT(1) is freed.
section: "3"
topics:
