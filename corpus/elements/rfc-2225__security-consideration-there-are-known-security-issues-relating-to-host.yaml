document: rfc-2225
kind: security-consideration
summary: There are known security issues relating to host impersonation via address resolution protocols used in the Internet. No special security mechanisms have been added to the ATMARP mechanism defined here; ATMARP packets are not authenticated, which is a potentially serious flaw allowing corrupt information to be introduced into the server.
section: "11"
topics:
    - security
    - ip
