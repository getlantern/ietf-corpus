document: rfc-6265
kind: normative-requirement
summary: User agents MUST reject cookies whose domain-attribute, if non-empty, does not domain-match the canonicalized request-host. If configured to reject public suffixes, the user agent MUST ignore cookies with a public-suffix domain-attribute unless it equals the exact request-host.
section: "5.3"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
