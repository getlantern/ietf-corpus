document: rfc-9514
kind: security-consideration
summary: BGP-LS SRv6 extensions advertise SRv6 topology information intended only for consumers within the trusted SR domain. The isolation of BGP-LS peering sessions is RECOMMENDED to ensure that SR topology information is not leaked to external BGP peering sessions outside the SR domain.
section: "11"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
