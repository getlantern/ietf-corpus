kind: protocol-element
summary: DODIIS DET screen defaults are 80 characters wide and 24 lines tall. Terminal implementations must support page sizes of 24 to 48 lines. Screen dimensions may be changed via the Output Line Width and Output Page Size TELNET options; defaults apply when negotiation fails.
