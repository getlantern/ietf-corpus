document: rfc-2737
kind: protocol-element
summary: The entAliasMappingTable maps physical port entries (entPhysicalClass = port) and logical entities to external MIB row pointers (e.g., ifIndex, rptrPortGroupIndex). An entAliasLogicalIndexOrZero value of zero acts as a wildcard covering all logical entities not otherwise explicitly mapped.
