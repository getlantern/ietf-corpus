document: rfc-6845
kind: protocol-element
summary: A new 'Neighbor Output Cost' field is added to the neighbor data structure, representing the cost of sending a data packet to a specific neighbor in the link state metric. Its default value is the Interface output cost, and it may be overridden by static per-neighbor configuration or dynamic discovery mechanisms.
section: "4.2"
topics:
    - routing
