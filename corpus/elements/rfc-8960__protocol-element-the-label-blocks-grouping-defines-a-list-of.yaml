document: rfc-8960
kind: protocol-element
summary: The 'label-blocks' grouping defines a list of MPLS label blocks, each with 'index' (string key), 'start-label', 'end-label' (both rt-types:mpls-label with must constraints enforcing start <= end), 'block-allocation-mode' (identityref), and read-only 'inuse-labels-count' (gauge32, only present when allocation mode is manager-controlled).
