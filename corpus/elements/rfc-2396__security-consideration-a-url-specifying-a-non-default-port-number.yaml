document: rfc-2396
kind: security-consideration
summary: A URL specifying a non-default port number may cause a client to contact a server running a different protocol, and URL content interpreted by that protocol may trigger unexpected or damaging remote operations. Caution is advised especially for port numbers within the reserved space.
section: "7"
topics:
