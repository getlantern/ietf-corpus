document: rfc-8323
kind: normative-requirement
summary: Upon receipt of a Ping message (code 7.02), the receiver MUST return a Pong message (code 7.03) with an identical Token in response, and SHOULD respond as soon as practical unless the Ping carries the Custody Option.
section: "5.4"
rfc2119_level: MUST
topics:
