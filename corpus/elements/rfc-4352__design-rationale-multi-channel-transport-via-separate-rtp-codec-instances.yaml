document: rfc-4352
kind: design-rationale
summary: Multi-channel transport via separate RTP codec instances (as in RFC 3267 for AMR-WB) is omitted because AMR-WB+ natively encodes stereo within a single codec instance, including built-in stereo-to-mono downmixing in the decoder.
