document: rfc-8518
kind: interoperability-note
summary: In multi-topology IGP deployments, LFA computation per RFC 5286 is applicable for each MT-ID independently, using topology-specific adjacencies; the eligible neighbor set for each LFA computation is determined by the presence of IGP adjacency on that MT-ID.
section: "5.2"
