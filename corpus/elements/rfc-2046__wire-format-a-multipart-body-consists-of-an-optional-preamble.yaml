document: rfc-2046
kind: wire-format
summary: A multipart body consists of an optional preamble, followed by one or more dash-boundary/body-part sequences, and a close-delimiter. The boundary delimiter MUST occur at the beginning of a line (following a CRLF); the preceding CRLF is considered attached to the boundary, not the prior part.
section: 5.1.1
