document: rfc-9437
kind: normative-requirement
summary: For PubSub operation, an xTR MUST be configured with an xTR-ID and Site-ID, MUST set the I-bit to 1, and MUST include its xTR-ID and Site-ID in every Map-Request it generates. If the I-bit is set but the Site-ID and/or xTR-ID are absent, the receiver MUST drop the malformed message.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
