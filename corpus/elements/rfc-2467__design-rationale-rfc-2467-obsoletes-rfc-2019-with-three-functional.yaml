document: rfc-2467
kind: design-rationale
summary: 'RFC 2467 obsoletes RFC 2019 with three functional changes: removal of ''FDDI adjacency detection'' (due to IEEE 802.1p work), replacement of the 48-bit Address Token with the 64-bit EUI-64-based Interface Identifier, and shortening of the autoconfiguration prefix from 80 to 64 bits.'
