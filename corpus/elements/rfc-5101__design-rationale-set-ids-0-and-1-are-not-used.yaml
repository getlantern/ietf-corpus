document: rfc-5101
kind: design-rationale
summary: Set IDs 0 and 1 are not used for historical reasons inherited from NetFlow v9 (RFC 3954). The IPFIX version number 0x000a (10) also directly increments the NetFlow v9 version number to signal backward incompatibility.
