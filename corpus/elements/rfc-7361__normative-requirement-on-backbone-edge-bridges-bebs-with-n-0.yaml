document: rfc-7361
kind: normative-requirement
summary: 'On Backbone Edge Bridges (BEBs) with N=0 (positive flush): all C-MACs in selected I-SID FIBs SHOULD be flushed except those associated with B-MACs listed in the B-MAC List Sub-TLV. With N=1 (negative flush): only C-MACs associated with B-MACs in the B-MAC List Sub-TLV SHOULD be flushed.'
section: 5.2.1
rfc2119_level: SHOULD
topics:
    - mpls
