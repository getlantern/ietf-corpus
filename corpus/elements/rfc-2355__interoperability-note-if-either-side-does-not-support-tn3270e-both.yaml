document: rfc-2355
kind: interoperability-note
summary: If either side does not support TN3270E, both sides fall back to traditional tn3270 (negotiating Terminal-Type, Binary Transmission, and EOR options separately). A TN3270E-capable implementation should attempt TN3270E first and only fall back if the peer refuses.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
