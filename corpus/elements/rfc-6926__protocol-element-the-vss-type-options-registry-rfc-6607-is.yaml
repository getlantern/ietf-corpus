document: rfc-6926
kind: protocol-element
summary: The VSS Type Options registry (RFC 6607) is extended with type 254 as an 'All VPNs (wildcard)' value, allowing a DHCPBULKLEASEQUERY to search all configured VPNs. Absent a VPN-ID option, only the default (global) VPN is queried.
section: 6.2.9
topics:
    - registry
