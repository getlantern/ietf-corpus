document: rfc-4304
kind: security-consideration
summary: The integrity algorithm used with ESP or AH should be secure relative to the number of packets being protected. The SA lifetime may be set to limit the volume of data protected with a single key prior to reaching the 2^64 packet limit imposed by the ESN.
section: "4"
topics:
    - ipsec
    - security
    - crypto
