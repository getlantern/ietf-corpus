document: rfc-2625
kind: normative-requirement
summary: The FC Network_Header SHALL be REQUIRED in all ARP packets and in the first frame of every logical FC Sequence carrying an IP payload; other optional FC headers (Association_Header, Device_Header) SHALL NOT be used.
