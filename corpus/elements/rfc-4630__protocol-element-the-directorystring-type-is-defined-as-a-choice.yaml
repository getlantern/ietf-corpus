summary: The DirectoryString type is defined as a CHOICE of PrintableString, TeletexString, BMPString, UTF8String, and UniversalString. UTF8String and PrintableString are the preferred encodings; TeletexString, BMPString, and UniversalString are retained for backward compatibility only.
