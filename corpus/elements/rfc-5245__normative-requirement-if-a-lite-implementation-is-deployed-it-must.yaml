document: rfc-5245
kind: normative-requirement
summary: If a lite implementation is deployed, it MUST include an 'a=ice-lite' session-level attribute in its SDP; full implementations MUST NOT include this attribute. Lite implementations only use host candidates and do not run state machines or generate connectivity checks.
section: "4.3"
rfc2119_level: MUST
