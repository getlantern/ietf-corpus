document: rfc-7866
kind: normative-requirement
summary: The SRS MUST include the '+sip.srs' feature tag in the Contact URI for all Recording Sessions. When an SRS sends a REGISTER request, it SHOULD include this tag to indicate it is an SRS.
section: "6.2"
rfc2119_level: MUST
