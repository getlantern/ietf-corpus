document: rfc-9991
kind: design-rationale
summary: Failure reports are generated and sent almost immediately after detecting a DMARC failure, unlike aggregate reports, to quickly notify Domain Owners of authentication failures and to provide richer per-message detail useful for diagnosing whether a failure involves authorized or abusive use of the domain.
section: "2"
