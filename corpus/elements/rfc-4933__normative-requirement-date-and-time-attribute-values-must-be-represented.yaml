document: rfc-4933
kind: normative-requirement
summary: Date and time attribute values MUST be represented in UTC using the Gregorian calendar. The extended form using upper case 'T' and 'Z' characters as defined in the W3C XML Schema specification MUST be used; time zone offset identifiers MUST NOT be used with EPP.
section: "2.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
