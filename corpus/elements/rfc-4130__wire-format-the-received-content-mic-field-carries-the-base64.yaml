document: rfc-4130
kind: wire-format
summary: 'The Received-content-MIC field carries the base64-encoded message digest: ''Received-content-MIC: <base64-digest>, <digest-alg-id>'' where digest-alg-id is ''sha1'' or ''md5''. This field is required for signed receipts and optional for unsigned receipts. The MIC algorithm MUST match that used on the signed message.'
section: 7.4.3
topics:
    - http
    - email
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
