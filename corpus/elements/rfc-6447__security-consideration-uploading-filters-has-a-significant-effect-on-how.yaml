document: rfc-6447
kind: security-consideration
summary: Uploading filters has a significant effect on how requests are handled at a server. It is especially important that messages containing this location filter extension be authenticated and authorized. RFC 4661 discusses this threat and proposes applicable authentication and authorization solutions.
