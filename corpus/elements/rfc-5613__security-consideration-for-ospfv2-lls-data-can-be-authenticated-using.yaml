document: rfc-5613
kind: security-consideration
summary: For OSPFv2, LLS data can be authenticated using the same cryptographic authentication mechanism as the base OSPFv2 protocol via the CA-TLV, providing the same level of security as the base protocol. The Sequence Number in the CA-TLV prevents simple replay attacks.
