document: rfc-2573
kind: protocol-element
summary: SnmpTagValue and SnmpTagList are textual conventions (OCTET STRING, SIZE 0..255, UTF-8 encoded per ISO/IEC IS 10646-1) for grouping management target entries. Delimiter characters (space 0x20, TAB 0x09, CR 0x0D, LF 0x0B) separate tag values in a list; no leading/trailing delimiters and no adjacent delimiters are allowed; individual tag values must have non-zero length.
section: 4.1.1
topics:
