document: rfc-1738
kind: protocol-element
summary: The telnet URL scheme (`telnet://<user>:<password>@<host>:<port>/`) designates an interactive Telnet service. Default port is 23. User and password are advisory only; clients merely suggest them to the user rather than transmitting them automatically.
section: "3.8"
extracted_by: claude-sonnet-4-6
