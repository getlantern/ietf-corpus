document: rfc-4021
kind: protocol-element
summary: The Message-ID header field contains a single unique message identifier referring to a particular version of a message. If the message is resent without changes, the original Message-ID is retained. Defined as standard by RFC 822; specified in RFC 2822 section 3.6.4.
section: 2.1.8
