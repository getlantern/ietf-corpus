document: rfc-5944
kind: protocol-element
summary: 'Two types of care-of address are defined: a ''foreign agent care-of address'' is an IP address of a foreign agent listed in its Agent Advertisement; a ''co-located care-of address'' is a local IP address acquired by the mobile node itself (e.g., via DHCP) and associated with one of its own interfaces. The foreign agent type is preferred as it allows many mobile nodes to share one address.'
section: "1.7"
topics:
    - mobility
    - ip
