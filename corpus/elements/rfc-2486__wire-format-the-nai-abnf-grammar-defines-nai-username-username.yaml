document: rfc-2486
kind: wire-format
summary: 'The NAI ABNF grammar defines: nai = username / (username "@" realm), where username is a dot-string derived from RFC 821, and realm is a dot-separated sequence of DNS labels (let-dig followed by optional ldh-str). Special characters and control characters are excluded from the username char production.'
