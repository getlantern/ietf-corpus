document: rfc-1139
kind: normative-requirement
summary: The source route option in ISO 8473 may cause packets to loop until lifetime expires. This memo recommends against use of the source route option in echo-request or echo-reply PDUs, and explicitly does not recommend automatically generating a source route on the echo-reply if a source route was used on the echo-request.
section: "5.6"
rfc2119_level: RECOMMENDED
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
