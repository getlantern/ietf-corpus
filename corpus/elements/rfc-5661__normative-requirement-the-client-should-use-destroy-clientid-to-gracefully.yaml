document: rfc-5661
kind: normative-requirement
summary: The client SHOULD use DESTROY_CLIENTID to gracefully release a client ID it no longer needs. The server MUST NOT release a client ID while there are sessions, opens, locks, delegations, layouts, or wants associated with it.
section: 2.4.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
