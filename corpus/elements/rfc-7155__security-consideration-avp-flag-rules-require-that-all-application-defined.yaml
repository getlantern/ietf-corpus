document: rfc-7155
kind: security-consideration
summary: AVP flag rules require that all application-defined AVPs have the M-bit set (Mandatory) and the V-bit (Vendor-Specific) cleared, ensuring consistent handling across Diameter nodes and preventing vendor-specific override of mandatory attributes.
