document: rfc-1342
kind: normative-requirement
summary: 'In a ''phrase'' context (e.g., display name before an address), the set of characters permitted in a ''Q''-encoded encoded-word is restricted to: upper/lower-case ASCII letters, decimal digits, ''!'', ''*'', ''+'', ''-'', ''/'', ''='', and ''_''.'
section: Use of encoded-words in message headers
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
