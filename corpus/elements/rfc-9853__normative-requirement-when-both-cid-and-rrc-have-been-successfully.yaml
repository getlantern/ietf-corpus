document: rfc-9853
kind: normative-requirement
summary: When both CID and RRC have been successfully negotiated, if a record with CID is received with a source address different from the currently associated one, the receiver SHOULD perform a return routability check, unless an application-specific address validation mechanism is triggered instead.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
