document: rfc-8839
kind: normative-requirement
summary: The 'ice-ufrag' attribute MUST NOT be longer than 32 characters when sending (for STUN username attribute compatibility), but an implementation MUST accept up to 256 characters when receiving. The 'ice-ufrag' and 'ice-pwd' MUST be chosen randomly at the start of a session.
section: "5.4"
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
