document: rfc-3539
kind: normative-requirement
summary: AAA protocols SHOULD use only a single persistent connection between a AAA client and a given AAA agent or server, and SHOULD provide for pipelining of requests. A connection MUST NOT be brought down before BRINGDOWN_INTERVAL (5 minutes) of inactivity.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - tcp
    - sctp
    - diameter
    - radius
