document: rfc-4761
kind: interoperability-note
summary: 'In multi-AS VPLS Method (b), ASBR label swap operations must be installed for each label in the label block: swap L2+n with L1+n and push tunnel label T, for n from 0 to N-1. ASBR2 may omit the tunnel label if directly connected to ASBR1.'
section: 3.4.2
topics:
