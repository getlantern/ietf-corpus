document: rfc-4314
kind: normative-requirement
summary: A FETCH request that implies setting the \Seen flag MUST NOT set it if the current user doesn't have the 's' right. STORE operations SHOULD NOT fail if the user has rights to modify at least one of the specified flags.
section: "4"
rfc2119_level: MUST NOT
