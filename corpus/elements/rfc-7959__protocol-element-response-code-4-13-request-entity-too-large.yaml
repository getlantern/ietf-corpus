document: rfc-7959
kind: protocol-element
summary: Response code 4.13 (Request Entity Too Large) may be returned at any time during a Block1 transfer when the server lacks resources for atomic assembly. A 4.13 response to a request without Block1 is a hint to try Block1; a 4.13 with a smaller SZX in its Block1 Option is a hint to try that smaller block size.
section: 2.9.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
