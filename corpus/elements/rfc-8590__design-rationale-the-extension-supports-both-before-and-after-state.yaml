document: rfc-8590
kind: design-rationale
summary: The extension supports both 'before' and 'after' state poll messages for a single operation, using separate poll messages for each state. This allows sponsoring clients to reconstruct exactly what changed on their objects without requiring direct participation in the operation.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
