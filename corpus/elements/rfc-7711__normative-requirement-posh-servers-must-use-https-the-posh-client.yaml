document: rfc-7711
kind: normative-requirement
summary: POSH servers MUST use HTTPS. The POSH client MUST verify the certificate of the HTTPS service at the source domain in order to securely bootstrap into the use of POSH; specifically, the rules of RFC 2818 apply to this bootstrapping step.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - http
    - security
