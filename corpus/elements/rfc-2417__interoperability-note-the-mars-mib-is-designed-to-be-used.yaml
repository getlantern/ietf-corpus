document: rfc-2417
kind: interoperability-note
summary: The MARS MIB is designed to be used in conjunction with the ATM-MIB (RFC 1695), MIB-II (RFC 1213), and optionally the IF-MIB (RFC 1573). The marsClientTable indexes into ipAddrTable via ipAdEntAddr, and MARS/MCS tables reference interface indices from IF-MIB.
