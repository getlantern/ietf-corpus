document: rfc-8286
kind: normative-requirement
summary: A single SDP 'm=' line MUST NOT be included in different SPLICE groups at the same time; substitutive RTP MUST be applied only to RTP packets whose 'm=' line is in the same SPLICE group and has the splicing 'extmap' attribute.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
