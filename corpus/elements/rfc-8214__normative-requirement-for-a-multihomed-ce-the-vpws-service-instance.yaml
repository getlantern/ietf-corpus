document: rfc-8214
kind: normative-requirement
summary: For a multihomed CE, the VPWS service instance identifier in the per-EVI Ethernet A-D route MUST have the same value on all PEs attached to that Ethernet Segment, enabling ingress PEs to perform flow-based load-balancing in All-Active scenarios.
section: "4"
rfc2119_level: MUST
topics:
