document: rfc-6767
kind: interoperability-note
summary: While EFM-CU-MIB uses ifMauMediaAvailable from MAU-MIB for bonded xDSL-specific operational states, GBOND-MIB provides these indications via gBondPortStatFltStatus complementing ifOperStatus. Implementations should be aware of this difference when transitioning between management frameworks.
section: "4.3"
topics:
    - snmp
