document: rfc-9399
kind: normative-requirement
summary: Compliant applications MUST NOT display more than one of the image objects and MUST NOT play more than one audio object for any logotype type at the same time. A client MAY simultaneously display logotypes of different types.
section: "3"
rfc2119_level: MUST NOT
