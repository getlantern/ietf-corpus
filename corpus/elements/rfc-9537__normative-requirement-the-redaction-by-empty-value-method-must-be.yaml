document: rfc-9537
kind: normative-requirement
summary: The Redaction by Empty Value Method MUST be used only when redacting JSON response fields that use position in an array to signal the redacted field (e.g., jCard arrays). Optional jCard properties MUST use the Redaction by Removal Method instead.
section: "3.2"
rfc2119_level: MUST
topics:
    - json
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
