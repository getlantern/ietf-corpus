document: rfc-6735
kind: design-rationale
summary: 'SIP-Resource-Priority and ALRP AVPs convey the same priority semantics but with differing syntax: SIP-Resource-Priority uses alpha-numeric encoding from RFC 4412 namespaces, while ALRP is constrained to numeric-only values as assigned by RFC 6401. Both AVP sets are provided to serve different protocol environments.'
section: "3.4"
