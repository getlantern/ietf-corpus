document: rfc-4366
kind: protocol-element
summary: 'Trusted CA Indication: clients MAY include a trusted_ca_keys extension containing a TrustedAuthorities list. Each TrustedAuthority entry identifies a CA root key via one of four IdentifierType values: pre_agreed(0), key_sha1_hash(1), x509_name(2), or cert_sha1_hash(3).'
