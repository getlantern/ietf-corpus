document: rfc-7731
kind: normative-requirement
summary: An MPL Forwarder MUST discard an MPL Data Message if its sequence number is less than MinSequence or if a message with the same sequence number already exists in the Buffered Message Set. If no Seed Set entry exists for the MPL Seed, the forwarder MUST create one before accepting the message.
section: "9.3"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
