document: rfc-2212
kind: normative-requirement
summary: Traffic MUST obey the rule that over all time periods the amount of data sent cannot exceed M+min[pT, rT+b-M]. Datagrams smaller than the minimum policed unit m MUST be counted as size m for conformance testing.
section: Policing
rfc2119_level: MUST
