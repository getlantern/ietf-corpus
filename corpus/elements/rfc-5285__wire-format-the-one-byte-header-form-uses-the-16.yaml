summary: 'The one-byte header form uses the 16-bit profile-defined field value 0xBEDE. Each extension element begins with a 1-byte header: 4-bit ID (range 1–14) and 4-bit length field encoding (actual_data_length − 1), allowing 1–16 bytes of data per element.'
