document: rfc-5890
kind: design-rationale
summary: A-labels should be produced only in lowercase. Because the valid characters for U-labels (the source of A-labels) make mixed-case Punycode annotation of the sort described in RFC 3492 Appendix A never useful, requiring lowercase output avoids ambiguity without any practical cost.
section: 2.3.1
topics:
    - dns
