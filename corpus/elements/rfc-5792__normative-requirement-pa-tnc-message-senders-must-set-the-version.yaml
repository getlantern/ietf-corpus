document: rfc-5792
kind: normative-requirement
summary: PA-TNC message senders MUST set the Version field to 0x01. Implementations responding to a supported version MUST use the same version number in their reply. Recipients MUST respond to an unsupported version with a Version Not Supported error as the sole attribute in a version-1 message.
section: "3.6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
