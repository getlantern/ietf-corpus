document: rfc-5043
kind: state-machine
summary: 'A DDP Stream Session follows defined legal sequences: (1) Active/Passive Accepted — Initiate, Accept, zero or more DDP Segments, at least one Terminate; (2) Active/Passive Rejected — Initiate, Reject; (3) Non-ULP Rejected — Initiate, Terminate (when ULP queue is full). Any chunk sequence not matching a legal pattern triggers session termination.'
section: "6.1"
topics:
