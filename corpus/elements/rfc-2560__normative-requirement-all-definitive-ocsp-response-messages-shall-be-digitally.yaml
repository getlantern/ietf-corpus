document: rfc-2560
kind: normative-requirement
summary: All definitive OCSP response messages SHALL be digitally signed. The signing key MUST belong to the CA that issued the certificate, a Trusted Responder whose public key is trusted by the requester, or a CA Designated Responder holding a specially marked certificate issued directly by the CA.
section: "2.2"
rfc2119_level: SHALL
topics:
    - pkix
    - security
    - crypto
