document: rfc-7695
kind: normative-requirement
summary: The chosen Advertised Prefix Priority for an overriding assignment SHOULD be greater than all priorities from the destroyed Assigned Prefixes; otherwise, Nodes MUST implement convergence-detection and MUST stop creating non-compliant overriding assignments when non-convergence is detected.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
