document: rfc-919
kind: protocol-element
summary: The IP broadcast host number is all-ones bits in the host-number field. The address 255.255.255.255 denotes a local hardware network broadcast. A directed broadcast to a specific network uses the network prefix with all-ones in the host-number field (e.g., 36.255.255.255 for net 36).
section: "7"
