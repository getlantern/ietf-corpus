document: rfc-3376
kind: protocol-element
summary: 'Three query variants: General Query (Group Address=0, N=0) to learn all multicast reception state; Group-Specific Query (Group Address set, N=0) for a single group; Group-and-Source-Specific Query (Group Address set, N>0) to learn if any receiver desires packets from specific sources sent to a group.'
section: 4.1.11
topics:
