document: rfc-4164
kind: protocol-element
summary: The Base Context Identifier (BCID) is the CID used to identify the base context from which information is extracted for replication. The BCID may differ from the CID of the new flow; if BCID equals CID, the base context is overwritten by the replication process.
section: "2"
