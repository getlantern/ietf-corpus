document: rfc-4577
kind: interoperability-note
summary: If two OSPF instances both have the NULL Domain Identifier, it is impossible to determine from the Domain Identifier alone whether they are in the same OSPF domain; routes from one may incorrectly appear as intra-network routes in the other. Operators should assign non-NULL identifiers to distinguish domains.
section: 4.2.4
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
