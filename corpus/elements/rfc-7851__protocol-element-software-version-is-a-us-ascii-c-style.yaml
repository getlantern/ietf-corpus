document: rfc-7851
kind: protocol-element
summary: SOFTWARE_VERSION is a US-ASCII C-style null-terminated string identifying the peer's manufacturer, model, OS, and software version. The string MUST be terminated by '\0', and '\0' MUST NOT appear within the string itself.
