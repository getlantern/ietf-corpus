document: rfc-8474
kind: normative-requirement
summary: The server MUST return the same MAILBOXID for a mailbox with the same name and UIDVALIDITY, MUST NOT report the same MAILBOXID for two mailboxes at the same time, and MUST NOT reuse the same MAILBOXID for a mailbox that does not obey all RFC 3501 invariants.
section: "4"
rfc2119_level: MUST
topics:
    - email
