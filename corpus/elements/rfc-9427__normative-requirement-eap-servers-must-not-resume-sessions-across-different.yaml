document: rfc-9427
kind: normative-requirement
summary: EAP servers MUST NOT resume sessions across different EAP Types, and EAP servers MUST reject resumptions where the EAP Type value differs from the original authentication. Cross-type resumption (e.g., authenticate with EAP-TLS then resume with EAP-TTLS) is forbidden.
section: "4"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
