document: rfc-1256
kind: protocol-element
summary: AdvertisementLifetime specifies the maximum seconds that advertised router addresses remain valid in the absence of further advertisements. It must be no less than MaxAdvertisementInterval and no greater than 9000 seconds; defaults to 3 * MaxAdvertisementInterval.
section: "4.1"
