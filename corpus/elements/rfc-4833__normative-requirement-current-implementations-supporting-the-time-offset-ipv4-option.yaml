document: rfc-4833
kind: normative-requirement
summary: Current implementations supporting the time offset IPv4 option (tag 2) SHOULD also implement the new timezone options. Other implementations SHOULD implement the new timezone options and SHOULD NOT implement the deprecated time offset IPv4 option.
section: "8"
rfc2119_level: SHOULD NOT
