document: rfc-9575
kind: protocol-element
summary: The DRIP Manifest creates a signed ledger of hashes of previously sent ASTM Messages, enabling retrospective authentication without retransmission. The three mandatory header hashes (Previous Manifest, Current Manifest, and DRIP Link BE:HDA,UA) establish chain-of-custody and tie the endorsed UA key to the Manifest chain.
section: "4.4"
