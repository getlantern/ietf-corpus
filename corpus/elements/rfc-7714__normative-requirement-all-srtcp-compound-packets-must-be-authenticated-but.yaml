document: rfc-7714
kind: normative-requirement
summary: All SRTCP compound packets MUST be authenticated, but unlike SRTP, SRTCP packet encryption is optional. A sender indicates the choice with a 1-bit Encryption flag located just before the 31-bit SRTCP index.
section: "9"
rfc2119_level: MUST
topics:
