summary: For mplsL3VpnVrfRouteMidThreshExceeded, a single notification MUST be generated when the mid-level route threshold is exceeded, and no further notifications of this type should be issued until mplsL3VpnVrfPerfCurrNumRoutes falls below mplsL3VpnVrfConfMidRteThresh.
