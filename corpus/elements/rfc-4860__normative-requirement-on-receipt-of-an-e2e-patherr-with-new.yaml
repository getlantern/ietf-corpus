document: rfc-4860
kind: normative-requirement
summary: On receipt of an E2E PathErr with NEW-AGGREGATE-NEEDED containing a SESSION-OF-INTEREST, the Aggregator MUST trigger establishment of a generic aggregate reservation and MUST start sending aggregate Path messages with the GENERIC-AGGREGATE SESSION from the SOI object.
