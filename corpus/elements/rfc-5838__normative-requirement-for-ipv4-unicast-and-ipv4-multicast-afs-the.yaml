document: rfc-5838
kind: normative-requirement
summary: For IPv4 unicast and IPv4 multicast AFs, the Forwarding Address in AS-external-LSAs and NSSA-LSAs MUST encode an IPv4 address placed in the first 32 bits of the 128-bit Forwarding Address field, with the remaining bits set to zero.
section: "2.6"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
