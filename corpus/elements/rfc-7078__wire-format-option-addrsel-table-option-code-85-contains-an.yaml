document: rfc-7078
kind: wire-format
summary: OPTION_ADDRSEL_TABLE (option-code 85) contains an 8-bit label, an 8-bit precedence, an 8-bit prefix-len (0–128), and a variable-length prefix field padded to the nearest octet boundary using (prefix-len + 7)/8 octets (0–16 bytes). Each instance corresponds to one row in the RFC 6724 policy table.
