document: rfc-8974
kind: design-rationale
summary: A server supporting this extension must handle large tokens far enough through its processing pipeline to return an error response (5.03 or 4.00) rather than a Reset. Returning a Reset would incorrectly signal that the server has no support at all for extended tokens.
section: 2.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
