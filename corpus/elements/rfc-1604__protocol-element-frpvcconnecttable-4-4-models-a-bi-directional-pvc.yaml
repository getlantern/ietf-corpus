document: rfc-1604
kind: protocol-element
summary: frPVCConnectTable (4.4) models a bi-directional PVC segment as a single row indexed by {frPVCConnectIndex, LowIfIndex, LowDLCIIndex, HighIfIndex, HighDLCIIndex}. 'Low' and 'high' denote the numerically lower vs. higher ifIndex endpoints. Separate operational status objects (frPVCConnectL2hOperStatus and frPVCConnectH2lOperStatus) track each direction independently.
