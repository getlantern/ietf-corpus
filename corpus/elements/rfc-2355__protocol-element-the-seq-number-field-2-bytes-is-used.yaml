document: rfc-2355
kind: protocol-element
summary: The SEQ-NUMBER field (2 bytes) is used only when the RESPONSES function is active. The sender maintains a per-session counter starting at 0, incrementing by 1 per 3270-DATA or SCS-DATA message, wrapping at 32767, independent of SNA sequence numbers and not reset on Bind/Unbind.
section: 8.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
