document: rfc-5778
kind: protocol-element
summary: The MIP-Authenticator AVP (AVP Code 488, OctetString) carries the Authenticator Data extracted from the MN-AAA Mobility Message Authentication Option in the received Binding Update. It MUST be present in the MIR when MIP6-Auth-Mode is MIP6_AUTH_MN_AAA.
section: "6.8"
topics:
