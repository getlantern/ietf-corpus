document: rfc-4439
kind: protocol-element
summary: t11FamIfRcfReject (TruthValue, default false, indexed per-interface per-Fabric) controls whether incoming ReConfigure Fabric (RCF) messages on a given interface are accepted or rejected. It does not apply to outgoing RCFs generated by that interface.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
