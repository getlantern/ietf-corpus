document: rfc-6994
kind: normative-requirement
summary: Options implementing the ExID mechanism SHOULD use 16-bit ExIDs, except where explicitly motivating the need for 32-bit ExIDs (e.g., to avoid false positives or maintain alignment with an expected future assigned codepoint).
