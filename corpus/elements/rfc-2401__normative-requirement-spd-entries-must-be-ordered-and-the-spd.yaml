document: rfc-2401
kind: normative-requirement
summary: SPD entries MUST be ordered and the SPD MUST always be searched in the same order so that the first matching entry is consistently selected; this ensures deterministic processing in the presence of wildcard selector overlap.
section: 4.4.1
rfc2119_level: MUST
topics:
