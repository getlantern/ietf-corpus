document: rfc-6187
kind: wire-format
summary: The x509v3-rsa2048-sha256 signature is encoded as a string 'rsa2048-sha256' followed by rsa_signature_blob. Uses RSASSA-PKCS1-v1_5 with SHA-256; RSA keys MUST have a modulus of at least 2048 bits.
section: "3.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
