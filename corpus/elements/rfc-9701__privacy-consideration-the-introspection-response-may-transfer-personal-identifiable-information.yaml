document: rfc-9701
kind: privacy-consideration
summary: The introspection response may transfer personal identifiable information (PII) from the AS to the RS. The AS MUST conform to legal and jurisdictional constraints before releasing data to a particular RS, typically established via explicit user consent, out-of-band contracts, or 1st-party service terms.
section: "9"
topics:
    - oauth
    - privacy
    - security
