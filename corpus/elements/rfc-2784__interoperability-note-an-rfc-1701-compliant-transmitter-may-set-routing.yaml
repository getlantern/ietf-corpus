document: rfc-2784
kind: interoperability-note
summary: An RFC 1701 compliant transmitter may set Routing Present, Key Present, Sequence Number Present, or Strict Source Route bits to one and include those fields. A receiver complying only to RFC 2784 MUST discard such packets (non-zero bits 1-5) unless it also implements RFC 1701.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - vpn
