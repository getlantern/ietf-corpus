document: rfc-5604
kind: state-machine
summary: Loss of Packet State (LOPS) is entered when pwTDMCfgConsecMissPktsOutSynch (default 10) consecutive packets are missing, and exited when pwTDMCfgConsecPktsInSynch (default 2) consecutive packets with sequential sequence numbers are received. A TDM Failure Count event begins at LOPS declaration and ends at LOPS clearance.
