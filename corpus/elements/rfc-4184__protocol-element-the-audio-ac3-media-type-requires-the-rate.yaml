document: rfc-4184
kind: protocol-element
summary: 'The audio/ac3 media type requires the ''rate'' parameter (RTP timestamp clock rate equal to sampling rate: 32000, 44100, or 48000 Hz) and accepts optional parameters ''channels'' (1–6), ''ptime'', and ''maxptime''. The media type is defined only for transfer via RTP.'
