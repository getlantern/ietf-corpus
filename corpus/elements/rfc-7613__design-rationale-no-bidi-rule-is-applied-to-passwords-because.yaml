document: rfc-7613
kind: design-rationale
summary: No Bidi Rule is applied to passwords because it would reduce the range of allowed characters and thus entropy. Passwords are typically not displayed and are rarely meant to be interoperable across different layout systems in the way that usernames or domain names are.
section: 4.2.2
topics:
    - security
    - crypto
