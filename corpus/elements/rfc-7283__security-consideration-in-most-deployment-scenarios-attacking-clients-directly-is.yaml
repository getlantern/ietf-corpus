document: rfc-7283
kind: security-consideration
summary: In most deployment scenarios, attacking clients directly is easier than through a relay agent, and attacks using unknown message types are already possible on the local wire. At sites where only servers and relay agents can be upgraded, the incremental benefit of doing so likely exceeds the risk from vulnerable clients.
section: "6"
