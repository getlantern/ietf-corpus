document: rfc-6797
kind: normative-requirement
summary: The UA MUST NOT note a host as a Known HSTS Host if the host component of the Request-URI syntactically matches an IP-literal or IPv4address production (i.e., HSTS Policy does not apply to IP addresses, only domain names).
section: 8.1.1
rfc2119_level: MUST NOT
topics:
    - http
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
