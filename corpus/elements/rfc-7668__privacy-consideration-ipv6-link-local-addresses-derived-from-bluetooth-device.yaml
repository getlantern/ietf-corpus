document: rfc-7668
kind: privacy-consideration
summary: IPv6 link-local addresses derived from Bluetooth device addresses reveal exactly as much information as the underlying device address. Devices using Bluetooth privacy features (random private addresses) have corresponding privacy in their link-local addresses; those without privacy at the Bluetooth level also lack it at the IPv6 layer.
section: "4"
topics:
    - privacy
    - ip
