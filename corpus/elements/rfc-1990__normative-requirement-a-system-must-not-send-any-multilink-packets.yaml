document: rfc-1990
kind: normative-requirement
summary: A system MUST NOT send any multilink packets on any link unless the peer has offered the MMRU LCP option and the system has Configure-Ack'd it during the most recent LCP negotiation on that link.
section: 5.1.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
