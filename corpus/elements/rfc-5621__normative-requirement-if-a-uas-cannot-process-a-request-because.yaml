document: rfc-5621
kind: normative-requirement
summary: If a UAS cannot process a request because the content type or disposition type of a required-handling body part is not supported in the given context, the UAS SHOULD return a 415 (Unsupported Media Type) response even if it supports those types in a different context.
section: "8.4"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
