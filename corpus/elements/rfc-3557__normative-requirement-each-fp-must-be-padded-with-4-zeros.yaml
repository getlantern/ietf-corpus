document: rfc-3557
kind: normative-requirement
summary: Each FP MUST be padded with 4 zeros at the end to align it to the 32-bit word boundary, making the size of an FP 96 bits (12 octets). This padding is separate from padding indicated by the P bit in the RTP header.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
