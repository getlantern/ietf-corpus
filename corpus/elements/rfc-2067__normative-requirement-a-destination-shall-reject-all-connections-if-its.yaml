document: rfc-2067
kind: normative-requirement
summary: A Destination SHALL reject all connections if its network interface is not initialized. Once initialized, a Destination may reject connections only for incorrect I-field parity or invalid I-field contents; it SHALL accept a connection immediately when buffers are available.
section: "5.4"
rfc2119_level: MUST
topics:
    - ip
