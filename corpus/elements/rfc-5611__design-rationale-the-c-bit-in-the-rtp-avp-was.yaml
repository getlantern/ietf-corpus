document: rfc-5611
kind: design-rationale
summary: The C bit in the RTP AVP was introduced to maintain backward compatibility with a legacy L2TPv3 encapsulation mode where the RTP header preceded the Control Word. The current standard mode (C=1) places RTP after the CW, matching the SAToP/CESoPSN over IPv4/IPv6 PSN encapsulations.
section: "2.2"
