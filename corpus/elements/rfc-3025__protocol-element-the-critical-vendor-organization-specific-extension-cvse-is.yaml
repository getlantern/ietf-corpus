document: rfc-3025
kind: protocol-element
summary: The Critical Vendor/Organization Specific Extension (CVSE) is a Mobile IP extension with Type=37, a 1-octet Reserved field, a 2-octet Length field, a 4-octet Vendor/Org-ID (high-order octet 0, low-order 3 octets are SMI Network Management Private Enterprise Code), a 2-octet Vendor-CVSE-Type, and variable-length Vendor-CVSE-Value.
section: "2.1"
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
