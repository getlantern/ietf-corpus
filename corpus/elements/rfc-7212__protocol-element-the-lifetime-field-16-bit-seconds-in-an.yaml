document: rfc-7212
kind: protocol-element
summary: The Lifetime field (16-bit, seconds) in an ADB element specifies how long the receiver should retain static TLV data. A Lifetime of zero causes data to be immediately marked as expired; if no TLVs are present in the ADB, all previously received data for that application is expired.
section: "3.2"
topics:
    - mpls
