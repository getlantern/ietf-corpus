document: rfc-2847
kind: normative-requirement
summary: In the REQ-TOKEN Intg-Algs field, if SPKM-3 supports an algorithm weaker than HMAC-MD5, HMAC-MD5 MUST be listed first; the initiator must use a MAC algorithm (not a non-repudiation algorithm) since it will be anonymous at the SPKM-3 level.
section: 2.4.1.2.3
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
