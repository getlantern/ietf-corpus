document: rfc-7530
kind: security-consideration
summary: The strength of NFSv4 security depends on the Kerberos V5 infrastructure in use. Since Kerberos V5 algorithms are not directly selectable by NFSv4 clients or servers, deployers must independently ensure the Kerberos deployment uses acceptably strong algorithms; RFC 6649 provides guidance on disabling weak algorithms.
section: 3.2.1.1.1
topics:
    - security
    - crypto
