document: rfc-6325
kind: normative-requirement
summary: All RBridges MUST participate in the TRILL IS-IS instance, which constitutes a single Level 1 IS-IS area using the fixed area address zero. TRILL IS-IS frames are never forwarded by an RBridge but are locally processed on receipt.
section: 4.2.3
rfc2119_level: MUST
topics:
    - routing
