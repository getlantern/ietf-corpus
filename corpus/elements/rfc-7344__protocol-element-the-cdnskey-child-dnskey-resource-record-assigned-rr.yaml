document: rfc-7344
kind: protocol-element
summary: The CDNSKEY (Child DNSKEY) resource record, assigned RR type 60, has wire and presentation format identical to the DNSKEY record. It is published in the Child zone to signal desired DS content to the Parent by conveying the raw key material. No special processing is performed by authoritative servers or resolvers.
section: "3.2"
topics:
    - dns
    - security
    - pkix
