document: rfc-5070
kind: protocol-element
summary: The Incident class is the core representation of a security incident. It carries a required 'purpose' attribute (traceback, mitigation, reporting, other), an optional 'restriction' attribute governing disclosure inheritance, and aggregates IncidentID, timing classes, Assessment, Contact, EventData, History, and AdditionalData.
