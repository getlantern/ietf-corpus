document: rfc-3775
kind: design-rationale
summary: Mobile IPv6 eliminates the need for foreign agents required by Mobile IPv4 by leveraging IPv6 stateless address autoconfiguration. Mobile nodes can acquire care-of addresses and operate on any link without special router support, enabling truly decentralized deployment.
