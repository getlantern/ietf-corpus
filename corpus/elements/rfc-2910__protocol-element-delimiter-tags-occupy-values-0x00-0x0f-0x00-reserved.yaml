document: rfc-2910
kind: protocol-element
summary: 'Delimiter tags occupy values 0x00–0x0F: 0x00 reserved, 0x01 operation-attributes-tag, 0x02 job-attributes-tag, 0x03 end-of-attributes-tag, 0x04 printer-attributes-tag, 0x05 unsupported-attributes-tag, 0x06–0x0F reserved for future IETF standards-track delimiters. A Printer MUST treat delimiter-tag values differently from value-tag values.'
section: 3.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
