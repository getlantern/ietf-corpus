document: rfc-1096
kind: design-rationale
summary: The option exists so that remote hosts can determine the X display of a connecting Telnet client, enabling remote X applications to use the same display without requiring out-of-band communication. The design is modelled on RFC 1079 (Telnet Terminal Speed Option).
section: Motivation
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
