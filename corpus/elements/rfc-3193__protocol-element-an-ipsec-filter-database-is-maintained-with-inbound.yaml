document: rfc-3193
kind: protocol-element
summary: An IPsec filter database is maintained with inbound and outbound filters keyed by IP address, UDP port, and direction. L2TP injects filters dynamically as port/address assignments change during tunnel establishment (SCCRQ/SCCRP exchange).
