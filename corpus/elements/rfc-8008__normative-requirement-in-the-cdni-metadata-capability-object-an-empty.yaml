document: rfc-8008
kind: normative-requirement
summary: In the CDNI Metadata Capability Object, an empty 'metadata' list MUST be interpreted as 'no GenericMetadata types are supported (only structural metadata and simple types)'; a non-empty list is interpreted as the only supported GenericMetadata types.
