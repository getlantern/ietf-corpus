document: rfc-8175
kind: wire-format
summary: 'All DLEP Data Items are encoded as TLVs: 16-bit Data Item Type, 16-bit Length (octets of the Value field, excluding Type and Length fields), followed by a variable-length Value field. There is no ordering requirement for Data Items within a Signal or Message.'
