document: rfc-3981
kind: normative-requirement
summary: When the 'temporaryReference' attribute is true, the entity reference data is only valid within the response in which it appears. A server MUST include the referent of any temporary entity reference in the <additional> section of the same <resultSet>.
section: 4.3.6
rfc2119_level: MUST
topics:
    - registry
