document: rfc-4898
kind: interoperability-note
summary: This MIB clarifies RFC 4022 (TCP-MIB) such that the phrase 'soon after' in the discussion of tcpConnectionTable row deletion means 'after tcpEStatsConnTableLatency seconds'. This clarification only applies when TCP-ESTATS-MIB is implemented alongside TCP-MIB.
section: "3.1"
topics:
