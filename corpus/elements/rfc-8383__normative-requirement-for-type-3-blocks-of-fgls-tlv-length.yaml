document: rfc-8383
kind: normative-requirement
summary: For Type 3 (Blocks of FGLs) TLV, Length MUST be a multiple of 6; if not, the TLV is corrupt and the Address Flush message MUST be discarded if the receiving RBridge implements Type 3.
section: 2.2.3
rfc2119_level: MUST
topics:
    - routing
