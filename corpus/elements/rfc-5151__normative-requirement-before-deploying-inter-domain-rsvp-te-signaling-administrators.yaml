document: rfc-5151
kind: normative-requirement
summary: Before deploying inter-domain RSVP-TE signaling, administrators of neighboring domains MUST satisfy themselves as to the existence of a suitable trust relationship. In the absence of such a relationship, administrators SHOULD decide not to deploy inter-domain signaling and SHOULD disable RSVP-TE on inter-domain interfaces.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
