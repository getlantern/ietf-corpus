document: rfc-5368
kind: design-rationale
summary: The implicit subscription of REFER is suppressed because applications using multiple REFER typically already subscribe to other event packages (e.g., conference state per RFC 4575) that report transaction results, making an additional implicit subscription redundant and unscalable across multiple targets.
section: "5"
topics:
