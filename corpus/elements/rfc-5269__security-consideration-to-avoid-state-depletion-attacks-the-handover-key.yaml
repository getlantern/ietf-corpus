document: rfc-5269
kind: security-consideration
summary: To avoid state depletion attacks, the handover key SHOULD NOT be generated prior to SEND processing that verifies the originator of the RtSolPr. Mitigations include rate limiting RtSolPr, restricting state for unresolved solicitations, and clever cache management.
section: "5"
topics:
