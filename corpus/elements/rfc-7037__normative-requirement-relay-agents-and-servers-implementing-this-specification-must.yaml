document: rfc-7037
kind: normative-requirement
summary: Relay agents and servers implementing this specification MUST support IPsec ESP with encryption in transport mode (per RFC 4303 Section 3.1.1 and RFC 3315 Section 21.1) to protect confidentiality of RADIUS attributes carried in DHCPv6 messages.
