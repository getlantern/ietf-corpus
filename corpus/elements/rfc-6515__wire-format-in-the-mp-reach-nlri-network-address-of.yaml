document: rfc-6515
kind: wire-format
summary: In the MP_REACH_NLRI 'Network Address of Next Hop' field, a PE address is preceded by a length field; length=4 means IPv4 and length=16 means IPv6. If the length is neither 4 nor 16, the MP_REACH_NLRI attribute MUST be treated as 'incorrect' per Section 7 of RFC 4760.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
