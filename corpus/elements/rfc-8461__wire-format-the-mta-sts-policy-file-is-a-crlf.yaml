document: rfc-8461
kind: wire-format
summary: The MTA-STS policy file is a CRLF-separated key/value text resource served via HTTPS GET. Required fields are 'version' (STSv1), 'mode' (enforce/testing/none), 'max_age' (non-negative integer seconds, max 31557600), and one or more 'mx' patterns. Each MX pattern must appear on its own line with its own 'mx:' key.
section: "3.2"
