document: rfc-6884
kind: normative-requirement
summary: A 16 kHz RTP clock rate MUST always be used for EVRC-NW, regardless of whether the encoder input or decoder output is configured at 8 kHz. The RTP timestamp is increased by 320 for each 20 milliseconds.
section: "5"
rfc2119_level: MUST
topics:
