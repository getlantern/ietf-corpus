document: rfc-7712
kind: interoperability-note
summary: Both the DANE and POSH prooftypes specify that the 'to' address of the initial stream header (not TLS SNI) must be used to determine the TLS client's reference identifier, because use of TLS SNI (RFC 6066) is purely discretionary in XMPP as noted in RFC 6120.
section: "5.1"
topics:
    - tls
    - security
