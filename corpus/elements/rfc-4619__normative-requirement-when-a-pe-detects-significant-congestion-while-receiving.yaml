document: rfc-4619
kind: normative-requirement
summary: When a PE detects significant congestion while receiving PW PDUs, the BECN bits of frame relay frames transmitted on the same PW SHOULD be set to notify the remote PE. Additionally, FECN bits SHOULD be set in FR frames sent out the attachment circuit.
section: "9"
rfc2119_level: SHOULD
topics:
    - mpls
    - congestion
