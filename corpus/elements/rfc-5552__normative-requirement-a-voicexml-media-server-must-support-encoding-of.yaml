document: rfc-5552
kind: normative-requirement
summary: A VoiceXML Media Server MUST support encoding of expr/namelist data in the message body of a BYE request sent as a result of VoiceXML <exit> or <disconnect>. The Content-Type header in a BYE containing expr/namelist data MUST be set to application/x-www-form-urlencoded;charset=utf-8. Non-ASCII characters are UTF-8 encoded with %HH escaping.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
