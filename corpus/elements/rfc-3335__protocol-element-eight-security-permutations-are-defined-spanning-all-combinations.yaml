summary: 'Eight security permutations are defined spanning all combinations of: unencrypted vs. encrypted data, unsigned vs. signed data, and no receipt vs. signed/unsigned receipt requested. Only permutation (8)—encrypted, signed, with signed receipt—satisfies all security requirements.'
