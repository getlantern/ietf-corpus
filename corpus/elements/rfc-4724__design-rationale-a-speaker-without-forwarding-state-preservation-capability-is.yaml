document: rfc-4724
kind: design-rationale
summary: 'A speaker without forwarding state preservation capability is still recommended to advertise the Graceful Restart Capability (with no AFI/SAFI tuples) for two reasons: to signal its intention to generate End-of-RIB markers for convergence, and to indicate support for peers wishing to perform a graceful restart.'
