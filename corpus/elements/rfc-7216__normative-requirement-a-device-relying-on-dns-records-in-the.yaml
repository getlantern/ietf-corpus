document: rfc-7216
kind: normative-requirement
summary: A Device relying on DNS records in the private address space portion of the '.in-addr.arpa.' or '.ip6.arpa.' trees MUST either use an alternative trust anchor for these records or rely on other means of ensuring the veracity of the DNS records, since normal DNSSEC trust anchors are ineffective for private address space.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
