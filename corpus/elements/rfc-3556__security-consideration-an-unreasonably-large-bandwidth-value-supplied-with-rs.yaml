document: rfc-3556
kind: security-consideration
summary: An unreasonably large bandwidth value supplied with RS or RR modifiers could cause an application to send RTCP packets at an excessive rate, resulting in a denial of service. Applications should apply validity checks to all parameters received in an SDP description, particularly unauthenticated ones.
section: "7"
topics:
    - security
    - rtp
    - realtime
