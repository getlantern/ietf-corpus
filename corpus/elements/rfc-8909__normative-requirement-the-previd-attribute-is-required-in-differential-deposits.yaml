document: rfc-8909
kind: normative-requirement
summary: The 'prevId' attribute is REQUIRED in Differential Deposits (DIFF type), OPTIONAL in Incremental Deposits (INCR type), and not used in Full Deposits (FULL type). The 'resend' attribute on first generation MUST be '0' or omitted; on regeneration it MUST be incremented.
section: "5.1"
rfc2119_level: REQUIRED
topics:
