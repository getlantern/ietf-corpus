summary: Scheme-specific FEC OTI elements are N1m3 (integer 0–7, default 0, representing N1-3 ones per column in the left parity check matrix), G (integer 1–31, default 1, encoding symbols per group/packet), and a 32-bit PRNG seed (value between 1 and 0x7FFFFFFE inclusive).
