document: rfc-9509
kind: privacy-consideration
summary: The inclusion of the EKU extension can reveal the purpose of a certificate to observers. In protocols like TLS 1.2 where certificates are exchanged in the clear, or via Certificate Transparency logs for publicly issued certificates, an attacker can monitor logs to identify what function a certificate is serving within a 5G system.
section: "7"
topics:
