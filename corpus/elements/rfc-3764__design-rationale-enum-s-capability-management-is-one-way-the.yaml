document: rfc-3764
kind: design-rationale
summary: 'ENUM''s capability management is one-way: the telephone number administrator expresses protocol preferences that the client must evaluate without negotiation. This is fundamentally unlike SIP''s bidirectional capability negotiation, which is why ENUM should resolve to addresses-of-record (which have no capabilities) rather than contact addresses.'
section: "3"
topics:
    - sip
    - dns
