document: rfc-9482
kind: protocol-element
summary: An EE MAY use the CoAP Observe Option (RFC 7641) to register for CMP announcement messages by sending a GET to the server URI suffixed by '/ann'. Supported announcement types include CA Key Update, Certificate, Revocation, and CRL Announcements.
section: "2.6"
topics:
