document: rfc-7219
kind: normative-requirement
summary: SEND SAVI devices MUST only use ND messages received through Validating ports if they are valid per RFC 3971; invalid messages MUST be discarded. Messages from Trusted ports SHOULD NOT be re-validated to reduce processing load.
