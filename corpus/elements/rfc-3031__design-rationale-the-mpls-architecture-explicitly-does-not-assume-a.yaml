document: rfc-3031
kind: design-rationale
summary: The MPLS architecture explicitly does not assume a single label distribution protocol. Both extensions to existing protocols (BGP, RSVP) and new dedicated protocols (LDP, CR-LDP) are accommodated, because different traffic engineering, topology, and signaling requirements call for different distribution mechanisms.
section: "3.6"
topics:
