document: rfc-9457
kind: design-rationale
summary: 'Problem details are identified by URI rather than a simple code or string because URIs allow both namespacing (to avoid collisions between different APIs) and potential dereferencing for documentation. Non-resolvable URIs (e.g., tag: scheme) are allowed but resolvable URIs are encouraged because future tooling that resolves type URIs would otherwise require a breaking change to switch.'
section: 3.1.1
topics:
