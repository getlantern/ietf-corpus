document: rfc-9082
kind: design-rationale
summary: Base URLs are maintained in an IANA bootstrap registry (RFC 7484), and RDAP queries are formed by retrieving the appropriate base URL and appending a path segment. This separates the discovery of service endpoints from the query syntax.
