document: rfc-7441
kind: protocol-element
summary: 'This document defines three new MCAST-VPN route types: C-Multicast Source Tree Join route for C-multicast mLDP (0x47), S-PMSI A-D route for C-multicast mLDP (0x43), and Leaf A-D route for C-multicast mLDP (0x44). These carry mLDP FEC Elements directly in their NLRI instead of Multicast Source/Group fields.'
