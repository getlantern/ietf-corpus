document: rfc-4745
kind: normative-requirement
summary: The <validity> element MUST have <from> and <until> subelements in pairs. Multiple <from>/<until> pairs may appear but must not be nested. Using multiple <validity> elements under <conditions> is not useful since all <conditions> children are combined with logical AND.
section: "7.4"
rfc2119_level: MUST
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
