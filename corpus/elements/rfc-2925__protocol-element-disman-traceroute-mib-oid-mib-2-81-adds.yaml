document: rfc-2925
kind: protocol-element
summary: DISMAN-TRACEROUTE-MIB (OID mib-2 81) adds traceRouteHopsTable for storing the current path per traceRouteCtlEntry; hop entries are created only when traceRouteCtlCreateHopsEntries is true(1). The traceRouteCtlMaxFailures object terminates a traceroute after a configurable number of consecutive timeouts.
