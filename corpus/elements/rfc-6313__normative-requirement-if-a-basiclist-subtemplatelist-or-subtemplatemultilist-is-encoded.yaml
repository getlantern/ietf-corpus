document: rfc-6313
kind: normative-requirement
summary: If a basicList, subTemplateList, or subTemplateMultiList is encoded as a variable-length Information Element of 255 or more octets, it MUST use the three-byte length encoding (leading 0xFF byte followed by a 2-byte length) per RFC 5101 Section 7.
section: 4.5.1
rfc2119_level: MUST
