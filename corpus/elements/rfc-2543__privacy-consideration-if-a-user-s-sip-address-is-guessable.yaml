document: rfc-2543
kind: privacy-consideration
summary: If a user's SIP address is guessable from their name and organizational affiliation, the traditional privacy model of an unlisted number is compromised. SIP mitigates this by offering authentication and access control mechanisms so clients can reject unauthorized or unwanted calls.
section: 1.4.1
topics:
    - sip
    - privacy
    - security
