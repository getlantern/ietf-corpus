kind: wire-format
summary: 'Finder Info (entry ID 9) contains FInfo (16 bytes: fdType 4 bytes, fdCreator 4 bytes, fdFlags 2 bytes, fdLocation 4 bytes, fdFldr 2 bytes) and FXInfo (16 bytes extended finder info). Macintosh File Info (entry ID 10) stores ioFlAttrib in the low byte of a 4-byte field with 3 filler bytes.'
