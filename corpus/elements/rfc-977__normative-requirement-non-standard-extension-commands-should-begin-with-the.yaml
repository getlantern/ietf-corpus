document: rfc-977
kind: normative-requirement
summary: Non-standard extension commands should begin with the letter 'X' to avoid conflict with future revisions of this specification. Extension commands may not redefine specified status response codes, and using unspecified responses for standard commands is prohibited.
section: "3"
rfc2119_level: RECOMMENDED
