document: rfc-857
kind: normative-requirement
summary: To minimize confusion (e.g., momentary double echoing), mode switches between echo and non-echo SHOULD be precisely coordinated with the reception and transmission of echo requests. For example, after receiving DO ECHO, all subsequent data characters should be echoed and WILL ECHO must immediately precede the first echoed character.
section: "5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
