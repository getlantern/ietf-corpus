document: rfc-7180
kind: protocol-element
summary: 'OOMF (Overload Originated Multi-destination Frame) service: an overloaded RBridge RB2 encapsulates multi-destination frames as TRILL Data unicast to a neighbor RB3 with M bit=0, Hop Count=2, ingress nickname=RB2''s nickname, and egress nickname=0xFFC1 (special OOMF indicator). RB3 then substitutes a real distribution tree root, sets M=1, updates Hop Count, and forwards normally.'
section: 2.4.2.3
topics:
