document: rfc-8910
kind: normative-requirement
summary: When performing content negotiation, implementors SHOULD include an appropriate Vary header field or set Cache-Control to 'private' or more restrictive (e.g., 'no-store') in any responses, because such responses might be cached.
section: "2"
rfc2119_level: SHOULD
