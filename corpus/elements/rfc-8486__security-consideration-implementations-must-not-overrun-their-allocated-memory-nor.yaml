document: rfc-8486
kind: security-consideration
summary: Implementations MUST NOT overrun their allocated memory nor read from uninitialized memory when managing the Ambisonic channel mapping. Because the extension requires semantic meaning for more channels than standard Ogg, care must be taken in new allocation paths.
section: "7"
rfc2119_level: MUST NOT
topics:
    - security
