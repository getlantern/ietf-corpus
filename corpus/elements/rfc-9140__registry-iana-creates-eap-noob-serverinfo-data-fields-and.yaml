document: rfc-9140
kind: registry
summary: IANA creates 'EAP-NOOB ServerInfo Data Fields' and 'EAP-NOOB PeerInfo Data Fields' registries for extensible JSON member names in the ServerInfo and PeerInfo objects. IANA also reserves the domain name 'eap-noob.arpa' for use as the default peer NAI realm.
