document: rfc-2652
kind: security-consideration
summary: CIP protocol exchanges should be secured using RFC 1847 Security Multiparts. PGP/MIME (RFC 2016) is recommended as the first viable application of that architecture. Incoming requests without a valid signature must be treated as anonymous for access control purposes.
section: "4.2"
topics:
    - security
    - email
    - crypto
