document: rfc-3327
kind: interoperability-note
summary: Support for the Path header field MAY be indicated by a UA by including the option-tag "path" in a Supported header field. The Path header field is allowed only in REGISTER requests (column 'R') and 200-class responses to REGISTER; it is not applicable to ACK, BYE, CANCEL, INVITE, or OPTIONS methods.
section: "4"
topics:
