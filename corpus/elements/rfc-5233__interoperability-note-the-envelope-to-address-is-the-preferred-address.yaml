document: rfc-5233
kind: interoperability-note
summary: The envelope 'to' address is the preferred address to examine for subaddress information when sorting messages by recipient, as it is the definitive reason a message is processed by a given sieve script. Mailing lists, aliases, and virtual domains may make the envelope the only reliable source of detail information.
