document: rfc-9856
kind: normative-requirement
summary: All packets for a given G-source MUST carry the same S-ESI label. Multi-homed PEs sharing an S-ES MUST allocate the same ESI label for that S-ES, and labels for distinct S-ESes MUST be different.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - mpls
