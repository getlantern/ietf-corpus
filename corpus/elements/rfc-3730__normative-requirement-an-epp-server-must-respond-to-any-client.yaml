document: rfc-3730
kind: normative-requirement
summary: An EPP server MUST respond to any client-initiated communication (lower-layer connection request or EPP <hello>) by returning a <greeting>, and MUST promptly respond to each EPP command with a coordinated response describing the results of processing.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
