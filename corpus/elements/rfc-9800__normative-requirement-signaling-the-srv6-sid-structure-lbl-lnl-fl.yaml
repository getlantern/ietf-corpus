document: rfc-9800
kind: normative-requirement
summary: Signaling the SRv6 SID Structure (LBL, LNL, FL, AL values) is REQUIRED for all SIDs introduced in this document. The advertising node MUST set the length values in the SRv6 SID Structure to match the format of the SID on the SR segment endpoint node.
