document: rfc-2203
kind: security-consideration
summary: Even with the rpc_gss_svc_privacy service, the RPC call header fields (program number, version number, procedure number) are transmitted in cleartext. Encrypting them would have required revising the RPC protocol; additionally, an attacker can typically determine program and version numbers by querying the rpcbind service on the destination host.
section: "7.1"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
