document: rfc-4495
kind: normative-requirement
summary: When a reservation is only to be reduced (not fully removed), routers compliant with this specification MUST NOT send a ResvTear message upstream. A ResvTear is only generated when the reservation is to be completely removed.
section: "5"
rfc2119_level: MUST NOT
topics:
