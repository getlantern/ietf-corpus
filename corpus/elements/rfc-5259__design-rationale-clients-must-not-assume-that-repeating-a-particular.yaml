document: rfc-5259
kind: design-rationale
summary: Clients MUST NOT assume that repeating a particular body part conversion in another IMAP session yields the same result, to allow for upgrade of server transcoding components. Sizes and format of converted parts may differ across sessions.
section: "8.3"
