document: rfc-8013
kind: security-consideration
summary: Operators SHOULD configure the same security policies (including pre-shared Security Association Keys) for all FEs in the NE cluster to ensure uniform operations. When using MKA, FEs must identify themselves with a shared Connectivity Association Key (CAK) and CKN, and EAP-TLS SHOULD be used as the EAP method.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
