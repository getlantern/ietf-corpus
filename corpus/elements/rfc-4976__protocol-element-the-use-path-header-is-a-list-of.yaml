document: rfc-4976
kind: protocol-element
summary: The Use-Path header is a list of MSRP URIs returned by a relay in a successful AUTH response. URIs in Use-Path MUST include a fully qualified domain name (not a numeric IP address) and an explicit port number.
section: "4.2"
topics:
    - realtime
