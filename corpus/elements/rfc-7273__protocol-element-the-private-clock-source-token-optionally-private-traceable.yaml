document: rfc-7273
kind: protocol-element
summary: The `private` clock source token (optionally `private:traceable`) identifies a reference clock distributed by means outside this specification, such as digital television or cellular services. All senders and receivers using a private clock are assumed to have an out-of-band mechanism for determining clock equivalence.
section: "4.5"
topics:
