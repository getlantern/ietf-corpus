document: rfc-4340
kind: design-rationale
summary: 'DCCP supports pluggable congestion control via one-byte CCIDs because different applications have different needs: online games may want quick bandwidth use while streaming media prefers steady, less bursty rates. CCIDs 2 (TCP-like) and 3 (TFRC) are initially standardized.'
