document: rfc-6945
kind: protocol-element
summary: The rpkiRtrCacheServerRefreshTimer object has a range of 60–7200 seconds and holds the configured refresh interval for Serial Query cycles to the cache server. rpkiRtrCacheServerTimeToRefresh is an Integer32 that counts down to zero and can go negative if a refresh is overdue.
