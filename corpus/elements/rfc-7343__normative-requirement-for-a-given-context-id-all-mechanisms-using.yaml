document: rfc-7343
kind: normative-requirement
summary: For a given Context ID, all mechanisms using ORCHIDs MUST use exactly the same mechanism for generating an ORCHID from the input bitstring, to avoid bidding-down attacks where a weaker hash function could be used to forge ORCHIDs valid for the same Context ID.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - crypto
    - security
