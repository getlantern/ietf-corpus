document: rfc-9598
kind: interoperability-note
summary: Comparison of an SmtpUTF8Mailbox and an rfc822Name will always fail because SmtpUTF8Mailbox values SHALL contain a Local-part with one or more non-ASCII characters, while rfc822Name only includes ASCII characters. The two name forms will never match.
section: "5"
topics:
