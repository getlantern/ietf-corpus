document: rfc-6930
kind: design-rationale
summary: The sub-attribute grouping structure within a single RADIUS attribute was chosen as a reasonable compromise because RADIUS has no recommended way of grouping multiple attributes; this allows a single attribute to carry all three 6rd parameters (IPv4MaskLen, 6rdPrefix, and BR addresses).
section: "4.1"
topics:
    - radius
    - v6ops
