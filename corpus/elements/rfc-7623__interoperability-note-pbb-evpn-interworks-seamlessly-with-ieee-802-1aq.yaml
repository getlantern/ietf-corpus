document: rfc-7623
kind: interoperability-note
summary: PBB-EVPN interworks seamlessly with IEEE 802.1aq/802.1Qbp access networks by extending the PBB data-plane encapsulation over the MPLS backbone. B-MAC addresses of 802.1aq switches are advertised using the standard EVPN MAC/IP route advertisement defined in RFC 7432.
