document: rfc-6785
kind: interoperability-note
summary: This document updates the base Sieve specification (RFC 5228) by requiring future Sieve extensions that define new actions to specify their applicability to imapsieve. Extensions specifically designed for new-message delivery are not applicable to IMAP events.
