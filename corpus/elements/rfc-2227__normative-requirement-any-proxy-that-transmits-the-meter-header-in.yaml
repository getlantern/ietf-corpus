document: rfc-2227
kind: normative-requirement
summary: Any proxy that transmits the Meter header in a request MUST implement every requirement of this specification, without exception or amendment. A proxy willing neither to obey usage-limits nor to send usage reports MUST NOT transmit a Meter header in the request.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
