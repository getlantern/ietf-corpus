document: rfc-4239
kind: normative-requirement
summary: The top level content type on a new, forwarded, or reply voice message SHOULD be multipart/mixed. If the recipient is known to be VPIM v2 compliant, multipart/voice-message MAY be used instead.
section: "3"
rfc2119_level: SHOULD
