document: rfc-9914
kind: protocol-element
summary: The P-DAO Request (P-DAO-REQ) is a new RPL control message through which a node requests the Root to install a P-Route. It allows RPL-Aware Nodes to explicitly solicit Track establishment rather than relying solely on Root-initiated projection.
