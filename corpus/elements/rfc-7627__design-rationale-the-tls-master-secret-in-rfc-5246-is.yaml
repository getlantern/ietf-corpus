document: rfc-7627
kind: design-rationale
summary: The TLS master secret in RFC 5246 is not cryptographically bound to the server certificate or other session parameters, allowing an active attacker (the 'triple handshake' attack) to synchronize two TLS sessions so they share the same master_secret. Any mechanism relying on master secret uniqueness—including session resumption, channel bindings, and renegotiation—is then vulnerable to man-in-the-middle attacks.
section: "1"
topics:
    - tls
    - security
    - crypto
