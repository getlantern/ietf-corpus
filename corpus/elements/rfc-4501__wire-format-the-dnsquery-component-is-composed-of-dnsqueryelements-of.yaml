document: rfc-4501
kind: wire-format
summary: The dnsquery component is composed of dnsqueryelements of the form 'CLASS=dnsclassval' or 'TYPE=dnstypeval', separated by semicolons. dnsclassval accepts digits or mnemonics (IN, CH, or any IANA-registered class); dnstypeval accepts digits or mnemonics (A, NS, MD, or any IANA-registered type).
section: "3"
topics:
