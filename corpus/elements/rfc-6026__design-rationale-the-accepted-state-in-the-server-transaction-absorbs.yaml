document: rfc-6026
kind: design-rationale
summary: The 'Accepted' state in the server transaction absorbs INVITE retransmissions entirely within the server transaction without passing them to the TU, since downstream UAS cores that accepted the request have taken responsibility for reliability and will retransmit their 2xx responses.
