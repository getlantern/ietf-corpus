document: rfc-7680
kind: privacy-consideration
summary: Active measurement techniques greatly reduce the sensitive information available to potential observers compared to passive observation of user traffic. Passive observations of user traffic for measurement purposes raise many privacy issues; implementors are referred to the LMAP Framework (RFC 7594) for coverage of both active and passive technique privacy considerations.
section: "5"
topics:
    - measurement
    - privacy
    - ip
