document: rfc-4822
kind: security-consideration
summary: If a user interface only permits ASCII text entry for cryptographic keys, significant bits become predictable, reducing key strength. Implementations SHOULD support entry of cryptographic keys in hexadecimal format.
section: "5.6"
rfc2119_level: SHOULD
topics:
    - routing
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
