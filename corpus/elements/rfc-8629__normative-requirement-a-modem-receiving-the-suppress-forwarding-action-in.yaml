document: rfc-8629
kind: normative-requirement
summary: 'A modem receiving the Suppress Forwarding Action in a Session Update Message MUST suppress multi-hop forwarding device-wide: data from the peer router SHALL only be sent to one-hop destinations, and transit traffic not destined to the peer router SHALL be dropped.'
section: 3.2.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
