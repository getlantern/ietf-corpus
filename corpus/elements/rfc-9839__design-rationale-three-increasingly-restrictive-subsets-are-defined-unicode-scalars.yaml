document: rfc-9839
kind: design-rationale
summary: Three increasingly restrictive subsets are defined — Unicode Scalars, XML Characters, and Unicode Assignables — so that specifications can choose an appropriate level of restriction. Unicode Assignables is the new recommended subset that excludes all problematic code points and is a proper subset of the other two.
