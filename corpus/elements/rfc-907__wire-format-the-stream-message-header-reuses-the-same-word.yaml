document: rfc-907
kind: wire-format
summary: The stream message header reuses the same word 0–2 layout as datagrams but word 3 bit 15 is set to 1 (stream type), and bits 0–9 carry the 10-bit Host Stream ID (assigned at stream creation) instead of priority/reliability fields. Data payload is up to 16,000 bits (multiple of 16 bits).
