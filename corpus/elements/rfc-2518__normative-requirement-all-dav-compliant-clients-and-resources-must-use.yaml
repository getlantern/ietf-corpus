document: rfc-2518
kind: normative-requirement
summary: All DAV compliant clients and resources MUST use XML parsers compliant with REC-XML. If a server receives ill-formed XML in a request it MUST reject the entire request with a 400 (Bad Request). If a client receives ill-formed XML in a response it MUST NOT assume anything about the outcome.
section: "8"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
