document: rfc-6775
kind: protocol-element
summary: The 6LoWPAN Context Option (6CO) distributes header compression context (CID-to-prefix mappings per RFC 6282) via Router Advertisements. Up to 16 6COs may be carried in a single RA; a Valid Lifetime of zero signals immediate removal of a context entry.
section: "4.2"
topics:
