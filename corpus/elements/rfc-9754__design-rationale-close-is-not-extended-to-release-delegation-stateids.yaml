document: rfc-9754
kind: design-rationale
summary: CLOSE is not extended to release delegation stateids because implementation experience shows that doing so does not reduce the number of synchronous operations. The OPEN XOR DELEGATION approach reduces synchronous operations by 33% and total operations by 25% by allowing DELEGRETURN to be deferred asynchronously.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
