document: rfc-5225
kind: protocol-element
summary: 'ROHCv2 compressed headers use three types of chains that group fields by characteristic: a static chain (IR only) for invariant fields, a dynamic chain (IR and co_repair) for slowly changing fields, and an irregular chain (all CO except co_repair) for per-packet changing fields. Each chain contains one item per compressed protocol header in order from outermost to innermost.'
section: "6.5"
topics:
    - realtime
    - rtp
