document: rfc-7023
kind: normative-requirement
summary: Upon entry to the AC receive defect state, PE1 MUST notify PE2 via a forward defect notification (LDP PW status message indicating forward defect or VCCV-BFD forward defect diagnostic code). Additionally, if PE1 has a Down MEP with CCM transmission enabled, the MEP MUST set the RDI bit in transmitted CCM frames.
section: "6.5"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
