document: rfc-9264
kind: protocol-element
summary: The 'application/linkset+json' media type represents a set of links as a JSON document. The top-level object MUST contain a 'linkset' member whose value is an array of link context objects, each grouping links sharing the same link context.
section: "4.2"
topics:
