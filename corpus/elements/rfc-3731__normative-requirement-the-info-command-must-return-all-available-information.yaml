document: rfc-3731
kind: normative-requirement
summary: The <info> command MUST return all available information if the querying client is the sponsoring client or provides valid authorization information. The <domain:authInfo> element MUST only be returned to the sponsoring client or a client that supplied valid authorization.
section: 3.1.2
rfc2119_level: MUST
topics:
    - security
