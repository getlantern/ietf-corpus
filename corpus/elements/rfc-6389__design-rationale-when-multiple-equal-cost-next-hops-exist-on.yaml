document: rfc-6389
kind: design-rationale
summary: When multiple equal-cost next hops exist on a LAN, downstream LSRs MAY use a deterministic hash H = (Sum Opaque value) modulo N over numbered candidate upstream LSRs to select a single upstream LSR. This enables load balancing across LSPs while ensuring a single upstream LSR per LAN interface per LSP.
section: "6"
topics:
