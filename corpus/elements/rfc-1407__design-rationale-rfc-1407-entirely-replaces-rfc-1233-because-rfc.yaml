document: rfc-1407
kind: design-rationale
summary: 'RFC 1407 entirely replaces RFC 1233 because RFC 1233 contains a fundamental error: many objects were encoded as Counters that must be encoded as INTEGERs or Gauges. The magnitude of change required meant virtually every object changed, so RFC 1233 should not be implemented.'
section: "2.2"
topics:
