document: rfc-5497
kind: design-rationale
summary: The 8-bit time encoding was chosen because MANET routing protocols use bandwidth-limited wireless interfaces and prefer to trade computational complexity for fewer transmitted bits. High-precision time values are unnecessary for the intended use cases (message interval and validity time), while the encoding still spans from sub-second to multi-day values.
section: "1.1"
topics:
    - routing
