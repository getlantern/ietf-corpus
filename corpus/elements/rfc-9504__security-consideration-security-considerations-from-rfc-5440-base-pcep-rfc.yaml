summary: Security considerations from RFC 5440 (base PCEP), RFC 8779 (GMPLS PCEP), RFC 8231 (stateful PCE), and RFC 8281 (PCE-initiated LSPs) all apply to this document. Secure transport via TLS as specified in RFC 8253 (PCEPS) is applicable and recommended.
