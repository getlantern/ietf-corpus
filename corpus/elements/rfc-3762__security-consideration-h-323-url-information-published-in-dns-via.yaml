document: rfc-3762
kind: security-consideration
summary: H.323 URL information published in DNS via ENUM becomes publicly accessible; security for H.323 destinations can be achieved using H.235, which provides integrity, authentication, non-repudiation, and encryption. Threats from ENUM's dependence on DNS and DNSSEC applicability are analyzed in RFC 3761.
section: "5"
topics:
