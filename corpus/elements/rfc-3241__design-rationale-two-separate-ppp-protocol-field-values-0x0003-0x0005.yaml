document: rfc-3241
kind: design-rationale
summary: Two separate PPP protocol field values (0x0003, 0x0005) are defined to keep PPP packets self-describing. This avoids a conflict that would occur if IPCP and IPV6CP each negotiated CID format independently and arrived at different results.
