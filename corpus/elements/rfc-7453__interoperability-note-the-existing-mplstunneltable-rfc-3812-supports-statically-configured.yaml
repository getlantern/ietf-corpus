document: rfc-7453
kind: interoperability-note
summary: The existing mplsTunnelTable (RFC 3812) supports statically configured unidirectional tunnels and dynamically configured unidirectional and co-routed bidirectional tunnels only. The extension MIBs defined here add coverage for statically configured associated and co-routed bidirectional tunnels, and dynamically signaled associated bidirectional tunnels.
section: "1"
topics:
