document: rfc-3551
kind: normative-requirement
summary: Samples for all channels belonging to a single sampling instant MUST be within the same RTP packet. For sample-based encodings, samples from different channels at the same instant SHOULD be packed in consecutive octets (interleaved).
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
