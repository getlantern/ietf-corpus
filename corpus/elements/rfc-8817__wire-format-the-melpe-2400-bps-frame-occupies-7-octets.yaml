kind: wire-format
summary: The MELPe 2400 bps frame occupies 7 octets (54 speech bits plus CODA=0 and CODB rate code bits in the final octet). CODA MUST be 0; CODB SHOULD be 0 but MAY carry an end-to-end framing bit.
