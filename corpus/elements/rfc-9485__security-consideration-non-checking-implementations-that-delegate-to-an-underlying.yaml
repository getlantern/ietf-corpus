document: rfc-9485
kind: security-consideration
summary: Non-checking implementations that delegate to an underlying regexp engine expose that engine's security limitations. A checking implementation is still RECOMMENDED even when an engine with built-in security measures (e.g., RE2) is used.
section: "8"
topics:
