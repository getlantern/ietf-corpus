document: rfc-7155
kind: security-consideration
summary: Diameter messages carrying the User-Password AVP represent sensitive information. As required by RFC 6733, messages must be encrypted via IPsec or TLS; in untrusted proxy environments, end-to-end security techniques SHOULD be applied to protect the password.
section: "8.1"
topics:
    - diameter
    - security
    - crypto
