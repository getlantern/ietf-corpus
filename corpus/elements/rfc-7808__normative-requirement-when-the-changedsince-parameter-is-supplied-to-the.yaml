document: rfc-7808
kind: normative-requirement
summary: When the "changedsince" parameter is supplied to the "list" action, the server MUST return only time zones changed since that token. If the token is unrecognized, the server MUST return all time zones as if no "changedsince" was provided.
section: "5.2"
rfc2119_level: MUST
topics:
    - http
    - json
