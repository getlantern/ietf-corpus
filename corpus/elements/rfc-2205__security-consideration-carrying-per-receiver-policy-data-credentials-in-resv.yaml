document: rfc-2205
kind: security-consideration
summary: Carrying per-receiver policy data (credentials) in Resv messages creates a scaling problem for large multicast groups where it is impossible or undesirable to carry all receivers' policy data upstream. Policy data must be administratively merged near the receivers to avoid excessive overhead.
section: "2.7"
topics:
    - security
    - qos
    - privacy
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
