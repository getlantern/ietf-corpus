document: rfc-5269
kind: normative-requirement
summary: The AR MUST randomly generate a handover key of sufficient strength to match the authentication algorithm and MUST generate a unique key for each CGA public key. Key generation SHOULD be uncorrelated between handover keys and between handover keys and CGA keys.
section: "3.6"
rfc2119_level: MUST
topics:
    - mobility
    - crypto
    - security
