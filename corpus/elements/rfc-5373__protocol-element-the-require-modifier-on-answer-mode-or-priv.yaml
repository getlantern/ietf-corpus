document: rfc-5373
kind: protocol-element
summary: 'The ''require'' modifier on Answer-Mode or Priv-Answer-Mode (e.g., ''Answer-Mode: Auto;require'') instructs the UAS to reject the call if it cannot or will not answer in the requested mode, rather than answering in an alternate mode. The modifier is evaluated only after the UAS has selected an answering mode.'
section: "4.2"
topics:
    - sip
    - realtime
