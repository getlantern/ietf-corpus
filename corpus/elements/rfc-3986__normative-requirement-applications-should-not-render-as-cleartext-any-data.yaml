document: rfc-3986
kind: normative-requirement
summary: Applications SHOULD NOT render as cleartext any data after the first ":" in a userinfo subcomponent unless that data is an empty string. Applications MAY ignore or reject such data and SHOULD reject its storage in unencrypted form.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - security
    - privacy
