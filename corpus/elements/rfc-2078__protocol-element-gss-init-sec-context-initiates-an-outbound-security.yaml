document: rfc-2078
kind: protocol-element
summary: GSS_Init_sec_context() initiates an outbound security context. Inputs include claimant_cred_handle, targ_name, mech_type, and Boolean flags for delegation (deleg_req_flag), mutual authentication (mutual_req_flag), replay detection (replay_det_req_flag), sequencing (sequence_req_flag), and anonymity (anon_req_flag). Returns output_token and corresponding state indicator Booleans plus prot_ready_state.
section: 2.2.1
topics:
