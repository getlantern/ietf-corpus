document: rfc-1883
kind: protocol-element
summary: 'IPv6 uses a linked chain of extension headers, each identified by a Next Header value in the preceding header. A full IPv6 implementation must include: Hop-by-Hop Options (0), Routing Type 0 (43), Fragment (44), Destination Options (60), Authentication (RFC-1826), and Encapsulating Security Payload (RFC-1827).'
section: "4"
