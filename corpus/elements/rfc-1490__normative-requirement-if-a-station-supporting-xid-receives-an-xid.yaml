document: rfc-1490
kind: normative-requirement
summary: If a station supporting XID receives an XID frame, it shall respond with an XID response. If the remote maximum frame size is smaller than the local maximum, the local system shall reduce the maximum size to the remotely specified value before generating the response.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
