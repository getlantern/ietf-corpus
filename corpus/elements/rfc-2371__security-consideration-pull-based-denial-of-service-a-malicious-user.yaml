document: rfc-2371
kind: security-consideration
summary: 'PULL-based denial-of-service: a malicious user who knows an active transaction''s identity can open a TIP connection, send PULL, then close the connection, causing the transaction to abort. Mitigation: refuse PULL commands unless TLS is in use with the remote party authenticated and trusted.'
section: "16.2"
topics:
    - security
    - tls
