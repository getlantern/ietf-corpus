document: rfc-9728
kind: security-consideration
summary: An attacker may attempt to impersonate a protected resource by publishing a metadata document containing the victim's resource identifier URL. The client MUST ensure the resource identifier prefix used for the metadata request exactly matches the resource metadata parameter in the response, as specified in Section 3.3.
section: "7.3"
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
