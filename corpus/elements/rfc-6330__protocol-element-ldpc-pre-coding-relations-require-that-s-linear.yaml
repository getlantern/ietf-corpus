summary: LDPC pre-coding relations require that S linear combinations of intermediate symbols evaluate to zero, enforced via matrices G_LDPC,1 (S×B) and G_LDPC,2 (S×P). Each non-LDPC LT symbol contributes to exactly 3 LDPC symbols.
