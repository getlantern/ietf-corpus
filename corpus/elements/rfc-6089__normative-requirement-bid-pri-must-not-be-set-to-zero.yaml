document: rfc-6089
kind: normative-requirement
summary: BID-PRI MUST NOT be set to zero in a BID option sent by a mobile node supporting this specification. A BID-PRI of zero is interpreted by receivers as indicating the legacy RFC 5648 BID option format, ensuring backwards compatibility.
section: 5.2.1
rfc2119_level: MUST NOT
topics:
    - ip
    - mobility
