document: rfc-5265
kind: normative-requirement
summary: The i-HA MUST be configured with a list of trusted IP subnets (internal-network addresses only, with no subnets trusted by default), MUST silently drop any registration request from a source outside those subnets (and SHOULD log such drops), and MUST include the TNC extension in any reply to a request from a trusted address.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - vpn
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
