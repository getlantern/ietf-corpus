document: rfc-2879
kind: protocol-element
summary: The 'color-illuminant' tag specifies a CIE illuminant for use with calibrated color spaces, using tokens D50, D65, D75, SA, SC, F2, F7, F11, or CTnnnn (color temperature in Kelvins). The default Group 3 fax illuminant is D50.
section: "3.6"
