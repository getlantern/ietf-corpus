document: rfc-8045
kind: normative-requirement
summary: The IP-Port-Range Attribute MUST contain the IP-Port-Alloc TLV. For port allocation it MUST also contain both IP-Port-Range-Start and IP-Port-Range-End TLVs; for deallocation these MAY be omitted, and their absence implies all previously allocated ports are now deallocated.
section: 3.1.2
rfc2119_level: MUST
topics:
    - radius
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
