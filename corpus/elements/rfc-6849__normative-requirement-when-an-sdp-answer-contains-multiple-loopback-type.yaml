document: rfc-6849
kind: normative-requirement
summary: When an SDP answer contains multiple loopback-type choices, the answer MUST include only one of the loopback types accepted by the answerer, and the answerer SHOULD give preference to the first loopback-type listed in the offer.
section: "5.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
