document: rfc-4737
kind: normative-requirement
summary: If duplicate packets (multiple non-corrupt copies) arrive at the destination, they MUST be noted and only the first copy considered for further analysis; subsequent copies are treated as reordered according to the singleton definition.
section: "3.6"
rfc2119_level: MUST
