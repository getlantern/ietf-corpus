document: rfc-3437
kind: design-rationale
summary: Proxy LCP allows options to be negotiated where the native PPP link resides, but introduces problems because some LCP options (e.g., PPP Authentication Type, MRU) should be set by the LNS, and the LAC may not detect client-initiated LCP renegotiation unless it sniffs every forwarded PPP data packet.
