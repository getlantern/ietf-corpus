document: rfc-3939
kind: interoperability-note
summary: These headers are intentionally distinct from addressable or dialable phone number formats defined in other documents (GSTN address per RFC 3191, telephone URL per RFC 2806). The Caller-ID field records the raw telephone number; translation to an addressable format is a separate concern.
section: "6.1"
topics:
