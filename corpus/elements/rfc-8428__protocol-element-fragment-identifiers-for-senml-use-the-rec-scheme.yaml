document: rfc-8428
kind: protocol-element
summary: 'Fragment identifiers for SenML use the ''rec'' scheme: a single record number, a range (e.g., rec=3-6), an open-ended range (rec=19-*), or a comma-separated list. Record numbering starts at 1. XML and EXI formats additionally support XPointer element() scheme fragment identifiers.'
