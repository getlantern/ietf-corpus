document: rfc-7675
kind: protocol-element
summary: Consent is obtained and maintained by sending a STUN binding request to the remote peer's transport address and receiving a matching, authenticated, non-error STUN binding response. These are authenticated using the same short-term credentials as the initial ICE exchange.
section: "5.1"
