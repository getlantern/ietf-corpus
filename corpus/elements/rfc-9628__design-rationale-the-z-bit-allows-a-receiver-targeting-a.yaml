document: rfc-9628
kind: design-rationale
summary: The Z bit allows a receiver targeting a higher spatial layer to discard a lower-layer packet without processing it and without waiting for the D bit in the higher-layer frame, providing an early-discard signal that reduces unnecessary decode work in selective forwarding scenarios.
