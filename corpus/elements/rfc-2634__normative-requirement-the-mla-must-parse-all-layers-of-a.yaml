document: rfc-2634
kind: normative-requirement
summary: The MLA MUST parse all layers of a received message to find any eSSSecurityLabel signedAttributes, including decrypting EnvelopedData layers if necessary, and MUST fully process each label (including access control) before distributing to ML members.
