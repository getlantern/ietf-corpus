document: rfc-3261
kind: protocol-element
summary: The CSeq header contains a monotonically increasing 32-bit integer and a method name. Each new non-ACK, non-CANCEL request within a dialog MUST increment the CSeq number, providing ordering and retransmission detection across a dialog's lifetime.
