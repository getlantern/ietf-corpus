document: rfc-4165
kind: normative-requirement
summary: When a message must be acknowledged, M2PA MUST do so with the next User Data message sent. If no User Data is available, M2PA SHOULD immediately send an empty User Data message (same FSN as the last data-carrying message, not incremented). Empty User Data messages SHALL NOT themselves be acknowledged.
section: 4.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
