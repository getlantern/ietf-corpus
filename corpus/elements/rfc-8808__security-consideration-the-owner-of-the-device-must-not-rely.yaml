document: rfc-8808
kind: security-consideration
summary: The owner of the device MUST NOT rely on any sensitive data (e.g., private keys) being forensically unrecoverable from the device's nonvolatile storage after a 'factory-reset' RPC has been invoked, as there is no guarantee data is wiped to any particular data-cleansing standard.
