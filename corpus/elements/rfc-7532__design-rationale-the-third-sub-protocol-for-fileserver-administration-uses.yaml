document: rfc-7532
kind: design-rationale
summary: The third sub-protocol (for fileserver administration) uses ONC RPC rather than LDAP because all fileservers support ONC RPC but some do not support an LDAP directory server. This decision preserves interoperability across diverse fileserver implementations.
section: "5"
