document: rfc-8342
kind: protocol-element
summary: Dynamic configuration datastores hold configuration obtained dynamically during device operation through interaction with other systems, rather than through conventional configuration datastores. Their datastore schema MAY differ from conventional datastores, and they interact with the rest of the system through <operational>.
section: "5.2"
topics:
