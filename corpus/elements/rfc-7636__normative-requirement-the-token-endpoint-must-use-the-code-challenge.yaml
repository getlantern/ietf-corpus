document: rfc-7636
kind: normative-requirement
summary: The token endpoint MUST use the code_challenge_method bound to the authorization code to verify the code_verifier. If the computed challenge equals the stored code_challenge, processing continues normally; otherwise, the server MUST return an 'invalid_grant' error.
section: "4.6"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
