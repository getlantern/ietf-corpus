summary: 'The updated Map-Request carries: the standard header with I-bit at bit 11; per-record N-bit at bit 1 of the record header (8-bit field, followed by 8-bit EID mask-len and 16-bit EID-Prefix-AFI); and, when I-bit=1, a 128-bit xTR-ID followed by a 64-bit Site-ID appended after all records.'
