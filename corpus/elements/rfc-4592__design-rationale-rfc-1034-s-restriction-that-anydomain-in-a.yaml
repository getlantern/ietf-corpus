document: rfc-4592
kind: design-rationale
summary: RFC 1034's restriction that '<anydomain>' in a wildcard owner name should not contain other asterisk labels is removed. The restriction was incomplete (still permitted 'example.*.example.'), served no operational purpose over years of deployment, and the concept of closest encloser resolves any alleged ambiguity with nested wildcards.
section: 2.1.3
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
