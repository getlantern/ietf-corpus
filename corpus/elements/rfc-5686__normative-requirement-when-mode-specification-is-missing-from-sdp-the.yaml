document: rfc-5686
kind: normative-requirement
summary: 'When mode specification is missing from SDP, the payload type MUST default to a single mode: Mode 0 for 8000 Hz clock rate, Mode 1 for 16000 Hz clock rate. The offerer/answerer MUST NOT assume default modes are available when not in the specified mode list.'
section: 6.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
