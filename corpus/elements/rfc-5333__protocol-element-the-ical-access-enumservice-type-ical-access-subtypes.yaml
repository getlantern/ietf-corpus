document: rfc-5333
kind: protocol-element
summary: 'The ''ical-access'' Enumservice (type: ''ical-access'', subtypes: ''http'' and ''https'') identifies a resource addressable via ''http:'' or ''https:'' URIs for accessing a user''s calendar (e.g., free/busy status) using the CalDAV protocol (RFC 4791). Intended usage is COMMON.'
