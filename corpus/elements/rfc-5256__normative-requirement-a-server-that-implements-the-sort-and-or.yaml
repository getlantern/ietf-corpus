document: rfc-5256
kind: normative-requirement
summary: A server that implements the SORT and/or THREAD extensions MUST collate strings in accordance with the requirements of I18NLEVEL=1, as described in [IMAP-I18N], and SHOULD implement and advertise the I18NLEVEL=1 extension. Alternatively, a server MAY implement I18NLEVEL=2 or higher.
section: "1"
rfc2119_level: MUST
topics:
