summary: 'This document modifies the behavior for action bits ''01'', ''10'', and ''11'': a router that cannot or is not configured to process the option MAY discard the packet rather than MUST, and for ''10''/''11'' the ICMPv6 Parameter Problem message is MAY rather than mandatory.'
