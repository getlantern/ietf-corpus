kind: normative-requirement
summary: Parental agents SHOULD trigger the bootstrapping validation procedure when receiving new/updated NS RRsets, receiving a notification from the child, encountering signaling records during proactive scans, or encountering signaling records during NSEC walks or zone parsing.
