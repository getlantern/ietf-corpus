document: rfc-2435
kind: normative-requirement
summary: For Q values 128–255, the Quantization Table header MUST be present in the first packet of every frame. When tables are specified out-of-band, the Length field may be set to 0 to omit the table data inline.
section: "4.2"
rfc2119_level: MUST
