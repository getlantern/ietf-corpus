document: rfc-5275
kind: normative-requirement
summary: If signature verification fails over any control attribute other than cMCStatusInfoExt, a cMCStatusInfoExt MUST be returned with cMCStatus.failed and otherInfo.failInfo.badMessageCheck. If a request cannot be processed immediately, cMCStatusInfoExt MUST indicate cMCStatus.pending.
section: 3.2.4.1
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
