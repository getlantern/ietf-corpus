document: rfc-8263
kind: normative-requirement
summary: A GCKS SHOULD be prepared to receive GROUPKEY-PUSH ACKs from each GM to which a GROUPKEY-PUSH was sent, ensuring sufficient resources (e.g., receive queue size) so that ACKs are not unnecessarily dropped.
