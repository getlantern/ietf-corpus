document: rfc-7266
kind: interoperability-note
summary: Use of the MOS Metrics Report Block with MPEG Transport streams carried over RTP is explicitly undefined, because each MPEG Transport stream may use distinct audio or video codecs encoded within the transport stream rather than signaled via RTP payload types.
section: 3.2.1
topics:
