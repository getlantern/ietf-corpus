document: rfc-9197
kind: normative-requirement
summary: If a node cannot populate an IOAM-Data-Field set in the Trace-Type, the field value MUST be set to 0xFFFFFFFF for 4-octet fields or 0xFFFFFFFFFFFFFFFF for 8-octet fields to indicate 'not populated'. All IOAM-Data-Fields MUST be 4-octet aligned.
section: 4.4.2
rfc2119_level: MUST
topics:
    - measurement
