document: rfc-1596
kind: design-rationale
summary: The MIB is scoped exclusively to Customer Network Management (CNM) of a Frame Relay Network Service via a provider-side SNMP proxy agent; it is explicitly NOT implemented on User Equipment (DTE). RFC 1315 should be used for DTE management. Internal network elements such as switching elements, line cards, and routing tables are outside scope.
section: "3.1"
topics:
    - routing
