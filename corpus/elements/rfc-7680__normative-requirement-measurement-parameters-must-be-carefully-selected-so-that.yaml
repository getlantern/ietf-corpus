document: rfc-7680
kind: normative-requirement
summary: Measurement parameters MUST be carefully selected so that the measurements inject trivial amounts of additional traffic into the networks they measure; injecting too much traffic can skew results and in extreme cases cause congestion and denial of service.
section: "5"
rfc2119_level: MUST
topics:
    - measurement
    - security
    - ip
