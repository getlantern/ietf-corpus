document: rfc-5072
kind: normative-requirement
summary: The interface identifier for a PPP interface SHOULD be negotiated in the IPV6CP phase. It SHOULD NOT be assumed that the same negotiated identifier is used for global unicast addresses; a peer MAY generate additional identifiers (e.g., per RFC 4941) for global unicast autoconfiguration.
section: "5"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
