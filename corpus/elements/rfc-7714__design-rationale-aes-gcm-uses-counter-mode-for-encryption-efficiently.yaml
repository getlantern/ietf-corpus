document: rfc-7714
kind: design-rationale
summary: AES-GCM uses Counter Mode for encryption (efficiently pipelined) and Galois Message Authentication Code (GMAC) for authentication (operations particularly well-suited for efficient hardware implementation). This makes AES-GCM especially appealing for high-speed implementations or compact circuit designs.
