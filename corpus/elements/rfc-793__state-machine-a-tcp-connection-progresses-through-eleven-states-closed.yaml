document: rfc-793
kind: state-machine
summary: 'A TCP connection progresses through eleven states: CLOSED, LISTEN, SYN-SENT, SYN-RECEIVED, ESTABLISHED, FIN-WAIT-1, FIN-WAIT-2, CLOSE-WAIT, CLOSING, LAST-ACK, and TIME-WAIT. Transitions are triggered by user calls (OPEN, SEND, RECEIVE, CLOSE, ABORT), incoming segment flags (SYN, ACK, RST, FIN), and timeouts.'
section: "3.2"
topics:
    - tcp
