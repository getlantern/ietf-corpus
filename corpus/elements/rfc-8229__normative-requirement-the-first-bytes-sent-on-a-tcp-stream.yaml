document: rfc-8229
kind: normative-requirement
summary: The first bytes sent on a TCP stream MUST be the stream prefix 'IKETCP'. The TCP Responder MUST wait for the entire stream prefix to be received before trying to parse any IKE or ESP messages.
section: "6"
rfc2119_level: MUST
topics:
