document: rfc-7964
kind: design-rationale
summary: The Group Best Paths approach is bounded in the number of advertised paths by the number of neighbor-ASes for a particular address prefix, rather than the total number of paths. This is typically small due to the limited number of upstream providers and the nature of customer route advertisement at IXPs.
section: "6"
topics:
