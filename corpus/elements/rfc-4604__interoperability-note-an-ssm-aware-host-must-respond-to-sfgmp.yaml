document: rfc-4604
kind: interoperability-note
summary: An SSM-aware host MUST respond to SFGMP Group-and-Source-Specific Queries for SSM addresses per normal IGMPv3/MLDv2 rules; a host must be able to process queries listing multiple sources per group. The use of an SSM address does not modify this behavior.
section: 2.2.7
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
