document: rfc-3495
kind: security-consideration
summary: Even if server addresses and Kerberos realm name are successfully spoofed, a malicious client device must still present valid certificates to the KDC before being service-enabled. However, the computational overhead of certificate validation could itself present a Denial of Service opportunity.
section: "10"
topics:
