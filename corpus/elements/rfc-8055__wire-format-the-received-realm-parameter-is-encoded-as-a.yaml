summary: 'The ''received-realm'' parameter is encoded as a quoted string containing an operator identifier token, a colon, and a JWS with the format ''header..signature'' (base64 characters). The two adjacent dots represent the detached (empty) payload position. ABNF: received-realm = "received-realm" EQUAL LDQUOT op-id COLON jws RDQUOT.'
