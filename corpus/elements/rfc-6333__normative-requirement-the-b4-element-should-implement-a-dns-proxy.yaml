document: rfc-6333
kind: normative-requirement
summary: The B4 element SHOULD implement a DNS proxy following RFC 5625 recommendations, because it is provisioned only with IPv6 and cannot directly convey an IPv4 DNS server address to downstream IPv4-only nodes. The proxy must also be security-aware to support DNSSEC-validating resolvers behind the B4.
section: "5.5"
rfc2119_level: SHOULD
topics:
    - dns
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
