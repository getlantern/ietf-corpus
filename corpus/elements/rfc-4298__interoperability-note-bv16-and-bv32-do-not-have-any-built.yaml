document: rfc-4298
kind: interoperability-note
summary: BV16 and BV32 do not have any built-in bandwidth reduction mechanism; congestion control must be achieved at the RTP/application level, such as by packing more frames per packet to reduce header overhead, at the cost of increased delay and reduced packet-loss robustness.
