document: rfc-8781
kind: interoperability-note
summary: Networks providing PREF64 via both the RA option and PCP (RFC 7225) should note that hosts may use the RA-discovered prefix immediately before PCP completes, so some traffic may not reflect more detailed PCP-provided configuration.
