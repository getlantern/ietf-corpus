document: rfc-4412
kind: wire-format
summary: The 'Accept-Resource-Priority' response header field enumerates the r-values a UAS is willing to process, using the same r-value syntax as Resource-Priority. It is returned in 200 and 417 responses to indicate acceptable resource values to the UAC.
