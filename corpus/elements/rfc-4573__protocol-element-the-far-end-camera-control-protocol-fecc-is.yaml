document: rfc-4573
kind: protocol-element
summary: The far-end camera control protocol (FECC) is based on ITU-T H.281 frames carried in ITU-T H.224 packets over an RTP/UDP channel. H.323 annex Q specifies how to build RTP packets from H.224 packets; the FECC protocol is identified by the client ID field within the H.224 packet.
section: "3"
