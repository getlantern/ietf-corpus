document: rfc-9252
kind: interoperability-note
summary: BGP speakers that do not support RFC 9252 may misinterpret the part of the SRv6 SID encoded in MPLS Label fields as MPLS label values for MPLS-based services. Implementations MUST therefore provide per-neighbor and per-service controls to gate advertisement of SRv6-based BGP service routes to peers known to support this specification.
section: 3.2.1
topics:
    - bgp
    - routing
