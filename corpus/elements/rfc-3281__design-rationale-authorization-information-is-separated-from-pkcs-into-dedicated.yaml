document: rfc-3281
kind: design-rationale
summary: Authorization information is separated from PKCs into dedicated ACs because authorization info typically has a different (shorter) lifetime than the identity/key binding, and the PKC issuer is usually not the authoritative source for authorization information, requiring extra steps if embedded in PKCs.
section: "1"
topics:
