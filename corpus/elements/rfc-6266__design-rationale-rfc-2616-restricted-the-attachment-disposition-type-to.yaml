document: rfc-6266
kind: design-rationale
summary: RFC 2616 restricted the 'attachment' disposition type to 'application/octet-stream' content. RFC 6266 removes this restriction because recipients in practice never check the content type for this purpose, and the restriction discouraged proper media type declarations.
section: A
topics:
    - http
