document: rfc-2796
kind: protocol-element
summary: ORIGINATOR_ID is a new optional, non-transitive BGP attribute of Type code 9, 4 bytes long, created by a RR when reflecting a route. It carries the ROUTER_ID of the originator of the route in the local AS.
