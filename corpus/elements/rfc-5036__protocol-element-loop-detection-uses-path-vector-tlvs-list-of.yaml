document: rfc-5036
kind: protocol-element
summary: Loop Detection uses Path Vector TLVs (list of LSR IDs the message traversed, identified by the first 4 octets of LDP Identifier) and Hop Count TLVs (counter of LSRs traversed, 0 means unknown) carried in Label Request and Label Mapping messages. Loop Detection is a configurable option.
section: "2.8"
topics:
    - mpls
    - routing
