document: rfc-9449
kind: protocol-element
summary: Authorization servers and resource servers may provide opaque nonce values via the DPoP-Nonce HTTP header to limit the lifetime of DPoP proofs. Nonce values MUST be unpredictable. Servers respond with use_dpop_nonce error and a DPoP-Nonce header if a required nonce is absent or mismatched.
section: "8"
topics:
    - oauth
    - security
    - http
