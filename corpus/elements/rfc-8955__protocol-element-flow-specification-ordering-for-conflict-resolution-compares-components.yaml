document: rfc-8955
kind: protocol-element
summary: Flow Specification ordering for conflict resolution compares components left-to-right by type number; lower type number has higher precedence. For IP prefixes, more-specific prefixes have higher precedence; for all other types, binary memcmp() ordering is used with longer strings having higher precedence when common prefixes are equal.
section: "5.1"
topics:
