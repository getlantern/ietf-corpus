document: rfc-9462
kind: normative-requirement
summary: DNS resolvers supporting DDR by responding to _dns.resolver.arpa. queries MUST treat resolver.arpa as a locally served zone per RFC 6303, responding to non-SVCB queries for _dns.resolver.arpa. and any subdomain queries with NODATA.
section: "6.4"
rfc2119_level: MUST
topics:
