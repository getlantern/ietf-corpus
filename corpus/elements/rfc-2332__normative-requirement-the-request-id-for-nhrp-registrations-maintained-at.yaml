document: rfc-2332
kind: normative-requirement
summary: The Request ID for NHRP Registrations maintained at each client MUST be kept in non-volatile memory so that after a crash and reregistration the NHS's database remains consistent. Updating non-volatile memory every 50–100 increments (with the client adding that delta after recovery) is suggested.
section: 5.2.3
rfc2119_level: MUST
topics:
    - ip
