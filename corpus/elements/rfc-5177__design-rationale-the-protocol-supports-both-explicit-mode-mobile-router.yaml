document: rfc-5177
kind: design-rationale
summary: The protocol supports both explicit mode (Mobile Router explicitly lists Mobile Network Prefixes in Registration Requests) and implicit mode (Home Agent learns prefixes via AAA, pre-configuration, or dynamic routing). This flexibility accommodates different deployment scenarios without mandating a single signaling approach.
