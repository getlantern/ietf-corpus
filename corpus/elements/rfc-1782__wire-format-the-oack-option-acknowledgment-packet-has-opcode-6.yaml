document: rfc-1782
kind: wire-format
summary: 'The OACK (Option Acknowledgment) packet has opcode 6, followed by null-terminated option/value pairs echoing acknowledged options: opc(6) | opt1 NUL | value1 NUL | ... | optN NUL | valueN NUL. Acknowledged values may differ from requested values as permitted by individual option specifications.'
section: Packet Formats
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
