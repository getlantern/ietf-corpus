document: rfc-9161
kind: normative-requirement
summary: For Proxy ND, the PE MUST snoop NA messages (Ethertype 0x86dd, ICMPv6 type 136) from local CEs and MUST NOT create dynamic IP->MAC entries from NS messages because NS messages do not contain the R Flag required by the reply function.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
