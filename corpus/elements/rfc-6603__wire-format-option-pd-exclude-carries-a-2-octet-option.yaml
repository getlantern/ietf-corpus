document: rfc-6603
kind: wire-format
summary: OPTION_PD_EXCLUDE carries a 2-octet option-code (67), a 2-octet option-len (value 2–17), a 1-octet prefix-len (the excluded prefix length in bits), and a variable-length IPv6 subnet ID (1–16 octets) holding the bits of the excluded prefix that differ from the delegated prefix, left-shifted to a full octet boundary and zero-padded.
