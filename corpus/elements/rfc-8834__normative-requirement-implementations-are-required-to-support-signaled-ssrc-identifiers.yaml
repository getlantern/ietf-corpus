document: rfc-8834
kind: normative-requirement
summary: Implementations are REQUIRED to support signaled SSRC identifiers using the 'a=ssrc:' SDP attribute (RFC 5576) and MUST support random SSRC assignment and SSRC collision detection per RFC 3550. Implementations MUST also be prepared to accept RTP/RTCP packets using SSRCs that have not been explicitly signaled.
section: "4.8"
rfc2119_level: REQUIRED
topics:
    - webrtc
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
