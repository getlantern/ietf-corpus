document: rfc-5949
kind: normative-requirement
summary: In reactive mode, the HI message from the NMAG to the PMAG MUST have the 'P' flag set and include the MN ID. The HAck reply MUST include HNP(s) and/or IPv4-MN-HoA; if requested context is unavailable, Code 131 MUST be returned, and if forwarding is not executable, Code 132 MUST be returned.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
