document: rfc-7909
kind: wire-format
summary: 'A signed RPSL object contains a "signature" attribute with value of the form: "v=rpkiv1; c=<URL>; m=<algorithm>; t=<RFC3339-UTC>; a=<attr1>+<attr2>+...; b=<base64>". The "a" field separates attribute names with "+"; the "b" field carries the base64-encoded signature and is always last.'
