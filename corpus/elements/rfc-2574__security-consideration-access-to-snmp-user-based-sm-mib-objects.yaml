document: rfc-2574
kind: security-consideration
summary: Access to SNMP-USER-BASED-SM-MIB objects, particularly usmUserTable, must be carefully controlled because they contain authentication and privacy keying material. Implementations should ensure read-write access is restricted to authorized management entities only.
section: "11.5"
topics:
    - snmp
    - security
