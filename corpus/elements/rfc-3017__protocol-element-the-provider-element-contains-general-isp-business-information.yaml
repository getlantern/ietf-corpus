document: rfc-3017
kind: protocol-element
summary: The provider element contains general ISP business information including providerName, providerIcon (Base64-encoded JPEG or GIF), wwwURL, generalMailtoURL, billingMailtoURL, and RFC 1274 X.500 directory attributes (street, postalAddress, telephoneNumber, etc.). It carries a required 'id' attribute.
