document: rfc-951
kind: normative-requirement
summary: The server should not depend on the 'vend' field existing or having a recognized format; its presence is optional. When recognized vendor data is provided, the server should take client-specific actions and place a response in the 'vend' field of the reply.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - ip
