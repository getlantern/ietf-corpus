document: rfc-3596
kind: interoperability-note
summary: This document obsoletes RFC 1886 and RFC 3152, replacing the IP6.INT reverse lookup domain with IP6.ARPA as mandated by RFC 3152. Implementations previously using IP6.INT must migrate to IP6.ARPA.
section: Appendix A
topics:
