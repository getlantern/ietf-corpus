document: rfc-5460
kind: protocol-element
summary: QUERY_BY_REMOTE_ID asks the server to return bindings associated with a Relay Agent Remote-ID option value. The query-options MUST include a Relay Agent Remote-ID option (RFC 4649). The server must have recorded Remote-ID values with its bindings to support this query.
section: 5.3.3
topics:
    - dns
