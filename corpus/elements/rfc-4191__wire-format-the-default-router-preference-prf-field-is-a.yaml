document: rfc-4191
kind: wire-format
summary: 'The Default Router Preference (Prf) field is a 2-bit signed integer added to the Router Advertisement message header, occupying bits formerly reserved. Values are: 01=High, 00=Medium (default), 11=Low, 10=Reserved (MUST NOT be sent).'
