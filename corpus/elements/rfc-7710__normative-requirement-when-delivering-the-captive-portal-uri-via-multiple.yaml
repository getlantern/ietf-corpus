document: rfc-7710
kind: normative-requirement
summary: When delivering the captive-portal URI via multiple methods (IPv4 DHCP, IPv6 DHCP, IPv6 RA), the captive-portal operator should ensure that the URIs handed out are equivalent to reduce the chance of operational problems.
section: "2"
rfc2119_level: SHOULD
