document: rfc-4875
kind: wire-format
summary: The Resv message FF flow descriptor and SE filter spec are extended with an S2L sub-LSP flow descriptor list; each entry is an S2L_SUB_LSP object optionally followed by a P2MP_SECONDARY_RECORD_ROUTE object (SRRO). The first S2L sub-LSP's recorded route goes in the main RRO.
