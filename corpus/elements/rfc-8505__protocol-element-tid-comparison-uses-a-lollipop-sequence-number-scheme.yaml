document: rfc-8505
kind: protocol-element
summary: 'TID comparison uses a lollipop sequence number scheme per RFC 1982: values 128–255 form a linear bootstrap region, values 0–127 form a circular sequence space. A SEQUENCE_WINDOW of 16 (2^4) governs comparability; values more than 16 apart in the circular region are deemed not comparable.'
section: 5.2.1
topics:
