kind: protocol-element
summary: 'Three timer value types are defined: timer-value-seconds16 (uint16, seconds), timer-value-seconds32 (uint32, seconds), and timer-value-milliseconds (uint32, milliseconds). All three support special enumeration values ''infinity'' and ''not-set'' in addition to numeric ranges.'
