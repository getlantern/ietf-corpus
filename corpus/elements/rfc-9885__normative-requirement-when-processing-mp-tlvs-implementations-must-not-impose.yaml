document: rfc-9885
kind: normative-requirement
summary: When processing MP-TLVs, implementations MUST NOT impose a minimum length check. Receivers MUST NOT reject MP-TLVs if senders do not strictly adhere to the constraint that MP-TLVs SHOULD NOT be sent unless the 255-octet capacity of a single TLV is exceeded.
section: "5"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
