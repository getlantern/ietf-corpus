document: rfc-2726
kind: normative-requirement
summary: Key certificates submitted for creating a key-cert object must contain a self-signature of the key. Additional signatures are allowed but it is recommended to submit certificates with as few signatures as possible.
section: "4"
rfc2119_level: MUST
