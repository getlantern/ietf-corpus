document: rfc-8398
kind: security-consideration
summary: Use of Unicode in the email local-part introduces the risk of visually similar and identical characters (homograph attacks) that can be exploited to deceive certificate relying parties. Implementers are referred to RFC 5890 Section 4.4, RFC 6532 Section 4, and [WEBER] for mitigations.
section: "7"
topics:
    - security
    - pkix
    - email
