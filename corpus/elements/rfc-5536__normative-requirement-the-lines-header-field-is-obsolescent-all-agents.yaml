document: rfc-5536
kind: normative-requirement
summary: 'The Lines header field is obsolescent: all agents SHOULD ignore it and SHOULD NOT generate it. Its historical use by the NNTP overview facility is deprecated, and it is likely to be removed entirely in a future version of this standard.'
section: 3.3.1
rfc2119_level: SHOULD NOT
