document: rfc-3539
kind: normative-requirement
summary: AAA Servers MUST support TCP and SCTP. AAA clients SHOULD support SCTP, but MUST support TCP if SCTP is not available. AAA agents inherit all the obligations of Servers with respect to transport support.
