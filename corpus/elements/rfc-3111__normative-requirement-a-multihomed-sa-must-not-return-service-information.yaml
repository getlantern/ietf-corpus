document: rfc-3111
kind: normative-requirement
summary: A multihomed SA MUST NOT return service information for services in a different zone than the request's zone. The SA MUST NOT send a registration to a DA for a service present in a different zone, and MUST register services with DAs present in the same zone.
section: 4.2.4.3
rfc2119_level: MUST NOT
topics:
    - multicast
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
