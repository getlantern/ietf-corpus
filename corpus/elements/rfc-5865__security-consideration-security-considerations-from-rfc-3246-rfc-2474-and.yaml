document: rfc-5865
kind: security-consideration
summary: Security considerations from RFC 3246, RFC 2474, and RFC 4542 apply to VOICE-ADMIT. RFC 4230's analysis of RSVP security (Section 6) is relevant specifically to the UNI use of RSVP advocated by this document, noting that this document recommends RSVP only at the UNI rather than end-to-end.
