document: rfc-5910
kind: wire-format
summary: 'The <secDNS:keyData> element''s fields encode as: <secDNS:flags> as unsignedShort (16-bit DNSKEY flags field), <secDNS:protocol> as unsignedByte (must be 3 per RFC 4034), <secDNS:alg> as unsignedByte (algorithm number), and <secDNS:pubKey> as base64Binary with minimum length of 1. These four fields together uniquely identify a DNSKEY record.'
section: "4.2"
topics:
    - dns
    - security
    - crypto
