document: rfc-8796
kind: protocol-element
summary: The B-SFRR-Active Extended ASSOCIATION object is sent by the PLR node within the RSVP Path message of the bypass tunnel after a failure, informing the MP that one or more groups of protected LSPs (identified by Bypass_Group_Identifiers) are being rerouted over the bypass tunnel. It carries a shared RSVP_HOP object, TIME_VALUES, and tunnel sender address applicable to all identified groups.
section: "3.2"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
