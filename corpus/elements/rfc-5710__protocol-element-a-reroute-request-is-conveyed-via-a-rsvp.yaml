document: rfc-5710
kind: protocol-element
summary: A reroute request is conveyed via a RSVP PathErr message carrying an ERROR_SPEC object. The address and TLVs in the ERROR_SPEC identify the resource to be avoided; the error code and value indicate the type of reroute request. This mechanism enables non-disruptive LSP rerouting without removing state.
section: "2"
topics:
    - mpls
    - routing
