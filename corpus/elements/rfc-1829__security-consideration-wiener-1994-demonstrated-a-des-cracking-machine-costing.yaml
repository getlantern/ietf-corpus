document: rfc-1829
kind: security-consideration
summary: Wiener (1994) demonstrated a DES cracking machine costing $1 million that can crack one key every 3.5 hours, making brute-force key recovery extremely practical. DES is not considered adequate for protecting moderate-value information; Triple DES is recommended instead.
section: Security Considerations
