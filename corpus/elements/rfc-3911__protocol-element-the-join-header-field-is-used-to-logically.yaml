document: rfc-3911
kind: protocol-element
summary: The Join header field is used to logically join an existing SIP dialog with a new SIP dialog. It contains the call-id, to-tag, and from-tag of the target dialog, and is only valid in INVITE requests. It enables features such as barge-in, message screening, and call center monitoring.
section: "7.1"
topics:
    - sip
    - realtime
