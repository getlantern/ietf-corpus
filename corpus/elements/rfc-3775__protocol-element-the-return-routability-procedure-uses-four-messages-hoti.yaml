document: rfc-3775
kind: protocol-element
summary: The Return Routability Procedure uses four messages (HoTI, CoTI, HoT, CoT) to verify that the mobile node is reachable at both its home address and care-of address before authorizing a Binding Update to a correspondent node. It produces binding management key Kbm = SHA1(home keygen token | care-of keygen token), computed using HMAC_SHA1 over the node key and nonces.
section: 5.2.5
topics:
    - security
    - crypto
    - ip
    - mobility
