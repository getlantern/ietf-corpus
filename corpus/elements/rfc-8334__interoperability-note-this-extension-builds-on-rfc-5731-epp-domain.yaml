document: rfc-8334
kind: interoperability-note
summary: This extension builds on RFC 5731 (EPP domain name mapping) and RFC 7848 (mark and signed mark formats). The <mark:mark> and <smd:signedMark> elements and their schemas are defined in RFC 7848 and imported by the launch schema; new mark formats can be supported by substituting for the <mark:abstractMark> element.
section: 2.6.2
topics:
