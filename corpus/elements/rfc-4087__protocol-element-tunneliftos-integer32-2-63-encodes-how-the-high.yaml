summary: 'tunnelIfTOS (Integer32, -2..63) encodes how the high 6 bits (DSCP) of the outer IP TOS/Traffic Class are set: -1 means copied from payload, -2 means a traffic conditioner is invoked, and 0–63 sets the field directly.'
