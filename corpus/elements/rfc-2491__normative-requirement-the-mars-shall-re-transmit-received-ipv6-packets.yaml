document: rfc-2491
kind: normative-requirement
summary: 'The MARS SHALL re-transmit received IPv6 packets by checking group membership: if all group members have open pt-pt VCs to the MARS, the packet is sent over those VCs; if any member lacks an open VC or no members exist, the packet is sent over ClusterControlVC only.'
section: 3.1.1
rfc2119_level: SHALL
topics:
    - ip
    - v6ops
