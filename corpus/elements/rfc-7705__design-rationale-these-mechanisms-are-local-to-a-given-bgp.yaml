document: rfc-7705
kind: design-rationale
summary: These mechanisms are local to a given BGP speaker and do not require negotiation with or cooperation of BGP neighbors. Slight variations between vendor implementations exist and will not necessarily be harmonized, since interworking between the variations is not required to accomplish migration goals.
