document: rfc-1427
kind: security-consideration
summary: 'The SIZE extension can facilitate crude service denial attacks: the SIZE parameter and extended MAIL command make it somewhat quicker and easier to craft an effective denial-of-service attempt. However, unless implementations are very weak, no new vulnerability is introduced that did not already exist in SMTP.'
