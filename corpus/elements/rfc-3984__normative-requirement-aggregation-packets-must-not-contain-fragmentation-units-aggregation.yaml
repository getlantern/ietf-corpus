document: rfc-3984
kind: normative-requirement
summary: Aggregation packets MUST NOT contain fragmentation units. Aggregation packets MUST NOT be nested (an aggregation packet MUST NOT contain another aggregation packet). Total size SHOULD be chosen so the resulting IP packet is smaller than the path MTU.
section: "5.7"
rfc2119_level: MUST NOT
topics:
