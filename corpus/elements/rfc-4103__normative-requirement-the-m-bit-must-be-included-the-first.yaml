document: rfc-4103
kind: normative-requirement
summary: The M-bit MUST be included. The first packet in a session and the first packet after an idle period SHOULD have the marker bit set to one; all other packets MUST have the marker bit set to zero. Receipt of the M-bit MAY be used for refined loss detection methods.
section: "3.5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
