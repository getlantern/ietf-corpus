document: rfc-8500
kind: normative-requirement
summary: When multiple non-DIS nodes send Reverse Metric TLVs with the W bit set, the DIS MUST use the reverse metric of the highest source MAC address non-DIS advertising the Reverse Metric TLV with the W bit set.
