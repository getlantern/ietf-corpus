document: rfc-6432
kind: security-consideration
summary: A wrong Q.850 cause code in the Reason header field could cause unintended behavior, such as an announcement system playing incorrect information. It is RECOMMENDED that the Reason header field be protected by a suitable integrity mechanism such as TLS or IPsec.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - security
    - voip
    - tls
    - ipsec
