document: rfc-3263
kind: normative-requirement
summary: A client resolving a SIPS URI MUST discard any NAPTR service fields that do not contain 'SIPS' as the protocol. A client resolving a SIP URI SHOULD retain SIPS records if TLS is supported.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - dns
    - security
