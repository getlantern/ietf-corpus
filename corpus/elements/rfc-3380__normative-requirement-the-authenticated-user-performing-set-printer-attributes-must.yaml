document: rfc-3380
kind: normative-requirement
summary: The authenticated user performing Set-Printer-Attributes MUST be an operator or administrator of the Printer object. Most Printer attributes require administrator access rights (e.g., 'xxx-supported'), while some require only operator rights (e.g., 'media-ready', 'printer-message-from-operator').
section: 4.1.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
