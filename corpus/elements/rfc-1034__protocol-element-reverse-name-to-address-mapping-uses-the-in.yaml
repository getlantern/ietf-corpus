document: rfc-1034
kind: protocol-element
summary: 'Reverse name-to-address mapping uses the IN-ADDR.ARPA domain: the octets of an IPv4 address are reversed and suffixed with ''IN-ADDR.ARPA'', then a PTR query retrieves the canonical host name. For example, 1.2.3.4 maps to ''4.3.2.1.IN-ADDR.ARPA''.'
section: 5.2.1
topics:
    - dns
