document: rfc-5052
kind: protocol-element
summary: The FEC Payload ID contains information indicating to the FEC decoder the relationships between encoding symbols in a packet and the FEC encoding transformation. It is defined by the FEC scheme and carried within data packets as specified by the CDP. Its size SHOULD be a small fraction of the packet size.
section: "6.3"
topics:
    - multicast
