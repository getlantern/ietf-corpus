document: rfc-7854
kind: normative-requirement
summary: Once a router has sent a Termination message it MUST close the TCP session without sending any further messages. Likewise, the monitoring station MUST close the TCP session after receiving a Termination message.
section: "4.5"
rfc2119_level: MUST
topics:
    - bgp
    - measurement
    - tcp
