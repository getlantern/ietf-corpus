document: rfc-6788
kind: normative-requirement
summary: After sending a tunneled RA, the Edge Router MUST store the mapping between the LIO and the prefixes in the RA, then MUST initiate periodic unsolicited tunneled RAs for that LIO per RFC 4861 Section 6.2.3.
section: "6.3"
rfc2119_level: MUST
topics:
