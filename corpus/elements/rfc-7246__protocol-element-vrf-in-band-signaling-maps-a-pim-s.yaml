document: rfc-7246
kind: protocol-element
summary: VRF in-band signaling maps a PIM (S,G) or (*,G) tree to an mLDP multipoint FEC expressed as an ordered pair {root=<Upstream-PE>; opaque_value=<S or RPA, G, Upstream-RD>}. When the UMH and upstream PE share an IP address, the root is set to the upstream PE address.
section: "2"
