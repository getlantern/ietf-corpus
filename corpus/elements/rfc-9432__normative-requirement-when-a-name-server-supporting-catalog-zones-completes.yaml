document: rfc-9432
kind: normative-requirement
summary: When a name server supporting catalog zones completes a transfer, it SHOULD apply changes automatically without manual intervention. When a catalog zone becomes broken, member zones configured by it MUST NOT be removed or reconfigured; the catalog loses its meaning until repaired.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
