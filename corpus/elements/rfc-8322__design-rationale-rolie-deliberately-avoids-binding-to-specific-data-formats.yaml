document: rfc-8322
kind: design-rationale
summary: ROLIE deliberately avoids binding to specific data formats or information categories. Format agnosticism is achieved by having Entries declare their data model via rolie:format and by using IANA-registered extensible information type categories, allowing producers to support multiple isomorphic formats and consumers to select the most suitable one without protocol constraints.
