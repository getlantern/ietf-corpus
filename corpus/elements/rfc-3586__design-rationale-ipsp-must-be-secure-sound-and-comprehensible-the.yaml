document: rfc-3586
kind: design-rationale
summary: 'IPSP must be secure, sound, and comprehensible: the difficulty of understanding a policy should be proportional to the problem complexity. The security-critical parts should be small and well-specified enough to allow verification, ideally compatible with formal methods.'
