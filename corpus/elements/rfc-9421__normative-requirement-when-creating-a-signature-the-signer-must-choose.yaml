document: rfc-9421
kind: normative-requirement
summary: When creating a signature, the signer MUST choose key material appropriate for the algorithm and MUST include @signature-params as the last covered component. Signers SHOULD include message control data (e.g., @method, @authority, @target-uri) and SHOULD include the created signature parameter.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
