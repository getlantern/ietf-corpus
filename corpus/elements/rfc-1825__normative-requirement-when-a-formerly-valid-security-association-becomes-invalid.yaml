document: rfc-1825
kind: normative-requirement
summary: When a formerly valid Security Association becomes invalid, the destination system SHOULD NOT immediately reuse that SPI value and instead SHOULD let that SPI value become stale before reusing it for another Security Association.
section: "1.4"
rfc2119_level: SHOULD NOT
topics:
