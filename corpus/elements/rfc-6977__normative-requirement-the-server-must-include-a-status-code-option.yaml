document: rfc-6977
kind: normative-requirement
summary: The server MUST include a Status Code Option in the Reconfigure-Reply indicating whether the request was successfully processed, failed, or partially failed. UnspecFail MUST be returned for malformed requests, NotAllowed if the server is not configured to allow Reconfigure-Request, and NotConfigured if the server has no record of the link.
section: "6.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
