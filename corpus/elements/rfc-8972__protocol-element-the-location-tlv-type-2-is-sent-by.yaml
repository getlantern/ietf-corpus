document: rfc-8972
kind: protocol-element
summary: The Location TLV (Type 2) is sent by the Session-Sender to query the Session-Reflector's address information. It contains Destination Port (2 octets), Source Port (2 octets), and optional sub-TLVs for MAC addresses and IP addresses (EUI-48, EUI-64, IPv4, IPv6).
