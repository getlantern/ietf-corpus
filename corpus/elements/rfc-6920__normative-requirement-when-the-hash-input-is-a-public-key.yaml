document: rfc-6920
kind: normative-requirement
summary: When the hash input is a public key, the hash SHOULD be calculated over the public key in an X.509 SubjectPublicKeyInfo structure (RFC 5280 Section 4.1), chosen for compatibility with the DANE TSLA protocol (RFC 6698) and to include relevant public key parameters.
