document: rfc-5386
kind: normative-requirement
summary: If no matching non-BTNS PAD entries are found for a peer, the peer's ID MUST be coerced to type 'PUBLICKEY' with the peer's public key as its value, and the PAD is then searched again for matching BTNS PAD entries.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
