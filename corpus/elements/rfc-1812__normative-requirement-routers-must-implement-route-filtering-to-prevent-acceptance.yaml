document: rfc-1812
kind: normative-requirement
summary: Routers MUST implement route filtering to prevent acceptance of routes with invalid or inappropriate address prefixes, including martian prefixes, overly-specific prefixes (host routes that should not be propagated), and routes that violate AS policy.
section: "7.5"
rfc2119_level: MUST
topics:
