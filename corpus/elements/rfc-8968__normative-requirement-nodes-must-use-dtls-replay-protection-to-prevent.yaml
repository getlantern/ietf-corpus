document: rfc-8968
kind: normative-requirement
summary: Nodes MUST use DTLS replay protection to prevent attackers from replaying stale information. Nodes SHOULD drop packets that have been reordered by more than two IHU intervals.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - security
