document: rfc-9509
kind: protocol-element
summary: id-kp-jwt (OID 1.3.6.1.5.5.7.3.37) is a new KeyPurposeId for use in the EKU extension of X.509 v3 certificates, indicating the certificate's public key is certified for validating the JWS Signature in a JWT (e.g., Client Credentials Assertion in 5G). The KU extension must be set to digitalSignature or nonRepudiation.
section: "4"
topics:
