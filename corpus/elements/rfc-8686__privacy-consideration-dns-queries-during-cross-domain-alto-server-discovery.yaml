document: rfc-8686
kind: privacy-consideration
summary: DNS queries during cross-domain ALTO server discovery can reveal to eavesdroppers that a client is using ALTO and which IP address it is optimizing traffic for. DNS over TLS (RFC 7858) and DNS over HTTPS (RFC 8484) can protect confidentiality of these queries.
section: "6.4"
topics:
    - privacy
    - dns
    - tls
