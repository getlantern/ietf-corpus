document: rfc-3265
kind: security-consideration
summary: To prevent man-in-the-middle attacks, implementations SHOULD provide integrity protection across 'Contact', 'Route', 'Expires', 'Event', and 'To' headers of SUBSCRIBE messages, and across 'Call-ID', 'CSeq', 'Subscription-State' headers and bodies of NOTIFY messages.
section: "5.5"
topics:
