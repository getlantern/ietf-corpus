document: rfc-7160
kind: normative-requirement
summary: 'To accelerate lip synchronization, the next compound RTCP packet sent by the RTP sender MUST contain multiple SR packets: the first containing the mapping for the current clock rate and subsequent SR packets containing mappings for other clock rates seen during the last period.'
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
