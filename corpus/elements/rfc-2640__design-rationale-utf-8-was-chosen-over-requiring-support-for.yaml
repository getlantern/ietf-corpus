document: rfc-2640
kind: design-rationale
summary: UTF-8 was chosen over requiring support for multiple character sets because its single-byte range is identical to ASCII, allowing old ASCII-only clients to interoperate with new UTF-8 servers. A single universal encoding assures global interoperability without complex negotiation of arbitrary character set pairs.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
