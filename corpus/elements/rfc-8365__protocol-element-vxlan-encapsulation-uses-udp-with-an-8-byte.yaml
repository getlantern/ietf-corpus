document: rfc-8365
kind: protocol-element
summary: VXLAN encapsulation uses UDP with an 8-byte header following the UDP header, providing a 24-bit VNI that typically maps one-to-one to the tenant VID. In the default mode, the ingress VTEP does not include an inner VLAN tag and the egress VTEP discards frames with an inner VLAN tag.
section: "5.1"
topics:
    - routing
    - mpls
