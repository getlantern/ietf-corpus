document: rfc-9444
kind: protocol-element
summary: The subdomainAuthAllowed field is a new optional boolean field added to the ACME authorization object. When true, it indicates that ACME server policy allows certificates to be issued for any subdomain subordinate to the domain specified in the identifier field. If not present, the assumed default value is false.
section: "4.1"
topics:
