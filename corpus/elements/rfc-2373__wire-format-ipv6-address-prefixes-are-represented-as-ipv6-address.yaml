document: rfc-2373
kind: wire-format
summary: IPv6 address prefixes are represented as ipv6-address/prefix-length in CIDR-like notation, where prefix-length is a decimal value specifying the number of leftmost contiguous bits comprising the prefix. Trailing zeros within a 16-bit chunk of the address must not be dropped.
section: "2.3"
topics:
