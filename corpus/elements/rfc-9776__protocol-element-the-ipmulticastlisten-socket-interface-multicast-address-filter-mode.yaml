document: rfc-9776
kind: protocol-element
summary: The IPMulticastListen(socket, interface, multicast-address, filter-mode, source-list) service interface allows upper-layer protocols to request reception of packets to a multicast address in either INCLUDE mode (only listed sources) or EXCLUDE mode (all sources except listed). Join is equivalent to EXCLUDE with empty source-list; Leave is equivalent to INCLUDE with empty source-list.
section: "2"
topics:
