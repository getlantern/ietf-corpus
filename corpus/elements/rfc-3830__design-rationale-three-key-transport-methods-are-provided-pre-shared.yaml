document: rfc-3830
kind: design-rationale
summary: 'Three key transport methods are provided: pre-shared key (symmetric-only, most efficient, limited scalability), public-key encryption (scalable via PKI, envelope key may be cached as a pre-shared key for subsequent sessions), and Diffie-Hellman (perfect forward secrecy, highest resource cost). Only PSK and PK methods are mandatory to implement; DH is optional.'
section: "3"
