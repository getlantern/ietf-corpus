document: rfc-3339
kind: normative-requirement
summary: A gateway host that corrects local times for transmission to other Internet hosts MUST correct unqualified local times. Unqualified local time is deemed unacceptable for Internet use because it fails interoperability in approximately 23/24 of the globe.
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
