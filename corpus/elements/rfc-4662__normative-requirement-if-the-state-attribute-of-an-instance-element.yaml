document: rfc-4662
kind: normative-requirement
summary: If the 'state' attribute of an <instance> element indicates 'terminated', then a 'reason' attribute MUST also be present with values and meanings as defined for the 'reason' parameter on the 'Subscription-State' header field in RFC 3265.
section: "5.5"
rfc2119_level: MUST
topics:
