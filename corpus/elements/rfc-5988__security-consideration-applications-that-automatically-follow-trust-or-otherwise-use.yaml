document: rfc-5988
kind: security-consideration
summary: Applications that automatically follow, trust, or otherwise use links gathered from HTTP headers open attack vectors. In particular, Link headers using the 'anchor' parameter to associate a link's context with another resource should be treated with due caution.
section: "7"
topics:
