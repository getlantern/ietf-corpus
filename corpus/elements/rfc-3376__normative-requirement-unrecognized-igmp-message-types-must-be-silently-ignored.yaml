document: rfc-3376
kind: normative-requirement
summary: Unrecognized IGMP message types MUST be silently ignored. An IGMPv3 implementation MUST also support message types 0x12 (IGMPv1 Membership Report), 0x16 (IGMPv2 Membership Report), and 0x17 (IGMPv2 Leave Group) for interoperation with previous IGMP versions.
section: "4"
rfc2119_level: MUST
topics:
    - multicast
