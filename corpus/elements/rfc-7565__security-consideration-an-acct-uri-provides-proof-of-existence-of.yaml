document: rfc-7565
kind: security-consideration
summary: An 'acct' URI provides proof of existence of the account, so harvesting published 'acct' URIs could be useful to spammers and attackers who may leverage the URI to obtain more information (e.g., via WebFinger) or interact with protocol-specific URIs whose user@host matches the 'acct' URI.
section: "5"
topics:
    - security
    - privacy
