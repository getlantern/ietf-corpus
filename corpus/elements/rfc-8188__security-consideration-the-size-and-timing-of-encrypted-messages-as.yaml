document: rfc-8188
kind: security-consideration
summary: The size and timing of encrypted messages, as well as HTTP methods and URIs, can leak sensitive information (citing NETFLIX and CLINIC traffic-analysis research). Mitigations include padding, splitting content into separately stored segments, or combining HTTP/2 with TLS to obscure individual message sizes.
section: "4.8"
topics:
    - http
    - privacy
    - security
