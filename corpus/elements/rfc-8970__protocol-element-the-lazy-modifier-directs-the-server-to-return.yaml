document: rfc-8970
kind: protocol-element
summary: The LAZY modifier directs the server to return the preview only if it can be provided without undue delay. If the server cannot comply without undue delay, it MUST return NIL. The LAZY modifier MUST be implemented by any server that supports the PREVIEW extension.
section: "4.1"
topics:
