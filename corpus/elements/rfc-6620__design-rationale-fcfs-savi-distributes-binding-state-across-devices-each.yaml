document: rfc-6620
kind: design-rationale
summary: 'FCFS SAVI distributes binding state across devices: each FCFS SAVI device stores only bindings for source addresses arriving through its own Validating Ports. NS/NA messages are used to maintain coherency so no two devices bind the same IP address to different anchors simultaneously.'
section: "2.5"
topics:
