document: rfc-2249
kind: design-rationale
summary: Groups are intentionally allowed to overlap so that implementors can provide different 'views' of MTA operation. The mtaTable always provides accurate whole-MTA totals; summing group variables may therefore not equal mtaTable values. Groups should be all-inclusive if groups are implemented at all.
