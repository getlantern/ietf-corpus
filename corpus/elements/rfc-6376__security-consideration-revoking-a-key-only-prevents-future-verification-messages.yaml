document: rfc-6376
kind: security-consideration
summary: Revoking a key only prevents future verification; messages sent while a key was valid and cached by a Verifier may still appear valid. The gap between key compromise and effective revocation propagation is a fundamental limitation.
section: "8.7"
topics:
