document: rfc-9625
kind: normative-requirement
summary: When IR is used, each EVPN PE MUST originate an SBD-IMET route. The SBD-IMET route MUST carry a PTA whose MPLS Label field specifies a downstream-assigned label mapping uniquely to the SBD at the originating PE.
section: 3.2.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
