summary: A conference object provides the logical representation of a conference instance at a specific lifecycle stage (blueprint, reservation, active, completed). It is the central data structure of the framework, accessed via the conference control protocol and represented using an extensible conference information type (XML schema) defined in XCON-COMMON.
