document: rfc-7571
kind: registry
summary: IANA updated the allocation rule for ERO subobject types in the range 5-31 (0x05-0x1F) in the RSVP 'Class Names, Class Numbers, and Class Types' registry to label them 'Unassigned (For explicit resource identification)', reserving this range for identifying specific entities where loopback can occur.
