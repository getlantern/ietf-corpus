document: rfc-5023
kind: protocol-element
summary: The 'edit-media' link relation specifies an IRI that can be used to modify the Media Resource associated with an atom:entry. An entry MAY contain zero or more edit-media links, but MUST NOT contain more than one with the same 'type' and 'hreflang' attribute values; all edit-media links in the same entry reference the same Resource.
section: "11.2"
topics:
    - http
    - registry
