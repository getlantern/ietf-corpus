document: rfc-3761
kind: interoperability-note
summary: Some nameserver implementations (e.g., BIND) may insert additional A records into DNS responses for domains found in NAPTR records. DNS servers MAY interpret Flag values to include appropriate additional resource records; clients are encouraged but not required to check for this additional information.
section: "2.4"
topics:
    - dns
