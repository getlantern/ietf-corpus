document: rfc-6454
kind: security-consideration
summary: The same-origin policy relies on DNS for security because many URI schemes use DNS-based naming authorities. If DNS is compromised, the same-origin policy may fail to provide required security properties. HTTPS URIs are more resistant due to certificate-based verification.
section: "8.1"
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
