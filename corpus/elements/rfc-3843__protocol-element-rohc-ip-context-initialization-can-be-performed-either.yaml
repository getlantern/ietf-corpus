document: rfc-3843
kind: protocol-element
summary: ROHC IP context initialization can be performed either via an IR packet (profile 0x0004, static chain ending at a non-IP Next Header) or by reusing an existing context via an IR-DYN packet. In both cases, SN is initialized to a random value when the first such packet is sent.
section: "3.5"
topics:
