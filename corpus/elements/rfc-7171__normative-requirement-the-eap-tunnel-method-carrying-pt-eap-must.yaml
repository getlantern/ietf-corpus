document: rfc-7171
kind: normative-requirement
summary: The EAP tunnel method carrying PT-EAP MUST provide strong cryptographic authentication, integrity, and confidentiality protection to protect against NEA assessment message theft. The PT protocol MUST support mutual authentication, integrity, confidentiality, and replay protection (requirement PT-2 from RFC 5209).
section: "5"
rfc2119_level: MUST
topics:
