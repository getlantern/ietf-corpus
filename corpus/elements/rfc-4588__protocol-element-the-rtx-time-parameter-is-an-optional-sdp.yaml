document: rfc-4588
kind: protocol-element
summary: The "rtx-time" parameter is an OPTIONAL SDP/MIME parameter specifying in milliseconds (from first transmission) how long a sender keeps an original RTP packet in its retransmission buffer. Absence of this parameter means the maximum retransmission time is undefined.
section: "8.1"
topics:
