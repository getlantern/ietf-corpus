document: rfc-1905
kind: normative-requirement
summary: A conformant implementation MUST never generate messages larger than allowed by the receiving SNMPv2 entity. Each transport mapping specifies the minimum message size an implementation must be able to produce or consume.
section: "2.5"
rfc2119_level: MUST
topics:
    - snmp
