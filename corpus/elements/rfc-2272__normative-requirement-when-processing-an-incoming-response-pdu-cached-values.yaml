document: rfc-2272
kind: normative-requirement
summary: When processing an incoming Response-PDU, cached values for snmpEngineID, securityModel, securityName, securityLevel, contextEngineID, and contextName MUST match the corresponding fields extracted from the incoming message; any mismatch causes the message to be discarded.
section: "7.2"
rfc2119_level: MUST
