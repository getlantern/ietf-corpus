document: rfc-5357
kind: normative-requirement
summary: The Server SHOULD use the DSCP value from the Control-Client's TCP SYN in all subsequent packets on that control connection. The Control-Client MAY set a desired DSCP value for all packets of a specific control connection.
section: "3.1"
rfc2119_level: SHOULD
