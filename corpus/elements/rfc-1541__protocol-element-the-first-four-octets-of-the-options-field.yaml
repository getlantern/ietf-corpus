document: rfc-1541
kind: protocol-element
summary: The first four octets of the 'options' field MUST contain the magic cookie decimal values 99, 130, 83, 99 (matching RFC 1497). Subsequent option data consists of tagged TLV parameters; the last option must always be the 'end' option.
