document: rfc-4364
kind: design-rationale
summary: 'Route Reflectors are used in place of a full IBGP mesh among PE routers for scalability. Two partitioning strategies are described: pre-configuring each RR with a static block of Route Targets, or dynamically deriving the RT set from the routes received from client PEs. Both approaches allow VPN Join/Prune operations to be non-disruptive via BGP route refresh.'
section: 4.3.3
topics:
    - bgp
    - vpn
