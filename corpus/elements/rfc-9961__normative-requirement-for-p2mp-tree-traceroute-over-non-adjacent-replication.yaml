document: rfc-9961
kind: normative-requirement
summary: For P2MP tree traceroute over non-adjacent Replication segments connected via a unicast path, the TTL mode MUST be set to Pipe Mode on the router where the unicast path starts, to ensure the traceroute packet reaches the downstream Replication segment.
section: 3.1.3
rfc2119_level: MUST
topics:
    - mpls
    - measurement
