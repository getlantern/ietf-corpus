document: rfc-6285
kind: wire-format
summary: 'RTCP feedback common packet format for RAMS messages: V(2 bits)=2, P(1 bit), FMT(5 bits)=6, PT(8 bits)=205 (RTPFB), Length(16 bits), SSRC of packet sender (32 bits), SSRC of media source (32 bits), followed by variable-length FCI. Individual RAMS messages are distinguished by a sub-feedback message type (SFMT) field within the FCI.'
