document: rfc-4250
kind: registry
summary: IANA registry for SSH_MSG_DISCONNECT 'reason code' (uint32) and associated human-readable 'description'. Initial assignments define 15 reason codes including SSH_DISCONNECT_HOST_NOT_ALLOWED_TO_CONNECT (1) through SSH_DISCONNECT_ILLEGAL_USER_NAME (15). New values in 0x00000010–0xFDFFFFFF require IETF CONSENSUS; 0xFE000000–0xFFFFFFFF is PRIVATE USE.
section: "4.2"
topics:
    - registry
    - security
