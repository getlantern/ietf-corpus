document: rfc-9358
kind: design-rationale
summary: The VIRTUAL-NETWORK-TLV is defined as a separate mandatory TLV (rather than encoding the VN name directly in the ASSOCIATION object) to allow the identifier to be of variable length and to remain extensible via optional vendor-specific information in VENDOR-INFORMATION-TLV.
