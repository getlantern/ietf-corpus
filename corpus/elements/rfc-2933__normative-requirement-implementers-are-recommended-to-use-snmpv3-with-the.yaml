document: rfc-2933
kind: normative-requirement
summary: Implementers are recommended to use SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) to secure access to this MIB. SNMPv1 alone is considered an insecure environment even on a network secured by IPsec.
section: "5"
rfc2119_level: RECOMMENDED
topics:
