document: rfc-7643
kind: normative-requirement
summary: Binary attribute values MUST be base64 encoded per RFC 4648 Section 4; URL-safe encoding per Section 5 MAY be specified. Complex attributes MUST NOT contain sub-attributes that themselves have sub-attributes (no nesting beyond one level).
section: 2.3.6
rfc2119_level: MUST
