document: rfc-6408
kind: protocol-element
summary: The extended S-NAPTR service field uses the tag format 'aaa+ap<appln-id>' where appln-id is the Diameter Application Identifier expressed as a decimal integer without leading zeros. This allows a querying node to discover which Diameter applications a peer supports without performing a capability exchange.
section: "3"
topics:
