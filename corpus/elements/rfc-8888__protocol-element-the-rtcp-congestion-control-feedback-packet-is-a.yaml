document: rfc-8888
kind: protocol-element
summary: The RTCP Congestion Control Feedback Packet is a Transport-Layer Feedback Message using RTCP packet type 205 (PT=205) and FMT=11. It carries per-packet reception quality information grouped by SSRC, enabling sender-based congestion control for RTP flows.
