document: rfc-8366
kind: normative-requirement
summary: When an 'idevid-issuer' field is present, a pledge MUST ensure that its IDevID Authority Key Identifier matches this value; if no match occurs, the pledge MUST NOT process the voucher. When issuing a voucher, the MASA MUST populate this field for serial-numbers not otherwise unique within the MASA's scope.
section: "5.3"
rfc2119_level: MUST
topics:
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
