document: rfc-6438
kind: normative-requirement
summary: The hash algorithm used at intermediate routers for ECMP and/or LAG MUST minimally include the 3-tuple {dest addr, source addr, flow label} and MAY also include the remaining 5-tuple components {protocol, dest port, source port}.
