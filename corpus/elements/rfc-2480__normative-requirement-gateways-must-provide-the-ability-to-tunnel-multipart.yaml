document: rfc-2480
kind: normative-requirement
summary: Gateways MUST provide the ability to tunnel multipart/signed and multipart/encrypted objects as monolithic entities if there is any chance that MIME capabilities exist on the non-MIME side. No changes to the multipart content are permitted, even when the content is itself a composite MIME object.
section: "4"
rfc2119_level: MUST
topics:
    - security
    - email
