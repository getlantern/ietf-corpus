document: rfc-5969
kind: wire-format
summary: 'The 6rd DHCPv4 option (OPTION_6RD, code 212) carries: 1-octet OPTION_6RD code, 1-octet option-length, 1-octet IPv4MaskLen, 1-octet 6rdPrefixLen, 16-octet 6rdPrefix, and one or more 4-octet 6rdBRIPv4Address fields. Minimum length is 22 octets with one BR address.'
