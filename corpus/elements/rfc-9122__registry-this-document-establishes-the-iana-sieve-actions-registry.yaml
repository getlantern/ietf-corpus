document: rfc-9122
kind: registry
summary: This document establishes the IANA "Sieve Actions" registry to catalog all actions defined by Sieve extensions, enabling developers and extension writers to track interactions between different extensions. Registration of actions from both RFCs and vendor-specific documentation is allowed and encouraged.
