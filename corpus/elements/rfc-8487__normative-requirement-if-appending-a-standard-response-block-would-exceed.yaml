document: rfc-8487
kind: normative-requirement
summary: If appending a Standard Response Block would exceed the Incoming Interface MTU (or 1280 bytes for IPv6), the router MUST set the last Standard Response Block's Forwarding Code to NO_SPACE, send the current Request as a Reply, and continue with a new Request carrying an Augmented Response Block indicating the count of returned blocks.
section: 4.3.3
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
