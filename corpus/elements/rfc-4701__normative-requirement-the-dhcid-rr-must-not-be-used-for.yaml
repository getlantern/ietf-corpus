document: rfc-4701
kind: normative-requirement
summary: The DHCID RR MUST NOT be used for any purpose other than that detailed in RFC 4703 (FQDN conflict resolution). New data formats may only be defined through actions of the DHC Working Group via revision of RFC 4703.
