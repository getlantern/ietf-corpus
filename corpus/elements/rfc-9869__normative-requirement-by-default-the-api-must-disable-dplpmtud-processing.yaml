document: rfc-9869
kind: normative-requirement
summary: By default, the API MUST disable DPLPMTUD processing. An API primitive MUST be provided to allow the application to control whether the DPLPMTUD state machine is enabled for a specific UDP port.
section: "3"
rfc2119_level: MUST
topics:
