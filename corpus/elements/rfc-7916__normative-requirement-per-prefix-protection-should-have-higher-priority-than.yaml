document: rfc-7916
kind: normative-requirement
summary: Per-prefix protection SHOULD have higher priority than interface protection. If a specific prefix must be protected due to configuration, an LFA MUST be computed and installed for that prefix even if the primary outgoing interface is not configured for protection.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
