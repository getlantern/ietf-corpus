document: rfc-5601
kind: security-consideration
summary: The PW-STD-MIB contains read-create objects that can be used to configure pseudowires. Unauthorized write access could allow reconfiguration of PW parameters including labels, peer addresses, and administrative status, potentially disrupting traffic. SNMPv3 with authentication and privacy is recommended to protect management access to these objects.
section: "13"
topics:
    - snmp
    - security
