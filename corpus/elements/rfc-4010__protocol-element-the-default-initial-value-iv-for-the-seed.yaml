document: rfc-4010
kind: protocol-element
summary: The default Initial Value (IV) for the SEED key wrap integrity check register is the 64-bit hexadecimal constant A6A6A6A6A6A6A6A6. Recovering this value after unwrap confirms key data integrity with a 2^-64 probability of undetected corruption.
section: 3.4.1
topics:
    - crypto
    - security
