document: rfc-2115
kind: protocol-element
summary: frDLCIStatusChange is a NOTIFICATION-TYPE that carries frCircuitState and fires when a virtual circuit is created, invalidated, or toggles between active and inactive. Per-DLCI traps should not be generated if the state change is due to the DLCMI going down.
section: "6.4"
