document: rfc-8147
kind: registry
summary: This document establishes the 'EmergencyCallData' MIME media subtype tree (application/EmergencyCallData.*). New subtypes require registration by organizations responsible for emergency communications. Initial subtypes include EmergencyCallData.eCall.MSD and EmergencyCallData.Control+xml (defined here) plus types from RFC 7852.
section: "14.1"
topics:
