document: rfc-5269
kind: normative-requirement
summary: The handover key encryption key pair SHOULD be discarded after either HKEPK-LIFETIME (default 12 hours) or HKEPK-HANDOVERS (default 10) handovers, whichever occurs first, to prevent cryptanalysis.
