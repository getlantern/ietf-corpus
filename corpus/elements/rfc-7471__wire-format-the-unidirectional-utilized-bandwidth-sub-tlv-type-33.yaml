document: rfc-7471
kind: wire-format
summary: The Unidirectional Utilized Bandwidth sub-TLV (type 33, length 4) carries a 32-bit IEEE 754 single-precision floating-point value in bytes per second representing actual link utilization as measured by the advertising node. For bundled links, it is the sum of component link utilizations.
section: "4.7"
topics:
