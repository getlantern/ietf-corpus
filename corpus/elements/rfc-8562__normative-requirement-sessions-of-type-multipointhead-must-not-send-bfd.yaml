document: rfc-8562
kind: normative-requirement
summary: Sessions of type MultipointHead MUST NOT send BFD Control packets with the State field set to INIT, and INIT packets MUST be ignored on receipt, because three-way handshakes are neither possible nor appropriate in multipoint BFD.
section: "5.5"
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
