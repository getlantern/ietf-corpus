document: rfc-2024
kind: wire-format
summary: 'The SAP list (dlswTConnConfigSapList, dlswTConnOperPartnerSapList) is a 16-octet OCTET STRING where each bit represents one even SAP value: the MSB of octet 1 is SAP 0, next bit is SAP 2, ..., LSB of octet 16 is SAP 254. A set bit means DLSw is active for that SAP.'
section: "3.0"
topics:
    - snmp
