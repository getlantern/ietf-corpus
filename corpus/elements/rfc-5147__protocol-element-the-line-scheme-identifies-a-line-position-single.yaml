document: rfc-5147
kind: protocol-element
summary: The 'line' scheme identifies a line position (single number) or line range (two comma-separated numbers) within a text/plain MIME entity. Line position zero is always identical to character position zero; identified line fragments include the line endings.
section: 2.2.3
