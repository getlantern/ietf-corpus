document: rfc-3432
kind: security-consideration
summary: An adversary who identifies that a packet stream is part of a measurement sample may manipulate processing (e.g., artificially alter delay) or inject spurious packets to distort results. Cryptographic hash-based packet integrity checks MAY be used to discourage such interference.
section: "6.3"
rfc2119_level: MAY
topics:
    - security
    - measurement
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
