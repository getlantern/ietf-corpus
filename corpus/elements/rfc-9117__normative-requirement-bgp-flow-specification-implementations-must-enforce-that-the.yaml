document: rfc-9117
kind: normative-requirement
summary: BGP Flow Specification implementations MUST enforce that the AS in the left-most position of the AS_PATH of a Flow Specification received via eBGP matches the AS in the left-most position of the AS_PATH of the best-match unicast route for the destination prefix embedded in the Flow Specification NLRI.
section: "4.2"
rfc2119_level: MUST
topics:
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
