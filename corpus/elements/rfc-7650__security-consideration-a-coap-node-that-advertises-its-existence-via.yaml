document: rfc-7650
kind: security-consideration
summary: A CoAP node that advertises its existence via the registration mechanism is more likely to be attacked compared to a node (especially a sleepy node) that does not advertise its existence; implementers should consult RFC 7252 Section 11 and RFC 6940 Section 13 for attack and mitigation details.
section: "10"
topics:
