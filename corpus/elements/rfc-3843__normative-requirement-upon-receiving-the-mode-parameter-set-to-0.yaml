document: rfc-3843
kind: normative-requirement
summary: Upon receiving the Mode parameter set to '0' (Cancel Mode Transition), the decompressor MUST stay in its current mode of operation and SHOULD refrain from sending further mode transition requests for the declined mode for a certain amount of time.
section: "3.4"
rfc2119_level: MUST
topics:
