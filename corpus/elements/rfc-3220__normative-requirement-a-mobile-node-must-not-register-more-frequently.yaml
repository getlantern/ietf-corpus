document: rfc-3220
kind: normative-requirement
summary: A mobile node MUST NOT register more frequently than once per second on average. After the initial three solicitations at up to one per second, subsequent Agent Solicitations MUST use a binary exponential backoff up to a maximum interval of at least one minute.
section: 3.6.3
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
