document: rfc-9369
kind: design-rationale
summary: The wire version number 0x6b3343cf is randomly chosen rather than being the integer 2, and the Long Header packet type bits differ from version 1. Both choices are intentional anti-ossification measures rather than strict requirements for any new QUIC version.
