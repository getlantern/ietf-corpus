document: rfc-8074
kind: interoperability-note
summary: 'For DHCP and SLAAC coexistence, operators should use non-overlapping prefixes: set the A bit in the Prefix Information option of Router Advertisements for the SLAAC prefix and set the M bit for the DHCP prefix, per RFC 4861 and RFC 4862.'
