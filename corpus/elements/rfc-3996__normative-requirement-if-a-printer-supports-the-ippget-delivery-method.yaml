document: rfc-3996
kind: normative-requirement
summary: If a Printer supports the 'ippget' Delivery Method, it MUST keep 'completed', 'canceled', or 'aborted' Job objects in Job Retention and/or Job History phases for at least as long as the value of 'ippget-event-life'.
section: "8.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
