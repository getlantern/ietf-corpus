document: rfc-5547
kind: normative-requirement
summary: When indicating capability (Section 8.5), an endpoint SHOULD add an empty 'file-selector' media attribute to the 'm=message' line; the attribute MUST NOT contain any selector and no other file attributes MUST be added.
