document: rfc-4982
kind: registry
summary: 'This document creates the ''CGA SEC'' registry maintained by IANA for the 3-bit Sec field defined in RFC 3972. Future assignments require Standards Action. Each entry records a name, the 3-bit value, and the RFC defining the corresponding CGA generation procedure. Initial values: SHA-1_0hash2bits=000, SHA-1_16hash2bits=001, SHA-1_32hash2bits=010.'
