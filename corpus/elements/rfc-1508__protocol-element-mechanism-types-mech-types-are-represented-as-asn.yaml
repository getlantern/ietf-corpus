document: rfc-1508
kind: protocol-element
summary: Mechanism types (mech_types) are represented as ASN.1 Object Identifiers (OIDs) as specified in ISO/IEC 8824 and 8825. OIDs qualify token interpretation between peers; for example, the DASS MechType OID is 1.3.12.2.1011.7.5. Hierarchical OID structure precludes ambiguous interpretation.
section: 1.1.4
topics:
    - security
