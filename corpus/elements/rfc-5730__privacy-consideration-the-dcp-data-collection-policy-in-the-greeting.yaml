document: rfc-5730
kind: privacy-consideration
summary: The <dcp> data collection policy in the greeting discloses the server's privacy practices for data collection, access, retention, and recipient categories. Policy implications extend beyond the client-server relationship, and the specification notes that policy information MUST be disclosed to provisioning entities, though disclosure methods outside direct protocol interaction are out of scope.
section: "2.4"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
