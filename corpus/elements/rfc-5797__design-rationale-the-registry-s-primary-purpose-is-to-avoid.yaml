document: rfc-5797
kind: design-rationale
summary: The registry's primary purpose is to avoid conflicting uses of the same extension names, not to 'approve' extensions. Registration via Expert Review requires only that the extension be documented in a public specification or actually implemented in generally available FTP clients and servers.
section: "2.3"
topics:
    - registry
