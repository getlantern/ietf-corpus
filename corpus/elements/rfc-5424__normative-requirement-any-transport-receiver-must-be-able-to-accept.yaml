document: rfc-5424
kind: normative-requirement
summary: Any transport receiver MUST be able to accept messages up to and including 480 octets. All transport receiver implementations SHOULD be able to accept messages up to and including 2048 octets. If a receiver truncates, truncation MUST occur at the end of the message.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
