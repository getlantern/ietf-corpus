document: rfc-3284
kind: wire-format
summary: 'The Hdr_Indicator byte has two defined bits: bit 0 (VCD_DECOMPRESS) signals a secondary compressor ID follows, and bit 1 (VCD_CODETABLE) signals that an application-defined code table length and data follow. If both bits are set, the compressor ID precedes the code table data.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
