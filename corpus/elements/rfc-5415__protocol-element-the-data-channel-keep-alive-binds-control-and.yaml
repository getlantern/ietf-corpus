document: rfc-5415
kind: protocol-element
summary: The Data Channel Keep-Alive binds control and data channels. Upon entering Run state, the WTP starts the DataChannelKeepAlive timer and sends a Keep-Alive packet containing the Session ID. The AC transitions to Run state only upon receiving a Keep-Alive with a Session ID matching the one from the WTP's Join Request.
section: 4.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
