document: rfc-9709
kind: interoperability-note
summary: If the id-alg-cek-hkdf-sha256 algorithm identifier is absent from the contentEncryptionAlgorithm.algorithm field, the recipient uses the original content-encryption key (CEK) for decryption, preserving backward compatibility with implementations that do not support this mitigation.
section: "5.1"
topics:
