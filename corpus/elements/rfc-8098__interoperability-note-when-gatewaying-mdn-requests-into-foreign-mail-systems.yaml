document: rfc-8098
kind: interoperability-note
summary: When gatewaying MDN requests into foreign mail systems where the notification recipient must equal the message sender (i.e., no separate DN address is supported), the MDN request SHOULD be silently dropped if DN-To differs from SMTP MAIL FROM, rather than producing unintended behavior.
section: "8.3"
topics:
    - email
