document: rfc-6334
kind: normative-requirement
summary: The B4 system performs DNS resolution of the provided FQDN to obtain a AAAA resource record, and if multiple IPv6 addresses are returned, picks only one as the remote tunnel endpoint. The B4 system MUST NOT establish more than one DS-Lite tunnel at the same time per interface.
section: "5"
rfc2119_level: MUST NOT
topics:
    - v6ops
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
