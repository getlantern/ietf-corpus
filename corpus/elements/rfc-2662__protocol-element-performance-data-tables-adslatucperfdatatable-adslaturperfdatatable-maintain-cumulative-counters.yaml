document: rfc-2662
kind: protocol-element
summary: Performance data tables (adslAtucPerfDataTable, adslAturPerfDataTable) maintain cumulative counters since agent reset (Lofs, Loss, Lols, Lprs, ESs, Inits), plus current 15-minute bucket counters (PerfCurrentCount), up to 96 historical 15-minute interval buckets (PerfIntervalCount), and current and previous 1-day counters (AdslPerfCurrDayCount / AdslPerfPrevDayCount).
section: "5.3"
topics:
