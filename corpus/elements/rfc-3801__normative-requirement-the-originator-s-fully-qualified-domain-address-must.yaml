document: rfc-3801
kind: normative-requirement
summary: 'The originator''s fully qualified domain address MUST be present in the From: header. Conforming systems SHOULD set the From: header value equal to the SMTP MAIL FROM address to avoid unanticipated behavior on voice mail platforms that cannot maintain separate attributes.'
section: 4.2.1
rfc2119_level: MUST
topics:
    - email
