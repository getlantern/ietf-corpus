document: rfc-7613
kind: protocol-element
summary: 'A username is a UTF-8 encoded string of Unicode code points structured as an ordered sequence of ''userparts'', where each userpart consists only of code points allowed by the PRECIS IdentifierClass. A username may be a single userpart or a space-separated sequence of userparts (ABNF: username = userpart *(1*SP userpart)).'
section: "3.1"
topics:
    - security
    - privacy
