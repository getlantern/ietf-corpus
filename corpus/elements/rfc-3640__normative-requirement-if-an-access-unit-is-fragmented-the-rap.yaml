document: rfc-3640
kind: normative-requirement
summary: If an Access Unit is fragmented, the RAP-flag MUST be set to 0 for each non-first fragment of the AU. The Stream-state field MUST be incremented by one whenever the stream state changes.
section: 3.2.1.1
rfc2119_level: MUST
topics:
