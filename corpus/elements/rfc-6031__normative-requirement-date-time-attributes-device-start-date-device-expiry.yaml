document: rfc-6031
kind: normative-requirement
summary: Date/time attributes (Device Start Date, Device Expiry Date, Key Start Date, Key Expiry Date) MUST be represented matching the XML Schema dateTime canonical representation; implementations SHOULD NOT rely on time resolution finer than milliseconds and MUST NOT generate time instants that specify leap seconds.
section: 3.1.1.6
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
