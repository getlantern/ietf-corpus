document: rfc-2915
kind: normative-requirement
summary: The regexp field MUST follow the specified substitution expression grammar using POSIX ERE. The result of applying it MUST be either a valid DNS domain-name syntax or a URI (if the 'U' flag is present). Client software SHOULD verify the result is a legal DNS domain-name before querying.
section: "3"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
