document: rfc-3655
kind: design-rationale
summary: The original AD bit definition (RFC 2535 §6.1) was not useful in practice because a conformant server should never reply with data that failed its security policy, making the bit redundant. The redefinition makes AD meaningful by restricting it to cryptographically verified data.
section: "1"
topics:
    - dns
    - security
