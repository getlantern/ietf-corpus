document: rfc-2581
kind: interoperability-note
summary: Fast retransmit/fast recovery is known to recover inefficiently from multiple packet losses in a single flight; implementations may use enhanced algorithms (e.g., NewReno, SACK-based) provided they obey the general principles of the four base algorithms.
section: "3.2"
topics:
