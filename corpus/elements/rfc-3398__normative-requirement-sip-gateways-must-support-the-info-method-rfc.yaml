document: rfc-3398
kind: normative-requirement
summary: SIP gateways MUST support the INFO method (RFC 2976) for mid-call transactions that do not correspond to any SIP operations. Additionally, gateways MUST accept '405 Method Not Allowed' and '501 Not Implemented' as non-fatal responses to INFO—any call in progress MUST NOT be torn down if a destination rejects an INFO request.
section: "5.6"
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
