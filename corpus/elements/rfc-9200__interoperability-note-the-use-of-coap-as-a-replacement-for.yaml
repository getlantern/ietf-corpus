document: rfc-9200
kind: interoperability-note
summary: The use of CoAP as a replacement for HTTP is RECOMMENDED for constrained environments. When future profiles use protocols that do not support RESTful verbs (GET, POST), those profiles MUST specify how the corresponding protocol messages are transmitted instead.
