document: rfc-8695
kind: protocol-element
summary: The 'ietf-rip' YANG module augments the core 'ietf-routing' module under /rt:routing/rt:control-plane-protocols/rt:control-plane-protocol to add a 'rip' container that instantiates a RIP entity supporting RIPv2 or RIPng. The augmentation is conditioned on the routing protocol type being derived from the 'rip:rip' identity.
section: "2.2"
topics:
    - yang
    - routing
    - netconf
