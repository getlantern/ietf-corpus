document: rfc-5102
kind: normative-requirement
summary: Enterprise-specific Information Elements MUST have an enterpriseId defined. If used outside the enterprise, the enterprise-specific identifier MUST be made globally unique by combining it with an SMI network management private enterprise code registered with IANA.
section: "2.1"
rfc2119_level: MUST
