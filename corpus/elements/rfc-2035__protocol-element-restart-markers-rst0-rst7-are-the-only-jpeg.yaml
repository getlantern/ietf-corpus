document: rfc-2035
kind: protocol-element
summary: Restart markers (RST0–RST7) are the only JPEG markers permitted within the entropy-coded segment. If restart markers are present, a 6-byte DRI segment precedes the scan. The type code determines whether a restart interval is defined and whether intervals align with RTP packets.
section: 3.1.7
