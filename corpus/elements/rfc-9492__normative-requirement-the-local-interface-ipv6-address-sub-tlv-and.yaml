document: rfc-9492
kind: normative-requirement
summary: The Local Interface IPv6 Address sub-TLV and Remote Interface IPv6 Address sub-TLV are application-independent attributes and MUST NOT be advertised in the ASLA sub-TLV. They MAY be advertised as sub-TLVs of the Router-Link TLV inside the OSPFv3 E-Router-LSA (types 24 and 25 respectively).
section: "9"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
