document: rfc-2332
kind: normative-requirement
summary: A station MUST re-send NHRP Registration Requests often enough to refresh registration before the Holding Time expires; it is recommended that the interval equal one-third of the Holding Time specified in the request.
section: 5.2.3
rfc2119_level: MUST
