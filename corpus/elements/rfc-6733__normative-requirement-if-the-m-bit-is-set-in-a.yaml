document: rfc-6733
kind: normative-requirement
summary: If the M-bit is set in a received AVP and the receiver does not understand the AVP or its values, the receiver MUST return a failure (DIAMETER_AVP_UNSUPPORTED for unrecognized AVPs). The M-bit setting and the CCF occurrence specifier for an AVP are independent and serve different purposes; the M-bit is application-command scoped, not AVP-global.
section: "4.1"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
