document: rfc-9801
kind: normative-requirement
summary: A bit-stream is mapped into PLE packets with a fixed payload size that MUST be defined during VPWS setup, MUST be the same in both directions of the VPWS, and MUST remain unchanged for the lifetime of the VPWS. All PLE implementations MUST support the default payload size of 1024 bytes; the minimum is 64 bytes.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
