document: rfc-7361
kind: normative-requirement
summary: In negative MAC flushing, the MAC list SHOULD contain only the MACs for the affected MTU-s. If the list is empty, the negative MAC flush will result in flushing and relearning all attached MTU-s devices for the originating PE-rs.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
