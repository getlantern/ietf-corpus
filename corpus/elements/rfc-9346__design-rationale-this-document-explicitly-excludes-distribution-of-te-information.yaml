document: rfc-9346
kind: design-rationale
summary: This document explicitly excludes distribution of TE information from within one AS to another, any TE reachability information for destinations outside the AS, TE aggregation, and exchange of private information between ASes, in conformance with the confidentiality and scaling assumptions surrounding AS use in the Internet.
