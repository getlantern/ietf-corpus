document: rfc-8178
kind: normative-requirement
summary: Each clientid relationship between a client and server instance must be devoted to a single minor version. If a server detects that a COMPOUND uses an inappropriate minor version for an established clientid, it MUST reject the request with NFS4ERR_BAD_CLIENTID or NFS4ERR_MINOR_VERS_MISMATCH.
section: "8.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
