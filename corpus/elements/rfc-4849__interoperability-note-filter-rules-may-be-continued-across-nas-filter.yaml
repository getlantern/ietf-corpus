document: rfc-4849
kind: interoperability-note
summary: Filter rules may be continued across NAS-Filter-Rule attribute boundaries; implementations cannot assume that individual filter rules begin or end on attribute boundaries. On reception, all attributes must be concatenated before splitting on NUL delimiters.
section: "2"
topics:
