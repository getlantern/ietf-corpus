document: rfc-8506
kind: normative-requirement
summary: If the credit-control client performs credit reservation before granting service to the end user, it MUST use several interrogations toward the credit-control server (session-based credit-control), and in this case the credit-control server MUST maintain the credit-control session state.
section: "5.1"
rfc2119_level: MUST
topics:
    - diameter
