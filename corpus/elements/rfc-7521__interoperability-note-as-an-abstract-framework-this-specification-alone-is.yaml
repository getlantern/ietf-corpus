document: rfc-7521
kind: interoperability-note
summary: As an abstract framework, this specification alone is insufficient for interoperable implementations. Concrete instantiations (RFC 7522 for SAML 2.0, RFC 7523 for JWT) and out-of-band agreements on Issuer/Audience identifiers, keys, endpoints, assertion types, one-time-use restrictions, maximum lifetimes, and Subject/attribute requirements are all required.
section: "7"
topics:
