document: rfc-2049
kind: design-rationale
summary: 'The concept of ''MIME-conformance'' is defined to promote interoperability: a system meeting these criteria is considered ''safe'' to send virtually any properly-marked data to, because it will treat unknown data as undifferentiated binary rather than displaying it as raw text to users.'
