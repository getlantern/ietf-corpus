document: rfc-9930
kind: design-rationale
summary: The Protected Access Credential (PAC) defined in RFC 7170 (mirroring EAP-FAST) was deprecated in RFC 9930. Implementation experience determined the PAC was unnecessary; TEAP now uses TLS NewSessionTicket-based session resumption as defined in RFC 9190, simplifying the protocol and removing a complex state-management mechanism.
section: "2"
topics:
    - tls
    - security
