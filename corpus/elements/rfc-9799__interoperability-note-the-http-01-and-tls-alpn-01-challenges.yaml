document: rfc-9799
kind: interoperability-note
summary: The http-01 and tls-alpn-01 challenges MAY be used to validate '.onion' domains with the modifications in this document (Sections 4 and 6). The ACME server SHOULD follow redirects, including to non-'.onion' services, to support centralized certificate management servers.
