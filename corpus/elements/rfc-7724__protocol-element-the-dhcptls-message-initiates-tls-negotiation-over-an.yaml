document: rfc-7724
kind: protocol-element
summary: The DHCPTLS message initiates TLS negotiation over an existing TCP connection. The requestor sends DHCPTLS first; the server replies with DHCPTLS (no status code = success) or DHCPTLS with TLSConnectionRefused, or closes the connection. A successful exchange is followed by a TLS handshake.
section: "7.2"
topics:
    - tls
