document: rfc-2961
kind: wire-format
summary: The MESSAGE_ID MCAST_LIST object (Class 25, C_Type 4 IPv4 / C_Type 5 IPv6) carries tuples of Message_Identifier, Source_IP_Address, and Destination_IP_Address. Used on point-to-point links addressed directly to the RSVP next hop for multicast Path state refresh; group address is explicit rather than derived from the IP destination.
