document: rfc-2233
kind: state-machine
summary: 'ifOperStatus has seven states: up(1) — passing packets; down(2) — not passing packets, possibly fault; testing(3) — no operational packets; unknown(4) — state indeterminate; dormant(5) — operable but awaiting external event; notPresent(6) — hardware component missing; lowerLayerDown(7) — down because a lower-layer interface is down. Transitions are driven by ifAdminStatus changes, hardware presence, and lower-layer state.'
section: 3.1.12
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
