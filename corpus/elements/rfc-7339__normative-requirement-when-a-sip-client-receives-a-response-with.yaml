document: rfc-7339
kind: normative-requirement
summary: When a SIP client receives a response with the "oc" parameter filled in, it MUST reduce the number of requests it sends downstream to that server as indicated by the "oc" and "oc-algo" parameter values.
section: "4.1"
rfc2119_level: MUST
topics:
