document: rfc-5191
kind: security-consideration
summary: Monotonically increasing, randomly initialized sequence numbers prevent replay attacks by causing stale or duplicate messages to be silently discarded. An adversary must eavesdrop to inject a valid sequence number, significantly raising the bar for spoofing attacks on ongoing PANA/EAP sessions.
section: "11.1"
topics:
    - security
