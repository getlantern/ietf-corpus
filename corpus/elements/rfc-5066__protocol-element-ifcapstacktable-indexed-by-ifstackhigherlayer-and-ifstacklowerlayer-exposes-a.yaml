document: rfc-5066
kind: protocol-element
summary: ifCapStackTable, indexed by ifStackHigherLayer and ifStackLowerLayer, exposes a TruthValue (ifCapStackStatus) indicating whether a lower sub-layer interface MAY be connected under a higher one based on device cross-connect capability. The table is read-only and may reflect dynamic availability (e.g., pluggable modules).
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
