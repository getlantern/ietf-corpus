document: rfc-5905
kind: interoperability-note
summary: NTPv4 is backwards compatible with NTPv3 (RFC 1305) and SNTPv4 (RFC 4330), which it obsoletes; SNTPv4 is a strict subset of NTPv4. Minor changes to header fields do not affect interoperability between NTPv4 and previous versions.
