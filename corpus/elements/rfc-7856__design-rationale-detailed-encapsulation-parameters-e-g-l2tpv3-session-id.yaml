document: rfc-7856
kind: design-rationale
summary: Detailed encapsulation parameters (e.g., L2TPv3 Session ID, GRE Key) are intentionally not managed in the Softwire Mesh MIB; the MIB focuses on the NLRI-NH mapping and BGP neighbor relationships, leaving lower-level tunnel parameters to other MIBs or management mechanisms.
