document: rfc-1043
kind: protocol-element
summary: Out-of-context data is bracketed by START-OUT-OF-CONTEXT-DATA (opcode 42) and END-OUT-OF-CONTEXT-DATA (opcode 43). The enclosed NVT-mode data (e.g., ARE-YOU-THERE responses or host advisory messages) is displayed without disturbing the virtual screen or the form interaction context.
