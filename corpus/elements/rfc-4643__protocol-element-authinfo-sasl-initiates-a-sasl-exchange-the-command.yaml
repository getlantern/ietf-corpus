document: rfc-4643
kind: protocol-element
summary: 'AUTHINFO SASL initiates a SASL exchange. The command syntax is: AUTHINFO SASL mechanism [initial-response], where the initial-response MUST be Base64-encoded. The command MUST NOT be pipelined and may exceed 512 octets.'
section: "2.4"
topics:
