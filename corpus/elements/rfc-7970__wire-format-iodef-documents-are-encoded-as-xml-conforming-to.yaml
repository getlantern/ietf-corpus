document: rfc-7970
kind: wire-format
summary: IODEF documents are encoded as XML conforming to the normative XML schema in Section 8. Integers use xs:integer (Base 10), real numbers use xs:float (Base 10), dates use xs:dateTime, binary data uses xs:base64Binary or xs:hexBinary, and port lists use the PortlistType regex "\d+(\-\d+)?(,\d+(\-\d+)?)*".
