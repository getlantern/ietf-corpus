document: rfc-4030
kind: security-consideration
summary: The protocol adds computational burden (cryptographic hash calculations) to relay agents and servers, potentially adding latency to DHCP exchanges. This burden is highest during mass reboot events such as a cable MSO head-end reboot, which can increase the time required to serve all clients.
section: "13"
topics:
    - security
