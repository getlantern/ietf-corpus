document: rfc-2155
kind: wire-format
summary: SnaNodeIdentification encodes the 4-byte SNA Node Identification (XID bytes 2–5) as exactly 8 ASCII-encoded uppercase hexadecimal characters. The first 3 hex digits are the product block number; the last 5 are the administratively assigned ID. The value 'bbb00000' signals a non-unique ID number on some implementations.
section: "4"
