document: rfc-2396
kind: normative-requirement
summary: Data corresponding to excluded US-ASCII characters (controls 00-1F and 7F, space, '<', '>', '#', '%', '"', and 'unwise' characters) must be escaped in order to be properly represented within a URI.
section: 2.4.3
rfc2119_level: MUST
