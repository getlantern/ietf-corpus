document: rfc-4301
kind: normative-requirement
summary: If a multicast-capable IPsec implementation encounters SPI collisions between a GSA and a unicast SA (possible when a Group Controller/Key Server assigns SPIs unilaterally), it MUST correctly de-multiplex inbound traffic.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
