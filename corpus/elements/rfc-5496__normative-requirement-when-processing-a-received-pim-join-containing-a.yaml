document: rfc-5496
kind: normative-requirement
summary: When processing a received PIM Join containing a Vector Attribute, a router MUST first check whether the Vector IP address is one of its own IP addresses; if so, the Vector Attribute is discarded and not passed further upstream.
section: 3.3.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
