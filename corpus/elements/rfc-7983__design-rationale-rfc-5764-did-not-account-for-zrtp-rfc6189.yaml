document: rfc-7983
kind: design-rationale
summary: RFC 5764 did not account for ZRTP [RFC6189], a media-path Diffie-Hellman key agreement protocol multiplexed on the same port as RTP. This document allocates first-byte values 16–19 to ZRTP to prevent future protocol collisions in the unused range.
section: "4"
topics:
