document: rfc-8945
kind: design-rationale
summary: TSIG is unsuitable for general server-to-server authentication among many servers because the number of required shared keys grows quadratically. It is well-suited for resolvers communicating with a small number of recursive servers or for primary-to-secondary zone transfer authentication.
section: "1.1"
topics:
    - dns
    - security
