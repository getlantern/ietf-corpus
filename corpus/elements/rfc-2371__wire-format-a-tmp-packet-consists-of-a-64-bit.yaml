document: rfc-2371
kind: wire-format
summary: A TMP packet consists of a 64-bit header followed by zero or more data octets. The header contains a flag byte (SYN, FIN, PUSH, RESET flags in the high nibble), a 24-bit connection identifier, and a 32-bit packet length; both the connection identifier and length are in network byte order.
section: A.3
