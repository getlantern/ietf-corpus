document: rfc-6051
kind: wire-format
summary: Variant A (64-bit NTP RTP header extension, ID-A, L=7) carries the full 64-bit NTP-format timestamp — 32-bit Seconds (bits 0–31) immediately followed by 32-bit Fraction (bits 0–31) — as a one-byte-form RTP header extension, padded to a 32-bit boundary with 3 zero bytes.
section: "3.3"
