document: rfc-7208
kind: normative-requirement
summary: Internationalized domain names in SPF evaluation MUST be encoded as A-labels as described in RFC 5890 Section 2.3. Malformed or non-multi-label domains, and NXDOMAIN responses, cause check_host() to immediately return 'none'.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - dns
