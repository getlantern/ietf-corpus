document: rfc-9303
kind: security-consideration
summary: If the Map-Server and ETR are colocated, LISP-SEC does not protect against overclaiming attacks mounted by the ETR, as the ETR is within the Map-Server's trust boundary. Deployments relying on this protection must ensure Map-Server and ETR separation.
section: "7.3"
topics:
    - security
    - routing
