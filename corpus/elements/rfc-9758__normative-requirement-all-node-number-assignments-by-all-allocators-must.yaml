document: rfc-9758
kind: normative-requirement
summary: All Node Number assignments by all Allocators MUST be in the range 0 to 2^(32-1). A single Node Number assigned by a single Allocator MUST refer to a single node. Node Number zero (0) is RECOMMENDED not to be assigned by Allocators to avoid confusion with the Null ipn URI.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
