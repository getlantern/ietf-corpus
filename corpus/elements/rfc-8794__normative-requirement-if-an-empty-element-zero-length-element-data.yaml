document: rfc-8794
kind: normative-requirement
summary: If an Empty Element (zero-length Element Data) has a declared default value, the EBML Reader MUST interpret its value as that default. If no default is declared, the reader MUST use 0 for numbers and an empty string for strings.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
