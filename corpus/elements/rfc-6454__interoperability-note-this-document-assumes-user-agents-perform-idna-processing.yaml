document: rfc-6454
kind: interoperability-note
summary: This document assumes user agents perform IDNA processing and validation when constructing URIs, such that uri-host contains only LDH labels (non-ASCII labels converted to A-labels). Origin-based security policies are therefore sensitive to the specific IDNA algorithm employed.
