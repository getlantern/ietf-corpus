document: rfc-5139
kind: protocol-element
summary: 'Fourteen new civic address type elements are added: BLD (CAtype 25), UNIT (26), ROOM (28), PLC (29), PCN (30), POBOX (31), ADDCODE (32), SEAT (33), RD (34), RDSEC (35), RDBR (36), RDSUBBR (37), PRM (38), and POM (39). These extend the civic address vocabulary from RFC 4119 to match the DHCP civic address types in RFC 4776.'
