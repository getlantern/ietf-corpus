document: rfc-5063
kind: design-rationale
summary: 'The previously transmitted ERO cannot always be reconstructed from the data plane: an ingress may have derived it from path computation, and a transit node may have expanded loose hops. Recovering the ERO from the downstream neighbor minimizes subsequent changes to downstream LSP state.'
