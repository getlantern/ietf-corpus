document: rfc-2688
kind: normative-requirement
summary: When using dynamic class mapping, each packet when fragmented MUST have the same class value assigned to all its fragments. Beyond this requirement, the link scheduler may assign individual packets to changing class numbers as necessary to meet reservation requirements.
section: "3.3"
rfc2119_level: MUST
topics:
    - qos
    - realtime
