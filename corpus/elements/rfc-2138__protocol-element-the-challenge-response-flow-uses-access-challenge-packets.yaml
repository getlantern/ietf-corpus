document: rfc-2138
kind: protocol-element
summary: The challenge/response flow uses Access-Challenge packets containing a Reply-Message prompt and optional State attribute. The client re-submits a new Access-Request (new ID, new Request Authenticator) with the encrypted user response as User-Password and the State attribute echoed unchanged. The server may respond with Access-Accept, Access-Reject, or another Access-Challenge.
section: "2.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
