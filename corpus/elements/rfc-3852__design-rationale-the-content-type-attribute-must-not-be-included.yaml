document: rfc-3852
kind: design-rationale
summary: The content-type attribute MUST NOT be included in a countersignature unsigned attribute. This prevents type confusion where a countersignature's signed context could be misinterpreted as applying to a different content type than the original signature.
section: "5.4"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
