document: rfc-3758
kind: normative-requirement
summary: If an endpoint chooses NOT to include the Forward-TSN-Supported parameter during association establishment, it MUST act as if it does not support FORWARD TSN and MUST return an ERROR to the peer upon receipt of any FORWARD TSN chunk.
section: 3.3.1
rfc2119_level: MUST
topics:
    - sctp
