document: rfc-1194
kind: protocol-element
summary: For {Q2} forwarding, the RUIP derives the target host {H3} as the right-most @hostname token and the forwarded query {Q2-3} as the remainder after removing that token. It then opens a new Finger connection to {H3} with {Q2-3} and relays the response back to the originating client.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
