document: rfc-2461
kind: wire-format
summary: Neighbor Solicitation (Type 135) carries a 32-bit Reserved field and a 128-bit Target Address, which MUST NOT be a multicast address. Source is either an assigned address or the unspecified address (during DAD); destination is the solicited-node multicast address corresponding to the target or the target address itself.
section: "4.3"
topics:
