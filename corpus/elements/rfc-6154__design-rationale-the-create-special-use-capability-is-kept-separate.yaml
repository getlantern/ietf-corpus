document: rfc-6154
kind: design-rationale
summary: The 'CREATE-SPECIAL-USE' capability is kept separate from 'SPECIAL-USE' because CREATE support for special-use designation is OPTIONAL while the extended LIST return/selection support is a distinct, separately advertised feature. This allows servers to support one without the other.
