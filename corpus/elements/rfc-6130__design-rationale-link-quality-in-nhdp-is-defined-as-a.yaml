document: rfc-6130
kind: design-rationale
summary: Link quality in NHDP is defined as a dimensionless 0–1 admittance value to exclude marginal links from use, not as a link metric or substitute for one. This design keeps link quality purely local, avoiding the need to signal it and preserving interoperability between heterogeneous implementations.
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
