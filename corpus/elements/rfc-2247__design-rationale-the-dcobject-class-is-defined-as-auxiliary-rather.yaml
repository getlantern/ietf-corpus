document: rfc-2247
kind: design-rationale
summary: The dcObject class is defined as auxiliary rather than structural because it would typically be combined with an existing structural object class. For example, if a domain represents a particular organization, the entry's structural class would be 'organization' and dcObject would be added as an auxiliary class.
