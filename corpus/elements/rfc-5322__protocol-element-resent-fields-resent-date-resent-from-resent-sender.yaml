document: rfc-5322
kind: protocol-element
summary: Resent fields (Resent-Date:, Resent-From:, Resent-Sender:, Resent-To:, Resent-Cc:, Resent-Bcc:, Resent-Message-ID:) are prepended as a block each time a message is reintroduced into the transport system by a user. They are strictly informational and must not alter normal reply processing.
section: 3.6.6
topics:
