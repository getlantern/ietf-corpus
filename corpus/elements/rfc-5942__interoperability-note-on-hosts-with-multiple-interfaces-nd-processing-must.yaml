document: rfc-5942
kind: interoperability-note
summary: On hosts with multiple interfaces, ND processing must remain scoped to the link on which it was received. A host must not respond to an NS for an address assigned only to a different interface, and must send NA responses out the same link on which the NS arrived.
section: "3"
topics:
