document: rfc-8841
kind: security-consideration
summary: This specification introduces no new security considerations beyond those in RFC 4566 (SDP), RFC 3264 (offer/answer), RFC 4145 (TCP-based SDP), RFC 8122 (TLS in SDP), RFC 4960 (SCTP), and RFC 8261 (SCTP-over-DTLS). Security of the SCTP-over-DTLS association is derived from DTLS, whose roles are negotiated via the SDP 'setup' and 'fingerprint' attributes per RFC 8122 and RFC 8842.
section: "14"
topics:
    - security
    - sctp
    - tls
    - realtime
