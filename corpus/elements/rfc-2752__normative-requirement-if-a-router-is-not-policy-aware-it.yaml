document: rfc-2752
kind: normative-requirement
summary: If a router is not policy-aware, it SHOULD send the RSVP message to the PDP and wait for a response; if policy-unaware, it ignores the policy data objects and continues processing.
section: "6.2"
rfc2119_level: SHOULD
