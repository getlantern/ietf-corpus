document: rfc-8529
kind: protocol-element
summary: The 'bind-ni-name-failed' YANG notification reports asynchronous failures when an interface-to-NI assignment cannot be completed after an initially successful set operation. It carries the interface name, optional bind-ni-name leafrefs for interface/IPv4/IPv6 contexts, and an optional 'error-info' string.
