document: rfc-4328
kind: design-rationale
summary: No additional Switching Type values are needed for G.709 because ODUk switching belongs to the existing TDM class and OCh switching belongs to the Lambda Switch Capable (LSC) class. Reusing existing switching types avoids proliferation of new code-points for what are logically equivalent switching capabilities.
section: 3.1.2
topics:
