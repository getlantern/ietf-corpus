document: rfc-7433
kind: protocol-element
summary: The User-to-User SIP header field carries UUI data along with 'purpose', 'content', and 'encoding' parameters. The 'purpose' parameter identifies the UUI package, 'content' identifies the actual content type, and 'encoding' indicates how the data is encoded.
