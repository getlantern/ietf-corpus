document: rfc-4667
kind: protocol-element
summary: The TAII value is encoded in the Remote End ID AVP and sent in ICRQ along with the optional AGI to instruct the receiving PE to bind the proposed pseudowire to the forwarder matching the specified forwarder identifier. The SAII is encoded in the Local End ID AVP.
