document: rfc-9684
kind: security-consideration
summary: The 'certificates' sub-container within 'tpms' exposes certificates used for attestation, potentially allowing selection of a compromised certificate. The 'type' field could be misconfigured to represent a different key type, altering how a Verifier evaluates attestation results.
