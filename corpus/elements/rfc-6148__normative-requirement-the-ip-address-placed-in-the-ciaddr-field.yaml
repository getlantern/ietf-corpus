document: rfc-6148
kind: normative-requirement
summary: The IP address placed in the ciaddr field of a DHCPLEASEACTIVE message MUST be the IP address with the latest client-last-transaction-time associated with the client described by the queried Remote ID.
section: "4.4"
rfc2119_level: MUST
