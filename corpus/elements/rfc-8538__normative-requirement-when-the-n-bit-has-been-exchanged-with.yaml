document: rfc-8538
kind: normative-requirement
summary: When the 'N' bit has been exchanged with a peer and a BGP NOTIFICATION message other than a Hard Reset is received from that peer, the receiving speaker MUST follow the Receiving Speaker rules in Section 4.1. The speaker generating the NOTIFICATION MUST also follow the Receiving Speaker rules.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
