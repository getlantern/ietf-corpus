document: rfc-9050
kind: normative-requirement
summary: The PCC MUST NOT make allocations from the label space set aside for the PCE to avoid overlap and collisions of label allocations. It is RECOMMENDED that the PCE makes allocations from that reserved label space for all nodes along the path.
section: "3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
