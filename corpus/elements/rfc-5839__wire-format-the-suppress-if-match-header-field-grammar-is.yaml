document: rfc-5839
kind: wire-format
summary: 'The Suppress-If-Match header field grammar is: `Suppress-If-Match = "Suppress-If-Match" HCOLON ( entity-tag / "*" )`, where entity-tag is an opaque token borrowed from RFC 3903. The wildcard value ''*'' always evaluates to true.'
section: "7.3"
topics:
    - sip
    - realtime
