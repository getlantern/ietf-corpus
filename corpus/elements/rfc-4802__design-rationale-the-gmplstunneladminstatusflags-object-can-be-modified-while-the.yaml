document: rfc-4802
kind: design-rationale
summary: The gmplsTunnelAdminStatusFlags object can be modified while the corresponding mplsTunnelRowStatus and mplsTunnelAdminStatus are active(1), as an exception to the general rule that rows may not be modified while active. This allows in-service administrative status changes to trigger new signaling messages without tearing down the tunnel.
section: "8"
topics:
