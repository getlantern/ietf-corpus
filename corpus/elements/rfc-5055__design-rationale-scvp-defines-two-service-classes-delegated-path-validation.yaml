document: rfc-5055
kind: design-rationale
summary: 'SCVP defines two service classes: Delegated Path Validation (DPV), where clients fully delegate certification path construction and validation to a trusted server, and Delegated Path Discovery (DPD), where clients delegate only path construction and perform validation themselves. This split accommodates clients that lack path validation software or wish to centralize policy enforcement versus clients that merely cannot efficiently locate intermediate certificates.'
section: "1"
topics:
