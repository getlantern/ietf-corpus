document: rfc-6729
kind: wire-format
summary: 'The ABNF for the state clause is: State = CFWS ''state'' FWS queue-state-keyword [ ''/'' value ], where queue-state-keyword is either a registered or unregistered state keyword token, and the optional value token provides additional label detail. FWS and CFWS are from RFC 5322; token is from RFC 2045.'
