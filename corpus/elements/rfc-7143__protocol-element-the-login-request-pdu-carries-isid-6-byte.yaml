document: rfc-7143
kind: protocol-element
summary: 'The Login Request PDU carries: ISID (6-byte initiator-assigned session identifier), TSIH (2-byte target session handle, 0 for new sessions), CID (2-byte connection ID), CmdSN, Version-max, Version-min, T-bit (transit to NSG), C-bit (continue), CSG (current stage, 2 bits), NSG (next stage, 2 bits), and login parameters as key=value pairs in the data segment.'
section: "11.12"
topics:
