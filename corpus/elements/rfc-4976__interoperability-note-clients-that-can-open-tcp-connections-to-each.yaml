document: rfc-4976
kind: interoperability-note
summary: Clients that can open TCP connections to each other without policy restrictions can communicate directly using the base MSRP protocol. No new client functionality is required to work with relays in the receiving direction; only senders need to implement relay extensions.
section: "1"
topics:
