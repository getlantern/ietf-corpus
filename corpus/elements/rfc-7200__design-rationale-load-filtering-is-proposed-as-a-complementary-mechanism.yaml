document: rfc-7200
kind: design-rationale
summary: Load filtering is proposed as a complementary mechanism to feedback-based SIP overload control. Feedback control is reactive and affects all calls equally; load filtering is proactive and most applicable when a traffic surge and its source/destination distribution can be predicted in advance, enabling targeted rate-limiting close to originating user agents.
