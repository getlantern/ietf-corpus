document: rfc-4849
kind: design-rationale
summary: The NAS-Filter-Rule attribute was created because RFC 2865's Filter-Id attribute requires the NAS to be pre-populated with named filters, making it unusable when the server operator does not know which filters are available on the NAS.
section: "1"
