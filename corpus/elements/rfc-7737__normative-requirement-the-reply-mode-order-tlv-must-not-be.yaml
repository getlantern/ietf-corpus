document: rfc-7737
kind: normative-requirement
summary: The Reply Mode Order TLV MUST NOT be included in any MPLS echo reply. If a Reply Mode Order TLV is received in an echo reply, the initiator MUST ignore it entirely and use only the Reply Mode field of the received echo reply.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
