document: rfc-8038
kind: security-consideration
summary: The security considerations of the IPFIX protocol (RFC 7011) apply to this specification; MIB variable values exported via IPFIX may contain sensitive management data, and implementers should use IPFIX's existing confidentiality and integrity mechanisms to protect MIB Field Options Data Records and the mibObjectValue Data Records they annotate.
section: "10"
topics:
