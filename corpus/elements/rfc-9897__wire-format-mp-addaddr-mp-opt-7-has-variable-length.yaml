kind: wire-format
summary: 'MP_ADDADDR (MP_OPT=7) has variable length (12–26 bytes): Type=46, MP_OPT=7, 1-byte Address ID, 4-byte Nonce, 4-byte IPv4 or 16-byte IPv6 address, optional 2-byte port. Must be followed by an MP_HMAC option.'
