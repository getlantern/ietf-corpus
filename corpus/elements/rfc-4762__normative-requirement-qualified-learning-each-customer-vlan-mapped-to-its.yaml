document: rfc-4762
kind: normative-requirement
summary: Qualified learning (each customer VLAN mapped to its own VPLS instance with its own FIB and broadcast domain) is the default mode and MUST be supported. Support of unqualified learning (all VLANs of a customer in one VPLS) is OPTIONAL.
section: "7.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
