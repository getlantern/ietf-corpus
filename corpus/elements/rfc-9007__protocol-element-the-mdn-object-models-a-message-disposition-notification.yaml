document: rfc-9007
kind: protocol-element
summary: 'The MDN object models a Message Disposition Notification and includes properties: forEmailId, subject, textBody, includeOriginalMessage, reportingUA, disposition, mdnGateway, originalRecipient, finalRecipient, originalMessageId, error, and extensionFields. Server-set fields (mdnGateway, originalRecipient, originalMessageId, error) are populated by the server during MDN/send.'
