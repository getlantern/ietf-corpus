document: rfc-8876
kind: wire-format
summary: 'The AlertMsg-Error header field contains an ErrorValue composed of a 3-digit error-code followed by optional error-params. ABNF: AlertMsg-Error = ''AlertMsg-Error'' HCOLON ErrorValue; ErrorValue = error-code *(SEMI error-params); error-code = 3DIGIT.'
section: "5.2"
