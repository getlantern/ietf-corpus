document: rfc-2942
kind: wire-format
summary: 'The AUTH sub-option carries a Kerberos V5 KRB_AP_REQ message: ''IAC SB AUTHENTICATION IS <authentication-type-pair> AUTH <KRB_AP_REQ message> IAC SE''. The first octet of authentication-type-pair must be KERBEROS_V5 (2).'
