document: rfc-8485
kind: normative-requirement
summary: The RP MUST NOT assume that values assigned to vector components have inherent ordinal or subsumptive properties without specific knowledge of the trust framework in use. '1' is always different from '2', but '2' does not necessarily imply superiority or fulfillment of '1' requirements.
section: "2"
rfc2119_level: MUST NOT
