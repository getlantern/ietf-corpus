document: rfc-8480
kind: normative-requirement
summary: When a node receives a 6P message with an unsupported SFID, it MUST reply with RC_ERR_SFID. The SFID in the Response MUST echo the SFID from the Request, and in a 3-step transaction the SFID in the Confirmation MUST match that of the Request and Response.
section: 3.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
