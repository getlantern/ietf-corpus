document: rfc-6450
kind: normative-requirement
summary: A client receiving a Server Response with a version other than 2 MUST stop sending requests to that server (unless it supports that version). This prevents version mismatch loops.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
