document: rfc-7053
kind: protocol-element
summary: When an SCTP association supports Stream Reconfiguration (RFC 6525) and there are pending Outgoing SSN Reset or SSN/TSN Reset requests that require no outstanding DATA chunks, setting the I bit on the last DATA chunk improves reconfiguration performance.
