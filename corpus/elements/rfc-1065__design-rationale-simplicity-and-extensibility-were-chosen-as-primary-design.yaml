document: rfc-1065
kind: design-rationale
summary: Simplicity and extensibility were chosen as primary design goals because the authors believed the community's understanding of TCP/IP network management was incomplete. A minimal SMI imposes few constraints on future approaches while an extensible SMI maximizes the space of experiments.
