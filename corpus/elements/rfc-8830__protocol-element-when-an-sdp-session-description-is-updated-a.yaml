document: rfc-8830
kind: protocol-element
summary: When an SDP session description is updated, a specific msid-id continues to refer to the same MediaStream and msid-appdata to the same MediaStreamTrack. If an MSID identifier disappears and reappears in a later negotiation, it refers to a new MediaStream (no persistent memory beyond the current SDP).
section: "3"
topics:
