document: rfc-9824
kind: design-rationale
summary: NXNAME value 128 was chosen from the Meta-TYPEs range because a lower number in this range reduces the size of the Type Bit Maps field, which directly reduces the overall DNS response message size—the primary optimization goal of Compact Denial of Existence.
