document: rfc-8912
kind: security-consideration
summary: Active measurement metrics defined in this document send test packets into the network, which can constitute an unintended load or be misused to generate traffic toward a target. Implementors must ensure measurement sessions are authorized and that the measurement rate does not constitute a denial-of-service risk.
section: "11"
topics:
    - security
    - measurement
