document: rfc-5905
kind: protocol-element
summary: 'The system process runs three sub-algorithms: the selection algorithm applies Byzantine fault detection to discard falsetickers and retain truechimers; the cluster algorithm uses statistical principles to select the most accurate subset; the combine algorithm computes a weighted-average final offset from the surviving truechimers. The synchronization distance LAMBDA = EPSILON + DELTA/2 represents the maximum error.'
section: "11.2"
topics:
