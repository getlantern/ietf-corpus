document: rfc-9051
kind: security-consideration
summary: Server implementations MUST implement SASL AUTHENTICATE and MUST be configurable to reject plaintext passwords without TLS. Clients and servers SHOULD implement non-plaintext SASL mechanisms such as GSSAPI, SCRAM-SHA-256/SCRAM-SHA-256-PLUS, and EXTERNAL to avoid password exposure on the wire.
section: 6.2.2
topics:
    - email
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
