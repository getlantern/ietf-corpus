document: rfc-7170
kind: normative-requirement
summary: The PAC-Key is a secret and MUST be treated accordingly; if leaked it could compromise user credentials transmitted inside a tunnel established using that PAC-Key. The PAC-Key MUST be stored securely by the peer and MUST have its confidentiality and integrity protected if provisioned by an out-of-band mechanism.
section: 3.2.2
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
