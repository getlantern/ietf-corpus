kind: design-rationale
summary: Separate Experimentation (0xF7–0xFA) and Documentation (0xFB–0xFE) algorithm ID ranges are reserved so that experimental and documentation use cannot clash with deployed assigned algorithm IDs, preventing misconfiguration of production routing elements.
