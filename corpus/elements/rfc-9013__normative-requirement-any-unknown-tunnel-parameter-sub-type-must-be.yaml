document: rfc-9013
kind: normative-requirement
summary: Any unknown Tunnel Parameter sub-type MUST be ignored and skipped upon receipt. A reserved value in an LSA MUST be treated as an invalid Tunnel Parameter Sub-TLV. If a Tunnel Parameter Sub-TLV is invalid, its parent Tunnel Sub-TLV MUST be ignored, but other Tunnel Sub-TLVs MUST still be considered.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
