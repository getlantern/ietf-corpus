document: rfc-3418
kind: protocol-element
summary: snmpTrapOID (accessible-for-notify, OID syntax) carries the authoritative identification of the notification being sent and occurs as the second varbind in every SNMPv2-Trap-PDU and InformRequest-PDU. snmpTrapEnterprise carries the enterprise OID and is used when a proxy maps an RFC 1157 Trap-PDU into an SNMPv2-Trap-PDU.
section: "2"
topics:
