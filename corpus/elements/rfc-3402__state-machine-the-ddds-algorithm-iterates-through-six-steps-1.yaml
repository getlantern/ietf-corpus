document: rfc-3402
kind: state-machine
summary: 'The DDDS algorithm iterates through six steps: (1) apply First Well Known Rule to AUS to get first Key; (2) retrieve ordered Rule set from Database for Key; (3) apply Substitution Expressions in order until a non-empty result; (4) check Service match, else continue; (5) if Rule is non-terminal, return to step 2 with substitution result as new Key; (6) return Flags, Services, and substitution output to Application.'
section: "3.3"
topics:
    - dns
