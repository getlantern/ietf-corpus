document: rfc-9562
kind: protocol-element
summary: The variant field occupies the most significant bits of octet 8. Variant 10xx (bits 64-65 of the UUID set to '1' and '0') identifies the UUID format defined by this document. Variants 0xxx (NCS), 110x (Microsoft), and 111x (future) are reserved.
section: "4.1"
