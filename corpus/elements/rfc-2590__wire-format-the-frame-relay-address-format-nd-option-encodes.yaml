document: rfc-2590
kind: wire-format
summary: The Frame Relay Address Format ND option encodes an E.164, X.121, or NSAP address. The first address-value octet carries address-type bits (01), a 6-bit size field, followed by a 2-octet Address Family Number, then the BCD-encoded E.164/X.121 or binary NSAP address, zero-padded to an 8-octet boundary. Length is 2, 3, or 4 (for addresses up to 11, 19, or maximum NSAP octets, respectively).
