document: rfc-7148
kind: design-rationale
summary: The delegation of IPv4 subnets to mobile routers is explicitly out of scope. Although the DMNP option supports IPv4 signaling between MAG and LMA (via the V flag), the mechanism for actually delegating IPv4 subnets to the MR is not addressed by this specification.
