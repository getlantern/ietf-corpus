document: rfc-9504
kind: interoperability-note
summary: GMPLS-specific objects defined in RFC 8779 (END-POINTS with GMPLS extensions, BANDWIDTH, LSPA, IRO, XRO) and the SWITCH-LAYER object from RFC 8282 are reused without modification in stateful PCEP messages (PCRpt, PCUpd, PCInitiate) for GMPLS networks.
