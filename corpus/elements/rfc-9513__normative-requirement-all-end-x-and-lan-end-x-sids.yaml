document: rfc-9513
kind: normative-requirement
summary: All End.X and LAN End.X SIDs MUST be subsumed by the subnet of a locator with the matching algorithm advertised by the same OSPFv3 router in an SRv6 Locator TLV. End.X SIDs that do not meet this requirement MUST be ignored.
section: "9"
rfc2119_level: MUST
topics:
    - routing
    - ip
