document: rfc-9244
kind: interoperability-note
summary: In multihomed deployments, a DOTS client maintaining signal channels with multiple upstream DOTS servers MUST only signal telemetry information relevant to the IP prefixes assigned by each upstream network to the channel with that network's DOTS server. Sharing telemetry from one DOTS server with a second DOTS server is implementation and deployment specific.
section: "4.3"
topics:
    - security
