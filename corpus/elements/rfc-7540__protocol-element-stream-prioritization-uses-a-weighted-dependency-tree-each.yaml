document: rfc-7540
kind: protocol-element
summary: Stream prioritization uses a weighted dependency tree. Each stream can declare an exclusive or non-exclusive dependency on another stream and a weight from 1 to 256. Priority information is advisory and does not guarantee transmission order. All streams initially have a non-exclusive dependency on stream 0x0 with a default weight of 16.
section: "5.3"
topics:
    - http
