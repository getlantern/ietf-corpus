document: rfc-3565
kind: normative-requirement
summary: An S/MIME client SHOULD announce supported cryptographic functions using the SMIMECapabilities attribute, which MUST be signed. Algorithm OIDs SHOULD be logically separated by functional category and MUST be ordered by preference.
