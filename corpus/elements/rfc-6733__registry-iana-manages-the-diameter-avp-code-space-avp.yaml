document: rfc-6733
kind: registry
summary: IANA manages the Diameter AVP Code space. AVP codes 1–255 are reserved for backward compatibility with RADIUS attributes. Codes 256 and above are Diameter-native; new base protocol AVPs require a Standards Track RFC. Vendor-specific AVPs use the V-bit combined with a Vendor-ID field and are managed by the respective vendor organization.
section: 11.1.1
topics:
    - diameter
    - registry
