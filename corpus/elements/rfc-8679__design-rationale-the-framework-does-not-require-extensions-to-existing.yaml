document: rfc-8679
kind: design-rationale
summary: The framework does not require extensions to existing signaling and label distribution protocols (RSVP, LDP, BGP) for transport and bypass tunnel establishment, relying on generic protocol procedures. Extensions to IGPs and service label distribution protocols are needed only for specific procedures such as context ID advertisement and context label switching setup.
