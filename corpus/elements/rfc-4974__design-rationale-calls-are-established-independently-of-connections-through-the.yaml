document: rfc-4974
kind: design-rationale
summary: Calls are established independently of Connections through the Notify message rather than Path/Resv messages. Simultaneous Call and Connection establishment (piggybacking) is explicitly not supported to maintain full and logical Call/Connection separation.
section: "5.1"
topics:
    - mpls
