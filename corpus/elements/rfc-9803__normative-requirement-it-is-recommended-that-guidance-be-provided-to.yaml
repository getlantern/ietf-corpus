document: rfc-9803
kind: normative-requirement
summary: It is RECOMMENDED that guidance be provided to users clarifying that TTL changes are only effective in shortening transition periods if implemented at least one full current-TTL period before the planned DNS record change, accounting also for the latency between EPP command receipt and DNS publication.
section: "5.2"
rfc2119_level: RECOMMENDED
topics:
    - dns
