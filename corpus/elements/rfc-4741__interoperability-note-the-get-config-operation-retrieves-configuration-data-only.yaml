document: rfc-4741
kind: interoperability-note
summary: The <get-config> operation retrieves configuration data only, while <get> retrieves both configuration and state data; implementations that conflate the two will produce incorrect results when applications attempt to archive and restore configurations.
section: "1.3"
topics:
    - netconf
