document: rfc-6320
kind: design-rationale
summary: ANCP reuses GSMPv3's TCP port (6068) and Ethernet encapsulation identifier (0x880C) because existing implementations made reversing that decision impractical. To allow peers to distinguish the two protocols, ANCP was assigned version number 50 (outside the GSMPv3 range of 1–3), and a joint GSMP/ANCP version registry was established.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
