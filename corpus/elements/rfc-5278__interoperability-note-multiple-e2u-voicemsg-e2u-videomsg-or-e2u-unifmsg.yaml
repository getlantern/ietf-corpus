document: rfc-5278
kind: interoperability-note
summary: Multiple E2U+voicemsg, E2U+videomsg, or E2U+unifmsg NAPTR records may be returned for a single ENUM query. The order and preference fields in NAPTR records should be used to implement primary/backup failover and load balancing across multiple messaging servers.
section: "8.1"
topics:
    - dns
    - voip
    - sip
