document: rfc-9136
kind: security-consideration
summary: Any action that filters or modifies the RT-2 or RT-1 routes used to convey Overlay Indexes will affect the recursive resolution of RT-5 routes and therefore alter forwarding to remote subnets. Operators must account for this dependency when applying route policies.
section: "5"
topics:
    - security
    - routing
    - bgp
