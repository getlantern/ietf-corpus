document: rfc-5797
kind: protocol-element
summary: Obsolete commands XCUP, XCWD, XMKD, XPWD, XRMD (from RFC 775, deprecated by RFC 1123) and LPRT, LPSV (from RFC 1545/1639, FOOBAR effort) are assigned the immutable pseudo FEAT code 'hist' and marked conformance 'h' (historic). They remain in the registry to avoid conflicts with deployed implementations.
