document: rfc-7683
kind: normative-requirement
summary: When a reacting node sends a request that matches an active OCS, it MUST apply the OCS-indicated abatement algorithm. If the algorithm selects the request for abatement, it SHOULD apply diversion if possible, and MUST apply throttling when diversion is not possible or was not applied. An agent that throttles MUST return an appropriate error response.
section: 5.2.2
rfc2119_level: MUST
topics:
    - diameter
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
