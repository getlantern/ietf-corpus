document: rfc-8635
kind: interoperability-note
summary: For advanced deployments, routers may use preinstalled IEEE 802.1AR manufacturer-driven certificates or Pre-Shared Keys combined with PKI-enrollment protocols such as EST (RFC 7030) or CMC transport (RFC 5273) to authenticate directly to the CA, bypassing the operator as intermediary.
