document: rfc-5811
kind: design-rationale
summary: SCTP was chosen as the single transport for ForCES TML because it subsumes the features of TCP, UDP, and DCCP combined, including multi-homing, partial reliability, message boundaries, and built-in congestion control. This eliminates the need for multiple transport protocols and reduces interoperability concerns.
