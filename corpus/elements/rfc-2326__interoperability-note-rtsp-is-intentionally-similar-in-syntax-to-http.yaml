document: rfc-2326
kind: interoperability-note
summary: 'RTSP is intentionally similar in syntax to HTTP/1.1 but differs fundamentally: the server maintains state by default, both client and server can issue requests, data is carried out-of-band by a separate protocol, and RTSP uses UTF-8 (ISO 10646) rather than ISO 8859-1.'
section: "1.1"
topics:
