document: rfc-4338
kind: wire-format
summary: 'The Link-layer Address / Hardware Address used in FC Neighbor Discovery and FC ARP is 12 octets: an 8-octet N_Port_Name followed by 1 reserved octet and a 3-octet N_Port_ID. Reserved fields MUST be set to zero on transmit and MUST be ignored on receive.'
