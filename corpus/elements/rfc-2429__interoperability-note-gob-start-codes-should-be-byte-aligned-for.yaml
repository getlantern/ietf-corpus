document: rfc-2429
kind: interoperability-note
summary: GOB start codes should be byte aligned for packetization purposes, but H.263+ does not require this. When GOB start codes are not aligned (e.g., when transmitting existing content or using non-compliant encoders), follow-on packets must be used.
section: "2.2"
topics:
    - rtp
    - realtime
