document: rfc-5140
kind: protocol-element
summary: The AvailableCircuits attribute (TRIP Type Code 14) is a 4-octet unsigned integer representing the current number of available PSTN circuits on a route. It is highly dynamic, changes with every call, and is used ONLY between a gateway and its peer LS.
section: "4.2"
