document: rfc-5751
kind: normative-requirement
summary: Both sending and receiving agents MUST support RSA with SHA-256 for signatures. DSA with SHA-256 and RSASSA-PSS with SHA-256 are SHOULD+. RSA with SHA-1, DSA with SHA-1, and RSA with MD5 are SHOULD- (legacy). Sending agents MUST use id-dsa-with-sha1 (not id-dsa) when using DSA.
section: "2.2"
rfc2119_level: MUST
topics:
    - crypto
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
