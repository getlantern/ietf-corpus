document: rfc-3021
kind: security-consideration
summary: Using 31-bit subnet masks on core Internet links reduces the attack surface for Smurf-style DoS attacks that rely on directed broadcast packet replication. Eliminating directed broadcasts on these links improves overall network resilience to this class of attack.
section: "6"
