document: rfc-3246
kind: normative-requirement
summary: 'A node supporting EF MUST also satisfy the packet-identity-aware equations: D_j <= F_j + E_p (eq_3), where F_j = max(A_j, min(D_{j-1}, F_{j-1})) + L_j/R (eq_4). Unlike eq_1/eq_2, these track individual packet departure times rather than aggregate ordering.'
section: "2.2"
rfc2119_level: MUST
