document: rfc-9903
kind: security-consideration
summary: 'Several writable data nodes are particularly sensitive: SR enablement (/ospf:ospf/segment-routing/enabled), binding policies, the protocol SRGB size, interface Adj-SID values, and TI-LFA enablement. Unauthorized modification of any of these can cause Denial-of-Service by disrupting traffic or redirecting it via manipulated segment labels.'
section: "4"
topics:
    - security
    - mpls
    - routing
