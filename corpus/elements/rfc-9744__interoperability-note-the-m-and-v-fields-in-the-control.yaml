document: rfc-9744
kind: interoperability-note
summary: The M and V fields in the Control Flags are used only for consistency checking; a receiving PE MAY generate an alarm if it detects inconsistencies but will not disrupt the VPWS service. A thorough understanding of RFC 7432 and RFC 8214 are prerequisites for implementing this protocol.
section: "3.2"
topics:
