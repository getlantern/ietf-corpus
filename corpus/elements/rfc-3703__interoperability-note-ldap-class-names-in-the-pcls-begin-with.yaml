document: rfc-3703
kind: interoperability-note
summary: LDAP class names in the PCLS begin with a lowercase character (e.g., pcimPolicy) rather than uppercase as in the information model, because X.500 does not allow class names to begin with an uppercase character, even though LDAP itself is case-insensitive.
section: "4.1"
topics:
    - ldap
