document: rfc-6396
kind: normative-requirement
summary: The BGP4MP_MESSAGE Subtype does not support 4-byte AS numbers; the AS_PATH MUST only consist of 2-byte AS numbers. Only one BGP message SHALL be encoded per BGP4MP_MESSAGE record. BGP4MP_MESSAGE_AS4 MUST be used for 4-byte AS numbers, where the AS_PATH MUST only consist of 4-byte AS numbers.
section: 4.4.2
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
