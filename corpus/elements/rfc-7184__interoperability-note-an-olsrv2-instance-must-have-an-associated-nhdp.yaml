document: rfc-7184
kind: interoperability-note
summary: An OLSRv2 instance MUST have an associated NHDP instance (RFC 6130) running on the same device. The OLSRv2-MIB module imports table entries from the NHDP-MIB (RFC 6779) and cannot populate neighbor state objects without an operational NHDP instance.
section: "6.2"
topics:
    - routing
    - snmp
