document: rfc-5910
kind: interoperability-note
summary: 'During a migration period, the version of <secDNS:infData> returned by the server in response to a <domain:info> SHOULD depend on which <extURI> elements the client included in the EPP <login> command: return secDNS-1.1 if that namespace URI was included, secDNS-1.0 if only secDNS-1.0 was included, and omit the element entirely if neither was included.'
section: "2"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
