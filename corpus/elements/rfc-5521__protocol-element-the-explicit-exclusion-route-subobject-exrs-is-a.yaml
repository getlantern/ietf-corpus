document: rfc-5521
kind: protocol-element
summary: The Explicit Exclusion Route Subobject (EXRS) is a new subobject for the IRO with type 33. It contains one or more XRO-compatible subobjects and limits exclusion scope to the single hop between the previous and subsequent elements in the IRO.
