document: rfc-8630
kind: normative-requirement
summary: It is RECOMMENDED that RPs and Repository Servers follow BCP 195 (RFC 7525) for HTTPS use. RPs SHOULD validate TLS using subjectAltName dNSName identities per RFC 6125. DNS-ID identifier type SHOULD be supported and present in Repository Server certificates.
section: "4"
rfc2119_level: RECOMMENDED
topics:
