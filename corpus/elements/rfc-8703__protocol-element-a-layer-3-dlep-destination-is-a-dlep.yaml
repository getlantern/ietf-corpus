document: rfc-8703
kind: protocol-element
summary: A Layer 3 DLEP Destination is a DLEP Destination not directly addressable within the local Layer 2 domain but reachable via a node addressable within it. The Gateway Node is the last MAC-addressable device in the local Layer 2 domain on the path toward the Layer 3 DLEP Destination.
section: "1.1"
topics:
