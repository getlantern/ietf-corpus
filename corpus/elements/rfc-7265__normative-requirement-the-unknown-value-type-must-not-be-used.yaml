document: rfc-7265
kind: normative-requirement
summary: The 'unknown' value type MUST NOT be used in any iCalendar data as specified by RFC 5545 or any extensions. When converting jCal with type 'unknown' to iCalendar, the VALUE parameter MUST NOT be specified and the value MUST be copied without processing.
section: "5"
rfc2119_level: MUST NOT
topics:
    - json
    - registry
