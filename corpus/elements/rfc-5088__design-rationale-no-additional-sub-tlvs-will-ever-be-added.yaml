document: rfc-5088
kind: design-rationale
summary: No additional sub-TLVs will ever be added to the PCED TLV; future PCE information advertisement in OSPF will use a different LSA rather than extending the Router Information LSA. This prevents unbounded growth of a single TLV type.
section: "4"
