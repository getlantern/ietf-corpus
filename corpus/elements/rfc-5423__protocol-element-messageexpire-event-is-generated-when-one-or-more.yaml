document: rfc-5423
kind: protocol-element
summary: MessageExpire event is generated when one or more messages are expired from a mailbox by server expiration policy. Parameters include a mailbox identifier that MUST include UIDVALIDITY and a UID set describing the expired messages.
section: "4.1"
