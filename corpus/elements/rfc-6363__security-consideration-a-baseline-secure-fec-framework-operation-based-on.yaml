document: rfc-6363
kind: security-consideration
summary: A baseline secure FEC Framework operation based on IPsec/ESP is defined as mandatory-to-implement (but not mandatory-to-use), drawing from the IPsec profiles in RFC 5775 (ALC) and RFC 5740 (NORM). For bidirectional scenarios involving unicast receiver feedback, a second set of IPsec Security Associations is required to protect the feedback path.
section: "9.5"
topics:
    - security
    - ipsec
    - realtime
