document: rfc-7310
kind: protocol-element
summary: Standard apt-X encodes four successive 16-bit PCM samples from each audio channel into a single 16-bit coded sample. Enhanced apt-X encodes four successive 16-bit or 24-bit PCM samples and produces a single 16-bit or 24-bit coded sample per channel respectively.
