document: rfc-7214
kind: interoperability-note
summary: This document updates RFCs 5586, 6374, 6378, 6427, and 6428 solely by relocating their G-ACh-related registries. Implementations referencing IANA registry URLs from those RFCs should follow the redirects to the new "Generic Associated Channel (G-ACh) Parameters" registry location.
