document: rfc-6873
kind: protocol-element
summary: The Base64 Encoded Byte (BEB) field indicates whether an optional field's value is Base64 encoded. BEB=0x01 means the value is Base64 encoded; BEB=0x00 means it is not. Encoding is required when the value contains octets in range 0–31, 127, or invalid UTF-8 sequences (≥128).
section: "4.4"
