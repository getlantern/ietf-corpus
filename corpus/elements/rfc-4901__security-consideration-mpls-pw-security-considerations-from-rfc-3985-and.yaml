document: rfc-4901
kind: security-consideration
summary: MPLS PW security considerations from RFC 3985 and RFC 4447 apply to this document. This document specifies an encapsulation only; security issues of the encapsulated protocols (IPHC, CRTP, ECRTP, ROHC per their respective RFCs) and the PSN transport protocols each apply independently and are not affected by the encapsulations specified herein.
