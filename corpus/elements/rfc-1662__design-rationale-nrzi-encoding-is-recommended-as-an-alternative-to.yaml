document: rfc-1662
kind: design-rationale
summary: NRZI encoding is recommended as an alternative to NRZ because of its relative immunity to signal inversion configuration errors. However, NRZI exacerbates the missing x1 factor of the 16-bit FCS, so the 32-bit FCS is recommended when NRZI is in use.
section: "5.5"
