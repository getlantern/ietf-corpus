document: rfc-6550
kind: interoperability-note
summary: RPL requires an external mechanism to verify bidirectional link properties and neighbor reachability before selecting a parent; NUD, BFD (RFC 5881), and L2 triggers (RFC 5184) are cited examples. A traffic-reactive detection mechanism is preferred to minimize energy spent monitoring idle links.
section: "1.1"
topics:
    - routing
    - ip
