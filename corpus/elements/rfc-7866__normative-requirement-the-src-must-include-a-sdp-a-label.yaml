document: rfc-7866
kind: normative-requirement
summary: The SRC MUST include a SDP 'a=label' attribute (per RFC 4574) on each media stream in the Recording Session SDP offer to identify each recorded stream. The label name maps to the Media Stream Reference in the SIPREC metadata.
section: 7.1.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - rtp
