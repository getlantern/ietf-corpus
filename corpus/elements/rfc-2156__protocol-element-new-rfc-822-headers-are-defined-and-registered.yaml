document: rfc-2156
kind: protocol-element
summary: 'New RFC 822 headers are defined and registered by this standard to carry X.400 service information not natively supported by RFC 822, including: X400-Content-Type, X400-MTS-Identifier, X400-Received, X400-Originator, X400-Recipients, X400-Content-Identifier, DL-Expansion-History, Importance, Sensitivity, Supersedes, Expires, Deferred-Delivery, Autoforwarded, Autosubmitted, and others.'
