document: rfc-9773
kind: normative-requirement
summary: Clients SHOULD include the 'replaces' field in newOrder requests when there is a clear predecessor certificate. Clients SHOULD NOT include it if the ACME server has not indicated ARI support by advertising the renewalInfo resource in its Directory.
