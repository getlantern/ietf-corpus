document: rfc-2688
kind: protocol-element
summary: Dynamic class mapping allows class values to be mapped to individual packets rather than assigning flows to fixed classes. The class number MUST remain constant on an intra-packet basis (all fragments of one packet share the same class) but MAY vary inter-packet.
section: "3.3"
topics:
