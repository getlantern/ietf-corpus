document: rfc-2251
kind: protocol-element
summary: The Referral type is a SEQUENCE OF LDAPURL with at least one URL. All URLs in a referral MUST be equally capable of progressing the operation. If a <dn> part is present, the client MUST use it in the next request; if a filter part is present in a search referral URL, the client MUST use that filter.
section: 4.1.11
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
