document: rfc-793
kind: protocol-element
summary: A socket is formed by concatenating an internet address with a 16-bit port identifier, creating a unique endpoint address across all connected networks. A connection is uniquely identified by a pair of sockets (local and foreign); a single socket may participate in multiple simultaneous connections.
