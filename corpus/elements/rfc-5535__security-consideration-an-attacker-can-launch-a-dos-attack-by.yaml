document: rfc-5535
kind: security-consideration
summary: An attacker can launch a DoS attack by sending large amounts of HBA state (CGA Parameter Data Structures) to a victim, exhausting the victim's memory. Protocols using HBA SHOULD implement DoS prevention techniques; the Shim6 protocol addresses this via a 4-way stateless handshake.
section: "11.4"
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
