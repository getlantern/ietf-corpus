kind: protocol-element
summary: 'The Public-Key-Pins (PKP) and Public-Key-Pins-Report-Only (PKP-RO) response header fields instruct user agents to perform Pin Validation for the host emitting the response. Both headers share the same ABNF grammar: a semicolon-separated list of directives, each a token optionally followed by ''='' and a token or quoted-string value.'
