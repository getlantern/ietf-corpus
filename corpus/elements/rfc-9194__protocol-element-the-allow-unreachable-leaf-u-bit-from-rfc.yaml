document: rfc-9194
kind: protocol-element
summary: The allow-unreachable leaf (U bit from RFC 8500) allows the neighbor to increment the overall metric up to 2^24-1 rather than the lesser maximum of 2^24-2; a metric of 2^24-1 causes traffic to stop using the interface entirely.
section: "2.2"
