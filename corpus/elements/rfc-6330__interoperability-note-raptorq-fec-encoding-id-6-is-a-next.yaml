document: rfc-6330
kind: interoperability-note
summary: RaptorQ (FEC Encoding ID 6) is a next-generation successor to Raptor (RFC 5053, FEC Encoding ID 1). RaptorQ provides superior reliability, better coding efficiency, and supports larger source blocks (up to 56403 symbols vs. RFC 5053's limit), simplifying use in content delivery protocols compared to RFC 5053.
