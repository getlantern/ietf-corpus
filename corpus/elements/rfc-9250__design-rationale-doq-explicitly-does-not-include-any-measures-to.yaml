document: rfc-9250
kind: design-rationale
summary: DoQ explicitly does not include any measures to avoid protocol classification by middleboxes. Padding is intended to obfuscate the content of DNS queries and responses, not to disguise the fact that the traffic is DNS. This non-goal is stated explicitly and is not an endorsement of middlebox classification practices.
section: "3.3"
topics:
    - dns
    - quic
