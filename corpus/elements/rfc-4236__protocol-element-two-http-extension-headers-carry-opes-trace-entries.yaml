document: rfc-4236
kind: protocol-element
summary: 'Two HTTP extension headers carry OPES trace entries: OPES-System (required, identifies the OPES system) and OPES-Via (optional, identifies individual OPES agents). An OPES System MUST add its trace entry to OPES-System; other OPES agents MUST use OPES-Via.'
