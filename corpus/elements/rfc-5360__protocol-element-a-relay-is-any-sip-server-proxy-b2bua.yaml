document: rfc-5360
kind: protocol-element
summary: A relay is any SIP server (proxy, B2BUA, or hybrid) that receives a request, translates its Request-URI (the target URI) into one or more next-hop URIs (recipient URIs), and delivers the request to those URIs. The consent problem arises specifically from this translation operation.
