document: rfc-2236
kind: design-rationale
summary: Leave Group messages are sent to the all-routers group (224.0.0.2) rather than the group being left because other group members have no need to know a host left. This is a design choice that optimizes for reducing unnecessary traffic to group members.
section: "3"
