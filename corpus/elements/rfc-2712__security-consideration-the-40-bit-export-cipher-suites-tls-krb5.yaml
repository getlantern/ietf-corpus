document: rfc-2712
kind: security-consideration
summary: The 40-bit export cipher suites (TLS_KRB5_EXPORT_*) defined in this document are included solely to document already-assigned code points. They were designed for now-obsolete US export restrictions, were never secure, and their implementation and use is strongly discouraged.
section: IESG Note
topics:
    - tls
    - crypto
    - security
