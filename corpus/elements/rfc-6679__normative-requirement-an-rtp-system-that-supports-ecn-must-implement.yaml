document: rfc-6679
kind: normative-requirement
summary: An RTP system that supports ECN MUST implement the in-band ECN initiation method using RTP and RTCP (Section 7.2.1) as the mandatory-to-implement initiation method. Additional methods such as ICE/STUN or leap-of-faith are optional.
section: "7.2"
rfc2119_level: MUST
topics:
    - rtp
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
