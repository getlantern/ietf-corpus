document: rfc-792
kind: protocol-element
summary: Timestamps are 32 bits of milliseconds since midnight UT. If a non-standard time is inserted (not milliseconds since midnight UT), the high-order bit of the timestamp must be set to indicate this non-standard value.
section: Timestamp or Timestamp Reply Message
