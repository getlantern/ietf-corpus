document: rfc-2787
kind: protocol-element
summary: vrrpOperAuthKey is an OCTET STRING (SIZE 0..16) holding the authentication key for simpleTextPassword or ipAuthenticationHeader modes. If the value is shorter than 16 octets, the agent left-adjusts and zero-fills. When read, this object always returns an Octet String of length zero (key is write-only for security).
section: "3"
topics:
