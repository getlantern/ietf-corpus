document: rfc-4468
kind: security-consideration
summary: A malicious authenticated user could supply a fraudulent IMAP URL pointing to a server they control to extract submit credentials. Mitigations include restricting submit credentials to a fixed set of trusted IMAP servers, treating IMAP servers as untrusted with buffer overflow and DoS defenses, and maintaining a secure audit trail.
section: "8"
topics:
