document: rfc-6016
kind: normative-requirement
summary: In Inter-AS Option A, the new VPN-IPv4/IPv6 objects defined in this document MUST NOT be sent in any RSVP message between two Option-A ASBRs; each ASBR operates as a PE and inter-ASBR links are treated as PE-CE links.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - qos
    - routing
    - bgp
