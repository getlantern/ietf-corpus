document: rfc-7697
kind: normative-requirement
summary: When mplsOamIdMegOperStatus is up(1), all bits of mplsOamIdMegSubOperStatus MUST be cleared. When mplsOamIdMegOperStatus is down(2), at least one bit of mplsOamIdMegSubOperStatus MUST be set.
