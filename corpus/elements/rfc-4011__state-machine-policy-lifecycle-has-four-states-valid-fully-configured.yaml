document: rfc-4011
kind: state-machine
summary: 'Policy lifecycle has four states: Valid (fully configured and enabled), Ready (valid and either unscheduled or linked to an active schedule), Active Execution Context (ready policy paired with an element that matches condition and, if in a precedence group, no higher-precedence policy also matches). A Run-Time Exception (RTE) terminates script execution immediately and prevents the associated action from running for that element.'
section: "4.1"
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
