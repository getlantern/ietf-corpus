document: rfc-7852
kind: protocol-element
summary: A new 'main-number' value is added to the TYPE parameter of the xCard 'tel' property, enabling specification of a primary/main enterprise telephone number distinct from a direct-dial individual number. Usable in any xCard within an emergency call additional data block.
