document: rfc-2078
kind: normative-requirement
summary: Whenever possible, GSS_Delete_sec_context() calls should be successfully processable even if other calls cannot succeed, enabling context-related resources to be released. Failing calls should free any memory they allocate so callers may retry.
section: 1.2.8
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
