document: rfc-9240
kind: protocol-element
summary: 'An entity domain defines a set of entities of the same semantic type. Three categories exist: resource-specific (scoped to an information resource, e.g., ''netmap1.pid''), resource-agnostic (globally unique, e.g., ''ipv4''), and self-defined (scoped to the property map itself, with an entity domain name prefixed by ''.'').'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
