document: rfc-1968
kind: normative-requirement
summary: If the Encrypter does not recognise or is unwilling to support an offered option, it MUST send a Configure-Reject for that option. Where multiple options are offered, the Encrypter SHOULD Configure-Reject all but a single preferred option.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
