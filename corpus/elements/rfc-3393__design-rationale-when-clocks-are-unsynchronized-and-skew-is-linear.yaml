document: rfc-3393
kind: design-rationale
summary: When clocks are unsynchronized and skew is linear, the skew parameter S can be estimated from the sample-mean inter-packet time Ti and the sample-mean ipdv value; individual ipdv values can then be corrected by subtracting S * ti. Skew displacement does not change the shape of the distribution (e.g., standard deviation is unaffected); only drift distorts it.
section: "5.2"
topics:
