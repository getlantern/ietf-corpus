document: rfc-2726
kind: normative-requirement
summary: The method attribute must be consistent with both the prefix of the id in the key-cert attribute and the certificate in the certif attribute; if prefix and certificate are inconsistent, creation of the key-cert object is refused.
section: "2.1"
rfc2119_level: MUST
topics:
