document: rfc-3161
kind: security-consideration
summary: TSA signing keys MUST be of sufficient length for a long lifetime, but even so have a finite lifetime. Tokens SHOULD be re-timestamped or notarized at a later date to renew trust in the TSA's signature as key sizes become inadequate.
section: "4"
rfc2119_level: SHOULD
topics:
    - pkix
    - security
    - crypto
