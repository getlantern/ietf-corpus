document: rfc-8843
kind: interoperability-note
summary: The BUNDLE extension is backward compatible. Endpoints that do not support it will generate offers and answers without 'a=group:BUNDLE' and will assign a unique address:port to each 'm=' section per RFC 3264 and RFC 4566.
