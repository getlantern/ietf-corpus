document: rfc-4236
kind: protocol-element
summary: 'Two OCP HTTP profiles are defined: the request profile (URI: http://www.iana.org/assignments/opes/ocp/http/request) and the response profile (URI: http://www.iana.org/assignments/opes/ocp/http/response). The response profile includes auxiliary original parts (request-header, request-body, request-trailer) that carry the original HTTP request as metadata for response adaptation.'
section: "3.2"
topics:
