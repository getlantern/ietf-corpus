document: rfc-5333
kind: security-consideration
summary: Attacks against underlying calendaring systems (unauthorized modification or viewing) are a serious concern. iTIP (RFC 2446) requires authentication, integrity, and confidentiality; CalDAV over 'https:' uses TLS (RFC 5246) to provide server authentication, confidentiality, and message integrity.
