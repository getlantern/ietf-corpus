document: rfc-2045
kind: normative-requirement
summary: The proper Content-Transfer-Encoding label MUST always be used. Labelling unencoded data containing 8bit characters as '7bit' is not allowed, nor is labelling non-line-oriented data as anything other than 'binary'.
section: "6.2"
rfc2119_level: MUST
