document: rfc-1962
kind: design-rationale
summary: Reset-Request/Reset-Ack codes were added (beyond the standard LCP codes 1-7) to enable signaling a decompression failure in one direction of a compressed link without affecting or tearing down traffic in the other direction, which would occur if LCP were renegotiated.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
