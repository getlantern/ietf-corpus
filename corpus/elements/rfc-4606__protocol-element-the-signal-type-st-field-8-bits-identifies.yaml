document: rfc-4606
kind: protocol-element
summary: 'The Signal Type (ST) field (8 bits) identifies the Elementary Signal constituting the LSP. Twelve standard values are defined: values 1–6 cover VT1.5/VC-11 through STS-3c SPE/VC-4 SPE-based signals, and values 7–12 cover STS-1/STM-0 through STS-768/STM-256 for use only when transparency is requested. An optional value 20 (VC-3 via AU-3 at the end) is defined in Appendix 1.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
