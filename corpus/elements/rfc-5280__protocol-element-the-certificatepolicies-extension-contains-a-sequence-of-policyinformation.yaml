document: rfc-5280
kind: protocol-element
summary: 'The certificatePolicies extension contains a SEQUENCE of PolicyInformation entries, each with a CertPolicyId OID and optional qualifiers. Two qualifier types are defined: CPS Pointer (id-qt-cps, a URI) and User Notice (id-qt-unotice, with optional noticeRef and explicitText up to 200 characters).'
