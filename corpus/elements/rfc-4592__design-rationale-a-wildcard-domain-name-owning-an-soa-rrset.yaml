document: rfc-4592
kind: design-rationale
summary: A wildcard domain name owning an SOA RRSet is the zone apex and thus can never be a source of synthesis (which by definition must be a descendant of the closest encloser). There is, however, no reason to forbid such ownership; the asterisk label only becomes significant when step 3 part 'c' applies.
section: "4.1"
topics:
