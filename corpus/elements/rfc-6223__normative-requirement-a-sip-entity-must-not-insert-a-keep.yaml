document: rfc-6223
kind: normative-requirement
summary: A SIP entity MUST NOT insert a "keep" parameter in the topmost Via header field of an ACK request because ACK has no associated response and thus cannot complete the negotiation; such parameters MUST be ignored if received.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - sip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
