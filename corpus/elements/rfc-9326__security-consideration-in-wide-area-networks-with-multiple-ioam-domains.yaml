document: rfc-9326
kind: security-consideration
summary: 'In wide area networks with multiple IOAM-Domains, the amplification effect of DEX can be recursive: exported packets from Domain 1 forwarded through Domain 2 trigger further DEX exports, which may cascade through additional domains, potentially leading to unbounded amplification loops.'
