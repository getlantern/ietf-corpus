document: rfc-2091
kind: normative-requirement
summary: When 'several packets in flight' mode is used and the underlying datalink layer bundles multiple Virtual Circuits, it MUST guarantee NOT to reorder datagrams, since out-of-order delivery could corrupt the peer's routing database.
section: "3.5"
rfc2119_level: MUST
topics:
    - routing
