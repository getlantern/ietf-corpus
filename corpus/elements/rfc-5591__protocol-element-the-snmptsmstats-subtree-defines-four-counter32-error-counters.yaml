kind: protocol-element
summary: 'The snmpTsmStats subtree defines four Counter32 error counters: snmpTsmInvalidCaches (missing tmStateReference), snmpTsmInadequateSecurityLevels (transport security weaker than requested), snmpTsmUnknownPrefixes (no registered prefix for transport domain), and snmpTsmInvalidPrefixes (malformed prefix in securityName).'
