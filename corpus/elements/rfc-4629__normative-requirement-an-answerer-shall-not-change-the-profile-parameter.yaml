document: rfc-4629
kind: normative-requirement
summary: An answerer SHALL NOT change the PROFILE parameter and MUST reject the payload type containing an unsupported profile. A decoder that supports a profile SHALL also support H.263 baseline profile (profile 0).
section: 8.2.1
rfc2119_level: SHALL
