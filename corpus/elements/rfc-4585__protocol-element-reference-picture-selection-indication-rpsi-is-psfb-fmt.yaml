document: rfc-4585
kind: protocol-element
summary: Reference Picture Selection Indication (RPSI) is PSFB FMT=3. It carries codec-specific data referencing a prior correctly decoded picture, allowing the sender to choose that frame as a new prediction reference instead of sending a bandwidth-costly full intra-frame.
