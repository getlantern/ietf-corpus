document: rfc-6506
kind: security-consideration
summary: The specification provides integrity and authentication but not confidentiality, as routing protocol information does not need to be kept secret. It addresses all security issues identified in RFC 6039 and represents a significant increase in adversary effort compared to unauthenticated or IPsec-manual-key operation.
section: "6"
topics:
    - routing
    - security
