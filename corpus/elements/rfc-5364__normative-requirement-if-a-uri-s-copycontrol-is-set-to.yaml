document: rfc-5364
kind: normative-requirement
summary: If a URI's 'copyControl' is set to 'bcc', the URI-list server MUST remove that URI from the recipient-history list; the 'anonymize' attribute is ignored for 'bcc'-tagged URIs. The 'anonymize' attribute is only useful for 'to' or 'cc' URIs.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
