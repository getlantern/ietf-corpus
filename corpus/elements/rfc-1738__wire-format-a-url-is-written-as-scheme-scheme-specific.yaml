document: rfc-1738
kind: wire-format
summary: A URL is written as `<scheme>:<scheme-specific-part>` where the scheme name consists of lowercase letters, digits, '+', '-', and '.'. Scheme names are case-insensitive; interpreters MUST treat uppercase as equivalent to lowercase.
section: "2.1"
topics:
