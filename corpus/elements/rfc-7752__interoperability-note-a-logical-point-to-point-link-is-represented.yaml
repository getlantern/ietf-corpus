document: rfc-7752
kind: interoperability-note
summary: 'A logical point-to-point link is represented as two unidirectional ''half-links''; two originating routers each advertise one Link NLRI for the same link. A broadcast LAN uses a pseudonode: IS-IS pseudonodes use a 7-octet IGP Router-ID (6-octet ISO-ID + 1-octet PSN), while OSPF pseudonodes use the DR''s Router-ID concatenated with the DR''s interface address or interface ID.'
section: 3.2.2
topics:
    - bgp
    - routing
