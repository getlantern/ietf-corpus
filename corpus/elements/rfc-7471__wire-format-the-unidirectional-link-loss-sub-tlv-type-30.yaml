document: rfc-7471
kind: wire-format
summary: The Unidirectional Link Loss sub-TLV (type 30, length 4) contains a 1-bit Anomalous (A) flag, 7 reserved bits, and a 24-bit Link Loss field representing packet loss as a percentage with a basic unit of 0.000003%. The maximum expressible loss is 50.331642% (2^24 - 2); values exceeding this SHOULD be encoded as the maximum.
section: "4.4"
topics:
    - routing
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
