summary: The 'mac' element encodes a MAC address (MAC-48, EUI-48, or EUI-64) in the IEEE 802 hyphen-separated hexadecimal representation (e.g., 'A0-12-34-56-78-90'). Locally assigned MAC addresses are valid only within the administrative domain where they are assigned.
