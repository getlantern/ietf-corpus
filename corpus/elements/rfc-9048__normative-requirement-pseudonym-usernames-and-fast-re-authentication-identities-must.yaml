document: rfc-9048
kind: normative-requirement
summary: Pseudonym usernames and fast re-authentication identities MUST be generated in a cryptographically secure way such that it is computationally infeasible to differentiate two identities belonging to the same user from two belonging to different users. They MUST NOT include substrings that can be related to a particular entity or permanent identity.
section: "5.2"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
