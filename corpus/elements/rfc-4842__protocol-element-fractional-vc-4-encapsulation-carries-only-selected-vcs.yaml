document: rfc-4842
kind: protocol-element
summary: Fractional VC-4 encapsulation carries only selected VCs within a VC-4 container, removing fixed columns 2 and 3 of VC-4 and bytes of unselected VCs. An optional 12-byte header extension adds three 32-bit EBM words (one per TUG-3), each encoding 7 groups of 4 TUG-2 bits plus 2 bits (A=AIS, T=carried) for VC-3 within the TUG-3.
section: 11.2.3
topics:
    - realtime
