document: rfc-1886
kind: normative-requirement
summary: All existing query types that perform type A additional section processing (NS, MX, MB) must be redefined to perform both type A and type AAAA additional section processing, so that relevant IPv4 and IPv6 addresses are added to the additional section.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - ip
    - v6ops
