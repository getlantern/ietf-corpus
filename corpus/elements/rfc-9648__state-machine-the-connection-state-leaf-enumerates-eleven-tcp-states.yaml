document: rfc-9648
kind: state-machine
summary: 'The connection ''state'' leaf enumerates eleven TCP states: closed (1), listen (2), syn-sent (3), syn-received (4), established (5), fin-wait-1 (6), fin-wait-2 (7), close-wait (8), last-ack (9), closing (10), and time-wait (11). The state is read-only and reflects the current TCP connection state as defined in RFC 9293.'
