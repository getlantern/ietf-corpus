document: rfc-2814
kind: normative-requirement
summary: All senders sourcing RSVP-based traffic flows onto a managed segment MUST be SBM-aware and participate in the SBM protocol. Use of standard non-SBM RSVP bypasses the DSBM's resource management function and may result in over-allocation of segment resources.
section: "6.3"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
