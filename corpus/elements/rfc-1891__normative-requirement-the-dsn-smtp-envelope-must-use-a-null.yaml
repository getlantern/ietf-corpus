document: rfc-1891
kind: normative-requirement
summary: The DSN SMTP envelope MUST use a null reverse-path ('<>') in the MAIL command. When transmitting a DSN via SMTP, the RET parameter MUST NOT be used; if NOTIFY is used its value MUST be NEVER. The ENVID and ORCPT parameters MAY be used.
section: "7.1"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
