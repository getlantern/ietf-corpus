document: rfc-2192
kind: security-consideration
summary: When resolving an IMAP URL that requires authentication, the program must verify the URL comes from a trusted source, local site policy permits the connection, the user confirms, a mechanism validates the server first, or the mechanism does not reveal information that could compromise future connections. URLs without a user name pose additional risk as they are more likely to compromise the user's primary account.
section: "3"
topics:
    - email
    - security
