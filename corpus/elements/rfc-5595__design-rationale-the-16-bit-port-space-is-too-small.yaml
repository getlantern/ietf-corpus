document: rfc-5595
kind: design-rationale
summary: The 16-bit port space is too small for trivial, unregulated allocation; applications collide on unregistered ports and port-based firewalls incentivize disguising traffic. The 32-bit Service Code space is large enough that every application can obtain a unique value easily, decoupling service identification from demultiplexing.
section: "1.1"
topics:
    - congestion
    - security
