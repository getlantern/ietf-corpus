document: rfc-4517
kind: interoperability-note
summary: A BER-encoded distinguished name (as used by X.500) re-encoded into the LDAP-specific string encoding is not necessarily reversible to the original BER encoding, because the chosen DirectoryString alternative (TeletexString, PrintableString, or UniversalString) is not indicated in the LDAP encoding.
