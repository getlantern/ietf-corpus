document: rfc-8804
kind: protocol-element
summary: 'The MI.FallbackTarget generic metadata object has two properties: ''host'' (mandatory, Endpoint object; SHOULD NOT include port for DNS delegation, dCDN MUST ignore port if present) and ''scheme'' (optional, MUST be ''http'' or ''https''; if absent in HTTP redirect, dCDN MUST use same scheme as received request).'
section: "3.1"
topics:
