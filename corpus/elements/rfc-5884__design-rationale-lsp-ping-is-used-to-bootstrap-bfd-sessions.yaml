document: rfc-5884
kind: design-rationale
summary: LSP Ping is used to bootstrap BFD sessions because in PHP, explicit-null, and next-hop label allocation scenarios, BFD Control packets alone do not carry enough information to identify the FEC, making demultiplexing impossible without first exchanging discriminators via LSP Ping.
