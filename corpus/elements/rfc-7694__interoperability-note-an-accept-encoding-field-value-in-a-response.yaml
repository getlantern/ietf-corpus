document: rfc-7694
kind: interoperability-note
summary: An 'Accept-Encoding' field value in a response that only contains 'identity' implies that no content codings are supported for the associated request. The set of supported encodings is specific to the associated request and may differ for other resources or over time.
section: "3"
topics:
