document: rfc-1826
kind: normative-requirement
summary: On authentication failure, the receiver SHOULD discard the IP datagram and MUST record the failure in the system or audit log, including SPI, date/time, clear-text sending address, clear-text destination address, and (if present) clear-text Flow ID.
section: "4"
rfc2119_level: MUST
topics:
