document: rfc-8237
kind: wire-format
summary: 'The PW Configuration Message (Type=0x02) contains a variable-length series of sub-TLVs with generic format: Type (8-bit), Length (8-bit), Value (variable). Sub-TLV types are: 0x01 MPLS-TP Tunnel ID (20 octets), 0x02 PW ID Configured List (up to 8 × 32-octet PW Path IDs), 0x03 PW ID Unconfigured List (same format).'
section: "5.2"
topics:
