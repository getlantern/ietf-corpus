document: rfc-2665
kind: normative-requirement
summary: It is RECOMMENDED that all Ethernet-like interfaces use an ifType of ethernetCsmacd(6) regardless of speed or link-layer encapsulation. An Ethernet-like interface SHOULD NOT use fastEther(62), fastEtherFX(69), or gigabitEthernet(117) ifTypes.
section: 3.2.6
rfc2119_level: RECOMMENDED
topics:
    - snmp
