document: rfc-2082
kind: security-consideration
summary: The quality of security depends entirely on the strength of the authentication algorithm, the strength of the key, correct implementation in all communicating RIP-2 systems, and keeping the Authentication Key confidential. Compromise of any of these factors eliminates the security guarantee.
