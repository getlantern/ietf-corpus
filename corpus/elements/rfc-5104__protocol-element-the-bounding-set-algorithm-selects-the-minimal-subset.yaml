document: rfc-5104
kind: protocol-element
summary: The bounding-set algorithm selects the minimal subset of TMMBR tuples that define the feasible region for a media sender. Each tuple is modeled as a straight line in (packet rate, net media bit rate) space; the lower envelope of these lines forms a polygon whose interior is the feasible region. The algorithm sorts tuples by overhead and iteratively builds the bounding set.
section: 3.5.4.2
