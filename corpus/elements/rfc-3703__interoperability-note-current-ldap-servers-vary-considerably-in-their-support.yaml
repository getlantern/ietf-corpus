document: rfc-3703
kind: interoperability-note
summary: Current LDAP servers vary considerably in their support for DIT content rules, DIT structure rules, and name forms, and most do not support inheritance of structure and content rules; the PCLS therefore omits these constructs as normative elements to avoid interoperability barriers.
section: "4.2"
topics:
    - ldap
