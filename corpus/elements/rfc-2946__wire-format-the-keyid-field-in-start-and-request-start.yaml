document: rfc-2946
kind: wire-format
summary: The keyid field in START and REQUEST-START commands is variable length, encoded with the most significant byte first. A keyid value of zero indicates the default encryption key. The field must be at least one byte long. Only keyids received in a DEC_KEYID command are valid.
section: "2"
topics:
