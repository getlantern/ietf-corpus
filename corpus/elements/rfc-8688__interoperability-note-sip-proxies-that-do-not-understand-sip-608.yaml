document: rfc-8688
kind: interoperability-note
summary: 'SIP proxies that do not understand sip.608 will pass ''Feature-Caps: *;+sip.608'' header fields unmodified per Section 16.6 of RFC 3261, allowing them to participate transparently in a network offering 608 services without upgrade.'
