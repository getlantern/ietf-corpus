document: rfc-8412
kind: normative-requirement
summary: Upon deletion of a record, the SWIMA-PC MUST retain a copy of the full deleted record along with its Record Identifier and Software Locator for a reasonable amount of time; the copy SHOULD be retained as long as the deletion event remains in the event log.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
