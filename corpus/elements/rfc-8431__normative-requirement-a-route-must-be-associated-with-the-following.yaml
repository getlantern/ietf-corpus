document: rfc-8431
kind: normative-requirement
summary: 'A route MUST be associated with the following status attributes in responses to RIB write/read operations: Active (at least one fully resolved nexthop, eligible for FIB installation), Installed (route got installed in FIB), and Reason (specific failure cause, e.g., ''Not authorized'').'
section: "2.3"
rfc2119_level: MUST
topics:
    - yang
    - routing
