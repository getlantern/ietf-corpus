document: rfc-2797
kind: normative-requirement
summary: Servers MUST be able to understand and process PKCS10 request bodies; clients MUST produce a PKCS10 request body for the Simple Enrollment Request. The subject name MAY be NULL but MUST be present; servers MUST NOT alter extensions so as to invalidate the original intent of a client-requested extension.
section: 3.3.1
rfc2119_level: MUST
topics:
    - pkix
    - security
