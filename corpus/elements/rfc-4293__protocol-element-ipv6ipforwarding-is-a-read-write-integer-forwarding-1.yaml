document: rfc-4293
kind: protocol-element
summary: ipv6IpForwarding is a read-write INTEGER (forwarding(1)/notForwarding(2)) controlling whether this entity acts as an IPv6 router on any interface. Entities SHOULD save this to non-volatile storage and restore it on re-initialization.
