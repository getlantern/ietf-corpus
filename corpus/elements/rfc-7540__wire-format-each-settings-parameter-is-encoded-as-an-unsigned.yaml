document: rfc-7540
kind: wire-format
summary: Each SETTINGS parameter is encoded as an unsigned 16-bit identifier followed by an unsigned 32-bit value (6 octets total). A SETTINGS frame payload MUST be a multiple of 6 octets; otherwise it MUST be treated as a connection error of type FRAME_SIZE_ERROR.
section: 6.5.1
