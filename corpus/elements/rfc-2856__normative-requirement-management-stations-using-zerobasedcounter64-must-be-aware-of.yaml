document: rfc-2856
kind: normative-requirement
summary: Management stations using ZeroBasedCounter64 must be aware of the minimum time to wrap the counter and the actual polling interval, and must discard data if the actual time between polls is too long or no minimum wrap time is defined.
section: "4"
rfc2119_level: MUST
