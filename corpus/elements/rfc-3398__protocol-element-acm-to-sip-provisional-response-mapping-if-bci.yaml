summary: 'ACM to SIP provisional response mapping: if BCI indicates ''subscriber free'' → send 180 Ringing; if BCI Interworking Indicator is set or Optional BCI in-band media field is set → initiate backwards early media and send 183 Session Progress. An ACM with a Cause Area Indicator (CAI) triggers a 183 with SDP for early media cut-through followed eventually by a final error response.'
