document: rfc-2562
kind: interoperability-note
summary: When a TN3270E server forwards a multi-RU chain from the SNA host, it may not know whether DR is requested until the LIC RU arrives. Because the TN3270E header (and thus DR specification) can only be included with the FIC RU, some servers routinely specify DR on all FIC RUs.
section: 3.4.1
topics:
    - snmp
    - measurement
