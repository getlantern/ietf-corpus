document: rfc-6230
kind: normative-requirement
summary: The terminating REPORT message MUST include a 'Status' header with value 'terminate', MUST increment the 'Seq' by 1 from the previous REPORT, and MUST include a 'Timeout' header (its value is ignored). This signals the Control Client to clean up state for the original CONTROL transaction.
section: 6.3.2
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
