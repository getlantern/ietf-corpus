document: rfc-7450
kind: protocol-element
summary: AMT employs a client-server model in which a 'gateway' sends requests to receive specific multicast traffic to a 'relay' that responds by delivering the requested multicast traffic. Gateways are deployed in networks lacking multicast support; relays are deployed in multicast-enabled networks with native multicast connectivity.
section: "4.1"
topics:
    - multicast
    - udp
