document: rfc-7261
kind: normative-requirement
summary: When the offer or answer has G723 and the annexa parameter is absent, this MUST be treated as if annexa=yes, because all G723 implementations understand the annexa attribute and 'yes' is the implied default per RFC 4856.
section: "3.2"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
