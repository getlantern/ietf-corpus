document: rfc-4875
kind: wire-format
summary: The P2MP SENDER_TEMPLATE object (C-Type 13 for IPv4, 14 for IPv6) extends the RFC 3209 SENDER_TEMPLATE with a Sub-Group Originator ID (globally unique TE Router ID) and a Sub-Group ID, enabling multiple Path messages and incremental updates to be associated with the same P2MP LSP.
