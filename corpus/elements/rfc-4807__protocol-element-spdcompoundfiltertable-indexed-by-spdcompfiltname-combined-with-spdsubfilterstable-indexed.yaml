summary: spdCompoundFilterTable (indexed by spdCompFiltName) combined with spdSubfiltersTable (indexed by spdCompFiltName, spdSubFiltPriority) defines recursive boolean composite filters. spdCompFiltLogicType (AND/OR) determines evaluation semantics; each sub-filter may itself be a compound filter.
