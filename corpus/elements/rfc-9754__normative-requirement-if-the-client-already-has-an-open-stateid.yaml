document: rfc-9754
kind: normative-requirement
summary: If the client already has an open stateid for a file, the server SHOULD ignore the OPEN4_SHARE_ACCESS_WANT_OPEN_XOR_DELEGATION flag and return both the open and delegation stateids to avoid hiding state information from the client.
section: "4"
rfc2119_level: SHOULD
