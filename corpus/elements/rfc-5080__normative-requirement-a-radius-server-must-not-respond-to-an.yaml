document: rfc-5080
kind: normative-requirement
summary: A RADIUS server MUST NOT respond to an authorization check with confidential information (such as Tunnel-Password) about any user unless the Access-Request contains a State attribute tying it to an earlier authentication. The server MUST NOT respond with confidential information about any other user.
section: 2.1.1
rfc2119_level: MUST NOT
topics:
    - radius
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
