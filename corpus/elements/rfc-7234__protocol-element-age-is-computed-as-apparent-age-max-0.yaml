document: rfc-7234
kind: protocol-element
summary: 'Age is computed as: apparent_age = max(0, response_time - date_value); corrected_age_value = age_value + response_delay; corrected_initial_age = max(apparent_age, corrected_age_value); current_age = corrected_initial_age + resident_time. A cache MUST interpret corrected_age_value relative to when the request was initiated, not when the response was received.'
section: 4.2.3
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
