document: rfc-1826
kind: normative-requirement
summary: If explicit IP sensitivity labels (e.g., IPSO per RFC 1108) are present, they MUST be included in the Authentication Data calculation. The IP Security Option (IPSO) MUST be included whenever it is present.
section: "3.3"
rfc2119_level: MUST
topics:
