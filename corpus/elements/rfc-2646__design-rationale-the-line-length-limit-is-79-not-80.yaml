document: rfc-2646
kind: design-rationale
summary: The line-length limit is 79, not 80, because while 80 characters fit on a standard screen, the last column is often reserved for a line-wrap indicator. Staying at 79 ensures non-flowed-aware displays do not need to wrap.
section: "4.1"
topics:
