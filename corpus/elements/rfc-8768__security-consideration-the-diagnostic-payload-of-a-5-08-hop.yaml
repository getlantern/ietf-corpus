document: rfc-8768
kind: security-consideration
summary: The diagnostic payload of a 5.08 (Hop Limit Reached) error message may leak sensitive topology information. A boundary proxy MAY be instructed to strip part or all of the diagnostic payload before forwarding the 5.08 response.
section: "7"
topics:
