document: rfc-9475
kind: protocol-element
summary: The "msgi" JWT claim provides a digest over a MIME body. Its value is a string consisting of the crypto algorithm name (e.g., "sha256") concatenated with a hyphen and the base64-encoded digest of the canonicalized MIME body of the message.
