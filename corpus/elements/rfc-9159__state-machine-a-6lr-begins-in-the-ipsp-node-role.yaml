document: rfc-9159
kind: state-machine
summary: A 6LR begins in the IPSP Node role only. Upon establishing a connection with an existing router and receiving a Router Advertisement, it configures its own interface address, transitions to router mode, and starts operating as an IPSP Router. A 6LBR, by contrast, uses both IPSP Node and IPSP Router roles from initialization.
section: 3.3.2
topics:
