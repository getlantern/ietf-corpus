document: rfc-5350
kind: interoperability-note
summary: 'Aggregated Reservation nesting levels are numbered differently in IPv4 and IPv6: nesting levels begin at 1 for IPv4 (RAO values 1-32) and at 1 for IPv6 after this document''s correction (RAO values 4-35). Implementors must not assume the same RAO value encodes the same nesting level across both protocol versions.'
section: "2"
topics:
