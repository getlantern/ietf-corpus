document: rfc-3473
kind: design-rationale
summary: The Notify message was introduced to enable targeted, non-hop-by-hop failure notification to nodes responsible for LSP restoration, unlike PathErr and ResvErr which are hop-by-hop. It does not replace existing error messages but provides a faster, directed notification path.
section: "4.3"
topics:
    - mpls
    - routing
