document: rfc-9557
kind: protocol-element
summary: 'The suffix key ''u-ca'' is allocated to indicate the preferred calendar for presenting the date/time. Its allowed values are Unicode Calendar Identifiers as defined in Unicode Technical Standard #35, enabling calendar-aware applications to display timestamps in non-Gregorian calendars (e.g., Hebrew, Chinese).'
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
