document: rfc-2147
kind: wire-format
summary: The TCP MSS option is a 16-bit field; the sentinel value 65535 is repurposed to mean 'infinity' (no MSS limit imposed by the sender) when operating over IPv6 jumbogram-capable paths with MTU > 65535.
