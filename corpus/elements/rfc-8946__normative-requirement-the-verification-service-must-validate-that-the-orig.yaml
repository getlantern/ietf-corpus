document: rfc-8946
kind: normative-requirement
summary: The verification service MUST validate that the "orig" field of the innermost PASSporT is equivalent to the "orig" field of the outermost "div" PASSporT and all intermediate "div" PASSporTs in the chain; if the "orig" value has changed, the entire chain MUST be treated as invalid.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
