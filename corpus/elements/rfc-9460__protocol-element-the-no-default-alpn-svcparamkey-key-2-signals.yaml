document: rfc-9460
kind: protocol-element
summary: The 'no-default-alpn' SvcParamKey (key 2) signals that the scheme's default ALPN protocol set is not supported at this endpoint. Its presentation and wire-format values MUST be empty; when present, 'alpn' must also appear for the RR to be self-consistent.
section: "7.1"
topics:
