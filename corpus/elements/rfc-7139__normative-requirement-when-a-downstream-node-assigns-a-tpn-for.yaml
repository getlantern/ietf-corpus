document: rfc-7139
kind: normative-requirement
summary: When a downstream node assigns a TPN for ODUj-to-ODUk multiplexing, the TPN MUST NOT collide with TPN values used by existing LO ODU connections in the selected HO ODU link, and the Expected MSI (ExMSI) MUST be configured using this TPN.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
