document: rfc-9244
kind: normative-requirement
summary: DOTS clients that are interested in receiving pre-or-ongoing-mitigation telemetry from the DOTS server (Section 9.2) MUST set 'server-originated-telemetry' to 'true' in the telemetry configuration. Omitting this field is equivalent to setting it to 'false'.
section: 7.1.2
rfc2119_level: MUST
topics:
    - security
