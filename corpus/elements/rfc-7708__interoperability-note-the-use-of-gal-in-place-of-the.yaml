document: rfc-7708
kind: interoperability-note
summary: The use of GAL in place of the flow label causes all OAM packets to take exactly one of the possible equal-cost paths, which may differ from the paths taken by actual traffic flows. If fate sharing between OAM and data packets is required, an alternative VCCV type must be used.
section: "4"
topics:
