document: rfc-8469
kind: interoperability-note
summary: Some LSRs inspect past the PW CW to determine payload type for ECMP. When operators enable such deep inspection, Ethernet frames may still be delivered out of order despite the presence of the CW, and this misordering can be difficult to diagnose.
