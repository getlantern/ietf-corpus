summary: 'Four SNMP traps are defined: snaNodeStateChangeTrap (Node OperState changed, carrying snaNodeOperName and snaNodeOperState), snaNodeActFailTrap (ACTPU failure, also carrying snaNodeOperActFailureReason), snaLuStateChangeTrap (LU state change), and snaLuSessnBindFailTrap (BIND request failure).'
