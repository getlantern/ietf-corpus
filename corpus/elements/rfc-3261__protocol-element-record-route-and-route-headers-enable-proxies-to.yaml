document: rfc-3261
kind: protocol-element
summary: Record-Route and Route headers enable proxies to remain in the signaling path for a dialog's lifetime. A proxy inserts a Record-Route entry into INVITE requests; both endpoints accumulate the resulting route set and include it as Route headers in all subsequent dialog requests.
section: "20.30"
topics:
    - sip
