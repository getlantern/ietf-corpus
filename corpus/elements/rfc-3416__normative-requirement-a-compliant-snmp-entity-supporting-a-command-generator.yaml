document: rfc-3416
kind: normative-requirement
summary: A compliant SNMP entity supporting a command generator application must be able to properly receive and handle a Response-PDU with error-status equal to noSuchName, badValue, or readOnly, for SNMPv1 proxy compatibility.
section: 4.2.4
