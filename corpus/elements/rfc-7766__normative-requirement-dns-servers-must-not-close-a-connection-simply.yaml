document: rfc-7766
kind: normative-requirement
summary: DNS servers MUST NOT close a connection simply because the first 'read' from the TCP layer does not contain the entire DNS message; servers SHOULD apply the connection timeouts as specified in Section 6.2.3.
section: "8"
rfc2119_level: MUST NOT
topics:
