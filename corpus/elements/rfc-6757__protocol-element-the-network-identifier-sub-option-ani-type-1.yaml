document: rfc-6757
kind: protocol-element
summary: The Network-Identifier sub-option (ANI Type=1) carries the name of the access network (SSID for 802.11, PLMN Identifier for 3GPP, ANI for 3GPP2) and optionally the Access-Point Name. ANI Length ranges from 5 to 32 octets. At most one instance is permitted per ANI option.
section: 3.1.1
