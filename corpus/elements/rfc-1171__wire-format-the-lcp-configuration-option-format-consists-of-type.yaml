document: rfc-1171
kind: wire-format
summary: 'The LCP Configuration Option format consists of: Type (1 octet, identifying the option type), Length (1 octet, total option length including Type, Length, and Data fields), and Data (variable). If a negotiable option is received with an invalid Length, a Configure-Nak should be sent with the correct Length.'
section: 4.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
