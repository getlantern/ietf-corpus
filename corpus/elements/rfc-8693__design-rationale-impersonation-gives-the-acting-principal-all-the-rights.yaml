document: rfc-8693
kind: design-rationale
summary: Impersonation gives the acting principal all the rights of the subject and makes them indistinguishable from the subject; delegation preserves the actor's separate identity while explicitly noting they act on behalf of the subject. Both semantics are supported via the presence or absence of 'actor_token' and the 'act' claim in issued tokens.
section: "1.1"
topics:
    - oauth
    - security
