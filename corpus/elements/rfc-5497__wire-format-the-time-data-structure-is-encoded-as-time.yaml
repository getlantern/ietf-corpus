document: rfc-5497
kind: wire-format
summary: The <time-data> structure is encoded as (<time-code><hop-count>)*<time-code>, consisting of an odd number of octets (2n+1 for n hop-count/time-value pairs plus a default time-code). The hop-count thresholds <d_1>...<d_n> MUST be strictly increasing with <d_n> < 255.
section: "6"
