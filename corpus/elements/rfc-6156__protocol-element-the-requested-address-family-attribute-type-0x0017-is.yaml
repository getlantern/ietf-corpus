document: rfc-6156
kind: protocol-element
summary: The REQUESTED-ADDRESS-FAMILY attribute (type 0x0017) is a new comprehension-required STUN attribute allowing a client to request a specific address family (IPv4 or IPv6) for a TURN allocation. It is encoded as a TLV with a 1-byte Family field (0x01 for IPv4, 0x02 for IPv6) and 24 bits of reserved zero padding, for a total value length of 4 bytes.
section: 4.1.1
topics:
