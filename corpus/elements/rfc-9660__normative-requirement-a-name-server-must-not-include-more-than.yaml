document: rfc-9660
kind: normative-requirement
summary: A name server MUST NOT include more than one ZONEVERSION option for a given TYPE and LABELCOUNT combination, though it MAY include multiple ZONEVERSION options for different TYPEs or different enclosing zones.
section: "3.2"
rfc2119_level: MUST NOT
