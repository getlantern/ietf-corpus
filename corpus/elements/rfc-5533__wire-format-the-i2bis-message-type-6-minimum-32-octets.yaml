document: rfc-5533
kind: wire-format
summary: The I2bis message (Type=6, minimum 32 octets) carries a 47-bit Initiator Context Tag, 32-bit Initiator Nonce, 32-bit Responder Nonce (from R1bis), 49-bit Reserved2, and the 47-bit Packet Context Tag copied from R1bis. It re-establishes a lost context without a full I1/R1 round trip.
section: "5.9"
