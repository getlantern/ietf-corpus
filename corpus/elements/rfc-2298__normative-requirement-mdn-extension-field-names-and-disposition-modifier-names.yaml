document: rfc-2298
kind: normative-requirement
summary: MDN extension field names and disposition modifier names not beginning with 'X-' MUST be registered with IANA and described in a standards-track or IESG-approved experimental RFC. 'X-' names are reserved for experimental use and will never be standardized.
