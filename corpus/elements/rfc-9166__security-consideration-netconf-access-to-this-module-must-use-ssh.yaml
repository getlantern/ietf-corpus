document: rfc-9166
kind: security-consideration
summary: NETCONF access to this module MUST use SSH (RFC 6242) as the mandatory-to-implement secure transport; RESTCONF MUST use HTTPS with TLS (RFC 8446). Access control SHOULD be enforced via NACM (RFC 8341) to restrict operations to authorized users.
section: "5"
topics:
