document: rfc-8159
kind: normative-requirement
summary: It is RECOMMENDED that Ethernet OAM as defined in IEEE 802.1ag and/or ITU-T Y.1731 be enabled for keyed IP tunnels, since OAM at the tunnel layer cannot detect failures in Ethernet service processing at the ingress/egress router or on the attachment circuit.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - vpn
