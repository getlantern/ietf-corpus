document: rfc-1247
kind: normative-requirement
summary: All routers belonging to an area must agree on whether the area is configured as a stub. Virtual links cannot be configured through stub areas, and AS boundary routers cannot be placed internal to stub areas. The backbone cannot be a stub area.
section: "3.6"
rfc2119_level: MUST
topics:
    - routing
