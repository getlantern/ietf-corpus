document: rfc-6475
kind: normative-requirement
summary: The value of pmip6MagStatus and pmip6LmaStatus MUST remain unchanged across reboots of the managed entity, ensuring that the MAG or LMA function restarts in the same enabled/disabled state after a reboot.
section: "5.2"
