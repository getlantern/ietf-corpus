document: rfc-1155
kind: design-rationale
summary: The Opaque type enables passing arbitrary ASN.1 syntax without requiring implementations to interpret it; conforming implementations need only accept and recognize opaquely-encoded data, supporting extensibility without mandatory decoding complexity.
