document: rfc-7180
kind: protocol-element
summary: 'The TRILL port mode bits (Disable, P2P, Access/trunk, Trunk) define which frame types are permitted: Layer 2 control, native ingress/egress, LSP/SNP/MTU, TRILL Hello, and P2P Hello. The Disable bit disables all frames except optionally low-level Layer 2 control frames.'
