document: rfc-5665
kind: interoperability-note
summary: When the 'sctp' or 'sctp6' netids are used, the ONC RPC Record Marking standard (RFC 5531, Section 11) is NOT used. Instead, SCTP's native record-oriented data transfer mechanism is used directly, because SCTP natively supports record boundaries.
section: "3"
topics:
    - sctp
