document: rfc-9868
kind: normative-requirement
summary: Must-support options other than NOP and EOL MUST be placed by the transmitter before all other SAFE UDP Options. AUTH and UENC MUST NOT be used concurrently, because UENC subsumes AUTH's services. Options other than OCS, AUTH, and UENC MUST NOT include fields whose values depend on the contents of the surplus area.
section: "10"
rfc2119_level: MUST
topics:
    - udp
