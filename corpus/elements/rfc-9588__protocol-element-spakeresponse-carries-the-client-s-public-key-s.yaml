document: rfc-9588
kind: protocol-element
summary: SPAKEResponse carries the client's public key S as an OCTET STRING and the client's chosen second-factor data as EncryptedData (key K'[1], key usage KEY_USAGE_SPAKE). The client MUST NOT include a second-factor type not listed in the challenge's factors field.
