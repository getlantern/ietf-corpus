document: rfc-6021
kind: protocol-element
summary: The object-identifier type (string with ASN.1-compliant regex) represents hierarchically assigned names as dot-separated non-negative integers; each sub-identifier MUST NOT exceed 2^32-1. The object-identifier-128 subtype restricts to at most 128 sub-identifiers, matching the SMIv2 OBJECT IDENTIFIER type.
