document: rfc-4037
kind: normative-requirement
summary: An OCP agent MUST NOT send a uni identifier that corresponds to an inactive state (never created or already destroyed) except when creating a new identifier. Such identifiers invalidate the host OCP message and require transaction or connection termination.
section: "11"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
