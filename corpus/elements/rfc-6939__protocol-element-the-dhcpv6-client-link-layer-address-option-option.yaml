document: rfc-6939
kind: protocol-element
summary: The DHCPv6 Client Link-Layer Address option (OPTION_CLIENT_LINKLAYER_ADDR, code 79) carries the client's link-layer address type (16-bit IANA hardware type) and variable-length link-layer address in DHCPv6 Relay-Forward messages. Option-length is 2 plus the length of the link-layer address.
