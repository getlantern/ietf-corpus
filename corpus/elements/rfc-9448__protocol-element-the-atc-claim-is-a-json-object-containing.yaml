document: rfc-9448
kind: protocol-element
summary: 'The ''atc'' claim is a JSON object containing four elements: ''tktype'' (required, string ''TNAuthList''), ''tkvalue'' (required, base64url-encoded DER-encoded TNAuthList ASN.1 object), ''ca'' (optional boolean for CA delegation certificate), and ''fingerprint'' (required, ACME account key thumbprint per RFC 8555 Section 8.1).'
section: "5.4"
