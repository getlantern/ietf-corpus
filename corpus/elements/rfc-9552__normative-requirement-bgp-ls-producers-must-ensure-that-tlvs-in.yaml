document: rfc-9552
kind: normative-requirement
summary: BGP-LS Producers MUST ensure that TLVs in the BGP-LS Attribute do not cause a BGP UPDATE for a single Link-State NLRI to cross the maximum BGP message size limit. Implementations are RECOMMENDED to support extended BGP message size (RFC 8654) to accommodate larger attribute payloads.
section: "5.3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
