document: rfc-5464
kind: normative-requirement
summary: Entry names MUST NOT contain two consecutive '/' characters, MUST NOT end with '/', MUST NOT contain '*' or '%' characters, and MUST NOT contain non-ASCII characters or octets in the range 0x00–0x19. Entry names are case-insensitive. Invalid entry names result in a BAD response.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - email
