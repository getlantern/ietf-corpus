document: rfc-6001
kind: protocol-element
summary: The IACD sub-TLV is defined as an optional sub-TLV of the OSPF TE Link TLV (Type 2) with Type 25. Multiple IACD sub-TLVs MAY be present within a given TE Link TLV. Its presence does not modify the format or processing of the existing ISCD sub-TLV.
section: 3.2.1
topics:
    - mpls
    - routing
