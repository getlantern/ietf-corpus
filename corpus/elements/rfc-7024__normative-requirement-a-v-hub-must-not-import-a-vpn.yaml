document: rfc-7024
kind: normative-requirement
summary: A V-hub MUST NOT import a VPN-IP default route unless the imported route is the Internet VPN-IP default route, preventing routing loops where V-hubs forward traffic back toward each other via default routes.
section: "3"
rfc2119_level: MUST NOT
topics:
