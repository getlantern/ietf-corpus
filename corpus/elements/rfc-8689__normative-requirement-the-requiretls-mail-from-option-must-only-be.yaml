document: rfc-8689
kind: normative-requirement
summary: 'The REQUIRETLS MAIL FROM option MUST only be specified in the context of an SMTP session that: (1) employs TLS transmission, (2) has validated the server''s MX hostname via DNSSEC or MTA-STS, and (3) has verified the server''s certificate via trust chain or DANE.'
section: "2"
rfc2119_level: MUST
topics:
    - email
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
