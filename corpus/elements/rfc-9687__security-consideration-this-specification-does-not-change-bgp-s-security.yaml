document: rfc-9687
kind: security-consideration
summary: This specification does not change BGP's security characteristics. Implementing the BGP SendHoldTimer enhances network resilience by terminating connections with malfunctioning or overwhelmed remote peers, reducing the risk of stale routing information propagation.
