document: rfc-8299
kind: protocol-element
summary: 'Routing protocol support per site and site-network-access includes: `ospf` (with address family, area-address, metric, and optional OSPF sham-links), `bgp` (with autonomous-system and address-family), `static` (with cascaded IPv4/IPv6 LAN prefix and next-hop lists), `rip`, and `vrrp`. Multiple routing protocols may be active simultaneously.'
