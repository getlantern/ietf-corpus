document: rfc-4867
kind: interoperability-note
summary: The Q (frame quality) bit and NO_DATA/SPEECH_LOST frame type indicators are included for interoperability with the ITU-T I.366.2 ATM payload format, the 3GPP UMTS Iu interface, and other non-IP AMR transport formats, enabling damaged frames to be forwarded to the decoder for error concealment rather than dropped.
section: 4.3.2
topics:
    - rtp
    - realtime
