document: rfc-4934
kind: state-machine
summary: 'The EPP TCP session state machine follows: TCP CONNECT → server sends <greeting> → client sends <login> → server sends response → command/response exchanges → client sends <logout> or CLOSE → server sends response and disconnects. The general EPP server state machine is defined in RFC 4930 Section 2.'
section: "3"
