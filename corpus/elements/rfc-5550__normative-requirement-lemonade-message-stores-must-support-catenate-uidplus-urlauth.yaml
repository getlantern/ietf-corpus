document: rfc-5550
kind: normative-requirement
summary: Lemonade Message Stores MUST support CATENATE, UIDPLUS, URLAUTH, and URL-PARTIAL. CATENATE allows message assembly on the server from existing parts and new data; URLAUTH issues time-limited authorization tokens for delegated access to specific messages.
section: "5.7"
rfc2119_level: MUST
topics:
    - email
