document: rfc-2571
kind: protocol-element
summary: An SNMP context is a collection of management information accessible by an SNMP entity, identified by the combination of contextEngineID and contextName. An item of management information may exist in multiple contexts; to identify it uniquely, both contextEngineID and contextName must be specified in addition to object type and instance.
section: 3.3.1
topics:
    - snmp
