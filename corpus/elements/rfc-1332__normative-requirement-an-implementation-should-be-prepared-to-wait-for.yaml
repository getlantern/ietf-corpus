document: rfc-1332
kind: normative-requirement
summary: An implementation should be prepared to wait for Authentication and Link Quality Determination to finish before timing out waiting for a Configure-Ack or other response. It is suggested that an implementation give up only after user intervention or a configurable amount of time.
section: "2"
rfc2119_level: SHOULD
topics:
    - tcp
    - ip
