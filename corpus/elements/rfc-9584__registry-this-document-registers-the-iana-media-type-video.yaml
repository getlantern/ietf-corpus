document: rfc-9584
kind: registry
summary: This document registers the IANA media type 'video/evc' for the EVC RTP payload format. Optional parameters include profile-id, level-id, toolset-id, max-recv-level-id, sprop-sps, sprop-pps, sprop-sei, sprop-max-don-diff, sprop-depack-buf-bytes, and depack-buf-cap. The change controller is IETF (avtcore@ietf.org).
section: "7.1"
topics:
    - registry
    - rtp
    - realtime
