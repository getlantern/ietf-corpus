kind: wire-format
summary: 'The ABNF grammar defines: paragraph = 1*flowed-line fixed-line; fixed = [quote] [stuffing] *text-char non-sp CRLF; flowed lines are flow-qt or flow-unqt, each ending in 1*SP CRLF; sig-sep = [quote] "--" SP CRLF; stuffing = [SP].'
