document: rfc-9627
kind: normative-requirement
summary: For VP8 streams, on receipt of an LRR a sender that supports LRRs MUST encode the stream so it can set the Y bit in a packet whose temporal layer is at or below the target layer index.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
