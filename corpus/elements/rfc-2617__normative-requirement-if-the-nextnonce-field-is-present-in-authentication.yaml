document: rfc-2617
kind: normative-requirement
summary: If the nextnonce field is present in Authentication-Info, the client SHOULD use it when constructing the Authorization header for its next request. Failure to do so may result in a re-authentication request from the server with stale=TRUE.
section: 3.2.3
rfc2119_level: SHOULD
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
