document: rfc-9671
kind: protocol-element
summary: The :updatesonly argument limits processing to messages targeting existing calendar objects only; if the unique identifier does not exist on any user calendar, the implementation MUST NOT add the object. :updatesonly and :calendarid are mutually exclusive.
section: "4.3"
topics:
