document: rfc-4931
kind: normative-requirement
summary: The <update> command requires at least one of <domain:add>, <domain:rem>, or <domain:chg> to be present if the command is not being extended. All three elements MAY be omitted if an <update> extension is present.
section: 3.2.5
rfc2119_level: MUST
