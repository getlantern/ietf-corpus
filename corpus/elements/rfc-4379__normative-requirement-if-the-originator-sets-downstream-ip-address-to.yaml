document: rfc-4379
kind: normative-requirement
summary: If the originator sets Downstream IP Address to the all-routers multicast address (224.0.0.2 for IPv4, FF02::2 for IPv6) with interface index 0, the receiving LSR MUST bypass both interface and label stack validation but return Downstream Mapping TLVs using its local information.
section: "3.3"
rfc2119_level: MUST
topics:
    - mpls
