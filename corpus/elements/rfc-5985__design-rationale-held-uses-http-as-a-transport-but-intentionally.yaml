document: rfc-5985
kind: design-rationale
summary: HELD uses HTTP as a transport but intentionally restricts its feature set so that a LIS is not required to be a fully compliant HTTP server. This allows LIS implementations to be built on standard HTTP servers with extensibility mechanisms and simplifies client implementation using existing HTTP libraries.
section: "8"
topics:
    - http
