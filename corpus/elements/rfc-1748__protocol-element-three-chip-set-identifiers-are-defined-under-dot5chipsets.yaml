summary: 'Three chip set identifiers are defined under dot5ChipSets for backward compatibility with RFC 1229''s ifExtnsChipSet: dot5ChipSetIBM16 (IBM 16/4 Mbs), dot5ChipSetTItms380 (TI TMS 380 4Mbs), and dot5ChipSetTItms380c16 (TI TMS 380C16 16/4 Mbs). These are retained for backward compatibility only, as RFC 1573 obsoletes ifExtnsChipSet.'
