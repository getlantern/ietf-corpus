document: rfc-7317
kind: protocol-element
summary: User authentication is controlled by the ordered leaf-list /system/authentication/user-authentication-order (identityref, base authentication-method) and the /system/authentication/user list (if-feature local-users) containing per-user name, password (crypt-hash), and authorized-key entries with algorithm and key-data fields for SSH public key authentication.
