document: rfc-1573
kind: normative-requirement
summary: After an interface is dynamically removed, its ifIndex value MUST NOT be re-used by a different dynamically added interface until after the next re-initialization of the network management system, to prevent counter discontinuity confusion in manager stations.
section: 3.2.1
rfc2119_level: MUST NOT
topics:
    - snmp
