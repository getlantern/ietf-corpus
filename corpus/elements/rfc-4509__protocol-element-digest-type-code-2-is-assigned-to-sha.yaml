document: rfc-4509
kind: protocol-element
summary: Digest type code 2 is assigned to SHA-256 for use within DNSSEC DS records. The digest is computed as SHA_256(DNSKEY owner name | DNSKEY RDATA), where DNSKEY RDATA consists of Flags, Protocol, Algorithm, and Public Key fields.
section: "2.1"
