document: rfc-2535
kind: normative-requirement
summary: Security-aware resolvers MUST NOT trust the AD bit unless they trust the server they are communicating with and either have a secure path to it or use DNS transaction security.
section: "6.1"
rfc2119_level: MUST NOT
