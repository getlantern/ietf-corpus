document: rfc-3966
kind: protocol-element
summary: The 'extension' parameter (';ext=') identifies stations behind a non-ISDN PBX and is functionally equivalent to ISDN subaddresses. At most one of 'isdn-subaddress' and 'extension' may appear in a single tel URI.
