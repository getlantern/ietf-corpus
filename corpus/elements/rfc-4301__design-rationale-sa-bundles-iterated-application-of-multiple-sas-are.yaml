document: rfc-4301
kind: design-rationale
summary: SA bundles (iterated application of multiple SAs) are no longer a required architectural element. Nested SAs can be achieved by coordinating SPD entries with IP forwarding tables to cause packets to traverse the IPsec boundary more than once, but this is outside the IPsec module scope and thus potentially harder to manage.
section: "4.3"
topics:
    - ipsec
    - security
