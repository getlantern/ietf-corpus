kind: protocol-element
summary: dot1dStpPortAdminPointToPoint is a read-write INTEGER with values forceTrue(0), forceFalse(1), and auto(2). In auto mode, the port is point-to-point if it is an aggregator with all aggregatable members or if the MAC is configured for full duplex.
