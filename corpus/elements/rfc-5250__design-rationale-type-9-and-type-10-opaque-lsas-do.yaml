document: rfc-5250
kind: design-rationale
summary: 'Type-9 and type-10 Opaque LSAs do not require the ASBR tracking mechanism because local reachability can be determined directly: type-9 originators must be OSPF neighbors in Exchange state or greater, and type-10 originator reachability is determined by the intra-area SPF calculation.'
