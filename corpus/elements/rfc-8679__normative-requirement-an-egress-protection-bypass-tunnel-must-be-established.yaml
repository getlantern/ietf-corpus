document: rfc-8679
kind: normative-requirement
summary: An egress-protection bypass tunnel MUST be established with protector P as the physical tail end and egress router E as the node to avoid, and MUST NOT be affected by the topology change caused by an egress node failure.
section: "5.6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
