document: rfc-7233
kind: normative-requirement
summary: When generating a 206 response, the server MUST generate Date, Cache-Control, ETag, Expires, Content-Location, and Vary if those fields would have been sent in a 200 response, unless the request had an If-Range header (in which case other representation header fields SHOULD NOT be generated).
section: "4.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
