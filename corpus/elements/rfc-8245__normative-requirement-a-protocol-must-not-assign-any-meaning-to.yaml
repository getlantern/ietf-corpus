document: rfc-8245
kind: normative-requirement
summary: A protocol MUST NOT assign any meaning to the presence, absence, or ordering of addresses in an Address Block, or to the division of addresses among Address Blocks; information about address meaning MUST only be carried using Address Block TLVs.
section: "4.6"
rfc2119_level: MUST NOT
topics:
