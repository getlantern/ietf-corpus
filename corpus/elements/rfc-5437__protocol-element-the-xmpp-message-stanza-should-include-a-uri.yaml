document: rfc-5437
kind: protocol-element
summary: The XMPP <message/> stanza SHOULD include a URI hint for locating the email message, encapsulated in a <url/> child of an <x/> element in the 'jabber:x:oob' namespace. The URI SHOULD be an IMAP URL but MAY be HTTP or POP3.
section: "2.7"
topics:
    - email
