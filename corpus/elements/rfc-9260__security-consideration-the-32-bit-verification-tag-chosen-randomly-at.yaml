document: rfc-9260
kind: security-consideration
summary: 'The 32-bit Verification Tag, chosen randomly at association startup, protects against blind masquerade attacks: packets arriving without the correct Verification Tag are silently discarded, preventing an off-path attacker from injecting data or control chunks into an established association.'
section: 12.2.4.2
topics:
    - sctp
    - security
