document: rfc-1784
kind: normative-requirement
summary: In a Read Request, the client specifies a tsize value of '0'; the server returns the actual file size in octets in the OACK. If the file is too large for the client to handle, it may abort the transfer with Error packet error code 3.
section: Transfer Size Option Specification
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
