document: rfc-6874
kind: interoperability-note
summary: URI parsers are suggested to accept bare "%" signs (a "%" not followed by two valid hexadecimal characters) for user interface convenience, enabling cut-and-paste from tools like "ping". Such bare "%" signs MUST be converted to "%25" encoding before the URI is used in any protocol or HTML document.
section: "3"
topics:
