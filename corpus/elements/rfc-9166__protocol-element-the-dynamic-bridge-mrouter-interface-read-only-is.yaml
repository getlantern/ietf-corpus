document: rfc-9166
kind: protocol-element
summary: The dynamic bridge-mrouter-interface (read-only) is populated by the device when it detects IGMP/MLD queries from a multicast router on an interface. It is distinct from static-bridge-mrouter-interface (read-write, feature static-mrouter-interface), which is administratively configured.
section: "3.1"
topics:
