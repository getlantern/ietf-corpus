document: rfc-1928
kind: normative-requirement
summary: A UDP-based client MUST send its datagrams to the UDP relay server at the BND.PORT indicated in the reply to the UDP ASSOCIATE request, and MUST encapsulate datagrams if the authentication method provides encapsulation.
