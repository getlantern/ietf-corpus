kind: wire-format
summary: 'The WESP header consists of four fixed 8-bit fields: Next Header, HdrLen, TrailerLen, and Flags, totaling 4 octets for IPv4. For IPv6, an optional 4-octet padding field follows, making the header 8 octets when the P flag is set.'
