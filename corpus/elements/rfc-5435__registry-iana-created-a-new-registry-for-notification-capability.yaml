document: rfc-5435
kind: registry
summary: IANA created a new registry for Notification-Capability Parameters used by the notify_method_capability test. Vendor-controlled values ("vnd.<vendor-name>.<capability-name>") are First Come First Served; others require Specification Required. Initial entry is the "online" capability.
