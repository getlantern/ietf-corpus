document: rfc-2508
kind: protocol-element
summary: 'Each session context stores: the full IP/UDP/RTP headers of the last packet, the first-order difference for the IPv4 ID field (initialized to 1 on FULL_HEADER), the first-order difference for the RTP timestamp (initialized to 0 on FULL_HEADER), the last 4-bit link sequence number, the current generation number, and optionally a context-specific delta encoding table.'
