document: rfc-6213
kind: interoperability-note
summary: When IS-IS graceful restart (RFC 5306) and BFD are co-deployed, BFD session failure may coincide with control-plane restart. Premature abort of graceful restart due to BFD failure is undesirable; some mechanism to temporarily ignore BFD session failure is beneficial. The detailed interaction is described in RFC 5882 and is outside the scope of this document.
section: "5"
topics:
    - routing
