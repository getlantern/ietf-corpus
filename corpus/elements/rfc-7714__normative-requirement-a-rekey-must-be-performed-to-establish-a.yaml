document: rfc-7714
kind: normative-requirement
summary: A rekey MUST be performed to establish a new master key before the (ROC,SEQ) pair cycles back to its original value. For GCM, the (ROC,SEQ) and SSRC values MUST be generated or checked by the SRTP implementation or an equally trustworthy module.
section: "8.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - crypto
    - security
