document: rfc-3016
kind: design-rationale
summary: No extra RTP header fields are defined for MPEG-4 Visual because MPEG-4 Visual already includes built-in error resilience tools (e.g., Header Extension Code in video packet headers) that work across RTP/IP as well as other networks such as H.223/mobile and MPEG-2/TS.
section: "1.1"
topics:
