document: rfc-9125
kind: protocol-element
summary: 'The auto-discovery route advertised by each gateway consists of IPv4 or IPv6 NLRI containing one of the gateway''s loopback addresses (AFI/SAFI: 1/1, 2/1, 1/4, or 2/4), plus a Tunnel Encapsulation attribute containing the gateway''s encapsulation information in one or more Tunnel TLVs.'
