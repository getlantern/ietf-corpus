document: rfc-4933
kind: interoperability-note
summary: This document obsoletes RFC 3733. Key changes include removal of a restriction on transform commands during pending states, clarification of the acID element semantics for non-pending transfers, and allowance for out-of-band notification of offline review results in addition to poll messages.
section: Appendix A
