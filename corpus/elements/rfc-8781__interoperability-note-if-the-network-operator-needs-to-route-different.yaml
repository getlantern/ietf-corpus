document: rfc-8781
kind: interoperability-note
summary: If the network operator needs to route different parts of the IPv4 address space to different NAT64 devices, this is accomplished by routing more-specific subprefixes of the single advertised NAT64 prefix—the PREF64 option itself specifies exactly one prefix for all IPv4 destinations.
