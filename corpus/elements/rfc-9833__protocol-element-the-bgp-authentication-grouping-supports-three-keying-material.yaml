document: rfc-9833
kind: protocol-element
summary: 'The ''bgp-authentication'' grouping supports three keying-material options: TCP-AO (enable-ao boolean + ao-keychain key-chain-ref per RFC 5925), MD5 (md5-keychain key-chain-ref per RFC 4364 Section 13.2), and explicit (key-id uint32, key string, crypto-algorithm identityref). The keying-material container is conditioned on enabled=''true''.'
section: "4.3"
topics:
    - yang
    - bgp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
