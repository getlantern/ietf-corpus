document: rfc-2595
kind: normative-requirement
summary: Once a POP3 client issues a STLS command, it MUST NOT issue further commands until a server response is seen and the TLS negotiation is complete. The STLS command is only permitted in AUTHORIZATION state.
section: "4"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
