document: rfc-9834
kind: protocol-element
summary: IS-IS routing support provides address-family, area-address, and authentication (key chain or explicit key/algorithm). RIP support includes address-family (determining whether RIPv2, RIPng, or both are enabled), authentication, and status. Both protocols support admin and operational status tracking.
