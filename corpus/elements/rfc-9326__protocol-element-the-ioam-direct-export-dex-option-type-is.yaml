document: rfc-9326
kind: protocol-element
summary: The IOAM Direct Export (DEX) Option-Type is a new IOAM-Option-Type that serves as a trigger for IOAM nodes to locally aggregate and/or export IOAM data to a receiving entity without pushing data into in-flight data packets. It is inserted by IOAM encapsulating nodes, readable but not modifiable by transit nodes, and removed by decapsulating nodes.
section: "3.1"
topics:
