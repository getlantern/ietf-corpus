document: rfc-4730
kind: normative-requirement
summary: 'The User Interface (notifier) MUST authenticate the requesting party before accepting a KPML subscription. User Interfaces MUST implement SIP Digest authentication, the sips: scheme, and TLS. Subscribers MUST be prepared for the notifier to demand authentication and a secure channel.'
section: "4.7"
rfc2119_level: MUST
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
