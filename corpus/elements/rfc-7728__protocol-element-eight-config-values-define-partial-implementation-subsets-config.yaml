document: rfc-7728
kind: protocol-element
summary: Eight 'config' values define partial implementation subsets. Config=1 is full support (default). Configs 2-5 address the RTP Mixer use case with various combinations of send/receive capability for each message type. Configs 6-8 cover local-pause-only implementations. Implementing any config other than those defined is NOT RECOMMENDED.
