document: rfc-6796
kind: protocol-element
summary: The <turn-intermediary> element describes a TURN relay (RFC 5766) to be used as a media intermediary. It MUST contain one <int-host-port> and MAY contain <int-addl-port>, <shared-secret>, <user>, and <transport> elements. If no <transport> element is present, UDP is assumed.
section: 4.4.2
topics:
