document: rfc-6857
kind: design-rationale
summary: Post-delivery downgrading is described as an interim 'least bad' solution while clients are upgraded. It converts internationalized messages to all-ASCII representation so legacy POP/IMAP clients can receive them, but cannot generally preserve enough information for lossless replies.
section: "1.3"
topics:
