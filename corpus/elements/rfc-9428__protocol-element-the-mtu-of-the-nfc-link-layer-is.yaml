document: rfc-9428
kind: protocol-element
summary: The MTU of the NFC link layer is determined by the MIU (Maximum Information Unit). The default MIU is 128 bytes; a larger MIU can be announced via an optional MIUX parameter, with the formula MTU = MIU = 128 + MIUX. The maximum LLCP MTU is 2175 bytes.
