document: rfc-6677
kind: privacy-consideration
summary: Channel-binding information exchanged between peer and server must always be integrity protected, but may not be encrypted. If channel-binding messages contain peer or network entity identifiers, failure to encrypt them violates the privacy properties of the EAP method. If encryption is unavailable, private information MUST NOT be sent as part of channel-binding data.
section: "9.4"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
