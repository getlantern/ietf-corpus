document: rfc-7959
kind: normative-requirement
summary: 'The SZX value 7 (which would imply a 2048-byte block) is reserved: it MUST NOT be sent, and MUST lead to a 4.00 Bad Request response code upon reception in a request.'
section: "2.2"
rfc2119_level: MUST NOT
