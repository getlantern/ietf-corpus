document: rfc-4430
kind: design-rationale
summary: 'The initiator is responsible for rekeying (not the responder) for two reasons: to prevent SA duplication from simultaneous renewal collisions, and because Kerberos''s client/server model means servers benefit from not maintaining large ticket caches while waiting for client-initiated sessions.'
