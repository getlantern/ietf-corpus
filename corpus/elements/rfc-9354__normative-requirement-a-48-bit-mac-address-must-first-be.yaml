document: rfc-9354
kind: normative-requirement
summary: A 48-bit MAC address MUST first be extended to a 64-bit IID by inserting 0xFFFE at the fourth and fifth octets as specified in RFC 2464. The IPv6 IID is derived from the 64-bit IID by inverting the U/L bit.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
