document: rfc-2111
kind: protocol-element
summary: 'A ''cid'' URL is converted to a Content-ID message header by removing the ''cid:'' prefix, converting %hh hex-escaped characters to ASCII equivalents, and enclosing the result in angle brackets. For example, ''cid:foo4%25foo1@bar.net'' becomes ''Content-ID: <foo4%foo1@bar.net>''.'
section: "2"
topics:
