document: rfc-8667
kind: normative-requirement
summary: When the Prefix Attribute Flags sub-TLV (RFC 7794) is present for a given prefix, the N-Flag and R-Flag values in that sub-TLV MUST be used and the corresponding values in the Prefix-SID sub-TLV MUST be ignored.
