document: rfc-6221
kind: normative-requirement
summary: When the LDRA receives a Relay-Reply message with an Interface-ID option present and link-address unspecified, the LDRA MUST relay the decapsulated message to the client on the interface identified in the Interface-ID option.
section: 5.3.2
rfc2119_level: MUST
topics:
    - ip
