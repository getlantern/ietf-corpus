document: rfc-4819
kind: protocol-element
summary: The 'comment' attribute contains user-specified UTF-8 text about the public key. The server MUST NOT interpret or act upon its content, SHOULD preserve it and return it in list operations, and this attribute SHOULD NOT be marked critical.
