document: rfc-6795
kind: interoperability-note
summary: If the notifier uses the same MIME format in NOTIFY bodies as the subscriber used in the SUBSCRIBE body, the notifier may assume the subscriber supports all format extensions used in the SUBSCRIBE. The notifier SHOULD NOT use extensions beyond those the subscriber demonstrated support for.
section: "3.5"
topics:
    - sip
