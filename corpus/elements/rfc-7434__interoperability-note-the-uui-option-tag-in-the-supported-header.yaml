document: rfc-7434
kind: interoperability-note
summary: The 'uui' option tag in the Supported header field conveys no additional information over the presence of the User-to-User header field in the INVITE. Using the 'uui' option tag in a Require header field will cause the request to fail at UAS or ISDN gateways not supporting the extension, producing results inconsistent with ISDN UUS mechanisms.
section: "7"
topics:
