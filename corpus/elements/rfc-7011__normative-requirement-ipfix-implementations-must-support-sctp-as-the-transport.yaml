document: rfc-7011
kind: normative-requirement
summary: IPFIX implementations MUST support SCTP as the transport protocol. TCP and UDP MAY additionally be supported. When SCTP is used, the Exporting Process MUST use a single SCTP association per Collecting Process and SHOULD use multiple SCTP streams to avoid head-of-line blocking.
section: "10.1"
rfc2119_level: MUST
topics:
    - measurement
    - sctp
    - tcp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
