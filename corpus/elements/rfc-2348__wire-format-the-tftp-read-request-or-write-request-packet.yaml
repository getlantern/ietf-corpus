document: rfc-2348
kind: wire-format
summary: 'The TFTP Read Request or Write Request packet is extended with the blocksize option: fields are ''opc'' (opcode 1 or 2), ''filename'' (NULL-terminated), ''mode'' (NULL-terminated), ''blksize'' (NULL-terminated literal string), and ''#octets'' (ASCII decimal value, NULL-terminated). All fields except ''opc'' are NULL-terminated.'
section: Blocksize Option Specification
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
