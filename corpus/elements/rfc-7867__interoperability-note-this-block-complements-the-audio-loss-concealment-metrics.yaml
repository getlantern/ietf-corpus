document: rfc-7867
kind: interoperability-note
summary: This block complements the audio loss concealment metrics defined in RFC 7294, extending RTCP XR reporting to the video domain. It relies on the Measurement Information Block from RFC 6776 for timing context and MUST be co-located in the same compound RTCP packet.
