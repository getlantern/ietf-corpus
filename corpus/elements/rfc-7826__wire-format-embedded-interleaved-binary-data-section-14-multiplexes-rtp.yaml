document: rfc-7826
kind: wire-format
summary: Embedded (interleaved) binary data (Section 14) multiplexes RTP/RTCP packets over the RTSP TCP connection. Each binary frame is prefixed with a '$' character, a 1-byte channel identifier, and a 2-byte big-endian data length, followed by the payload.
