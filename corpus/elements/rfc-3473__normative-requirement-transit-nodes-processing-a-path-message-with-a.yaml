document: rfc-3473
kind: normative-requirement
summary: Transit nodes processing a Path message with a Protection object MUST verify the requested protection can be satisfied by the outgoing interface; if it cannot, they MUST generate a PathErr with 'Routing problem/Unsupported Link Protection'.
section: "6.1"
rfc2119_level: MUST
topics:
