document: rfc-8601
kind: interoperability-note
summary: The iprev method's reliability varies significantly by region and operator practice; in some regions forward/reverse DNS matching is rarely maintained, making the test unlikely ever to pass. The precise implementation details of iprev are intentionally unspecified, and consumers must understand what a given verifier's iprev result actually means.
