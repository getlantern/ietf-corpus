kind: design-rationale
summary: 'In its limiting configuration where all ICMP PTB messages are ignored, PLPMTUD parallels congestion control: a transport protocol adjusts packet size using losses to deduce appropriateness, which is considered more philosophically consistent with the end-to-end principle than relying on ICMP messages containing transcribed multi-layer headers.'
