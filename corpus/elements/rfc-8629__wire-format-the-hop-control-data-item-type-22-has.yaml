document: rfc-8629
kind: wire-format
summary: 'The Hop Control Data Item (Type 22) has a 2-byte length field. The payload is a single unsigned 16-bit Hop Control Actions field encoding one of four actions: Reset (0), Terminate (1), Direct Connection (2), Suppress Forwarding (3).'
