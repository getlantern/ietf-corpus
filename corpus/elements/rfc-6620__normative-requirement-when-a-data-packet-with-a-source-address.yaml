document: rfc-6620
kind: normative-requirement
summary: When a data packet with a source address outside any on-link prefix arrives on a Validating Port (transit traffic), the packet SHOULD be discarded. Logging or alarms MAY be used as an alternative; an ICMPv6 Destination Unreachable (code 5) MAY be sent back.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - ip
    - security
