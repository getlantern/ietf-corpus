document: rfc-9394
kind: interoperability-note
summary: The PARTIAL FETCH modifier can be combined with the CHANGEDSINCE (CONDSTORE) FETCH modifier. The server first selects the messages in the PARTIAL range and then returns only flag changes with MODSEQ higher than the specified value. The order of PARTIAL and CHANGEDSINCE modifiers in the command is not significant.
section: "3.4"
topics:
