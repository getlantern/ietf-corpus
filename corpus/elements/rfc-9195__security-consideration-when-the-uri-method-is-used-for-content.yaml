document: rfc-9195
kind: security-consideration
summary: When the URI method is used for content-schema specification, the referenced YANG instance data file may be altered maliciously or changed as part of normal handling, causing the actual content-schema to differ from what is expected. Integrity and stability of the referenced file must be ensured.
section: "4"
topics:
    - security
    - yang
