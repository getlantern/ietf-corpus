document: rfc-7521
kind: design-rationale
summary: The Assertion ID field enables replay prevention by allowing servers to reject previously seen assertion IDs. Combined with Expires At, this relieves the authorization server from maintaining an infinite state table of processed assertion IDs.
section: "8.2"
topics:
    - oauth
    - security
