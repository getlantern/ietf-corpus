document: rfc-8311
kind: security-consideration
summary: Effective congestion control is crucial to Internet operation; this memo places responsibility for maintaining it on experimenters. Middleboxes may respond to ECN-based attacks (e.g., ECT-marked SYN floods) by dropping ECT-marked packets at higher probability, but only during an actual attack and only if ECN is determined to be contributing.
section: "4.3"
topics:
    - security
    - ecn
    - tcp
    - congestion
