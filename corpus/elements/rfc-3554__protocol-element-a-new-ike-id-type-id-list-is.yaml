document: rfc-3554
kind: protocol-element
summary: A new IKE ID type, ID_LIST, is defined to allow recursive inclusion of IDs. An ID_LIST payload can contain multiple ID_IPV4_ADDR or other ID types to describe all addresses of an SCTP endpoint in a single Phase 2 exchange.
