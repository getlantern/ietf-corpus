document: rfc-4896
kind: design-rationale
summary: The default 2K DMS is too small for practical use, severely restricting the circular buffer and compressed message size. Applications mandating SigComp must also mandate an appropriately sized DMS accounting for bytecode size, auxiliary data structures, maximum message size, and average message entropy.
section: "2.2"
topics:
    - realtime
    - sip
