document: rfc-7519
kind: privacy-consideration
summary: A JWT may contain privacy-sensitive information; when it does, measures MUST be taken to prevent disclosure to unintended parties. Options include using an encrypted JWT with recipient authentication, transmitting over TLS, or omitting privacy-sensitive information from the JWT entirely.
section: "12"
rfc2119_level: MUST
topics:
    - jose
    - privacy
    - security
