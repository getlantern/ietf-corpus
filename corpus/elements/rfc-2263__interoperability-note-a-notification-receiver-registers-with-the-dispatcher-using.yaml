document: rfc-2263
kind: interoperability-note
summary: A notification receiver registers with the Dispatcher using an undefined 'wildcard' value for contextEngineID, so it receives notifications regardless of the contextEngineID in the notification message. For Inform PDUs, the receiver must send a Response PDU with error-status and error-index both set to 0.
section: "3.4"
topics:
    - snmp
