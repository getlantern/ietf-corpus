document: rfc-6785
kind: protocol-element
summary: The 'imap.mailbox' environment item MUST be set to the name of the mailbox containing or targeted for the affected message. Its value is fixed when the script begins and MUST NOT change as a result of any action such as 'fileinto'.
section: "4.4"
rfc2119_level: MUST
topics:
