document: rfc-9194
kind: normative-requirement
summary: Reverse metric operation on an interface is enabled by configuring a metric value either at the top level or under a level-specific container. If a metric value is only specified under a level-specific container, operation is only enabled at that level.
section: "2.2"
rfc2119_level: MUST NOT
topics:
