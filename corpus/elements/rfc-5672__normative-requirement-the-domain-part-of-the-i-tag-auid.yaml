document: rfc-5672
kind: normative-requirement
summary: The domain part of the i= tag (AUID) MUST be the same as, or a subdomain of, the value of the d= tag (SDID). Internationalized domain names MUST be converted using the ToASCII function per RFC 3490.
section: "10"
rfc2119_level: MUST
topics:
