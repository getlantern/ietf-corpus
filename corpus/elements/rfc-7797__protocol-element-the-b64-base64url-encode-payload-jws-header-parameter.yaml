document: rfc-7797
kind: protocol-element
summary: The "b64" (base64url-encode payload) JWS Header Parameter controls whether the payload is represented as ASCII(BASE64URL(JWS Payload)) or as the raw JWS Payload value. It is a JSON boolean with a default of "true" and MUST occur only within the JWS Protected Header.
