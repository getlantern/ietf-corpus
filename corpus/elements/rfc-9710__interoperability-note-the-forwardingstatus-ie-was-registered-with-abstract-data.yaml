document: rfc-9710
kind: interoperability-note
summary: The 'forwardingStatus' IE was registered with Abstract Data Type unsigned8, which deviates from RFC 7270. This document corrects it to unsigned32. Implementations using RFC 7270 should use unsigned32 with reduced-size encoding to export as unsigned8.
section: "4.3"
topics:
