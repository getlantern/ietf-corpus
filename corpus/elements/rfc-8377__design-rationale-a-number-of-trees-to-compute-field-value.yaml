document: rfc-8377
kind: design-rationale
summary: A Number of Trees to Compute field value of zero in the Trees sub-TLV for a non-zero topology is honored and causes no distribution trees to be calculated for that topology. This differs from topology zero, where a zero value causes one tree to be computed, allowing topologies to exist with only unicast traffic.
section: 3.4.1
topics:
    - routing
