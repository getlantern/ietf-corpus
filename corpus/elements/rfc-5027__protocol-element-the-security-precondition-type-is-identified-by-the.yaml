document: rfc-5027
kind: protocol-element
summary: 'The security precondition type is identified by the string "sec" and extends the RFC 3312 precondition grammar: precondition-type = "sec" / "qos" / token. It requires that relevant cryptographic parameters (cipher, key, etc.) for a secure media stream have been successfully negotiated in the required direction(s).'
section: "3"
topics:
