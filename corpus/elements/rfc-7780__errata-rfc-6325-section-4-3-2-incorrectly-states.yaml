document: rfc-7780
kind: errata
summary: RFC 6325 Section 4.3.2 incorrectly states that multi-destination MTU-probe and MTU-ack TRILL IS-IS PDUs are sent to the All-RBridges multicast address; they MUST be sent to the All-IS-IS-RBridges multicast address (Err3004).
section: 5.1.1
topics:
    - routing
