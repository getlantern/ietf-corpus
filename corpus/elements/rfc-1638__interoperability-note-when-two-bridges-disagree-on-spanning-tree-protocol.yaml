document: rfc-1638
kind: interoperability-note
summary: When two bridges disagree on spanning tree protocol, the system with the lower-numbered protocol SHOULD Configure-Nak suggesting its own protocol; if no agreement is reached, BCP MUST NOT enter the Opened state except when one side supports no spanning tree at all.
section: "5.7"
topics:
    - routing
