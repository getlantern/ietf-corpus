document: rfc-4502
kind: normative-requirement
summary: An agent must allow a row to be created with any unused index value if it has the resources; index values may be any valid value in the range and are chosen by the manager. When more than one manager simultaneously attempts to create the same conceptual row, only the first will succeed.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
