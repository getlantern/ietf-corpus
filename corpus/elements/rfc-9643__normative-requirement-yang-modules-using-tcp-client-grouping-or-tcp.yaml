document: rfc-9643
kind: normative-requirement
summary: YANG modules using 'tcp-client-grouping' or 'tcp-server-grouping' SHOULD refine the 'remote-port' or 'local-port' leaf with a 'default' statement when the port number is well-known, or with a 'mandatory' statement if a port number must always be configured.
section: 3.1.2.1
rfc2119_level: SHOULD
