document: rfc-5621
kind: protocol-element
summary: If a SIP message contains a reference (e.g., a Content-ID URL) to a body part, the UA processes the body part according to the reference rather than its disposition type. If more than one reference to a body part exists, the UA processes the body part once per reference.
section: "9.3"
topics:
    - sip
    - realtime
