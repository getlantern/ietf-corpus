document: rfc-3010
kind: protocol-element
summary: The delegation mechanism allows the server to grant a client either a read delegation (no other client can write for the duration) or write delegation (no other client has read or write access), enabling local servicing of OPEN, CLOSE, LOCK, LOCKU, READ, WRITE without immediate server interaction. Delegations can be recalled via a callback path.
section: 1.1.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
