document: rfc-7173
kind: normative-requirement
summary: If the pseudowire does not support fragmentation (the common case), the available TRILL IS-IS packet payload size over the pseudowire (accounting for MPLS encapsulation with a control word) MUST be used in determining the TRILL campus-wide MTU size (Sz).
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
