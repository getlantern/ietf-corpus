document: rfc-2327
kind: protocol-element
summary: 'An SDP session description has a fixed field order: session-level (v, o, s, i, u, e, p, c, b, one-or-more t/r, z, k, a) followed by zero or more media-level sections (m, i, c, b, k, a). All fields must appear in exactly this order; optional items are marked with ''*''. Session-level values are defaults for all media unless overridden.'
