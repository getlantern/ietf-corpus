summary: The IOAM Pre-allocated Trace Option-Type and Proof of Transit Option-Type are carried in the IPv6 hop-by-hop extension header using Option-Type 0x31. The Edge-to-Edge Option and Direct Export (DEX) Option are carried using Option-Type 0x11.
