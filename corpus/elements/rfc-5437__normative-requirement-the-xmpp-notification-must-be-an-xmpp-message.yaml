document: rfc-5437
kind: normative-requirement
summary: The XMPP notification MUST be an XMPP <message/> stanza. The 'type' attribute MUST be 'headline' or 'normal', and the stanza MUST include a <body/> child element.
section: "2.7"
rfc2119_level: MUST
