document: rfc-2262
kind: normative-requirement
summary: The reportableFlag MUST be zero for messages containing a Report PDU, a Response PDU, or an SNMPv2-Trap PDU; it MUST be one for Request-type PDUs and InformRequest PDUs. If the flag is incorrectly set, the receiver MUST process the message as if it were set correctly.
section: "6.4"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
