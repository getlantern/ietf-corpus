document: rfc-3928
kind: normative-requirement
summary: For initial synchronization or full resync, the Sync Request control cookie field MUST NOT be set. The updateType MUST be syncOnly or syncAndPersist; scheme MAY be set, and if set the server MUST use that scheme or return lcupUnsupportedScheme.
section: 4.1.1
rfc2119_level: MUST NOT
