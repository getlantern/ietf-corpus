document: rfc-9928
kind: protocol-element
summary: The 4o6RA deployment requires that all DHCPv4 broadcast and unicast messages to and from clients be steered through the 4o6RA. This can be achieved by placing the 4o6RA in a central position to intercept all client traffic, or by using NAT with the 4o6RA address for unicast messages.
