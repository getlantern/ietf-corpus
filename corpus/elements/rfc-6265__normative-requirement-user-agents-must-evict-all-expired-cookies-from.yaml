document: rfc-6265
kind: normative-requirement
summary: 'User agents MUST evict all expired cookies from the cookie store whenever an expired cookie exists. When removing excess cookies, they MUST evict in priority order: (1) expired cookies, (2) cookies from domains exceeding a per-domain limit, (3) all cookies; with earliest last-access-time broken ties.'
section: "5.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
