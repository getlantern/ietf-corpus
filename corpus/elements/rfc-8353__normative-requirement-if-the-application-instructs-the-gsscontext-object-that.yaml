document: rfc-8353
kind: normative-requirement
summary: If the application instructs the GSSContext object that delegation is not desired, the implementation MUST NOT permit delegation to occur. Delegation may only be provided at the explicit request of the application; this overrides the general rule that mechanisms may enable unrequested services.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
