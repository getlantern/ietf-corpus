document: rfc-9561
kind: security-consideration
summary: In environments where security requirements for the storage protocol cannot be met, pNFS with an NVMe layout SHOULD NOT be deployed. Similarly, where client-side protection from access to storage outside of the layout is insufficient, pNFS with SCSI layout on NVMe SHOULD NOT be deployed.
section: "3"
topics:
    - security
