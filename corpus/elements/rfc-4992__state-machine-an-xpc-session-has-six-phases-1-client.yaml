document: rfc-4992
kind: state-machine
summary: 'An XPC session has six phases: (1) client establishes TCP connection; (2) server sends CRB; (3) client sends RQB with optional keep-open flag; (4) server responds with RSB indicating whether session stays open; (5) if session continues, repeat from step 3; (6) TCP connection is closed.'
section: "1"
topics:
