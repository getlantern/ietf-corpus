document: rfc-9593
kind: normative-requirement
summary: When multiple IKE_INTERMEDIATE exchanges take place during IKE SA establishment, it is RECOMMENDED that the responder use the last IKE_INTERMEDIATE exchange (just before IKE_AUTH) to send the list of supported authentication methods.
section: "3.1"
rfc2119_level: RECOMMENDED
topics:
