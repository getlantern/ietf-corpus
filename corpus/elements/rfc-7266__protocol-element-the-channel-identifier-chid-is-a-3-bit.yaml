document: rfc-7266
kind: protocol-element
summary: The Channel Identifier (CHID) is a 3-bit field in the multi-channel audio segment used to identify each audio channel carried in the same RTP stream. Default channel mapping follows RFC 3551 Section 4.1, but payload-format-specific mappings (e.g., AC-3, E-AC-3) may apply.
section: 3.2.2
topics:
