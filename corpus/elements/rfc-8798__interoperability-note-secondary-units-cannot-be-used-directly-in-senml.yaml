document: rfc-8798
kind: interoperability-note
summary: Secondary units cannot be used directly in SenML version 10 'u' fields; their use requires either a must-understand field (label ending in '_') or a new SenML version indicator that explicitly permits secondary units, as defined outside the scope of RFC 8798.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
