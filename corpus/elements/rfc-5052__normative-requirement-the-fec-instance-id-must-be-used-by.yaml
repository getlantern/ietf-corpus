document: rfc-5052
kind: normative-requirement
summary: The FEC Instance ID MUST be used by all Under-Specified FEC schemes and MUST NOT be used by Fully-Specified FEC schemes. CDPs providing an encoding format for Common FEC OTI elements MUST support values up to (2^^16)-1 for FEC Instance ID, (2^^48)-1 for Transfer-Length, and (2^^32)-1 for other elements.
section: 6.2.4
rfc2119_level: MUST
topics:
    - multicast
