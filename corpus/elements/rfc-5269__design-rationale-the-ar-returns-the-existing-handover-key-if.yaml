document: rfc-5269
kind: design-rationale
summary: The AR returns the existing handover key if a CGA already has one, rather than generating a new one. This handles the case where an MN returns to a PAR before key expiry and generates the same CGA for its Care-of Address.
section: "3.2"
topics:
