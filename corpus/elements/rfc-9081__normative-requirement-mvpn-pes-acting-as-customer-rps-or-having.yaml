document: rfc-9081
kind: normative-requirement
summary: MVPN PEs acting as customer RPs or having MSDP sessions in a VPN MUST NOT include other MSDP speakers in the PE mesh group; the PE mesh group is integrated into the rest of the MSDP infrastructure following normal MSDP rules.
