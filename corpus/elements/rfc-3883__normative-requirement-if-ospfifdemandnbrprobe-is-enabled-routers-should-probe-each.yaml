document: rfc-3883
kind: normative-requirement
summary: If ospfIfDemandNbrProbe is enabled, routers SHOULD probe each other when the demand circuit link comes up and may probe periodically every ospfIfDemandNbrProbeInterval while the link remains up.
section: "2"
rfc2119_level: SHOULD
