document: rfc-9885
kind: normative-requirement
summary: Any future document that proposes a different mechanism for scaling TLV contents for a given codepoint MUST explain why multiple occurrences of a TLV is not appropriate. Multiple occurrences are codified as the default and standard extension mechanism.
section: "1"
rfc2119_level: MUST
topics:
