document: rfc-7572
kind: protocol-element
summary: A single SIP instant message is a SIP MESSAGE request sent from a SIP user agent, addressed to an IM URI (im:user@domain) or a SIP/SIPS URI (sip:user@domain or sips:user@domain), as defined in RFC 3428.
