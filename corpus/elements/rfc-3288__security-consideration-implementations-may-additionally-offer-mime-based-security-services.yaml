document: rfc-3288
kind: security-consideration
summary: Implementations may additionally offer MIME-based security services such as OpenPGP (RFC 3156) or S/MIME (RFC 2633) to provide message integrity and confidentiality at the envelope level, independent of BEEP transport-layer security. BEEP-specific security issues are addressed in Section 9 of the BEEP core specification.
section: "8"
topics:
