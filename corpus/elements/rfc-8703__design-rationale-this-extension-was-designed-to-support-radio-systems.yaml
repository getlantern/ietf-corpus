document: rfc-8703
kind: design-rationale
summary: This extension was designed to support radio systems that operate at Layer 3 rather than Layer 2 bridge mode, point-to-multipoint tunnel systems (e.g., SD-WAN), and modems providing wide-area connectivity (e.g., LTE, 802.11) where the concept of a Layer 2 reachable remote router does not apply. The core DLEP assumption that every destination has a MAC address on the local Layer 2 domain fails in these cases.
section: "1.2"
topics:
    - routing
    - yang
