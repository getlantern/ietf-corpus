document: rfc-5333
kind: interoperability-note
summary: The existing 'mailto:' URI scheme is already used to address iMIP-compatible calendar services, and 'http:'/'https:' schemes are already used for CalDAV-compatible services; this document maps those URI schemes to ENUM NAPTR records without defining new URI schemes.
