document: rfc-6761
kind: interoperability-note
summary: Special-use domain name behavior must apply universally on all networks — not only on the public Internet — because ICANN has no jurisdiction over private DNS servers on private networks. Special names are worthless unless they are defined to behave consistently by protocol across all installations.
section: "3"
topics:
    - dns
