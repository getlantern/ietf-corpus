document: rfc-6512
kind: protocol-element
summary: The VPN-Recursive Opaque Value (Type 8) is a new mLDP opaque value type whose value field consists of an 8-octet Route Distinguisher followed by an entire P2MP or MP2MP FEC element. It is used in MVPN inter-AS and Carrier's Carrier scenarios where an RD is required to locate the correct VRF at the recursion termination point.
section: "3"
topics:
