document: rfc-1123
kind: normative-requirement
summary: A Server-FTP MUST send only correctly formatted replies. A User-FTP SHOULD use only the highest-order digit of a 3-digit reply code for procedural decisions, and MUST handle multi-line replies. A Server SHOULD send 4xx (temporary failure) when a retry might succeed.
section: 4.1.2.11
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
