document: rfc-5391
kind: normative-requirement
summary: The mode-set parameter is bidirectional. If present in an SDP offer, the answerer MUST return the same mode-set or a subset; the answerer MAY reorder preferences. The offerer MUST NOT send frames of a mode removed by the answerer.
section: 5.3.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - sip
