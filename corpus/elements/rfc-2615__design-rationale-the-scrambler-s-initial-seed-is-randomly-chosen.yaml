document: rfc-2615
kind: design-rationale
summary: The scrambler's initial seed is randomly chosen by the transmitter to improve operational security. This means the odds of an attacker guessing the scrambler state are 1/2^43, with an additional 1/127 probability of correct frame alignment, yielding approximately 9e-16 probability of deliberately causing SONET/SDH-layer problems.
