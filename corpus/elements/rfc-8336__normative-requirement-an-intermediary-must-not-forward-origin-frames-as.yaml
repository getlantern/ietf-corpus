document: rfc-8336
kind: normative-requirement
summary: An intermediary MUST NOT forward ORIGIN frames, as the frame describes a property of the connection and is processed hop by hop. Clients configured to use a proxy MUST ignore any ORIGIN frames received from it.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - http
