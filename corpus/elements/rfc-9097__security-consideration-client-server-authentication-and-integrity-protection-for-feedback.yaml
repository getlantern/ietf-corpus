document: rfc-9097
kind: security-consideration
summary: Client-server authentication and integrity protection for feedback messages conveying measurements are RECOMMENDED. Hosts MUST limit the number of simultaneous tests to avoid resource exhaustion. Senders MUST be rate limited using the pre-built load rate table.
