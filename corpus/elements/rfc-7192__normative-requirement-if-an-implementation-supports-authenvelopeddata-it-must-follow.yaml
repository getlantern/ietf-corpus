document: rfc-7192
kind: normative-requirement
summary: If an implementation supports AuthEnvelopedData, it MUST follow EnvelopedData key management recommendations, but the content-encryption algorithm MUST be AES-GCM; the 128-bit version MUST be implemented and the 256-bit version SHOULD be implemented.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - security
