document: rfc-4817
kind: normative-requirement
summary: The tunnel tail MUST know precisely which labels it has distributed to tunnel heads of IPsec-secured tunnels. Those labels MUST NOT be distributed by the tunnel tail to any LSP adjacencies other than IPsec-secured tunnel heads.
section: "6.3"
rfc2119_level: MUST
topics:
    - mpls
    - ipsec
    - security
