document: rfc-4668
kind: protocol-element
summary: The RADIUS-AUTH-CLIENT-MIB module (OID radiusAuthentication 2) contains two scalars—radiusAuthClientInvalidServerAddresses and radiusAuthClientIdentifier—plus a deprecated IPv4-only table (radiusAuthServerTable) and a current version-neutral table (radiusAuthServerExtTable), each with one row per RADIUS authentication server sharing a secret with the client.
