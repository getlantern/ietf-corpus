document: rfc-7529
kind: design-rationale
summary: The specification reuses the Unicode Consortium's CLDR calendar system registry rather than creating a new IANA registry. This is justified because most implementations of non-Gregorian calendars will use the Unicode ICU library, making CLDR reuse natural and reducing divergence.
section: "5"
topics:
