document: rfc-9418
kind: protocol-element
summary: Each subservice entry in the `subservices` list is keyed by `type` (an `identityref` derived from `subservice-base`) and `id` (a string unique within its type). It carries configurable fields (`under-maintenance`, `parameter` choice) and read-only telemetry (`health-score`, `symptoms`, `last-change`, `label`).
