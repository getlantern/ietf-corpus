document: rfc-3539
kind: normative-requirement
summary: AAA protocols MUST support an application layer watchdog message to enable more quickly detecting transport and application-layer failures. The watchdog operates on all open connections and is used to suspend and eventually close failing connections, and to re-open and validate connections that have returned to health.
section: "3.4"
rfc2119_level: MUST
topics:
    - diameter
    - radius
    - tcp
    - sctp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
