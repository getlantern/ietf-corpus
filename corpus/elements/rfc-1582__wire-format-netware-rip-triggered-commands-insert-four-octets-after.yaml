document: rfc-1582
kind: wire-format
summary: 'Netware RIP triggered commands insert four octets after the 2-octet operation field: sequence number (2 octets), fragment number (1 octet), number of fragments (1 octet). Up to 50 routing entries of 8 octets each (network number 4 octets, hops 2 octets, ticks 2 octets) follow in triggered response packets. Maximum datagram is 406 octets excluding the 30-octet IPX header.'
