document: rfc-7166
kind: interoperability-note
summary: A mismatch in SA ID, Authentication Type, or message digest results in failure to form an OSPFv3 adjacency. For multi-access links, communities can be migrated using different Interface Instance IDs, but this results in sub-optimal routing and added complexity.
section: "5"
topics:
