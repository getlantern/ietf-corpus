document: rfc-2334
kind: wire-format
summary: The CA message mandatory part begins with CA Sequence Number (4 bytes) followed by the Mandatory Common Part whose Flags field carries M (Master/Slave), I (Initialization), and O (mOre) bits. Zero or more CSAS Records (not embedded in CSA Records) are appended.
section: B.2.1
