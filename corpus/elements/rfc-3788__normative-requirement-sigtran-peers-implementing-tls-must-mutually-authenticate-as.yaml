document: rfc-3788
kind: normative-requirement
summary: SIGTRAN peers implementing TLS MUST mutually authenticate as part of TLS session establishment. The TLS server MUST request a certificate from the TLS client, and the TLS client MUST be prepared to supply a certificate on request.
