document: rfc-5026
kind: normative-requirement
summary: If multiple Home Agents are available in the DNS SRV record and the chosen HA does not respond to IKE_SA_INIT messages or IKEv2 authentication fails, the Mobile Node SHOULD try the next Home Agent on the list.
section: 5.1.2
rfc2119_level: SHOULD
topics:
