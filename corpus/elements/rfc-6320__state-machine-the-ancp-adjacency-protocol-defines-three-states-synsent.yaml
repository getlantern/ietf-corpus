document: rfc-6320
kind: state-machine
summary: 'The ANCP adjacency protocol defines three states: SYNSENT (SYN sent, awaiting SYNACK or SYN), SYNRCVD (SYN received and SYNACK sent), and ESTAB (fully synchronized). Transitions are triggered by SYN, SYNACK, ACK, and RSTACK messages; mismatch conditions (failed B or C checks) cause RSTACK transmission and reversion to earlier states.'
section: 3.5.2.2
extracted_by: claude-sonnet-4-6
