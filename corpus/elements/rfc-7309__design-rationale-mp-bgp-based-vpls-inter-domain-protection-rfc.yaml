document: rfc-7309
kind: design-rationale
summary: MP-BGP-based VPLS inter-domain protection (RFC 6074) relies on BGP control-plane convergence, which may not meet tight SLA failover requirements. ICCP with PW redundancy provides faster convergence and applies even when MP-BGP is not deployed for VPLS.
