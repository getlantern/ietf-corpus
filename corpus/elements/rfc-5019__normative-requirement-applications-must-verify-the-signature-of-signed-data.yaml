document: rfc-5019
kind: normative-requirement
summary: Applications MUST verify the signature of signed data before asking an OCSP client to check certificate status. If the signature is invalid, an OCSP check MUST NOT be requested. Clients SHOULD NOT make requests to check the status of expired certificates.
section: "3.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
