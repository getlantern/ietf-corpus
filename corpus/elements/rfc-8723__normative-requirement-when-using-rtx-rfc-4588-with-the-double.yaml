document: rfc-8723
kind: normative-requirement
summary: When using RTX (RFC 4588) with the double transform, cached payloads MUST be the fully double-encrypted packets as sent on the wire, and retransmission packets MUST be encrypted in repair mode (hop-by-hop key only).
section: "7.1"
rfc2119_level: MUST
topics:
    - rtp
    - crypto
