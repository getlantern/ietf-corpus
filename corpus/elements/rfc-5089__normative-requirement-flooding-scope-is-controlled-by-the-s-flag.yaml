document: rfc-5089
kind: normative-requirement
summary: Flooding scope is controlled by the S flag in the IS-IS Router Capability TLV. When scope is area-local, the PCED sub-TLV MUST be carried in a Router Capability TLV with S bit cleared; when scope is the entire IS-IS routing domain, the S bit MUST be set. When only the L bit of PATH-SCOPE is set, flooding scope MUST be area-local.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
