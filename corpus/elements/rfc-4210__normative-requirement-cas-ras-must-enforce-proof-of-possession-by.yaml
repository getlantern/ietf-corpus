document: rfc-4210
kind: normative-requirement
summary: CAs/RAs MUST enforce Proof-of-Possession by some means. Without POP verification, the binding between an end entity and its private key remains unverified, making certificates less meaningful in the Internet PKI.
section: "4.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
