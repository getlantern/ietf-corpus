document: rfc-8550
kind: normative-requirement
summary: For ASCII email addresses, the domain component MUST be compared using a case-insensitive function. The local name component SHOULD be compared using a case-insensitive function. The pkcs-9-at-emailAddress attribute MUST be encoded as IA5String with an upper bound of 255 characters.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - pkix
