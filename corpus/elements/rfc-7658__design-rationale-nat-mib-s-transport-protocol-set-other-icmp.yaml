document: rfc-7658
kind: design-rationale
summary: NAT-MIB's transport protocol set (other, icmp, udp, tcp) used arbitrary numeric values unrelated to standard IANA protocol numbers, preventing NAT implementations from exposing information about DCCP, SCTP, etc. The lesson is to use standard transport protocol numbers.
section: "3.1"
topics:
    - nat
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
