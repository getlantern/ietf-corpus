document: rfc-1406
kind: security-consideration
summary: The MIB includes several read-write objects in the DS1 Configuration Table (including dsx1LineType, dsx1LineCoding, dsx1LoopbackConfig, dsx1SendCode, dsx1TransmitClockSource) that control operational behavior of DS1 interfaces. Unauthorized modification of these objects could disrupt DS1 service; SNMP community-string-based access control (SNMPv1) is the protection mechanism.
section: "7"
topics:
    - snmp
    - security
