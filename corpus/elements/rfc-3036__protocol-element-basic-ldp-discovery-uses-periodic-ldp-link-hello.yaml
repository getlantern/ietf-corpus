document: rfc-3036
kind: protocol-element
summary: Basic LDP Discovery uses periodic LDP Link Hello messages sent as UDP packets to the well-known LDP discovery port at the 'all routers on this subnet' multicast address. Receipt of a Link Hello on an interface establishes a Hello adjacency identifying a potential LDP peer and its intended label space.
section: 2.4.1
topics:
    - mpls
    - routing
    - multicast
