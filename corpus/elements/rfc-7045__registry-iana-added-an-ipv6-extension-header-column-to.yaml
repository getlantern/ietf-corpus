document: rfc-7045
kind: registry
summary: IANA added an 'IPv6 Extension Header' column to the 'Assigned Internet Protocol Numbers' registry to mark values that are also IPv6 extension header types defined by an IETF Standards Action or IESG Approval. This also applies to future extension header types.
