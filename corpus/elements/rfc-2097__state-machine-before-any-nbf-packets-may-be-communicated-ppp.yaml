document: rfc-2097
kind: state-machine
summary: Before any NBF packets may be communicated, PPP must reach the Network-Layer Protocol phase and NBFCP must reach the Opened state. NBFCP packets received before the Network-Layer Protocol phase is reached should be silently discarded.
