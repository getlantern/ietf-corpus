document: rfc-8224
kind: normative-requirement
summary: Use of the compact PASSporT form in the Identity header is RECOMMENDED to reduce message size. However, the full form is mandatory when optional PASSporT extensions (ppt) are included, and the compact form MUST NOT be used when optional claims are present in the PASSporT payload.
section: 4.1.1
rfc2119_level: RECOMMENDED
topics:
    - sip
    - security
