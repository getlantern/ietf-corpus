document: rfc-5225
kind: protocol-element
summary: The timer_based_lsb encoding method compresses a field whose change pattern approximates a linear function of time, using the local clock to obtain an approximated reference value (tsc_ref_advanced = tsc_ref + (a_n - a_ref) / time_stride), then applying LSB encoding relative to that approximation. Usage is OPTIONAL and controlled by the time_stride control field.
section: 6.6.9
topics:
    - realtime
    - rtp
