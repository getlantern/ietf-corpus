document: rfc-1827
kind: interoperability-note
summary: When AH is present both in the cleartext IP header and inside a Tunnel-mode ESP header of the same packet, the outer cleartext AH protects the unencrypted IP headers while the inner encrypted AH provides authentication only for the encrypted IP packet. These serve distinct purposes.
section: "1.1"
topics:
    - ipsec
    - vpn
    - security
