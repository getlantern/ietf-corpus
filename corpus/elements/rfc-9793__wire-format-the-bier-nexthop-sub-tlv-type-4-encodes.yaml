document: rfc-9793
kind: wire-format
summary: The BIER Nexthop sub-TLV (Type=4) encodes a Nexthop field of 4 octets (IPv4) or 16 octets (IPv6), indicated by a Length of 4 or 16 respectively. It specifies the BFR neighbor address used in BIFT entry calculation.
