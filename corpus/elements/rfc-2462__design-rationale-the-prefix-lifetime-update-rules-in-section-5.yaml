document: rfc-2462
kind: design-rationale
summary: The prefix lifetime update rules in section 5.5.3 (clamping stored lifetime to two hours when a short-lifetime advertisement is received unauthenticated) were added specifically to counter a denial-of-service attack where bogus advertisements with very short Valid Lifetimes could prematurely expire all of a node's addresses.
section: 5.5.3
topics:
    - ip
    - v6ops
    - security
