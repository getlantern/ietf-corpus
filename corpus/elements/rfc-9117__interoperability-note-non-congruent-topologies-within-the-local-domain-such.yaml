document: rfc-9117
kind: interoperability-note
summary: Non-congruent topologies within the Local Domain—such as separate iBGP sessions per address family or confederations where ORIGINATOR_ID is not propagated across local ASes—are now supported when Flow Specifications are originated inside the Local Domain, because condition b.2 will evaluate to true in those cases.
