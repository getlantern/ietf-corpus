document: rfc-3095
kind: wire-format
summary: The IR-DYN packet (type octet 11111000) carries only the dynamic chain, not the static chain. It is used to refresh or update dynamic context state (e.g., after a mode transition) without retransmitting static fields already established.
section: 5.2.4
