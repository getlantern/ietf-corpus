summary: 'TMOD-1 AVP (AVP Code 495) is a Grouped AVP containing five child AVPs: Token-Rate, Bucket-Depth, Peak-Traffic-Rate, Minimum-Policed-Unit, and Maximum-Packet-Size. It encodes a token bucket traffic model derived from RFC 2210 and RFC 2215.'
