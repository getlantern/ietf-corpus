summary: The 'ietf-ssh-common' YANG module defines four features (ssh-x509-certs, transport-params, asymmetric-key-pair-generation, algorithm-discovery), four algorithm typedefs, the 'transport-params-grouping' grouping, an operational 'supported-algorithms' container, and a 'generate-asymmetric-key-pair' RPC. It is imported by both ietf-ssh-client and ietf-ssh-server.
