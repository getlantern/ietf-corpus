document: rfc-9630
kind: interoperability-note
summary: Mtrace2 (RFC 8487) does not integrate with IOAM directly, but network management systems may use Mtrace2 to discover routers of interest for configuring IOAM-based telemetry. The two mechanisms are complementary rather than interoperable at the protocol level.
section: "5.1"
topics:
    - multicast
    - measurement
