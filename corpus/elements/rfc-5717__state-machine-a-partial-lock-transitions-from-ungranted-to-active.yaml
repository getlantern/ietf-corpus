document: rfc-5717
kind: state-machine
summary: A partial lock transitions from ungranted to active when <partial-lock> succeeds, and from active to released when either (1) <partial-unlock> is called with the correct lock-id in the same session, or (2) the NETCONF session terminates for any reason.
section: "2.1"
