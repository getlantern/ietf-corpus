document: rfc-5216
kind: normative-requirement
summary: To ensure interoperability, EAP-TLS peers and servers MUST support the mandatory-to-implement TLS ciphersuite TLS_RSA_WITH_3DES_EDE_CBC_SHA. Peers and servers SHOULD also support TLS_RSA_WITH_RC4_128_SHA and TLS_RSA_WITH_AES_128_CBC_SHA.
section: "2.4"
rfc2119_level: MUST
topics:
    - tls
    - crypto
