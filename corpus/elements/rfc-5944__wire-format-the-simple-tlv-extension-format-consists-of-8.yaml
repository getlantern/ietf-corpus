document: rfc-5944
kind: wire-format
summary: 'The simple TLV Extension Format consists of: 8-bit Type, 8-bit Length (bytes of Data only, not including Type and Length), variable Data. Extensions with Type 0–127 that are unrecognized cause the message to be silently discarded; extensions with Type 128–255 that are unrecognized are skipped and processing continues.'
section: "1.9"
topics:
