summary: SASL mechanisms EAP-AES128 and EAP-AES128-PLUS were registered (via GS2/RFC 5801). EAP-AES128 uses the GSS-EAP mechanism with aes128-cts-hmac-sha1-96 (OID 1.3.6.1.5.5.15.1.1.17); the PLUS variant provides GSS channel bindings.
