document: rfc-3981
kind: normative-requirement
summary: If <onlyCheckPermissions> is rejected, the server MUST return all appropriate result sets but all result sets MUST be empty of results and MUST contain no errors. This control applies to all search sets or none; a server MUST issue a rejection if it cannot be accepted for all search sets.
section: 4.3.8
rfc2119_level: MUST
topics:
    - registry
