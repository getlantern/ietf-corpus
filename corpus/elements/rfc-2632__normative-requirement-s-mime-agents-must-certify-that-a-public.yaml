document: rfc-2632
kind: normative-requirement
summary: S/MIME agents MUST certify that a public key is valid before using it to provide security services. Agents MUST use PKIX certificates to validate public keys as described in the PKIX Certificate and CRL Profile [KEYM].
section: "1"
rfc2119_level: MUST
