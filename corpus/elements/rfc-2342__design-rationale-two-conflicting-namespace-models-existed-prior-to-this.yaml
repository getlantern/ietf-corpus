document: rfc-2342
kind: design-rationale
summary: Two conflicting namespace models existed prior to this document — the 'Personal Mailbox' model (only personal mailboxes in the default namespace) and the 'Complete Hierarchy' model (all accessible mailboxes in the default namespace). The NAMESPACE command was defined to allow clients to automatically discover server namespace structure rather than requiring manual user configuration.
section: "1"
