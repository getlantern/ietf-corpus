document: rfc-8957
kind: normative-requirement
summary: The TTL and Traffic Class bits in the SFL label stack entry would normally be set to the same value as would have been set in the label that the SFL is synonymous with; however, if there is an application need, these fields MAY be set to some other value.
section: 4.1.1
rfc2119_level: MAY
topics:
