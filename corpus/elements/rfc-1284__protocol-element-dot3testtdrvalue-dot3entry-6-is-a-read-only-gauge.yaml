document: rfc-1284
kind: protocol-element
summary: dot3TestTdrValue (dot3Entry 6) is a read-only Gauge holding the number of 10 MHz ticks elapsed between the start of a TDR measurement and the collision that ended it. Value is 0 if no TDR test has been executed or the last value is unavailable.
section: "5.1"
