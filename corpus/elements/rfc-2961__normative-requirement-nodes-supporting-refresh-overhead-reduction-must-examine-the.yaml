document: rfc-2961
kind: normative-requirement
summary: Nodes supporting refresh overhead reduction MUST examine the Flags field of every received RSVP message. If the Refresh-Reduction-Capable bit transitions from set to clear, Srefresh messages MUST NOT be used and Bundle messages MUST NOT be sent to that neighbor.
section: "2"
rfc2119_level: MUST
topics:
    - qos
