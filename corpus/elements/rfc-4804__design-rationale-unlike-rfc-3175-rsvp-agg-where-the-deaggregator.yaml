document: rfc-4804
kind: design-rationale
summary: Unlike RFC 3175 (RSVP-AGG) where the Deaggregator controls aggregate reservations, RSVP aggregation over TE tunnels assigns primary responsibility to the Aggregator (tunnel Head-end), because MPLS TE tunnels are inherently controlled by the Head-end rather than the Tail-end.
