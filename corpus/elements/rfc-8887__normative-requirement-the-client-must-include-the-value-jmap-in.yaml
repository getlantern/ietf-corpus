document: rfc-8887
kind: normative-requirement
summary: The client MUST include the value "jmap" in the Sec-WebSocket-Protocol header. The server reply MUST also contain a Sec-WebSocket-Protocol header with value "jmap" for the subprotocol connection to be established.
section: "4.2"
rfc2119_level: MUST
topics:
    - websocket
