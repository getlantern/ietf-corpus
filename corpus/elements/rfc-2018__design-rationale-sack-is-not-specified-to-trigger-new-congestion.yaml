document: rfc-2018
kind: design-rationale
summary: SACK is not specified to trigger new congestion control behavior; existing Reno-style fast recovery and slow-start algorithms are preserved unchanged. Future research may leverage SACK's additional information, e.g., for wireless environments where loss is not a congestion signal.
