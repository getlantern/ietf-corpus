document: rfc-8808
kind: design-rationale
summary: The 'factory-default' datastore is defined as optional (a device MAY implement factory-reset without it) because its sole purpose is to allow clients to programmatically discover the factory default configuration; the reset operation itself does not require the datastore to be exposed.
section: "3"
