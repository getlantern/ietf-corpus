document: rfc-1315
kind: state-machine
summary: 'frCircuitState defines three states for a virtual circuit: active(2), inactive(3), and invalid(1). In the absence of a DLCMI, rows may be created by setting state to active and deleted by setting state to invalid; setting inactive temporarily disables a circuit without removing its row.'
