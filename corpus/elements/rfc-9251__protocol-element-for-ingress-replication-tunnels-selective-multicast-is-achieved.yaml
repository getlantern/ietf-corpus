document: rfc-9251
kind: protocol-element
summary: For ingress replication tunnels, selective multicast is achieved by sending (x,G) traffic only to (a) PEs not supporting IGMP/MLD Proxy (those advertising IMET without Multicast Flags EC or with both proxy flags unset), and (b) IGMP/MLD Proxy-supporting PEs that have advertised a SMET route for that (x,G) group.
section: "8"
topics:
    - multicast
    - routing
