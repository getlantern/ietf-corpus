summary: rohcRtpPacketSizeTable lists per-compressor-context allowed or preferred packet sizes for profiles 0x0001–0x0003 and 0x0005. For LLA (0x0005), entries indicate whether the preferred size applies to NHP only, RHP only, or all packets.
