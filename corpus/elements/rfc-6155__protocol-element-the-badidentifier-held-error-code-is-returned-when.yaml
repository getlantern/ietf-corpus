document: rfc-6155
kind: protocol-element
summary: The 'badIdentifier' HELD error code is returned when a Device identifier in the request is not supported by the LIS, is badly formatted, or is not one for which the requestor is authorized. An optional 'requiredIdentifiers' child element can list the XML qualified names of identifiers the LIS needs to fulfill the request.
section: "2.2"
topics:
