document: rfc-3945
kind: protocol-element
summary: 'The Generalized Label Request is a new object/TLV replacing or supplementing the regular MPLS Label Request in PATH/Label Request messages. It carries three mandatory parameters: LSP Encoding Type (the technology/framing), Switching Type (the switching capability required per link), and Generalized PID (G-PID, identifying the client-layer payload).'
section: "7.2"
topics:
    - routing
