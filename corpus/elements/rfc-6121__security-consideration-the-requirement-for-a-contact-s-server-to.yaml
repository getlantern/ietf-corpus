document: rfc-6121
kind: security-consideration
summary: The requirement for a contact's server to store complete inbound subscription request stanzas introduces an application resource exhaustion risk; server implementers should set limits on the number or size of stored requests per contact to mitigate botnet-style attacks.
section: 3.1.3
topics:
    - security
