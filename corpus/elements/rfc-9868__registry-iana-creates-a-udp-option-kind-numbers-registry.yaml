document: rfc-9868
kind: registry
summary: IANA creates a 'UDP Option Kind Numbers' registry (Expert Review). Kinds 0–7 are assigned as must-support SAFE options; Kind 8 is TIME; Kind 9 is RESERVED for AUTH; Kinds 10–126 are unassigned SAFE; Kind 127 is EXP; Kinds 128–191 are Reserved; Kinds 192–193 are Reserved for UCMP/UENC; Kinds 194–253 are unassigned UNSAFE; Kind 254 is UEXP; Kind 255 is Reserved-UNSAFE. UNSAFE option nicknames must begin with capital 'U'.
section: "26"
topics:
