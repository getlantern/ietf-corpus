document: rfc-3821
kind: normative-requirement
summary: Each FC Frame entering the FCIP_DE SHALL be accompanied by a time stamp, which the FCIP_DE SHALL place in the Time Stamp fields of the encapsulation header. If no synchronized time stamp is available, a value of zero SHALL be used.
section: "6"
rfc2119_level: REQUIRED
topics:
