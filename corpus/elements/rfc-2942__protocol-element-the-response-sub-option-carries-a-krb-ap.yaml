document: rfc-2942
kind: protocol-element
summary: 'The RESPONSE sub-option carries a KRB_AP_REP message for mutual authentication: ''IAC SB AUTHENTICATION REPLY <authentication-type-pair> RESPONSE <KRB_AP_REP message> IAC SE''. It is only used when AUTH_HOW_MUTUAL is set.'
