document: rfc-7676
kind: normative-requirement
summary: Before activating a GRE tunnel and periodically thereafter, the GRE ingress node MUST verify the tunnel's ability to carry a 1280-octet IPv6 payload packet without fragmentation, and MUST activate or deactivate the tunnel accordingly.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
