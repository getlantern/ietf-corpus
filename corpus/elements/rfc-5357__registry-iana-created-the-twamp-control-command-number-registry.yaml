document: rfc-5357
kind: registry
summary: 'IANA created the TWAMP-Control Command Number registry (first octet of TWAMP-Control messages), containing 16 possible values managed under IETF Consensus. Initial contents: 0=Reserved, 1=Forbidden, 2=Start-Sessions (RFC 4656), 3=Stop-Sessions (RFC 4656), 4=Reserved, 5=Request-TW-Session (RFC 5357), 6=Experimentation. TCP/UDP port 862 is allocated for TWAMP-Control.'
