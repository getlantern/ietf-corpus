document: rfc-8308
kind: wire-format
summary: SSH_MSG_NEWCOMPRESS (message number 8) is a single-byte message (value 8) sent by the client after receiving SSH_MSG_USERAUTH_SUCCESS when 'delay-compression' is in effect, signaling the start of the renegotiated compression algorithm.
