document: rfc-4442
kind: protocol-element
summary: For inband time synchronization, the media receiver (MIKEY initiator) sends its local time t_r; the data sender replies with its time t_s and the echoed t_r. The receiver computes clock drift as D_t = t_s - t_r + S.
