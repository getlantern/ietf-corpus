document: rfc-5373
kind: normative-requirement
summary: UASs supporting this specification SHOULD include appropriately configurable policy mechanisms for deciding whether to include Answer-Mode or Priv-Answer-Mode in responses, and the default configuration SHOULD be to exclude this header from responses (to avoid revealing whether a human is present).
section: "5.1"
rfc2119_level: SHOULD
topics:
