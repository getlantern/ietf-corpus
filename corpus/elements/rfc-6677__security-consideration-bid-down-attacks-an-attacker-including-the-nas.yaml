document: rfc-6677
kind: security-consideration
summary: 'Bid-down attacks: an attacker including the NAS SHOULD NOT be able to prevent a peer and server who both support channel bindings from using them. However, EAP success messages are not integrity protected, and the NAS can always generate one, making it difficult for peers to distinguish a non-channel-binding server from an attacker injecting a success indication.'
section: "9.3"
rfc2119_level: SHOULD NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
