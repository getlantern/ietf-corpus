document: rfc-7352
kind: normative-requirement
summary: If a header field specified via ':header' exists multiple times, extraction MUST use only the first occurrence. If the specified header field is absent, the 'duplicate' test MUST yield 'false' unconditionally and the tracking list is left unmodified.
section: "3.1"
rfc2119_level: MUST
topics:
