document: rfc-9289
kind: normative-requirement
summary: Each RPC message MUST fit in a single DTLS record when transported over UDP. DTLS encapsulation overhead reduces PLPMTU and thus the maximum RPC payload size.
section: 5.1.2
rfc2119_level: MUST
topics:
