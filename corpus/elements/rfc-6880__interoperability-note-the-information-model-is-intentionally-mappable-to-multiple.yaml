document: rfc-6880
kind: interoperability-note
summary: The information model is intentionally mappable to multiple schema representations including LDAP (backend or frontend to KDC), SOAP/XML, and NETCONF/YAML. LDAP implementations SHOULD incorporate existing LDAP schema where functional overlap exists rather than defining Kerberos-specific duplicates.
section: "5"
topics:
