document: rfc-8838
kind: privacy-consideration
summary: If revealing host IP addresses is a privacy concern (as discussed in RFC 8828 and Section 19 of RFC 8445), agents can generate initial ICE descriptions with no candidates and trickle only candidates that do not reveal host addresses, such as relayed (TURN) candidates.
