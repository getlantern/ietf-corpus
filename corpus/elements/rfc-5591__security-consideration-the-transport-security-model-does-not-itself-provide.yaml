document: rfc-5591
kind: security-consideration
summary: The Transport Security Model does not itself provide authentication or encryption; it relies entirely on the underlying Transport Model for mutual authentication, key binding, confidentiality, and integrity. Which threats are mitigated depends on the chosen Transport Model.
