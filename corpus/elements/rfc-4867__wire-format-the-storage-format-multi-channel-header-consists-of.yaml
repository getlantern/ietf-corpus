document: rfc-4867
kind: wire-format
summary: The storage format multi-channel header consists of a magic number ("#!AMR_MC1.0\n" for AMR or "#!AMR-WB_MC1.0\n" for AMR-WB) followed by a 32-bit channel description field whose 4 least-significant bits (CHAN) encode the number of audio channels; all other bits are reserved and MUST be zero.
section: "5.2"
topics:
    - rtp
    - realtime
