document: rfc-4426
kind: design-rationale
summary: During protection switching, the approach of dropping more traffic than strictly necessary (disconnecting Extra Traffic before completing the switchover handshake) is preferred over the risk of misconnections, where traffic from the wrong source is delivered to a receiver.
