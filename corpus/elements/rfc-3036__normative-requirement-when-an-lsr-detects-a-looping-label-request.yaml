document: rfc-3036
kind: normative-requirement
summary: When an LSR detects a looping Label Request (Path Vector contains its own LSR Id, or Hop Count exceeds maximum), it MUST send a Loop Detected Notification to the source and drop the Label Request message.
section: 2.8.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
