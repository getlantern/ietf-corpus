document: rfc-7233
kind: normative-requirement
summary: Multiple partial responses to the same target resource can be combined only if they share the same strong validator. A client MAY combine them into a larger continuous range; if the union covers the entire representation, the client MUST process it as a complete 200 (OK) response.
section: "4.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
