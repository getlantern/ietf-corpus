document: rfc-6827
kind: security-consideration
summary: RCs implementing inter-RA export/import MUST enforce policy control on both the maximum amount of routing information advertised between RAs and the maximum rate of advertisement. This limits the blast radius of a compromised RC to only the RAs to which it is directly attached.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
