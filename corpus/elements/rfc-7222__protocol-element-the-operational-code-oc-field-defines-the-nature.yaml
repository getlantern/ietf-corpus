document: rfc-7222
kind: protocol-element
summary: 'The Operational Code (OC) field defines the nature of each QoS request: RESPONSE(0), ALLOCATE(1), DE-ALLOCATE(2), MODIFY(3), QUERY(4), NEGOTIATE(5). Values 6-255 are reserved; a receiver MUST ignore any QoS option bearing a reserved OC value.'
section: "4.1"
topics:
    - qos
