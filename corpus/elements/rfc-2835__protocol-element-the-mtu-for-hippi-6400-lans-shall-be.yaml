document: rfc-2835
kind: protocol-element
summary: The MTU for HIPPI-6400 LANs SHALL be 65280 decimal bytes. This value is backward compatible with HIPPI-800 and allows an IP packet to fit in one 64K byte buffer with up to 256 bytes of overhead.
section: "4.3"
