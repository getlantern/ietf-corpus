document: rfc-1573
kind: normative-requirement
summary: When 64-bit counters are in use, the corresponding 32-bit counters MUST still be available and will report the low 32-bits of the associated 64-bit count (e.g., ifInOctets reports the least significant 32 bits of ifHCInOctets).
section: 3.2.6
rfc2119_level: MUST
