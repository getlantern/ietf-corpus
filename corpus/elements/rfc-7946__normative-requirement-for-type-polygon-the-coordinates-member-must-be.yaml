document: rfc-7946
kind: normative-requirement
summary: For type "Polygon", the "coordinates" member MUST be an array of linear ring coordinate arrays. If more than one ring is present, the first MUST be the exterior ring and any others MUST be interior rings (holes).
section: 3.1.6
rfc2119_level: MUST
