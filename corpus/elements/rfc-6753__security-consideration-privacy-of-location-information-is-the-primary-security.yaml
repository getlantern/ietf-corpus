document: rfc-6753
kind: security-consideration
summary: Privacy of location information is the primary security concern. TLS provides confidentiality and authentication of the server; authorization policies allow the Rule Maker to control access. The authorization-by-possession model further relies on TLS to protect the secrecy of the location URI itself during conveyance.
section: "6"
topics:
    - security
    - privacy
    - tls
