document: rfc-4430
kind: interoperability-note
summary: 'KINK directly reuses IKE Quick Mode (phase 2) payloads with minor changes, specifically: the HASH payload is not used, the Nonce payload Nr is optional, PFS via KE payload is SHOULD rather than MUST, and the prf for key derivation is determined by the Kerberos session key etype rather than the IKE phase 1 negotiated algorithm.'
section: "5"
