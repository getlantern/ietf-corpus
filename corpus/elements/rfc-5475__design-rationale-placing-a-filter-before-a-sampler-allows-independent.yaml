document: rfc-5475
kind: design-rationale
summary: Placing a Filter before a Sampler allows independent tuning of Sampling rates per filtered sub-population and more accurate control. Placing Sampling before Filtering reduces the packet rate to the filter, which is beneficial when the filter must access slow router state not available at full line rate.
section: "8.1"
topics:
    - measurement
