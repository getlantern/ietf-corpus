document: rfc-9572
kind: protocol-element
summary: Per-region I-PMSI A-D routes aggregate all per-PE I-PMSI routes from an AS/region into a single route originated by RBRs, reducing the number of inter-region routes and tunnels. Multiple RBRs for the same region each advertise such a route with the same Region ID and Ethernet Tag ID.
section: "6.2"
topics:
    - mpls
    - routing
