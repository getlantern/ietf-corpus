document: rfc-5015
kind: interoperability-note
summary: BIDIR-PIM reuses the PIM-SM Hello and Join/Prune message formats and the Encoded-Unicast address format without modification. Routers must detect BIDIR-PIM capability via the OptionType 22 Hello option; absence of the option from a neighbor indicates a non-BIDIR-capable router and must be logged.
section: "3.2"
topics:
    - multicast
    - routing
