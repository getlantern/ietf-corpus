document: rfc-5865
kind: normative-requirement
summary: The operator's choice of admission procedure MUST ensure that actual links used by a session have enough bandwidth to support it, and new sessions are refused admission if there is inadequate bandwidth under the relevant policy.
section: "2.2"
rfc2119_level: MUST
