document: rfc-4021
kind: interoperability-note
summary: The Encrypted header field, originally defined by RFC 822, was found to be inadequately specified, was not widely implemented, and was removed in RFC 2822. Current practice is to use separate encryption such as S/MIME or OpenPGP, possibly with RFC 1847 MIME security multiparts.
section: 2.1.24
topics:
    - email
    - security
    - crypto
