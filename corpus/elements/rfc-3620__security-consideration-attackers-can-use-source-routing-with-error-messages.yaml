document: rfc-3620
kind: security-consideration
summary: Attackers can use source routing with error messages as an oracle to determine whether internal machines exist. This attack is prevented either by requiring the proxy to allow only 'profile' or 'endpoint' connections (refusing source-routed connections entirely), or by requiring SASL authentication before allowing a TUNNEL channel to be started (at higher overhead).
section: "7"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
