document: rfc-6534
kind: protocol-element
summary: Type-P-One-way-Bi-Packet-Loss-Stream is a sample of n Loss Pairs from n probe pairs sent at times (T11,T12), ..., (Tn1,Tn2). It is general enough to subsample a pre-existing measurement stream; bi-packet probes need not be consecutive within such a stream.
