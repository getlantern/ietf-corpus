document: rfc-8926
kind: design-rationale
summary: TLV-format variable-length options were chosen to allow new metadata types to be defined, deployed, and either standardized or retired independently, enabling product differentiation and a faster pace of advancement. Options are required in data packets (not just control packets) because use cases such as input-port security policies and service-interposition tags must be applied to data traffic.
section: "2.2"
topics:
    - routing
