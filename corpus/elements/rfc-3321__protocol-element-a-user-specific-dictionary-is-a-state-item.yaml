document: rfc-3321
kind: protocol-element
summary: A user-specific dictionary is a state item capturing user-invariant fields (e.g., URL, name, email, SIP capabilities). It can be preloaded before time-critical signaling begins and benefits from cross-session state persistence described in Section 5.3.
