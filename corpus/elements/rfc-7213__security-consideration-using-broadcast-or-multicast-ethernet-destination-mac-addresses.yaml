document: rfc-7213
kind: security-consideration
summary: Using broadcast or multicast Ethernet destination MAC addresses on links not confirmed to be point-to-point can cause MPLS-TP data frames to be distributed to unintended devices. Operators must ensure MPLS-TP nodes correctly identify link type and restrict multicast frame delivery on multipoint links.
section: "6"
topics:
    - mpls
    - security
