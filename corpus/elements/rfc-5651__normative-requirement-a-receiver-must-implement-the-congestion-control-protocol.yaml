document: rfc-5651
kind: normative-requirement
summary: A receiver MUST implement the congestion control protocol specified in the session description. If a receiver cannot implement it, it MUST NOT join the session. When using multiple LCT channels, receivers MUST initially join channels according to the specified startup behavior to prevent starting at high data rates.
section: "6.2"
rfc2119_level: MUST
topics:
    - congestion
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
