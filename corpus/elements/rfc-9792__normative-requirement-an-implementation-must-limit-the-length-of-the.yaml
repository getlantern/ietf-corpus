document: rfc-9792
kind: normative-requirement
summary: An implementation MUST limit the length of the sub-TLV so as to signal only the bits that are set to 1. Defined prefix flags that are not transmitted because they fall beyond the transmitted length MUST be treated as being set to 0.
section: "2"
rfc2119_level: MUST
topics:
    - routing
