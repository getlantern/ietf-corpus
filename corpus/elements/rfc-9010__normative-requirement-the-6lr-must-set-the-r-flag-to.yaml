document: rfc-9010
kind: normative-requirement
summary: The 6LR MUST set the R flag to 1 in the NA(EARO) returned to the 6LN if and only if the U flag in the RPL Status is 0, indicating successful route injection. If the U flag is 1, the R flag MUST be set to 0.
section: 9.2.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
