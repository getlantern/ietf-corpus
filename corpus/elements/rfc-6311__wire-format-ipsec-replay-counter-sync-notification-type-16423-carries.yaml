document: rfc-6311
kind: wire-format
summary: 'IPSEC_REPLAY_COUNTER_SYNC notification (type 16423) carries a single ''Incoming IPsec SA delta value'' field: 4 octets when ESN bit is 0, 8 octets when ESN bit is 1 for the Child SAs. All Child SAs of an IKE SA must uniformly use ESN or not.'
