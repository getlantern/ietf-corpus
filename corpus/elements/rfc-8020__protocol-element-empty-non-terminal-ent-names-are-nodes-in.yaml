document: rfc-8020
kind: protocol-element
summary: Empty Non-Terminal (ENT) names are nodes in the DNS tree that have no resource record sets but have descendant nodes that do. The correct response to an ENT query is NODATA (RCODE NOERROR with empty answer section), not NXDOMAIN.
section: "3.1"
topics:
