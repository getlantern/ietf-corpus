document: rfc-6425
kind: registry
summary: 'IANA created a new ''Global Flags'' sub-registry under the MPLS LSP Ping Parameters registry, tracking 16 flags (bits 0–15, most significant first) in the Global Flags field of echo request messages, assigned by Standards Action. Initial entries: bit 15 (V Flag, RFC 4379), bit 14 (T Flag, RFC 6425).'
section: "7.3"
