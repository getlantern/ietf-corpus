document: rfc-7555
kind: wire-format
summary: 'The Next Hop Sub-TLV (Sub-Type 1) encodes a specific next hop for Echo Request forwarding: Addr Type (1 octet), MBZ (3 octets), Next Hop IP Address (4 or 16 octets), Next Hop Interface (0, 4, or 16 octets). Seven address types are defined, including IPv4/IPv6 Numbered (types 1/3), Unnumbered (types 2/4), and Protocol Adj (types 6/7, no interface field).'
section: 5.1.1
topics:
