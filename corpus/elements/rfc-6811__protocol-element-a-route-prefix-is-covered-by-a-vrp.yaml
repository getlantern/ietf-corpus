document: rfc-6811
kind: protocol-element
summary: A Route Prefix is 'Covered' by a VRP when the VRP prefix length is less than or equal to the Route prefix length and the prefix addresses match for all bits specified by the VRP prefix length. A Route Prefix is 'Matched' by a VRP when it is Covered, the Route prefix length is at most the VRP maximum length, and the Route Origin ASN equals the VRP ASN.
section: "2"
topics:
    - bgp
    - routing
