document: rfc-793
kind: normative-requirement
summary: TCP modules operating in a multilevel secure environment must mark outgoing segments with the correct security classification, compartment, and precedence, and must provide higher-level protocols an interface to specify desired security levels for each connection.
section: "2.9"
rfc2119_level: MUST
topics:
