document: rfc-7045
kind: normative-requirement
summary: The Hop-by-Hop Options header SHOULD be processed by intermediate forwarding nodes as described in RFC 2460. However, high-performance routers may either ignore it or assign packets containing it to a slow processing path, and designers must be aware of this likely behaviour.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - ip
