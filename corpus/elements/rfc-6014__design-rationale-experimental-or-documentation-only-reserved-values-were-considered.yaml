document: rfc-6014
kind: design-rationale
summary: Experimental or documentation-only reserved values were considered and rejected. Historical IETF experience showed experimental values tend to become permanent when software ships with them before a 'real' value is assigned, causing interoperability lock-in that no one wants to break.
