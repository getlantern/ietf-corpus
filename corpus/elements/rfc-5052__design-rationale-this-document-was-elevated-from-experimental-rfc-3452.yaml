document: rfc-5052
kind: design-rationale
summary: This document was elevated from Experimental (RFC 3452) to Proposed Standard status because congestion control strategies suitable for use with Reliable Multicast protocols became available. The update also introduced explicit FEC OTI classes (Mandatory, Common, Scheme-specific) to allow reusable CDP field definitions and independent definition of FEC schemes and CDPs.
