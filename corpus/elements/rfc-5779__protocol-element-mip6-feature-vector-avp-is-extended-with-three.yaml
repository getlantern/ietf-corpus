document: rfc-5779
kind: protocol-element
summary: 'MIP6-Feature-Vector AVP is extended with three new capability flag bits: PMIP6_SUPPORTED (0x0000010000000000) indicating PMIPv6 support, IP4_HOA_SUPPORTED (0x0000020000000000) indicating IPv4-MN-HoA assignment capability, and LOCAL_MAG_ROUTING_SUPPORTED (0x0000040000000000) indicating direct routing between MNs anchored to the same MAG.'
section: "5.5"
