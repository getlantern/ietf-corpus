document: rfc-5340
kind: design-rationale
summary: The stub-area restriction on flooding unknown LSAs (from RFC 2740) has been deprecated in RFC 5340. OSPFv3 routers now flood link- and area-scope LSAs with unknown types and U-bit=1 throughout stub and NSSA areas, removing the concern that uncontrolled LSAs could exhaust stub routers' capacity.
section: "3.4"
topics:
    - routing
