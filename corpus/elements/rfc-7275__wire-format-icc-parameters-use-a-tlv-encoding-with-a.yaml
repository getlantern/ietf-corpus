document: rfc-7275
kind: wire-format
summary: ICC Parameters use a TLV encoding with a 1-bit U-bit (if clear and TLV unknown, notification MUST be returned and entire message MUST be ignored; if set, unknown TLV MUST be silently ignored), 1-bit F-bit (controls forwarding of unknown TLVs), 14-bit Type, 16-bit Length, and variable content.
section: 6.1.2
