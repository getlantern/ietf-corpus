document: rfc-7074
kind: protocol-element
summary: 'The revised definition of the Switching Type field in signaling (RFC 3471/3473) is: it indicates the type of switching to be performed on a particular link via GMPLS Switching Type values, and maps to one of the values advertised for the corresponding link in the routing Switching Capability Descriptor. This is unchanged in practice from the prior definition.'
section: "2.2"
topics:
    - mpls
