document: rfc-4310
kind: design-rationale
summary: The 'urgent' attribute on <secDNS:update> allows clients to signal high-priority processing to the server operator, with 'high priority' defined relative to standard server operator policies determined via out-of-band mechanisms. The default is false.
section: 3.2.5
topics:
