document: rfc-5566
kind: protocol-element
summary: The 'Transmit tunnel endpoint' tunnel type (value 3) is for a BGP speaker that wishes to be only the transmitting endpoint of an IPsec tunnel, not the receiving endpoint. This allows asymmetric tunnel role advertisement.
