document: rfc-8981
kind: security-consideration
summary: Frequent generation of new temporary addresses may interfere with ingress/egress filtering mechanisms, making it difficult to distinguish legitimately changing temporary addresses from spoofed in-prefix source addresses, potentially undermining DDoS countermeasures.
