document: rfc-5575
kind: design-rationale
summary: BGP was chosen as the carrier for flow specification information because it already provides efficient point-to-multipoint distribution, inter-domain capabilities with routing policy support, and tight integration with unicast routing for verification. This reuses existing route reflector/confederation infrastructure and established inter-AS peering relationships.
