document: rfc-2739
kind: security-consideration
summary: Information obtained from directory servers supplied by clients may be out of date; for example, dynamically assigned IP addresses stored in the directory may have been reassigned to a different host. This issue is not specific to LDAP or dynamic directories.
section: "4"
topics:
