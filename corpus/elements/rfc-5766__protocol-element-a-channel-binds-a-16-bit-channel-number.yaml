document: rfc-5766
kind: protocol-element
summary: A channel binds a 16-bit channel number (valid range 0x4000–0x7FFF) to a specific peer transport address, allowing the client and server to exchange data using the compact 4-byte ChannelData format instead of full STUN indications. Channel bindings expire after 10 minutes.
section: "11"
