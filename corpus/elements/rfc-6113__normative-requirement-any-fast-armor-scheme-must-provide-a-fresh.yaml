document: rfc-6113
kind: normative-requirement
summary: Any FAST armor scheme MUST provide a fresh armor key for each conversation. All KDCs in a realm MUST support FAST if FAST is offered by any KDC as a pre-authentication mechanism. If a FAST KDC receives an unknown armor type it MUST respond with KDC_ERR_PREAUTH_FAILED.
section: "5.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
