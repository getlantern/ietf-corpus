summary: Two first-interrogation approaches are defined (post-authorization CCR vs. credit-control AVPs embedded in AA-Request) because some environments (3GPP, SIP) decouple authentication from service requests, making a separate CCR more appropriate, while NAS environments benefit from combining them for protocol efficiency.
