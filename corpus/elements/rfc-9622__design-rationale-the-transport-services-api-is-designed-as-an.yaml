document: rfc-9622
kind: design-rationale
summary: The Transport Services API is designed as an abstract, language- and platform-independent interface intended to replace the BSD Socket API. It enables dynamic selection of transport protocols and network paths at runtime, allowing faster deployment of new protocols without requiring application changes.
