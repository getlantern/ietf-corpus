document: rfc-6439
kind: protocol-element
summary: The Appointed Forwarder on a link for VLAN-x is the RBridge that ingresses native frames from and egresses native frames to the link in that VLAN. By default the DRB handles native traffic for all VLANs on the link and may delegate to other RBridges. Appointed Forwarder status has no effect on forwarding of TRILL Data frames; it only affects native frame handling.
section: "2"
topics:
    - routing
    - mpls
