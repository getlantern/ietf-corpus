document: rfc-8976
kind: security-consideration
summary: Without DNSSEC, ZONEMD provides no protection against intentional attacks because an attacker can modify zone content and recompute the Digest field. In the absence of DNSSEC it functions only as an unintentional-corruption checksum.
section: "6.1"
topics:
    - dns
    - security
