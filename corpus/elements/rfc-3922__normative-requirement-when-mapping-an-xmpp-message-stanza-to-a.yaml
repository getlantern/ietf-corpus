document: rfc-3922
kind: normative-requirement
summary: When mapping an XMPP message stanza to a 'Message/CPIM' object, the Content-type MUST be set to 'text/plain' and the charset MUST be set to 'utf-8', because XMPP uses UTF-8 exclusively and the MIME default of 'text/plain; charset=us-ascii' would be incorrect.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
