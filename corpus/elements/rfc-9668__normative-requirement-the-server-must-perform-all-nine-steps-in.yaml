document: rfc-9668
kind: normative-requirement
summary: The server MUST perform all nine steps in Section 3.3.1 when processing a request containing the EDHOC option. If the request lacks the OSCORE option or COMB_PAYLOAD is malformed, the server MUST stop and MUST reply with a 4.00 (Bad Request) error response.
section: 3.3.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
