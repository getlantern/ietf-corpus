document: rfc-9113
kind: normative-requirement
summary: Clients and servers MUST treat an invalid connection preface as a connection error of type PROTOCOL_ERROR. The client MUST send the 24-octet magic followed by a SETTINGS frame as the first application data on the connection.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
