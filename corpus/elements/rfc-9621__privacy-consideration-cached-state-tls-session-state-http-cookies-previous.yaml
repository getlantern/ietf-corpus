document: rfc-9621
kind: privacy-consideration
summary: Cached state (TLS session state, HTTP cookies, previous racing results) can lead to linkability if reused across different Connection contexts. Applications control whether cached information is used during establishment, enabling trade-offs between efficiency and privacy from on-path observers. Applications with 'incognito mode' features align with using separate Connection Contexts.
section: "6"
topics:
    - privacy
    - tls
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
