document: rfc-5798
kind: security-consideration
summary: The TTL/Hop Limit = 255 mechanism protects against VRRP packets being injected from remote networks, restricting most attack vectors to locally attached nodes. VRRP itself does not add new attack vectors beyond what any LAN-attached node can do via ARP/ND spoofing.
