document: rfc-5608
kind: design-rationale
summary: There is no RADIUS attribute combination equivalent to SNMP noAuthNoPriv access because RADIUS always requires user authentication as a prerequisite to authorization. RADIUS Authorize-Only service is only available when the request includes a State Attribute cookie from a prior successful authentication.
section: "2.3"
topics:
    - radius
    - snmp
