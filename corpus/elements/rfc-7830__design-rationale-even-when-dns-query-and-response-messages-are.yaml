document: rfc-7830
kind: design-rationale
summary: Even when DNS query and response messages are encrypted, metadata such as message size can be used to correlate encrypted messages with well-known unencrypted messages, jeopardizing confidentiality. The Padding option artificially increases message size to hamper size-based correlation.
section: "1"
topics:
    - dns
    - privacy
    - security
