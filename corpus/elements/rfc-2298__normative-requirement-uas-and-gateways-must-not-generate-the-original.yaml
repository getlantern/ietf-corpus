document: rfc-2298
kind: normative-requirement
summary: UAs and gateways MUST NOT generate the Original-Recipient field unless the mail protocol provides the address originally specified by the sender at submission time. Ordinary SMTP does not guarantee this; RFC 1891 SMTP extension provides the mechanism.
section: "5"
rfc2119_level: MUST NOT
topics:
    - email
