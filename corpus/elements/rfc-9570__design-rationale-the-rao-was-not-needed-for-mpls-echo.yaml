document: rfc-9570
kind: design-rationale
summary: The RAO was not needed for MPLS echo request containment because the loopback destination address and TTL=1 mechanisms are each independently sufficient to prevent forwarding beyond the egress LSR. No implementation relying solely on the RAO for this purpose was reported.
section: "2.1"
topics:
    - mpls
    - ip
