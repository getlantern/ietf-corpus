document: rfc-7180
kind: normative-requirement
summary: The DRB SHOULD NOT appoint an overloaded RBridge as an Appointed Forwarder unless there is no alternative. If an Appointed Forwarder becomes overloaded, the DRB SHOULD reassign its VLANs to a non-overloaded RBridge on the link if one is available. DRB election is not affected by overload.
section: "10.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
