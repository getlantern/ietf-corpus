document: rfc-2401
kind: normative-requirement
summary: A compliant implementation MUST support both time-based and byte-count-based SA lifetimes and MUST support simultaneous use of both (the first to expire takes precedence). When IKE uses X.509 certificates, the SA lifetime must be constrained by certificate validity intervals and the NextIssueDate of CRLs used in the IKE exchange.
section: 4.4.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
