document: rfc-3010
kind: protocol-element
summary: 'NFS version 4 introduces two filehandle types: persistent (valid for the lifetime of the file system object, equivalent to NFSv2/v3 behavior) and volatile (may expire at various points indicated by the fh_expire_type attribute bitmask with values FH4_PERSISTENT, FH4_NOEXPIRE_WITH_OPEN, FH4_VOLATILE_ANY, FH4_VOL_MIGRATION, FH4_VOL_RENAME).'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
