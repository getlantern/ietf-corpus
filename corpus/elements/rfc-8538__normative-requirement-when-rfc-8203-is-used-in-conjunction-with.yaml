document: rfc-8538
kind: normative-requirement
summary: When RFC 8203 is used in conjunction with Hard Reset, the subcode of the outermost Cease MUST be Hard Reset, with the Administrative Shutdown or Administrative Reset subcodes encapsulated within. The encapsulated message MUST subsequently be processed according to RFC 8203.
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
