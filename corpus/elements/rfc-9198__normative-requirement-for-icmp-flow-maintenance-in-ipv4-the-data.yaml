document: rfc-9198
kind: normative-requirement
summary: For ICMP flow maintenance in IPv4, the data field SHOULD compensate variations on TTL/Hop Limit, IP identification, and IP checksum for every packet to preserve flow identity across probes. ICMPv6 only requires constant Flow Label and Source/Destination addresses.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - measurement
    - ip
