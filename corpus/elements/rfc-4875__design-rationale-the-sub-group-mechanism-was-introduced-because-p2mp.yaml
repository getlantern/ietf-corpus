document: rfc-4875
kind: design-rationale
summary: The Sub-Group mechanism was introduced because P2MP LSP state may not fit in a single IP packet (RSVP prohibits IP fragmentation) and leaves must be efficiently added or removed. Sub-Group IDs allow multiple Path messages per P2MP LSP and enable incremental state updates without re-signaling the entire tree.
section: "4.3"
topics:
