document: rfc-7865
kind: normative-requirement
summary: The 'send' and 'recv' XML elements MUST be used to indicate whether a participant is contributing to or receiving a stream. If a participant stops contributing or receiving due to CS changes, a snapshot MUST be sent from the SRC to the SRS with no 'send' (or 'recv') element for that stream.
section: 6.8.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
