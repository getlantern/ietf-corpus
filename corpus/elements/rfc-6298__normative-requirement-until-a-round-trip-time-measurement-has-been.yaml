document: rfc-6298
kind: normative-requirement
summary: Until a round-trip time measurement has been made, the sender SHOULD set RTO to 1 second, though exponential backoff on repeated retransmission still applies. A TCP implementation MAY use 3 seconds or any other value greater than 1 second.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
