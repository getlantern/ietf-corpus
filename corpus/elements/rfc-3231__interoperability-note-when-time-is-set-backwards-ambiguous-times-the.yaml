document: rfc-3231
kind: interoperability-note
summary: When time is set backwards (ambiguous times), the scheduler will invoke a scheduled action at every occurrence of the ambiguous time. When time is set forward causing a nonexistent time, the action will not be invoked at all for that skipped interval.
section: "3.4"
topics:
