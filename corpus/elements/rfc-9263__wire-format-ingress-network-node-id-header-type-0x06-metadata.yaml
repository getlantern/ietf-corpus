document: rfc-9263
kind: wire-format
summary: Ingress Network Node ID header (Type=0x06, Metadata Class=0x0000) carries a variable-length opaque Node ID of the classifier node where a packet entered the SFC domain. Node ID may be IPv4 (4 octets), IPv6 (16 octets), MAC (6 octets), or EUI-64 (8 octets).
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
