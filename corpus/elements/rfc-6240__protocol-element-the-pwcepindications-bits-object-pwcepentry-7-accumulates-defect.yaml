document: rfc-6240
kind: protocol-element
summary: The pwCepIndications BITS object (pwCepEntry 7) accumulates defect indications including missingPkt, ooRngDropped, jtrBfrUnder, pktMalformed, lops, cepRdi, cepAis, badHdrStack, cepNeFailure, and cepFeFailure. It holds accumulated state until cleared by an SNMP write.
