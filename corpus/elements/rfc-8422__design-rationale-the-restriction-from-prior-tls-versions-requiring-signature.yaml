document: rfc-8422
kind: design-rationale
summary: The restriction from prior TLS versions requiring signature algorithms to match throughout a certificate chain is lifted in RFC 8422, consistent with the approach taken in RFC 5246. This allows more flexible PKI deployments without loss of security.
section: "2.4"
topics:
    - tls
    - pkix
