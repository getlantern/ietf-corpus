document: rfc-8590
kind: design-rationale
summary: The <changePoll:who> element is explicitly described as a free-form audit field not intended to drive client-side logic. This design choice acknowledges that the identifier scheme is server-policy-dependent and prevents clients from incorrectly relying on its format for automation.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
