document: rfc-5519
kind: state-machine
summary: mgmdHostCacheSourceFilterMode and mgmdRouterCacheSourceFilterMode indicate whether an interface is in INCLUDE (1) or EXCLUDE (2) state for source filtering on MGMDv3/MLDv2-capable nodes. The router cache entry also exposes mgmdRouterCacheExcludeModeExpiryTimer, which transitions the interface from EXCLUDE back to INCLUDE when it expires.
section: "5"
topics:
