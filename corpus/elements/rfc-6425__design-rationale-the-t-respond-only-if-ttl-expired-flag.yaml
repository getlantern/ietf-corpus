document: rfc-6425
kind: design-rationale
summary: The T (Respond Only If TTL Expired) flag is introduced specifically to prevent bud and egress nodes from sending redundant replies to successive traceroute echo requests as TTL values increase beyond their hop depth. Without this flag, these nodes would respond to every subsequent echo request in the traceroute sequence.
section: 4.3.2
topics:
    - mpls
    - routing
