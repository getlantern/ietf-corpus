document: rfc-3034
kind: design-rationale
summary: Frame Relay null encapsulation is used so that labels implicitly encode the network protocol type; no explicit protocol identifier field is carried in the label stack for Frame Relay encapsulated frames. This differs from generic MPLS shim header encapsulation which carries an explicit label value.
