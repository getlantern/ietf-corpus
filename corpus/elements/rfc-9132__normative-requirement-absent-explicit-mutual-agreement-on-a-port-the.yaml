document: rfc-9132
kind: normative-requirement
summary: Absent explicit mutual agreement on a port, the DOTS signal channel MUST run over port 4646 for both UDP and TCP; DOTS clients and servers SHOULD support a configurable parameter to supply an alternate port number.
