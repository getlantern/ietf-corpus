document: rfc-1294
kind: protocol-element
summary: The NLPID (Network Level Protocol ID) field is a one-octet value administered by ISO/CCITT identifying the encapsulation or protocol that follows. A NLPID value of 0x00 is invalid under Frame Relay encapsulation because it cannot be distinguished from a pad field.
section: "6"
