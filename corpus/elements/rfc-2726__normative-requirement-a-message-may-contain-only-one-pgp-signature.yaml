document: rfc-2726
kind: normative-requirement
summary: A message may contain only one PGP signature. If an object's mntner requires PGPKEY authentication, the database software checks that a signature is present and that its key ID matches one of the auth attribute values.
section: "3"
rfc2119_level: MUST
