summary: 'Named telephone event payload is a 32-bit structure: event (8 bits), E (end, 1 bit), R (reserved, 1 bit), volume (6 bits, dBm0 magnitude), and duration (16 bits, in timestamp units). The event field encodes DTMF digits, line signals, and trunk events per Tables 1–6.'
