document: rfc-9651
kind: normative-requirement
summary: If parsing fails, either the entire field value MUST be ignored (treated as if the field is not present) or the complete HTTP message MUST be treated as malformed. Field specifications that use Structured Fields are not allowed to loosen this requirement.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
