document: rfc-2538
kind: design-rationale
summary: DNS implementations are optimized for small transfers (typically under 512 bytes including overhead). It is advisable to minimize certificate sizes stored in DNS by using fewest optional fields and shortest variable-length field values.
section: "4"
topics:
