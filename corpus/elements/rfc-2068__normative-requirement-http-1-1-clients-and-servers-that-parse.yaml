document: rfc-2068
kind: normative-requirement
summary: HTTP/1.1 clients and servers that parse date values MUST accept all three historical formats (RFC 1123, RFC 850, ANSI C asctime) for HTTP/1.0 compatibility, but MUST only generate the RFC 1123 format for HTTP-date fields.
section: 3.3.1
rfc2119_level: MUST
topics:
    - http
