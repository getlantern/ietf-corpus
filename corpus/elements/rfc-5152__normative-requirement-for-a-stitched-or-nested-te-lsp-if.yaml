document: rfc-5152
kind: normative-requirement
summary: For a stitched or nested TE LSP, if the boundary LSR supports nesting/stitching and no suitable H-LSP/S-LSP exists to the next-hop boundary LSR, it SHOULD signal a new H-LSP/S-LSP. If dynamic H-LSP/S-LSP setup fails, this SHOULD be treated as a path computation and signaling failure and an RSVP PathErr SHOULD be sent upstream.
section: "4"
rfc2119_level: SHOULD
topics:
    - realtime
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
