document: rfc-3550
kind: protocol-element
summary: A Contributing Source (CSRC) list (0–15 entries, 32 bits each) is inserted by an RTP mixer into the packet header to identify the original SSRCs whose streams were combined. This enables correct talker indication at receivers even though all mixed packets carry the mixer's SSRC.
