document: rfc-8642
kind: design-rationale
summary: Authors of RFCs defining new community-like attributes (large communities, wide communities, etc.) should explicitly state how the 'set' directive and similar operations are expected to handle the new attribute, to avoid repeating the ambiguity of RFC 1997.
