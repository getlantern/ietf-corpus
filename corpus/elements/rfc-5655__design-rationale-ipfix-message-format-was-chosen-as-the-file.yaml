document: rfc-5655
kind: design-rationale
summary: IPFIX Message format was chosen as the file format basis because it is extensible, compact, and purpose-built for flow data export. It allows implementations to reuse substantially the same information model and data formatting code for both transport and file storage, unlike ad hoc serializations which impose a fixed data model.
