document: rfc-7432
kind: normative-requirement
summary: When a PE receives an ARP Request from a CE and holds the MAC/IP binding, the PE SHOULD perform ARP proxy by responding directly, minimizing ARP flooding over the MPLS network. If multiple IP addresses are bound to one MAC, multiple MAC/IP Advertisement routes MUST be generated.
section: "10"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
    - vpn
