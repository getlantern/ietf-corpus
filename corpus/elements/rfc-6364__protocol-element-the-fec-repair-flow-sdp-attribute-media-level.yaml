summary: The 'fec-repair-flow' SDP attribute (media-level) describes FEC repair flows. Its ABNF syntax includes required 'encoding-id' and optional 'preference-lvl', 'ss-fssi' (sender-side FSSI), and 'fssi' (general FSSI) parameters, each consisting of name:value element lists.
