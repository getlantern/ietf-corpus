document: rfc-2954
kind: protocol-element
summary: 'frPVCEndptRcvdSigStatus reports the PVC status received via local in-channel signaling: deleted(1) when not listed in full-status reports from the user device, active(2) when reported operational, inactive(3) when reported non-operational, and none(4) when only network-side procedures are in use.'
section: "3.3"
