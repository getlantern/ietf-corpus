document: rfc-5246
kind: security-consideration
summary: The TLS record type and length fields are not protected by encryption. Applications sensitive to traffic-analysis attacks should consider padding or cover traffic, as an observer can always see content-type boundaries and record sizes.
section: "6.1"
topics:
    - tls
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
