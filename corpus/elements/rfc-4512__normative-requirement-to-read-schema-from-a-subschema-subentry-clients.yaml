document: rfc-4512
kind: normative-requirement
summary: To read schema from a subschema subentry, clients MUST issue a Search operation with baseObject set to the subschema DN, scope baseObject, filter '(objectClass=subschema)', and the desired schema attribute names listed explicitly (as they are operational).
section: "4.4"
rfc2119_level: MUST
topics:
