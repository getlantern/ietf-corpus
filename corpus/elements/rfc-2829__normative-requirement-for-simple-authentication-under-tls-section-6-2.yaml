document: rfc-2829
kind: normative-requirement
summary: For simple authentication under TLS (section 6.2), the client and server MUST negotiate a ciphersuite containing a bulk encryption algorithm of appropriate strength, and the client MUST send an LDAP bind request with version number 3.
section: "6.2"
rfc2119_level: MUST
