document: rfc-6513
kind: protocol-element
summary: The Intra-AS I-PMSI Auto-Discovery (A-D) route is a MCAST-VPN BGP NLRI originated by PEs attached to MVPN sites. Its NLRI encodes the route type, originating PE IP address, and a locally configured Route Distinguisher; it carries Route Target Extended Communities for membership discovery, a PMSI Tunnel attribute, and optionally a PE Distinguisher Labels attribute.
section: "4"
topics:
