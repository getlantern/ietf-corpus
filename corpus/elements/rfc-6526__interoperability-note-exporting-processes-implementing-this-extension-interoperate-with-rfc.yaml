document: rfc-6526
kind: interoperability-note
summary: Exporting Processes implementing this extension interoperate with RFC 5101-compliant Collecting Processes without requiring changes at the Collecting Process; however, Collecting Processes must implement additional support to realize the full benefits (per-Template loss calculation, immediate Template reuse, no Data Set buffering).
section: "1.2"
topics:
    - sctp
