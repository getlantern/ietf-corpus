document: rfc-4318
kind: security-consideration
summary: dot1dStpPortAdminPointToPoint could be used to mislead an access control protocol such as 802.1x into believing only one system is attached to a LAN segment, potentially enabling man-in-the-middle attacks by granting network access based on that false assumption.
