document: rfc-6233
kind: protocol-element
summary: A purge is an LSP with a zero Remaining Lifetime used to cause IS-IS routers to discard stored link-state information. Per ISO 10589, purge generation originally retained only the LSP header, discarding all TLVs; subsequent extensions (RFC 5304, RFC 5310) allow certain TLVs to be included.
section: "1"
topics:
    - routing
