document: rfc-5845
kind: normative-requirement
summary: On receiving a tunneled packet with a GRE header, the LMA MUST use the GRE key in the GRE extension header as an additional identifier to determine the mobility session; the GRE header is removed before further processing.
section: "5.2"
rfc2119_level: MUST
