document: rfc-3961
kind: protocol-element
summary: des-cbc-md5 (etype 3) uses DES-CBC with all-zero initial vector and an MD5 checksum. Protocol key is 8 bytes with parity in low bit of each octet; specific key is a copy of the original key; cipher state is the 8-byte CBC IV initialized to all-zero; required checksum mechanism is rsa-md5-des.
section: 6.2.1
topics:
    - crypto
extracted_by: claude-sonnet-4-6
