document: rfc-6098
kind: normative-requirement
summary: All senders and receivers MUST implement timestamp-based replay protection for the Identification field; nonce-based replay protection is OPTIONAL. A sending node and its receiving node MUST agree on which method to use as part of their mobile security association.
section: "7.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
