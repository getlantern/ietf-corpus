document: rfc-9742
kind: design-rationale
summary: The model uses YANG 'feature' statements to allow implementations to advertise only the syslog capabilities they actually support (e.g., console-action, file-action, remote-action, structured-data, signed-messages). This was chosen to maximize flexibility across diverse vendor implementations that differ in which syslog features they provide.
section: "4"
topics:
    - syslog
    - yang
