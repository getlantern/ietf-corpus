document: rfc-7622
kind: interoperability-note
summary: 'The differences from RFC 6122 include: domainpart preparation changed from IDNA2003 to IDNA2008; localpart preparation changed from Nodeprep (stringprep) to UsernameCaseMapped (PRECIS IdentifierClass); resourcepart changed from Resourceprep (stringprep) to OpaqueString (PRECIS FreeformClass); internationalized labels within domainparts must now be U-labels (not merely ''should be''); and servers must (not merely should) enforce address-formatting rules.'
section: A
topics:
    - realtime
    - dns
