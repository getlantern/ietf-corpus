document: rfc-8695
kind: protocol-element
summary: The 'clear-rip-route' RPC clears RIP routes from the IP routing table and redistributed routes for a specified RIP instance or all instances. Its input is an optional leafref to a control-plane-protocol name; if omitted, all RIP instances are cleared.
section: "2.5"
