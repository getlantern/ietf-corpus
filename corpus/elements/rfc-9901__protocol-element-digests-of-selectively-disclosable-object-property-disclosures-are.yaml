document: rfc-9901
kind: protocol-element
summary: Digests of selectively disclosable object-property Disclosures are collected into an array under the special key `_sd` at the relevant level of the JSON object. Each `_sd` array entry is a base64url-encoded hash of a Disclosure or a decoy digest; the `_sd` key MUST refer to an array of strings.
section: 4.2.4.1
topics:
