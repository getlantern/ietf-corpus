document: rfc-8201
kind: normative-requirement
summary: A TCP implementation must store the Maximum Segment Size (MSS) received from its peer (representing EMTU_R) and must not send any segment larger than this MSS, regardless of the PMTU.
section: "5.4"
rfc2119_level: MUST
topics:
