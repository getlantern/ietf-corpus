document: rfc-9624
kind: design-rationale
summary: EVPN BUM procedures are closely aligned with MVPN procedures (RFC 6514/RFC 8556), and an EVPN Broadcast Domain corresponds to a VPN in MVPN. This alignment is intentional so that BIER usage for EVPN can reuse most of the MVPN-with-BIER specification from RFC 8556 verbatim.
section: "1"
topics:
    - dns
    - multicast
    - routing
