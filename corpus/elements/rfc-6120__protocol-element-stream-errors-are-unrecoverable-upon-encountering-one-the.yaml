document: rfc-6120
kind: protocol-element
summary: 'Stream errors are unrecoverable; upon encountering one, the entity MUST send a <stream:error/> element containing a defined-condition child in namespace ''urn:ietf:params:xml:ns:xmpp-streams'', then send a closing </stream> tag. Defined conditions include: bad-format, conflict, connection-timeout, host-unknown, invalid-namespace, not-authorized, not-well-formed, policy-violation, resource-constraint, see-other-host, system-shutdown, and others.'
section: "4.9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
