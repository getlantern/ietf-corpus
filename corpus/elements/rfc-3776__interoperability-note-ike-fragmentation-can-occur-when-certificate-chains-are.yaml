document: rfc-3776
kind: interoperability-note
summary: IKE fragmentation can occur when certificate chains are used; many firewalls and routers drop fragments, preventing SA establishment. Mitigation options include storing peer certificates locally or obtaining them through other means.
section: "7.2"
