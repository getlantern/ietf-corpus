document: rfc-5763
kind: security-consideration
summary: Without RFC 4474 or equivalent signaling integrity, DTLS-SRTP only defends against passive attackers on the media path. An active attacker controlling both the media channel and the signaling path can modify fingerprints and mount an undetected MITM attack.
section: "8"
topics:
