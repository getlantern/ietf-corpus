document: rfc-2988
kind: normative-requirement
summary: For subsequent RTT measurements R', hosts MUST update RTTVAR <- (1 - beta)*RTTVAR + beta*|SRTT - R'|, then SRTT <- (1 - alpha)*SRTT + alpha*R', in that order, with alpha=1/8 and beta=1/4 RECOMMENDED, followed by RTO <- SRTT + max(G, K*RTTVAR).
section: "2.3"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
