document: rfc-7947
kind: design-rationale
summary: Attribute transparency is the default because modification of BGP attributes could cause route server clients to alter their BGP Decision Process, thereby changing the intended routing policies of exchange participants. The route server acts as a broker, not a policy enforcer.
section: "2.2"
topics:
    - bgp
    - routing
