document: rfc-3284
kind: wire-format
summary: 'Unsigned integers are encoded in a portable variable-length base-128 format: each 7-bit digit occupies the lower bits of a byte, and all bytes except the least significant have their MSB set to indicate more bytes follow. This ensures portability across 8-bit byte systems and compact encoding of small values.'
