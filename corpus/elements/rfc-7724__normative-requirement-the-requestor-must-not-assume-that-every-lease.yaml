document: rfc-7724
kind: normative-requirement
summary: The requestor MUST NOT assume that every lease state change is communicated across an Active Leasequery connection; the server is only required to transmit the current binding state when a packet is handed to TCP, so intermediate transitions may be lost.
section: "6"
rfc2119_level: MUST NOT
