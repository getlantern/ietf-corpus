document: rfc-9451
kind: design-rationale
summary: The setting and processing of the O bit neither assumes nor expects detailed analysis of the content of any inner IP packet carried by the NSH. This design avoids requiring deep packet inspection at every SFC data plane element, preserving performance while still enabling OAM-specific handling.
