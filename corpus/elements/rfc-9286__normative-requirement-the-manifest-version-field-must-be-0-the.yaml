document: rfc-9286
kind: normative-requirement
summary: The manifest version field MUST be 0. The manifestNumber MUST be incremented by 1 for each new manifest. Manifest verifiers MUST be able to process manifestNumber values up to 20 octets; issuers MUST NOT use values longer than 20 octets.
section: 4.2.1
rfc2119_level: MUST
topics:
    - pkix
    - security
