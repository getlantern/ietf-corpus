document: rfc-6072
kind: normative-requirement
summary: Credential server implementations MUST be implemented as a state agent. Implementers MUST NOT use the event list extension (RFC 4662) with either the certificate or credential event types, as doing so would require the authentication service to assert multiple identities simultaneously.
section: "6.11"
rfc2119_level: MUST
topics:
    - sip
