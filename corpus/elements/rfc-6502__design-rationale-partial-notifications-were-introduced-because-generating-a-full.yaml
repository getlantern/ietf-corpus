document: rfc-6502
kind: design-rationale
summary: Partial notifications were introduced because generating a full conference-state document for every small change is inefficient in bandwidth-constrained environments. The XML patch operations mechanism (RFC 5261) was chosen over the RFC 4575 <state>-based partial mechanism to allow finer-grained updates.
