document: rfc-3887
kind: normative-requirement
summary: A successful response to TRACK MUST be multi-line, consisting of a MIME body part of type multipart/related with subparts of message/tracking-status. If a message has not been seen, the server MUST either return an 'opaque' action response or a -ERR with reason code 'noinfo'.
section: "4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
