document: rfc-6797
kind: protocol-element
summary: The OPTIONAL `includeSubDomains` directive is a valueless directive that, when present, signals the UA to apply HSTS Policy to the HSTS Host and all subdomains of its domain name. Its presence is ignored when max-age is zero.
section: 6.1.2
topics:
    - http
    - security
