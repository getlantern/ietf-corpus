document: rfc-8999
kind: normative-requirement
summary: An endpoint MUST authenticate the semantic content of a Version Negotiation packet if it subsequently attempts a different QUIC version as a result of receiving that packet, since Version Negotiation packets have no integrity protection.
section: "7"
rfc2119_level: MUST
topics:
    - quic
    - security
