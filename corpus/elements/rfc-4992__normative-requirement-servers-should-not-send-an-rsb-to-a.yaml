document: rfc-4992
kind: normative-requirement
summary: Servers SHOULD NOT send an RSB to a client until they have received the entire RQB, because clients will not start processing the RSB until the full RQB is sent and the RSB may fill TCP buffers.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - tcp
