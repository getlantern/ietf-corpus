document: rfc-4338
kind: normative-requirement
summary: An Nx_Port supporting IPv6 or IPv4 MUST be able to map a received broadcast Class 3 Device_Data FC frame to an implicit Port Login context. The receive data field size of this implicit Port Login MUST be the same across all Nx_Ports connected to the same Fabric.
section: "10"
rfc2119_level: MUST
topics:
    - ip
    - multicast
