document: rfc-8625
kind: protocol-element
summary: The Bandwidth Availability TLV is defined as a TLV of the Ethernet SENDER_TSPEC object, carrying a <bandwidth, availability> pair. It enables RSVP-TE signaling to express bandwidth requirements tied to specific availability levels for links with variable discrete bandwidth.
section: "3.1"
