document: rfc-2226
kind: design-rationale
summary: MARS requires no additional code or special algorithms for IP broadcast resolution because it is a general database holding {Protocol address, ATM addresses} mappings with no constraints on the protocol address type; broadcast vs. multicast is purely a host-side distinction.
