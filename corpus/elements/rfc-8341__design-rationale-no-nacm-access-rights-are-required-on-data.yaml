document: rfc-8341
kind: design-rationale
summary: No NACM access rights are required on data nodes that are implicitly changed as a side effect of an allowed operation (e.g., YANG when-stmt re-evaluation or choice-stmt branch exclusion), because requiring such permissions would create unworkable coupling between access control policy and YANG model semantics.
section: 3.2.5
topics:
    - netconf
    - security
    - yang
