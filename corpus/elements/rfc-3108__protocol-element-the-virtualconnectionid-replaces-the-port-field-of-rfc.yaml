document: rfc-3108
kind: protocol-element
summary: The <virtualConnectionId> replaces the <port> field of RFC 2327's 'm' line and identifies the ATM virtual circuit or subchannel. Formats include VCCI, VPI/VCI, VPCI/VCI, BCG/VPI/VCI, and port-qualified forms; any term may be qualified with an optional ATM remote-peer address. For AAL2, a CID suffix is appended to identify the subchannel.
section: 5.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
