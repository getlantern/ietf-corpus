document: rfc-2941
kind: wire-format
summary: 'The modifier byte in an authentication-type-pair encodes five one-bit fields: AUTH_WHO_MASK (bit 0), AUTH_HOW_MASK (bit 1), INI_CRED_FWD_MASK (bit 3), and ENCRYPT_MASK (bits 2 and 4). Values: AUTH_CLIENT_TO_SERVER=0, AUTH_SERVER_TO_CLIENT=1, AUTH_HOW_ONE_WAY=0, AUTH_HOW_MUTUAL=2, ENCRYPT_OFF=0, ENCRYPT_USING_TELOPT=4, ENCRYPT_AFTER_EXCHANGE=16, INI_CRED_FWD_ON=8.'
