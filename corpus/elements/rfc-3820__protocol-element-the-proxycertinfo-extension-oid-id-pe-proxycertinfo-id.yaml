document: rfc-3820
kind: protocol-element
summary: The ProxyCertInfo extension (OID id-pe-proxyCertInfo, { id-pe 14 }) is a SEQUENCE containing an optional pCPathLenConstraint INTEGER and a required proxyPolicy field. Presence of this extension identifies the certificate as a Proxy Certificate.
