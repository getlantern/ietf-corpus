document: rfc-4356
kind: normative-requirement
summary: Any Internet messages containing a 'Sensitivity:' header MUST NOT be sent to an MMS system; the associated negative delivery status report MUST include extended status code 5.6.0 indicating that privacy could not be ensured.
section: 2.1.3.3
rfc2119_level: MUST NOT
topics:
    - email
    - privacy
