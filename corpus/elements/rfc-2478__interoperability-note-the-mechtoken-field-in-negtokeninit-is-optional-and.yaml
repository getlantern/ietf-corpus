document: rfc-2478
kind: interoperability-note
summary: The mechToken field in NegTokenInit is optional, and not all target implementations are required to support processing of a piggybacked initial mechToken. Targets that do support it can provide an optimistic response, but those that cannot may simply omit responseToken from the first reply.
section: 3.2.1
topics:
    - crypto
    - security
