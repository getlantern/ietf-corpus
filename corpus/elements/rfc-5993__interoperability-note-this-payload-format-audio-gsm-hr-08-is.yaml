document: rfc-5993
kind: interoperability-note
summary: This payload format (audio/GSM-HR-08) is not compatible with early draft GSM-HR RTP payload types from 1999–2000. RFC 3551 itself did not include any GSM-HR payload format specification, leaving a gap that this document fills.
