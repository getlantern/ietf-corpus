document: rfc-7780
kind: protocol-element
summary: The Extended Hop Count field (flags word bits 14-16, high-order 3 bits) extends the 6-bit Hop Count to 9 bits, supporting up to 512 hops. When used, the high 3 bits are stored in the flags word, the low 5 bits in the TRILL Header Hop Count field, and the critical reserved bit (bit 2 of the flags word) is set to one.
section: 10.2.1
topics:
    - routing
