document: rfc-9036
kind: design-rationale
summary: The registry policy was changed from Standards Action to Specification Required because NENA, an SDO that makes significant use of LoST in emergency call specifications, identified a need for additional location profiles that the previous policy blocked. Specification Required allows non-IETF SDOs to contribute values without requiring a Standards Track RFC.
section: "1"
topics:
    - registry
