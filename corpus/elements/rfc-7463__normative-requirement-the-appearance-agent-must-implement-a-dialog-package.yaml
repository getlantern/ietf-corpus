document: rfc-7463
kind: normative-requirement
summary: The Appearance Agent MUST implement a dialog package state agent and MUST support the shared appearance extensions and 'shared' Event header field parameter. It MUST also have a way of discovering the state of all dialogs associated with the AOR.
section: "5.4"
rfc2119_level: MUST
