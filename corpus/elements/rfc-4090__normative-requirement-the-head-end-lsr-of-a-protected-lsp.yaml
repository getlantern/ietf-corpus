document: rfc-4090
kind: normative-requirement
summary: The head-end LSR of a protected LSP MUST support the additional bandwidth and node protection flags in the RRO IPv4/IPv6 sub-objects and MUST support the RRO Label sub-object. If local protection is newly desired, this SHOULD be signaled via make-before-break.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
