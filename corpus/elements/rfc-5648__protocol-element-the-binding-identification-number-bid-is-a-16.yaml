document: rfc-5648
kind: protocol-element
summary: The Binding Identification Number (BID) is a 16-bit unsigned integer assigned by the mobile node to distinguish multiple bindings for the same home address. BIDs must be unique per home address at any given time; the value zero is reserved and SHOULD NOT be used. The mobile node stores BIDs in its Binding Update List and sends them in Binding Updates.
section: "2"
topics:
