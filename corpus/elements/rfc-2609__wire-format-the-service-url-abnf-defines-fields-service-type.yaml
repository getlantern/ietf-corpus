document: rfc-2609
kind: wire-format
summary: 'The service: URL ABNF defines fields: service-type (abstract-type '':'' url-scheme or concrete-type), sap (site + url-part), where site supports ipsite (IP/DNS with ''//'' prefix), ipxsite (IPX: 8-hex network, 12-hex node, 4-hex socket), and atsite (AppleTalk: 1–31 AppleAscii chars each for object, type, zone). The url-part contains optional url-path and attr-list of semicolon-separated attribute assignments.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
