document: rfc-9709
kind: normative-requirement
summary: Implementations MUST protect content-encryption keys and content-authenticated-encryption keys, including both CEK and CEK'. Compromise of CEK may disclose encrypted content; compromise of a content-authenticated-encryption key may also allow modification of authenticated content and AAD.
section: "6"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
