document: rfc-4391
kind: normative-requirement
summary: 'When creating an interface identifier from a GUID for IPv6 stateless autoconfiguration: if the GUID is a modified EUI-64 identifier (''u'' bit toggled), the ''u'' bit MUST NOT be toggled again; if it is an unmodified EUI-64, the ''u'' bit MUST be toggled per RFC 3513.'
section: "8"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
