document: rfc-8005
kind: normative-requirement
summary: Upon return of a HIP RR, a host MUST always calculate the HI-derivative HIT as specified in Section 3 of RFC 7401. The HIT included in the HIP RR SHOULD only be used as an optimization (e.g., table lookup), not as the authoritative HIT.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
