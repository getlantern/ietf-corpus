document: rfc-5901
kind: security-consideration
summary: Phishing activity reports may be falsified or corrupted in transit; applying a digital signature and/or message encryption on each report counteracts both concerns. Each exchanging organization is expected to determine the need and mechanism for transport protection.
section: "7.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
