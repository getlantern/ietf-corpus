document: rfc-6231
kind: security-consideration
summary: Section 7 mandates that implementations address security by leveraging the Media Control Channel Framework's TLS-based transport security for control messages, and by using HTTPS for fetching external dialog documents and media resources. Authentication credentials (certificates, passwords) SHOULD be stored as part of MS configuration rather than transmitted in requests.
section: "7"
topics:
    - security
    - realtime
    - voip
