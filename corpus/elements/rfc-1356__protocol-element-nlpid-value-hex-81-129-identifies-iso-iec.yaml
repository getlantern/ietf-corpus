document: rfc-1356
kind: protocol-element
summary: NLPID value hex 81 (129) identifies ISO/IEC 8473 (CLNP); ES-IS and IS-IS datagrams MAY also be carried on the same virtual circuit as CLNP. NLPID hex 82 (130) is used specifically for ES-IS (ISO/IEC 9542). Support for CLNP and ES-IS is not required for conformance.
section: "3.2"
topics:
