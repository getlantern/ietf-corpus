document: rfc-9779
kind: protocol-element
summary: 'ACH channel type values used for SR-MPLS measurement messages: 0x000C for delay measurement, 0x000A for direct loss measurement, 0x000B for inferred loss measurement, 0x000D for combined direct loss/delay, and 0x000E for combined inferred loss/delay. The same ACH values apply to both links and end-to-end SR-MPLS Policies.'
section: "5.1"
topics:
