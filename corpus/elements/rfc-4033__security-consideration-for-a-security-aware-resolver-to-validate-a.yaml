document: rfc-4033
kind: security-consideration
summary: For a security-aware resolver to validate a response, all zones along the path from the trust anchor to the response zone must be signed and all name servers and resolvers in the path must be security-aware. A break anywhere in the authentication chain prevents validation.
section: "12"
topics:
    - dns
    - security
