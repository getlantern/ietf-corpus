document: rfc-9251
kind: protocol-element
summary: Four EVI-RT Extended Community sub-types (0x0A–0x0D, Types 0–3) are defined to associate Membership Report Synch and Leave Synch routes with a specific EVI without influencing BGP route distribution. They mirror the four standard RT EC types (Two-Octet AS, IPv4-Address, Four-Octet AS, IPv6-Address specific).
section: "9.5"
topics:
    - multicast
    - routing
