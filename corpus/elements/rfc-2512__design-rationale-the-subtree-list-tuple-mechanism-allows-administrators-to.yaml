document: rfc-2512
kind: design-rationale
summary: 'The (subtree, list) tuple mechanism allows administrators to select arbitrary subsets of accounting data objects: the subtree OID is fixed as atmAcctngDataObjects, and the list OCTET STRING has bit N set to include the object with sub-identifier N, enabling flexible per-deployment accounting configuration.'
