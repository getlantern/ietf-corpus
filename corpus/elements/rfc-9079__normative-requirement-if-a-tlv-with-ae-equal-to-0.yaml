document: rfc-9079
kind: normative-requirement
summary: If a TLV with AE equal to 0 contains a Source Prefix sub-TLV, then the whole enclosing TLV MUST be ignored. If a TLV contains multiple Source Prefix sub-TLVs, then the whole TLV MUST be ignored.
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
