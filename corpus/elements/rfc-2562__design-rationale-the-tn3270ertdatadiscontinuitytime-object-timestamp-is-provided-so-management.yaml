document: rfc-2562
kind: design-rationale
summary: The tn3270eRtDataDiscontinuityTime object (TimeStamp) is provided so management applications can detect counter resets caused by TN3270E server restarts or other discontinuities. All wrappable Counter32 objects in tn3270eRtDataEntry should be monitored in conjunction with this timestamp.
section: "4.2"
topics:
