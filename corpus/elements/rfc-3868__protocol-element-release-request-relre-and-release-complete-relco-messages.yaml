document: rfc-3868
kind: protocol-element
summary: Release Request (RELRE) and Release Complete (RELCO) messages tear down connection-oriented sessions. RELRE carries mandatory Routing Context, Destination Reference Number, Source Reference Number, and SCCP Cause. RELCO carries Routing Context, both reference numbers, and optional Importance. Cover SCCP RLSD and RLC.
section: 3.3.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
