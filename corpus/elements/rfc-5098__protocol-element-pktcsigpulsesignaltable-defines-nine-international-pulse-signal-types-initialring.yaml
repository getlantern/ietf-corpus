document: rfc-5098
kind: protocol-element
summary: pktcSigPulseSignalTable defines nine international pulse signal types (initialRing, pulseLoopClose, pulseLoopOpen, enableMeterPulse, meterPulseBurst, pulseNoBattery, pulseNormalPolarity, pulseReducedBattery, pulseReversePolarity), each with configurable frequency, dB level, duration, pulse interval, and repeat count. Rows MUST NOT persist across MTA reboots.
