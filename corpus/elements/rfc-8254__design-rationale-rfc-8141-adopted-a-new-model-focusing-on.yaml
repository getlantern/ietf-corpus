document: rfc-8254
kind: design-rationale
summary: RFC 8141 adopted a new model focusing on encouraging registration of all namespaces that follow the formal namespace syntax, collecting as much information as possible, rather than requiring IETF Consensus. This shift was intended to reduce barriers and improve consistency of namespace identification.
