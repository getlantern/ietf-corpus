document: rfc-2181
kind: normative-requirement
summary: 'An alias name (the label of a CNAME record) may have SIG, NXT, and KEY RRs if DNSSEC is in use, but must have no other data records. For any DNS label, exactly one of these holds: it has one CNAME record (optionally with DNSSEC records), one or more non-CNAME records, no RRs, or does not exist.'
section: "10.1"
rfc2119_level: MUST NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
