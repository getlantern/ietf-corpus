document: rfc-5025
kind: interoperability-note
summary: SIP aliases (multiple AORs assigned to a single user) have no relationship in this specification — each looks like a different user. Even if the presence server knows about aliases for the watcher, they are not mapped to each other in identity matching.
section: 3.1.1.2
topics:
    - sip
