document: rfc-8824
kind: security-consideration
summary: An attacker able to inject corrupted SCHC-compressed packets can mount DoS attacks by causing excessive resource consumption at the decompressor. If a corrupted packet arrives with an incorrect length, SCHC decompression procedures detect the error and drop the packet.
section: "9"
topics:
