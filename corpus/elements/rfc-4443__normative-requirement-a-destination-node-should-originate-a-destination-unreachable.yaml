document: rfc-4443
kind: normative-requirement
summary: A destination node SHOULD originate a Destination Unreachable message with Code 4 in response to a packet for which the transport protocol (e.g., UDP) has no listener, if that transport protocol has no alternative means to inform the sender.
section: "3.1"
rfc2119_level: SHOULD
topics:
