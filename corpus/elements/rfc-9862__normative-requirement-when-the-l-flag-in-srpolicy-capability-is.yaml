document: rfc-9862
kind: normative-requirement
summary: When the L-flag in SRPOLICY-CAPABILITY is cleared (or the TLV is absent), the given peer MUST NOT be sent PCReq/PCRep messages for SR Policy LSPs. This update applies only to SR Policy LSPs; RFC 8231 Section 5.8.2 continues to apply to other LSP types such as RSVP-TE.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
