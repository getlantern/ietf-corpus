document: rfc-9758
kind: security-consideration
summary: BPv7 endpoints identified by ipn EIDs are not guaranteed reachable, and their identity is not guaranteed by the Bundle Protocol itself. Verification of the Block Integrity Block (BIB) targeting the bundle's primary block via BPSec (RFC 9172) is required to authenticate the processing entity.
section: "8.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
