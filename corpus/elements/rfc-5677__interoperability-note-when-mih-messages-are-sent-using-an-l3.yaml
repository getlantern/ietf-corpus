document: rfc-5677
kind: interoperability-note
summary: When MIH messages are sent using an L3 or higher-layer transport, L3 handles fragmentation and MIH protocol MUST NOT perform its own fragmentation. Combining MIH-layer fragmentation with IP-layer fragmentation or TCP transport is explicitly prohibited.
section: "6.1"
topics:
    - mobility
    - ip
    - tcp
    - udp
