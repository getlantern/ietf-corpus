document: rfc-8898
kind: normative-requirement
summary: The UAC MUST check the AS URL received in a 401/407 response against a list of trusted ASs configured on the UAC in order to prevent several classes of possible vulnerabilities when a client blindly attempts to use any provided AS.
section: 2.1.1
rfc2119_level: MUST
topics:
    - sip
    - oauth
    - security
