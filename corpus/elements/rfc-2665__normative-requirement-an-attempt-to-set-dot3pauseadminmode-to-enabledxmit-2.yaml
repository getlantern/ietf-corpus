document: rfc-2665
kind: normative-requirement
summary: An attempt to set dot3PauseAdminMode to 'enabledXmit(2)' or 'enabledRcv(3)' will fail on interfaces that do not support operation at greater than 100 Mb/s. The value of dot3PauseAdminMode is ignored when the interface is not operating in full-duplex mode.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
