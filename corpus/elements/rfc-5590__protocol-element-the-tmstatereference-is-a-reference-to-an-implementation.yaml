document: rfc-5590
kind: protocol-element
summary: 'The tmStateReference is a reference to an implementation-specific cache (tmState) containing transport and security parameters for a session. It is passed between the Transport Subsystem and the Message Processing and Security Subsystems via extended ASIs. The tmState MUST conceptually include: tmTransportDomain, tmTransportAddress, tmSecurityName, tmRequestedSecurityLevel, tmTransportSecurityLevel, tmSameSecurity, and tmSessionID.'
section: "5.2"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
