document: rfc-5797
kind: protocol-element
summary: Base FTP commands from RFC 959 are assigned the immutable pseudo FEAT code 'base'. Mandatory commands include ABOR, ACCT, ALLO, APPE, CWD, DELE, HELP, LIST, MODE, NLST, NOOP, PASS, PASV, PORT, QUIT, REIN, REST, RETR, RNFR, RNTO, SITE, STAT, STOR, STRU, TYPE, USER. Optional commands include CDUP, MKD, PWD, RMD, SMNT, STOU, SYST.
section: "2.4"
topics:
