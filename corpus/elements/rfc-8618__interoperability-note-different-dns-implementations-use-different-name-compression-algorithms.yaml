document: rfc-8618
kind: interoperability-note
summary: Different DNS implementations use different name compression algorithms when generating packets (e.g., NSD vs. Knot Authoritative). C-DNS stores names uncompressed; when converting back to PCAP, the reconstructed compression will generally differ from the original, producing valid but byte-for-byte non-identical packets.
section: "9.1"
topics:
    - dns
    - measurement
