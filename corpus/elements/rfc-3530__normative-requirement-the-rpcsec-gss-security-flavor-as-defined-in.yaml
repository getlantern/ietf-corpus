document: rfc-3530
kind: normative-requirement
summary: The RPCSEC_GSS security flavor as defined in RFC 2203 MUST be used as the mechanism to deliver stronger security for the NFS version 4 protocol. Other flavors such as AUTH_NONE, AUTH_SYS, and AUTH_DH MAY be implemented as well.
