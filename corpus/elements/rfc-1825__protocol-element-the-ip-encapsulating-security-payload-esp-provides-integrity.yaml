document: rfc-1825
kind: protocol-element
summary: The IP Encapsulating Security Payload (ESP) provides integrity, authentication, and confidentiality to IP datagrams by encapsulating either an entire IP datagram (tunnel mode) or only upper-layer protocol data (transport mode), encrypting most of the ESP contents, and prepending a new cleartext IP header.
section: "3.2"
topics:
