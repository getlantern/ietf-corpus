document: rfc-2822
kind: design-rationale
summary: 'The ''-0000'' zone value is semantically distinct from ''+0000'': ''+0000'' means explicitly UTC, while ''-0000'' means the time was generated on a system that may have an unknown local time zone, indicating the datetime carries no local timezone information.'
section: "3.3"
