document: rfc-8422
kind: normative-requirement
summary: All ECDSA computations MUST be performed according to ANSI X9.62. A secure hash function (SHA-256, SHA-384, or SHA-512) MUST be used. All EdDSA computations MUST be performed according to RFC 8032; the context parameter for Ed448 MUST be set to the empty string.
section: "5.10"
rfc2119_level: MUST
topics:
    - tls
    - crypto
