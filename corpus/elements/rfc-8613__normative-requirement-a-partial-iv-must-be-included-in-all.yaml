document: rfc-8613
kind: normative-requirement
summary: A Partial IV MUST be included in all Observe notifications (both successful and error), except the first where it MAY be omitted. Every new Observe registration request MUST use a new Partial IV. A client MUST consider the notification with the highest Partial IV as the freshest.
section: 4.1.3.5.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
