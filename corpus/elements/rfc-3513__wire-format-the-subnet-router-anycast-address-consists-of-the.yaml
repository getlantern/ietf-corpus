document: rfc-3513
kind: wire-format
summary: The Subnet-Router anycast address consists of the n-bit subnet prefix followed by 128-n zero bits (interface identifier set to all zeros). It is syntactically identical to a unicast address for an interface on the link with interface identifier zero.
