document: rfc-7811
kind: protocol-element
summary: 'An ear is a path whose interior nodes are not yet in the GADAG but whose two endpoints already are. Ears are added to the GADAG in a direction determined by the partial order of their endpoints: if X<<Y the ear goes from X toward Y; if X is the root or endpoints are unordered, the ear is directed away from the root.'
section: "4.2"
topics:
    - routing
