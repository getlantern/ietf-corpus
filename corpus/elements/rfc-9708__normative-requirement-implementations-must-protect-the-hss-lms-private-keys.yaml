document: rfc-9708
kind: normative-requirement
summary: Implementations MUST protect the HSS/LMS private keys and MUST keep track of which leaf nodes in the tree have been used. Loss of integrity of tracking data can cause a one-time key to be reused, breaking security.
section: "6"
rfc2119_level: MUST
topics:
    - crypto
    - security
