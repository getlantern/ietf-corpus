document: rfc-8480
kind: wire-format
summary: The 6P LIST Request carries Metadata (16 bits), CellOptions (8 bits), Reserved (8 bits), Offset (16 bits), and MaxNumCells (16 bits). The Response returns a variable-length CellList and uses return code RC_EOL to signal the end of the list.
section: 3.3.5
