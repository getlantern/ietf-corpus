document: rfc-9621
kind: normative-requirement
summary: A Transport Services Implementation MUST NOT automatically fall back from secure protocols to insecure protocols, or fall back to weaker versions of secure protocols. The API MAY allow applications to explicitly specify which versions of a protocol are permitted.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
