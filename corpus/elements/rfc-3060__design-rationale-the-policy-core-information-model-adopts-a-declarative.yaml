kind: design-rationale
summary: The Policy Core Information Model adopts a declarative rather than procedural approach, defining modular building blocks and relationships without prescribing algorithms or execution sequences. This keeps the model machine-friendly and avoids constraining implementers, while still allowing action ordering to be optionally expressed.
