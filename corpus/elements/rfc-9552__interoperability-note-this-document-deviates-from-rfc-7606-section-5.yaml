document: rfc-9552
kind: interoperability-note
summary: 'This document deviates from RFC 7606 Section 5.4 paragraph 2 for the Link-State address family: unknown NLRI types MUST be treated as opaque and propagated rather than triggering a NOTIFICATION. This enables new NLRI types to be deployed without requiring all route reflectors to be upgraded.'
section: "5.2"
topics:
    - bgp
    - routing
