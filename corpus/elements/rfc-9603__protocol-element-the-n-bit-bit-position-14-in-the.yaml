document: rfc-9603
kind: protocol-element
summary: The N bit (bit position 14) in the SRv6-PCE-CAPABILITY sub-TLV Flags field indicates that the PCC is capable of resolving a Node or Adjacency Identifier (NAI) to an SRv6-SID. It is meaningful only in Open messages sent to a PCE.
section: 4.1.1
topics:
    - routing
