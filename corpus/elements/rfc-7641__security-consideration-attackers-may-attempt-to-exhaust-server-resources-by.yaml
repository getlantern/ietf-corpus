document: rfc-7641
kind: security-consideration
summary: Attackers may attempt to exhaust server resources by filling the observer list. Servers SHOULD apply access controls to observer-list state creation and MAY fall back to normal GET processing (without Observe) if resources are exhausted or nearing exhaustion.
section: "7"
topics:
    - security
