document: rfc-8198
kind: design-rationale
summary: With DNSSEC and aggressive use of DNSSEC-validated cache, the TTL of the NSEC/NSEC3 record and the SOA.MINIMUM field become the authoritative statement of how quickly a newly added name can start working within a zone, making the prior recommendation against synthesis unnecessary.
