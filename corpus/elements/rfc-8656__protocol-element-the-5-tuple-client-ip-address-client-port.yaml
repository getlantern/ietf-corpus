document: rfc-8656
kind: protocol-element
summary: The 5-tuple (client IP address, client port, server IP address, server port, and transport protocol) uniquely identifies both the client-to-server communication stream and the allocation on the server. At the server, the client's server-reflexive address replaces the host transport address in the tuple.
