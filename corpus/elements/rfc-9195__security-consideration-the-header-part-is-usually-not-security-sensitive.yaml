document: rfc-9195
kind: security-consideration
summary: The header part is usually not security sensitive, but may become sensitive if the URI method is used and the URI includes a userinfo subcomponent, or if description text contains sensitive information. Instance data files should be protected against modification or unauthorized access using normal file-handling mechanisms.
