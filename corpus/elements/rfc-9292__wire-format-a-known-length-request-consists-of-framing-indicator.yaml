document: rfc-9292
kind: wire-format
summary: A Known-Length Request consists of Framing Indicator (i)=0, Request Control Data, Known-Length Field Section (header), Known-Length Content, Known-Length Field Section (trailer), and Padding. A Known-Length Response uses Framing Indicator (i)=1 and replaces request control data with zero or more Known-Length Informational Responses followed by Final Response Control Data.
section: "3.1"
topics:
    - http
