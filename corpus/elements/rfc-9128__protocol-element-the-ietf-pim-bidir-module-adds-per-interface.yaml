document: rfc-9128
kind: protocol-element
summary: The ietf-pim-bidir module adds per-interface DF election configuration (offer-interval, backoff-interval, offer-multiplier) under a feature guard, extends neighbors with a bidir-capable boolean, and provides read-only per-RP per-interface DF election state (df-address, interface-state, winner-metric, winner-metric-preference, up-time).
