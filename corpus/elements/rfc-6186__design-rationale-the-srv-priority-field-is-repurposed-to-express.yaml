document: rfc-6186
kind: design-rationale
summary: The SRV priority field is repurposed to express domain-wide preference between IMAP and POP3 protocols, not just between servers for a single service. This allows a domain operator to steer capable MUAs toward a preferred protocol without requiring protocol-specific configuration in the MUA.
section: "3.4"
topics:
    - email
    - dns
