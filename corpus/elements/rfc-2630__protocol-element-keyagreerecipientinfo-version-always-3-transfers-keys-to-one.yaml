document: rfc-2630
kind: protocol-element
summary: KeyAgreeRecipientInfo (version always 3) transfers keys to one or more recipients sharing the same key agreement algorithm. Fields include originator (OriginatorIdentifierOrKey CHOICE), optional ukm (UserKeyingMaterial OCTET STRING), keyEncryptionAlgorithm, and recipientEncryptedKeys (SEQUENCE OF RecipientEncryptedKey).
section: 6.2.2
topics:
