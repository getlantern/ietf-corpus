document: rfc-7915
kind: design-rationale
summary: IPv6 atomic fragment generation was deprecated in RFC 7915 (relative to RFC 6145) based on analysis in the 'Generation of IPv6 Atomic Fragments Considered Harmful' study. This change removes the algorithm that generated atomic fragments as part of IPv4-to-IPv6 translation, as atomic fragments were found to cause operational harm.
section: "2"
topics:
