document: rfc-3224
kind: security-consideration
summary: 'The example Acme UA Authentication Extension (Section 5.2) using MD5 and a shared secret pass phrase is explicitly noted as unsuitable for production use: it requires per-UA shared secrets on all SAs and DAs, and the secret pass phrase is susceptible to a dictionary attack.'
