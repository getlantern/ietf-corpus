document: rfc-1850
kind: protocol-element
summary: ospfAreaAggregateTable replaces the obsoleted ospfAreaRangeTable. It is indexed by ospfAreaAggregateAreaID, ospfAreaAggregateLsdbType (distinguishes type-3 vs. NSSA aggregates), ospfAreaAggregateNet, and ospfAreaAggregateMask. ospfAreaAggregateEffect controls whether matching subnets are advertised or suppressed.
section: "3.14"
