document: rfc-2982
kind: normative-requirement
summary: expResourceDeltaWildcardInstanceMaximum limits the maximum number of dynamic wildcard delta instances. An attempt to allocate beyond this limit results in expErrorCode being set to tooManyWildcardValues for that evaluation. A value of 0 means no preset limit.
section: "3"
rfc2119_level: MUST NOT
topics:
