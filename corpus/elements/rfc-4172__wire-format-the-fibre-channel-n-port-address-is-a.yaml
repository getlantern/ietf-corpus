document: rfc-4172
kind: wire-format
summary: 'The Fibre Channel N_PORT address is a 24-bit field divided into: Domain ID (bits 0–7, high-order, range 1–239/0xEF), Area ID (bits 8–15), and Port ID (bits 16–23, low-order). The source (S_ID) and destination (D_ID) addresses occupy words 1 and 2 of the FC frame header, respectively.'
section: 3.7.1
