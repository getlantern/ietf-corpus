document: rfc-2245
kind: interoperability-note
summary: The example uses the IMAP profile of SASL where base64 encoding of challenges/responses and the '+ ' prefix are part of the IMAP4 profile, not SASL itself. Newer SASL profiles include the client message with the AUTHENTICATE command, eliminating the extra round trip.
