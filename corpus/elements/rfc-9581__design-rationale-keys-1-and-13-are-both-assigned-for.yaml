document: rfc-9581
kind: design-rationale
summary: Keys -1 and -13 are both assigned for the elective timescale because key -1 was chosen first; when the critical key 13 was added, it was considered desirable to have a negative (elective) equivalent at -13. Both are retained for compatibility, with -1 marked as 'legacy' in the registry.
