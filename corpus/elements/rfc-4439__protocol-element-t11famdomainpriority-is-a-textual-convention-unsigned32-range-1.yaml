document: rfc-4439
kind: protocol-element
summary: T11FamDomainPriority is a textual convention (Unsigned32, range 1..255) representing a switch's priority in Principal Switch selection. Value 1 is the highest priority; value 255 indicates the switch cannot act as Principal Switch.
section: "6.2"
