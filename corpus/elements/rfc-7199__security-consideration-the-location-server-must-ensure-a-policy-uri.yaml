document: rfc-7199
kind: security-consideration
summary: The Location Server MUST ensure a policy URI is unpredictable even to an attacker who has requested many URIs; it MUST NOT be derived solely from public information. Adding 128 bits or more of random entropy is RECOMMENDED to make guessing infeasible.
section: "7.2"
topics:
    - security
    - crypto
