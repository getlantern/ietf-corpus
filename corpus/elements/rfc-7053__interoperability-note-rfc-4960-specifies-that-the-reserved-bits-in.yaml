document: rfc-7053
kind: interoperability-note
summary: RFC 4960 specifies that the Reserved bits in the DATA chunk flags field should be set to 0 by the sender and ignored by the receiver. This pre-existing rule is what allows the I bit extension to be deployed without a handshake or version negotiation.
