document: rfc-9702
kind: registry
summary: IANA has added a 'Data Plane' column to the 'IGP MSD-Types' registry to identify the base identity for each MSD type. Existing assignments include value 1 (Base MPLS Imposition MSD, MPLS), value 2 (ERLD-MSD, MPLS), values 41-42 and 44-45 (SRH types, SRv6), and values 251-254 (Experimental Use).
