document: rfc-3396
kind: normative-requirement
summary: The decoding agent MUST reassemble split option parts into a single object and MUST NOT treat each split portion of the option as a separate object. There is no semantic meaning to where an option is split.
section: "7"
rfc2119_level: MUST
