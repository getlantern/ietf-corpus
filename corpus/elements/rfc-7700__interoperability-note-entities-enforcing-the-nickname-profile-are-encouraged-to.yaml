document: rfc-7700
kind: interoperability-note
summary: 'Entities enforcing the Nickname profile are encouraged to be liberal in acceptance: first attempt to map characters (width, additional, case, normalization) and accept the result; only reject strings when a character is disallowed by FreeformClass and cannot be mapped.'
