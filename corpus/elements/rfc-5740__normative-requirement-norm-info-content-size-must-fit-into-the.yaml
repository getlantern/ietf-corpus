document: rfc-5740
kind: normative-requirement
summary: NORM_INFO content size MUST fit into the payload portion of a single NORM message (i.e., one NormSegmentSize). This atomic constraint enables efficient repair of NORM_INFO without the multi-round FEC repair process required for NORM_DATA.
section: "1.2"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
