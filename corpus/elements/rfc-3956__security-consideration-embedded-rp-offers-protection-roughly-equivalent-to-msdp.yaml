document: rfc-3956
kind: security-consideration
summary: Embedded-RP offers protection roughly equivalent to MSDP with SA filtering — i.e., security by obscurity. For real access control, PIM multicast scoping borders must be deployed at domain edges. Nodes in foreign domains can register to or send PIM Joins to the RP without further restriction.
section: "10"
topics:
    - multicast
    - security
