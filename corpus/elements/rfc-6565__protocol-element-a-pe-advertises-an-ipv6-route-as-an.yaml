document: rfc-6565
kind: protocol-element
summary: A PE advertises an IPv6 route as an Inter-Area-Prefix (type 0x2003) LSA when the Domain ID matches and the source LSA was Intra-Area-Prefix (0x2009) or Inter-Area-Prefix (0x2003). The PE represents itself as an ABR regardless of whether source and destination area numbers match.
section: 4.3.2.1
topics:
    - routing
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
