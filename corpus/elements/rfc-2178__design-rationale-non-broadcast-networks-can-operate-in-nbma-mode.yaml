document: rfc-2178
kind: design-rationale
summary: Non-broadcast networks can operate in NBMA mode (DR elected, more efficient for fully-meshed topologies) or Point-to-MultiPoint mode (no DR, each connection treated as a point-to-point link). Point-to-MultiPoint is recommended when not all routers can communicate directly, such as on PVC-only Frame Relay, because NBMA mode requires full mesh reachability.
section: 2.1.1
topics:
    - routing
