document: rfc-5942
kind: design-rationale
summary: ND does not have a mechanism to explicitly signal that a destination is off-link. Instead, a destination is assumed off-link unless there is explicit on-link information. Redirect messages do not signal off-link; they only indicate a preferred next hop.
section: "3"
