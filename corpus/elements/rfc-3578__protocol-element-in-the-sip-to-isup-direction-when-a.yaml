document: rfc-3578
kind: protocol-element
summary: In the SIP-to-ISUP direction, when a gateway receives a subsequent INVITE with the same Call-ID and From tag as the previous one and an updated Request-URI, it should generate a SAM (Subsequent Address Message) rather than a new IAM, and answer the previously received INVITE with 484 Address Incomplete.
section: "3.5"
topics:
    - sip
    - voip
    - realtime
