document: rfc-5230
kind: design-rationale
summary: Language selection for vacation responses is deliberately encoded in the Sieve script itself (e.g., by testing Accept-Language or Content-Language headers) rather than via an automatic mechanism, because language selection is typically intertwined with other response-selection criteria such as sender identity or organizational role.
