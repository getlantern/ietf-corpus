document: rfc-3101
kind: design-rationale
summary: The P-bit policy paradox documents that Type-7 LSAs with the P-bit clear (not intended for domain-wide propagation) can still be installed in NSSA border router routing tables and hijack traffic from other areas into the NSSA. This is an inherent side-effect of the NSSA design, not a bug, and is documented so implementors understand the traffic-forwarding implications.
section: Appendix E
topics:
    - routing
