document: rfc-7825
kind: interoperability-note
summary: 'Using ''setup.ice-d-m'' in the Proxy-Require header is NOT RECOMMENDED because it yields contradictory results: a media-handling non-ICE proxy aborts setup (desirable), but a non-media-handling non-ICE proxy also aborts (undesirable, since pass-through may have worked). Use Supported/Proxy-Supported instead.'
section: "7.3"
topics:
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
