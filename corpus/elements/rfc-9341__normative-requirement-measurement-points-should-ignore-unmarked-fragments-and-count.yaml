document: rfc-9341
kind: normative-requirement
summary: Measurement points SHOULD ignore unmarked fragments and count marked fragments as full packets. With sufficient resources, they MAY track both marked and unmarked initial fragments and increment the counter only if all other fragments are consistently marked or consistently unmarked.
section: "6"
rfc2119_level: SHOULD
topics:
    - measurement
