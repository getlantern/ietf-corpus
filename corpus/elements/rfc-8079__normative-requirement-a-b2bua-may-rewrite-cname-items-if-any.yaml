document: rfc-8079
kind: normative-requirement
summary: A B2BUA MAY rewrite CNAME items if any potential SSRC collision is detected. If it does rewrite CNAMEs, it MUST generate new CNAMEs following RFC 7022. If RTP extensions involving CNAMEs are used and the B2BUA cannot support them, it MUST reject negotiation of such extensions.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
