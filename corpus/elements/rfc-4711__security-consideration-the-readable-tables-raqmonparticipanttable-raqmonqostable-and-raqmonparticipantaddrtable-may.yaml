document: rfc-4711
kind: security-consideration
summary: The readable tables raqmonParticipantTable, raqmonQosTable, and raqmonParticipantAddrTable may expose participant addresses and application traffic patterns; unauthorized access to these objects could reveal sensitive information. GET and NOTIFY access should be controlled, and values should be encrypted when sent over SNMP.
section: "6"
topics:
    - snmp
    - security
    - privacy
