document: rfc-6602
kind: wire-format
summary: The Mobile Node Group Identifier option (Type=50) carries a 32-bit group identifier. It includes a 1-octet Type, 1-octet Length (fixed value 6), 1-octet Sub-type, 1-octet Reserved, and a 32-bit Mobile Node Group Identifier field. Sub-type value 1 is reserved for Bulk Binding Update Group.
section: "4.3"
topics:
