document: rfc-8950
kind: interoperability-note
summary: RFC 8950 extends VPN-IPv4 multicast (AFI/SAFI <1/129>) to support IPv6 underlay using the same encoding and procedures as VPN-IPv4 unicast (<1/128>); this capability was not present in RFC 5549.
