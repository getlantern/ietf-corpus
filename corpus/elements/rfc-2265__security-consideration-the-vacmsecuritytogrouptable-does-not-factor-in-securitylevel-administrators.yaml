document: rfc-2265
kind: security-consideration
summary: The vacmSecurityToGroupTable does not factor in securityLevel. Administrators must use the securityLevel index in vacmAccessTable to prevent noAuthNoPriv principals from gaining the same access as authPriv principals.
section: "7.2"
