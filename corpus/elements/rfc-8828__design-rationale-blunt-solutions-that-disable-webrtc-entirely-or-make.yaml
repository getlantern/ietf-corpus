document: rfc-8828
kind: design-rationale
summary: Blunt solutions that disable WebRTC entirely or make it significantly harder to use are considered undesirable because WebRTC's peer-to-peer connections facilitate decentralized systems with their own privacy benefits. The document takes a nuanced, mode-based approach instead.
