document: rfc-7581
kind: design-rationale
summary: The encodings in this document are intentionally protocol-agnostic so that they can be reused across GMPLS routing protocols (OSPF-TE, IS-IS-TE), the PCE Communication Protocol (PCEP), and future mechanisms. Protocol-specific documents are expected to reference this RFC and define how these fields are carried as sub-TLVs.
