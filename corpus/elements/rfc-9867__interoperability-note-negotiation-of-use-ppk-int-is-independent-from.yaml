document: rfc-9867
kind: interoperability-note
summary: Negotiation of USE_PPK_INT is independent from negotiation of USE_PPK (RFC 8784). An initiator supporting both MAY include both notifications; a responder supporting both MUST choose exactly one to return. The two mechanisms cannot be used simultaneously for the same SA.
section: "3.1"
topics:
    - ipsec
    - vpn
