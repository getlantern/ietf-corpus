document: rfc-6505
kind: normative-requirement
summary: For the <dual-view> layout, the MS MUST NOT alter the aspect ratio of each stream to fit the region (blanking permitted). For <dual-view-crop>, the MS MUST alter the aspect ratio to fit the region so that no blanking is required.
section: 4.2.1.4.2.1
rfc2119_level: MUST NOT
