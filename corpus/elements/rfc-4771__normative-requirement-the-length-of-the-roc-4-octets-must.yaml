document: rfc-4771
kind: normative-requirement
summary: The length of the ROC (4 octets) MUST be included in the 'Authentication tag length' parameter when negotiating RCC, making the minimum authentication tag length 32 bits. When using RCCm3, the tag-length MUST be set to exactly four octets.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
