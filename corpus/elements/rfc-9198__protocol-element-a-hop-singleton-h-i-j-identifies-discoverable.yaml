document: rfc-9198
kind: protocol-element
summary: A Hop singleton h(i,j) identifies Discoverable or Cooperating Nodes i Hops from Src on Route j during the measurement interval. It MUST contain a Node identity hid(i,j) and MAY contain arrival interface ID a(i,j), departure interface ID d(i,j), arrival timestamp t(i,j), and Round-Trip Delay measurements.
section: "3.4"
topics:
