document: rfc-6276
kind: security-consideration
summary: While the mobile router is away from home, the IPsec security mechanism mandated by Mobile IPv6 (RFC3776) MUST be used to secure the DHCPv6 signaling. Example SPD and SAD entries using ESP in transport mode are provided for both mobile router and home agent.
section: "4"
rfc2119_level: MUST
