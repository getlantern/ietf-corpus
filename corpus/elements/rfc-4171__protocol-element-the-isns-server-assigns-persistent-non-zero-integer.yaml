document: rfc-4171
kind: protocol-element
summary: The iSNS server assigns persistent non-zero integer index attributes (Entity Index, Portal Index, iSCSI Node Index, etc.) as secondary object identifiers; these SHALL be persistent for as long as the server is active, and index values for recently deregistered objects SHOULD NOT be reused short-term.
section: "2.10"
topics:
    - snmp
