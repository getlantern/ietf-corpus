document: rfc-7247
kind: design-rationale
summary: The specification defines protocol translation as occurring within dedicated gateways rather than within multiprotocol clients or servers. This choice is made primarily for explanatory clarity, allowing translation principles to be understood and applied with modifications by client and server implementors.
