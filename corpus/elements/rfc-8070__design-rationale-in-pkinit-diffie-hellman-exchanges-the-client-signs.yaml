document: rfc-8070
kind: design-rationale
summary: In PKINIT Diffie-Hellman exchanges, the client signs the AuthPack before any traffic is sent to the KDC, making it possible to pre-generate requests with future timestamps and send them later without possessing the private key at that time. This means DH-based PKINIT proves only prior use of the private key, not current possession.
section: "1"
topics:
