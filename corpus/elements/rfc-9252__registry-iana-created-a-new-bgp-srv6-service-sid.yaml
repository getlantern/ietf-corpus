document: rfc-9252
kind: registry
summary: IANA created a new 'BGP SRv6 Service SID Flags' subregistry under BGP Parameters, with IETF Review as the registration procedure. All 8-bit positions are currently unassigned; the flags octet MUST be set to 0 by senders and unknown flags MUST be ignored by receivers.
