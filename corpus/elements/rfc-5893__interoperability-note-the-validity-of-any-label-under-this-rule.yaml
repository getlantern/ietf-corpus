document: rfc-5893
kind: interoperability-note
summary: The validity of any label under this rule depends on Unicode Bidi property values, which are not declared immutable by the Unicode Consortium. Future Unicode versions may change Bidi properties of characters, potentially changing the validity of previously valid or invalid labels.
