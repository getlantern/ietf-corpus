document: rfc-6923
kind: design-rationale
summary: The A1/Z9 notational convention designates sort ordering (A1 = lower, Z9 = higher) but identifier uniqueness depends solely on the uniqueness and scoping of component fields, not on ordering. This ensures the notation does not constrain protocol field sequencing.
section: "1.3"
topics:
