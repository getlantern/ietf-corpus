document: rfc-7200
kind: security-consideration
summary: When identity fields in load-filtering conditions represent the source of a request (e.g., <from> or <p-asserted-identity>), they SHOULD be authenticated and authorized; when they represent the destination, authentication and authorization is optional.
section: "7"
rfc2119_level: SHOULD
