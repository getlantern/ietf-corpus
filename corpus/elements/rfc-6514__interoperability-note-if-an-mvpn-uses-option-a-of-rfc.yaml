document: rfc-6514
kind: interoperability-note
summary: If an MVPN uses option (a) of RFC 4364 Section 10 (VRF-to-VRF connections at AS boundaries), the notion of inter-AS tunnels does not apply and only the intra-AS MVPN auto-discovery/binding mechanisms are needed.
