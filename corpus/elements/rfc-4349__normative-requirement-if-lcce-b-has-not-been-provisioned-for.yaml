document: rfc-4349
kind: normative-requirement
summary: If LCCE B has not been provisioned for the interface identified in the ICRQ, it returns a CDN immediately. LCCE A SHOULD then exhibit a periodic retry mechanism; if so, the period and maximum number of retries MUST be configurable.
section: "3.1"
rfc2119_level: SHOULD
topics:
