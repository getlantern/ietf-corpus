document: rfc-9661
kind: interoperability-note
summary: The data model is designed so that a server can provide consistent access to the same Sieve scripts via both ManageSieve (RFC 5804) and JMAP. SieveScript/get, /set, and /validate provide functionality equivalent to LISTSCRIPTS/PUTSCRIPT/DELETESCRIPT/RENAMESCRIPT/SETACTIVE/CHECKSCRIPT respectively.
