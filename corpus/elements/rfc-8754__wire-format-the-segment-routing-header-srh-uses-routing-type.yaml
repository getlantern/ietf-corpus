summary: 'The Segment Routing Header (SRH) uses Routing Type 4 and contains: Next Header (8-bit), Hdr Ext Len (8-bit), Routing Type (8-bit, value 4), Segments Left (8-bit), Last Entry (8-bit, zero-based index of last segment), Flags (8-bit), Tag (16-bit), and Segment List[0..n] (each a 128-bit IPv6 address), followed by optional TLVs.'
