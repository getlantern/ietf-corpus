document: rfc-3280
kind: interoperability-note
summary: Legacy implementations often encode ISO 8859-1 (Latin1String) character data but tag it as TeletexString. Since TeletexString encodes some characters differently from ISO 8859-1, implementations SHOULD be prepared to handle both encodings under a TeletexString tag.
section: 4.1.2.4
topics:
    - pkix
