document: rfc-5170
kind: normative-requirement
summary: 'The Park-Miller ''minimal standard'' PRNG (A=16807, M=2^31-1) MUST be used for parity check matrix construction and symbol group randomization. A validation criterion: with seed=1, the 10,000th value returned MUST equal 1043618065.'
section: "5.7"
rfc2119_level: MUST
