summary: 'The ''a=dcmap:'' attribute value (dcmap-value) consists of a 1-to-5 digit stream identifier followed by optional semicolon-separated parameters: ordered (true/false), subprotocol (quoted-string), label (quoted-string), max-retr (integer < 2^32), max-time (integer < 2^32), and priority (integer < 2^16).'
