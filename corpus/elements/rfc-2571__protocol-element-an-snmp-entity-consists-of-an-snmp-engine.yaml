document: rfc-2571
kind: protocol-element
summary: An SNMP entity consists of an SNMP engine (Dispatcher, Message Processing Subsystem, Security Subsystem, and Access Control Subsystem) plus one or more applications. There is a strict one-to-one association between an SNMP engine and its SNMP entity.
section: "3.1"
topics:
    - snmp
    - security
