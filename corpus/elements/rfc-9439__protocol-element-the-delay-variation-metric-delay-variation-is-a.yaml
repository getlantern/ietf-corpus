document: rfc-9439
kind: protocol-element
summary: The delay variation metric 'delay-variation' is a non-negative JSONNumber in microseconds representing jitter with respect to the minimum delay observed, defined as the temporal and spatial aggregation of per-link delay variation along the path (RFC 7471, RFC 8570, RFC 8571). The selection function F chooses the packet with the smallest one-way delay as the reference.
section: "4.3"
topics:
    - measurement
