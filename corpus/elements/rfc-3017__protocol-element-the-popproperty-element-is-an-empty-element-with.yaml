summary: 'The popProperty element is an empty element with a required ''type'' attribute indicating a POP capability: MPPP (Multilink PPP, RFC 1990), MOBIP (Mobile IP, RFC 2002), MCRX (Multicast Reception), or MCTX (Multicast Transmission). Multiple instances may appear.'
