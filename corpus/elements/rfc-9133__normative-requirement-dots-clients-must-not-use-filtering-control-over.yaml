document: rfc-9133
kind: normative-requirement
summary: DOTS clients MUST NOT use filtering control over the DOTS signal channel during 'idle' time (i.e., when no mitigation is active). DOTS servers MUST discard such requests with a 4.00 (Bad Request) response.
section: 3.2.1
rfc2119_level: MUST NOT
topics:
