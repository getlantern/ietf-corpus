document: rfc-6935
kind: protocol-element
summary: An IPv6 node associates a mode—default or zero-checksum—with each used UDP port (for sending and/or receiving). Zero-checksum mode is an opt-in per-port configuration permitted only for specific tunnel encapsulation protocols.
