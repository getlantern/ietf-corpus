document: rfc-8311
kind: normative-requirement
summary: RFC 6679 Section 7.3.3 is updated to allow the RTP congestion control response to a CE-marked packet to differ from the response to a dropped packet, provided changes are documented in an Experimental RFC. The default reaction (treat CE marks like loss) and the no-difference rule both become conditional on absence of a governing Experimental RFC.
section: "5"
rfc2119_level: MUST
topics:
    - ecn
    - rtp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
