document: rfc-9682
kind: protocol-element
summary: 'The updated SESC rule defines valid backslash escape sequences in CDDL string literals: \" \/ \\ \b \f \n \r \t, followed by \uXXXX in three forms: the new \u{hex} brace form (direct Unicode scalar), the four-hex-digit form, and the JSON surrogate-pair form \uHHHH\uLLLL for code points beyond U+FFFF.'
section: 2.1.1
topics:
