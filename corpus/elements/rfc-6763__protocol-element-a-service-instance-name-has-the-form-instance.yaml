document: rfc-6763
kind: protocol-element
summary: A Service Instance Name has the form '<Instance>.<Service>.<Domain>', where <Instance> is a user-friendly Net-Unicode label, <Service> is a pair of DNS labels (e.g., '_ipp._tcp'), and <Domain> is the DNS subdomain in which the service is registered. Clients discover instances by querying for PTR records at '<Service>.<Domain>'.
section: "4.1"
topics:
    - dns
    - zeroconf
