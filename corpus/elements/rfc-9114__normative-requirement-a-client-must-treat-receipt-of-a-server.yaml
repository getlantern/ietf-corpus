document: rfc-9114
kind: normative-requirement
summary: A client MUST treat receipt of a server-initiated bidirectional stream as a connection error of type H3_STREAM_CREATION_ERROR unless an extension has been negotiated. Only servers can push; a server receiving a client-initiated push stream MUST treat it as a connection error of type H3_STREAM_CREATION_ERROR.
section: "6.1"
rfc2119_level: MUST
topics:
    - http
    - quic
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
