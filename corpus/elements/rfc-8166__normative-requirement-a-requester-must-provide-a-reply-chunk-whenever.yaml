document: rfc-8166
kind: normative-requirement
summary: A Requester MUST provide a Reply chunk whenever the maximum possible size of the RPC Reply's Transport and Payload streams exceeds the reply inline threshold. The Responder MUST use the Reply chunk if the streams exceed that threshold.
section: 4.3.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
