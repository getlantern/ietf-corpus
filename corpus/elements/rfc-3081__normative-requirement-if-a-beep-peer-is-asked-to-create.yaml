document: rfc-3081
kind: normative-requirement
summary: If a BEEP peer is asked to create a channel and cannot allocate at least 4096 octets for that channel, it must decline creation of the channel as specified in Section 2.3.1.2 of RFC 3080.
section: 3.1.1
rfc2119_level: MUST
