document: rfc-8214
kind: wire-format
summary: 'The EVPN Layer 2 Attributes Extended Community is 8 octets: Type/Sub-type (0x06/0x04, 2 octets), Control Flags (2 octets), L2 MTU (2 octets), Reserved (2 octets). Control Flags define bits P (primary PE), B (backup PE), and C (control word required); remaining bits MUST be zero.'
section: "3.1"
