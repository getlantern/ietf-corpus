document: rfc-9219
kind: protocol-element
summary: The "smimeStatusAtDelivery" response property has the same syntax as "smimeStatus" but is calculated relative to the "receivedAt" date/time. Unlike "smimeStatus", its value does not change unless trust anchors are added (removal of trust anchors does not affect it).
