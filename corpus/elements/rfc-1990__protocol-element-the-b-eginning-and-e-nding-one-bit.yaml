document: rfc-1990
kind: protocol-element
summary: 'The B(eginning) and E(nding) one-bit fields in the MP header mark fragment boundaries: B=1 on the first fragment of a PPP packet, E=1 on the last. A single-fragment packet has both bits set to 1. These bits drive the reassembly state machine at the receiver.'
section: "3"
