document: rfc-8779
kind: protocol-element
summary: The PROTECTION-ATTRIBUTE TLV (Type 44) is optionally carried in the LSPA object and contains LSP Flags, Link Flags, and Segment Flags as defined in RFC 4872 and RFC 4873. It conveys end-to-end protection type and link protection type for GMPLS path computation policy input.
section: "2.8"
topics:
    - routing
    - mpls
