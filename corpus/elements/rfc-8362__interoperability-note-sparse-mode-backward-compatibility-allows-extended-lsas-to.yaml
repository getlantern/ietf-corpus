document: rfc-8362
kind: interoperability-note
summary: 'Sparse-mode backward compatibility allows Extended LSAs to be introduced into an existing routing domain without a full migration: Legacy LSAs are still used for SPF computation, and Extended LSAs are originated only when needed for new functionality, containing only the top-level TLVs required for that function.'
section: "6.2"
topics:
