document: rfc-4001
kind: protocol-element
summary: InetAutonomousSystemNumber is an Unsigned32 without range restriction to support future expansion of AS number space from 16 to 32 bits. AS numbers are currently limited to 0..65535 but the type is defined to accommodate the larger space.
