document: rfc-6031
kind: wire-format
summary: 'Triple-DES key encoding: the sKey OCTET STRING packs Key1, Key2, Key3 (each 64 bits including 8 parity bits) contiguously, MSB first; for two-key Triple-DES Key1 equals Key3 and sKey is 16 bytes, for three-key it is 24 bytes. Conformance SHALL be verified against SP 800-67 Appendix B test vectors.'
section: "4.2"
topics:
