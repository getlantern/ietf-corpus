document: rfc-3111
kind: design-rationale
summary: 'DNS names SHOULD be preferred over literal IPv6 addresses in service: URLs to avoid scope ambiguity. Literal addresses are necessary only when SLP is used without DNS, such as in ad-hoc networks with no pre-configured infrastructure.'
