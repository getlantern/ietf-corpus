document: rfc-5420
kind: normative-requirement
summary: An LSR that does not recognize a bit set in the Attribute Flags TLV carried in an LSP_REQUIRED_ATTRIBUTES object MUST reject the Path message with a PathErr using Error Code 30 ('Unknown Attributes Bit') and Error Value set to the bit number of the unknown bit.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
