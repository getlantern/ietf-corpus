document: rfc-8941
kind: normative-requirement
summary: Field specifications are discouraged from treating unrecognized Parameters as errors, in order to preserve forward compatibility. A specification may stipulate that 'grease' parameters be sent to prevent recipients from writing parsers that ignore Parameters entirely.
section: "2"
rfc2119_level: SHOULD NOT
topics:
