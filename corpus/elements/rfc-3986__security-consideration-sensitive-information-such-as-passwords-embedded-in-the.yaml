document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords embedded in the userinfo component is a security risk. URIs containing authentication credentials in cleartext should not be stored or transmitted without additional protection; back-end transcoding between character encodings can inadvertently expose or corrupt data.
section: "7.5"
topics:
    - security
    - privacy
