document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords embedded in the userinfo subcomponent can be inadvertently exposed via server logs, referrer headers, or browser history. Passing authentication information in clear text in a URI has proven to be a security risk in nearly every case where it has been used.
section: "7.5"
topics:
    - http
    - security
    - privacy
