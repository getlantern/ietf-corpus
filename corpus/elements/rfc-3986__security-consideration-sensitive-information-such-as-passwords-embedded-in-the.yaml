document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords embedded in the userinfo subcomponent of a URI may be exposed through server logs, referrer headers, browser history, and other mechanisms. Applications should avoid placing sensitive data in URIs and should not store userinfo credentials in unencrypted form.
section: "7.5"
topics:
    - security
    - privacy
