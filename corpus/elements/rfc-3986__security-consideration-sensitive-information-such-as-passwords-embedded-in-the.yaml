document: rfc-3986
kind: security-consideration
summary: Sensitive information such as passwords embedded in the userinfo component should not be passed in URIs; the passing of authentication information in clear text has proven to be a security risk in almost every case where it has been used.
section: "7.5"
topics:
    - security
    - privacy
