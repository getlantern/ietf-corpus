summary: 'With a 31-bit subnet mask the <Host-number> field is 1 bit wide, yielding exactly two possible addresses: {<Network-number>, 0} and {<Network-number>, -1}. Both addresses MUST be interpreted as host addresses rather than network or broadcast addresses.'
