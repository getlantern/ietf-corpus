kind: design-rationale
summary: The agent may choose to delay updates to statistics by 10 seconds to avoid retroactive adjustments required by the ANSI T1.231 unavailability definition. Appendix B sketches a 10-element delay-line approach that passes one-second statistics through a delay before updating counters.
