document: rfc-6032
kind: security-consideration
summary: The encrypted key package content type may not provide proof of origin if the content encryption algorithm does not support authenticated key exchange. To provide proof of origin, SignedData encapsulation of the SymmetricKeyPackage or AsymmetricKeyPackage is required for the EnvelopedData and EncryptedData choices.
section: "4"
topics:
    - crypto
    - security
