document: rfc-1364
kind: protocol-element
summary: When importing a BGP route into OSPF, the ASBR must fill the OSPF Forwarding Address with the BGP NEXT_HOP attribute. When exporting an OSPF route to BGP, the ASBR must fill the BGP NEXT_HOP with the address of the actual next-hop router to avoid an extra hop at the AS boundary.
section: "5"
topics:
    - bgp
    - routing
