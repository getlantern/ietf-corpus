document: rfc-9584
kind: design-rationale
summary: EVC's toolset syntax elements (toolset_idc_h and toolset_idc_l), bitmasks in the SPS signaling which coding tools are active, exist to allow walled-garden deployments to restrict tool use for intellectual property risk mitigation without establishing a formal MPEG conformance point, avoiding the interoperability problems that such conformance points would create.
