document: rfc-7601
kind: protocol-element
summary: The Authentication-Results header field carries results of message authentication checks in a machine-readable format. Its value consists of an authserv-id, an optional version, and a series of 'method=result' statements with supporting 'ptype.property=value' data. It is defined as both a structured header field and a trace field per RFC 5322.
section: "2.1"
topics:
    - email
    - security
