document: rfc-9300
kind: normative-requirement
summary: The N-bit (nonce-present) and V-bit (Map-Version present) MUST NOT be set simultaneously in the same LISP header packet. If both are set, the decapsulating ETR MUST treat the field as containing a nonce.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
