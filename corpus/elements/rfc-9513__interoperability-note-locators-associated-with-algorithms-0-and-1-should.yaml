document: rfc-9513
kind: interoperability-note
summary: Locators associated with algorithms 0 and 1 SHOULD also be advertised using Extended LSA types so that routers not supporting SRv6 will still install forwarding entries for SRv6 traffic. When operating in Extended LSA sparse-mode, these locators SHOULD also be advertised using Legacy LSAs.
section: "5"
topics:
