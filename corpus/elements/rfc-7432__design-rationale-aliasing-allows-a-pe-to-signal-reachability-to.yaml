document: rfc-7432
kind: design-rationale
summary: Aliasing allows a PE to signal reachability to an EVI/ES even when it has learned no MAC addresses from that segment, using an Ethernet A-D per EVI route. This solves the problem where LAG hashing causes only one PE to learn a CE's MACs, enabling all attached PEs to receive load-balanced traffic from remote PEs.
section: "8.4"
topics:
