document: rfc-5484
kind: protocol-element
summary: The design models time-code delivery as segments in which the time-code counts up continuously. Given the RTP timestamp and SMPTE time-code at a segment start plus the frame counting parameters, the time-code at any subsequent RTP timestamp can be calculated without per-packet signaling.
