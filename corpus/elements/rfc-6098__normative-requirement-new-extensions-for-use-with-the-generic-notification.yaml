document: rfc-6098
kind: normative-requirement
summary: New extensions for use with the Generic Notification Message must be registered with IANA under the 'RFC Required' policy (RFC 5226). A new column is added to the Mobile IPv4 extensions registry to indicate whether each extension is permitted for use with the GNM.
section: "5.2"
rfc2119_level: REQUIRED
topics:
