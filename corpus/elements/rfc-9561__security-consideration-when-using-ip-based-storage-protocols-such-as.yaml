document: rfc-9561
kind: security-consideration
summary: When using IP-based storage protocols such as NVMe over TCP, data confidentiality and integrity SHOULD be provided using TLS (RFC 8446). For NVMe over TCP specifically, TLS SHOULD be used as described in the NVMe TCP Transport Specification to protect traffic between pNFS clients and NVMe namespaces.
section: "3"
topics:
    - security
    - tls
