document: rfc-6265
kind: protocol-element
summary: The Domain attribute specifies the hosts to which the cookie will be sent. A leading dot is ignored. If absent, the cookie is returned only to the origin server (host-only). User agents reject cookies whose Domain attribute does not domain-match the request host, and many reject public-suffix domain values.
section: 4.1.2.3
topics:
    - http
