document: rfc-8777
kind: protocol-element
summary: 'The type field in AMTRELAY RData specifies the relay field format: type=0 means no relay (0 bytes), type=1 means 4-octet IPv4 address, type=2 means 16-octet IPv6 address, and type=3 means wire-encoded domain name of self-describing length.'
