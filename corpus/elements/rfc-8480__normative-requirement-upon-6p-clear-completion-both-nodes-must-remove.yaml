document: rfc-8480
kind: normative-requirement
summary: Upon 6P CLEAR completion, both nodes MUST remove all cells scheduled between them and MUST reset SeqNum to 0. During a CLEAR transaction, the SeqNum MUST NOT be checked, and even a SeqNum that would normally signal an inconsistency MUST NOT abort the CLEAR.
section: 3.3.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
