document: rfc-4306
kind: protocol-element
summary: 'IKEv2 defines four exchange types: IKE_SA_INIT (negotiates IKE_SA cryptographic parameters, exchanges nonces and DH values), IKE_AUTH (authenticates peers, exchanges identities and certificates, establishes first CHILD_SA), CREATE_CHILD_SA (creates or rekeys CHILD_SAs or the IKE_SA itself), and INFORMATIONAL (conveys control messages, deletions, and error notifications). All communications consist of request/response pairs.'
section: "1"
