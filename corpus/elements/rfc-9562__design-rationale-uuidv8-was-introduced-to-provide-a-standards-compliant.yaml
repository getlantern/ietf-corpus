document: rfc-9562
kind: design-rationale
summary: UUIDv8 was introduced to provide a standards-compliant escape hatch for experimental, vendor-specific, or application-specific designs — such as SHA-256 name-based UUIDs or custom timestamp epochs — without requiring new IANA-registered UUID versions. Only the variant and version bits are mandated.
section: "5.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
