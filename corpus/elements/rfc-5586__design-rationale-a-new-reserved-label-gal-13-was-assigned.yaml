document: rfc-5586
kind: design-rationale
summary: A new reserved label (GAL=13) was assigned rather than reusing the existing OAM Alert Label (14) from RFC 3429 because G-ACh messages reside behind an ACH (not immediately after the label), the scope of maintenance functions is broader, and existing implementations use label 14 in ways that cannot be changed.
section: "4.3"
topics:
    - mpls
