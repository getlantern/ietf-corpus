summary: 'The ''floorid'' SDP media-level attribute associates a floor identifier with one or more media streams. ABNF: floor-id-attribute = ''a=floorid:'' token ['' mstrm:'' token *(SP token)], where the floor ID token is the integer Floor ID used in BFCP and media stream tokens are SDP label attribute pointers.'
