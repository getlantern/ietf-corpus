document: rfc-1647
kind: normative-requirement
summary: Implementations wishing to support keep-alives SHOULD accept both Telnet IAC NOP and Telnet DO TIMING-MARK, and SHOULD always respond to TIMING-MARKs. Either or both sides may be configured to actively send NOPs or TIMING-MARKs; the interval and mechanism should be administrator-configurable.
section: "13.3"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
