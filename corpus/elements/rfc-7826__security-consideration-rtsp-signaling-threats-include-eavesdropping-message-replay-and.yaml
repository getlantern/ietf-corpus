document: rfc-7826
kind: security-consideration
summary: RTSP signaling threats include eavesdropping, message replay, and man-in-the-middle attacks; TLS over the 'rtsps' scheme is the primary mitigation. For proxy chains, the Accept-Credentials mechanism and user-approved TLS procedure (Section 19.3) allow clients to authorize specific proxy credentials.
