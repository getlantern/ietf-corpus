document: rfc-7252
kind: security-consideration
summary: 'CoAP defines four security modes: NoSec (no security), PreSharedKey (DTLS with pre-shared keys), RawPublicKey (DTLS with asymmetric keys without certificates), and Certificate (DTLS with X.509 certificates). The ''coaps'' URI scheme signals mandatory use of DTLS; ''coap'' URIs without explicit proxying use NoSec mode.'
