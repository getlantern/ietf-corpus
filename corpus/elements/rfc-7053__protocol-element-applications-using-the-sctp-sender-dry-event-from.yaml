document: rfc-7053
kind: protocol-element
summary: Applications using the SCTP_SENDER_DRY_EVENT (from RFC 6458 socket API) can request that the I bit be set on the last DATA chunk of the final user message before waiting for the event, avoiding the delay otherwise introduced by SACK deferral.
section: "4.1"
topics:
    - sctp
