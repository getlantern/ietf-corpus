document: rfc-8896
kind: normative-requirement
summary: If 'calendared' is 'true' for a cost type with no defined Calendar attributes, the Server MUST ignore it and return a single cost value per RFC 7285. If 'calendared' is 'false' for a given cost type, the Server MUST return a single cost value for that type.
section: 5.1.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
