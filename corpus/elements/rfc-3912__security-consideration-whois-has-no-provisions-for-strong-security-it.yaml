document: rfc-3912
kind: security-consideration
summary: 'WHOIS has no provisions for strong security: it lacks mechanisms for access control, integrity, and confidentiality. Accordingly, WHOIS-based services should only be used for non-sensitive information intended to be accessible to everyone.'
section: "5"
