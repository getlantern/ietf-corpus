document: rfc-7741
kind: wire-format
summary: The VP8 payload descriptor is the first octets after the RTP header. The mandatory first octet contains X (extended control bits present), R (reserved), N (non-reference frame), S (start of VP8 partition), R (reserved), and PID (3-bit partition index). Optional extension octets follow when X=1.
