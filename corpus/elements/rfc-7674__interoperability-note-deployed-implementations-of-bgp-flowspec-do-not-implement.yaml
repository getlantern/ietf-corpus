document: rfc-7674
kind: interoperability-note
summary: Deployed implementations of BGP Flowspec do not implement wildcard Route Target matching; instead, they use format-specific Redirect Extended Communities. This document formalizes that deployed practice by defining three distinct Redirect communities differentiated by Route Target encoding format.
section: "1"
topics:
    - bgp
    - routing
