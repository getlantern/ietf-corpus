document: rfc-2797
kind: design-rationale
summary: No special services are provided for renewal (same key, new certificate) or re-keying (new keys, new certificate). Instead, renewal and re-key messages are structurally identical to initial enrollment messages, with identity proof supplied by existing certificates from the CA, simplifying the protocol surface.
section: "2"
topics:
    - pkix
