document: rfc-6675
kind: protocol-element
summary: IsLost(SeqNum) returns true when either DupThresh discontiguous SACKed sequences have arrived above SeqNum, or more than (DupThresh - 1) * SMSS bytes with sequence numbers greater than SeqNum have been SACKed. This improvement over RFC 3517 handles segments smaller than SMSS.
section: "4"
