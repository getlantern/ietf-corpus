document: rfc-9960
kind: interoperability-note
summary: In SR-MPLS deployments, if multipoint services mapped to an SR-MPLS PTI can be uniquely identified with their service label, a controller MAY opt to not instantiate Replication segments at Leaf nodes, allowing upstream Replication nodes to remove the Tree-SID before forwarding.
section: "4.1"
topics:
    - routing
    - mpls
    - multicast
