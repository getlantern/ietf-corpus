summary: 'The FCIP Protocol Specific field (words 1–2 of the FC Frame Encapsulation header) consists of: word 1 as an exact replica of encapsulation word 0, and word 2 containing pFlags (bits 31–24), Reserved=0x00 (bits 23–16), -pFlags ones complement (bits 15–8), and -Reserved=0xFF (bits 7–0).'
