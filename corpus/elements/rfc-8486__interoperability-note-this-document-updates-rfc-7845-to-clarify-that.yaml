document: rfc-8486
kind: interoperability-note
summary: This document updates RFC 7845 to clarify that the channel mapping table format may depend on the channel mapping family, rather than being fixed for all families. Families 1 and 255 continue to use the format specified in RFC 7845 Figure 3.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
