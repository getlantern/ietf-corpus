document: rfc-5752
kind: state-machine
summary: 'Signature evaluation proceeds in three ordered stages: (1) evaluate each SignerInfo object independently yielding math success/failure/indeterminate, certificate path success/failure/indeterminate/warning, and policy compliance; (2) combine SignerInfo results per signer by taking the best result; (3) combine per-signer results across signers by taking the worst result.'
