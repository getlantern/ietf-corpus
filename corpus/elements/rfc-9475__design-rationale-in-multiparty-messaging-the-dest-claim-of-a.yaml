document: rfc-9475
kind: design-rationale
summary: In multiparty messaging, the "dest" claim of a single PASSporT can accommodate multiple targets of a MESSAGE without generating a PASSporT per target. If an intermediary forks to unlisted targets, diversion PASSporTs (RFC 8946) must be used.
section: 3.2.1
topics:
    - sip
    - security
