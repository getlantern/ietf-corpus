document: rfc-9779
kind: normative-requirement
summary: When the querier sets an IP address and UDP port in the URO TLV for one-way measurement, the response message MUST be sent to that IP address and port. Additionally, the Control Code in the query message MUST be set to Out-of-band Response Requested.
section: 4.2.1
rfc2119_level: MUST
topics:
    - mpls
    - measurement
