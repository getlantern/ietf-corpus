document: rfc-1738
kind: design-rationale
summary: The WAIS URL includes an explicit `<wtype>` field because many WAIS implementations require the client to know an object's type before retrieval, and type is returned in the search response; embedding it in the URL avoids a round-trip type lookup.
section: "3.9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
