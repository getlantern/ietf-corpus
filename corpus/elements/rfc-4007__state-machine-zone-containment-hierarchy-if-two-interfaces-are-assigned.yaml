document: rfc-4007
kind: state-machine
summary: 'Zone containment hierarchy: if two interfaces are assigned to different zones of scope S, they must also be assigned to different zones of all scopes smaller than S. Thus, manually assigning distinct indices for one scope may trigger automatic creation of distinct indices for all smaller scopes (e.g., assigning distinct multicast site-local indices automatically creates distinct admin-local indices).'
section: "6"
topics:
