document: rfc-9967
kind: protocol-element
summary: The urn:ietf:params:scim:event:misc:asyncresp event signals completion of an asynchronous SCIM request. Its payload contains 'method', 'version', 'status', and optionally 'bulkId'; on error it MUST include a 'response' attribute with non-200-series HTTP status and error sub-attributes.
