document: rfc-8852
kind: normative-requirement
summary: RtpStreamId and RepairedRtpStreamId values MUST be constrained to contain only alphanumeric characters; the only allowed byte values are decimal 48–57 (digits), 65–90 (uppercase letters), and 97–122 (lowercase letters).
section: "3"
rfc2119_level: MUST
