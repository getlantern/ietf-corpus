document: rfc-1342
kind: normative-requirement
summary: An encoded-word MUST NOT be more than 75 characters long including charset, encoding, encoded-text, and delimiters. Message header lines containing one or more encoded-words SHOULD be no more than 76 characters long.
section: Encodings
rfc2119_level: SHOULD
