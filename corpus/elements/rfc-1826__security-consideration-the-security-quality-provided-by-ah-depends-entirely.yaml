document: rfc-1826
kind: security-consideration
summary: The security quality provided by AH depends entirely on the strength of the cryptographic algorithm, strength of the key, correctness of the algorithm's implementation, security of the key management mechanism, and correctness of the IP and AH implementations in all participating systems. Weakness in any of these components renders the protection ineffective.
section: "6"
topics:
