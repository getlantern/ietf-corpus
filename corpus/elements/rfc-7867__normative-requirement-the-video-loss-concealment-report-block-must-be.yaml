document: rfc-7867
kind: normative-requirement
summary: The Video Loss Concealment Report Block MUST be sent in conjunction with the Measurement Information Block (RFC 6776). If the Measurement Information Block is not received in the same compound RTCP packet, this metric block MUST be discarded at the receiving side.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
