document: rfc-4425
kind: registry
summary: IANA registered the media type 'video/vc1' in the Media Types registry and in the RTP Payload Format MIME types registry. Required parameters are 'profile' (0=Simple, 1=Main, 3=Advanced) and 'level'. The SDP encoding name MUST be 'vc1' and the clock rate MUST be 90000.
