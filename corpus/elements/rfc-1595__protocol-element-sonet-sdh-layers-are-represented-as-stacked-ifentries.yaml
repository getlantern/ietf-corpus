document: rfc-1595
kind: protocol-element
summary: 'SONET/SDH layers are represented as stacked ifEntries: one ifEntry for the combined Medium/Section/Line layer (ifType=sonet(39)), L ifEntries for SONET/SDH Paths (ifType=sonetPath(50)), and K ifEntries for VTs/VCs (ifType=sonetVT(51)). The ifStackTable maintains the exact multiplexing relationships.'
