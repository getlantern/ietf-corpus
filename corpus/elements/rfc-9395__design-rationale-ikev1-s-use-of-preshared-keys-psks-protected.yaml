document: rfc-9395
kind: design-rationale
summary: IKEv1's use of Preshared Keys (PSKs) protected against quantum-computer-based attacks, but IKEv2 updated PSK usage to improve error reporting at the expense of post-quantum security. Systems requiring post-quantum security should migrate to IKEv2 Post-quantum Preshared Keys (PPKs) per RFC 8784.
section: "4.1"
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
