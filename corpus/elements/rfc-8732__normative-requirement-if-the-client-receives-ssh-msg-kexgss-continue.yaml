document: rfc-8732
kind: normative-requirement
summary: If the client receives SSH_MSG_KEXGSS_CONTINUE after GSS_Init_sec_context() has returned GSS_S_COMPLETE, or receives SSH_MSG_KEXGSS_COMPLETE without GSS_S_COMPLETE from GSS_Init_sec_context(), the key exchange MUST fail.
section: "5.1"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
