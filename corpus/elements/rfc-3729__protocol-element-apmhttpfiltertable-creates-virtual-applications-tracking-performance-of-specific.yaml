document: rfc-3729
kind: protocol-element
summary: apmHttpFilterTable creates virtual applications tracking performance of specific web pages or URL sets. Entries are indexed by apmHttpFilterIndex and specify a server address, URL path, and match type (exact, stripTrailingSlash, or prefix). When an entry is created, the agent automatically adds corresponding entries to apmAppDirTable.
