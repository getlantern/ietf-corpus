document: rfc-7794
kind: normative-requirement
summary: The X-Flag in TLVs 236 and 237 SHOULD always be sent as 0 and MUST be ignored on receipt, because an existing X flag is already defined in the fixed format of those TLVs per RFC 5308 and RFC 5120.
section: "2.1"
rfc2119_level: MUST
