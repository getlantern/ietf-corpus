document: rfc-5605
kind: interoperability-note
summary: The pwAtmCfgFarEndMaxCellConcatenation object reports the maximum cell concatenation count as advertised by the far end via LDP. If LDP is not in use, the object either returns 0 or can be set manually for calculating protocol overhead, enabling interoperability in both signaled and manually configured deployments.
