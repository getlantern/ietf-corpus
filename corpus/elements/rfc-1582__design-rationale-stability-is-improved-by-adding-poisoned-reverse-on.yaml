document: rfc-1582
kind: design-rationale
summary: 'Stability is improved by adding ''poisoned reverse'' on routes learned from a destination: routes learned from a peer are included in updates sent back to that peer but marked unreachable. Only best routes (not inferior alternatives) are poisoned.'
section: "2.7"
topics:
