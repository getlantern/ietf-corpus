document: rfc-7022
kind: normative-requirement
summary: To produce a long-term persistent RTCP CNAME, an RTP endpoint MUST generate and store a UUID (RFC 4122) version 1, 2, or 4, with the 'urn:uuid:' prefix stripped, yielding a 36-octet printable string as the 'host' part.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
