document: rfc-6134
kind: protocol-element
summary: The "addrbook" URN parameter defines URIs of the form "urn:ietf:params:sieve:addrbook:<name>[?extensions]", where "default" is a mandatory case-insensitive sub-parameter representing the user's default address book. The ABNF specifies addrbook-urn = "addrbook:" addrbook [ "?" extensions ].
section: "2.6"
topics:
