document: rfc-8384
kind: protocol-element
summary: The M bit in Smart-MAC APPsub-TLV indicates multihoming. When set, remote RBridges and Smart Endnodes retain multiple endnode entries for the same MAC address (one per attached RBridge nickname) to avoid MAC flip-flopping during active-active load balancing.
section: "4.3"
topics:
    - routing
