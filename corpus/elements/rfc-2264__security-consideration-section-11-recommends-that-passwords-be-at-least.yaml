document: rfc-2264
kind: security-consideration
summary: Section 11 recommends that passwords be at least 8 characters, that different passwords be used for authentication and privacy protocols, and that authKey and privKey (as localized keys) be considered sensitive. It also warns that DES key length (56 bits) may be insufficient against brute-force attacks.
section: "11.1"
