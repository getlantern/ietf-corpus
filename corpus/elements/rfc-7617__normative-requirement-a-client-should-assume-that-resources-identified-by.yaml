document: rfc-7617
kind: normative-requirement
summary: A client SHOULD assume that resources identified by URIs with a prefix-match of the authentication scope (the URI up to and including the last slash of the path) are within the same protection space, and MAY preemptively send credentials without a new challenge.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - http
