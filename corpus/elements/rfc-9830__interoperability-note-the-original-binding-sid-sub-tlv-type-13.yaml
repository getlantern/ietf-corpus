document: rfc-9830
kind: interoperability-note
summary: The original Binding SID sub-TLV (Type 13) is retained for signaling SRv6 BSIDs to preserve backward compatibility with early implementations; however, the SRv6 Binding SID sub-TLV (Type 20) is RECOMMENDED for new SRv6 BSID signaling because it can specify the SRv6 Endpoint Behavior.
section: 2.4.2
topics:
