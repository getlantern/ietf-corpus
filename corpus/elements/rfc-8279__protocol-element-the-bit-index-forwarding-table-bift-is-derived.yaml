document: rfc-8279
kind: protocol-element
summary: The Bit Index Forwarding Table (BIFT) is derived from the BIRT by combining rows with the same SI and BFR-NBR via bitwise OR of their BitStrings to produce a Forwarding Bit Mask (F-BM). Each BIFT entry maps a BFR-id to an F-BM and a BFR-NBR. The BIFT is programmed into the data plane and is sub-domain-specific.
section: "6.4"
topics:
    - routing
