document: rfc-9342
kind: protocol-element
summary: 'The two-step cluster partition algorithm: (1) group links sharing the same starting node; (2) join groups that share at least one common ending node. Each resulting set of links with its endpoint nodes constitutes a cluster. The algorithm is applied per direction since a node cannot be both source and destination.'
section: "5.1"
