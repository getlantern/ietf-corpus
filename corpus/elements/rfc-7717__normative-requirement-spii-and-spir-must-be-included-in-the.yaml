document: rfc-7717
kind: normative-requirement
summary: SPIi and SPIr MUST be included in the KeyID field of the Set-Up-Response message to indicate the IKEv2 SA from which the O/TWAMP shared secret key was derived; the first 8 octets MUST carry SPIi and the second 8 octets MUST carry SPIr, with remaining bits set to zero.
section: "5.3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
