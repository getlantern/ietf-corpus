document: rfc-2662
kind: design-rationale
summary: Separate parallel tables are defined for ATU-C and ATU-R rather than combined tables, because 'the tables are more easily read when there are two identical sets of data.' Since the SNMP agent co-resides with only one end of the line, far-end status objects may be incomplete when line errors prevent accurate reporting.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
