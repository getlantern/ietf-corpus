document: rfc-6038
kind: normative-requirement
summary: When the Server and Control-Client have agreed to use Reflect Octets mode or Symmetrical Size mode during control connection setup, the Control-Client, Server, Session-Sender, and Session-Reflector MUST all conform to the requirements of that mode.
