document: rfc-1542
kind: wire-format
summary: The 'flags' field is a 2-octet field located between 'secs' and 'ciaddr'. The most significant bit is the BROADCAST (B) flag; the remaining 15 bits are reserved (MBZ). Previously this field was designated 'unused' in RFC 951.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
