document: rfc-9204
kind: design-rationale
summary: Post-Base indexing was introduced to allow a single-pass encoder to include references to dynamic table entries added during encoding of the current field section, without requiring a second pass. Without post-Base indexing, an encoder would need to pre-scan a field section before encoding it.
section: 3.2.6
topics:
    - http
