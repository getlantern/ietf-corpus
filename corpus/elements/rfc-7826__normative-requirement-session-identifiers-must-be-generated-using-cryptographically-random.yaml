document: rfc-7826
kind: normative-requirement
summary: Session identifiers MUST be generated using cryptographically random methods (see RFC 4086). It is RECOMMENDED that a session identifier contain 128 bits of entropy (approximately 22 characters from a high-quality generator). Session identifiers are strings of length between 8 and 128 characters.
section: "4.3"
rfc2119_level: MUST
topics:
    - realtime
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
