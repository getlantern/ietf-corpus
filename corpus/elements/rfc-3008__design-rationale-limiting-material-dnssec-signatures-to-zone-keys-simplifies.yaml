document: rfc-3008
kind: design-rationale
summary: 'Limiting material DNSSEC signatures to zone keys simplifies validation: the verification chain length is bounded by the name''s label depth, and authority is clearly defined. A resolver does not need to make a complicated decision about whether a key has proper authority to sign data.'
section: 3.2.1
topics:
    - dns
    - security
