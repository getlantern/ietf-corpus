document: rfc-9636
kind: interoperability-note
summary: When a TZif file contains a leap-second table expiration time, readers SHOULD either refuse to process post-expiration timestamps or process them as if the expiration did not exist, possibly with an error indication, to reduce disagreement among implementations on far-future timestamps.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
