document: rfc-3676
kind: interoperability-note
summary: If a receiving agent wishes to reformat flowed quoted lines, it SHOULD de-quote (count and remove '>' markers), reformat, and re-quote with the same number of '>' characters. This preserves quote depth across reflowing.
section: "4.5"
topics:
    - email
