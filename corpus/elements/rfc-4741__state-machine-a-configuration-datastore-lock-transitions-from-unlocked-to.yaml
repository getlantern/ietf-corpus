document: rfc-4741
kind: state-machine
summary: A configuration datastore lock transitions from Unlocked to Locked on a successful <lock> operation and returns to Unlocked on <unlock>, <close-session>, <kill-session>, or transport failure. Lock acquisition fails if the datastore is already locked by any session or non-NETCONF entity.
section: "7.5"
topics:
    - netconf
