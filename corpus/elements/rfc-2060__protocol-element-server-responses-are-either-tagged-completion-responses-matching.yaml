document: rfc-2060
kind: protocol-element
summary: 'Server responses are either tagged (completion responses matching the client command tag), untagged (prefixed with ''*'', sent unilaterally or as data), or command continuation requests (prefixed with ''+''). There are three tagged completion responses: OK (success), NO (failure), BAD (protocol error).'
