document: rfc-9691
kind: design-rationale
summary: The primary motivation for TAK objects is enabling migration from an HSM produced by one vendor to one produced by another where the first vendor does not support exporting private keys. The 30-day acceptance timer allows RPs to test the new public key and TA operators to gain confidence before RPs rely on it in production.
