document: rfc-9173
kind: security-consideration
summary: DTN key management is fundamentally challenged because round-trip key exchange protocols may not converge in delay-tolerant networks with substantial propagation delay, highly challenged communications, or unidirectional nodes. Certificate-authority-based revocation similarly fails; therefore both security contexts rely on symmetric-key mechanisms.
section: "6.1"
topics:
    - security
    - crypto
