document: rfc-2228
kind: normative-requirement
summary: The server MUST reply 534 to STOR, STOU, RETR, LIST, NLST, or APPE if the current data channel protection level does not meet the server's security requirements for that transfer. If data protection services fail during transfer (including receipt of an oversized buffer), the server MUST send a 535 reply to the data transfer command.
section: "6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
