document: rfc-1541
kind: normative-requirement
summary: T1 defaults to 0.5 * lease_duration and T2 defaults to 0.875 * lease_duration; both SHOULD be chosen with random 'fuzz' around these fixed values to avoid synchronization of client reacquisition across multiple hosts. T1 and T2 are configurable by the server through options.
section: 4.4.4
rfc2119_level: SHOULD
topics:
    - ip
