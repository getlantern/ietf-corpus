document: rfc-5951
kind: normative-requirement
summary: Secure communication channels MUST be supported for all network traffic and protocols used for management functions, including configuration, monitoring, backup, logging, time synchronization, authentication, and routing. The MCC MUST support application protocols providing confidentiality and data-integrity protection.
section: "8.1"
rfc2119_level: MUST
topics:
