document: rfc-9368
kind: protocol-element
summary: The client's Available Versions field lists all versions the first flight is compatible with, ordered by descending preference, and MUST include the Chosen Version. The server's Available Versions field lists all Fully Deployed Versions; it does not need to include the Chosen Version and MAY be empty.
