document: rfc-3560
kind: normative-requirement
summary: The EnvelopedData version MUST be 0, 2, or 3 when RSAES-OAEP key transport is employed. The EnvelopedData recipientInfos CHOICE MUST be KeyTransRecipientInfo, and the encryptedContentInfo contentEncryptionAlgorithm field MUST be a symmetric encryption algorithm identifier.
section: "2.1"
rfc2119_level: MUST
topics:
    - crypto
