document: rfc-8627
kind: protocol-element
summary: Source packets are transmitted unmodified as standard RTP packets; no additional fields are appended. This systematic code approach allows non-FEC-capable receivers to receive and process source packets without any changes, providing backward compatibility.
section: "4.1"
