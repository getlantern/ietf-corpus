document: rfc-2159
kind: interoperability-note
summary: If fineResolution is not specified, pixels will be twice as tall as they are wide. If any bit not corresponding to a specially named option is set in the G3Fax NonBasicParameters, the 'DCS' parameter must be used. Interworking is not guaranteed if any bit apart from those specially named are used in NonBasicParameters.
