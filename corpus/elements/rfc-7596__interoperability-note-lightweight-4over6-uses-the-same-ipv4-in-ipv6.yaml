document: rfc-7596
kind: interoperability-note
summary: Lightweight 4over6 uses the same IPv4-in-IPv6 tunneling mechanism as DS-Lite (RFC 6333). RFC 6333 sections on encapsulation (5.2/6.2), fragmentation and reassembly (5.3/6.3), and tunneling/Traffic Class mapping (7.1) MUST be implemented by both the lwB4 and lwAFTR.
section: "5.2"
topics:
