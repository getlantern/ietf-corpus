document: rfc-7044
kind: design-rationale
summary: RFC 7044 changes several normative levels from RFC 4244 from SHOULD/MAY to MUST (e.g., UAC inclusion of histinfo, proxy forwarding of History-Info, inclusion in responses) to improve interoperability. RFC 4244's blanket TLS mandate was removed as overspecified; instead, History-Info security is treated the same as other intermediary-inserted SIP headers.
section: "16"
topics:
