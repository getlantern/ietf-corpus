document: rfc-3041
kind: interoperability-note
summary: Use of temporary addresses may complicate network debugging and operational troubleshooting, as it becomes harder to determine whether anomalous behavior originates from a single node or multiple nodes. Site policy may mandate that temporary addresses not be used, and implementations may provide a trusted-administrator override.
section: "4"
