document: rfc-6311
kind: normative-requirement
summary: The nonce field in the IKEV2_MESSAGE_ID_SYNC notification MUST be returned unchanged in the response; a response MUST be silently dropped if the received nonce does not match the sent nonce.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
