document: rfc-8827
kind: wire-format
summary: 'The identity-assertion value is a JSON object base64-encoded per RFC 4648. The JSON contains ''idp'' (with ''domain'' and optional ''protocol'' keys) and ''assertion'' (an opaque string). The ''identity'' attribute binds to all ''fingerprint'' attributes in the session description. Syntax: identity-assertion-value = base64 *(SP identity-extension).'
section: "5"
