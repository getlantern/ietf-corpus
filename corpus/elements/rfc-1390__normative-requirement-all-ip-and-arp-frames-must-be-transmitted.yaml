document: rfc-1390
kind: normative-requirement
summary: All IP and ARP frames must be transmitted in standard 802.2 LLC Type 1 Unnumbered Information format. The DSAP and SSAP fields must be set to the SNAP SAP value (170 decimal), and 802.2 LLC Type 1 communication is used exclusively.
section: Packet Format
rfc2119_level: MUST
topics:
    - ip
