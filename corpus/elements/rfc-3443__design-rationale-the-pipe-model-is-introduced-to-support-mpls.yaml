document: rfc-3443
kind: design-rationale
summary: The Pipe Model is introduced to support MPLS LSPs where packets see the tunnel as a single hop regardless of the number of intermediate LSRs, making the MPLS network act like a circuit with only ingress and egress points visible to outside nodes. This formalizes an existing operational practice used in multiple networks.
