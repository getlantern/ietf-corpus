document: rfc-9877
kind: normative-requirement
summary: If the server includes 'geofeed1' in the 'rdapConformance' array, then for any response concerning an IP network object for which the server possesses a geofeed URL and is able to return it, the server MUST include a corresponding geofeed link object in the response.
section: "2.3"
rfc2119_level: MUST
topics:
    - json
