document: rfc-2467
kind: normative-requirement
summary: IPv6 packets shall be sent in asynchronous frames using unrestricted tokens. Nodes should also be able to receive synchronous frames and asynchronous frames sent using restricted tokens (robustness principle).
section: "3"
rfc2119_level: SHOULD
