document: rfc-2814
kind: protocol-element
summary: LAN_NHOP object carries both the Layer 3 IP address (LAN_NHOP_L3) and the Layer 2 MAC address (LAN_NHOP_L2) of the next L3 hop across an L2 domain. L3 devices use the L3 address for routing while L2 device DSBMs use the L2 address to forward PATH messages without requiring ARP capability.
section: 4.2.2.2
topics:
