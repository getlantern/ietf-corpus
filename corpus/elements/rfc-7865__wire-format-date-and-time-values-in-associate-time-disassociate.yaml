document: rfc-7865
kind: wire-format
summary: Date and time values in 'associate-time', 'disassociate-time', 'start-time', and 'stop-time' XML elements MUST follow the RFC 3339 (IMPP) date-time format. Timestamps containing 'T' or 'Z' MUST use the capitalized forms.
