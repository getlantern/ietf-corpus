document: rfc-3471
kind: design-rationale
summary: Control channel separation (control plane independent of data plane) is formalized in GMPLS because certain technologies (e.g., pure optical links) cannot carry in-band control traffic. Interface identification information must therefore be explicitly conveyed in signaling to associate an LSP setup with a specific data channel.
