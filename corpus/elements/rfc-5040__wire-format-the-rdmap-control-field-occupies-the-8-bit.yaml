document: rfc-5040
kind: wire-format
summary: The RDMAP Control Field occupies the 8-bit RsvdULP field of every DDP message. Bits 24-25 carry the RDMA Version (01b for this spec, 00b for RDMA Consortium), bits 26-27 are reserved (MUST be zero on transmit), and bits 28-31 carry the 4-bit OpCode. For Send with Invalidate messages, bits 32-63 carry the Invalidate STag.
section: "4.1"
