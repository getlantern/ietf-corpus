document: rfc-3855
kind: interoperability-note
summary: X.400 DLs are not generally security-aware and do not regenerate RecipientInfo elements for DL members; using a security-aware Mail List conforming to ESS is recommended in preference to X.400 DLs when EnvelopedData is used.
section: 2.6.3
topics:
