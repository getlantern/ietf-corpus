document: rfc-8476
kind: wire-format
summary: The Node MSD TLV has a 2-octet Type field (value 12), a 2-octet Length field (variable, multiple of 2 octets), and a Value field consisting of one or more pairs of a 1-octet MSD-Type and 1-octet MSD-Value. MSD-Value is in the range 0–255, where 0 indicates inability to impose any MSD stack.
section: "2"
topics:
    - routing
    - mpls
