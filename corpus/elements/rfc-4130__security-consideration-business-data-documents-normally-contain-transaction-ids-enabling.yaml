document: rfc-4130
kind: security-consideration
summary: Business data documents normally contain transaction IDs enabling duplicate detection; replays should be discarded as part of normal processing. Detection of duplicates by Message-Id or business transaction identifiers is recommended to guard against replay attacks.
section: "9.3"
topics:
    - security
