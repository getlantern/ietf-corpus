document: rfc-7939
kind: protocol-element
summary: The nhdpIib2HopSetTable (INDEX { nhdpIfIndex, nhdpDiscIfIndex, nhdpIib2HopSetIpAddressType, nhdpIib2HopSetIpAddress }) records symmetric 2-hop neighbors with fields N2_2hop_addr, prefix length, associated 1-hop interface (nhdpIib2HopSet1HopIfIndex), expiration (nhdpIib2HopSetN2Time), and N2_lost flag (nhdpIib2HopSetN2Lost). The N2_lost field was added by this document to reflect RFC 7466.
section: "7"
