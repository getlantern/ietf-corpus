document: rfc-9159
kind: normative-requirement
summary: A router MUST fully elide the destination IPv6 address when transmitting to a neighboring 6LN if the destination is the latest address registered by the 6LN with EARO for the indicated context (DAC=1, DAM=11).
section: 3.3.3
rfc2119_level: MUST
