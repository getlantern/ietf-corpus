document: rfc-2460
kind: security-consideration
summary: The security features of IPv6, including authentication and confidentiality via the Authentication Header (RFC 2402) and Encapsulating Security Payload (RFC 2406), are described in the Security Architecture for the Internet Protocol (RFC 2401). Reversing received Routing headers without authentication verification enables source routing attacks.
section: Security Considerations
topics:
    - ip
    - security
    - ipsec
