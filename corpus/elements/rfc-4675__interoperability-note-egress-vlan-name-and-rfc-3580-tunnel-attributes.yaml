document: rfc-4675
kind: interoperability-note
summary: Egress-VLAN-Name and RFC 3580 tunnel attributes can be used concurrently in the same RADIUS packet; when both are present, the allowed VLAN list is the concatenation of Egress-VLAN-Name and Tunnel-Private-Group-ID (81) attributes. Only tunnel attributes should be used to set the PVID.
section: "2.3"
topics:
    - radius
