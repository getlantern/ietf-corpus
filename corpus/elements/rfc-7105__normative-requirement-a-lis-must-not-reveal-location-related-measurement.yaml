document: rfc-7105
kind: normative-requirement
summary: A LIS MUST NOT reveal location-related measurement data to any other entity, and MUST NOT reveal location information based on measurement data to any other entity unless directed to do so by the Device.
section: "6.2"
rfc2119_level: MUST NOT
