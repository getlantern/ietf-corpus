summary: The XML schema uses an extensible template approach modeled after IPFIX, where configuration metadata is referenced by result elements via the 'TestName' unique identifier (per RFC 4560). This design was coordinated with Open Grid Forum to ensure a one-to-one transformation between the two schemas.
