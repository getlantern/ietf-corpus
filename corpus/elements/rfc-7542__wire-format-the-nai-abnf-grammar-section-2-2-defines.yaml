document: rfc-7542
kind: wire-format
summary: 'The NAI ABNF grammar (Section 2.2) defines three forms: username-only, realm-only (''@utf8-realm''), or ''utf8-username@utf8-realm''. The username is a dot-string of utf8-atext characters; the realm is one or more dot-separated labels composed of ALPHA, DIGIT, or UTF8-xtra-char, following IDNA rules.'
