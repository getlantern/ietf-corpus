document: rfc-5618
kind: normative-requirement
summary: The TWAMP Modes registry must be updated only by 'IETF Review' as specified in RFC 5226. New features are expected to be assigned using monotonically increasing single bit positions in the range [0-31] unless there is good reason to do otherwise.
section: "6.2"
rfc2119_level: MUST
topics:
    - measurement
    - registry
    - process
