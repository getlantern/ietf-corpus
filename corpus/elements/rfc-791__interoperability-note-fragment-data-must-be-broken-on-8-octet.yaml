document: rfc-791
kind: interoperability-note
summary: Fragment data must be broken on 8-octet boundaries (except the last fragment). The 13-bit Fragment Offset field supports up to 8192 fragments of 8 octets each, for a theoretical maximum reconstructed payload of 65,536 octets consistent with the 16-bit Total Length field.
section: "3.2"
topics:
