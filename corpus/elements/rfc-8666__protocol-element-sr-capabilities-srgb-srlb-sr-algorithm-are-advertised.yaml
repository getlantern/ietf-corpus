document: rfc-8666
kind: protocol-element
summary: SR capabilities (SRGB, SRLB, SR-Algorithm) are advertised in the OSPFv3 Router Information Opaque LSA as defined in RFC 7770, using TLVs specified in RFC 8665. These capabilities must be present before a router can participate in SR.
