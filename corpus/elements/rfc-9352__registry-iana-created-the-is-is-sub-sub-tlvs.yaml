document: rfc-9352
kind: registry
summary: IANA created the IS-IS Sub-Sub-TLVs for SRv6 SID Sub-TLVs registry (Expert Review), assigning type 1 (SRv6 SID Structure) as valid in sub-TLVs 5, 43, and 44. Also created flag registries for SRv6 Capabilities (O-flag at bit 1), SRv6 Locator TLV (D-flag at bit 0), SRv6 End SID, and SRv6 Adjacency SID (B/S/P flags at bits 0–2).
