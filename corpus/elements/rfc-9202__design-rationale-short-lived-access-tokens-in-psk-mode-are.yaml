document: rfc-9202
kind: design-rationale
summary: Short-lived access tokens in PSK mode are intentionally used to approximate forward-secrecy properties of ephemeral Diffie-Hellman; for longer-lived tokens, DHE cipher suites (TLS_DHE_PSK_* or TLS_ECDHE_PSK_*) should be used instead.
