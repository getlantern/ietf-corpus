document: rfc-4501
kind: interoperability-note
summary: DNS URIs may be resolved by protocols other than DNS (e.g., multicast DNS); use of the DNS protocol is expected but not required. Data referenced by this URI scheme might be transferred by protocols that are not URI-aware.
