document: rfc-5555
kind: protocol-element
summary: The IPv4 Care-of Address Option (Type 32) is carried in the binding update mobility header when the mobile node is located in an IPv4-only network. It contains a Reserved field and a 32-bit IPv4 care-of address representing the mobile node's current IPv4 address in the visited network.
section: 3.1.2
topics:
    - mobility
    - ip
    - nat
