document: rfc-8587
kind: protocol-element
summary: NFS4ERR_MOVED indicates only that a file system cannot be accessed via the current network address; it does not imply migration to a different server. Clients should not conclude migration has occurred until confirming that all network addresses known to be associated with the server are unusable.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
