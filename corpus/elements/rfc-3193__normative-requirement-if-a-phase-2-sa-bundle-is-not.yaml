document: rfc-3193
kind: normative-requirement
summary: If a phase 2 SA bundle is not already present to protect the SCCRQ, the sending of a SCCRQ SHOULD cause IKE to set up the necessary SAs. If the SA cannot be set up for some reason, the packet MUST be dropped.
section: 4.2.2
rfc2119_level: MUST
topics:
    - vpn
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
