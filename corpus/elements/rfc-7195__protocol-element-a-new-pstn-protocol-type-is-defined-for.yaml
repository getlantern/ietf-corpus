kind: protocol-element
summary: A new 'PSTN' protocol type is defined for the SDP 'm=' media description line. The port subfield carries no meaningful value for circuit-switched bearers; the fmt subfield reuses RTP/AVP payload type numbers to indicate available codecs, or '-' if unknown.
