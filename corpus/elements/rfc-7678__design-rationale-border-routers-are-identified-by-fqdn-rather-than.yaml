document: rfc-7678
kind: design-rationale
summary: Border routers are identified by FQDN rather than IP address, following the precedent of RFC 6334 and RFC 6519 for DS-Lite. The FQDN can be dereferenced to one or more IP addresses by the provisioning system or passed as-is to the customer equipment, providing flexibility.
section: "3.2"
topics:
    - diameter
    - v6ops
