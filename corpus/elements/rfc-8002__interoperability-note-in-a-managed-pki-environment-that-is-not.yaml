document: rfc-8002
kind: interoperability-note
summary: In a managed PKI environment that is not HIP-aware and cannot compute HITs, HIP hosts must send their identity certificates along with the chain of intermediate CAs. The remote peer computes peer HITs based on the certificate public keys rather than receiving them pre-computed.
section: "3"
topics:
