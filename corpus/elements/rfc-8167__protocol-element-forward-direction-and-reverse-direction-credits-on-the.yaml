document: rfc-8167
kind: protocol-element
summary: Forward-direction and reverse-direction credits on the same connection are accounted separately to prevent head-of-line blocking in one direction from impacting the other. The reverse-direction credit value is the number of RPC requests the reverse-direction Responder (the ONC RPC client) is prepared to receive concurrently.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
