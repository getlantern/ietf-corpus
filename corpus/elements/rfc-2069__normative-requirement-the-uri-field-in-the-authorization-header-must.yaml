document: rfc-2069
kind: normative-requirement
summary: The uri field in the Authorization header MUST agree with the Request-URI. In particular, it MUST be an absoluteURL if the Request-URI is an absoluteURL.
section: 2.1.2
rfc2119_level: MUST
