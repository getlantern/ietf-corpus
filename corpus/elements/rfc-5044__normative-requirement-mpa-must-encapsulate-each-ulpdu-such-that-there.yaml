document: rfc-5044
kind: normative-requirement
summary: MPA MUST encapsulate each ULPDU such that there is exactly one ULPDU contained in one FPDU. The ULPDU_Length field MUST accurately reflect the length of the contained ULPDU, excluding the header, PAD, CRC, and any embedded Markers.
section: "3"
rfc2119_level: MUST
