summary: Publishers supporting this document MUST indicate support of the 'ietf-subscribed-notifications' YANG module in their YANG library. All supported optional features (encode-xml, encode-json, configured, supports-vrf, qos, xpath, subtree, interface-designation, dscp, replay) MUST also be indicated.
