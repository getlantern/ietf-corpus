document: rfc-6381
kind: normative-requirement
summary: When the definition for use of the 'profiles' parameter is defined for a given format, that definition SHOULD indicate that the parameter directly reflects information in the body part and does not convey information beyond what can be learned by inspecting the body part. The body part is definitive; the parameter is informative.
section: "4.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
