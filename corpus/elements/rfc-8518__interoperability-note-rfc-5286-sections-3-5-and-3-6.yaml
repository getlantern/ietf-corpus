document: rfc-8518
kind: interoperability-note
summary: RFC 5286 Sections 3.5 and 3.6 exclude links with MAX_METRIC from alternate paths, but when such a link is the only loop-free alternate, it MAY still be used as an LFA since primary traffic already traverses it. Alternatively, the reverse metric MAY be set to MAX_METRIC-1 to permit its use as an alternate while satisfying TE requirements.
section: "5.1"
topics:
    - routing
