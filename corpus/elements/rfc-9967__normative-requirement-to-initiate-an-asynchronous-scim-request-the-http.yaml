document: rfc-9967
kind: normative-requirement
summary: To initiate an asynchronous SCIM request, the HTTP 'Prefer' header is set to 'respond-async'. The HTTP 'Accept' header MUST be ignored for purposes of an asynchronous response, and the asynchronous response MUST contain no response body.
section: 2.5.1.1
rfc2119_level: MUST
topics:
    - http
    - security
