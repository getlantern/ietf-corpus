document: rfc-7796
kind: normative-requirement
summary: T-VSIs in a VPLS MUST be interconnected with a bidirectional Ethernet PW. The Ethernet PW SHOULD work in tagged mode (PW type 0x0004), in which case a VLAN tag MUST be carried in each frame on the PW to indicate whether the frame originated from a root or leaf.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
