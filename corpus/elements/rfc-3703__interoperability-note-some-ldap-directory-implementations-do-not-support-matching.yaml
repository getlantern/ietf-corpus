document: rfc-3703
kind: interoperability-note
summary: Some LDAP directory implementations do not support matching of auxiliary classes in the objectClass attribute; in those environments, entries relevant to policy should be tagged by inserting the special keyword 'POLICY' into the pcimKeywords multi-valued attribute rather than relying on objectClass filtering.
section: "4.5"
topics:
