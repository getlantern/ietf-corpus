document: rfc-8264
kind: design-rationale
summary: PRECIS replaces Stringprep (RFC 3454) because Stringprep was tied to Unicode 3.2, making it inflexible as Unicode evolved. IDNA2008 abandoned Stringprep/Nameprep, prompting other Stringprep users to seek a more agile approach that derives code point properties algorithmically rather than enumerating a static table.
section: "1"
topics:
