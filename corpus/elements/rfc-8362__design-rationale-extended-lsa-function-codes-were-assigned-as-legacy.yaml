document: rfc-8362
kind: design-rationale
summary: Extended LSA function codes were assigned as legacy codes plus 32 (0x20) rather than by allocating a new bit in the LS Type field. The bit-based approach would have consumed half the LSA function code space solely to migrate eight existing fixed-format LSAs.
