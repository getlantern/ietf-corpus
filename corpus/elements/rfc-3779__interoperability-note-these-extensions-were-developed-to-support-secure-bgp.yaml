document: rfc-3779
kind: interoperability-note
summary: These extensions were developed to support Secure BGP (S-BGP) for verifying the legitimacy and correctness of routing information, but may be employed in other contexts such as Internet routing registries. The use of the AS identifier extension is not intended to alter existing procedures for AS identifier management.
