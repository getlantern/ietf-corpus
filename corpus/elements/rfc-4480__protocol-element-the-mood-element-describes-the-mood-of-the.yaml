document: rfc-4480
kind: protocol-element
summary: The <mood> element describes the mood of the presentity using child elements drawn from a defined enumeration (e.g., <happy/>, <sleepy/>). One child mood element is REQUIRED; an optional <note> child may provide a natural-language description.
