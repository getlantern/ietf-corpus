document: rfc-9093
kind: design-rationale
summary: The flexi-n-step attribute in flexi-grid-label-step captures the constraint that only every Nth multiple of the central frequency granularity is supported on a given port (e.g., flexi-n-step=2 means only even N values), allowing implementations to advertise granularity constraints without enumerating valid values.
