document: rfc-6806
kind: normative-requirement
summary: Names MUST NOT be changed in the response to a TGS request, even though KDCs may maintain aliases. Services MUST NOT make distinctions based on which alias appears in the issued ticket because the service name in a ticket is not cryptographically protected.
section: "6"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
