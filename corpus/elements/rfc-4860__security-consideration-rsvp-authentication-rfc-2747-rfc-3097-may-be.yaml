document: rfc-4860
kind: security-consideration
summary: RSVP Authentication (RFC 2747, RFC 3097) may be used to protect message integrity hop-by-hop, providing node authentication and replay protection against corruption and spoofing. These mechanisms protect both generic aggregate and E2E RSVP messages, including E2E messages transiting the aggregation region.
section: "6"
topics:
