document: rfc-6871
kind: protocol-element
summary: The 'a=omcap' attribute defines non-RTP-based media format capabilities in the form of a format name only (e.g., T38), each assigned a media capability number shared with the 'rmcap' number space. This attribute is used for media formats such as T.38 or BFCP where RTP payload types do not apply.
section: 3.3.1
topics:
    - realtime
