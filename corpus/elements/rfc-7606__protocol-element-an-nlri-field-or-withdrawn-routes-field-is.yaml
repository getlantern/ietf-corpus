document: rfc-7606
kind: protocol-element
summary: 'An NLRI field or Withdrawn Routes field is syntactically incorrect if any included NLRI has a length greater than 32, or the last NLRI''s length exceeds remaining unconsumed data. For MP_REACH_NLRI/MP_UNREACH_NLRI, additional checks apply: NLRI length inconsistent with AFI/SAFI, last NLRI overrunning remaining data, inconsistent attribute flags, or attribute length less than 3 (MP_UNREACH) or 5 (MP_REACH).'
section: "5.3"
topics:
    - bgp
    - routing
