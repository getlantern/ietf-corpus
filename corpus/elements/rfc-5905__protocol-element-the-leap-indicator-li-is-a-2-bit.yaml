document: rfc-5905
kind: protocol-element
summary: 'The Leap Indicator (LI) is a 2-bit field: 0 = no warning, 1 = last minute of day has 61 seconds, 2 = last minute has 59 seconds, 3 = clock unsynchronized. A value of 3 propagates through the subnet to indicate that the time source is not trusted.'
section: "7.3"
