document: rfc-2401
kind: protocol-element
summary: 'The Security Association Database (SAD) stores parameters for each active SA. For inbound lookup the SAD is indexed by: Destination IP Address, IPsec Protocol (AH or ESP), and SPI. Each entry holds cryptographic algorithm parameters and keys, sequence number counter, anti-replay window, SA lifetime, protocol mode, and path MTU.'
section: 4.4.3
topics:
    - ipsec
    - security
