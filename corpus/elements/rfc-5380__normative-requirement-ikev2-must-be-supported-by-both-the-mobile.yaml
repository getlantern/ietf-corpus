document: rfc-5380
kind: normative-requirement
summary: IKEv2 MUST be supported by both the mobile node and the MAP to establish the security association. Binding updates between the MAP and the mobile node MUST be protected with AH or ESP in transport mode; when ESP is used, a non-null authentication algorithm MUST be used.
section: "12.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
