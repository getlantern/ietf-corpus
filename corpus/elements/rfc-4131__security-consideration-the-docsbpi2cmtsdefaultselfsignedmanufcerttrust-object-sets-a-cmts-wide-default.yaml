document: rfc-4131
kind: security-consideration
summary: The docsBpi2CmtsDefaultSelfSignedManufCertTrust object sets a CMTS-wide default trust level for newly added self-signed manufacturer certificates; setting it to 'trusted' permits CM authentication based on unverified self-signed manufacturer certificates, weakening the BPI+ PKI chain of trust.
section: "3"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
