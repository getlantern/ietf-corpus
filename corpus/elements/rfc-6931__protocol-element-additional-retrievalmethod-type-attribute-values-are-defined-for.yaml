document: rfc-6931
kind: protocol-element
summary: 'Additional RetrievalMethod Type attribute values are defined for raw and structured key information: KeyName, KeyValue, PKCS7signedData, rawPGPKeyPacket, rawPKCS7signedData, rawSPKISexp, rawX509CRL, and RetrievalMethod. ''Raw'' types require the Type attribute because they are binary and not unambiguously parsable.'
