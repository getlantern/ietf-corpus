document: rfc-9335
kind: normative-requirement
summary: When a peer has advertised support for both Cryptex and RFC 6904, it is RECOMMENDED that the sender use Cryptex rather than RFC 6904 so that all header extensions and CSRCs are encrypted, unless there is a compelling reason (e.g., middlebox processing) to use RFC 6904.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
