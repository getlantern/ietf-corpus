document: rfc-5601
kind: protocol-element
summary: pwOperStatus (PwOperStatusTC, read-only) reflects the PW's operational state and is set to 'down' only when pwNotForwarding, psnFacingPwRxFault, or psnFacingPwTxFault are set; it reports 'lowerLayerDown' if the outer tunnel or physical layer is down while the PW itself is otherwise operational.
