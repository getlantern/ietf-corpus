document: rfc-3860
kind: protocol-element
summary: 'The message operation carries four attributes: ''source'' and ''destination'' (INSTANT INBOX identifiers), ''MaxForwards'' (hop counter set by originator to prevent loops), and ''TransID'' (unique identifier to correlate message and response operations). Gateways SHOULD handle TransIDs up to 40 bytes.'
