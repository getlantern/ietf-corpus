document: rfc-5019
kind: security-consideration
summary: Unsigned requests remove the responder's ability to authenticate requestors. Environments requiring explicit authorization should use other mechanisms (such as IP filtering, TLS client authentication, or rate limiting) to authenticate requestors or restrict service.
section: "7.6"
