document: rfc-4244
kind: state-machine
summary: 'Proxy indexing state machine for History-Info: (1) Basic forwarding appends a new dot-level to the last index (e.g., 1.1 → 1.1.1); (2) first retarget within a proxy follows basic forwarding; (3) each subsequent retarget by the same proxy increments the last digit (e.g., 1.1.1 → 1.1.2); (4) retarget due to a response also increments the last digit; (5) parallel forking assigns a unique index per branch.'
section: 4.3.3.1.3
topics:
    - sip
    - realtime
