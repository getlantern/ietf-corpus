document: rfc-7925
kind: privacy-consideration
summary: Section 22 addresses privacy considerations for the IoT TLS/DTLS profile. TLS/DTLS handshake metadata (such as certificate identifiers, SNI values, and PSK identities) transmitted in cleartext can reveal device identity and association patterns to observers, which is particularly sensitive for IoT deployments.
section: "22"
topics:
    - tls
    - privacy
    - security
