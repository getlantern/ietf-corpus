document: rfc-2662
kind: design-rationale
summary: The MIB supports two profile implementation modes—MODE-I (dynamic, shared profiles managed via RowStatus) and MODE-II (static, one system-generated read-only profile per ADSL line)—but not both simultaneously. This accommodates large DSLAM deployments where shared profiles reduce provisioning burden as well as simpler single-line implementations.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
