document: rfc-7252
kind: protocol-element
summary: 'The Token (0-8 bytes) is a client-generated identifier used to match responses to requests independently of the Message ID. Every message carries a token (possibly zero-length); the server MUST echo it unmodified in any resulting response. The Token is separate from the Message ID: Message ID correlates CON/NON with ACK/RST at the messaging layer, while Token correlates requests with responses at the request/response layer.'
section: 5.3.1
topics:
    - http
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
