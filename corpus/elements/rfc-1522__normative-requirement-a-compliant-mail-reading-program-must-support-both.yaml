document: rfc-1522
kind: normative-requirement
summary: A compliant mail reading program MUST support both 'B' and 'Q' encodings for every character set it supports, MUST be able to display unencoded text when the charset is 'US-ASCII', and for ISO-8859-* charsets must at least display characters also present in ASCII.
section: "7"
rfc2119_level: MUST
topics:
    - email
