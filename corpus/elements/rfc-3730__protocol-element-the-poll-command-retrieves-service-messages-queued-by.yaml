document: rfc-3730
kind: protocol-element
summary: The <poll> command retrieves service messages queued by the server for individual clients. op='req' retrieves the first message; op='ack' with a 'msgID' attribute acknowledges and dequeues a message. The response includes a <msgQ> element with 'count' and 'id' attributes, and optional <qDate> and <msg> children.
section: 2.9.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
