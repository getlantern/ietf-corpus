document: rfc-5660
kind: protocol-element
summary: An 'IPsec channel' (synonymous with 'connection latch') is a packet flow associated with a ULP control block where the peer's identity and the quality of IPsec protection remain constant for the lifetime of the flow. A channel is created when its associated flow is created and destroyed when the flow ends, or 'broken' when the latch cannot be maintained.
section: "2"
topics:
    - ipsec
    - security
