document: rfc-2439
kind: normative-requirement
summary: Where routes are unstable, use and announcement of the routes should be suppressed rather than suppressing their removal. It is more desirable to suppress the acceptance of a route (and therefore its use in the IGP) rather than suppress only the redistribution.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
