document: rfc-7975
kind: protocol-element
summary: 'DNS Redirection Response ''dns'' dictionary mandatory keys: rcode (Integer, DNS response code per RFC 6895), name (String, FQDN). Optional keys: a (List of IPv4 addresses), aaaa (List of IPv6 addresses), cname (List of FQDNs), ttl (Integer, seconds, default 0). If cname is present, a and aaaa MUST NOT be present.'
section: 4.4.2
topics:
