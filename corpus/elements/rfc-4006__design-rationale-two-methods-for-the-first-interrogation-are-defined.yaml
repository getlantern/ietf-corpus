document: rfc-4006
kind: design-rationale
summary: 'Two methods for the first interrogation are defined: (1) after user authentication/authorization completes, and (2) embedded within the AA request/answer exchange. The embedded approach is preferred for NAS environments for protocol efficiency; the post-auth approach suits 3GPP and SIP environments where authentication and service requests are decoupled.'
