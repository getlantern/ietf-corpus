document: rfc-3392
kind: design-rationale
summary: BGP-4 originally required terminating a peering session upon receipt of an unrecognized Optional Parameter, which made introducing new capabilities disruptive. The Capabilities Optional Parameter was defined to allow graceful advertisement of new capabilities without forcing session teardown.
section: "1"
topics:
    - bgp
    - routing
