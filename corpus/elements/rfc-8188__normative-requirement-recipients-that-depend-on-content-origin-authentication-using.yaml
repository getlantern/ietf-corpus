document: rfc-8188
kind: normative-requirement
summary: Recipients that depend on content-origin authentication using this mechanism MUST reject messages that don't include the 'aes128gcm' content coding, because the coding could be automatically removed by an intermediary without the ultimate consumer's knowledge.
section: "4.1"
rfc2119_level: MUST
topics:
    - http
    - security
