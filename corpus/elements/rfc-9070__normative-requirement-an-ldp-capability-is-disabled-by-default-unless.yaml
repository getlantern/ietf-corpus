document: rfc-9070
kind: normative-requirement
summary: An LDP capability is disabled by default unless explicitly enabled. The scope of a capability enabled under the global container applies to all LDP peers in the given VRF instance; a per-peer capability container overrides the VRF-level setting.
section: 5.1.2
rfc2119_level: SHOULD
