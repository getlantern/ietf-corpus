document: rfc-5796
kind: normative-requirement
summary: A router SHOULD NOT dynamically detect new neighbors as the result of receiving an unauthenticated PIM-SM link-local message or an IPsec packet that fails SAD lookup. An automated key management protocol SHOULD provide a means of notifying a router of new, legitimate neighbors.
section: 10.2.2
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
