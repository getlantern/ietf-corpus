document: rfc-7380
kind: wire-format
summary: 'The MPEG2 TS PSI Decodability Metrics Block (BT=32) is 8 32-bit words long: BT (8 bits), Reserved (8 bits), block length (16 bits, constant 6), SSRC of source (32 bits), begin_seq (16 bits), end_seq (16 bits), followed by seven 16-bit error count fields (PAT_error_count, PAT_error_2_count, PMT_error_count, PMT_error_2_count, PID_error_count, CRC_error_count, CAT_error_count) and a final 16-bit Reserved field.'
