document: rfc-1962
kind: wire-format
summary: Compressed datagrams use PPP Protocol field 0x00FD. When individual link compression is used in a multiple-link connection, the PPP Protocol field MUST be 0x00FB (Individual link compressed datagram).
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
