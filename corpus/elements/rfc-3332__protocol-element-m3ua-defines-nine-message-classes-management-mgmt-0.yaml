summary: 'M3UA defines nine message classes: Management/MGMT (0), Transfer (1), SS7 Signalling Network Management/SSNM (2), ASP State Maintenance/ASPSM (3), ASP Traffic Maintenance/ASPTM (4), Routing Key Management/RKM (9). Classes 10–127 are reserved by IETF; 128–255 are for IETF-defined extensions.'
