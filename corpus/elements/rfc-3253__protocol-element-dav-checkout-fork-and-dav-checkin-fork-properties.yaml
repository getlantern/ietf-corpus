document: rfc-3253
kind: protocol-element
summary: DAV:checkout-fork and DAV:checkin-fork properties on a version control whether fork creation is DAV:forbidden (CHECKOUT/CHECKIN MUST fail if a fork would result) or DAV:discouraged (MUST fail unless DAV:fork-ok is specified in the request body).
