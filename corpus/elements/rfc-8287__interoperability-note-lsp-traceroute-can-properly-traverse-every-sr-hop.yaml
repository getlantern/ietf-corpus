document: rfc-8287
kind: interoperability-note
summary: LSP Traceroute can properly traverse every SR hop under the Uniform TTL Model (RFC 3443), but may not traverse every hop under the Short Pipe Model due to absence of TTL copy when the outer label is popped; a special TTL manipulation technique is defined to address this.
section: "7.5"
topics:
