document: rfc-8497
kind: privacy-consideration
summary: The 'logme' parameter itself carries no device-specific or user-specific information and does not fingerprint users; however, its presence in signaling visible at network elements reveals that the session is under diagnostic observation, which may itself be sensitive.
section: "8.4"
topics:
