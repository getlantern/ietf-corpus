document: rfc-7144
kind: interoperability-note
summary: INCITS T10 has assigned SCSI version descriptor codes 0961h–097Fh to RFC 7144 for IANA management via iSCSIProtocolLevel values 1–31; the value 0 assignment (0960h = "iSCSI no version claimed") must not be changed in the IANA registry.
