document: rfc-4546
kind: registry
summary: This document defines the DOCS-IF-MIB module registered at OID { transmission 127 }, obsoleting RFC 2670. It introduces new textual conventions DocsisVersion, DocsisQosVersion, DocsisUpstreamType, and DocsEqualizerData, and adds DOCSIS 2.0 MIB objects for S-CDMA parameters, channel utilization counters, and offline upstream configuration.
