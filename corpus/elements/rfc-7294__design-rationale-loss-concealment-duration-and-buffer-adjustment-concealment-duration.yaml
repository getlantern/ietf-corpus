document: rfc-7294
kind: design-rationale
summary: Loss Concealment Duration and Buffer Adjustment Concealment Duration are reported separately because buffer adjustment is typically arranged to occur during silence periods, making it less audible and less impactful to user experience compared to loss concealment which occurs at any time.
