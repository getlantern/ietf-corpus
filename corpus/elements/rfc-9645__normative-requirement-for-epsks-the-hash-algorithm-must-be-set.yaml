document: rfc-9645
kind: normative-requirement
summary: For EPSKs, the hash algorithm MUST be set when the PSK is established (defaulting to SHA-256 if undefined), and each PSK MUST only be used with a single hash function. The server MUST ensure it selects a compatible PSK and cipher suite.
section: "3.3"
rfc2119_level: MUST
topics:
    - tls
    - crypto
