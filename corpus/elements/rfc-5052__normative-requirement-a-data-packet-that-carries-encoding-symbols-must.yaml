document: rfc-5052
kind: normative-requirement
summary: A data packet that carries encoding symbols MUST include an FEC Payload ID. The FEC Payload ID identifies (for FEC purposes) the encoding symbols carried by the packet and is essential to the decoder whenever the packet is received.
section: "6"
rfc2119_level: MUST
topics:
    - multicast
