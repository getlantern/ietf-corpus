document: rfc-2915
kind: interoperability-note
summary: When the 'A' flag is used, the specified protocol must be running on its default port because NAPTR records contain no port specification field. This contrasts with 'S' flag SRV-directed lookups where port information is carried in the SRV record.
section: "10"
