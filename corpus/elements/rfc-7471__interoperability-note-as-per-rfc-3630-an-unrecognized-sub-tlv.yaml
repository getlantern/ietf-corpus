document: rfc-7471
kind: interoperability-note
summary: As per RFC 3630, an unrecognized sub-TLV MUST be silently ignored by the receiving router — it should not be processed but should be forwarded in LSAs sent to OSPF neighbors, preserving backward compatibility with routers that do not implement these extensions.
section: "10"
topics:
