document: rfc-6283
kind: normative-requirement
summary: When a single Time-Stamp is obtained for a set of archive objects, the LTA MUST construct a hash tree to generate a single hash value binding all archive objects, and then a reduced hash tree MUST be calculated from the hash tree for each archive object respectively.
section: 3.1.1
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
