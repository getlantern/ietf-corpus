document: rfc-4103
kind: interoperability-note
summary: The 'cps' parameter was not defined in RFC 2793; therefore implementations of text/t140 may not recognize or act upon it. Receivers MUST be designed to handle temporary reception of characters at a rate higher than the cps value to avoid malfunction due to buffer overflow.
section: "6"
topics:
    - rtp
    - realtime
