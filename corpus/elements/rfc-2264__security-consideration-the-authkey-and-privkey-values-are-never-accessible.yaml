document: rfc-2264
kind: security-consideration
summary: The authKey and privKey values are never accessible via SNMP GET operations; they can only be changed via the KeyChange mechanism, ensuring that the secrets themselves are never transmitted in cleartext over the network.
section: "2.1"
topics:
    - snmp
    - security
