document: rfc-8480
kind: protocol-element
summary: In a 3-step 6P Transaction, node A sends an ADD/RELOCATE Request with an empty CellList; node B proposes candidate cells in the 6P Response; node A selects from those candidates and sends a 6P Confirmation. This adds a round-trip but allows node B to drive cell selection.
section: 3.1.2
extracted_by: claude-sonnet-4-6
