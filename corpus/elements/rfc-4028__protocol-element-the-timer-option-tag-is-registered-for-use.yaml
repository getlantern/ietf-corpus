document: rfc-4028
kind: protocol-element
summary: The 'timer' option tag is registered for use in Supported, Require, and Proxy-Require header fields. In Supported it indicates support for the session timer extension; in Require in a request it mandates UAS support; in Require in a response it mandates UAC processing of Session-Expires.
section: "12.3"
topics:
