document: rfc-2744
kind: security-consideration
summary: Some mechanisms include actual channel binding data in context-establishment tokens rather than just a MIC. Applications should therefore not use confidential data as channel-binding components, since that data may be transmitted without encryption.
section: "3.11"
topics:
    - security
