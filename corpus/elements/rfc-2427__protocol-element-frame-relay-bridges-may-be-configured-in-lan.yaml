document: rfc-2427
kind: protocol-element
summary: Frame Relay bridges may be configured in LAN view (all VCs combined into one virtual bridge port, requiring flooding to each VC) or point-to-point view (each VC is a separate bridge port). When more than one virtual port exists within a remote bridge group, an extended Spanning Tree Algorithm (IEEE 802.1g) is required.
section: "9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
