document: rfc-5913
kind: protocol-element
summary: 'The intersection of permitted-clearances and an Authority Clearance Constraints extension is computed by: checking for duplicate policyIds (fail if found); if permitted-clearances is all-clearances, assign temp-clearances directly; otherwise intersect by AND-ing classList bits per policyId and computing securityCategories intersection per Section 7, removing any policyId with no remaining classList bits.'
