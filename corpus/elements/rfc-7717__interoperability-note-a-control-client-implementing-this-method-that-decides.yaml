document: rfc-7717
kind: interoperability-note
summary: A Control-Client implementing this method that decides not to employ IKEv2 derivation can behave as a client purely compatible with RFC 4656 and RFC 5357; similarly, if no IKEv2 SA exists, the client may proceed with modes defined in RFC 4656, RFC 5357, and RFC 5618 after logging an error.
