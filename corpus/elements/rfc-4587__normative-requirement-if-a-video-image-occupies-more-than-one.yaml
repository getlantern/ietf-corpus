document: rfc-4587
kind: normative-requirement
summary: If a video image occupies more than one packet, the RTP timestamp SHALL be the same on all of those packets. Packets from different video images MUST have a different timestamp so that frames may be distinguished.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
