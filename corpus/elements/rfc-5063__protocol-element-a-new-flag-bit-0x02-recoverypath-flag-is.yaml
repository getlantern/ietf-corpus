document: rfc-5063
kind: protocol-element
summary: A new flag bit 0x02 (RecoveryPath Flag) is added to the Flags field of the MESSAGE_ID_ACK, MESSAGE_ID_NACK, and MESSAGE_ID LIST objects defined in RFC 2961. When set, it indicates the object carries MESSAGE_ID information related to Path messages recoverable via RecoveryPath messages.
section: "5.1"
topics:
    - routing
    - mpls
