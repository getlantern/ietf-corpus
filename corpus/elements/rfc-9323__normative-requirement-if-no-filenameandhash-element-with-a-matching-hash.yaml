document: rfc-9323
kind: normative-requirement
summary: If no FileNameAndHash element with a matching hash is found in the RSC checkList, verification MUST fail and the error SHOULD be reported to the user. It is not an error if checkList contains more entries than the set of objects being verified, but implementations SHOULD warn the user in that case.
section: "6"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
