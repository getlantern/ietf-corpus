document: rfc-4401
kind: normative-requirement
summary: The outputs of GSS_Pseudo_random() and the mechanism's per-message tokens for the given security context MUST be 'cryptographically separate'; it must not be feasible to recover key material for one operation or transform tokens and PRF outputs from one to the other.
section: "2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
