document: rfc-6213
kind: design-rationale
summary: To allow a non-disruptive transition when ISIS_BFD_REQUIRED becomes TRUE (due to introduction or modification of a BFD TLV), an implementation SHOULD delay bringing down an UP adjacency by not updating the adjacency hold time until ISIS_NEIGHBOR_USEABLE becomes TRUE.
section: "4"
topics:
