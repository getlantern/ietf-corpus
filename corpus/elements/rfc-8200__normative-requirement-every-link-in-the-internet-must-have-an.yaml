document: rfc-8200
kind: normative-requirement
summary: Every link in the Internet must have an MTU of 1280 octets or greater (the IPv6 minimum link MTU). On any link that cannot convey a 1280-octet packet in one piece, link-specific fragmentation and reassembly must be provided at a layer below IPv6.
section: "5"
rfc2119_level: MUST
topics:
    - ip
