document: rfc-4514
kind: normative-requirement
summary: Applications that require reconstruction of the DER form of an attribute value SHOULD NOT use the string representation when converting a DN to LDAP format; they SHOULD use the hexadecimal form prefixed by '#' (Section 2.4).
