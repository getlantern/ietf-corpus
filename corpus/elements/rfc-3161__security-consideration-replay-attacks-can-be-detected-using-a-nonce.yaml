document: rfc-3161
kind: security-consideration
summary: Replay attacks can be detected using a nonce (RECOMMENDED) or by maintaining a time window during which the requester tracks all hashes sent. A client using only a nonce without a local clock SHOULD bound its acceptable wait time, as a man-in-the-middle can introduce delays.
section: "4"
topics:
