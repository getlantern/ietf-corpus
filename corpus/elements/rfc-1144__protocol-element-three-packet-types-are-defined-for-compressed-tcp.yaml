document: rfc-1144
kind: protocol-element
summary: 'Three packet types are defined for compressed TCP/IP: TYPE_IP (0x40) for non-TCP or uncompressible packets, UNCOMPRESSED_TCP (0x70) for the first packet of a connection (carrying the full header with the IP protocol field replaced by a connection index), and COMPRESSED_TCP (0x80) for subsequently compressed packets. TYPE_ERROR (0x00) is a pseudo-type used internally by the receive framer to signal a transmission error to the decompressor.'
section: 3.2.1
topics:
    - tcp
    - ip
