document: rfc-7817
kind: interoperability-note
summary: A certificate can include only a single CN-ID. If a mail service runs on multiple hosts, each host must either use a different certificate with its own CN-ID, use a single certificate with multiple DNS-IDs, or use a single certificate with a wildcard CN-ID.
