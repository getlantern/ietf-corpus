document: rfc-2765
kind: design-rationale
summary: 'All translator operations are stateless: the translator operates independently on each packet and retains no state between packets. This allows redundant translator boxes without coordination, and allows the two directions of a TCP connection to traverse different translator boxes.'
section: "1.1"
topics:
    - ip
    - v6ops
