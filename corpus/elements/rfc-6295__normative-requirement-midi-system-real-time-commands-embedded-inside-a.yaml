document: rfc-6295
kind: normative-requirement
summary: MIDI System Real-Time commands embedded inside a host MIDI command on a DIN cable MUST be extracted and coded as separate commands in the MIDI list. The host command and the extracted System Real-Time command SHOULD appear in the same MIDI list, with the System Real-Time command timestamped at its original embedded position.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
