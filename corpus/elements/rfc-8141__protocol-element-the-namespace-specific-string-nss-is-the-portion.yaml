document: rfc-8141
kind: protocol-element
summary: The Namespace Specific String (NSS) is the portion of a URN that is unique within a given URN namespace and conforms to that namespace's definition. The NSS now permits '/', '~', and '&' characters that were disallowed by RFC 2141, enabling encapsulation of hierarchical names from non-URN identifier systems.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
