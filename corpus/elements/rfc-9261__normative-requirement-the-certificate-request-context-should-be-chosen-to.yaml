document: rfc-9261
kind: normative-requirement
summary: The certificate_request_context SHOULD be chosen to be unpredictable to the peer (e.g., generated randomly) in order to prevent an attacker with temporary access to the peer's private key from precomputing valid authenticators.
section: "4"
rfc2119_level: SHOULD
