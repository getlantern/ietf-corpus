document: rfc-8489
kind: normative-requirement
summary: Unknown comprehension-optional attributes MUST be ignored. Unknown comprehension-required attributes in a request cause the server to reply with error 420 (Unknown Attribute) and include an UNKNOWN-ATTRIBUTES attribute listing them. Unknown comprehension-required attributes in a response cause the transaction to be considered failed.
section: "6.3"
rfc2119_level: MUST
topics:
    - nat
