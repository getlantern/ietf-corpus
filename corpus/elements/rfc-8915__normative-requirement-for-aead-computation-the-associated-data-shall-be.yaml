document: rfc-8915
kind: normative-requirement
summary: For AEAD computation the associated data SHALL be the NTP header plus all extension fields preceding the Authenticator EF; the C2S key SHALL be used for client-to-server packets; the S2C key SHALL be used for server-to-client packets.
section: "5.6"
rfc2119_level: SHALL
topics:
