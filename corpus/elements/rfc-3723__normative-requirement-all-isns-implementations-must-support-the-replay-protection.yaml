document: rfc-3723
kind: normative-requirement
summary: All iSNS implementations MUST support the replay protection mechanisms of IPsec. ESP in tunnel mode MUST be implemented. To provide data origin authentication and integrity with ESP, HMAC-SHA1 MUST be supported. If iSNS distributes security policy, authentication, data integrity, and confidentiality MUST be supported and used.
section: 2.6.4
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
