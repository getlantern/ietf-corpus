document: rfc-2575
kind: state-machine
summary: 'The isAccessAllowed procedure follows five sequential steps: (1) look up contextName in vacmContextTable — absent yields noSuchContext; (2) look up (securityModel, securityName) in vacmSecurityToGroupTable — absent yields noGroupName; (3) look up (groupName, contextName, securityModel, securityLevel) in vacmAccessTable — absent yields noAccessEntry; (4) select the view by viewType — empty viewName yields noSuchView; (5) check variableName against the selected MIB view — not in view yields notInView, otherwise return accessAllowed.'
section: "3.2"
topics:
