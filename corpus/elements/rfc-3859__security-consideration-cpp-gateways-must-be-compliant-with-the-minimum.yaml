document: rfc-3859
kind: security-consideration
summary: 'CPP gateways MUST be compliant with the minimum security requirements of all presence protocols with which they interface. The introduction of gateways creates new risks: end-to-end confidentiality and integrity can only be preserved if a common presence format (PIDF) is supported by all interfacing protocols.'
section: "4"
topics:
