document: rfc-5196
kind: design-rationale
summary: A SIP URI scheme can represent voice, video, or messaging services, making it ambiguous for watchers processing presence information. This extension maps RFC 3840 UA capability feature tags into PIDF XML so watchers can make rational decisions about how to contact a presentity before initiating communication.
section: "1.1"
topics:
    - sip
    - realtime
