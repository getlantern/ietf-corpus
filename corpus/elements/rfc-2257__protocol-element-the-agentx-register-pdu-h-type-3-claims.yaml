document: rfc-2257
kind: protocol-element
summary: 'The agentx-Register-PDU (h.type=3) claims a MIB region. Key fields: r.timeout (region-specific timeout override), r.priority (1-255, lower takes precedence, default 255), r.region (OID), optional r.range_subid and r.upper_bound to register a conceptual row range in a single PDU.'
