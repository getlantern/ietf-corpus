document: rfc-7048
kind: interoperability-note
summary: For RFC 4861 Section 6.3.6 default router preference, an NCE in the UNREACHABLE state is not 'known to be reachable'. The text 'in any state other than INCOMPLETE' must be read as 'in any state other than INCOMPLETE or UNREACHABLE' to correctly deprioritize unreachable default routers.
section: "3"
topics:
