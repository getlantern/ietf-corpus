document: rfc-8310
kind: normative-requirement
summary: Implementations compliant with the (D)TLS profile MUST implement TLS session resumption without server-side state (RFC 5077), which eliminates the need for the server to retain cryptographic state longer than necessary. This updates RFC 7858.
section: "9"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - security
