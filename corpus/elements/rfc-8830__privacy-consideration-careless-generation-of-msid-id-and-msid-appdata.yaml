document: rfc-8830
kind: privacy-consideration
summary: Careless generation of msid-id and msid-appdata identifiers can leak privacy-sensitive information. The W3C Media Capture and Streams specification recommends using UUID class 3 or 4 as a basis for identifiers to avoid such leakage.
