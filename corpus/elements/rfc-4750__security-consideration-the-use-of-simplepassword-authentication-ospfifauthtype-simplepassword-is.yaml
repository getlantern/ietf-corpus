document: rfc-4750
kind: security-consideration
summary: The use of simplePassword authentication (ospfIfAuthType = simplePassword) is explicitly NOT recommended when there is concern about attacks on the OSPF system. Simple password authentication re-uses cleartext passwords per RFC 1704 and is only sufficient to protect against accidental misconfiguration, not adversarial attacks. When ospfIfAuthKey is read via SNMP, it always returns a zero-length octet string to prevent key disclosure.
section: "3"
topics:
    - routing
    - snmp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
