document: rfc-3165
kind: security-consideration
summary: Scripts retrieved via the pull model from remote URLs (FTP, HTTP) may be tampered with in transit; the Script MIB provides no integrity protection for the script content itself, so administrators should use secure URL schemes or out-of-band verification where integrity matters.
section: "10"
topics:
    - snmp
    - security
