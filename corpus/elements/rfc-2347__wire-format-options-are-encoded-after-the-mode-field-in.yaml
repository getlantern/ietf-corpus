document: rfc-2347
kind: wire-format
summary: 'Options are encoded after the mode field in RRQ/WRQ packets as a sequence of NULL-terminated opt/value pairs: |opc|filename|0|mode|0|opt1|0|value1|0|...|optN|0|valueN|0|. Each field is case-insensitive ASCII and NULL-terminated.'
section: Packet Formats
