document: rfc-6006
kind: normative-requirement
summary: If a PCE understands the P2MP flag but is not capable of P2MP computation, it MUST send a PCErr message with Error-Type=16, Error-Value=2, and the corresponding request MUST be cancelled at the PCC.
section: "3.7"
rfc2119_level: MUST
