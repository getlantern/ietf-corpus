document: rfc-8845
kind: design-rationale
summary: Encoding Groups were introduced to express system-level bandwidth constraints across multiple Individual Encodings. This addresses cases where devices cannot deal with multiple Encoding options simultaneously even when simultaneous transmission would otherwise be sensible (e.g., multicast to multiple Endpoints).
