document: rfc-8344
kind: design-rationale
summary: RFC 8344 updates RFC 7277 to support the Network Management Datastore Architecture (NMDA, RFC 8342). All 'config false' operational state data nodes are consolidated into the '/interfaces/interface' subtree rather than the separate '/interfaces-state/interface' subtree, eliminating the pre-NMDA split between configuration and operational state trees.
section: "1.1"
topics:
    - yang
    - netconf
    - ip
