document: rfc-5179
kind: protocol-element
summary: 'A Kerberos V domain-based principal name has three components: (0) service name, (1) hostname, (2) domain name, with a realm derived from the domain name treated as a hostname. For example, ''ldap@foo.example@ds1.foo.example'' maps to ''ldap/ds1.foo.example/foo.example@FOO.EXAMPLE''.'
section: "1"
topics:
    - security
