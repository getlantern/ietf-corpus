document: rfc-7050
kind: normative-requirement
summary: Clients MUST NOT send connectivity checks to addresses returned by the 'ipv4only.arpa.' query; network operators MUST NOT operate a server at those addresses. A separate PTR/A lookup is used instead to find connectivity check servers.
section: 3.2.1
rfc2119_level: MUST NOT
topics:
