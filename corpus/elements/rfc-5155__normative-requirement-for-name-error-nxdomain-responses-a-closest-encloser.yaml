document: rfc-5155
kind: normative-requirement
summary: For Name Error (NXDOMAIN) responses, a closest encloser proof for QNAME and an NSEC3 RR covering the wildcard at the closest encloser MUST be included in the response, proving both that QNAME does not exist and that no matching wildcard exists.
section: 7.2.2
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
