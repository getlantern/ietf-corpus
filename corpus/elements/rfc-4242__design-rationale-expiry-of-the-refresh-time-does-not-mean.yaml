document: rfc-4242
kind: design-rationale
summary: Expiry of the refresh time does not mean the client should remove its configuration data; the client should keep current data while attempting to refresh it, and may fall back to mechanisms other than DHCPv6 if refresh fails within a reasonable time.
section: "3"
topics:
