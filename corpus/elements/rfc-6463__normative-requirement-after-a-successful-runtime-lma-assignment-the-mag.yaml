document: rfc-6463
kind: normative-requirement
summary: After a successful runtime LMA assignment, the MAG MUST update its BULE to contain the r2LMA address from the Redirect option, MUST send all user traffic to the r2LMA address, and MUST send all subsequent binding refresh PBUs (lifetime extension, handoff, etc.) to the r2LMA address.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
