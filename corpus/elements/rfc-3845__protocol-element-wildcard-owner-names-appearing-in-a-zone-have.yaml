document: rfc-3845
kind: protocol-element
summary: Wildcard owner names appearing in a zone have the wildcard label ('*') treated as a literal symbol for purposes of generating NSEC RRs. Wildcard owner names appear in the Next Domain Name field without wildcard expansion.
