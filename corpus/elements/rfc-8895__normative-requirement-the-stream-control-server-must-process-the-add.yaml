document: rfc-8895
kind: normative-requirement
summary: The stream control server MUST process the 'add' field before the 'remove' field. If the result would be zero active resources, the update stream server MUST close the update stream; a stream cannot have zero resources.
section: "7.6"
rfc2119_level: MUST
topics:
