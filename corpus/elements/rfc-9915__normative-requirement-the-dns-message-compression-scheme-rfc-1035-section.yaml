document: rfc-9915
kind: normative-requirement
summary: The DNS message compression scheme (RFC 1035 Section 4.1.4) MUST NOT be used when encoding domain names in DHCPv6 options. All domain names are encoded using the technique in RFC 1035 Section 3.1.
section: "10"
rfc2119_level: MUST NOT
