document: rfc-4341
kind: normative-requirement
summary: The sender MAY send a data packet when pipe < cwnd but MUST NOT send a data packet when pipe >= cwnd. Every data packet sent increases pipe by 1.
section: "5"
rfc2119_level: MUST NOT
topics:
    - congestion
    - udp
