document: rfc-2665
kind: normative-requirement
summary: Standard MIBs do not include objects to return TDR test results; any needed result objects MUST be provided in the vendor-specific MIB. Implementation of the TDR and Loopback tests is not required.
section: 3.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
