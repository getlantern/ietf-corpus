document: rfc-7140
kind: normative-requirement
summary: A leaf node that no longer needs to be an Egress LSR SHOULD send an HSMP-D Label Withdraw <X,Y,L> to its upstream LSR U and an unsolicited HSMP-U Label Release <X,Y,Lu> to indicate the upstream path is no longer used.
section: 3.5.1
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
