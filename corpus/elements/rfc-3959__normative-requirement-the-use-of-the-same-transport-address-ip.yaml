document: rfc-3959
kind: normative-requirement
summary: The use of the same transport address (IP address plus port) in a session body and in an early-session body is NOT RECOMMENDED. Using different transport addresses to receive early and regular media makes it easy to detect the start of the regular media.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
