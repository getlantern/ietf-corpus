document: rfc-5588
kind: protocol-element
summary: 'GSS_Store_cred() defines six major_status return codes: GSS_S_COMPLETE (success), GSS_S_CREDENTIALS_EXPIRED (expired credentials), GSS_S_NO_CRED (no input credentials), GSS_S_UNAVAILABLE (store not available), GSS_S_DUPLICATE_ELEMENT (principal exists and overwrite_cred is FALSE), and GSS_S_FAILURE (other failure).'
section: "3"
