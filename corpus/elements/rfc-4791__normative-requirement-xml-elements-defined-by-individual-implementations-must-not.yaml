document: rfc-4791
kind: normative-requirement
summary: XML elements defined by individual implementations MUST NOT use the "urn:ietf:params:xml:ns:caldav" namespace; they should use a namespace they control. Processing of XML by CalDAV clients and servers MUST follow the rules in RFC 2518 Section 14.
section: "1.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
