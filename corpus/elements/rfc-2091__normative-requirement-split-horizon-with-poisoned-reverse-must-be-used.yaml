document: rfc-2091
kind: normative-requirement
summary: Split Horizon with Poisoned Reverse MUST be used to determine whether and how a route is advertised on an interface running Triggered RIP. Only the best route (not inferior alternatives) is poisoned.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
