document: rfc-2740
kind: protocol-element
summary: An Instance ID field in the OSPF packet header allows multiple separate OSPF protocol instances to run on a single link. Instance ID defaults to 0 and affects only reception of OSPF packets, cleanly replacing the haphazard IPv4 practice of reusing authentication fields for instance separation.
section: "2.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
