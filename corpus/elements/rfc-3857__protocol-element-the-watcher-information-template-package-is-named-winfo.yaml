document: rfc-3857
kind: protocol-element
summary: The watcher information template-package is named "winfo". Watcher information for any event package foo is denoted "foo.winfo". Recursive template-packaging is explicitly allowed, making "foo.winfo.winfo" a valid package name.
section: "4.1"
topics:
