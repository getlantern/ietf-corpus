document: rfc-3761
kind: security-consideration
summary: ENUM uses DNS which in its current form is an insecure protocol with no built-in data authenticity mechanism. A deployed ENUM service SHOULD include mechanisms to ameliorate DNS threats such as packet interception, ID guessing, name-based cache poisoning attacks, and denial of service. DNSSEC is recommended once deployed.
section: "6.1"
topics:
    - dns
    - security
