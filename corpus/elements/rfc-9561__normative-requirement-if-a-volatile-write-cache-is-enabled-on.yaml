document: rfc-9561
kind: normative-requirement
summary: If a volatile write cache is enabled on an NVMe namespace used as pNFS SCSI storage, the pNFS server (MDS) MUST use the NVMe Flush command to flush the volatile write cache to stable storage before LAYOUTCOMMIT returns.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
