document: rfc-6871
kind: security-consideration
summary: If a cryptographic attribute (e.g., SDES 'a=crypto:') is referenced by a latent configuration via an 'acap' attribute, the keying material MUST be included for formatting compliance but MUST NOT be a real value used for actual media exchange. The receiver of the 'lcfg' attribute MUST ignore those keying material values.
section: 3.3.5
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
