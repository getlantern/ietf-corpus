document: rfc-6221
kind: normative-requirement
summary: If the client-received message is already a Relay-Forward, the LDRA MUST set the hop-count field in the newly created Relay-Forward to the received hop-count value incremented by 1, as specified in RFC 3315.
section: "6.1"
rfc2119_level: MUST
topics:
