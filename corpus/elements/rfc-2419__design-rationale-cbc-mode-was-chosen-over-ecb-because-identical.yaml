document: rfc-2419
kind: design-rationale
summary: CBC mode was chosen over ECB because identical plaintext sequences produce different ciphertexts under chaining, complicating cryptanalysis. CBC mode is generally considered to require more computation to deduce a 64-bit DES key by analysis of the encrypted stream.
