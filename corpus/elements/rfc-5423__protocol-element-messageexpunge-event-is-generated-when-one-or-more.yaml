document: rfc-5423
kind: protocol-element
summary: MessageExpunge event is generated when one or more messages are expunged by IMAP CLOSE/EXPUNGE, POP3 DELE+QUIT, HTTP, or equivalent action. Parameters MUST include a mailbox identifier with UIDVALIDITY and a UID set, and MAY indicate the triggering access protocol.
section: "4.1"
topics:
    - email
