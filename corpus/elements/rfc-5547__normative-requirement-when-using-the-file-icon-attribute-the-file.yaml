document: rfc-5547
kind: normative-requirement
summary: When using the 'file-icon' attribute, the file sender MUST wrap the SDP body and icon bodies in a MIME multipart/related body, and implementations MUST implement the multipart/related MIME type. The SDP body MUST be the root body.
section: "8.8"
rfc2119_level: MUST
topics:
    - realtime
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
