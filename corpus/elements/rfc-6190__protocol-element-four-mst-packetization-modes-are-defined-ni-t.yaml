document: rfc-6190
kind: protocol-element
summary: 'Four MST packetization modes are defined: NI-T (non-interleaved, timestamp-based order recovery), NI-C (non-interleaved, CS-DON-based), NI-TC (combined timestamp and CS-DON), and I-C (interleaved, CS-DON-based). NI-T/NI-C/NI-TC target low-latency systems; I-C supports non-real-time applications.'
section: 4.5.2
topics:
