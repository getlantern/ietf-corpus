document: rfc-7285
kind: privacy-consideration
summary: ALTO clients reveal the IP addresses of endpoints they query (e.g., candidate peers in a P2P application) to the ALTO server, enabling the server to track client associations and activity patterns. Clients should use trusted ALTO servers and consider the privacy implications of the endpoint addresses included in queries.
section: "15.4"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
