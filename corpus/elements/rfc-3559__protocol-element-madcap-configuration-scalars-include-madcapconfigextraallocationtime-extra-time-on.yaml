document: rfc-3559
kind: protocol-element
summary: 'MADCAP configuration scalars include: madcapConfigExtraAllocationTime (extra time on each side of a lease for clock skew), madcapConfigNoResponseDelay (client wait time for a server response), madcapConfigOfferHold (server hold time after an OFFER before a REQUEST is expected), madcapConfigResponseCacheInterval (0–300 s duplicate-detection window), and madcapConfigClockSkewAllowance (threshold for Excessive Clock Skew errors).'
section: "4"
topics:
