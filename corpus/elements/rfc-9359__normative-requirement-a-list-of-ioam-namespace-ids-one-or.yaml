document: rfc-9359
kind: normative-requirement
summary: A list of IOAM Namespace-IDs (one or more) MUST be included in the IOAM Capabilities Query Container; if present, the Default-Namespace-ID 0x0000 MUST be placed at the beginning of the list, and any duplicate occurrences of 0x0000 MUST be disregarded.
section: "3.1"
rfc2119_level: MUST
topics:
    - measurement
