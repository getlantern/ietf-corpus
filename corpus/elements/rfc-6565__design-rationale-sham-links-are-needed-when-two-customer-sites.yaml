document: rfc-6565
kind: design-rationale
summary: Sham links are needed when two customer sites are connected by an intra-area backdoor link, because OSPF route preference rules would favor that link over the inter-area VPN backbone path. The sham link makes the VPN backbone appear as an intra-area link to compete correctly.
section: "5"
topics:
