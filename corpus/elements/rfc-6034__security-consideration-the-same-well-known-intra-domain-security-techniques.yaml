document: rfc-6034
kind: security-consideration
summary: The same well-known intra-domain security techniques applicable to GLOP apply to UBM. Dynamic allocation within a prefix may reduce exposure to denial-of-service attacks because nodes compete for addresses only within an individual organization's prefix rather than across an entire AS.
section: "5"
topics:
