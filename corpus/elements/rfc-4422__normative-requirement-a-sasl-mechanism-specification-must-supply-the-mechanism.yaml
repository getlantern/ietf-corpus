document: rfc-4422
kind: normative-requirement
summary: 'A SASL mechanism specification MUST supply: the mechanism name (which MUST be registered with IANA), the series of server-challenges and client-responses, whether the mechanism is client-first/server-first/variable, whether the server sends additional data on success, whether a security layer is offered, and (if so) the security services and their implementation.'
section: "5"
rfc2119_level: MUST
topics:
    - security
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
