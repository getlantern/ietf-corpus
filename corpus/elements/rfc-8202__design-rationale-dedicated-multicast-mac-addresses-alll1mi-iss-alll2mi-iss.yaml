document: rfc-8202
kind: design-rationale
summary: Dedicated multicast MAC addresses (AllL1MI-ISs, AllL2MI-ISs) are used for non-zero IID PDUs on broadcast circuits so that legacy routers silently ignore these PDUs rather than misinterpreting them as standard instance traffic, preventing LSDB corruption and incorrect adjacency/DIS state in legacy systems.
section: 3.6.1
topics:
    - routing
