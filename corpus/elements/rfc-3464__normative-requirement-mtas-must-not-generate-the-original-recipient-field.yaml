document: rfc-3464
kind: normative-requirement
summary: MTAs MUST NOT generate the Original-Recipient field of a DSN unless the mail transfer protocol provides the address originally specified by the sender. Ordinary SMTP does not provide this guarantee; the SMTP DSN extension (RFC 3461) does.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
