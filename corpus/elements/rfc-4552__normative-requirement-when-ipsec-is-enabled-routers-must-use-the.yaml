document: rfc-4552
kind: normative-requirement
summary: When IPsec is enabled, routers MUST use the first IPv6 address with the 'LA-bit' set from intra-area-prefix-LSAs in the transit area as source and destination addresses for virtual link packets, making these addresses predictable for SPD/SAD installation.
