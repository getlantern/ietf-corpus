document: rfc-7623
kind: protocol-element
summary: For per-I-SID load-balancing (Single-Active mode), each PE in a redundancy group is assigned a unique B-MAC address. Implementations MAY use either a shared B-MAC for all Single-Active segments or a dedicated B-MAC per segment; both models are interoperable.
section: 6.2.2.1
topics:
    - mpls
    - routing
