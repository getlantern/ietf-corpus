document: rfc-2287
kind: interoperability-note
summary: A collision can occur in sysApplElmtPastRunTable when a new process under the same invocation ID is assigned the same native process ID as a previous entry. The specification states the new entry replaces the old entry; the conditions for this are unlikely but possible.
section: "7.2"
topics:
    - snmp
