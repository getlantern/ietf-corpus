document: rfc-2865
kind: protocol-element
summary: The State attribute (Type=24) is used in challenge/response authentication to correlate an Access-Challenge with the subsequent Access-Request. Only 0 or 1 instances of State SHOULD be present in a request; it is passed opaquely and MUST NOT be modified by forwarding servers.
section: "5.24"
