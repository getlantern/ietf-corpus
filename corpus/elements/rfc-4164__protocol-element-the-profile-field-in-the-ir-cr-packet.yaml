document: rfc-4164
kind: protocol-element
summary: The Profile field in the IR-CR packet is abbreviated to the 8 least significant bits (LSBs) of the profile identifier. It selects the highest-number profile in the channel state parameter PROFILES that matches these 8 LSBs.
section: 3.5.2
