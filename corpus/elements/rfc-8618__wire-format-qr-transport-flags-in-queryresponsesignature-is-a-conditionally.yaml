document: rfc-8618
kind: wire-format
summary: '''qr-transport-flags'' in QueryResponseSignature is a conditionally mandatory unsigned integer: bit 0 encodes IP version (0=IPv4, 1=IPv6); bits 1-4 encode transport (0=UDP, 1=TCP, 2=TLS, 3=DTLS, 4=HTTPS, 15=non-standard, 5-14 reserved); bit 5 indicates trailing bytes in the Query packet.'
section: 7.3.2.3.2
