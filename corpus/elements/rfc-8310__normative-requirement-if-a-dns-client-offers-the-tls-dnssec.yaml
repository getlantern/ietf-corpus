document: rfc-8310
kind: normative-requirement
summary: If a DNS client offers the TLS DNSSEC chain extension it MUST be capable of validating the full DNSSEC authentication chain to the leaf; if the supplied chain does not validate the client MUST ignore it and validate only via other supplied credentials.
section: 8.2.2
rfc2119_level: MUST
topics:
    - dns
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
