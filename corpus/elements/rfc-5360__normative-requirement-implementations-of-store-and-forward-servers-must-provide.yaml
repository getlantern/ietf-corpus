document: rfc-5360
kind: normative-requirement
summary: Implementations of store-and-forward servers MUST provide a mechanism for delivering encrypted and integrity-protected messages to their user agents, to protect the unguessable URIs used in permission documents when SIPS cannot be used end-to-end.
