document: rfc-4930
kind: protocol-element
summary: The EPP <greeting> element contains <svID> (server name), <svDate> (current UTC date/time), and <svcMenu> (supported versions, languages, object namespace URIs, optional extensions). It also contains a <dcp> (data collection policy) element describing the server's privacy practices.
section: "2.4"
