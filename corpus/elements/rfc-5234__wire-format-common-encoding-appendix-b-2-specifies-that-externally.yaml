summary: 'Common encoding (Appendix B.2) specifies that externally, data are represented as ''network virtual ASCII'': 7-bit US-ASCII in an 8-bit field with the high (8th) bit set to zero, in network byte order (higher-valued bytes on the left, sent first).'
