document: rfc-1869
kind: normative-requirement
summary: The 512-character limit on SMTP command line length is amended to apply only to command lines without parameters. Implementations supporting extensions must support 512 plus the sum of all maximum parameter lengths for all supported extensions.
section: 4.1.2
rfc2119_level: MUST
topics:
    - email
