document: rfc-5802
kind: security-consideration
summary: If authentication information is stolen from the database, an attacker who also eavesdrops on or impersonates a server can impersonate the user to all servers using the same hash function, password, iteration count, and salt. Using randomly generated salts is therefore critical.
section: "9"
topics:
