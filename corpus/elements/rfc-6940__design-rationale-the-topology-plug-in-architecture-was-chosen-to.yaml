document: rfc-6940
kind: design-rationale
summary: The Topology Plug-in architecture was chosen to allow structured (DHT) and unstructured overlay algorithms to share a common RELOAD protocol framework. Chord is mandatory-to-implement for baseline interoperability while the pluggable interface allows algorithm selection optimized for specific applications.
section: 1.2.4
