document: rfc-9793
kind: registry
summary: 'IANA assigned codepoint 41 to the BIER attribute in the ''BGP Path Attributes'' registry. A new ''BGP BIER TLV and Sub-TLV Types'' registry was created under the BGP Parameters registry group with a 2-octet type field (values 0–65535, 0 reserved), allocated First Come First Served. Initial values: 0=Reserved, 1=BIER TLV, 2=MPLS Encapsulation sub-TLV, 3=non-MPLS Encapsulation sub-TLV, 4=BIER Nexthop sub-TLV.'
section: "8"
topics:
