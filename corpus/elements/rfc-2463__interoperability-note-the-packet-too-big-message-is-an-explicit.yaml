document: rfc-2463
kind: interoperability-note
summary: The Packet Too Big message is an explicit exception to the rule prohibiting ICMPv6 errors in response to multicast/broadcast packets; it MUST be sent even for multicast-destined packets to enable Path MTU Discovery to function for IPv6 multicast.
section: "3.2"
topics:
    - ip
    - multicast
