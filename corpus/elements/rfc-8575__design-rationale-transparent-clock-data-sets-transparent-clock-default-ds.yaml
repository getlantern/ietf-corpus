summary: Transparent clock data sets ('transparent-clock-default-ds' and 'transparent-clock-port-ds-list') are placed as singletons at the root level of the managed product, reflecting how most TC products interpret IEEE Std 1588-2008 subclauses 8.3.1 and 10.1, rather than per-instance.
