document: rfc-6344
kind: protocol-element
summary: 'The Signal Type field (16 bits) in the VCAT TLV identifies the elementary signal carried by all VCG members. Defined values include: 1=VT1.5 SPE/VC-11, 2=VT2 SPE/VC-12, 3=STS-1 SPE/VC-3, 4=STS-3c SPE/VC-4, 11=ODU1, 12=ODU2, 13=ODU3, 21=T1, 22=E1, 23=E3, 24=T3. Signal types can never be mixed in a VCG.'
section: "5.2"
topics:
    - routing
    - mpls
    - registry
