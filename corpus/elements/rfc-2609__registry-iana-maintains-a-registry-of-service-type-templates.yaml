document: rfc-2609
kind: registry
summary: IANA maintains a registry of service type templates, including both the templates themselves and all previous versions, keyed by naming convention '<service-type>.<version-no>.<langtag>'. Submissions are reviewed by a Designated Expert appointed by the IESG and require a security considerations section and author contact information.
