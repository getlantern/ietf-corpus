document: rfc-1331
kind: registry
summary: The PPP Protocol field values are assigned by IANA (IANA@isi.edu). Current assignments include network-layer protocols (0x0001–0x3FFF), associated NCPs (0x8000–0xBFFF), low-volume protocols (0x4000–0x7FFF), and link-layer control protocols (0xC000–0xFFFF). Developers of new protocols MUST obtain a number from IANA.
section: "3.1"
