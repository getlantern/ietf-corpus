document: rfc-9175
kind: normative-requirement
summary: Echo option values MUST be set by the CoAP server such that the risk associated with unintended reuse can be managed. If uniqueness relies on randomness, a secure PRNG and truly random seeds are essential; pseudorandom numbers must not be reused after reboot without fresh seeds or persistent state.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - crypto
