document: rfc-9725
kind: interoperability-note
summary: WHIP updates RFC 8840 (Trickle ICE for SIP) by specifying that a WHIP session receiving updated 'ice-pwd' and 'ice-ufrag' attributes MUST treat the request as an ICE restart rather than discarding it as RFC 8840 requires, enabling ICE restarts via HTTP PATCH.
section: 4.3.3
topics:
    - webrtc
    - realtime
