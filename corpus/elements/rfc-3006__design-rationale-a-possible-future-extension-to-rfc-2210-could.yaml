document: rfc-3006
kind: design-rationale
summary: A possible future extension to RFC 2210 could divide the parameter number space so that parameters of the form x1xxxxxx are silently ignored if unrecognized, while x0xxxxxx cause an error, analogous to RSVP's class-num high-bit handling. This is noted as a direction for future work but not mandated here.
section: "5"
topics:
