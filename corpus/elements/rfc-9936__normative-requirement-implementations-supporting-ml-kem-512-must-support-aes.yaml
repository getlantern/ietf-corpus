document: rfc-9936
kind: normative-requirement
summary: Implementations supporting ML-KEM-512 MUST support AES-Wrap-128 (id-aes128-wrap). Implementations supporting ML-KEM-768 or ML-KEM-1024 MUST support AES-Wrap-256 (id-aes256-wrap).
