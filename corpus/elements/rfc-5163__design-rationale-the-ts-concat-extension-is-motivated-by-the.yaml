document: rfc-5163
kind: design-rationale
summary: The TS-Concat extension is motivated by the need to carry MPEG-2 control plane signalling (PSI/SI) in GSE, which has no native TS Packet support. It provides a uniform mechanism usable across both ULE and GSE without requiring protocol-specific changes to either encapsulation.
section: "1"
