document: rfc-7677
kind: registry
summary: 'A new IANA registry ''SASL SCRAM Family Mechanisms'' is created, extending the existing SASL mechanism registry with two new fields: Minimum iteration-count and Associated OID. Existing SCRAM-SHA-1 and SCRAM-SHA-1-PLUS entries are migrated into it with Minimum iteration-count 4096 and OID 1.3.6.1.5.5.14.'
section: "5.2"
