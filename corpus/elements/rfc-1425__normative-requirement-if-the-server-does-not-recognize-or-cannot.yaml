document: rfc-1425
kind: normative-requirement
summary: If the server does not recognize or cannot implement one or more MAIL FROM or RCPT TO parameters, it MUST return code 555. If temporarily unable to accommodate parameters, it SHOULD return code 455.
section: "6.1"
rfc2119_level: MUST
