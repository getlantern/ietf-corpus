document: rfc-8296
kind: wire-format
summary: The BIFT-id field is 20 bits wide and identifies a particular Bit Index Forwarding Table (BIFT). In MPLS networks it carries a locally significant downstream-assigned MPLS label; in non-MPLS networks it is a domain-wide unique identifier for a specific <SD, SI, BSL> triple.
