document: rfc-7788
kind: normative-requirement
summary: All internal devices running DHCP servers on links where auto-detection is used MUST ignore or reject DHCP-Requests containing a DHCP user class consisting of the ASCII string "HOMENET". The DHCP client performing auto-detection MUST include this user class in all requests.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
