document: rfc-2848
kind: normative-requirement
summary: When included data is carried within a PINT service request, the Content Type entity header of the enclosing SIP message MUST be set to 'multipart'. The first MIME part MUST contain an SDP session description.
section: 3.5.1
rfc2119_level: MUST
