document: rfc-9761
kind: interoperability-note
summary: If an IoT device uses a DNS resolver not signaled by the network (via DHCP, DNR RFC 9463, or DDR RFC 9462), MUD policy enforcement based on domain names cannot be applied. Use of a non-network-designated DNS resolver is generally incompatible with MUD.
section: "4.2"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
