document: rfc-5055
kind: protocol-element
summary: 'Fourteen wantBack OIDs under id-swb (pkix arc 18) specify objects the client wants returned: including id-swb-pkc-best-cert-path, id-swb-pkc-revocation-info, id-swb-pkc-public-key-info, id-swb-pkc-all-cert-paths, id-swb-pkc-ee-revocation-info, id-swb-pkc-CAs-revocation-info, attribute certificate equivalents, and id-swb-relayed-responses. All servers MUST support id-swb-pkc-cert and id-swb-pkc-public-key-info.'
section: 3.2.3
topics:
    - pkix
    - registry
