document: rfc-9897
kind: normative-requirement
summary: If version negotiation fails or the Multipath Capable Feature is not present in the DCCP-Request or DCCP-Response packets, the MP-DCCP connection either MUST fall back to regular DCCP or MUST close the connection. If the Key Type cannot be agreed in the handshake, the MP-DCCP connection MUST also fall back to not using MP-DCCP.
section: "3.1"
rfc2119_level: MUST
topics:
    - multipath
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
