document: rfc-2461
kind: protocol-element
summary: 'Hosts maintain four conceptual data structures per interface: Neighbor Cache (per-neighbor link-layer address, IsRouter flag, and NUD state), Destination Cache (next-hop mapping updated by Redirects), Prefix List (on-link prefixes from RAs with invalidation timers; link-local prefix has infinite lifetime), and Default Router List (routers from RAs, favoring reachable routers).'
section: "5.1"
topics:
