document: rfc-9835
kind: protocol-element
summary: AC status tracking maintains both 'admin-status' (read-write, with 'last-change' timestamp) and 'oper-status' (read-only, with 'last-change' timestamp). A mismatch between administrative and operational status can serve as an anomaly detection trigger.
