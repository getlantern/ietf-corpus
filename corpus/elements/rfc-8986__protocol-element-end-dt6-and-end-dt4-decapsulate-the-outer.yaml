document: rfc-8986
kind: protocol-element
summary: End.DT6 and End.DT4 decapsulate the outer IPv6 header and perform a lookup in a specific IPv6 or IPv4 FIB table T, respectively. End.DT46 handles both IPv4 and IPv6 inner packets using separate FIB tables T4 and T6. These are the per-VRF VPN label equivalents in SRv6.
section: "4.6"
topics:
