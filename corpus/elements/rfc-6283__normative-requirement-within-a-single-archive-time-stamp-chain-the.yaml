document: rfc-6283
kind: normative-requirement
summary: Within a single Archive Time-Stamp Chain, the digest algorithms used for the hash trees and the Time-Stamp Tokens MUST be the same. When TSA algorithms change, a new ATSC MUST be started using an equal or stronger digest algorithm.
section: 4.1.1
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
