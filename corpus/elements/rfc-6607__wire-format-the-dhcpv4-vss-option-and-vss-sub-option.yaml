document: rfc-6607
kind: wire-format
summary: 'The DHCPv4 VSS option and VSS sub-option share an identical on-wire payload: a 1-octet Code field, a 1-octet Length field (minimum value 1), a 1-octet Type field, and a variable-length VSS Information field whose encoding depends on the Type value.'
