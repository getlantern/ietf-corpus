document: rfc-8156
kind: protocol-element
summary: 'Twelve message types are defined for failover communication: BNDUPD (24), BNDREPLY (25), POOLREQ (26), POOLRESP (27), UPDREQ (28), UPDREQALL (29), UPDDONE (30), CONNECT (31), CONNECTREPLY (32), DISCONNECT (33), STATE (34), and CONTACT (35). All failover traffic is carried over a long-lived TCP connection on port 647.'
section: "5.3"
