document: rfc-5592
kind: normative-requirement
summary: Credentials presented by a notification receiver MUST match the expected value(s) for a given transport address, and ownership of the credentials MUST be properly cryptographically verified, because notification authorization is performed before credentials are verified.
section: "9.2"
rfc2119_level: MUST
topics:
    - snmp
    - security
