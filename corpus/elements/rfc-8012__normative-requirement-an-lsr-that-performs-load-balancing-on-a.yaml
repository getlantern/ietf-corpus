document: rfc-8012
kind: normative-requirement
summary: An LSR that performs load balancing on a label MUST set the L flag in the echo reply; an LSR that performs IP-based load balancing MUST NOT set the L flag. An LSR that pushes ELI/EL MUST set the E flag in the echo reply; an LSR that does not push ELI/EL MUST NOT set the E flag.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
