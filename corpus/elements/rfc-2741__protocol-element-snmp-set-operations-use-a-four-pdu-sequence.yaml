document: rfc-2741
kind: protocol-element
summary: 'SNMP Set operations use a four-PDU sequence: agentx-TestSet-PDU (validation), agentx-CommitSet-PDU (apply), agentx-UndoSet-PDU (rollback on failure), agentx-CleanupSet-PDU (resource release). The CommitSet, UndoSet, and CleanupSet PDUs consist of the AgentX header only.'
section: 6.2.8
topics:
    - snmp
