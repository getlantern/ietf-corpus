document: rfc-3320
kind: normative-requirement
summary: Any UDVM memory addresses not yet initialized MUST be set to 0; however a decompressor MUST NOT rely on reserved addresses 10–31 being zero, as future SigComp versions may assign Useful Values there.
section: "7.2"
rfc2119_level: MUST
