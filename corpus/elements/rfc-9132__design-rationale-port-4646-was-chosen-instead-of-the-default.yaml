document: rfc-9132
kind: design-rationale
summary: Port 4646 was chosen instead of the default CoAP (D)TLS port 5684 to avoid CoAP service discovery, allow differentiated behavior when a DOTS gateway and an IoT gateway are co-located, and to simplify deployment within LANs where the default router acts as DOTS server without requiring sophisticated discovery.
