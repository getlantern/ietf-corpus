document: rfc-5306
kind: interoperability-note
summary: A router that does not support the restart capability will ignore the Restart TLV and reinitialize the adjacency normally, returning an IIH without the Restart TLV. On Point-to-Point links this IIH is treated as an implicit acknowledgement; on LANs, synchronization can still proceed if at least one other neighbor supports restart.
section: 3.3.1
topics:
    - routing
