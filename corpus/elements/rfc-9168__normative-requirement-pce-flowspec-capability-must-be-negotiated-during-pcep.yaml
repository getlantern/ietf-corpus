document: rfc-9168
kind: normative-requirement
summary: PCE FlowSpec capability MUST be negotiated during PCEP session setup even if it was previously advertised in IGP. A PCEP peer that advertised FlowSpec support in the IGP is not obliged to support it on any given PCEP session.
section: 3.2.1.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
