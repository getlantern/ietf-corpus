document: rfc-8669
kind: design-rationale
summary: The Originator SRGB TLV is provided as an optional alternative to BGP-LS for advertising the local SRGB, but without topology or peer SID information, making it inapplicable for traffic engineering. BGP-LS remains the preferred method for SRGB advertisement.
