document: rfc-6505
kind: normative-requirement
summary: The MS MUST support <modifyjoin> and <unjoin> for any stream that was established using <join> and that has not already been removed. The MS MUST configure streams as stated by <modifyjoin> child elements.
section: 4.2.2.3
rfc2119_level: MUST
