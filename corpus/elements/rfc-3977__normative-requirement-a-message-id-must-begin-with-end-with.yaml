document: rfc-3977
kind: normative-requirement
summary: A message-id MUST begin with '<', end with '>', contain no '>' except at the end, be between 3 and 250 octets in length, and contain only printable US-ASCII characters. If a server cannot determine a message-id from the article itself it MUST synthesize one.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
