document: rfc-8746
kind: protocol-element
summary: Tag 1040 defines a column-major multi-dimensional array with the same structure as tag 40 except the first dimension is considered contiguous. It is allocated from the 'first come first served' space (256+) to signal that row-major (tag 40) is preferred.
