document: rfc-8913
kind: security-consideration
summary: In authenticated mode, timestamps are transmitted in the clear and are not cryptographically protected; only the rest of the TWAMP-Control message has encryption-level protection. Operators must weigh the trade-off between cryptographic protection and timestamp accuracy when selecting a mode.
section: "5.2"
topics:
