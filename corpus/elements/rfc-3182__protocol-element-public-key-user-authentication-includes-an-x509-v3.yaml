document: rfc-3182
kind: protocol-element
summary: Public key user authentication includes an X509_V3_CERT or PGP_CERT CREDENTIAL attribute and a DIGITAL_SIGNATURE attribute (signed with the user's private key). The verifier uses the public key in the certificate to authenticate the user.
