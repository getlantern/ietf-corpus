document: rfc-7643
kind: normative-requirement
summary: The 'groups' attribute has a mutability of 'readOnly'; group membership changes MUST be applied via the 'Group' resource. When a 'Group' resource is exposed, the 'value' sub-attribute MUST be the group 'id' and '$ref' must be the URI of the corresponding Group resource.
section: 4.1.2
rfc2119_level: MUST
topics:
    - json
