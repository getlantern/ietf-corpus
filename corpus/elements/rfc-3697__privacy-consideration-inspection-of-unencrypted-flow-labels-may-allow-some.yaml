document: rfc-3697
kind: privacy-consideration
summary: Inspection of unencrypted Flow Labels may allow some forms of traffic analysis by revealing structure of the underlying communications. Even if the Flow Label were encrypted, its presence as a constant value in a fixed position might assist traffic analysis and cryptanalysis.
section: "5"
topics:
