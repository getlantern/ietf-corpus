document: rfc-9346
kind: protocol-element
summary: The Inter-AS Reachability Information TLV (type 141) is defined to advertise inter-AS TE links within an IS-IS domain. It contains a 4-octet Router ID, a 3-octet Default Metric, a 1-octet Flags field (S bit, D bit, and reserved), a 1-octet Sub-TLVs Length, and 0-246 octets of sub-TLVs.
section: "3.2"
topics:
