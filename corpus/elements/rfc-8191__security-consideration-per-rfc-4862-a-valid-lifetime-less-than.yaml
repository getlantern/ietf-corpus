document: rfc-8191
kind: security-consideration
summary: Per RFC 4862, a Valid Lifetime less than 2 hours in an unauthenticated RA is ignored; therefore the deprecated old HNP in an unauthenticated RA SHOULD use Valid Lifetime of exactly 2 hours. Setting Valid Lifetime to 0 is only acceptable when MAG-to-MN signaling legality can be guaranteed.
section: "7"
topics:
    - mobility
    - ip
    - security
