document: rfc-6313
kind: security-consideration
summary: The security considerations for this extension inherit from RFC 5101. A Collecting Process that does not support structured data can safely ignore unrecognized Structured Data IEs or discard Data Records containing them, providing graceful degradation without protocol-level failures.
