document: rfc-8968
kind: normative-requirement
summary: All Babel over DTLS nodes MUST act as DTLS servers on the babel-dtls UDP port (6699) and MUST listen for unencrypted Babel traffic on the babel port (6696); these two ports MUST be distinct.
section: "2.1"
rfc2119_level: MUST
topics:
