document: rfc-9780
kind: normative-requirement
summary: For active tail mode, on the ingress LSR bfd.RequiredMinRxInterval MUST be nonzero (allowing egress LSRs to send BFD Control packets), and on the egress LSR bfd.SilentTail MUST be set to zero.
