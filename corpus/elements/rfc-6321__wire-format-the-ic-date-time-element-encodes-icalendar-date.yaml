document: rfc-6321
kind: wire-format
summary: The IC:date-time element encodes iCalendar DATE-TIME values with '-' separating date components and ':' separating time components (e.g., '2011-05-17T12:00:00'). Unlike W3C XML Schema, xCal does not use embedded UTC offsets; timezone information is conveyed via the TZID parameter.
section: 3.6.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
