document: rfc-6910
kind: normative-requirement
summary: 'The callee''s monitor MUST insert a Call-Info header field with ''purpose=call-completion'' in the final response and at least one non-100 provisional response to the initial INVITE when enabling the CC feature. The provisional response SHOULD be sent reliably if the INVITE contained ''Supported: 100rel''.'
section: "7.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
