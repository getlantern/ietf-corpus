document: rfc-2954
kind: normative-requirement
summary: The frPVCEndptRowStatus object MUST initially be set to createAndWait(5) when creating new PVC endpoint rows. It MAY NOT be set to active(1) unless frPVCEndptInMaxFrameSize, frPVCEndptInBc, frPVCEndptInBe, frPVCEndptInCIR, frPVCEndptOutMaxFrameSize, frPVCEndptOutBc, frPVCEndptOutBe, and frPVCEndptOutCIR all exist in the row.
section: "3.3"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
