document: rfc-3768
kind: protocol-element
summary: The Priority field is an 8-bit unsigned integer. Priority 255 is reserved for the IP address owner; values 1–254 are used by backup routers (default 100); priority 0 signals the current Master is releasing responsibility, triggering rapid Backup-to-Master transition.
section: 5.3.4
topics:
