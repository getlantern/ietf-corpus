document: rfc-4012
kind: protocol-element
summary: Three new policy attributes — mp-import, mp-export, and mp-default — are introduced in the aut-num class. Each incorporates an optional afi specification; if absent, the policy applies to all four address families (ipv4.unicast, ipv4.multicast, ipv6.unicast, ipv6.multicast).
