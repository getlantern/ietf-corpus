document: rfc-8294
kind: normative-requirement
summary: Address Families and Subsequent Address Families MUST NOT be directly added to the iana-routing-types YANG module. They must instead be added to the 'Address Family Numbers' and 'Subsequent Address Family Identifiers (SAFI) Parameters' IANA registries respectively.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - registry
    - yang
    - routing
