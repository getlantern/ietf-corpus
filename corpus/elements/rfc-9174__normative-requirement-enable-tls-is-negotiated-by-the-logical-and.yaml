document: rfc-9174
kind: normative-requirement
summary: Enable TLS is negotiated by the logical AND of the two CAN_TLS flags. The RECOMMENDED policy is to require TLS for all sessions. If the negotiated Enable TLS state is unacceptable per local security policy, the entity SHALL terminate the session with reason code 'Contact Failure'.
section: "4.3"
rfc2119_level: RECOMMENDED
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
