document: rfc-7783
kind: normative-requirement
summary: An AFFINITY RECORD asking for an RBridge to be its own child in a tree rooted at that RBridge, or asking for a non-adjacent non-self nickname as a child, MUST be ignored as it conflicts with TRILL distribution tree root determination or campus topology.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - multicast
