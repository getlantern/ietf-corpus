document: rfc-9369
kind: interoperability-note
summary: All ALPN codepoints specified to operate over QUIC version 1 can also operate over QUIC version 2, including "h3" (HTTP/3) and "doq" (DNS over QUIC). All QUIC extensions defined for version 1 also work with version 2 unless otherwise stated.
section: "7"
topics:
