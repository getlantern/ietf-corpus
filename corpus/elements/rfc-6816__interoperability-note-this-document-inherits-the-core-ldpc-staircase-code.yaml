summary: This document inherits the core LDPC-Staircase code specification and the Pseudo-Random Number Generator specification from RFC 5170, Sections 6 and 5.7 respectively. The RFC 5052-specific Formats and Procedures from RFC 5170 (Sections 4 and 5 except 5.7) are replaced by the FECFRAME-specific procedures defined here.
