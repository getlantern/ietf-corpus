document: rfc-5755
kind: normative-requirement
summary: Implementations MUST support the clearance attribute syntax from [X.501-1997] with untagged policyId. Implementations SHOULD support decoding the RFC3281 syntax, but MUST NOT output the clearance attribute as defined in RFC3281 (which used erroneous implicit tagging in the original definition).
section: 4.4.6
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
