document: rfc-6089
kind: wire-format
summary: The Binding Reference Sub-Option (Sub-Opt Type 2) encodes one or more 16-bit BID values; Sub-Opt Len divided by 2 gives the count of BIDs. Alignment requirement is 2n. At most one binding reference sub-option may appear per flow identification mobility option.
section: 4.2.1.3
topics:
    - ip
    - mobility
