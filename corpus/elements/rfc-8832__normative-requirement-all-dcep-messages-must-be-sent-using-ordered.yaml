document: rfc-8832
kind: normative-requirement
summary: All DCEP messages MUST be sent using ordered delivery and reliable transmission on the same outgoing stream as the user messages of the corresponding data channel, and MUST use the assigned PPID for DCEP (50). Other messages MUST NOT use this PPID.
section: "6"
rfc2119_level: MUST
