document: rfc-3981
kind: protocol-element
summary: The <serialization> element enables serialization of IRIS registry entities to file storage. It contains <result> derivatives (entities) and <serializedReferral> elements. Servers loading entities MUST place them in entity classes specified by 'registryType', 'entityClass', and 'entityName' attributes.
section: "5"
