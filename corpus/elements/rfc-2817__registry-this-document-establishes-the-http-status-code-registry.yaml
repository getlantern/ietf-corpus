document: rfc-2817
kind: registry
summary: This document establishes the HTTP Status Code Registry, defining the namespace for Status-Code tokens in HTTP responses. Initial values come from HTTP/1.1 (RFC 2616), WebDAV (RFC 2518, codes 420-424), WebDAV Advanced Collections (code 425), and this document (code 426). New values SHOULD be standards-track documents within the IETF Applications Area.
section: "7.1"
topics:
