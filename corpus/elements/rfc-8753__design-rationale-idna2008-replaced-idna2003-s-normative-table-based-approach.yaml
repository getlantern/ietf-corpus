document: rfc-8753
kind: design-rationale
summary: IDNA2008 replaced IDNA2003's normative table-based approach with property-based rules derived from Unicode properties, so that the standard would not be intrinsically tied to a particular Unicode version and could be applied to any Unicode version from approximately 5.0 forward.
