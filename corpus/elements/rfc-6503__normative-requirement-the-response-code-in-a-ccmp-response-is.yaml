document: rfc-6503
kind: normative-requirement
summary: The <response-code> in a CCMP response is REQUIRED and MUST be chosen from the codes listed in Section 5.4. The <version> parameter is REQUIRED in CCMP response messages and SHOULD NOT be included in CCMP request messages.
section: "5.2"
rfc2119_level: REQUIRED
topics:
    - realtime
