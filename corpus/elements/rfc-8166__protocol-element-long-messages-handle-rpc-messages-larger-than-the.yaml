document: rfc-8166
kind: protocol-element
summary: Long Messages handle RPC messages larger than the inline threshold. A Long Call uses a Position Zero Read chunk (all segments have Position=0) carrying the entire Payload stream; a Long Reply uses a single Reply chunk (a special Write chunk) pre-provisioned by the Requester to hold the entire reply Payload stream.
section: 3.5.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
