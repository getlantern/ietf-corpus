document: rfc-3195
kind: security-consideration
summary: BEEP provides communication security (wire protection) but not object integrity. A compromised device may generate incorrect messages undetectably, and relays or collectors can modify, insert, or delete messages without detection. Additional end-to-end techniques beyond BEEP are required to detect such compromises.
section: "10"
topics:
    - syslog
    - security
