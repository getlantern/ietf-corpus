document: rfc-3028
kind: registry
summary: 'IANA maintains a registry of Sieve capability strings on a first-come, first-served basis. Initial entries are: ''fileinto'', ''reject'', ''envelope'', and ''comparator-*'' (for each named comparator). Vendor extensions use names starting with ''vnd.''.'
