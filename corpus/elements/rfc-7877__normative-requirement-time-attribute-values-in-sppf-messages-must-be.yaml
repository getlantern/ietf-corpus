document: rfc-7877
kind: normative-requirement
summary: Time attribute values in SPPF messages MUST be expressed in UTC format without time-zone digits (e.g., '2010-05-30T09:30:10Z'). Use of an unqualified local time value is disallowed as it can lead to interoperability issues.
section: "3.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
