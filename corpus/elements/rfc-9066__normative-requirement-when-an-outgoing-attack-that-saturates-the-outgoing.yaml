document: rfc-9066
kind: normative-requirement
summary: When an outgoing attack that saturates the outgoing link from the Call Home DOTS server is detected and reported by a Call Home DOTS client, the Call Home DOTS client MUST continue to use the DOTS signal channel even if no traffic is received from the Call Home DOTS server.
section: 5.2.1
rfc2119_level: MUST
topics:
    - security
