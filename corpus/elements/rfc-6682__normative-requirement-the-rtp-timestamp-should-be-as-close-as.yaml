document: rfc-6682
kind: normative-requirement
summary: The RTP timestamp SHOULD be as close as possible to the packet's actual time of transmission. Implementations SHOULD supply a value usable for packet-arrival timing or jitter calculations. The operator SHALL select a 'rate' larger than 1000 Hz and SHOULD select the rate matching the protected source RTP stream.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
