document: rfc-9562
kind: protocol-element
summary: 'UUIDv7 provides three optional methods for intra-millisecond monotonicity: Method 1 (fixed bit-length dedicated counter in rand_a, at least 12 bits, positioned immediately after the timestamp), Method 2 (monotonic randomly-seeded counter in rand_b incremented per UUID), and Method 3 (sub-millisecond clock precision bits replacing leftmost rand_a bits).'
section: "5.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
