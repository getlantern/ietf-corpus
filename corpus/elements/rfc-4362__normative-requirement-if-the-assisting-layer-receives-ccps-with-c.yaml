document: rfc-4362
kind: normative-requirement
summary: If the assisting layer receives CCPs with C=1 from the compressor, it MUST use the last CCP received (corresponding to the last non-CCP packet sent) if a CCP is to be transmitted. A CCP MUST always be made available to the assisting layer.
section: 4.1.3
rfc2119_level: MUST
topics:
    - rtp
