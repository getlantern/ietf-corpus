document: rfc-3388
kind: normative-requirement
summary: SIP systems MUST perform media alignment by matching nth 'm' lines regardless of the presence of 'group' or 'mid' attributes. If a stream's 'mid' value differs between offer and answer, the application MUST ignore all 'mid' and 'group' lines in the session description.
section: "8.1"
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
