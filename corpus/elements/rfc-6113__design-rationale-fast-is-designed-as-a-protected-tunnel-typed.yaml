document: rfc-6113
kind: design-rationale
summary: FAST is designed as a protected tunnel (typed hole) for FAST factors rather than a direct authentication mechanism because this separation makes individual FAST factors significantly easier to analyze from a security standpoint. A FAST factor captures only the minimal work required to extend Kerberos with a new pre-authentication scheme.
section: "1"
topics:
