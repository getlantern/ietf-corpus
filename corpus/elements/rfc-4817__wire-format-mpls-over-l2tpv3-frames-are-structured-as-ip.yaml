summary: 'MPLS over L2TPv3 frames are structured as: IP header (IPv4 or IPv6), followed by L2TPv3 header (Session ID + optional Cookie), followed by the complete MPLS Label Stack, followed by the MPLS Payload. The L2-Specific Sublayer is generally absent.'
