document: rfc-4014
kind: security-consideration
summary: The DHCP Relay Agent option depends on a trusted relationship between the relay agent and the DHCP server. Although perimeter defenses can block fraudulent relay-agent options, a deeper defense using the authentication suboption for relay agent options or IPsec SHOULD be deployed.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
    - radius
    - dhcp
    - ipsec
