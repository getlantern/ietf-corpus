summary: 'Service-Route is encoded as: `Service-Route = "Service-Route" HCOLON sr-value *( COMMA sr-value)` where `sr-value = name-addr *( SEMI rr-param )`. Values must conform to Route element syntax and must include the loose-routing indicator parameter ";lr".'
