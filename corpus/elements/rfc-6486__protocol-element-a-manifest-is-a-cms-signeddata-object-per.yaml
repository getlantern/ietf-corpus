document: rfc-6486
kind: protocol-element
summary: A manifest is a CMS SignedData object (per RFC 6488) whose eContentType is id-ct-rpkiManifest (OID 1.2.840.113549.1.9.16.1.26). It enumerates all currently valid signed objects at a CA's repository publication point, providing each object's filename and a hash of its contents.
