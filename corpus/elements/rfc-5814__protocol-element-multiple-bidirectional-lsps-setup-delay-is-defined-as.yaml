document: rfc-5814
kind: protocol-element
summary: Multiple Bidirectional LSPs Setup Delay is defined as the time from the first Path message (including Upstream Label) sent to the last of all X corresponding Resv messages received, where X Path messages follow a Poisson process with rate Lambda_m. The metric is undefined if any Resv is not received in time.
