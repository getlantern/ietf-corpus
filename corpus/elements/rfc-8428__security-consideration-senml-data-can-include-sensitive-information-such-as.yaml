document: rfc-8428
kind: security-consideration
summary: SenML data can include sensitive information such as sensor readings, device identifiers, and location data. Implementations MUST provide confidentiality and integrity protection (e.g., via TLS when using HTTP or DTLS when using CoAP) appropriate to the sensitivity of the data being transmitted.
section: "13"
topics:
    - security
