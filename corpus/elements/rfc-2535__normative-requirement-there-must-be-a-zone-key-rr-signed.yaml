document: rfc-2535
kind: normative-requirement
summary: There MUST be a zone KEY RR, signed by its superzone, for every subzone if the superzone is secure. If an unsecured subzone will not add security RRs, a KEY RR declaring it unsecured MUST appear with the superzone signature in the superzone.
section: 2.3.4
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
