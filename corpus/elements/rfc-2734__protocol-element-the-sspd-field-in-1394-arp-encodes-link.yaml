document: rfc-2734
kind: protocol-element
summary: The sspd field in 1394 ARP encodes link/PHY speed as values 0–5 corresponding to S100–S3200; the field SHALL be set to the lesser of sender link speed and PHY speed. Speed codes above 5 are RESERVED.
