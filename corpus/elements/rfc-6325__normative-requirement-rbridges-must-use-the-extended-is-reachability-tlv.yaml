document: rfc-6325
kind: normative-requirement
summary: RBridges MUST use the Extended IS Reachability TLV (#22, wide metric) for advertising neighbor costs and MUST NOT use the IS Reachability TLV (#2, narrow metric). By default, link cost SHOULD be set to the integer part of 20,000,000,000,000 divided by the port's bit rate, not to exceed 2**24-2.
section: 4.2.4.4
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
