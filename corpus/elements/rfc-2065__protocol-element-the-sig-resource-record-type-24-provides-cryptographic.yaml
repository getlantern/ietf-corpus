document: rfc-2065
kind: protocol-element
summary: 'The SIG resource record (type 24) provides cryptographic authentication for other DNS RRs. Its RDATA includes: type covered (16 bits), algorithm (8 bits), labels count (8 bits), original TTL (32 bits), signature expiration (32 bits), time signed (32 bits), key footprint (16 bits), signer''s name (variable), and the signature (variable).'
