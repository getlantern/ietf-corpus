document: rfc-726
kind: normative-requirement
summary: Even-numbered <cmd> values greater than zero (right-most bit off) are in error and must be interpreted as equal to zero ('continue current behavior'). When the cmd is such an erroneous even value, the class bytes TC1/TC2 and BC1/BC2 must not be sent.
section: "2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
