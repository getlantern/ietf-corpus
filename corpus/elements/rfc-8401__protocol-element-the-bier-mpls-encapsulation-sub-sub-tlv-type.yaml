document: rfc-8401
kind: protocol-element
summary: The BIER MPLS Encapsulation sub-sub-TLV (type 1) is advertised within the BIER Info sub-TLV and carries MPLS label range information for a specific BitString length within a given <MT,SD>. It may appear multiple times within a single BIER Info sub-TLV.
