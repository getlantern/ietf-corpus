document: rfc-5060
kind: security-consideration
summary: The minimum notification period for pimInvalidRegisterNotificationPeriod and pimInvalidJoinPruneNotificationPeriod is set to 10 seconds (not zero) to provide resilience against propagation of denial-of-service attacks from the data and control planes to the network management plane. Default is 65535 (infinite, no notifications sent).
section: "5"
topics:
