document: rfc-8582
kind: protocol-element
summary: The OLR_RATE_ALGORITHM feature bit (0x0000000000000004) is carried in the OC-Feature-Vector AVP. When set, it indicates that the DOIC node supports the rate abatement algorithm. Nodes supporting this feature must also support the baseline loss algorithm.
section: 7.1.1
topics:
