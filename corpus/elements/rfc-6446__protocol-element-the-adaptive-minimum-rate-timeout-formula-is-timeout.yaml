document: rfc-6446
kind: protocol-element
summary: 'The adaptive minimum rate timeout formula is: timeout = count / ((adaptive-min-rate ^ 2) * period), where ''count'' is notifications sent in the last ''period'' seconds, and ''timeout'' is the time in seconds to the next notification. When both max-rate and adaptive-min-rate are combined, timeout = MAX[(1/max-rate), count/((adaptive-min-rate ^ 2) * period)].'
section: "7.4"
topics:
    - sip
    - realtime
