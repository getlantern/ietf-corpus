document: rfc-6738
kind: interoperability-note
summary: RFC 5778 defined Diameter interworking for Mobile IPv6 between the Home Agent and Diameter server using EAP or Mobile IPv6 Authentication Protocol, but did not cover SK-based IKEv2 authentication. This document fills that gap and is complementary to RFC 5778.
section: "1"
topics:
    - diameter
    - ipsec
    - mobility
