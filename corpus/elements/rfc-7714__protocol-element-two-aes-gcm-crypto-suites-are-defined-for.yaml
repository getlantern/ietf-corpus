document: rfc-7714
kind: protocol-element
summary: 'Two AES-GCM crypto suites are defined for SRTP/SRTCP: AEAD_AES_128_GCM (16-octet master key, 96-bit salt, AES_CM PRF KDF, 128-bit auth tag, lifetime up to 2^48 SRTP / 2^31 SRTCP packets) and AEAD_AES_256_GCM (32-octet key, same salt and tag sizes, AES_256_CM_PRF KDF, same lifetimes).'
section: "12"
