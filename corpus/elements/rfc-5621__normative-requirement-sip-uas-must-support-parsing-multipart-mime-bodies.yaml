document: rfc-5621
kind: normative-requirement
summary: SIP UAs MUST support parsing 'multipart' MIME bodies, including nested body parts. UAs MUST support the 'multipart/mixed' and 'multipart/alternative' MIME types. Support for other MIME types such as 'multipart/related' is OPTIONAL.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
