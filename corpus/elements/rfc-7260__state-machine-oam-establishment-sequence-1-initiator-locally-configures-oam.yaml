document: rfc-7260
kind: state-machine
summary: 'OAM establishment sequence: (1) initiator locally configures OAM entities but MUST NOT start OAM source; (2) Path message sent with ''OAM Alarms Enabled'' flag cleared; (3) receiver establishes OAM entities and starts OAM source for bidirectional LSPs; (4) Resv returned with OAM Configuration TLV; (5) initiator enables OAM source; (6) subsequent Path/Resv enables alarms.'
section: "3.1"
topics:
    - routing
    - mpls
