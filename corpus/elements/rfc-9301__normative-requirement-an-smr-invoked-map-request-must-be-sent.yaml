document: rfc-9301
kind: normative-requirement
summary: An SMR-invoked Map-Request MUST be sent through the Mapping System, not directly to the ETR. Both the SMR sender and SMR responder MUST rate limit these messages; the RECOMMENDED limit is no more than once every 3 seconds per destination RLOC or EID-Prefix.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
