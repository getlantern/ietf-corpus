document: rfc-3220
kind: design-rationale
summary: The sequence number rollover rule (0xffff → 256 rather than 0) allows mobile nodes to distinguish a post-reboot restart of the counter (which begins at 0) from a normal rollover, enabling correct re-registration decisions without false move detection.
