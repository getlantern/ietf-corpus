document: rfc-8052
kind: protocol-element
summary: The SA Activation Time Delay (SA_ATD) attribute (value 1, TLV type) delays SA installation by a specified number of seconds. It applies only to a single SA and MAY be used in GROUPKEY-PULL or GROUPKEY-PUSH; when both SA_ATD and GAP ACTIVATION_TIME_DELAY are present in GROUPKEY-PUSH, SA_ATD takes precedence.
section: 2.2.4.1
topics:
    - ipsec
    - security
