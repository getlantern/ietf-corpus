document: rfc-4411
kind: security-consideration
summary: Eavesdropping on the Preemption Reason header does not prevent SIP from functioning, but domains relying on preemption signals for session management will want integrity assurance to prevent header tampering; TLS and S/MIME are the recommended protections.
