document: rfc-5374
kind: normative-requirement
summary: A Group Identifier used to identify a secure multicast group MUST be at least four bytes long and less than 256 bytes long; it is an opaque byte string of IKE ID type Key ID.
section: 4.1.3.3
rfc2119_level: MUST
topics:
