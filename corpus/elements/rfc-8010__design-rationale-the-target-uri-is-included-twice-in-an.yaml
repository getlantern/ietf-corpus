document: rfc-8010
kind: design-rationale
summary: The target URI is included twice in an IPP request—once as an HTTP request-target and once as an operation attribute in the application/ipp body—to maintain a consistent set of rules for mapping application/ipp to possibly many communication layers, even where URIs are not used as the addressing mechanism in the transport layer.
section: "4.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
