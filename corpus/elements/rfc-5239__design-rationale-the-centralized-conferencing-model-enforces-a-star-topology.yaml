kind: design-rationale
summary: 'The centralized conferencing model enforces a star-topology call signaling graph: each participant maintains a direct peer relationship with the focus. This simplifies membership enforcement and media negotiation. The framework notes that concepts could apply to decentralized (multicast/multi-unicast mesh) media topologies but leaves those details for future study.'
