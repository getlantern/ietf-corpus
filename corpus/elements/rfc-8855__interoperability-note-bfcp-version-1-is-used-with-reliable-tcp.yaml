document: rfc-8855
kind: interoperability-note
summary: BFCP version 1 is used with reliable (TCP/TLS) transport and version 2 with unreliable (UDP/DTLS) transport. Entities implementing only RFC 4582 (version 1) will not recognize error code 12 (Unsupported Version) or the fragment fields, and must not receive version-2 messages.
section: "5.1"
topics:
