document: rfc-8658
kind: normative-requirement
summary: The Softwire46-Configuration Attribute MAY appear in Access-Accept, Access-Request, CoA-Request, and Accounting-Request packets. It MUST NOT appear in any other RADIUS packet type (e.g., Access-Reject, Access-Challenge).
section: "3.1"
rfc2119_level: MUST NOT
