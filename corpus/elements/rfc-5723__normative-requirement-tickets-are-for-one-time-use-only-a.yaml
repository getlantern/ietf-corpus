document: rfc-5723
kind: normative-requirement
summary: Tickets are for one-time use only; a client MUST NOT reuse a ticket. A ticket is considered used only when an IKE SA has been successfully established with it, and a reused ticket SHOULD be rejected by the gateway.
section: 4.3.1
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
