document: rfc-9353
kind: normative-requirement
summary: Before advertising PCEP security parameters via IGP, the IGP MUST be known to provide authentication and integrity for the PCED TLV using mechanisms defined in RFC 5304, RFC 5310, or RFC 5709, because the new capability bits are susceptible to downgrade attacks.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
