document: rfc-7864
kind: normative-requirement
summary: When flow mobility is triggered by a new MN interface attachment, the LMA MUST include a Home Network Prefix Option with the off-link bit (L) set to one in the PBA for each prefix that needs flow mobility support on the new MAG.
