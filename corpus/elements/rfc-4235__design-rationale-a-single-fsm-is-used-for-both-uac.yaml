document: rfc-4235
kind: design-rationale
summary: A single FSM is used for both UAC and UAS roles to simplify the model. The common case of no forking is represented by a single FSM instance, while forked responses (additional 1xx or 2xx with new tags) create additional FSM instances rather than complicating the primary FSM.
section: 3.7.1
