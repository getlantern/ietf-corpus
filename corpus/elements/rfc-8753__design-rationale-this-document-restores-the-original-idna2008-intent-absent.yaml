document: rfc-8753
kind: design-rationale
summary: 'This document restores the original IDNA2008 intent: absent extremely strong per-code-point evidence of significant harm, Unicode changes that would alter IDNA derived property values must be captured as IDNA exceptions that preserve the validity status of existing labels. Prior reviews deviated from this by favoring Unicode compatibility over IDNA backward compatibility.'
section: "4"
topics:
