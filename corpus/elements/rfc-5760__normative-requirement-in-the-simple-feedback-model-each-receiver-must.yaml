document: rfc-5760
kind: normative-requirement
summary: In the Simple Feedback Model, each receiver MUST calculate its RTCP bandwidth share R/n and, when eligible to transmit, MUST send a unicast Receiver Report to the Feedback Target. Reflected RTCP traffic SHOULD NOT be counted as the Distribution Source's own traffic in the transmission interval calculation.
section: "6.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
