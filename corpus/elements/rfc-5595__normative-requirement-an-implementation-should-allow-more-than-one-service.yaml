document: rfc-5595
kind: normative-requirement
summary: An implementation SHOULD allow more than one Service Code to be associated with a passive server port, enabling multiple applications or multiple versions of an application to listen on the same port differentiated by Service Code. It SHOULD also provide a method to inform the server of the Service Code selected by an active connection.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
