document: rfc-9786
kind: interoperability-note
summary: Implementations complying with only RFC 7432 or RFC 8214 (predating this specification) will ignore the L2-Attr Extended Community in Ethernet A-D per ES routes and continue using default path resolution algorithms. The remote ESI Label Extended Community signals Single-Active redundancy mode, and P/B bits in Ethernet A-D per EVI routes are used as before.
section: "4.2"
topics:
    - routing
    - bgp
