document: rfc-3335
kind: security-consideration
summary: 'Non-repudiation of receipt (NRR) is a legal event that requires: the sender verifies the signed receipt using the receiver''s public key, and the returned MIC inside the MDN matches the digest of the original message. NRR is not possible without signatures on both the message and the receipt.'
section: 2.2.3
topics:
    - security
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
