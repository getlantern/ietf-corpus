document: rfc-8814
kind: wire-format
summary: The Node MSD TLV (Type 266) is a Node Attribute TLV with variable length (multiple of 2 octets). Its value field consists of one or more pairs of a 1-octet MSD-Type and 1-octet MSD-Value, where MSD-Type is from the IGP MSD-Types registry and MSD-Value ranges 0-255.
