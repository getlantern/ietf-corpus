document: rfc-5790
kind: protocol-element
summary: 'LW-IGMPv3 uses four Group Record Types in Report messages: ALLOW(x) for INCLUDE join or query response; BLOCK(x) for INCLUDE leave; TO_IN(x) for change to INCLUDE or (*,G) leave when x is null; TO_EX({}) for (*,G) join. EXCLUDE with non-null source list (IS_EX(x), TO_EX(x)) is not generated by LW-IGMPv3 hosts.'
section: "4.4"
topics:
    - multicast
    - routing
