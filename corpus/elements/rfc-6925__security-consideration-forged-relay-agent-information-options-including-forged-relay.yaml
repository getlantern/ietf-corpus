document: rfc-6925
kind: security-consideration
summary: Forged Relay Agent Information options, including forged Relay-IDs, are a threat. A perimeter defense blocking these options from untrusted sources combined with the RFC 4030 authentication sub-option mitigates this risk and also helps avoid duplication of relay identifiers by malicious entities.
section: "6.1"
topics:
    - security
