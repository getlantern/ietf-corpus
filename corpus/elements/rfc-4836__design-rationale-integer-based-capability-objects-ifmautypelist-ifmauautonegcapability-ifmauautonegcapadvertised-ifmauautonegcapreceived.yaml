document: rfc-4836
kind: design-rationale
summary: Integer-based capability objects (ifMauTypeList, ifMauAutoNegCapability, ifMauAutoNegCapAdvertised, ifMauAutoNegCapReceived) and the JackType TC are deprecated in favor of BITS-based textual conventions (IANAifMauTypeListBits, IANAifMauAutoNegCapBits, IANAifJackType) defined in IANA-MAU-MIB. Bit-string TCs allow IANA to add new capability bits without reissuing this document.
section: "3.5"
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
