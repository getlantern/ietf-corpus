document: rfc-8223
kind: normative-requirement
summary: The SAC mechanism MUST take precedence over the TAC mechanism with respect to disabling state information advertisements. A peer MUST NOT send state information for an application if the other peer announced disinterest via SAC, even if the application was negotiated via TAC.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
