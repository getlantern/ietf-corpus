document: rfc-1237
kind: normative-requirement
summary: Each TRD should develop explicit policy on whether to accept non-local NSAP address prefixes from attached leaf routing domains and how such prefixes will be treated in routing exchanges with other TRDs. A conservative policy accepts non-local prefixes but does not advertise them to other TRDs.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
