document: rfc-3922
kind: normative-requirement
summary: If the encapsulated MIME Content-Type is not 'text/plain', the gateway MUST NOT map it to the XMPP <body/> element; if the charset is neither 'US-ASCII' nor 'UTF-8', the gateway SHOULD NOT map the 'Message/CPIM' object at all.
section: 4.2.9
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
