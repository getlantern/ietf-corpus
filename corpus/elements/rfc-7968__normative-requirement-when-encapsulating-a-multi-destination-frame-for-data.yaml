document: rfc-7968
kind: normative-requirement
summary: When encapsulating a multi-destination frame for Data Label x, an ingress RBridge SHOULD use a tree nickname it previously selected in a TREE-VLAN-USE or TREE-FGL-USE APPsub-TLV. Exceptions apply if no such APPsub-TLV was advertised or if the selected tree is unavailable due to failure.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
