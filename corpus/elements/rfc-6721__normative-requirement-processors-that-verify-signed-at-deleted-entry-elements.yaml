document: rfc-6721
kind: normative-requirement
summary: Processors that verify signed at:deleted-entry elements MUST support exclusive XML canonicalization identified by 'http://www.w3.org/2001/10/xml-exc-c14n#', because standard Canonical XML breaks signatures when signed documents are enclosed in other XML documents.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
