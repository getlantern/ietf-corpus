document: rfc-8940
kind: protocol-element
summary: 'EAP-SIM Session-Id for fast reconnect is the concatenation of the EAP Type Code (0x12) with the NONCE_S field from AT_NONCE_S, followed by the MAC field from AT_MAC from EAP-Request/SIM/Reauthentication: Session-Id = 0x12 || NONCE_S || MAC, which is 33 octets in length.'
section: "2.2"
topics:
