document: rfc-9577
kind: protocol-element
summary: The 'PrivateToken' HTTP authentication scheme allows Clients to redeem Privacy Pass tokens with Origins. Origins challenge Clients via WWW-Authenticate with a TokenChallenge, and Clients respond via Authorization with a redeemed token. The scheme supports multiple token issuance protocols and optional context/Origin binding.
section: "2"
topics:
