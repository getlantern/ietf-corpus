document: rfc-8536
kind: interoperability-note
summary: Version 1 files are considered a legacy format and SHOULD NOT be generated, as they cannot represent transition times after 2038. When reading version 2 or 3 files, implementations SHOULD ignore the version 1 header and data block except to skip over them.
