document: rfc-5654
kind: normative-requirement
summary: MPLS-TP MUST support fault indication triggers from lower layers, OAM-based triggers, and management-plane triggers (e.g., forced switch). There MUST be a mechanism to distinguish administrative recovery actions from recovery actions initiated by other triggers.
section: 2.5.3
rfc2119_level: MUST
topics:
    - mpls
