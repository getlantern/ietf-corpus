document: rfc-5477
kind: normative-requirement
summary: Information Elements SHOULD NOT be overloaded with multiple meanings or re-used for multiple purposes; different Information Elements SHOULD be allocated for each requirement. A separate selectorAlgorithm IE is provided even when the selection method could be inferred from other IEs, in order to serve as explicit scope for Selector Report Interpretation.
section: "7"
rfc2119_level: SHOULD NOT
