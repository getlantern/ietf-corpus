document: rfc-5175
kind: normative-requirement
summary: Upon reception, a receiver MUST ignore the EFO if it occurs in a message other than a Router Advertisement, MUST ignore all instances except the first encountered in an RA message, MUST ignore the option if Length is less than 1, and MUST ignore any unknown flag bits.
section: "4"
rfc2119_level: MUST
topics:
