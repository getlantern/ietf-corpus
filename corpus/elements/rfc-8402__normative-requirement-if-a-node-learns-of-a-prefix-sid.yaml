document: rfc-8402
kind: normative-requirement
summary: If a node learns of a Prefix-SID whose value falls outside the locally configured SRGB range, the node MUST NOT use that Prefix-SID and SHOULD issue an error log reporting a misconfiguration.
section: 3.1.2
rfc2119_level: MUST NOT
