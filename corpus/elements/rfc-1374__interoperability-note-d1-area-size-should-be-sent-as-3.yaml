document: rfc-1374
kind: interoperability-note
summary: D1_Area_Size should be sent as 3, but Destinations shall accept any HIPPI-FP-legal value (3–127 for 32-bit HIPPI, 3–255 for 64-bit); this preserves forward compatibility with implementations using a larger D1_Area.
section: Protocol/Packet Format
topics:
    - ip
