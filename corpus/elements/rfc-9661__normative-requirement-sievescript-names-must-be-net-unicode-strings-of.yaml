document: rfc-9661
kind: normative-requirement
summary: SieveScript names MUST be Net-Unicode strings of at least 1 character. Servers MUST reject names containing Unicode characters U+0000-U+001F, U+007F-U+009F, U+2028, or U+2029. Names MUST be unique within an account.
section: "2.1"
rfc2119_level: MUST
topics:
