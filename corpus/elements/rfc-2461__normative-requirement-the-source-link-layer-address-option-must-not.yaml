document: rfc-2461
kind: normative-requirement
summary: The Source Link-Layer Address option MUST NOT be included in a Neighbor Solicitation or Router Solicitation when the source IP address is the unspecified address. In multicast Neighbor Solicitations it MUST be included; in unicast Neighbor Solicitations it SHOULD be included.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
