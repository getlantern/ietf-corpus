document: rfc-9051
kind: normative-requirement
summary: Mailbox names MUST be encoded in Net-Unicode. Servers MUST prohibit creation of 8-bit mailbox names that do not comply with Net-Unicode. Clients MUST interpret any 8-bit mailbox names returned by LIST as Net-Unicode. This requirement differs from IMAP4rev1, which used modified UTF-7.
section: "5.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
