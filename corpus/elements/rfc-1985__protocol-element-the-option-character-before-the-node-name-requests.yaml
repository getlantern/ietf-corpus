document: rfc-1985
kind: protocol-element
summary: 'The ''@'' option character before the node name requests release of mail for an entire subdomain: ETRN @foo.com releases queued mail for foo.com and any subdomain thereof (e.g., fred.foo.com, a.b.c.d.foo.com).'
section: "5.3"
topics:
    - email
