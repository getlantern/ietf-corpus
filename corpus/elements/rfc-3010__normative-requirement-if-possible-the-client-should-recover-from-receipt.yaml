document: rfc-3010
kind: normative-requirement
summary: If possible, the client SHOULD recover from receipt of an NFS4ERR_FHEXPIRED error by storing component names leading to the file system object so it can re-traverse the namespace to obtain a fresh filehandle.
section: "4.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
