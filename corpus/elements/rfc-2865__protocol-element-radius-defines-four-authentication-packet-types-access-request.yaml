document: rfc-2865
kind: protocol-element
summary: 'RADIUS defines four authentication packet types: Access-Request (Code=1), Access-Accept (Code=2), Access-Reject (Code=3), and Access-Challenge (Code=11). Codes 4 and 5 (Accounting) are defined elsewhere. Packets with invalid Code fields are silently discarded.'
