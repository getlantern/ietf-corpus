document: rfc-2678
kind: protocol-element
summary: The methodology for estimating Type-P1-P2-Interval-Temporal-Connectivity uses N probe packets with sending times uniformly distributed over [T, T+dT-W], where W is the maximum useful waiting time for a reply. The measurement returns 'true' upon first successful reply and 'false' if no reply is received by T+dT.
section: 6.6.3
topics:
