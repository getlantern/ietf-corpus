summary: 'The report block structure is 6 rows of 32 bits: BT (8 bits) = 35, Interval Metric flag I (2 bits), reserved resv (6 bits), Block Length (16 bits) = 5; SSRC of Source (32 bits); Threshold (8 bits) + Sum of Burst Durations in ms (24 bits); Packets Discarded in Bursts (24 bits) + Number of Bursts (16 bits, split across words); Total Packets Expected in Bursts (24 bits); Discard Count (32 bits).'
