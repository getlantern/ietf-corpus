document: rfc-5628
kind: normative-requirement
summary: If the notifier includes <pub-gruu>, it MUST populate it with the public GRUU associated with the instance ID and AOR. If it includes <temp-gruu>, it MUST populate it with the most recently assigned temporary GRUU and MUST also set the 'cseq' attribute to the CSeq of the REGISTER that caused the oldest currently active temporary GRUU to be assigned.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
