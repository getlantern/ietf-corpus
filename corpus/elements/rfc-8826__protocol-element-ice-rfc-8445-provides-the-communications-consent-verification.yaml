document: rfc-8826
kind: protocol-element
summary: ICE (RFC 8445) provides the communications consent verification handshake required by WebRTC, serving double duty for NAT hole-punching and receiver consent. ICE uses STUN credentials as a per-session shared secret to verify the receiver wants to receive traffic from this particular sender at this time. RFC 7675 provides consent freshness via keepalives.
section: 4.2.1
topics:
    - webrtc
    - realtime
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
