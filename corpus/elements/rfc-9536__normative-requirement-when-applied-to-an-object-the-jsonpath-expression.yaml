document: rfc-9536
kind: normative-requirement
summary: When applied to an object, the JSONPath expression in a reverse search mapping MUST produce a list of values each of which is a JSON number or string. Each generated value MUST be a JSON number or string when determining whether an object matches a predicate.
section: "5"
rfc2119_level: MUST
topics:
