document: rfc-5496
kind: interoperability-note
summary: On a shared LAN, downstream routers MAY include different RPF Vectors in their PIM Joins, causing an upstream router to receive and use different RPF Vectors over time. Join suppression without Vector-matching would make upstream router behavior unpredictable; disabling Join suppression on that LAN is also an option.
section: 3.3.4
topics:
    - multicast
    - routing
