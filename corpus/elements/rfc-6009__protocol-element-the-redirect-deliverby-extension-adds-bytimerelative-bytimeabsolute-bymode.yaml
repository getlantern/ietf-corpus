document: rfc-6009
kind: protocol-element
summary: The 'redirect-deliverby' extension adds ':bytimerelative', ':bytimeabsolute', ':bymode', and ':bytrace' arguments to the redirect action, constructing the BY ESMTP MAIL FROM parameter. ':bymode' and ':bytrace' require either ':bytimeabsolute' or ':bytimerelative' to also be specified.
