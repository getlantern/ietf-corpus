document: rfc-6780
kind: normative-requirement
summary: A node that wishes to allow upstream nodes to associate Resv state across RSVP sessions MUST include an ASSOCIATION object in the outgoing Resv messages corresponding to those sessions. In the absence of type-specific rules, the included ASSOCIATION objects MUST be identical.
section: 3.2.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
