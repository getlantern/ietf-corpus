document: rfc-1376
kind: protocol-element
summary: The DNA Phase IV Routing Control Protocol (DNCP) is the NCP for establishing and configuring Digital's DNA Phase IV Routing protocol over PPP. It uses the same packet exchange mechanism as the Link Control Protocol (LCP) and covers only DNA Phase IV Routing messages (data and control), not MOP, LAT, or other DNA protocols.
