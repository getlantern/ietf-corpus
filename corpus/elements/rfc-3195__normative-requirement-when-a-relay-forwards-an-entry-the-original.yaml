document: rfc-3195
kind: normative-requirement
summary: When a relay forwards an entry, the original CDATA contents MUST be preserved unchanged; timestamps MUST NOT be rewritten in the CDATA, and the tag MUST NOT be removed from the CDATA even if also present in element attributes.
section: 4.4.2
rfc2119_level: MUST
topics:
    - syslog
    - security
