document: rfc-8375
kind: security-consideration
summary: Allowing stub resolvers to query local resolvers for 'home.arpa.' subdomains even when manually configured to use other resolvers (as permitted in Section 4 item 3) has security and privacy implications; implementors are encouraged to consider deployment context when deciding whether to apply this exception.
