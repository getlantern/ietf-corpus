summary: 'Generalized Label Request TLV (type 0x0824) carries three fields: LSP Encoding Type (1 octet), Switching Type (1 octet), and G-PID (2 octets). It is set by the ingress node, passed transparently by transit nodes, and consumed by the egress node.'
