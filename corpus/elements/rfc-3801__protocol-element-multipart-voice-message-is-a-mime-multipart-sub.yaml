document: rfc-3801
kind: protocol-element
summary: Multipart/Voice-Message is a MIME multipart sub-type with semantics identical to Multipart/Mixed. It requires a boundary parameter and a version parameter ('2.0' for this specification). Future versions MUST maintain backwards compatibility with version 2.0.
