document: rfc-2473
kind: design-rationale
summary: 'IPv6 tunnels are modeled as ''single-hop virtual links'': the entry-point sets the tunnel IPv6 hop limit independently of the original packet hop limit, so intermediate hops inside the tunnel are invisible to the original packet. This hides the true tunnel hop count from original packet sources.'
section: "6.3"
