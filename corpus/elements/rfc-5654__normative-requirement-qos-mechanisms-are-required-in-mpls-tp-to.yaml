document: rfc-5654
kind: normative-requirement
summary: QoS mechanisms are REQUIRED in MPLS-TP to support differentiated services, guarantee SLS parameters (including hard and relative end-to-end bandwidth), support jitter/delay-sensitive services, ensure fair access within a class to shared resources, and guarantee resources for in-band control/management traffic.
section: "2.6"
rfc2119_level: REQUIRED
topics:
    - mpls
    - qos
    - diffserv
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
