kind: protocol-element
summary: RSpec parameters rsvpResvRSpecRate (clearing rate, BitRate) and rsvpResvRSpecSlack (delay slack, Integer32 microseconds) are populated only when rsvpResvService is Guaranteed; otherwise they return zero or noSuchValue. These directly correspond to the Guaranteed Service R-spec object.
