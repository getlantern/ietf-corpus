document: rfc-7143
kind: protocol-element
summary: 'The Task Management Function Request PDU specifies the function via the Function field: ABORT TASK (1), ABORT TASK SET (2), CLEAR ACA (3), CLEAR TASK SET (4), LOGICAL UNIT RESET (5), TARGET WARM RESET (6), TARGET COLD RESET (7), TASK REASSIGN (8). Referenced Task Tag (4 bytes) and RefCmdSN (4 bytes) identify the task to act upon.'
