document: rfc-9691
kind: normative-requirement
summary: In cases where a CA certificate is replaced with an extended set of resources, the TA MUST inform the receiving CA only after all repository publication points have been updated, preventing products that could be invalid if an RP uses a TA public key just before the CA certificate update.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
