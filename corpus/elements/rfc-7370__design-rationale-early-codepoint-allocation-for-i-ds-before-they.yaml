document: rfc-7370
kind: design-rationale
summary: Early codepoint allocation for I-Ds before they progress to RFC is advantageous (as described in RFC 7120), but RFC 7120's early-allocation procedures do not apply to 'Expert Review' registries like the IS-IS TLV Codepoints registry. Instead, Designated Expert guidance is used to achieve the same goal within the Expert Review framework.
section: "4"
topics:
