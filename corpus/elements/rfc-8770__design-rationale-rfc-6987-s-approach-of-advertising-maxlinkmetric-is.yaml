document: rfc-8770
kind: design-rationale
summary: RFC 6987's approach of advertising MaxLinkMetric is insufficient to repel AS-external or NSSA routes with Type 2 metrics because Type 2 metrics are taken as more significant than intra-area or inter-area path costs, necessitating the use of LSInfinity instead.
section: "6"
topics:
    - routing
