document: rfc-2532
kind: normative-requirement
summary: The Disposition-Notification-To address MUST be able to receive MDN messages and SHOULD be able to receive non-RFC2298-compliant responses. This address and the envelope-from SHOULD match to allow automated MDN responses.
section: 2.1.2
rfc2119_level: MUST
