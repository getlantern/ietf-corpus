document: rfc-9428
kind: protocol-element
summary: All IPv6-over-NFC encapsulated datagrams are prefixed by a dispatch header. The only defined dispatch sequence is the LOWPAN_IPHC compressed IPv6 header (pattern 01 1xxxxx) followed by payload; no other IANA-assigned 6LoWPAN dispatch values apply.
section: "4.5"
topics:
