document: rfc-9291
kind: protocol-element
summary: The 'ietf-ethernet-segment' YANG module manages Ethernet Segments for EVPN services. Data nodes include ESI type (types 0–5 per RFC 7432 §5), direct or auto-assigned ESI (with optional pool name), redundancy mode (Single-Active or All-Active), DF election parameters, split-horizon filtering, PBB backbone source MAC, and a list of member network elements and interfaces.
section: "6"
topics:
