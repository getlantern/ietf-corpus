summary: dot3TestTdr and dot3TestLoopBack are defined as OBJECT-IDENTITY values under dot3Tests for use with the ifTestTable. TDR is specific to 10Base5/10Base2; loopback tests memory, data paths, and MAC chip logic while the interface is offline.
