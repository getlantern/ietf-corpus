document: rfc-9959
kind: protocol-element
summary: saved_cwnd records the utilised capacity (bytes sent during one RTT, or volume acknowledged in one RTT) observed on a previous connection. saved_rtt records the minimum RTT at the time of observation. Together with a Lifetime timestamp and a saved_remote_endpoint, these form the complete set of saved CC parameters.
