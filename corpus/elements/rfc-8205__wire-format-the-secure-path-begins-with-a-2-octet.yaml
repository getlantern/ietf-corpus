document: rfc-8205
kind: wire-format
summary: The Secure_Path begins with a 2-octet length field (inclusive of itself), followed by one or more 6-octet Secure_Path Segments. Each Segment contains a 1-octet pCount, a 1-octet Flags field (Confed_Segment flag in the MSB, 7 bits unassigned), and a 4-octet AS Number.
section: "3.1"
