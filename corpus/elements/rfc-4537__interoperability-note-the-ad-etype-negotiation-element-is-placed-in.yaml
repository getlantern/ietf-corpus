document: rfc-4537
kind: interoperability-note
summary: The AD-ETYPE-NEGOTIATION element is placed in the AD-IF-RELEVANT container so that servers not implementing this extension will safely ignore it and fall back to the enctype of the service ticket session key, preserving backward compatibility with RFC 4120.
