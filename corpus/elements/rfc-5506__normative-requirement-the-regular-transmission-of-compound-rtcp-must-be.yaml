document: rfc-5506
kind: normative-requirement
summary: The regular transmission of compound RTCP MUST be maintained throughout an RTP session. Reduced-Size RTCP SHOULD be restricted to extra RTCP (e.g., feedback) sent when a regular compound RTCP would not otherwise have been sent.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
