document: rfc-4380
kind: protocol-element
summary: A Teredo bubble is a minimal IPv6 packet consisting only of an IPv6 header with Next Header set to 59 (No Next Header, per RFC 2460) and zero payload length. Clients and relays send bubbles to establish or maintain NAT mappings without carrying application data.
section: "2.8"
topics:
    - ip
    - nat
    - v6ops
