document: rfc-6120
kind: protocol-element
summary: After sending its response stream header, the receiving entity MUST send a <stream:features/> element advertising mandatory-to-negotiate and voluntary-to-negotiate features. An empty <features/> element or one containing only voluntary features signals negotiation is complete and the initiating entity is cleared to send XML stanzas.
section: 4.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
