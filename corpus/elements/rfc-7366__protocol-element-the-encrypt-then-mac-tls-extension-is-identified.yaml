document: rfc-7366
kind: protocol-element
summary: The encrypt_then_mac TLS extension is identified by extension_type value 22 (0x16) and carries an empty extension_data field. The client includes it in ClientHello to request encrypt-then-MAC; the server echoes it in ServerHello to confirm.
