document: rfc-5465
kind: wire-format
summary: 'The NOTIFY command syntax is: ''NOTIFY SP (notify-set / notify-none)''. NOTIFY SET takes an optional STATUS indicator and event-groups of the form ''('' filter-mailboxes SP events '')''. New response codes defined: NOTIFICATIONOVERFLOW and BADEVENT SP ''('' event-name+ '')''.'
