document: rfc-7153
kind: registry
summary: 'BGP Non-Transitive Extended Community Types registry: range 0x40-0x7F is First Come First Served, 0xC0-0xCF is Experimental Use, 0xD0-0xFF is Standards Action. Assigned values include 0x40 (Non-Transitive Two-Octet AS-Specific), 0x41 (Non-Transitive IPv4-Address-Specific), 0x42 (Non-Transitive Four-Octet AS-Specific), 0x43 (Non-Transitive Opaque), 0x44 (QoS Marking).'
section: 5.1.2
topics:
