document: rfc-9967
kind: privacy-consideration
summary: 'Cross-domain SCIM event sharing operates under two scenarios: a common administrative domain (e.g., DBR mode keeping employee data synchronized) or a cooperative relationship (e.g., CP mode with consent-based, minimal data sharing). The specification states that sharing generally carries no additional personal information beyond the existing SCIM relationship.'
section: "6"
topics:
