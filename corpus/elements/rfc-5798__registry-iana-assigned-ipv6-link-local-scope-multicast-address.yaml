document: rfc-5798
kind: registry
summary: IANA assigned IPv6 link-local scope multicast address FF02:0:0:0:0:0:0:12 for VRRP, and reserved the IEEE 802 MAC address block 00-00-5E-00-02-00 through 00-00-5E-00-02-FF for VRRP for IPv6. The IPv4 MAC block 00-00-5E-00-01-00 through 00-00-5E-00-01-FF and IPv4 multicast address 224.0.0.18 were previously assigned.
