summary: 'LDP defines four message categories: Discovery (Hello, via UDP), Session (Initialization, KeepAlive), Advertisement (Label Mapping, Request, Withdraw, Release, Abort Request), and Notification. All except Discovery use TCP for reliable in-order delivery.'
