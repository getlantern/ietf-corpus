summary: 'A 1394 ARP request/response is exactly 32 octets containing: hardware_type (0x0018), protocol_type (0x0800), hw_addr_len (16), IP_addr_len (4), opcode (1=request, 2=response), sender_unique_ID (64 bits, EUI-64), sender_max_rec, sspd (speed code), sender_unicast_FIFO (48-bit offset), sender_IP_address, and target_IP_address.'
