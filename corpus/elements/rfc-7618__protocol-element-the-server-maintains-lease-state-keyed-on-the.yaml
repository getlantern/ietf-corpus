document: rfc-7618
kind: protocol-element
summary: The server maintains lease state keyed on the tuple (IPv4 address, PSID, client identifier) rather than IPv4 address alone. On DHCPRELEASE, the server searches for the matching lease using ciaddr plus the PSID in OPTION_V4_PORTPARAMS and marks it unallocated.
