document: rfc-1595
kind: state-machine
summary: 'Line RDI (FERF) state machine: Line RDI defect is a ''110'' code in bits 6–8 of K2 in five consecutive frames, terminated when any other code appears for five consecutive frames. Line RFI failure is declared at 2.5±0.5 s and cleared when absent for 10±0.5 s.'
section: "3.5"
