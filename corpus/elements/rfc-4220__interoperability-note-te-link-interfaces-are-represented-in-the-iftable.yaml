summary: TE Link interfaces are represented in the ifTable with ifType value 200, as allocated by IANAifType. The ifStackTable is used to represent hierarchical relationships between MPLS interfaces, bundled links, TE links, and component links, with higher-layer interfaces referencing lower-layer ones.
