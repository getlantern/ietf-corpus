document: rfc-4422
kind: normative-requirement
summary: The protocol's initiation message MUST contain a field for the mechanism name. It SHOULD contain an optional initial response field; if defined, the specification MUST distinguish empty initial response from absent initial response, and the field MUST carry arbitrary octet sequences.
section: "4"
rfc2119_level: MUST
