document: rfc-2543
kind: security-consideration
summary: Embedding passwords in SIP URL userinfo (user:password@host) is NOT RECOMMENDED because passing authentication credentials in clear-text URIs has proven to be a security risk in every protocol where it has been used.
section: "2"
rfc2119_level: RECOMMENDED
