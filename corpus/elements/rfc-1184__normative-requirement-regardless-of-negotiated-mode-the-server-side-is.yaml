document: rfc-1184
kind: normative-requirement
summary: Regardless of negotiated mode, the server side is responsible for all output processing. It MUST send CR LF for newline, CR NUL for carriage return only, and LF for linefeed only.
section: "5.3"
rfc2119_level: MUST
