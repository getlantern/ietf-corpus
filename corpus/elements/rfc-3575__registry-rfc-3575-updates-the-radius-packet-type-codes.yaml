document: rfc-3575
kind: registry
summary: RFC 3575 updates the RADIUS Packet Type Codes registry created by RFC 2865, formally allocating codes 40-45 (Disconnect-Request/ACK/NAK, CoA-Request/ACK/NAK) from RFC 3576, reserving codes 250-253 for Experimental Use, and reserving 254-255. Codes 1-5 and 11-13 were allocated in RFC 2865.
