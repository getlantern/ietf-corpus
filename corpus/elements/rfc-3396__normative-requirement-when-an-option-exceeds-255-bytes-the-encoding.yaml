document: rfc-3396
kind: normative-requirement
summary: When an option exceeds 255 bytes, the encoding agent MUST follow the splitting algorithm specified in RFC 3396. This method MUST also be used for splitting options shorter than 255 bytes if the encoding agent needs to do so.
section: "4"
rfc2119_level: MUST
