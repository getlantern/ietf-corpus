document: rfc-5535
kind: design-rationale
summary: HBAs use a hash-based (symmetric key) approach rather than pure CGA (public-key) approach to avoid the performance cost of public-key operations for every communication in multihomed environments. The HBA and CGA approaches are not mutually exclusive — addresses can be both valid HBA and CGA simultaneously.
section: "3.3"
topics:
