kind: normative-requirement
summary: The CSR Attributes Response structure SHOULD, to the greatest extent possible, reflect the structure of the CSR it is requesting, so that signature scheme requests appear as OIDs in SignatureAlgorithm and algorithm parameter requests appear as attributes in SubjectPublicKeyInfo.
