document: rfc-3986
kind: normative-requirement
summary: When comparing URIs, syntax-based normalization requires that percent-encoded octets corresponding to unreserved characters be decoded, that scheme and host be lowercased, and that empty or default port numbers be normalized. Protocol-based normalization may use knowledge of scheme defaults (e.g., default port 80 for http) to further reduce equivalent forms.
section: 6.2.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
