document: rfc-2744
kind: normative-requirement
summary: When a gss_buffer_desc describes a printable string, the length field must not count a trailing NUL character, and neither the GSS-API implementation nor the application should assume the presence of an uncounted trailing NUL.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - security
