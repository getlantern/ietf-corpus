document: rfc-5818
kind: normative-requirement
summary: Upon receipt of a ConfirmDataChannelStatusAck message, the SENDER MUST compare the received remote data channel statuses with local statuses. If a mismatch is found, the result SHOULD be reported to the management plane.
section: "6"
rfc2119_level: MUST
topics:
    - routing
