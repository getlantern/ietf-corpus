document: rfc-4643
kind: normative-requirement
summary: Cached results of CAPABILITIES from a previous session MUST NOT be relied on for AUTHINFO, as the extension is security-related. A client MAY use cached results to detect active down-negotiation attacks.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
