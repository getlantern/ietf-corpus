document: rfc-6231
kind: protocol-element
summary: 'The <mscivr> root element wraps all package messages. Its mandatory ''version'' attribute is fixed at ''1.0''. It contains exactly one child element: a dialog management element (<dialogprepare>, <dialogstart>, <dialogterminate>, <response>, or <event>) or an audit element (<audit> or <auditresponse>).'
section: "4.1"
