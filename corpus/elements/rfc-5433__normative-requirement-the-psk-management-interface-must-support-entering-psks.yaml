document: rfc-5433
kind: normative-requirement
summary: The PSK management interface MUST support entering PSKs up to 64 octets as ASCII strings and in hexadecimal encoding; it SHOULD support non-ASCII octets for ID_Peer and ID_Server up to 254 octets. ID_Peer and ID_Server MUST be provisioned together with the PSK.
section: "5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
