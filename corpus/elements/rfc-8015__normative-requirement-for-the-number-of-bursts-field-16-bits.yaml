document: rfc-8015
kind: normative-requirement
summary: For the Number of Bursts field (16 bits), if the measured value exceeds 0xFFFD, the value 0xFFFE MUST be reported to indicate over-range. If the measurement is unavailable, 0xFFFF MUST be reported.
section: "3.2"
rfc2119_level: MUST
