document: rfc-3736
kind: protocol-element
summary: The Status Code option is used to indicate completion status or other status information (RFC 3315 section 22.13). The Server Identifier option is used to identify the server responding to a client request (RFC 3315 section 22.3). Both are required for stateless DHCP service.
section: "5.2"
