summary: The Compact FEC Scheme (FEC Encoding ID 130) is an Under-Specified FEC Scheme similar in structure to the Compact No-Code Scheme but permitting a non-trivial Under-Specified FEC encoding. It reuses the Compact No-Code FEC Payload ID format (Section 3.2.1) and the Common OTI format from Section 4.
