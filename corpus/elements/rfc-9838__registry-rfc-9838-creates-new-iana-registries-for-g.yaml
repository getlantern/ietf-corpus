document: rfc-9838
kind: registry
summary: RFC 9838 creates new IANA registries for G-IKEv2 (Section 9.1) and modifies existing IKEv2 registries (Section 9.2). New assignments include exchange types for GSA_AUTH, GSA_REGISTRATION, GSA_REKEY, and GSA_INBAND_REKEY; payload types 50 (IDg) and 51 (GSA); new Transform Types GCAUTH (Group Controller Authentication Method) and KWA (Key Wrap Algorithm); a Security Protocol Identifier GIKE_UPDATE (value 6); and new Notify message types including INVALID_GROUP_ID, AUTHORIZATION_FAILED, REGISTRATION_FAILED, and GROUP_SENDER.
section: "9"
topics:
    - ipsec
    - security
    - registry
