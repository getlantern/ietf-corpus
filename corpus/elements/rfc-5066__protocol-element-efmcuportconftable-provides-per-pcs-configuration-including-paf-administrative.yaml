document: rfc-5066
kind: protocol-element
summary: efmCuPortConfTable provides per-PCS configuration including PAF administrative state (efmCuPAFAdminState), PAF discovery code (efmCuPAFDiscoveryCode, 6-octet PhysAddress), admin profile list (efmCuAdminProfile, up to 6 profile indices), target data rate (efmCuTargetDataRate, 1–100000 Kbps or 999999 for best-effort), target SNR margin (efmCuTargetSnrMgn, 0–21 dB), adaptive spectra flag, and low-rate threshold. All configuration entries MUST be maintained persistently.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
