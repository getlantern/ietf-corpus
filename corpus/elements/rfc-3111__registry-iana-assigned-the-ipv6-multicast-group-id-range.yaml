document: rfc-3111
kind: registry
summary: IANA assigned the IPv6 multicast group-id range FF0X::1:1000–FF0X::1:13FF for use by Service Location Protocol. The range FF05::1:1000–FF05::1:13FF was previously assigned in RFC 2375; this document extends it across all scopes (FF0X). No additional IANA registry is required.
