document: rfc-2997
kind: design-rationale
summary: The Null Service was introduced because applications like ERP systems are mission critical and require prioritized service, but cannot readily specify their resource requirements. Rather than forcing them to quantify resources (as Guaranteed or Controlled Load Intserv services require), the Null Service lets applications identify themselves to policy agents and defer resource allocation decisions to the network administrator.
