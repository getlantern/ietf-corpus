document: rfc-8353
kind: protocol-element
summary: GSSName represents principal identities and may contain multiple names from different namespaces referring to the same entity. Key operations are equals (name comparison), canonicalize (convert to mechanism name), export (produce byte-array MN form importable as NT_EXPORT_NAME), and toString.
section: "7.2"
