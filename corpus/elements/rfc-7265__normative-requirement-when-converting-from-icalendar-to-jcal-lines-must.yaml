document: rfc-7265
kind: normative-requirement
summary: When converting from iCalendar to jCal, lines MUST first be unfolded, then iCalendar escaping MUST be unescaped, and finally JSON escaping MUST be applied. The reverse order applies when converting from jCal to iCalendar.
section: "3.1"
rfc2119_level: MUST
topics:
    - json
