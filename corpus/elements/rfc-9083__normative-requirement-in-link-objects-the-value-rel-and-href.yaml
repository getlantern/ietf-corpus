document: rfc-9083
kind: normative-requirement
summary: In link objects, the "value", "rel", and "href" JSON values MUST be specified. A "related" link relation MUST NOT include an "href" URI that is the same as the "self" link relation href to reduce the risk of infinite client processing loops.
section: "4.2"
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
