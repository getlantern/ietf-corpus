document: rfc-9838
kind: protocol-element
summary: The Group Identification (IDg) payload uses the IKEv2 Identification Payload format to indicate which group the GM wishes to join. ID type ID_KEY_ID MUST be supported; ID_IPV4_ADDR, ID_FQDN, ID_RFC822_ADDR, and ID_IPV6_ADDR SHOULD be supported; ID_DER_ASN1_DN and ID_DER_ASN1_GN are not expected to be used. The Payload Type is 50.
section: "4.2"
topics:
    - ipsec
    - security
