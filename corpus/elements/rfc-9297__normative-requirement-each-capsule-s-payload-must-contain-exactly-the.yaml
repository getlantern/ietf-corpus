document: rfc-9297
kind: normative-requirement
summary: Each Capsule's payload MUST contain exactly the fields identified in its description. A Capsule payload with extra bytes or one that terminates before the end of the identified fields MUST be treated as malformed. Redundant length encodings MUST be verified to be self-consistent.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
