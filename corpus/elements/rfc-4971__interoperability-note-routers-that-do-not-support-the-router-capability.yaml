document: rfc-4971
kind: interoperability-note
summary: Routers that do not support the Router CAPABILITY TLV MUST silently ignore the TLV(s) and continue processing other TLVs in the same LSP. Routers that do not support specific sub-TLVs MUST silently ignore unsupported sub-TLVs and continue processing supported ones.
section: "4"
topics:
