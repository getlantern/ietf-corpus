document: rfc-2878
kind: protocol-element
summary: The Bridging Control Protocol (BCP) is a PPP Network Control Protocol (NCP) responsible for configuring, enabling, and disabling bridge protocol modules on both ends of a PPP link. It uses the same packet exchange mechanism as LCP and is identified by PPP Protocol field value 0x8031. Bridged PDUs are carried with PPP Protocol field value 0x0031.
section: "4"
