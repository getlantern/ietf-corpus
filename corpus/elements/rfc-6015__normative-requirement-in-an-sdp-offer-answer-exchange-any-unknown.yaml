document: rfc-6015
kind: normative-requirement
summary: In an SDP Offer/Answer exchange, any unknown format parameter in the offer MUST be ignored and deleted from the answer. If FEC is not desired by the receiver, the FEC stream can be deleted from the answer.
section: 5.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
