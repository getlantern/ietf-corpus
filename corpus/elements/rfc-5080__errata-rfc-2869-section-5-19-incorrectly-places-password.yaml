document: rfc-5080
kind: errata
summary: RFC 2869 Section 5.19 incorrectly places Password-Retry in the Reject column (0-1) of the attribute table. The correct placement is in the Challenge column (0-1) with Reject = 0. Additionally, Password-Retry in EAP authentications is deprecated per RFC 3579; it is only valid for ARAP authentication.
section: 2.6.1
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
