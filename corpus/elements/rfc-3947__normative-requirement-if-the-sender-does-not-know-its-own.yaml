document: rfc-3947
kind: normative-requirement
summary: If the sender does not know its own IP address (e.g., multiple interfaces), it MAY include multiple local hashes as separate NAT-D payloads. NAT is detected if and only if none of those hashes match the remote's payload.
section: "3.2"
rfc2119_level: MAY
topics:
    - ipsec
    - vpn
    - nat
