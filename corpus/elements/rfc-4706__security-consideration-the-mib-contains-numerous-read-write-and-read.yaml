document: rfc-4706
kind: security-consideration
summary: The MIB contains numerous read-write and read-create objects (configuration profiles, templates, line commands) that can directly affect ADSL line operation; unauthorized access could disrupt service for all subscribers on managed lines. Implementors are directed to use SNMPv3 with authentication and privacy to protect these objects.
section: "5"
topics:
    - snmp
    - security
