document: rfc-5189
kind: normative-requirement
summary: 'The lifetime granted by the middlebox for any policy rule must satisfy: 0 ≤ lt_granted ≤ MIN(lt_requested, lt_maximum), where lt_maximum is the maximum lifetime reported at session setup. This formula applies identically to PRR, PER, and RLC transactions.'
section: 2.3.8
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
