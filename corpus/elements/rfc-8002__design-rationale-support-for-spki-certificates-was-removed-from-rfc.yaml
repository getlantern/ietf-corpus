document: rfc-8002
kind: design-rationale
summary: Support for SPKI certificates was removed from RFC 6253 in this update (RFC 8002). Types 2, 4, 6, and 8, previously assigned to SPKI, are now marked Obsoleted. This is the sole technical change from RFC 6253.
