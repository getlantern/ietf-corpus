document: rfc-2797
kind: protocol-element
summary: RevRequest (id-cmc 17) carries a certificate revocation request, including issuerName, serialNumber, reason (CRLReason), optional invalidityDate, optional sharedSecret (for key-loss scenarios), and optional comment. Clients MUST provide digitally signed revocation capability; servers MUST accept both signed and shared-secret-based revocation requests.
section: "5.11"
topics:
    - pkix
    - security
