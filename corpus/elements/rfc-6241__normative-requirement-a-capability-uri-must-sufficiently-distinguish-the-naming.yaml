document: rfc-6241
kind: normative-requirement
summary: A capability URI MUST sufficiently distinguish the naming authority to avoid naming collisions. To support a capability, a server MUST support all capabilities upon which it depends.
section: "1.3"
rfc2119_level: MUST
topics:
