document: rfc-7787
kind: normative-requirement
summary: Replies to multicast TLVs received on a multiple-access link MUST be delayed by a random time in [0, Imin/2] to avoid simultaneous replies. Network State TLV replies MUST be rate limited to at most one Request Network State TLV per link per unique network state hash within Imin.
section: "4.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
