document: rfc-2819
kind: normative-requirement
summary: If a remote monitoring device implements a group, it MUST implement all objects in that group. All ten groups are optional. Implementations MUST also implement the system group of MIB-II and the IF-MIB.
section: "2.3"
rfc2119_level: MUST
topics:
