document: rfc-5629
kind: interoperability-note
summary: A UA that wishes to support client-local user interfaces should not encrypt the capability-advertising SIP header fields (Allow, Allow-Events, Supported, Contact schemes), because these headers are examined by proxies that may be executing applications.
section: "9.1"
topics:
    - sip
    - realtime
    - security
