document: rfc-2020
kind: protocol-element
summary: 'ifMtu for an 802.12 interface depends on the current framing type: 1500 when dot12CurrentFramingType is frameType88023 (Ethernet framing), and 4464 when frameType88025 (Token Ring framing). Changing dot12DesiredFramingType may change ifMtu after the next training.'
section: 3.3.6
