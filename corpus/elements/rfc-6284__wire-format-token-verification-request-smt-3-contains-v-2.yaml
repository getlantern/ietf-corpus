document: rfc-6284
kind: wire-format
summary: 'Token Verification Request (SMT=3): contains V=2/P/SMT/PT=TOKEN header, 32-bit SSRC of client, 64-bit Associated Nonce, variable-length Token Element (as received in Port Mapping Response), and 64-bit Associated Absolute Expiration Time. This message accompanies RTCP feedback messages that trigger or control a unicast session.'
