document: rfc-7601
kind: design-rationale
summary: The 'iprev' method is included not as an endorsement but merely as acknowledgment that reverse DNS mapping remains common and provides a means to relay results. Extensive caveats note that in some regions the test cannot reliably pass, and [DNSOP-REVERSE] recommends against using it for authentication or security.
