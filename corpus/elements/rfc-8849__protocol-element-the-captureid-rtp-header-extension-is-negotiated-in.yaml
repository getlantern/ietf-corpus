document: rfc-8849
kind: protocol-element
summary: The CaptureID RTP header extension is negotiated in SDP using the URN 'urn:ietf:params:rtp-hdrext:sdes:CaptureID' and is carried using the mechanism defined in RFC 7941. Senders MAY send it only when a new MC is switched, but SHOULD send it in the first few RTP packets to reduce risk of loss.
section: "5.2"
topics:
    - rtp
    - realtime
