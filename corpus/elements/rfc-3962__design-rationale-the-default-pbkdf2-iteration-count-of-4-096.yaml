document: rfc-3962
kind: design-rationale
summary: The default PBKDF2 iteration count of 4,096 (00 00 10 00) is defined solely as the interpretation of an absent string-to-key parameter when the KDC has had an opportunity to supply it; it is explicitly not a recommendation for use in optimistic preauthentication or as a site default.
