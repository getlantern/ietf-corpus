document: rfc-5044
kind: interoperability-note
summary: 'Appendix C describes interoperability between IETF RNIC implementations (permissive and non-permissive) and RDMA Consortium (RDMAC) RNICs. The key parameter differences involve Marker and CRC negotiation: RDMAC always requires Markers; a non-permissive IETF RNIC that cannot interoperate with an RDMAC RNIC MUST close the connection.'
