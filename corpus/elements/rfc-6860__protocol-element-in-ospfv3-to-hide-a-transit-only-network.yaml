document: rfc-6860
kind: protocol-element
summary: In OSPFv3, to hide a transit-only network, IPv6 address prefixes are omitted from the router-LSA. The Designated Router building an intra-area-prefix-LSA referencing that network-LSA will consequently also omit those prefixes.
section: "3"
