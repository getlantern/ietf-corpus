document: rfc-6463
kind: normative-requirement
summary: Each LMA in a runtime assignment domain MUST be reachable at a unicast IP address, and the rfLMA and r2LMA MUST have a prior agreement, adequate means to secure their inter-LMA communication, and an established trust relationship.
section: "3"
rfc2119_level: MUST
topics:
