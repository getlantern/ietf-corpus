document: rfc-8949
kind: interoperability-note
summary: JavaScript and similar environments that represent all numbers as IEEE 754 binary64 may silently lose precision when decoding CBOR integers with more than 53 significant bits. CBOR-based protocols should define expectations for handling such nontrivial numbers in receiving applications.
section: "5.5"
topics:
    - cbor
    - json
