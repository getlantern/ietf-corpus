document: rfc-9421
kind: protocol-element
summary: 'Six signature algorithms are defined with string identifiers: rsa-pss-sha512 (RSASSA-PSS with SHA-512), rsa-v1_5-sha256 (RSASSA-PKCS1-v1_5 with SHA-256), hmac-sha256 (HMAC-SHA256), ecdsa-p256-sha256 (ECDSA P-256 with SHA-256), ecdsa-p384-sha384 (ECDSA P-384 with SHA-384), and ed25519 (EdDSA with edwards25519). JWS algorithms may also be mapped.'
section: "3.3"
topics:
