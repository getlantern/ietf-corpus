summary: ospfGeneralGroup (OID ospf 1) contains global variables for the OSPF process, including ospfRouterId (32-bit RouterID), ospfAdminStat (enabled/disabled), ospfVersionNumber (read-only, value 2), ospfAreaBdrRtrStatus, ospfASBdrRtrStatus, ospfExternLSACount, ospfExternLSACksumSum, ospfTOSSupport, ospfOriginateNewLSAs, and ospfRxNewLSAs.
