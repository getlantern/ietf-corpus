document: rfc-4583
kind: normative-requirement
summary: When the existing TCP connection is reset, the client SHOULD generate an offer towards the floor control server to reestablish the connection. If a TCP connection times out, the entity that detected the timeout SHOULD generate an offer to reestablish.
section: "7"
rfc2119_level: SHOULD
topics:
    - realtime
    - tcp
