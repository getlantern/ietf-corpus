document: rfc-5552
kind: wire-format
summary: 'The BYE message body uses application/x-www-form-urlencoded;charset=utf-8 encoding. Namelist variables are converted to JSON values. The reserved name __reason carries ''exit'' or ''disconnect'' to distinguish VoiceXML <exit> from <disconnect>. If expr is used instead of namelist, the reserved name __exit is used. Example: ''id=1234&pin=9999&__reason=exit''.'
section: "4.2"
topics:
    - sip
    - voip
    - json
