document: rfc-2955
kind: interoperability-note
summary: For interworked connections, the ATM MIB object atmVclCrossConnectIdentifier is set to zero, and frAtmIwfVclCrossConnectIdentifier (defined in this MIB's AUGMENT of atmVclTable) carries the FR/ATM IWF index; the ATM VCL cross-connect table (atmVcCrossConnectTable) does not contain an entry for the interworked connection.
