document: rfc-4120
kind: state-machine
summary: 'Ticket flags represent the lifecycle and capability state of a ticket. Key transitions: INVALID set at issuance for postdated tickets, cleared by KDC VALIDATE after starttime; RENEWABLE tickets must be periodically renewed via TGS RENEW before renew-till; FORWARDABLE/FORWARDED and PROXIABLE/PROXY flags control delegation chains. PRE-AUTHENT and HW-AUTHENT propagate from TGTs to derived tickets.'
