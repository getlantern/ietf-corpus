document: rfc-4570
kind: interoperability-note
summary: Source addresses specified in the 'source-filter' attribute are those seen by a receiver. If addresses undergo translation en route (e.g., via NAT or tunneling), the attribute will not be accurate unless the addresses therein are also translated accordingly.
section: "3"
topics:
    - nat
    - multicast
    - realtime
