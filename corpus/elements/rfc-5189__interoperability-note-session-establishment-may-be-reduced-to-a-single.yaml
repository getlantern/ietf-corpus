document: rfc-5189
kind: interoperability-note
summary: Session establishment may be reduced to a single transaction if mutual authentication is provided by the underlying transport, e.g., TLS (RFC 4346) or IPsec (RFC 4302/4303). In this case the server challenge and agent challenge parameters are omitted by the sender or ignored by the receiver.
section: 2.2.1
topics:
    - nat
    - security
    - tls
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
