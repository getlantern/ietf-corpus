document: rfc-4535
kind: wire-format
summary: 'The Generic Payload Header is prepended to every GSAKMP payload and contains: Next Payload type (1 octet identifying the following payload), a Reserved octet, and Payload Length (2 octets including the header). It enables chaining of heterogeneous payload types within a single message.'
section: 7.2.1
topics:
    - security
