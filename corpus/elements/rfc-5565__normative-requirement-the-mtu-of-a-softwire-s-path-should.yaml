document: rfc-5565
kind: normative-requirement
summary: The MTU of a softwire's path SHOULD be large enough so that (a) no packet will need to be fragmented before encapsulation, and (b) no encapsulated packet will need fragmentation while in transit.
section: "4.3"
rfc2119_level: SHOULD
