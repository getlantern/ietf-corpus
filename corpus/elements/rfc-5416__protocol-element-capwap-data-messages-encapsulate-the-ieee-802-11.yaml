document: rfc-5416
kind: protocol-element
summary: CAPWAP data messages encapsulate the IEEE 802.11 header and payload excluding the FCS checksum. The WTP validates and strips the FCS on uplink frames before forwarding to the AC; on downlink, the WTP computes and appends the FCS. The Optional Wireless Specific Information header carries IEEE 802.11 Frame Info (WTP-to-AC direction) or Destination WLANs (AC-to-WTP direction).
section: "4"
