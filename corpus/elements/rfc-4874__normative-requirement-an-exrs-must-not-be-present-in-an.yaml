document: rfc-4874
kind: normative-requirement
summary: An EXRS MUST NOT be present in an XRO. The L bit in the outer EXRS ERO subobject MUST be set to zero on transmission and MUST be ignored on receipt; the L bits in the inner EXRS subobjects carry the exclude/avoid semantics as defined for XRO subobjects.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
