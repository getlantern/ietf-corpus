document: rfc-7550
kind: normative-requirement
summary: A client SHOULD accept Advertise messages even when not all requested IA option types are being offered, and SHOULD include the not-offered IA option types in its subsequent Request message. A client SHOULD only ignore an Advertise when none of the requested IAs include offered addresses or delegated prefixes.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
