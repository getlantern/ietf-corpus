document: rfc-4301
kind: design-rationale
summary: IPsec security protocols are designed to be cryptographic algorithm-independent. Mandatory and default algorithms are specified in separate RFCs so they can be updated without affecting the standardization status of AH, ESP, or IKEv2 specifications, enabling timely response to cryptanalytic advances.
section: "2.1"
topics:
    - ipsec
    - crypto
    - security
