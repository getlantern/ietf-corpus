document: rfc-7248
kind: normative-requirement
summary: Only XMPP <presence/> stanzas lacking a 'type' attribute or with type='unavailable' SHOULD be mapped by an XMPP-to-SIP gateway to SIP NOTIFY requests, since those are the only stanzas representing notifications.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
