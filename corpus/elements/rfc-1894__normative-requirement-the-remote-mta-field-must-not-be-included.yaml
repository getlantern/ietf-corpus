document: rfc-1894
kind: normative-requirement
summary: The Remote-MTA field MUST NOT be included if no remote MTA was involved in the attempted delivery. When present, it identifies the next-hop MTA that reported delivery status to the Reporting MTA.
section: 2.3.5
rfc2119_level: MUST NOT
