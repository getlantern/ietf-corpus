document: rfc-1196
kind: design-rationale
summary: The {Q2} forwarding default is recommended to be 'refuse' rather than 'allow' because the cases warranting forwarding are far outnumbered by cases where it poses a security risk, particularly for hosts acting as gateways at a security perimeter where enabling {Q2} creates an unauthorized path through the perimeter.
section: 3.2.1
topics:
    - security
