document: rfc-7601
kind: normative-requirement
summary: Any MTA conforming to this specification MUST delete any discovered instance of the Authentication-Results header field that claims to have been added within its trust boundary but did not come directly from another trusted MTA. This prevents forgery of authentication results by external parties.
section: "5"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
