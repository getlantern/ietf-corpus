document: rfc-3685
kind: security-consideration
summary: SIEVE implementations SHOULD ensure that 'spamtest' and 'virustest' tests can only occur for messages that have gone through a legitimate spam or virus check process. If checks rely on special headers, the implementation must ensure those headers cannot be spoofed by the sender, preventing false test results.
section: "3"
rfc2119_level: SHOULD
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
