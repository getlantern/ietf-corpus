document: rfc-8925
kind: protocol-element
summary: V6ONLY_WAIT is the duration (in seconds) for which a client SHOULD stop DHCPv4 configuration after receiving the IPv6-Only Preferred option. Default is 1800 seconds; it MUST NOT be less than MIN_V6ONLY_WAIT (300 seconds).
section: "3.4"
topics:
    - ip
    - v6ops
