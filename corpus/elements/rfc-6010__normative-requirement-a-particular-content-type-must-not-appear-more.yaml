document: rfc-6010
kind: normative-requirement
summary: A particular content type MUST NOT appear more than once in a CMSContentConstraints extension. Intermediate content types (SignedData, EnvelopedData, DigestedData, EncryptedData, AuthEnvelopedData, AuthenticatedData, CompressedData, ContentCollection, ContentWithAttributes) MUST NOT be included in the permitted content types list.
section: "2"
rfc2119_level: MUST NOT
topics:
