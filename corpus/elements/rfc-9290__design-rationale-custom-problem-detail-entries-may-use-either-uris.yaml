document: rfc-9290
kind: design-rationale
summary: Custom Problem Detail entries may use either URIs (no registration needed, useful during development and in tightly integrated deployments) or unsigned integers (registered, more compact encoding). The URI form avoids needing a 'Private Use' range for integers, while the uint form benefits constrained environments through shorter encoding.
section: "3.2"
topics:
