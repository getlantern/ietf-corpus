document: rfc-2239
kind: protocol-element
summary: rpMauJabberTrap and ifMauJabberTrap are NOTIFICATION-TYPEs sent when a managed MAU enters the jabber state. Agents must throttle consecutive jabber traps so there is at least a five-second gap between them.
