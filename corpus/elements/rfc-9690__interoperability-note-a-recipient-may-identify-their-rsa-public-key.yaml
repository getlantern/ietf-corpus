document: rfc-9690
kind: interoperability-note
summary: 'A recipient may identify their RSA public key using either rsaEncryption (PKCS #1 v1.5 OID) or id-rsa-kem-spki; when rsaEncryption is used, willingness to accept RSA-KEM is not indicated by the OID and MAY instead be signaled via the SMIMECapabilities attribute or certificate extension.'
section: "2.3"
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
