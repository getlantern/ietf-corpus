document: rfc-933
kind: security-consideration
summary: The primary purpose of this option is to support mandatory security labeling of terminal sessions as required by the DoD TCSEC. By displaying a persistent banner that is managed by User-Telnet rather than application data, the label cannot be suppressed or spoofed by the server application.
section: "4"
topics:
    - security
