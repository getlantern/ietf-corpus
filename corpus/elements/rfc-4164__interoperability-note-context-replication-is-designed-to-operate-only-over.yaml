document: rfc-4164
kind: interoperability-note
summary: Context replication is designed to operate only over links where a feedback channel is available. Without a feedback channel, the compressor cannot obtain the acknowledgement required to select a valid base context, and the mechanism cannot be used.
section: 3.3.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
