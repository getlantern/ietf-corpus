document: rfc-8753
kind: security-consideration
summary: Changes in the calculated derived property value for a code point — from DISALLOWED to PVALID or from PVALID to DISALLOWED — can cause changes in label interpretation that are visible and confusing to end users and might enable attacks such as homograph-based spoofing or unexpected label equivalence.
section: "8"
topics:
