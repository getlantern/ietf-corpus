document: rfc-7533
kind: normative-requirement
summary: The association between path and FSN created by FEDFS_CREATE_JUNCTION MUST be durable before the operation returns successfully; upon success the junction is immediately accessible. If the last path component is already a junction, FEDFS_ERR_EXIST MUST be returned even if the requested junction is identical to the existing one.
section: 5.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
