document: rfc-8314
kind: normative-requirement
summary: The default minimum confidentiality for all new MUA accounts MUST require successful validation of the server's certificate and SHOULD require negotiation of TLS version 1.1 or greater. An MUA configured to require minimum confidentiality MUST NOT perform any operation other than capability discovery or STARTTLS unless that minimum is met.
section: "5.2"
rfc2119_level: MUST
topics:
    - tls
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
