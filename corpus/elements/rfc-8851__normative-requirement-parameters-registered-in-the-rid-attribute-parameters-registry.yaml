document: rfc-8851
kind: normative-requirement
summary: Parameters registered in the 'RID Attribute Parameters' registry MUST be of the form where applying the modification results in a stream that still complies with other parameters — restrictions always produce a subset of what is otherwise allowable and never expand it.
