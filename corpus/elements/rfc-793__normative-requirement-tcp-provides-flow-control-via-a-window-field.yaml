document: rfc-793
kind: normative-requirement
summary: TCP provides flow control via a window field in every ACK, indicating the number of octets the receiver is currently prepared to accept starting from the acknowledgment number. The sender must not transmit beyond the window boundary without further permission.
section: "2.6"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
