document: rfc-4037
kind: protocol-element
summary: 'PETDM (Protocol Element Type Declaration Mnemonic) is a formal type-extension system for OCP. It supports atoms, lists, structures, and messages as base types extended via ''extends''. OCP extensions SHOULD use PETDM; all extensions MUST define a namespace tag (core namespace: ''Core''). Unrecognized members in valid-format messages MUST be ignored.'
section: "9"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
