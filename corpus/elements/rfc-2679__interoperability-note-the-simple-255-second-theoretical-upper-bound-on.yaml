document: rfc-2679
kind: interoperability-note
summary: The simple 255-second theoretical upper bound on IP packet lifetimes (RFC 791) could be used as the loss threshold, but implementors should apply good engineering judgment about packet lifetimes in practice; for many applications, treating a very large delay as infinite causes no harm.
