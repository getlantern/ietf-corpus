document: rfc-5374
kind: normative-requirement
summary: GSPD entries marked as 'sender only' MUST be placed in GSPD-O only; entries marked as 'receiver only' MUST go to GSPD-I only. This directionality prevents creation of bidirectional SAs where only one direction is authorized.
section: 4.1.1
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
