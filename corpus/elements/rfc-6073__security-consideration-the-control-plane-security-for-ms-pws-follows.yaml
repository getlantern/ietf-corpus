document: rfc-6073
kind: security-consideration
summary: The control plane security for MS-PWs follows the guidelines in RFC 5920 (MPLS PSN) and the base security considerations of RFC 4447 (LDP), RFC 3931 (L2TPv3), and RFC 3985 (PWE3 architecture). No new control plane security mechanisms are introduced.
