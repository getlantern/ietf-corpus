document: rfc-9705
kind: protocol-element
summary: The CONDITIONS object (Class Number 135, C-type 1) is added to a PathTear to make it conditional. It contains a 32-bit Flags field with a Merge-point condition (M) bit at bit 31; when M=1, the PathTear MUST be processed according to the receiver's role as MP or not.
section: 4.4.3
topics:
    - mpls
    - routing
