document: rfc-5536
kind: security-consideration
summary: The Netnews article format provides no security services such as confidentiality, sender authentication, or non-repudiation. Such services must be layered above using S/MIME (RFC 3851) or PGP/MIME (RFC 3156), or below using secure news transport protocols.
section: "5"
topics:
