document: rfc-5229
kind: design-rationale
summary: Namespaces are reserved for future extensions that make internal state available through variables. Extensions using namespaces SHOULD use their capability string as the first namespace component and SHOULD state which namespace variables are modifiable via "set".
section: "3"
