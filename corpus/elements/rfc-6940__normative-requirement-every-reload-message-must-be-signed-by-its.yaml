document: rfc-6940
kind: normative-requirement
summary: Every RELOAD message MUST be signed by its originating node, providing message-level integrity and authentication. Objects stored in the overlay are additionally signed by the creating node at the object level.
section: "1.3"
rfc2119_level: MUST
topics:
