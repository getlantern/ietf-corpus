document: rfc-6313
kind: normative-requirement
summary: A Collecting Process MUST note the Information Element identifier of any IE it does not understand and MAY discard it. A Collector that does not support structured data extensions MAY ignore Structured Data IEs or Data Records containing them while continuing to process other records.
section: "7"
rfc2119_level: MUST
topics:
