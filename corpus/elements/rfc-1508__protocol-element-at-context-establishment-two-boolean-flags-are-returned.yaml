document: rfc-1508
kind: protocol-element
summary: 'At context establishment, two boolean flags are returned: integ_avail indicates whether per-message integrity and data origin authentication services are available; conf_avail indicates whether per-message confidentiality is available. The conf_avail flag will never be TRUE unless integ_avail is also TRUE.'
section: 1.2.2
topics:
