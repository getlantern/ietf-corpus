document: rfc-4933
kind: normative-requirement
summary: At least one <contact:add>, <contact:rem>, or <contact:chg> element MUST be provided in an <update> command if the command is not being extended. All may be omitted if an update extension is present.
section: 3.2.5
rfc2119_level: MUST
