document: rfc-1112
kind: normative-requirement
summary: If an upper-layer protocol does not specify a TTL for an outgoing multicast datagram, the TTL MUST default to 1, so that multicasting beyond a single network requires an explicit choice.
section: "6.1"
rfc2119_level: SHOULD
topics:
