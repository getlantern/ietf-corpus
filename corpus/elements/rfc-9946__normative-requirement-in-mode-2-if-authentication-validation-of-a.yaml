document: rfc-9946
kind: normative-requirement
summary: In Mode 2, if authentication validation of a Status PDU fails the receiver SHALL ignore the message; if the watchdog timer subsequently expires, the test session SHALL prematurely terminate and no further load traffic SHALL be transmitted.
section: 5.3.2
rfc2119_level: MUST
topics:
    - security
    - measurement
