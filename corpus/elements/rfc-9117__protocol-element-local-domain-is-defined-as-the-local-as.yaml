document: rfc-9117
kind: protocol-element
summary: Local Domain is defined as the local AS or local confederation of ASes (RFC 5065). eBGP is peering to a router not within the Local Domain; iBGP encompasses both classic iBGP and any eBGP peering within the same confederation (i.e., any peering that is not eBGP as defined above).
