document: rfc-727
kind: normative-requirement
summary: Upon receiving IAC DO LOGOUT, a server may respond with IAC WILL LOGOUT and then forcibly log off the user process; it need not wait for the user to receive confirmation before starting the logout.
section: "5"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
