document: rfc-5711
kind: interoperability-note
summary: This document clarifies and restates procedures from RFC 3209 and RFC 3473 without defining new protocol extensions. Implementations must reconcile the Path_State_Removed flag behavior from RFC 3473 with the general RFC 2205 rule that PathErr messages do not modify node state.
section: "2.2"
