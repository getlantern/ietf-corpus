document: rfc-4480
kind: protocol-element
summary: The <user-input> element records the usage state of a service, device, or person as either 'active' or 'idle', with optional 'last-input' (xs:dateTime) and 'idle-threshold' (seconds) attributes. When contained in a <person> element, it summarizes input activity across all devices and services.
