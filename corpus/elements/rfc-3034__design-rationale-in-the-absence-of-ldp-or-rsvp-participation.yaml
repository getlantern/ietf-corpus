document: rfc-3034
kind: design-rationale
summary: In the absence of LDP or RSVP participation to set VC parameters, the default VC parameters should be zero CIR so that input policing sets the DE bit on incoming frames but no frames are dropped. This emulates a best-effort IP router as the default behavior for MPLS-controlled Frame Relay circuits.
