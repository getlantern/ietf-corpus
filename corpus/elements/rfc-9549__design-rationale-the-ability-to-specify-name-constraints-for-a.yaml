document: rfc-9549
kind: design-rationale
summary: The ability to specify name constraints for a particular mailbox (e.g., 'root@example.com') was removed because this capability was not used in practice. Removing it allows name constraints to apply uniformly to email addresses in both rfc822Name and SmtpUTF8Mailbox within otherName.
section: "2.2"
topics:
    - pkix
    - email
