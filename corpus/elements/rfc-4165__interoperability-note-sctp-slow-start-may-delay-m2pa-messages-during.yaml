document: rfc-4165
kind: interoperability-note
summary: SCTP slow start may delay M2PA messages during link alignment (new association), changeover (new or idle alternate link), path failure (multi-homing path switch), or after reduced traffic volume. Sending Link Status Proving messages during the proving period can pre-warm SCTP slow start before the link enters service.
section: 4.3.1
topics:
    - sctp
    - congestion
