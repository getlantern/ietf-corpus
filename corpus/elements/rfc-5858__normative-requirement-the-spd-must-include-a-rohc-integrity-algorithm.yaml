document: rfc-5858
kind: normative-requirement
summary: The SPD must include a ROHC INTEGRITY ALGORITHM field (list of integrity algorithms for header integrity verification) and a ROHC ICV LENGTH field. Authentication algorithms that MUST be supported are those specified in the 'Authentication Algorithms' table of RFC 4835.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
