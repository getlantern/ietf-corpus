document: rfc-6864
kind: normative-requirement
summary: Sources emitting non-atomic datagrams MUST NOT repeat IPv4 ID values within one MDL for a given source address/destination address/protocol tuple. This requirement from RFC 791 is preserved for non-atomic datagrams.
section: "4.3"
rfc2119_level: MUST NOT
