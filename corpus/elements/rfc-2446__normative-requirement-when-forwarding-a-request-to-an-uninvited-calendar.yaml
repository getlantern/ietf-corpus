document: rfc-2446
kind: normative-requirement
summary: When forwarding a REQUEST to an uninvited calendar user, the forwarding Attendee MUST NOT make changes to the VEVENT property set. The Organizer decides whether to add the uninvited CU; if declining, the Organizer MAY send a CANCEL to the uninvited CU.
section: 3.2.2.6
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
