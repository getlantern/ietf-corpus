document: rfc-8519
kind: interoperability-note
summary: 'Linux nftables follows a structure very similar to the ietf-access-control-list module: a single utility with input/output ACEs each having match and action. The RFC notes that translation between the ACL YANG model and Linux nftables should be straightforward.'
