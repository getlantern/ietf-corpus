document: rfc-1519
kind: protocol-element
summary: Aggregates must not numerically encompass class D (multicast) address space even if they do so numerically. The handling of aggregates that span multicast addresses is not well understood and the optimal strategy is to exclude class D from any aggregate.
section: "4.4"
topics:
    - ip
    - routing
    - multicast
