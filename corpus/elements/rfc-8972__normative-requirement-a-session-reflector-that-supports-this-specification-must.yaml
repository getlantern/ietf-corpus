document: rfc-8972
kind: normative-requirement
summary: A Session-Reflector that supports this specification MUST identify a STAMP session using the SSID combined with the 4-tuple, MUST be provisioned with all identifying elements before the session begins, MUST discard non-matching test packets, and MUST copy the SSID value from received packets into reflected packets.
section: "3"
rfc2119_level: MUST
topics:
    - measurement
