document: rfc-9767
kind: protocol-element
summary: An RS can derive a downstream token for a chained RS by calling the AS's grant endpoint with the existing_access_token field set to the incoming token value and identifying itself in the client field with its own key. The AS issues a new, scoped token for use at the secondary RS.
section: "4"
topics:
    - oauth
    - security
