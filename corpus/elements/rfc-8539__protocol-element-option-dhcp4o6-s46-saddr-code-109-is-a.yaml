document: rfc-8539
kind: protocol-element
summary: OPTION_DHCP4O6_S46_SADDR (code 109) is a DHCPv4 option (used only within DHCP 4o6) that carries the client's 128-bit IPv6 softwire source address. It has a fixed option-length of 16 and is included in DHCPREQUEST and DHCPACK messages to bind the IPv4 lease to the softwire source address.
section: "6.2"
topics:
    - v6ops
