document: rfc-4077
kind: normative-requirement
summary: Any implementation that will send NACK messages upon decompression failure must indicate a SigComp version number of 0x02 in its UDVM, enabling peers to detect NACK support and optimize compression by optimistically referencing unacknowledged state.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
