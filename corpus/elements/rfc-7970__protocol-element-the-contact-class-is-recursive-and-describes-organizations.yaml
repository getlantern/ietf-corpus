document: rfc-7970
kind: protocol-element
summary: The Contact class is recursive and describes organizations or individuals involved in an incident. Required attributes are role (creator/reporter/admin/tech/irt/abuse/leo/victim/cc/leo/vendor etc.) and type (person/organization); child Contact elements inherit ancestor contact data.
