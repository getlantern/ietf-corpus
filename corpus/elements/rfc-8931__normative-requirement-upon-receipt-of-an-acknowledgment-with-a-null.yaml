document: rfc-8931
kind: normative-requirement
summary: Upon receipt of an acknowledgment with a NULL bitmap, the fragmenting endpoint MUST abort the transmission of the fragmented datagram, with the single exception that for the first fragment it MAY decide to retry via an alternate next hop.
section: "6.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
