document: rfc-5936
kind: security-consideration
summary: Ensuring an AXFR client does not accept a forged zone copy is critical. Protection mechanisms include dedicated links, VPNs among authoritative servers, and use of TSIG or SIG(0) for message authentication and integrity verification. RFC 3833 Section 4.3 separately delineates zone transfer security from DNSSEC-addressed threats.
section: "6"
topics:
