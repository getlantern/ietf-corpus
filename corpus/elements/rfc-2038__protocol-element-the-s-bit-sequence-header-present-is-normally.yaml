document: rfc-2038
kind: protocol-element
summary: The S bit (Sequence-header-present) is normally 0 and set to 1 at each occurrence of an MPEG sequence header in the payload. This allows receivers to detect the presence of the sequence header in an RTP packet without scanning the payload, enabling fast synchronization on stream join.
section: "3.4"
topics:
