document: rfc-8011
kind: normative-requirement
summary: 'REQUIRED Printer operations include: Print-Job, Validate-Job, Create-Job, Get-Printer-Attributes, Get-Jobs, Get-Job-Attributes, Cancel-Job, and Send-Document. OPTIONAL operations include Print-URI, Pause-Printer, Resume-Printer, Purge-Jobs, Hold-Job, Release-Job, and Restart-Job. An IPP object is non-conformant if it does not support a REQUIRED operation.'
section: 6.2.2
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
