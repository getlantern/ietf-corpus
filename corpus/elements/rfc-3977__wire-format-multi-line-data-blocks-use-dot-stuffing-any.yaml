document: rfc-3977
kind: wire-format
summary: 'Multi-line data blocks use dot-stuffing: any line beginning with ''.'' (%x2E) MUST have an additional ''.'' prepended. The block is terminated by a line containing only ''.'' followed by CRLF (%x2E.0D.0A). NUL, bare LF, and bare CR MUST NOT appear in the block.'
section: 3.1.1
