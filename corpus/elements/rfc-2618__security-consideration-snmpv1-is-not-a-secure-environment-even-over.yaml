document: rfc-2618
kind: security-consideration
summary: SNMPv1 is not a secure environment even over IPsec, as it provides no access control. Implementers are recommended to use SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575).
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - ldap
    - snmp
