document: rfc-5360
kind: normative-requirement
summary: Entities implementing this framework MUST support the format for permission documents defined in RFC 5361 and MAY support other formats. Relays MUST support the use of SIP and SIPS URIs in permission documents and MAY support HTTP and HTTPS URIs.
section: "5.4"
rfc2119_level: MUST
topics:
