document: rfc-4850
kind: normative-requirement
summary: Functional behavior of the iSCSI node MUST NOT depend on the presence, absence, or content of the X#NodeArchitecture key. The key MUST NOT be used by iSCSI nodes for interoperability or exclusion of other nodes.
section: "3"
rfc2119_level: MUST NOT
