document: rfc-9632
kind: privacy-consideration
summary: Geofeed data may reveal the approximate geographic location of IP addresses and thereby of individual users. This document makes bulk access to such data readily available by design; operators publishing geofeed pointers should be aware of this exposure. All privacy considerations of RFC 8805 Section 4 apply.
section: "7"
topics:
    - privacy
    - ip
