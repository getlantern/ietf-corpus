document: rfc-7883
kind: design-rationale
summary: The IS-IS Router CAPABILITY TLV (RFC 4971) was chosen as the vehicle for advertising S-BFD Discriminators because S-BFD (RFC 7880) requires network nodes to know the BFD Discriminators each node has reserved, and IS-IS is one suitable distribution mechanism for this node-scoped information.
