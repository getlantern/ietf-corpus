document: rfc-5401
kind: protocol-element
summary: Transport Protocol Data Unit (TPDU) identifiers are formed by concatenating <objectId::fecPayloadId> per sender. NACK content is composed of lists and/or ranges of TPDU identifiers, enabling compact description of repair needs spanning entire missing objects, FEC coding blocks, or individual symbols.
section: 3.2.3.2
