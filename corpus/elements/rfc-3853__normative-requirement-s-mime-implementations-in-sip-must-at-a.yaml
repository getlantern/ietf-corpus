document: rfc-3853
kind: normative-requirement
summary: S/MIME implementations in SIP MUST at a minimum support RSA as a digital signature algorithm, SHA1 as a digest algorithm, and AES as an encryption algorithm. This updates the previous requirement for 3DES specified in RFC 3261 Section 23.3.
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - crypto
    - security
