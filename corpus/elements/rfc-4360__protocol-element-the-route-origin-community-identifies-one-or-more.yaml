document: rfc-4360
kind: protocol-element
summary: The Route Origin Community identifies one or more routers that inject a set of routes into BGP. It is transitive across AS boundaries. The high-order octet of the Type field is 0x00, 0x01, or 0x02; the low-order octet is 0x03.
