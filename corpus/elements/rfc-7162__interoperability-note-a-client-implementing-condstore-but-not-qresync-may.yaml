document: rfc-7162
kind: interoperability-note
summary: A client implementing CONDSTORE but not QRESYNC may incur an extra round trip when resynchronizing a mailbox that had messages expunged but no flag changes, because the HIGHESTMODSEQ increase causes a CHANGEDSINCE FETCH that returns no data. Clients implementing CONDSTORE are strongly encouraged to also implement QRESYNC.
section: 3.2.1
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
