document: rfc-9866
kind: protocol-element
summary: 'Each node maintains two Conflict-Free Replicated Counters: PositiveCFRC (counting Sentinels that consider or previously considered the root alive) and NegativeCFRC (counting Sentinels that consider or previously considered the root dead). The non-negative difference estimates the number of Sentinels still considering the root alive.'
section: "3.2"
