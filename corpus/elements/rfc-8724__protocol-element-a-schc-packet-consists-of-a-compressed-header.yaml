document: rfc-8724
kind: protocol-element
summary: A SCHC Packet consists of a Compressed Header (RuleID concatenated with Compression Residue) immediately followed by the original packet payload. Both RuleID and Compression Residue are variable in size and need not be byte-aligned; the Compression Residue may be empty.
