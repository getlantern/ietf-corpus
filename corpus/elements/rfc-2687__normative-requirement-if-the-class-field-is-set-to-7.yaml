document: rfc-2687
kind: normative-requirement
summary: If the class field is set to 7, the R bit MUST never be set to 1. This reserves the byte value 0xFF to avoid ambiguity with LCP frame detection; class-7 frames are by design non-suspendable.
section: "4"
rfc2119_level: MUST NOT
topics:
