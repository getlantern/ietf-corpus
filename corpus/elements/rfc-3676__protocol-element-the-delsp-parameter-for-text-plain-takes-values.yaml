document: rfc-3676
kind: protocol-element
summary: The DelSp parameter for Text/Plain takes values 'Yes' or 'No' (case-insensitive). If absent or unrecognized, No is assumed. It is only defined for use with Format=Flowed and controls whether the trailing space that signals a soft line break is logically deleted on reception.
