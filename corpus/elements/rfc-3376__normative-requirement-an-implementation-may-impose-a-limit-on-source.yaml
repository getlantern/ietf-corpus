document: rfc-3376
kind: normative-requirement
summary: An implementation MAY impose a limit on source list size but that limit MUST NOT be less than 64 addresses per list. When an operation causes the source list size limit to be exceeded, the service interface MUST return an error.
section: "2"
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
