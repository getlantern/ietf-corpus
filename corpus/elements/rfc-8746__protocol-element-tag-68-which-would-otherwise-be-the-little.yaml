document: rfc-8746
kind: protocol-element
summary: Tag 68 (which would otherwise be the little-endian uint8 variant) is instead assigned to signify uint8 arrays using clamped conversion ('ToUint8Clamp' per ECMAScript), enabling roundtripping of JavaScript Uint8ClampedArray through CBOR.
