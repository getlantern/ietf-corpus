document: rfc-2845
kind: design-rationale
summary: TSIG was designed as a lightweight alternative to the computationally expensive public-key signatures in RFC2535. HMAC-MD5 provides efficient point-to-point authentication suitable for stub resolvers and dynamic update clients that cannot perform full public-key cryptography.
