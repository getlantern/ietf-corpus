document: rfc-4934
kind: protocol-element
summary: An EPP session is mapped onto a single TCP connection; the session begins with the server sending an EPP <greeting> after TCP establishment, proceeds through command-response exchanges, and ends with an EPP <logout> command or a TCP CLOSE.
