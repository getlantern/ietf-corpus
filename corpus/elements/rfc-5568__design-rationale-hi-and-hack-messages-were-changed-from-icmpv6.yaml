document: rfc-5568
kind: design-rationale
summary: HI and HAck messages were changed from ICMPv6 to Mobility Header type to enable deployment alongside PMIPv6 and MIPv6, which also use Mobility Header for route-update signaling. Using ICMP for inter-access-router communication created a protocol layering inconsistency when deployed with those protocols.
section: "1"
topics:
