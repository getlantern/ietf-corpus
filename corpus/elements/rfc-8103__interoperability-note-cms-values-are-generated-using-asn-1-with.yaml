kind: interoperability-note
summary: CMS values are generated using ASN.1 with Basic Encoding Rules (BER) and Distinguished Encoding Rules (DER) per X.680 and X.690. Authenticated attributes are DER encoded specifically when used as the AAD input to AEAD_CHACHA20_POLY1305.
