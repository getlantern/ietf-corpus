document: rfc-4695
kind: normative-requirement
summary: The M bit MUST be set to 1 for native streams if the MIDI command section has a non-zero LEN field, and MUST be set to 0 otherwise. For mpeg4-generic streams, the M bit MUST be set to 1 for all packets to conform to RFC 3640.
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
