document: rfc-7850
kind: protocol-element
summary: 'The SDP ''m='' line specifies transport protocol via the ''proto'' field. This document defines seven new ''proto'' identifiers for transporting RTP media over TCP: TCP/RTP/AVPF, TCP/RTP/SAVP, TCP/RTP/SAVPF, TCP/DTLS/RTP/SAVP, TCP/DTLS/RTP/SAVPF, TCP/TLS/RTP/AVP, and TCP/TLS/RTP/AVPF.'
