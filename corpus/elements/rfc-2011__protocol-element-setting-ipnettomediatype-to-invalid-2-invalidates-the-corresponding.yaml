document: rfc-2011
kind: protocol-element
summary: Setting ipNetToMediaType to invalid(2) invalidates the corresponding ARP entry. Agents may or may not remove invalidated entries from the table; management stations must be prepared to receive entries with ipNetToMediaType=invalid and interpret them accordingly.
