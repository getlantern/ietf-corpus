document: rfc-2280
kind: security-consideration
summary: RPSL's security model relies on the mntner class for access control to the IRR database. Authentication schemes include CRYPT-PW (Unix crypt password), PGP (public key), and MAIL-FROM (regex on submitter email address). The scheme NONE provides no authentication. Unauthorized update attempts trigger notification to the upd-to address.
