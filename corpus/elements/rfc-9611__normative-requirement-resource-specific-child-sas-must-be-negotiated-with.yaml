document: rfc-9611
kind: normative-requirement
summary: Resource-specific Child SAs MUST be negotiated with identical Child SA properties as the initial Child SA, including cryptographic algorithms, Traffic Selectors, Mode (e.g., transport mode), and compression usage. Each Child SA does have its own individually derived keying material.
section: "3"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - crypto
