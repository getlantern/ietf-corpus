document: rfc-9039
kind: design-rationale
summary: Organization-based identifiers (using PEN numbers) can serve as a temporary measure, but long-term use of broadly employed device identifiers should be registered with IETF rather than using the 'org' subtype, to ensure stable and publicly available specifications.
