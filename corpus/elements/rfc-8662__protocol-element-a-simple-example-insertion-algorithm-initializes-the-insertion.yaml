document: rfc-8662
kind: protocol-element
summary: A simple example insertion algorithm initializes the insertion point at the bottom-most EL-capable label, inserts <ELI, EL> pairs working upward, moving each new insertion point up until the last inserted EL is below the ERLD and the new point is EL-capable, repeating while the node can push more pairs. Applied to the Section 3 example, this yields stack <L_N-P3, ELI, EL, L_A-L1, L_N-D, ELI, EL>.
