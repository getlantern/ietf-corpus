document: rfc-6873
kind: protocol-element
summary: 'Optional fields with Vendor-ID=00000000 support three standard tag values: Tag=00 logs a SIP header field or Reason-Phrase; Tag=01 logs the SIP message body (Content-Type prepended, separated by a space); Tag=02 logs the entire SIP message including headers and body.'
