document: rfc-8224
kind: normative-requirement
summary: If an authentication service receives a 438 response after sending the compact form of PASSporT, it SHOULD retry the request with the full form. Implementations SHOULD NOT retry the request more than once.
section: 6.1.1
rfc2119_level: SHOULD
topics:
    - sip
    - security
