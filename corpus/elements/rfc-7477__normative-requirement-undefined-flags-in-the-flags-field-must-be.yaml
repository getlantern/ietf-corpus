document: rfc-7477
kind: normative-requirement
summary: Undefined flags in the Flags field MUST be set to 0 by CSYNC publishers. Parental agents MUST NOT process a CSYNC record if it contains a 1 value for a flag that is unknown to or unsupported by the parental agent.
section: 2.1.1.2
rfc2119_level: MUST
topics:
    - dns
