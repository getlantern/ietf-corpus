document: rfc-7428
kind: design-rationale
summary: HomeIDs and NodeIDs are allocated by a network controller, creating a single point of failure; identifier validity is limited to the lifetime of network membership. High-reliability deployments may benefit from a redundant network controller.
section: "2.1"
topics:
