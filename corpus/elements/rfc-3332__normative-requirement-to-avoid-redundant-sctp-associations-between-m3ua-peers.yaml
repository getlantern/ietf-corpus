document: rfc-3332
kind: normative-requirement
summary: To avoid redundant SCTP associations between M3UA peers, one side SHOULD be designated as client. The default is for the SGP to be the server and the ASP to be the client; ASPs SHOULD initiate the SCTP association to the SGP. The registered SCTP/TCP port for M3UA is 2905.
section: 1.4.8
rfc2119_level: SHOULD
topics:
    - realtime
    - sctp
