document: rfc-2947
kind: normative-requirement
summary: If encryption is not active when a CFB64_IV command is received, the encryption machine must be re-initialized at the next START command using the keyid from that START and the IV from the CFB64_IV command.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - security
