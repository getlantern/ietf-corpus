document: rfc-6710
kind: normative-requirement
summary: The SMTP server MUST NOT allow upgraded (positive) priorities from untrusted or unauthorized sources. The server MAY allow untrusted sources to lower their own message priorities.
section: "4.1"
rfc2119_level: MUST NOT
topics:
