document: rfc-4945
kind: interoperability-note
summary: PKCS#7 wrapped X.509 certificate type is deprecated for CERTREQ generation and implementations SHOULD NOT generate CERTs with this type, but implementations SHOULD accept them because several existing implementations generate them, sometimes including entire certificate hierarchies in a single payload in violation of ISAKMP requirements.
section: 3.3.4
topics:
    - ipsec
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
