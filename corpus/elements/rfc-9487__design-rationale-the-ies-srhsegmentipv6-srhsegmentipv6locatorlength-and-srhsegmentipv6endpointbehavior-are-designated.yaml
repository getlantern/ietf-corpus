document: rfc-9487
kind: design-rationale
summary: The IEs srhSegmentIPv6, srhSegmentIPv6LocatorLength, and srhSegmentIPv6EndpointBehavior are designated as generic fields for IPFIX Options Templates or Structured Data rather than per-flow records, because SRv6 endpoint behavior and locator information is relatively static and suits the Options Template scoping model.
