document: rfc-6010
kind: protocol-element
summary: The special id-ct-anyContentType OID (pkcs-9 smime ct 0) authorizes the subject for any content type without constraints. Where id-ct-anyContentType appears alongside a specific content type, the specific content type is authoritative. When asserted in contentType, canSource MUST equal canSource and attrConstraints MUST be absent.
section: "2"
topics:
