document: rfc-9593
kind: normative-requirement
summary: If peers negotiate secure password authentication (per RFC 6467), they MUST NOT send the SUPPORTED_AUTH_METHODS notification, since the secure password method is negotiated separately and no other authentication methods are involved.
section: "4"
rfc2119_level: MUST NOT
