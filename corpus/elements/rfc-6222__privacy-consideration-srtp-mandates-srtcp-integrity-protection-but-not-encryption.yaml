document: rfc-6222
kind: privacy-consideration
summary: SRTP mandates SRTCP integrity protection but not encryption; thus SRTCP CNAME values remain observable unless encryption is explicitly enabled. Applications in environments where session correlation is a concern SHOULD encrypt SRTCP.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
