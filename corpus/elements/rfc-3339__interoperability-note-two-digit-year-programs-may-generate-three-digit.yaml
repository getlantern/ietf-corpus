document: rfc-3339
kind: interoperability-note
summary: Two-digit year programs may generate three-digit years (e.g., year 2000 as "100") or non-numeric decade characters. Robust receivers may compensate by adding 1900 to three-digit years or detecting non-numeric decades.
section: "3"
