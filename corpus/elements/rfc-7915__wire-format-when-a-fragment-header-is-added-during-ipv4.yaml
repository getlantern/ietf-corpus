document: rfc-7915
kind: wire-format
summary: When a Fragment Header is added during IPv4-to-IPv6 translation, the Fragment Header Identification field takes the low-order 16 bits from the IPv4 Identification field with the high-order 16 bits set to zero; Fragment Offset and M flag are copied from the IPv4 header. Next Header in the Fragment Header maps ICMPv4(1) to ICMPv6(58) or copies the protocol field.
section: "4.1"
topics:
    - ip
    - v6ops
