document: rfc-2231
kind: protocol-element
summary: Parameter value continuations are indicated by appending an asterisk followed by a decimal count to the parameter name (e.g., URL*0, URL*1). The count starts at 0, increments by 1, and neither leading zeroes nor gaps in the sequence are allowed. The original value is recovered by concatenating all sections in order.
