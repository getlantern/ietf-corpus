document: rfc-2402
kind: normative-requirement
summary: If no valid Security Association exists for a received packet, the receiver MUST discard it; this is an auditable event. The audit log SHOULD include the SPI value, date/time, source and destination addresses, and (in IPv6) the Flow ID.
section: 3.4.2
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
