document: rfc-6065
kind: security-consideration
summary: The procedures heuristically use StorageType 'volatile' to distinguish dynamically provisioned VACM entries from administrator-provisioned ones; entries with non-volatile StorageType are not overridden. This assumption may not be universally valid (e.g., an administrator could mistakenly create volatile entries).
section: "9"
topics:
