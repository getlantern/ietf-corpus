document: rfc-2020
kind: design-rationale
summary: 32-bit octet counters (dot12InHighPriorityOctets, dot12InNormPriorityOctets, dot12OutHighPriorityOctets) are provided for backward compatibility with SNMPv1 despite rolling over very quickly at 100 Mbps. 64-bit HC variants are the preferred objects for SNMPv2 implementations.
