document: rfc-6325
kind: normative-requirement
summary: The Inner.VLAN tag MUST NOT be changed by any transit RBridge as a TRILL frame passes through, except when VLAN mapping is intentionally performed within that RBridge. The Inner.VLAN carries the VLAN ID and priority of the original native frame.
section: 4.1.2
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
