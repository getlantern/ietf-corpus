document: rfc-7130
kind: normative-requirement
summary: Even when LACP considers a member link ready to forward traffic, the member link MUST NOT be used by the load balancer until all micro-BFD sessions of that member link are in Up state. BFD controls whether the load-balancing algorithm can select a particular LAG member link.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ip
