document: rfc-3851
kind: protocol-element
summary: The SMIMEEncryptionKeyPreference signed attribute unambiguously identifies which of the signer's certificates holds the preferred encryption key, supporting clients that use separate signing and encryption keys. Receiving agents SHOULD store this preference when the signature is valid.
section: 2.5.3
