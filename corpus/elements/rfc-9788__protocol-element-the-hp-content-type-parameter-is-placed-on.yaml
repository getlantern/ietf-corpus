document: rfc-9788
kind: protocol-element
summary: The hp Content-Type parameter is placed on the root of the Cryptographic Payload to signal the composer's intent for Header Protection. Its value is either 'clear' (signed with integrity/authenticity but no confidentiality) or 'cipher' (signed, with Header Protection, and encrypted to recipients).
section: 2.1.1
topics:
