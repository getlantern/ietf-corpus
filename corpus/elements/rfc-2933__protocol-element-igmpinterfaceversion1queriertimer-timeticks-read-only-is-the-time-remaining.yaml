document: rfc-2933
kind: protocol-element
summary: igmpInterfaceVersion1QuerierTimer (TimeTicks, read-only) is the time remaining until the host assumes no IGMPv1 routers are present on the interface. While non-zero, the host replies to all queries with IGMPv1 membership reports.
