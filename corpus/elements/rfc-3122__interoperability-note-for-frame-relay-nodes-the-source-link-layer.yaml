document: rfc-3122
kind: interoperability-note
summary: For Frame Relay nodes, the Source Link-Layer Address field in an IND Solicitation is overwritten by the receiver with the DLCI from the Frame Relay frame header before further IND processing. The sender may leave it zero if unknown.
