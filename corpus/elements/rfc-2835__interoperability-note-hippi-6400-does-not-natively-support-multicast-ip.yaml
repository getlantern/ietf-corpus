document: rfc-2835
kind: interoperability-note
summary: HIPPI-6400 does not natively support multicast. IP multicast implementations (MBONE, IP tunneling) continue to operate over HIPPI-based LIS if all IP multicast packets are sent using the same algorithm as broadcast to 255.255.255.255.
section: "7.3"
topics:
    - ip
    - multicast
