document: rfc-4695
kind: normative-requirement
summary: For RTP MIDI streams destined to be rendered into audio, the clock rate SHOULD be an audio sample rate of 32 KHz or higher, due to human musical perception sensitivity to small timing errors and timbral changes from clock quantization. The rtpmap attribute line MUST communicate the clock rate; no default is specified.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
