document: rfc-6652
kind: protocol-element
summary: 'The ''rr='' SPF record modifier specifies Requested Reports as a colon-separated list of tokens indicating conditions under which reports are desired. Default is ''all''. Valid tokens are: all, e (TempError/PermError), f (Fail), s (SoftFail), n (Neutral/None).'
