document: rfc-9636
kind: interoperability-note
summary: To save space, writers of version 2+ files MAY output a placeholder version 1 data block with all counts zero except typecnt=1 and charcnt=1; obsolescent version-1-only readers MUST interpret such files as lacking time changes and time zone abbreviations.
section: "4"
