document: rfc-4866
kind: wire-format
summary: The CGA Parameters option carries a fragment of the CGA Parameters data structure. Because the mobility header limits options to 255 bytes (excluding Type and Length), the full CGA parameters may be split across multiple consecutive CGA Parameters options, which are reassembled in order by the receiver.
section: "5.1"
topics:
    - mobility
    - crypto
