document: rfc-3484
kind: design-rationale
summary: The default policy table assigns 6to4 (2002::/16) addresses label 2 and v4-compatible (::/96) label 3, distinct from native IPv6 (label 1), so that the label-matching rules naturally pair 6to4 sources with 6to4 destinations and native sources with native destinations.
