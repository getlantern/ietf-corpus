document: rfc-5846
kind: protocol-element
summary: 'The BRA Status field (8-bit) reports revocation outcome. Values below 128 indicate success: 0=success, 1=partial success. Values 128 and above indicate rejection: 128=Binding Does NOT Exist, 129=IPv4 Home Address Option Required, 130=Global Revocation NOT Authorized, 131=Revoked Mobile Nodes Identity Required, 132=Revocation Failed - MN is Attached, 133=Revocation Trigger NOT Supported, 134=Revocation Function NOT Supported, 135=Proxy Binding Revocation NOT Supported.'
section: "5.2"
topics:
    - mobility
    - registry
