document: rfc-8016
kind: normative-requirement
summary: After receiving a 405 (Mobility Forbidden) response to an Allocate request containing MOBILITY-TICKET, the client SHOULD NOT retry sending an Allocate request containing MOBILITY-TICKET to that server until it believes the problem has been fixed.
section: 3.1.4
rfc2119_level: SHOULD NOT
topics:
    - nat
