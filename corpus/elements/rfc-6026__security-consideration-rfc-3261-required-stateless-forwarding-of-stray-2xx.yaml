document: rfc-6026
kind: security-consideration
summary: RFC 3261 required stateless forwarding of stray 2xx responses, enabling conformant proxies to be forced to forward attacker-crafted packets to arbitrary destinations—enabling anonymizing proxies for DoS attacks and non-SIP content tunneling. This document reverses that requirement, making forwarding stray responses a spec violation.
section: "10"
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
