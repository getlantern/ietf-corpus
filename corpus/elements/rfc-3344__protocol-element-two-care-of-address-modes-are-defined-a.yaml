document: rfc-3344
kind: protocol-element
summary: 'Two care-of address modes are defined: a foreign agent care-of address (IP address of a foreign agent, shared among multiple mobile nodes, preferred) and a co-located care-of address (locally acquired by the mobile node, such as via DHCP, consuming one IPv4 address per mobile node).'
