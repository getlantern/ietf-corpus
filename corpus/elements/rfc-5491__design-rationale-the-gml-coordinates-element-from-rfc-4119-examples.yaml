document: rfc-5491
kind: design-rationale
summary: The gml:coordinates element from RFC 4119 examples is deprecated because its coordinates format is opaque and allows the same location to be expressed in multiple non-equivalent ways, making consistent parsing difficult; the GeoShape profile provides unambiguous representations.
section: "4"
