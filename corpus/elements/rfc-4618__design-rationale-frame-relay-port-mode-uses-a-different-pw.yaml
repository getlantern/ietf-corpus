document: rfc-4618
kind: design-rationale
summary: Frame Relay Port mode uses a different PW type (0x000F) from HDLC (0x0006) even though they share the same encapsulation, because FR port mode provides many-to-one FR VC aggregation semantics whereas HDLC mode is a direct port transport.
