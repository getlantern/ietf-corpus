document: rfc-9362
kind: protocol-element
summary: The 'non-probing-wait' attribute echoes NON_PROBING_WAIT from RFC 9177, used to limit the potential wait when using PROBING_RATE. It is optional, expressed in seconds as decimal64 with no fixed default (computed from algorithms in RFC 9177 Section 7.2), and maps to CBOR key 32780.
section: "3"
