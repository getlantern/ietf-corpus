document: rfc-2744
kind: protocol-element
summary: 'GSS-API defines four call groups: credential management (gss_acquire_cred, gss_add_cred, gss_inquire_cred, gss_release_cred), context-level (gss_init_sec_context, gss_accept_sec_context, gss_delete_sec_context, gss_export_sec_context, gss_import_sec_context), per-message (gss_get_mic, gss_verify_mic, gss_wrap, gss_unwrap), and name manipulation (gss_import_name, gss_export_name, gss_compare_name, gss_canonicalize_name).'
