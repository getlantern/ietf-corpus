document: rfc-1212
kind: wire-format
summary: 'Instance identifiers for INDEX objects are encoded as OID sub-identifiers according to syntax: integer-valued uses one sub-identifier; fixed-length string uses n sub-identifiers; variable-length string uses n+1 (length prefix then octets); OBJECT IDENTIFIER uses n+1 (count prefix then sub-identifiers); IpAddress uses 4 sub-identifiers. For non-columnar objects without INDEX, a sub-identifier of zero is appended.'
section: 4.1.6
topics:
    - snmp
