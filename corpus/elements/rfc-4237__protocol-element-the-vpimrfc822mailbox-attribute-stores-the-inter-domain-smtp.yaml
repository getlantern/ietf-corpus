document: rfc-4237
kind: protocol-element
summary: The vPIMRfc822Mailbox attribute stores the inter-domain SMTP address of the voice mailbox associated with a given telephone number, defined as a distinct attribute from rfc822Mailbox to avoid ambiguity. It uses caseIgnoreIA5Match equality and supports up to 256 characters.
section: "2.2"
topics:
