document: rfc-5571
kind: security-consideration
summary: RFC 3193 (IKEv1-based IPsec for L2TPv2) MUST be supported for deployed interoperability. RFC SW-SEC defines a newer IKEv2-based approach with advantages described in its Section 3.5, which should be considered for future phases.
