document: rfc-6591
kind: design-rationale
summary: A single auth-failure report covers only one authentication method failure. Multiple reports are required to convey multiple failures for a single message. This one-failure-per-report design keeps the Authentication-Results field (which must reflect a single method) unambiguous and simplifies automated parsing.
section: "3"
