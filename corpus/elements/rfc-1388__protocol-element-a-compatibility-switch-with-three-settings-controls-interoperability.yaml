document: rfc-1388
kind: protocol-element
summary: 'A compatibility switch with three settings controls interoperability: ''RIP-1'' sends only RIP-1 packets; ''RIP-1 compatibility'' broadcasts RIP-2 packets (default); ''RIP-2'' multicasts RIP-2 packets. The recommended default is RIP-1 compatibility.'
