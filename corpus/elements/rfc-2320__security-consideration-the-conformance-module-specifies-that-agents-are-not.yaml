document: rfc-2320
kind: security-consideration
summary: The conformance module specifies that agents are not required to support SET operations on sensitive LIS configuration objects (MTU, encapsulation, timers, retries, peak cell rate, ATM addresses, admin status) in the absence of adequate security. This guards against unauthorized reconfiguration via SNMP.
section: "4"
topics:
    - security
    - snmp
