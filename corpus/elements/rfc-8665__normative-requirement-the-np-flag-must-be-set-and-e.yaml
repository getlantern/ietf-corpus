document: rfc-8665
kind: normative-requirement
summary: The NP-Flag MUST be set and E-Flag MUST be clear for Prefix-SIDs allocated to inter-area prefixes originated by an ABR (unless the prefix is directly attached) and for redistributed external prefixes (unless directly attached to the ASBR).
