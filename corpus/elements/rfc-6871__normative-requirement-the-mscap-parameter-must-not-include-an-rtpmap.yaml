document: rfc-6871
kind: normative-requirement
summary: The 'mscap' parameter MUST NOT include an 'rtpmap' or 'fmtp' attribute (these are handled by 'rmcap' and 'mfcap' respectively). Additionally, session-level-only attributes MUST NOT be used in the 'mscap' parameter since 'mscap' always instantiates media-level attributes.
section: 3.3.3
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
