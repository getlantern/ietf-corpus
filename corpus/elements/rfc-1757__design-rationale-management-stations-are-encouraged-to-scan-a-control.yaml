document: rfc-1757
kind: design-rationale
summary: Management stations are encouraged to scan a control table and share existing instances—especially monitor-owned rows—before creating new ones. Probe resources are scarce, and indiscriminate allocation is likely to cause resource shortages affecting all users of the probe.
