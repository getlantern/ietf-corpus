document: rfc-3416
kind: protocol-element
summary: GetNextRequest-PDU returns the lexicographically next variable accessible by the request for each binding. If no lexicographic successor exists, the binding's value is set to endOfMibView and its name is set to the requested name. This enables MIB table traversal without prior knowledge of instance identifiers.
section: 4.2.2
topics:
    - snmp
