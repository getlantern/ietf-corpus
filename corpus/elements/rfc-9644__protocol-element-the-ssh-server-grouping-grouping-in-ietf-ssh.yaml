summary: 'The ''ssh-server-grouping'' grouping in ietf-ssh-server defines four containers: ''server-identity'' (ordered list of host keys with min-elements 1), ''client-authentication'' (local users and X.509 trust anchors), ''transport-params'' (feature-gated), and ''keepalives'' (feature-gated).'
