document: rfc-7159
kind: normative-requirement
summary: A JSON parser MUST accept all texts that conform to the JSON grammar. A parser MAY accept non-JSON forms or extensions. Implementations may set limits on text size, nesting depth, number range/precision, and string length.
section: "9"
rfc2119_level: MUST
