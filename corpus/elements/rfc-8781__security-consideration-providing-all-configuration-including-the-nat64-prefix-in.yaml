document: rfc-8781
kind: security-consideration
summary: Providing all configuration (including the NAT64 prefix) in RAs reduces the attack surface compared to distributing configuration through multiple mechanisms that each need independent security. Existing RA security measures (e.g., RA-Guard) also eliminate the NAT64 prefix validation problem described in RFC 7050 Section 3.1.
section: "7"
topics:
