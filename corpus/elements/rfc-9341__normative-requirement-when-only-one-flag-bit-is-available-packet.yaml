document: rfc-9341
kind: normative-requirement
summary: When only one flag bit is available, packet-loss measurement MUST follow Section 3.1 and delay measurement MUST use the Single-Marking Method (Section 3.2.1). When two flag bits are available, delay measurement MUST use the Double-Marking Method (Section 3.2.2).
section: "7"
rfc2119_level: MUST
topics:
    - measurement
