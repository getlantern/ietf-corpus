document: rfc-9571
kind: normative-requirement
summary: If a Time Bucket Query message is used to configure or modify bucket intervals, the responder MUST respond with 0 packets in each bucket until it has been configured for a full measurement period, indicating the response covers the complete interval.
section: "7.1"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
