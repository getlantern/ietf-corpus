document: rfc-7737
kind: normative-requirement
summary: When a proxy LSR sends an MPLS proxy ping reply (as opposed to an echo request), it is RECOMMENDED to ignore the Reply Mode Order TLV and use the Reply Mode field from the original proxy ping request message.
section: 4.3.2
rfc2119_level: RECOMMENDED
topics:
