document: rfc-8466
kind: protocol-element
summary: The cvlan-id-to-svc-map container maps lists of CVLANs to a specific VPN service (VLAN-bundling). CE-VLAN ID preservation and CE-VLAN CoS preservation are configurable per vpn-service and ensure that VLAN header values are maintained end-to-end across all site-network-accesses in the service.
section: 5.3.2.2.4
topics:
