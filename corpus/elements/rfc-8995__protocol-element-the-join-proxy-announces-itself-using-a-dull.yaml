document: rfc-8995
kind: protocol-element
summary: 'The Join Proxy announces itself using a DULL GRASP M_FLOOD message with objective name ''AN_Proxy'', loop-count 1 (one hop), TTL 180,000 ms, and an O_IPv6_LOCATOR specifying the proxy''s link-local IPv6 address, transport protocol (mandatory: TCP), and an operator-selected port number. The registrar announces itself within the ACP using ''AN_join_registrar'' with loop-count 255 and an objective-value naming supported protocols (e.g., ''EST-TLS'').'
section: 4.1.1
topics:
    - zeroconf
    - security
    - ip
