document: rfc-8990
kind: security-consideration
summary: DULL GRASP is intrinsically insecure and operates without preexisting security associations, making it vulnerable to on-link attackers. It must be confined to link-local scope. Flooded synchronization objectives SHOULD NOT contain unencrypted private information and SHOULD be validated by recipient ASAs.
section: 2.5.2
topics:
    - security
    - privacy
