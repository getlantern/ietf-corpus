document: rfc-4815
kind: normative-requirement
summary: An established decompressor context with a CID within the negotiated MAX_CID space MUST be kept by the decompressor until the CID is reused, the channel is taken down, or the channel is renegotiated. The decompressor implicitly agrees to provide memory for at least MAX_CID+1 contexts.
section: "7.1"
rfc2119_level: MUST
topics:
    - rtp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
