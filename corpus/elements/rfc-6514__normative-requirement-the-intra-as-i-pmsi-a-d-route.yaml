document: rfc-6514
kind: normative-requirement
summary: The Intra-AS I-PMSI A-D route MUST carry the export Route Target used by the unicast routing. By default the advertising PE's BGP Update SHOULD carry the NO_EXPORT Community to constrain distribution within the AS; however, when non-segmented inter-AS P-tunnels are used the route MUST NOT carry NO_EXPORT.
section: 9.1.1
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
