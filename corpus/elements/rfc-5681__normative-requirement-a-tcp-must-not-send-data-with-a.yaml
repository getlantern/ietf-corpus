document: rfc-5681
kind: normative-requirement
summary: A TCP MUST NOT send data with a sequence number higher than the sum of the highest acknowledged sequence number and the minimum of cwnd and rwnd. This makes the minimum of cwnd and rwnd the governing constraint on data transmission.
section: "2"
rfc2119_level: MUST NOT
topics:
    - tcp
    - congestion
