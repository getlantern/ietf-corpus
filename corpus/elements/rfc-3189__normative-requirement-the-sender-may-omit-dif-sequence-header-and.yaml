document: rfc-3189
kind: normative-requirement
summary: The sender MAY omit DIF-sequence header and subcode DIF blocks from a stream. However, when they are sent, both types of blocks MUST be included in the video stream together.
section: "2.2"
rfc2119_level: MUST
topics:
