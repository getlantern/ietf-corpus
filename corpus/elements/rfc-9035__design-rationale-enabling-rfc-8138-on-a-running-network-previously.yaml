document: rfc-9035
kind: design-rationale
summary: Enabling RFC 8138 on a running network previously required a 'flag day' where the entire network had to be upgraded and rebooted simultaneously. This specification introduces the 'T' flag to enable a hot upgrade where the network migrates live, with compression remaining inactive until all nodes are upgraded.
section: "1"
topics:
    - routing
