document: rfc-7887
kind: protocol-element
summary: This document extends the encoding type defined in RFC 5384 to apply not only to Encoded-Source addresses but also to Encoded-Unicast and Encoded-Group address formats in PIM messages. Encoding type 0 is native encoding (RFC 7761) and type 1 is Join/Prune attributes encoding (RFC 5384).
section: "4"
topics:
    - multicast
    - routing
