document: rfc-3296
kind: normative-requirement
summary: If the URI in a ref attribute value refers to an LDAP server, it MUST be in the form of an LDAP URL [RFC2255]. The LDAP URL SHOULD NOT contain an explicit scope specifier, filter, attribute description list, or any extensions, and SHOULD contain a non-empty DN.
section: "2.2"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
