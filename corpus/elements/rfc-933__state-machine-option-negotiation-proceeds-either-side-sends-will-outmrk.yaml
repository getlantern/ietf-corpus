document: rfc-933
kind: state-machine
summary: 'Option negotiation proceeds: either side sends WILL OUTMRK or DO OUTMRK; the receiving party responds with DO or WILL respectively. Server-Telnet then sends the SB subnegotiation with CNTL and data. User-Telnet replies ACK to accept or NAK to reject. On ACK, marking is active; on NAK, Server-Telnet must retry or disconnect. Marking is terminated by Server-Telnet sending WON''T OUTMRK.'
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
