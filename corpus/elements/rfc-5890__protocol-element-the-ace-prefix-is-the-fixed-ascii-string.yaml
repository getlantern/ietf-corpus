document: rfc-5890
kind: protocol-element
summary: The ACE prefix is the fixed ASCII string 'xn--' that appears at the beginning of every A-label. 'ACE' stands for 'ASCII-Compatible Encoding', and the prefix allows IDNA-encoded labels to be stored in the DNS using only characters permitted in standard hostnames.
section: 2.3.2.5
topics:
    - dns
