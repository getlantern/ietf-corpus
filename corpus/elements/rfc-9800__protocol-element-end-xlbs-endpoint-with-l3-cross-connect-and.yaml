document: rfc-9800
kind: protocol-element
summary: End.XLBS (Endpoint with L3 cross-connect and SRv6 Locator-Block Swap) is a new SRv6 endpoint behavior combining L3 cross-connect with Locator-Block swap. It is used when the routing domain boundary is on a link adjacent to the SR segment endpoint node. It is defined with both NEXT-CSID and REPLACE-CSID flavors.
section: "7.2"
topics:
    - routing
    - ip
