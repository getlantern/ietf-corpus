document: rfc-894
kind: interoperability-note
summary: Datagrams on Ethernet may be longer than the general Internet default maximum packet size of 576 octets. Hosts on Ethernet should consider sending smaller datagrams to avoid unnecessary fragmentation at intermediate gateways when communicating with hosts on other networks.
section: Frame Format
topics:
    - ip
