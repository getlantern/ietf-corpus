document: rfc-4511
kind: normative-requirement
summary: Only leaf entries (those with no subordinate entries) can be deleted with the Delete operation. Clients MUST NOT supply NO-USER-MODIFICATION attributes (e.g., createTimestamp) in an Add Request, as these are maintained automatically by the server.
section: "4.8"
rfc2119_level: MUST NOT
topics:
