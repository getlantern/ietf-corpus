document: rfc-6779
kind: design-rationale
summary: L_quality is intentionally excluded from nhdpIibLinkSetTable because link quality values may need to be updated too frequently to be practical for MIB polling. All other Link Tuple fields (L_HEARD_time, L_SYM_time, L_pending, L_lost, L_time) are included.
