document: rfc-8928
kind: normative-requirement
summary: The same private key MUST NOT be reused with more than one instantiation of the signature scheme, and MUST NOT be used for anything other than computing NDPSO signatures. Each ECDSA signing operation MUST use a freshly randomly generated ephemeral private key k.
section: "7.7"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
