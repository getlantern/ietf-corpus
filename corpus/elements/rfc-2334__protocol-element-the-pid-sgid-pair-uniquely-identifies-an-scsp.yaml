summary: 'The PID/SGID pair uniquely identifies an SCSP instance: Protocol ID names the client/server protocol (ATMARP=1, NHRP=2, MARS=3, DHCP=4, LNNI=5), and the 16-bit Server Group ID identifies the specific protocol instance. Multiple instances of the same protocol can be synchronized independently.'
