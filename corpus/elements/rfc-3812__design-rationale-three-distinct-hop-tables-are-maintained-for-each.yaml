document: rfc-3812
kind: design-rationale
summary: 'Three distinct hop tables are maintained for each tunnel: configured hops (mplsTunnelHopTable), CSPF-computed hops (mplsTunnelCHopTable), and signaling-reported actual hops (mplsTunnelARHopTable). This separation allows operators to compare the requested path, the computed path, and the path actually established by the signaling protocol.'
section: "6.3"
topics:
    - mpls
