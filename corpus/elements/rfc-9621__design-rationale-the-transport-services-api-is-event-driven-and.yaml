document: rfc-9621
kind: design-rationale
summary: The Transport Services API is event-driven and fully asynchronous rather than blocking, as in the Socket API. This more naturally reflects the nature of network interactions in time and avoids the try-and-fail model required to emulate asynchrony over sockets.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
