document: rfc-3648
kind: wire-format
summary: 'The Ordering-Type request header is sent with MKCOL to specify the ordering semantics of the new collection. Its BNF is: `Ordering-Type = "Ordering-Type" ":" absoluteURI`. The value DAV:unordered means unordered; DAV:custom means ordered with unadvertised semantics; any other URI identifies specific ordering semantics.'
section: "5.1"
topics:
    - http
