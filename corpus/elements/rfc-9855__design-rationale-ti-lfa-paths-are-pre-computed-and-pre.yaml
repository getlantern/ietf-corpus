document: rfc-9855
kind: design-rationale
summary: TI-LFA paths are pre-computed and pre-installed before failure, activated the instant the PLR detects a local link failure and remaining active until IGP convergence completes at the PLR. Because they are pre-installed, they are not susceptible to micro-loops from asynchronous convergence across traversed nodes.
section: "1"
topics:
    - routing
