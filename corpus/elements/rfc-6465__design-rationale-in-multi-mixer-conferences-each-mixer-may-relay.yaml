document: rfc-6465
kind: design-rationale
summary: In multi-mixer conferences, each mixer MAY relay CSRC lists and audio level information from peer mixers (provided total CSRC count stays below 16), but average audio levels may be perceptibly different across mixer boundaries since this specification does not precisely define maximum audio level normalization.
