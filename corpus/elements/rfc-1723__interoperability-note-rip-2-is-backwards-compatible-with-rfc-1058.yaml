document: rfc-1723
kind: interoperability-note
summary: RIP-2 is backwards compatible with RFC 1058-compliant RIP-1 implementations because RFC 1058 specifies that messages of version > 1 must not be discarded solely because a Must-Be-Zero field is non-zero. Non-compliant RIP-1 implementations may require the compatibility switch to be set to RIP-1 compatibility (broadcast) mode.
