document: rfc-3543
kind: security-consideration
summary: Revocation messages are vulnerable to 'malicious repeater' attacks (capturing and replaying a message to the same destination) and 'malicious reflector' attacks (returning a message to its originator). Both attacks are mitigated by the 32-bit timestamp Revocation Identifier combined with the 'A' bit direction check and mandatory authentication.
section: "6.2"
topics:
    - mobility
    - security
