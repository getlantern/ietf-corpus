document: rfc-2580
kind: protocol-element
summary: The SYNTAX clause in MODULE-COMPLIANCE or AGENT-CAPABILITIES provides a refined (more restrictive) syntax for a named object. When both SYNTAX and WRITE-SYNTAX clauses are present, the SYNTAX clause applies only for read operations.
