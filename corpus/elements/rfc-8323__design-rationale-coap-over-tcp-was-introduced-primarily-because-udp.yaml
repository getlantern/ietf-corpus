document: rfc-8323
kind: design-rationale
summary: CoAP over TCP was introduced primarily because UDP is completely blocked in approximately 2–4% of terrestrial access networks, with higher rates in enterprise environments. TCP also provides longer NAT binding lifetimes (mean 386 minutes vs. 160 seconds for UDP) and more sophisticated congestion/flow control for large payloads.
