document: rfc-4072
kind: security-consideration
summary: Even with EAP mutual authentication, the home server cannot restrict what service parameters (e.g., SSID, BSSID) the NAS advertises. A compromised NAS can lie about its identity to the client. The NAS possessing session keys proves it is an authorized NAS, but not its exact identity.
section: "8.6"
topics:
    - diameter
    - security
