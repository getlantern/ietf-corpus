document: rfc-3242
kind: wire-format
summary: The CV-REQUEST feedback option uses Opt Type=8 and Opt Len=0 (two 4-bit fields encoded in a single octet). It is sent by the decompressor to request an RRP or CSP for context verification when only NHPs have been received for an extended period.
