document: rfc-7507
kind: normative-requirement
summary: If TLS_FALLBACK_SCSV appears in ClientHello.cipher_suites and the server's highest supported protocol version is higher than ClientHello.client_version, the server MUST respond with a fatal inappropriate_fallback alert (unless it responds with a fatal protocol_version alert because the client's version is unsupported).
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
