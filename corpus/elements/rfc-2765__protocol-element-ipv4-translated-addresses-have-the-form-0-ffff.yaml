document: rfc-2765
kind: protocol-element
summary: IPv4-translated addresses have the form 0::ffff:0:a.b.c.d (prefix 0::ffff:0:0:0/96) and refer to IPv6-enabled nodes. This new address form is distinct from IPv4-mapped and IPv4-compatible addresses and is used as the source address when an IPv6 node communicates through a SIIT translator.
section: "2.1"
topics:
    - ip
    - v6ops
