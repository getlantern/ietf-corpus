document: rfc-9839
kind: protocol-element
summary: Surrogates are 2,048 code points in the range U+D800–U+DFFF, used in UTF-16 to represent code points above U+FFFF. A surrogate occurring in any encoding other than UTF-16 has no meaning, and UTF-8 forbids encoding surrogates.
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
