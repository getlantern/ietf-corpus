document: rfc-2058
kind: normative-requirement
summary: A NAS that does not support challenge/response MUST treat an Access-Challenge as though it had received an Access-Reject. On receipt of a valid Access-Challenge, a supporting NAS SHOULD send a new Access-Request with a new ID and Request Authenticator.
section: "4.4"
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
