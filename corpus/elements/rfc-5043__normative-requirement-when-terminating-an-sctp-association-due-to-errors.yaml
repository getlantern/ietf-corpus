document: rfc-5043
kind: normative-requirement
summary: When terminating an SCTP Association due to errors, the RDMAP Terminate Message SHOULD NOT be sent on each DDP stream, as doing so could severely delay association termination. Other RDMAP-defined Terminate Messages MUST be generated as specified when a DDP stream is terminated.
section: "11.3"
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
