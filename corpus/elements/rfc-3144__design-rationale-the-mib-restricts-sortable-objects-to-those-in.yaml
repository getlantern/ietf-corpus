document: rfc-3144
kind: design-rationale
summary: The MIB restricts sortable objects to those in tables indexed solely by an InterfaceIndex object. This was a deliberate scope limitation that simplifies the agent's search algorithm and result table construction, at the cost of not supporting the more generic 'usrTopN' function.
