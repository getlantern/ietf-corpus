document: rfc-1890
kind: security-consideration
summary: The encryption algorithm is specified as a prefix to the pass phrase (characters before the first slash '/'). If no slash is present, DES-CBC is assumed as default. The algorithm specifier is case sensitive and should be drawn from RFC 1423 or IANA-registered identifiers.
section: "2"
topics:
