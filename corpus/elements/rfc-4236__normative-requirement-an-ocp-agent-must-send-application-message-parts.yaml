document: rfc-4236
kind: normative-requirement
summary: An OCP agent MUST send application message parts in the order implied by the profile parts lists. An OCP agent receiving an out-of-order part MAY terminate the transaction with an error.
section: 3.2.1
rfc2119_level: MUST
