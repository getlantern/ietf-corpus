document: rfc-1968
kind: normative-requirement
summary: The Identifier field in Reset-Request/Reset-Ack MUST be changed whenever the Data field content changes or a valid reply has been received. For retransmissions, the Identifier SHOULD remain unchanged.
section: "3.1"
rfc2119_level: MUST
topics:
