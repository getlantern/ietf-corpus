document: rfc-4433
kind: normative-requirement
summary: If the Registration Request contains the Requested HA Extension, the HA address in that extension must match the destination IP of the Request. If it does not match, the Requested HA MUST reject the Registration Request with error code 136.
section: "5.3"
rfc2119_level: MUST
topics:
    - mobility
