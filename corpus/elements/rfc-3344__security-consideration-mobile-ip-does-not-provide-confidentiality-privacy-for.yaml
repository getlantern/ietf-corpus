document: rfc-3344
kind: security-consideration
summary: Mobile IP does not provide confidentiality (privacy) for user data or control messages by default. IP-layer encryption (e.g., IPsec ESP) can be used independently to provide privacy; such mechanisms are outside the scope of this document.
section: "5.5"
topics:
    - mobility
    - privacy
    - security
