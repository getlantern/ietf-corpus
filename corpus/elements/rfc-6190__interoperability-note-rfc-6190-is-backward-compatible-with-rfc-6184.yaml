document: rfc-6190
kind: interoperability-note
summary: 'RFC 6190 is backward compatible with RFC 6184: when an H.264/AVC-compatible subset of the SVC base layer is transmitted in its own RTP session, RFC 6184 packetization must be used, allowing legacy RFC 6184 receivers to join multi-session transmissions and decode the base layer without modification.'
section: 1.2.2
topics:
