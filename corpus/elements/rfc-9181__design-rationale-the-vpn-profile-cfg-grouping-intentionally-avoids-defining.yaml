document: rfc-9181
kind: design-rationale
summary: The 'vpn-profile-cfg' grouping intentionally avoids defining the internal structure of profiles (encryption, QoS, routing, forwarding). This design allows the module to 'glue' a VPN service with locally defined value-added features (e.g., NAT instance binding, cloud connectivity) without prescribing how such features are implemented, supporting provider-specific extensions.
section: "3"
topics:
