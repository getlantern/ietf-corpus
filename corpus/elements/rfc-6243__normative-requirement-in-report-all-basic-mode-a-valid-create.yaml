document: rfc-6243
kind: normative-requirement
summary: In 'report-all' basic mode, a valid 'create' operation attribute for a data node containing its schema default value MUST fail with a 'data-exists' error-tag, and a valid 'delete' MUST succeed (though the node is immediately replaced by the default value).
section: 2.1.3
rfc2119_level: MUST
topics:
