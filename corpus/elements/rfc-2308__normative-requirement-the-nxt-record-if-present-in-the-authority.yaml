document: rfc-2308
kind: normative-requirement
summary: The NXT record, if present in the authority section of a negative answer, MUST be stored so it can be returned with the SOA record. For NODATA responses the NXT record MUST have the same owner name as the query name.
section: "5"
rfc2119_level: MUST
topics:
