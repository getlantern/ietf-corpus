document: rfc-6625
kind: design-rationale
summary: The (C-*,C-G) wildcard is restricted to ASM group addresses because the use case is binding flows along a customer PIM-SM shared tree or BIDIR-PIM tree to a single P-tunnel. SSM flows inherently identify a specific source, making the source wildcard semantically inappropriate for SSM.
section: "4.2"
topics:
