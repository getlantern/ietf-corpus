document: rfc-7383
kind: normative-requirement
summary: When PMTU discovery is used, the sender MUST ensure that the Total Fragments field strictly increases with each successive probe (i.e., each new smaller fragmentation threshold must result in more fragments) so the receiver can distinguish between different probe sets.
section: 2.5.2
rfc2119_level: MUST
topics:
