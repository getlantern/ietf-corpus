summary: 'Two new AVPs are defined for LNS-to-LAC communication: LNS Last Sent LCP Confreq (Attribute 51) and LNS Last Received LCP Confreq (Attribute 52). Their format is identical to the existing LAC-to-LNS Proxy LCP AVPs (Attributes 27 and 28 in RFC 2661).'
