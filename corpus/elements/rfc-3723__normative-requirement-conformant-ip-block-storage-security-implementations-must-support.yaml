document: rfc-3723
kind: normative-requirement
summary: Conformant IP block storage security implementations MUST support peer authentication using a pre-shared key and MAY support certificate-based peer authentication using digital signatures. Peer authentication using IKE public key encryption methods (sections 5.2 and 5.3 of RFC 2409) SHOULD NOT be used.
section: 2.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
