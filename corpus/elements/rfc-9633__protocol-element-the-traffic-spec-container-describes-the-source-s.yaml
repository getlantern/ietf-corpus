summary: 'The ''traffic-spec'' container describes the source''s transmission promise to the network: ''interval'' (uint32, nanoseconds), ''max-pkts-per-interval'' (uint32), ''max-payload-size'' (uint32), ''min-payload-size'' (uint32), and ''min-pkts-per-interval'' (uint32). Used by the network for resource reservation, shaping, filtering, and policing.'
