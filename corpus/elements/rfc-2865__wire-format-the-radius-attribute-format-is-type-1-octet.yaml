document: rfc-2865
kind: wire-format
summary: 'The RADIUS attribute format is Type (1 octet), Length (1 octet, inclusive of Type and Length), and Value (0 or more octets). Value data types are: text (UTF-8, 1-253 octets), string (binary, 1-253 octets), address (32-bit), integer (32-bit unsigned), and time (32-bit unsigned seconds since epoch).'
