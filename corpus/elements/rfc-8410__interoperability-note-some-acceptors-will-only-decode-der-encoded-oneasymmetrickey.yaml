document: rfc-8410
kind: interoperability-note
summary: Some acceptors will only decode DER-encoded OneAsymmetricKey objects despite RFC 5958 requiring BER decoding for compliance. The appendix provides a valid BER-encoded private key example that may be rejected by strict implementations.
