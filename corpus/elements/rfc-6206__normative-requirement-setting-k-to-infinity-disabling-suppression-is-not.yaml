document: rfc-6206
kind: normative-requirement
summary: Setting k to infinity (disabling suppression) is NOT RECOMMENDED, as it causes every node to transmit on every interval and can cause congestion in dense networks; k should be set to a high value (e.g., 5 or 10) rather than infinity.
section: "6.5"
rfc2119_level: RECOMMENDED
topics:
    - realtime
