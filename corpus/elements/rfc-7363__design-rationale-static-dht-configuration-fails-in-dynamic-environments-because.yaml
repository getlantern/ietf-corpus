document: rfc-7363
kind: design-rationale
summary: Static DHT configuration fails in dynamic environments because fixed parameters cannot simultaneously achieve low lookup failure rates and low communication overhead when operating conditions (overlay size, churn rate) evolve over time. Self-tuning allows the system to adapt dynamically.
