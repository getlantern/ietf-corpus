document: rfc-4511
kind: normative-requirement
summary: If the server receives an LDAPMessage in which the SEQUENCE tag, messageID, or protocolOp tag cannot be recognized, or encoding lengths are incorrect, the server SHOULD return a Notice of Disconnection with protocolError and MUST immediately terminate the LDAP session.
section: 4.1.1
rfc2119_level: MUST
topics:
    - ldap
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
