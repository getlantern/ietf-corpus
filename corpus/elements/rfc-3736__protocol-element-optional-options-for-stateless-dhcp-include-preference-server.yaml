kind: protocol-element
summary: 'Optional options for stateless DHCP include: Preference (server preference level), Elapsed time (time since client began configuration), User Class, Vendor Class, Vendor-specific Information, Client Identifier, and Authentication. Clients are not required to send the Client Identifier; servers echo it back if included.'
