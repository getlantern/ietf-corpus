document: rfc-9800
kind: interoperability-note
summary: A NEXT-CSID flavor is not defined for End.DX6, End.DX4, End.DT6, End.DT4, End.DT46, End.DX2, End.DX2V, End.DT2U, and End.DT2M behaviors because these behaviors are always in the last position of a SID list; the last SID of any NEXT-CSID container sequence is not required to have NEXT-CSID flavor itself.
section: "4"
topics:
