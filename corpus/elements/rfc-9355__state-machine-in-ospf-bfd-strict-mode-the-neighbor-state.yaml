document: rfc-9355
kind: state-machine
summary: In OSPF BFD strict-mode, the neighbor state machine is augmented so that BFD session establishment is requested upon entry to Init state, and progression from Init to 2-Way is blocked until the BFD session is successfully established. The B-bit is only evaluated in Init state; changes to it in subsequent Hellos have no effect.
section: "4"
topics:
    - routing
    - security
