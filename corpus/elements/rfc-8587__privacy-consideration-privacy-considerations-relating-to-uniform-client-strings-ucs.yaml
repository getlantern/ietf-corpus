summary: Privacy considerations relating to uniform client strings (UCS) versus non-uniform client strings (non-UCS), discussed in RFC 7931 Section 5.6, are applicable to their usage for trunking detection in NFS version 4.0. UCS exposes a stable client identity across servers.
