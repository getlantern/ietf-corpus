document: rfc-3264
kind: normative-requirement
summary: For each m= line in the offer, there MUST be a corresponding m= line in the answer. The answer MUST contain exactly the same number of m= lines as the offer, allowing streams to be matched by their order.
section: "6"
rfc2119_level: MUST
topics:
