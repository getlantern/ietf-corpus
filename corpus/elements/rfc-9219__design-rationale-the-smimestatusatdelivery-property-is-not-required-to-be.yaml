document: rfc-9219
kind: design-rationale
summary: The "smimeStatusAtDelivery" property is not required to be calculated at delivery time; a JMAP server can defer calculation until explicitly requested, but once calculated the value is remembered. This balances accuracy of historical status with server resource cost.
section: "4.1"
