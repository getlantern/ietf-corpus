document: rfc-7909
kind: security-consideration
summary: RPSL objects in the IRR are public; no confidentiality is needed. Integrity and authenticity can be verified via the digital signature and referenced certificate. Implementers MUST follow certificate validation steps from RFC 6487, and RFC 3779 security considerations apply.
section: "6"
topics:
