document: rfc-4555
kind: design-rationale
summary: For simplicity, MOBIKE assumes that if NATs are present the initiator is the party behind the NAT. The case where the responder's addresses change through a NAT is not fully supported. This choice avoids handling all asymmetric NAT scenarios while still covering the dominant remote-access VPN use case.
section: "2.3"
topics:
    - ipsec
    - nat
    - vpn
