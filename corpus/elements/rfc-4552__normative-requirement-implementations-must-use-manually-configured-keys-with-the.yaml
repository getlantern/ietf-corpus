document: rfc-4552
kind: normative-requirement
summary: Implementations MUST use manually configured keys with the same SA parameters (SPI, keys, etc.) for both inbound and outbound SAs. This is required because OSPFv3 uses multicast and IKE cannot provide 'one to many' authentication.
section: "7"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - routing
    - crypto
