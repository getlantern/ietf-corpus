document: rfc-2912
kind: design-rationale
summary: If relating specific media features to specific contained MIME body parts is important, the 'Content-features:' header should be applied directly to the body part concerned rather than the surrounding composite, because no defined correspondence exists between multipart-level headers and inner body parts.
section: 3.2.2
topics:
    - email
