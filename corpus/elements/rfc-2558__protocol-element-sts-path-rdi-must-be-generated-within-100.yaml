document: rfc-2558
kind: protocol-element
summary: STS-Path RDI must be generated within 100 ms by the STS PTE upon detection of AIS or LOP defect, and transmission must cease within 100 ms when those defects are no longer detected. STS-Path RDI is detected as a '1' in bit 5 of the G1 byte for x consecutive frames (x=5 or x=10 per referenced standard).
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
