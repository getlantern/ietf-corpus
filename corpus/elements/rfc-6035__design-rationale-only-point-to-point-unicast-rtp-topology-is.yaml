document: rfc-6035
kind: design-rationale
summary: Only point-to-point (unicast) RTP topology is currently supported because accurate quality reporting for multipoint conferences and multi-hop translator/mixer paths is an active research area not yet suitable for standardization. Centrally mixed conferences can be reported as individual point-to-point legs.
