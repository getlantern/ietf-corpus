document: rfc-6231
kind: protocol-element
summary: The <audit> element requests the MS to report its capabilities and active dialogs. The <auditresponse> element returns codec support (<codecs>), package capabilities (<capabilities> including supported dialog languages, grammar types, record types, prompt types, and variable types), and active dialog information (<dialogs>).
section: "4.4"
topics:
