document: rfc-9903
kind: protocol-element
summary: Remote LFA (RLFA) is augmented with 'use-segment-routing-path' (boolean, default false, guarded by feature 'remote-lfa-sr'), which forces RLFA to use an SR path instead of an LDP path. This leaf is effective only when remote-lfa is enabled, per RFC 8102.
