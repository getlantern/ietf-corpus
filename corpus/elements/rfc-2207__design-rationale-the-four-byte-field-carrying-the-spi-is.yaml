summary: The four-byte field carrying the SPI is labeled 'Generalized Port Identifier' (GPI) rather than 'SPI' so that the new SESSION, FILTER_SPEC, and SENDER_TEMPLATE objects can be reused for non-IPSEC protocols in the future.
