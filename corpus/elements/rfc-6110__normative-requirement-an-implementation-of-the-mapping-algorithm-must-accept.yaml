document: rfc-6110
kind: normative-requirement
summary: An implementation of the mapping algorithm MUST accept one or more valid YANG modules as its input, since multiple modules may be negotiated for a NETCONF session and the resulting datastore content is the union of data trees across modules, which may produce multiple root nodes.
section: "6"
rfc2119_level: MUST
topics:
    - yang
    - netconf
