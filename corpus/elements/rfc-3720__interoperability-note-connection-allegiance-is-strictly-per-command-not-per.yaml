document: rfc-3720
kind: interoperability-note
summary: 'Connection allegiance is strictly per-command, not per-task: consecutive commands in a SCSI linked command-chain task MAY use different TCP connections. Allegiance reassignment across connections is only permitted via explicit reassignment when the original connection fails, using the Task Management TASK REASSIGN function.'
section: 3.2.4.1
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
