document: rfc-4631
kind: wire-format
summary: LmpInterval is Unsigned32 in range 1..65535 representing milliseconds, used for Hello and link-verification interval fields. LmpRetransmitInterval extends the range to 1..4294967295 ms, used for lmpNbrRetransmitInterval to accommodate longer exponential backoff sequences.
