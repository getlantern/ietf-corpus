document: rfc-2748
kind: wire-format
summary: The In-Interface (C-Num=3) and Out-Interface (C-Num=4) objects each carry an IPv4 address (C-Type=1, 4 octets) or IPv6 address (C-Type=2, 16 octets) followed by a 32-bit ifindex. When SNMP is supported by the PEP, the ifindex MUST correspond to the MIB-II interface index.
section: 2.2.3
