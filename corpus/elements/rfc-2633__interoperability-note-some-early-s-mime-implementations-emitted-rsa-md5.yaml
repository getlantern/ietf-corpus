document: rfc-2633
kind: interoperability-note
summary: Some early S/MIME implementations emitted 'rsa-md5' and 'rsa-sha1' for the micalg parameter. Receiving agents SHOULD be able to recover gracefully from an unrecognized micalg parameter value.
