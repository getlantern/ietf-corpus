document: rfc-1962
kind: normative-requirement
summary: Before any compressed packets may be communicated, PPP must reach the Network-Layer Protocol phase and CCP must reach the Opened state. Only one primary compression algorithm in each direction is in use at a time, negotiated prior to sending the first compressed frame.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
