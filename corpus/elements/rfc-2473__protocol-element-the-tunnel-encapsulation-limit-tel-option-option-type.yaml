document: rfc-2473
kind: protocol-element
summary: The Tunnel Encapsulation Limit (TEL) option (Option Type decimal 4, Opt Data Len 1) carries an 8-bit unsigned integer specifying how many additional levels of encapsulation are permitted beyond the current one. The two high-order bits (00) indicate 'skip if unrecognized'; the third bit (0) indicates data does not change en route.
section: 4.1.1
