document: rfc-2491
kind: wire-format
summary: 'Unicast IPv6 packets over NBMA networks using LLC/SNAP encapsulation SHALL use the header: [0xAA-AA-03 (LLC)][0x00-00-00 (OUI)][0x86-DD (PID)][IPv6 packet]. The IPv6 next-hop identifies the pt-pt VC on which to forward.'
