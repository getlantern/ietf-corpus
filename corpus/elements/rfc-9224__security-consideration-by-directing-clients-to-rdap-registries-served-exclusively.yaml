document: rfc-9224
kind: security-consideration
summary: By directing clients to RDAP registries served exclusively over TLS, the bootstrap method ensures end users obtain registration data from an authoritative source rather than a rogue one. The security properties of the bootstrap method are otherwise the same as for RDAP itself; additional RDAP security considerations are in RFC 7481.
section: "11"
topics:
    - security
    - http
    - registry
