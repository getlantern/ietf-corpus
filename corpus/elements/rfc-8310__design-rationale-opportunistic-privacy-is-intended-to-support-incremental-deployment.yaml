document: rfc-8310
kind: design-rationale
summary: Opportunistic Privacy is intended to support incremental deployment of increased privacy with a view to widespread adoption of Strict Privacy. It should be employed when the client might otherwise settle for cleartext, providing maximum available protection depending on server capabilities.
