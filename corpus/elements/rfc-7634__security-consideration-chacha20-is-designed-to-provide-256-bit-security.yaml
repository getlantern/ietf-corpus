document: rfc-7634
kind: security-consideration
summary: ChaCha20 is designed to provide 256-bit security. Poly1305 is SUF-CMA (strongly unforgeable under chosen-message attacks), rejecting forged messages with probability 1-(n/2^102) for 16n-octet messages even after 2^64 legitimate messages.
