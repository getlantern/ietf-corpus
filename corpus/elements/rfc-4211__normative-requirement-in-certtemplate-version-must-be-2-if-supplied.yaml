document: rfc-4211
kind: normative-requirement
summary: In CertTemplate, version MUST be 2 if supplied and SHOULD be omitted; serialNumber MUST be omitted (assigned by CA); signingAlg MUST be omitted (assigned by CA); issuerUID and subjectUID MUST be omitted (deprecated in the PKIX profile).
