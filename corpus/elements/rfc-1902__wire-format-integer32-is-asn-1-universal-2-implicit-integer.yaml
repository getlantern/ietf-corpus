summary: Integer32 is ASN.1 [UNIVERSAL 2] IMPLICIT INTEGER in range -2147483648 to 2147483647; it is indistinguishable from the base INTEGER type. INTEGER may additionally represent named-number enumerations, in which case only the enumerated values are valid.
