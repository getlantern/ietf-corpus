document: rfc-6010
kind: normative-requirement
summary: When validating a CMS path, relying parties MUST ensure that authorizations of a subject certificate are constrained by the authorizations of the issuer, i.e., the encapsulated content type must be within the permitted set for the trust anchor and each certificate in the path.
section: "1"
rfc2119_level: MUST
topics:
