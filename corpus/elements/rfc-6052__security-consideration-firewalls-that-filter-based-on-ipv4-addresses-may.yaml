document: rfc-6052
kind: security-consideration
summary: Firewalls that filter based on IPv4 addresses may be bypassed by IPv6 packets carrying IPv4-embedded IPv6 addresses that translate to filtered IPv4 addresses. Administrators must ensure that packets to/from IPv4-embedded IPv6 addresses are subject to the same filtering as packets to/from the embedded IPv4 addresses directly.
section: "5.3"
topics:
    - ip
    - v6ops
    - nat
    - security
