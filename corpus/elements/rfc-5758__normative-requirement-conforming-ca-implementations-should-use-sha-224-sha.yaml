document: rfc-5758
kind: normative-requirement
summary: Conforming CA implementations SHOULD use SHA-224, SHA-256, SHA-384, or SHA-512 when generating certificates or CRLs, but MAY use SHA-1 only if they have a stated policy requiring that weaker algorithm.
