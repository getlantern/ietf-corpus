document: rfc-2449
kind: protocol-element
summary: The CAPA command returns a list of capabilities supported by the POP3 server. It is available in both the AUTHORIZATION and TRANSACTION states. An -ERR response indicates the command is not implemented; an +OK response is followed by one capability per line, terminated by a line containing '.' and CRLF.
