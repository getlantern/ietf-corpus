document: rfc-4935
kind: security-consideration
summary: The read-write objects t11FcsFabricDiscoveryRangeLow, t11FcsFabricDiscoveryRangeHigh, t11FcsFabricDiscoveryTimeOut, t11FcsFabricDiscoveryStart, and t11FcsDiscoveryStatus allow an attacker to trigger, abort, or invalidate topology discovery; the three NotifyEnable objects allow suppression of operational notifications. SET operations in a non-secure environment can have a negative effect on network operations.
section: "8"
topics:
    - security
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
