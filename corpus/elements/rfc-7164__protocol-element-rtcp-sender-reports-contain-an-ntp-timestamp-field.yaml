document: rfc-7164
kind: protocol-element
summary: RTCP Sender Reports contain an NTP timestamp field used to create a mapping between RTP timestamps and the wall clock, enabling wall-clock-referenced playout. This mapping is the primary mechanism affected by leap seconds.
