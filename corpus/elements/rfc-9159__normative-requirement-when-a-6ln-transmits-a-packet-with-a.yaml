document: rfc-9159
kind: normative-requirement
summary: When a 6LN transmits a packet with a non-link-local source address registered via EARO, the source address MUST be fully elided if it is the latest registered address for the indicated prefix (SAC=1, SAM=11).
section: 3.3.3
rfc2119_level: MUST
