document: rfc-8408
kind: wire-format
summary: The PATH-SETUP-TYPE-CAPABILITY TLV has Type=34, a variable Length field, a Reserved field (24 bits), a Num of PSTs field (8 bits), a padded list of PST values (each 1 byte), and optional sub-TLVs. The PST list MUST be padded to a multiple of four bytes.
section: "3"
