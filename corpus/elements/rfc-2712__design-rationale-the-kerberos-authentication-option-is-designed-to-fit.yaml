document: rfc-2712
kind: design-rationale
summary: The Kerberos authentication option is designed to fit into TLS exactly as a new public key algorithm would, establishing the master secret in the same manner. This minimizes changes to the TLS framework while enabling symmetric-key-based authentication for organizations with heterogeneous security deployments.
section: "2"
topics:
