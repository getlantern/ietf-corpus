document: rfc-2273
kind: protocol-element
summary: 'snmpTargetSpinLock (TestAndIncr) provides a concurrency control mechanism for multi-manager modifications to the snmpTargetAddrTable, particularly snmpTargetAddrTagList. The procedure is: read spinLock and tagList, generate new tagList, then set both in one request; retry from step 1 if the spinLock set fails.'
section: 4.1.2
topics:
    - snmp
