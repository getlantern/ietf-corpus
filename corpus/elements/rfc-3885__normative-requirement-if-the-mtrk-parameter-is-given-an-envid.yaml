document: rfc-3885
kind: normative-requirement
summary: If the MTRK parameter is given, an ENVID parameter MUST be included on the MAIL command. The ENVID and ORCPT parameters from RFC 3461 MUST be supported, and all RFC 3461 semantics MUST be supported as part of this extension.
section: "2"
rfc2119_level: MUST
topics:
    - email
