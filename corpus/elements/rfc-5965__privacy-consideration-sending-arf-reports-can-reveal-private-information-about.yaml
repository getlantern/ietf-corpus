document: rfc-5965
kind: privacy-consideration
summary: Sending ARF reports can reveal private information about the reporter; for example, a report sent in response to a mailing list posting reveals a valid subscriber address. Report generators may redact portions to conceal private information, though this can impede meaningful forensic response.
section: "8.5"
topics:
    - email
    - privacy
