document: rfc-3640
kind: protocol-element
summary: The CELP-cbr mode (mode=CELP-cbr) transports one or more fixed-size CELP frames per RTP packet; interleaving is prohibited, fragmentation is prohibited, and both the AU Header Section and Auxiliary Section MUST be empty. The MIME parameter constantSize MUST be provided.
section: 3.3.3
topics:
    - rtp
    - realtime
