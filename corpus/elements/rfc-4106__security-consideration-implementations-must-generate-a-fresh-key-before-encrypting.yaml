document: rfc-4106
kind: security-consideration
summary: Implementations MUST generate a fresh key before encrypting 2^64 blocks of data with a given key, as security decreases slightly with each message. This limit cannot be reached when using 32-bit Sequence Numbers.
section: "10"
topics:
    - ipsec
    - crypto
    - security
