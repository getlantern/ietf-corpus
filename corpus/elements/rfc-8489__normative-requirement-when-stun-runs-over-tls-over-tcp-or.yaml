document: rfc-8489
kind: normative-requirement
summary: When STUN runs over TLS-over-TCP or DTLS-over-UDP, Perfect Forward Secrecy (PFS) ciphersuites MUST be preferred, ciphersuites with known weaknesses (e.g., DES, RC4) MUST NOT be used, and TLS-level compression MUST be disabled. Implementations MUST follow BCP195.
section: 6.2.3
rfc2119_level: MUST
topics:
    - tls
    - security
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
