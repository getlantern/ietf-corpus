summary: 'Each AVP is encoded as: 1-bit Mandatory (M) flag, 1-bit Hidden (H) flag, 4 reserved bits, 10-bit Length, 16-bit Vendor ID, 16-bit Attribute Type, and variable-length Attribute Value. The minimum AVP length is 6 octets; the maximum is 1023 octets.'
