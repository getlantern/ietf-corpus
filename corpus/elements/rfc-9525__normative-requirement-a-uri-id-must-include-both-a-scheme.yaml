document: rfc-9525
kind: normative-requirement
summary: A URI-ID MUST include both a 'scheme' and a 'host' component matching the 'reg-name' rule; if the entry does not include both, it is not a valid URI-ID and MUST be ignored. Only the 'scheme' and 'host' components are used for certificate matching.
section: "7.2"
rfc2119_level: MUST
topics:
    - tls
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
