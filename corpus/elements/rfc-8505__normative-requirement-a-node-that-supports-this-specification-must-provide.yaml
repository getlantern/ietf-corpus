document: rfc-8505
kind: normative-requirement
summary: A node that supports this specification MUST provide a TID field in the EARO and set the T flag to indicate the presence of the TID. An updated 6LN MUST use an EARO (with T flag set) regardless of whether the 6LR is RFC 6775-only or updated.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
