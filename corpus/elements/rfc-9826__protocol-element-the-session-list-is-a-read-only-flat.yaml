document: rfc-9826
kind: protocol-element
summary: The session list is a read-only flat list keyed by 'initiator' (local or remote), enabling two sessions to transiently coexist for the same peer during the establishment window. Session-level statistics apply only to the current session, distinct from the aggregate peer-level statistics.
