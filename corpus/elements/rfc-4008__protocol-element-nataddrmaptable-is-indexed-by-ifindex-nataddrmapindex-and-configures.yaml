document: rfc-4008
kind: protocol-element
summary: natAddrMapTable is indexed by (ifIndex, natAddrMapIndex) and configures address maps for NAT translation. Each entry specifies local/global address ranges, port ranges, protocol bitmap, entry type (static/dynamic), and the NatTranslationEntity indicating session direction and endpoint subject to translation.
