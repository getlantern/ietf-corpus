document: rfc-6370
kind: design-rationale
summary: The Tunnel_ID is designed to remain stable across working and protection LSPs, providing a consistent service identifier to the client layer even when the underlying data-plane LSPs change due to protection or restoration events. However, the Tunnel_ID for a protection LSP MAY differ from that of its corresponding working LSP.
section: "5"
topics:
    - routing
