document: rfc-3074
kind: normative-requirement
summary: DHCP server implementations providing delayed service capability SHOULD set the DS (Delayed Service) configuration parameter to the number of seconds to wait after the client's first request before responding to a client whose hash would not normally permit service.
section: "4"
rfc2119_level: SHOULD
