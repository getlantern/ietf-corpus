document: rfc-5189
kind: protocol-element
summary: The Asynchronous Session Termination (AST) is a mandatory asynchronous transaction initiated by the middlebox at any time. It sends a Session Termination Notification (STN) message containing the termination reason before closing the session; exactly one notification is sent since only one agent is affected.
section: 2.2.3
