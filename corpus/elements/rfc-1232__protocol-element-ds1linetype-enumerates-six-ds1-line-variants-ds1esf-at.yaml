document: rfc-1232
kind: protocol-element
summary: 'ds1LineType enumerates six DS1 line variants: ds1ESF (AT&T Extended SuperFrame), ds1D4 (AT&T D4), ds1ANSI-ESF (ANSI ESF), ds1G704 (G.704 section 2.1.3.2), and ds1G704-CRC (G.704 section 2.1.3.1). The line type affects bit capacity and interpretation of error statistics.'
