document: rfc-1443
kind: interoperability-note
summary: MacAddress is encoded least significant bit first (canonical IEEE 802.1a order) even though 802.5 (Token Ring), in contrast to other 802.x protocols, requires MAC addresses to be transmitted most significant bit first. Implementations must account for this bit-order discrepancy.
section: "2"
topics:
