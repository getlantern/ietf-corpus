document: rfc-5265
kind: security-consideration
summary: Because MIPv4 shared secrets are often configured manually and may be weak, an attacker who breaks the i-HA shared secret can fool the MN into dropping IPsec encryption entirely, which is fatal to security. Additionally, when NAT traversal is enabled both MIPv4 and IPsec are susceptible to 'transient pseudo-NAT' traffic-redirection attacks; MIPv4 re-registrations are typically more frequent and require modifying only a single packet, making MIPv4 a softer target for redirection than IKE.
section: "6.2"
topics:
    - security
    - ipsec
    - vpn
    - mobility
    - nat
