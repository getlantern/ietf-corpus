document: rfc-3921
kind: normative-requirement
summary: A user's server MUST NOT automatically approve subscription requests on the user's behalf; all requests MUST be directed to available resources. If no available resource exists, the server MUST store the request and deliver it when the user next creates an available resource.
section: 5.1.6
rfc2119_level: MUST NOT
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
