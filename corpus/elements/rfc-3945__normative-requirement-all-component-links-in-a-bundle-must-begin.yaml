document: rfc-3945
kind: normative-requirement
summary: All component links in a bundle must begin and end on the same pair of LSRs and share the same Link Type, TE Metric, and set of Resource Classes. A GMPLS node with bundled links must apply admission control on a per-component link basis.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
