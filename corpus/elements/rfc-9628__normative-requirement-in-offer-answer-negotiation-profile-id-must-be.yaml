document: rfc-9628
kind: normative-requirement
summary: 'In Offer/Answer negotiation, profile-id MUST be used symmetrically: the answerer MUST either maintain the profile-id or remove the media format entirely. An answer MUST NOT contain the payload type number from the offer unless profile-id is exactly the same.'
section: 6.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
