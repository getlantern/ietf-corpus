document: rfc-5577
kind: normative-requirement
summary: In SDP, the media name in the 'm=' line MUST be 'audio', the encoding name in 'a=rtpmap' MUST be 'G7221', and only one bitrate SHALL be defined per payload type using the 'bitrate=' parameter in the 'a=fmtp' line.
section: "5"
rfc2119_level: MUST
topics:
