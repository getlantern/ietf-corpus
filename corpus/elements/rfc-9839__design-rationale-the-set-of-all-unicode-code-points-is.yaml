document: rfc-9839
kind: design-rationale
summary: The 'set of all Unicode code points' is not a good choice for text fields because Unicode recognizes different code point types, not all of which are appropriate in protocols or even associated with characters. Specifications should reference a named subset excluding problematic code points.
section: "1"
topics:
