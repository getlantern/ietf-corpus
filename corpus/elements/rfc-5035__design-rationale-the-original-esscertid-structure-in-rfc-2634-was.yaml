document: rfc-5035
kind: design-rationale
summary: The original ESSCertID structure in RFC 2634 was hardwired to use SHA-1 for certificate identification. Recent attacks on SHA-1 necessitated a new attribute (SigningCertificateV2) that allows algorithm agility by including an AlgorithmIdentifier field.
section: "1"
topics:
    - crypto
    - pkix
    - security
