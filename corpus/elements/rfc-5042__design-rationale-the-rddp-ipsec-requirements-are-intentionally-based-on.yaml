document: rfc-5042
kind: design-rationale
summary: The RDDP IPsec requirements are intentionally based on the older RFC 2401 profile (as profiled by RFC 3723) rather than RFC 4301, to allow a common IPsec profile with iSCSI. If RFC 3723 is updated to RFC 4301, that update should apply uniformly to both iSCSI and RDDP.
section: 5.4.5
topics:
    - security
    - ipsec
