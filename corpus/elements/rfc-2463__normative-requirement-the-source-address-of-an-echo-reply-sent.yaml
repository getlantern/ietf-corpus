document: rfc-2463
kind: normative-requirement
summary: The source address of an Echo Reply sent in response to a unicast Echo Request MUST be the same as the destination address of that Echo Request. For multicast Echo Requests, the reply source MUST be a unicast address belonging to the receiving interface.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
