document: rfc-950
kind: protocol-element
summary: To support subnets, a host must store a 32-bit address mask (my_ip_mask) with bits set for the IP network number field and the subnet number field. Routing decisions use bitwise AND of the destination address with this mask, compared to the masked local address.
section: "2.2"
topics:
