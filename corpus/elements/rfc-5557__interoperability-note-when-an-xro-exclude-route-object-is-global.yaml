document: rfc-5557
kind: interoperability-note
summary: When an XRO (eXclude Route Object) is global to an SVEC (i.e., placed after the SVEC in the svec-list) and the F-bit is set, specifying multiple Record Route Objects in the PCReq message SHOULD be allowed, enabling per-LSP route recording alongside global exclusion constraints.
section: "5"
topics:
    - routing
    - mpls
