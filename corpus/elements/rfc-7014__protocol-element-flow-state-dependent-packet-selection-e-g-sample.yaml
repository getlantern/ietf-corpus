document: rfc-7014
kind: protocol-element
summary: Flow-state Dependent Packet Selection (e.g., Sample and Hold) is a packet selection technique—not an IFSP technique—that selects packets based on current Flow Selection State; it does not guarantee Complete Flow selection and therefore cannot replace an IFSP.
