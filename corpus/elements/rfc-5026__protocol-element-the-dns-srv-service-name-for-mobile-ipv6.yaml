document: rfc-5026
kind: protocol-element
summary: The DNS SRV service name for Mobile IPv6 Home Agent service is 'mip6' with protocol name 'ipv6'. A Mobile Node constructs a query with QNAME set to '_mip6._ipv6.<domain>' and QTYPE to SRV to discover available Home Agents.
