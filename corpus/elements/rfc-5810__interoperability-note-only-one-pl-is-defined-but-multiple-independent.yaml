document: rfc-5810
kind: interoperability-note
summary: Only one PL is defined but multiple independent TMLs are expected to be standardized. A CE and FE MUST use the same TML definition to interoperate; TML interoperability is guaranteed only when both endpoints conform to the same TML specification.
section: "4.1"
