document: rfc-5875
kind: interoperability-note
summary: To avoid initial sync difficulties with 'aggregate' mode, subscribers MAY start the subscription with 'xcap-patching' mode, then refresh with 'aggregate' after initial sync is achieved. A subscriber can revert between modes at any time.
section: "4.8"
