document: rfc-3896
kind: normative-requirement
summary: Performance parameters are accumulated in 15-minute intervals; up to 96 intervals (24 hours) are kept by an agent. Fewer intervals will be available if the agent has been restarted within the last 24 hours. There is also a rolling 24-hour total for each parameter.
section: 2.4.2
rfc2119_level: MUST
topics:
    - snmp
