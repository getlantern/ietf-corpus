document: rfc-5010
kind: protocol-element
summary: The Flags Suboption (suboption code 10) is a 3-octet structure with a Code field, a Length field (1 octet, value 1), and a Flags octet. The Flags octet contains the UNICAST flag (bit U, value 1 for unicast, 0 for broadcast) and reserved MBZ bits.
