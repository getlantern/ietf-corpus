document: rfc-4560
kind: protocol-element
summary: pingCtlDSField (Unsigned32, 0–255) stores the Differentiated Services field value for the six most significant bits of the TOS octet (IPv4) or Traffic Class octet (IPv6) in probe packets. A value of 0 indicates the feature is unsupported.
