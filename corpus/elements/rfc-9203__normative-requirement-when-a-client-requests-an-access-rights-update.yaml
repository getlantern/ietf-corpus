document: rfc-9203
kind: normative-requirement
summary: When a client requests an access rights update, the request to authz-info MUST be protected using the existing OSCORE security context, and MUST contain only the access_token field — no nonce or identifier is sent.
section: "4.1"
rfc2119_level: MUST
topics:
