document: rfc-5040
kind: security-consideration
summary: 'The RNIC (RDMAP layer) MUST enforce STag protection: validating STags, checking base and bounds on Tagged Offsets, enforcing access rights (read/write), verifying STag-to-RDMAP-Stream association, and reporting violations via Terminate Messages with Remote Protection Error type codes including Invalid STag, Base/Bounds Violation, Access Rights Violation, and TO Wrap.'
section: 8.1.1
topics:
    - security
