document: rfc-7389
kind: security-consideration
summary: PMIPv6 signaling messages between MAG and LMA MUST be protected using end-to-end security associations offering integrity and data origin authentication, and IPsec is a mandatory-to-implement mechanism for nodes hosting the control-plane functions, even when CP and UP are on separate nodes.
section: "7"
rfc2119_level: MUST
topics:
