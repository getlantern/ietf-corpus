document: rfc-2157
kind: protocol-element
summary: The BP15 encapsulating body part (mime-body-part) carries any MIME content in X.400 via an OCTET STRING data field and a MimeParameters structure containing content-type, content-parameters, and other-header-fields. It is fully backward compatible with RFC 1494.
