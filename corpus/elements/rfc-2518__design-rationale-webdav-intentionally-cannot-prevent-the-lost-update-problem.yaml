document: rfc-2518
kind: design-rationale
summary: WebDAV intentionally cannot prevent the 'lost update' problem entirely because it cannot force HTTP 1.0/1.1 clients (which do not understand locking) to use locking, cannot require all servers to support locking (some use reservations/merging), and being stateless cannot enforce the LOCK/GET/PUT/UNLOCK sequence.
section: "6.7"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
