document: rfc-6122
kind: wire-format
summary: Each allowable portion of a JID (localpart, domainpart, resourcepart) MUST NOT be zero bytes in length and MUST NOT exceed 1023 bytes in length, yielding a maximum total JID size of 3071 bytes including the '@' and '/' separators. Lengths are enforced after any mapping or normalization.
section: "2.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
