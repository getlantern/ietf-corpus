document: rfc-9348
kind: protocol-element
summary: 'The tunnel-rate choice offers two mutually exclusive leaves: l2-fixed-rate (yang:gauge64, bits/second) specifying the layer-2 wire rate, and l3-fixed-rate (yang:gauge64, bits/second) specifying the layer-3 IP data rate. The chosen rate sets the nominal transmission interval for fixed-size packets and may be adjusted by congestion control.'
section: "3.2"
topics:
