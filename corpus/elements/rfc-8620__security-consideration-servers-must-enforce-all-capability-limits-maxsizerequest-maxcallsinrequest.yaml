document: rfc-8620
kind: security-consideration
summary: Servers must enforce all capability limits (maxSizeRequest, maxCallsInRequest, maxConcurrentRequests, maxObjectsInGet, maxObjectsInSet) to prevent denial-of-service attacks. Requests exceeding a limit are rejected with a 'limit' error naming the exceeded limit.
section: "8.5"
topics:
    - security
