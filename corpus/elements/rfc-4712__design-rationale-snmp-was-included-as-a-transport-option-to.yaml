document: rfc-4712
kind: design-rationale
summary: SNMP was included as a transport option to reuse existing installed devices that already implement SNMP agents, avoiding transport-protocol-level redesign. However, its UDP basis increases congestion risk and produces larger encoded messages than TCP, so TCP is RECOMMENDED wherever available.
section: "2.3"
topics:
    - snmp
    - realtime
    - congestion
