document: rfc-3295
kind: protocol-element
summary: gsmpSessionTable provides read-only monitoring of established or in-progress GSMP sessions, indexed by (gsmpSessionThisSideId, gsmpSessionFarSideId). It reports the negotiated version, timer, partition ID, adjacency count, far-side name/port/instance, last failure code, discontinuity time, start uptime, and per-session counters for sent/received messages and all GSMP event types.
