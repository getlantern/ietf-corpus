document: rfc-3036
kind: protocol-element
summary: Loop detection uses a Path Vector TLV (containing the list of LSR Ids the message has traversed) and a Hop Count TLV (a count of LSRs traversed). An LSR detecting its own Id in the Path Vector, or a Hop Count or Path Vector length exceeding the configured maximum, treats the message as having looped.
section: "2.8"
topics:
    - mpls
    - routing
