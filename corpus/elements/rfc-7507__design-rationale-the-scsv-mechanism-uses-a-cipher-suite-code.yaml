document: rfc-7507
kind: design-rationale
summary: The SCSV mechanism uses a cipher suite code point rather than a TLS extension so that it is backwards-compatible with all TLS versions, including those that do not support extensions. This allows signaling even during a fallback to very old protocol versions.
section: "2"
topics:
    - tls
    - security
