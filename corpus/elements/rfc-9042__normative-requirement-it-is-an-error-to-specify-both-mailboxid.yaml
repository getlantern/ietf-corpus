document: rfc-9042
kind: normative-requirement
summary: It is an error to specify both :mailboxid and :specialuse in the same fileinto command. Advanced filtering combining both criteria must use explicit mailboxidexists and specialuse_exists tests.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - email
