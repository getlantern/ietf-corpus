document: rfc-3219
kind: security-consideration
summary: Section 14 addresses security considerations for TRIP. Because TRIP distributes telephony routing policy between administrative domains, peering sessions carry sensitive information and must be protected against spoofed peers and injected routes; transport-level security mechanisms such as TCP MD5 authentication or IPsec are applicable.
section: "14"
topics:
    - security
    - routing
    - voip
