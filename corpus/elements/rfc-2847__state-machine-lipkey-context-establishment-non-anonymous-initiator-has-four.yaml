document: rfc-2847
kind: state-machine
summary: 'LIPKEY context establishment (non-anonymous initiator) has four phases: (1) initiator sends SPKM-3 REQ-TOKEN wrapped in LIPKEY token; (2) target replies with SPKM-3 REP-TI-TOKEN, returning GSS_S_CONTINUE_NEEDED; (3) initiator sends GSS_Wrap''d UserName-Password; (4) target validates and replies with GSS_Wrap''d Valid-UNP boolean, completing or failing LIPKEY context establishment.'
section: 3.2.3.2
topics:
    - crypto
    - security
