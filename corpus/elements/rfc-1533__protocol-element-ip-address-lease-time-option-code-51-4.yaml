summary: IP Address Lease Time option (code 51, 4 octets, unsigned 32-bit integer in seconds) is used in client requests (DHCPDISCOVER or DHCPREQUEST) to request a lease duration, and in server replies (DHCPOFFER) to specify the offered lease time.
