document: rfc-5655
kind: interoperability-note
summary: The supported compression formats for IPFIX Files are bzip2 and gzip, specified to maximize interoperability. Block compression algorithms SHOULD be preferred over stream compressors because they isolate errors to a single block, whereas stream compressors may fail to resynchronize after a single bit error and invalidate the entire stream.
section: "5.3"
