document: rfc-7401
kind: wire-format
summary: 'The PUZZLE parameter (Section 5.2.4) carries: K (1 byte, difficulty), Lifetime (1 byte, in seconds as 2^value), Opaque (2 bytes, state cookie), and a random value #I (RHASH_len/8 bytes). The SOLUTION parameter (Section 5.2.5) echoes #I and provides the found #J.'
