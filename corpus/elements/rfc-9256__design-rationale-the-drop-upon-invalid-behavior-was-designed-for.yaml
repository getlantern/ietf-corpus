document: rfc-9256
kind: design-rationale
summary: The Drop-upon-Invalid behavior was designed for use cases where operators want traffic (e.g., a Pseudowire) to only be transported on a path meeting specific constraints; when those constraints are no longer met, they want the traffic dropped rather than rerouted via the IGP shortest path.
section: "8.2"
topics:
    - routing
    - mpls
