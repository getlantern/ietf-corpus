document: rfc-8966
kind: normative-requirement
summary: A node SHOULD NOT increment its sequence number spontaneously, since increasing seqnos makes it less likely that other nodes will have feasible alternate routes when their selected routes fail. The seqno is only incremented in response to an explicit seqno request.
section: 3.2.2
rfc2119_level: SHOULD NOT
topics:
    - routing
