document: rfc-6170
kind: normative-requirement
summary: When non-zero xSize/ySize values differ from the actual image dimensions, the referenced image SHOULD be scaled to fit within the LogotypeImageInfo size parameters while keeping the x/y aspect ratio intact. A value of 0 means no recommended display size.
section: "3"
rfc2119_level: SHOULD
topics:
