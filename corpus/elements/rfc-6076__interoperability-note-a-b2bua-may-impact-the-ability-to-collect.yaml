document: rfc-6076
kind: interoperability-note
summary: A B2BUA may impact the ability to collect end-to-end metrics because it may act as both originating UAC and terminating UAS. In some cases, information from both sides of the B2BUA must be combined to derive an end-to-end perspective; in others, the B2BUA acts as a transparent proxy.
section: "5.2"
topics:
    - realtime
    - voip
    - measurement
