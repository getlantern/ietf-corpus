document: rfc-5223
kind: security-consideration
summary: If an adversary modifies or spoofs the DHCP server response, a LoST client could be directed to a rogue LoST server or given an invalid address, threatening the integrity of emergency service resolution. These threats are documented in RFC 5069, and the security considerations of RFC 2131, RFC 2132, and RFC 3315 apply.
section: "8"
topics:
    - security
    - realtime
