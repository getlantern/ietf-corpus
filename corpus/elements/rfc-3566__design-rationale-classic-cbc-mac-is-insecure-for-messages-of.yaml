document: rfc-3566
kind: design-rationale
summary: 'Classic CBC-MAC is insecure for messages of varying lengths: it is trivial to produce forgeries for a second message given the MAC of a prior message. AES-XCBC-MAC-96 overcomes this by using the three-key XCBC construction, which is provably secure for messages of arbitrary length.'
section: "1"
topics:
