document: rfc-4044
kind: normative-requirement
summary: The value of fcmInstanceIndex MUST be kept constant between restarts of the SNMP agent, and every possible effort MUST be made to keep it constant across restarts. It is unrealistic to expect it to remain constant across all re-configurations (e.g., replacement of all non-volatile storage).
section: "6"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
