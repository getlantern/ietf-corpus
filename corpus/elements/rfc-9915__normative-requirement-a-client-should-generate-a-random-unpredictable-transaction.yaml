document: rfc-9915
kind: normative-requirement
summary: A client SHOULD generate a random, unpredictable transaction ID for each new message and MUST leave the transaction ID unchanged in retransmissions. Predictable transaction IDs increase vulnerability to off-path attacks.
section: "16.1"
rfc2119_level: MUST
topics:
    - ip
    - security
