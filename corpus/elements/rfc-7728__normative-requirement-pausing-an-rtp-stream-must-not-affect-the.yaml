document: rfc-7728
kind: normative-requirement
summary: Pausing an RTP stream MUST NOT affect the sending of RTP keepalive (per RFC 6263 and RFC 5245) applicable to that stream. This requirement applies equally in both Paused state and Local Paused state.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
