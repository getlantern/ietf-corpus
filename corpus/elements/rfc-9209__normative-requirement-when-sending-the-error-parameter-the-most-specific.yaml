document: rfc-9209
kind: normative-requirement
summary: When sending the error parameter, the most specific proxy error type SHOULD be sent, provided it accurately represents the error condition. Generic types such as proxy_internal_error or http_protocol_error are available as fallbacks.
section: 2.1.1
rfc2119_level: SHOULD
topics:
    - http
