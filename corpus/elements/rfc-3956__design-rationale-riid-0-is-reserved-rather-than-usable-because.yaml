document: rfc-3956
kind: design-rationale
summary: RIID=0 is reserved rather than usable because the all-zeros interface identifier is defined as the Subnet-Router Anycast Address in RFC 3513; using it for RIID would introduce ambiguity in the derived RP address.
section: "6.3"
topics:
