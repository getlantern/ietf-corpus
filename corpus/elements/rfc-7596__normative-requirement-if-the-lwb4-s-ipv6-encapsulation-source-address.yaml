document: rfc-7596
kind: normative-requirement
summary: If the lwB4's IPv6 encapsulation source address changes for any reason (e.g., DHCPv6 lease expiry), the lwB4's dynamic provisioning process MUST be re-initiated. When the public IPv4 address or Port Set ID changes, the lwB4 MUST flush its NAPT table.
section: "5.1"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
