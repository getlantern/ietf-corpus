document: rfc-4235
kind: normative-requirement
summary: All subscribers and notifiers MUST support the 'application/dialog-info+xml' data format. If no Accept header is present in SUBSCRIBE, it defaults to 'application/dialog-info+xml'; if Accept is present, it MUST include that type.
section: "3.5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
