document: rfc-4821
kind: design-rationale
summary: IPv4 fragmentation should mimic IPv6 behavior (fragment at the host, set DF bit on all fragments) to minimize reliance on network fragmentation that cannot be implemented in IPv6, facilitating future migration and reducing exposure to IPv4 fragmentation reassembly errors.
section: "8"
topics:
