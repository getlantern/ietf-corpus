document: rfc-8664
kind: normative-requirement
summary: If the PCE learns the per-node MSD of a PCC from a routing protocol, it MUST ignore the per-node MSD in the SR-PCE-CAPABILITY sub-TLV and use the routing-protocol-derived value instead. If a per-interface MSD is learned, it MUST be used in preference to the sub-TLV MSD for paths using that interface.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
