document: rfc-8656
kind: wire-format
summary: 'The ADDITIONAL-ADDRESS-FAMILY attribute is a 32-bit field: the first 8 bits specify the additional address family (value 0x02 for IPv6), and the remaining 24 bits are RFFU. Including it in an Allocate request signals the server to allocate both one IPv4 and one IPv6 relay address in a single transaction.'
section: "18.11"
topics:
    - nat
    - ip
    - v6ops
