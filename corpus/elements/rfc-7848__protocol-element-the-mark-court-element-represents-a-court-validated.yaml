document: rfc-7848
kind: protocol-element
summary: The <mark:court> element represents a court-validated mark with fields for <mark:refNum> (court opinion reference), <mark:proDate>, <mark:cc> (court country), optional <mark:region> elements, and <mark:courtName>. When <mark:region> is specified, a default-deny approach regarding a country's regions MUST be assumed.
section: "2.2"
topics:
