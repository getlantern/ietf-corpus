document: rfc-3543
kind: normative-requirement
summary: A mobile node (whether directly co-located or registered via a foreign agent) MUST NOT send a revocation message to terminate its own registration; it SHOULD instead use the standard deregistration mechanism defined in RFC 3344.
section: 4.2.4
rfc2119_level: MUST NOT
topics:
    - mobility
