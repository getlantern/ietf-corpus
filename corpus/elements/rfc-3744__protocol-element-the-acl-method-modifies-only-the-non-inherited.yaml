document: rfc-3744
kind: protocol-element
summary: The ACL method modifies only the non-inherited, non-protected ACEs in a resource's DAV:acl property, replacing them entirely with the ACEs in the request body. The request body MUST contain exactly one DAV:acl XML element.
section: "8.1"
