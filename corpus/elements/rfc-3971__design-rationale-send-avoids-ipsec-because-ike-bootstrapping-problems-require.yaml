document: rfc-3971
kind: design-rationale
summary: SEND avoids IPsec because IKE bootstrapping problems require manual security association configuration for NDP protection, and the number of manually configured SAs needed is impractically large for most deployments. A new approach using public-key-based NDP options was developed instead.
section: "1"
