document: rfc-4328
kind: design-rationale
summary: The ODUk label space is structured as a tree (root = OTUk, leaves = ODUj tributary slots) to self-consistently characterize the full G.709 multiplexing hierarchy. This allows a single label to identify the exact position of an ODUj signal within an ODUk multiplexing structure without requiring separate context.
section: "4.1"
