document: rfc-7159
kind: wire-format
summary: Strings begin and end with quotation marks (U+0022). Characters that must be escaped include quotation mark, reverse solidus, and control characters U+0000 through U+001F. Characters in the BMP may be escaped as \uXXXX; non-BMP characters require a 12-character UTF-16 surrogate pair sequence.
