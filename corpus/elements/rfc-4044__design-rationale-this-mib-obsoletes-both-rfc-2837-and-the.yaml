document: rfc-4044
kind: design-rationale
summary: This MIB obsoletes both RFC 2837 and the Fibre Channel Management Integration MIB (MIB-FA). Section 12 documents problems with the FCMIM MIB (e.g., use of proprietary constructs, lack of conformance statements) and section 13 details the changes from RFC 2837, explaining why a clean replacement rather than an amendment was chosen.
