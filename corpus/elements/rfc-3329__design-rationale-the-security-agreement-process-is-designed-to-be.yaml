document: rfc-3329
kind: design-rationale
summary: The security agreement process is designed to be stateless for servers unless the selected security mechanism inherently requires state. Client and server lists are static and do not change based on input from the other side, though nodes may maintain multiple static lists for different interfaces.
section: "2.1"
topics:
