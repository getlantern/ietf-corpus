document: rfc-6768
kind: protocol-element
summary: g9981PortPm15MinTable stores up to 96 historical 15-minute PM buckets per port (indexed by ifIndex and g9981PortPm15MinIntervalIndex 1..96), containing monitored time, RxLostCells, TxLostCells, upstream and downstream differential delay per interval, plus a TruthValue validity flag. Intervals 2..96 are OPTIONAL. Entries MUST be persistent.
