document: rfc-8361
kind: normative-requirement
summary: In the case of inconsistent Nickname Flags APPsub-TLVs for the same nickname (e.g., due to transient LSP inconsistency during convergence), it is RECOMMENDED that the nickname be treated as if the R/C flag were set if any APPsub-TLV for that nickname has the flag set.
section: "11.1"
rfc2119_level: RECOMMENDED
topics:
    - routing
