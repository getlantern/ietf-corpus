document: rfc-2817
kind: protocol-element
summary: The '426 Upgrade Required' HTTP status code is defined. A server uses it to indicate that a client request cannot be completed without TLS; the response MUST include an Upgrade header specifying the required TLS version token. The server SHOULD include a human-readable message body explaining the reason.
section: "4.2"
topics:
    - http
    - tls
