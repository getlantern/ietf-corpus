document: rfc-9480
kind: normative-requirement
summary: The content of an EnvelopedData structure MUST be encrypted using a newly generated symmetric content-encryption key. This content-encryption key MUST be securely provided to the recipient using key transport, key agreement, or password-based key management techniques as specified in CMS RFC 5652.
section: "2.7"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
