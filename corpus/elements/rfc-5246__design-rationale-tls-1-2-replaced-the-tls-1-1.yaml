document: rfc-5246
kind: design-rationale
summary: TLS 1.2 replaced the TLS 1.1 composite MD5/SHA-1 PRF and signature hash with cipher-suite-specified PRFs and an explicit SignatureAndHashAlgorithm field, improving cryptographic agility and removing reliance on MD5 whose collision resistance was already weakened.
section: "1.2"
topics:
