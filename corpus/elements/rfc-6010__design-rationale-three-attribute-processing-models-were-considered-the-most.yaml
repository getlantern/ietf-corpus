document: rfc-6010
kind: design-rationale
summary: 'Three attribute-processing models were considered; the most restrictive was chosen: every signer or originator must be authorized for all attributes appearing anywhere in the CMS path (including content that authenticates it), not just attributes it directly asserts. This prevents an outer authenticator from being unaware of inner attribute constraints.'
section: "1.2"
topics:
    - crypto
    - security
