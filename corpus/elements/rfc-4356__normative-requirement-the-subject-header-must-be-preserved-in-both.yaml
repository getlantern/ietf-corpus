document: rfc-4356
kind: normative-requirement
summary: The 'Subject:' header MUST be preserved in both MMS-to-Internet and Internet-to-MMS conversions. Non-7-bit characters MUST be encoded according to RFC 2047 in the absence of an SMTP 8-bit extension.
section: 2.1.3.2
rfc2119_level: MUST
