document: rfc-2814
kind: design-rationale
summary: Reserved IP multicast addresses rather than physical addresses are used for DSBM communication to enable dynamic DSBM-client binding and to allow L2 devices to intercept PATH messages without L3 RSVP snooping—a static FDB entry for the MAC multicast address suffices.
