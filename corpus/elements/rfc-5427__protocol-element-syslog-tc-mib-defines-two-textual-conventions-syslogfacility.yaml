document: rfc-5427
kind: protocol-element
summary: SYSLOG-TC-MIB defines two textual conventions — SyslogFacility and SyslogSeverity — for use by other MIB modules managing syslog data, assigned OID mib-2 173. The intent is that MIB modules import these TCs rather than defining their own representations.
