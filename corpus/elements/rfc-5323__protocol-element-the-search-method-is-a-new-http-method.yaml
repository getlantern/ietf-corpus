document: rfc-5323
kind: protocol-element
summary: The SEARCH method is a new HTTP method that clients invoke to initiate a server-side search. The request body defines the query; the server executes it and returns results. SEARCH is a safe method with no side effects beyond executing the query.
section: "2.1"
