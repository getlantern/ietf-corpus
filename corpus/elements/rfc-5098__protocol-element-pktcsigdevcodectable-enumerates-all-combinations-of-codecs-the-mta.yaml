document: rfc-5098
kind: protocol-element
summary: pktcSigDevCodecTable enumerates all combinations of codecs the MTA supports for simultaneous operation, indexed by pktcSigDevCodecComboIndex and pktcSigDevCodecType, with pktcSigDevCodecMax indicating the maximum simultaneous sessions for that codec. Non-voice codecs MUST NOT be included.
