document: rfc-8582
kind: normative-requirement
summary: When selecting the rate algorithm, a reporting node MUST ensure that a reporting-node OCS entry exists for the target of the Overload report; the target is the Origin-Host (Host report), Origin-Realm (Realm report), or DiameterIdentity of the peer (Peer report).
section: "6.3"
rfc2119_level: MUST
topics:
    - diameter
