document: rfc-8167
kind: protocol-element
summary: 'Reverse-direction retransmission is asymmetric: since the ONC RPC server (reverse-direction Requester) cannot initiate transport connections, it must wait for the client to re-establish a connection before retransmitting. A waiting reverse-direction Call may time out to avoid indefinite blocking.'
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
