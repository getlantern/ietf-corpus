document: rfc-6871
kind: protocol-element
summary: The media configuration parameter 'm=' is added to 'pcfg', 'acfg', and 'lcfg' attributes to specify which media format capabilities (by number) are used in that configuration; alternatives within the list are separated by '|' in preference order. When present, the referenced capabilities completely replace the format list in the 'm=' line.
section: 3.3.4.1
topics:
    - realtime
