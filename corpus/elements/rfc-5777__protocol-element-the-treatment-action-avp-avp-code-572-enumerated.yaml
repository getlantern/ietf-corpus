summary: 'The Treatment-Action AVP (AVP Code 572, Enumerated) defines the action associated with a rule''s condition: drop (0), shape (1), mark (2), or permit (3). When set to ''shape'' or ''mark'', the QoS-Parameters AVP SHALL contain relevant QoS parameters.'
