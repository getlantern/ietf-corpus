document: rfc-4119
kind: wire-format
summary: 'The civicLoc format (''civicAddress'' type in namespace urn:ietf:params:xml:ns:pidf:geopriv10:civicLoc) represents civic address location using up to 17 optional string fields: country (ISO 3166 two-letter code), A1–A6 (hierarchical administrative subdivisions), PRD, POD, STS (street directionals/suffix), HNO, HNS (house number and suffix), LMK, LOC, FLR, NAM, and PC (postal code). All fields are optional xs:string elements.'
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
