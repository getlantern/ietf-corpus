document: rfc-9109
kind: interoperability-note
summary: Some NAPT devices do not translate the source port when a system port (0–1023) is used. In such networks, using the NTP well-known port 123 as the client port may limit the number of hosts that can simultaneously use NTP, since NAPT translation requires unique port mappings.
section: "3.4"
topics:
    - ntp
    - nat
    - udp
