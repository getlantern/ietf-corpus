document: rfc-9451
kind: protocol-element
summary: An NSH OAM packet MAY include optional Context Headers (e.g., a subscriber identifier per RFC 8979 or a flow identifier per RFC 9263) that are used to influence the processing of the packet by SFC data plane elements. An NSH OAM packet MAY also include SFC OAM data in both Context Headers and the inner packet.
section: "3"
topics:
