document: rfc-6857
kind: design-rationale
summary: All encoded-words generated during downgrading use UTF-8 as their charset. This choice allows the original non-ASCII Unicode content to be preserved in encoded form within ASCII-only header fields, enabling receivers to recognize that a message was internationalized.
