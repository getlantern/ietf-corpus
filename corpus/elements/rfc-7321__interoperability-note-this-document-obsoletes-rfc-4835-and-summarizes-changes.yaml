document: rfc-7321
kind: interoperability-note
summary: 'This document obsoletes RFC 4835 and summarizes changes: AES-GCM and AES-GMAC are promoted from MAY to SHOULD+; TripleDES-CBC is demoted from MUST- to MAY; DES-CBC is promoted from SHOULD NOT to MUST NOT; AES-XCBC-MAC-96 is demoted from SHOULD+ to SHOULD; AES-CTR is demoted from SHOULD to MAY.'
section: "2.5"
topics:
    - ipsec
    - crypto
    - security
