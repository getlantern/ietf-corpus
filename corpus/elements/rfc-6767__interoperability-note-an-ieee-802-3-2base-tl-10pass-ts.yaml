document: rfc-6767
kind: interoperability-note
summary: An IEEE 802.3 2BASE-TL/10PASS-TS interface can be managed by either (a) IF-MIB + IF-CAP-STACK-MIB + EtherLike-MIB + MAU-MIB + EFM-CU-MIB, or (b) IF-MIB + IF-CAP-STACK-MIB + GBOND-MIB + G9982-MIB + HDSL2-SHDSL-LINE-MIB/VDSL-LINE-MIB. The EFM-CU-MIB path lacks historical PM while the GBOND-MIB/G9982-MIB path provides full PM functionality.
section: "4.3"
topics:
    - snmp
