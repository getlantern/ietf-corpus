document: rfc-9956
kind: protocol-element
summary: The Non-Queue-Building Per-Hop Behavior (NQB PHB) provides a shallow-buffered, best-effort service as a complement to the Default deep-buffered, best-effort service. It isolates low-data-rate, application-limited microflows (e.g., interactive voice, game sync, DNS) from bursty, capacity-seeking traffic to reduce delay and loss for those flows. The PHB is implemented without prioritization and can be implemented without rate policing.
