document: rfc-6081
kind: design-rationale
summary: Trailers are placed after the IPv6 packet (not before) and the RFC 4380 definition of 'consistent' payload length is updated to mean the IPv6 packet length is less than or equal to the UDP payload length, allowing extra bytes after the IPv6 packet without violating the original validity check.
