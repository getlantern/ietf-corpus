document: rfc-1730
kind: design-rationale
summary: Unique identifiers (UIDs) were introduced alongside message sequence numbers specifically to support offline and disconnected clients that need to resynchronize state from a previous session. Sequence numbers change as messages are expunged, making them unsuitable for cross-session correlation.
section: 6.4.9
topics:
    - email
