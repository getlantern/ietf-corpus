document: rfc-6729
kind: design-rationale
summary: The sole purpose of the state clause is to allow determination of the point(s) in the chain of custody where a message was subjected to handling outside normal routing and queuing. It is explicitly not intended for associating metadata such as spam classification or content categorization, since there is no guarantee all agents in the chain made such annotations.
section: "3"
topics:
