document: rfc-8045
kind: wire-format
summary: IP-Port-Local-Id TLV (TLV-Type 11, variable length) carries a locally significant string identifier at the customer premise — MAC address, interface ID, VLAN ID, PPP session ID, VRF ID, or IP address/prefix — needed when internal IP address alone is insufficient for unique subscriber identification.
