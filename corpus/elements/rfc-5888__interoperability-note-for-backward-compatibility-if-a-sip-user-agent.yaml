document: rfc-5888
kind: interoperability-note
summary: For backward compatibility, if a SIP user agent does not understand the 'group' attribute, it simply ignores it per standard SDP fall-back; no 'Require' header is defined. An answerer not supporting 'group' may incorrectly treat FID-grouped streams as independent parallel streams.
section: "9.4"
topics:
    - sip
    - realtime
