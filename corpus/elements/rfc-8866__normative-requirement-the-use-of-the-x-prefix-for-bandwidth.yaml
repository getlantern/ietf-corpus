document: rfc-8866
kind: normative-requirement
summary: The use of the 'X-' prefix for bandwidth type names is NOT RECOMMENDED. Instead, new non-'X-' prefix bwtype names SHOULD be defined and MUST be registered with IANA. SDP parsers MUST ignore bandwidth-fields with unknown bwtype names.
section: "5.8"
rfc2119_level: MUST
topics:
    - realtime
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
