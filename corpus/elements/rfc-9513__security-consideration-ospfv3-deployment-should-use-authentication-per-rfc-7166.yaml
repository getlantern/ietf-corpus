document: rfc-9513
kind: security-consideration
summary: OSPFv3 deployment SHOULD use authentication per RFC 7166. Reception of malformed TLVs or sub-TLVs SHOULD be counted and/or logged in a rate-limited manner. Security considerations from RFC 8402 (SR architecture), RFC 8986 (SRv6 network programming), RFC 8476 (MSD), RFC 9259 (O-flag), and RFC 9350 (Flexible Algorithms) also apply.
section: "12"
rfc2119_level: SHOULD
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
