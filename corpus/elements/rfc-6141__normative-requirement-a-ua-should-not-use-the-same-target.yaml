document: rfc-6141
kind: normative-requirement
summary: A UA SHOULD NOT use the same target-refresh request to both refresh the target and make complex session changes, unless those changes can be trivially accepted. Only when the target-refresh is a re-INVITE and the UAS supports reliable provisional responses or UPDATE MAY the UAC piggyback session changes.
section: "4.4"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
