document: rfc-6884
kind: design-rationale
summary: The MMM mode request mechanism allows vocoders to operate at the highest possible average bit-rate when the network is lightly loaded, and at lower bit-rates under heavy load to avoid sharp declines in voice quality due to high frame-erasure rates. This is especially important for mobile-mobile calls where each wireless side has a potentially different network load.
