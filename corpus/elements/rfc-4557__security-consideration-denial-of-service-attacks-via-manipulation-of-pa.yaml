document: rfc-4557
kind: security-consideration
summary: Denial-of-service attacks via manipulation of PA-PK-OCSP-RESPONSE are considered acceptable because Kerberos V does not protect against denial-of-service attacks in general; the worst outcome is that a client or KDC must fall back to downloading large CRLs.
