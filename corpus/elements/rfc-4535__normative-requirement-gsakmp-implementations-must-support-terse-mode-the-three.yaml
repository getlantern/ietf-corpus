document: rfc-4535
kind: normative-requirement
summary: 'GSAKMP implementations MUST support Terse Mode (the three mandatory messages: RTJ, Key Download, Key Download Ack/Failure) and MAY support Verbose Mode (which adds the optional RTJ-Error and Lack_of_Ack messages). All (S-)GC/KSes in a Verbose Mode group MUST support Verbose Mode.'
section: "5.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
