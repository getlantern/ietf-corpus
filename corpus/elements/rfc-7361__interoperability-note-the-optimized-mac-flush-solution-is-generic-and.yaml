document: rfc-7361
kind: interoperability-note
summary: The optimized MAC flush solution is generic and applicable when Multi-Segment Pseudowires (MS-PWs) per RFC 6073 are used to interconnect PE devices in H-VPLS. The solution also applies to native Ethernet access topologies (e.g., ITU-T G.8032 rings, multi-chassis LAG) multi-homed to two or more VPLS PE-rs devices.
section: "3.3"
topics:
    - mpls
