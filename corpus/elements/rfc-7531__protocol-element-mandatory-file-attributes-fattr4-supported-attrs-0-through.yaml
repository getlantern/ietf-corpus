document: rfc-7531
kind: protocol-element
summary: Mandatory file attributes (FATTR4_SUPPORTED_ATTRS=0 through FATTR4_LEASE_TIME=10, plus FATTR4_RDATTR_ERROR=11 and FATTR4_FILEHANDLE=19) must be supported by all NFSv4 servers; recommended attributes (FATTR4_ACL=12 through FATTR4_MOUNTED_ON_FILEID=55) are optional.
section: "2"
