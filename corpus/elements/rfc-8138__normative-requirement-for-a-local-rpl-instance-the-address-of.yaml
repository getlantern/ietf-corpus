document: rfc-8138
kind: normative-requirement
summary: For a Local RPL Instance, the address of the DODAG root MUST be explicit — either provided by device configuration or signaled in the packet as the source or destination address. For a Global Instance, the RPLInstanceID in the RPI is sufficient to identify the DODAG root from a local context table.
section: 4.3.2
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
