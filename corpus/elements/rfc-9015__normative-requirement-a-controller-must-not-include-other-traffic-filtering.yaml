document: rfc-9015
kind: normative-requirement
summary: A controller MUST NOT include other Traffic Filtering Action Extended Communities alongside a 'Flow Specification for SFC Classifiers' Extended Community. Any such co-occurrence MUST be treated as malformed and handled as treat-as-withdraw per RFC 7606.
section: "7.4"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
