document: rfc-8624
kind: normative-requirement
summary: ECC-GOST (algorithm 12) MUST NOT be used for DNSSEC signing; it MAY be supported for validation. It has been superseded by GOST R 34.10-2012, which has not been standardized for DNSSEC.
section: "3.1"
rfc2119_level: MUST NOT
topics:
