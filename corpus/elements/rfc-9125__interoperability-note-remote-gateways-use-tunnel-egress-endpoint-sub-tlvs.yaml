document: rfc-9125
kind: interoperability-note
summary: Remote gateways use Tunnel Egress Endpoint sub-TLVs to identify gateways for a prefix, then compute SR TE paths using SR BGP-LS (RFC 9085). SR Egress Peer Engineering (RFC 9086) can supplement BGP-LS information for path computation across the backbone.
