document: rfc-7673
kind: normative-requirement
summary: If the SRV lookup returns a 'bogus' RRset or fails for reasons other than no records, the client MUST abort its attempt to connect to the desired service. If the result is 'insecure' or no SRV records exist, the client SHOULD fall back to non-DNSSEC, non-DANE behavior.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
