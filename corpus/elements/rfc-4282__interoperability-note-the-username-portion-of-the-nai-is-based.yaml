document: rfc-4282
kind: interoperability-note
summary: The username portion of the NAI is based on the RFC 821 BNF but extended for internationalization and mediating-realm syntax; it is not necessarily compatible with e-mail usernames. Internationalization requirements for NAIs and e-mail addresses also differ.
section: "2.5"
topics:
    - email
