document: rfc-9784
kind: normative-requirement
summary: The port 'color' encoded in the EVPN Router's MAC Extended Community MUST be unique. The ESI label extended community MUST NOT be added to a Grouping Ethernet A-D per ES route, and MUST be ignored on receipt; it is not used for BUM split-horizon on this route type.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
