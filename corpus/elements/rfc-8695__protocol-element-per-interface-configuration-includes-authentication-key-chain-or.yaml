document: rfc-8695
kind: protocol-element
summary: Per-interface configuration includes authentication (key-chain or explicit key+crypto-algorithm, RIPv2 only), BFD parameters (feature-gated), cost (uint8, range 1..16, default 1), explicit neighbors (feature-gated, for NBMA networks), passive mode, no-listen mode, split-horizon (disabled/simple/poison-reverse, default simple), summary-address, and per-interface timers.
section: "2.3"
