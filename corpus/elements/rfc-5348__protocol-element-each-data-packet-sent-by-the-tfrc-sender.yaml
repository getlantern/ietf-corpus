document: rfc-5348
kind: protocol-element
summary: 'Each data packet sent by the TFRC sender MUST contain: a sequence number (incremented by one per packet, large enough to avoid wrap causing ambiguity), a millisecond-resolution timestamp (ts_i), and the sender''s current RTT estimate (R_i). These fields are used by the receiver to compute loss event rate and feedback timing.'
section: 3.2.1
topics:
    - congestion
