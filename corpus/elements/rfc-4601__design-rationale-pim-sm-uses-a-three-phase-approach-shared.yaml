document: rfc-4601
kind: design-rationale
summary: PIM-SM uses a three-phase approach—shared RP tree via (*,G) Joins with Register encapsulation, then native (S,G) forwarding to the RP, then optional switchover to source-specific SPTs—to balance rapid receiver-to-source convergence against long-term forwarding efficiency. Register encapsulation is acknowledged as inefficient but provides immediate reachability before native trees are established.
section: "3"
topics:
    - multicast
    - routing
