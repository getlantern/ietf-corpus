document: rfc-3711
kind: protocol-element
summary: The 48-bit SRTP packet index is defined as i = 2^16 * ROC + SEQ, where ROC is the 32-bit rollover counter maintained by SRTP and SEQ is the 16-bit sequence number from the RTP header. The index is implicit (not fully carried in the packet) and used for replay protection, encryption IV, message authentication, and key derivation.
section: 3.3.1
topics:
    - realtime
    - rtp
    - security
