document: rfc-2743
kind: protocol-element
summary: Security contexts are established between peers using local or delegated credentials. Multiple contexts may coexist between a pair of peers using the same or different credentials, enabling graceful rollover when credentials expire. GSS-API implementations retain inquirable context data until explicitly released, even after context expiration.
section: 1.1.3
topics:
    - security
    - crypto
