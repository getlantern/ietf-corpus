document: rfc-4601
kind: state-machine
summary: The per-interface (*,G) Assert state machine mirrors the (S,G) Assert machine but resolves duplicate shared-tree (RP-tree) forwarding. The winner is chosen by metric preference and metric to the RP, then highest IP address. Assert losers update their RPF neighbor to the Assert winner for subsequent Joins.
section: 4.6.2
topics:
    - multicast
    - routing
