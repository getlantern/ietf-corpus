document: rfc-6848
kind: normative-requirement
summary: New extensions to the civic address format MUST be defined only for the XML format; these extensions are then conveyed in DHCP using the extension CAtype (CAtype 40). Further extensions to the DHCP format are prohibited.
section: "3"
rfc2119_level: MUST
