document: rfc-9855
kind: protocol-element
summary: 'FRR path using a direct neighbor: when a direct neighbor is in both P(S,X) and Q(D,X) and lies on the post-convergence path, the outgoing interface is set to that neighbor and the RL is empty. This is equivalent to a post-convergence LFA repair.'
section: "5.1"
