document: rfc-9901
kind: wire-format
summary: 'The SD-JWT compact serialization is tilde-separated: `<Issuer-signed JWT>~<D.1>~<D.2>~...~<D.N>~`. The Issuer-signed JWT comes first, followed by zero or more Disclosures each trailed by a tilde, and the final element is always an empty string (i.e., the trailing tilde is never omitted).'
