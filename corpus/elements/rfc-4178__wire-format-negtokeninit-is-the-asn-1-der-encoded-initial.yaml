summary: 'NegTokenInit is the ASN.1 DER-encoded initial negotiation token containing: mechTypes ([0] MechTypeList, mandatory), reqFlags ([1] ContextFlags, OPTIONAL), mechToken ([2] OCTET STRING, OPTIONAL optimistic mechanism token), and mechListMIC ([3] OCTET STRING, OPTIONAL). All SPNEGO messages use EXPLICIT TAGS and DER encoding per X.690.'
