document: rfc-5255
kind: normative-requirement
summary: Clients SHOULD issue the LANGUAGE command before authentication, since some servers send valuable user information during authentication. If a security layer is subsequently negotiated, the client MUST re-issue LANGUAGE to prevent active attack effects on subsequent error messages.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
