document: rfc-9618
kind: design-rationale
summary: 'The new algorithm''s validity semantics are identical to RFC 5280: no certification path changes validity status, and no valid policy set changes. The only difference is that one output (valid_policy_tree) is replaced by a different-form output (user_constrained_policy_set), consistent with X.509''s own described outputs.'
section: "1.1"
