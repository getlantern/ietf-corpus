document: rfc-5608
kind: interoperability-note
summary: Traditional SSH server implementations obtain service authorization via OS-level access controls (shell, filesystem) tied to the username rather than from RADIUS service provisioning. Adapting SSH servers for SNMP Transport Models requires that RADIUS service authorization information be passed from the SSH module to the relevant SNMP models.
section: "2"
topics:
    - radius
    - snmp
