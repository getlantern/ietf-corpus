document: rfc-6749
kind: normative-requirement
summary: The authorization server MUST support HTTP Basic authentication for clients with a client password, and MUST require TLS when password authentication is used. Including credentials in the request-body is NOT RECOMMENDED and parameters MUST NOT be included in the request URI.
section: 2.3.1
rfc2119_level: MUST
topics:
    - oauth
    - security
    - tls
