document: rfc-3203
kind: normative-requirement
summary: If the FORCERENEW message is lost and the server does not receive a DHCP REQUEST, the server should retransmit the FORCERENEW message using an exponential backoff algorithm with a limited number of retransmissions.
section: "2.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
