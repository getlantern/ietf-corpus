document: rfc-7839
kind: security-consideration
summary: Administrators SHOULD configure DHCP servers that use ANI options to communicate with relay agents using IPsec (as described in Section 21.1 of RFC 3315). Where IPsec or equivalent security cannot be applied, administrators SHOULD disable the ANI capability on DHCP entities.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
