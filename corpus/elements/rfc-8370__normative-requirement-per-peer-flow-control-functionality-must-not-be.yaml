document: rfc-8370
kind: normative-requirement
summary: Per-Peer Flow-Control functionality MUST NOT be activated with a peer that does not indicate support. If a peer has not indicated capability, it SHOULD NOT be assumed that the peer will always acknowledge MESSAGE_ID objects with ACK_Desired set.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
