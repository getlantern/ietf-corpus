document: rfc-3307
kind: protocol-element
summary: The group ID is defined as the low-order 32 bits of the IPv6 multicast address. Group IDs of 32 bits or fewer generate unique link-layer addresses within a given multicast scope, which is critical for media that map IPv6 multicast addresses to link-layer destinations.
section: "1"
topics:
