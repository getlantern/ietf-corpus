document: rfc-8410
kind: design-rationale
summary: 'Contexts (as defined in RFC 8032) are not included in this specification for several reasons: current Ed25519 implementations do not support them, there is potential for confusion about which algorithms require separate keys, there is ongoing cryptographic debate about their effectiveness, and there is no clear consensus on how to identify context string usage via OIDs.'
section: "1"
topics:
