document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelLSPEncoding object (IANAGmplsLSPEncodingTypeTC) specifies the encoding type of the LSP being requested. Setting it to 'tunnelLspNotGmpls' signals that GMPLS signaling is not in use, allowing MPLS systems to use the extended MIB objects without enabling GMPLS. The default is 'tunnelLspNotGmpls'.
