document: rfc-9359
kind: security-consideration
summary: Integrity protection of IOAM Capabilities information in echo replies can be achieved via the underlying transport (e.g., IPv6 Authentication Header per RFC 4302). Confidentiality of the collected IOAM capabilities can be provided using the IP Encapsulating Security Payload Header (RFC 4303) or other secure transport.
section: "6"
topics:
    - security
    - ipsec
    - crypto
