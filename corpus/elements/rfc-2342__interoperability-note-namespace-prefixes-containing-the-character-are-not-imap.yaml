document: rfc-2342
kind: interoperability-note
summary: Namespace prefixes containing the '#' character are not IMAP URL (RFC 2192) friendly, since '#' must be percent-encoded as %23 in URLs. Server implementers MAY instead use namespace prefixes that do not contain '#'.
section: "5"
