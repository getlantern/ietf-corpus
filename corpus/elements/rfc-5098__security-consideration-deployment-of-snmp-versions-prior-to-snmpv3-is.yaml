document: rfc-5098
kind: security-consideration
summary: Deployment of SNMP versions prior to SNMPv3 is not RECOMMENDED for managing this MIB. SNMPv3 with authentication and privacy (authPriv) is the recommended security model to prevent unauthorized read or write access to sensitive signaling configuration objects.
section: "8"
rfc2119_level: RECOMMENDED
