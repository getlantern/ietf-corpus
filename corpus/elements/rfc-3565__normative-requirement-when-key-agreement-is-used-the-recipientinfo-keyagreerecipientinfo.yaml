document: rfc-3565
kind: normative-requirement
summary: When key agreement is used, the RecipientInfo keyAgreeRecipientInfo CHOICE MUST be used. The KeyAgreeRecipient version MUST be 3. The originatorInfo field MUST be the originatorKey alternative containing the originator's ephemeral public key.
section: "2.3"
rfc2119_level: MUST
topics:
