document: rfc-4791
kind: normative-requirement
summary: The DAV:getetag property MUST be defined and set to a strong entity tag on all calendar object resources. A response to a GET on a calendar object resource MUST contain an ETag response header field.
section: 5.3.4
rfc2119_level: MUST
topics:
    - http
