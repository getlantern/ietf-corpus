document: rfc-8124
kind: normative-requirement
summary: An SDP offerer MUST NOT assign the SDP 'setup' attribute a value of 'holdconn' when negotiating WebSocket transport. The offerer MUST follow RFC 4145 procedures for the 'setup' attribute, and if 'setup' is 'passive', MUST include a URI in 'a=websocket-uri'.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
