document: rfc-9404
kind: registry
summary: RFC 9404 creates the 'JMAP Data Types' IANA registry with registration policy 'Specification Required'. Initial entries include Core, PushSubscription, Mailbox, Thread, Email, EmailDelivery, SearchSnippet, Identity, EmailSubmission, VacationResponse, and MDN, each with 'Can Ref Blobs', 'Can Use for State Change', and associated capability columns.
section: "6.3"
