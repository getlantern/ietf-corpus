document: rfc-3478
kind: design-rationale
summary: LSRs that cannot preserve MPLS forwarding state across restart still benefit from implementing a subset of this mechanism, because their neighbors who can preserve state will be able to minimize traffic disruption. Supporting the mechanism is thus useful even for non-preserving LSRs.
section: "1"
topics:
