document: rfc-3189
kind: interoperability-note
summary: When sending unbundled DV audio and video, the same RTP timestamp SHOULD be used for both streams within the same frame to simplify lip synchronization. Lip sync may also be achieved via RTCP reference timestamps per RFC 1889.
section: "2.2"
topics:
    - rtp
    - realtime
