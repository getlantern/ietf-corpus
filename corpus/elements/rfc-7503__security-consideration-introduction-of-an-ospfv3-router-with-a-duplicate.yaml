document: rfc-7503
kind: security-consideration
summary: 'Introduction of an OSPFv3 router with a duplicate Router ID, whether malicious or accidental, is an attack point: other routers will interpret its LSAs as self-originated and attempt to flush them. The hysteresis mechanism in Section 7.4 mitigates the flooding effect of this attack.'
section: "8"
