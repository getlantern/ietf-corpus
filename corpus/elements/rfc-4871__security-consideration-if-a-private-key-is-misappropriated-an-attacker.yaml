document: rfc-4871
kind: security-consideration
summary: If a private key is misappropriated, an attacker can sign arbitrary messages as if they were from the legitimate domain. Revocation by setting p= to empty limits exposure, but there is an unavoidable window between compromise and revocation propagation.
section: "8.2"
topics:
