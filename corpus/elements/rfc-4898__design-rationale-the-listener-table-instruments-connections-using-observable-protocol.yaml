document: rfc-4898
kind: design-rationale
summary: The Listener Table instruments connections using observable protocol events (SYNs received, segments, resource allocation) rather than implementation-specific state transitions, so that it generalizes across SYN-flood defenses that use alternate state transition diagrams or syn-cookies to encode SYN-RCVD state implicitly.
section: "3.3"
topics:
