document: rfc-4286
kind: normative-requirement
summary: The Query Interval field in an Advertisement MUST be set to 0 if IGMP or MLD is not enabled on the advertising interface. Note this carries the Querier's Query Interval (QQI) in seconds, not the QQIC code.
section: 3.2.4
rfc2119_level: MUST
topics:
    - multicast
