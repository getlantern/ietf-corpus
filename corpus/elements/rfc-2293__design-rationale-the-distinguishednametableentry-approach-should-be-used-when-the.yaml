document: rfc-2293
kind: design-rationale
summary: The DistinguishedNameTableEntry approach should be used when the number of objects is small or sparsely spread over the DIT; the subtree approach defined in Section 2 is preferable when there are many objects or they are tightly clustered, since the subtree is better for more populated trees.
