document: rfc-7145
kind: normative-requirement
summary: The iSCSI layer at the target MUST always return SCSI status in a separate SCSI Response PDU for read commands; there MUST NOT be a 'phase collapse' when concluding a SCSI Read Command in iSER-assisted mode.
section: "3.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
