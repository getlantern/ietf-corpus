document: rfc-2834
kind: wire-format
summary: The HIPPI-LE header for HARP messages includes FC (3 bits, SHALL be 0), Message_Type (SHALL be 0 for data), Destination_Switch_Address, Destination_IEEE_Address (ULA or zero), Source_Switch_Address, Source_IEEE_Address, Destination_Address_Type (SHALL be 2), and Source_Address_Type (SHALL be 2). The LLC/SNAP header uses SSAP-DSAP-CTL = 0xAA-AA-03 and Ethertype 0x0806 (2054).
section: "6.1"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
