document: rfc-9866
kind: protocol-element
summary: 'RNFD defines three configurable thresholds: RNFD_CONSENSUS_THRESHOLD (default 0.51, ratio of NegCFRC to PosCFRC that triggers GLOBALLY DOWN), RNFD_SUSPICION_GROWTH_THRESHOLD (default 0.12, ratio growth since last UP that triggers suspicion), and RNFD_CFRC_SATURATION_THRESHOLD (default 0.63, fraction of 1-bits indicating CFRC saturation).'
section: "5.8"
topics:
    - routing
