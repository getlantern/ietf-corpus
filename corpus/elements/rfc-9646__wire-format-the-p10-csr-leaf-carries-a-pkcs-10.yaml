summary: The 'p10-csr' leaf carries a PKCS#10 CertificationRequest structure (type ct:p10-csr from RFC 9640). The 'cmc-csr' leaf carries a DER-encoded profiled CMC 'Full PKI Request'. The 'cmp-csr' leaf carries a DER-encoded CMP PKIMessage. All three are alternatives in a mandatory 'csr-type' choice.
