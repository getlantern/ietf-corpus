summary: 'CCMP defines a set of numeric response codes analogous to HTTP status codes: 200 (success), 400 (bad request), 401 (unauthorized), 403 (forbidden), 404 (not found), 409 (conflict), 420 (user not found), 421 (invalid confObjID), 422 (invalid userID), 423 (password required), 424 (authentication required), 425 (cloning tree conflict), 426 (permission denied), 427 (invalid domain), 500 (server error), 510 (server too busy).'
