document: rfc-4414
kind: protocol-element
summary: Privacy label types (dateTimePrivacyType, stringPrivacyType, normalizedStringPrivacyType, tokenPrivacyType, enumStatusType) are nillable elements that MUST have boolean attributes 'private' or 'denied' when present without content, and MAY carry 'doNotRedistribute' or 'specialAccess' when present with content.
section: 3.2.1
topics:
