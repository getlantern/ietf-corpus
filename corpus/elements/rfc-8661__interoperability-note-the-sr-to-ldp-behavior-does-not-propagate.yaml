document: rfc-8661
kind: interoperability-note
summary: The SR-to-LDP behavior does not propagate the status of the LDP FEC signaled by LDP when configured in ordered mode; the label binding is equivalent to independent LDP Label Distribution Control Mode (RFC 5036), where a label is bound to a FEC independently from the received binding for the same FEC.
section: 3.2.2
topics:
    - mpls
    - routing
