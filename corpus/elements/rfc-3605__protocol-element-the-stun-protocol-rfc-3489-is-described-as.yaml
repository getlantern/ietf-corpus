document: rfc-3605
kind: protocol-element
summary: The STUN protocol (RFC 3489) is described as one mechanism by which a host behind a NAT can discover its externally visible UDP port numbers for use in the 'a=rtcp' attribute. The four-step process involves allocating two UDP ports, sending to a STUN server, and parsing the reflected source address and port from the reply.
section: "3.1"
topics:
    - nat
    - rtp
