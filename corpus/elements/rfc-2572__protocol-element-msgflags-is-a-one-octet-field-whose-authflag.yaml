document: rfc-2572
kind: protocol-element
summary: msgFlags is a one-octet field whose authFlag (bit 0), privFlag (bit 1), and reportableFlag (bit 2) control security processing and Report PDU generation. The combinations authFlag=0/privFlag=1 and authFlag=1/privFlag=0 yield noAuthNoPriv and authNoPriv respectively; authFlag=1/privFlag=1 yields authPriv; authFlag=0/privFlag=1 is invalid.
section: "6.4"
