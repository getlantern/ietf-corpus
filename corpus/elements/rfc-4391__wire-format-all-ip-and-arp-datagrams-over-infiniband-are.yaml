document: rfc-4391
kind: wire-format
summary: 'All IP and ARP datagrams over InfiniBand are prefixed by a 4-octet encapsulation header containing a 16-bit ''Type'' field (EtherType values: 0x0800=IPv4, 0x0806=ARP, 0x8035=RARP, 0x86DD=IPv6) and a 16-bit Reserved field that MUST be zero on send and ignored on receive.'
section: "6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
