document: rfc-8804
kind: protocol-element
summary: The Fallback Target metadata object (MI.FallbackTarget) is advertised by the uCDN via the Metadata Interface within the host-metadata of each host. It indicates the target address the dCDN should redirect clients to when it cannot serve a request, represented as an Endpoint object.
