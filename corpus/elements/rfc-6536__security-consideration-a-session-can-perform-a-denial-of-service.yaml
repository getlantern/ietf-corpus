document: rfc-6536
kind: security-consideration
summary: A session can perform a denial-of-service attack by locking the datastore without requiring write access, using <lock>, <unlock>, <partial-lock>, or <partial-unlock>. Administrators may wish to explicitly restrict exec access to these operations in NACM rules.
section: 3.7.2
topics:
    - netconf
    - security
