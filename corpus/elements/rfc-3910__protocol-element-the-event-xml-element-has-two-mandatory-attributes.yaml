document: rfc-3910
kind: protocol-element
summary: 'The <Event> XML element has two mandatory attributes: ''type'' (either ''INDPs'' or ''userprof'') and ''name'' (a SPIRITS mnemonic such as OAA, TAA, REG). An optional ''mode'' attribute takes values ''N'' (notification) or ''R'' (request), defaulting to ''N''.'
