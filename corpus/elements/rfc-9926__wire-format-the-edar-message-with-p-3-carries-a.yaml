document: rfc-9926
kind: wire-format
summary: The EDAR message with P=3 carries a 15-byte Prefix field (up to 120 bits, padded with zeros to fill 120 bits) followed by a 1-byte field whose MSB is a reserved 'r' bit and whose lower 7 bits are the Prefix Length. The prefix is appended after the ROVR field, replacing the 16-byte Registered Address used for unicast addresses.
section: "7.3"
