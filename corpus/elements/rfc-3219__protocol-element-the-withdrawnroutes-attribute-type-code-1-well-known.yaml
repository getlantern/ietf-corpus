document: rfc-3219
kind: protocol-element
summary: The WithdrawnRoutes attribute (Type Code 1, Well-known) lists routes being removed from service; the ReachableRoutes attribute (Type Code 2, Well-known) lists routes being added. Both encode routes sequentially with no padding; neither has mandatory presence but each is a conditional mandatory trigger for other attributes.
