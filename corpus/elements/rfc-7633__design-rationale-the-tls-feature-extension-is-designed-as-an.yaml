document: rfc-7633
kind: design-rationale
summary: The TLS feature extension is designed as an optional, post-issue security control. Risks from fraudulently obtained unmarked certificates are outside its scope and must be addressed by pre-issue controls such as CAA DNS records; the extension only improves security for certificates that opt in.
section: "5.1"
topics:
    - tls
    - pkix
    - security
