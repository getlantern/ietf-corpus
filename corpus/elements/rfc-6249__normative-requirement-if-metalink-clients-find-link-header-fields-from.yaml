document: rfc-6249
kind: normative-requirement
summary: If Metalink clients find Link header fields from mirrors that in turn list mirrors, or from a Metalink server listing itself as a mirror, they MUST discard such Link header fields to prevent a possible infinite loop.
section: "2"
rfc2119_level: MUST
topics:
    - http
    - security
