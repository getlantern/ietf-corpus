document: rfc-4220
kind: design-rationale
summary: Bandwidth values use a 4-octet IEEE 754 single-precision floating-point encoding (TeLinkBandwidth) not for fractional precision but to allow specification of very large bandwidth numbers that cannot be expressed with 32-bit integers. This matches the encoding used in OSPF GMPLS extensions.
