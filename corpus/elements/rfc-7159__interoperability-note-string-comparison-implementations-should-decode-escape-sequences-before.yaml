document: rfc-7159
kind: interoperability-note
summary: String comparison implementations should decode escape sequences before comparing, so that 'a\\b' and 'a\u005Cb' are recognized as equal. Implementations that compare without decoding may incorrectly report inequality.
section: "8.3"
topics:
