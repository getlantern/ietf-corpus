document: rfc-5085
kind: wire-format
summary: 'The L2-Specific Sublayer with V-bit set for L2TPv3 VCCV is a 32-bit field: V-bit (bit 0) set to 1, next 3 bits set to 0, then 28 bits for Version (4 bits, set to 0), Reserved (8 bits, set to 0), and Channel Type (16 bits: 0x0021 for IPv4 or 0x0057 for IPv6).'
section: "6.1"
