document: rfc-3733
kind: protocol-element
summary: The <contact:panData> pending action notification element contains id with a required boolean 'paResult' attribute (approved/denied), paTRID referencing the original client and server transaction identifiers, and paDate indicating when review was completed. It is delivered via the <poll> service message queue.
section: 3.2.6
