document: rfc-8311
kind: errata
summary: The ECN nonce experiment (RFC 3540) has concluded without widespread deployment. A 2014 study of the top one million web servers found none of the 581,711 IPv4 servers tested used both ECT codepoints; only four of 17,028 IPv6 servers set both ECT(0) and ECT(1), possibly due to middlebox re-marking. RFC 3540 is reclassified from Experimental to Historic, freeing the ECT(1) codepoint for new experimental use.
section: "3"
topics:
