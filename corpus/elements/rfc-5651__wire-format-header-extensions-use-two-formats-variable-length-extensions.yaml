document: rfc-5651
kind: wire-format
summary: 'Header Extensions use two formats: variable-length extensions (HET 0–127) have an 8-bit HET, 8-bit HEL (length in 32-bit words), and variable HEC; fixed-length extensions (HET 128–255) have an 8-bit HET and a 24-bit HEC packed into one 32-bit word. HEL MUST be present for variable-length and MUST NOT be present for fixed-length extensions.'
section: 5.2.1
topics:
    - multicast
