document: rfc-4874
kind: normative-requirement
summary: When both XRO and EXRS are present during ERO expansion, an LSR MUST exclude all SRLGs, nodes, links, and resources listed in both. Where an element appears in both lists with different strictness, the stricter constraint (MUST exclude) wins over the softer one (SHOULD avoid).
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
