document: rfc-4141
kind: normative-requirement
summary: When a CONPERM client encounters a next-hop server supporting CONNEG, it MUST request CONNEG information, MUST perform requisite conversions before sending, and MUST fail message processing (returning DSN with status 5.6.5) if any conversion fails.
section: "3.2"
rfc2119_level: MUST
topics:
