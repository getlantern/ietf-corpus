document: rfc-6051
kind: interoperability-note
summary: If non-compound RTCP (RFC 5506) was previously negotiated, both the RTCP-SR-REQ feedback request and the RTCP SR response MAY be sent as non-compound RTCP packets, reducing overhead in environments where this was agreed.
