document: rfc-7001
kind: protocol-element
summary: 'DKIM (method ''dkim'') and DomainKeys (method ''domainkeys'') share a common result set: none, pass, fail, policy, neutral, temperror, and permerror. A ''fail'' result means the signature was present and acceptable but failed verification; ''neutral'' means syntax errors or processing failures; ''policy'' means the signature did not meet local ADMD policy.'
section: 2.6.1
topics:
