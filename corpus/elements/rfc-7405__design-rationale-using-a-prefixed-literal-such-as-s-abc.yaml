document: rfc-7405
kind: design-rationale
summary: Using a prefixed literal such as '%s"aBc"' for case-sensitive matching has a clear readability advantage over the prior practice of specifying each character numerically (e.g., %d97 %d98 %d99 or %x61.62.63), motivating the new syntax.
section: "2.1"
