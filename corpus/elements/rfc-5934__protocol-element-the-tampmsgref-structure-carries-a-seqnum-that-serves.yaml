document: rfc-5934
kind: protocol-element
summary: 'The TAMPMsgRef structure carries a seqNum that serves dual purpose: matching requests to responses and detecting replay attacks. Sequence number processing (Section 6) MUST complete successfully before any TAMP message is acted upon. Trust anchor stores MUST maintain a per-trust-anchor stored sequence number.'
section: 1.3.2
topics:
    - security
