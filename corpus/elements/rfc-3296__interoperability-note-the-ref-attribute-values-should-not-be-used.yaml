document: rfc-3296
kind: interoperability-note
summary: The ref attribute values SHOULD NOT be used as a relative name-component of an entry's DN. The handling of LDAP URLs with absent or empty DN parts or with explicit scope specifiers in the ref attribute itself is not defined by this specification.
section: "2.2"
topics:
