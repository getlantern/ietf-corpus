document: rfc-6265
kind: interoperability-note
summary: Some existing user agents treat an absent Domain attribute as if it were set to the current hostname, causing them to erroneously send the cookie to subdomains. Servers relying on host-only behavior should be aware of this divergence.
section: 4.1.2.3
topics:
    - http
