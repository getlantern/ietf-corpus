document: rfc-9639
kind: protocol-element
summary: 'The linear predictor subframe stores: predictor order, coefficient precision (4 bits; 0b1111 is forbidden), prediction right shift (5 bits; negative values are forbidden), s(precision) coefficients, and Rice-coded residual. A prediction is computed as sum(coeff[i] * sample[i]) >> right_shift.'
