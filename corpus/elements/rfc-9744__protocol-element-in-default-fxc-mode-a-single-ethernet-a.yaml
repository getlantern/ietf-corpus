document: rfc-9744
kind: protocol-element
summary: In Default FXC mode, a single Ethernet A-D per-EVI route is sent with ESI=0 when the first AC is configured; additional ACs are only locally associated with the pre-established tunnel without generating additional BGP routes. The route includes two new flags in the EVPN Layer 2 Attributes Extended Community indicating Default FXC mode and normalized VID type.
section: "3.2"
topics:
    - vpn
    - bgp
    - routing
