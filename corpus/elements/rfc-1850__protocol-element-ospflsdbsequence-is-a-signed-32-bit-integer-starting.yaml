document: rfc-1850
kind: protocol-element
summary: ospfLsdbSequence is a signed 32-bit integer starting at 0x80000001 and incrementing to 0x7FFFFFFF, used to detect old and duplicate LSAs; larger values indicate more recent advertisements. ospfLsdbChecksum uses the Fletcher checksum over the complete advertisement excluding the age field so age can be incremented without recalculating.
section: "3.4"
topics:
    - routing
