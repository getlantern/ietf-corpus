document: rfc-9176
kind: protocol-element
summary: 'A registration resource in the RD has six attribute types: endpoint name (ep, Unicode string unique within sector), registration base URI (base), lifetime (lt), registration resource location (href), optional sector (d), and optional additional endpoint attributes. Links registered by the endpoint are also stored in the registration.'
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
