document: rfc-9877
kind: interoperability-note
summary: When an RDAP client performs an IP network lookup, the returned most-specific object may lack a geofeed link while a less-specific parent object has one. Clients should consider retrieving parent objects recursively if the initial response lacks geofeed data.
section: "3"
topics:
