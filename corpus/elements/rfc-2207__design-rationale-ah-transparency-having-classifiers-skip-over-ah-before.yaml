document: rfc-2207
kind: design-rationale
summary: AH Transparency (having classifiers skip over AH before classifying packets) was rejected despite requiring no protocol changes because it lacks a consistent solution for both AH and ESP—ESP encrypts transport headers, making them unusable for classification.
