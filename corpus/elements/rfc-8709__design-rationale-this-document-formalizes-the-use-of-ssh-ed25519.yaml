document: rfc-8709
kind: design-rationale
summary: This document formalizes the use of 'ssh-ed25519' as originally implemented by OpenSSH 6.5, and additionally introduces 'ssh-ed448' with the name 'ssh-ed448'. The formalization ensures interoperability across SSH implementations that had independently adopted the OpenSSH convention.
section: "1"
topics:
