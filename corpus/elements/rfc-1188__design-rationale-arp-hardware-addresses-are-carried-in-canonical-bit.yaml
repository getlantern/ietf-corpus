document: rfc-1188
kind: design-rationale
summary: ARP hardware addresses are carried in canonical (bit-reversed) order, with the Group bit as the low-order bit of the first octet, to maintain compatibility with Ethernet conventions in bridged environments. It is also recommended that all Network Layer protocols in FDDI frames use canonical MAC address order.
section: Address Resolution
topics:
    - ip
