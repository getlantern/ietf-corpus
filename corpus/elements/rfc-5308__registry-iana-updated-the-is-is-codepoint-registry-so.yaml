document: rfc-5308
kind: registry
summary: IANA updated the IS-IS codepoint registry so that TLV codes 232 and 236 refer to RFC 5308. IANA also created a new Sub-TLV codepoint registry for Sub-TLVs of TLV 236, with value range 0–255, requiring Designated Expert approval for allocations; all codepoints are initially unassigned.
