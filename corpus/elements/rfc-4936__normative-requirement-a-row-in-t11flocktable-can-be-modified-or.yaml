document: rfc-4936
kind: normative-requirement
summary: A row in t11FLockTable can be modified or deleted via t11FLockRowStatus only when the row's t11FLockInitiatorType is 'snmp'. Rows created by other means (SSB, CLI) cannot be deleted via SNMP.
section: "6"
rfc2119_level: MUST NOT
topics:
    - snmp
