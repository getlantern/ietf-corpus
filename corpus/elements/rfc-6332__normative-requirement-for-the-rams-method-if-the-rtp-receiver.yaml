document: rfc-6332
kind: normative-requirement
summary: For the RAMS method, if the RTP receiver receives a 1xx- or 2xx-level response code, it MUST use one of the 1xxx-level status codes. If it receives a 4xx- or 5xx-level response code, the RTP receiver MUST use the response code as its status code.
section: 4.1.2
rfc2119_level: MUST
topics:
    - rtp
    - multicast
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
