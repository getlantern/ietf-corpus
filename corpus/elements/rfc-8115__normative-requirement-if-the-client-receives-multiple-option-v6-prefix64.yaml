document: rfc-8115
kind: normative-requirement
summary: If the client receives multiple OPTION_V6_PREFIX64 options where each enclosed IPv6 multicast prefix has a distinct scope, the client MUST select the appropriate prefix whose scope matches the IPv4 multicast address being synthesized.
section: "4"
rfc2119_level: MUST
