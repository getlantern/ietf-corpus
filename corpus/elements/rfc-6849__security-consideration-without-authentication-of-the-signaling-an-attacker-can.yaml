document: rfc-6849
kind: security-consideration
summary: Without authentication of the signaling, an attacker can establish a loopback session between two victim parties both acting as rtp-pkt-loopback mirrors to each other, causing a small number of initial RTP packets to loop infinitely between them and exhaust their resources and bandwidth.
