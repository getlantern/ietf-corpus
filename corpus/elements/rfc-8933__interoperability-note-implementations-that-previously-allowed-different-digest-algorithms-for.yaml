document: rfc-8933
kind: interoperability-note
summary: Implementations that previously allowed different digest algorithms for message content and signed attributes will produce signatures that are invalid under this specification. However, most existing implementations already enforced same-algorithm usage, so real-world incompatibility is expected to be rare.
section: "3.4"
topics:
    - crypto
    - security
