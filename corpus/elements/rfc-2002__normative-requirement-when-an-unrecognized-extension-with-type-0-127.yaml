document: rfc-2002
kind: normative-requirement
summary: When an unrecognized Extension with type 0–127 is encountered, the entire message MUST be silently discarded. When an unrecognized Extension with type 128–255 is encountered, that Extension is ignored but the remaining Extensions and message data MUST still be processed.
section: "1.9"
rfc2119_level: MUST
topics:
    - ip
