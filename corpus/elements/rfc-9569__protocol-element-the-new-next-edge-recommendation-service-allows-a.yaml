document: rfc-9569
kind: protocol-element
summary: The New Next Edge Recommendation service allows a client to POST to '<tips-view-path>/ug' when it has lost track of the next valid edge (e.g., after server graph compaction). The server returns a JSON merge patch to AddTIPSResponse containing an updated UpdatesGraphSummary with a new recommended start-edge-rec.
section: "7.4"
