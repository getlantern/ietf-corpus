document: rfc-4683
kind: interoperability-note
summary: The SIM is placed in the subjectAltName extension as an otherName, so implementations that do not process SIM values can ignore it without affecting other certificate processing. Implementations must handle both SHA-1 and SHA-256 for PEPSI generation and verification.
section: "4.4"
topics:
    - pkix
    - security
