document: rfc-8947
kind: privacy-consideration
summary: In direct client mode, the assigned link-layer address is exposed to all link observers. Peers observing the DHCP exchange can correlate the client's DUID with the assigned address, enabling tracking. RFC 7844 anonymity profiles can mitigate this.
section: "15"
topics:
