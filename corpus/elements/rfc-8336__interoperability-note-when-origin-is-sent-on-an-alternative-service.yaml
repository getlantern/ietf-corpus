document: rfc-8336
kind: interoperability-note
summary: When ORIGIN is sent on an alternative service connection (RFC 7838), the initial Origin Set contains the actual port in use (which may differ from the intended origin's port). Servers must explicitly include the intended origin in the ORIGIN frame payload in such cases.
section: "2.3"
topics:
    - http
