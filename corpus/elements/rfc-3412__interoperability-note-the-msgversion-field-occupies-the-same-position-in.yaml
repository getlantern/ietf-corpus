document: rfc-3412
kind: interoperability-note
summary: The msgVersion field occupies the same position in SNMPv3 messages as in SNMPv1 and SNMPv2c, allowing an SNMP engine to recognize the message version before invoking version-specific parsing. The value 3 denotes SNMPv3.
