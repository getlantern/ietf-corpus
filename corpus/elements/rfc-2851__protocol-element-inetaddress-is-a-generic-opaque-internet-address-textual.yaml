document: rfc-2851
kind: protocol-element
summary: InetAddress is a generic opaque Internet address textual convention (OCTET STRING, SIZE 0..255) always interpreted in context of a paired InetAddressType object. The InetAddressType object identifier MUST be 1 less than the InetAddress object identifier.
