document: rfc-5584
kind: security-consideration
summary: The ATRAC payload carries only compressed audio data and cannot carry active content that would impose malicious side effects. However, this payload format implements no security mechanisms; confidentiality, integrity, and authentication must be provided externally, e.g., via SRTP (RFC 3711).
section: "9"
topics:
