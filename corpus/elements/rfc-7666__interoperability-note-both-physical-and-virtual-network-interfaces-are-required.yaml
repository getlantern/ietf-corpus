document: rfc-7666
kind: interoperability-note
summary: Both physical and virtual network interfaces are required to be represented in IF-MIB's ifTable. The vmNetworkTable in VM-MIB points to ifTable entries via vmNetworkIfIndex, and to parent physical NICs via vmNetworkParent. Management IP addresses and other VM-specific objects not common to all hypervisors may be placed in ENTITY-MIB's entLogicalTable.
section: "5"
