document: rfc-8768
kind: interoperability-note
summary: When both HTTP-to-CoAP and CoAP-to-HTTP proxies are involved and proxy-forwarded traffic crosses both boundaries repeatedly, loop detection may break. However, if the loop is confined within the CoAP or HTTP legs alone, detection remains functional.
section: "5"
topics:
