document: rfc-7357
kind: design-rationale
summary: ESADI does no routing calculations, so no pseudonodes are created. ESADI-LSP, ESADI-CSNP, and ESADI-PSNP payloads are formatted as Extended Level 1 Circuit Scope (E-L1CS) PDUs [RFC7356], allowing up to 2^16 fragments while skipping pseudonode support.
