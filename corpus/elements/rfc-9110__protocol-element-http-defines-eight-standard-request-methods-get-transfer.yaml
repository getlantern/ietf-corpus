document: rfc-9110
kind: protocol-element
summary: 'HTTP defines eight standard request methods: GET (transfer current representation), HEAD (same as GET without content), POST (perform resource-specific processing), PUT (replace target resource), DELETE (remove target resource), CONNECT (establish tunnel), OPTIONS (describe communication options), and TRACE (loop-back test). Method tokens are case-sensitive.'
