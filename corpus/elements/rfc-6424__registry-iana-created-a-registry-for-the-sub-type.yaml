document: rfc-6424
kind: registry
summary: IANA created a registry for the Sub-Type field of the DDMAP TLV (range 0–65535). Sub-types 1 (Multipath data), 2 (Label stack), and 3 (FEC stack change) were assigned. Ranges 0–16383 and 32768–49161 require Standards Action; 16384–31743 and 49162–64511 require Specification Required; 31744–32767 and 64512–65535 are Vendor Private Use.
section: "6.2"
