document: rfc-6728
kind: normative-requirement
summary: Interface indices (ifIndex) and physical entity indices (entPhysicalIndex) SHOULD only be used as ObservationPoint identifiers when an SNMP agent on the same Monitoring Device enables access to the corresponding IF-MIB or ENTITY-MIB tables.
section: "4.1"
rfc2119_level: SHOULD
topics:
