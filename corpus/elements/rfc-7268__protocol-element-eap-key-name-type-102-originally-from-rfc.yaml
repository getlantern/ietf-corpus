document: rfc-7268
kind: protocol-element
summary: EAP-Key-Name (Type 102, originally from RFC 4072) contains the EAP Session-Id as defined in RFC 5247. It MAY appear in Access-Request, Access-Accept, and CoA-Request packets. For IEEE 802.1X MACsec, the Connectivity Association Key Name (CKN) is derived from the EAP Session-Id and is required for the MACsec Key Agreement (MKA) exchange.
section: "2.2"
topics:
