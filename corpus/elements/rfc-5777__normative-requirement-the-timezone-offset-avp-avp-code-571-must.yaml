document: rfc-5777
kind: normative-requirement
summary: The Timezone-Offset AVP (AVP Code 571) MUST be present if the Timezone-Flag AVP is set to OFFSET (value 2). Its value MUST be in the range from -43200 to 43200 seconds, specifying the UTC offset used for time-window AVPs.
section: 4.2.12
rfc2119_level: MUST
topics:
    - diameter
    - qos
