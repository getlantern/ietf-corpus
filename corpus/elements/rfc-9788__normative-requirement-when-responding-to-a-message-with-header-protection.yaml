document: rfc-9788
kind: normative-requirement
summary: When responding to a message with Header Protection, an MUA MUST only use the protected Header Fields when populating recipients of the new message. This prevents a MITM attacker from causing a misdirected reply by modifying the unprotected outer From address of an encrypted message.
section: 4.4.4
rfc2119_level: MUST
topics:
    - email
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
