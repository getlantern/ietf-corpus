document: rfc-1253
kind: interoperability-note
summary: For row creation in conceptual tables, management stations should include all read-write objects in the SET-Request; agents should accept SET-Requests with only the minimum required objects, following the Robustness Principle ('be liberal in what you accept, conservative in what you send').
