document: rfc-9000
kind: protocol-element
summary: Each connection ID has an associated sequence number. Endpoints issue additional connection IDs via NEW_CONNECTION_ID frames (sequence numbers incrementing by 1) and retire obsolete ones via RETIRE_CONNECTION_ID frames. The active_connection_id_limit transport parameter caps how many active IDs a peer may maintain.
section: 5.1.1
topics:
    - quic
