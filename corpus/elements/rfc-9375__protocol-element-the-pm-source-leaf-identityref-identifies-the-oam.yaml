summary: The 'pm-source' leaf (identityref) identifies the OAM tool used to collect PM data. Defined identities include pm-source-bgpls (RFC 8571), pm-source-owamp (RFC 4656), pm-source-twamp (RFC 5357), pm-source-stamp (RFC 8762), pm-source-y-1731 (ITU-T Y.1731), and pm-source-ioam (RFC 9197).
