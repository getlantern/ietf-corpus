document: rfc-6638
kind: protocol-element
summary: 'The Schedule-Reply HTTP request header (values: T or F) lets an Attendee suppress the iTIP REPLY when deleting a scheduling object resource. If omitted or set to T, the server sends a REPLY; if set to F, no reply is sent, enabling silent removal.'
section: "8.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
