document: rfc-5760
kind: normative-requirement
summary: In the Simple Feedback Model, the Distribution Source MUST forward all valid unicast RTCP packets received on the RTCP port to the multicast RTCP channel individually, and MUST NOT stack report blocks from different receivers into one packet for retransmission to the group.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - multicast
    - realtime
