document: rfc-1521
kind: design-rationale
summary: Nested content-transfer-encodings are prohibited for multipart and message types to prevent data being passed through encoding algorithms multiple times. Such nesting would obscure message structure, require multiple decoding passes just to identify content types, and introduce efficiency problems.
