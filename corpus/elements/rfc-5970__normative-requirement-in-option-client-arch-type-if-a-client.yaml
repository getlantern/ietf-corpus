document: rfc-5970
kind: normative-requirement
summary: In OPTION_CLIENT_ARCH_TYPE, if a client supports more than one pre-boot environment, the most preferred architecture type MUST be listed first, followed by others in descending priority. The server's response list MUST only contain architecture types initially queried by the client, also in descending priority order.
section: "3.3"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
