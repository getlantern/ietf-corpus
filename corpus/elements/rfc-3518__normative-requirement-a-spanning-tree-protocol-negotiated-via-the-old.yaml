document: rfc-3518
kind: normative-requirement
summary: A spanning tree protocol negotiated via the old Spanning-Tree-Protocol option MUST be agreed upon by both bridges; if not agreed upon (except when one side supports no STP), BCP MUST NOT enter the Opened state.
section: "5.6"
rfc2119_level: MUST
