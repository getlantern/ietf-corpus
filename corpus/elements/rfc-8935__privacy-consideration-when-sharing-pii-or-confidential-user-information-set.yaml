document: rfc-8935
kind: privacy-consideration
summary: When sharing PII or confidential user information, SET Transmitters and Recipients MUST have appropriate legal agreements and user consent in place. Data requiring confidentiality MUST be encrypted, at minimum with TLS and optionally with JWE.
