document: rfc-2203
kind: interoperability-note
summary: RPCSEC_GSS_CREDPROBLEM and RPCSEC_GSS_CTXPROBLEM may only be returned in responses to data exchange requests, not context creation requests. During context creation, an unsupported version or unrecognized flavor returns MSG_DENIED with AUTH_ERROR and AUTH_REJECTED_CRED.
section: 5.2.3.2
topics:
    - security
