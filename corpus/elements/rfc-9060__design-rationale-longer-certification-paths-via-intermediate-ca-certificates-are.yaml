document: rfc-9060
kind: design-rationale
summary: Longer certification paths (via intermediate CA certificates) are the only currently defined mechanism to preserve information about which service provider owned the telephone numbers; a non-delegated certificate issued directly by the trust anchor CA would lose that provider attribution.
