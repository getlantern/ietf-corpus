document: rfc-6856
kind: protocol-element
summary: The 'UTF8' command has no parameters and must be issued in the AUTHORIZATION state. It affects the USER, PASS, APOP, LIST, TOP, and RETR commands. Once issued, clients MUST NOT subsequently issue the STLS command.
section: "2.1"
