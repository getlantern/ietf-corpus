document: rfc-9624
kind: normative-requirement
summary: When BIER Penultimate Hop Popping (PHP) is used and the encapsulation after BIER header removal cannot indicate a VXLAN/NVGRE/GENEVE next header, the full VXLAN/NVGRE/GENEVE encapsulation MUST be included in the BIER payload.
section: "2.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
