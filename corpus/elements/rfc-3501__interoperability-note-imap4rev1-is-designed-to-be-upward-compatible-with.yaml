document: rfc-3501
kind: interoperability-note
summary: IMAP4rev1 is designed to be upward-compatible with IMAP2 and IMAP2bis. It is largely compatible with RFC 1730 IMAP4, except for certain facilities added in RFC 1730 that were subsequently removed. Obsolete commands, responses, and data formats that may be encountered with older implementations are described in [IMAP-OBSOLETE].
section: "1.3"
