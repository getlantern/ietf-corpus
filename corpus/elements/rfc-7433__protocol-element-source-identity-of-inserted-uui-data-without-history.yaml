document: rfc-7433
kind: protocol-element
summary: 'Source identity of inserted UUI data: without History-Info, the inserter is assumed to be the From header or P-Asserted-Identity. With History-Info, the inserter is identified by the Targeted-to-URI element prior to the one containing the included UUI data.'
section: "4.3"
topics:
