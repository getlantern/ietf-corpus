document: rfc-6858
kind: design-rationale
summary: This specification values simplicity of implementation over fidelity of representation. Implementing a high-fidelity downgrade algorithm (RFC6857) is considered more work than implementing proper UTF-8 support for POP/IMAP, so this simpler approach is provided for servers that need a quick path.
section: "1"
