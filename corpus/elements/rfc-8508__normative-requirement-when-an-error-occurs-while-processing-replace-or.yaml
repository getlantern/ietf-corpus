document: rfc-8508
kind: normative-requirement
summary: When an error occurs while processing REPLACE or UID REPLACE, the server MUST NOT leave the selected mailbox in an inconsistent state; any untagged EXPUNGE response MUST NOT be sent until all actions are successfully completed.
section: "3.4"
rfc2119_level: MUST NOT
topics:
