document: rfc-9360
kind: design-rationale
summary: Constrained devices are not necessarily expected to evaluate and process X.509 certificates themselves; a device may carry a provisioned certificate and provide it to a capable relying party, or hold only a certificate thumbprint without storing the full certificate.
