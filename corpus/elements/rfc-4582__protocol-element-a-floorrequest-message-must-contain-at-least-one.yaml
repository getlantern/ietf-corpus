document: rfc-4582
kind: protocol-element
summary: A FloorRequest message MUST contain at least one FLOOR-ID attribute and optionally BENEFICIARY-ID, PARTICIPANT-PROVIDED-INFO, and PRIORITY. If more than one FLOOR-ID is included, the server treats all floors as an atomic package and must grant or deny them all together.
section: 5.3.1
topics:
    - realtime
