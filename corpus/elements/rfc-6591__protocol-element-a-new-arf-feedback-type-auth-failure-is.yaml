document: rfc-6591
kind: protocol-element
summary: A new ARF feedback type 'auth-failure' is defined as an extension to ARF (RFC 5965) for reporting email authentication method failures at receipt time. A single report describes a single authentication failure; multiple reports MAY be used for multiple failures on one message.
section: "3.1"
topics:
    - email
