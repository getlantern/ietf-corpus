document: rfc-8480
kind: normative-requirement
summary: At least one Scheduling Function MUST be running at all times. A node MAY implement and run multiple SFs concurrently, and the SFID field in every 6P message selects which SF handles that transaction.
section: "1"
rfc2119_level: MUST
