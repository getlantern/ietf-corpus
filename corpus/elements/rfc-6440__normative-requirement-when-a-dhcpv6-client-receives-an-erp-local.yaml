document: rfc-6440
kind: normative-requirement
summary: When a DHCPv6 client receives an ERP Local Domain Name option, it MUST verify that the option length is no more than 256 octets and that the local domain name is a properly encoded single FQDN per RFC 3315 Section 8.
section: "4"
rfc2119_level: MUST
topics:
    - security
