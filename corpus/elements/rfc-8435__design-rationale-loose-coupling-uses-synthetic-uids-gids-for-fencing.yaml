document: rfc-8435
kind: design-rationale
summary: 'Loose coupling uses synthetic uids/gids for fencing: the MDS assigns unpredictable numeric uid/gid values to data files on storage devices, distributes them to clients in the layout, and fences clients by changing these values. This approach provides security equivalent to AUTH_SYS but cannot protect against malicious clients.'
section: "2.2"
topics:
    - security
