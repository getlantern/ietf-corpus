document: rfc-8724
kind: normative-requirement
summary: In ACK-on-Error mode, all tiles except the last and penultimate MUST be of equal (regular) size; each tile MUST be at least one L2 Word. The W field MUST be present and wide enough to unambiguously represent an absolute window number. SCHC ACKs are only sent for windows with missing tiles.
section: 8.4.3
rfc2119_level: MUST
topics:
    - ip
