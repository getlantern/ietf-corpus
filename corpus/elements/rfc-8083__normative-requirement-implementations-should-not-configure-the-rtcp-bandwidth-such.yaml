document: rfc-8083
kind: normative-requirement
summary: Implementations SHOULD NOT configure the RTCP bandwidth such that Td is larger than 5 seconds, and SHOULD NOT configure T_rr_interval to values larger than 4 seconds when using RTP/AVPF or RTP/SAVPF.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
