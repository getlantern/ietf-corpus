document: rfc-4364
kind: normative-requirement
summary: To ensure interoperability among MPLS-based implementations, all systems MUST support LDP. Downstream Unsolicited mode MUST be supported on interfaces that are neither LC-ATM nor LC-FR; Downstream on Demand mode MUST be supported on LC-ATM and LC-FR interfaces.
section: 4.3.2
rfc2119_level: MUST
topics:
