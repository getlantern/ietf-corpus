document: rfc-6021
kind: protocol-element
summary: The domain-name type (string, length 1..253) represents a DNS domain name. Internationalized domain names MUST be encoded in punycode (RFC 3492); canonical format uses lowercase US-ASCII characters. Schema nodes using this type MUST describe resolution behavior.
