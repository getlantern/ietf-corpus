document: rfc-9442
kind: design-rationale
summary: A single SCHC Tile size per fragmentation mode is defined so that every Sigfox message always carries exactly one SCHC Tile, exploiting the fixed Uplink (12 bytes) and Downlink (8 bytes) payload sizes to avoid sub-optimal padding.
section: 3.5.1
