document: rfc-1333
kind: normative-requirement
summary: InGoodOctets MUST NOT count octets for frames that are counted in ifInDiscards or ifInErrors. It MAY be initialized to any value at LCP Establishment but MUST NOT be reset until the LCP leaves the Termination phase.
section: "2.2"
rfc2119_level: MUST NOT
topics:
