document: rfc-5509
kind: design-rationale
summary: IANA created two independent registries—the Instant Messaging SRV Protocol Label registry and the Presence SRV Protocol Label registry—to ensure that the association between "_im" and "_pres" service labels and their respective underlying protocols is deterministic rather than ambiguous.
