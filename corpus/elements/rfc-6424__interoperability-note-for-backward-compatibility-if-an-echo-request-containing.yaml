document: rfc-6424
kind: interoperability-note
summary: For backward compatibility, if an echo request containing a DDMAP receives a Return Code 2 ('One or more TLVs was not understood'), the sender MAY resend with the deprecated DSMAP instead. When detailed reply is required, the sender may choose to ignore routers that do not support DDMAP.
section: "4.4"
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
