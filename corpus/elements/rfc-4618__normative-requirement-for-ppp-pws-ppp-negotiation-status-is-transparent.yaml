document: rfc-4618
kind: normative-requirement
summary: For PPP PWs, PPP negotiation status is transparent to the PW and MUST NOT be communicated to the remote MPLS PE. Physical AC status changes MUST be signaled via PW status notification per RFC4447.
section: "5.3"
rfc2119_level: MUST NOT
topics:
