document: rfc-8865
kind: wire-format
summary: T.140 text is encoded and framed as T140blocks as defined in RFC 4103. One or more T140blocks can be sent in a single SCTP user message. Unlike RTP-based transport, no redundant transmission is used because the data channel's 'reliable' mode provides robust delivery.
section: "5.2"
