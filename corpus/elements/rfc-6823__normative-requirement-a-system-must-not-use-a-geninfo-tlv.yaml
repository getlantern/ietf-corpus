document: rfc-6823
kind: normative-requirement
summary: A system MUST NOT use a GENINFO TLV present in an LSP of a system that is not currently reachable via Level-x paths (where x matches the LSP level). This prohibition applies to leaking as well, preventing propagation of stale GENINFO information.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
