document: rfc-7065
kind: design-rationale
summary: The suffix "s" on the "turns" scheme was retained rather than moving the secure option to a URI parameter (e.g., ";proto=tls") in order to preserve symmetry with the STUN URI scheme, which also uses a "stuns" variant rather than a parameter.
