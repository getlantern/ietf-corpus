document: rfc-8353
kind: design-rationale
summary: The GSS-API Java bindings leverage the Java Cryptography Architecture (JCA) provider model to support plugability of security mechanisms. Mechanisms can be added system-wide or per-instance of the GSS-API, allowing seamless switching between implementations without application changes.
section: "5.2"
topics:
