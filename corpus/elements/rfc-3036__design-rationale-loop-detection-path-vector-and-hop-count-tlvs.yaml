document: rfc-3036
kind: design-rationale
summary: Loop detection (Path Vector and Hop Count TLVs) is a configurable option rather than mandatory because it adds per-message overhead and complexity. If configured, it must be enabled on ALL LSRs in the MPLS domain; partial deployment risks undetected or falsely detected loops.
section: 2.8.3
topics:
    - mpls
    - routing
