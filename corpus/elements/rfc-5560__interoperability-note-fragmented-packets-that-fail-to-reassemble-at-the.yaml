document: rfc-5560
kind: interoperability-note
summary: Fragmented packets that fail to reassemble at the destination are deemed lost and are not included in Type-P-one-way-packet-arrival-count, aligning the fragmentation handling with the packet loss metric defined in RFC 2680.
