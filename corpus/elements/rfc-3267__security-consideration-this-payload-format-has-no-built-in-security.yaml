document: rfc-3267
kind: security-consideration
summary: This payload format has no built-in security mechanisms; external mechanisms such as SRTP MAY be used. When UED/UEP is combined with encryption, stream ciphers without error-propagation are preferred because block ciphers may severely reduce error robustness of the robust-sorting scheme.
