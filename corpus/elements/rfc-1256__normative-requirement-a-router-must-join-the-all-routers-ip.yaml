document: rfc-1256
kind: normative-requirement
summary: A router MUST join the all-routers IP multicast group (224.0.0.2) on all interfaces where it supports IP multicast. On transition from host to router, the system must join this group; on transition from router to host, it must depart.
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
