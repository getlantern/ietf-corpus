document: rfc-6241
kind: design-rationale
summary: NETCONF's RPC paradigm was chosen to closely mirror the native functionality of managed devices, reducing implementation costs and enabling timely access to new device features. Authentication reuses existing device mechanisms (e.g., RADIUS) for the same reason.
section: "1"
