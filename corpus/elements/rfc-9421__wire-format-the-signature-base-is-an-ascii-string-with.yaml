summary: 'The signature base is an ASCII string with ABNF: signature-base = *( signature-base-line LF ) signature-params-line; signature-base-line = component-identifier ":" SP (derived-component-value / *field-content); signature-params-line = DQUOTE "@signature-params" DQUOTE ":" SP inner-list. Component names are double-quoted String Items with parameters as semicolon-separated list.'
