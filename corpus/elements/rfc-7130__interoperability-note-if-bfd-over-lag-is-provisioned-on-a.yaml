document: rfc-7130
kind: interoperability-note
summary: If BFD-over-LAG is provisioned on a member link that is already active within a LAG, BFD session state should not influence the load-balancing algorithm until the session transitions to Up, ensuring that the ordering of enabling LAG and enabling BFD has no impact on the forwarding service.
section: A
topics:
    - ip
