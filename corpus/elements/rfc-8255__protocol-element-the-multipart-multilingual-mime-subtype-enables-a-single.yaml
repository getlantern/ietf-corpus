document: rfc-8255
kind: protocol-element
summary: The 'multipart/multilingual' MIME subtype enables a single email message to carry multiple language versions of the same content. Each language version is an alternative body part, and the receiving client selects the appropriate part based on Content-Language and optionally Content-Translation-Type rather than on part ordering or Content-Type values.
section: "2"
topics:
