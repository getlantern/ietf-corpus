document: rfc-7874
kind: normative-requirement
summary: For music or desktop-sharing applications, the audio level SHOULD NOT be automatically adjusted, and the endpoint SHOULD allow the user to set gain manually. Endpoints MAY increase gain before playback to compensate for devices calibrated for commercial music.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - webrtc
    - realtime
