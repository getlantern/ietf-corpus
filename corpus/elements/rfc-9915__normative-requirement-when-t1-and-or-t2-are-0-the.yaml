document: rfc-9915
kind: normative-requirement
summary: When T1 and/or T2 are 0, the client MUST choose its own renew/rebind times but MUST NOT transmit immediately. If multiple IA options were received, the client SHOULD coordinate timers to handle all IAs in one exchange.
section: "14.2"
rfc2119_level: MUST
topics:
    - ip
