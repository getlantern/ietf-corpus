document: rfc-5416
kind: design-rationale
summary: The CAPWAP protocol does not guarantee in-order delivery of tunneled data packets. For IP-over-802.11 traffic this is not an issue since IP has no in-order delivery requirement, but implementers must consider this characteristic before deploying CAPWAP for protocols that require ordered delivery.
section: 2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
