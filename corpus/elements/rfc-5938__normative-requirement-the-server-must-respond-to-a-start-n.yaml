document: rfc-5938
kind: normative-requirement
summary: The Server MUST respond to a Start-N-Sessions command with one or more Start-N-Ack messages, which SHOULD be sent as quickly as possible. When using Individual Session Control mode, multiple Start-N-Sessions commands MAY be sent without waiting for acknowledgement.
section: "3.2"
rfc2119_level: MUST
topics:
    - measurement
