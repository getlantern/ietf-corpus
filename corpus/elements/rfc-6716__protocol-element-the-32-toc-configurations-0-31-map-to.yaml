document: rfc-6716
kind: protocol-element
summary: The 32 TOC configurations (0–31) map to three operating modes—SILK-only (configs 0–11, NB/MB/WB), Hybrid SILK+CELT (configs 12–15, SWB/FB), and CELT-only (configs 16–31, NB/WB/SWB/FB)—each paired with frame sizes of 10/20/40/60 ms for SILK and 2.5/5/10/20 ms for CELT.
