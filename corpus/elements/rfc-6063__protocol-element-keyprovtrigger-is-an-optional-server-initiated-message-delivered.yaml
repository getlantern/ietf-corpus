document: rfc-6063
kind: protocol-element
summary: KeyProvTrigger is an optional server-initiated message delivered via HTTP response (MIME type 'application/dskpp+xml') containing Authentication Data (AD), optional DeviceID, optional KeyID, and optional server URL. It launches the DSKPP Client and provides credentials for the subsequent ClientHello.
