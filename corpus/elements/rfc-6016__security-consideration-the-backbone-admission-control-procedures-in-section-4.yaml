document: rfc-6016
kind: security-consideration
summary: The backbone admission control procedures in Section 4 (using PE-PE MPLS TE tunnels) are incompatible with PE-PE IPsec, because they depend on PE-PE MPLS TE tunnels for aggregate reservations. The PE-CE admission control procedures in Section 3 are compatible with PE-PE IPsec. CE-CE IPsec is handled via RFC 4923 hierarchical RSVP reservation over IPsec tunnels.
section: "10"
topics:
    - security
    - qos
    - vpn
    - ipsec
