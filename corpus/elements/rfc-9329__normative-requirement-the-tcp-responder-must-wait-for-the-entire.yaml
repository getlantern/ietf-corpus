document: rfc-9329
kind: normative-requirement
summary: The TCP Responder MUST wait for the entire stream prefix to be received before trying to parse IKE or ESP messages, and MUST NOT accept messages for an existing IKE session on a new incoming connection unless that connection begins with the stream prefix.
section: "6.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - tcp
