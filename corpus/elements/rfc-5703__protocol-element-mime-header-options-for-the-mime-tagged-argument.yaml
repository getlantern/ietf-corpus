kind: protocol-element
summary: MIME header options for the ':mime' tagged argument include ':type' (MIME type or Content-Disposition value), ':subtype' (MIME subtype), ':contenttype' (combined type/subtype), and ':param' (named MIME parameters). These are used with the extended 'header' test.
