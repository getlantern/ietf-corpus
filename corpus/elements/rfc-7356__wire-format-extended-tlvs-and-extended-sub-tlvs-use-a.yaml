document: rfc-7356
kind: wire-format
summary: Extended TLVs and extended sub-TLVs use a 16-bit Type field and a 16-bit Length field encoded in network byte order, allowing Length values greater than 255 octets. Standard TLV code points may be reused in extended TLVs by encoding the 8-bit type as a 16-bit integer with the 8 most significant bits set to zero.
section: "2"
topics:
