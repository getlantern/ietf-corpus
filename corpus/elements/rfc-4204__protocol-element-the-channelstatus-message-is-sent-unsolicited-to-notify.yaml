document: rfc-4204
kind: protocol-element
summary: The ChannelStatus message is sent unsolicited to notify an LMP neighbor about the status of one or more data channels of a TE link. It serves fault notification (failure localization), Channel Activation Indication, and Channel Deactivation Indication.
