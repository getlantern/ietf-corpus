document: rfc-3420
kind: normative-requirement
summary: If the message/sipfrag part contains a body, it MUST also contain the appropriate header fields describing that body (such as Content-Length) as required by Section 7.4 of RFC 3261, and the null-line separating the header from the body.
section: "2"
rfc2119_level: MUST
