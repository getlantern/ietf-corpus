document: rfc-8599
kind: security-consideration
summary: PNS-related SIP URI parameters in REGISTER Contact URIs are sensitive; if forwarded via the SIP event package for registrations (RFC 3680), operators must ensure subscriptions are authenticated and authorized, and that parameters are not included in event notifications sent to other users or untrusted entities.
section: "13"
topics:
