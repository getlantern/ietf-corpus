document: rfc-5545
kind: design-rationale
summary: iCalendar intentionally does not define a global time zone name registry, leaving TZID identifiers implementation-defined. The SOLIDUS prefix on a TZID is reserved to indicate a future globally registered identifier. Implementors are encouraged to use the public-domain TZ database (Olson database) naming conventions in the interim.
section: 3.2.19
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
