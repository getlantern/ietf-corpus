document: rfc-6310
kind: design-rationale
summary: TDM and CEP PWs use PWE3 control word bit flags (L bit, R bit) for OAM rather than PW status messages because TDM and SONET/SDH are inherently real-time and OAM indications must be generated or forwarded with minimal delay, which rules out messaging-protocol-based approaches.
section: "9"
topics:
