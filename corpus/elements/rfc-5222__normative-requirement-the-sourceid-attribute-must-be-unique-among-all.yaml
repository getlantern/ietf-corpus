document: rfc-5222
kind: normative-requirement
summary: The 'sourceId' attribute MUST be unique among all different mappings maintained by the authoritative source for a particular service. A UUID is a suitable format. All three of 'source', 'sourceId', and 'lastUpdated' are REQUIRED for every <mapping> element.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
