document: rfc-5717
kind: design-rationale
summary: Partial locking applies only to the running datastore; the candidate and startup datastores cannot be locked with <partial-lock>. This simplifies the locking model and avoids complex interactions with commit workflows.
section: "2.1"
topics:
    - netconf
    - yang
