document: rfc-6047
kind: protocol-element
summary: iMIP defines the binding of iTIP scheduling messages to Internet email (MIME/SMTP). A MIME entity carrying calendaring content uses the 'text/calendar' content type, transported over SMTP as defined in RFC 5322 and RFC 2045.
