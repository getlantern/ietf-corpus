document: rfc-7294
kind: protocol-element
summary: 'The Packet Loss Concealment Method (plc) field (2 bits) identifies the PLC method in use: 0=silence insertion, 1=simple replay no attenuation, 2=simple replay with attenuation, 3=enhancement. The enhancement method (plc=3) is equivalent to ''enhanced'' in RFC 3611 Section 4.7.6.'
section: "3.2"
topics:
