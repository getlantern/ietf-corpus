document: rfc-7182
kind: normative-requirement
summary: When calculating the ICV for an ICV Address Block TLV, the TLVs concatenated with the addresses MUST NOT include any ICV Address Block TLVs already associated with those addresses, to avoid ordering ambiguity when multiple ICVs are present.
section: "10.1"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
