document: rfc-9795
kind: protocol-element
summary: The "rcd" (Rich Call Data) JWT claim is a JSON object that may contain one or more key/value pairs conveying caller and call metadata beyond the telephone number, including display name, alternate presentation number, icon, and jCard data. It extends PASSporT with an extensible set of caller-identity information comparable to traditional Caller ID.
section: "5.1"
topics:
    - realtime
    - sip
    - jose
    - json
