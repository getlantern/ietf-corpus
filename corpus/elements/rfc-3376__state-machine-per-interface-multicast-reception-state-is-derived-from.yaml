document: rfc-3376
kind: state-machine
summary: 'Per-interface multicast reception state is derived from per-socket state: if any socket for a (interface, multicast-address) pair is EXCLUDE, the interface record is EXCLUDE with source list = intersection of all EXCLUDE socket source lists minus any sources in INCLUDE sockets. If all sockets are INCLUDE, the interface record is INCLUDE with source list = union of all socket source lists.'
section: "3.2"
topics:
    - multicast
