document: rfc-4234
kind: wire-format
summary: 'The common encoding for ABNF grammars represents data externally as ''network virtual ASCII'': 7-bit US-ASCII in an 8-bit field with the high (8th) bit set to zero. Multi-byte strings use network byte order (higher-valued bytes on the left, sent first).'
section: B.2
