document: rfc-5084
kind: security-consideration
summary: Precomputation (meet-in-the-middle) attacks against counter mode limit theoretical strength to 2^(n/2) bits where n is the key length. Using long keys and unpredictable nonces significantly increases the table size an attacker must compute.
