document: rfc-7712
kind: normative-requirement
summary: During C2S TLS negotiation, if the PKIX certificate provided by the server is consistent with the XMPP profile of the matching rules from RFC 6125 and is otherwise valid according to RFC 5280, the client accepts that there is a strong domain name association between its stream and the DNS domain name of the XMPP service.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
