document: rfc-7518
kind: protocol-element
summary: The 'epk' (ephemeral public key) Header Parameter carries the originator's ephemeral public key as a JWK value for ECDH key agreement. It MUST contain only public key parameters and MUST be present and processed when ECDH-ES algorithms are used.
