document: rfc-2485
kind: security-consideration
summary: DHCP provides no authentication or security mechanisms, and a UAP client has no means to detect whether it is communicating with a rogue authentication service resulting from a forged or compromised UAP option. Even SSLv3-based secure authentication does not protect against this attack; mitigation relies on environmental assumptions in the Network Computing Client Technical Standard.
section: Security Considerations
topics:
    - security
