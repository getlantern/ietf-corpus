document: rfc-7781
kind: wire-format
summary: 'Two boundary APPsub-TLVs bracket MAC-RI TLVs in ESADI-LSPs: PN-MAC-RI-LAALP-INFO-START (type=4) carries the LAALP ID (variable, 8 bytes for MC-LAG/DRNI), and PN-MAC-RI-LAALP-INFO-END (type=5) has zero-length body. The START/END pair MUST occur within a single TRILL GENINFO TLV.'
section: "9.3"
topics:
    - routing
    - registry
