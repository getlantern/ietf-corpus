document: rfc-4202
kind: protocol-element
summary: The Interface Switching Capability Descriptor (ISCD) describes the switching capability and encoding type of an interface. Defined switching capabilities are PSC-1 through PSC-4, L2SC, TDM, LSC, and FSC. If no ISCD is present for an interface, it is assumed to be PSC-1. A single interface may carry multiple ISCDs.
section: "2.4"
topics:
    - routing
