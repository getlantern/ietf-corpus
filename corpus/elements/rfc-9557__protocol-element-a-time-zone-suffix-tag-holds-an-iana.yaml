document: rfc-9557
kind: protocol-element
summary: A time zone suffix tag holds an IANA Time Zone name (e.g., Europe/Paris) or an offset time zone in numeric format (e.g., +08:45). Using a named IANA Time Zone implies the intent to use rules current at interpretation time, so the represented local time changes as the IANA Time Zone Database is updated.
section: "3.1"
topics:
    - registry
