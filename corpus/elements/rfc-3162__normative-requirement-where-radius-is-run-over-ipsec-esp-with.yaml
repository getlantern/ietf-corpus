document: rfc-3162
kind: normative-requirement
summary: Where RADIUS is run over IPsec ESP with a non-null transform, the shared secret between the NAS and the RADIUS server MAY NOT be configured. In this case, a shared secret of zero length MUST be assumed.
section: "5"
rfc2119_level: MUST
topics:
