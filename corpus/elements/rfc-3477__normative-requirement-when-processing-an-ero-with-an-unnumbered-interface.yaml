document: rfc-3477
kind: normative-requirement
summary: When processing an ERO with an Unnumbered Interface ID subobject, if the outgoing link is unnumbered, the Path message sent to the next hop MUST include the IF_ID RSVP_HOP object with the IP address set to the node's Router ID and Interface ID set to the identifier the node assigned to the link.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
