document: rfc-7197
kind: normative-requirement
summary: If different duplication delay values are needed for different duplication groups, one MUST use different SDP descriptions for each or MUST use the 'duplication-delay' attribute at the media level. In that case, the 'duplication-delay' attribute MUST NOT be used at the session level.
section: "3"
rfc2119_level: MUST NOT
