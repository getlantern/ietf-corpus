document: rfc-2946
kind: protocol-element
summary: IAC SB ENCRYPT END IAC SE signals that all subsequent data will not be encrypted. IAC SB ENCRYPT REQUEST-START and REQUEST-END allow the DO ENCRYPT side to request the remote side start or stop encryption.
