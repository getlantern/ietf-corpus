document: rfc-6926
kind: normative-requirement
summary: Each DHCPBULKLEASEQUERY message MUST carry an xid (transaction-id) unique on the connection; if a received message's xid does not match any outstanding query, the requestor MUST close the TCP connection.
section: "7.1"
rfc2119_level: MUST
topics:
    - tcp
