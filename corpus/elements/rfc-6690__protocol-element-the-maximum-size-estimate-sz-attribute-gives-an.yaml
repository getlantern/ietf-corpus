document: rfc-6690
kind: protocol-element
summary: The maximum size estimate 'sz' attribute gives an indication of the maximum size in bytes of the resource representation returned by GET on the target URI. SHOULD be included for resources larger than one MTU. The 'sz' attribute MUST NOT appear more than once in a link.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - realtime
