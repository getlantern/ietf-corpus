document: rfc-6602
kind: normative-requirement
summary: If a received Binding Revocation Indication with a Mobile Node Group Identifier option also includes individual session identifiers (MN Identifier, HNP, IPv4 HoA, GRE Key), the MAG MUST consider it invalid and MUST reject it, sending a BRA with Status 128 (Binding Does NOT Exist).
section: 5.1.3
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
