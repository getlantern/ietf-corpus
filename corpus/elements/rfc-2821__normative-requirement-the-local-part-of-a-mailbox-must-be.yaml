document: rfc-2821
kind: normative-requirement
summary: The local-part of a mailbox MUST be treated as case sensitive. SMTP implementations MUST preserve the case of mailbox local-parts. Mailbox domains are not case sensitive.
section: "2.4"
rfc2119_level: MUST
topics:
    - email
