document: rfc-2384
kind: protocol-element
summary: 'The POP URL scheme designates a POP server and optionally a port number, authentication mechanism, authentication ID, and/or authorization ID. The general form is: pop://<user>;auth=<auth>@<host>:<port>. Clear text passwords are not permitted in POP URLs.'
section: "3"
