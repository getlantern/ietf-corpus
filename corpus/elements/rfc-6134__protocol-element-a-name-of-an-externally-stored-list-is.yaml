document: rfc-6134
kind: protocol-element
summary: A name of an externally stored list is always an absolute URI (RFC 3986). Useful URI schemes include LDAP, CardDAV, and "tag" URIs. A list name beginning with ":" is shorthand for "urn:ietf:params:sieve:" — e.g., ":addrbook:default" expands to "urn:ietf:params:sieve:addrbook:default".
section: "2.5"
topics:
    - email
    - ldap
