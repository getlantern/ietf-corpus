document: rfc-9926
kind: protocol-element
summary: The EARO Prefix Length field is a 7-bit unsigned integer occupying bits 1–7 of what is the Status byte in NA messages; it carries the prefix length in NS messages when P-Field is 3. A value of 0 is interpreted as a truncated 128, meaning the registration is for an address rather than a prefix, preserving backward compatibility with RFC 8505.
section: "7.2"
topics:
