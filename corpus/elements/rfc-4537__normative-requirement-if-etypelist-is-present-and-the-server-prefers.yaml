document: rfc-4537
kind: normative-requirement
summary: If EtypeList is present and the server prefers an enctype from the list over the AP-REQ authenticator subkey (if present) or the service ticket session key, the server MUST create a subkey using that enctype and send it in the subkey field of the AP-REP message.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - security
