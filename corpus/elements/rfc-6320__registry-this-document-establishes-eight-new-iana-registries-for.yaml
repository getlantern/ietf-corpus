document: rfc-6320
kind: registry
summary: 'This document establishes eight new IANA registries for ANCP: Message Type, Result Code, Port Management Function, Technology Type, Command Code, TLV Type, Capability Type, and a joint GSMP/ANCP Version Registry. Registration policies range from Standards Action (Message Type, Version) to IETF Review or Expert Review for extensibility points.'
