document: rfc-2222
kind: normative-requirement
summary: If a protocol profile does not permit a server challenge to be returned with a success indication, the server issues the challenge without success, the client responds with no data, and only then does the server indicate successful completion.
section: "5.2"
rfc2119_level: MUST
topics:
    - security
