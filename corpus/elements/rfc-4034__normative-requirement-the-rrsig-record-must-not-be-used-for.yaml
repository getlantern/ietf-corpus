document: rfc-4034
kind: normative-requirement
summary: The RRSIG record MUST NOT be used for authentication prior to the inception date and MUST NOT be used for authentication after the expiration date. All comparisons involving these time fields MUST use serial number arithmetic as defined in RFC 1982.
section: 3.1.5
rfc2119_level: MUST NOT
topics:
    - dns
    - security
