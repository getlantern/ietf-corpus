document: rfc-2457
kind: protocol-element
summary: The ebnCosMapTable, indexed by ebnCosMapCpName and ebnCosMapNonNativeCos, maps non-native COS values to native COS values. The table reflects the COS mappings the EBN is actually performing at query time, not the initial user-defined mappings.
