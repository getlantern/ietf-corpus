document: rfc-3986
kind: security-consideration
summary: Back-end transcoding of URI characters (e.g., when a gateway translates between character encodings) can introduce security vulnerabilities if percent-encoded reserved characters are decoded and re-encoded under a different encoding, potentially changing their interpretation as delimiters.
section: "7.3"
topics:
    - security
