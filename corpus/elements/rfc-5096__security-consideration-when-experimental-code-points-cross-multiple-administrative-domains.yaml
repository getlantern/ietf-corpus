document: rfc-5096
kind: security-consideration
summary: When experimental code points cross multiple administrative domains, experimenters should assume a risk that the same code points will be used simultaneously by other experiments, potentially causing interference and security threats. Within a single administrative domain, each code point must be used consistently.
section: "5"
