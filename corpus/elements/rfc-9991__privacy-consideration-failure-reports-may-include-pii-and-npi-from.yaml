document: rfc-9991
kind: privacy-consideration
summary: Failure reports may include PII and NPI from failed messages, including full message content and trace header fields, exposing sender/recipient identifiers and potentially sensitive business data such as product launches, termination notices, or calendar data to unintended recipients.
