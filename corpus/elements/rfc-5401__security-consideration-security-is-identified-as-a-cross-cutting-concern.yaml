summary: Security is identified as a cross-cutting concern affecting all building block components including sender transmission, the NACK repair process, and intermediate system assistance. The building block framework explicitly depicts Security as underlying the entire protocol stack. Specific security mechanisms are left to individual protocol instantiations.
