document: rfc-4032
kind: design-rationale
summary: Moving an existing media stream to a new transport address is treated as equivalent to establishing a new stream from the preconditions perspective. This justifies setting all current status values to 'No' and restarting precondition negotiation from scratch, regardless of prior negotiated state.
section: "4.1"
topics:
    - sip
