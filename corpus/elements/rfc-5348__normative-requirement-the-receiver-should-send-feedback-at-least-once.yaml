document: rfc-5348
kind: normative-requirement
summary: The receiver SHOULD send feedback at least once per RTT; if the sender's rate is less than one packet per RTT, feedback SHOULD be sent for every data packet received. Feedback SHOULD also be sent immediately upon detection of a new loss event, without waiting for the timer.
section: "6"
rfc2119_level: SHOULD
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
