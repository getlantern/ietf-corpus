kind: wire-format
summary: attribute-char is defined as any US-ASCII CHAR except SPACE, CTLs, "*", "'", "%", or tspecials. This updated definition reserves those characters to support the extension syntax while remaining otherwise compatible with existing MIME attribute parsing.
