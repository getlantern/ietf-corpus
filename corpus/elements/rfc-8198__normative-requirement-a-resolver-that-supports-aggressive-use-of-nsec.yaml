document: rfc-8198
kind: normative-requirement
summary: A resolver that supports aggressive use of NSEC and NSEC3 SHOULD reduce the TTL of NSEC and NSEC3 records to match the SOA.MINIMUM field in the authority section of a negative response, if SOA.MINIMUM is smaller.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - dns
