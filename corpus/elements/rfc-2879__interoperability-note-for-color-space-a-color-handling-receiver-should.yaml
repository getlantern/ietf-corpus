document: rfc-2879
kind: interoperability-note
summary: For 'color-space', a color-handling receiver should indicate device color space capability in addition to calibrated color spaces. Documents not requiring exact color matching should indicate a device color space (Device-xxx) to enable sender/receiver feature matching when exact color is not needed.
section: A.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
