document: rfc-8048
kind: protocol-element
summary: 'When a SIP user cancels an outbound presence authorization to an XMPP contact (via SUBSCRIBE with Expires: 0), the SIP-to-XMPP gateway sends a PIDF document with basic status ''closed'' and Subscription-State terminated;reason=timeout to the SIP UA, and an XMPP <presence/> stanza of type ''unavailable'' to the XMPP contact.'
section: 5.3.3
topics:
    - sip
    - realtime
