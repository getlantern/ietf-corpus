document: rfc-3971
kind: interoperability-note
summary: SEND nodes interoperate with non-SEND nodes by treating unsigned NDP messages as unsecured and processing them according to Section 8. SEND nodes that do not wish to interoperate with non-SEND nodes MAY simply discard messages lacking the CGA or RSA Signature options.
section: 5.1.2
topics:
    - security
    - ip
