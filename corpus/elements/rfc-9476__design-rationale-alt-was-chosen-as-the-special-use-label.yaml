document: rfc-9476
kind: design-rationale
summary: .alt was chosen as the special-use label instead of 'alt.arpa' so that systems using the name do not risk having a parent label resolved if the name leaks to the Internet — reserving .alt fulfills the use case of names entirely outside the DNS.
section: "1"
