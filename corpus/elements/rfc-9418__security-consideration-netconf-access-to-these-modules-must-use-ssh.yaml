document: rfc-9418
kind: security-consideration
summary: NETCONF access to these modules MUST use SSH (RFC 6242) as the mandatory-to-implement secure transport, and RESTCONF access MUST use TLS 1.3 (RFC 8446). The Network Configuration Access Control Model (NACM, RFC 8341) MUST be used to restrict access to authorized users.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - tls
    - netconf
    - yang
