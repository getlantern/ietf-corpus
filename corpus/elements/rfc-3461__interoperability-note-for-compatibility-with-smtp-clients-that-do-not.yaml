document: rfc-3461
kind: interoperability-note
summary: For compatibility with SMTP clients that do not use the NOTIFY facility, the absence of a NOTIFY parameter in a RCPT command may be interpreted as either NOTIFY=FAILURE or NOTIFY=FAILURE,DELAY. This preserves backward-compatible behavior with legacy SMTP clients.
section: "4.1"
topics:
    - email
