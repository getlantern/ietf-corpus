document: rfc-6762
kind: normative-requirement
summary: The source UDP port in all Multicast DNS responses MUST be 5353. The destination port MUST be 5353 and the destination address MUST be 224.0.0.251 or FF02::FB, except when replying to QU questions, legacy queries, or direct unicast queries.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - udp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
