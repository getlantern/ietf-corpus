document: rfc-5661
kind: security-consideration
summary: The strength of NFSv4.1 security depends on the underlying Kerberos V5 infrastructure. Because Kerberos V5 algorithms are not directly selectable by NFSv4.1 clients or servers, deployers bear due diligence responsibility for ensuring the Kerberos infrastructure meets their security requirements.
section: 2.2.1.1.1.2.1.1
topics:
    - security
    - crypto
