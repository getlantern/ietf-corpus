document: rfc-2912
kind: security-consideration
summary: When 'Content-features:' headers are applied to encrypted message content, the feature expressions may disclose information about content type or application format that encryption was intended to conceal. Care must be taken to ensure the purpose of encryption is not compromised by injudicious use of this header.
section: "5"
topics:
    - security
    - email
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
