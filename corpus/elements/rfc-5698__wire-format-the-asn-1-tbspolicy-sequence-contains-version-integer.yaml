kind: wire-format
summary: 'The ASN.1 TBSPolicy SEQUENCE contains: version (INTEGER, default v1), language (UTF8String, default ''en''), policyName (PolicyName), publisher (Publisher), policyIssueDate (GeneralizedTime), optional nextUpdate (GeneralizedTime), optional usage (UTF8String), and algorithms (SEQUENCE OF Algorithm). The outer SecuritySuitabilityPolicy wraps TBSPolicy in a CMS SignedData ContentInfo.'
