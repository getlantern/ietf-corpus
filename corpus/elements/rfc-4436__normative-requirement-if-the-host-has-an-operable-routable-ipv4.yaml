document: rfc-4436
kind: normative-requirement
summary: If the host has an operable routable IPv4 address and DHCPv4 is enabled, the host SHOULD attempt DHCPv4 in parallel with reachability tests by entering INIT-REBOOT state and sending a DHCPREQUEST to the broadcast address per RFC2131 Section 4.4.2.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
