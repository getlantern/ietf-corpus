document: rfc-9442
kind: normative-requirement
summary: For Rules where the number of fragments in the last window is unknown, an RCS field MUST be used indicating the number of fragments in the last window including the All-1, so the receiver can detect missing fragments before the All-1.
section: 3.5.1.5
rfc2119_level: MUST
