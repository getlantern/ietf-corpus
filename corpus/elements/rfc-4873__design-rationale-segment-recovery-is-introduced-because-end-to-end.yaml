document: rfc-4873
kind: design-rationale
summary: Segment recovery is introduced because end-to-end protection is not always topologically possible, and RFC 4090 fast reroute does not support the full set of recovery types (e.g., facility backup is inapplicable to non-PSC switching technologies). These extensions enable recovery over an arbitrary portion of an LSP, supporting overlapping and nested protection.
section: "1"
topics:
    - routing
    - mpls
