document: rfc-5102
kind: normative-requirement
summary: For flowKeyIndicator, bits corresponding to Information Elements beyond those present in the Data Record MUST have the value 0. If a record has more than 64 IEs, the Template SHOULD be designed so all Flow Keys fall within the first 64 IEs, since flowKeyIndicator only holds 64 bits.
section: 5.2.10
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
