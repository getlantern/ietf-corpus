document: rfc-3729
kind: normative-requirement
summary: AppLocalIndex values must remain constant across agent re-initializations. If an application is deleted and re-created, it must be assigned a new value not used since the last re-initialization, and values must not be re-used until the next agent restart.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
