document: rfc-8669
kind: security-consideration
summary: Information leakage of internal prefixes and topology (including BGP Prefix-SID) outside the SR administrative domain must be prevented using BGP attribute filtering at domain boundaries. These filtering policies are not standardized and are left to operator configuration.
