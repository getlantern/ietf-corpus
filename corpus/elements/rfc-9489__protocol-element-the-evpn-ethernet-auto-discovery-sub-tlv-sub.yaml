document: rfc-9489
kind: protocol-element
summary: The EVPN Ethernet Auto-Discovery sub-TLV (sub-type 44) is based on the EVPN Ethernet A-D route advertisement and applies only to EVPN. Fields include Route Distinguisher (8 octets), Ethernet Tag ID (4 octets), Ethernet Segment Identifier (10 octets), and Must Be Zero (2 octets).
section: "4.3"
topics:
