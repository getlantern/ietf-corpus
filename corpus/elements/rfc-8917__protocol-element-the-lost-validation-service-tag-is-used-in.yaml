document: rfc-8917
kind: protocol-element
summary: The 'LoST-Validation' service tag is used in NAPTR DNS records to identify LoST servers designated for location validation. Clients perform the same U-NAPTR/DDDS discovery procedure as described in RFC 5222, but substituting 'LoST-Validation' for 'LoST' as the service tag; both HTTP and HTTPS URL schemes are used.
section: "3"
topics:
