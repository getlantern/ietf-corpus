document: rfc-1196
kind: protocol-element
summary: 'The Finger query specification defines two query types: {Q1} ::= [{U}] [/W] {C} for local queries and {Q2} ::= [{U}]{H} [/W] {C} for forwarded queries, where {U} is a username, {H} is @hostname (recursive, allowing chained forwarding), and {C} is CRLF.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
