document: rfc-2308
kind: design-rationale
summary: The SOA MINIMUM field is redefined to mean solely the TTL for negative responses. Its two other historical meanings—minimum TTL of all RRs in a zone (deprecated, never used in practice) and default TTL for RRs lacking explicit TTLs (now handled by $TTL)—are retired.
