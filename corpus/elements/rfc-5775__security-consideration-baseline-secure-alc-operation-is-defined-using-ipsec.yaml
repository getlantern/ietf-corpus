document: rfc-5775
kind: security-consideration
summary: Baseline secure ALC operation is defined using IPsec in transport mode with ESP providing data origination authentication and optionally confidentiality. Each node is configured with a transport mode IPsec SA; the encryption key SHALL be preplaced at sender and receiver(s), and automated key management is RECOMMENDED with rekey required before SA sequence space expiration.
section: "5.1"
topics:
    - security
    - ipsec
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
