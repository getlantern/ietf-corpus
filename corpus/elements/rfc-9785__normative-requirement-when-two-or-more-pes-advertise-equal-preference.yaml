document: rfc-9785
kind: normative-requirement
summary: When two or more PEs advertise equal Preference values, an implementation MUST first select the PE advertising the Don't Preempt Capability (DP=1) as the Designated Forwarder, and then use the lowest originating router IP address as a secondary tiebreaker.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
