document: rfc-792
kind: normative-requirement
summary: When a datagram must be fragmented to be forwarded by a gateway but the Don't Fragment (DF) flag is set, the gateway must discard the datagram and may return a Destination Unreachable message (code 4) to the source.
section: Destination Unreachable Message
rfc2119_level: MUST
topics:
    - ip
