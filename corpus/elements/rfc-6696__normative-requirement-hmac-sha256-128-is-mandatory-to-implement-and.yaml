document: rfc-6696
kind: normative-requirement
summary: 'HMAC-SHA256-128 is mandatory to implement and SHOULD be enabled in the default configuration. The defined cryptosuite values are: 0 (RESERVED), 1 (HMAC-SHA256-64), 2 (HMAC-SHA256-128), 3 (HMAC-SHA256-256).'
section: 5.3.2
rfc2119_level: SHOULD
topics:
    - security
    - crypto
