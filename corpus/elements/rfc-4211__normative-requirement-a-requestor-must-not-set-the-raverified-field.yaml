document: rfc-4211
kind: normative-requirement
summary: A requestor MUST NOT set the raVerified field in ProofOfPossession, and an RA/CA MUST NOT accept a ProofOfPossession where the requestor sets this field. CRPs MUST provide a method for the RA to sign the ProofOfPossession when using raVerified.
section: "4"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
