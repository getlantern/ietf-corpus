document: rfc-8968
kind: design-rationale
summary: To reduce DTLS handshake overhead — particularly large ServerHello certificates — Babel peers can use raw public keys (RFC 7250), the Cached Information Extension (RFC 7924), or TLS False Start (RFC 7918) to reduce round-trips and bytes on the wire.
