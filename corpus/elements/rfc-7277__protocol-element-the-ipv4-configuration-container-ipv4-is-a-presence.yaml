document: rfc-7277
kind: protocol-element
summary: The IPv4 configuration container ('ipv4') is a presence container that enables IPv4 on an interface unless the 'enabled' leaf is set to false. It includes 'enabled' (boolean, default true), 'forwarding' (boolean, default false), 'mtu' (uint16, range 68..max), a list of addresses keyed by IP, and a neighbor list for static ARP entries.
