summary: 'G.726 4-bit code words are packed into octets in little endian order: the first code word (A) occupies the four least significant bits of an octet (A0 in bit 0), and the second code word (B) occupies the four most significant bits (B3 in bit 7). Subsequent pairs follow the same pattern in successive octets.'
