document: rfc-8287
kind: interoperability-note
summary: In networks where SR-capable and non-SR-capable nodes coexist, the responder may set FEC-return-code to 4 ('Replying router has no mapping for the FEC at stack-depth') because it has no FEC mapping for SR sub-TLVs, analogous to existing LDP/RSVP interoperation scenarios.
