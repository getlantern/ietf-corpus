document: rfc-6249
kind: protocol-element
summary: Preferred mirror servers are HTTP mirrors that MUST share the same ETag policy or MUST provide Instance Digests using the same algorithm as the Metalink server; they enable early file mismatch detection before data transfer. Normal mirrors (including FTP) do not provide these guarantees.
section: "3.3"
topics:
    - http
