document: rfc-6638
kind: normative-requirement
summary: 'When an Organizer modifies a scheduling object resource, the server MUST compare original and modified ATTENDEE properties per-instance and dispatch iTIP messages according to a defined transition table: moving to SERVER triggers REQUEST or ADD; removing a SERVER attendee triggers CANCEL; switching to CLIENT or NONE also triggers CANCEL.'
section: 3.2.1.2
rfc2119_level: MUST
topics:
    - http
