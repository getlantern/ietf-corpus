document: rfc-7199
kind: design-rationale
summary: Once a client indicates it understands policy URIs (via 'requestPolicyUri'), the server may adopt a more restrictive default policy (even empty/default-deny), since the client can set a more permissive policy if desired. This shifts the burden of openness to the informed client.
section: "3.3"
topics:
    - privacy
