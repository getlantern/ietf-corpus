document: rfc-1808
kind: security-consideration
summary: There are no security considerations specific to the use or parsing of relative URLs themselves. However, once a relative URL has been resolved to its absolute form, the same security considerations apply as those described in RFC 1738 for absolute URLs.
section: "6"
topics:
    - security
    - http
