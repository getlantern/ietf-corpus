document: rfc-7490
kind: normative-requirement
summary: The PLR MUST NOT use a repair tunnel endpoint with the IS-IS overload bit set or where all outgoing interfaces have cost set to MaxLinkMetric for OSPF, as such nodes signal a desire to not carry transit traffic.
