document: rfc-8255
kind: normative-requirement
summary: The message SHOULD contain a multilingual preface as the first part; this preface MUST NOT be marked with a Content-Language field, SHOULD have Content-Type 'text/plain', and SHOULD briefly explain in all provided languages that multiple translations follow.
