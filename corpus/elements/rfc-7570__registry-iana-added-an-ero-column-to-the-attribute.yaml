document: rfc-7570
kind: registry
summary: IANA added an 'ERO' column to the 'Attribute Flags' registry in the RSVP-TE Parameters registry, indicating which flags are permitted in an Attribute Flags TLV carried in the ERO Hop Attributes subobject. All existing flags (bits 0–12) are marked 'No' for ERO use; new allocations SHALL indicate the ERO column value.
section: "4.3"
topics:
