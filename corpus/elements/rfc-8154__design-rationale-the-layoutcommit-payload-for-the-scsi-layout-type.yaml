document: rfc-8154
kind: design-rationale
summary: The LAYOUTCOMMIT payload for the SCSI layout type uses a commit list of byte ranges (pnfs_scsi_layoutupdate4) rather than sending full extent data. This design reduces the size of the LAYOUTCOMMIT payload compared to the block layout type in RFC 5663, optimizing the I/O path.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
