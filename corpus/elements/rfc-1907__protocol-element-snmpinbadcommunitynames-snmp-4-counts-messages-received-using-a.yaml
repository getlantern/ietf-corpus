document: rfc-1907
kind: protocol-element
summary: snmpInBadCommunityNames (snmp 4) counts messages received using a community name not known to the entity; snmpInBadCommunityUses (snmp 5) counts messages representing an operation not allowed for the named community. Both are read-only Counter32 objects in the snmpCommunityGroup.
section: "2.2"
topics:
