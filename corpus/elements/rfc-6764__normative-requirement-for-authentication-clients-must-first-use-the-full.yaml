document: rfc-6764
kind: normative-requirement
summary: 'For authentication, clients MUST first use the full ''mailbox'' portion of a mailto: calendar user address, and if that fails, SHOULD fall back to just the ''local-part''. If these fail, the client SHOULD prompt the user for a valid identifier.'
section: "6"
rfc2119_level: MUST
topics:
    - http
    - security
