document: rfc-9198
kind: protocol-element
summary: Node Identity is the unique globally routable IP address a Node uses when communicating with other Nodes under normal or error conditions. The identity and its DNS reverse resolution determines whether parallel-link interfaces map to a single Node or appear as distinct Nodes.
