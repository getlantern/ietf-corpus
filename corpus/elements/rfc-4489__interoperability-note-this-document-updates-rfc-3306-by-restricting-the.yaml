document: rfc-4489
kind: interoperability-note
summary: This document updates RFC 3306 by restricting the usage of the scop, plen, and network prefix fields; the plen value of 255 and scop <= 2 signal this new link-local format, distinguishing it from standard unicast-prefix-based multicast addresses.
