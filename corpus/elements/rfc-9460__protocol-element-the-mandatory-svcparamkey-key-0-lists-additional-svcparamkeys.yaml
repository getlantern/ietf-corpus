document: rfc-9460
kind: protocol-element
summary: 'The ''mandatory'' SvcParamKey (key 0) lists additional SvcParamKeys that must be understood for the RR to be usable; a client considers an RR ''compatible'' only if it recognizes all mandatory keys. ''mandatory'' is itself always automatically mandatory and MUST NOT appear in its own value list. Wire format: numeric key values in network byte order in strictly increasing order.'
