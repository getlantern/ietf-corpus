document: rfc-5230
kind: security-consideration
summary: Implementations must correctly enforce that replies are never sent to messages not addressed directly to the recipient user, and must never send replies more frequently than the :days argument specifies (unless the script changes). Failure to enforce these rules risks creating mail loops.
section: "8"
topics:
    - email
    - security
