document: rfc-9849
kind: security-consideration
summary: ECH configurations delivered via unauthenticated DNS can be stripped or replaced by an attacker who controls DNS, but this does not worsen the situation significantly since such an attacker can already reroute connections. DNSSEC and encrypted DNS transports (DoH, DoT, DoQ) are recommended mitigations.
section: "10.2"
topics:
    - tls
    - security
    - dns
    - privacy
