document: rfc-1088
kind: normative-requirement
summary: When IP support for a NetBIOS host is discontinued, a cancel command should be submitted for every pending receive datagram request, and delete name requests should be submitted for both IP.XX.XX.XX.XX and IP.FF.FF.FF.FF.
section: Implementation
rfc2119_level: SHOULD
topics:
