document: rfc-2253
kind: wire-format
summary: An AttributeValue with no defined string representation is encoded as an octothorpe ('#' ASCII 35) followed by the hexadecimal representation of each byte of the BER encoding of the X.500 AttributeValue. This form SHOULD be used when the AttributeType is in dotted-decimal form.
section: "2.4"
rfc2119_level: SHOULD
topics:
