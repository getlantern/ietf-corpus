document: rfc-6570
kind: protocol-element
summary: Form-style query continuation ("&" operator) is used when the template already contains a literal query component with fixed parameters; it appends "&name=value" pairs for each defined variable. This contrasts with "?" which begins a new query component.
section: 3.2.9
topics:
    - http
