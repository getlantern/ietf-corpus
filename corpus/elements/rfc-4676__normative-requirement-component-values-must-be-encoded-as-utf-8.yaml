document: rfc-4676
kind: normative-requirement
summary: Component values MUST be encoded as UTF-8. They SHOULD be written in mixed case following customary spelling. The script indication (CAtype 128) MUST be written in mixed case with the first letter capitalized.
section: "3.4"
rfc2119_level: MUST
