document: rfc-6779
kind: protocol-element
summary: nhdpInterfaceTable configures NHDP per interface (indexed by nhdpIfIndex). Per-row parameters include nhdpHelloInterval (default 2000 ms), nhdpHelloMinInterval (default 500 ms), nhdpRefreshInterval (default 2000 ms), nhdpLHoldTime (default 6000 ms), nhdpHHoldTime (default 6000 ms), link quality thresholds, and jitter maxima.
