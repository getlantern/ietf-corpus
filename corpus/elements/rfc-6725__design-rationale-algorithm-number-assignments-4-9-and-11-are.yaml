document: rfc-6725
kind: design-rationale
summary: Algorithm number assignments 4, 9, and 11 are changed to 'Reserved' because they were placeholders for algorithms that were never fully specified for use with DNSSEC. Reserving them prevents potential conflicts with older implementations that may still reference these codes.
section: "2.1"
topics:
