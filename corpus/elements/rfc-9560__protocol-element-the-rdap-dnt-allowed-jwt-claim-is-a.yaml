document: rfc-9560
kind: protocol-element
summary: The 'rdap_dnt_allowed' JWT claim is a JSON boolean that, when true, indicates the end user is authorized to perform queries without having their identity associated with those queries logged, tracked, or recorded by the server. Servers MUST NOT log the association when this claim is present, true, the user is authenticated, and accepting the claim complies with local regulations.
section: 3.1.5.2
topics:
    - oauth
    - jose
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
