document: rfc-4998
kind: security-consideration
summary: Cryptographic algorithms and parameters used within Archive Timestamps must be secure at the time of generation for both hash and public-key algorithms. Publications such as NIST 800-57 and ETSI TS 102176-1 must be consulted by verifying components; a generic automated interpretation mechanism is desirable but out of scope.
