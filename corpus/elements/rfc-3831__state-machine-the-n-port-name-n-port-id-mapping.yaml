kind: state-machine
summary: The <N_Port_Name, N_Port_ID> mapping must be validated after FC link interruptions. After LIP in loop topology or NOS/OLS in point-to-point, address validation via ADISC (private loop) or FLOGI (fabric/public loop) is required; if addresses changed, all active Exchanges must be torn down and ports logged out.
