document: rfc-8082
kind: interoperability-note
summary: Congestion control requirements from RFC 5104 Sections 3.5.1 and 5 apply to the forward RTP streams both in isolation and combined when a decoder refresh point is sent in response to a FIR on a layered bitstream. The multi-stream nature of layered transport does not relax these requirements.
section: "4"
topics:
