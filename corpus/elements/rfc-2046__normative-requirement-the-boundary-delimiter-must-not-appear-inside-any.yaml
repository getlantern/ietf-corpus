document: rfc-2046
kind: normative-requirement
summary: The boundary delimiter MUST NOT appear inside any of the encapsulated parts, on a line by itself or as the prefix of any line. The composing agent must choose a unique boundary parameter value that does not contain the boundary of any enclosing multipart as a prefix.
section: "5.1"
rfc2119_level: MUST NOT
topics:
