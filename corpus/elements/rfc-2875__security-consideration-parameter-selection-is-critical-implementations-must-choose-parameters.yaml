document: rfc-2875
kind: security-consideration
summary: Parameter selection is critical. Implementations must choose parameters appropriate for the intended community and must avoid small-subgroup parameters. FIPS-186 Appendices 2 and 3 contain guidance; adding a q parameter (as required by this document for the DL algorithm) is accepted best practice for detecting small-subgroup attacks.
