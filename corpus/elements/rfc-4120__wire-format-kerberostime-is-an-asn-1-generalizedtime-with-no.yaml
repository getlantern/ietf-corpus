document: rfc-4120
kind: wire-format
summary: KerberosTime is an ASN.1 GeneralizedTime with no fractional seconds and always UTC (trailing 'Z'), e.g., '19940610060317Z'. KerberosString is a constrained IA5String limiting realm and principal names to ASCII to avoid internationalization ambiguities.
section: 5.2.1
extracted_by: claude-sonnet-4-6
