document: rfc-4944
kind: registry
summary: 'This document creates an IANA registry for the LoWPAN Dispatch type field (8-bit). Initial values defined are: NALP (00xxxxxx), IPv6 (01 000001), LOWPAN_HC1 (01 000010), LOWPAN_BC0 (01 010000), ESC (01 111111), MESH (10 xxxxxx), FRAG1 (11 000xxx), FRAGN (11 100xxx). Future assignments require ''Specification Required'' per RFC 2434.'
section: "12"
topics:
