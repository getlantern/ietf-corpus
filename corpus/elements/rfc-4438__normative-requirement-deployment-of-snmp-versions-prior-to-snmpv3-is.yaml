document: rfc-4438
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Implementors are RECOMMENDED to use SNMPv3 with full cryptographic mechanisms (authentication and privacy) to protect access to this MIB.
