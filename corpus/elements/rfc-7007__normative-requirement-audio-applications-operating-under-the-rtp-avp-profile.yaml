document: rfc-7007
kind: normative-requirement
summary: Audio applications operating under the RTP/AVP profile SHOULD, at a minimum, be able to send and/or receive payload type 0 (PCMU). This removes the previous requirement to also support DVI4 (payload type 5).
section: "3.1"
rfc2119_level: SHOULD
topics:
