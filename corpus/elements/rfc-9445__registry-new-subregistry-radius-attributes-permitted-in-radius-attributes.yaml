summary: New subregistry 'RADIUS Attributes Permitted in RADIUS Attributes DHCP Suboption' created in the BOOTP/DHCP Parameters registry with Expert Review policy. Initial contents include attributes from RFC 2865/2869/3162 (User-Name, Service-Type, Vendor-Specific, Session-Timeout, Framed-Pool, Framed-IPv6-Pool) plus the new 245.4 DHCPv4-Options attribute.
