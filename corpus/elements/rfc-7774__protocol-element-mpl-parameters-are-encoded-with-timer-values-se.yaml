document: rfc-7774
kind: protocol-element
summary: MPL parameters are encoded with timer values (SE_LIFETIME, DM_IMIN, C_IMIN) expressed as multiples of TUNIT milliseconds, while maximum interval sizes (DM_IMAX, C_IMAX) follow RFC 6206 Trickle semantics as a count of doublings of the corresponding minimum interval.
