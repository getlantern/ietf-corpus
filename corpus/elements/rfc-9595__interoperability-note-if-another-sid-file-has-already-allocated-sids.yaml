document: rfc-9595
kind: interoperability-note
summary: If another '.sid' file has already allocated SIDs for a YANG module (e.g., for older or newer versions), YANG items MUST be assigned the same SIDs as in the other '.sid' file. All SIDs from an older version of a '.sid' file must still be present in the current version.
section: 6.5.2
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
