document: rfc-4815
kind: normative-requirement
summary: When multiple non-identical IP extension headers of the same type appear in a header chain, each MUST be assigned its own list compression index. When a shared index appears multiple times and its value is updated, the compressor MUST transmit the updated value for every occurrence of that index.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
