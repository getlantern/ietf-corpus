document: rfc-5155
kind: normative-requirement
summary: It is strongly RECOMMENDED that Opt-Out be used sparingly. Zone signing tools SHOULD NOT default to using Opt-Out, because Opt-Out allows a malicious entity to insert or delete unsigned delegation RRs undetectably.
section: "12.2"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
