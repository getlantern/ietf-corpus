document: rfc-907
kind: security-consideration
summary: Group membership operations (Join and Delete) are authenticated using a 48-bit key returned at group creation time. This key must be supplied by any host wishing to join or delete the group, minimizing the probability that unwanted hosts will deliberately or inadvertently become members. The key distribution mechanism is outside the scope of HAP.
section: "6.2"
topics:
    - security
    - multicast
