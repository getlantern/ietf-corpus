document: rfc-4396
kind: protocol-element
summary: The SLEN field (16 bits) in TYPE 2 units specifies the total byte size of the original text sample (text string plus modifiers, excluding BOM and text string byte count). Receivers MAY use SLEN to pre-allocate buffer space for remaining fragments.
