document: rfc-2857
kind: security-consideration
summary: The security of HMAC-RIPEMD-160-96 is based on the strength of HMAC and, to a lesser degree, RIPEMD-160. At the time of writing there are no known practical cryptographic attacks against RIPEMD-160.
