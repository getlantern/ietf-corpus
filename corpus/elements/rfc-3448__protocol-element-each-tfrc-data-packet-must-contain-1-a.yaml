document: rfc-3448
kind: protocol-element
summary: 'Each TFRC data packet MUST contain: (1) a sequence number incremented by one per packet with sufficient width to avoid wrap-around collisions in recent history; (2) a millisecond-resolution timestamp ts_i used by the receiver to group losses into events and echoed for RTT estimation; (3) the sender''s current RTT estimate R_i for use by the receiver in loss event grouping.'
section: 3.2.1
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
