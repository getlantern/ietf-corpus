document: rfc-9011
kind: normative-requirement
summary: SCHC_ACK_REQ_DN_OPPORTUNITY MUST be greater than 1. Its recommended value is 2. This allows higher-priority downlinks to be delivered before the SCHC ACK REQ message.
section: 5.6.3.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
