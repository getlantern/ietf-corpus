document: rfc-8260
kind: normative-requirement
summary: If I-DATA support has been negotiated and a DATA chunk is received (or vice versa), the receiver MUST abort the association by sending an ABORT chunk; the ABORT chunk MAY include the 'Protocol Violation' error cause.
section: 2.2.3
rfc2119_level: MUST
