document: rfc-4077
kind: normative-requirement
summary: When a received SigComp message causes a decompression failure, the recipient must form and send a SigComp NACK message containing the SHA-1 hash of the failed message, the reason code, and any applicable error details.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
