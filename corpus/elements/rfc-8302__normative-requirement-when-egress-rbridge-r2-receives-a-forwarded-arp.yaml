document: rfc-8302
kind: normative-requirement
summary: When egress RBridge R2 receives a forwarded ARP/ND query and the target responds, R2 SHOULD initiate a link state update via IA APPsub-TLV in ESADI (or per RFC 8171 if using Push Directory) to inform all other RBridges of the target's location, Layer 3 address, and Layer 2 address.
section: "4.5"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
