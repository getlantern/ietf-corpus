document: rfc-8344
kind: security-consideration
summary: 'Setting ''ipv4/mtu'' or ''ipv6/mtu'' to very small values (while still within the allowed range: ≥68 for IPv4, ≥1280 for IPv6) can be used to slow down interfaces, constituting a potential denial-of-service vector.'
