document: rfc-3840
kind: design-rationale
summary: Capability and characteristic information about a UA is carried as parameters of the Contact header field rather than as separate header fields, because existing SIP header fields (Allow, Accept, Accept-Language, Supported) convey only a small part of the needed information and do not provide a general framework for expression of capabilities.
section: "1"
topics:
