document: rfc-9895
kind: normative-requirement
summary: Modems MAY support per-VLAN PCP-to-credit-window mapping. VID 0x0000 indicates the VID is ignored, VID 0xFFFF is reserved, and VIDs 0x0001 through 0xFFFE may be used in traffic classification.
