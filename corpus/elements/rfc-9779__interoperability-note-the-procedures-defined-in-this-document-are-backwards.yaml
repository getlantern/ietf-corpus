document: rfc-9779
kind: interoperability-note
summary: The procedures defined in this document are backwards compatible with RFC 6374 at both querier and responder. If the responder does not support the new Mandatory TLV Types (Return Path TLV=5 or Block Number TLV=6), it will return Error 0x17 (Unsupported Mandatory TLV Object) per RFC 6374.
section: "9"
topics:
