document: rfc-2575
kind: protocol-element
summary: vacmViewSpinLock is an advisory TestAndIncr lock that cooperating SNMP Command Generator applications should use when creating or modifying MIB views to avoid concurrent-write collisions. Because it is advisory, its use is not enforced by the engine.
