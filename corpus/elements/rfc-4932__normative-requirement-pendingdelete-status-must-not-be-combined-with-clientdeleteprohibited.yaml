document: rfc-4932
kind: normative-requirement
summary: '''pendingDelete'' status MUST NOT be combined with ''clientDeleteProhibited'' or ''serverDeleteProhibited''. ''pendingUpdate'' MUST NOT be combined with ''clientUpdateProhibited'' or ''serverUpdateProhibited''. The four pending status values MUST NOT be combined with each other.'
section: "2.3"
rfc2119_level: MUST NOT
