document: rfc-6638
kind: normative-requirement
summary: Servers MUST automatically process incoming scheduling messages using iTIP (RFC 5546) rules, creating or updating scheduling object resources on the Inbox owner's calendars. The scheduling message is additionally retained in the Inbox collection so the client can acknowledge it.
section: "4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
