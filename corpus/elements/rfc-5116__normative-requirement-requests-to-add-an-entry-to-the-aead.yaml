document: rfc-5116
kind: normative-requirement
summary: Requests to add an entry to the AEAD Registry MUST include the name and reference. Submitters SHOULD have their requests reviewed by the IRTF Crypto Forum Research Group (CFRG). Number assignments SHOULD use the smallest available positive number.
section: "6"
rfc2119_level: MUST
topics:
