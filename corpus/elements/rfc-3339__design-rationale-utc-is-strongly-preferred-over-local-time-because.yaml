document: rfc-3339
kind: design-rationale
summary: UTC is strongly preferred over local time because daylight saving rules are convoluted and can change unpredictably due to local law, making true interoperability dependent on UTC; this specification explicitly does not cater to local time zone rules.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
