document: rfc-8760
kind: normative-requirement
summary: In SIP, a UAS MUST check if the Request-URI in the Authorization/Proxy-Authorization header field value corresponds to a user for whom the UAS is willing to accept forwarded or direct requests; however, it MAY still accept it if the two fields are not equivalent.
section: "2.6"
rfc2119_level: MUST
topics:
    - sip
    - security
