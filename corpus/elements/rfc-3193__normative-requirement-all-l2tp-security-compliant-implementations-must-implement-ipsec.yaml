document: rfc-3193
kind: normative-requirement
summary: All L2TP security compliant implementations MUST implement IPsec ESP for securing both L2TP control and data packets. Transport mode MUST be supported; tunnel mode MAY be supported.
section: "2.1"
rfc2119_level: MUST
topics:
