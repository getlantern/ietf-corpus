document: rfc-4740
kind: normative-requirement
summary: Implementations MUST support both Diameter-session-based and session-less SIP soft-state termination. With NO_STATE_MAINTAINED, client-initiated termination uses SAR with a deregistration assignment type; server-initiated uses RTR. With STATE_MAINTAINED, STR/ASR from RFC 3588 are used instead.
section: "6.7"
rfc2119_level: MUST
topics:
    - sip
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
