document: rfc-9359
kind: protocol-element
summary: The IOAM Capabilities Response Container is carried in echo replies from IOAM transit or decapsulating nodes. It contains a container header (which MUST fall on a 4-octet boundary) and a list of one or more IOAM Capabilities Objects representing the enabled IOAM capabilities of the sender.
section: "3.2"
topics:
    - measurement
