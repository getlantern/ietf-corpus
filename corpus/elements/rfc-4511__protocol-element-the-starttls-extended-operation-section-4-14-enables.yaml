document: rfc-4511
kind: protocol-element
summary: The StartTLS Extended operation (Section 4.14) enables installation of a TLS layer on an existing LDAP connection. The StartTLS request uses requestName 1.3.6.1.4.1.1466.20037. After a successful response, all subsequent LDAP messages are protected by TLS until the TLS layer is removed.
section: "4.14"
topics:
    - ldap
    - tls
    - security
