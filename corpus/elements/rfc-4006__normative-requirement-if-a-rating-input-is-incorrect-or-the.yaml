document: rfc-4006
kind: normative-requirement
summary: If a rating input is incorrect or the server does not support the requested service context, the CCA MUST contain result code DIAMETER_RATING_FAILED and MUST include Failed-AVP AVPs identifying the missing or unsupported AVPs. A client receiving DIAMETER_RATING_FAILED MUST NOT send similar requests in the future.
section: 4.1.3
rfc2119_level: MUST NOT
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
