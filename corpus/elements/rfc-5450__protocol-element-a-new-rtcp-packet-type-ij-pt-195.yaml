document: rfc-5450
kind: protocol-element
summary: A new RTCP packet type 'IJ' (PT=195) is defined to report inter-arrival jitter excluding source-introduced jitter. It contains one 32-bit inter-arrival jitter value per reception report entry, calculated using effective transmission times T=S+O rather than raw RTP timestamps.
