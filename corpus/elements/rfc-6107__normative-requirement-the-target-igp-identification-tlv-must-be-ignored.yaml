document: rfc-6107
kind: normative-requirement
summary: The Target IGP Identification TLV MUST be ignored if found in an LSP_TUNNEL_INTERFACE_ID object in a Resv message, and SHOULD NOT be included there. Similarly it SHOULD NOT be present and MUST be ignored when the P-flag is set indicating a private link.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
