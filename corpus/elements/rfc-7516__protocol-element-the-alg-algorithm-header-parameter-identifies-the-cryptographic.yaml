document: rfc-7516
kind: protocol-element
summary: The 'alg' (Algorithm) Header Parameter identifies the cryptographic algorithm used to encrypt or determine the value of the Content Encryption Key (CEK). If the 'alg' value does not represent a supported algorithm or the recipient lacks the appropriate key, the encrypted content is not usable.
