document: rfc-7433
kind: security-consideration
summary: 'UUI data can carry sensitive information requiring confidentiality or integrity protection. Three security models are described: (1) end-to-end protection above the SIP layer by the application, (2) SIP-layer protection via S/MIME or IPsec (limited deployment), and (3) trust-domain/perimeter security with hop-by-hop TLS as used in PSTN/ISDN environments.'
section: "7"
