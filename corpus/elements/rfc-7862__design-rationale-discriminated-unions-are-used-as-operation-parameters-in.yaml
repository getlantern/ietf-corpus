document: rfc-7862
kind: design-rationale
summary: Discriminated unions are used as operation parameters in NFSv4.2 so that new variants can be added in future minor versions without introducing entirely new operations (e.g., READ2). NFS4ERR_UNION_NOTSUPP enables graceful negotiation when a specific arm is unsupported.
section: "1.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
