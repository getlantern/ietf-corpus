document: rfc-3320
kind: normative-requirement
summary: The compressor MUST ensure that the message can be decompressed using the resources available at the remote endpoint. For message-based transport the compressor MUST map each application message to exactly one SigComp message.
section: "5"
rfc2119_level: MUST
