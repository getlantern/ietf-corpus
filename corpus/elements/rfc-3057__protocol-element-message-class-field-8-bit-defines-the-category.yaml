summary: 'Message Class field (8-bit) defines the category of IUA message: 0=Management (MGMT), 3=ASP State Maintenance (ASPSM), 4=ASP Traffic Maintenance (ASPTM), 5=Q.921/Q.931 Boundary Primitives Transport (QPTM). Classes 9–127 are reserved by IETF; 128–255 for IETF-defined extensions.'
