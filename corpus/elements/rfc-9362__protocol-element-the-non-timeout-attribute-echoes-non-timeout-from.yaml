document: rfc-9362
kind: protocol-element
summary: The 'non-timeout' attribute echoes NON_TIMEOUT from RFC 9177, representing the maximum period of delay between sending sets of MAX_PAYLOADS payloads for the same body. It is optional, expressed in seconds as decimal64 with default 2.00 s, and maps to CBOR key 32778.
section: "3"
