document: rfc-2265
kind: normative-requirement
summary: When multiple vacmViewTreeFamilyTable entries match an OID, the entry whose vacmViewTreeFamilySubtree has the most sub-identifiers determines inclusion or exclusion. Ties are broken by the lexicographically greatest value of vacmViewTreeFamilyType.
section: "4"
rfc2119_level: MUST
