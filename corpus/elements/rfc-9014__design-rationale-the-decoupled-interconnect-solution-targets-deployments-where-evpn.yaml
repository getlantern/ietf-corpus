document: rfc-9014
kind: design-rationale
summary: The decoupled interconnect solution targets deployments where EVPN-Overlay and WAN are operated by different entities, providing a clean demarcation for QoS/security enforcement. The integrated solution is used when both are under the same administrative entity, combining GW and WAN PE in the same router to save CAPEX/OPEX.
