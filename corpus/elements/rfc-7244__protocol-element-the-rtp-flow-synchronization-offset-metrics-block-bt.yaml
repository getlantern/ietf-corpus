document: rfc-7244
kind: protocol-element
summary: The RTP Flow Synchronization Offset Metrics Block (BT=28) reports the relative average time difference between two arbitrary RTP streams with the same CNAME that need to be synchronized. It is sent by RTP receivers and references a Measurement Information block (RFC 6776) for the measurement period.
