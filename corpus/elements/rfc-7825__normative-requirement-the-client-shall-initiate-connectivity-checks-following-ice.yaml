document: rfc-7825
kind: normative-requirement
summary: The client SHALL initiate connectivity checks following ICE §6 after receiving the SETUP response. Aggressive nomination SHOULD be used during initial SETUP, since media delivery only starts on PLAY, avoiding mid-path-change risks present in SIP/SDP.
section: "6.7"
rfc2119_level: SHALL
topics:
