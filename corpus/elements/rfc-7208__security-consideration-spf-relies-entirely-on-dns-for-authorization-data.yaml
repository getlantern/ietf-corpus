document: rfc-7208
kind: security-consideration
summary: SPF relies entirely on DNS for authorization data; an attacker who can spoof DNS responses or IP source addresses can defeat SPF checks. Results should be treated as advisory rather than as definitive proof of sender identity.
section: "11.3"
topics:
    - email
    - security
    - dns
