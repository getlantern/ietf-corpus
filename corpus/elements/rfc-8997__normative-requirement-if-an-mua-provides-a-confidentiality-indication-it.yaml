document: rfc-8997
kind: normative-requirement
summary: If an MUA provides a confidentiality indication, it MUST NOT indicate confidentiality for any connection that does not at least use TLS 1.2 with certificate verification and meet the minimum confidentiality requirements associated with that account.
section: "3"
rfc2119_level: MUST NOT
topics:
