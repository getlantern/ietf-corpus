document: rfc-4733
kind: wire-format
summary: 'The tone payload begins with a 32-bit header: modulation (9-bit unsigned, Hz), T bit (divide modulation by 3), volume (6-bit dBm0 magnitude), and duration (16-bit, timestamp units). This is followed by pairs of 4-bit reserved fields and 12-bit frequency values (Hz), one pair per frequency component.'
