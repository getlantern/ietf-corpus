document: rfc-1566
kind: protocol-element
summary: mtaGroupMailProtocol (mtaGroupEntry 24) is an OBJECT IDENTIFIER that identifies the protocol used by a group. For OSI it is the Application Context; for Internet protocols IANA maintains a registry; if unlisted, {applTCPProtoID port} or {applUDPProtoID port} forms are used.
