document: rfc-3807
kind: protocol-element
summary: Link Status Messages (Start Reporting msg 11, Stop Reporting msg 12, Indication msg 13) are used between V5 System Management on the MGC and the L1 FSM on the SG to track E1 link operational status. They apply to all links on a V5 interface regardless of whether the link carries C-channels.
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
