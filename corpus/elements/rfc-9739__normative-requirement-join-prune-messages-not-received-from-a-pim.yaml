document: rfc-9739
kind: normative-requirement
summary: Join/Prune messages not received from a PIM neighbor MUST be dropped unless PLI is enabled on the interface. This is the mechanism by which PLI operation is gated to explicitly configured interfaces.
section: "3.3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
