document: rfc-6570
kind: normative-requirement
summary: When non-ASCII data is pct-encoded for use in a URI reference, a template processor MUST first encode the string as UTF-8 and then pct-encode any octets not allowed in a URI reference.
section: "1.6"
rfc2119_level: MUST
topics:
