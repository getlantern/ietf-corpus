document: rfc-9824
kind: protocol-element
summary: For wildcard matches, the server provides a dynamically signed response claiming the QNAME exists explicitly, with the RRSIG label count equal to the number of labels in the query name minus the root. This eliminates the need for an NSEC record showing no closer match exists.
section: "3.3"
topics:
    - dns
