document: rfc-9303
kind: design-rationale
summary: LISP-SEC uses two independent pre-shared secrets—one between ITR/Map-Resolver and one between Map-Server/ETR—so that a malicious ETR that knows only the MS/ETR secret cannot forge or manipulate the EID-AD computed by the Map-Server using the ITR-OTK, thereby preventing overclaiming attacks.
section: "6.5"
topics:
    - security
    - crypto
    - routing
