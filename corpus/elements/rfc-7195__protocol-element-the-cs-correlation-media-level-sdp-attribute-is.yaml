kind: protocol-element
summary: The 'cs-correlation' media-level SDP attribute is defined to carry one or more correlation mechanism subfields ('callerid', 'uuie', 'dtmf', 'external') enabling an endpoint to correlate an incoming PSTN circuit-switched bearer with an SDP-negotiated session.
