document: rfc-3055
kind: security-consideration
summary: SNMPv1 provides no access control beyond community strings; it is the operator's responsibility to configure the SNMP entity to grant GET/SET access only to principals with legitimate rights. SNMPv3 with USM and VACM is the recommended mitigation.
section: "7"
topics:
    - snmp
    - security
