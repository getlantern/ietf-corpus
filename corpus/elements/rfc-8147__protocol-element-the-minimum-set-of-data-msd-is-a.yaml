document: rfc-8147
kind: protocol-element
summary: The Minimum Set of Data (MSD) is a standardized set of vehicle-related data (VIN, vehicle type, propulsion type, current and optionally previous location, number of occupants) specified by CEN in EN 15722. It is carried using the MIME type application/EmergencyCallData.eCall.MSD.
