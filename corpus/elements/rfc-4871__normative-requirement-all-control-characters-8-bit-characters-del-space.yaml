document: rfc-4871
kind: normative-requirement
summary: All control characters, 8-bit characters, DEL, SPACE, and semicolon MUST be encoded in DKIM-Quoted-Printable as '=' followed by two uppercase hexadecimal digits. All whitespace including CR and LF MUST be encoded.
section: "2.6"
rfc2119_level: MUST
