document: rfc-5539
kind: wire-format
summary: The delimiter sequence ']]>]]>' (6 ASCII characters) MUST be appended after each XML document exchanged over NETCONF/TLS. This sequence was inherited from RFC 4742 (NETCONF over SSH) to frame message boundaries within the TLS stream.
section: "2.1"
topics:
    - netconf
