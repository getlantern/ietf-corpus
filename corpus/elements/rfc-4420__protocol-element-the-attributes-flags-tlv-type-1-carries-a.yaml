document: rfc-4420
kind: protocol-element
summary: The Attributes Flags TLV (Type=1) carries a variable-length array of 32-bit flag words, numbered from the most significant bit as bit zero. The Length field is always a multiple of 4 bytes. It may appear in both LSP_ATTRIBUTES and LSP_REQUIRED_ATTRIBUTES objects.
