document: rfc-2534
kind: protocol-element
summary: 'The ''paper-size'' feature tag describes the paper size for stationery using a token with equality relationship. Defined values include: letter (8.5x11.0 inches), a4 (210x297 mm), b4 (250x353 mm), a3 (297x420 mm), and legal (8.5x14 inches).'
