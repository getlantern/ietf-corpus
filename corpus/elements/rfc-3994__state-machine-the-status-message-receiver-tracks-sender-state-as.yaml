document: rfc-3994
kind: state-machine
summary: 'The status message receiver tracks sender state as ''idle'' or ''active''. Transitions from active to idle occur when: (1) an ''idle'' status message is received, (2) a content message is received, or (3) the refresh interval (or default 120 seconds) expires.'
section: "3.3"
topics:
    - realtime
