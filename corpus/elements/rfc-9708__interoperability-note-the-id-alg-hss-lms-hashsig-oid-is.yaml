document: rfc-9708
kind: interoperability-note
summary: The id-alg-hss-lms-hashsig OID is a synonym for id-alg-mts-hashsig, the latter being based on terminology from an early draft of RFC 8554. Implementations may encounter both names for the same algorithm identifier.
