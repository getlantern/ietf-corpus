document: rfc-2787
kind: normative-requirement
summary: Rows in vrrpOperTable and vrrpAssoIpAddrTable cannot be modified unless vrrpOperAdminState is 'disabled' and vrrpOperState has transitioned to 'initialize'. This ensures configuration changes only occur when the virtual router is inactive.
section: "3"
rfc2119_level: MUST
topics:
    - snmp
