document: rfc-6442
kind: protocol-element
summary: 'Geolocation-Error codes are divided into three ranges: 1xx (cannot process — missing, insufficient, or corrupted location), 2xx (permission required, e.g., 201 for retransmission to third party, 202 for routing permission), and 3xx (dereference failure). Only one code per response is allowed; when multiple errors exist the LR applies local policy to select one.'
section: "4.4"
topics:
    - realtime
