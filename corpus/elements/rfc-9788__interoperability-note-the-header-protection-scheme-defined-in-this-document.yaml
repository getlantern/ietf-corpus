document: rfc-9788
kind: interoperability-note
summary: The Header Protection scheme defined in this document is applicable to PGP/MIME (RFC 3156) as well as S/MIME. Any divergence needed for PGP/MIME is explicitly out of scope; implementations SHOULD apply the same mechanisms to both.
