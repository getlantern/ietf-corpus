document: rfc-7881
kind: protocol-element
summary: The BFD Echo port 3785 (defined by RFC 5881) is reused for the S-BFD Echo function in IPv4, IPv6, and MPLS environments. SBFDInitiator sessions MUST transmit S-BFD Echo packets with destination port 3785.
