document: rfc-6286
kind: normative-requirement
summary: If the BGP Identifier field of the OPEN message is zero, or if it is the same as the BGP Identifier of the local BGP speaker and the message is from an internal peer, the Error Subcode MUST be set to 'Bad BGP Identifier'.
section: "2.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
