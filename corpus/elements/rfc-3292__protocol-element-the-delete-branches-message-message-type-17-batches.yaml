document: rfc-3292
kind: protocol-element
summary: The Delete Branches message (Message Type=17) batches one or more Delete Branch Elements in a single request; each element specifies Input Port, Input Label, Output Port, and Output Label. The response carries a per-element Error field, and a failure in any element MUST NOT prevent processing of others.
section: "4.7"
topics:
    - mpls
