document: rfc-5627
kind: security-consideration
summary: A UA SHOULD use SIPS URI when registering to ensure integrity of the GRUU returned in the response; tampering with the GRUU could cause denial of service. Proxies and registrars MUST support SIPS and MUST support TLS.
section: "10.1"
rfc2119_level: MUST
topics:
    - sip
    - security
    - tls
