document: rfc-2211
kind: normative-requirement
summary: Each network element accepting controlled-load service MUST ensure adequate bandwidth and packet processing resources are available via active admission control. All resources important to element operation — link bandwidth, buffer space, and forwarding engine capacity — must be considered.
section: "4"
rfc2119_level: MUST
