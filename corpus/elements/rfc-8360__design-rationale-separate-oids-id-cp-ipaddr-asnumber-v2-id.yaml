document: rfc-8360
kind: design-rationale
summary: Separate OIDs (id-cp-ipAddr-asNumber-v2, id-pe-ipAddrBlocks-v2, id-pe-autonomousSysIds-v2) were introduced rather than modifying existing ones so that Relying Party tool behavior is deterministic — tools that do not implement the amended profile will reject certificates using the new OIDs rather than misinterpreting them.
