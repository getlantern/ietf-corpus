document: rfc-9749
kind: security-consideration
summary: The urn:ietf:params:jmap:webpush-vapid property in the JMAP capabilities object only advertises VAPID support and does not reveal sensitive information or introduce new security or privacy risks beyond those inherent to JMAP (RFC 8620) and Web Push (RFC 8030).
