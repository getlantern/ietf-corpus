document: rfc-6735
kind: normative-requirement
summary: Changes in integrity-protected priority AVP values SHOULD NOT be ignored, and appropriate protocol-specific error messages SHOULD be sent back upstream. The weaker 'SHOULD NOT' rather than 'MUST NOT' is used because local administrative domain policy acts as the final arbiter.
