document: rfc-7570
kind: security-consideration
summary: RRO Hop Attributes can reveal confidential node details to outside observers. Domain boundary policies SHOULD take the releasing of RRO hop attributes into consideration, applying the same confidentiality strategies used for other RRO subobjects, including pruning or modifying the RRO at domain edges.
section: "5"
topics:
    - security
    - mpls
    - routing
