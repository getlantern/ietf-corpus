document: rfc-5923
kind: protocol-element
summary: 'The "alias" Via header field parameter is introduced to signal that the client wants to create a transport-layer alias — i.e., that the server may reuse the existing connection to send requests back toward the client. Its ABNF is: via-params =/ via-alias; via-alias = "alias".'
