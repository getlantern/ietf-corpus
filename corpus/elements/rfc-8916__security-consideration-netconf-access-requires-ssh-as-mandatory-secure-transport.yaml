document: rfc-8916
kind: security-consideration
summary: NETCONF access requires SSH as mandatory secure transport (RFC 6242); RESTCONF requires HTTPS with TLS (RFC 8446). NACM (RFC 8341) provides access control for NETCONF/RESTCONF users. Authentication configuration inherits security considerations from RFC 8177 including local key storage and handling.
section: "5"
topics:
    - security
    - tls
    - netconf
    - yang
