document: rfc-6526
kind: normative-requirement
summary: The Template Withdrawal Message MUST be sent reliably using SCTP ordered delivery. Because all IPFIX Messages in a stream are sent in order, this guarantees that no Data Records will be lost due to delayed withdrawal arrival at the Collecting Process.
section: "4.4"
rfc2119_level: MUST
topics:
    - sctp
