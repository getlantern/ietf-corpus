document: rfc-6846
kind: interoperability-note
summary: ROHC-TCP assumes that if a feedback channel is used at least once for a specific context, it will be available for the entire compression operation for that context. If the feedback channel disappears after being established, compression for the affected context should be restarted.
section: 4.2.2
topics:
    - tcp
    - ip
