document: rfc-8587
kind: normative-requirement
summary: On first access to a file system, the client should obtain the value of the set of alternative file system locations by interrogating the fs_locations attribute, then apply trunking discovery/detection to separate trunkable addresses from replica addresses.
section: 5.2.4
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
