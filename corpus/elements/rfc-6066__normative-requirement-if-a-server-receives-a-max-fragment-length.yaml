document: rfc-6066
kind: normative-requirement
summary: If a server receives a max_fragment_length request for a value other than the allowed values, it MUST abort with 'illegal_parameter'. Similarly, if a client receives a max_fragment_length response that differs from what it requested, it MUST also abort with 'illegal_parameter'.
section: "4"
rfc2119_level: MUST
topics:
    - tls
