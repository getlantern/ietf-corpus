document: rfc-5428
kind: security-consideration
summary: 'Several read-write objects controlling event routing are security-sensitive: unauthorized modification of pktcEventSyslogAddress, pktcEventSyslogTransport, pktcEventClassStatus, pktcEventThrottleAdminStatus, and pktcEventReporting can redirect, suppress, or throttle event reporting, enabling attackers to conceal errors or denial-of-service attacks from network operators.'
section: "8"
topics:
    - snmp
    - security
