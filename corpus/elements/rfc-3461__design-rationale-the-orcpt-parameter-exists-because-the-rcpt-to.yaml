document: rfc-3461
kind: design-rationale
summary: The ORCPT parameter exists because the RCPT TO address may differ from the original recipient address (e.g., after forwarding A@B.C to A@D.E), and the original sender needs to identify which recipient caused the notification. This also supports messages gatewayed from non-Internet-style address environments.
section: "3"
