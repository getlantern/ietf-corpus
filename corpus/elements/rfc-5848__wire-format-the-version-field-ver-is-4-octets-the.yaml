document: rfc-5848
kind: wire-format
summary: 'The Version field (VER) is 4 octets: the first 2 octets encode the protocol version (''01'' for this specification), the 3rd octet encodes the hash algorithm (''1''=SHA1, ''2''=SHA256), and the 4th octet encodes the signature scheme (''1''=OpenPGP DSA). Full values are ''0111'' (SHA1) or ''0121'' (SHA256).'
section: 4.2.1
