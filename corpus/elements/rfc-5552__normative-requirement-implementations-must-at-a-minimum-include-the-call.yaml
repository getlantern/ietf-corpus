document: rfc-5552
kind: normative-requirement
summary: Implementations MUST at a minimum include the Call-ID header in the session.connection.protocol.sip.headers associative array. Header names are converted to lowercase keys; multiple fields of the same name are combined into a single comma-separated value.
section: "2.4"
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
