document: rfc-5373
kind: security-consideration
summary: Potential attacks enabled by automatic answering include turning a phone into a remote listening device ('bug-my-phone'), reverse charge fraud, spam over push-to-talk (SPTT), denial-of-service via battery rundown or 'forced busy', and phishing via session insertion. The security model is completely dependent on transitive trust across SIP proxies since end-to-end message protection is not commonly implemented.
section: "7"
topics:
    - sip
    - security
    - realtime
