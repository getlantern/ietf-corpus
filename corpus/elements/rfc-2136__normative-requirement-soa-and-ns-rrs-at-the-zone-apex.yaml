document: rfc-2136
kind: normative-requirement
summary: 'SOA and NS RRs at the zone apex are protected: they cannot be deleted by ''delete all RRsets from a name'' or ''delete an RRset'' operations targeting the zone name, and the last NS RR in an NS RRset at the zone apex cannot be deleted individually.'
section: 3.4.2.3
rfc2119_level: MUST NOT
topics:
    - dns
