document: rfc-3425
kind: design-rationale
summary: IQUERY was deprecated because it placed an arduous burden on servers (requiring exhaustive database searches or separate inverse indexes), could generate megabyte-sized responses enabling DoS attacks, was unable to refer requesters to other servers, and had no known clients providing meaningful service.
