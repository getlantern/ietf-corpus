document: rfc-2456
kind: protocol-element
summary: appnTrapControl is a read-write BITS object with one bit per notification type (appnLocalTgOperStateChangeTrap through dlurDlusStateChangeTrap). Setting a bit to 1 enables that notification type; setting it to 0 disables it. It does not control appnIsrAccountingDataTrap, which has its own control object in the APPN MIB.
section: "4"
