document: rfc-6295
kind: registry
summary: This document registers mode 'rtp-midi' for the mpeg4-generic media type, enabling MPEG 4 Audio Object Types (General MIDI ID 15, Wavetable Synthesis ID 14, Main Synthetic ID 13) to transport MIDI commands via RTP with the same payload structure as native streams.
