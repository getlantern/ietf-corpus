document: rfc-9341
kind: protocol-element
summary: Data collection transmits per-block counters and timestamps from measurement nodes to a correlator. Correlation may use a centralized NMS (push or poll mode) or a distributed protocol-based exchange (e.g., extensions to TWAMP or OWAMP).
