summary: 'S-BFD Control packets sent by an SBFDReflector mirror several fields from the received packet: My Discriminator is copied from received Your Discriminator, Your Discriminator from received My Discriminator, Detect Mult and Desired Min TX Interval are copied verbatim, Demand (D) bit is set to 0, and State reflects either UP or AdminDown.'
