document: rfc-6485
kind: protocol-element
summary: The signature algorithm used throughout the RPKI (certificates, CRLs, and signed objects) is RSA PKCS#1 Version 1.5 (RSASSA-PKCS1-v1_5) as defined in Section 5 of RFC 4055. The hash algorithm used is SHA-256 (FIPS 180-3). Together they are referred to as 'RSA with SHA-256'.
section: "2"
topics:
