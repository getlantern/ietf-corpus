document: rfc-3636
kind: state-machine
summary: 'MAU administrative state machine has six states: other(1), unknown(2), operational(3), standby(4), shutdown(5), and reset(6). Writing reset(6) triggers a power-cycle equivalent; writing standby(4) to a mixing-type MAU or AUI forces shutdown instead. Transitions are effected by writing rpMauStatus or ifMauStatus.'
