document: rfc-2213
kind: wire-format
summary: intSrvFlowDestAddr and intSrvFlowSenderAddr are OCTET STRING (SIZE 4..16), encoding IPv4 (4 bytes) or IPv6 (16 bytes) addresses. intSrvFlowDestAddrLength and intSrvFlowSenderAddrLength encode the CIDR prefix length in bits (0..128); for IPv4 hosts and multicast, this is 32.
