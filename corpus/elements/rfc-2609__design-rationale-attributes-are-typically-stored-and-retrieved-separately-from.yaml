document: rfc-2609
kind: design-rationale
summary: 'Attributes are typically stored and retrieved separately from the service: URL using SLP rather than embedded in the URL. Only attributes required to access a particular service (such as an authentication mechanism) are included in the service: URL itself, keeping URLs compact while supporting rich service description.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
