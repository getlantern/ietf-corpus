document: rfc-3484
kind: protocol-element
summary: 'The destination address selection algorithm sorts a mixed IPv4/IPv6 address list using ten ordered pair-wise rules: (1) avoid unusable, (2) prefer matching scope, (3) avoid deprecated source, (4) prefer home address source, (5) prefer matching label, (6) prefer higher precedence, (7) prefer native transport, (8) prefer smaller scope, (9) use longest matching prefix, (10) preserve original order.'
