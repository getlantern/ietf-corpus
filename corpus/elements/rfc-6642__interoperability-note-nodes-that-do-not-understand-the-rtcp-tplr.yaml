document: rfc-6642
kind: interoperability-note
summary: Nodes that do not understand the RTCP TPLR message will ignore it and may still send feedback per the AVPF scheduling algorithm of RFC 4585; media sources and intermediaries cannot be certain that TPLR actually reduces the feedback they receive.
