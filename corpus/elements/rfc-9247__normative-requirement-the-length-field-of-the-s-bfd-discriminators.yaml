document: rfc-9247
kind: normative-requirement
summary: The Length field of the S-BFD Discriminators TLV MUST be a minimum of 4 octets and increments by 4 octets for each additional discriminator. At least one discriminator MUST be included in the TLV.
section: "3"
rfc2119_level: MUST
topics:
