document: rfc-4861
kind: design-rationale
summary: Address resolution multicasts are spread over 16 million (2^24) solicited-node multicast addresses, greatly reducing address-resolution-related interrupts compared to ARP broadcast. Non-IPv6 machines should not be interrupted at all.
section: "3.1"
