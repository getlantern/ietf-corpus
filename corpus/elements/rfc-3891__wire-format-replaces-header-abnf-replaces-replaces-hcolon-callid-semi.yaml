document: rfc-3891
kind: wire-format
summary: 'Replaces header ABNF: `Replaces = "Replaces" HCOLON callid *(SEMI replaces-param)` where `replaces-param = to-tag / from-tag / early-flag / generic-param`, `to-tag = "to-tag" EQUAL token`, `from-tag = "from-tag" EQUAL token`, `early-flag = "early-only"`. The header MUST contain exactly one to-tag and one from-tag.'
