document: rfc-9848
kind: normative-requirement
summary: Servers that publish an "ech" parameter SHOULD support a protocol version compatible with ECH (TLS 1.3, DTLS 1.3, or QUIC version 1). If not, each connection attempt will require a retry, delaying connections and wasting resources.
section: "4"
rfc2119_level: SHOULD
topics:
    - tls
    - quic
    - dns
