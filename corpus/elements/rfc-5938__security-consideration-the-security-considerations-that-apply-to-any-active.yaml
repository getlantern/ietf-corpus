document: rfc-5938
kind: security-consideration
summary: The security considerations that apply to any active measurement of live networks are relevant to this feature. Implementers are referred to the security considerations in RFC 4656 (OWAMP) and RFC 5357 (TWAMP). No new security issues beyond those in the base protocols are introduced.
section: "5"
topics:
