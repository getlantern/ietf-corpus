document: rfc-9965
kind: normative-requirement
summary: Implementations MUST NOT permit EAP method negotiation with provisioning credentials. When an EPI is used, any EAP Nak sent by a server MUST contain only EAP method zero (0), and any EAP methods given in a Nak received by a peer using an EPI MUST be ignored.
section: "3.5"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
