document: rfc-3195
kind: normative-requirement
summary: Initiator ANS replies in the RAW profile MUST specify a facility, severity, and textual message as described in RFC 3164. The listener's opening MSG has no defined semantics and may serve as a greeting.
section: "3.4"
rfc2119_level: MUST
