document: rfc-3220
kind: normative-requirement
summary: An Agent Advertisement MUST NOT have the 'B' (busy) bit set unless the 'F' (foreign agent) bit is also set. At least one of the 'F' bit or 'H' (home agent) bit MUST be set in any Agent Advertisement. The 'R' bit MUST NOT be set unless the 'F' bit is also set.
section: 2.1.1
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
