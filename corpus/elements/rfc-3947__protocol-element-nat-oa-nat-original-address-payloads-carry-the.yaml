document: rfc-3947
kind: protocol-element
summary: NAT-OA (NAT Original Address) payloads carry the original pre-NAT IP addresses of both initiator and responder, sent in Quick Mode to enable incremental TCP/IP checksum updates after NAT transformation. The initiator NAT-OA is sent first, the responder NAT-OA second.
section: "5.2"
topics:
    - ipsec
    - vpn
    - nat
