document: rfc-6245
kind: protocol-element
summary: The GRE Key Extension is a new Mobile IP extension (Type 48, non-skippable) used by a Foreign Agent to supply a GRE key and associated information to the Home Agent in order to establish a GRE tunnel between the FA and the HA. It conforms to the Mobile IPv4 extension format specified in RFC 5944.
section: "3"
topics:
    - mobility
    - vpn
