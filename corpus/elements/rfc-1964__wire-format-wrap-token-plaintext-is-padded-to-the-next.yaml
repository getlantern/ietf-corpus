document: rfc-1964
kind: wire-format
summary: Wrap token plaintext is padded to the next multiple of 8 bytes by appending 1-8 bytes each containing the total pad count, and an 8-byte random confounder is prepended before encryption. DES-CBC encryption uses the derived confidentiality key and a zero IV.
section: 1.2.2.3
