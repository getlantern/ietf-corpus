document: rfc-6381
kind: design-rationale
summary: Several MIME types ('bucket' types) such as video/3gpp, audio/mp4, and video/3gpp2 can contain any of several codecs, making it impossible to determine rendering requirements from the MIME type alone. The 'codecs' and 'profiles' parameters solve this by allowing unambiguous declaration of codecs and container profiles in the Content-Type header.
section: "1"
topics:
