document: rfc-8600
kind: security-consideration
summary: Some SASL mechanisms (such as PLAIN) allow a compromised Controller to cache Platform credentials for future impersonation after a breach is repaired; SCRAM and EXTERNAL with TLS mutual certificate-based authentication do not admit this class of attack and are therefore preferred.
section: 8.2.3
topics:
    - security
    - crypto
