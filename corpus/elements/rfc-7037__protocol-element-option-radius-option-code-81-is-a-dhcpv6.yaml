document: rfc-7037
kind: protocol-element
summary: OPTION_RADIUS (option code 81) is a DHCPv6 option used by the relay agent to carry RADIUS authorization attributes from the Access-Accept message to the centralized DHCPv6 server. The option-data field contains a list of one or more RADIUS attributes.
