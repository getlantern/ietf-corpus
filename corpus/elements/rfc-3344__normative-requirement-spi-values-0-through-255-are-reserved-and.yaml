document: rfc-3344
kind: normative-requirement
summary: SPI values 0 through 255 are reserved and MUST NOT be used in any Mobility Security Association. An implementation MUST be able to associate any SPI value with any authentication algorithm and mode it implements.
section: "1.6"
rfc2119_level: MUST NOT
topics:
    - mobility
    - security
