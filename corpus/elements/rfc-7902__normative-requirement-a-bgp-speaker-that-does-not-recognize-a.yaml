document: rfc-7902
kind: normative-requirement
summary: A BGP speaker that does not recognize a particular flag (in either the 'PMSI Tunnel' Flags field or the 'Additional PMSI Tunnel Attribute Flags' Extended Community) MUST simply ignore that flag and SHOULD leave its setting unchanged when propagating the attribute or Extended Community.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
