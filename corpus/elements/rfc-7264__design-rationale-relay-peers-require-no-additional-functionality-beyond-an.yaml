document: rfc-7264
kind: design-rationale
summary: Relay peers require no additional functionality beyond an ordinary peer; they follow the same forwarding procedures. The only difference is the potentially higher traffic burden, allowing any publicly reachable peer to serve as a relay without protocol changes.
section: "4.1"
topics:
    - routing
