document: rfc-3498
kind: protocol-element
summary: 'The ApsControlCommand textual convention applies only to 1:n architecture LTEs and provides three values: noCmd (read-only sentinel), lockoutWorkingChannel (prevents a specific working channel from switching to the protection line), and clearLockoutWorkingChannel. Specifying the protection line for lockout or clear operations returns an inconsistentValue error.'
