document: rfc-8762
kind: interoperability-note
summary: A STAMP Session-Reflector receiving a packet smaller than the STAMP base packet transmits only the base reflected packet (Figure 5). If the received packet is larger, the Session-Reflector copies the remainder to return a symmetrically-sized packet, accommodating TWAMP Light senders that add padding.
