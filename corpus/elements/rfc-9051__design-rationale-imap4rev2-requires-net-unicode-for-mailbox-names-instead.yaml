document: rfc-9051
kind: design-rationale
summary: IMAP4rev2 requires Net-Unicode for mailbox names instead of IMAP4rev1's modified UTF-7 encoding. The change aligns mailbox naming with modern Unicode standards and removes the complexity of modified UTF-7, at the cost of backward incompatibility addressed by Appendix A.
section: "5.1"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
