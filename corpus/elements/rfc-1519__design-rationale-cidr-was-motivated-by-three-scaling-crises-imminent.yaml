document: rfc-1519
kind: design-rationale
summary: 'CIDR was motivated by three scaling crises: imminent exhaustion of class B address space (class C too small, class B too large for mid-sized organizations), explosive growth of routing tables beyond manageable size, and eventual exhaustion of the 32-bit address space. The plan addresses the first two immediately while deferring the third.'
