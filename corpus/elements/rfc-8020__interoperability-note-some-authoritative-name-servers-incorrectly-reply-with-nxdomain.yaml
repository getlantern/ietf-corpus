document: rfc-8020
kind: interoperability-note
summary: Some authoritative name servers incorrectly reply with NXDOMAIN instead of NODATA for Empty Non-Terminal (ENT) names. This behavior is incompatible with DNSSEC and implementations should not support it.
section: "5"
topics:
