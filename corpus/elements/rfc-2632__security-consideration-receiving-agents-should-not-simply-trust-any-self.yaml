document: rfc-2632
kind: security-consideration
summary: Receiving agents SHOULD NOT simply trust any self-signed certificate as a valid CA, but SHOULD use some other mechanism to determine if it is a CA that should be trusted, to prevent certificate spoofing attacks.
section: "2.3"
