document: rfc-2445
kind: normative-requirement
summary: The VERSION property is REQUIRED in the VCALENDAR object and MUST specify '2.0' for conformance with this specification. The PRODID property is also REQUIRED and MUST contain the globally unique identifier string for the product that created the iCalendar object.
section: 4.7.4
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
