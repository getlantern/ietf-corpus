document: rfc-5910
kind: design-rationale
summary: 'Two distinct interfaces are defined: the DS Data Interface (for ''thin'' DNSSEC servers where the client generates DS records) and the Key Data Interface (for ''thick'' DNSSEC servers that accept only key data and generate the DS records themselves). This accommodates different registry deployment models without requiring a single approach.'
