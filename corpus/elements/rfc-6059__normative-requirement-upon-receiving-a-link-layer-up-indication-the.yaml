document: rfc-6059
kind: normative-requirement
summary: Upon receiving a link-layer 'up' indication, the host MUST mark all currently configured non-tentative IP addresses as inoperable and MUST set all Neighbor Cache entries for routers on the Default Router List to STALE, to speed up acquisition of a new default router if a link change has occurred.
section: "5.4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
