document: rfc-1655
kind: normative-requirement
summary: By default a BGP speaker should aggregate NLRI representing subnets to the corresponding network. Injecting NLRI representing arbitrary subnets into BGP without aggregation shall be controlled via configuration parameters.
section: "4"
rfc2119_level: SHOULD
