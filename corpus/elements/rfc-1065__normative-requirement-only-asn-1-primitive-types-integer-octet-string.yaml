document: rfc-1065
kind: normative-requirement
summary: Only ASN.1 primitive types INTEGER, OCTET STRING, OBJECT IDENTIFIER, and NULL are permitted in object type syntax definitions. The full generality of ASN.1 is explicitly excluded to ensure simplicity.
section: 3.2.1
rfc2119_level: MUST
