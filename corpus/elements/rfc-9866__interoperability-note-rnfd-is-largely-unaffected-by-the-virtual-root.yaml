document: rfc-9866
kind: interoperability-note
summary: RNFD is largely unaffected by the virtual root primary/backup realization (Section 6.2), since Sentinel eligibility conditions ensure only the current primary is monitored. For the multi-primary realization, RNFD is only beneficial when crashes among root nodes are correlated (e.g., shared power supply).
section: "6.2"
topics:
    - routing
