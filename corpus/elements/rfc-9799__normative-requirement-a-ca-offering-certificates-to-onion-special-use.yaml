document: rfc-9799
kind: normative-requirement
summary: A CA offering certificates to '.onion' Special-Use Domain Names SHOULD make their ACME server available as a Tor Hidden Service. ACME clients SHOULD support connecting to ACME servers over Tor regardless of their support of onion-csr-01.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
