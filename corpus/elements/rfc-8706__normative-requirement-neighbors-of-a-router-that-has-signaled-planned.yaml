document: rfc-8706
kind: normative-requirement
summary: Neighbors of a router that has signaled planned restart SHOULD maintain the adjacency in Planned Restart State until they receive an IIH with RR set, an IIH with both PR and RR clear, or the adjacency Holding Time expires. The Holding Time SHOULD be set to the Remaining Time specified in the received PR IIH.
section: 3.2.3
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
