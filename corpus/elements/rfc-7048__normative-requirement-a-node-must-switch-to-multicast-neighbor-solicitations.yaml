document: rfc-7048
kind: normative-requirement
summary: A node MUST switch to multicast Neighbor Solicitations within 60 seconds of the initial retransmission, even if it sends some unicast NS while in the UNREACHABLE state, to handle a potential link-layer address change for the target.
section: "3"
rfc2119_level: MUST
