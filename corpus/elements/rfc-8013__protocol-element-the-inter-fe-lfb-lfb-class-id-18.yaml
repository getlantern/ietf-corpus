document: rfc-8013
kind: protocol-element
summary: 'The inter-FE LFB (LFB Class ID 18, name IFE, version 1.0) has two input port groups: EgressInGroup (accepts any packet plus metadata for encapsulation) and IngressInGroup (accepts inter-FE-encapsulated Ethernet frames for decapsulation). It has three output ports: OUT1 (encapsulated frame), OUT2 (decapsulated packet and metadata), and EXCEPTIONOUT (error path with ExceptionID metadata).'
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
