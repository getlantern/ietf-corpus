document: rfc-8926
kind: security-consideration
summary: To mitigate spoofing or rogue NVE threats, an operator SHOULD use an authentication mechanism such as IPsec to verify that Geneve packets originate from the intended NVE peer. Simpler ingress filtering (VLAN/MAC/IP, reverse-path forwarding) may be used in sufficiently trusted environments.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - security
    - routing
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
