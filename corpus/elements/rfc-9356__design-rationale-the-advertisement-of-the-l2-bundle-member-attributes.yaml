document: rfc-9356
kind: design-rationale
summary: The advertisement of the L2 Bundle Member Attributes sub-TLV may be asymmetric for an OSPF link—advertised by only one end—depending on the underlying L2 connectivity. This is a deliberate allowance reflecting real deployment asymmetry.
