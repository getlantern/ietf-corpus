document: rfc-5343
kind: protocol-element
summary: The localEngineID is a well-known snmpEngineID value ('8000000006'H) that always refers to the local default context of an SNMP engine. It uses variable-length format 3 of the SnmpEngineID textual convention with enterprise ID 0 and format value 6.
