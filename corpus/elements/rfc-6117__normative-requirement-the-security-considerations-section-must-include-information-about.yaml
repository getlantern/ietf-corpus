document: rfc-6117
kind: normative-requirement
summary: The Security Considerations section MUST include information about access to Personally Identifiable Information (PII). It SHOULD NOT repeat general security considerations already in RFC 6116 or the referenced URI scheme specifications, but MUST cover ENUM-specific new issues.
section: "5.6"
rfc2119_level: MUST
