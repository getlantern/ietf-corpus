document: rfc-7879
kind: protocol-element
summary: A media-relay B2BUA (RFC 7092 Section 3.2.1) forwards all packets on a negotiated connection without inspecting or modifying packet contents; it modifies only the UDP/TCP and IP headers, leaving the DTLS payload and SRTP authentication tag intact.
