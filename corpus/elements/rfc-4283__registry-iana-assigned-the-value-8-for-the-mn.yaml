document: rfc-4283
kind: registry
summary: IANA assigned the value 8 for the MN-ID-OPTION-TYPE in the Mobile IPv6 numbering space. A new namespace was created for the subtype field of the Mobile Node Identifier option; NAI (subtype 1) is the currently allocated value. New values require Standards Action per RFC 2434.
