document: rfc-4489
kind: design-rationale
summary: IID-based link-local multicast addresses are preferred over unicast-prefix-based IPv6 multicast addresses (RFC 3306) because they allow each node to generate multicast addresses automatically without allocation servers, making them better suited for serverless environments such as ad-hoc networks and mobile environments.
