document: rfc-3190
kind: wire-format
summary: 12-bit nonlinear (DAT12) samples are packed contiguously into payload octets starting with the most significant bit, in two's complement notation ranging from -2048 to 2047. When the payload contains an odd number of samples, the four LSBs of the last octet are unused.
