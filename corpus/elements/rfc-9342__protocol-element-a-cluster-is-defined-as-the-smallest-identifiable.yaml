summary: A cluster is defined as the smallest identifiable non-trivial subnetwork of the entire monitoring network graph where the number of packets entering equals the number exiting (in the absence of packet loss). A cluster must contain all arcs emanating from its input nodes and all arcs terminating at its output nodes.
