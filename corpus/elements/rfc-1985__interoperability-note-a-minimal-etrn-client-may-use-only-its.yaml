document: rfc-1985
kind: interoperability-note
summary: A minimal ETRN client may use only its own hostname parameter; this will not handle cases where mail for a domain 'x.y' is queued at the server under a different name (e.g., 's.x.y'). Aliases and the '@' option are needed for full coverage.
section: "6"
