document: rfc-9207
kind: normative-requirement
summary: Clients MUST extract the `iss` parameter from authorization responses if present, decode it from application/x-www-form-urlencoded form, and compare it to the issuer identifier of the authorization server where the request was sent. Comparison MUST use simple string comparison per RFC 3986 §6.2.1.
section: "2.4"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
