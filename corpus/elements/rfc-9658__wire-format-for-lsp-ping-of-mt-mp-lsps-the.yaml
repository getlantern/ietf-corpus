summary: For LSP ping of MT MP LSPs, the existing P2MP/MP2MP LDP FEC Stack sub-TLV sub-types are reused with 'MT IP' or 'MT IPv6' in the Address Family field, Address Length set to 8 (MT IP) or 20 (MT IPv6), and the Root LSR Address field extended with an 8-bit Reserved, 8-bit IPA, and 16-bit MT-ID suffix.
