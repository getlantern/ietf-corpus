document: rfc-822
kind: wire-format
summary: Long header field-bodies may be folded across multiple lines by inserting a CRLF immediately followed by at least one LWSP-char (SPACE or HTAB) wherever linear-white-space is permitted. Unfolding reverses this by treating CRLF+LWSP-char as equivalent to the LWSP-char alone.
section: 3.1.1
topics:
    - email
