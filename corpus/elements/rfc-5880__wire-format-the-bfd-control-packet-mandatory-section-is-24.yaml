document: rfc-5880
kind: wire-format
summary: 'The BFD Control packet mandatory section is 24 bytes: 3-bit Version, 5-bit Diag, 2-bit State, flags (P, F, C, A, D, M), 8-bit Detect Mult, 8-bit Length, 32-bit My Discriminator, 32-bit Your Discriminator, 32-bit Desired Min TX Interval (microseconds), 32-bit Required Min RX Interval (microseconds), and 32-bit Required Min Echo RX Interval (microseconds). An optional Authentication Section follows when the A bit is set.'
section: "4.1"
topics:
    - routing
