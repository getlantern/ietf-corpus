document: rfc-2212
kind: normative-requirement
summary: The scheduling and admission control algorithms of the element MUST ensure that delay bounds are never violated and datagrams are not lost when traffic conforms to the TSpec. The element MUST also ensure that misbehaving flows do not affect service given to other flows.
section: Evaluation Criteria
rfc2119_level: MUST
topics:
