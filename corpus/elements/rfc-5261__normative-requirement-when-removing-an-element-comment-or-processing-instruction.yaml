document: rfc-5261
kind: normative-requirement
summary: When removing an element, comment, or processing instruction without the 'ws' directive, if immediate preceding and following sibling text nodes both exist, their content MUST be combined together and the latter text node removed from the document.
section: "4.5"
rfc2119_level: MUST
