document: rfc-8691
kind: privacy-consideration
summary: Vehicles using 802.11-OCB expose their MAC addresses and IPv6 addresses to passive sniffers along public roads, enabling location tracking. The use of dynamically changing MAC addresses, semantically opaque IIDs, and stable IIDs (per RFC 7217) is strongly recommended to mitigate tracking risks.
section: "5.1"
topics:
    - privacy
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
