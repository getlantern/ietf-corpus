document: rfc-5052
kind: normative-requirement
summary: The value of the FEC Encoding ID MUST be the same for all transmissions of encoding symbols related to a particular object, but MAY vary across different transmissions of encoding symbols about different objects, even if transmitted to the same multicast channels.
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
