document: rfc-8887
kind: normative-requirement
summary: The "maxConcurrentRequests" capability limit applies to requests made on the WebSocket connection. When using HTTP/2 multiplexing, this limit applies to the sum of requests on both the JMAP API endpoint and the WebSocket connection.
section: 4.3.2
rfc2119_level: MUST
topics:
    - websocket
    - http
