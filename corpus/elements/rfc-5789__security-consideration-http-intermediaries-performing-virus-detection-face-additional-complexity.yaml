document: rfc-5789
kind: security-consideration
summary: HTTP intermediaries performing virus detection face additional complexity with PATCH because neither the source document nor the patch document may be a virus individually, yet the result could be. This is analogous to risks from byte-range downloads and compressed uploads.
section: "5"
topics:
