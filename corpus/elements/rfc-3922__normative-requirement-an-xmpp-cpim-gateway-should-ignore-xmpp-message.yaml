document: rfc-3922
kind: normative-requirement
summary: An XMPP-CPIM gateway SHOULD ignore XMPP message extended content (non-core namespaces) and not pass it through to the recipient, with the exception of 'urn:ietf:params:xml:ns:xmpp-e2e' content defined in XMPP-E2E.
section: 4.1.8
rfc2119_level: SHOULD
