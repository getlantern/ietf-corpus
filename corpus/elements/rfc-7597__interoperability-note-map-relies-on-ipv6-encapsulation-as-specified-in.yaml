document: rfc-7597
kind: interoperability-note
summary: MAP relies on IPv6 encapsulation as specified in RFC 2473. The BR connects MAP domains to external IPv4 networks and forwards traffic using normal MAP forwarding rules. Traffic to destinations outside the MAP domain is encapsulated with the BR's IPv6 address as the destination, acting as a point-to-point IPv4-over-IPv6 tunnel.
section: "5.4"
topics:
    - ip
    - v6ops
