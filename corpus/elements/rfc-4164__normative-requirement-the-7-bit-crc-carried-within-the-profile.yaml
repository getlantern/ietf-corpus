document: rfc-4164
kind: normative-requirement
summary: The 7-bit CRC carried within the profile-specific part of the IR-CR header MUST be used by the decompressor to verify that decompression of the reconstructed header succeeded. If the reconstructed header fails the CRC check, changes to the context MUST NOT be performed.
section: 3.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
