document: rfc-2745
kind: wire-format
summary: The IPv4 ROUTE object (Class=31, C-Type=1) contains a reserved field, an R-pointer byte indicating the current reply-route position, and a variable-length RSVP Node List of IPv4 addresses. IPv6 uses C-Type=2 with 128-bit addresses. An empty ROUTE object has an empty node list and R-pointer equal to zero.
section: "3.5"
topics:
