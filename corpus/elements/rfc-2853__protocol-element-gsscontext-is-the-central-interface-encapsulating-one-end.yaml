document: rfc-2853
kind: protocol-element
summary: GSSContext is the central interface encapsulating one end of a GSS-API security context. It provides context establishment (initSecContext, acceptSecContext), per-message protection (wrap, unwrap, getMIC, verifyMIC), context export for inter-process transfer, and accessor methods for all negotiated context attributes.
section: "5.4"
topics:
