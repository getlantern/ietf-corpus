document: rfc-5875
kind: interoperability-note
summary: The XCAP server will usually be co-located with the SIP notifier, so the subscriber MAY use relative XCAP Request-URIs. Because relative Request-URIs are allowed, the notifier MUST know how to resolve these against the correct XCAP Root URI value.
section: "4.4"
topics:
    - sip
    - http
