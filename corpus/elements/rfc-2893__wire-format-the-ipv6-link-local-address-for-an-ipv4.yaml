document: rfc-2893
kind: wire-format
summary: The IPv6 link-local address for an IPv4 tunnel interface is formed as FE80::0000:0000:IPv4addr, where the 128-bit address is FE80 followed by 48 zero bits followed by the 32-bit IPv4 address. The U/L bit is zero, indicating the identifier is not globally unique.
section: "3.7"
topics:
