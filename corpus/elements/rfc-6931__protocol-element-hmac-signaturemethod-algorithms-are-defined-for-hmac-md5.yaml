document: rfc-6931
kind: protocol-element
summary: HMAC SignatureMethod algorithms are defined for HMAC-MD5 ('xmldsig-more#hmac-md5'), HMAC-SHA224/256/384/512, and HMAC-RIPEMD160. The HMAC algorithm takes an optional truncation length in bits as HMACOutputLength; if omitted, all hash bits are output.
