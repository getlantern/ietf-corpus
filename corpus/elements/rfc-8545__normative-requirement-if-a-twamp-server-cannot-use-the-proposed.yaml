document: rfc-8545
kind: normative-requirement
summary: If a TWAMP Server cannot use the proposed Receiver Port, it MAY suggest an alternate available port in the Port field of the Accept-Session message. If rejecting a session for other reasons, the Server MUST NOT suggest an alternate port and the Port field MUST be set to zero.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - measurement
