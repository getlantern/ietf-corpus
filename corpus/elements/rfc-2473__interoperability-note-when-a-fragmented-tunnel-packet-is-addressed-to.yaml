document: rfc-2473
kind: interoperability-note
summary: When a fragmented tunnel packet is addressed to an exit-point identified by an anycast address, successful reassembly requires all fragments to arrive at the same anycast node, which is not guaranteed by anycast routing; this is a known limitation analogous to the problem with fragmented IPv6 packets to anycast destinations.
section: "7"
topics:
