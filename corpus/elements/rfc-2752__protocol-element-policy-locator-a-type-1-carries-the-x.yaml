document: rfc-2752
kind: protocol-element
summary: POLICY_LOCATOR (A-Type=1) carries the X.500 Distinguished Name used to locate the admission policy for a user or application. SubTypes include ASCII_DN (1), UNICODE_DN (2), ASCII_DN_ENCRYPT (3), and UNICODE_DN_ENCRYPT (4); encrypted forms use the Kerberos session key or digital certificate private key.
section: 3.3.1
topics:
