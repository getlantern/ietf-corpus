document: rfc-2461
kind: wire-format
summary: Router Solicitation (Type 133) carries a 32-bit Reserved field (initialized to zero, ignored by receiver) and an optional Source Link-Layer Address option. IP source is an assigned interface address or the unspecified address; destination is typically FF02::2 (all-routers); Hop Limit is 255.
section: "4.1"
