document: rfc-5371
kind: normative-requirement
summary: The same timestamp value MUST appear in each RTP packet carrying a fragment of a given frame. For interlaced JPEG 2000, the odd field and the corresponding even field MUST have the same timestamp value.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
