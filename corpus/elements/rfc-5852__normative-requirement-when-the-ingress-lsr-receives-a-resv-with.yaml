document: rfc-5852
kind: normative-requirement
summary: When the ingress LSR receives a Resv with the H bit set and the timer is running, it MUST cancel the timer and MUST send a Path message with the H bit clear to complete the second stage of Handover.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
