document: rfc-6076
kind: protocol-element
summary: 'Session Completion Ratio (SCR) measures the percentage of SIP dialogs that complete without failing due to lack of response. Formula: SCR% = (# of Successfully Completed Sessions / Total # of Session Requests) x 100. Analogous to Call Completion Ratio (CCR) in telephony.'
section: "4.9"
topics:
