document: rfc-5778
kind: normative-requirement
summary: The HA MUST support the Authorization Session State Machine defined in RFC 3588. Each SA created between the MN and HA as a result of IKEv2 negotiation or a Mobile IPv6 Authentication Protocol exchange corresponds to one Diameter session.
section: "4.3"
rfc2119_level: MUST
topics:
