document: rfc-7146
kind: normative-requirement
summary: Implementations MUST support ESPv2 in tunnel mode (IPsec v2) and SHOULD also support ESPv3 in tunnel mode (IPsec v3) to provide security for both control and data packets. Per-packet data origin authentication, integrity, and replay protection MUST be provided when either ESP version is utilized.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
