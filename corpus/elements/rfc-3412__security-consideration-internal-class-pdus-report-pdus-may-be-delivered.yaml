document: rfc-3412
kind: security-consideration
summary: Internal Class PDUs (Report PDUs) may be delivered at noAuthNoPriv security level independent of the preceding exchange's security level, opening a window for spoofing or replay attacks. Receivers aware of these risks may still accept such messages for discovering engine IDs or detecting misconfiguration.
section: "10"
topics:
    - snmp
    - security
