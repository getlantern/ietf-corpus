document: rfc-7956
kind: protocol-element
summary: The egress RBridge identifies inter-subnet traffic by matching Inner.MacDA to its local tenant gateway MAC. It uses the inner Data Label to look up the corresponding VRF, performs IP routing in that VRF, and locally forwards the packet to the destination ES.
section: "5.4"
