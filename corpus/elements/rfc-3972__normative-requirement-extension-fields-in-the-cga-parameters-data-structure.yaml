document: rfc-3972
kind: normative-requirement
summary: Extension fields in the CGA Parameters data structure are reserved for future use; IETF standards action is required to define their use. Implementations MUST ignore unrecognized extension fields but MUST include them in hash computations for both Hash1 and Hash2.
section: "3"
rfc2119_level: MUST
