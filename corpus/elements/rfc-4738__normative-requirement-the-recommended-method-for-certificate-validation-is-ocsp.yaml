document: rfc-4738
kind: normative-requirement
summary: The RECOMMENDED method for certificate validation is OCSP (RFC 2560). When OCSP is used and nextUpdate is present in the response, it defines the certificate cache validity period. If OCSP is unsupported or nextUpdate is absent, the cache timeout is a matter of local policy.
section: "3.8"
rfc2119_level: RECOMMENDED
topics:
    - pkix
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
