document: rfc-9502
kind: design-rationale
summary: The existing OSPF Flexible Algorithm ASBR Metric (FAAM) Sub-TLV from RFC 9350 cannot be used for IP Flexible Algorithm because SR and IP Flex-Algorithm topologies may differ (each signals participation independently), making SR-based topology calculations inapplicable to IP forwarding. A new OSPF IP Flexible Algorithm ASBR Metric (IPFAAM) Sub-TLV is defined instead.
section: "6.5"
topics:
    - routing
    - ip
