document: rfc-7285
kind: normative-requirement
summary: 'An ALTO server MUST support at least one cost mode: ''numerical'' or ''ordinal''. A client desiring numerical costs MAY adjust its behavior if only ordinal is available, and may construct ordinal rankings from numerical values if only numerical is available.'
section: 6.1.2
rfc2119_level: MUST
topics:
    - http
    - json
