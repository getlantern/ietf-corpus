document: rfc-6578
kind: normative-requirement
summary: Servers MUST limit themselves to invalidating sync tokens only when absolutely necessary, such as storage/performance constraints or server implementation changes. Invalidation forces clients to perform a full re-synchronization.
section: "3.2"
rfc2119_level: MUST
topics:
    - http
