document: rfc-5812
kind: interoperability-note
summary: For LFB class inheritance backward compatibility, a derived class must be a functional superset of its base class (may only add, not remove, functions). A CE encountering an unknown LFB type MUST query its base class and SHOULD be able to configure the instance to revert to base-class behavior, enabling older CEs to interoperate with FEs running newer LFB class versions.
section: 3.2.8
topics:
    - routing
extracted_by: claude-sonnet-4-6
