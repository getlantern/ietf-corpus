document: rfc-749
kind: wire-format
summary: 'Screen control subnegotiation (type 2): IAC SB SUPDUP-OUTPUT 2 N TD1 TD2 ... TDn SCx SCy IAC SE. N is a byte giving the count of TDCODE/character bytes (0 ≤ N ≤ 254); TD bytes are RFC 734 %TDCODEs and printing characters; SCx and SCy are the anticipated post-execution horizontal and vertical cursor coordinates.'
