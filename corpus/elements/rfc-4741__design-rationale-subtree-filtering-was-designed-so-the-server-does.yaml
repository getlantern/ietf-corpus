document: rfc-4741
kind: design-rationale
summary: Subtree filtering was designed so the server does not need data-model-specific semantics during processing, enabling simple, centralized implementation; the trade-off is that only exact-match content filtering and explicit selection are supported, not arbitrary query expressions.
