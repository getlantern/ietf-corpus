document: rfc-2002
kind: normative-requirement
summary: Agent Advertisement sequence numbers MUST start at 0 after boot, increment by 1 for each subsequent advertisement, and MUST roll from 0xffff to 256 (not 0), so mobile nodes can distinguish a reboot (small sequence number) from a rollover.
section: 2.3.2
rfc2119_level: MUST
topics:
    - ip
