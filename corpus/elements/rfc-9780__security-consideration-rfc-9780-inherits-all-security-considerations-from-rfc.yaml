document: rfc-9780
kind: security-consideration
summary: RFC 9780 inherits all security considerations from RFC 5880, RFC 5884, RFC 7726, RFC 8562, RFC 8029, and RFC 6425 without introducing new threats. BFD for P2MP MPLS LSPs MUST follow RFC 4687 requirements to avoid control/data plane congestion from high BFD Control packet rates.
