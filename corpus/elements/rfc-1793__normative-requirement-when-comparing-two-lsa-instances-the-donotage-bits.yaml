document: rfc-1793
kind: normative-requirement
summary: When comparing two LSA instances, the DoNotAge bits MUST be masked off from the LS age fields before comparison. For backward compatibility, when flushing LSAs the MaxAge form (not DoNotAge+MaxAge) MUST always be used.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
