document: rfc-4239
kind: normative-requirement
summary: Voice messages MUST always be contained in an audio/basic content-type unless the originator is aware the recipient can handle other content. Audio/32kadpcm MAY be used when the recipient is known to support VPIM v2.
section: "7"
rfc2119_level: MUST
topics:
    - email
    - realtime
