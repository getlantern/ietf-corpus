document: rfc-4006
kind: normative-requirement
summary: The credit-control client MUST include the Multiple-Services-Indicator AVP in the first interrogation to indicate support for independent credit-control of multiple services. A server not supporting this feature MUST treat Multiple-Services-Credit-Control AVPs as invalid AVPs.
section: 5.1.2
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
