document: rfc-3840
kind: registry
summary: This specification creates the 'SIP Media Feature Tag Registration Tree' with prefix 'sip.', for registering media feature tags applicable to SIP. New entries require IETF consensus (publication of an RFC). All tags in this tree have a 'sip.' prefix and no leading '+' in registrations.
section: "12.1"
topics:
