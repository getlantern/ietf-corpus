summary: 'The Flags field contains two defined bits: L-Flag (bit 6, hex 0x2) for Link Down Indication and R-Flag (bit 7, hex 0x1) to indicate removal of a previously sent FM condition. Reserved flags MUST be set to zero on transmission and ignored on receipt.'
