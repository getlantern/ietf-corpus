document: rfc-6584
kind: security-consideration
summary: 'The Group-keyed MAC scheme cannot protect against attacks from inside the group: a group member who knows the shared key can impersonate the sender and inject forged packets that will pass the MAC check. This is an inherent limitation distinguishing group-security from sender authentication.'
section: "5"
topics:
    - security
    - multicast
    - crypto
