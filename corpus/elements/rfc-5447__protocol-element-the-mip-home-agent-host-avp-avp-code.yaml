document: rfc-5447
kind: protocol-element
summary: The MIP-Home-Agent-Host AVP (AVP Code 348, from RFC 4004) is of type Grouped and contains the identity of the assigned MIPv6 home agent via Destination-Realm and Destination-Host sub-AVPs, offering DNS-based indirection. It is RECOMMENDED that the Destination-Host AVP identifies exactly one HA.
section: 4.2.3
rfc2119_level: RECOMMENDED
topics:
