document: rfc-2335
kind: normative-requirement
summary: 'When an NHC wishes to leave a SG, it MUST do one of: (1) send an NHRP Purge Request for itself and wait for an NHRP Purge Reply, (2) keep its last Request ID in non-volatile RAM and use a larger Request ID on re-registration, or (3) not re-register for a time equal to the Holding Time from the previous registration.'
section: "2"
rfc2119_level: MUST
topics:
    - ip
