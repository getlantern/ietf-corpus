document: rfc-9066
kind: normative-requirement
summary: Only immediate mitigation requests ('trigger-mitigation' set to 'true') are allowed in the Call Home scenario. Call Home DOTS clients MUST NOT send requests with 'trigger-mitigation' set to 'false'. Such requests MUST be discarded by the Call Home DOTS server with a 4.00 (Bad Request).
section: 5.3.1
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
