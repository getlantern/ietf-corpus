document: rfc-7462
kind: interoperability-note
summary: A UA MUST produce a reasonable rendering when the Alert-Info header field contains a mix of URI schemes (e.g., an HTTP audio URL and an 'alert' URN). It must act on the URIs it understands per local policy and ignore the others; the proxy example in Section 14 shows both an HTTP URI and a URN coexisting in the same header field.
section: "13"
topics:
    - sip
    - realtime
    - http
