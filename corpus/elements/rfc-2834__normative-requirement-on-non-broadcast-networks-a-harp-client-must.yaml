document: rfc-2834
kind: normative-requirement
summary: On non-broadcast networks, a HARP client MUST refresh its entry for the HARP server at least once every 15 minutes, either by exchanging a HARP request/reply or by repeating the registration phase. This timeout SHOULD be reset after each HARP_REQUEST/HARP_REPLY exchange.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
