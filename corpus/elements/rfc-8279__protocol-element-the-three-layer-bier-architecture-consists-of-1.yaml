document: rfc-8279
kind: protocol-element
summary: 'The three-layer BIER architecture consists of: (1) the routing underlay, which establishes adjacencies and computes best paths (typically an IGP); (2) the BIER layer, which handles encapsulation, forwarding, and advertisement of BFR-ids and BFR-prefixes; and (3) the multicast flow overlay, which determines the set of BFERs for incoming multicast flows and how BFERs dispatch decapsulated packets.'
