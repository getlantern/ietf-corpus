document: rfc-6865
kind: interoperability-note
summary: The core Reed-Solomon code specification (based on Vandermonde matrices) is inherited from Section 8 of RFC 5510. Sections 4-7 of RFC 5510, which define RFC 5052-specific formats and procedures for object delivery, are not used and are replaced by the FECFRAME-specific formats defined in this document.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
