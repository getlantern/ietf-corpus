document: rfc-4425
kind: normative-requirement
summary: If best-effort service is used, senders MUST monitor packet loss to ensure the rate is within acceptable parameters, defined as not worse than a TCP flow under the same network conditions. Adaptation may include rate switching at random access point boundaries or discarding non-reference B-frames.
section: "8"
rfc2119_level: MUST
topics:
    - congestion
    - rtp
    - realtime
