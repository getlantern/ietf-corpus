document: rfc-2851
kind: interoperability-note
summary: For IPv6 MIB migration, it may be valid to define separate tables for different address types rather than extending existing tables. For example, TCP-MIB kept tcpConnTable intact and added a new IPv6 table in IPV6-TCP-MIB; but even new tables SHOULD use these textual conventions.
section: "1"
topics:
