summary: The read-only database container stores the full TIE list keyed by (tie-direction-type, originator, tie-type, tie-number). Node TIEs include neighbor adjacencies, capabilities, overload-flag, miscabled-links, same-plane-tofs, and fabric-id; prefix TIEs hold prefix attributes; key-value TIEs hold binary key/value pairs.
