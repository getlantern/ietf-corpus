document: rfc-9594
kind: protocol-element
summary: Group rekeying can be performed point-to-point (Section 6.1), where the KDC sends new keying material individually to each group member via their 'control_uri', or one-to-many (Section 6.2), where the KDC uses a group communication channel and protects the rekeying messages with a rekeying-scheme-specific protection mechanism registered in the ACE Groupcomm Rekeying Schemes registry.
section: "6"
topics:
    - security
    - crypto
