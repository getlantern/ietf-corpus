document: rfc-6917
kind: security-consideration
summary: The MRB Publish interface exposes consumed resource information (in addition to available resources) for monitoring purposes; implementations must take security implications into account, as unauthorized access to this data could expose internal infrastructure state. Access controls should be applied to restrict who can query consumed-resource data.
section: "5.1"
topics:
    - security
    - realtime
