document: rfc-1172
kind: normative-requirement
summary: Synchronous PPP implementations MUST always accept an Async-Control-Character-Map Configuration Option (MUST respond with Configure-Ack) to enable sync-to-async converters; the sync implementation itself does no character mapping since it uses bit-stuffing.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
