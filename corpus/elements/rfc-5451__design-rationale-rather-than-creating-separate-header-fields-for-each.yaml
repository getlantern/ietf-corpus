document: rfc-5451
kind: design-rationale
summary: Rather than creating separate header fields for each authentication class (as SPF did with Received-SPF and DomainKeys did with DomainKey-Status), this proposal groups all authentication results into a single extensible header field to provide a common location and framework for reporting new methods as they emerge.
section: "1"
topics:
