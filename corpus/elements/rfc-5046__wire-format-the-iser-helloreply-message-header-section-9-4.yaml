document: rfc-5046
kind: wire-format
summary: The iSER HelloReply Message header (Section 9.4, Figure 5) carries the negotiated iSER protocol version and the target's iSER-ORD value. It is encapsulated in a SendSE RDMA message and is the mandatory first message sent by the target after receiving the Hello.
