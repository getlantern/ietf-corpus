document: rfc-4575
kind: normative-requirement
summary: If a received NOTIFY's 'version' number is more than one higher than the local version, the subscriber MUST generate a subscription refresh to trigger a full state notification. If exactly one higher, the local state is updated incrementally.
section: "4.6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
