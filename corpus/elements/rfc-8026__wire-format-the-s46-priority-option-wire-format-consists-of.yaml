document: rfc-8026
kind: wire-format
summary: The S46 Priority Option wire format consists of a 16-bit option-code field (value 111), a 16-bit option-length (>=2 and a multiple of 2, in octets), followed by one or more 16-bit s46-option-code fields. The option-length must be at least 2 octets.
section: "1.3"
