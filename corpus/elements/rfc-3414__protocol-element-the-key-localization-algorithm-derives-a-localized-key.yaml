document: rfc-3414
kind: protocol-element
summary: The Key Localization Algorithm derives a localized key Kul for user U at authoritative engine E by computing H(Ku || snmpEngineID || Ku), where H is the hash function of the authentication protocol. This ensures user keys differ across engines even when a single password is used.
section: "2.6"
