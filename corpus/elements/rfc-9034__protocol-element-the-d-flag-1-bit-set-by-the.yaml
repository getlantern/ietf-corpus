document: rfc-9034
kind: protocol-element
summary: 'The D flag (1 bit) set by the sender specifies the forwarding action when a 6LoWPAN Router detects that the deadline time has elapsed: D=1 mandates packet drop; D=0 permits exception-based forwarding if the node is not resource-constrained and downstream nodes may benefit (e.g., for delay measurements or interpolation).'
section: "5"
topics:
