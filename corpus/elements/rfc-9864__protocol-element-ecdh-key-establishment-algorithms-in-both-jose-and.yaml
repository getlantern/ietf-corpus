document: rfc-9864
kind: protocol-element
summary: ECDH key establishment algorithms in both JOSE and COSE (ECDH-ES and ECDH-SS) remain polymorphic because they do not specify the elliptic curve for the ephemeral or static key. This specification does not deprecate them since replacements are not provided; future specifications could register fully-specified ECDH variants.
section: "3.2"
topics:
    - jose
    - crypto
