document: rfc-4512
kind: normative-requirement
summary: When creating an entry or adding an 'objectClass' value, all superclasses of the named classes SHALL be implicitly added if not already present. Servers SHALL also restrict modifications that would delete superclasses of remaining objectClass values.
section: "3.3"
rfc2119_level: MUST
