document: rfc-7473
kind: normative-requirement
summary: The SAC capability SHOULD be enabled for Prefix-LSPs only when it is desirable to disable all prefix label bindings. For scenarios requiring filtering of a subset of bindings, existing label binding filtering policies should be used instead.
