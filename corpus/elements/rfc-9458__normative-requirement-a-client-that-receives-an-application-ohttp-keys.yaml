document: rfc-9458
kind: normative-requirement
summary: A Client that receives an 'application/ohttp-keys' object with encoding errors MUST discard the entire incorrectly encoded key configuration collection; partial recovery could allow the collection to be used to segregate Clients.
section: "3.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - privacy
