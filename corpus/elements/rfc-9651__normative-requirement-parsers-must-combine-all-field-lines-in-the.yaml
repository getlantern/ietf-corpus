document: rfc-9651
kind: normative-requirement
summary: Parsers MUST combine all field lines in the same section that case-insensitively match the field name into one comma-separated field-value before parsing, per HTTP Section 5.2. Individual members of Lists and Dictionaries cannot be safely split across multiple field lines; Strings split across lines will have unpredictable results.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
