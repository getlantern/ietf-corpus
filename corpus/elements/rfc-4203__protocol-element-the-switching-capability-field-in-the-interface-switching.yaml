document: rfc-4203
kind: protocol-element
summary: 'The Switching Capability field in the Interface Switching Capability Descriptor encodes interface switching types: PSC-1 through PSC-4 (values 1–4), L2SC (51), TDM (100), LSC (150), and FSC (200). L2SC and LSC have no Switching Capability-specific information field.'
