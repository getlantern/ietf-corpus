document: rfc-5190
kind: normative-requirement
summary: An implementation of MIDCOM-MIB SHOULD configure a notification target for each MIDCOM client with access to midcomRuleTable, with individual entries in snmpNotifyFilterProfileTable per client, and SHOULD allow clients to start and stop notification generation targeted at themselves by granting write access to snmpNotifyFilterType.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - snmp
