document: rfc-6110
kind: protocol-element
summary: NETMOD-specific annotations are XML elements and attributes qualified with namespace URI 'urn:ietf:params:xml:ns:netmod:dsdl-annotations:1'. They include attributes such as @nma:config, @nma:default, @nma:if-feature, @nma:implicit, @nma:key, @nma:leaf-list, @nma:leafref, @nma:mandatory, @nma:min-elements, @nma:max-elements, @nma:ordered-by, @nma:status, @nma:unique, @nma:units, @nma:when, and elements such as <nma:must>, <nma:error-app-tag>, <nma:error-message>, and <nma:instance-identifier>.
section: "5.3"
topics:
    - yang
    - netconf
