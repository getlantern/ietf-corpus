document: rfc-7603
kind: privacy-consideration
summary: Power monitoring and management MIBs may have privacy implications, as noted in RFC 7460 Section 10 and RFC 7461 Section 6. Additional privacy considerations may arise for each specific use case (e.g., occupancy inference from building energy data), but these are not analyzed in this applicability statement.
section: "6"
topics:
    - privacy
    - snmp
