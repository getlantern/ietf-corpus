document: rfc-9127
kind: protocol-element
summary: 'The ietf-bfd-mpls module defines two additional encapsulation type identities: ''encap-gach'' (BFD with G-ACh encapsulation per RFC 5586) and ''encap-ip-gach'' (BFD with IP and G-ACh encapsulation), extending the base ''encap-type'' identity from ietf-bfd-types.'
