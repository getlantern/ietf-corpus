document: rfc-6638
kind: protocol-element
summary: 'The SCHEDULE-AGENT iCalendar property parameter on ATTENDEE or ORGANIZER properties controls who handles scheduling message delivery: SERVER (default — the CalDAV server delivers), CLIENT (the client handles delivery itself), or NONE (no scheduling messages sent). It governs which iTIP method the server sends for each operation.'
section: "7.1"
topics:
    - http
