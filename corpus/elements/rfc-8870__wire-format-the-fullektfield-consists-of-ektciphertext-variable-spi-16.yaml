document: rfc-8870
kind: wire-format
summary: 'The FullEKTField consists of: EKTCiphertext (variable), SPI (16-bit), Epoch (16-bit), Length (16-bit), and Message Type byte (0x02). The ShortEKTField is a single zero byte (0x00). Both are appended to the end of the SRTP packet, after the authentication tag.'
