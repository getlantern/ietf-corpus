document: rfc-4893
kind: normative-requirement
summary: When AS_PATH count is greater than or equal to AS4_PATH count, AS path is constructed by taking leading segments from AS_PATH and prepending them to AS4_PATH until the combined path has the same AS count as AS_PATH; valid AS_CONFED_SEQUENCE/SET segments SHALL be prepended if leading or adjacent to a prepended segment.
section: 4.2.3
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
