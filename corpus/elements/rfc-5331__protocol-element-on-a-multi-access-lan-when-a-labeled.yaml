document: rfc-5331
kind: protocol-element
summary: On a multi-access LAN, when a labeled packet has an ether type of 'upstream label assignment', the top label is used as a context label identifying the upstream LSR's label space. The second label in the stack is the upstream-assigned label L to be looked up in that context.
