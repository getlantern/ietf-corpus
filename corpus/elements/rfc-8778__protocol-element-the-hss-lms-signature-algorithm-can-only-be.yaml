document: rfc-8778
kind: protocol-element
summary: The HSS/LMS signature algorithm can only be used for a fixed number of signing operations determined by the tree size. When all LM-OTS signatures have been used, a new trust anchor must be established. Signers must maintain state across invocations to ensure no tree node is used to generate more than one signature.
section: "5"
topics:
    - crypto
