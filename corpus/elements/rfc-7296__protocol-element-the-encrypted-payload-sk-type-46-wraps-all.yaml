document: rfc-7296
kind: protocol-element
summary: The Encrypted Payload (SK, type 46) wraps all subsequent message payloads after IKE_SA_INIT. Encryption uses SK_e and integrity uses SK_a, derived from SKEYSEED with separate keys per direction. Every IKE_AUTH, CREATE_CHILD_SA, and INFORMATIONAL message body is entirely encapsulated.
section: "3.14"
topics:
