document: rfc-3892
kind: normative-requirement
summary: When including the To header field in the token (which identifies the referee), the referrer MUST have cryptographically identified the referee first, e.g., via TLS certificate inspection or S/MIME encryption of the Refer-To header.
section: "4"
rfc2119_level: SHOULD NOT
