document: rfc-1532
kind: wire-format
summary: 'The BOOTP message format is a fixed-layout UDP payload of at minimum 300 octets, with fields: op (1), htype (1), hlen (1), hops (1), xid (4), secs (2), flags (2), ciaddr (4), yiaddr (4), siaddr (4), giaddr (4), chaddr (16), sname (64), file (128), vend (64). The ''flags'' field replaces the previously ''unused'' two-octet field between ''secs'' and ''ciaddr''.'
section: "2.2"
