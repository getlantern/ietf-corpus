document: rfc-2461
kind: normative-requirement
summary: The Target Link-Layer Address option MUST be included in Neighbor Advertisements responding to multicast solicitations on link layers that have addresses, to prevent infinite NS recursion. When responding to unicast solicitations, including this option SHOULD be done but is not strictly required.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
