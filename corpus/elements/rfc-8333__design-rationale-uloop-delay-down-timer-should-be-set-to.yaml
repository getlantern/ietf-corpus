document: rfc-8333
kind: design-rationale
summary: ULOOP_DELAY_DOWN_TIMER should be set to the maximum IGP convergence time observed in the network (typically the slowest node), so that the delay is sufficient to allow all neighbors to converge before the local node updates its FIB.
