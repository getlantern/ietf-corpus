document: rfc-7394
kind: design-rationale
summary: 'The TTL TLV is introduced because existing LSP-Ping mechanisms cannot verify connectivity of a segment of an MS-PW or bidirectional co-routed LSP from an intermediate node: the receiver needs to know the hop-count distance of the originator to set the correct TTL on the Echo Reply so it is intercepted at the originating node rather than at the endpoint.'
section: "1"
topics:
