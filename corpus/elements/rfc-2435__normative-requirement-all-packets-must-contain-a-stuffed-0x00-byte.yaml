document: rfc-2435
kind: normative-requirement
summary: All packets MUST contain a 'stuffed' 0x00 byte following any true 0xFF byte generated by the entropy coder. Restart markers MUST NOT appear anywhere other than on MCU boundaries at the defined interval.
section: 3.1.9
rfc2119_level: MUST
topics:
