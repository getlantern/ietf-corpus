document: rfc-5256
kind: protocol-element
summary: 'The REFERENCES threading algorithm builds parent/child relationships from References and In-Reply-To headers. It consists of six steps: (1) link messages via reference chains; (2) gather parentless messages under a dummy root; (3) prune dummy messages; (4) sort top-level threads by sent date; (5) merge threads with identical base subjects; (6) recursively sort sibling sets by sent date.'
section: "3"
topics:
