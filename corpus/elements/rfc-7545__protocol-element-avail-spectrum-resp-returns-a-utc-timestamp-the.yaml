document: rfc-7545
kind: protocol-element
summary: AVAIL_SPECTRUM_RESP returns a UTC timestamp, the echoed deviceDesc, and a required spectrumSpecs list of one or more SpectrumSpec elements. Each SpectrumSpec contains a ruleset identifier and a list of SpectrumSchedule entries specifying permissible EIRP power levels over disjoint, sorted time intervals.
section: 4.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
