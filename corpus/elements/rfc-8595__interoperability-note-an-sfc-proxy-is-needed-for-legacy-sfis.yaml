document: rfc-8595
kind: interoperability-note
summary: An SFC proxy is needed for legacy SFIs that are not SFC-aware; the proxy strips and reimposed MPLS SFC encapsulation. Metadata delivery requires specific handling when an SFC proxy is in use, regardless of whether NSH or MPLS encoding is used.
