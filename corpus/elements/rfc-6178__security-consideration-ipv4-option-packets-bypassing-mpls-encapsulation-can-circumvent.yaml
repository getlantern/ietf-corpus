document: rfc-6178
kind: security-consideration
summary: IPv4 option packets bypassing MPLS encapsulation can circumvent LSP DiffServ tunnels (RFC 3270) and MPLS CoS marking policies at ingress LERs, enabling DoS against high-priority traffic classes within the MPLS core and potential theft of high-priority services.
section: "5.1"
topics:
    - mpls
    - ip
    - security
    - diffserv
