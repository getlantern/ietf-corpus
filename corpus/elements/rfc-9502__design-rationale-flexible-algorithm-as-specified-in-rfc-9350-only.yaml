document: rfc-9502
kind: design-rationale
summary: Flexible Algorithm as specified in RFC 9350 only computes paths to SR MPLS Prefix SIDs and SRv6 Locators, meaning it cannot be deployed without SR or SRv6. This document extends Flexible Algorithm to compute paths to regular IPv4 and IPv6 prefixes, removing the SR dependency.
section: "1"
topics:
    - routing
    - ip
