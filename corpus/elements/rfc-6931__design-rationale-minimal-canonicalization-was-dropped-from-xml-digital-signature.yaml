document: rfc-6931
kind: design-rationale
summary: Minimal Canonicalization was dropped from XML Digital Signature when advancing from RFC 3075 to RFC 3275 because two independent interoperable implementations had not been demonstrated. The URI 'http://www.w3.org/2000/09/xmldsig#minimal' is retained here to preserve the original namespace despite continued interest.
section: "2.4"
topics:
