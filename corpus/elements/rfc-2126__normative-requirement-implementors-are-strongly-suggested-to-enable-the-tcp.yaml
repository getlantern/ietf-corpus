document: rfc-2126
kind: normative-requirement
summary: Implementors are strongly suggested to enable the TCP keep-alive mechanism so that unexpected termination of the underlying TCP connection is reported to the ISO transport protocol, which relies on the network service provider for such notification.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
