document: rfc-6277
kind: security-consideration
summary: In archival applications querying certificate status for dates in the distant past, a responder MUST NOT generate a signature using a signing mechanism that is no longer considered acceptably secure, even if the certificate itself used that mechanism.
section: "7.1"
topics:
    - pkix
    - crypto
    - security
