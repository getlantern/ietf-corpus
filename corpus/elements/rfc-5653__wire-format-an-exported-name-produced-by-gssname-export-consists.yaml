document: rfc-5653
kind: wire-format
summary: An exported name produced by GSSName.export() consists of a header containing an OID identifying the authenticating mechanism followed by a mechanism-specific name trailer whose syntax is defined by that mechanism. It may be re-imported via the byte-array GSSName constructor with NT_EXPORT_NAME as the name-type OID.
section: "5.13"
topics:
    - security
