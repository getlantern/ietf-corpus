document: rfc-9489
kind: design-rationale
summary: The egress PE can distinguish EVPN VPWS from regular EVPN instances because the EVI identified by the RD for EVPN VPWS is different from the EVI assigned for EVPN, allowing the same Ethernet A-D sub-TLV format to serve both use cases.
