document: rfc-927
kind: protocol-element
summary: 'IAC WILL TUID: sent by the TELNET user to propose authenticating the user and sending the identifying UUID, or to agree to do so. IAC WON''T TUID: sent by the TELNET user to refuse authentication. IAC DO TUID: sent by the TELNET server to request UUID authentication. IAC DON''T TUID: sent by the TELNET server to refuse accepting UUID authentication.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
