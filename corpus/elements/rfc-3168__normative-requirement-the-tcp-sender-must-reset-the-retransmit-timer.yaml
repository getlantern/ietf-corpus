document: rfc-3168
kind: normative-requirement
summary: The TCP sender MUST reset the retransmit timer on receiving an ECN-Echo ACK when the congestion window is one MSS, in order to further reduce the sending rate below one packet per RTT.
section: 6.1.2
rfc2119_level: MUST
topics:
    - ecn
    - tcp
    - congestion
