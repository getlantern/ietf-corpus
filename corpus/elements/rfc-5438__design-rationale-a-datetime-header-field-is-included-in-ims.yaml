document: rfc-5438
kind: design-rationale
summary: A DateTime header field is included in IMs and echoed in IMDNs to allow human-level correlation on devices with limited state retention (e.g., mobile devices that lose power or purge sent items), since the spec does not mandate that the IM Sender keep state.
section: 7.1.1.2
topics:
    - realtime
    - sip
