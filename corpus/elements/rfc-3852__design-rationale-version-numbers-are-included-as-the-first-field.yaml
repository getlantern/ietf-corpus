document: rfc-3852
kind: design-rationale
summary: Version numbers are included as the first field in each major data structure to avoid ASN.1 decode errors. The lowest version number supporting the generated syntax is always used to maximize interoperability; higher version numbers are reserved for when new syntax features are actually employed.
section: "1.3"
topics:
