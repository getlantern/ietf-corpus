document: rfc-7472
kind: security-consideration
summary: An 'ipps' URI might be faked to point to a rogue IPP secure print service, collecting confidential job metadata or document contents. Server authentication mechanisms in RFC 2910, RFC 7230, and TLS/1.2 can be used to address this threat.
section: 6.2.1
topics:
    - security
    - tls
