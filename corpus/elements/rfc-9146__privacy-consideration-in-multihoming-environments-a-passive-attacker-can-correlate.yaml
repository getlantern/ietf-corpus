document: rfc-9146
kind: privacy-consideration
summary: In multihoming environments, a passive attacker can correlate communication over multiple paths using the CID. The absence of a CID update mechanism makes DTLS 1.2 CIDs unsuitable for mobility; deployments concerned about correlation SHOULD refuse to use CIDs in DTLS 1.2 and switch to DTLS 1.3.
section: "8"
rfc2119_level: SHOULD
topics:
    - tls
    - privacy
