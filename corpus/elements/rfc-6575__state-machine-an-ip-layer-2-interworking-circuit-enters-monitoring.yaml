document: rfc-6575
kind: state-machine
summary: An IP Layer 2 Interworking Circuit enters monitoring state immediately after configuration. In this state it performs CE IP discovery and PW establishment in parallel. Unicast IP frames are only propagated between AC and PW once CE IP devices on both sides are discovered and proxy functions are complete; before that, only broadcast/multicast frames are forwarded and unicast datagrams are dropped.
section: "4"
