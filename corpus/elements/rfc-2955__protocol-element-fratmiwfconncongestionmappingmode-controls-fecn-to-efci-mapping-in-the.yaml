document: rfc-2955
kind: protocol-element
summary: frAtmIwfConnCongestionMappingMode controls FECN-to-EFCI mapping in the FR-to-ATM direction. mode1 maps the Q.922 FECN field to the ATM EFCI field; mode2 does not map FECN and always sets EFCI to 'congestion not experienced'. In both modes the IWF may set EFCI if it itself experiences ATM congestion.
section: "4.2"
topics:
    - snmp
