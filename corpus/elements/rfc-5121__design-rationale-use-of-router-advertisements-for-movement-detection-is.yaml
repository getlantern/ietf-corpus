document: rfc-5121
kind: design-rationale
summary: Use of router advertisements for movement detection is not recommended for MNs connected via 802.16 links because the frequency of periodic RAs would need to be impractically high. Instead, link triggers or other means are preferred for detecting attachment changes.
section: "8.1"
topics:
