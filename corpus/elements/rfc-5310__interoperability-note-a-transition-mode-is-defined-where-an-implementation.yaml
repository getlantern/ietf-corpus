document: rfc-5310
kind: interoperability-note
summary: A transition mode is defined where an implementation includes CRYPTO_AUTH information in PDUs but does not verify it, to aid migration from older authentication schemes to CRYPTO_AUTH-based authentication. Operators must ensure this mode is only used during migration as it leaves routers vulnerable.
section: "3.5"
topics:
    - routing
    - security
