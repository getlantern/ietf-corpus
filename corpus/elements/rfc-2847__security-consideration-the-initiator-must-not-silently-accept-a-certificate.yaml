document: rfc-2847
kind: security-consideration
summary: The initiator MUST NOT silently accept a certificate signed by an unknown or untrusted CA when verifying the SPKM-3 target's rep-ti-integ; if it wishes to accept such a certificate, it MUST obtain explicit confirmation from the user.
