summary: 'The FUTURERELEASE keyword has been added to the IANA SMTP Service Extensions registry on the Mail Parameters Web page. Two new Enhanced Mail System Status Codes are defined: X.7.16 (per-user future-release quota exceeded) and X.7.17 (system future-release quota exceeded), updating RFC 3463.'
