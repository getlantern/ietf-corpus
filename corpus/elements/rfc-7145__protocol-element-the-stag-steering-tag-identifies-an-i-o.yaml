document: rfc-7145
kind: protocol-element
summary: The STag (Steering Tag) identifies an I/O Buffer unique to an RDMA-Capable Controller. The initiator Advertises the STag and Base Offset in the iSER header of the Send Message containing the SCSI Command PDU, enabling the target to perform RDMA Reads (for SCSI Writes) or RDMA Writes (for SCSI Reads) directly into/from the initiator's buffer.
section: 1.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
