document: rfc-1364
kind: normative-requirement
summary: For backward compatibility, the Automatic bit must default to 0 and a mechanism must exist to enable automatic tag generation. Nothing must be inferred about OSPF route characteristics from tag bits unless the tag was automatically generated.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
