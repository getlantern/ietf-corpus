document: rfc-8183
kind: design-rationale
summary: 'The BPKI (Business PKI) is entirely separate from the RPKI: it holds X.509 certificates used to authenticate CMS-wrapped provisioning and publication protocol messages, contains no RFC 3779 resources, and is likely to follow existing contractual relationships between parties.'
