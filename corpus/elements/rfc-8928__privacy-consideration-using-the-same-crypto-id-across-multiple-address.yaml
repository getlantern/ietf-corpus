document: rfc-8928
kind: privacy-consideration
summary: Using the same Crypto-ID across multiple address registrations enables an attacker observing registrations to correlate traffic to the same 6LN. The Modifier field enables multiple Crypto-IDs per key pair, improving privacy; however, if 6LR state is compromised, the shared public key still links the registrations.
section: "7.9"
topics:
    - privacy
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
