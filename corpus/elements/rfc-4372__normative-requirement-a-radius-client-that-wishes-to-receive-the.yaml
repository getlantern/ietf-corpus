document: rfc-4372
kind: normative-requirement
summary: A RADIUS client that wishes to receive the CUI attribute in an Access-Accept MUST include a CUI attribute in the Access-Request packet; for initial authentication the CUI string is set to a single NUL character.
section: "2.1"
rfc2119_level: MUST
topics:
    - radius
