document: rfc-5129
kind: protocol-element
summary: When an interior LSR experiences congestion and the packet's EXP codepoint maps to an ECN-capable PHB, the CM state is set in the EXP field irrespective of whether the packet is already in the CM state. If the buffer is full, the packet is dropped.
section: "4.3"
topics:
    - mpls
    - ecn
    - congestion
