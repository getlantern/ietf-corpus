document: rfc-2401
kind: normative-requirement
summary: A host MUST support both transport and tunnel mode. A security gateway is required to support only tunnel mode; if it supports transport mode, that should be used only when the gateway is acting as a host (e.g., for network management).
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
