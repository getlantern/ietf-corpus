document: rfc-3986
kind: normative-requirement
summary: When a scheme-specific parser encounters a URI violating scheme-specific restrictions, it SHOULD flag the reference as an error rather than silently ignoring unused parts, to reduce equivalent URIs and detect potential misleading constructions.
section: "3.1"
rfc2119_level: SHOULD
