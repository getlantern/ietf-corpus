document: rfc-9721
kind: normative-requirement
summary: For interoperability with non-compliant PEs that advertise independent sequence numbers for MAC and MAC+IP routes, the sequence number associated with a remote MAC route MUST be computed as the highest of all received sequence numbers across remote MAC+IP and MAC routes with the same MAC address, and MUST be re-computed on any MAC or MAC+IP route withdrawal.
section: "6.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
