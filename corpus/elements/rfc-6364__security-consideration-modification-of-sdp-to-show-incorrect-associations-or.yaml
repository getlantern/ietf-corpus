document: rfc-6364
kind: security-consideration
summary: Modification of SDP to show incorrect associations or groupings of source and repair flows can cause FEC protection failures or mishandling of media streams. Receivers are RECOMMENDED to perform an integrity check on SDP and only trust SDP from trusted sources; receivers MUST also follow RFC 4566 security considerations.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
