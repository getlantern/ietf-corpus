document: rfc-3367
kind: protocol-element
summary: The Query object encapsulates all query components. A Query cannot be empty and must contain either exactly one common name or exactly one ID, plus optional custom properties. Multiple different properties are ANDed; multiple instances of the same property are ORed.
section: 4.2.1
