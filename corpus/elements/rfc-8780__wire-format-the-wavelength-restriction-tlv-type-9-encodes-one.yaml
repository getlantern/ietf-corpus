document: rfc-8780
kind: wire-format
summary: 'The Wavelength Restriction TLV (Type 9) encodes one or more tuples of: Action (8 bits, 0=Inclusive List, 1=Inclusive Range), Count (8 bits, number of link identifiers), Reserved (16 bits), Link Identifiers (variable), and Wavelength Constraint (variable). Multiple action/restriction groups may be chained.'
