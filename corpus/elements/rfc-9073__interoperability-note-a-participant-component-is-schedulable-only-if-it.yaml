document: rfc-9073
kind: interoperability-note
summary: A PARTICIPANT component is schedulable only if it contains a CALENDAR-ADDRESS property whose value exactly matches the value of an ATTENDEE property in the same calendar component. Without this match, the participant does not take part in iTIP scheduling operations.
section: 7.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
