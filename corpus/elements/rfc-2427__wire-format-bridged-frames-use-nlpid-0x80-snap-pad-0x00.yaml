document: rfc-2427
kind: wire-format
summary: 'Bridged frames use NLPID 0x80 (SNAP), pad 0x00, OUI 0x00-80-C2 (IEEE 802.1), and a PID that identifies the MAC frame type and whether the original LAN FCS is preserved. PIDs with preserved FCS: 0x00-01 (802.3/Ethernet), 0x00-02 (802.4), 0x00-03 (802.5), 0x00-04 (FDDI); without FCS: 0x00-07 through 0x00-0B.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
