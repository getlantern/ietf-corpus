document: rfc-8782
kind: normative-requirement
summary: The 'cdid' attribute MUST NOT be generated by DOTS clients. DOTS servers MUST ignore 'cdid' attributes directly supplied by source DOTS clients or client-domain gateways. The first on-path server-domain DOTS gateway inserts 'cdid'; multiple server-domain gateways cannot each insert a value.
section: 4.4.1
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
