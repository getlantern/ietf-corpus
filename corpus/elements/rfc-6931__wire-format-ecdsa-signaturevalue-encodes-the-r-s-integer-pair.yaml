kind: wire-format
summary: ECDSA SignatureValue encodes the (r, s) integer pair by concatenating their I2OSP octet-stream representations, each of length equal to the base point order size in bytes (e.g., 32 bytes for P-256, 66 bytes for P-521), then base64-encoding the result.
