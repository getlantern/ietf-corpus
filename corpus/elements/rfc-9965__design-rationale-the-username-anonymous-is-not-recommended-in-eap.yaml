document: rfc-9965
kind: design-rationale
summary: The username 'anonymous' is NOT RECOMMENDED in EAP Provisioning Identifiers even though RFC 7542 permits it, because 'anonymous' is already widely used in NAIs and would cause confusion between provisioning and regular anonymous authentication.
section: "3.3"
topics:
    - security
