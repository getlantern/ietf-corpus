document: rfc-5807
kind: security-consideration
summary: Channel binding is achieved because the EP's device identifier (EPID) is incorporated into the PEMK key derivation function. A malicious EP advertising a different identifier than what is registered with the PAA will cause the secure association protocol to fail due to mismatched PEMK values.
section: "4.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
