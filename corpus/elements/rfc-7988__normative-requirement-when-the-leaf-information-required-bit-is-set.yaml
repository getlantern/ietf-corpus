document: rfc-7988
kind: normative-requirement
summary: When the Leaf Information Required bit is set in a PTA specifying IR, the Tunnel Identifier field has no significance and MUST be ignored upon reception. Its length MUST still equal the length of an IP address in the SP backbone's address space, and it is RECOMMENDED that it be set to a routable address of the PTA's constructor.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
