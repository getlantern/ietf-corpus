document: rfc-2747
kind: normative-requirement
summary: During message reception, if the computed digest does not match the received digest, the message MUST be discarded without further processing. Sequence numbers are then validated to prevent replay attacks; messages with invalid sequence numbers are ignored.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
