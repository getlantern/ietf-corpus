document: rfc-5605
kind: design-rationale
summary: An ATM PW connection is not treated as an interface and therefore is not represented in the ifTable. This follows the PWE3 Architecture layering model, which isolates PW services from the underlying PSN while connecting them to existing ATM MIB structures.
