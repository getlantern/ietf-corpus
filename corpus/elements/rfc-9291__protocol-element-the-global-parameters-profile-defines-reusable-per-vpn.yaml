summary: The 'global-parameters-profile' defines reusable per-VPN-service parameters including Route Distinguisher assignment modes (directly-assigned, from-pool, full-auto, suffix-auto, no-rd), VPN route targets, local ASN, service MTU, CE VLAN preservation, CE VLAN CoS preservation, control-word negotiation, MAC address limit, MAC loop prevention, and multicast tree flavor.
