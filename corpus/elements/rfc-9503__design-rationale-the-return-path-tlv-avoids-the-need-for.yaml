document: rfc-9503
kind: design-rationale
summary: The Return Path TLV avoids the need for signaling and maintaining dynamic SR network state for STAMP sessions on the Session-Reflector, particularly for Stateless Session-Reflectors operating in promiscuous mode that require explicit indication of how to return the test packet (e.g., in ECMP environments).
