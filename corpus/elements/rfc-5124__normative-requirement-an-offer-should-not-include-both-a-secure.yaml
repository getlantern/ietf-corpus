document: rfc-5124
kind: normative-requirement
summary: An offer SHOULD NOT include both a secure alternative (SAVP or SAVPF) and an insecure alternative (AVP or AVPF) in the same offer, as this may enable bidding-down attacks. If both are offered (e.g., for best-effort SRTP), the negotiation signaling MUST be protected appropriately.
section: 3.3.1
rfc2119_level: SHOULD NOT
topics:
    - rtp
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
