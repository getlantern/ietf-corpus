document: rfc-8415
kind: protocol-element
summary: 'The DHCP Unique Identifier (DUID) identifies each DHCP participant and consists of a 2-octet type code followed by 1–128 octets of identifier. Four types are defined: DUID-LLT (1, link-layer plus time), DUID-EN (2, vendor enterprise number), DUID-LL (3, link-layer only), and DUID-UUID (4).'
section: "11.1"
