document: rfc-7978
kind: wire-format
summary: 'The Extended RBridge Channel header extension occupies the Channel-Protocol-Specific Data area when Channel Protocol equals 0x004. It contains four nibble-sized fields: SubERR (4 bits), RESV4 (4 bits), SType (4 bits), and PType (4 bits), followed by variable-length Security Information and variable-length Tunneled Data.'
