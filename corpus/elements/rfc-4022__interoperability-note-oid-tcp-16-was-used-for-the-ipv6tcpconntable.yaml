document: rfc-4022
kind: interoperability-note
summary: OID { tcp 16 } was used for the ipv6TcpConnTable in the now-obsoleted RFC 2452; it MUST NOT be reused. The deprecated tcpMIBCompliance (IPv4-only) is retained to interoperate with deployed managers, even though tcpMIBCompliance2 is the current statement.
section: "3"
topics:
