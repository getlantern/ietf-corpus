document: rfc-1091
kind: normative-requirement
summary: Terminal type names SHOULD conform to the list in the Assigned Numbers RFC to minimize confusion from alternative spellings (e.g., "IBM3278-2" vs. "IBM-3278/2"). The authoritative and up-to-date list is maintained in Assigned Numbers.
section: "6"
rfc2119_level: SHOULD
