document: rfc-4555
kind: normative-requirement
summary: The MOBIKE_SUPPORTED notification data field MUST be left empty (zero-length) when sending, and its contents (if any) MUST be ignored when received. This allows the field to be used by future versions of the protocol.
section: 4.2.1
rfc2119_level: MUST
topics:
