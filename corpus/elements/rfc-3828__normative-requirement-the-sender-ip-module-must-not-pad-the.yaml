document: rfc-3828
kind: normative-requirement
summary: The sender IP module MUST NOT pad the IP payload with extra octets, because the length of the UDP-Lite payload delivered to the receiver depends on the IP payload length.
section: "3.4"
rfc2119_level: MUST NOT
