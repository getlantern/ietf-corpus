document: rfc-3288
kind: design-rationale
summary: The BEEP profile for SOAP does not use the BEEP 'ERR' message for SOAP faults in one-to-one exchanges. Whatever response the server generates—including fault envelopes—is always returned in the 'RPY' message, keeping SOAP-level error semantics separate from BEEP transport-level errors.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
