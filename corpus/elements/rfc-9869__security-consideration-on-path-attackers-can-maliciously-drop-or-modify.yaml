document: rfc-9869
kind: security-consideration
summary: On-path attackers can maliciously drop or modify probe packets to artificially decrease the PMTU or to black-hole traffic. Using an unpredictable token value for each probe packet mitigates the ability of an on-path observer to forge probe acknowledgements.
section: "8"
topics:
