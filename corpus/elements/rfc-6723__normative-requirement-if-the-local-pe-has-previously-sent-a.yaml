document: rfc-6723
kind: normative-requirement
summary: If the local PE has previously sent a Label Mapping message, it MUST send a Label Withdraw message to the remote PE and wait until it receives a Label Release message from the remote PE before proceeding. The Label Release and Label Withdraw sends do not require a specific sequence relative to each other.
section: "4"
rfc2119_level: MUST
topics:
    - realtime
    - mpls
