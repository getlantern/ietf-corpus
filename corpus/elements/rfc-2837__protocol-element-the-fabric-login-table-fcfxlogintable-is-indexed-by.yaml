summary: 'The Fabric Login Table (fcFxLoginTable) is indexed by {fcFeModuleIndex, fcFxPortIndex, fcFxPortNxLoginIndex} and records service parameters agreed during the most recent Fabric Login for each attached NxPort: FC-PH version agreed, NxPort BB_Credit, NxPort receive data field size, agreed CoS, intermix, stacked connect mode, sequential delivery, NxPort name, connected NxPort address, and BB_Credit model.'
