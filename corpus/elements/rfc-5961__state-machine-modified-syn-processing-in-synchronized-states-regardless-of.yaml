document: rfc-5961
kind: state-machine
summary: 'Modified SYN processing in synchronized states: regardless of sequence number, always send a challenge ACK and drop the segment. A legitimate restarted peer receiving the challenge ACK will send a RST (no TCB exists), which — if valid — causes the local endpoint to close and await SYN retransmission.'
section: "4.2"
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
