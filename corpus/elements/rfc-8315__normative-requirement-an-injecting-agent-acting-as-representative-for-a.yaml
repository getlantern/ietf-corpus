document: rfc-8315
kind: normative-requirement
summary: An injecting agent acting as representative for a posting agent without Cancel-Lock support MUST be able to positively authenticate the poster and MUST automatically add a working Cancel-Key header field for all cancel/supersede proto-articles from that poster.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
