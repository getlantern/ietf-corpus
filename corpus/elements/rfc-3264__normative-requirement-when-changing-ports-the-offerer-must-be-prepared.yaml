document: rfc-3264
kind: normative-requirement
summary: When changing ports, the offerer MUST be prepared to receive media on both old and new ports as soon as the offer is sent, and MUST NOT cease listening on the old port until media arrives on the new port.
section: 8.3.1
rfc2119_level: MUST
topics:
    - realtime
    - rtp
