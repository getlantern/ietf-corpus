document: rfc-6391
kind: security-consideration
summary: Setting the TTL of the flow LSE to 1 prevents accidental forwarding of a packet based on the flow label value if, due to an error, the flow LSE becomes the top of the MPLS label stack. The flow LSE is at the bottom of the stack so it will normally always be preceded by the PW label at the PE.
section: "1.3"
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
