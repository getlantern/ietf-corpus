document: rfc-8311
kind: normative-requirement
summary: DCCP CCIDs 2 (RFC 4341), 3 (RFC 4342), and 4 (RFC 5622) are updated so that DCCP-Data and DCCP-DataAck senders MUST set the ECT(0) codepoint unless otherwise specified by an Experimental RFC in the IETF document stream, replacing language that allowed either ECT(0) or ECT(1).
section: "6"
rfc2119_level: MUST
topics:
    - ecn
    - congestion
