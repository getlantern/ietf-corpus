document: rfc-8001
kind: normative-requirement
summary: If adding SRLG information would cause the RRO to exceed its maximum size, the requested SRLGs MUST NOT be added. If the request was in LSP_REQUIRED_ATTRIBUTES, the node MUST drop the RRO entirely per RFC 3209; if in LSP_ATTRIBUTES, it MAY omit some or all SRLGs.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
