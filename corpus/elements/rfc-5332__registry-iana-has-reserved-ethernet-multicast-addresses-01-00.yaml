document: rfc-5332
kind: registry
summary: IANA has reserved ethernet multicast addresses 01-00-5e-80-00-00 through 01-00-5e-8f-ff-ff for use when an ethernet multicast frame carries an MPLS multicast packet. These addresses are valid with ethertype 0x8847 or 0x8848. Ethertypes 0x8847 and 0x8848 are redescribed as 'MPLS' and 'MPLS with upstream-assigned label' respectively.
section: "9"
topics:
