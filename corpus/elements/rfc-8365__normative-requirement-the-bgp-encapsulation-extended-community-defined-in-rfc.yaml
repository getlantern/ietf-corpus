document: rfc-8365
kind: normative-requirement
summary: The BGP Encapsulation Extended Community defined in RFC 5512 MUST be included with all EVPN routes (MAC Advertisement, Ethernet A-D per EVI, Ethernet A-D per ESI, IMET, and Ethernet Segment) advertised by an egress PE to indicate the data-plane encapsulation type.
section: 5.1.3
rfc2119_level: MUST
topics:
    - routing
    - bgp
