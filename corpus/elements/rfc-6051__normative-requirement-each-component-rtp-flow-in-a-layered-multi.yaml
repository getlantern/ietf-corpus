document: rfc-6051
kind: normative-requirement
summary: Each component RTP flow in a layered, multi-description, or multi-view session MUST contain packets corresponding to all sampling instants of the flows on which it depends. If such packets are not naturally present, the sender MUST generate additional packets (e.g., Empty NAL unit packets for H.264 SVC).
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
