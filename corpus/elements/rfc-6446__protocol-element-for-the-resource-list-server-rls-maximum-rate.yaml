document: rfc-6446
kind: protocol-element
summary: For the Resource List Server (RLS) maximum rate mechanism, the rate applies to the aggregate notification stream of the list subscription, not individual constituent events. The RLS buffers state changes and drains the buffer at the max-rate. For full-state notifications, pending notifications are replaced by newer state; for partial-state, state deltas are merged.
section: "5.4"
topics:
    - sip
    - realtime
