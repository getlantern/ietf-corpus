document: rfc-5857
kind: normative-requirement
summary: LARGE_CIDS and FEEDBACK_FOR ROHC channel parameters MUST NOT be signaled via IKEv2; they are set implicitly. LARGE_CIDS is determined by MAX_CID (0 if MAX_CID <= 15), and FEEDBACK_FOR MUST be set to the paired SA in the reverse direction.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - vpn
