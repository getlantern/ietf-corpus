document: rfc-2397
kind: interoperability-note
summary: 'HTML imposes length limits on attribute values that constrain data URL usability: LITLEN (1024) limits a single attribute value literal, ATTSPLEN (2100) limits the sum of all attribute value lengths in a tag, and TAGLEN (2100) limits overall tag length (per RFC 1866).'
