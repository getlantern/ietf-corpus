document: rfc-3891
kind: protocol-element
summary: The Replaces header is a SIP request header defined only for INVITE requests. It contains call-id, to-tag, and from-tag identifying an existing dialog to be shut down and logically replaced by the incoming INVITE. Only a single Replaces header field value may be present in a SIP request.
section: "6.1"
topics:
    - sip
    - realtime
