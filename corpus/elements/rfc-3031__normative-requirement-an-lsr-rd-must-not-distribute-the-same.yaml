document: rfc-3031
kind: normative-requirement
summary: An LSR Rd MUST NOT distribute the same label value L to two different upstream peers for two different FECs (F1 ≠ F2) unless Rd can always determine which upstream peer placed that label on a received packet. This uniqueness constraint ensures unambiguous label interpretation at each hop.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
