document: rfc-9475
kind: security-consideration
summary: 'Store-and-forward messaging systems relying on PASSporTs must account for certificate expiry: a certificate valid when the PASSporT was generated could expire before the user reads the message. Mitigations include storing a signed indicator of validity at receipt time or securely storing the certificate alongside the PASSporT.'
section: "4"
topics:
    - security
    - pkix
    - sip
