document: rfc-4755
kind: design-rationale
summary: RC mode is designed for fabrics with short latencies. Its use over fabrics with long or highly variable latency is a concern because RC lacks measurement-based reliable transmission, potentially causing problems for congestion-aware traffic.
section: "7.1"
topics:
