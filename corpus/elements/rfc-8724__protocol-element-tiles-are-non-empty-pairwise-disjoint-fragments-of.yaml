document: rfc-8724
kind: protocol-element
summary: Tiles are non-empty, pairwise disjoint fragments of a SCHC Packet whose union equals the full SCHC Packet. When windows are used, all windows except the last contain exactly WINDOW_SIZE tiles; tile indices within a window decrement from WINDOW_SIZE-1 downward. The FCN All-1 value marks the very last tile; the FCN All-0 value marks the last tile of a non-last window.
section: 8.2.2
topics:
