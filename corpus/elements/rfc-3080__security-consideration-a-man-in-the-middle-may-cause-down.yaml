document: rfc-3080
kind: security-consideration
summary: A man-in-the-middle may cause down-negotiation to the weakest available cipher suite. A BEEP peer SHOULD be configurable to refuse weak cipher suites, and administrators should carefully choose which ciphersuites are provisioned.
section: "9"
rfc2119_level: SHOULD
