document: rfc-8209
kind: protocol-element
summary: The subjectPublicKeyInfo field in BGPsec Router Certificates is specified by RFC 8208, which defines the BGP-specific algorithms and key formats. This differs from the algorithms used for RPKI CA certificates (RFC 7935).
