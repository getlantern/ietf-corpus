document: rfc-7090
kind: normative-requirement
summary: A PSAP callback MUST use the same media as the original emergency call (e.g., if the initial call used real-time text, the callback must also use real-time text), to accommodate disabilities and intentional media choices of the emergency caller.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
