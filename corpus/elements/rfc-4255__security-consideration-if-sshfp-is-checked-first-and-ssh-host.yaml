document: rfc-4255
kind: security-consideration
summary: If SSHFP is checked first and SSH host key verification can be configured to require SSHFP, then host key rollover is achieved by replacing the SSHFP in DNS, and revocation is achieved by removing it. DNSSEC integrity is essential for these operations.
section: "4"
topics:
