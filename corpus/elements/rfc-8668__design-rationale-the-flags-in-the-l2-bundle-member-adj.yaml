document: rfc-8668
kind: design-rationale
summary: The flags in the L2 Bundle Member Adj-SID sub-TLVs (Types 41 and 42) are deliberately kept congruent with the flags defined for L3 Adj-SID sub-TLVs in RFC 8667. This alignment simplifies implementation and reduces the risk of confusion between L2 and L3 Adj-SID flag interpretations.
section: "4.1"
topics:
    - routing
    - mpls
