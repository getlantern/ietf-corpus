document: rfc-5731
kind: interoperability-note
summary: Domain name internationalization is handled via ACE labels per RFC 3490 (IDNA) at the time of publication, but the document notes these conformance requirements might change as IDN standards progress. Servers MAY restrict allowable domain names to particular TLDs or domains for which they are authoritative.
