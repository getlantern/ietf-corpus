document: rfc-9346
kind: normative-requirement
summary: When the Inter-AS Reachability Information TLV is leaked from Level 2 to Level 1, the D bit MUST be set. Inter-AS Reachability Information TLVs with the D bit set MUST NOT be leaked from Level 1 to Level 2 to prevent TLV looping.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
