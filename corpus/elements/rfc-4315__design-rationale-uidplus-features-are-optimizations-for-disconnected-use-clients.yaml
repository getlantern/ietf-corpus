document: rfc-4315
kind: design-rationale
summary: UIDPLUS features are optimizations for disconnected-use clients; clients can provide equivalent functionality less efficiently using base IMAP protocol facilities. UID EXPUNGE specifically prevents inadvertent removal of messages marked \Deleted by other clients during disconnected periods.
section: "1"
