document: rfc-2863
kind: normative-requirement
summary: LinkUp and linkDown traps are generated just after ifOperStatus leaves, or just before it enters, the down state respectively; traps are never generated on transitions to/from the notPresent state. The lowerLayerDown state is treated as equivalent to down for trap generation purposes.
section: 3.1.15
rfc2119_level: MUST
topics:
    - snmp
