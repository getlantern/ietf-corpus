document: rfc-2797
kind: normative-requirement
summary: If the server cannot match the decrypted POP challenge, the server MUST NOT issue the certificate. The client MUST abort the enrollment process (sending popFailed) if the decryption is unsuccessful or H(y) does not match the witness value.
section: "5.7"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
