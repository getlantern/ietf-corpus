document: rfc-4650
kind: normative-requirement
summary: HMAC-SHA-1 MUST be implemented as the mandatory default MAC algorithm (value 0); its result is 160 bits. The KEMAC payload SHALL be the last payload in any DHHMAC message (Next payload field SHALL be set to Last payload). The AES key wrap method SHALL NOT be applied.
section: "4.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
