document: rfc-8237
kind: normative-requirement
summary: If a configuration mismatch is detected (a PW configured locally but not on the remote PE), the local PW MUST be considered in 'Not Forwarding' state, and a notification with code 'PW configuration mismatch' MUST be sent to the remote PE.
