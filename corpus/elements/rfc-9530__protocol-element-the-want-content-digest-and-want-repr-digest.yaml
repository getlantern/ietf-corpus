document: rfc-9530
kind: protocol-element
summary: The Want-Content-Digest and Want-Repr-Digest fields allow senders to indicate interest in receiving an Integrity field and to express algorithm preferences. Each is a Structured Fields Dictionary where keys are algorithm identifiers and values are Integers in the range 0–10 representing weighted preference (0 means 'not acceptable', 1 is least preferred, 10 is most preferred).
