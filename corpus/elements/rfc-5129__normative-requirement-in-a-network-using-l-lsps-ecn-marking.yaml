document: rfc-5129
kind: normative-requirement
summary: In a network using L-LSPs, ECN marking SHOULD NOT cause packets from the same microflow with different ECN markings to be sent on different LSPs, since this could cause misordering. ECN marking on L-LSPs SHOULD only affect the EXP value.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - mpls
    - ecn
    - congestion
