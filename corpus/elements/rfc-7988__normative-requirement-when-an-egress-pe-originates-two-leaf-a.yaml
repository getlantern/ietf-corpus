document: rfc-7988
kind: normative-requirement
summary: When an egress PE originates two Leaf A-D routes each identifying a different IR P-tunnel with different roots, the egress PE MUST NOT specify the same MPLS label in both PTAs. The same MPLS label MUST NOT be assigned to two IR P-tunnels that have different roots.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - multicast
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
