document: rfc-4293
kind: design-rationale
summary: RFC 4293 was created to merge RFC 2011, RFC 2465, and RFC 2466 into a single IP-version-independent MIB. The previous documents defined separate, incompatible object sets for IPv4 and IPv6; tables such as ipSystemStatsTable now use an InetVersion index to unify them.
