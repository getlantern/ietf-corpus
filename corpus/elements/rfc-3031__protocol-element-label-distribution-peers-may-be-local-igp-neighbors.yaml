document: rfc-3031
kind: protocol-element
summary: Label distribution peers may be local (IGP neighbors, communicate via direct label distribution protocol messages) or remote (non-IGP-neighbors). Remote peers are reached via Explicit Peering (direct labeled protocol messages) or Implicit Peering (higher-level label encoded as attribute of a lower-level label binding and propagated hop-by-hop through local peers).
section: 3.27.5
topics:
