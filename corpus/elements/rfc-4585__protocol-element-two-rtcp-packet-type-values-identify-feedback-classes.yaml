kind: protocol-element
summary: 'Two RTCP packet type values identify feedback classes: RTPFB (PT=205) for transport-layer feedback and PSFB (PT=206) for payload-specific feedback. Within each class, the 5-bit FMT field distinguishes specific message types; FMT=31 is reserved in both classes for future identifier-space expansion.'
