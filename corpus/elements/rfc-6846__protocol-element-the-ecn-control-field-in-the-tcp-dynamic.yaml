document: rfc-6846
kind: protocol-element
summary: The ECN control field in the TCP dynamic chain indicates whether ECN (RFC 3168) is in use for the flow. When set, all IP and TCP headers in the irregular chain include ECN bits; to preserve octet alignment, all TCP reserved bits and the full TOS/TC field of outer IP headers are also included.
section: 6.1.3
topics:
    - tcp
    - ip
    - ecn
