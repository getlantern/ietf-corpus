document: rfc-4551
kind: protocol-element
summary: HIGHESTMODSEQ is defined as a new STATUS data item that returns the highest mod-sequence value of all messages in the mailbox. If the mailbox does not support persistent mod-sequences, the server MUST return 0 as its value.
section: "3.6"
topics:
    - email
