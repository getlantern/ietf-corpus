document: rfc-6212
kind: protocol-element
summary: 'Five result codes are defined for the ''vbr'' method: ''none'' (no valid VBR-Info or queryable domain found), ''pass'' (vouching service gave positive response), ''fail'' (negative response or conflicting ''mc'' values in multiple VBR-Info headers), ''temperror'' (transient DNS error), ''permerror'' (permanent DNS error).'
