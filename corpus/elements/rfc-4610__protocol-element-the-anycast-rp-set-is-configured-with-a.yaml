document: rfc-4610
kind: protocol-element
summary: The Anycast-RP set is configured with a shared unicast RP address (RPA) injected into the unicast routing system, plus a separate per-router IP address used exclusively for inter-RP Register forwarding. Each RP in the set must be configured with the addresses of all other RPs in the set.
section: "2"
topics:
    - multicast
    - routing
