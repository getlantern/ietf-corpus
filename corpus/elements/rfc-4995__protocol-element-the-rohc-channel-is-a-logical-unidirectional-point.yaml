document: rfc-4995
kind: protocol-element
summary: The ROHC channel is a logical unidirectional point-to-point channel parameterized by LARGE_CIDS, MAX_CID, PROFILES, FEEDBACK_FOR, and MRRU. These parameters MUST be established before the first packet is sent, via negotiation, static provisioning, or out-of-band signaling.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
