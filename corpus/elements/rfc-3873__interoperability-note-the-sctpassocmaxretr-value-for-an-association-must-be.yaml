document: rfc-3873
kind: interoperability-note
summary: The sctpAssocMaxRetr value for an association must be smaller than the sum of all sctpAssocRemAddrMaxPathRtx values across all paths, consistent with RFC 2960's requirement that the per-association retransmission limit not exceed the aggregate of per-path limits.
section: "4"
topics:
    - sctp
    - snmp
