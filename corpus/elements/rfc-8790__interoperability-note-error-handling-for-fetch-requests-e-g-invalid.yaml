summary: Error handling for FETCH requests (e.g., invalid Fetch Records) follows RFC 8132, Section 2.2, using CoAP response code 4.22 (Unprocessable Entity). For PATCH/iPATCH, codes 4.22 and 4.09 (Conflict) apply per RFC 8132, Section 3.4.
