document: rfc-7542
kind: normative-requirement
summary: It is RECOMMENDED that systems permitting anonymous 'outer' identifiers require that the 'inner' domain be the same as, or a subdomain of, the 'outer' domain. An authentication request using disparate realms is a security violation and the request SHOULD be rejected.
section: "4.2"
rfc2119_level: RECOMMENDED
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
