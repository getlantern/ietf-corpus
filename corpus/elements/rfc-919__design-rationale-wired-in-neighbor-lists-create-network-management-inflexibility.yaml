document: rfc-919
kind: design-rationale
summary: Wired-in neighbor lists create network management inflexibility, and polling all possible IP addresses is prohibitively slow (up to ~65,000 on ARPANET). Broadcasting provides a fast, simple mechanism for reaching all neighbors without early binding or exhaustive polling.
section: "3"
topics:
