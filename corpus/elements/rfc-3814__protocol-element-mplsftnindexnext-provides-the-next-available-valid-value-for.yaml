document: rfc-3814
kind: protocol-element
summary: mplsFTNIndexNext provides the next available valid value for mplsFTNIndex. Management applications MUST retrieve this object before creating a new mplsFTNTable row. The object returns zero when no further row creation is permitted due to resource exhaustion.
