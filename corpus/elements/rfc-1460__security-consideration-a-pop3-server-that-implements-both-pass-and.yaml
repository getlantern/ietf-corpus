document: rfc-1460
kind: security-consideration
summary: A POP3 server that implements both PASS and APOP must not allow both methods for the same user account. For any given user, only one authentication method is permitted, preventing downgrade attacks where APOP's replay protection could be circumvented by falling back to PASS.
section: "13"
topics:
