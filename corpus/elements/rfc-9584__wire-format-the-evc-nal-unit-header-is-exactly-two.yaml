document: rfc-9584
kind: wire-format
summary: 'The EVC NAL unit header is exactly two bytes: F (1 bit, forbidden_zero_bit), Type (6 bits, nal_unit_type_plus1), TID (3 bits, temporal identifier nuh_temporal_id), Reserve (5 bits, version indicator), and E (1 bit, extension flag). The NAL Unit Type equals nal_unit_type_plus1 minus 1.'
section: 1.1.4
topics:
    - rtp
    - realtime
