document: rfc-1356
kind: protocol-element
summary: ISO/IEC 8208 diagnostic code 249 signifies 'requested protocol not supported' when clearing an incoming call. Non-8208 systems typically use code 0. When supplied for this reason, the diagnostic MUST be either 249 or 0.
section: "3.14"
