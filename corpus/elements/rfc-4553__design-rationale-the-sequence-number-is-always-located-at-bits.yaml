document: rfc-4553
kind: design-rationale
summary: The sequence number is always located at bits 16–31 of the first 32-bit word immediately following the PW demultiplexing header regardless of PSN type, multiplexing method, or RTP usage, simplifying implementations supporting multiple encapsulation types and multi-segment PWs with different encapsulation in different segments.
