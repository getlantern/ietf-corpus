document: rfc-7702
kind: normative-requirement
summary: The XMPP-to-SIP gateway MUST map the bare JID of the XMPP sender to the SIP From header and include the resourcepart of the full JID as the GRUU portion of the SIP URI, as specified in RFC 5627.
section: "5.1"
rfc2119_level: MUST
topics:
