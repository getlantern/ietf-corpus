document: rfc-7668
kind: normative-requirement
summary: Both 6LN and 6LBR SHALL generate and assign link-local addresses based on the 48-bit Bluetooth device addresses used during connection establishment. The same link-local address SHALL be used for the lifetime of the Bluetooth LE L2CAP channel.
