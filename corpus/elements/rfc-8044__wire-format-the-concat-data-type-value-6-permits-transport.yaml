document: rfc-8044
kind: wire-format
summary: The 'concat' data type (value 6) permits transport of more than 253 octets in a standard-space attribute by concatenating multiple attributes of the same type code, which MUST be consecutive and in order. It MUST NOT be used in extended or long-extended spaces, or inside tlv, vsa, extended, long-extended, or evs data types.
section: "3.6"
topics:
