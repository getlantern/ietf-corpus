document: rfc-7551
kind: normative-requirement
summary: The Association Types defined in this document are only to be interpreted in Path messages. These types SHOULD NOT be used in ASSOCIATION Objects carried in Resv messages and SHOULD be ignored if present, because bidirectional LSP association is always upstream-initiated.
section: "5.1"
rfc2119_level: SHOULD NOT
topics:
