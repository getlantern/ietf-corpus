document: rfc-5391
kind: protocol-element
summary: 'G.711.1 is an embedded wideband extension of G.711 operating at 64, 80, and 96 kbps using three layers: L0 (G.711-compatible, 64 kbps), L1 (narrowband enhancement, 16 kbps), and L2 (wideband enhancement, 16 kbps). These layers combine into four modes: R1, R2a, R2b, and R3.'
