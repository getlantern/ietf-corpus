document: rfc-2617
kind: security-consideration
summary: Digest authentication password files store H(A1) = MD5(username:realm:password). A compromised file grants immediate access to that realm without decryption. Because the realm is included in the hash, a breach of one realm's file does not directly compromise other realms sharing the same username and password.
section: "4.13"
topics:
    - http
    - security
    - crypto
