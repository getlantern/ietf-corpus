document: rfc-7075
kind: security-consideration
summary: A compromised Realm-based Redirect Server could redirect a large number of Diameter requests toward a victim domain, constituting a DoS attack. Use of secure peer-to-peer connections and authorization checks mitigates but does not fully prevent such attacks.
