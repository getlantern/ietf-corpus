document: rfc-6637
kind: wire-format
summary: The session key value 'm' fed to AES Key Wrap is encoded as 'symm_alg_ID || session_key || checksum || PKCS#5_padding' padded to 8-byte granularity; PKCS#1.5 padding is explicitly omitted. For AES-256 this results in a 40-octet padded value.
