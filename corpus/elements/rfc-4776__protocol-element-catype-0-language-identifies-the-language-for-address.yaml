document: rfc-4776
kind: protocol-element
summary: CAtype 0 (language) identifies the language for address elements, drawing from RFC 3066 language tags; default is 'i-default'. CAtype 128 (script) identifies the script using ISO 15924 codes; default is 'Latn'. Language and script remain in effect for subsequent elements until overridden.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
