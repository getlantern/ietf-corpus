document: rfc-6845
kind: normative-requirement
summary: A non-DR router with a full adjacency to the DR, where both agree on the DR role, MUST add a Type 1 link for each neighbor in state 2-Way or higher to which the DR's router-LSA includes a link.
section: "4.6"
rfc2119_level: MUST
topics:
    - routing
