document: rfc-3986
kind: normative-requirement
summary: URI scheme specifications MUST define their own syntax so that all strings matching their scheme-specific syntax also match the absolute-URI grammar. Scheme specifications must not define fragment identifier syntax, as fragment handling is orthogonal to scheme processing.
section: "4.3"
rfc2119_level: MUST
topics:
    - registry
