document: rfc-3986
kind: normative-requirement
summary: URI scheme specifications must define their own syntax such that all strings matching their scheme-specific syntax also match the absolute-URI grammar. Scheme specifications must not define fragment identifier syntax, as fragment identification is orthogonal to scheme definition.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
