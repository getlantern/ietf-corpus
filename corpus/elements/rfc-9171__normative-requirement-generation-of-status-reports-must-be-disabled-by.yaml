document: rfc-9171
kind: normative-requirement
summary: Generation of status reports MUST be disabled by default and enabled only when the risk of excessive network traffic is deemed acceptable. Requesting status reports for a single bundle can generate up to 1 + 2*(N-1) status report bundles where N is the path length.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
