document: rfc-1327
kind: design-rationale
summary: When encoding X.400 in RFC 822 addresses, the RHS domain encodes as many O/R attributes as possible (Country through OU) and the LHS local-part carries the remainder. This maximizes the RHS representation to cleanly support the dominant Mnemonic O/R Address form with 1984-compatible encoding.
section: 4.3.1
