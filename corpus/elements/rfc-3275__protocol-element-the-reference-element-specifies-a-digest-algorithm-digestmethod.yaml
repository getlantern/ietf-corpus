document: rfc-3275
kind: protocol-element
summary: The Reference element specifies a digest algorithm (DigestMethod), digest value (DigestValue), optional URI identifying the data object, optional Type attribute, and optional Transforms. At most one Reference per SignedInfo or Manifest may omit the URI attribute.
