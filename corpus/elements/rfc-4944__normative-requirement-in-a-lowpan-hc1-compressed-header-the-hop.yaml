document: rfc-4944
kind: normative-requirement
summary: In a LOWPAN_HC1 compressed header, the Hop Limit (8 bits) MUST always be present and MUST always follow the encoding fields. Other non-compressed fields (address prefixes, IIDs, Traffic Class, Flow Label, Next Header) MUST follow the Hop Limit in the order implied by the HC1 encoding.
section: 10.3.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
