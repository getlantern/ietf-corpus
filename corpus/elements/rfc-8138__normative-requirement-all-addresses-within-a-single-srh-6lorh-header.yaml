document: rfc-8138
kind: normative-requirement
summary: All addresses within a single SRH-6LoRH header MUST be compressed to the same length (same Type). To represent hops requiring different compression levels, multiple consecutive SRH-6LoRH headers MUST be used.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - routing
