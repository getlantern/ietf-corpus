document: rfc-1772
kind: protocol-element
summary: BGP speakers in the same AS are internal peers; speakers in different AS's are external peers. External peers must share a common Data Link subnetwork. Using BGP across an intervening AS invalidates AS path information.
section: "3.3"
topics:
    - bgp
    - routing
