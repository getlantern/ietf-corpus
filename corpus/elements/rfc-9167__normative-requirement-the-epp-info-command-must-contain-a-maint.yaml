document: rfc-9167
kind: normative-requirement
summary: The EPP <info> command MUST contain a <maint:info> element that identifies the maintenance namespace, with either a <maint:id> child (query specific item) or an empty <maint:list> child (query all items).
section: 4.1.1
rfc2119_level: MUST
