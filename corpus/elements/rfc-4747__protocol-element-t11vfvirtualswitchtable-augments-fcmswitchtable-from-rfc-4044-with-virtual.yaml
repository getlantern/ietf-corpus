summary: 't11vfVirtualSwitchTable augments fcmSwitchTable (from RFC 4044) with Virtual Switch-specific columns: VF_ID (t11vfVirtualSwitchVfId), Core Switch WWN (t11vfVirtualSwitchCoreSwitchName), RowStatus, and StorageType. It supports remote creation of Virtual Switches via SNMP.'
