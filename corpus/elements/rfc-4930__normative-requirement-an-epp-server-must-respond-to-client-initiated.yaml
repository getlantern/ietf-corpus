document: rfc-4930
kind: normative-requirement
summary: An EPP server MUST respond to client-initiated communication (connection request or <hello>) by returning a greeting, and MUST promptly respond to each EPP command with a coordinated response describing processing results.
section: "2"
rfc2119_level: MUST
