document: rfc-2205
kind: protocol-element
summary: An RSVP session is defined by the triple (DestAddress, ProtocolId [, DstPort]), where DestAddress may be unicast or multicast, ProtocolId is the IP protocol ID, and the optional DstPort is a generalized destination port (UDP/TCP port or application-specific demultiplexing point). All RSVP messages for the same session share this triple.
section: "1.1"
topics:
    - qos
    - realtime
