document: rfc-5768
kind: security-consideration
summary: A malicious intermediary could insert a Require header containing the 'ice' option tag into a SIP message, causing a call to fail on a UAS that does not support ICE. This attack applies to any SIP option tag and is prevented by the SIPS mechanism defined in RFC 3261.
section: "6"
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
