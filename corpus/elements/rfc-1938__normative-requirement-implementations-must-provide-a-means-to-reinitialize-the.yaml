document: rfc-1938
kind: normative-requirement
summary: Implementations MUST provide a means to reinitialize the OTP sequence that does not reveal the user's secret pass-phrase. When the sequence is reinitialized, implementations MUST verify that the seed or the pass-phrase is changed.
section: "8.0"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
