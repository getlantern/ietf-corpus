document: rfc-4326
kind: security-consideration
summary: Future ULE Mandatory Extension Headers may define SNDU payload link-layer encryption (with Security Association parameters) as an additional mechanism complementing IP-, transport-, or application-layer security. The encryption method and key exchange are outside the scope of RFC 4326.
