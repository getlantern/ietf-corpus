document: rfc-6887
kind: design-rationale
summary: PCP retransmissions (awaiting a first response) and renewals (refreshing an established mapping) are identical packets on the wire. Both signal to the server that the client wants the stated mapping to exist; the server processes them identically regardless of the client's local state.
section: "6"
