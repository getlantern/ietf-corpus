document: rfc-1566
kind: normative-requirement
summary: Recipient counters (mtaReceivedRecipients, mtaStoredRecipients, mtaTransmittedRecipients at both MTA and group level) MUST NOT count recipients for which the MTA had no responsibility, even if recipient information is available.
