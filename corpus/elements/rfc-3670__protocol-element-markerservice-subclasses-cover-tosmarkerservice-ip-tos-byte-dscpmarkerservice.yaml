kind: protocol-element
summary: MarkerService subclasses cover ToSMarkerService (IP ToS byte), DSCPMarkerService (DSCP field per RFC 2474), 8021QMarkerService (IEEE 802.1Q priority bits), and PreambleMarkerService (device-internal preamble). PreambleMarkerService appends to existing preamble data rather than overwriting it.
