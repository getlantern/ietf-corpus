document: rfc-2508
kind: wire-format
summary: The COMPRESSED_UDP header has the same format as COMPRESSED_RTP except the M, S, and T bits are always 0 and the corresponding delta fields are never included. The UDP data payload (which may contain an uncompressed RTP header) follows directly after the compressed IP/UDP portion.
section: 3.3.3
