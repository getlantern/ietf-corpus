document: rfc-9033
kind: normative-requirement
summary: To ensure sufficient bandwidth on the minimal cell, broadcast traffic among a node and its neighbors SHOULD NOT exceed one-third of the bandwidth of the minimal cell. Trickle timer (RFC 6206) applied to DIOs is cited as one compliant algorithm.
section: "2"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
