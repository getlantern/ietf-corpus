document: rfc-3659
kind: normative-requirement
summary: FTP implementations supporting MLSx MUST be 8-bit clean to transmit UTF-8 encoded file names. Implementations SHOULD use UTF-8 whenever possible. All implementations supporting MLST MUST support RFC 2640 (internationalization of FTP).
section: "7.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
