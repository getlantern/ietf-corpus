document: rfc-9174
kind: protocol-element
summary: XFER_REFUSE (message type 0x03) is sent by the receiver to interrupt an in-progress bundle transfer; the sender SHALL stop transmission of the associated bundle. This enables cross-layer optimization where a receiver that already holds the bundle can abort redundant retransmission early.
section: 5.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
