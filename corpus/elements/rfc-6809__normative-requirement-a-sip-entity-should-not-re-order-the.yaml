document: rfc-6809
kind: normative-requirement
summary: A SIP entity SHOULD NOT re-order the Feature-Caps header fields within a SIP message. Entities MAY remove a Feature-Caps header field or individual feature-capability indicators from a message based on features and policies.
section: 4.2.1
rfc2119_level: SHOULD NOT
