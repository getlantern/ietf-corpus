document: rfc-9737
kind: normative-requirement
summary: If the MDS detects that the layout being returned in LAYOUTRETURN does not match the current mirror instances found for the file, it MUST ignore the LAYOUTRETURN and resilver the file in question.
section: "2"
rfc2119_level: MUST
