document: rfc-2732
kind: design-rationale
summary: The textual representation of IPv6 addresses (RFC 2373) uses ':' and '.' as delimiters, which conflict with URL syntax. Enclosing the address in brackets was chosen to allow easy cut-and-paste with minimal editing while avoiding delimiter ambiguity.
