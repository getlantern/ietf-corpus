document: rfc-2911
kind: protocol-element
summary: 'Job Template attributes (section 4.2) specify job processing instructions: job-priority (integer 1:100), job-hold-until, job-sheets, multiple-document-handling, copies, finishings (type2 enum), page-ranges (rangeOfInteger), sides, number-up, orientation-requested, media, printer-resolution, and print-quality. These override Printer defaults and embedded document instructions.'
section: "4.2"
