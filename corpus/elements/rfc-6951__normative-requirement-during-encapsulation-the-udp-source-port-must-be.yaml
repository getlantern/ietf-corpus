document: rfc-6951
kind: normative-requirement
summary: During encapsulation, the UDP source port MUST be the local UDP encapsulation port number of the SCTP stack, and the UDP destination port MUST be the remote UDP encapsulation port number maintained for the association and the destination address.
section: "5.3"
rfc2119_level: MUST
