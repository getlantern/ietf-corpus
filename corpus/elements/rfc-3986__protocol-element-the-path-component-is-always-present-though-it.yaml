document: rfc-3986
kind: protocol-element
summary: The path component is always present (though it may be empty) and contains hierarchical identifying data. Five ABNF rules—path-abempty, path-absolute, path-noscheme, path-rootless, path-empty—cover all valid path forms. Dot-segments "." and ".." are resolved during reference resolution.
section: "3.3"
