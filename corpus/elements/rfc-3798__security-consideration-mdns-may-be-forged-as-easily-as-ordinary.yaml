document: rfc-3798
kind: security-consideration
summary: MDNs may be forged as easily as ordinary Internet email. Threats include falsified disposition notifications (reporting a disposition that did not occur) and unsolicited MDNs. Automatic processors should minimize damage from denial-of-service attacks.
section: "6.1"
topics:
    - email
    - security
