document: rfc-7175
kind: protocol-element
summary: The default BFD authentication key between neighbor RBridges is derived as HMAC-SHA256('TRILL BFD Control' | originPortID | originSysID, IS-IS-shared-key), where the 17-byte ASCII string is concatenated with the 2-byte Port ID and 6-byte IS-IS System ID in network byte order. Auth Type is 5 and Auth Len is 28.
