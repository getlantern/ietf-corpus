document: rfc-9575
kind: security-consideration
summary: DRIP depends on DNS for key retrieval, but specification of particular DNS security options and transports is out of scope for this document. The DRIP-REG specification will define applicable best common security practices such as DNSSEC per RFC 9364, given that many participating nodes have limited processing power and poor QoS paths.
section: "9.4"
topics:
    - dns
    - security
