document: rfc-8925
kind: normative-requirement
summary: The DHCPv4 client on an IPv4-requiring host MUST NOT include the IPv6-Only Preferred option code in the Parameter Request List and MUST ignore that option in packets received from DHCPv4 servers.
section: "3.2"
rfc2119_level: MUST NOT
