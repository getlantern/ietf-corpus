document: rfc-9904
kind: normative-requirement
summary: During a DS algorithm rollover, users MUST upgrade the DS algorithm first before rolling to a new Key Signing Key (KSK); upgrading the algorithm simultaneously with a KSK roll will lead to DNSSEC validation failures.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
