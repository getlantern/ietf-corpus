document: rfc-8460
kind: security-consideration
summary: TLSRPT allows report destinations outside the Policy Domain's authority, enabling an attacker controlling the Policy Domain DNS to direct reports to an unwitting victim as a DDoS amplifier. The risk is lower than DMARC because the attacker must induce the third party to send mail to the attacker first.
section: "7"
topics:
    - security
    - email
