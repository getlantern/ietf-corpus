document: rfc-4970
kind: design-rationale
summary: The RI LSA is intentionally limited to TLVs with a single value or very few values and is not meant to be a generic container. The goal is to keep the RI LSA small enough to always fit in a single LSA and to make change-detection between LSA instances simple, requiring engineering judgment on whether new TLVs belong here or in an application-specific LSA.
section: "3"
topics:
