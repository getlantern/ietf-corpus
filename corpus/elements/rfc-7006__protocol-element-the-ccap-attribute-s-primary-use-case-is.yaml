document: rfc-7006
kind: protocol-element
summary: The 'ccap' attribute's primary use case is offering alternative connection addresses where nettype is 'IN' or 'PSTN', enabling selection between an IP-based bearer and a circuit-switched bearer. The Standards Track mechanism for multiple IP addresses remains ICE (RFC 5245).
section: 3.1.2
topics:
