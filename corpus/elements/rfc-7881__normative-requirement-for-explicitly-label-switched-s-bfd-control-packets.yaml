document: rfc-7881
kind: normative-requirement
summary: For explicitly label-switched S-BFD Control packets, the label stack MUST be that expected to reach the target; the TTL of the topmost label SHOULD be 255; the destination IP MUST be from 127/8 (IPv4) or 0:0:0:0:0:ffff:7f00:0/104 (IPv6) per RFC 5884; and the IP TTL/Hop Limit MUST be set to 1.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
