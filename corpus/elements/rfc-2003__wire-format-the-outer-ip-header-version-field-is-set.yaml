summary: The outer IP header Version field is set to 4; Protocol field is set to 4 (IP-in-IP); TOS is copied from the inner IP header; Total Length covers the entire encapsulated datagram including both headers; Source Address is the encapsulator's address; Destination Address is the decapsulator's address.
