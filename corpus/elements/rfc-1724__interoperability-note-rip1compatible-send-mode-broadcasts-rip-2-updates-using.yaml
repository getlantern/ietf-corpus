document: rfc-1724
kind: interoperability-note
summary: rip1Compatible send mode broadcasts RIP-2 updates using RFC 1058 route subsumption rules, allowing RIP-2 routers to interoperate with RIP-1 neighbors that cannot process multicast packets. ripVersion2 mode uses multicast and is not backward compatible with RIP-1 receivers.
