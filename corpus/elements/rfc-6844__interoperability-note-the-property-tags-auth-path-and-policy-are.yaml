document: rfc-6844
kind: interoperability-note
summary: The property tags auth, path, and policy are reserved in the CAA Restriction Properties registry because deployed clients already implement them from an expired draft (HB2011). Reuse of these tags for a different purpose could cause unexpected behavior in existing implementations.
