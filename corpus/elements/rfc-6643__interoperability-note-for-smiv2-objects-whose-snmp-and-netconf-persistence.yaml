document: rfc-6643
kind: interoperability-note
summary: For SMIv2 objects whose SNMP and NETCONF persistence semantics are consistent, implementations may use YANG deviation statements in a separate module to promote config false to config true; such deviations must be advertised in the NETCONF hello capability list alongside the base generated module.
section: "11"
topics:
