document: rfc-6552
kind: protocol-element
summary: OF0 is triggered by the Objective Code Point (OCP) field in received DIO messages. OCP value 0 identifies OF0. The abstract interface also provides DAG information (DODAGID, Role, Rank), an ordered parent/feasible-successor list with transit option material, and triggered update events to the RPL core.
