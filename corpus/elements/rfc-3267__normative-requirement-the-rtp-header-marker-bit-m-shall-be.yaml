document: rfc-3267
kind: normative-requirement
summary: The RTP header marker bit (M) SHALL be set to 1 if the first frame-block in the packet contains a speech frame that is the first in a talkspurt; for all other packets the marker bit SHALL be set to zero.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
