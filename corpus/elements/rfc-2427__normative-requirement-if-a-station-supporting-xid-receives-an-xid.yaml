document: rfc-2427
kind: normative-requirement
summary: If a station supporting XID receives an XID frame, it shall respond with an XID response. If the remote maximum frame size is smaller than local, the local system shall reduce its maximum frame size to the remote value before generating the response XID.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
