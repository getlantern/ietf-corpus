document: rfc-8824
kind: security-consideration
summary: SCHC header compression for CoAP does not increase or decrease the overall security level of the communication. When no higher-level security protocol (OSCORE, DTLS, etc.) is used, a Layer 2 security mechanism must protect the SCHC messages.
section: "9"
topics:
    - security
