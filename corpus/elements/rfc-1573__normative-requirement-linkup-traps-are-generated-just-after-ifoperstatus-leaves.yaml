document: rfc-1573
kind: normative-requirement
summary: LinkUp traps are generated just after ifOperStatus leaves the down state; linkDown traps are generated just before ifOperStatus enters the down state. This allows a node with a single interface to transmit the linkDown trap before the interface goes down.
section: 3.2.13
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
