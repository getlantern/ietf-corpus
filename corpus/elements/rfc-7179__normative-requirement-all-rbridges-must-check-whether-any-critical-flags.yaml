document: rfc-7179
kind: normative-requirement
summary: All RBridges MUST check whether any critical flags applicable to their processing of the frame are set. If an RBridge does not implement all critical flags in a TRILL Data frame, it MUST treat the frame as having an unimplemented critical extension and discard it accordingly.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
