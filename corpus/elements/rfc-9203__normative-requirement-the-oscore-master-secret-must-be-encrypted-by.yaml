document: rfc-9203
kind: normative-requirement
summary: The OSCORE Master Secret MUST be encrypted by the AS so that only the RS can decrypt it. Use of a CWT protected with COSE_Encrypt/COSE_Encrypt0 is RECOMMENDED.
section: "3.2"
rfc2119_level: MUST
