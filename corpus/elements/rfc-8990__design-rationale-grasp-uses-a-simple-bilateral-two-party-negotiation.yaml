document: rfc-8990
kind: design-rationale
summary: GRASP uses a simple bilateral (two-party) negotiation model rather than multiparty negotiation because multiparty negotiations are very complicated to model and cannot readily be guaranteed to converge. Multiparty negotiations can be supported by indirect bilateral steps between pairs of ASAs.
section: "2.3"
