document: rfc-5533
kind: protocol-element
summary: Context forking allows ULP-aware applications to use multiple locator pairs for a single ULID pair. Forked contexts are distinguished by a non-zero 32-bit Forked Instance Identifier (FII); the default context has FII zero. Forking is unidirectional — both directions must be set up independently by the ULP.
section: "4.2"
topics:
    - ip
    - v6ops
    - multipath
