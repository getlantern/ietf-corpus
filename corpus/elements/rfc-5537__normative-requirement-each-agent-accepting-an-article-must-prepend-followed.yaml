document: rfc-5537
kind: normative-requirement
summary: Each agent accepting an article MUST prepend '!' followed by its primary path-identity to the Path header field. Injecting agents SHOULD prepend '!.POSTED'; relaying and serving agents SHOULD prepend a path-diagnostic (diag-match '!', 'MISMATCH', or 'SEEN') immediately before their identity.
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
