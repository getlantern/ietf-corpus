document: rfc-7377
kind: normative-requirement
summary: In response to an ESEARCH command, the server MUST return ESEARCH responses (not SEARCH responses), and the responses MUST contain UID information, not message numbers — even if source options specify only the selected mailbox.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
