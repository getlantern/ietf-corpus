document: rfc-5840
kind: normative-requirement
summary: The receiver MUST ensure HdrLen matches the header offset computed from the negotiated SA and MUST drop the packet if it does not match. This prevents deliberate misconfiguration to hide payload from trusted intermediary devices.
section: "2"
rfc2119_level: MUST
topics:
    - ipsec
