document: rfc-9744
kind: normative-requirement
summary: Remaining bits in the Control Flags of the EVPN Layer 2 Attributes Extended Community MUST be set to zero when sending and MUST be ignored when receiving. The M and V fields are OPTIONAL and M is ignored at reception for forwarding purposes; it is used only for error notifications.
section: "4"
rfc2119_level: MUST
topics:
    - vpn
    - bgp
    - routing
