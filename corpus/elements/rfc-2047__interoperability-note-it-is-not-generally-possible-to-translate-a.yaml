document: rfc-2047
kind: interoperability-note
summary: It is NOT generally possible to translate a message header containing encoded-words into an unencoded form parseable by a plain RFC 822 reader. Decoding occurs after structured field parsing, so encoded-words can conceal 'special' characters indistinguishable from those in surrounding text.
section: "6.2"
topics:
