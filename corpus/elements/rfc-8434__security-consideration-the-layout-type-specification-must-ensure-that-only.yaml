document: rfc-8434
kind: security-consideration
summary: The layout type specification must ensure that only data access consistent with the NFSv4.1 security model is allowed, either directly via per-access checks or indirectly by delegating checks to the client or storage device. The layout type must provide a mechanism to prevent inappropriate access arising from permissions changes between when a layout is granted and when access is performed.
section: "6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
