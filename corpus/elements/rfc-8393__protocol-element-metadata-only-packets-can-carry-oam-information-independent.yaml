document: rfc-8393
kind: protocol-element
summary: Metadata-only packets can carry OAM information independent of payload data. The NSH O bit from RFC 8300 indicates OAM content. This allows OAM to be sent when no traffic is flowing, at predictable intervals, and without rewriting payload data buffers.
section: "6.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
