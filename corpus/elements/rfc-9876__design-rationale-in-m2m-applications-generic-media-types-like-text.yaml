document: rfc-9876
kind: design-rationale
summary: In M2M applications, generic media types like text/plain or application/xml are not useful long-term. It is recommended that M2M applications using CoAP request specific IANA media types that carry semantic information, such as application/se+cbor for a Smart Energy CBOR payload.
section: "4.1"
topics:
    - registry
