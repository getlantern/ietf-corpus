document: rfc-3920
kind: normative-requirement
summary: The dialback key generation and verification method MUST take into account the hostnames, the stream ID generated by the receiving server, and a secret known by the authoritative server's network. Because server dialback is uni-directional, it MUST be completed in each direction separately to enable bidirectional server-to-server communications.
section: "8.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
