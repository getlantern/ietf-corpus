document: rfc-8002
kind: design-rationale
summary: Hash-and-URL (type 3), LDAP URL (type 5), and Distinguished Name (type 7) encodings are provided to reduce HIP control packet size at the cost of requiring the receiver to resolve external references or check a local cache, rather than embedding the full certificate.
