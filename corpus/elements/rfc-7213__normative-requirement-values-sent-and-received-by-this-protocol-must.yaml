document: rfc-7213
kind: normative-requirement
summary: Values sent and received by this protocol MUST be accessible for operator inspection, and where local configuration is updated by received information, it MUST be clear why the configured value changed. If received values change, the new values MUST be used and the change made visible.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
