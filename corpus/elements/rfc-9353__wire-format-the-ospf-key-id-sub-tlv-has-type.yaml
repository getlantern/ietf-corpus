document: rfc-9353
kind: wire-format
summary: The OSPF KEY-ID sub-TLV has Type=6, Length=4, with a one-octet KeyID field followed by 3 Reserved octets that MUST be set to zero. The IS-IS variant has Type=6, Length=1, with only the KeyID octet.
