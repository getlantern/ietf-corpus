document: rfc-5487
kind: interoperability-note
summary: The SHA-256/384 cipher suites in Section 3 are identical to corresponding RFC 4279 and RFC 4785 cipher suites (with names ending in '_SHA') except for the hash and PRF algorithms. Implementers upgrading from RFC 4279/4785 need only update the MAC and PRF selection logic.
section: "3.1"
topics:
