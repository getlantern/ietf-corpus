document: rfc-9664
kind: normative-requirement
summary: If a lease duration elapses without being refreshed, the authoritative DNS server MUST NOT return that RR in answers to queries. The server MAY delete that RR from its database.
section: "7"
rfc2119_level: MUST NOT
