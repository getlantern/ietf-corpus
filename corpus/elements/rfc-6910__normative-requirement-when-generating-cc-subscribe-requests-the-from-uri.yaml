document: rfc-6910
kind: normative-requirement
summary: When generating CC SUBSCRIBE requests, the From URI MUST be the caller's AOR. The To URI SHOULD be the destination URI of the original call if known, and MUST otherwise be the request-URI of the SUBSCRIBE itself.
section: "6.2"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
