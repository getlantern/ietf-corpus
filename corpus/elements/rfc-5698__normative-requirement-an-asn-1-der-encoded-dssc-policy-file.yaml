document: rfc-5698
kind: normative-requirement
summary: An ASN.1 DER-encoded DSSC policy file MUST contain only the DER encoding of one DSSC policy with no extraneous header or trailer information. ASN.1-based policies are identified with MIME type 'application/dssc+der'.
section: "4"
rfc2119_level: MUST
topics:
    - crypto
    - security
