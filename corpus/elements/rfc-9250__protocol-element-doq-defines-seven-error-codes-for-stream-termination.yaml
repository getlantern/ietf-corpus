summary: 'DoQ defines seven error codes for stream termination and connection closing: DOQ_NO_ERROR (0x0), DOQ_INTERNAL_ERROR (0x1), DOQ_PROTOCOL_ERROR (0x2), DOQ_REQUEST_CANCELLED (0x3), DOQ_EXCESSIVE_LOAD (0x4), DOQ_UNSPECIFIED_ERROR (0x5), and DOQ_ERROR_RESERVED (0xd098ea5e) for testing.'
