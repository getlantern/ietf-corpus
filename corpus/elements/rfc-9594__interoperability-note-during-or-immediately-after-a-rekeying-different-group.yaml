document: rfc-9594
kind: interoperability-note
summary: During or immediately after a rekeying, different group members may temporarily hold different versions of the group keying material, causing a misalignment. Section 6.3 describes the scenarios where this can occur and how members can detect and recover from it, typically by retrieving the latest keying material from the KDC using the version number ('num') as a reference.
section: "6.3"
topics:
    - security
    - crypto
