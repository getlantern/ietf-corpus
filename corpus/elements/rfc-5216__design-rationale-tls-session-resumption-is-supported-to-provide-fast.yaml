document: rfc-5216
kind: design-rationale
summary: TLS session resumption is supported to provide "fast reconnect" for wireless LAN use cases where a peer re-authenticates frequently. Session continuation is more likely to succeed when EAP authentication is remoted to a backend server shared by multiple authenticators than when the EAP server is co-located with a single authenticator.
section: 2.1.2
topics:
    - tls
    - security
