document: rfc-6630
kind: interoperability-note
summary: ERP/AAK reuses the cryptosuites defined for 'Re-authentication Cryptosuites' in RFC 5296 and reuses ERP packet formats. Lower-layer specifications may need revision to support ERP/AAK, analogous to the guidance in Section 6 of RFC 5296.
section: "6"
topics:
