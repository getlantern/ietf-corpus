summary: The 802-1Q PI macro represents the IEEE 802.1Q VLAN encapsulation header inserted between the MAC layer and the network layer. It does not expose the TCI field or the TR-encaps bit; TPID encoding differences (Ethernet vs. SNAP) are inferred from the ifType of the dataSource.
