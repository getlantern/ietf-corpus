document: rfc-4591
kind: normative-requirement
summary: An L2TPv3 Control Connection MUST first be established before tunneling a Frame Relay circuit over IP, and the SCCRQ and SCCRP messages MUST include the Frame Relay DLCI PW Type of 0x0001 in the Pseudowire Capabilities List.
