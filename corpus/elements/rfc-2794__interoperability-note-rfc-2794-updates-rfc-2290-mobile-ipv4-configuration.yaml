document: rfc-2794
kind: interoperability-note
summary: 'RFC 2794 updates RFC 2290 (Mobile-IPv4 Configuration Option for IPCP): the Mobile Node''s Home Address field in the IPCP option, which RFC 2290 required to be nonzero, is now allowed to be zero when the mobile node uses the NAI extension to obtain a home address after PPP establishment.'
