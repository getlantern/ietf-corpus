document: rfc-5654
kind: interoperability-note
summary: Recovery mechanisms optimized for specific topologies (e.g., rings) MUST be interoperable with mechanisms defined for arbitrary mesh networks to enable protection of end-to-end transport paths. Ring recovery techniques MUST NOT prevent connection to a general MPLS-TP network.
section: 2.5.6
topics:
    - mpls
