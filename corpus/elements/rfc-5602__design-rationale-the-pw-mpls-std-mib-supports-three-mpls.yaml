document: rfc-5602
kind: design-rationale
summary: 'The PW-MPLS-STD-MIB supports three MPLS network configurations: MPLS-TE (tunnels via MPLS-TE-STD-MIB), non-TE (LDP or manual tunnels via XC index in MPLS-LSR-STD-MIB), and PW-label-only (no outer tunnel, for adjacent PEs). A combination of MPLS-TE and LDP outer tunnels for the same PW is allowed, with pwMplsOutboundTunnelTypeInUse indicating which is active.'
section: "6"
topics:
