document: rfc-7176
kind: protocol-element
summary: The Group Address TLV (GADDR-TLV, IS-IS TLV type 142) is carried in LSP PDUs and transports sub-TLVs that advertise multicast group listeners by MAC address, IPv4 address, IPv6 address, and fine-grained-labeled variants. Sub-TLVs under GADDR form their own sub-TLV type series (types 1–6).
section: "2.1"
topics:
    - routing
    - multicast
