document: rfc-1368
kind: protocol-element
summary: rptrMonitorPortTotalErrors is the summation of FCSErrors, AlignmentErrors, FrameTooLongs, ShortEvents, LateEvents, VeryLongEvents, and DataRateMismatches for a port. It is explicitly included to optimize polling traffic by providing a single health-tracking counter.
