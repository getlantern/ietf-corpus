document: rfc-5115
kind: interoperability-note
summary: The ResourcePriority attribute is based on the NameSpace.Value tuple from the SIP Resource-Priority header (RFC 4412), enabling transparent bridging of priority codepoints (e.g., ANSI T1.631-1993 NS/EP) between PSTN standards and IETF SIP/TRIP signaling.
section: "3.1"
