document: rfc-3335
kind: design-rationale
summary: The 'importance=Optional' attribute is used for signed-receipt-protocol and signed-receipt-micalg parameters so that UAs which do not understand those parameters can still generate an unsigned MDN in response, maintaining backward compatibility while allowing the sender to learn why a signed receipt was not returned.
section: "5.2"
topics:
    - email
    - security
