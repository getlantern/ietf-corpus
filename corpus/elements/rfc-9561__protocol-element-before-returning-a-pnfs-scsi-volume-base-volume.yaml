document: rfc-9561
kind: protocol-element
summary: Before returning a PNFS_SCSI_VOLUME_BASE volume to the client, the MDS registers its reservation key and then issues a Reservation Acquire command with RACQA=000b (Acquire) and RTYPE=4h (Exclusive Access - Registrants Only) to establish the reservation.
section: 2.2.2
