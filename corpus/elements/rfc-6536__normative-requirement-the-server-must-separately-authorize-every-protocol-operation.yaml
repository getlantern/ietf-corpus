document: rfc-6536
kind: normative-requirement
summary: 'The server MUST separately authorize every protocol operation by executing a 12-step procedure: checking enable-nacm, recovery session status, close-session exemption, group membership (including external groups if enabled), ordered rule-list and rule matching, default-deny-all extension check, kill-session/delete-config implicit denial, and exec-default fallback.'
section: 3.4.4
rfc2119_level: MUST
topics:
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
