document: rfc-7517
kind: protocol-element
summary: 'The "key_ops" (key operations) parameter is an array of string values identifying intended key operations: "sign", "verify", "encrypt", "decrypt", "wrapKey", "unwrapKey", "deriveKey", and "deriveBits". Values are case-sensitive and duplicate entries MUST NOT be present.'
section: "4.3"
