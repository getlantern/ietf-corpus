document: rfc-1575
kind: protocol-element
summary: An echo-response packet must follow the same path as a CLNP data packet with the same options in the CLNP header. The entire echo-request packet (header and data) is carried in the echo-response data field so that fields such as the echo-request lifetime may be examined upon receipt.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
