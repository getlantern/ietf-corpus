document: rfc-9467
kind: interoperability-note
summary: This document updates RFC 8967 by replacing specific bullet points in Section 4.3 of that document. Implementations of RFC 8967 that do not implement these relaxed rules will drop legitimately reordered packets on links with Wi-Fi power-saving modes, while compliant implementations will accept them.
section: "1"
topics:
    - routing
    - security
