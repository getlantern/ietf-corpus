document: rfc-6736
kind: protocol-element
summary: The NAT-Control-Install AVP (AVP Code 596, Grouped) activates or installs NAT bindings. It contains NAT-Control-Definition AVPs, an optional NAT-Control-Binding-Template reference, Max-NAT-Bindings, and NAT-External-Port-Style. If NAT-External-Port-Style is present, the NAT device MUST select external ports per the specified style for bindings with unspecified external ports.
section: 8.7.2
topics:
    - nat
    - diameter
