document: rfc-2344
kind: normative-requirement
summary: If the home agent is unable to support the requested form of encapsulation for the reverse tunnel, it MUST return registration reply code 139 (requested encapsulation unavailable). Similarly, a foreign agent unable to support the requested encapsulation MUST return code 72.
section: 4.3.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
