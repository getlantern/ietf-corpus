document: rfc-8402
kind: security-consideration
summary: SR does not introduce new congestion control requirements; best-effort delivery is assumed. Where SR policies are in use, bandwidth allocation may be managed by monitoring traffic associated with the binding SID, and circuit-breaker mechanisms such as RFC 8084 may be applicable.
section: "8.3"
topics:
    - security
    - routing
    - congestion
