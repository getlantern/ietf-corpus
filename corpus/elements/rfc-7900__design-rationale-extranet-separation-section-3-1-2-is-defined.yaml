document: rfc-7900
kind: design-rationale
summary: Extranet separation (Section 3.1.2) is defined to keep extranet and non-extranet traffic on separate P-tunnels. This eliminates the address-ambiguity scenario described in Section 2.1 (mixed extranet/non-extranet flows on the same tunnel) and reduces unnecessary multicast data delivery to PEs that hold only non-extranet VRFs.
section: 3.1.2
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
