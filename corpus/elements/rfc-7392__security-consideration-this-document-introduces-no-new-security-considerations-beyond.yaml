document: rfc-7392
kind: security-consideration
summary: This document introduces no new security considerations beyond those discussed in RFC 5036, RFC 4447, and RFC 7267. The path selection mechanism enables automatic selection of S-PEs for forwarding; operators SHOULD use tools such as VCCV trace (RFC 6073) to verify the path taken by the MS-PW and confirm it does not represent an additional security risk.
section: "6"
topics:
