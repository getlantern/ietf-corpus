document: rfc-9664
kind: security-consideration
summary: Servers SHOULD enforce an upper bound on LEASE and KEY-LEASE values to prevent effectively-permanent registrations. Default upper limits of 24 hours for LEASE and 7 days for KEY-LEASE are RECOMMENDED.
