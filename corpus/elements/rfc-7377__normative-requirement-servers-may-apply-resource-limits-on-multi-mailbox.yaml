document: rfc-7377
kind: normative-requirement
summary: Servers MAY apply resource limits on multi-mailbox searches (e.g., mailbox count or total message size). A server MAY respond 'NO [LIMIT]' upfront if a limit is exceeded, or 'OK [LIMIT]' with partial results after terminating a search mid-execution.
section: "2.4"
rfc2119_level: MAY
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
