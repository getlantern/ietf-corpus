document: rfc-2265
kind: security-consideration
summary: When creating entries in vacmViewTreeFamilyTable, excluded entries SHOULD be created before included entries. When deleting, included entries SHOULD be deleted before excluded entries. Reversing this order can transiently grant unwanted access.
section: "7.1"
topics:
    - snmp
    - security
