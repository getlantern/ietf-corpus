document: rfc-3995
kind: security-consideration
summary: Printers are threatened by clients that subscribe with a 'notify-recipient-uri' targeting a third party, causing the Printer to act as an unwitting amplifier for denial-of-service attacks against that third party. Implementations should consider rate-limiting and authentication requirements for subscription creation.
section: "25.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
