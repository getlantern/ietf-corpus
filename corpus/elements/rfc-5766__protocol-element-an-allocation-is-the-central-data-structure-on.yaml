summary: 'An allocation is the central data structure on the TURN server. It contains: a relayed transport address, a 5-tuple (client IP/port, server IP/port, transport protocol), authentication information, a time-to-expiry timer (default 600 seconds), a list of permissions, and a list of channel-to-peer bindings.'
