document: rfc-7986
kind: protocol-element
summary: The IMAGE property (new) specifies an image associated with a calendar or calendar component via a URI or inline BASE64-encoded binary data. The value MUST be of media type 'image'. Multiple instances may be present to offer alternative images at varying resolutions or subtypes.
section: "5.10"
