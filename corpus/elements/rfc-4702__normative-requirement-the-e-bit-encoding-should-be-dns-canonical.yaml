document: rfc-4702
kind: normative-requirement
summary: The E bit encoding SHOULD be DNS canonical wire format (E=1); this MUST be supported by servers. A server MUST use the same encoding format as used by the client, and a server that does not support deprecated ASCII encoding MUST ignore Client FQDN options with E=0.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
