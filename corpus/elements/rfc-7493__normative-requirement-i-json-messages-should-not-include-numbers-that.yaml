document: rfc-7493
kind: normative-requirement
summary: I-JSON messages SHOULD NOT include numbers that express greater magnitude or precision than an IEEE 754 double precision (binary64) number provides, for example 1E400 or 3.141592653589793238462643383279.
section: "2.2"
rfc2119_level: SHOULD NOT
