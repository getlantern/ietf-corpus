document: rfc-8201
kind: design-rationale
summary: Packetization layers are encouraged to avoid sending messages requiring source fragmentation because fragmentation degrades performance and reliability. When source fragmentation is not desired, EMTU_S is set to PMTU and the upper layer must limit its message sizes accordingly.
section: "5.1"
topics:
