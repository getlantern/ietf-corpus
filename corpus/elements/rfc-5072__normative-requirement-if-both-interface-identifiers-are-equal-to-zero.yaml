document: rfc-5072
kind: normative-requirement
summary: If both interface identifiers are equal to zero, the negotiation MUST be terminated by sending Configure-Reject with interface-identifier value zero. A new Configure-Request MUST NOT include the Interface-Identifier option after receiving a valid Configure-Reject for it.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
