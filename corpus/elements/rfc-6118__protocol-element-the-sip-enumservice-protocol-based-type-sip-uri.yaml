document: rfc-6118
kind: protocol-element
summary: The 'sip' Enumservice (Protocol-Based, type 'sip', URI schemes 'sip' and 'sips') enables ENUM resolution of E.164 telephone numbers to SIP Addresses-of-Record, allowing callers to reach a SIP endpoint by DNS lookup. Defined in RFC 3764, updated by RFC 6118.
