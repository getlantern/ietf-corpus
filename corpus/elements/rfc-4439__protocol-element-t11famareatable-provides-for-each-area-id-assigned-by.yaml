document: rfc-4439
kind: protocol-element
summary: t11FamAreaTable provides, for each Area_ID assigned by the local switch in a Fabric, the list of Port_IDs assigned within that area via t11FamAreaAssignedPortIdList, encoded as an OCTET STRING of single-octet Port_ID values in ascending order.
