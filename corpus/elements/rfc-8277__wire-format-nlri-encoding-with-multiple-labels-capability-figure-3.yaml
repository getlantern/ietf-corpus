summary: 'NLRI encoding with Multiple Labels Capability (Figure 3): Length (8 bits), then one or more 24-bit label entries each consisting of Label (20 bits) + Rsrv (3 bits) + S (1 bit), followed by the address prefix. The S bit MUST be 0 in all labels except the last, and MUST be 1 in the last label.'
