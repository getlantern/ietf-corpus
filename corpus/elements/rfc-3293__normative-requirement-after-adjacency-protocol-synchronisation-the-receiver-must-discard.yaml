document: rfc-3293
kind: normative-requirement
summary: After adjacency protocol synchronisation, the receiver MUST discard incoming GSMP messages if the Sender Instance and Source Address do not match values stored by the adjacency protocol's 'Update Peer Verifier' operation, if the message arrives on the wrong port, or if the Receiver Instance does not match the current Sender Instance value.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
