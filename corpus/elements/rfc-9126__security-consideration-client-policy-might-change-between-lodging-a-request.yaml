document: rfc-9126
kind: security-consideration
summary: Client policy might change between lodging a Request Object and the authorization request using it. It is recommended that the authorization server check request parameters against client policy when processing the authorization request at the authorization endpoint.
section: "7.4"
topics:
    - oauth
    - security
