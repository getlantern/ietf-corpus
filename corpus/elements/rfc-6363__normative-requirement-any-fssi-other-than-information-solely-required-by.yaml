document: rfc-6363
kind: normative-requirement
summary: Any FSSI other than information solely required by the sender (SS-FSSI) MUST be communicated via the FSSI container in the FEC Framework Configuration Information, enabling receivers and third-party entities access to all parameters needed for proper FEC decoding operations.
section: "5.5"
rfc2119_level: MUST
topics:
