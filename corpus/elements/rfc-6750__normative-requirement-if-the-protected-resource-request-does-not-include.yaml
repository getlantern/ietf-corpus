document: rfc-6750
kind: normative-requirement
summary: If the protected resource request does not include authentication credentials or contains an invalid access token, the resource server MUST include the HTTP WWW-Authenticate response header field using the auth-scheme value "Bearer".
section: "3"
rfc2119_level: MUST
topics:
