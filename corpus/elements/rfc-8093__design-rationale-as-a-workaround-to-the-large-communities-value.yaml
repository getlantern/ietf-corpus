document: rfc-8093
kind: design-rationale
summary: As a workaround to the Large Communities/value-30 collision, a new Early IANA Allocation was requested for the BGP Large Communities attribute, rather than requiring all deployed implementations to update. The squatting of values 30, 31, 129, 241, 242, and 243 was confirmed by the involved vendors or through source code review.
section: "1"
topics:
