document: rfc-4426
kind: protocol-element
summary: Shared mesh restoration pre-reserves protection capacity shared among multiple LSPs whose working paths are physically diverse, but requires explicit signaling to instantiate a specific protection LSP after a failure. The protection path can be activated for at most one failed LSP when multiple concurrent failures compete for shared capacity.
section: "3.3"
topics:
    - mpls
    - routing
