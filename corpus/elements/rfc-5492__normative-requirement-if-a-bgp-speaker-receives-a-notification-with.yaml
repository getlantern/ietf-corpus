document: rfc-5492
kind: normative-requirement
summary: If a BGP speaker receives a NOTIFICATION with Error Subcode Unsupported Optional Parameter in response to an OPEN carrying the Capabilities Optional Parameter, the speaker SHOULD attempt to re-establish the BGP connection without sending the Capabilities Optional Parameter.
section: "3"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
