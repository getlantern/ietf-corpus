document: rfc-1225
kind: protocol-element
summary: The optional RPOP command substitutes for PASS in AUTHORIZATION, authenticating via a trusted-host mechanism (e.g., .rhosts on Berkeley UNIX) rather than a password. It requires the client to connect from a privileged TCP port (port < 1024).
section: Optional POP3 Commands
