summary: The OBJECT-TYPE macro defines a managed object, specifying SYNTAX, optional UNITS, MAX-ACCESS, STATUS, DESCRIPTION, and optionally REFERENCE, INDEX or AUGMENTS, and DEFVAL clauses. Its value is an administratively assigned OBJECT IDENTIFIER; leaf non-columnar instances are identified by appending a zero sub-identifier.
