document: rfc-3911
kind: normative-requirement
summary: If no match is found but the Request-URI corresponds to a conference URI, the UAS MUST ignore the Join header and process the INVITE as if the Join header did not exist, allowing redirection to a conference URI.
section: "4"
rfc2119_level: MUST
