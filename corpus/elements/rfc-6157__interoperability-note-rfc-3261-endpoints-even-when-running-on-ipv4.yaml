document: rfc-6157
kind: interoperability-note
summary: RFC 3261 endpoints, even when running on IPv4-only nodes, are able to parse and regenerate IPv6 network identifiers in SIP headers, so the Record-Route dual-header mechanism works with RFC 3261 endpoints regardless of their network type.
