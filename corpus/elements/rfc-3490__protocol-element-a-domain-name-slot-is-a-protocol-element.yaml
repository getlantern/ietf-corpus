document: rfc-3490
kind: protocol-element
summary: A 'domain name slot' is a protocol element, function argument, or return value explicitly designated for carrying a domain name. Examples include the DNS QNAME field, gethostbyname() argument, and the host portion of a URI. General text that merely contains a domain name is not a domain name slot.
section: "2"
topics:
