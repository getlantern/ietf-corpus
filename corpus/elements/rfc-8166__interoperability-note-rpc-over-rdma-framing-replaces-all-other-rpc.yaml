document: rfc-8166
kind: interoperability-note
summary: RPC-over-RDMA framing replaces all other RPC framing (e.g., TCP record marking) for an RPC-over-RDMA association, even when the underlying RDMA protocol is itself layered over TCP. A shift from non-RDMA to RDMA framing must occur between distinct RPC messages and in concert with the underlying transport.
section: "3.2"
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
