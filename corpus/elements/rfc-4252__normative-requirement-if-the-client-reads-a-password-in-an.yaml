document: rfc-4252
kind: normative-requirement
summary: If the client reads a password in an encoding other than UTF-8 (e.g., ISO 8859-1), it MUST convert the password to ISO-10646 UTF-8 before transmitting, and the server MUST convert the password to the encoding used on that system.
section: "8"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
