document: rfc-9442
kind: normative-requirement
summary: The RuleID MUST be included in the SCHC header. It is RECOMMENDED to keep the number of Rules defined for a specific device to the minimum possible, since the total number of Rules directly affects the RuleID field size and hence the fragmentation header size.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
