summary: Character set enumeration values (CodedCharSet) are maintained in the IANA Character Set registry at ftp.isi.edu /in-notes/iana/assignments/character-sets. The MIBenum field in the registry provides the INTEGER enumeration value; the 'cs'-prefixed Alias provides the symbol name. New entries submitted to iana@ISI.EDU.
