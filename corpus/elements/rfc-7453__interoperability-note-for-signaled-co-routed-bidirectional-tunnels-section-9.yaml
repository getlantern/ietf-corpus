summary: For signaled co-routed bidirectional tunnels (Section 9.3), intermediate and tail-end node MIB tables are populated automatically by the local management subsystem (agent) upon successful tunnel signaling; the forward and reverse mplsXCExtEntry objects are created once the respective path label information is negotiated.
