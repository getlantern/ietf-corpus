document: rfc-9010
kind: protocol-element
summary: A RPL-Unaware Leaf (RUL) is a 6LN host that does not participate in RPL and relies on its attachment 6LR to inject host routes for its IPv6 addresses into the RPL domain via DAO messages. The RUL uses 6LoWPAN ND (RFC 8505) with the R flag set to request reachability services.
section: "1"
topics:
