document: rfc-9549
kind: interoperability-note
summary: Characters in the Unicode Category 'Symbol, Other' (So), including emoji, are DISALLOWED under IDNA2003 and IDNA2008. Characters allowed under the Unicode IDNA Compatibility Processing (UTS46) may not be allowed here; for example, ♚.example (U+1F0A1) fails under this specification but becomes xn--45h.example under UTS46.
section: "1"
topics:
    - pkix
    - dns
    - security
