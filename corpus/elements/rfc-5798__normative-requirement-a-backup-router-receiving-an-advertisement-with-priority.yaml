document: rfc-5798
kind: normative-requirement
summary: A Backup router receiving an ADVERTISEMENT with Priority=0 from the Master MUST set its Master_Down_Timer to Skew_Time only (instead of Master_Down_Interval) to accelerate its transition to Master.
