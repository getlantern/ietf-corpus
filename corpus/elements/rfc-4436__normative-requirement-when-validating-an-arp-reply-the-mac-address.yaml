document: rfc-4436
kind: normative-requirement
summary: When validating an ARP Reply, the MAC address in ar$sha of the reply MUST be matched against ar$tpa of the request, and the IPv4 address in ar$spa of the reply MUST be matched against ar$tpa of the request; only if both match does the host continue using that IPv4 address.
section: 2.1.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
