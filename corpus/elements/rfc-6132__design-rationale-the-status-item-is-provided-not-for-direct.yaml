document: rfc-6132
kind: design-rationale
summary: The 'status' item is provided not for direct machine-readable comparison but to enable extraction of its value into a Sieve variable for use elsewhere (e.g., in an auto-reply message). Because it is free-form and user-created, no value including 'unknown' can have special meaning.
