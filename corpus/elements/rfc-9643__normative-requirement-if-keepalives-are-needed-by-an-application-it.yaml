document: rfc-9643
kind: normative-requirement
summary: If keepalives are needed by an application, it is RECOMMENDED that the liveness check happens only at the protocol layers that are meaningful to the application, given that keepalive mechanisms exist at multiple protocol layers.
section: 2.1.5
rfc2119_level: RECOMMENDED
