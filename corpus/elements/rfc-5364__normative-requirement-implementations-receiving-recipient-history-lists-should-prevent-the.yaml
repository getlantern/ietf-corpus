document: rfc-5364
kind: normative-requirement
summary: Implementations receiving recipient-history lists SHOULD prevent the user from replying to all recipients if the recipient's URI is not in the list or is tagged 'bcc', to avoid accidentally revealing blind recipients.
section: "4"
rfc2119_level: SHOULD
topics:
