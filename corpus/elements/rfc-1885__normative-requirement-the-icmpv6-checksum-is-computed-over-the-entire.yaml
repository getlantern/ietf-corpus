document: rfc-1885
kind: normative-requirement
summary: The ICMPv6 checksum is computed over the entire ICMPv6 message prepended with an IPv6 pseudo-header (as specified in the IPv6 spec, section 8.1), using Next Header value 58. This differs from IPv4 ICMP which does not include a pseudo-header.
section: "2.3"
rfc2119_level: MUST
topics:
    - ip
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
