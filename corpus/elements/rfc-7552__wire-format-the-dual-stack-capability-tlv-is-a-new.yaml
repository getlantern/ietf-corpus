document: rfc-7552
kind: wire-format
summary: 'The Dual-Stack capability TLV is a new 32-bit optional Hello parameter with code point 0x0701. Bits 0-1 are U=1 and F=0. The TR (Transport Connection Preference) field is 4 bits: 0100 for LDPoIPv4, 0110 for LDPoIPv6 (default). Remaining bits are Reserved/MBZ.'
section: 6.1.1
topics:
