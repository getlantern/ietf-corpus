document: rfc-6790
kind: normative-requirement
summary: If any ELI processed by an egress LSR has the Bottom-of-Stack (BoS) bit set, the LSR MUST discard the packet and MAY log an error, because a BoS-set ELI indicates a malformed label stack.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
