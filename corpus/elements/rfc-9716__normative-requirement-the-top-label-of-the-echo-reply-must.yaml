document: rfc-9716
kind: normative-requirement
summary: The top label of the echo reply MUST be constructed from the first segment of the Reply Path TLV, remaining labels MUST follow Reply Path TLV segment order, and the MPLS header MUST NOT add any other label.
section: "5.3"
rfc2119_level: MUST
