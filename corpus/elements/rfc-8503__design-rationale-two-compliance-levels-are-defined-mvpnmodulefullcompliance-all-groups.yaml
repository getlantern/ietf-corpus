document: rfc-8503
kind: design-rationale
summary: 'Two compliance levels are defined: mvpnModuleFullCompliance (all groups mandatory) and mvpnModuleReadOnlyCompliance (same groups but all read-write objects downgraded to read-only). The read-only compliance allows monitoring-only deployments without configuration capability, while BGP-specific groups are additionally mandatory only on systems supporting BGP-MVPN.'
section: "3.2"
topics:
