document: rfc-9910
kind: protocol-element
summary: 'The hierarchy model defines four relations for INR objects: ''parent'' (next-least-specific covering object), ''child'' (next-most-specific objects), ''top'' (least-specific covering object), and ''bottom'' (most-specific objects that entirely cover the INR value). Bottom objects may overlap and may be less specific than the queried value.'
section: 3.2.1
topics:
    - routing
    - ip
