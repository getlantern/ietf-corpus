document: rfc-7571
kind: normative-requirement
summary: When an ingress node intends to put an LSP into lock mode, it MUST send a Path message with the Administratively down (A) bit set and the Reflect (R) bit in the ADMIN_STATUS Object set.
section: "3.1"
rfc2119_level: MUST
topics:
