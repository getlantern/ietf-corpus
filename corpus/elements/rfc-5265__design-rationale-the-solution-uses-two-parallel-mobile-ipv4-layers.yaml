document: rfc-5265
kind: design-rationale
summary: 'The solution uses two parallel Mobile IPv4 layers: an outer (x-MIP) layer to provide mobility beneath IPsec so the VPN tunnel endpoint never changes, and an inner (i-MIP) layer to register the VPN-TIA with the internal home agent. This avoids requiring any changes to existing VPN devices or foreign agents.'
section: "1.1"
topics:
    - vpn
    - mobility
    - ipsec
