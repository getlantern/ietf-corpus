document: rfc-7917
kind: wire-format
summary: The Node-Admin-Tag sub-TLV has a 1-octet Type field (value 21), a 1-octet Length field indicating the length in octets (a multiple of 4), and a Value field containing one or more 32-bit administrative tags. Multiple tags are encoded as sequential 4-octet fields.
