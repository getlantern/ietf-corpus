document: rfc-5575
kind: wire-format
summary: The traffic-marking extended community (type 0x8009) instructs a system to modify the DSCP bits of transiting IP packets. It is encoded as 5 zero bytes followed by the DSCP value in the 6 least-significant bits of the 6th byte.
