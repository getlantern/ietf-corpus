document: rfc-3056
kind: protocol-element
summary: A relay router is a 6to4 router that also has native IPv6 interfaces and is configured to transit traffic between 6to4 addresses and native IPv6 addresses. It participates in both IPv6 exterior routing (advertising 2002::/16) and the 6to4 exterior routing domain independently.
section: "5.2"
topics:
