document: rfc-1212
kind: design-rationale
summary: 'Actions from OSI MIBs are modeled in SNMP as read-write INTEGER objects: writing a particular distinguished value triggers the action, and reading returns a different distinguished value indicating idle state. This avoids introducing a separate action PDU type.'
section: "5.2"
topics:
