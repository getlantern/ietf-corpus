document: rfc-2108
kind: design-rationale
summary: The MIB-II 'interfaces' group has NO specific relationship to repeater ports. A repeater is a physical-layer bitwise store-and-forward device with no MAC address and no MAC implementation; it does not process packets based on packet-related information such as checksum or addresses. The 'interfaces' group applies only to the network interfaces used for management traffic.
section: 2.4.1.2
topics:
    - snmp
