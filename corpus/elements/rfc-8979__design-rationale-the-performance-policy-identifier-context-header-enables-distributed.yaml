document: rfc-8979
kind: design-rationale
summary: The Performance Policy Identifier Context Header enables distributed enforcement of per-service QoS policies (e.g., ULL, UHR) by allowing SFFs and SFs to dynamically select SF instances and SFPs based on performance criteria, which is not possible when path computation is fully centralized with a strict SFP presented to SFFs.
