document: rfc-7737
kind: normative-requirement
summary: When a proxy LSR forwards an MPLS echo request, it MUST copy the Reply Mode field, the Reply Mode Order TLV, and all Reply Path TLV(s) from the proxy ping request. If more than one Reply Path TLV is present, their ordering MUST be preserved.
section: 4.3.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
