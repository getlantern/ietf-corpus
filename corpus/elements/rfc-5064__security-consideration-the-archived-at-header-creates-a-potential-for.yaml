document: rfc-5064
kind: security-consideration
summary: 'The Archived-At header creates a potential for a denial-of-service attack on the server pointed to by the URI if the archived form is downloaded automatically and further URIs are followed recursively. Mitigations: do not dereference the URI automatically, and implement loop detection.'
section: "4"
topics:
    - security
    - email
