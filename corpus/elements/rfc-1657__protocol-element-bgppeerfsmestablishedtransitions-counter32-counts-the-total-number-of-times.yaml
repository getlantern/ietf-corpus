document: rfc-1657
kind: protocol-element
summary: bgpPeerFsmEstablishedTransitions (Counter32) counts the total number of times the BGP FSM transitioned into the Established state for a peer. bgpPeerFsmEstablishedTime (Gauge32) records how long (in seconds) the peer has been in or since last was in Established state, reset to zero on new peer configuration or router boot.
