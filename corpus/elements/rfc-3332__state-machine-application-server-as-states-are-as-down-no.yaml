document: rfc-3332
kind: state-machine
summary: 'Application Server (AS) states are: AS-DOWN (no ASPs available), AS-INACTIVE (one or more ASPs inactive, none active), AS-ACTIVE (one or more ASPs active), and AS-PENDING (last active ASP departed; awaiting recovery within a T(r) timer). State transitions trigger M-AS_ACTIVE, M-AS_INACTIVE, and M-AS_DOWN indications to Layer Management.'
section: "4.3"
topics:
    - realtime
