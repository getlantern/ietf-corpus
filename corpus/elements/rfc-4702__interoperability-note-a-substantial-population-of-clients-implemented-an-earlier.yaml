document: rfc-4702
kind: interoperability-note
summary: A substantial population of clients implemented an earlier draft permitting ASCII encoding (E=0). Servers SHOULD be aware of such clients and MAY return ASCII-encoded Domain Name fields to them; servers not prepared to do so MUST ignore Client FQDN options with E=0.
section: 2.3.1
topics:
    - dns
