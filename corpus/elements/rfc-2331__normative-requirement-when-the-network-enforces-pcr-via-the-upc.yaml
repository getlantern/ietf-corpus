document: rfc-2331
kind: normative-requirement
summary: When the network enforces PCR via the UPC function and traffic shaping is not enabled at the source, the source SHOULD signal for tagging (UBR.2) so that non-conforming cells are tagged and forwarded rather than dropped.
section: 5.3.1.1
rfc2119_level: SHOULD
