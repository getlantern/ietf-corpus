document: rfc-2526
kind: normative-requirement
summary: For IPv6 address types with 64-bit EUI-64 interface identifiers, the universal/local bit MUST be set to 0 (local) in all reserved subnet anycast addresses, indicating the interface identifier is not globally unique.
