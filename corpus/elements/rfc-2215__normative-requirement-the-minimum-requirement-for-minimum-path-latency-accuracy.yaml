document: rfc-2215
kind: normative-requirement
summary: The minimum requirement for MINIMUM_PATH_LATENCY accuracy is that the element estimate its delay to the nearest 100-microsecond granularity. Measuring in milliseconds is explicitly unacceptable because multi-hop composed delays would be misleadingly large.
section: "3.4"
rfc2119_level: REQUIRED
topics:
