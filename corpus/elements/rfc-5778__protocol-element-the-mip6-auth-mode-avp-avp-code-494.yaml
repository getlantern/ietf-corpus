document: rfc-5778
kind: protocol-element
summary: The MIP6-Auth-Mode AVP (AVP Code 494, Enumerated) conveys the Mobile IPv6 Authentication Protocol mode used. This specification defines only one value, MIP6_AUTH_MN_AAA (value 1), for the case where the MN-AAA security association is used to authenticate the Binding Update.
