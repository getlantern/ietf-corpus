document: rfc-6352
kind: normative-requirement
summary: When the data stored by the server after a PUT is not octet-equal to what the client submitted, a strong entity tag MUST NOT be returned in the PUT response, signaling the client that it must re-retrieve the resource before further changes.
section: 6.3.2.3
rfc2119_level: MUST NOT
topics:
    - http
