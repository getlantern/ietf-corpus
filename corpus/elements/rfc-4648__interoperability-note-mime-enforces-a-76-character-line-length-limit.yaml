document: rfc-4648
kind: interoperability-note
summary: MIME enforces a 76-character line length limit on base64 data, inherited from PEM (which uses 64 characters), both originating from SMTP constraints. RFC 4648 does not impose line length limits; applications referencing RFC 4648 must explicitly specify if line wrapping is required.
section: "3.1"
topics:
    - email
