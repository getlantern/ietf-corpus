document: rfc-6798
kind: wire-format
summary: Positive PDV Threshold/Peak and Negative PDV Threshold/Peak are each 16-bit signed fields in S11:4 format (milliseconds). Over-range negative is coded 0x8000, over-range positive is 0x7FFE, and unavailable MUST be coded 0x7FFF.
section: "3.2"
