document: rfc-7357
kind: security-consideration
summary: ESADI makes persistent duplicate MAC address attachment within a Data Label explicitly and persistently visible to all participating RBridges, unlike data plane learning. This aids detection of misconfiguration or spoofing but may also reflect legitimate multi-homing.
