document: rfc-9557
kind: interoperability-note
summary: 'Producers and recipients may use different revisions of the IANA Time Zone Database. If a recipient does not recognize a time zone name in the suffix, it should treat this as any other inconsistency: ignore if elective, reject or error-handle if critical.'
section: "4.1"
topics:
