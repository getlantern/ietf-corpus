document: rfc-4896
kind: normative-requirement
summary: An endpoint SHOULD transmit requested feedback repeatedly until it receives another valid message that updates the feedback data, rather than sending it only once. This handles cases such as retransmitted SIP 200 OK responses where the original feedback-carrying message may not have been received.
section: "9.2"
rfc2119_level: SHOULD
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
