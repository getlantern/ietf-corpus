document: rfc-4971
kind: normative-requirement
summary: If the S bit is set, the IS-IS Router CAPABILITY TLV MUST be flooded across the entire routing domain. If the S bit is not set, the TLV MUST NOT be leaked between levels. This bit MUST NOT be altered during TLV leaking.
section: "2"
rfc2119_level: MUST
topics:
    - routing
