document: rfc-3807
kind: normative-requirement
summary: A naming convention MUST be used for V5UA Interface Identifiers to ensure a clear association between E1 links and channels, since V5 System Management requires knowledge of link status and the IUA protocol alone provides no guarantee that a C-channel is on the link it claims.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
