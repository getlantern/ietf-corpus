document: rfc-9432
kind: privacy-consideration
summary: Catalog zones reveal the full set of zones served by their consumers, including associated properties. Operators SHOULD limit the systems able to query catalog zones and SHOULD conduct catalog zone transfers confidentially per RFC 9103 to prevent unintentional exposure.
section: "7"
topics:
    - dns
    - privacy
