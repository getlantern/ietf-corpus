document: rfc-5601
kind: normative-requirement
summary: By default, all read-create objects in pwEntry MUST NOT be changed after row activation unless the individual object description specifically permits it. Objects that may be changed require either the PW to be inactive (pwRowStatus notInService/notReady or pwAdminStatus down) or are explicitly marked as changeable at any time.
section: "12"
rfc2119_level: MUST NOT
topics:
