document: rfc-5255
kind: security-consideration
summary: The LANGUAGE extension makes a new command available in 'Not Authenticated' state. Implementations running with root privilege in this state are particularly vulnerable to buffer overflow errors and must parse the LANGUAGE command with extra care.
section: "7"
topics:
