document: rfc-7559
kind: normative-requirement
summary: On non-multicast links, hosts MUST continue retransmitting RSs even after receiving an RA that results in a default route, because on such links sending an RA can only be triggered by an RS.
section: "2.1"
rfc2119_level: MUST
