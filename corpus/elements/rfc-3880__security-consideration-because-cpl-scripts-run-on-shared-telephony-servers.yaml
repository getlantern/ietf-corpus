document: rfc-3880
kind: security-consideration
summary: 'Because CPL scripts run on shared telephony servers and may be submitted by untrusted users, CPL is intentionally restricted: no variables, no loops, no external program execution, and no recursion. Servers MUST validate scripts at upload time rather than at call processing time to prevent denial-of-service from malformed scripts.'
section: "13"
topics:
