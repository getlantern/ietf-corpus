document: rfc-5098
kind: protocol-element
summary: pktcSigCapabilityTable lists the signaling types (e.g., ncs(2)), versions, and vendor extensions supported by the MTA. Multiple entries are required if the device supports multiple versions of the same signaling type. Vendor extensions use an ABNF-defined syntax with X-prefixed alphanumeric tokens.
