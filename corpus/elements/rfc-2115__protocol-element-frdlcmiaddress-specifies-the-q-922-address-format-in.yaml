document: rfc-2115
kind: protocol-element
summary: 'frDlcmiAddress specifies the Q.922 address format in use: q921(1) for 13-bit DLCI, q922March90(2) for 11-bit, q922November90(3) for 10-bit, and q922(4) for the final standard. frDlcmiAddressLen indicates the address length as twoOctets(2), threeOctets(3), or fourOctets(4) including the control portion.'
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
