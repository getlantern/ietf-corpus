document: rfc-9140
kind: security-consideration
summary: In the Reconnect Exchange, the server SHOULD NOT offer and the peer MUST NOT accept protocol versions or cryptosuites weaker than those in the current persistent association. The CryptosuitepPrev/KzPrev rollback mechanism protects against synchronization failures caused by a lost final response during cryptosuite upgrades.
section: "6.5"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
