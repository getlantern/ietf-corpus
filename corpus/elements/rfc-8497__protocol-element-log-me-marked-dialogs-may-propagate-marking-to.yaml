document: rfc-8497
kind: protocol-element
summary: '''Log me'' marked dialogs MAY propagate marking to related dialogs for call control features such as call forward, transfer, park, and join (e.g., REFER, 3xx, INVITE with Replaces). Correlated logging uses Session-ID header field values across related dialogs.'
