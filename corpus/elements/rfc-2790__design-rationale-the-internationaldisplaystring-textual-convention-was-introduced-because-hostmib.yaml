document: rfc-2790
kind: design-rationale
summary: The InternationalDisplayString textual convention was introduced because HostMIB agents generally cannot be correctly configured for the character set used by all files on a multi-user system; instead, NMS applications rely on human configuration to interpret the character set, mirroring the behavior of local applications.
