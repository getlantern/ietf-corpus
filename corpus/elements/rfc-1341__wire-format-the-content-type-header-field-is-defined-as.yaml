document: rfc-1341
kind: wire-format
summary: The Content-Type header field is defined as 'type "/" subtype *(";", parameter)' where type is one of the seven standard types or an x-token, subtype is a token, and parameters are attribute=value pairs. Type, subtype, and parameter names are case-insensitive; parameter values are case-sensitive unless otherwise specified for the specific parameter.
section: "4"
topics:
