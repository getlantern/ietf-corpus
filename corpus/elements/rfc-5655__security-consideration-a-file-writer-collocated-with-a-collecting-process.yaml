document: rfc-5655
kind: security-consideration
summary: A File Writer collocated with a Collecting Process SHOULD NOT sign an IPFIX File unless the originating Transport Session was protected by TLS or DTLS and the Exporting Process was positively identified by certificate; signing data from an unauthenticated source provides no meaningful end-to-end data provenance guarantee.
section: 7.3.1
topics:
    - security
    - measurement
