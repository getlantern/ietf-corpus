document: rfc-1793
kind: normative-requirement
summary: 'When checking if an LSA has changed, the following constitute content changes: Options field changed; either instance has LS age of MaxAge; length field changed; or LSA contents excluding the 20-byte header changed (excluding LS Sequence Number and LS Checksum changes).'
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
