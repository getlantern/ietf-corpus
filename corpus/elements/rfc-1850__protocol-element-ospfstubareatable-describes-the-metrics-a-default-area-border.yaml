document: rfc-1850
kind: protocol-element
summary: ospfStubAreaTable describes the metrics a default Area Border Router will advertise into a stub area, indexed by ospfStubAreaId and ospfStubTOS. ospfStubMetricType can be ospfMetric (OSPF internal), comparableCost (external type 1), or nonComparable (external type 2).
