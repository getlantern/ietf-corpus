summary: The C binding gss_encapsulate_token() takes a gss_const_buffer_t input_token and gss_const_OID token_oid, and writes the encapsulated result into a gss_buffer_t output_token. Returns OM_uint32 status codes GSS_S_COMPLETE or GSS_S_FAILURE.
