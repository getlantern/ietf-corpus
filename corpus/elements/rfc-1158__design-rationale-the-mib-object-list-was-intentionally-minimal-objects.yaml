kind: design-rationale
summary: 'The MIB object list was intentionally minimal: objects were excluded if not essential, if their definition was unclear, or if they required vendor- or OS-specific knowledge (e.g., BSD UNIX routing table variables). The general guideline was one counter per critical section per layer to avoid heavily instrumenting critical code paths.'
