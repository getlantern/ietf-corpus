document: rfc-4208
kind: normative-requirement
summary: When a core-node receives a Path message from an edge-node containing an ERO, it SHOULD verify the route against its topology database. If the route is not viable (topology, available resources, or policy), a PathErr with error 24,5 should be returned.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
