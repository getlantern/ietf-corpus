document: rfc-3477
kind: design-rationale
summary: MPLS TE signalling did not support unnumbered links because the Explicit Route and Record Route Objects had no way to indicate an unnumbered link. This document extends RSVP-TE to fill that gap, while IGP TE extensions (IS-IS/OSPF) cover advertisement of unnumbered links separately.
section: "1"
topics:
