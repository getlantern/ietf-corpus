document: rfc-3711
kind: normative-requirement
summary: SRTCP message authentication is MANDATORY because malicious or erroneous alteration of RTCP messages could disrupt processing of the RTP stream. Encryption and replay protection for SRTCP remain optional and independent.
section: "3"
rfc2119_level: REQUIRED
