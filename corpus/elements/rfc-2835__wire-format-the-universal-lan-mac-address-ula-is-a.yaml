document: rfc-2835
kind: wire-format
summary: The Universal LAN MAC Address (ULA) is a 48-bit field in IEEE 802.1A canonical bit order. The L/U bit (bit 1 of byte 0) is 1 for locally administered addresses, 0 for universal; the G/I bit is 1 for group addresses, 0 for individual.
