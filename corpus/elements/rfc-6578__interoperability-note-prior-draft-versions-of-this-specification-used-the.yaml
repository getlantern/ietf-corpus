document: rfc-6578
kind: interoperability-note
summary: Prior draft versions of this specification used the Depth request header instead of the DAV:sync-level element to indicate synchronization scope. Servers wishing backwards compatibility with such clients should fall back to using the Depth header value when DAV:sync-level is absent from the request body.
section: A
topics:
    - http
