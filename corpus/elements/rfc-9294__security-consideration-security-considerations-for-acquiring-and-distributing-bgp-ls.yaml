document: rfc-9294
kind: security-consideration
summary: Security considerations for acquiring and distributing BGP-LS information from RFC 7752 apply, particularly those related to topology information used for traffic engineering. IGP instances originating ASLA TLVs are assumed to support all required security as described in RFC 8919 and RFC 8920.
