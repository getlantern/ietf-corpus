document: rfc-2459
kind: normative-requirement
summary: UTCTime values MUST be expressed in Greenwich Mean Time (Zulu) and MUST include seconds (format YYMMDDHHMMSSZ). YY >= 50 is interpreted as 19YY; YY < 50 is interpreted as 20YY.
