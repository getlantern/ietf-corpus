document: rfc-1172
kind: wire-format
summary: 'Async-Control-Character-Map Configuration Option: Type=2, Length=6, followed by a four-octet big-endian bitmap. Each bit position corresponds to an ASCII control character; bit set to 1 means that character must remain mapped, 0 means it need not be mapped. Default is all ones (0xffffffff).'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
