document: rfc-1657
kind: protocol-element
summary: The BGP4-MIB module is rooted at { mib-2 15 } and defines managed objects for controlling and monitoring BGP-4 implementations. It comprises scalar objects, the BGP Peer Table, the deprecated BGP Received Path Attribute Table (for BGP v3 or less), and the BGP-4 Received Path Attribute Table.
