document: rfc-4171
kind: wire-format
summary: iSNSP payload attributes use Tag-Length-Value (TLV) encoding with mandatory 4-byte alignment; attribute values are padded to the next 4-byte boundary. A 0-length TLV encodes a NULL value (e.g., a NULL Portal Group Tag).
section: 5.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
