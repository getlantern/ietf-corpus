document: rfc-4012
kind: design-rationale
summary: IPv6 prefix ranges were added to the existing mnt-routes attribute in aut-num rather than creating a new attribute type, despite potential conflicts with existing IPv4-only implementations, because the optional prefix range list was perceived to have minimal implementation adoption.
