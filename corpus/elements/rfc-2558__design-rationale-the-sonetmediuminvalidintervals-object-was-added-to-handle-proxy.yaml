document: rfc-2558
kind: design-rationale
summary: The sonetMediumInvalidIntervals object was added to handle proxy agent scenarios where some historical 15-minute intervals have no data. This is distinct from sonetMediumValidIntervals, which reports the maximum interval number for which any data is available rather than a count of fully valid intervals.
