document: rfc-7148
kind: security-consideration
summary: DHCPv6 signaling between the MAG and LMA requires message integrity protection and source authentication. The IPsec security association protecting PMIPv6 signaling MUST also be used to protect DHCPv6 signaling between MAG and LMA, using ESP in transport mode as illustrated by the SPD/SAD example entries.
section: "6"
topics:
    - security
    - ipsec
    - mobility
