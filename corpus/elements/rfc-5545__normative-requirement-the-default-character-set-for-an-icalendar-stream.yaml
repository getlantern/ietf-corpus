document: rfc-5545
kind: normative-requirement
summary: The default character set for an iCalendar stream is UTF-8 as defined in RFC 3629. When transported as a MIME entity, the 'charset' Content-Type parameter MUST be used to specify the charset being used.
section: 3.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
