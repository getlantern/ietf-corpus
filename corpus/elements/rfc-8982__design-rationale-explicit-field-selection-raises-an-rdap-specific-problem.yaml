document: rfc-8982
kind: design-rationale
summary: 'Explicit field selection raises an RDAP-specific problem: entity information in jCard cannot be easily selected because it is split into items of a jagged array, and RDAP service-information properties (rdapConformance, links, notices) would need to be returned unrequested, complicating server logic.'
