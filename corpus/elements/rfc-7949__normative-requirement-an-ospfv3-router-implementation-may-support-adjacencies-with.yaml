document: rfc-7949
kind: normative-requirement
summary: An OSPFv3 router implementation MAY support adjacencies with OSPFv3 neighbors on different IPv4 subnets. If cross-subnet adjacencies are supported, the IPv4 data plane MUST resolve IPv4 addresses to Layer 2 addresses using ARP on multi-access networks and point-to-point over LAN (RFC 5309) for direct next hops.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
