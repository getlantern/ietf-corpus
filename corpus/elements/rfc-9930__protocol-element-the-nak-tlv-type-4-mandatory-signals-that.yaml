document: rfc-9930
kind: protocol-element
summary: The NAK TLV (type 4, mandatory) signals that a received TLV type is unsupported. It contains Vendor-Id (4 octets), NAK-Type (2 octets identifying the unsupported TLV), and optional TLVs. A NAK TLV MUST NOT be sent in response to a message containing a Result TLV.
section: 4.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
