document: rfc-8334
kind: normative-requirement
summary: If the ICANN TMCH is not used or multiple Trademark Validators are used, the Validator Identifier MUST be defined using the "validatorID" attribute, and the server MUST define and make the list of supported validator identifiers available to clients via an out-of-band mechanism.
section: "2.2"
rfc2119_level: MUST
topics:
    - registry
    - security
