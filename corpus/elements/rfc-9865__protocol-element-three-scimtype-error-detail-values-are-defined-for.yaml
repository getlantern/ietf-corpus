document: rfc-9865
kind: protocol-element
summary: 'Three scimType error detail values are defined for HTTP 400 responses: `invalidCursor` (cursor value is invalid), `expiredCursor` (cursor has expired, client waited too long between requests), and `invalidCount` (count value is out of range or inconsistent with initial query). These extend the error keyword list in RFC 7644 Table 9.'
section: "2.1"
topics:
    - security
