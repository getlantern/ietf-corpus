document: rfc-5954
kind: wire-format
summary: The corrected IPv6address ABNF (from RFC 3986) enumerates all nine legal forms of a 128-bit IPv6 address using h16 (1–4 hex digits) and ls32 (either two h16 groups or an IPv4address). It replaces the flawed hexpart/hexseq/hex4 grammar from RFC 3261 and prevents generation of the extra-colon construct.
section: "4.1"
topics:
    - ip
    - sip
