document: rfc-7728
kind: normative-requirement
summary: All RTCP feedback messages defined in this specification MUST follow normal AVPF-defined timing rules. PAUSE and RESUME are recommended to use Early or Immediate timing; PAUSED first transmission for each PauseID is recommended Immediate or Early to stop unnecessary PAUSE repetitions; REFUSED first transmission is also recommended Immediate or Early.
section: "8.5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
