document: rfc-8010
kind: registry
summary: The IPP IANA registry (IANA-IPP) contains the 'Attribute Group Tags' registry (delimiter tags 0x00-0x0f), the 'Out-of-Band Attribute Value Tags' registry (0x10, 0x12, 0x13), and the 'Attribute Syntaxes' registry (integer, octetString, and character-string value-tags). Unassigned values in each range are reserved for future standards.
