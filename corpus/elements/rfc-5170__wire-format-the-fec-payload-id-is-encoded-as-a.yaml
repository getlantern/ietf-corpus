document: rfc-5170
kind: wire-format
summary: 'The FEC Payload ID is encoded as a 32-bit word: bits 0-11 carry the Source Block Number (12 bits), and bits 12-31 carry the Encoding Symbol ID (20 bits). There MUST be exactly one FEC Payload ID per packet.'
section: "4.1"
