document: rfc-5177
kind: normative-requirement
summary: If a network address and prefix of a subnet in the moving network is sent by the Mobile Router within a dynamic routing protocol message over the tunnel, it SHOULD NOT also be sent in the Mobile IPv4 Registration Request, to avoid incoherencies in forwarding information bases.
section: "9"
rfc2119_level: SHOULD NOT
topics:
    - mobility
    - routing
    - ip
