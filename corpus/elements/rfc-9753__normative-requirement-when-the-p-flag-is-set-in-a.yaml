document: rfc-9753
kind: normative-requirement
summary: When the P flag is set in a PCUpd or PCInitiate message received on a session where the R bit was set by both peers, the object MUST be taken into account by the PCC. The P flag for mandatory objects (SRP, LSP, ERO) MUST be set in PCUpd/PCInitiate messages.
section: 3.2.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
