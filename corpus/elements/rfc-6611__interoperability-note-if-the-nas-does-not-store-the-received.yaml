document: rfc-6611
kind: interoperability-note
summary: If the NAS does not store the received AAA home agent information for the duration of the MN's session and the MN delays its DHCPv6 request, the NAS/DHCP relay will not include the Relay-Supplied Options in the Relay Forward message, causing the DHCP server to fall back to RFC 6610 defined behavior.
section: 4.2.1
topics:
    - mobility
    - ip
