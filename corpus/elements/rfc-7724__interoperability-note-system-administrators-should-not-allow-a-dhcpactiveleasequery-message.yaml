document: rfc-7724
kind: interoperability-note
summary: System administrators SHOULD NOT allow a DHCPACTIVELEASEQUERY message to be sent over a DHCP TCP connection to a server that does not support Active Leasequery, because RFC 6926 did not specify behavior for unknown message types over TCP.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
