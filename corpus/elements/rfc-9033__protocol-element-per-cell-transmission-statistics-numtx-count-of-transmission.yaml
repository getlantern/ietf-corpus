document: rfc-9033
kind: protocol-element
summary: Per-cell transmission statistics NumTx (count of transmission attempts) and NumTxAck (count of acknowledged transmissions) are maintained for each negotiated Tx cell to the selected parent. Packet Delivery Ratio (PDR) = NumTxAck/NumTx expressed as a percentage.
