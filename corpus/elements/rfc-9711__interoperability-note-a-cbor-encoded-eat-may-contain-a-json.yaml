document: rfc-9711
kind: interoperability-note
summary: A CBOR-encoded EAT may contain a JSON-encoded nested token and vice versa, enabling composite devices to be built without regard to encoding used by components. JSON-encoded nested CBOR tokens are base64url encoded; CBOR-encoded nested JSON tokens are text strings.
section: 4.2.18.3
topics:
    - cbor
    - json
