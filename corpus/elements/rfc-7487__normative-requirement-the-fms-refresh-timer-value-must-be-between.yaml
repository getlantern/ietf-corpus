document: rfc-7487
kind: normative-requirement
summary: The FMS Refresh Timer value MUST be between 1 and 20 seconds as specified in RFC 6427. If the egress LSR cannot support the value, it SHOULD reply with a supported timer value.
section: "3.5"
rfc2119_level: MUST
