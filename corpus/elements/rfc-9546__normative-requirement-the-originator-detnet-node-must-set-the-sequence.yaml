document: rfc-9546
kind: normative-requirement
summary: The originator DetNet node MUST set the Sequence Number field before transmitting a packet. The initial value SHOULD be random (unpredictable), and the originator SHOULD increment it by 1 for each active OAM packet.
section: "3.1"
rfc2119_level: MUST
topics:
