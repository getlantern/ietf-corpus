document: rfc-1583
kind: normative-requirement
summary: Virtual links cannot be configured through stub areas, and AS boundary routers cannot be placed internal to stub areas. These restrictions ensure no confusion arises in the flooding of AS external advertisements.
section: "3.6"
rfc2119_level: MUST NOT
