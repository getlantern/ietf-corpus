document: rfc-1323
kind: design-rationale
summary: SACK was omitted from RFC 1323 despite being defined in RFC 1072 because important technical issues about format and semantics remained unresolved. SACK was deferred to a separate specification rather than delay the window scaling and timestamps extensions.
