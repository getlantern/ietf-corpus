document: rfc-2038
kind: interoperability-note
summary: 'The specification targets four end-system types: Transmitting Interworking Unit (TIU), Receiving Interworking Unit (RIU), Transmitting Internet End-System (TAES), and Receiving Internet End-System (RAES). Each transmitter type must interoperate with each receiver type, driving the need for two payload format profiles.'
