summary: The 'Rate' SDP parameter is required and MUST be either 8000 or 16000. The optional 'mode' parameter is a comma-separated list of modes (0, 1, 3, 4) indicating dynamically changeable modes; if absent, the session defaults to a single fixed mode per Table 4.
