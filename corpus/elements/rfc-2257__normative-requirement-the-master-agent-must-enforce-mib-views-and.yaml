document: rfc-2257
kind: normative-requirement
summary: The master agent must enforce MIB views and access control policy; subagents are explicitly shielded from these responsibilities. From an SNMP manager's perspective, the extensible agent must behave identically to a monolithic agent with equivalent instrumentation.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
    - security
