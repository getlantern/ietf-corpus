document: rfc-5682
kind: normative-requirement
summary: In F-RTO step 2b, when the first post-RTO ACK advances the window without covering 'recover', the sender transmits up to two new (previously unsent) segments and MAY override the Nagle algorithm to immediately send a segment if needed.
section: "2.1"
rfc2119_level: MAY
topics:
    - tcp
    - congestion
