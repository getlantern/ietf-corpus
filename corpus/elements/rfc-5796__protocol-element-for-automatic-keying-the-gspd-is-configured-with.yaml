document: rfc-5796
kind: protocol-element
summary: For automatic keying, the GSPD is configured with 'sender only' directional entries that trigger the group key management protocol for a registration exchange, which sets up the outbound SAD entry; the exchange also installs 'receiver only' GSPD entries for each legitimate peer router.
