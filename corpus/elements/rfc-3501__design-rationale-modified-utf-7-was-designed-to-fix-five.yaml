document: rfc-3501
kind: design-rationale
summary: 'Modified UTF-7 was designed to fix five problems with standard UTF-7: ''+'' shift character conflicts with mailbox name usage; ''/'' in BASE64 conflicts with hierarchy delimiter; prohibited ''\'' and ''~'' conflict with hierarchy delimiters and home directory indicators; and UTF-7 allows multiple encodings of the same string.'
section: 5.1.3
topics:
    - email
