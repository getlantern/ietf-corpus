document: rfc-5839
kind: design-rationale
summary: Entity-tags are modeled after HTTP conditional requests and the SIP PUBLISH mechanism. The solution allows subscribers to condition SUBSCRIBE requests on whether state has changed since a previously received notification, suppressing redundant NOTIFYs.
