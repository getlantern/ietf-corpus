document: rfc-7117
kind: protocol-element
summary: An S-PMSI A-D route is originated by an ingress PE in the MCAST-VPLS address family to announce the binding of specific (C-S, C-G) streams to a Selective P-multicast tree. It carries an RD, multicast source and group fields (with wildcard encoded as address 0), the Originating Router's IP address, and a PMSI Tunnel attribute.
section: "8.2"
topics:
    - mpls
    - multicast
    - routing
