document: rfc-9557
kind: normative-requirement
summary: Section 4.3 of RFC 3339 is updated so that offset Z means 'UTC time is known but local offset is unknown', differing semantically from +00:00, which retains the implication that UTC is the preferred reference point. The offset -00:00 is noted as less interoperable but not formally deprecated; Z should be used in its place.
section: "2.2"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
