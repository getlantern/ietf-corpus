document: rfc-4860
kind: normative-requirement
summary: Aggregators and Deaggregators SHOULD use interface-independent addresses (e.g., loopback) when communicating their respective identities to each other, to ensure identification is not impacted by interface state changes and to reduce RSVP signaling churn.
