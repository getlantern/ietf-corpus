document: rfc-2420
kind: wire-format
summary: The 3DESE packet format contains Address (1 byte), Control (1 byte), Protocol ID (0x53 or 0x55, 2 bytes), a 16-bit Sequence Number (high and low bytes), and the Ciphertext payload. Protocol Field Compression MAY be applied to the leading zero of the Protocol ID.
