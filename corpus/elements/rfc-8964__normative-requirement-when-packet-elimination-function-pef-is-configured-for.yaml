document: rfc-8964
kind: normative-requirement
summary: When Packet Elimination Function (PEF) is configured for a DetNet service, duplicate (replicated) instances of a particular sequence number MUST be discarded. PEF MUST NOT be used with DetNet flows configured with a d-CW Sequence Number field length of 0 bits.
section: 4.2.2.2
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
