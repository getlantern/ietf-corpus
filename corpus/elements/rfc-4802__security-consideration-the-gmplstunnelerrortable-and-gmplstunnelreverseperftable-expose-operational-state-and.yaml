document: rfc-4802
kind: security-consideration
summary: The gmplsTunnelErrorTable and gmplsTunnelReversePerfTable expose operational state and error details that could be used by an attacker to infer network topology or traffic patterns. Read-only access to these tables should be restricted using SNMPv3 access control to prevent information leakage.
section: "9"
topics:
    - mpls
    - snmp
    - security
