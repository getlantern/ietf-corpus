document: rfc-1044
kind: wire-format
summary: 'The extended (32-bit) Message Proper header extends to 16 bytes minimum: bytes 2–3 add TO Domain and Network numbers; byte 4 adds an Outnet bit to the adapter address; bytes 10–11 carry FROM Domain and Network; byte 12 carries Age Count; bytes 14–15 carry Next Header Offset and Header End Offset (normally 16); user protocol data begins at byte 16.'
section: EXTENDED (32-BIT ADDRESS) MESSAGE PROPER HEADER
topics:
