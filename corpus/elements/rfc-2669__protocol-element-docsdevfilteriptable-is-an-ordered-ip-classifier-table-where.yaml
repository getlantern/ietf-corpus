document: rfc-2669
kind: protocol-element
summary: docsDevFilterIpTable is an ordered IP classifier table where each row matches on source/destination address+mask, IP protocol (0–256, 256=any), source/destination port ranges, TOS/mask, interface, and direction. On match, the packet is discarded, accepted, or subjected to a policy group; docsDevFilterIpContinue allows scanning to continue for additional matches.
