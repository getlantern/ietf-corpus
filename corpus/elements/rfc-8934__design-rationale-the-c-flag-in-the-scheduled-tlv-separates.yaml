document: rfc-8934
kind: design-rationale
summary: The C flag in the scheduled TLV separates responsibility for LSP setup/teardown between PCC and PCE, allowing flexibility for deployments where either the PCC (C=1) or the delegated PCE (C=0) is better positioned to trigger signaling at the scheduled start time.
section: 5.2.1
topics:
