document: rfc-1001
kind: protocol-element
summary: Name challenge verifies current ownership by sending a NAME QUERY REQUEST to the alleged owner; failure to respond causes the challenger to consider the name released. A challenge may be issued by any NBNS, P node, or M node against any end-node type at any time.
section: 15.1.3.3
topics:
