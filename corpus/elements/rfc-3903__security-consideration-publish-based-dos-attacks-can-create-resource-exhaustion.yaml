document: rfc-3903
kind: security-consideration
summary: PUBLISH-based DoS attacks can create resource exhaustion at the ESC. Mitigations include requiring authentication, throttling incoming publications, using minimum Expires values to reduce refresh rate, and debounce logic to limit downstream NOTIFY traffic.
section: "14.2"
topics:
    - sip
    - security
    - realtime
