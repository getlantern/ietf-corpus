document: rfc-7148
kind: normative-requirement
summary: On receiving an IP packet from a mobile router, the MAG MUST ensure an established binding exists and that the source IP address is a DMNP delegated to that mobile router before tunneling; packets whose source address is not part of the DMNP MUST NOT be tunneled to the LMA.
section: 5.1.4
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
