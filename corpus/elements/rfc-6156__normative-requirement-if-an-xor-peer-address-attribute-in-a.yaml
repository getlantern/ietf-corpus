document: rfc-6156
kind: normative-requirement
summary: If an XOR-PEER-ADDRESS attribute in a CreatePermission request contains an address of a different family than the allocation's relayed transport address, the server MUST generate an error response with the 443 (Peer Address Family Mismatch) code.
section: "6.2"
rfc2119_level: MUST
topics:
