document: rfc-6795
kind: normative-requirement
summary: If the SUBSCRIBE body contained a local session description and the subscription was accepted, the NOTIFY body MUST contain a policy for the local session description. If both local and remote descriptions were included, the NOTIFY MUST contain policies for both.
section: "3.5"
rfc2119_level: MUST
topics:
    - sip
