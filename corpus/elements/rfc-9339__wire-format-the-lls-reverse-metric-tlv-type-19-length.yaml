document: rfc-9339
kind: wire-format
summary: The LLS Reverse Metric TLV (Type=19, Length=4 octets) carries an 8-bit MTID, an 8-bit Flags field (with H=0x1 and O=0x2 flags defined), and a 16-bit unsigned Reverse Metric value. Remaining flag bits MUST be set to 0 on transmission and ignored on reception.
