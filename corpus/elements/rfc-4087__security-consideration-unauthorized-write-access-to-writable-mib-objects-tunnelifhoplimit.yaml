document: rfc-4087
kind: security-consideration
summary: Unauthorized write access to writable MIB objects (tunnelIfHopLimit, tunnelIfTOS, tunnelIfAddressType, tunnelIfLocalInetAddress, tunnelIfRemoteInetAddress, tunnelInetConfigStatus) could allow unauthorized creation or modification of tunnels, resulting in denial of service or redirection of packets to an arbitrary destination.
