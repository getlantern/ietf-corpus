document: rfc-7825
kind: protocol-element
summary: The session-level SDP attribute 'a=rtsp-ice-d-m' indicates that the server supports ICE-based NAT traversal for RTSP-controlled media sessions. Servers SHOULD include this attribute in any SDP describing content they serve.
section: "4.7"
topics:
    - nat
    - realtime
