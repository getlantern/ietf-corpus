document: rfc-6851
kind: interoperability-note
summary: 'MOVE applies to IMAP events in Sieve (RFC 6785) the same way COPY does: a MOVE can cause a Sieve script to be invoked with imap.cause set to "COPY". Because MOVE does not change flags, a MOVE will never trigger a Sieve invocation with imap.cause set to "FLAG".'
section: "4.5"
