document: rfc-2784
kind: normative-requirement
summary: A receiver MUST discard a packet where any of bits 1-5 of Reserved0 are non-zero, unless the receiver implements RFC 1701. Bits 6-12 MUST be sent as zero and MUST be ignored on receipt.
section: "2.3"
rfc2119_level: MUST
topics:
