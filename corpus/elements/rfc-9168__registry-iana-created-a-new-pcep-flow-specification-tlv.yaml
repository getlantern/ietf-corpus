summary: 'IANA created a new ''PCEP Flow Specification TLV Type Indicators'' subregistry. Range 0–255 is reserved mirroring BGP Flow Spec registries; 256–64506 requires Specification Required; 64507–65531 is First Come First Served; 65532–65535 is Experimental. Initial values: 256 (Route Distinguisher), 257 (IPv4 Multicast), 258 (IPv6 Multicast).'
