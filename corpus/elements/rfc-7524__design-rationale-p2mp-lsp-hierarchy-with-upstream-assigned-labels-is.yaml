document: rfc-7524
kind: design-rationale
summary: P2MP LSP hierarchy with upstream-assigned labels is used even for 1:1 mapping between intra-area segments and P2MP LSPs by employing Implicit NULL as the upstream-assigned label. This simplifies the model by providing a uniform mechanism for both 1:1 and n:1 mappings.
