document: rfc-3065
kind: protocol-element
summary: An AS Confederation is a collection of autonomous systems advertised as a single AS number to BGP speakers external to the confederation. It has an AS Confederation Identifier (externally visible AS number) and contains Member-ASes with Member-AS Numbers visible only internally.
