document: rfc-7234
kind: privacy-consideration
summary: 'Shared caches can expose browsing behavior as a timing side-channel: a second user sharing a cache may detect that another user visited a site because cached resources load faster. The no-store directive is not a reliable privacy mechanism since malicious or compromised caches might not honor it and communications networks may be vulnerable to eavesdropping.'
section: "8"
topics:
    - http
    - privacy
