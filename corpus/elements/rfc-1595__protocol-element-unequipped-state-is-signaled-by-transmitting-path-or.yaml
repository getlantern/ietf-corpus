document: rfc-1595
kind: protocol-element
summary: 'Unequipped state is signaled by transmitting Path or VT Signal Label as zero: C2 byte of STS Path Overhead = 0x00 for unequipped Path; V5 byte of VT Path Overhead = 0x00 for unequipped VT. Signal Label Mismatch occurs when a received label does not equal the provisioned value or 0x01 (''equipped non-specific'').'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
