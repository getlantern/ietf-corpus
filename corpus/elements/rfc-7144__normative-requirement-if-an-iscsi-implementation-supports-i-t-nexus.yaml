document: rfc-7144
kind: normative-requirement
summary: If an iSCSI implementation supports I_T NEXUS RESET, it MUST also support the protocol behavior defined in Sections 4.1.2 and 4.1.3 of RFC 5048 for multi-task abort operations and follow the sequence of actions described therein.
section: "6.5"
rfc2119_level: MUST
