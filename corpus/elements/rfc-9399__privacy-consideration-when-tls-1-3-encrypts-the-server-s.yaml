document: rfc-9399
kind: privacy-consideration
summary: When TLS 1.3 encrypts the server's certificate during handshake to hide server identity, a client that subsequently fetches remote logotype data referenced in that certificate may disclose the otherwise-protected server identity through the logotype fetch request.
section: "10"
