document: rfc-6059
kind: interoperability-note
summary: 'Simple DNA shares DNAv4''s (RFC 4436) goal of minimizing handover latency on reattachment but differs in mechanism: it supports both SLAAC and DHCPv6 addresses (DNAv4 is IPv4-only) and does not require router modification. The per-router probing approach also differs from DNAv4''s per-link approach.'
section: "8"
