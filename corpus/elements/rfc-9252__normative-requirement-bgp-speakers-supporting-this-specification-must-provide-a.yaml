document: rfc-9252
kind: normative-requirement
summary: BGP speakers supporting this specification MUST provide a mechanism to control the advertisement of SRv6-based BGP service routes on a per-neighbor and per-service basis, because BGP speakers that do not support this specification may misinterpret the SRv6 SID encoded in MPLS Label fields as MPLS label values.
section: 3.2.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
