document: rfc-5870
kind: protocol-element
summary: The optional 'crs' parameter identifies the Coordinate Reference System in use. If absent or set to 'wgs84', the URI uses WGS-84 (EPSG 4326 for 2D, EPSG 4979 for 3D). The 'crs' parameter value is case-insensitive; lowercase is preferred.
