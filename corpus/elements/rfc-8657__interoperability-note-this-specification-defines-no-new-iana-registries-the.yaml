document: rfc-8657
kind: interoperability-note
summary: This specification defines no new IANA registries. The "accounturi" and "validationmethods" parameter names live in a CA-defined namespace per RFC 8659, and CAs may freely adopt or ignore these semantics. ACME validation method labels reference the "ACME Validation Methods" IANA registry defined in RFC 8555.
section: "6"
topics:
