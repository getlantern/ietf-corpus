document: rfc-6283
kind: registry
summary: 'This document creates the IANA registry ''XML Evidence Record Syntax (XMLERS)'' with two sub-registries: ''Time-Stamp Token Type'' (initial values: RFC3161, XMLENTRUST) and ''Cryptographic Information Type'' (initial values: CERT, CRL, OCSP, SCVP). Both sub-registries use the ''RFC Required'' policy. The XML namespace urn:ietf:params:xml:ns:ers and schema URN urn:ietf:params:xml:schema:ers are also registered.'
section: "10"
topics:
