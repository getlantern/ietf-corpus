document: rfc-4734
kind: normative-requirement
summary: V.21 sending implementations SHOULD report a completed event for every bit transmitted rather than only at transitions, to increase reporting redundancy so each event completion is transmitted three times per RFC 4733 Section 2.5.1.4.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
