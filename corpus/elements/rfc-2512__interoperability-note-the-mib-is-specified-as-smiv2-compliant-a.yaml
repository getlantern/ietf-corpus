document: rfc-2512
kind: interoperability-note
summary: The MIB is specified as SMIv2-compliant; a semantically equivalent SMIv1 MIB can be produced via translation, except that Counter64 objects (e.g., cell counters) cannot be translated and must be omitted, and some machine-readable SMIv2 information becomes textual descriptions.
