document: rfc-2355
kind: state-machine
summary: A TN3270E connection operates in either '3270 mode' or 'NVT mode'. The connection starts in 3270 mode. Sending a DATA-TYPE mismatched to the current mode triggers a mode switch. A mode switch causes the client to perform a 3270 Erase/Reset operation at the default partition size; no attributes from the previous environment are preserved.
section: "9.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
