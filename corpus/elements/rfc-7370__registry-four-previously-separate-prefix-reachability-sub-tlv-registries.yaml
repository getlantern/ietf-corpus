document: rfc-7370
kind: registry
summary: Four previously separate prefix reachability sub-TLV registries (for TLVs 135, 235, 236, and 237) have been consolidated into a single registry entitled 'Sub-TLVs for TLVs 135, 235, 236, and 237'. The existing sub-TLV assignments (types 1 and 2 administrative tag sub-TLVs from RFC 5130) apply to all four TLVs.
