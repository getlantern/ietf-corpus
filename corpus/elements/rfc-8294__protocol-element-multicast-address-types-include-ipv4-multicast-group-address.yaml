document: rfc-8294
kind: protocol-element
summary: Multicast address types include ipv4-multicast-group-address (224.0.0.0–239.255.255.255), ipv6-multicast-group-address (ff00::/8), and the version-neutral ip-multicast-group-address union type. Source address types (ipv4-multicast-source-address, ipv6-multicast-source-address) additionally allow the wildcard value '*'.
