document: rfc-8263
kind: security-consideration
summary: A GM transmits an ACK only after fully validating the GROUPKEY-PUSH per RFC 6407 Section 4.4 (format validation, replay protection, and digital signature verification), which mitigates the risk of the GM being used as a DDoS amplifier against the GCKS.
section: "7.2"
topics:
    - security
    - vpn
