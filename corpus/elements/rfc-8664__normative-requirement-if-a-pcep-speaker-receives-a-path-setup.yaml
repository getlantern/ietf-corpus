document: rfc-8664
kind: normative-requirement
summary: If a PCEP speaker receives a PATH-SETUP-TYPE-CAPABILITY TLV with PST=1 but without the SR-PCE-CAPABILITY sub-TLV, it MUST send a PCErr with Error-Type=10, Error-value=12 ('Missing PCE-SR-CAPABILITY sub-TLV') and MUST close the PCEP session.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
