document: rfc-9264
kind: wire-format
summary: Internationalized target attributes (those with a trailing asterisk, following RFC 8187) are serialized in JSON as an array of objects each with a 'value' member (unescaped string content) and an optional 'language' member (BCP 47 language tag). Character encoding information from RFC 8187 is not preserved.
