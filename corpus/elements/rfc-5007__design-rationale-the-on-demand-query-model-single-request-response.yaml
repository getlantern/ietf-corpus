document: rfc-5007
kind: design-rationale
summary: The on-demand query model (single request/response triggered by received traffic) has limitations with prefix delegation because an access concentrator after a reboot may not receive traffic to trigger queries, as it cannot inject routing for delegated prefixes without prior knowledge. This motivated discussion of an anticipatory query mode (not specified here, left as future work).
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
