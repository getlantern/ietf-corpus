document: rfc-7606
kind: normative-requirement
summary: The IPv6 Address Specific Extended Community attribute is malformed if its length is not a non-zero multiple of 20; treat-as-withdraw SHALL be used. A BGP speaker MUST NOT treat an unrecognized IPv6 Address Specific Extended Community Type or Sub-Type as an error.
section: "7.15"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
