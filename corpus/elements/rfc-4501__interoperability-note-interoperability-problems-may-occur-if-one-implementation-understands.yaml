document: rfc-4501
kind: interoperability-note
summary: Interoperability problems may occur if one implementation understands a new DNS class or type mnemonic that another does not. To guarantee interoperability, implementations can use integers for all mnemonics not defined in RFC 1035.
section: "3"
topics:
    - dns
