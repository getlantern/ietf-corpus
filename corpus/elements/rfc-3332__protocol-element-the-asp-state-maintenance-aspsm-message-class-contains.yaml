document: rfc-3332
kind: protocol-element
summary: 'The ASP State Maintenance (ASPSM) message class contains: ASP Up (ASPUP, type 1), ASP Down (ASPDN, type 2), Heartbeat (BEAT, type 3), and their acknowledgements (ASPUP ACK, ASPDN ACK, BEAT ACK). These establish and monitor the operational readiness of the ASP without reference to specific traffic streams.'
section: "3.5"
topics:
