document: rfc-8661
kind: protocol-element
summary: SR-to-LDP interworking stitches an SR node segment from the SR ingress to the SR/LDP boundary node, then an LDP LSP from the boundary to the LDP destination. The boundary node swaps the incoming SR label (advertised by SRMS) to the outgoing LDP label.
section: "3.2"
topics:
