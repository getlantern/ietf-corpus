document: rfc-8209
kind: protocol-element
summary: The BGPsec Router Certificate is an X.509 EE certificate issued under an RPKI CA certificate. It binds one or more ASNs to a public key, authorizing the router holding the corresponding private key to emit BGPsec UPDATE messages on behalf of those ASes.
