document: rfc-4535
kind: security-consideration
summary: GSAKMP does not provide identity protection; participant identities are exposed in the clear during protocol exchanges. The multicast routing infrastructure is not secured by GSAKMP, making multicast flooding DoS attacks possible from insiders (rogue GMs) or non-members directing routers to spray data at a victim.
section: "3.1"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
