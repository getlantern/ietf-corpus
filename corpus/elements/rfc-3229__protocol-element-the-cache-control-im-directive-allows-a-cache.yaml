document: rfc-3229
kind: protocol-element
summary: The Cache-Control "im" directive allows a cache that understands A-IM/IM to ignore an accompanying "no-store" directive, so that 226 responses with max-age can be stored by delta-aware caches while remaining uncached by legacy caches.
section: 10.8.2
topics:
    - http
