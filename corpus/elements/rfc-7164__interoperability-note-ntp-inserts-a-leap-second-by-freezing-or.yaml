document: rfc-7164
kind: interoperability-note
summary: NTP inserts a leap second by freezing or slowing the clock for one second immediately prior to the last second of the affected day, making the last second have a real-time duration of two seconds and compromising timestamp accuracy during that period.
section: "3.2"
topics:
    - rtp
    - ntp
    - realtime
