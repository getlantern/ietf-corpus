document: rfc-2037
kind: protocol-element
summary: The entLogicalTable contains one row per logical entity, indexed by entLogicalIndex (integer 1..2147483647). Each entry includes entLogicalDescr, entLogicalType, entLogicalCommunity (OCTET STRING 1..255), entLogicalTAddress, and entLogicalTDomain to support SNMPv1/v2C access to the logical entity's MIB information. At least one entry must exist.
section: 3.10.2
topics:
