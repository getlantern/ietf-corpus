document: rfc-2178
kind: normative-requirement
summary: For cryptographic (Type 2) authentication, an OSPF packet whose Cryptographic Sequence Number is less than the last received from the same neighbor on the same interface MUST be discarded, preventing replay attacks.
section: D.5.3
