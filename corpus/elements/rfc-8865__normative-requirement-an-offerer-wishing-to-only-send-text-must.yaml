document: rfc-8865
kind: normative-requirement
summary: An offerer wishing to only send text MUST mark the data channel as 'sendonly'; to only receive, it MUST mark it 'recvonly'; to neither send nor receive, it MUST mark it 'inactive'. If marked sendrecv or not explicitly marked, the endpoint MUST be prepared to receive T.140 data as soon as the channel allows it.
section: 4.2.3.1
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
