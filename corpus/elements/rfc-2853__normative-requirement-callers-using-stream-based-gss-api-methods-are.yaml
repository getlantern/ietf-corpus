document: rfc-2853
kind: normative-requirement
summary: Callers using stream-based GSS-API methods are responsible for ensuring that the supplied streams will not block, or expect to block until a full token is processed. Only a single GSS-API token will be processed per invocation of the stream-based method.
section: "4.15"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
