document: rfc-9581
kind: protocol-element
summary: Keys -10 (elective) and 10 (critical) supply a time zone hint as a text string in RFC 9557 time-zone-name or time-numoffset format. Keys -10 and 10 MUST NOT both be present. Key 10 is critical and MUST be used when interpreting the entry.
section: "3.6"
topics:
