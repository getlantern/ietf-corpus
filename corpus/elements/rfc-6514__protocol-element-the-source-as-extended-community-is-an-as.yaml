document: rfc-6514
kind: protocol-element
summary: The Source AS Extended Community is an AS-specific, transitive-across-AS-boundaries Extended Community. Its Global Administrator field MUST be the ASN of the PE and its Local Administrator field MUST be 0. A PE MUST attach it to unicast VPN-IP route advertisements when the MVPN uses BGP for C-multicast routes or segmented inter-AS tunnels.
section: "6"
topics:
