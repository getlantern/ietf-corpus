document: rfc-8539
kind: interoperability-note
summary: This document updates RFC 7598 by removing the restriction that OPTION_S46_BR (90) must be encapsulated within a softwire container option (OPTION_S46_CONT_MAPE or OPTION_S46_CONT_LW). RFC 7598 required clients to silently ignore non-encapsulated softwire options; this document allows OPTION_S46_BR to appear directly in DHCPv6 messages and be requested via ORO.
section: "4.1"
topics:
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
