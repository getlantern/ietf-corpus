document: rfc-6106
kind: security-consideration
summary: An attacker can send a rogue RA containing a fraudulent RDNSS address, misleading IPv6 hosts into contacting a malicious DNS server. Similarly, a fraudulent DNSSL option can cause hosts to resolve unqualified names to attacker-controlled addresses. These attacks are analogous to rogue DHCP and Neighbor Discovery redirect attacks.
section: "7.1"
topics:
    - dns
    - security
    - ip
    - v6ops
