document: rfc-4776
kind: normative-requirement
summary: All civic address component values MUST be encoded as UTF-8. They SHOULD be written in mixed case following customary spelling. Abbreviations MUST NOT be used unless explicitly indicated for each element.
section: "3.4"
rfc2119_level: MUST
