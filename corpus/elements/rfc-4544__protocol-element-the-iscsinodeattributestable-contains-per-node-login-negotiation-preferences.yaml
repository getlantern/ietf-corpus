summary: The iscsiNodeAttributesTable contains per-node login negotiation preferences including InitialR2T, ImmediateData, MaxOutstandingR2T (1–65535 R2Ts, default 1), FirstBurstLength (default 65536 bytes), MaxBurstLength (default 262144 bytes), MaxConnections (default 1), DataSequenceInOrder, DataPDUInOrder, DefaultTime2Wait (default 2s), DefaultTime2Retain (default 20s), and ErrorRecoveryLevel (0–2, default 0).
