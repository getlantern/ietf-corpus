document: rfc-3987
kind: interoperability-note
summary: Validated IDN components of IRIs SHOULD be character-normalized using the Nameprep process (RFC 3491) for scheme-based normalization, but SHOULD NOT be converted into ACE (punycode) form for legibility. Scheme-based normalization may treat an IDN and its punycode equivalent as equivalent.
section: 5.3.3
topics:
    - ip
    - dns
