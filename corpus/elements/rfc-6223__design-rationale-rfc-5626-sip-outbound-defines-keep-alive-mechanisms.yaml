document: rfc-6223
kind: design-rationale
summary: 'RFC 5626 (SIP Outbound) defines keep-alive mechanisms but does not provide explicit negotiation for all cases: dialog-initiated outbound flows, entities that don''t support Outbound, and non-registered UAs (e.g., emergency calls) all lack implicit negotiation. The "keep" parameter fills this gap and also extends negotiation beyond the UA-to-edge-proxy scope enforced by Outbound.'
section: "1"
topics:
    - sip
    - nat
