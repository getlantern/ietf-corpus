document: rfc-1697
kind: protocol-element
summary: rdbmsDbInfoTable (rdbmsObjects 2) holds additional information about databases that are actively opened, including product name, version, size units/allocated/used, and last backup time. It is indexed by rdbmsDbIndex and is only present when at least one rdbmsRelState for that database is active(2).
