document: rfc-3339
kind: design-rationale
summary: Fractional seconds is the only optional element in the format, retained because it is needed by applications requiring strict timestamp ordering or unusual precision. All other rarely-used ISO 8601 options were made mandatory or omitted to avoid parser bugs.
section: "5.3"
