document: rfc-4252
kind: normative-requirement
summary: The 'publickey' authentication method is the only REQUIRED method; all implementations MUST support it. The server MUST check that the key is a valid authenticator for the user and that the signature is valid; if both hold, the request MUST be accepted.
section: "7"
rfc2119_level: REQUIRED
topics:
    - security
    - crypto
