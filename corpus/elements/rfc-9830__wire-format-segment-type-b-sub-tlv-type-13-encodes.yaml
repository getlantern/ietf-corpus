document: rfc-9830
kind: wire-format
summary: Segment Type B sub-TLV (Type 13) encodes a single SRv6 SID as a 16-octet IPv6 address plus optional 8-octet SRv6 Endpoint Behavior and SID Structure. Length MUST be 26 when Endpoint Behavior is present, else 18. Earlier code point 2 for Type B has been deprecated.
section: 2.4.4.2.2
topics:
