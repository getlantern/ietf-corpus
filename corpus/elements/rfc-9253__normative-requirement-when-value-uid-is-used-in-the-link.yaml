document: rfc-9253
kind: normative-requirement
summary: When VALUE=UID is used in the LINK property, the value MUST refer to another component within the same collection. If that collection context changes (e.g., on CalDAV import into a different collection), the UID reference must be replaced with a URI.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
