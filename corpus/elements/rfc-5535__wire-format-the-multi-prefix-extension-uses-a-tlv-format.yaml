document: rfc-5535
kind: wire-format
summary: The Multi-Prefix Extension uses a TLV format with a 16-bit Extension Type (value 0x0012), 16-bit Extension Data Length, a 1-bit P flag (set if a public key is present), 31-bit Reserved field (must be zero), and a vector of 64-bit prefixes Prefix[1..n]. The Ext Len field value is (n*8 + 4).
