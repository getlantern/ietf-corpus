document: rfc-4255
kind: normative-requirement
summary: Upon connection to an SSH server, the SSH client MAY look up SSHFP resource records for the host. If the algorithm and fingerprint of the received server key match a returned SSHFP record, the client MAY accept the server's identity.
section: "2.1"
rfc2119_level: MAY
topics:
    - dns
    - security
