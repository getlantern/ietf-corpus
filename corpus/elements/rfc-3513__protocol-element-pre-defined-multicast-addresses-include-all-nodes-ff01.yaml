summary: 'Pre-defined multicast addresses include: All Nodes (FF01::1, FF02::1), All Routers (FF01::2, FF02::2, FF05::2), and Solicited-Node addresses (FF02::1:FFxx:xxxx) formed by appending the low-order 24 bits of a unicast or anycast address to the prefix FF02::1:FF00::/104.'
