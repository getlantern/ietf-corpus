document: rfc-8945
kind: protocol-element
summary: TSIG is an RR type with code 250 used for transaction-level authentication between DNS entities sharing a secret key. It is a meta-RR that MUST NOT be cached and is dynamically computed to cover a particular DNS transaction; it is discarded once used.
section: "4.1"
