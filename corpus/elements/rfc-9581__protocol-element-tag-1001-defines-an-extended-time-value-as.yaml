document: rfc-9581
kind: protocol-element
summary: Tag 1001 defines an extended time value as a CBOR map (major type 5) with integer or text string keys. The map must contain exactly one unsigned integer 'base time' key and may contain negative integer or text string 'elective' supplementary keys, as well as unsigned integer 'critical' supplementary keys.
