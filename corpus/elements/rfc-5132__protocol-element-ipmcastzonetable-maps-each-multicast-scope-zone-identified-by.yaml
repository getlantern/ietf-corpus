document: rfc-5132
kind: protocol-element
summary: ipMcastZoneTable maps each multicast scope zone (identified by InetZoneIndex) to its address range and identifies the default zone index for each scope. Zone index zero is a special value used to request the default zone and is not valid as a table index.
