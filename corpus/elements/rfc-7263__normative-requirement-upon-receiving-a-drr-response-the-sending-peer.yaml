document: rfc-7263
kind: normative-requirement
summary: Upon receiving a DRR response, the sending peer SHOULD note whether DRR worked in order to decide whether to offer DRR for future transactions. If no response is received before timeout, the peer SHOULD resend the request using SRR.
section: 5.4.2
rfc2119_level: SHOULD
topics:
    - routing
