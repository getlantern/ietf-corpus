document: rfc-2334
kind: interoperability-note
summary: SCSP packets are LLC/SNAP encapsulated with LLC=0xAA-AA-03, OUI=0x00-00-5e, and PID=0x00-05. All fields marked 'unused' MUST be set to zero on transmission and ignored on receipt to allow future extension.
