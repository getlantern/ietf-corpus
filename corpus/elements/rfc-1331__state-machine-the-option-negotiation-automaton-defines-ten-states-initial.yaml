document: rfc-1331
kind: state-machine
summary: 'The Option Negotiation Automaton defines ten states: Initial, Starting, Closed, Stopped, Closing, Stopping, Req-Sent, Ack-Rcvd, Ack-Sent, and Opened. Transitions are triggered by events including Up/Down (lower layer), Open/Close (administrative), Timeout (TO+/TO-), and receipt of LCP packets (RCR+/RCR-/RCA/RCN/RTR/RTA/RUC/RXJ+/RXJ-/RXR). The Opened state is reached when a Configure-Ack has both been sent and received.'
section: "5"
