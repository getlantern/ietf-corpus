document: rfc-4512
kind: normative-requirement
summary: A server that masters entries and permits clients to modify those entries SHALL implement subschema (sub)entries and provide a 'subschemaSubentry' operational attribute in each modifiable entry, so clients can discover permitted attributes and object classes.
