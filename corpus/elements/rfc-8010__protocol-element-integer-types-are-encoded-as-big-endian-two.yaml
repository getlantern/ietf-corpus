document: rfc-8010
kind: protocol-element
summary: Integer types are encoded as big-endian two's-complement signed integers. SIGNED-BYTE (1 octet) is used for version-number and tag fields; SIGNED-SHORT (2 octets) for operation-id, status-code, and length fields; SIGNED-INTEGER (4 octets) for value fields and request-id.
