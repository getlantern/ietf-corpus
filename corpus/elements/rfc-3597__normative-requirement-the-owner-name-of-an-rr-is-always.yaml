document: rfc-3597
kind: normative-requirement
summary: The owner name of an RR is always set to lower case for DNSSEC canonical form regardless of RR type, while the DNSSEC canonical RR ordering follows RFC 2535 section 8.3 using the canonical form as revised by this specification.
