document: rfc-3434
kind: security-consideration
summary: The hcAlarmVariable object can be used to read any MIB object accessible to the probe via the alarm polling mechanism, bypassing normal view-based access control. Write access to hcAlarmVariable MUST only be granted in views that already have read access to all objects on the probe.
section: "10"
topics:
    - snmp
    - security
