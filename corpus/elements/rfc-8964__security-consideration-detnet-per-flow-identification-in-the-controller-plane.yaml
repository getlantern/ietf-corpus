document: rfc-8964
kind: security-consideration
summary: DetNet per-flow identification in the Controller Plane provides attackers with additional information about data flows compared to non-per-flow Controller Planes. This is an inherent property of DetNet with security implications that must be assessed when determining the suitability of DetNet for a given use case.
section: "6"
topics:
