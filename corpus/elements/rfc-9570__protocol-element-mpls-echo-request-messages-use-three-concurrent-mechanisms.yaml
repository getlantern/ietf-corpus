document: rfc-9570
kind: protocol-element
summary: 'MPLS echo request messages use three concurrent mechanisms to prevent leaking beyond the egress LSR: (1) a loopback destination address (127/8 for IPv4, ::1/128 or mapped range for IPv6), (2) IP TTL/Hop Limit of 1, and (3) previously an RAO (now removed). Any one of the first two is sufficient.'
section: "2.1"
topics:
    - mpls
    - ip
