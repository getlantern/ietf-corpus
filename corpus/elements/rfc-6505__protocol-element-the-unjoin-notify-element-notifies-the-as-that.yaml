document: rfc-6505
kind: protocol-element
summary: 'The <unjoin-notify> element notifies the AS that a join has been terminated, with a mandatory ''status'' attribute: 0 = explicit <unjoin>, 1 = execution error, 2 = connection or conference terminated. Unrecognized status codes MUST be treated as equivalent to 1.'
section: 4.2.4.2
