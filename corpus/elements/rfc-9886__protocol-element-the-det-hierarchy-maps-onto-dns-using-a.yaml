document: rfc-9886
kind: protocol-element
summary: 'The DET hierarchy maps onto DNS using a three-level registrant-registrar-registry model: IANA manages the apex (3.0.0.1.0.0.2.ip6.arpa.), Registered Assigning Authorities (RAAs) act as national registries, and HHIT Domain Authorities (HDAs) serve as local registries. Registrants own individual DET entries.'
section: "3.1"
topics:
    - dns
    - registry
