document: rfc-9014
kind: normative-requirement
summary: In single-active multihoming, the non-DF MUST NOT reoriginate MAC/IP routes received from the WAN to the DC, nor from the DC to the WAN. This lets remote PE/NVEs identify the primary GW via MAC/IP route origin.
section: 4.4.3
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
