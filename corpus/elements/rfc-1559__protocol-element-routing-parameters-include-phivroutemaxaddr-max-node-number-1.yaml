summary: Routing parameters include phivRouteMaxAddr (max node number, 1–1023), phivRouteMaxHops (max path hops, 1–30), phivRouteMaxCost (max path cost, 1–1022), and phivRouteMaxVisits (max nodes a transit packet may have visited, 1–63) — each must not be less than the corresponding network-wide maximum for correct routing.
