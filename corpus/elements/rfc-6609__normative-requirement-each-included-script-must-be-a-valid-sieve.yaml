document: rfc-6609
kind: normative-requirement
summary: Each included script MUST be a valid Sieve script with its own 'require' statements for all optional capabilities it uses. The scope of a 'require' statement is the script in which it immediately appears and does not inherit from or propagate to other scripts.
section: "3.2"
rfc2119_level: MUST
topics:
