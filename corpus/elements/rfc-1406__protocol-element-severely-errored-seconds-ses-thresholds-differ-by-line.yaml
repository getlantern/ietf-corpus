document: rfc-1406
kind: protocol-element
summary: 'Severely Errored Seconds (SES) thresholds differ by line type: ESF = 320+ PCV events or 1+ OOF defects or detected AIS; E1-CRC = 832+ PCV events or 1+ OOF defects; E1-noCRC = 2048+ LCVs; D4 = 1+ framing errors or OOF defect or 1544+ LCVs. Controlled slips are excluded. ES and SES are not incremented during Unavailable Seconds.'
section: 3.3.3
topics:
