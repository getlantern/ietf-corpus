document: rfc-3124
kind: protocol-element
summary: A STREAM is defined by source/destination IP address, IP type-of-service, transport protocol, and source/destination port numbers. A MACROFLOW is a group of CM-enabled streams sharing the same congestion management and scheduling algorithms; streams to the same receiver experiencing identical congestion SHOULD belong to the same macroflow.
section: "1"
topics:
    - congestion
