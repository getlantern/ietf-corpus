document: rfc-9621
kind: interoperability-note
summary: Neither the Transport Services API (RFC 9622) nor the implementation guidelines (RFC 9623) define new on-wire protocols or protocol capabilities. A Transport Services System MUST NOT require a peer to use the same API or implementation; it must interoperate with any conforming transport protocol implementation.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
