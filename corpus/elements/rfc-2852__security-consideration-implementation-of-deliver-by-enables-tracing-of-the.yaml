document: rfc-2852
kind: security-consideration
summary: Implementation of Deliver By enables tracing of the mail transport system. The by-trace 'T' field explicitly requests trace DSNs, and even without it, a crude trace can be generated by submitting messages with incrementally increasing by-time values (e.g., BY=0;R, BY=1;R, BY=2;R).
section: "8"
topics:
