document: rfc-2177
kind: interoperability-note
summary: Clients using IDLE are advised to terminate the IDLE and re-issue it at least every 29 minutes to avoid being logged off by servers with inactivity timeouts. This still allows immediate mailbox updates while polling at roughly half-hour intervals.
