document: rfc-7989
kind: protocol-element
summary: A special nil UUID composed of 32 zeros is required when the peer's UUID is not yet known, such as in the initial INVITE request from a UAC before the UAS has responded. The nil value is replaced once the peer's UUID is learned.
section: "5"
topics:
