document: rfc-9762
kind: privacy-consideration
summary: Implementing P flag support on a host will enable DHCPv6 when the host receives an RA with a PIO P=1, causing DHCPv6 packets (which may reveal the hostname) to be sent. This is not a new concern and is equivalent to networks that set the M flag.
section: "11"
topics:
    - privacy
    - ip
    - v6ops
