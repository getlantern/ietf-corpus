document: rfc-9553
kind: security-consideration
summary: 'URI values in JSContact (e.g., in Resource uri or cryptoKeys) can point to external or embedded content. Implementations must guard against SSRF, data exfiltration, and execution of malicious content embedded in data: URIs when fetching or rendering these values.'
section: "4.2"
topics:
