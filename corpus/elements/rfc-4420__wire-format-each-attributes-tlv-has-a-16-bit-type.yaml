document: rfc-4420
kind: wire-format
summary: Each Attributes TLV has a 16-bit Type field, a 16-bit Length field (value length in bytes, excluding padding), and a variable-length Value field zero-padded to a 4-byte boundary. Padding is not counted in Length, so a 1-byte value produces an 8-byte TLV with Length=1.
section: "3"
