document: rfc-4941
kind: normative-requirement
summary: Implementations MUST provide a way for the end user to explicitly enable or disable the use of temporary addresses. Implementations SHOULD also provide a way for trusted administrators to enable or disable temporary addresses, as well as per-prefix granularity control.
section: "3.6"
rfc2119_level: MUST
topics:
