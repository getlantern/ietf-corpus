summary: 'Four new sub-TLV types for the OSPF TE Link TLV are registered with IANA: type 11 (Link Local/Remote Identifiers), type 14 (Link Protection Type), type 15 (Interface Switching Capability Descriptor), and type 16 (Shared Risk Link Group). A new Top Level Type for the Link Local TLV is also allocated from the Standards Action space.'
