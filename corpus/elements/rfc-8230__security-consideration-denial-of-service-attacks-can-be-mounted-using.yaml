document: rfc-8230
kind: security-consideration
summary: Denial-of-service attacks can be mounted using overly large or oddly sized RSA keys that consume excessive resources. It is highly recommended that key length checks be performed before starting any cryptographic operation, and that a key not be used until it has been verified as controlled by a trusted party.
section: "6.1"
topics:
    - security
    - crypto
