document: rfc-8624
kind: normative-requirement
summary: ED25519 (algorithm 15) is RECOMMENDED for both DNSSEC signing and validation. EdDSA does not require a unique random number per signature, avoids padding/truncation issues, and is more resilient to side-channel attacks.
section: "3.1"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - crypto
    - security
