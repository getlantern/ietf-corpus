document: rfc-9010
kind: normative-requirement
summary: When the R flag is set to 1 in an NS(EARO), the 6LR SHOULD inject the host route in RPL using Non-Storing mode signaling and the updated Target option. The 6LR MUST request a DAO-ACK by setting the K flag in the DAO message.
section: 9.2.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
