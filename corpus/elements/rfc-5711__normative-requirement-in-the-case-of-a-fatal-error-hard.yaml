document: rfc-5711
kind: normative-requirement
summary: In the case of a fatal error (Hard Preemption), the detecting node MUST send a PathErr message reporting the error condition and MUST clear the corresponding Path and Resv control-plane states, which also releases data-plane resources and results in traffic disruption.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
