document: rfc-6868
kind: protocol-element
summary: The ^ character (U+005E, Circumflex Accent) is defined as the escape character for iCalendar and vCard parameter values whose value type uses the 'param-value' syntax element. This escaping mechanism applies whether the value is quoted or unquoted.
section: "3"
extracted_by: claude-sonnet-4-6
