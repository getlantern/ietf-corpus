document: rfc-9643
kind: normative-requirement
summary: The keepalive probe-interval MUST NOT be smaller than one second to avoid congestion. Significantly longer intervals SHOULD be used to prevent harm on congested links from backing-off-less retransmissions.
section: 2.1.5
rfc2119_level: MUST NOT
topics:
    - tcp
    - congestion
