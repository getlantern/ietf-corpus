summary: 'Rather than attempting to fully enumerate all FE capabilities in the model, the design combines coarse-level capability reporting with an error-reporting mechanism: if a CE instructs an FE to perform an operation it cannot support, the FE returns an error, analogous to Diffserv PIB approaches.'
