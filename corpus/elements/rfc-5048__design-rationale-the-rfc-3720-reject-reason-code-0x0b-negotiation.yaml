document: rfc-5048
kind: design-rationale
summary: The RFC 3720 Reject reason code 0x0b ('Negotiation Reset') is deprecated because no legitimate iSCSI protocol use case was identified for it; its removal also eliminates the 'intervening operational parameter negotiation reset' clause in RFC 3720 Section 5.4, which now refers to an impossible event.
section: "8.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
