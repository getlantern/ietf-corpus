document: rfc-5092
kind: normative-requirement
summary: The string ';AUTH=*' indicates the client SHOULD select an appropriate authentication mechanism. The '*' character MUST NOT be percent-encoded in this usage, as ';AUTH=%2A' will not match this production.
section: "3.2"
rfc2119_level: MUST NOT
topics:
