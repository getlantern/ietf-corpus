document: rfc-4213
kind: normative-requirement
summary: With static tunnel MTU, the MTU MUST be between 1280 and 1480 bytes inclusive, and SHOULD default to 1280 bytes. If the default is not 1280 bytes, the implementation MUST provide a configurable knob to set the MTU value.
section: 3.2.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
