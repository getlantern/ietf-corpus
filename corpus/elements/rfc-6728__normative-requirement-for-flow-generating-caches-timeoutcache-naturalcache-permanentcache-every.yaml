document: rfc-6728
kind: normative-requirement
summary: For flow-generating Caches (TimeoutCache, NaturalCache, PermanentCache), every Flow Key field in the CacheLayout MUST be included in the Flow Record unless not applicable. A CacheField whose ieEnterpriseNumber is 29305 (Reverse Information Element) MUST NOT be configured as a Flow Key.
section: 4.3.3
rfc2119_level: MUST NOT
topics:
    - measurement
