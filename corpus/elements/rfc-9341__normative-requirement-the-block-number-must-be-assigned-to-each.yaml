document: rfc-9341
kind: normative-requirement
summary: The Block Number MUST be assigned to each measurement block and associated with each packet count and timestamp reported to or pulled by other nodes or NMSs, ensuring that matching BNs from upstream and downstream nodes confirm the same measurement block.
section: "4.3"
rfc2119_level: MUST
