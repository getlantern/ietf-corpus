document: rfc-8831
kind: normative-requirement
summary: Closing a data channel MUST be signaled by resetting the corresponding outgoing SCTP streams per RFC 6525. When the peer sees an incoming stream reset, it also resets its corresponding outgoing stream, completing the close.
section: "6.7"
rfc2119_level: MUST
topics:
    - webrtc
    - sctp
