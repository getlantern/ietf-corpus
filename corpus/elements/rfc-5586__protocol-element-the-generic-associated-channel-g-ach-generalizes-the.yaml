document: rfc-5586
kind: protocol-element
summary: The Generic Associated Channel (G-ACh) generalizes the PW Associated Channel Header (ACH) to apply to MPLS LSPs and Sections in addition to pseudowires. It provides an in-band control channel for OAM, APS, SCC, and MCC messages that does not depend on PSN routing or dynamic control plane functions.
section: "1"
topics:
