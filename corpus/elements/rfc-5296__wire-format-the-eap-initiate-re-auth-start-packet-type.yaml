document: rfc-5296
kind: wire-format
summary: The EAP-Initiate/Re-auth-Start packet (Type=1) contains a 1-octet Reserved field (MUST be zero) followed by one or more TV or TLV attributes. TLV attributes have a 1-octet Type, 1-octet Length (length of value in octets), and variable-length Value. TV attributes have a 1-octet Type and a type-specific-length Value with no explicit length field.
section: 5.3.1
topics:
    - security
