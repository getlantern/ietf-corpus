document: rfc-8331
kind: wire-format
summary: 'The per-packet ANC data fields are: DID (10 bits), SDID (10 bits, carries DBN for Type 1 packets), Data_Count (10 bits where lower 8 bits are user data word count, b8 is even parity, b9 is inverse of b8), User_Data_Words (variable 10-bit words), and Checksum_Word (10 bits, b8-b0 are checksum, b9 is inverse of b8).'
