summary: The SType 1 (IS-IS CRYPTO_AUTH-Based) Security Information field begins with a 4-bit RESV and 12-bit Size (set to 2 plus the byte length of Authentication Data), followed by a 2-byte Key ID, followed by variable-length Authentication Data whose length depends on the algorithm.
