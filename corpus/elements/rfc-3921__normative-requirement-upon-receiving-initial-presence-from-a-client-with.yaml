document: rfc-3921
kind: normative-requirement
summary: Upon receiving initial presence from a client with no existing available resources, the user's server MUST send presence probes to all contacts with subscription 'to' or 'both', and MUST broadcast initial presence to all contacts with subscription 'from' or 'both', excluding those blocked by privacy lists.
section: 5.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
