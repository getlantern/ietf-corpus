document: rfc-1938
kind: normative-requirement
summary: All conforming server implementations MUST protect against the race attack in which an attacker partially intercepts a one-time password, guesses the remainder, and races the legitimate user to complete authentication.
section: "9.0"
rfc2119_level: MUST
topics:
    - security
