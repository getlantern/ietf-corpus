document: rfc-2878
kind: normative-requirement
summary: If an implementation supports a MAC Type that is the higher-numbered format of a given MAC Type (e.g., FDDI with canonical addresses), it MUST also support the lower-numbered format (e.g., FDDI with non-canonical addresses), to ensure backward compatibility.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
