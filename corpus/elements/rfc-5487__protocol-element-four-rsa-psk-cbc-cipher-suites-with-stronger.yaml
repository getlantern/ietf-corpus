document: rfc-5487
kind: protocol-element
summary: 'Four RSA_PSK CBC cipher suites with stronger MACs are defined: TLS_RSA_PSK_WITH_AES_128_CBC_SHA256 (0x00,0xB6), TLS_RSA_PSK_WITH_AES_256_CBC_SHA384 (0x00,0xB7), TLS_RSA_PSK_WITH_NULL_SHA256 (0x00,0xB8), and TLS_RSA_PSK_WITH_NULL_SHA384 (0x00,0xB9). These mirror RFC 4279 RSA_PSK suites but use SHA-256 or SHA-384 for HMAC and PRF.'
section: "3.3"
