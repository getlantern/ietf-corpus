document: rfc-5147
kind: normative-requirement
summary: Implementations MUST ignore new types of integrity checks (names other than 'length' and 'md5'), to allow future cryptographic agility. If multiple integrity checks are present, an implementation may use whichever it understands.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
