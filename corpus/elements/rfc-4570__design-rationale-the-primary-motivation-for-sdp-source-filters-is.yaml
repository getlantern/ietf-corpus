document: rfc-4570
kind: design-rationale
summary: The primary motivation for SDP source-filters is to protect receivers from traffic sent from illegitimate source addresses, preserving content integrity and protecting against Denial of Service (DoS) attacks, particularly in multicast sessions where receivers can also share filter information with network elements (e.g., IGMPv3 routers).
section: "1.1"
topics:
    - security
    - multicast
