document: rfc-3947
kind: security-consideration
summary: 'Pre-shared key authentication in Main Mode behind NAT requires group-shared keys for all hosts behind the NAT box. This is a critical risk: any group member can impersonate any other member (e.g., a user impersonating a VPN gateway to perform MitM). Use of group-shared keys is NOT RECOMMENDED.'
section: "8"
topics:
    - ipsec
    - vpn
    - nat
    - security
    - crypto
