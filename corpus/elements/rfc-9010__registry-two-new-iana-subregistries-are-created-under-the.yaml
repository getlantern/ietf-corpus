summary: 'Two new IANA subregistries are created under the RPL registry: ''RPL Non-Rejection Status Values'' (A=0, U=0; 6-bit values 0–63; value 0 = Success) and ''RPL Rejection Status Values'' (A=0, U=1; 6-bit values 0–63; value 0 = Unqualified rejection, value 1 = No routing entry). Registration procedure: IETF Review.'
