document: rfc-8572
kind: normative-requirement
summary: When establishing a connection to any bootstrap server (trusted or untrusted), the device MUST identify and authenticate itself using a TLS-level client certificate and/or an HTTP authentication scheme per RFC 8040 Section 2.5. If both mechanisms are used, they MUST both identify the same serial number.
section: "5.3"
rfc2119_level: MUST
topics:
    - tls
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
