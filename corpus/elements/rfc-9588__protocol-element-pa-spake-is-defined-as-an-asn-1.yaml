document: rfc-9588
kind: protocol-element
summary: 'PA-SPAKE is defined as an ASN.1 CHOICE with four alternatives: support [0] SPAKESupport, challenge [1] SPAKEChallenge, response [2] SPAKEResponse, and encdata [3] EncryptedData. These four message types carry the full SPAKE pre-authentication exchange.'
