document: rfc-7959
kind: interoperability-note
summary: When combining Block-Wise transfers with the Observe option, the server only sends the first block in a 2.05 notification. The client retrieves subsequent blocks via additional GET requests with Block2 NUM > 0, and MUST compare ETags across blocks to ensure consistency.
section: "2.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
