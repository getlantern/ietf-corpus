document: rfc-7964
kind: design-rationale
summary: 'To eliminate MED-induced route oscillations, a route reflector or confederation ASBR needs to advertise more than just the best path for a prefix. Two approaches are identified: advertising all available paths (equivalent to full IBGP mesh) or advertising only the Group Best Paths per neighbor-AS, which is sufficient under common topological constraints.'
section: "1"
topics:
