document: rfc-5750
kind: normative-requirement
summary: Receiving agents MUST support RSA with SHA-256 for certificate and CRL signature verification. SHOULD+ support DSA with SHA-256 and RSASSA-PSS with SHA-256. RSA with SHA-1, DSA with SHA-1, and RSA with MD5 are SHOULD-.
section: "4.3"
rfc2119_level: MUST
topics:
