document: rfc-7879
kind: normative-requirement
summary: B2BUAs MUST forward the certificate fingerprint and SDP setup attribute received from one endpoint unmodified towards the other endpoint and vice versa. This is the foundational rule for preserving end-to-end DTLS-SRTP across a B2BUA.
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - realtime
