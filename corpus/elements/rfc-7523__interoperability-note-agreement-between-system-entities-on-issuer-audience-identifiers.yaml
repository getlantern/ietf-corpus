document: rfc-7523
kind: interoperability-note
summary: Agreement between system entities on issuer/audience identifiers, token endpoint location, signing keys, one-time-use restrictions, maximum JWT lifetime, and subject/claim requirements must be established out of band. This specification does not define a mechanism for that exchange; profiles such as OpenID Connect Discovery may constrain or prescribe these values.
section: "5"
topics:
