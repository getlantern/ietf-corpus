document: rfc-5321
kind: normative-requirement
summary: 'Minimum buffer sizes that SMTP implementations MUST support: local-part 64 octets, domain 255 octets, forward- or reverse-path 256 octets, command line 512 octets, reply line 512 octets, text line 1000 octets, message content 64K octets, and at least 100 recipients per transaction.'
section: 4.5.3.1
rfc2119_level: MUST
topics:
    - email
