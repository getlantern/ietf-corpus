document: rfc-4572
kind: normative-requirement
summary: Hash functions used in the Hash Function Textual Names registry MUST be defined by standards-track RFCs that update or obsolete RFC 3279. When registering a new hash function, the textual name, OID as used in X.509 certificates, and a reference to the RFC must be provided.
section: "8"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - registry
    - crypto
