document: rfc-1970
kind: security-consideration
summary: Without the IP Authentication Header, Neighbor Discovery messages are vulnerable to various attacks including rogue Router Advertisements, spoofed Neighbor Advertisements that poison caches, and fabricated Redirect messages. The Hop Limit = 255 check provides only on-link protection.
