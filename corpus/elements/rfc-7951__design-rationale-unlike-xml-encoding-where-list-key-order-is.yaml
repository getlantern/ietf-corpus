document: rfc-7951
kind: design-rationale
summary: Unlike XML encoding where list key order is mandated, JSON-encoded list entries have arbitrary member ordering because JSON objects are fundamentally unordered collections; therefore the XML key-ordering constraint is not imposed on JSON.
