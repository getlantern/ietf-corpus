document: rfc-3588
kind: protocol-element
summary: Capabilities Exchange (CER/CEA, Command Code 257) is the first message pair exchanged between Diameter peers. It negotiates supported applications (via Auth-Application-Id, Acct-Application-Id), host identity, IP addresses, security mechanisms (Inband-Security-Id), and vendor information. A peer receiving an unsupported application MUST reply with DIAMETER_NO_COMMON_APPLICATION.
section: "5.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
