document: rfc-2467
kind: normative-requirement
summary: If a Router Advertisement received on an FDDI interface has an MTU option specifying an MTU larger than 4352 (or larger than a manually configured value), that MTU option may be logged to system management but must be otherwise ignored.
section: "2"
rfc2119_level: MUST
topics:
