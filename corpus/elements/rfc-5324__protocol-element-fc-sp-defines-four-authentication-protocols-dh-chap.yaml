document: rfc-5324
kind: protocol-element
summary: 'FC-SP defines four Authentication Protocols: DH-CHAP (secret-based, using Diffie-Hellman Challenge Handshake with RADIUS/Diameter/TACACS external server option), FCAP (certificate-based, using X.509 public-private key pairs), FCPAP (password-based), and IKEv2-AUTH (a subset of IKEv2 performing both authentication and SA management). Each supports mutual authentication with optional shared key establishment.'
section: 3.4.1
topics:
