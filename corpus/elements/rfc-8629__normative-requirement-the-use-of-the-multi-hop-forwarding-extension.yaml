document: rfc-8629
kind: normative-requirement
summary: The use of the Multi-Hop Forwarding Extension SHOULD be configurable. To indicate that the extension is to be used, an implementation includes the Multi-Hop Forwarding Extension Type Value in the Extensions Supported Data Item.
section: "2"
rfc2119_level: SHOULD
