document: rfc-4749
kind: normative-requirement
summary: In offer-answer, one party MUST NOT start sending frames at a bit rate higher than the mbs parameter of the other party. If a received mbs value is below 8000, the session MUST be rejected.
section: 6.2.1
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - sip
