document: rfc-6555
kind: normative-requirement
summary: When a DNS query returns multiple A or AAAA records, it is RECOMMENDED that a Happy Eyeballs implementation order the responses following the host's address preference policy and try the first address; if that fails, the next address SHOULD be an IPv4 address.
section: "5.4"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - v6ops
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
