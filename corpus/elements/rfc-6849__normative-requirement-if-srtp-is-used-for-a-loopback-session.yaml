document: rfc-6849
kind: normative-requirement
summary: If SRTP is used for a loopback session, it MUST be used in both directions (to and from the mirror) with the same properties, to provide the same level of protection for both forward and reverse media flows.
section: "8"
rfc2119_level: MUST
