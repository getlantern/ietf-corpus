document: rfc-1826
kind: normative-requirement
summary: All implementations MUST support padding of the Authentication Data field to alignments (e.g., 64-bit) as specified by the Destination on a per-SPI basis. The padding value is chosen by the sender and is included in the authentication calculation.
section: "3.2"
rfc2119_level: MUST
topics:
    - ipsec
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
