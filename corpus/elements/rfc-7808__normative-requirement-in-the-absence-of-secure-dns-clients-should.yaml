document: rfc-7808
kind: normative-requirement
summary: In the absence of secure DNS, clients SHOULD verify that the target FQDN in an SRV record matches or is a sub-domain of the original service domain; any mismatch MUST result in failure to connect.
section: "8"
rfc2119_level: MUST
topics:
    - dns
    - security
