document: rfc-9261
kind: normative-requirement
summary: The application-layer protocol used to transmit an authenticator request or authenticator SHOULD use a secure transport channel with equivalent security to TLS (e.g., QUIC) to maintain confidentiality. The application MAY use the existing (D)TLS connection itself.
section: "4"
rfc2119_level: SHOULD
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
