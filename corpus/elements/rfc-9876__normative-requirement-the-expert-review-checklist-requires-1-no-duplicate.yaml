document: rfc-9876
kind: normative-requirement
summary: 'The Expert Review checklist requires: (1) no duplicate Content-Type+Content Coding combination, (2) the Media Type must be registered or approved in the ''Media Types'' registry or listed provisionally (provisional only allowed for 0-9999 ranges), (3) parameter names must be defined for the Media Type with valid values, (4) Content Type must be in preferred format per Section 4.1.4, and (5) any Content Coding must exist or be approved in the ''HTTP Content Coding Registry''.'
section: 4.1.3
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
