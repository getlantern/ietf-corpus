document: rfc-6696
kind: normative-requirement
summary: For replay protection, the ER server MUST first verify the sequence number is equal to or greater than the expected sequence number before checking integrity. When the sequence number wraps back to zero, the peer MUST run full EAP authentication and the rIK MUST be changed.
section: "5.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
