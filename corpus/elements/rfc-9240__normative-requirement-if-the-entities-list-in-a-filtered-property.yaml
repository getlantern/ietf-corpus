document: rfc-9240
kind: normative-requirement
summary: If the 'entities' list in a filtered property map request is empty, the ALTO Server MUST interpret it as containing all entities currently defined in the resource. If the 'properties' list is empty, the Server MUST interpret it as all defined properties. The Server MUST interpret duplicate entries as if they appeared only once.
section: "8.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
