document: rfc-5724
kind: normative-requirement
summary: When multiple recipients are listed in an 'sms' URI, exactly the same message SHOULD be sent to all listed recipients without alteration. User agents SHOULD support multiple recipients and SHOULD make the entire recipient list clear to users before sending.
section: "2.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
