document: rfc-5698
kind: security-consideration
summary: Re-encrypting documents originally encrypted with a no-longer-suitable algorithm does not protect against already-intercepted copies. For stored encrypted documents, re-encryption should be considered unless the document has lost its original value.
section: "7"
topics:
