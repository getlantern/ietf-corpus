document: rfc-9143
kind: normative-requirement
summary: In a subsequent offer or in any answer, the offerer and answerer MUST include IDENTICAL and TRANSPORT multiplexing category SDP attributes (BUNDLE attributes) only in the tagged 'm=' section and MUST NOT include such attributes in any other bundled 'm=' section.
section: 7.1.3
rfc2119_level: MUST
topics:
