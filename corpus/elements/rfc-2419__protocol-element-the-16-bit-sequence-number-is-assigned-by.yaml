document: rfc-2419
kind: protocol-element
summary: The 16-bit sequence number is assigned by the encryptor sequentially starting with 0 for the first packet transmitted after ECP reaches the opened state. It is used to order decryption across packet boundaries when CBC chaining is applied between packets.
