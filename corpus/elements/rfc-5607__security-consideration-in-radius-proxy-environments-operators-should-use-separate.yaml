document: rfc-5607
kind: security-consideration
summary: In RADIUS proxy environments, operators SHOULD use separate RADIUS server lists for management AAA and non-management AAA to prevent upstream proxies from provisioning management access. First-hop proxy servers MAY treat as Access-Reject any Access-Accept that provisions locally unauthorized management access.
section: "12.2"
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
