document: rfc-5965
kind: normative-requirement
summary: The third MIME part containing either the full original message (message/rfc822) or its header block (text/rfc822-headers) MUST be included, contrary to the parent RFC 3462 which makes it optional. It is RECOMMENDED that the entire original message be included without modification to preserve forensic value.
section: "2"
rfc2119_level: MUST
topics:
    - email
