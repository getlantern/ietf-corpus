document: rfc-4825
kind: normative-requirement
summary: An XCAP server MUST be explicitly configured for each application usage it handles. If the URI refers to an unknown application usage, an unrecognized XUI, or an unsupported extension-selector, the server MUST reject the request with 404 (Not Found).
section: "8"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
