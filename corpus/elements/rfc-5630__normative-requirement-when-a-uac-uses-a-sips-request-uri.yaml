document: rfc-5630
kind: normative-requirement
summary: When a UAC uses a SIPS Request-URI and the route set contains any SIP URIs, the UAC MUST change those SIP URIs to SIPS URIs (by changing the scheme only) before sending the request.
section: 5.1.1
rfc2119_level: MUST
topics:
    - sip
