document: rfc-9671
kind: security-consideration
summary: The extension SHOULD NOT process calendar data from potentially malicious or untrustworthy senders. Trustworthiness may be evaluated via SPF, DKIM, DMARC, or S/MIME signatures; allow/deny lists using 'extlists' are recommended.
section: "5"
rfc2119_level: SHOULD NOT
