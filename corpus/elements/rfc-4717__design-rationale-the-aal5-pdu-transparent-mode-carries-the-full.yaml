document: rfc-4717
kind: design-rationale
summary: The AAL5 PDU transparent mode carries the full CPCS-PDU including PAD, trailer, and CRC without processing, explicitly to support scrambled AAL5 PDUs (ATM security agents) that the PE cannot reassemble; the unprocessed CRC also allows integrity checking at the egress.
section: "11.1"
topics:
