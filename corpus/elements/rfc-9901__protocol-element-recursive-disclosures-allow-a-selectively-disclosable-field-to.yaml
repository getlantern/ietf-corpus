document: rfc-9901
kind: protocol-element
summary: Recursive Disclosures allow a selectively disclosable field to itself contain digest placeholders pointing to further Disclosures. If a Disclosure is included in a presentation, all Disclosures necessary to process it (i.e., connect it to the Issuer-signed JWT) MUST also be included.
section: 4.2.6
