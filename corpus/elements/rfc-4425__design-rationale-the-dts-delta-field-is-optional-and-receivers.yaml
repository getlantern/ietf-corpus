document: rfc-4425
kind: design-rationale
summary: The DTS Delta field is optional and receivers are not required to use it, but it enables buffer management, frame pacing before decoding, and determination of whether lost RTP packets contained reference frames or only B-frames by comparing decode and presentation times.
