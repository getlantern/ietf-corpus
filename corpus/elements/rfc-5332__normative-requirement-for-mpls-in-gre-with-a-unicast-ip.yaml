document: rfc-5332
kind: normative-requirement
summary: For MPLS-in-GRE with a unicast IP destination address, ethertype 0x8847 MUST be used in all cases. For GRE with a multicast IP destination, 0x8847 MUST be used when the top label is downstream-assigned, and 0x8848 MUST be used when it is upstream-assigned.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
