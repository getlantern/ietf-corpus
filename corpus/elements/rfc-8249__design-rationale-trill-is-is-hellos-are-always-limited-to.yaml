document: rfc-8249
kind: design-rationale
summary: TRILL IS-IS Hellos are always limited to 1470 bytes for robustness, even though other link-local PDUs may be sized up to Lz. This ensures Hello packets reliably traverse any conformant link regardless of MTU negotiation state.
section: "2"
topics:
