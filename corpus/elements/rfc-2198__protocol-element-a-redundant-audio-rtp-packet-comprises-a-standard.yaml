document: rfc-2198
kind: protocol-element
summary: A redundant audio RTP packet comprises a standard RTP header (with payload type indicating redundancy), followed by one or more block headers describing each encoding, followed by the data blocks in the same order. All block headers are 32-bit aligned; data blocks are typically not aligned.
