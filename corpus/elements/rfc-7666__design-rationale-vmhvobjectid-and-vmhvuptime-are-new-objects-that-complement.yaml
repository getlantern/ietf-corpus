document: rfc-7666
kind: design-rationale
summary: 'vmHvObjectID and vmHvUpTime are new objects that complement but do not replace sysObjectID and sysUpTime from SNMPv2-MIB: sysObjectID identifies the device/firmware/OS, not the hypervisor software, and sysUpTime measures the management subsystem uptime, not the hypervisor''s uptime since its last re-initialization.'
