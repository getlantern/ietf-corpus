document: rfc-2942
kind: normative-requirement
summary: Any Telnet IAC characters that occur in the KRB_AP_REQ or KRB_AP_REP messages, the KRB_CRED structure, or the optional rejection text string must be doubled as specified in RFC 855, to prevent mis-interpretation as Telnet commands.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - crypto
