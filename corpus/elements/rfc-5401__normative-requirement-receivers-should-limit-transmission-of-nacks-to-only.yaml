document: rfc-5401
kind: normative-requirement
summary: Receivers SHOULD limit transmission of NACKs to only when the sender's current transmission position exceeds the point to which the receiver has incomplete reception. This reduces premature requests for repair of data the sender may already be planning to transmit in response to other receiver requests.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
