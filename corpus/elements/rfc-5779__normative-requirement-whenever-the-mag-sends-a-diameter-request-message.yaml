document: rfc-5779
kind: normative-requirement
summary: Whenever the MAG sends a Diameter request message to the HAAA, the User-Name AVP SHOULD contain the MN's identity unless suppressed for policy reasons such as identity hiding. The MN identity, if available, MUST be in NAI format.
section: "4.1"
rfc2119_level: MUST
topics:
