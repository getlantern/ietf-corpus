document: rfc-5580
kind: wire-format
summary: The Location-Information Attribute (Type 127, length >= 23) encodes a 16-bit Index, 8-bit Code (location profile), 8-bit Entity, 64-bit Sighting Time (NTP format), 64-bit Time-to-Live (NTP format), and a variable-length Method field that MUST contain exactly one IANA-registered 'method' token. Total length MUST NOT exceed 253 octets.
section: "4.2"
