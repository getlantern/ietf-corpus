document: rfc-5052
kind: design-rationale
summary: The FEC building block separates the concept of an 'FEC Scheme' from an 'FEC code' or algorithm. An FEC scheme defines ancillary information and procedures that, combined with an FEC code specification, fully define how the FEC code can be used with CDPs. This separation allows CDPs to operate with a range of FEC codes without knowing the details of each specific code.
section: "4"
topics:
    - multicast
    - security
