document: rfc-8016
kind: protocol-element
summary: A new STUN error response code 405 (Mobility Forbidden) is defined. It is returned when a mobility request (MOBILITY-TICKET in Allocate or Refresh) is valid but cannot be performed due to administrative or similar restrictions on the server.
