document: rfc-8159
kind: normative-requirement
summary: All packets MUST carry the 64-bit L2TPv3 cookie field. The cookie MUST be 64 bits long to provide sufficient protection against spoofing and brute-force blind insertion attacks. Cookie values SHOULD be randomly selected.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - vpn
