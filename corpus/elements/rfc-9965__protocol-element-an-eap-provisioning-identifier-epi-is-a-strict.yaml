document: rfc-9965
kind: protocol-element
summary: An EAP Provisioning Identifier (EPI) is a strict subset of the NAI (RFC 7542) whose realm is a subdomain of 'eap.arpa'. EAP peers use EPIs to signal to EAP servers that they wish to obtain limited, unauthenticated network access for credential bootstrapping. The EPI format is 'username@subdomain.eap.arpa', where the subdomain identifies the requested provisioning method.
section: "2"
topics:
