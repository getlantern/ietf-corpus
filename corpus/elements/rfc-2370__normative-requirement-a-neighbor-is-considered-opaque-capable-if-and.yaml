document: rfc-2370
kind: normative-requirement
summary: A neighbor is considered opaque-capable if and only if it sets the O-bit in the Options field of its Database Description packets. The O-bit is not set in packets other than Database Description packets.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
