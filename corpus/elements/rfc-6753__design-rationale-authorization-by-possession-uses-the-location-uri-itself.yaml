document: rfc-6753
kind: design-rationale
summary: Authorization by Possession uses the location URI itself as a shared secret; any entity that presents the URI is authorized. This model requires no authentication infrastructure, but once granted access cannot be easily revoked, and expiration of the URI is the primary limiting mechanism.
section: "4.1"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
