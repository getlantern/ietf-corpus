summary: 'rptrGroupTable (rptrBasicPackage.2.1) contains descriptive and status information for each group of ports, indexed by rptrGroupIndex. Key current fields: rptrGroupObjectID (vendor OID identifying the group hardware), rptrGroupOperStatus (operational/malfunctioning/notPresent/underTest/resetInProgress), and rptrGroupPortCapacity.'
