document: rfc-3225
kind: normative-requirement
summary: When the DO bit is cleared (zero), DNSSEC security RRs MUST NOT be returned in the response unless those RRs are explicitly queried for (e.g., an explicit SIG, KEY, NXT, or ANY query, or via AXFR/IXFR).
section: "3"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
