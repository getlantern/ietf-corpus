document: rfc-3530
kind: normative-requirement
summary: The server is required to increment the seqid field of stateid4 monotonically at each transition of the stateid, since the client inspects the seqid in OPEN stateids to determine the order of OPEN processing done by the server.
section: "2.2"
rfc2119_level: REQUIRED
