document: rfc-7308
kind: protocol-element
summary: The Extended Administrative Group (EAG) sub-TLV is defined for both OSPF and IS-IS to advertise more than 32 administrative group colors per link. The EAG is optional and may be of any non-zero length that is a multiple of 4 bytes, constrained only by protocol/media MTU limits.
