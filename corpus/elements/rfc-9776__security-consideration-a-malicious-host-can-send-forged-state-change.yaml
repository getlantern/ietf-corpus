document: rfc-9776
kind: security-consideration
summary: A malicious host can send forged State-Change Reports to cause routers to join undesired multicast groups (current-state reports) or to trigger spurious queries by sending BLOCK_OLD_SOURCES reports, causing unnecessary query traffic. IPsec authentication headers may be used to provide authentication for IGMP messages where such security is required.
section: "9.3"
topics:
    - security
    - multicast
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
