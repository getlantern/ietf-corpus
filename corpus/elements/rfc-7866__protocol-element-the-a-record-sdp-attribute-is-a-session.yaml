document: rfc-7866
kind: protocol-element
summary: The 'a=record' SDP attribute is a session-level or media-level attribute used by the SRC to indicate recording state to recording-aware UAs in the CS. Values are 'on' (recording in progress), 'off' (no recording), and 'paused' (recording in progress but media is paused). Media-level overrides session-level.
section: 7.1.2
topics:
    - sip
    - realtime
