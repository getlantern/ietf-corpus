document: rfc-5053
kind: design-rationale
summary: The sub-block partitioning scheme (N sub-blocks per source block) allows decoding to proceed in working memory bounded by sub-block size W. The recommended parameter derivation ensures sub-symbol sizes are multiples of Al to facilitate multi-byte XOR operations.
