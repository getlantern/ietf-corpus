document: rfc-8383
kind: security-consideration
summary: Without authentication, Address Flush messages are easy to forge and can be used as a denial-of-service attack by purging learned MAC address information, forcing relearning and reducing network efficiency. However, forged messages cannot cause incorrect frame delivery.
