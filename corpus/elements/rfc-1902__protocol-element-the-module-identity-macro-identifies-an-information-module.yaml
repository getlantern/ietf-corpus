document: rfc-1902
kind: protocol-element
summary: The MODULE-IDENTITY macro identifies an information module, providing LAST-UPDATED, ORGANIZATION, CONTACT-INFO, DESCRIPTION, and zero or more REVISION/DESCRIPTION pairs in reverse chronological order. It must appear exactly once per module, immediately after any IMPORTS statements; its value is an OBJECT IDENTIFIER that authoritatively identifies the module.
