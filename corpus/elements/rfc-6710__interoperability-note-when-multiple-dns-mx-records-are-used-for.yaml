document: rfc-6710
kind: interoperability-note
summary: When multiple DNS MX records are used for a domain, all of them should support the MT-PRIORITY extension and handle priorities identically. If any server behaves differently, it is strongly suggested that none support the extension, to avoid unexpected delivery speed differences or rejections.
section: "9.1"
topics:
    - email
    - dns
