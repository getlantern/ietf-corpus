document: rfc-7055
kind: security-consideration
summary: Multi-layer security negotiation (GSS-API outer, EAP method inner) introduces bid-down attack risk. Mitigations include constructing policy so that inner-layer mechanism preferences fall between two outer-layer preferences, or restricting use of this mechanism only to services where it has been explicitly selected.
section: "8"
topics:
