document: rfc-9829
kind: normative-requirement
summary: For resource certificate path validation step 5, a revoked certificate is identified by its serial number appearing on the issuer's current CRL as identified by BOTH the issuer's current manifest AND the CRLDP of the certificate; the CRL must be valid and signed by the same key that verified the certificate.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
    - routing
