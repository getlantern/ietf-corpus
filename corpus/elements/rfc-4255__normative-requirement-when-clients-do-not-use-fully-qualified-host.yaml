document: rfc-4255
kind: normative-requirement
summary: When clients do not use fully qualified host names, the implementation SHOULD verify the host key against a local database before verifying via the DNS-returned fingerprint, to prevent DNS search path injection attacks.
section: "2.2"
rfc2119_level: SHOULD
topics:
