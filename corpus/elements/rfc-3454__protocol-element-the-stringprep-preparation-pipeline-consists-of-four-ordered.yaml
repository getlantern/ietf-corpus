summary: 'The stringprep preparation pipeline consists of four ordered steps: (1) Map each character using mapping tables, (2) Normalize using Unicode normalization, (3) Prohibit disallowed code points, and (4) Check bidirectional string requirements. Each step may transform or reject the string.'
