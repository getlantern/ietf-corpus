document: rfc-6749
kind: security-consideration
summary: Open redirectors at the authorization or redirection endpoint can be used by attackers to redirect users to phishing sites after authorization. Authorization servers SHOULD require full redirect URI registration and MUST NOT allow open redirect behavior via the authorization endpoint.
section: "10.15"
topics:
    - oauth
    - security
