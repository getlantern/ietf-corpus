document: rfc-7461
kind: interoperability-note
summary: The ENERGY-OBJECT-CONTEXT-MIB uses entPhysicalIndex from the ENTITY-MIB (RFC 6933) as its primary index and requires entity4CRCompliance, linking it tightly to ENTITY-MIB implementations. Cross-MIB correlation with PoE MIB (RFC 3621) and LLDP MIBs is required when those MIBs are supported.
section: "4.3"
