document: rfc-3526
kind: design-rationale
summary: 'The document does not specify which group to use with 128, 192, or 256-bit AES because there is significant disagreement among cryptographers about required DH group sizes: one source estimates a 3200-bit group for 128-bit AES while another estimates 2500 bits for 192-bit AES. Rather than mandate a pairing, the document simply provides multiple group options.'
section: "1"
topics:
