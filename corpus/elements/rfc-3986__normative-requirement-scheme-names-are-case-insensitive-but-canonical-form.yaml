document: rfc-3986
kind: normative-requirement
summary: Scheme names are case-insensitive, but canonical form is lowercase. Documents specifying schemes MUST use lowercase letters. Implementations SHOULD accept uppercase letters as equivalent to lowercase for robustness but SHOULD only produce lowercase scheme names.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
