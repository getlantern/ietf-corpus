document: rfc-2865
kind: wire-format
summary: 'The User-Password attribute (Type=2, Length 18-130) encodes the password using iterated MD5: b1=MD5(S+RA), c(1)=p1 XOR b1; bi=MD5(S+c(i-1)), c(i)=pi XOR bi, chaining through up to 128-character password in 16-octet blocks. The shared secret and Request Authenticator seed the first hash.'
section: "5.2"
topics:
    - radius
    - crypto
    - security
