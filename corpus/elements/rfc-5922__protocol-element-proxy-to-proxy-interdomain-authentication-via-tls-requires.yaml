document: rfc-5922
kind: protocol-element
summary: Proxy-to-proxy interdomain authentication via TLS requires each proxy to present a certificate and for the receiving proxy to extract and verify domain identities from it; the passive server (Proxy-B) lacks an AUS anchor and must rely on policy-based comparison of the client certificate's identity set.
section: "5"
topics:
