document: rfc-4120
kind: protocol-element
summary: KRB_CRED (msg-type 22) allows delegation of credentials between principals. It contains a sequence of tickets and an enc-krb-cred-part encrypted in the session key, carrying the session keys, flags, principal names, and time validity for each delegated ticket.
