document: rfc-8528
kind: normative-requirement
summary: Mount points that contain modules with RPCs, actions, and notifications SHOULD NOT have any ancestor node that is a list node without a 'key' statement, because inline actions and notifications will not work in such lists.
section: "5"
rfc2119_level: SHOULD NOT
