summary: The reliability estimation framework in section 8 addresses the case where the exact set of managed routers is unknown. A Bayesian confidence estimate is computed from retransmission response counts to determine when the probability that all routers have been reached exceeds a configurable threshold (default 0.999), avoiding indefinite retransmission.
