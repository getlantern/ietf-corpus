document: rfc-3312
kind: security-consideration
summary: A man-in-the-middle can add desired-status attributes to make session establishment impossible, or modify current-status parameters to allow a session to proceed without meeting preconditions. Integrity protection of SDP (e.g., S/MIME) is required to prevent these attacks.
section: "14"
