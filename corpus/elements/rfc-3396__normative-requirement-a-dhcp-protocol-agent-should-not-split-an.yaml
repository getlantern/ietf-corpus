document: rfc-3396
kind: normative-requirement
summary: A DHCP protocol agent SHOULD NOT split an option unless it has no choice or it knows that its peer can properly handle split options. A peer is assumed to handle split options if it has provided or requested at least one concatenation-requiring option.
section: "4"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
