document: rfc-4291
kind: wire-format
summary: IPv6 address prefixes are written as ipv6-address/prefix-length in CIDR notation. Leading zeros within a 16-bit chunk may be dropped but trailing zeros within a chunk may not; the address left of '/' is expanded to full 128 bits before applying the prefix length.
section: "2.3"
topics:
    - ip
    - v6ops
