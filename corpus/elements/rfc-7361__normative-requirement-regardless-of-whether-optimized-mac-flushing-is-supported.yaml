document: rfc-7361
kind: normative-requirement
summary: Regardless of whether optimized MAC flushing is supported, if a PE-rs device receives a MAC flush message with a MAC Flush TLV option (N=0 or N=1) and a valid (non-empty) MAC address list, it SHOULD ignore the TLV option and process MAC addresses explicitly per RFC 4762.
section: 5.1.3
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
