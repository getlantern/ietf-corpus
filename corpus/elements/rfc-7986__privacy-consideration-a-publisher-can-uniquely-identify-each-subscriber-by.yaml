document: rfc-7986
kind: privacy-consideration
summary: A publisher can uniquely identify each subscriber by assigning different REFRESH-INTERVAL values and tracking refresh timing and IP addresses. To mitigate this, clients SHOULD add or subtract a random amount of time from the published REFRESH-INTERVAL when performing actual refreshes.
section: "8"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
