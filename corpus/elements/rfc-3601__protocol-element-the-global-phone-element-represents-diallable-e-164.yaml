document: rfc-3601
kind: protocol-element
summary: 'The global-phone element represents diallable E.164 numeric addresses using a leading "+" followed by one or more DIGIT or written-sep characters: global-phone = "+" 1*( DIGIT / written-sep ). The "+" prefix is strictly reserved for this syntax.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
