document: rfc-3655
kind: protocol-element
summary: The AD (Authenticated Data) bit is a flag in the DNS response header. As redefined by this document, it is set only when all RRsets in the answer and authority sections have been cryptographically verified or meet the server's local security policy.
section: "2"
topics:
