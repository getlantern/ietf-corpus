document: rfc-3958
kind: normative-requirement
summary: A client MUST NOT start S-NAPTR resolution for one protocol, observe that a successive NAPTR RR set supports another preferred protocol, and switch to continuing resolution based on that protocol. The chosen protocol MUST be listed in the first NAPTR RR set for the target domain.
section: 2.2.5
rfc2119_level: MUST NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
