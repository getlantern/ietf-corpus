document: rfc-3986
kind: protocol-element
summary: 'Reference resolution transforms a URI reference R against a base URI into a target URI T via a defined pseudocode algorithm: if R has a scheme, use R directly (removing dot-segments); otherwise inherit scheme and optionally authority and path from the base, merging and removing dot-segments as needed.'
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
