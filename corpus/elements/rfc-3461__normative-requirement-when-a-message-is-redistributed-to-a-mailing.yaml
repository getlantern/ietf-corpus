document: rfc-3461
kind: normative-requirement
summary: When a message is redistributed to a mailing list, the ENVID, NOTIFY, RET, and ORCPT parameters of the redistributed message MUST NOT be derived from those of the original message. The envelope return address is rewritten to point to the list maintainer.
section: 5.2.7.1
rfc2119_level: MUST NOT
topics:
    - email
