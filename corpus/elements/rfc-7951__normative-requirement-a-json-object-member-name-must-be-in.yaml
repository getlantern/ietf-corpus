document: rfc-7951
kind: normative-requirement
summary: 'A JSON object member name MUST be in one of two forms: simple (identical to the YANG data node identifier) or namespace-qualified (module name prefixed with '':'' separator). A namespace-qualified member name MUST be used for all members of a top-level JSON object and whenever the namespaces of the data node and its parent node differ.'
section: "4"
rfc2119_level: MUST
topics:
    - yang
    - json
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
