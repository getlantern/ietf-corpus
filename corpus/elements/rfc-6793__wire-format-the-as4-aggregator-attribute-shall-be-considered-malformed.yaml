document: rfc-6793
kind: wire-format
summary: The AS4_AGGREGATOR attribute SHALL be considered malformed if its attribute length is not 8 (four-octet AS number plus four-octet IP address). A malformed AS4_AGGREGATOR MUST be discarded and the UPDATE message processing must continue.
