document: rfc-5650
kind: normative-requirement
summary: When interval data is suspect or known to be invalid, the agent MUST report the interval as invalid and MUST NOT generate threshold notifications based upon the content of an invalid current 15-minute bucket.
section: 2.7.4
rfc2119_level: MUST
