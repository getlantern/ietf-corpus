document: rfc-9833
kind: protocol-element
summary: 'Three YANG features are defined: ''layer2-ac'' (support for ACs with Layer 2 properties), ''layer3-ac'' (support for ACs with Layer 3 properties), and ''server-assigned-reference'' (support for server-generated references that a client can use in subsequent requests, e.g., referencing a bearer when creating an AC).'
section: "4.1"
topics:
