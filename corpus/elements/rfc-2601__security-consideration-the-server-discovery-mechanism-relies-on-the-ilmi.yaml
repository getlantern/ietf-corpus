document: rfc-2601
kind: security-consideration
summary: The server discovery mechanism relies on the ILMI management framework for security. The service registry MIB is defined with read-only access, so any user-side device may query it but cannot modify it via ILMI. Modification requires local configuration on the ATM switch.
section: "7"
topics:
    - security
