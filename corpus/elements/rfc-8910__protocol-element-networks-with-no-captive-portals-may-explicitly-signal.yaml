document: rfc-8910
kind: protocol-element
summary: Networks with no captive portals may explicitly signal this by provisioning the Captive-Portal option with the URI 'urn:ietf:params:capport:unrestricted'. Clients observing this URI may forego time-consuming forms of captive portal detection.
