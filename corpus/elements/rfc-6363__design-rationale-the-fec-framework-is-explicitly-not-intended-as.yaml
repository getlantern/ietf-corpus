document: rfc-6363
kind: design-rationale
summary: The FEC Framework is explicitly not intended as a QoS tool to combat congestion-induced packet losses. The bandwidth cap (repair MUST NOT exceed source) and congestion-adaptive rate requirement exist to prevent naively implemented dynamic FEC from destabilizing the network.
section: "8.1"
topics:
    - congestion
    - realtime
