document: rfc-9577
kind: protocol-element
summary: The Authorization header with 'PrivateToken' scheme carries one parameter, 'token', containing the base64url-encoded Token structure. Clients present this to Origins to redeem (spend) a token. Each token contains a unique Client nonce and a challenge_digest binding it to the specific TokenChallenge.
section: 2.2.2
