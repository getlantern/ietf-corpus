document: rfc-9796
kind: security-consideration
summary: The Call-Info mechanism can enable actors to impersonate a calling party they are not authorized to represent. A management and policy layer that validates participants in the ecosystem and their use of telephone number identifiers is required to mitigate this risk.
section: "13"
topics:
    - sip
    - security
