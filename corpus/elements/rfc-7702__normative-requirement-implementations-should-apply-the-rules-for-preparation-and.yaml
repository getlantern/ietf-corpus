document: rfc-7702
kind: normative-requirement
summary: Implementations SHOULD apply the rules for preparation and comparison of nicknames specified in RFC 7700 (Nicknames profile of PRECIS). If there is a conflict between SIP and XMPP nicknames, the gateway is responsible for adjusting the nickname and informing the client of the unique nickname used.
section: "7"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
