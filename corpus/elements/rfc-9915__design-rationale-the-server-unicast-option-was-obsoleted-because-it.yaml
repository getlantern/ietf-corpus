document: rfc-9915
kind: design-rationale
summary: The Server Unicast option was obsoleted because it was not widely implemented and introduced security risks by allowing clients to bypass relay agents, which can perform access control and logging. Multicast-only client transmission is now the required model.
section: "1.1"
topics:
