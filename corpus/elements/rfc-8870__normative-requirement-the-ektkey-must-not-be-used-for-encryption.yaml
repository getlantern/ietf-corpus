document: rfc-8870
kind: normative-requirement
summary: The EKTKey MUST NOT be used for encryption more than T times, where T is cipher-specific. For AESKW128 and AESKW256, T = 2^48. Retransmitting the same FullEKTField multiple times counts as only one encryption.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
