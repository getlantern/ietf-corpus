document: rfc-4037
kind: normative-requirement
summary: Unless explicitly permitted otherwise, an OCP agent MUST terminate the transaction upon receiving an invalid transaction-scoped message, and MUST terminate the connection upon receiving an invalid connection-scoped message, sending result code 400. If scope is indeterminate, the message MUST be treated as connection-scoped.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
