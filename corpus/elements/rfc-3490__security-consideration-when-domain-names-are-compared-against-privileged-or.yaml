document: rfc-3490
kind: security-consideration
summary: When domain names are compared against privileged or anti-privileged sets, comparisons MUST be done per section 3.1 requirement 4 (ToASCII equivalence, case-insensitive). Any existing labels that start with the ACE prefix and would be altered by ToUnicode are automatically treated as ACE labels equivalent to non-ASCII labels.
section: "10"
topics:
    - security
    - dns
