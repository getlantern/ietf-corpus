document: rfc-2633
kind: wire-format
summary: The application/pkcs7-mime MIME type carries CMS objects (envelopedData, signedData). It SHOULD include the optional 'smime-type' parameter and 'name'/'filename' parameters with extensions .p7m (signedData/envelopedData), .p7c (certs-only), or .p7s (signature).
section: "3.2"
