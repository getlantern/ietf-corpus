document: rfc-2821
kind: security-consideration
summary: SMTP's lack of sender authentication makes mail spoofing trivial. The protocol itself cannot verify that the claimed sender (MAIL FROM address) is authentic. Implementers and operators must understand that the reverse-path provides no security guarantee about message origin.
section: "7.1"
topics:
    - email
    - security
