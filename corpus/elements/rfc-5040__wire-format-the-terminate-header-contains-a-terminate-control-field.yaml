document: rfc-5040
kind: wire-format
summary: The Terminate Header contains a Terminate Control field (19 bits), Reserved (13 bits, MUST be zero), optional DDP Segment Length (16 bits, valid when M bit set), optional Terminated DDP Header (112 bits for Tagged, 144 bits for Untagged), and optional Terminated RDMA Header (224 bits, present only for RDMA Read Request errors).
