document: rfc-9291
kind: design-rationale
summary: The L2NM uses IANA-maintained YANG modules for encapsulation type and pseudowire type identities rather than embedding them in the L2NM itself. This provides flexibility to handle new types via IANA process without requiring a revision of the L2NM YANG module.
