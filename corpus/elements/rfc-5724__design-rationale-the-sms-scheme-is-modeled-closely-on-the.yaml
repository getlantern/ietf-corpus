document: rfc-5724
kind: design-rationale
summary: 'The ''sms'' scheme is modeled closely on the ''mailto'' URI scheme (RFC 2368), providing analogous functionality for SMS that mailto provides for email: it allows authors to embed a pre-addressed, optionally pre-populated message composition starting point in documents.'
section: "2.1"
