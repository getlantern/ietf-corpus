document: rfc-2440
kind: interoperability-note
summary: ZIP-compressed packets use raw RFC 1951 DEFLATE blocks. PGP V2.6 uses 13-bit compression; implementations using more bits produce output that PGP V2.6 cannot decompress. ZLIB-compressed packets (RFC 1950) and BZip2 are not compatible with PGP V2.6.
section: "5.6"
topics:
    - security
