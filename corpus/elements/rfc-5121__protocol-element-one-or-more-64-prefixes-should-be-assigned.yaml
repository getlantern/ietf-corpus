document: rfc-5121
kind: protocol-element
summary: One or more /64 prefixes SHOULD be assigned to each 802.16 link (MS). Prefixes are advertised with the on-link (L-bit) flag set. DHCP or AAA-based prefix delegation MAY be used to provide one or more prefixes for an AR connected over 802.16.
