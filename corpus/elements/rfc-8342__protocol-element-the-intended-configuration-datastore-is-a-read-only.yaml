document: rfc-8342
kind: protocol-element
summary: The <intended> configuration datastore is a read-only datastore representing the configuration after all transformations to <running> are performed (template expansion, removal of inactive configuration). It is the configuration the system attempts to apply and must always be a valid configuration data tree.
section: 5.1.4
topics:
