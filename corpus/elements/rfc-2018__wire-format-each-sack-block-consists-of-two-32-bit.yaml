document: rfc-2018
kind: wire-format
summary: 'Each SACK block consists of two 32-bit unsigned integers in network byte order: Left Edge (first sequence number of the block) and Right Edge (sequence number immediately following the last byte of the block). Up to 4 blocks fit in the 40 bytes of TCP option space; only 3 blocks fit when the Timestamp option is also present.'
