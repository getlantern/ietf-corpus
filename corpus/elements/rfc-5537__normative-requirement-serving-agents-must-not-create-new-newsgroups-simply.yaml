document: rfc-5537
kind: normative-requirement
summary: Serving agents MUST NOT create new newsgroups simply because an unrecognized newsgroup name appears in the Newsgroups header field, and MUST remove any Xref header field from each received article (unless specially configured to preserve it).
section: "3.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
