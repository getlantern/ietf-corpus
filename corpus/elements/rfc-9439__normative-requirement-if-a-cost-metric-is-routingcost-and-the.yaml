document: rfc-9439
kind: normative-requirement
summary: If a 'cost-metric' is 'routingcost' and the metric contains a 'cost-context' field, then the 'cost-source' MUST be 'estimation'; if it is not, the client SHOULD reject the information as invalid.
section: "6.3"
rfc2119_level: MUST
