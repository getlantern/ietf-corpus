document: rfc-1757
kind: normative-requirement
summary: The probe must only grant write access to alarmVariable in MIB views that have read access to all objects on the probe. Because SNMP access control cannot restrict which OID is named in alarmVariable, the alarm mechanism could otherwise be used to read objects outside a manager's authorized view.
section: "5"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
