document: rfc-3479
kind: wire-format
summary: The FT ACK TLV (type 0x0504, U=0, F=0, length=4) carries a 32-bit cumulative FT ACK Sequence Number. A value of 0 indicates no FT label operations have been received on this session. It is recommended to include this TLV in all FT Keepalive messages to prevent backlogs.
section: "8.4"
topics:
    - mpls
    - routing
