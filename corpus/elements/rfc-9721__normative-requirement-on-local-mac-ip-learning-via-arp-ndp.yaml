document: rfc-9721
kind: normative-requirement
summary: On local MAC-IP learning via ARP/NDP, the parent MAC route Mx sequence number MUST be higher than any existing remote MAC route for Mx, MUST be at least equal to the corresponding Peer-Sync-Local MAC route sequence number, and MUST be higher than the 'Mz' sequence number if the IP is also associated with a different remote MAC 'Mz'. All local MAC-IP routes associated with MAC Mx MUST inherit the updated sequence number.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
