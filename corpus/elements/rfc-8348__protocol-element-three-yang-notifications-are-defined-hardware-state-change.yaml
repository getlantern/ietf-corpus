document: rfc-8348
kind: protocol-element
summary: 'Three YANG notifications are defined: ''hardware-state-change'' (fires when /hardware/last-change changes), ''hardware-state-oper-enabled'' (fires when a component transitions to ''enabled'' oper-state), and ''hardware-state-oper-disabled'' (fires when a component transitions to ''disabled'' oper-state). The latter two carry name, admin-state, and alarm-state leaves.'
section: "7.1"
topics:
    - yang
    - netconf
