document: rfc-9130
kind: design-rationale
summary: The global 'mpls/ldp/igp-sync' container in the global configuration is intentionally left empty. Its sole purpose is to serve as an augmentation point for additional LDP IGP synchronization parameters (e.g., timers) by vendors, while per-interface activation uses the 'mpls/ldp/igp-sync' leaf.
section: "2.6"
topics:
    - yang
    - routing
    - mpls
