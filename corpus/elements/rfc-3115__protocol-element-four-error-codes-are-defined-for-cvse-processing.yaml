document: rfc-3115
kind: protocol-element
summary: 'Four error codes are defined for CVSE processing failures: ERROR-FA-1 (code 100, unsupported Vendor-ID or Vendor-CVSE-Type in CVSE from MN to FA), ERROR-FA-2 (code 101, unsupported Vendor-ID or Vendor-CVSE-Type in CVSE from HA to FA), ERROR-HA-1 (code 140, from MN to HA), ERROR-HA-2 (code 141, from FA to HA).'
