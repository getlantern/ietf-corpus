document: rfc-8275
kind: interoperability-note
summary: This extension targets NFSv4 minor version 2. NFSv4.2 servers and clients implemented without knowledge of this extension will continue to interoperate with implementations that are aware of it, whether or not they support it, because the feature is OPTIONAL.
section: "3"
