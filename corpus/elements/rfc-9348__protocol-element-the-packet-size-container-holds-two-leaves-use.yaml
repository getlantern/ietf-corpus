document: rfc-9348
kind: protocol-element
summary: 'The packet-size container holds two leaves: use-path-mtu-discovery (boolean, default true) to enable PMTUD-based automatic sizing, and outer-packet-size (uint16, units bytes) for explicit manual configuration. If outer-packet-size is set and use-path-mtu-discovery is also true, the configured size is only adjusted downward by PMTUD.'
section: "3.2"
topics:
    - ipsec
    - yang
    - ip
