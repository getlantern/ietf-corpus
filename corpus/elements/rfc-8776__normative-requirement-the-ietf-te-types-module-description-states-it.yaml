document: rfc-8776
kind: normative-requirement
summary: The 'ietf-te-types' module description states it fully conforms to the Network Management Datastore Architecture (NMDA) as defined in RFC 8342. Implementations and servers exposing data modeled using these types must support NMDA datastores.
