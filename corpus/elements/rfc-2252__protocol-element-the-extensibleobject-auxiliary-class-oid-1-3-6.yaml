document: rfc-2252
kind: protocol-element
summary: The extensibleObject auxiliary class (OID 1.3.6.1.4.1.1466.101.120.111) permits an entry to optionally hold any attribute, effectively having an implicit MAY list of all attributes. Mandatory attributes of other object classes in the entry remain required. Not all servers implement this class.
section: "7.1"
