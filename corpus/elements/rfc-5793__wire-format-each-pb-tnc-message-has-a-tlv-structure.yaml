document: rfc-5793
kind: wire-format
summary: 'Each PB-TNC message has a TLV structure: Flags (8 bits, bit 0 = NOSKIP), PB-TNC Vendor ID (24 bits, SMI PEN, 0 = IETF), PB-TNC Message Type (32 bits), PB-TNC Message Length (32 bits, MUST be at least 12), and PB-TNC Message Value (variable length).'
section: "4.2"
