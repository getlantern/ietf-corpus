document: rfc-5512
kind: wire-format
summary: The GRE Encapsulation sub-TLV value field contains a GRE Key (4 octets) per RFC 2890, generated by the advertising router and inserted into the GRE encapsulation header by ingress routers. The GRE encapsulation sub-TLV MUST NOT be present unless a key value is being advertised.
section: "4.1"
topics:
    - bgp
    - routing
    - vpn
