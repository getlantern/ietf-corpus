document: rfc-4582
kind: normative-requirement
summary: A client MUST NOT use more than one TCP connection to communicate with a given floor control server within a conference; different logical clients (distinct User IDs) on the same physical host may each use a separate connection.
section: "6"
rfc2119_level: MUST NOT
topics:
    - realtime
    - tcp
