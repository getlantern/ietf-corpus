document: rfc-6487
kind: protocol-element
summary: The CRL Distribution Points extension is non-critical and MUST be present except in self-signed certificates. It MUST contain a single DistributionPoint with a fullName URI, and an rsync URI MUST be present referencing the issuer's most recent CRL.
section: 4.8.6
