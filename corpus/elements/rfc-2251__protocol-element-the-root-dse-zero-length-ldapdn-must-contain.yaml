document: rfc-2251
kind: protocol-element
summary: The root DSE (zero-length LDAPDN) MUST contain server-specific attributes including namingContexts, subschemaSubentry, altServer, supportedExtension, supportedControl, supportedSASLMechanisms, and supportedLDAPVersion. The root DSE MUST NOT be included in subtree search results starting from the root.
