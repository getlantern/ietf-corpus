document: rfc-1483
kind: normative-requirement
summary: An ATM interface acting as a bridge MUST be able to flood, forward, and filter bridged PDUs. Flooding is accomplished by sending the PDU through each relevant VC, either by explicit per-VC copy or via a multicast VC.
section: "6"
rfc2119_level: MUST
topics:
    - multicast
