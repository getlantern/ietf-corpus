document: rfc-8006
kind: normative-requirement
summary: GenericMetadata types MUST NOT define a property named 'href', as the presence of an 'href' property is the mechanism by which dCDNs detect that an object is a Link reference rather than an embedded object.
section: 4.1.7
rfc2119_level: MUST NOT
topics:
