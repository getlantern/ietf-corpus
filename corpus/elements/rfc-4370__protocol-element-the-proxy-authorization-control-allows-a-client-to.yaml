document: rfc-4370
kind: protocol-element
summary: The Proxy Authorization Control allows a client to request that an LDAP operation be processed under a provided authorization identity instead of the current authorization identity associated with the connection. It applies on a per-operation basis, benefiting clients performing operations on behalf of multiple users.
section: "1"
topics:
    - ldap
    - security
