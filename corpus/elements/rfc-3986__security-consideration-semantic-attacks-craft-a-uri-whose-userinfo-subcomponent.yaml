document: rfc-3986
kind: security-consideration
summary: Semantic attacks craft a URI whose userinfo subcomponent visually resembles a trusted hostname (e.g., "http://trusted.example.com@malicious.example.com/"). Applications rendering URIs for user feedback should display the userinfo portion in a visually distinct manner to help users detect such deception.
section: "7.6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
