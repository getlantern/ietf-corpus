document: rfc-6873
kind: interoperability-note
summary: Index lines in a SIP CLF file always start with an alphabetical character, while field data lines always start with a numerical character. This allows text processing tools (sed, awk, grep) to rapidly discard index lines without understanding the pointer format, and to split fields at tab characters for the 12 positional mandatory fields.
