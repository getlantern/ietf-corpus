document: rfc-7339
kind: normative-requirement
summary: Once a server selects an overload control algorithm for a client, the algorithm SHOULD NOT be changed for at least 3600 seconds (1 hour) to allow the algorithm to stabilize and avoid flapping.
section: "5.8"
rfc2119_level: SHOULD NOT
topics:
