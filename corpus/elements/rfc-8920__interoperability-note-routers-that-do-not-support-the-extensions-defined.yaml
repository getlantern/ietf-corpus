document: rfc-8920
kind: interoperability-note
summary: Routers that do not support the extensions defined in this document will only process legacy TE Opaque LSA advertisements and will infer RSVP-TE is enabled on any link for which legacy advertisements exist. Deployments with a mix of legacy and upgraded routers must maintain legacy advertisements while any legacy router remains in the network.
section: 12.2.3
topics:
    - routing
