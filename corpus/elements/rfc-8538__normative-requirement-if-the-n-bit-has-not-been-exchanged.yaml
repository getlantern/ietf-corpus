document: rfc-8538
kind: normative-requirement
summary: If the 'N' bit has not been exchanged with the peer, a route from the peer previously marked as stale MUST be deleted to deal with possible consecutive restarts. When the 'N' bit has been exchanged, this deletion rule is removed.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
