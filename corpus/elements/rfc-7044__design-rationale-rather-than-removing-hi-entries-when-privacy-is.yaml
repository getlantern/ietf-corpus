document: rfc-7044
kind: design-rationale
summary: Rather than removing hi-entries when privacy is requested (as RFC 4244 recommended), RFC 7044 anonymizes them. This preserves the structural information (number of hops, branching) while hiding sensitive URI content, allowing applications to still detect gaps and retargeting patterns without revealing user identity.
section: "16"
topics:
