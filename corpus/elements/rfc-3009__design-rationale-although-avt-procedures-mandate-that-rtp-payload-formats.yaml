document: rfc-3009
kind: design-rationale
summary: Although AVT procedures mandate that RTP payload formats without a defined rate must define a rate parameter, no rate parameter is defined for parityfec because the FEC data rate is inherently equal to the rate of the media it protects, making a separate parameter redundant.
