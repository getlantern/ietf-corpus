document: rfc-7273
kind: protocol-element
summary: The `ts-refclk` SDP attribute signals the timestamp reference clock source for RTP senders and receivers. It may appear at session, media, or source level; more specific levels override less specific ones. The ABNF form is `timestamp-refclk = "ts-refclk:" clksrc CRLF`.
section: "4.8"
topics:
