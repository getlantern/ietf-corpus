document: rfc-4747
kind: normative-requirement
summary: The compliance statement (t11vfMIBCompliance) makes the single group t11vfGeneralGroup mandatory. For all writable objects, write access is not required for compliance — MIN-ACCESS read-only is permitted for all read-write and read-create objects.
