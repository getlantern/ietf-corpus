summary: 'The PW Associated Channel Header (PWACH) is 32 bits: bits 0–3 are 0001, bits 4–7 are Version (currently 0), bits 8–15 are Reserved (MUST be sent as 0, ignored on reception), and bits 16–31 are the Channel Type (from the IANA PW Associated Channel Type registry).'
