document: rfc-3640
kind: normative-requirement
summary: The signaled de-interleave buffer size MUST be large enough to contain all 'early' AUs at any point during the session. If the de-interleaveBufferSize parameter is present, receivers MUST allocate at least that size; otherwise receivers use the calculated size based on maxDisplacement and max bit rate.
section: 3.2.3.3
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
