document: rfc-1904
kind: normative-requirement
summary: The MIN-ACCESS clause, when present, must not specify a greater level of access than is specified in the corresponding OBJECT-TYPE macro's MAX-ACCESS clause. An implementation is compliant if its access level is between MIN-ACCESS and MAX-ACCESS (inclusive).
section: 5.4.3.3
rfc2119_level: MUST NOT
topics:
    - snmp
