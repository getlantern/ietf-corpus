document: rfc-2226
kind: security-consideration
summary: The security implications of IP broadcast over ATM using MARS are no greater or less than those of using any other multicast group in the MARS multicast address range. Any required security enhancements would need to be added as extensions to the base RFC 2022 architecture.
section: Security Considerations
topics:
    - security
    - ip
    - multicast
