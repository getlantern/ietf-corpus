document: rfc-8857
kind: normative-requirement
summary: The WebSocket client MUST follow the procedures in RFC 7525 (including hostname verification per Section 6.1) while setting up a TLS connection with the WebSocket server. The 'websocket-uri' value MUST contain a hostname.
section: "8"
rfc2119_level: MUST
topics:
