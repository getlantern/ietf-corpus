document: rfc-7024
kind: protocol-element
summary: A VPN-IP default route is defined as a VPN-IP route whose VPN-IP prefix contains only a Route Distinguisher (RD) — no host or network prefix bits beyond the RD. V-hubs originate these routes to give V-spokes a next-hop of last resort for all VPN destinations.
