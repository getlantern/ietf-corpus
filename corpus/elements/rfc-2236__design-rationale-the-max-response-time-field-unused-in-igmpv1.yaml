document: rfc-2236
kind: design-rationale
summary: The Max Response Time field (unused in IGMPv1) was repurposed in IGMPv2 to allow routers to tune leave latency and control burstiness of IGMP traffic on a subnet by spreading host responses over a configurable interval.
section: "2.2"
topics:
