document: rfc-3339
kind: interoperability-note
summary: Alphabetic timezone label strings have historically resulted in poor interoperability; numeric offsets expressed as local time minus UTC are mandatory. The offset +00:20 in the 1937 Netherlands example illustrates handling non-standard historical offsets.
section: "4.2"
