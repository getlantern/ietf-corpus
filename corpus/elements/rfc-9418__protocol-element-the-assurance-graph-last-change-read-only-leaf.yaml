document: rfc-9418
kind: protocol-element
summary: The `assurance-graph-last-change` read-only leaf (type `yang:date-and-time`) records the timestamp of the most recent structural change to the assurance graph, including additions/deletions of subservices, dependencies, or maintenance status modifications. Changes to health scores or symptoms alone do not update this field.
section: "3.2"
topics:
