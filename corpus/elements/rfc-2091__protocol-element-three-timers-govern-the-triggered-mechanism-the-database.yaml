document: rfc-2091
kind: protocol-element
summary: 'Three timers govern the triggered mechanism: the Database Timer (normally 180 seconds, started when a Flush Update Response is received), the Hold Down Timer (120 seconds, started on route expiry, unreachable notification, or circuit-down), and the Retransmission Timer (5 seconds). An optional Over-subscription Timer MAY also be supported.'
section: "6"
topics:
