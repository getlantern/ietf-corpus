document: rfc-3339
kind: security-consideration
summary: The local time zone offset embedded in a timestamp may reveal when a site is less likely to be monitored, potentially aiding a security probe. Sites concerned about this may choose to emit all timestamps in UTC only (offset "Z" or "+00:00") rather than including a local offset.
section: "7"
topics:
    - security
    - privacy
