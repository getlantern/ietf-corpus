document: rfc-3339
kind: security-consideration
summary: The local time zone offset embedded in a timestamp may reveal information about when a site's systems are less likely to be monitored, potentially aiding adversaries in timing probes. Sites with security concerns may prefer to emit timestamps in UTC only (offset "Z").
section: "7"
topics:
    - security
    - privacy
