document: rfc-3339
kind: security-consideration
summary: The local time zone offset embedded in a timestamp may reveal information useful for determining when systems are less monitored and more susceptible to security probes. Sites concerned about this may emit times in UTC only (using 'Z' or '+00:00'), omitting the local offset.
section: "7"
topics:
    - security
    - privacy
