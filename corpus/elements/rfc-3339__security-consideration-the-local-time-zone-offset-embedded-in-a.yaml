document: rfc-3339
kind: security-consideration
summary: The local time zone offset embedded in a timestamp may reveal information about a site's geographic location, which could be used to infer periods when systems are less likely to be monitored and more susceptible to probing. Sites may choose to emit times in UTC only to avoid this disclosure.
section: "7"
topics:
    - security
    - privacy
