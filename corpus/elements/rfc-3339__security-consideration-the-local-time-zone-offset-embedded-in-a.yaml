document: rfc-3339
kind: security-consideration
summary: The local time zone offset embedded in a timestamp may reveal information useful to an attacker for determining when systems are less likely to be monitored. Sites concerned about this may choose to emit timestamps in UTC only (offset 'Z' or '+00:00').
section: "7"
topics:
    - security
    - privacy
