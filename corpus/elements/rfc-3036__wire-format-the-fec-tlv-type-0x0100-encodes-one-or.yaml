document: rfc-3036
kind: wire-format
summary: 'The FEC TLV (type 0x0100) encodes one or more FEC elements. Each FEC element has a 1-octet type: Wildcard (0x01, no value), Prefix (0x02, with 2-octet Address Family, 1-octet prefix length, and variable prefix field), or Host Address (0x03, with Address Family, 1-octet length, and full host address).'
section: 3.4.1
