document: rfc-1349
kind: normative-requirement
summary: A router MUST generate a code 11 (network unreachable for TOS) or code 12 (host unreachable for TOS) ICMP Destination Unreachable when an unreachable destination would have been reachable with a different TOS value. Codes 0 or 1 are used in other cases.
section: "7.2"
rfc2119_level: MUST
topics:
    - ip
    - qos
