document: rfc-8000
kind: interoperability-note
summary: Stand-alone deployments using AUTH_SYS (with or without name@domain) cannot participate in an NFSv4 multi-domain deployment. Only deployments using RPCSEC_GSS with name@domain, a unique NFSv4 Domain name, multi-domain-capable file systems, and secure remote authorization resolution are eligible.
section: "7"
topics:
