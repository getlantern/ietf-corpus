document: rfc-4577
kind: protocol-element
summary: A sham link is a manually configured, unnumbered point-to-point intra-area OSPF link between two PE routers, advertised as a type 1 link in a type 1 LSA, that makes the VPN backbone appear as an intra-area link to CE routers in the same OSPF area. Sham links are an OPTIONAL feature and SHOULD be treated as OSPF Demand Circuits.
section: 4.2.7
topics:
    - routing
    - mpls
