document: rfc-8285
kind: normative-requirement
summary: Local identifiers present in the stream MUST have been negotiated or defined out of band. Each distinct extension MUST have a unique ID. The ID value 0 is reserved for padding and MUST NOT be used as a local identifier.
section: 4.1.2
rfc2119_level: MUST
topics:
