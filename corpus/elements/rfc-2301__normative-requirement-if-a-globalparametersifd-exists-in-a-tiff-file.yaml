document: rfc-2301
kind: normative-requirement
summary: If a GlobalParametersIFD exists in a TIFF file, it SHOULD be located in the first IFD. When a conflict exists between fields in the GlobalParametersIFD and in an image IFD, the data in the image IFD shall prevail.
section: 2.2.4
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
