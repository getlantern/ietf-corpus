document: rfc-6562
kind: normative-requirement
summary: The VAD overhang period SHOULD have an exponentially decreasing probability distribution function, and it is RECOMMENDED to use an overhang with a half-life of a few hundred milliseconds to obscure interword pauses and single-word lengths without excessively reducing VAD effectiveness.
section: "4"
rfc2119_level: RECOMMENDED
