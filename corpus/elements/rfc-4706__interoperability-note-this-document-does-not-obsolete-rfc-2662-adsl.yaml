document: rfc-4706
kind: interoperability-note
summary: This document does not obsolete RFC 2662 (ADSL MIB); both MIBs coexist, with ifType=adsl(94) requiring RFC 2662 management and ifType=adsl2plus(238) requiring this MIB. Deployers must ensure the correct MIB is used based on the assigned ifType.
