document: rfc-9616
kind: normative-requirement
summary: When B sends an IHU to A and both timestamps are defined, B MUST ensure the IHU TLV is sent in a packet that also contains a timestamped Hello TLV, and MUST include both the Origin Timestamp and Receive Timestamp in the IHU.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
