document: rfc-4444
kind: normative-requirement
summary: If the Intermediate System can reach any subset of a configured summary address range, the summary address MUST be announced instead at the configured metric (isisSummAddrTable). Routes matching an isisRedistributeAddrTable entry MUST be announced at L1 when isisSysL2toL1Leaking is enabled.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
