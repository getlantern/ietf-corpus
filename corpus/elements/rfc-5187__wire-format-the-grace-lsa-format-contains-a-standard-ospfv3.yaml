document: rfc-5187
kind: wire-format
summary: The Grace-LSA format contains a standard OSPFv3 LSA header (LS age, LS type 0x000b, Link State ID, Advertising Router, LS sequence number, LS checksum, Length) followed by TLVs. The Link State ID is the Interface ID of the interface originating the LSA.
section: "2.2"
