document: rfc-9070
kind: security-consideration
summary: Readable state nodes expose network topology information (neighbor adjacencies, FEC-label bindings, TCP connection endpoints, peer LSR IDs). Unauthorized read access could reveal topology details useful for network reconnaissance or traffic interception attacks.
