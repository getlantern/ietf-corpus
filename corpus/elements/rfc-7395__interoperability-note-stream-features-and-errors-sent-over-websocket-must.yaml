document: rfc-7395
kind: interoperability-note
summary: Stream features and errors sent over WebSocket must include explicit namespace declarations (e.g., xmlns:stream='http://etherx.jabber.org/streams') since there is no parent stream:stream element providing the namespace context as in RFC 6120.
section: 3.3.3
topics:
    - websocket
    - realtime
