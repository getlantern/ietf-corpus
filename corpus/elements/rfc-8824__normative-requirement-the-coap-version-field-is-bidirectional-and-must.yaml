document: rfc-8824
kind: normative-requirement
summary: The CoAP Version field is bidirectional and MUST be elided during SCHC compression, since it always contains the same value. If a new CoAP version is defined, new Rules will be needed.
section: "4.1"
rfc2119_level: MUST
