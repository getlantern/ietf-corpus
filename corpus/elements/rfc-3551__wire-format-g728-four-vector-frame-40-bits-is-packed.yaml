document: rfc-3551
kind: wire-format
summary: G728 four-vector frame (40 bits) is packed into 5 octets B1-B5 with the MSB of the frame in the MSB of B1 and the LSB in the LSB of B5 ('maintenance of bit significance'); B1 SHALL be placed first in the RTP packet.
section: 4.5.5
topics:
