document: rfc-8030
kind: normative-requirement
summary: Push services MUST NOT return a 413 (Payload Too Large) status code in response to an entity body that is 4096 bytes or less in size. A push service MAY return 413 for larger bodies.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - http
