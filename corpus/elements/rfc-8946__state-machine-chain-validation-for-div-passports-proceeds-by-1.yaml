document: rfc-8946
kind: state-machine
summary: 'Chain validation for "div" PASSporTs proceeds by: (1) comparing outermost "dest" to the call target, (2) validating the outermost "div" PASSporT signature and credential authority, (3) verifying "orig" consistency across the entire chain, (4) checking date freshness, and (5) validating all signatures in every link of the chain. An invalid step at any stage invalidates the chain.'
