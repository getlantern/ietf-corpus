document: rfc-2848
kind: security-consideration
summary: SUBSCRIBE/NOTIFY monitoring sessions expose call status to subscribers. A PINT gateway must verify that a subscriber is authorized to receive status on a given session, as an unauthorized party learning call disposition or timing constitutes a privacy violation.
section: 5.1.4
topics:
    - security
    - privacy
    - realtime
    - sip
