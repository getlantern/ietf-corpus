document: rfc-8342
kind: design-rationale
summary: The original NETCONF datastore model required configuration and operational state data objects to be modeled twice in the YANG schema—as 'config true' and 'config false' nodes—leading to duplication, separate branches, and non-machine-readable relationships between branches. NMDA solves this by defining data objects only once while allowing independent instantiations in different datastores.
section: "2"
topics:
