document: rfc-3981
kind: normative-requirement
summary: The direct resolution method uses S-NAPTR (profiled NAPTR and SRV records) to determine server location and available transports. It is RECOMMENDED that any resolution method not using direct resolution should use S-NAPTR in whatever process it defines. The abbreviated registry URN is used as the S-NAPTR application service label.
section: 7.3.3
rfc2119_level: RECOMMENDED
topics:
    - registry
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
