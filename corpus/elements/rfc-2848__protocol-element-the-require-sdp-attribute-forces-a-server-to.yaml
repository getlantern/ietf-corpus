document: rfc-2848
kind: protocol-element
summary: 'The ''require'' SDP attribute forces a server to decline a request if it does not understand listed attributes: ''a=require:<attribute-list>''. Two Require: header tags are defined: ''org.ietf.sip.subscribe'' and ''org.ietf.sdp.require''.'
