document: rfc-3910
kind: interoperability-note
summary: Support for SIP REGISTER is included for PINT (RFC 3298) compatibility, and support for SIP INVITE is mandated because pre-existing SPIRITS implementations did not use SIP event notification but instead used INVITE to deliver the initial PSTN detection point.
