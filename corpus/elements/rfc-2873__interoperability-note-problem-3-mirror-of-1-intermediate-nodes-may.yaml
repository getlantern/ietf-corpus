kind: interoperability-note
summary: 'Problem #3 (mirror of #1): Intermediate nodes may alter SYN and ACK precedence fields such that both endpoints believe they agreed on precedence when they actually picked different values, allowing a connection that RFC 793 would require to be rejected.'
