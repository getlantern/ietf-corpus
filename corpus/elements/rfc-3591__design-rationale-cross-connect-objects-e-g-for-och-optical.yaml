document: rfc-3591
kind: design-rationale
summary: Cross-connect objects (e.g., for OCh optical cross-connects and ODUk electrical cross-connects) are explicitly excluded from this version of the MIB, pending consensus on interface object definitions. This intentional deferral allows the interface layer to stabilize before the cross-connect layer is standardized.
