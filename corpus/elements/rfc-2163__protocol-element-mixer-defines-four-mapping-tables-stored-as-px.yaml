document: rfc-2163
kind: protocol-element
summary: 'MIXER defines four mapping tables stored as PX records: ''table1'' (X.400→RFC822) and ''gate1'' (X.400→RFC822 via gateway) are stored under the X42D name space using X.400 domain keys; ''table2'' (RFC822→X.400) and ''gate2'' (RFC822→X.400 via gateway) are stored in the normal RFC822 domain name space.'
