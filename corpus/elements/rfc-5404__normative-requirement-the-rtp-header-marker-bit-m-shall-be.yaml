document: rfc-5404
kind: normative-requirement
summary: The RTP header marker bit (M) SHALL be set to 1 whenever the first frame-block carried in the packet is the first frame-block in a talkspurt; for all other packets, the marker bit SHALL be set to zero.
section: "5.1"
rfc2119_level: SHALL
topics:
