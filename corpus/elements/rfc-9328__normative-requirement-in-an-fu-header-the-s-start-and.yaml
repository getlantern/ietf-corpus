document: rfc-9328
kind: normative-requirement
summary: In an FU header, the S (start) and E (end) bits MUST NOT both be set to 1 in the same FU, because a non-fragmented NAL unit must not be transmitted as a single FU. The FU payload MUST NOT be empty.
section: 4.3.3
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
