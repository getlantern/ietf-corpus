document: rfc-8534
kind: security-consideration
summary: Setting the LIR-pF flag in a single wildcard S-PMSI A-D route can elicit a large number of Leaf A-D routes, causing significant control plane overhead. If set erroneously or maliciously, the attack is difficult to mitigate without disrupting multicast traffic, so reliance on general control-plane security mechanisms is recommended over flow-specific countermeasures.
section: "8"
topics:
    - security
    - multicast
    - mpls
