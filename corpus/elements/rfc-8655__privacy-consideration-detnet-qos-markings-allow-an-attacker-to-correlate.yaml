document: rfc-8655
kind: privacy-consideration
summary: DetNet QoS markings allow an attacker to correlate flows or select particular types of flow for more detailed inspection. The requirement for every (or nearly every) node along the path to identify DetNet flows may present an additional attack surface for privacy, particularly if DetNet is adopted in broader environments beyond single-administrative-domain networks.
section: "6"
topics:
    - privacy
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
