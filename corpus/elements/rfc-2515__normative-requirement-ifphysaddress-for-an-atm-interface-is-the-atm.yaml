document: rfc-2515
kind: normative-requirement
summary: ifPhysAddress for an ATM interface is the ATM address used as the Called Party Address IE for connections terminating at or forwarded through the interface. If the interface has no address, ifPhysAddress is a zero-length octet string.
section: 5.2.1
rfc2119_level: MUST
