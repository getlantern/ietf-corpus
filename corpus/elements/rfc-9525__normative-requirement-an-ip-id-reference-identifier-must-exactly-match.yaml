document: rfc-9525
kind: normative-requirement
summary: An IP-ID reference identifier MUST exactly match the value of an iPAddress entry in subjectAltName with no partial (e.g., network-level) matching. Matching is based on an octet-for-octet comparison of the bytes of the reference identity with those in the iPAddress subjectAltName.
section: "6.2"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
