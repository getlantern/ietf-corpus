document: rfc-2615
kind: wire-format
summary: The scrambler operates continuously through the bytes of the SONET STS-SPE/SDH Higher Order VC, bypassing path overhead and fixed stuff bytes. It is not reset per frame; state carries over from one VC to the next. The first 43 bits after startup or reframe will not be descrambled correctly.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
