document: rfc-5543
kind: protocol-element
summary: The Traffic Engineering attribute is an optional, non-transitive BGP attribute that carries Traffic Engineering information identical to the Interface Switching Capability Descriptor defined in RFC 4203 and RFC 5307. Its current scope is limited to VPN reachability information only.
