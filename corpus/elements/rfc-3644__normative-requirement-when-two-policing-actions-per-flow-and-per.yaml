document: rfc-3644
kind: normative-requirement
summary: When two policing actions (per-flow and per-class) are placed in a single PolicyRule or CompoundPolicyAction, the ExecutionStrategy property SHOULD be set to 'Do All' so that both individual flows and aggregate traffic classes are policed.
