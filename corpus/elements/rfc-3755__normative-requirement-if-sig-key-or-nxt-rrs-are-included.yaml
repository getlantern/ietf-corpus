document: rfc-3755
kind: normative-requirement
summary: If SIG, KEY, or NXT RRs are included in a zone, they MUST NOT receive special treatment; for example, if a SIG is included in a signed zone, there MUST be an RRSIG for it.
section: "3"
rfc2119_level: MUST NOT
