document: rfc-5291
kind: wire-format
summary: ORF entries are carried in the BGP ROUTE-REFRESH message. The message header contains AFI (2 octets), Reserved (1 octet), SAFI (1 octet), When-to-refresh (1 octet), followed by groups of ORF-Type (1 octet), Length of ORF entries (2 octets), and the variable-length ORF entries.
