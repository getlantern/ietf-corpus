document: rfc-5088
kind: wire-format
summary: 'The NEIG-PCE-DOMAIN sub-TLV (type=4, length=8) specifies a neighbor PCE-Domain toward which a PCE can compute paths. It has the same format as PCE-DOMAIN: 2-octet domain-type (1=OSPF Area ID, 2=AS Number), 2-octet reserved, and 32-bit Domain ID.'
section: "4.4"
