document: rfc-4011
kind: protocol-element
summary: The pmSchedTable provides schedule entries that control when a policy is 'ready'. If pmPolicySchedule is zero, no schedule is defined and the policy is always ready. If non-zero, the policy is ready only if the referenced schedule group contains at least one valid entry active at the current time.
section: "4.4"
topics:
