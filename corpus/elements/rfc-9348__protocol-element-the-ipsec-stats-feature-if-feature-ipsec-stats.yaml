document: rfc-9348
kind: protocol-element
summary: 'The ipsec-stats feature (if-feature ipsec-stats) gates per-SA IPsec packet counters: tx-pkts, tx-octets, tx-drop-pkts, rx-pkts, rx-octets, and rx-drop-pkts (all yang:counter64). These are read-only and augment child-sa-info (IKE) and sad-entry (IKE-less).'
section: "3.2"
topics:
    - ipsec
    - yang
    - netconf
