document: rfc-3839
kind: normative-requirement
summary: The file-type box MUST occur first in the file, and MUST contain a 3GPP brand in its compatible brands list. This applies to both audio/3gpp and video/3gpp files.
section: "3.1"
rfc2119_level: MUST
