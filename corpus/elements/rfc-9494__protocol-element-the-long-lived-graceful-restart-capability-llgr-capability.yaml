document: rfc-9494
kind: protocol-element
summary: The Long-Lived Graceful Restart Capability (LLGR Capability) is a BGP capability with assigned code value 71. It allows a BGP speaker to signal its ability to retain stale routes for a period longer than conventional Graceful Restart permits. The capability consists of zero or more per-AFI/SAFI tuples each containing a Long-Lived Stale Time (LLST) field.
section: "3.1"
topics:
    - bgp
    - routing
