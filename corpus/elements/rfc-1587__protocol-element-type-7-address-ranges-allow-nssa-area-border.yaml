document: rfc-1587
kind: protocol-element
summary: Type-7 address ranges allow NSSA area border routers to summarize multiple type-7 routes into a single type-5 LSA. Each range is defined by an [address, mask] pair, a status of Advertise or DoNotAdvertise, and an external route tag. Route aggregation follows rules for metric and path type selection across the subsumed type-7 routes.
section: "3.2"
topics:
    - routing
