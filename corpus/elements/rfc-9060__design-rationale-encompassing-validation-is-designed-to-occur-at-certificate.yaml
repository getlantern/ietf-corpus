document: rfc-9060
kind: design-rationale
summary: Encompassing validation is designed to occur at certificate issuance time rather than (or in addition to) call-setup verification time, because certificate issuance is an administrative function outside call processing, whereas verification occurs during call setup where extra network dips cause perceptible delay.
section: "4.1"
topics:
