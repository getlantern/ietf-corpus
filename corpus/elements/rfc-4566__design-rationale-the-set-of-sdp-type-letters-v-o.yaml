document: rfc-4566
kind: design-rationale
summary: The set of SDP type letters (`v=`, `o=`, etc.) is intentionally small and non-extensible; an unknown type letter causes the entire session description to be discarded. Extensibility is delegated entirely to the `a=` attribute mechanism to avoid fragmenting the core format.
