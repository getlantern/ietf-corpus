document: rfc-5939
kind: interoperability-note
summary: Session-level attributes included in potential configurations remain 'active' across the entire session description even if only some media streams selected that configuration. This can cause undefined interactions when session-level attributes conflict across media streams; mechanisms with such potential interactions MUST NOT be used in security-critical contexts.
section: 3.5.1
topics:
    - realtime
    - security
