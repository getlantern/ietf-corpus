document: rfc-8271
kind: normative-requirement
summary: In the one-to-one backup method, if the bypass tunnel is already in use at the upstream PLR, it SHOULD send a Notify message with Error Code 44 and Sub-code 2 'One-to-One Bypass Already in Use' to the downstream PLR.
section: 4.5.2
rfc2119_level: SHOULD
