document: rfc-3872
kind: design-rationale
summary: TRIP is modeled after BGP-4 (RFC 1771), so the TRIP MIB managed objects are also modeled after RFC 1657 (BGP-4 MIB using SMIv2). This design choice leverages existing operator familiarity and proven patterns from inter-domain routing management.
