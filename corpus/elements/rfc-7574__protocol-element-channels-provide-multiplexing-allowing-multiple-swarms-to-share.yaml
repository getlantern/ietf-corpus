document: rfc-7574
kind: protocol-element
summary: Channels provide multiplexing allowing multiple swarms to share the same transport address. In the UDP encapsulation every datagram is prefixed with the 4-byte channel ID allocated by the receiving peer. Channel IDs must be randomly chosen. Channel ID 0 is reserved for handshake initiation.
section: "3.11"
topics:
    - realtime
    - udp
    - nat
