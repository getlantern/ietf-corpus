summary: An NTP extension field consists of a 16-bit Field Type, a 16-bit Length (total octets including padding), a variable-length Value, and zero-padding to a 4-octet (word) boundary. Minimum length is 16 octets (4 words); maximum length is 65532 octets due to the 16-bit Length field.
