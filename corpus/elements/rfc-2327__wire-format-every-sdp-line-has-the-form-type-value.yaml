document: rfc-2327
kind: wire-format
summary: Every SDP line has the form '<type>=<value>' where type is exactly one case-significant character and value is a structured text string. Whitespace is not permitted either side of '='. Records are terminated by CRLF (0x0d0a); parsers should also accept a single newline. Text byte strings may contain any byte except 0x00 (Nul), 0x0a (LF), and 0x0d (CR).
section: "6"
