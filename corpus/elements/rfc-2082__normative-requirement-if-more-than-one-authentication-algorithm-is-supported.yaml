document: rfc-2082
kind: normative-requirement
summary: If more than one authentication algorithm is supported, the implementation MUST require that the algorithm be specified for each key at the time the key information is entered. Expired keys MAY be deleted automatically; manual deletion of active keys SHOULD also be supported.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - security
    - crypto
