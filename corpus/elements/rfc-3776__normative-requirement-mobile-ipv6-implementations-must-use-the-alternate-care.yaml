document: rfc-3776
kind: normative-requirement
summary: Mobile IPv6 implementations MUST use the Alternate Care-of Address mobility option in Binding Updates sent by mobile nodes while away from home, so that the care-of address is covered by ESP protection.
section: "4.3"
rfc2119_level: MUST
topics:
