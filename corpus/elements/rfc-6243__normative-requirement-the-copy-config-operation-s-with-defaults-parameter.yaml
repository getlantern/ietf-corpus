document: rfc-6243
kind: normative-requirement
summary: The <copy-config> operation's <with-defaults> parameter only takes effect when the target is specified with the <url> parameter. If the target is a NETCONF configuration datastore, <with-defaults> has no effect and MUST be silently ignored.
section: 4.5.1
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
