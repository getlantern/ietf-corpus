document: rfc-2835
kind: design-rationale
summary: The HRAL is ordered with broadcast address first so ports can probe for broadcast capability without prior knowledge of the network type. If a port receives its own InHARP_REQUEST, it is on a broadcast network; otherwise it proceeds to contact explicit server addresses in HRAL order.
section: 5.1.1
topics:
    - ip
