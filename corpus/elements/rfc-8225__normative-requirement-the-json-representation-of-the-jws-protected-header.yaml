kind: normative-requirement
summary: 'The JSON representation of the JWS Protected Header and JWS Payload MUST follow deterministic serialization rules: no whitespace, keys in lexicographic Unicode order, literal values lowercase, numbers encoded as integers, rules applied recursively.'
