document: rfc-4130
kind: interoperability-note
summary: 'AS2 implementations MUST accept the historic Disposition field constructions (e.g., ''automatic-action/MDN-sent-automatically; processed/error: authentication-failed'') for backward compatibility with earlier AS2 versions. Constructions using pure RFC 3798 disposition-modifiers are not guaranteed compatible with AS2 implementations prior to version 1.1.'
section: 7.5.6
topics:
    - http
    - email
