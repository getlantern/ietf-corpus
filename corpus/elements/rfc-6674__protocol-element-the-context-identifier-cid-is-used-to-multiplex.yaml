document: rfc-6674
kind: protocol-element
summary: The Context Identifier (CID) is used to multiplex flows from individual access devices onto the softwire. It is typically 32 bits wide and assigned by the access gateway, retrieved from a local or remote (e.g., AAA) repository. The combination of CID and SWID must be unique between the access gateway and AFTR.
section: "3"
