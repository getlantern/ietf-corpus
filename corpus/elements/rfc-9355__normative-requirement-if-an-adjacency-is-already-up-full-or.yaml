document: rfc-9355
kind: normative-requirement
summary: If an adjacency is already up (Full or 2-Way) with a neighbor that also supports OSPF BFD strict-mode, an implementation SHOULD NOT bring this adjacency down into Init state when BFD is newly enabled, to avoid disruption to routing operations.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - routing
