document: rfc-6283
kind: normative-requirement
summary: The root hash value generated from the <HashTree> element MUST be the same as the Time-Stamped value. Hash values within each Sequence are base64-decoded, sorted in binary ascending order, concatenated, and hashed to produce the next level.
section: 3.1.1
rfc2119_level: MUST
topics:
    - crypto
    - security
