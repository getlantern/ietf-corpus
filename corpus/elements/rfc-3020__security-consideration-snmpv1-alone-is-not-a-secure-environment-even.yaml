document: rfc-3020
kind: security-consideration
summary: SNMPv1 alone is not a secure environment. Even when the underlying network uses IPsec, SNMPv1 provides no control over which principals on the secure network may access or modify MIB objects. Operators must configure the SNMP entity to enforce access restrictions.
section: "6"
topics:
    - security
    - snmp
    - ipsec
