document: rfc-7565
kind: wire-format
summary: 'The ''acct'' URI ABNF is: acctURI = "acct" ":" userpart "@" host; userpart = unreserved / sub-delims 0*( unreserved / pct-encoded / sub-delims ). The ''host'', ''pct-encoded'', ''sub-delims'', and ''unreserved'' rules are borrowed from RFC 3986.'
