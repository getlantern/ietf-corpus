document: rfc-6917
kind: normative-requirement
summary: A successful Consumer interface response MUST contain a <response-session-info> element. The <session-id> MUST be included in all future related requests. The Consumer client MUST increment the returned <seq> value for each subsequent request in the same session.
section: 5.2.3
rfc2119_level: MUST
topics:
    - sip
    - http
    - realtime
