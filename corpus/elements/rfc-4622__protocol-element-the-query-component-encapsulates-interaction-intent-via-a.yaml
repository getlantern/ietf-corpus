document: rfc-4622
kind: protocol-element
summary: The query component encapsulates interaction intent via a query type optionally followed by key-value pairs (e.g., xmpp:user@example.com?message;subject=Hello%20World). Use cases include sending messages, roster management, presence subscriptions, joining chat rooms, and publish-subscribe interactions.
section: "2.5"
