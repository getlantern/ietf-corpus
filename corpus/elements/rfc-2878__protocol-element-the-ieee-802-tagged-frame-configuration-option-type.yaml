document: rfc-2878
kind: protocol-element
summary: The IEEE-802-Tagged-Frame Configuration Option (Type 8, Length 3) enables or disables support for IEEE 802.1Q tagged VLAN frames. A system that negotiates this option as disabled MUST NOT send any IEEE-802-Tagged-Frame packets. By default, Tagged Frame support is off.
section: "5.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
