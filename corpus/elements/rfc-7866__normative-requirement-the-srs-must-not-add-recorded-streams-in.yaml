document: rfc-7866
kind: normative-requirement
summary: The SRS MUST NOT add recorded streams in an RS when the SRS sends a new SDP offer. When the SRS initiates an RS, it MUST send the INVITE without an SDP offer, allowing the SRC to generate the offer containing the streams to be recorded.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
    - rtp
