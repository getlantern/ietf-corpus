document: rfc-7796
kind: normative-requirement
summary: If a PE is in Compatible Mode for a PW (connecting to a legacy non-E-Tree VSI), it MUST remove the root or leaf VLAN from frames upon transmit, and add a VLAN tag with the local root VLAN value to received frames. A raw PW (type 0x0005) SHOULD be used in this mode.
section: 5.3.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
