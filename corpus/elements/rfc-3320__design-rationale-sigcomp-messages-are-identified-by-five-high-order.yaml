document: rfc-3320
kind: design-rationale
summary: SigComp messages are identified by five high-order bits of the first byte all set to 1, a pattern that cannot appear in UTF-8 or ASCII encoded text. This allows uncompressed and SigComp-compressed messages to be multiplexed on the same transport port.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
