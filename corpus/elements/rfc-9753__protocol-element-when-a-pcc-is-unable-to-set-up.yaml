document: rfc-9753
kind: protocol-element
summary: When a PCC is unable to set up a path meeting all parameters for objects that cannot be ignored (P flag set), the PCRpt message MAY optionally include the PCEP objects that caused path setup failure along with the LSP-ERROR-CODE TLV indicating the reason for the failure.
