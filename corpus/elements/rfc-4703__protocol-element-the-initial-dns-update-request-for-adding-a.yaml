document: rfc-4703
kind: protocol-element
summary: The initial DNS UPDATE request for adding A/AAAA RRs includes as a prerequisite the assertion that the FQDN does not exist, and the update section adds the new FQDN, its IP address mapping (A and/or AAAA RRs), and the DHCID RR with the unique client identity.
