document: rfc-5423
kind: protocol-element
summary: MessageRead and MessageTrash events signal that messages were marked as read/seen or flagged for future deletion, respectively. These are only generated by IMAP or HTTP clients (POP has no read/seen concept). Parameters include a mailbox identifier and a set of message UIDs.
section: "4.2"
topics:
