document: rfc-7606
kind: normative-requirement
summary: A document specifying a new BGP attribute MUST provide specifics on what constitutes an error and how it is handled. Treat-as-withdraw is the generally preferred approach; session reset is discouraged. The document SHOULD also address debugging facilities for diagnosing malformed attribute issues.
section: "8"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - process
