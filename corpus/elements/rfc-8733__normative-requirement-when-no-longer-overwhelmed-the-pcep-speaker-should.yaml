document: rfc-8733
kind: normative-requirement
summary: When no longer overwhelmed, the PCEP speaker SHOULD notify its peers with PCNtf Notification-type=5, Notification-value=2 (Clearing Auto-Bandwidth Overwhelm State), unless an OVERLOADED-DURATION TLV was previously sent indicating the peer should wait for its expiry. Some dampening procedure to avoid overwhelm-state oscillations is RECOMMENDED.
section: "5.7"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
