document: rfc-9059
kind: protocol-element
summary: 'In the Single-Sided Bidirectional LSP Association, the reverse LSP of a bidirectional LSP is identified by the PCE using two different PLSP-IDs: one (e.g., P2) allocated at the ingress node PCC and another (e.g., P3) at the egress node PCC. The forward LSP and Double-Sided LSPs follow standard RFC 8231 PLSP-ID allocation.'
section: "5.5"
topics:
    - mpls
    - routing
