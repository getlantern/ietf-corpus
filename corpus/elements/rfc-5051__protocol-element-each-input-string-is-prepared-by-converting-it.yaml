document: rfc-5051
kind: protocol-element
summary: 'Each input string is prepared by converting it to a ''titlecased canonicalized UTF-8'' string through a four-step process: obtain Unicode codepoints, apply titlecase then recursive decomposition, append in UTF-8, and repeat. The resulting prepared string is then compared using i;octet operations.'
