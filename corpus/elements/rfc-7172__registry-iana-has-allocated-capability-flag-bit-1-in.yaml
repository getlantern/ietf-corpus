document: rfc-7172
kind: registry
summary: IANA has allocated capability flag bit 1 in the TRILL-VER sub-TLV capability flags (defined in RFC 7176) to indicate that a TRILL switch is FGL-safe. FGL-safe TRILL switches MUST advertise this flag in their IS-IS LSPs.
section: "8.2"
