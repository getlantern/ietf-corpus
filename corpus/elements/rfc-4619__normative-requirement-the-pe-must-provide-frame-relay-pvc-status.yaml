document: rfc-4619
kind: normative-requirement
summary: The PE MUST provide frame relay PVC status signaling to the frame relay network. If a service-affecting condition is detected for a DLCI, the PE MUST communicate the PW status to the remote PE. The egress PE SHOULD generate corresponding errors and alarms on the egress frame relay PVC.
section: "7.9"
rfc2119_level: MUST
topics:
    - mpls
