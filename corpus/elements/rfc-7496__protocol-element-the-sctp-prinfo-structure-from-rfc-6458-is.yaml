document: rfc-7496
kind: protocol-element
summary: 'The sctp_prinfo structure (from RFC 6458) is used to configure PR-SCTP policies: pr_policy selects the policy (SCTP_PR_SCTP_NONE, SCTP_PR_SCTP_TTL, SCTP_PR_SCTP_RTX, or SCTP_PR_SCTP_PRIO) and pr_value carries the policy-specific parameter (lifetime ms, retransmission count, or priority).'
section: "4.2"
topics:
    - sctp
