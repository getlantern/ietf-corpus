document: rfc-2847
kind: design-rationale
summary: A new SPKM-3 mechanism type was created rather than modifying SPKM-1 because the semantic changes needed for the low-infrastructure model (no initiator certificate, dhKeyAgreement required, different algorithm mandates) stretched RFC 2025 interpretation to the point where backward compatibility would be endangered.
