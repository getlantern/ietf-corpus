document: rfc-9535
kind: wire-format
summary: String literals in JSONPath name selectors and filter expressions use single or double quote delimiters. Escape sequences include \b, \t, \n, \f, \r, \", \', \/, \\, and \uXXXX; characters above U+FFFF must be encoded as surrogate pairs (e.g., \uD83C\uDC41).
section: 2.3.1.1
