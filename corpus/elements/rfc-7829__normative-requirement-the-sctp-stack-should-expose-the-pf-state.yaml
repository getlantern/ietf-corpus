document: rfc-7829
kind: normative-requirement
summary: The SCTP stack SHOULD expose the PF state and its transitions to the ULP and SHOULD also provide the means to suppress PF state exposure, allowing ULPs to retain the simpler active/inactive model of RFC 4960.
