document: rfc-7915
kind: protocol-element
summary: SIIT translates between IPv4 and IPv6 packet headers (including ICMP) by removing the original IP header and replacing it with a translated header; the data portion is left unchanged. The translator operates in either stateless mode (no session state, based solely on packet contents and configuration) or stateful mode (maintains dynamic translation table with IPv4/IPv6 address and Layer-4 identifier bindings).
section: "1.3"
topics:
