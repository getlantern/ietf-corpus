document: rfc-5590
kind: security-consideration
summary: It is RECOMMENDED that operators provision authPriv USM as a fallback mechanism to supplement any Security Model or Transport Model that has external dependencies (e.g., NTP, AAA, certificate authorities), so that secure SNMP communications can continue when external network services are unavailable.
section: "7.1"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
