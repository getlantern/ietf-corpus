document: rfc-2401
kind: interoperability-note
summary: The SPD and SAD selector model must support 'OPAQUE' values for transport layer protocol, source/destination ports, and user ID fields, because these may be inaccessible in received ESP packets due to encryption; implementations SHOULD support OPAQUE for port and transport protocol selectors.
section: 4.4.2
topics:
    - ipsec
    - security
