document: rfc-5934
kind: protocol-element
summary: The contingency-public-key-decrypt-key is an unsigned attribute (id-aa-TAMP-contingencyPublicKeyDecryptKey, OID id-attributes 63) of type PlaintextSymmetricKey (OCTET STRING), present only in Apex Trust Anchor Update messages validated with the contingency public key. It provides the symmetric key to decrypt the previously distributed contingency public key.
section: 2.2.4.1
topics:
