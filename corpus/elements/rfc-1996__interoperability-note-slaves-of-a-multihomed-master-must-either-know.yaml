document: rfc-1996
kind: interoperability-note
summary: Slaves of a multihomed master must either know the master by its closest interface address or know all of its interface addresses; otherwise, valid NOTIFY requests arriving from a secondary interface will appear to come from an unknown master and be silently dropped.
section: "3.10"
topics:
    - dns
