document: rfc-6326
kind: interoperability-note
summary: If the TRILL-VER sub-TLV is absent from an IS's Router Capability TLV, the originating IS is assumed to support only the base version of TRILL (RFC 6325). The sub-TLV's presence signals support for higher versions, with lower versions implicitly supported.
section: 2.3.1
topics:
    - routing
