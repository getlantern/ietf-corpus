document: rfc-1006
kind: design-rationale
summary: The default TPDU size was increased from ISO's 128 octets to 65531 octets for performance reasons, exploiting TCP's reliable byte-stream to allow much larger transfer units. The negotiation mechanism from ISO 8073 is retained for downsizing.
