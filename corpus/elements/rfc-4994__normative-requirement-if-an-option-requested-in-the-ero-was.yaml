document: rfc-4994
kind: normative-requirement
summary: If an option requested in the ERO was present in the Relay-Forward and not already in the Relay-Reply, the server MUST copy the option verbatim from the Relay-Forward to the Relay-Reply, even if the server does not otherwise recognize that option.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
