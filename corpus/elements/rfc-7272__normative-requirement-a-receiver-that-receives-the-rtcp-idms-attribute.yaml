document: rfc-7272
kind: normative-requirement
summary: A receiver that receives the rtcp-idms attribute in an SDP answer SHALL start sending RTCP XR IDMS Report Blocks (following normal RTCP rules) and SHALL be ready to receive IDMS Settings Packets. In the declarative case, the same obligation applies upon receiving the attribute.
section: "11.1"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
