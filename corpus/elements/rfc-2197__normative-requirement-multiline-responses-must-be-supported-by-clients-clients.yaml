document: rfc-2197
kind: normative-requirement
summary: Multiline responses MUST be supported by clients. Clients MUST NOT confuse responses to multiple commands with multiline responses; each command requires one or more lines, the last not containing a dash between the response code and string.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
