document: rfc-3877
kind: interoperability-note
summary: The alarmListName SHOULD match nlmLogName if the Notification Log MIB (RFC 3014) is supported, and SHOULD match or be a prefix of snmpNotifyFilterProfileName if SNMP-NOTIFICATION-MIB (RFC 3413) is supported, facilitating coordinated operation across these MIBs.
