document: rfc-9616
kind: normative-requirement
summary: When a node B receives a timestamped Hello from A, it MUST record the Hello's timestamp as the Origin Timestamp and the local receipt time as the Receive Timestamp in the Neighbour Table entry for A.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
