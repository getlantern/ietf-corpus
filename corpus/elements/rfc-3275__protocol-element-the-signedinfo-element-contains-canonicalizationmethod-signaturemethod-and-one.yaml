document: rfc-3275
kind: protocol-element
summary: The SignedInfo element contains CanonicalizationMethod, SignatureMethod, and one or more Reference elements. It is the content that is canonicalized and then signed; the algorithms used in calculating the SignatureValue are included within SignedInfo.
