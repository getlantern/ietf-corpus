document: rfc-8233
kind: design-rationale
summary: P2MP path metrics are defined as the maximum (worst-case) metric across all destinations in the P2MP tree rather than an average or sum, because SLA compliance requires that all destinations meet the performance bound, making the worst-case destination the binding constraint.
