document: rfc-5368
kind: protocol-element
summary: The REFER-Recipient generates one new SIP request per REFER-Target entry in the URI list, acting as if it had received a regular (single-target) REFER for each URI. The response code to the REFER itself follows RFC 3515 Section 2.4.2.
