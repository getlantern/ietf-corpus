document: rfc-6630
kind: normative-requirement
summary: If an EAP-Initiate/Re-auth message fails Authentication Tag verification or the tag is not included, the message SHOULD be discarded silently by both the SAP (for inbound) and the peer (for EAP-Finish/Re-auth).
section: "5.2"
rfc2119_level: SHOULD
topics:
