document: rfc-7266
kind: protocol-element
summary: The Calculation Algorithm ID (CAID) is an 8-bit field serving as a session-specific local identifier mapped via SDP 'calgextmap' to a named MOS calculation algorithm (e.g., G107, P1201_1). The CAID range 1-255 is valid for use; 0 indicates algorithm rejection; 4096-4351 is reserved for SDP negotiation of mutually exclusive alternatives.
section: 3.2.1
topics:
    - rtp
    - realtime
