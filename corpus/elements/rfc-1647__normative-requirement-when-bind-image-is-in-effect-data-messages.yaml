document: rfc-1647
kind: normative-requirement
summary: When BIND-IMAGE is in effect, data messages with DATA-TYPE 3270-DATA or SCS-DATA are not permitted before the client receives the first BIND-IMAGE message, nor between an UNBIND and the next BIND-IMAGE. Only SSCP-LU-DATA or NVT-DATA may carry user-oriented data during those intervals.
section: "10.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
