document: rfc-9018
kind: normative-requirement
summary: When a server does not support DNS Cookies, the client MUST NOT send the same Client Cookie to that same server again; it is recommended to wait a period (e.g., five minutes) before retrying with a new Client Cookie.
section: "3"
rfc2119_level: MUST NOT
topics:
    - dns
    - privacy
