document: rfc-6865
kind: security-consideration
summary: The baseline secure FECFRAME operation requires IPsec/ESP as mandatory-to-implement (but not mandatory-to-use), suitable when the only insecure domain is the one over which FECFRAME operates. The RS FEC Scheme does not change this recommendation from RFC 6363.
section: "6.4"
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
