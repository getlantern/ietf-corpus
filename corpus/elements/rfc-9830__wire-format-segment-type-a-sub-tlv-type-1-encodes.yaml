document: rfc-9830
kind: wire-format
summary: 'Segment Type A sub-TLV (Type 1) encodes a single SR-MPLS SID as a 4-octet MPLS label stack entry: 20-bit Label, 3-bit TC, 1-bit S (MUST be zero), 8-bit TTL. TC=0 signals receiver should choose TC; TTL=255 signals receiver should choose TTL. Length MUST be 6.'
