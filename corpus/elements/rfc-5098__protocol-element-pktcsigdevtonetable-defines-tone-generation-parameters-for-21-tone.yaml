document: rfc-5098
kind: protocol-element
summary: pktcSigDevToneTable defines tone generation parameters for 21 tone types (busy, dial, ringBack, callWaiting1–4, alertingSignal, userDefined1–4, etc.) indexed by tone type and frequency group. The MTA MUST fully populate this table with reasonable defaults after provisioning; objects do not persist across reboots.
