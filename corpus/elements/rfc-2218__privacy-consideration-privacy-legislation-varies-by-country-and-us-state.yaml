document: rfc-2218
kind: privacy-consideration
summary: Privacy legislation varies by country and US state. Directory administrators are strongly advised to verify applicable privacy law. Each provider should publish a clear statement of the directory's purpose, its data contents, and a privacy policy including data dissemination restrictions—required by many EU countries and strongly recommended for the US and Canada.
section: "8.0"
topics:
