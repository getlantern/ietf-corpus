document: rfc-7551
kind: interoperability-note
summary: The ASSOCIATION and Extended ASSOCIATION Objects use class numbers in the 11bbbbbb form, ensuring that non-supporting nodes ignore the objects but forward them unchanged per RFC 2205. Operators wishing to act on an Association Type SHOULD ensure all nodes expected to act on the association support that type.
section: 5.1.1
topics:
    - mpls
    - routing
