document: rfc-3193
kind: design-rationale
summary: Stateless encryption and compression are preferred over stateful methods when L2TP runs over IP because L2TP does not mandate packet ordering, and stateful methods magnify packet losses in the absence of a reliable delivery mechanism. Stateful methods are more acceptable over ordered, low-loss media like ATM or Frame Relay.
section: "2.2"
topics:
