document: rfc-7199
kind: protocol-element
summary: 'The HELD extension defines two XML elements: ''requestPolicyUri'' (an empty element added to a location request to indicate the device desires a policy URI allocation) and ''policyUri'' (carried in the location response, referencing the common access control policy for the locationUriSet).'
