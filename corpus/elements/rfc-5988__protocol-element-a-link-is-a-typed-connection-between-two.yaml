document: rfc-5988
kind: protocol-element
summary: 'A link is a typed connection between two resources identified by IRIs, comprising: a context IRI, a link relation type, a target IRI, and optionally target attributes. It can be read as ''{context IRI} has a {relation type} resource at {target IRI}, which has {target attributes}''.'
