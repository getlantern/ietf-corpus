document: rfc-3263
kind: interoperability-note
summary: 'This document changes RFC 2543 behavior for SRV fallback: when no NAPTR records are found, the client now queries SRV independently per supported transport protocol rather than merging priority values across all transport SRV records and selecting the overall most preferred.'
section: "4.1"
topics:
