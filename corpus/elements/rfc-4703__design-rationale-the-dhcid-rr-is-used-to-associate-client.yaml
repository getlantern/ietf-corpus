document: rfc-4703
kind: design-rationale
summary: The DHCID RR is used to associate client identification information with an FQDN so that cooperating DNS updaters can determine whether their client is currently associated with a particular FQDN. This allows multiple DHCP servers or clients to detect conflicts without requiring direct server-to-server communication.
section: "4"
topics:
