summary: 'Neighbor Discovery defines five ICMPv6 message types: Router Solicitation (Type 133), Router Advertisement (Type 134), Neighbor Solicitation (Type 135), Neighbor Advertisement (Type 136), and Redirect (Type 137). Together these support router discovery, prefix discovery, address resolution, neighbor unreachability detection, and redirect functions.'
