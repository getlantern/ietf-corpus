document: rfc-1521
kind: normative-requirement
summary: The encapsulation boundary MUST NOT appear inside any encapsulated body part. Boundaries must be no longer than 70 characters (not counting the two leading hyphens). Mail handling agents are explicitly forbidden from adding, removing, or reordering body-part headers embedded within multipart message bodies.
section: 7.2.1
rfc2119_level: MUST NOT
topics:
    - email
