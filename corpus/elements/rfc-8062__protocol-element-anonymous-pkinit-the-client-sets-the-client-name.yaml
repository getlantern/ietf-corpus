document: rfc-8062
kind: protocol-element
summary: 'Anonymous PKINIT: the client sets the client name to the anonymous principal, provides PA_PK_AS_REQ with empty signerInfos and absent certificates, and MUST use Diffie-Hellman key agreement by populating clientPublicValue. This is the only mechanism to obtain a ticket with the anonymous realm as the client realm.'
section: 4.1.1
topics:
