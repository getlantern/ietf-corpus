document: rfc-3398
kind: normative-requirement
summary: PSTN interworking nodes MUST understand the MIME type 'multipart/mixed' as defined in RFC 2046, since SIP message bodies in PSTN interworking will typically carry both SDP and ISUP or billing information simultaneously.
section: "5.2"
rfc2119_level: MUST
topics:
