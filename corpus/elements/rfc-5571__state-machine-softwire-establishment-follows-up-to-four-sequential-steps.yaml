summary: 'Softwire establishment follows up to four sequential steps: Step 0 (optional IKEv1 IPsec SA), Step 1 (L2TPv2 tunnel + session), Step 2 (PPP LCP + optional auth + NCP IPV6CP or IPCP), Step 3 (optional DHCPv6 or DHCPv4 for prefix delegation and DNS). Steps 0 and 3 are optional.'
