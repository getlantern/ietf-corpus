document: rfc-1212
kind: normative-requirement
summary: The ACCESS clause must be present and defines the minimum level of support required for that object type. Valid values are read-only, read-write, write-only, and not-accessible. Implementations may locally support additional access modes beyond the declared minimum.
section: 4.1.2
rfc2119_level: MUST
