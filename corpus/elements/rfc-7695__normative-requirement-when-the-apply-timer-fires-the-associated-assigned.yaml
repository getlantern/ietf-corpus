document: rfc-7695
kind: normative-requirement
summary: When the Apply Timer fires, the associated Assigned Prefix MUST be applied. When the Backoff Timer fires for a pair with a Current Assignment, that assignment MUST be published and the Apply Timer MUST be set to (2 * Flooding Delay) if not yet applied.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - ip
