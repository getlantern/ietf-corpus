document: rfc-7391
kind: normative-requirement
summary: An FE advertising FEPO version 1.2 MUST support EXTENDEDRESULT-TLVs at minimum. A master CE can enable extended results by setting EResultAdmin to 2, in which case the FE MUST switch to sending only EXTENDEDRESULT-TLVs.
section: 3.2.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
