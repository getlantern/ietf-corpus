document: rfc-4538
kind: normative-requirement
summary: The UAC request SHOULD include a Require header field containing the tdialog option tag, so that the UAC can differentiate between a 403 caused by lack of extension support and a 403 caused by the UAS choosing not to authorize despite proven dialog awareness.
section: "3"
rfc2119_level: SHOULD
topics:
