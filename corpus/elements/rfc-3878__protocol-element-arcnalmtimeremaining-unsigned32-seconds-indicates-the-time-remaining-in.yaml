document: rfc-3878
kind: protocol-element
summary: arcNalmTimeRemaining (Unsigned32, seconds) indicates the time remaining in nalmTI or nalmQICD state. It is initialized to arcTITimeInterval or arcCDTimeInterval respectively when entering those states, decrements over time, and can be read-create modified by management. Its value is zero when the resource is not in nalmTI or nalmQICD.
section: "5"
