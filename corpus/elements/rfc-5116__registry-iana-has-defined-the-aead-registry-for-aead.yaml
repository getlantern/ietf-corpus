document: rfc-5116
kind: registry
summary: 'IANA has defined the ''AEAD Registry'' for AEAD algorithms. Each entry contains a short name (starting with ''AEAD''), a positive number assigned by IANA, and a reference to a complete specification with test cases. Numbers 32,768–65,535 are reserved for private use. Initial entries: AEAD_AES_128_GCM (1), AEAD_AES_256_GCM (2), AEAD_AES_128_CCM (3), AEAD_AES_256_CCM (4).'
section: "6"
