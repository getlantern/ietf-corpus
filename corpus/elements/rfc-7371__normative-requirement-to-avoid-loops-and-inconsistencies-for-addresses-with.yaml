document: rfc-7371
kind: normative-requirement
summary: To avoid loops and inconsistencies, for addresses with the R-bit set to 1, the Embedded-RP mapping MUST be considered the longest possible match and higher priority than any other mechanism. This replaces the old FF70::/12 range restriction.
section: 4.2.4
rfc2119_level: MUST
topics:
    - ip
    - multicast
