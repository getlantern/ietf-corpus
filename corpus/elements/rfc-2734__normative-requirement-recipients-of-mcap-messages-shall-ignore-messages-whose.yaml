document: rfc-2734
kind: normative-requirement
summary: Recipients of MCAP messages SHALL ignore messages whose source_ID top 10 bits are neither 0x3FF nor the recipient's own bus ID, limiting MCAP to the local Serial Bus domain.
section: "9.2"
rfc2119_level: MUST
topics:
