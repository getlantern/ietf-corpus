summary: 'IPv6 Fragment Header processing for IPv6-to-IPv4 translation: Total Length = IPv6 Payload Length - 8 (Fragment Header) + 20 (IPv4 header); Identification = low-order 16 bits of IPv6 Fragment Header Identification; MF flag copied from IPv6 M flag; Fragment Offset copied; DF cleared to allow further IPv4 fragmentation.'
