document: rfc-4771
kind: normative-requirement
summary: If MAC verification fails for a packet carrying the ROC (SEQ = 0 mod R), the packet MUST be dropped. The receiver must not update its local ROC based on an unverified packet.
section: "2"
rfc2119_level: MUST
topics:
    - rtp
    - security
