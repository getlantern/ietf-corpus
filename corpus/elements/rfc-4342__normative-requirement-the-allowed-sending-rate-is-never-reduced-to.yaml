document: rfc-4342
kind: normative-requirement
summary: The allowed sending rate is never reduced to less than the RFC 3390 initial sending rate as a result of an idle period. If the allowed rate was at or above the initial sending rate upon entering the idle period, it should not be reduced below that rate regardless of idle duration.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
