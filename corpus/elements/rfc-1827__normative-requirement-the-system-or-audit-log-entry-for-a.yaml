document: rfc-1827
kind: normative-requirement
summary: The system or audit log entry for a failed ESP decryption or missing SA SHOULD include the SPI value, date/time, cleartext Sending Address, cleartext Destination Address, and the cleartext Flow ID. The log entry MAY also include other identifying data.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - ipsec
    - vpn
    - security
