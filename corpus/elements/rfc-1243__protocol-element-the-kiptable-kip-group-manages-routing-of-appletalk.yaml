document: rfc-1243
kind: protocol-element
summary: The kipTable (KIP Group) manages routing of AppleTalk datagrams over an IP internet. Each entry contains kipNetStart/End (AppleTalk range), kipNextHop (IpAddress), kipHopCount, kipBCastAddr (IP broadcast form), kipCore (core/notcore), kipType (kipRouter, net, host, other), kipState, and kipShare.
