document: rfc-2592
kind: protocol-element
summary: smLangTable (smObjects 1) and smExtsnTable (smObjects 2) describe supported languages and extensions. Each language entry identifies the language by OID (smLangLanguage), version string (smLangVersion, max 32 octets), vendor OID (smLangVendor), implementation revision (smLangRevision, max 32 octets), and description. Extension entries add smExtsnExtension OID and follow the same version/vendor pattern, indexed under smLangIndex.
section: "5.1"
