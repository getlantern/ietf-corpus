document: rfc-4604
kind: normative-requirement
summary: An SSM-aware host SHOULD NOT send MODE_IS_EXCLUDE Current-State Records or CHANGE_TO_EXCLUDE_MODE Filter-Mode-Change Records for an SSM address (MODIFICATION). EXCLUDE mode semantics do not apply to SSM addresses.
section: 2.2.2
rfc2119_level: SHOULD NOT
topics:
    - multicast
