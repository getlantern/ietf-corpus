document: rfc-3280
kind: design-rationale
summary: RFC 3280 replaces the rigid RFC 1422 PEM hierarchy (all paths from IPRA, name subordination rule, PCA concept hard-coded into verifiers) with a flexible architecture using X.509 v3 extensions. Policy extensions replace PCAs and name constraint extensions replace the subordination rule, enabling automation and allowing certification paths to start from any locally trusted CA rather than a single global root.
section: "3.2"
topics:
    - pkix
    - security
