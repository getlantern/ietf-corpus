document: rfc-2848
kind: protocol-element
summary: 'Three new SIP methods are introduced: SUBSCRIBE (open a monitoring session to receive disposition notifications), NOTIFY (server sends status indications during a monitoring session), and UNSUBSCRIBE (close the monitoring session). Their state machine mirrors INVITE/BYE.'
section: 3.5.3
topics:
