document: rfc-8357
kind: normative-requirement
summary: When an IPv6 server receives a Relay-forward message with the 'Relay Source Port Option', it MUST copy the option when constructing the Relay-reply chain, and MUST use the UDP source port from the Relay-forward packet when replying to the relay agent.
section: "5.2"
rfc2119_level: MUST
topics:
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
