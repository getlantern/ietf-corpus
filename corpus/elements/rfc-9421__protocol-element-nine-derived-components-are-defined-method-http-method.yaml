summary: 'Nine derived components are defined: @method (HTTP method string, case-preserved), @target-uri (full assembled target URI), @authority (normalized host[:port]), @scheme (lowercased URI scheme), @request-target (raw request target, HTTP/1.1 only), @path (absolute path, percent-encoded preserved), @query (full query string including leading ''?''), @query-param (individual named query parameter with required name parameter), and @status (3-digit status code for responses only).'
