document: rfc-9342
kind: protocol-element
summary: 'Single-packet-basis delay measurements face limitations in multipoint scenarios: Single Marking based on first/last packet of the interval does not work because it is impossible to correlate which path the first packet takes in point-to-multipoint scenarios. Double Marking works only statistically and can only measure a single path per marking period.'
section: 7.2.1
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
