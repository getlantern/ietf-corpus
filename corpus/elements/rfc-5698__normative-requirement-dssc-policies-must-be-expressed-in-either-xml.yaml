document: rfc-5698
kind: normative-requirement
summary: DSSC policies MUST be expressed in either XML or ASN.1. To achieve interoperability, policies SHOULD be published in both formats. XML policies MUST be well-formed and SHOULD be valid against the schema.
section: "4"
rfc2119_level: MUST
