document: rfc-3246
kind: interoperability-note
summary: 'A Differentiated Services domain may provide multiple instances of EF simultaneously. Each instance must independently satisfy the Section 2.2 equations. E_a and E_p values per instance depend heavily on the scheduler implementation: multi-level priority schedulers may yield large error terms for lower-priority EF instances, while WFQ-like schedulers preserve smaller error terms.'
