document: rfc-5295
kind: security-consideration
summary: Key lifetime should not exceed that of the EMSK. If key lifetime or key strength information is available from the authenticated key exchange, it SHOULD be used in determining the lifetime of derived keys.
section: "7.5"
rfc2119_level: SHOULD
