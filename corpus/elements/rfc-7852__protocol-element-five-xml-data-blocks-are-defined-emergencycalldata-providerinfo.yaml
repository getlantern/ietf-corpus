summary: 'Five XML data blocks are defined: EmergencyCallData.ProviderInfo (provider identity/contact), EmergencyCallData.ServiceInfo (service characteristics), EmergencyCallData.DeviceInfo (device details), EmergencyCallData.SubscriberInfo (owner/subscriber), and EmergencyCallData.Comment (free-form human-readable text). Each block has a corresponding MIME media type.'
