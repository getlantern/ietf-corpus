document: rfc-3530
kind: wire-format
summary: The clientaddr4 r_addr field encodes IPv4 universal addresses as 'h1.h2.h3.h4.p1.p2' (dotted-decimal host plus two-octet port in ASCII-decimal) with r_netid 'tcp' or 'udp'. For IPv6, the format is 'x1:x2:x3:x4:x5:x6:x7:x8.p1.p2' with r_netid 'tcp6' or 'udp6'.
section: "2.2"
topics:
    - ip
