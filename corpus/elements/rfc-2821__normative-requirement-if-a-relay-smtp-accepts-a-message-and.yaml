document: rfc-2821
kind: normative-requirement
summary: If a relay SMTP accepts a message and later cannot deliver it, it MUST construct an 'undeliverable mail' notification and send it to the originator indicated by the reverse-path. SMTP servers MUST NOT send notification messages about problems transporting notification messages.
section: "3.7"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
