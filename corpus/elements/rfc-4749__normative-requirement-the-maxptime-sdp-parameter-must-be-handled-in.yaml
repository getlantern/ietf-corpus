document: rfc-4749
kind: normative-requirement
summary: The maxptime SDP parameter MUST be handled in the same way as ptime (as specified in RFC 3264). Any unknown parameter in an offer MUST be ignored by the receiver and MUST NOT be included in the answer.
section: 6.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
