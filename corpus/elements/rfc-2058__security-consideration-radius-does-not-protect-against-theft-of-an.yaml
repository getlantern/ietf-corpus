document: rfc-2058
kind: security-consideration
summary: RADIUS does not protect against theft of an authenticated session via realtime active wiretapping. However, generating unique unpredictable Request Authenticators protects against a wide range of active attacks, including attackers tricking a server into responding to a predicted future request and using that response to masquerade as the server.
section: "3"
topics:
    - radius
    - security
