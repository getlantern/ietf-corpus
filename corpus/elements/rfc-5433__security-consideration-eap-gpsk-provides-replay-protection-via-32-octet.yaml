document: rfc-5433
kind: security-consideration
summary: EAP-GPSK provides replay protection via 32-octet random nonces RAND_Server and RAND_Peer; collision probability requires approximately 2^64 sessions before replay is feasible. Randomness quality (per RFC 4086) is critical for this guarantee.
section: "12.5"
topics:
