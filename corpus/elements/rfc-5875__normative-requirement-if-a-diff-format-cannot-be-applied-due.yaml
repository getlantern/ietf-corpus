document: rfc-5875
kind: normative-requirement
summary: If a diff format cannot be applied due to patch processing or programming errors, the subscriber SHOULD refresh the subscription and disable patching by setting 'diff-processing' to 'no-patching'. The subscriber SHOULD NOT reply with a non-200 response since the notifier cannot make corrections.
section: "4.8"
rfc2119_level: SHOULD
topics:
    - sip
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
