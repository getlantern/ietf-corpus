document: rfc-907
kind: state-machine
summary: Section 8 defines a HAP link restart state diagram governing initialization between host and SIMP. The host sends a Restart Request (with a Reason field indicating the cause), and the SIMP responds with a Restart Complete message that includes a bit enabling or disabling the A/R mechanism for the link. States include uninitialized, restart-pending, and operational.
