document: rfc-7673
kind: security-consideration
summary: Mixed security status among SRV target endpoints is permitted to allow partial or incremental deployment. However, SRV sorting rules are unchanged and do not prioritize secure over insecure endpoints; a partial deployment is not considered secure and no special accommodation is made for it.
section: "9.1"
topics:
    - security
    - dns
    - tls
