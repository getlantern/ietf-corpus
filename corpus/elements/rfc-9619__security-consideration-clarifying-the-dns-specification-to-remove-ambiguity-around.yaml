document: rfc-9619
kind: security-consideration
summary: Clarifying the DNS specification to remove ambiguity around QDCOUNT improves interoperability and is well-aligned with security hygiene. Consistent rejection of QDCOUNT > 1 with FORMERR reduces the attack surface for malformed-message abuse.
