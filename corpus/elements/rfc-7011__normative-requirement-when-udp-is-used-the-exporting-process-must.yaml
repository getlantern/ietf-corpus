document: rfc-7011
kind: normative-requirement
summary: When UDP is used, the Exporting Process MUST periodically retransmit all Template Records so that a Collecting Process that starts or restarts can receive them. The retransmission period SHOULD be configurable, and Template Records MUST be retransmitted within the configured period.
section: "8.4"
rfc2119_level: MUST
topics:
    - measurement
    - udp
