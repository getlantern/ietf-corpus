document: rfc-5097
kind: interoperability-note
summary: The compliance statement requires that dns(16) address type need not be supported for endpoint local/remote address type fields; only unknown(0), ipv4(1), ipv6(2), ipv4z(3), ipv6z(4) and zero-length or 4/8/16/20-byte InetAddress values are required.
