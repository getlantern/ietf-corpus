document: rfc-8231
kind: security-consideration
summary: A malicious PCC can send false LSP State Reports to a PCE, corrupting the PCE's view of network state and causing incorrect path computations for other LSPs that share the same PCE. PCEP session authentication is the primary mitigation.
section: "10.4"
topics:
    - security
    - mpls
    - routing
