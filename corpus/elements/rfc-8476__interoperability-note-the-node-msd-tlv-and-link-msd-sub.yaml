document: rfc-8476
kind: interoperability-note
summary: The Node MSD TLV and Link MSD Sub-TLV are applicable to both OSPFv2 and OSPFv3. The Node MSD TLV is optional and its advertising scope is deployment-specific; MSD advertisements MAY be useful even in non-SR MPLS networks where MSD defines the maximum label depth.
