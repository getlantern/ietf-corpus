document: rfc-9224
kind: protocol-element
summary: Entities (contacts, registrants, registrars) can be queried by handle per RFC 9082, but since there is no global namespace for entities, this document does not define a bootstrap method for finding authoritative RDAP servers for entities. RFC 8521 object tagging MAY be used as an alternative.
