document: rfc-9792
kind: interoperability-note
summary: The Prefix Extended Flags sub-TLV does not introduce backward compatibility issues. Implementations that do not recognize it will ignore the sub-TLV per normal TLV processing rules (RFC 3630 Section 2.3.2 for OSPFv2 and RFC 8362 Section 6.3 for OSPFv3).
