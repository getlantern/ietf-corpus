document: rfc-6157
kind: normative-requirement
summary: A SIP proxy that receives a request over IPv6 and relays it to a downstream endpoint over IPv4 (or vice versa) MUST be configured to Record-Route so that it remains in the signaling path for all subsequent requests.
section: 3.1.1
rfc2119_level: MUST
topics:
    - sip
    - v6ops
