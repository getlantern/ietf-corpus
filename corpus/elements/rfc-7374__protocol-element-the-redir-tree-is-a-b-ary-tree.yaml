kind: protocol-element
summary: The ReDiR tree is a b-ary tree stored node-by-node in the RELOAD overlay. Each tree node (lvl, j) is stored at key H(namespace, level, j), covers b intervals of the DHT identifier space, and is uniquely identified by its (level, position) pair. The default branching factor is 10.
