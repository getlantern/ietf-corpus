document: rfc-8341
kind: security-consideration
summary: If external protocol mechanisms used to report group names to the transport layer do not protect against man-in-the-middle attacks, an attacker could inject group names to escalate a user's NACM permissions. Administrators may mitigate this by setting /nacm/enable-external-groups to 'false'.
section: "5.1"
topics:
    - netconf
    - security
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
