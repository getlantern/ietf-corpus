document: rfc-2744
kind: normative-requirement
summary: Applications wishing to use per-message protection services on partially-established contexts (before GSS_S_COMPLETE) should check the GSS_C_PROT_READY_FLAG bit in ret_flags before invoking gss_wrap or gss_get_mic.
section: "4.7"
rfc2119_level: SHOULD
topics:
