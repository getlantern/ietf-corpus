document: rfc-8169
kind: normative-requirement
summary: A node MUST NOT place more than one sub-TLV with the same Value in the RTM_SET TLV; if a duplicate address is found, LSP setup MUST fail with ResvErr Error Code 42 (Duplicate sub-TLV) with Error Value encoding (Type of TLV, Type of sub-TLV).
section: 4.4.1
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
