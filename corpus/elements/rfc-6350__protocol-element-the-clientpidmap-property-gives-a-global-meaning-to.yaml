document: rfc-6350
kind: protocol-element
summary: 'The CLIENTPIDMAP property gives a global meaning to a local PID source identifier. Its value is a semicolon-separated pair: a small positive integer (matching the second field of a PID parameter) and a URI. Zero is not allowed as a source identifier. The PID parameter MUST NOT be applied to the CLIENTPIDMAP property itself.'
section: 6.7.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
