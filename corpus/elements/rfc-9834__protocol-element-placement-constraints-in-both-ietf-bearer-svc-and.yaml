document: rfc-9834
kind: protocol-element
summary: Placement constraints in both 'ietf-bearer-svc' and 'ietf-ac-svc' allow specifying diversity requirements (e.g., avoid placing two ACs on the same PE). Constraint targets may be a named group, all other bearers/ACs, or all other groups, using the 'placement-diversity' feature from RFC 9181.
section: 5.2.4
topics:
    - yang
