document: rfc-7753
kind: normative-requirement
summary: A PCP client MUST NOT include more than one PORT_SET option in a PCP MAP request. If multiple port sets are needed, the client MUST issue separate MAP requests, each with a distinct Internal Port.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - nat
    - pcp
