document: rfc-5797
kind: normative-requirement
summary: While a Standards Action would be required to make the FEAT mechanism itself mandatory, implementation of FEAT and OPTS is clearly required in conjunction with any extension or feature that depends on it. FEAT and OPTS are thus listed as mandatory ('m') in the registry.
section: "3"
rfc2119_level: REQUIRED
topics:
