document: rfc-9670
kind: protocol-element
summary: The urn:ietf:params:jmap:principals capability advertises support for Principal and ShareNotification data types. Its value in accountCapabilities MUST contain currentUserPrincipalId (Id|null), the id of the Principal corresponding to the fetching user.
