document: rfc-2846
kind: protocol-element
summary: 'The local-phone element is defined as: local-phone = [ exit-code ] [ dial-number ], where both exit-code and dial-number are phone-string. It supports complex dialing sequences including outside-line access digits, long-distance carrier codes, and access passwords.'
section: "2.1"
topics:
