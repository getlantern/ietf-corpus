summary: The tls12 feature is marked 'status deprecated' because TLS 1.2 (RFC 5246) is obsoleted by TLS 1.3 (RFC 8446) but remains in common use; its retention allows configuration while the deprecation status signals it is NOT RECOMMENDED to enable.
