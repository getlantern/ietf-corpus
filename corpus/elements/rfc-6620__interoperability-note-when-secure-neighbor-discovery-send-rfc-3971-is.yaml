document: rfc-6620
kind: interoperability-note
summary: When Secure Neighbor Discovery (SEND, RFC 3971) is deployed, FCFS SAVI is incompatible because the SAVI device must generate DAD_NS messages but lacks the host's private key required to sign them. SEND SAVI should be used instead of FCFS SAVI in SEND environments.
section: "4.4"
topics:
    - ip
    - security
    - crypto
