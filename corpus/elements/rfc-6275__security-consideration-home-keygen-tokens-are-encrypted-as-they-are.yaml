document: rfc-6275
kind: security-consideration
summary: Home keygen tokens are encrypted as they are tunneled from the home agent to the mobile node (Section 10.4.6), protecting them against passive on-path inspection. The Home Address option is restricted to packets where a valid binding cache entry exists, preventing it from being used to redirect arbitrary traffic.
section: "15.8"
topics:
