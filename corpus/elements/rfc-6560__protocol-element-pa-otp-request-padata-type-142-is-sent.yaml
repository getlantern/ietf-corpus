document: rfc-6560
kind: protocol-element
summary: PA-OTP-REQUEST (padata-type 142) is sent by the client to the KDC within the KrbFastReq padata of a PA-FX-FAST-REQUEST. It carries OTPFlags, optional client nonce (for hashed OTP), encData encrypted under the Client Key (containing either PA-OTP-ENC-REQUEST or PA-ENC-TS-ENC), optional hash algorithm and iteration count, and optional OTP metadata (value, PIN, challenge, time, counter, format, tokenID, algID, vendor).
section: "4.2"
topics:
