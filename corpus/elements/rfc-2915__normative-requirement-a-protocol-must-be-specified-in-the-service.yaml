document: rfc-2915
kind: normative-requirement
summary: A protocol MUST be specified in the Service field if the Flags field states the NAPTR is terminal. If a protocol is specified but the record is not terminal, the next lookup MUST be for a NAPTR record.
section: "2"
rfc2119_level: MUST
topics:
    - dns
