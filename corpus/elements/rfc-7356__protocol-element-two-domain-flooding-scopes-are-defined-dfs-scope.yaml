summary: 'Two domain flooding scopes are defined: DFS (scope 5, standard TLVs) and E-DFS (scope 68, extended TLVs). Both use the FS LSP ID Extended format and enable domain-wide flooding that preserves originator identity, avoiding the information loss inherent in inter-level leaking procedures.'
