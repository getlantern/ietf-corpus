document: rfc-9201
kind: protocol-element
summary: The req_cnf parameter is an OPTIONAL field in the client-to-AS token request that contains information about the key the client would like to bind to the access token for proof of possession. Values follow the syntax and semantics of the cnf claim from RFC 8747 (CBOR) or RFC 7800 (JSON).
section: "3.1"
topics:
