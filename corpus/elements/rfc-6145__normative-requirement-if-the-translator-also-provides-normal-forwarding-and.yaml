document: rfc-6145
kind: normative-requirement
summary: If the translator also provides normal forwarding and the destination IPv4 address is reachable by a more specific route without translation, the translator MUST forward it without translating. Otherwise, when addressed to an IPv4 destination in the IPv6 domain, the packet MUST be translated.
section: "4.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
