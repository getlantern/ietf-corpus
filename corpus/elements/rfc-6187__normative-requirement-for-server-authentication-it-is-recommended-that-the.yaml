document: rfc-6187
kind: normative-requirement
summary: For server authentication, it is RECOMMENDED that the subjectAlternativeName extension SHOULD convey the server host name using dNSName or iPAddress entries. DNS-ID checking SHOULD follow RFC 6125; DNS-ID MAY contain a wildcard '*' as the complete left-most label.
section: "4"
rfc2119_level: RECOMMENDED
