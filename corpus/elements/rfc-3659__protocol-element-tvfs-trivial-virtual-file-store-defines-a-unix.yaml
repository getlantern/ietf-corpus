summary: 'TVFS (Trivial Virtual File Store) defines a Unix-like hierarchical pathname structure for FTP servers: filenames may not contain ''/'', pathnames are built by joining names with ''/'', and a leading ''/'' denotes a fully qualified path from the unnamed root directory.'
