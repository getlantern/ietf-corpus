document: rfc-5063
kind: normative-requirement
summary: Each RecoveryPath-related Srefresh MESSAGE_ID LIST object MUST have the RecoveryPath Flag set (1). Path state updated after the restart (detected by matching Epoch in the latest Hello message) MUST NOT be included in such Srefresh messages.
section: 5.3.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
