document: rfc-2711
kind: security-consideration
summary: Gratuitous or malicious use of the Router Alert option can cause performance problems in routers. A severe attack involves flooding a router with bogus datagrams containing Router Alert options. Transit routers MAY rate-limit or otherwise restrict processing of this option to mitigate such attacks.
section: "4.0"
rfc2119_level: MAY
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
