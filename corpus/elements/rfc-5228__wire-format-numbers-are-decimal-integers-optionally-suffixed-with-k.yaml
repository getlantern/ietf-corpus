document: rfc-5228
kind: wire-format
summary: 'Numbers are decimal integers optionally suffixed with ''K'' (×1024), ''M'' (×1,048,576), or ''G'' (×1,073,741,824) as power-of-two multipliers. The grammar rule is: number = 1*DIGIT [ QUANTIFIER ], where QUANTIFIER = ''K'' / ''M'' / ''G''.'
section: 2.4.1
