document: rfc-4740
kind: protocol-element
summary: The Multimedia-Auth-Request (MAR) and Multimedia-Auth-Answer (MAA) commands use Command-Code 286. MAR requests authentication parameters for a SIP user; MAA returns authentication vectors in SIP-Auth-Data-Item AVPs, and MAY include Digest-HA1 to allow the SIP server to perform the final credential check locally without a second round-trip.
section: "8.7"
topics:
