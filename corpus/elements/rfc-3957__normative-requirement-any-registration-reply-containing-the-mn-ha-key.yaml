document: rfc-3957
kind: normative-requirement
summary: Any registration reply containing the MN-HA Key Generation Nonce From AAA extension MUST also contain a subsequent Mobile Home Authentication extension created using the generated MN-HA key; similarly, a reply with the MN-FA extension MUST contain a subsequent Mobile Foreign Authentication extension.
section: "3"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
