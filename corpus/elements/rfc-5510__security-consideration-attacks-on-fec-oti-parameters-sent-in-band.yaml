document: rfc-5510
kind: security-consideration
summary: 'Attacks on FEC OTI parameters (sent in-band via EXT_FTI/FDT or out-of-band) can prevent decoding or increase processing load. It is RECOMMENDED that FEC OTI integrity be protected: in-band parameters SHOULD be protected by digital signature, group MAC, or TESLA; FDT Instance SHOULD be digitally signed; out-of-band FEC OTI SHOULD be digitally signed.'
section: "9.3"
rfc2119_level: RECOMMENDED
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
