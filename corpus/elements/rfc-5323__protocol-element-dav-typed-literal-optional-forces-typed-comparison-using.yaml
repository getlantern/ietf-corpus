document: rfc-5323
kind: protocol-element
summary: DAV:typed-literal (optional) forces typed comparison using the xsi:type attribute from XML Schema. The server MUST reject an unknown type with 422 (Unprocessable Entity) and SHOULD reject if the value cannot be cast to the specified type. If the property value cannot be cast, the comparison evaluates to UNKNOWN.
section: "5.11"
topics:
    - http
