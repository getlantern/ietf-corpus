document: rfc-4055
kind: normative-requirement
summary: Conforming CAs and applications MUST support the RSAES-OAEP key transport algorithm using SHA-1; other hash functions MAY be supported. Compliant implementations MUST NOT use any value other than id-pSpecified for the pSourceFunc field.
section: "4"
rfc2119_level: MUST
topics:
