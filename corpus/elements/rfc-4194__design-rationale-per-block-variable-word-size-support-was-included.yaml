document: rfc-4194
kind: design-rationale
summary: Per-Block variable word_size support was included because embedded systems range from 8- and 16-bit processors to 64-bit and wider architectures. Specifying word size per block allows a single SHF Dump to represent data from heterogeneous memory regions with different native widths.
section: "3"
extracted_by: claude-sonnet-4-6
