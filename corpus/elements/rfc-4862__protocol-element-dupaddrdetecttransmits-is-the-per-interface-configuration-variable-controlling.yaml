document: rfc-4862
kind: protocol-element
summary: DupAddrDetectTransmits is the per-interface configuration variable controlling how many consecutive Neighbor Solicitations are sent during DAD. The default is 1; a value of 0 disables DAD. RetransTimer (from RFC 4861) governs the delay between consecutive solicitations.
section: "5.1"
topics:
    - ip
    - v6ops
