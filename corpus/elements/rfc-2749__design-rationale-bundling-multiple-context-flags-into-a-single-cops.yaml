document: rfc-2749
kind: design-rationale
summary: Bundling multiple context flags into a single COPS query is restricted to two unambiguous cases (Unicast FF and single-Resv multicast) to significantly optimize protocol operations while guaranteeing no semantic ambiguity. These two cases represent a substantial portion of expected COPS transactions.
