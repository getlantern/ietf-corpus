document: rfc-1905
kind: normative-requirement
summary: A compliant SNMPv2 entity acting in a manager role MUST be able to properly receive and handle a Response-PDU with error-status equal to noSuchName, badValue, or readOnly, which are legacy codes used for SNMPv1 proxy compatibility.
section: 4.2.4
rfc2119_level: MUST
