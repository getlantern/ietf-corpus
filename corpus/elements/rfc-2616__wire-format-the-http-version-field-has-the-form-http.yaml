document: rfc-2616
kind: wire-format
summary: The HTTP-Version field has the form 'HTTP' '/' 1*DIGIT '.' 1*DIGIT. Major and minor numbers MUST be treated as separate integers; leading zeros MUST be ignored by recipients and MUST NOT be sent.
