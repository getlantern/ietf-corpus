document: rfc-6811
kind: normative-requirement
summary: When a BGP speaker receives an UPDATE from a neighbor, it SHOULD perform a prefix-to-AS lookup for each Route in the UPDATE message. The lookup SHOULD also be applied to routes redistributed into BGP from another source, such as another protocol or a locally defined static route.
section: "2"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
