document: rfc-2575
kind: normative-requirement
summary: When selecting an entry from vacmAccessTable among multiple candidates, entries with a securityModel exactly matching the request take priority over 'any', entries with exact contextPrefix match take priority over prefix match, longer contextPrefixes take priority over shorter ones, and finally the entry with the highest securityLevel is selected.
section: "4"
rfc2119_level: SHOULD
topics:
    - snmp
    - security
