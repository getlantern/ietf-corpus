document: rfc-1903
kind: normative-requirement
summary: The agent must detect conceptual rows that have been in notInService or notReady state for an abnormally long period and remove them. In the absence of a DESCRIPTION-specified timeout, this period is suggested to be approximately 5 minutes.
section: "2"
rfc2119_level: MUST
topics:
    - snmp
