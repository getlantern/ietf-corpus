document: rfc-3380
kind: design-rationale
summary: The 'printer-xri-supported' collection attribute was created because 'printer-uri-supported', 'uri-authentication-supported', and 'uri-security-supported' are READ-ONLY in IPP/1.1 and cannot be set individually. The collection provides an atomic mechanism to update all three at once so they are never left in a partially inconsistent state.
section: "6.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
