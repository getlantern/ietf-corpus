document: rfc-3539
kind: normative-requirement
summary: Once three watchdog messages (DWAs) have been received in the REOPEN state, the connection is returned to service. Connection validation via receipt of multiple watchdogs is not required when a connection is initially brought up.
section: 3.4.1
rfc2119_level: MUST
