document: rfc-2712
kind: protocol-element
summary: Fourteen new TLS cipher suites are defined to support Kerberos-based authentication, with code points 0x001E through 0x002B. These include variants using DES-CBC, 3DES-EDE-CBC, RC4-128, and IDEA-CBC with SHA or MD5 MACs, plus six 40-bit export-grade suites.
