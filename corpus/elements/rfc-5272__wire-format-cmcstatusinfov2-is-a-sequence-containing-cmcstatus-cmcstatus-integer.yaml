kind: wire-format
summary: CMCStatusInfoV2 is a SEQUENCE containing cMCStatus (CMCStatus integer), bodyList (SEQUENCE SIZE(1..MAX) OF BodyPartReference), optional statusString (UTF8String), and optional otherInfo (CHOICE of failInfo/pendInfo/extendedFailInfo). BodyPartReference is a CHOICE of bodyPartID or bodyPartPath.
