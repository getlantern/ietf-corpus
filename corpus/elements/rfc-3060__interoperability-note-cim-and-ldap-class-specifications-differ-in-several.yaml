document: rfc-3060
kind: interoperability-note
summary: 'CIM and LDAP class specifications differ in several ways relevant to PCIM: CIM has only abstract/instantiable types (no auxiliary), uses property (not attribute) terminology, identifies classes and properties by name rather than OID, and scopes properties within their defining class rather than globally.'
section: "5.5"
