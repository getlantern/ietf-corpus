document: rfc-5401
kind: protocol-element
summary: The Group Round-Trip Timing (GRTT) is the sender's estimate of the worst-case round-trip time from a given sender to any receiver in the group. NACK suppression timeouts, repair aggregation periods, receiver hold-off timers, and sender command timing all scale as multiples of GRTT. The sender robustly advertises GRTT by embedding it in all pertinent transmitted messages.
section: "3.7"
topics:
    - multicast
