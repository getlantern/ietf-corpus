document: rfc-4754
kind: design-rationale
summary: For consistency with IKEv2, the document also defines IKE Phase 1 signatures using the same three named ECDSA variants (ECDSA-256, ECDSA-384, ECDSA-521), even though IKE has a generic ECDSA attribute (number 8). This avoids a divergence between how IKE and IKEv2 specify ECDSA.
