summary: 'CDS (Child DS) and CDNSKEY (Child DNSKEY) records signal three operations to the parent: (1) enable DNSSEC by publishing an initial DS RRset, (2) roll over the KSK, and (3) turn off DNSSEC by deleting all DS records.'
