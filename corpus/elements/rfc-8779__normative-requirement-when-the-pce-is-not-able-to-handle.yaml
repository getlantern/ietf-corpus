document: rfc-8779
kind: normative-requirement
summary: When the PCE is not able to handle different Bw Spec Types in the BANDWIDTH and LOAD-BALANCING objects, it MUST return a NO-PATH with the bit 'LOAD-BALANCING could not be performed with the bandwidth constraints' set in the NO-PATH-VECTOR TLV.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
