summary: The multi-octet announcement format (Length > 3) is used for the 'Digital Signature' (14) authentication method. It contains Length, Auth Method, Cert Link, and a variable-length DER-encoded ASN.1 AlgorithmIdentifier identifying the specific signature algorithm.
