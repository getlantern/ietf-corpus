summary: DOTS signal channel session configuration parameters include 'heartbeat-interval', 'missing-hb-allowed', and 'probing-rate', configurable separately for 'idle-config' and 'mitigating-config' states. DOTS agents MUST automatically switch configuration sets upon changes in mitigation activity.
