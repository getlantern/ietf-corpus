document: rfc-8545
kind: security-consideration
summary: A MITM attacker may attempt to modify OWAMP-Test/TWAMP-Test packet contents to alter measurement results. Implementations can use authenticated mode to detect data modification and encrypted mode to prevent eavesdropping and undetected modification.
