document: rfc-5150
kind: interoperability-note
summary: An e2e LSP traversing an S-LSP SHOULD record in the RRO an identifier corresponding to the S-LSP TE link; intermediate links or nodes traversed by the S-LSP itself SHOULD NOT be recorded in the RRO for the e2e LSP over the S-LSP hop.
section: 5.1.3
topics:
    - mpls
    - routing
