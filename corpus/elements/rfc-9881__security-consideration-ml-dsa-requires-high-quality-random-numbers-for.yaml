document: rfc-9881
kind: security-consideration
summary: ML-DSA requires high-quality random numbers for key generation; use of inadequate PRNGs can allow efficient private key recovery. Implementations must follow FIPS 204 Section 3.6.1 guidance for cryptographic random number generation.
