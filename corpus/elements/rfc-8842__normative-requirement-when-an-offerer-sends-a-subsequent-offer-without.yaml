document: rfc-8842
kind: normative-requirement
summary: When an offerer sends a subsequent offer without wanting a new DTLS association, it MUST insert the previously assigned 'tls-id' value, an 'actpass' setup attribute, and fingerprint attributes that do not change the previously sent fingerprint set.
section: "5.5"
rfc2119_level: MUST
topics:
