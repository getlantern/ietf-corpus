document: rfc-5035
kind: normative-requirement
summary: Applications SHOULD recognize both SigningCertificate and SigningCertificateV2 attributes as long as SHA-1 is considered sufficient to distinguish between two different certificates. If both attributes exist in a single message, they are independently evaluated.
section: "2"
rfc2119_level: SHOULD
