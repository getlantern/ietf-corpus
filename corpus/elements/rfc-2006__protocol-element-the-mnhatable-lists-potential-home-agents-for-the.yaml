summary: The mnHATable lists potential home agents for the mobile node, with each entry containing the HA IP address (mnHAAddress), a flag indicating whether it is the current HA (mnCurrentHA), and a RowStatus (mnHAStatus) — setting status to 'destroy' causes the MN to deregister from that HA.
