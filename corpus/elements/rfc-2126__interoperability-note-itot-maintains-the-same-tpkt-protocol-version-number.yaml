document: rfc-2126
kind: interoperability-note
summary: ITOT maintains the same TPKT protocol version number (3) as RFC1006 to ensure that existing RFC1006 implementations which mandate version 3 can interoperate with ITOT. The reserved field in the TPKT header should be ignored on input to avoid interoperability issues with RFC1006.
section: "7"
