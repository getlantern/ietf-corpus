document: rfc-8168
kind: normative-requirement
summary: If a Solicit includes a specific prefix value that is unavailable but also includes a prefix-length hint in the same IA_PD, the server SHOULD check its pool for a prefix matching the hint length; if still unavailable, the server SHOULD provide the prefix whose length is shorter and closest to the hint.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
