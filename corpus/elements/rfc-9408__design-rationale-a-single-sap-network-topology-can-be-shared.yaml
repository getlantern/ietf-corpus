document: rfc-9408
kind: design-rationale
summary: A single SAP network topology can be shared across multiple service types (L3VPN, EVPN, network slice, SD-WAN, etc.) rather than requiring per-service topologies. Whether a SAP topology is dedicated to a specific service type or shared is deployment-specific; the model supports all schemes.
