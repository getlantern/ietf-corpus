document: rfc-2592
kind: design-rationale
summary: Script results (smRunResult) are accessible asynchronously after script termination via the smRunTable history, enabling offline operation where the invoker collects results at a later point. The smRunExpireTime countdown controls how long completed entries are retained before aging out.
