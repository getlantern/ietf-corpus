document: rfc-6544
kind: normative-requirement
summary: If the default candidate is TCP-based, the agent MUST include the a=setup and a=connection attributes from RFC 4145 in the SDP. If an agent is the answerer, the a=setup attribute MUST meet the constraints of RFC 4145 based on the value in the offer.
section: "4.5"
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
