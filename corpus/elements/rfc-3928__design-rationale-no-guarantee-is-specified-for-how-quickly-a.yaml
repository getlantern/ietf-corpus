document: rfc-3928
kind: design-rationale
summary: No guarantee is specified for how quickly a server must notify the client of changes during the persist phase, because any specific maximum delay would be impossible to meet in a distributed directory service. Server implementers are encouraged to minimize delay in practice.
section: "6.4"
topics:
    - ldap
