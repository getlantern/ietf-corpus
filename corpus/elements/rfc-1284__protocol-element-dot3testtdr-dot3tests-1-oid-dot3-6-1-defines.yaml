document: rfc-1284
kind: protocol-element
summary: dot3TestTdr (dot3Tests 1, OID dot3 6 1) defines the Time-domain Reflectometry test for ethernet-like interfaces. On completion the result (10 MHz tick interval to collision) is stored in dot3TestTdrValue, and the OID of that instance is stored in ifExtnsTestResult.
