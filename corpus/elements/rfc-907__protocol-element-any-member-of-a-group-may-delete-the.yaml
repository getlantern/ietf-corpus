document: rfc-907
kind: protocol-element
summary: Any member of a group may delete the group at any time (not only the creator), using the 48-bit key for authentication. A Leave operation is local (removes one host from membership), while Delete expunges all knowledge of the group from every SIMP in the network.
section: "6.2"
topics:
    - multicast
