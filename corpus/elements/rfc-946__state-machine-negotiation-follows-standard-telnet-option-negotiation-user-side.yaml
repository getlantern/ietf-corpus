document: rfc-946
kind: state-machine
summary: 'Negotiation follows standard Telnet option negotiation: user side initiates with WILL TTYLOC; server responds with DO TTYLOC to accept or DON''T TTYLOC to refuse. Alternatively, server may initiate with DO TTYLOC, and user responds with WILL TTYLOC followed by subnegotiation. Subnegotiation only occurs after mutual agreement.'
section: "5"
