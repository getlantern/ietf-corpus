document: rfc-2018
kind: normative-requirement
summary: The data sender MUST NOT discard unacknowledged data before it is acknowledged by the Acknowledgment Number field in the TCP header, since the receiver may later renege on SACKed data.
section: "8"
rfc2119_level: MUST NOT
