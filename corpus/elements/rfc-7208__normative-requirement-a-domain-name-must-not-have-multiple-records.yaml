document: rfc-7208
kind: normative-requirement
summary: A domain name MUST NOT have multiple records that would cause an authorization check to select more than one record. If more than one record is found after filtering for 'v=spf1', check_host() produces a 'permerror' result.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - email
    - dns
