document: rfc-7459
kind: protocol-element
summary: Absence of uncertainty information in a PIDF-LO does not mean the location is certain; uncertainty may simply be uncalculated or withheld. A Point shape implies either 0% confidence or infinite uncertainty, not a precise location.
section: "3.2"
