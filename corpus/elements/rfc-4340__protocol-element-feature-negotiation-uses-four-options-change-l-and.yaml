document: rfc-4340
kind: protocol-element
summary: 'Feature negotiation uses four options: Change L and Change R initiate negotiation; Confirm L and Confirm R complete it. ''L'' options are sent by the feature location; ''R'' options by the feature remote. Change options are retransmitted until a response is received; Confirm options need not be retransmitted.'
