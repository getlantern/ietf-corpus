document: rfc-5665
kind: protocol-element
summary: 'The initial First Come First Served netid assignments are: ''-'' (NC_NOPROTO), ''ticlts'' (NC_TICLTS, SVR4 connectionless loopback), ''ticots'' (NC_TICOTS, SVR4 connection-oriented loopback), and ''ticotsord'' (NC_TICOTSORD, SVR4 connection-oriented with orderly-release loopback). The SVR4 entries are exceptions to the 9–128 octet length rule.'
section: 5.1.1
