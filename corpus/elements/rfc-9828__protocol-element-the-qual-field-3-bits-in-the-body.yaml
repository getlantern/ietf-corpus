document: rfc-9828
kind: protocol-element
summary: 'The QUAL field (3 bits in the Body Packet Payload Header) identifies the lowest quality layer present in the payload: QUAL=0 means the payload can contribute to all quality layers; otherwise the payload contributes only to quality layer index QUAL or above. This allows intermediate systems or receivers to discard packets by quality layer without parsing the codestream.'
section: "5.4"
topics:
    - rtp
    - realtime
