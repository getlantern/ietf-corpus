document: rfc-7530
kind: interoperability-note
summary: The XDR description in companion document RFC 7531 is authoritative. Where RFC 7530 reproduces XDR constructs for explanatory purposes, any inconsistency between the two documents must be resolved in favor of RFC 7531. RFC 7530 and RFC 7531 together obsolete RFC 3530 without introducing over-the-wire protocol changes.
section: "1.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
