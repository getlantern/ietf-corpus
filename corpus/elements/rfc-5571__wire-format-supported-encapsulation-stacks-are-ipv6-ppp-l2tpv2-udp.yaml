summary: 'Supported encapsulation stacks are: IPv6/PPP/L2TPv2/UDP/IPv4, IPv4/PPP/L2TPv2/UDP/IPv6, IPv4/PPP/L2TPv2/UDP/IPv4, and IPv6/PPP/L2TPv2/UDP/IPv6. UDP encapsulation is always present regardless of NAT/NAPT because L2TPv2 has no autodetect.'
