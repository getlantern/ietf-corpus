document: rfc-9766
kind: protocol-element
summary: LAYOUT_WCC is a new NFSv4.2 operation (Operation 77) that allows a pNFS client to periodically report data file attributes to the metadata server, enabling the MDS to update its view of file metadata without issuing costly NFSv3 GETATTR calls to data servers.
section: "3"
