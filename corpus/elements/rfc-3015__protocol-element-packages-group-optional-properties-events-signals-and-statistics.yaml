document: rfc-3015
kind: protocol-element
summary: Packages group optional Properties, Events, Signals, and Statistics to accommodate widely differing Termination types. An MGC can audit a Termination to determine which Packages it realizes; identifiers within a Package are scoped to separate namespaces (PropertyIds, EventIds, SignalIds, StatisticsIds, ParameterIds).
section: 6.2.3
topics:
    - realtime
