document: rfc-2155
kind: wire-format
summary: SnaControlPointName encodes a fully qualified SNA CP name as a 3–17 byte OCTET STRING in NetId.CpName form, where each component is 1–8 uppercase ASCII alphanumeric characters with the first character a letter and no trailing blanks. Management stations must also accept the legacy characters '#', '@', '$' for backward compatibility.
section: "4"
