document: rfc-6535
kind: normative-requirement
summary: ICMPv4 and ICMPv6 messages MUST be translated as defined by SIIT (RFC 6145). In the network-layer alternative, the protocol translator MUST translate ICMPv6 to ICMPv4 and vice versa; in the socket API alternative, the socket API MUST handle these conversions.
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
