summary: 'Well-formedness constraints R1–R7 cover: minimum one byte per packet; max 1275-byte frame; Code 1 even payload; Code 2 valid length fields; Code 3 non-zero frame count and max 120 ms audio; Code 3 CBR divisibility; and Code 3 VBR sufficient header bytes plus frame lengths.'
