document: rfc-8471
kind: protocol-element
summary: The referred_token_binding is constructed by setting tokenbinding_type to referred_token_binding, tokenbindingid to the Token Binding ID used with the Relying Party, and computing the signature using the EKM of the TLS connection to the Identity Provider and the Token Binding key established with the Relying Party. This allows three-party Token Binding between User Agent, Identity Provider, and Relying Party.
section: "4.1"
topics:
    - tls
    - security
    - oauth
