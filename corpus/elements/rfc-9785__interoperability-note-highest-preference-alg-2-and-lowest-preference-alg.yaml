document: rfc-9785
kind: interoperability-note
summary: Highest-Preference (Alg 2) and Lowest-Preference (Alg 3) are treated as distinct, incompatible algorithms. If PEs in the same Ethernet Segment advertise different algorithms (e.g., one Alg 2 and one Alg 3), the election falls back to the default (RFC 7432) algorithm, not an intermediate result.
section: "4.1"
topics:
