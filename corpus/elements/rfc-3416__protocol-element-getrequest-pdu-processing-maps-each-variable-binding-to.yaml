document: rfc-3416
kind: protocol-element
summary: 'GetRequest-PDU processing maps each variable binding to one of three outcomes: (1) exact OID match returns the variable''s value; (2) no matching OID prefix returns noSuchObject; (3) matching prefix but no instance returns noSuchInstance. Any other failure returns genErr with the failing binding''s index.'
