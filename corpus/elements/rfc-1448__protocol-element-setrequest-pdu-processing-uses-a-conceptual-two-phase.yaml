document: rfc-1448
kind: protocol-element
summary: 'SetRequest-PDU processing uses a conceptual two-phase operation: first all variable bindings are validated (checks for noAccess, noCreation, notWritable, wrongType, wrongLength, wrongEncoding, wrongValue, inconsistentName, inconsistentValue, resourceUnavailable in that order), then if all validations succeed all assignments are made simultaneously.'
