document: rfc-2658
kind: security-consideration
summary: A receiver may be overloaded by receipt of too many packets. Network-layer authentication can discard packets from unwanted sources, but authentication overhead itself may be prohibitive. In multicast environments, future IGMP and multicast routing protocol extensions may allow source pruning.
section: "6"
topics:
    - rtp
    - security
    - multicast
    - realtime
