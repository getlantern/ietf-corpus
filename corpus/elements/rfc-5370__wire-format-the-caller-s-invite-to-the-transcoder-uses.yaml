document: rfc-5370
kind: wire-format
summary: 'The caller''s INVITE to the transcoder uses multipart/mixed content with two body parts: an SDP session description (application/sdp) and a URI-list (application/resource-lists+xml) with Content-Disposition of recipient-list. The Require header must include ''recipient-list-invite''.'
