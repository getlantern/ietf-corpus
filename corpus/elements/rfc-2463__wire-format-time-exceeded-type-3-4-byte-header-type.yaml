summary: 'Time Exceeded (Type=3): 4-byte header (Type, Code, Checksum) followed by a 4-byte Unused field (zero), then as much of the invoking packet as fits. Code 0 = hop limit exceeded in transit; Code 1 = fragment reassembly time exceeded.'
