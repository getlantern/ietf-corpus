document: rfc-4861
kind: protocol-element
summary: Redirect (ICMPv6 Type 137) is sent by routers to inform a host of a better first-hop for a destination. It contains a 128-bit Target Address (the better first hop or the destination itself when the destination is a neighbor) and a 128-bit Destination Address (the redirected destination).
section: "4.5"
topics:
