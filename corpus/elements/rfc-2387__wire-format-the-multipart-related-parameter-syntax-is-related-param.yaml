document: rfc-2387
kind: wire-format
summary: 'The Multipart/Related parameter syntax is: related-param := ['';'' ''start'' ''='' cid] ['';'' ''start-info'' ''='' (cid-list / value)] ['';'' ''type'' ''='' type ''/'' subtype], where cid is an RFC 822 msg-id and parameters are order-independent. Parameter values usually require quoting due to special characters.'
section: "3.4"
