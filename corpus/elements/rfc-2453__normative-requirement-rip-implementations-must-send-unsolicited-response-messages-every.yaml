document: rfc-2453
kind: normative-requirement
summary: RIP implementations MUST send unsolicited Response messages every 30 seconds and MUST prevent timer synchronization across routers, either by using a clock unaffected by system load or by randomizing the 30-second interval by ±0–5 seconds each time it is set.
section: "3.8"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
