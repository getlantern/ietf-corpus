document: rfc-8055
kind: interoperability-note
summary: The 'received-realm' mechanism is scoped entirely within a single operator's network; the operator identifier value's scope is only within the network that inserts it. Cross-network use is explicitly prohibited by the requirement to discard parameters received from outside the operator network.
section: "5.2"
topics:
    - sip
