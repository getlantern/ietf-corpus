document: rfc-9795
kind: normative-requirement
summary: Compact PASSporT form MUST NOT be used when an "rcdi" claim is required. Additionally, "jcl" and "jcd" MUST NOT appear in compact form PASSporTs because integrity and URI-reference rules create constraints that are too restrictive.
section: "9.2"
rfc2119_level: MUST NOT
