summary: In the label-stacking case, one or more instances of the basic SFC unit (SFC Context Label + SF Label) are stacked; the SFC Context Label carries the SPI and may also encode how to interpret the SF Label. The SF Label identifies the next SFI and comes from the range 16...2^20-1.
