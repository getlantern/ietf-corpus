document: rfc-8322
kind: registry
summary: The 'ROLIE Information Types' subregistry stores security automation information type values used as term attribute values in the information-type category scheme. Registration policy is Specification Required. Each entry records a Name (printable ASCII with embedded spaces), an IANA-assigned positive integer Index, and a Reference URI.
