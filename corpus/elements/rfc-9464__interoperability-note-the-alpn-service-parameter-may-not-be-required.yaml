document: rfc-9464
kind: interoperability-note
summary: The 'alpn' service parameter MAY not be required in contexts such as a variant of DNS over CoAP where messages are encrypted using OSCORE (RFC 8613), so the SHOULD requirement for including 'alpn' admits this exception.
