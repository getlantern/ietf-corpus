kind: protocol-element
summary: 'Three YANG notification types are defined: ''l2-node-event'', ''l2-link-event'', and ''l2-termination-point-event''. Each carries an event-type (addition=0, removal=1, update=2), a reference to the affected element, the l2-topology network type indicator, and the corresponding L2 attributes.'
