document: rfc-6876
kind: security-consideration
summary: Denial-of-service risks exist because a PT-TLS session requires resources on both sides. Implementations should be prepared for malformed or excessive messages from untrusted endpoints; the trust relationship model in Section 4.1 assumes clients do not intentionally send malicious traffic.
section: 4.2.4
topics:
    - security
