document: rfc-9140
kind: normative-requirement
summary: The 17-element JSON array inputs to Hoob and HMAC functions MUST be copied verbatim from sent/received in-band messages; JSON object members MUST NOT be reordered or reencoded, and white space MUST NOT be added. Nonces and MACs MUST be base64url encoded without padding when sent as JSON strings.
section: 3.3.2
rfc2119_level: MUST
topics:
    - security
    - crypto
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
