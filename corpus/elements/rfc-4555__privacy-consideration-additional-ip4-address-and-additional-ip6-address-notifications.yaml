document: rfc-4555
kind: privacy-consideration
summary: ADDITIONAL_IP4_ADDRESS and ADDITIONAL_IP6_ADDRESS notifications reveal all interface addresses of a peer, potentially disclosing network topology (e.g., corporate LAN address to a cellular peer), operator affiliation, or fine-grained physical location. Although these payloads are encrypted, any address later used for IKEv2/IPsec traffic becomes visible in the clear.
section: "5.5"
topics:
    - ipsec
    - privacy
    - vpn
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
