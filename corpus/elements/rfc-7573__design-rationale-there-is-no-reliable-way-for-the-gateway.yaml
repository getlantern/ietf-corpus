document: rfc-7573
kind: design-rationale
summary: There is no reliable way for the gateway to determine whether the remote SIP user's client supports MSRP; if MSRP is not supported, the SIP INVITE initiated on behalf of the XMPP user may result in an error. This is an inherent limitation of the bridging approach.
section: "4"
topics:
