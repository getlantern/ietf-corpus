document: rfc-9953
kind: security-consideration
summary: A DoC client may delegate DNSSEC validation to its DoC server due to code size or response size constraints. The trust mechanism for this delegation (e.g., a specific credential recognizing an eligible DoC server) is out of scope for this document.
