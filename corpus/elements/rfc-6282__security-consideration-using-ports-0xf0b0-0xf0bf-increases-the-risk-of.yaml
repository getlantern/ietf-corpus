document: rfc-6282
kind: security-consideration
summary: Using ports 0xf0b0–0xf0bf increases the risk of delivering the wrong payload type or misinterpreting content because 16 applications may share the same compressed port value. It is recommended to protect these communications with a TLS/MIC integrity mechanism.
section: "6"
topics:
    - security
    - udp
