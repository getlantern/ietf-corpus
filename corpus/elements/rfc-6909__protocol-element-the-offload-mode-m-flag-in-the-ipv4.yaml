document: rfc-6909
kind: protocol-element
summary: 'The Offload Mode (M) flag in the IPv4 Traffic Offload Selector option controls offload direction: M=0 means flows matching the traffic selectors are offloaded (all others tunneled to LMA); M=1 means flows matching the selectors are tunneled to LMA (all others offloaded).'
section: "3.1"
