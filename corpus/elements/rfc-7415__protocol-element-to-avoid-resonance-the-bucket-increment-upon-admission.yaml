document: rfc-7415
kind: protocol-element
summary: To avoid resonance, the bucket increment upon admission is randomized to T + uT where u is uniform on [-1/2, +1/2] when the bucket empties (X'<=0), and u=0 otherwise. At control activation, the initial counter is set to TAU0 + uT instead of TAU0.
section: 3.5.3
topics:
