document: rfc-5023
kind: normative-requirement
summary: 'When a server accepts a POST of a non-Atom Media Resource, it MUST create two new Resources: the Media Resource corresponding to the POSTed entity, and an associated Media Link Entry. Successful responses MUST include the URI of the Media Link Entry in the Location header.'
section: "9.6"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
