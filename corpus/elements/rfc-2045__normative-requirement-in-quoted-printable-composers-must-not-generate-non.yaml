document: rfc-2045
kind: normative-requirement
summary: In Quoted-Printable, composers MUST NOT generate non-zero length transport padding (trailing LWSP before CRLF on encoded lines), but receivers MUST be able to handle such padding added by message transports.
section: "6.7"
rfc2119_level: MUST
