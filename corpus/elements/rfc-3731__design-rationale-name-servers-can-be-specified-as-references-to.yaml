document: rfc-3731
kind: design-rationale
summary: Name servers can be specified as references to existing host objects or as inline domain attributes describing a host machine. This dual approach exists to support registries that do and do not implement the EPP host object mapping, but a server MUST choose one form and use it consistently.
section: "1.1"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
