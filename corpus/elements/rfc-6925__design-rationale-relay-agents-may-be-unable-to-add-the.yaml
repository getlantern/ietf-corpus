document: rfc-6925
kind: design-rationale
summary: Relay agents may be unable to add the Relay Agent Information option to all message types (e.g., IP-unicast RENEW messages). Deployments must either accept server-side persistence of the last-seen relay identifier or use the Server Identifier Override sub-option (RFC 5107) to permit insertion into all relayed messages.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
