document: rfc-5230
kind: normative-requirement
summary: When distinct vacation responses (distinguished by :handle or by differing argument combinations) are triggered for the same sender, separate replies MUST be sent for each. This behavior is REQUIRED to allow context-specific notifications.
section: "4.2"
rfc2119_level: REQUIRED
topics:
    - email
