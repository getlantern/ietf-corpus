document: rfc-3520
kind: normative-requirement
summary: Replay attacks MUST be prevented. In the non-associated model, AUTH_SESSION MUST include a START_TIME field and Policy Servers MUST support NTP for clock synchronization. In other models, SESSION_ID MUST be used to correlate requests with authorized sessions.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - ntp
