document: rfc-3728
kind: protocol-element
summary: vdslPerfIntervalTable stores up to 96 historical 15-minute interval buckets per Vtu (interval 1 = most recent; interval 96 = 24 hours ago); intervals 2–96 are optional. Each bucket uses HCPerfIntervalCount for Lofs, Loss, Lprs, Lols, ESs, SESs, UASs, and Inits.
