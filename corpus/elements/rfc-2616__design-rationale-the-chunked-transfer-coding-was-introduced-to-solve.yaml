document: rfc-2616
kind: design-rationale
summary: The chunked transfer-coding was introduced to solve the HTTP/1.0 problem of needing to know content-length before sending a body, which prevented dynamically generated content from using persistent connections. It also enables the server to include trailer metadata after the body.
section: 3.6.1
topics:
    - http
