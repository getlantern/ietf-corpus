document: rfc-9668
kind: interoperability-note
summary: 'The EDHOC + OSCORE combined workflow requires Block-wise transfer awareness: the EDHOC option must only appear in the first block, and if COMB_PAYLOAD exceeds MAX_UNFRAGMENTED_SIZE the client must fall back to the sequential workflow. The performance advantage of the optimization can be lost under certain Block-wise parameter values.'
section: 3.2.2
topics:
    - security
