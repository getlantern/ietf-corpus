document: rfc-6891
kind: design-rationale
summary: A starting EDNS UDP payload size of 4096 octets is recommended as a good compromise. Even on stacks capable of reassembling 64 KB datagrams, advertising the architectural limit is not recommended due to memory usage concerns at low system levels.
section: 6.2.5
topics:
    - dns
    - udp
