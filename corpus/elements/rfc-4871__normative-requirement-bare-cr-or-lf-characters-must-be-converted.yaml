document: rfc-4871
kind: normative-requirement
summary: Bare CR or LF characters MUST be converted to CRLF before signing. All modifications to canonical RFC 2822 form MUST be done before signing; the signer MUST sign the message as it is expected to be received by the verifier.
section: "5.3"
rfc2119_level: MUST
topics:
