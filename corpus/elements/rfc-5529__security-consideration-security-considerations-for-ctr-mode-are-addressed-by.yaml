summary: Security considerations for CTR mode are addressed by reference to Section 9 of RFC 3686 (AES-CTR with IPsec ESP), and for CCM mode by reference to Section 7 of RFC 4309 (AES-CCM with IPsec ESP). No independent security analysis is provided beyond those references.
