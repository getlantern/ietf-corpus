document: rfc-6551
kind: normative-requirement
summary: It is RECOMMENDED for RPL implementations to use multi-threshold algorithms to determine when metric updates should be sent, and to use low-pass filtering and hysteresis when practical. It is RECOMMENDED to carefully design the route optimization algorithm to avoid too-frequent computation of new routes upon metric value changes.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - routing
