document: rfc-6946
kind: protocol-element
summary: IPv6 atomic fragments are IPv6 packets that contain a Fragment Header with the Fragment Offset set to 0 and the M flag set to 0. They are not actually fragmented into multiple pieces but carry Fragment Header metadata used by IPv6/IPv4 translators.
