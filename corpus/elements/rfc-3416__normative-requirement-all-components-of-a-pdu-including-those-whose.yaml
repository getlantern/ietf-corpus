document: rfc-3416
kind: normative-requirement
summary: All components of a PDU, including those whose values are ignored by the receiving entity, must have valid ASN.1 syntax and encoding. The unSpecified NULL value is defined for use as the value portion of variable bindings in retrieval requests where the value is not relevant.
section: "4.2"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
