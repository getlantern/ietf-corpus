document: rfc-5807
kind: normative-requirement
summary: When distributing a PEMK from the PAA to a separate EP device, the key distribution protocol MUST ensure the PEMK is encrypted and both integrity and replay protected, using a security association between the PAA and EP.
section: "4.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
