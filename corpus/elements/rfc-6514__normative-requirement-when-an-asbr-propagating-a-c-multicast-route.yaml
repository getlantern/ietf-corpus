document: rfc-6514
kind: normative-requirement
summary: When an ASBR propagating a C-multicast route already has a route with the same MCAST-VPN NLRI, it SHALL NOT re-advertise the newly received route. Withdrawals are likewise suppressed if another route with the same NLRI remains.
section: "11.2"
rfc2119_level: MUST NOT
topics:
    - bgp
    - multicast
    - vpn
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
