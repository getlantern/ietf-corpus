document: rfc-6736
kind: protocol-element
summary: The NAT-Control-Answer (NCA) command (Command Code 330, 'R' bit cleared) is returned by the NAT device in response to an NCR. It carries Result-Code, zero or more NAT-Control-Definition AVPs reporting active bindings, Current-NAT-Bindings, and Duplicate-Session-Id on SESSION_EXISTS errors.
section: "6.2"
