document: rfc-7463
kind: normative-requirement
summary: During a transfer where the UA is the transferee, if a PUBLISH is sent to reassign the appearance number from the old dialog to the new one, that PUBLISH MUST be sent prior to sending the BYE to avoid a race condition where the Appearance Agent prematurely releases the appearance.
section: 5.3.3
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
