summary: 'The Identity header carries a base64-encoded signed digest: `Identity = "Identity" HCOLON signed-identity-digest` where `signed-identity-digest = LDQUOT 32LHEX RDQUOT`. The Identity-Info header carries `LAQUOT absoluteURI RAQUOT` followed by optional parameters including a mandatory `alg` token.'
