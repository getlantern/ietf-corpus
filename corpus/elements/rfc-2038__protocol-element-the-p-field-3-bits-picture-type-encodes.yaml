document: rfc-2038
kind: protocol-element
summary: 'The P field (3 bits, Picture-Type) encodes the MPEG picture type: I=1, P=2, B=3, D=4; value 000b is forbidden and 101b–111b are reserved. FBV, BFC (backward motion vector fields) are zero for I and P frames; FFV, FFC (forward motion vector fields) are zero for I frames only. All four fields are constant per picture across all RTP packets.'
section: "3.4"
topics:
