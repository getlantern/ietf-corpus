document: rfc-8166
kind: normative-requirement
summary: On a newly established connection, a Requester MUST NOT assume more than one credit is available and MUST receive a valid reply carrying the actual granted credit count before sending its next request. Each implementation MUST support inline thresholds of at least 1024 bytes.
section: 3.3.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
