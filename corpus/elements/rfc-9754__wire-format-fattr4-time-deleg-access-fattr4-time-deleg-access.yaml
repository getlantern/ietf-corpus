summary: fattr4_time_deleg_access (FATTR4_TIME_DELEG_ACCESS = 84) and fattr4_time_deleg_modify (FATTR4_TIME_DELEG_MODIFY = 85) are both encoded as nfstime4. Two new delegation types OPEN_DELEGATE_READ_ATTRS_DELEG = 4 and OPEN_DELEGATE_WRITE_ATTRS_DELEG = 5 are added to the open_delegation_type4 enum.
