document: rfc-4945
kind: normative-requirement
summary: For IKEv2, implementations MUST NOT assume that any CERT beyond the first is ordered in any way. IKEv2 specifies that the first CERT contain an end-entity certificate that can be used to authenticate the peer.
section: 4.3.3
rfc2119_level: MUST NOT
topics:
