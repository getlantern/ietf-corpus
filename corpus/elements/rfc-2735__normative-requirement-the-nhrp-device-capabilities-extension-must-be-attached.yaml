document: rfc-2735
kind: normative-requirement
summary: The NHRP Device Capabilities extension MUST be attached to all NHRP Resolution Requests generated by a VPN-aware source NHRP entity, with the compulsory bit set to zero so non-VPN-aware NHS may safely ignore it.
