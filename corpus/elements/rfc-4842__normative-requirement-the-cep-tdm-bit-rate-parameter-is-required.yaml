document: rfc-4842
kind: normative-requirement
summary: The CEP/TDM Bit Rate parameter is REQUIRED and MUST be set to the uncompressed payload data rate in 64-Kbps units (e.g., 26 for VT1.5/VC-11, 35 for VT2/VC-12, 783*N for STS-Nc). Attempts to establish a pseudowire between peers with different bit rates MUST be rejected with an incompatible bit rate status error code.
section: "12.2"
rfc2119_level: MUST
topics:
    - mpls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
