document: rfc-7256
kind: security-consideration
summary: The multicast extensions inherit the ANCP security model from RFC 6320; unauthorized access to multicast replication control could allow an attacker to replicate traffic to unauthorized subscribers or exhaust admission control resources. Section 8 specifies that the TCP-based transport with MD5 or IPsec authentication defined in RFC 6320 applies.
section: "8"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
