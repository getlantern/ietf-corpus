document: rfc-9303
kind: normative-requirement
summary: The HMAC scope for EID-AD integrity MUST cover the entire EID-AD from the 'EID-AD Length' field to the 'EID HMAC' field (set to 0 before computation); the HMAC scope for PKT-AD MUST cover the entire Map-Reply with 'PKT HMAC' set to 0 before computation.
section: 6.7.1
rfc2119_level: MUST
topics:
