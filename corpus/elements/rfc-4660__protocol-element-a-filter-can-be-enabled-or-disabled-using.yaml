document: rfc-4660
kind: protocol-element
summary: A filter can be enabled or disabled using the 'enabled' attribute on the <filter> element. When disabled ('enabled'='false'), the filter is treated as absent; re-enabling causes the notifier to behave as if the filter was just placed.
section: 3.3.3
topics:
    - sip
    - realtime
