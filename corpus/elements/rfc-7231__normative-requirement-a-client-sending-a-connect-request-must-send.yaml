document: rfc-7231
kind: normative-requirement
summary: A client sending a CONNECT request MUST send the authority form of request-target (host:port only). Proxies that support CONNECT SHOULD restrict its use to a limited set of known ports or a configurable whitelist of safe targets.
section: 4.3.6
rfc2119_level: MUST
topics:
    - http
