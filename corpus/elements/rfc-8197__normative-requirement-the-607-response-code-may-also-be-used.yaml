document: rfc-8197
kind: normative-requirement
summary: The 607 response code MAY also be used as the value of the 'cause' parameter of a SIP reason-value in a Reason header field, typically when the called party UA issues a BYE request or a forking proxy issues a CANCEL after receiving a 607 response from one branch.
