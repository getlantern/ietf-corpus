document: rfc-2384
kind: security-consideration
summary: Many email clients store the plain text password for later use after logging into a POP server. Such clients MUST NOT use a stored password in response to a POP URL without explicit permission from the user to supply that password to the specified host name.
section: "9"
rfc2119_level: MUST NOT
topics:
    - email
    - security
