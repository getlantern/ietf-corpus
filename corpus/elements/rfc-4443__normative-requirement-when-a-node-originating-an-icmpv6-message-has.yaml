document: rfc-4443
kind: normative-requirement
summary: 'When a node originating an ICMPv6 message has more than one unicast address, it MUST choose the source address as follows: if the message is a response to a packet sent to one of the node''s unicast addresses, the source address of the reply MUST be that same address; otherwise it MUST be a unicast address belonging to the node.'
section: "2.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
