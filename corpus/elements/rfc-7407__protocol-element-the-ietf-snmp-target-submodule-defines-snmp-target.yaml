summary: The ietf-snmp-target submodule defines /snmp/target (keyed by name, with transport choice, tag leaf-list, timeout in centiseconds, retries, and target-params reference) and /snmp/target-params (keyed by name, with an open 'params' choice augmented by security-model-specific submodules). Entries correspond 1-1 to snmpTargetAddrEntry and snmpTargetParamsEntry.
