document: rfc-3977
kind: privacy-consideration
summary: NNTP servers accumulate log data including client IP addresses, newsgroup subscription patterns, and article content that may reveal personal information. Server operators must be aware that log data and server-stored article data can expose users' reading interests and personal details.
section: "12.1"
topics:
    - privacy
