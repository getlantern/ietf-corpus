summary: The t11NsRejectTable records the most recent Name Server Registration Request failure per port per Fabric, holding the raw CT_IU content (up to 255 bytes), the FC-GS-4 reject reason code, reason code explanation, and vendor-specific code. Values are updated immediately before generating a t11NsRejectRegNotify notification.
