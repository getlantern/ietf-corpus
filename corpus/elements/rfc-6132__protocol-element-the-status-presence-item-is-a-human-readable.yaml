document: rfc-6132
kind: protocol-element
summary: The 'status' presence item is a human-readable, free-form description of the user's availability in natural language with no formal value definition. It is intended for extraction into a variable for use elsewhere rather than direct machine comparison; if the value cannot be determined, leaving it as an empty string is recommended.
