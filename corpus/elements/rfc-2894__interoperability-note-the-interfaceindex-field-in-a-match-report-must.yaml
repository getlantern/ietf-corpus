document: rfc-2894
kind: interoperability-note
summary: The InterfaceIndex field in a Match Report MUST be the same as the value of ipv6IfIndex that designates that interface in the SNMP IPv6 MIB General Group (RFC 2466), ensuring that management stations can correlate RR results with MIB data.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - snmp
