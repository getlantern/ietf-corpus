document: rfc-3315
kind: security-consideration
summary: Messages between relay agents and servers traverse potentially insecure infrastructure; they SHOULD be protected using IPsec with ESP in transport mode, providing both authentication and confidentiality. Shared authentication keys between relay agents and servers are recommended where IPsec is not feasible.
section: "21.1"
topics:
    - security
    - ip
    - ipsec
