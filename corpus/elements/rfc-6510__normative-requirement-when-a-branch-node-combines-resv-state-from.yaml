document: rfc-6510
kind: normative-requirement
summary: When a branch node combines Resv state from multiple receivers and an LSP_ATTRIBUTES object is present before the first S2L_SUB_LSP object in a received Resv message, the received LSP_ATTRIBUTES object SHOULD be moved to follow the first received S2L_SUB_LSP object and SHOULD be duplicated for, and placed after, each subsequent S2L_SUB_LSP object.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
