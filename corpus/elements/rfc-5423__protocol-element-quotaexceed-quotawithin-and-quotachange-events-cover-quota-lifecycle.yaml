document: rfc-5423
kind: protocol-element
summary: 'QuotaExceed, QuotaWithin, and QuotaChange events cover quota lifecycle: QuotaExceed fires when an operation fails because a quota (disk, message count, etc.) was exceeded; QuotaWithin fires when usage drops below the limit; QuotaChange fires when the quota itself is modified.'
section: "4.1"
