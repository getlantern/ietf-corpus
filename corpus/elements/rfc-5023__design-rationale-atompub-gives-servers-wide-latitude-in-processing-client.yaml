document: rfc-5023
kind: design-rationale
summary: AtomPub gives servers wide latitude in processing client requests. Servers can accept, reject, delay, moderate, censor, reformat, translate, relocate, or re-categorize submitted content, and clients must be written flexibly to accept whatever the server decides are the results of its submissions.
section: "4.4"
topics:
