document: rfc-6333
kind: wire-format
summary: Each entry in the AFTR's extended NAT binding table has the form {Softwire-Id (IPv6 address of the B4), inner IPv4 source address, protocol, port} mapped to {public IPv4 address, protocol, port}. The Softwire-Id field disambiguates customers sharing overlapping RFC 1918 space and is used to reconstruct the IPv6 encapsulation for return traffic.
section: "6.6"
topics:
    - nat
    - ip
    - v6ops
