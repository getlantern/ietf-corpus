document: rfc-6860
kind: design-rationale
summary: In OSPFv2, hiding means prefixes are not installed in routing tables, but IPv4 addresses may still be visible in Router-LSA links and network-LSA Link-State IDs. In OSPFv3, router-LSAs and network-LSAs contain no IPv6 addresses, so addresses are fully hidden.
section: "1"
topics:
