summary: 'The marsVcCtrlType object classifies MARS-side VCs into: pointToPointVC(1) for bidirectional registration from clients and MCS, clusterControlVC(2) for asynchronous updates to ATM clients, and serverControlVC(3) for asynchronous updates to MCS instances (present only when at least one MCS is in use).'
