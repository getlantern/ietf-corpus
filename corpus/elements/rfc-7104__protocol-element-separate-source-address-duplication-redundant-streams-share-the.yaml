document: rfc-7104
kind: protocol-element
summary: 'Separate source address duplication: redundant streams share the same IP destination address but originate from different source addresses, requiring the receiver to join both SSM sessions separately. Demonstrated with ''a=ssrc-group:DUP 1000 1010''.'
