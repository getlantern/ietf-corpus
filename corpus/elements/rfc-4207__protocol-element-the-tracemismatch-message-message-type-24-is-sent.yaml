document: rfc-4207
kind: protocol-element
summary: The TraceMismatch message (Message Type 24) is sent over the control channel to report a trace mismatch on a data link for which trace monitoring was requested. It carries one or more LOCAL_INTERFACE_ID objects identifying the mismatched links.
