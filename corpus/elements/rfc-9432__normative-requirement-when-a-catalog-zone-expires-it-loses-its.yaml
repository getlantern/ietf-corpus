document: rfc-9432
kind: normative-requirement
summary: When a catalog zone expires it loses its catalog meaning and MUST no longer be processed as such. No special processing of member zones occurs until the zone becomes fresh again.
section: "5.1"
rfc2119_level: MUST
topics:
    - dns
