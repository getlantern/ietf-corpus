document: rfc-6435
kind: normative-requirement
summary: When a MEP receives an Unlock command from a management process, it MUST cease sending LI messages. However, if the MEP is still receiving LI messages from the remote peer, the transport path MUST remain out of service until LI messages also stop.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
