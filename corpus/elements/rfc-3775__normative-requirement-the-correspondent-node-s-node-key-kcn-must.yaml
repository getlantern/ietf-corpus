document: rfc-3775
kind: normative-requirement
summary: The correspondent node's node key (Kcn) MUST be a random number exactly 20 octets in length and MUST NOT be shared with any other entity. It is used to produce keygen tokens for the return routability procedure.
section: 5.2.1
rfc2119_level: MUST
topics:
