document: rfc-6946
kind: protocol-element
summary: Fragment reassembly matching uses the tuple {IPv6 Source Address, IPv6 Destination Address, Fragment Identification}. Under the updated rules, atomic fragments (Fragment Offset=0, M=0) must never be matched against or interfere with entries in the reassembly queue sharing this tuple.
section: "1"
topics:
