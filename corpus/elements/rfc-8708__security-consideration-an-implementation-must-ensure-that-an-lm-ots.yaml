document: rfc-8708
kind: security-consideration
summary: An implementation MUST ensure that an LM-OTS private key is used to generate a signature only one time and cannot be used for any other purpose. Reuse of an LM-OTS key compromises the security of the hash-based signature scheme.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
