document: rfc-9329
kind: security-consideration
summary: Because TCP Responders must accept IKE and ESP messages arriving on new TCP connections from changed source addresses and ports, the validation of such messages must include decryption, authentication, and replay checks to prevent an attacker from influencing packet routing paths.
