document: rfc-2333
kind: design-rationale
summary: NHRP is designed for unicast (single-destination) IP packet delivery and is not intended for direct use in point-to-multipoint communication. Elements of NHRP may be used in certain multicast scenarios for short-cut routing, but scalability in multicast environments is described as an open issue.
section: "3"
topics:
