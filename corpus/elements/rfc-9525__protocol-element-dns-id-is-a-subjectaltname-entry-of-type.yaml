document: rfc-9525
kind: protocol-element
summary: 'DNS-ID is a subjectAltName entry of type dNSName as defined in PKIX. It is a direct and unrestricted identifier type: direct because provided directly by a user, unrestricted because it can be used for any type of service. It is the baseline identifier for interoperability.'
