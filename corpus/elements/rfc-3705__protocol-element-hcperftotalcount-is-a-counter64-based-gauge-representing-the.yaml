document: rfc-3705
kind: protocol-element
summary: HCPerfTotalCount is a Counter64-based gauge representing the aggregate of all previous valid 15-minute intervals; intervals with no valid data are excluded. Value saturates at 2^64-1 and may decrease if a retroactive adjustment causes the underlying count to fall below that ceiling.
