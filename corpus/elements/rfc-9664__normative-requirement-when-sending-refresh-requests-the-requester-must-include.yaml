document: rfc-9664
kind: normative-requirement
summary: When sending Refresh Requests, the Requester MUST include an Update Lease option. The Requester MUST use the lease durations returned by the server in the Lease Update Response when determining when to send the next Refresh Request.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
