document: rfc-9088
kind: security-consideration
summary: Incorrectly setting the E-Flag during origination, propagation, or redistribution may lead to poor or no load-balancing of MPLS traffic, or to MPLS traffic being discarded on the egress node. Incorrectly setting the ERLD value may similarly lead to poor or no load-balancing.
section: "7"
topics:
    - security
    - routing
    - mpls
