document: rfc-3970
kind: security-consideration
summary: Unauthorized modification of teAdminGroupTable, teTunnelTable, tePathTable, or tePathHopTable can cause tunnel flapping, rerouting, or traffic disruption. Changing teAdminGroupTable specifically alters the semantics of include/exclude constraints, causing traffic to follow unintended routes.
