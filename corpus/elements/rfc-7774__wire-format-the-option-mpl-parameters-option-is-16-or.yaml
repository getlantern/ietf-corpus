document: rfc-7774
kind: wire-format
summary: 'The OPTION_MPL_PARAMETERS option is 16 or 32 octets. The 16-octet form contains: 1-bit P flag (PROACTIVE_FORWARDING), 7-bit reserved Z, 8-bit TUNIT, 16-bit SE_LIFETIME, 8-bit DM_K, 16-bit DM_IMIN, 8-bit DM_IMAX, 16-bit DM_T_EXP, 8-bit C_K, 16-bit C_IMIN, 8-bit C_IMAX, 16-bit C_T_EXP. The optional 32-octet form appends a 128-bit MPL Domain Address.'
section: "2.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
