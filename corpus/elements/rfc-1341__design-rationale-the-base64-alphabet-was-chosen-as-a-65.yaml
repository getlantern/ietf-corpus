document: rfc-1341
kind: design-rationale
summary: The Base64 alphabet was chosen as a 65-character subset of US-ASCII because it is represented identically in all versions of ISO 646 and all versions of EBCDIC, meeting the portability requirement for a binary mail transport encoding. Other encodings such as uuencode and base85 do not share this property.
section: "5.2"
