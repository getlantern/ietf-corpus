document: rfc-4360
kind: registry
summary: IANA created the 'BGP Extended Communities Type' registry for 8-bit (regular) and 16-bit (extended) Type values. Transitive regular types 0x00–0x3f and extended types 0x0000–0x3fff use First Come First Served; 0x90–0xbf (regular) and 0x9000–0xbfff (extended) use Standards Action or Early IANA Allocation. Values 0x80–0x8f, 0xc0–0xcf, 0x8000–0x8fff, 0xc000–0xcfff are reserved for Experimental use.
section: "7"
topics:
