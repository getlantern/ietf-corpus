document: rfc-3075
kind: design-rationale
summary: 'KeyInfo is placed outside SignedInfo and is optional: first, signers may not want to reveal key information to all document processors; second, the key may be known from application context. If the signer wants to bind KeyInfo to the signature, it can be included via a Reference.'
section: "2.1"
topics:
    - security
    - crypto
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
