document: rfc-3852
kind: normative-requirement
summary: Implementations MUST support key transport (ktri), key agreement (kari), and previously distributed symmetric key-encryption keys (kekri). Password-based (pwri) and other (ori) alternatives MAY be supported. All implementations MUST gracefully handle unimplemented RecipientInfo alternatives and versions.
section: "6.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
