document: rfc-8931
kind: registry
summary: 'This document allocates four dispatch values from the ''6LoWPAN Dispatch Type Field'' registry (created by RFC 4944, reformatted by RFC 8025): bit pattern 11 10100x on Page 0 for RFRAG (Recoverable Fragment), and bit pattern 11 10101x on Page 0 for RFRAG-ACK (RFRAG Acknowledgment). Pages 1–14 for both patterns are Unassigned; Page 15 is Reserved for Experimental Use per RFC 8025.'
