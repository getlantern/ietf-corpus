document: rfc-1939
kind: normative-requirement
summary: A POP3 server MAY implement an inactivity autologout timer, but such a timer MUST be at least 10 minutes in duration. Upon expiry the server closes the TCP connection without entering the UPDATE state and without removing any messages.
section: "3"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
