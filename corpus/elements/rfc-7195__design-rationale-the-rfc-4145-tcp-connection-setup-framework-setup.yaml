document: rfc-7195
kind: design-rationale
summary: The RFC 4145 TCP connection-setup framework ('setup' and 'connection' attributes) was reused for negotiating the direction of PSTN circuit-switched bearer establishment, because its active/passive/actpass model maps directly onto the PSTN call initiation problem without requiring new primitives.
