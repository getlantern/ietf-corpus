document: rfc-9776
kind: design-rationale
summary: IGMPv3 removes the host-suppression mechanism from IGMPv2, where hosts that heard another host's report would suppress their own. Suppression was removed because it prevented routers from receiving complete membership information needed for source-specific multicast and because the savings were deemed insufficient to justify the complexity and the loss of robustness.
section: A.2
topics:
    - multicast
