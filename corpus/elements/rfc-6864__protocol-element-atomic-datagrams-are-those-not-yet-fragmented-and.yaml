document: rfc-6864
kind: protocol-element
summary: Atomic datagrams are those not yet fragmented and for which further fragmentation has been inhibited, identified by the condition (DF==1)&&(MF==0)&&(frag_offset==0). The IPv4 ID field carries no meaning for atomic datagrams and may be set to any value.
