kind: protocol-element
summary: The IANAItuProbableCauseOrZero textual convention extends IANAItuProbableCause with the value 0, which implies all applicable probable causes for a resource. It is defined as INTEGER (0..2147483647) and used to identify alarm condition types in the ARC table.
