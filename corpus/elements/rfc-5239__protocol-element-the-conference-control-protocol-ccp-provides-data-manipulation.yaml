document: rfc-5239
kind: protocol-element
summary: The conference control protocol (CCP) provides data manipulation and state retrieval for the centralized conferencing data represented by the conference object. It is used to request blueprints, create reservations, activate conferences, and manipulate participant and media state; the CCP client requires the conference object identifier for all operations.
section: "8.3"
topics:
