document: rfc-6409
kind: normative-requirement
summary: If an MSA cannot determine a return path to the submitting user (from a valid MAIL FROM, source IP, or authenticated identity), the MSA SHOULD immediately reject the message with a 550 code to the MAIL command.
section: "3.2"
rfc2119_level: SHOULD
topics:
