document: rfc-5444
kind: wire-format
summary: An address block (<address-block>) encodes an 8-bit <num-addr>, an 8-bit <addr-flags>, optional <head-length>/<head>, optional <tail-length>/<tail>, zero or more <mid> fields (each mid-length = address-length - head-length - tail-length octets), and zero or more 8-bit <prefix-length> fields as governed by the ahassingleprelen and ahasmultiprelen flags.
section: "5.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
