document: rfc-1793
kind: normative-requirement
summary: 'Routers are REQUIRED to flush a DoNotAge LSA if both: (1) the LSA has been in the router''s database for at least MaxAge seconds, and (2) the originator of the LSA has been unreachable for at least MaxAge seconds. This is an exception to the normal rule that only self-originated LSAs can be flushed.'
section: "2.3"
rfc2119_level: REQUIRED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
