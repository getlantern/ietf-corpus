document: rfc-8531
kind: interoperability-note
summary: 'The YANG module is designed for extension by technology-specific models (e.g., TRILL OAM, MPLS-TP OAM). Technology-specific modules augment anchor points in the base model: MD, MA, and MEP configuration nodes, as well as RPC inputs/outputs. TRILL adds RBridge nickname as a MEP address option and flow-entropy (96-octet field) for ECMP; MPLS-TP adds technology-sub-type (IP/UDP vs PW-ACH encapsulation) at the MA level.'
section: "7"
topics:
