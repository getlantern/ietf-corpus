document: rfc-8160
kind: security-consideration
summary: Terminal drivers that interpret the IUTF8 bit as enabling UTF-8-aware line-editing should carefully consider treatment of illegal sequences, overlong encodings, and redundant representations of composed characters, per the security considerations of RFC 3629 and the Unicode Standard.
