document: rfc-7273
kind: protocol-element
summary: NTP reference clocks are identified by hostname (or IP) and optional port; if the port is omitted, the standard NTP port 123 is assumed. Multiple NTP servers listed at the same SDP level are treated as equivalent and interchangeable for fault tolerance.
section: "4.2"
topics:
