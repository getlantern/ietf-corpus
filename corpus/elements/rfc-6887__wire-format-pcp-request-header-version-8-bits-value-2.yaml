kind: wire-format
summary: 'PCP request header: Version (8 bits, value=2), R bit (0=request), Opcode (7 bits), Reserved (16 bits, MUST be zero on TX/ignored on RX), Requested Lifetime (32-bit unsigned, seconds), PCP Client''s IP Address (128 bits). Fixed header is 24 octets, followed by optional opcode-specific data and options.'
