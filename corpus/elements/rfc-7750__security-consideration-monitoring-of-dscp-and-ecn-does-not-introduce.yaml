document: rfc-7750
kind: security-consideration
summary: Monitoring of DSCP and ECN does not introduce additional security threats beyond those already present in TWAMP (RFC 5357) and its existing extensions (RFC 6038). The general security considerations for active measurement of live networks, as discussed in RFC 4656 and RFC 5357, apply.
section: "4"
topics:
    - security
    - measurement
