document: rfc-9747
kind: normative-requirement
summary: Received Unaffiliated BFD Echo packets MUST have a TTL or Hop Limit value of 254 (similar to GTSM per RFC 5082 Appendix A); otherwise the received packets MUST be dropped. This verifies a configured single-hop count.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - ip
    - security
