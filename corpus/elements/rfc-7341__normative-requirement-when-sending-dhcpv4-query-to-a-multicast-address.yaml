document: rfc-7341
kind: normative-requirement
summary: When sending DHCPv4-query to a multicast address, the client MUST use a link-local source address per RFC 3315. When sending unicast, the source address MUST be an address of appropriate scope acquired in advance.
section: "9"
rfc2119_level: MUST
