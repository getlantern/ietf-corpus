document: rfc-5121
kind: normative-requirement
summary: A unique IPv6 prefix (or prefixes) MUST be assigned to each link (MS/host). The point-to-point link model requires per-MS prefix assignment; a different prefix should be assigned to each unique link.
section: "6.1"
rfc2119_level: MUST
topics:
