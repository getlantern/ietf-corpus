document: rfc-4872
kind: protocol-element
summary: 'Four status bits in the PROTECTION object characterize LSP role: S (Secondary) distinguishes primary from secondary LSPs; P (Protecting) distinguishes working from protecting LSPs; N (Notification) indicates control-plane-only coordination during switching; O (Operational) indicates the protecting LSP is currently carrying normal traffic after switchover. The combination S=1, P=0 is explicitly invalid.'
section: "14.1"
topics:
