document: rfc-2735
kind: wire-format
summary: 'The VPN encapsulation header consists of: LLC/SNAP indicator (0xAA-AA-03), IANA OUI (0x00-00-5E), PID for VPN encapsulation (0x00-08), a PAD byte for 32-bit alignment (coded 0x00), a VPN-related OUI (3 bytes), and a VPN Index (4 bytes), followed by the LLC-encapsulated PDU.'
