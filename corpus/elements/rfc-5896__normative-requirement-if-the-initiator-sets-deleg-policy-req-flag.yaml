document: rfc-5896
kind: normative-requirement
summary: If the initiator sets deleg_policy_req_flag, the GSS-API Kerberos mechanism MUST examine the OK-AS-DELEGATE flag in the service ticket and MUST also examine all cross-realm tickets in the traversal from the user's initial TGT to the service ticket.
section: "5"
rfc2119_level: MUST
