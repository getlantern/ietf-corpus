document: rfc-6081
kind: normative-requirement
summary: The Teredo refresh interval initial parameter SHOULD be configurable and the default MUST be 30 seconds. The randomized refresh interval MUST fall within 50% to 150% of the refresh interval (relaxing RFC 4380's 75%–100% range).
section: 5.1.1
rfc2119_level: MUST
topics:
    - nat
    - v6ops
