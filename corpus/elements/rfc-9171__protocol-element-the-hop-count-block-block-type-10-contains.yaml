document: rfc-9171
kind: protocol-element
summary: 'The Hop Count Block (block type 10) contains two unsigned integers: hop limit (1–255) and hop count (initially zero, incremented by 1 on each hop). When hop count exceeds hop limit, the bundle SHOULD be deleted with reason ''Hop limit exceeded''. This block guards against routing loops and ping-pong forwarding anomalies.'
section: 4.4.3
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
