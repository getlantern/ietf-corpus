document: rfc-5041
kind: normative-requirement
summary: The L (Last) flag MUST be set to one on the last DDP Segment of every DDP Message and MUST NOT be set on any other DDP Segment. The segment with L=1 MUST be posted to the LLP after all other segments of the message.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
