document: rfc-6125
kind: normative-requirement
summary: A client MUST NOT seek a match for a reference identifier of CN-ID if the presented identifiers include a DNS-ID, SRV-ID, URI-ID, or any application-specific identifier types supported by the client. CN-ID checking is only a last resort when no other identifier types are present.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
