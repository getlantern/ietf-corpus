document: rfc-1596
kind: protocol-element
summary: The frPVCConnectStatusChange NOTIFICATION-TYPE carries frPVCConnectIndex, both endpoint ifIndex and DLCI values, L2H and H2L OperStatus, and frPVCEndptRcvdSigStatus. It is sent when a PVC changes state but MUST NOT be sent when a FR-UNI interface changes state; linkDown or linkUp traps are used for that case.
section: "5"
