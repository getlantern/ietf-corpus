document: rfc-1738
kind: wire-format
summary: IP-based URL schemes use the common syntax `//<user>:<password>@<host>:<port>/<url-path>`. Parts `<user>:<password>@`, `:<password>`, `:<port>`, and `/<url-path>` are all optional. Any ':', '@', or '/' within the user or password fields must be encoded.
section: "3.1"
topics:
    - http
