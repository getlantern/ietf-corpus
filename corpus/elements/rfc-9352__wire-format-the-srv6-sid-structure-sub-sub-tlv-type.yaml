document: rfc-9352
kind: wire-format
summary: 'The SRv6 SID Structure sub-sub-TLV (type 1, length 4) carries four 1-octet fields: LB Length (Locator Block bits), LN Length (Locator Node bits), Fun. Length (Function bits), and Arg. Length (Arguments bits). The sum of all four MUST be ≤ 128; if not, the parent sub-TLV MUST be ignored.'
section: "9"
