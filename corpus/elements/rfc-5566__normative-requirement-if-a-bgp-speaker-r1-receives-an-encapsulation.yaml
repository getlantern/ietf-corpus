document: rfc-5566
kind: normative-requirement
summary: If a BGP speaker R1 receives an Encapsulation SAFI update from R2 indicating an IPsec tunnel type, R1 MUST initiate an IPsec SA of the specified tunnel type, and all data packets for which R2 is the BGP next hop MUST be sent through that SA.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
