kind: protocol-element
summary: SmtpUTF8Mailbox-aware path validators apply name constraint comparison to the subject distinguished name and both rfc822Name and SmtpUTF8Mailbox subject alternative name forms. RFC 9549 extends rfc822Name name constraints to cover SmtpUTF8Mailbox subjectAltNames, ensuring introduction of SmtpUTF8Mailbox does not violate existing name constraints.
