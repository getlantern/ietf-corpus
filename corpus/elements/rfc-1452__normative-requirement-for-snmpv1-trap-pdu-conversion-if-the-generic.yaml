document: rfc-1452
kind: normative-requirement
summary: For SNMPv1 Trap-PDU conversion, if the generic-trap field is 'enterpriseSpecific', snmpTrapOID.0 is the concatenation of the enterprise field with sub-identifiers '0' and the specific-trap value; otherwise the corresponding well-known trap OID from the SNMPv2 MIB is used.
section: 3.1.2
rfc2119_level: MUST
topics:
    - snmp
