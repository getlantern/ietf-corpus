document: rfc-6951
kind: design-rationale
summary: 'UDP encapsulation of SCTP serves two purposes: enabling SCTP traffic to pass through legacy NATs that lack native SCTP support, and allowing SCTP to be implemented in user space on hosts without direct IP-layer access, removing the need for special operating system privileges.'
section: "1"
topics:
