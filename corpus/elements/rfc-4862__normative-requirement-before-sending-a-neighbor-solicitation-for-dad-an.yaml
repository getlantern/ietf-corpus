document: rfc-4862
kind: normative-requirement
summary: Before sending a Neighbor Solicitation for DAD, an interface MUST join the all-nodes multicast address and the solicited-node multicast address of the tentative address. The first message after interface initialization SHOULD be delayed by a random interval between 0 and MAX_RTR_SOLICITATION_DELAY to reduce congestion at startup.
section: 5.4.2
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - multicast
