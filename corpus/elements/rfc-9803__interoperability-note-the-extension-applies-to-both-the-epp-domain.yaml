document: rfc-9803
kind: interoperability-note
summary: The extension applies to both the EPP domain name mapping (RFC 5731) and the host object mapping (RFC 5732). A and AAAA TTL management depends on whether a server uses the host object model or the host attribute model; the applicable object type differs between the two models.
