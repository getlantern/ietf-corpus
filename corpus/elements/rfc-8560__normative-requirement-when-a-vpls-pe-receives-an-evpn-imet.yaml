document: rfc-8560
kind: normative-requirement
summary: When a VPLS PE receives an EVPN IMET route, it MUST ignore it on the basis that it belongs to an unknown SAFI. This ensures VPLS PEs remain unaffected by EVPN control-plane advertisements.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
