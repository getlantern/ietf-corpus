document: rfc-6370
kind: protocol-element
summary: A Pseudowire Path Identifier (PW_Path_ID) uniquely identifies a PW using the Generalized PWid FEC (type 129) with AII Type 2. It is composed as AGI::A1-{Global_ID::Node_ID::AC_ID}::Z9-{Global_ID::Node_ID::AC_ID}, where the Node_ID serves as the Prefix and the AC_ID is as defined in RFC 5003.
section: "6"
topics:
