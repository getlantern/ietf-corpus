document: rfc-2058
kind: wire-format
summary: 'The User-Password attribute (Type 2, Length 18-130) encrypts the password using a chained MD5-XOR scheme: b1=MD5(S+RA), c(1)=p1 XOR b1; bi=MD5(S+c(i-1)), c(i)=pi XOR bi, where S is the shared secret and RA is the Request Authenticator. Passwords are padded to a multiple of 16 octets; maximum 128 characters.'
section: "5.2"
topics:
