document: rfc-9136
kind: protocol-element
summary: Recursive resolution of an ESI Overlay Index requires a received and installed RT-1 (Ethernet A-D per EVI) route specifying that ESI; a GW IP Overlay Index requires a received RT-2 with that IP in the IP Address field; a MAC Overlay Index requires a received RT-2 with that MAC in the MAC Address field.
section: "3.2"
topics:
    - routing
    - bgp
