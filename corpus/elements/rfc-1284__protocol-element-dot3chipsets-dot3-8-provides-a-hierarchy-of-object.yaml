document: rfc-1284
kind: protocol-element
summary: 'dot3ChipSets (dot3 8) provides a hierarchy of OBJECT IDENTIFIERs identifying specific 802.3 MAC hardware chipsets: AMD 7990/79900, Intel 82586/82596, Seeq 8003, National 8390/SONIC, and Fujitsu 86950. These OIDs are used as values for ifExtnsChipSet defined in RFC 1229.'
section: "5.5"
