document: rfc-2744
kind: protocol-element
summary: gss_name_t supports an internal opaque form that may hold multiple primitive names from different namespaces, and mechanism-specific contiguous octet-string forms. Names authenticated via gss_accept_sec_context() are always Mechanism Names (MNs) containing exactly one mechanism-specific primitive name.
section: "3.10"
topics:
    - security
