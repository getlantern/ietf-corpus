document: rfc-9557
kind: interoperability-note
summary: The use of Z instead of -00:00 is preferred because ISO 8601:2000 and later do not permit -00:00 as a local offset. Both carry the same updated semantics under this specification, but Z is more interoperable across implementations that validate against ISO 8601.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
