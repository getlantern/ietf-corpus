document: rfc-7293
kind: normative-requirement
summary: A receiving MTA SHOULD NOT introduce RRVS (in either form) when relaying or expanding a message that did not arrive with RRVS in use, as doing so would second-guess the originator's intent and could produce undesirable outcomes.
section: "8"
rfc2119_level: SHOULD NOT
