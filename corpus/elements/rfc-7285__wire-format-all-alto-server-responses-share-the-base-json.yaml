summary: All ALTO server responses share the base JSON type ResponseEntityBase, which contains a 'meta' field of type ResponseMeta (an object-map of JSONString to JSONValue). Service-specific types derive from this base and add a typed data field (e.g., 'network-map', 'cost-map', 'endpoint-cost').
