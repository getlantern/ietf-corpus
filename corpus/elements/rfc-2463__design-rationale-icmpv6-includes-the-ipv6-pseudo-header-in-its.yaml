document: rfc-2463
kind: design-rationale
summary: ICMPv6 includes the IPv6 pseudo-header in its checksum calculation, unlike ICMPv4. This change was made to provide additional protection against corrupted source/destination addresses in the IPv6 header.
section: "2.3"
topics:
    - ip
    - security
