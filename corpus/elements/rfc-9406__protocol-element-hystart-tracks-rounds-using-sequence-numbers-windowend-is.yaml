document: rfc-9406
kind: protocol-element
summary: 'HyStart++ tracks rounds using sequence numbers: windowEnd is initialized to SND.NXT, and when windowEnd is ACKed the current round ends and windowEnd is reset to SND.NXT. At the start of each round, lastRoundMinRTT and currentRoundMinRTT are updated.'
