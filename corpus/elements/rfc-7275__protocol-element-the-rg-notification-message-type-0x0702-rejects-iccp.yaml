document: rfc-7275
kind: protocol-element
summary: The RG Notification message (type 0x0702) rejects ICCP/Application connections or individual messages/TLVs via a NAK TLV (Type=0x0002). It MUST only be sent to a PE already in an RG and MUST contain TLVs for at most one ICCP application per message.
section: "6.4"
topics:
    - mpls
