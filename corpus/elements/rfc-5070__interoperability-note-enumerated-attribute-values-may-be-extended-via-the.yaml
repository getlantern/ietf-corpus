document: rfc-5070
kind: interoperability-note
summary: Enumerated attribute values may be extended via the 'ext-value' escape token combined with a corresponding 'ext-*' STRING attribute (e.g., ext-purpose, ext-dtype, ext-action). Entire class structures may be extended by embedding foreign-namespace XML in AdditionalData with dtype='xml'. Both mechanisms require out-of-band coordination with recipients.
section: "5.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
