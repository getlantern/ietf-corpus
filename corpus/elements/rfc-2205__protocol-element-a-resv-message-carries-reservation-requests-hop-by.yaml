document: rfc-2205
kind: protocol-element
summary: A Resv message carries reservation requests hop-by-hop from receivers toward senders along the reverse data path. Its format requires SESSION, RSVP_HOP, TIME_VALUES, STYLE, and a flow descriptor list; it optionally carries RESV_CONFIRM, SCOPE, POLICY_DATA, and INTEGRITY objects.
