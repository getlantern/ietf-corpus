document: rfc-5703
kind: security-consideration
summary: The system MUST be sized and restricted so that even malicious use of MIME part matching does not deny service to other users. It is not possible to examine the MIME structure of decrypted content in a multipart/encrypted MIME part.
section: "11"
rfc2119_level: MUST
topics:
    - email
    - security
