document: rfc-5654
kind: protocol-element
summary: MPLS-TP transport paths correspond to LSPs or pseudowires (PWs), as defined by network connections in G.805. Transport paths may be P2P or P2MP; the transport-path layer provides only P2P or P2MP connectivity to carry aggregates of transport service layer traffic.
section: 1.2.2
