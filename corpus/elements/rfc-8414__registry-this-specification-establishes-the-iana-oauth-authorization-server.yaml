document: rfc-8414
kind: registry
summary: This specification establishes the IANA 'OAuth Authorization Server Metadata' registry for OAuth 2.0 authorization server metadata names, with 'Specification Required' registration policy. Initial contents include 22 metadata names such as 'issuer', 'authorization_endpoint', 'token_endpoint', 'jwks_uri', 'signed_metadata', and 'code_challenge_methods_supported'.
section: "7.1"
