document: rfc-2243
kind: normative-requirement
summary: A server SHOULD NOT allow a user to use the same value for their seed and secret pass phrase. A generator also SHOULD NOT allow this, and MUST take specific steps to prevent infinite loops of re-initialization attempts in case of failure.
section: "4.3"
rfc2119_level: SHOULD NOT
topics:
    - security
