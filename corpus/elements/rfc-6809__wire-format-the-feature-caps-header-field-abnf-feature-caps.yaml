document: rfc-6809
kind: wire-format
summary: 'The Feature-Caps header field ABNF: `Feature-Caps = "Feature-Caps" HCOLON fc-value *(COMMA fc-value)` and `fc-value = "*" *(SEMI feature-cap)`. The ''*'' wildcard value is present to follow RFC 4485 guidelines and maintain consistency with RFCs 3840/3841.'
