document: rfc-7503
kind: design-rationale
summary: Hysteresis (delayed processing) was added to self-originated LSA handling to mitigate flooding overhead caused by a router with a duplicate Router ID. This mechanism MAY be deployed outside of autoconfigured deployments as it also mitigates inadvertent or malicious introduction of duplicate Router IDs.
section: "7.4"
topics:
    - routing
