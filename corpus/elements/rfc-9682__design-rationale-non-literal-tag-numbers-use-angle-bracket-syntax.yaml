summary: 'Non-literal tag numbers use angle bracket syntax ''<'' type ''>'' reusing the generics syntax, which is disambiguated by context: generic parameters follow a rule name (id), while head-number expressions follow a dot character. The document notes this angle bracket reuse may cause human confusion but avoids the disruption of a new character.'
