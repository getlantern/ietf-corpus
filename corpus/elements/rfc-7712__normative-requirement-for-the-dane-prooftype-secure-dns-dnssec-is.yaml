document: rfc-7712
kind: normative-requirement
summary: For the DANE prooftype, secure DNS (DNSSEC) is necessary to establish the alternative chain of trust from the service certificate to the DNS root. If no SRV resource record is found, the fallback methods from RFC 6120 must be pursued.
section: "5.1"
rfc2119_level: REQUIRED
topics:
