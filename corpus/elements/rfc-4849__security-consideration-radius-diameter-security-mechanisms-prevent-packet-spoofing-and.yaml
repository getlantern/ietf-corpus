document: rfc-4849
kind: security-consideration
summary: RADIUS/Diameter security mechanisms prevent packet spoofing and transit modification, but do not prevent an authorized proxy from maliciously modifying, inserting, or removing attributes. A proxy that removes filter attributes could allow a user unfiltered network access without that being reflected in accounting logs.
section: "6"
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
