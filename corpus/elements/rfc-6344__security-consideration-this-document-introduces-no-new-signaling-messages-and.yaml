document: rfc-6344
kind: security-consideration
summary: This document introduces no new signaling messages and does not change control-plane adjacency relationships. However, intercepted call information for diversely routed VCG members may reveal to an attacker that these LSPs belong to the same VCAT group via different routes, indicating the VCG is designed for increased reliability.
section: "8"
topics:
    - security
    - routing
    - mpls
