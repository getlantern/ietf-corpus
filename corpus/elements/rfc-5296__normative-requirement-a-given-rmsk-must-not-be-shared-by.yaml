document: rfc-5296
kind: normative-requirement
summary: A given rMSK MUST NOT be shared by multiple authenticators. Its lifetime MUST NOT be greater than the lifetime of the rRK. If a new rRK is derived, subsequent rMSKs MUST be derived from the new rRK.
section: "4.7"
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
