document: rfc-3012
kind: normative-requirement
summary: The Foreign Agent MUST NOT remove the MN-AAA Authentication Extension from the Registration Request prior to the completion of AAA-infrastructure authentication; if it does not remove the Challenge extension, it MUST reject any Registration Reply from the Home Agent that omits the Challenge Extension with the same value.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
