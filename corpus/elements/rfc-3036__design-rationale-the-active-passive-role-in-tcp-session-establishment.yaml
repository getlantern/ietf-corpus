document: rfc-3036
kind: design-rationale
summary: 'The active/passive role in TCP session establishment is determined by comparing the two transport addresses as unsigned integers: the LSR with the numerically larger address plays the active role and initiates the TCP connection. This deterministic tie-breaking prevents both LSRs from simultaneously attempting to connect or both waiting.'
section: 2.5.2
topics:
    - mpls
    - routing
    - tcp
