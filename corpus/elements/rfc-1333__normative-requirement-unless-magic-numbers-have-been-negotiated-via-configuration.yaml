document: rfc-1333
kind: normative-requirement
summary: Unless Magic-Numbers have been negotiated via Configuration Option, the Magic-Number field MUST be transmitted as zero and MUST be ignored on reception. When negotiated, incoming LQR packets SHOULD be checked for loopback detection.
section: "2.6"
rfc2119_level: MUST
topics:
    - tcp
