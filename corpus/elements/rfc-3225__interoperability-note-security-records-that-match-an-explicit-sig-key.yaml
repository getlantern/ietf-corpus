document: rfc-3225
kind: interoperability-note
summary: Security records that match an explicit SIG, KEY, NXT, or ANY query, or are part of zone data for an AXFR or IXFR query, are included in responses regardless of whether the DO bit was set. The DO bit governs only automatic inclusion of DNSSEC RRs for authentication.
section: "3"
topics:
    - dns
    - security
