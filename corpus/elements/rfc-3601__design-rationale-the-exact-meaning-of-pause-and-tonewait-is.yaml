document: rfc-3601
kind: design-rationale
summary: The exact meaning of "pause" and "tonewait" is intentionally not mandated, because their interpretation depends on the specific devices and implementations using the specification. This flexibility allows the notation to be used across heterogeneous dialling equipment.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
