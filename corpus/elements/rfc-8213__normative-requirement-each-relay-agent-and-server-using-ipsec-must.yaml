document: rfc-8213
kind: normative-requirement
summary: Each relay agent and server using IPsec MUST also be configured with a list of the relay agents to which messages will be returned. IPsec selectors are pairs of addresses with direction of DHCP message exchange on DHCPv4 UDP port 67 or DHCPv6 UDP port 547.
section: "3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
