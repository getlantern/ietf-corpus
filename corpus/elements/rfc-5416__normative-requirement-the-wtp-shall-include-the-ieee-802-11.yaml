document: rfc-5416
kind: normative-requirement
summary: The WTP SHALL include the IEEE 802.11 MAC header contents in all frames transmitted to the AC. When AC-side encryption is used, the WTP SHALL NOT decrypt uplink frames prior to transmitting them to the AC.
section: 2.2.1
rfc2119_level: MUST
topics:
    - security
