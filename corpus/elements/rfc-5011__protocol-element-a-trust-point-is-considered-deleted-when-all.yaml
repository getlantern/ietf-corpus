document: rfc-5011
kind: protocol-element
summary: A trust point is considered deleted when all of its trust anchors are revoked. If no superior trust point exists, data at and below the deleted trust point is considered insecure. A subordinate trust point that validly chains to a superior trust point MAY be deleted by a resolver after 180 days.
section: "5"
topics:
