document: rfc-5040
kind: security-consideration
summary: IPsec is identified as the primary security service for RDMAP, providing authentication, integrity, and confidentiality for iWARP traffic. A Privileged Resource Manager must control STag registration and buffer binding to prevent unauthorized remote memory access; kernel bypass implementations must ensure ULP applications cannot subvert STag protection.
section: "8.2"
topics:
    - security
    - ipsec
