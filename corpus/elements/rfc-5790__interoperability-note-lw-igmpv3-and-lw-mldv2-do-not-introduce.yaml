document: rfc-5790
kind: interoperability-note
summary: LW-IGMPv3 and LW-MLDv2 do not introduce any changes to Query or Report message formats. An LW-IGMPv3 host sends a subset of IGMPv3 Report messages recognized by both full and lightweight IGMPv3 routers on the same LAN; its Host Compatibility Mode is set to IGMPv3.
section: "6.1"
topics:
    - multicast
    - routing
