document: rfc-3676
kind: protocol-element
summary: A signature separator line is an optionally quoted, optionally stuffed line consisting of DASH DASH SP ('-- '). It is neither flowed nor fixed and must be transmitted as-is. Paragraphs must not end with a signature separator line.
section: "4.3"
