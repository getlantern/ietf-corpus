document: rfc-6203
kind: interoperability-note
summary: When the server also advertises the SORT capability (RFC 5256), results can be ordered by RELEVANCY sort criteria. When ESORT (CONTEXT, RFC 5267) is advertised, SORT RETURN (RELEVANCY ALL) can retrieve both sorted UIDs and their scores.
