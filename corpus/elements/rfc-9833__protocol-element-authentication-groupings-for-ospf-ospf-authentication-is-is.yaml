kind: protocol-element
summary: Authentication groupings for OSPF ('ospf-authentication'), IS-IS ('isis-authentication'), and RIP ('rip-authentication') each support either a key-chain reference or explicit key (key-id uint32, key string, crypto-algorithm). All are conditioned on an 'enabled' boolean leaf.
