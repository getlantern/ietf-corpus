document: rfc-1288
kind: security-consideration
summary: Finger discloses potentially sensitive information about users, including login times, mail status, and correspondents. Security administrators should make explicit decisions about whether to run Finger and what information to provide; sites that are information-security conscious should not run Finger without understanding how much information it reveals.
section: "3.2"
topics:
    - security
    - privacy
