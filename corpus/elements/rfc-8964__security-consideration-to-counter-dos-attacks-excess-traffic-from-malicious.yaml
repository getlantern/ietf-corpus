document: rfc-8964
kind: security-consideration
summary: To counter DoS attacks, excess traffic from malicious or malfunctioning devices must be prevented or mitigated via policing and shaping. To counter delay attacks, all devices on an LSP must be authenticated and authorized, LSP packet delay must be monitored, and traffic may be moved to an alternate path or PREOF configuration adjusted if an attack is suspected.
section: "6"
topics:
