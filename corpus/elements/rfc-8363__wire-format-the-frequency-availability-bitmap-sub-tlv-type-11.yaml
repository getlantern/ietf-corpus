document: rfc-8363
kind: wire-format
summary: 'The Frequency Availability Bitmap sub-TLV (Type=11) is a new Generalized SCSI TLV encoding available frequency spectrum for flexi-grid links. It contains: Type (16 bits), Length (16 bits), Priority bitmap (8 bits), Max Slot Width per priority (16 bits each), C.S. (4 bits), Starting n (16 bits), No. of Effective Bits (12 bits), and a variable-length Bitmap field.'
section: 4.1.1
topics:
