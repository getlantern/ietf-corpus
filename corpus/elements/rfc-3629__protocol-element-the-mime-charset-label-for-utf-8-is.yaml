document: rfc-3629
kind: protocol-element
summary: The MIME charset label for UTF-8 is the string 'UTF-8'. It labels media types containing text from the ISO/IEC 10646 repertoire (including all amendments through amendment 5) encoded per the UTF-8 scheme, and is suitable under the MIME 'text' top-level type.
