document: rfc-2743
kind: interoperability-note
summary: GSS-API tokens defined for a particular mechanism may not be interoperable with non-GSS-API callers of the same underlying cryptographic technology, because token formats and protocol integration techniques may differ. A peer using the same underlying technology outside the GSS-API paradigm is not guaranteed to interoperate with a GSS-API peer.
section: 1.1.2
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
