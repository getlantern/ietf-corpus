summary: A candidate pair consists of a local candidate and a remote candidate with the same component ID and IP address version. Pairs have states (Frozen, Waiting, In-Progress, Succeeded, Failed) and properties including default, valid, nominated flags, and priority computed from controlling and controlled agent priorities.
