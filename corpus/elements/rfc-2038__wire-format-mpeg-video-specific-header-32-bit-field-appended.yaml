document: rfc-2038
kind: wire-format
summary: 'MPEG Video-specific header: 32-bit field appended after the RTP fixed header on every video packet. Fields: MBZ (6 bits), TR/Temporal-Reference (10 bits, 0–1023, constant per picture), MBZ (2 bits), S/Sequence-header-present (1 bit), B/Beginning-of-slice (1 bit), E/End-of-slice (1 bit), P/Picture-Type (3 bits: I=1,P=2,B=3,D=4), FBV (1 bit), BFC (3 bits), FFV (1 bit), FFC (3 bits).'
section: "3.4"
topics:
    - rtp
    - realtime
