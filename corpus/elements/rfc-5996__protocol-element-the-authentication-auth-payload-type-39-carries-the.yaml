document: rfc-5996
kind: protocol-element
summary: The Authentication (AUTH) payload (type 39) carries the authentication method type (1 byte) and authentication data proving knowledge of the private key or shared secret corresponding to the sender's identity. It covers a signed octet string constructed from the first IKE message, the nonce from the peer, and the prf(SK_px, IDx') value.
section: "3.8"
topics:
    - ipsec
    - crypto
    - security
