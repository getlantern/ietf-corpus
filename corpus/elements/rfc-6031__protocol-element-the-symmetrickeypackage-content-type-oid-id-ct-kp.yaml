document: rfc-6031
kind: protocol-element
summary: The SymmetricKeyPackage content type (OID id-ct-KP-sKeyPackage, arc iso.member-body.us.rsadsi.pkcs.pkcs9.smime.ct.25) is the top-level container for transferring one or more plaintext symmetric keys. It comprises an optional version field (default v1), optional package-level attributes (sKeyPkgAttrs), and a sequence of one or more OneSymmetricKey values.
