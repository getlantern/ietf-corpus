document: rfc-7889
kind: protocol-element
summary: APPENDLIMIT=<number> in the capability list indicates a single upload limit in octets applied uniformly to all mailboxes. A value of 0 means the server will not accept any APPEND commands at all for affected mailboxes.
section: "2"
