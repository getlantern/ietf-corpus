document: rfc-9959
kind: normative-requirement
summary: 'In the Reconnaissance Phase, the sender MUST stop using Careful Resume and return to normal CC if: another connection is already using the saved_cwnd; the Remote Endpoint does not match any saved_remote_endpoint; the Lifetime of saved CC parameters is exceeded; or the minimum RTT measured in the Reconnaissance Phase is less than or equal to saved_rtt/2.'
section: "3.2"
rfc2119_level: MUST
topics:
    - congestion
    - tcp
    - quic
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
