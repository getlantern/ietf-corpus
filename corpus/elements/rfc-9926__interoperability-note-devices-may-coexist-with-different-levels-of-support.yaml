document: rfc-9926
kind: interoperability-note
summary: Devices may coexist with different levels of support (RFC 8505 only; RFC 8505 + RFC 9685; or this specification as well). A legacy 6LR that does not set the F flag in the 6CIO will cause an upgraded 6LN to skip prefix registration with that router, though the 6LN may register with other supporting 6LRs on the same link.
section: "12.1"
topics:
