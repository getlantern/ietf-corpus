document: rfc-2136
kind: protocol-element
summary: 'Five prerequisite semantics are defined, distinguished by CLASS and TYPE metavalues: (1) RRset exists value-independent (CLASS=ANY, TYPE=rrset, empty RDATA), (2) RRset exists value-dependent (CLASS=zone, full RDATA), (3) RRset does not exist (CLASS=NONE, TYPE=rrset), (4) name is in use (CLASS=ANY, TYPE=ANY), (5) name is not in use (CLASS=NONE, TYPE=ANY). All prerequisites use TTL=0.'
