document: rfc-8105
kind: normative-requirement
summary: For non-link-local addresses, 6LNs SHOULD NOT use IIDs derived from MAC-48 or DECT device addresses; schemes such as CGAs, privacy extensions, HBAs, DHCPv6, or static semantically opaque addresses SHOULD be used by default.
