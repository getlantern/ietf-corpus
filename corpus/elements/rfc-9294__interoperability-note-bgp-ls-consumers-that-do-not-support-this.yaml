document: rfc-9294
kind: interoperability-note
summary: BGP-LS consumers that do not support this specification can continue using existing top-level TLVs for link attributes for existing applications (RSVP-TE, SR Policy, LFA), but will be unable to support application-specific link attributes or newer applications encoded only using the ASLA TLV.
