document: rfc-4604
kind: interoperability-note
summary: A router compliant with this document will never generate an IGMPv1, IGMPv2, or MLDv1 query for an address in the SSM range. If such a query is observed, it indicates either a non-SSM-aware router or an inconsistent SSM range configuration between devices on the link.
section: 2.2.3
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
