document: rfc-7825
kind: normative-requirement
summary: The server SHALL start connectivity checks per ICE §5.7-5.8 after receiving SETUP, unless configured for high-reachability (in which case it MAY wait for triggered checks from the client). The server SHALL use a single pacer queue for all media streams within each RTSP session.
section: "6.6"
rfc2119_level: SHALL
topics:
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
