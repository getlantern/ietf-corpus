document: rfc-4388
kind: design-rationale
summary: Broadcast ARP was rejected as an alternative because it burdens the access concentrator with transmitting over multiple ports/circuits, burdens subscriber hosts with processing broadcasts, and is easily defeated by malicious hosts masquerading as the legitimate IP endpoint.
