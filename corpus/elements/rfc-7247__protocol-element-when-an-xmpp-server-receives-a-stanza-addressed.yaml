document: rfc-7247
kind: protocol-element
summary: 'When an XMPP server receives a stanza addressed to a foreign domain, it performs DNS SRV lookups for ''_xmpp-server'' records per RFC 6120. If no XMPP hostname is found, it falls back to RFC 3263 SIP server location procedures. SIP servers perform the reverse: RFC 3263 first, then ''_xmpp-server'' SRV lookups if no SIP hostname is returned.'
section: "5"
topics:
    - sip
    - dns
    - realtime
