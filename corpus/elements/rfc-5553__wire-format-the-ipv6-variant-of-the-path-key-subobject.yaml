summary: 'The IPv6 variant of the Path Key Subobject (PKS) is 20 bytes total: 1-byte L+Type field, 1-byte Length (always 20), 2-byte Path Key, and 16-byte PCE-ID (IPv6 address). The subobject type is assigned by IANA as 65.'
