document: rfc-4090
kind: protocol-element
summary: The facility backup method creates a single bypass tunnel that protects multiple LSPs sharing a common path segment. By using MPLS label stacking, the PLR pushes the bypass tunnel label onto packets rerouted through it, and the merge point pops it and forwards based on the inner label.
section: "3.2"
topics:
    - mpls
    - routing
