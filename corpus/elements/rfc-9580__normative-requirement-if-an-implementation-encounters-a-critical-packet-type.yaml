document: rfc-9580
kind: normative-requirement
summary: If an implementation encounters a critical packet (Type ID 0–39) with an unknown type in a packet sequence, it MUST reject the whole packet sequence. Unknown non-critical packets (Type IDs 40–63) MUST be ignored.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
