document: rfc-8682
kind: interoperability-note
summary: When mapping PRNG output to a smaller integer range, use of floating-point arithmetic (single or double precision) should probably be avoided if PRNG determinism is required, as floating-point rounding may differ across platforms. The specification only outputs 32-bit unsigned integers; range mapping is out of scope.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
