document: rfc-9108
kind: interoperability-note
summary: The YANG module is intended as the minimum basis for future DNS data modeling; it covers only dns-class and rr-type. Other DNS-related IANA registries are expected to be translated in separate future YANG modules, allowing data models to import only the specific types they require.
section: "3"
topics:
    - dns
    - yang
    - netconf
