document: rfc-8770
kind: security-consideration
summary: The H-bit introduces advertisement of host router capability to all OSPFv2 routers in an area. Since H-bit restricts router behavior to a subset of normal router operations, it does not introduce new security considerations beyond those already known in OSPFv2 (RFC 2328).
