document: rfc-2935
kind: normative-requirement
summary: On transaction timeout, the IOTP client MUST display a message describing the timeout. It MAY offer the user the option to cancel or retry, and/or may automatically retry. On timeout failure, the situation is treated as an error.
section: "4.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
