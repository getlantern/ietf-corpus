summary: frDlcmiTable contains configuration parameters for the Data Link Connection Management Interface (DLCMI) on each Frame Relay interface, indexed by frDlcmiIfIndex (InterfaceIndex). It includes the LMI scheme, address format, polling timers, error thresholds, and row status.
