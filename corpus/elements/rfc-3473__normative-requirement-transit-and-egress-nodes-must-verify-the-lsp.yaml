document: rfc-3473
kind: normative-requirement
summary: Transit and egress nodes MUST verify the LSP Encoding Type is supported; if not, they MUST generate a PathErr with 'Routing problem/Unsupported Encoding'. Nodes MUST also verify the Switching Type on the incoming interface; if unsupported, a PathErr with 'Routing problem/Switching Type' MUST be generated.
section: 2.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
