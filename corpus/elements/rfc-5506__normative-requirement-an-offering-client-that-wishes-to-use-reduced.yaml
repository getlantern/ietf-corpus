document: rfc-5506
kind: normative-requirement
summary: An offering client that wishes to use Reduced-Size RTCP MUST include the SDP attribute 'a=rtcp-rsize' in the offer. If present in the offer, an answerer that supports Reduced-Size RTCP and wishes to use it SHALL include 'a=rtcp-rsize' in the answer.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
