document: rfc-6231
kind: normative-requirement
summary: The MS MUST support both HTTP and HTTPS protocol schemes for fetching and uploading resources referenced by URI attributes in elements such as <dialogprepare>, <dialogstart>, <media>, <grammar>, and <record>. The MS MAY support other schemes.
section: "4.1"
rfc2119_level: MUST
topics:
