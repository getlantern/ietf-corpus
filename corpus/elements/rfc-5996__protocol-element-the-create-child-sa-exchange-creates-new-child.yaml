document: rfc-5996
kind: protocol-element
summary: The CREATE_CHILD_SA exchange creates new Child SAs and rekeys existing IKE SAs and Child SAs via a single request/response pair. Either endpoint may initiate it. A KE payload MAY be included for additional Diffie-Hellman forward secrecy; when rekeying an IKE SA the KEi payload MUST be included.
section: "1.3"
topics:
    - ipsec
    - security
    - crypto
