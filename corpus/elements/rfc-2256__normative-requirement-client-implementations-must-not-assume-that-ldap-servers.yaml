document: rfc-2256
kind: normative-requirement
summary: Client implementations MUST NOT assume that LDAP servers are capable of performing attribute subtyping, as server implementations which do not support subtyping need not recognize supertype attributes (name, distinguishedName) in requests.
section: "5.42"
rfc2119_level: MUST NOT
