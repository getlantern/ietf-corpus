document: rfc-7518
kind: normative-requirement
summary: For AES GCM key encryption (A128GCMKW/A192GCMKW/A256GCMKW), use of a 96-bit IV is REQUIRED, and the Authentication Tag output MUST be 128 bits regardless of key size. The 'iv' and 'tag' Header Parameters MUST be present and processed.
section: "4.7"
rfc2119_level: REQUIRED
topics:
    - jose
    - crypto
