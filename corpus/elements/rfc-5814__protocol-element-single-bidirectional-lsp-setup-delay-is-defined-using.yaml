document: rfc-5814
kind: protocol-element
summary: 'Single Bidirectional LSP Setup Delay is defined using GMPLS bidirectional symmetric LSP signaling: ingress ID0 sends a Path message including an Upstream Label (RFC 3473) and the metric spans until the last bit of the Resv is received. GMPLS supports only symmetric, not asymmetric, bidirectional LSPs.'
