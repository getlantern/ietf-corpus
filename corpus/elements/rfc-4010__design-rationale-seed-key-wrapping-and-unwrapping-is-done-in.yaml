document: rfc-4010
kind: design-rationale
summary: SEED key wrapping and unwrapping is done in conformance with the AES key wrap algorithm [RFC3394], with 'AES' replaced by 'SEED'. This reuse of the established AES key wrap structure provides the same integrity and confidentiality properties for SEED-wrapped keys.
section: "3"
