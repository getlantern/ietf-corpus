document: rfc-2848
kind: wire-format
summary: 'The SDP network type ''TN'' (Telephone Network) is introduced with address type ''RFC2543'', followed by a telephone-subscriber string (global-phone-number with ''+'' prefix for E.164, or local-phone-number). Example: ''c= TN RFC2543 +1-201-406-4090''.'
