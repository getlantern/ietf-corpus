document: rfc-6140
kind: normative-requirement
summary: When forming each derived contact from a 'bnc' registration, the registrar MUST add a user portion containing the fully qualified E.164-formatted number (including the leading '+'), and this number MUST consist exclusively of digits 0–9 after the '+'; visual separators such as '-', '.', '(', or ')' are explicitly prohibited.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
