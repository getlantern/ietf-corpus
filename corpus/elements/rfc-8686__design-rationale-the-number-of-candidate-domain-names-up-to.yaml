document: rfc-8686
kind: design-rationale
summary: The number of candidate domain names (up to 4 for IPv4, up to 6 for IPv6) is a deliberate compromise between deployment flexibility (fine-grained per-IP records) and avoiding excess DNS load. It is not a design goal to expose prefix delegation structure to clients.
section: 5.2.1
topics:
    - dns
