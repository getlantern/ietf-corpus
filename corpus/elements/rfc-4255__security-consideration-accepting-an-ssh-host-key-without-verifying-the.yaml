document: rfc-4255
kind: security-consideration
summary: Accepting an SSH host key without verifying the fingerprint through a secured channel leaves the connection vulnerable to man-in-the-middle attacks. SSHFP provides out-of-band verification whose overall security depends on the SSH administrator, DNS zone administrator, SSH implementation details, and the client's secure DNS access.
section: "4"
topics:
    - security
    - dns
