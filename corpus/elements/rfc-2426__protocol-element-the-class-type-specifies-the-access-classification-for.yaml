document: rfc-2426
kind: protocol-element
summary: The CLASS type specifies the access classification for a vCard object. Valid values include PUBLIC, PRIVATE, CONFIDENTIAL, iana-tokens, and x-names. This captures the owner's intent for general access to the vCard information.
