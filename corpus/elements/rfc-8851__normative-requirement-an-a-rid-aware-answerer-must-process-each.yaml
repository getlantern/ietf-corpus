document: rfc-8851
kind: normative-requirement
summary: 'An ''a=rid''-aware answerer must process each received ''a=rid'' line through six ordered verification steps: syntax check, rid-id uniqueness check, pt= validation against the m= line, support check for recv restrictions, depend rid-id ambiguity check, and codec compatibility check. Lines failing any step are discarded.'
section: 6.2.2
rfc2119_level: MUST
topics:
    - rtp
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
