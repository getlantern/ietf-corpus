document: rfc-5031
kind: design-rationale
summary: The sip:sos@domain approach was rejected because it overloads the user part of the URI with specific semantics, makes outbound proxy routing a special case inconsistent with normal SIP request-URI handling, is SIP-specific, and does not extend readily to other services.
