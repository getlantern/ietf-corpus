document: rfc-2244
kind: protocol-element
summary: A context is an ordered subset of dataset entries created by a SEARCH command with the MAKECONTEXT modifier. Contexts are session-scoped (discarded on connection close), and a server MUST support at least 100 active contexts per session.
section: "3.3"
