document: rfc-7177
kind: normative-requirement
summary: Although MTU testing is optional, it is mandatory for an RBridge to respond to an MTU-probe PDU with an MTU-ack PDU. An adjacency that fails the MTU test at the campus MTU will not enter or will leave the Report state, preventing that adjacency from being included in least-cost route computation.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
