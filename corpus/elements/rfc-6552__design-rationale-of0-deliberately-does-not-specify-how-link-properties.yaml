document: rfc-6552
kind: design-rationale
summary: OF0 deliberately does not specify how link properties are transformed into rank_increase; instead it enforces the acceptable range of step_of_rank values. This separation leaves implementation freedom while ensuring interoperability through normalized rank semantics rather than a prescribed computation.
section: "1"
topics:
