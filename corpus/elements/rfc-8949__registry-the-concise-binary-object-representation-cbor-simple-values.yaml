document: rfc-8949
kind: registry
summary: The 'Concise Binary Object Representation (CBOR) Simple Values' registry (Section 9.1) tracks assignments of simple value numbers 0–255. Values 20–23 are assigned (false, true, null, undefined); values 24–31 are reserved; 0–19 and 32–255 are available for assignment.
