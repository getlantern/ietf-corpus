document: rfc-5475
kind: design-rationale
summary: BOB was selected over CRC-32 and IPSX as the mandatory function because it showed the best overall uniformity and mixing properties in evaluations, especially when including payload bytes. IPSX is about an order of magnitude faster but is inherently limited to 16-byte input and has worse collision properties.
section: 6.2.4.1
