document: rfc-5393
kind: protocol-element
summary: 'The 440 (Max-Breadth Exceeded) response code signals that a request did not reach all possible destinations because the Max-Breadth budget was exhausted. Recovery options are similar to 483 (Too Many Hops): affect routing decisions or refine the request to reduce the search space.'
