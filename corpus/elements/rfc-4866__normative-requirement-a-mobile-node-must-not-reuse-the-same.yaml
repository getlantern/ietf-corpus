document: rfc-4866
kind: normative-requirement
summary: A mobile node MUST NOT reuse the same sequence number with a given permanent home keygen token. When a sequence number rollover is imminent, the mobile node MUST renew the permanent home keygen token by including its CGA parameters and signature in a new Binding Update to the correspondent node.
section: "4.9"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
