document: rfc-9090
kind: normative-requirement
summary: Where tag factoring with tag 111 is used, individual OIDs with the '1.3.6.1.4.1' prefix may still be encoded with tag 112 as nested tags, which remains the preferred serialization. Application protocols define where tag factoring is used and may impose deterministic encoding requirements.
section: "4.1"
rfc2119_level: RECOMMENDED
