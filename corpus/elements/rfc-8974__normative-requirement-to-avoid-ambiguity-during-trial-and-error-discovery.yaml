document: rfc-8974
kind: normative-requirement
summary: To avoid ambiguity during trial-and-error discovery, it is RECOMMENDED that clients send a request that has no other potential message-format error besides the extended token length (e.g., a GET with only an If-None-Match option).
section: 2.2.2
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
