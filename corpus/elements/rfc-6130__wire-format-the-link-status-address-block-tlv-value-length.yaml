document: rfc-6130
kind: wire-format
summary: The LINK_STATUS Address Block TLV (Value length = 1 octet; values LOST=0, SYMMETRIC=1, HEARD=2) reports the link status to the transmitting interface for a neighbor's address. The OTHER_NEIGHB TLV (Value length = 1 octet; values LOST=0, SYMMETRIC=1) reports addresses of symmetric 1-hop neighbors or recently lost neighbors.
section: 10.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
