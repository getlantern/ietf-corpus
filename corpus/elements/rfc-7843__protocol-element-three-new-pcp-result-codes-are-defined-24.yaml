document: rfc-7843
kind: protocol-element
summary: 'Three new PCP Result Codes are defined: 24 (THIRD_PARTY_ID_UNKNOWN) for an unknown/unavailable identifier, 25 (THIRD_PARTY_MISSING_OPTION) when one of the two required options is missing, and 26 (UNSUPP_THIRD_PARTY_ID_LENGTH) for an unsupported option length. All are long lifetime errors.'
