document: rfc-8343
kind: design-rationale
summary: The model supports pre-provisioning of interface configuration (configuring an interface before its hardware is present) as an optional capability advertised via the 'pre-provisioning' feature. This is recommended for devices supporting dynamic addition/removal of physical interfaces, but cannot be assumed in all cases due to OS and hardware constraints.
section: "2"
topics:
