document: rfc-2463
kind: protocol-element
summary: The ICMPv6 checksum is the 16-bit one's complement of the one's complement sum of the entire ICMPv6 message prepended with an IPv6 pseudo-header (as per RFC 2460 section 8.1), using Next Header value 58. The checksum field is set to zero during computation.
section: "2.3"
