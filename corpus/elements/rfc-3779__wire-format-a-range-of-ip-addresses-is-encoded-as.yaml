document: rfc-3779
kind: wire-format
summary: 'A range of IP addresses is encoded as a SEQUENCE of two BIT STRINGs: the minimum address with all trailing zero-bits removed, and the maximum address with all trailing one-bits removed. The special all-addresses prefix ''0/0'' MUST be encoded with length octet 1, initial octet 0, and no subsequent octets.'
section: 2.1.2
topics:
    - pkix
    - ip
