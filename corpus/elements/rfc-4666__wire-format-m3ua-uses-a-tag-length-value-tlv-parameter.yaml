document: rfc-4666
kind: wire-format
summary: 'M3UA uses a Tag-Length-Value (TLV) parameter format: Parameter Tag (16-bit unsigned integer), Parameter Length (16-bit, including Tag and Length fields but excluding padding), and Parameter Value (variable length). Total parameter length MUST be a multiple of 4 octets; up to 3 zero-byte padding octets are appended after the value but not counted in the length field.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
