document: rfc-1889
kind: interoperability-note
summary: The 2-bit version field (V) in the RTP fixed header identifies this specification as version 2. Version 1 was used in the first RTP draft; version 0 was used by the 'vat' audio tool. Audio/video streams using different media types must use different RTP sessions and cannot be associated at the RTP level, only via matching CNAME in RTCP.
section: "5.1"
topics:
    - rtp
    - realtime
