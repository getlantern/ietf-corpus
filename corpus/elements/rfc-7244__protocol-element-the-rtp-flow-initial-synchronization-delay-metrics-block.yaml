document: rfc-7244
kind: protocol-element
summary: The RTP Flow Initial Synchronization Delay Metrics Block (BT=27) reports the average time difference between the start of a multimedia session and when the RTP receiver acquires all components of RTP sessions. It is sent by RTP receivers and needs to be exchanged only occasionally, for example once at the start of the RTP session.
section: "3"
topics:
