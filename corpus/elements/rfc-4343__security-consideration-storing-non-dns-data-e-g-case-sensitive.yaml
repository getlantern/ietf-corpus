document: rfc-4343
kind: security-consideration
summary: Storing non-DNS data (e.g., case-sensitive email local parts in RP records) into DNS with the expectation that case is always preserved is incorrect and can lead to security implications, since DNS output case may change due to name compression.
section: "6"
topics:
    - dns
    - security
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
