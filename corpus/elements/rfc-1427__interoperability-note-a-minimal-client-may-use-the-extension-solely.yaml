document: rfc-1427
kind: interoperability-note
summary: A minimal client may use the extension solely to compare its estimated message size against the server's advertised fixed maximum (from the EHLO SIZE parameter), without issuing the extended MAIL command, thereby avoiding temporary-limit and per-recipient-limit detection.
