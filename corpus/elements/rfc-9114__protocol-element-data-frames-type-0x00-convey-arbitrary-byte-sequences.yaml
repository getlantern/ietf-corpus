document: rfc-9114
kind: protocol-element
summary: DATA frames (type=0x00) convey arbitrary byte sequences for HTTP request or response content. They MUST be associated with a request or response stream; receipt on a control stream is a connection error of type H3_FRAME_UNEXPECTED.
