document: rfc-4803
kind: design-rationale
summary: Labels may optionally be stored in gmplsLabelTable even when 32-bit representation suffices, to allow disambiguation of GMPLS label types or to consolidate all label storage in a single table in mixed MPLS and GMPLS systems. This is an operator choice, not a requirement.
section: "4.2"
topics:
    - mpls
