document: rfc-4352
kind: normative-requirement
summary: When multiple groups of frames are present, ToC entries SHALL be placed in order of increasing RTP timestamp value (modulo 2^32) of the first transport frame the entry represents, independent of payload mode.
section: 4.3.2
rfc2119_level: MUST
topics:
