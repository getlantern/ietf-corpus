document: rfc-6469
kind: interoperability-note
summary: SMPTE 306M format is covered by SMPTE 314M and SHOULD NOT be used; SMPTE 314M SHOULD be used instead. An RTP application may handle a 306M-identified stream as 314M encoding. Offers MAY include 306M for legacy system compatibility, and receivers SHOULD support this value.
section: "8"
topics:
