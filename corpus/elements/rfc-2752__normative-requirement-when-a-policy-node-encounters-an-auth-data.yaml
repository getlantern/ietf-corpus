document: rfc-2752
kind: normative-requirement
summary: When a policy node encounters an AUTH_DATA policy element that fails policy control, it SHOULD add a POLICY_ERROR_CODE attribute with details about the failure, causing an appropriate PATH_ERROR or RESV_ERROR to be returned to the request source.
section: 3.3.4
rfc2119_level: SHOULD
