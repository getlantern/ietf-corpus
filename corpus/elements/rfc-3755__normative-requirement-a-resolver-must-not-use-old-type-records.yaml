document: rfc-3755
kind: normative-requirement
summary: A resolver MUST NOT use old-type records for DNSSEC validations or other DNS operational decision making — e.g., MUST NOT use DNSKEYs to validate SIGs or use KEYs to validate RRSIGs.
section: "3"
rfc2119_level: MUST NOT
topics:
