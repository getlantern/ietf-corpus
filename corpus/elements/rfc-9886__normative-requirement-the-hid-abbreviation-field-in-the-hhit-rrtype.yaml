document: rfc-9886
kind: normative-requirement
summary: The HID Abbreviation field in the HHIT RRType MUST, absent local policy, be filled with four-character hexadecimal representations of the RAA and HDA values separated by a delimiter character (e.g., '000A 0014' for RAA=10, HDA=20).
section: 5.1.2
rfc2119_level: MUST
