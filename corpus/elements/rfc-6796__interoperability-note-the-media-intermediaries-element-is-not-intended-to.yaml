document: rfc-6796
kind: interoperability-note
summary: The <media-intermediaries> element is not intended to replace ICE-based connectivity discovery; it defines an administrative policy for intermediaries that should be traversed. The set of intermediaries in <media-intermediaries> and those discovered through ICE may overlap but are not required to.
section: "4.4"
topics:
    - sip
    - realtime
    - nat
