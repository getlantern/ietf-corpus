document: rfc-3963
kind: normative-requirement
summary: A Mobile Router MUST implement all requirements for IPv6 Mobile Nodes as described in section 8.5 of RFC 3775. It extends Mobile Node behavior with routing capability between its Care-of Address and the Mobile Network subnet.
section: "5"
rfc2119_level: MUST
topics:
