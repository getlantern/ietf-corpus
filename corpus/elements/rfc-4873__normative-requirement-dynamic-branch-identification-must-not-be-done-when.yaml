document: rfc-4873
kind: normative-requirement
summary: Dynamic branch identification MUST NOT be done when the processing node is identified as a branch node in an SERO. If a transit node cannot support the indicated recovery type or identify a merge node, the Path message MUST be processed normally and LSP Segment Recovery Flags MUST NOT be modified.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
