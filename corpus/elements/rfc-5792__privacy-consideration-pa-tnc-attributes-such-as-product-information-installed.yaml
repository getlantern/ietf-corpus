document: rfc-5792
kind: privacy-consideration
summary: PA-TNC attributes such as Product Information, Installed Packages, and String Version can expose sensitive details about an endpoint's software configuration. Whether a Posture Collector actually sends such attributes SHOULD be governed by local privacy and security policies, even when technically capable of doing so.
section: "6"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
