document: rfc-8063
kind: protocol-element
summary: The <keyRelayData> element carries DNSSEC key material for relay. It contains one REQUIRED <keyData> element (as defined in RFC 5910) and an OPTIONAL <expiry> element describing the expected lifetime of the relayed key(s) in the zone.
