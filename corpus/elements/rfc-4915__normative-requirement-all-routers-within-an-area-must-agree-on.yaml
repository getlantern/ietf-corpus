document: rfc-4915
kind: normative-requirement
summary: All routers within an area MUST agree on how the metric for the default topology will be advertised. When DefaultExclusionCapability is enabled, routers ignore TOS 0 metrics in Router-LSAs and instead use the MT-ID#0 metric for the default topology.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
