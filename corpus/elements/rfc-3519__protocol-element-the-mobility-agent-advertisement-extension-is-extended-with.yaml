document: rfc-3519
kind: protocol-element
summary: The Mobility Agent Advertisement Extension is extended with a 'U' (UDP Tunnelling support) flag to indicate that a foreign agent supports MIP UDP Tunnelling as defined in this document. This flag SHOULD be set when the FA is behind a NAT, and MUST NOT be set when the FA is not behind a NAT.
section: "3.4"
topics:
    - nat
    - mobility
