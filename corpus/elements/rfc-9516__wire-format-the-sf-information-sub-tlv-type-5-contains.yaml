document: rfc-9516
kind: wire-format
summary: 'The SF Information Sub-TLV (Type=5) contains: SF Sub-TLV (1-octet, value 5), Reserved (1-octet), Length (2-octet), Service Index (1-octet indicating SF position), SF Type (2-octet per RFC 9015), SF ID Type (1-octet per IANA registry), and variable-length SF Identifier (e.g., 32 bits for IPv4).'
section: 6.6.2
topics:
