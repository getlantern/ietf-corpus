document: rfc-2019
kind: interoperability-note
summary: An IPv6 frame originating on or traversing an Ethernet will have zero in the FDDI priority field when delivered via an 802.1d bridge, as required by IEEE 802.1d. This is the key property that makes FDDI adjacency detection work across bridged networks.
section: Interaction with Bridges
topics:
    - ip
