document: rfc-3986
kind: protocol-element
summary: The userinfo subcomponent matches *( unreserved / pct-encoded / sub-delims / ":" ). The "user:password" format is deprecated; applications must not render clear-text data after the first colon and should reject storage of such data unencrypted.
section: 3.2.1
topics:
