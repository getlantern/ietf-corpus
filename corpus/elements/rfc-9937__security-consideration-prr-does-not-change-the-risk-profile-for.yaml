document: rfc-9937
kind: security-consideration
summary: PRR does not change the risk profile for transport protocols. However, implementations that count segments instead of bytes must be cautious about ACK splitting attacks (Savage99), where a misbehaving receiver acknowledges partial segments to confuse the sender's congestion accounting.
