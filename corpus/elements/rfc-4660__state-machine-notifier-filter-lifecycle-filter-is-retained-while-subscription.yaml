document: rfc-4660
kind: state-machine
summary: 'Notifier filter lifecycle: filter is retained while subscription persists; if a ''202'' was sent because the filter could not be accepted at that time, the NOTIFY MAY terminate the subscription if the filter is ultimately found unacceptable, sending a NOTIFY with subscription-state ''terminated''.'
