document: rfc-1894
kind: normative-requirement
summary: MTAs MUST NOT generate the Original-Recipient field of a DSN unless the mail transfer protocol provides the address originally specified by the sender at submission time. Ordinary SMTP does not make that guarantee; the SMTP DSN extension (RFC 1891) does.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
