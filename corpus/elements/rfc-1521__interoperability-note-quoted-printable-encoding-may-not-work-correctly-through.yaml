document: rfc-1521
kind: interoperability-note
summary: 'Quoted-Printable encoding may not work correctly through EBCDIC gateways. For higher reliability through such gateways, additional ASCII characters (including !, ", #, $, @, [, \, ], ^, `, {, |, }, ~) should also be encoded per Rule 1. Base64 is preferred for binary data and provides higher transport reliability.'
section: "5.1"
topics:
