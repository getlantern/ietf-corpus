document: rfc-6310
kind: normative-requirement
summary: For a L2TPv3/IP PSN, a PE SHOULD use the Circuit Status AVP as the mechanism for AC and PW status and defect notification. VCCV-BFD CV types 0x08 and 0x20 SHOULD NOT be used when the PW is established via the L2TP control plane.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - mpls
