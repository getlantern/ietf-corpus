document: rfc-9877
kind: design-rationale
summary: The extension identifier 'geofeed1' (with trailing '1') denotes version 1; new versions will use different identifiers. Servers may use the registered media type and link relation without the extension identifier, but including it signals to clients that the server hosts geofeed URLs so clients can infer absence of geofeed data when no link is returned.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
