document: rfc-7571
kind: normative-requirement
summary: The ingress node MUST ensure that the LSP is in lock mode (A bit set) before requesting that a particular node enter loopback mode. Loopback can only be applied to a locked LSP.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
