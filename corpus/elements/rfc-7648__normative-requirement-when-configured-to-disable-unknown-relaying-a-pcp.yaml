document: rfc-7648
kind: normative-requirement
summary: When configured to disable unknown relaying, a PCP proxy co-located with a NAT MUST reject requests with unknown Opcodes via UNSUPP_OPCODE, and MUST reject requests with mandatory-to-process unknown options via UNSUPP_OPTION.
section: 3.4.2
rfc2119_level: MUST
topics:
    - pcp
    - nat
