document: rfc-3676
kind: protocol-element
summary: A flowed line is defined as a line that ends with a trailing space (SP) before the CRLF. The trailing space is the signal that the line continues logically into the next line. If DelSp=yes, that trailing space is logically deleted after parsing.
section: "4.1"
topics:
    - email
