document: rfc-9856
kind: normative-requirement
summary: Upon receiving the first IP multicast packet for a configured SFG on a Broadcast Domain, an upstream PE MUST advertise an S-PMSI A-D route ((*,G) or (S,G)) that includes the BD-RT (and SBD-RT if applicable), the SFG flag in the Multicast Flags Extended Community, and the Designated Forwarder Election Extended Community.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
