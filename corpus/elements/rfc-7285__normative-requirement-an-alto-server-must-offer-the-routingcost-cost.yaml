document: rfc-7285
kind: normative-requirement
summary: An ALTO server MUST offer the 'routingcost' cost metric, conveying a generic measure for the cost of routing traffic from source to destination where a lower value indicates higher preference. The internal computation method (e.g., air miles or hop-count) is left to the provider.
section: 6.1.1.1
rfc2119_level: MUST
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
