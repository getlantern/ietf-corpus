document: rfc-7959
kind: normative-requirement
summary: Either Block option (Block1 or Block2) MUST be processed when present in a CoAP message, or the message must be rejected; the option is therefore Critical. Either Block option MUST NOT occur more than once in a single message.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
