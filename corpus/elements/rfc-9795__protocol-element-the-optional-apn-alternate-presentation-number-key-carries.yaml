document: rfc-9795
kind: protocol-element
summary: The optional "apn" (alternate presentation number) key carries a canonicalized telephone number that the originator is authorized to display in lieu of their default number, such as a call-center main number. Only one "apn" key may appear; it MUST be used when the intent is to display the alternate number even if "jcd" or "jcl" keys are also present.
section: 5.1.2
topics:
    - realtime
    - sip
    - jose
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
