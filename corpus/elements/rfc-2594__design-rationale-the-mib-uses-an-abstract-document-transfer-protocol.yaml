document: rfc-2594
kind: design-rationale
summary: The MIB uses an abstract Document Transfer Protocol (DTP) to remain independent of specific application protocols. This allows the same MIB object definitions to cover HTTP, FTP, and future protocols by defining per-protocol mappings in separate sections or future RFCs.
section: "4.4"
topics:
