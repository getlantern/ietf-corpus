document: rfc-6170
kind: interoperability-note
summary: The LogotypeImageInfo structure references RFC 3066 for language tags (as inherited from RFC 3709), but RFC 3066 is obsolete and replaced by RFC 5646. Implementations should treat the language tag field as an RFC 5646 language tag.
