document: rfc-9231
kind: design-rationale
summary: SHA-256 (not SHA-1) is chosen as the default for RSASSA-PSS in this document due to the discovered weakness of SHA-1 (RFC 6194), overriding the RFC 8017 default. This is explicitly non-backwards-compatible with RFC 8017 defaults.
section: 2.3.9
topics:
    - crypto
    - security
