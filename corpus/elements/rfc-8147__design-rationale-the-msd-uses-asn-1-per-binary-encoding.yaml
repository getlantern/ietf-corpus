document: rfc-8147
kind: design-rationale
summary: The MSD uses ASN.1 PER binary encoding (Annex A of EN 15722) rather than the XML encoding (Annex C) to maintain consistency with legacy circuit-switched eCall and to comply with 3GPP requirements. This choice means the MSD cannot be represented as text in protocol examples.
