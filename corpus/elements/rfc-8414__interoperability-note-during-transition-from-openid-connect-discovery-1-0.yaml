document: rfc-8414
kind: interoperability-note
summary: During transition from OpenID Connect Discovery 1.0 deployments, applications should first attempt the RFC 8414 URL transformation and only fall back to the OIDC Discovery transformation if that fails. This fallback behavior is only needed when the well-known URI suffix is 'openid-configuration'.
section: "5"
topics:
