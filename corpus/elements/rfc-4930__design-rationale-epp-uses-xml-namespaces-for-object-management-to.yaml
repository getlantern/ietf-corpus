document: rfc-4930
kind: design-rationale
summary: EPP uses XML namespaces for object management to push the definition of each protocol operation into the context of a specific object, enabling new object mappings to be added without modifying the base protocol. This extensible object framework enables generic operations to be applied to any managed object type.
section: 2.7.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
