document: rfc-4396
kind: security-consideration
summary: RTP packets carrying 3GPP timed text are subject to the general RTP security considerations. Implementors SHOULD use SRTP to provide confidentiality, integrity, and authentication. Timed text content with hyperlinks or scripts could be used to exploit receiving applications if not properly sanitized.
section: "11"
topics:
    - rtp
    - realtime
    - security
