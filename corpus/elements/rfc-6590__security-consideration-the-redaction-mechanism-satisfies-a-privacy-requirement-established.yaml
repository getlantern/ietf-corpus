document: rfc-6590
kind: security-consideration
summary: The redaction mechanism satisfies a privacy requirement established by local policy and is not designed to provide strong security properties. Bilateral agreements between report producers and consumers (per RFC 6449 and RFC 5965 Section 8) should address the residual information-recovery risks.
section: "5.3"
topics:
    - email
    - security
    - privacy
