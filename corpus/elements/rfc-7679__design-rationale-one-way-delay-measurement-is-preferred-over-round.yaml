document: rfc-7679
kind: design-rationale
summary: One-way delay measurement is preferred over round-trip delay because Internet paths are often asymmetric (different forward and reverse routes), asymmetric queuing can produce radically different performance even on symmetric paths, and application performance often depends primarily on one direction of communication.
