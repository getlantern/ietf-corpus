document: rfc-9351
kind: interoperability-note
summary: The FAD TLV advertised in BGP-LS is derived from the IS-IS Flexible Algorithm Definition sub-TLV or the OSPFv2/OSPFv3 Flexible Algorithm Definition TLV, both as defined in RFC 9350. A single Node NLRI BGP-LS Attribute may include multiple FAD TLVs, one per algorithm the node advertises.
section: "3"
topics:
