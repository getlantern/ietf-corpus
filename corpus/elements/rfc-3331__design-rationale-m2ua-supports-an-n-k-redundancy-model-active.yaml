document: rfc-3331
kind: design-rationale
summary: M2UA supports an n+k redundancy model (active-standby, load-sharing, or broadcast) where n ASPs handle traffic and k additional ASPs are available for fail-over. The 1+1 active/standby and simplex 1+0 models are subsets. This allows flexible high-availability configurations for the SG-to-MGC signaling path.
section: 1.3.2
topics:
    - realtime
    - sctp
