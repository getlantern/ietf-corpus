document: rfc-8102
kind: normative-requirement
summary: 'Implementations SHOULD use a default PQ-node preference ordering: prefer PQ-nodes covering more primary interfaces, then prefer closer PQ-nodes (lower metric), then prefer lower router-id (or system-id for IS-IS) as a tiebreaker.'
section: 2.3.4
rfc2119_level: SHOULD
topics:
    - routing
