document: rfc-7283
kind: security-consideration
summary: Because relay agents forward all unknown DHCPv6 message types, a malicious attacker can interfere with the relaying function by constructing fake DHCPv6 messages with arbitrary type codes. This is analogous to existing attacks using known type codes in DHCPv4 and DHCPv6.
section: "6"
topics:
