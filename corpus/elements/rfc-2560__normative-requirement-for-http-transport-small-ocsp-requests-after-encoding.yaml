document: rfc-2560
kind: normative-requirement
summary: For HTTP transport, small OCSP requests (after encoding less than 255 bytes) MAY use GET to enable HTTP caching; requests larger than 255 bytes SHOULD use POST. Where privacy is required, OCSP transactions MAY be protected using TLS/SSL.
section: A.1.1
rfc2119_level: SHOULD
topics:
    - pkix
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
