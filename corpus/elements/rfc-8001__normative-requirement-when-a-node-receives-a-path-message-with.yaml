document: rfc-8001
kind: normative-requirement
summary: When a node receives a Path message with LSP_ATTRIBUTES carrying the SRLG Collection Flag and local policy prohibits SRLG collection, the Path message MUST NOT be rejected; instead, it MUST be forwarded without any SRLG subobjects added to the RRO.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
