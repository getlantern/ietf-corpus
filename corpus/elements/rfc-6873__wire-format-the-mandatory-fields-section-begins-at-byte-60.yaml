document: rfc-6873
kind: wire-format
summary: The Mandatory Fields section begins at byte 60 with a 0x0A (LF) delimiter, followed by a 10-byte decimal Timestamp (Unix epoch seconds), a 0x2E separator, a 3-byte decimal Fractional Seconds field (millisecond precision), a 0x09 tab, and a 5-byte Flags Field encoding Request/Response, Retransmission, Sent/Received, Transport, and Encryption state.
