document: rfc-3191
kind: design-rationale
summary: The terminology was changed from 'PSTN - Public Switched Telephone Network' to 'GSTN - Global Switched Telephone Network' to reflect that telephony systems no longer conform to a single or few Public Operator paradigm. ABNF variable names were kept unchanged for consistency with RFC 2303.
