document: rfc-7265
kind: normative-requirement
summary: Multi-value iCalendar parameters (COMMA-separated lists) MUST be represented in jCal as an array of string values. A jCal parser MUST be able to understand both a single string value and an array with one string element for single-value parameters.
section: 3.5.2
rfc2119_level: MUST
topics:
    - json
