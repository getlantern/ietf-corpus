document: rfc-8016
kind: normative-requirement
summary: It is RECOMMENDED that the client avoid transmitting a Send indication or ChannelData message until it has received an acknowledgement for the Refresh request containing MOBILITY-TICKET, since the server MAY discard or queue such messages before the Refresh succeeds.
section: 3.2.2
rfc2119_level: RECOMMENDED
topics:
