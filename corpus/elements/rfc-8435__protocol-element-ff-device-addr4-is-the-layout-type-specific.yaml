document: rfc-8435
kind: protocol-element
summary: ff_device_addr4 is the layout-type-specific device address structure returned by GETDEVICEINFO. It contains ffda_netaddrs (multipath list of storage device network addresses) and ffda_versions (array of ff_device_versions4 specifying NFS version, minor version, rsize, wsize, and coupling strength).
section: "4.1"
