document: rfc-7689
kind: normative-requirement
summary: At least one ResourceBlockInfo sub-TLV MUST be present in the WSON Processing Hop Attribute TLV. No more than two ResourceBlockInfo sub-TLVs SHOULD be present, and any present sub-TLVs MUST be processed in the order received.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
