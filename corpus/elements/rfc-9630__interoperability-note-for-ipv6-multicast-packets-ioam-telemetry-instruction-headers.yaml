document: rfc-9630
kind: interoperability-note
summary: For IPv6 multicast packets, IOAM telemetry instruction headers and metadata can be encapsulated using IPv6 options as described in RFC 9486. The telemetry solution must work within the IPv4 multicast range 224.0.0.0–239.255.255.255 and IPv6 ff00::/8.
section: "5.2"
topics:
    - multicast
    - ip
    - measurement
