document: rfc-6190
kind: security-consideration
summary: The security considerations of RFC 3550 and RFC 6184 apply. MANEs that parse and rewrite RTP/RTCP headers must be trusted entities when operating with SRTP, as they process media in cleartext; SRTP key management must account for this trust relationship.
section: "8"
topics:
