document: rfc-1042
kind: normative-requirement
summary: Gateway implementations must be prepared to accept full-length packets and fragment them when necessary. Hosts should accept full-length packets but must not send datagrams longer than 576 octets unless they have explicit knowledge the destination accepts them.
section: Frame Format and MAC Level Issues
rfc2119_level: MUST
topics:
    - ip
