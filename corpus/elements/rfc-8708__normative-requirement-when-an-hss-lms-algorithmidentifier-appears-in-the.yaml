document: rfc-8708
kind: normative-requirement
summary: When an HSS/LMS AlgorithmIdentifier appears in the SubjectPublicKeyInfo of an X.509 certificate, the key usage extension MAY contain digitalSignature, nonRepudiation, keyCertSign, and cRLSign, but MUST NOT contain other values.
