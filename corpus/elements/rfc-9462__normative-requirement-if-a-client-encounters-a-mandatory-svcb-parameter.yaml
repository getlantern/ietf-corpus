document: rfc-9462
kind: normative-requirement
summary: If a client encounters a mandatory SVCB parameter it does not understand, it MUST NOT use that record to discover a Designated Resolver; it may still use other records in the response that contain only understood parameters.
section: "3"
rfc2119_level: MUST NOT
topics:
