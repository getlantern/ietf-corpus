document: rfc-2136
kind: design-rationale
summary: 'Wildcarding and aliasing are disabled in UPDATE processing: a wildcard matches only a wildcard in the zone, and a CNAME matches only a CNAME. All UPDATE operations are done on canonical names to avoid ambiguity.'
