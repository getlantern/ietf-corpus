document: rfc-7428
kind: interoperability-note
summary: When applying RFC 6282 or RFC 7400 to G.9959, '802.15.4' is replaced by 'G.9959', '802.15.4 short address' by '<Interface><G.9959 NodeID>', and '802.15.4 PAN ID' by 'G.9959 HomeID'. 64-bit 802.15.4 address details do not apply.
