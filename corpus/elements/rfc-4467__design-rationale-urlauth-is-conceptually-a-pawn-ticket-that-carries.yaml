document: rfc-4467
kind: design-rationale
summary: URLAUTH is conceptually a 'pawn ticket' that carries no authentication information and can be redeemed by whomever presents it (subject to access identifier restrictions). This design separates authorization from authentication, allowing scoped access delegation without sharing credentials.
section: "1"
topics:
