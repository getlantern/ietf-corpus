document: rfc-5046
kind: security-consideration
summary: To prevent denial-of-service attacks, the iSCSI layer at both initiator and target MUST defer RDMA connection resource allocation (Allocate_Connection_Resources) until after the SecurityNegotiation stage of iSCSI Login completes, ensuring resources are only consumed for authenticated peers.
section: 5.1.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
