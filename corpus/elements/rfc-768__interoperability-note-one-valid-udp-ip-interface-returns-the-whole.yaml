document: rfc-768
kind: interoperability-note
summary: One valid UDP/IP interface returns the whole internet datagram including the full IP header in response to a receive operation, and allows UDP to pass a full internet datagram to IP for sending; IP then verifies fields and computes the internet header checksum.
section: IP Interface
topics:
