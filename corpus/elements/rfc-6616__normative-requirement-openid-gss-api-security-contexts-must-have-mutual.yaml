document: rfc-6616
kind: normative-requirement
summary: OpenID GSS-API security contexts MUST have mutual_state flag (GSS_C_MUTUAL_FLAG) set to TRUE and MUST have deleg_state flag (GSS_C_DELEG_FLAG) set to FALSE, as credential delegation is not supported.
section: "4"
rfc2119_level: MUST
topics:
