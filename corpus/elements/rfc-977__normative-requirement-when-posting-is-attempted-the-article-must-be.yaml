document: rfc-977
kind: normative-requirement
summary: When posting is attempted, the article must be presented in RFC 850 format with all required header lines. The server must make no attempt to filter characters, fold or limit lines, or otherwise process incoming text; it passes the message to the installation's news posting software.
section: 3.10.1
rfc2119_level: MUST
topics:
    - tcp
