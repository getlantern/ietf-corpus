document: rfc-3956
kind: protocol-element
summary: 'The RP unicast address is derived from an embedded-RP multicast address by two steps: (1) copy the first ''plen'' bits of the network prefix into a zeroed 128-bit address, then (2) replace the last 4 bits with the RIID value. This yields the unicast RP address without any out-of-band signaling.'
section: "4"
topics:
