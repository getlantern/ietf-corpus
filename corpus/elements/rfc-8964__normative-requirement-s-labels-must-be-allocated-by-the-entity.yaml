document: rfc-8964
kind: normative-requirement
summary: S-Labels MUST be allocated by the entity that controls the service sub-layer receiving a node's label space. When one or more F-Labels or the incoming interface is needed together with an S-Label to uniquely identify a service, the provisioned information MUST be used for that identification.
section: 4.2.2
rfc2119_level: MUST
topics:
    - mpls
