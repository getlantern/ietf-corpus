document: rfc-8366
kind: design-rationale
summary: Bearer vouchers (with wildcard registrar identity) are explicitly out of scope because any bearer of such a voucher can claim the pledge; a nonceless bearer voucher effectively turns the pledge into a TOFU device with minimal MiTM mitigation.
