document: rfc-7344
kind: normative-requirement
summary: The CDS/CDNSKEY technique SHOULD NOT be used for initial enrollment of keys since there is no way to ensure that the initial key is the correct one. If it is used for enrollment, strict hold-down times, challenge data, or similar rules MUST be applied.
section: "9"
rfc2119_level: SHOULD NOT
topics:
    - dns
    - security
