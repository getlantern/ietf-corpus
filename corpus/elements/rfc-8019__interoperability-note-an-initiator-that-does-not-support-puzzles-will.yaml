document: rfc-8019
kind: interoperability-note
summary: An Initiator that does not support puzzles will ignore the PUZZLE notification as an unrecognized status notification per RFC 7296 Section 3.10.1 and simply return the COOKIE. The Responder SHOULD allow some fraction of such legacy requests to be served so that non-puzzle-capable clients are not entirely locked out during an attack.
section: 7.1.2
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
