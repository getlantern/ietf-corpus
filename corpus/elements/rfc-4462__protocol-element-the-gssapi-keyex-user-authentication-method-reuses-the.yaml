document: rfc-4462
kind: protocol-element
summary: The 'gssapi-keyex' user authentication method reuses the GSS-API context established during the initial key exchange. It sends a single SSH_MSG_USERAUTH_REQUEST with a MIC computed over session identifier, request type, user name, service, and 'gssapi-keyex'. Any context from rekeying MUST NOT be used.
section: "4"
topics:
