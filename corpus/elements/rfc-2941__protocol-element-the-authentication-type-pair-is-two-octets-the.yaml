summary: 'The ''authentication-type-pair'' is two octets: the first is the authentication type (e.g., KERBEROS_V4=1, KERBEROS_V5=2, SRP=5, DSS=14), and the second is a modifier byte encoding directional, mutual-auth, encryption, and credential-forwarding flags.'
