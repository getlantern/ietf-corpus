document: rfc-8166
kind: protocol-element
summary: 'Every RPC-over-RDMA message consists of two XDR streams: a Transport stream containing the fixed header fields and chunk lists, and a Payload stream containing the encapsulated RPC message beginning with its XID field. In its simplest form both streams are conveyed together in a single RDMA Send operation.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
