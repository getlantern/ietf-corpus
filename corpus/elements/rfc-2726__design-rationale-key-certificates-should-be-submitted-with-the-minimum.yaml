document: rfc-2726
kind: design-rationale
summary: Key certificates should be submitted with the minimum number of signatures (preferably only the self-signature) because the RIPE database does not communicate with public key servers. Users who need to verify trust should retrieve the certificate independently from a key server and compare fingerprint, key type, and length.
section: "4"
topics:
