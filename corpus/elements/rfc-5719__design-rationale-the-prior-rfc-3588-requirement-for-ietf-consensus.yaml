document: rfc-5719
kind: design-rationale
summary: The prior RFC 3588 requirement for IETF consensus to define new Diameter commands caused other SDOs to define new applications on existing commands rather than requesting new command codes, leading to poor design choices and interoperability problems; this document corrects that incentive structure.
section: "1"
