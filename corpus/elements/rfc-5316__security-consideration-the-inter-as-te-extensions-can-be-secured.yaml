document: rfc-5316
kind: security-consideration
summary: The inter-AS TE extensions can be secured within each AS using existing ISIS security mechanisms (cleartext passwords or HMAC-MD5 per RFC 5304). No ISIS security is required between ASes since no ISIS adjacency is formed on inter-AS links and no information is exchanged between ASes.
section: "5"
topics:
    - security
    - routing
