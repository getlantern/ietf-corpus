document: rfc-6728
kind: design-rationale
summary: 'The Metering Process is decomposed into two independently configurable functional blocks: a Selection Process (handles packet sampling and filtering) and a Cache (generates Flow Records or Packet Reports). This separation enables flexible combination of these blocks and supports both IPFIX and PSAMP deployments.'
