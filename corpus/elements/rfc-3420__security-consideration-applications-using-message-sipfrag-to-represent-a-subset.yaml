document: rfc-3420
kind: security-consideration
summary: Applications using message/sipfrag to represent a subset of SIP header fields must consider replay and cut-and-paste threats, and must include sufficient information in the sipfrag part to mitigate those risks. For example, an identity assertion use case must bind the assertion to the specific request.
section: "6"
topics:
    - sip
    - security
    - realtime
