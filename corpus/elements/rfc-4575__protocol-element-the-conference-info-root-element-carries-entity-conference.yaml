summary: The <conference-info> root element carries 'entity' (conference URI, required), 'state' (full/partial/deleted, default full), and 'version' (32-bit unsigned int) attributes. Its children are <conference-description>, <host-info>, <conference-state>, <users>, <sidebars-by-ref>, and <sidebars-by-val>.
