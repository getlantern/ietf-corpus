summary: 'pktcSigDevVmwiMode (read-write, default rpAsETS) selects one of five Visual Message Waiting Indicator alerting methods: dtAsETS, rpAsETS, lrAsETS, osi (Open Switching Interval), or lrETS. Value MUST NOT persist across MTA reboots.'
