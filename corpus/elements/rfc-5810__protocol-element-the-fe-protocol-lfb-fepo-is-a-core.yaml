document: rfc-5810
kind: protocol-element
summary: The FE Protocol LFB (FEPO) is a core mandatory LFB that controls the ForCES protocol itself; it defines timers for heartbeat and association-loss detection and the CE failover policy. It demonstrates that the ForCES protocol is self-configurable using the same LFB architecture it uses for IP forwarding.
section: 7.3.1
topics:
    - routing
