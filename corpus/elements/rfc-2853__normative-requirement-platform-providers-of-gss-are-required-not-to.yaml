document: rfc-2853
kind: normative-requirement
summary: Platform providers of GSS are required not to add any constructors to the GSSManager class (private, public, or protected). This ensures that all subclasses invoke only the default constructor provided to the base class by the compiler.
section: "6.1"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
