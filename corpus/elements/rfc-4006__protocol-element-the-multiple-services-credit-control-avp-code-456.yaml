document: rfc-4006
kind: protocol-element
summary: The Multiple-Services-Credit-Control AVP (Code 456) is a grouped AVP enabling independent credit-control of multiple services or rating groups within a single session. It carries Requested-Service-Unit, Granted-Service-Unit, Used-Service-Unit, Rating-Group, Service-Identifier, Validity-Time, Final-Unit-Indication, Result-Code, and G-S-U-Pool-Reference sub-AVPs.
