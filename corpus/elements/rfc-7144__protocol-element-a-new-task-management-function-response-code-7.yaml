document: rfc-7144
kind: protocol-element
summary: A new Task Management Function Response code 7 ("Function succeeded") is added, mapping to the SAM-5 SCSI service response FUNCTION SUCCEEDED; it is returned by QUERY TASK when the task is found, by QUERY TASK SET when commands are present, and by QUERY ASYNCHRONOUS EVENT when a unit attention or deferred error is pending.
section: 6.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
