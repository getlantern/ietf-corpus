document: rfc-8656
kind: wire-format
summary: 'The ChannelData message has a 4-byte header: a 16-bit channel number followed by a 16-bit length field giving the byte count of the data payload. Unlike other TURN messages, it does not use the STUN header, making it substantially more compact than Send/Data indications for high-volume data exchange.'
section: "12.4"
