document: rfc-9796
kind: protocol-element
summary: The 'integrity' Call-Info parameter associates an integrity hash string with the resource referenced by the Call-Info URI, using the format "<algorithm>-<hash>" (e.g., "sha256-..."). It corresponds conceptually to W3C Subresource Integrity and mirrors the "rcdi" claim in the RCD PASSporT.
