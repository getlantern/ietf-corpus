document: rfc-7232
kind: protocol-element
summary: A 'weak validator' is representation metadata that might not change for every change to the representation data. Weakness may result from limited clock resolution, an inability to ensure uniqueness, or a deliberate grouping of equivalent representations. Weak entity-tags are prefixed with 'W/'.
