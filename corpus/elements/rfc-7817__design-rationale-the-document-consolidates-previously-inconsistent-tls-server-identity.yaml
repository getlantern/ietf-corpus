document: rfc-7817
kind: design-rationale
summary: The document consolidates previously inconsistent TLS server identity verification rules across RFC 2595 (IMAP/POP/ACAP), RFC 3207 (SMTP STARTTLS), RFC 3501 (IMAP), and RFC 5804 (ManageSieve) into a single consistent procedure to ease implementation for developers who implement multiple protocols simultaneously.
