document: rfc-4730
kind: interoperability-note
summary: The default subscription duration is 7200 seconds; subscriptions in hours or days are RECOMMENDED. Subscribers MUST be able to handle the User Interface returning an Expires value smaller than the requested value, per RFC 3265 — the actual subscription duration is the value in the 200 OK Expires header returned by the notifier.
section: "4.4"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
