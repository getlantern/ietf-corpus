document: rfc-6450
kind: normative-requirement
summary: Echo Reply messages MUST first contain the exact options (in the same order) from the Echo Request, and then any options appended by the server. A server MUST NOT process unknown options, but MUST still echo them. A client MUST ignore any unknown options.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
