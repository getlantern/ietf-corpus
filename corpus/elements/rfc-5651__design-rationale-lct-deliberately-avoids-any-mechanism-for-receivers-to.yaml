document: rfc-5651
kind: design-rationale
summary: LCT deliberately avoids any mechanism for receivers to send information back to senders in order to preserve massive scalability. Feedback from receivers to senders is one of the key bottlenecks for scalable reliable multicast delivery.
section: "2"
topics:
    - multicast
