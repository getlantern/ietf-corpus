document: rfc-6155
kind: normative-requirement
summary: For third-party requests, the requestor MUST be authenticated by the LIS and the request MUST be explicitly authorized by a policy established by a Rule Maker. There is no implicit authorization for third parties; the default policy is deny-all until an explicit authorization is in place.
section: "5.3"
rfc2119_level: MUST
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
