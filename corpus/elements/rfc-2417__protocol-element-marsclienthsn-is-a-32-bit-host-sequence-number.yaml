document: rfc-2417
kind: protocol-element
summary: marsClientHsn is a 32-bit Host Sequence Number initialized to zero at startup. It is set to the current Cluster Sequence Number (CSN) when the client receives the echoed copy of its own MARS_JOIN from the MARS, and is used to track MARS sequence numbers.
