kind: protocol-element
summary: 'Two SNMP notifications are defined: newRoot (sent when the bridge becomes the new STP root, after topology change timer expiration) and topologyChange (sent when a port transitions from Learning to Forwarding or Forwarding to Blocking, but not when newRoot is also sent). Both are optional to implement.'
