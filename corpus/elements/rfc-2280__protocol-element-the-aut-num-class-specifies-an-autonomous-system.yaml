document: rfc-2280
kind: protocol-element
summary: The aut-num class specifies an Autonomous System's routing policy. The 'import' attribute specifies inbound policy (from peerings, optional actions, and an accept filter), the 'export' attribute specifies outbound policy (to peerings, optional actions, and an announce filter), and 'default' specifies default routing.
