document: rfc-1493
kind: design-rationale
summary: 'The MIB was kept minimal by applying six criteria: start with a small essential set; require objects to be needed for fault or configuration management; consider evidence of actual use; limit total object count; exclude objects derivable from other MIBs; and instrument critical sections with at most one counter per layer.'
