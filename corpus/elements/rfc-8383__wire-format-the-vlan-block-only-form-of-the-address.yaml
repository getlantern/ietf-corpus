document: rfc-8383
kind: wire-format
summary: 'The VLAN Block Only form of the Address Flush message contains: K-nicks (1 byte, count of nicknames), a list of 16-bit Nicknames, K-VLBs (1 byte, count of VLAN blocks), and VLAN blocks each encoded as two 12-bit fields (Start.VLAN and End.VLAN) with 4 reserved bits each, for 32 bits per block total. Channel Protocol field is set to 0x009.'
section: "2.1"
topics:
    - routing
