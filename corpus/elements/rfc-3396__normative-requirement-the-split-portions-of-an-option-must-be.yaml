document: rfc-3396
kind: normative-requirement
summary: The split portions of an option MUST be stored in the aggregate option buffer in sequential order — the first split portion first, then the second, and so on. The encoding agent MUST NOT attempt to specify any semantic information based on how the option is split.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
