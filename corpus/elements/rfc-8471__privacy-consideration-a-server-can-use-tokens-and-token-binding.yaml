document: rfc-8471
kind: privacy-consideration
summary: A server can use tokens and Token Binding IDs to track clients. Client applications that automatically limit the lifetime or scope of tokens to maintain user privacy SHOULD apply the same validity time and scope limits to Token Binding keys.
section: "8"
rfc2119_level: SHOULD
topics:
    - privacy
    - tls
