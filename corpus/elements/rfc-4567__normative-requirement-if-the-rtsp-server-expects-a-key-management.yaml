document: rfc-4567
kind: normative-requirement
summary: If the RTSP server expects a key management message in a SETUP but none is included, a '403 Forbidden' SHOULD be returned and the setup MUST be aborted. If key management fails, error code 463 is used and the session is aborted.
section: "4.2"
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
