document: rfc-7630
kind: interoperability-note
summary: The HMAC-SHA-2 authentication protocols require the use of objects defined in the SNMP-USER-BASED-SM-MIB (RFC 3414). Implementations must use the usmUserTable from that MIB to configure which HMAC-SHA-2 protocol applies per user entry.
section: "7.1"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
