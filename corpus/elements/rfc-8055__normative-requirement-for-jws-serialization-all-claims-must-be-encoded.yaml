document: rfc-8055
kind: normative-requirement
summary: For JWS serialization, all claims MUST be encoded using lowercase characters, MUST appear in the order listed in Section 5.4, all claims except 'sip_date' MUST be StringOrURI JSON string values, 'sip_date' MUST be a JSON NumericDate, and the payload MUST follow JWK thumbprint construction rules (RFC 7638, Section 3, Step 1 only).
section: "5.5"
rfc2119_level: MUST
topics:
    - sip
    - jose
