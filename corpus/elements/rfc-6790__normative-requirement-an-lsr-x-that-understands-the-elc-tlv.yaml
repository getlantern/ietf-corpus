document: rfc-6790
kind: normative-requirement
summary: An LSR X that understands the ELC TLV MUST NOT include it in its own Label Mapping for FEC F if any received mapping for F lacks ELC. If all received mappings include ELC, X MUST advertise its mapping with ELC. If any neighbor's mapping changes, X MUST re-evaluate and re-advertise the updated ELC status.
section: 5.1.1
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
