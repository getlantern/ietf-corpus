document: rfc-6249
kind: normative-requirement
summary: Metalink clients MUST support HTTP and SHOULD support FTP. Clients MUST support Instance Digests in HTTP by requesting and verifying cryptographic hashes. Clients SHOULD support error recovery using partial file hashes from Metalink/XML files.
section: "2"
rfc2119_level: MUST
topics:
    - http
