document: rfc-4622
kind: interoperability-note
summary: 'XMPP IM applications must also handle im: and pres: URIs as specified by the CPIM and CPP profiles; the xmpp: scheme supplements rather than replaces these for the broader set of XMPP applications beyond instant messaging and presence.'
