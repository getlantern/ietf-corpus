document: rfc-3211
kind: interoperability-note
summary: There is no requirement that the CEK algorithm match the KEK encryption algorithm, but care should be taken to ensure equivalent security levels; wrapping a Triple-DES key with an RC2/40 key results in a severe impedance mismatch in encryption strength.
section: "2.2"
topics:
    - crypto
    - security
