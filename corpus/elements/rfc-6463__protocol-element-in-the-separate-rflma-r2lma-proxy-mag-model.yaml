document: rfc-6463
kind: protocol-element
summary: 'In the separate rfLMA/r2LMA (proxy-MAG) model, the rfLMA acts as a non-transparent proxy: it creates a proxy state, constructs a new PBU'' to the r2LMA containing all non-security mobility options from the original PBU plus an ACoA/A4CoA carrying the original MAG''s Proxy Care-of Address, then upon receiving the r2LMA''s PBA'' sends a final PBA to the MAG with the Redirect option.'
section: 5.3.2
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
