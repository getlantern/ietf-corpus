document: rfc-5658
kind: interoperability-note
summary: When a proxy does double Record-Routing with transport parameters and an intermediate proxy P2 is not Record-Routing, SIP elements downstream of P2 may be required to contact the upstream proxy using a transport (e.g., SCTP) that those elements do not support. P2 applying double Record-Routing would prevent this.
section: "6.2"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
