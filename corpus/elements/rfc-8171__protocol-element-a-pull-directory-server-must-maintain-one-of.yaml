document: rfc-8171
kind: protocol-element
summary: 'A Pull Directory server MUST maintain one of three cache-tracking methods of increasing specificity: Method 1 (per-Data-Label overall expiry, least record-keeping), Method 2 (per-address-set expiry, medium specificity), or Method 3 (per-TRILL-switch per-address-set expiry, most specific). Servers MUST support at least Method 1 and SHOULD support Methods 2 and 3.'
section: "3.3"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
