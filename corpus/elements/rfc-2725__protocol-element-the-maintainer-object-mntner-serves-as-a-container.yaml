document: rfc-2725
kind: protocol-element
summary: The maintainer object (mntner) serves as a container for authentication filters. It is referenced by name via mnt-by attributes in other objects to define authorization for operations on those objects. It must contain mnt-by and referral-by attributes.
section: "9.1"
