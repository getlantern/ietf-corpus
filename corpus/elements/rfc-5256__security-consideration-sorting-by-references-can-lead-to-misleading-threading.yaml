document: rfc-5256
kind: security-consideration
summary: 'Sorting by REFERENCES can lead to misleading threading trees. A message with false References: header data will cause its thread to be incorporated into another thread. The base subject extraction process may also lead to incorrect collation if extracted subject artifacts were significant text.'
section: "6"
topics:
