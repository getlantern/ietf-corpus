document: rfc-6275
kind: normative-requirement
summary: Manual configuration of IPsec security associations MUST be supported. Shared secrets MUST be random, unique for different mobile nodes, and MUST be distributed off-line. IKEv2 automatic key management MAY be supported.
section: "5.1"
rfc2119_level: MUST
topics:
