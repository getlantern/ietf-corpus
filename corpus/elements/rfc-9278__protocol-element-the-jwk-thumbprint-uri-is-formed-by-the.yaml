document: rfc-9278
kind: protocol-element
summary: 'The JWK Thumbprint URI is formed by the prefix ''urn:ietf:params:oauth:jwk-thumbprint'' followed by a colon, a hash algorithm identifier, a colon, and the JWK Thumbprint value. Example: urn:ietf:params:oauth:jwk-thumbprint:sha-256:NzbLsXh8uDCcd-6MNwXF4W_7noWXFZAfHkxZsRGC9Xs.'
