document: rfc-5666
kind: normative-requirement
summary: The use of RDMA by RPC MUST NOT introduce any vulnerabilities to system memory contents or to memory owned by user processes. Any RDMA provider used for RPC transport is REQUIRED to be conformant to RFC 5042.
section: "11"
rfc2119_level: MUST NOT
topics:
    - security
