document: rfc-3949
kind: protocol-element
summary: Profile M (Mixed Raster Content, Section 8) uses a 3-layer model — mask (bi-level), foreground (color/grayscale), and background (color/grayscale) — represented as child IFDs linked from a primary IFD via the SubIFDs field. A new StripRowCounts field allows variable scanlines per strip.
