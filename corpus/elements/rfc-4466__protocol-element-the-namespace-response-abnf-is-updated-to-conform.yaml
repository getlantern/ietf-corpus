document: rfc-4466
kind: protocol-element
summary: The Namespace-Response ABNF is updated to conform to RFC 4234 ABNF syntax and to reference RFC 3501 non-terminals. The three namespace slots are Personal, Other Users', and Shared. Namespace-Response-Extension allows attribute/value extension pairs.
