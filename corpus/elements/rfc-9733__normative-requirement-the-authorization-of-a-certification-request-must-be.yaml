document: rfc-9733
kind: normative-requirement
summary: The authorization of a certification request MUST be performed based on an authenticated self-contained object cryptographically bound to the pledge's IDevID credentials. The certification request MAY then be transferred using any mechanism or protocol.
section: "4.1"
rfc2119_level: MUST
topics:
