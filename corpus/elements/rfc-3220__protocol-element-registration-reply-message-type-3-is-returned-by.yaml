document: rfc-3220
kind: protocol-element
summary: 'Registration Reply message (Type 3) is returned by the home agent (possibly relayed by foreign agent) and contains: Type (1 byte), Code (1 byte indicating accept/deny reason), Lifetime (2 bytes), Home Address (4 bytes), Home Agent (4 bytes), Identification (8 bytes), followed by extensions. Code 0 indicates acceptance; codes 64-88 denote foreign agent denials; codes 128-136 denote home agent denials.'
section: "3.4"
