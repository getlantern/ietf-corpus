document: rfc-7784
kind: design-rationale
summary: The TRILL OAM MIB uses the IEEE8021-CFM-MIB as its basis and augments existing CFM tables rather than defining a standalone MIB. This avoids duplicating objects that are common to both Ethernet OAM and TRILL OAM, minimizing overlap while reusing proven management infrastructure.
