document: rfc-5746
kind: protocol-element
summary: A new TLS extension `renegotiation_info` (extension type 0xff01) is defined, containing a `RenegotiationInfo` structure. On an initial handshake, the `renegotiated_connection` field is zero-length in both ClientHello and ServerHello; on renegotiation it carries the prior verify_data values to cryptographically bind the renegotiation to the enclosing connection.
section: "3.2"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
