document: rfc-9704
kind: security-consideration
summary: The ADNs of authorized local encrypted resolvers are revealed in the owner names of Verification Records, potentially exposing sensitive resolver names or secret subdomain information; local resolvers should be given names that do not reveal sensitive information to mitigate this.
