document: rfc-2561
kind: normative-requirement
summary: All entries in the tn3270eTcpConnTable belonging to a deleted TN3270E server MUST also be removed. Deleting a tn3270eSrvrConfEntry cascades to remove associated entries from tn3270eSrvrPortTable, tn3270eSrvrStatsTable, tn3270eClientGroupTable, tn3270eResPoolTable, tn3270eSnaMapTable, tn3270eClientResMapTable, and tn3270eResMapTable.
section: "4.0"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
