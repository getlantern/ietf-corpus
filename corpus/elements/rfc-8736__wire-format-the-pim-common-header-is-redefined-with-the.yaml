summary: 'The PIM common header is redefined with the 8-bit Reserved field renamed to ''Flag Bits'': PIM Ver (4 bits), Type (4 bits), Flag Bits (8 bits), Checksum (16 bits). All other fields remain unchanged from RFC 7761 Section 4.9.'
