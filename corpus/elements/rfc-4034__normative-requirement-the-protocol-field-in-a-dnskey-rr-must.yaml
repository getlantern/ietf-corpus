document: rfc-4034
kind: normative-requirement
summary: The Protocol Field in a DNSKEY RR MUST have value 3. If it is found to be any other value during signature verification, the DNSKEY RR MUST be treated as invalid.
section: 2.1.2
rfc2119_level: MUST
topics:
