summary: 'BUNDLE group lifecycle: (1) Initial BUNDLE offer — offerer proposes ''group:BUNDLE'' with suggested offerer-tagged ''m='' section; (2) Initial BUNDLE answer — answerer selects offerer-tagged and answerer-tagged sections, BUNDLE group is created; (3) Subsequent offer/answer — uses previously negotiated group with mandatory BUNDLE address:port on all bundled sections.'
