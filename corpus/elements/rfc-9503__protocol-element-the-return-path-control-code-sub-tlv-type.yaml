document: rfc-9503
kind: protocol-element
summary: The Return Path Control Code Sub-TLV (Type=1, Length=4) contains a 32-bit Control Code Flags field. Bit 31 (Reply Request Flag) set to 0x0 means no reply requested; set to 0x1 means reply requested on the same incoming link.
