document: rfc-2491
kind: wire-format
summary: 'Multicast IPv6 packets over NBMA networks using LLC/SNAP encapsulation SHALL use: [0xAA-AA-03 (LLC)][0x00-00-5E (OUI)][0x00-01 (PID)][pkt$cmi (2 octets, Cluster Member ID)][0x86DD][IPv6 packet]. The driver''s CMI SHALL be copied into the 2-octet pkt$cmi field.'
section: 4.4.2
topics:
