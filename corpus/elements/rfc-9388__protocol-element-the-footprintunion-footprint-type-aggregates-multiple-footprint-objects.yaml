document: rfc-9388
kind: protocol-element
summary: The 'footprintunion' footprint type aggregates multiple footprint objects into a single unified object, providing additive semantics to complement the narrowing semantics of RFC 8008. The footprint-value for a 'footprintunion' is an array of footprint objects of any type other than 'footprintunion'.
section: "2.2"
