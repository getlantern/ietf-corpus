document: rfc-7515
kind: normative-requirement
summary: All JSON string comparisons for Header Parameter names and algorithm names MUST use the equality rules from RFC 7159 Section 8.3 (verbatim comparison after escape processing), except for 'typ' and 'cty' values. Unicode escape sequences must be compared literally.
section: "5.3"
rfc2119_level: MUST
topics:
    - jose
    - json
    - security
