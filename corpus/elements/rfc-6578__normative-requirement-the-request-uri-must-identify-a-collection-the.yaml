document: rfc-6578
kind: normative-requirement
summary: The request-URI MUST identify a collection. The request body MUST be a DAV:sync-collection XML element containing one DAV:sync-token, one DAV:sync-level, one DAV:prop, and optionally one DAV:limit element. This report is only defined when Depth header is '0'.
section: "3.2"
rfc2119_level: MUST
topics:
