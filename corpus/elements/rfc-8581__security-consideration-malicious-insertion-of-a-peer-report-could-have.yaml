document: rfc-8581
kind: security-consideration
summary: 'Malicious insertion of a peer report could have greater impact than an endpoint report, since agents are concentration points: a forged peer report could throttle all traffic to a Diameter network, especially for an edge agent serving as entry point from other networks. Mitigation strategies are the same as those in RFC 7683.'
section: "9"
topics:
    - diameter
    - security
