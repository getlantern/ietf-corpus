document: rfc-1782
kind: state-machine
summary: 'For a Write Request with options, the server may respond with: OACK (acknowledges WRQ and options), ACK (acknowledges WRQ but not options, initiating normal transfer), or ERROR (request denied). The client confirms OACK acceptance by sending the first DATA packet using negotiated values.'
