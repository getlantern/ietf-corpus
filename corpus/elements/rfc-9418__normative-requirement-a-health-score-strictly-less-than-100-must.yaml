document: rfc-9418
kind: normative-requirement
summary: A health score strictly less than 100 must be explained by at least one currently active symptom with a `health-score-weight` greater than 0. This invariant links the numerical health score to observable symptoms.
section: "3.2"
rfc2119_level: MUST
