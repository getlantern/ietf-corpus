document: rfc-6086
kind: protocol-element
summary: The Recv-Info header field is used by a UA to indicate, on a per-dialog basis, the set of Info Packages for which it is willing to receive INFO requests. It can appear in INVITE, UPDATE, REGISTER requests and their 1xx/2xx responses, and in 469 responses to INFO requests. An empty Recv-Info signals support of the mechanism but unwillingness to receive any Info Package.
section: "7.3"
topics:
    - sip
    - realtime
