document: rfc-5910
kind: normative-requirement
summary: The server MUST support use of only one interface form (DS Data or Key Data) across all <secDNS:create>, <secDNS:update>, and <secDNS:infData> elements, except during a defined transition period during which the server MAY support both on a per-domain basis.
section: "4"
rfc2119_level: MUST
topics:
    - dns
    - security
