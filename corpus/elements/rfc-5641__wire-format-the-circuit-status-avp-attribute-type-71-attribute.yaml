document: rfc-5641
kind: wire-format
summary: 'The Circuit Status AVP (Attribute Type 71) Attribute Value field is a 16-bit bitmap. The original format defined two bits: (A) Active at bit 15 (0x0001) and (N) New at bit 14 (0x0002). This document extends it to add five more bits: (R) at 13 (0x0004), (T) at 12 (0x0008), (I) at 11 (0x0010), (E) at 10 (0x0020), and (S) at 9 (0x0040), with remaining bits reserved.'
section: "2"
topics:
