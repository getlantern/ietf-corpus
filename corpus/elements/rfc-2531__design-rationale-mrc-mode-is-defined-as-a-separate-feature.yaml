document: rfc-2531
kind: design-rationale
summary: MRC-mode is defined as a separate feature tag distinct from image-file-structure because an MRC formatted document may appear within a TIFF file structure, so the combination of file structure and MRC capability cannot be collapsed into a single tag without losing expressive power.
section: "3.7"
