document: rfc-9560
kind: normative-requirement
summary: Server operators MUST NOT log, track, or record any association of the query and the end user's identity if the end user is successfully identified and authorized, if 'rdap_dnt_allowed' is present with value true, and if accepting the claim complies with local regulations regarding logging and tracking.
section: 3.1.5.2
rfc2119_level: MUST NOT
topics:
    - privacy
    - security
