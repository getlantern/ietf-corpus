document: rfc-9483
kind: normative-requirement
summary: The senderNonce MUST be cryptographically secure fresh 128 random bits. The recipNonce MUST be absent in the first message and MUST equal the senderNonce of the previous message in all other messages.
section: "3.1"
rfc2119_level: MUST
