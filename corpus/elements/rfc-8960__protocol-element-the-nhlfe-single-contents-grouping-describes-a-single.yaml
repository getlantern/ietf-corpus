document: rfc-8960
kind: protocol-element
summary: The 'nhlfe-single-contents' grouping describes a single NHLFE using the 'rt-types:mpls-label-stack' grouping. The 'nhlfe-multiple-contents' grouping extends this with 'index', 'backup-index', 'loadshare' (uint16, default 1), and 'role' leaves to support multipath and protection scenarios.
