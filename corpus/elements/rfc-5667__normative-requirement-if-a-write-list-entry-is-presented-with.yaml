document: rfc-5667
kind: normative-requirement
summary: If a Write list entry is presented with non-zero segments, the corresponding READ or READLINK MUST return its data via RDMA Write to that buffer. If the entry has zero segments or total size zero, the operation MUST return its result inline.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
