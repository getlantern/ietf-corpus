document: rfc-8383
kind: normative-requirement
summary: For Type 2 (Bit Map of VLANs) TLV, Length MUST be at least 2. If Length is 0 or 1, the TLV is corrupt and the Address Flush message MUST be discarded.
section: 2.2.2
rfc2119_level: MUST
