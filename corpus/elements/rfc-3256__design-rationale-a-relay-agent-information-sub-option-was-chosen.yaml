document: rfc-3256
kind: design-rationale
summary: A Relay Agent Information sub-option was chosen over a new or existing DHCP option because CPE Controlled Cable Modems (CCCMs) have modem firmware controlling DOCSIS signaling while the attached CPE manages DHCP. Trusting the modem firmware for device class signaling is considered more secure than trusting software on the attached computer.
section: "1"
topics:
