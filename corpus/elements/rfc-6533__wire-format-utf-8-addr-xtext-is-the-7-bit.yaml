summary: utf-8-addr-xtext is the 7-bit safe form consisting of QCHAR (ASCII printable excluding CTLs, SP, '\', '+', '=') and EmbeddedUnicodeChar sequences; utf-8-addr-unitext additionally allows UTF8-2/3/4 multi-byte sequences (QUCHAR) and must conform to utf-8-address when dequoted.
