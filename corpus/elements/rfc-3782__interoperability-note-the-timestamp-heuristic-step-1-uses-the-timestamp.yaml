document: rfc-3782
kind: interoperability-note
summary: The timestamp heuristic (Step 1**) uses the timestamp echoed in the last non-duplicate ACK to distinguish a dropped retransmission from spurious duplicate ACKs, but can fail if the receiver echoes timestamps arbitrarily or if the timeout was spurious.
