document: rfc-4372
kind: protocol-element
summary: A nul CUI is a CUI attribute whose String field contains a single NUL character (0x00), used by a RADIUS client in an initial Access-Request to signal support for and request a CUI from the home RADIUS server. During re-authentication, a previously received non-nul CUI value is sent instead.
section: "2.1"
topics:
    - radius
