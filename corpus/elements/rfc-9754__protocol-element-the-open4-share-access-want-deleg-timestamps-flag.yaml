document: rfc-9754
kind: protocol-element
summary: The OPEN4_SHARE_ACCESS_WANT_DELEG_TIMESTAMPS flag (0x100000) allows client and server to negotiate that the client will be the authoritative proxy for fattr4_time_deleg_access and fattr4_time_deleg_modify, with those values returned to the server upon DELEGRETURN.
