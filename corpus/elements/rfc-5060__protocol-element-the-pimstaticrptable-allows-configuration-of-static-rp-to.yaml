kind: protocol-element
summary: The pimStaticRPTable allows configuration of static RP-to-group-prefix mappings, and the pimAnycastRPSetTable allows configuration of anycast-RP sets (RFC 4610), listing each RP peer address within the set. Both tables feed into pimGroupMappingTable with configRp origin.
