document: rfc-4819
kind: design-rationale
summary: Implementations MAY use the first 15 bytes of the version packet as a 'magic cookie' (0x00 0x00 0x00 0x0F 0x00 0x00 0x00 0x07 0x76 0x65 0x72 0x73 0x69 0x6F 0x6E) to avoid processing spurious output from the user's shell, as described in Section 6.5 of the SSH Connection Protocol.
section: "3.4"
topics:
