summary: 'A boundary condition exists when the 10-second unavailability determination window crosses the 900-second statistics interval boundary: successive GETs of dsx3IntervalPSESs and dsx3IntervalUASs may return differing values. This is documented as an unavoidable side-effect of the chosen managed-object design.'
