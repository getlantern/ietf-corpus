summary: 'When TESLA is used, the SRTP cryptographic context SHALL be extended with 11 transform-dependent parameters: TESLA PRF identifier, key-chain output length n_p, F''-output length n_f, TESLA MAC identifier, TESLA MAC output length n_m, session start T_0, interval duration T_int, key-disclosure delay d, clock-drift bound D_t, key-chain length n_c, and the initial committed key.'
