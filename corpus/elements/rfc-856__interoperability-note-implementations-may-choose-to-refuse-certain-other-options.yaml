document: rfc-856
kind: interoperability-note
summary: Implementations may choose to refuse certain other options (e.g., the EBCDIC transmission option) while binary transmission is in effect, though simultaneous operation of compatible options (such as echo mode with binary mode) is permissible if both hosts support it.
