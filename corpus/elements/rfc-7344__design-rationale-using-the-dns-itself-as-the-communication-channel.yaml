document: rfc-7344
kind: design-rationale
summary: Using the DNS itself as the communication channel for DS updates was chosen over push-based mechanisms (e.g., DNS UPDATE) because finding the Parental Agent/server to push to proved unresolvable in practice — that approach failed to reach consensus.
