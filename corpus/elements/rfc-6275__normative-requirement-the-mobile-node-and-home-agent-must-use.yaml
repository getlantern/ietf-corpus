document: rfc-6275
kind: normative-requirement
summary: The mobile node and home agent MUST use an IPsec security association to protect Binding Updates and Acknowledgements. Both MUST support and SHOULD use ESP in transport mode with a non-NULL payload authentication algorithm to provide data origin authentication, connectionless integrity, and optional anti-replay protection.
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
