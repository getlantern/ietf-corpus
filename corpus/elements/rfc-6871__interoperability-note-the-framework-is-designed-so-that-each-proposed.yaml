document: rfc-6871
kind: interoperability-note
summary: The framework is designed so that each proposed configuration in an offer can be straightforwardly translated into a conventional SDP media block without capability negotiation attributes. Endpoints that do not understand 'med-v0' ignore the capability attributes and fall back to the base 'm=' line configuration, which should represent the minimum acceptable configuration.
section: 3.4.1
topics:
