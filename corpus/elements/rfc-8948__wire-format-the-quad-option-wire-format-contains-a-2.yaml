document: rfc-8948
kind: wire-format
summary: The QUAD option wire format contains a 2-byte option-code (OPTION_SLAP_QUAD = 140), a 2-byte option-len (2 * number of quadrant/preference pairs), followed by pairs of 1-byte quadrant-n (0=AAI, 1=ELI, 2=Reserved, 3=SAI) and 1-byte pref-n fields. Each quadrant identifier MUST appear at most once in the option.
section: "4.1"
topics:
    - ip
