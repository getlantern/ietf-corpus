document: rfc-4992
kind: security-consideration
summary: The SASL service name for IRIS-XPC is "iris-xpc". SASL mechanism negotiation occurs via version information (vi) chunks and may be used both before and after security mechanism installation. To abort an ongoing SASL exchange, clients or servers MUST close the connection.
section: "14.2"
topics:
    - security
