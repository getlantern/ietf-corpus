document: rfc-5864
kind: normative-requirement
summary: DNS SRV RRs SHOULD be discarded after their TTL and the DNS query repeated. Any information derived from DNS SRV RRs, such as preference ranks, MUST be discarded when the DNS SRV RR expires.
section: "4"
rfc2119_level: MUST
topics:
    - dns
