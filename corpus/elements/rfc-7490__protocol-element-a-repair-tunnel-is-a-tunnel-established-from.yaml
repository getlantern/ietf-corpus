document: rfc-7490
kind: protocol-element
summary: A repair tunnel is a tunnel established from the Point of Local Repair (PLR) to a PQ node so that the PQ node functions as a virtual loop-free alternate neighbor. The tail end of the tunnel is the PQ node, not the far-end router E of the protected link.
section: "4.1"
topics:
    - routing
    - mpls
