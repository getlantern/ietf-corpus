document: rfc-8431
kind: protocol-element
summary: 'The sharing-flag boolean on a nexthop indicates whether it is sharable (true: can be shared across multiple routes) or non-sharable (false: exclusive to one route). The nexthop-id (uint32) is a server-allocated identifier returned by nh-add that other routes reference for shared nexthop use.'
section: "2.4"
topics:
    - yang
    - routing
