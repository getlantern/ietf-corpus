document: rfc-4292
kind: protocol-element
summary: inetCidrRouteDestType (InetAddressType) specifies the address family of inetCidrRouteDest. Only address types that can appear in an actual routing table are permitted; this enables a single MIB to manage both IPv4 and IPv6 forwarding entries.
