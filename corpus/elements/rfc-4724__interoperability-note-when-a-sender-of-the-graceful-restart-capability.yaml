document: rfc-4724
kind: interoperability-note
summary: When a sender of the Graceful Restart Capability includes no <AFI, SAFI> tuples, it indicates inability to preserve forwarding state but support for Receiving Speaker procedures. In that case the Restart Time value is irrelevant. This allows partial deployment where only receiving-side behavior is implemented.
section: "3"
topics:
    - bgp
    - routing
