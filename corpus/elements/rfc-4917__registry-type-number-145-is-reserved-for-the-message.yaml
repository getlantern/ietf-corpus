summary: 'Type number 145 is reserved for the Message String Extension from the skippable mobility extensions space (128-255) for Mobile IPv4. A new subtype space is created for this extension type: subtype 1 for Home Agent use and subtype 2 for Foreign Agent use. Future subtype allocations require expert review.'
