document: rfc-2470
kind: security-consideration
summary: 'Token Ring, like most broadcast LAN technologies, has inherent security vulnerabilities: any sender can claim the identity of another and forge traffic. Higher layers are responsible for taking appropriate steps in environments where such vulnerabilities are unacceptable.'
