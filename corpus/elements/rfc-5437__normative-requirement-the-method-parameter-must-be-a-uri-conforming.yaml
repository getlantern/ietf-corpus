document: rfc-5437
kind: normative-requirement
summary: The 'method' parameter MUST be a URI conforming to the xmpp URI scheme that identifies an XMPP account associated with the email inbox. The processing application MUST extract an XMPP address from the URI per RFC 5122 rules, and the resulting address MUST be encapsulated as the value of the XMPP 'to' attribute.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - syslog
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
