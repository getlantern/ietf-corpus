document: rfc-4577
kind: design-rationale
summary: PE routers are treated as OSPF area 0 (backbone) routers, allowing them to distribute inter-area routes via type 3 LSAs to CE routers in non-zero areas, and allowing multiple disconnected legacy OSPF backbone segments to remain interconnected during a phased migration to the VPN service.
section: 4.1.4
topics:
