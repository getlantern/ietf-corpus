document: rfc-8349
kind: security-consideration
summary: The writable data nodes in the 'ietf-routing', 'ietf-ipv4-unicast-routing', and 'ietf-ipv6-unicast-routing' modules (including static routes and control-plane protocol configuration) are security-sensitive because unauthorized modification could redirect or black-hole traffic; access MUST be restricted to authorized principals via appropriate NETCONF access control.
section: "11"
topics:
    - yang
    - security
    - routing
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
