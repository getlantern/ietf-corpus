document: rfc-1772
kind: design-rationale
summary: When operating BGP over Switched Virtual Circuits, eliminating periodic KEEPALIVE messages reduces SVC traffic costs. A circuit manager providing link-layer failure detection within a predictable finite period compensates for the absence of KEEPALIVEs.
