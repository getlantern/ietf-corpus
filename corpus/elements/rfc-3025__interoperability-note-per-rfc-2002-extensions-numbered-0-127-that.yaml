document: rfc-3025
kind: interoperability-note
summary: Per RFC 2002, extensions numbered 0-127 that are unrecognized in a registration message must be silently discarded. CVSE-TYPE-NUMBER (37) falls in this range, so the RFC clarifies that the CVSE-specific error handling applies when the type is recognized but the vendor ID or vendor type is not supported.
section: "2.3"
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
