document: rfc-7716
kind: protocol-element
summary: GTM uses the same SAFI 5 (MCAST-VPN) routes and NLRI format as defined in RFC 6514, with the key adaptation that the RD field is always set to zero. All MCAST-VPN route types (I-PMSI A-D, S-PMSI A-D, Leaf A-D, Source Active A-D, C-multicast Shared/Source Tree Joins) are reused with minimal modifications.
section: "2"
topics:
