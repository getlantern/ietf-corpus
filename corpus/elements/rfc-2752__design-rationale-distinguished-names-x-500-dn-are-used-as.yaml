document: rfc-2752
kind: design-rationale
summary: Distinguished Names (X.500 DN) are used as POLICY_LOCATOR values because DNs are unique per user or application, making them suitable as keys for locating admission policy in a directory. Both ASCII and UNICODE forms are supported to accommodate different deployment environments.
section: 3.3.1
