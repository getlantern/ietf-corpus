document: rfc-2938
kind: interoperability-note
summary: Protocol processors conforming to RFC 2533 can handle feature set references without explicit knowledge of their meaning, because the applicable interpretation and processing rules of RFC 2533 apply equally to expressions containing feature set references. This ensures backward compatibility.
section: "2"
