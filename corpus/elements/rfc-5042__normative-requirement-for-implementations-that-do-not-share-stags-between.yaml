document: rfc-5042
kind: normative-requirement
summary: For implementations that do not share STags between Streams, each Stream MUST either be in a separate Protection Domain or the scope of an STag MUST be limited to a single Stream, preventing cross-stream STag spoofing attacks.
section: 6.1.1
rfc2119_level: MUST
topics:
    - security
