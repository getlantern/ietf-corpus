document: rfc-8896
kind: security-consideration
summary: Calendar values, especially those marked 'repeated', are statistical predictions; future events may invalidate them. Clients should treat Calendar values as advisory, and it is RECOMMENDED that both Clients and Servers support ALTO SSE (RFC 8895) to receive immediate updates when Calendar values change.
section: "7"
topics:
