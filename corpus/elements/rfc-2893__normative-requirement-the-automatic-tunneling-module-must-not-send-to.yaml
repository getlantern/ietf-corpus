document: rfc-2893
kind: normative-requirement
summary: The automatic tunneling module MUST NOT send to IPv4 broadcast or multicast destinations. It MUST drop all IPv6 packets destined to IPv4-compatible addresses where the embedded IPv4 part is broadcast, multicast, 0.0.0.0, or the loopback address 127.0.0.1.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
