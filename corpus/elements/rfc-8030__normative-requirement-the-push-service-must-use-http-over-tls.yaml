document: rfc-8030
kind: normative-requirement
summary: The push service MUST use HTTP over TLS (RFC 2818) following the recommendations in RFC 7525. This applies to all communications between the user agent and the push service, and between the application server and the push service.
section: "3"
rfc2119_level: MUST
topics:
    - http
    - tls
    - security
