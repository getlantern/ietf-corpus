document: rfc-5778
kind: protocol-element
summary: The MIP-MN-HA-MSA AVP (AVP Code 492, Grouped) contains session-related information for the Mobile IPv6 Authentication Protocol, including MIP-Session-Key (mandatory), MIP-MSA-Lifetime (mandatory), and optionally MIP-MN-HA-SPI, MIP-Algorithm-Type, and MIP-Replay-Mode. Absence of MIP-Replay-Mode MUST be treated as no replay protection selected.
section: "6.12"
topics:
    - diameter
    - mobility
    - crypto
