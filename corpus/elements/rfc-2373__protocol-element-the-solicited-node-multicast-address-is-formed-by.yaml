document: rfc-2373
kind: protocol-element
summary: The Solicited-Node multicast address is formed by appending the low-order 24 bits of a unicast or anycast address to the prefix FF02:0:0:0:0:1:FF00::/104. A node must compute and join the Solicited-Node multicast address for every unicast and anycast address it is assigned.
section: 2.7.1
topics:
    - ip
    - v6ops
    - multicast
