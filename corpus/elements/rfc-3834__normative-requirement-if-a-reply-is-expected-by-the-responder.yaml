document: rfc-3834
kind: normative-requirement
summary: If a reply is expected by the responder, the Reply-To field SHOULD be set to the address at which the reply is expected. Responders which request replies to be sent to other responders MUST prevent mail loops and sorcerer's apprentice mode.
section: 3.1.2
rfc2119_level: MUST
topics:
    - email
