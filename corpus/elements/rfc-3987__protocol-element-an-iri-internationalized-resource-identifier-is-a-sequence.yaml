kind: protocol-element
summary: An IRI (Internationalized Resource Identifier) is a sequence of characters from the Universal Character Set (Unicode/ISO 10646) that extends URI syntax by adding UCS characters beyond U+007F to the unreserved character class, while keeping the same component structure and reserved character semantics as RFC 3986 URIs.
