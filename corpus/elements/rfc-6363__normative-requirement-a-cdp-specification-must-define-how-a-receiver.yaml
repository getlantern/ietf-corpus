document: rfc-6363
kind: normative-requirement
summary: A CDP specification MUST define how a receiver determines a minimum length of time it needs to wait to receive FEC repair packets for any given source block. FEC schemes MAY define limitations such as maximum source block sizes but SHOULD NOT define specific ADU-to-block mappings.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
