document: rfc-4997
kind: protocol-element
summary: The ENFORCE statement adds predicates to a format that must all be fulfilled for the format to succeed. It binds a single field attribute via a boolean expression; if the expression evaluates to false the format cannot be used, if undefined the binding is created and the format proceeds.
section: "4.9"
extracted_by: claude-sonnet-4-6
