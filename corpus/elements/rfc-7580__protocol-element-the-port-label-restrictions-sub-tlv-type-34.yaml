document: rfc-7580
kind: protocol-element
summary: The Port Label Restrictions sub-TLV (Type 34) is a sub-TLV of the Link TLV defined in RFC 3630. It describes label restrictions that a network element and link may impose on a port, indicating which labels may or may not be used. The sub-TLV may occur more than once to specify complex port constraints within the Link TLV.
section: "3.1"
topics:
