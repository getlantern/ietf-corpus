document: rfc-7613
kind: interoperability-note
summary: For password migration from RFC 4013, service providers should be aware that passwords containing characters with compatibility equivalents (e.g., LATIN SMALL LETTER LONG S U+017F) that matched under NFKC may no longer match under NFC; however, passwords are often not stored in the clear, so migration may not require data scrubbing.
section: "6.2"
topics:
    - security
    - crypto
