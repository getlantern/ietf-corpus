document: rfc-7688
kind: design-rationale
summary: Typical WSON node configurations (several hundreds of channels with an OEO element) produce Optical Node Property TLVs of less than 350 bytes, well within IP MTU. For rare cases exceeding the MTU, IP fragmentation/reassembly or packing sub-TLVs into separate LSAs are acceptable methods.
