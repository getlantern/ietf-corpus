document: rfc-5566
kind: design-rationale
summary: Requiring IPsec uniformly across all data packets on a given interface (rather than selectively) eliminates dependence on IPsec selector mechanisms to distinguish protected from unprotected traffic, simplifying policy and reducing the risk of misconfiguration.
