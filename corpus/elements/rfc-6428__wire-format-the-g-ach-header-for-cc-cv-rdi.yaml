document: rfc-6428
kind: wire-format
summary: 'The G-ACh header for CC/CV/RDI is a 32-bit field: first nibble 0001b identifies the G-ACh, followed by Version and Flags (both set to 0), and a 16-bit BFD CC/CV code point (0x0022 for CC, 0x0023 for CV).'
