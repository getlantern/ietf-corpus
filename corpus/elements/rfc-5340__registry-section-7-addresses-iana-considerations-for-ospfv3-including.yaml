document: rfc-5340
kind: registry
summary: Section 7 addresses IANA considerations for OSPFv3 including deprecation of MOSPF-related fields. OSPFv3 defines new LSA type codepoints (0x2001 router-LSA, 0x2002 network-LSA, 0x2003 inter-area-prefix-LSA, 0x2004 inter-area-router-LSA, 0x4005 AS-external-LSA, 0x2007 NSSA-LSA, 0x0008 link-LSA, 0x2009 intra-area-prefix-LSA) with the upper 3 bits of the 16-bit LS type encoding the U-bit and flooding scope.
section: "7"
topics:
