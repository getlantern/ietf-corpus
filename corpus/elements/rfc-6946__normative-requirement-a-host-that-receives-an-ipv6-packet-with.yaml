document: rfc-6946
kind: normative-requirement
summary: A host that receives an IPv6 packet with a Fragment Header where Fragment Offset equals 0 and M flag equals 0 MUST process that packet in isolation from any other packets or fragments, even if those packets share the same {IPv6 Source Address, IPv6 Destination Address, Fragment Identification} tuple.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
