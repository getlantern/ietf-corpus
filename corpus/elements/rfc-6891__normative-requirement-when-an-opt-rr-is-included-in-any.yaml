document: rfc-6891
kind: normative-requirement
summary: When an OPT RR is included in any DNS message, it MUST be the only OPT RR in that message. If a query message with more than one OPT RR is received, a FORMERR (RCODE=1) MUST be returned.
section: 6.1.1
rfc2119_level: MUST
topics:
    - dns
