document: rfc-4314
kind: normative-requirement
summary: When any of the 'delete' member rights (e, t, x) is set in a list of rights, the server MUST also include the 'd' right when returning the list in a MYRIGHTS or ACL response, to enable older RFC 2086 clients to work with newer servers.
section: 2.1.1
rfc2119_level: MUST
topics:
    - email
