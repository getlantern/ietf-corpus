document: rfc-2508
kind: design-rationale
summary: Full-duplex operation is preferred over simplex because an explicit CONTEXT_STATE error signal on the reverse path shortens recovery delay substantially and reduces overhead in the no-error case compared to the periodic-refresh approach required for simplex links.
