document: rfc-2446
kind: normative-requirement
summary: In a VEVENT REPLY, the optional properties (those listed as '0+' or '0 or 1') MUST NOT be changed from those of the original REQUEST. If property changes are desired, the COUNTER method must be used instead.
section: 3.2.3
rfc2119_level: MUST NOT
