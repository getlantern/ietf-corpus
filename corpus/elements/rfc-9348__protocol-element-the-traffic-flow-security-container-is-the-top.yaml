document: rfc-9348
kind: protocol-element
summary: The traffic-flow-security container is the top-level IP-TFS configuration grouping, placed under ipsec-sa-cfg in both IKE and IKE-less SPD entries for read-write configuration, and under child-sa-info and sad-entry as read-only operational state. It holds all IP-TFS control parameters including congestion-control, packet-size, tunnel-rate, dont-fragment, max-aggregation-time, window-size, send-immediately, and lost-packet-timer-interval.
section: "3.1"
topics:
    - ipsec
    - yang
    - netconf
