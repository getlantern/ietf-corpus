document: rfc-8999
kind: wire-format
summary: A Version Negotiation packet uses the long-header form with the Version field set to 0x00000000, followed by Destination and Source Connection ID fields, then a list of 32-bit Supported Version fields. The 7 bits after the Header Form bit are labeled Unused and carry no defined semantics.
