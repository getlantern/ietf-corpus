document: rfc-7518
kind: protocol-element
summary: EC JWK public keys require 'crv' (P-256, P-384, or P-521), 'x', and 'y' parameters as base64url-encoded coordinate octet strings whose length MUST be the full coordinate size for the curve. Private keys additionally require 'd' with length ceiling(log2(n)/8) octets. SEC1 point compression is not supported.
section: "6.2"
