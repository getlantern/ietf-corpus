document: rfc-5246
kind: security-consideration
summary: 'RSA-encrypted PreMaster Secret: the client-offered version number inside the PKCS#1-encrypted blob must be checked against the version in ClientHello; TLS 1.2 tightened this check and prescribes generating a random premaster secret on mismatch (rather than aborting) to prevent Bleichenbacher-style version oracle attacks.'
section: 7.4.7.1
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
