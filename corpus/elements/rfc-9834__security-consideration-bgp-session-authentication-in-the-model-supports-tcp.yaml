document: rfc-9834
kind: security-consideration
summary: BGP session authentication in the model supports TCP Authentication Option (TCP-AO per RFC 5925) and MD5 via key chains (RFC 8177), consistent with RFC 4364 Section 13.2. TCP-AO key chains should cover SendID and RecvID beyond the RFC 8177 baseline.
section: 5.2.5.3.2
topics:
    - yang
    - bgp
    - security
