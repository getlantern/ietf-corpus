document: rfc-2250
kind: wire-format
summary: 'The MPEG Video-specific header is a 32-bit field appended after the RTP fixed header on every video ES packet. Fields: MBZ (5 bits, reserved zero), T (1 bit, MPEG-2 extension present), TR (10 bits, temporal reference 0–1023), AN (1 bit, active N-bit), N (1 bit, new picture header), S (1 bit, sequence-header-present), B (1 bit, beginning-of-slice), E (1 bit, end-of-slice), P (3 bits, picture type), FBV (1 bit), BFC (3 bits), FFV (1 bit), FFC (3 bits).'
section: "3.4"
topics:
    - rtp
    - realtime
