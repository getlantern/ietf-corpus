document: rfc-8941
kind: normative-requirement
summary: When parsing from HTTP fields, implementations MUST have behavior that is indistinguishable from following the specified parsing algorithms. If there is disagreement between the parsing algorithms and ABNF, the algorithms take precedence.
section: "1.2"
rfc2119_level: MUST
topics:
    - http
