document: rfc-3032
kind: protocol-element
summary: The MPLS Control Protocol (MPLSCP) is a PPP NCP responsible for enabling and disabling label switching on a PPP link. It uses the same packet exchange mechanism as LCP, but with PPP Protocol field value hex 8281 and supports only Codes 1-7. Labeled packets may only be sent after MPLSCP reaches the Opened state.
section: "4.2"
topics:
