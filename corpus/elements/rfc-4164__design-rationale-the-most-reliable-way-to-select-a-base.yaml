document: rfc-4164
kind: design-rationale
summary: The most reliable way to select a base context is to choose one for which at least the static part to be replicated has previously been acknowledged by the decompressor using the CRC option. This is necessary because RFC 3095 does not explicitly define context state management between compressor and decompressor, so no more than a high degree of confidence can be achieved.
section: 3.3.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
