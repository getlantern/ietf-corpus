document: rfc-2273
kind: normative-requirement
summary: When forwarding requests between SNMP versions and the outgoing version is SNMPv1 while the incoming is SNMPv2 or SNMPv3 (or vice versa), the proxy forwarder MUST apply the translation rules documented in RFC 1908.
section: 3.5.1.1
rfc2119_level: MUST
topics:
    - snmp
