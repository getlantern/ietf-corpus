document: rfc-9048
kind: normative-requirement
summary: In 5G deployments, when AT_KDF_INPUT contains the prefix '5G:' and AT_KDF=1 with full authentication, the peer identity used in key derivation MUST be as specified in 3GPP TS 33.501 Annex F.3 and TS 23.003 Clause 2.2, not the NAI used in EAP. EAP-AKA' in 5G does not use the '0' or '6' prefix.
section: 5.3.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
