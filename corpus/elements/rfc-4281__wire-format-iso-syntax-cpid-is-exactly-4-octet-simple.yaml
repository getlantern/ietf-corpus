document: rfc-4281
kind: wire-format
summary: 'ISO syntax: ''cpid'' is exactly 4 octet-simple or octet-fancy characters (the four-character code); ''oti'' is exactly 2 hex digits (A-F uppercase); ''aud-oti'' and ''vid-pli'' are one or more decimal digits. The BNF grammar in Section 3.3 refines the generic grammar for ISO file formats.'
