document: rfc-2529
kind: security-consideration
summary: Boundary routers MUST discard multicast IPv4 packets whose source or destination is an Organization-Local Scope multicast address if they arrive on interfaces outside that scope, to prevent spoofed 6over4 multicast injection.
section: "9"
rfc2119_level: MUST
topics:
