document: rfc-7303
kind: wire-format
summary: For 7-bit transports (e.g., SMTP), XML MIME entities with 8-bit or binary data (UTF-8, UTF-16) MUST use quoted-printable or base64 content-transfer-encoding. For binary-clean transports (e.g., HTTP), no content-transfer-encoding is necessary or possible.
section: "9.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
