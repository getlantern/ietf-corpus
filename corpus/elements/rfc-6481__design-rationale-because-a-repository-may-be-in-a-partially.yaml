document: rfc-6481
kind: design-rationale
summary: Because a repository may be in a partially updated state and cannot guarantee internal consistency at all times, RPs should use retrieval algorithms (e.g., double synchronization or manifest comparison) to mitigate transient inconsistency rather than assuming atomic updates.
