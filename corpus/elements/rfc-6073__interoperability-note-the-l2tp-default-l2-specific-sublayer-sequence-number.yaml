document: rfc-6073
kind: interoperability-note
summary: The L2TP Default L2-Specific Sublayer sequence number has different semantics than the MPLS Control Word sequence number, eliminating transparent pass-through. If sequence interworking is not supported at the switching node and the T-PE requests sequencing, the S-PE SHOULD NOT allow the session and MUST send a CDN with Result Code 31.
section: 8.7.1
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
