document: rfc-822
kind: interoperability-note
summary: 'Field-names and most structured-field syntactic units are case-insensitive. The only units requiring case preservation are: text, qtext, dtext, ctext, quoted-pair, and local-part (except that ''Postmaster'' must be accepted in any case).'
