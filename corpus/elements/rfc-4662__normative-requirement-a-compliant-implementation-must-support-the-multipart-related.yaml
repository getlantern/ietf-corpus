document: rfc-4662
kind: normative-requirement
summary: A compliant implementation MUST support the multipart/related and application/rlmi+xml MIME types. These types MUST be included in an Accept header sent in a SUBSCRIBE message, in addition to any other types supported by the client.
section: "4.3"
rfc2119_level: MUST
topics:
