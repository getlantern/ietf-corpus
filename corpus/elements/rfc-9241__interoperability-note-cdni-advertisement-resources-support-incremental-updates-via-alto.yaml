document: rfc-9241
kind: interoperability-note
summary: CDNI Advertisement resources support incremental updates via ALTO SSE (RFC 8895), using both JSON merge patch (application/merge-patch+json) and JSON patch (application/json-patch+json) to encode changes, enabling efficient propagation of footprint and capability changes from dCDN to uCDN.
