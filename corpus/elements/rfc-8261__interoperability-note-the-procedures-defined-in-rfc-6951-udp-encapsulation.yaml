document: rfc-8261
kind: interoperability-note
summary: The procedures defined in RFC 6951 (UDP encapsulation of SCTP) for dealing with UDP port numbers do not apply to SCTP over DTLS. When using DTLS encapsulation, SCTP is entirely unaware of the protocols used below DTLS.
section: "1"
topics:
    - sctp
    - tls
    - udp
