document: rfc-792
kind: protocol-element
summary: All ICMP error messages include the Internet Header plus the first 64 bits of the original datagram's data, enabling the receiving host to match the error to the appropriate process. If a higher-level protocol uses port numbers, they are assumed to be in the first 64 data bits.
section: Destination Unreachable Message
topics:
    - ip
