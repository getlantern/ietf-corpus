document: rfc-9929
kind: design-rationale
summary: IS-IS UPA advertisements SHOULD be placed in LSPs dedicated to this type of advertisement. Because the unit of flooding in IS-IS is an LSP, co-locating UPAs in dedicated LSPs minimizes the number of LSPs that must be updated when UPAs are advertised and withdrawn.
section: "2"
topics:
    - routing
