document: rfc-5732
kind: normative-requirement
summary: Date and time attribute values MUST be represented in UTC using the Gregorian calendar, using the extended date-time form with upper case "T" and "Z" characters; time zone offset identifiers MUST NOT be used with EPP.
section: "2.4"
rfc2119_level: MUST
