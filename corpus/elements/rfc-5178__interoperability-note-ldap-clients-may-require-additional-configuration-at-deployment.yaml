document: rfc-5178
kind: interoperability-note
summary: LDAP clients may require additional configuration at deployment time to enable or disable domain-based naming, because existing clients using host-based naming for SRV-discovered servers would break interoperability if switched to domain-based naming when servers have not been updated.
section: "6.2"
topics:
    - security
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
