document: rfc-3212
kind: normative-requirement
summary: If, after possible Traffic Parameter negotiation, an LSR can support the CR-LSP Traffic Parameters then the LSR MUST reserve the corresponding resources. If it cannot, the LSR MUST send a Notification with 'Resource Unavailable' status code.
section: 4.3.2.1
rfc2119_level: MUST
