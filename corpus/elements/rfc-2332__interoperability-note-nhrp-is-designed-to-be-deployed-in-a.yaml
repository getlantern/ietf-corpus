document: rfc-2332
kind: interoperability-note
summary: NHRP is designed to be deployed in a non-interfering manner with existing ARP services (RFC 1577, RFC 2225). ARP servers may remain required for hosts that implement only the LIS model; NHRP reduces or eliminates the extra router hops the LIS model incurs without displacing existing ARP infrastructure.
