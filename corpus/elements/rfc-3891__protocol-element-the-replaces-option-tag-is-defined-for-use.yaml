document: rfc-3891
kind: protocol-element
summary: The "replaces" option tag is defined for use in Require and Supported headers. UAs that support the Replaces header MUST include the "replaces" option tag in a Supported header field. UAs wanting explicit failure notification MAY include it in a Require header.
section: "6.2"
topics:
    - sip
    - realtime
