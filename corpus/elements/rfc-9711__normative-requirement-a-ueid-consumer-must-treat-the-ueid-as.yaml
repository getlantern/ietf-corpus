document: rfc-9711
kind: normative-requirement
summary: A UEID consumer MUST treat the UEID as a completely opaque string of bytes and MUST NOT make any use of its internal structure. All implementations MUST be able to receive UEIDs up to 33 bytes long.
section: 4.2.1.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
