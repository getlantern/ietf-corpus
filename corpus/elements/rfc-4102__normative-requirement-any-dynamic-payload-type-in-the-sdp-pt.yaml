document: rfc-4102
kind: normative-requirement
summary: Any dynamic payload type in the SDP 'pt' list MUST be represented by its payload type number and not by its content-type. The mapping of payload types to content-type is done using normal SDP procedures with 'a=rtpmap'.
section: "4"
rfc2119_level: MUST
topics:
