document: rfc-7775
kind: design-rationale
summary: RFC 5302 allowed the up/down bit to appear in L2 LSPs in anticipation of a future IS-IS extension supporting more than two levels. Since no such extension has been introduced and two levels remain the maximum, the bit is meaningless in L2 LSPs within a single IS-IS instance.
section: "2"
topics:
    - routing
