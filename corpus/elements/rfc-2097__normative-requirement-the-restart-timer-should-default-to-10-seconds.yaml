document: rfc-2097
kind: normative-requirement
summary: The restart timer SHOULD default to 10 seconds when configuring NetBIOS names, because adding NetBIOS names can take time (usually 3 seconds) and PPP may default the restart timer to 3 seconds.
section: "3.1"
rfc2119_level: SHOULD
