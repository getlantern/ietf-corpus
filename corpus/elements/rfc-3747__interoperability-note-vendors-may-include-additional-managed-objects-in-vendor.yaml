document: rfc-3747
kind: interoperability-note
summary: Vendors may include additional managed objects in vendor-specific MIB modules for configuring DiffServ parameters. If a vendor uses the DIFFSERV-CONFIG-MIB objects, they should extend them in the same approach as defined for the Differentiated Services MIB module.
section: "4.2"
topics:
    - diffserv
    - snmp
