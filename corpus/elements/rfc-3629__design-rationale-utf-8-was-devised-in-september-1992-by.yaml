document: rfc-3629
kind: design-rationale
summary: UTF-8 was devised in September 1992 by Ken Thompson under design criteria from Rob Pike, with the goal of supporting UCS in the Plan 9 operating system without disrupting existing ASCII-based software. The encoding scheme ensures lexicographic byte-order sorting matches Unicode code-point order and allows character boundaries to be found from any position in an octet stream.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
