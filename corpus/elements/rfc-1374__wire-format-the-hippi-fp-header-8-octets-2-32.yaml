document: rfc-1374
kind: wire-format
summary: 'The HIPPI-FP header (8 octets / 2 32-bit words) contains: ULP-id (8 bits, shall be 4), D1_Data_Set_Present (1 bit), Start_D2_on_Burst_Boundary (1 bit, shall be 0), Reserved (11 bits), D1_Area_Size (8 bits, should be 3), D2_Offset (3 bits), and D2_Size (32 bits, max 65,288 decimal).'
section: Protocol/Packet Format
