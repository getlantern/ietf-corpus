document: rfc-8357
kind: protocol-element
summary: The 'Source Port Sub-option' (SUBOPT_RELAY_PORT, code 19) is a new sub-option within the DHCPv4 Relay Agent Information option (RFC 3046). It signals that the relay agent is using a non-standard UDP source port; it carries no data beyond its presence (Len = 0).
