document: rfc-6378
kind: security-consideration
summary: The G-ACh can be used as a covert channel providing end-to-end connectivity that SHOULD NOT be policed by transit nodes, making it impossible to simply prevent arbitrary traffic between consenting nodes. Injection or modification of PSC control messages requires subversion of a transit node, which is considered hard in MPLS networks and not addressable at the protocol level.
section: "6"
topics:
    - mpls
    - security
    - routing
