document: rfc-4352
kind: wire-format
summary: 'A Table of Contents (ToC) entry in basic mode is 16 bits: F (1 bit, more entries follow), Frame Type (7 bits, codec rate/mode per Table 25 of 3GPP TS 26.290), and #frames (8 bits, count of frames in this group). ToC entries with #frames=0 SHALL NOT be used.'
section: 4.3.2.1
topics:
