document: rfc-9418
kind: protocol-element
summary: The `assured-services` read-only container provides an alternate, query-optimized index into the assurance graph, organized by service name and instance name. For each service instance, the `subservices` sub-list enumerates all descendant subservices in that instance's assurance subgraph, enabling retrieval in a single query rather than recursive dependency traversal.
section: "3.2"
