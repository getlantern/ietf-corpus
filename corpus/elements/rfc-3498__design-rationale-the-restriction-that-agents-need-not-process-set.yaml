document: rfc-3498
kind: design-rationale
summary: The restriction that agents need not process Set PDUs affecting multiple conflicting control objects is an intentional simplification. It avoids requiring agents to implement complex transactional conflict-resolution logic for PDUs containing varbinds that are mutually inconsistent, such as simultaneously activating a group while deactivating one of its channels.
section: "3"
topics:
