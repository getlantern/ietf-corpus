document: rfc-1996
kind: security-consideration
summary: TCP spoofing could be combined with NOTIFY to synchronize a crafted SOA query, and then UDP/DNS spoofing could be used to force a zone transfer from a slave. This attack requires both TCP and UDP spoofing capabilities against the slave.
section: "5"
topics:
    - dns
    - security
