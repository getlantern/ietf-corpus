document: rfc-3578
kind: normative-requirement
summary: A gateway SHOULD only generate SIP overlap signalling (multiple INVITEs) if the SIP routing infrastructure ensures that INVITEs will only reach one gateway; when the routing infrastructure is not under the administrator's control, the en-bloc conversion procedures of Section 2 must be used instead.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - sip
    - voip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
