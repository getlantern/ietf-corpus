document: rfc-9015
kind: interoperability-note
summary: The SFP Traversal With MPLS Label Stack TLV (type 5) signals that all SFFs on the SFP must use MPLS label swapping/stacking; the SFP is considered unusable unless every SFF at each hop has advertised the MPLS Mixed Swapping/Stacking Extended Community (Sub-Type 2 of the SFC Extended Community).
section: 3.2.1.5
topics:
    - bgp
    - routing
    - mpls
