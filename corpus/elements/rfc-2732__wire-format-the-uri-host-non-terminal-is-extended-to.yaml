summary: 'The URI host non-terminal is extended to three alternatives: host = hostname | IPv4address | IPv6reference. IPv6reference wraps the address in square brackets, e.g., http://[FEDC:BA98:7654:3210:FEDC:BA98:7654:3210]:80/index.html.'
