document: rfc-5604
kind: normative-requirement
summary: The pwTDMCfgMissingPktsToSes threshold (default 30%) determines the percent of missing packets within a 1-second window needed to count a Severely Error Second (SES). Excessive packet loss rate is separately detected by comparing the average loss rate over pwTDMCfgAvePktLossTimeWindow against pwTDMCfgExcessivePktLossThreshold.
section: "8"
rfc2119_level: SHOULD
topics:
