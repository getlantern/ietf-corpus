document: rfc-1427
kind: normative-requirement
summary: If the indicated size exceeds the server's fixed maximum message size, the server should respond with code 552 ('message size exceeds fixed maximum message size'); a server is also permitted to accept a message actually larger than declared.
section: "6.1"
rfc2119_level: SHOULD
