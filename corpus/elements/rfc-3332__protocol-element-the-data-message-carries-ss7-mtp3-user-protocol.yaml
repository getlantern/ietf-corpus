document: rfc-3332
kind: protocol-element
summary: The DATA message carries SS7 MTP3-User protocol data as an MTP-TRANSFER primitive. It contains optional Network Appearance (Tag 0x0200), optional Routing Context (Tag 0x0006), mandatory Protocol Data (Tag 0x0210), and optional Correlation Id (Tag 0x0013). Where multiple Routing Keys share a common association, Routing Context MUST be sent to identify the traffic flow.
section: 3.3.1
topics:
