document: rfc-9221
kind: security-consideration
summary: The use of DATAGRAM frames may be detectable by an on-path adversary capable of dropping packets. Because DATAGRAM frames are not retransmitted, connections using them may be distinguished from other connections by their different response to packet loss.
section: "6"
topics:
