document: rfc-4659
kind: protocol-element
summary: Link-local unicast addresses may be used on PE-CE links but are never advertised via MP-BGP to remote PEs. Global unicast and Unique Local IPv6 Unicast Addresses are supported for reachability across IPv6 VPN sites and may be advertised via MP-BGP.
section: "5"
topics:
