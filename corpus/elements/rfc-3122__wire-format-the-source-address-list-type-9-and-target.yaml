document: rfc-3122
kind: wire-format
summary: The Source Address List (Type 9) and Target Address List (Type 10) are TLV options with an 8-bit Type, 8-bit Length (in units of 8 octets, minimum 3), a 24-bit Reserved field, and one or more 128-bit IPv6 addresses. The number of addresses n = (Length - 1) / 2.
