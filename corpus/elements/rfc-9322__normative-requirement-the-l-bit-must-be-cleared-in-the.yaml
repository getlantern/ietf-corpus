document: rfc-9322
kind: normative-requirement
summary: The L-bit MUST be cleared in the copy of the packet that a node sends back towards the source, ensuring that looped-back packets do not trigger further loopback at nodes on the return path.
section: "4.2"
rfc2119_level: MUST
topics:
