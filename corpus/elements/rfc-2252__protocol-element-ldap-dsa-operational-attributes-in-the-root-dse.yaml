summary: 'LDAP DSA operational attributes in the root DSE include: namingContexts (1.3.6.1.4.1.1466.101.120.5), altServer (.6), supportedExtension (.7), supportedControl (.13), supportedSASLMechanisms (.14), and supportedLDAPVersion (.15). Servers MUST recognize these names but are not required to provide values for unimplemented features.'
