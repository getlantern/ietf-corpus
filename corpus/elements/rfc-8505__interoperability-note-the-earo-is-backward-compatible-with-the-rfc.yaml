document: rfc-8505
kind: interoperability-note
summary: The EARO is backward compatible with the RFC 6775 ARO if and only if the option Length is set to 2 (64-bit ROVR). The T flag and TID field occupy fields reserved in RFC 6775 and are ignored by RFC 6775-only routers.
section: "5.1"
