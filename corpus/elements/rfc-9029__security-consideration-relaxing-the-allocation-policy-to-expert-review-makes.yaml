document: rfc-9029
kind: security-consideration
summary: Relaxing the allocation policy to Expert Review makes the registry and designated experts slightly more vulnerable to denial-of-service attacks via excessive or bogus code point requests. Designated experts are expected to report suspected attacks to IDR WG chairs and the responsible AD and should immediately halt all allocation requests until mitigations are in place, which may temporarily block legitimate requests.
section: "3"
topics:
    - bgp
    - registry
    - security
    - routing
