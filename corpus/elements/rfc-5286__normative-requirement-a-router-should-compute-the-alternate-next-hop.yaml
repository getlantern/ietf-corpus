document: rfc-5286
kind: normative-requirement
summary: A router SHOULD compute the alternate next-hop for an IGP multi-homed prefix by considering alternate paths via all routers that have announced that prefix. A router MAY simplify by treating the MHP as solely attached to its pre-failure optimal attachment point, at the risk of missing possible repairs.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
