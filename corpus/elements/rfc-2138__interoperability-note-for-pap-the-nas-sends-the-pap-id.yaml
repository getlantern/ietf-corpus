document: rfc-2138
kind: interoperability-note
summary: For PAP, the NAS sends the PAP ID and password as User-Name and User-Password in an Access-Request. For CHAP, the NAS sends the CHAP username as User-Name and the CHAP ID plus response as CHAP-Password (Type 3); the 16-octet CHAP challenge may be placed in the CHAP-Challenge attribute or, if exactly 16 octets, in the Request Authenticator field.
section: "2.2"
topics:
    - security
