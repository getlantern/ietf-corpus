document: rfc-4866
kind: protocol-element
summary: The permanent home keygen token is a 64-bit pseudo-random value generated by the correspondent node and shared with the mobile node after successful CGA verification. It serves as the basis for a semi-permanent security association, replacing repeated CGA authentication and enabling efficient subsequent Binding Update authentication.
section: "4.7"
topics:
    - mobility
    - crypto
    - security
