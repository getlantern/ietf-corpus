document: rfc-1055
kind: interoperability-note
summary: Because SLIP lacks a type field, only one network-layer protocol may run over a given SLIP connection at a time. Implementations that need to carry multiple protocols over the same serial line must use a successor framing protocol (e.g., PPP) instead.
section: DEFICIENCIES
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
