document: rfc-7173
kind: protocol-element
summary: TRILL switch ports interconnected via pseudowire act as native service processing (NSP) elements and as label switched or IP routers. The pseudowire provides transparent transport so the two ports appear directly interconnected, with TRILL adjacency automatically discovered via TRILL IS-IS control messages.
