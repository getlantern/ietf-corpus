document: rfc-9012
kind: wire-format
summary: Each sub-TLV has a 1-octet Type, a 1-octet or 2-octet Length, and a variable Value. Sub-TLV types 0–127 use a 1-octet Length field; types 128–255 use a 2-octet Length field, allowing sub-TLVs larger than 255 octets.
