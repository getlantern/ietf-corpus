document: rfc-5420
kind: registry
summary: IANA maintains a registry of 16-bit TLV type identifiers shared by both the LSP_ATTRIBUTES and LSP_REQUIRED_ATTRIBUTES objects, tracking TLV Type, TLV Name, and applicability to each object. New TLV types require IETF Consensus. Type 1 (Attribute Flags TLV) is the only initial entry.
section: "11.2"
