document: rfc-2609
kind: normative-requirement
summary: Reserved characters (';', '%', '=', ',', '#', LF, CR) MUST be escaped in service template documents. String matching SHOULD be case insensitive after decoding character escapes and trimming whitespace.
section: "3.1"
rfc2119_level: MUST
