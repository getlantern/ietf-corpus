document: rfc-3883
kind: normative-requirement
summary: Implementations SHOULD limit the number of times an LSA can be retransmitted to ospfIfDemandNbrProbeRetxLimit when used for neighbor probing; if no acknowledgement is received after that limit, the adjacency should be brought down.
section: "2.1"
rfc2119_level: SHOULD
