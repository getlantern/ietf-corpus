document: rfc-2603
kind: interoperability-note
summary: PAR (PNNI Augmented Routing) and Proxy PAR offer a mechanism for distributing NHS addresses and managing service registry tables across ATM switches without requiring changes to the ILMI-based discovery mechanism defined in this memo. Hosts can continue to use ILMI-based discovery regardless of how the registry data is managed.
section: "6"
extracted_by: claude-sonnet-4-6
