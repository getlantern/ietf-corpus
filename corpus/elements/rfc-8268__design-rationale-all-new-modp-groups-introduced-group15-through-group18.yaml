document: rfc-8268
kind: design-rationale
summary: All new MODP groups introduced (group15 through group18) are 'safe primes' where p = 2q + 1 and q is also prime. This property prevents forcing the local system into a two-element subgroup, which the corrected public key range check also guards against.
