document: rfc-3863
kind: security-consideration
summary: Presence is privacy-sensitive; the presence protocol MUST have capabilities to protect PIDF against eavesdropping, corruption, tampering, and replay attacks, operable end-to-end between presentities and watchers even across CPP gateways. S/MIME (RFC 3851) at the MIME level is recommended.
section: "6"
topics:
