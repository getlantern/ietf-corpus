document: rfc-5077
kind: design-rationale
summary: 'This document obsoletes RFC 4507 to correct an encoding error: RFC 4507 included a redundant length field (one for extension contents and one for the ticket itself), but all known deployed implementations omitted the inner ticket length field. The update aligns the specification with actual implementations.'
