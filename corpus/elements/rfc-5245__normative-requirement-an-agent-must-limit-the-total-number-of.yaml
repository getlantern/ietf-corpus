document: rfc-5245
kind: normative-requirement
summary: An agent MUST limit the total number of connectivity checks across all check lists to a configurable value, with a default of 100 RECOMMENDED. Lower-priority pairs are discarded to enforce this limit, defending against STUN amplification attacks.
section: 5.7.3
rfc2119_level: MUST
topics:
    - nat
    - security
