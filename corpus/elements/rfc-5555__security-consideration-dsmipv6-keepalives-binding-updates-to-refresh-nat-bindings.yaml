document: rfc-5555
kind: security-consideration
summary: DSMIPv6 keepalives (binding updates to refresh NAT bindings) do not replace IKEv2 keepalives over UDP port 4500 needed for IKE dead-peer detection; both mechanisms must be maintained independently when the mobile node is behind a NAT.
section: "4.3"
topics:
    - mobility
    - security
    - nat
    - ipsec
