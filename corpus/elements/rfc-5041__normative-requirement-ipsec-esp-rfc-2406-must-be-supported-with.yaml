document: rfc-5041
kind: normative-requirement
summary: IPsec ESP (RFC 2406) MUST be supported with per-packet data origin authentication, integrity, and replay protection. ESP in tunnel mode MUST be supported; IKE (RFC 2409) MUST be supported for peer authentication and key management, following the profile in RFC 3723 Section 2.3.
section: 8.4.2
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
