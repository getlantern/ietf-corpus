document: rfc-7005
kind: wire-format
summary: 'The DJB Metrics Block is 4 32-bit words (Block Length=3): first word contains BT=23 (8 bits), Interval Metric flag I (2 bits), Configuration flag C (1 bit), reserved (5 bits), and Block Length (16 bits); second word is SSRC of Source (32 bits); third word is DJB nominal (16 bits) and DJB maximum (16 bits); fourth word is DJB high-water mark (16 bits) and DJB low-water mark (16 bits).'
section: "4.1"
