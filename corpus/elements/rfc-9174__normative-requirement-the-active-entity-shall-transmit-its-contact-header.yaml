document: rfc-9174
kind: normative-requirement
summary: The active entity SHALL transmit its Contact Header immediately upon TCP connection establishment; the passive entity SHALL wait, then reply with its own Contact Header. If either entity does not receive a Contact Header within an implementation-defined timeout (SHOULD be no longer than 60 seconds), the waiting entity SHALL close the TCP connection.
section: "4.1"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
