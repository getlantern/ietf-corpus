document: rfc-6121
kind: normative-requirement
summary: The entity processing a roster set MUST verify that the sender is authorized to update the roster and MUST return a <forbidden/> error if not; a client MUST NOT include the 'approved' or 'ask' attributes in roster sets it sends to the server.
section: 2.1.5
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
