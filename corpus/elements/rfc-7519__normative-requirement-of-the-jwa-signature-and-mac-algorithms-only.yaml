document: rfc-7519
kind: normative-requirement
summary: Of the JWA signature and MAC algorithms, only HMAC SHA-256 ("HS256") and "none" MUST be implemented by conforming JWT implementations. RS256 and ES256 are RECOMMENDED. Encrypted JWT support is OPTIONAL; if provided, RSA1_5 with 2048-bit keys, A128KW, A256KW, A128CBC-HS256, and A256CBC-HS512 MUST be implemented.
section: "8"
rfc2119_level: MUST
topics:
    - jose
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
