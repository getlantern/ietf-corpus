document: rfc-5939
kind: wire-format
summary: 'The ''a=acap'' attribute encodes as: att-cap-num (1–10 DIGIT, value 1–2^31-1) followed by one or more WSP and an SDP attribute in ''<attribute>'' or ''<attribute>:<value>'' form (no ''a='' prefix). No whitespace is permitted before att-cap-num.'
section: 3.4.1
