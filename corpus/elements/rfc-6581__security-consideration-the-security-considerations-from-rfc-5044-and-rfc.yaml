document: rfc-6581
kind: security-consideration
summary: The security considerations from RFC 5044 and RFC 5043 apply; the changes in this document do not introduce new security considerations. However, implementations are recommended to perform sanity checking on input parameters including ORD, IRD, and the control flags used for RTR indication option negotiation.
