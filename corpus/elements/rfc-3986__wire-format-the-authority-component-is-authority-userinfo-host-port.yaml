document: rfc-3986
kind: wire-format
summary: 'The authority component is: authority = [ userinfo "@" ] host [ ":" port ]. It is preceded by "//" and terminated by the next "/", "?", "#", or end of URI. The port subcomponent is: port = *DIGIT.'
section: "3.2"
