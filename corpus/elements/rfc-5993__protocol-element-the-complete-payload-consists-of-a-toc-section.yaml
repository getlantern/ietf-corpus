document: rfc-5993
kind: protocol-element
summary: The complete payload consists of a ToC section followed by a speech data section. Each ToC element is one octet and corresponds to one speech, SID, or No_Data frame. The timestamp for ToC element N is (RTP timestamp + (N-1)*160) mod 2^32.
