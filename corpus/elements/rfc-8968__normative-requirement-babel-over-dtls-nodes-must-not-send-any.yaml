document: rfc-8968
kind: normative-requirement
summary: Babel over DTLS nodes MUST NOT send any TLVs over the unprotected 'babel' port, with the exception of Hello TLVs without the Unicast flag set. Nodes MUST NOT send any unprotected unicast packets.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
