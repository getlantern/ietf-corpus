document: rfc-6513
kind: protocol-element
summary: PE Distinguisher Labels are upstream-assigned MPLS labels distributed in Intra-AS I-PMSI A-D routes by the root of a P-tunnel, binding a label value to a specific PE address. They are used for demultiplexing on MP2MP LSPs and for PIM-BIDIR support; label values are unique only in the context of the P-tunnel root's IP address.
section: "4"
topics:
