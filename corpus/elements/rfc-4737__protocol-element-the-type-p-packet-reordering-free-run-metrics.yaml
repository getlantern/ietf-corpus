document: rfc-4737
kind: protocol-element
summary: The Type-P-Packet-Reordering-Free-Run metrics (numruns x, squruns q, numpkts p, accpkts a) count consecutive in-order packets between reordered packets. The average free-run length is a/x and the ratio (q/a)/(a/x) equals 1 when all runs are equal length, indicating run-length variability.
