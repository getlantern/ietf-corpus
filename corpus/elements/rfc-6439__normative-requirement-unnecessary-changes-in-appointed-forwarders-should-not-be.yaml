document: rfc-6439
kind: normative-requirement
summary: Unnecessary changes in Appointed Forwarders SHOULD NOT be made as they may cause transient loss of end station service. Large numbers of Appointed Forwarders on a link (in excess of 65) are NOT RECOMMENDED due to the complexity of establishment and maintenance.
section: 2.2.3
rfc2119_level: SHOULD NOT
topics:
    - routing
