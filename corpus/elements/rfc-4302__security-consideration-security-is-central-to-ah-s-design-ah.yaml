document: rfc-4302
kind: security-consideration
summary: Security is central to AH's design. AH provides connectionless integrity, data origin authentication, and optional anti-replay protection. It does not provide confidentiality; that requires ESP. The extent of IP header coverage by AH is piecemeal because mutable fields cannot be protected.
section: "6"
topics:
    - ipsec
    - security
