document: rfc-5348
kind: protocol-element
summary: The optional history discounting mechanism adjusts the weighted loss interval computation by a general discount factor DF = max(2*I_mean/I_0, THRESHOLD=0.25) when I_0 > 2*I_mean, reducing the relative weight on older intervals. This allows TFRC to respond more quickly to the sudden absence of congestion.
section: "5.5"
topics:
