document: rfc-3987
kind: normative-requirement
summary: Equivalence of IRIs MUST rely on the assumption that IRIs are appropriately pre-character-normalized (NFC) rather than applying normalization at comparison time. In cases of non-digital or non-UCS-based input, NFC MUST be used; IRIs SHOULD be created using NFC.
section: 5.3.2.2
rfc2119_level: MUST
topics:
    - ip
