document: rfc-2558
kind: protocol-element
summary: 'sonetSESthresholdSet is an enumerated object selecting which SES threshold specification applies: other(1), Bellcore1991(2), ansi1993(3), itu1995(4), or ansi1997(5). If not implemented, the RFC 1595 thresholds (Appendix B) are assumed. Changing this value invalidates all previously collected SES statistics.'
section: "4.1"
topics:
