document: rfc-4055
kind: wire-format
summary: The RSASSA-PSS signature value is an octet string of the same length as the RSA modulus n. To encode as a BIT STRING in an X.509 certificate or CRL, the most significant bit of the first octet becomes the first bit of the bit string, proceeding through to the least significant bit of the last octet.
section: "3.2"
topics:
