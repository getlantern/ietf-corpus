document: rfc-1390
kind: normative-requirement
summary: Hosts directly connected to FDDI networks shall not use trailer encapsulation. Some Unix 4.x BSD systems use trailers for VAX virtual memory performance, but these are prohibited on FDDI.
section: Trailer Formats
rfc2119_level: MUST NOT
topics:
    - ip
