document: rfc-8317
kind: interoperability-note
summary: Scenario 3 (Root/Leaf per MAC address) does not support BUM traffic because Designated Forwarder (DF) filtering per RFC 7432 is incompatible with the required egress filtering; BUM traffic is dropped by the ingress PE in this scenario.
section: "3.3"
topics:
