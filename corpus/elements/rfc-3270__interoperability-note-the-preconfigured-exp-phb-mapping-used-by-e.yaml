document: rfc-3270
kind: interoperability-note
summary: The preconfigured EXP↔PHB mapping used by E-LSPs must be consistent at every hop throughout the MPLS Diff-Serv domain spanned by the LSP, or appropriate EXP field remarking must be performed whenever differing preconfigured mappings appear on ingress and egress interfaces. If no mapping is configured, the LSR should map all EXP values to the Default PHB.
section: 3.2.1
topics:
    - mpls
    - diffserv
    - qos
