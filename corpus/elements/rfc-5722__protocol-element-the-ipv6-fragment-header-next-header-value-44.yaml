document: rfc-5722
kind: protocol-element
summary: The IPv6 Fragment Header (Next Header value 44) includes a FragmentOffset field, a More Fragments (M) bit, and a 32-bit Identification field. The attack exploits the fact that two fragments with the same Identification value but overlapping offsets can carry contradictory upper-layer header content.
section: "3"
