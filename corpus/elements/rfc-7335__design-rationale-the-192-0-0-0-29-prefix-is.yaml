document: rfc-7335
kind: design-rationale
summary: The 192.0.0.0/29 prefix is suitable for reuse across transition solutions because, as established in RFC 6333 for DS-Lite, this subnet is only present internally (e.g., between B4 and AFTR) and never emits packets from this prefix on the wire.
