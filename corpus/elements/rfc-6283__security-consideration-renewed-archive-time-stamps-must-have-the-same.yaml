document: rfc-6283
kind: security-consideration
summary: Renewed Archive Time-Stamps MUST have the same or higher quality as the initial Archive Time-Stamp of archive data. Archive Time-Stamps used for signed archive data SHOULD have the same or higher quality than the maximum quality of the signatures.
section: "9.3"
rfc2119_level: MUST
topics:
