document: rfc-6935
kind: design-rationale
summary: UDP-based tunneling is increasingly necessary because deploying new protocol numbers on a critical mass of routers and middleboxes now takes decades, while UDP passes through firewalls and other middleboxes. This motivates allowing zero UDP checksums to reduce tunnel endpoint overhead.
section: "1"
topics:
