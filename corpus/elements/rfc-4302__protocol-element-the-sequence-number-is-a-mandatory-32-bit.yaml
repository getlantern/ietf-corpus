document: rfc-4302
kind: protocol-element
summary: The Sequence Number is a mandatory 32-bit unsigned counter incremented by one per transmitted packet. Sender and receiver counters initialize to 0 at SA establishment; the first packet carries sequence number 1. The counter MUST be reset (new SA) before transmitting the 2^32nd packet when anti-replay is enabled.
section: "2.5"
topics:
    - ipsec
    - security
