document: rfc-8760
kind: wire-format
summary: 'The request-digest field is extended to allow for different digest sizes: ''request-digest = LDQUOT *LHEX RDQUOT''. The number of hex digits is implied by the algorithm used, with a minimum size of 32. An empty value is allowed when the UAC has not yet received a challenge.'
section: "2.7"
topics:
