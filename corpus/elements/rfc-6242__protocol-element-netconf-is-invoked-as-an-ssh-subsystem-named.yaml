document: rfc-6242
kind: protocol-element
summary: NETCONF is invoked as an SSH subsystem named 'netconf' over an SSH session-type channel. Subsystem support is a feature of SSHv2 only; SSHv1 is not supported. Using a subsystem avoids the need to parse shell prompts or skip extraneous startup messages.
section: "3"
topics:
    - netconf
    - security
