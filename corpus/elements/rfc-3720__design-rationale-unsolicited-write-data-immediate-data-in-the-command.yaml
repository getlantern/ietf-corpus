document: rfc-3720
kind: design-rationale
summary: Unsolicited write data (immediate data in the command PDU and separate Data-Out PDUs up to FirstBurstLength bytes) is designed to reduce write latency by eliminating the first R2T round-trip. The ImmediateData and InitialR2T negotiation keys allow fine-grained control over which unsolicited forms are enabled.
section: 3.2.4.2
