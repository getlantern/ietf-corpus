kind: protocol-element
summary: 'Types 0 and 1 define two YUV color space modes: type 0 uses 4:2:2 chrominance subsampling (horizontal only), type 1 uses 4:2:0 (horizontal and vertical). Both use Baseline DCT sequential mode, 8-bit samples, standard Huffman tables, and a single interleaved scan.'
