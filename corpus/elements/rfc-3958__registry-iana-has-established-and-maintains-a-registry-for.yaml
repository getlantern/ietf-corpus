document: rfc-3958
kind: registry
summary: IANA has established and maintains a registry for S-NAPTR Application Protocol Tags. Each entry records the application protocol tag string (conforming to iana-registered-protocol syntax) and the defining RFC. Tags starting with 'x-' are experimental and uncontrolled; all others require RFC-backed registration.
