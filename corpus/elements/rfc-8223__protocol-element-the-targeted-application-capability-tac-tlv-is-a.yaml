document: rfc-8223
kind: protocol-element
summary: The Targeted Application Capability (TAC) TLV is a new LDP capability TLV used to advertise and negotiate a list of targeted applications during tLDP session initialization. It is encoded as a standard LDP capability TLV with Capability Data containing one or more Targeted Application Elements (TAEs).
section: "2.1"
topics:
