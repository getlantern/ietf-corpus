document: rfc-4568
kind: normative-requirement
summary: If the MKI length field is not given or its value exceeds 128 bytes, the entire crypto attribute MUST be considered invalid. When more than one master key is present, all keys MUST include an MKI value, and the MKI length MUST be the same for all keys in a given crypto attribute.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
