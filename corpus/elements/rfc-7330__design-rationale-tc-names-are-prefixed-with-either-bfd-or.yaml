document: rfc-7330
kind: design-rationale
summary: TC names are prefixed with either 'Bfd' or 'IANA' to make it obvious to readers which conventions are BFD-module-specific and which are IANA-maintained, enabling two separate MIB modules (BFD-TC-STD-MIB and IANA-BFD-TC-STD-MIB) with distinct governance.
