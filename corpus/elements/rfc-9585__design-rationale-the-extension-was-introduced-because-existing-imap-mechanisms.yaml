document: rfc-9585
kind: design-rationale
summary: The extension was introduced because existing IMAP mechanisms allowed servers to send generic untagged OK messages (e.g., '* OK Still on it, 57% done') but provided no standard structure for progress reporting, leaving clients unable to parse or act on such information systematically.
