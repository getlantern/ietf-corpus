document: rfc-2078
kind: protocol-element
summary: Anonymity support is provided via the anon_req_flag input to GSS_Init_sec_context(), which requests that the initiator's identity not be provided to the acceptor. The OID {1.3.6.1.5.6.3} (symbolic name GSS_C_NT_ANONYMOUS) identifies anonymous names in a mechanism-independent fashion.
section: 1.2.5
topics:
    - security
    - privacy
