document: rfc-2077
kind: protocol-element
summary: The 'state' optional parameter is either 'static' or 'dynamic'. In 'static', the observer may move (translations, rotations, zooms) but data does not change; in 'dynamic', the data itself is manipulated (skews, elongations, scales). Time evolution is a static operation; object deformation is dynamic.
section: "4"
