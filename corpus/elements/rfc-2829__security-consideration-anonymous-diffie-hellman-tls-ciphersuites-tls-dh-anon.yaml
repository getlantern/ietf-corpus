document: rfc-2829
kind: security-consideration
summary: Anonymous Diffie-Hellman TLS ciphersuites (TLS_DH_anon_*) are vulnerable to man-in-the-middle attacks and SHOULD NOT be used to protect passwords or sensitive data unless the network configuration makes such attacks tolerable.
