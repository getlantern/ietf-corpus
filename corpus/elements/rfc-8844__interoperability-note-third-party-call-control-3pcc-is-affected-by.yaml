document: rfc-8844
kind: interoperability-note
summary: 'Third-party call control (3PCC) is affected by the mitigations in this document: for 3PCC to work with these extensions, the 3PCC controller must either forward SDP without modification or avoid modifying ''fingerprint'', ''tls-id'', and ''identity'' attributes. 3PCC as defined in RFC 3725 is incompatible with SIP identity.'
section: "2.3"
topics:
    - sip
    - security
    - tls
