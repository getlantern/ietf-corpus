document: rfc-2222
kind: interoperability-note
summary: If a security layer is in effect and a subsequent SASL negotiation selects no security layer, the original security layer remains in effect. If a second security layer is selected, it replaces the first. This applies only when the protocol profile explicitly permits multiple SASL negotiations.
section: "5.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
