document: rfc-4018
kind: protocol-element
summary: The 'iscsi-name' attribute in the target template is the iSCSI Name of the target and MUST match the iscsi-name in the URL path. The 'portal-group' attribute identifies the portal group tag; addresses sharing the same iscsi-name and portal-group tag can be used within the same iSCSI session.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
