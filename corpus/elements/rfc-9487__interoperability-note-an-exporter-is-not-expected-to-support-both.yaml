document: rfc-9487
kind: interoperability-note
summary: An exporter is not expected to support both srhSegmentIPv6BasicList and srhSegmentIPv6ListSection simultaneously. Operators should choose one encoding based on whether exporter processing overhead or collector decoding complexity is the dominant concern in their deployment.
