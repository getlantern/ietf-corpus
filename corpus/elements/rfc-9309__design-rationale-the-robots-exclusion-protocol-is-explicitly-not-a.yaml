document: rfc-9309
kind: design-rationale
summary: The Robots Exclusion Protocol is explicitly not a form of access authorization. Listing paths in robots.txt exposes them publicly, making them discoverable. Valid content security (e.g., HTTP Authentication) must be used separately to control actual access.
section: "3"
topics:
    - http
    - security
