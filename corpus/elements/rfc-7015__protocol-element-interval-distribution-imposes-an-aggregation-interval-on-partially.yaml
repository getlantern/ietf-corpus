document: rfc-7015
kind: protocol-element
summary: Interval distribution imposes an Aggregation Interval on Partially Aggregated Flows. Intervals may be regular, irregular, or derived from Original Flow timing. Choosing an interval longer than the longest Original Flow limits each Original Flow to contributing to at most two Aggregated Flows, greatly simplifying counter distribution.
section: "5.1"
topics:
    - measurement
