kind: protocol-element
summary: A new 'replaces' field is added to the ACME Order object. Its value is a string uniquely identifying a previously issued certificate that this order is intended to replace, constructed using the same format as the RenewalInfo path component (base64url(AKI keyIdentifier) + '.' + base64url(Serial)).
