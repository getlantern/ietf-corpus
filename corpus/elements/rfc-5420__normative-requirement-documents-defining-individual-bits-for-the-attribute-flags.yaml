document: rfc-5420
kind: normative-requirement
summary: Documents defining individual bits for the Attribute Flags TLV MUST specify whether those bits MAY be inherited by an FA-LSP and the conditions under which inheritance occurs. The same requirement applies to any other TLV type defined under the rules of Section 3.
