document: rfc-9302
kind: design-rationale
summary: 'Map-Versioning can be used for graceful RLOC shutdown: publish an updated mapping (new Map-Version) that marks the RLOC unreachable via the R-bit without actually turning it off, then wait at least one TTL for all remote caches to refresh before shutting down the RLOC.'
section: A.3
topics:
    - routing
