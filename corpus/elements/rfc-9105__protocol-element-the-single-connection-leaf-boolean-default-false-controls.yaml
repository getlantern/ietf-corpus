document: rfc-9105
kind: protocol-element
summary: The 'single-connection' leaf (boolean, default false) controls whether Single Connection Mode is enabled for the server. When enabled, a single TCP connection may carry multiple TACACS+ sessions, and the 'sessions' statistic counter will exceed 'connection-closes'.
