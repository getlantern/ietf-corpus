document: rfc-7240
kind: security-consideration
summary: A server could incur greater costs complying with certain preferences (e.g., providing a full representation, or tracking state for async responses). Unconditional compliance could allow preferences to be exploited for denial of service; servers may ignore preferences to avoid committing unwanted resources.
section: "6"
topics:
