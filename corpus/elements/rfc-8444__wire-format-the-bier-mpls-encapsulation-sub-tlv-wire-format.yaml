document: rfc-8444
kind: wire-format
summary: The BIER MPLS Encapsulation Sub-TLV wire format (Type 10, Length 8 octets) contains a 1-octet Max SI, a 3-octet Label field (20 rightmost bits are the first label; 4 leftmost bits MUST be ignored), and a 4-bit BS Len field followed by 28 reserved bits.
section: "2.2"
