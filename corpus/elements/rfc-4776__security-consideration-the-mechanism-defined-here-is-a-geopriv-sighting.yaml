document: rfc-4776
kind: security-consideration
summary: 'The mechanism defined here is a GEOPRIV ''sighting function'' (RFC 3693): it conveys location only from server to client, not in the reverse direction, due to security concerns about using DHCP to update location databases. Sighting functions are intended only for trusted, controlled environments.'
section: "1"
