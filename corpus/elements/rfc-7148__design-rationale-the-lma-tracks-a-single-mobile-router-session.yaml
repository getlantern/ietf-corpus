document: rfc-7148
kind: design-rationale
summary: The LMA tracks a single mobile router session and associates DMNPs with that session rather than tracking individual IP nodes (LFNs) in the mobile network. This keeps the PMIPv6 control plane scalable, as the LMA only needs per-MR state regardless of the number of attached LFNs.
section: "1"
topics:
