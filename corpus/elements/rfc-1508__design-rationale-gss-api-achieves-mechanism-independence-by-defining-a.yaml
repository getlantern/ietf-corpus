document: rfc-1508
kind: design-rationale
summary: GSS-API achieves mechanism independence by defining a generic interface abstracting over both secret-key (e.g., Kerberos) and public-key (e.g., X.509) cryptographic technologies, allowing source-level portability of calling applications across different security environments without code changes.
