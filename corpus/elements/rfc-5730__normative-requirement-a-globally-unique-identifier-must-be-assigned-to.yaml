document: rfc-5730
kind: normative-requirement
summary: A globally unique identifier MUST be assigned to every object when created and MUST be returned to the client on any detailed attribute retrieval. The RECOMMENDED construction concatenates a local identifier, a hyphen, and an IANA-maintained repository identifier.
section: "2.8"
rfc2119_level: MUST
topics:
    - registry
