document: rfc-4871
kind: security-consideration
summary: The l= body length tag enables an attack where an attacker appends content that can completely replace the original content in the recipient's view and defeat duplicate-message detection. Signers should be extremely wary of using l=; verifiers may choose to ignore it.
section: "8.1"
topics:
    - email
    - security
