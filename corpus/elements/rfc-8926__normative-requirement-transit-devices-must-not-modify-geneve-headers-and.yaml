document: rfc-8926
kind: normative-requirement
summary: Transit devices MUST NOT modify Geneve headers and MUST NOT insert or delete options; options MUST only be generated and terminated by tunnel endpoints. The contents and ordering of options MUST NOT be modified by transit devices.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
