document: rfc-2782
kind: normative-requirement
summary: Port numbers SHOULD NOT be used in place of symbolic service or protocol names in SRV queries, because applications would otherwise need to perform multiple lookups and variant names would be prohibited.
section: Usage rules
rfc2119_level: SHOULD NOT
