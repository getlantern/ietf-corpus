document: rfc-5239
kind: protocol-element
summary: The conference object identifier is a URI that uniquely identifies a single conference object (blueprint, reservation, or active conference) within a conferencing system and is used by the conference control protocol to access and modify conference information. It is defined in XCON-COMMON and logically maps to protocol-specific identifiers such as the BFCP 'confid'.
section: 6.2.1
topics:
