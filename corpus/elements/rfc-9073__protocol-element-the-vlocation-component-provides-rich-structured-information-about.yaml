document: rfc-9073
kind: protocol-element
summary: The VLOCATION component provides rich structured information about a location associated with an event, such as venue, parking, or dining. UID is required; NAME, GEO, LOCATION-TYPE, and STRUCTURED-DATA are optional. It may be nested inside VEVENT, VTODO, VJOURNAL, VFREEBUSY, or PARTICIPANT.
section: "7.2"
