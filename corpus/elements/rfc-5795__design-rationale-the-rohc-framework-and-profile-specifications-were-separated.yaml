document: rfc-5795
kind: design-rationale
summary: The ROHC framework and profile specifications were separated into distinct documents (this document and RFC 5225) to address implementer feedback that RFC 3095 was complex and obscure, and to make development of additional profiles more tractable. The framework definition does not modify RFC 3095's framework, so implementations of both are interoperable.
section: "4.3"
topics:
    - routing
    - process
