document: rfc-7468
kind: design-rationale
summary: Unlike legacy PEM encoding, OpenPGP ASCII armor, and OpenSSH key file format, textual encoding does NOT define or permit headers alongside the data. Generators SHOULD NOT emit any empty spacing between the pre-encapsulation boundary and the base64 data, though the area exists as a PEM throwback.
