document: rfc-1395
kind: design-rationale
summary: IP multicast was considered as an alternative to BOOTP extensions for locating network services; multicast eliminates dependence on a BOOTP server, reduces administrative overhead, and can be more efficient. The main drawback cited is that IP multicasting was not widely implemented at the time of this RFC.
section: Comparison to Alternative Approaches
topics:
    - multicast
