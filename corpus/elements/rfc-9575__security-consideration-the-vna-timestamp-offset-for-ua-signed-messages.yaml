document: rfc-9575
kind: security-consideration
summary: The VNA Timestamp offset for UA-signed messages should be shorter than any flight duration (under one hour) but long enough for Observers to process messages (more than a few seconds). An offset of approximately 2–5 minutes is recommended for typical UA scenarios as of 2024; DRIP Link VNA offsets are determined by the DIME and addressed in DRIP-REG.
section: "9.3"
topics:
    - security
