document: rfc-5365
kind: design-rationale
summary: A new Call-ID is recommended for outgoing MESSAGE requests because the incoming Call-ID may contain addressing information the sender wants private, and since the MESSAGE URI-list service acts as a UAC there is no need to preserve the original Call-ID across the service boundary.
section: "7.2"
topics:
    - sip
    - realtime
    - privacy
