document: rfc-4072
kind: privacy-consideration
summary: Diameter messages may contain User-Name and location-revealing AVPs (Origin-Host, Calling-Station-Id). User identity may also appear in cleartext inside EAP-Payload AVPs visible between the user and the NAS. Mitigations include EAP methods with identity protection and using Session-Id or pseudonyms for accounting.
section: "8.5"
topics:
    - diameter
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
