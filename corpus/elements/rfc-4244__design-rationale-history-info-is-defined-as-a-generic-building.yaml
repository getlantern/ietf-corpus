document: rfc-4244
kind: design-rationale
summary: History-Info is defined as a generic building block rather than as application-specific mechanism because existing services (voicemail, ACD, follow-me) each had their own proprietary history mechanisms, and a standard mechanism avoids fragmentation while leaving application-specific behavior as a local decision for recipients.
section: "1.3"
topics:
