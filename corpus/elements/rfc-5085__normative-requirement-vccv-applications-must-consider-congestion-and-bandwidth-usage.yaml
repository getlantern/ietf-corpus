document: rfc-5085
kind: normative-requirement
summary: VCCV applications MUST consider congestion and bandwidth usage implications. Outgoing VCCV messages SHOULD be rate-limited to prevent aggressive connectivity verification causing congestion or denial-of-service attacks. ICMP and MPLS LSP Ping SHOULD be rate-limited to below 5% of the associated PW's bit-rate.
section: "9"
rfc2119_level: MUST
topics:
    - congestion
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
