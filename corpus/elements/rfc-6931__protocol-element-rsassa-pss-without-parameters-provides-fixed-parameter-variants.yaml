document: rfc-6931
kind: protocol-element
summary: RSASSA-PSS without parameters provides fixed-parameter variants combining hash and MGF1 in a single URI (e.g., 'sha256-rsa-MGF1', 'sha3-256-rsa-MGF1', 'whirlpool-rsa-MGF1'). Fourteen such identifiers are defined; all use the same hash function for both digest and MGF1, trailer field 0xBC, and salt length equal to hash output length.
section: 2.3.10
topics:
    - crypto
    - security
