document: rfc-2911
kind: state-machine
summary: 'A Printer object has three states: ''idle'' (ready to accept and print jobs), ''processing'' (printing one or more jobs), and ''stopped'' (not currently capable of printing, needs attention). Transitions are driven by Pause-Printer, Resume-Printer operations, and job processing events.'
section: 4.4.11
