document: rfc-5847
kind: security-consideration
summary: Heartbeat messages carry no sensitive data useful to eavesdroppers, so confidentiality protection is not required. However, IPsec integrity protection MUST be supported and should be enforced via SPD entries using the new MH Type 13 selector.
section: "6"
topics:
