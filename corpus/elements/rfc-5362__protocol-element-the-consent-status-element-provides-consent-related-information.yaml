document: rfc-5362
kind: protocol-element
summary: 'The <consent-status> element provides consent-related information about a resource to be added to a relay''s translation logic. It is an XML element in the namespace ''urn:ietf:params:xml:ns:consent-status'' and takes one of five values: pending, waiting, error, denied, or granted.'
