document: rfc-3042
kind: security-consideration
summary: When SACK is in use, the TCP sender has strong protection against false duplicate ACKs because SACK duplicate ACKs report sequence numbers of newly received data, allowing the sender to verify the ACK acknowledges data it actually sent before transmitting new segments.
