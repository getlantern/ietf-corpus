document: rfc-4502
kind: design-rationale
summary: Protocol directory 'limited extensibility' allows table-driven decoding to extend one layer above what static code supports (e.g., recognizing new UDP port numbers as distinct protocols) without arbitrary protocol parsing. This is explicitly limited to one additional level to reflect the static nature of probe software.
