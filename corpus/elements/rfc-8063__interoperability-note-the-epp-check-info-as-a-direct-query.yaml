document: rfc-8063
kind: interoperability-note
summary: The EPP <check>, <info> (as a direct query), <transfer>, <delete>, <renew>, and <update> commands have no mapping defined for key relay objects. Only <create> (to submit key material) and the poll-based <info> response are defined.
