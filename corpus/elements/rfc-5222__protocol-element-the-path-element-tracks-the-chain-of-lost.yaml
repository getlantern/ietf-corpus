document: rfc-5222
kind: protocol-element
summary: The <path> element tracks the chain of LoST servers through which a request has passed using one or more <via> child elements, each carrying a LoST application unique string. It is used to prevent loops and enable request tracing; the authoritative server copies it verbatim into the response.
section: "6"
topics:
