document: rfc-7587
kind: protocol-element
summary: The 'cbr' parameter (0 or 1, default 0) is a unidirectional receive-only parameter indicating whether the decoder prefers constant bitrate (1) or variable bitrate (0). When cbr=1, the maximum average bitrate can still change to adapt to network conditions.
