document: rfc-5437
kind: normative-requirement
summary: An implementation MUST ignore any XMPP URI action or key it does not understand, processing the URI as if the unknown action or key were not present. It is RECOMMENDED to support the XMPP 'message' query type with 'body' and 'subject' keys.
section: "4"
rfc2119_level: MUST
topics:
