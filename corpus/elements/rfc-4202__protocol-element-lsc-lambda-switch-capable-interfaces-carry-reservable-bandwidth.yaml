document: rfc-4202
kind: protocol-element
summary: LSC (Lambda-Switch Capable) interfaces carry Reservable Bandwidth per priority as additional ISCD information. Multiple ISCDs may be advertised per interface to handle multiple data rates or encodings within a single TE link (e.g., STM-16 and STM-64 lambdas on the same interface).
