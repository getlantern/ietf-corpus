document: rfc-5255
kind: design-rationale
summary: IMAP human-readable text is limited to US-ASCII in RFC 3501 to preserve backwards compatibility. The LANGUAGE extension is designed as an opt-in negotiation so that only clients that explicitly request localization receive non-ASCII responses, avoiding breakage of deployed implementations.
