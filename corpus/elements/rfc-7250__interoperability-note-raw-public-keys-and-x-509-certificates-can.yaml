document: rfc-7250
kind: interoperability-note
summary: 'Raw public keys and X.509 certificates can be combined in the same handshake: for example, the client may use a raw public key for client authentication while the server provides an X.509 certificate. The client can express an ordered preference list in server_certificate_type, and the server selects one value.'
section: "5.3"
topics:
