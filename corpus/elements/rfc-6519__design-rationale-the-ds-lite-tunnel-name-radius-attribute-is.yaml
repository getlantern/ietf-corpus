document: rfc-6519
kind: design-rationale
summary: The DS-Lite-Tunnel-Name RADIUS attribute is defined to mirror the existing DHCPv6 OPTION_AFTR_NAME option (RFC 6334), deliberately reusing the same FQDN encoding so that the NAS can forward the value directly into the DHCPv6 option without any transformation.
section: "4.1"
topics:
    - radius
    - v6ops
