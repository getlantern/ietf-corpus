document: rfc-2262
kind: normative-requirement
summary: Upon receiving a message where authFlag=0 and privFlag=1, the v3MP MUST increment snmpInvalidMsgs, generate a Report PDU, discard the message without further processing, and return FAILURE.
section: "7.2"
