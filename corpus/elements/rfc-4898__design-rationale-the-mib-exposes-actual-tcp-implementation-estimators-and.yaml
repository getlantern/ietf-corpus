document: rfc-4898
kind: design-rationale
summary: The MIB exposes actual TCP implementation estimators and state variables rather than precisely defined network-path metrics. This makes it more useful for understanding how a specific implementation interacts with the network but means objects may not be exactly comparable across different TCP implementations.
section: "3.2"
