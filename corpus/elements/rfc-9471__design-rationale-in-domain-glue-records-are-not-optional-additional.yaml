document: rfc-9471
kind: design-rationale
summary: In-domain glue records are not optional additional data; they are required for resolution. This is in contrast to other additional-section data which may be omitted freely. The document clarifies that the TC flag must be set rather than silently truncating required glue.
section: "1"
topics:
    - dns
