summary: The UpdateStreamReq body (media type 'application/alto-updatestreamparams+json') carries an 'add' map (SubstreamID -> AddUpdateReq) specifying resources to monitor. Each AddUpdateReq includes resource-id, optional version tag, optional incremental-changes Boolean, and optional input for POST-mode resources.
