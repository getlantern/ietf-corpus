document: rfc-6062
kind: normative-requirement
summary: After ConnectionBind is received, data on the client data connection MUST be forwarded as-is to the peer data connection and vice versa, including data buffered before ConnectionBind was received. No encapsulation or framing is applied.
section: "5.4"
rfc2119_level: MUST
topics:
    - nat
    - tcp
