document: rfc-2535
kind: normative-requirement
summary: Security-aware servers MUST NOT consider SIG RRs to authenticate anything before their signature inception or after their expiration time, and MUST NOT consider any RR authenticated after all its signatures have expired. TTLs in cached entries SHOULD be trimmed not to extend beyond the authentication expiration time.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
