document: rfc-1850
kind: protocol-element
summary: ospfAreaTable describes configured parameters and cumulative statistics of each attached area, indexed by ospfAreaId. Fields include ospfAuthType (obsolete at area level), ospfImportAsExtern (importExternal/importNoExternal/importNssa), ospfSpfRuns, ospfAreaBdrRtrCount, ospfAreaLsaCount, ospfAreaLsaCksumSum, ospfAreaSummary, and ospfAreaStatus (RowStatus).
section: "3.2"
topics:
    - routing
    - snmp
