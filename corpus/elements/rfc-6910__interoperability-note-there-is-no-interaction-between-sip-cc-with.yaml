document: rfc-6910
kind: interoperability-note
summary: There is no interaction between SIP CC with queuing (this specification) and Automatic Redial (RFC 5359 Section 2.17, based on the dialog event package). The two solutions differ in callee's monitor and caller behavior; a CC event subscription and a dialog event subscription serve different roles and are independent.
section: "4.3"
topics:
