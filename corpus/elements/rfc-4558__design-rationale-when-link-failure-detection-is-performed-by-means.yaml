document: rfc-4558
kind: design-rationale
summary: When link failure detection is performed by means other than RSVP Hello messages (e.g., BFD), Node-ID based Hello sessions are optimal for detecting signaling adjacency failures when there is more than one link between a pair of nodes, as interface-bound Hellos would conflate link and adjacency failures.
section: "1"
topics:
