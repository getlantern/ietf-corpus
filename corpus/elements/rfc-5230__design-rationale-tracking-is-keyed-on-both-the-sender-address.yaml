document: rfc-5230
kind: design-rationale
summary: Tracking is keyed on both the sender address and the response identity (either an explicit :handle or a hash of :subject, :from, :mime, and reason) so that different auto-reply texts can each be sent once to the same correspondent without one suppressing the other.
