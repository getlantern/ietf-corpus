document: rfc-5343
kind: normative-requirement
summary: An SNMP command responder implementing this specification MUST register their pduTypes using the localEngineID snmpEngineID value by invoking the registerContextEngineID() ASI defined in RFC 3412, in addition to the normal registration under the engine's actual snmpEngineID.
section: "3.1"
rfc2119_level: MUST
