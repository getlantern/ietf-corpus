document: rfc-4090
kind: normative-requirement
summary: A backup path must inherit its LSP ID from the associated protected LSP. The only SENDER_TEMPLATE field that may differ between a backup path and its protected LSP is the 'IPv4 (or IPv6) tunnel sender address'.
section: "6.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
