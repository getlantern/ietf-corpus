document: rfc-6203
kind: security-consideration
summary: Relevancy rankings may be susceptible to poisoning by attackers using certain keywords or hidden markup (e.g., HTML) to boost message scores. Clients should mitigate this by allowing users to see all search results rather than hiding those below a score threshold.
