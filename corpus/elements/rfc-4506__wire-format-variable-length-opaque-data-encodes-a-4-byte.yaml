document: rfc-4506
kind: wire-format
summary: Variable-length opaque data encodes a 4-byte unsigned integer length n, followed by n bytes of data, followed by 0–3 zero padding bytes. The maximum length m defaults to 2^32-1 if unspecified; encoding a length exceeding the declared maximum is an error.
section: "4.10"
