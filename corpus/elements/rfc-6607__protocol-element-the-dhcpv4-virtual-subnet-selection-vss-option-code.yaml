document: rfc-6607
kind: protocol-element
summary: The DHCPv4 Virtual Subnet Selection (VSS) option (code 221) carries a Type byte followed by VSS information and is used by DHCP clients or proxies communicating VSS information directly to a DHCPv4 server. Minimum length is 1 octet (Type byte only). Option codes and length fields are each 1 octet.
section: "3.1"
topics:
