document: rfc-854
kind: design-rationale
summary: The Network Virtual Terminal (NVT) was introduced as an imaginary standard intermediate device so that neither user nor server hosts need to maintain information about each other's terminal characteristics. Each end maps its local conventions to appear as an NVT, eliminating the combinatorial problem of per-host terminal handling.
section: GENERAL CONSIDERATIONS
