document: rfc-8876
kind: normative-requirement
summary: For large data payloads, the sender SHOULD use the by-reference mechanism from RFC 7852, making data available via HTTPS, placing a URI in the Call-Info header field, so the recipient retrieves the data using HTTPS rather than embedding it in the SIP MESSAGE.
section: "7"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
