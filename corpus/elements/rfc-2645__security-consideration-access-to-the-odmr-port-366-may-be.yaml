document: rfc-2645
kind: security-consideration
summary: Access to the ODMR port (366) may be restricted via TCP wrappers, firewalls, or server configuration to limit connections to the provider's network, since the service is only useful to pre-arranged parties. This supplements but does not replace the AUTH requirement.
