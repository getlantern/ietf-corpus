document: rfc-9606
kind: security-consideration
summary: 'DNS clients MUST use one of two measures to prevent DNS response forgery: (1) establish an authenticated secure connection to the DNS resolver, or (2) implement local DNSSEC validation to verify authenticity of the resolver information. Only measure (1) applies to queries for ''resolver.arpa''.'
section: "7"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
