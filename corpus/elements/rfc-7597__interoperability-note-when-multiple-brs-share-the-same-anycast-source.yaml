document: rfc-7597
kind: interoperability-note
summary: When multiple BRs share the same anycast source address, fragmented packets from different BRs to the same CE may collide on fragment IDs, causing incorrect reassembly. RFC 4459 Section 3.4 suggests solving this by fragmenting the inner packet.
section: 8.3.1
topics:
