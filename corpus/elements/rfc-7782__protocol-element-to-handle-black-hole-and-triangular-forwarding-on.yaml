document: rfc-7782
kind: protocol-element
summary: To handle black-hole and triangular forwarding on sub-link failure, the AAE member RBridge attached to the failed sub-link uses the ESADI protocol to flush affected MAC addresses (per RFC 7357 Section 5.2), causing remote RBridges to stop forwarding to the failed port without requiring intra-AAE traffic redirection.
section: "5.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
