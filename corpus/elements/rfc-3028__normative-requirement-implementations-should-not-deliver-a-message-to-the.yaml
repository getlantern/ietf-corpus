document: rfc-3028
kind: normative-requirement
summary: Implementations SHOULD NOT deliver a message to the same folder more than once even if a script explicitly files it there twice; however, writing to a mailbox twice MUST NOT be treated as an error.
section: 2.10.3
rfc2119_level: SHOULD NOT
topics:
    - email
