document: rfc-3711
kind: protocol-element
summary: The default and mandatory-to-implement encryption transform is AES in Segmented Integer Counter Mode (AES-CM) with a 128-bit session encryption key and a 112-bit session salt. AES-f8 is optional. The NULL cipher is also mandatory-to-implement for use when confidentiality is not required.
section: "5.1"
topics:
