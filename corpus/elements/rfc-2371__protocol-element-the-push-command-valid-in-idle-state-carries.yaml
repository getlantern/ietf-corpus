document: rfc-2371
kind: protocol-element
summary: The PUSH command (valid in Idle state) carries the superior's transaction identifier. A PUSHED response returns the subordinate's identifier and enters Enlisted state; ALREADYPUSHED returns the subordinate's identifier but keeps the connection in Idle state, indicating the two-phase commit will arrive on a different connection.
section: "13"
