document: rfc-7460
kind: protocol-element
summary: 'The IANAPowerStateSet-MIB defines the PowerStateSet Textual Convention encoding three Power State Sets: IEEE1621 (base value 256, Off/Sleep/On), DMTF (base value 512, 15 states including graceful variants), and EMAN (base value 1024, 12 states from MechOff through High). The encoding formula is: Power State Set S occupies value S*256, and Power State X within set S occupies S*256 + X + 1.'
section: "9.1"
topics:
    - snmp
    - registry
