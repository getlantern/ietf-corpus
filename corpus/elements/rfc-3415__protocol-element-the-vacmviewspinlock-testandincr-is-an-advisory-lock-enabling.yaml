document: rfc-3415
kind: protocol-element
summary: The vacmViewSpinLock (TestAndIncr) is an advisory lock enabling cooperating SNMP Command Generators to coordinate creation and modification of MIB views. It prevents races when multiple managers modify views concurrently; its use is not enforced by the protocol.
section: "4"
topics:
