document: rfc-8896
kind: normative-requirement
summary: A cost type name MUST NOT appear more than once in the 'calendar-attributes' member of a resource entry. Multiple appearances MUST cause the Client to ignore occurrences beyond the first encountered. As an alternative, the Client MAY ignore all CalendarAttributes objects containing that name and fall back to RFC 7285.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
