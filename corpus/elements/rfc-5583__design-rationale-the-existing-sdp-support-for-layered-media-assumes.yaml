document: rfc-5583
kind: design-rationale
summary: The existing SDP support for layered media assumes a one-dimensional hierarchy where a higher transport address identifies a higher layer, making identification of an Operation Point trivial. Newer media formats such as SVC and MVC use tree-shaped dependency hierarchies that SDP cannot express, necessitating the new DDP mechanism.
section: "4.1"
