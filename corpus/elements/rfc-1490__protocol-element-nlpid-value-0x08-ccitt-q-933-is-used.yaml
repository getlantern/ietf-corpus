document: rfc-1490
kind: protocol-element
summary: NLPID value 0x08 (CCITT Q.933) is used for protocols that have neither an assigned NLPID nor a SNAP encapsulation. The four octets following the NLPID carry both layer 2 and layer 3 protocol identification using code points defined in ANSI T1.617.
