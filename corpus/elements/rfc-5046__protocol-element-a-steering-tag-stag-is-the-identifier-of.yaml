document: rfc-5046
kind: protocol-element
summary: A Steering Tag (STag) is the identifier of an I/O Buffer on an RDMA-Capable Controller that the initiator Advertises to the target by embedding it in the iSER header of a SendSE Message containing the SCSI Command PDU. The base Tagged Offset is always implicitly zero; the buffer length is taken from the SCSI Command PDU.
section: 1.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
