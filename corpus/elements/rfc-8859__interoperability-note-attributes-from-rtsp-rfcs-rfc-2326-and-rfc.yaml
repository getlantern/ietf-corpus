document: rfc-8859
kind: interoperability-note
summary: Attributes from RTSP RFCs (RFC 2326 and RFC 7826) — range, control, mtag, etag — are CAUTION because RFC 8843 mandates the offer/answer usage of SDP, whereas these RTSP SDP attributes are defined only for declarative SDP usage. RTSP is not supported for RTP stream multiplexing.
section: "5.46"
topics:
