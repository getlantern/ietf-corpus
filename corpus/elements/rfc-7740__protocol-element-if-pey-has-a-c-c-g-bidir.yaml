document: rfc-7740
kind: protocol-element
summary: If PEy has a (C-*,C-G-BIDIR) join state from its CEs but no corresponding S-PMSI A-D route from its Upstream PE, PEy uses the (C-*,C-*-BIDIR) tunnel instead; if no (C-*,C-*-BIDIR) S-PMSI A-D route exists either, the provider tunnel has an empty set of leaves and PEy does not forward relevant traffic across the provider network.
section: "2.2"
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
