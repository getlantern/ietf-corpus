document: rfc-1725
kind: security-consideration
summary: The USER/PASS authentication mechanism sends passwords in cleartext over the network. Use of RETR and TOP also transmits mail content in the clear. APOP is the alternative that avoids sending a password in the clear by using a challenge-response MD5 digest.
section: "12"
topics:
