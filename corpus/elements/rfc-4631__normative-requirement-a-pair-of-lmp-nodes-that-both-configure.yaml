document: rfc-4631
kind: normative-requirement
summary: A pair of LMP nodes that both configure lmpCcSetupRole as passive(2) will never establish control channel communications; at least one node in each control channel pair must take the active role to initiate channel establishment.
section: "9"
rfc2119_level: MUST
topics:
