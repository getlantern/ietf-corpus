document: rfc-6791
kind: security-consideration
summary: Translating ICMPv6 messages to IPv4 ICMP causes messages to be forwarded that would otherwise be discarded; a spoofed ICMPv6 source address may result in ICMP replies arriving at IPv4 hosts that did not expect them via the translator facility.
section: "6"
topics:
