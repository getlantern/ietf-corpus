document: rfc-4741
kind: security-consideration
summary: NETCONF connections must provide authentication, data integrity, and confidentiality, delegated entirely to the transport layer (e.g., SSH or TLS). The protocol itself provides no built-in security mechanisms.
section: "9"
topics:
