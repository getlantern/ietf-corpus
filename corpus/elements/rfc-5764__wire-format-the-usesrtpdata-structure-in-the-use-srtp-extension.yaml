document: rfc-5764
kind: wire-format
summary: The UseSRTPData structure in the use_srtp extension contains a SRTPProtectionProfiles list (2 to 2^16-1 bytes, each profile is a 2-byte uint8[2]) ordered by descending preference, followed by an srtp_mki field (0 to 255 bytes). A zero-length srtp_mki indicates no MKI will be used.
section: 4.1.1
topics:
