document: rfc-3986
kind: design-rationale
summary: The URI character set is limited to the basic Latin alphabet, digits, and a few special characters to permit global transcription across diverse media (paper, keyboards, screens). The ability to transcribe a URI from one medium to another was prioritized over using the most meaningful but potentially untypeable characters.
section: 1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
