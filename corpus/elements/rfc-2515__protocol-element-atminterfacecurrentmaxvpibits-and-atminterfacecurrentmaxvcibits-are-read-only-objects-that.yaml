document: rfc-2515
kind: protocol-element
summary: atmInterfaceCurrentMaxVpiBits and atmInterfaceCurrentMaxVciBits are read-only objects that reflect the negotiated minimum of each interface's Max Active bits and its UNI/NNI peer's Max Active bits, obtained via ILMI. These constrain the VPI/VCI address space actually usable on the link.
