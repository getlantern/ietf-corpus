document: rfc-8545
kind: normative-requirement
summary: A TWAMP Control-Client that supports the allocated TWAMP-Test Receiver Port MAY request that port number in the Request-TW-Session command. If the Server does not support it, the Server sends an alternate port in Accept-Session with Accept field = 0.
section: "5.1"
rfc2119_level: MAY
topics:
    - measurement
