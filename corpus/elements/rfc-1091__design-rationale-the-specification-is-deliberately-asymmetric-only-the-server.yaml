document: rfc-1091
kind: design-rationale
summary: 'The specification is deliberately asymmetric: only the server initiates SEND requests and only the client responds with IS. This reflects the assumption that server operating systems and applications cannot change terminal types at arbitrary points in a session, whereas clients (workstations with multiple emulation modes) can.'
section: "5"
