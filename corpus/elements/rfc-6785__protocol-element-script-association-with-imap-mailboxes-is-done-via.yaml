document: rfc-6785
kind: protocol-element
summary: Script association with IMAP mailboxes is done via IMAP Metadata. If the '/shared/imapsieve/script' mailbox metadata entry exists, it is used; otherwise the server-level entry of the same name is used as a global default. If neither exists, no script is invoked.
section: 2.3.1
topics:
    - email
