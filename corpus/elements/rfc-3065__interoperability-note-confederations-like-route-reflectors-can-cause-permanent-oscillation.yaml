document: rfc-3065
kind: interoperability-note
summary: Confederations (like route reflectors) can cause permanent oscillation between candidate routes when using BGP tie-breaking rules, because different reachability information is excluded at different locations. Care must be taken in selecting MED values and tie-breaking policy.
section: "9"
topics:
