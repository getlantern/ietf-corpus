document: rfc-9598
kind: normative-requirement
summary: Certificate Authorities that wish to issue CA certificates with email address name constraints MUST use rfc822Name subject alternative names only. These MUST be IDNA2008-conformant names with no mappings and with non-ASCII domains encoded in A-labels only.
section: "6"
rfc2119_level: MUST
topics:
    - pkix
    - email
