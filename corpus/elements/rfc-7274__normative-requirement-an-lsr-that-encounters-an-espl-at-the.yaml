document: rfc-7274
kind: normative-requirement
summary: An LSR that encounters an ESPL at the top of the stack (after XL) that it does not understand MUST drop the packet. In either XL or ESPL drop case, the LSR MAY log the event but such logging MUST be rate-limited.
section: 3.1.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
