document: rfc-9343
kind: interoperability-note
summary: The AltMark Option can be used with Segment Routing over IPv6 (SRv6). When a Routing Header is present, Destination Options placed before the Routing Header are processed by each waypoint in the route list, enabling per-segment measurement.
