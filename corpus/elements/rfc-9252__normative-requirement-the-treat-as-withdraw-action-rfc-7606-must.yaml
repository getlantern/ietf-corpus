document: rfc-9252
kind: normative-requirement
summary: The treat-as-withdraw action (RFC 7606) MUST be performed when at least one malformed SRv6 Service TLV is present in the BGP Prefix-SID attribute. A path with a Prefix-SID attribute containing no valid SRv6 SID information MUST be considered ineligible during best path selection.
section: "7"
rfc2119_level: MUST
topics:
    - bgp
    - routing
