document: rfc-6550
kind: protocol-element
summary: The Destination Advertisement Object (DAO, Code 0x02) establishes downward routes. In Storing mode, DAOs are sent to DODAG parents; in Non-Storing mode, DAOs are unicast over multiple hops to the DODAG root using global or unique-local addresses.
section: "6.4"
