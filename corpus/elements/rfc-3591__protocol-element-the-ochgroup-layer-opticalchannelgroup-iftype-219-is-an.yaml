document: rfc-3591
kind: protocol-element
summary: The OChGroup layer (opticalChannelGroup, ifType 219) is an optional layer introduced to support banded amplifier implementations (e.g., C-band and L-band). When not needed, this layer is absent and the model degenerates to the OTS/OMS/OCh structure; when a full-band amplifier is present, optIfOMSn objects should be used instead of optIfOChGroup.
section: "2.1"
topics:
    - snmp
