document: rfc-3925
kind: wire-format
summary: 'The V-I Vendor Class option format: 1-octet option-code (124), 1-octet option-len, then one or more repetitions of 4-octet enterprise-number, 1-octet data-len, and variable-length vendor-class-data. Each vendor-class-data item is itself length-prefixed with a 1-octet data-len followed by opaque-data.'
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
