document: rfc-3501
kind: protocol-element
summary: Each client command is prefixed with a unique tag string (e.g., 'A0001'). Server completion responses carry the matching tag, enabling response correlation when multiple commands are in progress. Untagged server data is prefixed with '*' and command continuation requests with '+'.
section: 2.2.1
