document: rfc-8200
kind: normative-requirement
summary: IPv6 nodes must not create overlapping fragments. When reassembling, if any constituent fragment is an overlapping fragment, the entire datagram and all constituent fragments must be silently discarded with no ICMP error message sent.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
