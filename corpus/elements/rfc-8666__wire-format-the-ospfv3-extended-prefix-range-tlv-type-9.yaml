document: rfc-8666
kind: wire-format
summary: 'The OSPFv3 Extended Prefix Range TLV (Type 9) encodes a contiguous block of prefixes with fields: Prefix Length (8 bits), AF (8 bits, 0=IPv4 unicast, 1=IPv6 unicast), Range Size (16 bits), Flags (8 bits reserved), Address Prefix (variable), and Sub-TLVs. It appears in E-Intra-Area-Prefix-LSA, E-Inter-Area-Prefix-LSA, E-AS-External-LSA, and E-Type-7-LSA.'
