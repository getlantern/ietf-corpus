document: rfc-2449
kind: wire-format
summary: POP3 commands are defined as 'keyword *(SP param) CRLF' with a 255-octet maximum. Single-line responses are 'status [SP text] CRLF' with a 512-octet maximum. Response codes use the form '[' resp-level *('/' resp-level) ']' embedded at the start of response text. The CAPA response is 'single-line *capability "." CRLF' with each capability line limited to 512 octets.
