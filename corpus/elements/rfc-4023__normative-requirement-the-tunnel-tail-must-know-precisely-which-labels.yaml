document: rfc-4023
kind: normative-requirement
summary: The tunnel tail MUST know precisely which labels it has distributed to tunnel heads of IPsec-secured tunnels. Those labels MUST NOT be distributed to any other LSP adjacencies, and MPLS packets received without IPsec encapsulation bearing such labels MUST be discarded.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
