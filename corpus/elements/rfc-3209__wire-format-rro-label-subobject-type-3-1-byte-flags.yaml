summary: 'RRO Label subobject (type 3): 1-byte Flags (0x01=Global label), 1-byte C-Type (copied from Label object), followed by contents of the Label object. A node MUST NOT push a Label Record subobject without also pushing an IPv4 or IPv6 address subobject.'
