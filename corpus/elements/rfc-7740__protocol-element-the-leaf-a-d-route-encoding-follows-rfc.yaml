document: rfc-7740
kind: protocol-element
summary: The Leaf A-D route encoding follows RFC 6514 except that Route Targets are set to the same values as in the corresponding S-PMSI A-D route, ensuring the Leaf A-D route is imported by all VRFs that import the S-PMSI A-D route, irrespective of whether the S-PMSI originator is the receiving PE's Upstream PE.
section: "2.1"
topics:
    - multicast
    - mpls
    - routing
