document: rfc-9461
kind: normative-requirement
summary: Clients SHOULD NOT query for HTTPS RRs when using "dohpath"; instead, the SvcParams and address records associated with the SVCB record SHOULD be used for the HTTPS connection. However, service operators SHOULD publish an equivalent HTTPS RR for consistency.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - dns
    - http
