document: rfc-5890
kind: protocol-element
summary: A domain name slot is a protocol element, function argument, or return value explicitly designated for carrying a domain name—such as the DNS QNAME field, the gethostbyname() argument, or the host portion of a URI. Strings with domain name syntax appearing in general text (e.g., email body) are not in domain name slots.
section: 2.3.2.6
topics:
    - dns
