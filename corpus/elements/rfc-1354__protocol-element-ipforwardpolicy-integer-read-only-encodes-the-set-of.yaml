document: rfc-1354
kind: protocol-element
summary: ipForwardPolicy (INTEGER, read-only) encodes the set of conditions for selecting among multipath routes. By default it represents the IP TOS field, mapped so that the 8-bit TOS byte (excluding the low-order reserved bit) yields an integer policy code from 0 to 30. Zero indicates the default path.
section: "4.1"
topics:
    - routing
    - ip
