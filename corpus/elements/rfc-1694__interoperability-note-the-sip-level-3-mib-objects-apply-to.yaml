document: rfc-1694
kind: interoperability-note
summary: 'The SIP Level 3 MIB objects apply to all four SMDS access methods: SIP-based (SIP L1/L2/L3 + PLCP), DXI-based, ATM-based (SIP L3 over ATM), and Frame Relay-based (SIP L3 over FR). Lower-layer objects for ATM and Frame Relay are defined in separate MIB modules (RFC 1695, RFC 1604).'
section: "3"
