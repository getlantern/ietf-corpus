document: rfc-7782
kind: interoperability-note
summary: The Extended TLVs defined in this document are carried in E-L1FS (Extended Level 1 Flooding Scope) PDUs. RBridges that do not support E-L1FS will not receive the EXTENDED-RBRIDGE-CAP APPsub-TLV, and therefore MAC multi-attach active-active is not supported on such RBridges.
section: "6"
topics:
