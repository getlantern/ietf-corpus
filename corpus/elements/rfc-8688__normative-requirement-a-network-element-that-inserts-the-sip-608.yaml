document: rfc-8688
kind: normative-requirement
summary: A network element that inserts the sip.608 feature capability MUST be able to convey at minimum how to contact the operator of the intermediary that rejected the call, and MUST forward the 608 response code as the final response to the INVITE even if it has played an announcement.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
