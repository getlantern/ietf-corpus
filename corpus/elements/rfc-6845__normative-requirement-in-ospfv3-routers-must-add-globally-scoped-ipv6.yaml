document: rfc-6845
kind: normative-requirement
summary: In OSPFv3, routers MUST add globally scoped IPv6 addresses and all globally scoped IPv6 prefixes on the interface to the intra-area-prefix-LSA, with Metric set to the configured output cost. The DR MUST NOT generate an intra-area-prefix-LSA for the transit network for this interface.
section: 4.6.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
