document: rfc-6478
kind: protocol-element
summary: For a static PW switched to another static PW at an S-PE, the LDP header in RFC 6073 procedures is replaced by the PW OAM header. The SP-PE TLV information MUST be configured in the S-PE or no SP-PE TLV will be sent.
section: "6.1"
topics:
    - mpls
