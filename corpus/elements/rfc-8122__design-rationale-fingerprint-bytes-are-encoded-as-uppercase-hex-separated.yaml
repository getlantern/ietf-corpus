document: rfc-8122
kind: design-rationale
summary: Fingerprint bytes are encoded as uppercase hex separated by colons (openssl/browser style) rather than lowercase unseparated hex (HTTP digest style) because consistency with other certificate fingerprint applications was considered more important than consistency with HTTP digest authentication.
