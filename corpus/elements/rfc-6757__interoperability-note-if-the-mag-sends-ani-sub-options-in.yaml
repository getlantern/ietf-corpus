document: rfc-6757
kind: interoperability-note
summary: If the MAG sends ANI sub-options in a PBU but receives a successful PBA without an ANI option, the MAG SHOULD log the event and MAY terminate the mobility session, treating the absence as a potential misconfiguration indicating the LMA does not understand the ANI option.
section: "4.1"
topics:
    - ip
    - mobility
