document: rfc-2623
kind: normative-requirement
summary: Pseudo flavor numbers MUST be registered via the same method as regular RPC security flavor numbers via iana@iana.org. The mapping registration MUST contain the pseudo flavor number, an ASCII string name, and the <mechanism, algorithm(s), service> triple.
section: "3.4"
rfc2119_level: MUST
topics:
    - registry
    - security
