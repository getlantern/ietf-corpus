document: rfc-6221
kind: normative-requirement
summary: 'A Relay-Reply message is valid for the LDRA only if: the Interface-ID option is present and corresponds to a valid interface; the peer-address and destination IP address are identical and link-local when no IP address is configured on the LDRA; and the link-address is Unspecified when no IP address is configured.'
section: "6.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
