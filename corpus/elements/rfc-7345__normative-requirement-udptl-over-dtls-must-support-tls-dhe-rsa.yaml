document: rfc-7345
kind: normative-requirement
summary: UDPTL over DTLS MUST support TLS_DHE_RSA_WITH_AES_128_GCM_SHA256 and TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256, MUST prefer the ECDHE variant and any other PFS cipher suites, and implementations SHOULD disable TLS-level compression.
section: "4.1"
rfc2119_level: MUST
topics:
