document: rfc-5939
kind: normative-requirement
summary: When a transport protocol capability is not included in a potential configuration, the transport protocol from the associated 'm=' line MUST be used. If a potential configuration needs to reference the 'm=' line's transport protocol as a capability, that transport protocol MUST be listed explicitly in a 'a=tcap' attribute.
section: 3.5.1
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
