document: rfc-3986
kind: normative-requirement
summary: When a new URI scheme defines a component representing UCS textual data, the data should first be encoded as UTF-8 octets, then only those octets not in the unreserved set should be percent-encoded. For example, the character À is represented as "%C3%80".
section: "2.5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
