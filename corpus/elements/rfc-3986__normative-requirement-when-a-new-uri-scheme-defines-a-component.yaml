document: rfc-3986
kind: normative-requirement
summary: When a new URI scheme defines a component representing textual UCS data, the data SHOULD first be encoded as octets per UTF-8, and then only those octets outside the unreserved set should be percent-encoded.
section: "2.5"
rfc2119_level: SHOULD
