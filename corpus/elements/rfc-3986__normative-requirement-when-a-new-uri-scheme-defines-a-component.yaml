document: rfc-3986
kind: normative-requirement
summary: When a new URI scheme defines a component representing textual data from UCS, the data should first be encoded as UTF-8 octets; only octets outside the unreserved set should then be percent-encoded.
section: "2.5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
