document: rfc-3986
kind: normative-requirement
summary: When a new URI scheme defines a component representing Universal Character Set text, the data SHOULD first be encoded as UTF-8 octets, then only those octets not in the unreserved set should be percent-encoded (e.g., LATIN CAPITAL LETTER A WITH GRAVE → "%C3%80").
section: "2.5"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
