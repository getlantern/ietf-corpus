document: rfc-2590
kind: design-rationale
summary: Configuring the IPv6 MTU above 4080 octets is strongly discouraged because CRC16 protects frames up to only ~4088 bytes, and CRC32 (needed for larger frames) is not yet widely deployed or mandatory in Frame Relay Forum and ITU-T standards.
