document: rfc-8402
kind: protocol-element
summary: The SR Global Block (SRGB) is the set of global segments in an SR domain. In SR-MPLS it is a node-local set of labels reserved for global segments; in SRv6 it is the set of global SRv6 SIDs. Using identical SRGBs on all nodes in the SR-MPLS domain is strongly recommended.
section: "2"
topics:
