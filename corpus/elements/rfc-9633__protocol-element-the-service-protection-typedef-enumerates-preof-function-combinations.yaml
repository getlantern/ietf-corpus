document: rfc-9633
kind: protocol-element
summary: 'The ''service-protection'' typedef enumerates PREOF function combinations: none, replication (PRF), elimination (PEF), ordering (POF), elimination-ordering (PEF+POF), elimination-replication (PEF+PRF), and elimination-ordering-replication (full PREOF). Corresponds to DetNet service protection defined in RFC 8938 Section 4.3.'
