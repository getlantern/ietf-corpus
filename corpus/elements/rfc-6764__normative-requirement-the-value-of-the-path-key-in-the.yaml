document: rfc-6764
kind: normative-requirement
summary: The value of the 'path' key in the DNS TXT record MUST be the actual context path to the corresponding service on the server. When present, clients MUST use this path value as the context path for HTTP requests.
section: "4"
rfc2119_level: MUST
topics:
    - dns
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
