document: rfc-9646
kind: normative-requirement
summary: When the SZTP-server provides a 'cert-req-info' (CertificationRequestInfo), the ZTP-client MUST use this structure to generate its CSR; failure to do so will result in a 400 Bad Request response containing another 'csr-request' structure.
