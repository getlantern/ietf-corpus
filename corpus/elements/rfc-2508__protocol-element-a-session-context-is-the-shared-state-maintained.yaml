document: rfc-2508
kind: protocol-element
summary: A session context is the shared state maintained between compressor and decompressor for each unique combination of IP source/destination addresses, UDP source/destination ports, and RTP SSRC field. Each context is identified by an 8- or 16-bit Context ID (CID), with a maximum of 65536 contexts. The number of contexts MAY be negotiated.
section: "3.3"
topics:
    - rtp
    - realtime
    - ip
    - udp
