document: rfc-9824
kind: wire-format
summary: 'NSEC3 record for nonexistent name: owner is Base32-Extended-Hex-encoded SHA-1 hash of QNAME as a label prepended to zone name; Next Hashed Owner Name is hash+1 (binary increment); Type Bit Maps contains only NXNAME. Example: ''H64KFA4P1ACER2EBPS9QSDK6DNP8B3JQ.example.com. IN NSEC3 1 0 0 - H64KFA4P1ACER2EBPS9QSDK6DNP8B3JR NXNAME''.'
