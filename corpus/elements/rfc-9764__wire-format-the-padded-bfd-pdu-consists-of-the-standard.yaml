document: rfc-9764
kind: wire-format
summary: The padded BFD PDU consists of the standard BFD Control packet (minimum 24 or 26 bytes) followed by zero-filled padding bytes up to bfd.PaddedPduSize. The total transport protocol (UDP) payload length equals bfd.PaddedPduSize; padding bytes MUST be zero and SHOULD NOT be validated by the receiver.
section: "3"
topics:
    - routing
