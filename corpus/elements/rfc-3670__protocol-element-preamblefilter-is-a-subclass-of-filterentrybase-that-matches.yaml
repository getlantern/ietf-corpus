document: rfc-3670
kind: protocol-element
summary: PreambleFilter is a subclass of FilterEntryBase that matches on '<type>,<value>' strings stored by a PreambleMarkerService. For the three meter-related types, the value field may be a wildcard 'any', allowing a single ClassifierElement to select all conforming (or nonconforming) packets regardless of which meter they traversed.
section: 3.8.3
topics:
