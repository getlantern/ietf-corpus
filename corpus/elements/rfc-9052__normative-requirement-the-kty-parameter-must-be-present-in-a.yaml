document: rfc-9052
kind: normative-requirement
summary: The 'kty' parameter MUST be present in a COSE_Key object. Implementations MUST verify that the key type is appropriate for the algorithm being processed, and the key type MUST be included as part of the trust-decision process.
section: "7.1"
rfc2119_level: MUST
topics:
