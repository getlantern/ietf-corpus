document: rfc-4974
kind: normative-requirement
summary: The short Call ID is a 16-bit identifier that MUST be exchanged on the Notify message during Call initialization and used on all subsequent LSP messages associated with the Call. The Call ID MUST NOT be used as part of the processing to determine the session to which an RSVP signaling message applies.
section: 5.2.2
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
