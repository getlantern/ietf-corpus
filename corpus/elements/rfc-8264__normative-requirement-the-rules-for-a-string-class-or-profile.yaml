document: rfc-8264
kind: normative-requirement
summary: 'The rules for a string class or profile MUST be applied in this order: (1) Width Mapping, (2) Additional Mapping, (3) Case Mapping, (4) Normalization, (5) Directionality, (6) Behavioral rules for code point validity. Implementations MUST NOT modify the order of operations within the derived property calculation algorithm.'
section: "7"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
