document: rfc-2231
kind: wire-format
summary: 'The ABNF for extended-initial-name is: attribute [initial-section] "*", where initial-section is "*0" and other-sections is "*" followed by a non-zero digit and optional additional digits. The extended-initial-value is: [charset] "''" [language] "''" extended-other-values, where ext-octet is "%" followed by two hex digits.'
