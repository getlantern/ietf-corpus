document: rfc-4479
kind: protocol-element
summary: The Presentity URI uniquely identifies a presentity and is ideally set to the identifier used to request the document (e.g., the Request-URI of a SIP SUBSCRIBE). It is independent of any specific service or device and represents a 'one-number' communications handle from which all service URIs can be discovered.
section: "3.1"
topics:
