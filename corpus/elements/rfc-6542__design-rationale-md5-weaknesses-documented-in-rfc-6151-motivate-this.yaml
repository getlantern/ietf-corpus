document: rfc-6542
kind: design-rationale
summary: MD5 weaknesses (documented in RFC 6151) motivate this update. RFC 4121 used MD5 to calculate channel binding verifiers, but newly discovered vulnerabilities require the ability to use stronger hash algorithms negotiated via the Kerberos crypto framework (RFC 3961).
section: "1"
topics:
