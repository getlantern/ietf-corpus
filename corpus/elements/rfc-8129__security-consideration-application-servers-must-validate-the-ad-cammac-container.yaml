document: rfc-8129
kind: security-consideration
summary: Application servers MUST validate the AD-CAMMAC container before making authorization decisions based on AD-AUTHENTICATION-INDICATOR elements, and MUST NOT make authorization decisions based on AD-AUTHENTICATION-INDICATOR elements that appear outside of AD-CAMMAC containers.
section: "5"
rfc2119_level: MUST NOT
