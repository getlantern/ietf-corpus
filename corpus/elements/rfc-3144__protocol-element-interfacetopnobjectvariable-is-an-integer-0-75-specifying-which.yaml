document: rfc-3144
kind: protocol-element
summary: interfaceTopNObjectVariable is an INTEGER (0..75) specifying which MIB counter to rank interfaces by. Values 0-22 map to IF-MIB objects, 23-37 to EtherLike-MIB, 38-55 to TOKENRING-MIB, 56-72 to RMON-MIB, and 73-75 to BRIDGE-MIB.
