document: rfc-8691
kind: design-rationale
summary: Semantically opaque IIDs (rather than EUI-64-derived IIDs) are preferred because privacy-sensitive information is absent from Interface IDs when it is impossible to calculate back the initial MAC address value from which the IID was generated.
