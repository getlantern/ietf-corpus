document: rfc-8693
kind: design-rationale
summary: The response reuses the 'access_token' parameter from RFC 6749 Section 5.1 for historical reasons and to allow reuse of existing OAuth 2.0 token endpoint constructs; the issued token need not be an OAuth access token. The 'token_type' value 'N_A' is used when the issued token is not usable as an access token.
section: 2.2.1
topics:
    - oauth
