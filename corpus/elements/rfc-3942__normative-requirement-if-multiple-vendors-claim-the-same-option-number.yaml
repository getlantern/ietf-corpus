document: rfc-3942
kind: normative-requirement
summary: If multiple vendors claim the same option number and can demonstrate reasonably wide use, none of the vendors will be allowed to keep that option number and they MUST go through the normal publicly assigned option process per RFC 2939.
section: "4"
rfc2119_level: MUST
topics:
