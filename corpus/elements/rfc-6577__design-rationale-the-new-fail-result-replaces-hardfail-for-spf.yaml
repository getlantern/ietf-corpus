document: rfc-6577
kind: design-rationale
summary: 'The new ''fail'' result replaces ''hardfail'' for SPF (and Sender-ID) failures and carries the same definition previously used for ''hardfail'' in RFC 5451 Section 2.4.2: the client is explicitly not authorized to inject or relay mail using the sender''s DNS domain. The rename aligns the registry with the SPF specification''s own terminology.'
section: "3"
topics:
