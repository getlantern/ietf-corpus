document: rfc-3440
kind: protocol-element
summary: The ADSL-LINE-EXT-MIB module (adslExtMIB) is defined as a supplement to the ADSL-LINE-MIB (RFC 2662), rooted at adslMIB 3. It adds managed objects for transmission mode control, G.Lite power state, fast retrain counters, severely errored seconds-line, unavailable seconds-line, line mode profiles, and alarm thresholds.
