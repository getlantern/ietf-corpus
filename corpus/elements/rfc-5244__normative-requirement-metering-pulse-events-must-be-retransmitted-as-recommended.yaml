document: rfc-5244
kind: normative-requirement
summary: Metering pulse events MUST be retransmitted as recommended in Section 2.5.1.4 of RFC 4733. It is RECOMMENDED that the retransmission interval be the lesser of 50 ms and the pulsing rate, but no less than the audio packetization rate.
section: "2.7"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
