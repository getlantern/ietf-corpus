document: rfc-7783
kind: security-consideration
summary: RBridges in a campus are generally trusted routers, and the authenticity of LSPs and link-local PDUs carrying Affinity sub-TLVs can be enforced using IS-IS security mechanisms (including RFC 5310 cryptographic authentication). Application-specific security considerations for Affinity sub-TLV use cases will be covered in application-specific documents.
section: "6"
topics:
