document: rfc-2605
kind: interoperability-note
summary: The MIB is specified in SMIv2. A conforming SMIv1 translation can be produced, but Counter64 objects cannot be translated and will be omitted; machine-readable SMIv2 information becomes textual descriptions. This loss does not change semantics.
