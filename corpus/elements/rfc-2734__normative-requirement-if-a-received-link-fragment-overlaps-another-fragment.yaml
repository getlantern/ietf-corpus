document: rfc-2734
kind: normative-requirement
summary: If a received link fragment overlaps another fragment identified by the same source_ID and dgl, previously accumulated fragments in the reassembly buffer SHALL be discarded and reassembly MAY recommence with the most recently received fragment.
section: "4.3"
rfc2119_level: MUST
