document: rfc-8651
kind: protocol-element
summary: The Queue Parameters Data Item (Type 23) is sent by a modem to a router to indicate DSCP values that may be independently paused. It groups DSCPs into logical queues identified by a Queue Index field, with queue index zero covering DSCPs not otherwise associated with a queue.
section: "3.1"
topics:
