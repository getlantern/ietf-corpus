summary: 'The NSSA translator state machine (ospfAreaNssaTranslatorState) has three states: enabled (role set to ''always''), elected (candidate border router is actively translating type-7 LSAs to type-5), and disabled (candidate is not translating). Transitions are driven by NSSA translator election.'
