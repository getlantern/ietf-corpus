document: rfc-4474
kind: privacy-consideration
summary: 'The mechanism is compatible with RFC 3323 privacy: anonymous URIs like ''sip:anonymous@example.com'' can be signed by an authentication service. However, domains like ''anonymous.invalid'' cannot be signed because no certificate authority can exist for them. Privacy services MUST NOT remove the Identity header when a ''id'' priv-value appears in a Privacy header.'
section: "12"
topics:
    - sip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
