document: rfc-5882
kind: protocol-element
summary: An adaptation layer between the BFD state machine and client applications can implement session state hysteresis, hiding rapid Up/Down/Up transitions from clients. This is useful for supporting process restarts without necessitating complex protocol mechanisms.
