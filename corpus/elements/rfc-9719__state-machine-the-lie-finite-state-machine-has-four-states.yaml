document: rfc-9719
kind: state-machine
summary: 'The LIE finite state machine has four states: one-way (initial), two-way (valid LIE received but ThreeWay not yet established), three-way (valid ThreeWay LIE received and adjacency fully formed), and multiple-neighbors-wait (more than two neighbors detected on the same link). State is read-only (config false) per RFC 9692 Section 6.2.1.'
section: "3"
topics:
