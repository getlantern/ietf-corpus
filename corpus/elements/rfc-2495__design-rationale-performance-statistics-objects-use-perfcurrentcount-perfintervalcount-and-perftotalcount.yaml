document: rfc-2495
kind: design-rationale
summary: Performance statistics objects use PerfCurrentCount, PerfIntervalCount, and PerfTotalCount (all Gauge32 rather than Counter32) because these values can decrease — specifically when Unavailable Seconds occur across a 15-minute interval boundary, requiring retroactive adjustment.
