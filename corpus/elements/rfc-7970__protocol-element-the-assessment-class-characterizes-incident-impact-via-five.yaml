summary: 'The Assessment class characterizes incident impact via five optional subclasses: SystemImpact (technical), BusinessImpact (organizational), TimeImpact (time cost), MonetaryImpact (financial), and IntendedImpact (attacker''s intent). The occurrence attribute distinguishes actual from potential impact.'
