document: rfc-9686
kind: normative-requirement
summary: The client MUST only send ADDR-REG-INFORM for valid addresses of global scope (including ULAs) and MUST NOT send it for addresses configured by DHCPv6. On multi-interface clients, the message MUST be sent only on the interface that has the address being registered.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
