document: rfc-7634
kind: security-consideration
summary: 'The most critical security requirement is nonce uniqueness: the nonce must be unique for each invocation under a given key. Unpredictability is not required; counters and LFSRs are both acceptable. Nonce reuse breaks confidentiality for ChaCha20.'
section: "5"
