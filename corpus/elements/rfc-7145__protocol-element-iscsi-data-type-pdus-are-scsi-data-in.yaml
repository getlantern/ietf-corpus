document: rfc-7145
kind: protocol-element
summary: iSCSI data-type PDUs are SCSI Data-In and R2T; they cause RDMA operations transparent to the remote iSCSI layer and are not delivered as-is to the remote iSCSI layer. All other PDUs including unsolicited SCSI Data-Out are iSCSI control-type PDUs and are carried via RDMA Send Messages with an iSER header.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
