document: rfc-7263
kind: normative-requirement
summary: If the destination peer cannot understand the extensive_routing_mode option, it MUST attempt to use SRR to return an Error_Unknown_Extension response (as defined in RFC 6940 Sections 6.3.3.1 and 14.9) to the sending peer.
section: 5.4.1
rfc2119_level: MUST
topics:
    - routing
