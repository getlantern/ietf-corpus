document: rfc-1752
kind: design-rationale
summary: The SIPP 64-bit address proposal was rejected primarily because reviewers felt it did not provide adequate space for the routing hierarchy required by the future Internet, and because no operational experience existed with the proposed 'extended addressing' mechanism that would have supplemented 64-bit base addresses.
