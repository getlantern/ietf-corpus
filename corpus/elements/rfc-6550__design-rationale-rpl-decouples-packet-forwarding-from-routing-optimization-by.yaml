document: rfc-6550
kind: design-rationale
summary: RPL decouples packet forwarding from routing optimization by defining an Objective Function (OF) abstraction. This allows the same protocol to serve diverse LLN applications — minimizing energy, latency, or satisfying constraints — without modifying the core protocol, at the cost of requiring companion OF specifications.
section: "1.1"
topics:
