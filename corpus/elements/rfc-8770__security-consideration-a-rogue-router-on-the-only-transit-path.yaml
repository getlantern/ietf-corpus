document: rfc-8770
kind: security-consideration
summary: A rogue router on the only transit path that sets the H-bit can effectively partition the network; this scenario is indistinguishable from an operator intentionally isolating a router for maintenance, and OSPF will continue to function within the partitioned domains.
section: "8"
topics:
