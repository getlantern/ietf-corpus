document: rfc-2087
kind: design-rationale
summary: Quota roots are used as an indirection layer between mailboxes and resource limits, allowing multiple mailboxes to share the same quota root and thus the same limits. This design supports flexible administrative groupings without requiring quota roots to match mailbox names.
section: "3"
