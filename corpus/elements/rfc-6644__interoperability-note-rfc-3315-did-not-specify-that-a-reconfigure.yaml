document: rfc-6644
kind: interoperability-note
summary: RFC 3315 did not specify that a Reconfigure must come from the server with which the client most recently communicated, nor which server the client should identify in its Renew response. RFC 6644 clarifies that the client MUST use the same server identifier it would use after T1 expiry, resolving ambiguity for implementations.
section: "6"
topics:
