document: rfc-9352
kind: protocol-element
summary: The Maximum H.Encaps MSD Type (SRH Max H.encaps, value 44) signals the maximum number of SIDs addable to a segment list via H.Encaps behavior. Zero or absent means the headend can only apply an SR Policy with one segment without inserting an SRH.
section: "4.3"
