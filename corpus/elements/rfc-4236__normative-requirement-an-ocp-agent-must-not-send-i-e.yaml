document: rfc-4236
kind: normative-requirement
summary: An OCP agent MUST NOT send (i.e., must skip) absent application message parts. An OCP agent MUST send present non-auxiliary parts and MUST send those present auxiliary parts that were negotiated via the Aux-Parts parameter.
section: 3.2.1
rfc2119_level: MUST
topics:
    - http
