document: rfc-4271
kind: wire-format
summary: IP address prefixes in NLRI and Withdrawn Routes are encoded as <Length (1 octet, in bits), Prefix (variable, padded with trailing bits to an octet boundary)>. A Length of zero matches all addresses and carries zero prefix octets.
section: "4.3"
topics:
