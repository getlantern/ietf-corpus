document: rfc-9629
kind: design-rationale
summary: The KEMRecipientInfo structure uses the pairwise shared secret as input to a KDF to produce a pairwise KEK, which encrypts the CEK or CAEK per recipient. All recipients receive the same CEK or CAEK, but each recipient's copy is individually encrypted under a distinct KEK derived from that recipient's KEM shared secret.
section: "2"
topics:
