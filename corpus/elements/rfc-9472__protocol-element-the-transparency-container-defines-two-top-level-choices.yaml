summary: 'The transparency container defines two top-level choices: sbom-retrieval-method (cases: cloud, local-well-known, sbom-contact-info) and vuln-retrieval-method (cases: cloud, vuln-contact-info). An optional sbom-archive-list leaf provides a URI pointing to a JSON list of previously published SBOMs.'
