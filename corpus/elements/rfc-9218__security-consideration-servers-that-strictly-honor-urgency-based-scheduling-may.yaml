document: rfc-9218
kind: security-consideration
summary: Servers that strictly honor urgency-based scheduling may be starved of the ability to transmit lower-urgency responses if a client sends a continuous stream of high-urgency requests. Server implementations should take measures to avoid such starvation.
section: "15"
topics:
    - http
    - security
