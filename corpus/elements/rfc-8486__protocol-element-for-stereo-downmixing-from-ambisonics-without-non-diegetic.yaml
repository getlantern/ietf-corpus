document: rfc-8486
kind: protocol-element
summary: 'For stereo downmixing from Ambisonics without non-diegetic stereo, a player MAY use: L = 0.5*W + 0.5*Y, R = 0.5*W - 0.5*Y, where W is the first (omnidirectional) and Y the second Ambisonic channel. With non-diegetic stereo Ls/Rs, the W/Y coefficients are halved (0.25) and Ls/Rs are added with weight 0.5.'
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
