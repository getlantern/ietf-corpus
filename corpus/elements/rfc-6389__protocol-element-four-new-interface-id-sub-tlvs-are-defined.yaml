summary: 'Four new Interface ID sub-TLVs are defined: RSVP-TE P2MP LSP TLV (type 28), LDP P2MP LSP TLV (type 29), IP Multicast Tunnel TLV (type 30), and MPLS Context Label TLV (type 31). Each sub-TLV value serves as a tunnel identifier to associate upstream-assigned labels with a specific tunnel.'
