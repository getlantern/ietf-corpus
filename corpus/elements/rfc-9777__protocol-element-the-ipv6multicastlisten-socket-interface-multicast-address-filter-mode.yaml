document: rfc-9777
kind: protocol-element
summary: The IPv6MulticastListen(socket, interface, multicast-address, filter-mode, source-list) service interface is required for full MLDv2 support. INCLUDE mode with empty source-list is equivalent to Stop Listening; EXCLUDE mode with empty source-list is equivalent to Start Listening (MLDv1 semantics).
section: "3"
topics:
