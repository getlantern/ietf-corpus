document: rfc-8995
kind: protocol-element
summary: The IDevID is an IEEE 802.1AR X.509v3 certificate installed at the factory that authenticates the pledge to the registrar and MASA, uniquely identifies the pledge via X520SerialNumber (id-at-serialNumber), and carries the MASA URI in a new non-critical PKIX extension (id-pe-masa-url, OID id-pe 32). No key usage restrictions are recommended so that these long-lived certificates remain broadly applicable.
section: "2.3"
topics:
    - pkix
    - crypto
    - security
