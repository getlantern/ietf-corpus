document: rfc-6514
kind: wire-format
summary: The Inter-AS I-PMSI A-D Route NLRI carries an 8-octet Route Distinguisher and a 4-octet Source AS field. Two-octet ASNs are encoded in the two low-order octets with the high-order octets set to zero.
