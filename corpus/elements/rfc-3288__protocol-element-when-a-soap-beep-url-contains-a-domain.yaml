document: rfc-3288
kind: protocol-element
summary: When a 'soap.beep' URL contains a domain name without a port, the SRV algorithm is used with service parameter 'soap-beep' and protocol 'tcp' to resolve IP/TCP addressing. If no SRV RRs are found, DNS A RRs are queried and the IANA-assigned well-known port is used.
section: 5.1.1
topics:
    - dns
