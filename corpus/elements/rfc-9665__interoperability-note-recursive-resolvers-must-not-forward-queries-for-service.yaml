document: rfc-9665
kind: interoperability-note
summary: Recursive resolvers MUST NOT forward queries for 'service.arpa.' or its subdomains to upstream caches or to the '.arpa.' authoritative servers, per RFC 6303 locally-served zones rules. The one exception is DS record queries with the DO bit set, which MUST be answered with correct DNSSEC authority information.
section: "8.4"
topics:
    - dns
    - zeroconf
