document: rfc-7219
kind: interoperability-note
summary: 'Untrusted dynamically attached routers (e.g., a mobile phone acting as a router) cannot be accommodated: they cannot use a Trusted port (not trusted by the operator) and a Validating port causes all their forwarded transit traffic to be discarded. This scenario is explicitly out of scope.'
section: "2.4"
topics:
    - ip
    - routing
    - mobility
