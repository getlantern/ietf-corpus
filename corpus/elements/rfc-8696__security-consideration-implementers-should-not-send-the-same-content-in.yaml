document: rfc-8696
kind: security-consideration
summary: Implementers should not send the same content in different messages, one using a quantum-resistant key management algorithm and one using a non-quantum-resistant algorithm, even with independently generated CEKs, because an eavesdropper may correlate the messages and exploit the weaker one.
section: "7"
topics:
