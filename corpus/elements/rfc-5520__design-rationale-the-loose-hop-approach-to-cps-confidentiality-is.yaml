document: rfc-5520
kind: design-rationale
summary: The loose-hop approach to CPS confidentiality is insufficient when path diversity is required. Because each TE LSP's ERO is expanded independently at domain boundaries during signaling, disjoint paths cannot be guaranteed since the expanding LSRs are not synchronized. The path-key mechanism was introduced to solve this incompatibility between confidentiality and path diversity.
section: "1"
topics:
    - routing
    - security
