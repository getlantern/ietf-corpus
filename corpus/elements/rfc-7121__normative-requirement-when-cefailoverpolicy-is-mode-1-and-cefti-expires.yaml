document: rfc-7121
kind: normative-requirement
summary: When CEFailoverPolicy is mode 1 and CEFTI expires without successful re-association, the FE transitions to the pre-association state and MUST operationally bring down its forwarding path by setting the RFC 5812 FEObject FEState component to OperDisable.
section: 2.1.1
rfc2119_level: MUST
topics:
    - routing
