document: rfc-4805
kind: state-machine
summary: 'Loopback control: a manager can set LineLoopback, PayloadLoopback (ESF only), InwardLoopback, DualLoopback (Line+Inward), or NoLoopback via dsx1LoopbackConfig. The far end may request LineLoopback, PayloadLoopback, or NoLoopback via FDL (ESF) or inband (D4). The far end cannot undo manager-set loopbacks; a manager can undo far-end loopbacks. LineLoopback and InwardLoopback may coexist simultaneously.'
section: 3.2.5
topics:
    - snmp
