document: rfc-8400
kind: design-rationale
summary: The backup egress node uses the backup LSP label as a context label and the service label as a UA label (per RFC 5331) to maintain per-primary-egress forwarding tables, enabling the backup to deliver traffic to the same destinations as the failed primary without requiring changes at the ingress.
section: "5.3"
topics:
    - routing
    - mpls
