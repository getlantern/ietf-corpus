summary: 'Four Matching Operators are defined: ''equal'' (exact field-to-TV match), ''ignore'' (always True), ''MSB(x)'' (match if the x most-significant bits equal the TV), and ''match-mapping'' (match if the field value equals any entry in the TV list, identified by index).'
