document: rfc-8366
kind: design-rationale
summary: The voucher format was changed from supporting a single voucher for many pledges (using regular expressions for serial-number ranges) to supporting only a single serial-number per voucher, because blocking renewal of a multi-device voucher would be excessive when only one pledge's ownership needs to be revoked.
section: "6.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
