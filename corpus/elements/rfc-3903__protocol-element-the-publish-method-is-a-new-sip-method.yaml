document: rfc-3903
kind: protocol-element
summary: The PUBLISH method is a new SIP method for publishing event state. It allows a user agent (EPA) to create, modify, and remove event soft state in an Event State Compositor (ESC), similar to how REGISTER creates state in a registrar. PUBLISH does not establish a dialog.
section: 11.1.1
topics:
    - sip
    - realtime
