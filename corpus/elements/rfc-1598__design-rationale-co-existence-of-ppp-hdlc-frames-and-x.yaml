document: rfc-1598
kind: design-rationale
summary: Co-existence of PPP HDLC frames and X.25 frames on the same links, and gradual migration, are precluded because some switches remove the X.25 header, transport packets using a different protocol (e.g., Frame Relay), and reconstruct the X.25 header at the final hop.
