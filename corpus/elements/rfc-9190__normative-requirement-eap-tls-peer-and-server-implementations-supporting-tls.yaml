document: rfc-9190
kind: normative-requirement
summary: EAP-TLS peer and server implementations supporting TLS 1.3 MUST support anonymous NAIs. A client supporting TLS 1.3 MUST NOT send its username or any other permanent identifier in cleartext in the Identity Response.
section: 2.1.8
rfc2119_level: MUST NOT
