document: rfc-2032
kind: design-rationale
summary: The macroblock (MB) was chosen as the unit of packetization fragmentation rather than GOB or frame level because a single GOB or frame can exceed the maximum packet size. MB-level fragmentation enables per-packet resynchronization after loss while minimizing the amount of H.261 bit stream that must be parsed (only Huffman encoding, no full decompression).
section: "3.2"
topics:
