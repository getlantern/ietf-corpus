document: rfc-2730
kind: normative-requirement
summary: The combination of xid, msgtype, and Lease Identifier MUST be unique across all messages received by a server within [XID-REUSE-INTERVAL] (10 minutes). A server receiving a message with the same triple within [RESPONSE-CACHE-INTERVAL] MUST treat it as a retransmission and resend the cached response; RESPONSE-CACHE-INTERVAL may range from 0 to 300 seconds but values under 60 seconds are NOT RECOMMENDED.
section: 2.1.4
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
