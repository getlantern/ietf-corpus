document: rfc-5331
kind: normative-requirement
summary: If Ru is the root of two tunnels A and B, both identified by the same IP address X, and both carry upstream-assigned labels, then Ru MUST use the same label space when upstream-assigning labels for packets on both tunnels.
section: "7"
rfc2119_level: MUST
topics:
