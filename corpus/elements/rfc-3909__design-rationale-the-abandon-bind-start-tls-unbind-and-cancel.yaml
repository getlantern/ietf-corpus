document: rfc-3909
kind: design-rationale
summary: The Abandon, Bind, Start TLS, Unbind, and Cancel operations are explicitly made non-cancelable to avoid adding complexity to authentication, authorization, and security layer semantics. Additionally, the Cancel operation itself cannot be abandoned.
