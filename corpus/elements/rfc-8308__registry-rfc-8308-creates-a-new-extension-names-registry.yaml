document: rfc-8308
kind: registry
summary: 'RFC 8308 creates a new ''Extension Names'' registry under SSH Protocol Parameters with initial entries: server-sig-algs, delay-compression, no-flow-control, and elevation. Future non-local names (without ''@'') require IETF Review policy per RFC 8126; names must follow RFC 4250 Section 4.6.1 conventions.'
section: "4.2"
topics:
