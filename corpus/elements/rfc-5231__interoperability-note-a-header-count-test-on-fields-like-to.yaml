document: rfc-5231
kind: interoperability-note
summary: A header COUNT test on fields like 'to' and 'cc' will always evaluate to false on an RFC 2822 compliant message when testing for 3 or more, since each of those fields may appear at most once; the test counts field instances, not addresses.
