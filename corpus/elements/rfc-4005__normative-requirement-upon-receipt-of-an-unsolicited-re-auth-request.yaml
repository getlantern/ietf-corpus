document: rfc-4005
kind: normative-requirement
summary: Upon receipt of an unsolicited Re-Auth-Request (RAR) message, the NAS MUST respond with a Re-Auth-Answer (RAA) message; if the RAR includes authentication, the NAS MUST initiate re-authentication toward the user.
section: "2.2"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
