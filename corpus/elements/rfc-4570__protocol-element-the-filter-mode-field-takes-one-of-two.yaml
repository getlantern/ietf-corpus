kind: protocol-element
summary: 'The <filter-mode> field takes one of two values: ''incl'' (inclusion — accept only traffic from listed sources) or ''excl'' (exclusion — reject traffic from listed sources). All other traffic disposition follows the default any-source multicast behavior.'
