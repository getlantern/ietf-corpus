document: rfc-5191
kind: normative-requirement
summary: When a key-generating EAP method is used and an MSK is successfully generated, the last PAR with the 'C' bit set MUST contain a Key-Id AVP and an AUTH AVP. Any subsequent PANA message in that session MUST also contain an AUTH AVP.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
