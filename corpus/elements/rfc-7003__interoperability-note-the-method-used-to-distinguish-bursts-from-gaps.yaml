document: rfc-7003
kind: interoperability-note
summary: The method used to distinguish bursts from gaps shall be equivalent to the method defined in Section 4.7.2 of RFC 3611. The definitions of burst, gap, loss, and discard are consistent with RFC 3611, with discard extended to account for packet duplication per RFC 7002.
