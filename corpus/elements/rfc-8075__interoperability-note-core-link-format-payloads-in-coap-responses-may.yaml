document: rfc-8075
kind: interoperability-note
summary: CoRE Link Format payloads in CoAP responses may contain CoAP URIs that could be rewritten to HTTP URIs by the HC Proxy. However, such transcoding risks corrupting payloads, breaking integrity-protected resources, and exposing clients to modified content; it should only be done at the proxy implementer's discretion.
section: 6.5.2
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
