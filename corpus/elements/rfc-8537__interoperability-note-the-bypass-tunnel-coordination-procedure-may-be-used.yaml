document: rfc-8537
kind: interoperability-note
summary: The bypass tunnel coordination procedure may be used for protected associated bidirectional LSPs that are not co-routed, but requires that the downstream PLR/MP pair of the forward LSP matches the upstream MP/PLR pair of the reverse LSP.
