document: rfc-3588
kind: protocol-element
summary: Route-Record AVP and Proxy-Info AVP (Section 6.7) support routing audit and stateless proxy operation. Relay and proxy agents MUST append a Route-Record AVP containing the identity of the upstream peer to all forwarded requests. Proxy-Info allows stateless agents to embed opaque local state that is returned verbatim in the corresponding answer.
section: "6.7"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
