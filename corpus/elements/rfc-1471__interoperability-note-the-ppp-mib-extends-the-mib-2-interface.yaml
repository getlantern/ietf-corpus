document: rfc-1471
kind: interoperability-note
summary: The PPP MIB extends the MIB-2 interface group (RFC 1213) and the Interface Extensions MIB (RFC 1229). A PPP interface has a single ifTable entry, and all PPP packets are counted as non-unicast (broadcast) packets in ifTable counters ifInNUcastPkts, ifOutNUCastPkts, ifExtnsBroadcastsReceivedOks, and ifExtnsBroadcastsTransmittedOks.
section: "3.4"
topics:
