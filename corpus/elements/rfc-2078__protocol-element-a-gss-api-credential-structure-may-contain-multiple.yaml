document: rfc-2078
kind: protocol-element
summary: A GSS-API credential structure may contain multiple credential elements, each with mechanism-specific information for a particular mech_type, but all representing a common entity. Multiple credential elements with overlapping combinations of mechanism, usage mode (INITIATE-ONLY, ACCEPT-ONLY, INITIATE-AND-ACCEPT), and validity period within a single credential are not permitted.
section: 1.1.1.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
