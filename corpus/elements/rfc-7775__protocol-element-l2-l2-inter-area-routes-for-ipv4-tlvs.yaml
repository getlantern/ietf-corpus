document: rfc-7775
kind: protocol-element
summary: L2->L2 inter-area routes for IPv4 (TLVs 135/235) have the up/down bit set to 1 but it is ignored and treated as if set to 0; these prefixes are learned from another IS-IS instance typically in another area, with X-Flag=1 and R-Flag=0 when the Prefix Attribute Flags sub-TLV is present.
section: "3.1"
topics:
    - routing
    - ip
