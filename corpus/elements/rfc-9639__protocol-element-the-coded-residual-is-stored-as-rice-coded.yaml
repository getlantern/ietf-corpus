document: rfc-9639
kind: protocol-element
summary: The coded residual is stored as Rice-coded partitions. Signed residual samples are zigzag-encoded to unsigned folded values before Rice coding. The partition order (exponent of 2 giving the partition count) MUST produce partitions whose sample count is a whole number. Rice parameters are encoded using either 4-bit or 5-bit parameter fields.
section: 9.2.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
