document: rfc-8888
kind: security-consideration
summary: An on-path attacker that can modify RTCP Congestion Control Feedback Packets can manipulate reports to drive the sender to an excessively high or low rate, causing denial of service. SRTP (RFC 3711) SHOULD be used to authenticate RTCP packets and mitigate this attack.
section: "10"
topics:
    - rtp
    - security
    - congestion
