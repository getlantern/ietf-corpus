document: rfc-3275
kind: protocol-element
summary: The Manifest element provides an optional list of Reference elements that are not subject to mandatory core reference validation (unlike References in SignedInfo). Applications may perform selective or custom reference validation on Manifests, enabling partial-failure semantics.
