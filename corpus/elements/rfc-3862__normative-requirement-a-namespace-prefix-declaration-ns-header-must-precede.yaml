document: rfc-3862
kind: normative-requirement
summary: A namespace prefix declaration (NS header) MUST precede any use of that prefix within a message. Any URI used as a namespace identifier MUST be a full absolute-URI per RFC 2396; relative URIs and fragment identifiers MUST NOT be used.
section: "3.4"
rfc2119_level: MUST
topics:
    - realtime
