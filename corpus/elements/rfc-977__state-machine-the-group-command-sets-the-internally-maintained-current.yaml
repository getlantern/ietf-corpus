document: rfc-977
kind: state-machine
summary: The GROUP command sets the internally-maintained current article pointer to the first article of the selected newsgroup. If an invalid group is specified, the previously selected group and article remain selected. If an empty newsgroup is selected, the pointer is in an indeterminate state and should not be used.
section: 3.2.1
topics:
