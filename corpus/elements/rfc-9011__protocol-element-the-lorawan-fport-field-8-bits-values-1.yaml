document: rfc-9011
kind: protocol-element
summary: The LoRaWAN FPort field (8 bits, values 1–223) serves as the RuleID in the SCHC-over-LoRaWAN profile. The SCHC C/D and F/R SHALL concatenate FPort with LoRaWAN payload to recompose the SCHC Message.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
