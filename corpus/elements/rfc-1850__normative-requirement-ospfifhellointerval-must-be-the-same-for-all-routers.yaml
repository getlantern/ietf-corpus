document: rfc-1850
kind: normative-requirement
summary: ospfIfHelloInterval must be the same for all routers attached to a common network. ospfIfRtrDeadInterval must likewise be the same for all routers on the common network and should be some multiple of the Hello interval.
section: "3.7"
rfc2119_level: MUST
topics:
    - routing
