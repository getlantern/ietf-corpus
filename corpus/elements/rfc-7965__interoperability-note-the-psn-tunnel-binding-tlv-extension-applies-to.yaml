document: rfc-7965
kind: interoperability-note
summary: 'The PSN Tunnel Binding TLV extension applies to both FEC 128 and FEC 129 based PWs (single-segment and multi-segment), but MS-PW uses FEC 129 exclusively. The extension is backward compatible: unknown receivers silently ignore the optional TLV due to the U-bit being set to 1.'
section: "3"
topics:
