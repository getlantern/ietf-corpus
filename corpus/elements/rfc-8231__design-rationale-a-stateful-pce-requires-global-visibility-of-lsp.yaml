document: rfc-8231
kind: design-rationale
summary: A stateful PCE requires global visibility of LSP state and ordered control of path reservations across devices — capabilities unavailable in stateless PCEP. TE algorithms effective at scale uniformly require both properties, justifying the complexity and control-plane overhead of stateful synchronization.
section: 3.1.2
topics:
