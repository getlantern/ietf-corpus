document: rfc-1548
kind: normative-requirement
summary: Reception of a PPP packet with an unknown Protocol field while LCP is Opened MUST be reported via a Protocol-Reject packet with the Rejected-Protocol field set to the received Protocol value. Protocol-Reject packets received outside the LCP Opened state SHOULD be silently discarded.
section: "5.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
