document: rfc-9833
kind: protocol-element
summary: 'The ''l2-tunnel-type'' identity hierarchy defines three Layer 2 tunnel types for ACs: pseudowire, VPLS (Virtual Private LAN Service), and VXLAN. The ''l2-tunnel-service'' grouping selects among these using a type leaf and includes conditional sub-containers for each tunnel type.'
section: "4.2"
