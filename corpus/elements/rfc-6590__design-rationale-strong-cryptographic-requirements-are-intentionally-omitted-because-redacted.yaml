document: rfc-6590
kind: design-rationale
summary: Strong cryptographic requirements are intentionally omitted because redacted information is ultimately recoverable through log correlation (e.g., via unredacted Message-ID fields). The redaction process satisfies a privacy policy requirement rather than providing a strong security guarantee, so cryptographic strength of the transformation is not a critical security measure.
section: "5.3"
topics:
    - email
    - privacy
    - security
