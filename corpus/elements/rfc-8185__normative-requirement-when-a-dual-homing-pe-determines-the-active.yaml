document: rfc-8185
kind: normative-requirement
summary: When a dual-homing PE determines the active service PW needs to switch from working to protection PW, it MUST send the Dual-Node Switching TLV to the other dual-homing PE as quickly as possible using three consecutive DHC messages, after which the protection PW becomes active and the TLV MUST be sent periodically.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
