document: rfc-2214
kind: protocol-element
summary: intSrvGuaranteedIfDelay is an INTEGER (0 to 0x0FFFFFFF) measured in microseconds representing the maximum packet transfer delay through a service element independent of bucket size. Individual values range up to 2^28 (over two minutes); the end-to-end aggregate saturates at (2^32)-1.
section: "3.1"
topics:
