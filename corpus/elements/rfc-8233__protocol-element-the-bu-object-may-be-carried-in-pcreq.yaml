document: rfc-8233
kind: protocol-element
summary: The BU object MAY be carried in PCReq and PCRep messages to specify an upper limit on acceptable link bandwidth utilization percentage. A PCRep message MAY also carry a BU object along with a NO-PATH object to indicate which bandwidth constraint could not be satisfied.
section: 3.2.3.1
topics:
