document: rfc-9242
kind: design-rationale
summary: The IKE_INTERMEDIATE exchange is defined without being tied to any specific use case (e.g., post-quantum key exchange) so that separate specifications can define its application. The data transferred is expected to be tens to a few hundred kilobytes in most cases, not bulk transfer.
