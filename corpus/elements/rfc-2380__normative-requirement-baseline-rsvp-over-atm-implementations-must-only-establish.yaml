document: rfc-2380
kind: normative-requirement
summary: Baseline RSVP over ATM implementations MUST only establish RSVP-initiated VCs to RSVP-capable end-points, to ensure proper behavior when unique end-point identification is unavailable. A user override is permissible.
section: "3.2"
rfc2119_level: MUST
