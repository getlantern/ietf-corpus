document: rfc-8381
kind: design-rationale
summary: SHOULD (rather than MUST) is used for VERR errors 3 and 4 because, as long as messages are distinguished by a vendor's OUI/CID, the vendor retains discretion over standard versus nonstandard error handling for their own sub-protocols and sub-versions.
