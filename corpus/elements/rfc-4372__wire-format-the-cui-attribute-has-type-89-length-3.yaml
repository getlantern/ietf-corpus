document: rfc-4372
kind: wire-format
summary: The CUI attribute has Type=89, Length>=3 (one octet each for Type and Length, plus at least one octet for String). The String field is an opaque token whose format and content are determined by the home RADIUS server; a single NUL character indicates a request for CUI.
