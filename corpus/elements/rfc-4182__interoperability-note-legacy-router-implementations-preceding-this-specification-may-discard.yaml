document: rfc-4182
kind: interoperability-note
summary: Legacy router implementations preceding this specification may discard any received packet that has multiple label stack entries with a top label value of Explicit NULL. Such routers should be configured to not advertise any bindings to Explicit NULL to avoid packet loss.
section: "4"
topics:
