document: rfc-7183
kind: design-rationale
summary: POSIX time (1-second resolution) is chosen for the timestamp because many MANET use cases cannot achieve sub-second time synchronization due to unreliable and high-delay channels, mobility, and resource limitations. A finer granularity is RECOMMENDED only when message validity times fall below 1 second.
