document: rfc-9555
kind: interoperability-note
summary: ADR's legacy 'extended address' and 'street address' components map to 'apartment' and 'name' only when the ADR value does not use the new RFC 9554 structured format; if the new format is present, these backwards-compatible components must be ignored on conversion from vCard.
section: 2.6.1
