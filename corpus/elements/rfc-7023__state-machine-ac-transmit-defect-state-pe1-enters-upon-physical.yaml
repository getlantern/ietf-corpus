document: rfc-7023
kind: state-machine
summary: 'AC Transmit Defect State: PE1 enters upon physical-layer fault on the AC interface (LoS or Link OAM Link Fault indication) or receipt of a CCM frame with the RDI bit set from the peer MEP at CE1. PE1 exits when the physical fault is cleared and no subsequent CCM frames with the RDI bit set are received from the peer MEP.'
section: "5.2"
