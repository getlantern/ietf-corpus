document: rfc-8010
kind: normative-requirement
summary: Each HTTP operation MUST use the POST method; the Content-Type of the message body in each request and response MUST be 'application/ipp'. A Client MUST adhere to HTTP client rules and a Printer MUST adhere to HTTP origin server rules.
section: "4"
rfc2119_level: MUST
topics:
