document: rfc-7944
kind: design-rationale
summary: A generic priority AVP (rather than relying on application-specific priority AVPs) was chosen to avoid requiring Diameter Agents to understand all applications and perform application-specific parsing to determine message priority, which was considered an unacceptable level of complexity for routing elements.
