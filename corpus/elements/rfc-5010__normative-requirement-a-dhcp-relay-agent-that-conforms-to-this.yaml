document: rfc-5010
kind: normative-requirement
summary: A DHCP relay agent that conforms to this specification MUST include the Flags Suboption in every Relay Agent Information Option it adds to a forwarded DHCP request, regardless of whether the packet was received as broadcast or unicast.
section: "4"
rfc2119_level: MUST
