document: rfc-5460
kind: protocol-element
summary: The LEASEQUERY-DONE message signals end of a group of related Leasequery replies. Its transaction-id MUST match the originating LEASEQUERY, and a single LEASEQUERY-DONE MUST be sent after all replies to a successful query that returned at least one binding. It MAY carry an OPTION_STATUS_CODE to indicate a server error.
section: 5.2.2
topics:
    - dns
