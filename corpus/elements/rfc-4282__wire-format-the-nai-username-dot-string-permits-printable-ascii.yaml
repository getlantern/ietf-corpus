document: rfc-4282
kind: wire-format
summary: The NAI username (dot-string) permits printable ASCII characters except '"', '(', ')', ',', '.', ':', ';', '<', '>', '@', '[', '\', ']', and DEL, plus escaped any-octet sequences and UTF-8 octets %x80–FF. The realm is composed of dot-separated labels of letters, digits, and hyphens.
