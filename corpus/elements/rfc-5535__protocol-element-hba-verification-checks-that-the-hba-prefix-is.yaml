document: rfc-5535
kind: protocol-element
summary: HBA verification checks that the HBA prefix is included in the Multi-Prefix extension's prefix set, substitutes the HBA prefix into the Subnet Prefix field of the CGA Parameter Data Structure, then runs the standard CGA verification process from RFC 3972 Section 5 on the modified structure.
