document: rfc-6048
kind: normative-requirement
summary: When the subscriptions list is maintained and non-empty, the news client SHOULD use it instead of any hard-coded default list. The wildmat argument for LIST SUBSCRIPTIONS is new in this specification and is not supported by RFC 2980 servers.
section: 2.6.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
