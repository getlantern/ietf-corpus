document: rfc-9145
kind: normative-requirement
summary: An NSH-aware SF or SFC Proxy not authorized to decrypt any Context Headers MUST NOT be given access to the ENC_KEY. If it decrypts Context Headers it is not authorized to consume, it MUST keep those headers unaltered when forwarding.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
