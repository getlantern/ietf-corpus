document: rfc-7188
kind: normative-requirement
summary: An implementation MUST NOT reject a message because it contains an unrecognized TLV value. Any unrecognized TLV Value field MUST be processed or ignored by an unextended implementation of NHDP or OLSRv2.
section: "4.1"
rfc2119_level: MUST NOT
