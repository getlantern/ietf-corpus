document: rfc-2056
kind: design-rationale
summary: Two separate URL schemes (z39.50s for session, z39.50r for retrieval) are defined rather than one, to make a critical distinction between opening an interactive client session and opening-then-closing a session to retrieve a specific item. This distinction at the scheme level allows user interfaces to reflect it without parsing opaque URL parts.
section: "1"
topics:
    - security
