document: rfc-4251
kind: normative-requirement
summary: Each server host SHOULD have a host key, and if it has keys it MUST have at least one key using each REQUIRED public key algorithm (DSS). Hosts MAY have multiple keys using different algorithms, and multiple hosts MAY share the same host key.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
