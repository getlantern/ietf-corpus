document: rfc-3729
kind: protocol-element
summary: apmUserDefinedAppTable allows the agent to advertise proprietary or custom applications it is monitoring that are not registered in the protocolDirTable. It is read-only and provides a parent protocolDirLocalIndex and a human-readable application name; the agent automatically creates apmAppDirTable entries for each.
section: "3"
topics:
