document: rfc-9101
kind: normative-requirement
summary: Client implementations supporting the Request Object URI method MUST support TLS per RFC 7525. Confidentiality protection MUST be applied using TLS with a cipher suite providing both confidentiality and integrity. HTTP clients MUST verify the TLS server certificate using DNS-ID to prevent MITM attacks.
section: "8"
rfc2119_level: MUST
topics:
    - oauth
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
