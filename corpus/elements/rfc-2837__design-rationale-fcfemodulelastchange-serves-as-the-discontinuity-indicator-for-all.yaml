document: rfc-2837
kind: design-rationale
summary: fcFeModuleLastChange serves as the discontinuity indicator for all counter objects in the MIB. This avoids the need for a separate per-counter discontinuity timestamp and aligns with SNMPv2 conventions for counters that may reset when a module is replaced.
section: "2.1"
topics:
    - snmp
