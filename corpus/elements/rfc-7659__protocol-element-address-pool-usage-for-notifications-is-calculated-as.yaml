document: rfc-7659
kind: protocol-element
summary: Address pool usage for notifications is calculated as the percentage of total ports allocated to the pool that are in use, measured for the most-mapped protocol at the time the notification is triggered. natv2PoolNotifiedPortMapProtocol identifies that protocol; natv2PoolNotifiedPortMapEntries gives the current count.
section: 3.3.6
topics:
