document: rfc-3281
kind: normative-requirement
summary: 'AC validation requires: the holder''s PKC certification path MUST be verified per PKIXPROF; the AC signature MUST be cryptographically correct and the issuer''s PKC path verified; the AC issuer MUST be directly trusted; evaluation time MUST be within validity period; the targeting check MUST pass; and any unsupported critical extension MUST cause rejection.'
section: "5"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
