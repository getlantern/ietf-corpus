document: rfc-3015
kind: protocol-element
summary: The Root Termination is a reserved TerminationID that refers to the entire gateway. It may appear in Modify, Notify, AuditValue, AuditCapabilities, and ServiceChange commands; any other use is an error. Packages may be defined on Root, giving it properties, events, and statistics, but not signals.
section: 6.2.5
topics:
    - realtime
