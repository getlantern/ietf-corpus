document: rfc-5970
kind: interoperability-note
summary: When using iSCSI for booting, the 'iscsi' URI is formed as defined in RFC 4173. The functionality attributed to a root path option in RFC 4173 is provided for IPv6 by OPT_BOOTFILE_URL instead, eliminating the need for a separate root path option.
section: "5"
topics:
