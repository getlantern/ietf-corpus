document: rfc-3046
kind: security-consideration
summary: Any future mechanisms for authenticating DHCP client-to-server communications must omit the DHCP Relay Agent option from server authentication calculations to avoid the relay agent being unable to strip the option. This concern drove the single-option-with-sub-options design.
section: "5.0"
topics:
    - security
