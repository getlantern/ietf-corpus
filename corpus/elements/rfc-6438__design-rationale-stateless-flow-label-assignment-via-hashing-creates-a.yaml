document: rfc-6438
kind: design-rationale
summary: Stateless flow label assignment via hashing creates a small probability of two different user flows mapping to the same label, but since RFC 6437 allows a source to define any packet set as a single flow, occasionally labeling two user flows as one through a tunnel is acceptable.
