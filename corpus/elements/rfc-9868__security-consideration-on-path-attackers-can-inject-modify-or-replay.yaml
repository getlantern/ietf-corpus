document: rfc-9868
kind: security-consideration
summary: On-path attackers can inject, modify, or replay UDP Options since they carry no intrinsic authentication. The OCS detects only accidental errors and errant middleboxes — it is not designed to prevent attacks. The reserved AUTH option is intended to address authentication in a future specification.
section: "25.2"
topics:
    - udp
    - security
