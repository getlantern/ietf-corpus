document: rfc-7516
kind: normative-requirement
summary: The 'enc' Header Parameter MUST identify an AEAD algorithm with a specified key length, and MUST be present in every JWE. Implementations MUST understand and process it; the encrypted content is not usable if the algorithm is unsupported.
section: 4.1.2
rfc2119_level: MUST
topics:
