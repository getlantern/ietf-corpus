document: rfc-7460
kind: interoperability-note
summary: 'When the LLDP-MED MIB is supported, eoPowerMeasurementLocal can be mapped to lldpXMedLocXPoEPDPowerSource: fromPSE(2) maps to false and local(3) maps to true. The LLDP-MED power priority (lldpXMedRemXPoEPDPowerPriority) is derived from pethPsePortPowerPriority (RFC 3621), accessible via eoethPortIndex/eoethPortGrpIndex.'
section: "7.5"
topics:
    - snmp
