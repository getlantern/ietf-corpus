document: rfc-8688
kind: security-consideration
summary: A malicious intermediary could insert a jCard with phishing contact information (e.g., a TEL or URL pointing to a social-engineering operation). JWS signing of the jCard provides integrity protection and cryptographic traceability to the signing entity, allowing UACs to validate the source before contacting the redress address.
section: "6"
topics:
    - sip
    - security
    - jose
