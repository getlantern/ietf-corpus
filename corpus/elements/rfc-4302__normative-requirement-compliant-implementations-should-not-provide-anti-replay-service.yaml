document: rfc-4302
kind: normative-requirement
summary: Compliant implementations SHOULD NOT provide anti-replay service for SAs using manually distributed keys, because correct maintenance of counter state until key replacement is difficult and automated recovery from counter overflow is unlikely.
section: "5"
rfc2119_level: SHOULD NOT
