document: rfc-3202
kind: normative-requirement
summary: Each time a discontinuity in the counters occurs, frsldPvcCtrlLastPurgeTime MUST be set to the value of sysUpTime. This object serves as the discontinuity timer for all counters in frsldPvcDataTable.
section: "7"
rfc2119_level: MUST
