document: rfc-7571
kind: normative-requirement
summary: The ingress node MUST NOT request to exit lock mode while the LSP is still in loopback mode. The egress node MUST ignore such a request when the LSP is still in loopback mode.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
