document: rfc-4250
kind: normative-requirement
summary: Requests for new message numbers in the ranges 1–29, 50–59, and 80–127 MUST be done through the STANDARDS ACTION method. New numbers in the range 128–191 MUST be done through IETF CONSENSUS. The range 192–255 is left for PRIVATE USE and IANA will not control it.
section: 4.1.3
rfc2119_level: MUST
topics:
    - registry
    - security
