document: rfc-1091
kind: interoperability-note
summary: RFC 930-conformant servers cease sending SEND commands after receiving the same IS response twice, which is compatible with the new cycling behavior. RFC 930-conformant clients will repeat the last type on a third query, so new-style servers must recognize this and stop sending further SEND requests.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
