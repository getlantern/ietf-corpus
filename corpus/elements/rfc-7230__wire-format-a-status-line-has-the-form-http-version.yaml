document: rfc-7230
kind: wire-format
summary: A status-line has the form `HTTP-version SP status-code SP reason-phrase CRLF`, where status-code is a 3-digit integer. The reason-phrase exists solely for human readability; clients SHOULD ignore it.
section: 3.1.2
topics:
