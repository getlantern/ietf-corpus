document: rfc-4745
kind: design-rationale
summary: 'Complex conditions such as time-of-day ranges were avoided due to the ''no false assurance'' principle: it is more dangerous to give the RM the impression that privacy is automatically enforced when the rule may be misinterpreted, than to require simpler explicit rules. Non-technical users often assume time rules apply to their local time zone, which may be unknown to the PS.'
section: "4"
topics:
    - privacy
    - security
