document: rfc-3397
kind: normative-requirement
summary: If the receiver is part-way through decoding a search domain name when it reaches the end of the complete aggregated block without finding a zero or a valid two-octet compression pointer, the partially read name MUST be discarded as invalid.
section: "3"
rfc2119_level: MUST
topics:
    - dns
