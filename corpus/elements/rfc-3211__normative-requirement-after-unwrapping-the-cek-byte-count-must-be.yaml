document: rfc-3211
kind: normative-requirement
summary: After unwrapping, the CEK byte count must be within the valid range for the CEK algorithm and not exceed the wrapped key length; the bitwise complement of the check value must match the first three bytes of the CEK. Failure indicates an invalid KEK.
section: 2.3.2
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
