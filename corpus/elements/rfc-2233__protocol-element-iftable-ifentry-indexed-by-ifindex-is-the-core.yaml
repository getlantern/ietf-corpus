summary: ifTable (ifEntry indexed by ifIndex) is the core MIB-II interfaces table; each conceptual row represents one interface sub-layer and contains ifIndex, ifDescr, ifType, ifMtu, ifSpeed, ifPhysAddress, ifAdminStatus, ifOperStatus, ifLastChange, packet/octet counters, and deprecated objects (ifInNUcastPkts, ifOutNUcastPkts, ifOutQLen, ifSpecific).
