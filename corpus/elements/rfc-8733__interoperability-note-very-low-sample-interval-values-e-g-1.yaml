document: rfc-8733
kind: interoperability-note
summary: Very low Sample-Interval values (e.g., 1 minute or less, versus the 5-minute default) can cause undesirable interactions with transport protocols by not allowing enough time for protocol reactions to a prior bandwidth adjustment to settle before collecting the next bandwidth sample.
section: "6.6"
topics:
    - mpls
    - tcp
    - congestion
