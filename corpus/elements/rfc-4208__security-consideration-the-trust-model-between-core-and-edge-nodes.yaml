document: rfc-4208
kind: security-consideration
summary: 'The trust model between core and edge-nodes differs from RFC 3473: the core is permitted to hide its topology from edge-nodes, and the core is permitted to restrict edge-node actions by filtering out specific RSVP objects. Realization of the UNI must meet functional requirements for robustness, security, and privacy.'
