document: rfc-3015
kind: normative-requirement
summary: 'Cold start: upon startup, an MG sends a ServiceChange command with method ''Boot'' to the MGC to announce its availability (registration). The MGC reply may provide protocol version and alternative MGC address information for subsequent communication.'
