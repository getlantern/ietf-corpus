document: rfc-5322
kind: wire-format
summary: 'The ''References:'' field construction algorithm for replies: take parent''s ''References:'' field (if any), append parent''s ''Message-ID:'' (if any); if no ''References:'' but parent has single-id ''In-Reply-To:'', use that plus ''Message-ID:''. This builds a traceable conversation thread.'
section: 3.6.4
