document: rfc-5696
kind: security-consideration
summary: Injection of spurious PCN-marks into the domain can only occur via a misconfigured PCN-ingress-node. The effect is admission of fewer flows or premature termination of flows; rapid utilization drops should allow operators to detect the misconfiguration quickly.
section: "7"
