document: rfc-2401
kind: normative-requirement
summary: Multiple senders to a multicast group SHOULD use a single Security Association (and hence SPI) for all traffic to that group when a symmetric key encryption or authentication algorithm is employed, as data origin authentication of individual senders is not achievable in this context.
section: "4.7"
rfc2119_level: SHOULD
topics:
    - ipsec
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
