document: rfc-9921
kind: security-consideration
summary: In TTC mode, the TSA receives only an opaque cryptographic hash of the payload. To prevent disclosure of identical payloads over time or comparison with known payloads, the payload should be armored with a nonce shared with the recipient but not the TSA. Such an armoring mechanism is out of scope for this document.
section: "5"
topics:
