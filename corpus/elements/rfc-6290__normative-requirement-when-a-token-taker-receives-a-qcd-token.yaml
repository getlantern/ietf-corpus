document: rfc-6290
kind: normative-requirement
summary: When a token taker receives a QCD token in an unprotected notification, it MUST verify the TOKEN_SECRET_DATA against the stored token. On successful verification, it MUST silently delete the associated IKE SA and all child SAs. The token taker MUST accept such tokens from any IP address and port combination.
section: "3"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
