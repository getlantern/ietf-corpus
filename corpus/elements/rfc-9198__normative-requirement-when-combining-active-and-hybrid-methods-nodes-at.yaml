document: rfc-9198
kind: normative-requirement
summary: When combining active and hybrid methods, Nodes at ingress and egress of a domain supporting an interrogation protocol SHOULD be both Discoverable and Cooperating, and SHOULD reveal the same Node identity in response to both active and hybrid interrogation methods.
