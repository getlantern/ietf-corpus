document: rfc-3261
kind: protocol-element
summary: The Via header field records each hop's address and branch parameter as a request traverses the network, enabling responses to be routed back along the same path without requiring stateful proxies or DNS lookups on the return path. Each proxy adds its own Via entry and removes it when forwarding responses upstream.
section: "20.42"
