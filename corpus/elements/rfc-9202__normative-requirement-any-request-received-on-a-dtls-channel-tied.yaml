document: rfc-9202
kind: normative-requirement
summary: Any request received on a DTLS channel tied to an access token MUST be checked against the authorization rules; expired tokens MUST be removed, and unauthorized requests MUST be rejected with a 4.01 response.
section: "3.4"
rfc2119_level: MUST
topics:
    - tls
    - security
    - oauth
