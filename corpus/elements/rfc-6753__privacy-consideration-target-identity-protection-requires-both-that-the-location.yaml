document: rfc-6753
kind: privacy-consideration
summary: Target identity protection requires both that the location URI not be associated with the Target's identity in any context, and that the PIDF-LO not contain Target identity information. The LS should use an unlinked pseudonym in the PIDF-LO 'entity' attribute to preserve anonymity.
section: "6"
topics:
    - privacy
