document: rfc-6241
kind: normative-requirement
summary: Authentication MUST result in an authenticated client identity (NETCONF username) whose permissions are known to the server. These access permissions MUST be enforced throughout the entire NETCONF session.
section: "2.2"
rfc2119_level: MUST
topics:
    - netconf
    - security
