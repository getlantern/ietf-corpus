document: rfc-5565
kind: protocol-element
summary: The Address Family Border Router (AFBR) is the PE router that handles both I-IP (the transit core's protocol) and E-IP (the client networks' protocol). Only AFBRs need to support both address families; P routers support only I-IP and CE routers support only E-IP.
section: "4.1"
