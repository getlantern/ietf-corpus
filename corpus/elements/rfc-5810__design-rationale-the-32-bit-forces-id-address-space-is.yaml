document: rfc-5810
kind: design-rationale
summary: The 32-bit ForCES ID address space is split uniformly between FEs and CEs (each 2^30 addresses) even though NEs typically have far more FEs than CEs; uniform split was chosen for simplicity rather than optimizing allocation proportionality.
