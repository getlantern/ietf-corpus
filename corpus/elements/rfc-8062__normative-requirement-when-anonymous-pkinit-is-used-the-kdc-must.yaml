document: rfc-8062
kind: normative-requirement
summary: When anonymous PKINIT is used, the KDC MUST use the Diffie-Hellman key agreement method and derive the reply key per Section 3.2.3.1 of RFC 4556. If clientPublicValue is absent, the KDC MUST return KDC_ERR_PUBLIC_KEY_ENCRYPTION_NOT_SUPPORTED.
section: 4.1.1
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
