document: rfc-7623
kind: design-rationale
summary: Split-horizon filtering in PBB-EVPN uses the B-MAC source address rather than the ES label used in RFC 7432, because B-MAC uniquely identifies the originating site and this function is already defined by the IEEE PBB I-Component specification.
section: 6.2.1.3
topics:
