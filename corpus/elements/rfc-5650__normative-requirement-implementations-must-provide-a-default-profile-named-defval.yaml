document: rfc-5650
kind: normative-requirement
summary: Implementations MUST provide a default profile named 'DEFVAL' for each profile and template type. If a line's templates have not been set, 'DEFVAL' is automatically used; the name 'DEFVAL' is reserved in this MIB context.
