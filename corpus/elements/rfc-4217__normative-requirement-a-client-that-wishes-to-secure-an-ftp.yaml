document: rfc-4217
kind: normative-requirement
summary: A client that wishes to secure an FTP session SHOULD send the AUTH command with the parameter 'TLS'. The client then behaves according to its policies based on the server response and the result of TLS negotiation; a client that receives an AUTH rejection MAY continue the session unprotected.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
