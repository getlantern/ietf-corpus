document: rfc-7705
kind: protocol-element
summary: '''Internal BGP AS Migration'' allows an iBGP speaker to accept a BGP OPEN with either the legacy ASN or the new permanently retained ASN in ''My Autonomous System''. This permits gradual iBGP session migration without requiring simultaneous reconfiguration of all routers.'
section: "4.1"
topics:
    - bgp
    - routing
