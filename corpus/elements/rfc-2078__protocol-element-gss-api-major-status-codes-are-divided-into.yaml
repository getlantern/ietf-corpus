document: rfc-2078
kind: protocol-element
summary: GSS-API major_status codes are divided into fatal error codes (e.g., GSS_S_BAD_BINDINGS, GSS_S_BAD_MECH, GSS_S_BAD_SIG, GSS_S_DEFECTIVE_TOKEN, GSS_S_FAILURE) and informatory codes (GSS_S_COMPLETE, GSS_S_CONTINUE_NEEDED, GSS_S_DUPLICATE_TOKEN, GSS_S_OLD_TOKEN, GSS_S_UNSEQ_TOKEN, GSS_S_GAP_TOKEN). A separate minor_status provides mechanism-specific detail.
section: 1.2.1
topics:
    - security
