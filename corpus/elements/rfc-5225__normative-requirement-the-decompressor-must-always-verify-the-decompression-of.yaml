document: rfc-5225
kind: normative-requirement
summary: The decompressor MUST always verify the decompression of every CO header using the CRC it carries. If CRC verification fails, context updates MUST NOT be performed, and the packet MUST NOT be delivered to upper layers.
section: "6.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
