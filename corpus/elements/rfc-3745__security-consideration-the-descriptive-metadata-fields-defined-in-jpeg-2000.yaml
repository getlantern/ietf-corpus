document: rfc-3745
kind: security-consideration
summary: The descriptive metadata fields defined in JPEG 2000 do not themselves create additional security risks because they are not used to induce particular behavior in the recipient application. However, some metadata fields may encode IPR protection information whose alteration could constitute an offense under WIPO-based national agreements.
section: "3"
topics:
