document: rfc-9868
kind: design-rationale
summary: No static maximum length is imposed on the UDP options area. Past experience with TCP options and IPv4 address limits shows that static bounds are always eventually exceeded. Implementations may impose their own limits, but the specification deliberately avoids codifying one.
section: "6"
topics:
    - udp
