document: rfc-4607
kind: protocol-element
summary: IPv4 SSM destination addresses occupy the 232/8 range (232.0.0.0 to 232.255.255.255). IPv6 SSM addresses use the prefix FF3x::/32, with practical allocation within FF3x::/96 due to the requirement that P=1, T=1, and plen=0.
