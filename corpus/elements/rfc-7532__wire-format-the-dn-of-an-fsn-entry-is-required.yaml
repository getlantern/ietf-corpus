document: rfc-7532
kind: wire-format
summary: The DN of an FSN entry is REQUIRED to take the form 'fedfsFsnUuid=$FSNUUID,$NCE', and the DN of an FSL entry is REQUIRED to take the form 'fedfsFslUuid=$FSLUUID,fedfsFsnUuid=$FSNUUID,$NCE'. These structures enforce UUID uniqueness within the LDAP directory.
section: 4.2.2.2
topics:
    - ldap
