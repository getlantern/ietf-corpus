document: rfc-3454
kind: normative-requirement
summary: 'A profile of stringprep MUST include: the intended applicability, the character repertoire, which mapping tables are used, any additional profile-specific mappings, the Unicode normalization form (if any), the prohibited character tables used, the bidirectional checking used (if any), and any additional profile-specific prohibited characters.'
section: "1.2"
rfc2119_level: MUST
