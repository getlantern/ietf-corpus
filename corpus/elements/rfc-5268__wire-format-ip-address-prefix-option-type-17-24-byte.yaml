summary: 'IP Address/Prefix option (Type 17): 24-byte option used in PrRtAdv, HI, and HAck, carrying a 128-bit IPv6 address and an 8-bit Prefix Length. Option-Code distinguishes Old CoA (1), New CoA (2), NAR IP address (3), and NAR prefix (4).'
