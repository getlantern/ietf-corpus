document: rfc-3182
kind: normative-requirement
summary: When generating an RSVP message, if an INTEGRITY object is not computed for the RSVP message, then an INTEGRITY object SHOULD be computed for the POLICY_DATA object containing AUTH_DATA and SHOULD be inserted as a Policy Data option.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - security
