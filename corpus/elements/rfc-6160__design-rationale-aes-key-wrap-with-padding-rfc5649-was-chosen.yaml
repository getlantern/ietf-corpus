document: rfc-6160
kind: design-rationale
summary: AES Key Wrap with Padding (RFC5649) was chosen as the content-encryption algorithm because in high assurance cryptographic modules it is desirable to segregate cryptographic keying material from other data, and using a specific mechanism solely for protection of keying material assists this goal.
