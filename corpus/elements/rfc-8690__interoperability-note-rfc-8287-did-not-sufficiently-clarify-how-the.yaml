document: rfc-8690
kind: interoperability-note
summary: RFC 8287 did not sufficiently clarify how the length of the Segment ID sub-TLVs should be computed, resulting in interoperability issues discovered during EANTC testing. RFC 8690 resolves this ambiguity by specifying explicit length values.
