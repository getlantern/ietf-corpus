document: rfc-9795
kind: normative-requirement
summary: When an "rcd" claim contains URI references to external content and the signer is authoritative (mode 2), an "rcdi" claim MUST be included. If "rcdi" is present, a corresponding "rcd" claim MUST also be present.
section: "4"
rfc2119_level: MUST
