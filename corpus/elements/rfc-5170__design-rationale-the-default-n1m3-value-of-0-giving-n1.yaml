document: rfc-5170
kind: design-rationale
summary: The default N1m3 value of 0 (giving N1=3 ones per column) is recommended when the sender has no information about the receivers' decoding scheme. Higher N1m3 values (denser parity matrix) can improve performance when Gaussian elimination is known to be used at all receivers, but no specific value is mandated.
section: 4.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
