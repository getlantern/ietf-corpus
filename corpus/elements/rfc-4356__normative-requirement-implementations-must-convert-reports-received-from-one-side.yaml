document: rfc-4356
kind: normative-requirement
summary: Implementations MUST convert reports received from one side (MMS or Internet mail) destined for the other, and MUST generate reports as appropriate for messages received from either side. The 'DSN-Gateway:' field in delivery reports MUST be created.
section: 2.1.4
rfc2119_level: MUST
topics:
    - email
