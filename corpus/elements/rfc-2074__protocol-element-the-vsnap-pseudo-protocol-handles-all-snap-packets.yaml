document: rfc-2074
kind: protocol-element
summary: 'The vsnap pseudo-protocol handles all SNAP packets with non-zero OUI. Its identifier is 8 octets: [0.0.0.4] followed by [0.a.b.c.0.0.d.e] where a/b/c are the 3-octet OUI and d/e are the 2-byte EtherType. Two protocolDirParameters octets are required, the second set to zero.'
section: 5.2.4
topics:
    - snmp
