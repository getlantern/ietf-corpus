summary: 'The SDP key management attribute ''key-mgmt'' carries a protocol identifier (prtcl-id) and base64-encoded key management data (keymgmt-data). The ABNF is: key-mgmt-att-value = 0*1SP prtcl-id SP keymgmt-data.'
