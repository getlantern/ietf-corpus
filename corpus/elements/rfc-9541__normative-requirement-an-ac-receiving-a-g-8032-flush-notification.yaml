document: rfc-9541
kind: normative-requirement
summary: An AC receiving a G.8032 flush notification or a flush message from any other access network protocol MAY propagate it to remote PEs by generating a B-MAC/I-SID route update with a higher Sequence Number.
section: "4.2"
rfc2119_level: MAY
topics:
