document: rfc-1892
kind: protocol-element
summary: 'A Multipart/Report message contains two or three sub-parts in order: (1) a required human-readable description of the condition causing the report, in any MIME content-type; (2) a required machine-parsable body part describing the reported event; and (3) an optional body part containing the returned message or a portion thereof.'
