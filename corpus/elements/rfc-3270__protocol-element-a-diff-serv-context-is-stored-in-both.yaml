document: rfc-3270
kind: protocol-element
summary: A Diff-Serv Context is stored in both the Incoming Label Map (ILM) and the NHLFE for each label. The context comprises LSP type (E-LSP or L-LSP), supported PHBs, an Encaps→PHB mapping for incoming labels, and a set of PHB→Encaps mappings for outgoing labels. This context is populated at label establishment time.
section: "2.4"
topics:
