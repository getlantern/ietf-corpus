document: rfc-5561
kind: normative-requirement
summary: The S-bit of a Capability Parameter in an Initialization message MUST be 1 and SHOULD be ignored on receipt, ensuring that any Capability Parameter in an Initialization message enables (rather than withdraws) the corresponding capability.
section: "6"
rfc2119_level: MUST
topics:
