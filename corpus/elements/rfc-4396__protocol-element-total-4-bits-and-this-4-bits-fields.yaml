document: rfc-4396
kind: protocol-element
summary: TOTAL (4 bits) and THIS (4 bits) fields in TYPE 2, 3, and 4 units indicate the total fragment count and the current fragment index respectively. If THIS > TOTAL or TOTAL = 0, the fragment SHALL be discarded. For TYPE 3 units carrying the last modifier fragment, TOTAL MUST equal THIS and MUST be greater than one.
section: 4.1.3
topics:
