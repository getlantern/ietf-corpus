document: rfc-8234
kind: design-rationale
summary: Remembering the active path at initialization (when no local request exists) minimizes traffic switchovers when the remote node is still in operation, and does not cause problems even if the remembered path is no longer valid due to local inputs that occurred while the node was out of operation.
