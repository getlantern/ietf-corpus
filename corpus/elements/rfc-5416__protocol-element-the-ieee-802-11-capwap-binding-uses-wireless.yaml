document: rfc-5416
kind: protocol-element
summary: The IEEE 802.11 CAPWAP binding uses Wireless Binding Identifier (WBID) value 1 in the CAPWAP header, as required by RFC 5415 Section 4.3. All IEEE 802.11 CAPWAP data and control messages must carry this WBID.
