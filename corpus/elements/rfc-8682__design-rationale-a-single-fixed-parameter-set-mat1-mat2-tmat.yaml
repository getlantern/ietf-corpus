document: rfc-8682
kind: design-rationale
summary: A single fixed parameter set (mat1, mat2, tmat) is mandated for this specification rather than leaving it user-selectable (as in the original v1.1 implementation), so that the pseudorandom sequence is fully determined by the seed alone. This simplifies use and ensures determinism.
section: "1"
