document: rfc-7162
kind: normative-requirement
summary: After a CONDSTORE enabling command is issued, the server MUST return exactly one of the HIGHESTMODSEQ or NOMODSEQ response codes in an OK untagged response for every successful SELECT/EXAMINE command, depending on whether the mailbox supports persistent mod-sequence storage.
section: 3.1.2
rfc2119_level: MUST
topics:
    - email
