document: rfc-4342
kind: normative-requirement
summary: In the absence of better information, a receiver MUST conservatively assume that every lost packet was a data packet and must occur in some lossy part of a loss interval. DCCP's NDP Count option can help determine whether a particular packet contained data.
section: "6.1"
rfc2119_level: MUST
topics:
    - congestion
