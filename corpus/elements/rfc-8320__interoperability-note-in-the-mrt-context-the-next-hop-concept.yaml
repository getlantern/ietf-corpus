document: rfc-8320
kind: interoperability-note
summary: 'In the MRT context, the ''next hop'' concept from RFC 5036 is reinterpreted: for red(blue) FECs, the next hop is based on the MRT-Red(Blue) forwarding tree rather than the shortest-path forwarding tree. This affects ordered-control label distribution, label mapping propagation, and next-hop-change response procedures.'
section: 5.2.2
topics:
    - mpls
    - routing
