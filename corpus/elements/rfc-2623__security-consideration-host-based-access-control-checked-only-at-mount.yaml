document: rfc-2623
kind: security-consideration
summary: Host-based access control checked only at mount time allows attackers to circumvent MOUNT server access control by stealing or guessing file handles; impersonating user credentials is trivial with AUTH_SYS but harder with AUTH_DH, AUTH_KERB4, and RPCSEC_GSS.
section: "2.6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
