document: rfc-5696
kind: protocol-element
summary: The PCN-compatible Diffserv codepoint is a DSCP for which the ECN field carries PCN markings instead of RFC 3168 ECN markings. Enabling PCN for a DSCP replaces the default ECN marking behavior with PCN metering and marking per RFC 5670.
section: "4.4"
topics:
    - diffserv
    - ecn
    - qos
