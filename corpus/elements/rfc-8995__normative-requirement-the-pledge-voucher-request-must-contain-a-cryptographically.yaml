document: rfc-8995
kind: normative-requirement
summary: The pledge voucher-request MUST contain a cryptographically strong random or pseudo-random nonce (per RFC 4086 Section 6.2). Different nonces MUST be generated for each bootstrapping attempt, whether in series or concurrently, to ensure freshness and prevent replay.
section: "5.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
