document: rfc-2959
kind: normative-requirement
summary: RTP hosts that receive RTP session packets MUST create an entry in rtpRcvrTable for each receiver/sender pair. RTP monitors must create an entry for each observed receiver as a side effect of activating an rtpSessionTable row.
