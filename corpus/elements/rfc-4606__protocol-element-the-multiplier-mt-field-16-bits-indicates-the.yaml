document: rfc-4606
kind: protocol-element
summary: The Multiplier (MT) field (16 bits) indicates the number of identical Final Signals in the LSP. Default is 1; zero is an invalid value. When multiplying virtually concatenated signals, the ordered list of label sets in the Generalized Label object identifies each component group.
section: "2.1"
extracted_by: claude-sonnet-4-6
