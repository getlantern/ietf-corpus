document: rfc-9567
kind: security-consideration
summary: This mechanism can be abused by intentionally deploying broken zones with agent domains delegated to victim nameservers, effectively using the reporting mechanism to generate a DNS query flood against victims. This is especially effective when used with open resolvers or globally distributed monitoring systems.
section: "9"
topics:
    - dns
    - security
