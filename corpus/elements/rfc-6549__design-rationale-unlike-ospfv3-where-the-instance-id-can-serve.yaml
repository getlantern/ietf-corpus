document: rfc-6549
kind: design-rationale
summary: Unlike OSPFv3, where the Instance ID can serve multiple purposes (e.g., placing the same interface in multiple areas), the OSPFv2 Instance ID is strictly reserved for identifying protocol instances. This narrower scope avoids ambiguity in OSPFv2 deployments.
section: "1"
topics:
