document: rfc-2672
kind: normative-requirement
summary: The synthesized CNAME RR MUST have the same CLASS as QCLASS, TTL equal to zero, owner equal to the QNAME at the moment the DNAME was encountered, and RDATA containing the new QNAME formed by the DNAME substitution.
