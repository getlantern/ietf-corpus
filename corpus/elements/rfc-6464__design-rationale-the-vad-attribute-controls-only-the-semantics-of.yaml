document: rfc-6464
kind: design-rationale
summary: The vad attribute controls only the semantics of the V bit in this header extension and makes no statement about whether the sender uses any other VAD features (such as discontinuous transmission, comfort noise, or silence suppression), keeping the two concerns decoupled.
