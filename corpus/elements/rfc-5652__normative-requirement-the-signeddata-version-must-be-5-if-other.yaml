document: rfc-5652
kind: normative-requirement
summary: The SignedData version MUST be 5 if 'other' certificate/CRL types are present; 4 if ACv2 attribute certificates are present; 3 if ACv1 certificates, version-3 SignerInfos, or a non-id-data eContentType are present; otherwise version MUST be 1.
section: "5.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
