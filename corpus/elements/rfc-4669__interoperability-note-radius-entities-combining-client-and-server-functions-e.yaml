document: rfc-4669
kind: interoperability-note
summary: RADIUS entities combining client and server functions (e.g., proxies acting as server to some clients and client to other servers) are expected to implement both the RADIUS Authentication Server MIB (this document) and the RADIUS Authentication Client MIB (RFC 4668).
