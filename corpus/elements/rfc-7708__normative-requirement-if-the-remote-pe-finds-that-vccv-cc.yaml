document: rfc-7708
kind: normative-requirement
summary: If the remote PE finds that VCCV CC Types 1 and 4 are both advertised, or that the C-bit is set and VCCV CC Type 4 is advertised, it should report the error to the operator through the management interface and send a Label Release Message with status code 'VCCV Type Error'.
section: "6"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
