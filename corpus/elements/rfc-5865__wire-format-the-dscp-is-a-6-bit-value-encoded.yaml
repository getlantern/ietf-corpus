document: rfc-5865
kind: wire-format
summary: The DSCP is a 6-bit value encoded in the DS field, which occupies the 8-bit TOS field of an IPv4 datagram or the Traffic Class field of an IPv6 datagram. Each DS node MUST use the DSCP to select the PHB applied to each forwarded packet.
section: "1.1"
topics:
    - diffserv
    - ip
    - qos
