document: rfc-2911
kind: state-machine
summary: 'A Job object transitions through seven states: ''pending'' (queued awaiting resources), ''pending-held'' (held, not eligible for processing), ''processing'' (actively printing), ''processing-stopped'' (paused mid-job), ''canceled'' (canceled before completion), ''aborted'' (system-aborted), and ''completed'' (finished successfully). Transitions are triggered by Cancel-Job, Hold-Job, Release-Job, Restart-Job, and normal job completion.'
section: 4.3.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
