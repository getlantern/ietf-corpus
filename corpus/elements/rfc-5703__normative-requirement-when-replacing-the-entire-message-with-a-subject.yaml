document: rfc-5703
kind: normative-requirement
summary: When replacing the entire message with a ':subject' parameter, implementations MUST convert non-ASCII characters to RFC 2047-encoded words, MUST preserve the previous Subject as Original-Subject, and MUST preserve all other header fields except those relating to the replaced MIME structure.
section: "5"
rfc2119_level: MUST
topics:
