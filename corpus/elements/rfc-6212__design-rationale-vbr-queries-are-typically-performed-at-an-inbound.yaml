document: rfc-6212
kind: design-rationale
summary: VBR queries are typically performed at an inbound border mail gateway, but the result needs to be communicated to internal mail entities such as filters or user agents. The Authentication-Results header field provides a machine-readable mechanism already in place for relaying such assessments, making it the natural vehicle for VBR results.
section: "3"
topics:
