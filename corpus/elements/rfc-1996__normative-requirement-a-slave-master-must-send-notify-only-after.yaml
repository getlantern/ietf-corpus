document: rfc-1996
kind: normative-requirement
summary: A slave/master must send NOTIFY only AFTER it has successfully completed a zone transfer and updated its SOA RR (or determined no update was necessary). This ensures that NOTIFY propagation reflects committed data.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
