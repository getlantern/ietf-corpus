document: rfc-4356
kind: security-consideration
summary: When a message uses end-to-end security such as PGP or S/MIME, gateways MUST be careful not to accidentally destroy the integrity of protected content by altering text within the region covered by a signature during MMS-to-email mapping. RFC 2480 discusses MIME security issues in gateways.
section: "3"
topics:
    - security
    - email
    - crypto
