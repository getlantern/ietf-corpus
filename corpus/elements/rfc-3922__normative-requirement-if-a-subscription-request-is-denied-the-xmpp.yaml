document: rfc-3922
kind: normative-requirement
summary: If a subscription request is denied, the XMPP-CPIM gateway MUST return a presence stanza of type 'unsubscribed' and MUST NOT invoke the notify operation. Specific stanza errors MUST be returned for invalid target (<item-not-found/>), forbidden access (<forbidden/>), and optionally for pre-existing subscriptions (<conflict/>).
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
