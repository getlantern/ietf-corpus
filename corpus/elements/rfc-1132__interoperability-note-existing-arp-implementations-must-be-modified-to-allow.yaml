document: rfc-1132
kind: interoperability-note
summary: Existing ARP implementations must be modified to allow cache entries larger than the standard hardware address length, to accommodate the 10-byte 802.IPX address combined with the possible immediate address of an intervening IPX bridge associated with a given IP address.
