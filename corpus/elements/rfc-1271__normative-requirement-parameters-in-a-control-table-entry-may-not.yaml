document: rfc-1271
kind: normative-requirement
summary: Parameters in a control table entry may not be modified while the associated EntryStatus object equals valid(1); to change parameters, the management station must first set the entry to invalid(4), which causes deletion of the entry and all associated data entries.
section: "5"
rfc2119_level: MUST NOT
topics:
