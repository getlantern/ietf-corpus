document: rfc-8880
kind: protocol-element
summary: The name 'ipv4only.arpa' is defined to have exactly two IPv4 address records with rdata 192.0.0.170 and 192.0.0.171, and no other IPv4 or IPv6 address records. When queried via a DNS64 recursive resolver, it also has synthesized IPv6 AAAA records derived from the NAT64 prefix(es) and those two IPv4 addresses. All subdomains of 'ipv4only.arpa' are defined as nonexistent (NXDOMAIN).
section: "7.1"
topics:
    - dns
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
