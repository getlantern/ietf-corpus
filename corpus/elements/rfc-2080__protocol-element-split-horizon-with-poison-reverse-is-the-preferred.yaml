document: rfc-2080
kind: protocol-element
summary: 'Split Horizon with Poison Reverse is the preferred method of loop avoidance: routes learned from a neighbor are re-advertised back to that neighbor with metric 16 (infinity) rather than being omitted. Implementations should provide per-interface control to select no horizoning, split horizoning, or poison reverse.'
section: "2.6"
topics:
    - routing
