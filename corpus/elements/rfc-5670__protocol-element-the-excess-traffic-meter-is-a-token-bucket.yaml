document: rfc-5670
kind: protocol-element
summary: The excess-traffic-meter is a token bucket with configured rate PCN-excess-rate (bits/s) and maximum fill BS_etm (bits). For 'classic' mode, marking occurs when F_etm = 0; for 'packet-size-independent' mode, marking occurs when F_etm < 0 and no tokens are removed from a negative bucket.
