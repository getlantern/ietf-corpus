document: rfc-4848
kind: normative-requirement
summary: 'U-NAPTR uses only three flags: ''S'', ''A'', and ''U''. If a client obtains a NAPTR RR containing any other flag, that record should be ignored and processing continues with the next record.'
section: "4.4"
rfc2119_level: SHOULD
topics:
