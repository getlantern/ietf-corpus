document: rfc-7864
kind: normative-requirement
summary: If the LMA wants to convey flow-level information to the MAG, it MUST include a Flow Identification Mobility Option in the FMI (or PBA) for all flows the MAG needs to handle at flow granularity, and each such option MUST include a Traffic Selector Sub-Option.
section: "3.4"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
