document: rfc-9701
kind: design-rationale
summary: RFC 7662 introspection responses are plain JSON objects, providing no cryptographic assurance. This specification adds a signed JWT response for use cases where the resource server requires stronger assurance that the authorization server issued the introspection response, including cases where the AS assumes liability for the response content.
section: "1"
topics:
    - oauth
    - jose
    - security
