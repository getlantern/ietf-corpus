document: rfc-4023
kind: protocol-element
summary: When sending an MPLS packet into an MPLS-in-IP or MPLS-in-GRE tunnel, the DS field of the encapsulating IP header MAY be set based on the Behavior Aggregate of the MPLS packet, per RFC 3270. Similarly, at the tunnel tail the DS field MAY determine the Behavior Aggregate of the encapsulated MPLS packet.
section: "5.3"
topics:
    - mpls
    - diffserv
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
