document: rfc-8435
kind: normative-requirement
summary: Once a COMMIT is replied to, all replicas must reflect the written data committed to stable storage. A client with outstanding unstable writes to a single node MUST do all reads from that same node to avoid stale reads.
section: 8.2.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
