document: rfc-4448
kind: protocol-element
summary: 'An Ethernet PW operates in one of two modes: ''raw mode'' or ''tagged mode''. In tagged mode, each frame MUST contain at least one 802.1Q VLAN tag meaningful to the NSPs at both PW termination points. In raw mode, a frame MAY contain an 802.1Q VLAN tag, but it passes transparently through the NSPs.'
section: "1"
topics:
