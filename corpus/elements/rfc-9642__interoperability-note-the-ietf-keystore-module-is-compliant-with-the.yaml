document: rfc-9642
kind: interoperability-note
summary: The 'ietf-keystore' module is compliant with the Network Management Datastore Architecture (NMDA, RFC 8342). Keys and certificates installed during manufacturing are expected to appear in <operational>, and the module uses 'or:origin' annotations accordingly.
