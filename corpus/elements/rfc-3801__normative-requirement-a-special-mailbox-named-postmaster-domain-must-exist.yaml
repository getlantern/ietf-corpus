document: rfc-3801
kind: normative-requirement
summary: A special mailbox named postmaster@domain MUST exist on all conforming systems for diagnostics. Conforming implementations MUST also reject any inbound message addressed to non-mail-user, returning an NDN with status code 5.1.1 ('Mailbox does not exist').
section: 4.1.2
rfc2119_level: MUST
topics:
    - email
