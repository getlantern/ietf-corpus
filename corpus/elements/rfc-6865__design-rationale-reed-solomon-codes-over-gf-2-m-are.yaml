document: rfc-6865
kind: design-rationale
summary: 'Reed-Solomon codes over GF(2^^m) are Maximum Distance Separable (MDS): a receiver can recover all k source symbols from any set of exactly k encoding symbols, providing optimal erasure protection. They are also systematic, so source symbols are part of the encoding symbols, greatly simplifying decoding.'
