document: rfc-1784
kind: wire-format
summary: The TFTP RRQ or WRQ packet is extended with the 'tsize' option by appending the NULL-terminated string 'tsize' followed by a NULL-terminated ASCII decimal value representing file size in octets. All fields are NULL-terminated strings appended after the standard mode field.
section: Transfer Size Option Specification
