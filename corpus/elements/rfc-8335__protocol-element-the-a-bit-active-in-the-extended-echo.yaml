document: rfc-8335
kind: protocol-element
summary: The A-bit (Active) in the Extended Echo Reply is set only when Code is No Error, the L-bit was set, and the probed interface is active. The 4-bit and 6-bit indicate whether IPv4 or IPv6 is running on the probed interface, and are only meaningful when A-bit is set.
section: "3"
topics:
