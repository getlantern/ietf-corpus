document: rfc-9363
kind: normative-requirement
summary: Each header field used in a compression Rule MUST be identified through a global YANG identityref. Protocol-level Field IDs MUST derive from fid-base-type, and all fields for a specific protocol MUST derive from that protocol's base identity (e.g., fid-ipv6-base-type).
section: "4.3"
rfc2119_level: MUST
topics:
    - yang
    - ip
