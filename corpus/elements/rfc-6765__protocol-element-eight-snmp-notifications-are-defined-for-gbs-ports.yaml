summary: 'Eight SNMP notifications are defined for GBS ports: gBondLowUpRateCrossing and gBondLowDnRateCrossing for rate threshold crossings; gBondPmTca15MinESCrossing, gBondPmTca15MinSESCrossing, gBondPmTca15MinUASCrossing for 15-minute PM threshold crossings; and gBondPmTca1DayESCrossing, gBondPmTca1DaySESCrossing, gBondPmTca1DayUASCrossing for 1-day PM threshold crossings.'
