summary: 'The IA APPsub-TLV wire format includes: Type (2 bytes, value 10), Length (2 bytes, minimum 7), Addr Sets End (2 bytes), Nickname (2 bytes), Flags (1 byte with D and L bits), Confidence (1 byte, range 0-254), Template (variable), Address Sets (variable), and optional sub-sub-TLVs.'
