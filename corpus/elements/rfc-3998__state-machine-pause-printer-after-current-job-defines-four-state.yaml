document: rfc-3998
kind: state-machine
summary: 'Pause-Printer-After-Current-Job defines four state transitions: ''idle''→''stopped''/''paused'' (REQUIRED); ''processing''→''processing''/''moving-to-paused'' then later →''stopped''/''paused'' when mid-job completes (OPTIONAL); ''processing''→''stopped''/''paused'' when not mid-job (REQUIRED); ''stopped''→''stopped''/''paused'' (REQUIRED). The Printer MUST complete the current in-flight job before stopping.'
section: 3.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
