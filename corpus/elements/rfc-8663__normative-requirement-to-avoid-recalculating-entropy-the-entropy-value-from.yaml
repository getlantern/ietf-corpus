document: rfc-8663
kind: normative-requirement
summary: To avoid recalculating entropy, the entropy value from the incoming packet's UDP source port MAY be retained when stripping the UDP header and reused as the entropy value of the outgoing encapsulated packet.
section: 3.2.3
rfc2119_level: MAY
