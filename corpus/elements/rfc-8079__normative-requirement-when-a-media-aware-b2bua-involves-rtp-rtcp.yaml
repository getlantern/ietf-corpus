document: rfc-8079
kind: normative-requirement
summary: When a media-aware B2BUA involves RTP/RTCP multiplexing, it MUST ensure there are no conflicting RTP Payload Type numbers. When conflicts exist, it MUST rewrite RTP Payload Type numbers, and the related SDP information MUST be updated accordingly.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
