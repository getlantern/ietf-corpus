summary: The Group Controller Key Server (GC/KS) role covers key creation, key distribution, rekey operations, and group membership management (registration, eviction, de-registration). It creates the Group Traffic Protection Keys (GTPKs) and first-tier rekey key trees and enforces the policy token's access control rules.
