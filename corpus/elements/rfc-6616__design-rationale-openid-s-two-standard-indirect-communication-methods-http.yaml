document: rfc-6616
kind: design-rationale
summary: OpenID's two standard indirect communication methods (HTTP redirects and HTML form submission) are not directly applicable for SASL, so a new method encoding OpenID message content as a URI is defined to ensure compatibility with OpenID 2.0 capable OPs.
