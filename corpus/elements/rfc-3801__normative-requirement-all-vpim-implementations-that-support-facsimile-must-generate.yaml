document: rfc-3801
kind: normative-requirement
summary: All VPIM implementations that support facsimile MUST generate TIFF-F compatible content in the Image/TIFF subtype using application=faxbw encoding by default. The content-type parameter application=faxbw MUST be included in outbound fax messages.
section: 4.4.4
rfc2119_level: MUST
topics:
