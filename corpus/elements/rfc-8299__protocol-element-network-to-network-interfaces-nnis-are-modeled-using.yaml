document: rfc-8299
kind: protocol-element
summary: 'Network-to-Network Interfaces (NNIs) are modeled using `site-vpn-flavor-nni`. Three NNI interconnect options are supported: Option A (VRF-to-VRF, modeled as a site with direct routing between ASBRs), Option B (per-VPN ASBR redistribution of labeled routes), and Option C (multihop eBGP with labeled unicast). Each option has distinct configuration requirements in the YANG tree.'
section: "6.15"
topics:
