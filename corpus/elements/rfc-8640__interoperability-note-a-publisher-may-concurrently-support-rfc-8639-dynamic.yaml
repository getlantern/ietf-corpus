document: rfc-8640
kind: interoperability-note
summary: A publisher may concurrently support RFC 8639 dynamic subscription RPCs and RFC 5277 <create-subscription>, but a single NETCONF transport session cannot mix both; session-level exclusivity is enforced via operation-not-supported errors.
