document: rfc-2661
kind: normative-requirement
summary: The H bit (AVP hiding) MUST only be set if a shared secret exists between LAC and LNS. A Random Vector AVP MUST precede the first AVP with the H bit set to 1 in any given control message.
section: "4.3"
rfc2119_level: MUST
