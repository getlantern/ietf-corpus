document: rfc-8485
kind: normative-requirement
summary: New versions of a trust framework that require different processing rules MUST use a different trustmark URL. All trust frameworks that extend this specification MUST be referenced by a unique trustmark URL so RPs can differentiate between frameworks.
section: "5"
rfc2119_level: MUST
topics:
