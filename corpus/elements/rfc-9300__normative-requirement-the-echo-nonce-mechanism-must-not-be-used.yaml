document: rfc-9300
kind: normative-requirement
summary: The Echo-Nonce mechanism MUST NOT be used over the public Internet and MUST only be used in trusted and closed deployments. An ITR SHOULD set the E-bit only when it knows the ETR is enabled for Echo-Noncing (conveyed via the E-bit in Map-Reply).
section: "10.1"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
