document: rfc-2156
kind: design-rationale
summary: 'For X.400 services that cannot be guaranteed in RFC 822 (Alternate Recipient Allowed prohibition and DL Expansion Prohibited), MIXER defines two conformant gateway options: (1) reject the message to honor the service, or (2) gateway the message treating the service as unsupported. RFC 1327 only allowed option 2; MIXER allows both.'
section: 2.3.1.2
