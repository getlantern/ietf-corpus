document: rfc-4196
kind: normative-requirement
summary: Padding MUST be added as specified in ESP such that the data to be encrypted (including the ESP Pad Length and Next Header fields) has a length that is a multiple of 16 octets (the SEED block size).
section: "2.4"
rfc2119_level: MUST
