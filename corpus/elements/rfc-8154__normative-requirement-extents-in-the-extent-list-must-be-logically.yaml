document: rfc-8154
kind: normative-requirement
summary: Extents in the extent list MUST be logically contiguous for a read-only layout. For a read-write layout, the set of writable extents MUST be logically contiguous, and every PNFS_SCSI_READ_DATA extent in a read-write layout MUST be covered by one or more PNFS_SCSI_INVALID_DATA extents.
section: 2.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
