document: rfc-8990
kind: normative-requirement
summary: A new Session ID MUST be generated by the initiator for every new Discovery, Flood Synchronization, or Request message. The Session ID MUST be generated by a PRNG using a locally generated seed; the PRNG SHOULD be cryptographically strong (RFC 4086). GRASP MUST check that a newly allocated Session ID is not already in use.
section: "2.7"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
