document: rfc-7247
kind: normative-requirement
summary: If the XMPP <gone/> element includes XML character data specifying a new address, it MUST be mapped to SIP 301 (Moved Permanently); if the <gone/> element carries no new address, it MUST be mapped to SIP 410 (Gone).
section: "7.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
