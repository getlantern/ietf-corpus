document: rfc-7178
kind: interoperability-note
summary: Single-hop RBridge Channel messages may be sent over links in the Detect or 2-Way adjacency state (not yet fully up) when specified by the channel protocol, enabling protocols like BFD to operate before full link establishment. Multi-hop messages follow normal TRILL Data forwarding and require Report state.
section: "2.4"
topics:
    - routing
