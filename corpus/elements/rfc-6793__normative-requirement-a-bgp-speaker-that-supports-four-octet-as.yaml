document: rfc-6793
kind: normative-requirement
summary: A BGP speaker that supports four-octet AS numbers SHALL advertise this to its peers using BGP Capabilities Advertisements, and the speaker's AS number MUST be carried in the Capability Value field of the capability.
section: "4.1"
rfc2119_level: SHALL
topics:
