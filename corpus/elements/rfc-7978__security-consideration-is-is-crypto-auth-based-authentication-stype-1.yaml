document: rfc-7978
kind: security-consideration
summary: IS-IS CRYPTO_AUTH-Based Authentication (SType = 1) provides only authentication, lacks key negotiation, and is not considered to meet current security standards. It may also not be usable for native RBridge Channel messages (between an RBridge and an end station) because end stations do not normally hold IS-IS CRYPTO_AUTH keying material.
section: "4"
topics:
    - routing
    - security
