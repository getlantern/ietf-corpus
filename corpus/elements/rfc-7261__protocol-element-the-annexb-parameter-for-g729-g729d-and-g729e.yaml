document: rfc-7261
kind: protocol-element
summary: The annexb parameter for G729, G729D, and G729E indicates whether Annex B (voice activity detection/comfort noise) is used or preferred; permissible values are 'yes' and 'no', with 'yes' implied if the parameter is omitted. It is carried as an fmtp attribute in SDP.
