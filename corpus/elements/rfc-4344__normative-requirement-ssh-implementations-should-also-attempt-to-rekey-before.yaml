document: rfc-4344
kind: normative-requirement
summary: SSH implementations SHOULD also attempt to rekey before receiving more than 2**32 packets since the last rekey operation; the preferred approach is to rekey after receiving more than 2**31 packets.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
