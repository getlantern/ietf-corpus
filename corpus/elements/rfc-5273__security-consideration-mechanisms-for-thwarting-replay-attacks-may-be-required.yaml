document: rfc-5273
kind: security-consideration
summary: Mechanisms for thwarting replay attacks may be required depending on operational environment. Implementers must carefully consider whether to implement senderNonce and recipientNonce attributes (defined in CMC-STRUCT Section 6.6); state-constrained PKI clients are strongly encouraged to use these attributes.
