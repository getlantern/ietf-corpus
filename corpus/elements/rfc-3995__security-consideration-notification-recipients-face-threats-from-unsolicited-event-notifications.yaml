document: rfc-3995
kind: security-consideration
summary: Notification Recipients face threats from unsolicited Event Notifications (spam/DoS). The Delivery Method Document MUST specify security mechanisms to protect the Notification Recipient. Printers delivering Push notifications SHOULD support authentication of the Notification Recipient's endpoint and integrity protection of the notification content.
section: "25.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
