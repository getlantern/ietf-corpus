document: rfc-8232
kind: normative-requirement
summary: If a PCC finds it does not have sufficient information to complete incremental synchronization after advertising the capability, it MUST send a PCErr with Error-type=20 and Error-value=5 and terminate the session. The PCC SHOULD re-establish the session with the D bit set to 0.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
