document: rfc-5491
kind: normative-requirement
summary: Angular measures MUST use either degrees (identified by URN urn:ogc:def:uom:EPSG::9102) or radians (URN urn:ogc:def:uom:EPSG::9101). Bearings are measured clockwise from WGS84 Northing, not magnetic north.
section: "5"
rfc2119_level: MUST
