document: rfc-8105
kind: design-rationale
summary: The TPUI (20-bit Temporary Portable User Identity assigned during location registration) is not used for IID construction because many implementations assign the same TPUI repeatedly, making it unsuitable for stable unique addressing per RFC 8065.
