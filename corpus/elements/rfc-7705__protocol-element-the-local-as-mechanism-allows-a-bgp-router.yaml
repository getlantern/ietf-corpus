document: rfc-7705
kind: protocol-element
summary: The 'Local AS' mechanism allows a BGP router to supersede the globally configured ASN in the 'My Autonomous System' field of the BGP OPEN message with a locally defined AS value for a specific neighbor or group of neighbors. This enables a PE router to establish eBGP sessions toward CE devices still using the legacy ASN after the PE has been moved to a new ASN.
section: "3.1"
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
