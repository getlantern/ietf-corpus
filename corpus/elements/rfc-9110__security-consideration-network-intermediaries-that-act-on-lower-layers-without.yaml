document: rfc-9110
kind: security-consideration
summary: Network intermediaries that act on lower layers without the client's knowledge are indistinguishable from on-path attackers at the protocol level and often introduce security flaws or interoperability problems by mistakenly violating HTTP semantics. Interception proxies are semantically equivalent to active attackers.
section: "17.2"
topics:
    - http
    - security
