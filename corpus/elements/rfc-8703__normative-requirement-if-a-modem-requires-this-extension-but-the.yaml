document: rfc-8703
kind: normative-requirement
summary: If a modem requires this extension but the router does not advertise support, the modem SHOULD NOT immediately terminate the DLEP session; it SHOULD instead use DLEP Session Messages and Attached Subnet Data Items to provide general information.
section: "2.2"
rfc2119_level: SHOULD NOT
