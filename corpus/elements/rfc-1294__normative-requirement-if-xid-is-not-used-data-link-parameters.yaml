document: rfc-1294
kind: normative-requirement
summary: 'If XID is not used, data link parameters must be statically configured or defaulted to Q.922 section 5.9 values: N201=260 octets, T200=1.5 seconds, and K varies by link speed (3 at 16 Kbps, 7 at 64 Kbps, 32 at 384 Kbps, 40 at 1.536 Mbps or above).'
section: "8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
