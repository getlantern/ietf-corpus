document: rfc-2364
kind: design-rationale
summary: Two encapsulation techniques (VC-multiplexed and LLC encapsulated PPP) are both mandated because VC-multiplexing is more efficient (no per-PDU header overhead) while LLC encapsulation enables multi-protocol sharing of a single VC and is required for Frame Relay/ATM interworking with RFC 1973.
