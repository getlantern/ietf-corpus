document: rfc-5966
kind: protocol-element
summary: EDNS0 (RFC 2671) allows clients to advertise a UDP receive buffer size larger than 512 bytes, enabling servers to send larger UDP responses without truncation. However, UDP fragmentation caused by exceeding path MTU has been found unreliable.
