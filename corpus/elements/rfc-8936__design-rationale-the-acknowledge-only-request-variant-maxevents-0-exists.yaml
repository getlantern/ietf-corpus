document: rfc-8936
kind: design-rationale
summary: The Acknowledge-Only request variant (maxEvents=0) exists to allow SET Recipients to acknowledge received SETs independently from the process of receiving new SETs, enabling multi-threaded implementations where acknowledgement and reception occur on separate threads.
