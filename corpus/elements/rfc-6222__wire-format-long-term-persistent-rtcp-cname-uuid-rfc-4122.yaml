document: rfc-6222
kind: wire-format
summary: 'Long-term persistent RTCP CNAME: UUID (RFC 4122 version 1, 2, or 4) with ''urn:uuid:'' stripped, 36-octet printable ASCII string, optionally prefixed with ''user@''. Short-term persistent: 17-octet colon-separated hex MAC, e.g., ''00:23:32:af:9b:aa''. Per-session: 16-octet Base64 string from 96 LSBs of SHA-256 output.'
section: "4.2"
