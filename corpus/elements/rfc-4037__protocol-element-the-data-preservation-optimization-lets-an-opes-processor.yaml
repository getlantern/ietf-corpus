document: rfc-4037
kind: protocol-element
summary: The Data Preservation optimization lets an OPES processor announce a kept data chunk via the 'Kept' parameter of DUM (offset, size pair). The callout server may reference the chunk via DUY, eliminating the return trip for unmodified data. The processor must keep the chunk until end-of-transaction or explicit callout-server release.
section: "7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
