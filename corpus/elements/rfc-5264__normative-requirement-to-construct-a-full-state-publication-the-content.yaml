document: rfc-5264
kind: normative-requirement
summary: To construct a full-state publication, the Content-Type header field in the PUBLISH request MUST be set to 'application/pidf-diff+xml', and the body MUST be populated with a <pidf-full> root element including the 'entity' attribute.
section: "4.2"
rfc2119_level: MUST
topics:
