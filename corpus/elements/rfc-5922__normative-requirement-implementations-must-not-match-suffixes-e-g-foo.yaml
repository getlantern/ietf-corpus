document: rfc-5922
kind: normative-requirement
summary: Implementations MUST NOT match suffixes (e.g., 'foo.example.com' does not match 'example.com') and MUST NOT match any form of wildcard such as a leading '.' or '*.' with any other DNS label or sequence of labels.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - pkix
    - dns
