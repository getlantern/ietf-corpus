document: rfc-7939
kind: normative-requirement
summary: nhdpIfIndex MUST correspond to an ifIndex referring to a valid entry in the IF-MIB Interfaces Table. If that corresponding ifTable entry is deleted, the nhdpInterfaceTable row is automatically deleted, NHDP is disabled on the interface, and all related configuration and state MUST be removed from memory.
section: "6.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
