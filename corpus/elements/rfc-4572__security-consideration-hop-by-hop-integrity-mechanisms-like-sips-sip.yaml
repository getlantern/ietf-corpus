document: rfc-4572
kind: security-consideration
summary: Hop-by-hop integrity mechanisms like sips (SIP over TLS) are considered sufficient to allow acceptance of any syntactically valid certificate identity, but this leaves SDP integrity vulnerable to compromised middleboxes such as SIP proxy servers. End systems MAY warn users about sessions secured only hop-by-hop.
section: "7"
topics:
