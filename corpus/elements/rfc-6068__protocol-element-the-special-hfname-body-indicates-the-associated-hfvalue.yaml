document: rfc-6068
kind: protocol-element
summary: The special hfname "body" indicates the associated hfvalue is the message body, intended for the first text/plain body part. No additional encoding (e.g., base64 or quoted-printable) is used for the body field value beyond UTF-8-based percent-encoding.
