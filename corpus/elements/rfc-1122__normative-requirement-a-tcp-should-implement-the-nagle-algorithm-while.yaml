document: rfc-1122
kind: normative-requirement
summary: 'A TCP SHOULD implement the Nagle algorithm: while a small unacknowledged segment is outstanding, hold further small segments until the outstanding data is acknowledged. An application MUST be able to disable the Nagle algorithm per connection to support latency-sensitive protocols.'
section: 4.2.3.4
rfc2119_level: SHOULD
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
