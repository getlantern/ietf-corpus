document: rfc-9427
kind: protocol-element
summary: For EAP-TTLS with TLS 1.3, the implicit challenge for CHAP, MS-CHAP, and MS-CHAPv2 inner methods is derived as EAP-TTLS_challenge = TLS-Exporter("ttls challenge",, n), where n is 17 octets for CHAP/MS-CHAPv2 and 9 octets for MS-CHAP, with no context value.
section: "2.4"
topics:
