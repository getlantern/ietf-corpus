document: rfc-8976
kind: normative-requirement
summary: When multiple ZONEMD RRs are present in the zone, each MUST specify a unique Scheme and Hash Algorithm tuple; if the RRset contains two or more records with the same tuple, verification for those records MUST NOT be considered successful.
section: "2.5"
rfc2119_level: MUST
topics:
