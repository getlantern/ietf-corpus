document: rfc-5428
kind: protocol-element
summary: Each management event is uniquely identified by a combination of 'Organization ID' (the IANA private enterprise number of the defining organization, e.g., 4491 for CableLabs) and an 'Event ID' that is unique within that organization's namespace. This dual-key scheme allows vendor-specific events to coexist with standard PacketCable/IPCablecom events.
section: "4"
topics:
