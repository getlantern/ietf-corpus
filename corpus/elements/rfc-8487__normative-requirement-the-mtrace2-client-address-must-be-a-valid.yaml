document: rfc-8487
kind: normative-requirement
summary: The Mtrace2 Client Address MUST be a valid unicast address and MUST NOT be all ones or an unspecified address. It is invalid to have a source-group combination of (all-ones/unspecified, all-ones/unspecified); a router receiving such a combination MUST silently discard the Query.
section: 3.2.1
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
