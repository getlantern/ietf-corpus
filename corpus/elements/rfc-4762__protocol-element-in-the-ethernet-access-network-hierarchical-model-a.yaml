document: rfc-4762
kind: protocol-element
summary: In the Ethernet access network hierarchical model, a Provider VLAN (P-VLAN) tag is added to customer traffic within the Ethernet island to identify the VPLS instance, with a one-to-one correspondence between P-VLAN and VPLS instance. This limits VPLS instances per Ethernet island to 4K.
section: "11"
