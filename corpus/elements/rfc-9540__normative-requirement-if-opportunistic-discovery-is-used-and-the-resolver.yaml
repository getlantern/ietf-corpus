document: rfc-9540
kind: normative-requirement
summary: If Opportunistic Discovery is used and the resolver cannot employ certificate-based validation, the client MUST ensure the relay only accesses the gateway and target using the unencrypted resolver's original IP address.
section: 4.2.1
rfc2119_level: MUST
