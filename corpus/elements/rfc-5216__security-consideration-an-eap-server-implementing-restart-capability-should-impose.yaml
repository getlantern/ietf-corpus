document: rfc-5216
kind: security-consideration
summary: An EAP server implementing restart capability SHOULD impose a per-peer limit on the number of conversation restarts to protect against denial-of-service attacks. It is up to the EAP server whether to allow restarts at all.
section: 2.1.3
rfc2119_level: SHOULD
topics:
    - tls
    - security
