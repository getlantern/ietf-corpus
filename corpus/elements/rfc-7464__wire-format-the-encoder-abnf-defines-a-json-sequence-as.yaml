document: rfc-7464
kind: wire-format
summary: The encoder ABNF defines a JSON-sequence as zero or more repetitions of RS (0x1E), a JSON-text (UTF-8 per RFC 7159), and LF (0x0A). Each element is thus bookended by RS at the start and LF at the end.
section: "2.2"
