document: rfc-9146
kind: normative-requirement
summary: When receiving without tls12_cid content type, if the 5-tuple lookup retrieves an association for which a non-zero-length CID is expected, the datagram MUST be treated as invalid per RFC 6347 Section 4.1.2.1.
