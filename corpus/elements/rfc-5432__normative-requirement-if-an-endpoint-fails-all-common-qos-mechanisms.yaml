document: rfc-5432
kind: normative-requirement
summary: If an endpoint fails all common QoS mechanisms for a given direction, it MAY attempt to use additional QoS mechanisms not supported by the remote endpoint, since network intermediaries (e.g., an RSVP proxy) may make them work.
section: "4.3"
rfc2119_level: MAY
