document: rfc-3442
kind: normative-requirement
summary: After deriving a subnet number and mask from each destination descriptor, the DHCP client MUST zero any bits in the subnet number where the corresponding bit in the mask is zero (i.e., install the logical AND of the descriptor's subnet number and subnet mask).
section: DHCP Client Behavior
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
