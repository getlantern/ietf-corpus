document: rfc-6391
kind: design-rationale
summary: The flow label mechanism is designed so that the flow LSE is transparent to the label swap operation at Switching PEs (S-PEs) in multi-segment PWs. Interface parameter Sub-TLV signalling is transitive, so multi-segment PWs work without any modification to S-PEs.
