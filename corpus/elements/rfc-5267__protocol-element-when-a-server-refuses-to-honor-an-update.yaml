document: rfc-5267
kind: protocol-element
summary: When a server refuses to honor an UPDATE request (e.g., internal limit reached), it emits an untagged NO with response-code NOUPDATE containing the tag of the refused searching command; other return options in that command SHALL still be honored.
section: 4.3.1
