document: rfc-7033
kind: privacy-consideration
summary: WebFinger can be used to cross-correlate a user's accounts across multiple services from a single identifier (e.g., email address). Users should be warned that information published via WebFinger is globally visible and that context data such as location could put them at risk.
section: "9.2"
topics:
    - privacy
    - security
