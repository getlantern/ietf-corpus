document: rfc-8760
kind: design-rationale
summary: MD5, the default hash algorithm in RFC 3261's Digest Access Authentication, has been demonstrated to be non-collision-resistant and is now considered a bad choice for a hash function. This document extends SIP to support stronger algorithms from the 'Hash Algorithms for HTTP Digest Authentication' IANA registry, such as SHA-256 and SHA-512/256.
section: "1"
topics:
    - sip
    - security
    - crypto
