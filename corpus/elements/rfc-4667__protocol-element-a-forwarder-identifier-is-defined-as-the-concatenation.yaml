document: rfc-4667
kind: protocol-element
summary: A forwarder identifier is defined as the concatenation of an Attachment Group Identifier (AGI) and an Attachment Individual Identifier (AII), denoted as <AGI, AII>. The AGI groups forwarders for signaling purposes; the AII distinguishes forwarders within a group. The source forwarder is <AGI, SAII> and the target forwarder is <AGI, TAII>.
section: "3"
