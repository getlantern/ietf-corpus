document: rfc-7383
kind: wire-format
summary: The Encrypted Fragment payload (SKF, payload type 53) contains a 2-octet Fragment Number (starting from 1), a 2-octet Total Fragments field, followed by an Initialization Vector, encrypted content, padding, Pad Length, and Integrity Checksum Data — identical structure to the Encrypted payload except for the two additional header fields.
