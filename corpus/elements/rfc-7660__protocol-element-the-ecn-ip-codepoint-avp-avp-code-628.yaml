document: rfc-7660
kind: protocol-element
summary: 'The ECN-IP-Codepoint AVP (AVP Code 628) is of type Enumerated and specifies the ECN codepoint values to match in the IP header: 0 (Not-ECT), 1 (ECT(1)), 2 (ECT(0)), and 3 (CE - Congestion Experienced), as defined in RFC 3168.'
