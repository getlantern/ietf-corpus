document: rfc-9790
kind: design-rationale
summary: A consequence of the legacy heuristic is that values 0x4 and 0x6 are permanently associated with IPv4 and IPv6 identification by legacy devices, regardless of future IP version assignments. This means no new IP version number other than 0x4 or 0x6 will trigger heuristic load balancing on legacy routers, making concerns about future IP versions with numbers 0x0 or 0x1 irrelevant.
section: 2.1.1.1
topics:
    - mpls
    - ip
