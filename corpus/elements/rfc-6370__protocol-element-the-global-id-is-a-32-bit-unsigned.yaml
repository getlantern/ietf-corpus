document: rfc-6370
kind: protocol-element
summary: The Global_ID is a 32-bit unsigned value that uniquely identifies an operator. It MUST be derived from the operator's 4-octet ASN; 2-octet ASNs are placed in the low-order octets with the high-order octets set to zero.
