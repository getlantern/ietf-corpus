document: rfc-5056
kind: normative-requirement
summary: The channel binding operation MUST be at least integrity protected in the security mechanism used at the application layer. Authentication frameworks and mechanisms that support channel binding MUST communicate channel binding failure to applications.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
