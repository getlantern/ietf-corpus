document: rfc-4745
kind: security-consideration
summary: Security considerations are largely application-data dependent and must be addressed by documents that extend this framework. However, new action and transformation permissions along with their allowed values must be defined such that the combining rules of Section 10 do not lower the level of privacy protection.
