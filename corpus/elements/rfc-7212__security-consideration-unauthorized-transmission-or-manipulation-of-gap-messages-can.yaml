document: rfc-7212
kind: security-consideration
summary: Unauthorized transmission or manipulation of GAP messages can corrupt receiver state about legitimate senders. Message authentication using HMAC (Section 6) provides authenticity and integrity. The Timestamp field enables replay-attack protection when checked against current time within a reasonable tolerance.
section: "9"
