document: rfc-8987
kind: security-consideration
summary: Failure to implement a configurable per-port limit on active prefix delegations (requirement G-6) may expose the relay to a resource depletion attack. The operational interface requirements (Section 4.4) may introduce additional security considerations; RFC 4778 operational security practices are RECOMMENDED.
section: "6"
topics:
