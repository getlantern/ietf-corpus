document: rfc-4762
kind: normative-requirement
summary: A PE MUST be able to associate a destination MAC address with a PW in order to forward a frame. VPLS-capable PEs SHOULD have the capability to dynamically learn MAC addresses on both ACs and PWs.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
