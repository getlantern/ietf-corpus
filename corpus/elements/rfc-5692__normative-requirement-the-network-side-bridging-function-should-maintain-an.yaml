document: rfc-5692
kind: normative-requirement
summary: The network-side bridging function SHOULD maintain an ARP cache large enough to accommodate entries for all serving SSs, updated by any packets including ARP Requests, and SHOULD unicast ARP Replies back to requesting SSs using Proxy ARP to avoid broadcasting ARP Requests over the air.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - ip
