document: rfc-1044
kind: wire-format
summary: 'The HYPERchannel ARP message is carried in a 32-bit message with type code 0x0700. The ARP body (at the Header End Offset) contains: ARP hardware type 8 (2 bytes), HYPERchannel protocol type 0x0600 (2 bytes), hardware address length 6 (1 byte), IP address length 4 (1 byte), opcode (2 bytes), sender''s 32-bit HYPERchannel address + MTU (6 bytes), sender''s IP address (4 bytes), and corresponding destination fields.'
section: ADDRESS RESOLUTION PROTOCOL
topics:
    - ip
    - dns
