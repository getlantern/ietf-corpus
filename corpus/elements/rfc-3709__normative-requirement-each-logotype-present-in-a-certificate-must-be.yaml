document: rfc-3709
kind: normative-requirement
summary: Each logotype present in a certificate MUST be represented by at least one image data file. Compliant applications MUST NOT display more than one image and MUST NOT play more than one audio sequence for any logotype type at the same time.
section: "3"
rfc2119_level: MUST
