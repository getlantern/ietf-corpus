document: rfc-9073
kind: protocol-element
summary: The DERIVED parameter (TRUE/FALSE, default FALSE) indicates that a property value is derived from another property. When DERIVED=TRUE, clients MUST NOT update the property. It enables multiple STYLED-DESCRIPTION instances where all but one are derived.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
