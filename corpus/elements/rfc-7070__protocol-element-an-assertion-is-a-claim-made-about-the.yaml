document: rfc-7070
kind: protocol-element
summary: An 'Assertion' is a claim made about the subject of a reputation query (e.g., 'sends spam'). A 'Rating' is a floating-point value between 0.0 and 1.0 indicating the degree of agreement with the assertion, where 0.0 means no support and 1.0 means total agreement.
section: "5.3"
