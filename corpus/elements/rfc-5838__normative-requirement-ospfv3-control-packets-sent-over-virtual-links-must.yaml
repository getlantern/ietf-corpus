document: rfc-5838
kind: normative-requirement
summary: OSPFv3 control packets sent over virtual links MUST have a global IPv6 address associated with the virtual link for correct forwarding by intermediate hops. Virtual links are therefore not supported in AFs other than IPv6 unicast.
section: "2.8"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
