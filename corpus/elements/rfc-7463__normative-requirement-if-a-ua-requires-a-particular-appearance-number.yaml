document: rfc-7463
kind: normative-requirement
summary: If a UA requires a particular appearance number, it MUST send a dialog package PUBLISH and wait for a 2xx response before sending the INVITE. This applies when seizing an appearance for an outgoing call, requesting no appearance be used, or joining/replacing an existing call.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
