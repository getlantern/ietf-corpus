document: rfc-4188
kind: interoperability-note
summary: The value of dot1dStaticAllowedToGoTo may exceed the SNMP minimum maximum message size of 484 bytes (for SNMP over UDP per RFC 3417). SNMP engines on bridges with large port counts must support appropriate maximum message sizes.
