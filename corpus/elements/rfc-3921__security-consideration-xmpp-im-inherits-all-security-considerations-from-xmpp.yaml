document: rfc-3921
kind: security-consideration
summary: XMPP IM inherits all security considerations from XMPP-CORE (RFC 3920), including mandatory TLS and SASL for stream protection. Servers must enforce privacy lists to prevent unwanted communication, and implementors should be aware that presence information disclosure is controlled solely by the subscription model.
section: "14"
topics:
    - security
    - tls
    - privacy
