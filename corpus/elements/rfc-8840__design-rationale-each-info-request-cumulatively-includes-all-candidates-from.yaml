document: rfc-8840
kind: design-rationale
summary: Each INFO request cumulatively includes all candidates from previous INFO requests so that candidate ordering is preserved end-to-end per RFC 8838 requirements, and so that message loss or reordering (detectable via CSeq) does not cause candidates to be missed by the ICE implementation.
section: "4.4"
topics:
