document: rfc-8139
kind: protocol-element
summary: The Appointed Forwarder on a link for VLAN-x is the TRILL switch (RBridge) that ingresses native frames from and egresses native frames to the link in VLAN-x. By default, the DRB is in charge of native traffic for all VLANs on the link and may appoint other TRILL switches as Appointed Forwarders. Appointed Forwarder status and inhibition only affect native frames, not TRILL Data or IS-IS frames.
section: "2"
topics:
    - realtime
    - rtp
