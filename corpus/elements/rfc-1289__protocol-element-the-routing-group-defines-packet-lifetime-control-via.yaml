document: rfc-1289
kind: protocol-element
summary: 'The routing group defines packet-lifetime control via phivRouteMaxVisits (1..63): packets arriving at the executor that are not destined for it and have visited more than this many nodes are discarded. This parameter must not be less than the maximum path length of the network.'
