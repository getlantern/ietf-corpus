document: rfc-7075
kind: design-rationale
summary: Realm-based redirection is defined as an application-specific mechanism rather than a function of the application-independent redirect agent defined in RFC 6733. This is because the base redirect agent cannot be application-aware, so a Diameter server or proxy that supports the relevant application must perform the redirection instead.
section: "2"
topics:
    - diameter
    - security
