document: rfc-5618
kind: protocol-element
summary: The TWAMP Modes field is extended with bit position 3 (value 8) to indicate 'Unauthenticated TEST protocol, Encrypted CONTROL'. Setting this bit causes the Test and Control protocols to use independent security modes rather than the Test protocol inheriting the Control mode.
section: "3.1"
topics:
    - measurement
    - security
