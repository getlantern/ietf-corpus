document: rfc-5444
kind: security-consideration
summary: Confidentiality is not directly provided by this specification; when required it should be provided hop-by-hop via link-layer or IPsec mechanisms. However, a protocol MAY encrypt individual TLV Value fields, or wrap entire encrypted messages inside a single Packet TLV or Message TLV, defining the encrypted type and format.
section: "7.2"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
