document: rfc-8062
kind: security-consideration
summary: Traffic analysis on connections to the KDC can allow an attacker to match client identities to anonymous tickets because there are plaintext parts of tickets exposed on the wire. Additionally, a service can potentially infer a client's identity from quasi-static information such as IP address or by linking multiple uses of the same anonymous ticket.
section: "8"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
