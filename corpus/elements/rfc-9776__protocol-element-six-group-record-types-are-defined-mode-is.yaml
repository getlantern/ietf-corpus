document: rfc-9776
kind: protocol-element
summary: 'Six Group Record types are defined: MODE_IS_INCLUDE (1) and MODE_IS_EXCLUDE (2) are Current-State Records sent in response to queries; CHANGE_TO_INCLUDE_MODE (3) and CHANGE_TO_EXCLUDE_MODE (4) are Filter-Mode-Change Records; ALLOW_NEW_SOURCES (5) and BLOCK_OLD_SOURCES (6) are Source-List-Change Records sent when source-list changes without a filter-mode change.'
section: 4.2.13
topics:
