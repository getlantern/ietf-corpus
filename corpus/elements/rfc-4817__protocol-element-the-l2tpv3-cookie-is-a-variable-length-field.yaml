document: rfc-4817
kind: protocol-element
summary: The L2TPv3 Cookie is a variable-length field (maximum 64 bits) carrying a randomly assigned value. It provides an additional guarantee that a data packet has been directed to the proper L2TP session, supplementing the Session ID lookup.
