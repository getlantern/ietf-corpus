document: rfc-2384
kind: design-rationale
summary: The POP URL scheme was defined because accessing a POP3 mailbox requires multiple configuration elements (server, port, authentication mechanism, user identity), and a single string representation is convenient for programs and protocols such as ACAP that need to encapsulate network service access information.
