document: rfc-5198
kind: design-rationale
summary: UTF-8 was chosen over UTF-16 and UTF-32 because of its good compatibility properties with ASCII and for reasons discussed in the IETF character set policy (RFC 2277), enabling a smooth upgrade path from NVT ASCII.
