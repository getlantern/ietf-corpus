document: rfc-2263
kind: design-rationale
summary: The document deliberately narrows the definition of 'proxy' to mean only a proxy forwarder that forwards messages irrespective of managed object types, distinguishing it from MIB aggregation proxies or non-SNMP protocol translators. This avoids confusion caused by the historically loose use of the term 'proxy' in SNMP, which encompassed at least three distinct scenarios.
section: "1.5"
topics:
    - snmp
