document: rfc-4941
kind: interoperability-note
summary: Applications that open multiple sessions expecting them all to use the same source address, or that do not tolerate address changes mid-connection, may break when temporary addresses expire. This is one reason temporary addresses are disabled by default.
section: "3.6"
topics:
