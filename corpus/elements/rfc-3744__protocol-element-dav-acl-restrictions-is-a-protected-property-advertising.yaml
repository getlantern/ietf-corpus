document: rfc-3744
kind: protocol-element
summary: 'DAV:acl-restrictions is a protected property advertising the constraints a client must observe when submitting an ACL request: DAV:grant-only (no deny ACEs), DAV:no-invert (no inverted ACEs), DAV:deny-before-grant, and DAV:required-principal (mandatory ACE principals).'
section: "5.6"
topics:
