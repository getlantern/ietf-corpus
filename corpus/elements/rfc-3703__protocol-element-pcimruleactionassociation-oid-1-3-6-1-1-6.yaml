document: rfc-3703
kind: protocol-element
summary: pcimRuleActionAssociation (OID 1.3.6.1.1.6.1.10) is a structural class held under pcimRule via DIT containment. It MUST carry pcimActionOrder (unsigned integer; 0 = order irrelevant; negative is an error disabling the rule) and MAY carry pcimActionName and pcimActionDN (DN to reusable action).
section: "5.6"
