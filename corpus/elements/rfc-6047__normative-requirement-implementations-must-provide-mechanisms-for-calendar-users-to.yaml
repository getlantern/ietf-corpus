document: rfc-6047
kind: normative-requirement
summary: Implementations MUST provide mechanisms for Calendar Users to decide whether to accept changes from someone working on behalf of another Calendar User (via the 'sent-by' parameter), because iCAL and iTIP provide no mechanism to verify such delegation.
