document: rfc-9208
kind: normative-requirement
summary: Clients MUST NOT use the STORAGE usage figure to decide whether to refuse an APPEND; for example, they MUST NOT refuse APPEND solely because the limit minus usage is smaller than RFC822.SIZE/1024 of the message.
section: "5.1"
rfc2119_level: MUST NOT
