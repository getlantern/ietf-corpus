document: rfc-8267
kind: normative-requirement
summary: An NFS version 4 server supporting RPC-over-RDMA version 1 MUST use the alternative well-known port number (20049) for its RPC-over-RDMA service. Clients SHOULD connect to this well-known port without consulting the RPC portmapper.
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
