document: rfc-2912
kind: protocol-element
summary: 'The ''Content-features:'' header is a new MIME optional-field with syntax: ''Content-features'' '':'' Feature-expr, where Feature-expr is a media feature expression (filter) as defined in RFC 2533. It provides additional information about message content beyond what the MIME ''Content-type:'' header supplies.'
section: "3"
