document: rfc-8748
kind: normative-requirement
summary: When a <create> command is processed successfully, a fee was assessed, and the client included the fee extension at login, the server MUST include a <fee:creData> element in the response containing fee:currency, zero or more fee:fee and fee:credit elements, and optionally fee:balance and fee:creditLimit.
section: 5.2.1
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
