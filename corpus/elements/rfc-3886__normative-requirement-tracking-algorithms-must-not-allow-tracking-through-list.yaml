document: rfc-3886
kind: normative-requirement
summary: Tracking algorithms MUST NOT allow tracking through list expansions. When a message is delivered to a list, a tracking request MUST respond with an 'expanded' status and MUST NOT display the contents of the list.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - security
    - privacy
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
