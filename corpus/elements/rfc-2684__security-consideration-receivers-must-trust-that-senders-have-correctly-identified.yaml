document: rfc-2684
kind: security-consideration
summary: Receivers must trust that senders have correctly identified the encapsulated protocol; there is no mechanism to verify proper protocol identification. The encapsulation itself is not believed to introduce exploitable properties, but protocols above the encapsulation layer may be subject to various attacks.
section: "9"
topics:
    - security
