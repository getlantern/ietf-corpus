document: rfc-9606
kind: protocol-element
summary: The 'qnamemin' key is a boolean attribute (no value) indicating the DNS resolver supports QNAME minimisation per RFC 9156 to limit privacy-sensitive data sent to authoritative name servers. Its presence alone signals the feature is enabled.
