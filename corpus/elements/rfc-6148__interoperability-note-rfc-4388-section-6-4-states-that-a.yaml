document: rfc-6148
kind: interoperability-note
summary: 'RFC 4388 Section 6.4 states that a DHCPLEASEUNKNOWN message MUST NOT have any other option present, but RFC 6148 overrides this: for a query by Remote ID, option 82 MUST be present in the DHCPLEASEUNKNOWN reply. Implementers extending RFC 4388 must account for this change.'
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
