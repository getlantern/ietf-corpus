document: rfc-5669
kind: normative-requirement
summary: All SRTP packets using SEED-CCM MUST be authenticated and encrypted. SRTCP packet encryption is optional but authentication is mandatory; the encryption choice is indicated by a 1-bit encryption flag in the leftmost bit of the 32-bit word containing the SRTCP index.
section: "2.2"
rfc2119_level: MUST
topics:
    - crypto
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
