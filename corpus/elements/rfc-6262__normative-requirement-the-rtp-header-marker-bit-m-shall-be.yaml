document: rfc-6262
kind: normative-requirement
summary: The RTP header marker bit (M) SHALL be set to 1 whenever the first frame-block in the packet is the first frame-block in a talkspurt; for all other packets, M SHALL be set to zero.
section: "3.1"
rfc2119_level: SHALL
