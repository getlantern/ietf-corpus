document: rfc-3966
kind: wire-format
summary: The full ABNF for the tel URI defines global-number-digits as '+' followed by phonedigits containing at least one DIGIT, local-number-digits allowing HEXDIG plus '*' and '#', and parameters as ';pname[=pvalue]'. Visual separators ('-', '.', '(', ')') are allowed in phone digits but ignored for comparison.
