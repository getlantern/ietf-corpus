document: rfc-7596
kind: normative-requirement
summary: When the lwAFTR receives an outbound IPv4-in-IPv6 packet and no binding table match is found (e.g., no matching IPv4 address, port out of range), it MUST discard or apply a policy on the packet. When no binding match is found for an inbound IPv4 packet, the lwAFTR MUST discard it.
section: "6.2"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
