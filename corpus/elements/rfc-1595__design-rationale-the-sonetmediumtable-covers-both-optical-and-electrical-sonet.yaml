document: rfc-1595
kind: design-rationale
summary: The sonetMediumTable covers both optical and electrical SONET/SDH interfaces. Electrical SONET uses B3ZS or CMI line coding (STS-1 and STS-3), while optical SONET uses NRZ or RZ; this distinction is captured in sonetMediumLineCoding to support management of heterogeneous physical media.
section: "4.1"
