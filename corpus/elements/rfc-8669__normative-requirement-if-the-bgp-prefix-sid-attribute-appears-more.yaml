document: rfc-8669
kind: normative-requirement
summary: If the BGP Prefix-SID attribute appears more than once in an UPDATE message, all occurrences other than the first SHALL be discarded per RFC 7606. Similarly, duplicate recognized TLVs within one attribute SHALL have all but the first discarded.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
