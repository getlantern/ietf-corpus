summary: 'L2TP defines 16 control message types: SCCRQ (1), SCCRP (2), SCCCN (3), StopCCN (4), HELLO (6) for control connection management; OCRQ (7), OCRP (8), OCCN (9), ICRQ (10), ICRP (11), ICCN (12), CDN (14) for call management; WEN (15) for error reporting; and SLI (16) for PPP session control.'
