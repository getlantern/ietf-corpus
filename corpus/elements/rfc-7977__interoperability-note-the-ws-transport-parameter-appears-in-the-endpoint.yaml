document: rfc-7977
kind: interoperability-note
summary: The "ws" transport parameter appears in the endpoint URI in the SDP "path" attribute but not in the SDP m-line; MSRP was designed to allow unrecognized transports provided implementations do not need to establish a direct connection to such URIs.
section: 5.2.2
topics:
    - websocket
    - realtime
