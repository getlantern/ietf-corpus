document: rfc-8310
kind: normative-requirement
summary: A DNS client that is configured with both an authentication domain name and an SPKI pin set for a DNS server SHOULD match on both when connecting, and the overall authentication result SHOULD only be considered successful if both mechanisms succeed.
section: "6.4"
rfc2119_level: SHOULD
topics:
