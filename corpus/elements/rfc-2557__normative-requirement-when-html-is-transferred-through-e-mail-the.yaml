document: rfc-2557
kind: normative-requirement
summary: When HTML is transferred through e-mail, the charset parameter SHOULD be explicitly included in the Content-Type header rather than relying on transport-specific defaults, because the default charset differs between HTTP and MIME email environments.
section: "10"
rfc2119_level: SHOULD
