document: rfc-4444
kind: normative-requirement
summary: The overload bit MUST continue to be set if the implementation runs out of memory, independent of the isisSysLevelSetOverload management variable. Administrative clearing of the overload bit via isisSysLevelSetOverloadUntil is only honored when memory is not exhausted.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
