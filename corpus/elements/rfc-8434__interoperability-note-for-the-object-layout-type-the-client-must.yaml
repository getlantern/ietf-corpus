document: rfc-8434
kind: interoperability-note
summary: For the object layout type, the client MUST authenticate and authorize users by issuing respective OPEN and ACCESS calls to the metadata server before performing I/O on their behalf, similar to NFSv4 data delegations. This is required because the client may be acting for multiple local users.
section: "4.3"
topics:
    - security
