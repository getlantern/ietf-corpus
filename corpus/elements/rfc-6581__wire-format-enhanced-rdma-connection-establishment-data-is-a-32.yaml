document: rfc-6581
kind: wire-format
summary: Enhanced RDMA Connection Establishment Data is a 32-bit field placed at the start of Private Data, encoded in network byte order. Bits 0–1 carry control flags A and B (IRD high word), bits 2–15 carry a 14-bit IRD; bits 16–17 carry control flags C and D (ORD high word), bits 18–31 carry a 14-bit ORD.
