document: rfc-8534
kind: normative-requirement
summary: The LIR-pF-based per-flow tracking procedure (Procedure 2 of Section 4) SHOULD NOT be used unless it is known that all egress nodes support the LIR-pF flag, because unsupporting egress nodes may experience blackholed flows.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - mpls
    - routing
