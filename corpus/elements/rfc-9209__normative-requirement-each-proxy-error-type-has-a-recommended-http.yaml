document: rfc-9209
kind: normative-requirement
summary: Each proxy error type has a recommended HTTP status code; when generating a response containing the error, its status code SHOULD be set to that recommended value. Another status code may be used for backwards compatibility or when a status code has already been sent.
section: 2.1.1
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
