document: rfc-5985
kind: security-consideration
summary: A rogue LIS could return inaccurate location information. The client must authenticate the LIS using TLS with a server certificate containing a subjectAltName matching the discovered LIS URI. Any HELD binding MUST support TLS for this authentication.
section: "9.1"
topics:
    - security
    - tls
