document: rfc-9112
kind: normative-requirement
summary: A recipient MUST be able to parse and decode the chunked transfer coding. A sender MUST NOT apply chunked more than once; if any non-chunked transfer coding is applied to a request, chunked MUST be the final coding to ensure proper framing.
section: "6.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
