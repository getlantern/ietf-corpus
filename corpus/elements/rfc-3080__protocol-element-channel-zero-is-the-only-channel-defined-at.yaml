document: rfc-3080
kind: protocol-element
summary: Channel zero is the only channel defined at session start and is reserved for channel management. Channel management allows peers to advertise supported profiles (via greeting), create channels (via start), and close channels or release sessions (via close). A BEEP peer SHOULD support at least 257 concurrent channels.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
