document: rfc-9142
kind: design-rationale
summary: curve25519 is efficient across a wide range of architectures and allows higher-performance implementations compared to NIST prime curves, which use patented parameters purchased by NIST. This efficiency advantage motivates its SHOULD status over the NIST curves' SHOULD recommendation.
