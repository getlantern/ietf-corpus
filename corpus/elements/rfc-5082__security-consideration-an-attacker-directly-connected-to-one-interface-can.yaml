document: rfc-5082
kind: security-consideration
summary: An attacker directly connected to one interface can disturb a GTSM-protected session on the same or another interface by spoofing a GTSM peer's address unless ingress filtering (RFC 3704) has been applied on the connecting interface.
section: "5.3"
topics:
