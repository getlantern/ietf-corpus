document: rfc-7011
kind: security-consideration
summary: IPFIX Collecting Processes are susceptible to denial-of-service attacks via high-rate IPFIX message floods or via malformed IPFIX Messages. Implementations SHOULD implement rate limiting and MUST handle malformed messages gracefully without crashing or excessive resource consumption.
section: "11.4"
rfc2119_level: SHOULD
topics:
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
