document: rfc-2364
kind: normative-requirement
summary: Once PPP has entered Network-layer Protocol phase, if a frame arrives using an alternate but equivalent encapsulation (encapsulation transition), then for an SVC the PPP Link MUST immediately clear the call with cause value 111 ('protocol error, unspecified').
