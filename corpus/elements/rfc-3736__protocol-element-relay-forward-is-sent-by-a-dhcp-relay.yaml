document: rfc-3736
kind: protocol-element
summary: Relay-forward is sent by a DHCP relay agent to carry the client message to a server (RFC 3315 section 15.13). Relay-reply is sent by a DHCP server to carry a response message back to the relay agent (RFC 3315 section 15.14).
