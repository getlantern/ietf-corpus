document: rfc-5602
kind: security-consideration
summary: Read-only objects in the PW MPLS MIB tables (pwMplsTable, pwMplsOutboundTable, pwMplsNonTeMappingTable, pwMplsTeMappingTable) may be sensitive as they reveal PW-over-MPLS association information. Administrators should control GET/NOTIFY access and consider encrypting values sent over the network.
section: "9"
topics:
