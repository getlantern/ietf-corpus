document: rfc-8497
kind: normative-requirement
summary: If a dialog is to be 'log me' marked, marking MUST start with the SIP request that initiates that dialog (dialog-creating request). It is an error if 'log me' marking begins in a mid-dialog request or response.
section: "3.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
