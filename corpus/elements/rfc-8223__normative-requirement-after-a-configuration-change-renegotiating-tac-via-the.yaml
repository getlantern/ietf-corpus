document: rfc-8223
kind: normative-requirement
summary: After a configuration change renegotiating TAC via the Capability message, if there is no common TAE between the new and peer TAE lists, the LSR MUST send a 'Session Rejected/Targeted Application Capability Mismatch' Notification and close the session.
section: 2.3.2
rfc2119_level: MUST
topics:
    - mpls
