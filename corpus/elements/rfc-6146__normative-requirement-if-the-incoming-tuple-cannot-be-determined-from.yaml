document: rfc-6146
kind: normative-requirement
summary: If the incoming tuple cannot be determined from an ICMP error message (insufficient embedded packet data), the packet MUST be silently discarded. ICMP error messages that themselves contain ICMP error messages are also silently discarded.
section: "3.4"
rfc2119_level: MUST
topics:
    - nat
    - ip
