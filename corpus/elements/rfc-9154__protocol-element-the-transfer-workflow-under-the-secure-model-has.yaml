document: rfc-9154
kind: protocol-element
summary: 'The transfer workflow under the secure model has seven steps: (1) create with empty authinfo, (2) registrant requests authinfo from losing registrar, (3) losing registrar generates and sets a secure random value, (4) registrant provides value to gaining registrar, (5) gaining registrar optionally verifies via <info>, (6) gaining registrar submits <transfer> request, (7) registry auto-unsets authinfo upon successful transfer.'
section: "5"
topics:
