document: rfc-8362
kind: wire-format
summary: 'The Router-Link TLV (type 1) encodes a single OSPFv3 router link with fields: 1-octet Type, 1 reserved octet, 2-octet Metric, 4-octet Interface ID, 4-octet Neighbor Interface ID, 4-octet Neighbor Router ID, followed by optional sub-TLVs. It is applicable only within E-Router-LSAs.'
