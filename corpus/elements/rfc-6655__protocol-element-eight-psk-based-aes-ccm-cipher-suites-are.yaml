kind: protocol-element
summary: 'Eight PSK-based AES-CCM cipher suites are defined: TLS_PSK_WITH_AES_128_CCM (0xC0,0xA4), TLS_PSK_WITH_AES_256_CCM (0xC0,0xA5), TLS_DHE_PSK_WITH_AES_128_CCM (0xC0,0xA6), TLS_DHE_PSK_WITH_AES_256_CCM (0xC0,0xA7), and _8 tag variants (0xC0,0xA8–0xC0,0xAB). PSK and DHE_PSK key exchange follows RFC 4279/5487.'
