document: rfc-6469
kind: security-consideration
summary: A receiver may be overloaded by receipt of too many packets in multicast environments. Network-layer authentication may be used to discard unwanted sources; IGMPv3, MLDv2, LW-IGMPv3/LW-MLDv2, and multicast routing protocols can be used to select allowed sources.
section: "4"
topics:
