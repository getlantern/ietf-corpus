document: rfc-8202
kind: design-rationale
summary: 'ITID #0 is reserved to enable RFC 5120 Multi-Topology (MT) operation within a non-zero instance as an alternative to MI-topology. When ITID #0 is the sole ITID of a non-zero instance, standard M-ISIS MT behavior applies; this allows controlling L1 information leaking and supporting incongruent topologies for different address families.'
section: "5"
topics:
    - routing
