document: rfc-4280
kind: normative-requirement
summary: If the domain name list in DHCPv4 exceeds the maximum permissible length within a single option (254 octets), the domain list MUST be represented as specified in RFC 3396 (long option encoding).
section: "4.1"
rfc2119_level: MUST
