document: rfc-1889
kind: protocol-element
summary: Interarrival jitter is estimated continuously using J = J + (|D(i-1,i)| − J) / 16, where D(i,j) = (Rj−Ri) − (Sj−Si) is the difference in relative transit time between packet pairs received in arrival order. The result is carried as a 32-bit unsigned integer in timestamp units in each reception report block.
section: 6.3.1
topics:
