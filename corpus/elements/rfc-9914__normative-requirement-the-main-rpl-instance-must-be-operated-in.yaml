document: rfc-9914
kind: normative-requirement
summary: The main RPL Instance MUST be operated in RPL Non-Storing Mode of Operation (MOP) to sustain Root-initiated route projection, since Non-Storing Mode gives the Root a complete image of the DODAG topology needed for PCE-based path computation.
section: "1"
rfc2119_level: MUST
topics:
    - routing
