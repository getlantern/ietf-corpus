document: rfc-8536
kind: design-rationale
summary: Transition times SHOULD be at least -2**59 because timestamps earlier than that, while valid, have triggered bugs in deployed TZif readers. -2**59 is described as 'the greatest negated power of 2 that predates the Big Bang.'
section: "3.2"
topics:
    - measurement
