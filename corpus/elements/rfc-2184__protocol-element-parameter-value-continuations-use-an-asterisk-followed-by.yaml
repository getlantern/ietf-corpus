document: rfc-2184
kind: protocol-element
summary: Parameter value continuations use an asterisk followed by a decimal count (starting at 0) appended to the parameter name to split a single logical value across multiple parameters. The original value is recovered by concatenating sections in order. Neither leading zeroes nor gaps in the sequence are allowed.
