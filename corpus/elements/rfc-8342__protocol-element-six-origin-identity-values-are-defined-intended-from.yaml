document: rfc-8342
kind: protocol-element
summary: 'Six origin identity values are defined: ''intended'' (from <intended>), ''dynamic'' (from a dynamic configuration datastore), ''system'' (provided by the device itself), ''learned'' (from protocol interactions such as routing protocols or DHCP), ''default'' (from YANG default values), and ''unknown'' (origin cannot be identified).'
