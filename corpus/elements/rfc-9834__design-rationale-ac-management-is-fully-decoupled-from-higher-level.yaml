document: rfc-9834
kind: design-rationale
summary: AC management is fully decoupled from higher-level service provisioning (e.g., VPN, network slice). This allows AC technology upgrades (new encryption schemes, routing protocols) to be made in one place rather than in each service model that uses ACs.
