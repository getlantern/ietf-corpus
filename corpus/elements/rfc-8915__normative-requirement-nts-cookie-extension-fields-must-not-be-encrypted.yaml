document: rfc-8915
kind: normative-requirement
summary: NTS Cookie extension fields MUST NOT be encrypted when sent from client to server (enabling the server to recover keys from the cookie), but MUST be encrypted when sent from server to client (required for unlinkability).
section: "5.7"
rfc2119_level: MUST
topics:
    - ntp
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
