document: rfc-5676
kind: design-rationale
summary: SyslogTimeStamp uses microsecond subsecond granularity (3-octet field) rather than the decisecond granularity of SNMPv2-TC DateAndTime, to faithfully represent the precision available in RFC 5424 SYSLOG timestamps.
