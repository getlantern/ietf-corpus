document: rfc-4934
kind: security-consideration
summary: There is a risk of login credential compromise if a client does not properly verify the server's certificate before establishing an EPP session. Clients must check both the TLS certificate identity and the EPP greeting for consistency with expected server identification before sending credentials.
section: "8"
topics:
