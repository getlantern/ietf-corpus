document: rfc-9805
kind: design-rationale
summary: Deprecation was chosen over outright removal because current usage of the Router Alert option beyond the local network appears limited and packets containing Hop-by-Hop options are frequently dropped in practice; deprecation allows existing implementations to continue while phasing out new use over time.
