document: rfc-1201
kind: design-rationale
summary: ARP-based address resolution is preferred over static IP-to-ARCNET address mapping (e.g., using the low 8 bits of the IP address). Although hard-wired mapping is initially appealing, ARP provides much greater flexibility at negligible cost.
section: "4.1"
topics:
