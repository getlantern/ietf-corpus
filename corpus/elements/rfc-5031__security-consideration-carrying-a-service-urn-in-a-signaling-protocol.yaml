document: rfc-5031
kind: security-consideration
summary: Carrying a service URN in a signaling protocol can expose to attackers the kind of service desired by the caller, making it easier to automatically identify all calls for emergency services or directory assistance. Protocol-specific security mechanisms must be implemented for protocols carrying service URNs.
section: "6"
topics:
    - security
    - sip
    - realtime
