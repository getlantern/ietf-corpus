document: rfc-2671
kind: design-rationale
summary: 'DNS wire protocol has exhausted or is near exhausting several fixed fields: the 4-bit RCODE space, the two reserved label type bits, and the 512-octet UDP message size limit. EDNS0 provides backward-compatible extension mechanisms to allow the protocol to grow without breaking existing clients.'
section: "1"
topics:
