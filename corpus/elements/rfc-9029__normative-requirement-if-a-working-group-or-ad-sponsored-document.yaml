document: rfc-9029
kind: normative-requirement
summary: If a working group or AD-Sponsored document fails to progress to RFC publication, the WG chairs or AD SHOULD contact IANA to mark the allocated code points as deprecated. Deprecated code points are not available for new allocation but may be fully deallocated by WG chairs if a shortage of unallocated code points exists.
