document: rfc-7852
kind: normative-requirement
summary: Every data block MUST include a <DataProviderReference> element, and all blocks added by a single entity at the same time MUST carry the same value. Any entity that provides any other block MUST also supply a Data Provider (ProviderInfo) block.
section: "4"
rfc2119_level: MUST
topics:
