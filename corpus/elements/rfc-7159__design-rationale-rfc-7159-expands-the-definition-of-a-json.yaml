document: rfc-7159
kind: design-rationale
summary: RFC 7159 expands the definition of a JSON text to allow any JSON value (not just objects or arrays, as RFC 4627 required). This aligns with real-world usage and other JSON specifications while maintaining backward compatibility since all compliant generators producing objects or arrays remain interoperable.
section: "1.3"
topics:
    - json
