document: rfc-2574
kind: protocol-element
summary: The KeyChange textual convention allows remote key updates without privacy protection. A new key value is encoded as a random component concatenated with a delta component computed by XORing hash output (seeded from oldKey || random) with successive blocks of the new key. The retrieved value is always zero-length.
section: "5"
topics:
