document: rfc-8044
kind: normative-requirement
summary: 'For ''long-extended'' fragmented attributes: the More field MUST be clear if Length < 255; when More is set, Length MUST be 255, a next attribute MUST follow with the same Type and Extended-Type, and the last attribute in a packet MUST NOT have More set.'
section: "3.16"
rfc2119_level: MUST
topics:
    - radius
