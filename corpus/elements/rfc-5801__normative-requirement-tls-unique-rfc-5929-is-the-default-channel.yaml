document: rfc-5801
kind: normative-requirement
summary: '''tls-unique'' (RFC 5929) is the default channel binding type for application protocols that do not specify their own. Servers MUST implement ''tls-unique'' if they implement any channel binding; clients SHOULD implement it. Both SHOULD choose the highest-layer/innermost end-to-end TLS channel.'
section: "5.2"
rfc2119_level: MUST
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
