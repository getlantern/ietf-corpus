document: rfc-7672
kind: normative-requirement
summary: To match a server via certificate usage DANE-TA(2), the client MUST perform name checks and MUST employ the TLSA base domain as the primary reference identifier. When the TLSA base domain was obtained via a secure MX lookup, the original next-hop domain MUST be included as a second reference identifier.
section: 3.2.2
rfc2119_level: MUST
topics:
    - tls
    - email
    - pkix
    - security
