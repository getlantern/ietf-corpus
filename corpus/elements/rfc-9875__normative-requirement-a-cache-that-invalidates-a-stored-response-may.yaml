document: rfc-9875
kind: normative-requirement
summary: A cache that invalidates a stored response MAY invalidate any stored responses that share groups with that response. Grouped invalidations do not cascade — further grouped invalidations are not triggered by a grouped invalidation.
section: 2.2.1
rfc2119_level: MAY
topics:
    - http
