document: rfc-4706
kind: wire-format
summary: Adsl2Tssi encodes transmit spectrum shaping as an OCTET STRING (SIZE 0..96) of up to 32 breakpoints; each breakpoint is 3 octets (2-octet sub-carrier index + 1-octet shaping value 0–127 in units of -0.5 dB; value 127 means the sub-carrier is not transmitted).
section: "3"
extracted_by: claude-sonnet-4-6
