document: rfc-8656
kind: security-consideration
summary: Servers SHOULD reject Allocate requests that would relay traffic to IANA-reserved or locally significant IP addresses—including RFC 1918 private ranges, loopback, and link-local—to prevent TURN from being used as a proxy to attack internal networks behind the TURN server.
section: 21.2.2
topics:
    - security
    - nat
    - ip
