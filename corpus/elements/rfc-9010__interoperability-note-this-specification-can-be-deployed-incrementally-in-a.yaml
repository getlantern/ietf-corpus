document: rfc-9010
kind: interoperability-note
summary: 'This specification can be deployed incrementally in a network implementing RFC 9008: only the root and the 6LRs connecting RULs need upgrading. Legacy intermediate RPL routers only see plain IPv6 traffic between the root and the 6LR.'
