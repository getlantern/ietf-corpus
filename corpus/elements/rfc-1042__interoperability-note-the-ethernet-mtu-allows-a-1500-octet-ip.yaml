document: rfc-1042
kind: interoperability-note
summary: The Ethernet MTU allows a 1500-octet IP datagram, while the 802.3 MTU allows only 1492 octets due to the 8-octet LLC+SNAP overhead. These values are not equal and interoperating implementations must account for this difference.
section: Interoperation with Ethernet
topics:
    - ip
