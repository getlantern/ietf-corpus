document: rfc-3909
kind: protocol-element
summary: The Cancel operation is an LDAP Extended Operation identified by OID 1.3.6.1.1.8. It allows a client to cancel an outstanding operation within the same session and, unlike the LDAP Abandon operation, provides a response indicating the outcome.
