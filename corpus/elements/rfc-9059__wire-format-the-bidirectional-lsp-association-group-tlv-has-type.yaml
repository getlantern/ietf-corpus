document: rfc-9059
kind: wire-format
summary: The Bidirectional LSP Association Group TLV has Type=54, Length=4 bytes, and a 32-bit Flags field. Bit 31 (R) indicates a reverse LSP; bit 30 (C) indicates a co-routed bidirectional LSP. Bits 0–29 are unassigned and MUST be set to 0 on send and ignored on receipt.
section: "4.2"
topics:
    - mpls
    - routing
