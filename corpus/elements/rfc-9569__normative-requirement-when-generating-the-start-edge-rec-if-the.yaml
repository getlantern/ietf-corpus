document: rfc-9569
kind: normative-requirement
summary: 'When generating the start-edge-rec: if the client provides no version tag, the server MUST recommend the edge of the latest available snapshot (from 0). If the client provides a tag, the server MUST recommend either the first incremental update from the tagged version or the latest snapshot edge, chosen by implementation (e.g., comparing cumulative sizes).'
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
