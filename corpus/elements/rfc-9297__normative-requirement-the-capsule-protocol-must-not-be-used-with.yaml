document: rfc-9297
kind: normative-requirement
summary: The Capsule Protocol MUST NOT be used with messages that contain Content-Length, Content-Type, or Transfer-Encoding header fields. HTTP status codes 204, 205, and 206 MUST NOT be sent on responses using the Capsule Protocol.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - http
