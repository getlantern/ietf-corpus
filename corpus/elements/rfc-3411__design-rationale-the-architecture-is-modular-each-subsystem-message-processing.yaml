document: rfc-3411
kind: design-rationale
summary: 'The architecture is modular: each subsystem (Message Processing, Security, Access Control) is specified in self-contained documents that can evolve and advance the standards track independently. This allows Security Models, authentication/privacy mechanisms, and message formats to be upgraded without directly impacting other portions of the framework.'
