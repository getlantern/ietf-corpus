document: rfc-8833
kind: interoperability-note
summary: The 'webrtc' and 'c-webrtc' ALPN labels cover the same underlying protocol (DTLS for SRTP keys and/or SCTP data channels); either SRTP or data channels may be absent in a given session. ICE (RFC 8445) is required for UDP flow establishment but is not covered by the ALPN identifier.
