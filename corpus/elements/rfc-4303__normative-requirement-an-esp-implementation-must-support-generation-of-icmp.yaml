document: rfc-4303
kind: normative-requirement
summary: An ESP implementation MUST support generation of ICMP PMTU messages (or equivalent internal signaling) to minimize fragmentation. An implementation MAY choose not to support fragmentation and may set the DF bit.
section: 3.3.4
rfc2119_level: MUST
topics:
