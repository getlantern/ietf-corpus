document: rfc-8482
kind: security-consideration
summary: 'QTYPE=ANY queries are a well-known vector for DNS reflection/amplification attacks: a small spoofed UDP query can elicit a large response. Implementing minimal ANY responses reduces the amplification factor and makes authoritative servers less attractive as attack amplifiers.'
section: "9"
topics:
