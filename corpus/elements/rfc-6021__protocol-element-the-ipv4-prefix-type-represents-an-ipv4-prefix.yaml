document: rfc-6021
kind: protocol-element
summary: The ipv4-prefix type represents an IPv4 prefix as address/length (length ≤ 32) with canonical format zeroing non-prefix bits. The ipv6-prefix type is analogous (length ≤ 128), applying RFC 4291 compressed canonical form with non-prefix bits set to zero.
