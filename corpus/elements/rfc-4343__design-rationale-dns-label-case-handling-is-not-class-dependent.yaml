document: rfc-4343
kind: design-rationale
summary: DNS label case handling is not CLASS dependent. The original DNS design intended recursive resolvers to handle unknown CLASSes, requiring uniform case insensitivity. A CLASS with case-sensitive ASCII labels would require a new label type rather than a CLASS-specific exception.
section: "3.3"
topics:
    - dns
