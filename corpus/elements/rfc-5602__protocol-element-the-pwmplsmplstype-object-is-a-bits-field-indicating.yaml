document: rfc-5602
kind: protocol-element
summary: 'The pwMplsMplsType object is a BITS field indicating the outer tunnel type: mplsTe(0) for MPLS-TE tunnels, mplsNonTe(1) for LDP or manually configured tunnels, and pwOnly(2) for no outer tunnel. A combination of mplsTe(0) and mplsNonTe(1) MAY exist, but pwOnly(2) cannot be combined with the others.'
