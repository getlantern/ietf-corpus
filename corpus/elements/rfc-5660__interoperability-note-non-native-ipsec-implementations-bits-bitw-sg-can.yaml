document: rfc-5660
kind: interoperability-note
summary: Non-native IPsec implementations (BITS, BITW, SG) can implement connection latching by inferring ULP connection state from packet inspection, but they cannot provide APIs and thus are not suitable for channel binding applications. When a latch is broken, a BITS/SG implementation may need to send fake TCP RST packets.
section: "2.5"
topics:
    - ipsec
    - security
