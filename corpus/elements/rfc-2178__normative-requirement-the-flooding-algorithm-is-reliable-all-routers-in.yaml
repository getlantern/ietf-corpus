document: rfc-2178
kind: normative-requirement
summary: 'The flooding algorithm is reliable: all routers in an area must maintain exactly the same link-state database. LSAs are acknowledged on each adjacency and retransmitted until acknowledged; the MinLSArrival constant (1 second) prevents oscillation by rate-limiting re-acceptance of the same LSA.'
section: "13"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
