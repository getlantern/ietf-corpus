document: rfc-8606
kind: interoperability-note
summary: The interworking from the PSTN needs only to include the location received by the interworking gateway; the full ISUP location chain need not be reconstructed. RFC 3398 describes detailed security considerations for ISUP-SIP interworking that remain applicable.
