document: rfc-9350
kind: normative-requirement
summary: All routers configured to participate in a particular Flex-Algorithm that are within the same FAD advertisement scope MUST agree on the definition of the Flex-Algorithm to guarantee loop-free forwarding for paths computed for that algorithm.
