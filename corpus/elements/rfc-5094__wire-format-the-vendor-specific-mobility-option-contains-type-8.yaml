summary: 'The Vendor-Specific Mobility Option contains: Type (8-bit), Length (8-bit, excluding Type and Length fields), Vendor ID (32-bit SMI Network Management Private Enterprise Code), Sub-Type (8-bit, vendor-administered), and variable-length Data. The option has an alignment requirement of 4n+2.'
