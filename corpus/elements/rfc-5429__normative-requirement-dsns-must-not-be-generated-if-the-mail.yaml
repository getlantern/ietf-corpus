document: rfc-5429
kind: normative-requirement
summary: DSNs MUST NOT be generated if the MAIL FROM (or Return-Path) is empty, per [DSN]. The DSN action-value field MUST contain 'failed', and the human-readable portion MUST contain the 'reason' string from the 'ereject' action.
section: 2.1.2
rfc2119_level: MUST NOT
topics:
    - email
