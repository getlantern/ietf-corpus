document: rfc-8582
kind: normative-requirement
summary: When OC-Maximum-Rate is 0 with a non-zero OC-Validity-Duration, the reacting node should apply abatement treatment to 100% of Diameter requests destined to the overloaded reporting node. When OC-Validity-Duration is 0, the reacting node should stop applying abatement treatment.
section: 8.3.1
rfc2119_level: SHOULD
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
