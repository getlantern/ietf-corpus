document: rfc-5435
kind: normative-requirement
summary: Implementations SHOULD impose restrictions on :from tag values to minimize forgery of the author value (e.g., restricting to known addresses or a particular domain). Values not satisfying restrictions SHOULD be silently ignored rather than failing the action.
section: "3.3"
rfc2119_level: SHOULD
topics:
