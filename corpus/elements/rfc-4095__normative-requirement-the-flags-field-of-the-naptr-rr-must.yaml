document: rfc-4095
kind: normative-requirement
summary: The FLAGS field of the NAPTR RR MUST contain the character 'U', the SERVICES field MUST contain only the string 'no-solicit', the REGEXP field MUST contain a valid URI, and the REPLACEMENT field MUST be empty.
