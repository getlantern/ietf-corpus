document: rfc-4204
kind: normative-requirement
summary: The remote node MUST send either a TestStatusSuccess or TestStatusFailure message for each data link tested. A TestStatusAck MUST be sent to confirm receipt of those messages. Unacknowledged TestStatus messages SHOULD be retransmitted until acknowledged or retry limit is reached.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
