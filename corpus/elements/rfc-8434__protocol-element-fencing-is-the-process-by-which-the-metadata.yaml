document: rfc-8434
kind: protocol-element
summary: Fencing is the process by which the metadata server prevents storage devices from processing I/O from a specific client to a specific file. Recalling a layout is a graceful callback allowing the client to flush WRITEs before returning; revoking a layout is an immediate invalidation after which neither the metadata server nor storage devices will accept references to that layout.
section: "2"
topics:
