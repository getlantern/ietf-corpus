document: rfc-6478
kind: wire-format
summary: The PW OAM message carries a standard 32-bit ACH header (first nibble 0001b, version and reserved both zero), followed by a 16-bit Refresh Timer (unsigned integer, seconds, 0 = infinity), an 8-bit TLV Length, and an 8-bit Flags field containing the A (acknowledgment) flag bit. The channel type field is set to 0x0027.
section: "5.1"
