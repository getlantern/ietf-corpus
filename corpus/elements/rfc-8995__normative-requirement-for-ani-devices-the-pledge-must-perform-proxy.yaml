document: rfc-8995
kind: normative-requirement
summary: For ANI devices, the pledge MUST perform proxy discovery by listening for DULL GRASP M_FLOOD AN_Proxy announcements (RFC 8990). ANI proxies MUST support GRASP discovery of registrars. The ACP-secured instance of GRASP MUST be used for ANI registrar discovery.
section: "4.1"
rfc2119_level: MUST
topics:
    - zeroconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
