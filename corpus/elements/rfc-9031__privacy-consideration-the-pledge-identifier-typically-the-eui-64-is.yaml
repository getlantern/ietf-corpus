document: rfc-9031
kind: privacy-consideration
summary: The pledge identifier, typically the EUI-64, is transmitted in cleartext in the OSCORE 'kid context' field and is visible to the JP. A random byte string MAY be used instead of the EUI-64 as the pledge identifier for privacy, provided it satisfies the uniqueness requirement. The blacklist parameter also carries pledge identifiers in cleartext.
section: "10"
topics:
    - privacy
    - security
