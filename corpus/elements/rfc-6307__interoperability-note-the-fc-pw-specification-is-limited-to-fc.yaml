document: rfc-6307
kind: interoperability-note
summary: The FC PW specification is limited to FC attachment links using 8b/10b transmission coding. Links using 64b/66b coding (10GFC, 16GFC) are not supported. FC service classes 1, 4, and 6 are not supported; only classes 2, 3, and F may be used.
