document: rfc-7056
kind: design-rationale
summary: In the federated context, an IdP is trusted to make certain statements (e.g., student vs. professor) but not others (e.g., local group membership). Because context determines trust, attributes with different trust contexts need different names. This specification defines distinct attribute names for the federated context to allow applications to distinguish context.
section: "4"
topics:
    - security
