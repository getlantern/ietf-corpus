document: rfc-8680
kind: protocol-element
summary: 'Sender operation with sliding window FEC codes follows a 10-step procedure: the application provides ADUs; the FEC Framework passes them to the FEC scheme; the encoding window is updated; Source FEC Payload ID is determined; FEC Source Packets are constructed and sent; when needed, repair packets are generated from the current encoding window and sent on their configured port(s) and multicast group(s).'
section: "4.2"
topics:
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
