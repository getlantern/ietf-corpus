document: rfc-9679
kind: design-rationale
summary: SHA-256 is the mandated baseline hash, but the preferred function may evolve; in single-party use cases (e.g., generating a 'kid') the hash choice is opaque to consumers, but multi-party thumbprint comparison requires explicit agreement on the algorithm.
