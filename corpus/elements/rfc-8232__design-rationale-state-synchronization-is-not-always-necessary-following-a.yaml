document: rfc-8232
kind: design-rationale
summary: State Synchronization is not always necessary following a PCEP session restart. If the state of both PCEP peers did not change, the synchronization phase may be skipped, resulting in significant savings in both control-plane data exchanges and the time it takes for the stateful PCE to become fully operational.
section: "3.1"
topics:
    - routing
    - mpls
