document: rfc-7235
kind: protocol-element
summary: HTTP authentication uses a challenge-response framework with a case-insensitive auth-scheme token followed by either a comma-separated list of auth-param name=value pairs or a single token68 value. Authentication parameters are name=value pairs where parameter names are matched case-insensitively and each name MUST only occur once per challenge.
section: "2.1"
topics:
    - http
    - security
