document: rfc-1473
kind: security-consideration
summary: Making security-risk variables READ-ONLY is not recommended because authentication protocol variables could still be easily read by unauthorized parties. Using SNMPv2 MIB views with authentication and privacy protocols is the preferred mitigation.
section: "6"
topics:
