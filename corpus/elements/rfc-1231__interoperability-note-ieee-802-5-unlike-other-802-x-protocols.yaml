document: rfc-1231
kind: interoperability-note
summary: IEEE 802.5 (unlike other 802.x protocols) requires MAC addresses to be transmitted most significant bit first, but the MacAddress textual convention uses canonical (least significant bit first) order as defined by IEEE 802.1a. The convention has no effect on encoding; it is adopted for reader convenience only.
section: "4.2"
