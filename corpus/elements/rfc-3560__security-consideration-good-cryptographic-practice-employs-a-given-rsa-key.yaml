document: rfc-3560
kind: security-consideration
summary: Good cryptographic practice employs a given RSA key pair in only one scheme to avoid cross-scheme vulnerabilities. An RSA key pair used for RSAES-OAEP key transport should not be used for other purposes (e.g., digital signatures), and one RSA key pair should always be used with the same RSAES-OAEP parameters.
section: "6"
topics:
