document: rfc-7542
kind: interoperability-note
summary: The NAI username syntax is based on the RFC 5322 'local-part' as extended by RFC 6532 internationalized email headers, but it does not permit quoted text, folding whitespace, or non-folding whitespace common in email. The NAI is therefore not necessarily equivalent to email usernames, though email addresses are commonly used as NAI user identifiers in AAA systems.
section: "3.1"
topics:
    - radius
    - email
