document: rfc-5263
kind: normative-requirement
summary: A watcher that wants to allow the presence agent to send partial notifications MUST include an Accept header field in its SUBSCRIBE request containing 'application/pidf-diff+xml' in addition to 'application/pidf+xml'. The watcher MAY include a 'q' parameter to indicate relative preference.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
