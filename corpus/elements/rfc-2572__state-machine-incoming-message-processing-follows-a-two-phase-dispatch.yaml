document: rfc-2572
kind: state-machine
summary: 'Incoming message processing follows a two-phase dispatch: (1) the Dispatcher passes the message to the version-specific MP Model via prepareDataElements; (2) if sendPduHandle is <none> the PDU is dispatched as a request/notification via processPdu, otherwise it is dispatched as a response via processResponsePdu using the cached sendPduHandle.'
