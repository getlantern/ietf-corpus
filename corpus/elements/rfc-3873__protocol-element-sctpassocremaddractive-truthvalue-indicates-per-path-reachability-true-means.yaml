document: rfc-3873
kind: protocol-element
summary: 'sctpAssocRemAddrActive (TruthValue) indicates per-path reachability: true means the remote address is Active (failure threshold not reached); false means Inactive (no heartbeat or message received, threshold reached). sctpAssocRemAddrHBActive indicates whether heartbeat checking is enabled for that path.'
