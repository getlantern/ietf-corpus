document: rfc-9722
kind: normative-requirement
summary: A PE that receives an SCT value smaller than its current local time MUST discard the Service Carving Time and SHALL treat the DF Election at the peer as having already occurred, falling back to RFC 7432 behavior without any additional timer delay.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
