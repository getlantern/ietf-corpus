document: rfc-4916
kind: normative-requirement
summary: After sending a request with a revised From header field URI, the UA MUST send the same URI in the From header field of any future requests on the same dialog unless the identity changes again, and MUST be prepared to receive the revised URI in the To header field of subsequent mid-dialog requests.
section: 4.4.1
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
