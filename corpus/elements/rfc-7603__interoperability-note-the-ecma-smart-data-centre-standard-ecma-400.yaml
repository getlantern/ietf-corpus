document: rfc-7603
kind: interoperability-note
summary: The Ecma Smart Data Centre standard (ECMA-400) defines four power states (Off, Sleep, Idle, Active) and a protocol-agnostic semantic model across SNMP, BACnet, and HTTP. When used with EMAN, SDC provides a thin abstraction on top of EMAN's more detailed data model.
section: 4.1.4
topics:
    - snmp
    - http
