document: rfc-1582
kind: normative-requirement
summary: If a fragment with an updated (different) sequence number is received, ALL fragments with the earlier sequence number MUST be discarded. There is no concept of sequence number age; any difference denotes a new update.
section: "2.8"
rfc2119_level: MUST
topics:
    - routing
