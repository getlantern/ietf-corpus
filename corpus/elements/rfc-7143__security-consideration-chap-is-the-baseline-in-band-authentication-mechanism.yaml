document: rfc-7143
kind: security-consideration
summary: CHAP is the baseline in-band authentication mechanism. CHAP secrets MUST be at least 96 bits (12 bytes) to resist dictionary attacks, CHAP challenge values MUST be at least 64 bits, and mutual (bidirectional) CHAP is RECOMMENDED to prevent man-in-the-middle attacks. CHAP secrets MUST NOT be shared across different iSCSI targets.
section: 9.2.1
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
