document: rfc-7870
kind: security-consideration
summary: Readable objects in dsliteTunnelTable and dsliteNATBindTable can reveal private host identities and tunnel topology. Unauthorized access violates subscriber privacy and could enable targeted attacks against private hosts by intercepting or originating sessions.
