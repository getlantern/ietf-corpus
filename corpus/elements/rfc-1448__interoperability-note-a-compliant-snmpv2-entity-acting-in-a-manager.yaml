document: rfc-1448
kind: interoperability-note
summary: A compliant SNMPv2 entity acting in a manager role must be able to properly receive and handle a Response-PDU with error-status field equal to 'noSuchName', 'badValue', or 'readOnly', which are SNMPv1 error codes retained for proxy compatibility.
section: 4.2.4
topics:
