document: rfc-8260
kind: protocol-element
summary: 'Six stream schedulers are defined: SCTP_SS_FCFS (first-come first-served), SCTP_SS_RR (round-robin by message or chunk), SCTP_SS_RR_PKT (round-robin per packet), SCTP_SS_PRIO (strict priority per stream), SCTP_SS_FC (fair capacity), and SCTP_SS_WFQ (weighted fair queueing). An implementation MAY implement any subset.'
