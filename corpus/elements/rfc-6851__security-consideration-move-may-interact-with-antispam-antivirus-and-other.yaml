document: rfc-6851
kind: security-consideration
summary: MOVE may interact with antispam, antivirus, and other security scanning and auditing mechanisms in complex ways, since different mailboxes may have different security policies. Rescanning with updated rules may be required even when the underlying policy has not changed.
