document: rfc-7233
kind: protocol-element
summary: The 416 (Range Not Satisfiable) status code indicates that no requested range overlaps the current extent of the resource, or that the set of ranges has been rejected as invalid or excessive. For byte-range requests, the sender SHOULD include a Content-Range with the current representation length.
section: "4.4"
topics:
