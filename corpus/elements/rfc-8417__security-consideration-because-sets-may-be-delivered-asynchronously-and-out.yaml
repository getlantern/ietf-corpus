document: rfc-8417
kind: security-consideration
summary: Because SETs may be delivered asynchronously and out-of-band, a SET may arrive before or after the process it describes, causing timing conflicts (e.g., a revocation SET arriving while the user is re-authenticating). Profiling specifications SHOULD consider revocation of specific sessions rather than broad logout statements, or use timestamps to bound effect.
section: "5.4"
topics:
    - security
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
