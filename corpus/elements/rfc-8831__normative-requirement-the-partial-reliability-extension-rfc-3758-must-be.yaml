document: rfc-8831
kind: normative-requirement
summary: The partial reliability extension (RFC 3758) MUST be supported, and the limited retransmission policy (RFC 7496) MUST also be supported. Zero retransmissions combined with unordered delivery provides a UDP-like per-message service.
section: "6.1"
rfc2119_level: MUST
