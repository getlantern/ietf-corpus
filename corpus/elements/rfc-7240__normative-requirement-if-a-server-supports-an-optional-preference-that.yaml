document: rfc-7240
kind: normative-requirement
summary: If a server supports an optional preference that might result in a variance to a cache's handling of a response, a Vary header MUST be included listing the Prefer header field, regardless of whether the client actually used Prefer in the request.
section: "2"
rfc2119_level: MUST
topics:
    - http
