document: rfc-4572
kind: normative-requirement
summary: A certificate fingerprint MUST be computed using the same one-way hash function as is used in the certificate's signature algorithm. This ensures that the security properties required for the certificate also apply to the fingerprint.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - crypto
