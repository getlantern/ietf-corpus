document: rfc-2192
kind: normative-requirement
summary: IMAP's modified UTF-7 encoding for mailbox names MUST be converted to UTF-8 before embedding in an IMAP URL. Since 8-bit characters are not permitted in URLs, the UTF-8 characters are then percent-encoded.
section: "9"
rfc2119_level: MUST
topics:
    - email
