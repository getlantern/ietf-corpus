document: rfc-5329
kind: normative-requirement
summary: Link-local addresses MUST NOT be advertised in the Remote Interface IPv6 Address sub-TLV. Neighbor addresses from link-LSAs with prefix length 128 and LA-bit set MAY be advertised.
