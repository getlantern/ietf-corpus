document: rfc-5105
kind: protocol-element
summary: The optional <tokendata> element carries registrant contact information including organization, commercialregisternumber, title, firstname, lastname, address (with sub-fields streetName, houseNumber, postalCode, locality, countyStateOrProvince, ISOcountryCode), and up to 10 each of phone, fax, and email elements. ISOcountryCode uses ISO 3166-1:2006 alpha-2 codes.
