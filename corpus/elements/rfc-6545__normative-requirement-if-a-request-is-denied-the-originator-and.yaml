document: rfc-6545
kind: normative-requirement
summary: If a Request is denied, the originator and sending peer (if they are not the same) MUST both receive the Acknowledgement message, providing the sending peer the option to take action to stop or mitigate traffic as close to the source as possible.
section: "6.2"
rfc2119_level: MUST
topics:
    - security
