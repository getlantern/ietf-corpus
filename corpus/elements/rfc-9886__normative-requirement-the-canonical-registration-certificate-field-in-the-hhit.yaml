document: rfc-9886
kind: normative-requirement
summary: The Canonical Registration Certificate field in the HHIT RRType MUST be encoded as X.509 DER (RFC 5280). It MAY be self-signed when the entity acts as a root of trust (apex). This certificate forms part of a chain used to validate hierarchy membership.
section: 5.1.2
rfc2119_level: MUST
topics:
    - dns
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
