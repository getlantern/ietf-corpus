summary: 'CertPolicyFlags is a BIT STRING with three named bits: inhibitPolicyMapping (bit 0), requireExplicitPolicy (bit 1), and inhibitAnyPolicy (bit 2). When absent, the certification path validation algorithm receives {FALSE, FALSE, FALSE}, the most permissive setting.'
