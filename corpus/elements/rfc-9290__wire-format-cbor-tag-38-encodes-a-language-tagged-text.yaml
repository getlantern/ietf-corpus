document: rfc-9290
kind: wire-format
summary: 'CBOR tag 38 encodes a language-tagged text string as an array of length 2 or 3: element 0 is a BCP 47 language tag (UTF-8 text), element 1 is an arbitrary UTF-8 text string, and the optional element 2 is a ternary direction indicator (false=ltr, true=rtl, null=auto). Arrays not meeting these criteria are not valid CBOR tag 38 items.'
section: A.2
topics:
