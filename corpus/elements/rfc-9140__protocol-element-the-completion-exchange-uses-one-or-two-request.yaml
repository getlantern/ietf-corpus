document: rfc-9140
kind: protocol-element
summary: The Completion Exchange uses one or two request-response pairs (optional Type=5 to discover NoobId, then mandatory Type=6) to exchange NoobId (identifying the specific OOB message) and mutual HMACs MACs and MACp. Successful MAC verification by both sides results in EAP-Success and transition to Registered (4) state.
section: 3.2.4
