document: rfc-5560
kind: security-consideration
summary: If routers recognize and prioritize (or deprioritize) measurement traffic differently from normal traffic, measured results will not reflect actual user traffic conditions. Authentication techniques such as digital signatures MAY be used to guard against injected artificial traffic that could artificially lower measured loss or duplication rates.
section: "6"
topics:
    - measurement
    - security
