document: rfc-3442
kind: normative-requirement
summary: A DHCP client whose TCP/IP stack does not support a 0.0.0.0 router address for local subnet routes MUST ignore routes in the Classless Static Routes option whose router IP address is 0.0.0.0.
section: Local Subnet Routes
rfc2119_level: MUST
