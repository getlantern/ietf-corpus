document: rfc-8295
kind: protocol-element
summary: 'The PAL (Package Availability List) is an XML or JSON document available at /pal that advertises packages a client may retrieve, notifications to begin certificate management, and pointers to additional PALs. Each PAL entry has four fields: type (4-digit code), date (last successful download time), size (bytes), and info (URI, DN, SKI, or IssuerAndSerialNumber).'
section: "2.1"
