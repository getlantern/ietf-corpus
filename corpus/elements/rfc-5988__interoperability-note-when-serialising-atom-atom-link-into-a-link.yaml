document: rfc-5988
kind: interoperability-note
summary: When serialising Atom atom:link into a Link header, registered relation types serialised as absolute URIs (e.g., 'http://www.iana.org/assignments/relation/self') SHOULD be converted to their short registered form (e.g., 'self') to avoid being mistaken for extension relation types.
section: B
