document: rfc-2858
kind: normative-requirement
summary: A BGP speaker must never advertise an address of a peer to that peer as a next hop for a route the speaker is originating, and must never install a route with itself as the next hop.
section: "2"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
