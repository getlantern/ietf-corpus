document: rfc-9608
kind: normative-requirement
summary: If the noRevAvail extension is present, the Authority Information Access extension, if present, MUST NOT include an id-ad-ocsp accessMethod. If any of the prohibited extensions are present alongside noRevAvail, the relying party MUST consider the certificate invalid.
section: "3"
rfc2119_level: MUST NOT
topics:
