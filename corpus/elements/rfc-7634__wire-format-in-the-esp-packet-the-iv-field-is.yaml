document: rfc-7634
kind: wire-format
summary: In the ESP packet, the IV field is 64 bits (the low-order 64 bits of the 96-bit nonce). The Integrity Check Value (ICV) field contains the 16-octet Poly1305 tag. Padding need not exceed 4 octets for ChaCha20, though RFC 4303 requirements still apply.
