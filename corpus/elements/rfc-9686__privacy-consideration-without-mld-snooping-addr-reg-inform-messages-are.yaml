document: rfc-9686
kind: privacy-consideration
summary: Without MLD snooping, ADDR-REG-INFORM messages are effectively broadcast on the link, exposing the client's DUID and registered addresses to on-link observers. An attacker can correlate registrations to the same device even when randomized MAC addresses are used, because the DUID persists across address changes. RFC 7844 mitigation recommendations apply.
section: "7"
topics:
    - privacy
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
