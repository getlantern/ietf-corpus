document: rfc-3858
kind: design-rationale
summary: 'Authorization controls the set of watchers visible in a given watcherinfo document: a non-owner subscriber (e.g., user A watching user B) sees only their own watcher entry, while the resource owner (user B) sees all watchers, and an administrator may see watchers across all resources.'
section: "3"
topics:
