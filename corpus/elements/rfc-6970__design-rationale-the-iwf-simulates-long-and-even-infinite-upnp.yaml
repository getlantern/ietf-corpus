document: rfc-6970
kind: design-rationale
summary: The IWF simulates long and even infinite UPnP IGD mapping lifetimes using periodic PCP renewals because PCP and UPnP IGD have incompatible lifetime models (IGD:1 allows infinite; IGD:2 caps at 604800 seconds; PCP maximum is 4294967296 seconds).
section: "5.9"
