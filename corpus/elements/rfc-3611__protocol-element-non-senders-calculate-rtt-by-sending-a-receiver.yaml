document: rfc-3611
kind: protocol-element
summary: Non-senders calculate RTT by sending a Receiver Reference Time Report Block and receiving DLRR blocks in reply; RTT = A - LRR - DLRR, mirroring the SR/DLSR mechanism already defined in RTCP for data senders.
