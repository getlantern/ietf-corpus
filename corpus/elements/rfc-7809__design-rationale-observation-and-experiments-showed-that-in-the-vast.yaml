document: rfc-7809
kind: design-rationale
summary: Observation and experiments showed that in the vast majority of cases, CalDAV clients have typically ignored time zone definitions received from servers and instead use their own built-in definitions. This justifies servers unilaterally omitting VTIMEZONE components for standard IANA time zones when no CalDAV-Timezones header is present.
section: 3.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
