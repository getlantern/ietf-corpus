document: rfc-1587
kind: normative-requirement
summary: A type-7 default route (0.0.0.0) originated by an NSSA area border router must have the P-bit reset so it is not re-translated and propagated outside the NSSA by another border router. A default route must not be injected into the NSSA as a type-3 summary LSA.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
