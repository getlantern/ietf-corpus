document: rfc-5420
kind: protocol-element
summary: Inheritance rules apply when a Forwarding Adjacency LSP (FA-LSP) is established at an LSP region boundary. The boundary LSR MAY, upon local policy, copy a subset of Attributes TLVs into the FA-LSP's Path message when the FA-LSP belongs to the same switching capability class as the triggering LSP. By default, no TLVs are inheritable.
section: "6"
topics:
    - mpls
    - routing
