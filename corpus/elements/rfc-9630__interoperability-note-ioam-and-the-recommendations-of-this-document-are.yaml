document: rfc-9630
kind: interoperability-note
summary: IOAM and the recommendations of this document are equally applicable to multicast MPLS forwarded packets in MVPN environments using mLDP, P2MP RSVP-TE, Ingress Replication, or PIM MDT SAFI with GRE. The telemetry instruction header and data should be encapsulated into MPLS packets on P2MP and MP2MP paths.
