document: rfc-3620
kind: design-rationale
summary: The 'profile' attribute routes to a particular service (identified by BEEP profile URI) while the 'endpoint' attribute routes to a particular named machine; these provide hop-by-hop routing via local provisioning rather than source routing, allowing proxies to resolve logical names to concrete addresses without exposing topology to the initiator.
section: "2.6"
topics:
    - realtime
