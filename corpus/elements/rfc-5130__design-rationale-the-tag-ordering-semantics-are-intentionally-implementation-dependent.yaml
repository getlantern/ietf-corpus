document: rfc-5130
kind: design-rationale
summary: The tag ordering semantics are intentionally implementation-dependent with no implied operational meaning, but ordering preservation is required when propagating between levels so that single-tag implementations have a consistent view — this allows multi-tag and single-tag implementations to coexist.
