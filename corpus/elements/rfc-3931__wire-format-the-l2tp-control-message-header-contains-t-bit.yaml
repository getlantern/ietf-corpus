document: rfc-3931
kind: wire-format
summary: 'The L2TP control message header contains: T bit (1), L bit (1), S bit (1), reserved x bits, 4-bit Ver field, 16-bit Length, 32-bit Control Connection ID, 16-bit Ns (send sequence number), and 16-bit Nr (receive sequence number). The T, L, and S bits MUST all be set to 1; Ver MUST be set to 3.'
section: 3.2.1
topics:
    - vpn
