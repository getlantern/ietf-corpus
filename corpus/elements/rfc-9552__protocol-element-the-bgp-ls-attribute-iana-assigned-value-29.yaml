document: rfc-9552
kind: protocol-element
summary: The BGP-LS Attribute (IANA-assigned value 29) is an optional, non-transitive BGP path attribute carrying node, link, and prefix parameters as TLV triplets. It SHOULD only be included with Link-State NLRIs; its use with other address families is out of scope.
section: "5.3"
topics:
