document: rfc-8939
kind: protocol-element
summary: DetNet IP flow identification for IPsec AH (RFC 4302) and ESP (RFC 4303) uses the Security Parameters Index (SPI) field, which has a common format in both protocols. ICMP flow identification uses only the protocol number in the IP header; ICMP type is not included.
section: 5.1.2.2
topics:
    - ip
    - ipsec
    - security
