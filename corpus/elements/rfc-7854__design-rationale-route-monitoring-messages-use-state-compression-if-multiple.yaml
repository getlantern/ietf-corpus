document: rfc-7854
kind: design-rationale
summary: 'Route Monitoring messages use ''state compression'': if multiple route changes occur before a message is transmitted, the router may send only the final state of a prefix. This means RM messages are not verbatim replicas of received BGP PDUs; Route Mirroring was added separately for implementations requiring full-fidelity message replay.'
section: "5"
topics:
