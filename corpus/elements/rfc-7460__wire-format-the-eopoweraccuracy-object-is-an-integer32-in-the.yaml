kind: wire-format
summary: The eoPowerAccuracy object is an Integer32 in the range 0–10000, expressed in hundredths of a percent, representing the assumed accuracy of the eoPower measurement (e.g., 1010 means ±10.1%). A value of zero means accuracy is unknown or not applicable. This models ANSI C12.20 (0.2, 0.5%) and IEC 62053-22 (0.1, 0.2, 0.5, 1, 3%) accuracy classes.
