document: rfc-3101
kind: protocol-element
summary: The N-bit is a new option bit that ensures all routers belonging to an NSSA agree on its configuration. When the N-bit is set in Hello packets, the E-bit must be clear; a mismatch causes the Hello packet to be dropped and no adjacency forms.
section: "2.1"
topics:
    - routing
