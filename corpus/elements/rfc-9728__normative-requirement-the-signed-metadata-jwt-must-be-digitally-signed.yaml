document: rfc-9728
kind: normative-requirement
summary: The signed_metadata JWT MUST be digitally signed or MACed using JWS and MUST contain an iss (issuer) claim. Signed metadata values MUST take precedence over corresponding values conveyed using plain JSON elements.
section: "2.2"
rfc2119_level: MUST
