document: rfc-8551
kind: normative-requirement
summary: Signing times through year 2049 MUST be encoded as UTCTime; times in 2050 or later MUST be encoded as GeneralizedTime. Receiving agents MUST support both. For UTCTime, YY >= 50 is interpreted as 19YY; YY < 50 as 20YY.
section: 2.5.1
rfc2119_level: MUST
topics:
    - email
    - security
