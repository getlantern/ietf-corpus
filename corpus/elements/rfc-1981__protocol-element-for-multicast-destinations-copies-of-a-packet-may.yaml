document: rfc-1981
kind: protocol-element
summary: For multicast destinations, copies of a packet may traverse many different paths, each with a different PMTU. Multiple Packet Too Big messages may be received; the minimum PMTU across all those paths determines the size of subsequent packets to the multicast destination.
section: "3"
topics:
