summary: 'The extended Sender TSpec adds parameter 126 (Compression_Hint) after the standard Token_Bucket_TSpec (parameter 127). Parameter 126 occupies 2 words (not including header): word 10 is the hint assigned number (32-bit), and word 11 is the compression factor f (32-bit integer). The overall TSpec length field increases by 3 words.'
