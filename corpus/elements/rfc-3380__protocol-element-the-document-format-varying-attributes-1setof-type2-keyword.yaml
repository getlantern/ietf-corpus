document: rfc-3380
kind: protocol-element
summary: The 'document-format-varying-attributes' (1setOf type2 keyword) OPTIONAL READ-ONLY attribute lists attributes whose values vary by document format. If a listed attribute is changed in Set-Printer-Attributes with a 'document-format' operation attribute, the Printer MUST change the value only for that format; non-listed attributes are changed for all formats.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
