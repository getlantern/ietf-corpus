document: rfc-3911
kind: design-rationale
summary: The Join extension does not constitute wiretapping under RFC 2804 because one party is always aware of a Join request and can decline it. In many applications, additional elements of the RFC 2804 wiretap definition also do not apply (e.g., call centers where all parties know conversations are recorded).
section: "3"
topics:
    - sip
    - security
    - realtime
    - privacy
