document: rfc-8139
kind: normative-requirement
summary: The DRB SHOULD NOT appoint an RBridge that is in link-state overload as an Appointed Forwarder. If an Appointed Forwarder becomes overloaded and a non-overloaded RBridge is available on the link, the DRB SHOULD reassign VLANs to that non-overloaded RBridge.
section: "2.4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
