document: rfc-7070
kind: design-rationale
summary: Identity authentication (e.g., DKIM) proves that a name is being used by its owner but does not assess the quality or trustworthiness of that owner. Reputation services fill this gap by providing assessments of authenticated identifiers, distinguishing good actors from bad.
section: "1"
topics:
    - security
    - email
