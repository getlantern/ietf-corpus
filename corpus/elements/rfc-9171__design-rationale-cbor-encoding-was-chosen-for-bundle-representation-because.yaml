document: rfc-9171
kind: design-rationale
summary: CBOR encoding was chosen for bundle representation because it enables compact, self-describing binary structure. The ipn URI scheme further supports compact representation by encoding endpoints as pairs of unsigned integers rather than text strings, optimizing for resource-constrained DTN environments.
