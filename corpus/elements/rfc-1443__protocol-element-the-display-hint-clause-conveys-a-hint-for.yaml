document: rfc-1443
kind: protocol-element
summary: 'The DISPLAY-HINT clause conveys a hint for displaying object values and may only be present when the underlying primitive type is INTEGER or OCTET STRING. For INTEGER it is a single character: ''x'' (hex), ''d'' (decimal), ''o'' (octal), or ''b'' (binary).'
section: "3.1"
