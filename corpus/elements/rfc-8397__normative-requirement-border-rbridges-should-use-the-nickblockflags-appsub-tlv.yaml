document: rfc-8397
kind: normative-requirement
summary: Border RBridges SHOULD use the NickBlockFlags APPsub-TLV to advertise into the Level 1 area the inclusive range of nicknames that are or are not available for self-allocation. The traditional Nickname Sub-TLV remains allowed alongside it.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - routing
