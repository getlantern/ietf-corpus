document: rfc-8767
kind: normative-requirement
summary: The failure recheck timer — limiting how frequently a failed lookup is retried against authoritative servers — should be no more than 5 minutes per RFC 2308 Section 7, to prevent stale answers persisting unnecessarily once authorities recover.
section: "6"
rfc2119_level: SHOULD
topics:
    - dns
