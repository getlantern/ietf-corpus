document: rfc-2829
kind: normative-requirement
summary: If a SASL EXTERNAL Bind is requested without a prior TLS session and no other external source of authentication credentials exists, the SASL EXTERNAL bind MUST fail with a result code of inappropriateAuthentication, leaving the LDAP association in an anonymous state.
section: "8"
rfc2119_level: MUST
topics:
    - ldap
    - security
