document: rfc-1390
kind: normative-requirement
summary: All implementations must support IEEE 802.2 standard Class I service, including Unnumbered Information (UI) commands, XID commands and responses, and TEST commands and responses. Stations need not transmit XID/TEST commands but must be able to transmit responses.
section: IEEE 802.2 Details
rfc2119_level: MUST
topics:
    - ip
