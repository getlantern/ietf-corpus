document: rfc-5837
kind: design-rationale
summary: 'The ifIndex is included as an opaque token useful even in public traceroute applications: even without mapping it to an interface name, a receiver can use identical ifIndex values across multiple ICMP messages from the same router to determine whether the same interface was involved.'
section: "3.1"
