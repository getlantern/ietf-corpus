document: rfc-5584
kind: normative-requirement
summary: If maxRedundantFrames is not signaled, a default of 15 MUST be assumed by the receiver. In offer/answer, maxRedundantFrames MAY be increased in an answer (max 15) but MUST NOT be reduced.
section: 7.6.3
rfc2119_level: MUST
topics:
    - rtp
    - realtime
