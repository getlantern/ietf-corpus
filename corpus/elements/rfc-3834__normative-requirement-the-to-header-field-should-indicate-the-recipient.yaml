document: rfc-3834
kind: normative-requirement
summary: The To header field SHOULD indicate the recipient of the response, and there SHOULD be only one recipient of any automatic response, to minimize the potential for sorcerer's apprentice mode and denial-of-service attacks.
section: 3.1.3
rfc2119_level: SHOULD
topics:
    - email
    - security
