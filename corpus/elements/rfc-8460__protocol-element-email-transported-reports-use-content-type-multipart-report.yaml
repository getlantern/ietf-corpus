document: rfc-8460
kind: protocol-element
summary: Email-transported reports use Content-Type 'multipart/report; report-type="tlsrpt"' with a human-readable first part (text/plain) and a machine-readable second part (application/tlsrpt+json or application/tlsrpt+gzip). Two new header fields 'TLS-Report-Domain' and 'TLS-Report-Submitter' MUST be included.
section: "5.3"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
