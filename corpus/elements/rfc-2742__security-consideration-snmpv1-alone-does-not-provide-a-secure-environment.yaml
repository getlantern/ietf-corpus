document: rfc-2742
kind: security-consideration
summary: SNMPv1 alone does not provide a secure environment; even on an IPsec-secured network there is no per-principal access control. Implementers are recommended to use SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575).
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
