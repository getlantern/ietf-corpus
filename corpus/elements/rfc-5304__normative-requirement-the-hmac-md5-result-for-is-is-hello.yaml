document: rfc-5304
kind: normative-requirement
summary: The HMAC-MD5 result for IS-IS Hello PDUs SHALL be calculated after the packet is padded to the MTU size, if padding is not disabled. Implementations supporting optional checksums for SNPs and Hello PDUs MUST NOT include the Checksum TLV.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
