document: rfc-9643
kind: security-consideration
summary: The SOCKS5 username/password node ('proxy-server/socks5-parameters/authentication-parameters/username-password/password') is sensitive to read operations and the NACM 'default-deny-all' extension has been applied to it. Configuration of cleartext passwords is NOT RECOMMENDED; the 'password-grouping' from RFC 9640 supports both cleartext and encrypted forms.
section: "5.2"
topics:
    - tcp
    - security
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
