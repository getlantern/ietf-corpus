document: rfc-8158
kind: privacy-consideration
summary: Logging NAT events exposes source address and port information, raising privacy concerns. Destination information logging raises additional concerns documented in RFC 6888. NAT devices may operate in logging modes that avoid logging private information; Collectors may mask private information while generating abstract reports.
section: "7"
topics:
    - nat
    - privacy
