document: rfc-1717
kind: normative-requirement
summary: If reliable multilink operation is desired, PPP Reliable Transmission (ISO LAPB) MUST be negotiated prior to use of the Multilink Protocol on each member link. Regardless of reliability mode, an implementation MUST present a loss signal to NCPs running over the multilink arrangement when fragment loss is detected.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
