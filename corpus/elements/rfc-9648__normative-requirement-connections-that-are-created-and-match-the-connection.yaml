document: rfc-9648
kind: normative-requirement
summary: Connections that are created and match the connection list SHOULD apply the writable parameters. Implementations may not allow creation of new TCP connections simply by adding entries to the list, and behavior upon removal is implementation-specific.
section: "4"
rfc2119_level: SHOULD
topics:
    - tcp
    - yang
    - netconf
