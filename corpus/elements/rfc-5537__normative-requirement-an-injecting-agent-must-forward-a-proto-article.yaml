document: rfc-5537
kind: normative-requirement
summary: An injecting agent MUST forward a proto-article for a moderated group to the moderator of the leftmost moderated newsgroup, customarily via email. The preferred encapsulation method uses Content-Type application/news-transmission with usage=moderate, but the direct email method is more widely deployed.
section: 3.5.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
