document: rfc-2060
kind: protocol-element
summary: 'The FETCH command retrieves message data using named data items: BODY[<section>] fetches specific MIME body parts or header fields; BODY.PEEK[] is the non-flag-altering variant; ENVELOPE returns parsed RFC-822 header fields; BODYSTRUCTURE returns MIME structure; RFC822.SIZE returns message size in octets.'
section: 6.4.5
