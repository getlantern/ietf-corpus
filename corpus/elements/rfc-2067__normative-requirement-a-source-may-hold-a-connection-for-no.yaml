document: rfc-2067
kind: normative-requirement
summary: A Source may hold a connection for no more than 68 HIPPI bursts across all packets in that connection. The Source SHALL make a best effort to ensure connection durations do not exceed this limit, checking burst count after each packet.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - ip
