document: rfc-5142
kind: design-rationale
summary: RFC 3775 contained no provision for a home agent to inform a mobile node to stop using it, so this new message type was introduced to handle scenarios such as overload, load balancing, maintenance, functional load balancing, and home agent renumbering without requiring a home address change.
section: "1"
topics:
    - mobility
