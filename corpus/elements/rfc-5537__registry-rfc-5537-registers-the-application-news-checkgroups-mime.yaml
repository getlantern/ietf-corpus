document: rfc-5537
kind: registry
summary: RFC 5537 registers the application/news-checkgroups MIME media type with IANA. Its body lists all newsgroups within a hierarchy; the list is considered complete for any hierarchy represented, so all groups in that hierarchy MUST be listed unless scope is externally limited.
section: "4.3"
topics:
    - registry
