document: rfc-9682
kind: errata
summary: 'Erratum ID 6278 reports an inconsistency between SCHAR and BCHAR: U+007F (DEL) was excluded from SCHAR but not from BCHAR. This document extends the exclusion to U+007F–U+009F (all C1 control characters) in BCHAR and also in PCHAR (comment characters).'
section: 2.1.2
