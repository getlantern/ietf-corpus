document: rfc-8591
kind: normative-requirement
summary: A SignedData message sent in a SIP MESSAGE request SHOULD contain the certificate but MAY omit it if the sender has reason to believe the recipient already has it or has another access method. This updates RFC 3261 Section 23.2.
section: "7.1"
rfc2119_level: SHOULD
topics:
