document: rfc-8003
kind: normative-requirement
summary: When a REG_REQUEST in an UPDATE packet is received, the registrar MUST NOT modify the registrations of types not listed in the parameter, ensuring that only explicitly requested registration types are affected.
section: "4.3"
rfc2119_level: MUST NOT
topics:
