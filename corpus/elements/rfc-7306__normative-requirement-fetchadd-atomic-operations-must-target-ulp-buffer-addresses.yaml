document: rfc-7306
kind: normative-requirement
summary: FetchAdd Atomic Operations MUST target ULP Buffer addresses that are 64-bit aligned. A misaligned target MUST be surfaced as an error, the Responder's memory MUST NOT be modified, and a Terminate Message MUST be generated.
section: 5.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
