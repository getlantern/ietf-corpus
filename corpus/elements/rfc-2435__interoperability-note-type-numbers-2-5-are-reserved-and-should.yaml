document: rfc-2435
kind: interoperability-note
summary: Type numbers 2–5 are reserved and SHOULD NOT be used. Applications based on RFC 2035 should be updated to use type 64 or 65 (with Restart Marker header) instead of the older restart encoding conventions.
section: "4.1"
rfc2119_level: SHOULD NOT
