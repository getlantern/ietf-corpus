document: rfc-2863
kind: normative-requirement
summary: When an interface is 'flapping' (rapidly oscillating between up and down states), an agent should limit the rate at which it generates linkUp/linkDown traps to avoid flooding the network and the network management system with unnecessary traps.
section: 3.1.15
rfc2119_level: SHOULD
topics:
    - snmp
