document: rfc-6530
kind: security-consideration
summary: DKIM and other signed-header mechanisms will need coordination with SMTPUTF8 internationalization. S/MIME and PGP body-part signatures are largely unaffected, but downgrading of signed messages must be performed with extreme care because even subtle changes may invalidate signatures on primary or MIME body part headers.
