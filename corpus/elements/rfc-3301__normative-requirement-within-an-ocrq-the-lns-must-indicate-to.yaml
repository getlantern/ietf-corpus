document: rfc-3301
kind: normative-requirement
summary: Within an OCRQ, the LNS MUST indicate to the LAC minimum and maximum speeds for both receive and transmit traffic (from the LAC perspective) to support asymmetric ATM traffic contracts. For UBR connections, Minimum BPS MUST be set to zero.
section: 3.3.2
rfc2119_level: MUST
