document: rfc-8022
kind: design-rationale
summary: 'System-controlled and user-controlled list entries are distinguished: system-controlled entries are created by the server independently in state data, while user-controlled entries are created/deleted as a direct consequence of configuration changes. Deleting a user-controlled config entry removes the state entry; deleting a system-controlled config entry only removes supplemental config, leaving the state entry intact.'
section: "4.1"
topics:
    - yang
    - routing
