document: rfc-3697
kind: protocol-element
summary: The IPv6 header contains a 20-bit Flow Label field used by a source to label packets of a flow. A Flow Label of zero indicates packets not part of any flow. Packet classifiers use the 3-tuple of Flow Label, Source Address, and Destination Address to identify which flow a packet belongs to.
section: "2"
