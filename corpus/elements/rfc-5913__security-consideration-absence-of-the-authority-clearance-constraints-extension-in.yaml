document: rfc-5913
kind: security-consideration
summary: Absence of the Authority Clearance Constraints extension in a TA, CA certificate, or AA certificate means that the subject Authority is not constrained with respect to clearance. Absence of the Clearance attribute in a certificate means the subject has not been assigned any clearance.
