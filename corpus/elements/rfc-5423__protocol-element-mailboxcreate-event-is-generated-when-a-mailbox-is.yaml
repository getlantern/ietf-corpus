document: rfc-5423
kind: protocol-element
summary: MailboxCreate event is generated when a mailbox is created or becomes accessible due to an ACL change. Parameters include the mailbox identifier and UIDVALIDITY for IMAP-accessible stores; implicit ancestor-mailbox creations do not generate separate events.
