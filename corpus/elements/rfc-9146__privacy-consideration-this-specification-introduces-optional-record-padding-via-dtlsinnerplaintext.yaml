document: rfc-9146
kind: privacy-consideration
summary: This specification introduces optional record padding (via DTLSInnerPlaintext.zeros) in CID-enhanced records, allowing senders to inflate ciphertext size to impede traffic analysis. This privacy feature was not available in the original DTLS 1.2 specification.
section: "8"
topics:
    - tls
    - privacy
