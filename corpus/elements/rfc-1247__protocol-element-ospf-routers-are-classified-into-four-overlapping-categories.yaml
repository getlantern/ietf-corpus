summary: 'OSPF routers are classified into four overlapping categories: internal routers (all interfaces in one area), area border routers (ABRs, interfaces in multiple areas), backbone routers (interface to backbone), and AS boundary routers (ASBRs, exchange routing info with other ASes).'
