document: rfc-1587
kind: normative-requirement
summary: Unlike stub areas (where it is optional), all OSPF summary routes (type-3 LSAs) must be imported into an NSSA. This ensures that OSPF internal routes are always chosen over OSPF external (type-7) routes.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
