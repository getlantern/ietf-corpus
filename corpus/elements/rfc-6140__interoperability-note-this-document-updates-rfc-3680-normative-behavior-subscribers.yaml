document: rfc-6140
kind: interoperability-note
summary: 'This document updates RFC 3680 normative behavior: subscribers to the registration event package MAY create multiple dialogs as the result of a single subscription request. RFC 3680 Section 4.9 previously required that a subscriber MUST NOT create multiple dialogs; the change is necessary when an AOR is registered at both the SSP and one or more SIP-PBXes.'
section: 7.2.2
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
