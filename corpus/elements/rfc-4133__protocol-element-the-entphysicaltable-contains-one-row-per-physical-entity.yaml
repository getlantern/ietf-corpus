document: rfc-4133
kind: protocol-element
summary: The entPhysicalTable contains one row per physical entity and must always contain at least one row for an 'overall' physical entity with entPhysicalClass value of 'stack(11)', 'chassis(3)', or 'module(9)'. Each row is indexed by an arbitrary small integer (PhysicalIndex, range 1..2147483647).
