document: rfc-7222
kind: design-rationale
summary: The QoS architecture is grounded in the Differentiated Services Architecture (RFC 2474/2475) rather than per-flow RSVP-style reservation. The PMIPv6 domain is assumed to be DiffServ-enabled end-to-end, and the LMA/MAG are the natural enforcement points because they are already the tunnel entry/exit points for all mobile node traffic.
section: "3"
topics:
