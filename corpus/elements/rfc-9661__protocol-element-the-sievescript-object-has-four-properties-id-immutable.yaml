document: rfc-9661
kind: protocol-element
summary: 'The SieveScript object has four properties: ''id'' (immutable, server-set Id), ''name'' (optional String|null, Net-Unicode, unique per account), ''blobId'' (Id referencing the raw script octets), and ''isActive'' (Boolean, server-set, default false). At most one script may be active per user.'
