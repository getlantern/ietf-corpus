document: rfc-9660
kind: protocol-element
summary: 'The LABELCOUNT field encodes the zone name by reference: taking the last LABELCOUNT labels of the original QNAME yields the zone name. For example, QNAME ''a.b.c.example.com'' with LABELCOUNT=2 indicates the zone ''example.com.'''
section: "2.1"
topics:
    - dns
