document: rfc-2264
kind: protocol-element
summary: Time synchronization can be bootstrapped after learning the remote snmpEngineID by sending an authenticated Request with msgAuthoritativeEngineBoots and msgAuthoritativeEngineTime set to zero. The authoritative engine replies with a Report PDU containing current boots/time values, and the receiver updates its local cache per section 3.2 step 7b.
section: "4"
