document: rfc-6884
kind: protocol-element
summary: The encoding capability identification flag C (bit 1 of the first octet) signals the local EVRC-NW wideband/narrowband encoding capability. C=0 indicates mode 0 wideband encoding capability; C=1 indicates narrowband-only encoding (mode 0 incapable). This allows the far end to make informed mode requests via the MMM field.
section: "6.1"
topics:
