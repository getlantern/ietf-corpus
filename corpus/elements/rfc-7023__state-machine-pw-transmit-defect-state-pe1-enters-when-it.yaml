document: rfc-7023
kind: state-machine
summary: 'PW Transmit Defect State: PE1 enters when it receives a Reverse Defect Indication (RDI) from PE2 (indicating remote AC transmit fault or upstream PW fault) and is not already in PW receive defect state. PE1 exits upon receiving an OAM message from PE2 clearing the RDI or upon entering the PW receive defect state.'
