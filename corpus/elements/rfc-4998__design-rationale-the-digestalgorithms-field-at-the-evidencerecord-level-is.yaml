document: rfc-4998
kind: design-rationale
summary: The digestAlgorithms field at the EvidenceRecord level is explicitly defined as the union of all digestAlgorithm values from all contained ArchiveTimeStamps, providing a single lookup point for all hash algorithms used over the entire archival period without requiring traversal of the full structure.
section: "3.1"
