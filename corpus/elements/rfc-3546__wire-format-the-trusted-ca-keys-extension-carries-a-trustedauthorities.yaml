document: rfc-3546
kind: wire-format
summary: 'The trusted_ca_keys extension carries a TrustedAuthorities list of TrustedAuthority entries. Each entry is identified by IdentifierType: pre_agreed(0) (no data), key_sha1_hash(1) (20-byte SHA-1 of public key), x509_name(2) (DER-encoded DistinguishedName, 1..2^16-1 bytes), or cert_sha1_hash(3) (20-byte SHA-1 of DER-encoded certificate).'
section: "3.4"
topics:
    - tls
    - pkix
