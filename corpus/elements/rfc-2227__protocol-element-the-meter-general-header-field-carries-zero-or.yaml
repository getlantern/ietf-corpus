document: rfc-2227
kind: protocol-element
summary: The Meter general-header field carries zero or more directives used to negotiate hit-metering and usage-limiting between proxies and origin servers, and to report use/reuse counts. Multiple Meter headers in a message may be combined into a single header.
section: "5.1"
