document: rfc-9899
kind: interoperability-note
summary: IPv6 extension header matching uses the 'extension-header' leaf with type 'iana-ipv6-ext-types:ipv6-extension-header-type', which is maintained by IANA. The 'df' fragment-type bit must be set to 0 when used in IPv6 filters, as it applies only to IPv4.
section: "3.3"
topics:
