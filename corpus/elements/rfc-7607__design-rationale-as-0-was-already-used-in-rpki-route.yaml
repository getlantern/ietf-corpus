document: rfc-7607
kind: design-rationale
summary: AS 0 was already used in RPKI Route Origin Attestations (RFC 6491) to mark prefixes as not to be used in a routing context, requiring BGP implementations to not accept or propagate routes containing AS 0. This document codifies existing behavior already implemented by at least two BGP implementations, correcting an omission in prior BGP specifications.
section: "1"
topics:
    - bgp
    - routing
    - security
