document: rfc-4254
kind: wire-format
summary: 'SSH_MSG_CHANNEL_REQUEST carries: recipient channel (uint32), request type (string, US-ASCII), want-reply (boolean), and type-specific data. Responses are SSH_MSG_CHANNEL_SUCCESS or SSH_MSG_CHANNEL_FAILURE; if the request is unrecognized, SSH_MSG_CHANNEL_FAILURE is returned.'
