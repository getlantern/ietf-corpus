document: rfc-3998
kind: normative-requirement
summary: Startup-Printer MUST be accepted only when the Printer object has not yet been initiated; if a Printer object already exists, the host MUST return 'client-error-not-possible'. After startup, printer-state MUST be 'idle' with printer-is-accepting-jobs set to 'false' so the operator can reconfigure before enabling.
section: 3.5.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
