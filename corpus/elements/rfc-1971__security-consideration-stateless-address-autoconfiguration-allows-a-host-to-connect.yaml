document: rfc-1971
kind: security-consideration
summary: Stateless address autoconfiguration allows a host to connect, configure an address, and communicate without registering or authenticating with the local site. While this permits unauthorized users to join the network, the threat is inherent in the Internet architecture since any node with physical attachment can generate a usable address.
section: Security Considerations
topics:
    - security
    - ip
    - v6ops
