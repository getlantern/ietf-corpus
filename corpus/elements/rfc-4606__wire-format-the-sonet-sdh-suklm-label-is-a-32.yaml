document: rfc-4606
kind: wire-format
summary: 'The SONET/SDH SUKLM label is a 32-bit value: S (16 bits, index of STS-3/AUG-1 within STS-N/STM-N), U (4 bits, index of STS-1 SPE/VC-3 within STS-3/AUG-1), K (4 bits, index of TUG-3 within VC-4), L (4 bits, index of VT Group/TUG-2), M (4 bits, index of specific VT/VC within group). Zero indicates non-significant or ignored field.'
section: "3"
extracted_by: claude-sonnet-4-6
