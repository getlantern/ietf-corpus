document: rfc-8325
kind: normative-requirement
summary: All unused or unauthorized DSCP codepoints are RECOMMENDED to be mapped to UP 0, both at the AP (downstream) and in the wireless endpoint OS (upstream), to prevent WLAN DoS via non-standard or unauthorized markings.
section: "8.2"
rfc2119_level: RECOMMENDED
