document: rfc-9493
kind: normative-requirement
summary: Every Identifier Format MUST have a unique name registered in the IANA "Security Event Identifier Formats" registry or a Collision-Resistant Name as defined in RFC 7519. Formats expected to be used broadly SHOULD be registered in the IANA registry.
section: "3"
rfc2119_level: MUST
topics:
    - registry
    - security
