document: rfc-6490
kind: normative-requirement
summary: The object referenced by the TAL's rsync URI MUST be a self-signed CA certificate that conforms to the RPKI certificate profile (RFC 6487). This certificate serves as the trust anchor in certification path discovery and validation.
section: "2.2"
rfc2119_level: MUST
topics:
