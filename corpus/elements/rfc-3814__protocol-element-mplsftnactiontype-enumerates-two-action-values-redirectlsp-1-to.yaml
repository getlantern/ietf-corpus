document: rfc-3814
kind: protocol-element
summary: 'mplsFTNActionType enumerates two action values: redirectLsp(1) to redirect matching packets into an MPLS LSP, and redirectTunnel(2) to redirect into an MPLS TE tunnel. The companion object mplsFTNActionPointer is a RowPointer that must identify the first accessible columnar object in the target mplsXCEntry or mplsTunnelEntry row.'
section: "9"
