document: rfc-4342
kind: normative-requirement
summary: The initial CCID 3 sending rate is allowed to be at least two packets per RTT and at most four packets per RTT depending on packet size, in contrast to RFC 3448 which specifies one packet per RTT. The rate is only three or four packets per RTT when that translates to at most 4380 bytes per RTT.
section: "5"
rfc2119_level: MUST
topics:
    - congestion
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
