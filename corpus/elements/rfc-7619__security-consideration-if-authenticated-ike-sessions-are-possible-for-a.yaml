document: rfc-7619
kind: security-consideration
summary: If authenticated IKE sessions are possible for a given Traffic Selector range, unauthenticated IKE SHOULD NOT be allowed for that same range. When mixing authenticated and unauthenticated IKE with the same peer, policy rules should ensure the highest level of security is used.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - security
