document: rfc-8353
kind: privacy-consideration
summary: Anonymous authentication (requestAnonymity) allows a context initiator to authenticate without revealing its identity to the acceptor. The printable form of an anonymous GSSName SHOULD imply anonymity (e.g., '<anonymous>'), and the associated name-type OID MUST be NT_ANONYMOUS. Anonymous names MUST compare unequal to all other names including other anonymous names.
section: "4.4"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
