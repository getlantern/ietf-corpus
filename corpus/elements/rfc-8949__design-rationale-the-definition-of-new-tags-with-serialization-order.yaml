document: rfc-8949
kind: design-rationale
summary: The definition of new tags with serialization-order-dependent semantics (as with tag numbers 25 and 29) is NOT RECOMMENDED because such tags cannot be layered on top of arbitrary generic CBOR encoders/decoders and require deep integration into the codec, undermining CBOR's generic-encoder/decoder design goal.
section: "3.4"
topics:
    - cbor
