document: rfc-3788
kind: normative-requirement
summary: All SIGTRAN nodes using IPsec MUST implement IPsec ESP in transport mode with non-null encryption and authentication algorithms to provide per-packet authentication, integrity protection, and confidentiality, and MUST implement IPsec replay protection mechanisms.
section: "5"
rfc2119_level: MUST
topics:
