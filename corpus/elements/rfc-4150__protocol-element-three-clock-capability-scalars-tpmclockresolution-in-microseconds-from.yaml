document: rfc-4150
kind: protocol-element
summary: Three clock capability scalars—tpmClockResolution (in microseconds, from SspmMicroSeconds), tpmClockMaxSkew (maximum offset over 86400 seconds, from SspmClockMaxSkew), and tpmClockSource (from SspmClockSource)—expose the timing accuracy of the monitoring agent. All three types are imported from SSPM-MIB (RFC4149).
section: 2.3.1
topics:
