document: rfc-3077
kind: protocol-element
summary: The Dynamic Tunnel Configuration Protocol (DTCP) is a unidirectional protocol where feeds periodically broadcast HELLO messages over the unidirectional link to announce their tunnel end-points. Receivers listen to these announcements to dynamically discover and maintain a list of operational feed tunnel end-points.
