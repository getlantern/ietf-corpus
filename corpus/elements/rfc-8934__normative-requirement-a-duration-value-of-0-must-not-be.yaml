document: rfc-8934
kind: normative-requirement
summary: A Duration value of 0 MUST NOT be used. The Duration SHOULD be greater than MINIMUM-DURATION (5 seconds). At expiry of Duration, the LSP MUST be torn down and deleted.
section: 5.2.1
rfc2119_level: MUST NOT
