document: rfc-2085
kind: normative-requirement
summary: The shared secret key must not be used for a period of time that allows the 64-bit replay counter to wrap, i.e., no more than 2^64 packets may be transmitted using a single key.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
