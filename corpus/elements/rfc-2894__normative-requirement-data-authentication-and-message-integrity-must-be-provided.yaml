document: rfc-2894
kind: normative-requirement
summary: Data authentication and message integrity MUST be provided for all Router Renumbering Command messages by appropriate IPsec means. The integrity assurance must cover the IPv6 destination address, the RR Header, and the Message Body.
section: "3"
rfc2119_level: MUST
