document: rfc-6750
kind: normative-requirement
summary: Bearer tokens SHOULD NOT be passed in page URLs (e.g., as query string parameters). They SHOULD be passed in HTTP message headers or message bodies for which confidentiality measures are taken, to prevent leakage via browser history or server logs.
section: "5.3"
rfc2119_level: SHOULD NOT
topics:
    - oauth
    - security
    - http
    - privacy
