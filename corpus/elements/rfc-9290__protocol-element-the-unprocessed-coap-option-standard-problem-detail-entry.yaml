document: rfc-9290
kind: protocol-element
summary: The unprocessed-coap-option Standard Problem Detail entry (key -8) carries one or more CoAP option numbers (as uint) that the server could not process. Multiple option numbers are given in a list with no guaranteed completeness; the list may include options added by a proxy.
