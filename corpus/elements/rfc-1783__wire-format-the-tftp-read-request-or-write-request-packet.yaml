document: rfc-1783
kind: wire-format
summary: 'The TFTP Read Request or Write Request packet is extended to include the blocksize option: |opc|filename|0|mode|0|blksize|0|#octets|0|. The ''blksize'' option name and the ''#octets'' value are both NULL-terminated ASCII strings appended after the mode field.'
section: Blocksize Option Specification
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
