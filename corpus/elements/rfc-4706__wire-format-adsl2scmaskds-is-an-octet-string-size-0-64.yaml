summary: Adsl2ScMaskDs is an OCTET STRING (SIZE 0..64) representing a 512-bit bitmap where each bit corresponds to one downstream sub-carrier bin; a value of 1 indicates the bin is not in use. Adsl2ScMaskUs is an OCTET STRING (SIZE 0..8) for 64 upstream bins.
