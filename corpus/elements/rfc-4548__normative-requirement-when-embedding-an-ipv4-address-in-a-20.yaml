document: rfc-4548
kind: normative-requirement
summary: When embedding an IPv4 address in a 20-octet NSAP address, the format defined in section 3.1 MUST be used. The 13 trailing unspecified DSP octets MUST be present but have no intrinsic significance for IPv4.
section: "3.1"
rfc2119_level: MUST
topics:
