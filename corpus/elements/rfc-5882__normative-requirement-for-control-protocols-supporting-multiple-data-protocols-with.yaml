document: rfc-5882
kind: normative-requirement
summary: For control protocols supporting multiple data protocols with a shared topology, when a BFD session transitions Up to Down, the path SHOULD be considered failed for all data protocols and a topology change signaled. Otherwise, traffic for the failed data protocol would be black-holed indefinitely.
section: 4.2.2.1
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
