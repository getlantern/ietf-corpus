document: rfc-7064
kind: security-consideration
summary: In WebRTC environments, credentials (username and password) are often provisioned remotely at the same time as a 'stuns' URI. If credentials are received in the clear, using a 'stuns' URI provides little or no security benefit, making secure credential delivery essential.
section: "4"
topics:
