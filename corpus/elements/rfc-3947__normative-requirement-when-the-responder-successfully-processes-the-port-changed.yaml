document: rfc-3947
kind: normative-requirement
summary: When the responder successfully processes the port-changed packet, it MUST update local state so all subsequent packets to the peer use the new port (and possibly new IP address). Any implementation supporting NAT traversal MUST support negotiations that begin on port 4500.
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
