document: rfc-3161
kind: protocol-element
summary: Accuracy is an ASN.1 SEQUENCE of optional seconds (INTEGER), millis ([0] INTEGER 1..999), and micros ([1] INTEGER 1..999). Any missing field MUST be taken as zero. Adding/subtracting accuracy to genTime yields upper/lower bounds on token creation time.
