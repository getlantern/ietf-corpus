document: rfc-9758
kind: design-rationale
summary: 'The late binding principle from RFC 9171 is preserved: elements of an ipn URI MUST NOT be regarded as carrying location, reachability, or routing information. Interpreting a Node Number as a link-layer address or other topological quantity (regardless of how an Allocator assigns numbers) would be incorrect.'
section: "7.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
