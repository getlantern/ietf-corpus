document: rfc-3606
kind: design-rationale
summary: 'The ''low'' and ''high'' convention for cross-connect entries is based on numerical ordering of ifIndex values: the interface with the lower ifIndex is ''low'' and the other is ''high''. This deterministic ordering ensures a single canonical entry for each bi-directional cross-connect, avoiding duplicate rows.'
section: 3.1.1
topics:
    - realtime
