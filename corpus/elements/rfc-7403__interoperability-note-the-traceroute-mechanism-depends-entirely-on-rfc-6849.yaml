document: rfc-7403
kind: interoperability-note
summary: The traceroute mechanism depends entirely on RFC 6849 for media-loopback SDP semantics and on RFC 7332 for correct Max-Forwards handling by B2BUAs; deployments where B2BUAs do not support RFC 7332 will not be able to use this traceroute function.
