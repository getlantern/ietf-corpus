document: rfc-8966
kind: wire-format
summary: Relative times are encoded as 16-bit unsigned values in centiseconds (hundredths of a second), allowing times up to approximately 11 minutes with 10 ms granularity. This encoding is used in Hello Interval, IHU Interval, and AckRequest Interval fields.
