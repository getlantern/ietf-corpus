document: rfc-3733
kind: normative-requirement
summary: The <contact:authInfo> element returned in an <info> response MUST NOT be provided if the querying client is not the current sponsoring client. Similarly, <contact:upID> and <contact:upDate> MUST NOT be present if the object has never been modified; <contact:trDate> MUST NOT be provided if the object has never been transferred.
section: 3.1.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
