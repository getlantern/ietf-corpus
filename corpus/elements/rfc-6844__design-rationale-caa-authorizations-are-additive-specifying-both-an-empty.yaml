document: rfc-6844
kind: design-rationale
summary: 'CAA authorizations are additive: specifying both an empty issuer (";") and a named issuer is equivalent to specifying only the named issuer. This simplifies policy composition and avoids subtle interactions when multiple CAA RRs are present.'
section: "5.2"
topics:
