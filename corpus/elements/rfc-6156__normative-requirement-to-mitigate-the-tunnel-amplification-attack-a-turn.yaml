document: rfc-6156
kind: normative-requirement
summary: To mitigate the tunnel amplification attack, a TURN relay MUST NOT accept Teredo or 6to4 addresses in allocation or channel binding requests, and it is RECOMMENDED that relays not accept requests from or forward data to addresses known to be tunneled.
section: "9.1"
rfc2119_level: MUST NOT
topics:
    - security
    - nat
    - ip
    - v6ops
