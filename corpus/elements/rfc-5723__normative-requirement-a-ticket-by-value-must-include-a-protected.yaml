document: rfc-5723
kind: normative-requirement
summary: A 'ticket by value' MUST include a protected expiration time (absolute value) and MUST include a key identity field so that ticket encryption/authentication keys can be rotated and algorithms replaced.
section: "6.1"
rfc2119_level: MUST
topics:
