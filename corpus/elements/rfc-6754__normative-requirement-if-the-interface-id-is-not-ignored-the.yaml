document: rfc-6754
kind: normative-requirement
summary: If the Interface ID is not ignored, the receiving router MUST use the Interface ID instead of Neighbor Address to identify the new RPF neighbor, and MUST discard the message if the Interface ID does not match the cached Interface ID.
section: "5.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
