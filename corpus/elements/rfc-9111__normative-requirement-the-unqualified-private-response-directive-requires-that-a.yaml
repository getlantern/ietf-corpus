document: rfc-9111
kind: normative-requirement
summary: The unqualified private response directive requires that a shared cache MUST NOT store the response. The qualified form (with field-name arguments) limits only those listed header fields in shared caches, permitting the remainder of the response to be shared-cached without them.
section: 5.2.2.7
rfc2119_level: MUST NOT
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
