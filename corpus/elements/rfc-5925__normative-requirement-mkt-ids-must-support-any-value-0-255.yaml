document: rfc-5925
kind: normative-requirement
summary: MKT IDs MUST support any value 0–255 inclusive with no reserved values, and IDs MUST NOT be assumed to be randomly assigned. The IDs of MKTs MUST NOT overlap where their TCP connection identifiers overlap.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
    - security
