document: rfc-6455
kind: normative-requirement
summary: All control frames MUST have a payload length of 125 bytes or less and MUST NOT be fragmented. Currently defined control opcodes are Close (0x8), Ping (0x9), and Pong (0xA).
section: "5.5"
rfc2119_level: MUST
topics:
    - websocket
