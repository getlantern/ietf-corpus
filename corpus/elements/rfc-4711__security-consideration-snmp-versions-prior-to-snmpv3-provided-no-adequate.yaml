document: rfc-4711
kind: security-consideration
summary: SNMP versions prior to SNMPv3 provided no adequate security; even on a network secured by IPsec, they offer no access control over who can GET or SET MIB objects. Implementers MUST consider SNMPv3 with cryptographic authentication and privacy.
section: "6"
topics:
    - snmp
    - security
    - crypto
