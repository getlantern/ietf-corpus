document: rfc-8794
kind: normative-requirement
summary: Unknown-Sized Elements MUST only be used if the Element Data Size is not known before the Element Data is written, such as in some cases of datastreaming. Only Master Elements are permitted to be unknown-sized.
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
