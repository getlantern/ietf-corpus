document: rfc-5985
kind: normative-requirement
summary: The LIS MUST verify that the client is the target of the returned location, i.e., the LIS MUST NOT provide location to other entities than the target. LIS implementations MUST support a mode of operation in which IP return routability is the only client authentication.
section: "9.3"
rfc2119_level: MUST NOT
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
