document: rfc-9708
kind: normative-requirement
summary: In SignerInfo, the digestAlgorithm MUST contain the one-way hash function used in the HSS/LMS tree (SHA-256 or SHAKE256), and signatureAlgorithm MUST contain id-alg-hss-lms-hashsig with absent parameters.
