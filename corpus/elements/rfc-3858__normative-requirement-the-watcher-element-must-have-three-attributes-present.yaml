document: rfc-3858
kind: normative-requirement
summary: 'The ''watcher'' element MUST have three attributes present: ''id'', ''status'', and ''event''. The ''id'' MUST be unique across all other watchers reported for a particular watcherinfo subscription and MUST conform to the RFC 3261 token grammar.'
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
