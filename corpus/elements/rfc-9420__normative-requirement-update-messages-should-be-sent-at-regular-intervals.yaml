document: rfc-9420
kind: normative-requirement
summary: Update messages SHOULD be sent at regular intervals as long as the group is active, and members that do not update SHOULD eventually be removed. The appropriate frequency is typically hours or days, not milliseconds, since the purpose is proactively constraining a compromise window.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
