document: rfc-7176
kind: wire-format
summary: The Enabled-VLANs sub-TLV (MT-Port-Cap-TLV sub-TLV type 2) encodes a 2-byte Start VLAN ID field (12-bit VLAN, 4-bit RESV) followed by a variable-length VLAN bit-map; each bit represents one VLAN starting from Start VLAN ID. Minimum length 3 bytes. Multiple occurrences are unioned.
section: 2.2.2
topics:
    - routing
