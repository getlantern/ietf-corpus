document: rfc-9404
kind: protocol-element
summary: Blob/upload accepts accountId and a create map of Id to UploadObject. It behaves like Foo/set but permits only creation (no update or delete); the response has no state field. Created objects include id (blobId), type (String|null), and size (UnsignedInt).
section: "4.1"
topics:
    - json
