document: rfc-2024
kind: protocol-element
summary: dlswTConnOperPartnerVersion is a 0- or 2-octet read-only string identifying the partner's DLSw standard version and release from its Capabilities Exchange message. A zero-length string with state 'connected' indicates a non-standard (RFC 1434+) partner DLSw.
