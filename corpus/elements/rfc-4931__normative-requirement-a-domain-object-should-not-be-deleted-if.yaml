document: rfc-4931
kind: normative-requirement
summary: A domain object SHOULD NOT be deleted if subordinate host objects are associated with it. A server SHOULD notify clients of this dependency by returning a 2305 error response code when a <delete> command fails due to existing object relationships.
section: 3.2.2
rfc2119_level: SHOULD NOT
topics:
    - dns
