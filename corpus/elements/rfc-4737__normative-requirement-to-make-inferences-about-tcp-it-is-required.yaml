document: rfc-4737
kind: normative-requirement
summary: To make inferences about TCP, it is REQUIRED to use TCP-like streams as in RFC 3148. For real-time applications, it is RECOMMENDED to use periodic streams as in RFC 3432. The exact method of packet generation MUST be reported with the measurement results.
section: "6"
rfc2119_level: REQUIRED
topics:
    - measurement
