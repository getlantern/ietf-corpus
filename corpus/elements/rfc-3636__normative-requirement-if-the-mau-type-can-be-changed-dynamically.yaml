document: rfc-3636
kind: normative-requirement
summary: If the MAU type can be changed dynamically, the agent SHALL create ifTable, ifStackTable, and ifInvStackTable entries for the WIS when ifMauDefaultType is changed to a 10GBASE-W variant, and SHALL destroy those WIS-related entries when changed to a non-10GBASE-W type.
section: 3.4.1
rfc2119_level: SHALL
