document: rfc-6795
kind: protocol-element
summary: The "insufficient-info" parameter is an optional event package parameter defined only for NOTIFY requests. It signals that a policy decision could not be made due to insufficient information provided by the subscriber, and MUST be ignored if received in a SUBSCRIBE request.
section: "3.2"
topics:
    - sip
