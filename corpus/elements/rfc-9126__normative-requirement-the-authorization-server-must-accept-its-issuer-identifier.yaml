document: rfc-9126
kind: normative-requirement
summary: The authorization server MUST accept its issuer identifier, token endpoint URL, or pushed authorization request endpoint URL as valid audience values for JWT client assertion-based authentication at the PAR endpoint. The issuer identifier URL SHOULD be used as the audience.
section: "2"
rfc2119_level: MUST
topics:
