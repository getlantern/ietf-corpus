document: rfc-7112
kind: security-consideration
summary: ICMPv6 error messages generated in response to non-compliant First Fragments can be leveraged in reflection attacks if the attacker forges the source IPv6 address of the offending packet. Deploying Source Address Forgery Prevention filters (per RFC 2827 and RFC 3704) mitigates this risk.
section: "7"
topics:
