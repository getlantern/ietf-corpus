document: rfc-7313
kind: protocol-element
summary: The Enhanced Route Refresh Capability is a new BGP capability (RFC 5492) assigned Capability Code 70 by IANA, with a Capability Length of zero. Advertising it signals that the speaker supports ROUTE-REFRESH message subtypes and the related BoRR/EoRR procedures.
