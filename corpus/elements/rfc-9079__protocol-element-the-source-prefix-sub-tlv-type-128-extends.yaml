document: rfc-9079
kind: protocol-element
summary: The Source Prefix sub-TLV (type 128) extends Update, Route Request, and Seqno Request TLVs to carry a source prefix alongside the destination prefix, enabling source-specific routing entries. It is a mandatory sub-TLV per RFC 8966 Section 4.4.
section: "7.1"
topics:
    - routing
