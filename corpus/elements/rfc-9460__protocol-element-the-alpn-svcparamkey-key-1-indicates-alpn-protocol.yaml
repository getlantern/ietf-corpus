document: rfc-9460
kind: protocol-element
summary: 'The ''alpn'' SvcParamKey (key 1) indicates ALPN protocol identifiers supported by the endpoint. Wire format: one or more alpn-ids, each prefixed by a single-octet length, concatenated to exactly fill the SvcParamValue. ALPN IDs that do not uniquely identify a protocol suite MUST NOT be included.'
section: "7.1"
topics:
    - dns
    - tls
    - http
