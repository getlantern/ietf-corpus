document: rfc-5384
kind: design-rationale
summary: There is no header field specifying the number of Join Attributes; instead, the last attribute is marked with the E-bit. This avoids a fixed-size count field and allows the receiver to parse attributes sequentially until the end marker is encountered.
section: "3.1"
topics:
    - multicast
