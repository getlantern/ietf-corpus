kind: protocol-element
summary: 'The pimStarGTable and pimStarGITable expose per-group (*,G) PIM-SM/BIDIR state: upstream join state, upstream join timer, RPF interface, RPF next hop, and the route (address, prefix length, metric preference, metric) used to reach the RP. The interface-specific table additionally tracks assert state and join expiry.'
