document: rfc-7947
kind: design-rationale
summary: ADD-PATH (RFC 7911) on a route server should enforce send-only mode with clients to prevent route server clients from propagating multiple paths—including inactive or suboptimal ones—back to the route server, which could cause loss of reachability to other clients.
section: 2.3.2.2.2
topics:
    - bgp
    - routing
