document: rfc-6580
kind: registry
summary: Creates the 'RDMAP Errors' IANA registry for Remote Direct Memory Access Protocol errors. The 16-bit error field is divided into a 4-bit Layer (always 0x0), 4-bit Error Type, and 8-bit Error Code. Allocation policy is Standards Action per RFC 5226.
section: "3.1"
