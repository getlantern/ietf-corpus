document: rfc-8858
kind: normative-requirement
summary: If the offerer does not associate 'rtcp-mux-only' (or 'rtcp-mux') with the SDP media description in a subsequent offer, the offerer MUST fall back to usage of separate ports for RTP and RTCP once the offer is accepted.
section: "4.5"
rfc2119_level: MUST
topics:
