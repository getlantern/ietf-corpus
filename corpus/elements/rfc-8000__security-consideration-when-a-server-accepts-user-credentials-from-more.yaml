document: rfc-8000
kind: security-consideration
summary: When a server accepts user credentials from more than one realm, it must verify that the client holds a credential for the name it presented and that the credential's issuer (realm) is authorized to issue it. This realm authorization function is usually implemented by the security mechanism, but implementors should verify this.
section: "9"
topics:
    - security
    - crypto
