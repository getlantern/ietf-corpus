document: rfc-2678
kind: normative-requirement
summary: Per RFC 1122, a TCP receiving an ICMP port-unreachable MUST treat it the same as the equivalent transport-level mechanism (a RST). This is cited in the context of interpreting ICMP responses during TCP connectivity measurement.
section: 6.6.5
rfc2119_level: MUST
topics:
    - tcp
    - measurement
