document: rfc-9532
kind: protocol-element
summary: The next-hop-aliases parameter value is a Structured Fields String containing one or more DNS names in a comma-separated list. The list includes all alias names and canonical names received in CNAME records during DNS resolution of the next hop's hostname, and MAY include the original requested hostname itself.
section: "2"
topics:
