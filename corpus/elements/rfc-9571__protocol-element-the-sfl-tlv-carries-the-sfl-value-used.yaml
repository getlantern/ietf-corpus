document: rfc-9571
kind: protocol-element
summary: The SFL TLV carries the SFL value used to deliver the packet, the SFL Batch identifier grouping related SFLs for management, an optional SFL Index into the array of SFLs allocated for the FEC, and the FEC itself. This allows operation with hardware that discards the MPLS label stack before passing the packet to the OAM handler.
section: "9.1"
topics:
