document: rfc-9562
kind: wire-format
summary: 'A UUID is 128 bits (16 octets) in size, encoded in big-endian (network byte order). The canonical text form is ''hex-and-dash'': groups of 8-4-4-4-12 hexadecimal characters separated by hyphens, e.g., f81d4fae-7dec-11d0-a765-00a0c91e6bf6. Alphabetic hex digits may be uppercase, lowercase, or mixed.'
