document: rfc-4112
kind: design-rationale
summary: ECML v2 adopts XML as the exemplar syntax but deliberately keeps the XML syntax liberal, deferring additional constraints to specific applications, because the standard is intended as a simple baseline for diverse contexts including HTML forms and B2B XML documents.
