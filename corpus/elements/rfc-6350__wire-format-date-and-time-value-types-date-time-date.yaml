document: rfc-6350
kind: wire-format
summary: Date and time value types (DATE, TIME, DATE-TIME, DATE-AND-OR-TIME, TIMESTAMP) are based on ISO 8601:2004 basic format only. Reduced accuracy and truncated representations are permitted; expanded representation and decimal fractions for TIME are forbidden. A stand-alone TIME in DATE-AND-OR-TIME is always preceded by "T" for unambiguous parsing.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
