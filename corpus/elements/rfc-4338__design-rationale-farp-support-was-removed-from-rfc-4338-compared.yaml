document: rfc-4338
kind: design-rationale
summary: FARP support was removed from RFC 4338 (compared to RFC 2625) because some FC implementations do not tolerate receiving broadcast ELSes. The FC Name Server and manual configuration of <IPv4 address, N_Port_Name, N_Port_ID> mappings serve as alternatives.
