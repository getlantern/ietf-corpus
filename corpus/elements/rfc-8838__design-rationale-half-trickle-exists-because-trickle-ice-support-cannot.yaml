document: rfc-8838
kind: design-rationale
summary: Half Trickle exists because Trickle ICE support cannot always be confirmed before the initial ICE description must be sent. By including a full generation of candidates, the initiator ensures compatibility with regular ICE agents while still enabling optimized processing if the responder supports Trickle ICE.
