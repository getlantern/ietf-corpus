document: rfc-8861
kind: normative-requirement
summary: The RTCP RGRP SDES item MUST be sent by reporting sources in every compound RTCP packet in which they send an RR or SR (unless Reduced-Size RTCP is in use), and MUST NOT be sent by non-reporting members or SSRCs outside any Reporting Group.
section: 3.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
