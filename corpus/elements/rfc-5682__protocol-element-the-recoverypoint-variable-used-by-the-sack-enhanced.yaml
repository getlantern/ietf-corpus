document: rfc-5682
kind: protocol-element
summary: The 'RecoveryPoint' variable, used by the SACK-enhanced F-RTO, records the highest sequence number transmitted so far at key algorithm checkpoints; it is set to SND.UNA when a spurious timeout is declared, permitting fast recovery on incoming duplicate acknowledgments.
