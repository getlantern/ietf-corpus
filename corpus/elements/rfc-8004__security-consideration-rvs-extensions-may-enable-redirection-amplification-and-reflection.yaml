document: rfc-8004
kind: security-consideration
summary: RVS extensions may enable redirection, amplification, and reflection attacks at the IP layer, as well as man-in-the-middle attacks against the HIP base exchange at the HIP layer. If the Initiator has prior knowledge of the Responder's host identity, signature verification during the base exchange mitigates MITM attacks.
section: "5"
topics:
