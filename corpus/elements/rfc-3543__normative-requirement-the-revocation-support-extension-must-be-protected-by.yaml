document: rfc-3543
kind: normative-requirement
summary: The Revocation Support Extension MUST be protected by a foreign-home authentication extension, a mobile-home authentication extension, or an equivalent mechanism. If not protected, the action described in RFC 3344 Sections 3.8.2.1 and 3.7.3.1 MUST be taken.
section: "3.2"
rfc2119_level: MUST
topics:
