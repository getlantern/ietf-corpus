document: rfc-8143
kind: normative-requirement
summary: To prevent SSL Stripping attacks, when implicit TLS is not used, news clients SHOULD attempt to negotiate TLS even if the server does not advertise the STARTTLS capability label in response to the CAPABILITIES command.
section: "3.4"
rfc2119_level: SHOULD
topics:
