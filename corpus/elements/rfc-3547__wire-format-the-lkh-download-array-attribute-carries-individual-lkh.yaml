summary: The LKH_DOWNLOAD_ARRAY attribute carries individual LKH keys each with 2-octet LKH ID, 1-octet Key Type, 1-octet RESERVED, 4-octet Key Creation Date, 4-octet Key Expiration Date, 4-octet Key Handle, and variable Key Data (with explicit IV prepended if required by the algorithm).
