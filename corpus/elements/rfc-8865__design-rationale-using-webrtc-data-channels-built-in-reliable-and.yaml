document: rfc-8865
kind: design-rationale
summary: Using WebRTC data channels' built-in reliable and in-order transmission eliminates the need for the RTP-level redundancy mechanism and application-layer loss/reorder detection that RFC 4103 requires. The latency characteristics of WebRTC data channels are considered sufficient for T.140's real-time text requirements.
section: "3"
topics:
