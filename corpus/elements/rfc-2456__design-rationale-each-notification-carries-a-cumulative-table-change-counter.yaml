document: rfc-2456
kind: design-rationale
summary: Each notification carries a cumulative table-change counter so that a management station can detect missed notifications by checking whether received notifications are in numerical sequence. If they are not in sequence, the station should re-fetch the entire relevant table to restore consistent state.
section: "3"
