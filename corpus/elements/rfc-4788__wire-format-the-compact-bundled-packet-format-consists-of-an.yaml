document: rfc-4788
kind: wire-format
summary: The compact bundled packet format consists of an RTP header followed by a sequence of one or more consecutive EVRC/EVRC-B codec data frames of the same rate, with no Table of Contents. All frames in a single packet MUST be of the same rate and size.
