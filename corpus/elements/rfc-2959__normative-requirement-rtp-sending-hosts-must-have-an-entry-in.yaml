document: rfc-2959
kind: normative-requirement
summary: RTP sending hosts MUST have an entry in rtpSenderTable for each stream being sent. RTP monitors MUST create an entry for each observed sender to a multicast RTP session when a conceptual row in rtpSessionTable is made active.
section: "3"
rfc2119_level: MUST
topics:
