document: rfc-9031
kind: normative-requirement
summary: The pledge identifier MUST be unique in the set of all pledge identifiers managed by a JRC. The network identifier MUST be provisioned to the 6LBR pledge; regular pledges for which it is omitted will attempt networks one at a time, significantly prolonging the join process.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
