document: rfc-2960
kind: security-consideration
summary: SCTP does not provide confidentiality; the document recommends IPsec for confidentiality protection. The Adler-32 checksum provides integrity protection against accidental corruption but offers no cryptographic protection against deliberate tampering.
section: 11.2.3
topics:
    - sctp
    - security
    - ipsec
