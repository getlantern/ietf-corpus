document: rfc-7552
kind: security-consideration
summary: This document reduces the chances of off-link attacks on IPv6 LDP by mandating GTSM for LDP Link Hellos and recommending it for LDPoIPv6 TCP sessions. IPsec (RFC 4301) may also be used for IPv6 LDP protection per RFC 7321 and RFC 5920. No new security procedures beyond RFC 5036 are introduced.
section: "11"
topics:
    - mpls
    - security
    - ip
    - v6ops
