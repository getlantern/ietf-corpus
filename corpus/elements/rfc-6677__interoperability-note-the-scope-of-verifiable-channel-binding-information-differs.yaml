document: rfc-6677
kind: interoperability-note
summary: The scope of verifiable channel-binding information differs between enterprise and service provider (roaming) deployments. In enterprise networks, specific NAS properties (MAC address, SSID, VLAN) can be verified. In roaming cases, the home server typically only has access to information from roaming agreements, and AAA proxies may obscure or modify NAS-specific attributes.
section: "4.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
