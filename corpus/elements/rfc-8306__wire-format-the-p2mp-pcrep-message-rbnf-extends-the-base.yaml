document: rfc-8306
kind: wire-format
summary: The P2MP PCRep message RBNF extends the base reply with an optional <end-point-path-pair-list> where each path is an ERO or SERO; an optional UNREACH-DESTINATION object may also appear per response. If the E-bit was set in the request, the path is formed by an ERO followed by a list of SEROs.
section: "3.5"
topics:
