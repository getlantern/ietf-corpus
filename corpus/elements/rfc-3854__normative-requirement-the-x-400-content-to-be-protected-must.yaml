document: rfc-3854
kind: normative-requirement
summary: The X.400 content to be protected MUST be placed in the EnvelopedData encryptedContentInfo encryptedContent field, with its OID in the contentType field. The content SHOULD maintain its defined encoding and SHOULD NOT be MIME wrapped.
section: "3.3"
rfc2119_level: MUST
