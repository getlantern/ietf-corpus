document: rfc-9815
kind: normative-requirement
summary: The Node NLRI MUST be advertised unconditionally by all routers in the BGP SPF routing domain. The Local and Remote Node Descriptors for all NLRIs MUST include the BGP Router-ID (TLV 516) and the Autonomous System number (TLV 512).
section: 5.2.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
