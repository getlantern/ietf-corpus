document: rfc-5426
kind: normative-requirement
summary: IPv4 syslog receivers MUST be able to receive datagrams with message sizes up to and including 480 octets. IPv6 syslog receivers MUST be able to receive datagrams with message sizes up to and including 1180 octets. All syslog receivers SHOULD be able to receive datagrams up to and including 2048 octets.
section: "3.2"
rfc2119_level: MUST
topics:
    - syslog
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
