document: rfc-8936
kind: wire-format
summary: The 'ack' field in a poll request is a JSON array of strings whose values are JWT 'jti' claim values identifying successfully received SETs. The 'setErrs' field is a JSON object whose keys are 'jti' values and whose values are error objects with 'err' and 'description' members.
