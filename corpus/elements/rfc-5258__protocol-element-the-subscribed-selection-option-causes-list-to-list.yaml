document: rfc-5258
kind: protocol-element
summary: The SUBSCRIBED selection option causes LIST to list subscribed names rather than existing mailboxes, including names that may not exist. It implies the SUBSCRIBED return option, and the \Subscribed attribute MUST be accurately computed when this option is specified.
section: "3.1"
topics:
    - email
