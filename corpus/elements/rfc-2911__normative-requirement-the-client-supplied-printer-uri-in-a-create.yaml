document: rfc-2911
kind: normative-requirement
summary: The client-supplied Printer URI in a create request MUST be one of the values in 'printer-uri-supported'. The Printer MUST assign the new Job a URI consistent with the security level of the URI used in the create request (e.g., a secure submission URI yields a secure Job URI).
section: "2.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
