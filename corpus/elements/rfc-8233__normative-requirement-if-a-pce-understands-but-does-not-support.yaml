document: rfc-8233
kind: normative-requirement
summary: If a PCE understands but does not support the new METRIC type and the P bit is set, the PCE MUST send a PCErr with Error-Type=4 and Error-value=5 (Unsupported network performance constraint), and the path computation request MUST be canceled.
section: 3.1.4
rfc2119_level: MUST
topics:
    - mpls
    - routing
