document: rfc-9347
kind: protocol-element
summary: All-pad payloads (BlockOffset of zero with a single Pad Data Block) may be inserted between inner packet fragments, allowing the sender to always send tunnel packets regardless of encapsulation computation time. Receivers increment the expected sequence number when they receive an all-pad payload during reassembly.
section: 2.2.3
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
