summary: The 'atc' JWT claim is a JSON map with mandatory fields 'tktype' (string, ACME identifier type), 'tkvalue' (string, identifier value), 'fingerprint' (string, ACME account fingerprint), and optional 'ca' (boolean). The JWT header typically carries 'x5u' or 'x5c' for the Token Authority certificate.
