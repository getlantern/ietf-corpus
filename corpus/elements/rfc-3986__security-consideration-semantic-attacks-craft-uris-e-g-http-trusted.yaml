document: rfc-3986
kind: security-consideration
summary: Semantic attacks craft URIs (e.g., "http://trusted.example.com@hostile.example.com/") that visually appear to identify a trusted resource but actually identify a hostile one. Applications should render the userinfo portion distinctly and warn users.
section: "7.6"
topics:
    - security
