document: rfc-8393
kind: security-consideration
summary: The mechanism may be used to illegitimately introduce packets or false metadata into the SFC overlay network. Measures SHOULD be taken to ensure authorization of sources of such packets, and tunneling of such packets into the network SHOULD be prevented.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
