document: rfc-5340
kind: protocol-element
summary: The Network-LSA (LS type 0x2002) has area flooding scope and is originated by the link's Designated Router. Unlike its IPv4 counterpart, it contains no network mask or prefix information (moved to Intra-Area-Prefix-LSAs). Its Link State ID is set to the Designated Router's Interface ID on the link, and its Options field is the logical OR of Options from all fully adjacent neighbors' link-LSAs.
section: 4.4.3.3
topics:
    - routing
