document: rfc-1471
kind: protocol-element
summary: pppLinkStatusTable contains per-link status objects including pppLinkStatusPhysicalIndex, error counters (BadAddresses, BadControls, PacketTooLongs, BadFCSs), MRU values, ACC Maps, compression flags, and FCS sizes. Values are meaningful only when the link is in the open state (ifOperStatus is up).
