document: rfc-7961
kind: protocol-element
summary: 'The AFN Size sub-sub-TLV (type 1) allows a TRILL switch to specify the byte size of an address type identified by an AFN, enabling parsing of unknown or variable-length AFNs. Each AFN Size Record is 3 bytes: 2-byte AFN and 1-byte AdrSize.'
section: "3.1"
topics:
    - routing
