document: rfc-5228
kind: normative-requirement
summary: When an error occurs, implementations MUST notify the user that an error occurred and which actions (if any) were taken, and perform an implicit keep. All processing stops when an error occurs.
section: 2.10.6
rfc2119_level: MUST
