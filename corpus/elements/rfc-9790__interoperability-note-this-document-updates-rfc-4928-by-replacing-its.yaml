document: rfc-9790
kind: interoperability-note
summary: This document updates RFC 4928 by replacing its heuristic-based first-nibble snooping guidance with a positive requirement to use a PSH with PFN not equal to 0x4 or 0x6 for all non-IP payloads, and by deprecating the payload-type guessing heuristic entirely. The intent is that legacy routers continue operating unchanged while new implementations follow the updated rules.
section: "2.2"
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
