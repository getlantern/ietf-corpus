document: rfc-3010
kind: protocol-element
summary: The client identity (Clientid) is a 64-bit shorthand reference established via the SETCLIENTID and SETCLIENTID_CONFIRM operations; it incorporates a client-supplied verifier4 (8-byte opaque) used by the server to detect client restarts and loss of lock state.
section: 8.1.1
