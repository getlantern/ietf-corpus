document: rfc-5730
kind: normative-requirement
summary: Transport mappings for EPP MUST preserve command order, address sessions vs. connections, preserve statefulness, frame data units, ensure reliability, use congestion-avoiding transports (TCP/SCTP) or account for overload when using SMTP/BEEP, and explicitly allow or prohibit pipelining.
section: "2.1"
rfc2119_level: MUST
topics:
    - tcp
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
