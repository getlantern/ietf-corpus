document: rfc-7756
kind: normative-requirement
summary: It is RECOMMENDED that the IPv6 Path MTU configured in the ER be raised above the RFC 6145 default of 1280 bytes, since the ER-to-BR path typically resides within a single administrative domain. It is further RECOMMENDED that the ER and BR use identical configured IPv6 Path MTU values.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
