document: rfc-3415
kind: protocol-element
summary: The vacmViewTreeFamilyTable defines MIB views as sets of included and excluded OID subtree families. Each entry pairs a vacmViewTreeFamilySubtree (OBJECT IDENTIFIER) with a vacmViewTreeFamilyMask (OCTET STRING, SIZE 0..16) and vacmViewTreeFamilyType of included(1) or excluded(2). The longest-matching subtree entry determines inclusion or exclusion.
