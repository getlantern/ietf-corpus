kind: protocol-element
summary: The 'interfaces-mpls' grouping defines a list of MPLS-enabled interfaces keyed by 'name' (an interface-ref). Each entry includes 'mpls-enabled' (boolean, default false) and 'maximum-labeled-packet' (uint32, in octets) referencing RFC 3032 Section 3.2.
