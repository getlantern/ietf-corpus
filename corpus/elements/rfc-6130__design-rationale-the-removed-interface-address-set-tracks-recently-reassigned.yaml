document: rfc-6130
kind: design-rationale
summary: The Removed Interface Address Set tracks recently reassigned local interface addresses for I_HOLD_TIME to prevent a formerly local address from being incorrectly recorded as a symmetric 2-hop neighbor's address when it is reused by a neighboring router.
