document: rfc-2207
kind: normative-requirement
summary: Non-zero values of vDstPort are required in GPI SESSION objects. This ensures that a non-GPI SESSION object will never merge with a GPI SESSION object; a zero value causes an 'Invalid Destination Port' API error.
section: "4.1"
rfc2119_level: REQUIRED
topics:
    - ipsec
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
