document: rfc-7344
kind: normative-requirement
summary: CDS/CDNSKEY records MUST be located at the Child zone apex, MUST be signed with a key represented in both the current DNSKEY and DS RRsets (except for initial enrollment), and MUST NOT break the current delegation if applied to the DS RRset.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - security
