document: rfc-5151
kind: normative-requirement
summary: When a domain border LSR receives a Path message with the 'Contiguous LSP' bit set to one, the node MUST NOT perform stitching or nesting for the inter-domain TE LSP. When the bit is clear, the domain border LSR MAY perform stitching or nesting according to local policy.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
