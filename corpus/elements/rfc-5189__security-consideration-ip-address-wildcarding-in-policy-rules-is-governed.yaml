document: rfc-5189
kind: security-consideration
summary: IP address wildcarding in policy rules is governed by the local policy of the middlebox. Permitting broad wildcards could allow an agent to enable traffic on behalf of addresses it does not control; middleboxes should restrict the range of wildcarding permitted to each authenticated agent.
section: 2.3.6
topics:
    - security
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
