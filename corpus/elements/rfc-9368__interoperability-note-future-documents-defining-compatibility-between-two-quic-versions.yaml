document: rfc-9368
kind: interoperability-note
summary: Future documents defining compatibility between two QUIC versions that support Retry MUST specify how version negotiation (both compatible and incompatible) interacts with Retry, including how the Retry packet is authenticated in the Negotiated Version handshake even though it was sent in the client's Chosen Version.
section: "7.1"
topics:
    - quic
