document: rfc-2594
kind: interoperability-note
summary: For FTP, WwwRequestType maps to the FTP command token and WwwResponseType maps to the three-digit FTP reply code. The primary response for a request is the reply with a 2xy, 3xy, 4xy, or 5xy code; preliminary 1xy replies are counted separately. The default wwwServiceProtocol OID is { applTCPProtoID 21 }.
section: "7.2"
