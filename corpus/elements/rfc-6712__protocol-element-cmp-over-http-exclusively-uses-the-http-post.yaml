document: rfc-6712
kind: protocol-element
summary: CMP over HTTP exclusively uses the HTTP POST method for requests, effectively tunneling CMP PKIMessage structures over HTTP. GET and other methods are not used because PKI management operations can only be triggered via CMP PKI messages.
section: "1"
