document: rfc-4791
kind: wire-format
summary: The CALDAV:mkcalendar XML element wraps a DAV:set instruction as the request body for MKCALENDAR; the response body, if present, MUST be a CALDAV:mkcalendar-response element. The response MUST include a Cache-Control:no-cache header.
