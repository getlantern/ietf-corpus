document: rfc-5802
kind: normative-requirement
summary: Before sending the username to the server, the client SHOULD prepare it using the SASLprep profile of stringprep treating it as a query string; if preparation fails or yields an empty string, the client SHOULD abort the exchange.
section: "5.1"
rfc2119_level: SHOULD
