document: rfc-5539
kind: normative-requirement
summary: All NETCONF messages MUST be sent as TLS 'application data'. A single TLS record may contain multiple NETCONF messages, or one NETCONF message may span multiple TLS records.
section: "2.1"
rfc2119_level: MUST
topics:
    - netconf
    - tls
