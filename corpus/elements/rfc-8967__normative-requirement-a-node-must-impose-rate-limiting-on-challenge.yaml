document: rfc-8967
kind: normative-requirement
summary: A node MUST impose rate limiting on Challenge Replies; the limit SHOULD default to one Challenge Reply per peer every 300 ms. A node SHOULD NOT send other packets over the same interface before sending the Challenge Reply.
section: 4.3.1.2
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
