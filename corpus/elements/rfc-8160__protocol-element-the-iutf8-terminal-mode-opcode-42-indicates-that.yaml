document: rfc-8160
kind: protocol-element
summary: The IUTF8 terminal mode (opcode 42) indicates that terminal I/O uses UTF-8 character encoding, used in the SSH 'pty-req' channel request type. It is typically used by the kernel's terminal driver on the server to determine how many bytes of input constitute a single logical character during line editing.
