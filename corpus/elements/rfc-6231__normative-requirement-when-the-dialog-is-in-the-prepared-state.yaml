document: rfc-6231
kind: normative-requirement
summary: When the dialog is in the PREPARED state and the maximum preparation duration is exceeded, the MS MUST send a dialogexit notification with the appropriate error status code. A maximum preparation duration of 300s is RECOMMENDED.
section: "4.2"
rfc2119_level: RECOMMENDED
topics:
