document: rfc-5084
kind: security-consideration
summary: 'Counter mode is vulnerable to misuse: if counter block values are reused with the same key, the same keystream encrypts two plaintexts, completely voiding confidentiality guarantees. The CMS AuthEnvelopedData structure and automated key management prevent this misuse.'
