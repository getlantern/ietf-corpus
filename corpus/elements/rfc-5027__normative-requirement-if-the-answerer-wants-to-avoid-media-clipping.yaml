document: rfc-5027
kind: normative-requirement
summary: If the answerer wants to avoid media clipping when an optional security precondition was offered, the answerer MUST increase the strength to "mandatory" in the answer to delay session progress until the offerer has received the answer.
section: "3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
