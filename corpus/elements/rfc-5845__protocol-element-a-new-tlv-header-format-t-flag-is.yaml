document: rfc-5845
kind: protocol-element
summary: A new TLV-header format (T) flag is added to the Proxy Binding Acknowledgement message. When set by the LMA, it indicates the LMA supports tunneling IPv6-or-IPv4 in IPv4 using the TLV-header UDP format.
section: "6.3"
