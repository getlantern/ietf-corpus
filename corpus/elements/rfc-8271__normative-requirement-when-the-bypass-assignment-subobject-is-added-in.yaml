document: rfc-8271
kind: normative-requirement
summary: When the BYPASS_ASSIGNMENT subobject is added in the Path RRO, the IPv4 or IPv6 subobject containing the Node-ID address MUST also be added, the Node-ID address MUST match the source address of the bypass tunnel selected, and the BYPASS_ASSIGNMENT subobject MUST be added immediately after the Node-ID address.
section: 4.5.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
