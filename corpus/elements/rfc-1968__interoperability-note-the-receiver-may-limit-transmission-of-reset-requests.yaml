document: rfc-1968
kind: interoperability-note
summary: The receiver MAY limit transmission of Reset-Requests (e.g., to one per second) while a Reset-Ack is outstanding, to avoid flooding with redundant requests when the link is busy and errors cascade.
section: "3.1"
topics:
