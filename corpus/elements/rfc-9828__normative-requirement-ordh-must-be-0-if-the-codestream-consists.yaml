document: rfc-9828
kind: normative-requirement
summary: ORDH MUST be 0 if the codestream consists of more than one tile; similarly, ORDB MUST be 0 for multi-tile codestreams. Only ORDH values 4 (PCRL) and 6 (PRCL) allow sub-codestream latency streaming.
section: "5.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
