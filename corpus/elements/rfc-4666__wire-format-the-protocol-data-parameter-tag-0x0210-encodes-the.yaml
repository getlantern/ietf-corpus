document: rfc-4666
kind: wire-format
summary: 'The Protocol Data parameter (Tag 0x0210) encodes the complete SS7 MTP3 message: Originating Point Code (32-bit, right-justified), Destination Point Code (32-bit, right-justified), Service Indicator (8-bit), Network Indicator (8-bit), Message Priority (8-bit), Signalling Link Selection (8-bit), followed by variable-length User Protocol Data. Unused bits in fixed fields are coded ''0''.'
section: 3.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
