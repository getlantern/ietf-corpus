document: rfc-9761
kind: design-rationale
summary: MUD is extended to include (D)TLS profile parameters because Layer 3/4 ACLs in RFC 8520 are insufficient for broad communication patterns. Observable (D)TLS handshake parameters allow a network security service to identify malware without decrypting traffic, complementing existing MUD ACLs rather than replacing them.
section: "1"
topics:
