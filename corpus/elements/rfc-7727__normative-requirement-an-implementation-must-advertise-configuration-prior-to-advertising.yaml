document: rfc-7727
kind: normative-requirement
summary: An implementation MUST advertise configuration prior to advertising corresponding state. If a PE receives an STP State TLV for an unknown instance, it MUST request synchronization of configuration and state from its peer.
section: 4.2.2
rfc2119_level: MUST
topics:
    - routing
