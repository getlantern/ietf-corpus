document: rfc-4010
kind: protocol-element
summary: The SEED key unwrap algorithm takes as input a KEK K and (n+1) 64-bit ciphertext blocks {C[0]..C[n]}, reverses the wrap steps, and returns n plaintext blocks or an error if the recovered integrity check register A does not match the expected initial value.
