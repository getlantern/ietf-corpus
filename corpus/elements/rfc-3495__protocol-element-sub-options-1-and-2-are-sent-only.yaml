document: rfc-3495
kind: protocol-element
summary: Sub-options 1 and 2 are sent only to the CM (Cable Modem) and identify TSP DHCP servers from which an MTA is permitted to accept a DHCP OFFER. Sub-options 3–8 are sent only to the MTA and configure its provisioning and Kerberos authentication parameters.
