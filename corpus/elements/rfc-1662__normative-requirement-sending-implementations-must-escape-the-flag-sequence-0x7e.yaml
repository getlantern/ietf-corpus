document: rfc-1662
kind: normative-requirement
summary: Sending implementations MUST escape the Flag Sequence (0x7e) and Control Escape (0x7d) octets at minimum. Receiving implementations MUST correctly process all Control Escape sequences.
section: "4.2"
rfc2119_level: MUST
