document: rfc-9588
kind: security-consideration
summary: Deserialized public keys S and T MUST be verified to be elements of the group to prevent invalid curve attacks. Cofactor multiplication is ensured by requiring private scalars x and y to be divisible by the cofactor h. The M and N constants MUST NOT have known discrete logarithms.
section: "10.1"
topics:
    - crypto
    - security
