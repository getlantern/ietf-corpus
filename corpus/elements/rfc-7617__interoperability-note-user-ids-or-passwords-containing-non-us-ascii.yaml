document: rfc-7617
kind: interoperability-note
summary: User-ids or passwords containing non-US-ASCII characters will cause interoperability issues unless both parties agree on a character encoding scheme. The 'charset=UTF-8' parameter increases the likelihood that clients will switch to UTF-8, but servers may need to fall back to legacy encodings to accommodate older clients.
section: "3"
topics:
