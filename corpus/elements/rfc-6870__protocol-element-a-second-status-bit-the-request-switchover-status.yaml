document: rfc-6870
kind: protocol-element
summary: A second status bit, the Request Switchover status bit (0x00000040), is defined to allow peer PE nodes to coordinate a PW switchover operation. When set, it represents a request to switch over to this PW; when cleared, it represents no specific action.
