document: rfc-2633
kind: design-rationale
summary: When a group of recipients has non-overlapping encryption capabilities, the sending agent is forced to send multiple messages. Sending the same content with both strong and weak encryption is a security risk, as an attacker can learn the plaintext by decrypting the weaker copy.
section: 2.7.3
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
