document: rfc-8531
kind: normative-requirement
summary: In Base Mode, CCM MUST NOT be used; therefore, CCM MUST be disabled on the Maintenance Association of the Base Mode. If CCM is required, users MUST configure a separate Maintenance Association and assign unique MEP ID values (non-zero).
section: "6.2"
rfc2119_level: MUST NOT
topics:
