document: rfc-9007
kind: protocol-element
summary: MDN/parse takes accountId and blobIds (Id[]) and returns parsed (Id[MDN]|null), notParsable (Id[]|null), and notFound (Id[]|null). It allows a client to extract structured MDN data from arbitrary blobs, such as those referenced in EmailSubmission.mdnBlobIds.
