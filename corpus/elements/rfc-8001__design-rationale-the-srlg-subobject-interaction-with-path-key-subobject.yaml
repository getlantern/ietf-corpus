document: rfc-8001
kind: design-rationale
summary: 'The SRLG subobject interaction with Path Key Subobject (RFC 5553) is explicitly addressed: when a Confidential Path Segment is replaced by a PKS in the RRO, any SRLG subobjects from the hidden segment MAY be retained by adding them after the PKS, preserving SRLG information while protecting topology confidentiality.'
