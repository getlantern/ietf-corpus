document: rfc-5751
kind: interoperability-note
summary: Some early S/MIME implementations emitted 'rsa-md5', 'rsa-sha1', and 'sha1' for the micalg parameter instead of the correct 'md5', 'sha-1' values. Receiving agents SHOULD recover gracefully from unrecognized micalg parameter values.
