document: rfc-7466
kind: normative-requirement
summary: In HELLO message processing (RFC 6130 Section 12.6 point 2), the condition for creating or updating a 2-Hop Tuple is changed from 'L_status = SYMMETRIC' to 'L_SYM_time not expired', so that Tuples are also created for links in the LOST state while still within their symmetric time window.
section: "4.2"
rfc2119_level: REQUIRED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
