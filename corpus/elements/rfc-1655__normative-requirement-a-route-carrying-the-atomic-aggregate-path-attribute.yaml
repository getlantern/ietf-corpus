document: rfc-1655
kind: normative-requirement
summary: A route carrying the ATOMIC_AGGREGATE path attribute shall not be exported into either BGP-3 or EGP2 unless such exportation can be accomplished without exploding the NLRI of the route.
section: "8"
rfc2119_level: MUST NOT
topics:
