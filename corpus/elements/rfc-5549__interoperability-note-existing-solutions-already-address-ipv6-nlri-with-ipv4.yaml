document: rfc-5549
kind: interoperability-note
summary: Existing solutions already address IPv6 NLRI with IPv4 Next Hop (RFC4798 for AFI/SAFI <2/1>, <2/2>, <2/4>; RFC4659 for <2/128>), but no general method existed for IPv4 NLRI with an IPv6 Next Hop, which this document fills.
