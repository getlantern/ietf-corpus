document: rfc-8063
kind: security-consideration
summary: A server SHOULD NOT perform any transformation on data under server management when processing a <keyrelay:create> command; the intent is only to place DNSSEC key material on another client's poll queue. Exceptions are allowable only for interoperability with server policies that have already implemented this extension.
section: "6"
rfc2119_level: SHOULD NOT
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
