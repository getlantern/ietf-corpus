document: rfc-6951
kind: protocol-element
summary: The SCTP_REMOTE_UDP_ENCAPS_PORT socket option (struct sctp_udpencaps with fields sue_assoc_id, sue_address, sue_port) allows an application to set and retrieve the remote UDP encapsulation port number per association and destination address. Setting sue_port to 0 disables UDP encapsulation.
section: "6.1"
topics:
    - sctp
    - udp
