summary: 'The ar$op.version field identifies the protocol: 0 (MARS), 1 (NHRP per RFC 2332), 0x02–0xEF (IETF reserved), 0xF0–0xFE (ATM Forum), 0xFF (Experimental). The ar$pro.type field space assigns 0x0000–0x00FF to NLPIDs, 0x0400–0x04FF to ATM Forum, and 0x0600–0xFFFF to Ethertypes.'
