document: rfc-3953
kind: normative-requirement
summary: The URI scheme appearing in the regexp field of an NAPTR record using the 'E2U+pres' enumservice SHOULD be the 'pres' URI scheme, as it ensures greater interoperability than URI schemes specific to a particular presence protocol.
