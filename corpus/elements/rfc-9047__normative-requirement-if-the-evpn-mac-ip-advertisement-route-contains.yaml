document: rfc-9047
kind: normative-requirement
summary: If the EVPN MAC/IP Advertisement route contains an IPv6 address and the EVPN ARP/ND Extended Community, the PE MUST add the R and O flag values to the ND entry and propagate those flag values to Neighbor Advertisements when replying to solicitations for the IPv6 address.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
