document: rfc-5465
kind: normative-requirement
summary: Support for ServerMetadataChange is OPTIONAL unless the METADATA or METADATA-SERVER extension (RFC 5464) is supported, in which case it is REQUIRED. Only the names of changed metadata entries SHOULD be returned; deleted items MUST always be included.
section: "5.7"
rfc2119_level: REQUIRED
