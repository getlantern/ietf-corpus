document: rfc-9737
kind: normative-requirement
summary: The MDS MUST track outstanding write intents (which occur when a client opens a file and gets LAYOUTIOMODE4_RW), and when it restarts, it MUST track recovery of those write intents.
section: "2.1"
rfc2119_level: MUST
