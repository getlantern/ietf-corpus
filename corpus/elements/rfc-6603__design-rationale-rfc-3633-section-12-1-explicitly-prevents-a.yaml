document: rfc-6603
kind: design-rationale
summary: 'RFC 3633 Section 12.1 explicitly prevents a delegating router from using any prefix it has delegated, resulting in two non-aggregatable routes per customer: one for the link between delegating and requesting router, and one for the customer site. This specification removes that constraint by allowing one prefix from the delegated set to be excluded and used on the uplink.'
section: "3"
topics:
