document: rfc-1541
kind: normative-requirement
summary: 'DHCP clients MUST adopt a retransmission strategy with randomized exponential backoff: first retransmission after 4 seconds ±1 second uniform random, next after 8 seconds ±1, doubling each time up to a maximum of 64 seconds.'
