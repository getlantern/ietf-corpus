document: rfc-3479
kind: normative-requirement
summary: On session reconnection, LDP peers MUST re-exchange LDP Initialization messages and MUST use the same session parameters as the previous instantiation. If parameters changed, the peer SHOULD send a Notification with the 'FT Session parameters changed' status code.
section: "4.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
