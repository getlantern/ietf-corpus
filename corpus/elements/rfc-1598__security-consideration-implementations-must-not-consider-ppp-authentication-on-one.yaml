document: rfc-1598
kind: security-consideration
summary: Implementations MUST NOT consider PPP authentication on one call setup circuit between two systems to apply to concurrent call setups for other circuits between those same systems. Relying on switching system integrity for authentication may allow an attacker spoofing the same calling identity to bypass link authentication, or enable undetected insertion attacks.
section: Security Considerations
rfc2119_level: MUST NOT
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
