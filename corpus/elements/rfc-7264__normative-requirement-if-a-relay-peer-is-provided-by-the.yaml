document: rfc-7264
kind: normative-requirement
summary: If a relay peer is provided by the service provider, peers SHOULD prefer RPR over SRR. RPR SHOULD NOT be used in the open Internet or if the administrator does not have sufficient information about the overlay network topology.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
