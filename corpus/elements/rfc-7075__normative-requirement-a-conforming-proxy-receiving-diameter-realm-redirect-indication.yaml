document: rfc-7075
kind: normative-requirement
summary: A conforming proxy receiving DIAMETER_REALM_REDIRECT_INDICATION MUST attempt to reroute the original request to a server in a realm identified by a Redirect-Realm AVP; if rerouting fails, the proxy MUST forward the indication toward the client.
section: 3.2.2
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
