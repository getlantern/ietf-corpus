document: rfc-8203
kind: design-rationale
summary: 'The 128-octet maximum length for Shutdown Communication serves dual purposes: it is sufficient to carry a meaningful human-readable message (including a ticket reference and brief explanation), and it limits the surface area for log injection attacks against syslog systems that may display the message.'
