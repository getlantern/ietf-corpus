kind: protocol-element
summary: 'The EncryptedKeyPackage content type is a CHOICE among three CMS protecting structures: encrypted (EncryptedData), enveloped ([0] EnvelopedData), and authEnveloped ([1] AuthEnvelopedData). It is identified by OID id-ct-KP-encryptedKeyPkg and differs from the underlying protecting content types only in its OID and one tag.'
