document: rfc-9784
kind: normative-requirement
summary: There SHOULD be a mechanism equivalent to EVPN mass withdraw such that upon an ENNI failure, only a single BGP message to the PEs is needed to trigger DF election for all impacted vESes associated with that ENNI.
section: "3.7"
rfc2119_level: SHOULD
