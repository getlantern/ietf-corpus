document: rfc-5793
kind: protocol-element
summary: 'PB-TNC defines six batch types encoded in the B-Type field: CDATA (1, client-to-server data), SDATA (2, server-to-client data), RESULT (3, server evaluation complete), CRETRY (4, client requests restart), SRETRY (5, server requests restart), CLOSE (6, session termination). Only the Posture Broker Client may send CDATA and CRETRY; only the Posture Broker Server may send SDATA, SRETRY, and RESULT.'
section: "4.1"
topics:
    - security
