document: rfc-8163
kind: normative-requirement
summary: Each MS/TP node on the link MUST have a unique address in order to ensure correct MAC operation. MS/TP addresses are one octet in length and are assigned dynamically; the method of assignment is outside the scope of the specification.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
