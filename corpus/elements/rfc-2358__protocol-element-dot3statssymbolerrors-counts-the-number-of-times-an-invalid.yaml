document: rfc-2358
kind: protocol-element
summary: dot3StatsSymbolErrors counts the number of times an invalid data symbol was detected when a valid carrier was present, incremented at most once per carrier event even if multiple symbol errors occur. This object is new in RFC 2358 (absent from RFC 1650) and is required for 100 Mbit compliance.
