document: rfc-8169
kind: protocol-element
summary: RTM accumulates per-node residence time in a dedicated Scratch Pad field carried in a G-ACh message alongside the timing packet, allowing the egress node to update the PTP correctionField and making intermediate MPLS transit nodes transparent to the clock synchronization protocol.
