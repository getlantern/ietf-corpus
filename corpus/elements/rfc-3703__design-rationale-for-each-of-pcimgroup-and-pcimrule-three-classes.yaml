summary: 'For each of pcimGroup and pcimRule, three classes are defined (abstract superclass, auxiliary subclass, structural subclass) rather than a single class. This provides maximum flexibility: auxiliary attachment allows co-location of policy data with other entries, while structural instances allow standalone policy entries.'
