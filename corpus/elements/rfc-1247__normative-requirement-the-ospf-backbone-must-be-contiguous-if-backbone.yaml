document: rfc-1247
kind: normative-requirement
summary: The OSPF backbone must be contiguous. If backbone connectivity is broken by area configuration, the system administrator must restore it by configuring virtual links between backbone routers that share a common non-backbone area.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
