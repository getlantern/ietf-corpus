document: rfc-2497
kind: normative-requirement
summary: Implementations MAY accept arriving IPv6 datagrams larger than their configured MTU and are not required to discard them. If they cannot handle larger datagrams, they MAY log the event but MUST otherwise silently discard them.
section: "3"
rfc2119_level: MUST
topics:
    - ip
