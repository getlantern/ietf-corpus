document: rfc-6062
kind: normative-requirement
summary: To accept an incoming peer connection, the client MUST initiate a new TCP connection to the server using a different local transport address and MUST send a ConnectionBind request with the CONNECTION-ID from the ConnectionAttempt indication. Authentication MUST use the same method and credentials as the control connection.
section: "4.4"
rfc2119_level: MUST
topics:
    - nat
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
