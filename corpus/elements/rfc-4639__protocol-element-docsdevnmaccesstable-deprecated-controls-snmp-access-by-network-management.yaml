summary: docsDevNmAccessTable (deprecated) controls SNMP access by network management stations via IP address/mask, community string, access type (none/read/readWrite/roWithTraps/rwWithTraps/trapsOnly), interface bitmap, and trap version. If the table is empty, access is unrestricted.
