document: rfc-6749
kind: normative-requirement
summary: In the implicit grant flow, the authorization server MUST verify the redirection URI matches a registered URI before delivering the access token in the URI fragment. The authorization server MUST NOT issue a refresh token in the implicit grant.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
