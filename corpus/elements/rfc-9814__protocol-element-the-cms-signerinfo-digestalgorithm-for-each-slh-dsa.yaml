document: rfc-9814
kind: protocol-element
summary: 'The CMS SignerInfo digestAlgorithm for each SLH-DSA variant is fixed: SHA-256 for 128-bit SHA-2 variants; SHA-512 for 192-bit and 256-bit SHA-2 variants; SHAKE128 with 256-bit output for 128-bit SHAKE variants; and SHAKE256 with 512-bit output for 192-bit and 256-bit SHAKE variants. In all four cases, the AlgorithmIdentifier SHOULD NOT include parameters.'
section: "4"
topics:
