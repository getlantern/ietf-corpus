document: rfc-891
kind: normative-requirement
summary: 'Loop suppression in OUTPUT-PACKET: when copying Host Table delay values into the outgoing HELLO message, if an entry''s PORT-ID matches the current HELLO process''s PID (indicating the best path back to the sender goes through this same link), MAXDELAY is substituted for the actual delay to prevent routing loops.'
section: 3.3.3
rfc2119_level: REQUIRED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
