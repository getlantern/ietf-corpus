document: rfc-6121
kind: protocol-element
summary: 'The <show/> child element of a presence stanza carries one of: ''away'' (temporarily absent), ''chat'' (actively seeking chat), ''dnd'' (do not disturb), or ''xa'' (extended away); absence of <show/> means the entity is available.'
section: 4.7.2.1
