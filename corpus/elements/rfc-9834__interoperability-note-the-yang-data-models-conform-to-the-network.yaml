document: rfc-9834
kind: interoperability-note
summary: The YANG data models conform to the Network Management Datastore Architecture (NMDA) defined in RFC 8342, ensuring compatibility with NMDA-aware management systems. The models can be used independently of NETCONF/RESTCONF, consistent with RFC 8969.
