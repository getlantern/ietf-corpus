document: rfc-2370
kind: state-machine
summary: The OSPF neighbor state machine is modified at the ExStart/NegotiationDone transition (moving to Exchange state). The Database summary list action is extended to include type-9 and type-10 Opaque LSAs from the area structure and type-11 Opaque LSAs from the global structure, with type-9 LSAs omitted if the neighbor's interface differs from the LSA's recorded interface, and type-11 LSAs omitted for virtual neighbors and stub areas.
section: "3.2"
topics:
    - routing
