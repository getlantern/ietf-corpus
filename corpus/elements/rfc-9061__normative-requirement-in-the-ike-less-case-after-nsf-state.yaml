document: rfc-9061
kind: normative-requirement
summary: In the IKE-less case, after NSF state loss, the I2NSF Controller SHOULD delete the old IPsec SAs in the non-failed nodes and MUST take the necessary actions to reestablish IPsec-protected communication once the failed node restarts.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
