document: rfc-8871
kind: normative-requirement
summary: Endpoints MUST NOT send confidential information via RTCP, because RTCP is only encrypted hop by hop in PERC and a compromised Media Distributor can read or modify RTCP content.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - security
    - privacy
