document: rfc-8801
kind: interoperability-note
summary: DNS recursive server addresses SHOULD be associated with their corresponding PvD and queries sent using a local IP address provisioned for that PvD. To support non-PvD-aware applications, PvD-aware hosts SHOULD ensure that non-PvD-aware name resolution APIs (e.g., getaddrinfo) only use resolvers from a single PvD per query.
section: 3.4.4
topics:
    - ip
    - dns
