document: rfc-8175
kind: protocol-element
summary: 'The Status Data Item (type 1) carries an 8-bit Status Code and an optional UTF-8 Text description. Status codes < 100 have failure mode ''Continue''; codes ≥ 100 have failure mode ''Terminate''. Key codes: 0 ''Success'', 1 ''Not Interested'', 2 ''Request Denied'', 128 ''Unknown Message'', 129 ''Unexpected Message'', 130 ''Invalid Data'', 131 ''Invalid Destination'', 132 ''Timed Out''.'
section: "13.1"
topics:
