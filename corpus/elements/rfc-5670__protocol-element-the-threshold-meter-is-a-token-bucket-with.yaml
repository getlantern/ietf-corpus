document: rfc-5670
kind: protocol-element
summary: The threshold-meter is a token bucket with configured rate PCN-threshold-rate (bits/s), maximum fill BS_tm (bits), and an intermediate depth threshold (bits). F_tm is decremented by each metered-packet's size and refilled at PCN-threshold-rate; all PCN-packets, including already-marked ones, are metered.
section: "2.3"
topics:
