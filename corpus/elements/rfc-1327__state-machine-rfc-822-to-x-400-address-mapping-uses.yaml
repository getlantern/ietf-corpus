document: rfc-1327
kind: state-machine
summary: 'RFC 822 to X.400 address mapping uses two stages. Stage I attempts to parse the address as X.400-encoded-in-RFC-822: derive O/R attributes from domain mapping, parse local-part as std-or-address or encoded-pn, validate attribute syntax and bounds. Stage II (fallback when Stage I fails) encodes the full RFC 822 address as an ''RFC-822'' Domain Defined Attribute.'
section: 4.3.4
topics:
