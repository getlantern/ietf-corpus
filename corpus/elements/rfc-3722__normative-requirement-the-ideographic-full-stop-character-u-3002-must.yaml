document: rfc-3722
kind: normative-requirement
summary: The ideographic full stop character U+3002 MUST NOT be used in an iSCSI name, as it is often used as if it were U+002E (dot) in domain name input mechanisms in Asia.
section: "6.1"
rfc2119_level: MUST NOT
