document: rfc-8181
kind: security-consideration
summary: The RPKI publication protocol uses a separate Business PKI (BPKI) to authenticate its CMS-signed messages, entirely distinct from the RPKI used to authenticate the published objects. The protocol does not validate whether published objects are valid in the RPKI.
section: "5"
