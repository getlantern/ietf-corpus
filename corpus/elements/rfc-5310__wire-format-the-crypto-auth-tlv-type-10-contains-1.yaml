document: rfc-5310
kind: wire-format
summary: 'The CRYPTO_AUTH TLV (Type 10) contains: 1-octet Auth Type (0x03), 2-octet Key ID, and variable-length Authentication Data whose size equals the output length of the selected HMAC-SHA variant. TLV lengths are 23 (HMAC-SHA-1), 31 (HMAC-SHA-224), 35 (HMAC-SHA-256), 51 (HMAC-SHA-384), and 67 (HMAC-SHA-512) octets.'
section: "3.1"
