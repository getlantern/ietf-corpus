document: rfc-9839
kind: protocol-element
summary: 'Control codes comprise 65 code points: C0 controls (U+0000–U+001F), C1 controls (U+0080–U+009F), and DEL (U+007F). The ''useful controls'' are newline (U+000A), carriage return (U+000D), and tab (U+0009); all others are ''legacy controls'' with obsolete or non-interoperable semantics.'
section: 2.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
