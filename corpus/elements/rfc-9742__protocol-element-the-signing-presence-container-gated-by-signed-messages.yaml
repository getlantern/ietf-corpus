document: rfc-9742
kind: protocol-element
summary: The 'signing' presence container (gated by signed-messages feature, referencing RFC 5848) configures signed syslog messages per destination. It contains a 'cert-signers' container for Signature Group 0 with cert-signer entries (name, asymmetric key pair with cert, hash algorithm SHA1 or SHA256) and timing parameters for certificate and signature block retransmission.
section: "4.1"
topics:
