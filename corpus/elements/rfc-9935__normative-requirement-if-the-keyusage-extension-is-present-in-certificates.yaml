document: rfc-9935
kind: normative-requirement
summary: If the keyUsage extension is present in certificates carrying an ML-KEM public key, then keyEncipherment MUST be the only key usage bit set. No other key usage bits are permitted for id-alg-ml-kem-* certificates.
section: "5"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
