kind: protocol-element
summary: The SESSION_ATTRIBUTE object (two C-Types) carries tunnel name, setup priority, hold priority, local-protection desired, label recording, and SE-style desired flags. The resource-affinity C-Type additionally carries 32-bit exclude-any, include-any, and include-all affinity bitmasks for constraint-based routing.
