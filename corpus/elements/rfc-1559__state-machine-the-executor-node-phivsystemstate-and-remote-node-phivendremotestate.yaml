document: rfc-1559
kind: state-machine
summary: 'The executor node (phivSystemState) and remote node (phivEndRemoteState) share four operational states: ON (allows logical links), OFF (terminates all links and stops routing), SHUT (no new links; waits for existing links to close before going OFF), and RESTRICTED (no new incoming links from other nodes).'
