document: rfc-6140
kind: interoperability-note
summary: When a SIP-PBX receives a registration event subscription for an AOR registered via the bulk mechanism, each resulting registration information document SHOULD carry an 'aor' attribute in its <registration/> element corresponding to the AOR at the SSP (e.g., 'sip:+12145550102@ssp.example.com'), so that subscribers unaware of GIN can find the relevant information.
section: 7.2.2
topics:
    - sip
    - realtime
