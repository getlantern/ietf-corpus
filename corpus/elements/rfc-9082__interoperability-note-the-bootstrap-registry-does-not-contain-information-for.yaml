document: rfc-9082
kind: interoperability-note
summary: The bootstrap registry does not contain information for query objects outside a global namespace (entities and help). For entities, the base URL must be retrieved from the service associated with the entity; RFC 8521 object tagging can overcome this limitation.
section: "3"
topics:
