document: rfc-3878
kind: normative-requirement
summary: Alarm conditions raised prior to entering ARC mode are reported normally (both raised and cleared). Conditions raised after entering ARC mode and cleared before exiting are not reported at all. Conditions raised after entering ARC mode but not cleared at exit have their raised notification deferred until exit, with cleared notifications sent at actual clear time.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
