document: rfc-8072
kind: normative-requirement
summary: The target resource MUST identify exactly one resource instance. If more than one instance is identified, the request MUST NOT be processed and a '400 Bad Request' MUST be sent. If no existing instance is identified, the request MUST NOT be processed and a '404 Not Found' MUST be sent.
section: "2.1"
rfc2119_level: MUST
topics:
    - yang
    - netconf
    - http
