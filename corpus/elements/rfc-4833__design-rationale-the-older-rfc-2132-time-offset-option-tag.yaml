document: rfc-4833
kind: design-rationale
summary: The older RFC 2132 time offset option (tag 2) provides only a UTC offset in seconds, which is insufficient to determine DST transitions or derive human-readable abbreviations like "EST". Servers would have had to time lease expirations to DST boundaries, creating a self-inflicted stress test.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
