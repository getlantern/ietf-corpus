document: rfc-3454
kind: normative-requirement
summary: Each character in the input stream MUST be checked against a mapping table. The mapping table SHOULD come from this document, though a profile MAY add to or alter it. Mapped characters are not re-scanned during the mapping step.
section: "3"
rfc2119_level: MUST
