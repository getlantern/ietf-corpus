document: rfc-9926
kind: protocol-element
summary: The term 'Origin' is introduced to name the node that issued a prefix advertisement, either as an NS(EARO) or as a DAO(TIO, RTO). The ROVR field in the EARO identifies the origin and is used by routers to merge multiple advertisements for the same prefix while retaining per-origin freshness (Path Sequence) ordering.
section: "2.4"
topics:
