document: rfc-9246
kind: normative-requirement
summary: With DNS-based request routing, symmetric shared keys MUST NOT be used across CDNI hops because the key must be distributed to CDNs with which the CSP may have no trust relationship. This architecture MUST NOT be implemented.
section: "5.2"
rfc2119_level: MUST NOT
topics:
