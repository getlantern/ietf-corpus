document: rfc-4836
kind: registry
summary: 'This document defines the first version of IANA-MAU-MIB, an IANA-maintained MIB module containing: dot3MauType OBJECT-IDENTITY definitions for all standard IEEE 802.3 MAU types (including EFM and 10GBASE-CX4 additions), IANAifMauTypeListBits TC (capability bitmap), IANAifMauMediaAvailable TC (media availability enumeration), IANAifMauAutoNegCapBits TC (auto-negotiation capability bitmap), and IANAifJackType TC (connector types). New entries require Expert Review.'
