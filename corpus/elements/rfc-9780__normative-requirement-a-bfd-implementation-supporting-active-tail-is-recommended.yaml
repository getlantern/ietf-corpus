document: rfc-9780
kind: normative-requirement
summary: A BFD implementation supporting active tail is RECOMMENDED to use a rate limiter on received BFD Control packets passed to the ingress LSR's control plane, to mitigate potential congestion when many egress LSRs send failure notifications simultaneously.
section: "5"
rfc2119_level: RECOMMENDED
topics:
