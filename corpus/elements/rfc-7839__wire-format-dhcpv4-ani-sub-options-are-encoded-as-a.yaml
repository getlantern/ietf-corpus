document: rfc-7839
kind: wire-format
summary: DHCPv4 ANI sub-options are encoded as a sequence of Sub-Option Code (1 octet), Length (1 octet), and Value (N octets) tuples, carried within the Relay Agent Information option (RFC 3046). Sub-option codes 13–18 are allocated from the 'DHCP Relay Agent Sub-Option Codes' registry.
section: "4.1"
