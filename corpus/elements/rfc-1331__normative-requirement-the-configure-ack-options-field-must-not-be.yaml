document: rfc-1331
kind: normative-requirement
summary: The Configure-Ack Options field MUST NOT be reordered or modified in any way from the received Configure-Request. On reception, the Identifier field must match the last transmitted Configure-Request, and options must exactly match.
section: "6.2"
rfc2119_level: MUST NOT
