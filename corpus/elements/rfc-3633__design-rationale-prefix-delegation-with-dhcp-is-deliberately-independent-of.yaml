document: rfc-3633
kind: design-rationale
summary: Prefix delegation with DHCP is deliberately independent of address assignment. A requesting router can use DHCP for just prefix delegation or combine it with address assignment and other configuration. This separation reflects that prefix delegation serves a different administrative function (ISP-to-CPE) than host address configuration.
section: "7"
