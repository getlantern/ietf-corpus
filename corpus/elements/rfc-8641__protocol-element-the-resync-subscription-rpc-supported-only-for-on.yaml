document: rfc-8641
kind: protocol-element
summary: The resync-subscription RPC, supported only for on-change dynamic subscriptions, instructs the publisher to send a fresh push-update snapshot. On receipt, the publisher must either quickly follow with a push-update or return an appropriate RPC error, optionally including hints in the resync-subscription-error yang-data structure.
section: 4.4.4
topics:
    - yang
    - netconf
