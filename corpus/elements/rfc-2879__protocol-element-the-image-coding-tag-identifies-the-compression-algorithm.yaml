document: rfc-2879
kind: protocol-element
summary: 'The ''image-coding'' tag identifies the compression algorithm: MH, MR, MMR, JBIG, or JPEG. The ''image-coding-constraint'' tag qualifies this with environment-specific profiles: JBIG-T85 (bi-level per ITU T.85), JBIG-T43 (multi-level per ITU T.43), or JPEG-T4E (per ITU T.4 Annex E).'
section: "3.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
