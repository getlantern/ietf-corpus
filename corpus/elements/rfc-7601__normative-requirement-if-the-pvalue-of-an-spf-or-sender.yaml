document: rfc-7601
kind: normative-requirement
summary: If the pvalue of an SPF or Sender ID result does not include authenticated local-part information, the pvalue SHOULD NOT include the local-part or the following '@' character, to avoid implying that the local-part was authenticated when it was not.
section: 2.7.2
rfc2119_level: SHOULD NOT
topics:
