document: rfc-9843
kind: design-rationale
summary: Interface Group Mode is required because bandwidth-derived metrics on individual parallel Layer 3 links can incorrectly steer traffic away from a high-capacity multi-link bundle toward a single lower-capacity path. Aggregating bandwidth across parallel adjacencies corrects the metric to reflect true path capacity.
section: 4.1.1.2
topics:
    - routing
