document: rfc-6726
kind: security-consideration
summary: Forged ALC packets with the Close Session (A) or Close Object (B) flags set can cause receivers to prematurely terminate a session or abandon object reception. Packet-level authentication (Section 7.2.2) is RECOMMENDED to protect ALC/LCT header integrity.
section: 7.3.3
topics:
    - security
