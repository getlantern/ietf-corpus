document: rfc-3023
kind: registry
summary: 'This document registers five new IANA MIME media types: text/xml, application/xml, text/xml-external-parsed-entity, application/xml-external-parsed-entity, and application/xml-dtd. It also updates the RFC 2048 registration process to accommodate the ''+xml'' suffix convention for future XML-based media types.'
