summary: 'ED25519 is expected to become the future RECOMMENDED default DNSKEY algorithm. EdDSA''s key advantages are: no unique random number required per signature, no padding/truncation issues unlike ECDSA, and greater resilience to side-channel attacks and implementation errors.'
