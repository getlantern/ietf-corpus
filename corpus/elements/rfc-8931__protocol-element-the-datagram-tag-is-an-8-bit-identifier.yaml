document: rfc-8931
kind: protocol-element
summary: The Datagram_Tag is an 8-bit identifier locally unique to the link-layer sender of a fragment. It functions as an MPLS-like label that is swapped at each hop as the source link-layer address changes, enabling label switching of fragments without reassembly at intermediate nodes.
