document: rfc-8911
kind: protocol-element
summary: Fixed Parameters have values specified in the Registry Entry and different values yield different Registered Performance Metrics. Runtime Parameters are not specified in the Registry, are supplied at execution time, and must be reported with Measurement Results so that full context is preserved.
section: 7.2.2
topics:
    - registry
    - measurement
