document: rfc-4976
kind: protocol-element
summary: The AUTH method is a new MSRP request used by clients to create a handle for receiving incoming requests. In response to a successful AUTH, the relay returns a Use-Path header containing URIs the client can give its peers for routing messages back to it.
section: "4.1"
