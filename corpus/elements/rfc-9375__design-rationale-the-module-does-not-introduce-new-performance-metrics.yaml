document: rfc-9375
kind: design-rationale
summary: The module does not introduce new performance metrics or measurement mechanisms; it reuses existing OAM mechanisms (OWAMP, TWAMP, STAMP, MPLS Loss and Delay, IOAM, BGP-LS, ITU-T Y.1731) as data sources. This avoids duplicating measurement standards and focuses the module on unified monitoring and management.
