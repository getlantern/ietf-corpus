document: rfc-9733
kind: design-rationale
summary: 'BRSKI-AE is motivated by scenarios where EST is infeasible: when the RA is not co-located with the registrar and requires end-to-end authentication; when the CA mandates auditable proof of origin for CSRs; when KEM keys are used (which cannot sign a PKCS#10 CSR); when the pledge''s TLS library lacks ''tls-unique'' support; or when connectivity to backend PKI is intermittent.'
section: "1.1"
topics:
