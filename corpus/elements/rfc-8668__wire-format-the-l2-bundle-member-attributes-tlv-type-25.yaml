document: rfc-8668
kind: wire-format
summary: 'The L2 Bundle Member Attributes TLV (Type 25) wire format consists of: Type (1 octet), Length (1 octet), Parent L3 Neighbor Descriptor (7-octet System ID + pseudonode ID followed by a 1-octet flags field with P-Flag in bit 0), optionally a parallel-adjacency sub-TLV, and one or more L2 Bundle Attribute Descriptors each starting with a 1-octet Length, 1-octet count of bundle members, 4-octet Link Local Identifiers per member, and sub-TLVs.'
section: "3"
topics:
    - routing
    - mpls
