document: rfc-1460
kind: interoperability-note
summary: The octet count assigned to a message by the POP3 server may differ from the byte count on the server host due to local end-of-line conventions. For example, a server using a single-character EOL must count each such character as two octets (CRLF) when computing the scan listing size.
section: "10"
