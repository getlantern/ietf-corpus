document: rfc-3648
kind: normative-requirement
summary: When the Position header is present on a request adding a member, the server MUST insert the new member into the ordering at the specified location. If the request is replacing an existing resource and Position is present, the server MUST remove the URI from its current position and insert it at the newly requested position.
section: "6.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
