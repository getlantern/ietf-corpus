document: rfc-4090
kind: interoperability-note
summary: If a PLR is configured with local revertive mode but the MP is not, any attempt by the PLR to resignal the TE LSP over a restored resource will fail because the MP will not send a Resv message. The LSP will continue using the backup tunnel until re-optimized by the head-end.
section: 6.5.2
topics:
    - mpls
    - routing
