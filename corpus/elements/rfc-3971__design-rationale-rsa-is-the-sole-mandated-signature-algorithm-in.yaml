document: rfc-3971
kind: design-rationale
summary: RSA is the sole mandated signature algorithm in SEND. Multiple signature algorithms would either break interoperability between implementations or require implementing all of them plus a selection mechanism. A second algorithm is only needed as a recovery mechanism if RSA is found to be flawed.
section: "4"
topics:
