document: rfc-3153
kind: protocol-element
summary: PPP Multiplexing sends multiple PPP encapsulated packets (subframes) in a single PPP frame with Protocol ID 0x0059, using per-subframe delimiters to allow demultiplexing. The PPP Mux Control Protocol (PPPMuxCP) uses Protocol ID 0x8059 for negotiation.
