document: rfc-2743
kind: normative-requirement
summary: Delegation may only be provided at the explicit request of the application. If the application instructs GSS_Init_sec_context that delegation is not desired, the implementation must not permit delegation to occur, overriding any mechanism-specific delegation controls. This is an explicit exception to the general rule that mechanisms may enable unrequested services.
section: 1.2.9
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
