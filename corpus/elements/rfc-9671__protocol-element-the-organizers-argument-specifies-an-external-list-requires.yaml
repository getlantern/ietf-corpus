document: rfc-9671
kind: protocol-element
summary: The :organizers argument specifies an external list (requires 'extlists' extension) of email addresses from which the recipient accepts events. Implementations MUST NOT process calendar data unless it is a well-formed iTIP message and one of the list addresses matches the ORGANIZER's Calendar User Address.
section: "4.6"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
