document: rfc-8139
kind: normative-requirement
summary: When the DRB sends any appointments in a TRILL Hello, it MUST send all appointments for that link in that Hello; any previous Hello appointment not included is implicitly revoked. Unnecessary changes in Appointed Forwarders SHOULD NOT be made.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
