document: rfc-7512
kind: normative-requirement
summary: The '/' delimiter MUST be percent-encoded in the path component so generic URI parsers never split the path into multiple segments. The '?' MUST be percent-encoded in the path. The '#' MUST always be percent-encoded to prevent fragment identifier interpretation.
section: "2.3"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
