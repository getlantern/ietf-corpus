document: rfc-735
kind: design-rationale
summary: Macro bytes are recommended to be drawn from the Telnet data space between decimal 128 and decimal 254, since this range is not normally used except by obsolete original Telnet implementations. This minimizes conflicts with normal NVT data.
section: "5"
