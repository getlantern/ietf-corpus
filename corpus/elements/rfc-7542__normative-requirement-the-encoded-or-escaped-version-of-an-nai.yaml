document: rfc-7542
kind: normative-requirement
summary: The encoded or escaped version of an NAI (e.g., HTTP-escaped form) is not a valid NAI and MUST NOT be presented to the AAA system. Any comparison, validation, or use of the NAI MUST be done on its unescaped (utf8-clean) form.
section: "2.7"
rfc2119_level: MUST NOT
topics:
    - radius
    - http
