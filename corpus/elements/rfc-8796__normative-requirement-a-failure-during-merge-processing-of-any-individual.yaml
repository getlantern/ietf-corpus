document: rfc-8796
kind: normative-requirement
summary: A failure during merge processing of any individual rerouted LSP MUST result in an RSVP PathErr message. After successful merge, the MP node SHOULD immediately use summary refresh procedures to refresh the protected LSP Resv state rather than sending individual RSVP Resv messages.
section: 3.4.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
