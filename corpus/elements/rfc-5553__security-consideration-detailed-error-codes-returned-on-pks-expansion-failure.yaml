document: rfc-5553
kind: security-consideration
summary: Detailed error codes returned on PKS expansion failure (Section 3.1) can leak topology information via probing. Any LSR MAY substitute all such errors with 'Policy Control Failure' / 'Inter-domain policy failure' to prevent information disclosure.
section: "4"
topics:
