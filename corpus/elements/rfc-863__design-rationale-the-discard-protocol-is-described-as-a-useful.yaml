document: rfc-863
kind: design-rationale
summary: The Discard Protocol is described as a useful debugging and measurement tool. Its sole function is to silently drop all received data, making it suitable for testing connectivity and measuring throughput without requiring a meaningful application-layer peer.
section: TCP Based Discard Service
