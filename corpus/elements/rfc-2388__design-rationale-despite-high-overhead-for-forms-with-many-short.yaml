document: rfc-2388
kind: design-rationale
summary: Despite high overhead for forms with many short-value fields, multipart/form-data is justified because in practice (e.g., HTML forms) the average overhead is not significant, and the format supports content-type labeling and charset encoding that application/x-www-form-urlencoded cannot.
section: "5.2"
topics:
