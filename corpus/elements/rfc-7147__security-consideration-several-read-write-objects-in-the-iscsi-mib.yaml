document: rfc-7147
kind: security-consideration
summary: Several read-write objects in the iSCSI MIB (portal creation/deletion, node negotiation parameters, authorization entries) can alter the operational behavior of iSCSI devices if accessed by unauthorized parties, requiring SNMP access control (e.g., SNMP view-based access control, SNMPv3 authentication and privacy) to protect them.
section: "8"
topics:
    - security
    - snmp
