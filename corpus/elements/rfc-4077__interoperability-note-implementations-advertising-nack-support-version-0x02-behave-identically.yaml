document: rfc-4077
kind: interoperability-note
summary: Implementations advertising NACK support (version 0x02) behave identically to version 0x01 implementations in all respects except for the NACK mechanism. Bytecodes sent to a 0x02 endpoint can check the version number and send appropriate feedback back to the compressor.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
