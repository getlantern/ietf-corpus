document: rfc-8581
kind: protocol-element
summary: The SourceID AVP (AVP code 649) is of type DiameterIdentity and is inserted by a Diameter node to indicate the source of the enclosing AVP. In peer reports, it identifies either the node supporting the feature (in OC-Supported-Features) or the node generating the overload report (in OC-OLR).
section: "7.3"
