document: rfc-8919
kind: design-rationale
summary: Existing legacy link attribute advertisements do not support application-specific values for a given attribute, nor do they indicate which applications are using the advertised value. This creates ambiguity when multiple applications (e.g., RSVP-TE and SR Policy) coexist, potentially causing RSVP-TE head-end routers to attempt path setup over links not enabled for RSVP-TE.
section: "1"
topics:
    - routing
    - mpls
