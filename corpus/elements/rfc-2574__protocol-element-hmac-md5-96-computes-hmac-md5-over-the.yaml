document: rfc-2574
kind: protocol-element
summary: HMAC-MD5-96 computes HMAC-MD5 over the entire message with msgAuthenticationParameters zeroed (replaced by 12 zero octets), then truncates the 128-bit digest to the leftmost 96 bits (12 octets) as the authentication parameter. The authKey is exactly 16 octets.
section: 6.1.1
