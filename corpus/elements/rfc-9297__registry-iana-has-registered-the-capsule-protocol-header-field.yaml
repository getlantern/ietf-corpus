document: rfc-9297
kind: registry
summary: IANA has registered the 'Capsule-Protocol' header field in the HTTP Field Name Registry (permanent, RFC 9297) and established a new 'HTTP Capsule Types' registry governing a 62-bit space under the QUIC registration policy. Values 0x00–0x3f require Standards Action or IESG Approval; others use Specification Required. DATAGRAM (0x00) is the initial entry.
section: "5.3"
