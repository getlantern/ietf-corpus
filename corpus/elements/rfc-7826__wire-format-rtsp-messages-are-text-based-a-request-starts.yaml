document: rfc-7826
kind: wire-format
summary: RTSP messages are text-based. A request starts with a method line (method, URI, RTSP-version), followed by header lines, ended by two CRLF pairs. An optional binary message body follows, with length given by Content-Length. Responses begin with a status line (RTSP-version, status code, reason phrase).
