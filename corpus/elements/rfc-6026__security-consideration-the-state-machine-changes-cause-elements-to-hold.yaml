document: rfc-6026
kind: security-consideration
summary: The state machine changes cause elements to hold each accepted INVITE transaction state approximately 32 seconds longer than specified in RFC 3261 (64*T1 via Timer L/M), directly increasing the work required for state-exhaustion attacks against SIP elements.
section: "10"
topics:
