document: rfc-2940
kind: protocol-element
summary: copsClientServerConfigRetryCount (Unsigned32, default 1) and copsClientServerConfigRetryIntvl (TimeInterval, default 1000 centiseconds) parameterise the retry algorithm. For sequential mode, count is retries per server before moving on; for round-robin, count is unused and interval governs the inter-cycle wait.
