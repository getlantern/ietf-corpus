document: rfc-3998
kind: normative-requirement
summary: The 'printer-message-from-operator' operation attribute is OPTIONAL for all Printer administrative operations but MUST NOT be supplied in Get-Printer-Attributes or Set-Printer-Attributes operations; the Printer MUST ignore it in those two operations. To set the message via Set-Printer-Attributes, the client MUST supply it as an explicit attribute being set.
section: "6"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
