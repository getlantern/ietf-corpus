document: rfc-9000
kind: security-consideration
summary: QUIC restricts server responses to at most three times the data received from an unvalidated client address to prevent use as an amplification vector. Address validation via Retry packets or address tokens lifts this restriction.
section: "21.3"
topics:
    - quic
    - security
