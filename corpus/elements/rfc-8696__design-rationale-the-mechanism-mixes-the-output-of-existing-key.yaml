document: rfc-8696
kind: design-rationale
summary: The mechanism mixes the output of existing key transport or key agreement algorithms with a pre-shared key (PSK) to protect CMS-protected communications from a future large-scale quantum computer. An adversary who stores encrypted traffic today could decrypt it once a quantum computer becomes available; mixing with a PSK whose secrecy does not rely on the broken algorithm closes this window.
section: "1"
topics:
    - crypto
    - security
