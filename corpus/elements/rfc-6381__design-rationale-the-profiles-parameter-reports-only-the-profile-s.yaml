document: rfc-6381
kind: design-rationale
summary: The 'profiles' parameter reports only the profile(s) applying to the complete container format, not codec-specific profiles (which are reported via the 'codecs' parameter). A container profile may imply which codecs are present, so a receiver can sometimes determine compatibility from 'profiles' alone without examining 'codecs'.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
