document: rfc-3545
kind: security-consideration
summary: A potential denial-of-service threat exists when compression techniques have non-uniform receiver-end computational load, allowing an attacker to inject pathological datagrams that are complex to decompress. However, enhanced CRTP does not exhibit significant non-uniformity in decompression complexity.
