document: rfc-6073
kind: protocol-element
summary: The SP-PE TLV MAY appear only once per switching point traversed, cannot be of length zero, and is appended at each S-PE to the PW FEC. It carries sub-TLVs describing the switching point's PWid (FEC 128), FEC element (FEC 129), description string, local IP address, and remote IP address.
section: 7.4.1
topics:
    - mpls
