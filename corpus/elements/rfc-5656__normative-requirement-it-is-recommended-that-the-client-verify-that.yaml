document: rfc-5656
kind: normative-requirement
summary: It is RECOMMENDED that the client verify that the host key sent is the server's host key (e.g., via a local database). The client MAY accept the host key without verification, but doing so renders the protocol insecure against active attacks.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - crypto
    - security
