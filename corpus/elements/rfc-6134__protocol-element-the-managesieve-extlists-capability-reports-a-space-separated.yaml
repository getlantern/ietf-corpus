document: rfc-6134
kind: protocol-element
summary: The ManageSieve "EXTLISTS" capability reports a space-separated list of URI schema parts for supported externally stored list types. This capability MUST be returned if the server supports the "extlists" extension. The EXTLISTS value MUST NOT be empty.
