document: rfc-6736
kind: design-rationale
summary: 'DNCA supports two deployment models: ''integrated'' (NAS acts as NAT controller, hiding the NAT device from the AAA-server and producing a single accounting stream) and ''autonomous'' (AAA-server acts as NAT controller, producing two separate accounting streams per endpoint). The integrated model minimizes changes to existing AAA infrastructure.'
section: "3.3"
topics:
