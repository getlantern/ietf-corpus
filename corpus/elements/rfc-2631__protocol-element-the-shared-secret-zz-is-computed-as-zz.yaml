document: rfc-2631
kind: protocol-element
summary: The shared secret ZZ is computed as ZZ = g^(xb*xa) mod p, with each party performing ZZ = (yb^xa) mod p = (ya^xb) mod p. Group parameters require p=qj+1 where q is a large prime, and g=h^((p-1)/q) mod p with order q.
section: 2.1.1
