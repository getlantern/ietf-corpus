document: rfc-3711
kind: protocol-element
summary: The default and mandatory-to-implement message authentication transform is HMAC-SHA1 with a 160-bit session authentication key and an 80-bit truncated output tag. For SRTCP, HMAC-SHA1 MUST NOT be applied with tag length or key length smaller than these defaults.
section: "5.2"
topics:
