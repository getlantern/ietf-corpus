document: rfc-8688
kind: normative-requirement
summary: If an intermediary encodes per-call information in the URI returned in a 608 response, it MUST use a non-deterministic URI reference mechanism and MUST be prepared to return dummy responses to URI requests referencing calls that do not exist, to prevent attackers from gleaning call metadata by guessing URIs.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
