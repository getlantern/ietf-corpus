summary: A UEID encodes as a single type byte (0x01, 0x02, or 0x03) followed by the type-specific unique bytes. Total length is 7–33 bytes in CBOR (base64url 10–44 characters in JSON); RAND type requires at least 128 bits (16 bytes) of unique bytes.
