document: rfc-9892
kind: security-consideration
summary: A malicious actor masquerading as a DLEP peer could inject an alternate Traffic Classification Data Item, altering the mapping of traffic to queues and causing delay, congestion, or loss in one or more service classes. Transport-layer security (BCP 195) and Layer 2 security (IEEE 802.1AE, IEEE 802.1X) can mitigate these threats.
section: "4"
topics:
