document: rfc-3124
kind: security-consideration
summary: An application that reports a low congestion estimate to the CM will cause the CM to become overly aggressive, allowing data to be sent far faster than sound congestion control policy permits. This is the more dangerous attack vector.
section: "6"
topics:
    - congestion
    - security
