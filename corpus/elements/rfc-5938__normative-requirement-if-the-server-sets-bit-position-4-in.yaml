document: rfc-5938
kind: normative-requirement
summary: If the Server sets bit position 4 in the Server Greeting message to indicate Individual Session Control capability, then the Server and Session-Reflector MUST comply with the requirements of this memo to control sessions on an individual basis if desired.
section: "3.1"
rfc2119_level: MUST
