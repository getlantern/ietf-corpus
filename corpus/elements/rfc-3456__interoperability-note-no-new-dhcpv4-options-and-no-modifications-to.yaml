document: rfc-3456
kind: interoperability-note
summary: No new DHCPv4 options and no modifications to DHCPv4 (RFC 2131) are required for IPsec tunnel mode configuration, because the required configuration parameters are a subset of those already supported in DHCPv4 options (RFC 2132).
