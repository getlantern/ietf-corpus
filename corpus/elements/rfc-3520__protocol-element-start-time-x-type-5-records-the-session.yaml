document: rfc-3520
kind: protocol-element
summary: START_TIME (X-Type 5) records the session start time using NTP Timestamp Format (RFC 1305, sub-type 1) to enable replay attack detection. END_TIME (X-Type 6) records the authorized session end time to bound resource usage.
section: 3.3.5
topics:
