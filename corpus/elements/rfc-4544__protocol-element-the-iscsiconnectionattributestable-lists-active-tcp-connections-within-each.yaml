document: rfc-4544
kind: protocol-element
summary: The iscsiConnectionAttributesTable lists active TCP connections within each session. It contains InetAddressType/InetAddress and port for both local and remote sides, and a simplified connection state. No statistics are kept per connection; statistics are maintained at the session level.
