document: rfc-9635
kind: protocol-element
summary: 'An access token request object contains: access (array of objects/strings, REQUIRED, describes rights at the RS), label (string, REQUIRED for multiple-token requests, OPTIONAL otherwise), and flags (array of strings, OPTIONAL). The bearer flag requests a bearer token; absence means the token is key-bound.'
