document: rfc-4196
kind: interoperability-note
summary: For use of CBC mode in ESP with 64-bit ciphers, see RFC 2451. SEED-CBC follows the same structural conventions as other ESP CBC-mode ciphers but with a 128-bit (16-octet) block and IV size rather than 64-bit.
section: "2.1"
