document: rfc-7200
kind: protocol-element
summary: The load-control event package name is "load-control", carried in the Event and Allow-Events SIP header fields per RFC 6665. It distributes load-filtering policies from notifiers (servers experiencing or anticipating overload) to subscribers (upstream load-filtering servers).
section: "4.1"
topics:
