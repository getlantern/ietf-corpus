document: rfc-9211
kind: protocol-element
summary: The `collapsed` parameter is a Boolean indicating whether the request was collapsed with one or more other forward requests. If true, the response was successfully reused; if false, a new request had to be made. If absent, the request was not collapsed. Only meaningful when `fwd` is present.
section: "2.6"
topics:
    - http
