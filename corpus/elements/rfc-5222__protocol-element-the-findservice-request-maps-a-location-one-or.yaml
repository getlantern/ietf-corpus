document: rfc-5222
kind: protocol-element
summary: The <findService> request maps a location (one or more <location> elements) and a service URN to one or more service URIs. Attributes control recursion ('recursive'), service boundary format ('serviceBoundary'), and optional civic address validation ('validateLocation'). The <findServiceResponse> returns one or more <mapping> elements.
