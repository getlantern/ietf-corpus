document: rfc-3805
kind: normative-requirement
summary: If a critical binary alert was deleted from the table due to overflow and the alert condition still exists, the alert SHOULD be re-added when space allows, even without a subsequent state transition. This is also recommended for non-critical binary alerts.
section: 2.2.13.4
rfc2119_level: SHOULD
topics:
    - snmp
