document: rfc-8581
kind: normative-requirement
summary: When a Diameter Agent relays a request containing a SourceID AVP in the OC-Supported-Features AVP and the agent supports OC_PEER_REPORT, it MUST remove the received SourceID AVP and replace it with a SourceID AVP containing its own DiameterIdentity.
section: 6.1.1
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
