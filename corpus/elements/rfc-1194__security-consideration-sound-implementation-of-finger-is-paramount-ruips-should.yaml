document: rfc-1194
kind: security-consideration
summary: Sound implementation of Finger is paramount; RUIPs SHOULD protect against malformed inputs and implementations should be subjected to penetration testing. Finger is at the security perimeter of a host, comparable to Telnet, FTP, and SMTP, as demonstrated by the Morris worm.
section: "3.1"
topics:
    - security
