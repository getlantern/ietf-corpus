document: rfc-6446
kind: interoperability-note
summary: A notifier that does not understand this extension will not reflect the 'max-rate', 'min-rate', or 'adaptive-min-rate' Subscription-State header field parameters in NOTIFY requests; the absence of these parameters signals to the subscriber that no rate control is supported.
