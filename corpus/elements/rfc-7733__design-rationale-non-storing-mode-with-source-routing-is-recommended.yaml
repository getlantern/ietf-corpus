document: rfc-7733
kind: design-rationale
summary: Non-storing mode with source routing is recommended for P2P-RPL because the majority of devices are Class 0 with extremely constrained memory; source routing avoids the need to store routing tables at intermediate nodes. Header compression (RFC6282, RFC6554) allows source-routed packets to fit in a single Layer 2 frame for networks up to 5 hops.
section: 2.2.7
topics:
    - routing
