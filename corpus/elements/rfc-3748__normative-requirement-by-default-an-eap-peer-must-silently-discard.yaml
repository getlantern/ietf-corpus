document: rfc-3748
kind: normative-requirement
summary: By default, an EAP peer MUST silently discard a 'canned' Success packet (one sent immediately upon connection without a completed EAP method exchange). This prevents a rogue authenticator from bypassing mutual authentication by sending an unsolicited Success.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
