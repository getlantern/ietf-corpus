document: rfc-2794
kind: design-rationale
summary: The Home Domain Allocation Function (HDAF) is introduced as an intermediary that receives Registration Requests from foreign agents, extracts the NAI domain, and forwards requests to an appropriate Home Agent. This decouples home address allocation from static home agent configuration.
