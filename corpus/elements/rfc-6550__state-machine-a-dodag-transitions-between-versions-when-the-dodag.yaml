document: rfc-6550
kind: state-machine
summary: A DODAG transitions between versions when the DODAG root increments DODAGVersionNumber (global repair). Nodes re-joining the new version are not constrained by their Rank in the old version. Local repair within a version may use INFINITE_RANK poisoning to detach nodes from the sub-DODAG before reattachment.
section: 3.2.2
topics:
