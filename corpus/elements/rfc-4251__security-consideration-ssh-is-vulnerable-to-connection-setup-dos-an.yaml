document: rfc-4251
kind: security-consideration
summary: 'SSH is vulnerable to connection-setup DoS: an attacker can force the server through CPU- and memory-intensive key exchange without authenticating. Implementers SHOULD provide mitigations such as restricting connections to clients known to have valid users.'
section: 9.3.5
rfc2119_level: SHOULD
topics:
    - security
