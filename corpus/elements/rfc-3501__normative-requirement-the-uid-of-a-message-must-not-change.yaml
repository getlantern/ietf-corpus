document: rfc-3501
kind: normative-requirement
summary: The UID of a message MUST NOT change during the session and SHOULD NOT change between sessions. Any change of UIDs between sessions MUST be detectable using the UIDVALIDITY mechanism. Persistent UIDs are required to support disconnected/offline client resynchronization.
section: 2.3.1.1
rfc2119_level: MUST NOT
topics:
    - email
