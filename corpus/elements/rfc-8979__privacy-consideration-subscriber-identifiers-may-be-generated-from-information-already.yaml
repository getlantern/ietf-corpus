document: rfc-8979
kind: privacy-consideration
summary: Subscriber identifiers may be generated from information already in original packets (e.g., internal IP addresses) or collected from other domain sources (e.g., line identifiers). Because persistent identifiers facilitate tracking, non-persistent and indirect identifiers are RECOMMENDED, and identifier rotation can improve unlinkability per RFC 6973.
section: "7"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
