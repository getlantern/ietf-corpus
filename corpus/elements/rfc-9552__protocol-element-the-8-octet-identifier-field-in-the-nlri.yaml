document: rfc-9552
kind: protocol-element
summary: The 8-octet Identifier field in the NLRI carries the BGP-LS Instance-ID, which identifies the IGP routing domain. NLRIs from the same IGP instance share the same Instance-ID; different Instance-IDs indicate different IGP domains. Instance-ID 0 is RECOMMENDED when only a single protocol instance exists.
section: "5.2"
topics:
    - bgp
    - routing
