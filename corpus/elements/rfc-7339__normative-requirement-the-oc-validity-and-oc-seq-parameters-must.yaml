document: rfc-7339
kind: normative-requirement
summary: The "oc-validity" and "oc-seq" parameters MUST NOT be inserted by a SIP client in a request; they are server-only response parameters. A non-zero "oc-validity" MUST appear only alongside an "oc" parameter.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
