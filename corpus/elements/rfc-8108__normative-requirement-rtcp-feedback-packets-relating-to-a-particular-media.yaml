document: rfc-8108
kind: normative-requirement
summary: RTCP feedback packets relating to a particular media type SHOULD be sent by an SSRC that receives that media type. Codec control messages and notifications regarding RTP data processed by an endpoint MUST be sent from the SSRC used for that RTP data.
section: 5.4.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
