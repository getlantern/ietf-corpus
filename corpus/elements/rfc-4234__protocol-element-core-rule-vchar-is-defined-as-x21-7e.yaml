document: rfc-4234
kind: protocol-element
summary: Core rule VCHAR is defined as %x21-7E (visible/printing characters). CTL is %x00-1F / %x7F (control characters). OCTET is %x00-FF (8 bits of data). CHAR is %x01-7F (any 7-bit US-ASCII character excluding NUL).
section: B.1
extracted_by: claude-sonnet-4-6
