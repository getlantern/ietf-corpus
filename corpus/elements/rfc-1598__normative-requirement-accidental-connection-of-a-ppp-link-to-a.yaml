document: rfc-1598
kind: normative-requirement
summary: Accidental connection of a PPP link to a multipoint network SHOULD result in a misconfiguration indication. This can be detected by receiving multiple responses to a single LCP Configure-Request with the same Identifier from different framing addresses.
section: "4"
rfc2119_level: SHOULD
