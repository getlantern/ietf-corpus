document: rfc-9532
kind: normative-requirement
summary: The next-hop-aliases information SHOULD NOT be used for making security decisions about the identity of a resource accessed through the proxy, as it does not include DNSSEC information and is only as trustworthy as the proxy itself.
section: "4"
rfc2119_level: SHOULD NOT
