document: rfc-6638
kind: protocol-element
summary: The Scheduling Outbox Collection is used as the target for freebusy requests (via POST) and to manage outgoing scheduling privileges. It MUST report DAV:collection and CALDAV:schedule-outbox in its DAV:resourcetype property, and MUST NOT be a child of any calendar collection.
section: "2.1"
topics:
    - http
