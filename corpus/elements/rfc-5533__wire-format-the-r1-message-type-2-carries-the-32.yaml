document: rfc-5533
kind: wire-format
summary: The R1 message (Type=2) carries the 32-bit Initiator Nonce echoed from I1 and a new 32-bit Responder Nonce. The Responder Validator option MUST be included. The responder creates no per-initiator state when sending R1.
