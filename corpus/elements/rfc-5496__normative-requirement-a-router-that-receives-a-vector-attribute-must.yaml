document: rfc-5496
kind: normative-requirement
summary: A router that receives a Vector Attribute MUST use it, even if that router happens to have a route to the source. Only if the Vector address matches the router's own address is the attribute discarded.
section: 3.3.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
