document: rfc-8098
kind: privacy-consideration
summary: MDNs can reveal sensitive information including when a message was read, which email client and OS were used, mailing-list subscriber identities, and internal network topology from returned message headers. Recipients may silently ignore MDN requests to protect privacy.
section: "6.2"
topics:
    - email
    - privacy
