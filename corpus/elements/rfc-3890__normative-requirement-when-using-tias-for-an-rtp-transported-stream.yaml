document: rfc-3890
kind: normative-requirement
summary: When using TIAS for an RTP-transported stream, the 'maxprate' attribute, if possible to calculate, SHALL be included at the corresponding SDP level. 'maxprate' SHALL be included for all transports where a packet rate can be derived and TIAS is included.
section: 6.2.3
rfc2119_level: SHALL
topics:
    - realtime
    - rtp
