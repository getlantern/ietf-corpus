document: rfc-4806
kind: normative-requirement
summary: Where more than one trusted OCSP responder is to be identified, each responder hash SHALL be concatenated in the Certificate Authority field using the same method as for trust anchor hashes in Section 3.7 of IKEv2 (RFC 4306).
