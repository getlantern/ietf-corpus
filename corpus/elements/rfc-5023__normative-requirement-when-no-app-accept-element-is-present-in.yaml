document: rfc-5023
kind: normative-requirement
summary: When no app:accept element is present in an app:collection, clients SHOULD treat this as equivalent to an app:accept element containing 'application/atom+xml;type=entry'. If one app:accept element exists and is empty, clients SHOULD assume the Collection does not support creating new Entries.
section: 8.3.4
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
