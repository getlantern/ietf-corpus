document: rfc-9705
kind: normative-requirement
summary: If a node finds PHOP or PPHOP (for node-protected LSPs) does not support RI-RSVP-FRR extensions, it MUST reduce the refresh period in TIME_VALUES to the default short refresh interval and MUST NOT execute MP procedures from Section 4.3.
