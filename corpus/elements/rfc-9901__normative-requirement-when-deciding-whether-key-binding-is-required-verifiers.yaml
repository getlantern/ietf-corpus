document: rfc-9901
kind: normative-requirement
summary: When deciding whether Key Binding is required, Verifiers MUST NOT take into account whether the Holder has provided an SD-JWT+KB or a bare SD-JWT; the Key Binding requirement MUST be determined by the Verifier's own policy before examining the presentation, to prevent an attacker from stripping the KB-JWT.
section: "9.5"
rfc2119_level: MUST NOT
topics:
    - jose
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
