document: rfc-791
kind: design-rationale
summary: The 576-octet minimum reassembly datagram size was chosen to allow a 512-octet data block plus up to 64 octets of combined headers, accommodating a 60-octet maximum IP header and leaving room for higher-level protocol headers.
