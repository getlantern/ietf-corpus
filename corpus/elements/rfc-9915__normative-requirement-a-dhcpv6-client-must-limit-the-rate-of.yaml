document: rfc-9915
kind: normative-requirement
summary: A DHCPv6 client MUST limit the rate of DHCP messages it transmits or retransmits on a per-interface basis. A token-bucket approach is recommended; a suggested default is 20 messages per 20 seconds.
section: "14.1"
rfc2119_level: MUST
topics:
