document: rfc-4583
kind: design-rationale
summary: If 'floorctrl' is not used in an offer/answer exchange, by default the offerer acts as a floor control client and the answerer acts as a floor control server. This default avoids requiring 'floorctrl' in simple client-server scenarios.
