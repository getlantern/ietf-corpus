document: rfc-2110
kind: design-rationale
summary: Two URI-based linking mechanisms (Content-Location and CID/Content-ID) are both supported rather than mandating a single one because Content-Location enables use of real WWW URIs that remain verifiable against the live web, while CID URLs provide a self-contained reference scheme for objects not publicly available. Both methods must be supported for broad interoperability.
section: "8"
topics:
