document: rfc-4141
kind: protocol-element
summary: The Content-Convert MIME header field specifies permitted conversions for the associated MIME body-part. Its value is 'ANY', 'NONE', or an explicit list of permitted final forms using the [SYN] filter syntax. It may be used independently of the ESMTP extensions.
