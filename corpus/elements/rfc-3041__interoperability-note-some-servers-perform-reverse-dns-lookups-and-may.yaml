document: rfc-3041
kind: interoperability-note
summary: Some servers perform reverse-DNS lookups and may refuse service to clients whose addresses cannot be mapped to a DNS name that also maps back to the same address. Nodes using temporary addresses could register those addresses in DNS using random names (e.g., a string representation of the address itself) to accommodate such servers.
section: "4"
topics:
    - ip
    - dns
    - privacy
