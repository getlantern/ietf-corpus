document: rfc-3798
kind: protocol-element
summary: The Disposition-Notification-Options header provides extensible parameters to control MDN generation. Parameters have an importance of "required" or "optional"; if a required parameter is not understood, the MUA MUST NOT generate an MDN with any disposition type other than "failed".
section: "2.2"
topics:
    - email
