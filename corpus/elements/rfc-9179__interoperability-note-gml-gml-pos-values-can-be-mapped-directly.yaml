document: rfc-9179
kind: interoperability-note
summary: GML 'gml:pos' values can be mapped directly to the YANG grouping (with possible decimal64 precision loss). Mapping YANG back to GML is fully supported for Earth-based geodetic systems. GML's 'gml:validTime' time period maps to 'valid-until' at second resolution.
section: 5.1.3
topics:
    - yang
    - netconf
