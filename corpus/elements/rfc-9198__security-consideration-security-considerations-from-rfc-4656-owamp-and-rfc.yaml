document: rfc-9198
kind: security-consideration
summary: Security considerations from RFC 4656 (OWAMP) and RFC 5357 (TWAMP) apply to active measurement of live paths. The technique of varying packet fields to maintain a constant checksum does not introduce additional security concerns as it is part of normal synthetic traffic generation with minimal network-processing impact.
section: "7"
topics:
    - security
    - measurement
