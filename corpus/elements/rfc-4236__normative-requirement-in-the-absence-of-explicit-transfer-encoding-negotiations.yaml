document: rfc-4236
kind: normative-requirement
summary: In the absence of explicit transfer-encoding negotiations, an OCP agent MUST NOT send transfer-encoded application message bodies. An agent MUST terminate the OCP transaction if it cannot remove all transfer encodings before sending a message body.
section: "3.7"
rfc2119_level: MUST NOT
topics:
    - http
