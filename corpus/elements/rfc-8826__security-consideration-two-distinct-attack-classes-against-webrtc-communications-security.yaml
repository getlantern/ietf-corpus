document: rfc-8826
kind: security-consideration
summary: 'Two distinct attack classes against WebRTC communications security must be distinguished: retrospective compromise (calling service was honest during the call but later compromised) and during-call attack (active MITM by the calling service). Forward secrecy protects against the former, but protecting against the latter is extremely difficult because the calling service controls both the signaling channel and the browser UI.'
section: "4.3"
topics:
    - webrtc
    - security
    - crypto
