document: rfc-7260
kind: protocol-element
summary: 'A new RSVP Error Code 40 ''OAM Problem'' is defined with six error values: 1=MEP establishment not supported, 2=MIP establishment not supported, 3=Unsupported OAM Type, 4=Configuration Error, 5=OAM Type Mismatch, 6=Unsupported OAM Function. Values 32768-65535 are reserved for private use.'
