document: rfc-9018
kind: state-machine
summary: 'Deploying a new Server Secret MUST be done in three stages: Stage 1 — distribute new secret, keep generating with old, accept both; Stage 2 — begin generating with new secret, still accept both; Stage 3 — remove old secret. The operator SHOULD wait at least the longest zone TTL plus 1 hour between Stage 2 and Stage 3.'
section: "5"
topics:
