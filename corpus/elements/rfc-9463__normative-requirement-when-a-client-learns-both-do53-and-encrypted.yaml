document: rfc-9463
kind: normative-requirement
summary: When a client learns both Do53 and encrypted DNS resolvers from the same network, it is RECOMMENDED to prefer the encrypted DNS resolvers. If an authenticated encrypted connection cannot be established, the client MAY fall back to the Do53 resolver.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
