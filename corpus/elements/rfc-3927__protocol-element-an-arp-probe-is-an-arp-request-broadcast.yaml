document: rfc-3927
kind: protocol-element
summary: An ARP Probe is an ARP Request broadcast on the local link with the 'sender IP address' field set to all zeroes and 'target IP address' set to the address being probed. The 'sender hardware address' must contain the interface's hardware address; the 'target hardware address' should be set to all zeroes.
section: "1.2"
topics:
