document: rfc-5465
kind: protocol-element
summary: 'The NOTIFY command allows an IMAP client to request specific unsolicited notifications for specified mailboxes. It has two forms: NOTIFY NONE (cancels all notifications) and NOTIFY SET (replaces the current list of interesting events with a new list).'
section: "3.1"
topics:
