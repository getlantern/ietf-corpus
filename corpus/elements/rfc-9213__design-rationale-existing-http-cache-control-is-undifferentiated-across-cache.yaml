document: rfc-9213
kind: design-rationale
summary: Existing HTTP Cache-Control is undifferentiated across cache tiers — while s-maxage targets shared caches, not all directives (e.g., stale-while-revalidate) have equivalent targeting. Ad hoc implementations exist but have low interoperability, motivating a standard framework for targeted cache control.
section: "1"
topics:
