document: rfc-3118
kind: normative-requirement
summary: A client MUST be configurable to decline unauthenticated DHCP messages, and SHOULD be configured by default to decline unauthenticated messages. If a client does accept an unauthenticated message, it SHOULD inform local users and SHOULD log the event.
section: 5.5.1
rfc2119_level: MUST
topics:
    - security
