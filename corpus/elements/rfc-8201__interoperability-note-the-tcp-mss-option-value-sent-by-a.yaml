document: rfc-8201
kind: interoperability-note
summary: The TCP MSS option value sent by a node reflects EMTU_R (the receiver's reassembly limit) and is independent of the sender's PMTU. The peer uses the received MSS as an upper bound on segment size regardless of its own PMTU value.
section: "5.4"
topics:
    - ip
    - tcp
