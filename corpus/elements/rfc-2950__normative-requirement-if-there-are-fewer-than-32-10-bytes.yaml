document: rfc-2950
kind: normative-requirement
summary: If there are fewer than 32 (10) bytes of key data, the first 16 (5) bytes are used as keyid 0 in each direction. If there are at least 32 (10) bytes, the first 16 (5) are used for client-to-server encryption and the second 16 (5) for server-to-client encryption.
section: "5"
rfc2119_level: REQUIRED
topics:
    - crypto
