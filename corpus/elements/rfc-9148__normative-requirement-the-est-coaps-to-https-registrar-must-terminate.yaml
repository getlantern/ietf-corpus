document: rfc-9148
kind: normative-requirement
summary: The EST-coaps-to-HTTPS Registrar MUST terminate EST-coaps downstream and initiate EST connections over TLS upstream. The Registrar MUST authenticate and optionally authorize client requests, and MUST reassemble blocks before translating binary content to Base64.
section: "5"
rfc2119_level: MUST
topics:
