document: rfc-3498
kind: protocol-element
summary: 'The apsStatusTable (augments apsConfigEntry) provides per-group status: apsStatusK1K2Rcv and apsStatusK1K2Trans carry the current received and transmitted K1/K2 bytes on the protection channel. apsStatusCurrent is a BITS object indicating active conditions: modeMismatch, channelMismatch, psbf, feplf, and extraTraffic.'
