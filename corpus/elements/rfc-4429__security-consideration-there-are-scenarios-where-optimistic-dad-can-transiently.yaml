document: rfc-4429
kind: security-consideration
summary: There are scenarios where Optimistic DAD can transiently create incorrect Neighbor Cache entries. For example, if a router sends an NS for an address and the Optimistic Node responds before the legitimate owner, the router may forward queued packets to the wrong host. These conditions are expected to be short-lived.
section: "5"
topics:
