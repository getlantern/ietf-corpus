document: rfc-2940
kind: protocol-element
summary: copsClientServerConfigPriority (Integer32, read-create) controls the order in which configured COPS servers are attempted; higher numbers are tried first. Servers learned via PDP-Redirect always take precedence over any entry in this table regardless of priority.
