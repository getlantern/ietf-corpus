document: rfc-6790
kind: normative-requirement
summary: An egress LSR that signals both ELC and implicit null (PHP) MUST pop the ELI and the EL when it encounters a packet with the ELI as the topmost label. Any other LSR, including PHP LSRs, MUST drop such packets per Section 3.18 of RFC 3031.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
