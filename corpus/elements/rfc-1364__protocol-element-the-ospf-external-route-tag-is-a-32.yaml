document: rfc-1364
kind: protocol-element
summary: The OSPF external route tag is a 32-bit field used to encode BGP ORIGIN and AS_PATH attributes when redistributing routes between OSPF and BGP. The Completeness (c) and PathLength (pl) sub-fields determine the resulting BGP ORIGIN (IGP, EGP, or INCOMPLETE) and AS_PATH.
section: "4"
topics:
