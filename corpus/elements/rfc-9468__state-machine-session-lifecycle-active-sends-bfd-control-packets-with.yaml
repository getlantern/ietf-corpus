document: rfc-9468
kind: state-machine
summary: 'Session lifecycle: Active sends BFD Control packets with ''Your Discriminator''=0. Passive receives and creates session (state: Init). Both exchange packets to reach Up state. On session failure or establishment timeout, passive transitions to Down, stops sending, and deletes session awaiting re-initiation by active.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
