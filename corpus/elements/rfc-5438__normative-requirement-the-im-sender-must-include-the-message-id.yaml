document: rfc-5438
kind: normative-requirement
summary: The IM Sender MUST include the Message-ID header field in the IM for which he wishes to receive an IMDN. The Message-ID MUST be selected to minimize collision chance and be prohibitive for attackers to forge; it is RECOMMENDED to use a cryptographically secure PRNG with at least 64 bits of randomness.
section: "6.3"
rfc2119_level: MUST
topics:
    - realtime
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
