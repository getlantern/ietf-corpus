document: rfc-9914
kind: normative-requirement
summary: When installing a Track using Storing Mode P-DAOs, the Root MUST signal the egress segment first (sending P-DAO to the egress node and awaiting acknowledgment) before signaling upstream segments toward the ingress. This ordering ensures that routes are in place before traffic is steered onto them.
section: 3.5.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
