document: rfc-9567
kind: security-consideration
summary: Use of DNS error reporting may expose local configuration mistakes in the reporting resolver—such as stale DNSSEC trust anchors—to the monitoring agent, since the error codes are derived from local resolver state.
section: "9"
topics:
    - dns
    - security
    - privacy
