document: rfc-5661
kind: design-rationale
summary: Sessions and RECLAIM_COMPLETE were made REQUIRED in NFSv4.1, intentionally diverging from minor versioning guidelines that prohibit mandatory new features. Both are infrastructural changes that broadly simplify implementation; making them optional would add undue complexity to protocol definition and all dependent features.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
