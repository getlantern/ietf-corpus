summary: 'The module imports and depends on four external YANG modules: ietf-netconf-acm (RFC 8341) for NACM, ietf-routing-types (RFC 8294) for route-target and route-distinguisher types, ietf-yang-types (RFC 6991) for yang:date-and-time, and ietf-packet-fields (RFC 8519) for ACL header field groupings used in QoS classification.'
