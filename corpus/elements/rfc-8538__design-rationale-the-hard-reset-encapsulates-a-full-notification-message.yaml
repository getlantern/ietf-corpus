document: rfc-8538
kind: design-rationale
summary: The Hard Reset encapsulates a full NOTIFICATION message (ErrCode, Subcode, Data) in its data portion so the actual reason for termination is not lost; otherwise, wrapping in Cease/Hard Reset would discard the original error context.
