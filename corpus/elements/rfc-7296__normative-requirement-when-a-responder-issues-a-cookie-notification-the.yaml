document: rfc-7296
kind: normative-requirement
summary: When a responder issues a COOKIE notification, the initiator MUST retry IKE_SA_INIT with the COOKIE notification as the first payload and all other payloads unchanged. Cookie data MUST be between 1 and 64 octets.
section: "2.6"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - security
