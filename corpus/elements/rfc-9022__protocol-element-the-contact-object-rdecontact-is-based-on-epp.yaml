document: rfc-9022
kind: protocol-element
summary: The Contact Object (rdeContact) is based on EPP contact mapping (RFC 5733) and includes server-unique ID, ROID, statuses, up to two <postalInfo> elements (internationalized and/or localized), voice, fax, email, sponsoring registrar, optional transfer data, and an optional <disclose> element controlling third-party disclosure.
