document: rfc-4733
kind: interoperability-note
summary: For backward compatibility with RFC 2833, if a sender receives no 'events' parameter from the remote end, it SHOULD assume support for DTMF events 0–15 but for no other events. This document removes the RFC 2833 requirement that all compliant implementations support DTMF events.
section: 2.5.1.1
topics:
    - rtp
    - realtime
    - voip
