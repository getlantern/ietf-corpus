document: rfc-2784
kind: normative-requirement
summary: If the Checksum Present bit is set to one, a compliant implementation MUST accept and process the Checksum and Reserved1 fields. The Checksum field contains valid information only when this bit is set.
section: "2.2"
rfc2119_level: MUST
