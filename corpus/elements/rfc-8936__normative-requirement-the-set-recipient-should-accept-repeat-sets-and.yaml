document: rfc-8936
kind: normative-requirement
summary: The SET Recipient SHOULD accept repeat SETs and acknowledge the SETs regardless of whether the Recipient believes it has already acknowledged the SETs previously. A SET Transmitter MAY limit the number of times it attempts to deliver a SET.
section: "2.4"
rfc2119_level: SHOULD
