document: rfc-1894
kind: normative-requirement
summary: The DSN-Gateway field MUST appear in any DSN translated by a gateway from a foreign system into DSN format, and MUST NOT appear otherwise. It identifies the gateway that performed the translation.
section: 2.2.3
rfc2119_level: MUST
