document: rfc-8054
kind: design-rationale
summary: 'COMPRESS is preferred over TLS-level compression because: it can be implemented more easily by both clients and servers; it benefits from intimate knowledge of NNTP''s state machine for dynamic optimization; and it can be activated after authentication, reducing exposure to CRIME-style attacks that TLS-level compression cannot avoid.'
section: "1.1"
topics:
    - security
    - tls
