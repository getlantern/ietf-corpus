document: rfc-1448
kind: protocol-element
summary: GetRequest-PDU processing returns noSuchObject in the variable binding if the OID prefix does not match any accessible variable, or noSuchInstance if the prefix matches but the exact instance is not found. On any other processing failure, a genErr response with the error-index set to the failed binding is returned.
section: 4.2.1
