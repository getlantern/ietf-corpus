document: rfc-3380
kind: normative-requirement
summary: The Set-Job-Attributes validation is performed as if the job were submitted originally with the new attribute values and 'ipp-attribute-fidelity' set to 'true'; if such a Job Creation would be accepted, the Set-Job-Attributes MUST be accepted, and if it would be rejected, the Set-Job-Attributes MUST be rejected and the Job MUST be unchanged.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
