document: rfc-2214
kind: normative-requirement
summary: If a network element uses slack Si to reduce resources reserved for flow i, it MUST store Si and subsequently use the same slack Si without any further computation when reservation refreshes are received, to guarantee consistency in the reservation process.
section: "3.1"
rfc2119_level: MUST
topics:
    - qos
