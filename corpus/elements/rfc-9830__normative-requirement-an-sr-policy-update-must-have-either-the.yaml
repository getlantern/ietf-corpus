document: rfc-9830
kind: normative-requirement
summary: An SR Policy update MUST have either the NO_ADVERTISE community, at least one Route Target extended community in IPv4-address format, or both. If neither is present, the update MUST be considered malformed.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
    - bgp
