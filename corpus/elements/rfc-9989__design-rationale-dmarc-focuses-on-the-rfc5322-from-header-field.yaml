document: rfc-9989
kind: design-rationale
summary: DMARC focuses on the RFC5322.From header field because it is the only header field required to be present in a valid email message (RFC 5322) and is the identifier end users see as the apparent sender, making it the primary target for phishing and spoofing despite being trivially forgeable historically.
section: "4.2"
topics:
    - email
    - security
