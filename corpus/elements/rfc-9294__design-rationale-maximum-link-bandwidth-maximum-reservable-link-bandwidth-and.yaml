document: rfc-9294
kind: design-rationale
summary: Maximum Link Bandwidth, Maximum Reservable Link Bandwidth, and Unreserved Bandwidth are forced to top-level TLVs even when received in IS-IS ASLA sub-TLVs because these attributes are either non-application-specific or RSVP-TE-specific, and the legacy encoding must be maintained for interoperability.
