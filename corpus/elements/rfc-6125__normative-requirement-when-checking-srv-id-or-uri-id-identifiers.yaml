document: rfc-6125
kind: normative-requirement
summary: When checking SRV-ID or URI-ID identifiers, a client MUST check both the DNS domain name portion and the application service type portion. The service name in an SRV-ID MUST be matched case-insensitively; the scheme name in a URI-ID MUST also be matched case-insensitively.
section: "6.5"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
