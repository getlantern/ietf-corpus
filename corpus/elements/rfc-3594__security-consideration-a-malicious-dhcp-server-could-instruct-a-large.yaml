document: rfc-3594
kind: security-consideration
summary: A malicious DHCP server could instruct a large number of MTAs to invalidate all security tickets simultaneously, causing a Denial of Service (DoS) condition as the devices concurrently attempt to re-authenticate and obtain new Kerberos tickets from the security infrastructure.
section: "6"
topics:
