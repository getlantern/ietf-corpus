document: rfc-2456
kind: protocol-element
summary: Four Counter32 supporting objects—appnLocalTgTableChanges, appnPortTableChanges, appnLsTableChanges, and dlurDlusTableChanges—count the number of status changes in each respective table since the APPN node was last reinitialized. These counters are incremented whenever a notification-worthy condition is detected, regardless of whether the notification is enabled.
section: "4"
