document: rfc-822
kind: normative-requirement
summary: The 'Sender' field mailbox should NEVER be used automatically in a recipient's reply message. Replies should go to 'Reply-To' if present, otherwise to 'From'.
section: 4.4.4
rfc2119_level: MUST NOT
