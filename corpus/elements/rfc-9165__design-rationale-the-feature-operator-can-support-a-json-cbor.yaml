document: rfc-9165
kind: design-rationale
summary: The .feature operator can support a JSON/CBOR switch idiom (e.g., JC<J,C> = J .feature "json" / C .feature "cbor"), though CDDL currently has no way to enforce mutually exclusive use of features as would be required for such a switch.
section: "4"
topics:
