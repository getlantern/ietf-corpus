document: rfc-7729
kind: security-consideration
summary: The SM LFB does not alter the ForCES model (RFC 5812) or protocol (RFC 5810) security properties. The entity instructing FE CE associations must already be a trusted FE Manager or an associated CE; the FE has no mechanism to detect a faulty, rogue, or hacked CE and will execute any CE-issued command.
section: "6"
topics:
    - security
    - routing
