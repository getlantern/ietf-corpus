document: rfc-8202
kind: normative-requirement
summary: When the IID-TLV appears (with a non-zero IID) in an SNP or LSP, exactly one ITID MUST be present. If no ITIDs or multiple ITIDs are present, or the IID is zero, the PDU MUST be ignored.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
