document: rfc-8899
kind: normative-requirement
summary: Any received PTB message MUST be validated before it is used to update PLPMTU discovery information. A PTB message that does not complete validation MUST NOT be further utilized by the DPLPMTUD method.
section: 4.6.1
rfc2119_level: MUST
