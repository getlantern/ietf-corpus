document: rfc-4201
kind: wire-format
summary: For Interface Identification TLV types 3, 4, and 5, the Value field has an identical format to the contents of the C-Type 1 LSP_TUNNEL_INTERFACE_ID object defined in RFC 3477. This results in renaming the 'IP Address' field from RFC 3471.
