document: rfc-8966
kind: normative-requirement
summary: 'The metric computation function M(c, m) MUST satisfy: M is infinite if the link cost c is infinite, and M is strictly monotonic (M(c, m) > m). The additive metric M(c, m) = c + m is the RECOMMENDED default, as it satisfies both required conditions and the desirable left-distributivity property.'
section: 3.5.2
rfc2119_level: MUST
topics:
    - routing
