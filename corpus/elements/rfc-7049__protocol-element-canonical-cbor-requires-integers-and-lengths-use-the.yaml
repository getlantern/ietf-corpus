document: rfc-7049
kind: protocol-element
summary: 'Canonical CBOR requires: integers and lengths use the shortest possible encoding; map keys are sorted by length (shorter first), then by byte-wise lexical value for equal-length keys; indefinite-length items are forbidden. These rules ensure two encoders producing the same input yield identical output.'
section: "3.9"
topics:
    - cbor
