document: rfc-9917
kind: interoperability-note
summary: Backward compatibility with existing Flex-Algorithm implementations is guaranteed for new path computation rules because nodes that do not support a new constraint will not participate in a Flex-Algorithm whose winning FAD specifies that constraint. New rules may therefore be inserted at any position in the registry without disrupting existing deployments.
section: 12.3.1
topics:
    - routing
    - mpls
