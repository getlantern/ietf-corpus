document: rfc-8944
kind: security-consideration
summary: NETCONF access to this module MUST use SSH (RFC 6242) as mandatory-to-implement secure transport; RESTCONF MUST use TLS 1.3 (RFC 8446). The Network Configuration Access Control Model (NACM, RFC 8341) MUST be vigorously applied to prevent unauthorized clients from adding, removing, or modifying topology elements, which could disrupt services in configured (intended) topologies.
section: "6"
topics:
    - security
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
