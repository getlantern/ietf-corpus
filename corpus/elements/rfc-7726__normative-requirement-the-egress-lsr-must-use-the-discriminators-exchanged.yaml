document: rfc-7726
kind: normative-requirement
summary: The egress LSR MUST use the discriminators exchanged when the session was brought UP to signal any session state change to the ingress, and SHOULD reset them to zero after transmitting bfd.detectMult packets once the session transitions to DOWN.
section: "2.3"
rfc2119_level: MUST
topics:
