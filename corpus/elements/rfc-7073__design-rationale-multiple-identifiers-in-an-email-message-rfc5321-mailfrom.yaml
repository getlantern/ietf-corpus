document: rfc-7073
kind: design-rationale
summary: Multiple identifiers in an email message (RFC5321.MailFrom, RFC5322.From, RFC5321.HELO) may need separate reputation queries. The 'identity' field in replies exposes the context in which each identifier was extracted, particularly distinguishing validated identifiers (e.g., DKIM-signed domains) from unauthenticated ones.
section: "3.3"
topics:
    - email
