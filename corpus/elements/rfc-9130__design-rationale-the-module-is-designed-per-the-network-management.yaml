document: rfc-9130
kind: design-rationale
summary: The module is designed per the Network Management Datastore Architecture (NMDA, RFC 8342), meaning configuration and operational state are unified in a single schema rather than split across separate '-state' modules as in the pre-NMDA pattern. This avoids the duplication problem of earlier YANG modules.
