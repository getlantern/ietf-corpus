document: rfc-6851
kind: normative-requirement
summary: When messages are moved to a target mailbox, if the server stores modification sequences for that mailbox, it MUST generate and assign new modification sequence numbers to the moved messages that are higher than the highest modification sequence of any message originally in that mailbox.
section: "4.4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
