document: rfc-2238
kind: security-consideration
summary: 'The hprRtpPathSwitchTrigger object is the sole read-write object with operational impact: setting it to switchPathNow can trigger path switches that, if done frequently across many RTP connections, can adversely affect overall network performance. SNMP access to this object is recommended to be restricted.'
section: "8"
topics:
