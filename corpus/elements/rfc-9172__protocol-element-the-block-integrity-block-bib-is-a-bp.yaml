document: rfc-9172
kind: protocol-element
summary: The Block Integrity Block (BIB) is a BP extension block that ensures plaintext integrity of its security targets. BIBs MAY be verified at any hop, MUST NOT target security blocks defined in this specification, and MUST NOT be used for integrity protection of BCB-generated ciphertext.
section: "3.7"
topics:
