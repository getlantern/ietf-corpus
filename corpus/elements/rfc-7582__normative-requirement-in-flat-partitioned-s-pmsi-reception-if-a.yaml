document: rfc-7582
kind: normative-requirement
summary: In Flat Partitioned S-PMSI reception, if a (C-*,C-G-BIDIR) packet is received on a P-tunnel whose root node is not the distinguished PE for that C-flow, the packet MUST be discarded. This prevents data duplication.
section: 3.2.1.3
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
