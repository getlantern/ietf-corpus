document: rfc-8130
kind: normative-requirement
summary: In the Offer/Answer model, 'bitrate' is a bidirectional parameter and both sides MUST use a common 'bitrate' value or values. The initial bitrate used by both parties SHALL be the first bitrate specified in the answerer response.
section: "4.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - sip
