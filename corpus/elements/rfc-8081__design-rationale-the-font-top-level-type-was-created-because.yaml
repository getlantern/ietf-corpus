document: rfc-8081
kind: design-rationale
summary: The 'font' top-level type was created because existing font subtypes registered under 'application' were severely under-utilized while developers were spontaneously using intuitive but unregistered types like 'font/woff' and 'font/ttf'. Data showed web font adoption grew from 1% in 2010 to 50% by 2015, while officially defined 'application/font-*' types saw very limited use.
section: "2"
topics:
