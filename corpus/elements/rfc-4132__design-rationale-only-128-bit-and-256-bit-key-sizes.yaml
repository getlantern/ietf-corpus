document: rfc-4132
kind: design-rationale
summary: Only 128-bit and 256-bit key sizes are defined in the cipher suites (192-bit is omitted), matching the subset defined for AES cipher suites in RFC 3268, on the grounds that these are 'efficient and practical enough for most uses, including high-security applications.'
