document: rfc-8138
kind: wire-format
summary: 'The Critical 6LoRH (6LoRHC) uses a 2-byte base header: bits 10 0 followed by a 5-bit Type-Specific Extension (TSE) field and an 8-bit Type field. Length is implied by the Type/TSE rather than explicitly encoded in bytes; a node MUST silently discard packets with an unrecognized Critical 6LoRH Type.'
section: "4.2"
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
