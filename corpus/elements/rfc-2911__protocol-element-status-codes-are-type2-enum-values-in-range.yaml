document: rfc-2911
kind: protocol-element
summary: 'Status codes are type2 enum values in range 0x0000 to 0x7FFF. Successful: 0x0000 (successful-ok), 0x0001 (ignored-or-substituted-attributes), 0x0002 (conflicting-attributes). Client errors span 0x0400–0x040F including charset-not-supported (0x040D) and conflicting-attributes (0x040E). Server errors span 0x0500–0x0509.'
section: 3.1.6.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
