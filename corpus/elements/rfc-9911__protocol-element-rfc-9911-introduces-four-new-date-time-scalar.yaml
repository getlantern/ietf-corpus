document: rfc-9911
kind: protocol-element
summary: 'RFC 9911 introduces four new date/time scalar types: ''date'' (date interval with optional timezone), ''date-no-zone'' (date without timezone), ''time'' (daily recurrent time with optional timezone, allowing leap second value 60), and ''time-no-zone'' (time without timezone). All are string types with regex patterns aligned to RFC 3339 and RFC 9557.'
