document: rfc-8227
kind: normative-requirement
summary: The RPS processes in each ring node MUST communicate using the Generic Associated Channel (G-ACh). Each node is assigned a node ID that MUST be unique on each ring; the maximum number of nodes supported is 127, with valid node ID values of 1–127.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
