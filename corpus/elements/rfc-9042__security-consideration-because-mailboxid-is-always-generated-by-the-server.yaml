document: rfc-9042
kind: security-consideration
summary: Because MAILBOXID is always generated by the server, implementations MUST NOT allow Sieve to circumvent this protection by creating mailboxes with a specified MAILBOXID via :create and :mailboxid for a nonexistent mailbox. Implementations are also referred to the Security Considerations of RFC 5228 and RFC 8474.
section: "8"
rfc2119_level: MUST NOT
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
