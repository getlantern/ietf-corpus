document: rfc-9825
kind: security-consideration
summary: If an attacker can modify administrative tags on OSPF routes used for route redistribution policy, affected routes could be prevented from being advertised in required routing domains (denial of service) or advertised into domains where they should not be (routing vulnerability). Administrative tags are generally less critical than core topology information but their security impact depends on their application.
section: "8"
topics:
    - routing
    - security
