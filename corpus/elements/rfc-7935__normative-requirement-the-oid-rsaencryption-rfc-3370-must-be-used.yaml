document: rfc-7935
kind: normative-requirement
summary: The OID rsaEncryption (RFC 3370) MUST be used for the SignerInfo signatureAlgorithm field when generating CMS SignedData objects; however, RPKI implementations MUST accept either rsaEncryption or sha256WithRSAEncryption when verifying CMS SignedData objects.
section: "2"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
