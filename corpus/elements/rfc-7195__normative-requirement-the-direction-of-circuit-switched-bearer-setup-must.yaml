document: rfc-7195
kind: normative-requirement
summary: The direction of circuit-switched bearer setup MUST be negotiated during the offer/answer exchange using the RFC 4145 'setup' attribute ('active', 'passive', 'actpass', 'holdconn') to avoid both endpoints simultaneously initiating a connection.
section: 5.3.1
rfc2119_level: MUST
