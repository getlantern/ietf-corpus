document: rfc-9803
kind: protocol-element
summary: The <ttl:info> element is used by clients in EPP <info> commands to request TTL data. It has a single optional boolean 'policy' attribute defaulting to 'false', selecting between Default Mode (non-default TTLs only) and Policy Mode (all supported types with min/default/max bounds).
section: 1.2.1.3
