document: rfc-5420
kind: design-rationale
summary: 'RFC 5420 changes the encoding of the TLV Length field from RFC 4420: the Length field now indicates the total length of the whole TLV (Type + Length + Value), not just the Value field. This makes the encoding consistent with the subobject format in RFC 3209 and the TLV format in RFC 3471.'
