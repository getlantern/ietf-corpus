document: rfc-7286
kind: interoperability-note
summary: DNS resolution performed on the wrong interface in a multi-interfaced host (per RFC 6418) can return an ALTO server that provides suboptimal or incorrect guidance; selecting the best interface for DNS resolution in multi-interface environments is out of scope for this document.
