document: rfc-2115
kind: interoperability-note
summary: frCompliance0 defines the compliance statement for objects and the trap defined in RFC 1315 (the SMIv1 predecessor), using mandatory groups frPortGroup0 and frCircuitGroup0. This allows implementations to claim conformance to either the new RFC 2115 profile or the legacy RFC 1315 profile.
