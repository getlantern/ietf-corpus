document: rfc-9801
kind: design-rationale
summary: PLE provides a layer network independent of and beneath SONET/SDH, allowing add/drop multiplexers and cross-connects to be interconnected without the PE interfering with multiplexing structures. This is a key distinction from Circuit Emulation over Packet (CEP, RFC 4842), which operates at the same level as SONET/SDH and performs per-SPE/VT/VC multiplexing and demultiplexing.
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
