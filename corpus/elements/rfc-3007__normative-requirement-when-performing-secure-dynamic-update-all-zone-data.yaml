document: rfc-3007
kind: normative-requirement
summary: When performing secure dynamic update, all zone data modified in a signed zone MUST be signed by a relevant zone key, completely disassociating authentication of the update request from authentication of the data itself.
section: "1.4"
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
