document: rfc-3097
kind: design-rationale
summary: RFC 2961 assigned Message Type 12 to Bundle messages while RFC 2747 had already assigned that value to Integrity Response messages. The conflict is resolved by renumbering RFC 2747's messages rather than RFC 2961's because the refresh reduction extension (RFC 2961) entered field deployment before publication and before the conflict was noticed, making it harder to update those deployments.
section: "1"
topics:
    - security
