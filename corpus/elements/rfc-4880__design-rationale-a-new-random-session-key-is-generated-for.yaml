document: rfc-4880
kind: design-rationale
summary: 'A new random session key is generated for each encrypted message and encrypted separately to each recipient''s public key. This hybrid encryption model limits exposure: compromise of one recipient''s private key only reveals messages addressed to that recipient, not a long-term symmetric key.'
section: "2.1"
topics:
    - crypto
    - security
