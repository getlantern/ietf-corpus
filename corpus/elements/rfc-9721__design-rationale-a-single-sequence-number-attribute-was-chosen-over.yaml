document: rfc-9721
kind: design-rationale
summary: A single sequence number attribute was chosen over two separate sequence numbers for MAC and IP route components of MAC+IP RT-2. Maintaining two separate sequence numbers would add significant complexity, debugging challenges, and backward compatibility issues.
