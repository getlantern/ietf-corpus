document: rfc-4295
kind: design-rationale
summary: The MIB is intentionally kept simple while meeting essential monitoring and control needs. Wherever possible, existing MIBs (IPSec MIB, Neighbor Discovery MIB, Tunnel MIB RFC 4087) are reused rather than duplicating management objects in the MOBILEIPV6-MIB.
