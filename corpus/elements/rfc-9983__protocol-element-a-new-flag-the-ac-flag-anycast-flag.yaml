document: rfc-9983
kind: protocol-element
summary: A new flag, the AC-Flag (Anycast Flag), with value 0x10, is introduced in the OSPFv2 Extended Prefix TLV Flags field to advertise the anycast property of a prefix. Its sole meaning is that the prefix is intended to be advertised by multiple nodes.
section: "2"
