summary: The value 2 MUST be used as the Application-Id in all AMR/AMA and HAR/HAA commands, and in all ACR/ACA commands because this application defines new mandatory accounting AVPs. The value 0 SHOULD be used for STR/STA and ASR/ASA commands.
