document: rfc-4318
kind: protocol-element
summary: dot1dStpPortAdminEdgePort is a read-write TruthValue representing the administrative Edge Port parameter. Setting it to true(1) assumes edge-port status; setting it also sets dot1dStpPortOperEdgePort, though OperEdgePort reverts to false upon receipt of a BPDU.
