document: rfc-2334
kind: design-rationale
summary: 'Cache entry ''newness'' is determined by three conditions in order: matching Cache Key, matching Originator ID, and a strictly greater CSA Sequence Number. This three-part key ensures that entries for the same resource but from different originators are kept distinct and the most recently modified state wins.'
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
