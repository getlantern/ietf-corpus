document: rfc-2875
kind: protocol-element
summary: The Static DH POP process derives a shared secret ZZ = g^xy mod p using the entity's ephemeral private key y and the recipient's public key Rpub, then derives a temporary key K = SHA1(LeadingInfo | ZZ | TrailingInfo) where LeadingInfo is the Subject DN and TrailingInfo is the Issuer DN from the recipient's certificate.
section: "3"
