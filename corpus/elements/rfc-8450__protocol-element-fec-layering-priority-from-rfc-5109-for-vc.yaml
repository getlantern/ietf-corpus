document: rfc-8450
kind: protocol-element
summary: 'FEC layering priority (from RFC 5109) for VC-2 streams, in descending order: (1) Sequence Headers, (2) Fragments with Transform Parameters, (3) Fragments with Coded Slices, (4) Auxiliary Data and End of Sequence, (5) Padding. It is RECOMMENDED that one FEC layer protects Sequence Headers and a second protects all Fragments.'
