document: rfc-9350
kind: interoperability-note
summary: This extension introduces no new backward-compatibility issues. IS-IS, OSPFv2, and OSPFv3 all have well-defined handling of unrecognized TLVs and sub-TLVs, allowing routers that do not implement Flex-Algorithm to coexist with those that do.
