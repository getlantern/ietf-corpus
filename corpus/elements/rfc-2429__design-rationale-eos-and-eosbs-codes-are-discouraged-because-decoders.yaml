document: rfc-2429
kind: design-rationale
summary: EOS and EOSBS codes are discouraged because decoders may misinterpret the loss of such a packet as loss of essential video data and suppress subsequent video display. Since these codes do not affect picture decoding, sending them introduces unnecessary risk.
section: 5.1.3
topics:
    - rtp
    - realtime
