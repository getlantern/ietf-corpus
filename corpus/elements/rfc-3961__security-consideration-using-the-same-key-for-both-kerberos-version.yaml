document: rfc-3961
kind: security-consideration
summary: 'Using the same key for both Kerberos version 4 and version 5 in dual-version implementations enables a cross-protocol attack: version 4''s encryption-of-constant-plaintext oracle can be exploited to attack version 5 sessions. This makes using a single key for multiple purposes unwise.'
section: "10"
topics:
    - crypto
    - security
