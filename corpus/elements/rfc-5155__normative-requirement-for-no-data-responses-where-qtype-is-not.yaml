document: rfc-5155
kind: normative-requirement
summary: For No Data responses where QTYPE is not DS, the server MUST include the NSEC3 RR that matches QNAME, and that NSEC3 RR MUST NOT have the bits for QTYPE or CNAME set in its Type Bit Maps field.
section: 7.2.3
rfc2119_level: MUST
topics:
    - dns
