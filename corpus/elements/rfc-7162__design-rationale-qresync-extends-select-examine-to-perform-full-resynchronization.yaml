document: rfc-7162
kind: design-rationale
summary: QRESYNC extends SELECT/EXAMINE to perform full resynchronization—including expunged message discovery—in a single round trip, eliminating the need for clients (especially mobile clients subject to frequent disconnects) to hold concurrent IMAP connections or issue separate UID SEARCH commands solely for resynchronization.
section: "1"
