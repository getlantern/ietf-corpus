document: rfc-4916
kind: security-consideration
summary: A signed connected identity (From URI accompanied by a valid Identity header field) reflects the result of retargeting but says nothing about the legitimacy of that retargeting or any subsequent identity change. History information (RFC 4244) may provide additional hints about how the connected user was reached.
section: "7"
topics:
