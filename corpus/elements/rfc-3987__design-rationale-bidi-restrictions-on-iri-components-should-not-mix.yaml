document: rfc-3987
kind: design-rationale
summary: Bidi restrictions on IRI components (SHOULD NOT mix rtl and ltr characters; rtl components SHOULD start and end with rtl characters) are given as SHOULDs rather than MUSTs because for IRIs never presented visually they are irrelevant, but for general IRIs they are critical for consistent visual-to-logical round-tripping.
section: "4.2"
topics:
