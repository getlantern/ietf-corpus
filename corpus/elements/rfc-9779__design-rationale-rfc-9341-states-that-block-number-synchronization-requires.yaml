document: rfc-9779
kind: design-rationale
summary: RFC 9341 states that block number synchronization requires time-synchronized nodes. This document clarifies that time synchronization is not necessary because the block number on the responder can be synchronized based on the received LM query messages, broadening applicability.
section: "5.5"
topics:
    - mpls
    - measurement
