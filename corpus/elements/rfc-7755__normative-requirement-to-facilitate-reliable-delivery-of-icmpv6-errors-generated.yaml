document: rfc-7755
kind: normative-requirement
summary: To facilitate reliable delivery of ICMPv6 errors generated within the IDC in response to translated IPv4 packets, an SIIT-DC operator SHOULD implement RFC 6791 recommendations in the BRs, since such ICMPv6 errors are otherwise likely to be discarded.
section: "4.8"
rfc2119_level: SHOULD
topics:
