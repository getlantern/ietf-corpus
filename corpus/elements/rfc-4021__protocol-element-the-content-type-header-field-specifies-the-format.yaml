document: rfc-4021
kind: protocol-element
summary: The Content-Type header field specifies the format of the MIME message body part (character set, media type, etc.). The 'charset' parameter is mandatory for all textual Content-Types. The MIME definition (RFC 2045) should be used in generating mail; RFC 1049 has 'historic' status.
section: 2.2.5
topics:
