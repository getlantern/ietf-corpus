document: rfc-6793
kind: normative-requirement
summary: If the AS number in the AGGREGATOR attribute is a non-mappable four-octet value, the NEW BGP speaker MUST use AS4_AGGREGATOR and set the AS number in AGGREGATOR to AS_TRANS. If the AS number is mappable, AS4_AGGREGATOR MUST NOT be sent.
section: 4.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
