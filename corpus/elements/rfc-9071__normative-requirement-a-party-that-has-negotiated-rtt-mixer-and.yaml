document: rfc-9071
kind: normative-requirement
summary: A party that has negotiated 'rtt-mixer' and acts as an RTP mixer MUST populate the CSRC list and format packets per Section 3; a party that has not successfully negotiated 'rtt-mixer' MUST NOT transmit interleaved packets from different sources in the same RTP stream.
section: "2.4"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
