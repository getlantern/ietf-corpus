document: rfc-4932
kind: normative-requirement
summary: Date and time attribute values MUST be represented in UTC using the Gregorian calendar. The extended date-time form using upper case 'T' and 'Z' characters MUST be used; XML Schema time zone offsets MUST NOT be used with EPP.
section: "2.4"
rfc2119_level: MUST
