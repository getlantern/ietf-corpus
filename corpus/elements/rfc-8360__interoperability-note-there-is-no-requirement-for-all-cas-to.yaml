document: rfc-8360
kind: interoperability-note
summary: There is no requirement for all CAs to migrate to the new OIDs simultaneously. Individual CA certificates may selectively use the new OIDs, as illustrated in Example 3 (Section 5.3), where only the certificate most at risk of overclaiming uses the new OIDs.
