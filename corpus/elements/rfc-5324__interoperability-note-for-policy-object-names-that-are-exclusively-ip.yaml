document: rfc-5324
kind: interoperability-note
summary: For Policy Object Names that are exclusively IP address ranges, this document uses the IETF-standard InetAddressType/InetAddress TCs (RFC 4001) as a 3-tuple rather than the native FC-SP TLV encoding. For names that may be other types, the T11FcSpPolicyNameType/T11FcSpPolicyName pair is used, with IP ranges encoded as concatenated low+high address bytes in the T11FcSpPolicyName value.
section: "4.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
