document: rfc-5040
kind: protocol-element
summary: 'RDMAP defines seven RDMA operations: RDMA Write, RDMA Read, Send, Send with Invalidate, Send with Solicited Event, Send with Solicited Event and Invalidate, and Terminate. All except RDMA Read generate exactly one RDMA Message; RDMA Read generates one Request and one Response.'
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
