document: rfc-7055
kind: state-machine
summary: 'GSS-EAP context establishment proceeds through three states: Initial (exchange of vendor/acceptor-name tokens and first EAP identity request), Authenticate (EAP request/response exchange until Success or Failure), and Extensions (MIC-protected negotiation of optional features and GSS channel bindings). Both initiator and acceptor begin in Initial state.'
