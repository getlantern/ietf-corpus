document: rfc-5307
kind: security-consideration
summary: GMPLS TE TLVs are not used for SPF computation or normal IP routing, so these extensions have no direct effect on IP routing. However, tampering with GMPLS TE TLVs may affect the underlying optical and/or SONET/SDH transport network. IS-IS cryptographic authentication mechanisms (RFC 5304) can be used to secure these TLVs.
section: "3"
topics:
    - security
    - routing
    - mpls
