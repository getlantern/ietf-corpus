document: rfc-5998
kind: security-consideration
summary: 'Each peer sends two identities: one in the IKE ID payload (used for routing AAA messages and selecting EAP types) and one inside the EAP method. Only the EAP-internal identity is directly authenticated; IPsec policy decisions must be based on the authenticated identity.'
