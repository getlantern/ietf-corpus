document: rfc-9930
kind: normative-requirement
summary: Servers MUST track the username across multiple password authentication rounds and reject authentication if the identity changes between Basic-Password-Auth-Resp TLVs. In subsequent rounds, the peer MUST NOT be prompted for a username and MUST copy the username from the first response.
section: 3.6.3
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
