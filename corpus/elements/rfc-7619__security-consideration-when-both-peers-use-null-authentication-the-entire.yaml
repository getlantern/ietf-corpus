document: rfc-7619
kind: security-consideration
summary: When both peers use NULL authentication, the entire key exchange becomes unauthenticated and is vulnerable to active MITM attacks. Using an ID Type other than ID_NULL with NULL Authentication may also compromise client anonymity in the event of an active MITM attack.
section: "3"
topics:
    - ipsec
    - security
    - privacy
