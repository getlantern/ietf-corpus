document: rfc-4271
kind: normative-requirement
summary: A BGP speaker SHOULD retain the current version of routes advertised by all peers for the duration of the connection, or make use of the Route Refresh extension (RFC 2918), to allow local policy changes without resetting connections.
section: "3"
rfc2119_level: SHOULD
topics:
