document: rfc-3175
kind: interoperability-note
summary: 'Hop-by-hop RSVP integrity (INTEGRITY objects) is preserved for both E2E and aggregate messages: E2E integrity is exchanged directly between aggregator and deaggregator (as logical RSVP neighbors), requiring them to share a secret, while aggregate integrity operates hop-by-hop inside the aggregation region among interior routers.'
section: 1.4.11
topics:
    - security
    - qos
