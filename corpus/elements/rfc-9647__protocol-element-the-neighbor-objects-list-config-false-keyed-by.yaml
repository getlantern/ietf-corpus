kind: protocol-element
summary: 'The ''neighbor-objects'' list (config false, keyed by neighbor-address) within each interface entry tracks per-neighbor state: hello-mcast-history, hello-ucast-history (hex strings), txcost (int32), exp-mcast-hello-seqno, exp-ucast-hello-seqno, ucast-hello-seqno (all union of null enum and uint16), ucast-hello-interval (centiseconds), rxcost (uint16), and cost (int32).'
