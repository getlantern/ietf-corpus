document: rfc-3670
kind: design-rationale
summary: Unlike the DiffServ Informal Management Model (DSMODEL), QDDIM allows ingress QoS conditioning results to be communicated to the egress interface via a packet preamble. This extension reflects a capability present in many network devices that the original DSMODEL did not represent.
