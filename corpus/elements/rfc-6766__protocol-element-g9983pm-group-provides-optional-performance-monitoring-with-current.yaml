document: rfc-6766
kind: protocol-element
summary: g9983PM group provides optional performance monitoring with current and historical (up to 96 15-minute and 7 1-day intervals) CRC-4, CRC-6, and CRC-8 error counters for ports, plus service-down-seconds counters per service. PM counters are not reset on port re-initialization.
