document: rfc-3591
kind: interoperability-note
summary: There is no requirement for an agent to align 15-minute or 24-hour PM intervals with any wall clock; however, agents may optionally align 15-minute intervals with quarter-hours and 24-hour intervals with a specific UTC hour such as 00:00.
section: 2.6.2
