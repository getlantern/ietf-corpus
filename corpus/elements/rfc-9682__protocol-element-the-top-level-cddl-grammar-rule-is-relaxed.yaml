document: rfc-9682
kind: protocol-element
summary: The top-level cddl grammar rule is relaxed from 'S 1*(rule S)' to 'S *(rule S)', allowing CDDL files with zero rules. The requirement for at least one rule is demoted to a semantic constraint satisfied after all directives are processed, enabling CDDL module files that contain only directives.
section: "3.1"
topics:
    - cbor
