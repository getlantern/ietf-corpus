document: rfc-2749
kind: normative-requirement
summary: Multiple context flags in a single COPS REQ are allowed only for Unicast FF [Incoming + Allocation + Outgoing] and Multicast with a single Resv on the interface [Incoming + Allocation]. Context events are time-ordered; all ClientSI objects in a multi-flag request are processed according to the latest (most advanced) flag.
section: "3.6"
rfc2119_level: MUST
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
