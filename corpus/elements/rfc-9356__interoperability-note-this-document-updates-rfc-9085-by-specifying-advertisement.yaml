document: rfc-9356
kind: interoperability-note
summary: This document updates RFC 9085 by specifying advertisement of OSPF L2 bundle member link attributes via BGP-LS. The BGP-LS mechanism for OSPF follows the same approach already defined for IS-IS in Section 2.2.3 of RFC 9085.
