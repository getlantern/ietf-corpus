document: rfc-5239
kind: protocol-element
summary: The conference user identifier is a unique URI identifying a user within the scope of a conferencing system. A user may have multiple conference user identifiers (e.g., representing different roles) and the identifier is required in all conference control protocol requests to determine who is issuing commands for policy enforcement.
section: "6.3"
topics:
    - realtime
    - security
