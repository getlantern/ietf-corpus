document: rfc-5653
kind: protocol-element
summary: ChannelBinding carries initiator and acceptor InetAddress values plus an application-supplied byte array. A MIC over the concatenated binding data is bound into the context-establishment token; mismatch causes acceptSecContext to throw GSSException with major code BAD_BINDINGS.
