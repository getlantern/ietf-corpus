document: rfc-4191
kind: design-rationale
summary: Router Advertisement messages are used instead of RIP because RAs are an existing stable protocol for router-to-host communication, piggyback on existing traffic to reduce overhead, and RIP is unsuitable because it carries no route lifetimes and requires frequent high-overhead messages.
