document: rfc-7517
kind: protocol-element
summary: The "use" (public key use) parameter indicates whether a public key is used for encryption ("enc") or signature verification ("sig"). Use of this member is OPTIONAL unless required by the application; key agreement and key wrapping also use "enc".
