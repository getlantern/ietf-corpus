document: rfc-4931
kind: protocol-element
summary: The <domain:ns> element specifies name servers and MUST contain either one or more <domain:hostObj> elements (referencing existing host objects by FQDN) or one or more <domain:hostAttr> elements (inline host name plus optional IP addresses). The two forms are mutually exclusive within a single <domain:ns> element.
section: "1.1"
topics:
    - dns
