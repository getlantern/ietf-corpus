document: rfc-6843
kind: wire-format
summary: The Delay Metrics Block header encodes Block Type (BT=16, 8 bits), Interval Metric flag (I, 2 bits), reserved (6 bits), and block length (16 bits, fixed value 6), followed by SSRC of Source (32 bits), Mean/Min/Max Network Round-Trip Delay (each 32 bits in units of 1/65536 seconds), and End System Delay (64 bits, NTP timestamp format).
