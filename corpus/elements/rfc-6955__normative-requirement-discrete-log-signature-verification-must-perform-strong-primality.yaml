document: rfc-6955
kind: normative-requirement
summary: Discrete Log Signature verification MUST perform strong primality verification of both p and q, verify that q is a factor of p-1, and verify r and s are in range [1, q-1] before proceeding; any failure MUST cause the signature to be considered invalid.
section: "5.3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
