document: rfc-3982
kind: normative-requirement
summary: Within a <domain> result, the <nameServer> element MUST contain an entity reference to a referent of type <host>. Contact role elements (<registrant>, <billingContacts>, etc.) referents MUST each be a <contact> result.
section: 3.2.2
rfc2119_level: MUST
topics:
