document: rfc-2095
kind: protocol-element
summary: The client response consists of the username, a space, and a 16-octet keyed MD5 digest sent in lowercase hexadecimal. The digest is computed using HMAC-MD5 where the key is the shared secret and the digested text is the challenge timestamp including angle-brackets.
