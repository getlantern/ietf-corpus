document: rfc-2212
kind: normative-requirement
summary: A service request for an existing flow with a new TSpec and/or RSpec SHOULD be treated as a new invocation requiring re-admission control. Flows that strictly reduce their TSpec/RSpec SHOULD never be denied service.
section: Invocation Information
rfc2119_level: SHOULD
topics:
    - qos
