document: rfc-3046
kind: normative-requirement
summary: Relay agents configured to add a Relay Agent option which receive a client DHCP packet with a nonzero giaddr SHALL discard the packet if the giaddr spoofs a giaddr address implemented by the local agent itself. Otherwise, the relay agent SHALL forward the packet WITHOUT adding relay agent options and SHALL NOT modify the giaddr value.
section: 2.1.1
rfc2119_level: SHALL
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
