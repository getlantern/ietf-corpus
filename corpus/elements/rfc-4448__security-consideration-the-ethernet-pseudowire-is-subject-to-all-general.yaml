document: rfc-4448
kind: security-consideration
summary: The Ethernet pseudowire is subject to all general security considerations from RFC 3985 and [PWE3-CTRL]. The security of the pseudowire is only as good as the security of the underlying MPLS PSN, which can be secured by various methods described in [MPLS-ARCH]. Security via MAC address access control is out of scope.
section: "5"
topics:
    - mpls
    - security
