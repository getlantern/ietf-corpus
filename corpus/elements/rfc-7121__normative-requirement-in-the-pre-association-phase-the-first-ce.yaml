document: rfc-7121
kind: normative-requirement
summary: In the pre-association phase, the first CE (lowest table index) in the AllCEs table MUST be the first CE with which the FE will attempt to connect and associate. The FE MUST associate with at least one CE.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
