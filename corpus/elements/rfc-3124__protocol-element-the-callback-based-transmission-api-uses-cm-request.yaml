document: rfc-3124
kind: protocol-element
summary: The callback-based transmission API uses cm_request(i32 cm_streamid) to request a send grant; the CM later invokes cmapp_send() authorizing up to PMTU bytes. An optional cm_request(int k) variant grants up to k PMTU-sized segments. This is the recommended API for ALF-based asynchronous streams.
section: "3.2"
topics:
    - congestion
