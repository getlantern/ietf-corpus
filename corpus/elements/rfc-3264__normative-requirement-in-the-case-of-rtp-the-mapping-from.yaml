document: rfc-3264
kind: normative-requirement
summary: In the case of RTP, the mapping from a dynamic payload type number to a particular codec within a media stream MUST NOT change for the duration of a session, even if formats are added or removed in subsequent offers.
section: 8.3.2
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
