document: rfc-4538
kind: normative-requirement
summary: If the Target-Dialog header field is present and the callid, remote-tag, and local-tag match an existing dialog established using a sips URI, the UAS SHOULD authorize the request if it would authorize any entity on the path of the original dialog-creating request.
