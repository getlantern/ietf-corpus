document: rfc-7477
kind: security-consideration
summary: To prevent replay attacks on older CSYNC records using the soaminimum flag, the SOA serial number MUST NOT be incremented by more than 2^16 during the lifetime of the signature window of the RRSIGs signing the SOA and CSYNC records.
section: "5"
topics:
    - dns
    - security
