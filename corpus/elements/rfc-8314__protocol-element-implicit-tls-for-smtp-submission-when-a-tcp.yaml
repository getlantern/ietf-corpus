document: rfc-8314
kind: protocol-element
summary: 'Implicit TLS for SMTP Submission: when a TCP connection is established for ''submissions'' (default port 465), a TLS handshake begins immediately. During the transition period, clients and servers SHOULD implement both STARTTLS on port 587 and Implicit TLS on port 465.'
section: "3.3"
topics:
    - tls
    - email
