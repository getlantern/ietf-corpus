document: rfc-2264
kind: normative-requirement
summary: A message MUST NOT be sent with privacy protection if the user does not support both an authentication protocol and a privacy protocol. An error indication (unsupportedSecurityLevel) MUST be returned in that case.
section: "3.1"
rfc2119_level: MUST NOT
topics:
