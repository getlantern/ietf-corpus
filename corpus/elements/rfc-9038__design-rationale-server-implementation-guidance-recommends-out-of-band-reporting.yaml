document: rfc-9038
kind: design-rationale
summary: Server implementation guidance recommends out-of-band reporting to clients when unhandled namespace data is returned, so clients can add support. Servers should also check for the unhandled namespace support signal in client login services before returning optional unhandled namespace information in general EPP responses.
section: "7.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
