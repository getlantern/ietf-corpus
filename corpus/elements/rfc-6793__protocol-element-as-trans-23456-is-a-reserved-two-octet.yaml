document: rfc-6793
kind: protocol-element
summary: AS_TRANS (23456) is a reserved two-octet AS number used to represent non-mappable four-octet AS numbers in AS path information encoded with two-octet AS numbers. It is also placed in the 'My Autonomous System' field of the OPEN message by a NEW BGP speaker that lacks a globally unique two-octet AS number.
section: "3"
topics:
