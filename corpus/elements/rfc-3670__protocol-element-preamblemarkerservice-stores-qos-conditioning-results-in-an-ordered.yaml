document: rfc-3670
kind: protocol-element
summary: PreambleMarkerService stores QoS conditioning results in an ordered, multi-valued string property FilterItemList, where each entry has the form '<type>,<value>'. Defined types are ConformingFromMeter, PartConformingFromMeter, NonConformingFromMeter, and VlanId; implementations may add types, and future revisions may make the type namespace IANA-administered.
section: 3.8.3
topics:
