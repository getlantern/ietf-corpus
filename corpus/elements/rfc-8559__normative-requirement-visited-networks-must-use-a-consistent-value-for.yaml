document: rfc-8559
kind: normative-requirement
summary: Visited networks MUST use a consistent value for Operator-Name throughout a single user session. Sending different realm names (e.g., '1example.com' in Access-Request but '1example.org' in Accounting-Request for the same session) is forbidden.
section: "3.1"
rfc2119_level: MUST
topics:
    - radius
