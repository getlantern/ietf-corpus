document: rfc-5052
kind: protocol-element
summary: FEC schemes are identified by an FEC Encoding ID, an integer identifier assigned by IANA. The FEC Encoding ID allows receivers to select the appropriate FEC decoder. Values 0-127 are reserved for Fully-Specified FEC schemes; values 128-255 are reserved for Under-Specified FEC schemes.
section: "6.1"
topics:
