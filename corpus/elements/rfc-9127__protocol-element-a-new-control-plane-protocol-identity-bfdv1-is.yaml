summary: A new control-plane protocol identity 'bfdv1' is defined, and a 'bfd' container is created under 'control-plane-protocol' as specified in RFC 8349. Path-specific modules (ietf-bfd-ip-sh, ietf-bfd-ip-mh, ietf-bfd-lag, ietf-bfd-mpls) augment this 'bfd' container with their respective containers.
