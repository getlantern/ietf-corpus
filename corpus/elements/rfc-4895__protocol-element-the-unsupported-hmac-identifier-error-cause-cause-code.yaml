document: rfc-4895
kind: protocol-element
summary: The Unsupported HMAC Identifier error cause (cause code 0x0105) is sent when an AUTH chunk is received with an HMAC Identifier that was not specified by the receiver during association setup. Its fixed length is 6 bytes, with 2 bytes of padding.
