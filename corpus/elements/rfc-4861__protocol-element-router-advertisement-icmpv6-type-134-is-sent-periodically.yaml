document: rfc-4861
kind: protocol-element
summary: Router Advertisement (ICMPv6 Type 134) is sent periodically or in response to Router Solicitations. It carries Cur Hop Limit (8-bit), M and O flags (1-bit each), Router Lifetime (16-bit, seconds), Reachable Time (32-bit, ms), and Retrans Timer (32-bit, ms), plus optional Prefix Information, Source Link-Layer Address, and MTU options.
section: "4.2"
topics:
