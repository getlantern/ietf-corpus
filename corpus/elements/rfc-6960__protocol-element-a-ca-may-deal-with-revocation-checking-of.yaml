document: rfc-6960
kind: protocol-element
summary: 'A CA may deal with revocation checking of an authorized responder in three ways: include id-pkix-ocsp-nocheck (NULL value, SHOULD be non-critical) to allow the client to trust the responder for the certificate''s lifetime; specify CRL Distribution Points or AIA for normal revocation checking; or leave revocation checking to client local policy.'
section: 4.2.2.2.1
topics:
    - pkix
    - security
