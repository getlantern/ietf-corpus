document: rfc-1044
kind: protocol-element
summary: The ARP Source and Destination HYPERchannel Address fields each contain Domain, Network, Adapter address, and Logical address/port (6 bytes total). A value of 0x0000 in Domain and Network fields signals that 16-bit HYPERchannel headers should be used rather than 32-bit headers, enabling mixed-mode networks.
section: SOURCE AND DESTINATION HYPERCHANNEL ADDRESS
