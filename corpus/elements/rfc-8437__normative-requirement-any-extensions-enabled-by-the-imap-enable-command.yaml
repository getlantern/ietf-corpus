document: rfc-8437
kind: normative-requirement
summary: Any extensions enabled by the IMAP ENABLE command (RFC 5161) cease to be enabled when UNAUTHENTICATE is issued, including CONDSTORE, QRESYNC, METADATA, METADATA-SERVER, and UTF8=ACCEPT.
