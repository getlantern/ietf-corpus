document: rfc-3498
kind: protocol-element
summary: The apsConfigTable supports creation, modification, and deletion of linear APS group entries indexed by a text group name (1–32 characters). Key configuration objects include apsConfigMode, apsConfigRevert, apsConfigDirection, apsConfigExtraTraffic, apsConfigSdBerThreshold, apsConfigSfBerThreshold, apsConfigWaitToRestore, and apsConfigRowStatus. Most configuration objects cannot be modified while apsConfigRowStatus is active.
