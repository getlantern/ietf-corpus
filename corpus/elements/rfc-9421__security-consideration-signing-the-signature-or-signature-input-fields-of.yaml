document: rfc-9421
kind: security-consideration
summary: Signing the Signature or Signature-Input fields of another signature (signing signatures) does not provide transitive coverage of the original covered components and is susceptible to collision and key mixup attacks. Including these fields in response covered components is NOT RECOMMENDED. Applications needing to signal receipt of a signature must specify alternative mechanisms.
section: 7.3.7
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
