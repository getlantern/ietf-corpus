document: rfc-3288
kind: interoperability-note
summary: Both 'soap.beep' and 'soap.beeps' URL schemes use identical algorithms and parameters for address resolution, including the same SRV service name ('soap-beep') and the same IANA-assigned TCP port. The only difference is the mandatory privacy tuning requirement for 'soap.beeps'.
section: "5.2"
topics:
    - tls
