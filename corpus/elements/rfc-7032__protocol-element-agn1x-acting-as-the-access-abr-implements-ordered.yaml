document: rfc-7032
kind: protocol-element
summary: AGN1x, acting as the access ABR, implements ordered label distribution control when redistributing FECs between the access side (LDP DoD with static routing or access IGP) and the network side (labeled BGP or core IGP with LDP DU), enabling failure propagation between access and metro/core domains.
