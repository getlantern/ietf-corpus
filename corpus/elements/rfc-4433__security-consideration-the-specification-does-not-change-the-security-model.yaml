document: rfc-4433
kind: security-consideration
summary: The specification does not change the security model of Mobile IPv4 (RFC 3344). Registration Requests and Replies are protected by authenticators per RFC 3344 and RFC 3012. Security associations between MN and HA may be dynamically derived via AAA infrastructure (RFC 3957), allowing any HA in the local domain to proxy-authenticate the MN.
section: "9"
topics:
    - mobility
    - security
