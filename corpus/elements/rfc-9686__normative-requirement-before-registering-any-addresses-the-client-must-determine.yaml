document: rfc-9686
kind: normative-requirement
summary: Before registering any addresses, the client MUST determine whether the network supports address registration by including OPTION_ADDR_REG_ENABLE in its Option Request option. If the DHCPv6 infrastructure does not indicate support, the client MUST NOT register any addresses using this mechanism.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
