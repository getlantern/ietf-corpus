document: rfc-7705
kind: design-rationale
summary: Legacy ASNs and associated External BGP AS Migration mechanisms commonly persist in operational networks for several years or indefinitely because ISPs lack control over customer CE device configurations and cannot coordinate mass simultaneous reconfiguration. Operators must plan for these mechanisms to remain active long-term.
section: "5"
topics:
