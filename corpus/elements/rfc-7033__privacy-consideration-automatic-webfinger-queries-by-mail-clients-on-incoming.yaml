document: rfc-7033
kind: privacy-consideration
summary: Automatic WebFinger queries by mail clients on incoming message senders could expose the user's IP address, email checking activity, and client identity to spammers. Clients MUST NOT perform WebFinger queries unless explicitly authorized by the user.
section: "9.3"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
