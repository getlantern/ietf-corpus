document: rfc-8859
kind: registry
summary: RFC 8859 creates a new "Multiplexing Categories" subregistry under the "Session Description Protocols (SDP) Parameters" registry. The registry contains the nine category values (NORMAL, CAUTION, IDENTICAL, SUM, TRANSPORT, INHERIT, IDENTICAL-PER-PT, SPECIAL, TBD) and their definitions. New entries require Standards Action.
section: "15.1"
