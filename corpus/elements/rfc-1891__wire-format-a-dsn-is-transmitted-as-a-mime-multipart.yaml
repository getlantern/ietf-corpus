document: rfc-1891
kind: wire-format
summary: A DSN is transmitted as a MIME multipart/report message with report-type='delivery-status'. The first component is human-readable text, the second is of content-type message/delivery-status, and the third is the original message or its headers depending on RET and whether failures are present.
