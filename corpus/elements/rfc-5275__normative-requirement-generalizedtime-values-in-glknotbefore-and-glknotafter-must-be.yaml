document: rfc-5275
kind: normative-requirement
summary: GeneralizedTime values in glkNotBefore and glkNotAfter MUST be expressed in UTC (Zulu) and MUST include seconds using the format YYYYMMDDHHMMSSZ, even when seconds are zero. GeneralizedTime values MUST NOT include fractional seconds.
section: 3.1.13
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
