document: rfc-8845
kind: normative-requirement
summary: If a Provider advertises mutually exclusive Simultaneous Transmission Sets, the Consumer MUST ensure that it chooses Media Captures that lie wholly within one of those Simultaneous Transmission Sets for each Media type.
