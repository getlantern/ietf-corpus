summary: The Flow-state Dependent IFSP selects or drops flows based on current Flow Selection State, including the Frequent algorithm (maintains a cache of size k-1, selects flows exceeding 1/k of observed packet stream) and Lossy Counting (identifies flows whose packet count exceeds a percentage threshold with bounded estimation error e).
