document: rfc-6790
kind: normative-requirement
summary: It is REQUIRED that the label immediately preceding an Entropy Label in the MPLS label stack be an Entropy Label Indicator (ELI), where 'preceding' means closer to the top of stack (farther from the BoS bit). This is the mechanism by which egress LSRs unambiguously identify entropy labels.
section: "3"
rfc2119_level: REQUIRED
topics:
    - mpls
