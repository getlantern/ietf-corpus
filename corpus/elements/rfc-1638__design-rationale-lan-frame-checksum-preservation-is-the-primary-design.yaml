document: rfc-1638
kind: design-rationale
summary: LAN Frame Checksum preservation is the primary design choice because IEEE 802.1 requires the Extended LAN to enjoy the same undetected error probability as a single LAN; no alternative algorithm has been proposed, so the FCS calculated by the originator is carried end-to-end.
