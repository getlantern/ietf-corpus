document: rfc-5936
kind: normative-requirement
summary: The AXFR response MUST contain the cut-point NS resource record set as registered with the zone, whether or not it agrees with the authoritative NS set at the child apex. This ensures a given (zone, serial) pair yields the same set of records regardless of which authoritative server is queried.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
