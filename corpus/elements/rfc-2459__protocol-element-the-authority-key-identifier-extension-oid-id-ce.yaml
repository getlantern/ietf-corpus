document: rfc-2459
kind: protocol-element
summary: The Authority Key Identifier extension (OID id-ce 35) identifies the public key corresponding to the private key used to sign a certificate, supporting disambiguation when an issuer has multiple signing keys. It contains optional keyIdentifier (OCTET STRING), authorityCertIssuer (GeneralNames), and authorityCertSerialNumber fields.
