document: rfc-5311
kind: normative-requirement
summary: 'When neighbor attribute information for the same context appears in both Original and Extended LSPs: non-conflicting info MUST be additive; conflicting info MUST prefer the Original LSP (or lowest system-id Extended LSP if absent); TLV 22/222 MUST override TLV 23/223 for the same neighbor.'
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
