document: rfc-3640
kind: normative-requirement
summary: When multiple Access Units are carried in an RTP packet, each AU MUST be complete (the number of AUs MUST be integral). Additionally, an AU MUST NOT be repeated in other RTP packets; repetition is only possible via duplicate RTP packets.
section: "2.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
