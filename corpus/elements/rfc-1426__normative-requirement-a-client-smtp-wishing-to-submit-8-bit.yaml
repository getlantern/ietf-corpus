document: rfc-1426
kind: normative-requirement
summary: A client SMTP wishing to submit 8-bit MIME content MUST first issue EHLO to the server and verify the server responds with 250 and includes the '8BITMIME' keyword before sending a BODY=8BITMIME parameter on MAIL FROM.
section: "4"
rfc2119_level: MUST
topics:
    - email
