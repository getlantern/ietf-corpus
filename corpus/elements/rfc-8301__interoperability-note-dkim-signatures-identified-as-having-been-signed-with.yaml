document: rfc-8301
kind: interoperability-note
summary: DKIM signatures identified as having been signed with historic algorithms (rsa-sha1) or with insufficient key sizes (rsa-sha256 with less than 1024 bits) have permanently failed evaluation per Section 3.9 of RFC 6376.
