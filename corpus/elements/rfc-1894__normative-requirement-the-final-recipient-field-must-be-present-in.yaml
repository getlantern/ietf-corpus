document: rfc-1894
kind: normative-requirement
summary: The Final-Recipient field MUST be present in each per-recipient group and MUST contain the mailbox address exactly as received in the transport envelope. The case of alphabetic characters in the address MUST be preserved.
section: 2.3.2
rfc2119_level: MUST
topics:
    - email
