document: rfc-7731
kind: normative-requirement
summary: To prevent attackers from injecting packets, an MPL Forwarder MUST NOT accept or forward MPL Data Messages from a communication interface that does not subscribe to the MPL Domain Address identified in the message's destination address.
section: "12"
rfc2119_level: MUST NOT
topics:
    - multicast
    - security
    - ip
