document: rfc-9341
kind: normative-requirement
summary: For coherent delay comparison across routers, clocks on all network nodes performing delay measurement MUST be in sync. A measurement is valid only if no packet loss occurs and packet misordering can be avoided.
section: 3.2.1
rfc2119_level: MUST
topics:
    - measurement
