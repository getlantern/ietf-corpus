summary: A POSH fingerprints document is a JSON object containing a 'fingerprints' member (JSON array of fingerprint descriptor objects) and an 'expires' member (JSON number, seconds). Each fingerprint descriptor maps hash function names (from IANA Hash Function Textual Names) to base64-encoded fingerprint values.
