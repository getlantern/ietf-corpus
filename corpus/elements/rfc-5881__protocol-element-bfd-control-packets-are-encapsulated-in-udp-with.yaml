document: rfc-5881
kind: protocol-element
summary: BFD Control packets are encapsulated in UDP with destination port 3784, within an IPv4 or IPv6 packet. The UDP source port MUST be in the range 49152–65535 and the same source port MUST be used for all Control packets of a given session.
section: "4"
topics:
