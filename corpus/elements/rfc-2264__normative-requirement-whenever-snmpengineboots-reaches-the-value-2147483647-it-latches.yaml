document: rfc-2264
kind: normative-requirement
summary: Whenever snmpEngineBoots reaches the value 2147483647, it latches at that value and every authenticated message causes a notInTimeWindow authentication failure. Manual intervention (physical reconfiguration) is required to reset the engine.
section: 2.2.2
rfc2119_level: MUST
topics:
    - snmp
    - security
