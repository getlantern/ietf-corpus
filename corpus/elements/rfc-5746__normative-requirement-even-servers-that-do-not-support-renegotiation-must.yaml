document: rfc-5746
kind: normative-requirement
summary: Even servers that do not support renegotiation MUST implement the minimal version of the `renegotiation_info` extension for initial handshakes, so that clients can probe whether the server has been upgraded and detect its support status.
section: "4.3"
rfc2119_level: MUST
