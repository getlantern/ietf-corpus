document: rfc-6931
kind: protocol-element
summary: 'RSA public-key signature algorithms are defined using PKCS#1 v1.5 (RSASSA-PKCS1-v1_5) padding: RSA-MD5, RSA-SHA256, RSA-SHA384, RSA-SHA512, RSA-RIPEMD160, and RSA-SHA224. The SignatureValue is the base64 encoding of the RSASSA-PKCS1-v1_5 signature output with the appropriate ASN.1 BER algorithm OID prefix embedded.'
section: 2.3.1
