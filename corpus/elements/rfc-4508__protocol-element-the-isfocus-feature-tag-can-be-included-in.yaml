document: rfc-4508
kind: protocol-element
summary: 'The ''isfocus'' feature tag can be included in a Refer-To header to signal that the REFER-Target is a conference focus, indicating that sending an INVITE will bring the REFER-Recipient into the conference. Example: Refer-To: sip:conf44@example.com;isfocus'
section: "4.1"
topics:
