document: rfc-4014
kind: protocol-element
summary: The RADIUS Attributes suboption is a suboption of the DHCP Relay Agent Information option (RFC 3046). DHCP clients are never aware of relay agent options, as these are exchanged only between relay agents and the DHCP server.
