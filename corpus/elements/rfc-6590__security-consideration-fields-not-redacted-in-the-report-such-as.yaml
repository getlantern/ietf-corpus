document: rfc-6590
kind: security-consideration
summary: Fields not redacted in the report (such as the Message-ID header) can be correlated against originating system logs or other data sources to recover the original private data. Report generators must anticipate which fields could enable such recovery and redact them as well, or accept that recovery is possible.
section: "5.3"
topics:
    - email
    - security
    - privacy
