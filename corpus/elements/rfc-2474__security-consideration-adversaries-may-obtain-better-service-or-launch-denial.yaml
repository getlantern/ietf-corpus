document: rfc-2474
kind: security-consideration
summary: Adversaries may obtain better service or launch denial-of-service attacks by modifying DS codepoints in packets or injecting packets with elevated codepoints. DS domain boundary nodes MUST ensure all entering traffic is marked with appropriate codepoint values, remarking if necessary, as the primary defense against codepoint-based theft- and DoS attacks.
section: "7.1"
rfc2119_level: MUST
topics:
    - diffserv
    - security
    - qos
