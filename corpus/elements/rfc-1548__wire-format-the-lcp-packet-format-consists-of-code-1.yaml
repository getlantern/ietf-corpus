document: rfc-1548
kind: wire-format
summary: The LCP packet format consists of Code (1 octet), Identifier (1 octet), Length (2 octets, inclusive of all fields), and Data (variable). The Code field identifies the packet type (1=Configure-Request through 11=Discard-Request); unknown Code values trigger a Code-Reject response.
