document: rfc-4325
kind: design-rationale
summary: The AIA CRL extension was introduced because in several legitimate scenarios (indirect CRLs, CA key changes, separate certificate/CRL signing keys) the CRL issuer certificate is not present or easily discoverable from the target certification path, making bottom-up path construction difficult.
