document: rfc-8182
kind: protocol-element
summary: The Snapshot File is an XML document with a root 'snapshot' element carrying version, session_id, and serial attributes, plus zero or more 'publish' child elements each with a uri attribute and base64-encoded object content. It represents the complete current state of the repository for that session and serial.
