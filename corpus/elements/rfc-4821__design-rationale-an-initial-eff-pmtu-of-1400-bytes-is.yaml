document: rfc-4821
kind: design-rationale
summary: 'An initial eff_pmtu of 1400 bytes is suggested as a good compromise: safe for nearly all tunnels over common networking gear, yet close to the optimal MTU for most Internet paths today. Alternatively, using the median probe size of recent successful flows can improve the estimate.'
section: "7.2"
