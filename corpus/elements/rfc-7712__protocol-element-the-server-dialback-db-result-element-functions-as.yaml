document: rfc-7712
kind: protocol-element
summary: The Server Dialback <db:result> element functions as a server's assertion of its identity for a domain pair. It carries 'from' and 'to' attributes identifying the asserting and receiving domains, and contains a dialback key as text content; a <db:result type='valid'/> response from the verifying server confirms the association.
section: "4.3"
topics:
    - security
