document: rfc-7787
kind: design-rationale
summary: DNCP is intentionally abstract and profile-based so it can be tuned for diverse applications by specifying transport, security, multicast support, addressing scope, payload types, and extensions. Poor fits include nodes with large data sets, predominantly small incremental changes, very high update frequency, or very dense unicast-only topologies.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
