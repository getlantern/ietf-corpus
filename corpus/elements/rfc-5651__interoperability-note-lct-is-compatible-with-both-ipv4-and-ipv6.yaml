document: rfc-5651
kind: interoperability-note
summary: LCT is compatible with both IPv4 and IPv6 because no part of the LCT packet header is IP-version-specific. LCT also works with both Any-Source Multicast (ASM, RFC 1112) and Source-Specific Multicast (SSM, RFC 4607) models, though SSM provides stronger security guarantees against DoS attacks since only the designated sender's packets are received.
section: "4.1"
topics:
    - multicast
    - ip
    - security
