document: rfc-8105
kind: design-rationale
summary: The DECT ULE DLC's native segmentation and reassembly capability eliminates the need for RFC 4944 fragmentation at the 6LoWPAN layer, simplifying the stack. The default 500-octet MTU is raised to 1280 octets to support full IPv6 packets.
section: "2.4"
