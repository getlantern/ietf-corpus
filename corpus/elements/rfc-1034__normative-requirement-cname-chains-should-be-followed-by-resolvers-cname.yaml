document: rfc-1034
kind: normative-requirement
summary: CNAME chains should be followed by resolvers; CNAME loops must be detected and signalled as an error. RRs that reference another name by domain name should point to the canonical (primary) name, not an alias, to avoid extra indirections.
section: 3.6.2
rfc2119_level: MUST NOT
topics:
    - dns
