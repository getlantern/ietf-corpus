document: rfc-3775
kind: protocol-element
summary: The Type 2 Routing Header carries the mobile node's home address in packets routed directly to the care-of address during route optimization. It is a Mobile IPv6-specific routing header type that provides the necessary functionality without the generic routing header vulnerabilities.
