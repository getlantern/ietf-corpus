document: rfc-9733
kind: normative-requirement
summary: When the registrar forwards a certification request to a backend RA/CA, it is RECOMMENDED to wrap the original request in a nested message signed with the registrar's own credentials (per RFC9483, Section 5.2.2.1), explicitly conveying the registrar's consent while retaining the pledge's proof of origin.
section: "5.1"
rfc2119_level: RECOMMENDED
topics:
    - pkix
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
