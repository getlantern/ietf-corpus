document: rfc-2205
kind: protocol-element
summary: A Logical Interface Handle (LIH) is carried in the RSVP_HOP object of Path messages alongside the previous-hop IP address. It identifies the logical outgoing interface and is stored in path state so that Resv messages can specify the correct interface regardless of which physical interface they arrive on, handling topology ambiguity caused by non-RSVP clouds.
section: "2.9"
topics:
