document: rfc-6638
kind: protocol-element
summary: CALDAV:schedule-outbox-URL is a WebDAV property on principal resources that identifies the URL of the principal's Scheduling Outbox collection. If absent, the calendar user is not enabled for sending scheduling messages on the server.
section: 2.1.1
topics:
