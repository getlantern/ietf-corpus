document: rfc-3820
kind: design-rationale
summary: PC subject names are derived from the issuing EEC's name by appending a single CN component (option 3 of three alternatives) rather than obtaining a name from a CA or using a self-signed certificate. This is lightweight (no third-party interaction required), enables dynamic identity creation, and makes the PC's relationship to its issuing EEC explicit while maintaining a unique identity for independent rights assignment.
section: "2.5"
topics:
    - pkix
