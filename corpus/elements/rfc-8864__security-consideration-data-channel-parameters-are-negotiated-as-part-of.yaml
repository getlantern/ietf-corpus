document: rfc-8864
kind: security-consideration
summary: Data channel parameters are negotiated as part of opening an SCTP channel over DTLS (per RFC 8841). Each subprotocol may introduce its own security considerations that must be documented in the subprotocol definition. This document adds no security considerations beyond those in RFC 8841.
