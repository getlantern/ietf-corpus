document: rfc-6873
kind: normative-requirement
summary: Tab characters (0x09) present in mandatory field data MUST be replaced by a UTF-8 space character (0x20) prior to logging. This substitution also applies to optional SIP header fields (Tag=00), full message bodies (Tag=01 and Tag=02).
section: "4.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
