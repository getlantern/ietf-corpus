document: rfc-7613
kind: protocol-element
summary: A password is a UTF-8 encoded string of Unicode code points conformant to the OpaqueString profile of the PRECIS FreeformClass. Passwords allow a wider range of characters than usernames (including symbols and non-ASCII letters) to maximize entropy for authentication.
