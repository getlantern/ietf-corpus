document: rfc-6093
kind: wire-format
summary: The Urgent Pointer is a 16-bit field in the TCP header that is interpreted only when the URG control bit is set. Per this document (updating RFC 793, RFC 1011, and RFC 1122), the Urgent Pointer points to the sequence number of the octet immediately following the urgent data (i.e., last-urgent-byte + 1), matching de facto implementation practice.
section: "2.2"
topics:
    - tcp
