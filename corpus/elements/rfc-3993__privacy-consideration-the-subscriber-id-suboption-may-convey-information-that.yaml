document: rfc-3993
kind: privacy-consideration
summary: The Subscriber-ID suboption may convey information that identifies a specific host or user. If DHCP messages travel outside the service provider's network or suboption values become visible to other users, this may raise privacy concerns. Administrators should use identifiers appropriate to the network type.
section: "6"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
