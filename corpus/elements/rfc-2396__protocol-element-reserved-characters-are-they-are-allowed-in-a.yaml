document: rfc-2396
kind: protocol-element
summary: Reserved characters are ';', '/', '?', ':', '@', '&', '=', '+', '$', ','. They are allowed in a URI but may not be used as data within a particular component without escaping, as they serve as component delimiters.
section: "2.2"
