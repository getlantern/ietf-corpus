document: rfc-8994
kind: normative-requirement
summary: The ACP uses RPL (RFC 6550) as its routing protocol in a single-instance configuration. The ACP RPL profile operates without RPL Packet Information (RPI) IPv6 extension headers, making it a pure control-plane software requirement with no forwarding-plane changes needed.
section: "6.12"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
