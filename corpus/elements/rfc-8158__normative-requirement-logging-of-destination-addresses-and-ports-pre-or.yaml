document: rfc-8158
kind: normative-requirement
summary: Logging of destination addresses and ports, pre- or post-NAT, SHOULD NOT be done per RFC 6888. However, this document provides the necessary fields to log the destination information in cases where they must be logged.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
