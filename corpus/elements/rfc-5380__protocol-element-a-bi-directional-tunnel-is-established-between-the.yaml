document: rfc-5380
kind: protocol-element
summary: A bi-directional tunnel is established between the mobile node and the MAP after successful registration. Outbound packets use the mobile node's LCoA as outer source and MAP address as outer destination; inbound packets addressed to the RCoA are intercepted by the MAP via proxy Neighbour Advertisement and tunnelled to the LCoA.
section: "6.1"
topics:
    - mobility
    - ip
