document: rfc-2782
kind: interoperability-note
summary: SRV records must coexist with A record lookups because existing clients will not immediately adopt SRV. Administrators are advised to publish A records alongside SRV records to support legacy clients, and backup hosts referenced only in SRV must use the Assigned Numbers port for the service.
section: Domain administrator advice
topics:
    - dns
