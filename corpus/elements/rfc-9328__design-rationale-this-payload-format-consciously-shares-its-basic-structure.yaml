document: rfc-9328
kind: design-rationale
summary: This payload format consciously shares its basic structure with AVC (RFC 6184), SVC (RFC 6190), and HEVC (RFC 7798) payload formats so that implementers already familiar with those widely deployed formats can apply existing knowledge, keeping implementation complexity and learning curve low.
