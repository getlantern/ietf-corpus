document: rfc-7265
kind: design-rationale
summary: 'iCalendar extension properties and parameters with ''X-'' prefixes are handled identically to standard properties and parameters: the property is an array, the parameter is in the params object, and the name is lowercased. This ensures extensions need no special-casing and jCal need not be updated for new extensions.'
section: "3.7"
topics:
