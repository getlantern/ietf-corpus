document: rfc-1582
kind: security-consideration
summary: The routing task MUST be provided with an explicit list of logical addresses to which triggered updates are sent on the WAN. Any routing information received from a router not in the appropriate list MUST be discarded, preventing route injection from unlisted peers.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - routing
