document: rfc-7672
kind: interoperability-note
summary: SMTP client TLS HELLO messages SHOULD offer a typical set of non-anonymous cipher suites for interoperability with servers that do not support anonymous suites. Pre-DANE opportunistic TLS clients MAY also include anonymous cipher suites; servers SHOULD be prepared to handle both.
section: "8.2"
topics:
    - tls
    - email
