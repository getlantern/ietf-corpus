document: rfc-8469
kind: design-rationale
summary: The Ethernet PW CW was originally optional in RFC 4448 because it was believed no IEEE-assigned Ethernet MAC address started with 0x4 or 0x6, making misidentification as IPv4/IPv6 practically impossible. That assumption is no longer valid.
