document: rfc-2205
kind: protocol-element
summary: Flowspec merging computes the effective flowspec as the Least Upper Bound (LUB) of flowspecs received from different next hops for the same session. Because flowspecs are multi-dimensional opaque vectors (containing Tspec and Rspec components), service-specific routines external to RSVP perform the actual LUB and Greatest Lower Bound (GLB) computations.
section: "2.2"
topics:
    - qos
    - realtime
