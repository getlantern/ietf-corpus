document: rfc-5571
kind: design-rationale
summary: L2TPv2 was chosen as the phase 1 Hub and Spoke protocol because it is widely deployed in broadband services, supports NAT/NAPT traversal via UDP, integrates with AAA/RADIUS, and reuses existing standards — a key design goal of the Softwires WG to favor time-to-market solutions.
