document: rfc-9218
kind: normative-requirement
summary: The value of SETTINGS_NO_RFC7540_PRIORITIES MUST be 0 or 1; any other value MUST be treated as a connection error of type PROTOCOL_ERROR. Endpoints MUST send this setting in the first SETTINGS frame only; senders MUST NOT change it afterward.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
