document: rfc-4019
kind: protocol-element
summary: CCE() is mode-agnostic and does not update CFP or CFI context values beyond the inner packet type's own updating properties. It is useful for rare deviations of checksum coverage from the compressed pattern, avoiding context reinitialization.
