document: rfc-6767
kind: design-rationale
summary: BACP (Bonding Aggregation Control Protocol) is an optional alternative to the mandatory G.hs-based discovery protocol. G.hs cannot be used in-service while the link is 'up', whereas BACP is a frame-based in-service protocol for discovery, aggregation, and pair management, making it suitable for dynamic reconfiguration without taking the link down.
section: 4.2.1
topics:
