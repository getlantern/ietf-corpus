document: rfc-2333
kind: design-rationale
summary: Whether to issue an NHRP request is application-dependent. For short-lived applications without strict QoS requirements, hop-by-hop routing may be preferable. The trade-off between the 'cost' of a short-cut path (monetary or equipment strain) and its utility should be resolved at the application level.
section: "4"
topics:
