document: rfc-7170
kind: state-machine
summary: 'TLS session resumption transition: if ChangeCipherSpec follows the ServerHello, the server accepted abbreviated handshake; otherwise a full handshake proceeds. If session resumption fails, the server gracefully falls back to full TLS handshake. A peer SHOULD NOT request a new PAC after an abbreviated handshake.'
