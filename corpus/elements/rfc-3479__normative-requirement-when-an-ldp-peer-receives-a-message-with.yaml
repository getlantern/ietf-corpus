document: rfc-3479
kind: normative-requirement
summary: When an LDP peer receives a message with the FT Protection TLV, it MUST secure the message (or derived state) and MUST subsequently ACK it. ACKs MUST NOT be sent out of sequence, as this is incompatible with accumulated ACKs.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
