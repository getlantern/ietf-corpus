document: rfc-2746
kind: design-rationale
summary: Whether to support type 3 (dynamic per-flow) tunnels is explicitly left as a local policy decision; the protocol design supports both type 2 (aggregate) and type 3 tunnels, and a single tunnel may combine both behaviors for different end-to-end sessions simultaneously.
