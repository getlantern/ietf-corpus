document: rfc-5362
kind: normative-requirement
summary: When a subscriber receives the first notification containing full state, the subscriber MUST store the received full document as its local copy. On receiving a partial notification, it MUST apply the changes to its local copy.
section: "6.2"
rfc2119_level: MUST
