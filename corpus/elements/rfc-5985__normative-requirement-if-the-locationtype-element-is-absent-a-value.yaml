document: rfc-5985
kind: normative-requirement
summary: If the 'locationType' element is absent, a value of 'any' MUST be assumed as the default. When the 'exact' attribute is set to 'true', the LIS MUST return either the requested location type or provide an error response.
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
