document: rfc-2355
kind: normative-requirement
summary: The client must make use of the reason-code in any DEVICE-TYPE REJECT command to minimize further negotiation; for example, if UNSUPPORTED-REQ is received for a CONNECT request, the client must make no further specific session requests.
section: 7.1.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
