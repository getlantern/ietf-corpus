document: rfc-4877
kind: security-consideration
summary: A misbehaving mobile node could create IPsec SAs for a home address belonging to another mobile node. The home agent must verify that a mobile node is authorized to use a given home address before creating SAs for it, and must associate dynamically assigned home addresses with the authenticated IKE identity.
section: "10"
topics:
    - ipsec
    - mobility
    - security
