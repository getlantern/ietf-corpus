kind: protocol-element
summary: The vplsBgpVETable associates VE IDs with VPLS service instances. Each entry includes vplsBgpVEId (Unsigned32 1..65535), vplsBgpVEName (SnmpAdminString), and vplsBgpVEPreference (Unsigned32 0..65535) for multihomed sites where the VE ID is reused.
