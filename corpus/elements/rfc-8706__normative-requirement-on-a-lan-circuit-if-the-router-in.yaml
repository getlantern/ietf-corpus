document: rfc-8706
kind: normative-requirement
summary: On a LAN circuit, if the router in Planned Restart State is the DIS at any supported level, the adjacency or adjacencies SHOULD be brought down whenever any LSP update is either generated or received, so as to trigger a new DIS election and preserve update process reliability.
section: 3.2.3
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
