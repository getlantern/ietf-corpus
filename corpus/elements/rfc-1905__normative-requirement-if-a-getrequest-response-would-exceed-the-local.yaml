document: rfc-1905
kind: normative-requirement
summary: If a GetRequest response would exceed the local constraint or originator's maximum message size, an alternate Response-PDU with error-status tooBig, error-index zero, and empty variable-bindings MUST be sent. If that too exceeds size limits, snmpSilentDrops is incremented and the message is discarded.
section: 4.2.1
rfc2119_level: MUST
topics:
    - snmp
