document: rfc-3057
kind: normative-requirement
summary: To meet carrier-grade ISDN reliability requirements, Network Operators SHOULD ensure there is no single point of failure in the end-to-end network architecture between an ISDN node and an IP ASP. Related ASPs SHOULD be distributed over at least two Hosts.
section: 1.3.3
rfc2119_level: SHOULD
topics:
    - sctp
    - security
