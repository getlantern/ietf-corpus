document: rfc-9525
kind: normative-requirement
summary: A certificate MUST include at least one identifier. It SHOULD include a DNS-ID as a baseline for interoperability, though a certificate may include only an SRV-ID or URI-ID to scope its use to a particular application type.
section: "4.1"
rfc2119_level: MUST
topics:
