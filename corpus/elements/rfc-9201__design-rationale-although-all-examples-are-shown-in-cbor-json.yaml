document: rfc-9201
kind: design-rationale
summary: Although all examples are shown in CBOR, JSON MAY be used as an alternative for HTTP-based communications as specified in RFC 9200. The parameters and claims are defined in a dedicated document independent of RFC 9200 to facilitate their use in other contexts.
