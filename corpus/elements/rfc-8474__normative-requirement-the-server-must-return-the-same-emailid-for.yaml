document: rfc-8474
kind: normative-requirement
summary: The server MUST return the same EMAILID for the same {name, uidvalidity, uid} triple; EMAILID is immutable. The server MUST return the same EMAILID as the source message for the matching destination message after a COPY or MOVE command.
section: "5.1"
rfc2119_level: MUST
topics:
    - email
