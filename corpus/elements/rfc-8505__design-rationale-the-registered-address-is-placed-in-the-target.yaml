document: rfc-8505
kind: design-rationale
summary: 'The Registered Address is placed in the Target Address field of NS messages rather than the Source Address field (as in RFC 6775) to enable proxy registrations: the 6LBR can register a 6LN''s address to a Routing Registrar without the Registered Node participating, and a node avoids using an address as Source before it is registered.'
section: "5.1"
topics:
    - ip
    - v6ops
