document: rfc-8656
kind: protocol-element
summary: 'An Allocation is the core TURN server state structure, consisting of: relayed transport address(es), the 5-tuple, authentication information (username, realm, nonce, key hash), time-to-expiry per relayed transport address, a list of permissions, and a list of channel-to-peer bindings. The relayed transport address MUST be unique across all allocations.'
section: "6"
topics:
