kind: protocol-element
summary: The OC-Peer-Algo AVP (AVP code 648) is of type Unsigned64 and contains a 64-bit flags field of announced capabilities. Feature bits defined for OC-Feature-Vector AVP associated with overload abatement algorithms are reused for this AVP; value zero is reserved.
