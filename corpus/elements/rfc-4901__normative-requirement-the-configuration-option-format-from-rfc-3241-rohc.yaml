document: rfc-4901
kind: normative-requirement
summary: The Configuration Option Format from RFC 3241 (ROHC) MUST be included for ROHC PW types and MUST NOT be included for ECRTP, CRTP, and IPHC PW types. A decompressor MUST reject this option for non-ROHC PW types and send an explicit error message to the compressor. The PROFILES suboption MUST be supplied.
section: 4.2.5
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
