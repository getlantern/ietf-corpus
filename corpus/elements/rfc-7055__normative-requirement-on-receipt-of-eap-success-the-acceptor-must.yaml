document: rfc-7055
kind: normative-requirement
summary: On receipt of EAP Success, the acceptor MUST confirm that a key has been derived and that the success is consistent with any protected result indication and AAA indication. If checks fail, the acceptor MUST send an error subtoken and fail context establishment.
section: "5.5"
rfc2119_level: MUST
topics:
    - security
    - crypto
