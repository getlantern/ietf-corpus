document: rfc-5011
kind: wire-format
summary: Bit 8 of the DNSKEY Flags field is designated as the 'REVOKE' flag. When set to '1' and a corresponding RRSIG(DNSKEY) signed by that key is present, the resolver MUST consider the key permanently invalid for all purposes except validating the revocation.
section: "3"
topics:
