document: rfc-9464
kind: protocol-element
summary: The Subject Public Key Info (SPKI) hash is the output of a cryptographic hash algorithm whose input is the DER-encoded ASN.1 representation of the SPKI from the encrypted DNS resolver's certificate. This is analogous to DANE certificate usage PKIX-EE(1) with selector SPKI(1) but without full PKIX validation.
