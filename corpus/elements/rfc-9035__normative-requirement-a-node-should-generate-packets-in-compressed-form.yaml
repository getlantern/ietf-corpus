document: rfc-9035
kind: normative-requirement
summary: A node SHOULD generate packets in compressed form using RFC 8138 if and only if the 'T' flag is set. This behavior can be overridden by configuration or network management (e.g., to enable compression when the Root cannot set 'T', or to disable it locally on problems).
section: "4"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
