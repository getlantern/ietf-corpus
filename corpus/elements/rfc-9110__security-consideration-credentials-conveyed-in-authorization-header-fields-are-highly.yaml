document: rfc-9110
kind: security-consideration
summary: Credentials conveyed in Authorization header fields are highly sensitive and MUST NOT be sent over connections that are not end-to-end secured. HTTP clients should not reuse credentials across different protection spaces (realms), and servers should not expose credentials in response fields.
section: 17.16.1
topics:
    - http
    - security
