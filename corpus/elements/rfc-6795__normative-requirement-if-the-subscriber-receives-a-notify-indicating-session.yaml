document: rfc-6795
kind: normative-requirement
summary: If the subscriber receives a NOTIFY indicating session rejection and the notifier terminated the subscription, the subscriber SHOULD NOT re-send the same SUBSCRIBE request. It MAY re-subscribe only if at least one aspect of the session has changed.
section: "3.9"
rfc2119_level: SHOULD NOT
topics:
    - sip
