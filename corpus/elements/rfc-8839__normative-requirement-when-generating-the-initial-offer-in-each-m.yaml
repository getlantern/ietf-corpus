document: rfc-8839
kind: normative-requirement
summary: When generating the initial offer, in each 'm=' section the offerer MUST include SDP 'candidate' attributes for each available candidate, and MUST include 'ice-ufrag', 'ice-pwd', and 'ice-options' with 'ice2'. A full ICE implementation SHOULD include 'ice-pacing'; a lite implementation MUST NOT.
section: 4.3.1
rfc2119_level: MUST
topics:
