document: rfc-1508
kind: design-rationale
summary: Callers desiring portability across alternative printable name syntaxes should use GSS_Compare_name() rather than string comparison of printable forms. GSS_Import_name() may support multiple printable syntaxes for the same namespace, so printable equality does not imply name equality.
section: 1.1.5
topics:
    - security
