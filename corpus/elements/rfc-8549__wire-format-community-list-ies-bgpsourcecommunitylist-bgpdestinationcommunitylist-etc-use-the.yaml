document: rfc-8549
kind: wire-format
summary: Community list IEs (bgpSourceCommunityList, bgpDestinationCommunityList, etc.) use the basicList format from RFC 6313, with field length 0xFFFF in the IPFIX template record to indicate variable length; the actual length is given by the List Length field in the basicList structure.
