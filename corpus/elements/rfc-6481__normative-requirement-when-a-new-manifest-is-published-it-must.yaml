document: rfc-6481
kind: normative-requirement
summary: When a new manifest is published, it MUST replace the previous manifest. CAs MUST NOT continue to publish previous CA manifests. The filename extension '.mft' MUST be used to denote the object as a manifest.
section: "2.2"
rfc2119_level: MUST
