document: rfc-2661
kind: wire-format
summary: The L2TP message header contains a flags/version octet pair (T, L, S, O, P bits plus 4-bit Ver), optional 16-bit Length, 16-bit Tunnel ID, 16-bit Session ID, optional 16-bit Ns, optional 16-bit Nr, and optional Offset Size/pad fields. All values are in network byte order.
section: "3.1"
