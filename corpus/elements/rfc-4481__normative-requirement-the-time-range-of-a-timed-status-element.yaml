document: rfc-4481
kind: normative-requirement
summary: The time range of a <timed-status> element MUST NOT encompass the present time (i.e., the PIDF <timestamp> value), as this would create an unnecessary and confusing alternate mechanism for current presence. For tuples without an 'until' attribute, the 'from' attribute MUST refer to the future.
section: "3"
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
