document: rfc-4293
kind: protocol-element
summary: ipReasmTimeout is a read-only Integer32 (in seconds) representing the maximum time received IPv4 fragments are held awaiting reassembly. IPv6 specifies this value directly in the protocol, so no equivalent object exists for IPv6.
