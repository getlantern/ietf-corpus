document: rfc-5283
kind: design-rationale
summary: Standard LDP requires exact match between FEC element and RIB entry, preventing inter-area LSP setup when ABRs aggregate IP prefixes. This document introduces Longest-Match Label Mapping to allow LSPs across IGP areas without leaking specific PE loopback addresses into all areas.
section: "1"
topics:
    - mpls
    - routing
