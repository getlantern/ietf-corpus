document: rfc-5185
kind: normative-requirement
summary: The Area ID in a received OSPF packet header must either match the receiving interface's Area ID (single-hop case), indicate a non-backbone area matching a configured multi-area adjacency, or indicate the backbone (virtual link or multi-area adjacency). If none of these cases match, the packet should be discarded.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
