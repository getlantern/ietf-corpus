document: rfc-5696
kind: design-rationale
summary: ECT(0) was chosen as the Not-marked codepoint over ECT(1) for conceptual consistency with RFC 3168, and because ECT(1) (the nonce, RFC 3540) has seen little deployment, making ECT(1) leakage into the PCN-domain less likely and thus safer to reserve for EXP.
section: A.2
