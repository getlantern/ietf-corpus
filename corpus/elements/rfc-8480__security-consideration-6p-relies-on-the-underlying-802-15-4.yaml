document: rfc-8480
kind: security-consideration
summary: 6P relies on the underlying 802.15.4 security mechanisms to protect message authenticity and integrity. Without link-layer security, an attacker could forge 6P messages to corrupt the TSCH schedule of any node within radio range, causing loss of connectivity or denial of service.
section: "3.5"
topics:
    - security
