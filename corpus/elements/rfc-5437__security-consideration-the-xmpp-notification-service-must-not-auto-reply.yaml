document: rfc-5437
kind: security-consideration
summary: The XMPP notification service MUST NOT auto-reply to XMPP messages it receives, to prevent notification loops caused by auto-replies. XMPP itself prevents forwarding-based loops since it does not support message forwarding between addresses.
section: "6"
topics:
    - security
    - email
