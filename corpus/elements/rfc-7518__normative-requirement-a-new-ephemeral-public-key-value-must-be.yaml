document: rfc-7518
kind: normative-requirement
summary: A new ephemeral public key value MUST be generated for each ECDH-ES key agreement operation. In Direct Key Agreement mode, the Concat KDF output MUST be a key of the same length as required by the 'enc' algorithm.
section: "4.6"
rfc2119_level: MUST
