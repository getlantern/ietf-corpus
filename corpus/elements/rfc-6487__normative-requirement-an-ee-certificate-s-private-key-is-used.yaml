document: rfc-6487
kind: normative-requirement
summary: An EE certificate's private key is used to sign a single RPKI signed object (one-time-use), and the EE certificate is embedded in the CMS signed-data structure. 'Sequential use' EE certificates MAY sign a sequence of manifests where each overwrites the previous.
section: "3"
rfc2119_level: MAY
topics:
