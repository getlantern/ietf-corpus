document: rfc-8843
kind: normative-requirement
summary: When DTLS is used within a BUNDLE group, there MUST be only one DTLS association for the group, all usages MUST use the same mechanism for determining client/server roles, and if the DTLS client supports DTLS-SRTP it MUST include the 'use_srtp' extension in the ClientHello even if DTLS-SRTP is not currently being negotiated.
section: "11"
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
