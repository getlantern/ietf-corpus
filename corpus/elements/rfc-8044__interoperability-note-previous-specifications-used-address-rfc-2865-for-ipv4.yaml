document: rfc-8044
kind: interoperability-note
summary: 'Previous specifications used ''address'' (RFC 2865 for IPv4) and ''Address'' (RFC 3162 for IPv6) inconsistently, and RFC 3162 failed to formally define data type names for IPv6 address, Interface-Id, and IPv6 prefix. RFC 8044 resolves these by introducing unambiguous names: ipv4addr, ipv6addr, ifid, ipv6prefix.'
section: "1.1"
topics:
    - radius
    - ip
