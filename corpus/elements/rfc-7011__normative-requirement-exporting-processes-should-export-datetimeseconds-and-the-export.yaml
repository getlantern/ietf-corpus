document: rfc-7011
kind: normative-requirement
summary: Exporting Processes SHOULD export dateTimeSeconds and the Export Time Message Header field as seconds since the UNIX epoch modulo 2^32 to support timestamp wraparound (expected 7 February 2106). Collecting Processes SHOULD use current date or contextual information to interpret such values correctly.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - measurement
