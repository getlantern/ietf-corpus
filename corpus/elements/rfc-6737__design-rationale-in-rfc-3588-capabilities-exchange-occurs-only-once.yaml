document: rfc-6737
kind: design-rationale
summary: In RFC 3588, capabilities exchange occurs only once at transport connection inception. If a peer's capabilities change, all existing connections and associated user sessions must be torn down and restarted. This application enables dynamic update of a subset of Diameter peer capabilities over an existing connection, avoiding that disruption.
section: "1"
topics:
    - diameter
