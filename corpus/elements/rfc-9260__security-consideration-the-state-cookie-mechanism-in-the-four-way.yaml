document: rfc-9260
kind: security-consideration
summary: The State Cookie mechanism in the four-way handshake protects against flooding (SYN-flood-style) attacks by keeping the responder stateless until the COOKIE ECHO is validated, so an attacker cannot exhaust responder resources by sending many INIT chunks.
section: 12.2.4.1
topics:
    - sctp
    - security
