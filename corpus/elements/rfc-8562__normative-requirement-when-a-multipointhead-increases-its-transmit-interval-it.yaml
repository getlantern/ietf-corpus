document: rfc-8562
kind: normative-requirement
summary: When a MultipointHead increases its transmit interval, it MUST send BFD Control packets with the P bit set at the old transmit interval before switching to the higher value, to avoid false detection timeouts at tails.
section: "5.10"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
