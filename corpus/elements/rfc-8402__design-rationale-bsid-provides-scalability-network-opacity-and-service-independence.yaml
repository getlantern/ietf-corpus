document: rfc-8402
kind: design-rationale
summary: 'BSID provides scalability, network opacity, and service independence: policy instantiation (the SID list) is stored only at the nodes imposing the policy. Traffic directed toward those nodes requires only the BSID, so policy changes affect only the imposing nodes and not the traffic sources.'
section: "5"
