summary: srhFlagsIPv6 (ElementID 492) is an 8-bit unsigned flags IPFIX IE capturing the Flags field from the IPv6 Segment Routing Header as defined in RFC 8754 Section 2. Assigned flag meanings are in the IANA 'Segment Routing Header Flags' registry.
