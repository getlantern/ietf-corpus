document: rfc-6794
kind: security-consideration
summary: Session information submitted to a policy server (offer, answer) may contain sensitive user data; session policies may reveal sensitive network or SLA information. Communication between UA and policy server must protect confidentiality, and both parties should authenticate each other. Policy servers that cannot authenticate a UA MAY return a generic policy that omits sensitive information.
section: "5"
topics:
    - sip
    - security
    - privacy
