kind: wire-format
summary: 'WSON label hops (used in path elements for primary/backup underlay, explicit route include/exclude objects, and computed path route objects) use a ''single-or-super-channel'' choice for DWDM: a single channel encodes ''dwdm-n'' (l0-types:dwdm-n), while a super-channel encodes a list ''subcarrier-dwdm-n*'' (l0-types:dwdm-n) identifying multiple subcarriers.'
