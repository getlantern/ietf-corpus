document: rfc-6565
kind: normative-requirement
summary: Each OSPFv3 instance MUST have a primary Domain ID that is transported with the VPN-IPv6 route in a BGP attribute over the VPN backbone. The Domain ID MUST be configured on a per-OSPFv3 instance basis.
section: 4.1.2
rfc2119_level: MUST
