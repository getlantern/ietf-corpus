document: rfc-2405
kind: security-consideration
summary: Using a low-Hamming distance IV source (e.g., a counter) in CBC mode can expose nearly identical effective plaintext across packets, enabling cryptanalytic attacks; IVs MUST differ substantially between packets.
section: "6"
