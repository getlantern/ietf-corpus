document: rfc-4791
kind: normative-requirement
summary: Calendar collections MUST only contain calendar object resources and non-calendar collections as top-level resources. Nesting of calendar collections within other calendar collections at any depth is not allowed.
section: "4.2"
rfc2119_level: MUST
