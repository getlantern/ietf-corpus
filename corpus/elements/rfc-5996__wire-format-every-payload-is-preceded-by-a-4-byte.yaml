document: rfc-5996
kind: wire-format
summary: 'Every payload is preceded by a 4-byte Generic Payload Header: 1-octet Next Payload type, 1-octet where bit 7 is the Critical flag and bits 0–6 are RESERVED, and 2-octet Payload Length inclusive of this header. The critical flag governs how unrecognized payload types are handled.'
section: "3.2"
topics:
    - ipsec
