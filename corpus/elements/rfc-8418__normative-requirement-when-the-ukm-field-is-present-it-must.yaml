document: rfc-8418
kind: normative-requirement
summary: When the ukm field is present, it MUST be selected in a manner that provides, with very high probability, a unique value; however there is no security benefit to using a ukm value longer than the KEK produced by the KDF.
section: "2"
rfc2119_level: MUST
topics:
