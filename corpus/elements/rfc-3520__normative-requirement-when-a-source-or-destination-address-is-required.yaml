document: rfc-3520
kind: normative-requirement
summary: When a source or destination address is required (per the applicable model), at least one IP-address sub-type (1 or 2) MUST be included in the AUTH_SESSION. The address in the resource reservation datagram (e.g., RSVP PATH) MUST match one of the included SOURCE_ADDR or DEST_ADDR attributes.
section: 3.3.3
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
