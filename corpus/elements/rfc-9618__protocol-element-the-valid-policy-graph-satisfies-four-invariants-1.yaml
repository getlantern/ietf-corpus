document: rfc-9618
kind: protocol-element
summary: 'The valid_policy_graph satisfies four invariants: (1) at most one node per depth per policy OID; (2) a node with valid_policy anyPolicy always has expected_policy_set {anyPolicy}; (3) a non-root anyPolicy node has exactly one parent whose valid_policy is also anyPolicy; (4) a node cannot simultaneously be a child of both anyPolicy and a non-anyPolicy OID.'
section: "5.2"
topics:
    - pkix
