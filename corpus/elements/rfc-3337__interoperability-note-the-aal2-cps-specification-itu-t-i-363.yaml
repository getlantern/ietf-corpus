document: rfc-3337
kind: interoperability-note
summary: The AAL2 CPS specification (ITU-T I.363.2) does not specify a scheduling method for payloads from different Channel IDs; most current AAL2 SAR implementations use fair scheduling, meaning real-time fragments wait at most one non-real-time fragment transmission.
section: "3"
topics:
