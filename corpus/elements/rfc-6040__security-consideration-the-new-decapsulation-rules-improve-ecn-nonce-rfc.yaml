document: rfc-6040
kind: security-consideration
summary: The new decapsulation rules improve ECN nonce (RFC 3540) coverage relative to RFC 3168 and RFC 4301, but coverage is not perfect. The compromise on the ECT(1) inner / ECT(0) outer case (Appendix D) — correcting the anomaly rather than forwarding it — trades nonce coverage for safety, since the decapsulator itself can detect the anomaly using the inner header as a reference.
section: "8"
topics:
