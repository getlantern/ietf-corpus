document: rfc-9899
kind: protocol-element
summary: 'The ''flags-bitmask'' container augments L4 TCP match fields and provides two modes: ''explicit'' (a leaf-list of tcp-flag identityrefs: ack, syn, fin, urg, psh, rst, ece, cwr, ae) and ''builtin'' (a uint16 bitmask covering bytes 13–14 of the TCP header). An ''operator'' leaf (bits: not, match, any) controls evaluation semantics.'
section: "3.4"
topics:
