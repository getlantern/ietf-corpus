document: rfc-2796
kind: design-rationale
summary: The BGP protocol provides no mechanism for a Client to dynamically identify itself as a Client of an RR; the simplest approach is manual configuration. The RR summarizes routing information and reflects only its best path, which is a key component in addressing the scaling issue.
