document: rfc-5277
kind: normative-requirement
summary: The <replayLogCreationTime> element MUST be present if replay is supported. The <replayLogAgedTime> element MUST be present if replay is supported and any notifications have been aged out of the log.
section: "3.4"
rfc2119_level: MUST
