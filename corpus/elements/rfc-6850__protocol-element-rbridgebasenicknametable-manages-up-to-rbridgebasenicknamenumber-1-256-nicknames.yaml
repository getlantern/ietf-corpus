kind: protocol-element
summary: rbridgeBaseNicknameTable manages up to rbridgeBaseNicknameNumber (1..256) nicknames per RBridge. Each entry carries a hold-priority (0..255, default 192 for configured entries with MSB set), distribution-tree-root priority (default 32768), and type (static or dynamic).
