document: rfc-7361
kind: protocol-element
summary: For negative MAC flushing in PBB-VPLS (N=1, C=1), the I-SID list SHOULD be specified (absent means all I-SIDs), and a B-MAC list SHOULD be included to scope the flush to specific B-MAC-to-C-MAC associations. This models the typical scenario where a PBB VPLS I-component interface has one I-SID and one or more B-MACs with multiple remotely learned C-MACs.
section: 5.2.1
topics:
    - mpls
