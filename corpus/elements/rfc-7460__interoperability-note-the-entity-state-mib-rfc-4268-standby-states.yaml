document: rfc-7460
kind: interoperability-note
summary: 'The ENTITY-STATE MIB (RFC 4268) standby states can be mapped to Energy Object Power States: entStateStandby unknown/hotStandby/coldStandby map to Power State unknown/ready/standby respectively, and providingService can map to any low–high Power State. No formal mapping is mandated; this is informative guidance for implementations using both MIBs.'
section: "7.2"
topics:
