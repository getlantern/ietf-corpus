document: rfc-2155
kind: protocol-element
summary: appnPortTable (indexed by appnPortName, 1–10 chars) describes each APPN port's DLC type (IANAifType), port type (leased/switched/sharedAccessFacilities), SIM/RIM support, link station role (primary/secondary/negotiable/abm), maximum receive BTU size (99–32767 bytes), I-frame window size, XID success/failure counters for defined and dynamic link stations, and a RowPointer to DLC-specific MIB information.
