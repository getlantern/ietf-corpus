document: rfc-9211
kind: interoperability-note
summary: The semantics of the `detail` parameter are always specific to the cache that sent it; even if a detail value from another cache shares the same string, it might not mean the same thing. Implementors must not assume cross-cache portability for detail values.
section: "2.8"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
