document: rfc-9608
kind: security-consideration
summary: For long-lived certificates using noRevAvail (e.g., IDevID), cryptographic algorithms expected to remain secure for the device's entire lifetime must be chosen, since the CA has no means of notifying relying parties about compromise of factory-installed keying material.
section: "6.2"
topics:
