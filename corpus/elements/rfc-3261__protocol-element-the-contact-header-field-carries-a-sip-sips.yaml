document: rfc-3261
kind: protocol-element
summary: The Contact header field carries a SIP/SIPS URI giving a direct route to the sending UA. Unlike Via (used for routing the current response), Contact tells other elements where to send future requests within the dialog, and is the mechanism by which endpoints bypass proxies for mid-dialog messages.
section: "20.10"
topics:
