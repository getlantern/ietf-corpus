document: rfc-9066
kind: normative-requirement
summary: If a MAP Border Relay or lwAFTR is enabled in the provider's domain, identification of an attack source bound to an IPv4 address/prefix MUST also rely on source port numbers because the same IPv4 address is shared across multiple customers.
