document: rfc-7432
kind: normative-requirement
summary: An Ethernet segment SHOULD have a non-reserved ESI that is unique network-wide across all EVPN instances on all PEs. When the CE is not managed, the operator MUST configure a network-wide unique ESI, which is required to enable auto-discovery and Designated Forwarder election.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
