document: rfc-4985
kind: protocol-element
summary: Name constraints matching for SRVName handles the service name part and DNS name part separately. A service name restriction can only be satisfied by an SRVName with a matching service name; an absent service name restriction is satisfied by any SRVName matching the domain part.
section: "4"
