document: rfc-4950
kind: security-consideration
summary: An operator can use the TTL treatment on MPLS Pipe Model LSPs (RFC 3443) for a TTL-transparent mode of operation that prevents ICMP Time Exceeded messages altogether when tunneling over an MPLS LSP, which also prevents disclosure of MPLS topology information.
