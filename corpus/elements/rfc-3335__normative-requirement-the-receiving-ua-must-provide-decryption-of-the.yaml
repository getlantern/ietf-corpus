document: rfc-3335
kind: normative-requirement
summary: 'The receiving UA MUST provide: decryption of the symmetric key using the receiver''s private key, decryption of the EDI interchange, authentication of the sender''s signature, formatting of the MDN with the calculated MIC in the Received-content-MIC field, and creation of a multipart/signed MIME message.'
section: "5.1"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
