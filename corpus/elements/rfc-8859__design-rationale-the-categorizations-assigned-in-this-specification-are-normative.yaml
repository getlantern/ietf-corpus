document: rfc-8859
kind: design-rationale
summary: The categorizations assigned in this specification are normative, not informative. Although attributes can be semantically grouped (media content, transport characteristics, metadata, relationships), the multiplexing categories are defined independently of those informal groupings, because multiplexing compatibility is a distinct axis from semantic purpose.
