document: rfc-6840
kind: normative-requirement
summary: DS records using unknown or unsupported message digest algorithms MUST be treated the same as DS records referring to DNSKEY RRs of unknown or unsupported public key algorithms — they are disregarded, and if none remain, the zone is treated as unsigned.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - security
