document: rfc-3407
kind: normative-requirement
summary: The initial sequence number MUST be 0 and MUST be incremented by 1 modulo 256 with each new capability set issued. Receivers MUST NOT reject a capability set due to gaps in sequence numbers.
section: "3"
rfc2119_level: MUST
