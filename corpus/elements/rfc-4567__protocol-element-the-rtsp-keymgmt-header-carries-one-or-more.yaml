kind: protocol-element
summary: 'The RTSP KeyMgmt header carries one or more key-mgmt-spec entries, each with a ''prot'' (KMPID), optional ''uri'' identifying the session or media context, and base64-encoded ''data''. Syntax: KeyMgmt = ''KeyMgmt'' '':'' key-mgmt-spec 0*('','' key-mgmt-spec).'
