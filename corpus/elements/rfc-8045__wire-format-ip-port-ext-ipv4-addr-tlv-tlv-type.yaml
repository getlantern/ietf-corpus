document: rfc-8045
kind: wire-format
summary: IP-Port-Ext-IPv4-Addr TLV (TLV-Type 3, Length 6 octets) carries IPFIX IE 225 (postNATSourceIPv4Address) as a 32-bit IPv4 address — the external address after NAT. It is optional in all three parent attributes (241.5.3, 241.6.3, 241.7.3).
