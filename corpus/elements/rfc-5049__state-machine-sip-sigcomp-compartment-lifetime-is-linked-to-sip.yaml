document: rfc-5049
kind: state-machine
summary: 'SIP/SigComp compartment lifetime is linked to SIP registration state: a compartment is opened when a REGISTER transaction is initiated/received, and is closed when the registration expires or is canceled (or on a non-2xx final response). Applications SHOULD NOT close compartments until registration is over.'
section: "9.3"
topics:
