document: rfc-2938
kind: protocol-element
summary: A feature set hashed reference takes the form 'h.' followed by one or more BASE32DIGIT characters, where BASE32DIGIT includes digits 0-9 and letters A-V (upper or lower case). This auxiliary predicate name syntax is used within feature set expressions to reference a composite feature set.
section: "3.1"
