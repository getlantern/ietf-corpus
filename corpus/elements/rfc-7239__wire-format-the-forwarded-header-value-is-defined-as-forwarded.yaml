document: rfc-7239
kind: wire-format
summary: The Forwarded header value is defined as `Forwarded = 1#forwarded-element` where each `forwarded-element` is a semicolon-separated list of `forwarded-pair = token "=" value` items. Parameter names are case-insensitive; values may be tokens or quoted-strings. IPv6 addresses must be quoted since ":" and "[]" are not valid in token.
section: "4"
topics:
