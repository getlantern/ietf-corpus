document: rfc-9464
kind: normative-requirement
summary: The Service Priority field MUST NOT be set to 0, because AliasMode (Section 2.4.2 of RFC 9460) is not supported — such a mode would trigger additional Do53 queries while the data can be supplied directly in the IKE response.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - dns
    - vpn
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
