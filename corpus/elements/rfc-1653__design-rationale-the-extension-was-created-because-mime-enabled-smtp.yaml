document: rfc-1653
kind: design-rationale
summary: The extension was created because MIME-enabled SMTP is expected to carry a much wider range of message sizes than previously, increasing demands on server resources such as disk space. Without this extension, a client only learns of size-related failures after transmitting the entire message.
section: "1"
