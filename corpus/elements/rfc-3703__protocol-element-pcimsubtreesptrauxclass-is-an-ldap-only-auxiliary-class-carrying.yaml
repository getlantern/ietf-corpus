document: rfc-3703
kind: protocol-element
summary: pcimSubtreesPtrAuxClass is an LDAP-only auxiliary class carrying a multi-valued DN attribute that points to subtrees containing policy-related objects. A PDP is configured with an initial DN, retrieves this class, then issues subtree searches against each referenced anchor — enabling retrieval of all relevant policy entries in as few as three LDAP operations.
section: "4.5"
topics:
    - ldap
