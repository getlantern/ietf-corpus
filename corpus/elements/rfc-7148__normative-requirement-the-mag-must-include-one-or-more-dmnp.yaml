document: rfc-7148
kind: normative-requirement
summary: The MAG MUST include one or more DMNP options in the Proxy Binding Update message in order to request the LMA to allocate DMNP(s) for the mobile router, provided the mobile router's policy profile indicates Delegated Prefix support.
section: 5.1.2
rfc2119_level: MUST
topics:
