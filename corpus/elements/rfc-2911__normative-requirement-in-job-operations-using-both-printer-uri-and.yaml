document: rfc-2911
kind: normative-requirement
summary: In Job operations using both 'printer-uri' and 'job-id' as targets, 'printer-uri' MUST be the third attribute and 'job-id' MUST be the fourth attribute in the operation attributes group. All target URIs in requests and responses MUST be in absolute format, not relative.
section: 3.1.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
