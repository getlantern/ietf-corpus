document: rfc-8550
kind: normative-requirement
summary: Receiving agents MUST support the CRL format defined in RFC 5280 and MUST support both v1 and v2 CRLs. All agents MUST be capable of performing revocation checks using CRLs as specified in RFC 5280 and MUST perform revocation status checking in accordance with RFC 5280.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - security
