document: rfc-6530
kind: protocol-element
summary: A 'conventional message' is one strictly conformant to RFC 5322 that uses no extensions from RFC 6531 or RFC 6532. An 'internationalized message' utilizes one or more of those extensions and is no longer conformant to the traditional email message specification or its transport.
section: "4.6"
topics:
    - email
