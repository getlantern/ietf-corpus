document: rfc-6076
kind: normative-requirement
summary: t1 SHALL be used to designate the time of day when a particular measurement was conducted. When measurement results will be correlated with other results, the clock supplying t1 SHOULD be synchronized to a primary time source and clocks at different measurement points SHOULD be synchronized to each other.
section: "3"
rfc2119_level: SHALL
topics:
    - realtime
    - measurement
