document: rfc-1332
kind: protocol-element
summary: IPCP is the NCP responsible for configuring, enabling, and disabling the IP protocol modules on both ends of a PPP point-to-point link. It uses the same packet exchange mechanism as LCP and is identified by PPP Protocol field value 0x8021.
