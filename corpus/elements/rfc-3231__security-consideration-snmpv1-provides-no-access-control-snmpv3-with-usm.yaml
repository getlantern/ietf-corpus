document: rfc-3231
kind: security-consideration
summary: SNMPv1 provides no access control; SNMPv3 with USM (RFC 2574) and VACM (RFC 2575) is recommended. Without SNMPv3, unauthorized principals on a secure network could still GET or SET scheduling objects, potentially causing unintended management actions.
section: "6"
topics:
    - snmp
    - security
