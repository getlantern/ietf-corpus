document: rfc-4175
kind: normative-requirement
summary: If scan line data exceeds the network MTU, the scan line SHOULD be fragmented into multiple RTP packets each smaller than the MTU. A single RTP packet MAY contain data for more than one scan line.
section: "3"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
