document: rfc-6844
kind: security-consideration
summary: Introduction of a malformed or malicious CAA RR could theoretically enable a DoS attack against an issuer, but the DNS protocol's maximum name length limits the exposure and CAA processing does not meaningfully exacerbate existing DNS DoS risks.
section: "6.4"
