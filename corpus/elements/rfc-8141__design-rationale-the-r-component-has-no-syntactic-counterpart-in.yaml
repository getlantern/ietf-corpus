document: rfc-8141
kind: design-rationale
summary: The r-component has no syntactic counterpart in any other known URI scheme. It was added to support passing parameters to URN resolution services, distinct from q-components which pass parameters to the resource or application. Exact semantics are deliberately left to future standardization to avoid premature lock-in.
section: 2.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
