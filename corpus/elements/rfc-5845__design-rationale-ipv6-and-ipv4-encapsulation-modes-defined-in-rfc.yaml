document: rfc-5845
kind: design-rationale
summary: IPv6 and IPv4 encapsulation modes defined in RFC 2473 and RFC 2003 are insufficient to uniquely identify the destination of packets for a specific mobility session in scenarios such as overlapping IPv4 private address space. GRE with its Key extension provides the richer semantics needed to distinguish flows between different operators or mobile nodes sharing the same address space.
section: "1"
topics:
    - routing
    - ip
    - nat
