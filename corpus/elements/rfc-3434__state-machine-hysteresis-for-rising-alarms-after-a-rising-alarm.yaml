summary: 'Hysteresis for rising alarms: after a rising alarm fires (sampled value >= rising threshold from below), no further rising alarm is generated until the value falls below the rising threshold and then reaches the falling threshold. The reverse applies for falling alarms, preventing alarm storms.'
