document: rfc-9252
kind: normative-requirement
summary: The ingress PE MUST perform a resolvability check for the SRv6 Service SID (evaluated per RFC 4271) before considering the received prefix for BGP best path computation, for both L3 services (Section 5) and EVPN services (Section 6).
section: "5"
rfc2119_level: MUST
