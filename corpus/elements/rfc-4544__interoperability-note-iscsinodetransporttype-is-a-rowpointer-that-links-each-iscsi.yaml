document: rfc-4544
kind: interoperability-note
summary: iscsiNodeTransportType is a RowPointer that links each iSCSI node to its corresponding transport entry in the SCSI MIB, enabling management station navigation between MIB modules. For implementations without a SCSI layer (e.g., iSCSI proxies), it may point to an implementation-specific table or be left as 0.0.
