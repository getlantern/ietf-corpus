document: rfc-7636
kind: security-consideration
summary: If code_challenge_method is 'plain' and the code_challenge is stored inside the authorization code for a stateless server, it MUST be encrypted such that only the server can decrypt it, to prevent disclosure of the code_verifier equivalent.
section: "7.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
