document: rfc-7372
kind: normative-requirement
summary: If a receiving server performs multiple authentication checks and more than one fails, warranting rejection, the SMTP server SHOULD use the code that indicates multiple methods failed (X.7.26) rather than only reporting the first one that failed.
section: "4"
rfc2119_level: SHOULD
topics:
