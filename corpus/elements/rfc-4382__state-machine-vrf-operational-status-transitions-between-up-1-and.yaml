document: rfc-4382
kind: state-machine
summary: VRF operational status transitions between up(1) and down(2). It enters up(1) when at least one associated interface has ifOperStatus up(1); it enters down(2) when all associated interfaces are down or when no interfaces are associated. Transitions trigger mplsL3VpnVrfUp and mplsL3VpnVrfDown notifications.
section: "7"
topics:
