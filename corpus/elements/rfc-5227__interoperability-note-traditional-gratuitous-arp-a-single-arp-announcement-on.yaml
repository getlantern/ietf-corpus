document: rfc-5227
kind: interoperability-note
summary: 'Traditional ''Gratuitous ARP'' (a single ARP Announcement on interface configuration, as described in Stevens [Ste94]) does not provide effective duplicate address detection: the victim logs an error, but both hosts continue trying to use the same address, continually resetting each other''s TCP connections.'
