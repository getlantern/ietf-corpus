document: rfc-2672
kind: security-consideration
summary: The DNAME record is similar to CNAME with regard to the consequences of inserting a spoofed record into a DNS server or resolver, but DNAME's effect covers an entire subtree of the name space rather than a single node. DNSSEC facilities are available to authenticate this record type.
section: "7"
topics:
