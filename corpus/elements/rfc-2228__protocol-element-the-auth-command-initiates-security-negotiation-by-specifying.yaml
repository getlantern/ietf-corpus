document: rfc-2228
kind: protocol-element
summary: The AUTH command initiates security negotiation by specifying a case-insensitive mechanism name. The server responds with 234 (accepted, no data needed), 334 (accepted, data required), 504 (unknown mechanism), 534 (policy rejection), or 431 (resource unavailable). Mechanism names must be IANA-registered except those prefixed with 'X-'.
