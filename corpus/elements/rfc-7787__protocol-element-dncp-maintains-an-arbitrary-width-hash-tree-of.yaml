document: rfc-7787
kind: protocol-element
summary: DNCP maintains an arbitrary-width hash tree of height 1 per node; each leaf represents one bidirectionally reachable node. The network state hash is H(seq_1 ‖ H(data_1) ‖ … ‖ seq_N ‖ H(data_N)) with per-node data concatenated in ascending node-identifier order.
