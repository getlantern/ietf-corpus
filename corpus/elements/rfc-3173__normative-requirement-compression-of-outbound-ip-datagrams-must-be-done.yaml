document: rfc-3173
kind: normative-requirement
summary: Compression of outbound IP datagrams MUST be done before any IP security processing (encryption and authentication) and before any fragmentation. In IPv6, compression MUST also precede addition of Hop-by-Hop Options or Routing Headers.
section: "2"
rfc2119_level: MUST
topics:
    - ip
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
