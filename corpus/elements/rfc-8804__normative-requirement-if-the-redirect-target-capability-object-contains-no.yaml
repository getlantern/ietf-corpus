document: rfc-8804
kind: normative-requirement
summary: If the Redirect Target capability object contains no target or an empty target, the uCDN MUST interpret it as 'no target available for these uCDN hosts for the specified footprint'. If such a target was previously advertised, the uCDN MUST treat this as an update that deletes the prior redirect target.
section: "2"
rfc2119_level: MUST
topics:
    - http
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
