document: rfc-3771
kind: design-rationale
summary: A new IntermediateResponse message type was introduced rather than reusing ExtendedResponse as a general intermediate response mechanism because adapting ExtendedResponse would likely require existing APIs to be redesigned and was believed to cause interoperability problems with existing deployed implementations.
