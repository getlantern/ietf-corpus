document: rfc-8695
kind: protocol-element
summary: 'Split-horizon is configurable per interface with three enumerated values: ''disabled'' (no split-horizon), ''simple'' (routes not advertised back toward the source interface), and ''poison-reverse'' (routes advertised with infinite metric back toward source). The default is ''simple''.'
