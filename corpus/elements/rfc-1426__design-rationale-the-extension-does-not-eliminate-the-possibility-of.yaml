document: rfc-1426
kind: design-rationale
summary: The extension does NOT eliminate the possibility of an SMTP server limiting line length; servers are free to implement 8BITMIME but still set a line length limit no lower than 1000 octets. This preserves backward compatibility with existing line-length constraints.
