document: rfc-4837
kind: protocol-element
summary: The dot3MpcpRoundTripTime object reports per-link MPCP RTT in 16ns Time Quanta units (Unsigned32, range 0..0xffff TQ). The OLT holds a distinct RTT per virtual interface reflecting the physical distance of each ONU; the standard allows up to 20 km (approximately 200 usec RTT).
