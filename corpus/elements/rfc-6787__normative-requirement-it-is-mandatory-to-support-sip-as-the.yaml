document: rfc-6787
kind: normative-requirement
summary: It is mandatory to support SIP as the session establishment protocol to ensure interoperability. Other protocols can be used for session establishment only by prior agreement; this document only describes the use of SIP and SDP.
section: "1"
rfc2119_level: REQUIRED
