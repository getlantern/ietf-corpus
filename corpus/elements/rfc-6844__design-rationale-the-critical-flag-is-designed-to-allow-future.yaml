document: rfc-6844
kind: design-rationale
summary: The critical flag is designed to allow future CAA versions to introduce new semantics that MUST be understood for correct processing, preventing conforming CAs that do not recognize the new semantics from issuing certificates. This provides forward-compatible extensibility without backward-compatibility breaks.
