document: rfc-8315
kind: security-consideration
summary: 'Preimage resistance of the <scheme> hash function is the critical security property. A successful preimage attack either reveals the real Cancel-Key or produces a forgeable one, breaking the entire authentication system. Collision resistance is less important: finding two matching c-key elements for an arbitrary Cancel-Lock does not enable targeted forgery.'
section: "7"
topics:
