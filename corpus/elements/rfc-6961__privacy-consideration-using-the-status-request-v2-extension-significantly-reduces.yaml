document: rfc-6961
kind: privacy-consideration
summary: Using the status_request_v2 extension significantly reduces privacy concerns around clients informing the certificate issuer about which sites they are visiting, since the server retrieves and staples the OCSP response rather than the client querying the CA's OCSP server directly.
