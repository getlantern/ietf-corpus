document: rfc-6806
kind: design-rationale
summary: The Section 11 negotiation mechanism was designed to complement FAST rather than replace it. FAST requires an armor ticket not available to all clients, so the negotiation mechanism provides a baseline level of request-integrity protection for deployments that cannot use FAST.
section: "11"
topics:
