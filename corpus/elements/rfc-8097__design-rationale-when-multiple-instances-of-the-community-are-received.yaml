document: rfc-8097
kind: design-rationale
summary: When multiple instances of the community are received, the one with the numerically greatest validation state value takes precedence. This prioritizes 'invalid' (2) over 'not found' (1) over 'valid' (0), implementing a conservative preference for the most alarming state.
