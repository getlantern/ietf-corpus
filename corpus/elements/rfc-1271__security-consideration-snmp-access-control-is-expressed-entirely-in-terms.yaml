document: rfc-1271
kind: security-consideration
summary: SNMP access control is expressed entirely in terms of MIB view membership, not object values. The OwnerString objects provide resource contention resolution only among cooperating managers and provide no access control function against uncooperative parties; a hostile management station can modify or delete entries owned by others.
section: Security Considerations
topics:
    - snmp
    - security
