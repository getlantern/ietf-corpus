document: rfc-4439
kind: protocol-element
summary: t11FamIfTable (indexed by fcmInstanceIndex, fcmSwitchIndex, t11FamFabricIndex, ifIndex) holds per-interface per-Fabric Fabric Address Manager parameters. Entries are auto-created when an E_Port becomes non-isolated and auto-deleted when the interface is no longer an E_Port with all-default parameters, the interface no longer exists, or the parent Fabric row is removed.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
