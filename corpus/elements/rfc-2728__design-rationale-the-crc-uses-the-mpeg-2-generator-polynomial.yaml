document: rfc-2728
kind: design-rationale
summary: The CRC uses the MPEG-2 generator polynomial rather than the Ethernet CRC specifically to provide a final integrity check for datagrams that span FEC bundles or were not fully corrected by the FEC, providing an additional error-detection layer beyond FEC.
