document: rfc-6048
kind: normative-requirement
summary: If no wildmat is specified in LIST COUNTS, the server MUST include every newsgroup that the client is permitted to select with the GROUP command. The same newsgroup SHOULD NOT appear twice in the output.
section: 2.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
