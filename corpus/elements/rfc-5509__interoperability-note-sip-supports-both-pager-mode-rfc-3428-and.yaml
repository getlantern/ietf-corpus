document: rfc-5509
kind: interoperability-note
summary: SIP supports both pager mode (RFC 3428) and session mode (RFC 4975) for instant messaging, but a DNS SRV lookup does not specify which IM mode a domain offers. If the UAC supports both modes, it is suggested to try session mode first and fall back to pager mode if that mode is rejected.
section: "3"
