document: rfc-8077
kind: design-rationale
summary: Interface Parameter Sub-TLVs are part of the FEC, making it impossible to change interface parameters after a pseudowire is established. This design prevents misuse of the parameters field for mutable status information, which must instead use optional parameter TLVs.
section: "6.1"
topics:
    - mpls
