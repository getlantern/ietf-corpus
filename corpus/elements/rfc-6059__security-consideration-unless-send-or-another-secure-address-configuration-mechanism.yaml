document: rfc-6059
kind: security-consideration
summary: Unless SEND or another secure address configuration mechanism is used, Simple DNA does not provide authenticated identification of the network. The host MUST NOT make security-sensitive decisions based on DNA alone; in particular it MUST NOT conclude it has moved from an untrusted to a trusted network solely on the basis of the DNA procedure.
section: "9"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
