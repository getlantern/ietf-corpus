document: rfc-6284
kind: normative-requirement
summary: RTCP messages that trigger transmission of RTP packets in a port-mapped unicast session are REQUIRED to be authenticated by using a Token when the Token capability is declared in the session description. These include NACK messages and RAMS-R messages.
section: 4.3.1
rfc2119_level: REQUIRED
topics:
    - rtp
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
