document: rfc-4280
kind: security-consideration
summary: This document introduces no new security concerns beyond those in base DHCP (RFC 2131) and DHCPv6 (RFC 3315). In the absence of message integrity protection, an attacker could modify the BCMCS controller option values to divert requests for broadcast service.
