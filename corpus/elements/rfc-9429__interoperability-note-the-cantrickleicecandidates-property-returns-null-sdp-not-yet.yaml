document: rfc-9429
kind: interoperability-note
summary: The 'canTrickleIceCandidates' property returns null (SDP not yet received), true, or false. An application that compares against 'true' will attempt half-trickle on initial offers and full trickle on subsequent interactions with a Trickle ICE-compatible agent.
section: 4.1.17
topics:
