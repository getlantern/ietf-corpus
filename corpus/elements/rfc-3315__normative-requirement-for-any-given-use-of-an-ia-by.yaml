document: rfc-3315
kind: normative-requirement
summary: For any given use of an IA by a client, the IAID MUST be consistent across restarts of the DHCP client, maintained either by storing the IAID in non-volatile storage or by a deterministic algorithm that produces the same IAID given unchanged hardware configuration.
section: "10"
rfc2119_level: MUST
topics:
    - ip
