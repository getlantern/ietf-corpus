document: rfc-1532
kind: design-rationale
summary: The 'giaddr' field name ('gateway' address) is acknowledged as 'poorly named.' It exists solely to route BOOTP exchanges between relay agents and servers, not as a general first-hop IP router for the client. Its misinterpretation as a router address (suggested in RFC 951 Section 7.5) is explicitly prohibited here.
section: "3.4"
topics:
    - ip
