document: rfc-9904
kind: normative-requirement
summary: Adding a new entry to the 'DNS Security Algorithm Numbers' registry with a recommended value of 'MAY' in any of the four recommendation columns is subject to Specification Required policy. New entries added through Specification Required will have 'MAY' for all columns.
section: "2.2"
rfc2119_level: MAY
topics:
