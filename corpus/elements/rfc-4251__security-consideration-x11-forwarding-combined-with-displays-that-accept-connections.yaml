document: rfc-4251
kind: security-consideration
summary: X11 forwarding combined with displays that accept connections only over local IPC mechanisms with ACLs corrects many X11 security problems, provided the 'none' MAC is not in use. It is RECOMMENDED that both X11 display implementations and SSH server implementations default to allowing display connections only over local IPC.
section: 9.5.3
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
