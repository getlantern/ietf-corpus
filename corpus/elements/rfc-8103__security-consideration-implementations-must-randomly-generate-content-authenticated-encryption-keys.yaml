document: rfc-8103
kind: security-consideration
summary: Implementations must randomly generate content-authenticated-encryption keys using a cryptographically strong PRNG. Use of inadequate PRNGs can reduce effective key space to a searchable set, defeating the security of the algorithm. RFC 4086 provides guidance.
section: "6"
topics:
    - crypto
    - security
