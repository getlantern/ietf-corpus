document: rfc-3998
kind: normative-requirement
summary: Schedule-Job-After MUST reject the request if the target job is not in 'pending' state or the predecessor job is not in 'pending', 'processing', or 'processing-stopped' state, returning 'client-error-not-possible'. The 'predecessor-job-id' attribute MUST be supported by the Printer if it supports this operation.
section: 4.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
