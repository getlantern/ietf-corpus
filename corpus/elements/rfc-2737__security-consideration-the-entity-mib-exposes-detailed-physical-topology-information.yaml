document: rfc-2737
kind: security-consideration
summary: The Entity MIB exposes detailed physical topology information (hardware revisions, serial numbers, model names, asset IDs, and containment structure) that could aid an attacker in targeting specific vulnerabilities. Access to the MIB should be controlled via SNMP access control mechanisms to limit disclosure.
