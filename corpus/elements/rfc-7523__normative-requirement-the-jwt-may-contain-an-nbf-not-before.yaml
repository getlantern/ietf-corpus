document: rfc-7523
kind: normative-requirement
summary: The JWT MAY contain an 'nbf' (not before) claim; if present, the token MUST NOT be accepted for processing before that time. The JWT MAY also contain an 'iat' (issued at) claim; servers may reject JWTs with an 'iat' unreasonably far in the past.
section: "3"
rfc2119_level: MAY
topics:
    - oauth
    - jose
    - json
