document: rfc-4077
kind: interoperability-note
summary: NACK messages are formatted as syntactically valid SigComp messages (second variant, code_len=0) so they are safely ignored by implementations that do not support the NACK mechanism, ensuring backward compatibility with SigComp version 0x01 nodes.
