document: rfc-5605
kind: security-consideration
summary: The pwAtmCfgTable, pwAtmPerfCurrentTable, pwAtmPerfIntervalTable, and pwAtmPerf1DayIntervalTable collectively reveal the ATM pseudowire connectivity topology and performance characteristics. Even GET and NOTIFY access to these readable objects should be controlled, and values should potentially be encrypted when transmitted over the network.
