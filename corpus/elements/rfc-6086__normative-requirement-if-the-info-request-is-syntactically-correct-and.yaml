document: rfc-6086
kind: normative-requirement
summary: If the INFO request is syntactically correct and well-structured, the UA MUST send a 200 (OK) response. Application-level rejection of received information must be done at the application level by sending a new INFO request.
section: 4.2.2
rfc2119_level: MUST
topics:
