document: rfc-7208
kind: normative-requirement
summary: Checking identities other than MAIL FROM and HELO against SPF version 1 records is NOT RECOMMENDED because mailing lists rewrite MAIL FROM but may not change other identities, producing incorrect results.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - email
