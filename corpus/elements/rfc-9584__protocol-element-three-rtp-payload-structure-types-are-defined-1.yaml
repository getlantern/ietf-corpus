document: rfc-9584
kind: protocol-element
summary: 'Three RTP payload structure types are defined: (1) Single NAL Unit Packet for exactly one NAL unit, (2) Aggregation Packet (AP, Type=56) combining multiple NAL units from one access unit, and (3) Fragmentation Unit (FU, Type=57) carrying a contiguous fragment of a single NAL unit. The payload type is identified by the Type field in the payload header.'
section: "4.3"
