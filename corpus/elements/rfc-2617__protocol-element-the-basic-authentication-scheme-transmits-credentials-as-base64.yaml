document: rfc-2617
kind: protocol-element
summary: The Basic authentication scheme transmits credentials as base64(userid ":" password). The realm directive identifies the protection space; there are no optional authentication parameters. A client SHOULD assume all paths at or deeper than the last symbolic element of the Request-URI are within the same protection space.
section: "2"
topics:
