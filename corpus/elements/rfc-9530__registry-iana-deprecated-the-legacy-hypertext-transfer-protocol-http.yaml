document: rfc-9530
kind: registry
summary: IANA deprecated the legacy 'Hypertext Transfer Protocol (HTTP) Digest Algorithm Values' registry (which listed algorithms for RFC 3230's Digest and Want-Digest fields). New registrations are encouraged to use the 'Hash Algorithms for HTTP Digest Fields' registry instead.
section: "7.3"
topics:
