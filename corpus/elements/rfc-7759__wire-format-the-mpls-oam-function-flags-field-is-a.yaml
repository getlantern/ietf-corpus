document: rfc-7759
kind: wire-format
summary: The MPLS OAM Function Flags field is a 32-bit bitmap with bit positions C (CC), V (CV), F (FMS), L (PM/Loss), D (PM/Delay), T (Throughput), bits 6-30 unassigned (MUST be zero), and bit 31 reserved. The flags indicate which OAM functions should be activated.
