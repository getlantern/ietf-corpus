summary: diffServMultiFieldClfrTable defines the Multi-field Classifier parameter, matching on IP source/destination address prefix, IPv6 Flow ID, IP protocol, TCP/UDP/SCTP source and destination port ranges, and DSCP. A Behavior Aggregate classifier is a degenerate case specifying only the DSCP field.
