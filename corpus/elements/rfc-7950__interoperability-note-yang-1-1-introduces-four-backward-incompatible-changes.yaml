document: rfc-7950
kind: interoperability-note
summary: 'YANG 1.1 introduces four backward-incompatible changes from YANG 1: revised double-quoted string escape rules, prohibition of quote characters in unquoted strings, ''when'' and ''if-feature'' illegal on list keys, and noncharacters illegal in the ''string'' built-in type.'
