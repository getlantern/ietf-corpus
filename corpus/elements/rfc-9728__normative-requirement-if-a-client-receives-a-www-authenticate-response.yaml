document: rfc-9728
kind: normative-requirement
summary: If a client receives a WWW-Authenticate response indicating that resource metadata may have changed, it SHOULD retrieve the updated protected resource metadata and use the new metadata values after validating them.
section: "5.2"
rfc2119_level: SHOULD
