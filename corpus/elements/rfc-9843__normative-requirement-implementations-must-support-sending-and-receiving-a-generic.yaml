document: rfc-9843
kind: normative-requirement
summary: Implementations MUST support sending and receiving a Generic Metric sub-TLV in Application-Specific Link Attributes (ASLA) encodings as well as in TLV 22 and Extended Link Opaque LSAs and TE-LSAs. Usage of the generic metric by an application is subject to the same rules as other link attributes.
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
