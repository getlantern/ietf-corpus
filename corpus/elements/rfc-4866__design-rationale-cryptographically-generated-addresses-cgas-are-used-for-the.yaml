document: rfc-4866
kind: design-rationale
summary: Cryptographically Generated Addresses (CGAs) are used for the mobile node's home address to provide a strong cryptographic binding between the interface identifier and the node's public key. This eliminates the need for repeated home address tests after an initial prefix validation, enabling longer binding lifetimes and lower handoff delays without requiring a public-key infrastructure.
section: "3.1"
topics:
