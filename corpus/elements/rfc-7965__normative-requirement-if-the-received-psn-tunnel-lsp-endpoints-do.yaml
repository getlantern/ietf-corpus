document: rfc-7965
kind: normative-requirement
summary: If the received PSN tunnel/LSP endpoints do not match the PW endpoints, the receiving PE MUST reply with a Label Release message with status code 0x0000003B ('Reject - unable to use the suggested tunnel/LSPs'), and the received PSN Tunnel Binding TLV MUST also be carried.
section: "5"
rfc2119_level: MUST
topics:
