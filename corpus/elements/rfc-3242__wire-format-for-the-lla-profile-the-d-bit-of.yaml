kind: wire-format
summary: 'For the LLA profile, the D-bit of the ROHC RTP IR packet is redefined: D=0 means the dynamic chain is absent and the payload has been discarded (fast context initialization); D=1 retains the standard meaning of dynamic chain and payload present.'
