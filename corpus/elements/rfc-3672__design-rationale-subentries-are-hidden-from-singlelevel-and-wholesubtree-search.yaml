document: rfc-3672
kind: design-rationale
summary: Subentries are hidden from singleLevel and wholeSubtree Search by default (absent the subentries control) because they hold administrative metadata not generally relevant to directory user queries. They remain visible to baseObject Search to allow direct access by distinguished name.
