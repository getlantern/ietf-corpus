document: rfc-2830
kind: protocol-element
summary: 'Certificate identity matching rules: if a subjectAltName dNSName extension is present it SHOULD be used; matching is case-insensitive; the ''*'' wildcard applies only to the left-most name component (e.g. *.bar.com matches a.bar.com but not bar.com).'
section: "3.6"
topics:
