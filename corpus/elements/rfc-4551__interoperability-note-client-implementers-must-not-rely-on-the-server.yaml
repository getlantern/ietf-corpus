document: rfc-4551
kind: interoperability-note
summary: Client implementers MUST NOT rely on the server SHOULD NOT behavior of leaving the mod-sequence unchanged for no-op flag operations (adding a flag already set, or removing one already absent). A client cannot distinguish between a server violating this recommendation and the case where another session toggled the flag.
section: "3.8"
rfc2119_level: MUST NOT
topics:
    - email
