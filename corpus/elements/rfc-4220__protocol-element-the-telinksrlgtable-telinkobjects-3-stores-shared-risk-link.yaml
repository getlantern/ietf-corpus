document: rfc-4220
kind: protocol-element
summary: The teLinkSrlgTable (teLinkObjects 3) stores Shared Risk Link Groups associated with TE links, indexed by ifIndex and teLinkSrlg. An SRLG is a 32-bit number unique within an IGP domain; zero is a valid SRLG value. Destroying a TE link's ifEntry also destroys all associated SRLG entries.
section: "6.3"
topics:
