document: rfc-3620
kind: state-machine
summary: 'When a proxy receives a ''tunnel'' element with a nested child: (1) it connects to the identified next hop, (2) starts a TUNNEL channel, (3) forwards the stripped inner element, (4) awaits ''ok'' or ''error'', (5) on ''ok'' relays it back and enters transparent forwarding; on ''error'' closes the initiated session and relays the error.'
section: "4"
topics:
    - realtime
