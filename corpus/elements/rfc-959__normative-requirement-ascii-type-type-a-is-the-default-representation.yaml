document: rfc-959
kind: normative-requirement
summary: ASCII type (TYPE A) is the default representation type and MUST be accepted by all FTP implementations. Non-print format is the default format parameter and must also be accepted by all implementations. Image type is RECOMMENDED to be accepted by all FTP implementations.
section: 3.1.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
