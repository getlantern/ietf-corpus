document: rfc-9302
kind: security-consideration
summary: Map-Versioning MUST NOT be used over the public Internet and MUST only be used in trusted, closed deployments. The mechanism relies on LISP data-plane security as specified in RFC 9300 and RFC 9301, and the threat analysis of RFC 7835 applies.
section: "8"
rfc2119_level: MUST NOT
topics:
    - security
    - routing
