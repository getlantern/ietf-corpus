summary: The 'routing-protocol-type' identity hierarchy covers static-routing, bgp-routing, ospf-routing, rip-routing, isis-routing (with level-1/level-2/level-1-2 sub-identities), vrrp-routing, direct-routing (for directly connected LANs), pim-proto, and any-routing (policy wildcard). BFD session types classic-bfd and s-bfd are also defined.
