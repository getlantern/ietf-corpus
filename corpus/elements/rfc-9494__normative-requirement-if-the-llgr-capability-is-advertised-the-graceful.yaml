document: rfc-9494
kind: normative-requirement
summary: If the LLGR Capability is advertised, the Graceful Restart Capability (RFC 4724) MUST also be advertised. If no GR Capability accompanies an LLGR Capability, the LLGR Capability MUST be disregarded entirely.
section: "4.1"
rfc2119_level: MUST
