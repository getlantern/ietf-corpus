document: rfc-6785
kind: protocol-element
summary: The 'imap.changedflags' environment item MUST be set to the name(s) of changed flags when the script is invoked due to flag changes; otherwise it MUST be the empty string. Scripts can use 'hasflag' to determine whether flags were set or reset.
section: "4.5"
rfc2119_level: MUST
topics:
    - email
