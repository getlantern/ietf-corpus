document: rfc-5949
kind: interoperability-note
summary: The MN-initiated FMIPv6 messages from RFC 5568 — RtSolPr, PrRtAdv, FBU, FBack, and UNA — are not applicable in the PMIPv6 context. A MAG receiving RtSolPr or FBU from a mobile node SHOULD either behave as if FMIPv6 is not implemented or serve that node per RFC 5568.
section: "4"
topics:
