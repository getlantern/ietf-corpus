document: rfc-9965
kind: privacy-consideration
summary: EAP Identity (the EPI) is publicly visible to observers of EAP traffic, but since EPIs are in a public registry this creates no additional privacy concern. However, RADIUS Access-Request packets may contain MAC addresses and device location; this specification does not change existing RADIUS privacy properties.
section: "6"
topics:
