summary: A reputon is encoded as a JSON object. "rating", "confidence", and "normal-rating" are JSON NUMBERs (floating-point 0.0–1.0). "sample-size" is a non-negative JSON INTEGER (unsigned 64-bit). "generated" and "expires" are non-negative JSON INTEGERs representing seconds since 1970-01-01 00:00 UTC.
