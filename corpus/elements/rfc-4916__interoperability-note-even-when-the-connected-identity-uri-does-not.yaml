document: rfc-4916
kind: interoperability-note
summary: Even when the connected identity URI does not differ from the To header field URI of the INVITE request, sending an UPDATE still allows the Authentication Service to assert authentication of that identity and confirms to the peer UA that the connected identity matches the originally dialed URI.
section: "4.2"
topics:
    - sip
