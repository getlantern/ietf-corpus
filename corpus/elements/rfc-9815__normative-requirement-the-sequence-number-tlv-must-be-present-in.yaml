document: rfc-9815
kind: normative-requirement
summary: The Sequence Number TLV MUST be present in every BGP-LS-SPF NLRI; its absence renders the NLRI malformed and it MUST be handled as treat-as-withdraw. The sequence number MUST be strictly increasing and implementations MUST preserve it across cold restarts.
section: 5.2.4
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
