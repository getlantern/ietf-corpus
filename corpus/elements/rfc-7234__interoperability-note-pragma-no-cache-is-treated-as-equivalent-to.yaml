document: rfc-7234
kind: interoperability-note
summary: 'Pragma: no-cache is treated as equivalent to Cache-Control: no-cache in requests when no Cache-Control header is present, for backwards compatibility with HTTP/1.0 caches. Pragma has no specified meaning in responses and cannot reliably replace Cache-Control: no-cache there. Future extension pragmas are deprecated by this specification.'
section: "5.4"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
