document: rfc-4684
kind: normative-requirement
summary: If a BGP speaker delays advertising BGP VPN route updates until receipt of the End-of-RIB marker, it MUST limit that delay to an upper bound; the default value is 60 seconds.
section: "6"
rfc2119_level: MUST
topics:
