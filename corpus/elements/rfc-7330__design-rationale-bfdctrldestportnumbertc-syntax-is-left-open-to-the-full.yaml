document: rfc-7330
kind: design-rationale
summary: 'BfdCtrlDestPortNumberTC syntax is left open to the full range 0..65535 rather than restricting it to only the three defined BFD port values (3784, 4784, 6784) for two reasons: to allow implementations that use non-compliant port numbers for valid proprietary reasons, and to accommodate potential future extension documents.'
