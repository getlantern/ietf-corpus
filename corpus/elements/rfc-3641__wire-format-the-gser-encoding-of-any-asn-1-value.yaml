summary: 'The GSER encoding of any ASN.1 value is described by an ABNF <Value> rule that is a union of type-specific alternatives: BitStringValue, BooleanValue, CharacterStringValue, ChoiceValue, EnumeratedValue, IntegerValue, NullValue, ObjectIdentifierValue, OctetStringValue, RealValue, SequenceValue, SetValue, and others including VariantEncoding.'
