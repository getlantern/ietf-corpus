document: rfc-9810
kind: security-consideration
summary: When authorizing requests for certificates with specific EKUs (e.g., CA, RA, KGA roles), the issuing CA must verify the requester is authorized to hold those EKUs; misconfigured delegation can allow an entity to fraudulently act as a CA or RA within the PKI.
section: "8.10"
topics:
    - pkix
    - security
