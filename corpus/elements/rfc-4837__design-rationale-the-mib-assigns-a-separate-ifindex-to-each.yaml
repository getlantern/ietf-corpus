document: rfc-4837
kind: design-rationale
summary: The MIB assigns a separate ifIndex to each OLT virtual link (LLID) rather than modeling the P2MP port as a single interface. The justification is that virtual links are sufficiently distinct — separate per-link error counters, different RTTs, different remote MAC addresses — making per-LLID management more useful and consistent with how IF-MIB, MAU-MIB, and Ether-like MIB already model them.
