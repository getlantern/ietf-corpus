document: rfc-5229
kind: protocol-element
summary: 'The "set" action stores a value in a named variable: "set [MODIFIER] <name: string> <value: string>". The name must be a constant string conforming to variable-name syntax; match variables and namespaces (unless explicitly allowed) cannot be targets.'
