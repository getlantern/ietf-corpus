document: rfc-3739
kind: interoperability-note
summary: Many client implementations presuppose the presence of the commonName attribute in the subject field and use it to display the subject's name, regardless of present givenName, surname, or pseudonym values. Implementations wishing broad client compatibility should include commonName.
section: 3.1.2
topics:
