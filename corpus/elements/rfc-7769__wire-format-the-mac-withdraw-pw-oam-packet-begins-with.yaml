document: rfc-7769
kind: wire-format
summary: The MAC withdraw PW OAM packet begins with a 4-byte OAM header (0001|Version|Reserved|0x0028), followed by Reserved (2 bytes), TLV Length (1 byte), and a Flags byte containing A-bit and R-bit. The Sequence Number TLV (type 0x0001) carries a 32-bit sequence number and MUST be the first TLV.
