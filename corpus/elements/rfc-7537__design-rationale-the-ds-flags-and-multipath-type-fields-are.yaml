document: rfc-7537
kind: design-rationale
summary: 'The DS Flags and Multipath Type fields are shared between two TLVs: Downstream Mapping (DSMAP, value 2, deprecated) and Downstream Detailed Mapping (DDMAP, value 20). Modification to either the DS Flags or Multipath Types registry therefore affects both TLVs simultaneously.'
