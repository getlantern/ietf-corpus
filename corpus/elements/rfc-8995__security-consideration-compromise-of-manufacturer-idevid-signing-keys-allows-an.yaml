document: rfc-8995
kind: security-consideration
summary: Compromise of manufacturer IDevID signing keys allows an attacker to issue fraudulent IDevIDs and impersonate devices; compromise of MASA signing keys allows issuance of fraudulent vouchers directing pledges to untrusted registrars. Manufacturers must maintain robust key management and revocation procedures for both IDevID CA and MASA signing keys.
section: "11.6"
topics:
    - security
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
