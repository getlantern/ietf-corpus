document: rfc-7879
kind: protocol-element
summary: In a forked call, each DTLS connection is set up on a unique 5-tuple. The B2BUA advertises a distinct transport address (IP:port) for each forked answer and maintains a mapping between remote sources (e.g., Bob, Charlie) and local sources used to relay media toward the offerer.
