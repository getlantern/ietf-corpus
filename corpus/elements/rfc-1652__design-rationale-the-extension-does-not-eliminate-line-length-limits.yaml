document: rfc-1652
kind: design-rationale
summary: 'The extension does not eliminate line length limits, so it does not provide a general mechanism for transferring unencoded binary data via SMTP. This is a deliberate scope limitation: the BINARY content-transfer-encoding remains out of scope.'
