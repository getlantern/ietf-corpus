document: rfc-9960
kind: protocol-element
summary: Local protection of network links, nodes, or replication branches in a PTI can be achieved using SR Policies (RFC 9256). The segment list of the backup SR Policy is imposed on the downstream Replication-SID of a replication branch to steer traffic on the backup path.
section: 5.6.1
topics:
    - routing
    - mpls
    - multicast
