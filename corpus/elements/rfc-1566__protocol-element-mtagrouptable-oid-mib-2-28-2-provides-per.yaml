summary: mtaGroupTable (OID mib-2.28.2) provides per-group counters indexed by (applIndex, mtaGroupIndex) and extends the per-MTA counters with mtaGroupRejectedMessages, mtaGroupOldestMessageStored, inbound/outbound association gauges and accumulators, last-activity timestamps, rejection and failure reason strings, scheduled retry time, mail protocol OID, and group name.
