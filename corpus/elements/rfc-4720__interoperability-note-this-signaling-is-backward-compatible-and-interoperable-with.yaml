document: rfc-4720
kind: interoperability-note
summary: This signaling is backward compatible and interoperable with systems that do not implement FCS retention. Unknown parameters in MPLS signaling are silently ignored per RFC 4447, and the M bit being zero in L2TPv3 ensures non-implementing peers can ignore the AVP.
