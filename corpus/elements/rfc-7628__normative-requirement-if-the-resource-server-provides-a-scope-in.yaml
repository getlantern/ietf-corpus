document: rfc-7628
kind: normative-requirement
summary: If the resource server provides a scope in its error response, the client MUST always request scoped tokens from the token endpoint; if no scope is returned, the client SHOULD presume an unscoped token is required.
section: 3.2.2
rfc2119_level: MUST
topics:
    - oauth
    - security
