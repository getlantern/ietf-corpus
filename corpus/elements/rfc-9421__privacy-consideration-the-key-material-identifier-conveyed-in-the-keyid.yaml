document: rfc-9421
kind: privacy-consideration
summary: The key material identifier conveyed in the keyid signature parameter can be used to track and identify users or systems across requests, even when message content does not reveal identity. Long-lived or widely shared key identifiers increase this risk; applications should consider key rotation and unlinkability requirements.
section: "8.1"
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
