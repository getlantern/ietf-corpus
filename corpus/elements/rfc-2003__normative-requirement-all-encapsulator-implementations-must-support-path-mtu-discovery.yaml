document: rfc-2003
kind: normative-requirement
summary: All encapsulator implementations MUST support Path MTU Discovery soft state within their tunnels, so that fragmentation due to encapsulation overhead occurs only once and ICMP Datagram Too Big messages can be accurately relayed to original senders.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
