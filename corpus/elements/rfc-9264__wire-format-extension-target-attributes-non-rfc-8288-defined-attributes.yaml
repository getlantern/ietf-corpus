document: rfc-9264
kind: wire-format
summary: Extension target attributes (non-RFC 8288-defined attributes) MUST always be represented as arrays in the JSON serialization, since their cardinality is unknown to generic applications. Non-asterisk extensions contain arrays of strings; asterisk-suffixed extensions contain arrays of objects structured as internationalized attributes.
section: 4.2.4.3
topics:
    - http
    - json
