document: rfc-9045
kind: normative-requirement
summary: The GMACParameters nonce may have any number of bits between 8 and (2^64)-1, but it MUST be a multiple of 8 bits. Within the scope of any GMAC key, the nonce value MUST be unique.
section: "4.4"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
