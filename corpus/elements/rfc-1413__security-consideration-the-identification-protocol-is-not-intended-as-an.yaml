document: rfc-1413
kind: security-consideration
summary: The Identification Protocol is not intended as an authorization or access control protocol. Using its output for access control—whether as the primary method or as an adjunct—may weaken normal host security. Its appropriate use is limited to auditing.
section: "6"
topics:
