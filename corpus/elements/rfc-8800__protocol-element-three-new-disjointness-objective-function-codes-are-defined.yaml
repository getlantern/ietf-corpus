document: rfc-8800
kind: protocol-element
summary: 'Three new disjointness Objective Function codes are defined: MSL (15) minimizes the number of shared links among a set of paths, MSS (16) minimizes the number of shared SRLGs, and MSN (17) minimizes the number of shared nodes. A sender SHOULD include only a single OF-code in the OF-List TLV within the Association Group; the receiver MUST consider only the first.'
section: "5.3"
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
