document: rfc-7540
kind: wire-format
summary: The GOAWAY frame contains a reserved 1-bit field, a 31-bit Last-Stream-ID (highest stream identifier processed by the sender), a 32-bit Error Code, and optional opaque Additional Debug Data. It signals intent to close the connection and the boundary of reliably processed streams.
