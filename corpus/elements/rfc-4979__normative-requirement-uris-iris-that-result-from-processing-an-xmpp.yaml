document: rfc-4979
kind: normative-requirement
summary: URIs/IRIs that result from processing an XMPP Enumservice record SHOULD NOT contain an Authority Component, because arbitrary clients discovering the URI will typically not be able to authenticate as the user indicated in the Authority Component.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
