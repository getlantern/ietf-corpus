document: rfc-3539
kind: normative-requirement
summary: Each AAA node SHOULD distribute its messages evenly across the range of SCTP streams agreed upon with its peer. AAA peers MUST be able to accept messages on any stream; streams are used solely to prevent head-of-line blocking.
section: 3.8.1
rfc2119_level: MUST
