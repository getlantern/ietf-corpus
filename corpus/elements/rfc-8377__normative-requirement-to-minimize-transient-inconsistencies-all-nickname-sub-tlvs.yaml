document: rfc-8377
kind: normative-requirement
summary: To minimize transient inconsistencies, all Nickname sub-TLVs advertised by a TRILL switch for a particular nickname (whether in Router Capability or MT Router Capability TLVs) SHOULD appear in the same LSP PDU, or all LSP PDUs containing them SHOULD be flooded as an atomic action.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
