summary: 'RFC 7569 creates the IANA ''Security Label Format Selection Registry'' with four fields: Label Format Specifier (integer 0..65535), Label Description (ASCII, max 128 bytes), Status (e.g., ''active'' or ''obsoleted by entry NNN''), and Label Format Specification (reference to a stable public document).'
