document: rfc-9593
kind: normative-requirement
summary: If for any reason the responder doesn't resend CERTREQ payload(s) in the IKE_INTERMEDIATE exchange, the initiator MUST NOT abort negotiation. Instead, it MAY link Announcements to CAs from IKE_SA_INIT or MAY ignore Announcements containing CA links.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
