document: rfc-7162
kind: normative-requirement
summary: The VANISHED UID FETCH modifier MUST only be used together with the CHANGEDSINCE modifier; the server MUST reject it with a tagged BAD otherwise. Any VANISHED (EARLIER) responses resulting from this modifier MUST be returned before any FETCH responses to prevent confusion about message-number-to-UID mapping.
section: 3.2.6
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
