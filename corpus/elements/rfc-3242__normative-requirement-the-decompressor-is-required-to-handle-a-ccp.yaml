document: rfc-3242
kind: normative-requirement
summary: The decompressor is REQUIRED to handle a CCP with C=1 by applying the received CRC to the last decompressed packet (unless a prior loss indication was received). Upon CRC failure, the decompressor MUST take actions as specified in RFC 3095 section 5.3.2.2.3. A CCP with C=0 MUST be ignored.
section: 4.1.3
rfc2119_level: REQUIRED
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
