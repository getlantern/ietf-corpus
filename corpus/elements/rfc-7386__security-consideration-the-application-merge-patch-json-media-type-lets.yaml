document: rfc-7386
kind: security-consideration
summary: The 'application/merge-patch+json' media type lets a user agent instruct a server to determine and apply a specific set of changes. It is the server's responsibility to verify both the appropriateness of the requested changes and the user agent's authorization to make them. The specification does not define how to perform these checks.
section: "5"
topics:
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
