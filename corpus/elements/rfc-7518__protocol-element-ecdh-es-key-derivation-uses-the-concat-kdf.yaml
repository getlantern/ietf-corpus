document: rfc-7518
kind: protocol-element
summary: ECDH-ES key derivation uses the Concat KDF (NIST SP 800-56A Section 5.8.1) with SHA-256, using parameters Z (shared secret), keydatalen, AlgorithmID (enc or alg value as ASCII), PartyUInfo (from 'apu'), PartyVInfo (from 'apv'), SuppPubInfo (keydatalen as 32-bit big-endian), and empty SuppPrivInfo. The 'apu' and 'apv' values MUST be distinct when used.
section: 4.6.2
topics:
    - jose
    - crypto
