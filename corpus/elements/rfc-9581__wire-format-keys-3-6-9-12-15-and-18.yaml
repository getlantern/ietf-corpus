document: rfc-9581
kind: wire-format
summary: Keys -3, -6, -9, -12, -15, and -18 provide additional decimal fractions (milliseconds through attoseconds) as unsigned integers scaled by 1e-3 through 1e-18 respectively. Each extended time data item MUST NOT contain more than one of these keys, and key 1 MUST also be present with an integer value when any of these keys are used.
section: "3.3"
