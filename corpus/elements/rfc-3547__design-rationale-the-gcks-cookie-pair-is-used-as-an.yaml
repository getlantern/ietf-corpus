document: rfc-3547
kind: design-rationale
summary: The GCKS cookie pair is used as an SPI in GROUPKEY-PUSH to differentiate secure groups managed by the same GCKS, rather than negotiating cookies as in ISAKMP/IKE, because the GCKS unilaterally manages group identity.
