document: rfc-9643
kind: security-consideration
summary: The YANG modules are designed to be accessed via YANG-based management protocols (NETCONF, RESTCONF), both of which have mandatory-to-implement secure transport layers (SSH, TLS, QUIC) and mandatory-to-implement mutual authentication. NACM (RFC 8341) provides access control for the managed nodes.
section: "5.1"
topics:
