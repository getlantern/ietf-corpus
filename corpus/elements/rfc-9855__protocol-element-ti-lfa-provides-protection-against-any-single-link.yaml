document: rfc-9855
kind: protocol-element
summary: TI-LFA provides protection against any single link failure, single node failure, or single Shared Risk Link Group (SRLG) failure for destinations internal to a link-state IGP area. Protection of domain exit routers or links to another routing domain is out of scope.
