document: rfc-2222
kind: protocol-element
summary: 'The KERBEROS_V4 mechanism uses a two-challenge exchange: the server sends a random 32-bit challenge; the client responds with a Kerberos ticket and authenticator. The server then sends an 8-octet DES-ECB-encrypted structure containing the incremented checksum, supported security layer bitmask, and maximum cipher-text buffer size.'
section: "7.1"
topics:
    - security
    - crypto
