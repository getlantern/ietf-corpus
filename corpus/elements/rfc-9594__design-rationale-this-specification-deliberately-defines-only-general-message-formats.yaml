document: rfc-9594
kind: design-rationale
summary: This specification deliberately defines only general message formats and the KDC interface, delegating keying material formats, role definitions, PoP computation, and credential format constraints to separate application profiles. This two-layer design supports diverse group communication approaches (multicast CoAP, pub-sub) without requiring changes to the core key-distribution framework.
section: "1"
topics:
    - security
