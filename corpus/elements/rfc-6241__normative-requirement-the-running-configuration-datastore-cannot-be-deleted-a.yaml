document: rfc-6241
kind: normative-requirement
summary: The <running> configuration datastore cannot be deleted. A <copy-config> operation where source and target identify the same URL or datastore MUST return an error with error-tag 'invalid-value'.
section: "7.3"
rfc2119_level: MUST
