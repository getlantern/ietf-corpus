document: rfc-3659
kind: normative-requirement
summary: A TVFS FEAT response MUST NOT be returned unless the server implements TVFS as defined in section 6. Clients must be prepared to deal with arbitrary text following 'TVFS' in the feature line and ignore unrecognized extensions.
section: "6.3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
