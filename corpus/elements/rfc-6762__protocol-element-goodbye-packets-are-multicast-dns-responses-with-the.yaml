document: rfc-6762
kind: protocol-element
summary: Goodbye packets are Multicast DNS responses with the RR TTL set to zero, signaling that a record is no longer valid and should be removed from peer caches. Queriers receiving a TTL-0 record SHOULD delete it from cache within one second.
section: "10.1"
topics:
    - dns
    - zeroconf
