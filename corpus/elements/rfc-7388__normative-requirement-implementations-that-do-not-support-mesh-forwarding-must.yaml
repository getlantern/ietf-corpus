document: rfc-7388
kind: normative-requirement
summary: Implementations that do not support mesh forwarding MUST count received 6LoWPAN datagrams with a MESH header in lowpanInMeshReceives, but MUST NOT increment lowpanInMeshReceives and lowpanInMeshDelivers if those datagrams are dropped.
section: "4"
rfc2119_level: MUST
topics:
