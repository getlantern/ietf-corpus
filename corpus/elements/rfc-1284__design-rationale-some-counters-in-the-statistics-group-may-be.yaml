document: rfc-1284
kind: design-rationale
summary: Some counters in the Statistics group may be difficult or impossible to implement due to chipset or driver limitations. The design explicitly permits undercount (value equals detections, not true occurrences, down to zero) rather than requiring perfect accuracy, but vendors are strongly encouraged to document conditions under which underestimation occurs.
