document: rfc-6120
kind: normative-requirement
summary: If an initiating entity receives a response to its SRV query but cannot establish an XMPP connection, it SHOULD NOT attempt the A/AAAA fallback process (to prevent inbound/outbound state mismatch); if no SRV response is received, it SHOULD attempt fallback using port 5222 (client-to-server) or 5269 (server-to-server).
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
