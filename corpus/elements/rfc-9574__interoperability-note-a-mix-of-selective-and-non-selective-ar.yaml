document: rfc-9574
kind: interoperability-note
summary: A mix of selective and non-selective AR-LEAFs SHOULD NOT coexist in the same BD. If a non-selective AR-LEAF sends BM traffic to a selective AR-REPLICATOR, that traffic will not be replicated to AR-LEAFs outside the selective AR-LEAF-set, causing incomplete BM delivery.
section: "6.2"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
