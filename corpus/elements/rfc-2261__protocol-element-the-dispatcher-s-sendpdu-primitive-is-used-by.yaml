document: rfc-2261
kind: protocol-element
summary: The Dispatcher's sendPdu primitive is used by applications to send an SNMP Request or Notification. Parameters include transportDomain, transportAddress, messageProcessingModel, securityModel, securityName, securityLevel, contextEngineID, contextName, pduVersion, PDU, and expectResponse. It returns a sendPduHandle on success or errorIndication on failure.
section: 4.1.1
topics:
    - snmp
