document: rfc-9154
kind: interoperability-note
summary: 'The transition from the Classic Authorization Information Model to the Secure Authorization Information Model is divided into three phases: Phase 1 adds required features (empty create, unsetting via update, hiding authinfo in info response), Phase 2 transitions storage from encrypted to hashed values (requiring dual comparison during migration), and Phase 3 enforces the new model (disallowing non-empty authinfo on create, validating 128-bit entropy).'
section: "6"
topics:
