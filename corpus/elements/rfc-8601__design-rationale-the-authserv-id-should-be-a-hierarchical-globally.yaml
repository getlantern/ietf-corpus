document: rfc-8601
kind: design-rationale
summary: The authserv-id SHOULD be a hierarchical, globally unique identifier such as a DNS domain name rather than a flat hostname. A hierarchical identifier allows aggregating related trusted systems under a single parent token, avoiding the administrative burden of maintaining a per-host allowlist that must be continuously updated.
section: "2.5"
topics:
    - email
