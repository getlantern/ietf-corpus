document: rfc-8702
kind: design-rationale
summary: This specification does not use RSASSA-PSS-params (as defined in RFC 4055) because the hash algorithm, mask generation algorithm, trailer, and salt are embedded in the OID definition itself, simplifying the encoding by eliminating the parameters field.
