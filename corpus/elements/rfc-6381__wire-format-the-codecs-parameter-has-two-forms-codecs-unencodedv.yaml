document: rfc-6381
kind: wire-format
summary: 'The ''codecs'' parameter has two forms: ''codecs'' (unencodedv) for values not requiring encoding, and ''codecs*'' (encodedv, per RFC 2231) for values with octets requiring percent-encoding. Both support single values and comma-separated lists; dot (''.'') is reserved as a hierarchy delimiter within each codec identifier.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
