document: rfc-4916
kind: normative-requirement
summary: After a full dialog has been formed and the "from-change" option tag was received in a Supported header field, if an UPDATE was not already sent on the early dialog, the UA MUST issue an UPDATE request on the same dialog. The UPDATE request MUST contain the callee's (or potential callee's) identity in the URI of the From header field, or an anonymous identity if anonymity is required.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
