document: rfc-8024
kind: security-consideration
summary: Because PON optical paths traverse publicly accessible facilities (e.g., telephone poles), a malicious ONU can cause excessive link bouncing, which in turn increases ICCP message exchanges and may result in denial-of-service-like service impairment. Operators must restrict unauthorized ONUs and limit link-bouncing impact at the OLT.
section: "5"
topics:
    - security
    - mpls
