document: rfc-9658
kind: protocol-element
summary: The Typed Wildcard MT MP FEC Element allows an LSR to perform wildcard MP FEC operations under the scope of a sub-topology. It encodes a 1-byte Typed Wildcard type (5), a 1-byte MP FEC type, a 1-byte length (6), the AF (MT IP or MT IPv6), an 8-bit Reserved field, an 8-bit IPA field, and a 16-bit MT-ID field.
section: "5.1"
topics:
    - mpls
    - routing
