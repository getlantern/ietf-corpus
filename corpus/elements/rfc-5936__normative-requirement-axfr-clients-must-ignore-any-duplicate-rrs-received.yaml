document: rfc-5936
kind: normative-requirement
summary: AXFR clients MUST ignore any duplicate RRs received. The protocol treats zone contents as an unordered set; clients MUST accept any ordering and grouping of non-SOA RRs. Each RR SHOULD be transmitted only once.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
