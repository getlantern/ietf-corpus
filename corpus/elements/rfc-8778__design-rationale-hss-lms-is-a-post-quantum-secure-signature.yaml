document: rfc-8778
kind: design-rationale
summary: HSS/LMS is a post-quantum secure signature algorithm because it does not depend on the difficulty of discrete logarithm or factoring, unlike RSA, DSA, ECDSA, and EdDSA which are all vulnerable to large-scale quantum computers. Deploying HSS/LMS now enables authentication and integrity protection of future software even if advances break current digital-signature mechanisms.
section: "1.1"
topics:
    - crypto
    - security
