document: rfc-7181
kind: protocol-element
summary: 'Two separate MPR sets are maintained per router: flooding MPRs (used to forward TC messages) and routing MPRs (used as intermediate hops in routes and as the set of neighbors whose links are declared in TC messages). A neighbor may be in both sets simultaneously.'
