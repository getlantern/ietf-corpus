document: rfc-3115
kind: protocol-element
summary: The Critical Vendor/Organization Specific Extension (CVSE) allows vendors to include organization-specific data in Mobile IP messages. When an unrecognized CVSE is encountered, the entire message containing it MUST be silently discarded. CVSE is assigned Type number 38.
section: "2.1"
topics:
    - mobility
