document: rfc-5763
kind: normative-requirement
summary: When ICE is being used, implementations MUST treat all ICE candidate pairs associated with a single component as part of the same DTLS association, resulting in only one DTLS handshake even if there are multiple valid candidate pairs.
section: 6.7.1
rfc2119_level: MUST
