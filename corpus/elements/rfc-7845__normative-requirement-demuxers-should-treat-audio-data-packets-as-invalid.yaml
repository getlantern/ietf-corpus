document: rfc-7845
kind: normative-requirement
summary: Demuxers SHOULD treat audio data packets as invalid if they are larger than 61,440 octets per Opus stream. Demuxers MUST avoid attempting to allocate excessive amounts of memory when presented with very large packets.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
