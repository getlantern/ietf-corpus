document: rfc-3382
kind: design-rationale
summary: The 'collection' mechanism was designed to be encoded consistently with existing IPP 1.0 and 1.1 parsing rules so that current parsers that do not support collections will not confuse collections or parts of a collection with other attributes.
section: "1.1"
