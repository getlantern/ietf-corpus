document: rfc-6086
kind: normative-requirement
summary: When a UA sends an INFO request associated with an Info Package, it MUST include an Info-Package header field identifying the Info Package. A specific INFO request can be used only for a single Info Package.
section: 4.2.1
rfc2119_level: MUST
topics:
