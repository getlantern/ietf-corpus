document: rfc-2035
kind: protocol-element
summary: The data payload following the RTP/JPEG header is a single entropy-coded scan with the scan header omitted (inferred from the RTP/JPEG header). The scan is terminated implicitly or with an EOI marker, and may be padded with undefined bytes.
section: 3.1.7
