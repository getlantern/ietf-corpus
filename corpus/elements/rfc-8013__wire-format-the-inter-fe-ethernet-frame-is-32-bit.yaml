document: rfc-8013
kind: wire-format
summary: 'The inter-FE Ethernet frame is 32-bit aligned and contains: 6-byte Destination MAC (identifying destination FEID), 6-byte Source MAC (identifying source FEID), 16-bit Inter-FE ethertype (ED3E hex), 16-bit metadata length (including the length field itself), one or more 32-bit-aligned 16-bit TLV-encoded metadata items, followed by the original packet payload.'
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
