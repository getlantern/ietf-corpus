document: rfc-2451
kind: protocol-element
summary: 3DES-EDE3-CBC processes each 64-bit block three times using independent keys k1, k2, k3 in the sequence encrypt(k1) → decrypt(k2) → encrypt(k3), using the 'outer' CBC chaining technique where the previous ciphertext block is XOR'd with the current plaintext before the EDE3 operation.
section: "2.6"
topics:
    - ipsec
    - crypto
