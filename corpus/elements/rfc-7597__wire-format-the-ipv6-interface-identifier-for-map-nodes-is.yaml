document: rfc-7597
kind: wire-format
summary: 'The IPv6 interface identifier for MAP nodes is 128-n-o-s bits wide, structured as: 16-bit zero field, 32-bit IPv4 address, and 16-bit PSID. For IPv4 prefixes, the IPv4 address field is right-padded with zeros; for full addresses or prefixes without sharing, the PSID field is zero.'
