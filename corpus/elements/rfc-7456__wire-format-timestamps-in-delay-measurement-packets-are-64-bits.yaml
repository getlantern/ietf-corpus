document: rfc-7456
kind: wire-format
summary: Timestamps in Delay Measurement packets are 64 bits (32-bit seconds + 32-bit nanoseconds), using the 64 least significant bits of the IEEE 1588-2008 (PTPv2) format. This truncated format is also used in IEEE 1588v1, Y.1731-2013, and MPLS-LM-DM.
section: 6.3.1
topics:
