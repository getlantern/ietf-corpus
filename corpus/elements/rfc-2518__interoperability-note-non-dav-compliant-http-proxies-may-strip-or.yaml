document: rfc-2518
kind: interoperability-note
summary: Non-DAV-compliant HTTP proxies may strip or mishandle the If header, silently discarding lock tokens submitted by clients. Clients SHOULD be aware that If header semantics are DAV-specific and may not survive traversal through non-DAV-aware intermediaries.
section: 9.4.5
topics:
    - http
