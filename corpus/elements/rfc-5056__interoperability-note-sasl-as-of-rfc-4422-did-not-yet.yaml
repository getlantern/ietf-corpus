document: rfc-5056
kind: interoperability-note
summary: 'SASL (as of RFC 4422) did not yet support channel binding during context initialization. Ongoing work (SASL-GS2) was expected to differ from GSS-API in that channel binding failure would only affect negotiation of SASL security layers: when channel binding succeeds, SASL should select no security layers and delegate session protection to the bound channel.'
section: "3.2"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
