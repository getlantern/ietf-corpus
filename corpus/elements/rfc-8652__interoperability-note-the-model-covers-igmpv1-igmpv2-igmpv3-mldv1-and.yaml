summary: The model covers IGMPv1, IGMPv2, IGMPv3, MLDv1, and MLDv2 but explicitly excludes IGMP/MLD Proxy (RFC 4605) and IGMP/MLD Snooping (RFC 4541), which are to be specified in separate documents.
