document: rfc-4898
kind: interoperability-note
summary: For SYN-flood defenses that use syn-cookies (encoding SYN-RCVD state cryptographically in the ISS), there is no explicit SYN-RCVD state, so tcpEStatsListenerCurBacklog MAY exclude connections in SYN-RECEIVED state and only count ESTABLISHED connections awaiting accept.
section: "4"
topics:
