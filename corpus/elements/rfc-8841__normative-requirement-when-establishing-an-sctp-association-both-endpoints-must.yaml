document: rfc-8841
kind: normative-requirement
summary: When establishing an SCTP association, both endpoints MUST take the 'active' role and both MUST use the same SCTP port as both client port and server port, to prevent two separate SCTP associations from being created.
section: "9.3"
rfc2119_level: MUST
topics:
    - sctp
    - realtime
