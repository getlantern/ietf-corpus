document: rfc-6918
kind: design-rationale
summary: Many of the deprecated ICMPv4 types (32–36, 39) were experimental or early-stage proposals that were never widely implemented or deployed. Their formal deprecation cleans up the IANA registry and reduces the surface area that firewall and filtering rules must consider.
