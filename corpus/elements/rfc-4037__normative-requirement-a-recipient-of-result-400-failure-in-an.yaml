document: rfc-4037
kind: normative-requirement
summary: A recipient of result 400 (failure) in an AME, TE, or CE message MUST destroy all state and data associated with the corresponding dataflow, transaction, or connection. For example, cached adapted application message data must be purged on receipt of AME with result 400.
section: "10.10"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
