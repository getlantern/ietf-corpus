document: rfc-6795
kind: security-consideration
summary: Session information transmitted by a UA to a policy server may contain sensitive data (e.g., media encryption keys). Conversely, policy responses may contain sensitive network or SLA information. Both parties MUST NOT include information in policy documents that is sensitive and not needed by the other party.
section: "4"
topics:
    - sip
    - security
    - privacy
