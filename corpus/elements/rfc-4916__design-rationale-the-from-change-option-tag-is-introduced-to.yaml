document: rfc-4916
kind: design-rationale
summary: The "from-change" option tag is introduced to provide a positive indication of support for changed From/To URIs in mid-dialog requests. Because proxies unable to tolerate a URI change are not accounted for, the tag allows the UAC to send a revised From URI only to targets that have indicated support, eliminating the need to use a Require header field.
section: "3"
topics:
    - sip
