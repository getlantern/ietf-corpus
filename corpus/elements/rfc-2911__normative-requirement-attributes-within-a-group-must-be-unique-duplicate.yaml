document: rfc-2911
kind: normative-requirement
summary: Attributes within a group MUST be unique; duplicate attribute names make the group malformed. Clients MUST NOT submit such malformed requests and Printers MUST NOT return such malformed responses. A Printer receiving a duplicate-attribute request MUST either reject it with 'client-error-bad-request' or process it selecting only one instance.
section: 3.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
