document: rfc-9991
kind: wire-format
summary: 'The Identity-Alignment field carries a comma-separated list of authentication mechanism names (''dkim'' and/or ''spf'') that failed to authenticate an aligned identity, or the keyword ''none'' if all attempted methods succeeded. ABNF: id-align = ''Identity-Alignment:'' [CFWS] ( ''none'' / dmarc-method *( [CFWS] '','' [CFWS] dmarc-method ) ) [CFWS]; each method may appear at most once.'
section: "4"
