document: rfc-7865
kind: wire-format
summary: Unique identifiers (session_id, participant_id, stream_id, group_id) are generated by creating a UUID per RFC 4122 (Sections 4.3, 4.4, or 4.5) and then encoding it using base64 per RFC 4648. The result is carried as xs:base64Binary in the XML schema.
