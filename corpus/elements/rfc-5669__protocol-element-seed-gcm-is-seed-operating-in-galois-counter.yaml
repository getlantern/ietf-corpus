document: rfc-5669
kind: protocol-element
summary: SEED-GCM is SEED operating in Galois/Counter Mode, providing both confidentiality and data origin authentication. It uses the same four inputs as SEED-CCM (key, plaintext, nonce, AAD) with an authentication tag length t=12 octets (96 bits).
