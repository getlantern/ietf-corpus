document: rfc-6435
kind: protocol-element
summary: The loopback function sets a specific node (MEP or MIP) on a transport path into loopback mode so it returns all received data (including user data and OAM) toward the originator unmodified except for normal per-hop processing such as TTL decrement. It is an out-of-service function that requires the transport path to be locked first.
section: "4"
topics:
