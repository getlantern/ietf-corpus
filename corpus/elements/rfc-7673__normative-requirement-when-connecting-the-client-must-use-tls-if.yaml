document: rfc-7673
kind: normative-requirement
summary: When connecting, the client MUST use TLS if both the SRV and TLSA query responses were 'secure'. TLS certificate validation then follows either Section 4.1 (no usable TLSA records) or Section 4.2 (at least one usable TLSA record).
section: "4"
rfc2119_level: MUST
topics:
    - tls
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
