document: rfc-6560
kind: normative-requirement
summary: If the KDC requires that OTP-based pre-authentication is used and no PA-OTP-REQUEST is present in the initial AS-REQ, the KDC SHALL respond with a KRB-ERROR containing a PA-OTP-CHALLENGE inside the enc-fast-rep of a PA-FX-FAST-REPLY encrypted under the Armor Key.
section: "3.2"
rfc2119_level: SHALL
topics:
    - security
