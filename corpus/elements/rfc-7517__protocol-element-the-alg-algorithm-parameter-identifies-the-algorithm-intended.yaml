summary: The "alg" (algorithm) parameter identifies the algorithm intended for use with the key. Its value is a case-sensitive ASCII string; use is OPTIONAL and values should be registered in the IANA "JSON Web Signature and Encryption Algorithms" registry or use a Collision-Resistant Name.
