document: rfc-4872
kind: normative-requirement
summary: A pair of working/protecting LSPs SHOULD be resource-disjoint (link, node, and SRLG) for dedicated recovery types. For shared recovery, a group of working LSPs SHOULD be mutually resource-disjoint to allow a single shared protecting LSP. Resource disjointness is a necessary but not sufficient condition for recoverability.
section: "1"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
