document: rfc-6898
kind: normative-requirement
summary: A node supporting these extensions MUST include a BehaviorConfig object when sending a Config message to a neighbor whose support is either known or unknown. When the neighbor is known NOT to support the extensions, the BehaviorConfig object MUST NOT be sent.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
