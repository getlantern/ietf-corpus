document: rfc-4683
kind: normative-requirement
summary: The RA SHOULD encrypt SIItype, SII, and SIM and send the result to the CA via a secure channel when the CA needs to verify SII before issuing a certificate. The user SHOULD also encrypt the same values in the certificate request.
section: "4.5"
rfc2119_level: SHOULD
