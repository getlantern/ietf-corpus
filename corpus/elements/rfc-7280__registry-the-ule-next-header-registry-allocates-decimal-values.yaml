document: rfc-7280
kind: registry
summary: The ULE Next-Header registry allocates decimal values 0-511 (0x0000-0x01FF hexadecimal) for use by both ULE and GSE encapsulations to identify Extension Headers and payload protocols. IANA must not allocate values greater than 511 decimal. This document updates the allocation rules from RFC 4326 Section 11.1.
section: "3.1"
topics:
    - registry
