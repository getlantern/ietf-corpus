document: rfc-2065
kind: registry
summary: This document creates the KEY algorithm number registry. Algorithm 1 is MD5/RSA. Numbers 2-252 are available for IETF standards action assignment. Number 253 is the 'expiration date algorithm' (null signature, for use with dynamic update). Number 254 is reserved for private use with OID-identified algorithms. Values 0 and 255 are reserved.
section: "3.5"
