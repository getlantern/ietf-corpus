document: rfc-5122
kind: security-consideration
summary: XMPP addresses of the form node@domain/resource are ephemeral since a resource identifier typically corresponds to a single temporary client session; IRIs/URIs identifying such addresses will not reliably identify the same session over time.
section: "5.1"
topics:
    - realtime
    - security
