document: rfc-6442
kind: protocol-element
summary: 'The Geolocation header field is valid in INVITE, REGISTER, OPTIONS, BYE, UPDATE, INFO, MESSAGE, REFER, SUBSCRIBE, NOTIFY, and PUBLISH requests. It carries one or more locationValues referencing a PIDF-LO either by value (cid: URI pointing to a MIME body) or by reference (sip/sips/pres/http/https URI to be dereferenced).'
section: "4.1"
