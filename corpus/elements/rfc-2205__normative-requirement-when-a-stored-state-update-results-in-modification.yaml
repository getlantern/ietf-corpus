document: rfc-2205
kind: normative-requirement
summary: When a stored state update results in modification of state to be forwarded, the corresponding refresh messages must be generated and forwarded immediately so that state changes propagate end-to-end without delay. Propagation stops only where merging causes no net change.
section: "2.3"
rfc2119_level: MUST
topics:
    - qos
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
