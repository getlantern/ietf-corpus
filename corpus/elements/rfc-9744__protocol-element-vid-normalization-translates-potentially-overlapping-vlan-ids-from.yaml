document: rfc-9744
kind: protocol-element
summary: VID normalization translates potentially overlapping VLAN IDs from multiple physical interfaces into unique normalized VIDs. When more than 4095 VLANs are multiplexed onto a single tunnel, single-to-double tag translation is performed, resulting in a 24-bit double normalized VID.
section: "3"
topics:
