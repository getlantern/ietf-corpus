document: rfc-4120
kind: normative-requirement
summary: Authenticators MUST NOT be re-used and SHOULD be rejected if replayed to a server. If the transport might deliver duplicated messages, either a new authenticator MUST be generated per retry, or the server MUST match requests and replay its first reply.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
