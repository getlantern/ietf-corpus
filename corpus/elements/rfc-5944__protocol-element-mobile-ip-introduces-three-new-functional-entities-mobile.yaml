document: rfc-5944
kind: protocol-element
summary: 'Mobile IP introduces three new functional entities: Mobile Node (a host or router that changes its point of attachment without changing its IP address), Home Agent (a router on the home network that tunnels datagrams to the mobile node when away), and Foreign Agent (a router on the visited network that provides routing services and detunnels datagrams for registered mobile nodes).'
section: "1.5"
topics:
    - mobility
    - ip
