document: rfc-6625
kind: design-rationale
summary: Using wildcards reduces the number of S-PMSI A-D routes a PE must originate, improving control-plane scalability. There is explicitly no impact on data-plane scalability because the number of P-tunnels is not reduced by wildcard use.
section: "1.2"
topics:
