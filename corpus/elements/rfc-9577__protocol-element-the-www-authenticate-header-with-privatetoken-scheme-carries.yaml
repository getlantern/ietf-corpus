document: rfc-9577
kind: protocol-element
summary: 'The WWW-Authenticate header with ''PrivateToken'' scheme carries two mandatory parameters: ''challenge'' (base64url-encoded TokenChallenge) and ''token-key'' (base64url-encoded Issuer public key). An optional ''max-age'' parameter specifies the number of seconds the challenge is valid. The token-key MAY be omitted if Clients can retrieve the key out-of-band.'
section: 2.1.2
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
