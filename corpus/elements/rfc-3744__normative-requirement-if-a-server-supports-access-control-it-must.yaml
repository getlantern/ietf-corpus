document: rfc-3744
kind: normative-requirement
summary: If a server supports access control, it MUST return "access-control" as a token in the DAV response header for OPTIONS on any resource it implements. Presence of this token MUST indicate full compliance with all MUST-level requirements in this document.
section: "7.2"
rfc2119_level: MUST
topics:
    - security
    - http
