document: rfc-3161
kind: normative-requirement
summary: The serialNumber in TSTInfo MUST be unique for each TimeStampToken issued by a given TSA (TSA name plus serial number uniquely identifies a token). This uniqueness property MUST be preserved even after service interruptions such as crashes.
section: 2.4.2
rfc2119_level: MUST
topics:
    - pkix
    - security
