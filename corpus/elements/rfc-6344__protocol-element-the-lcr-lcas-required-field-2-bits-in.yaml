document: rfc-6344
kind: protocol-element
summary: 'The LCR (LCAS Required) field (2 bits) in the VCAT TLV indicates LCAS capability requirements: 0=LCAS required, 1=LCAS desired, 2=LCAS not supported. This field MUST NOT change over the life of a VCG.'
