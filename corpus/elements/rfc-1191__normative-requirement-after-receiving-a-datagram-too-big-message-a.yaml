document: rfc-1191
kind: normative-requirement
summary: After receiving a Datagram Too Big message, a host MUST attempt to avoid eliciting more such messages and MUST force the PMTU Discovery process to converge, either by reducing datagram size or ceasing to set DF.
section: "3"
rfc2119_level: MUST
