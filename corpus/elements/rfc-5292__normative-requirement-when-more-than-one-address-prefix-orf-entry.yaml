document: rfc-5292
kind: normative-requirement
summary: 'When more than one Address Prefix ORF entry matches the NLRI of a route, the ''first-match'' rule applies: the ORF entry with the smallest sequence number among all matching entries is the sole match and determines whether the route should be advertised.'
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
