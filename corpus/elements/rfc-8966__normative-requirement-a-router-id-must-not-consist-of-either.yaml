document: rfc-8966
kind: normative-requirement
summary: A router-id MUST NOT consist of either all binary zeroes or all binary ones (0x0000000000000000 or 0xFFFFFFFFFFFFFFFF). These values are reserved and a Router-Id TLV carrying them is invalid.
section: 4.1.3
rfc2119_level: MUST NOT
topics:
    - routing
