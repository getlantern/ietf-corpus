document: rfc-3339
kind: design-rationale
summary: Date and time components are ordered from least precise to most precise (year, month, day, hour, minute, second) so that timestamps with the same time zone and the same number of fractional second digits can be sorted lexicographically using a simple string comparison such as strcmp().
