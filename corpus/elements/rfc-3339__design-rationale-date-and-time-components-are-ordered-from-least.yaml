document: rfc-3339
kind: design-rationale
summary: Date and time components are ordered from least precise (year) to most precise (second/fraction), so that timestamps with a uniform UTC offset string can be lexicographically sorted with strcmp() and yield a time-ordered sequence.
section: "5.1"
