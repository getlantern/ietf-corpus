document: rfc-3339
kind: design-rationale
summary: Date and time components are ordered from least precise to most precise (year, month, day, hour, minute, second) so that timestamps with the same time zone and fractional-second width can be sorted lexicographically, enabling use of strcmp() to obtain time order.
section: "5.1"
