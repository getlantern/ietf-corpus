document: rfc-2073
kind: registry
summary: 'This document defines the Registry ID value space for IPv6 provider-based unicast addresses. Assigned values are: Multi-Regional/IANA (10000), RIPE NCC (01000), INTERNIC (11000), APNIC (00100). All other values are reserved by the IANA.'
