document: rfc-2911
kind: normative-requirement
summary: When the Printer successfully processes a create request, it MUST generate both a Job URI (stored in 'job-uri') and a Job ID (stored in 'job-id'), a 32-bit positive integer unique only within the context of the creating Printer object.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
