document: rfc-6492
kind: normative-requirement
summary: If the resource class is not defined, the server MUST return error 1201. If the client holds no resources in the class, the server MUST return error 1202. Badly formed certificate requests MUST yield error 1203. Offline issuers that cannot respond immediately MUST return error 1104 and SHOULD respond 1101 to repeated requests while processing.
section: 3.4.1
rfc2119_level: MUST
topics:
    - pkix
