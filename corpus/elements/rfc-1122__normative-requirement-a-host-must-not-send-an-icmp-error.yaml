document: rfc-1122
kind: normative-requirement
summary: A host MUST NOT send an ICMP error message in response to a datagram destined to an IP broadcast or multicast address, a datagram sent as a link-layer broadcast, or in response to an ICMP error message. This rule prevents broadcast storms.
section: 3.2.2
rfc2119_level: MUST NOT
topics:
    - ip
    - security
