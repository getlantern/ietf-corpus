document: rfc-8664
kind: wire-format
summary: The SR-RRO subobject (Type=36) has the same format as the SR-ERO subobject but without the L-Flag. A PCC MUST order SR-RRO subobjects so the first identifies the first segment visited and the last identifies the final segment (endpoint).
