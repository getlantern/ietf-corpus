document: rfc-9466
kind: design-rationale
summary: The RP Aggregated Assert Record is named for RP aggregation but deliberately does not encode the RP address, because RP address is not present in RFC 7761 assert records; grouping is based on shared Metric Preference and Metric, which typically corresponds to a shared RP.
section: 4.4.2
topics:
    - multicast
    - routing
