document: rfc-9254
kind: normative-requirement
summary: The enumeration type MUST be encoded as a CBOR unsigned or negative integer based on the assigned or automatically computed value. However, when enumeration appears in a union type, it MUST be encoded as a CBOR text string enclosed by CBOR tag 44.
section: "6.6"
rfc2119_level: MUST
