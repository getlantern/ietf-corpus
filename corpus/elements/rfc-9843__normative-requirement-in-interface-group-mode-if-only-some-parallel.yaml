document: rfc-9843
kind: normative-requirement
summary: In Interface Group Mode, if only some parallel links have advertised the Bandwidth Metric, the per-link Bandwidth Metric advertisements MUST be ignored and automatic metric calculation MUST be used to derive metrics for all parallel links, ensuring consistent metric assignment.
section: 4.1.3.1
rfc2119_level: MUST
topics:
    - routing
