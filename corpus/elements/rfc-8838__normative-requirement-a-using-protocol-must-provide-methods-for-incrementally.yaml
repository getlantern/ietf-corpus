document: rfc-8838
kind: normative-requirement
summary: A using protocol MUST provide methods for incrementally conveying trickled candidates after the initial ICE description, MUST deliver each trickled candidate or end-of-candidates indication exactly once and in order, MUST provide a mechanism for both parties to agree on the ICE session in force, and MUST provide a way to communicate end-of-candidates indications that specify the applicable ICE session.
section: "18"
rfc2119_level: MUST
topics:
    - webrtc
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
