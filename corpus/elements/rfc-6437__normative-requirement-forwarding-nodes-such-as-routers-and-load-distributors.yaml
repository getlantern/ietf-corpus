document: rfc-6437
kind: normative-requirement
summary: Forwarding nodes such as routers and load distributors MUST NOT depend only on Flow Label values being uniformly distributed. Flow Label bits MUST be combined with bits from other packet fields (e.g., the 5-tuple) when used as a hash key for load distribution.
section: "2"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
