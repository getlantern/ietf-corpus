document: rfc-3327
kind: normative-requirement
summary: Registrars returning a Path header field SHOULD attach a signed S/MIME of the response, and UAs receiving a REGISTER response containing a Path header field SHOULD validate the message using S/MIME. UAs SHOULD render the Path header field to the user or check it programmatically.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - sip
    - security
    - realtime
