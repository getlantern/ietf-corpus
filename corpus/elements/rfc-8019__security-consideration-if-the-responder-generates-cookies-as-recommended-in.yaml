document: rfc-8019
kind: security-consideration
summary: If the Responder generates cookies as recommended in RFC 7296 Section 2.6, an attacker can reuse the same SPIi and Ni to obtain identical cookies and thereby reuse puzzle solutions. The Responder MUST use timestamps, counters, or frequent secret rotation to prevent reuse of puzzle solutions.
section: "10"
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
