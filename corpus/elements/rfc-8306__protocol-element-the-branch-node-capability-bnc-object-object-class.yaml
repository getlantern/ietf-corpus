document: rfc-8306
kind: protocol-element
summary: The Branch Node Capability (BNC) object (Object-Class 31) uses the same format as the IRO but supports only IPv4 and IPv6 prefix sub-objects. Object-Type 1 specifies a list of allowed branch nodes; Object-Type 2 specifies a list of disallowed branch nodes. At most one BNC object may appear per path computation request.
section: 3.11.1
topics:
    - mpls
    - routing
