document: rfc-8931
kind: interoperability-note
summary: 'This specification requires an incremental transition via a ''flag day'': deployments are expected to be managed and homogeneous. The new RFRAG and RFRAG-ACK dispatch types are incompatible with the RFC 4944 fragmentation sub-layer, and mixing nodes from both specifications on the same path is not supported.'
