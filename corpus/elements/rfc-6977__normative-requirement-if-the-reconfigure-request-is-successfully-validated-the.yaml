document: rfc-6977
kind: normative-requirement
summary: If the Reconfigure-Request is successfully validated, the server MUST return a 'Success' Status Code and MUST include a list of all Client Identifier Options for clients to which Reconfigure messages will not be sent. 'Success' is returned even if no Reconfigure messages will be sent to any client.
section: "6.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
