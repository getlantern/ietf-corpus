document: rfc-2863
kind: normative-requirement
summary: Media-specific MIB designers MUST completely and unambiguously specify the layering model used, MUST specify whether virtual circuits are assigned ifTable entries, MUST specify the applicability of ifRcvAddressTable, and MUST NOT change the semantics, DESCRIPTION, or applicability of objects defined in the IF-MIB.
