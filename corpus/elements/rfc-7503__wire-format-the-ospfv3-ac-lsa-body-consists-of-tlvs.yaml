document: rfc-7503
kind: wire-format
summary: 'The OSPFv3 AC LSA body consists of TLVs in the same format as Traffic Engineering Extensions to OSPFv2: a 2-octet Type field, a 2-octet Length field (value portion only, excluding padding), and a variable-length Value field padded to 4-octet alignment. Nested TLVs are also 32-bit aligned.'
