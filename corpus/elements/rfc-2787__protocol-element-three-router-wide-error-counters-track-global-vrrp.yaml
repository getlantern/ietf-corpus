summary: 'Three router-wide error counters track global VRRP packet reception errors: vrrpRouterChecksumErrors (invalid checksum), vrrpRouterVersionErrors (unknown/unsupported version), and vrrpRouterVrIdErrors (invalid VRID). These are Counter32 objects not scoped to a particular virtual router.'
