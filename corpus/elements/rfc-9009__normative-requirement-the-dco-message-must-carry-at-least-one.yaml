document: rfc-9009
kind: normative-requirement
summary: The DCO message MUST carry at least one RPL Target option and one Transit Information option. The Transit Information option MUST carry a lifetime of 0x00000000 to indicate loss of reachability. The DCO MAY also carry Pad1, PadN, and RPL Target Descriptor options.
section: 4.3.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
