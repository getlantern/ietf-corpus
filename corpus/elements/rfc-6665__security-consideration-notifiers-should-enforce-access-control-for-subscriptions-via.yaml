document: rfc-6665
kind: security-consideration
summary: Notifiers SHOULD enforce access control for subscriptions via access control lists or real-time user interaction. If authorization fails, the notifier SHOULD reply with 403 (Forbidden) or 603 (Decline) unless doing so would reveal private information about the subscriber's authorization status.
section: "6.1"
topics:
    - security
    - sip
