kind: registry
summary: 'RFC 5438 registers the MIME type ''message/imdn+xml'' for IMDN payloads, the XML namespace ''urn:ietf:params:xml:ns:imdn'', the URN sub-registry ''urn:ietf:params:imdn'' for IMDN header parameters (initial entries: Disposition-Notification, Message-ID, Original-To, IMDN-Record-Route, IMDN-Route), and the Content-Disposition value ''notification''.'
