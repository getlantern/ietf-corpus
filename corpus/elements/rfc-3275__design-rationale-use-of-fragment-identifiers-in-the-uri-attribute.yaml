document: rfc-3275
kind: design-rationale
summary: Use of fragment identifiers in the URI attribute is NOT RECOMMENDED because fragment processing by a proxy may not be standardized, causing reference validation failures. Instead, XPath Transforms are recommended for selecting XML subtrees.
section: 4.3.3.2
topics:
