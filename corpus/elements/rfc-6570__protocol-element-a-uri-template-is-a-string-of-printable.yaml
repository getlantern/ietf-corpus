document: rfc-6570
kind: protocol-element
summary: 'A URI Template is a string of printable Unicode characters containing zero or more embedded variable expressions, each delimited by matching braces (''{'', ''}''). The grammar is: URI-Template = *( literals / expression ). Expressions contain an optional operator followed by a comma-separated variable-list.'
