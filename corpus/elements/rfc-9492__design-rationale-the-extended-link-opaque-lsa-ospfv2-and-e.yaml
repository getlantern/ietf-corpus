document: rfc-9492
kind: design-rationale
summary: The Extended Link Opaque LSA (OSPFv2) and E-Router-LSA (OSPFv3) were chosen as the container for ASLA advertisements because advertising link attributes there does not make the link part of the RSVP-TE topology, keeping TE Opaque LSAs and Intra-Area-TE-LSAs truly opaque to OSPF as originally intended.
section: "4.1"
topics:
    - routing
