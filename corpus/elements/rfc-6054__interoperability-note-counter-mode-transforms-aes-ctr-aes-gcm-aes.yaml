document: rfc-6054
kind: interoperability-note
summary: Counter-mode transforms (AES-CTR, AES-GCM, AES-CCM, GMAC) as originally specified for point-to-point IKEv2-keyed SAs guarantee IV uniqueness only for a single sender. Group applications sharing one SA across multiple senders require the additional SID mechanism defined in this document.
section: "2"
topics:
