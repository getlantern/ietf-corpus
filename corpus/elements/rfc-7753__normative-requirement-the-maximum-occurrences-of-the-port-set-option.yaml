document: rfc-7753
kind: normative-requirement
summary: The maximum occurrences of the PORT_SET option in a single PCP MAP request MUST be limited to 1, because a second PORT_SET option would imply overlapping Suggested External Port Sets derived from the same MAP Opcode header.
section: "4"
rfc2119_level: MUST
topics:
    - nat
    - pcp
