document: rfc-5140
kind: protocol-element
summary: TGREP is a route registration protocol for telephony gateways and soft switches to advertise reachability (prefixes, trunkgroups, carriers) to a TRIP Location Server. It is syntactically identical to TRIP but differs in route processing rules, supports a 'consolidation' operation, and operates asymmetrically with gateways in Send Only mode.
section: "1"
topics:
