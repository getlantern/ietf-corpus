document: rfc-5066
kind: design-rationale
summary: Similarly, VDSL-LINE-EXT-MCM-MIB (RFC 4070) objects are not reused for 10PASS-TS PMEs for the same reasons of simplicity and unified naming across both PHY types. VDSL-LINE-EXT-MCM-MIB groups MAY be optionally included for additional functionality.
