summary: 'IPv4NextHopInfoType encodes a next-hop table entry as: L3PortID (uint32), MTU (uint32), NextHopIPAddr (4 bytes), MediaEncapInfoIndex (uint32), LFBOutputSelectIndex (uint32). IPv6NextHopInfoType mirrors this structure with NextHopIPAddr as 16 bytes for IPv6.'
