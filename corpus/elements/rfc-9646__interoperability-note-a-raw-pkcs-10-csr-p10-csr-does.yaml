document: rfc-9646
kind: interoperability-note
summary: A raw PKCS#10 CSR (p10-csr) does not support origin authentication in the CSR structure itself; external origin authentication must be provided via the ZTP-client's authentication to the ZTP-server at the transport layer (e.g., TLS). CMP and CMC formats support origin authentication using both PKI and a shared secret.
section: 4.1.5
topics:
    - pkix
    - tls
    - security
    - crypto
