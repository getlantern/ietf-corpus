document: rfc-8967
kind: normative-requirement
summary: A Challenge Request received on a multicast address MUST be silently ignored. The Challenge Reply MUST be sent to the unicast address from which the Challenge Request was sent.
section: 4.3.1.2
rfc2119_level: MUST
topics:
    - routing
    - security
