document: rfc-9847
kind: normative-requirement
summary: Setting a registry value to 'Y' or 'D', or transitioning from 'Y' or 'D', in the 'Recommended' column requires IETF Standards Action with Expert Review or IESG Approval (RFC 8126). This applies to all affected TLS registries.
section: "3"
rfc2119_level: REQUIRED
