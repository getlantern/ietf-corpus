document: rfc-5063
kind: normative-requirement
summary: All nodes supporting these extensions MUST be able to transmit and properly receive and process RecoveryPath messages, and MUST be able to set both the T and R bits. Both T and R bits SHOULD be set (1) by default; when transmission is disabled, T MUST be zero; when reception is not desired, R MUST be zero.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
