document: rfc-7349
kind: design-rationale
summary: To prevent cross-protocol replay attacks among protocols sharing common keys, a 2-octet LDP Cryptographic Protocol ID (value 2) is appended to the authentication key before use, producing a protocol-specific key Ks. Other protocols using the same key append their own Protocol IDs, ensuring distinct effective key values per protocol.
section: "4"
topics:
