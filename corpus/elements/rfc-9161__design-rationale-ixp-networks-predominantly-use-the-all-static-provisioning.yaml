document: rfc-9161
kind: design-rationale
summary: IXP networks predominantly use the 'All Static Provisioning' deployment model (Section 5.4) because all participant CEs are well known, enabling complete suppression of ARP/ND flooding while maximizing security; dynamic learning is unnecessary when the management system can provision all IP->MAC entries.
section: "5.5"
topics:
