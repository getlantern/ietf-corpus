document: rfc-1315
kind: protocol-element
summary: frCircuitThroughput (default 0, meaning no commitment) is the average Frame Relay Information Field bits per second across the UNI. The measurement interval T is derived as frCircuitCommittedBurst/frCircuitThroughput when both are non-zero, or frCircuitExcessBurst/ifSpeed when both are zero.
section: "4.2"
