document: rfc-4877
kind: protocol-element
summary: The Peer Authorization Database (PAD) is used by the home agent to store per-mobile-node state, including authentication credentials and the binding between a mobile node's identity and its home address. In dynamic home address assignment, a temporary PAD entry links the authenticated peer identity to the newly allocated home address.
section: "4.2"
topics:
    - ipsec
    - mobility
    - security
