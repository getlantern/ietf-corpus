document: rfc-9842
kind: protocol-element
summary: The 'Dictionary-ID' request header is a Structured Field String of up to 1024 characters that MUST be identical to the server-provided 'id' from 'Use-As-Dictionary'. It is sent alongside 'Available-Dictionary' to allow servers to efficiently identify which dictionary the client is advertising.
section: "2.3"
topics:
    - http
