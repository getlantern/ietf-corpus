document: rfc-2961
kind: protocol-element
summary: 'Exponential back-off retransmission uses three per-interface parameters: initial retransmission interval Rf (suggested 500 ms), rapid retry limit Rl (suggested 3 transmissions), and increment factor Delta (suggested 1 for power-of-2 doubling). Each successive retransmission waits Rk * (1 + Delta) seconds; receipt of a MESSAGE_ID_ACK cancels further retransmission.'
section: "6.2"
topics:
