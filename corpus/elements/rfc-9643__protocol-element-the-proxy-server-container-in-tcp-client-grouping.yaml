document: rfc-9643
kind: protocol-element
summary: 'The proxy-server container in ''tcp-client-grouping'' supports three proxy types via a mandatory choice statement: socks4 (IP address only, default port 1080), socks4a (hostname or IP address, default port 1080), and socks5 (hostname or IP address, with optional authentication via GSS-API or username/password). Each type is gated by a corresponding YANG feature.'
section: 3.1.2.1
topics:
    - tcp
    - yang
    - netconf
