document: rfc-8681
kind: protocol-element
summary: The ADUI (Application Data Unit Information) is an intermediate format prepending a 1-byte Flow ID (F) and a 2-byte Length (L) to each ADU, followed by zero padding to align the total to a multiple of E bytes. This enables flow identification and padding removal after FEC decoding without transmitting the F, L, or Pad fields over the network.
section: "3.2"
topics:
    - multicast
