document: rfc-5122
kind: design-rationale
summary: 'A new "xmpp" URI scheme is defined rather than reusing im: or pres: URIs because those schemes are specific to instant messaging and presence, while XMPP is used for many other applications (network management, gaming, publish-subscribe, etc.) that do not implement IM/presence semantics.'
section: "2.1"
topics:
    - realtime
