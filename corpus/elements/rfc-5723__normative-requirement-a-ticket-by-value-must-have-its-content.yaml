document: rfc-5723
kind: normative-requirement
summary: A 'ticket by value' MUST have its content integrity protected and encrypted. A 'ticket by reference' does not need encryption but access to its backing store MUST be protected so only authorized entities can resolve it.
section: "6.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
