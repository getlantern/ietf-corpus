document: rfc-5681
kind: normative-requirement
summary: When the next ACK arrives acknowledging previously unacknowledged data after fast retransmit, cwnd MUST be set to ssthresh (the value set when the third duplicate ACK was received). This 'deflates' the artificially inflated window.
section: "3.2"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
