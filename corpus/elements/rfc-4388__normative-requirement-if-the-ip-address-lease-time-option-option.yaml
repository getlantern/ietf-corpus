document: rfc-4388
kind: normative-requirement
summary: If the IP Address Lease Time option (option 51) is requested and a currently valid lease exists, the server MUST return this option with the remaining time until expiration; if no valid lease exists, the server MUST NOT return it.
section: 6.4.2
rfc2119_level: MUST
topics:
