kind: protocol-element
summary: 'ORIGIN (Type Code 1) is a well-known mandatory attribute encoding the origin of path information: 0=IGP, 1=EGP, 2=INCOMPLETE. It is generated by the originating AS and included in all UPDATE messages propagating that information.'
