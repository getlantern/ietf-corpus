document: rfc-7143
kind: protocol-element
summary: The Ready To Transfer (R2T) PDU is issued by the target to solicit Data-Out PDUs. It carries StatSN, R2TSN (32-bit sequence number per command), Target Transfer Tag (TTT, opaque reference to be echoed in Data-Out PDUs), Buffer Offset (byte position in data stream), and Desired Data Transfer Length.
section: "11.8"
