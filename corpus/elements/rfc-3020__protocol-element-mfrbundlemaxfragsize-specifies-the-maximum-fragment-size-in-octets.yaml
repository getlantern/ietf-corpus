document: rfc-3020
kind: protocol-element
summary: mfrBundleMaxFragSize specifies the maximum fragment size in octets (range -1..8184). A value of -1 is returned by bundles that do not support fragmentation; zero is not a valid fragment size. Only meaningful when mfrBundleFragmentation is enabled.
