document: rfc-6840
kind: interoperability-note
summary: When canonicalizing DNS names, names in NSEC RDATA are NOT converted to lowercase, while names in RRSIG RDATA ARE converted to lowercase. This differs from RFC 4034 Section 6.2 (which says both should be lowercased) and RFC 3755 (which says neither should be); current practice follows neither fully.
section: "5.1"
topics:
    - dns
