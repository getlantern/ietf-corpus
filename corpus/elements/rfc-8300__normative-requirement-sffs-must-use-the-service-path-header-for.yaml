document: rfc-8300
kind: normative-requirement
summary: SFFs MUST use the Service Path Header for selecting the next SF or SFF. If an SFF receives a packet with SPI and SI that do not correspond to a valid next hop in a valid SFP, that packet MUST be dropped.
section: "3"
rfc2119_level: MUST
topics:
    - security
