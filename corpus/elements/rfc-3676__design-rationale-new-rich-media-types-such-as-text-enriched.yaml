document: rfc-3676
kind: design-rationale
summary: New rich media types such as Text/Enriched and Text/HTML were rejected as solutions to embarrassing line wrap because they suffered from poor backwards compatibility and hostile user reactions when displayed as plain text. Format=Flowed was chosen because it is, in all significant ways, valid Text/Plain and renders acceptably without any special handling.
section: "3.3"
topics:
