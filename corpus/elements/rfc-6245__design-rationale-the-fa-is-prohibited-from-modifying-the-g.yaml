document: rfc-6245
kind: design-rationale
summary: The FA is prohibited from modifying the 'G' bit in the Registration Request because it falls within the region protected by the Mobile-Home Authentication extension. Instead, the GRE Key Extension is placed outside the authenticated region, allowing the FA to request GRE encapsulation without invalidating the MN-HA authentication.
section: "4.1"
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
