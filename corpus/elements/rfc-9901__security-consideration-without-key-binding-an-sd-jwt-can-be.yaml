document: rfc-9901
kind: security-consideration
summary: Without Key Binding, an SD-JWT can be replayed by anyone who obtains it—including a malicious Verifier who re-presents a received credential to another Verifier. Issuers and Verifiers in high-sensitivity use cases must enforce Key Binding to limit this forwarding risk.
section: "9.9"
topics:
