document: rfc-8005
kind: normative-requirement
summary: A HIP node SHOULD obtain HIP RRs from a trusted party through a secure channel ensuring data integrity and authenticity. DNSSEC (RFC 4033, 4034, 4035) provides such a secure channel.
section: "8"
rfc2119_level: SHOULD
topics:
