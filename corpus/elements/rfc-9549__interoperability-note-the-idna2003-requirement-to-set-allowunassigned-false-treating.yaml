document: rfc-9549
kind: interoperability-note
summary: The IDNA2003 requirement to set AllowUnassigned=false (treating labels as 'stored strings') in the ToASCII conversion for distinguished name domainComponent attributes is replaced by a simpler IDNA2008 requirement to convert U-labels to A-labels, removing the flag-based processing model.
section: "2.4"
topics:
