document: rfc-2290
kind: normative-requirement
summary: A mobile node implementing move detection based on the Prefix-Length Extension MUST compare the prefix of any advertising agent with that of its current foreign agent and, upon receiving an advertisement specifying a different prefix, MUST register with the new foreign agent.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
