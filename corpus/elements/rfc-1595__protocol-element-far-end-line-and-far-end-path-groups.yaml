document: rfc-1595
kind: protocol-element
summary: 'Far End Line and Far End Path groups collect ES, SES, CV, and UAS statistics derived from the far-end block error (FEBE) code: in the Z2 byte of Line Overhead for Line, and in the G1 byte of Path Overhead for Path. Both current (15-minute) and interval (up to 96 × 15 min) tables are defined.'
