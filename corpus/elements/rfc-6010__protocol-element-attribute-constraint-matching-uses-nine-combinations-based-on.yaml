document: rfc-6010
kind: protocol-element
summary: Attribute constraint matching uses nine combinations based on whether the attribute is absent/single-valued/multi-valued in the CMS path and in cms_constraints. A constraint match requires each value in the CMS path to equal a value in the constraint; mismatch fails processing. Absent attributes in the path with present constraints produce default attributes in cms_default_attributes.
section: "1.3"
topics:
