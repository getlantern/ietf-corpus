document: rfc-8853
kind: interoperability-note
summary: An answerer that does not understand simulcast will not recognize 'a=simulcast' and will remove it in the SDP answer per existing offer/answer procedures (RFC 3264), resulting in fallback to non-simulcast operation without any special handling required from the offerer.
section: 5.3.2
topics:
    - realtime
    - rtp
    - webrtc
