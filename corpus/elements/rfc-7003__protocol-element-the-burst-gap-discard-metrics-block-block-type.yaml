document: rfc-7003
kind: protocol-element
summary: The Burst/Gap Discard Metrics Block (Block Type 20) is an RTCP XR block that reports the number of packets discarded during discard bursts and the total packets expected during bursts, enabling calculation of burst and gap discard rates. It is intended for use in conjunction with RFC 7002 (Discard Count Metrics Block) and the Measurement Information Block (RFC 6776).
section: "1.1"
topics:
    - rtp
    - realtime
