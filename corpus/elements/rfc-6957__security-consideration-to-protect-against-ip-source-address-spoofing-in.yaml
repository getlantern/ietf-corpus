document: rfc-6957
kind: security-consideration
summary: To protect against IP source address spoofing in data packets, DAD-Proxy can be combined with Source Address Validation Improvement (SAVI) mechanisms (RFC 6620, SAVI-SEND, SAVI-MIX), with the BNG acting as the SAVI device and CPE MAC addresses as Binding Anchors.
section: "6.2"
