document: rfc-3266
kind: wire-format
summary: 'SDP IPv6 address ABNF: IP6-address is defined as ''hexpart [ ":" IP4-address ]'', where hexpart is ''hexseq / hexseq "::" [ hexseq ] / "::" [ hexseq ]'', hexseq is ''hex4 *( ":" hex4)'', and hex4 is ''1*4HEXDIG''. This completes the previously undefined IPv6 syntax in SDP.'
