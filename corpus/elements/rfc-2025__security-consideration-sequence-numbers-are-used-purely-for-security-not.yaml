document: rfc-2025
kind: security-consideration
summary: 'Sequence numbers are used purely for security (not reliability): to detect malicious loss, replay, or reordering of tokens. The direction indicator in SeqNum detects maliciously reflected tokens. Applications should request both sequencing and replay detection.'
section: 3.2.1.2
topics:
    - security
