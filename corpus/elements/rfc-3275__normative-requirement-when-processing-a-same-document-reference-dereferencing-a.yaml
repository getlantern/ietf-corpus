document: rfc-3275
kind: normative-requirement
summary: When processing a same-document reference, dereferencing a null URI (URI='') MUST result in an XPath node-set including every non-comment node of the XML document. Applications MUST support the null URI and barename XPointer; '#xpointer(/)' and '#xpointer(id(ID))' are RECOMMENDED if comments are to be preserved.
section: 4.3.3.3
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
