document: rfc-9241
kind: registry
summary: 'This document updates the ALTO Entity Domain Types registry (RFC 9240) by adding two new types: ''asn'' (ASN encoding per Section 6.1.1.2) and ''countrycode'' (ISO 3166-1 alpha-2 encoding per Section 6.1.2.2), both with no hierarchy/inheritance and no mapping to ALTO address types.'
section: "7.4"
