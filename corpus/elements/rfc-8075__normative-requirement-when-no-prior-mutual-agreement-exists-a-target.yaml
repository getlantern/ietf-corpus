document: rfc-8075
kind: normative-requirement
summary: When no prior mutual agreement exists, a Target CoAP URI embedded in the Hosting HTTP URI without its scheme component MUST NOT be emitted by clients, and MUST elicit a suitable 4xx client error response from the HC Proxy.
