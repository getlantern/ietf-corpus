document: rfc-3111
kind: normative-requirement
summary: A SLPv2 Agent MUST NOT join a multicast group whose scope is greater than the scope configured for unicast on that interface. Interfaces with site-local or global addresses MUST join all multicast scopes from FF01 through FF05.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - multicast
    - v6ops
