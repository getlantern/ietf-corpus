document: rfc-6779
kind: state-machine
summary: The notification suppression window is triggered when nhdpIfStatus transitions from 'false(2)' (default) to 'true(1)'. During the suppression window (minimum 3 × nhdpHelloInterval), expected neighbor discovery notifications SHOULD NOT be emitted. After the window, normal throttling rules apply.
section: 5.1.3.1
topics:
    - snmp
