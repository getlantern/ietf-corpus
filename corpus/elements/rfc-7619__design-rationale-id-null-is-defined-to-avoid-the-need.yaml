document: rfc-7619
kind: design-rationale
summary: ID_NULL is defined to avoid the need to send a bogus ID Type with placeholder data when a remote peer is unauthenticated. It is primarily intended for use with NULL authentication but may be used in other contexts (e.g., raw public key authentication) where the Identification payload content is not consumed, to be described in separate documents.
section: "2.2"
topics:
    - ipsec
