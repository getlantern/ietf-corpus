document: rfc-3959
kind: design-rationale
summary: UASs need a separate offer/answer exchange for early media to avoid media clipping. When an INVITE forks and the UAC mutes all but one UAS, if the chosen UAS sends a 200 OK after being muted, a new offer/answer exchange is needed to unmute it, causing clipping.
section: "3"
topics:
    - sip
    - realtime
