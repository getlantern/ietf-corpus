document: rfc-6184
kind: normative-requirement
summary: Aggregation packets MUST NOT contain fragmentation units, and aggregation packets MUST NOT be nested (an aggregation packet MUST NOT contain another aggregation packet). The total data MUST fit within an IP packet.
section: "5.7"
rfc2119_level: MUST
