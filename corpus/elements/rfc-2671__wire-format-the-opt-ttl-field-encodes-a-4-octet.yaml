document: rfc-2671
kind: wire-format
summary: 'The OPT TTL field encodes a 4-octet structure: byte 0 is EXTENDED-RCODE (upper 8 bits of the 12-bit RCODE, value 0 means unextended RCODE is in use); byte 1 is VERSION (EDNS version, 0 for this spec); bytes 2-3 are Z (reserved, must be zero).'
