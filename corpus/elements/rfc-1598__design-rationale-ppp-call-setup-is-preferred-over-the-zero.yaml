document: rfc-1598
kind: design-rationale
summary: PPP call setup is preferred over the Zero NLPID technique because Zero NLPID can be expensive when users are charged per packet or connect time, due to the probing of PPP configuration packets at each call. Additionally, the Zero NLPID technique can result in 'black-holes', whereas PPP configuration provides a direct indication of service availability.
