document: rfc-4008
kind: normative-requirement
summary: If the agent is capable of storing non-volatile configuration, the values of timeout objects (natBindDefIdleTimeout, natUdpDefIdleTimeout, natIcmpDefIdleTimeout, natOtherDefIdleTimeout, natTcpDefIdleTimeout, natTcpDefNegTimeout, natNotifThrottlingInterval) MUST be restored after re-initialization of the management system.
section: "5"
rfc2119_level: MUST
topics:
    - nat
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
