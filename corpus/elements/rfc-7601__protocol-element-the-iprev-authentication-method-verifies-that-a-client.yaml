document: rfc-7601
kind: protocol-element
summary: 'The ''iprev'' authentication method verifies that a client IP address has consistent forward and reverse DNS mappings. Results are: pass (PTR and A/AAAA queries agree), fail (lookups disagree or forward query returned no result), temperror (transient DNS error), permerror (no PTR data published for the IP). Reported using ptype ''policy'' and property ''iprev''.'
section: 2.7.3
topics:
    - email
    - dns
    - security
