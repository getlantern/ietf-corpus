document: rfc-8512
kind: protocol-element
summary: 'The mapping-entry grouping defines per-flow NAT state with fields: index (uint32), type (static/dynamic-implicit/dynamic-explicit), transport-protocol (uint8 from IANA Protocol Numbers), internal-src-address/port, external-src-address/port, internal-dst-address/port, external-dst-address/port, and lifetime (uint32, seconds). Both IPv4 and IPv6 addresses are supported as internal addresses to cover NAT44 and NAT64.'
section: "2.8"
topics:
