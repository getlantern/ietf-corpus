document: rfc-1035
kind: state-machine
summary: If a server cannot load zone data from its master file (e.g., syntax errors) or cannot refresh a zone before its EXPIRE deadline, it must answer queries as though it is not authoritative for that zone, effectively falling back to a non-authoritative state until the zone is successfully reloaded.
section: "6.3"
topics:
    - dns
