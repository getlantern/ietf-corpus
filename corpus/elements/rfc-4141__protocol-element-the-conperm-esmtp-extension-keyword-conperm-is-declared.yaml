document: rfc-4141
kind: protocol-element
summary: The CONPERM ESMTP extension (keyword 'CONPERM') is declared in EHLO and added as a parameter to MAIL-FROM. It signals that the originator requires enforcement of authorized content conversions by intermediaries along the transfer path.
