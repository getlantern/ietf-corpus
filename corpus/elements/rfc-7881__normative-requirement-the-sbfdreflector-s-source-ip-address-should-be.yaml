document: rfc-7881
kind: normative-requirement
summary: The SBFDReflector's Source IP Address SHOULD be copied from the Destination IP Address of the received S-BFD Control packet, except when it is from the 127/8 range (IPv4) or 0:0:0:0:0:ffff:7f00:0/104 range (IPv6).
section: "6.1"
rfc2119_level: SHOULD
topics:
    - ip
