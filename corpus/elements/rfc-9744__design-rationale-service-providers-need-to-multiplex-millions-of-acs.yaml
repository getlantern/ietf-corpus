document: rfc-9744
kind: design-rationale
summary: Service providers need to multiplex millions of ACs across multiple physical interfaces onto a single VPWS service tunnel to reduce the number of EVPN service labels, associated OAM monitoring overhead, and BGP signaling compared to RFC 8214 where each AC requires its own service tunnel.
