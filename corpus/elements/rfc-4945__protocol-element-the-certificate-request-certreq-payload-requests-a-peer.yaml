document: rfc-4945
kind: protocol-element
summary: The Certificate Request (CERTREQ) payload requests a peer to provide certificates. The Certification Authority field SHOULD contain the Subject field of the trust anchor for binary comparison. An empty Certification Authority field is a convention indicating the sender should provide any/all available end-entity certificates.
section: "3.2"
topics:
    - ipsec
    - pkix
