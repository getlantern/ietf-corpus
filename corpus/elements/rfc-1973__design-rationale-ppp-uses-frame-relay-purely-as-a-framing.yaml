document: rfc-1973
kind: design-rationale
summary: PPP uses Frame Relay purely as a framing mechanism on point-to-point circuits, ignoring Frame Relay's virtual-circuit features. This is equivalent to the technique used to carry SNAP headers over Frame Relay (RFC 1490).
