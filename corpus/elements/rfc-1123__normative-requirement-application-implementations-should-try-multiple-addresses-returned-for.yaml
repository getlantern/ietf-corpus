document: rfc-1123
kind: normative-requirement
summary: Application implementations SHOULD try multiple addresses returned for a multihomed remote host until success is obtained. A UDP server SHOULD send replies using the same IP source address as the specific destination address of the request.
section: "2.3"
rfc2119_level: SHOULD
topics:
    - ip
    - udp
