document: rfc-1398
kind: protocol-element
summary: dot3StatsInternalMacTransmitErrors counts frames for which transmission fails due to an internal MAC sublayer transmit error, excluding frames already counted by dot3StatsLateCollisions, dot3StatsExcessiveCollisions, or dot3StatsCarrierSenseErrors. The precise meaning is implementation-specific.
