document: rfc-7618
kind: security-consideration
summary: Port randomization (RFC 6056) is impaired because the host can only randomize within its restricted port range, reducing the entropy available against blind in-window TCP attacks. RFC 5961 techniques or IPv6 usage are recommended as compensating controls.
section: "10.1"
topics:
    - security
    - tcp
    - ip
