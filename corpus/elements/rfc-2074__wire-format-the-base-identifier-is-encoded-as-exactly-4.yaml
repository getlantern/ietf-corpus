document: rfc-2074
kind: wire-format
summary: 'The base-identifier is encoded as exactly 4 octets: 1 octet function code (''f''), 2 octets operands (''op1'', ''op2''), and 1 octet base-layer enumeration (''m''), all in network byte order. The ''vsnap'' base-layer identifier is an exception, encoded as 8 octets.'
