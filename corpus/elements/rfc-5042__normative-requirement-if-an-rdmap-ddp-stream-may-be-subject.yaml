document: rfc-5042
kind: normative-requirement
summary: If an RDMAP/DDP Stream may be subject to impersonation or Stream hijacking attacks, it is RECOMMENDED that the Stream be authenticated, integrity protected, and protected from replay attacks; confidentiality MAY also be used when the Stream traverses a public network.
section: 5.4.1
rfc2119_level: RECOMMENDED
topics:
    - security
    - ipsec
