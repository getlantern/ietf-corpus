document: rfc-4860
kind: normative-requirement
summary: When an RSVP Signaled Preemption Priority Policy Element is in the received E2E PathErr, the Aggregator MUST include it in the aggregate Path for the corresponding reservation. The Aggregator MUST use as Source Address the address it uses to identify itself as PHOP when forwarding E2E Path messages.
section: "4"
rfc2119_level: MUST
topics:
    - qos
    - diffserv
