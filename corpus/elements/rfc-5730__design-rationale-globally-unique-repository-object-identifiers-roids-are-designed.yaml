document: rfc-5730
kind: design-rationale
summary: Globally unique repository object identifiers (ROIDs) are designed to facilitate object-information sharing between repositories. Disjoint copies without shared identifiers can produce inconsistencies — for example, a name server renamed in one repository but not another can cause unexpected DNS results.
section: "2.8"
topics:
    - dns
