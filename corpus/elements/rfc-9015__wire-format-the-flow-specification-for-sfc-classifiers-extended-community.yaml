document: rfc-9015
kind: wire-format
summary: The Flow Specification for SFC Classifiers Extended Community (Type=0x80, Sub-Type=0x0d) is 8 octets encoding a 3-octet SPI, 1-octet SI, and 2-octet SFT. SI=0 means use the first hop of the SFP; SFT=0 means free or implied choice of SFT at the indicated hop.
section: "7.4"
