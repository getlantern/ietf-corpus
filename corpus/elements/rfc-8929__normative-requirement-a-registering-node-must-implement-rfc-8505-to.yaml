document: rfc-8929
kind: normative-requirement
summary: A Registering Node MUST implement RFC 8505 to interact with a 6BBR. A 6LN MUST register all of its IPv6 addresses to its 6LR (which is the 6BBR when directly connected at Layer 2); failure to register an address may result in that address being unreachable from other nodes on the subnet.
section: "10"
rfc2119_level: MUST
topics:
    - ip
