document: rfc-7752
kind: normative-requirement
summary: The combination of ASN and BGP-LS Identifier MUST be globally unique. All BGP-LS speakers within an IGP flooding-set MUST use the same ASN and BGP-LS ID tuple. Sub-TLVs within a Node Descriptor MUST be arranged in ascending order by sub-TLV type.
section: 3.2.1.4
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
