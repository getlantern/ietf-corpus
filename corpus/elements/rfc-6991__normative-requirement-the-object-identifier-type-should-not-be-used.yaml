document: rfc-6991
kind: normative-requirement
summary: The object-identifier type SHOULD NOT be used to represent SMIv2 OBJECT IDENTIFIERs; the object-identifier-128 type SHOULD be used instead, because object-identifier is a superset not restricted to the SMIv2 limit of 128 sub-identifiers.
