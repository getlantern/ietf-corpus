document: rfc-2533
kind: protocol-element
summary: 'The ''set'' shorthand syntax allows expressing enumerated values and ranges in a single item: ''T=[E1,E2,...En]'' expands to a disjunction of equalities, and ''T=[R1..R2]'' expands to ''(& (T>=R1) (T<=R2))''. This is a notational convenience with no additional semantic content.'
section: 4.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
