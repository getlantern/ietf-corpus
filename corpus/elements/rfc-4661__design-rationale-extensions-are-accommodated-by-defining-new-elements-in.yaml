document: rfc-4661
kind: design-rationale
summary: Extensions are accommodated by defining new elements in new XML namespaces governed by separate schemas, rather than versioning the base schema. The base schema uses <any> and <anyAttribute> to designate explicit extension points, and the schema does not carry a version attribute because backward compatibility across revisions is assumed.
