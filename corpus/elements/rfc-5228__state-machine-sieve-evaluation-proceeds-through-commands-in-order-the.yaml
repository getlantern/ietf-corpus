document: rfc-5228
kind: state-machine
summary: Sieve evaluation proceeds through commands in order; the implicit keep state starts as active. Executing fileinto, keep, redirect, or discard cancels the implicit keep. If no such action fires before the script ends (or 'stop' is reached), the implicit keep is taken, delivering to the default mailbox.
section: 2.10.2
topics:
    - email
