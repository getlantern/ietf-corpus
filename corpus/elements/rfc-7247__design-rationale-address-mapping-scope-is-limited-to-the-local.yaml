document: rfc-7247
kind: design-rationale
summary: Address mapping scope is limited to the local part (username/localpart) of addresses. Domain-name mapping is ruled out of scope as a DNS matter; instance-specific mapping (GRUU / resourcepart) is treated secondarily. Telephone numbers and other protocol-specific identifiers are explicitly out of scope.
section: "6.1"
topics:
    - sip
    - realtime
