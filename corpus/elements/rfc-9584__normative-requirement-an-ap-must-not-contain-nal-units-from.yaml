document: rfc-9584
kind: normative-requirement
summary: An AP MUST NOT contain NAL units from more than one access unit, MUST carry at least two aggregation units, MUST NOT contain FUs, and APs MUST NOT be nested. The AP payload header Type MUST equal 56, and the TID value MUST equal the smallest TID among all aggregated NAL units.
section: 4.3.2
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
