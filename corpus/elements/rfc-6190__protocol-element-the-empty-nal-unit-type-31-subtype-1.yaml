document: rfc-6190
kind: protocol-element
summary: The Empty NAL unit (type 31, subtype 1) consists solely of the two-byte extension NAL unit header with no payload. It is used to ensure inter-session timestamp alignment required for decoding order recovery in NI-T and NI-TC MST modes.
