document: rfc-8519
kind: protocol-element
summary: The top-level data model is a 'acls' container holding a list of ACLs keyed by name. Each ACL contains an ordered list of ACEs (Access Control Entries), each with a 'matches' container and an 'actions' container. ACEs are ordered by user and processed first-match-wins.
