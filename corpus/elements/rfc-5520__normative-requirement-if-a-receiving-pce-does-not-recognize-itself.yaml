document: rfc-5520
kind: normative-requirement
summary: If a receiving PCE does not recognize itself as identified by the PCE-ID in the PKS, it MAY forward the PCReq to another PCE per local policy; if it does not forward it, it MUST respond with a PCRep containing a NO-PATH object.
section: "4"
rfc2119_level: MUST
topics:
    - routing
