document: rfc-7275
kind: protocol-element
summary: The RG Connect message (type 0x0700) establishes the ICCP RG connection and optionally one Application Connection simultaneously. It carries a mandatory ICC Sender Name TLV (UTF-8 hostname, max 80 octets) and zero or one Application Connect TLV. All implementations MUST support receipt of a message combining RG and single Application Connection setup.
section: "6.2"
topics:
    - mpls
