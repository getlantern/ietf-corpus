document: rfc-9072
kind: interoperability-note
summary: When a new speaker (supporting this spec) needs to send Optional Parameters exceeding 255 octets to an old speaker, the old speaker will see type code 255 as an unrecognized Optional Parameter and is expected to close the connection with a NOTIFICATION (OPEN Message Error / Unsupported Optional Parameters).
