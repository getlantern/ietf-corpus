document: rfc-9881
kind: interoperability-note
summary: Only the pure variant of ML-DSA (not the pre-hash HashML-DSA variant) is specified for use in PKIX certificates and CRLs. The pure variant does support a typical pre-hash flow via the External μ-ML-DSA mechanism described in Appendix D.
