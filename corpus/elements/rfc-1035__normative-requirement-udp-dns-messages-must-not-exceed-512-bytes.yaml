document: rfc-1035
kind: normative-requirement
summary: UDP DNS messages must not exceed 512 bytes (excluding IP/UDP headers). Messages exceeding this limit are truncated and the TC bit must be set in the header.
section: 4.2.1
rfc2119_level: MUST
topics:
    - dns
    - udp
