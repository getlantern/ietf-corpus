summary: 'MPLS echo request/reply is a UDP packet with a 32-octet fixed header: 2-octet Version Number (currently 1), 2-octet Global Flags, 1-octet Message Type, 1-octet Reply Mode, 1-octet Return Code, 1-octet Return Subcode, 4-octet Sender''s Handle, 4-octet Sequence Number, and two 8-octet NTP-format timestamps (TimeStamp Sent and TimeStamp Received). A variable-length TLV section follows.'
