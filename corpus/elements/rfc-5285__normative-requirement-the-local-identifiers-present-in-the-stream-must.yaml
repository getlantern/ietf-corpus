document: rfc-5285
kind: normative-requirement
summary: The local identifiers present in the stream MUST have been negotiated or defined out-of-band. There are no static allocations of local identifiers. Each distinct extension MUST have a unique ID. The value 0 is reserved for padding and MUST NOT be used as a local identifier.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
