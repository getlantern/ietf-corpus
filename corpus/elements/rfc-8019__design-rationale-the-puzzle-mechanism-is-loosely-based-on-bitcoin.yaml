document: rfc-8019
kind: design-rationale
summary: The puzzle mechanism is loosely based on Bitcoin's proof-of-work technique. The task is to find N keys such that PRF(Ki, S) has at least ZBC trailing zero bits. Using four keys instead of one reduces the variance in solve time while keeping Responder verification cheap.
section: "4.4"
topics:
