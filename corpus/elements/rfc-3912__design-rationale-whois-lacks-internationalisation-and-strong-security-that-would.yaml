document: rfc-3912
kind: design-rationale
summary: WHOIS lacks internationalisation and strong security that would be expected from a recently-designed IETF protocol. This document does not attempt to rectify those shortcomings but documents the protocol as it is; updated capabilities are being addressed in the CRISP Working Group.
section: "1"
topics:
    - security
