document: rfc-9254
kind: normative-requirement
summary: Container-like instances (containers, YANG data structures, notification contents, RPC inputs/outputs, action inputs/outputs, list entries, and anydata nodes) MUST be encoded using a CBOR map data item (major type 5), with each schema node encoded as a key-value pair.
section: "4.2"
rfc2119_level: MUST
topics:
