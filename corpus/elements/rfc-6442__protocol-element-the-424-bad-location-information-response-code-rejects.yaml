document: rfc-6442
kind: protocol-element
summary: The 424 (Bad Location Information) response code rejects a request due to malformed, unsatisfactory, or non-dereferenceable location. It MUST include a Geolocation-Error header and SHOULD include a PIDF-LO body with corrective location when the intermediary has better information. It is a final response and MUST NOT terminate an existing dialog.
section: "4.3"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
