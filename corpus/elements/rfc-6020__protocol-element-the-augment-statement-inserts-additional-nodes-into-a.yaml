document: rfc-6020
kind: protocol-element
summary: The augment statement inserts additional nodes into a data model hierarchy defined in the same or another module. The when statement can make the augmented nodes conditional, appearing only when an XPath expression evaluates to true. Augmented nodes in XML carry the augmenting module's namespace prefix.
