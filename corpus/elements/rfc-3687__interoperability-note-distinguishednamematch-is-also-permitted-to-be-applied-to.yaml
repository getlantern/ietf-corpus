document: rfc-3687
kind: interoperability-note
summary: distinguishedNameMatch is also permitted to be applied to values of the RDNSequence type (not just DistinguishedName, which is defined by assignment from RDNSequence), because some type definitions directly reference RDNSequence. Similarly, telephoneNumberMatch applies to any PrintableString, not just TelephoneNumber.
