document: rfc-8249
kind: design-rationale
summary: A new link-wide MTU value 'Lz' is introduced so that link-local PDUs (CSNPs, PSNPs, E-L1CS FS-LSPs) can be sized up to the local link's capability rather than being constrained by the campus-wide Sz. This improves link utilization efficiency and speeds link-state convergence when the link MTU exceeds the campus MTU.
section: "1"
topics:
