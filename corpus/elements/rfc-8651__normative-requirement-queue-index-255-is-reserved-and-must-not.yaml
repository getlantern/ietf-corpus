document: rfc-8651
kind: normative-requirement
summary: Queue Index 255 is reserved and MUST NOT be used in the Queue Index field of a Queue Parameter Sub-Data Item. Only the first instance of a particular Queue Index value is meaningful; subsequent duplicates MUST otherwise be ignored.
section: 3.1.1
rfc2119_level: MUST NOT
