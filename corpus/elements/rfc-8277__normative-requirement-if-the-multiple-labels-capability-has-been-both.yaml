document: rfc-8277
kind: normative-requirement
summary: If the Multiple Labels Capability has been both sent and received on a given BGP session and both specify AFI/SAFI x/y, then UPDATEs of that AFI/SAFI MUST use the Section 2.3 encoding—even if only one label is being bound.
section: "2.1"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
