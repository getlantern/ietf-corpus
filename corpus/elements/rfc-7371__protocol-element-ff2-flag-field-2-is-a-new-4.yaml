document: rfc-7371
kind: protocol-element
summary: ff2 (flag field 2) is a new 4-bit field at bits 17-20 of the IPv6 multicast address, defined by this document. All four bits ('rrrr') are reserved for future assignment as additional flag bits. These bits apply to all IPv6 multicast addresses.
