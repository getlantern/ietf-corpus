document: rfc-4236
kind: protocol-element
summary: The Preservation-Interest-Body parameter specifies a fixed-size prefix of the original message body for which Data Preservation Interest (DPI) would apply. An OPES processor MUST behave as if it received a DPI message with org-offset zero and org-size equal to the parameter value.
section: 3.2.6
topics:
    - http
