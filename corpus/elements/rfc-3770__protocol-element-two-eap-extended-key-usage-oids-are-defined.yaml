document: rfc-3770
kind: protocol-element
summary: 'Two EAP extended key usage OIDs are defined: id-kp-eapOverPPP (id-kp 13) indicating the certified public key is appropriate for EAP in the PPP environment, and id-kp-eapOverLAN (id-kp 14) indicating appropriateness for EAP in the LAN (EAPOL) environment. Inclusion of both values indicates suitability for either environment.'
