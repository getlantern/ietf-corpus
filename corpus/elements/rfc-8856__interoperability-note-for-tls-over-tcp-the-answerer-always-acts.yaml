document: rfc-8856
kind: interoperability-note
summary: For TLS over TCP, the answerer always acts as TLS server once the underlying connection is established. Subsequent SDP offers and answers will not impact previously negotiated TLS roles unless a new TLS connection is negotiated.
section: "8"
