document: rfc-6555
kind: design-rationale
summary: The 10-minute retry interval for a failed preferred address family avoids simple doubling of connection attempts on both IPv6 and IPv4, while still allowing the algorithm to detect when the preferred path becomes functional again. It can be implemented by flushing Happy Eyeballs state every 10 minutes.
section: "4.2"
topics:
