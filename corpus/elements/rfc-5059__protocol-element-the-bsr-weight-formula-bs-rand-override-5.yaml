document: rfc-5059
kind: protocol-element
summary: The BSR weight formula BS_Rand_Override = 5 + priorityDelay + addrDelay provides a randomized back-off during election; high-weight C-BSRs generate small values (become elected faster) and low-weight C-BSRs generate larger delays (up to 23 s), reducing election thrashing without a hard lock-step.
