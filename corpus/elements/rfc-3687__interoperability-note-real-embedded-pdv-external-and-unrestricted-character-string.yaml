document: rfc-3687
kind: interoperability-note
summary: REAL, EMBEDDED PDV, EXTERNAL, and unrestricted CHARACTER STRING ASN.1 types are treated as equivalent SEQUENCE types for component referencing (as defined in X.680 and X.690). The INSTANCE OF type is similarly treated as the SEQUENCE type from X.681 Annex C.
