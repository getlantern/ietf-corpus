document: rfc-9394
kind: interoperability-note
summary: This extension is compatible with both IMAP4rev1 (RFC 3501) and IMAP4rev2 (RFC 9051). Section 3.2 applies only if the server advertises "PARTIAL" or "CONTEXT=SEARCH" together with "ESEARCH" and/or IMAP4rev2.
