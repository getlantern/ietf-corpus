document: rfc-5880
kind: normative-requirement
summary: A system taking the Active role MUST send BFD Control packets regardless of whether it has received any BFD packets for that session. A system taking the Passive role MUST NOT begin sending BFD packets until it has received a BFD packet and thus learned the remote system's discriminator value. At least one system MUST take the Active role.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
