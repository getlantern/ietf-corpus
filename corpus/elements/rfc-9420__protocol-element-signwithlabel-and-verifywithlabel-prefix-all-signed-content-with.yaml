document: rfc-9420
kind: protocol-element
summary: SignWithLabel and VerifyWithLabel prefix all signed content with a label of the form 'MLS 1.0 ' + Label in a SignContent structure, binding signatures to their specific purpose and preventing cross-protocol confusion. An IANA registry tracks label values.
