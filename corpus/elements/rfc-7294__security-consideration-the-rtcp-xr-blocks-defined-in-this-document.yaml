document: rfc-7294
kind: security-consideration
summary: The RTCP XR blocks defined in this document introduce no new security considerations beyond those described in RFC 3611. These blocks do not provide per-packet statistics, so the risk to confidentiality documented in RFC 3611 Section 7 Paragraph 3 does not apply.
