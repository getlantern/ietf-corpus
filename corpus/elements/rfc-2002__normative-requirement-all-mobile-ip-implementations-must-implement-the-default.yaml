document: rfc-2002
kind: normative-requirement
summary: All Mobile IP implementations MUST implement the default keyed-MD5 authentication algorithm in 'prefix+suffix' mode producing a 128-bit authenticator over the shared secret, protected fields, and shared secret again. Any SPI value MUST be associable with any implemented authentication algorithm.
section: 3.5.1
rfc2119_level: MUST
topics:
    - ip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
