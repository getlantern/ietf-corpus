document: rfc-8371
kind: protocol-element
summary: 'Seven new mobile node identifier types are defined for use with the MN identifier option: IPv6 Address (type 2), IMSI (type 3), P-TMSI (type 4), EUI-48 address (type 5), EUI-64 address (type 6), GUTI (type 7), and DUID (type 8). Types 9-15 are reserved and 16-255 are unassigned.'
