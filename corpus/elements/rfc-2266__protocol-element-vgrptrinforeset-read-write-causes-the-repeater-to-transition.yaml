document: rfc-2266
kind: protocol-element
summary: vgRptrInfoReset (read-write) causes the repeater to transition to its initial state per IEEE 802.12 clause 12. The agent may delay the reset to allow the SNMP response to be transmitted first; the response MUST be transmitted. The reset does not clear management counters or vgRptrPortAdminStatus values.
section: "3"
topics:
    - snmp
