document: rfc-9242
kind: protocol-element
summary: IKE_INTERMEDIATE is a new IKEv2 exchange type (value 43) that may occur one or more times after IKE_SA_INIT and before IKE_AUTH, enabling transfer of large data (e.g., post-quantum key material) without IP fragmentation by leveraging IKE fragmentation.
section: "3.2"
topics:
    - ipsec
    - crypto
    - security
