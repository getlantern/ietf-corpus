document: rfc-8155
kind: protocol-element
summary: If a client's IP address changes (e.g., due to host mobility), the TURN discovery procedure must be re-run. New requests should use newly discovered TURN servers; however, if a previously learned TURN server is still accessible, RFC 8016 mobility procedures may be used for ongoing streams.
section: "7.1"
topics:
    - nat
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
