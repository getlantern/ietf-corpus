document: rfc-4090
kind: interoperability-note
summary: LSRs that do not recognize the FAST_REROUTE object (Class-Num 205, high-order bits 11) will ignore and pass it forward unchanged, providing backward compatibility. This means facility backup can be deployed incrementally without requiring all nodes to be upgraded simultaneously.
section: "4.1"
topics:
