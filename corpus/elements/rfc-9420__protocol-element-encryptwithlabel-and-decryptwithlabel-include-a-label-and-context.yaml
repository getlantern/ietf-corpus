document: rfc-9420
kind: protocol-element
summary: EncryptWithLabel and DecryptWithLabel include a label and context in all HPKE encryption operations via an EncryptContext structure, preventing ciphertexts intended for one purpose from being used in another context. An IANA registry tracks label values.
section: 5.1.3
topics:
    - crypto
    - security
    - registry
