document: rfc-1755
kind: state-machine
summary: 'Call setup: calling endpoint sends SETUP → network responds with CALL PROCEEDING or CONNECT (allocating VPCI/VCI) → destination sends CONNECT to accept or RELEASE COMPLETE to reject. Call release: either endpoint sends RELEASE → network responds RELEASE COMPLETE, frees resources, and sends RELEASE toward the other endpoint which replies RELEASE COMPLETE.'
