document: rfc-8972
kind: design-rationale
summary: The Follow-Up Telemetry TLV exists because a Session-Reflector may only be able to provide an 'SW Local' timestamp in the base packet, but the hosting system may provide a more accurate hardware-assisted timestamp after the fact. This follow-up mechanism improves delay measurement accuracy by minimizing the impact of egress queuing delays.
section: "4.7"
topics:
    - measurement
