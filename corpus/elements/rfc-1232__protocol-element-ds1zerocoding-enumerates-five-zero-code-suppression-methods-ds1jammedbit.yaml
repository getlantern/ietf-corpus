summary: 'ds1ZeroCoding enumerates five zero-code suppression methods: ds1JammedBit (forces pulse in bit 8, yielding 1.344 Mbps data), ds1B8ZS, ds1InvertedHDLC, ds1HDB3, and ds1ZBTSI. The choice affects available data bandwidth and error susceptibility.'
