document: rfc-2750
kind: protocol-element
summary: Policy errors are signaled via Error Code 02 (Policy Control failure) in the ERROR_SPEC object. Defined error values range from ERR_INFO (0) through ERR_FL_SPEC (19), covering rejection, quota violation, preemption, PDP unavailability, integrity failure, and syntax errors; values 32768–65535 are site/vendor-specific.
