document: rfc-6753
kind: interoperability-note
summary: Use of HELD as a dereference protocol is largely identical to its use as a location configuration protocol (RFC 5985), except that only 'locationRequest' is permitted, 'locationUriSet' MUST NOT appear in responses, and RFC 6155 device-identity parameters are always invalid and may be rejected.
section: "3.1"
topics:
    - http
