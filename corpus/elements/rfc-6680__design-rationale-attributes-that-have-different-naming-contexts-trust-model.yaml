document: rfc-6680
kind: design-rationale
summary: Attributes that have different naming contexts (trust model, encoding, credential issuer role) MUST have different attribute names so applications can distinguish them. This means there is no single attribute name for a concept like 'email address'; multiple attribute names exist for the same basic information depending on context.
section: "5"
topics:
    - security
