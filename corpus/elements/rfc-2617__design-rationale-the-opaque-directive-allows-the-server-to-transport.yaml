document: rfc-2617
kind: design-rationale
summary: The opaque directive allows the server to transport authentication session state information that the client must return unchanged. This enables cross-server authentication scenarios where the first server embeds state in the opaque value, which is carried through subsequent requests to a second server.
section: "3.3"
topics:
    - http
    - security
