document: rfc-9347
kind: normative-requirement
summary: When an ECN Congestion Experienced (CE) value is received and counted as a loss event, the receiver MUST set the E bit in the AGGFRAG_PAYLOAD congestion header containing the LossEventRate derived from that CE event.
section: "3.1"
rfc2119_level: MUST
topics:
