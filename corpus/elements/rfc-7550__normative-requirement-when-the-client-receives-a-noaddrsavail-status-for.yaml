document: rfc-7550
kind: normative-requirement
summary: When the client receives a NoAddrsAvail status for an IA in a Reply, it may operate with addresses from other IAs and MAY include the NoAddrsAvail IAs (with no addresses) in subsequent Renew/Rebind messages to retry obtaining those addresses.
section: 4.4.5
rfc2119_level: MAY
topics:
    - ip
    - v6ops
