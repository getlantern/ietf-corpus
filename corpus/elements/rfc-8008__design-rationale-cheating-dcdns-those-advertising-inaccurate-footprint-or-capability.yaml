document: rfc-8008
kind: design-rationale
summary: Cheating dCDNs (those advertising inaccurate footprint or capability information to gain delegation preference) are assumed to be handled by contractual agreements and out-of-band audits rather than real-time verifiability within the FCI protocol itself.
