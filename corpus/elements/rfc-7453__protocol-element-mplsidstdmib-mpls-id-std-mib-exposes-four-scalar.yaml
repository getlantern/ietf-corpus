document: rfc-7453
kind: protocol-element
summary: mplsIdStdMIB (MPLS-ID-STD-MIB) exposes four scalar read-write objects — mplsIdGlobalId, mplsIdNodeId, mplsIdCc, and mplsIdIcc — that allow an operator to assign the node-level MPLS-TP identifiers (Global_ID, Node_ID, CC, ICC) used when creating entries in mplsTunnelExtNodeConfigTable.
