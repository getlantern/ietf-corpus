document: rfc-7652
kind: normative-requirement
summary: After receiving a PA-Initiation message, the PCP server MUST assign a unique Session ID and insert it into the PA-Server message. All subsequent PCP messages within the session MUST carry this Session ID.
section: 3.1.1
rfc2119_level: MUST
topics:
    - pcp
    - security
