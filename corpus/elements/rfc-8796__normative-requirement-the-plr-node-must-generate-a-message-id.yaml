document: rfc-8796
kind: normative-requirement
summary: The PLR node MUST generate a MESSAGE_ID object with Epoch and Message_Identifier set according to RFC 2961. The MESSAGE_ID object Flags MUST be cleared when transmitted by the PLR node and ignored when received at the MP node.
section: 3.1.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
