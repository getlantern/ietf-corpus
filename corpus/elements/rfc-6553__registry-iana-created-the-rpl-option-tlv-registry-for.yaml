document: rfc-6553
kind: registry
summary: IANA created the RPL-option-TLV registry for sub-TLVs carried within the RPL Option header. The 8-bit type field ranges 0–255; new codes may be allocated only by IETF Review (RFC 5226). No sub-TLVs are defined in this document.
