document: rfc-6534
kind: design-rationale
summary: Bi-packet probing estimates average loss episode duration without directly measuring complete episodes; the information is encoded in the relative frequencies of the four Loss Pair outcomes. This is more efficient than the direct episode-reporting approach of RFC 3611 and does not require observing every lost packet in an episode.
section: "1.2"
topics:
    - measurement
