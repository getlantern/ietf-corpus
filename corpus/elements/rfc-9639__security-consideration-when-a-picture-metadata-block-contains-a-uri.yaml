document: rfc-9639
kind: security-consideration
summary: When a picture metadata block contains a URI, applications MUST obtain explicit user approval before retrieving images via remote protocols or local images not in the same directory as the FLAC file. Applications MAY reject URI processing for security or privacy reasons.
section: "8.8"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
