document: rfc-8861
kind: normative-requirement
summary: SSRCs with different views of the network MUST NOT be put into the same Reporting Group. An endpoint MAY put co-located SSRCs that see identical network conditions into a Reporting Group.
section: "3.1"
rfc2119_level: MUST NOT
topics:
