document: rfc-2640
kind: normative-requirement
summary: There MUST be only one SP between an FTP command and the pathname; subsequent SP characters MUST be treated as part of the pathname. Implementations that allow multiple SP separators or pad 3-character commands with a trailing SP are non-compliant.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
