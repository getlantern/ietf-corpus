document: rfc-3987
kind: security-consideration
summary: The UCS contains many visually similar characters (e.g., Latin 'A', Greek Alpha, Cyrillic 'A') that can be used to construct IRIs that look identical to legitimate IRIs but resolve to different resources (homograph/spoofing attacks). IRIs should use characters from a single script within each component.
section: "8"
topics:
    - security
    - ip
