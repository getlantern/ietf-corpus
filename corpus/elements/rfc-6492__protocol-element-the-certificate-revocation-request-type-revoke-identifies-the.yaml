document: rfc-6492
kind: protocol-element
summary: The Certificate Revocation Request (type='revoke') identifies the key pair to retire using class_name and ski (the Base64url-encoded 160-bit SHA-1 hash of the client's public key per RFC 5280 Section 4.2.1.2). The server revokes all matching certificates and withdraws them from the publication repository.
