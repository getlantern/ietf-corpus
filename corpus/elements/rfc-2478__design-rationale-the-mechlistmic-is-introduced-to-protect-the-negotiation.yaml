document: rfc-2478
kind: design-rationale
summary: The mechListMIC is introduced to protect the negotiation against active attackers who might modify the mechanism list in transit. When the selected mechanism supports integrity, the MIC over the original mechTypes list allows both peers to verify that no downgrade or substitution occurred.
section: 3.2.2
topics:
    - crypto
    - security
