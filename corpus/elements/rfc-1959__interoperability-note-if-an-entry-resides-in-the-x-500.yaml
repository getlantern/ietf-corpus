document: rfc-1959
kind: interoperability-note
summary: If an entry resides in the X.500 namespace, it should be reachable from any LDAP server providing front-end access to X.500. If the `<hostport>` part of the URL is missing, the URL can be resolved by contacting any X.500-back-ended LDAP server.
section: "2"
topics:
    - ldap
