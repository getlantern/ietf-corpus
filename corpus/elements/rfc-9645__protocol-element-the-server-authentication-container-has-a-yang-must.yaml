document: rfc-9645
kind: protocol-element
summary: The server-authentication container has a YANG must constraint requiring at least one of ca-certs, ee-certs, raw-public-keys, tls12-psks, or tls13-epsks. PSK-based server authentication requires no extra configuration as the key is shared with client-identity.
section: "3.3"
