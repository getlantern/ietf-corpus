document: rfc-7075
kind: normative-requirement
summary: When a Realm-based Redirect Server receives an applicable request, it MUST reply with an answer with the 'E' bit set (maintaining the Hop-by-Hop Identifier), MUST include Result-Code AVP set to DIAMETER_REALM_REDIRECT_INDICATION, and MUST include each alternate realm in a separate Redirect-Realm AVP instance.
section: 3.2.1
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
