summary: 'The IPSECKEY RDATA consists of four fields in order: an 8-bit precedence, an 8-bit gateway type, an 8-bit algorithm type, a variable-length gateway field (0, 4, 16, or domain-name bytes depending on gateway type), followed by a variable-length public key field.'
