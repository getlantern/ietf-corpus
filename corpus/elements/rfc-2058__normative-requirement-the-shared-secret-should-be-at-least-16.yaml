document: rfc-2058
kind: normative-requirement
summary: The shared secret SHOULD be at least 16 octets long and as unguessable as a well-chosen password, to protect against exhaustive search attacks. A RADIUS server SHOULD use the source IP address of the UDP packet to select which shared secret to apply, enabling proxy support.
section: "3"
rfc2119_level: SHOULD
topics:
    - radius
    - security
    - crypto
