document: rfc-3023
kind: security-consideration
summary: '''Entity spoofing'' allows attackers to insert malicious text into documents by prepending a declaration that overrides an entity''s value; because XML 1.0 permits multiple entity declarations and the first takes precedence, entity references can be redirected to attacker-controlled content.'
