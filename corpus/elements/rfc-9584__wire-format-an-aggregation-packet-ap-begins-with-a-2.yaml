document: rfc-9584
kind: wire-format
summary: An Aggregation Packet (AP) begins with a 2-byte PayloadHdr with Type=56, followed by two or more aggregation units. The first aggregation unit optionally carries a 16-bit DONL field (conditional on sprop-max-don-diff), followed by a 16-bit unsigned NALU size in network byte order, then the full NAL unit including its header. Subsequent aggregation units omit DONL and begin with the 16-bit NALU size.
section: 4.3.2
topics:
    - rtp
    - realtime
