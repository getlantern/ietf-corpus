document: rfc-4904
kind: normative-requirement
summary: If the receiver of a SIP request is not authoritatively responsible for the value in 'trunk-context', it MUST treat the 'tgrp' parameter as if it were not there, and MUST disregard both trunk group parameters if it processes the request.
section: "6.2"
rfc2119_level: MUST
