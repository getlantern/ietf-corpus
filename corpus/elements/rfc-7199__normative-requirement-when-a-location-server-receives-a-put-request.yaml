document: rfc-7199
kind: normative-requirement
summary: When a Location Server receives a PUT request, it MUST validate the policy document included in the body; if valid and authorized, it MUST replace the current policy with the policy provided in the request.
section: "3.1"
rfc2119_level: MUST
topics:
