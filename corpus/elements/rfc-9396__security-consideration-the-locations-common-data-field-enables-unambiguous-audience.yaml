document: rfc-9396
kind: security-consideration
summary: The `locations` common data field enables unambiguous audience restriction by binding authorization to specific RSs, preventing a token scoped for one RS (e.g., email) from being misused at another RS (e.g., cloud storage) when both share a common scope value.
