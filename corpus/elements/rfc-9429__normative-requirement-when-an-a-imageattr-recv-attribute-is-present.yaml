document: rfc-9429
kind: normative-requirement
summary: When an 'a=imageattr recv' attribute is present in the remote description, the RtpSender MUST follow the specified video-size rules for each encoding. If none of the supplied imageattr attributes can be processed successfully, the encoding MUST NOT be transmitted and an error SHOULD be raised.
section: 3.6.2
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
