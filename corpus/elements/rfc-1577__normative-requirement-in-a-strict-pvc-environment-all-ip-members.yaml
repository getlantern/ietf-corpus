document: rfc-1577
kind: normative-requirement
summary: In a strict PVC environment, all IP members supporting PVCs are required to use InATMARP on those VCs using LLC/SNAP encapsulation. When the ATM source and/or target address is unknown, the corresponding ATM address length field MUST be set to zero.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
