document: rfc-7613
kind: interoperability-note
summary: This document does not modify handling of internationalized strings in existing application protocols that use SASLprep; such protocols must be explicitly updated to use PRECIS (e.g., via a separate document). Non-coordinated updates to protocol implementations are discouraged due to interoperability and security impact.
