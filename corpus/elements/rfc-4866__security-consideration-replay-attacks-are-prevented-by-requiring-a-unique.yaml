document: rfc-4866
kind: security-consideration
summary: Replay attacks are prevented by requiring a unique sequence number per permanent home keygen token. When a rollover is imminent, the token must be renewed. Additionally, the semi-permanent token should be renewed periodically to limit exposure to cryptanalysis.
section: "6.5"
topics:
    - security
    - mobility
    - crypto
