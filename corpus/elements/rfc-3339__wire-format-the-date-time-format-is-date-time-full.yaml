document: rfc-3339
kind: wire-format
summary: 'The date-time format is: date-time = full-date "T" full-time, where full-date = date-fullyear "-" date-month "-" date-mday (4-2-2 DIGIT), and full-time = partial-time time-offset. The time-offset is "Z" or a numeric (+/-)HH:MM value.'
section: "5.6"
