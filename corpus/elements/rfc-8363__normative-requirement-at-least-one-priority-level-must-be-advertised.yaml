document: rfc-8363
kind: normative-requirement
summary: At least one priority level MUST be advertised in the Frequency Availability Bitmap sub-TLV. If only one priority level is advertised, it MUST be at priority level 0 (the highest priority).
section: 4.1.1
rfc2119_level: MUST
topics:
    - routing
