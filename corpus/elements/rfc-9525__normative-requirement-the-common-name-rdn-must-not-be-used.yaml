document: rfc-9525
kind: normative-requirement
summary: The Common Name RDN MUST NOT be used to identify a service because it is not strongly typed (essentially free-form text) and suffers from ambiguities in interpretation. Other RDNs within the subjectName MUST NOT be used to identify a service either.
section: "2"
rfc2119_level: MUST NOT
