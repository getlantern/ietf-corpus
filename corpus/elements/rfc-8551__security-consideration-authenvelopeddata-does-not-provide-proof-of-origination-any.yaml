document: rfc-8551
kind: security-consideration
summary: 'AuthEnvelopedData does not provide proof of origination: any recipient for whom the message is encrypted can replace ciphertext without detection by other recipients. This is substantially harder than with enveloped-only messages but remains a fundamental limitation.'
section: "3.4"
topics:
