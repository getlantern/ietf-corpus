document: rfc-2446
kind: interoperability-note
summary: Clients that cannot handle the REQUEST method MAY degrade the event to view it as a PUBLISH. Similarly, clients that cannot handle VTODO REQUEST MAY degrade it to treat it as a PUBLISH. This graceful degradation allows read-only calendar clients to participate in the ecosystem.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
