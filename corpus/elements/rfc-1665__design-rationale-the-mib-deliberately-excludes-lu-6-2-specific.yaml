document: rfc-1665
kind: design-rationale
summary: The MIB deliberately excludes LU 6.2-specific objects and covers only the generic objects common to all LU types, citing that LU 6.2 specifics warrant a separate module. Similarly, link creation and activation/deactivation of LUs and sessions are out of scope, delegated to the SNA DLC MIB.
