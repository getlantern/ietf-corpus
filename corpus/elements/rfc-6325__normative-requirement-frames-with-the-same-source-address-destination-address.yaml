document: rfc-6325
kind: normative-requirement
summary: Frames with the same source address, destination address, VLAN, and priority received on the same port MUST be transmitted in the order received, unless the RBridge classifies them into more fine-grained flows, in which case the ordering requirement applies per flow.
section: 4.1.1
rfc2119_level: MUST
topics:
    - routing
    - qos
