document: rfc-9111
kind: normative-requirement
summary: The no-store response directive requires that a cache MUST NOT store any part of the immediate request or response and MUST NOT use the response to satisfy any other request, applying to both private and shared caches. It is not a sufficient mechanism for ensuring privacy.
section: 5.2.2.5
rfc2119_level: MUST NOT
topics:
    - http
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
