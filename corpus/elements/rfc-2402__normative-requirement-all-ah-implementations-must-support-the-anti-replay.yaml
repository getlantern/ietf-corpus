document: rfc-2402
kind: normative-requirement
summary: All AH implementations MUST support the anti-replay service, though its use may be enabled or disabled by the receiver on a per-SA basis. The anti-replay service SHOULD NOT be used in a multi-sender environment that employs a single SA, as there is no mechanism to manage transmitted Sequence Numbers among multiple senders.
section: 3.4.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
