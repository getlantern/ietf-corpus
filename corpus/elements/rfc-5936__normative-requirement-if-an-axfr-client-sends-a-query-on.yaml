document: rfc-5936
kind: normative-requirement
summary: If an AXFR client sends a query on a TCP connection and the connection is closed, the client MUST consider the AXFR session terminated. Retry behavior SHOULD NOT be an endless cycle or increasingly frequent retry rate.
section: "2.3"
rfc2119_level: MUST
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
