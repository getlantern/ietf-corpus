document: rfc-7148
kind: normative-requirement
summary: When the MAG requests the LMA to perform prefix assignment, it MUST include exactly one DMNP option with an ALL_ZERO value and V=0 to request IPv6 DMNP allocation, and exactly one DMNP option with ALL_ZERO and V=1 to request IPv4 DMNP allocation.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mobility
    - ip
