document: rfc-7578
kind: design-rationale
summary: The specification provides no mechanism to associate a multipart/form-data submission with the specific form that generated it; this separation is intentional, as many different forms might transmit the same data structure. Applications use ACTION URIs or hidden fields for correlation instead.
section: "5.4"
topics:
    - http
