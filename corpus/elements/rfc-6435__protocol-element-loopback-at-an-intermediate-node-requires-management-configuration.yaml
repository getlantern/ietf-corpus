document: rfc-6435
kind: protocol-element
summary: Loopback at an intermediate node requires management configuration to set the loopback at either the ingress or egress interface. The management plane must ensure both MEPs are locked before requesting loopback state, and the MEP must not send test data until loopback is properly configured.
section: "4.1"
topics:
    - mpls
