document: rfc-2849
kind: normative-requirement
summary: Any DN or RDN containing characters outside SAFE-UTF8-CHAR, or beginning with a character outside SAFE-INIT-UTF8-CHAR, MUST be base-64 encoded. Any attribute value containing characters outside SAFE-CHAR or beginning with a character outside SAFE-INIT-CHAR MUST be base-64 encoded.
section: Notes on LDIF Syntax
rfc2119_level: MUST
topics:
    - ldap
