document: rfc-7176
kind: wire-format
summary: The Appointed Forwarders sub-TLV (MT-Port-Cap-TLV sub-TLV type 3) carries N appointment records of 6 bytes each, where each record encodes a 2-byte Appointee Nickname and an inclusive VLAN range (Start.VLAN and End.VLAN, each 2 bytes with 4-bit RESV). Sent by the DRB to designate per-VLAN forwarders.
section: 2.2.3
topics:
    - routing
