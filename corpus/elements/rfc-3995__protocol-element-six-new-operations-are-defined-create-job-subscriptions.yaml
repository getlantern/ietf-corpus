document: rfc-3995
kind: protocol-element
summary: 'Six new operations are defined: Create-Job-Subscriptions (operation-id 0x0016), Create-Printer-Subscriptions (0x0017), Get-Subscription-Attributes (0x0018), Get-Subscriptions (0x0019), Renew-Subscription (0x001A), and Cancel-Subscription (0x001B). Job Creation operations (Print-Job, Print-URI, Create-Job) are extended to accept Subscription Template Attributes Groups.'
section: "11"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
