document: rfc-4034
kind: protocol-element
summary: The DS RR (type 43) links the DNSSEC authentication chain across zone boundaries. It stores the Key Tag, Algorithm number, and a cryptographic digest of the referenced DNSKEY RR. The DS RR appears only on the parental side of a delegation, in the parent zone.
