document: rfc-4133
kind: normative-requirement
summary: If write access is implemented for entPhysicalSerialNum or entPhysicalAlias, the agent MUST retain the supplied value for as long as that physical entity remains instantiated, including across all re-initializations and reboots, even if the entity's entPhysicalIndex value changes.
