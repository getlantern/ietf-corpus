document: rfc-7759
kind: registry
summary: 'IANA created a new ''MPLS OAM Function Flags'' registry with bit positions 0-31 assigned via Standards Action. Defined bits: 0=C (Continuity Check), 1=V (Connectivity Verification), 2=F (Fault Management Signal), 3=L (PM/Loss), 4=D (PM/Delay), 5=T (Throughput Measurement), 6-30 unassigned (MBZ), 31 reserved.'
