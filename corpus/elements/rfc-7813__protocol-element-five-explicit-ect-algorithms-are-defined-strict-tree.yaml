summary: 'Five explicit ECT Algorithms are defined: Strict Tree (ST, 00-80-C2-17), Loose Tree (LT, 00-80-C2-21..30), Loose Tree Set (LTS, 00-80-C2-31..40), MRT (00-80-C2-18), and MRT GADAG (MRTG, 00-80-C2-19). Each uses the IEEE 802.1 OUI concatenated with an index.'
