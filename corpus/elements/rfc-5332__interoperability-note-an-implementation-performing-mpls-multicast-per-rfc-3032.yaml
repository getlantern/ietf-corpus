document: rfc-5332
kind: interoperability-note
summary: An implementation performing MPLS multicast per RFC 3032 or RFC 4023 (using the old codepoint semantics) will be unable to interoperate with implementations following this document. However, the absence of a matching control plane on legacy platforms makes practical interoperability conflicts unlikely.
section: "1"
topics:
    - mpls
    - multicast
