document: rfc-7513
kind: protocol-element
summary: The SAVI-DHCP perimeter separates trusted (inside) from untrusted (outside) regions. DHCP-Trust is only set inside the perimeter; DHCP Server-to-Client messages arriving from outside are dropped. DHCP servers and relays must reside inside the perimeter to be reachable by the snooping process.
section: "4.3"
topics:
    - security
    - ip
