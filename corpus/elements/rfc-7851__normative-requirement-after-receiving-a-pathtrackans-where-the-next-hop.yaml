document: rfc-7851
kind: normative-requirement
summary: After receiving a PathTrackAns where the next_hop node ID equals the responding node ID, the initiator MUST stop the iterative PathTrack process, as this indicates the responding peer is the responsible peer for the destination ID.
section: 4.3.1.2
rfc2119_level: MUST
topics:
