document: rfc-9917
kind: registry
summary: IANA has created the 'IGP Flex-Algorithm Path Computation Rules' registry within the 'Interior Gateway Protocol (IGP) Parameters' group, using Expert Review registration procedures. The registry specifies the ordered set of link-pruning rules applied during Flex-Algorithm SPF computation, seeded with 10 rules covering exclude AG, exclude SRLG, include-any AG, include-all AG, metric availability, exclude min-bandwidth, exclude max-delay, exclude reverse AG, include-any reverse AG, and include-all reverse AG.
section: "12.3"
