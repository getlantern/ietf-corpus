document: rfc-4855
kind: design-rationale
summary: This document updates RFC 3555 to conform to revised media type registration procedures in RFC 4288. Whereas RFC 3555 required encoding considerations to specify transfer via RTP, that is now specified under 'restrictions on usage', reflecting the updated RFC 4288 template structure.
