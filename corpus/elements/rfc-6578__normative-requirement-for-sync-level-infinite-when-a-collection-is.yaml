document: rfc-6578
kind: normative-requirement
summary: For sync-level 'infinite', when a collection is removed the server MUST NOT report the removal of any members of the removed collection; clients MUST assume all members of a removed collection are also removed.
section: 3.5.2
rfc2119_level: MUST
