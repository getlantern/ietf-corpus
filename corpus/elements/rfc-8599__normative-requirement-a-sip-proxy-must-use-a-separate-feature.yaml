document: rfc-8599
kind: normative-requirement
summary: A SIP proxy MUST use a separate Feature-Caps header field for each supported type of PNS. Feature-capability indicators for additional features (e.g., 'sip.vapid') MUST only be inserted in a Feature-Caps header field that also contains a 'sip.pns' indicator.
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
