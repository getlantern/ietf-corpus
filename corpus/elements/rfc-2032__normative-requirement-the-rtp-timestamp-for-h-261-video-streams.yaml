document: rfc-2032
kind: normative-requirement
summary: The RTP timestamp for H.261 video streams is based on a 90 kHz clock, which is a multiple of the natural H.261 frame rate (~29.97 Hz). All packets carrying the same video image use the same timestamp; packets from different images must have different timestamps.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
