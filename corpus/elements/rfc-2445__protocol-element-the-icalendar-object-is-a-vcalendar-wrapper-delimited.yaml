document: rfc-2445
kind: protocol-element
summary: The iCalendar object is a VCALENDAR wrapper delimited by BEGIN:VCALENDAR and END:VCALENDAR. It contains required calendar properties (PRODID, VERSION) and zero or more calendar components (VEVENT, VTODO, VJOURNAL, VFREEBUSY, VTIMEZONE). The CALSCALE and METHOD properties are optional.
section: "4.4"
