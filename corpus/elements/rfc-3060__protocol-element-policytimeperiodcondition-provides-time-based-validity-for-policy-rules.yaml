summary: 'PolicyTimePeriodCondition provides time-based validity for policy rules through up to five properties: TimePeriod, MonthOfYearMask, DayOfMonthMask, DayOfWeekMask, TimeOfDayMask, and LocalOrUtcTime (which specifies whether all time values in the instance are local or UTC).'
