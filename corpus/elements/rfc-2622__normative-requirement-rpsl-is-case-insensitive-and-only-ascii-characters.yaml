document: rfc-2622
kind: normative-requirement
summary: RPSL is case insensitive and only ASCII characters may be used. Object names must start with a letter and end with a letter or digit; the reserved words (any, as-any, rs-any, peeras, and, or, not, atomic, from, to, at, action, accept, announce, except, refine, networks, into, inbound, outbound) cannot be used as names.
section: "2"
rfc2119_level: MUST
topics:
    - routing
