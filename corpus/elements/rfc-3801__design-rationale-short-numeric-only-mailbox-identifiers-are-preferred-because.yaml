document: rfc-3801
kind: design-rationale
summary: Short numeric-only mailbox identifiers are preferred because voice messaging systems historically limit address entry to 16 or fewer numeric characters entered via telephone keypad. Alphanumeric local parts may be mapped to confusing local numbers or silently dropped by legacy systems, making the message unreplyable.
section: 4.1.1
topics:
    - email
