document: rfc-9538
kind: security-consideration
summary: It is critical to protect the dCDN's ACME user account associated with the delegation, as this account authorizes all security-relevant operations between a dCDN and a uCDN over the ACME channel. Compromise of this account undermines the entire delegation scheme.
section: "5"
topics:
    - security
    - acme
    - pkix
