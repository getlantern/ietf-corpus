document: rfc-8798
kind: registry
summary: 'RFC 8798 creates a new ''Secondary Units'' subregistry under ''Sensor Measurement Lists (SenML)'' at IANA, with six columns: Secondary Unit, Description, SenML Unit, Scale, Offset, and Reference. Initial content contains 33 entries including ms, min, h, MHz, kW, kVA, kvar, Ah, Wh, kWh, mV, mA, dBm, ppm, hPa, km/h, and others. New entries are added by Expert Review per RFC 8126.'
