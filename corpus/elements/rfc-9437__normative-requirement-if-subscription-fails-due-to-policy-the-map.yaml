document: rfc-9437
kind: normative-requirement
summary: If subscription fails due to policy the Map-Server MUST respond with a Negative Map-Reply with ACT bits set to 4 (Drop/Policy-Denied); if it fails due to authentication, ACT bits MUST be set to 5 (Drop/Auth-Failure).
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - security
