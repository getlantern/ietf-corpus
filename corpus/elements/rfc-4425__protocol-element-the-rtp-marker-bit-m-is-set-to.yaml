document: rfc-4425
kind: protocol-element
summary: The RTP Marker bit (M) is set to 1 if the RTP packet contains an Access Unit with a complete VC-1 frame or the last fragment of a VC-1 frame. The RTP timestamp uses a clock rate of 90 kHz and is set to the presentation time of the first AU's video frame.
section: "5.1"
topics:
    - rtp
    - realtime
