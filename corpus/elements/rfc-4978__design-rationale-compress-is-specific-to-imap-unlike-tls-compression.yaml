document: rfc-4978
kind: design-rationale
summary: COMPRESS is specific to IMAP (unlike TLS compression which benefits all protocols on a TLS layer), but benefits from intimate knowledge of the IMAP protocol's state machine, allowing dynamic and aggressive optimization of the underlying compression algorithm's parameters.
