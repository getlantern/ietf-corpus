document: rfc-3146
kind: normative-requirement
summary: When a node wishes to receive multicast data addressed to groups other than all-nodes, all-routers, and solicited-node addresses, it MUST confirm that a channel mapping exists via MCAP as described in [IP1394] section 9.3.
