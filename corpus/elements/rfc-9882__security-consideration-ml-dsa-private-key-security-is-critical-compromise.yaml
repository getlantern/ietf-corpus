document: rfc-9882
kind: security-consideration
summary: ML-DSA private key security is critical; compromise enables forgery of arbitrary signatures. ML-DSA requires high-quality cryptographic random numbers, and inadequate PRNGs can significantly undermine security by reducing the effective key space an attacker needs to search.
