document: rfc-4188
kind: protocol-element
summary: 'The Timeout textual convention represents STP timers in units of 1/100 seconds (hundredths of a second) in the MIB, while STP BPDUs encode these timers in units of 1/256 seconds. A specific conversion algorithm is defined: to convert to 1/256 units use floor((n*256)/100); to convert back use ceiling((b*100)/256).'
