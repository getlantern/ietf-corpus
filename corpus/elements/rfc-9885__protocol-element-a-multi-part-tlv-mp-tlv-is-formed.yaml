document: rfc-9885
kind: protocol-element
summary: A Multi-Part TLV (MP-TLV) is formed when a router advertises multiple TLV tuples with the same TLV type and the same key (when applicable) in an IS-IS IIH packet or in the set of LSPs for a given level. The encoding of TLVs is not altered by the introduction of MP-TLV support.
section: "4"
