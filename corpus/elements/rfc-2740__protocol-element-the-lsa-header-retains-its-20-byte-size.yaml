document: rfc-2740
kind: protocol-element
summary: The LSA header retains its 20-byte size but the Options field has been removed (moved into specific LSA bodies) and the LS type field expanded to 16 bits occupying the former Options space. LS Age, Advertising Router, LS Sequence Number, LS Checksum, and Length fields remain unchanged from OSPFv2.
