document: rfc-4836
kind: design-rationale
summary: Moving MAU type OBJECT-IDENTITY definitions from MAU-MIB to IANA-MAU-MIB is not strictly compliant with SMIv2 rules governing MIB module revisions (RFC 2578, Section 10), but the deviation is explicitly justified because continued high maintenance costs would result from not making the change. The working group found no existing MIB modules or management applications that would actually be negatively affected.
section: "3.1"
topics:
