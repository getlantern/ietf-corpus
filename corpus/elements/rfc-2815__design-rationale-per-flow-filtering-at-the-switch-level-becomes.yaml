document: rfc-2815
kind: design-rationale
summary: Per-flow filtering at the switch level becomes prohibitively expensive with increasing switch speed, making devices with such capability nearly as complex as IP routers. The document adopts an 'aggregated flow' approach using IEEE 802.1D user_priority traffic classes instead.
