document: rfc-2751
kind: security-consideration
summary: The integrity of PREEMPTION_PRI elements is guaranteed by encapsulation into a Policy Data object [RSVP-EXT]. Further security mechanisms are not warranted given that preemption priority is intended for use within a trusted zone or single zone without crossing zone boundaries.
