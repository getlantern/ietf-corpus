document: rfc-9159
kind: normative-requirement
summary: When transmitting to a neighbor, the sender MUST fully elide the source IID if the source IPv6 address is the link-local address based on the sender's Bluetooth device address (SAC=0, SAM=11), and MUST fully elide the destination address if it is the link-local address based on the neighbor's device address (DAC=0, DAM=11).
section: 3.3.3
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
