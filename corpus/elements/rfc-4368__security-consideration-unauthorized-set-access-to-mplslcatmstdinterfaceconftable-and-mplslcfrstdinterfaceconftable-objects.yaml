document: rfc-4368
kind: security-consideration
summary: Unauthorized SET access to MplsLcAtmStdInterfaceConfTable and mplsLcFrStdInterfaceConfTable objects could disrupt established traffic on LC-ATM or LC-FR interfaces. SNMPv3 VACM and USM MUST be used with any v3 agent implementing these MIB modules.
