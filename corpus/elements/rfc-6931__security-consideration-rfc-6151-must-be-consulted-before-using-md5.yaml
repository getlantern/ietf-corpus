document: rfc-6931
kind: security-consideration
summary: RFC 6151 MUST be consulted before using MD5 as a DigestMethod or RSA-MD5 as a SignatureMethod. SHA-1 security considerations are in RFC 6194 and MD5 considerations in RFC 6151. For RSASSA-PSS, SHA-256 or stronger is recommended due to the discovered weakness of SHA-1.
section: "6"
topics:
    - crypto
    - security
