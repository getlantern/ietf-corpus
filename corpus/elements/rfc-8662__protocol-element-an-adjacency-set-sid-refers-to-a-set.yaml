document: rfc-8662
kind: protocol-element
summary: An adjacency-set SID refers to a set of adjacencies and signals that load-balancing is expected at the advertising node; an implementation MAY favor inserting an ELI/EL after the label representing an adjacency-set. Conversely, a regular single-link Adj-SID typically does not require load-balancing and an implementation MAY NOT place an ELI/EL after it.
section: 7.2.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
