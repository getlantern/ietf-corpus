document: rfc-7701
kind: normative-requirement
summary: If a participant has requested privacy, the conference focus MUST expose the participant's anonymous URI through the conference event package (RFC 4575). The anonymous URI MUST NOT reveal the participant's SIP AOR.
section: "5.2"
rfc2119_level: MUST
topics:
    - privacy
    - sip
