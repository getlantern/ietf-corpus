document: rfc-8509
kind: normative-requirement
summary: DNSSEC-validating resolvers that implement this mechanism MUST perform validation of responses in accordance with RFC 4035. This is a baseline requirement before any sentinel processing may occur.
section: "2"
rfc2119_level: MUST
