document: rfc-7702
kind: protocol-element
summary: After SIP session establishment, the gateway sets the XMPP user's room nickname using the MSRP NICKNAME method (defined in RFC 7701), sending the resourcepart of the occupant JID as the Use-Nickname header value. A 200 response indicates acceptance; a 425 response indicates a nickname conflict.
section: "5.2"
topics:
    - sip
    - realtime
