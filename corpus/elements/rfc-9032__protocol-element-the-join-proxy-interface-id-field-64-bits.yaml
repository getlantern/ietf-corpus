document: rfc-9032
kind: protocol-element
summary: The Join Proxy Interface ID field (64 bits, present if P=1) provides the IID of the link-local address of the Join Proxy, with the well-known prefix fe80::/64. If absent, the IID is derived from the Layer 2 address per SLAAC (RFC 4862).
