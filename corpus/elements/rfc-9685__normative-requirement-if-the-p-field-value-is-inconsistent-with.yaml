document: rfc-9685
kind: normative-requirement
summary: If the P-Field value is inconsistent with the Registered Address (e.g., P-Field=1 for a non-multicast address or P-Field!=1 for a multicast address), the NS(EARO) or EDAR message MUST be dropped.
section: "7.3"
rfc2119_level: MUST
