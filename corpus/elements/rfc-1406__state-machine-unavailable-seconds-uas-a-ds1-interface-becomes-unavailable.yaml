document: rfc-1406
kind: state-machine
summary: 'Unavailable Seconds (UAS): a DS1 interface becomes unavailable at the onset of 10 contiguous SES or a failure condition onset (with preceding contiguous SES also counting). It returns to available at the onset of 10 contiguous non-SES seconds (if failure-cleared within 10 seconds) or the later of 10 non-SES seconds and the failure clearing onset. Only UAS is incremented while unavailable.'
section: 3.3.3
topics:
