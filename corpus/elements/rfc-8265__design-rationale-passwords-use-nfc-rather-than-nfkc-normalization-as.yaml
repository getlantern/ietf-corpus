document: rfc-8265
kind: design-rationale
summary: Passwords use NFC rather than NFKC normalization (as SASLprep used) because the PRECIS FreeformClass does not disallow compatibility equivalents, and using NFC results in fewer false accepts during comparison, which is a security benefit.
