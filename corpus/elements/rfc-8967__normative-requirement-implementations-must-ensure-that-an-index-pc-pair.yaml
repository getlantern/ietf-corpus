document: rfc-8967
kind: normative-requirement
summary: Implementations MUST ensure that an (Index, PC) pair is discarded within a finite time since the last accepted packet. Unsuccessful challenges MUST NOT prevent an (Index, PC) pair from being discarded for unbounded periods.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
    - security
