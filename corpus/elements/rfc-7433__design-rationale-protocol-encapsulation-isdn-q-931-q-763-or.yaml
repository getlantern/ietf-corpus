document: rfc-7433
kind: design-rationale
summary: Protocol encapsulation (ISDN Q.931, Q.763, or NSS) was rejected because requiring SIP UAs to implement an entire additional protocol just to transport a small amount of UUI data is unreasonable. SIP needs its own native UUI transport mechanism.
section: A.2
topics:
    - sip
    - realtime
