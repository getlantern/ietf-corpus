document: rfc-2741
kind: protocol-element
summary: The transaction ID (h.transactionID) uniquely identifies a single SNMP management request within a session. All AgentX PDUs dispatched by the master agent for one SNMP request must carry the same transaction ID; distinct SNMP requests must use distinct transaction IDs. It is not the SNMP request-id or msgID.
section: "6.1"
topics:
    - snmp
