document: rfc-4119
kind: privacy-consideration
summary: The 'provided-by' element can increase the effective resolution of location information or reveal protected location details; for example, identifying Columbia University as provider effectively narrows a target's location to a four-block area even if only state-level coordinates are included. The element SHOULD NOT be used unless organizational functions strongly depend on it.
section: 2.2.4
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
