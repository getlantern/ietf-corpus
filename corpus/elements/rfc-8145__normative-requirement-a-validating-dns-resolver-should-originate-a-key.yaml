document: rfc-8145
kind: normative-requirement
summary: A validating DNS resolver SHOULD originate a Key Tag query whenever it also originates a DNSKEY query for a trust anchor zone; the trigger for a DNSKEY query is simultaneously the trigger for the Key Tag query.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
