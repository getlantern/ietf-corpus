document: rfc-4745
kind: normative-requirement
summary: The 'id' attribute of a single-user entity (<one> or <except>) MUST NOT contain a 'domain' attribute. The 'id' attribute value MUST be expressed as a URI; applications using this framework must describe how their identities map to URIs.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
