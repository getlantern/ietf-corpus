document: rfc-5025
kind: privacy-consideration
summary: Clients retrieving presence authorization documents SHOULD render information about rules they do not understand to users, so users can be certain what rules are in place. This prevents confusion when a user edits rules from clients supporting different subsets.
section: "10"
rfc2119_level: SHOULD
topics:
    - sip
    - privacy
