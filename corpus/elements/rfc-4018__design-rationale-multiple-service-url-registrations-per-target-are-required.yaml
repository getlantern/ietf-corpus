document: rfc-4018
kind: design-rationale
summary: Multiple service URL registrations per target are required when a target must allow access to multiple distinct initiator identities, because a single URL's auth-xxxx attribute lists cannot express AND-within-identity constraints across different identities without incorrectly allowing cross-identity combinations.
section: 4.1.2
topics:
    - security
