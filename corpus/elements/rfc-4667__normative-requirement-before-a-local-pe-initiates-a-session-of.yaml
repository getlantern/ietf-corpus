document: rfc-4667
kind: normative-requirement
summary: Before a local PE initiates a session of a particular pseudowire type to a remote PE, it MUST examine whether the remote PE has advertised this pseudowire type in the Pseudowire Capabilities List AVP and SHOULD NOT attempt to initiate the session if the intended pseudowire type is not supported.
section: "4.2"
rfc2119_level: MUST
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
