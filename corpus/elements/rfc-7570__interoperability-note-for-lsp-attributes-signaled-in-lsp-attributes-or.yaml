document: rfc-7570
kind: interoperability-note
summary: For LSP attributes signaled in LSP_ATTRIBUTES or LSP_REQUIRED_ATTRIBUTES objects, a node SHOULD use the RRO Attributes subobject (not the RRO Hop Attributes subobject) to report processing. For attributes signaled only in the ERO Hop Attributes subobject, a node SHOULD use the RRO Hop Attributes subobject and SHOULD NOT use the RRO Attributes subobject.
section: 3.2.3
topics:
    - mpls
    - routing
