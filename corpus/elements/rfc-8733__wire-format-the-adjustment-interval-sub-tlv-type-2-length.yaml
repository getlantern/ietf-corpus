document: rfc-8733
kind: wire-format
summary: The Adjustment-Interval Sub-TLV (Type=2, Length=4) carries a 4-octet integer in seconds (range 1–604800; default 86400). The Down-Adjustment-Interval Sub-TLV (Type=3, Length=4) overrides this value for downward bandwidth trends; both MUST NOT be less than the Sample-Interval.
section: 5.2.2
rfc2119_level: MUST NOT
