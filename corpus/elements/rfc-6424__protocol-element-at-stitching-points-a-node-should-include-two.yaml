document: rfc-6424
kind: protocol-element
summary: At stitching points, a node SHOULD include two FEC Stack Change sub-TLVs (one POP for the outgoing FEC and one PUSH for the incoming FEC) and SHOULD set the Return Code to 'Label switched with FEC change' (15) to signal FEC transition to the ingress.
section: 4.1.2
topics:
