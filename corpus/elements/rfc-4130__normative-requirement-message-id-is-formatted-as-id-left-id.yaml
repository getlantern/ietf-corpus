document: rfc-4130
kind: normative-requirement
summary: Message-Id is formatted as '<id-left@id-right>' per RFC 2822, with a maximum length of 998 characters; SHOULD be 255 characters or less for backward compatibility, and SHOULD be globally unique. When sending, always include angle brackets; when receiving, do not check for them.
section: 5.3.3
rfc2119_level: SHOULD
topics:
    - http
    - email
