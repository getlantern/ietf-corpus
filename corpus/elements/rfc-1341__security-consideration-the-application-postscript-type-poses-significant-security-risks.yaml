document: rfc-1341
kind: security-consideration
summary: The application/PostScript type poses significant security risks because PostScript is a full Turing-complete programming language capable of reading, writing, and deleting files. Implementations should provide appropriate sandboxing or user warnings before executing PostScript received from untrusted sources.
section: 7.4.2
topics:
    - email
    - security
