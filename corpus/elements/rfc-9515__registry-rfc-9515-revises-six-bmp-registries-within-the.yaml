document: rfc-9515
kind: registry
summary: 'RFC 9515 revises six BMP registries within the IANA BMP group: BMP Statistics Types, BMP Initiation and Peer Up Information TLVs, BMP Termination Message TLVs, BMP Termination Message Reason Codes, BMP Route Mirroring TLVs, and BMP Route Mirroring Information Codes. For each registry, the range 32768-65530 previously designated ''Specification Required'' is redesignated ''First Come First Served''.'
