document: rfc-2981
kind: design-rationale
summary: A trigger frequency of 0 is defined to indicate instantaneous (interrupt-driven) recognition; this is explicitly noted as not possible in many cases and likely only supportable for objects tightly integrated with low-level code. Systems supporting it SHOULD document which objects allow it.
