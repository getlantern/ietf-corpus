document: rfc-2596
kind: normative-requirement
summary: In a Modify operation, attribute types and language codes MUST match exactly against values stored in the directory. If stored values have a language code, the language code MUST be provided in the modify; if stored values have no language code, none is to be provided.
section: "3.7"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
