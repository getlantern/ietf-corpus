document: rfc-3014
kind: normative-requirement
summary: When putting locally-generated Notifications into a named log, the managed system MUST use the security credentials associated with that log and MUST apply the same access control rules as described for a Notification Originator in RFC 2573.
section: 2.1.2
rfc2119_level: MUST
topics:
    - snmp
    - security
