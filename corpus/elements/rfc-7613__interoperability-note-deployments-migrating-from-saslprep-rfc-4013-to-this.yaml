document: rfc-7613
kind: interoperability-note
summary: 'Deployments migrating from SASLprep (RFC 4013) to this specification for usernames may need to scrub existing data: NFKC-normalized usernames using characters with compatibility equivalents (e.g., ROMAN NUMERAL FOUR U+2163) may conflict with or differ from PRECIS-processed equivalents, potentially requiring operator resolution of conflicting accounts.'
section: "6.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
