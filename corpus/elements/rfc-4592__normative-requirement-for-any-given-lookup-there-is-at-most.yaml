document: rfc-4592
kind: normative-requirement
summary: For any given lookup there is at most one place at which wildcard synthetic records can be obtained. If the source of synthesis does not exist, the lookup terminates; there is no search for an alternate wildcard domain name higher in the tree.
section: 3.3.1
rfc2119_level: MUST
topics:
    - dns
