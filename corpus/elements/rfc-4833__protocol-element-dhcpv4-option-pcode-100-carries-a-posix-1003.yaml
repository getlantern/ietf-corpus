document: rfc-4833
kind: protocol-element
summary: DHCPv4 option PCode (100) carries a POSIX 1003.1 timezone string. The format is a one-octet option code (100), a one-octet length N, followed by N octets of the IEEE 1003.1 TZ string, not null-terminated.
