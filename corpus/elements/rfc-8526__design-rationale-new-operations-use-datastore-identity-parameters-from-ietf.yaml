document: rfc-8526
kind: design-rationale
summary: New operations use 'datastore' identity parameters (from 'ietf-datastores') rather than the choice-based strategy from original operations (e.g., <get-config>/<edit-config>), because identities allow future expansion to new datastores without protocol changes.
