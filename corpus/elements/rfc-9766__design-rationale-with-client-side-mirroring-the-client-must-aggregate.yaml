document: rfc-9766
kind: design-rationale
summary: With client-side mirroring the client must aggregate N mirrored data files and can only report WCC data at delegation return under the existing RFC 8435 mechanism; LAYOUT_WCC removes this restriction by allowing the client to report at any time and aggregate N mirror attributes into one MDS round trip.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
