document: rfc-9175
kind: normative-requirement
summary: If a request is required to be fresh and the server cannot verify freshness through the Echo option or another means, the server MUST NOT process the request further and SHOULD send a 4.01 (Unauthorized) response with an Echo option.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - security
