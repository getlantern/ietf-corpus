document: rfc-8417
kind: protocol-element
summary: The 'events' claim contains one or more name/value pairs where each name is a URI event identifier and each value is a JSON object (possibly empty '{}') holding event-specific data defined by the profiling specification. Multiple event identifiers in a single SET represent multiple aspects of the same state transition, not distinct events.
