document: rfc-1191
kind: design-rationale
summary: A plateau table of representative MTU values is recommended over binary search or multiplicative reduction for discovering PMTU from old-style messages. The plateau approach converges as fast as binary search in the worst case and far better in practice (FDDI to Ethernet in two RTTs vs. four or five), and never underestimates the true MTU by more than a factor of 2 since plateaus lie near powers of two.
