document: rfc-4238
kind: design-rationale
summary: Intradomain routing mechanisms are strictly informational and internal to the recipient's domain; only the addresses created by NAPTR rewrite rules need have meaning to the advertising domain. A convention for address creation may be useful but is not mandated.
section: "3.4"
topics:
