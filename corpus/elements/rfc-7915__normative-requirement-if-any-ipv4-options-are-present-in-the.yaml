document: rfc-7915
kind: normative-requirement
summary: If any IPv4 options are present in the IPv4 packet, they MUST be ignored and the packet translated normally. However, if an unexpired source route option is present, the packet MUST instead be discarded, and an ICMPv4 'Destination Unreachable, Source Route Failed' (Type 3, Code 5) error message SHOULD be returned to the sender.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
