document: rfc-2001
kind: state-machine
summary: 'TCP alternates between slow start and congestion avoidance based on cwnd vs ssthresh: if cwnd <= ssthresh, TCP is in slow start (exponential growth); otherwise it is in congestion avoidance (linear growth). Congestion events reset cwnd and halve ssthresh.'
