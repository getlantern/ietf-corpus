document: rfc-8175
kind: registry
summary: 'RFC 8175 establishes the following IANA registries: DLEP Signal Type Values, DLEP Message Type Values, DLEP Data Item Type Values (0–65535 with Private Use range 65408–65534), DLEP Status Code Values, DLEP Extension Type Values, DLEP IPv4/IPv6 Connection Point Flags, DLEP Peer Type Flags, DLEP IPv4/IPv6 Address Flags, DLEP IPv4/IPv6 Attached Subnet Flags. A well-known UDP port and IPv4/IPv6 link-local multicast addresses are also registered.'
