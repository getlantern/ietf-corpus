document: rfc-5282
kind: normative-requirement
summary: For AES GCM with the IKEv2 Encrypted Payload, the default nonce format MUST be used and a 12-octet nonce MUST be used. For AES CCM, the default nonce format MUST be used and an 11-octet nonce MUST be used.
section: "4"
rfc2119_level: MUST
topics:
