document: rfc-8973
kind: normative-requirement
summary: All DOTS clients MUST support at least one of the three discovery mechanisms (explicit/DHCP configuration, service resolution via S-NAPTR, DNS-SD) to determine a DOTS server list. All DOTS clients SHOULD implement all three, or as many as are practical for the specific device.
section: "4"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
