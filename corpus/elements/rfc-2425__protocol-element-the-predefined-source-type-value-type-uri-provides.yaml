document: rfc-2425
kind: protocol-element
summary: 'The predefined SOURCE type (value type: uri) provides a URI by which applications knowledgeable in a given directory service protocol can obtain additional or more up-to-date information. Multiple SOURCE types may be included. The CONTEXT parameter MUST be compatible with the URI prefix.'
section: "6.1"
rfc2119_level: MUST
