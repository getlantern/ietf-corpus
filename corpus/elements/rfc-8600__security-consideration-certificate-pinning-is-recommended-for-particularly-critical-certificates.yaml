document: rfc-8600
kind: security-consideration
summary: Certificate pinning is recommended for particularly critical certificates (such as the XMPP-Grid Controller's certificate) so that a compromised CA cannot silently substitute another certificate; pinned certificates should still be checked for revocation.
section: 8.3.6
