document: rfc-8976
kind: design-rationale
summary: The digest is embedded in the zone itself (rather than as a detached signature) so that the zone retains its standard DNS zone format, can be directly loaded into a name server, and carries the integrity proof with it through any distribution mechanism.
section: "1.2"
topics:
