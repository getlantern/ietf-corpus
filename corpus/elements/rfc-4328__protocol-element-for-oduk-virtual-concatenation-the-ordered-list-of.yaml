document: rfc-4328
kind: protocol-element
summary: For ODUk virtual concatenation, the ordered list of all component labels is given in the GENERALIZED_LABEL object; the number of label values is determined by the NVC value. For multiplexed virtual concatenation, NMC additionally determines the number of labels per set.
