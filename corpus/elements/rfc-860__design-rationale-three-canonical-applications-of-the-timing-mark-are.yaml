document: rfc-860
kind: design-rationale
summary: 'Three canonical applications of the timing mark are: (A) measuring round-trip delay; (B) server-side resynchronization after an illegal command by discarding type-ahead up to the point the user saw the error; (C) client-side output flushing to discard unwanted output from a server up to the point where the server saw the mark.'
section: "5"
