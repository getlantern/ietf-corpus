document: rfc-2025
kind: design-rationale
summary: CertificationPath separates userKeyId/userCertif from verifKeyId/userVerifCertif to allow different key pairs for encryption/decryption versus signing/verification. Presence of verification fields [2] or [3] implies encryption fields [0] or [1] must also be present.
section: 3.1.1
topics:
    - pkix
    - crypto
    - security
