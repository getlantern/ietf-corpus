document: rfc-8250
kind: security-consideration
summary: PDM fields (sequence numbers and delta times) could be misused as a covert channel by a compromised end host. A PDM-aware middlebox or destination host detecting nonsensical sequence numbers or timing values could take action to block, discard, or alert on such traffic.
section: "4.3"
topics:
    - ip
    - security
