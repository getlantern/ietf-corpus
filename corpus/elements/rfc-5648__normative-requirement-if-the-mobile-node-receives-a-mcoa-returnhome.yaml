document: rfc-5648
kind: normative-requirement
summary: If the mobile node receives a MCOA RETURNHOME WO/NDP status in the Binding Acknowledgement, it MUST NOT respond to Neighbor Solicitation for its home address and MUST NOT operate Neighbor Discovery for the home address, instead sending packets directly to the default router's link-layer address.
section: 5.6.3
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
