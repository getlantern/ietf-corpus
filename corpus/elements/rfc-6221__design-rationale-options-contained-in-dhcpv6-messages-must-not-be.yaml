document: rfc-6221
kind: design-rationale
summary: Options contained in DHCPv6 messages MUST NOT be validated by the LDRA. This design decision delegates option validity checking to the DHCP server, allowing new options to be introduced without requiring any changes to the LDRA.
section: 6.1.1
topics:
    - ip
