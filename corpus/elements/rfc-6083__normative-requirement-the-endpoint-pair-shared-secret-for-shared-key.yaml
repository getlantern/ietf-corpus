document: rfc-6083
kind: normative-requirement
summary: The endpoint-pair shared secret for Shared Key Identifier 0 MUST be empty and used when establishing a DTLS connection. Whenever the master key changes, a 64-byte shared secret MUST be derived using the TLS exporter (RFC 5705) with the label from Section 5 and no context.
section: "4.8"
rfc2119_level: MUST
topics:
    - tls
    - sctp
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
