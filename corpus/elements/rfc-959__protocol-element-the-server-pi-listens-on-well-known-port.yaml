document: rfc-959
kind: protocol-element
summary: The server-PI listens on well-known port L for control connections. The server's default data port is L-1 (adjacent to the control port). The user-process default data port is the same as its control connection port U. Implementations must support these defaults.
section: "3.2"
topics:
