document: rfc-4585
kind: normative-requirement
summary: ACK mode (positive acknowledgement feedback) MUST only be used in sessions with exactly two members; the group MUST NOT be allowed to grow. Unicast addresses SHOULD be used in the session description for ACK mode sessions.
section: 3.6.1
rfc2119_level: MUST
topics:
