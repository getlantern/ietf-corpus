document: rfc-8299
kind: protocol-element
summary: 'The model defines four site VPN flavors: `site-vpn-flavor-single` (one VPN), `site-vpn-flavor-multi` (multiple VPNs with all accesses in the same VPN set), `site-vpn-flavor-sub` (multiple VPNs with each access mapped to a different VPN subset), and `site-vpn-flavor-nni` (represents an Option A NNI). These flavors govern how VPN multiplexing is performed for a site.'
section: 6.5.1
