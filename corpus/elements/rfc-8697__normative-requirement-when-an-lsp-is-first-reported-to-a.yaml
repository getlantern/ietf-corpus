document: rfc-8697
kind: normative-requirement
summary: When an LSP is first reported to a PCE via PCRpt, the message MUST include all association groups the LSP belongs to. Subsequent PCRpt messages SHOULD include only associations that are being modified or removed.
section: 6.3.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
