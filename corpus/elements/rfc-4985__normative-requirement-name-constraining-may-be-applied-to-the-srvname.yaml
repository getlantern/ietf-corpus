document: rfc-4985
kind: normative-requirement
summary: Name constraining MAY be applied to the SRVName by adding name restrictions in the name constraints extension in the form of an SRVName. Restrictions can be expressed as a complete SRVName, just a service name, or just a DNS name.
section: "4"
rfc2119_level: MAY
