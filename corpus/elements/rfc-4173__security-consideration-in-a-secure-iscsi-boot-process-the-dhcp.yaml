document: rfc-4173
kind: security-consideration
summary: In a secure iSCSI boot process, the DHCP reply SHOULD include the serverName in IPv4/IPv6 format to avoid reliance on DNS or a Discovery Service entity, reducing the number of entities involved in the boot process.
section: "8"
rfc2119_level: SHOULD
topics:
