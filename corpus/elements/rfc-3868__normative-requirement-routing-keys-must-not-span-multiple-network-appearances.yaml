document: rfc-3868
kind: normative-requirement
summary: Routing keys MUST NOT span multiple network appearances. A received SS7 signalling message cannot be directed to more than one Routing Key; Routing Keys are mutually exclusive.
section: 1.2.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
