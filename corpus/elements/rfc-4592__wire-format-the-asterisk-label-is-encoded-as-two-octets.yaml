document: rfc-4592
kind: wire-format
summary: 'The asterisk label is encoded as two octets: 0x01 (length byte for a one-octet label) followed by 0x2a (ASCII ''*''). This is the sole label value that constitutes an asterisk label; no other encoding qualifies.'
