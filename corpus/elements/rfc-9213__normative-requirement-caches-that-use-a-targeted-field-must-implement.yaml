document: rfc-9213
kind: normative-requirement
summary: 'Caches that use a targeted field MUST implement the semantics of the following cache directives: max-age, must-revalidate, no-store, no-cache, and private. They SHOULD also implement other directives they support in Cache-Control.'
section: "2.2"
rfc2119_level: MUST
