document: rfc-9007
kind: normative-requirement
summary: The client MUST NOT issue an 'MDN/send' request if the message already has the '$mdnsent' keyword set. If the keyword is already set, the server returns an 'mdnAlreadySent' error.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - email
