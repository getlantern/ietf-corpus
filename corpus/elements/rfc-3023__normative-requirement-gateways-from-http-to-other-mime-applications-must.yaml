document: rfc-3023
kind: normative-requirement
summary: Gateways from HTTP to other MIME applications MUST transform XML MIME entities from text/xml; charset='utf-16' to application/xml; charset='utf-16', because CR/LF/NUL transformations in MIME applications would corrupt UTF-16 multi-octet characters.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
