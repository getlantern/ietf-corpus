document: rfc-4790
kind: protocol-element
summary: The ordering operation MUST be reflexive, and for valid input MUST be transitive and trichotomous, returning 'less', 'equal', 'greater', or 'undefined'. When used with a '-' prefix, the result MUST be reversed.
