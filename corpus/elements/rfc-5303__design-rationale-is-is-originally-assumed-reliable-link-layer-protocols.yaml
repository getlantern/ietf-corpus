document: rfc-5303
kind: design-rationale
summary: 'IS-IS originally assumed reliable link-layer protocols on point-to-point links (ISO 10589 section 6.7.2) and therefore only implemented a two-way handshake. Three failure modes motivated the extension: CSNP loss after link restart causing 18-hour sync failures, unidirectional link failures being detected by only one side, and physical layer topology changes causing a system to receive packets destined for a different system.'
section: "1"
topics:
