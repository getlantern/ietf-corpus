document: rfc-4238
kind: protocol-element
summary: The 'E2U+VPIM:LDAP' service maps an E.164 telephone number to a VPIM LDAP URL, enabling discovery of the VPIM directory server. The ENUM DNS query returns NAPTR records with LDAP URLs pointing to the VPIM directory.
