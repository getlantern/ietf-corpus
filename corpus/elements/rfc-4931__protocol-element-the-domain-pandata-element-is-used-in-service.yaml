document: rfc-4931
kind: protocol-element
summary: The <domain:panData> element is used in service messages to notify clients of pending action completion. It contains the domain name with a boolean 'paResult' attribute (approved or denied), original transaction IDs in <domain:paTRID>, and the review completion date in <domain:paDate>.
section: "3.3"
topics:
