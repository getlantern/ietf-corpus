document: rfc-8775
kind: protocol-element
summary: The modulo hash algorithm computes hashvalue_SG as the XOR of the masked-and-shifted source and group address values, modulo the number of GDR Candidates (GDRC). For ASM, hashvalue_RP or hashvalue_Group is used depending on whether the RP Hash Mask is non-zero.
