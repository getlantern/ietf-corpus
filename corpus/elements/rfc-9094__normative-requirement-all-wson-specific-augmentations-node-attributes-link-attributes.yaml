document: rfc-9094
kind: normative-requirement
summary: All WSON-specific augmentations (node attributes, link attributes, tunnel termination points, connectivity matrices) include a 'when' expression that requires 'wsont:wson-topology' to be present in the network's network-types. Augmentation parameters apply only for networks with the WSON topology type.
section: "3"
rfc2119_level: MUST
topics:
