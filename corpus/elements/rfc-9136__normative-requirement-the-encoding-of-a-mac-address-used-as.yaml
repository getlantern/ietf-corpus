document: rfc-9136
kind: normative-requirement
summary: The encoding of a MAC address used as an Overlay Index MUST be the 6-octet MAC address specified by IEEE 802.1Q. A route carrying an invalid MAC address (e.g., broadcast or multicast) MUST be treated as withdraw.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
