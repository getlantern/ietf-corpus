document: rfc-2308
kind: design-rationale
summary: Negative cache TTLs should be capped (values of one to three hours have been found to work well; values exceeding one day have been found to be problematic), mirroring the MAXTTL concept pioneered in the CHIVES resolver to guard against excessively long TTLs.
