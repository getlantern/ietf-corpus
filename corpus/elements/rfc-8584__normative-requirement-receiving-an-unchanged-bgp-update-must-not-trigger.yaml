document: rfc-8584
kind: normative-requirement
summary: Receiving an unchanged BGP Update MUST NOT trigger the RCVD_ES event. If an MP_UNREACH_NLRI is seen for a route not previously advertised, the LOST_ES event MUST NOT be triggered.
section: "2.1"
rfc2119_level: MUST NOT
