document: rfc-3478
kind: protocol-element
summary: The Recovery Time field in the FT Session TLV specifies how long (in ms) a restarting LSR will retain its preserved MPLS forwarding state after sending the post-restart Initialization message. A value of 0 means forwarding state was not preserved (or is no longer available).
section: "2"
