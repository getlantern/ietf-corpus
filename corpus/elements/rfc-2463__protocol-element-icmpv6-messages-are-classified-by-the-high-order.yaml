document: rfc-2463
kind: protocol-element
summary: 'ICMPv6 messages are classified by the high-order bit of the Type field: error messages have Types 0–127 (high-order bit = 0); informational messages have Types 128–255 (high-order bit = 1). This document defines Types 1–4 (errors) and 128–129 (Echo Request/Reply).'
section: "2.1"
