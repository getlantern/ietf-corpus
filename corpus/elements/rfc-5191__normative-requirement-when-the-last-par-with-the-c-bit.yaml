document: rfc-5191
kind: normative-requirement
summary: When the last PAR with the 'C' bit set carries Result-Code PANA_SUCCESS, a Session-Lifetime AVP MUST also be present. The PaC MUST initiate re-authentication before the current session lifetime expires if it wishes to maintain access.
section: "5.7"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
