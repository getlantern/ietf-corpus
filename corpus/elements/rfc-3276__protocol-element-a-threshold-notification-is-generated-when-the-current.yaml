document: rfc-3276
kind: protocol-element
summary: A threshold notification is generated when the current 15-minute interval error counter becomes equal to or exceeds the threshold value. At most one notification may be sent per interval per interface. Setting a threshold to 0 disables the notification; setting it to 1 generates a notification on the first occurrence.
section: "4.6"
topics:
    - snmp
