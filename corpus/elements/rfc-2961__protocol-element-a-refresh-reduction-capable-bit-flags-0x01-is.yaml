document: rfc-2961
kind: protocol-element
summary: A Refresh-Reduction-Capable bit (Flags 0x01) is added to the RSVP common header. When set it indicates the node supports Bundle messages, MESSAGE_ID objects, Ack messages, and Srefresh messages. The bit is meaningful only between RSVP neighbors and must be monitored continuously for capability changes.
