document: rfc-5437
kind: protocol-element
summary: The ':importance' tag MAY be transformed into an XMPP SHIM header named 'Urgency', where importance '1' maps to 'high', '2' to 'medium', and '3' to 'low'. This mapping is optional and the tag has no special mandatory meaning for the xmpp notification mechanism.
section: "2.4"
topics:
