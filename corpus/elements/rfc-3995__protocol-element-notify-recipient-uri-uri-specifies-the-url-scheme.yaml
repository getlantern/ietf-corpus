document: rfc-3995
kind: protocol-element
summary: '''notify-recipient-uri'' (uri) specifies the URL (scheme + address) of the Notification Recipient and implicitly identifies the Push Delivery Method via its URI scheme. The Printer MUST return the value as supplied by the client without case conversion or canonicalization.'
section: 5.3.1
