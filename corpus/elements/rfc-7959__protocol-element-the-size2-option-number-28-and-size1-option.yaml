document: rfc-7959
kind: protocol-element
summary: The Size2 option (number 28) and Size1 option (number 60) are elective, No-Cache-Key, variable-length (0–4 byte) unsigned integer options. Size2 indicates total response body size; Size1 indicates total request body size or (in 4.13 responses) the maximum acceptable request entity size.
section: "4"
