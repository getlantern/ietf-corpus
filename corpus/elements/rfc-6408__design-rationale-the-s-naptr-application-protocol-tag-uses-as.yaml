document: rfc-6408
kind: design-rationale
summary: The S-NAPTR application protocol tag uses '.' as a delimiter (e.g., 'diameter.sctp') purely for readability. This choice follows existing S-NAPTR registry conventions but explicitly does not imply structural or namespace semantics, and the tag MUST NOT be parsed by implementations.
