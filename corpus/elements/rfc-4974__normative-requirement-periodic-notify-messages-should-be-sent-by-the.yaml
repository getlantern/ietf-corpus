document: rfc-4974
kind: normative-requirement
summary: Periodic Notify messages SHOULD be sent by the initiator and terminator of the Call for keepalive. The period is RECOMMENDED to be twice the shortest LSP refresh period; when no LSPs exist, a refresh period of no less than one minute is RECOMMENDED.
section: "6.7"
rfc2119_level: SHOULD
topics:
    - mpls
