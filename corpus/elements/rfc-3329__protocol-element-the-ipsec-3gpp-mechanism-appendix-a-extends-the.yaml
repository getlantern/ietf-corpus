document: rfc-3329
kind: protocol-element
summary: 'The ipsec-3gpp mechanism (Appendix A) extends the framework with parameters for 3GPP IMS: algorithm (hmac-md5-96 or hmac-sha-1-96, mandatory), protocol (ah or esp, default esp), mode (trans or tun, default trans), encrypt-algorithm (des-ede3-cbc or null, default no encryption), spi (10-digit SPI value), port1 (destination port for inbound protected messages), and optional port2 (source port for outbound protected messages).'
section: A
topics:
    - sip
    - ipsec
    - security
