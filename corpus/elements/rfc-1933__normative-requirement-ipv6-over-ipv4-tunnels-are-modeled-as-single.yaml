document: rfc-1933
kind: normative-requirement
summary: 'IPv6-over-IPv4 tunnels are modeled as single-hop: the IPv6 hop limit is decremented by 1 as if forwarding over any datalink, hiding the tunnel from diagnostic tools such as traceroute. The encapsulating IPv4 TTL is set in an implementation-dependent manner.'
section: 4.1.2
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
