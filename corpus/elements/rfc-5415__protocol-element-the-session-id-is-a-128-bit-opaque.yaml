document: rfc-5415
kind: protocol-element
summary: The Session ID is a 128-bit opaque value generated by the AC and delivered in the Join Response. It is used to bind the control and data channels and must be included in Data Channel Keep-Alive packets. The Session ID MUST be cryptographically random to prevent spoofing.
section: 4.6.37
topics:
    - security
