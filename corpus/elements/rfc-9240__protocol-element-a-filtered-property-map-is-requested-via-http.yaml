document: rfc-9240
kind: protocol-element
summary: A filtered property map is requested via HTTP POST with input media type 'application/alto-propmapparams+json'. Input is ReqFilteredPropertyMap with a required 'entities' field (list of EntityID) and optional 'properties' field (list of EntityPropertyName). An empty 'entities' or 'properties' list signals a request for all applicable entities or properties respectively.
section: "8"
