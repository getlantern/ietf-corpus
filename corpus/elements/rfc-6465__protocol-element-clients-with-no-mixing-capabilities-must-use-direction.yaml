document: rfc-6465
kind: protocol-element
summary: Clients with no mixing capabilities MUST use direction parameter 'recvonly' in the extmap attribute. Conference focus entities with mixing capabilities may omit direction or use 'sendrecv' in SDP offers, and MUST use 'sendonly' in answers to 'recvonly' offers.
