document: rfc-7715
kind: wire-format
summary: 'The PLR Status Value Element (Type=2) encodes: 1-octet Type, variable-length Length, 2-octet Addr Family, 1-octet Num PLR entry, followed by one or more PLR entries. Each PLR entry is 6 octets for IPv4 (2-octet A-bit+Reserved plus 4-octet address) or 18 octets for IPv6.'
section: "2.3"
topics:
