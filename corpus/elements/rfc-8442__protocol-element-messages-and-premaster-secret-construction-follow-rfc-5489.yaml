document: rfc-8442
kind: protocol-element
summary: Messages and premaster secret construction follow RFC 5489 (ECDHE_PSK). The ServerKeyExchange and ClientKeyExchange messages are used, and the premaster secret is computed as for the ECDHE_PSK key exchange. Elliptic curve parameters are negotiated using extensions from RFC 8422.
