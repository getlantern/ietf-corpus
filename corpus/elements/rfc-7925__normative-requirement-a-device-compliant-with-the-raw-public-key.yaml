document: rfc-7925
kind: normative-requirement
summary: A device compliant with the raw public key profile MUST implement TLS_ECDHE_ECDSA_WITH_AES_128_CCM_8 and follow all guidance in Section 4.3. This ciphersuite uses ECDHE for key establishment and ECDSA for authentication, providing perfect forward secrecy.
section: "4.3"
rfc2119_level: MUST
