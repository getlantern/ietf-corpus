document: rfc-6584
kind: normative-requirement
summary: To prevent cross-session replay attacks on ALC, the TSI MUST be changed for each ALC session so it is unique among all active sessions of the sender for a long period preceding and following activity. When Group-keyed MAC is used, the shared group key SHOULD be changed across sessions if the receiver set changes.
section: 7.2.3
rfc2119_level: MUST
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
