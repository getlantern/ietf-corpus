document: rfc-8919
kind: normative-requirement
summary: Undefined bits in SABM/UDABM that are transmitted MUST be transmitted as 0 and MUST be ignored on receipt. Bits that are not transmitted MUST be treated as if set to 0 on receipt. Bits not supported by an implementation MUST be ignored on receipt.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
