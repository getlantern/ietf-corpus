document: rfc-4206
kind: protocol-element
summary: By default, the Maximum Reservable Bandwidth and initial Maximum LSP Bandwidth for all priorities of an FA is set to the bandwidth of the FA-LSP. The Maximum LSP Bandwidth at any priority MUST NOT exceed the bandwidth of the FA-LSP.
section: 3.1.6
topics:
