document: rfc-9770
kind: registry
summary: 'The ''ACE Token Revocation List Errors'' registry is created by Section 15.5, mapping error identifiers to integer values: 0 = ''Invalid parameter value'', 1 = ''Invalid set of parameters'', 2 = ''Out of bound cursor value''. These appear in the ''error-id'' field of ''ace-trl-error'' problem detail entries.'
