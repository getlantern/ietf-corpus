document: rfc-9887
kind: normative-requirement
summary: Wildcard use in TLS server identities MUST follow RFC 9525 Section 7.1. Operators MUST ensure the wildcard is limited to a subdomain dedicated solely to TLS TACACS+ servers, and that those servers are impervious to traffic redirection.
section: 5.1.6
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
