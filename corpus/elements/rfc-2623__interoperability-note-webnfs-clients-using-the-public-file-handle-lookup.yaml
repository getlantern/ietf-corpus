document: rfc-2623
kind: interoperability-note
summary: WebNFS clients using the public file handle lookup (RFC 2054) do not go through the MOUNT protocol to acquire the initial file handle, rendering MOUNT-based access control ineffective for them. Some servers cope by limiting the public file handle to file systems exported to all Internet clients.
section: "2.6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
