document: rfc-4361
kind: design-rationale
summary: 'Client identifiers based on link-layer (MAC) addresses are ephemeral: replacing network interface hardware changes the client identity, causing loss of IP address and DNS registrations. This motivated a move to node-stable identifiers.'
