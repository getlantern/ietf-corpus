summary: IGP-Adjacency Segment ID sub-TLV (Type=36) has a variable length depending on Adjacency Type and Protocol; the example shows Parallel Adjacency with Protocol=0 encoding Local Interface ID (4 octets), Remote Interface ID (4 octets), Advertising Node Identifier (4 octets), and Receiving Node Identifier (4 octets), plus 2 octets Reserved.
