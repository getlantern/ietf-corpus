document: rfc-6389
kind: security-consideration
summary: The security considerations from RFC 5036 (LDP Specification), RFC 5331 (MPLS Upstream Label Assignment), and RFC 5332 (MPLS Multicast Encapsulations) all apply. More detailed discussion of MPLS and GMPLS security threats, defensive techniques, and detection/reporting mechanisms is provided in RFC 5920.
