document: rfc-9014
kind: design-rationale
summary: EVPN routes on GWs are never reflected between DC and WAN but are consumed and re-advertised with the GW's own RD, the I-ESI in the ESI field, and appropriate encapsulation extended communities. This decouples encapsulation types, route targets, and label spaces between domains.
section: 4.4.1
topics:
    - routing
    - bgp
    - mpls
