document: rfc-7532
kind: normative-requirement
summary: An NFS URI MUST contain both an authority and a path component, and MUST NOT contain a query component or a fragment component. The authority MUST contain the host subcomponent, and the path MUST NOT be empty and MUST be expressed as an absolute path.
section: 2.8.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
