document: rfc-5998
kind: design-rationale
summary: IKEv2 omits the EAP Identity Request/Response pair (see RFC 5996 Section 3.16), using the IKE ID payload instead to route AAA messages and select EAP methods. This means the ID payload identity is not directly authenticated by the EAP method itself.
section: "6.4"
topics:
    - ipsec
    - vpn
