document: rfc-4432
kind: interoperability-note
summary: The encoding of the encrypted secret in SSH_MSG_KEXRSA_SECRET uses I2OSP (from RFC 3447) combined with SSH string encoding, which is similar but not identical to SSH mpint encoding; this matches the encoding used by ssh-rsa signatures in RFC 4253.
