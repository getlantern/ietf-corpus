document: rfc-1035
kind: wire-format
summary: 'DNS message header is 12 bytes containing: ID (16-bit), QR (1-bit), OPCODE (4-bit), AA, TC, RD, RA flags (1-bit each), Z reserved (3-bit, must be zero), RCODE (4-bit), followed by QDCOUNT, ANCOUNT, NSCOUNT, ARCOUNT (each 16-bit unsigned).'
section: 4.1.1
