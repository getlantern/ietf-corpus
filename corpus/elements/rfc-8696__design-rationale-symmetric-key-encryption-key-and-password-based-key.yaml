document: rfc-8696
kind: design-rationale
summary: Symmetric key-encryption key and password-based key management techniques in CMS are deliberately excluded from this specification because they are already quantum resistant when used with adequate key sizes and quantum-resistant KDFs. The specification focuses only on key transport and key agreement, which are broken by Shor's algorithm.
