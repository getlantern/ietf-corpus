document: rfc-4018
kind: protocol-element
summary: The 'boot-list' attribute lists iSCSI Initiator Names allowed to boot from the target. If absent, the target is not bootable. LUN 0 is the assumed boot LUN. This is security policy information requiring IPsec when distributed.
section: "5.2"
topics:
    - security
