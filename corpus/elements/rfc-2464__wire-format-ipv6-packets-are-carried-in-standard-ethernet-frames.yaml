document: rfc-2464
kind: wire-format
summary: IPv6 packets are carried in standard Ethernet frames. The Ethernet type code field must contain 0x86DD; the data field contains the IPv6 header followed immediately by the payload, plus any padding needed to meet the minimum Ethernet frame size.
