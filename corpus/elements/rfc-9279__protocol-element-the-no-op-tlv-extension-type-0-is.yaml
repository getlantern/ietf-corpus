document: rfc-9279
kind: protocol-element
summary: The No-op TLV (Extension Type=0) is a No-Operation TLV that MUST be ignored during processing. It may be used to verify correct implementation of the extension mechanism. No alignment requirement exists, so No-op is not needed for padding.
section: "4"
topics:
