document: rfc-8300
kind: normative-requirement
summary: For MD Type 2 variable-length metadata, the sender MUST pad metadata to a 4-byte boundary; the receiver MUST round the Length up to the nearest 4-byte-word boundary to locate the next field and MUST access only the bytes indicated by the Length field.
section: 2.5.1
rfc2119_level: MUST
topics:
    - security
