document: rfc-6936
kind: protocol-element
summary: The zero UDP checksum method for IPv6 is defined in RFC 6935 and is applicable only to specific protocols or tunnel encapsulations that explicitly opt in on a per-port basis. It is not a general replacement for the mandatory checksum defined in RFC 2460, and IPv6 with zero UDP checksum is not equivalent to IPv4 with zero UDP checksum.
section: "3.4"
topics:
    - udp
    - ip
