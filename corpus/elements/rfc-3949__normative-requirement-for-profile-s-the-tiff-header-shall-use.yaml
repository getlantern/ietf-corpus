document: rfc-3949
kind: normative-requirement
summary: For Profile S, the TIFF header SHALL use byte order 'II' (0x4949, little-endian), the first IFD SHALL be at offset 8, and FillOrder SHALL be 2 (LSB first). Profile S only supports ImageWidth=1728.
