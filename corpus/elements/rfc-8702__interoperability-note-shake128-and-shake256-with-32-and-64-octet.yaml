document: rfc-8702
kind: interoperability-note
summary: SHAKE128 and SHAKE256 with 32- and 64-octet output lengths can be used in ECDSA as substitutes for 256- and 512-bit output hash algorithms (such as SHA256 and SHA512), though ANSI X9.62 and SEC1 have not formally specified SHAKE as hash algorithm options.
section: 3.2.2
