document: rfc-9731
kind: design-rationale
summary: The VN compute RPC is provided as a pre-instantiation 'dry-run' operation so the CNC can view the full computed VN as a single entity before committing resources; this cannot be achieved with per-tunnel path computation or 'compute-only' tunnel setup, which lack the unified VN view.
