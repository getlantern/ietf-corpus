document: rfc-4572
kind: design-rationale
summary: The fingerprint hex encoding uses uppercase bytes separated by colons (the OpenSSL and browser certificate manager convention) rather than unseparated lowercase hex (as used in HTTP Digest authentication). Consistency with existing certificate fingerprint display tools was considered more important than consistency with HTTP Digest.
section: "5"
