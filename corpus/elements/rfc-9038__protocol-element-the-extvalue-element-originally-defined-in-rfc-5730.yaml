document: rfc-9038
kind: protocol-element
summary: The <extValue> element, originally defined in RFC 5730 for error diagnostic information, is extended by this operational practice to carry unhandled namespace data in successful responses. It contains a <value> child (with the unhandled namespace XML) and a <reason> child (human-readable explanation). XML processing of <value> is disabled by the RFC 5730 schema.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
