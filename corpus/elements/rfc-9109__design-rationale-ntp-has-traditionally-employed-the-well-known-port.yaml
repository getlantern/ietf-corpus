document: rfc-9109
kind: design-rationale
summary: NTP has traditionally employed the well-known port 123 even when not strictly necessary, which unnecessarily reduces the entropy an attacker must overcome to mount a blind/off-path attack. This document corrects that pattern to align with BCP 156 (RFC 6056).
section: "6"
topics:
