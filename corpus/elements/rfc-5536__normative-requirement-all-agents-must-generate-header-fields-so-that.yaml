document: rfc-5536
kind: normative-requirement
summary: All agents MUST generate header fields so that at least one space immediately follows the ':' separating the header field name and body, for compatibility with deployed NNTP servers. Agents MAY accept header fields lacking that space.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
