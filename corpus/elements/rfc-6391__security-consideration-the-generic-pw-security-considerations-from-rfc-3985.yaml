document: rfc-6391
kind: security-consideration
summary: The generic PW security considerations from RFC 3985, the security considerations for specific PW types (e.g., Ethernet PW in RFC 4448), and the MPLS/GMPLS security framework in RFC 5920 all apply to flow-aware pseudowires. No additional security threats beyond existing PW security are introduced.
section: "10"
topics:
