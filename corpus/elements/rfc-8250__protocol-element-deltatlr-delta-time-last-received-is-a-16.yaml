document: rfc-8250
kind: protocol-element
summary: 'DELTATLR (Delta Time Last Received) is a 16-bit unsigned integer representing the server delay: the time difference between when the sender sends the current packet and when it received the previous packet (send time packet n minus receive time packet n-1). Its scale is given by SCALEDTLR.'
section: 3.2.1
topics:
