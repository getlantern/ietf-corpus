document: rfc-9130
kind: interoperability-note
summary: 'The ''ietf-isis'' module imports and depends on: ietf-routing (RFC 8349), ietf-interfaces (RFC 8343), ietf-key-chain (RFC 8177), ietf-routing-types and iana-routing-types (RFC 8294), ietf-inet-types and ietf-yang-types (RFC 6991), and ietf-bfd-types (RFC 9314). Implementations must support all these base modules.'
