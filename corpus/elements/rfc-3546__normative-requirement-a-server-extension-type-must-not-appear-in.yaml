document: rfc-3546
kind: normative-requirement
summary: A server extension type MUST NOT appear in the extended server hello unless the same extension type appeared in the corresponding client hello. Clients MUST abort the handshake if they receive an unsolicited extension type in the server hello.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
