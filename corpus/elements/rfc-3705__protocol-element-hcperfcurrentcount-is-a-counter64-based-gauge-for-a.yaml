document: rfc-3705
kind: protocol-element
summary: HCPerfCurrentCount is a Counter64-based gauge for a performance measurement in the current 15-minute interval. Starts at zero, increments on events, is stored as X(1) at interval end and reset. If no valid data is available, the object instance is absent and a retrieval returns an error.
