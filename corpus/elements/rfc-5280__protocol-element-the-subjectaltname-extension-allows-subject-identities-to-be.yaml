kind: protocol-element
summary: The subjectAltName extension allows subject identities to be expressed as rfc822Name (email), dNSName, uniformResourceIdentifier, iPAddress, registeredID, or directoryName. Conforming implementations MUST support rfc822Name, dNSName, and directoryName forms.
