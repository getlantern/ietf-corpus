document: rfc-9074
kind: protocol-element
summary: The RELATED-TO property usage is extended to apply to VALARM components (in addition to its existing uses), enabling alarm-to-alarm relationships. New RELTYPE values can be registered to identify specific relationship types between VALARMs.
