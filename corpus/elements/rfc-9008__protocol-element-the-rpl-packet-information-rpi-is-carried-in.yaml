document: rfc-9008
kind: protocol-element
summary: The RPL Packet Information (RPI) is carried in the IPv6 Hop-by-Hop Options header (RPL Option, RFC 6553) and conveys the RPLInstanceID, SenderRank, and direction/flags to detect routing inconsistencies. RFC 8138 provides a compressed alternative encoding (RPI-6LoRH).
