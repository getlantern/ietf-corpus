document: rfc-8076
kind: normative-requirement
summary: A <pattern> element MUST be present if the 'enabled' attribute of the <variable-resource-names> element is set to true; both $USER and $DOMAIN variables MUST be present in any given pattern definition.
section: "5.3"
rfc2119_level: MUST
