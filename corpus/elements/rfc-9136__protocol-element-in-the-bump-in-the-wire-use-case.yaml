document: rfc-9136
kind: protocol-element
summary: In the Bump-in-the-Wire use case (Section 4.3), Layer 2 VAs without IP addresses use an ESI (or MAC) as the Overlay Index in RT-5. The EVPN Router's MAC Extended Community carries the TS MAC address for use as the inner destination MAC in the encapsulated packet.
section: "4.3"
