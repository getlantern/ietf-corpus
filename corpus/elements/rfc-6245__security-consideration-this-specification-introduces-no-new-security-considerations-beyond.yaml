document: rfc-6245
kind: security-consideration
summary: This specification introduces no new security considerations beyond those in RFC 5944. The GRE Key is not a cryptographic secret; despite the name, it is a demultiplexing index used to distinguish packets belonging to a given flow within a GRE tunnel, not a shared secret requiring protection.
section: "7"
topics:
    - security
    - mobility
