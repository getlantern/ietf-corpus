document: rfc-5023
kind: protocol-element
summary: A Category Document (media type application/atomcat+xml) contains lists of categories using atom:category elements. The app:categories element may carry a 'fixed' attribute ('yes'/'no') indicating whether the category set is closed, and an optional 'scheme' attribute inherited by child categories lacking their own scheme.
