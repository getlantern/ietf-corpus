document: rfc-7044
kind: interoperability-note
summary: When a request traverses an intermediary that does not support History-Info, a gap appears in the hi-entry sequence. Such gaps are indicated by inserting a '0' integer (e.g., 1.1.2.0.1). Additionally, non-supporting proxies can cause duplicate hi-index values when forking; entities MUST handle duplicate indices without treating them as errors.
section: "10.3"
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
