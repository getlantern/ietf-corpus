document: rfc-3764
kind: protocol-element
summary: The 'E2U+SIP' enumservice is defined for use in NAPTR records to map E.164 telephone numbers to SIP addresses-of-record. The URI appearing in the regexp field of the NAPTR record may use either the 'sip:' or 'sips:' scheme.
