document: rfc-2737
kind: protocol-element
summary: The entConfigChange notification is generated when entLastChangeTime changes, allowing an NMS to trigger entity table maintenance polls. It is throttled to at most one notification-event per five-second interval; changes during a throttle window are suppressed and a single event is sent at window expiry.
section: "3"
topics:
