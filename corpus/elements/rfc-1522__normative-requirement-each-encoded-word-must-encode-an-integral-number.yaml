document: rfc-1522
kind: normative-requirement
summary: Each encoded-word MUST encode an integral number of octets, and the encoded-text must be well-formed within a single encoded-word — encoding cannot be continued in the next encoded-word. Additionally, a multi-octet character MUST NOT be split across adjacent encoded-words.
section: "5"
rfc2119_level: MUST
