document: rfc-2253
kind: normative-requirement
summary: 'The following characters MUST be escaped in an AttributeValue string: a leading space or ''#'', a trailing space, and any of '','', ''+'', ''"'', ''\'', ''<'', ''>'', or '';''. Escaping is done by prefixing with a backslash, or by replacing the character with a backslash followed by two hex digits.'
section: "2.4"
rfc2119_level: MUST
topics:
    - ldap
