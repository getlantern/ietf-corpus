document: rfc-9135
kind: normative-requirement
summary: In asymmetric IRB, the MPLS or NVO tunnel used for inter-subnet forwarding MUST be of type Ethernet, because the egress PE performs only a MAC lookup and requires the destination TS's MAC address in the encapsulation.
section: "4"
rfc2119_level: MUST
topics:
