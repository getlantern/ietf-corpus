summary: An Advertisement is a CLUE message a Media Provider sends to a Media Consumer describing specific aspects of the content of the Media and any restrictions on simultaneously providing certain Streams. It contains Capture Scenes, Simultaneous Transmission Sets, Global View List, and Encoding Groups.
