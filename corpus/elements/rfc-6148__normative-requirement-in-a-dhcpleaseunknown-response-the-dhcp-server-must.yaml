document: rfc-6148
kind: normative-requirement
summary: In a DHCPLEASEUNKNOWN response, the DHCP server MUST echo the option 82 received in the DHCPLEASEQUERY message. No other option is included in the DHCPLEASEUNKNOWN message.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
