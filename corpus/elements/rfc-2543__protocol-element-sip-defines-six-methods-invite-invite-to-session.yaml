summary: 'SIP defines six methods: INVITE (invite to session), ACK (confirm final response to INVITE), OPTIONS (query capabilities), BYE (release call), CANCEL (cancel pending request), and REGISTER (bind address-of-record to contact). The Method token is case-sensitive.'
