document: rfc-2247
kind: protocol-element
summary: The algorithm for transforming a domain name into a distinguished name begins with an empty DN, then attaches RDNs for each domain component starting with the most significant (rightmost) component first. Each RDN is a single AttributeTypeAndValue where the type is 'DC' and the value is an IA5 string containing that domain component.
section: "3"
topics:
