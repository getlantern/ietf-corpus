document: rfc-3355
kind: normative-requirement
summary: Each L2TP PDU MUST be transported within a single AAL5 PDU, meaning the AAL5 connection MTU constrains both the L2TP tunnel MTU and all PPP connection MRUs that use the tunnel.
section: "3.1"
rfc2119_level: MUST
