document: rfc-9901
kind: protocol-element
summary: 'For selectively disclosable array elements, a digest placeholder object `{"...": "<digest>"}` replaces the element in the array. The key MUST always be the three-dot string `...` and the object MUST have no other keys. Verifiers ignore array elements for which no matching Disclosure was provided.'
section: 4.2.4.2
