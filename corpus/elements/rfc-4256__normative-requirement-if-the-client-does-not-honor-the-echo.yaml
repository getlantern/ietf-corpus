document: rfc-4256
kind: normative-requirement
summary: If the client does not honor the echo field for a prompt, it MUST err on the side of masking input. Clients MUST also accept empty responses from the user and pass them on as empty strings.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
