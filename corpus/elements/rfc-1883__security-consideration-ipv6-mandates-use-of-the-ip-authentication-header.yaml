summary: IPv6 mandates use of the IP Authentication Header (RFC-1826) and IP Encapsulating Security Payload (RFC-1827) in conformance with the Security Architecture for the Internet Protocol (RFC-1825), providing authentication, data integrity, and optional data confidentiality at the network layer.
