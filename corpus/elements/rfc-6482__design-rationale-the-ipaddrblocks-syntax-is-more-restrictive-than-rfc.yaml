document: rfc-6482
kind: design-rationale
summary: 'The ipAddrBlocks syntax is more restrictive than RFC 3779''s IP address delegation extension: RFC 3779 can represent arbitrary address ranges, but ROAs need only represent prefixes. This constraint reflects the routing use case where prefixes, not arbitrary ranges, are advertised.'
section: "3.3"
topics:
    - routing
    - ip
    - pkix
