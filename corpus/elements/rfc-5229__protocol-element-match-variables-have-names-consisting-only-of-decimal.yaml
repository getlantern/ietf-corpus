document: rfc-5229
kind: protocol-element
summary: Match variables have names consisting only of decimal digits (e.g., ${1}, ${2}). They index the list of captured substrings from the most recently evaluated successful ":matches" test, with ${0} holding the full matched portion and ${1}..${N} holding per-wildcard captures. Non-greedy matching is used.
section: "3.2"
