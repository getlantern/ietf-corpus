document: rfc-8656
kind: protocol-element
summary: A Channel binding associates a 16-bit channel number (range 0x4000–0x7FFF) with a specific peer transport address. Channel bindings last 10 minutes unless refreshed by sending another ChannelBind request. They enable use of the more compact ChannelData message instead of 36-byte Send/Data indications.
section: "12"
topics:
