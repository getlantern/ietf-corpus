document: rfc-2492
kind: normative-requirement
summary: When placing an SVC call, an IPv6 node SHOULD follow the procedures in RFC 1755 and RFC 1626 for signalling UNI 3.0/3.1 SVCs and negotiating MTU. The default IP MTU on a logical link is 9180 bytes.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
