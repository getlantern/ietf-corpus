document: rfc-8928
kind: protocol-element
summary: The Crypto-ID is derived by applying the hash function indicated by the Crypto-Type to the CIPO (with all reserved and padding bits set to zero), then taking the leftmost bits of the resulting hash up to the desired size. It is transported in the ROVR field of the EARO and associated with the Registered Address at the 6LR and 6LBR.
section: "4.1"
topics:
