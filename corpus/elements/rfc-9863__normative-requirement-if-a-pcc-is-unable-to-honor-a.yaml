document: rfc-9863
kind: normative-requirement
summary: If a PCC is unable to honor a color value passed in a PCUpd or PCInitiate message, the PCC MUST reject the message and send a PCErr with Error-Type=19 (Invalid Operation) and Error-value=31 (Invalid color).
section: "2"
rfc2119_level: MUST
topics:
    - routing
