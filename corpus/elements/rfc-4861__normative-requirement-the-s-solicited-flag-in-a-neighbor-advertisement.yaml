document: rfc-4861
kind: normative-requirement
summary: The S (Solicited) flag in a Neighbor Advertisement MUST NOT be set in multicast advertisements or in unsolicited unicast advertisements; it is only valid in unicast responses to a specific Neighbor Solicitation.
section: "4.4"
rfc2119_level: MUST NOT
