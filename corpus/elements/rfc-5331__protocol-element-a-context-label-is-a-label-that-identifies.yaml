document: rfc-5331
kind: protocol-element
summary: A context label is a label that identifies a label table (context-specific label space) in which the label immediately below the context label should be looked up. A context label carried as an outermost label over a particular multi-access subnet/tunnel MUST be unique within the scope of that subnet/tunnel.
section: "3"
