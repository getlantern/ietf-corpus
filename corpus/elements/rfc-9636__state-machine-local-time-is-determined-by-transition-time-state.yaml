document: rfc-9636
kind: state-machine
summary: 'Local time is determined by transition time state: timestamps before the first transition use time type 0; timestamps from each transition up to (but not including) the next use the type indexed by the transition type array; timestamps after the last transition use the footer TZ string if present and non-empty, otherwise are unspecified. A designation of ''-00'' marks an unspecified local time.'
section: "3.2"
