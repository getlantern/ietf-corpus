document: rfc-2678
kind: protocol-element
summary: The TCP-specific methodology sends TCP SYN packets from A1 to A2 on specified ports. A SYN-ACK with proper acknowledgement fields indicates temporal connectivity (true); a RST from A2 also indicates address-level connectivity (though not service connectivity); an ICMP port-unreachable from A2 similarly indicates address connectivity.
section: 6.6.5
topics:
