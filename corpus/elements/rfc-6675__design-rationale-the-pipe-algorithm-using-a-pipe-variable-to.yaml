document: rfc-6675
kind: design-rationale
summary: The pipe algorithm (using a Pipe variable to estimate in-flight bytes) is used instead of RFC 5681's congestion window algorithm during recovery, allowing TCP to use fundamentally different congestion control that better handles multiple losses from a single flight.
