document: rfc-4028
kind: design-rationale
summary: The 30-minute (1800 second) RECOMMENDED minimum for Session-Expires was chosen because 95% of phone calls are shorter than this duration and because small session intervals cause excessive messaging traffic and increase 'glare' (simultaneous re-INVITE/UPDATE from both sides). It is a SHOULD rather than MUST because exact values depend on network factors including bandwidth, latency, and application scenario.
section: "4"
topics:
