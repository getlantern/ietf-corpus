document: rfc-7597
kind: normative-requirement
summary: The NAT44 in the MAP CE SHOULD conform to RFC 4787, RFC 5508, and RFC 5382. In MAP address-sharing mode, NAT44 operation MUST be restricted to port numbers derived via the Basic Mapping Rule.
