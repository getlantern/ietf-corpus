document: rfc-826
kind: normative-requirement
summary: The <protocol type, sender protocol address, sender hardware address> triplet must be merged into the translation table before examining the opcode. If the entry already exists, the new sender hardware address supersedes the old one, enabling fast recovery when a host changes its hardware address.
section: Packet Reception
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
