document: rfc-6388
kind: wire-format
summary: 'The LDP MP Opaque Value Element has two encodings: a basic type (1-octet type < 255, 2-octet length, variable value) and an extended type (type = 255, 2-octet extended type, 2-octet length split across two fields, variable value). The Generic LSP Identifier is basic type 1, length 4, carrying a 32-bit integer unique within the root''s context.'
