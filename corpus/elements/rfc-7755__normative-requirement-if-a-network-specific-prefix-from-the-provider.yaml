document: rfc-7755
kind: normative-requirement
summary: If a Network-Specific Prefix from the provider's own address space is used as the translation prefix, care MUST be taken in front of services with application-level ACLs that distinguish internal from Internet traffic, as translated IPv4 Internet traffic may appear to originate from the provider's own network.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
