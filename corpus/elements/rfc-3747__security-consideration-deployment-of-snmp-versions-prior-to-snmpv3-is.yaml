document: rfc-3747
kind: security-consideration
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Instead, deployment of SNMPv3 with full cryptographic mechanisms for authentication and privacy is RECOMMENDED to protect read-write and read-create objects in this MIB from unauthorized access.
section: "8"
rfc2119_level: RECOMMENDED
topics:
