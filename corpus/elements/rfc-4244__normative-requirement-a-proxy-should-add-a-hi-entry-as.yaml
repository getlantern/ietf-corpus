document: rfc-4244
kind: normative-requirement
summary: A proxy SHOULD add a hi-entry as it forwards a request. Adding the History-Info header between Steps 8 (adding Via header) and 9 (adding Content-Length) of RFC 3261 Section 16.6 is RECOMMENDED to avoid issues with strict routing changing the Request-URI.
section: 4.3.3.1
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
