document: rfc-7095
kind: wire-format
summary: jCard boolean values use the type identifier "boolean" with a JSON boolean value (true/false). Integer values use "integer" with JSON number primitives; decimals and exponents MUST be eliminated when converting integer types back to vCard.
section: 3.5.8
