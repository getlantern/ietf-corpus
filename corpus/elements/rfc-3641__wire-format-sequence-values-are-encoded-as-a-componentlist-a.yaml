document: rfc-3641
kind: wire-format
summary: 'SEQUENCE values are encoded as a ComponentList: a brace-enclosed, comma-separated list of NamedValue pairs (identifier followed by Value), with components in the order of their definition in the SEQUENCE type. SET values use the same ComponentList encoding and also encode components in definition order.'
