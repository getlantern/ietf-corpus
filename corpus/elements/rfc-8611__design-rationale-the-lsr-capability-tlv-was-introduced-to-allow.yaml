document: rfc-8611
kind: design-rationale
summary: The LSR Capability TLV was introduced to allow the initiator LSR to deterministically disambiguate whether a responder's echo reply reflects full feature support, partial feature support, or no support for the LAG extensions, rather than guessing based on reply contents alone. This generalized mechanism is intended to be reusable for future MPLS LSP Ping extensions.
section: "3"
topics:
