document: rfc-7244
kind: normative-requirement
summary: The RFSO block relies on the measurement period in the Measurement Information block and SHOULD be sent in the same compound RTCP packet as the Measurement Information Block. If the measurement period is not received in the same compound RTCP packet, the RFSO block MUST be discarded.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
