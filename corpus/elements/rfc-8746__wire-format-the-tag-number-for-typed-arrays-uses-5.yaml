document: rfc-8746
kind: wire-format
summary: 'The tag number for typed arrays uses 5 bit fields within its low 8 bits: constant 0b010, f (0=integer/1=float), s (0=unsigned or float/1=signed), e (0=big-endian/1=little-endian), and ll (length index 0–3). Element byte size is computed as 2**(f+ll).'
section: "2.1"
topics:
