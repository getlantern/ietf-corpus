document: rfc-4202
kind: security-consideration
summary: GMPLS routing extensions will potentially be used to control underlying transport infrastructure, making it vital that there be secure and/or authenticated means of transferring TE link state information among network entities. This document defers specification of security mechanisms to the protocol-specific encoding documents (GMPLS-OSPF, GMPLS-ISIS), which must state how the advertised information is to be secured.
section: "6"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
