document: rfc-4558
kind: protocol-element
summary: A Node-ID based Hello session is established by using local and remote Node-IDs in the source and destination IP address fields of Hello packets, respectively. A node can only run one Node-ID based RSVP Hello session per IGP instance (i.e., per Node-ID pair) with its neighbor.
section: "3"
