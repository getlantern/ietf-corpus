document: rfc-8265
kind: security-consideration
summary: In systems conforming to modern best practices, password verification during authentication should not use the comparison defined in Section 4.2.3. Instead, the system should prepare and enforce rules before performing cryptographic calculations, since the password is not available in plaintext on the server.
section: "8.2"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
