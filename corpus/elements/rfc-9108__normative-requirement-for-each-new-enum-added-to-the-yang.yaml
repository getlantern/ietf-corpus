document: rfc-9108
kind: normative-requirement
summary: 'For each new enum added to the YANG module, the substatements SHALL be populated as follows: ''value'' from the registry decimal value; ''status'' only if the registration is deprecated or obsoleted (mapping IANA ''deprecated''→YANG ''deprecated'', IANA ''obsolete''→YANG ''obsolete''); ''description'' replicating the registry full name or meaning; ''reference'' replicating the registry references.'
section: "4"
rfc2119_level: REQUIRED
topics:
    - dns
    - yang
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
