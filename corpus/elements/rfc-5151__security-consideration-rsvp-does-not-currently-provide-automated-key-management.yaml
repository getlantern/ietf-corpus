document: rfc-5151
kind: security-consideration
summary: RSVP does not currently provide automated key management. When using RSVP-TE security features across domains, key sharing is required between domains (RFC 2747, RFC 3097), and keys must be changed sufficiently frequently. If domain border nodes are protected with FRR, the MP and PLR must also share the key.
section: "8"
topics:
    - mpls
    - security
    - crypto
