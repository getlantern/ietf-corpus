document: rfc-9412
kind: normative-requirement
summary: Where RFC 8336 (ORIGIN for HTTP/2) specifies the ORIGIN frame is sent on stream 0, this MUST be interpreted to mean the HTTP/3 server control stream; the frame is sent from servers to clients on the server's control stream.
section: "2"
rfc2119_level: MUST
topics:
    - http
    - quic
