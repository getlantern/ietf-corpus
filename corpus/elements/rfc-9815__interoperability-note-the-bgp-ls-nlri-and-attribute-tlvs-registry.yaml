document: rfc-9815
kind: interoperability-note
summary: The 'BGP-LS NLRI and Attribute TLVs' registry is shared between BGP-LS SAFI and BGP-LS-SPF SAFI, but TLVs defined in this document (1181, 1184, 1185) may not apply to the BGP-LS SAFI. Unknown or unexpected TLVs must not cause an NLRI to be treated as malformed, per RFC 9552.
section: "3"
topics:
