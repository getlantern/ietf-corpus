document: rfc-5192
kind: design-rationale
summary: DHCP-based PAA discovery is defined as only one of multiple possible methods for locating PAAs. Restricting these options to discovery-only (not negotiation) avoids their use as a security policy signal, since the unauthenticated DHCP channel cannot be trusted to convey security-relevant decisions.
section: "1"
topics:
    - security
