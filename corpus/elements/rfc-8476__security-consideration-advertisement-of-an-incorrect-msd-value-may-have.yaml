document: rfc-8476
kind: security-consideration
summary: 'Advertisement of an incorrect MSD value may have negative consequences: a value smaller than supported may cause path computation to fail to find a viable path, while a value larger than supported may cause an attempt to instantiate a path that cannot be supported by the head-end. An attacker aware of these conditions could exploit incorrect MSD advertisements.'
section: "6"
topics:
    - routing
    - security
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
