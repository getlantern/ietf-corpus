document: rfc-3807
kind: normative-requirement
summary: In the backhaul architecture, on V5 Layer 1 failure, V5 Layer 2 SHALL be notified directly by V5 Layer 1 on the SG (not via V5 System Management). V5 Layer 1 SHALL report the outage to system management via a Link Status Indication (NON-OPERATIONAL). V5 system management SHALL NOT send an MPH-Layer_1 Failure Ind to V5 Layer 2.
section: "5.1"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
