document: rfc-7900
kind: normative-requirement
summary: For the 'single PMSI per C-flow' model, the intersection of the RTs of an A-D route and its corresponding UMH-eligible route MUST be non-null, and there MUST NOT be any RT common to A-D routes from different VPNs advertising P-tunnels for traffic from the same ambiguous C-source address.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
