document: rfc-5734
kind: normative-requirement
summary: A client MUST NOT distribute commands from a single EPP session over multiple TCP connections. A client MAY establish multiple TCP connections to support multiple independent EPP sessions.
section: "3"
rfc2119_level: MUST NOT
