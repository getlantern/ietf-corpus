document: rfc-7275
kind: design-rationale
summary: The ROID is a 64-bit opaque identifier deliberately agnostic to the nature (physical or virtual) and implementation specifics of the protected entity. This design guarantees interoperability without constraining how individual systems internally represent protected objects.
