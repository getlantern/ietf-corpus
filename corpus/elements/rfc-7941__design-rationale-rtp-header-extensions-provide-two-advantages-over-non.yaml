document: rfc-7941
kind: design-rationale
summary: 'RTP header extensions provide two advantages over non-regular RTCP for SDES delivery: fate sharing (the SDES item arrives if and only if the media data arrives) and deterministic delivery ordering relative to media data. RTCP packets lack sequence numbers and delivery feedback mechanisms, making confirmed delivery difficult.'
section: 4.2.5
topics:
    - rtp
    - realtime
