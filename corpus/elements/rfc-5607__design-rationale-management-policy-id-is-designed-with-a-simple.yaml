document: rfc-5607
kind: design-rationale
summary: Management-Policy-Id is designed with a simple, flat namespace (no hierarchy or structure) analogous to the Filter-Id (11) Attribute. Overloading it with multi-part specifiers (e.g., 'Access=remote, Level=7') is SHOULD NOT, because it leads to poor multi-vendor interoperability; a Vendor Specific (26) Attribute is preferred for structured policies.
section: "6.3"
topics:
    - radius
