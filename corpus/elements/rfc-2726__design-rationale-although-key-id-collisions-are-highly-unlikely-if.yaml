document: rfc-2726
kind: design-rationale
summary: Although key ID collisions are highly unlikely, if a key-cert with the same ID as an existing maintainer's key already exists in the database, the maintainer should contact RIPE NCC and may need to generate a new key. This edge case is acknowledged but considered non-critical.
section: "4"
topics:
