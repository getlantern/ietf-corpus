document: rfc-2746
kind: design-rationale
summary: 'RSVP is applied recursively over the tunnel: Rentry acts as a PATH message source and Rexit as a RESV source for a tunnel-level session that parallels each end-to-end session. This lets the tunnel appear as a single logical RSVP-controllable link to the wider network.'
section: "2.2"
