document: rfc-3635
kind: design-rationale
summary: dot3StatsDuplexStatus is intentionally redundant with ifMauType. Although redundant objects are generally discouraged, this object allows a management application to determine duplex status without knowing every possible ifMauType value, which was considered sufficiently valuable to justify the redundancy.
section: "4"
topics:
