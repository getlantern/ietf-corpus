document: rfc-2538
kind: security-consideration
summary: If certificates are retrieved from a secure DNS zone with DNS security checking enabled and verified by DNSSEC, the key within the retrieved certificate MAY be trusted without verifying the certificate chain, if this conforms with the user's security policy.
