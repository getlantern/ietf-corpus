document: rfc-3017
kind: protocol-element
summary: 'The ''family'' attribute of the address element defines the address family: E164 for ITU-T E.164 (PSTN, SMDS, Frame Relay, ATM) or X121 for ITU-T X.121 (X.25, Frame Relay). This attribute is REQUIRED. Additional values may be registered by IANA.'
section: 6.1.1.1
