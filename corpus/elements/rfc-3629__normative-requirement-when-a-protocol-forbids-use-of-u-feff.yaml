document: rfc-3629
kind: normative-requirement
summary: When a protocol forbids use of U+FEFF as a signature for a given protocol element, any initial U+FEFF in that element MUST be interpreted as 'ZERO WIDTH NO-BREAK SPACE'. When a protocol does NOT forbid it, implementations SHOULD be prepared to handle a signature and react appropriately.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
