document: rfc-2634
kind: normative-requirement
summary: The message originator MUST populate the receiptsTo field with a GeneralNames for each entity to whom the recipient should send the signed receipt. If the originator wants a receipt itself, it MUST include a GeneralNames for itself in the receiptsTo field.
section: "2.2"
rfc2119_level: MUST
topics:
    - email
    - security
