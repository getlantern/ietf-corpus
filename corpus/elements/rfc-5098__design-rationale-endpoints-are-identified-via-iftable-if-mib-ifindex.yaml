document: rfc-5098
kind: design-rationale
summary: Endpoints are identified via ifTable (IF-MIB) ifIndex values rather than a proprietary indexing scheme. This allows management systems to track each MTA telephone port as a distinct interface, enabling multi-vendor and multi-country deployments to use a common management framework.
