document: rfc-4819
kind: wire-format
summary: 'The ''list'' response returns zero or more packets each encoded as: string ''publickey'', string public key algorithm name, string public key blob, uint32 attribute-count, followed by attribute-count repetitions of {string attrib-name, string attrib-value}. A final status packet MUST be sent after all responses.'
section: "4.3"
rfc2119_level: MUST
