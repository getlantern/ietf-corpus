document: rfc-2543
kind: security-consideration
summary: REGISTER requests MUST be authenticated because they allow an attacker to redirect future requests to a fraudulent address. An unauthenticated REGISTER can cause calls intended for the victim to be delivered to the attacker.
section: "13.2"
topics:
