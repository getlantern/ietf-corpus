document: rfc-7208
kind: protocol-element
summary: 'SPF macros allow dynamic expansion in domain specifications using parameters: %{s} (sender), %{l} (local-part), %{o} (sender domain), %{d} (current domain), %{i} (client IP), %{h} (HELO domain), %{v} (''in-addr'' or ''ip6''). Uppercase variants produce URL-encoded output. The ''r'' transformer reverses dot-split parts; DIGIT transformers select right-hand parts.'
section: "7.2"
