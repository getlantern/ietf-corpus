document: rfc-5913
kind: state-machine
summary: 'Wrap Up Clearance procedure: verify effective-clearance has at most one value; if permitted-clearances is empty list, return empty effective-clearance with success; if all-clearances, return success; otherwise intersect classList bits (AND) and securityCategories between effective-clearance and permitted-clearances for the matching policyId. If no classList bits remain set, return empty effective-clearance.'
section: 4.1.1.5.1
