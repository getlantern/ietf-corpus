document: rfc-4182
kind: design-rationale
summary: 'The original RFC 3032 restriction was removed because it caused problems in practice: binding Explicit NULL to a FEC was only safe when every incoming packet for that FEC contained exactly one label stack entry (''Condition L''), a condition that rarely holds and cannot generally be determined in advance.'
