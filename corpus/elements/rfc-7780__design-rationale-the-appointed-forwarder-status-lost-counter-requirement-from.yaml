document: rfc-7780
kind: design-rationale
summary: The Appointed Forwarder Status Lost Counter requirement from RFC 6325 is relaxed to allow the counter to match an adjacent VLAN ID's value rather than always incrementing strictly, enabling greater aggregation of Interested VLANs and Spanning Tree Roots sub-TLVs at the cost of slightly reduced data-plane learning optimization.
section: "11"
topics:
    - routing
