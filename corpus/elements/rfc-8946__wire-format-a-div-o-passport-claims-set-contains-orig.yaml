document: rfc-8946
kind: wire-format
summary: A "div-o" PASSporT claims set contains "orig", "dest", "iat", "div", and an "opt" field holding the base64url-encoded full-form PASSporT that was retargeted. The "opt" value MUST be a quoted full-form PASSporT per RFC 8225 Appendix A; compact form is prohibited.
