document: rfc-3736
kind: normative-requirement
summary: A DHCP server that is only able to provide stateless configuration information through an Information-request/Reply message exchange MUST discard any other DHCP messages it receives, specifically any messages other than Information-Request or Relay-forward.
section: "6"
rfc2119_level: MUST
