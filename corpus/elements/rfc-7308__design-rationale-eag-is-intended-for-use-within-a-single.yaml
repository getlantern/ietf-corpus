document: rfc-7308
kind: design-rationale
summary: EAG is intended for use within a single domain only. No signaling analog (e.g., SESSION_ATTRIBUTE C-Type 1 or PCEP LSPA object) is defined, so EAG-based path constraints can only be applied at the ingress node.
