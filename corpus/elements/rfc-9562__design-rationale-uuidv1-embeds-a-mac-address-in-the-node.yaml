document: rfc-9562
kind: design-rationale
summary: UUIDv1 embeds a MAC address in the node field, exposing hardware manufacturer details and undermining privacy. Additionally, virtual machines and containers have made MAC address uniqueness unreliable. UUIDv6 and UUIDv7 recommend pseudorandom node values with the multicast bit set to address both concerns.
section: "2.1"
topics:
    - privacy
    - security
