document: rfc-2605
kind: interoperability-note
summary: CLDAP does not use binds; bind-related counters (dsApplIfUnauthBinds, dsApplIfSimpleAuthBinds, dsApplIfStrongAuthBinds, dsApplIfBindSecurityErrors) are inaccessible for CLDAP interfaces. CLDAP also does not return referrals, so dsApplIfReferrals is inaccessible.
section: "5"
topics:
