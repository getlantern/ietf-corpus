document: rfc-8201
kind: security-consideration
summary: A malicious party can send false Packet Too Big messages claiming a PMTU larger than reality, causing temporary packet drops and black-hole connections. The defense is that a node must never raise its PMTU estimate based on a PTB message.
section: "6"
