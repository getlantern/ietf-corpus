document: rfc-2720
kind: security-consideration
summary: Control Group objects (managing meter resources) and Flow Table objects (containing collected traffic data) may be sensitive. Even GET access should be controlled; SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) is recommended. SNMPv1 alone is not a secure environment.
section: "5.1"
topics:
    - snmp
    - measurement
    - security
