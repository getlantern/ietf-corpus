document: rfc-9643
kind: design-rationale
summary: The 'tcp-client-grouping' and 'tcp-server-grouping' groupings intentionally avoid wrapping their nodes in a named container (e.g., 'tcp-client-parameters') to provide maximum flexibility to consuming models, even though this creates potential for name conflicts when stacking 'uses' statements.
