document: rfc-7232
kind: normative-requirement
summary: A server that is not the origin server for the target resource and cannot act as a cache MUST NOT evaluate the conditional request header fields defined by this specification, and MUST forward them if the request is forwarded. A server MUST also ignore conditional request header fields when received with CONNECT, OPTIONS, or TRACE.
section: "5"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
