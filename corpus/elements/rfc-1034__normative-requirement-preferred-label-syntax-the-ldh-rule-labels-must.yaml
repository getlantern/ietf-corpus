document: rfc-1034
kind: normative-requirement
summary: 'Preferred label syntax (the LDH rule): labels must start with a letter, end with a letter or digit, and contain only letters, digits, and hyphens as interior characters. Labels must be 63 characters or less. Names violating these rules may break older software.'
section: "3.5"
rfc2119_level: SHOULD
topics:
