document: rfc-6455
kind: protocol-element
summary: 'Subprotocol negotiation uses Sec-WebSocket-Protocol: the client lists acceptable subprotocols in preference order; the server selects at most one and echoes it. If the server returns a subprotocol not offered by the client, the client MUST fail the connection. Subprotocol names SHOULD use reverse-domain naming (e.g., ''chat.example.com'') to avoid collisions.'
section: "1.9"
topics:
    - websocket
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
