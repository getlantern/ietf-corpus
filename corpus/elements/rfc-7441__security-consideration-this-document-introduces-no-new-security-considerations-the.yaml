document: rfc-7441
kind: security-consideration
summary: This document introduces no new security considerations. The security considerations of RFC 6388 (mLDP) and RFC 6514 (MVPN-BGP) are applicable, as this document only specifies a method for encoding mLDP FEC Elements in BGP Update NLRI fields already covered by those specifications.
