document: rfc-8664
kind: protocol-element
summary: A new Path Setup Type (PST=1) is defined for Segment Routing. PCEP speakers indicate SR support by including PST=1 in the PATH-SETUP-TYPE-CAPABILITY TLV of the OPEN object, and MUST also include the SR-PCE-CAPABILITY sub-TLV when doing so.
