document: rfc-2128
kind: protocol-element
summary: dialCtlPeerCallInformation notification is sent when a successful call clears or a failed call attempt ultimately fails after all retries. Only one trap is sent between successful call attempts; subsequent retry failures do not generate additional traps.
section: "3.1"
