document: rfc-7851
kind: security-consideration
summary: Diagnostic information must be carefully authorized because attackers can use it to analyze overlay topology, fingerprint peers, and target key nodes. Networks where anonymity is critical may find diagnostics problematic or undesirable, as defenses against fingerprinting are very difficult.
section: "8"
topics:
