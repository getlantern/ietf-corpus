document: rfc-7301
kind: security-consideration
summary: Protocol identifiers that may leak personally identifiable information, enable profiling, or leak sensitive information SHOULD NOT be used in TLS configurations where the identifier would be visible in the clear. Documents specifying such identifiers SHOULD recommend against unsafe use.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - tls
    - security
    - privacy
