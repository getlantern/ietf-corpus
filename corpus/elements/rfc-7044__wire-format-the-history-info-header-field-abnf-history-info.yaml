document: rfc-7044
kind: wire-format
summary: 'The History-Info header field ABNF: `History-Info = "History-Info" HCOLON hi-entry *(COMMA hi-entry)`, where each hi-entry is a name-addr followed by optional hi-param (hi-index, hi-target-param, or hi-extension). The hi-index is a dot-separated sequence of nonneg integers (e.g., 1.1.2); hi-target-param is one of rc, mp, or np, each carrying an index-val reference.'
section: "5"
topics:
