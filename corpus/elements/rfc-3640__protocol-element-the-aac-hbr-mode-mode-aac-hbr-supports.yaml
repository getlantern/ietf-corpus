document: rfc-3640
kind: protocol-element
summary: The AAC-hbr mode (mode=AAC-hbr) supports variable-size AAC frames up to 8191 octets, with fragmentation and interleaving permitted. AU-headers use 13 bits for AU-size and 3 bits for AU-Index(-delta), giving a 2-octet AU-header; each AU-Index field MUST be coded with value 0.
section: 3.3.6
topics:
    - rtp
    - realtime
