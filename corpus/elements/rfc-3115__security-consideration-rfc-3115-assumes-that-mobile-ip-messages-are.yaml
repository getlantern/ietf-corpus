document: rfc-3115
kind: security-consideration
summary: RFC 3115 assumes that Mobile IP messages are authenticated using methods defined by the Mobile IP protocol (RFC 2002). No additional security requirements are imposed by this document beyond those already in Mobile IP, and CVSE/NVSE TLVs are expected to be covered by existing Mobile IP authenticators.
section: "5"
topics:
    - mobility
    - security
