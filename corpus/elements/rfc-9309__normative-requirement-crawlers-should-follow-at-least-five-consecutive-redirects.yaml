document: rfc-9309
kind: normative-requirement
summary: Crawlers SHOULD follow at least five consecutive redirects, even across authorities. If a robots.txt file is reached within five redirects, it MUST be fetched, parsed, and its rules followed in the context of the initial authority.
section: 2.3.1.2
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
