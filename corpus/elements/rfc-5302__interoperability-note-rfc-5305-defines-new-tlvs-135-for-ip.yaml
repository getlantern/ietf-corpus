document: rfc-5302
kind: interoperability-note
summary: RFC 5305 defines new TLVs (135 for IP prefixes, new link TLV) with wider metric space and sub-TLV extensibility, which subsumes the up/down functionality defined here. However, RFC 5305 requires a network-wide upgrade, whereas this document's solution requires only upgrading L1L2 routers in selected areas.
