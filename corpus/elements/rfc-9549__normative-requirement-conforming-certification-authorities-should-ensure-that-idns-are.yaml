document: rfc-9549
kind: normative-requirement
summary: Conforming Certification Authorities SHOULD ensure that IDNs are valid according to IDNA2008 (RFC 5890 through RFC 5893 and their updates); failure to use valid A-labels may yield a domain name that cannot be correctly represented in DNS.
