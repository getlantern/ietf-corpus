summary: 'Tags 54 and 52 each support three encoding forms: Address Format (tag applied to a byte string), Prefix Format (tag applied to a two-element array [prefix-length, truncated-bytes]), and Interface Format (tag applied to a two-element array [full-address-bytes, prefix-length] with an optional third zone-identifier element).'
