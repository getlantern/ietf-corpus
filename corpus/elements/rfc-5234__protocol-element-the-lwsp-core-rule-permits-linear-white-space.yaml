document: rfc-5234
kind: protocol-element
summary: The LWSP core rule permits linear white space including lines containing only whitespace via '*(WSP / CRLF WSP)'. The spec warns this is no longer legal in mail headers and has caused interoperability problems; it should not be used when defining mail headers.
section: B.1
topics:
    - email
