document: rfc-6798
kind: interoperability-note
summary: The 2-point PDV metric includes the effect of clock frequency offsets between sender and receiver, making it primarily applicable to synchronized networks (e.g., those carrying ISDN over RTP per RFC 4040) rather than networks relying on independent clocks.
section: "3.3"
topics:
    - rtp
    - realtime
