summary: StorageParameters is a mandatory map in BlockParameters containing 'ticks-per-second' (sub-second timing resolution), 'max-block-items' (maximum array sizes, for decoder resource planning), 'storage-hints' (StorageHints map), 'opcodes' (array of recorded OPCODEs 0-15), and 'rr-types' (array of recorded RR TYPEs 0-65535).
