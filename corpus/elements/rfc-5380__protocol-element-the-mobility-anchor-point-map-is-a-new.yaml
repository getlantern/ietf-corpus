document: rfc-5380
kind: protocol-element
summary: The Mobility Anchor Point (MAP) is a new Mobile IPv6 node located in a visited network that acts as a local home agent. It intercepts packets addressed to registered mobile nodes and tunnels them to the mobile node's current on-link CoA (LCoA), limiting Mobile IPv6 signalling outside the local domain.
section: "1"
topics:
    - mobility
    - ip
