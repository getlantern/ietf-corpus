document: rfc-1989
kind: wire-format
summary: 'The LQR packet consists of twelve 32-bit fields transmitted on-wire: Magic-Number, LastOutLQRs, LastOutPackets, LastOutOctets, PeerInLQRs, PeerInPackets, PeerInDiscards, PeerInErrors, PeerInOctets, PeerOutLQRs, PeerOutPackets, PeerOutOctets. An additional five 32-bit SaveIn fields (SaveInLQRs, SaveInPackets, SaveInDiscards, SaveInErrors, SaveInOctets) are appended by the Rx process in an implementation-dependent manner and not transmitted.'
section: "2.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
