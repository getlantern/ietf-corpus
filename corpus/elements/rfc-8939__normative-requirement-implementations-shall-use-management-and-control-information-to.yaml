document: rfc-8939
kind: normative-requirement
summary: Implementations SHALL use management and control information to select outgoing interfaces and next hops for DetNet flow packets. The use of ECMP for a single DetNet flow is NOT RECOMMENDED; ECMP MAY be used for non-DetNet flows within a DetNet domain.
section: "5.2"
rfc2119_level: RECOMMENDED
topics:
