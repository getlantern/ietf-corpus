document: rfc-3720
kind: normative-requirement
summary: Each iSCSI node MUST have an iSCSI name. Initiators and targets MUST support receipt of iSCSI names up to 223 bytes. The initiator MUST present both its InitiatorName and the TargetName in the first Login request of a new session or connection (TargetName MAY be omitted only for discovery sessions).
section: 3.2.6.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
