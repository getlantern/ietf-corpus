document: rfc-1793
kind: normative-requirement
summary: A router implementing Sections 2 and 3 MUST always treat virtual links as demand circuits, negotiating Hello suppression and using demand circuit flooding. Virtual link state is determined by existence of an intra-area path through the transit area, not by data-link diagnostics.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
