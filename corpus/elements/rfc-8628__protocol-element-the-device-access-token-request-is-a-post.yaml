document: rfc-8628
kind: protocol-element
summary: The device access token request is a POST to the token endpoint with grant_type set to 'urn:ietf:params:oauth:grant-type:device_code', plus 'device_code' (REQUIRED) and 'client_id' (REQUIRED if not authenticating). The client polls this endpoint repeatedly until the user approves or an error occurs.
section: "3.4"
topics:
    - oauth
    - http
