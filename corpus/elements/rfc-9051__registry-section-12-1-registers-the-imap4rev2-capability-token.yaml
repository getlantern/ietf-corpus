summary: Section 12.1 registers the 'IMAP4rev2' capability token in the IANA IMAP Capabilities Registry, replacing the 'IMAP4rev1' token for servers implementing this revision. All previously registered IMAP4rev1 extensions are also valid IMAP4rev2 extensions unless otherwise noted.
