document: rfc-6409
kind: normative-requirement
summary: The MSA SHOULD reject messages with illegal syntax in a sender or recipient SMTP envelope address (reply code 501), and SHOULD similarly reject messages with illegal address syntax in header address fields if the MSA examines or alters the message text.
section: "5.1"
rfc2119_level: SHOULD
