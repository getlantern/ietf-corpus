document: rfc-2941
kind: security-consideration
summary: Once encryption is disabled, an attacker may hijack the telnet stream and interfere with attempts to restart encryption. This is why clients should not permit encryption to be turned off and must terminate the connection if re-enabling encryption fails.
section: "5"
topics:
    - security
    - crypto
