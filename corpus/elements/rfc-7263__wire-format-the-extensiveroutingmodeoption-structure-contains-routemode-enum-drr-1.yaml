summary: 'The ExtensiveRoutingModeOption structure contains: RouteMode (enum, DRR=1), OverlayLinkType (transport type), IpAddressPort (sending peer''s transport address for DRR responses), and Destination (variable-length list, 1 to 255 entries). Reuses existing RELOAD types from RFC 6940 Sections 6.5.1.1, 6.3.2.2, and 6.3.1.1.'
