document: rfc-8834
kind: normative-requirement
summary: The extended secure RTP profile for RTCP-based feedback (RTP/SAVPF, RFC 5124) as extended by RFC 7007 MUST be implemented. WebRTC endpoints MUST NOT send packets using the basic RTP/AVP or RTP/AVPF profiles; they MUST employ RTP/SAVPF for all RTP and RTCP packets.
section: "4.2"
rfc2119_level: MUST
topics:
    - webrtc
    - rtp
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
