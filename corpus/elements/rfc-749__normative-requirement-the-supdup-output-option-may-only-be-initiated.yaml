document: rfc-749
kind: normative-requirement
summary: The SUPDUP-OUTPUT option may only be initiated by the server TELNET process. The server sends IAC WILL SUPDUP-OUTPUT; the user TELNET process must then accept (IAC DO) or refuse (IAC DON'T).
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
