document: rfc-7510
kind: normative-requirement
summary: For IPv6, the UDP checksum MUST be implemented and MUST be used as specified in RFC 768 and RFC 2460 for MPLS-in-UDP traffic unless one of the three defined exceptions for UDP zero-checksum mode applies and all additional requirements in Section 3.1 are satisfied.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - udp
    - ip
