document: rfc-4018
kind: design-rationale
summary: In the storage management server model, both iSCSI clients and servers act as SLP UAs while the management server acts as SA, in contrast to the target discovery model where the iSCSI server is the SA. This allows management services to register targets on behalf of target devices.
section: "4.2"
