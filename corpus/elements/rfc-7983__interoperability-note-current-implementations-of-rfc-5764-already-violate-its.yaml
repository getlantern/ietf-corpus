document: rfc-7983
kind: interoperability-note
summary: Current implementations of RFC 5764 already violate its demultiplexing rules for first-byte values 64–127 (inclusive) by parsing them as TURN channel data instead of rejecting them. RFC 7983 retroactively allocates 64–79 to TURN to align the standard with deployed practice.
section: "6"
topics:
    - rtp
    - nat
