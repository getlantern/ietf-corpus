document: rfc-9293
kind: wire-format
summary: 'The TCP header contains: Source Port (16 bits), Destination Port (16 bits), Sequence Number (32 bits), Acknowledgment Number (32 bits), Data Offset (4 bits indicating 32-bit words in header), Reserved (4 bits, must be zero), control bits CWR/ECE/URG/ACK/PSH/RST/SYN/FIN (1 bit each), Window (16 bits, unsigned), Checksum (16 bits), Urgent Pointer (16 bits), followed by variable-length Options padded to 32-bit boundary, then Data.'
section: "3.1"
