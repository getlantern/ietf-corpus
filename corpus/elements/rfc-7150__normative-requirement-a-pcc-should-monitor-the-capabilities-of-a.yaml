document: rfc-7150
kind: normative-requirement
summary: A PCC SHOULD monitor the capabilities of a PCE (via discovery or negative responses) and SHOULD NOT include vendor information in a PCReq to a PCE that it believes does not support the information and will not forward the request to a PCE that does.
section: "6.6"
rfc2119_level: SHOULD NOT
topics:
    - routing
