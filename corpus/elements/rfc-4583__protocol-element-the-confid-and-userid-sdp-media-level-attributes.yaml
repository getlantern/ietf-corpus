document: rfc-4583
kind: protocol-element
summary: 'The ''confid'' and ''userid'' SDP media-level attributes are defined to carry a conference ID and user ID respectively, provided by the floor control server. ABNF: confid-attribute = ''a=confid:'' conference-id; userid-attribute = ''a=userid:'' user-id, where each is a token (integer representation).'
