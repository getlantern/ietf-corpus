summary: 'LDAPv3 is specified by nine RFCs: RFC 2251 (wire protocol), RFC 2252 (attribute syntax), RFC 2253 (UTF-8 DN representation), RFC 2254 (search filters), RFC 2255 (URL format), RFC 2256 (X.500 user schema), RFC 2829 (authentication methods), RFC 2830 (TLS extension), and RFC 3377 (this document). Other documents should identify LDAPv3 by normative reference to RFC 3377.'
