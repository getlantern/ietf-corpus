document: rfc-9181
kind: design-rationale
summary: The 'underlay-transport' grouping supports both abstract transport identifiers (VPN+, network slices, virtual networks) and explicit ordered protocol lists, reflecting that some deployments configure underlay via abstraction layers while others specify exact protocol stacks. The 'protocol' leaf-list is ordered-by user to preserve operator-specified priority.
