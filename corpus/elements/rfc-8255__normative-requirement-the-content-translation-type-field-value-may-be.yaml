document: rfc-8255
kind: normative-requirement
summary: The Content-Translation-Type field value MAY be used for further part selection when the user prefers (for example) a human-verified original over a machine translation into their first language. If no translation-type preference is available, the field values MAY be ignored.
section: "4"
rfc2119_level: MAY
