document: rfc-779
kind: design-rationale
summary: The option was motivated by the NAME/FINGER protocol (RFC 742), which lists logged-in users with locations. For network users, only the originating site name was available; SEND-LOCATION allows the client to supply a richer physical location to supplement the site name.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
