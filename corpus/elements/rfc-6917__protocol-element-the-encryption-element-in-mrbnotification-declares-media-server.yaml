document: rfc-6917
kind: protocol-element
summary: The <encryption> element in <mrbnotification> declares Media Server support for SRTP media encryption per RFC 3711. Its presence implies DTLS-SRTP (RFC 5763) support. The element has no attributes or child elements.
section: 5.1.5.21
topics:
