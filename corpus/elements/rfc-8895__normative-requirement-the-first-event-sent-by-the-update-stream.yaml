document: rfc-8895
kind: normative-requirement
summary: The first event sent by the update stream server MUST be a control update message carrying the URI of the stream control service (or null if stream control is not supported). No data update events may precede it.
section: 6.7.1
rfc2119_level: MUST
topics:
