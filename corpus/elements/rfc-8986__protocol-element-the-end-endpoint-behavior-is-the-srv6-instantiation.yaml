document: rfc-8986
kind: protocol-element
summary: The End (Endpoint) behavior is the SRv6 instantiation of a Prefix-SID. Upon receipt, the node decrements Hop Limit and Segments Left, updates the IPv6 DA with Segment List[Segments Left], and submits the packet to the egress IPv6 FIB lookup.
