document: rfc-7750
kind: normative-requirement
summary: The Control-Client MUST set the DSCP and ECN Monitoring flag in the Modes field of the Setup Response message if it agrees to monitor DSCP and ECN on some or all test sessions invoked with the control connection.
section: "2.1"
rfc2119_level: MUST
topics:
