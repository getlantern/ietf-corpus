document: rfc-8377
kind: protocol-element
summary: Adjacency for topology zero is announced using the Extended Intermediate System Reachability TLV (#22) in core LSPs, maintaining compatibility with legacy topology-ignorant RBridges. Adjacency for non-zero topologies is announced using MT Reachable Intermediate Systems TLV (#222) as specified in RFC 5120.
section: "3.1"
topics:
    - routing
