summary: The OID '2.16.840.1.113730.3.4.18' is reserved and registered for the Proxy Authorization Control as an LDAP Protocol Mechanism per RFC 3383. A result code (123) has been assigned by IANA for the case where the server does not execute a request using the proxy authorization identity.
