document: rfc-1577
kind: normative-requirement
summary: The default MTU size for IP members operating over the ATM network SHALL be 9180 octets. The LLC/SNAP header is 8 octets, so the default ATM AAL5 PDU size is 9188 octets. Non-default values may be used only if all LIS members are configured with that value.
section: "5"
rfc2119_level: REQUIRED
topics:
    - ip
