document: rfc-8777
kind: normative-requirement
summary: AMTRELAY RRs SHOULD be added to reverse IP zones (in-addr.arpa for IPv4, ip6.arpa for IPv6). Records MAY also appear in other zones to support delegation, but reverse IP lookup is required for most AMT gateway use cases.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - dns
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
