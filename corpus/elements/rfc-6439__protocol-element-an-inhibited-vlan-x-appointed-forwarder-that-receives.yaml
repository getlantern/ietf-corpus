document: rfc-6439
kind: protocol-element
summary: An inhibited VLAN-x Appointed Forwarder that receives a TRILL Data frame for VLAN-x decapsulates it normally but does not output it to the inhibited link (though it may forward to other links for multi-destination frames). An inhibited forwarder that receives a VLAN-x native frame from the link ignores it except for address learning.
section: "4"
topics:
    - routing
