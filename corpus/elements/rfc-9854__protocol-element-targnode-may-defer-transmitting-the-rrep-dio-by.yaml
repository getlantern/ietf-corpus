document: rfc-9854
kind: protocol-element
summary: TargNode MAY defer transmitting the RREP-DIO by RREP_WAIT_TIME (default one-quarter of the duration encoded in the L field; 0 when L=0) to allow higher-quality (lower-Rank) RREQ-DIOs to arrive. Smaller values favor faster route formation; larger values favor better-Rank routes.
section: "6.3"
topics:
    - routing
