document: rfc-2646
kind: normative-requirement
summary: When generating Format=Flowed text, lines SHOULD be shorter than 80 characters (counting the trailing space but not the CRLF). Lines of 72 or fewer characters are suggested for paragraphs longer than 79 characters total.
