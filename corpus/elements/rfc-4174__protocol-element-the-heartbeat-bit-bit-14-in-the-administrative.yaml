document: rfc-4174
kind: protocol-element
summary: 'The Heartbeat bit (bit 14) in the Administrative Flags Field controls the interpretation of a1–a4 and b1–b4: if set to one, a1–a4 contains the heartbeat multicast address and b1–b4 contains the primary iSNS server address; if zero, a1–a4 contains the primary iSNS server address.'
section: "2.3"
topics:
    - ip
    - multicast
