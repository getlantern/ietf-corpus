document: rfc-6734
kind: security-consideration
summary: Transporting keys is a security-sensitive action. Some forms of keying material are already protected and can be sent safely over the open Internet, but unprotected keying material must only be sent via mutually authenticated TLS or IPsec. The security considerations of the Diameter base protocol (RFC 6733) and RFC 4072 Section 8.4 also apply.
section: "4"
topics:
    - diameter
    - crypto
    - security
    - tls
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
