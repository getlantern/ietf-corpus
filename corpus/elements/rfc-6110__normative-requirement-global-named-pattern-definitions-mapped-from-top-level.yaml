document: rfc-6110
kind: normative-requirement
summary: Global named pattern definitions (mapped from top-level YANG groupings) MUST be placed as children of the outer <rng:grammar> element, and the RELAX NG schema file containing them MUST NOT define any namespace via the @ns attribute. Non-global named pattern definitions MUST be placed as children of the corresponding embedded <rng:grammar> element.
section: "8.2"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
