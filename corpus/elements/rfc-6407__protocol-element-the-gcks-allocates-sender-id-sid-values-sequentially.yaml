document: rfc-6407
kind: protocol-element
summary: The GCKS allocates Sender-ID (SID) values sequentially from a SID-counter to group members acting as senders on counter-mode Data-Security SAs. One SID is allocated automatically per GROUPKEY-PULL; additional SIDs may be requested via SENDER_ID_REQUEST in a GAP payload. New SIDs are allocated on every re-registration.
section: "3.5"
topics:
    - ipsec
    - crypto
    - security
