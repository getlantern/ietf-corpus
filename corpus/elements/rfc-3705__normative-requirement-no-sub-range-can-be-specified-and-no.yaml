document: rfc-3705
kind: normative-requirement
summary: No sub-range can be specified and no DEFVAL clause can be used in object definitions based on these textual conventions, because Counter64 does not permit sub-ranges or DEFVALs. Objects of these types also cannot appear in an INDEX clause.
section: "2"
rfc2119_level: MUST NOT
