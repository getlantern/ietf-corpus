summary: The algorithm requirements in this document mirror those in RFC 5959, RFC 6033, RFC 6160, RFC 6161, and RFC 6162 except for the content-encryption algorithm (AES-CBC here vs. AES Key Wrap with MLI there) and the key-wrap algorithm (AES Key Wrap here vs. AES Key Wrap with MLI there).
