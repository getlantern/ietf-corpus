document: rfc-2742
kind: protocol-element
summary: agentxSessionTimeout (INTEGER 0..255 seconds) is taken from the o.timeout field of the agentx-Open-PDU. A value of zero indicates the master agent's default timeout (agentxDefaultTimeout) applies; non-zero values may be overridden by per-region agentxRegTimeout.
