document: rfc-5056
kind: protocol-element
summary: A 'secure channel' is defined as a packet, datagram, octet stream connection, or sequence of connections between two end-points that affords cryptographic integrity and, optionally, confidentiality to data exchanged over it. The channel is assumed to be secure; if an attacker can successfully cryptanalyze its session keys, then the channel is not secure.
section: "2"
topics:
    - security
    - crypto
