document: rfc-2830
kind: normative-requirement
summary: A SASL EXTERNAL Bind MUST fail with inappropriateAuthentication if no TLS session has been established and there is no other external authentication source, or if the server did not request client credentials during TLS.
section: 5.1.2.3
rfc2119_level: MUST
