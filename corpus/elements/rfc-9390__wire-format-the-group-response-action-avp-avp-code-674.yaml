document: rfc-9390
kind: wire-format
summary: 'The Group-Response-Action AVP (AVP Code 674) is of type Unsigned32 and instructs the receiver how to issue follow-up exchanges: ALL_GROUPS (1) means a single message for all groups, PER_GROUP (2) means one message per group, and PER_SESSION (3) means one message per impacted session.'
section: "7.4"
