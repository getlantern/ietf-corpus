document: rfc-2574
kind: protocol-element
summary: Discovery is initiated by sending a Request with securityLevel noAuthNoPriv, zero-length msgUserName, and zero-length msgAuthoritativeEngineID. The authoritative engine replies with a Report PDU containing its snmpEngineID in msgAuthoritativeEngineID and the usmStatsUnknownEngineIDs counter. Time synchronization follows via a second authenticated Request with boots/time set to zero.
section: "4"
topics:
