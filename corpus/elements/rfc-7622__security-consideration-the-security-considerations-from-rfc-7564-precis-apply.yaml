summary: 'The security considerations from RFC 7564 (PRECIS) apply to IdentifierClass and FreeformClass usage for localparts and resourceparts; those from RFC 5890 apply to IDNA domainparts; and those from Unicode Technical Standard #39 (UTS39) apply to use of Unicode characters in XMPP addresses.'
