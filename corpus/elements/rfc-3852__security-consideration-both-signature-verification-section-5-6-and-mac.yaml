document: rfc-3852
kind: security-consideration
summary: Both signature verification (Section 5.6) and MAC verification (Section 9.3) require the recipient to independently recompute digest and authentication values without trusting originator-supplied values. This protects against an attacker who supplies a crafted digest value to bypass integrity checks.
section: "14"
topics:
    - crypto
    - security
