document: rfc-5189
kind: protocol-element
summary: The Session Termination (ST) transaction is a mandatory configuration transaction initiated by the agent to close a MIDCOM session. After sending a successful reply, the middlebox will not send further messages to or process further requests from the agent in that session; established policy rules are retained until their lifetimes expire.
section: 2.2.2
topics:
