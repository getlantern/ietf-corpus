document: rfc-9326
kind: security-consideration
summary: An attacker may track information in DEX headers (Flow ID and Sequence Number) for reconnaissance purposes, potentially compromising privacy aspects such as customer identities. This can be mitigated by careful allocation of the Flow ID and Sequence Number space.
