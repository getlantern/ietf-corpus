document: rfc-3485
kind: interoperability-note
summary: 'Best compression performance from the dictionary is expected for SIP messages that follow the recommended formatting guidelines (e.g., header field names formatted as ''[CRLF]Header-Name: value''). Messages that conform to SIP ABNF but use non-standard whitespace or tabulator before the colon will benefit less from the dictionary.'
