document: rfc-6673
kind: security-consideration
summary: Active measurement does not threaten user data confidentiality since it generates synthetic test packets rather than sampling user traffic. Passive measurement must restrict attention to headers of interest and protect any temporarily stored payload data.
section: "9.2"
topics:
