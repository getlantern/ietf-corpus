document: rfc-9956
kind: protocol-element
summary: 'NQB sender eligibility requires that a microflow send non-bursty traffic at a data rate no more than approximately 1% of the typical network path capacity (e.g., 500 kbps when access network rates are ~50 Mbps), transmitted in a smooth (paced) manner where IP bytes in any interval T satisfy: bytes ≤ (R * T) + MTU. Microflows are unidirectional; an application may have some NQB-eligible and some non-eligible microflows.'
section: "4"
topics:
    - diffserv
    - qos
    - congestion
