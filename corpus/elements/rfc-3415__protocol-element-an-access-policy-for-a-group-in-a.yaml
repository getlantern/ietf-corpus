document: rfc-3415
kind: protocol-element
summary: 'An access policy for a group in a given context is expressed as three named MIB views: a read-view (for Read Class PDUs), a write-view (for Write Class PDUs), and a notify-view (for Notification Class PDUs). An empty-string viewName means no access is granted for that operation type.'
section: "2.5"
topics:
