document: rfc-5798
kind: normative-requirement
summary: The Virtual Router Master MUST respond to ARP requests (IPv4) or ND Neighbor Solicitation messages (IPv6) with the virtual MAC address, and MUST NOT use its physical MAC address in these responses.
section: 8.1.2
rfc2119_level: MUST
