document: rfc-2206
kind: interoperability-note
summary: The RSVP MIB imports types (Port, SessionNumber, SessionType, Protocol, QosService, MessageSize, BitRate, BurstSize, intSrvFlowStatus) from INTEGRATED-SERVICES-MIB, making the Integrated Services MIB a prerequisite. Implementors must also support IF-MIB for the ifIndex type.
