document: rfc-7730
kind: security-consideration
summary: Compromise of a trust anchor private key permits unauthorized parties to masquerade as a trust anchor with potentially severe consequences. Reliance on an inappropriate or incorrect trust anchor has similarly severe consequences for RPKI validation.
