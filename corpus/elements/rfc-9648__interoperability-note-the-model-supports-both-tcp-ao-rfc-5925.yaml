document: rfc-9648
kind: interoperability-note
summary: The model supports both TCP-AO (RFC 5925) and legacy TCP MD5 (RFC 2385) authentication to accommodate the installed BGP base, with TCP-AO being the recommended choice. TCP-AO parameters include SendID and RecvID matching those defined in RFC 5925 Section 3.1.
section: "3.1"
