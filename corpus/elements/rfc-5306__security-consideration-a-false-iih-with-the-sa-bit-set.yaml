document: rfc-5306
kind: security-consideration
summary: A false IIH with the SA bit set could cause a neighbor to suppress advertisement of an IS adjacency indefinitely or intermittently, potentially causing loss of reachability to some destinations and increased frequency of LSP flooding and SPF computation.
