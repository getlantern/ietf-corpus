document: rfc-6378
kind: protocol-element
summary: 'The Protection Type (PT) field (2 bits) indicates the configured protection architecture: 3=bidirectional switching with permanent bridge (1+1), 2=bidirectional switching with selector bridge (1:1), 1=unidirectional switching with permanent bridge, 0=reserved. It SHOULD be validated for consistency across both endpoints.'
