document: rfc-5630
kind: normative-requirement
summary: A UA MUST NOT include both the SIPS and SIP versions of the same Contact in a single REGISTER request; it MUST use only the SIPS version. If all Contact header fields in a REGISTER are SIPS, the UAC MUST use SIPS AORs in the From and To header fields; if any Contact is non-SIPS, it MUST use SIP AORs.
section: 5.1.1.1
rfc2119_level: MUST NOT
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
