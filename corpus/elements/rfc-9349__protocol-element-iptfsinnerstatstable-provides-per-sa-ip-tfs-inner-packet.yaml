document: rfc-9349
kind: protocol-element
summary: 'iptfsInnerStatsTable provides per-SA IP-TFS inner packet statistics: txInnerPkts, txInnerOctets, rxInnerPkts, rxInnerOctets, and rxIncompleteInnerPkts. The rxIncompleteInnerPkts counter tracks fragments not received, misordering, or errors in outer packets.'
