document: rfc-9012
kind: wire-format
summary: 'The Embedded Label Handling sub-TLV (type 9) has a 1-octet Value: value 1 means the embedded NLRI label appears at the top of the payload MPLS stack; value 2 means the label is placed in the Virtual Network Identifier field or ignored. Any other value is malformed.'
