document: rfc-3339
kind: design-rationale
summary: Fractional seconds (time-secfrac) is the only optional element retained in the profile because it is rarely needed and expected only for applications requiring strict ordering or unusual precision; rarely used options are more likely to have parsing bugs discovered late.
section: "5.3"
