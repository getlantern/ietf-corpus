summary: The NBN (National Bibliography Number) URN namespace is an umbrella concept covering identifier systems used by national libraries for resources lacking other identifiers. URN:NBN syntax guarantees global uniqueness by requiring country codes and institutional identifiers within the Namespace Specific String (NSS), e.g., urn:nbn:fi-fe19981001.
