document: rfc-6107
kind: interoperability-note
summary: The LSP_TUNNEL_INTERFACE_ID object has class number 193, which per RFC 2205 causes nodes that do not understand it to ignore it but forward it unexamined. A back-level egress will reject Path messages with the new C-Types (2, 3, 4) using RFC 2205 procedures, informing the ingress that the egress is back-level.
section: "3.7"
topics:
    - mpls
    - routing
