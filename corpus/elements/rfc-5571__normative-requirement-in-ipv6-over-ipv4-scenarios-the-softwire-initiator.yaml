document: rfc-5571
kind: normative-requirement
summary: In IPv6-over-IPv4 scenarios, the Softwire Initiator MUST negotiate IPV6CP as defined in RFC 5072 after the optional authentication phase. For IPv4-over-IPv6 scenarios, the SI MUST negotiate IPCP per RFC 1332.
section: 5.2.4
rfc2119_level: MUST
topics:
