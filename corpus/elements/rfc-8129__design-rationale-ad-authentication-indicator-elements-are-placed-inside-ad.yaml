document: rfc-8129
kind: design-rationale
summary: AD-AUTHENTICATION-INDICATOR elements are placed inside AD-CAMMAC containers (rather than bare authorization data) because AD-CAMMAC allows both application services and the KDC to verify authenticity, addressing weaknesses of the older AD-KDC-ISSUED container.
