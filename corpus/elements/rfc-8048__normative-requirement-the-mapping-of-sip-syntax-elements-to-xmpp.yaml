document: rfc-8048
kind: normative-requirement
summary: 'The mapping of SIP syntax elements to XMPP MUST follow Table 2: PIDF basic status ''open'' MUST be mapped to <presence/> with no ''type'' attribute, and PIDF basic status ''closed'' MUST be mapped to <presence/> with type=''unavailable''. Content-Language maps to xml:lang, From/To map to from/to, and <note/> maps to <status/>.'
section: "6.3"
rfc2119_level: MUST
topics:
    - sip
    - realtime
