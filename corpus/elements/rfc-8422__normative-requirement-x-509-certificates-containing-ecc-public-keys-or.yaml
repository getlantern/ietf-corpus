document: rfc-8422
kind: normative-requirement
summary: X.509 certificates containing ECC public keys or signed with ECDSA MUST comply with RFC 3279. Certificates with EdDSA public keys or signatures MUST comply with RFC 8410. EdDSA keys using Ed25519 MUST use the ed25519 signature algorithm; Ed448 keys MUST use ed448. Ed25519, Ed25519ph, Ed448, and Ed448ph keys MUST NOT be used with ECDSA.
section: "5.9"
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
