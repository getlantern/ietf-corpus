document: rfc-9093
kind: protocol-element
summary: 'The ''dwdm-ch-spc-type'' base identity defines DWDM channel-spacing types with four derived values: dwdm-100ghz (100 GHz), dwdm-50ghz (50 GHz), dwdm-25ghz (25 GHz), and dwdm-12p5ghz (12.5 GHz), as standardized in RFC 6205 and ITU-T G.694.1.'
