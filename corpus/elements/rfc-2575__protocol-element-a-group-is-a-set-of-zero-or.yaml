document: rfc-2575
kind: protocol-element
summary: A group is a set of zero or more <securityModel, securityName> tuples. The combination of a securityModel and securityName maps to at most one groupName, identified via the vacmSecurityToGroupTable. Groups define uniform access rights for all securityNames they contain.
section: "2.1"
topics:
    - snmp
    - security
