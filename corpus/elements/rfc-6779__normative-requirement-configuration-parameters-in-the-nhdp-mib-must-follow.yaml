kind: normative-requirement
summary: Configuration parameters in the NHDP-MIB MUST follow the same constraints and default values defined in RFC 6130. For all configuration parameters, the same constraints as defined in RFC 6130 are to be followed; refer to RFC 5148 for jitter-related parameter guidance.
