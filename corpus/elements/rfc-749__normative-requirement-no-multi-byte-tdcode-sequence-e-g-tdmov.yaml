document: rfc-749
kind: normative-requirement
summary: No multi-byte TDCODE sequence (e.g., %TDMOV, %TDILP) may be split across SUPDUP-OUTPUT subnegotiation blocks; each block must contain only complete TDCODE sequences.
section: "5"
