document: rfc-4702
kind: normative-requirement
summary: When a client desires to update A RRs itself, the S, O, and N bits in the Client FQDN option MUST all be 0 in the DHCPREQUEST. The client MAY originate the A RR update after receiving DHCPACK, unless the server has set S=1.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
