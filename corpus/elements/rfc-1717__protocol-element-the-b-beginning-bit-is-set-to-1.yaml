document: rfc-1717
kind: protocol-element
summary: The B (Beginning) bit is set to 1 on the first fragment of a PPP packet and 0 on all others; the E (Ending) bit is set to 1 on the last fragment. A fragment may have both bits set, indicating it carries an entire PPP packet.
