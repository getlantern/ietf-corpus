document: rfc-3382
kind: normative-requirement
summary: A collection value MUST NOT contain two or more member attributes with the same attribute name. Clients MUST NOT submit such malformed requests and Printers MUST NOT return such malformed responses. If such a malformed request is submitted, the Printer MUST either reject it with 'client-error-bad-request' or accept and use only one of each duplicate member attribute.
section: "1.2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
