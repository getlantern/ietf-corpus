document: rfc-6710
kind: wire-format
summary: The priority-value ABNF is `(['-'] NZDIGIT) / '0'`, allowing values -9 to 9. The MT-PRIORITY EHLO response may include a priority-profile of 1-20 characters (ALPHA / DIGIT / '-' / '_' / '.'). The MAIL FROM command line maximum length increases by 15 octets to accommodate the parameter.
section: "7"
