document: rfc-2022
kind: normative-requirement
summary: Network administrators MUST ensure that each Logical IP Subnet (LIS) is served by a separate MARS, creating a one-to-one mapping between cluster and unicast LIS. Relaxation of this restriction MAY only occur after future research on the interaction between existing layer 3 multicast routing protocols and unicast subnet boundaries.
section: "1.2"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
