document: rfc-9671
kind: protocol-element
summary: The :allowpublic argument permits processing of calendar data that does not contain ATTENDEE properties, such as iTIP PUBLISH messages or non-iTIP messages lacking METHOD and/or ORGANIZER properties. If used with :organizers, the implementation MUST NOT process non-iTIP messages.
section: "4.1"
topics:
