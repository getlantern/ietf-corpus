document: rfc-4172
kind: protocol-element
summary: 'iFCP defines three TCP session control messages: CBIND (Connection Bind — allocates a TCP connection to an iFCP session and negotiates the LIVENESS TEST INTERVAL), UNBIND (terminates a session), and LTEST (tests connection liveness; its encapsulation header may also be used to estimate propagation delay).'
