document: rfc-3911
kind: normative-requirement
summary: If the Referred-By header corresponds to the user being joined, the UA SHOULD treat the join as if authorized by the joined party. The Referred-By header MUST reference a corresponding, valid Referred-By Authenticated Identity Body.
section: "4"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - security
