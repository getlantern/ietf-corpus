document: rfc-6086
kind: protocol-element
summary: The Info-Package header field is included in INFO requests to identify the associated Info Package. It contains exactly one Info-package-type value (Info-package-name plus optional parameters). The Info Package name is case-sensitive; Info-package-param is not part of the matching algorithm.
section: "7.2"
topics:
