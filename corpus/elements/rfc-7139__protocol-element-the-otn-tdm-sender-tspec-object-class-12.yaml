document: rfc-7139
kind: protocol-element
summary: The OTN-TDM SENDER_TSPEC object (Class 12, C-Type 7) and OTN-TDM FLOWSPEC object (Class 9, C-Type 7) carry Traffic Parameters for OTN-TDM switching. The format includes an 8-bit Signal Type, 16-bit NVC (Number of Virtual Components), 16-bit Multiplier (MT), and a 32-bit Bit_Rate field encoded as IEEE single-precision floating-point.
