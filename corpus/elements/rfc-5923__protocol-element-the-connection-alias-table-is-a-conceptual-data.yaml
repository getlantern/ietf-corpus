document: rfc-5923
kind: protocol-element
summary: 'The connection alias table is a conceptual data structure maintained by each SIP entity that stores, per aliased connection: destination IP address, destination port, destination transport, destination identity (from the peer''s X.509 subjectAlternativeName), and a connection handle (alias descriptor). It is used to look up an existing connection before opening a new one.'
