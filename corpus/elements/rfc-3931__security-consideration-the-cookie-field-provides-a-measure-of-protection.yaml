document: rfc-3931
kind: security-consideration
summary: The Cookie field provides a measure of protection against malicious data packet insertion attacks and against stray packets with recently reused or corrupted Session IDs. However, it does not substitute for strong cryptographic security such as IPsec; a well-chosen random Cookie is necessary for effective protection.
section: "8.2"
topics:
    - vpn
    - security
