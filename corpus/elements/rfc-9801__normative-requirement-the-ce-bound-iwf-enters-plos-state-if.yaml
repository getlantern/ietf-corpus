document: rfc-9801
kind: normative-requirement
summary: The CE-bound IWF enters PLOS state if it detects loss of consecutive packets for a preconfigured time (default 1 millisecond). While in PLOS, the CE-bound NSP MUST inject the appropriate downstream fault-indication signal, and the PSN-bound IWF SHOULD set the R bit in every transmitted PLE packet.
section: 7.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
