document: rfc-2634
kind: design-rationale
summary: 'The mlExpansionHistory attribute serves dual purposes: it allows an MLA to detect mail loops by checking for its own identifier in the list, and it allows the receipt processing logic to distinguish first-tier recipients (no history present) from downstream mailing-list recipients.'
