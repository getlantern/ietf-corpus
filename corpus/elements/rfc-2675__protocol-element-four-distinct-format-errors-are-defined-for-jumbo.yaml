document: rfc-2675
kind: protocol-element
summary: 'Four distinct format errors are defined for Jumbo Payload processing: (1) Payload Length=0 with Hop-by-Hop Next Header but no Jumbo Payload option present; (2) Payload Length!=0 with Jumbo Payload option present; (3) Jumbo Payload Length < 65,536; (4) Jumbo Payload option and Fragment header both present. Each specifies ICMPv6 Parameter Problem Code and Pointer values.'
