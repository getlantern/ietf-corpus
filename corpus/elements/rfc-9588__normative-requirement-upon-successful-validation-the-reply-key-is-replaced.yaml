document: rfc-9588
kind: normative-requirement
summary: Upon successful validation, the reply key is replaced with K'[0]. The client and KDC MUST use the initial reply key as the base key for all K'[n] derivations; reply key strengthening occurs only once at the end of the exchange.
section: "4.5"
rfc2119_level: MUST
topics:
    - crypto
    - security
