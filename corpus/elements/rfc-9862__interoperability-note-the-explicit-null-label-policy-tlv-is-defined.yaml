document: rfc-9862
kind: interoperability-note
summary: The EXPLICIT-NULL-LABEL-POLICY TLV is defined only for SR-MPLS and not for SRv6. Receiving PCEP speakers MUST ignore this TLV for SRv6 Policies. The behavior signaled by this TLV MAY be overridden by local operator configuration.
section: 5.2.2
topics:
    - routing
    - mpls
