document: rfc-8687
kind: security-consideration
summary: Generating incorrect X-AF sub-TLV information or tampering with it may cause TE traffic to be delivered to the wrong tail-end router, leading to suboptimal routing, traffic loops, or exposure of traffic to attacker inspection or modification; these threats parallel those in RFC 3630 and RFC 5329.
section: "5"
topics:
