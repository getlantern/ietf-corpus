document: rfc-9203
kind: normative-requirement
summary: The client MUST generate a nonce value N1 that is very unlikely to have been previously used with the same input keying material. A 64-bit random number is RECOMMENDED. The client MUST store N1 until the RS response is received or the token expires.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
