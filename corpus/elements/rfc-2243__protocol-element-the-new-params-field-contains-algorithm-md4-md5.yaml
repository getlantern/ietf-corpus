document: rfc-2243
kind: protocol-element
summary: The new-params field contains algorithm (md4/md5/sha1), sequence-number (up to 4 digits), and seed (up to 16 alphanumeric characters). It is hashed as a string the same way a seed or secret pass phrase would be; other field values are hashed in uncoded binary form in network byte order.
section: "4.2"
