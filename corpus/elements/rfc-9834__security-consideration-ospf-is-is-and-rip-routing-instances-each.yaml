document: rfc-9834
kind: security-consideration
summary: OSPF, IS-IS, and RIP routing instances each include an 'authentication' container supporting key chain references or explicit key/algorithm specification. This ensures PE-CE routing sessions for ACs can be cryptographically authenticated regardless of the IGP used.
section: 5.2.5.3.3
topics:
