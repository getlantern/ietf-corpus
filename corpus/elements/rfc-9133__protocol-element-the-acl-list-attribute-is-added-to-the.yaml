document: rfc-9133
kind: protocol-element
summary: The 'acl-list' attribute is added to the CBOR body of a DOTS signal channel mitigation request. It carries one or more entries each containing 'acl-name' (mandatory, a leafref to an ACL created via the data channel) and 'activation-type' (optional, overrides the existing activation-type for that ACL).
section: 3.2.1
topics:
    - security
    - yang
