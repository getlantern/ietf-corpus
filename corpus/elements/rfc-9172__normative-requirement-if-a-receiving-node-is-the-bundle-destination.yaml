document: rfc-9172
kind: normative-requirement
summary: If a receiving node is the bundle destination, it MUST decrypt any BCBs remaining in the bundle. If a BCB cannot be decrypted (ciphertext authentication failure), the bundle MUST be discarded. Recovered plaintext MUST replace ciphertext in each security target's block-type-specific data field.
section: 5.1.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
