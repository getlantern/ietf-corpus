document: rfc-5293
kind: security-consideration
summary: 'Header-based decision mechanisms in Sieve scripts are vulnerable to spoofing: a malicious sender can add any header or tag that the filter uses for access control decisions. Deleting or renaming such headers before processing is the recommended mitigation.'
section: "9"
topics:
