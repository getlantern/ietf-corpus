document: rfc-2274
kind: security-consideration
summary: A conformant implementation MUST support at minimum noAuthNoPriv and authNoPriv security levels; authPriv support requires both an authentication and a privacy protocol to be configured for the user. Implementations MUST correctly enforce these level requirements rather than silently downgrading.
section: "11.3"
topics:
    - snmp
    - security
