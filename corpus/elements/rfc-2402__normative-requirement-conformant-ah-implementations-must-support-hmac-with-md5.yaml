document: rfc-2402
kind: normative-requirement
summary: Conformant AH implementations MUST support HMAC with MD5 and HMAC with SHA-1 as mandatory-to-implement authentication algorithms. A compliant implementation SHOULD NOT provide the anti-replay service in conjunction with manually-keyed SAs.
section: "5"
rfc2119_level: MUST
topics:
