summary: 'The Label Forwarding Model for Diff-Serv LSRs comprises four functional stages: (A) Incoming PHB Determination, (B) Outgoing PHB Determination with Optional Traffic Conditioning, (C) Label Forwarding, and (D) Encoding of Diff-Serv information into the encapsulation layer (EXP, CLP, DE, or 802.1 User_Priority).'
