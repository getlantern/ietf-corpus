document: rfc-8518
kind: protocol-element
summary: 'OSPF alternate ASBR selection follows a six-step process: (1) check RFC1583Compatibility and area membership, (2) compare cost types (type 1 vs type 2), (3) for type 1 compare costs, (4) for type 2 compare costs and ASBR reach costs, (5) compare route types (type 5 vs type 7) and p-bit/forwarding address, then (6) apply loop-free inequality.'
section: 4.2.1
topics:
    - routing
