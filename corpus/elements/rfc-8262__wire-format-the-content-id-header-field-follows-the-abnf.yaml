kind: wire-format
summary: 'The Content-ID header field follows the ABNF: `Content-ID = "Content-ID" HCOLON msg-id` where `msg-id = "<" id-left "@" id-right ">"`. Comments are disallowed and leading white space follows SIP conventions, simplifying RFC 5322 syntax.'
