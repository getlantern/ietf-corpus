document: rfc-2157
kind: wire-format
summary: 'HARPOON encapsulation creates an IA5String body whose first bytes are: ''MIME-Version: <ver>\r\n'', ''Content-Type: <type>\r\n'', ''Content-Transfer-Encoding: <7bit|qp|base64>\r\n'', optional Content headers, ''\r\n'', then the encoded body bytes. The MIME-Version header must appear first.'
