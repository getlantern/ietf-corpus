document: rfc-7484
kind: normative-requirement
summary: RDAP clients SHOULD NOT fetch the Bootstrap Registry on every RDAP request. Clients SHOULD cache the registry and rely on the HTTP Expires header field (RFC 7234) to determine when to refresh it.
section: "8"
rfc2119_level: SHOULD
