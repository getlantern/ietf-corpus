document: rfc-9398
kind: normative-requirement
summary: The upstream interface for an MLD Proxy MUST NOT be configured to use PIM. This is enforced via a YANG 'must' constraint checking that the interface name does not appear in the PIM interface list.
section: "3.2"
rfc2119_level: MUST NOT
topics:
