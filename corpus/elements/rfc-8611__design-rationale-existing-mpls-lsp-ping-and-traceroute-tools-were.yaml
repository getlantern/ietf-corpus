document: rfc-8611
kind: design-rationale
summary: Existing MPLS LSP Ping and Traceroute tools were not designed to discover and exercise specific paths of L2 ECMP over LAG interfaces, creating a diagnostic blind spot where label-switching failures on specific LAG member links can go undetected if the echo request happens to load-balance to a working member link.
section: "1.1"
topics:
    - mpls
    - realtime
