document: rfc-6047
kind: security-consideration
summary: 'Two primary spoofing threats exist: spoofing the Organizer and spoofing an Attendee. To address these, the originator of an iCalendar object must be authenticated by the recipient before any action is taken, using S/MIME-based signing.'
