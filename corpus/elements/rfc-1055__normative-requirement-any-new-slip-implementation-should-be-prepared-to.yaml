document: rfc-1055
kind: normative-requirement
summary: Any new SLIP implementation should be prepared to accept datagrams of up to 1006 bytes (including IP and transport protocol headers, excluding framing characters) and should not send more than 1006 bytes in a single datagram. This de facto limit derives from the Berkeley UNIX SLIP drivers.
section: PROTOCOL
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
