document: rfc-7551
kind: interoperability-note
summary: LSP recovery as defined in RFC 4872 and RFC 4873 is not impacted by this document because recovery uses different Association Type values. Multiple ASSOCIATION Objects can coexist in the same Path message, allowing recovery and bidirectional-association signaling simultaneously.
section: 5.1.1
topics:
    - mpls
    - routing
