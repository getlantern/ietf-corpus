document: rfc-6933
kind: protocol-element
summary: 'The IANAPhysicalClass TEXTUAL-CONVENTION (in the new IANA-ENTITY-MIB module) enumerates physical entity types: other(1), unknown(2), chassis(3), backplane(4), container(5), powerSupply(6), fan(7), sensor(8), module(9), port(10), stack(11), cpu(12). It replaces the deprecated PhysicalClass TC and is IANA-maintained for future extensibility.'
