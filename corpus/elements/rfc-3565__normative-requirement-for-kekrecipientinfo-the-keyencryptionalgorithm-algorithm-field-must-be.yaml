document: rfc-3565
kind: normative-requirement
summary: For KEKRecipientInfo, the keyEncryptionAlgorithm algorithm field MUST be one of the AES wrap OIDs, and the parameters field MUST be absent. The encryptedKey field MUST include the AES CEK wrapped using the previously distributed symmetric KEK.
section: "2.4"
rfc2119_level: MUST
topics:
