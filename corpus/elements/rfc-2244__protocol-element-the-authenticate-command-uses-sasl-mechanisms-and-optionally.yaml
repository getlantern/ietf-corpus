document: rfc-2244
kind: protocol-element
summary: The AUTHENTICATE command uses SASL mechanisms and optionally negotiates a security layer. If a security layer is negotiated, it takes effect immediately after the CRLF completing the authentication exchange on the client side, and after the CRLF of the tagged OK on the server side.
section: 6.3.1
topics:
    - security
    - crypto
