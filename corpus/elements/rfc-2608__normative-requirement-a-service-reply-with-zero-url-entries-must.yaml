document: rfc-2608
kind: normative-requirement
summary: A service reply with zero URL entries MUST be returned in response to a unicast Service Request if no matching URLs are present. A zero-entry SrvRply MUST NOT be sent in response to a multicast or broadcast service request.
section: "8.2"
rfc2119_level: MUST NOT
