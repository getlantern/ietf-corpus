document: rfc-793
kind: normative-requirement
summary: When the push function is signaled by the sending user, the TCP must promptly transmit all data collected to that point. When a receiving TCP sees the PUSH flag, it must not wait for more data from the sending TCP before passing data to the receiving process.
section: "2.8"
rfc2119_level: MUST
topics:
    - tcp
