document: rfc-8951
kind: protocol-element
summary: For /serverkeygen, an application/pkcs8 part contains base64-encoded DER-encoded PrivateKeyInfo, and encrypted variants return EnvelopedData as application/pkcs7-mime with smime-type 'server-generated-key', both base64 encoded per RFC 4648, without Content-Transfer-Encoding headers.
