document: rfc-4666
kind: normative-requirement
summary: To avoid redundant SCTP associations, one peer (client) SHOULD be designated to initiate the SCTP association. By default, the ASP acts as SCTP client and SHOULD initiate the association to the SGP, which acts as server. In IPSP-to-IPSP communication, one IPSP SHOULD be similarly designated as the client.
section: 1.4.8
rfc2119_level: SHOULD
topics:
    - sctp
