document: rfc-4253
kind: normative-requirement
summary: During DH key exchange, the client MUST verify that K_S is really the host key for the server (e.g., via certificates or local database). Accepting without verification renders the protocol insecure against active attacks.
section: "8"
rfc2119_level: MUST
topics:
    - security
    - crypto
