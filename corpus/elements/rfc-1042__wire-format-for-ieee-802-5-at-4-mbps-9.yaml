document: rfc-1042
kind: wire-format
summary: 'For IEEE 802.5 at 4 Mbps (9 ms token hold time): maximum packet size is 4508 octets. With 36-octet MAC header+trailer (including 18-octet RIF) and 8-octet LLC+SNAP, the IP MTU is 4464. A minimum of 2002 octets is recommended for all implementations.'
