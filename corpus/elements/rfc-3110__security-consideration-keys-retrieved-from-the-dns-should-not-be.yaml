document: rfc-3110
kind: security-consideration
summary: Keys retrieved from the DNS should not be trusted unless (1) securely obtained from a secure resolver or independently verified by the user and (2) the secure resolver and obtainment conform to security policies acceptable to the user. Evaluating key strength is essential and dependent on local policy.
section: "6"
topics:
    - dns
    - security
    - crypto
