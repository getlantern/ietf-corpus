summary: 'Java''s automatic garbage collection and immutable Oid objects eliminate the need for several C-binding routines: gss_release_name, gss_duplicate_name, gss_create_empty_oid_set, gss_release_oid_set, and gss_add_oid_set_member are not present in the Java API.'
