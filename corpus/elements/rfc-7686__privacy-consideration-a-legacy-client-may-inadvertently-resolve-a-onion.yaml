document: rfc-7686
kind: privacy-consideration
summary: A legacy client may inadvertently resolve a .onion name through the DNS, disclosing that the client is attempting to use Tor to reach a specific service. Malicious resolvers could capture such leaks with very adverse consequences for user safety; mitigation requires updating client software or DNS handling to suppress .onion queries.
section: "4"
topics:
    - privacy
    - dns
    - censorship
    - security
