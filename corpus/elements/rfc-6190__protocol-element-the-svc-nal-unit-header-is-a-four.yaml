document: rfc-6190
kind: protocol-element
summary: The SVC NAL unit header is a four-byte header for NAL unit types 14 and 20, extending the one-byte H.264/AVC header with three bytes encoding R, I (idr_flag), PRID (6 bits priority), N, DID (3 bits dependency_id), QID (4 bits quality_id), TID (3 bits temporal_id), U, D, O, and RR (2 bits reserved) fields.
section: 1.1.3
