document: rfc-5492
kind: normative-requirement
summary: A BGP speaker that receives a Capabilities Optional Parameter capability it does not support or recognize MUST ignore that capability. The Unsupported Capability NOTIFICATION MUST NOT be generated and the BGP session MUST NOT be terminated solely due to reception of an unrecognized capability.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
