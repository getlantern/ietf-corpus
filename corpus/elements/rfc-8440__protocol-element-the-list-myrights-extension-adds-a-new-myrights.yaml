document: rfc-8440
kind: protocol-element
summary: The LIST-MYRIGHTS extension adds a new "MYRIGHTS" return option to the IMAP LIST command, allowing clients to request mailbox rights alongside other LIST information in a single command. This is identified by the capability string "LIST-MYRIGHTS".
