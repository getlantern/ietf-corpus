document: rfc-9073
kind: privacy-consideration
summary: Location information inside a PARTICIPANT component reveals where an individual will be at a future time, potentially enabling targeted attacks. This information MUST NOT be distributed without the participant's express permission, and agents should reveal only the minimum necessary.
section: "10.2"
topics:
    - privacy
