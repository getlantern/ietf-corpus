document: rfc-7641
kind: security-consideration
summary: 'Observing resources can dramatically amplify reflection attacks: notifications may be much larger than the registration request, and many can be generated. Without client authentication, servers MUST strictly limit non-confirmable notifications and MUST intersperse them with confirmable messages that confirm the client''s continued interest.'
section: "7"
topics:
    - security
