document: rfc-3041
kind: normative-requirement
summary: A temporary address MUST NOT be created with a zero Preferred Lifetime. A temporary address is only created if the calculated Preferred Lifetime (lower of public address's Preferred Lifetime and TEMP_PREFERRED_LIFETIME minus DESYNC_FACTOR) is greater than REGEN_ADVANCE.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - ip
