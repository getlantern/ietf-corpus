document: rfc-3270
kind: protocol-element
summary: A Label-Only-Inferred-PSC LSP (L-LSP) carries exactly one <FEC, OA> pair; the PSC is signaled at label establishment so the LSR infers scheduling class from the label value alone. Drop precedence is conveyed in the EXP field of the Shim Header (or link-layer CLP/DE bits when no Shim Header is used).
section: "1.3"
topics:
    - mpls
    - diffserv
    - qos
