document: rfc-2537
kind: wire-format
summary: The exponent length field is 1 octet if the exponent is 1-255 bytes long; if longer than 255 bytes, a zero octet followed by a 2-octet unsigned length is used. The modulus length is derived from RDLENGTH minus preceding RDATA fields.
