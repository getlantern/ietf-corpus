document: rfc-4868
kind: security-consideration
summary: Periodic key refreshment is a fundamental security practice recommended even though no practical attacks against HMAC-SHA-256+ are known. Weak keys (e.g., dictionary words) are dramatically less resistant to attack regardless of the algorithm's theoretical strength.
