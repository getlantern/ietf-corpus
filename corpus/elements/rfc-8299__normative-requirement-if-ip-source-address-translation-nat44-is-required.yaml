document: rfc-8299
kind: normative-requirement
summary: If IP source address translation (NAT44) is required for cloud access, the `enabled` leaf MUST be set to `true` inside the `nat44` container. If the SP provides the translated address, the `customer-address` leaf is not required.
section: 6.2.2
rfc2119_level: MUST
topics:
    - yang
    - vpn
    - nat
