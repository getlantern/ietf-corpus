document: rfc-5546
kind: normative-requirement
summary: In a REQUEST VEVENT, when multiple VEVENT components appear in a single iCalendar object they MUST all have the same UID (used to express instance-specific data for a recurring series). ATTENDEE (1+), DTSTART (1), ORGANIZER (1), SUMMARY (1), and UID (1) are all required.
section: 3.2.2
rfc2119_level: MUST
topics:
    - email
