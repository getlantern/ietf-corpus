document: rfc-4545
kind: security-consideration
summary: 'Deleting an existing credential row before adding a replacement leaves an empty credential list, which the OR/AND matching logic interprets as ''any credential matches,'' potentially granting unconstrained access. The recommended update patterns are: in-place field update, add-then-delete, or add-and-delete in one SNMP SET (add first).'
section: "9.2"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
