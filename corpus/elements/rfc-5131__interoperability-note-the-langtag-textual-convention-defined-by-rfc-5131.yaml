document: rfc-5131
kind: interoperability-note
summary: The LangTag TEXTUAL-CONVENTION defined by RFC 5131 replaces the similar LanguageTag TEXTUAL-CONVENTION defined by RFC 2932. New MIB modules should use LangTag; existing MIB modules using the old LanguageTag TC are unaffected.
