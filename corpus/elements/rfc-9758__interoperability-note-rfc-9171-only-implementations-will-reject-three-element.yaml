document: rfc-9758
kind: interoperability-note
summary: 'RFC 9171-only implementations will reject three-element-encoded bundles as malformed. Valid mitigations include per-destination encoding configuration or selective encapsulation via gateway nodes. Heuristic encoding inference and intermediate transcoding are explicitly identified as non-viable: the primary block is immutable and blocks may be integrity-protected.'
section: "7.2"
topics:
