document: rfc-4293
kind: interoperability-note
summary: 'When updating an RFC 2465/2466 IPv6 MIB implementation: ipv6Forwarding and ipv6DefaultHopLimit are renamed to ipv6IpForwarding and ipv6IpDefaultHopLimit with new OIDs; IPv6 routing objects (ipv6RouteNumber, ipv6DiscardedRoutes, ipv6RouteTable) are removed from this MIB and replaced by the updated IP Forwarding Table MIB.'
section: "4.2"
