document: rfc-9937
kind: state-machine
summary: 'When inflight > ssthresh, PRR uses Proportional Rate Reduction: SndCnt = DIV_ROUND_UP(prr_delivered * ssthresh, RecoverFS) - prr_out. When inflight <= ssthresh, PRR defaults to PRR-CRB: SndCnt = MAX(prr_delivered - prr_out, DeliveredData), then adds SMSS if SafeACK is true (PRR-SSRB), capped at MIN(ssthresh - inflight, SndCnt).'
section: "6.2"
topics:
    - tcp
    - congestion
