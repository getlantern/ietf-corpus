document: rfc-5357
kind: design-rationale
summary: TWAMP does not use the Fetch-Session command because two-way measurement methods communicate packet-level data (sequence number, timestamp, TTL) in the reflected test packets themselves, eliminating the need to retrieve data from the Session-Reflector separately.
