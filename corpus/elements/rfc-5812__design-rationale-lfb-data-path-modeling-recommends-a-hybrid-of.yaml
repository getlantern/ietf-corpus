document: rfc-5812
kind: design-rationale
summary: LFB data path modeling recommends a hybrid of the topological approach (forking into distinct LFB class paths) and the encoded state approach (metadata-driven parameterization within one LFB type). The topological approach is preferred when paths fork to distinct LFB classes; the encoded state approach reduces graph complexity when N instances of the same LFB class need distinguishable parameterization.
section: 3.4.1
topics:
