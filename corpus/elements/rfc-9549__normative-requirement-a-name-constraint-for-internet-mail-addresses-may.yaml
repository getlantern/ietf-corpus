document: rfc-9549
kind: normative-requirement
summary: A name constraint for Internet mail addresses MAY specify all addresses at a particular host or all mailboxes in a domain, but NOT a particular mailbox. The constraint 'example.com' is satisfied by any address at that host; '.example.com' matches addresses in the domain but not on the host itself.
section: "2.2"
rfc2119_level: MAY
topics:
    - pkix
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
