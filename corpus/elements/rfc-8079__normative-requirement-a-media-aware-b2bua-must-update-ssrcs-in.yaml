document: rfc-8079
kind: normative-requirement
summary: A media-aware B2BUA MUST update SSRCs in SDES chunks, BYE packets, APP packets, and XR messages if it changed the SSRC of any addressed RTP stream. For XR messages, 'begin_seq' and 'end_seq' fields MUST also be updated if the base RTP sequence number was changed.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
