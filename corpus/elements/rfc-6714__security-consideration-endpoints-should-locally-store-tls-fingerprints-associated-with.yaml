document: rfc-6714
kind: security-consideration
summary: Endpoints SHOULD locally store TLS fingerprints associated with peer identities when first seen and SHOULD provide a warning when a new fingerprint is observed for what otherwise appears to be the same peer identity, since key changes should be the exception.
section: "7.7"
rfc2119_level: SHOULD
topics:
