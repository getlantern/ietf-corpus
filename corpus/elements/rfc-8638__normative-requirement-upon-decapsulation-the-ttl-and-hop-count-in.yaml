document: rfc-8638
kind: normative-requirement
summary: Upon decapsulation, the TTL and hop count in the inner header MUST NOT be incremented and MAY be decremented to reflect the cost of tunnel forwarding. Upon encapsulation, TTL and hop count in the outer header SHOULD be set by policy.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
