document: rfc-5452
kind: protocol-element
summary: The combined spoofing difficulty formula is P_s = (D * R * W) / (N * P * I), where D is identical outstanding queries, R is attacker packet rate, W is the window of opportunity in seconds, N is the number of authoritative nameservers, P is the number of source ports used, and I is the number of distinct IDs available.
section: "7.2"
topics:
