document: rfc-7147
kind: protocol-element
summary: 'Three SNMP notifications are defined: iscsiTgtLoginFailure (sent by a target on critical login failure), iscsiIntrLoginFailure (sent by an initiator on critical login failure), and iscsiInstSessionFailure (sent on abnormal session termination due to digest or connection errors). Critical failures include authentication, authorization, and negotiation failures.'
section: "6.16"
topics:
