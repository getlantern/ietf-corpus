document: rfc-3734
kind: normative-requirement
summary: A server receiving an EPP <logout> command MUST end the EPP session and close the TCP connection through an active CLOSE call; the client MUST respond with a passive CLOSE call.
section: "2"
rfc2119_level: MUST
topics:
    - tcp
