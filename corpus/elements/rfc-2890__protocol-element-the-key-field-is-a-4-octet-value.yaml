document: rfc-2890
kind: protocol-element
summary: The Key field is a 4-octet value inserted by the encapsulator to identify an individual traffic flow within a tunnel. Packets belonging to a flow are encapsulated with the same Key value; the decapsulator uses the Key to distinguish flows. The method of obtaining the Key value is outside the scope of this document.
section: "2.1"
topics:
    - vpn
    - ip
