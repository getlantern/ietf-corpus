document: rfc-9010
kind: wire-format
summary: 'The RPL Status field is restructured as: U (1 bit, rejection indicator), A (1 bit, type of status value), StatusValue (6-bit unsigned integer). When A=1 the StatusValue carries a 6LoWPAN ND EARO Status code; when A=0 it carries an RPL status code.'
