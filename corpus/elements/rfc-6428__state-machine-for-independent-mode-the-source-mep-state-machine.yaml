document: rfc-6428
kind: state-machine
summary: For independent mode, the source MEP state machine (bfd.MinRxInterval=0) does not transition out of UP except via ADMIN DOWN; LDI and LKR do not trigger DOWN from UP. The sink MEP state machine permits direct DOWN-to-UP transition and includes MIS-CONNECTIVITY as a trigger back to DOWN.
section: 3.7.5
topics:
