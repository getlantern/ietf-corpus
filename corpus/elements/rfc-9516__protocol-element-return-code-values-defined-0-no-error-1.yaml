document: rfc-9516
kind: protocol-element
summary: 'Return Code values defined: 0=No Error, 1=Malformed Echo Request received, 2=One or more TLVs not understood, 3=Authentication failed, 4=SFC TTL Exceeded, 5=End of the SFP, 6=Reply Service Function Path TLV is missing, 7=Reply SFP was not found, 8=Unverifiable Reply Service Function Path. For all defined return codes the Return Subcode MUST be set to zero.'
section: "6.1"
