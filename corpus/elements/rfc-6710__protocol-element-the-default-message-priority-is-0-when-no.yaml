document: rfc-6710
kind: protocol-element
summary: The default message priority is 0 when no MT-PRIORITY parameter is specified. An SMTP client sends higher-priority messages before lower-priority ones when multiple messages are queued. Within a priority level, normal MTA ordering algorithms apply.
section: "4.1"
topics:
    - email
