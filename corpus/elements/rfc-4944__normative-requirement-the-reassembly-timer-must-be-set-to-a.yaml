document: rfc-4944
kind: normative-requirement
summary: The reassembly timer MUST be set to a maximum of 60 seconds (matching the IPv6 reassembly timeout per RFC 2460). If the entire packet has not been reassembled when the timer expires, existing fragments MUST be discarded and the reassembly state MUST be flushed.
section: "5.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
