document: rfc-8762
kind: normative-requirement
summary: A STAMP Session-Sender implementation MUST be able to use destination UDP port numbers from the User Ports and Dynamic Ports ranges (RFC 6335). Before using User Ports range numbers, the possible network impact MUST be carefully studied and agreed upon by all users of the network domain.
section: "4.1"
rfc2119_level: MUST
topics:
    - measurement
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
