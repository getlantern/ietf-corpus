document: rfc-5656
kind: protocol-element
summary: ECMQV key exchange is OPTIONAL and provides implicit server authentication via an HMAC over the exchange hash using the shared secret, eliminating the need for a separate signature. It requires all keys to be on the same elliptic curve domain parameters as the host key.
