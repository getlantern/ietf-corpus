document: rfc-5584
kind: normative-requirement
summary: Packets containing related fragmented frames MUST have identical timestamps. The Fragment Number MUST be zero for an unfragmented frame, start at 1 for the first fragment, and increase sequentially; the Continuation bit MUST be 0 on the last packet.
section: 5.3.2.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
