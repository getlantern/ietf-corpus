document: rfc-7780
kind: normative-requirement
summary: When determining distribution tree roots, an RBridge MUST ignore all nicknames held by TRILL switches that are in overload or are data unreachable. An overloaded RBridge can appear only as a leaf node in the distribution tree.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
