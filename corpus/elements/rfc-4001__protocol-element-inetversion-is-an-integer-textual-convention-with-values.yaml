document: rfc-4001
kind: protocol-element
summary: InetVersion is an INTEGER textual convention with values unknown(0), ipv4(1), and ipv6(2) representing the IP protocol version. It SHOULD NOT be used to distinguish different address types; InetAddressType is designed for that purpose.
section: "3"
topics:
