document: rfc-9493
kind: protocol-element
summary: The JWT "sub_id" Claim is defined as a common claim that identifies the JWT Subject using a Subject Identifier (a JSON object). When present, its value MUST be a Subject Identifier that identifies the subject of the JWT.
