document: rfc-9682
kind: interoperability-note
summary: 'Grammar changes in Section 2 (string literal updates) are not forward compatible: CDDL specifications using new hex escape syntax (e.g., \u{hex}) will not be processable by implementations based solely on RFC 8610 until those implementations are updated. Implementors are recommended to update promptly.'
