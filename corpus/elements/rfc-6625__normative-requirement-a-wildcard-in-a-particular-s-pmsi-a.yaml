document: rfc-6625
kind: normative-requirement
summary: A wildcard in a particular S-PMSI A-D route always refers only to multicast flows of the same address family (IPv4 or IPv6) as specified in the AFI field of the MP_REACH_NLRI attribute carrying the route.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
