document: rfc-9262
kind: normative-requirement
summary: Packets sent to a forward_connected() adjacency with the DNC flag set MUST NOT have that bit position cleared in the copy made for that adjacency. The bit position is still cleared in copies made towards all other adjacencies.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - routing
