document: rfc-7371
kind: normative-requirement
summary: When R=1 in ff1 (indicating an Embedded-RP multicast address), P MUST be set to 1 and consequently T MUST be set to 1, as this is a special case of unicast-prefix-based addresses per RFC 3306.
section: 4.2.2
rfc2119_level: MUST
topics:
    - ip
    - multicast
