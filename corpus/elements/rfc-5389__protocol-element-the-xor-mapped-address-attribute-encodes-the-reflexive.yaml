document: rfc-5389
kind: protocol-element
summary: The XOR-MAPPED-ADDRESS attribute encodes the reflexive transport address XOR'd with the magic cookie (IPv4) or with the concatenation of magic cookie and 96-bit transaction ID (IPv6). X-Port is the mapped port XOR'd with the most significant 16 bits of the magic cookie.
section: "15.2"
