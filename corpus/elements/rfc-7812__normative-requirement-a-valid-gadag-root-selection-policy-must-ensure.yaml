document: rfc-7812
kind: normative-requirement
summary: A valid GADAG Root Selection Policy MUST ensure each router in the MRT Island chooses the same GADAG root from information available to all routers. For the Default MRT Profile, among routers with the lowest GADAG Root Selection Priority value, the router with the highest Router ID MUST be chosen as GADAG root.
section: "8.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
