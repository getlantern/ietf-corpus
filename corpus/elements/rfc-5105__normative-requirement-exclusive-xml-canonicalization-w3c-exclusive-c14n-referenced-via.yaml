document: rfc-5105
kind: normative-requirement
summary: Exclusive XML canonicalization (W3C Exclusive C14N, referenced via RFC 3275) MUST be used when signing a Validation Token so that namespace declarations inherited from surrounding XML documents (e.g., an enclosing EPP envelope) do not invalidate the signature.
section: "3"
rfc2119_level: MUST
topics:
