document: rfc-4997
kind: protocol-element
summary: 'The irregular(len) encoding method transmits all bits of a field unchanged: ULENGTH and CLENGTH are both bound to ''len'' and CVALUE is bound equal to UVALUE. It is a fail-safe encoding for fields that cannot be compressed, such as TCP checksum.'
section: 4.11.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
