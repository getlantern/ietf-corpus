document: rfc-7450
kind: state-machine
summary: 'The membership refresh cycle: (1) gateway sends Request with random nonce → (2) relay responds with Membership Query containing MAC and nonce → (3) gateway sends Membership Update echoing MAC and nonce. A query timer, whose duration is set by the QQIC field in the encapsulated General Query, drives the next Request when it expires.'
section: 4.2.1.2
topics:
    - multicast
    - udp
