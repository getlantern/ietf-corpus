document: rfc-8171
kind: state-machine
summary: 'A Push Directory server operates in one of seven states per Data Label: Down (S1), Stand-By (S2), Active (S3), Active Completing (S4), Active Complete (S5), Going Stand-By Was Complete (S6), and Active Uncompleting (S7). Transitions are triggered by events including server startup/shutdown, Activate Condition, Stand-By Condition, configuration changes, and a configurable Time Condition (default 2× CSNP time).'
section: "2.3"
topics:
    - routing
