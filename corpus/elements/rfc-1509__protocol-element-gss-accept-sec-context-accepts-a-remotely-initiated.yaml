document: rfc-1509
kind: protocol-element
summary: gss_accept_sec_context accepts a remotely-initiated security context. It returns the authenticated src_name, mech_type, ret_flags, and, when GSS_C_DELEG_FLAG is set, a delegated_cred_handle. The parameters src_name, ret_flags, time_rec, and delegated_cred_handle are undefined unless the routine returns GSS_S_COMPLETE.
section: "3.4"
topics:
