document: rfc-5882
kind: normative-requirement
summary: If BFD is fate-independent of the control plane (C bit set in both directions), a BFD session failure during Graceful Restart SHOULD cause the Graceful Restart to be aborted and a topology change to be signaled, to avoid black holes.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - routing
