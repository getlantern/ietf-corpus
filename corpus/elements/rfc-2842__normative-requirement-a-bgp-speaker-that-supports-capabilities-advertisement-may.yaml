document: rfc-2842
kind: normative-requirement
summary: A BGP speaker that supports capabilities advertisement may use a particular capability with its peer only after determining that the peer supports this capability by examining the Capabilities Optional Parameter in the received OPEN message.
section: "1"
rfc2119_level: MAY
