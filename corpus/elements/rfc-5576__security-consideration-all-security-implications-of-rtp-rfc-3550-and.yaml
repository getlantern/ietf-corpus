document: rfc-5576
kind: security-consideration
summary: All security implications of RTP (RFC 3550) and SDP (RFC 4566) apply to this specification. Explicitly describing the multiplexed sources of an RTP media stream does not appear to add any further security issues beyond those already present in the underlying protocols.
section: "11"
topics:
    - security
    - rtp
