document: rfc-4210
kind: security-consideration
summary: POP by exposing the private key (sending it encrypted to the CA/RA) carries significant risk because it requires the requester to trust the CA/RA with key material. A key that may be used for signing SHOULD NOT be sent to the CA/RA to prove possession.
section: "8.2"
topics:
    - pkix
    - security
    - crypto
