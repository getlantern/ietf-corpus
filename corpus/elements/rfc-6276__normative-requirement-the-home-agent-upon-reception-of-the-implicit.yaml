document: rfc-6276
kind: normative-requirement
summary: The home agent, upon reception of the implicit Binding Update from the mobile router, MUST select the prefixes to be delegated via DHCPv6PD. Once DHCPv6 signaling is completed, the home agent MUST add an entry in its binding cache including the delegated prefixes.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
