document: rfc-6074
kind: normative-requirement
summary: In the Colored Pools model, if a pool already has a pseudowire connecting to an AC at the same remote PE with the same AI as the incoming SAI, the receiving PE MUST send a Label Release or CDN with Status Code 'Attachment Circuit already bound to remote Attachment Circuit' to prevent duplicate PWs between a given pair of pools.
section: 3.3.3
rfc2119_level: MUST
topics:
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
