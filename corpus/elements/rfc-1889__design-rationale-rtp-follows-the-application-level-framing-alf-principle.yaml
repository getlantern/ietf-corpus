document: rfc-1889
kind: design-rationale
summary: 'RTP follows the Application Level Framing (ALF) principle: it is deliberately incomplete and intended to be integrated into application processing rather than implemented as a separate layer. Complete specifications require companion profile and payload format documents; new common functions require a new RTP version rather than a general option mechanism.'
