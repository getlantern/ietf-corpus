document: rfc-9524
kind: design-rationale
summary: The IPv6 Hop Limit Threshold was introduced as an optional per-Replication-segment parameter to mitigate the risk of non-replication transit nodes generating storms of ICMPv6 Time Exceeded errors when a packet's Hop Limit expires before reaching all leaf nodes, which could overwhelm the root node.
section: "2.2"
topics:
    - routing
    - ip
    - security
