document: rfc-3381
kind: interoperability-note
summary: IPP/1.0 (RFC 2566) and IPP/1.1 (RFC 2911) are silent on whether sheets within documents are collated. The new 'sheet-collate-supported' Printer attribute permits a Printer to indicate whether it collates sheets and whether clients may control sheet collation.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
