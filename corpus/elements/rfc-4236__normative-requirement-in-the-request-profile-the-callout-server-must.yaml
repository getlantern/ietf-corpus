document: rfc-4236
kind: normative-requirement
summary: In the request profile, the callout server MUST send either adapted request parts or adapted response parts, not both. An OPES processor receiving adapted flow with parts from both lists MUST terminate the OCP transaction with an error.
section: 3.2.1
rfc2119_level: MUST
topics:
    - http
