document: rfc-7306
kind: protocol-element
summary: 'Four new RDMA Message opcodes are defined: 1000b (Immediate Data), 1001b (Immediate Data with SE), 1010b (Atomic Request), and 1011b (Atomic Response). All use the Untagged Buffer model; STag and Tagged Offset are not applicable. Immediate Data operations use QN=0; Atomic Requests use QN=1; Atomic Responses use QN=3.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
