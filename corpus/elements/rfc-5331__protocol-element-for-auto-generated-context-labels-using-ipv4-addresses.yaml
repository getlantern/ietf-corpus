document: rfc-5331
kind: protocol-element
summary: For auto-generated context labels using IPv4 addresses, if the IPv4 network mask is greater than 12 bits, the remaining 20-bit host part is mapped to a context label value. To avoid the reserved label space range, the host part is offset with 0x10 if its value is not greater than 0xFFFEF; values greater than 0xFFFEF are not allowed as context labels.
section: "8"
topics:
