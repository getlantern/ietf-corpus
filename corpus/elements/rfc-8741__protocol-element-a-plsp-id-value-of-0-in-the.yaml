document: rfc-8741
kind: protocol-element
summary: A PLSP-ID value of 0 in the LSP object accompanying a C-flag-set PCUpd indicates that the PCE requests control of all LSPs originating from the PCC that it wishes to delegate. Any other non-zero, non-0xFFFFF PLSP-ID identifies a specific LSP.
section: "3"
topics:
