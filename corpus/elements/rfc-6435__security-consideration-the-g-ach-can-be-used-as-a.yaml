document: rfc-6435
kind: security-consideration
summary: The G-ACh can be used as a covert channel providing end-to-end connectivity that SHOULD NOT be policed by transit nodes, making it impossible to simply prevent traffic from being carried between consenting nodes. This is a wider problem than the scope of this document.
