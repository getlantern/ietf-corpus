document: rfc-9254
kind: wire-format
summary: Absolute SID values in map key positions (where bare integers imply deltas) MUST be tagged with CBOR tag number 47 wrapping a CBOR unsigned integer. This distinguishes absolute SIDs from delta-encoded SIDs during deserialization.
