document: rfc-6545
kind: normative-requirement
summary: If a RID system receives a TraceRequest that contains its own information in the path, the trace must cease and the RID system should generate an alert to inform network operations staff that a tracing loop exists.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
