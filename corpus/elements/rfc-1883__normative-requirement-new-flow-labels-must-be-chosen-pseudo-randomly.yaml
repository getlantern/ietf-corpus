document: rfc-1883
kind: normative-requirement
summary: New flow labels must be chosen pseudo-randomly and uniformly from the range 1 to FFFFFF hex. A source must not re-use a flow label for a new flow within the lifetime of any flow-handling state established for the prior use; the minimum interval between flows sharing a label is 6 seconds.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - qos
