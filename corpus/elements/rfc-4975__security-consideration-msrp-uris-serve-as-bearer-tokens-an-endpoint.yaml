document: rfc-4975
kind: security-consideration
summary: MSRP URIs serve as bearer tokens; an endpoint can reject requests to URIs it does not expect and correlate a URI with the probable sender. URIs MUST be hard to guess and MUST be protected from eavesdroppers to prevent session hijacking.
section: "14.1"
topics:
    - security
    - realtime
