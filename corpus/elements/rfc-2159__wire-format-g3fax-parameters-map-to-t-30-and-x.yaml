document: rfc-2159
kind: wire-format
summary: 'G3Fax parameters map to T.30 and X.400 bit positions: page-length=B4 is T.30 bit 19 / X.400 bit 21; page-length=Unlimited is T.30 bit 20 / X.400 bit 20; page-width=A3 is T.30 bit 18 / X.400 bit 22; page-width=B4 is T.30 bit 17 / X.400 bit 23; encoding=2-dimensional is T.30 bit 16 / X.400 bit 8; encoding=Uncompressed is T.30 bit 26 / X.400 bit 30; resolution=Fine is T.30 bit 15 / X.400 bit 9. No-bit-set values represent the default (A4, 1-dimensional, Coarse).'
section: "2.1"
topics:
    - email
