summary: 'Four new cipher suites are defined for TLS 1.2 and DTLS 1.2: TLS_ECDHE_PSK_WITH_AES_128_GCM_SHA256 {0xD0,0x01}, TLS_ECDHE_PSK_WITH_AES_256_GCM_SHA384 {0xD0,0x02}, TLS_ECDHE_PSK_WITH_AES_128_CCM_8_SHA256 {0xD0,0x03}, and TLS_ECDHE_PSK_WITH_AES_128_CCM_SHA256 {0xD0,0x05}. These combine ECDHE key exchange with PSK authentication and AEAD encryption.'
