document: rfc-2633
kind: normative-requirement
summary: Sending and receiving agents MUST support id-dsa (DSS) for signature algorithms, with algorithm parameters MUST be absent (not encoded as NULL). Receiving agents SHOULD support rsaEncryption.
section: "2.2"
rfc2119_level: MUST
