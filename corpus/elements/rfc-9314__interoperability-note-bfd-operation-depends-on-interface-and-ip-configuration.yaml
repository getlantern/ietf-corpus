document: rfc-9314
kind: interoperability-note
summary: 'BFD operation depends on interface and IP configuration from other YANG modules: if ''ietf-interfaces'' ''if:enabled'' is false, no BFD packets can be sent or received. If ''ietf-ip'' ''ip:enabled'' or ''ip:forwarding'' is false for IPv4 or IPv6, no BFD packets of that address family can be sent or received.'
section: 2.10.1
topics:
    - yang
    - ip
