document: rfc-8260
kind: interoperability-note
summary: Future SCTP extensions MUST describe if and how they interfere with the usage of I-DATA chunks. The document provides interaction details for the Partial Reliability extension (RFC 3758) and the Stream Reconfiguration extension (RFC 6525).
