document: rfc-5491
kind: interoperability-note
summary: The geodetic examples in RFC 4119 use the deprecated <gml:location>/<gml:coordinates> elements, which have been superseded in GML 3.1 and beyond. New applications SHOULD use the GeoShape profile with gml:pos instead to ensure consistent parsing.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
