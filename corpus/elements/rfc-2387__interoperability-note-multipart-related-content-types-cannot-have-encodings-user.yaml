document: rfc-2387
kind: interoperability-note
summary: Multipart/Related content-types cannot have encodings. User Agents that do not recognize Multipart/Related will treat it as Multipart/Mixed, so including Content-Disposition headers can provide useful presentation information to those agents.
section: "2"
