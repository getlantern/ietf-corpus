document: rfc-1531
kind: security-consideration
summary: DHCP provides no authentication mechanism for DHCP messages, leaving the protocol vulnerable to malicious servers supplying false configuration parameters or rogue clients claiming addresses. The specification relies entirely on administrative controls and network-layer security rather than cryptographic authentication of DHCP participants.
section: "7"
topics:
    - security
    - ip
