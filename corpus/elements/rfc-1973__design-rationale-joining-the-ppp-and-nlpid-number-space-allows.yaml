document: rfc-1973
kind: design-rationale
summary: Joining the PPP and NLPID number space allows the LCP Protocol-Reject to indicate unrecognized NLPIDs, eliminating 'black-holes' that occur when traffic is not supported. Currently no conflicts exist between NLPID and PPP Protocol values.
