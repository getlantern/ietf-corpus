document: rfc-3047
kind: design-rationale
summary: Because G.722.1 uses Huffman coding within a fixed-size frame, it is impossible to identify individual encoded parameters in the bit stream without fully decoding the frame; therefore the payload format simply preserves the raw bit sequence without reframing.
