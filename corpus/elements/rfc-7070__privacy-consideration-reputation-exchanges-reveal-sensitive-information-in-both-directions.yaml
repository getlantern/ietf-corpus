document: rfc-7070
kind: privacy-consideration
summary: 'Reputation exchanges reveal sensitive information in both directions: the client discloses which subjects it is evaluating, and the server discloses its aggregated assessments of those subjects. DNS-based transports are entirely insecure; services handling sensitive data must use a transport with adequate security.'
section: "8.1"
topics:
    - privacy
    - dns
    - tls
