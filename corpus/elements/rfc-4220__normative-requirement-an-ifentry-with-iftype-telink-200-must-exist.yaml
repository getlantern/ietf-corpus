document: rfc-4220
kind: normative-requirement
summary: An ifEntry with ifType teLink(200) MUST exist in the ifTable before a teLinkEntry can be created with the corresponding ifIndex. If the ifEntry is destroyed, the corresponding teLinkEntry and all associated entries in teLinkDescriptorTable, teLinkSrlgTable, and teLinkBandwidthTable are also destroyed.
section: "9"
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - snmp
