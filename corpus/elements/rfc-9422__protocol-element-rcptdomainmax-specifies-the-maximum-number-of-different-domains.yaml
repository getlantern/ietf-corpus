document: rfc-9422
kind: protocol-element
summary: RCPTDOMAINMAX specifies the maximum number of different domains that can appear in recipient addresses within a single session. This accommodates servers that bind to a specific internal delivery mechanism on receipt of the first RCPT TO. Value syntax is a non-zero integer up to six digits.
section: "4.3"
topics:
    - email
