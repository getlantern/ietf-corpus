document: rfc-5795
kind: wire-format
summary: 'Self-describing variable-length (SDVL) encoding uses 1–4 octets: first bit 0 → 7 bits (up to 127); first bits 10 → 14 bits (up to 16383); first bits 110 → 21 bits; first bits 111 → 29 bits. Large CIDs are restricted to a maximum of 2 octets under this scheme.'
