document: rfc-4237
kind: protocol-element
summary: The vPIMSupportedUABehaviors attribute lists optional features supported by the recipient's UA, including MessageDispositionNotification, MessageSensitivity, and MessageImportance. If absent, only VPIM mandatory attributes are assumed supported. Proprietary extensions must use 'X-' or 'x-' prefix.
