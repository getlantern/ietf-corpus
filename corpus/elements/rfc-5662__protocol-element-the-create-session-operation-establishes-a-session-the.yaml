document: rfc-5662
kind: protocol-element
summary: The CREATE_SESSION operation establishes a session. The request carries clientid4, a sequence number, flags (PERSIST, CONN_BACK_CHAN, CONN_RDMA), fore/back channel_attrs4 (header pad, max request/response sizes, max operations, max requests, optional RDMA IRD), callback program, and security parameters. The response echoes the sessionid4 and confirmed channel attributes.
