document: rfc-7455
kind: protocol-element
summary: The TRILL Header 'A' (Alert) flag is assigned to the reserved bit next to the Version field. A value of 1 indicates a possible OAM frame; definitive identification requires also matching CFM Ethertype 0x8902 at the OAM Ethertype position in the packet. This flag updates RFC 6325, which had no OAM identification mechanism.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
