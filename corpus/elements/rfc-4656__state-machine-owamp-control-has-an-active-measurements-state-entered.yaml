document: rfc-4656
kind: state-machine
summary: OWAMP-Control has an 'active measurements' state, entered after the client sends Start-Sessions and the server acknowledges. Both sides remain in this state until each has both sent and received (in unspecified order) a Stop-Sessions command. The only command available during active measurements is Stop-Sessions.
section: "3.4"
topics:
    - measurement
