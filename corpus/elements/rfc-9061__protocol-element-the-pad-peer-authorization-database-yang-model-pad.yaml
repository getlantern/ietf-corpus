document: rfc-9061
kind: protocol-element
summary: The PAD (Peer Authorization Database) YANG model ('pad-entry' list in ietf-i2nsf-ike) stores per-peer identity (IPv4/IPv6 address, FQDN, RFC822 email, DER-encoded X.509 DN/GeneralName, opaque key, or null), the authentication protocol (IKEv2), and peer-authentication credentials (pre-shared key, EAP method, or digital signature with certificate/raw-public-key/CRL/OCSP).
