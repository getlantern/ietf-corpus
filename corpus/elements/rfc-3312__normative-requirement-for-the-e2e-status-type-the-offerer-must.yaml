document: rfc-3312
kind: normative-requirement
summary: For the e2e status type, the offerer MUST generate one current-status line with tag 'e2e'. If both direction strength-tags are equal, a single 'sendrecv' desired-status line MUST be used; if different, two separate 'send' and 'recv' lines MUST be included.
section: 5.1.1
rfc2119_level: MUST
topics:
    - sip
    - qos
