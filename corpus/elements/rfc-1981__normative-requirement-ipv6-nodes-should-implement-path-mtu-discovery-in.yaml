document: rfc-1981
kind: normative-requirement
summary: IPv6 nodes SHOULD implement Path MTU Discovery in order to discover and take advantage of paths with PMTU greater than the IPv6 minimum link MTU. A minimal implementation (e.g., in a boot ROM) may choose to omit it.
section: "1"
rfc2119_level: SHOULD
topics:
    - ip
