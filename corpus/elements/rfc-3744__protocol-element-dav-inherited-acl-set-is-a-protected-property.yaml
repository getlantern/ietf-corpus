document: rfc-3744
kind: protocol-element
summary: DAV:inherited-acl-set is a protected property containing URLs of resources whose ACLs also control access to this resource. Effective privilege is the AND of privileges granted by the local ACL and each inherited ACL.
section: "5.7"
