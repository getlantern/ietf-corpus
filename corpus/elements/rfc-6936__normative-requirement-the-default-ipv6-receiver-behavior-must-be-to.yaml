document: rfc-6936
kind: normative-requirement
summary: The default IPv6 receiver behavior MUST be to discard all IPv6 packets carrying UDP datagrams with a zero checksum; zero-checksum reception must be explicitly enabled per port.
section: "4"
rfc2119_level: MUST
