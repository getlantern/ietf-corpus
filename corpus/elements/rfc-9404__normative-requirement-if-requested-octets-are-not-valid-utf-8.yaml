document: rfc-9404
kind: normative-requirement
summary: If requested octets are not valid UTF-8 and data or data:asText was requested, isEncodingProblem MUST be set to true and data:asText MUST be null. When data was requested and data is not valid UTF-8, data:asBase64 MUST be returned instead.
section: "4.2"
rfc2119_level: MUST
topics:
