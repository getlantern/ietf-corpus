document: rfc-8853
kind: normative-requirement
summary: An offerer that receives an answer without 'a=simulcast' MUST NOT use simulcast towards the answerer. An offerer that receives an answer with 'a=simulcast' but without any rid-id in a specified direction MUST NOT use simulcast in that direction.
section: 5.3.3
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
