document: rfc-2439
kind: normative-requirement
summary: Implementations should disallow configuration of route damping on IBGP peers. When IBGP routes within an AS are inconsistent, route loops can easily form; suppressing IBGP learned routes causes such inconsistencies.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - bgp
    - routing
