document: rfc-4201
kind: normative-requirement
summary: For multi-access links, if the set of IS-IS/OSPF routers connected to each component link or the Designated Router cannot be enforced to be the same across all component links, multi-access links MUST NOT be bundled.
section: "2.1"
rfc2119_level: MUST NOT
topics:
