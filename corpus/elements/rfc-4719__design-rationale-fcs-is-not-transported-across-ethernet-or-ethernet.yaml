document: rfc-4719
kind: design-rationale
summary: FCS is not transported across Ethernet or Ethernet VLAN PWs, so payload integrity transparency may be lost. To achieve payload integrity transparency, the L2TPv3 session can utilize IPsec as specified in RFC 3931 Section 4.1.3.
section: "4"
topics:
