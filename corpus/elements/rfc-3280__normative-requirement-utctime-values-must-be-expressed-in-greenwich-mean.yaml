document: rfc-3280
kind: normative-requirement
summary: UTCTime values MUST be expressed in Greenwich Mean Time (Zulu) and MUST include seconds (format YYMMDDHHMMSSZ). The year field SHALL be interpreted as 19YY when YY >= 50, and as 20YY when YY < 50.
section: 4.1.2.5.1
rfc2119_level: MUST
