document: rfc-3972
kind: interoperability-note
summary: Other protocols that use CGA signatures MUST define their own type tag values in the CGA Message Type name space, include the sender's CGA address in all signed messages, and evaluate whether the 384-bit minimum RSA key length is sufficient for their security requirements.
section: "7.4"
rfc2119_level: MUST
topics:
