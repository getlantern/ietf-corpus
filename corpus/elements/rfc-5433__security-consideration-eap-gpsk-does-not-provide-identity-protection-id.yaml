document: rfc-5433
kind: security-consideration
summary: EAP-GPSK does not provide identity protection; ID_Peer is transmitted in cleartext in GPSK-2. As a result, although the method provides confidentiality in protected data payloads, it cannot claim confidentiality per RFC 3748 Section 7.2.1.
section: "12.15"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
