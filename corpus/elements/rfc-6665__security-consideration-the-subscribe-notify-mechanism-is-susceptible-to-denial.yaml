document: rfc-6665
kind: security-consideration
summary: The SUBSCRIBE/NOTIFY mechanism is susceptible to denial-of-service attacks where an attacker creates subscriptions that cause excessive NOTIFY traffic toward a victim. Authentication of SUBSCRIBE requests and rate limiting of notifications per event package are the primary mitigations.
section: "6.3"
topics:
    - security
    - sip
