document: rfc-7781
kind: normative-requirement
summary: If any VLAN in an LAALP is mapped to a Fine-Grained Label (FGL) by edge RBridges, the mapping MUST be identical for all edge RBridge ports in that LAALP; otherwise, unicast FGL TRILL Data packets may be mapped into different VLANs depending on which member egresses them.
section: "11"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
