document: rfc-6970
kind: interoperability-note
summary: In IGD:1, PortMappingLeaseDuration value 0 means infinite; in IGD:2, it is remapped to the IGD maximum of 604800 seconds. The IWF must handle both conventions when translating to PCP Requested Lifetime values.
