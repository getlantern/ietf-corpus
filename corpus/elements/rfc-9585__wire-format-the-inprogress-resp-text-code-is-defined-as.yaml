document: rfc-9585
kind: wire-format
summary: 'The INPROGRESS resp-text-code is defined as: ''INPROGRESS'' optionally followed by SP ''('' inprogress-tag SP inprogress-state '')''. The inprogress-tag is a quoted string or NIL; inprogress-state is one of: NIL SP NIL (unknown), number SP NIL (counting), or number SP nz-number (known goal).'
