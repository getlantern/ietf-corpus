document: rfc-2364
kind: security-consideration
summary: For SVC-based ATM networks, PPP over AAL5 leverages existing PAP/CHAP authentication mechanisms, providing security parity with Internet dial-up access. Applications requiring stronger security SHOULD use authentication headers, encrypted payloads, and/or ATM-layer security services.
section: "10"
topics:
