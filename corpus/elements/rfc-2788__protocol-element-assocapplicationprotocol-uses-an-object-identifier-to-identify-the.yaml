document: rfc-2788
kind: protocol-element
summary: assocApplicationProtocol uses an OBJECT IDENTIFIER to identify the protocol in use. For TCP-based protocols, OIDs of the form {applTCPProtoID port} are used; for UDP-based protocols, {applUDPProtoID port}. For OSI applications, the Application Context OID is used.
