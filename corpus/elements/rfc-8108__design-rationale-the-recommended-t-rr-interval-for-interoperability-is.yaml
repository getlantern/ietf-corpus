document: rfc-8108
kind: design-rationale
summary: The recommended T_rr_interval for interoperability is 4 seconds rather than the intuitive 5 seconds, because T_rr_interval suppression causes actual AVPF reporting intervals to be longer than expected, and 4 seconds produces intervals closer to what RTP/AVP endpoints expect.
