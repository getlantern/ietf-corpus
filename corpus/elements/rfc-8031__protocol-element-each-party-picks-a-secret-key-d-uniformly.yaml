document: rfc-8031
kind: protocol-element
summary: Each party picks a secret key d uniformly at random, computes pub_mine = X(d, G), exchanges public keys, and computes SHARED_SECRET = X(d, pub_peer). The shared secret is used directly as g^ir in IKEv2 (RFC 7296 Section 2.14), and is 32 octets for Curve25519 or 56 octets for Curve448.
section: "2"
