document: rfc-5698
kind: normative-requirement
summary: During policy verification, the policy signature SHOULD be verified and a certification path to a current trust anchor SHOULD be constructed and validated. The algorithms used for this verification MUST themselves be suitable per the policy being verified; if not, the policy MUST be rejected.
section: "6.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
    - pkix
