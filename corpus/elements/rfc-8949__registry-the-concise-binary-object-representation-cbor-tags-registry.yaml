kind: registry
summary: 'The ''Concise Binary Object Representation (CBOR) Tags'' registry (Section 9.2) tracks tag number assignments with a three-tier policy: tag numbers 0–23 require Standards Action, 24–32767 require Specification Required, and 32768 and above are First Come First Served.'
