document: rfc-7144
kind: interoperability-note
summary: An iSCSI implementation may negotiate iSCSIProtocolLevel=2 but still respond to new task management functions with "Task management function not supported" (a SCSI error), since the key negotiation enables the iSCSI framing but not necessarily the SCSI capabilities; these are governed independently by SAM-5 and SPC-4.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
