document: rfc-3264
kind: state-machine
summary: 'Hold mechanism: a sendrecv stream is placed on hold by the offerer marking it sendonly (offerer stops receiving); a recvonly stream is placed on hold by marking it inactive. Each stream direction is held independently. The held party SHOULD NOT automatically return held SDP.'
section: "8.4"
