document: rfc-4213
kind: design-rationale
summary: Automatic tunneling and IPv4-compatible addresses from RFC 2893 were removed in this document because RFC 3056 provides a more general mechanism that gives each node with a global IPv4 address an entire /48 IPv6 prefix. The document was simplified to retain only widely-deployed mechanisms.
