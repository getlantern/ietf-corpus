document: rfc-8074
kind: normative-requirement
summary: SEND nodes in the network MUST disable the option to ignore unsecured advertisements (per RFC 3971 Section 8) when the SAVI-MIX configuration-preference defense mechanism is in use; if that option is enabled, the case is outside the scope of this document.
