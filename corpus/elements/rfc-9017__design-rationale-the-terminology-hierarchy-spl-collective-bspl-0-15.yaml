summary: The terminology hierarchy — SPL (collective), bSPL (0–15), eSPL (16–1048575), xSPL (value 15 used as extension), and cSPL (XL + eSPL) — was introduced to provide consistent, unambiguous naming for specifications and documentation of MPLS special-purpose labels.
