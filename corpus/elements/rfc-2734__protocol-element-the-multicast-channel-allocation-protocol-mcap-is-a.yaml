summary: The Multicast Channel Allocation Protocol (MCAP) is a cooperative protocol exchanged over the broadcast channel; it uses Advertise (opcode 0) and Solicit (opcode 1) messages to map IP multicast group addresses to Serial Bus channel numbers other than the default broadcast channel.
