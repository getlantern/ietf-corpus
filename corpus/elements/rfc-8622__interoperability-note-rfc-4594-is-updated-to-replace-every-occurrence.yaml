document: rfc-8622
kind: interoperability-note
summary: RFC 4594 is updated to replace every occurrence of the CS1 DSCP ('001000') for the Low-Priority Data service class with the LE DSCP ('000001'), and the reference for this service class is updated from RFC 3662 to RFC 8622. The prior Section 2.3 re-marking recommendation for IP Precedence network segments is also removed as unnecessary with the new LE DSCP.
