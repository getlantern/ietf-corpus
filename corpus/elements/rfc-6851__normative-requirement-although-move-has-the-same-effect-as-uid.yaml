document: rfc-6851
kind: normative-requirement
summary: Although MOVE has the same effect as [UID] COPY + [UID] STORE +FLAGS.SILENT \Deleted + UID EXPUNGE, response codes for a STORE MUST NOT be generated and the \Deleted flag MUST NOT be set for any message during a MOVE operation.
section: "3.3"
rfc2119_level: MUST NOT
topics:
