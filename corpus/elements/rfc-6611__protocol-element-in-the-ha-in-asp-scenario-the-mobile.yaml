document: rfc-6611
kind: protocol-element
summary: In the HA-in-ASP scenario, the mobile node sets the id-type field to zero in the Home Network Identifier Option (RFC 6610) in its DHCPv6 request to signal that it wants home agent allocation in the ASP. The ASP then acts as the MSP for the duration of the network access authentication session.
section: 4.2.2
topics:
