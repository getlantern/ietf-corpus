document: rfc-8855
kind: normative-requirement
summary: If a floor control server receives an unrecognized attribute with the Mandatory ('M') bit set, it MUST send an Error message with parameter value 4 (Unknown Mandatory Attribute). Unrecognized attributes without 'M' set are silently ignored and the message is still processed.
section: "5.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
