document: rfc-7138
kind: design-rationale
summary: For fixed containers, the encoding advertises only the count of available ODU containers (16 bits) rather than available bandwidth (32 bits as in prior GMPLS encoding). This halves the per-container advertisement size while preserving path computation accuracy for fixed-size ODUs.
