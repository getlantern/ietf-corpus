document: rfc-9594
kind: protocol-element
summary: 'The KDC interface consists of a fixed resource hierarchy: /ace-group (root, FETCH), /ace-group/GROUPNAME (group-membership, POST/GET), /ace-group/GROUPNAME/creds (member credentials, GET/FETCH), /ace-group/GROUPNAME/kdc-cred (KDC credential, GET), /ace-group/GROUPNAME/policies (GET), /ace-group/GROUPNAME/num (keying material version, GET), /ace-group/GROUPNAME/nodes/NODENAME (per-member, GET/POST/DELETE), and /ace-group/GROUPNAME/nodes/NODENAME/cred (credential upload, POST).'
section: "4.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
