document: rfc-8861
kind: protocol-element
summary: The RTCP RGRP SDES item (type value 11) is sent exclusively by reporting sources to identify which Reporting Group they belong to. Its format is identical to the CNAME SDES item but with SDES item type RGRP=11. Its value must be globally unique and stable for the lifetime of the Reporting Group.
section: 3.2.1
topics:
    - rtp
    - realtime
    - registry
