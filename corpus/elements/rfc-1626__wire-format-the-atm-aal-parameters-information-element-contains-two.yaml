summary: 'The ATM ''AAL Parameters'' Information Element contains two fields for MTU negotiation: Forward Maximum CPCS-SDU Size (calling to called party path) and Backwards Maximum CPCS-SDU Size Identifier (called to calling party path). Valid values are 1 to 65535 inclusive, and the two directions may differ.'
