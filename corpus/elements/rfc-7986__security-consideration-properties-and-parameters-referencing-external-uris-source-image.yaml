document: rfc-7986
kind: security-consideration
summary: Properties and parameters referencing external URIs (SOURCE, IMAGE, CONFERENCE, etc.) can carry malicious content. Clients MUST ensure suitable user permission before dereferencing such URIs, MUST throttle REFRESH-INTERVAL-driven requests to a reasonable rate, and MUST NOT send MODERATOR CONFERENCE properties to attendees.
section: "7"
topics:
    - security
