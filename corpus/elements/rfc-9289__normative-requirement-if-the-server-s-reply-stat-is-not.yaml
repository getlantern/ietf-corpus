document: rfc-9289
kind: normative-requirement
summary: If the server's reply_stat is not MSG_ACCEPTED, its verifier flavor is not AUTH_NONE, or its verifier does not contain the 'STARTTLS' token, the RPC client MUST NOT send a ClientHello message.
