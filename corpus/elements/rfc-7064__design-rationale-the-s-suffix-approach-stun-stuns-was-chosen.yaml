document: rfc-7064
kind: design-rationale
summary: The 's' suffix approach (stun/stuns) was chosen over a URI parameter (e.g., ';proto=tls') because the need for such a parameter could not be sufficiently explained, supporting it would render an incomplete specification, and the suffix maintains symmetry with the TURN URI scheme.
