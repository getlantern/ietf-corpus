document: rfc-4022
kind: interoperability-note
summary: The tcpListenerTable represents an application accepting both IPv4 and IPv6 with InetAddressType unknown(0) and a zero-length address; an application accepting only one family uses '0.0.0.0' or '::' with the appropriate type. The address type reflects the actual communication protocol, not socket-level abstraction.
section: "3"
topics:
    - tcp
    - snmp
