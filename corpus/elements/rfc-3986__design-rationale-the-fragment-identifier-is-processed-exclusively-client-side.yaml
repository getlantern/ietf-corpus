document: rfc-3986
kind: design-rationale
summary: The fragment identifier is processed exclusively client-side (by the user agent) and is stripped from the URI before any dereference operation. This design prevents information providers from controlling how reference authors selectively identify portions of a resource, and allows fragment semantics to be defined by media type rather than URI scheme.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
