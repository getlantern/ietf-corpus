document: rfc-6957
kind: design-rationale
summary: ND Proxy (RFC 4389) is insufficient because the AN only forwards ND messages to the BNG (not to other CPEs), and the BNG must not forward link-local scoped messages between CPEs, making ND Proxy deployment on either node ineffective for cross-CPE DAD.
section: "3.2"
topics:
    - ip
    - v6ops
