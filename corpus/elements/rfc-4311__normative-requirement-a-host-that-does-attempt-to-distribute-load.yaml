document: rfc-4311
kind: normative-requirement
summary: A host that does attempt to distribute load among routers SHOULD use a hash-based scheme that takes (at least) the destination IP address into account, such as those described in RFC 2991, for choosing a router to use.
section: "2"
rfc2119_level: SHOULD
