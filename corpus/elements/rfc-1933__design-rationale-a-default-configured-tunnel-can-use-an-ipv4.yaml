document: rfc-1933
kind: design-rationale
summary: A default configured tunnel can use an IPv4 anycast address as its endpoint, with multiple IPv6/IPv4 border routers advertising reachability to the same IPv4 address. This provides robustness because IPv4 routing automatically redirects traffic to another border router if one fails.
section: 4.2.1
topics:
