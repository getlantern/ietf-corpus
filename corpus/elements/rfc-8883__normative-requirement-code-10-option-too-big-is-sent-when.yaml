document: rfc-8883
kind: normative-requirement
summary: Code 10 ('Option too big') is sent when either the length of an individual Hop-by-Hop or Destination Option exceeds a limit, or when the length/number of consecutive padding options (PAD1 or PADN) exceeds a limit, with the Pointer set to the first octet of the offending option.
section: "2.7"
rfc2119_level: SHOULD
topics:
    - ip
