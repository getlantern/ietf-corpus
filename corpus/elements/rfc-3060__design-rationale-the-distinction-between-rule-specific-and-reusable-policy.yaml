document: rfc-3060
kind: design-rationale
summary: 'The distinction between rule-specific and reusable policy conditions/actions is semantic rather than structural: reusable conditions reside in a policy repository with independently expressible access permissions and existence criteria, while rule-specific conditions share their lifecycle and permissions with their single owning rule.'
section: "5.1"
