document: rfc-3036
kind: normative-requirement
summary: An LSR MUST advertise the same transport address in all Hellos that advertise the same label space. This ensures that two LSRs linked by multiple Hello adjacencies using the same label spaces play the same connection establishment role for each adjacency.
section: 2.5.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
