document: rfc-9776
kind: interoperability-note
summary: 'IGMP Query version is determined by message length and Max Resp Code: IGMPv1 Query has length 8 and Max Resp Code = 0; IGMPv2 Query has length 8 and Max Resp Code != 0; IGMPv3 Query has length >= 12. Queries not matching any condition MUST be silently ignored.'
section: "7.1"
topics:
    - multicast
