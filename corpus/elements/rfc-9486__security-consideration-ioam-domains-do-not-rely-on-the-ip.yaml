document: rfc-9486
kind: security-consideration
summary: IOAM-Domains do not rely on the IP Authentication Header (AH, RFC 4302) to secure IOAM options. The use of IOAM options with AH is not defined in this document and is left for future specifications.
section: "5.1"
topics:
