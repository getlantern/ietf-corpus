document: rfc-9112
kind: normative-requirement
summary: If a message is received without Transfer-Encoding and with an invalid Content-Length, the framing is invalid and the recipient MUST treat it as an unrecoverable error; a server MUST respond with 400 and close the connection.
section: "6.3"
rfc2119_level: MUST
topics:
    - http
