document: rfc-1762
kind: wire-format
summary: DNA Phase IV Routing packets are encapsulated in the PPP Information field (Protocol hex 0027) preceded by a 2-octet length field stored in VAX byte ordering (least significant byte first). The length field counts the octets in the DNA Phase IV Routing packet only.
