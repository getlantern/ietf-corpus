document: rfc-4815
kind: normative-requirement
summary: When a CID is reused for a context based on a different profile, both compressor and decompressor MUST start operation in that profile's initial mode. A CID currently in R-mode SHOULD NOT be reused for a different profile due to the risk of packet type misinterpretation if the initiating IR packets are lost.
section: 7.2.2
rfc2119_level: MUST
topics:
    - rtp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
