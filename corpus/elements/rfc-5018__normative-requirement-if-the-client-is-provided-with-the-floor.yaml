document: rfc-5018
kind: normative-requirement
summary: If the client is provided with the floor control server's host name instead of its IP address, the client MUST perform a DNS lookup to resolve the host name into an IP address, performing A or AAAA lookups (or both).
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - ip
