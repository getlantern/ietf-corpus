document: rfc-7915
kind: normative-requirement
summary: Implementations of this IPv4/IPv6 translation specification MUST support one or more address mapping algorithms as defined in Section 6. The translator MUST support the stateless address mapping algorithm defined in RFC 6052 as the default behavior.
section: "1"
rfc2119_level: MUST
topics:
