document: rfc-2535
kind: design-rationale
summary: DNSSEC explicitly does not provide confidentiality (query/response privacy), access control, or denial-of-service protection, following the DNS design philosophy that data is public and the same answers are given to all inquirers. These services may be obtained via IPsec, TLS, or other security protocols.
section: "2.1"
topics:
    - dns
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
