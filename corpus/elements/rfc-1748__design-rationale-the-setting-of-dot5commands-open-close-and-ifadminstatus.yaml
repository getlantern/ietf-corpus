document: rfc-1748
kind: design-rationale
summary: 'The setting of dot5Commands (open/close) and ifAdminStatus are interdependent: setting one affects the other. This bidirectional coupling was explicitly clarified in RFC 1748 to resolve ambiguity present in RFC 1231, ensuring consistent interface state management.'
