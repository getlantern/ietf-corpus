document: rfc-7977
kind: security-consideration
summary: MSRP traffic transported over WebSockets MUST be protected by a secure WebSocket connection (WSS/TLS). The client MUST authenticate the server using the server's certificate according to the WebSocket validation procedure in RFC 6455.
section: "9"
rfc2119_level: MUST
topics:
    - websocket
    - tls
    - security
