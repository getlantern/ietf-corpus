document: rfc-2326
kind: wire-format
summary: RTSP is a text-based protocol using ISO 10646 (UTF-8) encoding. Lines are terminated by CRLF, but receivers SHOULD be prepared to interpret bare CR or LF as line terminators. Messages can be carried over any 8-bit-clean transport.
