document: rfc-2096
kind: normative-requirement
summary: Any assignment of ipCidrRouteDest to value x must be rejected if the bitwise logical-AND of x with the corresponding ipCidrRouteMask is not equal to x. This enforces consistency between destination address and mask.
section: "4"
rfc2119_level: MUST NOT
topics:
