document: rfc-9438
kind: interoperability-note
summary: This document updates RFC 5681 Section 3 by replacing the restriction limiting cwnd increments to at most SMSS per RTT with a normative reference to RFC 5033 guideline (1), which permits CUBIC's occasionally more aggressive cwnd increases during congestion avoidance and slow start.
section: "1"
topics:
