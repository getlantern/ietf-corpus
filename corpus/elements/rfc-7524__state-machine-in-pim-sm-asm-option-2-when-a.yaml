document: rfc-7524
kind: state-machine
summary: In PIM-SM ASM Option 2, when a PE has a (*,G) TIB entry with an MPLS LSP in the outgoing interface list, receives a Source Active A-D route for (S,G), and does not originate a Leaf A-D route for (S,G), the PE MUST transition the (S,G,rpt) downstream state machine to Prune state after a configurable timer. The Prune state MUST be maintained until one of the three triggering conditions becomes invalid.
section: 6.3.2.3
topics:
    - mpls
    - routing
