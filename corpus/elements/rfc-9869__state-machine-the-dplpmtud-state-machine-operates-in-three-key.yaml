document: rfc-9869
kind: state-machine
summary: 'The DPLPMTUD state machine operates in three key phases: BASE_PLPMTU confirmation (connectivity probing), SEARCHING (probing to find a larger PLPMTU, entered after PMTU_RAISE_TIMER expiry), and SEARCH_COMPLETE (periodic path validation to detect black-holing). Transitions are driven by probe success, failure, or timer expiry.'
