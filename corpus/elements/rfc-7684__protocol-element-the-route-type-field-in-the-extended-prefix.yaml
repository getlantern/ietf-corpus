document: rfc-7684
kind: protocol-element
summary: 'The Route Type field in the Extended Prefix TLV takes values: 0 (Unspecified — applies regardless of route type), 1 (Intra-Area), 3 (Inter-Area), 5 (AS External), 7 (NSSA External). These correspond to OSPFv2 LSA types in the IANA OSPFv2 LS Type registry.'
