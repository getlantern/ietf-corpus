document: rfc-9221
kind: wire-format
summary: 'DATAGRAM frames use Type field values 0x30 (no Length field) and 0x31 (Length field present). The LEN bit (0x01, least significant bit) controls presence of the Length field. Format: Type (i) = 0x30..0x31, optional Length (variable-length integer), Datagram Data (..).'
