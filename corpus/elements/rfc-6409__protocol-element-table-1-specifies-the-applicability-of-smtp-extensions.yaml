document: rfc-6409
kind: protocol-element
summary: 'Table 1 specifies the applicability of SMTP extensions on the submission port: PIPELINING, ENHANCEDSTATUSCODES, DSN, and 8BITMIME are SHOULD; AUTH is MUST; ETRN, 521 reply code, and ATRN are MUST NOT; SIZE, CHECKPOINT, BINARYMIME, CHUNKING, STARTTLS, NO-SOLICITING, MTRK, DELIVERBY, CONPERM, and CONNEG are MAY.'
