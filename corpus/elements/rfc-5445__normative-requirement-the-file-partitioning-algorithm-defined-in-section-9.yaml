document: rfc-5445
kind: normative-requirement
summary: The file-partitioning algorithm defined in Section 9.1 of RFC 5052 MUST be used to partition an object into source blocks for the Compact No-Code FEC Scheme (Section 3.3), the Small Block/Large Block/Expandable FEC Scheme (Section 4.3), and the Compact FEC Scheme (Section 6.3).
section: "3.3"
rfc2119_level: MUST
