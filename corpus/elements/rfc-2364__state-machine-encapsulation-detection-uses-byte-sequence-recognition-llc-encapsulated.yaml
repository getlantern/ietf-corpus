document: rfc-2364
kind: state-machine
summary: 'Encapsulation detection uses byte-sequence recognition: LLC-encapsulated LCP packets begin with fe-fe-03-cf-c0-21 (first 6 octets of AAL5 frame); VC-multiplexed LCP packets begin with c0-21 (first 2 octets). When an LCP Configure-Request is recognized, the PPP link enters Link Establishment phase.'
