document: rfc-7450
kind: interoperability-note
summary: 'The IP protocol of encapsulated packets need not match the IP protocol used for AMT transport: AMT messages sent via IPv4 may carry IPv6/MLD packets, and AMT messages sent via IPv6 may carry IPv4/IGMP packets.'
section: 4.2.2.3
topics:
