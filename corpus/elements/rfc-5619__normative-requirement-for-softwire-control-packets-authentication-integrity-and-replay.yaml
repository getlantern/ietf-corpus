document: rfc-5619
kind: normative-requirement
summary: For softwire control packets, authentication, integrity, and replay protection MUST be supported; confidentiality SHOULD be supported. For data packets, authentication, integrity, and replay protection SHOULD be supported; confidentiality MAY be supported.
