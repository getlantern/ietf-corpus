document: rfc-5288
kind: security-consideration
summary: When multiple encryption processors share a key, the sender MUST ensure each nonce_explicit value is distinct across processors; each processor SHOULD embed a fixed distinct sub-field (FixedDistinct) with uniform length, combined with a per-record variable counter.
section: "6.2"
rfc2119_level: MUST
topics:
