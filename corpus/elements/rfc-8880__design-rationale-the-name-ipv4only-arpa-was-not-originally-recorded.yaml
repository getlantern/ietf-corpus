document: rfc-8880
kind: design-rationale
summary: The name 'ipv4only.arpa' was not originally recorded in the Special-Use Domain Names registry because RFC 7050's Domain Name Reservation Considerations section incorrectly indicated the name had no special properties. This omission left software implementers without a clear mandate to implement the special behavior necessary for correct operation, forcing a choice between noncompliance and non-functioning software.
section: "1"
topics:
    - dns
    - nat
    - v6ops
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
