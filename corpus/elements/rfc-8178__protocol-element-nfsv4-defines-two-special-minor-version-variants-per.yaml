document: rfc-8178
kind: protocol-element
summary: 'NFSv4 defines two special minor version variants per minor version: the ''base minor version'' is the variant as originally defined without any post-publication extensions or corrections, and the ''current minor version'' includes all Standards Track extensions and corrections published up to a given time. Each implementation implements some variant that is a subset of the current and a superset of the base.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
