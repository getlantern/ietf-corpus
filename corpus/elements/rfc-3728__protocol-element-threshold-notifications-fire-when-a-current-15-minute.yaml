document: rfc-3728
kind: protocol-element
summary: Threshold notifications fire when a current 15-minute interval error counter becomes equal to or exceeds the configured threshold value. At most one notification is sent per interval per interface; counters reset to 0 every 15 minutes, so a persistent condition may re-notify as often as every 15 minutes.
section: "2.6"
topics:
    - snmp
