document: rfc-6737
kind: normative-requirement
summary: The receiver of a CUR MUST determine common applications by computing the intersection of its own supported Application Ids against all Auth-Application-Id, Acct-Application-Id, and Vendor-Specific-Application-Id AVPs present in the CUR. The Vendor-Id AVP in Vendor-Specific-Application-Id MUST NOT be used during this computation.
section: "4"
rfc2119_level: MUST
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
