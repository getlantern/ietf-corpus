document: rfc-5255
kind: interoperability-note
summary: The IMAP LOGIN command userid and password fields are restricted to US-ASCII until a future standards-track RFC states otherwise. Servers are encouraged to validate both fields as valid UTF-8 and MAY reject LOGIN if either field contains an octet with the high bit set.
section: "5.1"
topics:
