document: rfc-2677
kind: protocol-element
summary: nhrpServerStatTable tracks per-NHS statistics with Rx, Tx, and Fw (forwarded) counters. The forwarded counters (nhrpServerStatFwResolveReq, FwRegisterReq, FwPurgeReq, etc.) are specific to transit NHSes that forward NHRP packets without being the authoritative server.
