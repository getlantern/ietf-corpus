document: rfc-7581
kind: wire-format
summary: ITU-T G.698.1 application codes are mapped to a 64-bit Optical Interface Class field encoding fields B, D, S, c (4-bit channel spacing per RFC 6205), W, y, t, z, v, and F (FEC present) in the first 32 bits; the last 32 bits are reserved and set to zero.
