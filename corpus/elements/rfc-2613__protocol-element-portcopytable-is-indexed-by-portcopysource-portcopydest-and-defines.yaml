document: rfc-2613
kind: protocol-element
summary: portCopyTable is indexed by (portCopySource, portCopyDest) and defines port mirroring relationships. Key fields are portCopyDestDropEvents (Counter32 of drop events at the destination), portCopyDirection (copyRxOnly/copyTxOnly/copyBoth, default copyBoth), and portCopyStatus (RowStatus controlling activation).
