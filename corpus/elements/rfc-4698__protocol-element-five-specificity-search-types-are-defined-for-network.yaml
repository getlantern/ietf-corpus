document: rfc-4698
kind: protocol-element
summary: 'Five specificity search types are defined for network/ASN queries: (1) all-less-specifics: start(net)<=start(search) AND end(net)>=end(search); (2) one-level-less-specifics: most specific containing network; (3) all-more-specifics: start(net)>=start(search) AND end(net)<=end(search); (4) one-level-more-specifics: least specific contained networks; (5) exact-match: start(net)=start(search) AND end(net)=end(search).'
section: "4"
