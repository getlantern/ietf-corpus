document: rfc-6604
kind: protocol-element
summary: The AD (Authentic Data) bit is set in a DNS response header only if the DNSSEC-enabled server believes all RRs in the answer and authority sections of that response to be authentic. This requirement applies across the entire response, not just the final query cycle of an xNAME chain.
section: "2.2"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
