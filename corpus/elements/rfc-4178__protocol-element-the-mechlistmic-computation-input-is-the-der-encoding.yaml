summary: The mechListMIC computation input is the DER encoding of the value of type MechTypeList (the contents of the 'mechTypes' field), NOT the DER encoding of the '[0] MechTypeList' tagged type. The identifier and length octets for constructed [0] (A0 nn) are excluded from the MIC computation.
