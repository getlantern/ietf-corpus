document: rfc-9562
kind: normative-requirement
summary: When timestamp padding is required, implementations MUST pad the most significant (leftmost) bits. When truncation is required, the lower, least significant bits MUST be used. A UUID generator MUST NOT knowingly return duplicate values due to a counter rollover.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
