document: rfc-2067
kind: wire-format
summary: 'The I-field (32 bits) in logical address mode encodes: Locally Administered (bit 31), Reserved (bits 30–29), Double_Wide/W (bit 28), Direction/D (bit 27), Path Selection/PS (bits 26–25), Camp-on/C (bit 24), Source Address (bits 23–12), and Destination Address (bits 11–0, containing the Switch Address).'
