document: rfc-7887
kind: interoperability-note
summary: Even a router that is not the upstream neighbor must be able to parse Join/Prune messages with hierarchical attributes in order to perform Join suppression and Prune override. This requires all PIM neighbors on an interface to support the hierarchical encoding before it can be used.
section: "5"
topics:
    - multicast
    - routing
