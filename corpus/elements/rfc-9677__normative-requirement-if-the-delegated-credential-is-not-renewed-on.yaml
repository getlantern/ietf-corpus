document: rfc-9677
kind: normative-requirement
summary: If the delegated credential is not renewed on time by the uCDN, dCDN servers that only have expired delegated credentials MUST refuse any new TLS connection that requires an up-to-date delegated credential.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - security
