kind: protocol-element
summary: 'BOOTP uses two reserved UDP ports: port 67 (''BOOTP server'') and port 68 (''BOOTP client''). Clients send bootrequest packets to destination port 67 (usually broadcast); servers send bootreply packets to destination port 68 on the client.'
