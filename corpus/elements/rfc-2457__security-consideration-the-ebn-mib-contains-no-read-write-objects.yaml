document: rfc-2457
kind: security-consideration
summary: The EBN MIB contains no read-write objects and no passwords or user data, but network configuration and usage information may be considered corporate assets; enterprises may wish to restrict SNMP access to most MIB objects. Authentication (RFC 2274) and access control (RFC 2275) mechanisms are referenced.
section: "5.0"
topics:
    - snmp
    - security
