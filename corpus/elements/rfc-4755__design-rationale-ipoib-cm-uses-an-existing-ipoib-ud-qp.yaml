document: rfc-4755
kind: design-rationale
summary: IPoIB-CM uses an existing IPoIB-UD QP for multicast/broadcast rather than emulating multicast over connected mode, because every IPoIB implementation is required to support UD mode, avoiding the need for a separate multicast emulation mechanism.
