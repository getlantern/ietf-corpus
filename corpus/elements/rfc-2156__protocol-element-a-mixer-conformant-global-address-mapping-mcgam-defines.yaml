document: rfc-2156
kind: protocol-element
summary: A MIXER Conformant Global Address Mapping (MCGAM) defines administrative equivalence between a point in the X.400 OR Address hierarchy and a point in the Internet domain hierarchy, enabling algorithmic derivation of addresses below those points. MCGAMs must be defined by an authority with responsibility for both namespaces.
section: "4.2"
topics:
    - email
    - dns
