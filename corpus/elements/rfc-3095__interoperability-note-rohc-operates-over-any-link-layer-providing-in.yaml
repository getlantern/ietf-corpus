document: rfc-3095
kind: interoperability-note
summary: ROHC operates over any link-layer providing in-order, non-duplicating delivery with framing and a negotiation mechanism. It does not require a reliable link — it is explicitly designed for links with BER up to 1E-3 (and in severe cases 1E-2) and RTTs up to 100-200 ms, where previous schemes such as CRTP fail.
section: "4.1"
topics:
    - rtp
    - realtime
