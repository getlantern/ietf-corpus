document: rfc-7591
kind: normative-requirement
summary: The authorization server MUST require the use of a transport-layer security mechanism when sending requests to the registration endpoint. The server MUST support TLS 1.2 and the client MUST perform a TLS/SSL server certificate check per RFC 6125.
section: "5"
rfc2119_level: MUST
topics:
    - oauth
    - security
    - tls
