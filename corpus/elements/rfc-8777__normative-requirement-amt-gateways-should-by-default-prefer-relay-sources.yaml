document: rfc-8777
kind: normative-requirement
summary: 'AMT gateways SHOULD by default prefer relay sources in this order: (1) DNS-SD (_amt._udp), (2) well-known anycast addresses from RFC 7450 Section 7, (3) DRIAD (AMTRELAY RR). This default MAY be overridden by administrative configuration.'
section: 3.1.2
rfc2119_level: SHOULD
topics:
    - dns
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
