document: rfc-6113
kind: normative-requirement
summary: The KDC SHOULD NOT send data encrypted in the long-term password-based key of the principal before the client has proven knowledge of that key, as this has the same security exposure as Kerberos without pre-authentication.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
    - security
