document: rfc-4012
kind: interoperability-note
summary: Inclusion of IPv6 prefix ranges in a mnt-routes attribute within an aut-num object may conflict with existing RPSL implementations that support only IPv4 prefix ranges. The afi specification within refine/except expressions is valid only within the containing policy expression.
