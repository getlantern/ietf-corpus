document: rfc-5763
kind: normative-requirement
summary: The offerer MUST use the setup attribute value of setup:actpass and be prepared to receive a ClientHello before it receives the answer. The answerer MUST use either setup:active or setup:passive; setup:active is RECOMMENDED because it allows the answer and the DTLS handshake to occur in parallel.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - sip
    - realtime
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
