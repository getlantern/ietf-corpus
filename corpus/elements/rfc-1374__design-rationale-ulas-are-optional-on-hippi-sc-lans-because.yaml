document: rfc-1374
kind: design-rationale
summary: ULAs are optional on HIPPI-SC LANs because HIPPI-SC switches do not use them for routing; however they are encouraged because they simplify gateway devices that replace HIPPI headers with MAC headers of other LANs and may be required by future HIPPI-based LANs.
section: 48 bit Universal LAN MAC Addresses
topics:
    - ip
