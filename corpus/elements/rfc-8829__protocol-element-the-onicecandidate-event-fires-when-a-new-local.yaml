document: rfc-8829
kind: protocol-element
summary: The onicecandidate event fires when a new local candidate is discovered or when a gathering phase completes. In the completion case, the IceCandidate's candidate field MUST be null and the ufrag field MUST be specified; the m= section fields MAY be null to indicate all sections.
