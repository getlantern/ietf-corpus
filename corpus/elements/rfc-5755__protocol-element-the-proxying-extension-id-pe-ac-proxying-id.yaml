document: rfc-5755
kind: protocol-element
summary: The Proxying extension (id-pe-ac-proxying, { id-pe 10 }) uses a ProxyInfo (SEQUENCE OF Targets) structure to control which servers may forward an AC on behalf of a holder. This extension MUST be marked critical. A proxy check succeeds if the sender matches the Holder field and the current server matches a proxy set, or if both sender and current server match the same proxy set.
section: "7.2"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
