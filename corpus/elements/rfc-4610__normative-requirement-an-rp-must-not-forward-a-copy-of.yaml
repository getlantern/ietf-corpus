document: rfc-4610
kind: normative-requirement
summary: An RP MUST NOT forward a copy of a Register to other RPs if the Register was received from an IP address that is in the Anycast-RP list (i.e., it originated from another RP, not a DR), preventing forwarding loops.
section: "4"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
