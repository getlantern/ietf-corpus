document: rfc-2449
kind: design-rationale
summary: Future POP3 extensions are generally discouraged because POP3's usefulness lies in its simplicity as a download-and-delete protocol. Extensions supporting additional mailboxes, message uploads, or deviations from the download-and-delete model are strongly discouraged and unlikely to be permitted on the standards track.
section: "7"
topics:
