document: rfc-5225
kind: design-rationale
summary: ROHCv2 mandates a CRC in the FEEDBACK-2 format (optional in RFC 3095) and uses a different set of feedback options. This ensures feedback integrity so that a compressor can reliably trust decompressor state reports and avoid sending unnecessary context refreshes once bidirectional operation is established.
section: "4.2"
topics:
    - realtime
    - rtp
