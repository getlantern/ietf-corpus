document: rfc-7616
kind: normative-requirement
summary: The nc (nonce count) parameter MUST be used by all implementations and MUST be exactly 8 hexadecimal digits (e.g., "00000001"). The server uses it to detect replay attacks by checking that the same nc value is not seen twice.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
