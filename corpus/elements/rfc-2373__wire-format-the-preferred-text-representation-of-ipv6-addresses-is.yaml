document: rfc-2373
kind: wire-format
summary: The preferred text representation of IPv6 addresses is x:x:x:x:x:x:x:x, eight groups of four hexadecimal digits separated by colons. Leading zeros within each 16-bit group may be omitted, but each group must have at least one digit.
