document: rfc-4356
kind: protocol-element
summary: 'Delivery report mapping from MMS to Internet (Table 4): MMS ''X-Mms-Status:'' maps to DSN Action and Status fields. MMS status ''retrieved''/''rejected'' maps to Action ''delivered''; ''expired''/''unreachable'' maps to ''failed''; ''deferred'' MAY map to ''delayed''; ''indeterminate'' maps to ''relayed''.'
