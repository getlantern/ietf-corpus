document: rfc-5436
kind: design-rationale
summary: 'The owner-token parameter in Auto-Submitted was added to allow identification of the Sieve script owner while protecting the owner''s privacy. This is a non-obvious design choice: owner-email reveals the actual address, whereas owner-token is opaque and only meaningful to the originating administrative domain.'
section: 2.7.1
topics:
    - email
    - privacy
