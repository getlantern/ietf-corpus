document: rfc-2592
kind: registry
summary: IANA is responsible for registering OID values for well-known script languages under the smLangLanguage arc. Section 9 notes this responsibility; enterprise-specific languages may also be registered in vendor-specific enterprise OID subtrees. No specific language OIDs are registered in this RFC itself.
