document: rfc-860
kind: interoperability-note
summary: Implementers must ensure that a system which proactively sends WILL TIMING-MARK (before receiving DO TIMING-MARK) remembers this so that the subsequent DO/DON'T TIMING-MARK, when it arrives, is discarded rather than acted upon.
section: "4"
extracted_by: claude-sonnet-4-6
