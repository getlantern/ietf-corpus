document: rfc-8380
kind: design-rationale
summary: A server acting as an edge node can use its own MAC address as the source MAC in frames from hosted VMs; the egress target node then uses directory-provided IP-to-MAC mapping to deliver to the correct VM, effectively hiding VM MAC addresses from local bridges.
section: "5.2"
topics:
    - mobility
    - privacy
