document: rfc-6870
kind: normative-requirement
summary: A PE compliant with RFC 4447 that does not support the Preferential Forwarding or Request Switchover status bits MUST ignore these bits if set by a peer PE. This updates RFC 4447 to prescribe the same behavior for any status bit not originally defined in RFC 4447.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
