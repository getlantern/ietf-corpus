document: rfc-2396
kind: interoperability-note
summary: Scheme and hostname are case insensitive for equivalence purposes; a URL with an explicit ':port' equal to the scheme default is equivalent to one where the port is omitted. Scheme-specific normalization algorithms may additionally permit unescaping of unreserved characters.
section: "6"
extracted_by: claude-sonnet-4-6
