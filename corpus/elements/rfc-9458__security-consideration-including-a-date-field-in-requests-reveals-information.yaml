document: rfc-9458
kind: security-consideration
summary: Including a Date field in requests reveals information about the Client's clock, which may be used for fingerprinting or to identify Clients vulnerable to clock-based attacks. Clients can randomize the Date value to reduce linkability, at the cost of increased rejection risk.
section: "6.8"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
