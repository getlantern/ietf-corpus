document: rfc-2332
kind: wire-format
summary: 'NBMA address type/length fields (ar$shtl, ar$sstl, Cli Addr T/L, Cli SAddr T/L) are 8-bit values: MSB MUST be zero (reserved), bit 6 (x) indicates address format (0=NSAP, 1=Native E.164), and bits 5–0 are an unsigned integer giving the address length in octets. If length is zero, the x flag is ignored.'
section: "5.1"
topics:
