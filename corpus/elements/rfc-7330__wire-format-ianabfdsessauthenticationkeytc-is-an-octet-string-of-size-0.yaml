document: rfc-7330
kind: wire-format
summary: 'IANAbfdSessAuthenticationKeyTC is an OCTET STRING of SIZE(0..252) representing the BFD authentication key. Key length constraints vary by authentication type: SIZE(0) for noAuthentication/reserved, SIZE(1..16) for simplePassword, SIZE(16) for keyedMD5/meticulousKeyedMD5, and SIZE(20) for keyedSHA1/meticulousKeyedSHA1.'
