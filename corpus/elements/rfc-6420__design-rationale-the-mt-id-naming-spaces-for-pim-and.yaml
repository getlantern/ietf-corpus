document: rfc-6420
kind: design-rationale
summary: 'The MT-ID naming spaces for PIM and IGPs are intentionally independent: a PIM RPF topology''s MT-ID need not match the IGP topology ID that contributes routes to it. This allows flexible aggregation (e.g., a PIM topology may draw from MBGP plus one IGP topology), though alignment is recommended when only one IGP is in use to simplify operations.'
section: "3.1"
topics:
    - multicast
    - routing
