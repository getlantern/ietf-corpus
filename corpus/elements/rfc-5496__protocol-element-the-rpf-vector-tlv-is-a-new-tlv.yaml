document: rfc-5496
kind: protocol-element
summary: The RPF Vector TLV is a new TLV in the PIM Join Attribute message (RFC 5384) that contains a single Encoded-Unicast address identifying the exit point of the network (next edge router toward the multicast tree root). Core routers perform their RPF check against this Vector address instead of the source address.
section: "3"
topics:
