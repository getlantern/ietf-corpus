document: rfc-7366
kind: normative-requirement
summary: Implementations MUST NOT renegotiate a downgrade from encrypt-then-MAC to MAC-then-encrypt, directly or indirectly (e.g., via an intermediate AEAD ciphersuite selection followed by a MAC-then-encrypt selection).
