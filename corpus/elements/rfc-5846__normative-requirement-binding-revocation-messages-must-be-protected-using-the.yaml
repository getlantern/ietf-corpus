document: rfc-5846
kind: normative-requirement
summary: Binding Revocation Messages MUST be protected using the same security association (e.g., IPsec) used to protect the mobile node's Mobile IPv6 or PMIPv6 binding registration signaling. If IPsec is not used, the underlying security mechanism MUST provide protection against all threats identified in RFC 3775 and RFC 5213.
section: "6.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
