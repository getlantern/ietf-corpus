document: rfc-5189
kind: normative-requirement
summary: 'For conflicting policy rules, the first-come first-served mechanism applies: existing rules remain unchanged and the newly arriving conflicting rule is rejected. Non-conflicting overlapping rules (including identical rules) are all accepted.'
