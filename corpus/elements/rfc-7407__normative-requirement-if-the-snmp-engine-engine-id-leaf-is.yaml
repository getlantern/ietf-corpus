document: rfc-7407
kind: normative-requirement
summary: If the /snmp/engine/engine-id leaf is not set, the device MUST automatically calculate an engine ID as described in RFC 3411. A server MAY initialize this leaf with the automatically created value.
section: "4.4"
rfc2119_level: MAY
topics:
