document: rfc-4380
kind: design-rationale
summary: The Teredo specification requires clients behind the same NAT to use different service ports to minimize the chance of encountering symmetric NAT behavior in 'port conserving' NAT designs, which reuse ports for the same external endpoint but allocate new mappings when multiple internal hosts use the same source port.
section: "3.1"
topics:
    - ip
    - nat
    - v6ops
