document: rfc-9480
kind: normative-requirement
summary: If a client receives an ErrorMsgContent with pvno cmp1999 after sending a message with a higher protocol version, it MUST abort the current transaction. This extends the version negotiation behavior to clients using any version higher than cmp1999.
section: "2.21"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
