document: rfc-7428
kind: normative-requirement
summary: Mesh-under networks MUST NOT use RFC 6775 address registration. However, RFC 6775 address registration MUST be used if the first 6 bytes of the IID do not conform to the link-layer-derived format.
section: "4.4"
rfc2119_level: MUST NOT
