document: rfc-7615
kind: protocol-element
summary: The Authentication-Info response header field communicates information after the client's authentication credentials have been accepted, including possible finalization messages such as server authentication. Its field value is a list of auth-param name/value pairs as defined in RFC 7235 Section 2.1.
