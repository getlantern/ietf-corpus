document: rfc-4481
kind: interoperability-note
summary: The <timed-status> element extends PIDF (RFC 3863) and is compatible with RPID (RFC 4480); it is placed as a child of <tuple> rather than <status> to ensure that legacy PIDF parsers do not silently treat timed status as current status.
section: "1"
topics:
    - realtime
