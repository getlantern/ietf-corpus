summary: 'The Backbone Service Instance Tag (I-TAG) on-wire format is 16 octets: TPID=0x88e7 (16 bits), I-PCP (3 bits), I-DEI (1 bit), UCAs (1 bit), reserved (3 bits), I-SID (24 bits), encapsulated C-DA (48 bits), and encapsulated C-SA (48 bits), as shown in Figure A-5.'
