document: rfc-9437
kind: normative-requirement
summary: Map-Resolvers MUST verify that an xTR is allowed to set the N-bit to 1 and use the xTR-ID, Site-ID, and ITR-RLOCs included in a Map-Request. Map-Servers MUST only accept subscription requests from Map-Resolvers that perform this verification.
section: "1.1"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
