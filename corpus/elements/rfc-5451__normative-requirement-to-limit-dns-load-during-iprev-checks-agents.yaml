document: rfc-5451
kind: normative-requirement
summary: To limit DNS load during iprev checks, agents performing PTR/A/AAAA queries MUST be implemented such that the number of names evaluated by generation of corresponding A or AAAA queries is finite, though it MAY be configurable by an administrator.
section: "3"
rfc2119_level: MUST
topics:
