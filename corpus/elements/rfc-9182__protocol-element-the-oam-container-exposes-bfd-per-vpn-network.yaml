document: rfc-9182
kind: protocol-element
summary: 'The OAM container exposes BFD per VPN network access: ''session-type'' (classic BFD per RFC 5880 or Seamless BFD per RFC 7880), ''desired-min-tx-interval'' and ''required-min-rx-interval'' in microseconds, ''local-multiplier'', ''holdtime'' in milliseconds, a ''profile'' leafref to a BFD profile, and optional meticulous BFD authentication via key chain.'
