document: rfc-9645
kind: design-rationale
summary: The three IETF modules define 'generic' (least-common-denominator) TLS client/server configurations; advanced features are deliberately left to augmentations by consuming modules, keeping the core groupings minimal and broadly reusable across HTTPS, NETCONF/TLS, and RESTCONF.
