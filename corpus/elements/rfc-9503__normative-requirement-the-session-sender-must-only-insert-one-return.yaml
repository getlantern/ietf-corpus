document: rfc-9503
kind: normative-requirement
summary: The Session-Sender MUST only insert one Return Path Segment List Sub-TLV in the test packet, and the Segment List MUST contain at least one Segment. The Session-Reflector MUST only process the first Return Path Segment List Sub-TLV and ignore others.
section: 4.1.3
rfc2119_level: MUST
topics:
