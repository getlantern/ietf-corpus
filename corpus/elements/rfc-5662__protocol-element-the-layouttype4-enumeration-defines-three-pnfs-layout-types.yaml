document: rfc-5662
kind: protocol-element
summary: 'The layouttype4 enumeration defines three pNFS layout types: LAYOUT4_NFSV4_1_FILES=1, LAYOUT4_OSD2_OBJECTS=2, and LAYOUT4_BLOCK_VOLUME=3. The layout4 structure carries offset, length, I/O mode (layoutiomode4), and a type-specific layout_content4 body.'
