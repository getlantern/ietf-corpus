document: rfc-9103
kind: normative-requirement
summary: For a zone transfer to be considered protected with XoT, all XFR requests and responses for that zone MUST be sent over TLS. The client MUST authenticate the server via a Strict Privacy profile (RFC 8310), and the server MUST validate the client is authorized using mTLS and/or an IP-based ACL combined with a valid TSIG/SIG(0) signature.
section: "7.5"
rfc2119_level: MUST
topics:
    - tls
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
