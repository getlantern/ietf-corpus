document: rfc-8264
kind: normative-requirement
summary: Width mapping is RECOMMENDED when a profile uses NFC normalization, because leaving fullwidth and halfwidth code points unmapped to their compatibility variants would violate the 'Principle of Least Astonishment'. Profiles using NFKD or NFKC subsume width mapping within compatibility decomposition and need not specify it separately.
section: 5.2.1
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
