document: rfc-7676
kind: protocol-element
summary: IPv6 extension headers MAY be inserted between the GRE delivery header and the GRE header when IPv6 is used as the GRE delivery protocol. The GRE header may immediately follow the IPv6 delivery header or be preceded by extension headers.
section: "4.1"
