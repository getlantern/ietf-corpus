document: rfc-1356
kind: normative-requirement
summary: When Null (multiplexed) encapsulation is used, a receiver MUST accept an incoming call if it supports the Null encapsulation for any network layer protocol, and MAY silently discard multiplexed PDUs for unsupported protocols.
section: "3.3"
rfc2119_level: MUST
