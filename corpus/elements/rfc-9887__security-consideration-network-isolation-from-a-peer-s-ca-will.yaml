document: rfc-9887
kind: security-consideration
summary: Network isolation from a peer's CA will cause certificate verification to fail, preventing TLS authentication. Implementations MUST support certificate chains stored locally to address this; operators should plan for CA reachability.
section: 5.1.4
topics:
    - tls
    - pkix
    - security
