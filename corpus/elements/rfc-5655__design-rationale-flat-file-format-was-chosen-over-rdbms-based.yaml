document: rfc-5655
kind: design-rationale
summary: Flat file format was chosen over RDBMS-based storage because RDBMS internal data structures are generally private to a single implementation and unsuitable for standardization, while flat files support a broad ecosystem of external tools and standards. Flow data's simple, repetitive structure also does not benefit significantly from relational technology.
