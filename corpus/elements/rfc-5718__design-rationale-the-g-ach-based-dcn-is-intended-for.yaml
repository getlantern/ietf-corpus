document: rfc-5718
kind: design-rationale
summary: The G-ACh-based DCN is intended for use only where the MPLS-TP network is not capable of encapsulating or delivering native DCN messages, accommodating nodes without direct IP encapsulation support on line-side interfaces or out-of-fiber data communication network access.
