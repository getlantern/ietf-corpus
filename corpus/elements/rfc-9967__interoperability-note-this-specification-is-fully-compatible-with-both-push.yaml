document: rfc-9967
kind: interoperability-note
summary: This specification is fully compatible with both push-based (RFC 8935) and poll-based (RFC 8936) SET delivery mechanisms. Event Receivers may also retrieve async completion events via HTTP GET. The security and privacy considerations of RFC 8417, RFC 8935, and RFC 8936 all apply.
