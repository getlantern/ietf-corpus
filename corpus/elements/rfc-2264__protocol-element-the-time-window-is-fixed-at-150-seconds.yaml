document: rfc-2264
kind: protocol-element
summary: The Time Window is fixed at 150 seconds for all users. A received message whose generation time (as indicated by msgAuthoritativeEngineBoots and msgAuthoritativeEngineTime) falls outside this window is considered inauthentic and is dropped.
