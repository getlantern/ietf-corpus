document: rfc-2460
kind: normative-requirement
summary: If a non-final fragment's length (derived from Payload Length) is not a multiple of 8 octets (M flag=1), the fragment must be discarded and an ICMP Parameter Problem, Code 0, message should be sent pointing to the Payload Length field.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
