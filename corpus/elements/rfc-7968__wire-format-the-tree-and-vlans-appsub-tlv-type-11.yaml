document: rfc-7968
kind: wire-format
summary: The Tree and VLANs APPsub-TLV (type 11) contains a 2-byte Type, 2-byte Length (must be a multiple of 6), and n Tree-VLAN RECORDs of 6 bytes each. Each record contains a 2-byte Nickname, a 2-byte field with 4 RESV bits and 12-bit Start.VLAN, and a 2-byte field with 4 RESV bits and 12-bit End.VLAN.
section: 3.2.1
topics:
    - routing
