document: rfc-2474
kind: wire-format
summary: 'The DS field is an 8-bit octet: bits 0–5 form the 6-bit DSCP (Differentiated Services Codepoint) subfield, and bits 6–7 form the 2-bit CU (currently unused) subfield. The DSCP selects the per-hop behavior; the CU bits are reserved and ignored by PHB selection.'
