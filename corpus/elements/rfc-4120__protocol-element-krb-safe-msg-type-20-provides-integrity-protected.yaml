document: rfc-4120
kind: protocol-element
summary: KRB_SAFE (msg-type 20) provides integrity-protected application data. The safe-body contains user-data, timestamp, optional sequence number, and sender address; the body is covered by a keyed checksum using the session or sub-session key but is not encrypted.
section: 5.6.1
topics:
    - security
    - crypto
