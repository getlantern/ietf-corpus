document: rfc-5496
kind: interoperability-note
summary: There is no way to carry an RPF Vector TLV in a Bootstrap Router (BSR) bootstrap message. The procedures in this document do not define a way for BSR messages to be forwarded across a core in which the BSR IP address is not routable.
section: "3.2"
topics:
    - multicast
    - routing
