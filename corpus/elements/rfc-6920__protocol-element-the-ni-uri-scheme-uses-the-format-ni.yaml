document: rfc-6920
kind: protocol-element
summary: The ni URI scheme uses the format 'ni://<authority>/<alg>;<val>[?<query>]' where the authority is optional, alg is the digest algorithm name from the IANA registry, and val is the base64url-encoded (no padding) hash output. All ni names with matching digest algorithm, length, and value refer to the same object regardless of authority.
section: "3"
topics:
