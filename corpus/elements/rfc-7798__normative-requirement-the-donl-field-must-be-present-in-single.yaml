document: rfc-7798
kind: normative-requirement
summary: The DONL field MUST be present in single NAL unit packets and the first aggregation unit of an AP if sprop-max-don-diff > 0 for any RTP stream; otherwise it MUST NOT be present. The DOND field is governed by the same condition for non-first aggregation units in an AP.
section: 4.4.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
