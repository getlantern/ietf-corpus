document: rfc-8188
kind: protocol-element
summary: The 'aes128gcm' HTTP content coding indicates that a payload has been encrypted using AES-128-GCM (AEAD_AES_128_GCM per RFC 5116 Section 5.1) with a 128-bit content-encryption key. The coding uses a fixed set of encryption primitives; cipher agility is achieved by defining new content-coding schemes rather than negotiating within this one.
section: "2"
topics:
    - http
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
