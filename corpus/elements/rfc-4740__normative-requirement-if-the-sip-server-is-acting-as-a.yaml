document: rfc-4740
kind: normative-requirement
summary: If the SIP server is acting as a SIP registrar, its Diameter client MUST include a SIP-Server-URI AVP in the MAR command. In all other cases (e.g., outbound proxy performing authentication only), the Diameter client MUST NOT include SIP-Server-URI in the MAR command.
section: "8.7"
rfc2119_level: MUST
topics:
    - sip
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
