document: rfc-7307
kind: protocol-element
summary: MT-ID is a 16-bit value used to represent the Multi-Topology ID. MT-ID 0 corresponds to the default topology. Two new Address Families, 'MT IP' (AF 29) and 'MT IPv6' (AF 30), extend IP address families to include topology scope by appending a 16-bit MT-ID field after the IP address.
section: "3.2"
topics:
    - mpls
    - routing
