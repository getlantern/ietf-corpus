summary: 'Four new fatal alert codes are defined: certificate_unobtainable(111) for inaccessible certificate URLs, unrecognized_name(112) for unknown SNI server names, bad_certificate_status_response(113) for unsatisfactory OCSP responses, and bad_certificate_hash_value(114) for SHA-1 hash mismatches on retrieved certificates.'
