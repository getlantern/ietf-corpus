document: rfc-8551
kind: interoperability-note
summary: S/MIME v4.0 agents ought to maximize interoperability with prior S/MIME versions (v2, v3, v3.1, v3.2). Messages using the subjectKeyIdentifier SignerIdentifier choice cannot be read by S/MIME v2 clients. Appendix B documents historic algorithm support for processing legacy messages.
section: "1.4"
