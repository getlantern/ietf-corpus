document: rfc-1566
kind: design-rationale
summary: The MIB introduces a 'group' abstraction to break down MTA activity into inbound, storage, and outbound components. The term 'channel' is deliberately avoided because MTAs are not required to map their channel abstraction one-to-one onto MIB groups.
