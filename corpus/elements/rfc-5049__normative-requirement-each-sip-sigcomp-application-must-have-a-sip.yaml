document: rfc-5049
kind: normative-requirement
summary: Each SIP/SigComp application MUST have a SIP/SigComp identifier URN that uniquely and persistently identifies the application. This URN MUST be persistent as long as the application stores compartment state related to other SIP/SigComp applications.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
