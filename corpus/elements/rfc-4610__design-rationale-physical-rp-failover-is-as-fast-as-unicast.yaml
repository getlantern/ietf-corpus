document: rfc-4610
kind: design-rationale
summary: Physical RP failover is as fast as unicast routing convergence because DRs and receivers always send to the Anycast-RP address, which routes to the nearest surviving RP. This retains the core convergence benefit of traditional Anycast-RP.
