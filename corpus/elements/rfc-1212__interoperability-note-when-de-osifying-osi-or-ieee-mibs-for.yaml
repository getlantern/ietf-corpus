document: rfc-1212
kind: interoperability-note
summary: 'When de-osifying OSI or IEEE MIBs for SNMP use: BOOLEAN maps to INTEGER (true(1)/false(2)); ENUMERATED maps to INTEGER; BIT STRING with ≤32 bits maps to an INTEGER sum; BIT STRING with >32 bits maps to OCTET STRING with bits numbered left-to-right and trailing bits reserved for future use.'
section: 5.1.1
topics:
    - snmp
