document: rfc-3323
kind: security-consideration
summary: Messages requesting privacy require both confidentiality and integrity. Without integrity, privacy functions could be downgraded or eliminated; without confidentiality, eavesdroppers could see the personal information the user asked the privacy service to obscure. Users should only trust privacy services that are accountable to them.
section: "6"
topics:
    - sip
    - privacy
    - security
