document: rfc-7519
kind: protocol-element
summary: The "sub" (subject) claim identifies the principal that is the subject of the JWT. The subject value MUST be locally unique within the issuer context or globally unique. Its value is a case-sensitive StringOrURI. Use is OPTIONAL.
section: 4.1.2
topics:
