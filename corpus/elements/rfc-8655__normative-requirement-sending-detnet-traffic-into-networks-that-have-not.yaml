document: rfc-8655
kind: normative-requirement
summary: Sending DetNet traffic into networks that have not been provisioned in advance to handle that traffic must be treated as a fault. Egress traffic filters or equivalent mechanisms are strongly recommended at the edges of DetNet networks to prevent this.
section: 3.3.2
rfc2119_level: RECOMMENDED
topics:
