summary: The IPFIX SELECTOR MIB module (ipfixSelectorFunctions subtree) is maintained by IANA and extended through Expert Review per RFC 5226. It currently defines only ipfixFuncSelectAll; future standard Filtering and Sampling functions (e.g., from PSAMP) can be added to this subtree.
