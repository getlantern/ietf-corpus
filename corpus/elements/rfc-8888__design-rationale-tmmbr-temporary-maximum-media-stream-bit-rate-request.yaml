document: rfc-8888
kind: design-rationale
summary: TMMBR (Temporary Maximum Media Stream Bit Rate Request) was rejected as a congestion control mechanism because it requires the receiver to determine congestion level and recommend a bitrate—a receiver-based approach—whereas the design goal is sender-based congestion control where the sender interprets raw reception metrics.
section: "8"
topics:
