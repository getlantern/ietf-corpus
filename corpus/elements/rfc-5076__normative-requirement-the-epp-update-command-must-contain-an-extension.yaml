document: rfc-5076
kind: normative-requirement
summary: The EPP `<update>` command MUST contain an `<extension>` element with an `<e164val:update>` element holding one or more `<e164val:add>`, `<e164val:rem>`, or `<e164val:chg>` elements each identified by an `id` attribute; `<rem>` elements carry no child elements.
section: 5.2.5
rfc2119_level: MUST
topics:
