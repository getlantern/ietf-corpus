document: rfc-6811
kind: security-consideration
summary: 'This system provides only limited protection against a determined attacker: an attacker need only prepend the ''valid'' source AS to a forged BGP route announcement to defeat the protection. It does not protect against AS-in-the-middle attacks or provide any path validation; it only verifies the origin AS.'
section: "6"
topics:
    - bgp
    - security
    - routing
