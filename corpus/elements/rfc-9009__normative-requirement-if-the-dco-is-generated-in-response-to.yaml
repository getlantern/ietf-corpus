document: rfc-9009
kind: normative-requirement
summary: If the DCO is generated in response to a DAO, the Transit Information option in the DCO MUST use the Path Sequence value from the newest Transit Information option received by the common parent for that target. When propagated by an intermediate 6LR, the Path Sequence MUST be copied from the received DCO.
section: 4.3.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
