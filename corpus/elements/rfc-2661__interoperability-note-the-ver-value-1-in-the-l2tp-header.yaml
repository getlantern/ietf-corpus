document: rfc-2661
kind: interoperability-note
summary: The Ver value 1 in the L2TP header is reserved to permit detection of L2F (RFC 2341) packets arriving intermixed with L2TP packets. Receivers MUST discard packets with unknown Ver values, providing a clean separation from the predecessor protocol.
section: "3.1"
topics:
    - vpn
