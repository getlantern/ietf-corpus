document: rfc-5250
kind: normative-requirement
summary: The flooding of Opaque LSAs MUST follow the rules of flooding scope. For type-9 LSAs, if the receiving interface differs from the target interface, the LSA MUST be discarded and not acknowledged. An implementation SHOULD keep track of the IP interface associated with each link-local Opaque LSA.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
