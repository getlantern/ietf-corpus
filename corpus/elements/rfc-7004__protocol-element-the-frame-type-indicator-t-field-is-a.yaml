document: rfc-7004
kind: protocol-element
summary: 'The Frame Type indicator (T) field is a 1-bit flag: T=0 indicates Key frame counts; T=1 indicates Derived frame counts. If both frame types are reported, two separate Frame Impairment Statistics Summary Blocks should be sent in the same RTCP compound packet.'
