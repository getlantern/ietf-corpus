document: rfc-3648
kind: interoperability-note
summary: An ordering-aware client interacting with an ordering-unaware server (one implemented only to RFC 2518) SHOULD assume the collection is unordered if the collection does not have the DAV:ordering-type property. This ensures forward compatibility with legacy WebDAV servers.
section: 4.1.1
topics:
    - http
