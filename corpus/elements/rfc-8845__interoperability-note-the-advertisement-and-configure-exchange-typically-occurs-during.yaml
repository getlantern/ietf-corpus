document: rfc-8845
kind: interoperability-note
summary: The Advertisement and Configure exchange typically occurs during call initiation after CLUE is enabled, but MAY also happen at any time throughout the call. Some mid-call CLUE updates (e.g., switching Capture source) do not require a SIP re-INVITE, while others that change bandwidth allocation do require a new offer/answer exchange.
section: "5"
topics:
