document: rfc-5840
kind: interoperability-note
summary: WESP is wholly compatible with NAT Traversal (NAT-T) as defined in RFC 3948 and can be used without modification in NAT environments. Negotiation of WESP via IKEv2 preserves all other negotiation parameters including NAT-T.
section: "2.3"
topics:
