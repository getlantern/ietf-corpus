document: rfc-6098
kind: normative-requirement
summary: The MN-HA Authentication Extension is REQUIRED when a GNM or GNAM is exchanged between the MN and HA; the MN-FA AE is REQUIRED between the MN and FA; the FA-HA AE is REQUIRED between the FA and HA. The applicable AE is determined by the MD field value.
section: "4.1"
rfc2119_level: REQUIRED
topics:
    - mobility
    - security
    - ip
