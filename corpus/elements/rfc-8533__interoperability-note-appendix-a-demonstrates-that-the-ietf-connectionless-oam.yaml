document: rfc-8533
kind: interoperability-note
summary: Appendix A demonstrates that the `ietf-connectionless-oam-methods` module can be extended with persistent data retrieval RPCs (e.g., `cc-get-persistent-id`, `cc-persistent-get-export-details`) using IPFIX (RFC 7011) or YANG-Push as export methods, showing that the on-demand RPCs in the base module are not the only retrieval mechanism.
section: A.1
