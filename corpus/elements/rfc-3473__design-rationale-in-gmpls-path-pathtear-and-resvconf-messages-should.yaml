document: rfc-3473
kind: design-rationale
summary: In GMPLS, Path, PathTear and ResvConf messages SHOULD be addressed directly to the adjacent node's control plane address (omitting the router-alert option) because routes are explicitly signaled and hops that cannot allocate labels cannot exist in the LSP path.
