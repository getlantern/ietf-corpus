document: rfc-4306
kind: protocol-element
summary: IKEv2 key derivation begins with SKEYSEED = prf(Ni | Nr, g^ir). Seven keys are then derived as {SK_d | SK_ai | SK_ar | SK_ei | SK_er | SK_pi | SK_pr} = prf+(SKEYSEED, Ni | Nr | SPIi | SPIr). SK_d seeds CHILD_SA key derivation; SK_ai/SK_ar provide integrity protection; SK_ei/SK_er provide encryption; SK_pi/SK_pr generate AUTH payloads.
section: "2.14"
topics:
    - ipsec
    - crypto
    - security
