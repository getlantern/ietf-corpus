document: rfc-3758
kind: normative-requirement
summary: 'Any PR-SCTP service definition MUST specify rule G1: when a message with an assigned TSN is abandoned, the sender MUST mark that TSN as eligible for forward TSN and follow the FORWARD TSN sending rules in Section 3.5 to avoid protocol deadlock.'
section: "4.3"
rfc2119_level: MUST
topics:
    - sctp
