document: rfc-6873
kind: protocol-element
summary: The Version field (1 byte, UTF-8 encoded) ranges from 'A' (0x41) to 'Z' (0x5A). Version 'A' (0x41) is defined by this document. Since it is per-record, a single log file may contain records with different versions.
