document: rfc-5922
kind: normative-requirement
summary: A client MUST determine the SIP domain identities from the server certificate using Section 7.1 procedures, compare them to the domain from the original SIP AUS, and if the server is not authenticated, MUST close the connection immediately.
section: "7.3"
rfc2119_level: MUST
topics:
