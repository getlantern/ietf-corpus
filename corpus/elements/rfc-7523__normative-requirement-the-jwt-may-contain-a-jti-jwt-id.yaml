document: rfc-7523
kind: normative-requirement
summary: The JWT MAY contain a 'jti' (JWT ID) claim providing a unique token identifier. The authorization server MAY enforce replay protection by maintaining the set of used 'jti' values for the JWT's validity window based on the 'exp' claim.
section: "3"
rfc2119_level: MAY
topics:
    - oauth
    - jose
    - security
