document: rfc-5610
kind: interoperability-note
summary: Exporting Processes SHOULD NOT export type records that could reasonably be assumed to duplicate type information already available at the Collecting Process (e.g., for well-known IANA-registered IEs). This mechanism does not replace the need for implementations to track IANA registry updates.
section: "3.9"
rfc2119_level: SHOULD NOT
topics:
    - snmp
