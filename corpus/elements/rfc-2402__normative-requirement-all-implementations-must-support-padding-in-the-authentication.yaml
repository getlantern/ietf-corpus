document: rfc-2402
kind: normative-requirement
summary: All implementations MUST support padding in the Authentication Data field to ensure the AH header is a multiple of 32 bits (IPv4) or 64 bits (IPv6). The authentication algorithm specification MUST also define the ICV length, comparison rules, and processing steps for validation.
section: "2.6"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
