document: rfc-6787
kind: protocol-element
summary: The 'cmid' (channel media identifier) SDP attribute associates a control 'm=' line with one or more audio 'm=' lines by matching the 'cmid' value to the 'mid' attribute of audio lines. If a control 'm=' line has no 'cmid', it is not associated with any media, limiting operations such as RECOGNIZE (which requires media) while leaving INTERPRET functional.
section: "4.4"
topics:
    - realtime
    - sip
