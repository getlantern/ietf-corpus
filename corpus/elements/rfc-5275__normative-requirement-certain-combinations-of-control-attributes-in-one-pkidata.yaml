document: rfc-5275
kind: normative-requirement
summary: 'Certain combinations of control attributes in one PKIData or PKIResponse MUST NOT be generated. Prohibited pairs include: glUseKEK with glDeleteMember/glRekey/glDelete; and glDelete with glAddMember/glDeleteMember/glRekey/glAddOwner/glRemoveOwner.'
section: 3.2.2
rfc2119_level: MUST NOT
