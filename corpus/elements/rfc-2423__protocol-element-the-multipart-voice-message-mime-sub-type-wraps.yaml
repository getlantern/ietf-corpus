document: rfc-2423
kind: protocol-element
summary: The multipart/voice-message MIME sub-type wraps the components of a single voice message. It is semantically and syntactically identical to multipart/mixed, so systems that do not understand the sub-type can safely interpret it as multipart/mixed.
