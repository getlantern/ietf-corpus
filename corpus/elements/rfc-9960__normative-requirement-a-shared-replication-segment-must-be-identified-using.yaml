document: rfc-9960
kind: normative-requirement
summary: 'A shared Replication segment MUST be identified using a Root set to zero (0.0.0.0 for IPv4 and :: for IPv6), an Instance-ID set to zero, and a Tree-ID that is unique within the context of the node where the Replication segment is instantiated.'
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - multicast
