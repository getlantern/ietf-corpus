document: rfc-8461
kind: normative-requirement
summary: 'MTAs SHOULD proactively refresh cached policies before they expire (suggested: once per day), and SHOULD alert administrators when refresh attempts fail (unless the cached policy mode is ''none''). Policy ''max_age'' values SHOULD be as long as practical to reduce the window of vulnerability during policy discovery attacks.'
section: "3.3"
rfc2119_level: SHOULD
topics:
    - email
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
