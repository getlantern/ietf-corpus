document: rfc-6788
kind: interoperability-note
summary: The LIO is intended solely for the N:1 VLAN deployment model. For 1:1 VLAN models, line identification is achieved differently. This mechanism SHOULD only be used in N:1 VLAN deployments because regular IPv6 hosts lack the RS retransmission behavior needed to recover from state loss in access routers.
