document: rfc-2420
kind: design-rationale
summary: Self Describing Padding (SDP) was chosen because removing incorrect padding after decryption can be injurious to the interpretation of protocols that do not contain an explicit length field. SDP is unambiguous and requires no separate negotiation for 3DESE; only the MPV of 8 is required.
section: "4.1"
