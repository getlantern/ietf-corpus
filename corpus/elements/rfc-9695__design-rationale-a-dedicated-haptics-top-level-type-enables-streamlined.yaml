summary: A dedicated 'haptics' top-level type enables streamlined registration of formats for multiple haptic sub-modalities (vibrotactile, kinesthetic, surface, spatial/ultrasound, thermal) that could not be naturally grouped under 'audio', 'video', or 'application'.
