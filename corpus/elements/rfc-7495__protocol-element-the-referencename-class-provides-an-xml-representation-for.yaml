document: rfc-7495
kind: protocol-element
summary: The ReferenceName class provides an XML representation for identifying an external enumeration and specifying a value from it. It has a required integer attribute 'specIndex' that uniquely identifies the enumeration specification via an IANA registry entry, and a child 'ID' element of type xs:NCName that holds the specific enumeration value.
