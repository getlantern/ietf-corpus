document: rfc-1516
kind: protocol-element
summary: rptrMonitorPortRunts (rptrMonitorPortEntry 9) counts CarrierEvents with ActivityDuration between ShortEventMaxTime and ValidPacketMinTime (552–565 bit times) and no CollisionEvent, or events with OctetCount < 64, ActivityDuration > ShortEventMaxTime, and no CollisionEvent. An event between 74 and 82 bit times increments either shortEvents or runts but not both.
section: "3.3"
