document: rfc-6955
kind: wire-format
summary: DhSigStatic is a SEQUENCE with an OPTIONAL IssuerAndSerialNumber field (identifying the certificate from which the verifier's public key was obtained) and a required MessageDigest field (hashValue) containing the MAC output. The issuerAndSerial field is omitted if the public key did not come from a certificate.
