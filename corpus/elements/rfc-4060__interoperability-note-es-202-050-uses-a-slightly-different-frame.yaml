document: rfc-4060
kind: interoperability-note
summary: ES 202 050 uses a slightly different frame format from ES 201 108 and the two do not interoperate with each other. The ES 202 050 RTP payload format uses the same RTP packet layout as RFC 3557 (ES 201 108), but differs in DSR codec frame bit definition and payload type MIME registration.
section: "1"
topics:
