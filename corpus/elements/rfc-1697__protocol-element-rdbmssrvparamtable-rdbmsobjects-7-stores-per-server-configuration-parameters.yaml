document: rfc-1697
kind: protocol-element
summary: rdbmsSrvParamTable (rdbmsObjects 7) stores per-server configuration parameters with the same multi-valued row structure as rdbmsDbParamTable, indexed by { applIndex, rdbmsSrvParamName, rdbmsSrvParamSubIndex }. Entries must be present when the corresponding applOperStatus is up(1).
