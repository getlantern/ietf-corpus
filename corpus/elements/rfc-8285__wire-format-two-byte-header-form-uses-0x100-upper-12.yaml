document: rfc-8285
kind: wire-format
summary: Two-byte header form uses 0x100 (upper 12 bits) in the RTP 'defined by profile' field, with 4 application-dependent bits (appbits). Each extension element has an 8-bit ID (range 1-255) and an 8-bit length field (actual byte count, not minus-one; 0 means no subsequent data).
section: "4.3"
topics:
