document: rfc-4348
kind: normative-requirement
summary: The RTP header marker bit SHALL be set to 0 during continuous transmission. During DTX, it SHALL be set to 1 if the first frame-block in the packet is the first speech frame of a talkspurt; otherwise it SHALL be set to 0.
section: "6.1"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
