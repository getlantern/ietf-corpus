document: rfc-3229
kind: design-rationale
summary: The "range" token is registered as an instance-manipulation so that clients can specify via A-IM ordering whether range selection occurs before or after delta encoding, resolving the ambiguity between resuming a partial delta transfer and selecting a subrange of the original instance.
section: "4.1"
topics:
    - http
