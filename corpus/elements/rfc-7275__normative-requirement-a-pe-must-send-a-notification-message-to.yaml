document: rfc-7275
kind: normative-requirement
summary: A PE MUST send a Notification message to reject an Application Connection if the application is not configured for that RG or if the Application Connection count exceeds the PE's capabilities. Upon receiving such a rejection, the remote PE MUST stop attempting to bring up the Application Connection until it receives a new request.
section: "4.4"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
