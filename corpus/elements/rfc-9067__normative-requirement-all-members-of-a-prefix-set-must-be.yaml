document: rfc-9067
kind: normative-requirement
summary: All members of a prefix-set MUST be of the same address family as the prefix-set mode. The device MUST validate all prefixes and reject the configuration if there is a discrepancy.
section: "7.2"
rfc2119_level: MUST
