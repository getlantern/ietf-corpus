document: rfc-3459
kind: security-consideration
summary: 'Sending UAs can use digital signatures over critical content indicators to ensure the integrity of the Handling parameter. Gateways must honor this: if signature components are marked REQUIRED and the endpoint cannot verify them, the gateway must establish an appropriate signature mechanism or reject the message.'
