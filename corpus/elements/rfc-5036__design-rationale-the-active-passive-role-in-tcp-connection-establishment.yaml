document: rfc-5036
kind: design-rationale
summary: The active/passive role in TCP connection establishment is determined by comparing transport addresses as unsigned integers (higher address is active). This deterministic rule ensures both LSRs agree on who initiates when multiple Hello adjacencies share the same label space.
