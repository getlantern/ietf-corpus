document: rfc-8525
kind: normative-requirement
summary: The server MUST instantiate one entry in the '/yang-library/datastore' list per specific datastore it supports. Each datastore entry with the same datastore schema SHOULD reference the same schema entry.
section: "4"
rfc2119_level: MUST
