document: rfc-7490
kind: design-rationale
summary: The Q-space of E is used as a proxy for the per-destination Q-space rather than computing per-destination repair tunnel endpoints, because a per-destination SPF computation would not currently be considered scalable. This is analogous to using link LFAs rather than per-prefix LFAs.
section: 5.2.1.3
topics:
    - routing
