document: rfc-7222
kind: design-rationale
summary: The LMA is designated as the sole allocator of SR-IDs to guarantee uniqueness within the scope of a mobility session and to avoid collisions when both the LMA and MAG may independently initiate concurrent QoS Service Requests. MAG-initiated requests use SR-ID=0 as a sentinel until the LMA assigns a real value.
section: "4.1"
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
