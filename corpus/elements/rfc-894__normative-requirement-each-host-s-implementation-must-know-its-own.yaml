document: rfc-894
kind: normative-requirement
summary: Each host's implementation must know its own Internet address and respond to Ethernet Address Resolution packets appropriately, and should use ARP to translate Internet addresses to Ethernet addresses when needed.
section: Address Mappings
rfc2119_level: SHOULD
