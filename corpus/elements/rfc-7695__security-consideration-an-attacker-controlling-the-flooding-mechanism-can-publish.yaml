document: rfc-7695
kind: security-consideration
summary: An attacker controlling the Flooding Mechanism can publish overriding assignments for an entire Delegated Prefix or address space (preventing all assignment), rapidly toggle Advertised Prefixes to cause excessive algorithm executions, or prevent convergence entirely. Unsecured Flooding Mechanism or Node ID assignment makes the network vulnerable to these denial-of-service attacks.
section: "8"
topics:
    - security
    - routing
    - ip
