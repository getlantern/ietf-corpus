document: rfc-4007
kind: security-consideration
summary: Routers operating at zone boundaries must prevent zone-specific routing information from leaking outside each zone. If multicast site boundary routers allow site routing information to be forwarded outside the site, the integrity of the site could be compromised. The zone-specific forwarding table design ensures isolation.
