document: rfc-8827
kind: normative-requirement
summary: The RP browser MUST verify that the in-use certificate for a DTLS connection is in the set of fingerprints returned from the IdP when verifying an assertion. The 'identity' attribute MUST include all 'fingerprint' values from the session description.
section: 7.4.1
rfc2119_level: MUST
topics:
