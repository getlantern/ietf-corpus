document: rfc-5182
kind: normative-requirement
summary: When SEARCH RETURN (SAVE) is followed by a command using "$", the server MUST execute the two commands in the order they were received, as directed by Section 5.5 of RFC 3501, because of their direct dependency.
section: "2.3"
rfc2119_level: MUST
topics:
    - email
