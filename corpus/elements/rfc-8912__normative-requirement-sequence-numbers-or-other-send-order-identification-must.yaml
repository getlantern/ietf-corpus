document: rfc-8912
kind: normative-requirement
summary: Sequence numbers or other send-order identification MUST be retained at the Src or included with each packet to disambiguate packet reordering if it occurs. This applies to all stream-based metrics in this document.
section: 4.3.1
rfc2119_level: MUST
topics:
    - measurement
