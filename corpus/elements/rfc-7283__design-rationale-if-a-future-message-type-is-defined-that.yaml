document: rfc-7283
kind: design-rationale
summary: If a future message type is defined that is sent unsolicited to relay agents, non-conforming relays will forward it to DHCP servers instead. Since DHCP servers do not respond to unknown messages, this is unlikely to create significant load, making a relay identification strategy probably unnecessary.
section: "4.1"
topics:
