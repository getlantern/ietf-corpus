document: rfc-3267
kind: design-rationale
summary: The Q (frame quality indicator) bit is included for interoperability with the ATM payload format (ITU-T I.366.2) and UMTS Iu interface transport formats. It enables damaged frames to be forwarded to the speech decoder for error concealment rather than being discarded, improving speech quality.
