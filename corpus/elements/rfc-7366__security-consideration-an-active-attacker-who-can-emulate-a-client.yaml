document: rfc-7366
kind: security-consideration
summary: An active attacker who can emulate a client or server with extension intolerance may cause implementations to fall back to older protocol versions that do not support extensions, forcing non-encrypt-then-MAC behaviour. The recommended mitigation is to avoid fallback to older, less secure protocol versions.
section: "4"
topics:
    - tls
    - security
