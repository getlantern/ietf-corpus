document: rfc-8855
kind: wire-format
summary: 'The ERROR-CODE attribute (Type 6, OctetString) encodes an 8-bit error code plus optional Error Specific Details. Defined codes include: 1 Conference Does Not Exist, 4 Unknown Mandatory Attribute, 5 Unauthorized Operation, 9 Use TLS, 11 Use DTLS, 12 Unsupported Version, 13 Incorrect Message Length, and 14 Generic Error (14 codes total).'
section: 5.2.6
topics:
