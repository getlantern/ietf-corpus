document: rfc-3850
kind: design-rationale
summary: The email address is preferred in the subjectAltName extension rather than the subject distinguished name to align with RFC 2822 address handling and modern PKIX practices; certificates without any email address have no requirement to verify against a message's From/Sender header.
section: "3"
topics:
