document: rfc-9448
kind: privacy-consideration
summary: Any CA that processes an Authority Token can learn what resources a client is authorized to claim. Where this incurs a privacy risk, Authority Token scopes should be limited to only the resources that will be attested by the specific requested ACME certificate, rather than the client's full authorized scope.
section: "5.7"
topics:
    - privacy
    - acme
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
