document: rfc-2388
kind: design-rationale
summary: The multipart/form-data encoding was chosen over proposed alternatives such as a new 'aggregate' MIME top-level type or a 'packet' content-transfer-encoding because multipart mechanisms are well established, simple to implement on both client and server, and as efficient as other methods.
