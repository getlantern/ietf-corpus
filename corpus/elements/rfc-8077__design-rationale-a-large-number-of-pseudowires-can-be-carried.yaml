document: rfc-8077
kind: design-rationale
summary: A large number of pseudowires can be carried through a single MPLS tunnel, so it is never necessary to maintain per-PW state in the network core. The PW label at the bottom of the stack provides the per-PW demultiplexing function while the tunnel label handles core forwarding.
