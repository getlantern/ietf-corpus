document: rfc-7032
kind: protocol-element
summary: 'Fast-up convergence operation: upstream LSR sends Label Request with Queue Request TLV; supporting downstream LSR queues the request when no route is available and sends the Label Mapping as soon as the route comes up, without sending ''No Route''. Upstream does not retry while the request is queued. Upstream aborts a queued request by sending a Label Abort Request message.'
section: "5"
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
