summary: 'Three discovery mechanisms are defined rather than one to maximize discovery opportunity: S-NAPTR covers managed enterprise/ISP networks, DNS-SD/mDNS covers local network advertisement, and anycast requires no pre-configuration whatsoever—only the two endpoints that use TURN need to be deployed.'
