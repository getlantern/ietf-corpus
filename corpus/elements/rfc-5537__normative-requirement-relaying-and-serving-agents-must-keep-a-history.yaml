document: rfc-5537
kind: normative-requirement
summary: Relaying and serving agents MUST keep a history of articles already seen and use it to reject duplicate offers. History records may be pruned using a cutoff interval (conventionally no less than seven days for Usenet) based on Injection-Date or Date.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
