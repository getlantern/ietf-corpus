document: rfc-7523
kind: privacy-consideration
summary: Deployments should determine the minimum amount of information necessary to complete the exchange and include only those claims in the JWT. The 'sub' (subject) claim may represent an anonymous or pseudonymous user rather than a directly identifying value.
