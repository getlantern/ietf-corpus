document: rfc-8046
kind: normative-requirement
summary: When processing an UPDATE containing both ESP_INFO and LOCATOR_SET, a host SHOULD process the ESP_INFO before the LOCATOR_SET, since the ESP_INFO may introduce a new SPI value that Locator Type 1 entries reference.
section: "5.3"
rfc2119_level: SHOULD
topics:
