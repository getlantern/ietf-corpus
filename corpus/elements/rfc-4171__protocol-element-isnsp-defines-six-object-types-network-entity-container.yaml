document: rfc-4171
kind: protocol-element
summary: 'iSNSP defines six object types: Network Entity (container for Storage Nodes and Portals), Portal (IP address/port interface), Storage Node (iSCSI or iFCP session endpoint), Portal Group (Portal-to-iSCSI-Node association via PGT), FC Device (Fibre Channel node), Discovery Domain, and Discovery Domain Set.'
section: "3"
