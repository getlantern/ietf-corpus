document: rfc-7349
kind: normative-requirement
summary: The receiving LSR locates the SA using the SA ID field. If the SA is not found or is not valid for reception (current time < KeyStartAccept or >= KeyStopAccept), the LDP Hello MUST be discarded and an error event SHOULD be logged.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
