document: rfc-5163
kind: protocol-element
summary: The PDU-Concat Extension Header (H-Type 0x0003) is a Mandatory Extension Header that enables a sequence of PDUs of a common ULE Type to be sent within a single SNDU payload. Each PDU is prefixed by a 16-bit length field (1 reserved bit R set to zero, 15-bit length); PDUs are not required to be 16- or 32-bit aligned.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
