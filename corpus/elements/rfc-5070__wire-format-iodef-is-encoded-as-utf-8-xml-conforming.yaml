summary: IODEF is encoded as UTF-8 XML conforming to the XML Schema defined in Section 8. The IODEF namespace is 'urn:ietf:params:xml:ns:iodef-1.0'. Binary data (BYTE[]) is base64-encoded; hexadecimal data (HEXBIN) uses two-hex-digit tuples; special characters in strings use XML entity references.
