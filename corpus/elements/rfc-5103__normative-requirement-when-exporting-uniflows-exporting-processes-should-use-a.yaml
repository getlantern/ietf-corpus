document: rfc-5103
kind: normative-requirement
summary: When exporting Uniflows, Exporting Processes SHOULD use a Template containing no Reverse Information Elements. A Template with only reverse counter elements MAY be used for Uniflows (since zero counters are semantically equivalent to no reverse direction), but not for elements where zero has distinct meaning (e.g., tcpControlBits).
section: "4"
rfc2119_level: SHOULD
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
