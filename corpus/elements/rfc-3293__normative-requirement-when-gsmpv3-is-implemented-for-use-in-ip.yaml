document: rfc-3293
kind: normative-requirement
summary: When GSMPv3 is implemented for use in IP networks, security between the controller and client MUST be available and MUST be provided by IPsec. The IPsec Encapsulation Security Payload (ESP) MUST be used to provide both integrity and confidentiality.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
    - ipsec
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
