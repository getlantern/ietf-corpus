document: rfc-9203
kind: normative-requirement
summary: The RS MUST generate a nonce N2 unlikely to have been previously used with the same keying material, and MUST ensure ID2 differs from the value received in ace_client_recipientid. N2 and ID2 MUST be sent in the 2.01 Created response payload as a CBOR map.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
