document: rfc-1697
kind: security-consideration
summary: The RFC explicitly states that security issues are not discussed in this memo. No authentication, access control, or privacy protections for the MIB objects are specified; implementors must rely on the SNMPv2 administrative framework (RFC 1445) for any such controls.
