document: rfc-3748
kind: normative-requirement
summary: All EAP implementations MUST support Types 1–4 (Identity, Notification, Legacy Nak, MD5-Challenge) and SHOULD support Type 254 (Expanded Types). EAP peer and EAP server implementations MUST support the MD5-Challenge mechanism; a pass-through authenticator MUST allow communication with a backend server capable of MD5-Challenge.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
