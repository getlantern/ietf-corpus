document: rfc-5162
kind: design-rationale
summary: The VANISHED response uses UIDs instead of message numbers and can report multiple expunged messages in a single response, unlike the EXPUNGE response which reports one message at a time using sequence numbers. This saves bandwidth and is more convenient for clients that only use UIDs.
section: "3.6"
topics:
