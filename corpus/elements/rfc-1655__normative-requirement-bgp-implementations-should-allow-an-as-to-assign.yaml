document: rfc-1655
kind: normative-requirement
summary: BGP implementations should allow an AS to assign an administrative degree of preference to a route based on the IP address of the neighbor it was received from. The allowed range of the assigned preference shall be between 0 and 2^31 - 1.
section: "7"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
