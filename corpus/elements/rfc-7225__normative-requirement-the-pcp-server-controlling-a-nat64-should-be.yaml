document: rfc-7225
kind: normative-requirement
summary: The PCP server controlling a NAT64 SHOULD be configured to return the Pref64::/n and suffix to requesting PCP clients. If no suffix is explicitly configured, the null suffix is used as the default.
section: "4.2"
rfc2119_level: SHOULD
