document: rfc-3518
kind: wire-format
summary: The IEEE 802 Tagged Frame format extends the untagged format by inserting a 2-byte TPID (0x8100 for 802.3) followed by a 16-bit Tag Control Information field containing a 3-bit priority (Pri), 1-bit canonical flag (C), and 12-bit VLAN ID between the Source MAC Address and the Length/Type field.
section: "4.3"
