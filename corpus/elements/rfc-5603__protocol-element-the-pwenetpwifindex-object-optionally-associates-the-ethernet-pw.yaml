document: rfc-5603
kind: protocol-element
summary: The pwEnetPwIfIndex object optionally associates the Ethernet PW with an ifIndex in the Etherlike-MIB to enable statistics and configuration via existing Ethernet management tools. This value may differ from the pwIfIndex representing the PW itself in the ifTable.
