document: rfc-4783
kind: wire-format
summary: The REFERENCE_COUNT TLV (Type 512, Length 8) contains a 32-bit unsigned integer indicating the number of times an alarm has been repeated. This field MUST NOT be set to zero; TLVs with a zero value MUST be ignored.
