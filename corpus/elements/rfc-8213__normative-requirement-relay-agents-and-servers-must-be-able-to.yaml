document: rfc-8213
kind: normative-requirement
summary: Relay agents and servers MUST be able to exchange messages using the IPsec mechanisms described in RFC 4301. In a relay chain, each relay agent MUST have established independent, pairwise trust relationships with adjacent hops.
section: "3"
rfc2119_level: MUST
topics:
    - ipsec
    - security
