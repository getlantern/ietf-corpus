document: rfc-7647
kind: normative-requirement
summary: A UA accepting a REFER that creates a subscription MUST populate its Contact header field with a GRUU. This is a direct consequence of RFC 6665 Section 4.5.1 making GRUU mandatory for notifiers.
section: "3"
rfc2119_level: MUST
topics:
    - sip
