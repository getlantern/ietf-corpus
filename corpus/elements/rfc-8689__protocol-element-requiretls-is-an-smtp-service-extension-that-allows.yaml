document: rfc-8689
kind: protocol-element
summary: REQUIRETLS is an SMTP service extension that allows a sender to assert that a given message MUST be relayed over a TLS-protected session with verified server identity. It uses the EHLO keyword 'REQUIRETLS' and adds an optional 'REQUIRETLS' parameter to the MAIL FROM command.
section: "2"
topics:
