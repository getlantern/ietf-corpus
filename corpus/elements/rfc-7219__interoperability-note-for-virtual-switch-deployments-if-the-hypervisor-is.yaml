document: rfc-7219
kind: interoperability-note
summary: For virtual switch deployments, if the hypervisor is trusted the virtual switch can be incorporated into the SEND SAVI perimeter (its uplink and the physical port configured as Trusted); if untrusted, the physical port is set Validating and all VM addresses are validated at the physical SEND SAVI device.
section: "2.4"
