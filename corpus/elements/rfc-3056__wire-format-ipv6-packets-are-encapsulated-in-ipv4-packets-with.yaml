document: rfc-3056
kind: wire-format
summary: IPv6 packets are encapsulated in IPv4 packets with Protocol field set to 41. The IPv4 header carries Source and Destination IPv4 addresses; the body contains the full IPv6 header and payload. Standard IPv4 TTL and IPv6 hop-limit fields are set independently.
