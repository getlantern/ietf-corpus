document: rfc-5802
kind: protocol-element
summary: 'The SCRAM algorithm derives: SaltedPassword = Hi(Normalize(password), salt, i); ClientKey = HMAC(SaltedPassword, "Client Key"); StoredKey = H(ClientKey); ClientProof = ClientKey XOR HMAC(StoredKey, AuthMessage); ServerKey = HMAC(SaltedPassword, "Server Key"); ServerSignature = HMAC(ServerKey, AuthMessage). The server stores only StoredKey and ServerKey.'
section: "3"
topics:
