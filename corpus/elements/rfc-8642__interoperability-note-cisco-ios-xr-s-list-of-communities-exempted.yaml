document: rfc-8642
kind: interoperability-note
summary: 'Cisco IOS XR''s list of communities exempted from ''set community'' diverges from the IANA BGP Well-known Communities registry: several IANA well-known communities receive no special treatment in IOS XR, and community 0:0 (internet) which IOS XR does protect is not formally in the IANA well-known list (it falls in the Reserved range 0x00000000–0x0000FFFF).'
section: "4.1"
topics:
    - bgp
    - routing
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
