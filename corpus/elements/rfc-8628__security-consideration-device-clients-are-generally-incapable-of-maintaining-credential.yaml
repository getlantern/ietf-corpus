document: rfc-8628
kind: security-consideration
summary: Device clients are generally incapable of maintaining credential confidentiality (credentials can be extracted via reverse-engineering), so they should be treated as public clients susceptible to impersonation, per the security considerations of RFC 6819 and RFC 8252.
section: "5.6"
topics:
    - oauth
    - security
