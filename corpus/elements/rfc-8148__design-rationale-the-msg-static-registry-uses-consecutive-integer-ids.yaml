document: rfc-8148
kind: design-rationale
summary: The 'msg-static' registry uses consecutive integer IDs so that a vehicle can indicate support for all messages up to a given value by sending a single integer in its <capabilities> element, minimizing signaling overhead while ensuring compliant vehicles support all messages translated into their supported languages.
section: "14.4"
topics:
    - realtime
