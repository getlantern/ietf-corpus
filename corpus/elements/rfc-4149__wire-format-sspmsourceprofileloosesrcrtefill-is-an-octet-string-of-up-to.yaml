summary: sspmSourceProfileLooseSrcRteFill is an OCTET STRING of up to 240 bytes encoding loose source route IP addresses as 32-bit IPv4 or 128-bit IPv6 values. The companion sspmSourceProfileLooseSrcRteLen (Integer32 0..240) specifies how many bytes to copy into the IP header option.
