document: rfc-5365
kind: normative-requirement
summary: If the incoming MESSAGE contains an Authorization or Proxy-Authorization header whose realm matches the MESSAGE URI-list server's realm, the service SHOULD NOT copy it to the outgoing request; if the realm differs, the service MUST copy the value.
section: "7.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
