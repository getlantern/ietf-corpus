document: rfc-7964
kind: protocol-element
summary: '''neighbor-AS'' for a route is the neighboring AS from which the route was received, calculated per Section 9.1.2.2 of RFC 4271 and Section 5.3 of RFC 5065. A Group Best Path for a prefix can be identified by the combination of address prefix and neighbor-AS, and neighbor-AS may be used as the path identifier in ADD-PATH.'
section: "4"
topics:
    - bgp
    - routing
