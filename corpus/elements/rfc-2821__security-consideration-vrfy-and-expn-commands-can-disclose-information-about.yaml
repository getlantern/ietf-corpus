document: rfc-2821
kind: security-consideration
summary: VRFY and EXPN commands can disclose information about valid users and mailing list memberships, aiding spammers and attackers. Implementations SHOULD provide configuration options to disable or restrict VRFY and EXPN, and servers MAY return 252 rather than confirming addresses.
section: "7.3"
topics:
    - email
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
