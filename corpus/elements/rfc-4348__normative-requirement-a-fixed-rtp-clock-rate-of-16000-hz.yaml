document: rfc-4348
kind: normative-requirement
summary: A fixed RTP clock rate of 16000 Hz MUST always be used for VMR-WB, regardless of whether the encoder input is 8 kHz or 16 kHz sampled media. This allows injection and processing of 8-kHz narrowband media without changing the RTP clock rate during a session.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
