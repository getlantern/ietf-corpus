document: rfc-5629
kind: protocol-element
summary: A User Interface Component is a piece of user interface that operates independently of other pieces. It is always associated with a specific SIP dialog and its lifetime is bounded by that dialog's lifetime. Components can be presentation-capable (supports prompt-and-collect) or presentation-free (collects input only).
section: "3"
topics:
