document: rfc-5261
kind: normative-requirement
summary: Per XPath 1.0, a text node MUST NOT have another text node as an immediate sibling. When adding content adjacent to an existing text node, the text node contents MUST be combined together rather than creating sibling text nodes.
section: 4.3.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
