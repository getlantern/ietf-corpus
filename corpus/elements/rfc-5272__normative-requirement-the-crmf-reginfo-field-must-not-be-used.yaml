document: rfc-5272
kind: normative-requirement
summary: The CRMF regInfo field MUST NOT be used in a CRMF certification request within CMC; equivalent functionality is provided by the CMC regInfo control (Section 6.12). When both CRMF and CMC controls provide equivalent functionality, the CMC control SHOULD be used and MUST override the CRMF control.
section: 3.2.1.2.2
rfc2119_level: MUST NOT
topics:
    - pkix
