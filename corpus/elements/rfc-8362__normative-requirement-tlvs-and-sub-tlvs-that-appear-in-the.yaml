document: rfc-8362
kind: normative-requirement
summary: TLVs and sub-TLVs that appear in the wrong LSA type MUST be ignored. For example, a Router-Link TLV in an E-Network-LSA must be silently ignored; an Attached-Routers TLV in an E-Router-LSA must be silently ignored.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
