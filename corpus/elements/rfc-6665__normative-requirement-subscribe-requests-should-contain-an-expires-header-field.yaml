document: rfc-6665
kind: normative-requirement
summary: SUBSCRIBE requests SHOULD contain an Expires header field; if absent, the default MUST be defined by the event package. 200-class responses to SUBSCRIBE MUST contain an Expires header field that MAY be shorter but MUST NOT be longer than specified in the request.
section: 3.1.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
