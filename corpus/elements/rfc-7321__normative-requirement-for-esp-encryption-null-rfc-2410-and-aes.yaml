document: rfc-7321
kind: normative-requirement
summary: For ESP encryption, NULL (RFC 2410) and AES-CBC (RFC 3602) MUST be implemented. AES-CTR (RFC 3686) and TripleDES-CBC (RFC 2451) MAY be implemented. DES-CBC (RFC 2405) MUST NOT be implemented.
section: "2.2"
rfc2119_level: MUST
topics:
