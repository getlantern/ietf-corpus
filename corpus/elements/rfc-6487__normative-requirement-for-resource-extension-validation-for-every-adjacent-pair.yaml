document: rfc-6487
kind: normative-requirement
summary: For resource extension validation, for every adjacent pair of certificates in the certification path, the number resources in certificate x must 'encompass' the resources in certificate x+1. 'Encompass' means every range in the subject's set is more specific than or equal to a range in the issuer's set.
section: "7.1"
rfc2119_level: MUST
topics:
    - pkix
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
