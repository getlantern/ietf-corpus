document: rfc-9200
kind: protocol-element
summary: 'AS Request Creation Hints is a CBOR or JSON map sent by the RS in response to an Unauthorized Resource Request. Optional fields: AS (absolute URI, CBOR key 1), kid (key identifier, key 2), audience (key 5), scope (key 9), cnonce (client-nonce, key 39). It helps the client discover and contact the correct AS.'
