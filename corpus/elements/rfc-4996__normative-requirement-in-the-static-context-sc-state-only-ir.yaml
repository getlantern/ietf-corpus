document: rfc-4996
kind: normative-requirement
summary: In the Static Context (SC) state, only IR/IR-DYN packets (CRC-8 protected) or CO packets protected by a 7-bit CRC may be decompressed; other packet types MUST NOT be decompressed and MUST NOT be delivered to upper layers.
section: 5.3.1.4
rfc2119_level: MUST NOT
