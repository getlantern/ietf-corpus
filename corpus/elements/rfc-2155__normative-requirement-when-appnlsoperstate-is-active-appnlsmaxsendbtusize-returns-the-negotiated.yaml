document: rfc-2155
kind: normative-requirement
summary: When appnLsOperState is active, appnLsMaxSendBtuSize returns the negotiated value—the smaller of the locally configured maximum and the partner's maximum receive BTU length from XID—rather than the locally configured value. When inactive or pending-active, the locally configured value is returned.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
