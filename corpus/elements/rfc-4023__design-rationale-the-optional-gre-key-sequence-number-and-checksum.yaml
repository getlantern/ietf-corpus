document: rfc-4023
kind: design-rationale
summary: The optional GRE key, sequence number, and checksum fields are not used by default because they are unnecessary for MPLS tunneling (MPLS labels handle demultiplexing), the GRE key is only a weak 32-bit cleartext password, and omitting them facilitates high-speed implementations and ensures interoperability.
