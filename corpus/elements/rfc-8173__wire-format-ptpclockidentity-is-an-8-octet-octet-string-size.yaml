document: rfc-8173
kind: wire-format
summary: PtpClockIdentity is an 8-octet OCTET STRING (SIZE(8)) representing the EUI-64-based clock identity in network byte order. It may be derived from an existing EUI-48 assignment or assigned as a non-EUI-64 address per IEEE-1588-2008 Section 7.5.2.2.
