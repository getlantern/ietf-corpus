document: rfc-6225
kind: protocol-element
summary: 'Latitude/longitude uncertainty (LatUnc, LongUnc) is a 6-bit encoded value where the actual uncertainty in degrees is derived as: uncertainty = 2^(8 − x), and encoded as x = 8 − ceil(log2(uncertainty)). A value of 0 means unknown; values greater than 34 are reserved.'
section: 2.3.2
topics:
    - ip
