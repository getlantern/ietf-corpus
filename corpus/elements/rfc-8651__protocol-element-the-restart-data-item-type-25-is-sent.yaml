document: rfc-8651
kind: protocol-element
summary: The Restart Data Item (Type 25) is sent by a modem to a router to indicate that previously suppressed traffic may be resumed, typically when an internal queue length drops below a threshold. It follows the same rules as the Pause Data Item for session-wide vs. destination-specific scope.
section: "3.3"
topics:
    - routing
    - qos
    - congestion
