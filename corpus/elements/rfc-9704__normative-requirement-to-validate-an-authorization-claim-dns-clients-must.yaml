document: rfc-9704
kind: normative-requirement
summary: To validate an authorization claim, DNS clients MUST resolve the Verification Record; if the RRset contains the expected token, the client SHALL regard the named resolver as authoritative for the claimed subdomains.
section: "6"
rfc2119_level: MUST
