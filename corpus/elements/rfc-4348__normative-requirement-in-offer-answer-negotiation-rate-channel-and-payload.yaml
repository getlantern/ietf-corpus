document: rfc-4348
kind: normative-requirement
summary: In offer-answer negotiation, rate, channel, and payload configuration parameters (octet-align and interleaving) SHALL be used symmetrically—offer and answer must use the same values. Only operating modes supported by both endpoints SHALL be used.
section: "9.3"
rfc2119_level: SHALL
