document: rfc-3605
kind: interoperability-note
summary: Implementations that do not understand the 'a=rtcp' attribute will simply ignore it; they will fail to send RTCP packets to the specified address but will still be able to receive media in the RTP packets. This is the defined graceful failure mode for this attribute.
section: "3.3"
topics:
    - rtp
    - realtime
