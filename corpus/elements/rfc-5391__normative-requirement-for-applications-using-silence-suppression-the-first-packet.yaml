document: rfc-5391
kind: normative-requirement
summary: For applications using silence suppression, the first packet of a talkspurt SHOULD have the RTP marker bit set to one; all other packets MUST have it set to zero. Applications without silence suppression MUST set the marker bit to zero.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
