document: rfc-6724
kind: protocol-element
summary: 'The policy table is a longest-matching-prefix lookup table producing two values for a given address: a precedence value Precedence(A) used to sort destination addresses, and a label value Label(A) used to prefer source/destination pairs with matching labels. The default table assigns precedence 50 to ::1/128, 40 to ::/0, 35 to ::ffff:0:0/96 (IPv4-mapped), 30 to 2002::/16 (6to4), 5 to 2001::/32 (Teredo), and lower values to ULAs and deprecated prefixes.'
section: "2.1"
topics:
    - ip
    - v6ops
