document: rfc-4130
kind: wire-format
summary: 'The AS2-From and AS2-To headers carry an AS2-name: either an AS2-atomic-name (1–128 printable ASCII chars, excluding double-quote and backslash) or an AS2-quoted-name (double-quoted, up to 128 chars allowing space and escaped quote/backslash). Values are case-sensitive and MUST NOT be folded.'
section: "6.2"
topics:
