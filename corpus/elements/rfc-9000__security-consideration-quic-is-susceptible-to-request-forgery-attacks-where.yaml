document: rfc-9000
kind: security-consideration
summary: QUIC is susceptible to request forgery attacks where an adversary causes an endpoint to send crafted packets to third parties via malicious preferred addresses, spoofed migration, or Version Negotiation. Endpoints should validate and limit use of peer-supplied addresses.
section: "21.5"
topics:
    - quic
    - security
