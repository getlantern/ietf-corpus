document: rfc-5101
kind: wire-format
summary: Field Specifier encodes an Enterprise bit (1 bit), Information Element identifier (15 bits), and Field Length (16 bits). When Enterprise bit is 1, a 32-bit Enterprise Number follows. Field Length value 65535 is reserved to signal a variable-length IE.
