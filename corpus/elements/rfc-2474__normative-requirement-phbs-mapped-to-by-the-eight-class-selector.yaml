document: rfc-2474
kind: normative-requirement
summary: PHBs mapped to by the eight Class Selector Codepoints MUST yield at least two independently forwarded traffic classes. PHBs selected by higher-order Class Selector Codepoints SHOULD give packets a probability of timely forwarding not lower than those of lower-order codepoints.
section: 4.2.2.2
rfc2119_level: MUST
topics:
    - diffserv
    - qos
