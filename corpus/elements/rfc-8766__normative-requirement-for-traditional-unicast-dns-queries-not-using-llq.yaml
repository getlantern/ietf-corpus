document: rfc-8766
kind: normative-requirement
summary: For traditional Unicast DNS queries (not using LLQ or DNS Push Notifications), DNS TTLs in responses MUST be capped to at most ten seconds. This is because remote clients cannot participate in Multicast DNS cache coherency mechanisms.
section: 5.5.1
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
