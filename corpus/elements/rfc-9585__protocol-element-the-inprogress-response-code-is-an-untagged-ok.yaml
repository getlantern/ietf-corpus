document: rfc-9585
kind: protocol-element
summary: 'The INPROGRESS response code is an untagged OK reply embedding an optional list of details: CMD-TAG (quoted string or NIL), PROGRESS (non-negative number or NIL), and GOAL (positive number or NIL). It signals command execution progress or serves as a keepalive.'
