document: rfc-8086
kind: normative-requirement
summary: For TMCE tunnels using UDP zero-checksum mode with IPv6, the decapsulator MUST check that the source and destination IPv6 addresses are valid for the GRE-in-UDP tunnel on which the packet was received, and MUST discard packets failing this check.
section: "6.2"
rfc2119_level: MUST
topics:
    - udp
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
