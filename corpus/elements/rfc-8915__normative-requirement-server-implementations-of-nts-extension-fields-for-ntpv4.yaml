document: rfc-8915
kind: normative-requirement
summary: Server implementations of NTS Extension Fields for NTPv4 MUST support AEAD_AES_SIV_CMAC_256 (Numeric Identifier 15). If the client offers this algorithm and the server accepts Protocol ID 0, the AEAD Algorithm Negotiation response record MUST NOT be empty.
section: 4.1.5
rfc2119_level: MUST
topics:
    - crypto
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
