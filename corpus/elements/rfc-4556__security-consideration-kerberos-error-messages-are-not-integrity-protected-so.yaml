document: rfc-4556
kind: security-consideration
summary: Kerberos error messages are not integrity protected, so TD-DH-PARAMETERS sent by the KDC can be tampered by an attacker to cause selection of weaker or non-mutually-preferred DH domain parameters. Local policy should configure acceptable parameters or disallow negotiation.
section: "4"
topics:
    - security
    - crypto
