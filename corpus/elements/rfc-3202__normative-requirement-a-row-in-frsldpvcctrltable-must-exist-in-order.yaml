document: rfc-3202
kind: normative-requirement
summary: A row in frsldPvcCtrlTable MUST exist in order for a row to exist in any other table in this MIB module. The rows added to this table MUST have a valid ifIndex and an ifType related to frame relay, and the reference points referred to by frsldPvcCtrlTransmitRP and frsldPvcCtrlReceiveRP MUST be supported.
section: "5.1"
rfc2119_level: MUST
topics:
    - snmp
    - measurement
