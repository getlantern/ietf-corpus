document: rfc-5846
kind: protocol-element
summary: 'The Revocation Trigger field (8-bit) indicates the reason the BRI was sent. Per-MN values (0–127): 0=Unspecified, 1=Administrative Reason, 2=Inter-MAG Handover same Access Type, 3=Inter-MAG Handover different Access Type, 4=Inter-MAG Handover Unknown, 5=User-Initiated Session(s) Termination, 6=Access Network Session(s) Termination, 7=Possible Out-of-Sync BCE State. Global values: 128=Per-Peer Policy, 129=Revoking Mobility Node Local Policy. Values 250–255 are reserved for testing.'
section: "5.1"
topics:
    - mobility
    - registry
