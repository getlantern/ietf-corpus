document: rfc-2678
kind: design-rationale
summary: An alternative definition of bidirectional connectivity using T and T+dT (where T+dT is the arrival time of the forward packet) was considered but rejected because it breaks the symmetry between A1 and A2 and requires quantifying packet transit time, adding complexity. The symmetric instantaneous definition is used instead as a building block.
section: "3.5"
