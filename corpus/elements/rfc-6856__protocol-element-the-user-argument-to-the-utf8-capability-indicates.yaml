document: rfc-6856
kind: protocol-element
summary: The USER argument to the UTF8 capability indicates the server accepts UTF-8 usernames and passwords with the USER, PASS, and APOP commands. Clients MUST NOT use UTF-8 credentials unless the server advertised this argument.
section: "2.2"
