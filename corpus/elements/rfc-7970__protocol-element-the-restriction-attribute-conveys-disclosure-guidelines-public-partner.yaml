document: rfc-7970
kind: protocol-element
summary: The restriction attribute conveys disclosure guidelines (public, partner, need-to-know, private, default, and TLP aliases white/green/amber/red). Its value is logically inherited by descendant elements; a child may override a parent's value to tighten or relax disclosure.
