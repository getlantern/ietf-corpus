document: rfc-5252
kind: normative-requirement
summary: If a PE maintains a PIT for the L1VPN specified in a received L1VPN LSA, the PE SHOULD add, remove, or modify the PIT entry associated with each of the advertised CE-to-PE links accordingly. An implementation MAY choose to not remove or modify the PIT according to local policy.
section: "3"
rfc2119_level: SHOULD
topics:
    - routing
    - vpn
