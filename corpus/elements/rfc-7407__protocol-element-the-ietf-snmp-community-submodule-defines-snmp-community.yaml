document: rfc-7407
kind: protocol-element
summary: The ietf-snmp-community submodule defines /snmp/community with a 'name' choice (text-name string or binary-name binary), security-name, optional engine-id, context, and target-tag. Both the name choice and security-name leaf carry nacm:default-deny-all annotations to protect community string confidentiality.
