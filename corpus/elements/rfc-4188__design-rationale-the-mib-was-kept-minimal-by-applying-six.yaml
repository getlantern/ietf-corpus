document: rfc-4188
kind: design-rationale
summary: 'The MIB was kept minimal by applying six criteria: start with essential objects only, require fault or configuration management utility, consider evidence of actual use, limit total object count, exclude objects derivable from other MIBs, and avoid heavily instrumenting critical sections (one counter per critical section per layer).'
