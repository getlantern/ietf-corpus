document: rfc-6511
kind: interoperability-note
summary: The Non-PHP behavior flag and OOB mapping flag can appear and be processed independently of each other. However, in the application context of this document, OOB mapping requires non-PHP behavior; an ingress LSR requesting OOB mapping MAY also set the Non-PHP behavior flag.
section: "2.3"
topics:
