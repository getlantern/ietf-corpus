document: rfc-9240
kind: wire-format
summary: 'Entity property names follow the format: EntityPropertyName ::= [ [ ResourceID ] ''.'' ] EntityPropertyType. Resource-specific property names are prefixed with the resource identifier and ''.'' (e.g., ''netmap1.pid''); when the defining resource is the property map itself, ResourceID SHOULD be omitted. Property values are JSONValue (not just JSONString as RFC 7285 required).'
section: 5.2.2
topics:
    - json
