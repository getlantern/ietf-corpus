document: rfc-1583
kind: design-rationale
summary: 'The Designated Router concept (borrowed from IS-IS) eliminates the O(n²) adjacency problem on multi-access networks: instead of every pair forming an adjacency, each router only becomes adjacent with the DR and BDR, drastically reducing routing traffic and topological database size.'
