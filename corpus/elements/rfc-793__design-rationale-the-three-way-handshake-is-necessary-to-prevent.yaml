document: rfc-793
kind: design-rationale
summary: The three-way handshake is necessary to prevent old duplicate connection initiations from causing confusion. Because sequence numbers are not tied to a global clock and TCPs may use different ISN mechanisms, the receiver of the first SYN cannot determine whether it is a delayed old duplicate without a confirmation exchange.
section: "3.4"
topics:
    - tcp
