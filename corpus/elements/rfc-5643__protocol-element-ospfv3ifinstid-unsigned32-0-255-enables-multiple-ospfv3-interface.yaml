kind: protocol-element
summary: ospfv3IfInstId (Unsigned32, 0..255) enables multiple OSPFv3 interface instances to run over a single link. Each instance is assigned a separate locally significant ID, indexed alongside ospfv3IfIndex in the Interface Table.
