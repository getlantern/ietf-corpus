document: rfc-6221
kind: state-machine
summary: 'The LDRA operates on a per-interface client-facing/network-facing distinction: on client-facing interfaces it intercepts DHCP client messages and wraps them in Relay-Forward; on the network-facing interface it intercepts Relay-Reply messages and decapsulates them for forwarding to clients. Messages of unexpected type are silently dropped in each direction.'
section: "6"
topics:
