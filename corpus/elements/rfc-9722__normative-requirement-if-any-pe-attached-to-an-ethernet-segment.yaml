document: rfc-9722
kind: normative-requirement
summary: If any PE attached to an Ethernet Segment does not signal T=1, then all PEs in the Ethernet Segment SHALL revert to the timer-based approach specified in RFC 7432. This is critical to prevent VLAN shuffling when more than two PEs are involved.
section: "4"
rfc2119_level: SHALL
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
