document: rfc-8158
kind: protocol-element
summary: 'Quota Exceeded events (natEvent=13) are generated when hard administrator-set limits are reached. The natQuotaExceededEvent IE (IPFIX ID 466, unsigned32) identifies the sub-type: maximum session entries (1), maximum BIB entries (2), maximum entries per user (3), maximum active hosts/subscribers (4), or maximum fragments pending reassembly (5).'
section: "4.4"
topics:
    - nat
