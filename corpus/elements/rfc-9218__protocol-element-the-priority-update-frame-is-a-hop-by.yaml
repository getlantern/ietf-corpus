document: rfc-9218
kind: protocol-element
summary: The PRIORITY_UPDATE frame is a hop-by-hop signal sent by clients on the control stream to set or change the priority of a request or push stream, independently of the stream carrying the response. It carries a complete set of all priority parameters; omitting a parameter signals use of its default value.
section: "7"
