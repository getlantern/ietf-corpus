document: rfc-3347
kind: normative-requirement
summary: iSCSI MUST support a data integrity check format (CRC or other digest mechanism) computed on the SCSI data block itself, as well as on each command and status message, to protect against data corruption undetected by the TCP checksum.
section: "5.1"
rfc2119_level: MUST
topics:
    - tcp
    - security
