document: rfc-9671
kind: security-consideration
summary: If calendar data contains embedded attachments, implementations SHOULD decode and scan them for malicious content. If an attachment is found to be malicious, 'processcalendar' MUST NOT process the calendar data.
section: "5"
rfc2119_level: MUST NOT
topics:
    - email
    - security
