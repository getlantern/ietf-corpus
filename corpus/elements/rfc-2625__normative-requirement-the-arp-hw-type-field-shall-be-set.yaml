document: rfc-2625
kind: normative-requirement
summary: The ARP 'HW Type' field SHALL be set to 0x00-01; however, both 0x00-01 and 0x00-06 SHALL be accepted. The 'Protocol' field SHALL be 0x08-00 (IP), 'HW Addr Length' SHALL be 0x06, and 'Protocol Addr Length' SHALL be 0x04.
section: "4.2"
rfc2119_level: SHALL
topics:
