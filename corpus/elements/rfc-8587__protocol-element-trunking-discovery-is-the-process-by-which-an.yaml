document: rfc-8587
kind: protocol-element
summary: Trunking discovery is the process by which an NFSv4 client using one network address can obtain other candidate addresses trunkable with that server. Discovery sources include DNS resolution of server hostnames (which may return multiple addresses) and network addresses specified in fs_locations attribute entries.
section: 5.2.2
topics:
