document: rfc-8077
kind: design-rationale
summary: 'Two FEC element types are defined: the PWid FEC (0x80) for deployments using a pre-provisioned 32-bit PW ID, and the Generalized PWid FEC (0x81) for structured endpoint identifiers (AGI/SAII/TAII) that support auto-discovery. The choice depends on the provisioning model.'
