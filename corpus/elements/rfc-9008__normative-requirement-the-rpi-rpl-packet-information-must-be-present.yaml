document: rfc-9008
kind: normative-requirement
summary: The RPI (RPL Packet Information) MUST be present in every single RPL data packet traversing the LLN. It carries RPLInstanceID and Rank information used to detect routing loops and cannot be omitted.
section: "6"
rfc2119_level: MUST
