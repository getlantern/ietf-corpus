document: rfc-6283
kind: design-rationale
summary: Encryption information must be included in the Evidence Record because Evidence Records protect the bit-stream at the time of archiving and encryption schemes cannot be changed afterwards without losing the integrity proof. Only encryption methods that allow unambiguous proof that encrypted data represents original unencrypted data should be used.
section: "5"
topics:
    - crypto
    - privacy
    - security
