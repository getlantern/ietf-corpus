document: rfc-2440
kind: design-rationale
summary: A Key ID of zero MAY be used as a 'wild card' or 'speculative' Key ID in a PKESK packet, causing the receiver to try all available private keys to find a valid session key. This design reduces traffic analysis by concealing which recipient's key was targeted.
section: "5.1"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
