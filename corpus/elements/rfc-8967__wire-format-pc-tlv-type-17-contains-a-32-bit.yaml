document: rfc-8967
kind: wire-format
summary: 'PC TLV (Type=17): contains a 32-bit unsigned PC field followed by an Index field of 0 to 32 octets. A node MUST NOT send an Index larger than 32 octets; a receiver MAY ignore a PC TLV with an Index larger than 32 octets.'
section: "6.2"
topics:
    - routing
    - security
