document: rfc-5015
kind: protocol-element
summary: 'Election reliability parameters: Election_Robustness defaults to 3 (minimum messages that must be lost for election to fail), Offer_Period is 100 ms, Backoff_Period is 1 second. Retransmissions within an election are randomly spaced using OPlow = rand(0.5, 1) * Offer_Period.'
