document: rfc-7541
kind: normative-requirement
summary: Intermediaries MUST NOT re-encode a value marked as never-indexed with a representation that would index it. If HPACK is used for re-encoding, the never-indexed literal representation MUST be used.
section: 6.2.3
rfc2119_level: MUST NOT
topics:
    - http
    - security
