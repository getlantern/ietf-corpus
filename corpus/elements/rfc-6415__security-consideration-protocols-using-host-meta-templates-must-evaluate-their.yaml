document: rfc-6415
kind: security-consideration
summary: Protocols using host-meta templates must evaluate their template construction and any protocol-specific variables to ensure templates cannot be abused. A poorly constructed template can be exploited to trick clients into following malicious links via unexpected variable value characters.
section: "5"
topics:
    - security
