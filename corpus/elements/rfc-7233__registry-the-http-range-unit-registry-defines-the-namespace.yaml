document: rfc-7233
kind: registry
summary: The HTTP Range Unit Registry defines the namespace for range unit names. New registrations require IETF Review and must include a name, description, and pointer to specification. Initial entries are 'bytes' (a range of octets) and 'none' (reserved keyword indicating no ranges are supported).
section: "5.1"
