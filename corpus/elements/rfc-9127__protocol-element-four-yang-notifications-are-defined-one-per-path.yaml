summary: 'Four YANG notifications are defined, one per path type: singlehop-notification, multihop-notification, lag-notification, and mpls-notification. All carry common parameters (local-discr, remote-discr, new-state, state-change-reason, time-of-last-state-change, dest-addr, source-addr, session-index, path-type) from the ''notification-parms'' grouping.'
