document: rfc-1472
kind: design-rationale
summary: Implementation of the PPP Security Group is optional because its variables provide configuration and control for PPP security functions, which should be protected by SNMPv2 security. Agents not supporting SNMPv2 with privacy are strongly advised not to implement this group.
section: "3.3"
topics:
    - snmp
    - security
