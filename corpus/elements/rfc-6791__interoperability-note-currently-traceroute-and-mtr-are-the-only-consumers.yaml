document: rfc-6791
kind: interoperability-note
summary: Currently TRACEROUTE and MTR are the only consumers of translated ICMPv6 messages that care about the ICMPv6 source address; an enhanced traceroute application using RFC5837 extensions can recover the real IPv6 source addresses.
