document: rfc-1372
kind: normative-requirement
summary: A client should make every attempt to honor the state requested by the RESTART-ANY and RESTART-XON modes, even though there is no mechanism to notify the server if the client cannot comply.
section: "5"
rfc2119_level: SHOULD
