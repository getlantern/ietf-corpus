document: rfc-8209
kind: security-consideration
summary: Hash collisions in Subject Key Identifier or Issuer Key Identifier generation are unlikely but possible. A Subject Key Identifier collision might cause the incorrect certificate to be selected from cache, resulting in failed signature validation; operators should be alerted if detected.
