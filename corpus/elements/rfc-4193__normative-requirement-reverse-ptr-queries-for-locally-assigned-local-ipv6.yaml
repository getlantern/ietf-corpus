document: rfc-4193
kind: normative-requirement
summary: Reverse (PTR) queries for locally assigned Local IPv6 addresses MUST NOT be sent to name servers for the global DNS, due to load that such queries would create for the authoritative name servers for the ip6.arpa zone.
section: "4.4"
rfc2119_level: MUST NOT
