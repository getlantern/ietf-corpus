document: rfc-9041
kind: design-rationale
summary: 'The terms ''mandatory TLV'' and ''optional TLV'' were dropped from RFC 8029 language because those words conflict with widespread IETF usage: RFC 8029 used them to indicate required error-response behavior, whereas other RFCs use them to indicate whether a TLV must be present in a message. The updated text describes the required action directly.'
