document: rfc-4037
kind: security-consideration
summary: OCP carries application messages that may contain sensitive information. The IAB considerations (section 12) and OPES threat analysis (RFC3837) inform the security requirements. The callout server's ability to modify arbitrary application message content creates significant trust requirements between the OPES processor and callout server.
section: "12"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
