document: rfc-5475
kind: protocol-element
summary: 'Systematic count-based Sampling uses packet position counters: all packets in a Sampling interval defined by packet count are selected. Systematic time-based Sampling uses time-based start/stop triggers: all packets arriving within defined time intervals are selected. Both are content-independent.'
section: "5.1"
