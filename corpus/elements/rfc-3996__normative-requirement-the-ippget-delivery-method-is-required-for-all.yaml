document: rfc-3996
kind: normative-requirement
summary: The 'ippget' Delivery Method is REQUIRED for all clients and Printers that support RFC 3995. If a Printer supports IPP Notifications, it MUST support the 'ippget' Delivery Method as one of its Delivery Methods.
section: "1"
rfc2119_level: REQUIRED
