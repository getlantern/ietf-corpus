document: rfc-7090
kind: normative-requirement
summary: A UA that has made an emergency call MUST keep state information so that it can recognize and accept a callback from the PSAP if it occurs within a reasonable time after the emergency call was placed.
section: "5.3"
rfc2119_level: MUST
