document: rfc-6650
kind: protocol-element
summary: For unsolicited reports, reasonable candidate destinations include abuse addresses in WHOIS records of the relaying IP address, PTR query results, the abuse@domain role address per RFC 2142, and addresses explicitly described as abuse contacts on a web site.
