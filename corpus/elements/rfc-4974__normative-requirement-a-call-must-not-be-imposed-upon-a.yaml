document: rfc-4974
kind: normative-requirement
summary: A Call MUST NOT be imposed upon a Connection that is already established. Doing so would require changing the short Call ID in the SESSION object, constituting a change in Session Identifier which is prohibited by existing protocol specifications.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - mpls
