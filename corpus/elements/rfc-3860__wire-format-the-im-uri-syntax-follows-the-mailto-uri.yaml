document: rfc-3860
kind: wire-format
summary: 'The IM URI syntax follows the mailto: URI pattern. ABNF: IM-URI = ''im:'' [ to ] [ headers ]; to = mailbox; headers = ''?'' header *(''&'' header); header = hname ''='' hvalue. ''mailbox'' is as defined in RFC 2822; ''uric'' denotes any URL-valid character per RFC 2396.'
section: A.2
topics:
