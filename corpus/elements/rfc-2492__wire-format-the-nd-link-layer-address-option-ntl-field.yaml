document: rfc-2492
kind: wire-format
summary: 'The ND link-layer address option NTL field is one octet: the MSB is reserved (MUST be zero), the second bit (x) flags ATM Forum AESA format (x=0) or Native E.164 format (x=1), and the lower 6 bits encode the ATM address length in octets.'
