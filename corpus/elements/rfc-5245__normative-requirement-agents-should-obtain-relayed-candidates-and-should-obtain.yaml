document: rfc-5245
kind: normative-requirement
summary: Agents SHOULD obtain relayed candidates and SHOULD obtain server reflexive candidates; these are at SHOULD strength to permit closed-network deployments to omit STUN/TURN. If not gathered, the functionality SHOULD be implemented but disabled via configuration for future re-enablement.
section: 4.1.1.2
rfc2119_level: SHOULD
topics:
