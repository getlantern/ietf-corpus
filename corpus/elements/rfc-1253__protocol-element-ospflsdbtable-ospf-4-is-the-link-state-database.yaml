document: rfc-1253
kind: protocol-element
summary: ospfLsdbTable (ospf 4) is the link-state database, indexed by ospfLsdbAreaId, ospfLsdbType (routerLink=1, networkLink=2, summaryLink=3, asSummaryLink=4, asExternalLink=5), ospfLsdbLSID, and ospfLsdbRouterId. It also exposes ospfLsdbSequence, ospfLsdbAge, ospfLsdbChecksum, and ospfLsdbAdvertisement (full LSA as OCTET STRING). Intended primarily for network debugging.
section: "5.4"
topics:
