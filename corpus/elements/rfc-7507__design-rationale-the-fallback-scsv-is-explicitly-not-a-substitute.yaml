document: rfc-7507
kind: design-rationale
summary: The fallback SCSV is explicitly not a substitute for proper TLS version negotiation. TLS implementations need to properly handle TLS version negotiation and extensibility mechanisms to avoid the security issues and connection delays associated with fallback retries.
section: "1"
topics:
