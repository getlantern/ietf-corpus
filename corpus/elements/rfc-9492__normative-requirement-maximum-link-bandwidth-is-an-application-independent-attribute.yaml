document: rfc-9492
kind: normative-requirement
summary: Maximum link bandwidth is an application-independent attribute and MUST NOT be advertised in the ASLA sub-TLV. Instead, it MAY be advertised as a sub-TLV of the Extended Link TLV in OSPFv2 (type 23) or Router-Link TLV in OSPFv3 (type 23).
section: "7"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
