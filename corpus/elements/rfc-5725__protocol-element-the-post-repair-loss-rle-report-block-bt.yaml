document: rfc-5725
kind: protocol-element
summary: The Post-repair Loss RLE Report Block (BT=10) is a new RTCP XR block type that conveys receipt/loss events for RTP packets after all loss-repair methods have been applied. It uses the same structure as the pre-repair Loss RLE Report Block defined in RFC 3611, enabling efficient comparison between pre- and post-repair states.
section: "3"
topics:
