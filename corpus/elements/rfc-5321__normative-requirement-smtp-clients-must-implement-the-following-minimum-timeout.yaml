document: rfc-5321
kind: normative-requirement
summary: 'SMTP clients MUST implement the following minimum timeout values: 5 minutes for initial 220 greeting, 5 minutes waiting for MAIL/RCPT reply, 2 minutes for DATA initiation reply, 3 minutes per data block, and 10 minutes for the final DATA termination (post-<CRLF>.<CRLF>) reply.'
section: 4.5.3.2
rfc2119_level: MUST
topics:
    - email
