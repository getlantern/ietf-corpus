summary: 'GOSIP Version 2 NSAP structure: AFI (1 octet, value 47), IDI (2 octets, value 0005), DFI (1 octet, value 80h), AA (3 octets), Rsvd (2 octets), RD (2 octets), Area (2 octets), ID (6 octets), SEL (1 octet), totaling 20 octets. AFI+IDI+DFI+AA = administration prefix; adding Rsvd+RD = routing domain prefix; adding Area = area address.'
