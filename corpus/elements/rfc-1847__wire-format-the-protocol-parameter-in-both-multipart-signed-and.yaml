document: rfc-1847
kind: wire-format
summary: 'The protocol parameter in both multipart/signed and multipart/encrypted is encoded as: protocol = <"> type "/" subtype <">, where type/subtype matches the Content-Type of the control information body part. This parameter is required to be present.'
