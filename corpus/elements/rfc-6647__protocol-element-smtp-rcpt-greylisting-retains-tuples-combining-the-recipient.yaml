document: rfc-6647
kind: protocol-element
summary: SMTP RCPT greylisting retains tuples combining the recipient address with any combination of source, return address, and other recipients. A 4yz reply is issued for the remainder of the session if the tuple is not found or has not reached minimum age. A match on the first valid RCPT is typically sufficient to identify a retry.
section: "2.4"
topics:
    - email
