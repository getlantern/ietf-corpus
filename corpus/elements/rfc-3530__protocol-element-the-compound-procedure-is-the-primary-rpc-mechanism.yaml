document: rfc-3530
kind: protocol-element
summary: The COMPOUND procedure is the primary RPC mechanism in NFS v4, allowing multiple operations to be sent in a single RPC request evaluated sequentially by the server. A 'current filehandle' and 'saved filehandle' are maintained across operations. Once any operation returns a failure, evaluation stops and all partial results are returned.
section: 1.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
