document: rfc-3730
kind: normative-requirement
summary: 'EPP commands are atomic: success and failure results MUST NOT be mixed. Command success or failure MUST NOT be assumed if no response is returned or if a returned response is malformed; protocol idempotency ensures safe retries.'
section: "2.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
