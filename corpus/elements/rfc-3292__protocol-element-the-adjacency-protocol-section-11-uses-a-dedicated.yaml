document: rfc-3292
kind: protocol-element
summary: The Adjacency Protocol (section 11) uses a dedicated message type to synchronise state across the controller-switch link, negotiate the GSMP protocol version, discover the peer identity, and detect peer changes. The Code field in the adjacency message determines the message function; the Transaction Identifier field is absent.
section: "11"
