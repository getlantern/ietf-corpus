document: rfc-5444
kind: protocol-element
summary: The TLV full type is computed as tlv-fulltype = 256 * <tlv-type> + tlv-type-ext, providing a 16-bit effective type space while keeping the base type in an 8-bit field and the optional extension in a separate 8-bit field.
