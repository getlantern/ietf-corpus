document: rfc-9685
kind: interoperability-note
summary: Deploying RPL MOP 5 requires creating a new RPL Instance and migrating nodes; it cannot be applied to a live network in-place. In brown-field deployments with legacy devices, it is RECOMMENDED to deploy one RPL Instance (typically MOP 1) for unicast alongside a separate instance with the multicast MOP.
section: "11"
topics:
    - routing
    - multicast
