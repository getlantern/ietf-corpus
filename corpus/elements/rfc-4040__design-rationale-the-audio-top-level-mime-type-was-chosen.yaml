document: rfc-4040
kind: design-rationale
summary: The 'audio' top-level MIME type was chosen for clearmode—despite it not being audio per se—because dominant uses are telephony-related and because 'audio' allows port sharing in the SDP 'm=' line with codecs such as audio/g711, which is an important application scenario.
