document: rfc-5882
kind: protocol-element
summary: BFD is intended to protect a single data protocol and is encapsulated within that protocol. A pair of systems may run multiple BFD sessions over the same topology if they support different protocols (e.g., separate sessions for IPv4 and IPv6 over the same link).
section: "6"
