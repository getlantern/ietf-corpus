document: rfc-7542
kind: normative-requirement
summary: The utf8-username portion of the NAI SHOULD be treated as opaque data when processed by nodes that are not part of the home domain for that realm. Third-party domains cannot decode it into subfields or ascribe meaning to it.
section: "2.4"
rfc2119_level: SHOULD
topics:
