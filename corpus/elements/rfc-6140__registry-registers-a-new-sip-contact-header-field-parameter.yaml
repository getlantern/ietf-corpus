document: rfc-6140
kind: registry
summary: Registers a new SIP Contact header field parameter 'temp-gruu-cookie' (no predefined values). This parameter is included by the SSP in 200-class REGISTER responses for bulk-number contacts and conveys the cryptographic cookie the SIP-PBX needs to construct valid temporary GRUUs.
section: "9.3"
topics:
