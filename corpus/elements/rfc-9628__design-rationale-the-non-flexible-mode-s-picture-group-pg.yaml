document: rfc-9628
kind: design-rationale
summary: The non-flexible mode's Picture Group (PG) pre-declares the full inter-picture dependency structure in the Scalability Structure, avoiding per-packet reference overhead for streams with a fixed, recurring dependency pattern. Flexible mode trades this compactness for dynamic, per-packet control of temporal-layer hierarchies.
