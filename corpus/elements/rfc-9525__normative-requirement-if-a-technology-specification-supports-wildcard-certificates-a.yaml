document: rfc-9525
kind: normative-requirement
summary: 'If a technology specification supports wildcard certificates, a wildcard in a presented identifier is valid only if: (1) there is only one wildcard character, and (2) the wildcard character appears only as the complete content of the left-most label. A presented identifier that does not meet these requirements is invalid and MUST be ignored.'
section: "6.3"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
