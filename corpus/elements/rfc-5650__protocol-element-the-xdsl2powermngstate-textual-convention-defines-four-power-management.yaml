document: rfc-5650
kind: protocol-element
summary: 'The Xdsl2PowerMngState textual convention defines four power management states: L0 (full power/Showtime), L1 (low power for G.992.2), L2 (low power for G.992.3/4/5), and L3 (idle/no power). VDSL2 only uses L0 and L3.'
