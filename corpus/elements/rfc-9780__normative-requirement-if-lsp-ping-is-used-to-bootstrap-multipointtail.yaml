document: rfc-9780
kind: normative-requirement
summary: If LSP Ping is used to bootstrap MultipointTail, it MUST include the Target FEC Stack TLV (RFC 8029) and the BFD Discriminator TLV (RFC 5884). For P2MP SR policy with SR-MPLS, the implementation MUST follow RFC 8287.
section: "4.1"
rfc2119_level: MUST
topics:
