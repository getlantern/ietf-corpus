document: rfc-7861
kind: normative-requirement
summary: The server MUST NOT reject RPCSEC_GSS_CREATE requests containing supported structured privilege assertions even if some assertions are rejected for local policy reasons. If an RPCSEC_GSS_CREATE request contains one or more unsupported structured privilege assertions, the request MUST be rejected with auth_stat RPCSEC_GSS_PRIVILEGE_PROBLEM.
section: 2.7.1.4
rfc2119_level: MUST NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
