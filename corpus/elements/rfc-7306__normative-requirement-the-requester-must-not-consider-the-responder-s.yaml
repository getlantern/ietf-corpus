document: rfc-7306
kind: normative-requirement
summary: The Requester MUST NOT consider the Responder's Tagged Buffer modified by an Atomic Operation until the Atomic Operation Response Message has been Delivered to RDMAP at the Requester. An Atomic Operation MUST NOT be Completed at the Requester until DDP delivers the associated Atomic Operation Response.
section: "5.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
