document: rfc-4165
kind: wire-format
summary: 'The M2PA-specific Header is 8 bytes: an unused byte followed by BSN (3 bytes, backward sequence number) and an unused byte followed by FSN (3 bytes, forward sequence number). FSN and BSN values range from 0 to 16,777,215 (24-bit unsigned).'
