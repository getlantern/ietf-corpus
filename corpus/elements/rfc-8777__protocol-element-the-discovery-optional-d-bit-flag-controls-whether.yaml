document: rfc-8777
kind: protocol-element
summary: The Discovery Optional (D-bit) flag controls whether a gateway may send an AMT Request message directly to the relay address. D-bit=0 requires a full AMT relay discovery exchange (Relay Discovery then Relay Advertisement) before sending a Request; D-bit=1 permits skipping the discovery step.
section: 4.2.2
topics:
    - dns
    - multicast
