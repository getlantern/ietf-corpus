document: rfc-8911
kind: design-rationale
summary: The design consciously favors a small set of well-defined, useful metrics over a large set with questionable usefulness ('less is more'). Each Registry Entry has only a few variable Runtime Parameters; the acknowledged downside is potentially many entries, but each must be actionable by a Measurement Agent.
