document: rfc-2279
kind: interoperability-note
summary: ISO/IEC 10646 Amendment 5 moved and expanded the Korean Hangul block, rendering any pre-amendment data containing Hangul invalid under the new code point assignments. Unicode 2.0 contains the same incompatible difference from Unicode 1.1. The relevant committees have pledged not to make such incompatible changes again.
section: "3"
