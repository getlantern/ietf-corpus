document: rfc-3122
kind: protocol-element
summary: The Inverse Neighbor Discovery Solicitation message (ICMPv6 Type 141) is sent by a node to request the IPv6 addresses corresponding to a known link-layer address of a target node. It is sent as an IPv6 all-node multicast (FF02::1) at the IP layer but directed to the target at the link-layer level.
section: "2.1"
topics:
    - ip
    - routing
