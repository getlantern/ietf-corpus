document: rfc-5936
kind: normative-requirement
summary: A DNS implementation SHOULD provide means to restrict AXFR sessions to specific clients and SHOULD NOT have a default policy of open access. General-purpose implementations are RECOMMENDED to implement TSIG and/or SIG(0)-based access controls.
section: "5"
rfc2119_level: SHOULD
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
