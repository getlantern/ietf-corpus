document: rfc-6290
kind: protocol-element
summary: A QCD token is an octet string sent in the IKE_AUTH exchange by a 'token maker' and stored by the 'token taker'. After a reboot, the token maker regenerates the same token and sends it in an unprotected notification, allowing the token taker to verify the crash and immediately delete the stale IKE SA.
section: "3"
topics:
    - ipsec
    - vpn
    - security
