summary: 'RFC 8571 defines seven new BGP-LS Link Attribute TLVs (code points 1114–1120) to carry IGP Traffic Engineering Metric Extensions sourced from IS-IS (RFC 8570) and OSPF (RFC 7471): Unidirectional Link Delay, Min/Max Unidirectional Link Delay, Unidirectional Delay Variation, Unidirectional Link Loss, Unidirectional Residual Bandwidth, Unidirectional Available Bandwidth, and Unidirectional Utilized Bandwidth.'
