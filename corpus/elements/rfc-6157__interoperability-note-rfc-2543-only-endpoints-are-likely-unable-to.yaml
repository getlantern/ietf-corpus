document: rfc-6157
kind: interoperability-note
summary: RFC 2543-only endpoints are likely unable to parse or regenerate IPv6 network identifiers in SIP headers because RFC 2543's ABNF did not include production rules for IPv6 addresses; inserting a dual-stack proxy does not guarantee successful signaling with such endpoints.
section: 3.1.1
topics:
    - sip
    - v6ops
