document: rfc-5621
kind: normative-requirement
summary: A recipient of a body part whose disposition type is 'by-reference' that cannot find any reference to the body part MUST NOT process the body part. If the handling was required, the UA must report an error.
section: "9.4"
rfc2119_level: MUST NOT
