document: rfc-3736
kind: interoperability-note
summary: In networks with both stateless address autoconfiguration clients using DHCP only for DNS and clients using DHCP for stateful address assignment, stateless-only DHCP servers may receive stateful messages due to relay agent configuration. Stateless servers must silently discard these non-Information-Request messages.
