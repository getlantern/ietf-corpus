document: rfc-9810
kind: normative-requirement
summary: If the CA grants an ImplicitConfirm request, it MUST include the same id-it-implicitConfirm extension in the response PKIHeader; if the end entity does not find the extension in the response, it MUST send a certificate confirmation message.
