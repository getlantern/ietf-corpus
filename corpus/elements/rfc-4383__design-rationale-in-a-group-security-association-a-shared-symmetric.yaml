document: rfc-4383
kind: design-rationale
summary: In a group security association, a shared symmetric key cannot provide data origin authentication because any group member can impersonate any other member; the MAC only guarantees the packet was not modified by an outside attacker. This motivates the use of TESLA rather than a simple group MAC.
section: "1"
