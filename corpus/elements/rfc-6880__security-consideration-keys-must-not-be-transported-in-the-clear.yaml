document: rfc-6880
kind: security-consideration
summary: Keys MUST NOT be transported in the clear over the network, and keys MUST be treated as write-only attributes modifiable only through the Kerberos set/change-password protocol. The model assumes keys are never readable via the administrative interface.
section: "6"
topics:
