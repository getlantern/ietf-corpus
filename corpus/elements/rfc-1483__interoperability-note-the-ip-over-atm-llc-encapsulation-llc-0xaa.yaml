document: rfc-1483
kind: interoperability-note
summary: The IP-over-ATM LLC encapsulation (LLC 0xAA-AA-03 + OUI 0x00-00-00 + EtherType 0x08-00) is explicitly compatible with RFC 1042; this memo defers to RFC 1042 and states that any changes in its header format should be reflected here.
