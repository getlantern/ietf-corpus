document: rfc-4488
kind: interoperability-note
summary: When a forking proxy forwards a REFER with 'Refer-Sub', only a single 2xx response is returned to the REFER-Issuer, making it unaware of multiple forked dialogs. The REFER-Issuer bears responsibility for ensuring no forking occurs when using this extension.
section: "5"
topics:
