kind: protocol-element
summary: 'The ''tls-exporter'' channel binding mechanism is defined only when the TLS handshake results in unique master secrets: for TLS prior to 1.3 this requires the extended master secret extension (RFC 7627), while TLS 1.3 always produces unique master secrets.'
