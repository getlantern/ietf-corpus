summary: 'Presence subscription states for a roster item are: None, None+PendingOut (subscribe sent awaiting approval), None+PendingIn, From (contact subscribed to user), From+PendingOut, To (user subscribed to contact), To+PendingIn, and Both (mutual); transitions are triggered by subscribe/subscribed/unsubscribe/unsubscribed presence stanzas as detailed in Appendix A.'
