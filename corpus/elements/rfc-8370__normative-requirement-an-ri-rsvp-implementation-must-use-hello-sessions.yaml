document: rfc-8370
kind: normative-requirement
summary: An RI-RSVP implementation MUST use Hello sessions based on Node-ID for detection of RSVP-TE signaling adjacency failures, with a recommended node hello interval of 9 seconds (yielding a hello timeout of ~31.5 seconds).
section: "3"
rfc2119_level: MUST
topics:
