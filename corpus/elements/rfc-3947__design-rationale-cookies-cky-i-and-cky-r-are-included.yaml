document: rfc-3947
kind: design-rationale
summary: Cookies (CKY-I and CKY-R) are included in the NAT-D hash computation to make precomputation attacks against the IP address and port values impossible. Without cookies, an attacker could precompute hashes for all possible IP/port combinations.
section: "3.2"
topics:
    - ipsec
    - vpn
    - nat
    - security
    - crypto
