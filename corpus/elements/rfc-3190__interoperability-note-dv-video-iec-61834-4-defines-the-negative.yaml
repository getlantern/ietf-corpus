document: rfc-3190
kind: interoperability-note
summary: DV video (IEC 61834-4) defines the negative full-scale audio sample value as an error code (800h for 12-bit, 8000h for 16-bit, 80000h for 20-bit). These error codes have no meaning in the RTP payload formats defined here — all possible sample values are valid — requiring translation at DV/RTP boundaries.
