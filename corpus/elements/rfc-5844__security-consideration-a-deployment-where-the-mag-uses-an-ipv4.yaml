document: rfc-5844
kind: security-consideration
summary: A deployment where the MAG uses an IPv4 private address with NAT translation devices in the path to the LMA is explicitly not supported. Private IPv4 addresses are permitted only if there is no NAT between LMA and MAG; UDP encapsulation MAY be used if other types of middleboxes are present.
section: "1.1"
topics:
    - mobility
    - ip
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
