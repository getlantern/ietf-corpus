document: rfc-5195
kind: normative-requirement
summary: A PE that has no VPN with an import Route Target matching received L1VPN information MUST discard that information, and MUST use inbound filtering to enforce this. This prevents PEs from retaining irrelevant VPN state.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - vpn
    - routing
