document: rfc-3090
kind: protocol-element
summary: A 'zone signing KEY RR' is a KEY RR whose flag field indicates name type 01 (zone key) and key type 00 or 01 (permitted to authenticate data), with a protocol octet value of DNSSEC (3) or ALL (255). The protocol octet requirement is a new addition updating RFC 2535 section 3.1.3.
section: 2.a
topics:
    - dns
    - security
    - crypto
