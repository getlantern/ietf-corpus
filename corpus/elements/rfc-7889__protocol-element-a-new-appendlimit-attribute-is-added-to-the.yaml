document: rfc-7889
kind: protocol-element
summary: A new APPENDLIMIT attribute is added to the STATUS command, allowing clients to retrieve the maximum upload size for a specific mailbox. The server returns 'APPENDLIMIT <number>' or 'APPENDLIMIT NIL' (no limit) in the STATUS response.
section: "3.1"
topics:
    - email
