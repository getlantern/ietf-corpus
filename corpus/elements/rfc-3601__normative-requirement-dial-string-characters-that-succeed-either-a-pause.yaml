document: rfc-3601
kind: normative-requirement
summary: Dial string characters that succeed either a "pause" or "tonewait" SHOULD be sent using DTMF signalling, since they are not part of the GSTN subscriber address per se.
section: "2.1"
rfc2119_level: SHOULD
