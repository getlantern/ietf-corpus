document: rfc-3028
kind: design-rationale
summary: 'Sieve uses an ''implicit keep'' mechanism: if a script completes without any action that would deliver, redirect, or discard the message, the message is kept in the user''s main mailbox. This prevents mail loss when scripts fail to cover all cases.'
section: 2.10.2
topics:
    - email
