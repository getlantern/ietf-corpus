document: rfc-2686
kind: design-rationale
summary: A 1500-byte packet on a 28.8 kbit/s modem occupies the link for ~400 ms, producing round-trip delays of at least one second, which is unacceptable for real-time conversation. Fragmentation with priority interleaving is therefore required.
section: "1"
topics:
