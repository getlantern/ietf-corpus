document: rfc-5928
kind: protocol-element
summary: 'The mapping from (<secure>, <transport>) to TURN transport is: false+''udp''→UDP, false+''tcp''→TCP, true+''tcp''→TLS. Combining <secure>=true with <transport>=''udp'' is explicitly invalid. This table governs transport selection throughout the five-step resolution algorithm.'
section: "3"
