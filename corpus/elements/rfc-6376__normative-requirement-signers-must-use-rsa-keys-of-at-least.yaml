document: rfc-6376
kind: normative-requirement
summary: Signers MUST use RSA keys of at least 1024 bits for long-lived keys. Verifiers MUST be able to validate signatures with keys ranging from 512 bits to 2048 bits, and MAY validate larger keys.
section: 3.3.3
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
