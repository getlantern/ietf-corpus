document: rfc-3910
kind: normative-requirement
summary: 'SUBSCRIBE requests that establish a dialog MUST contain a body encoding: the set of detection points (DPs) subscribed to, the mode parameter (''R'' or ''N'') for spirits-INDPs events, and associated DP parameter values. SUBSCRIBE requests terminating a subscription MAY have an empty body.'
section: 5.3.4
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
