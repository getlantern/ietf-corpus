document: rfc-5958
kind: registry
summary: This document registers the application/pkcs8 media type with IANA. The subtype carries a DER-encoded PrivateKeyInfo (OneAsymmetricKey), has no required or optional parameters, uses binary encoding, and is associated with the .p8 file extension.
