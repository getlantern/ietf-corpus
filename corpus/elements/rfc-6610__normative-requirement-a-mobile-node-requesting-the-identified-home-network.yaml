document: rfc-6610
kind: normative-requirement
summary: A mobile node requesting the Identified Home Network Information option MUST include a Client Home Network ID FQDN option identifying the MSP. The target MSP may be the mobile node's home MSP or any MSP with a trusted roaming relationship.
section: 4.1.1
rfc2119_level: MUST
topics:
    - mobility
    - ip
