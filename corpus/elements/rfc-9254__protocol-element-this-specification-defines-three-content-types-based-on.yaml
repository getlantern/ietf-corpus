document: rfc-9254
kind: protocol-element
summary: 'This specification defines three content-types based on application/yang-data+cbor: with id=sid (compact SID-based, for constrained nodes), id=name (text-string-based, as a drop-in for JSON), and without the id parameter (mixed, for applications that need to handle YANG modules before SID mappings are defined).'
