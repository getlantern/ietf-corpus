document: rfc-6295
kind: normative-requirement
summary: If several RTP MIDI streams are classified as sending different classes of media (e.g., one for audio and one for lighting control) within a multimedia session, they MUST be sent over different RTP sessions, each with its own media line in the session description.
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
