document: rfc-5949
kind: interoperability-note
summary: Both MAGs SHOULD support the encapsulation modes defined for the LMA-MAG tunnel in RFC 5844 (IPv4/IPv6-over-IPv6, IPv4/IPv6-over-IPv4, UDP tunneling) and RFC 5845 (TLV-header UDP and GRE with or without keys), ensuring compatibility with the broader PMIPv6 domain configuration.
