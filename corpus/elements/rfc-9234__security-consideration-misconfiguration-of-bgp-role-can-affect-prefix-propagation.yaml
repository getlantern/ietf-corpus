document: rfc-9234
kind: security-consideration
summary: 'Misconfiguration of BGP Role can affect prefix propagation: assigning Provider/Peer Role to a downstream link limits advertisements in that direction, while assigning Customer Role to an upstream provider may cause route leaks to other Providers or Peers. Role negotiation makes such misconfigurations unlikely but not impossible.'
section: "8"
topics:
    - bgp
    - security
    - routing
