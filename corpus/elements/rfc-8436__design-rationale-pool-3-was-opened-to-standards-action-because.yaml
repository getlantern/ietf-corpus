document: rfc-8436
kind: design-rationale
summary: Pool 3 was opened to Standards Action because the Lower Effort (LE) PHB requires a codepoint with a zero value in the first three bits to avoid IP Precedence bleaching issues. No unassigned Pool 1 codepoints with these properties were available, necessitating use of a Pool 3 codepoint to prevent priority inversion where bleached traffic would receive unintentional LE treatment.
section: "1"
topics:
