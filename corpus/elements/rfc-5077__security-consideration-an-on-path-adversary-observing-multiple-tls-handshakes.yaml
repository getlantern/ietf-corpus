document: rfc-5077
kind: security-consideration
summary: An on-path adversary observing multiple TLS handshakes using the same ticket can correlate them to the same communication endpoints, so unlinkability is not guaranteed. Issuing new tickets via TLS renegotiation after tunnel establishment may mitigate some privacy and unlinkability concerns.
section: "5.8"
topics:
    - tls
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
