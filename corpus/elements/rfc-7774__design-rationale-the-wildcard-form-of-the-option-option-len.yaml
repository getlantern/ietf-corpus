document: rfc-7774
kind: design-rationale
summary: The wildcard form of the option (option_len=16, no MPL Domain Address) provides a single default parameter set for all MPL Domains on the network, simplifying deployment when multiple domains need identical configuration. A specific-domain option (option_len=32) overrides the wildcard for that domain, enabling per-domain tuning without requiring individual options for every domain.
section: "2.3"
topics:
    - routing
