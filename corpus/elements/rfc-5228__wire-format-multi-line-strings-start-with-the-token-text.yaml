document: rfc-5228
kind: wire-format
summary: 'Multi-line strings start with the token ''text:'' followed by CRLF and end with CRLF, ''.'', CRLF. Lines within are dot-stuffed: an extra ''.'' is added before any line beginning with ''.'', and the server removes these extra dots. The CRLF before the final period is part of the value.'
section: 2.4.2
topics:
    - email
