document: rfc-9931
kind: normative-requirement
summary: A client cannot begin using an upgraded protocol on the connection until it has completely sent the request message; this is a necessary but not sufficient condition, as the server might reject the transition. Completion of the request is required before switching protocols.
section: "3"
rfc2119_level: MUST NOT
topics:
    - http
