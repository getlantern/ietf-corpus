document: rfc-6796
kind: security-consideration
summary: An attacker could modify or forge session policy documents to increase client processing cost or cause DoS, or to inject fake policies. The protocol distributing session policy documents SHOULD ensure authentication, privacy, and message integrity; use of RFC 6795 meets these requirements.
section: "9"
topics:
    - security
    - sip
    - realtime
