document: rfc-4704
kind: protocol-element
summary: The DHCPv6 Client FQDN option (OPTION_CLIENT_FQDN, code 39) carries a Flags field (1 octet) and a domain-name field (variable length). Its minimum length is 1 octet. It is used to exchange FQDN information and negotiate DNS update responsibilities between client and server.
