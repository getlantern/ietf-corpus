document: rfc-1892
kind: protocol-element
summary: The Text/RFC822-Headers MIME content-type is defined with MIME type 'Text', subtype 'RFC822-Headers', no required or optional parameters, and 7-bit encoding (quoted-printable allowed for broken headers). It is used to return only the RFC 822 headers of a failed message.
