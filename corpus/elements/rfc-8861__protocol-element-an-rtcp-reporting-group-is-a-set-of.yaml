document: rfc-8861
kind: protocol-element
summary: An RTCP Reporting Group is a set of co-located SSRCs at a single endpoint in an RTP session. One or more SSRCs act as 'reporting sources' and send RTCP SR/RR packets on behalf of the group; the other members suppress their reception quality reports and send RTCP RGRS packets instead.
section: "3"
topics:
