document: rfc-7731
kind: normative-requirement
summary: For each MPL Domain that an MPL Forwarder serves as an MPL Seed, it MUST have an associated MPL Seed Identifier that is unique within each MPL Domain, though the same identifier MAY be reused across multiple domains.
section: "5.3"
rfc2119_level: MUST
topics:
