document: rfc-8627
kind: protocol-element
summary: 'FLEX FEC defines three FEC header variants selected by R and F bits: R=0,F=0 uses flexible bitmask fields; R=0,F=1 uses fixed L columns and D rows; R=1,F=0 is a retransmission of a single source packet. R=1,F=1 is reserved and MUST NOT be sent.'
section: 4.2.2
topics:
