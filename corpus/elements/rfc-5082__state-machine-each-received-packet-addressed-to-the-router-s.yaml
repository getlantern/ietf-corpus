document: rfc-5082
kind: state-machine
summary: 'Each received packet addressed to the router''s control plane is classified into one of three trustworthiness states: Unknown (cannot be associated with any GTSM-enabled session), Trusted (belongs to a GTSM-enabled session with TTL within expected range), or Dangerous (belongs to a GTSM-enabled session but TTL is NOT within expected range).'
