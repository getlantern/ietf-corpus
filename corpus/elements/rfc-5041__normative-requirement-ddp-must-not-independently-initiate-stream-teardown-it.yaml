document: rfc-5041
kind: normative-requirement
summary: DDP MUST NOT independently initiate Stream Teardown; it only responds to LLP teardown or ULP requests. After a fatal error is indicated to the ULP, the DDP Stream MUST NOT be terminated until the Local Peer ULP requests abortive teardown.
section: "6.2"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
