document: rfc-6313
kind: interoperability-note
summary: The structured data specifications in this document apply equally to PSAMP (RFC 5476) because PSAMP is based on IPFIX. A PSAMP Packet Report is effectively a special IPFIX Flow Record containing information about a single packet.
