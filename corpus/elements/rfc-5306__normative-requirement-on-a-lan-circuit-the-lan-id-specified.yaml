document: rfc-5306
kind: normative-requirement
summary: On a LAN circuit, the LAN-ID specified in an IIH with RR set MUST be ignored by receiving neighbors, so that the restarting router can learn the previously used LAN-ID from normal IIHs and avoid unnecessary pseudonode LSP churn.
section: 3.3.1
rfc2119_level: MUST
topics:
    - routing
