document: rfc-7771
kind: design-rationale
summary: Applying the PSC protocol to PWs enables a uniform operational approach for protection at both the LSP and PW layers and easier management integration for networks already implementing RFC 6378/7271/7324, especially for end-to-end static MS-PWs over MPLS-TP where tunnel protection alone is insufficient.
section: A.1
topics:
