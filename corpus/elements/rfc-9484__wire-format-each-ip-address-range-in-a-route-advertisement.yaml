document: rfc-9484
kind: wire-format
summary: 'Each IP Address Range in a ROUTE_ADVERTISEMENT capsule contains: IP Version (8-bit, MUST be 4 or 6), Start IP Address (32 or 128 bits), End IP Address (32 or 128 bits, MUST be ≥ Start), and IP Protocol (8-bit; 0 means all protocols allowed; ICMP is always allowed regardless).'
