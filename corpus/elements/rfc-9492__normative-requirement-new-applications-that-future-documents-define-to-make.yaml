document: rfc-9492
kind: normative-requirement
summary: New applications that future documents define to make use of ASLA advertisements MUST NOT make use of RSVP-TE LSA advertisements. This simplifies deployment by eliminating the need to support multiple advertisement methods for new applications.
section: "12.1"
rfc2119_level: MUST NOT
topics:
    - routing
