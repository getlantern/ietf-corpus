document: rfc-9802
kind: design-rationale
summary: Stateful HBS schemes (HSS, XMSS, XMSS^MT) derive quantum-resistant security solely from the security of the underlying hash function, using Merkle trees combined with One-Time Signatures. Their theoretical security is well understood and does not depend on the hardness of factoring or discrete logarithm problems.
