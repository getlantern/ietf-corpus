document: rfc-4279
kind: normative-requirement
summary: In the absence of an application profile specifying otherwise, servers SHOULD NOT provide an identity hint and clients MUST ignore the identity hint field. Applications using the field MUST specify its contents, how the server chooses the value, and what the client does with it.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - tls
