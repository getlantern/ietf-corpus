document: rfc-8707
kind: security-consideration
summary: An audience-restricted access token legitimately presented to a resource cannot be taken by that resource and presented elsewhere for illegitimate access to other resources. The 'resource' parameter enables the authorization server to apply appropriate audience restrictions to prevent this token redirect attack.
section: "3"
topics:
    - oauth
    - security
