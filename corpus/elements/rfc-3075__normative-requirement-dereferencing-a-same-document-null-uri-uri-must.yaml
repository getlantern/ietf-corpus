document: rfc-3075
kind: normative-requirement
summary: Dereferencing a same-document null URI (URI="") MUST produce an XPath node-set of every non-comment node in the containing XML document. Applications MUST support the null URI and barename XPointer for same-document references.
section: 4.3.3.3
rfc2119_level: MUST
topics:
    - security
    - crypto
