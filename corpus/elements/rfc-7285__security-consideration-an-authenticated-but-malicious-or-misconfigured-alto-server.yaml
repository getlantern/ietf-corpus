document: rfc-7285
kind: security-consideration
summary: An authenticated but malicious or misconfigured ALTO server could provide guidance that directs traffic in ways harmful to the client (e.g., overloading specific peers, steering traffic to monitored paths). Clients should only trust ALTO servers that are operated by or vetted by a trusted party.
section: "15.2"
topics:
    - security
