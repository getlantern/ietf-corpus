document: rfc-6675
kind: design-rationale
summary: The duplicate acknowledgment definition was broadened to include any ACK carrying new SACK data covering the range HighACK to HighData. This allows SACK information (rather than just cumulative ACK stagnation) to trigger loss recovery entry, enabling more accurate distinction between loss and reordering.
