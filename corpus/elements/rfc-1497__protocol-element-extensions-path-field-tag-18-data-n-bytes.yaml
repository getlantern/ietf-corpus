document: rfc-1497
kind: protocol-element
summary: 'Extensions Path Field (Tag 18, Data: N bytes): Introduced in this edition; specifies a TFTP-retrievable file whose content is interpreted identically to the 64-octet vendor-extension field, except that the file length is unconstrained and any Tag 18 references within the file are ignored.'
