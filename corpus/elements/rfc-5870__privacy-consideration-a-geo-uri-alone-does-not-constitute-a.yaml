document: rfc-5870
kind: privacy-consideration
summary: A 'geo' URI alone does not constitute a 'Location Object' under GEOPRIV (RFC 3693) because it does not identify a Target or Device. However, when used in a context that does identify a Target's location, full GEOPRIV privacy rules apply.
section: "9.2"
topics:
    - privacy
    - security
