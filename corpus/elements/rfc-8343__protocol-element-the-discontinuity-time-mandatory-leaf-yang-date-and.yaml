document: rfc-8343
kind: protocol-element
summary: The 'discontinuity-time' mandatory leaf (yang:date-and-time) in the statistics container records the most recent time any counter on the interface suffered a discontinuity; if no discontinuity since last management subsystem re-initialization, it contains the re-initialization time. Consumers must check this value before computing counter deltas.
section: "5"
topics:
