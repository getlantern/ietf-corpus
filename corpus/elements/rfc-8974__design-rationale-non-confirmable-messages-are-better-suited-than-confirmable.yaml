document: rfc-8974
kind: design-rationale
summary: Non-confirmable messages are better suited than Confirmable messages for stateless CoAP-over-UDP clients because Confirmable messages require the client to retain message-exchange state for retransmission and to handle ACK/Reset replies.
section: "3.3"
