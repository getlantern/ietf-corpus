document: rfc-2429
kind: protocol-element
summary: A Follow-on Packet (P=0) contains H.263+ coded data that does not start at a synchronization point. It may or may not start at a macroblock boundary, and its data is not independently decodable. PLEN>0 is permitted to allow interior resynchronization.
section: "5.2"
topics:
    - rtp
    - realtime
