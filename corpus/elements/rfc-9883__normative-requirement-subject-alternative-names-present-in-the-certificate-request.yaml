document: rfc-9883
kind: normative-requirement
summary: Subject alternative names present in the certificate request SHOULD match those in the signature certificate. If they differ, the certificate policy MUST describe how to determine they identify the same entity; otherwise the CA MUST reject the request.
section: "3"
rfc2119_level: SHOULD
topics:
