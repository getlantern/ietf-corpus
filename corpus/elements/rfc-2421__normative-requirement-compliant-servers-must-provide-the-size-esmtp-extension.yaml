document: rfc-2421
kind: normative-requirement
summary: Compliant servers MUST provide the SIZE ESMTP extension to indicate the maximum message size they will accept. Clients SHOULD NOT send messages larger than the size the server advertises.
section: 5.2.2
rfc2119_level: MUST
topics:
