document: rfc-6860
kind: security-consideration
summary: Some LSA information such as the OSPF Router ID cannot be omitted. Even if a Router ID is derived from an IPv4 address, reachability is not guaranteed if the address is hidden from forwarding tables. The mechanism can also be applied to hide non-transit networks, and operators should exercise the same care as with other routing protocol parameters.
section: "5"
topics:
    - security
    - routing
