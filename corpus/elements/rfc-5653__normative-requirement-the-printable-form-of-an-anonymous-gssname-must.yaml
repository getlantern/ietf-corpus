document: rfc-5653
kind: normative-requirement
summary: The printable form of an anonymous GSSName must be syntactically distinguishable from any valid principal name supported by the implementation, and the associated name-type OID must represent NT_ANONYMOUS. The printable form should imply anonymity (e.g., '<anonymous>') because it may appear in audit logs.
section: "4.4"
rfc2119_level: MUST
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
