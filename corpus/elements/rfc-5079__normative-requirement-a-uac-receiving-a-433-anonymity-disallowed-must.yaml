document: rfc-5079
kind: normative-requirement
summary: A UAC receiving a 433 (Anonymity Disallowed) MUST NOT retry the request without anonymity unless it obtains confirmation from the user (via UI or user-defined policy) that retrying without anonymity is desirable.
section: "4"
rfc2119_level: MUST NOT
