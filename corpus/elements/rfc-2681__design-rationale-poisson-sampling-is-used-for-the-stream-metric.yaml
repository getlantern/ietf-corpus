document: rfc-2681
kind: design-rationale
summary: Poisson sampling is used for the stream metric to avoid self-synchronization effects and to capture a statistically unbiased sample. The Poisson process schedules delay measurements; it does not imply that real Internet traffic follows a Poisson arrival process.
