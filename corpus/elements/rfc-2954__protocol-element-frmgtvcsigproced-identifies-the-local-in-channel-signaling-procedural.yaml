document: rfc-2954
kind: protocol-element
summary: 'frMgtVCSigProced identifies the local in-channel signaling procedural role: u2nnet(1) for network-side role, bidirect(2) for both user and network roles, and u2nuser(3) for user-side role. Objects that apply only to the non-operative side are not instantiated and return noSuchInstance. Default is u2nnet.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
