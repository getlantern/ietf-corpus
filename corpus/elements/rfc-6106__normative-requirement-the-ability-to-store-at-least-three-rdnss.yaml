document: rfc-6106
kind: normative-requirement
summary: The ability to store at least three RDNSS addresses (or DNSSL domain names) from at least two different sources is RECOMMENDED. DNS information from DHCP SHOULD be stored first in the Resolver Repository so that DHCP takes precedence over RA for DNS queries.
section: 5.3.1
rfc2119_level: RECOMMENDED
topics:
    - dns
    - ip
    - v6ops
