document: rfc-9201
kind: protocol-element
summary: The cnf parameter in the AS-to-client token response is REQUIRED if the token type is 'pop' and a symmetric key is used, and MAY be present for asymmetric PoP keys. It contains the PoP key that the AS selected for the token.
section: "3.2"
