document: rfc-6282
kind: normative-requirement
summary: An additional integrity check (e.g., L2 MIC) MUST be used whenever transmitting link frames that carry a compressed UDP datagram with the checksum elided, to prevent undetected corruption of pseudo-header data.
section: 4.3.2
rfc2119_level: MUST
topics:
    - udp
    - security
