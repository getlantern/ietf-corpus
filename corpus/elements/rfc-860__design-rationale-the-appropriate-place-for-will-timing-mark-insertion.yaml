document: rfc-860
kind: design-rationale
summary: The 'appropriate place' for WILL TIMING-MARK insertion is defined as just before the first character the user typed after seeing the error message from the DO TIMING-MARK sender, so the timing mark appears to have been 'printed' on the terminal and answered by the user.
