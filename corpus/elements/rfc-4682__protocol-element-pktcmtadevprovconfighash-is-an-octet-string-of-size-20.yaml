document: rfc-4682
kind: protocol-element
summary: pktcMtaDevProvConfigHash is an OCTET STRING of SIZE(20) holding the SHA-1 (160-bit) hash of the MTA configuration file content. When the SNMP Enrollment mechanism is used, this value is SET by the Provisioning Server; otherwise the MTA calculates and reflects it, and MUST reject SET operations.
section: "4"
topics:
    - snmp
    - crypto
    - diameter
