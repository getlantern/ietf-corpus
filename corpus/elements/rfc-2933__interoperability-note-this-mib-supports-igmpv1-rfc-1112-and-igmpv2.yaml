document: rfc-2933
kind: interoperability-note
summary: This MIB supports IGMPv1 (RFC 1112) and IGMPv2 (RFC 2236) only; a future MIB version will support IGMPv3 (then a work in progress). The entire MIB is applicable to IPv4 multicast routers; a subset applies to IGMP hosts.
section: "1"
topics:
