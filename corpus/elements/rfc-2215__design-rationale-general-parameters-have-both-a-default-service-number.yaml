document: rfc-2215
kind: design-rationale
summary: General parameters have both a default (service_number=1) and optional service-specific override values. This allows a node to export a single default value when all services share the same value, reducing message size and processing overhead; service-specific values override the default only for the service to which they apply.
section: "2"
