document: rfc-3592
kind: interoperability-note
summary: When available/unavailable time boundaries cross a 900-second (15-minute) statistics window boundary, the CV, ES, SES, SEFS, and UAS counts for the PREVIOUS interval must be adjusted, meaning successive GETs of interval objects may return differing values during the first few seconds of the new window.
section: "3.5"
topics:
