document: rfc-9177
kind: protocol-element
summary: For Q-Block2, the server MUST ensure all payloads for the same body share the same ETag value, and MUST NOT reuse the same ETag for different resource representations. If the ETag changes mid-transfer, the client should discard the partial old-ETag body and may re-request from block 0.
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
