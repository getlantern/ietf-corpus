kind: protocol-element
summary: 'Three ECDSA signature algorithms are defined for use in IKE and IKEv2: ECDSA-256 (256-bit random ECP group, SHA-256), ECDSA-384 (384-bit random ECP group, SHA-384), and ECDSA-521 (521-bit random ECP group, SHA-512). Each algorithm specifies the elliptic curve group, hash function, and authentication method as a unit.'
