document: rfc-6620
kind: protocol-element
summary: 'The FCFS SAVI database (DB) stores per-address binding entries containing: IP source address, binding anchor (port), lifetime, status (TENTATIVE, VALID, TESTING_VP, or TESTING_TP-LT), and creation time. A separate FCFS SAVI Prefix List records on-link prefixes and their associated interfaces.'
section: "3.1"
