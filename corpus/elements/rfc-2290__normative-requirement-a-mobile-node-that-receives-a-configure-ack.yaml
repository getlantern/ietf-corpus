document: rfc-2290
kind: normative-requirement
summary: A mobile node that receives a Configure-Ack containing a Mobile-IPv4 Configuration Option MUST receive an Agent Advertisement (possibly in response to an Agent Solicitation) before sending a Registration Request if connecting to a foreign link, because the foreign agent may enforce a mandatory registration policy.
section: "2.4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
