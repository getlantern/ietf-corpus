document: rfc-4918
kind: normative-requirement
summary: Servers MUST examine all requests for a body even when a body was not expected; if a request body is present but would be ignored, the server MUST reject the request with 415 Unsupported Media Type.
section: "8.4"
rfc2119_level: MUST
