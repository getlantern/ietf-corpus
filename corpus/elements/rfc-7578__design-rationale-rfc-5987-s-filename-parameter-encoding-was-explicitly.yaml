document: rfc-7578
kind: design-rationale
summary: RFC 5987's 'filename*' parameter encoding was explicitly prohibited (MUST NOT) rather than merely deprecated, because its use would create a conflicting encoding path alongside percent-encoding; the goal is to limit the diversity of filename encoding schemes that parsers must handle.
section: "4.2"
topics:
    - http
