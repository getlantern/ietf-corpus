document: rfc-9830
kind: design-rationale
summary: The separate SRv6 Binding SID sub-TLV (Type 20) was introduced in later draft versions to support advertising of SRv6 Endpoint Behavior and SID Structure without breaking backward compatibility with early implementations that used only the original Binding SID sub-TLV (Type 13) for both SR-MPLS and SRv6.
