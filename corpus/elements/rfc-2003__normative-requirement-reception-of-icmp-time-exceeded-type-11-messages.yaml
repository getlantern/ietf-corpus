document: rfc-2003
kind: normative-requirement
summary: Reception of ICMP Time Exceeded (Type 11) messages MUST be reported to the sender of the original unencapsulated datagram as Host Unreachable (Type 3, Code 1), since the datagram reached the correct network but not the correct destination node.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
