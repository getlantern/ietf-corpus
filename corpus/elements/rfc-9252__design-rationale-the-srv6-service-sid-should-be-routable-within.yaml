document: rfc-9252
kind: design-rationale
summary: 'The SRv6 Service SID SHOULD be routable within the AS of the egress PE and serves a dual purpose: it provides reachability between ingress and egress PE (via the Locator prefix) while simultaneously encoding the SRv6 Endpoint Behavior. This allows the underlay to require only plain IPv6 forwarding (RFC 8200) without MPLS.'
section: "5"
topics:
