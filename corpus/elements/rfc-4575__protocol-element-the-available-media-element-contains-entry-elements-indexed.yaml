document: rfc-4575
kind: protocol-element
summary: The <available-media> element contains <entry> elements indexed by a required 'label' attribute corresponding to the SDP "label" media attribute. Each entry includes <type> (MUST be a registered SDP media type) and <status> (sendrecv/sendonly/recvonly/inactive from the participant's point of view).
section: 5.3.4
topics:
