document: rfc-5445
kind: normative-requirement
summary: In non-unique SBN mode for the Compact No-Code FEC Scheme, the mapping from source blocks to Source Block Numbers MUST be communicated out-of-band to receivers; how this is done is outside the scope of this document. The mapping may be implicit, for example determined by the transmission order of source blocks.
section: 3.2.1
rfc2119_level: MUST
topics:
    - multicast
