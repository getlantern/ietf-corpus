document: rfc-5545
kind: normative-requirement
summary: The TZID parameter MUST be specified on DTSTART, DTEND, DUE, EXDATE, and RDATE properties when the value is a DATE-TIME or TIME that is neither UTC nor floating time. A separate VTIMEZONE component MUST be present for each unique TZID parameter value in the iCalendar object.
section: 3.2.19
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
