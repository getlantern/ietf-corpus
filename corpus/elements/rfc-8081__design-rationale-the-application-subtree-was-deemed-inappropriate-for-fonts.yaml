document: rfc-8081
kind: design-rationale
summary: 'The ''application'' subtree was deemed inappropriate for fonts for three reasons: it is treated with caution with respect to viruses and active code; it precludes a common set of optional parameters across font types; and fonts have unique licensing and usage restrictions that warrant their own top-level category.'
section: "2"
topics:
