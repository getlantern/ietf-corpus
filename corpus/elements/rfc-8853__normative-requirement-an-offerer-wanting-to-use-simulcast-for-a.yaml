document: rfc-8853
kind: normative-requirement
summary: An offerer wanting to use simulcast for a media description SHALL include one 'a=simulcast' attribute in that media description. An offerer listing receive simulcast streams in the offer MUST be prepared to receive RTP streams for any of those simulcast streams from the answerer.
section: 5.3.1
rfc2119_level: SHALL
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
