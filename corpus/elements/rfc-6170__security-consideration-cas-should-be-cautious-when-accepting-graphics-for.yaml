document: rfc-6170
kind: security-consideration
summary: CAs should be cautious when accepting graphics for embedding if the hash algorithm used to sign the certificate is vulnerable to collision attacks, as accepted image data could assist an attacker in obtaining colliding certificates with identical signatures.
