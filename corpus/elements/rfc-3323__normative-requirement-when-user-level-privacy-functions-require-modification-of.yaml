document: rfc-3323
kind: normative-requirement
summary: When user-level privacy functions require modification of dialog-matching headers, the privacy service SHOULD act as a transparent back-to-back user agent and MUST persist the former values of dialog-matching headers, restoring them in messages sent to the originating user agent.
section: "5.3"
rfc2119_level: MUST
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
