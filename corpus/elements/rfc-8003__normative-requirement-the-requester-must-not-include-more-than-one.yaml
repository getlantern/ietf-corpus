document: rfc-8003
kind: normative-requirement
summary: The requester MUST NOT include more than one REG_REQUEST parameter in its I2 or UPDATE packets, while the registrar MUST be able to process one or more REG_REQUEST parameters in received I2 or UPDATE packets.
section: "4.3"
rfc2119_level: MUST NOT
