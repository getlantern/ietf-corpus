document: rfc-4821
kind: protocol-element
summary: For SCTP probing, the recommended method is to attach a PAD chunk (RFC 4820) to a minimum-length HEARTBEAT chunk to build a probe packet; this is fully compatible with all current SCTP implementations. SCTP must independently probe the PMTU on each path to the peer.
