document: rfc-6160
kind: design-rationale
summary: AES-GCM and AES-CCM were not chosen as the primary content-encryption algorithms for symmetric key packages because no mode of AES-GCM or AES-CCM provides the same keying-material segregation properties as AES Key Wrap with Padding. The document notes it will be updated if such a mode is defined.
