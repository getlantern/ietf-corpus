document: rfc-5602
kind: design-rationale
summary: The MIB assumes a PW can be associated to one MPLS-TE tunnel at a time, which may have multiple LSP instances. Selection of the active LSP is outside the MIB's scope (it is part of MPLS PSN functionality); only the current active LSP is reported.
