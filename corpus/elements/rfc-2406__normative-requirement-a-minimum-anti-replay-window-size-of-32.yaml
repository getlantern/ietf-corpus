document: rfc-2406
kind: normative-requirement
summary: A minimum anti-replay window size of 32 MUST be supported; a window size of 64 is preferred and SHOULD be employed as the default. The receiver does NOT notify the sender of the window size.
section: 3.4.3
rfc2119_level: MUST
topics:
