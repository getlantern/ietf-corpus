document: rfc-8155
kind: protocol-element
summary: For anycast discovery, a TURN client sends an Allocation request to the assigned TURN anycast address. The anycast TURN server MUST respond with a 300 (Try Alternate) error containing the TURN unicast address in the ALTERNATE-SERVER attribute; the client then uses that unicast address for all subsequent communication.
section: "6"
topics:
