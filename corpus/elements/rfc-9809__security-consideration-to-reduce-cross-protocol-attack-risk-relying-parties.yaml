document: rfc-9809
kind: security-consideration
summary: To reduce cross-protocol attack risk, relying parties may prohibit use of specific combinations of KeyPurposeIds; the procedure for allowing or disallowing combinations using excluded and permitted KeyPurposeIds is defined in RFC 9336 Section 4. An example of a disallowed combination is anyExtendedKeyUsage together with any of the new KeyPurposeIds.
section: "6"
topics:
    - security
    - pkix
