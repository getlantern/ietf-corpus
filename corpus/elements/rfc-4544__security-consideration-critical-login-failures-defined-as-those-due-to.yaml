document: rfc-4544
kind: security-consideration
summary: Critical login failures — defined as those due to authentication, authorization, or negotiation problems — are designated as security events that may require immediate action. The iscsiTgtLoginAuthenticateFails and iscsiTgtLoginAuthorizeFails counters each specify that an iscsiTgtLoginFailure notification SHOULD be generated when they are incremented.
section: "6.16"
rfc2119_level: SHOULD
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
