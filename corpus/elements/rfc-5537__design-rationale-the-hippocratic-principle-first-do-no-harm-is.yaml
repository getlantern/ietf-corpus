document: rfc-5537
kind: design-rationale
summary: The Hippocratic Principle — 'first, do no harm' — is identified as even more important than the Internet Robustness Principle for Netnews, because a locally suboptimal decision (such as silently accepting and re-transmitting a malformed article) can be catastrophically amplified by thousands of hosts within minutes.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
