document: rfc-3434
kind: interoperability-note
summary: 'The hcAlarmTable differs from RMON-1''s alarmTable in four key ways: Counter64 is properly supported; an entry is not destroyed if the monitored instance is unavailable during a polling interval; RowStatus replaces EntryStatus for hcAlarmStatus; and StorageType is added for explicit non-volatile storage control.'
