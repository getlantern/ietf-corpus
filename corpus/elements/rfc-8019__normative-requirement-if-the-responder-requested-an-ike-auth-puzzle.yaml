document: rfc-8019
kind: normative-requirement
summary: If the Responder requested an IKE_AUTH puzzle, it MUST silently discard all IKE_AUTH request messages that do not contain the PS payload, and MUST verify all four keys before any computationally intensive operation.
section: 7.2.4
rfc2119_level: MUST
