document: rfc-1229
kind: protocol-element
summary: ifExtnsTestType (read-write OBJECT IDENTIFIER) controls test invocation. Writing noTest { 0 0 } aborts an in-progress test; writing any other value starts the indicated test. On read, it returns the most recently written value, or noTest if never set since last initialization.
