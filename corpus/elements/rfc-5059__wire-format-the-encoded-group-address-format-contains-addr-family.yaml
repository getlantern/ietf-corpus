document: rfc-5059
kind: wire-format
summary: 'The Encoded-Group address format contains: Addr Family (1 byte), Encoding Type (1 byte), BIDIR bit [B], Reserved (5 bits), Admin Scope Zone bit [Z], Mask Len (1 byte), and Group multicast Address. The [Z] bit marks administratively scoped ranges; the [B] bit marks BIDIR-capable group ranges.'
section: "4"
topics:
