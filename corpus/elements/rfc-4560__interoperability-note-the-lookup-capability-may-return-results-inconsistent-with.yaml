document: rfc-4560
kind: interoperability-note
summary: The lookup capability may return results inconsistent with a pure DNS lookup, as it uses host resolver functions (getaddrinfo/gethostbyname/getnameinfo/gethostbyaddr) that can be influenced by local lookup tables or other sources, depending on managed node configuration.
