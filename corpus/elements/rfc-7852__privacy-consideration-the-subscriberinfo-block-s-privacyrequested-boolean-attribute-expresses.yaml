document: rfc-7852
kind: privacy-consideration
summary: The SubscriberInfo block's 'privacyRequested' boolean attribute expresses the subscriber's desire for privacy, mirroring a privacy flag in legacy emergency call systems. Interpretation is left to each jurisdiction per local regulatory requirements; the flag may affect display of data across any block.
section: 4.4.1
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
