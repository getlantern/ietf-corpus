document: rfc-2122
kind: design-rationale
summary: The parameter syntax requires each value to be labeled by an attribute (attribute=value), differing from the params syntax in RFC 1808, in order to allow unambiguous identification and transmission of additional data such as $USERDATA to the VEMMI service.
