document: rfc-9769
kind: security-consideration
summary: Clients and peers SHOULD NOT leak the receive timestamp in packets sent to other peers (e.g., as a reference timestamp) because off-path attackers could use it to craft a valid origin timestamp and inject a forged interleaved response.
section: "6"
rfc2119_level: SHOULD NOT
topics:
