document: rfc-6130
kind: normative-requirement
summary: Within every time interval of length REFRESH_INTERVAL on a given MANET interface, sent HELLO messages MUST collectively include all relevant information in the corresponding Link Set and Neighbor Information Base. The router MUST consider the full interval ending at the latest possible next HELLO transmission, not just past transmissions.
section: 4.3.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
