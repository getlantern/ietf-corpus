kind: protocol-element
summary: 'Three connection and transmission parameters govern Active Leasequery behavior: ACTIVE_LQ_RCV_TIMEOUT (120 s, requestor''s deadline for receiving any message), ACTIVE_LQ_SEND_TIMEOUT (120 s, server''s deadline for unblocking a write), and ACTIVE_LQ_IDLE_TIMEOUT (60 s, idle keepalive interval).'
