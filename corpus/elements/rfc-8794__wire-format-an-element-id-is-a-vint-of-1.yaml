document: rfc-8794
kind: wire-format
summary: An Element ID is a VINT of 1–4 octets by default (EBMLMaxIDLength may allow more). The VINT_DATA of an Element ID MUST NOT be all '0' bits or all '1' bits, and MUST be encoded at the shortest valid VINT length.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
