document: rfc-1541
kind: design-rationale
summary: The minimum options field size was extended to 312 octets, bringing the minimum DHCP message to 576 octets—the minimum IP datagram size a host must accept per Host Requirements RFCs. This ensures DHCP messages are always deliverable without fragmentation.
