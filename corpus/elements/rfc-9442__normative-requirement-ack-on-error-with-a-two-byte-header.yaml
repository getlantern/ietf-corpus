document: rfc-9442
kind: normative-requirement
summary: ACK-on-Error with a two-byte header MUST be used for medium- to large-sized packets that need to be sent reliably. The SCHC ACK REQ MUST NOT be used; instead the All-1 SCHC Fragment MUST be used to request a SCHC ACK.
section: 3.5.1.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
