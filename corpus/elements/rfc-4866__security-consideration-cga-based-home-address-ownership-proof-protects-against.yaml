document: rfc-4866
kind: security-consideration
summary: CGA-based home address ownership proof protects against impersonation even by on-path attackers, unlike the base Mobile IPv6 return routability procedure. An attacker can forge reachability proofs if on the path between the correspondent node and the home agent, but cannot forge a CGA-based signature without the mobile node's private key.
section: "6.1"
topics:
    - security
    - mobility
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
