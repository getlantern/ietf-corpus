document: rfc-7432
kind: interoperability-note
summary: Single-homing PEs that do not support multihoming SHOULD still process Ethernet A-D routes for fast convergence and aliasing/backup path purposes to interoperate correctly with multihoming PEs and benefit from faster convergence and load balancing.
