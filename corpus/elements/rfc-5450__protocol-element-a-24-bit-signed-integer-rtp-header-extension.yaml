document: rfc-5450
kind: protocol-element
summary: A 24-bit signed integer RTP header extension (toffset) carries the transmission offset O for each packet. When added to the RTP timestamp S1, it yields the effective transmission time T1 = S1 + O1. The offset is defined as the NTP-to-RTP-scale difference between the actual send time and the nominal send time derived from the most recent RTCP sender report.
section: "3"
topics:
    - rtp
    - realtime
