document: rfc-4575
kind: security-consideration
summary: Conference subscriptions reveal very sensitive information. A focus MUST use strong authentication, and the mechanism conveying conference information MUST ensure integrity and SHOULD ensure confidentiality. S/MIME (end-to-end) is RECOMMENDED; mutual TLS is the fallback.
section: "8.1"
topics:
    - sip
    - security
    - tls
