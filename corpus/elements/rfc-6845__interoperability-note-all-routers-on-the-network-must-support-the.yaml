document: rfc-6845
kind: interoperability-note
summary: All routers on the network must support the hybrid-broadcast-and-P2MP interface type for successful operation; otherwise the interface should be configured as a standard broadcast interface. Mixed configurations cause adjacencies to form but result in no traffic traversing certain router pairs, without causing loops or black-holing.
section: "5"
topics:
    - routing
