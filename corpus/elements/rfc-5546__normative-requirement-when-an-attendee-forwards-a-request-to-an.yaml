document: rfc-5546
kind: normative-requirement
summary: When an Attendee forwards a REQUEST to an uninvited CU, the forwarding Attendee MUST NOT make changes to the original message. The Organizer is not obligated to accept the uninvited CU and MAY send a CANCEL to indicate rejection.
section: 3.2.2.6
rfc2119_level: MUST NOT
topics:
    - email
