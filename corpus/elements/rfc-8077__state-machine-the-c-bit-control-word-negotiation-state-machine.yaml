document: rfc-8077
kind: state-machine
summary: 'The C-bit (control word) negotiation state machine: if both endpoints prefer the control word it is used (C=1); if either endpoint prefers not to use it, the result is no control word (C=0). A ''Wrong C-bit'' Label Withdraw followed by a C=0 Label Mapping resolves mismatches. The state machine can be restarted via Label Withdraw, Label Release, and Label Request when re-provisioned.'
section: "7.2"
