document: rfc-5258
kind: normative-requirement
summary: The server MUST NOT return any extended data item unless the client has expressed its ability to support extended LIST responses (e.g., by using an extended LIST command). The client MUST ignore all extended fields it does not recognize.
section: "3"
rfc2119_level: MUST NOT
topics:
