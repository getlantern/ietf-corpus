document: rfc-8130
kind: wire-format
summary: The 2400 bps MELPe frame is 54 bits packed into 7 octets (with 2 unused/reserved bits RSVA, RSVB). Bit B_01 is placed in the LSB of the first byte with all other bits in sequence; the seventh octet holds bits B_49 to B_54 in its LSBs.
