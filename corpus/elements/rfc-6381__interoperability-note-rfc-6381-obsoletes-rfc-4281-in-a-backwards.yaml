document: rfc-6381
kind: interoperability-note
summary: 'RFC 6381 obsoletes RFC 4281 in a backwards-compatible manner. Key changes include: added the ''profiles'' parameter; fixed a BNF error where the grammar did not correspond to examples or common usage; added AVC family sub-parameter definitions; added a security consideration for codec download triggers; and improved MIME type applicability clarifications.'
section: "8"
