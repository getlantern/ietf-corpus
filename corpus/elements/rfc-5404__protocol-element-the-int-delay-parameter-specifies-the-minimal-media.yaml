document: rfc-5404
kind: protocol-element
summary: The 'int-delay' parameter specifies the minimal media time delay in milliseconds needed to avoid underrun in the de-interleaving buffer before decoding starts; it is a per-SSRC stream property expressed as a comma-separated list of SSRC:delay pairs with allowed values 0–65535.
