document: rfc-8279
kind: protocol-element
summary: A Bit-Forwarding Router (BFR) is any router in a BIER domain that supports BIER forwarding. A multicast packet enters the domain at a Bit-Forwarding Ingress Router (BFIR), is replicated and forwarded by transit BFRs, and exits at one or more Bit-Forwarding Egress Routers (BFERs). A single BFR may simultaneously act as BFIR, transit BFR, and BFER for different packets.
section: "1"
topics:
