document: rfc-4342
kind: normative-requirement
summary: The ECN Nonce Echo in each Loss Interval MUST be reported as 0 if Lossless Length is 0, the receiver is ECN Incapable, or the lossless part contained no data packets. Non-data packet nonces MUST NOT contribute to the ECN Nonce Echo.
section: 8.6.1
rfc2119_level: MUST
topics:
    - congestion
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
