document: rfc-2728
kind: wire-format
summary: 'The NABTS packet is a 36-byte structure encoded onto one horizontal scan line: 2-byte clock sync, 1-byte byte sync, 3-byte Hamming-encoded packet address (4096 possible addresses), 1-byte Hamming-encoded continuity index (0–15), 1-byte Hamming-encoded packet structure flags, 26-byte data block, and 2- or 28-byte FEC suffix.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
