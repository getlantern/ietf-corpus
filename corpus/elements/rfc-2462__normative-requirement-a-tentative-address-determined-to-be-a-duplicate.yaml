document: rfc-2462
kind: normative-requirement
summary: A tentative address determined to be a duplicate MUST NOT be assigned to an interface, and the node SHOULD log a system management error. If the address is a link-local address formed from an interface identifier, the interface SHOULD be disabled.
section: 5.4.5
rfc2119_level: MUST NOT
topics:
