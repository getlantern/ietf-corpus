document: rfc-7555
kind: normative-requirement
summary: A Proxy LSR MUST be capable of filtering source addresses to validate initiators. If a configured filter rejects an address, an MPLS Echo Request MUST NOT be sent and the event SHOULD be logged.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - security
