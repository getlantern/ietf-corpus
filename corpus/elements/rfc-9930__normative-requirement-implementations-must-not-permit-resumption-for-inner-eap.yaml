document: rfc-9930
kind: normative-requirement
summary: Implementations MUST NOT permit resumption for inner EAP methods such as EAP-TLS. If resumption is needed, the peer should rely on the outer TLS session. This restriction also applies to all TLS-based EAP methods that tunnel other EAP methods, and updates RFC 9427.
section: 3.6.5
rfc2119_level: MUST NOT
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
