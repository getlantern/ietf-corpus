document: rfc-7919
kind: protocol-element
summary: The 'elliptic_curves(10)' extension is repurposed as the Supported Groups extension, and the NamedCurve enum is renamed to NamedGroup. Its semantics are expanded from elliptic curves only to any named group, including FFDHE groups. Clients MAY send this extension when either FFDHE or ECDHE cipher suites are listed in the ClientHello.
section: "2"
topics:
