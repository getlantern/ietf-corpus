document: rfc-1549
kind: normative-requirement
summary: Bit-synchronous PPP implementations MUST always respond to the Async-Control-Character-Map Configuration Option with an LCP Configure-Ack to enable interoperability with synchronous-to-asynchronous converters, even though acceptance does not imply the bit-synchronous implementation will perform octet mapping itself.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
