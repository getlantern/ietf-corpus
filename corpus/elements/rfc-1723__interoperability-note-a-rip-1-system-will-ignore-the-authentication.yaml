document: rfc-1723
kind: interoperability-note
summary: A RIP-1 system will ignore the authentication entry because its AFI (0xFFFF) belongs to an address family other than IP. Therefore, authentication alone will not prevent RIP-1 systems from receiving RIP-2 messages; multicasting must be used to achieve that effect.
section: "4.2"
topics:
    - routing
    - security
