document: rfc-4601
kind: state-machine
summary: The downstream per-interface (*,G), (S,G), and (S,G,rpt) Join/Prune state machines each have NoInfo, Join/Pruned, and Prune-Pending states with associated Prune-Pending Timer (PPT) and Join/Prune Expiry Timer (ET). The Prune-Pending state allows downstream routers to override a prune before it takes effect.
section: 4.5.2
topics:
    - multicast
    - routing
