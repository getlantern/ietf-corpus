document: rfc-9202
kind: normative-requirement
summary: If the access token carries a symmetric key, the access token MUST be encrypted using a COSE_Encrypt0 structure, and the authorization server MUST use the keying material shared with the resource server to encrypt the token.
section: 3.3.1
rfc2119_level: MUST
