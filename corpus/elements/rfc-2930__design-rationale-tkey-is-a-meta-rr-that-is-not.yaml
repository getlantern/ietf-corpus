document: rfc-2930
kind: design-rationale
summary: TKEY is a meta-RR that is not stored or cached in the DNS and does not appear in zone files. TKEY-established keys are associated with DNS servers or resolvers, not zones, so they cannot provide zone-based DNS data origin or denial authentication.
section: "3"
topics:
    - dns
    - security
