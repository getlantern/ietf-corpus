document: rfc-7182
kind: normative-requirement
summary: When calculating the ICV for an ICV Message TLV, the fields <msg-hop-limit> and <msg-hop-count> MUST both be assumed to have value 0, and all existing ICV Message TLVs MUST be removed before calculation and restored afterward.
section: "9.1"
rfc2119_level: MUST
topics:
