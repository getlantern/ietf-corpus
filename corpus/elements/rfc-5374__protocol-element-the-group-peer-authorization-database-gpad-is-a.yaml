document: rfc-5374
kind: protocol-element
summary: The Group Peer Authorization Database (GPAD) is a new database analogous to RFC 4301's PAD. It identifies authorized GCKS devices, specifies their authentication protocols and data, constrains traffic selectors a GCKS may assert, and constrains Group Identifiers a GCKS is authorized to serve.
section: 4.1.3
topics:
