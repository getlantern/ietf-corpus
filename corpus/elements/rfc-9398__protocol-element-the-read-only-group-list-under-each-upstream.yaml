document: rfc-9398
kind: protocol-element
summary: 'The read-only ''group'' list under each upstream interface tracks multicast group membership state, keyed by group-address (ipv4-multicast-group-address for IGMP, ipv6-multicast-group-address for MLD). Each group entry includes up-time (uint32, seconds), filter-mode (enumeration: include or exclude), and a source list.'
section: "3.1"
topics:
    - yang
    - multicast
