document: rfc-8840
kind: normative-requirement
summary: Retransmissions of unreliable provisional responses MUST cease on receipt of an INFO request carrying a 'trickle-ice' Info Package body, on receipt of any other in-dialog request from the Offerer, or on transmission of the Answer in a 2xx response.
section: 4.3.2
rfc2119_level: MUST
