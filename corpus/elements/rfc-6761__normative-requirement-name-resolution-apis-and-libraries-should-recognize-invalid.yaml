document: rfc-6761
kind: normative-requirement
summary: Name resolution APIs and libraries SHOULD recognize 'invalid.' names as special and SHOULD always return immediate negative responses. They SHOULD NOT send queries for 'invalid.' names to configured caching DNS servers.
section: "6.4"
rfc2119_level: SHOULD
topics:
    - dns
