document: rfc-4172
kind: normative-requirement
summary: iFCP gateways in address transparent mode SHALL NOT originate or accept frames without the TRP bit set to one in the iFCP flags field of the encapsulation header, and SHALL immediately terminate all iFCP sessions with any gateway from which such frames are received.
section: 4.5.2
rfc2119_level: MUST NOT
topics:
    - ip
