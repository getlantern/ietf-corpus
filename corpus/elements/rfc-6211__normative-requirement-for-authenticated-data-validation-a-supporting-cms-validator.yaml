document: rfc-6211
kind: normative-requirement
summary: For Authenticated Data validation, a supporting CMS validator MUST compare AuthenticatedData.macAlgorithm to the macAlgorithm field in the attribute; if they differ (modulo encoding), authentication MUST fail.
