document: rfc-4208
kind: protocol-element
summary: An edge-node is identified by either a single IP address representing its Node-ID or by one or more numbered TE links connecting it to core-nodes. Core-nodes are assumed ignorant of any edge-node addresses not used in signaling connections through the GMPLS core.
