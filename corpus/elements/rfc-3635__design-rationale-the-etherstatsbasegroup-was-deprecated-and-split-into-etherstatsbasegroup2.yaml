document: rfc-3635
kind: design-rationale
summary: The etherStatsBaseGroup was deprecated and split into etherStatsBaseGroup2 and etherStatsHalfDuplexGroup so that interfaces which can only operate in full-duplex mode (e.g., 10 Gb/s) are not required to implement half-duplex-only statistics such as collision counters.
