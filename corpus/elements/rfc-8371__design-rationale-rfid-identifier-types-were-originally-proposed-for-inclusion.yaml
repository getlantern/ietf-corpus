document: rfc-8371
kind: design-rationale
summary: RFID identifier types were originally proposed for inclusion in the main body of the specification but moved to a non-normative appendix due to insufficient support for allocating RFID types at the time, and because RFID-based mobile devices may create privacy exposures unless confidentiality is assured for signaling.
section: A
