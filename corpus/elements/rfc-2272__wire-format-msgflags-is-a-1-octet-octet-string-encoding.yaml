document: rfc-2272
kind: wire-format
summary: 'msgFlags is a 1-octet OCTET STRING encoding three bit fields: bit 0 (authFlag), bit 1 (privFlag), and bit 2 (reportableFlag). The combination authFlag=0/privFlag=1 is reserved and must NOT be used; authFlag=0/privFlag=0 means noAuthNoPriv, authFlag=1/privFlag=0 means authNoPriv, authFlag=1/privFlag=1 means authPriv.'
section: "6.4"
