document: rfc-6544
kind: normative-requirement
summary: For RTP-based media streams it is RECOMMENDED that UDP candidates are preferred over TCP candidates. The default candidate SHOULD NOT be a simultaneous-open candidate; for real-time streams the default candidates SHOULD be UDP-based when both UDP and TCP are offered.
section: "4.3"
rfc2119_level: RECOMMENDED
topics:
    - tcp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
