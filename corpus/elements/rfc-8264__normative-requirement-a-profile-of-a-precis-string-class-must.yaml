document: rfc-8264
kind: normative-requirement
summary: A profile of a PRECIS string class MUST define the width mapping, additional mapping (if any), case mapping, normalization, and directionality rules. A profile MAY restrict allowable code points further but MUST NOT add as valid any code points that are disallowed by the underlying PRECIS string class.
section: "5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
