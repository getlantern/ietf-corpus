kind: normative-requirement
summary: A non-authoritative SNMP engine must keep local notions of snmpEngineBoots, snmpEngineTime, and latestReceivedEngineTime for each authoritative SNMP engine with which it wishes to communicate, keyed by snmpEngineID.
