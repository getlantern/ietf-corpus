document: rfc-8200
kind: protocol-element
summary: 'The Option Type byte''s two highest-order bits specify the action when the processing node does not recognize the option: 00=skip, 01=discard packet, 10=discard and send ICMP Parameter Problem Code 2 regardless of destination, 11=discard and send ICMP Parameter Problem Code 2 only if destination is not multicast.'
