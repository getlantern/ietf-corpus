document: rfc-6595
kind: normative-requirement
summary: SAML20 GSS-API security contexts MUST have the mutual_state flag (GSS_C_MUTUAL_FLAG) set to TRUE. SAML does not support credential delegation; therefore, security contexts MUST have the deleg_state flag (GSS_C_DELEG_FLAG) set to FALSE.
section: "4"
rfc2119_level: MUST
topics:
    - security
