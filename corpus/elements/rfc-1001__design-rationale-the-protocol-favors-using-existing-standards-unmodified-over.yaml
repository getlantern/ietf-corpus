document: rfc-1001
kind: design-rationale
summary: The protocol favors using existing standards unmodified over inventing new protocols (section 4.2/4.11). When no existing protocol fully covers a needed function, the preferred approach is to make the smallest possible extension rather than define a wholly new protocol, in order to reduce standardization burden and maximize general Internet utility.
section: "4.2"
extracted_by: claude-sonnet-4-6
