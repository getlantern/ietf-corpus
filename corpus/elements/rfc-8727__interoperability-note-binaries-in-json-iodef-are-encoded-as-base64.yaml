document: rfc-8727
kind: interoperability-note
summary: Binaries in JSON IODEF are encoded as base64 (unlike XML IODEF which uses HEXBIN due to XML's inability to embed raw binaries). Signature, X509Data, and RawData use base64 encoding for JSON IODEF and binary representation for CBOR IODEF.
section: "3.2"
topics:
