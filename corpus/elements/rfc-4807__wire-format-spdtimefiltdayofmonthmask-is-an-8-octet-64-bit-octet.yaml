document: rfc-4807
kind: wire-format
summary: 'spdTimeFiltDayOfMonthMask is an 8-octet (64-bit) OCTET STRING: bits 0-30 represent days 1-31 counted from the start of the month; bits 31-61 represent days 1-31 counted from the end of the month; bits 62-63 MUST be zero. Bits for non-existent days (e.g., day 29-31 in February) are ignored.'
section: "6"
