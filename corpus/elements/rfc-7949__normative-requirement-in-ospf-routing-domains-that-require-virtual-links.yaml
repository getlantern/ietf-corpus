document: rfc-7949
kind: normative-requirement
summary: In OSPF routing domains that require virtual links, the IP transport MUST match the address family (IPv4 or IPv6). Specifically, if IPv4 transport is used for IPv6 address families, virtual links cannot be supported.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
