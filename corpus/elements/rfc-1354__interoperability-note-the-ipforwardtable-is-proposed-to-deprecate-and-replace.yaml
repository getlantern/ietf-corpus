document: rfc-1354
kind: interoperability-note
summary: The ipForwardTable is proposed to deprecate and replace the ipRouteTable defined in MIB-II (RFC 1213). Implementations of the older table should migrate to ipForwardTable to gain multipath and policy routing support.
