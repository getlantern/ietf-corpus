document: rfc-7798
kind: normative-requirement
summary: 'Receivers MUST support all three transmission modes: SRST, MRST, and MRMT. When tx-mode equals ''SRST'', SRST MUST be used; when ''MRST'', MRST MUST be used; otherwise MRMT MUST be used.'
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
