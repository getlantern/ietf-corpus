document: rfc-4954
kind: security-consideration
summary: This extension is not a replacement for end-to-end message signature and encryption systems such as S/MIME or PGP. It authenticates message submission to the next hop within a trusted enclave, not authorship of message content; it protects the envelope, not the body.
