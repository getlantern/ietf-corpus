document: rfc-5860
kind: normative-requirement
summary: OAM interoperability between distinct domains (IP-capable and non-IP-capable) is REQUIRED. When MPLS-TP is run with IP routing and forwarding, it MUST be possible to operate existing IP/MPLS and PW OAM protocols (e.g., LSP-Ping, MPLS-BFD, VCCV, VCCV-BFD).
section: 2.1.5
rfc2119_level: REQUIRED
topics:
