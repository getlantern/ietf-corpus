document: rfc-6438
kind: normative-requirement
summary: The sending TEP MAY perform stateless flow label assignment by using a suitable 20-bit hash of the inner IP header's 2-tuple or 5-tuple as the flow label value. If the inner packet is IPv6, its flow label may also be included in this hash.
section: "3"
rfc2119_level: MAY
topics:
    - ip
