document: rfc-6572
kind: protocol-element
summary: MIP6-Feature-Vector (RADIUS Type 124, reusing Diameter AVP Code space) carries a 64-bit capability flags field. This document adds IP4_TRANSPORT_SUPPORTED (0x0000800000000000) and IP4_HOA_ONLY_SUPPORTED (0x0001000000000000) to the existing PMIPv6 capability bits from RFC 5779, enabling direct capability negotiation between MAG/LMA and AAA.
section: "4.1"
topics:
    - mobility
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
