document: rfc-5324
kind: wire-format
summary: T11FcSpiIndex is an Unsigned32 (0..4294967295) representing the Security Parameter Index (SPI) carried in the SPI field of ESP_Header-protected FC-2 frames or in the SAID field of CT_Authentication-protected CT_IUs. It uniquely identifies the Security Association on which a frame is being transmitted.
section: "6.1"
topics:
    - security
