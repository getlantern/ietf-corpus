document: rfc-4951
kind: normative-requirement
summary: Any control packet received on the recovered tunnel before control channel reset MUST be silently discarded. An endpoint MUST prevent the establishment of new sessions until non-established sessions have been silently cleared (Step I of Section 3.3).
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
