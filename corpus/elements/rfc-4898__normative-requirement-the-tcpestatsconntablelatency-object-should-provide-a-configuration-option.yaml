document: rfc-4898
kind: normative-requirement
summary: The tcpEStatsConnTableLatency object SHOULD provide a configuration option to allow customization of the row-retention duration after a connection closes. A value of 0 causes entries to be removed as soon as the connection enters the closed state.
section: "4"
rfc2119_level: SHOULD
topics:
