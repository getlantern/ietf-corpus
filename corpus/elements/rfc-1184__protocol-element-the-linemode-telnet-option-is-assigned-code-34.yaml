document: rfc-1184
kind: protocol-element
summary: 'The LINEMODE Telnet option is assigned code 34 and defines three suboptions: MODE (1), FORWARDMASK (2), and SLC (3). It enables client-side line editing, reducing network traffic to a few packets per command line rather than per character.'
section: "1"
