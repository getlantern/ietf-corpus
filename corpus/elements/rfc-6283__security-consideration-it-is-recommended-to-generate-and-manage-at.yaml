document: rfc-6283
kind: security-consideration
summary: It is RECOMMENDED to generate and manage at least two redundant Evidence Records for a single data object, with redundant Evidence Records using different hash algorithms and different TSAs using different cryptographic algorithms for Time-Stamp Tokens, to mitigate the risk of algorithm weakening.
section: "9.2"
topics:
    - crypto
    - security
