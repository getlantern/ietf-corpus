document: rfc-7902
kind: protocol-element
summary: A new bit flag called the 'Extension' flag is defined at bit position 1 (left to right) in the one-octet 'Flags' field of the 'PMSI Tunnel' attribute. When set, it signals that an 'Additional PMSI Tunnel Attribute Flags' Extended Community is also present in the same BGP UPDATE.
section: "2"
