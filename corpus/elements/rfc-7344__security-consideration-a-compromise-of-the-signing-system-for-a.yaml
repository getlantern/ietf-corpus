document: rfc-7344
kind: security-consideration
summary: A compromise of the signing system for a Child zone could allow an attacker to publish malicious CDS/CDNSKEY records, causing the Parent to update DS records in the attacker's favor and extending the effective duration of the attack. A hold-down delay (as in RFC 5011) can limit this window.
section: "9"
topics:
    - dns
    - security
