kind: interoperability-note
summary: The Group Domain of Interpretation (GDOI) protocol (RFC 6407), which is based on IKEv1, defines support for Multicast Group SAs. For IKEv2, equivalent Group SA and multicast support (G-IKEv2) was in progress at time of publication.
