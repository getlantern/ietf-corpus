document: rfc-7643
kind: design-rationale
summary: SCIM's schema is attribute-based rather than document-centric (as in XML Schema). Each attribute has independent type, mutability, cardinality, and returnability; validation is always performed by the receiver in the context of a protocol request, allowing service providers to evaluate individual attributes against their characteristics.
section: "2"
