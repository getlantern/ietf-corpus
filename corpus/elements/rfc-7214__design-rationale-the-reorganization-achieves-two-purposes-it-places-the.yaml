document: rfc-7214
kind: design-rationale
summary: 'The reorganization achieves two purposes: it places the G-ACh registries in their natural location within the MPLS namespace, and it provides a single consolidated view of all G-ACh registries. This simplifies future assignments and avoids potential conflicts that arose from parameters being scattered across unrelated registries.'
