document: rfc-7614
kind: interoperability-note
summary: If a REFER with 'explicitsub' or 'nosub' is sent to an element that does not support the extension, a 420 (Bad Extension) response is returned; the UA can then retry the request without the extension, falling back to RFC 3515 implicit subscription behavior.
section: "4.2"
topics:
    - sip
    - realtime
