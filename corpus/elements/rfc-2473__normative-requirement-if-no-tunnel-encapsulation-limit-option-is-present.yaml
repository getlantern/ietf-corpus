document: rfc-2473
kind: normative-requirement
summary: If no Tunnel Encapsulation Limit option is present in the entering packet and an encapsulation limit is configured for the tunnel, the entry-point must include a TEL option with the configured limit value. If no limit is configured, no TEL option is included.
section: 4.1.1
rfc2119_level: MUST
topics:
    - ip
    - vpn
