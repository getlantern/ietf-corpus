summary: 'The S2L_SUB_LSP object carries the destination address of an individual leaf: 4 octets for IPv4 (C-Type 1), 16 octets for IPv6 (C-Type 2). It uniquely identifies each S2L sub-LSP within the context of a P2MP LSP alongside the SESSION and SENDER_TEMPLATE.'
