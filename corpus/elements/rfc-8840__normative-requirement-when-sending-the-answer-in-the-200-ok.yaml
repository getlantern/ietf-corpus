document: rfc-8840
kind: normative-requirement
summary: When sending the Answer in the 200 OK response to the INVITE, the Answerer MUST repeat exactly the same Answer that was previously sent in the unreliable provisional response. The Offerer MUST ignore the candidate information in that 200 OK response.
section: 4.3.2
rfc2119_level: MUST
topics:
