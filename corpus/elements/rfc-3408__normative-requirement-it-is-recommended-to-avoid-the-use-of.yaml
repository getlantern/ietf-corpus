document: rfc-3408
kind: normative-requirement
summary: It is RECOMMENDED to avoid the use of interspersed feedback packets to carry ACK information in R-mode, because interspersed feedback packets interrupt RTP SN sequencing and temporarily disable the sending of NHPs.
section: "4"
rfc2119_level: RECOMMENDED
