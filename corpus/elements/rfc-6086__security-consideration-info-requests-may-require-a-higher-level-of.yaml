document: rfc-6086
kind: security-consideration
summary: INFO requests may require a higher level of protection than the underlying SIP dialog signaling because they carry application-level data. Individual Info Package specifications must enumerate their own security requirements. The Info Package framework itself provides the tools for negotiating and enforcing package-specific security.
section: "13"
topics:
