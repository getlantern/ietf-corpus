document: rfc-6475
kind: interoperability-note
summary: If the total number of octets in pmip6MagProxyCOA or pmip6LmaLMAA exceeds 113, or pmip6MagHomeNetworkPrefix / pmip6LmaHomeNetworkPrefix exceeds 111, the resulting OIDs will have more than 128 sub-identifiers and cannot be accessed using SNMPv1, SNMPv2c, or SNMPv3.
section: "5.2"
topics:
