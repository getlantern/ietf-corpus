document: rfc-7264
kind: interoperability-note
summary: RPR is not intended to replace SRR; it is designed to be used alongside SRR. The two modes are expected to coexist, with peers selecting the appropriate mode based on topology and configuration, and always falling back to SRR when RPR fails.
section: "4.2"
topics:
    - routing
