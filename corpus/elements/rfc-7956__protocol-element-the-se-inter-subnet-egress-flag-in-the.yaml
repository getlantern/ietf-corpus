document: rfc-7956
kind: protocol-element
summary: The SE (Inter-Subnet Egress) flag in the NickFlags APPsub-TLV allows an edge RBridge with multiple nicknames to designate one specific nickname for inter-subnet traffic egress. If no nickname is designated, the ingress RBridge may use any nickname owned by the egress RBridge.
section: "7.2"
topics:
    - routing
