summary: 'Three typedefs are defined: ''vn-id'' (non-empty string, VN identifier), ''ap-id'' (non-empty string, AP or VNAP identifier), and ''vnm-id'' (non-empty string, VN-member identifier). A fourth typedef ''vn-compute-status'' aliases ''te-types:te-common-status'', with only ''up'' and ''down'' considered meaningful; all others treated as unknown.'
