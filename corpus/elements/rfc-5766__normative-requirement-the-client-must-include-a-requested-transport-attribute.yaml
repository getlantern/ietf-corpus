document: rfc-5766
kind: normative-requirement
summary: The client MUST include a REQUESTED-TRANSPORT attribute in every Allocate request specifying the transport protocol between server and peers. In this specification the value MUST be UDP (protocol number 17).
section: "6.1"
rfc2119_level: MUST
topics:
    - nat
    - udp
