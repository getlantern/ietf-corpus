document: rfc-8610
kind: protocol-element
summary: The '.cbor' control on a byte string asserts that the string carries a single CBOR-encoded data item matching the right-hand-side type. The '.cborseq' variant asserts a CBOR sequence; when treated as an array, it must match the right-hand-side type.
section: 3.8.4
topics:
    - cbor
