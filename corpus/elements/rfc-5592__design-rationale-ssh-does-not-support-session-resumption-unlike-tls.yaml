document: rfc-5592
kind: design-rationale
summary: SSH does not support session resumption (unlike TLS), making short-lived sessions computationally expensive due to CPU-intensive session-key establishment. SNMP applications SHOULD therefore keep SSH sessions for longer time periods to amortize setup costs.
section: "8"
topics:
    - snmp
