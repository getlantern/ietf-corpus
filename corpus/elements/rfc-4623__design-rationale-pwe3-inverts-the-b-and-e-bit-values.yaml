document: rfc-4623
kind: design-rationale
summary: 'PWE3 inverts the B and E bit values from RFC 1990: in PWE3, 00 means complete/unfragmented (first=0, last=0), whereas RFC 1990 uses 11. This allows implementations that only support complete frames to leave B and E bits at their default zero value without any special handling.'
section: A
