document: rfc-9655
kind: normative-requirement
summary: When a packet with multiple Nil FEC sub-TLVs reaches the egress (stack-R is empty or bottom-of-stack label is processed), all Nil FEC sub-TLVs MUST be removed and the Egress TLV MUST be validated.
