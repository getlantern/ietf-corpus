document: rfc-5801
kind: security-consideration
summary: GS2 does not protect against downgrade attacks on channel binding types; negotiation of channel binding type was intentionally left out of scope. Passive attackers may recover channel binding data if neither the external channel nor the GSS-API mechanism provides confidentiality protection for it.
section: "16"
topics:
