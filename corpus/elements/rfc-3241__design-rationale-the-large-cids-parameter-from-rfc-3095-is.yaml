document: rfc-3241
kind: design-rationale
summary: The LARGE_CIDS parameter from RFC 3095 is not used over PPP; instead, the PPP Data Link Layer Protocol field value (0x0003 vs. 0x0005) determines CID size, allowing a sender to switch CID format packet-by-packet.
