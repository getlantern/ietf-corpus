document: rfc-5898
kind: normative-requirement
summary: During re-INVITEs or UPDATEs with connectivity preconditions, both user agents SHOULD continue using old session parameters until all mandatory preconditions are met, at which point they can begin using the new parameters.
section: "3.5"
rfc2119_level: SHOULD
