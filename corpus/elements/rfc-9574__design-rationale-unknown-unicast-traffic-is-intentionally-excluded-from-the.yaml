document: rfc-9574
kind: design-rationale
summary: Unknown unicast traffic is intentionally excluded from the Assisted Replication path and MUST follow the same forwarding path as known unicast traffic. This design choice prevents packet reordering that would otherwise arise if BM and unicast traffic took different paths through the network.
section: "1"
topics:
    - mpls
    - routing
