document: rfc-2126
kind: protocol-element
summary: Class 2 Non-blocking Expedited Data service requires the sender to transmit the ED TPDU on both the Normal Data and Expedited Data TCP connections; the receiver counts ED TPDUs on each connection and delivers only the one from the connection with the higher count, preventing Normal Data channel blocking.
section: 4.2.2
topics:
    - tcp
