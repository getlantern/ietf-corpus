document: rfc-9747
kind: design-rationale
summary: Unaffiliated BFD Echo was introduced to allow rapid forwarding-path failure detection in scenarios where the remote device (e.g., IoT devices, servers running VMs) cannot support the full BFD protocol. Only the local device needs BFD; the remote device need only perform basic IP forwarding to loop packets back.
section: "1"
topics:
