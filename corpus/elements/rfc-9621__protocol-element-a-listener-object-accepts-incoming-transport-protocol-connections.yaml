kind: protocol-element
summary: A Listener object accepts incoming transport protocol connections from Remote Endpoints and generates corresponding Connection objects. It is created from a Preconnection and by default registers with multiple paths, protocols, and Local Endpoints unless constrained by Selection Properties.
