document: rfc-9374
kind: security-consideration
summary: The DET Registry blocks attempts to take over or hijack a DET, but does not prevent impersonation of a known DET by a rogue. Mitigation requires observers to use DNS to retrieve the HI for the DET; use of DNSSEC by DET registries is recommended. HDA-signed endorsements of the UA's HHIT provide an additional mitigation.
section: "9"
topics:
    - security
    - dns
    - crypto
