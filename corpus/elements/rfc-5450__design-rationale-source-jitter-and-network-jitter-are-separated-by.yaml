document: rfc-5450
kind: design-rationale
summary: 'Source jitter and network jitter are separated by defining the IJ RTCP packet: the standard RFC 3550 receiver report jitter includes source-introduced jitter (from traffic smoothing or reordering), while the IJ packet allows reporting only the network-induced component.'
