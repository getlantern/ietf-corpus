kind: protocol-element
summary: 'CDDL predefines primitive type names directly mapped to CBOR major types: bool (MT7/20-21), uint (MT0), nint (MT1), int, float16 (MT7/25), float32 (MT7/26), float64 (MT7/27), float, bstr/bytes (MT2), and tstr/text (MT3). Additional tagged types (tdate, bigint, regexp, etc.) are defined in the standard prelude.'
