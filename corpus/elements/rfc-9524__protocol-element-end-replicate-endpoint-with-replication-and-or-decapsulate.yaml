document: rfc-9524
kind: protocol-element
summary: End.Replicate ('Endpoint with replication and/or decapsulate') is the SRv6 endpoint behavior defined by this document. When a packet arrives with a local Replication-SID as DA, the node replicates the packet per the RS by reusing the outer IPv6 header and writing the downstream Replication-SID into the outer IPv6 DA, then submits each copy to the egress IPv6 FIB for forwarding.
section: 2.2.1
topics:
    - routing
    - ip
