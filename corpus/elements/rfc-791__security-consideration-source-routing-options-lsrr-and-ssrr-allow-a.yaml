document: rfc-791
kind: security-consideration
summary: Source Routing options (LSRR and SSRR) allow a datagram originator to dictate the forwarding path; SSRR requires each hop to be on a directly connected network, while LSRR permits intermediate hops. These features can be used to bypass routing controls or reach otherwise-inaccessible hosts.
section: "3.1"
topics:
    - ip
    - security
