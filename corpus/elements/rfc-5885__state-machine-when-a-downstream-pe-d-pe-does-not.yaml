document: rfc-5885
kind: state-machine
summary: When a downstream PE (D-PE) does not receive BFD Control messages within the Detection Time (Detect Mult * negotiated interval), it declares the PW receive direction down (PW receive defect state), signals State=Down with Diagnostic 1; the upstream PE (U-PE) then sets State=Down with Diagnostic 3 and enters PW transmit defect state.
section: "3.1"
