document: rfc-7711
kind: security-consideration
summary: Hash function agility is critical for POSH security. Because POSH verification material is relatively short-lived compared to long-lived PKIX certificates, operators are advised to swap out POSH documents promptly if hash functions are found subject to practical attacks (RFC 4270).
section: "10"
topics:
    - crypto
    - pkix
    - security
