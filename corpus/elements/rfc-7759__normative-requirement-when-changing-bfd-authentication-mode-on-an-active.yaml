document: rfc-7759
kind: normative-requirement
summary: When changing BFD authentication mode on an active (Up state) session, the sender SHOULD ensure both old and new authentication modes are used concurrently until the peer's transition to the new mode is confirmed, preventing session disruption during re-keying.
section: 2.2.4
rfc2119_level: SHOULD
topics:
