document: rfc-5816
kind: protocol-element
summary: The actual identification of the TSA that signed a time-stamp token always occurs through the certificate identifier — either ESSCertID inside SigningCertificate or ESSCertIDv2 inside SigningCertificateV2 — as part of signerInfo, not merely through the tsa hint field.
