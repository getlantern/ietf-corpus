summary: The marsClientRetranDelayTimer and marsClientRdmMulReqAddRetrTimer must each be set between 5 and 10 seconds inclusive; the marsClientJoinLeaveRetrInterval minimum is 5 seconds with a recommended default of 10 seconds, and marsClientJoinLeaveRetrLimit maximum is 5.
