kind: protocol-element
summary: 'Four REPORT types are defined: DAV:acl-principal-prop-set (retrieve properties of principals named in a resource''s ACL), DAV:principal-match (find resources matching the current principal), DAV:principal-property-search (substring search on principal properties), and DAV:principal-search-property-set (list searchable properties).'
