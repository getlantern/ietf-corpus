document: rfc-3868
kind: security-consideration
summary: SUA transports SS7 SCCP-user signalling (including sensitive MAP/CAP messages) over IP. The RFC recommends use of IPsec to provide authentication, integrity, and confidentiality for SUA associations; without such protection, an attacker with IP network access could inject or intercept signalling messages.
section: "6"
topics:
    - security
    - ipsec
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
