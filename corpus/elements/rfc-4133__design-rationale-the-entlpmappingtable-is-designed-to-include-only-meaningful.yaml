document: rfc-4133
kind: design-rationale
summary: The entLPMappingTable is designed to include only meaningful, non-redundant mappings. Agents should identify only the most appropriate physical component closest to the root of a containment tree, avoiding redundant child-level mappings that are already derivable from the entPhysicalContainedIn hierarchy.
