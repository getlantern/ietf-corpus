document: rfc-3280
kind: normative-requirement
summary: Conforming implementations generating new certificates with electronic mail addresses MUST use rfc822Name in the subjectAltName extension. Simultaneous inclusion of an EmailAddress attribute in the subject DN for legacy compatibility is deprecated but permitted.
section: 4.1.2.6
rfc2119_level: MUST
topics:
