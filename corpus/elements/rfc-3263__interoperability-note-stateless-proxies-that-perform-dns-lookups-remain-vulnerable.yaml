document: rfc-3263
kind: interoperability-note
summary: Stateless proxies that perform DNS lookups remain vulnerable to delivering retransmissions to different servers if DNS TTLs expire mid-transaction and entries change. Network implementors should avoid stateless proxies with DNS access if this failure mode is critical.
section: "4.4"
topics:
    - sip
    - dns
