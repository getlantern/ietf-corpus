document: rfc-8275
kind: normative-requirement
summary: On a server that supports ACL attributes, if an object inherits any ACEs from its parent directory, mu_mode SHOULD be used and mu_umask ignored, allowing the inheritable ACEs to take full effect.
section: "5"
rfc2119_level: SHOULD
topics:
