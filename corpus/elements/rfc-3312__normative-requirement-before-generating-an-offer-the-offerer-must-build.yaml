document: rfc-3312
kind: normative-requirement
summary: Before generating an offer, the offerer MUST build a transaction status table containing current and desired status for each media stream. If the strength-tag is 'mandatory', session establishment MUST NOT continue unless resources are reserved.
section: "5.1"
rfc2119_level: MUST
