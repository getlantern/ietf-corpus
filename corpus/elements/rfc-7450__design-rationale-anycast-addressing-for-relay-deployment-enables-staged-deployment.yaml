document: rfc-7450
kind: design-rationale
summary: Anycast addressing for relay deployment enables staged deployment, scaling, and hot-swapping without gateway reconfiguration. Relays can be added or removed at any time; the discovery process always routes discovery messages to the topologically nearest operational relay.
