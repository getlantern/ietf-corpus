document: rfc-5104
kind: normative-requirement
summary: A FIR sender shall not have more than one outstanding FIR (with a distinct request sequence number) per media sender at any time. When a new FIR is required after a decoder refresh point is received, the sequence number must be incremented.
section: 3.5.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
