document: rfc-2616
kind: privacy-consideration
summary: Accept headers (Accept-Language, Accept-Charset, Accept-Encoding) expose user preferences and can be used to fingerprint users across sites. Revealing language preferences may disclose nationality or locale. User agents SHOULD allow users to disable sending these headers.
section: 15.1.4
topics:
    - http
    - privacy
