document: rfc-2279
kind: protocol-element
summary: US-ASCII characters (U+0000–U+007F) are encoded as single octets identical to their ASCII values (00–7F). Octet values in the range 00–7F can only appear as encodings of US-ASCII characters and never as continuation or leading bytes of multi-byte sequences, ensuring full backward compatibility with ASCII-transparent software.
section: "2"
