document: rfc-4805
kind: normative-requirement
summary: An ANSI T1.231-compliant implementation must not increment any counters other than UAS—even temporarily—as a result of anything that happens during the 10-second period leading to unavailable state. It must pass one-second statistics through a 10-second delay line prior to updating any counters.
section: 3.4.3
rfc2119_level: MUST NOT
topics:
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
