document: rfc-4343
kind: protocol-element
summary: 'Original DNS wire-encoded labels have two types: ASCII labels (0 to 63 octets in length) and indirect (compression) labels consisting of an offset pointer to a name elsewhere in the DNS message. The ASCII label of length zero is reserved for the root node.'
