document: rfc-3144
kind: protocol-element
summary: interfaceTopNTimeRemaining triggers a new collection when set to a non-zero value by the management station; existing entries become inaccessible during collection. When it decrements to zero the report becomes accessible. Setting it to zero while a report is running aborts the collection without creating entries.
section: "6"
