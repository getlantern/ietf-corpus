document: rfc-8435
kind: interoperability-note
summary: When a client cannot use any configured ffdv_version/ffdv_minorversion combination for a storage device, it reports NFS4ERR_MINOR_VERS_MISMATCH via LAYOUTRETURN or LAYOUTERROR using ff_ioerr4 to identify the specific problematic device, then may retry GETDEVICEINFO or fall back to I/O through the MDS.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
