document: rfc-5844
kind: protocol-element
summary: For IPv4 transport, the Mobility Header is carried inside an IPv4 packet with a UDP header (IPv4-UDP-MH), using a dedicated UDP port number for PMIPv6 signaling over IPv4. This allows MAG and LMA to exchange PMIPv6 messages without IPv6 connectivity.
section: "4"
topics:
