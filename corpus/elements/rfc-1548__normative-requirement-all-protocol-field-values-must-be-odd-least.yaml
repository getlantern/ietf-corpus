document: rfc-1548
kind: normative-requirement
summary: All Protocol field values MUST be odd (least significant bit of the least significant octet MUST equal 1) and MUST be assigned such that the least significant bit of the most significant octet equals 0, consistent with ISO 3309 extension mechanism. Frames not complying MUST be treated as having an unrecognized Protocol.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
