document: rfc-9073
kind: security-consideration
summary: The STRUCTURED-DATA property can be abused to attack storage (via extremely large values) or processing time (via recurring events with many overrides combined with rapid add/update/delete). Agents should set and enforce reasonable limits on storage size and instance count.
section: "9.2"
topics:
    - security
