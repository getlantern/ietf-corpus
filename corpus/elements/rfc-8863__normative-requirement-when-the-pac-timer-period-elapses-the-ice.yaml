document: rfc-8863
kind: normative-requirement
summary: When the PAC timer period elapses, the ICE agent MUST resume typical ICE processing, including setting the state of any checklists to Failed if they have no pairs left to check and handling consequences as indicated in RFC 8445 Section 8.1.2.
section: "4"
rfc2119_level: MUST
topics:
