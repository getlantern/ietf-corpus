document: rfc-8010
kind: wire-format
summary: 'An additional-value (for multi-valued attributes) is encoded as: value-tag (1 byte), name-length set to 0x0000 (2 bytes), value-length (2 bytes), and value (variable bytes). A name-length of 0 distinguishes additional-values from attribute-with-one-value fields.'
section: 3.1.5
topics:
