document: rfc-8395
kind: wire-format
summary: 'The Control Flags Bit Vector is an 8-bit field with layout: Z|Z|Z|Z|T|R|C|S, where Z bits MUST be zero. T is bit 4 (send flow label), R is bit 5 (receive flow label), C and S are defined in RFC 4761.'
