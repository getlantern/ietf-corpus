document: rfc-8928
kind: normative-requirement
summary: A node in possession of the necessary cryptographic primitives SHOULD use Crypto-ID by default as ROVR in its registrations. A minimal size of 128 bits for the Crypto-ID is RECOMMENDED unless backward compatibility with RFC 8505 is needed (in which case at least 64 bits).
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
