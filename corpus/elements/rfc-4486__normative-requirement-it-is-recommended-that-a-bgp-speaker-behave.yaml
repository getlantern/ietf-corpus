document: rfc-4486
kind: normative-requirement
summary: It is RECOMMENDED that a BGP speaker behave as though the DampPeerOscillations attribute were true when re-trying a BGP connection after receiving a Cease NOTIFICATION with subcodes 'Administrative Shutdown', 'Peer De-configured', 'Connection Rejected', or 'Out of Resources'.
section: "4"
rfc2119_level: RECOMMENDED
topics:
