document: rfc-2115
kind: protocol-element
summary: frErrTable, indexed by frErrIfIndex, captures the most recent error per interface including type, raw error data (up to 1600 octets of the erroneous frame starting with the Q.922 address), timestamp, fault count, and time of last fault. frErrFaults counts how many times the interface has gone down since initialization.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
