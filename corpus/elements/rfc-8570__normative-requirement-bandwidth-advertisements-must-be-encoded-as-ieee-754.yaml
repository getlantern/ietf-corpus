document: rfc-8570
kind: normative-requirement
summary: Bandwidth advertisements MUST be encoded as IEEE 754 floating-point values. Delay and delay-variation advertisements MUST be encoded as integer values. Delay MUST be in microseconds, packet loss MUST be a percentage of packets sent, and bandwidth MUST be in bytes per second.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
