document: rfc-2797
kind: normative-requirement
summary: For CRMF request bodies within a Full Enrollment Request, each CRMF message MUST include both subject and publicKey fields; the CMC control MUST override any CRMF control; regInfo field MUST NOT be used; and POPOSigningKeyInput MUST NOT be used when subject and publicKeyValues are present.
section: 3.3.2
rfc2119_level: MUST
topics:
    - pkix
    - security
