document: rfc-7308
kind: normative-requirement
summary: An implementation SHOULD treat desired but unadvertised EAG bits as if they were set to 0, so that a node requiring a specific EAG bit will not use a link that does not advertise that bit.
section: 2.3.2
rfc2119_level: SHOULD
