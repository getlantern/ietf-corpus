document: rfc-3023
kind: design-rationale
summary: The charset parameter is authoritative for text/xml (and overrides any internal XML encoding declaration) because some MIME engines transcode text/* bodies without examining content, because text/xml must fall back gracefully to text/plain behavior, and because RFC 2130 recommends the 'charset' parameter as the standard specification scheme.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
