document: rfc-8393
kind: interoperability-note
summary: SFC-aware nodes at the end of an SFP that perform 'pop and forward' processing must not forward zero-length payload packets; packets with Next Protocol 'None' are expected to have zero payload length after NSH removal and must not be forwarded.
section: "5"
