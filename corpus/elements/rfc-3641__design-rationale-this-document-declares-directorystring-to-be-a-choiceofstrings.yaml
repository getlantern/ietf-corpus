document: rfc-3641
kind: design-rationale
summary: This document declares DirectoryString{} to be a ChoiceOfStrings type because the chosen alternative within a DirectoryString carries no semantic significance. This enables more compact encoding since all string alternatives ultimately produce a UTF-8 string.
section: "3.3"
