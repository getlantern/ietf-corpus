document: rfc-9168
kind: normative-requirement
summary: When modifying a Flow Specification, all Flow Specification TLVs for the intended flow MUST be included in the FLOWSPEC object. The FS-ID MUST be retained from the previous description, and the same Speaker Entity Identifier TLV MUST be used.
section: "8.3"
rfc2119_level: MUST
topics:
