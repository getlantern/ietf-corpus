document: rfc-6035
kind: design-rationale
summary: SUBSCRIBE/NOTIFY is preferred over PUBLISH because PUBLISH requires the REPORTER to know the COLLECTOR address in advance, whereas SUBSCRIBE allows the COLLECTOR to establish the relationship, which better suits managed network deployments and avoids misconfiguration risks on the public Internet.
section: "3.2"
topics:
    - sip
    - voip
