document: rfc-9126
kind: design-rationale
summary: PAR allows authenticated clients to specify 'redirect_uri' values not previously registered, since the authorization server has verified client identity before the authorization process starts. This relaxes the exact matching requirement of the OAuth security BCP while maintaining security through client authentication.
section: "2.4"
topics:
    - oauth
    - security
