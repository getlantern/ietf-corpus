document: rfc-6368
kind: security-consideration
summary: 'Implementations must apply input validation and resource management to the ATTR_SET attribute, as its content is derived from external (CE) systems. From the VPN customer perspective, the security profile is unchanged: the customer must still trust the service provider to deliver correct routing information, even though iBGP sessions allow additional attributes such as LOCAL_PREF.'
section: "9"
topics:
