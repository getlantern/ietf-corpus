document: rfc-8912
kind: protocol-element
summary: Tmax is a loss threshold waiting time used to distinguish long-delayed packets from lost packets. Its value is 3.0 seconds for UDP/PDV/ICMP/TCP metrics and 5.0 seconds for DNS metrics, expressed as decimal64 with fraction digits=4 (0.1 ms resolution), with lossless conversion to/from the 32-bit NTP timestamp.
