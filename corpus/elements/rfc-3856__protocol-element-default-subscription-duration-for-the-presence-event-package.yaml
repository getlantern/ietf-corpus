document: rfc-3856
kind: protocol-element
summary: Default subscription duration for the presence event package is 3600 seconds (one hour), reflecting the human-driven frequency of presence state changes (on the order of seconds to hours). Subscribers MAY specify an alternate expiration in the Expires header field.
section: "6.4"
topics:
