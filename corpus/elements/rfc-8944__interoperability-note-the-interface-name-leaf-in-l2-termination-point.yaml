document: rfc-8944
kind: interoperability-note
summary: The 'interface-name' leaf in l2-termination-point-attributes is explicitly noted as not usable as an interface-ref (RFC 8343 type), because interface-ref references interfaces within a single node's datastore, not across a network topology. The field is a plain string that may correspond to an interface name but is not a formal cross-node reference.
section: "4"
topics:
    - yang
    - netconf
