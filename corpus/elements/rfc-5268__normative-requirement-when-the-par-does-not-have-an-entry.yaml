document: rfc-5268
kind: normative-requirement
summary: When the PAR does not have an entry for the new access point, it MUST respond indicating the AP is unknown and the MN MUST stop fast handover protocol operations on the current link. The MN MAY send an FBU from the new link.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
