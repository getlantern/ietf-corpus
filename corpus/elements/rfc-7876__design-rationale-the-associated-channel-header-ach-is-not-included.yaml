document: rfc-7876
kind: design-rationale
summary: The Associated Channel Header (ACH) is not included in the UDP-encapsulated Response because the correct Query-Response binding is already established through the UDP port and the session identifier carried in the RFC 6374 message, making the ACH redundant.
