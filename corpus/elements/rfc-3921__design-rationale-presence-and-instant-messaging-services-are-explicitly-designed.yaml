document: rfc-3921
kind: design-rationale
summary: 'Presence and instant messaging services are explicitly designed to be separable: a deployment may offer only presence, only IM, or both combined. Although XMPP satisfies RFC 2779 requirements, it was not designed with that specification in mind — the base protocol evolved within the Jabber open-source community before RFC 2779 was written.'
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
