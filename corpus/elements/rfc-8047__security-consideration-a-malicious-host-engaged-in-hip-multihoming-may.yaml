document: rfc-8047
kind: security-consideration
summary: A malicious host engaged in HIP multihoming may attempt resource-exhaustion attacks by sending excessive candidate locators, inducing state bloat in the peer's SPD/SAD. Implementations should rate-limit UPDATEs and cap the number of accepted peer locators.
section: "6"
topics:
    - security
    - mobility
