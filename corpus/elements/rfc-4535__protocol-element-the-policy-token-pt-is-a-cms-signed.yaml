document: rfc-4535
kind: protocol-element
summary: The Policy Token (PT) is a CMS-signed data structure issued and signed by the Group Owner that disseminates group policy. It contains identification, access control rules, authorization rules, security mechanisms, compromise recovery policy, and data protection mechanisms; all GMs MUST verify and enforce it.
