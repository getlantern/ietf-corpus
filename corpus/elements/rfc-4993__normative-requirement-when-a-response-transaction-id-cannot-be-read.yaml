document: rfc-4993
kind: normative-requirement
summary: When a response transaction ID cannot be read due to truncation, or the request transaction ID is 0xFFFF, the server MUST respond with transaction ID 0xFFFF and send a descriptor error. Otherwise, the response transaction ID MUST equal the request transaction ID.
section: 3.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
