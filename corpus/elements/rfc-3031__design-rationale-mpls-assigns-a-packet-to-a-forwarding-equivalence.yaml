document: rfc-3031
kind: design-rationale
summary: MPLS assigns a packet to a Forwarding Equivalence Class (FEC) exactly once at network ingress and encodes the FEC as a short fixed-length label. Subsequent routers forward based solely on the label without re-analyzing the network layer header, enabling hardware-based switching, ingress-policy-driven routing, and explicit path control without per-packet route encoding.
section: "2.1"
topics:
    - routing
    - ip
