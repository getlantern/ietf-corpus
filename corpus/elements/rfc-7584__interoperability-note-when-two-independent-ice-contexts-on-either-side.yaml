document: rfc-7584
kind: interoperability-note
summary: When two independent ICE contexts on either side of a mandatory-termination B2BUA conclude at different times, media received by the B2BUA before the second ICE context concludes is forwarded to the other side using the default candidate address from the 'c=' line.
section: "4.2"
