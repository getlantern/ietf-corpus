document: rfc-8753
kind: protocol-element
summary: A new temporary 'under review' status category is introduced for the PVALID/DISALLOWED entries in IANA IDNA tables, allowing problematic code points to be flagged before IETF consensus is reached so that use of a new Unicode version is not blocked pending the full review.
