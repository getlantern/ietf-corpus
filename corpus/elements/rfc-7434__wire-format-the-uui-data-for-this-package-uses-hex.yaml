document: rfc-7434
kind: wire-format
summary: The UUI data for this package uses 'hex' encoding (the only defined encoding). The first octet MUST be a protocol discriminator conforming to Table 4-26 of ITU-T Q.931, followed by up to 128 octets of user information data. The 128-octet limit applies before hex encoding or after hex decoding.
section: "9"
