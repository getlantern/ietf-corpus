document: rfc-1541
kind: design-rationale
summary: The 'vendor extensions' field from BOOTP was renamed 'options' in DHCP to clarify that these are general configuration parameters, not vendor-specific data. A new 'client identifier' option was added to decouple client identification from the hardware address ('chaddr') field.
