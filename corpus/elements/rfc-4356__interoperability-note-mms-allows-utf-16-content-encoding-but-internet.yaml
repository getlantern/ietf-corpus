document: rfc-4356
kind: interoperability-note
summary: MMS allows UTF-16 content encoding, but Internet message format does not. UTF-16 MUST be translated to UTF-8 or another suitable charset. Additionally, charset encodings whose line endings are not US-ASCII CR LF cannot be used in text/* body parts without suitable transfer encoding.
section: 2.1.3.2
topics:
    - email
