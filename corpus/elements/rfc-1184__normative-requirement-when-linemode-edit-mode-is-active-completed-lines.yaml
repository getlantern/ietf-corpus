document: rfc-1184
kind: normative-requirement
summary: When LINEMODE EDIT mode is active, completed lines MUST be transmitted with CR LF as the line terminator. When EDIT mode is off, carriage return is sent as CR NUL, line feed as LF, and other line-completion keys as CR LF.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
