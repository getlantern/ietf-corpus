document: rfc-3326
kind: interoperability-note
summary: 'When a client receives an unacceptable offer in a 200 OK response to an empty INVITE, it should send ACK followed by BYE with Reason: SIP ;cause=488 to communicate why the session is being terminated immediately after establishment.'
