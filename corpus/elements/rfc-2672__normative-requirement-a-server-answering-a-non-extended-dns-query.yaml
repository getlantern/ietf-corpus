document: rfc-2672
kind: normative-requirement
summary: A server answering a non-extended DNS query (EDNS0 Version 0 or no EDNS) SHOULD synthesize a CNAME record for each DNAME record encountered during query processing to help the client reach the correct DNS data.
section: "4.1"
rfc2119_level: SHOULD
