document: rfc-9071
kind: normative-requirement
summary: Security mechanisms for confidentiality, integrity, and peer authentication SHOULD be applied using SIP over TLS for session control and DTLS-SRTP for media. If no other solution is mandated, OSRTP is a suitable method for negotiating SRTP with DTLS.
section: "3.18"
rfc2119_level: SHOULD
topics:
