document: rfc-2982
kind: protocol-element
summary: 'expErrorCode enumerates 11 error conditions: invalidSyntax, undefinedObjectIndex, unrecognizedOperator, unrecognizedFunction, invalidOperandType, unmatchedParenthesis, tooManyWildcardValues, recursion, deltaTooShort, resourceUnavailable, and divideByZero. Errors on Set return SNMP ''wrongValue''; errors during Get/GetNext return ''genErr'' except tooManyWildcardValues and resourceUnavailable which return ''resourceUnavailable''.'
section: "3"
topics:
