document: rfc-5520
kind: protocol-element
summary: The Confidential Path Segment (CPS) is a segment of a computed path containing nodes and links that AS policy requires not be disclosed outside the AS. A PCE replaces the CPS with one or more Path-Key Subobjects (PKSes) in the path returned to the requesting PCC or peer PCE.
section: "1"
topics:
