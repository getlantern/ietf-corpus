document: rfc-6775
kind: state-machine
summary: 'Neighbor Cache Entries have three orthogonal types: Garbage-collectible (standard RFC 4861 eviction), Registered (retained until explicit lifetime expiry or zero-lifetime ARO de-registration), and Tentative (short-lived, created from RS SLLAO, converted to Registered on successful registration). Only one type per IP address is held at a time.'
section: "3.5"
topics:
    - ip
    - v6ops
