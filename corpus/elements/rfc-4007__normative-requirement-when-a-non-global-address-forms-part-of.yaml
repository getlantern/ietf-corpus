document: rfc-4007
kind: normative-requirement
summary: 'When a non-global address forms part of an IPv6 prefix and its scope zone should be disambiguated, the address portion of the prefix SHOULD be in the ''<address>%<zone_id>'' format, with the zone index portion placed before the prefix length: e.g., ''fe80::%2/64''. The zone index must precede the ''/'' to allow correct parsing by name-to-address library functions.'
section: "11.7"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
