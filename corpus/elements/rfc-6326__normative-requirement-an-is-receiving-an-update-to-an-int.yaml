document: rfc-6326
kind: normative-requirement
summary: An IS receiving an update to an INT-VLAN sub-TLV SHOULD employ a hold-down timer before processing it, to allow multiple LSP fragments of the same update to arrive before processing begins, minimizing disruption.
section: 2.3.6
rfc2119_level: SHOULD
topics:
    - routing
