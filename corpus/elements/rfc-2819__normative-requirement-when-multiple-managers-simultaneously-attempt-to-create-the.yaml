document: rfc-2819
kind: normative-requirement
summary: When multiple managers simultaneously attempt to create the same conceptual row, only the first succeeds; all others MUST receive an error. Row-index collision is arbitrated by the EntryStatus creation mechanism defined in RFC 1905.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
