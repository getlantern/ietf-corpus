document: rfc-3825
kind: security-consideration
summary: DHCP messages have no privacy protection; an eavesdropper on the link between the DHCP server and client can discover the LCI. DHCP authentication (RFC 3118) SHOULD be used when location data is security-critical.
section: "3"
topics:
