document: rfc-2163
kind: protocol-element
summary: The Country Code Convention specifies that the 'C-cc' component of an X.400 domain in <domain-name> syntax MUST be omitted when forming the DNS <name> key for 'table1' or 'gate1' entries, because the country code is already implicit in the X42D.cc zone. For example, 'ADMD$acme.C$fr' becomes the key 'ADMD-acme.X42D.fr.'
section: 4.2.3
topics:
    - dns
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
