document: rfc-3986
kind: wire-format
summary: Reserved characters are divided into gen-delims (":" "/" "?" "#" "[" "]" "@") and sub-delims ("!" "$" "&" "'" "(" ")" "*" "+" "," ";" "="). URIs differing only in whether a reserved character is percent-encoded are not equivalent.
