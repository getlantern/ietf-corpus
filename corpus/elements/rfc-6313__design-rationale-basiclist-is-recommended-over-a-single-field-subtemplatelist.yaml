document: rfc-6313
kind: design-rationale
summary: basicList is RECOMMENDED over a single-field subTemplateList for homogeneous lists of single-valued IEs because basicList requires no additional Template Record. subTemplateList is RECOMMENDED over subTemplateMultiList when all elements share the same type, because subTemplateMultiList carries two extra bytes per group and loses the guarantee of uniform element type.
section: "5.4"
topics:
