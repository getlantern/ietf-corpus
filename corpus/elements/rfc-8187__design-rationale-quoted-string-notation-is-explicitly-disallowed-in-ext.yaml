document: rfc-8187
kind: design-rationale
summary: Quoted-string notation is explicitly disallowed in ext-value for backwards compatibility with RFC 2231, even though some generic parser components may silently accept it. The specification deviates from common HTTP parameter syntax to maintain this compatibility.
section: 3.2.2
topics:
    - http
