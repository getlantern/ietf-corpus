document: rfc-9621
kind: protocol-element
summary: A Preconnection object represents a Connection that has not yet been established. It holds the Local Endpoint Identifier, Remote Endpoint Identifier, and Transport Properties. It is fully or partially specified, and is used to Initiate, Listen, or Rendezvous.
section: 4.1.2
