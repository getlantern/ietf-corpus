document: rfc-6898
kind: protocol-element
summary: 'The Config message is modified to allow multiple CONFIG objects: ''<Config Message> ::= <Common Header> <LOCAL_CCID> <MESSAGE_ID> <LOCAL_NODE_ID> <CONFIG> [ <CONFIG> ... ]''. This extends the single-object constraint from RFC 4204.'
section: "2.1"
topics:
    - mpls
