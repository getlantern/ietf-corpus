document: rfc-8203
kind: wire-format
summary: The Cease NOTIFICATION message with Shutdown Communication encodes Error Code 6, an 8-bit Subcode (2 or 4), an 8-bit Length field (0–128 octets), and a variable-length UTF-8 Shutdown Communication field. The Length field indicates the byte count of the Shutdown Communication; when zero, no communication field follows.
