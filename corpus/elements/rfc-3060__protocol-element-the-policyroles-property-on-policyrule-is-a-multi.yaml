document: rfc-3060
kind: protocol-element
summary: The PolicyRoles property on PolicyRule is a multi-valued string array where each value represents one role combination in the format '<RoleName>[&&<RoleName>]*'. Multiple values are logically ORed, allowing a rule to match any of several role combinations.
section: 6.3.7
