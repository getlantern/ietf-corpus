document: rfc-2508
kind: normative-requirement
summary: If any of the normally constant RTP header fields (version, P bit, X bit, payload type, SSRC) change, the uncompressed RTP header MUST be sent via a COMPRESSED_UDP or FULL_HEADER packet rather than a COMPRESSED_RTP packet.
section: 3.3.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
