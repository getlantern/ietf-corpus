document: rfc-8495
kind: design-rationale
summary: 'The Allocation Token and the standard EPP authorization information (e.g., domain:pw) serve different purposes: authorization information is assigned at creation and facilitates transfer of sponsorship, while the Allocation Token facilitates initial allocation and is not managed by the client. The Allocation Token is not a replacement for existing authorization mechanisms.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
