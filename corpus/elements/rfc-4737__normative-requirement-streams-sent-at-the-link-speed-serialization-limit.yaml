document: rfc-4737
kind: normative-requirement
summary: Streams sent at the link speed serialization limit MUST have limited duration and MUST consider packet loss an indication that the stream has caused congestion; testing MUST be suspended in that case.
section: "6"
rfc2119_level: MUST
topics:
