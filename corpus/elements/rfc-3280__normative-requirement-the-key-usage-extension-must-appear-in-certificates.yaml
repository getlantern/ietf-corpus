document: rfc-3280
kind: normative-requirement
summary: The Key Usage extension MUST appear in certificates containing public keys used to validate digital signatures on other public key certificates or CRLs. When present, it SHOULD be marked critical. If the keyCertSign bit is asserted, the cA bit in basicConstraints MUST also be asserted.
section: 4.2.1.3
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
