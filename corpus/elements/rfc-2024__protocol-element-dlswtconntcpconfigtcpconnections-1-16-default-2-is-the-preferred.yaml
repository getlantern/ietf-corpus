document: rfc-2024
kind: protocol-element
summary: dlswTConnTcpConfigTcpConnections (1–16, default 2) is the preferred number of TCP connections within one DLSw transport connection; the actual count is negotiated at capabilities exchange. dlswTConnTcpConfigMaxSegmentSize (default 4096 bytes) sets the receive TCP segment size limit.
