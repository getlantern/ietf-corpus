document: rfc-9140
kind: normative-requirement
summary: Both the server and peer MUST compute keys Kms and Kmp and the message authentication codes MACs and MACp in the Completion Exchange, and MUST compare the received MAC with a locally computed value. Mismatch MUST trigger error code 4001 and EAP-Failure.
section: 3.2.4
rfc2119_level: MUST
topics:
    - security
    - crypto
