document: rfc-6607
kind: normative-requirement
summary: A DHCPv6 client that includes a VSS option SHOULD place a single VSS option in the message at the same level as the Client Identifier option, and MUST NOT include different VSS options in the same DHCPv6 message.
section: "6"
rfc2119_level: MUST NOT
topics:
    - dns
