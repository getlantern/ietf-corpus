document: rfc-6757
kind: normative-requirement
summary: A MAG configured with a sub-option flag enabled SHOULD include the corresponding sub-option in PBU messages but MUST NOT include the sub-option if it is unable to obtain the required information (Network-Identifier, Geo-Location, or Operator-Identifier).
section: "4.1"
rfc2119_level: MUST NOT
topics:
