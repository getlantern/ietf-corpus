document: rfc-7633
kind: normative-requirement
summary: A certificate signed by a Certificate Signing Certificate containing a TLS feature extension MUST itself contain a TLS feature extension offering the same set or a superset of the features advertised in the signing certificate.
section: 4.2.2
rfc2119_level: MUST
