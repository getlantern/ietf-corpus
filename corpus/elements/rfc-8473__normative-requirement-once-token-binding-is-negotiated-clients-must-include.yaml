document: rfc-8473
kind: normative-requirement
summary: Once Token Binding is negotiated, clients MUST include a Sec-Token-Binding header field in every HTTP request and MUST include only one such header field per request. The header field MUST NOT be included in HTTP responses and MUST NOT be used in HTTP trailers.
section: "2"
rfc2119_level: MUST
topics:
    - tls
    - http
    - security
