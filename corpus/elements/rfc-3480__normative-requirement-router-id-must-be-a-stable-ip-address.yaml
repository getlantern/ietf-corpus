document: rfc-3480
kind: normative-requirement
summary: Router ID MUST be a stable IP address that remains reachable even if an interface is down (typically a loopback). When using OSPF or ISIS for TE, it is RECOMMENDED that Router ID be set to the 'Router Address' (OSPF-TE) or 'Traffic Engineering Router ID' (ISIS-TE).
section: "2"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
