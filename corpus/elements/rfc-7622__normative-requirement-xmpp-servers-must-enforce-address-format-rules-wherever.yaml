document: rfc-7622
kind: normative-requirement
summary: XMPP servers MUST enforce address format rules wherever possible and MUST reject stanzas and other XML elements that violate those rules; for stanzas, the server returns a <jid-malformed/> error to the sender as described in RFC 6120 Section 8.3.3.8.
section: "4"
rfc2119_level: MUST
topics:
    - realtime
