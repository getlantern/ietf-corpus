document: rfc-2157
kind: interoperability-note
summary: Some implementations use the ASN.1 octet-aligned EXTERNAL encoding choice when the ASN.1 type is OCTET STRING for BP15, rather than the preferred single-ASN1-type choice; gateways must tolerate both, as X.420 still permits generating the octet-aligned form even though single-ASN1-type is the agreed preferred encoding.
section: "5.5"
