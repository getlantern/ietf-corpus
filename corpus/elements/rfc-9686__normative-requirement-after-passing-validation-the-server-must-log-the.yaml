document: rfc-9686
kind: normative-requirement
summary: After passing validation, the server MUST log the address registration information (including DUID and link-layer address if available) and MUST send back an ADDR-REG-REPLY. The server SHOULD register a Client-Identifier-to-IPv6-address binding and SHOULD mark the address unavailable for future Advertise messages.
section: 4.2.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
