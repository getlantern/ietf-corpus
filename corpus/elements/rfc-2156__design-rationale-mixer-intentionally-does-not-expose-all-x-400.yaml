document: rfc-2156
kind: design-rationale
summary: MIXER intentionally does not expose all X.400 services to RFC 822 users; the aim on the RFC 822 side is to preserve current RFC 822 service. X.400 implementors should not use MIXER as a general X.400 interface because too many X.400 aspects are inaccessible through it.
section: "1.12"
topics:
