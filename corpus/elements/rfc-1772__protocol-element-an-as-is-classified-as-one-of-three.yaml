document: rfc-1772
kind: protocol-element
summary: 'An AS is classified as one of three types based on transit behavior: a stub AS has a single connection and carries only local traffic; a multihomed AS has multiple connections but refuses transit traffic; a transit AS has multiple connections and carries both local and transit traffic.'
