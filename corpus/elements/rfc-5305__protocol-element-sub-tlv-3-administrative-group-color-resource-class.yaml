document: rfc-5305
kind: protocol-element
summary: Sub-TLV 3 (Administrative Group / color / resource class) carries a 4-octet bitmask where each set bit corresponds to one administrative group assigned to the interface. The least significant bit is group 0 and the most significant is group 31.
