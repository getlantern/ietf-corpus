document: rfc-9814
kind: security-consideration
summary: Fault-attack countermeasures should be considered for SLH-DSA implementations. The typical countermeasure of verifying a signature before releasing its value is not effective against fault attacks on SLH-DSA [Ge2023]; redundancy by replicating the signature-generation process MAY be used instead, though SLH-DSA signature generation is already slow.
section: "5"
rfc2119_level: MAY
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
