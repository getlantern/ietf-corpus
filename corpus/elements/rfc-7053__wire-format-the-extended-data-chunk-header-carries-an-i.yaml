document: rfc-7053
kind: wire-format
summary: The extended DATA chunk header carries an I bit at flag value 0x08, positioned between the Reserved bits and the U bit. The remainder of the DATA chunk format (Type=0, Length, TSN, Stream Identifier, Stream Sequence Number, Payload Protocol Identifier, User Data) is unchanged from RFC 4960.
