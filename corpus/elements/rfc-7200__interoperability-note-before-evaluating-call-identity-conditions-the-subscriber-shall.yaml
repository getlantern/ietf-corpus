document: rfc-7200
kind: interoperability-note
summary: Before evaluating <call-identity> conditions, the subscriber shall convert URIs received in SIP header fields to canonical form per RFC 3261, except that the "phone-context" parameter of 'tel' URIs shall not be removed if present. Visual separators (e.g., "-") in 'tel' URIs are not used for URI comparison per RFC 3966.
section: 5.3.1
topics:
    - sip
    - realtime
