document: rfc-1653
kind: normative-requirement
summary: A server implementing this extension may return 452 or 552 in response to a RCPT command based on unwillingness to accept the declared message size for a particular recipient. A 452 allows the client to requeue for later delivery; a 552 means the client may not requeue for that recipient.
section: "5.4"
rfc2119_level: MAY
topics:
    - email
