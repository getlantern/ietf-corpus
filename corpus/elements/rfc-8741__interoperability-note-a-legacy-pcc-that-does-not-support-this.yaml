document: rfc-8741
kind: interoperability-note
summary: A legacy PCC that does not support this extension will receive a PCUpd with C flag set and D flag unset, ignore the C flag, and trigger Error-type=19, error-value 1 (Attempted LSP Update Request for a non-delegated LSP). For PLSP-ID=0, it will trigger error-value 3 (unknown PLSP-ID).
