document: rfc-9881
kind: normative-requirement
summary: The HashML-DSA mode (Section 5.4 of FIPS 204) MUST NOT be used; public keys identified by id-hash-ml-dsa-44-with-sha512, id-hash-ml-dsa-65-with-sha512, and id-hash-ml-dsa-87-with-sha512 MUST NOT appear in X.509 certificates used for CRLs, OCSP, certificate issuance, and related PKIX protocols.
section: "8.3"
rfc2119_level: MUST NOT
topics:
    - pkix
    - crypto
    - security
