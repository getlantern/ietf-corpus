document: rfc-3859
kind: protocol-element
summary: 'The subscribe operation has five attributes: watcher (identifier of the WATCHER), target (identifier of the PRESENTITY), duration (maximum seconds the subscription should be active, may be zero), SubscriptID (reference to the subscription used for unsubscribing), and TransID (unique correlation identifier). Gateways MUST handle TransIDs and SubscriptIDs up to 40 bytes in length.'
section: "3.1"
topics:
    - realtime
    - sip
