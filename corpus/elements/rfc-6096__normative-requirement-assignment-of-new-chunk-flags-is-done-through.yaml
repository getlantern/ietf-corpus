document: rfc-6096
kind: normative-requirement
summary: Assignment of new chunk flags is done through an RFC Required action. Documentation MUST contain a name for the flag and a detailed procedural description of its use, and MUST consider that implementations not supporting the flag will send '0' on transmit and ignore it on receipt.
section: "3.2"
rfc2119_level: MUST
topics:
    - sctp
    - registry
