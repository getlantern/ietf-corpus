summary: For arithmetic and jump instructions, the 8-bit opcode is divided into 'code' (4 bits), 's' source bit (1 bit, K=0 for immediate or X=1 for register), and 'class' (3 bits). ALU uses 32-bit operands and ALU64 uses 64-bit operands for otherwise identical operations.
