document: rfc-8210
kind: protocol-element
summary: 'The End of Data PDU conveys three 32-bit timing parameters: Refresh Interval (1–86400 s, default 3600 s), Retry Interval (1–7200 s, default 600 s), and Expire Interval (600–172800 s, default 7200 s). These allow the cache to control polling frequency and data lifetime on the router.'
