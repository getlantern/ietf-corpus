document: rfc-9493
kind: interoperability-note
summary: 'Email canonicalization is not standardized: many providers treat the local part as case-insensitive and may treat dots as optional. Recipients SHOULD apply their own canonicalization algorithm to incoming events to reproduce translations done by the local email system.'
section: 3.2.2.1
topics:
    - email
    - security
