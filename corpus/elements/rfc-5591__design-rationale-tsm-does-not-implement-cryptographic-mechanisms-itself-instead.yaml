document: rfc-5591
kind: design-rationale
summary: TSM does not implement cryptographic mechanisms itself; instead it trusts assertions from the Transport Model about the security level provided. This is by design because the Security Model has no means to verify whether a Transport Model's assertion about its security characteristics is accurate.
section: 2.1.2
topics:
    - security
