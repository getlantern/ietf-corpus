document: rfc-4204
kind: normative-requirement
summary: TE link Link_Id identifiers MUST be the same type (IPv4, IPv6, or unnumbered) at both ends. If a LinkSummary is received with mismatched types, a LinkSummaryNack MUST be sent with Error Code 'Bad TE Link Object'. Similarly, Interface_Id types MUST match at both ends.
section: "4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
