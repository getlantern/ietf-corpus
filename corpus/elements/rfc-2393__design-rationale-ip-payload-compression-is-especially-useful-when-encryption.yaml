document: rfc-2393
kind: design-rationale
summary: IP payload compression is especially useful when encryption is applied, because encryption renders lower-layer compression (e.g., PPP CCP) ineffective by making the data appear random; compression must therefore precede encryption.
section: "1"
topics:
