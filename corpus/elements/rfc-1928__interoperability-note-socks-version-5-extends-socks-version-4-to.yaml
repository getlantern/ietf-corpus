document: rfc-1928
kind: interoperability-note
summary: SOCKS Version 5 extends SOCKS Version 4 to include UDP support, generalized strong authentication schemes, and domain-name and IPv6 addressing. SOCKS Version 4 only supported TCP-based client-server applications without strong authentication.
section: "2"
