document: rfc-1990
kind: design-rationale
summary: Whether to transmit leading zeroes in the Protocol Field is determined once at bundle creation by examining whether PFC has been negotiated on the first link admitted to the bundle, and this choice is kept in force for the bundle's lifetime to avoid alignment-dependent performance problems in some implementations.
