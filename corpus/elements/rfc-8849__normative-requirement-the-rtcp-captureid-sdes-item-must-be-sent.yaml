document: rfc-8849
kind: normative-requirement
summary: The RTCP CaptureID SDES item MUST be sent in an SDES packet within a compound RTCP packet unless Reduced-Size RTCP (RFC 5506) has been negotiated, in which case it can be sent in a noncompound RTCP packet.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
