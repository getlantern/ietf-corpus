document: rfc-6871
kind: protocol-element
summary: The payload type number mapping parameter 'pt=' is added to 'pcfg', 'acfg', and 'lcfg' to map RTP media capability numbers to actual RTP payload type numbers. Its ABNF is 'pt=<media-cap-num>:<payload-type-number>[,...]'; payload type numbers MUST NOT have leading zeroes.
section: 3.3.4.2
topics:
    - realtime
    - rtp
