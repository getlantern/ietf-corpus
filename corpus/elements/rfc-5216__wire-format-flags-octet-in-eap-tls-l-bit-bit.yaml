document: rfc-5216
kind: wire-format
summary: 'Flags octet in EAP-TLS: L bit (bit 0) indicates presence of 4-octet TLS Message Length field and MUST be set on the first fragment of a fragmented message. M bit (bit 1) is set on all but the last fragment. S bit (bit 2, Request only) marks the EAP-TLS Start message.'
section: "3.1"
topics:
    - tls
