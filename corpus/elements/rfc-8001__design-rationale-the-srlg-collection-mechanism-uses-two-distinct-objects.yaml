document: rfc-8001
kind: design-rationale
summary: The SRLG collection mechanism uses two distinct objects — LSP_REQUIRED_ATTRIBUTES and LSP_ATTRIBUTES — to allow the ingress node to choose between mandatory SRLG collection (which may cause LSP establishment failure if unsupported) and best-effort collection (which allows the LSP to be established even if some nodes cannot supply SRLG data).
section: "3.1"
topics:
