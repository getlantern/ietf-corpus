document: rfc-8225
kind: normative-requirement
summary: If the "dest" claim value array contains both "tn" and "uri" claim names, the "tn" array MUST be listed first and "uri" second. Within each array, identity strings SHOULD be in lexicographical order.
section: 5.2.1
rfc2119_level: MUST
