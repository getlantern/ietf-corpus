document: rfc-4976
kind: normative-requirement
summary: Clients MUST NOT attempt to use Basic authentication and relays MUST NOT request or accept it. Relays MUST NOT indicate qop=auth-int or the MD5-sess algorithm in challenges. Clients and relays MUST include a qop parameter in all WWW-Authenticate and Authorization headers.
section: "9.1"
rfc2119_level: MUST NOT
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
