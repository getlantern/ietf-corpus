document: rfc-7840
kind: design-rationale
summary: LoST server deployment is not ubiquitous and several countries have expressed reluctance to deploy public LoST servers. No public forest guides have been deployed, threatening both device-centric and softswitch-centric emergency calling models. This extension allows a LIS to supply PSAP routing information directly, bypassing the need for LoST or forest guides.
section: "3"
