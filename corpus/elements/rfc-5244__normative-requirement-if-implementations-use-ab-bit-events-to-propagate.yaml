document: rfc-5244
kind: normative-requirement
summary: 'If implementations use AB bit events to propagate SS No. 5 line signals, they MUST use the specified mappings: both 2400+2600 Hz → code 208, 2400 Hz only → code 210, 2600 Hz only → code 209, neither → code 211.'
