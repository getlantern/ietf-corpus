document: rfc-5440
kind: normative-requirement
summary: If a second Open message is received with the same unacceptable session parameters, the receiving peer MUST send a PCErr and MUST immediately close the TCP connection. The PCEP session is considered established only once both peers have received a Keepalive message from their peer.
section: "6.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
