document: rfc-5003
kind: security-consideration
summary: AII values appearing in AII distribution protocols and PW signaling protocols are subject to authentication schemes such as MD5 if desired. The use of Global ID values based on ASNs in inter-provider cases can enable source-validation checking to verify that AII values originated from a legitimate source.
section: "5"
topics:
