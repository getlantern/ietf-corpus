document: rfc-826
kind: normative-requirement
summary: ar$hrd, ar$pro, and ar$op are the only fields treated as 16-bit words and must be transmitted most-significant byte first (Ethernet/PDP-10 byte order). All other fields are treated as byte streams with no inter-field padding.
section: Packet format
rfc2119_level: MUST
topics:
    - ip
