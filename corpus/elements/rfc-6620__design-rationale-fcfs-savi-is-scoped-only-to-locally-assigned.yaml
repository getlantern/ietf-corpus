document: rfc-6620
kind: design-rationale
summary: FCFS SAVI is scoped only to locally assigned IPv6 addresses (SLAAC/DAD-based) and validates only local traffic. Transit traffic from routers is explicitly out of scope; ingress filtering (RFC 2827) is recommended to complement FCFS SAVI for that traffic class.
section: "2.1"
topics:
    - ip
    - security
