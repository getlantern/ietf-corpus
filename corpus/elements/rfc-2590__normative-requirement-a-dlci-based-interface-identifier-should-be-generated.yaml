document: rfc-2590
kind: normative-requirement
summary: A DLCI-based interface identifier SHOULD be generated upon successfully establishing a VC (PVC or SVC). Until a VC is established and a DLCI is assigned, the unspecified DLCI (all 24 bits set to 1) MUST be used.
section: "4"
rfc2119_level: SHOULD
