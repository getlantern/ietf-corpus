document: rfc-9854
kind: normative-requirement
summary: The IPv6 address selected as the DODAGID by OrigNode in RREQ-DIO (or by TargNode in RREP-DIO) MUST have a scope that encompasses the entire domain where the route is built; a link-local address is insufficient and will cause route discovery to fail.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
