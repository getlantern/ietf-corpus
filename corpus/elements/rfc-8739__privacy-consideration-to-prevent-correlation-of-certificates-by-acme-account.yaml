document: rfc-8739
kind: privacy-consideration
summary: To prevent correlation of certificates by ACME account when unauthenticated GET is used, servers SHOULD choose star-certificate URLs in a non-guessable way (e.g., using capability URLs per W3C guidance), consistent with the recommendation in RFC 8555 Section 10.5.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - acme
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
