document: rfc-6911
kind: normative-requirement
summary: When multiple DNS-Server-IPv6-Address Attributes are present in an Access-Accept packet, the addresses SHOULD be copied to DHCPv6 DNS Recursive Name Server Option or IPv6 RA Recursive DNS Server Option in the same order as received.
section: "3.2"
rfc2119_level: SHOULD
