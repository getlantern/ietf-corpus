document: rfc-6249
kind: normative-requirement
summary: Metalink servers and their associated preferred mirror servers MUST all share the same ETag policy; normal mirror servers SHOULD share the same ETag policy. Byte-for-byte identical files must have the same ETag across coordinated servers.
section: "2"
rfc2119_level: MUST
