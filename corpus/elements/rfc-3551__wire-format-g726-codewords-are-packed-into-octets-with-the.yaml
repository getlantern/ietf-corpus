document: rfc-3551
kind: wire-format
summary: G726 codewords are packed into octets with the first codeword's least significant bit aligned to the octet's least significant bit ('little-endian'); successive codewords pack from LSB upward, spanning octet boundaries. Packing MUST end with a completely filled final octet.
