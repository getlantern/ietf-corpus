document: rfc-6785
kind: normative-requirement
summary: Sieve scripts that depend upon IMAP events MUST include the 'imapsieve' string in their 'required' lists. Implementations that support IMAP events in Sieve MUST also support IMAP Metadata (RFC 5464) and Sieve Environment (RFC 5183).
section: "2.1"
rfc2119_level: MUST
