document: rfc-6677
kind: normative-requirement
summary: Lower-layer protocols MUST support EAP and MUST support EAP methods that derive keying material in order to support EAP channel bindings. The EAP Lower-Layer attribute MUST be included in i1 unless an attribute specific to a particular lower layer is already included in i1.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
