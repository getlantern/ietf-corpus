document: rfc-5322
kind: wire-format
summary: 'The overall message ABNF is: message = (fields / obs-fields) [CRLF body], where body = (*(*998text CRLF) *998text). Text characters exclude CR and LF (values %d1-9, %d11, %d12, %d14-127). Use of US-ASCII control characters (1–8, 11, 12, 14–31) in the body is discouraged.'
section: "3.5"
