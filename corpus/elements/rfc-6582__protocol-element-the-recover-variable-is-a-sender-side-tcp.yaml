document: rfc-6582
kind: protocol-element
summary: The 'recover' variable is a sender-side TCP state variable that records the send sequence number that must be acknowledged before the fast recovery procedure is declared over. It is initialized to the initial send sequence number when the TCP protocol control block is initialized.
