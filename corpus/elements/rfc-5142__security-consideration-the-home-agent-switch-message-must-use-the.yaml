document: rfc-5142
kind: security-consideration
summary: The Home Agent Switch message MUST use the home agent to mobile node IPsec ESP encryption SA for confidentiality protection and MUST use the IPsec ESP authentication SA for integrity protection, consistent with RFC 3775. The message MAY use the IPsec ESP SA already in place for Binding Updates and Acknowledgements to reduce the number of configured SAs.
section: "10"
topics:
    - security
    - ipsec
    - mobility
