document: rfc-2327
kind: normative-requirement
summary: A local IP address MUST NOT be used in any context where the SDP description might leave the scope in which the address is meaningful. The fully-qualified domain name SHOULD be used for the 'o=' address unless unavailable, in which case the globally unique address may be substituted.
section: "6"
rfc2119_level: MUST NOT
topics:
    - realtime
    - ip
