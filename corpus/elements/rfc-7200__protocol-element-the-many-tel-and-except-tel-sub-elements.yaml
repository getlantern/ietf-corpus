document: rfc-7200
kind: protocol-element
summary: The <many-tel> and <except-tel> sub-elements extend the RFC 4745 identity model to support grouping of 'tel' URIs by a "prefix" attribute (common leading digits for global numbers, or phone-context value for local numbers), analogous to the "domain" attribute for SIP URIs.
