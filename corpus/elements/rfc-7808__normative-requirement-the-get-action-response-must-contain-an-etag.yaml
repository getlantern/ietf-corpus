document: rfc-7808
kind: normative-requirement
summary: The "get" action response MUST contain an ETag response header field indicating the current strong entity tag of the time zone resource. In the absence of an Accept header, the server MUST return time zone data with the "text/calendar" media type.
section: "5.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
