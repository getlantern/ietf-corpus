document: rfc-5545
kind: protocol-element
summary: The RECURRENCE-ID property is used to identify a particular instance of a recurring calendar component. It is used in conjunction with the UID and SEQUENCE properties to identify a particular recurrence instance for updating or deletion. The RANGE parameter with value THISANDFUTURE indicates the modification applies to the identified instance and all subsequent instances.
section: 3.8.4.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
