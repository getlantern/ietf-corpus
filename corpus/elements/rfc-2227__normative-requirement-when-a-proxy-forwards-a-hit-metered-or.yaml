document: rfc-2227
kind: normative-requirement
summary: 'When a proxy forwards a hit-metered or usage-limited response to a client not in the metering subtree, it MUST omit the Meter header and MUST add ''Cache-control: s-maxage=0'' to the response.'
section: "3.1"
rfc2119_level: MUST
topics:
