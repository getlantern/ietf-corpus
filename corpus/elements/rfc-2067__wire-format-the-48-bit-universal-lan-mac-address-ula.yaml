document: rfc-2067
kind: wire-format
summary: 'The 48-bit Universal LAN MAC Address (ULA) in HIPPI-LE fields follows IEEE 802.1A canonical bit order: ULA byte 0 occupies bits 15–8 (with U/L bit at bit 9 and I/G bit at bit 8), bytes 1–5 follow in order across bits 7–0 and the subsequent 32-bit word.'
