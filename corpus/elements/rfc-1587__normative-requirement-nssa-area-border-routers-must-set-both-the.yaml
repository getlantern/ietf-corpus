document: rfc-1587
kind: normative-requirement
summary: NSSA area border routers must set both the E-bit (external capability) and B-bit (border router) in their type-1 router LSAs, in both the backbone and the NSSA area, because they must be capable of translating type-7 LSAs to type-5 LSAs.
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
