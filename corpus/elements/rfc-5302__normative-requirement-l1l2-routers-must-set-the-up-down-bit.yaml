document: rfc-5302
kind: normative-requirement
summary: L1L2 routers MUST set the up/down bit to one for prefixes derived from L2 routing that are advertised into L1 LSPs. The bit MUST be set to zero for all other IP prefixes in L1 or L2 LSPs.
section: "2"
rfc2119_level: MUST
topics:
    - routing
