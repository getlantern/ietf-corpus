document: rfc-9010
kind: design-rationale
summary: External routes for RULs use Non-Storing mode DAO messages unicast directly to the root even when the DODAG operates in Storing mode. This means Non-Storing mode signaling and IPv6-in-IPv6 encapsulation appear as plain traffic to intermediate routers, requiring no state changes in legacy intermediate nodes.
section: "3"
topics:
    - routing
