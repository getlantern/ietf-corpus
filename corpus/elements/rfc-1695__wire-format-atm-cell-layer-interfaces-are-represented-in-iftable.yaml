document: rfc-1695
kind: wire-format
summary: ATM cell layer interfaces are represented in ifTable with ifType=37. ifInOctets and ifOutOctets count received/transmitted assigned cells multiplied by 53 (the ATM cell size). ifInErrors counts cells dropped due to uncorrectable HEC errors.
