document: rfc-1662
kind: security-consideration
summary: The link layer might not be informed when the connected state of the physical layer has changed, resulting in possible security lapses due to over-reliance on the integrity of switching systems. An insertion attack might go undetected, and an attacker spoofing the calling identity might avoid link authentication.
section: Security Considerations
topics:
    - security
