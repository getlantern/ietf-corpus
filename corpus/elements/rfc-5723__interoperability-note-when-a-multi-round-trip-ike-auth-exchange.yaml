document: rfc-5723
kind: interoperability-note
summary: When a multi-round-trip IKE_AUTH exchange is used, N(TICKET_REQUEST) MUST be included in the first IKE_AUTH request and N(TICKET_LT_OPAQUE)/TICKET_NACK/TICKET_ACK MUST only appear in the final IKE_AUTH response.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
