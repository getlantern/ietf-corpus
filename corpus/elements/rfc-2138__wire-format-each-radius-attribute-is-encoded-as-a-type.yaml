document: rfc-2138
kind: wire-format
summary: 'Each RADIUS attribute is encoded as a Type-Length-Value triple: Type (1 octet), Length (1 octet, inclusive of Type and Length), Value (0–253 octets). Value data types are string (0–253 octets), address (32-bit big-endian), integer (32-bit big-endian), or time (32-bit seconds since epoch).'
