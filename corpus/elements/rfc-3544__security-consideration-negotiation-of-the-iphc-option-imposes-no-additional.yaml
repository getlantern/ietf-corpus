document: rfc-3544
kind: security-consideration
summary: Negotiation of the IPHC option imposes no additional security considerations beyond those applicable to PPP (RFC 1661). Header compression can in rare cases cause misdelivery of packets; if necessary, packet confidentiality should be ensured by encryption.
section: "8"
