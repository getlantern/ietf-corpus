document: rfc-8840
kind: normative-requirement
summary: All INFO requests MUST carry the 'ice-pwd' and 'ice-ufrag' attributes. An agent MUST discard any received INFO requests containing 'ice-pwd' and 'ice-ufrag' attributes that do not match those of the current ICE Negotiation Session.
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
    - webrtc
    - nat
