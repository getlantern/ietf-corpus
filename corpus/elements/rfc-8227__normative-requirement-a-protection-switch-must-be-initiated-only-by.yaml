document: rfc-8227
kind: normative-requirement
summary: A protection switch MUST be initiated only by criteria defined in Section 5.3 (signal fail, administrative commands, etc.). A failure of the RPS protocol or controller MUST NOT trigger a protection switch. Ring switches MUST be preempted by higher-priority RPS requests.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
