document: rfc-5324
kind: wire-format
summary: T11FcSpPolicyName is an OCTET STRING (SIZE 1..64) representing a Policy Object name whose format is governed by a paired T11FcSpPolicyNameType object. For ipv6AddressRange the value is 32 bytes (two IPv6 addresses, low first); for ipv4AddressRange 8 bytes (two IPv4 addresses); for wildcard/restrictedWildcard the value is '0000000000000000'h.
section: "6.1"
topics:
    - security
