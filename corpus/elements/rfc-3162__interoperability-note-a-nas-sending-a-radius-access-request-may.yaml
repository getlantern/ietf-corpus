document: rfc-3162
kind: interoperability-note
summary: A NAS sending a RADIUS Access-Request may not know a priori whether the host will use IPv4, IPv6, or both (e.g., IPv6CP occurs after LCP in PPP, so address assignment happens after RADIUS authentication). IPv6 attributes MAY be sent alongside IPv4 attributes in the same RADIUS message.
section: "1"
topics:
    - radius
    - ip
    - v6ops
