document: rfc-4227
kind: state-machine
summary: 'The BEEP profile for SOAP has two states: ''boot'' and ''ready''. In ''boot'', the requesting peer sends a ''bootmsg''; receiving a ''bootrpy'' transitions to ''ready'', while receiving an ''error'' leaves the state unchanged. In ''ready'', either peer may initiate SOAP message patterns; no state change occurs during message exchange.'
section: "2"
