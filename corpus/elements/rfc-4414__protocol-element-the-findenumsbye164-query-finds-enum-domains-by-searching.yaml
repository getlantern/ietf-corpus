document: rfc-4414
kind: protocol-element
summary: The <findEnumsByE164> query finds ENUM domains by searching on prefixes of E.164 numbers, with an optional <specificity> child element that narrows the search to numbers that are either more specific (more digits) or less specific (fewer digits).
