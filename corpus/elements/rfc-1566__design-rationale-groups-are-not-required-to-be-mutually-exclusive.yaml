document: rfc-1566
kind: design-rationale
summary: Groups are not required to be mutually exclusive; a given event may be recorded by more than one group. However, if groups are implemented all aspects of an MTA's operation should appear in at least one group, and mtaTable always provides authoritative aggregate totals.
