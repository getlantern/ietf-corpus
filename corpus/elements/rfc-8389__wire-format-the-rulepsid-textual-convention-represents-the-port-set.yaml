document: rfc-8389
kind: wire-format
summary: The RulePSID textual convention represents the Port Set ID (PSID) as a 2-octet OCTET STRING displayed in hexadecimal. The mapRulePSIDLen object encodes the bit length of significant bits in the PSID field (0..16), with a value of 0 indicating the PSID field should be ignored.
