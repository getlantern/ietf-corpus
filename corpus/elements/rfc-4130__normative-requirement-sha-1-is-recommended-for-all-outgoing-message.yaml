document: rfc-4130
kind: normative-requirement
summary: SHA-1 is RECOMMENDED for all outgoing message signatures; implementations SHOULD support both MD5 and SHA-1 for incoming messages. A MIC value is REQUIRED as part of any returned receipt except when a severe error prevents digest computation.
section: "2.4"
rfc2119_level: RECOMMENDED
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
