document: rfc-3830
kind: normative-requirement
summary: New MIKEY transforms and parameters SHALL be added by IANA registration per RFC 2434. All initiator messages MUST use a unique timestamp. CSB update messages MUST use the same CSB ID as the initial exchange, MUST use a new timestamp, and MUST NOT include a new RAND.
section: "4.5"
rfc2119_level: MUST
topics:
    - crypto
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
