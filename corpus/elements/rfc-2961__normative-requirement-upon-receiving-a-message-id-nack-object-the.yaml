document: rfc-2961
kind: normative-requirement
summary: Upon receiving a MESSAGE_ID_NACK object, the receiver MUST transmit the corresponding installed state via a standard Path or Resv message if matching state can be found. This mechanism restores full state when summary refresh loses synchronization.
