document: rfc-9577
kind: registry
summary: 'IANA has created a new ''Privacy Pass Token Types'' registry in a ''Privacy Pass'' page. Entries require: Value (2-byte identifier), Name, Token Structure, Token Key Encoding, TokenChallenge Structure, Publicly Verifiable (Y/N), Public Metadata (Y/N), Private Metadata (Y/N), Nk, Nid, Change Controller, Reference, and Notes. Registration policy is Specification Required.'
