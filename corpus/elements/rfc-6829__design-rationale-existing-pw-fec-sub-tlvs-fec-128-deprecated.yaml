document: rfc-6829
kind: design-rationale
summary: Existing PW FEC sub-TLVs (FEC 128 Deprecated, FEC 128 Current, FEC 129) were defined only for IPv4 LDP sessions; when an IPv6 LDP session is used the 128-bit IPv6 addresses do not fit in the 32-bit address fields. All other Target FEC sub-TLVs are defined in pairs (IPv4 and IPv6), but PW sub-TLVs were not, motivating two new sub-TLVs.
section: "1"
