document: rfc-3830
kind: security-consideration
summary: 'The primary DoS threat against MIKEY is CPU exhaustion: an attacker sends many messages forcing MAC/signature verification before the replay cache is consulted. Signed error messages in response to authentication failures SHOULD NOT be sent, as they can enable DoS against the Responder; unauthenticated error messages should be treated only as advisory.'
section: 5.1.2
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
