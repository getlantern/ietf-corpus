document: rfc-9788
kind: state-machine
summary: 'Each Header Field in a message with Header Protection has exactly one of four protection states: unprotected, signed-only (in signature but visible in transit), encrypted-only (only in Cryptographic Payload; external value removed or obscured), or signed-and-encrypted (encrypted-only and under a validated signature). The state is computed by the HeaderFieldProtection algorithm using the hp parameter and HP-Outer fields.'
section: "4.3"
topics:
    - email
    - security
    - crypto
