document: rfc-5928
kind: normative-requirement
summary: 'Step 4: If <host> is a domain name and both <port> and <transport> are undefined, the S-NAPTR algorithm (RFC 3958) is applied using <host> as the initial target and ''RELAY'' as the application service tag. Protocol tags ''turn.udp'', ''turn.tcp'', and ''turn.tls'' map to UDP, TCP, and TLS respectively; if no NAPTR results are found, processing continues to Step 5.'
section: "3"
rfc2119_level: MUST
topics:
    - nat
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
