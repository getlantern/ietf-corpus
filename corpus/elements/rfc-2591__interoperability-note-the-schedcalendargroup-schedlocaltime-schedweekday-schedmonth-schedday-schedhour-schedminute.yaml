document: rfc-2591
kind: interoperability-note
summary: The schedCalendarGroup (schedLocalTime, schedWeekDay, schedMonth, schedDay, schedHour, schedMinute) is an optional conformance group. Implementations that do not support it must return inconsistentValue if a manager attempts to set schedType to calendar(2) or oneshot(3).
