document: rfc-7119
kind: normative-requirement
summary: When an IPFIX Mediator receives Flow Records containing originalExporterIPv4Address or originalExporterIPv6Address, it SHOULD NOT modify those values when composing new Flow Records. Known exceptions include anonymization and an Intermediate Correlation Process rewriting addresses across NAT.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - measurement
