document: rfc-5875
kind: normative-requirement
summary: 'The notifier MUST NOT use a more complex diff-processing mode than the one chosen by the subscriber. From least to most complex: ''no-patching'', ''xcap-patching'', ''aggregate''. The notifier may respond to an ''aggregate'' request using any mode, but cannot reply to an ''xcap-patching'' subscription using the ''aggregate'' mode.'
section: "4.7"
rfc2119_level: MUST NOT
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
