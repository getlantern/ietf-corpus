document: rfc-7471
kind: normative-requirement
summary: Any measurement of link propagation delay SHOULD NOT vary significantly based upon offered traffic load and SHOULD NOT include queuing delays. For forwarding adjacencies, measurement must avoid significant queuing delay.
section: "1"
rfc2119_level: SHOULD NOT
topics:
    - routing
    - measurement
