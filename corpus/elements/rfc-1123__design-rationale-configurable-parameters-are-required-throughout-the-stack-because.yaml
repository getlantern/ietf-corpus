document: rfc-1123
kind: design-rationale
summary: Configurable parameters are required throughout the stack because values depend on external factors, specifications may evolve, and some configurations are needed to coexist with faulty implementations. Default values MUST implement the official protocol rather than mis-configurations accommodating broken peers.
section: 1.2.4
