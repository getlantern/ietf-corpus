document: rfc-4018
kind: normative-requirement
summary: When auth-name, auth-addr, auth-cred, or boot-list attributes are distributed via SLPv2, IPsec MUST be implemented. If IPsec is not implemented, these attributes MUST NOT be distributed via SLPv2 and MUST NOT be used if discovered via SLPv2.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
