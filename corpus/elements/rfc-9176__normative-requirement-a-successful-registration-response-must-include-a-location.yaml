document: rfc-9176
kind: normative-requirement
summary: A successful registration response MUST include a Location-Path option (or Location header for HTTP) containing a stable identifier generated by the RD. The location MUST NOT have a query or fragment component, and the Location-Query option MUST NOT be present.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
