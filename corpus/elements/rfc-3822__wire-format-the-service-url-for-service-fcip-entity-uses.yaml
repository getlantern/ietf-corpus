document: rfc-3822
kind: wire-format
summary: 'The service URL for ''service:fcip:entity'' uses a hostport syntax: host (DNS hostname or IPv4 dotted-decimal) optionally followed by '':'' and a decimal port number, e.g., ''service:fcip:entity://host.example.com'' or ''service:fcip:entity://192.0.2.0:4000''.'
section: "5.2"
