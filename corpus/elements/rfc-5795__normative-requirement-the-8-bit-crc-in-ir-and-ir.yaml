document: rfc-5795
kind: normative-requirement
summary: The 8-bit CRC in IR and IR-DYN headers MUST cover at least the initial part of the header ending with the Profile field, including any CID or Add-CID octet; padding and feedback are excluded.
section: 5.3.1.1
rfc2119_level: MUST
topics:
