document: rfc-5547
kind: normative-requirement
summary: The file transfer identifier MUST be unique within the current session and is RECOMMENDED to be unique across different sessions; a relatively large random identifier (e.g., 32 characters) is RECOMMENDED to avoid duplications.
section: "8.1"
rfc2119_level: MUST
