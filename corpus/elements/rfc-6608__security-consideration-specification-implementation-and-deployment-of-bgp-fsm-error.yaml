document: rfc-6608
kind: security-consideration
summary: Specification, implementation, and deployment of BGP FSM Error subcodes could make BGP implementation fingerprinting easier and more accurate, since different implementations may send distinct subcodes. Operators should consider this as an operational security concern when making BGP deployment decisions.
section: "5"
topics:
