document: rfc-7870
kind: normative-requirement
summary: The dsliteNATBindMappingIntAddressType MUST be set to iPv4z(3); values of ipv4(1), ipv6(2), and ipv6z(4) are not allowed. This reflects that the internal address is an IPv6 tunnel source address with zone ID.
section: "8"
rfc2119_level: MUST
topics:
