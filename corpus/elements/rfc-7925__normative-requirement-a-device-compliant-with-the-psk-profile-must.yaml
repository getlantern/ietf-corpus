document: rfc-7925
kind: normative-requirement
summary: A device compliant with the PSK profile MUST implement TLS_PSK_WITH_AES_128_CCM_8 and follow all guidance in Section 4.2. This ciphersuite uses AES-128 in CCM mode with an 8-octet authentication tag and HMAC-SHA-256 as the PRF.
section: "4.2"
rfc2119_level: MUST
topics:
