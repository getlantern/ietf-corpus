document: rfc-6936
kind: normative-requirement
summary: A transported protocol with a non-tunnel payload or one encapsulating non-IP packets MUST include a CRC or other packet-integrity mechanism, unless the non-IP payload is specifically designed for a lower layer that does not provide packet integrity guarantees.
section: "5"
rfc2119_level: MUST
topics:
    - udp
    - ip
