document: rfc-7919
kind: protocol-element
summary: 'Peers using a known FFDHE group may employ short exponents to improve performance while retaining the same approximate security level. Each group specifies a minimum exponent bit length: ffdhe2048 ≥ 225 bits, ffdhe3072 ≥ 275 bits, ffdhe4096 ≥ 325 bits, ffdhe6144 ≥ 375 bits, ffdhe8192 ≥ 400 bits.'
section: "5.2"
