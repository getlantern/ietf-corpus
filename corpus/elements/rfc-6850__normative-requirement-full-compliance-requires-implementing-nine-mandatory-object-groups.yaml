summary: 'Full compliance requires implementing nine mandatory object groups: rbridgeBaseGroup, rbridgeBaseNicknameGroup, rbridgeBasePortGroup, rbridgeFdbGroup, rbridgeFibGroup, rbridgeVlanGroup, rbridgeDtreeGroup, rbridgeTrillGroup, and rbridgeNotificationGroup. Port counters, ESADI, and snooping groups are optional.'
