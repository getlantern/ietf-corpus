document: rfc-4734
kind: interoperability-note
summary: 'An initial ANS (V.25) or CED (T.30) event packet SHOULD NOT be sent until it is possible to discriminate it from ANSam (V.8): both use 2100 Hz, but ANSam is amplitude-modulated at 15 Hz whereas ANS/CED has constant amplitude.'
section: "2.4"
topics:
    - rtp
    - realtime
    - voip
