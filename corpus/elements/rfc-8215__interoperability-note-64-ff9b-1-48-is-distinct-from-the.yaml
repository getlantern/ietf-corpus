summary: 64:ff9b:1::/48 is distinct from the WKP 64:ff9b::/96. The restrictions on the WKP described in RFC 6052 Section 3.1 — including the prohibition on use with private IPv4 addresses (RFC 1918) — do not apply to 64:ff9b:1::/48.
