document: rfc-9186
kind: protocol-element
summary: A PIM-SM router configured to monitor the head via P2MP BFD is a 'tail'. When it receives a PIM Hello with the BFD Discriminator Option, the tail MAY create a P2MP BFD session of type MultipointTail as defined in RFC 8562.
section: "2.1"
topics:
    - multicast
    - routing
