document: rfc-4875
kind: protocol-element
summary: A P2MP LSP is constituted of one or more source-to-leaf (S2L) sub-LSPs, each identified by the P2MP SESSION tuple, the SENDER_TEMPLATE fields, and an S2L_SUB_LSP object carrying the destination address. S2L sub-LSPs are combined at branch LSRs via data replication to form the P2MP tree.
section: "4.4"
topics:
