document: rfc-8860
kind: security-consideration
summary: Sending multiple media types in a single RTP session generally requires all media to use the same security mechanism. When different media types have different security requirements, separate RTP sessions may be necessary, at the cost of increased resource usage and setup time.
section: "8"
topics:
    - rtp
    - realtime
    - security
