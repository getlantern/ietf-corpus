document: rfc-5403
kind: protocol-element
summary: 'RPCSEC_GSSv2 adds two new enumerated values: rpc_gss_svc_channel_prot = 4 in rpc_gss_service_t and RPCSEC_GSS_BIND_CHANNEL = 4 in rpc_gss_proc_t. The version constant RPCSEC_GSS_VERS_2 = 2 is also introduced; both RPCSEC_GSS_VERS_1 and RPCSEC_GSS_VERS_2 share the same credential body type rpc_gss_cred_vers_1_t.'
section: "3.2"
