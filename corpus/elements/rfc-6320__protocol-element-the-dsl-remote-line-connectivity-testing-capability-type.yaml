document: rfc-6320
kind: protocol-element
summary: The DSL Remote Line Connectivity Testing capability (Type 0x04) allows the NAS to initiate OAM loopback tests on DSL lines via a Port Management (OAM) message. Test parameters are carried in the OAM-Loopback-Test-Parameters TLV; test results are returned in an OAM-Loopback-Test-Response-String TLV. The same message type is used for both request and response, distinguished by the Result field.
section: "8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
