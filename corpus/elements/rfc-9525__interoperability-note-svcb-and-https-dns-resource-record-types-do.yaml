document: rfc-9525
kind: interoperability-note
summary: SVCB and HTTPS DNS resource record types do not currently alter any PKIX validation requirements specified herein. For example, PKIX validation rules for HTTP and DNS-over-TLS do not change when clients use SVCB-compatible records for connection lookup. Future SVCB mapping documents could specify altered rules for new use cases.
section: "2"
topics:
