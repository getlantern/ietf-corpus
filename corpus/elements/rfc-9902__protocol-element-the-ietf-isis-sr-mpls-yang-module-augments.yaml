document: rfc-9902
kind: protocol-element
summary: The 'ietf-isis-sr-mpls' YANG module augments the IS-IS base model (RFC 9130) with SR MPLS extensions, requiring support for the base SR module (RFC 9020). It defines data nodes for configuring IS-IS SR MPLS extensions and additions to IS-IS LSPs necessary to support MPLS SR.
