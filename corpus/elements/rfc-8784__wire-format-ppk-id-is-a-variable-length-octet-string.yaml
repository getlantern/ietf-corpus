document: rfc-8784
kind: wire-format
summary: PPK_ID is a variable-length octet string whose first octet is the PPK_ID type (1=PPK_ID_OPAQUE, 2=PPK_ID_FIXED). For PPK_ID_FIXED, the remaining bytes are the configured identifier value; it is recommended that both PPK and PPK_ID be limited to the base64 character set for interoperability.
section: "5.1"
