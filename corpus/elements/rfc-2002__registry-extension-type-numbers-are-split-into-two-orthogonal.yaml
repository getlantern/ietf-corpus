document: rfc-2002
kind: registry
summary: 'Extension Type numbers are split into two orthogonal namespaces: Mobile IP control message extensions (Types 32 Mobile-Home Auth, 33 Mobile-Foreign Auth, 34 Foreign-Home Auth) and ICMP Router Discovery extensions (Types 0 One-byte Padding, 16 Mobility Agent Advertisement, 19 Prefix-Lengths). Up-to-date values are maintained in Assigned Numbers.'
