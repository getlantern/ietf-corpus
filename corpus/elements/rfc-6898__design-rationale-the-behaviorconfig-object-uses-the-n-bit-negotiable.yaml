document: rfc-6898
kind: design-rationale
summary: The BehaviorConfig object uses the N-bit (negotiable) to allow the object's flags to be subject to negotiation, consistent with the LMP object header convention. This ensures that nodes can signal willingness to accept different capability sets rather than treating the values as fixed requirements.
section: "3.2"
topics:
    - mpls
