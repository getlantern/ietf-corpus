document: rfc-2853
kind: interoperability-note
summary: The gss_process_context_token routine from RFC 2743 has no equivalent in the Java bindings. Additionally, gss_delete_sec_context (mapped to GSSContext.dispose()) has been modified to not return any peer tokens, in accordance with RFC 2743 recommendations.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
