document: rfc-2079
kind: interoperability-note
summary: The labeledURL attribute type (OID 1.3.6.1.4.1.250.1.41) is deprecated and should not be used for new directory entries. Directory client software may support it alongside labeledURI to ease the transition for sites already using labeledURL.
section: 'Appendix: The labeledURL Attribute Type (Deprecated)'
