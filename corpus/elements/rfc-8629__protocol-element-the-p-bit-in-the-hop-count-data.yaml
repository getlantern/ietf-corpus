document: rfc-8629
kind: protocol-element
summary: The P-bit in the Hop Count Data Item indicates a destination is potentially directly reachable, enabling a router to request a direct link via the Hop Control Data Item. The P-bit MUST be ignored when Hop Count is 1.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
