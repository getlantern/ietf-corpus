document: rfc-8559
kind: normative-requirement
summary: When a home network sends a CoA-Request or Disconnect-Request to a visited network, it MUST include an Operator-Name attribute whose value MUST be exactly the value recorded earlier for that user session. The home network MUST look up the realm in a logical AAA routing table to find the next-hop CoA server.
section: "3.2"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
