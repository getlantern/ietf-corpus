document: rfc-8986
kind: normative-requirement
summary: For H.Encaps.L2, the Next Header field of the SRH MUST be set to 143 (Ethernet). The encapsulating node MUST remove the preamble and FCS from the Ethernet frame upon encapsulation, and the decapsulating node MUST regenerate the preamble and FCS before forwarding.
section: "5.3"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
