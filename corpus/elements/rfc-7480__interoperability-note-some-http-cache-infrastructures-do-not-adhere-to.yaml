document: rfc-7480
kind: interoperability-note
summary: Some HTTP cache infrastructures do not adhere to caching standards and may cache responses longer than intended. Clients can use an improbably-named query parameter with a random value for cache busting, since servers must ignore unknown parameters per Section 4.3.
section: Appendix B
topics:
    - http
