document: rfc-6762
kind: privacy-consideration
summary: mDNS responses are sent to the link-local multicast address, making all mDNS traffic visible to every device on the local network. Device names, service types, and other advertised metadata can reveal information about the device and its owner to any local observer.
section: "21"
topics:
