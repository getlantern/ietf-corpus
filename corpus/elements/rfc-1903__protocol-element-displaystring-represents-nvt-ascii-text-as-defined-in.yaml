summary: DisplayString represents NVT ASCII text as defined in RFC 854, using character codes 0–127. Any object using this syntax may not exceed 255 characters in length. SYNTAX is OCTET STRING (SIZE (0..255)) with DISPLAY-HINT '255a'.
