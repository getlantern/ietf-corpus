document: rfc-1904
kind: design-rationale
summary: AGENT-CAPABILITIES specifies refinements and variations relative to OBJECT-TYPE and NOTIFICATION-TYPE macros in MIB modules, explicitly not relative to MODULE-COMPLIANCE macros. This distinction separates what the standard requires from what a particular agent actually delivers.
