document: rfc-5574
kind: normative-requirement
summary: An application MUST be able to decode any Speex frame unless the SDP clearly specifies that some modes are not supported (e.g., by not including 'mode="any"'). Indicating support for a set of decoding modes also implies support for the same encoding modes.
section: 4.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
