document: rfc-1864
kind: wire-format
summary: The MD5 algorithm produces a 128-bit digest, yielding 16 octets in network byte order (big-endian). These 16 octets are then base64-encoded to produce the Content-MD5 field value (e.g., 'Q2hlY2sgSW50ZWdyaXR5IQ==').
