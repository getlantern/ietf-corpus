document: rfc-9662
kind: interoperability-note
summary: To maintain interoperability across implementations, both TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256 and TLS_RSA_WITH_AES_128_CBC_SHA are mandatory-to-implement; either may be used, but the ECDHE suite must be preferred so that implementations interoperate while providing an acceptable level of security.
