document: rfc-5534
kind: interoperability-note
summary: SCTP and future multipath transport protocols are likely to require interaction with Shim6 to ensure they do not employ Shim6 unexpectedly, since Shim6 restricts traffic to a single current address pair for congestion control reasons.
