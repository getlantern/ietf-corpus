document: rfc-4667
kind: normative-requirement
summary: The MTU values of a given pseudowire, if advertised in both directions via the Interface MTU AVP, MUST be identical. If they do not match, the pseudowire SHOULD NOT be established.
section: "4.3"
rfc2119_level: MUST
topics:
    - vpn
