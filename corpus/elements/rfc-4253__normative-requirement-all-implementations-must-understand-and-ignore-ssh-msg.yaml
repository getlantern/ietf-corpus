document: rfc-4253
kind: normative-requirement
summary: All implementations MUST understand and ignore SSH_MSG_IGNORE at any time after receiving the identification string. This message can be used as an additional protection measure against advanced traffic analysis techniques.
section: "11.2"
rfc2119_level: MUST
topics:
