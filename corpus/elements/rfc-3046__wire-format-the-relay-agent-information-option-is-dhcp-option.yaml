document: rfc-3046
kind: wire-format
summary: The Relay Agent Information option is DHCP option 82. It consists of a 1-octet code (82), a 1-octet length N giving total octets in the Agent Information Field, followed by N octets of sub-option tuples. The minimum length is 2, requiring at least one sub-option.
section: "2.0"
topics:
