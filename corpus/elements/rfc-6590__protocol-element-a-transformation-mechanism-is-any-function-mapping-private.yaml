document: rfc-6590
kind: protocol-element
summary: A transformation mechanism is any function mapping private data to an obscured output string. Acceptable examples range from trivial encodings (rot13, CRC32, base64) to cryptographic constructs (HMAC-SHA1, full encryption) or internal mappings such as email-address-to-customer-number. The chosen function must be applied consistently across all reports from the same generator.
section: "4"
topics:
