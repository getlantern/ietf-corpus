document: rfc-7865
kind: protocol-element
summary: The CS-RS Association class ('sessionrecordingassoc' element) records the association of a CS to an RS over time. A single CS may be associated with different RSs by different SRCs and may be associated/dissociated multiple times. Its required attribute session_id references the CS; associate-time and disassociate-time mark the period.
section: "6.4"
topics:
    - sip
    - realtime
