document: rfc-6313
kind: protocol-element
summary: 'Six structured data type semantics express relationships among list elements: undefined (default), noneOf (no element is a property of the record), exactlyOneOf (logical XOR), oneOrMoreOf (logical OR), allOf (all elements apply), and ordered (elements are sequentially ordered). These require a new IANA subregistry.'
section: "4.4"
topics:
