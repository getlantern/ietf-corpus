document: rfc-3021
kind: normative-requirement
summary: 'RFC 1122 new Section 3.2.1.3(h): the subnetwork number {<Network-number>, <Subnet-number>, 0} SHOULD NOT be used as a source address except for endpoints of a 31-bit point-to-point link. For other link types, packets with this destination SHOULD be silently discarded; if not discarded, they MUST be treated as IP broadcasts.'
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
