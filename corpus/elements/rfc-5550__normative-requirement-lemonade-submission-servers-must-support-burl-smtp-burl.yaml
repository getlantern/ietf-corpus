document: rfc-5550
kind: normative-requirement
summary: Lemonade Submission Servers MUST support BURL [SMTP-BURL], and BURL MUST support URLAUTH-type URLs; the server MUST advertise the 'imap' option following the BURL EHLO keyword. This enables the Submission Server to fetch message content directly from an IMAP server.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
