kind: protocol-element
summary: nhrpCacheHoldingTime (Unsigned32, 0..65535 seconds) specifies how long a cache entry remains valid. It is only meaningful when nhrpCacheHoldingTimeValid is true(1), which is the case for all entries not administratively added.
