summary: 'For TDM switching capability, the capability-specific information field includes Minimum LSP Bandwidth (4-octet IEEE float, bytes/sec) and a 1-octet indication: 0 = Standard SONET/SDH, 1 = Arbitrary SONET/SDH. For L2SC and LSC, no capability-specific field is present.'
