document: rfc-8650
kind: security-consideration
summary: If a buggy or compromised RESTCONF subscriber sends many 'establish-subscription' requests, subscriptions may accumulate and exhaust system resources; the publisher MAY suspend or terminate a subset of active subscriptions from that subscriber to reclaim resources.
section: "9"
topics:
    - security
    - netconf
