document: rfc-1332
kind: design-rationale
summary: The IP-Addresses Configuration Option (Type 1) has been deprecated. Implementation experience showed it is difficult to ensure negotiation convergence in all cases using this option. The IP-Address option (Type 3) replaces it and its use is preferred.
section: "3.1"
topics:
