document: rfc-5034
kind: normative-requirement
summary: If a server does not support the CAPA command or does not advertise the SASL capability, clients SHOULD NOT attempt the AUTH command. If a client does attempt AUTH in such a situation, it MUST NOT supply the client initial response parameter for backwards compatibility with RFC 1734.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
