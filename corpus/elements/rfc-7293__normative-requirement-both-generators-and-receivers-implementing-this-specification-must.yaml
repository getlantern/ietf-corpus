document: rfc-7293
kind: normative-requirement
summary: Both generators and receivers implementing this specification MUST use a standard clock synchronization protocol such as NTP (RFC 5905) to synchronize to a common clock, minimizing risk of incorrect evaluation results due to clock skew.
section: "5.3"
rfc2119_level: MUST
topics:
