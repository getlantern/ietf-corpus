document: rfc-2045
kind: design-rationale
summary: 'Two transfer encodings are defined (quoted-printable and base64) because there is a tradeoff: quoted-printable preserves human readability for mostly-7bit data, while base64 provides compact uniform encoding for largely binary data. A single encoding cannot optimize for both.'
