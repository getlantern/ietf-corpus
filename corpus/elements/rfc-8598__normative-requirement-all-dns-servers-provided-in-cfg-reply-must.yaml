document: rfc-8598
kind: normative-requirement
summary: All DNS servers provided in CFG_REPLY MUST support resolving hostnames within all INTERNAL_DNS_DOMAIN domains; INTERNAL_DNS_DOMAIN attributes form a single list applying to the entire set of INTERNAL_IP4_DNS and INTERNAL_IP6_DNS addresses.
section: "3.3"
rfc2119_level: MUST
topics:
    - ipsec
    - dns
    - vpn
