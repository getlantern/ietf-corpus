document: rfc-3273
kind: protocol-element
summary: mediaIndependentTable (OID { rmon 21 }) provides media-independent statistics for promiscuous monitoring of any interface type, including both half-duplex and full-duplex links, with separate In/Out counters for packets, octets, and non-unicast packets at both 32-bit and 64-bit granularity.
