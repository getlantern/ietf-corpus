document: rfc-4552
kind: normative-requirement
summary: A different SA than the SA of the underlying interface MUST be provided for virtual links, because virtual link packets use unicast non-link-local IPv6 source addresses while other interfaces use multicast and unicast link-local addresses.
section: "9"
rfc2119_level: MUST
topics:
