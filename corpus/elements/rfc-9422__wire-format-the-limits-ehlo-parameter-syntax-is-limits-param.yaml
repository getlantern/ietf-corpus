document: rfc-9422
kind: wire-format
summary: 'The LIMITS EHLO parameter syntax is: limits-param = limit-name-value 0*[SP limit-name-value]; limit-name-value = limit-name ["=" limit-value]; limit-name = 1*(ALPHA / DIGIT / "-" / "_"); limit-value = 1*(%x21-3A / %x3C-7E). Limit values are ASCII VCHARs excluding semicolons.'
section: "3"
