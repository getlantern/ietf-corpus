document: rfc-5751
kind: protocol-element
summary: 'Four CMS content types are used in S/MIME: Data (inner MIME content), SignedData (digital signatures or certificate transport), EnvelopedData (confidentiality), and CompressedData (size reduction without security). CompressedData provides no authentication, integrity, non-repudiation, or confidentiality.'
