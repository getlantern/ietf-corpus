document: rfc-4856
kind: design-rationale
summary: 'RFC 3555 is split into two documents: RFC 4855 retains the procedures and requirements, while RFC 4856 extracts the media type registrations. Media type registrations for RTP payload formats defined in other RFCs are omitted and left to be updated by those individual RFCs.'
