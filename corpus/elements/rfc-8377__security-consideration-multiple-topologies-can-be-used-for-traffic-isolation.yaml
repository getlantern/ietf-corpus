document: rfc-8377
kind: security-consideration
summary: Multiple topologies can be used for traffic isolation and security; for instance, sensitive traffic can be placed in a topology that excludes links prone to adversarial observation. Delivery of data originating in one topology outside that topology is a security policy violation. Using IS-IS security (RFC 5310) on all IS-IS PDUs and link-layer security on all links is recommended to prevent such violations.
section: "7"
topics:
    - security
    - routing
