document: rfc-8754
kind: design-rationale
summary: The HMAC Key ID field is opaque, identifying both the pre-shared key and the hash algorithm, which allows simultaneous support for multiple hash algorithms (SHA-256, SHA3-256, etc.) and enables key rollover by using two key IDs during transition.
