document: rfc-8205
kind: normative-requirement
summary: 'Validation checks include: syntactic correctness; the most-recently-added Secure_Path Segment AS matches the peer''s AS from OPEN; Signature_Block count of Signature Segments equals count of Secure_Path Segments; no AS_PATH present; and AS loop detection. BGPsec speakers MUST handle errors using ''treat-as-withdraw'' (RFC 7606).'
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
