document: rfc-9203
kind: security-consideration
summary: OSCORE is designed for point-to-point communication; this profile MUST NOT be used for point-to-multipoint scenarios (e.g., multicast, publish-subscribe), as doing so weakens OSCORE's security assurances.
section: "7"
rfc2119_level: MUST NOT
topics:
