document: rfc-9353
kind: design-rationale
summary: TCP security-related key parameters must be known before the PCEP session is established and PCEP Open messages are exchanged, which is why IGP advertisement and flooding mechanisms must be used for PCE security capability discovery rather than the PCEP Open message exchange.
