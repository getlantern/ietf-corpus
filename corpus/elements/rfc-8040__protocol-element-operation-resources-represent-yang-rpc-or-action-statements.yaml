document: rfc-8040
kind: protocol-element
summary: Operation resources represent YANG 'rpc' or 'action' statements. RPC operations are invoked via 'POST {+restconf}/operations/<module>:<operation>'; YANG actions are invoked via 'POST {+restconf}/data/<data-resource-identifier>/<action>'. If no output section exists, the server MUST return '204 No Content'.
section: "3.6"
topics:
    - netconf
    - yang
    - http
