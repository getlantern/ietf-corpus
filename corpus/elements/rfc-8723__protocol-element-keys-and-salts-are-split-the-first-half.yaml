summary: 'Keys and salts are split: the first half of the combined key and salt drives the inner (end-to-end) algorithm, and the second half drives the outer (hop-by-hop) algorithm. SSRC is shared between both algorithms; sequence number (SEQ) and rollover counter (ROC) are tracked independently for each.'
