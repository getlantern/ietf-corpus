document: rfc-2056
kind: protocol-element
summary: The elementset parameter (esn) specifies the element set used to select which logical elements of a database record are included in the retrieval record. The recordsyntax parameter (rs) specifies the exportable packaging format for the retrieval record; multiple syntaxes may be listed separated by '+'.
