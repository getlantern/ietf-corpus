document: rfc-4090
kind: normative-requirement
summary: When the PLR detects a failure on the protected LSP, it MUST rapidly switch packets to the backup LSP within tens of milliseconds. The goal is to effect the redirection with no path computation or signaling delays.
section: 6.3.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
