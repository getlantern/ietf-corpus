document: rfc-7170
kind: protocol-element
summary: The Crypto-Binding TLV (type 12) cryptographically binds inner EAP method(s) to the outer TLS tunnel, proving that both peer and server participated in tunnel establishment and the inner authentication sequence. It also verifies the TEAP type, negotiated version, and Outer TLVs exchanged before tunnel establishment.
