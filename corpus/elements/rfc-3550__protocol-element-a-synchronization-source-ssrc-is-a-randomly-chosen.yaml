document: rfc-3550
kind: protocol-element
summary: A Synchronization Source (SSRC) is a randomly chosen 32-bit identifier carried in every RTP packet header that uniquely identifies an RTP stream within a session. All packets from one SSRC share a single timing and sequence number space. If a participant generates multiple streams in one session, each MUST use a different SSRC.
section: "3"
