kind: protocol-element
summary: 'The NAPTR record key fields are: order (sequence for processing multiple records), preference (tie-break within same order), service (resolution protocol and services), flags (modifiers for next DNS lookup), regexp (rewrite rule core), and replacement (alternative rewrite field). Clients apply all substitutions; DNS servers do not.'
