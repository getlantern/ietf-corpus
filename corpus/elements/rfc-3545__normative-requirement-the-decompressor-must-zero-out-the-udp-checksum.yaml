document: rfc-3545
kind: normative-requirement
summary: The decompressor MUST zero out the UDP checksum field in the reconstructed packets when HDRCKSUM is used. Note that HDRCKSUM is never used with IPv6 since a null UDP checksum is not allowed in IPv6.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
