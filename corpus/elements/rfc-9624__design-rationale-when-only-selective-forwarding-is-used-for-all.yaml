document: rfc-9624
kind: design-rationale
summary: When only selective forwarding is used for all flows without tunnel segmentation, SMET routes suffice without S-PMSI A-D routes, reducing signaling overhead. S-PMSI/Leaf A-D routes are only needed when some traffic uses I-PMSI or when tunnel segmentation is required.
section: 2.2.1
topics:
    - multicast
    - routing
