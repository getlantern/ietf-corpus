document: rfc-3680
kind: normative-requirement
summary: If the contact event attribute is "shortened", the "expires" attribute MUST be present, containing the seconds remaining until binding expiry. If the event is "probation", the "retry-after" attribute MUST be present with the retry delay in seconds.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
