document: rfc-9147
kind: normative-requirement
summary: Any TLS cipher suite specified for use with DTLS MUST define limits on AEAD usage preserving margins for both confidentiality (authenticated-packet count) and integrity (failed-authentication count), and MUST provide a reference to supporting analysis including all assumptions.
section: 4.5.3
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - security
