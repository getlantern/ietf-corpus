document: rfc-6936
kind: normative-requirement
summary: Keepalive messages SHOULD include both UDP datagrams with a calculated checksum and datagrams with a zero UDP checksum, so the remote endpoint can distinguish between a general path failure and selective dropping of zero-checksum datagrams.
section: "5"
rfc2119_level: SHOULD
topics:
