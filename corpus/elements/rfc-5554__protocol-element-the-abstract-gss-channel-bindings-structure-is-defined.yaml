document: rfc-5554
kind: protocol-element
summary: 'The abstract GSS-CHANNEL-BINDINGS structure is defined as a SEQUENCE containing: initiator-address-type (INTEGER), initiator-address (OCTET STRING), acceptor-address-type (INTEGER), acceptor-address (OCTET STRING), and application-data (OCTET STRING). Address field semantics follow RFC 2744; application-data follows RFC 5056.'
