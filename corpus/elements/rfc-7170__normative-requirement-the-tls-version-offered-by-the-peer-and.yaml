document: rfc-7170
kind: normative-requirement
summary: The TLS version offered by the peer and server MUST be TLS 1.2 or later. Implementations MUST support TLS_RSA_WITH_AES_128_CBC_SHA and TLS_DHE_RSA_WITH_AES_128_CBC_SHA; SHOULD support TLS_RSA_WITH_AES_256_CBC_SHA. TLS ciphersuites that do not provide confidentiality MUST NOT be used.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
