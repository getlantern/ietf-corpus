document: rfc-5847
kind: normative-requirement
summary: The Restart Counter MUST NOT be incremented if recovery happens without losing state for the PMIPv6 sessions active at the time of failure, ensuring the counter only signals stateful restarts.
section: "3.2"
rfc2119_level: MUST NOT
