document: rfc-7153
kind: registry
summary: 'BGP Transitive Extended Community Types registry: range 0x00-0x3F is First Come First Served, 0x80-0x8F is Experimental Use, 0x90-0xBF is Standards Action. Assigned values include 0x00 (Two-Octet AS-Specific), 0x01 (IPv4-Address-Specific), 0x02 (Four-Octet AS-Specific), 0x03 (Opaque), 0x04 (QoS Marking), 0x05 (CoS Capability), 0x06 (EVPN), 0x08 (Flow spec redirect), 0x80 (Generic Transitive Experimental).'
section: 5.1.1
topics:
    - bgp
    - routing
    - registry
