document: rfc-2822
kind: normative-requirement
summary: The message identifier (msg-id) MUST be a globally unique identifier for a message, and the generator MUST guarantee its uniqueness. The recommended approach is to use the generating host's domain name on the right of '@' and a timestamp plus unique token on the left.
section: 3.6.4
rfc2119_level: MUST
topics:
    - email
