document: rfc-3945
kind: normative-requirement
summary: The choice of which component link to use for an LSP traversing a bundled link is always made by the upstream node. For bi-directional LSPs, the upstream node selects a component link in each direction.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
