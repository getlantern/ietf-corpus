document: rfc-8434
kind: normative-requirement
summary: The metadata server MUST be able to restrict access to a file on the storage devices when it revokes a layout. Revocation typically occurs when a client fails to respond to a recall or a client's lease expires; it may also enforce locking state or access permission changes that the storage device cannot directly enforce.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
