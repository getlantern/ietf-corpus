document: rfc-5021
kind: design-rationale
summary: The high-order bit in the TCP length field was already reserved in RFC 4120 section 7.2.2 for future expansion. This document repurposes that reserved bit as an extension signaling mechanism, avoiding any backward-incompatible change to the base Kerberos framing.
section: "1"
topics:
