document: rfc-4960
kind: interoperability-note
summary: A sender MUST NOT use IPv4-mapped IPv6 addresses in the IPv6 Address parameter; a separate IPv4 Address parameter MUST be used instead. Omitting all IP Address parameters from INIT and INIT ACK is an alternative approach that improves NAT traversal compatibility.
section: 3.3.2.1
topics:
    - sctp
    - ip
    - nat
    - v6ops
