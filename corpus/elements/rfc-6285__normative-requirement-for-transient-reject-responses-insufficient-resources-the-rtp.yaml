document: rfc-6285
kind: normative-requirement
summary: For transient reject responses (insufficient resources), the RTP_Rx MUST follow RFC 4585 timer rules before retrying. For non-transient reject responses (e.g., response codes 504, 505, 506), the RTP_Rx MUST NOT attempt a retry.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
