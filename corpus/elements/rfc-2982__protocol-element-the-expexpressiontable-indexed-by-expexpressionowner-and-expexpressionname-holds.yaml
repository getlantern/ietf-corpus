summary: The expExpressionTable, indexed by expExpressionOwner and expExpressionName, holds the expression string (expExpression, up to 1024 bytes of ANSI C subset syntax), the result value type, optional delta sampling interval, and a RowStatus control. All related expObjectTable and expErrorTable entries are deleted when an expression entry is deleted.
