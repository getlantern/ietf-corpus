document: rfc-9684
kind: security-consideration
summary: The attester-supported-algos container could be populated with algorithms not supported by the underlying physical TPM. Vendors should restrict the ability to configure unsupported algorithms. The ietf-tcg-algs module notes that some algorithms (e.g., SHA1) are considered legacy and should be evaluated carefully before use.
section: "4"
topics:
