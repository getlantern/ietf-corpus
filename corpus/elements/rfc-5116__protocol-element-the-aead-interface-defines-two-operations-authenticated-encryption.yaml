document: rfc-5116
kind: protocol-element
summary: 'The AEAD interface defines two operations: authenticated encryption (inputs K, N, P, A; output C) and authenticated decryption (inputs K, N, A, C; output P or FAIL). Both confidentiality and message authentication are provided on plaintext P, while associated data A is authenticated but not encrypted.'
