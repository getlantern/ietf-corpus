document: rfc-1908
kind: normative-requirement
summary: For all objects, the ACCESS clause must be replaced by a MAX-ACCESS clause. If the ACCESS clause value is 'write-only', the MAX-ACCESS clause value must be 'read-write' and the DESCRIPTION clause must note that reading the object produces implementation-specific results.
section: "2.1"
rfc2119_level: MUST
topics:
    - snmp
