document: rfc-9495
kind: normative-requirement
summary: If the Relevant RRSet is empty or contains no "issuemail" Properties, there are no restrictions on email certificate issuance for that domain. The presence of other Property Tags such as "issue" or "issuewild" does NOT restrict the issuance of certificates that certify email addresses.
section: "4"
rfc2119_level: MUST NOT
topics:
    - dns
    - pkix
    - security
