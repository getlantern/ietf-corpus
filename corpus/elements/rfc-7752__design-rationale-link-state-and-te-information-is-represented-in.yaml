document: rfc-7752
kind: design-rationale
summary: Link-state and TE information is represented in an IGP-neutral encoding so that consuming applications (PCE, ALTO) do not need protocol-specific knowledge of OSPF or IS-IS. TLV encodings were drawn from IS-IS sub-TLV formats but are defined to carry data sourced by either IS-IS or OSPF.
section: "3"
topics:
