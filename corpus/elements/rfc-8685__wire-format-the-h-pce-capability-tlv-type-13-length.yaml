document: rfc-8685
kind: wire-format
summary: 'The H-PCE-CAPABILITY TLV (Type=13, Length=4) is carried in the OPEN object to advertise H-PCE support. Its 32-bit Flags field contains the P bit (bit 31): when set by a child PCE, it requests the peer to act as a parent PCE.'
section: 3.2.1
