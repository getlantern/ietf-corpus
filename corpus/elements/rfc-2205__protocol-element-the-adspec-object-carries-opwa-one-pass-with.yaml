document: rfc-2205
kind: protocol-element
summary: The ADSPEC object carries OPWA (One Pass With Advertising) information in Path messages. Each node's traffic control updates the Adspec as it travels downstream, collecting path characteristics so receivers can predict end-to-end QoS and construct or dynamically adjust reservation requests before committing to a Resv.
section: "2.1"
topics:
