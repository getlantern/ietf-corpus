document: rfc-5332
kind: normative-requirement
summary: On a multipoint-to-multipoint link where both upstream-assigned and downstream-assigned top labels may appear (scenario 3), the data link or tunnel encapsulation MUST provide a codepoint distinguishing the two types. If no such codepoint exists, scenario 3 MUST NOT be used.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
