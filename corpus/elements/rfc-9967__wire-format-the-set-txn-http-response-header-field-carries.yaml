document: rfc-9967
kind: wire-format
summary: The 'Set-Txn' HTTP response header field carries a unique STRING (e.g., a GUID) that the SCIM client uses to correlate a 202 Accepted response with a future SET event's 'txn' claim. Intermediaries SHOULD NOT insert, modify, or delete the field's value.
