document: rfc-3275
kind: wire-format
summary: 'The ds:CryptoBinary simple type encodes arbitrary-length integers as base64 [MIME] octet strings: the integer is converted to big-endian bitstring, padded to a multiple of 8 bits, leading zero octets are removed, then base64-encoded. Used for RSA/DSA key parameters.'
