document: rfc-8898
kind: state-machine
summary: 'UAC authentication flow: (1) send request without credentials → receive 401/407 with Bearer challenge → (2) obtain tokens from AS → (3) retry request with Authorization: Bearer <token>. If token is rejected (new 401/407), return to step 2. If AS address is preconfigured, step 1 is skipped.'
section: 2.1.1
topics:
    - sip
    - oauth
