document: rfc-8255
kind: normative-requirement
summary: If a language-independent part is present it MUST be the last part and MUST carry a Content-Language field with value 'zxx' (BCP 47 tag for 'no linguistic content'). It SHOULD use Content-Type 'message/rfc822' or 'message/global' to match the language parts.
section: "3.3"
rfc2119_level: MUST
