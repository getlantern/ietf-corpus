document: rfc-8946
kind: wire-format
summary: A "div" PASSporT header MUST include "typ":"passport", "ppt":"div", "alg":"ES256", and "x5u" pointing to the retargeting entity's credential. The claims set includes "orig" (copied from the original PASSporT), "dest" (the new target), "iat", and the "div" field (the previous destination identifier).
