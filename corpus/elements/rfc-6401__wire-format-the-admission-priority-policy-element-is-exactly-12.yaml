document: rfc-6401
kind: wire-format
summary: 'The Admission Priority Policy Element is exactly 12 bytes: Length (16 bits, always 12), P-Type (16 bits, 0x05), Flags (8 bits, reserved), Merge Strategy (8 bits), Error Code (8 bits), Reserved (8 bits), Reserved (24 bits), and Adm. Priority (8 bits, unsigned). Higher priority values represent higher priority.'
section: "5.1"
