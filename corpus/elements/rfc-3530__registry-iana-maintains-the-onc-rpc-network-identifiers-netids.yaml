document: rfc-3530
kind: registry
summary: IANA maintains the ONC RPC Network Identifiers (netids) registry. NFS v4 specifies the netid strings 'tcp', 'udp', 'tcp6', and 'udp6' for use in the clientaddr4 r_netid field to identify the transport and address family.
