document: rfc-3515
kind: security-consideration
summary: 'Authorization for REFER requests requires care: a UA should prompt the user with the full URI before acting on it, since display names in Refer-To may be misleading (e.g., ''president'' may map to an unrelated telemarketing URI). Pre-configured policy may authorize certain classes of REFER (e.g., call transfer within an existing dialog to sip:/sips:/tel: URIs) without interactive prompting.'
section: "5.2"
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
