document: rfc-8277
kind: protocol-element
summary: The Multiple Labels Capability (BGP Capability Code 8, assigned by IANA) is a new BGP Optional Capabilities parameter that allows two BGP speakers to negotiate per-AFI/SAFI support for binding a sequence of more than one MPLS label to an address prefix. It is new to this document and does not appear in RFC 3107.
section: "2.1"
topics:
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
