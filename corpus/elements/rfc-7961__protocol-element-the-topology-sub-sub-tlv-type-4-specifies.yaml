document: rfc-7961
kind: protocol-element
summary: The Topology sub-sub-TLV (type 4) specifies the 12-bit topology number in which the interfaces are reachable. Length MUST be 2; any other value causes the sub-sub-TLV to be ignored. The top 4 bits are reserved and must be sent as zero.
section: "3.4"
topics:
    - routing
