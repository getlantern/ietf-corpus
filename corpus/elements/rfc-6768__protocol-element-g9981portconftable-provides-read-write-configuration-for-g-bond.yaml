document: rfc-6768
kind: protocol-element
summary: 'g9981PortConfTable provides read-write configuration for G.Bond/ATM ports, indexed by ifIndex, containing three objects: g9981PortConfUpDiffDelayTolerance (0..2047 ms), g9981PortConfDnDiffDelayTolerance (0..2047 ms), and g9981PortConfDiffDelayToleranceExceededEnable (TruthValue). These objects are only applicable to GBS-C ports.'
