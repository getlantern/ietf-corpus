document: rfc-4568
kind: interoperability-note
summary: SIP forking can produce multiple answers to a single offer, creating multipoint scenarios that are outside the scope of SRTP security descriptions. A suggested (non-normative) workaround is to issue a new offer with a new receive transport address for each answer beyond the initial one, using SIP UPDATE and security preconditions.
section: "7.3"
topics:
    - realtime
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
