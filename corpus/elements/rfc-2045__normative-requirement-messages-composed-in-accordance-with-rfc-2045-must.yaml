document: rfc-2045
kind: normative-requirement
summary: Messages composed in accordance with RFC 2045 MUST include a MIME-Version header field with the verbatim value '1.0'. This field is required at the top level of a message but not for each body part of a multipart entity.
section: "4"
rfc2119_level: MUST
