document: rfc-3805
kind: interoperability-note
summary: IPP channels (chIPP, value 44) use the prtChannelInformation object to carry a mandatory URI keyword (UTF-8, RFC 2396), an optional Auth keyword specifying authentication mechanism (none, requesting-user-name, basic, digest, certificate), and a Security keyword; an IPP Printer shall list all supported IPP URIs, one per channel entry.
section: "5"
topics:
