document: rfc-6901
kind: protocol-element
summary: Evaluation begins at the root value of the JSON document and processes each reference token sequentially. For JSON objects, the token identifies the member name via exact Unicode code-point comparison with no normalization. For JSON arrays, the token must be a non-negative base-10 integer index (no leading zeros) or the special character '-'.
