summary: 'Two mapping modes are defined: one-to-one mapping (one frame relay VC per pseudowire) and many-to-one mapping (port mode, where multiple frame relay VCs on a port map to one PW). Port mode encapsulation is identical to HDLC PW encapsulation (RFC4618).'
