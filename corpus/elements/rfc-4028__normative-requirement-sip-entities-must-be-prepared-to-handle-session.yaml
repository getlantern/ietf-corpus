document: rfc-4028
kind: normative-requirement
summary: SIP entities MUST be prepared to handle Session-Expires header field values of any duration greater than 90 seconds. The absolute minimum for the Session-Expires header field is 90 seconds; entities that insert it SHOULD NOT choose values less than 1800 seconds (30 minutes).
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
