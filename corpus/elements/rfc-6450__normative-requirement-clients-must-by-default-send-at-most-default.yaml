document: rfc-6450
kind: normative-requirement
summary: 'Clients MUST by default send at most Default-Client-Request-Rate Echo Request messages per second (RECOMMENDED value: 1). Servers MUST by default perform per-client rate limiting, responding to at most Default-Server-Rate-Limit messages per second per client (RECOMMENDED value: 1).'
section: "3.5"
rfc2119_level: MUST
topics:
    - multicast
    - security
