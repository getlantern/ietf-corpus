document: rfc-5584
kind: normative-requirement
summary: Validity checking of received audio packets MUST be performed. A malformed ATRAC frame MUST be discarded and decoder errors concealed in the audio output until a valid frame is decoded, preventing crashes or abnormal decoder behavior.
section: "10.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - security
