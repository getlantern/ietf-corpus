document: rfc-9756
kind: interoperability-note
summary: An implementation that is part of an experiment may receive an experimental Error-Type but not recognize the Error-value due to a faulty implementation, synchronization failure between implementations, or multiple experiments running simultaneously. An implementation receiving an unknown Error-value is not expected to do more than log the error and may close the PCEP session.
section: "3.2"
topics:
