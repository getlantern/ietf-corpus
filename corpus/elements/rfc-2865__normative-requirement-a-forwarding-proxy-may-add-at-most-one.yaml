document: rfc-2865
kind: normative-requirement
summary: A forwarding proxy MAY add at most one Proxy-State attribute per request (MUST NOT add more than one), and the added Proxy-State MUST appear after any other Proxy-States. When forwarding the response, it MUST remove its own Proxy-State and re-sign the Response Authenticator.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
