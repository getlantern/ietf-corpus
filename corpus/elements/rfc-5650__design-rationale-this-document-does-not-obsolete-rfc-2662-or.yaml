document: rfc-5650
kind: design-rationale
summary: This document does not obsolete RFC 2662 or RFC 4706. RFC 2662 remains appropriate for legacy ADSL-only modems, RFC 4706 for ADSL2 modems, and this document for the most sophisticated management model covering VDSL2/ADSL/ADSL2/ADSL2+ with a more capable feature set. MIB selection is driven by the ifType value reported by the modem.
section: "2"
