document: rfc-3550
kind: wire-format
summary: 'The RTP fixed header is 12 octets: V (2 bits, version=2), P (1 bit, padding), X (1 bit, extension present), CC (4 bits, CSRC count), M (1 bit, marker), PT (7 bits, payload type), sequence number (16 bits), timestamp (32 bits), SSRC (32 bits). Optionally followed by 0–15 CSRC identifiers (32 bits each).'
