document: rfc-2651
kind: design-rationale
summary: To avoid scaling issues, no single mandatory 'root' node exists in a CIP mesh. Clients should connect to a reasonably well-connected local server and expand their search upward through servers that poll the initial entry point if no match is found.
section: "4.3"
