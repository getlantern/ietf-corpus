document: rfc-9394
kind: protocol-element
summary: Clients can direct the server to start a SEARCH from the latest matching message by prepending "-" to the index. For example, -1 is the last message and -2 is next to last; "PARTIAL -1:-100" returns the 100 most recent results.
section: "3.1"
topics:
