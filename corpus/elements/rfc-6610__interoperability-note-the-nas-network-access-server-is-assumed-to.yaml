document: rfc-6610
kind: interoperability-note
summary: The NAS (Network Access Server) is assumed to be co-located with a DHCP relay agent or DHCP server for the bootstrapping scenario described in RFC 5447. If the NAS is not co-located, the server may be unable to provide home network information obtained from the NAS.
section: "4.4"
topics:
