document: rfc-4821
kind: normative-requirement
summary: The probing convergence timer MUST NOT be less than 5 minutes and is recommended to be 10 minutes per RFC 1981; when it expires, search_high is reset to its initial value so the flow can take advantage of path MTU increases.
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - ip
    - congestion
