document: rfc-5854
kind: security-consideration
summary: Some hash types in the IANA 'Hash Function Textual Names' registry (e.g., MD family) are cryptographically weak and susceptible to collision attacks. Metalink Generators and Processors MUST support 'sha-256' and SHOULD include SHA-256 or stronger when including hashes in a Metalink Document.
section: "7.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
