document: rfc-9420
kind: security-consideration
summary: A compromised Authentication Service can cause members to accept credentials for identities they do not control, enabling impersonation. MLS does not provide protection against AS compromise; applications must rely on AS security and may use transparency mechanisms to detect misbehavior.
section: "16.10"
topics:
