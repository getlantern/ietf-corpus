document: rfc-5080
kind: normative-requirement
summary: For Accounting-Request packets, the default values for MRC, MRD, and MRT SHOULD be zero, allowing the client to continue sending until acknowledged. If any of these are non-zero, accounting information could be silently discarded without being recorded.
section: 2.2.1
rfc2119_level: SHOULD
topics:
    - radius
