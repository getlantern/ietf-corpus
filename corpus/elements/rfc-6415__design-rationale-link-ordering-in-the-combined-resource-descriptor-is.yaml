document: rfc-6415
kind: design-rationale
summary: 'Link ordering in the combined resource descriptor is intentional and defines priority: links appearing before the ''lrdd'' link in host-meta have higher priority than links from the LRDD document, while links after the ''lrdd'' link in host-meta have lower priority than the LRDD document''s links.'
section: "1.1"
