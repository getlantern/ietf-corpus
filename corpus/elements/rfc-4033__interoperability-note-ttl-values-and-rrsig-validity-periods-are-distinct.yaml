document: rfc-4033
kind: interoperability-note
summary: 'TTL values and RRSIG validity periods are distinct: TTL controls cache coherency and cannot extend signature validity, but a resolver may use the RRSIG expiration time as an upper bound on the TTL it assigns to a cached signed RRset.'
section: "8.1"
topics:
