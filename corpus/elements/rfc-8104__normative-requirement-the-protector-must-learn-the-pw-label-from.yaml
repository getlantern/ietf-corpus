document: rfc-8104
kind: normative-requirement
summary: The protector MUST learn the PW label from the primary PE prior to the failure and install a proper forwarding state for the PW label in a dedicated label space associated with the primary PE. During local repair, the protector MUST perform PW label lookup in this label space.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
