document: rfc-6872
kind: security-consideration
summary: Public access to a SIP CLF log file constitutes a greater privacy leak than eavesdropping on cleartext SIP traffic, because an adversary who cannot decrypt real-time TLS-encrypted SIP can still mount replay and eavesdropping attacks if they obtain the log file, which contains decrypted header values.
section: "10"
topics:
    - sip
    - security
    - privacy
