document: rfc-8098
kind: privacy-consideration
summary: The Reporting-UA field can enable MUA fingerprinting — uniquely identifying a device when combined with other characteristics. MUAs SHOULD limit Reporting-UA detail and SHOULD NOT generate needlessly fine-grained product information.
section: 6.2.2
topics:
    - email
    - privacy
