document: rfc-7653
kind: protocol-element
summary: Active Leasequery uses a long-lived TCP connection to port 547 between the requestor and DHCPv6 server. The requestor sends a single ACTIVELEASEQUERY message and receives an unbounded stream of LEASEQUERY-REPLY and LEASEQUERY-DATA messages until the connection is closed.
section: "3"
topics:
