document: rfc-5213
kind: security-consideration
summary: Proxy Binding Update and Proxy Binding Acknowledgement messages MUST be protected using end-to-end security associations offering integrity and data origin authentication. Both MAG and LMA MUST implement IPsec as a mandatory-to-implement security mechanism.
