document: rfc-8484
kind: interoperability-note
summary: Transport-specific DNS extensions such as the edns-tcp-keepalive EDNS0 option (RFC 7828) are not applicable to DoH. Media types used with DoH must be flexible enough to express every DNS query normally sent over UDP, except those requiring multiple responses.
section: "10"
topics:
    - dns
    - http
