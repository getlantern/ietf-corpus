document: rfc-4006
kind: protocol-element
summary: 'The Final-Unit-Indication AVP (Code 430) is a grouped AVP signaling that the answer contains the last quota for a service. The mandatory Final-Unit-Action sub-AVP specifies the client''s required behavior upon exhaustion: TERMINATE (0), REDIRECT (1), or RESTRICT_ACCESS (2).'
