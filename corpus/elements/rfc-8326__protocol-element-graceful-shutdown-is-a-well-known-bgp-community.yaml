document: rfc-8326
kind: protocol-element
summary: GRACEFUL_SHUTDOWN is a well-known BGP community with value 0xFFFF0000 (65535:0), used to signal that paths advertised over a BGP session are about to be shut down for planned maintenance. It allows automated graceful shutdown without router reconfiguration at maintenance time.
section: "1"
topics:
    - bgp
    - routing
