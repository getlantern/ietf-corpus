document: rfc-4821
kind: interoperability-note
summary: IPsec may be treated as part of IP or as part of the Packetization Layer; if treated as part of IP, each security association to a remote node may need to be treated as a separate path. If treated as part of the Packetization Layer, the IPsec header size MUST be included in header size calculations.
section: "5.3"
topics:
    - ipsec
    - ip
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
