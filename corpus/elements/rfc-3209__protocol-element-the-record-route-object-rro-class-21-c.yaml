document: rfc-3209
kind: protocol-element
summary: 'The RECORD_ROUTE object (RRO, class 21, C-Type 1) records the actual path of an LSP as a LIFO stack of subobjects added at each hop. Three subobject types: IPv4 address (type 1, 8 bytes), IPv6 address (type 2, 20 bytes), and Label (type 3). Address subobjects carry flags 0x01 (local protection available) and 0x02 (local protection in use).'
section: "4.4"
topics:
    - mpls
    - routing
