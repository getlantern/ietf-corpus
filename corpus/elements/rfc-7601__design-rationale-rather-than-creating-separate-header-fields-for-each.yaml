document: rfc-7601
kind: design-rationale
summary: Rather than creating separate header fields for each authentication class (e.g., SPF's Received-SPF, DomainKeys' DomainKey-Status), this specification groups all methods into a single Authentication-Results header field to provide a common location and an extensible framework for reporting new authentication methods as they emerge.
section: "1"
topics:
