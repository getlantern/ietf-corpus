document: rfc-8801
kind: normative-requirement
summary: To prevent DoS amplification, hosts MUST enforce a minimum interval of 10 seconds (RECOMMENDED) between Additional Information requests for a given PvD, limit total PvD Additional Information requests to no more than five on a given network within 10 seconds, stop requesting a PvD ID that consistently returns invalid JSON, and stop requesting all PvD IDs after reaching 10 or more failures on a network.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
