document: rfc-2658
kind: normative-requirement
summary: Senders MUST transmit packets in timestamp-increasing order, and within each interleave group MUST transmit packets in value-increasing order of the NNN field to minimize end-to-end delay when the underlying transport delivers in order.
section: "3.4"
rfc2119_level: MUST
topics:
