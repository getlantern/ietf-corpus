document: rfc-5321
kind: normative-requirement
summary: A relay SMTP that accepts mail and later cannot deliver it MUST construct an undeliverable mail notification and send it to the reverse-path. Notification messages MUST use a null reverse-path (MAIL FROM:<>) to prevent error loops.
section: 3.6.3
rfc2119_level: MUST
topics:
    - email
