document: rfc-9240
kind: design-rationale
summary: 'RFC 7285''s Endpoint Property Service has three limitations: properties can only be attached to individual IP addresses (not PIDs or ANEs), endpoint addresses cannot be scoped to a specific information resource (causing PID ambiguity across network maps), and only POST-mode queries are defined with no GET-mode property map. This extension addresses all three.'
section: "1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
