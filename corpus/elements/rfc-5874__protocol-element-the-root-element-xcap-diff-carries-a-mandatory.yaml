document: rfc-5874
kind: protocol-element
summary: The root element <xcap-diff> carries a mandatory 'xcap-root' attribute (anyURI) identifying the XCAP root URI for all changed documents reported in the document. A single XCAP diff document can only represent changes within one XCAP root.
