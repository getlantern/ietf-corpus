document: rfc-2596
kind: interoperability-note
summary: 'When no language code is specified in a search filter, all attribute values matching the base attribute type and assertion value are returned, regardless of any language code on the stored values. A filter on ''name'' matches ''name;lang-EN-US: Billy Ray''.'
