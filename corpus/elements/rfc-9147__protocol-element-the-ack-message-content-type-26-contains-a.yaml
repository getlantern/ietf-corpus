summary: 'The ACK message (content type 26) contains a list of RecordNumber values (each 128 bits: uint64 epoch + uint64 sequence_number) identifying received records. It enables selective retransmission during handshake and confirms receipt of final-flight messages that would otherwise have no protocol response.'
