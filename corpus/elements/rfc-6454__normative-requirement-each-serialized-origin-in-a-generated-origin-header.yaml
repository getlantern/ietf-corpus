document: rfc-6454
kind: normative-requirement
summary: Each serialized-origin in a generated Origin header field MUST be the ASCII serialization of an origin. No two consecutive serialized-origin productions may be identical; if the user agent would generate two consecutive identical ones, it MUST NOT generate the second.
section: "7.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
