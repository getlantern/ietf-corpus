document: rfc-2417
kind: protocol-element
summary: The marsHostMapTable caches mappings from multicast group blocks (MinGrpAddr, MaxGrpAddr) to cluster member ATM addresses, with row type static(1) for configured entries or dynamic(2) for entries learned from MARS_JOIN/LEAVE processing. Dynamic rows cannot be modified or deleted via SNMP.
