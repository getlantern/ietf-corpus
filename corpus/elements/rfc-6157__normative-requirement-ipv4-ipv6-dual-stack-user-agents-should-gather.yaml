document: rfc-6157
kind: normative-requirement
summary: IPv4/IPv6 dual-stack user agents SHOULD gather both IPv4 and IPv6 candidate addresses via ICE procedures when generating offers, so that both IPv4-only and IPv6-only answerers can find a mutually acceptable address.
section: "4.2"
rfc2119_level: SHOULD
