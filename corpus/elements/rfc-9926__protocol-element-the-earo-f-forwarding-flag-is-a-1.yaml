document: rfc-9926
kind: protocol-element
summary: The EARO F (Forwarding) flag is a 1-bit field repurposed from the most significant bit of the Status/Prefix Length byte in NS messages. When set to 1, it indicates the registering node expects routers to forward to the sender packets sourced from within the registered prefix (topologically correct ingress forwarding), as opposed to the sender owning and delivering to the prefix.
section: "7.2"
topics:
    - ip
