document: rfc-5251
kind: normative-requirement
summary: All channels within a given link MUST have similar shared characteristics (e.g., switching capability, encoding, type). It is REQUIRED that for a given CE-PE pair, at least one link has at least one data-bearing channel and at least one control-bearing channel, or that there is IP reachability between CE and PE.
section: "2"
rfc2119_level: REQUIRED
topics:
    - vpn
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
