document: rfc-3030
kind: normative-requirement
summary: Text messages sent with BDAT MUST be sent in canonical MIME format with lines delimited with <CR><LF>. Any transformation of text into non-canonical MIME to observe local storage conventions MUST be reversed before sending as BINARYMIME.
section: "2"
rfc2119_level: MUST
topics:
