document: rfc-6660
kind: interoperability-note
summary: MPLS shim headers provide only a 3-bit Traffic Class field (8 codepoints), so a site-local mapping from PCN IP codepoints to MPLS TC codepoints must be defined by the operator; when both marking behaviours are used, at least three TC codepoints per PCN-compatible DSCP are required, plus one for not-PCN.
section: Appendix C
topics:
    - ecn
    - diffserv
    - mpls
    - qos
