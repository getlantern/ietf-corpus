document: rfc-3181
kind: design-rationale
summary: The 'Force error on heterogeneous merge' strategy (merge strategy 3) is recommended only when reservation homogeneity is coordinated for the entire multicast tree; it is easier to implement than strategy 1 but vulnerable to denial of service from a single receiver specifying an incompatible QoS.
