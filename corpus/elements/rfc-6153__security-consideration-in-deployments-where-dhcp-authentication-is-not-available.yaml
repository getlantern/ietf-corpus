document: rfc-6153
kind: security-consideration
summary: In deployments where DHCP authentication is not available, 3GPP-specific lower-layer security services (3GPP TS 33.402) can protect DHCP messages, and the 3GPP ANDSF framework provides additional mechanisms to protect message exchanges between ANDSF client and server at the higher layer.
