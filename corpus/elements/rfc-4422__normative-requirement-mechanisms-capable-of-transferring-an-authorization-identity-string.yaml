document: rfc-4422
kind: normative-requirement
summary: Mechanisms capable of transferring an authorization identity string MUST support arbitrary non-empty Unicode sequences (excluding NUL). Mechanisms SHOULD use UTF-8; the specification MUST detail how characters special to the mechanism are escaped in the authorization identity string.
section: "5"
rfc2119_level: MUST
topics:
    - security
