document: rfc-2078
kind: security-consideration
summary: Callers should not assume that underlying mechanisms provide confidentiality protection for channel binding information. Channel binding data may be exposed in tokens even when the binding is intended to prevent token reuse by attackers.
section: 1.1.6
topics:
    - security
    - privacy
