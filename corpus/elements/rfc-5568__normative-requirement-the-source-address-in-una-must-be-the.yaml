document: rfc-5568
kind: normative-requirement
summary: The Source Address in UNA MUST be the NCoA. The Target Address MUST include the NCoA, and the Target link-layer address MUST include the MN's LLA. The 'O' bit MUST be set to zero (unsolicited advertisement).
section: "6.3"
rfc2119_level: MUST
topics:
