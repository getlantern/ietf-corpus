document: rfc-9122
kind: interoperability-note
summary: The "Can Use With IMAP Events?" field in every registration records whether an action is compatible with IMAP events in Sieve (RFC 6785). Actions `reject`, `ereject`, and `vacation` explicitly cannot be used with IMAP events.
section: "2.2"
topics:
