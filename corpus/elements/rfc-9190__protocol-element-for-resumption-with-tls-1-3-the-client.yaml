document: rfc-9190
kind: protocol-element
summary: For resumption with TLS 1.3, the client sends a ClientHello with pre_shared_key extension. The server responds with ServerHello, EncryptedExtensions, Finished, and optionally a new NewSessionTicket. The peer responds with Finished, followed by the protected success indication exchange.
section: 2.1.3
topics:
