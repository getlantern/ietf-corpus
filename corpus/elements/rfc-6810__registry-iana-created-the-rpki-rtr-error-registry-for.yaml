kind: registry
summary: IANA created the 'rpki-rtr-error' registry for Error Codes 0-255. Registration policy is Expert Review. Initial entries define codes 0-7 (Corrupt Data, Internal Error, No Data Available, Invalid Request, Unsupported Protocol Version, Unsupported PDU Type, Withdrawal of Unknown Record, Duplicate Announcement Received) and 255 (Reserved).
