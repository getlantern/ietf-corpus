document: rfc-5027
kind: state-machine
summary: The offerer's local status table tracks Direction (send/recv), Current status (yes/no), Desired Strength (mandatory/optional/none), and Confirm flag. Initial state is Current=no for both directions; transitions to yes upon receipt of answer containing needed cryptographic parameters, triggering a confirm update if requested.
