document: rfc-7601
kind: normative-requirement
summary: MUAs and downstream filters MUST ignore any result reported using a 'result' not specified in the IANA Result Code registry or a 'ptype' not listed in the Email Authentication Property Types registry. Such agents MUST also ignore a result for any 'method' they do not specifically support.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
    - registry
