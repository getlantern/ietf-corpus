document: rfc-6620
kind: normative-requirement
summary: The FCFS SAVI device MUST join the solicited-node multicast group for every address in a state other than NO_BIND, so that DAD_NS packets for those addresses are reliably received even if the originating host has moved.
section: 3.2.3
rfc2119_level: MUST
topics:
