document: rfc-2427
kind: wire-format
summary: Bridged 802.6 frames use PID 0x00-0B (no FCS variant only; CRC-32 presence is indicated by the CIB bit in the MAC frame header). The Common PDU Header (containing BAsize) and Trailer are included to enable pipelining at egress 802.6 bridges.
section: "4.2"
