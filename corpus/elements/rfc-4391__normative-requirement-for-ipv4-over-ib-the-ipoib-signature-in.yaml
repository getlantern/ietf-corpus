document: rfc-4391
kind: normative-requirement
summary: For IPv4 over IB, the IPoIB signature in the MGID MUST be '0x401B'. For IPv6 over IB, the signature MUST be '0x601B'. This distinguishes IPoIB multicast groups from other IB multicast groups.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - multicast
