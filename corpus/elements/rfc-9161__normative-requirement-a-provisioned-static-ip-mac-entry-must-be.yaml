document: rfc-9161
kind: normative-requirement
summary: A provisioned static IP->MAC entry MUST be advertised in EVPN with an ARP/ND Extended Community where the Immutable ARP/ND Binding Flag (I) is set to 1, indicating the IP must not be associated to any other MAC.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
    - routing
    - security
