document: rfc-5152
kind: protocol-element
summary: 'The ERO (Explicit Route Object) in an RSVP-TE Path message specifies the inter-domain TE LSP path as a set of loose and/or strict hops. Hops may identify: the complete strict path end-to-end, strict path in the source domain followed by boundary LSRs, the complete list of boundary LSRs, or just the current boundary LSR and destination.'
section: "3.1"
topics:
    - realtime
    - routing
    - mpls
