document: rfc-1752
kind: normative-requirement
summary: Support for the Privacy Header is required in IPv6; support for a specific privacy algorithm is also required. The Privacy Header is always the last non-encrypted field in a packet when present.
section: "1"
rfc2119_level: REQUIRED
