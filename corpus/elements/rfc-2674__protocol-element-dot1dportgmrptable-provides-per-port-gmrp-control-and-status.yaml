document: rfc-2674
kind: protocol-element
summary: 'dot1dPortGmrpTable provides per-port GMRP control and status: dot1dPortGmrpStatus (enabled/disabled), dot1dPortGmrpFailedRegistrations (Counter32), and dot1dPortGmrpLastPduOrigin (MacAddress of last received GMRP PDU). GMRP takes effect only when both device-level dot1dGmrpStatus and port-level status are enabled.'
