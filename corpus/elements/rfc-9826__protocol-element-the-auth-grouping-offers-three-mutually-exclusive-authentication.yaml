document: rfc-9826
kind: protocol-element
summary: 'The auth grouping offers three mutually exclusive authentication choices: auth-key-chain (referencing an ietf-key-chain key-chain-ref), auth-key (inline key with identityref crypto-algorithm plus keystring or hexadecimal-string), and auth-tls (RFC 9645 TLS server or client groupings). The same grouping is reused for both the entity and per-peer configuration.'
section: "4.1"
topics:
    - yang
    - tls
    - security
    - routing
