document: rfc-2396
kind: protocol-element
summary: The server-based naming authority uses the syntax <userinfo>@<host>:<port>. The host is either a hostname (dot-separated domain labels) or an IPv4address (four dot-separated decimal digit groups); literal IPv6 addresses are not supported.
section: 3.2.2
