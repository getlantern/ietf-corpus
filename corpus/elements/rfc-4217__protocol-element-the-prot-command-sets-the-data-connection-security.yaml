summary: 'The PROT command sets the data connection security level. For FTP-TLS only ''C'' (Clear: no TLS) and ''P'' (Private: TLS with integrity and confidentiality) are used; ''S'' (Safe) and ''E'' (Confidential) are not applicable because TLS encompasses both.'
