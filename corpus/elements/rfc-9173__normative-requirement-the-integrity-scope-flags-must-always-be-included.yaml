document: rfc-9173
kind: normative-requirement
summary: The integrity scope flags MUST always be included in the IPPT value itself, even when they are not included in the BIB as a security context parameter. Reserved and unassigned bits MUST be set to 0 at the security source and the value MUST NOT be altered until the security service is completed.
section: "3.7"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
