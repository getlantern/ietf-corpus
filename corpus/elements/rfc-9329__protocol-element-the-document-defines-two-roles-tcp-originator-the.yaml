document: rfc-9329
kind: protocol-element
summary: 'The document defines two roles: "TCP Originator" (the IKE peer that initiates TCP connections) and "TCP Responder" (the peer that receives them). If an IKE SA is rekeyed, the TCP Originator MUST remain the peer that originally initiated the first IKE SA, independent of IKEv2 Initiator/Responder role swaps.'
section: "1.2"
topics:
    - ipsec
    - vpn
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
