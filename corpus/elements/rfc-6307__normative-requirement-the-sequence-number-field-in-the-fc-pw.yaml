document: rfc-6307
kind: normative-requirement
summary: The sequence number field in the FC PW Control Word MUST be set to 0 by the ingress PE and MUST be ignored by the egress PE. The X flag bit SHOULD be set to zero by the sender and MUST be ignored by the receiver.
section: "3.1"
rfc2119_level: MUST
topics:
