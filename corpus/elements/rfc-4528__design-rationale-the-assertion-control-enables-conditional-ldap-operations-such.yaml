document: rfc-4528
kind: design-rationale
summary: The Assertion Control enables conditional LDAP operations such as atomic 'test and set' and 'test and clear' by requiring that a filter applied to the target entry evaluate to TRUE before the operation proceeds. This mechanism supports concurrency-safe modifications without requiring separate test and update round trips.
section: "1"
topics:
    - ldap
