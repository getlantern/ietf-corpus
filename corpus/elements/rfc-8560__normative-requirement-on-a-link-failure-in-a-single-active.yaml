document: rfc-8560
kind: normative-requirement
summary: On a link failure in a single-active Ethernet segment, PBB-EVPN PEs MUST both (1) send a BGP B-MAC withdraw or MAC advertisement with MAC Mobility extended community to PBB-EVPN peers, and (2) follow VPLS MAC Flush procedures with PBB-VPLS peers.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
