document: rfc-2751
kind: wire-format
summary: Length field is 16 bits, always 12 (bytes). P-Type field is 16 bits with value PREEMPTION_PRI=3. Preemption Priority and Defending Priority are each 16-bit unsigned integers. Merge Strategy is 8 bits encoding one of three strategies (1=Highest QoS, 2=Highest Priority, 3=Force Error). Error Code is 8 bits (0=NO_ERROR, 1=PREEMPTION, 2=HETEROGENEOUS).
