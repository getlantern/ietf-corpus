document: rfc-6290
kind: normative-requirement
summary: A token maker MUST NOT send a valid QCD token in an unprotected message for an existing IKE SA. In load-balancing clusters, it MUST NOT be possible to trick one gateway into sending a valid token for an IKE SA active on another gateway.
section: "9.2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
