document: rfc-6350
kind: interoperability-note
summary: 'Unfolding in vCard differs from RFC 5322: vCard removes both the CRLF and the following whitespace character, whereas RFC 5322 only removes the CRLF. Implementations SHOULD unfold lines in a way that properly restores original multi-octet UTF-8 sequences, as simple implementations may incorrectly fold in the middle of such sequences.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
