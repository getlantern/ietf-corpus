document: rfc-8158
kind: design-rationale
summary: IPFIX was chosen over syslog as the encoding mechanism because it is an IETF standard with binary encoding suited for high-volume environments such as Carrier-Grade NAT. IPFIX's binary format is efficient and flexible, allowing the logging device to define the datasets being logged.
