document: rfc-9085
kind: interoperability-note
summary: A Prefix NLRI associated with a Range TLV is treated as a normal routing prefix (providing reachability) only when an IGP metric TLV (TLV 1095) is also present; otherwise it represents only the first prefix in the SRMS mapping range and is not used for route computation.
section: 2.3.5
topics:
    - routing
    - bgp
