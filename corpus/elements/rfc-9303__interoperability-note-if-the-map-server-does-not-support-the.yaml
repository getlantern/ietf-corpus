document: rfc-9303
kind: interoperability-note
summary: If the Map-Server does not support the KDF ID recommended by the ITR, it may overwrite the KDF ID field and use a different supported algorithm. Similarly, if the ETR does not support the Requested HMAC ID, it uses a different algorithm and updates the PKT HMAC ID field.
section: "6.7"
topics:
