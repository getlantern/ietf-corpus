document: rfc-9112
kind: protocol-element
summary: 'HTTP/1.1 defaults to persistent connections. A recipient determines persistence based on protocol version and Connection header: HTTP/1.1 is persistent by default; HTTP/1.0 is persistent only if "keep-alive" option is present; "close" option terminates persistence.'
section: "9.3"
topics:
