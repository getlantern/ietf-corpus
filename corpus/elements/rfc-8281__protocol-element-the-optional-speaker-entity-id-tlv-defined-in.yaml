document: rfc-8281
kind: protocol-element
summary: The optional SPEAKER-ENTITY-ID TLV (defined in RFC 8232) MAY be included in the LSP object in PCRpt messages for LSPs with the C flag set, to identify the PCE that initiated the LSP creation across all PCEP sessions. If it appears for an LSP with C=0, the LSP MUST be ignored and a PCErr sent.
section: 5.3.2
topics:
    - routing
    - mpls
