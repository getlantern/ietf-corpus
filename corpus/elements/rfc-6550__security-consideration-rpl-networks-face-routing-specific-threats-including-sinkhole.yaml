document: rfc-6550
kind: security-consideration
summary: RPL networks face routing-specific threats including sinkhole attacks (a malicious node advertising an attractive Rank to intercept traffic), selective forwarding, wormhole attacks, and Rank spoofing. The integrity-protection mechanisms in Section 10 mitigate these for secured-mode deployments, but unsecured mode relies entirely on link-layer security.
section: "19.1"
topics:
    - security
    - routing
