summary: 'Recovery requires two steps: determining which packets to combine (any algorithm permitted) and applying the XOR reconstruction procedure (MUST follow the spec). Partial recovery is possible and detectable by comparing the length recovered from the FEC header against the actual length of reconstructed payload data.'
