kind: interoperability-note
summary: The IDN encoding rules for domain components in Distinguished Names (Section 7.3) and for dNSName GeneralNames (Section 7.2) are now aligned. Both require UseSTD3ASCIIRules and treat the label as a stored string with AllowUnassigned unset.
