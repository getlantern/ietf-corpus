document: rfc-6442
kind: normative-requirement
summary: If a location URI is included in a SIP request, the sending UA MUST also include a Supported header field indicating which location profiles ("geolocation-sip" and/or "geolocation-http") it supports. All location profile option tags MUST begin with the string "geolocation" followed by a dash.
section: "4.6"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
