document: rfc-9186
kind: protocol-element
summary: The BFD Discriminator PIM Hello Option (OptionType 39) is a new optional PIM Hello Option that bootstraps a tail of a P2MP BFD session. It contains a 4-octet HeadDiscriminator field set to the My Discriminator value allocated by the head.
