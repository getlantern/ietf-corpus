document: rfc-7683
kind: normative-requirement
summary: A reporting node MUST ensure that new sequence numbers for a given application and report type are strictly greater than any sequence number in a currently active overload report for that type, and this ordering MUST persist across a reboot of the reporting node.
section: 5.2.1.4
rfc2119_level: MUST
topics:
