document: rfc-9241
kind: normative-requirement
summary: For a CDNI Advertisement resource using 'altopid' footprints, the resource ID of the dependent network map MUST be included in the 'uses' field of its IRD entry, and 'dependent-vtags' with a reference to this network map MUST be included in its response.
