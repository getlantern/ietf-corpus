document: rfc-5892
kind: protocol-element
summary: The contextual rule for U+200D (ZERO WIDTH JOINER) permits its use in Indic scripts in a consonant-conjunct context. It is valid only if the character immediately preceding U+200D has Canonical_Combining_Class equal to Virama.
