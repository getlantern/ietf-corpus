summary: 'Client reconfigure-triggered state: on receipt of valid Reconfigure, client transitions to in-progress transaction state and sends Renew, Rebind, or Information-request per the msg-type field; it discards further Reconfigure messages until the transaction completes or retransmission times out, at which point it returns to idle.'
