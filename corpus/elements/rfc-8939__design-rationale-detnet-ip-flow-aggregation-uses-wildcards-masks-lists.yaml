document: rfc-8939
kind: design-rationale
summary: DetNet IP flow aggregation uses wildcards, masks, lists, prefixes, and ranges on any 6-tuple field (optionally also Flow Label), allowing a DetNet node to identify aggregate flows and allocate resources on an aggregate basis rather than per-component-flow, improving scaling by reducing per-hop state.
section: "4.4"
topics:
