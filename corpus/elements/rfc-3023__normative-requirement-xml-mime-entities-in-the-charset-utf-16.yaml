document: rfc-3023
kind: normative-requirement
summary: XML MIME entities in the charset 'utf-16' MUST begin with a Byte Order Mark (BOM). Entities in 'utf-16le' or 'utf-16be' MUST NOT begin with the BOM but SHOULD contain an encoding declaration.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
