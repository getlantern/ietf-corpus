document: rfc-7223
kind: protocol-element
summary: 'Three YANG features are defined: ''arbitrary-names'' (device allows arbitrarily named user-controlled interfaces), ''pre-provisioning'' (device supports configuring interfaces whose hardware is not yet present), and ''if-mib'' (device implements the IF-MIB, RFC 2863). Feature advertisement occurs in the NETCONF <hello> message.'
