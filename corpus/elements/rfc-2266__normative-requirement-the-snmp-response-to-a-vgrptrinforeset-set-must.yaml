document: rfc-2266
kind: normative-requirement
summary: The SNMP response to a vgRptrInfoReset SET must be transmitted before or concurrently with the reset taking effect; the agent may delay the reset for this purpose but must not suppress the response.
section: "3"
rfc2119_level: MUST
