summary: The 'b4-ipv6-address' container augments the NAPT44 mapping entry with the source IPv6 address of the B4 element ('address', inet:ipv6-address) and the timestamp of its last change ('last-address-change', yang:date-and-time), disambiguating overlapping private IPv4 address spaces across subscribers.
