document: rfc-9911
kind: protocol-element
summary: The date-and-time type is a string profiling ISO 8601 / RFC 3339 with the RFC 9557 update. It allows leap seconds (value 60 for seconds), and distinguishes UTC with unknown local timezone (Z) from UTC with known UTC reference point (+00:00). The type is not equivalent to the SMIv2 DateAndTime textual convention.
