document: rfc-8580
kind: design-rationale
summary: An implementation MAY only support the FCC extension with a subset of notification methods. The fcc notify_method_capability allows Sieve scripts to discover at runtime which notification methods support FCC, enabling conditional logic rather than a hard error.
