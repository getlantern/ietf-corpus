document: rfc-9829
kind: interoperability-note
summary: This document updates RFC 6487, revising CRL Number handling, adjusting step 5 of the Resource Certification Path Validation procedure, and integrating Errata 3205 (Err3205). Implementations conforming to RFC 6487 must be updated to ignore the CRL Number extension as specified here.
