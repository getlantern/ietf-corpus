document: rfc-3996
kind: protocol-element
summary: The 'ippget-event-life' (integer(15:MAX)) Printer Description attribute specifies the number of seconds after an Event occurs during which the Printer will return that Event in a Get-Notifications response. The value MUST be 15 or more; 60 seconds is RECOMMENDED.
section: "8.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
