document: rfc-5986
kind: interoperability-note
summary: DHCPv4 option 15 (RFC 2132) is used as a fallback domain name source when the access network domain name DHCP option is unavailable, but it may not be suitable for deployments where a global enterprise uses the same option 15 value across multiple sites.
