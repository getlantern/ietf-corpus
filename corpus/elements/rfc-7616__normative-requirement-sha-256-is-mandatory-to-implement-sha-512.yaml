document: rfc-7616
kind: normative-requirement
summary: SHA-256 is mandatory to implement; SHA-512/256 serves as a backup algorithm; MD5 is retained only for backward compatibility. When receiving multiple challenges, the client SHOULD use the first one it supports unless local policy dictates otherwise.
section: "3.7"
rfc2119_level: SHOULD
topics:
