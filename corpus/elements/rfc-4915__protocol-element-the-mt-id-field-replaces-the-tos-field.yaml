document: rfc-4915
kind: protocol-element
summary: The MT-ID field replaces the TOS field in Router-LSAs, Summary-LSAs, and Type-5 and Type-7 AS-external-LSAs. Each MT topology has its own MT-ID metric field; when a link is not part of a given MT, the corresponding MT-ID metric is excluded from the LSA.
