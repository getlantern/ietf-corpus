document: rfc-3966
kind: design-rationale
summary: The tel URI is a transport-independent identifier, not a dial string. It does not describe how to reach a number (via SIP-to-PSTN gateway, ENUM, H.323, or circuit-switched call) because the dialling application must supply context-specific steps like outside-line prefixes and country-code stripping.
section: "7.1"
topics:
    - sip
    - realtime
    - voip
