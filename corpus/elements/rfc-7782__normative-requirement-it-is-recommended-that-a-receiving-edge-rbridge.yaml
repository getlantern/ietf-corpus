document: rfc-7782
kind: normative-requirement
summary: It is RECOMMENDED that a receiving edge RBridge disable data-plane MAC learning from TRILL Data packet decapsulation within Data Labels advertised by AAE RBridges, unless the receiving RBridge also supports Option A. Alternative implementations that prevent MAC flip-flopping (e.g., confidence-level mechanisms) are acceptable.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
