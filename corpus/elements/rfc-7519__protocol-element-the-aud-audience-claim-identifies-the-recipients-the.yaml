document: rfc-7519
kind: protocol-element
summary: The "aud" (audience) claim identifies the recipients the JWT is intended for. Each principal processing the JWT MUST identify itself in the audience claim or reject the JWT. The value is an array of case-sensitive StringOrURI values, or a single StringOrURI when there is one audience. Use is OPTIONAL.
section: 4.1.3
topics:
    - jose
    - oauth
