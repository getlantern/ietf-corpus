document: rfc-3246
kind: normative-requirement
summary: 'A node supporting EF on interface I at configured rate R MUST satisfy the aggregate behavior equations: d_j <= f_j + E_a (eq_1), where f_j = max(a_j, min(d_{j-1}, f_{j-1})) + l_j/R (eq_2). These equations bound actual departure times against ideal departure times.'
section: "2.2"
rfc2119_level: MUST
topics:
    - diffserv
    - qos
