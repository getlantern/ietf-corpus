document: rfc-4807
kind: normative-requirement
summary: When a VariablePointer filter or action column is set to reference a non-existent row in a supported table, the inconsistentName exception MUST be returned; if the pointed-to table is unsupported entirely, an inconsistentValue exception MUST be returned.
section: "6"
rfc2119_level: MUST
