document: rfc-9630
kind: security-consideration
summary: The DEX-based multicast telemetry scheme carries greater amplification risk than unicast because multicast has a built-in packet amplification nature. Stricter protection mechanisms are required, including selective packet sampling, export traffic rate limiting, and optionally restricting DEX processing to a subset of nodes such as only branching nodes.
section: "6"
topics:
    - security
    - multicast
    - measurement
