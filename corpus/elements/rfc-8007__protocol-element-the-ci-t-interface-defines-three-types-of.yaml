summary: 'The CI/T interface defines three types of trigger commands: preposition (fetch metadata or content), invalidate (revalidate before reuse), and purge (delete metadata or content). Commands are sent from the upstream CDN (uCDN) to the downstream CDN (dCDN) via HTTP POST.'
