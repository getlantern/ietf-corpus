document: rfc-9646
kind: protocol-element
summary: The 'csr-support' node allows an SZTP-client to signal CSR generation capability in a first 'get-bootstrapping-data' request. It includes an optional 'key-generation' presence container listing supported DER-encoded AlgorithmIdentifiers, and a 'csr-generation' container listing supported CSR format identityref values.
