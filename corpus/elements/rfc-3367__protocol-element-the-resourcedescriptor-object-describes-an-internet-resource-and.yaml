document: rfc-3367
kind: protocol-element
summary: The ResourceDescriptor object describes an Internet resource and MUST include the resourceURI property. It may also contain commonname, ID, description, language, geography, category, and custom properties, plus a serviceRef element indicating its service of origin.
section: 4.2.2.1
