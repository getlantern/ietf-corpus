document: rfc-4363
kind: protocol-element
summary: 'VlanIndex extends VLAN indexing beyond 802.1Q: values 1..4094 represent standard 802.1Q VLAN-IDs with global scope; values greater than 4095 represent agent-local VLANs without a globally assigned VLAN-ID. Values 0 and 4095 are not permitted.'
