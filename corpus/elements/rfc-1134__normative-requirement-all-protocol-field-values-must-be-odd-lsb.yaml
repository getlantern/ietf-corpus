document: rfc-1134
kind: normative-requirement
summary: All Protocol field values MUST be odd (LSB of least significant octet equals 1) and MUST be assigned such that the LSB of the most significant octet equals 0. This is consistent with the ISO 3309 extension mechanism for Address fields. Frames not complying with these rules should be treated as having an unrecognized Protocol.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
