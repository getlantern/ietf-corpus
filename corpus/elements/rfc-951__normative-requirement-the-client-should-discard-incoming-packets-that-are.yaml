document: rfc-951
kind: normative-requirement
summary: The client should discard incoming packets that are not IP/UDP addressed to the boot port, are not BOOTREPLYs, do not match the client's IP address (if known) or hardware address, or do not match the client's transaction ID (xid).
section: "7.5"
rfc2119_level: SHOULD
topics:
    - ip
    - udp
