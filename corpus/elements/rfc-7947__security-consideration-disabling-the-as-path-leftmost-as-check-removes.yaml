document: rfc-7947
kind: security-consideration
summary: Disabling the AS_PATH leftmost-AS check removes a safeguard against malformed UPDATE messages and BGP loop detection. Operators should only disable it when necessary to peer with a route server and, if possible, only on a per-peer basis for route server peers.
section: "3"
topics:
    - bgp
    - security
    - routing
