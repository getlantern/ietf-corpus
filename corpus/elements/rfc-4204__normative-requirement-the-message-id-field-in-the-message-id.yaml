document: rfc-4204
kind: normative-requirement
summary: The Message_Id field in the MESSAGE_ID object MUST be monotonically increasing and scoped to the CC_Id for control-channel-specific messages, or to the LMP adjacency for TE-link-specific messages. No more than one MESSAGE_ID object may be included in any LMP message.
section: "7"
rfc2119_level: MUST
topics:
    - routing
