document: rfc-9031
kind: normative-requirement
summary: Implementations MUST use different link-layer keys when using different authentication tag (MIC) lengths, as using the same key with different MIC lengths may be unsafe. For example, the same key MUST NOT be used for both MIC-32 and MIC-64 security levels.
section: 8.4.3.3
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
