document: rfc-8013
kind: normative-requirement
summary: The inter-FE LFB MUST only be deployed within a single network with a single operator, or within an adjacent set of cooperating network operators where traffic is managed to avoid congestion, i.e., a Controlled Environment as defined by the UDP Usage Guidelines.
section: 5.1.3
rfc2119_level: MUST
topics:
    - congestion
