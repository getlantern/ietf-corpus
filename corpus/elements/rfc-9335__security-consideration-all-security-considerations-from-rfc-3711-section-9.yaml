document: rfc-9335
kind: security-consideration
summary: All security considerations from RFC 3711 Section 9 apply, except Section 9.4 (RTP header confidentiality), which Cryptex specifically addresses. The risks of weak or NULL authentication described in RFC 3711 Section 9.5 apply equally to Cryptex-encrypted header extensions.
