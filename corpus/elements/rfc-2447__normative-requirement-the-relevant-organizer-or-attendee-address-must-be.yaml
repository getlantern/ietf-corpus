document: rfc-2447
kind: normative-requirement
summary: The relevant Organizer or Attendee address MUST be ascertained by opening the 'text/calendar' MIME body part and examining the ATTENDEE and ORGANIZER properties; the RFC-822 Sender or Reply-To values cannot be relied upon.
