document: rfc-1122
kind: security-consideration
summary: A TCP implementation SHOULD validate that the IP source address of every arriving segment matches the remote address negotiated during the handshake; segments arriving from unexpected source addresses enable connection hijacking. The robustness principle also requires software to assume malevolent senders and design defensively at every layer.
section: 4.2.3.10
topics:
    - tcp
    - security
