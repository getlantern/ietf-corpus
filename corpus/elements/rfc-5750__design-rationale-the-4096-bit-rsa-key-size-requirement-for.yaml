document: rfc-5750
kind: design-rationale
summary: The 4096-bit RSA key size requirement for certificate and CRL verification is larger than the 2048-bit requirement for message operations because many root CAs in certificate stores have already issued root certificates with 4096-bit keys, and 4096-bit keys are normally only used by root certificates to lengthen their validity period.
