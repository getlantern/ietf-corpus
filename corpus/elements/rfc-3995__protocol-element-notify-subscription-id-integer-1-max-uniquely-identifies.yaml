document: rfc-3995
kind: protocol-element
summary: '''notify-subscription-id'' (integer(1:MAX)) uniquely identifies a Subscription Object within a Printer. The Printer SHOULD avoid reusing recent values across power cycles to prevent stale references from accidentally targeting new Subscription Objects. Sequential assignment is allowed but noted as a passive traffic monitoring risk when no security is in place.'
section: 5.4.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
