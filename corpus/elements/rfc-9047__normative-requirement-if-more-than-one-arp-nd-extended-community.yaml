document: rfc-9047
kind: normative-requirement
summary: If more than one ARP/ND Extended Community is received along with an EVPN MAC/IP Advertisement route, the PE MUST consider only the first one for processing and MUST NOT propagate the rest of the ARP/ND Extended Communities.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
