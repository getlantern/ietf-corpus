document: rfc-5436
kind: normative-requirement
summary: Implementations SHOULD consider limiting notification messages and SHOULD NOT send duplicate notifications to the same address from the same script invocation. Batching of notifications within a short time to the same address is also recommended.
section: "2.7"
rfc2119_level: SHOULD NOT
topics:
    - email
