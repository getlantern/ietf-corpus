document: rfc-5403
kind: wire-format
summary: 'The RPCSEC_GSS_BIND_CHANNEL request verifier is the XDR encoding of rgss2_bind_chan_verf_args, containing: rbcva_chan_bind_prefix (channel binding prefix string up to but excluding the colon), rbcva_chan_bind_oid_hash (ASN.1 OID of the hash algorithm), and rbcva_chan_mic (GSS_GetMIC output over the RPC header concatenated with the XDR-encoded rbcmia_bind_chan_hash).'
