document: rfc-6690
kind: design-rationale
summary: In CoRE, the link collection is carried as a resource of its own at a well-known URI (as opposed to HTTP headers delivered with a specific resource), because the main use case is discovery of which resources a server hosts in the first place, not describing a resource after accessing it.
section: "1.1"
topics:
