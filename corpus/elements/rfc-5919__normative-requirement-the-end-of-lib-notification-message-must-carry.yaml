document: rfc-5919
kind: normative-requirement
summary: The End-of-LIB Notification message MUST carry a status TLV (with E- and F-bits set to zero) with Status Code 0x0000002F, and a FEC TLV with the Typed Wildcard FEC Element identifying the FEC type for which advertisements are complete.
