document: rfc-3544
kind: protocol-element
summary: NON_TCP_SPACE is a 2-octet field indicating the maximum context identifier value for non-TCP compression contexts (used in COMPRESSED_NON_TCP, COMPRESSED_UDP, COMPRESSED_RTP). Suggested value is 15; must be at least 0 and at most 65535.
