document: rfc-9711
kind: protocol-element
summary: The 'submods' claim is a map whose values may be a Claims-Set, a Detached-Submodule-Digest (algorithm + digest), or a nested token (CBOR or JSON). Submodules do not inherit claims from enclosing tokens and must explicitly include all claims.
section: 4.2.18
topics:
