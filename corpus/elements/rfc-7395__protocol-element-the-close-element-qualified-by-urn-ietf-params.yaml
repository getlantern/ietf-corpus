summary: The <close/> element, qualified by 'urn:ietf:params:xml:ns:xmpp-framing', serves as the stream closing header replacing the TCP binding's </stream:stream> tag. It optionally carries a 'see-other-uri' attribute for redirecting clients to a different endpoint.
