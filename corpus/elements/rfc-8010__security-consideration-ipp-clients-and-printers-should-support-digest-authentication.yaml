document: rfc-8010
kind: security-consideration
summary: IPP Clients and Printers SHOULD support Digest Authentication (RFC 7616). Implementations that do support Digest Authentication MUST support SHA2-256 and SHOULD support MD5 for backwards compatibility only; MD5 has been deprecated by RFC 7616.
section: 8.1.1
rfc2119_level: SHOULD
topics:
    - http
    - security
