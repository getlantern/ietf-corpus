document: rfc-9302
kind: interoperability-note
summary: A Proxy-ITR (PITR) encapsulating traffic from non-LISP sites has no source mapping and therefore MUST use the Null Map-Version value as the Source Map-Version number; the receiving ETR will ignore the field per Section 7.2.
section: A.2.1
topics:
    - routing
    - ip
