document: rfc-2725
kind: security-consideration
summary: Routing protocols provide no assurance that route origination is legitimate. Without a means to determine who is authorized to announce specific prefixes, there is no integrity of global routing information and an opportunity exists for a highly effective denial-of-service attack via injection of more specific CIDR prefixes.
section: "2"
topics:
    - routing
    - security
    - bgp
