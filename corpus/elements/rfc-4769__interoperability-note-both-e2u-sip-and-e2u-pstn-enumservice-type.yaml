document: rfc-4769
kind: interoperability-note
summary: Both E2U+sip and E2U+pstn Enumservice type records are likely to be returned for a given query, representing on-net (IP) and off-net (PSTN) routes respectively. Application logic must select appropriately from multiple records based on business, network, or other rules.
