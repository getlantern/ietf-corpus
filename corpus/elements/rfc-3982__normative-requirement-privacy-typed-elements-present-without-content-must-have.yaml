document: rfc-3982
kind: normative-requirement
summary: Privacy-typed elements present without content MUST have one or more boolean attributes ('private' or 'denied'). These attributes SHOULD be used in accordance with the level of access granted to the data recipient.
section: 3.2.1
rfc2119_level: MUST
topics:
