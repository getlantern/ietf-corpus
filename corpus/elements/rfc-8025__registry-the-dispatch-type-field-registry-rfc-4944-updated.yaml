document: rfc-8025
kind: registry
summary: The 'Dispatch Type Field' registry (RFC 4944, updated by RFC 6282) is extended with a new 'Page' column. Preexisting entries are assigned to Page 0; LOWPAN_IPHC values (01 1xxxxx) are associated with both Page 0 and Page 1; Page 15 values (except page-switch space) are reserved for Experimental Use. Future assignments require 'Specification Required' policy.
section: "6.2"
topics:
