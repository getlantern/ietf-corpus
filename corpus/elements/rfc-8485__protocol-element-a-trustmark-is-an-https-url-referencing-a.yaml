document: rfc-8485
kind: protocol-element
summary: A trustmark is an HTTPS URL referencing a specific set of vector values as defined by a trust framework. It MUST point to a human-readable document describing valid components, values, and their practices. The trustmark URL MUST remain stable over time for a given trust framework.
