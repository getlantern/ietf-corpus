document: rfc-6736
kind: design-rationale
summary: DNCA qualifies as a MIDCOM protocol for NAT middleboxes, extending standard MIDCOM capabilities by maintaining per-endpoint subscriber context. This allows per-endpoint binding limits, address pool selection, and accounting that are unavailable in endpoint-agnostic NAT management approaches like SNMP or NETCONF.
section: "1"
topics:
    - nat
    - diameter
