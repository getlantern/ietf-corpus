document: rfc-5996
kind: protocol-element
summary: The INFORMATIONAL exchange carries Notification, Delete, and Configuration payloads for errors and housekeeping. It MUST ONLY occur after initial exchanges and is cryptographically protected. An empty INFORMATIONAL request (containing only the required Encrypted payload) functions as a liveness probe.
section: "1.4"
topics:
    - ipsec
    - security
