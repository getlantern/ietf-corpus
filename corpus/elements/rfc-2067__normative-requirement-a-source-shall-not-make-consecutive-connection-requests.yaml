document: rfc-2067
kind: normative-requirement
summary: A Source SHALL NOT make consecutive connection requests without Camp-on to the same Destination while those requests are being rejected, in order to prevent circumventing the switch's fair-share arbitration mechanism.
section: "5.3"
rfc2119_level: MUST NOT
