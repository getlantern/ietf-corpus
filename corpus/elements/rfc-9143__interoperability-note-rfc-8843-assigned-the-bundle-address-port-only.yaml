document: rfc-9143
kind: interoperability-note
summary: RFC 8843 assigned the BUNDLE address:port only to the tagged 'm=' section and used 'bundle-only' with zero port for all other bundled sections in subsequent offers/answers. RFC 9143 requires the BUNDLE address:port to be assigned to all bundled 'm=' sections; handling RFC 8843-style signaling is treated as an implementation issue outside the scope of this specification.
section: 7.3.5
topics:
    - realtime
    - rtp
