document: rfc-4108
kind: normative-requirement
summary: 'The firmware package signer MUST include four signed attributes: content-type, message-digest, firmware-package-identifier, and target-hardware-module-identifiers. If the firmware package is encrypted, the decrypt-key-identifier attribute MUST also be included.'
section: "2.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
