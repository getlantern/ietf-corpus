document: rfc-5818
kind: protocol-element
summary: The ConfirmDataChannelStatus message is used to report the local end's data channel status to the remote end and request the remote end to return its channel statuses. It contains a Common Header, LOCAL_LINK_ID, MESSAGE_ID, and one or more DATA_LINK objects.
section: 5.1.1
topics:
