document: rfc-7809
kind: normative-requirement
summary: Clients MUST send time zone definitions in iCalendar data for any time zone identifiers not available via any of the server's advertised time zone distribution servers, and MUST be prepared for the server to reject such data or map the time zone to a standard one.
section: "4"
rfc2119_level: MUST
