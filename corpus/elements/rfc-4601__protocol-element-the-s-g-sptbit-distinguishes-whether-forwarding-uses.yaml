document: rfc-4601
kind: protocol-element
summary: 'The (S,G) SPTbit distinguishes whether forwarding uses the source-specific SPT (TRUE) or the shared RP tree (FALSE). Update_SPTbit() sets it TRUE only when the packet arrives on RPF_interface(S), JoinDesired(S,G) is TRUE, and at least one of: source is directly connected, RPF interfaces differ, no one needs the RPT copy, or RPF''(S,G)==RPF''(*,G).'
section: 4.1.4
topics:
    - multicast
    - routing
