document: rfc-5021
kind: normative-requirement
summary: If the client's second 4-octet value is a PROBE or requests an unsupported extension, the KDC MUST close the connection. This allows the client to shut down a session when the KDC lacks a required extension.
section: "3"
rfc2119_level: MUST
topics:
    - tcp
    - security
