document: rfc-1559
kind: wire-format
summary: PhivAddr is a 2-octet OCTET STRING encoding a DECnet Phase IV node address. The most significant 6 bits of the first octet hold the area number; the next 2 bits of the first octet plus all 8 bits of the second octet hold the 10-bit host address.
