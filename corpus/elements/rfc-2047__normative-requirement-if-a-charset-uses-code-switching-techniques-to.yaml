document: rfc-2047
kind: normative-requirement
summary: If a charset uses code-switching techniques to leave ASCII mode, the encoded-word MUST contain additional control codes so that ASCII mode is restored at the end of that encoded-word. This rule applies separately to each encoded-word, including adjacent ones in the same field.
section: "3"
rfc2119_level: MUST
topics:
    - email
