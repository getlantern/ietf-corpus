document: rfc-1277
kind: normative-requirement
summary: 'For the TCP/IP network-specific DSP, there shall be a 20-digit long network-specific part: the IP address occupies the first 12 digits, the optional port number occupies digits 13–17, and the optional transport set occupies digits 18–22.'
