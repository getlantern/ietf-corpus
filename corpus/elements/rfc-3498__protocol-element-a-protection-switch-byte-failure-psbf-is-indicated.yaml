document: rfc-3498
kind: protocol-element
summary: A Protection Switch Byte Failure (PSBF) is indicated in apsStatusCurrent bit 'psbf' and counted by apsStatusPSBFs. It occurs when either an inconsistent APS byte (no three consecutive identical K1 bytes in the last 12 frames) or an invalid code (unused or contextually inappropriate K1 code, or invalid channel number, in three consecutive frames) is detected.
section: "4"
topics:
