document: rfc-7728
kind: normative-requirement
summary: TMMBR/TMMBN MUST NOT be used for pause/resume functionality if the topology is not point-to-point. Furthermore, if the messages defined in this specification are supported by all involved parties, pause/resume signaling MUST use the new messages rather than TMMBR/TMMBN.
section: "8"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
