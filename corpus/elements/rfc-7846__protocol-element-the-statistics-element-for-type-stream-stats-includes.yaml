document: rfc-7846
kind: protocol-element
summary: The statistics element for type 'STREAM_STATS' includes swarm_id, uploaded_bytes, downloaded_bytes, available_bandwidth, and concurrent_links. Multiple stat blocks can be reported in a single STAT_REPORT message. If no Statistics Group is included, STAT_REPORT serves as a keep-alive message.
section: 3.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
