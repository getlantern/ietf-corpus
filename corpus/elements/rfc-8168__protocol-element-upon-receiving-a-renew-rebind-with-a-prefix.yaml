document: rfc-8168
kind: protocol-element
summary: 'Upon receiving a Renew/Rebind with a prefix-length hint, the server MAY respond with one of five policy-based actions: (1) extend original prefix lifetime only; (2) extend original and assign new prefix; (3) invalidate original (0 lifetimes) and assign new prefix; (4) assign original a 0 preferred-lifetime with non-zero valid-lifetime and add new prefix; or (5) omit original and assign new prefix, letting original expire naturally.'
section: "3.5"
topics:
    - ip
    - v6ops
