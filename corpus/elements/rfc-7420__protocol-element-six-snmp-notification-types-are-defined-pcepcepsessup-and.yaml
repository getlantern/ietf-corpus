summary: 'Six SNMP NOTIFICATION-TYPEs are defined: pcePcepSessUp and pcePcepSessDown (session state changes), pcePcepSessLocalOverload and pcePcepSessLocalOverloadClear (local entity overload events), pcePcepSessPeerOverload and pcePcepSessPeerOverloadClear (peer overload events). Each carries relevant session state objects as varbinds.'
