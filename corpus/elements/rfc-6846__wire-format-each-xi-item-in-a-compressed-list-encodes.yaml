document: rfc-6846
kind: wire-format
summary: Each XI item in a compressed list encodes an X bit (1 = full item present in this list, 0 = item carried in the irregular chain instead) and an Index into the item table. 4-bit XI (PS=0) packs two per octet; 8-bit XI (PS=1) uses one octet with 3 reserved bits and a 4-bit Index.
