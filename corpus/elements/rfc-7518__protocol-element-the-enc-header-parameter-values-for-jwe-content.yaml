summary: 'The ''enc'' Header Parameter values for JWE content encryption are: A128CBC-HS256 and A256CBC-HS512 (Required), A192CBC-HS384 (Optional), A128GCM and A256GCM (Recommended), A192GCM (Optional). All use an IV value and produce Ciphertext and Authentication Tag values.'
