kind: protocol-element
summary: The XRO Label subobject (Type 3) complements RFC 4874 with label-based exclusion. Its encoding mirrors the Label ERO subobject from RFC 3473, substituting an L bit (0=MUST exclude, 1=SHOULD avoid) for the direction bit.
