document: rfc-9375
kind: protocol-element
summary: 'All link-level performance metrics (loss, delay, jitter) are defined as unidirectional (one-way) metrics. Loss is reported as packet-loss-count (yang:counter64) or loss-ratio (percentage to 5 decimal places). Delay and jitter report min, max, and three configurable percentile values with configurable time units (default: milliseconds).'
section: "4.4"
topics:
    - yang
    - measurement
