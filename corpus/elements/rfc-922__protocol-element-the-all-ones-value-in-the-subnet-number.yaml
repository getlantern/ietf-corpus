document: rfc-922
kind: protocol-element
summary: The all-ones value in the subnet-number field denotes 'all subnets', enabling a host to broadcast to all subnets of a remote IP network without knowing the specific subnet/host field division. For example, 36.255.255.255 covers all subnets of network 36 regardless of how the local-address is partitioned.
section: "7"
