document: rfc-4878
kind: normative-requirement
summary: Writing initiatingLoopback(2) to dot3OamLoopbackStatus is only effective when the current status is noLoopback(1); writing it in any other state has no effect. Writing terminatingLoopback(4) is only effective when in remoteLoopback(3).
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
