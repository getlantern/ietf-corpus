document: rfc-1725
kind: normative-requirement
summary: If a POP3 session terminates for any reason other than a client-issued QUIT command, the session MUST NOT remove any messages from the maildrop; the UPDATE state is not entered.
section: "6"
rfc2119_level: MUST NOT
