document: rfc-1034
kind: normative-requirement
summary: Domain name comparisons for all present domain functions are done in a case-insensitive manner, assuming ASCII with a high-order zero bit. Implementations should preserve the case of received labels even though comparisons ignore case.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - dns
