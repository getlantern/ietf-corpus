document: rfc-2495
kind: design-rationale
summary: dsx1IfIndex was deprecated in favor of using dsx1LineIndex equal to ifIndex, enabling proper use of the ifStackTable and DS0/DS0bundle MIBs. The ifStackTable is used for proxy scenarios (e.g., router proxying for a CSU shelf) to represent the association between interface pairs.
section: 2.2.1
topics:
