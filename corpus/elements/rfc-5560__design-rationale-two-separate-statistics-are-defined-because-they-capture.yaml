document: rfc-5560
kind: design-rationale
summary: 'Two separate statistics are defined because they capture distinct aspects of duplication: duplication-fraction measures the total volume of excess traffic (distinguishing cases 2 and 3 in the examples), while replicated-packet-rate measures how many unique packets were affected (distinguishing cases 2 and 4). Neither statistic alone is sufficient.'
