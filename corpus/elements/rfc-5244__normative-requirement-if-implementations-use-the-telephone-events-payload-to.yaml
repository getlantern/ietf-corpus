document: rfc-5244
kind: normative-requirement
summary: If implementations use the telephone-events payload to propagate continuity check-tones, they MUST map the 2000 Hz check-tone to event code 121 and the 1780 Hz verify-tone (two-wire procedure) to event code 122.
section: "2.5"
rfc2119_level: MUST
