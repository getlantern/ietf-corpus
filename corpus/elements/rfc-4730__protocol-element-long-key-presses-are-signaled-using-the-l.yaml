document: rfc-4730
kind: protocol-element
summary: Long key presses are signaled using the 'L' modifier preceding a character in a <regex> (e.g., 'L#' for a long pound). The 'long' attribute on <pattern> specifies the minimum duration in milliseconds (default 2500 ms). The 'longrepeat' boolean attribute allows repeated short presses of the same key to substitute for a long press.
section: "3.3"
topics:
    - sip
    - realtime
