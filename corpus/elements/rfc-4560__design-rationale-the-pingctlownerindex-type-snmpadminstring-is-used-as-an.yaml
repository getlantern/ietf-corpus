document: rfc-4560
kind: design-rationale
summary: The pingCtlOwnerIndex (type SnmpAdminString) is used as an owner index to enable SNMPv3 VACM-based access control, allowing multiple users to create entries independently while keeping their entries identifiable and access-controllable via VACM's vacmViewTreeFamilyTable.
