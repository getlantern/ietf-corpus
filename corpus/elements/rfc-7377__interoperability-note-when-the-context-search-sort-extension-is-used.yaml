document: rfc-7377
kind: interoperability-note
summary: 'When the CONTEXT=SEARCH/SORT extension is used together with ESEARCH: the UPDATE return option MUST apply only to the currently selected mailbox and MUST return BAD if no mailbox is selected; the PARTIAL return option applies per mailbox searched.'
section: "2.2"
