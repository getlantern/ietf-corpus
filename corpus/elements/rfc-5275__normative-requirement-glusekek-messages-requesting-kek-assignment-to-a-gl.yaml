document: rfc-5275
kind: normative-requirement
summary: glUseKEK messages requesting KEK assignment to a GL MUST be signed by the GLO. Both glName and glAddress MUST be unique for a given GLA. One of the names in glOwnerName MUST match a name in the certificate used to sign the PKIData.
section: 3.1.1
rfc2119_level: MUST
topics:
