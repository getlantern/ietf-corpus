document: rfc-2211
kind: normative-requirement
summary: Each network element providing controlled-load service MUST independently ensure policing requirements are met; elements must not assume upstream nodes have already policed flows. This is especially important at multicast split points where large numbers of packets fail the conformance test as a matter of normal operation.
section: "7"
rfc2119_level: MUST
topics:
    - qos
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
