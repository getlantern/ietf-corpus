document: rfc-8058
kind: normative-requirement
summary: The URI in the List-Unsubscribe header MUST contain enough information to identify the mail recipient and the list from which the recipient is to be removed, so that unsubscription can complete automatically without extra POST arguments.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
