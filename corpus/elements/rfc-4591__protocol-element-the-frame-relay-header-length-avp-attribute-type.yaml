document: rfc-4591
kind: protocol-element
summary: The Frame Relay Header Length AVP (Attribute Type 85) is exchanged during session negotiation in ICRQ and ICRP messages to negotiate whether 2-byte or 4-byte FR headers are used. The M bit MAY be 0 or vary; the H bit MAY be 0 or 1.
