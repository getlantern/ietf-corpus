document: rfc-5663
kind: normative-requirement
summary: If a SEQUENCE response has SEQ4_STATUS_EXPIRED_ALL_STATE_REVOKED, SEQ4_STATUS_EXPIRED_SOME_STATE_REVOKED, or SEQ4_STATUS_ADMIN_STATE_REVOKED set in sr_status_flag, the client MUST immediately cease using all layouts and device ID to device address mappings associated with the corresponding server.
section: 2.3.8
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
