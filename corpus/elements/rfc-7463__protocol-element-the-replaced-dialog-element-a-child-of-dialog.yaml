document: rfc-7463
kind: protocol-element
summary: The <replaced-dialog> element, a child of <dialog>, carries the call-id, local-tag, and remote-tag of a dialog being replaced by this one. Replaced dialogs share the same appearance number, preventing the Appearance Agent from reassigning the number when the replaced dialog is torn down.
section: 5.2.4
topics:
    - sip
    - realtime
