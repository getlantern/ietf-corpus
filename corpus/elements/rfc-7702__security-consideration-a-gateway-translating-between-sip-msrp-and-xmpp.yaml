document: rfc-7702
kind: security-consideration
summary: 'A gateway translating between SIP/MSRP and XMPP MUST be compliant with the minimum security requirements of both protocols. Introducing gateways into the security models of MSRP, SIP, and XMPP creates new risks: end-to-end security properties (confidentiality and integrity) can only be provided if common formats are supported, but no standardized solution for end-to-end security of multi-party messaging exists.'
section: "9"
rfc2119_level: MUST
topics:
    - security
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
