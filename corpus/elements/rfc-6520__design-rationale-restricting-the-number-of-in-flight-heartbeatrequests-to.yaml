document: rfc-6520
kind: design-rationale
summary: Restricting the number of in-flight HeartbeatRequests to one at a time, combined with the DTLS retransmission scheme, ensures that heartbeats do not cause congestion problems when running over UDP or other transport protocols that lack their own congestion control.
