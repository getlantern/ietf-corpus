document: rfc-9722
kind: protocol-element
summary: The Time Synchronization capability (T-bit, Bit 3 of the Bitmap in the DF Election Extended Community) is advertised by a PE to indicate its support for SCT-based synchronized DF election. It is used in conjunction with the agreed-upon DF Election Type (e.g., HRW).
section: "2.1"
topics:
