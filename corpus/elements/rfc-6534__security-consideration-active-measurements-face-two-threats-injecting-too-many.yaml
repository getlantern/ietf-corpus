document: rfc-6534
kind: security-consideration
summary: 'Active measurements face two threats: injecting too many probe packets risks skewing results or causing denial of service; and an attacker injecting artificial traffic accepted as legitimate probes will artificially lower the observed loss rate. Authentication techniques such as digital signatures may be used to guard against injected traffic attacks.'
section: "8"
topics:
