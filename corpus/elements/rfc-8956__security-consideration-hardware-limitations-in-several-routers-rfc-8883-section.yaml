document: rfc-8956
kind: security-consideration
summary: Hardware limitations in several routers (RFC 8883 Section 1) may make it impossible to enforce policies signaled by Type 3 (Upper-Layer Protocol) components or Flow Specification components matching upper-layer packet properties. Operators must account for potential non-enforcement in hardware-limited environments.
