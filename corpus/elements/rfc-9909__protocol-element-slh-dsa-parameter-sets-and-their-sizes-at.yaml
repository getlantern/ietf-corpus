summary: 'SLH-DSA parameter sets and their sizes at three NIST security levels: Level 1 (128s: 7856/32/64 bytes sig/pub/priv; 128f: 17088/32/64), Level 3 (192s: 16224/48/96; 192f: 35664/48/96), Level 5 (256s: 29792/64/128; 256f: 49856/64/128). Fast (''f'') variants have larger signatures than small (''s'') variants; HashSLH-DSA shares the same sizes as the corresponding Pure SLH-DSA parameter set.'
