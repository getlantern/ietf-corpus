document: rfc-2543
kind: design-rationale
summary: The proxy server does not interpret the q (quality) parameter from REGISTER Contact headers when processing non-REGISTER requests because it is not clear how long a proxy should wait between trying addresses, making q insufficient alone to guide proxy behavior.
