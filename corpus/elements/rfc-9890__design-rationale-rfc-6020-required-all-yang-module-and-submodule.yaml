document: rfc-9890
kind: design-rationale
summary: RFC 6020 required all YANG module and submodule names in the registry to be unique, but IANA's actual practice allowed re-registration of revised modules under the same name. This document amends RFC 6020 to align the normative guidance with established IANA practice.
section: "1"
topics:
    - yang
    - registry
