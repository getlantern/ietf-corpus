document: rfc-8047
kind: normative-requirement
summary: Each LOCATOR_SET parameter MUST list all locators in use on a connection (a complete listing of inbound locators and SPIs for the host). This avoids the need for explicit protocol extensions to remove locators.
section: 4.2.4
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
