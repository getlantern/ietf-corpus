document: rfc-6773
kind: normative-requirement
summary: 'A DCCP-UDP server MUST demultiplex a DCCP-UDP flow using both UDP source and destination port numbers and the encapsulated DCCP ports, uniquely identifying an active DCCP connection by the 6-tuple: <source IP, source UDP port, source DCCP port, dest IP, dest UDP port, dest DCCP port>.'
section: "3.8"
rfc2119_level: MUST
topics:
    - udp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
