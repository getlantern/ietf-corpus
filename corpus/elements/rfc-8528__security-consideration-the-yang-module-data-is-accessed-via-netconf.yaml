document: rfc-8528
kind: security-consideration
summary: 'The YANG module data is accessed via NETCONF (mandatory secure transport: SSH per RFC 6242) or RESTCONF (mandatory secure transport: TLS per RFC 8446). Security considerations for all nodes in mounted schemas must be accounted for and access controlled using NACM.'
