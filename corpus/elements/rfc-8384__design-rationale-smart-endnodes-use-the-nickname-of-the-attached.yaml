document: rfc-8384
kind: design-rationale
summary: Smart Endnodes use the nickname of the attached edge RBridge rather than consuming their own nicknames. This solves the endnode table size and freshness problem at edge RBridges by offloading encapsulation/decapsulation to capable endnodes without expanding the nickname space.
section: "3"
