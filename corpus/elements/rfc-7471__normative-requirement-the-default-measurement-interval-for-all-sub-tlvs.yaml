document: rfc-7471
kind: normative-requirement
summary: The default measurement interval for all sub-TLVs should be 30 seconds, the minimum announcement periodicity is 1 announcement per second, and the default inter-update throttle timer should be set to 120 seconds. Implementations should not permit the inter-update timer to be lower than the measurement interval.
section: "7"
topics:
    - routing
    - measurement
