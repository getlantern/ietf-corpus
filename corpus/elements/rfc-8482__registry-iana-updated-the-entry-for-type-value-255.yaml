document: rfc-8482
kind: registry
summary: IANA updated the entry for TYPE * (value 255) in the "Resource Record (RR) TYPEs" registry. The meaning was updated to "A request for some or all records the server has available", and RFC 8482 was added as a reference alongside RFC 1035 and RFC 6895.
