document: rfc-9746
kind: design-rationale
summary: Operators may prefer local bias over ESI Label-based filtering for tunnels that support both, because local bias simplifies encapsulation, reduces NVE resource consumption, and decreases delay to multihomed hosts by always forwarding locally at the ingress NVE. This document enables that choice by configuration.
section: "1.2"
topics:
    - routing
    - mpls
