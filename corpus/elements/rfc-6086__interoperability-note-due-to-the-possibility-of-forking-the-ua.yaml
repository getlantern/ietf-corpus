document: rfc-6086
kind: interoperability-note
summary: Due to the possibility of forking, the UA sending the initial INVITE MUST be prepared to receive INFO requests from multiple remote UAs during the early dialog phase, and MUST be prepared to receive different Recv-Info header field values from different remote UAs.
section: 4.2.1
topics:
    - sip
    - realtime
