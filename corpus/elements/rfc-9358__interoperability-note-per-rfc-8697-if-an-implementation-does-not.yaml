document: rfc-9358
kind: interoperability-note
summary: Per RFC 8697, if an implementation does not support the VN Association Type (7), it returns a PCErr with Error-Type=26 (Association Error) and Error-value=1 (Association Type is not supported). Implementations must advertise supported Association Types via the ASSOC-Type-List TLV in the OPEN object.
section: "3"
topics:
