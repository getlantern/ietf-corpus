document: rfc-3090
kind: protocol-element
summary: The 'closest security root' for a given domain is the top of the island of security whose name shares the most matching right-most labels with the domain. This is used to begin chain-of-trust validation and to avoid false insecurity conclusions due to NULL keys in intermediate zones.
section: 1.2.1
topics:
    - dns
    - security
