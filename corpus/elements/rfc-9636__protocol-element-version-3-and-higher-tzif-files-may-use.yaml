document: rfc-9636
kind: protocol-element
summary: Version 3 and higher TZif files MAY use a TZ string extension allowing the hours part of transition times to be signed and range from -167 through 167, instead of POSIX's required unsigned 0 through 24. A file using this extension MUST be designated as version 3 or higher.
section: 3.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
