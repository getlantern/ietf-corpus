document: rfc-8417
kind: protocol-element
summary: A Security Event Token (SET) is a JWT whose Claims Set contains a top-level 'envelope' and an 'events' claim. The 'events' claim value is a JSON object whose member names are URI event identifiers and whose member values are JSON objects (the event payload) containing event-specific claims.
