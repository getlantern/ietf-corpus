document: rfc-3380
kind: protocol-element
summary: The 'job-message-from-operator' (text(127)) operation attribute is defined for use with Cancel-Job, Hold-Job, Release-Job, and Restart-Job. The Printer copies it to the Job's 'job-message-from-operator' Job Description attribute. Unlike the printer counterpart, there are no corresponding job-message-time or job-message-date-time attributes due to the limited lifetime of jobs.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
