document: rfc-7140
kind: protocol-element
summary: 'Two new FEC element types are defined: HSMP-downstream FEC Element (type 10) and HSMP-upstream FEC Element (type 9). Structure, encoding, and error handling follow the P2MP FEC Element of RFC 6388. If an HSMP FEC Element is present in a FEC TLV, it MUST be the only FEC Element in that TLV.'
section: "3.2"
topics:
