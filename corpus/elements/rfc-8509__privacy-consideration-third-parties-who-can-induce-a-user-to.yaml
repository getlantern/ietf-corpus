document: rfc-8509
kind: privacy-consideration
summary: Third parties who can induce a user to make sentinel DNS queries (e.g., via web ads or JavaScript) can, with additional knowledge of which resolvers the user invokes, determine which root KSKs are trusted by those resolvers. Without that additional knowledge, only aggregate resolver capabilities—not individual resolver trust configuration—can be inferred.
section: "6"
topics:
    - dns
    - privacy
    - security
