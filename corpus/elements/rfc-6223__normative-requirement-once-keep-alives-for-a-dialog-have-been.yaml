document: rfc-6223
kind: normative-requirement
summary: Once keep-alives for a dialog have been negotiated, the SIP entity MUST NOT insert a "keep" parameter in any subsequent SIP requests associated with that dialog towards that adjacent entity; such parameters MUST be ignored if received.
section: "4.3"
rfc2119_level: MUST NOT
topics:
