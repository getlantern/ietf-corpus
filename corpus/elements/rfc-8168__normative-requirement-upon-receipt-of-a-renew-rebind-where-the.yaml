document: rfc-8168
kind: normative-requirement
summary: Upon receipt of a Renew/Rebind where the client included both a delegated prefix IAPREFIX option and a prefix-length hint IAPREFIX option in the IA_PD, the server SHOULD check whether it can extend the lifetime of the original prefix and whether it has any available prefix matching the hint within its limits.
section: "3.5"
rfc2119_level: SHOULD
topics:
