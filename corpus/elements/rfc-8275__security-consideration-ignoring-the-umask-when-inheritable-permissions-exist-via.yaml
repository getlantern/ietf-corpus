document: rfc-8275
kind: security-consideration
summary: Ignoring the umask when inheritable permissions exist (via POSIX default ACLs) is long-standing practice and has not given rise to security issues. The POSIX default ACL mechanism and NFSv4 permission inheritance are considered equivalent from a security perspective.
section: "6"
topics:
