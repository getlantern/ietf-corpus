document: rfc-8934
kind: normative-requirement
summary: For PCC-initiated scheduled LSPs, a PCC MUST delegate the scheduled LSP via PCRpt message including scheduling information (start time and duration). Upon receiving delegation, the stateful PCE MUST check whether the parameters are valid.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
