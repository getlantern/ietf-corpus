document: rfc-2591
kind: security-consideration
summary: 'Because schedules can be configured to trigger far in the future, removing a user from an SNMP engine without cleaning up their schedTable entries creates a security risk: the stored credentials could continue to perform set operations on behalf of the removed user.'
section: "6"
topics:
    - snmp
    - security
