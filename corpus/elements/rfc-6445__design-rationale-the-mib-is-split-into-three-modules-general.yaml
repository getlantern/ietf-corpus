document: rfc-6445
kind: design-rationale
summary: The MIB is split into three modules (general, one-to-one, facility) rather than one monolithic module so that implementors can choose to implement only the modules relevant to the FRR method(s) their device supports, since operators typically deploy only one method at a time.
