document: rfc-5575
kind: interoperability-note
summary: If a component type within a flow specification prefix is unknown to the receiver, that prefix cannot be used for traffic filtering. However, the prefix should still be propagated via BGP because route distribution is independent of NLRI semantics.
section: "4"
topics:
    - bgp
    - routing
