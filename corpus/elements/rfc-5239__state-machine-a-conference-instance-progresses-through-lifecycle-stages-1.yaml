document: rfc-5239
kind: state-machine
summary: 'A conference instance progresses through lifecycle stages: (1) blueprint — static system capability description; (2) reservation — client-cloned object with scheduled resources and participant list; (3) active conference — triggered by first participant join or system start-time determination, allocating a new focus; (4) completed — after termination. Each stage is represented by a distinct conference object with its own conference object identifier.'
