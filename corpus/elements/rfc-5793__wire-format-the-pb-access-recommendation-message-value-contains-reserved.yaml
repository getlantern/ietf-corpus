document: rfc-5793
kind: wire-format
summary: 'The PB-Access-Recommendation message value contains: Reserved (16 bits, MUST be 0) and Access Recommendation Code (16 bits): 1=Access Allowed, 2=Access Denied, 3=Quarantined. PB-TNC Message Length MUST be exactly 16. NOSKIP MUST NOT be set for this message type.'
section: "4.7"
topics:
