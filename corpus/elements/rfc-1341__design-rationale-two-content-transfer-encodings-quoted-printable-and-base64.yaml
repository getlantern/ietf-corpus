document: rfc-1341
kind: design-rationale
summary: 'Two Content-Transfer-Encodings (Quoted-Printable and Base64) are defined rather than one because there is an inherent tradeoff: QP remains human-readable for mostly-ASCII data while Base64 is more compact and reliable for binary data. A single mechanism cannot satisfy both needs.'
