document: rfc-2596
kind: normative-requirement
summary: If a language code is provided in a requested attribute list, the server MUST NOT return attribute values with a different language code. For example, requesting 'description;lang-en' must not return 'description' or 'description;lang-fr'.
section: "3.5"
rfc2119_level: MUST NOT
topics:
