document: rfc-8615
kind: security-consideration
summary: Well-known resources for 'http' or 'https' are accessible to Web browsers and can be manipulated by content from the same origin, including via XSS attacks. Applications should use mitigations such as application-specific media types, HttpOnly/Path-scoped cookies, X-Content-Type-Options, Content-Security-Policy, and Referrer-Policy.
section: "4.2"
topics:
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
