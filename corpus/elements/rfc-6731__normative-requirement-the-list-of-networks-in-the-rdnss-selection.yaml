document: rfc-6731
kind: normative-requirement
summary: The list of networks in the RDNSS selection option MUST cover all the domains configured in that option. The network prefix length SHOULD be as long as possible to avoid collision with information from other option instances or other interfaces.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
