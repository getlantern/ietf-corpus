document: rfc-2534
kind: protocol-element
summary: 'The ''color'' feature tag indicates the gross level of color capability using a token with equality relationship. Defined values are: binary (black-and-white), grey (multi-level intensity), limited (small number of colors), mapped (palette-mapped color space), and full (continuous tone color).'
section: "2.5"
