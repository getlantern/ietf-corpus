document: rfc-5595
kind: normative-requirement
summary: Applications SHOULD NOT use a Service Code of zero. Application writers needing a temporary value SHOULD choose a value from the private range; applications intended for Internet deployment are encouraged to request an IANA-assigned Service Code.
section: "2.4"
rfc2119_level: SHOULD NOT
