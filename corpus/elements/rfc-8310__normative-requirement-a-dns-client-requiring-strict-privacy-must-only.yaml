document: rfc-8310
kind: normative-requirement
summary: A DNS client requiring Strict Privacy MUST only attempt to connect to DNS servers for which at least one piece of authentication information is known, MUST use available verification mechanisms to authenticate the server, and MUST abort connections when no verification mechanism succeeds.
section: "6.6"
rfc2119_level: MUST
topics:
    - dns
    - tls
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
