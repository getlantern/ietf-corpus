document: rfc-6584
kind: wire-format
summary: The ECDSA Digital Signature EXT_AUTH header extension shares the same structure as the RSA variant (HET, HEL, ASID, rsvd, AR, SN, Signature, Padding). For ECDSA-256 the Signature field is 32 bytes and the extension totals 36 bytes, significantly smaller than the RSA equivalent.
section: "4.1"
