document: rfc-8457
kind: security-consideration
summary: Implementations should protect the IMAP channel from passive eavesdropping to prevent unauthorized discernment of a user's "\Important" mailbox or "$Important" messages; use of IMAP STARTTLS (RFC 3501 Section 11) is recommended.
