document: rfc-5147
kind: protocol-element
summary: A range specifies both a lower and upper bound. Either bound may be omitted, defaulting to the start or end of the MIME entity. A range with equal start and end is legal and identifies a zero-length fragment equivalent to a position.
section: 2.1.1
