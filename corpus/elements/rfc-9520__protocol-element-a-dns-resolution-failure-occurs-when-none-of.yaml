document: rfc-9520
kind: protocol-element
summary: A DNS resolution failure occurs when none of the servers available to a resolver provide any useful response (requested data, referral, or indication of non-existence) for a given <name, type, class> query tuple. NXDOMAIN and NOERROR/NODATA are not resolution failures.
section: "2"
topics:
