document: rfc-2557
kind: protocol-element
summary: 'URI resolution in text/html body parts proceeds by: (a) unfolding headers, (b) removing MIME encodings without percent-decoding, (c) resolving relative URIs via the base URI algorithm from section 5, (d) comparing the resolved URI octet-by-octet against Content-ID- and Content-Location-derived URIs from body parts in the same or surrounding multipart/related structure, and (e) falling back to live Internet retrieval if no match is found.'
section: "8.2"
topics:
    - email
    - http
