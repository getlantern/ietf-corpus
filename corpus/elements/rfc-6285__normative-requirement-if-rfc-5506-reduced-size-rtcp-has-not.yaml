document: rfc-6285
kind: normative-requirement
summary: If RFC 5506 reduced-size RTCP has not been signaled, compound RTCP packets MUST be used per RFC 3550. When no data has been received, an empty receiver report MUST still be included in the RTCP BYE compound packet.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
