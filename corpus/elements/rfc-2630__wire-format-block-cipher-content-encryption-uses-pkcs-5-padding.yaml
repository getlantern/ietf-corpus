document: rfc-2630
kind: wire-format
summary: 'Block-cipher content encryption uses PKCS#5 padding: the input is padded with k-(lth mod k) octets each of value k-(lth mod k), where k is the block size. Input already a multiple of k is padded by a full block of value k. Defined only when k < 256.'
section: "6.3"
