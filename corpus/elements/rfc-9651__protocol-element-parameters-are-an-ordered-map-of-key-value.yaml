document: rfc-9651
kind: protocol-element
summary: Parameters are an ordered map of key/value pairs attached to an Item or Inner List, separated by semicolons. Keys must begin with a lowercase letter or '*' and contain only lcalpha, DIGIT, '_', '-', '.', or '*'. Keys are unique per scope; duplicate keys overwrite earlier entries. Implementations MUST provide access both by index and by key.
section: 3.1.2
topics:
    - http
