document: rfc-3442
kind: normative-requirement
summary: Clients implementing this option SHOULD send a Maximum DHCP Message Size option, set to at least the MTU of the interface being configured, because a full routing table may exceed the standard 576-octet DHCP message size.
section: Requirements to Avoid Sizing Constraints
rfc2119_level: SHOULD
topics:
    - ip
