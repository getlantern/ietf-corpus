document: rfc-1890
kind: normative-requirement
summary: Applications SHOULD NOT assume that the RTP header X bit is always zero and SHOULD be prepared to ignore the header extension. Any future extension definition must allow identification of multiple different extensions via the first 16 bits.
section: "2"
rfc2119_level: SHOULD
topics:
