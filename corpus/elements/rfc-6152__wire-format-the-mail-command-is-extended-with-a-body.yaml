document: rfc-6152
kind: wire-format
summary: The MAIL command is extended with a BODY esmtp-keyword parameter. Only one BODY parameter may be used per MAIL command; the esmtp-value is either 7BIT or 8BITMIME. Syntax defined via ABNF per RFC 5234.
