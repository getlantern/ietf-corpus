document: rfc-6936
kind: security-consideration
summary: Probing the network path to determine whether it supports zero UDP checksum packets can reveal the operating system or tunnel type to an on-path observer. If the probing mechanism is visible in the network (e.g., not protected by IPsec), it discloses configuration information.
section: "7"
topics:
    - udp
    - ip
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
