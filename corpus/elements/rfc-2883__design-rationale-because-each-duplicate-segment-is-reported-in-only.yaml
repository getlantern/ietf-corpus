document: rfc-2883
kind: design-rationale
summary: Because each duplicate segment is reported in only one ACK packet, D-SACK notification is lost if that ACK is dropped. This is an intentional simplicity trade-off; reliable notification would require more complex state at the receiver.
section: "4"
