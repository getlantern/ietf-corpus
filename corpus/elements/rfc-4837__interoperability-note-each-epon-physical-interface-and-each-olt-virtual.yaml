document: rfc-4837
kind: interoperability-note
summary: Each EPON physical interface and each OLT virtual LLID interface MUST have corresponding rows in both the IF-MIB (RFC2863) and Ethernet-like Interfaces MIB (RFC3635) tables. All OLT virtual interfaces share the same ifPhysAddress (the OLT physical MAC address) because there is only one physical MAC.
section: "4.1"
topics:
    - snmp
