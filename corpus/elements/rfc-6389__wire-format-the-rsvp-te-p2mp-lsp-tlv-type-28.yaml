document: rfc-6389
kind: wire-format
summary: 'The RSVP-TE P2MP LSP TLV (type 28) carries the RSVP-TE P2MP LSP SESSION Object. In IPv4, the value is 16 octets: P2MP ID (4 octets), 2 reserved octets, Tunnel ID (2 octets), Extended Tunnel ID (4 octets). In IPv6, the value is 28 octets with a 16-octet Extended Tunnel ID.'
