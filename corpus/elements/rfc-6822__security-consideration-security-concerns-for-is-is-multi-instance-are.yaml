document: rfc-6822
kind: security-consideration
summary: Security concerns for IS-IS Multi-Instance are addressed by existing IS-IS security mechanisms defined in ISO 10589, RFC 5304 (IS-IS Cryptographic Authentication), and RFC 5310 (IS-IS Generic Cryptographic Authentication). The IID is used to select per-instance authentication configuration.
