document: rfc-7181
kind: security-consideration
summary: OLSRv2 does not mandate any specific security mechanism in the base specification; security is delegated to companion documents. A compromised or malicious router can disrupt routing by advertising false topology, refusing to forward, or manipulating MPR selection to create black holes or routing loops.
section: "23.5"
topics:
    - security
    - routing
