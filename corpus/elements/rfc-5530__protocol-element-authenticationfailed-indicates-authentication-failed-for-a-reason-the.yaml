document: rfc-5530
kind: protocol-element
summary: AUTHENTICATIONFAILED indicates authentication failed for a reason the server is unwilling to elaborate on, typically including unknown user or bad password. Its presence lets the client distinguish this from a temporary UNAVAILABLE failure.
