document: rfc-4113
kind: interoperability-note
summary: If the total number of octets or sub-identifiers in udpEndpointLocalAddress and udpEndpointRemoteAddress exceeds 111, OIDs of column instances will have more than 128 sub-identifiers and cannot be accessed using SNMPv1, SNMPv2c, or SNMPv3.
