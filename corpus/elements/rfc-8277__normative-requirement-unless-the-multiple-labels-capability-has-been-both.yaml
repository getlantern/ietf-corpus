document: rfc-8277
kind: normative-requirement
summary: Unless the Multiple Labels Capability has been both sent and received on a given BGP session, a SAFI-4 or SAFI-128 UPDATE MUST bind a prefix to only a single MPLS label and MUST use the Section 2.2 encoding.
section: "2"
rfc2119_level: MUST
topics:
