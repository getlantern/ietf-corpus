document: rfc-8949
kind: wire-format
summary: Bignums (tag 2 = unsigned, tag 3 = negative) encode an arbitrary-precision integer as a byte string in network byte order. Tag 2 value is n; tag 3 value is -1-n. Leading zeros are permitted but not preferred. The preferred serialization uses basic integer major types 0/1 when the value fits.
section: 3.4.3
topics:
