document: rfc-6809
kind: normative-requirement
summary: When a SIP entity adds a Feature-Caps header field to a SIP message, it MUST place the header field before any existing Feature-Caps header field so that the added header field becomes the top-most one, ensuring that the nearest entity's capabilities appear first.
section: 4.2.1
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
