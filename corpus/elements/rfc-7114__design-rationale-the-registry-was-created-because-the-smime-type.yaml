document: rfc-7114
kind: design-rationale
summary: The registry was created because the smime-type parameter values accumulated across multiple documents (RFC 3851, RFC 5273, RFC 5751, RFC 2634, RFC 3854, RFC 7030) without a central registry, making it difficult to track all valid values. RFC 5751 replaced RFC 3851 and registered the media type but did not create a smime-type value registry.
