document: rfc-5533
kind: wire-format
summary: 'The common Shim6 control header contains: Next Header (always 59/NO_NXT_HDR), Hdr Ext Len, P=0, 7-bit Type (0–63 do not trigger R1bis on missing context; 64–127 do), S=0 (distinguishes Shim6 from HIP), and a 16-bit one''s-complement checksum over the Shim6 header only with no pseudo-header.'
