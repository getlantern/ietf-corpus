document: rfc-7636
kind: security-consideration
summary: The code_verifier SHOULD be created with a minimum of 256 bits of entropy using a cryptographically random number generator producing a 32-octet sequence base64url-encoded. The security model relies entirely on the attacker's inability to guess or learn the code_verifier.
section: "7.1"
topics:
    - oauth
    - security
    - crypto
