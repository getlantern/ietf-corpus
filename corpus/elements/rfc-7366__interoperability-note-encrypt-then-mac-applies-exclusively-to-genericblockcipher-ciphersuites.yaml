document: rfc-7366
kind: interoperability-note
summary: Encrypt-then-MAC applies exclusively to GenericBlockCipher ciphersuites. GenericStreamCiphers and GenericAEADCiphers already include integrity protection within the cipher and are therefore unaffected by this extension.
