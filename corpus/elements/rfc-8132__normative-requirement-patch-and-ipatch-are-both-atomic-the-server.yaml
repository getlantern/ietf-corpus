document: rfc-8132
kind: normative-requirement
summary: 'PATCH and iPATCH are both atomic: the server MUST apply the entire set of changes atomically and never provide a partially modified representation to a concurrently executed GET request. Modifications MUST NOT be applied when an error occurs or only partial execution is possible.'
section: "3"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
