document: rfc-3730
kind: normative-requirement
summary: When an offline-pending transform command is issued, the server response MUST clearly note that the action is pending; the object state MUST reflect the pending action; and the server MUST notify the client when offline processing completes. Object mappings SHOULD describe standard formats for completion notices.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
