summary: 'The LDAP search Filter is defined as an ASN.1 CHOICE encompassing ten filter types: and, or, not, equalityMatch, substrings, greaterOrEqual, lessOrEqual, present, approxMatch, and extensibleMatch. This covers the full range of LDAPv3 search filter semantics.'
