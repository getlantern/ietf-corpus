document: rfc-4023
kind: design-rationale
summary: MPLS-in-IP is more efficient than MPLS-in-GRE and is generally preferred. MPLS-in-GRE is applicable when two routers are already adjacent over an existing GRE tunnel (making double-encapsulation inefficient) or when hardware implementation constraints require GRE in the fastpath.
