document: rfc-7844
kind: normative-requirement
summary: The client intending to protect its privacy SHOULD randomize the ordering of options before sending any DHCPv4 or DHCPv6 message; if random ordering cannot be implemented, the client MAY order options by option code number (lowest to highest).
section: "3.1"
rfc2119_level: SHOULD
topics:
    - privacy
    - dns
