document: rfc-7708
kind: normative-requirement
summary: If the C-bit is not set (PW CW not in use), then equipment supporting this specification MUST advertise VCCV CC Type 4. Advertisement of VCCV CC Type 1 and Type 4 are therefore mutually exclusive.
