document: rfc-4108
kind: normative-requirement
summary: Hardware modules that support receipt or error report generation MUST have a unique permanent serial number. Those that support signed receipts or error reports MUST also have a private signature key and the corresponding certificate or its designator, installed before deployment.
section: 1.2.1
rfc2119_level: MUST
topics:
    - security
    - crypto
