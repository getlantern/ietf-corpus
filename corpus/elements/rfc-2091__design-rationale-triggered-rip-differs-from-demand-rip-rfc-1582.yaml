document: rfc-2091
kind: design-rationale
summary: Triggered RIP differs from Demand RIP (RFC 1582) by sending only changed routing information rather than full database fragments, allowing immediate application of changes by the receiver. This reduces routing traffic, requires less memory, and removes the 255-fragment upper limit of Demand RIP.
section: "1"
topics:
    - routing
