document: rfc-6733
kind: protocol-element
summary: The Proxy-Info Grouped AVP contains Proxy-Host and Proxy-State sub-AVPs. It allows stateless agents to embed opaque local state in a Diameter request with the guarantee that the same state appears in the corresponding answer, enabling stateless proxy operation without per-session storage while preserving per-request context across the forwarding path.
section: 6.7.2
topics:
    - diameter
    - routing
