document: rfc-6446
kind: design-rationale
summary: The notifier is explicitly allowed to adjust the subscriber-requested rate control values based on local policy, static configuration, or other constraints. This allows the notifier to handle congestion or enforce operator policies without requiring subscriber awareness.
