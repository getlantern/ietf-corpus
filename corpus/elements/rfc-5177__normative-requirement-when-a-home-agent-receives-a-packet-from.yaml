document: rfc-5177
kind: normative-requirement
summary: When a Home Agent receives a packet from the Mobile Network through the bi-directional tunnel, it MUST verify the outer source IP address is the Mobile Router's Care-of Address. The packet MUST be dropped if the source address does not match.
section: "7"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
