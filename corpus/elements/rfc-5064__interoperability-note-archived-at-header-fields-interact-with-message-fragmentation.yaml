document: rfc-5064
kind: interoperability-note
summary: 'Archived-At header fields interact with message fragmentation (RFC 2046) by being treated the same as Comments header fields: copied to the first fragment message header on fragmentation and back to the reassembled message header. Archived-At headers SHOULD NOT be added to fragment messages to avoid confusion.'
section: "2.3"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
