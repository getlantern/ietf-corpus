document: rfc-5185
kind: normative-requirement
summary: For point-to-point interfaces, no neighbor address configuration is needed for multi-area adjacencies since only one neighbor exists. For all other network types, the neighbor address must be configured or automatically discovered via a mechanism external to OSPF.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
