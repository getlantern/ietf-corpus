document: rfc-4960
kind: normative-requirement
summary: When a user message is fragmented across multiple DATA chunks, the TSNs for the fragments MUST be strictly sequential, and the same Stream Sequence Number MUST be carried in each fragment. Each fragment of an unordered message MUST have its U bit set.
section: 3.3.1
rfc2119_level: MUST
topics:
    - sctp
