document: rfc-4130
kind: normative-requirement
summary: The 'failed' AS2-disposition-type MUST NOT be used for processing problems other than when a failure prevents proper MDN generation. In error cases (decryption failure, auth failure, etc.), the 'processed' disposition-type with the 'error' modifier MUST be used instead.
section: 7.5.4
rfc2119_level: MUST NOT
topics:
    - http
    - email
