document: rfc-8182
kind: normative-requirement
summary: Each new repository serial number MUST be exactly one greater than the current serial. Older Delta Files that, combined with all more recent deltas, exceed the total size of the snapshot MUST be excluded from the Update Notification File to prevent Relying Parties from downloading more data than necessary.
section: 3.3.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
