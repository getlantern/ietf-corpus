document: rfc-2933
kind: security-consideration
summary: Unauthorized write access to the read-write/read-create objects (e.g., igmpInterfaceVersion, igmpInterfaceRobustness, igmpInterfaceStatus) could cause a denial of service by misconfiguring IGMP on the router. SET operations in a non-secure environment without proper protection can negatively affect network operations.
section: "5"
topics:
    - multicast
    - snmp
    - security
