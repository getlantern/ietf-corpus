document: rfc-9748
kind: interoperability-note
summary: Field Type 0x0204 is assigned to both 'Autokey Message Request' (RFC 5906) and 'NTS Cookie' (RFC 8915 Section 5.4). The registry Note states this dual assignment is not a problem in practice because field semantics are determined by other parts of the NTP message.
