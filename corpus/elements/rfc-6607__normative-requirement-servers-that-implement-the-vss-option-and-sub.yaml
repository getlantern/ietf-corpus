document: rfc-6607
kind: normative-requirement
summary: Servers that implement the VSS option and sub-option MUST by default disable use of the feature; it must be specifically enabled through configuration. Servers SHOULD also provide the ability to selectively enable VSS under restricted conditions (e.g., by client-id, subnet, or restricted VPN set).
section: "9"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
