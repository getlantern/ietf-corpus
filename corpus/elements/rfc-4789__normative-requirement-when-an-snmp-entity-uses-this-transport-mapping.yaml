document: rfc-4789
kind: normative-requirement
summary: When an SNMP entity uses this transport mapping, it MUST be capable of accepting SNMP messages up to and including 484 octets in size. It is RECOMMENDED that implementations be capable of accepting messages of up to 1472 octets in size.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
