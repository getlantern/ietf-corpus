document: rfc-5480
kind: design-rationale
summary: 'Two methods for specifying permitted algorithms are defined: id-ecPublicKey allows the key to be used with any ECC algorithm (restricted only by keyUsage), while id-ecDH and id-ecMQV restrict the key to a specific algorithm. This design balances flexibility with explicit algorithm binding to promote interoperability.'
