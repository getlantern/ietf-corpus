document: rfc-9026
kind: normative-requirement
summary: If a P-tunnel is Down, the PE that is the root of that P-tunnel MUST NOT be considered for UMH selection; if the status cannot be determined, the tunnel shall be treated as 'not known to be Down' and may be treated as Up.
section: "3"
rfc2119_level: MUST NOT
topics:
