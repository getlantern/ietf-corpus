document: rfc-6878
kind: normative-requirement
summary: Registration of new values in the 'Priority Header Field Values' registry requires 'IETF Review' as defined by RFC 5226. This policy was chosen over lighter-weight policies due to the potential architectural impact of semantics associated with new Priority values.
