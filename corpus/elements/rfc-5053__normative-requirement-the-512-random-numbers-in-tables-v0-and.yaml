document: rfc-5053
kind: normative-requirement
summary: The 512 random numbers in tables V0 and V1 (each containing 256 four-byte unsigned integers) MUST be available to both sender and receiver, as they underpin the pseudo-random number generator used throughout encoding and decoding.
section: "5.2"
rfc2119_level: MUST
