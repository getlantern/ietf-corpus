document: rfc-9849
kind: normative-requirement
summary: If the client has no compatible ECHConfig, it SHOULD send a GREASE encrypted_client_hello extension with random config_id, a supported cipher suite, a randomly generated encapsulated key, and a random payload of L+C bytes matching the size of a real ECH payload with padding.
section: 6.2.1
rfc2119_level: SHOULD
