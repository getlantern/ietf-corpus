document: rfc-3986
kind: security-consideration
summary: Some platforms interpret non-standard dotted IP address formats (octal, hexadecimal, fewer than four octets) that are not permitted by the URI grammar. Implementations should be cautious with such "rare IP address formats" as they may be used to circumvent address-based access controls.
section: "7.4"
topics:
    - security
    - ip
