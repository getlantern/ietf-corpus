document: rfc-3986
kind: security-consideration
summary: Some platforms interpret non-standard dotted IP address formats (e.g., octal or hexadecimal octets) that are not valid per this grammar, allowing attackers to bypass access controls. Only standard dotted-decimal IPv4 notation is permitted by this specification.
section: "7.4"
topics:
    - security
    - ip
