document: rfc-7159
kind: normative-requirement
summary: Implementations MUST NOT add a byte order mark to the beginning of a JSON text. Implementations that parse JSON texts MAY ignore the presence of a byte order mark rather than treating it as an error.
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - json
