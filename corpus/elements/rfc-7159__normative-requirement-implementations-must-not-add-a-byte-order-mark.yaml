document: rfc-7159
kind: normative-requirement
summary: Implementations MUST NOT add a byte order mark (BOM) to the beginning of a JSON text. Parsers MAY ignore a BOM rather than treating it as an error.
section: "8.1"
rfc2119_level: MUST NOT
