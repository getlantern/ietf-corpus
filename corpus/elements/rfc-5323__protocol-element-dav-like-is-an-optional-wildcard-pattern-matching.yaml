document: rfc-5323
kind: protocol-element
summary: DAV:like is an optional wildcard pattern-matching operator. The pattern uses '_' to match exactly one character and '%' to match zero or more characters, with '\' as escape. Patterns are Unicode code points typically encoded in UTF-8 or UTF-16 in the XML document.
