document: rfc-4516
kind: security-consideration
summary: Reusable passwords sent to the server should not be used in URL processing unless explicitly permitted by policy, as they may reveal easily-abused information to the remote server or eavesdroppers. If the URL represents a referral for an update operation, strong authentication SHOULD be used.
section: "5"
rfc2119_level: SHOULD
topics:
    - ldap
    - security
    - crypto
