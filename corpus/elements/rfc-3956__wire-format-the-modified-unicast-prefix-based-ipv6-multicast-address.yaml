document: rfc-3956
kind: wire-format
summary: 'The modified unicast-prefix-based IPv6 multicast address format (128 bits total): 8-bit 0xFF | 4-bit flags (0|R|P|T) | 4-bit scope | 4-bit rsvd | 4-bit RIID | 8-bit plen | 64-bit network prefix | 32-bit group ID. This modifies RFC 3306 by splitting the previously 8-bit reserved field into a 4-bit reserved portion and a 4-bit RP Interface ID (RIID) field, and defining the R-bit.'
section: "3"
topics:
