document: rfc-6494
kind: interoperability-note
summary: Section 7.3 of RFC 3971 is updated to specify that operators not wishing to constrain routers to specific prefixes should configure routers with certificates containing the 'inherit' element for the IPv6 AFI, rather than using the null prefix approach.
