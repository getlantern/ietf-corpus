document: rfc-3075
kind: security-consideration
summary: XML Signatures establish only cryptographic integrity and authentication; they do not establish trust or the meaning of the signed data. Applications must independently define key-to-identity bindings and trust policies; a valid signature does not imply that an action should be taken.
section: "8.2"
topics:
