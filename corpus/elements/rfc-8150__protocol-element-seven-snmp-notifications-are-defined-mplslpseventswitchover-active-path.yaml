kind: protocol-element
summary: 'Seven SNMP notifications are defined: mplsLpsEventSwitchover (active path switchover), mplsLpsEventRevertiveMismatch, mplsLpsEventProtecTypeMismatch, mplsLpsEventCapabilitiesMismatch, mplsLpsEventPathConfigMismatch, mplsLpsEventFopNoResponse (no response within 50 ms), and mplsLpsEventFopTimeout (no PSC message for ≥3.5× long PSC message interval).'
