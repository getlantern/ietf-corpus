document: rfc-5663
kind: interoperability-note
summary: Unilateral layout revocation (client fencing) for block/volume storage can only operate at host/LUN granularity. When one layout is revoked for a client, all of that client's layouts for files on the same storage units are effectively rendered unusable, which may impact files in other file systems on those storage units.
section: 2.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
