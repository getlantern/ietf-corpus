document: rfc-9762
kind: normative-requirement
summary: The absence of PIOs with the P bit set MUST NOT be processed to mean that DHCPv6-PD is absent. Nodes running DHCPv6-PD due to explicit configuration or by default (e.g., CE routers) MUST NOT disable DHCPv6-PD solely because no PIOs with the P bit are received.
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
