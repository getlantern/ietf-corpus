document: rfc-3463
kind: interoperability-note
summary: X.6.3 (conversion required but not supported) may occur at ESMTP gateways that support 8-bit transport but cannot downgrade messages to 7-bit as required for the next hop, illustrating a gateway interoperability boundary.
