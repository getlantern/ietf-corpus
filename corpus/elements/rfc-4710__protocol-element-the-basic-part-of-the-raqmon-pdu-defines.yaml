document: rfc-4710
kind: protocol-element
summary: The BASIC part of the RAQMON PDU defines up to 32 pre-defined parameters covering session identifiers (DA, RA, DN, RN), session timing (setup time, setup delay, duration, status), network performance (round-trip delay, one-way delay, application delay, inter-arrival jitter, IPDV), packet counters (sent, received, lost, discarded, as counts and fractions), QoS markings (L2 priority, TOS/DSCP for source and destination), device resources (CPU and memory utilization), and application identification (name/version, payload type).
section: "5"
topics:
