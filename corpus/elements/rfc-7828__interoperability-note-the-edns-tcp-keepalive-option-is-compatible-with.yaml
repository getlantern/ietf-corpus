document: rfc-7828
kind: interoperability-note
summary: The edns-tcp-keepalive option is compatible with and complementary to other EDNS0 extensions such as CHAIN-QUERY and DNS-over-TLS; combined, these extensions enable efficient DNSSEC validation with encryption on high-latency mobile networks.
