document: rfc-8486
kind: protocol-element
summary: Channel Mapping Family 3 generates C output channels by multiplying K=N+M decoded channels with a demixing matrix D (C rows, K columns). The matrix must be provided in the channel mapping table of the identification header, replacing the standard channel mapping field.
