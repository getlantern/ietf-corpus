document: rfc-20
kind: design-rationale
summary: No specific semantic meaning is prescribed for graphic characters beyond what users understand, and no type style is specified for printing or display; applications may stylize individual graphics (e.g., 2/1 as logical OR, 5/15 as logical NOT) for their own purposes.
