document: rfc-4454
kind: design-rationale
summary: An LCCE MAY defer session establishment until an ATM circuit becomes ACTIVE rather than initiating immediately upon provisioning, to delay resource allocation until it is actually needed. The document explicitly notes this as a preferred approach.
