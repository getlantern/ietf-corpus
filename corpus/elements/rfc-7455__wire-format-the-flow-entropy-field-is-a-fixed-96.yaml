document: rfc-7455
kind: wire-format
summary: The Flow Entropy field is a fixed 96-byte field. The rightmost bits MUST be padded with zeros when the actual flow-entropy information is less than 96 bytes. The field begins with Inner.MacDA; its offset depends on whether TRILL extensions are present as specified in RFC 7179.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
