document: rfc-4522
kind: security-consideration
summary: When interpreting security-sensitive fields, particularly fields used to grant or deny access, implementations MUST ensure that any matching rule comparisons are done on the underlying abstract value, regardless of the particular encoding (LDAP-specific or BER) used.
