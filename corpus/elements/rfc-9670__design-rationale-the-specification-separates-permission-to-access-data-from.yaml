document: rfc-9670
kind: design-rationale
summary: The specification separates _permission_ to access data from _subscription_ (desire to see it). A user may have permission to access many shared mailboxes but subscribe only to the ones they care about, allowing clients to present distinct interfaces for subscribed vs. browsable data.
section: "1.4"
topics:
    - json
