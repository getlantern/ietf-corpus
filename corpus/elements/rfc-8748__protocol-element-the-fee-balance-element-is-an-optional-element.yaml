document: rfc-8748
kind: protocol-element
summary: The <fee:balance> element is an OPTIONAL element in transform command responses indicating the client's remaining account balance, which MAY be negative (indicating an extended line of credit). If a server supports this element, it MUST be included in responses to all transform/billable commands.
section: "3.5"
topics:
    - registry
