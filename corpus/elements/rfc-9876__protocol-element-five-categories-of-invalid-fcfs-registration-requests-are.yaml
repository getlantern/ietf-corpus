document: rfc-9876
kind: protocol-element
summary: 'Five categories of invalid FCFS registration requests are identified: (1) unknown Media Type, (2) unknown parameter on a known Media Type, (3) invalid parameter value, (4) unknown Content Coding, and (5) duplicate logical entries via default parameter values, default Content Coding, or semantically equivalent parameter values such as case-insensitive URNs.'
