document: rfc-8264
kind: normative-requirement
summary: Because applying PRECIS profile rules is not necessarily idempotent, an implementation SHOULD apply the rules repeatedly until the output string is stable. If the output does not stabilize after three additional applications beyond the first, the implementation SHOULD terminate and reject the input string as invalid.
section: "7"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
