document: rfc-6339
kind: interoperability-note
summary: GSS_C_NO_OID passed to GSS_OID_equal() will not match any OID, including another GSS_C_NO_OID. Callers must not rely on GSS_C_NO_OID equality behavior when validating negotiated mechanisms.
section: "5"
