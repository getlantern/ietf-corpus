document: rfc-1549
kind: security-consideration
summary: 'When implementations disconnect the physical layer during inactivity without notifying the data link layer, security lapses can result: an insertion attack may go undetected, and an attacker spoofing the same calling identity may bypass link authentication. Implementations should signal the Down event after ''significant time'' has elapsed to force link re-authentication.'
section: Security Considerations
topics:
    - security
