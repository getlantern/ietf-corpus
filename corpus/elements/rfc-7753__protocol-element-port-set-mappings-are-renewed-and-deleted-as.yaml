document: rfc-7753
kind: protocol-element
summary: 'Port-set mappings are renewed and deleted as a single entity: the Assigned Lifetime applies to all ports in the set simultaneously. Overlap with existing single-port or port-set mappings causes the server to treat the request as independent refresh requests, sending one Mapping Update message per affected mapping.'
section: "4.4"
topics:
    - nat
    - pcp
