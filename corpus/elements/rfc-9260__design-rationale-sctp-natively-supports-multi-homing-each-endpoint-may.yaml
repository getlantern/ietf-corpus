document: rfc-9260
kind: design-rationale
summary: 'SCTP natively supports multi-homing: each endpoint may advertise multiple IP addresses during INIT/INIT ACK exchange, and the association spans all source/destination combinations. This provides network-level fault tolerance unavailable in TCP, at the cost of a broader association concept than a single TCP connection.'
section: 1.5.7
topics:
    - sctp
    - multipath
