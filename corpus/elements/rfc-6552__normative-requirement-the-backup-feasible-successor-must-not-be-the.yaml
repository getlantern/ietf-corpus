document: rfc-6552
kind: normative-requirement
summary: The backup feasible successor MUST NOT be the preferred parent, and MUST be in the same or a subsequent DODAG Version as this node. A router in the same DODAG Version with a Rank higher than this node's computed Rank MUST NOT be selected as a feasible successor.
section: 4.2.2
rfc2119_level: MUST NOT
topics:
    - routing
