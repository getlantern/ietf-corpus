document: rfc-3748
kind: normative-requirement
summary: Lower layer transports for EAP MUST preserve ordering between a source and destination at a given priority level. Running EAP over raw IP or UDP transport is NOT RECOMMENDED because reordering will typically result in EAP authentication failure.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
