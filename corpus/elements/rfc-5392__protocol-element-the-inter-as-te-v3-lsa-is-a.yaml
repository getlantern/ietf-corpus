document: rfc-5392
kind: protocol-element
summary: The Inter-AS-TE-v3 LSA is a new OSPFv3 LSA type with function code 13 for advertising inter-AS TE links in OSPFv3. The U-bit is always set to 1; S2/S1 bits indicate flooding scope (01 for area-scoped, 10 for AS-scoped).
section: 3.1.2
topics:
