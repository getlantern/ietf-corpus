document: rfc-4202
kind: design-rationale
summary: Maximum LSP Bandwidth supersedes the static Maximum Link Bandwidth of prior MPLS TE because it is expressed per priority level and varies dynamically as LSPs are set up and torn down, enabling path computation to accurately account for preemption and bandwidth availability at each priority.
section: 2.4.2
topics:
    - routing
