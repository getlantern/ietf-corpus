kind: normative-requirement
summary: 'Applications conforming to this profile MUST recognize the following extensions: key usage, certificate policies, subject alternative name, basic constraints, name constraints, policy constraints, extended key usage, and inhibit any-policy. Applications SHOULD additionally recognize authority key identifier, subject key identifier, and policy mappings.'
