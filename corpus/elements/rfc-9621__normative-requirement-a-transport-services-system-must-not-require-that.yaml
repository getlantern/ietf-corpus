document: rfc-9621
kind: normative-requirement
summary: A Transport Services System MUST NOT require that a peer on the other side of a connection use the same API or implementation. A Transport Services Implementation can communicate with any existing Endpoint that implements the selected transport protocol(s).
section: "3.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
