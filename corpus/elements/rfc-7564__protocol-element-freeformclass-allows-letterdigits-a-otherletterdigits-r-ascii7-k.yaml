document: rfc-7564
kind: protocol-element
summary: FreeformClass allows LetterDigits (A), OtherLetterDigits (R), ASCII7 (K), HasCompat (Q), Spaces (N), Symbols (O), and Punctuation (P) as valid; Exceptions and JoinControl are allowed under contextual rules; OldHangulJamo, Controls, and PrecisIgnorableProperties are disallowed. Unassigned code points are disallowed.
section: "4.3"
