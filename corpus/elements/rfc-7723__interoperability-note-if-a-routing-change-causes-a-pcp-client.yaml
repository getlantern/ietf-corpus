document: rfc-7723
kind: interoperability-note
summary: If a routing change causes a PCP client to start interacting with a different PCP server, the client can detect this by examining the Epoch field during the next PCP response or ANNOUNCE message, then re-establish firewall rules. This is equivalent to a PCP server reboot from the client's perspective.
section: "3"
topics:
