document: rfc-6391
kind: protocol-element
summary: The Flow Label Sub-TLV (FL Sub-TLV) is a new Pseudowire Interface Parameter Sub-TLV used with LDP signalling (RFC 4447) to synchronise flow label capability between ingress and egress PEs. It carries T and R bits indicating the sender's intent to transmit and ability to receive flow-labeled PW packets, respectively.
section: "4"
