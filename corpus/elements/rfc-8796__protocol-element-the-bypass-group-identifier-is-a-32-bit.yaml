document: rfc-8796
kind: protocol-element
summary: The Bypass_Group_Identifier is a 32-bit value created and managed by the PLR node that groups protected LSPs sharing the same bypass tunnel, egress link, and tunnel sender address. It is exchanged via B-SFRR-Ready signaling so the MP can build a mirrored Summary FRR group database.
