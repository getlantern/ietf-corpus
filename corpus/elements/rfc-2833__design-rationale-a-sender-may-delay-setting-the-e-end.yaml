document: rfc-2833
kind: design-rationale
summary: A sender MAY delay setting the E (end) bit until retransmitting the final packet rather than on first transmission, to avoid prematurely signaling end-of-tone before confirming the tone has actually ceased.
section: "3.5"
topics:
