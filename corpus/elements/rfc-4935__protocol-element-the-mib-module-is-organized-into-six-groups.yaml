summary: 'The MIB module is organized into six groups: t11FcsDiscoveredConfigGroup (topology data), t11FcsDiscoveryStatusGroup (discovery monitoring), t11FcsDiscoveryControlGroup (triggering discovery), t11FcsStatisticsGroup (counters), t11FcsNotificationGroup (three notifications), and t11FcsNotificationInfoGroup (notification control and info objects).'
