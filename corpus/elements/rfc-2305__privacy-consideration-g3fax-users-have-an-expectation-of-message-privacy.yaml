document: rfc-2305
kind: privacy-consideration
summary: G3Fax users have an expectation of message privacy higher than that provided by unenhanced Internet mail. This expectation SHOULD be preserved as much as possible, typically via encryption for data confidentiality.
section: 5.2.5
rfc2119_level: SHOULD
