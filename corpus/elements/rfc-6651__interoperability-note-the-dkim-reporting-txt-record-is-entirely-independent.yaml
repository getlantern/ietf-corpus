document: rfc-6651
kind: interoperability-note
summary: The DKIM Reporting TXT record is entirely independent of DKIM key records and is found at a different DNS name ('_report._domainkey.<domain>'). Implementations must not conflate the two record types.
section: "3.2"
topics:
