document: rfc-8664
kind: normative-requirement
summary: Implementations MUST allow the operator to enable and disable the Segment Routing path setup type on a PCEP-speaking device. PCE implementations MUST allow the operator to specify that an LSP should be instantiated using SR or RSVP-TE as the proposed path setup type.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
