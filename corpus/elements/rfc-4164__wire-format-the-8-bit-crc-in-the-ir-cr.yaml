document: rfc-4164
kind: wire-format
summary: The 8-bit CRC in the IR-CR packet MUST cover the entire packet excluding the payload, including the CID or Add-CID octet and the Base CID field if present. It uses polynomial C(x) = 1 + x + x^2 + x^8, with the CRC register preset to all 1's.
section: 3.5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
