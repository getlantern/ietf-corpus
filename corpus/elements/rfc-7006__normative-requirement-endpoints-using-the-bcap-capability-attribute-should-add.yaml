document: rfc-7006
kind: normative-requirement
summary: Endpoints using the 'bcap' capability attribute SHOULD add the 'bcap-v0' option tag to existing option tags in 'csup' and 'creq' attributes. Similarly, 'ccap-v0' SHOULD be added for connection data capability and 'icap-v0' for title capability.
section: 3.1.1.2
rfc2119_level: SHOULD
topics:
    - realtime
    - sip
