document: rfc-1662
kind: normative-requirement
summary: Asynchronous transmitters SHOULD send an opening Flag Sequence whenever 'appreciable time' (no greater than about 1 second) has elapsed after the prior closing Flag Sequence, to avoid appending noise characters to the next frame.
section: 4.4.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
