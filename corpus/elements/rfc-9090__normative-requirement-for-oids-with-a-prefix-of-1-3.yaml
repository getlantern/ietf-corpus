document: rfc-9090
kind: normative-requirement
summary: For OIDs with a prefix of '1.3.6.1.4.1', tag 112 is the preferred serialization over tag 111; it is five bytes shorter. The Core Deterministic Encoding Requirements of RFC 8949 Section 4.2.1 therefore require use of tag 112 wherever applicable.
section: "2.2"
rfc2119_level: REQUIRED
topics:
