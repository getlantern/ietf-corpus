document: rfc-6870
kind: normative-requirement
summary: A PE implementation using these mechanisms MUST negotiate the use of PW Status TLV between its T-LDP peers as per RFC 4447. If PW Status TLV is not supported by either endpoint, the mechanisms in this document cannot be used.
