document: rfc-7717
kind: security-consideration
summary: The strength of the derived shared secret key is bounded by the IKEv2 SA key derivation algorithm as per RFC 7296, and depends on the inherent strength of the Diffie-Hellman group, exponent size, and random number generator entropy. DoS vulnerabilities are also as defined in RFC 7296.
