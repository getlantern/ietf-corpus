document: rfc-5908
kind: interoperability-note
summary: RFC 4075 (SNTP Configuration Option for DHCPv6) is deprecated by this document. RFC 4075 was not extensible, introduced semantic confusion via the 'SNTP' acronym, and did not support FQDN-based server location, making it unsuitable for full NTP deployments.
section: "7"
topics:
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
