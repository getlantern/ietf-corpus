document: rfc-5361
kind: design-rationale
summary: The return routability test authentication method (for SIP PUBLISH and HTTP GET) explicitly requires no authentication and therefore no identity matching procedures are defined for it. This is a deliberate design trade-off accepting lower assurance for ease of deployment in open scenarios.
section: 3.1.1
topics:
