document: rfc-5364
kind: normative-requirement
summary: URI-list servers MUST convert URIs tagged with the 'anonymize' attribute to the SIP URI 'sip:anonymous@anonymous.invalid' in recipient-history lists. Anonymized URIs may still be used for routing.
section: "4"
rfc2119_level: MUST
topics:
