document: rfc-2060
kind: normative-requirement
summary: Unencoded binary strings (any string containing NUL characters) are not permitted. Implementations MUST encode binary data into a textual form such as BASE64 before transmitting.
section: 4.3.1
rfc2119_level: MUST
