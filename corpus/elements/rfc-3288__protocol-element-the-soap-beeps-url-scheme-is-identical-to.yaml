document: rfc-3288
kind: protocol-element
summary: The 'soap.beeps' URL scheme is identical to 'soap.beep' except that prior to starting the SOAP profile, the BEEP session MUST be tuned for privacy via a transport security profile or a user authentication profile that supports transport security. Both schemes use the same SRV service name, port, and address resolution algorithms.
section: "5.2"
topics:
    - tls
    - security
