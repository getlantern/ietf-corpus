document: rfc-9009
kind: protocol-element
summary: The Destination Cleanup Object (DCO) is a new ICMPv6 RPL control message (code 0x07) that originates at a common ancestor node and travels downstream along the old path to proactively clean up routing state for a target node and its dependents. Unlike NPDAO which flows upstream, DCO flows downstream using link-local unicast addresses.
section: "4.3"
topics:
    - routing
