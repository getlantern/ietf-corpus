document: rfc-6696
kind: protocol-element
summary: 'rRK derivation: rRK = KDF(K, S) where K is the EMSK or DSRK, and S is the ASCII label ''EAP Re-authentication Root Key@ietf.org'' | ''\0'' | length. The KDF and algorithm agility follow RFC 5295. An rRK derived from DSRK is referred to as a DS-rRK.'
section: "4.1"
topics:
