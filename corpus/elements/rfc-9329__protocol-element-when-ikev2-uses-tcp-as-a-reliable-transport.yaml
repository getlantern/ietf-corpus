document: rfc-9329
kind: protocol-element
summary: When IKEv2 uses TCP as a reliable transport, the exchange Initiator SHOULD NOT retransmit request messages; if no response is received within a reasonable period, the IKE SA is deleted. If a new TCP connection is established while waiting for a response, the Initiator MUST retransmit its request over the new connection.
section: "6.2"
topics:
    - ipsec
    - vpn
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
