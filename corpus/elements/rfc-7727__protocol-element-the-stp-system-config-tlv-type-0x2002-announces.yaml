document: rfc-7727
kind: protocol-element
summary: The STP System Config TLV (Type=0x2002) announces the local node's STP System Parameters to RG peers. It carries an 8-octet ROID (Redundant Object Identifier) and a 6-octet MAC address representing the sender's BridgeIdentifier; total Length is always 14.
