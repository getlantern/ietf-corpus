document: rfc-5360
kind: protocol-element
summary: The 470 (Consent Needed) response code indicates that a request contained a URI list with at least one URI for which the relay had no permissions. A UAS generating this response SHOULD include a Permission-Missing header field listing the URIs lacking permissions.
section: 5.9.2
topics:
    - sip
