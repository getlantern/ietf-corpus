document: rfc-7232
kind: wire-format
summary: 'The entity-tag format is: entity-tag = [ weak ] opaque-tag; weak = %x57.2F (''W/'', case-sensitive); opaque-tag = DQUOTE *etagc DQUOTE. Backslash characters ought to be avoided in entity-tags because older recipients may perform backslash unescaping.'
section: "2.3"
topics:
    - http
