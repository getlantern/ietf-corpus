document: rfc-6157
kind: normative-requirement
summary: Domains SHOULD deploy dual-stack outbound proxy servers (or both IPv4-only and IPv6-only proxies), and there SHOULD exist both IPv6 and IPv4 DNS entries for those proxies so user agents can obtain the address most appropriate for their IP version.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - sip
    - v6ops
    - dns
