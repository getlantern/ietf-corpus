document: rfc-2750
kind: protocol-element
summary: The Policy Refresh TIME_VALUES (PRT) option slows policy refresh frequency by computing a multiplier N = Floor(PRT/R) and stretching the effective refresh period to R' = N*R. PRT-controlled policy state expires N times slower than normal RSVP state; the multiplier applies only to no-change periodic refreshes.
section: "3.2"
topics:
    - qos
