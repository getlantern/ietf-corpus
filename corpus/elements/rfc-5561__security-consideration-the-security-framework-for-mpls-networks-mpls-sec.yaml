document: rfc-5561
kind: security-consideration
summary: The security framework for MPLS networks (MPLS_SEC) and the security considerations of RFC 5036 apply equally to the capability mechanism defined in this document. No additional security considerations specific to capability advertisement are introduced beyond those already applicable to the base LDP specification.
