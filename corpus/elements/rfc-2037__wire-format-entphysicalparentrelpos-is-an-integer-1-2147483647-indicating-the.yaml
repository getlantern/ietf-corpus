document: rfc-2037
kind: wire-format
summary: entPhysicalParentRelPos is an INTEGER (-1..2147483647) indicating the relative position of a child component among its siblings. The value -1 indicates position cannot be determined or entPhysicalContainedIn is 0; non-negative values reflect parent-relative ordering, normally starting from 1 unless the device labels from 0.
