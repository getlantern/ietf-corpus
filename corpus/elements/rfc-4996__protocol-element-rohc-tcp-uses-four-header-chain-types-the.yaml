kind: protocol-element
summary: 'ROHC-TCP uses four header chain types: the static chain (IR only), the dynamic chain (IR and IR-DYN, includes compressed TCP options list), the replicate chain (IR-CR only, absent fields are copied from the base context), and the irregular chain (CO packets only, per-packet changing fields including TCP option irregular items).'
