document: rfc-8397
kind: interoperability-note
summary: The Nickname Sub-TLV (RFC 7176 Section 2.3.2) is still allowed to be used alongside the NickBlockFlags APPsub-TLV. Border RBridges must fall back to individual Nickname Sub-TLV announcements for areas that contain legacy RBridges not understanding the NickBlockFlags APPsub-TLV.
section: "4.3"
topics:
    - routing
