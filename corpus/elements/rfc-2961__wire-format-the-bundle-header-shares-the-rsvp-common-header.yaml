document: rfc-2961
kind: wire-format
summary: 'The Bundle header shares the RSVP common header layout: Vers (4 bits), Flags (4 bits, 0x01 = Refresh-Reduction-Capable), Msg Type (8 bits, value 12), RSVP Checksum (16 bits, MAY be zero since sub-messages carry their own checksums), Send_TTL (8 bits), Reserved (8 bits), RSVP Length (16 bits, total bundle length including header).'
section: "3.1"
