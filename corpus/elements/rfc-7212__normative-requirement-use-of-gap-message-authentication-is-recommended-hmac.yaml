document: rfc-7212
kind: normative-requirement
summary: Use of GAP message authentication is RECOMMENDED. HMAC-SHA-1 MUST be supported; HMAC-SHA-256 MAY also be supported. The Authentication Keystring SHOULD NOT be a human-memorable string; implementations MUST support random binary values of appropriate length.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
