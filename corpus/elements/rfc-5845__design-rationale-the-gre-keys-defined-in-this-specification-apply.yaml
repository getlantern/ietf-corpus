document: rfc-5845
kind: design-rationale
summary: The GRE keys defined in this specification apply to the individual mobility binding updated by a specific Proxy Binding Update, not to all bindings a mobile node may have registered under RFC 5648. This scoping is a deliberate design choice to allow per-session flow marking.
section: "3.1"
topics:
    - routing
    - ip
