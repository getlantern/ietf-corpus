document: rfc-8887
kind: interoperability-note
summary: The WebSocket JMAP subprotocol is negotiated via HTTP/1.1 Upgrade (RFC 6455 Section 4) or HTTP/2 Extended CONNECT (RFC 8441 Section 5), and is intended to run over future HTTP bindings (e.g., HTTP/3) when a WebSocket handshake mechanism is defined for them.
section: "4.2"
topics:
    - websocket
    - http
