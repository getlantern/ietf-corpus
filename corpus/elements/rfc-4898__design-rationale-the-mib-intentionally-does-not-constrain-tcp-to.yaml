document: rfc-4898
kind: design-rationale
summary: The MIB intentionally does not constrain TCP to use or exclude any particular estimator, heuristic, or algorithm. Because TCP standards routinely use SHOULD rather than MUST to allow room for improvement, a tight MIB specification would conflict with ongoing TCP evolution.
section: "3.2"
topics:
    - tcp
    - snmp
