document: rfc-3676
kind: normative-requirement
summary: When generating flowed text, lines SHOULD be 78 characters or fewer in length, counting trailing white space and any stuffing space, but not the CRLF. Words exceeding 78 characters SHOULD be sent as-is, exceeding the limit.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - email
