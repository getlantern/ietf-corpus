document: rfc-9833
kind: protocol-element
summary: The 'ietf-ac-common' YANG module (namespace urn:ietf:params:xml:ns:yang:ietf-ac-common, prefix ac-common) defines reusable features, types, identities, and groupings for attachment circuits. It is designed to be imported by service models (e.g., ietf-ac-svc, ietf-bearer-svc) and network/device models (e.g., ietf-ac-ntw) to ensure consistent AC structures.
