document: rfc-2622
kind: protocol-element
summary: 'Structured import/export policies use EXCEPT and REFINE operators. EXCEPT gives precedence to the right-hand side for the intersection of routes while retaining left-hand side policies for the remainder. REFINE takes the Cartesian product: for each pair of left/right policies with common peerings, the result intersects their filters and concatenates their actions.'
section: "6.6"
topics:
