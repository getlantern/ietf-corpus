document: rfc-4733
kind: normative-requirement
summary: For the tone payload, the sender SHOULD combine new and old tone reports in the same RTP packet using RFC 2198 audio redundancy to increase reliability, since each tone packet is independent and a lost packet represents a gap in information at the receiver.
section: 4.4.1
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
    - voip
