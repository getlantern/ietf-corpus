document: rfc-7032
kind: protocol-element
summary: On receiving a 'No Route' notification, the access LSR retries via exponential backoff. Per RFC 5036, if no response is received to a Label Request, a duplicate request must not be sent; this is treated as a protocol error. The Queue Request TLV extension (Section 5) addresses this convergence limitation.
section: 4.3.2
topics:
    - mpls
