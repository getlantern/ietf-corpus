document: rfc-6595
kind: security-consideration
summary: Collusion between RPs is possible when the same user identifier is shared across multiple RPs. SAML's targeted identity feature mitigates this by allowing the IdP to supply RP-specific opaque identifiers instead of the real user identifier.
section: "6.4"
topics:
    - security
    - privacy
