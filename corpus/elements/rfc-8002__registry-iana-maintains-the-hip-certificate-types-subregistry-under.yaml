document: rfc-8002
kind: registry
summary: IANA maintains the 'HIP Certificate Types' subregistry under 'Host Identity Protocol (HIP) Parameters'. The 8-bit unsigned integer field defines certificate types. New values from unassigned space are assigned through IETF Review. This document obsoletes RFC 6253 as the reference and removes SPKI types (2, 4, 6, 8).
