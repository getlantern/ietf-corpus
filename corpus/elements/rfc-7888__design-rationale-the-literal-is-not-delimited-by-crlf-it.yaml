document: rfc-7888
kind: design-rationale
summary: The literal is not delimited by CRLF; it ends after the number of bytes specified by the octet count. A CRLF may immediately follow (ending the command) or additional parameters may follow before the CRLF, with SP characters placed after the literal as needed.
