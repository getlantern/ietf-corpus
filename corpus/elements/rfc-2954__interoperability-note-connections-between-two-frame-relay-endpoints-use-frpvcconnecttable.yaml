document: rfc-2954
kind: interoperability-note
summary: Connections between two frame relay endpoints use frPVCConnectTable, while frame relay-to-ATM interworked connections use the frAtmIwfConnectionTable defined in the FR/ATM PVC Service Interworking MIB. For interworked connections, frPVCEndptConnectIdentifier returns zero and frPVCEndptAtmIwfConnIndex carries the IWF cross-connect index.
section: 2.5.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
