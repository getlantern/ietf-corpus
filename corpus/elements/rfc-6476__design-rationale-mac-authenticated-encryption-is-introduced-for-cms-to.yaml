document: rfc-6476
kind: design-rationale
summary: MAC-authenticated encryption is introduced for CMS to address the gap between user expectations (that encryption implies integrity) and the reality that unauthenticated encryption provides none. This mirrors the encrypt-and-authenticate pattern already established in IPsec, SSL/TLS, and SSH.
section: "2"
topics:
