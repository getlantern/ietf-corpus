document: rfc-6715
kind: interoperability-note
summary: These vCard property extensions were defined to enable synchronization via OMA Data Synchronization (OMA-DS) of contact fields not covered by the base vCard 4.0 specification (RFC 6350). Implementations must conform to the base vCard specification for parsing and serialization.
section: "1"
