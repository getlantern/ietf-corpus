document: rfc-7144
kind: normative-requirement
summary: If the negotiation answer for iSCSIProtocolLevel is ignored by the acceptor or the remote endpoint returns key=NotUnderstood, features defined in RFC 7144 and any RFC requiring a value greater than 2 MUST NOT be used.
