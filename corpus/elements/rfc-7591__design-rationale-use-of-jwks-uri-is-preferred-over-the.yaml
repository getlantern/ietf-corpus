document: rfc-7591
kind: design-rationale
summary: Use of 'jwks_uri' is preferred over the inline 'jwks' parameter because it allows for easier key rotation without requiring re-registration. The inline 'jwks' is intended only for clients that cannot host public URLs, such as native clients.
