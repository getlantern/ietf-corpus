document: rfc-5065
kind: interoperability-note
summary: Any BGP speaker not supporting the AS_CONFED_SET and AS_CONFED_SEQUENCE extensions will generate a NOTIFICATION message with 'UPDATE Message Error' and sub-code 'Malformed AS_PATH'. All confederation participants MUST support confederations; external BGP speakers need not.
