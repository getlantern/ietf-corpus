document: rfc-3335
kind: security-consideration
summary: Certificate processing may fail in many ways (no chain to trusted CA, inability to check CRL, invalid or expired CRL, expired certificate, revoked certificate); processing software must check all cases thoroughly and take immediate, noticeable steps to inform the end user of any failure.
section: "7.0"
topics:
    - security
    - pkix
    - email
