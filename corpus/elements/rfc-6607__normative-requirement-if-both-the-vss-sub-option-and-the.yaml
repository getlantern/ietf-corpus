document: rfc-6607
kind: normative-requirement
summary: If both the VSS sub-option and the VSS-Control sub-option appear in the reply from the DHCPv4 server, the relay agent MUST assume the server did not act on the VSS information. If only the VSS sub-option appears (without VSS-Control), the relay agent SHOULD assume the server acted successfully on the VSS sub-option.
section: "5"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
