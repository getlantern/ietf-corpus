document: rfc-6552
kind: normative-requirement
summary: An OF0 implementation SHOULD support the DODAG Configuration option (RFC 6550 Section 6.7.6) and apply the parameters therein, including MinHopRankIncrease, which overrides the DEFAULT_MIN_HOP_RANK_INCREASE constant. This requirement may be overridden by application-scenario guidance.
section: "7.1"
rfc2119_level: SHOULD
topics:
