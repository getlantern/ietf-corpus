document: rfc-9264
kind: design-rationale
summary: 'The ''application/linkset'' format explicitly differs from RFC 6690 ''application/link-format'': the former fully matches the RFC 8288 HTTP Link header field grammar, whereas the latter introduces CoRE-specific constraints. They are not interchangeable.'
