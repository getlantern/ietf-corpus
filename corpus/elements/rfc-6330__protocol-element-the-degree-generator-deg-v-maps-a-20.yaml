document: rfc-6330
kind: protocol-element
summary: The degree generator Deg[v] maps a 20-bit value v to a degree d using a fixed distribution table (Table 1) with 30 intervals. The distribution is heavily skewed toward degree 1 (~0.5% mass at d=1) and uses min(d, W-2) to cap the degree.
