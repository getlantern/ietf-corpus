summary: The 'service-status' grouping provides admin-status (writable identityref plus read-only last-change timestamp) and oper-status (read-only) containers for tracking service lifecycle. The 'op-instructions' grouping adds requested-start/stop and actual-start/stop (yang:date-and-time) leaves for scheduling.
