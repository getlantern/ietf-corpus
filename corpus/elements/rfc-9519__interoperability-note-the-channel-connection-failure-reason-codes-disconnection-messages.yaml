document: rfc-9519
kind: interoperability-note
summary: The Channel Connection Failure Reason Codes, Disconnection Messages Reason Codes, and Extended Channel Data Transfer data_type_code registries have the Expert Review policy applied only to the range 0x00000001–0xFDFFFFFF (inclusive); values outside this range retain their prior policy.
