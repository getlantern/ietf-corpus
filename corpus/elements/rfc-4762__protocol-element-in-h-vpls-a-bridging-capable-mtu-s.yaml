document: rfc-4762
kind: protocol-element
summary: In H-VPLS, a bridging-capable MTU-s requires only a single spoke PW per VPLS instance regardless of the number of ACs, because it performs local MAC learning and replication. A non-bridging PE-r requires one PW per AC since it performs no bridging functions.
section: "10.1"
topics:
