document: rfc-5429
kind: normative-requirement
summary: '''reject'' MUST be incompatible with the ''vacation'' action. It is NOT RECOMMENDED that implementations permit ''reject'' together with mail-delivery actions such as ''keep'', ''fileinto'', or ''redirect'', as this violates the SMTP principle that a message is either delivered or bounced.'
section: "2.4"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
