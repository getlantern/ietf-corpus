document: rfc-3830
kind: design-rationale
summary: The DH method cannot create group keys because each pair of parties derives a unique TGK from g^(xi*xr); different group members would end up with different TGKs. DH is therefore limited to peer-to-peer use within MIKEY.
section: "3.3"
topics:
    - crypto
