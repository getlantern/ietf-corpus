document: rfc-5404
kind: normative-requirement
summary: If the receiver finds a mismatch between the size of a received payload and the size indicated by the ToC, the receiver SHOULD discard the packet, as decoding from erroneous ToC data could severely degrade audio quality.
section: 5.6.3
rfc2119_level: SHOULD
topics:
