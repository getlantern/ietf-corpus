document: rfc-8145
kind: normative-requirement
summary: Zone operators relying on the edns-key-tag mechanism SHOULD take care to ensure new keys have unique Key Tag values, since DNSSEC does not require unique Key Tags and collisions can occur during rollovers.
section: "7"
rfc2119_level: SHOULD
topics:
    - dns
    - security
