document: rfc-3478
kind: protocol-element
summary: The Neighbor Liveness Timer is a local, configurable timer started when an LDP session with a neighbor goes down. Stale label-FEC bindings are kept for the lesser of the FT Reconnect Timeout advertised by the neighbor and the Neighbor Liveness Timer; if no session is re-established in this window, stale bindings SHOULD be deleted.
section: "3.3"
topics:
    - mpls
    - routing
