document: rfc-9200
kind: normative-requirement
summary: In CBOR-encoded token requests and responses, all OAuth parameters MUST be mapped to CBOR integer abbreviations as specified in Table 5. Grant types and error codes MUST likewise use their registered CBOR integer abbreviations in CBOR payloads.
section: 5.8.5
rfc2119_level: MUST
