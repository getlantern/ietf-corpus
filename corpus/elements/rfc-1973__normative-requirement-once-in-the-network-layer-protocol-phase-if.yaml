document: rfc-1973
kind: normative-requirement
summary: Once in the Network-Layer Protocol phase, if a frame arrives using another equivalent data encapsulation defined in RFC 1490, the PPP Link MUST re-enter Link Establishment phase and send a new LCP Configure-Request, preventing black-holes when the peer loses state.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
