document: rfc-9903
kind: security-consideration
summary: Read access to Prefix-SID and Adj-SID state data in the LSDB (e.g., extended-prefix-opaque/prefix-sid-sub-tlvs, e-router-tlvs/link-tlv/sub-tlvs) can facilitate targeted attacks on the MPLS data plane by revealing the SR topology and per-prefix segment label assignments.
section: "4"
topics:
