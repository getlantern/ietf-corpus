document: rfc-7461
kind: normative-requirement
summary: If the Power over Ethernet MIB (RFC 3621) is supported by the SNMP agent managing the Energy Object, then eoEthPortIndex and eoEthPortGrpIndex MUST contain the corresponding values of pethPsePortIndex and pethPsePortGroupIndex.
section: "4.3"
rfc2119_level: MUST
topics:
    - snmp
