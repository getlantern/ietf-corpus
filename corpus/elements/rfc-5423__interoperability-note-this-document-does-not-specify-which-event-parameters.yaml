document: rfc-5423
kind: interoperability-note
summary: This document does not specify which event parameters are mandatory or optional for any given event; mandatory/optional status is determined by documents that define specific message formats or bindings to a notification system. Systems that cannot encode arbitrary (large or multi-line) parameter values can only implement a subset of these events.
