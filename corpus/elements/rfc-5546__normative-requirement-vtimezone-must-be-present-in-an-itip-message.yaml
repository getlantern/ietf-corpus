document: rfc-5546
kind: normative-requirement
summary: VTIMEZONE MUST be present in an iTIP message if any date/time value in that message refers to a timezone. VTIMEZONE components may contain STANDARD and DAYLIGHT sub-components, of which at least one MUST be present.
section: 3.1.2
rfc2119_level: MUST
topics:
    - email
