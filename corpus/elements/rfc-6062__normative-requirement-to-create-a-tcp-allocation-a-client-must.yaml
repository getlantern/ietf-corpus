document: rfc-6062
kind: normative-requirement
summary: To create a TCP allocation, a client MUST initiate a new TCP or TLS connection to its TURN server. TCP allocations cannot be obtained using a UDP association between client and server.
section: "4.1"
rfc2119_level: MUST
topics:
    - nat
    - tcp
