document: rfc-3643
kind: protocol-element
summary: The Flags field (6 bits in word 3) contains reserved bits (bits 0-4, SHALL be zero on send) and the CRCV bit (bit 5). CRCV=1 indicates the CRC field is valid; CRCV=0 indicates it is invalid. The CRCV bit value SHALL be constant for all FC Encapsulation Headers sent on a given connection.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
