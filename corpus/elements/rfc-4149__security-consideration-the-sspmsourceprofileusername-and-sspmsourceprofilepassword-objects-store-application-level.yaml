document: rfc-4149
kind: security-consideration
summary: The sspmSourceProfileUsername and sspmSourceProfilePassword objects store application-level credentials in the MIB. Unauthorized read access to these objects may enable unauthorized use of application resources; encryption of SNMP traffic is therefore important.
section: "8"
topics:
    - snmp
    - security
