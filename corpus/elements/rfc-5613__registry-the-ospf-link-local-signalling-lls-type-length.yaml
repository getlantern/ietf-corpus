document: rfc-5613
kind: registry
summary: The 'OSPF Link-Local Signalling (LLS) Type/Length/Value Identifiers (TLV)' registry is updated to point to RFC 5613. Type 0 is Reserved; Type 1 is Extended Options and Flags; Type 2 is Cryptographic Authentication (OSPFv2 only); Types 3–32767 are reserved for IANA assignment via IETF Review; Types 32768–65535 are Private Use.
