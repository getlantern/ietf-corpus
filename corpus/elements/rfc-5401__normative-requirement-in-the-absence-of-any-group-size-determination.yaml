document: rfc-5401
kind: normative-requirement
summary: In the absence of any group size determination mechanism, a default group size value of 10,000 is RECOMMENDED. This conservative over-estimate guarantees feedback implosion protection; the suppression algorithm is effective with group size accuracy to within an order of magnitude.
section: "3.8"
rfc2119_level: RECOMMENDED
topics:
    - multicast
extracted_by: claude-sonnet-4-6
