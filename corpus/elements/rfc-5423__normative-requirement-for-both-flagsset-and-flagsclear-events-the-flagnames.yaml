document: rfc-5423
kind: normative-requirement
summary: For both FlagsSet and FlagsClear events, the flagNames parameter MUST NOT include \Recent. For FlagsSet, it SHOULD be configurable whether \Seen or \Deleted flag changes produce FlagsSet or the simpler MessageRead/MessageTrash events; the simpler forms SHOULD be the default.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - email
