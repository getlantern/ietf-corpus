document: rfc-5789
kind: protocol-element
summary: The PATCH method requests that a set of changes described in the request entity be applied to the resource identified by the Request-URI. The changes are represented in a format called a 'patch document' identified by a media type. PATCH is neither safe nor idempotent as defined by RFC 2616.
section: "2"
topics:
