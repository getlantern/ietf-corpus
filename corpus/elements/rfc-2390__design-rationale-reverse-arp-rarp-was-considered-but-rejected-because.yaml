document: rfc-2390
kind: design-rationale
summary: Reverse ARP (RARP) was considered but rejected because RARP responses return the protocol address of the requesting station, not the station receiving the request. InARP was designed to resolve the protocol address of a remote station associated with a known hardware address (DLCI).
