document: rfc-9301
kind: registry
summary: LISP Algorithm ID Numbers registry identifies KDF and MAC algorithm pairs for Map-Register/Notify/Notify-Ack authentication. Mandatory algorithm is HMAC-SHA-256-128; HMAC-SHA-256-128+HKDF-SHA256 is recommended; 'None' and 'HMAC-SHA-1-96-None' MUST NOT be used in public Internet deployments.
