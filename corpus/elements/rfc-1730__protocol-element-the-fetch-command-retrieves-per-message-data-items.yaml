document: rfc-1730
kind: protocol-element
summary: 'The FETCH command retrieves per-message data items: BODY[section] (specific MIME part by dot-delimited path), BODYSTRUCTURE (MIME structure), ENVELOPE (parsed RFC 822 headers), FLAGS, INTERNALDATE, RFC822.SIZE, and UID. Fetching BODY[section] implicitly sets \Seen; BODY.PEEK suppresses this.'
section: 6.4.5
topics:
