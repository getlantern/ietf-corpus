document: rfc-4622
kind: normative-requirement
summary: When data is routed to an XMPP entity in standard XMPP protocol elements, the entity MUST be addressed as <[node@]domain[/resource]> without a prepended scheme, conforming to XMPP-CORE address rules.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
