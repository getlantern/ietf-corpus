summary: 'RFC 6427 creates the ''MPLS Fault OAM Flag Registry'' (sub-registry of MPLS OAM Parameters) with 8 flag bits (0-7), all allocated by Standards Action. Defines: bit 6 (0x2)=L-Flag, bit 7 (0x1)=R-Flag; bits 0-5 unassigned.'
