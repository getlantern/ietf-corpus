document: rfc-6977
kind: normative-requirement
summary: The relay agent MUST include one or more Client Identifier Options and a Link Address Option in the Reconfigure-Request so the DHCPv6 server can identify the affected client(s) and the link on which they are located.
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
