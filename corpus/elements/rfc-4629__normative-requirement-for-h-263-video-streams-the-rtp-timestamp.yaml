document: rfc-4629
kind: normative-requirement
summary: For H.263+ video streams, the RTP timestamp is based on a 90 kHz clock. The time increment between each coded H.263+ picture should be an integer multiple of (cd*cf)/20, where cd is an integer from 1 to 127 and cf is either 1000 or 1001.
section: "3.1"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
