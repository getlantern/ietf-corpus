document: rfc-5072
kind: state-machine
summary: 'Interface identifier negotiation: (1) received != sent and received is nonzero → Configure-Ack; (2) received == sent and nonzero → Configure-Nak with different suggested value; (3) received is zero → Configure-Nak with nonzero suggestion; (4) both are zero → Configure-Reject, negotiation terminated.'
