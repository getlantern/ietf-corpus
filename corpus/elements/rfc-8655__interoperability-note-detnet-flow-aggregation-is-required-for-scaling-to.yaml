document: rfc-8655
kind: interoperability-note
summary: DetNet flow aggregation is required for scaling to larger networks, as per-flow state at each DetNet node becomes prohibitive for large numbers of flows. Aggregated flows can be treated largely as individual DetNet flows by the Data Plane; example aggregation techniques include MPLS hierarchy and IP DiffServ Code Points (DSCPs).
section: "4.9"
topics:
    - routing
    - mpls
    - diffserv
