document: rfc-7564
kind: normative-requirement
summary: It is NOT RECOMMENDED for application protocols to profile the FreeformClass for passwords in a way that removes entire categories (e.g., symbols or punctuation), since this reduces entropy. Case-sensitive comparison is RECOMMENDED for password strings.
section: "12.6"
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
