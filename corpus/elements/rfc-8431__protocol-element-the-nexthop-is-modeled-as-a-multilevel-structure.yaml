document: rfc-8431
kind: protocol-element
summary: 'The nexthop is modeled as a multilevel structure supporting five types via a YANG choice: nexthop-base (foundational), nexthop-chain (multiple sequential header operations), nexthop-replicate (multiple destinations), nexthop-protection (primary/standby with preference), and nexthop-load-balance (weighted ECMP). All except nexthop-base are gated by YANG features.'
section: "2.4"
