document: rfc-8347
kind: design-rationale
summary: The YANG module augments ietf-interfaces (RFC 8343) and ietf-ip (RFC 8344) rather than defining a standalone model, so VRRP configuration is co-located with interface and IP address data, reflecting the natural per-interface, per-address-family instantiation of VRRP.
section: "2.2"
