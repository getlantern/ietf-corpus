summary: RFC 8620 creates the IANA 'JMAP Error Codes' registry for method-level error type strings. Registration requires expert review. Initial entries include unknownMethod, invalidArguments, serverFail, serverUnavailable, forbidden, accountNotFound, accountNotSupportedByMethod, accountReadOnly, and others.
