document: rfc-5661
kind: normative-requirement
summary: NFSv4.1 clients and servers MUST implement RPCSEC_GSS, though this is not a requirement to use it. Other flavors such as AUTH_NONE and AUTH_SYS MAY be implemented as well.
section: 2.2.1.1
rfc2119_level: MUST
