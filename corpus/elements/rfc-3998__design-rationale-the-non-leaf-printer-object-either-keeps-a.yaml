document: rfc-3998
kind: design-rationale
summary: The Non-Leaf Printer object either keeps a fully formed Job object or just maintains a mapping from the job-ids it assigned to those assigned by its Subordinate Printer — this is explicitly IMPLEMENTATION-DEPENDENT. In either case the Non-Leaf Printer MUST be able to carry out future Job operations specifying the job-id it returned to the submitting client.
section: 10.7.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
