document: rfc-6775
kind: design-rationale
summary: New ICMPv6 message types (DAR/DAC) were defined instead of reusing NS/NA for multihop DAD because NS/NA carry a hop-limit=255 check that prevents forwarding by intermediate routers, which is necessary for reaching the 6LBR across multiple hops.
section: "4.4"
topics:
