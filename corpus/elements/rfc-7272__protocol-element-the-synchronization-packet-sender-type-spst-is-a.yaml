document: rfc-7272
kind: protocol-element
summary: The Synchronization Packet Sender Type (SPST) is a 4-bit field in the RTCP XR IDMS Report Block that identifies the role of the packet sender. SPST=0 is reserved, SPST=1 indicates a Synchronization Client (SC), SPST=2–4 are defined by ETSI TISPAN, and SPST=5–15 are unassigned.
