document: rfc-4623
kind: normative-requirement
summary: Packet fragments MUST NOT be sent by a peer that has not received the MRRU AVP in a control message. If the MRRU is present, the MRU AVP MUST also be present.
section: "5.4"
rfc2119_level: MUST NOT
