document: rfc-8956
kind: interoperability-note
summary: ICMPv6 type and code components (Types 7 and 8) never match when the packet is fragmented and is not the first fragment, or when the system is unable to locate the transport header. Implementations may or may not be able to decode the transport header.
section: "3.4"
topics:
    - ip
    - routing
