document: rfc-3802
kind: design-rationale
summary: The choice of little endian ordering for 4-bit code words is adopted from ITU-T Recommendation X.420, which defines the equivalent ordering for the X.400 body part. This alignment ensures consistency with the existing X.400 voice messaging ecosystem that VPIM targets.
