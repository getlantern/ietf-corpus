document: rfc-3986
kind: wire-format
summary: 'IPv6 literals are enclosed in square brackets: IP-literal = "[" ( IPv6address / IPvFuture ) "]". IPvFuture uses a version flag: IPvFuture = "v" 1*HEXDIG "." 1*( unreserved / sub-delims / ":" ). This is the only place square brackets are allowed in URI syntax.'
