document: rfc-7273
kind: interoperability-note
summary: Slaving a device media clock to a master stream-referenced clock does NOT affect RTP inter-media synchronisation; time-aligned playout of multiple RTP sources still relies on NTP timestamps in RTCP SRs or the RFC 6051 rapid-synchronisation header extension.
section: "5.3"
topics:
    - rtp
    - realtime
