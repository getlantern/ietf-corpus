document: rfc-7009
kind: normative-requirement
summary: If the revoked token is a refresh token and the authorization server supports access token revocation, it SHOULD also invalidate all access tokens based on the same authorization grant. If an access token is revoked, the server MAY revoke the respective refresh token as well.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
