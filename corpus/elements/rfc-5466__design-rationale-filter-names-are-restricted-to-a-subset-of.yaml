document: rfc-5466
kind: design-rationale
summary: Filter names are restricted to a subset of US-ASCII (ATOM-CHAR minus '/') rather than allowing UTF-8. Because filter names may not always be meaningful or displayable to users, a separate human-readable description annotation hierarchy was introduced to compensate.
section: "3.2"
topics:
