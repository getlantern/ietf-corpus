document: rfc-3415
kind: protocol-element
summary: A VACM group is a set of zero or more <securityModel, securityName> tuples mapped to a groupName via the vacmSecurityToGroupTable. The combination of a securityModel and securityName maps to at most one group; the groupName then selects an access policy in the vacmAccessTable.
section: "2.1"
topics:
    - snmp
