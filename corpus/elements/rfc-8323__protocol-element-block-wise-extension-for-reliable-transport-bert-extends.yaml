document: rfc-8323
kind: protocol-element
summary: Block-wise Extension for Reliable Transport (BERT) extends RFC 7959 by using SZX=7 (a reserved BERT Option value). In descriptive usage, a non-final BERT block payload MUST be a multiple of 1024 bytes; a final BERT block is a multiple of 1024 bytes plus a partial block of less than 1024 bytes.
section: "6"
