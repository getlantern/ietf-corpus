document: rfc-3380
kind: normative-requirement
summary: Set-Printer-Attributes MUST NOT change the value of attributes not specified in the operation unless the attribute definition explicitly specifies such side-effects. If an 'xxx-default' attribute is changed, the new value MUST be in 'xxx-supported' or the request MUST include a new 'xxx-supported' value; otherwise the Printer MUST reject the operation.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
