document: rfc-3057
kind: wire-format
summary: 'Variable-length parameters use a Tag-Length-Value format: Tag (16-bit unsigned), Length (16-bit unsigned, including Tag+Length+Value but not padding), and variable-length Value. The total parameter length MUST be a multiple of 4 bytes; padding bytes are zero-filled and not counted in the Length field.'
section: 3.1.5
topics:
    - sctp
