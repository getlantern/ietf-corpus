document: rfc-3977
kind: normative-requirement
summary: The capability list MUST accurately reflect currently available capabilities and MUST only include a capability when the server is in the state where it is usable. Clients MUST NOT use cached capability results in relation to security, privacy, and authentication extensions.
section: 3.3.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
