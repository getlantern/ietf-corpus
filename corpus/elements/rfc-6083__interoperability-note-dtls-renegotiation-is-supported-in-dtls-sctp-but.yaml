document: rfc-6083
kind: interoperability-note
summary: DTLS renegotiation is supported in DTLS/SCTP, but application writers should be aware that allowing renegotiations may result in changes of security parameters. The decision to allow or disallow renegotiation is left to the upper layer.
section: "4.6"
topics:
    - tls
    - sctp
    - security
