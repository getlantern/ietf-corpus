document: rfc-1519
kind: protocol-element
summary: Route filter elements must be extended to include explicit masks alongside network addresses. Filters should automatically permit more-specific prefixes when a less-specific entry is accepted, making previously implicit class-based masks explicit.
section: "4.2"
