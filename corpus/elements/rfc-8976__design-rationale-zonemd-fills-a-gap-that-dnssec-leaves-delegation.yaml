document: rfc-8976
kind: design-rationale
summary: 'ZONEMD fills a gap that DNSSEC leaves: delegation (non-apex NS) records and glue records are not signed by DNSSEC, and NSEC3 with Opt-Out allows names to be added or removed between signed nodes. ZONEMD protects the zone as a whole, including unsigned records.'
section: "1.2"
topics:
    - dns
    - security
