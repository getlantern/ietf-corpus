document: rfc-9248
kind: protocol-element
summary: The initial INVITE for a call from a RUE, or the 200 OK used to accept a call, MUST include a Call-Info header field with purpose parameter 'rue-owner' identifying the RUE owner. The URI MAY be an HTTPS URI or Content-ID URL pointing to an xCard (RFC 6351) body containing the owner's name, address, phone number, and email.
section: 5.2.3
topics:
    - sip
