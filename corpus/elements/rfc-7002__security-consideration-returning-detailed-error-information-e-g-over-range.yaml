document: rfc-7002
kind: security-consideration
summary: Returning detailed error information (e.g., over-range measurement or measurement unavailable values) can provide an attacker with insight into security processing. Implementations should apply encryption and authentication (e.g., using SAVPF combining AVPF and SRTP as per RFC 5124) when this is a concern.
section: "6"
topics:
    - rtp
    - security
    - realtime
