document: rfc-7529
kind: normative-requirement
summary: SKIP processing for invalid months occurs after BYMONTH in the RRULE element processing order, and SKIP processing for invalid days occurs after BYMONTHDAY, following the ordering defined in RFC 5545 Section 3.3.10.
section: "4.1"
rfc2119_level: MUST
