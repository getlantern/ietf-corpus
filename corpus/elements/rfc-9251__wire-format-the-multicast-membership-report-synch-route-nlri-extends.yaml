document: rfc-9251
kind: wire-format
summary: The Multicast Membership Report Synch Route NLRI extends the SMET format by prepending an Ethernet Segment Identifier (ESI, 10 octets) after the RD field, used to coordinate IGMP/MLD membership state between PEs on a multihomed Ethernet segment. All fields except the 1-octet Flags are part of the BGP route key.
section: "9.2"
topics:
    - multicast
    - routing
