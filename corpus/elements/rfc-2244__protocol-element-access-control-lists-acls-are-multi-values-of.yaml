document: rfc-2244
kind: protocol-element
summary: 'Access Control Lists (ACLs) are multi-values of ''identifier TAB rights'' pairs. Standard rights are: x (search), r (read), w (write), i (insert), a (administer). Multiple matching identifiers'' rights are combined by unioning positive rights and subtracting unioned negative rights (dash-prefixed identifiers).'
section: "3.5"
