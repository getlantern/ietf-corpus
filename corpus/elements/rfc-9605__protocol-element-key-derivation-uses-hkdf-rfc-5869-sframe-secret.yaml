kind: protocol-element
summary: 'Key derivation uses HKDF (RFC 5869): sframe_secret = HKDF-Extract('''', base_key); sframe_key = HKDF-Expand(sframe_secret, ''SFrame 1.0 Secret key '' + KID_8bytes + cipher_suite_2bytes, AEAD.Nk); sframe_salt = HKDF-Expand(sframe_secret, ''SFrame 1.0 Secret salt '' + KID_8bytes + cipher_suite_2bytes, AEAD.Nn). The hash function is determined by the cipher suite.'
