document: rfc-8934
kind: design-rationale
summary: Grace periods (Grace-Before, Grace-After) are provided to extend the LSP lifetime slightly before and after the scheduled interval without reserving network resources (like bandwidth) during those periods, allowing the LSP to carry best-effort traffic while the reserved interval is cleanly bounded.
section: 4.2.2.2
topics:
    - routing
    - mpls
