document: rfc-3981
kind: normative-requirement
summary: Servers MUST return direct answers to queries in the <answer> element and MAY return results in the <additional> element for which a reference has been made in the <answer>. Results in <additional> MUST have been referenced in the <answer>.
section: "4.2"
rfc2119_level: MUST
topics:
