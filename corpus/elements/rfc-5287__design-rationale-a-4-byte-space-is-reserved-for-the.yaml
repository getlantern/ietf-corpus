document: rfc-5287
kind: design-rationale
summary: A 4-byte space is reserved for the CEP/TDM Bit-Rate parameter for compatibility with RFC 4842 (CEP). The bit-rate values (e.g., 24 for T1) are convenience codes and do not represent actual bit-rates in units of 64 kbps.
