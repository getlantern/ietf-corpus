document: rfc-4301
kind: normative-requirement
summary: A host implementation of IPsec MUST support both transport and tunnel mode. A security gateway MUST support tunnel mode and MAY support transport mode, with transport mode permitted only when the gateway acts as a host.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
