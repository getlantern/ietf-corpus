document: rfc-8305
kind: interoperability-note
summary: Happy Eyeballs only addresses initial TCP/IP handshake failures. Issues such as Path MTU Discovery problems, application-layer failures (TLS, HTTP), and operational misconfigurations (broken IPv6 on a network) may be masked or undetected by the algorithm.
