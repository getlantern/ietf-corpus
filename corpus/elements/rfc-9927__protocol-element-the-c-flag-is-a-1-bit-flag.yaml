document: rfc-9927
kind: protocol-element
summary: The C-flag is a 1-bit flag at bit 1 of the EARO flags field, moved from its original position in RFC 8928. When set, it indicates that the ROVR field contains a Crypto-ID and that the 6LN MAY be challenged for ownership of the registered address.
