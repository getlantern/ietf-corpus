document: rfc-8286
kind: interoperability-note
summary: If non-compound RTCP (RFC 5506) was previously negotiated between sender and splicer, the RTCP splicing notification messages may be sent as non-compound RTCP packets. Otherwise, the SNM follows compound RTCP rules (RFC 3550 Section 6.1) and may be included alongside the RTCP SR.
section: "3.2"
topics:
    - rtp
    - realtime
