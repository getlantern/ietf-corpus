document: rfc-9908
kind: protocol-element
summary: SingleAttributeTemplate is an ASN.1 SEQUENCE with a required 'type' OID and an OPTIONAL 'value' field. When the value is absent, the client is expected to supply a suitable value for that RDN type; when present, the client is expected to use the given value.
