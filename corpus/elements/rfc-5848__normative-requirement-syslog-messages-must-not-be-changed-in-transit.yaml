document: rfc-5848
kind: normative-requirement
summary: Syslog messages MUST NOT be changed in transit; any alteration or truncation renders signing invalid. Signer and collector implementations MUST support messages up to and including 2048 octets to minimize truncation.
section: "3"
rfc2119_level: MUST
topics:
    - syslog
    - security
