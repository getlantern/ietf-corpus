document: rfc-9756
kind: design-rationale
summary: RFC 8356 deliberately omitted experimental Error-Type codepoints because an experiment could instead implement an experimental PCEP object to carry arbitrary error codes. RFC 9756 rejects that approach as it would cause unnecessary code divergence; allowing experimental Error-Types more easily enables migration of successful experiments onto the Standards Track.
section: B
topics:
    - routing
    - mpls
