document: rfc-7788
kind: wire-format
summary: The Assigned-Prefix TLV (type 35, length >= 6) carries a 32-bit Endpoint Identifier, a 4-bit Reserved field, a 4-bit Priority (0–15), a 1-byte Prefix Length, the prefix padded to the next byte boundary, and optional nested TLVs. Endpoint Identifier value 0 indicates a Private Link.
section: "10.3"
