document: rfc-7915
kind: interoperability-note
summary: IPv4 multicast addresses cannot be mapped to IPv6 multicast addresses based on the unicast mapping rule (RFC 6052), so multicast scenarios require separate consideration. ICMPv4 IGMP messages are single-hop messages and SHOULD be silently dropped by the translator.
section: "1.2"
topics:
    - ip
    - v6ops
    - multicast
