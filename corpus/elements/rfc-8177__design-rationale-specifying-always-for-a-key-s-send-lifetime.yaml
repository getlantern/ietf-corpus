document: rfc-8177
kind: design-rationale
summary: Specifying 'always' for a key's send lifetime prevents graceful key rollover because it makes that key the permanent most-recent-start-time sender. The rollover technique depends on a future start-time for the new key.
section: "2.2"
topics:
    - routing
    - security
