document: rfc-8807
kind: normative-requirement
summary: The login security extension MUST be included in the EPP response when (1) the client supports the extension via <svcExtension> and (2) the server has identified at least one login security event to communicate. Both conditions must hold.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
