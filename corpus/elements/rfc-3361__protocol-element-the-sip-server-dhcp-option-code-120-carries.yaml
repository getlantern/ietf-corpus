document: rfc-3361
kind: protocol-element
summary: 'The SIP Server DHCP option (code 120) carries either a list of DNS fully-qualified domain names or a list of IPv4 addresses identifying SIP outbound proxy servers. An encoding byte (''enc'') immediately follows the code byte: value 0 indicates domain names, value 1 indicates IPv4 addresses.'
