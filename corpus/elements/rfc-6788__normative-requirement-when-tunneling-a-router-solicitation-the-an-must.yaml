document: rfc-6788
kind: normative-requirement
summary: When tunneling a Router Solicitation, the AN MUST NOT decrement the Hop Limit field of the inner RS message, because ND messages with Hop Limit not equal to 255 are discarded by receivers per RFC 4861.
section: "5.2"
rfc2119_level: MUST NOT
