document: rfc-8661
kind: protocol-element
summary: SR Protection of LDP-Based Traffic allows SR-capable nodes to provide FRR repair tunnels (using SR node segments and adjacency segments) for LDP-based primary paths, eliminating the need for targeted LDP sessions and providing guaranteed FRR coverage even where no RLFA solution exists.
