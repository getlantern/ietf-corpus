document: rfc-2287
kind: interoperability-note
summary: For an application to appear in sysApplInstallPkgTable, it must be discoverable by the system, typically requiring installation via a central mechanism or registry (e.g., UNIX 'pkgadd' or a PC global registry). Applications installed by other means may not be visible to the agent.
section: "5.1"
topics:
    - snmp
