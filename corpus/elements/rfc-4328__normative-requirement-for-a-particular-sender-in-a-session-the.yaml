document: rfc-4328
kind: normative-requirement
summary: For a particular sender in a session, the contents of the FLOWSPEC object received in a Resv message SHOULD be identical to the contents of the SENDER_TSPEC object in the corresponding Path message. If they do not match, a ResvErr message with 'Traffic Control Error/Bad Flowspec value' SHOULD be generated.
section: "6"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
