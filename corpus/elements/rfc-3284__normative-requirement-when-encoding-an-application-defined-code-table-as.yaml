document: rfc-3284
kind: normative-requirement
summary: When encoding an application-defined code table as a VCDIFF delta, the computation MUST use the default code table for encoding the delta instructions (not the new table being transmitted). This allows the decoder to reconstruct the new table without prior knowledge of it.
section: "7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
