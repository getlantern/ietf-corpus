document: rfc-5890
kind: protocol-element
summary: An A-label is the ASCII-Compatible Encoding (ACE) form of an IDNA-valid string. It must begin with the ACE prefix 'xn--', be followed by a valid Punycode-encoded string of at most 59 ASCII characters, conform to LDH label rules, and be decodable into a valid U-label.
section: 2.3.2.1
