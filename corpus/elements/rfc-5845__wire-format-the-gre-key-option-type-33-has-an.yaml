document: rfc-5845
kind: wire-format
summary: The GRE Key option (Type=33) has an 8-bit Type field, an 8-bit Length field, a 16-bit Reserved field (must be zero), and an optional 32-bit GRE Key Identifier field. Length=2 indicates no GRE Key Identifier is present (mode-only); Length=6 indicates a downlink or uplink GRE key is carried.
section: "6.1"
