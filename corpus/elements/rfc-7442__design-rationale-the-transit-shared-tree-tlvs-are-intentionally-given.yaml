document: rfc-7442
kind: design-rationale
summary: The Transit Shared Tree TLVs are intentionally given the same encoding as the IPv4/IPv6 Source Tree TLVs from RFC 6826, with only the Source field replaced by an RP field. Reusing the existing encoding minimizes new protocol surface and leverages proven mLDP in-band signaling procedures.
section: "3.1"
topics:
    - mpls
    - multicast
