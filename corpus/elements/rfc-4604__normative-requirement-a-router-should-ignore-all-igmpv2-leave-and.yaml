document: rfc-4604
kind: normative-requirement
summary: A router SHOULD ignore all IGMPv2 Leave and MLDv1 Done messages in the source-specific address range and MAY log an error (MODIFICATION). Such messages may originate from non-SSM-aware hosts.
section: "3.7"
rfc2119_level: SHOULD
topics:
    - multicast
