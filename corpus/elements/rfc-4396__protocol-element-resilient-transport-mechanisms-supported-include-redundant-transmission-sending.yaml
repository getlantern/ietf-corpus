document: rfc-4396
kind: protocol-element
summary: 'Resilient transport mechanisms supported include: redundant transmission (sending the same sample in multiple consecutive packets), retransmission per RFC 4588, and forward error correction per RFC 2733. Senders SHOULD send multiple copies of sample descriptions (TYPE 5) because they may be referenced by multiple subsequent samples and loss is not recoverable without retransmission.'
section: "5"
topics:
