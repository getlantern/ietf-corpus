document: rfc-9581
kind: protocol-element
summary: Tag 1002 defines a duration as a length of a time interval in SI seconds. Durations are structurally identical to tag 1001 time values (same map format, same keys) but semantically measure elapsed time from the start to the end of an interval rather than from an epoch.
