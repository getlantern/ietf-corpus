document: rfc-1903
kind: normative-requirement
summary: Whenever any elements of a row exist, the RowStatus column must also exist. Only three values (active, notInService, notReady) will be returned in response to a management protocol retrieval operation on a RowStatus object.
section: "2"
rfc2119_level: MUST
