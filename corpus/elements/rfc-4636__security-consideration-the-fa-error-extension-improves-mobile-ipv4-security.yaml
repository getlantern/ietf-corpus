document: rfc-4636
kind: security-consideration
summary: The FA Error Extension improves Mobile IPv4 security by allowing the mobile node to verify Home Agent authenticity via the Mobile-Home Authentication Extension even when the foreign agent must supply error status. Previously, the foreign agent could only inject status by overwriting the reply code, destroying the mobile node's ability to verify the home agent's authentication data.
section: "8"
topics:
    - mobility
    - security
