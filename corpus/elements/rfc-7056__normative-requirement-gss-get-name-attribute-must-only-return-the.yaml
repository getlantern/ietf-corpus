document: rfc-7056
kind: normative-requirement
summary: GSS_Get_name_attribute MUST only return the federated-saml-assertion attribute with the authenticated output set to true if the mechanism can successfully authenticate the SAML statement. Uses of the GSS-API MUST confirm the attribute is marked authenticated, as some mechanisms may permit an initiator to supply an unauthenticated SAML statement.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
