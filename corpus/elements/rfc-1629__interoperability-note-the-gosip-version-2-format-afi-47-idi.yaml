document: rfc-1629
kind: interoperability-note
summary: The GOSIP Version 2 format (AFI=47, IDI=0005) and the ANSI ISO-DCC format (AFI=39, IDI=840) for U.S. organizations use an identical DSP structure; technical considerations for NSAP administration are independent of which format is used. Both work equally well for routing, differing only in the registration authority (GSA vs. ANSI).
section: "4.2"
topics:
    - routing
