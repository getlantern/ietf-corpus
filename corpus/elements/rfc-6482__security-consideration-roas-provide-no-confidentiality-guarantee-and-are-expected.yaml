document: rfc-6482
kind: security-consideration
summary: ROAs provide no confidentiality guarantee and are expected to be publicly accessible to all ISPs and Internet users. There is no explicit per-message authentication; the PKI provides authorization but not authentication, and there is no intent to convey non-repudiation.
