document: rfc-8163
kind: normative-requirement
summary: All IPv6 multicast packets MUST be sent to MS/TP Destination Address 255 (broadcast). When a multicast address is represented as a 16-bit address in a compressed header, it MUST be formed by left-padding the 0xFF broadcast value with a zero octet.
section: "9"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
