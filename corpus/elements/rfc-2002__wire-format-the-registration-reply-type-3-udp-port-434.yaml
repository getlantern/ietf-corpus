document: rfc-2002
kind: wire-format
summary: 'The Registration Reply (Type 3, UDP port 434) fixed portion contains: Type (1 byte), Code (1 byte), Lifetime (2 bytes), Home Address (4 bytes), Home Agent (4 bytes), Identification (8 bytes), followed by extensions. If Code indicates denial, Lifetime MUST be ignored.'
