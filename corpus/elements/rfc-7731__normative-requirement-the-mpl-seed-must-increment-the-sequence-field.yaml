document: rfc-7731
kind: normative-requirement
summary: The MPL Seed MUST increment the sequence field's value on each new MPL Data Message generated for an MPL Domain. Implementations MUST follow Serial Number Arithmetic as defined in RFC 1982 when incrementing or comparing sequence values.
section: "6.1"
rfc2119_level: MUST
topics:
    - multicast
    - ip
