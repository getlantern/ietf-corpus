document: rfc-7542
kind: privacy-consideration
summary: Using one identifier across multiple protocols enables cross-protocol identity correlation. It is RECOMMENDED that user privacy be enhanced by configuring multiple identifiers for one user and rotating them over time to hinder tracking by malicious observers, though provisioning and management of multiple identifiers is difficult in practice.
section: "4.1"
topics:
    - privacy
    - security
