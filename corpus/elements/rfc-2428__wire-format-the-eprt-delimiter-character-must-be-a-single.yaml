document: rfc-2428
kind: wire-format
summary: The EPRT delimiter character MUST be a single ASCII character in the range 33-126 inclusive; '|' (ASCII 124) is recommended. The <net-prt> field is an IANA address family number; <net-addr> is a protocol-specific string; <tcp-port> is the decimal TCP port number.
section: "2"
