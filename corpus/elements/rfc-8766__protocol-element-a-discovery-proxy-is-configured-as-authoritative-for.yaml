document: rfc-8766
kind: protocol-element
summary: 'A Discovery Proxy is configured as authoritative for four or more DNS subdomains: one for DNS-SD service discovery records (rich-text UTF-8), one for LDH host name records, one or more for IPv4 reverse mapping (in-addr.arpa), and one or more for IPv6 reverse mapping (ip6.arpa). Authority is delegated via NS records from the parent domain.'
section: "5"
topics:
    - dns
    - zeroconf
