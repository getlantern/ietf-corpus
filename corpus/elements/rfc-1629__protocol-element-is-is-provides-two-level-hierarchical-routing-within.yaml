document: rfc-1629
kind: protocol-element
summary: 'IS-IS provides two-level hierarchical routing within a routing domain: Level 1 routers know area topology and forward off-area traffic to Level 2 routers; Level 2 routers form an interconnected backbone subdomain that routes between areas using longest-matching address prefixes. Only Level 2 routers may exchange data or routing information with routers outside their domain.'
section: "3.2"
topics:
    - routing
