document: rfc-8512
kind: design-rationale
summary: Port-set assignment (port-range-allocation) is offered alongside single-port allocation to reduce NAT logging volume, since one log entry can cover an entire port set. This addresses REQ-14 of RFC 6888 and the logging optimization problem identified in Section 12 of RFC 6269.
section: "2.6"
topics:
    - nat
    - yang
