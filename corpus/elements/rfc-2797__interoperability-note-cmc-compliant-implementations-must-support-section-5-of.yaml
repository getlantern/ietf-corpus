document: rfc-2797
kind: interoperability-note
summary: CMC compliant implementations MUST support section 5 of [DH-POP] (the Diffie-Hellman POP signature) and MAY support section 4 of [DH-POP] (the DH MAC signature) for producing the required signature value on DH certification requests.
