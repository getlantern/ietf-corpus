document: rfc-9018
kind: design-rationale
summary: RFC 7873 left the precise Server Cookie construction algorithm to implementations, resulting in incompatible implementations across vendors that made DNS Cookies impractical on multi-vendor anycast networks. This document standardizes an exact algorithm so diverse implementations sharing a secret will interoperate.
section: "1"
topics:
    - dns
    - security
