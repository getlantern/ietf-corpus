document: rfc-5812
kind: security-consideration
summary: The FE model itself does not define security mechanisms; security for CE-FE communication is addressed by the ForCES protocol (RFC 5810). Unauthorized manipulation of LFB components or topology via the ForCES protocol could disrupt or subvert forwarding behavior.
section: "12"
topics:
