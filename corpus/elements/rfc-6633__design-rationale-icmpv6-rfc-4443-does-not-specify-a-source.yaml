document: rfc-6633
kind: design-rationale
summary: ICMPv6 (RFC 4443) does not specify a Source Quench message at all, reflecting the IETF's direction away from this mechanism. The development of Explicit Congestion Notification (ECN, RFC 3168) provides a modern, effective alternative for congestion signaling.
section: "1"
topics:
    - congestion
    - ecn
    - ip
