document: rfc-5852
kind: normative-requirement
summary: During CP-to-MP Handover, the procedure MUST delete the existing RSVP-TE session information and MUST NOT affect the cross-connected resources, but only move their ownership to the MP. The procedure MUST be a standard LSP deletion per RFC 3473 Section 7.2.1.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
