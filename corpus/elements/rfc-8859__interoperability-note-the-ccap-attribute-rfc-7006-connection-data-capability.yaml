document: rfc-8859
kind: interoperability-note
summary: The ccap attribute (RFC 7006, connection data capability) is IDENTICAL because the connection address type MUST be identical across all multiplexed "m=" lines. The bcap attribute (bandwidth capability) is INHERIT, inheriting the SUM category applicable to the b= attribute.
section: "5.34"
topics:
