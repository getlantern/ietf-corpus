document: rfc-5477
kind: normative-requirement
summary: Information Elements pertaining to packet sections (ipHeaderPacketSection, ipPayloadPacketSection, mplsLabelStackSection, mplsPayloadPacketSection) MUST target no more than the packet header, some subsequent bytes, and any encapsulating headers. Full packet capture of arbitrary packet streams is explicitly out of scope per RFC 2804.
section: "9"
rfc2119_level: MUST
topics:
    - measurement
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
