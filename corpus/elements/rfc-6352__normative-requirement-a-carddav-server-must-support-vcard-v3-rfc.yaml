document: rfc-6352
kind: normative-requirement
summary: A CardDAV server MUST support vCard v3 (RFC 2426), WebDAV Class 3, WebDAV ACL, secure transport via TLS with certificate validation, ETags, all address book reports in Section 8, and MUST advertise those reports in DAV:supported-report-set.
