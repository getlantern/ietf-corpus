document: rfc-7071
kind: design-rationale
summary: The units of the "sample-size" field are deliberately not normatively specified, because not all reputation service providers collect data the same way. Consumers should assume the count refers to distinct data points rather than aggregations unless out-of-band information specifies otherwise.
section: "3.1"
