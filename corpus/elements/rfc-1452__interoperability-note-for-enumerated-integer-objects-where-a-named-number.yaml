document: rfc-1452
kind: interoperability-note
summary: For enumerated INTEGER objects where a named-number enumeration has the value zero, the STATUS of that object must be changed to 'obsolete', as zero-valued enumerations are an error in the SNMPv1 MIB convention.
section: "2.1"
