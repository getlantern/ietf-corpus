document: rfc-2829
kind: protocol-element
summary: Simple password authentication under TLS requires the client to first complete TLS negotiation using Start TLS, then send an LDAPv3 bind request with the user's DN in the name field and the 'simple' authentication choice containing the password. The server performs case-sensitive equality comparison against each userPassword value.
section: "6.2"
topics:
    - ldap
    - tls
    - security
