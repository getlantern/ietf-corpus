document: rfc-5028
kind: security-consideration
summary: ENUM relies on DNS, which in its current form is insecure and provides no mechanism to ensure answers are authentic. DNSSEC mitigates this in zones where it is available, as referenced in RFC 3761 and RFC 3833.
section: "3"
topics:
    - security
    - dns
