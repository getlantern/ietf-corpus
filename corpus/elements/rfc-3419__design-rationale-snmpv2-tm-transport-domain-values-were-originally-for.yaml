document: rfc-3419
kind: design-rationale
summary: SNMPv2-TM transport domain values were originally for SNMP-only use but were later applied to non-SNMP endpoints and are incomplete (lacking IPv6 support). This memo defines protocol-independent transport domain values to fill that gap.
