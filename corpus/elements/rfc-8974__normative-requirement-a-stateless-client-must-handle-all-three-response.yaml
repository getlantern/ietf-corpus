document: rfc-8974
kind: normative-requirement
summary: 'A stateless client MUST handle all three response types: for a piggybacked or separate response that fails token integrity/freshness checks, it discards or rejects the response portion; for a Non-confirmable response that fails, it rejects the message per Section 4.3 of RFC 7252.'
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
