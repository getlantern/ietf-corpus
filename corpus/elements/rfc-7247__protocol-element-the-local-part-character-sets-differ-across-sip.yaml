document: rfc-7247
kind: protocol-element
summary: 'The local part character sets differ across SIP/SIPS, IM/PRES, and XMPP URIs: for example, ''&'', "''", and ''/'' are allowed in SIP/SIPS but disallowed in XMPP; ''#'' is allowed in XMPP and IM/PRES but disallowed in SIP/SIPS. Table 1 enumerates allowed and disallowed non-alphanumeric characters for each scheme.'
