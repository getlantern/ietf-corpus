document: rfc-6008
kind: design-rationale
summary: It is not necessary to include the entire digital signature in the Authentication-Results field to achieve disambiguation; since signatures will almost always differ substantially, only the first several bytes are anticipated to be sufficient. Requiring a minimum of eight characters balances uniqueness against header field size.
section: "3"
topics:
