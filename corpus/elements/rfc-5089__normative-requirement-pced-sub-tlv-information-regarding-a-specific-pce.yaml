document: rfc-5089
kind: normative-requirement
summary: PCED sub-TLV information regarding a specific PCE is only considered current and useable when the router advertising this information is itself reachable via IS-IS calculated paths at the level of the LSP in which the PCED sub-TLV appears.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
