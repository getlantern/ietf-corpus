document: rfc-6902
kind: interoperability-note
summary: Duplicate "op" member names in an operation object (as shown in Appendix A.13) cannot be reliably handled because JSON's uniqueness requirement for object member names is only a SHOULD, and no standard error handling for duplicates exists.
