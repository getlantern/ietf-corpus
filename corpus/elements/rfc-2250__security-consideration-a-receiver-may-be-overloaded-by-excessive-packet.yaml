document: rfc-2250
kind: security-consideration
summary: A receiver may be overloaded by excessive packet volume from undesired sources. Network-layer authentication can discard such packets but may itself be costly. In multicast environments, future IGMP versions and multicast routing protocols may support source pruning to let receivers select allowed sources.
section: "4"
topics:
    - security
    - rtp
    - multicast
