document: rfc-6068
kind: design-rationale
summary: URI producers SHOULD provide internationalized domain names in IDNA encoding rather than percent-encoded form to maximize interoperability with legacy 'mailto' URI interpreters that do not understand UTF-8-based percent-encoding for domain names.
section: "2"
