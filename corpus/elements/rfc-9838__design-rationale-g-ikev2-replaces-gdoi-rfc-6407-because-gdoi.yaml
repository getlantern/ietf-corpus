document: rfc-9838
kind: design-rationale
summary: G-IKEv2 replaces GDOI (RFC 6407) because GDOI is based on IKEv1, which has been deprecated. Building on IKEv2 provides simplicity, increased robustness, cryptographic improvements, and compatibility with the growing ecosystem of IKEv2 extensions, including post-quantum security and modern EAP methods.
section: "1"
topics:
