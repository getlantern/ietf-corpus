document: rfc-6119
kind: wire-format
summary: 'IPv6 SRLG TLV value field encodes: 6-octet System ID, 1-octet pseudonode number, 1-octet flags (NA bit at bit 7), 16-octet IPv6 interface address, optional 16-octet IPv6 neighbor address, then variable-length list of 4-octet SRLG values. Total length is 24 + 4*(number of SRLG values) + 16 (if neighbor address included).'
section: "4.4"
topics:
    - routing
    - ip
