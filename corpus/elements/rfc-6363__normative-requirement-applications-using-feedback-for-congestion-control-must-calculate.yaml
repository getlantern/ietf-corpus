document: rfc-6363
kind: normative-requirement
summary: Applications using feedback for congestion control MUST calculate such feedback on the basis of packets received before FEC recovery is applied. If this conflicts with other uses, the application MUST support both pre- and post-FEC recovery feedback calculations to ensure congestion control mechanisms operate on accurate network signals.
section: "6"
rfc2119_level: MUST
topics:
    - congestion
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
