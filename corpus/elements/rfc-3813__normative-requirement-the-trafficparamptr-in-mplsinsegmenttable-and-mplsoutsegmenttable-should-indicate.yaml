document: rfc-3813
kind: normative-requirement
summary: The trafficParamPtr in mplsInSegmentTable and mplsOutSegmentTable SHOULD indicate the first accessible column of an MplsTunnelResourceEntry in the MPLS-TE-STD-MIB (RFC 3812) for segments used in TE tunnels. A value of zeroDotZero indicates best-effort treatment; two or more segments sharing the same pointer value indicate resource sharing.
section: "9"
rfc2119_level: SHOULD
topics:
    - mpls
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
