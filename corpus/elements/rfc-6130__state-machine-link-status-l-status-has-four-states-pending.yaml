document: rfc-6130
kind: state-machine
summary: 'Link status (L_status) has four states: PENDING (candidate link not yet established), HEARD (one-directional), SYMMETRIC (bi-directional confirmed), and LOST (expired or below quality threshold). Transitions are triggered by HELLO reception, timer expiry (L_HEARD_time, L_SYM_time), and link quality changes.'
section: "7.1"
topics:
