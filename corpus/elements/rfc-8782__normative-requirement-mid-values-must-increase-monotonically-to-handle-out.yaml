document: rfc-8782
kind: normative-requirement
summary: '''mid'' values MUST increase monotonically to handle out-of-order delivery. If ''mid'' reaches 3/4 of (2^32 - 1) with no active attack, the DOTS client MUST reset ''mid'' to 0.'
