document: rfc-959
kind: design-rationale
summary: The FTP control connection uses the Telnet protocol. The specification notes that ease of implementation and code sharing favor using an existing Telnet module, while efficiency and independence favor direct implementation. Since FTP relies on very little of Telnet, direct implementation does not necessarily involve large amounts of code.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
