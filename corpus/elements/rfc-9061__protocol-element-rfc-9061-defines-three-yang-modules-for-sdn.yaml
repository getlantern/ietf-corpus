document: rfc-9061
kind: protocol-element
summary: 'RFC 9061 defines three YANG modules for SDN-based IPsec management: ''ietf-i2nsf-ikec'' (common typedefs and groupings), ''ietf-i2nsf-ike'' (IKE case: IKEv2, SPD, PAD configuration), and ''ietf-i2nsf-ikeless'' (IKE-less case: SPD and SAD configuration). These modules cover the I2NSF NSF-Facing Interface and do not define any new protocol.'
