document: rfc-9175
kind: normative-requirement
summary: When CoAP is used with a security protocol not providing bindings between requests and responses, the client MUST ensure Tokens are not reused in a way that risks responses being associated with the wrong request. Implementing the Token as a sequence number starting at zero per connection SHOULD be followed.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
