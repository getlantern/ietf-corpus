document: rfc-8939
kind: normative-requirement
summary: Implementations MUST support DetNet flow identification based on TCP and UDP Source Port and Destination Port fields, including exact value matching and the ability to ignore the field. Implementations SHOULD support range-based port matching.
section: 5.1.2.1
rfc2119_level: MUST
topics:
