document: rfc-6230
kind: normative-requirement
summary: If a Media Control Channel device receives a request or response containing a header field it does not understand, it MUST ignore the header field and process the message as if it were absent. If a device receives a request with an unknown method, it MUST return a 500 response.
section: "11"
rfc2119_level: MUST
topics:
    - sip
