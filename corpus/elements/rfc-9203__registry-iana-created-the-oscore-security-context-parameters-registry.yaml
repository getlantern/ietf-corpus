kind: registry
summary: IANA created the 'OSCORE Security Context Parameters' registry with columns Name, CBOR Label, CBOR Type, Registry, Description, Reference. Labels -256 to 255 and length-1 strings require Standards Track; -65536 to -257 / 256 to 65535 / length-2 strings require Specification Required; larger values use Expert Review; < -65536 is Private Use.
