document: rfc-2389
kind: design-rationale
summary: Each feature line in a FEAT response is required to begin with a single space that is not optional and does not indicate general whitespace. This space guarantees the feature line can never be misinterpreted as the `211 End` terminator.
section: "3.2"
extracted_by: claude-sonnet-4-6
