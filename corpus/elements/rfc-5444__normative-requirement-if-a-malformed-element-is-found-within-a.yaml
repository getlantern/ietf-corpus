document: rfc-5444
kind: normative-requirement
summary: If a malformed element is found within a message (in the Message TLV Block, an Address Block, or an Address Block TLV Block), that message MUST be silently discarded; it MUST NOT be processed and MUST NOT be forwarded.
section: "5.5"
rfc2119_level: MUST
topics:
    - routing
