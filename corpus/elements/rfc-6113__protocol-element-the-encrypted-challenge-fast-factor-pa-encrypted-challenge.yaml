document: rfc-6113
kind: protocol-element
summary: The encrypted challenge FAST factor (PA-ENCRYPTED-CHALLENGE) authenticates the client using a challenge key derived as KRB-FX-CF2(armor_key, long_term_key, 'clientchallengearmor', 'challengelongterm') for client-to-KDC, and KRB-FX-CF2(armor_key, long_term_key, 'kdcchallengearmor', 'challengelongterm') for KDC-to-client. The fresh armor key ensures the challenge key is fresh and random, protecting against offline dictionary attacks.
section: 5.4.6
topics:
    - crypto
    - security
