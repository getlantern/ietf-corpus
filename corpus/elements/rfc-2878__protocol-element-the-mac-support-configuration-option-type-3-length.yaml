document: rfc-2878
kind: protocol-element
summary: The MAC-Support Configuration Option (Type 3, Length 3) is an advisory option that announces the single MAC Type an implementation is prepared to receive. Multiple instances in a Configure-Request announce multiple supported types. This option MUST NOT be included in a Configure-Nak.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
