document: rfc-3963
kind: protocol-element
summary: The Home Agent maintains a Prefix Table mapping Mobile Router Home Addresses to their authorized Mobile Network Prefixes. This table SHOULD be used to verify prefix information in explicit-mode Binding Updates, preventing a Mobile Router from claiming prefixes owned by another Mobile Router.
section: 6.1.2
topics:
    - mobility
    - ip
    - security
