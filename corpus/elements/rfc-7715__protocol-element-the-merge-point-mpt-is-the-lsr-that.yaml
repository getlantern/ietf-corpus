document: rfc-7715
kind: protocol-element
summary: The Merge Point (MPT) is the LSR that merges the backup LSP with the primary LSP. There can be multiple MPT LSRs for a single MP-LSP node protection, and the MPT establishes a tLDP session with the PLR upon receiving PLR address information.
section: "1.2"
