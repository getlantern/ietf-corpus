document: rfc-3209
kind: protocol-element
summary: 'The EXPLICIT_ROUTE object (ERO, class 20, C-Type 1) specifies a path as a series of variable-length subobjects each describing an abstract node. Subobject types: 1=IPv4 prefix (8 bytes), 2=IPv6 prefix (20 bytes), 32=AS number (4 bytes). Each subobject carries an L-bit indicating loose (1) vs. strict (0) hop.'
section: "4.3"
