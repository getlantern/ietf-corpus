document: rfc-6396
kind: security-consideration
summary: MRT data may contain sensitive information including BGP peer IP addresses, BGP Next Hop IP addresses, and BGP Path Attributes that could facilitate attacks against BGP routing infrastructure as described in RFC 4272. Organizations exporting MRT data beyond its normal domain (e.g., publishing for research) should obtain peer consent and possibly scrub sensitive fields.
section: "6"
topics:
    - security
    - bgp
    - routing
