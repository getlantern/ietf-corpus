document: rfc-7260
kind: normative-requirement
summary: 'When the OAM Configuration TLV is carried in the LSP_REQUIRED_ATTRIBUTES object and the requested OAM type is not supported, an error MUST be generated: ''OAM Problem/Unsupported OAM Type''. Ingress and egress nodes supporting the TLV but not a specific OAM Type MUST also respond with this error.'
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
