document: rfc-6363
kind: normative-requirement
summary: The bandwidth of FEC repair data MUST NOT exceed the bandwidth of the original source data being protected. Whenever the source data rate is adapted due to congestion control, the FEC repair data rate MUST be similarly adapted.
section: "8.2"
rfc2119_level: MUST
topics:
    - congestion
    - realtime
