document: rfc-6030
kind: security-consideration
summary: 'PSKC confidentiality requires that symmetric keys be protected in transport. PSKC supports three protection methods: pre-shared key encryption (recommended: AES-128-CBC and KW-AES128), passphrase-derived key encryption (PBKDF2), and asymmetric key encryption (recommended: RSA-1.5). Keys SHOULD NOT be transmitted in plaintext in production deployments.'
section: "13.1"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
