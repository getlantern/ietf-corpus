document: rfc-9127
kind: protocol-element
summary: BFD-over-LAG sessions (ietf-bfd-lag) consist of micro-BFD sessions on each LAG member link. Configuration is per LAG (keyed by lag-name); destination IP addresses for micro-BFD are configured per address family (IPv4 and IPv6) per LAG. Operational state is per member-link under each LAG session.
section: 2.1.5
topics:
    - yang
    - netconf
