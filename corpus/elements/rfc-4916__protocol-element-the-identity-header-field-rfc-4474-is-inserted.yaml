document: rfc-4916
kind: protocol-element
summary: The Identity header field (RFC 4474) is inserted by an Authentication Service on the path of the mid-dialog request to cryptographically sign the connected identity in the From header field URI. The Authentication Service is typically a record-routing proxy able to authenticate the UAC.
