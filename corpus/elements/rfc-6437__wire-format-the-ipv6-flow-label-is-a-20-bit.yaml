document: rfc-6437
kind: wire-format
summary: The IPv6 Flow Label is a 20-bit field in the IPv6 header. A value of zero indicates packets that have not been labeled. Packet classifiers use the 3-tuple of Flow Label, Source Address, and Destination Address to identify flows.
