document: rfc-4211
kind: interoperability-note
summary: The thisMessage and dhMAC fields in POPOPrivKey are deprecated; thisMessage is superseded by encryptedKey (EnvelopedData), and dhMAC is superseded by agreeMAC. The EncryptedValue structure is also deprecated in favor of EnvelopedData throughout.
section: "4.2"
topics:
