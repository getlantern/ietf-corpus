document: rfc-4255
kind: security-consideration
summary: Since DNSSEC only protects the fingerprint after it is signed, the fingerprint must be transferred securely from the SSH host administrator to the DNS zone administrator — either manually or via secure DNS dynamic update (RFC 3007).
