document: rfc-6675
kind: normative-requirement
summary: If an RTO occurs during loss recovery, RecoveryPoint MUST be set to HighData, the new RecoveryPoint MUST be preserved, and the loss recovery algorithm MUST be terminated. A new recovery phase MUST NOT be initiated until HighACK >= the new RecoveryPoint.
section: "5.1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
