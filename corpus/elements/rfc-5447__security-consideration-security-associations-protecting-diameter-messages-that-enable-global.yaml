document: rfc-5447
kind: security-consideration
summary: Security associations protecting Diameter messages that enable global positioning and allocation of home agents must be carefully configured. Diameter messages may traverse AAA brokers or proxies, so NAS-to-server security relies on the security properties of all intermediate Diameter agents.
section: "8"
topics:
    - diameter
    - mobility
    - security
