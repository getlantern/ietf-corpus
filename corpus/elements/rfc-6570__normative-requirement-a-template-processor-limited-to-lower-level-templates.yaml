document: rfc-6570
kind: normative-requirement
summary: A template processor limited to lower-level templates MAY exclude ABNF rules for higher levels, but it is RECOMMENDED that all parsers implement the full Level 4 syntax so that unsupported levels can be properly identified to the end user.
section: "2"
rfc2119_level: RECOMMENDED
