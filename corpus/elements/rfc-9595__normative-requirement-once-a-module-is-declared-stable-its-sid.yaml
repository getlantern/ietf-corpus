document: rfc-9595
kind: normative-requirement
summary: Once a module is declared stable, its SID assignments SHOULD be declared stable as well. SID status can only transition from 'unstable' to 'stable', and possibly from 'stable' to 'obsolete'.
section: "2.4"
rfc2119_level: SHOULD
topics:
