document: rfc-5667
kind: normative-requirement
summary: For NFS v2 and v3, the server MUST post buffers large enough to receive the largest possible incoming message (approximately 12 KB for NFSv2, 36 KB for NFSv3), and MUST NOT return data in excess of those sizes.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
