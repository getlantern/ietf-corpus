document: rfc-8414
kind: normative-requirement
summary: The 'token_endpoint_auth_signing_alg_values_supported' metadata entry MUST be present if 'private_key_jwt' or 'client_secret_jwt' authentication methods are specified. The value 'none' MUST NOT be used for signing algorithm values.
