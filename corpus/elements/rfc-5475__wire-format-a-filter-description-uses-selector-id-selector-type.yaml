document: rfc-5475
kind: wire-format
summary: 'A Filter description uses SELECTOR_ID, SELECTOR_TYPE (Matching, Hashing, Router_state), and SELECTOR_PARAMETERS. For Hashing: Hash Domain specified as IPv4 20-byte bitmask or IPv6 40-byte bitmask plus payload bitmask, Hash Function name with input key length, output bitmask, Hash Selection Range as list of non-overlapping [start, end] intervals.'
