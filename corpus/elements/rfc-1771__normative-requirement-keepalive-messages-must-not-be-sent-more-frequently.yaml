document: rfc-1771
kind: normative-requirement
summary: KEEPALIVE messages MUST NOT be sent more frequently than one per second. If the negotiated Hold Time is zero, periodic KEEPALIVE messages MUST NOT be sent. A reasonable inter-KEEPALIVE interval is one-third of the Hold Time.
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
