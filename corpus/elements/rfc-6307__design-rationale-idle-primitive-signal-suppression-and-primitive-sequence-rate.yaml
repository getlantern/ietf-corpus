document: rfc-6307
kind: design-rationale
summary: Idle Primitive Signal suppression and Primitive Sequence rate reduction are performed by the NSP to reclaim WAN bandwidth; a 10:1 reduction in Primitive Sequence rate achieves 90% of bandwidth benefits without loss of FC functionality. These optimizations are transparent to CE devices because the far-end PE regenerates the required FC link behavior.
