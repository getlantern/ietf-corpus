document: rfc-8599
kind: protocol-element
summary: The Push Resource ID (PRID) is a unique value assigned by the PNS to a UA upon registration. It is carried in the 'pn-prid' SIP URI parameter of REGISTER requests and is used by the SIP proxy to address push notification requests to the correct UA. Its format is PNS-specific.
section: "3"
