document: rfc-6230
kind: normative-requirement
summary: A SIP UAC constructing an offer MUST include the 'cfw-id' SDP attribute. This identifier MUST be unique in the context of the UAC/UAS interaction, MUST NOT clash with 'cfw-id' values in other offer/answer exchanges, and MUST NOT change for the entire duration of the associated SIP INVITE dialog usage.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
