document: rfc-1247
kind: design-rationale
summary: The Designated Router concept reduces the number of adjacencies on a multi-access network from O(n²) to O(n) by requiring only the DR (and BDR) to be adjacent to all other routers. This reduces routing protocol traffic and topological database size.
section: "1.2"
topics:
    - routing
