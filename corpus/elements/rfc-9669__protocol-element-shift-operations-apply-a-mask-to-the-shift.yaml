document: rfc-9669
kind: protocol-element
summary: 'Shift operations apply a mask to the shift amount: 0x3F (63) for 64-bit shifts and 0x1F (31) for 32-bit shifts, preventing undefined behavior from out-of-range shift counts. The MOVSX instruction (sign-extending move) is only defined for register source operands (X source), not immediate (K source).'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
