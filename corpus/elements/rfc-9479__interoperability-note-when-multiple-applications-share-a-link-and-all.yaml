document: rfc-9479
kind: interoperability-note
summary: When multiple applications share a link and all attributes are common with RSVP-TE, interoperability with legacy routers is achieved by retaining legacy advertisements and sending ASLA advertisements with the L-flag set and no link attribute values, avoiding duplication.
section: 6.3.1
topics:
