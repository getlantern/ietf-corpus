document: rfc-9685
kind: interoperability-note
summary: A legacy 6LN will not subscribe multicast addresses and will experience the same service as before. A legacy 6LR that does not set the X flag in the 6CIO will cause an upgraded 6LN to refrain from subscribing multicast or anycast addresses to that router.
