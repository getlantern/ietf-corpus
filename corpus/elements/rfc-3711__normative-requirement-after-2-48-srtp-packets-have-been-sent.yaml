document: rfc-3711
kind: normative-requirement
summary: After 2^48 SRTP packets have been sent with a given master or session key, the sender MUST NOT send any more packets with that key. Re-keying MUST be triggered before this limit is reached. A similar (and in practice more restrictive) limit of 2^31 applies for SRTCP.
section: 3.3.1
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
