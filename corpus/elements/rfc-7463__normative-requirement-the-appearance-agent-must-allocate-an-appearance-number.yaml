document: rfc-7463
kind: normative-requirement
summary: The Appearance Agent MUST allocate an appearance number for all incoming calls and send immediate notifications to subscribed UAs. An Appearance Agent returning a 400 Bad Request on an invalid PUBLISH SHOULD also send an immediate NOTIFY with full dialog event state.
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
