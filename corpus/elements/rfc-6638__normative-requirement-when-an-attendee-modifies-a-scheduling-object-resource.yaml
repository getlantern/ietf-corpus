document: rfc-6638
kind: normative-requirement
summary: When an Attendee modifies a scheduling object resource and changes PARTSTAT values on any component, or adds an EXDATE to effectively decline a recurrence instance, the server MUST deliver an iTIP REPLY to the Organizer reflecting the updated participation status.
section: 3.2.2.3
rfc2119_level: MUST
topics:
    - http
