document: rfc-7577
kind: design-rationale
summary: The MIB uses a simple four-state charging model (charging, maintainingCharge, noCharging, discharging) as a technology-independent abstraction. Charging controllers with richer internal state engines must map to these four states; finer-grained control is explicitly deferred to future MIB extensions.
