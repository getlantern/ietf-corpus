document: rfc-8708
kind: interoperability-note
summary: HSS/LMS currently exclusively uses SHA-256 as the hash function. IANA registries permit registration of additional hash functions and tree sizes in the future, so implementations should not hard-code SHA-256 as the only possibility.
section: "2.2"
topics:
    - crypto
    - registry
