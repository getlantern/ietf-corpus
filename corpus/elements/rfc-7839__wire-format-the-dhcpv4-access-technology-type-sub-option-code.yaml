summary: 'The DHCPv4 Access-Technology-Type Sub-option (code 13) is 4 octets total: 1-octet Subopt Code (13), 1-octet Length (2), 1-octet Reserved (must be 0), and 1-octet ATT value from the IANA ''Access Technology Type Option type values'' registry defined in RFC 5213.'
