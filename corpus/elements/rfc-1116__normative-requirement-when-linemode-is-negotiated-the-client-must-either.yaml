document: rfc-1116
kind: normative-requirement
summary: When LINEMODE is negotiated, the client MUST either export its local special character settings to the server or send SLC 0 SLC_DEFAULT 0 to request the server's defaults. Failing to do either leaves the connection in an undefined SLC state.
section: "5.5"
rfc2119_level: MUST
topics:
    - tcp
