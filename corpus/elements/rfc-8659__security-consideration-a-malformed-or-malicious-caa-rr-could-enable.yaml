document: rfc-8659
kind: security-consideration
summary: A malformed or malicious CAA RR could enable a DoS attack via modification of authoritative DNS records or spoofing of inflight DNS responses. This is not considered to add significantly to the existing risk of running an insecure DNS service; the DNS protocol's maximum name length also bounds the attack surface.
section: "5.5"
topics:
    - security
    - dns
