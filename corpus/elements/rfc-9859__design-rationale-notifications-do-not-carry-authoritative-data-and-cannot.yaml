document: rfc-9859
kind: design-rationale
summary: Notifications do not carry authoritative data and cannot alter the action they trigger. This design allows the sender's identity to be non-crucial, enabling arbitrary third-party services (not just nameservers) to send notifications, facilitating adoption before native nameserver support is widespread.
section: 4.2.2
topics:
    - dns
