document: rfc-7781
kind: normative-requirement
summary: The PN-MAC-RI-LAALP-INFO-START / PN-MAC-RI-LAALP-INFO-END boundary APPsub-TLV pair MUST occur within one TRILL GENINFO TLV. A lone END without a preceding START is ignored; if end-of-ESADI-LSP is reached after a START without encountering an END, end-of-LSP is treated as an implicit END.
section: "9.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
