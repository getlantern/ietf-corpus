document: rfc-4393
kind: protocol-element
summary: The video/3gpp2 MIME type is valid for all 3GPP2 files, including audio-only files. It supports H.263, H.264, or MPEG-4 video; 13K Vocoder, EVRC, AMR Narrow-band, or AAC audio; and 3GPP timed text.
section: "3.2"
