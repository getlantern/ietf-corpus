document: rfc-6773
kind: normative-requirement
summary: 'A DCCP-UDP endpoint SHOULD follow DCCP-STD (RFC 4340 Section 12) procedures for ECN: set ECN in IP headers of outgoing packets, examine ECN fields of incoming packets, and relay markings to the DCCP module. Implementations not supporting ECN MUST follow RFC 4340 Section 12.1.'
section: "3.5"
rfc2119_level: SHOULD
topics:
    - ecn
    - udp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
