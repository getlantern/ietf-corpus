document: rfc-1341
kind: normative-requirement
summary: When no Content-Type header is present the default is 'text/plain; charset=us-ascii'. When a mail reader encounters an unknown Content-Type value, it should generally treat it as equivalent to 'application/octet-stream'.
section: "4"
rfc2119_level: SHOULD
