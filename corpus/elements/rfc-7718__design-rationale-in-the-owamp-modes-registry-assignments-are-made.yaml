document: rfc-7718
kind: design-rationale
summary: In the OWAMP-Modes registry, assignments are made purely by bit position with no associated value references, unlike the comparable TWAMP-Modes registry. This difference is noted as a topic for potential improvement in the TWAMP registry (reconciled in RFC 7717).
