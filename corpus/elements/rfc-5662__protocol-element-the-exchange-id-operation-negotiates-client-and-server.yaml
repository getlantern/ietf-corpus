document: rfc-5662
kind: protocol-element
summary: The EXCHANGE_ID operation negotiates client and server identity. The request carries client_owner4 (co_verifier + co_ownerid), flags, state-protection parameters (SP4_NONE, SP4_MACH_CRED, or SP4_SSV), and an optional implementation identifier. The response returns a clientid4, sequenceid4, server_owner4, server scope, and negotiated state-protection info.
section: "2"
