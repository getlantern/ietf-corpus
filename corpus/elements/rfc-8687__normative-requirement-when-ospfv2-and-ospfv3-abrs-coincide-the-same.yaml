document: rfc-8687
kind: normative-requirement
summary: When OSPFv2 and OSPFv3 ABRs coincide (the same set of areas for all interfaces), X-AF addresses MUST be advertised into the same area in both instances so that other ABRs can correctly associate computed MPLS TE tunnels with the appropriate area.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
