document: rfc-4121
kind: protocol-element
summary: 'Four key usage values are defined for deriving per-message keys from the session key or subkey: KG-USAGE-ACCEPTOR-SEAL (22) and KG-USAGE-ACCEPTOR-SIGN (23) for the acceptor, KG-USAGE-INITIATOR-SEAL (24) and KG-USAGE-INITIATOR-SIGN (25) for the initiator. Sign usages apply to MIC tokens; Seal usages apply to Wrap tokens regardless of confidentiality.'
section: "2"
