document: rfc-8081
kind: protocol-element
summary: The font/otf subtype covers OpenType Layout fonts with an optional 'outlines' parameter (TTF, CFF, SVG). The @font-face format identifier is 'opentype'. The Macintosh UTI is 'public.opentype-font'. SVG outlines have no independent magic number and always accompany TrueType or CFF outlines.
section: 4.4.3
topics:
