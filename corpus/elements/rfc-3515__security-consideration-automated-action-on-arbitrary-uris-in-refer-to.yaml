document: rfc-3515
kind: security-consideration
summary: Automated action on arbitrary URIs in Refer-To (especially non-SIP schemes) risks being used to indirectly attack hosts vulnerable to scheme-specific flaws. Agents behind a firewall are at heightened risk since automated URI access can bypass the firewall's protective boundary and increase denial-of-service exposure through resource exhaustion.
section: "5.2"
topics:
    - sip
    - security
    - realtime
