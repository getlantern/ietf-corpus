document: rfc-4327
kind: protocol-element
summary: Hello interval parameters are negotiated per control channel. lmpCcHelloInterval, lmpCcHelloIntervalMin, and lmpCcHelloIntervalMax configure the desired and acceptable range; lmpCcHelloIntervalNegotiated (read-only) reflects the result once the channel is active. The same pattern applies to HelloDeadInterval.
