document: rfc-2543
kind: normative-requirement
summary: A client SHOULD follow DNS lookup procedures using A/AAAA RRs to resolve the host part of the Request-URI, defaulting to port 5060 if none is present. If no transport is specified, the client tries UDP first; if that fails or is unsupported, it tries TCP.
section: 1.4.2
rfc2119_level: SHOULD
topics:
    - sip
    - dns
    - udp
    - tcp
