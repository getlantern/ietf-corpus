document: rfc-2125
kind: protocol-element
summary: 'BAP defines 8 datagram types carried in PPP frames with Protocol type 0xC02D: Call-Request (0x01), Call-Response (0x02), Callback-Request (0x03), Callback-Response (0x04), Link-Drop-Query-Request (0x05), Link-Drop-Query-Response (0x06), Call-Status-Indication (0x07), Call-Status-Response (0x08). All MUST be supported by any implementation.'
section: "5.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
