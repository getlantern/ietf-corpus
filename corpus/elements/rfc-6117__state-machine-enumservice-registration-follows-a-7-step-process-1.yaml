kind: state-machine
summary: 'Enumservice registration follows a 7-step process: (1) read this document, (2) write and submit registration document, (3) solicit IETF community feedback via enum@ietf.org, (4) submit to IANA, (5) Expert Review (approve/revise/reject), (6) publication per ''Specification Required'', (7) IANA adds to registry.'
