document: rfc-6705
kind: wire-format
summary: The MAG IPv6 Address mobility option (Type 51) has an alignment requirement of 8n+4, a 1-byte Type, 1-byte Length (MUST be set to 18), 1-byte Reserved (MUST be 0), 1-byte Address Length (MUST be 128), and a 16-byte MAG IPv6 Address field.
section: "11.1"
topics:
    - mobility
