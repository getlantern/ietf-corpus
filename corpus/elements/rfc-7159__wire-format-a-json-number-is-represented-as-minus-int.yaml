document: rfc-7159
kind: wire-format
summary: A JSON number is represented as '[ minus ] int [ frac ] [ exp ]' in base 10. Leading zeros are not allowed; Infinity and NaN are not permitted. The exponent part begins with 'e' or 'E' optionally followed by '+' or '-' and one or more digits.
