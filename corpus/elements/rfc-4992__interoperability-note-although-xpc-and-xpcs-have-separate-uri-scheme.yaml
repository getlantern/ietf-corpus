document: rfc-4992
kind: interoperability-note
summary: Although XPC and XPCS have separate URI scheme names and S-NAPTR application protocol labels, both are identified with the same <transferProtocol> value "iris.xpc1" in version information chunks. Implementers must not assume separate protocol identifiers based on the URI scheme alone.
section: "9"
topics:
    - tls
