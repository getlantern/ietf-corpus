document: rfc-7878
kind: design-rationale
summary: SOAP faults are explicitly not used by SPPP over SOAP; all success and error conditions are conveyed through the structured overallResult and detailResult elements, though client applications should still handle SOAP faults that may arise from lower-level SOAP library failures.
