document: rfc-5072
kind: security-consideration
summary: 'Absence of PPP link security (authentication, encryption) raises security concerns when stateless address autoconfiguration is used to generate global unicast addresses from negotiated or generated interface identifiers. Three mitigations are identified: Access Control Lists, an authentication protocol, and an encryption protocol.'
