document: rfc-3024
kind: normative-requirement
summary: If two entities share a mobility security association, they MUST use the appropriate Authentication Extension when exchanging registration protocol datagrams. An admissible authentication extension (e.g., Mobile-Home Authentication Extension) MUST always be present to authenticate registration messages between a mobile node and its home agent.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
