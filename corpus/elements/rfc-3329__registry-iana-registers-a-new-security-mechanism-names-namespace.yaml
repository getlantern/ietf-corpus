document: rfc-3329
kind: registry
summary: 'IANA registers a new ''Security Mechanism Names'' namespace under sip-parameters. Initial entries are: digest, tls, ipsec-ike, ipsec-man, and ipsec-3gpp. New mechanism-names require IETF Consensus and a published RFC. Registrations must include the mechanism-name token and a pointer to a published RFC.'
section: "6.1"
topics:
    - sip
    - security
    - registry
