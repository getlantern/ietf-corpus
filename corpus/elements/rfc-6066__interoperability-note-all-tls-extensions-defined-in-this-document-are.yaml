document: rfc-6066
kind: interoperability-note
summary: 'All TLS extensions defined in this document are designed to be backwards compatible: clients supporting the extensions can interoperate with servers that do not support them, and vice versa. All extensions are relevant only when a session is initiated, not during abbreviated resumption handshakes.'
section: "1.1"
topics:
    - tls
