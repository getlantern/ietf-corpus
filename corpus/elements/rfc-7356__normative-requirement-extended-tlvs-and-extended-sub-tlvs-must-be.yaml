document: rfc-7356
kind: normative-requirement
summary: Extended TLVs and extended sub-TLVs MUST be used together; mixing standard sub-TLVs inside an extended TLV, or extended sub-TLVs inside a standard TLV, is invalid. A given flooding scope supports either standard or extended TLV formats, but not both.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
