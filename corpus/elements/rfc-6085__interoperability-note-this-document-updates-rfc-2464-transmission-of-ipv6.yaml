document: rfc-6085
kind: interoperability-note
summary: This document updates RFC 2464 (Transmission of IPv6 Packets over Ethernet Networks) by extending Section 7's address mapping rules to allow IPv6 multicast destination addresses to be carried in Ethernet unicast frames, without invalidating the original multicast-to-multicast mapping.
