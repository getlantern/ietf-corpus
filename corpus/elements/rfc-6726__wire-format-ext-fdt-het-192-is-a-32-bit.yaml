document: rfc-6726
kind: wire-format
summary: 'EXT_FDT (HET=192) is a 32-bit fixed-length LCT Header Extension: 8-bit HET field (value 192), 4-bit FLUTE Version field (V, set to 2), and 20-bit FDT Instance ID. FDT Instance IDs start at 0 and increment per new instance within a session.'
section: 3.4.1
