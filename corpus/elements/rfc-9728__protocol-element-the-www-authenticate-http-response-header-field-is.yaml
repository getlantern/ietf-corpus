document: rfc-9728
kind: protocol-element
summary: The WWW-Authenticate HTTP response header field is extended with a new resource_metadata parameter whose value is the URL of the protected resource metadata. This parameter MAY be used with any authorization scheme (Bearer, DPoP, etc.).
