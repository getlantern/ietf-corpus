document: rfc-4983
kind: security-consideration
summary: Readable objects including t11FcRscnRegTable (registered Nx_Ports), t11FcRscnStatsTable (RSCN statistics), and t11FcRscnNotifyControlTable (rejection details including WWNs and payloads) may be sensitive and should have GET/NOTIFY access controlled, with encryption recommended for values sent over the network.
