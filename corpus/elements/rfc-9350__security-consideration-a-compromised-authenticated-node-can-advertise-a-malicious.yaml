document: rfc-9350
kind: security-consideration
summary: A compromised authenticated node can advertise a malicious FAD (e.g., specifying an unsupported metric-type or calculation-type), causing misrouting or blackholing of Flex-Algorithm traffic across the area. This class of attack is not preventable through authentication and is analogous to advertising any other incorrect IGP information.
section: "17"
topics:
    - security
    - routing
