document: rfc-8081
kind: security-consideration
summary: Font data formats provide neither privacy nor confidentiality protection internally. While some formats include checksums and digital signatures for data integrity, any privacy or confidentiality protection must be provided externally (e.g., via transport-layer security).
section: "3"
topics:
    - security
    - privacy
