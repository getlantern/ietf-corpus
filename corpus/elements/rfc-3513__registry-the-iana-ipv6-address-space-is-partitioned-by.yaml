document: rfc-3513
kind: registry
summary: 'The IANA IPv6 address space is partitioned by binary prefix: Global Unicast is allocated from prefix 001 (1/8 of space); Link-Local Unicast is 1111111010 (1/1024); Site-Local Unicast is 1111111011 (1/1024); Multicast is 11111111 (1/256). IANA is directed to limit unicast allocations to the 001 prefix range; the remaining ~85% of global unicast space is reserved.'
section: "4"
topics:
