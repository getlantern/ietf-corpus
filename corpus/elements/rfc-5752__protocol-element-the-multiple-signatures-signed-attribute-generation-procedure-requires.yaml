document: rfc-5752
kind: protocol-element
summary: 'The multiple-signatures signed attribute generation procedure requires a two-pass process: first place all other signed attributes and add the multiple-signatures attributes with a zero-length hash, then compute the correct hash values for each SignerInfo and replace the placeholders. This ensures the attribute is computable before final signing.'
section: 4.4.1
topics:
