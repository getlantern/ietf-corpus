document: rfc-6855
kind: normative-requirement
summary: All IMAP servers supporting "UTF8=ACCEPT" SHOULD accept UTF-8 in mailbox names; servers that also support the Mailbox International Naming Convention MUST accept UTF8-quoted mailbox names and convert them to the appropriate internal format.
section: "3"
rfc2119_level: MUST
topics:
