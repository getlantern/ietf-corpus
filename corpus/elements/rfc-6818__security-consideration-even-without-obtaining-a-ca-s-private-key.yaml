document: rfc-6818
kind: security-consideration
summary: Even without obtaining a CA's private key, an attacker may issue bogus certificates and CRLs by making unauthorized use of the CA's or an RA's workstation, whether through remote compromise or insider activity. This expands the RFC 5280 threat model beyond key theft.
section: "6"
topics:
