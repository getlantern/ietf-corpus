document: rfc-6754
kind: design-rationale
summary: ECMP Redirect messages are sent only when there is a need to rebalance traffic (i.e., a Join or multicast traffic is detected on a non-desired interface), reducing the amount of control traffic compared to periodic or broadcast mechanisms.
