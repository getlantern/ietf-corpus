summary: If policy checking is disabled entirely as a mitigation, critical policy-related extensions—notably the policy constraints extension (RFC 5280 Section 4.2.1.11)—MUST be treated as unrecognized extensions per RFC 5280 Section 4.2 and the certificate MUST be rejected.
