document: rfc-5669
kind: normative-requirement
summary: An RTP implementation that supports SEED MUST implement SEED-CTR for encryption, HMAC-SHA1 for message integrity, and SEED-CTR for key derivation (PRF). SEED-CCM and SEED-GCM are optional for both encryption and message integrity.
section: "5"
rfc2119_level: MUST
topics:
    - crypto
    - rtp
