document: rfc-6865
kind: design-rationale
summary: 'The E parameter has two modes controlled by the S flag: S=0 (E is the maximum symbol length per session; actual per-block E is determined from the size of the first received repair symbol) and S=1 (E is strictly fixed for all blocks). This accommodates variable-length ADU flows while maintaining a constant per-block encoding symbol size required by RS codes.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
