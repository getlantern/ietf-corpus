kind: protocol-element
summary: 'Six EAT wire formats are defined: CWT (CBOR Web Token), JWT (JSON Web Token), detached EAT bundle in CBOR (BUN-C) and JSON (BUN-J) flavors, Unprotected CWT Claims Set (UCCS), and Unprotected JWT Claims Set (UJCS). CWT and JWT are cryptographically protected; UCCS and UJCS rely on a secure channel instead.'
