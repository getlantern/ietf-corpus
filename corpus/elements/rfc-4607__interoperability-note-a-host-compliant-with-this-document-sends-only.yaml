document: rfc-4607
kind: interoperability-note
summary: A host compliant with this document sends ONLY source-specific host reports for addresses in the SSM range. ASM-only hosts cannot reliably receive SSM channel traffic, and routers will not set up SSM forwarding state in response to ASM (*,G) join requests.
section: "8"
topics:
