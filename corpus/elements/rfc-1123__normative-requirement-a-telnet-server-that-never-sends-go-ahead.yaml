document: rfc-1123
kind: normative-requirement
summary: A Telnet Server that never sends Go Ahead MUST negotiate the Suppress Go Ahead option. Both User and Server Telnet MUST always accept Suppress Go Ahead negotiation, allowing either end to veto use of GA commands.
section: 3.2.2
rfc2119_level: MUST
topics:
    - tcp
