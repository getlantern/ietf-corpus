document: rfc-3203
kind: normative-requirement
summary: If a client obtained its address via manual configuration and used DHCP INFORM for other parameters, it should respond to a unicast FORCERENEW message with a new DHCP INFORM request to obtain a potential new set of local configuration parameters.
section: "2.2"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
