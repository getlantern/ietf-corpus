document: rfc-4202
kind: normative-requirement
summary: When advertising an unnumbered TE link, the advertisement MUST carry both the local and the remote identifiers. If the LSR does not know the remote identifier, it SHOULD use a value of 0.
section: "2.1"
rfc2119_level: SHOULD
topics:
