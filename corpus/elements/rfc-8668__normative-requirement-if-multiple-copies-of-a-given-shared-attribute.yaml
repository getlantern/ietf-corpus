document: rfc-8668
kind: normative-requirement
summary: If multiple copies of a given shared attribute sub-TLV appear under a single L2 Bundle Member Attribute Descriptor, all copies MUST be ignored. No more than one copy of a given shared attribute sub-TLV may appear within a single L2 Bundle Member Attribute Descriptor.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
