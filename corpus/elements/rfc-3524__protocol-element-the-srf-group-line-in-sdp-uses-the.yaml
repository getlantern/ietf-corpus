summary: The SRF group line in SDP uses the syntax 'a=group:SRF <mid1> <mid2> ...', combining with per-media 'a=mid:' identifiers from the SDP grouping framework. An example groups audio (mid:1) and video (mid:2) into a single RSVP session.
