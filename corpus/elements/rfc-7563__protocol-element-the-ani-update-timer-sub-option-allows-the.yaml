document: rfc-7563
kind: protocol-element
summary: The ANI Update-Timer sub-option allows the LMA to control how frequently the MAG sends ANI updates. The MAG proposes a value in the PBU; the LMA may echo, increase, or decrease it in the PBA. A value of 0 means the MAG sends updates immediately upon detecting ANI changes.
section: "3.3"
topics:
    - mobility
    - ip
