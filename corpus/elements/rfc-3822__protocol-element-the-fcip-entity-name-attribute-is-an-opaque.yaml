document: rfc-3822
kind: protocol-element
summary: 'The ''fcip-entity-name'' attribute is an opaque field identifying the FCIP Entity: for a switch-resident VE_Port/B_Access, it is the Fibre Channel Switch Name; otherwise it is the Fibre Channel Node Name of the associated Nx_Port.'
section: "5.2"
