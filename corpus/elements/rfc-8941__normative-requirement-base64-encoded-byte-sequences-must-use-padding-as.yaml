document: rfc-8941
kind: normative-requirement
summary: Base64-encoded Byte Sequences MUST use '=' padding as per RFC 4648 Section 3.2. Parsers MUST fail on characters outside the base64 alphabet and on line feeds in encoded data; they SHOULD NOT fail on missing padding or non-zero pad bits.
section: 4.2.7
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
