document: rfc-3544
kind: registry
summary: 'Three IANA registries were created for PPP header compression: (1) IP-Compression-Protocol Configuration Option type values (per RFC 1332 Section 3.2), (2) IPv6-Compression-Protocol Configuration Option type values (per RFC 2472 Section 4.2), and (3) IP Header Compression Configuration Option Suboption Types. New suboption types require a revision of this document via the IETF standards process.'
