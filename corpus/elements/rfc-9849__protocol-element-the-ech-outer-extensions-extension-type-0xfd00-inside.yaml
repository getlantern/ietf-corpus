document: rfc-9849
kind: protocol-element
summary: The ech_outer_extensions extension (type 0xfd00) inside EncodedClientHelloInner allows the client to reference extensions already present in ClientHelloOuter rather than repeating them. The referenced extensions MUST appear contiguously and in the same relative order in ClientHelloOuter.
section: "5.1"
topics:
    - tls
