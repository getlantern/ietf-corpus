document: rfc-3921
kind: normative-requirement
summary: If an entity receives an IQ stanza of type 'get' or 'set' containing a child element qualified by an unrecognized namespace, it SHOULD return an IQ of type 'error' with <service-unavailable/>. A routing entity encountering an unknown child element SHOULD pass the stanza through untouched.
section: "2.4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
