document: rfc-7153
kind: design-rationale
summary: RFC 4360 was insufficiently specific about how IANA registries for Extended Community Types and Sub-Types should be organized, causing confusion. RFC 7153 reorganizes these registries to remove interdependencies, making IANA codepoint allocation more straightforward without changing any protocol semantics or affecting implementations.
section: "1"
topics:
    - bgp
    - routing
    - registry
