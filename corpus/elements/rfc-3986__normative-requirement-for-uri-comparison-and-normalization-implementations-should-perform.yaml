document: rfc-3986
kind: normative-requirement
summary: For URI comparison and normalization, implementations SHOULD perform syntax-based normalization including case normalization (scheme and host to lowercase), percent-encoding normalization (decode unreserved characters), and path segment normalization (remove dot-segments). URIs that differ only in these normalized forms are equivalent.
section: 6.2.2
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
