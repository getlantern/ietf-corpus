document: rfc-4682
kind: normative-requirement
summary: The value of pktcMtaDevSerialNumber MUST be identical to the value specified in DHCP option 43, sub-option 4. Similarly, pktcMtaDevSwCurrentVers MUST be identical to both the sysDescr MIB object and DHCP option 43, sub-option 6.
section: "4"
rfc2119_level: MUST
topics:
