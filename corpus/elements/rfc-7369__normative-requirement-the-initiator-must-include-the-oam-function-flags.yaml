document: rfc-7369
kind: normative-requirement
summary: The initiator MUST include the OAM Function Flags Sub-TLV in the OAM Configuration TLV, MUST include an Ethernet OAM Configuration Sub-TLV specifying the CCM Interval and MD Level, and MUST include a MEP ID Sub-TLV with two distinct integer values identifying local and remote MEPs.
section: "3.1"
rfc2119_level: MUST
topics:
