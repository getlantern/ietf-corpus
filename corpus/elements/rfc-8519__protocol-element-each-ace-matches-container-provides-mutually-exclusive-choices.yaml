document: rfc-8519
kind: protocol-element
summary: 'Each ACE ''matches'' container provides mutually exclusive choices at three header layers: L2 (eth), L3 (ipv4 or ipv6), and L4 (tcp, udp, or icmp). Additional metadata match leaves ''egress-interface'' and ''ingress-interface'' are available outside the layer choices. If no matches are specified, any packet matches the ACE.'
section: "4.1"
topics:
    - yang
    - netconf
    - ip
