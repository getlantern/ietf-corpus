document: rfc-7986
kind: protocol-element
summary: The REFRESH-INTERVAL property (new) specifies a suggested minimum polling interval for retrieving updated calendar data. Its value type is DURATION (no default, so VALUE=DURATION parameter is required), and it may appear at most once in a VCALENDAR object.
section: "5.7"
