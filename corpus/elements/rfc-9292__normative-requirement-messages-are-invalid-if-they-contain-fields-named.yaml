document: rfc-9292
kind: normative-requirement
summary: Messages are invalid if they contain fields named ':method', ':scheme', ':authority', ':path', or ':status'. Other extension-defined pseudo-fields MAY be included, and a Field Line containing pseudo-fields MUST precede all other Field Line values.
section: "3.6"
rfc2119_level: MUST
topics:
    - http
