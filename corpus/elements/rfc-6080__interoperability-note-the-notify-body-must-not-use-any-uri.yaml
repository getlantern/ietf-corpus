document: rfc-6080
kind: interoperability-note
summary: The NOTIFY body MUST NOT use any URI scheme not indicated in the 'schemes' Contact header field parameter. At minimum, 'http:' and 'https:' URI schemes MUST be supported for content indirection; FTP, LDAP, and XCAP MAY also be supported based on the Profile Data Framework in use.
section: "6.5"
topics:
