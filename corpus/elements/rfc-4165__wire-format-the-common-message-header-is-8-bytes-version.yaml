document: rfc-4165
kind: wire-format
summary: 'The Common Message Header is 8 bytes: Version (1 byte, value 1 for Release 1.0), Spare (1 byte, SHALL be zero), Message Class (1 byte), Message Type (1 byte), and Message Length (4 bytes, includes the header). All fields are transmitted in network byte order (big-endian).'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
