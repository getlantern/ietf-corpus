document: rfc-7225
kind: design-rationale
summary: The option allows the Suffix field to carry a non-null suffix (e.g., a checksum-neutral suffix) of length (12 - Prefix64 Length) octets, with no suffix field present when a /96 Prefix64 is used, addressing deployments that use non-standard suffixes per RFC 6052.
section: "4.1"
topics:
