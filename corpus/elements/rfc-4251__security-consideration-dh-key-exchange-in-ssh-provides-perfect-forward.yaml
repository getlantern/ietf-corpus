document: rfc-4251
kind: security-consideration
summary: 'DH key exchange in SSH provides perfect forward secrecy (PFS): compromise of long-term private keys after a session does not compromise earlier session keys, provided the ephemeral DH parameters are erased from memory and not written to swap after key exchange completes.'
section: 9.3.7
topics:
