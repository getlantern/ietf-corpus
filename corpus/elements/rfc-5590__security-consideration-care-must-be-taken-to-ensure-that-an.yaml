document: rfc-5590
kind: security-consideration
summary: Care must be taken to ensure that an SNMP engine sends packets over a transport using credentials that are legal for that engine on behalf of that user. An engine with multiple transports open might otherwise be tricked into sending a message through the wrong transport.
section: "7"
topics:
    - snmp
    - security
