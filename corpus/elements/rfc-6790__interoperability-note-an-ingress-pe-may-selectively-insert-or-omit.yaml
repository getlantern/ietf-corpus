document: rfc-6790
kind: interoperability-note
summary: An ingress PE may selectively insert or omit entropy labels on a per-application basis over the same tunnel—for example, omitting ELs for circuit emulation (which should not use ECMP) while inserting ELs for an IP VPN. Egress ELC capability is tracked per tunnel, not per application.
section: "8.3"
topics:
    - mpls
