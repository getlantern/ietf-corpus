document: rfc-4298
kind: normative-requirement
summary: For BV16 and BV32 applications without silence suppression, the RTP marker bit MUST be set to zero. For applications with silence compression, the first packet after a silence period SHOULD have the marker bit set to one.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
