document: rfc-9135
kind: protocol-element
summary: 'IRB interfaces support two options for default gateway addressing: (1) all PEs use the same anycast default gateway IP and MAC addresses, or (2) all PEs use the same anycast IP but their own MAC address aliased via the Default Gateway extended community from RFC 7432.'
