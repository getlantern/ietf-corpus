document: rfc-5882
kind: normative-requirement
summary: A system MAY choose not to notify clients if a BFD session transitions from Up to Down and returns to Up within a reasonable period of time. If the BFD session does not return to Up state within that time frame, the clients SHOULD be notified that a session failure has occurred.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
