document: rfc-3986
kind: security-consideration
summary: Some platforms interpret non-standard IP address notations (octal, hexadecimal, fewer than four octets) that appear to differ from well-known addresses but resolve to them. Only dotted-decimal quad notation is allowed by this grammar; implementations should be alert to non-standard forms that may bypass address-based access controls.
section: "7.4"
topics:
    - security
    - ip
