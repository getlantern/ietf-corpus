document: rfc-4993
kind: normative-requirement
summary: Clients SHOULD NOT use sequential transaction ID values and MUST NOT set all bits to 1 (0xFFFF), which is reserved for server use. Randomizing transaction IDs reduces spoofed-packet attack success.
section: 3.1.1
rfc2119_level: MUST NOT
topics:
    - security
