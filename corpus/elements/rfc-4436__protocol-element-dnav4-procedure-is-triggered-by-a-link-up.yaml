document: rfc-4436
kind: protocol-element
summary: 'DNAv4 procedure is triggered by a ''Link Up'' event from the link layer. For each network with an operable IPv4 address, the host selects candidate configurations and performs a reachability test. The host saves to stable storage: (1) IPv4 and MAC address of test nodes per network, and (2) IPv4 configuration parameters including DHCP client identifier, assigned address, and lease expiration time.'
section: "2"
