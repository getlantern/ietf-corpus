document: rfc-5373
kind: normative-requirement
summary: 'For a request with Answer-Mode: Manual and the ''require'' parameter, the UAS MUST defer accepting until the user confirms. If the UAS cannot answer manually, it MUST reject the request, SHOULD respond with 403 Forbidden, and MAY include reason phrase ''manual answer forbidden''.'
section: 4.5.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
