document: rfc-9665
kind: normative-requirement
summary: TTLs for all RRs within each RRset in an SRP Update MUST be consistent. SRP registrars MUST check TTL consistency within RRsets and MUST reject updates with inconsistent TTLs using a Refused RCODE.
section: "4"
rfc2119_level: MUST
topics:
    - dns
