document: rfc-1565
kind: normative-requirement
summary: Implementations providing association-level monitoring must comply with assocCompliance, which mandates both applGroup and assocGroup (assocRemoteApplication, assocApplicationProtocol, assocApplicationType, assocDuration). Association monitoring is thus an optional but defined compliance tier above basic monitoring.
section: "5"
rfc2119_level: REQUIRED
