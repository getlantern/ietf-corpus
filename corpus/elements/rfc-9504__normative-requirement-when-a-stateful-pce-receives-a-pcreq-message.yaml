document: rfc-9504
kind: normative-requirement
summary: When a stateful PCE receives a PCReq message carrying the LSP Exclusion subobject, it MUST search for the identified LSP in its LSP-DB and exclude from the new path computation all resources used by the identified LSP.
section: 6.2.2
rfc2119_level: MUST
topics:
    - routing
