summary: 'IANA maintains a registry of SDP grouping semantics. New semantics must be defined in standards-track RFCs and include: a brief description, a token (SHOULD be no more than four characters), and the RFC reference. Initial entries: LS (Lip Synchronization) and FID (Flow Identification), both referencing RFC 3388.'
