document: rfc-6482
kind: protocol-element
summary: A ROA (Route Origin Authorization) is a CMS-wrapped digitally signed object that authorizes a single AS to originate routes to one or more IP address prefixes. It uses the RPKI signed object template defined in RFC 6488.
