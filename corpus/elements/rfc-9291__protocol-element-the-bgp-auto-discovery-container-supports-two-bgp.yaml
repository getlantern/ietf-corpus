document: rfc-9291
kind: protocol-element
summary: 'The ''bgp-auto-discovery'' container supports two BGP flavors: ''l2vpn-bgp'' (with a VPN ID per RFC 4761/RFC 6624) and ''evpn-bgp'' (with EVPN type, auto-RT derivation based on Ethernet Tag ID, and a read-only ''auto-route-target'' leaf). RD and RT structure mirrors the global-parameters-profile.'
section: 7.5.1
topics:
    - yang
    - vpn
    - bgp
