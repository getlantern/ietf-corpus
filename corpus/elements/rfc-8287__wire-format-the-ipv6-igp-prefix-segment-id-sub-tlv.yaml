document: rfc-8287
kind: wire-format
summary: The IPv6 IGP-Prefix Segment ID sub-TLV contains a 128-bit IPv6 Prefix field, a 1-octet Prefix Length field (1-128 bits), a 1-octet Protocol field (0=any IGP, 1=OSPF, 2=IS-IS), and a Reserved field that MUST be set to zero on send.
section: "5.2"
topics:
