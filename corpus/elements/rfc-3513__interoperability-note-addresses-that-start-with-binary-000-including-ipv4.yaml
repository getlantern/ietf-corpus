document: rfc-3513
kind: interoperability-note
summary: Addresses that start with binary 000 (including IPv4-compatible, IPv4-mapped, and NSAP addresses) are not subject to the 64-bit Modified EUI-64 interface ID requirement and have no structural constraint on the size or format of the interface ID field.
section: 2.5.4
topics:
