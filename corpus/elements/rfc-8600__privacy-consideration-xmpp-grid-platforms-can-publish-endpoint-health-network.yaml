document: rfc-8600
kind: privacy-consideration
summary: XMPP-Grid Platforms can publish endpoint health, network access events, roles, capabilities, and end-user identity; this information could be correlated to identify specific users' network activity. Deployers MUST ensure published data does not violate user agreements or local regulations.
