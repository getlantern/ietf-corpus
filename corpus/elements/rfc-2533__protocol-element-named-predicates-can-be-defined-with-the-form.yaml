document: rfc-2533
kind: protocol-element
summary: Named predicates can be defined with the form '(fname *pname) :- filter' and invoked via 'ext-pred'. Auxiliary predicates are scoped to a 'filter...where...end' block; they are not mutually visible and recursive predicates are not permitted.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
