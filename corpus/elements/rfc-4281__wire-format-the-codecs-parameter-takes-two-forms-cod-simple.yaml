kind: wire-format
summary: 'The Codecs parameter takes two forms: ''cod-simple'' (codecs=unencodedv) for values without octets requiring encoding, and ''cod-fancy'' (codecs*=encodedv) using RFC 2231 MIME parameter encoding. A dot (''.'') is reserved as a hierarchy delimiter within element values.'
