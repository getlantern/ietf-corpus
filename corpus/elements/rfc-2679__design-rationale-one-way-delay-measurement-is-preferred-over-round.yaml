document: rfc-2679
kind: design-rationale
summary: One-way delay measurement is preferred over round-trip delay because Internet paths are often asymmetric (different routers forward vs. reverse), and even symmetric paths may have asymmetric queueing; round-trip measurements conflate the performance of two distinct paths.
section: "2.1"
topics:
