document: rfc-5751
kind: protocol-element
summary: The SMIMEEncryptionKeyPreference signed attribute allows the signer to indicate which of their certificates holds the preferred encryption key, supporting environments with separate signing and encryption key pairs. It MUST be a SignedAttribute, MUST NOT appear multiple times, and MUST contain exactly one AttributeValue.
section: 2.5.3
topics:
