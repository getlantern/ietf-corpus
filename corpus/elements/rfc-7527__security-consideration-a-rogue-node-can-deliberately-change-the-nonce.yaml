document: rfc-7527
kind: security-consideration
summary: A rogue node can deliberately change the nonce in a looped back NS(DAD) to bypass loopback detection specified by Enhanced DAD. SEND is recommended to prevent this exploit, as it authenticates ND messages cryptographically.
