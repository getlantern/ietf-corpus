document: rfc-8104
kind: normative-requirement
summary: It is RECOMMENDED that the fast protection mechanism SHOULD be used in conjunction with global repair, so that the mechanism temporarily repairs a failed path via a bypass tunnel while global repair eventually moves traffic to a fully functional alternative path.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
