document: rfc-3676
kind: design-rationale
summary: 'The DelSp mechanism was selected over other proposed techniques because it maximizes interoperability across four client populations: those supporting neither RFC 2646 nor RFC 3676, those supporting RFC 2646 only, those supporting RFC 3676, each further split by whether they handle languages with or without common spaces.'
