document: rfc-2178
kind: interoperability-note
summary: 'MTU mismatch detection (added in RFC 2178 vs. RFC 1583): if a router receives a Database Description packet with an Interface MTU exceeding the receiving interface''s IP MTU, the packet should be rejected to prevent incomplete database exchange between neighbors with mismatched MTUs.'
section: G.9
topics:
