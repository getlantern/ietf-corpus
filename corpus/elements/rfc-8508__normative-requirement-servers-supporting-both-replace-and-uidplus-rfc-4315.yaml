document: rfc-8508
kind: normative-requirement
summary: Servers supporting both REPLACE and UIDPLUS (RFC 4315) SHOULD send APPENDUID in response to a UID REPLACE command, and are advised to send the APPENDUID response code in an untagged OK before sending EXPUNGE or replaced responses.
section: "4.3"
rfc2119_level: SHOULD
topics:
