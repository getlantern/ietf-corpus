document: rfc-2863
kind: normative-requirement
summary: An agent MUST NOT instantiate an object with an incorrect value when the true value is unknown; it MUST respond with the appropriate error or exception condition (noSuchInstance or noSuchName). Instantiating a counter as zero when it cannot be counted provides misinformation to management applications.
section: 3.1.18
rfc2119_level: MUST NOT
topics:
    - snmp
