document: rfc-4568
kind: normative-requirement
summary: If the offerer sees an accepted SRTP media stream in the answer that does not include a crypto line, the security negotiation MUST be deemed to have failed. Similarly, in the general case, if the answer omits a crypto line for an offered secure stream, the security negotiation MUST fail.
section: "7.4"
rfc2119_level: MUST
topics:
    - realtime
    - security
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
