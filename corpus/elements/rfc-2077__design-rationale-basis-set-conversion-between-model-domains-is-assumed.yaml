document: rfc-2077
kind: design-rationale
summary: Basis set conversion between model domains is assumed to be lossless in terms of specification (though interpretation may change). This property—that inter-subtype conversion preserves more information than conversion to other primary types—is the defining criterion for grouping subtypes under 'model'.
