document: rfc-4334
kind: normative-requirement
summary: If the extended key usage extension appears in the same certificate as the SSID extension, then the extended key usage extension MUST indicate that the certified public key is appropriate for use with EAP in the LAN environment by including the id-kp-eapOverLAN KeyPurposeId value.
section: "3"
rfc2119_level: MUST
topics:
