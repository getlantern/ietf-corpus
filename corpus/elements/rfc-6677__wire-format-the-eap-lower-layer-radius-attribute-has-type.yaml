document: rfc-6677
kind: wire-format
summary: The EAP-Lower-Layer RADIUS attribute has Type 163, Length 6, and a 32-bit unsigned integer value in network byte order indicating the EAP lower layer in use. It may be sent by the NAS to the RADIUS server in an Access-Request or Accounting-Request.
