document: rfc-3846
kind: normative-requirement
summary: A Home Agent using the HA Identity extension MUST provide it in the first Registration Reply sent to a Mobile Node which is not currently registered. The extension only needs to be included in subsequent Registration Replies if the same extension is included in Registration Requests from the same MN.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
    - ip
