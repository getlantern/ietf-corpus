document: rfc-2576
kind: wire-format
summary: snmpTargetAddrMMS is an Integer32 (0 | 484..2147483647) representing the maximum message size for an SNMP peer; the default value is 484. It is used for SNMPv1/SNMPv2c transactions where the message format does not carry a max message size.
