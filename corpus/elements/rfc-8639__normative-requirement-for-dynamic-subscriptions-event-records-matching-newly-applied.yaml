document: rfc-8639
kind: normative-requirement
summary: For dynamic subscriptions, event records matching newly applied filter criteria MUST NOT be sent until after the RPC reply has been sent. For configured subscriptions, event records MUST NOT be sent until after the 'subscription-started' or 'subscription-modified' notification has been sent.
section: "2.6"
rfc2119_level: MUST NOT
topics:
    - yang
    - netconf
