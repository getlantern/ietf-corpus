document: rfc-9352
kind: interoperability-note
summary: The SRv6 Locator TLV shares the sub-TLV space defined for TLVs 135, 235, 236, and 237, enabling reuse of existing sub-TLVs (e.g., administrative tags, Prefix Attribute Flags) in locator advertisements. The X-flag in Prefix Attribute Flags is valid when sent in the SRv6 Locator TLV, unlike its behavior in TLVs 236 and 237; in case of inconsistency, the advertisement in the Prefix Reachability TLV MUST be preferred.
section: "7"
topics:
