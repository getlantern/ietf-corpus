document: rfc-2617
kind: normative-requirement
summary: Basic authentication SHOULD NOT be used (without enhancements such as TLS) to protect sensitive or valuable information, because it results in the essentially cleartext transmission of the user's password over the physical network.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
