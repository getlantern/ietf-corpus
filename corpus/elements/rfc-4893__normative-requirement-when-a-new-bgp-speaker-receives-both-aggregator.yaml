document: rfc-4893
kind: normative-requirement
summary: When a NEW BGP speaker receives both AGGREGATOR and AS4_AGGREGATOR attributes from an OLD speaker, if the AS number in AGGREGATOR is not AS_TRANS, the AS4_AGGREGATOR and AS4_PATH SHALL be ignored and AGGREGATOR and AS_PATH taken as authoritative.
section: 4.2.3
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
