document: rfc-5751
kind: normative-requirement
summary: An S/MIME implementation MUST be able to receive and process arbitrarily nested S/MIME content within reasonable resource limits. Signing, encrypting, and compressing operations may be applied in any order, and each combination has distinct security implications.
section: "3.6"
rfc2119_level: MUST
topics:
    - email
    - security
