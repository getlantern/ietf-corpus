document: rfc-8078
kind: wire-format
summary: The delete CDS record is encoded as 'CDS 0 0 0 0' and the delete CDNSKEY record as 'CDNSKEY 0 3 0 0', where the keying material payload is a single 0. The value 3 in the CDNSKEY second field is mandated by RFC 4034 Section 2.1.2.
