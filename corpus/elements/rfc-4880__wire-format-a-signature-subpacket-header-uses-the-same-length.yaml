document: rfc-4880
kind: wire-format
summary: A Signature subpacket header uses the same length encoding as new-format packets (1, 2, or 5 octets) but cannot use Partial Body Lengths. The length includes the type octet. Bit 7 of the type octet is the 'critical' flag.
section: 5.2.3.1
topics:
    - crypto
    - security
