document: rfc-5801
kind: registry
summary: IANA registered SASL mechanism family 'GS2-*' per RFC 4422. All SASL mechanism names starting with 'GS2-' are reserved for mechanisms conforming to RFC 5801. GS2 mechanism names MUST NOT end in '-PLUS' except as a version of another name simply suffixed with '-PLUS'.
