document: rfc-1509
kind: protocol-element
summary: gss_OID_set (gss_OID_set_desc) aggregates multiple OIDs via an int count and a gss_OID elements pointer to an array of gss_OID_desc objects. It is used to enumerate available mechanisms, requested mechanisms, and per-credential supported mechanisms. Storage is freed via gss_release_oid_set.
section: 2.1.5
topics:
    - security
