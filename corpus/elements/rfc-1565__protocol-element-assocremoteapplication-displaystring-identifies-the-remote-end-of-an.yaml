document: rfc-1565
kind: protocol-element
summary: assocRemoteApplication (DisplayString) identifies the remote end of an association. For IP applications this should be a domain name or IP address; for OSI applications a string-encoded Distinguished Name; for X.400(84) MTAs without a DN, the RFC 1327 'mta in globalid' syntax is used.
