document: rfc-2406
kind: interoperability-note
summary: In IPv6, ESP is viewed as an end-to-end payload and should appear after hop-by-hop, routing, and fragmentation extension headers. Destination options extension headers may appear either before or after the ESP header; placing them after ESP generally is preferable since ESP only protects fields after the ESP header.
section: "3.1"
topics:
    - ipsec
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
