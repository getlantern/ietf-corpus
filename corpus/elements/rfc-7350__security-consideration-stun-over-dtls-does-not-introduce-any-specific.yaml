document: rfc-7350
kind: security-consideration
summary: STUN over DTLS does not introduce any specific security considerations beyond those for STUN over TLS detailed in RFC 5389. Similarly, TURN over DTLS does not introduce considerations beyond those for TURN over TLS in RFC 5766. The new S-NAPTR tag and TURN resolution modifications do not introduce additional considerations beyond RFC 5928.
section: "5"
topics:
