document: rfc-1647
kind: normative-requirement
summary: Agreement to support TN3270E automatically implies support for bi-directional binary transmission and End of Record (EOR), equivalent to negotiating the Telnet Binary Transmission Option and Telnet End of Record Option separately. These are not explicitly re-negotiated.
section: "4"
rfc2119_level: REQUIRED
