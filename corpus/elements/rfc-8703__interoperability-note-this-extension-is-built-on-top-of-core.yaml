document: rfc-8703
kind: interoperability-note
summary: This extension is built on top of core DLEP (RFC 8175) and requires mutual negotiation during session initialization. A modem that requires the extension to describe destinations but is paired with a router that does not advertise support must fall back to using Session Messages and Attached Subnet Data Items rather than terminating the session, preserving basic interoperability.
section: "2.2"
topics:
    - routing
