document: rfc-3970
kind: interoperability-note
summary: A TE Tunnel may be integrated with the Interfaces MIB (RFC 2863) and the IP Tunnel MIB (RFC 2667) by assigning teTunnelIndex the same value as the tunnel's ifIndex. If the encapsulation is IP, ifType should be set to tunnel(131).
