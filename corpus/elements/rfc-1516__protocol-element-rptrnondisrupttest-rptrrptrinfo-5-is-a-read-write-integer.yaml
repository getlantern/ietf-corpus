document: rfc-1516
kind: protocol-element
summary: rptrNonDisruptTest (rptrRptrInfo 5) is a read-write INTEGER {noSelfTest(1), selfTest(2)}. Setting it to selfTest(2) runs an agent-specific non-disruptive self-test that does not change repeater state, inject packets, or prevent frame relay, and always results in an rptrHealth trap.
section: "3.2"
topics:
    - snmp
