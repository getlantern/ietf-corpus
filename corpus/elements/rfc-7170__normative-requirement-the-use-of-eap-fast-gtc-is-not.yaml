document: rfc-7170
kind: normative-requirement
summary: The use of EAP-FAST-GTC is NOT RECOMMENDED with TEAPv1 because it is not compliant with EAP-GTC (RFC 3748). Implementations should use the password authentication TLVs (Basic-Password-Auth-Req TLV and Basic-Password-Auth-Resp TLV) defined in this specification instead.
section: 3.3.2
rfc2119_level: RECOMMENDED
topics:
    - security
