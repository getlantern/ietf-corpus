document: rfc-9277
kind: interoperability-note
summary: Applications sending CBOR Tag Wrapped data over constrained networks may remove the two outer tags when the type is understood from protocol context (e.g., a CoAP Content-Format Option). A CBOR Protocol specification should specify exactly which cases call for the envelope.
section: "2.2"
