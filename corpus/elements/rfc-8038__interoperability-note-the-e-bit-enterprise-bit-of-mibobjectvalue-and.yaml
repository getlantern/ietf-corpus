document: rfc-8038
kind: interoperability-note
summary: The E bit (enterprise bit) of mibObjectValue and mibObjectIdentifier Information Elements is always set to 0, even when the MIB object being exported was defined in an enterprise-specific MIB module; the enterprise origin is conveyed by the OID value itself.
section: "5.2"
topics:
    - snmp
