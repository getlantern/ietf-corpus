document: rfc-2879
kind: security-consideration
summary: Capability negotiation reveals information about one party's capabilities to other parties. This may allow a malicious party to make better guesses about security holes. Implementers should ensure capabilities are revealed only to appropriate persons, systems, and agents.
section: "6.1"
topics:
    - security
    - privacy
