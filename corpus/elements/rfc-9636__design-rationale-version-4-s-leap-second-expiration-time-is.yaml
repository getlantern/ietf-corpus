document: rfc-9636
kind: design-rationale
summary: Version 4's leap-second expiration time is encoded by repeating the final correction value in a terminal record whose occurrence field is the expiration timestamp, rather than adding a new field, to maintain the fixed-record-size structure and distinguish expiration from an actual leap second by the identical correction value.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
