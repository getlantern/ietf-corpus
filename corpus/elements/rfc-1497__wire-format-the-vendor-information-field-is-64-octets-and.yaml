document: rfc-1497
kind: wire-format
summary: The vendor information field is 64 octets and is structured as free-format, length-tagged sub-fields. Lengths are exclusive of the tag and length octets; all multi-byte quantities are in network byte order.
section: BOOTP Vendor Information Format
