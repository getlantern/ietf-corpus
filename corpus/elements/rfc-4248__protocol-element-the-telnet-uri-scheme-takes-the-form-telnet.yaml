document: rfc-4248
kind: protocol-element
summary: The telnet URI scheme takes the form telnet://<user>:<password>@<host>:<port>/. The final '/' may be omitted. If :<port> is omitted, the port defaults to 23. The :<password> and the whole <user>:<password> part may also be omitted.
section: "2"
