document: rfc-7953
kind: privacy-consideration
summary: iCalendar VFREEBUSY information generated from VAVAILABILITY components MUST NOT include anything other than busy or free time periods; user-specified property values such as SUMMARY, LOCATION, and DESCRIPTION MUST NOT be copied into the free-busy result.
