summary: The 20-bit and 24-bit linear audio payload formats are assigned encoding names 'L20' and 'L24', respectively, and registered as MIME subtypes audio/L20 and audio/L24. Both require 'rate' and support 'channels', 'emphasis', and 'channel-order' optional parameters.
