document: rfc-6681
kind: normative-requirement
summary: For RTP source flows using Schemes 5 or 6, the RTP Sequence Number field SHALL be used as the sequence number, and the length indication SHALL be the RTP payload length plus CSRCs, Header Extension, and padding (always equal to UDP payload length minus 12).
section: 8.2.4
rfc2119_level: REQUIRED
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
