document: rfc-7177
kind: normative-requirement
summary: TRILL Hello PDUs MUST NOT be sent if they exceed 1,470 bytes. They SHOULD NOT be padded. A received TRILL Hello longer than 1,470 bytes is processed normally.
section: "8.2"
rfc2119_level: MUST NOT
