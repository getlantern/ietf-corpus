document: rfc-8419
kind: normative-requirement
summary: The SignerInfo signedAttributes MUST include the message-digest attribute (RFC 5652 Section 11.2). For Ed25519, this digest MUST use SHA-512; for Ed448, SHAKE256 with 512-bit output.
section: "3.1"
rfc2119_level: MUST
