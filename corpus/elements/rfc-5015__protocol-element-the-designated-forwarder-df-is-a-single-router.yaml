document: rfc-5015
kind: protocol-element
summary: The Designated Forwarder (DF) is a single router elected per RPA on every link (except the RPL itself). The DF holds exclusive responsibility for forwarding downstream traffic onto its link and forwarding upstream traffic from its link toward the RPL for all bidirectional groups mapping to that RPA.
section: "2.1"
topics:
    - multicast
    - routing
