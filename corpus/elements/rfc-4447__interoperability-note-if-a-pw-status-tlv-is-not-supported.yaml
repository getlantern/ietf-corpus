document: rfc-4447
kind: interoperability-note
summary: If a PW Status TLV is not supported by the remote peer, the peer automatically ignores it because the I (ignore) bit is set in the TLV. The absence of PW Status TLV in the remote's Label Mapping causes both PEs to revert to the label withdraw method for PW status signaling.
section: 5.4.3
topics:
    - mpls
