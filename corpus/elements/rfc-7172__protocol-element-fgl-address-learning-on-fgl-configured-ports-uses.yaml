document: rfc-7172
kind: protocol-element
summary: FGL address learning on FGL-configured ports uses the fine-grained label rather than the native frame VLAN. Local addresses are represented as {MAC address, FGL, port, confidence, timer}; remote addresses as {MAC address, FGL, remote TRILL switch nickname, confidence, timer}.
