document: rfc-8314
kind: normative-requirement
summary: MUAs MUST validate TLS server certificates according to RFC 7817 and PKIX (RFC 5280). MUAs MUST NOT treat a session as meeting minimum confidentiality if the server's TLS certificate cannot be validated.
section: "5.3"
rfc2119_level: MUST
topics:
    - tls
    - email
    - pkix
    - security
