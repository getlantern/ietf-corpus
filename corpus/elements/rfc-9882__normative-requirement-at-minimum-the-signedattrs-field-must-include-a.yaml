document: rfc-9882
kind: normative-requirement
summary: At minimum, the signedAttrs field MUST include a content-type attribute and a message-digest attribute. The message-digest attribute contains a hash of the encapContentInfo eContent, and recalculation by the recipient is an important step in signature verification.
section: "3.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
