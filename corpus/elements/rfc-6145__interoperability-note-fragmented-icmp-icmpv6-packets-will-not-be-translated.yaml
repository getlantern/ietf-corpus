document: rfc-6145
kind: interoperability-note
summary: Fragmented ICMP/ICMPv6 packets will not be translated by the IP/ICMP translator. Fragmented IPv4 UDP packets with a zero checksum are also not translated unless the translator is explicitly configured to forward them without a UDP checksum.
section: "1.2"
topics:
