document: rfc-4918
kind: normative-requirement
summary: All DAV-compliant clients and resources MUST use XML parsers compliant with REC-XML and REC-XML-NAMES. All XML used in requests or responses MUST be at minimum well-formed and use namespaces correctly.
section: "8.2"
rfc2119_level: MUST
