document: rfc-3398
kind: state-machine
summary: 'The SIP-to-ISUP gateway state machine defines: Idle → (INVITE) → Trying → (Early ACM) → Not Alerting or (ACM) → Alerting or (CON/ANM) → Waiting for ACK → (ACK) → Connected. REL can be received in any state causing return to Idle. Timeouts T7 (no ACM/CON) and T9 (no ANM after alerting) also force release and return to Idle.'
section: "7.2"
topics:
    - sip
    - voip
    - realtime
