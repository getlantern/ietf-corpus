document: rfc-6860
kind: normative-requirement
summary: When a router receives a network-LSA, it MUST calculate the routing table normally, but if the network mask is 255.255.255.255, the router MUST NOT install the route in the RIB.
section: 2.2.2.2
rfc2119_level: MUST NOT
topics:
    - routing
