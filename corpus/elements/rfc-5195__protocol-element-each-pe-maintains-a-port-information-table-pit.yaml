document: rfc-5195
kind: protocol-element
summary: Each PE maintains a Port Information Table (PIT) per L1VPN containing a list of <CPI, PPI> tuples for all ports within that L1VPN. The CPI (customer port identifier) is unique within the L1VPN; the PPI (provider port identifier) is unique within the provider network. CPIs and PPIs may be either IPv4 or IPv6 addresses.
section: "2"
topics:
    - vpn
    - bgp
    - routing
