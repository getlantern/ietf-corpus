document: rfc-6155
kind: wire-format
summary: 'Cellular telephony identifiers are expressed as decimal digit strings: ''msisdn'' and ''imsi'' and ''mdn'' use the E.164 type (6–15 digits); ''imei'' allows up to 15 digits; ''min'' is exactly 10 digits. The ''duid'' element encodes a DHCP Unique Identifier as an xs:hexBinary value per RFC 3315 Section 9.'
section: "3.7"
topics:
    - realtime
