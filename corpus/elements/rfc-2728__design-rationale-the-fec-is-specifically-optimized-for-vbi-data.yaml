document: rfc-2728
kind: design-rationale
summary: 'The FEC is specifically optimized for VBI data, where transmission errors fall into three categories: randomly distributed single-bit errors, loss of entire NABTS lines, and burst errors. The bundle-plus-suffix structure addresses all three types using a two-dimensional Galois field code over GF(2^8).'
