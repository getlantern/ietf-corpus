document: rfc-9545
kind: design-rationale
summary: PSIDs can be nested with Binding SIDs (BSIDs) to achieve both sub-path and end-to-end path monitoring in multi-domain scenarios. Each sub-path carries an s-PSID, while the end-to-end path is identified by an e-PSID appended after the list of BSIDs.
section: "3.4"
topics:
