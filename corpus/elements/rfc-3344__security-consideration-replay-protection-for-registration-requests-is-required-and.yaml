document: rfc-3344
kind: security-consideration
summary: Replay protection for Registration Requests is required and can be implemented using timestamps (mobile node and home agent clocks synchronized within a tolerance, default 7 seconds) or nonces (home agent challenges with a nonce returned in the mobile node's Identification field).
section: "5.7"
topics:
