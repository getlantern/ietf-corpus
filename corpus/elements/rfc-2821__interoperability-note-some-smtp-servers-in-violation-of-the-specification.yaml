document: rfc-2821
kind: interoperability-note
summary: Some SMTP servers, in violation of the specification, require command verbs to be in upper case. Client implementations MAY use upper-case encoding to accommodate those servers. EHLO keywords MUST always be recognized in a case-insensitive manner regardless of how they are transmitted.
section: "2.4"
topics:
    - email
