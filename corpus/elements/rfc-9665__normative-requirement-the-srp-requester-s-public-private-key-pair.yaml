document: rfc-9665
kind: normative-requirement
summary: The SRP requester's public/private key pair MUST be stored in stable storage and MUST be unique to the device. A device with rewritable storage SHOULD retain the key indefinitely and SHOULD provide a mechanism to erase and regenerate it (e.g., on factory reset).
section: 3.2.5.1
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
