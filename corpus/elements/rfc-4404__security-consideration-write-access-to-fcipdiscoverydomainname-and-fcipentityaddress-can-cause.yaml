document: rfc-4404
kind: security-consideration
summary: Write access to fcipDiscoveryDomainName and fcipEntityAddress can cause loss of reachability to portions of the Fibre Channel fabric; write access to fcipStaticRouteStatus can create incorrect routes. Sensitive read-only objects include topology and identification data such as fcipDeviceWWN, fcipEntityAddress, fcipLinkRemFcipEntityWWN, and routing indices.
section: "5"
topics:
