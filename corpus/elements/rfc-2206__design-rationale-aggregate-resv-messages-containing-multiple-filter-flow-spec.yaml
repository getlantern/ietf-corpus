document: rfc-2206
kind: design-rationale
summary: Aggregate RESV messages containing multiple filter/flow-spec groups are decomposed into separate MIB rows, one per sender, to work around SNMP's difficulty in representing arbitrarily complex messages. A single RESV for session 224.1.2.3+UDP+4455 with two senders appears as two distinct rows in the MIB.
section: "2.2"
topics:
    - snmp
    - qos
