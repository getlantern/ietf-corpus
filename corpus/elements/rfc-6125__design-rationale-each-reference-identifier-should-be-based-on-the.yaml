document: rfc-6125
kind: design-rationale
summary: Each reference identifier SHOULD be based on the source domain rather than a derived domain because only a match between user-provided inputs and a presented identifier ensures the certificate legitimately secures the communication; derived domains from DNS SRV resolution could be subverted by a network attacker.
section: 6.2.1
topics:
    - tls
    - pkix
    - security
    - dns
