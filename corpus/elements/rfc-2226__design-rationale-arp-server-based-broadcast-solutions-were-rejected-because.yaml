document: rfc-2226
kind: design-rationale
summary: ARP Server-based broadcast solutions were rejected because they lack a registration mechanism that supports diskless boot (the client cannot determine its subnet to calculate LIS membership), and they cannot transparently introduce a Multicast Server (MCS) to reduce VC resource consumption.
