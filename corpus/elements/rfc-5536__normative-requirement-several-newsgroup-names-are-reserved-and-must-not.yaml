document: rfc-5536
kind: normative-requirement
summary: 'Several newsgroup names are reserved and MUST NOT be used as normal newsgroup names: groups whose first component is ''example'', ''to'', or ''control''; groups containing ''all'' or ''ctl''; the group ''poster''; and the group ''junk''.'
section: 3.1.4
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
