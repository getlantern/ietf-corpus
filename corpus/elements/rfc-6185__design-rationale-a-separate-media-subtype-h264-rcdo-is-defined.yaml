document: rfc-6185
kind: design-rationale
summary: A separate media subtype H264-RCDO is defined (rather than reusing H264) to ensure backward compatibility with deployed implementations of H.264. RCDO is distinct from any H.264 profile, so a new subtype prevents confusion with standard H.264 decoders.
section: "3"
