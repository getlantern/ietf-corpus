document: rfc-5555
kind: normative-requirement
summary: When a binding update is encapsulated in UDP due to NAT traversal, the home agent MUST store the source UDP port numbers from the packet carrying the binding update and MUST encapsulate binding acknowledgements in UDP back to that source address and port.
section: 2.3.2.2
rfc2119_level: MUST
topics:
    - mobility
    - nat
    - udp
