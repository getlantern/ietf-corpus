document: rfc-5733
kind: protocol-element
summary: A contact object is a named social information identifier stored in a shared central repository, identified by a server-unique identifier using the 'clIDType' syntax from RFC 5730. It carries postal address, telephone, email, authorization information, and optional disclosure preferences.
