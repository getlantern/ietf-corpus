document: rfc-6787
kind: design-rationale
summary: MRCPv2 does not run over RTSP because the consensus at the time work began was that using RTSP in the way MRCPv1 did would break the RTSP protocol or cause backward-compatibility problems, which was forbidden by Section 3.2 of RFC 4313. SIP was chosen instead as the session establishment protocol.
section: "1"
topics:
