document: rfc-9140
kind: design-rationale
summary: EAP-NOOB requires multiple separate EAP conversations rather than one because the user-assisted OOB step can take arbitrarily long — far exceeding EAP's internal timeout tolerances. IoT devices with output-only interfaces (e.g., blinking LEDs) must perform the Initial Exchange opportunistically and wait with a several-minute NoobTimeout for the OOB step to occur.
section: "3.1"
topics:
    - security
