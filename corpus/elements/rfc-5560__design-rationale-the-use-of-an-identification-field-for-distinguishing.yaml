document: rfc-5560
kind: design-rationale
summary: The use of an identification field for distinguishing packets is noted as insufficient in non-fragmented IPv6 packets and potentially insufficient in IPv4 at higher transmission speeds, motivating the requirement for implementations to explicitly declare which fields are used.
