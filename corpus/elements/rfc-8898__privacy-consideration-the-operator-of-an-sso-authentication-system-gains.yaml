document: rfc-8898
kind: privacy-consideration
summary: The operator of an SSO authentication system gains access to private information about sites and services users log into and their usage patterns. This must be disclosed in privacy policies and users should be made aware of the privacy trade-offs of SSO convenience.
section: "5"
topics:
    - sip
    - oauth
    - privacy
