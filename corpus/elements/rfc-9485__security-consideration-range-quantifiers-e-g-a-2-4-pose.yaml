document: rfc-9485
kind: security-consideration
summary: Range quantifiers (e.g., a{2,4}) pose particular challenges; implementations may limit composability (disallowing nested range quantifiers) or range magnitude (disallowing very large bounds such as a{20,200000}), or detect and reject excessive resource consumption they cause.
