document: rfc-3761
kind: normative-requirement
summary: If a NAPTR flag is not present (non-terminal rule), clients MUST use the Key produced by the Rewrite Rule as the new Key in the DDDS loop, causing the client to query for new NAPTR records at the resulting domain-name.
section: 2.4.1
rfc2119_level: MUST
topics:
    - dns
