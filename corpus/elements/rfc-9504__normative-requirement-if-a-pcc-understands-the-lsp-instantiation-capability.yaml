document: rfc-9504
kind: normative-requirement
summary: If a PCC understands the LSP-INSTANTIATION-CAPABILITY flag but did not advertise it, and receives a PCInitiate message for a GMPLS LSP, it SHOULD generate a PCErr with Error-Type 19 Error-value 27 and terminate the PCEP session.
section: "7.1"
rfc2119_level: SHOULD
topics:
    - routing
