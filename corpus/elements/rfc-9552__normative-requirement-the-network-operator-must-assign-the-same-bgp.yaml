document: rfc-9552
kind: normative-requirement
summary: The network operator MUST assign the same BGP-LS Instance-IDs on all BGP-LS Producers within a given IGP domain. Unique BGP-LS Instance-IDs MUST be assigned to routing protocol instances operating in different IGP domains.
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
