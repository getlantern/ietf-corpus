document: rfc-5492
kind: interoperability-note
summary: A BGP speaker that supports a specific capability (e.g., Multiprotocol Extensions for BGP-4) MAY send an Unsupported Capability NOTIFICATION and terminate peering if the peer does not support that capability, but the decision is strictly local to the speaker.
