document: rfc-9354
kind: normative-requirement
summary: If the configured MTU is smaller than 1280 octets (e.g., in high-noise IEEE 1901.1/1901.2 environments), the fragmentation and reassembly defined in RFC 4944 MUST be used. For ITU-T G.9903 (fixed 400-octet MAC payload), adaptation-layer fragmentation per RFC 4944 MUST always be provided.
section: "4.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
