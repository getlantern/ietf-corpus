summary: 'Annex A documents a correction to the TIFF-FX magic numbers: the little-endian value was corrected from 49 49 42 00 hex to 49 49 2A 00 hex, and the big-endian value from 4D 4D 00 42 hex to 4D 4D 00 2A hex (edit dated November 21, 2000).'
