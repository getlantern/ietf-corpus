document: rfc-6616
kind: normative-requirement
summary: The Relying Party MUST encode a nonce or transaction ID of at least 2^32 bits in the return_to URI to uniquely identify each authentication transaction and bind requests in the absence of OpenID transaction IDs.
section: "2.1"
rfc2119_level: MUST
topics:
