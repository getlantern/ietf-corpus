document: rfc-2369
kind: security-consideration
summary: Mail client applications SHOULD NOT support list header field URLs that could compromise the security of the user's system, including the "file://" URL type which could trigger execution of a local application. All URL security considerations from RFC 1738 apply.
section: "5"
topics:
    - email
    - security
