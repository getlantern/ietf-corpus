document: rfc-9303
kind: normative-requirement
summary: Implementations MUST support OTK Wrapping ID AES-KEY-WRAP-128+HKDF-SHA256, which uses HKDF-SHA256 to derive a per-message encryption key and AES-KEY-WRAP-128 (per RFC 3394) to encrypt the 128-bit OTK. Implementations MUST also support NULL-KEY-WRAP-128 for unencrypted OTK transport.
section: "6.5"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
