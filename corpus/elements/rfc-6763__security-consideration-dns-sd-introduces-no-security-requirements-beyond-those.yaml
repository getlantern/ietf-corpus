document: rfc-6763
kind: security-consideration
summary: DNS-SD introduces no security requirements beyond those of the underlying DNS system. For query authenticity, DNSSEC (RFC 4033) should be used. For DNS updates, secure dynamic updates (RFC 2136, RFC 3007) should generally be used to control which clients may register or modify DNS-SD records.
section: "15"
topics:
