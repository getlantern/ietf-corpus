document: rfc-7172
kind: normative-requirement
summary: An FGL ingress TRILL switch SHOULD unicast a multi-destination TRILL Data packet if there is only one relevant egress FGL TRILL switch. The relevant egress set starts with switches advertising interest in the frame's (X.Y) label and SHOULD be further filtered by multicast listener announcements.
section: 4.1.1
rfc2119_level: SHOULD
topics:
    - routing
