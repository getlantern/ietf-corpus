document: rfc-6658
kind: protocol-element
summary: The network reference model places client LSRs (LSR1, LSR2) in the client MPLS PSN and PEs (PE1, PE2) in the server PSN. The attachment circuit between each LSR and PE is a virtual interface within the same physical equipment, not a physical link.
