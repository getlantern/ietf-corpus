document: rfc-7474
kind: protocol-element
summary: For multicast key selection (AllSPFRouters or AllDRouters), the key's Peers field must first match the area ID; if absent, 'all' is used. The key's Interfaces field must match the sending interface or 'all', and Direction must be 'out' or 'both'. The most recent SendLifetimeStart key wins among multiple matches.
section: "4.2"
topics:
    - routing
    - security
