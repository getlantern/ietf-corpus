document: rfc-9960
kind: interoperability-note
summary: This document updates the Replication-ID portion of the Replication segment identifier specified in Section 2 of RFC 9524. Implementations of RFC 9524 must be updated to use the new structured tuple <Root, Tree-ID, Instance-ID> for control plane identification.
section: "1"
topics:
