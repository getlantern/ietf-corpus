document: rfc-7310
kind: design-rationale
summary: Generic FEC schemes (RFC 5109, RFC 2733) can be applied to apt-X RTP streams to improve resilience to packet loss at the expense of higher bit rate, since apt-X itself provides no inherent redundancy or error-control coding mechanism.
