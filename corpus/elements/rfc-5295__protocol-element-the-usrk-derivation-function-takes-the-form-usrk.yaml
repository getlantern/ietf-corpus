document: rfc-5295
kind: protocol-element
summary: 'The USRK derivation function takes the form: USRK = KDF(EMSK, key label | "\0" | optional data | length), where the key label is a printable ASCII string of up to 255 octets, the NULL octet prevents prefix collisions, and length is a 2-octet unsigned integer in network byte order.'
