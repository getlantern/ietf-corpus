document: rfc-7563
kind: privacy-consideration
summary: The Civic-Location sub-option is considered very sensitive as it reveals the physical location of the network to which a mobile node is attached. Care must be taken to secure PMIPv6 signaling carrying this sub-option, and provisioning location at the coarsest acceptable granularity is recommended.
section: "6"
topics:
    - privacy
    - mobility
