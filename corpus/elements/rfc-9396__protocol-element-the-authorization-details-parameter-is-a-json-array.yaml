document: rfc-9396
kind: protocol-element
summary: The `authorization_details` parameter is a JSON array of objects; each object MUST contain a `type` field whose value is a string identifier for the authorization details type and determines the allowable contents of the object. Multiple entries of the same type are permitted within one array.
section: "2"
topics:
