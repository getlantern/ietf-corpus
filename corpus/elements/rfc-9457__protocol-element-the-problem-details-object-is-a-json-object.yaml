document: rfc-9457
kind: protocol-element
summary: 'The problem details object is a JSON object serialized with the ''application/problem+json'' media type. It has five defined members: ''type'' (URI reference identifying the problem type), ''status'' (HTTP status code), ''title'' (short human-readable summary), ''detail'' (occurrence-specific explanation), and ''instance'' (URI reference identifying the specific occurrence).'
section: "3"
