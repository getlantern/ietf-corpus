document: rfc-8727
kind: interoperability-note
summary: MLStringType is modified to support a simple string type in addition to the predefined object type. Implementations must parse both forms. When converting between XML and JSON IODEF, information in ML_STRING must be preserved; when STRING is used instead of ML_STRING, parsers may assume 'xml:lang' is 'en'.
section: "3.2"
topics:
    - json
    - security
