document: rfc-7104
kind: security-consideration
summary: There is a weak threat that duplication grouping information in the SDP description can be modified to indicate relationships that do not exist, potentially causing failure of duplication mechanisms or mishandling of media streams. SDP integrity protection and source authentication (e.g., S/MIME, HTTPS, or SAP authentication) are required to mitigate this.
section: "5"
topics:
