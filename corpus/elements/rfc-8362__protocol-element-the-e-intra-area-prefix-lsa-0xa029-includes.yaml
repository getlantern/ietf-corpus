document: rfc-8362
kind: protocol-element
summary: The E-Intra-Area-Prefix-LSA (0xA029) includes a fixed header with two reserved octets, a 2-octet Referenced LS Type, a 4-octet Referenced Link State ID, and a 4-octet Referenced Advertising Router before the TLV body. The Referenced LS Type MUST be either E-Router-LSA (0xA021) or E-Network-LSA (0xA022).
section: "4.8"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
