document: rfc-4566
kind: security-consideration
summary: Entities receiving SDP SHOULD be aware that a session description cannot be trusted unless obtained via an authenticated transport from a known and trusted source. Untrusted SDP may specify wrong media destinations, incorrect parameters, or compromised media security; endpoints should exercise care and may need user confirmation.
section: "7"
topics:
    - realtime
    - security
