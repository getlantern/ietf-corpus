document: rfc-4444
kind: wire-format
summary: 'IsisLinkStatePDUID is an 8-byte OCTET STRING encoding the LSP identifier: a 6-byte SystemID, a 1-byte PseudoNode ID (0 for non-LAN LSPs), and a 1-byte fragment number starting at 0. Non-zero PseudoNode IDs must be unique to the IS but need not match IfIndex.'
