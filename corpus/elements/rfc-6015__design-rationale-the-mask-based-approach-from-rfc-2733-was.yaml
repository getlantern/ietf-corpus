document: rfc-6015
kind: design-rationale
summary: The Mask-based approach from RFC 2733 was rejected because for large source blocks the required Mask size becomes prohibitively large. The systematized approach (Offset = L, NA = D, SN base low) is inherently more efficient for signaling source-repair packet associations.
section: "4.2"
