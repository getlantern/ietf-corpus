document: rfc-2227
kind: security-consideration
summary: It is impossible to enforce usage limits if a proxy cheats by offering to limit usage but then ignoring the server's Meter directives. The protocol provides no cryptographic enforcement mechanism for compliance.
section: "10"
topics:
