document: rfc-5608
kind: design-rationale
summary: NAS devices include 'hint' attributes in RADIUS Access-Request messages because RADIUS servers often serve many NAS types and user classes; the server needs context about the type of NAS, the service requested, and the user's role to make correct authorization decisions for SNMP management access.
section: "1.4"
topics:
    - radius
    - snmp
