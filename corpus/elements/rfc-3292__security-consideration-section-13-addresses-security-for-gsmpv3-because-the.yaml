document: rfc-3292
kind: security-consideration
summary: Section 13 addresses security for GSMPv3. Because the protocol is an asymmetric control-plane interface that grants a controller complete authority over connection state, port configuration, QoS assignments, and resource reservations on a switch, the control channel MUST be protected against unauthorized access, spoofing, and replay; authentication and integrity protection are required at the transport or encapsulation layer.
section: "13"
topics:
    - mpls
    - security
