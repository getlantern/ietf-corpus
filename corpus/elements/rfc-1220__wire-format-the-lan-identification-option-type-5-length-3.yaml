document: rfc-1220
kind: wire-format
summary: 'The LAN Identification Option (type=5, length=3 octets) carries a single byte: value 1 enables LAN ID support (labeled LANs exist beyond this system), value 2 disables it (all LAN-ID-tagged traffic will be dropped). Default is disabled.'
section: "6.8"
