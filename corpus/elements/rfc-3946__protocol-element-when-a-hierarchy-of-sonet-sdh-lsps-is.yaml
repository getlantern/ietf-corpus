document: rfc-3946
kind: protocol-element
summary: When a hierarchy of SONET/SDH LSPs is used, a higher-order LSP acts as a virtual link carrying lower-order LSPs. Labels for lower-order LSPs on such a virtual link set the higher-order fields (S, U, K) to zero (non-significant), using only L and M to identify the signal within the higher-order container. Tunneling deeper than SUKLM can represent requires per-layer-network signaling.
section: "3"
topics:
    - mpls
    - routing
