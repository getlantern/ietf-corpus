document: rfc-3339
kind: design-rationale
summary: UTC is preferred over local time because daylight saving rules are convoluted and can change based on local law at unpredictable times, making true interoperability only achievable via UTC. This specification does not attempt to model local time zone rules.
section: "4.1"
