document: rfc-9328
kind: protocol-element
summary: 'The TID field in the RTP payload header indicates relative packet importance: a lower TID value (higher temporal sublayer importance) means the NAL units are needed for decoding lower sublayers. MANEs can use TID to preferentially protect or forward higher-importance packets; more important NAL units MAY be better protected against transmission losses.'
section: "4.2"
topics:
    - rtp
    - realtime
