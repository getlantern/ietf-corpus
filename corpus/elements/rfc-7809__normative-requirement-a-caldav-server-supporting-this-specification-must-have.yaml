document: rfc-7809
kind: normative-requirement
summary: A CalDAV server supporting this specification MUST have one or more associated time zone distribution services (RFC7808) that provide data for the set of time zones known to the server and expected to be used by clients.
section: 3.1.2
rfc2119_level: MUST
