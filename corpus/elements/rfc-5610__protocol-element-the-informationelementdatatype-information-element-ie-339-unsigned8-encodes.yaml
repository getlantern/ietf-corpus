document: rfc-5610
kind: protocol-element
summary: The informationElementDataType Information Element (IE 339, unsigned8) encodes the abstract data type of an IPFIX Information Element. It takes values 0–19 corresponding to types such as octetArray, unsigned8–64, signed8–64, float32/64, boolean, macAddress, string, dateTime variants, and ipv4Address/ipv6Address.
