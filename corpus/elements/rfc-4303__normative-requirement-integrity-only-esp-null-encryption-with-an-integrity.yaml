document: rfc-4303
kind: normative-requirement
summary: Integrity-only ESP (NULL encryption with an integrity algorithm) MUST be offered as a service selection option and MUST be negotiable in SA management protocols and configurable via management interfaces. Both confidentiality and integrity algorithms MUST NOT be simultaneously NULL.
section: "1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
