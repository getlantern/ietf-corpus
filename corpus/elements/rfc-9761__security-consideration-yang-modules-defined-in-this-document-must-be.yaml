document: rfc-9761
kind: security-consideration
summary: YANG modules defined in this document must be accessed via NETCONF or RESTCONF over a secure transport (SSH, TLS, or QUIC) with mutual authentication. NACM (RFC 8341) provides access control for NETCONF/RESTCONF users.
section: "9.2"
topics:
