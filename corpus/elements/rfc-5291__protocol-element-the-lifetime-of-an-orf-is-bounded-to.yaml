document: rfc-5291
kind: protocol-element
summary: The lifetime of an ORF is bounded to the duration of the BGP session during which it is exchanged. An ORF is removed when the last ORF entry is removed, either via REMOVE-ALL or via a sequence of REMOVE operations.
