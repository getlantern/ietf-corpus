kind: wire-format
summary: 'The User-to-User header field ABNF: UUI = "User-to-User" HCOLON uui-value *(COMMA uui-value), where uui-value = uui-data *(SEMI uui-param), and uui-param includes pkg-param, cont-param, enc-param, or generic-param. The uui-data is a token or quoted-string.'
