document: rfc-5685
kind: design-rationale
summary: Anycast addresses are used instead of a list of unicast VPN gateway addresses in DNS so that clients can send IKE_SA_INIT to a single well-known anycast address; the receiving gateway then redirects the client to a specific unicast address, enabling load-based assignment without requiring the client to enumerate individual gateways.
section: "4"
topics:
