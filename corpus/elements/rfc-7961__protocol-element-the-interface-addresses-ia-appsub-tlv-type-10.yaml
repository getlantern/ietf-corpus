document: rfc-7961
kind: protocol-element
summary: The Interface Addresses (IA) APPsub-TLV (type 10) is used to advertise sets of addresses that all designate the same interface (port) within a Data Label (VLAN or FGL), associating that interface with a TRILL switch and optionally a TRILL switch port. It carries a Template field specifying the address format, followed by one or more Address Sets, and optional sub-sub-TLVs.
section: "2"
topics:
