document: rfc-3554
kind: protocol-element
summary: SCTP is treated as a standard transport protocol over IP when using AH or ESP. The SCTP transport protocol number (assigned by IANA) and SCTP source/destination port numbers serve as selectors in the Security Policy Database (SPD).
