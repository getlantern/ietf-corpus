document: rfc-3748
kind: normative-requirement
summary: Use of EAP for purposes other than network access authentication, such as bulk data transport, is NOT RECOMMENDED. EAP is a lock-step protocol that cannot efficiently transport bulk data and provides only enough support for reliable transport of authentication protocols.
section: "1.3"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
