document: rfc-8417
kind: normative-requirement
summary: SETs MAY include the 'application/secevent+jwt' media type in the JWT 'typ' header parameter to declare explicit typing. This MUST be included if the SET could be confused with other kinds of JWTs in the application context. The 'typ' value SHOULD be 'secevent+jwt' (omitting the 'application/' prefix per RFC 7515 Section 4.1.9).
section: "2.3"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
