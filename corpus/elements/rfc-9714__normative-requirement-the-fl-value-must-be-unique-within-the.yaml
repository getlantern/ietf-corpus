document: rfc-9714
kind: normative-requirement
summary: The FL value MUST be unique within the administrative domain; there is a one-to-one mapping between a Flow-ID and a flow. The TTL for the FL MUST be zero to prevent it from being used inadvertently for forwarding.
section: "3"
rfc2119_level: MUST
topics:
