document: rfc-5730
kind: protocol-element
summary: 'The <transfer> command manages client sponsorship changes via an ''op'' attribute with values: request, cancel, approve, reject. The <transfer> query (op="query") retrieves real-time transfer status. Transfer responses MUST include object identity, transfer status, requesting client ID/date, authorizing client ID/date, and an optional expiry date.'
section: 2.9.3.4
topics:
    - security
extracted_by: claude-sonnet-4-6
