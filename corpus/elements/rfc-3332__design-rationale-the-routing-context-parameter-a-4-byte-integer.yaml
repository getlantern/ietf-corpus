document: rfc-3332
kind: design-rationale
summary: The Routing Context parameter (a 4-byte integer) acts as an index into a Message Distribution Table with a 1:1 mapping to a Routing Key. This allows an ASP to process traffic for multiple Application Servers over a single SCTP association, with ASPAC/ASPIA messages discriminated by Routing Context.
section: 1.4.2.1
topics:
    - realtime
