document: rfc-6243
kind: normative-requirement
summary: In 'explicit' basic mode, a 'create' for a node set by the client to its schema default MUST fail with 'data-exists'; a 'create' for a server-set default MUST succeed. A 'delete' for a client-set default MUST succeed; a 'delete' for a server-set default MUST fail with 'data-missing'.
section: 2.3.3
rfc2119_level: MUST
topics:
    - netconf
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
