document: rfc-8807
kind: security-consideration
summary: A client SHOULD NOT decrease the security of a new password by reducing its length. For example, a client with a 20-character password set via the extension should not switch to the base RFC 5730 login command to set a new password of 16 characters or fewer.
section: "7"
rfc2119_level: SHOULD NOT
topics:
    - security
