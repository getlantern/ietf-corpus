document: rfc-8503
kind: normative-requirement
summary: For mvpnMrouteCmcastSourceAddrType and mvpnMrouteNextHopSourceAddrType, if the value is not unknown(0), it MUST be the same as the corresponding group address type. A value of unknown(0) indicates a non-source-specific (*,G) entry.
section: "3.2"
rfc2119_level: MUST
topics:
