document: rfc-3915
kind: design-rationale
summary: While the extension defines a method to deliver a restore report via EPP, an out-of-band mechanism (such as a web site) can also be used to deliver restore reports. This provides operational flexibility for registries that prefer non-EPP reporting channels.
section: "2"
topics:
