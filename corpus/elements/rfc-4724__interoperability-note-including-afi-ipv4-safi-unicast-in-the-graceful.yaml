document: rfc-4724
kind: interoperability-note
summary: Including <AFI=IPv4, SAFI=unicast> in the Graceful Restart Capability does not imply that IPv4 unicast routing information must use BGP multiprotocol extensions; it may still be carried in the NLRI field of a standard BGP UPDATE message.
section: "3"
topics:
    - bgp
    - routing
