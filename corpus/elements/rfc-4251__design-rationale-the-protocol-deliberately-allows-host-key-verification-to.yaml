document: rfc-4251
kind: design-rationale
summary: The protocol deliberately allows host key verification to be skipped on first connection to improve usability during the transition period before widespread public key infrastructure exists on the Internet. The working group judged that deployment friction is itself a security problem, even though this option weakens the protocol when used.
section: "4.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
