document: rfc-5534
kind: normative-requirement
summary: It is RECOMMENDED that an alternate Send Timeout value not be under 10 seconds and that Send Timeout be at most 100 seconds (the default TCP R2 timeout), so Shim6 detects and repairs problems before upper layers give up.
