document: rfc-6920
kind: normative-requirement
summary: If a user agent is sensitive to Content Type and the ni URI has a 'ct=' attribute and the retrieved object has a server-specified Content Type, and the two Content Types do not match, the client SHOULD treat that as a potential security error.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - security
    - http
