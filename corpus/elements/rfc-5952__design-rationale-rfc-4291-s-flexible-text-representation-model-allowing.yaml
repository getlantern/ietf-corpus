document: rfc-5952
kind: design-rationale
summary: RFC 4291's flexible text representation model — allowing leading zeros, optional '::' compression, and mixed case — was identified as the root cause of widespread operational problems including search failures, parsing bugs, audit confusion, and certificate verification errors. A canonical format was needed to eliminate ambiguity.
