document: rfc-9697
kind: normative-requirement
summary: Following detection of RRDP session desynchronization, RP implementations SHOULD issue a warning and SHOULD download the latest Snapshot File and process it as described in Section 3.4.3 of RFC 8182 to return to a synchronized state.
section: "4"
rfc2119_level: SHOULD
topics:
