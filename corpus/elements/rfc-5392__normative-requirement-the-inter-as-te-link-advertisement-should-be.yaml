document: rfc-5392
kind: normative-requirement
summary: The inter-AS TE link advertisement SHOULD be carried in a Type 10 Opaque LSA if flooding scope is limited to the single IGP area, or MAY be carried in a Type 11 Opaque LSA if information should reach all routers in the AS. Configuration control of this choice SHOULD be provided in ASBR implementations.
section: 3.1.1
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
