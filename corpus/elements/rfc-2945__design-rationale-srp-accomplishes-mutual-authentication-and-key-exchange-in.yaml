document: rfc-2945
kind: design-rationale
summary: SRP accomplishes mutual authentication and key exchange in a single Diffie-Hellman-style round of computation, making it feasible for both interactive and non-interactive authentication across a wide range of Internet protocols without requiring trusted key servers or certificate infrastructures.
