document: rfc-6615
kind: security-consideration
summary: The MIB objects expose sensitive network topology and flow export configuration data (addresses, ports, template definitions, observation points). Access to these read-only objects SHOULD be restricted using SNMPv3 authentication and privacy to prevent unauthorized disclosure of network monitoring infrastructure details.
