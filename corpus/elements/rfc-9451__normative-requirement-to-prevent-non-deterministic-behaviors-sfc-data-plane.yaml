document: rfc-9451
kind: normative-requirement
summary: To prevent non-deterministic behaviors, SFC data plane elements MAY support a configuration parameter to filter valid Next Protocol values in NSH OAM packets. This allows operators to explicitly permit or restrict which Next Protocol values are acceptable in OAM packets.
section: "3"
rfc2119_level: MAY
topics:
    - measurement
