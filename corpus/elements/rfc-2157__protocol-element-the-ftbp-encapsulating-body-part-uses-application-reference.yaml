document: rfc-2157
kind: protocol-element
summary: The FTBP encapsulating body part uses application-reference id-mime-ftbp-data; the MIME body's canonical octet stream is placed in FileTransferData.FTdata.value.octet-aligned and all headers including Content-Type are mapped into FTBP ExtensionsField. This mapping is lossless and does not work with multipart types directly.
section: 3.1.1
topics:
