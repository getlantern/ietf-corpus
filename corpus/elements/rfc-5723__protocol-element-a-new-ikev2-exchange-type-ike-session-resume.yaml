document: rfc-5723
kind: protocol-element
summary: A new IKEv2 exchange type IKE_SESSION_RESUME (value 38) is defined, equivalent to IKE_SA_INIT but carrying the client's ticket in an N(TICKET_OPAQUE) payload. It must be followed by an IKE_AUTH exchange before the IKE SA is valid.
section: 4.3.2
topics:
