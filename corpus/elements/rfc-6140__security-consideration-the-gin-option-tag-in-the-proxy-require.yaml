document: rfc-6140
kind: security-consideration
summary: The 'gin' option tag in the Proxy-Require header field ensures that proxies unaware of the bulk-registration semantics will reject the REGISTER request rather than silently misapply policy intended for a single AOR to all AORs being implicitly registered.
