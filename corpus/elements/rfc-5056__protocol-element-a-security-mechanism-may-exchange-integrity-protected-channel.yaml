document: rfc-5056
kind: protocol-element
summary: A security mechanism MAY exchange integrity-protected channel bindings or integrity-protected digests of channel bindings; digest-based mechanisms SHOULD provide for hash/digest agility. A security mechanism MAY use channel bindings in key exchange, authentication, or key derivation prior to the exchange of authenticator messages.
section: "2.1"
topics:
    - security
    - crypto
