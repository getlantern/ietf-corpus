document: rfc-9577
kind: security-consideration
summary: 'Cross-Origin tokens with empty redemption contexts can be reflected: an Attacker can relay a TokenChallenge from an Origin to a Client, receive the Client''s token, and present it to the Origin as if it were the Client. Per-Origin challenges or non-empty redemption contexts mitigate this attack.'
section: "5.3"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
