document: rfc-9733
kind: normative-requirement
summary: It is REQUIRED to use the (D)TLS channel established between the pledge and registrar to transport certificate enrollment request and response messages. The pledge does not need additional connections and the registrar retains full control over enrollment traffic.
section: "4.1"
rfc2119_level: REQUIRED
