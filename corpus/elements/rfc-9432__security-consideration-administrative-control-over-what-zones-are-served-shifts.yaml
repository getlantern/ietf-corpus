document: rfc-9432
kind: security-consideration
summary: Administrative control over what zones are served shifts entirely to the catalog producer. Consumers SHOULD scope the set of admissible member zones by suitable means (static regular expressions, dynamic verification against another database) to prevent unintended provisioning.
section: "7"
topics:
