document: rfc-5331
kind: normative-requirement
summary: In the MPLS multicast use case, all downstream LSRs <Rd1..Rdn> MUST be able to support an Upstream Neighbor Label Space for Ru, and Ru MUST be able to determine this before distributing upstream-assigned labels to them.
