document: rfc-5763
kind: normative-requirement
summary: If a middlebox breaks the RFC 4474 signature and cannot regenerate a valid one, the UA MUST NOT indicate to the user that a secure call has been established to the claimed identity. Implementations configured to only establish secure calls SHOULD terminate the call in this case.
section: "8.6"
rfc2119_level: MUST NOT
topics:
    - security
    - sip
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
