document: rfc-6130
kind: normative-requirement
summary: H_HOLD_TIME MUST be >= REFRESH_INTERVAL. If HELLO messages can be lost, both L_HOLD_TIME and H_HOLD_TIME SHOULD be significantly greater than REFRESH_INTERVAL to prevent premature expiration of neighbor information.
section: 5.3.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
