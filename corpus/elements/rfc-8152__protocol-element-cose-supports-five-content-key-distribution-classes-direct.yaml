document: rfc-8152
kind: protocol-element
summary: 'COSE supports five content key distribution classes: direct (CEK is or is derived from a pre-shared secret), symmetric key-encryption keys (key wrap), key agreement (ECDH + KDF), key transport (recipient''s public key), and password-based. Only direct, key wrap, and key agreement are defined in RFC 8152.'
section: 5.1.1
topics:
