document: rfc-6542
kind: wire-format
summary: 'The 0x8003 GSS checksum structure consists of: Lgth (octets 0-3, little-endian, value 0x10000000), Bnd (octets 4-19, channel binding info), Flags (octets 20-23, little-endian), optional DlgOpt (octets 24-25), optional Dlgth (octets 26-27), optional Deleg (octets 28 to n-1), and Exts (octets n to last). This extends the RFC 4121 structure by formally defining the Exts field.'
section: "3.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
