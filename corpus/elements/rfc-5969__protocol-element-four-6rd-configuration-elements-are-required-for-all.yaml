document: rfc-5969
kind: protocol-element
summary: 'Four 6rd configuration elements are required for all CEs and BRs in a domain: IPv4MaskLen (0-32, number of common high-order IPv4 bits), 6rdPrefix (the SP''s IPv6 prefix), 6rdPrefixLen, and 6rdBRIPv4Address. These values are identical across all nodes in a given 6rd domain.'
