document: rfc-4860
kind: normative-requirement
summary: It is RECOMMENDED that implementations only support modification of the IP protocol number for RSVP Path, PathTear, and ResvConf messages. A general facility for modification of the IP protocol number SHOULD NOT be made available.
section: "6"
rfc2119_level: SHOULD NOT
