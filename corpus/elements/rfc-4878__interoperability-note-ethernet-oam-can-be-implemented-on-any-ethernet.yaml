document: rfc-4878
kind: interoperability-note
summary: Ethernet OAM can be implemented on any Ethernet-like interface, not only EFM (Ethernet in the First Mile) interfaces. The OAM MIB module is independent of the copper and EPON EFM MIB modules, and the same ifIndex used by the IF-MIB is reused as the table index.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
