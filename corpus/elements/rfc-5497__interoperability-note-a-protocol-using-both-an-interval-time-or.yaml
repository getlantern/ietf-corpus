document: rfc-5497
kind: interoperability-note
summary: A protocol using both an INTERVAL_TIME or VALIDITY_TIME Address Block TLV and the same-named Message TLV MUST specify how to interpret the case when both are present — typically the Address Block TLV overrides the Message TLV for the addresses it covers.
section: "8.1"
topics:
    - routing
