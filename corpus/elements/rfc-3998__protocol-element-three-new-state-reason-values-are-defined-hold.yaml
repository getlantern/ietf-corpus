document: rfc-3998
kind: protocol-element
summary: 'Three new state reason values are defined: ''hold-new-jobs'' for printer-state-reasons (set by Hold-New-Jobs operation), ''deactivated'' for printer-state-reasons (set by Deactivate-Printer), and ''job-suspended'' for job-state-reasons (set by Suspend-Current-Job and removed by Resume-Job).'
