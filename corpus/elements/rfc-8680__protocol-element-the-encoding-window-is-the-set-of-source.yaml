document: rfc-8680
kind: protocol-element
summary: The Encoding Window is the set of source symbols available at the sender or coding node used to generate a repair symbol with a Sliding Window FEC code. The Decoding Window is the set of received or decoded source and repair symbols available at a receiver used to decode lost source symbols.
section: "2.1"
topics:
    - realtime
