document: rfc-9264
kind: wire-format
summary: In the JSON serialization, the 'hreflang' target attribute MUST be represented as an array of strings even when only one value is present. The 'media', 'title', and 'type' attributes are single-valued strings; 'title*' is an array of objects with 'value' and optional 'language' members.
section: 4.2.4.1
topics:
