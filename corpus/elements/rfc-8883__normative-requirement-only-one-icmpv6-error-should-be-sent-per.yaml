document: rfc-8883
kind: normative-requirement
summary: 'Only one ICMPv6 error SHOULD be sent per discarded packet. The RECOMMENDED priority order (highest to lowest) is: existing RFC 4443 errors, then codes 5, 6, 10 (padding), 10 (length), 9, 7, 8, and finally ''Headers too long'' (Destination Unreachable code 8) with lowest precedence.'
section: "4.1"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
