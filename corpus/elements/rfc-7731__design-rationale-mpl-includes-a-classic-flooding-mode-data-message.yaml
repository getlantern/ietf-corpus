document: rfc-7731
kind: design-rationale
summary: MPL includes a classic flooding mode (DATA_MESSAGE_IMAX = DATA_MESSAGE_IMIN, DATA_MESSAGE_K=1) in addition to Trickle's polite gossip mode because research (Clausen2013) questioned Trickle's efficiency in some multicast scenarios, allowing MPL to perform satisfactorily across a variety of deployment conditions.
