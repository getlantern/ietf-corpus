document: rfc-5222
kind: normative-requirement
summary: Requests MUST contain location information conformant to exactly one of the two baseline profiles (geodetic-2d or civic), plus zero or more additional profiles. A client MUST NOT send <location> elements derived from different baseline profiles in the same request.
section: "12.1"
rfc2119_level: MUST
topics:
    - realtime
