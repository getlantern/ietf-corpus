document: rfc-5990
kind: normative-requirement
summary: If the keyUsage extension is present in a certificate conveying an RSA public key with the id-rsa-kem OID, the extension MUST contain the keyEncipherment value. dataEncipherment SHOULD NOT be present.
section: "2.3"
rfc2119_level: MUST
topics:
