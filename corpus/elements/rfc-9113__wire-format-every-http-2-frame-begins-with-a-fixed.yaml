document: rfc-9113
kind: wire-format
summary: 'Every HTTP/2 frame begins with a fixed 9-octet header: Length (24-bit unsigned, payload size in octets), Type (8-bit), Flags (8-bit), a Reserved 1-bit field, and a 31-bit Stream Identifier. The 9-octet header is not counted in the Length field value.'
section: "4.1"
