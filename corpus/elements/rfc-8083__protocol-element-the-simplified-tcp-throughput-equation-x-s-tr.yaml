document: rfc-8083
kind: protocol-element
summary: The simplified TCP throughput equation X = s / (Tr * sqrt(2*b*p/3)) is recommended for the congestion circuit breaker, where s is average RTP packet size, Tr is RTT, b=1, and p is approximated by the average loss fraction. The full Padhye equation MAY be used for extra sensitivity.
section: "4.3"
topics:
    - rtp
    - congestion
