document: rfc-3993
kind: security-consideration
summary: The DHCP relay agent option depends on a trusted relationship between the relay agent and server. Fraudulent relay agent option data could lead to theft-of-service, exhaustion of IP addresses, denial of service to legitimate hosts, or assignment of inappropriate configuration parameters.
section: "6"
topics:
    - security
