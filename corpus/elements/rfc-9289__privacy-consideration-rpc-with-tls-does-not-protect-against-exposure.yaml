document: rfc-9289
kind: privacy-consideration
summary: RPC-with-TLS does not protect against exposure of a user's RPC requests to other users on the same client. Multiple RPC users may share a single TLS session, making TLS credentials potentially visible to all users sharing that session; client implementations must carefully segregate TLS credentials.
section: "6.2"
topics:
    - tls
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
