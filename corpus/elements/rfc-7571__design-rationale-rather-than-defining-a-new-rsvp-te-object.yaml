document: rfc-7571
kind: design-rationale
summary: Rather than defining a new RSVP-TE object, this document reuses the existing Administratively down (A) bit in the ADMIN_STATUS Object for Lock Instruct, providing a unified GMPLS control-plane approach for LI and LB across TDM, WDM, and packet-switching technologies without adding new signaling overhead.
