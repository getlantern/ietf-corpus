document: rfc-8208
kind: wire-format
summary: Each Signature Segment in a BGPsec Signature Block contains an SKI (Subject Key Identifier, 20 bytes), a two-octet Length field, and a DER-encoded ECDSA signature. In the examples, signatures are 72 bytes (DER-encoded ECDSA P-256).
section: A.3
topics:
