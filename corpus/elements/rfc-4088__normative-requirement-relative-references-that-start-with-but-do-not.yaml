document: rfc-4088
kind: normative-requirement
summary: Relative references that start with '//' but do not contain a URI authority component MUST NOT be used in SNMP URIs, because the '//' will be parsed as a URI authority, causing a syntax error.
section: "3.1"
rfc2119_level: MUST NOT
topics:
