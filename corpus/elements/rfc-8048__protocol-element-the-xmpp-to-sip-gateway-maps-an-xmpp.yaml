document: rfc-8048
kind: protocol-element
summary: The XMPP-to-SIP gateway maps an XMPP resource identifier to the PIDF tuple 'id' attribute. Because the PIDF 'id' type is xs:ID (which disallows a digit as the first character, unlike XMPP resourceparts), the gateway is RECOMMENDED to prepend the resourcepart with 'ID-' or another alphabetic string.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
