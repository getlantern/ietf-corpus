document: rfc-3910
kind: design-rationale
summary: For spirits-INDPs, the subscription dialog terminates when the event fires, requiring a new SUBSCRIBE for the next occurrence. For spirits-user-prof (cellular events), the subscription persists until expiry because cellular location events may fire at far greater frequency and it is more expedient to allow normal expiration.
section: "6.2"
topics:
    - sip
    - realtime
    - mobility
