document: rfc-6719
kind: normative-requirement
summary: A node SHOULD compute the path cost for the path through each candidate neighbor reachable through an interface. If a node cannot compute the path cost for the path through a candidate neighbor, the node MUST NOT select that candidate neighbor as its preferred parent.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
