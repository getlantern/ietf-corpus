document: rfc-8003
kind: normative-requirement
summary: Non-zero lifetime field values MUST be interpreted as an exponent representing a duration of 2^((lifetime - 64)/8) seconds, covering a range from approximately 4 ms to 178 days in an 8-bit integer.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
