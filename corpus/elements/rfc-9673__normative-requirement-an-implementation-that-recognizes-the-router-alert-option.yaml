document: rfc-9673
kind: normative-requirement
summary: An implementation that recognizes the Router Alert Option SHOULD verify that the option contains a protocol configured as of interest before sending the packet to the Control Plane; otherwise, the router SHOULD forward the packet subject to normal policies.
section: 5.2.1
rfc2119_level: SHOULD
