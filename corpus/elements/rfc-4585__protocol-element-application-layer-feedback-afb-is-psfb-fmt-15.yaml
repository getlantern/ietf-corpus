document: rfc-4585
kind: protocol-element
summary: Application Layer Feedback (AFB) is PSFB FMT=15 and provides a transparent container for application-defined feedback data. The format only defines a common header; the content is interpreted solely by the application layer and is not acted upon at the RTP or codec layer.
section: "6.4"
topics:
