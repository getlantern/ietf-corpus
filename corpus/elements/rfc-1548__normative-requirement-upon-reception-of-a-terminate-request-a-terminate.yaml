document: rfc-1548
kind: normative-requirement
summary: Upon reception of a Terminate-Request, a Terminate-Ack MUST be transmitted with the Identifier copied from the request. Upon reception of a Protocol-Reject, the implementation MUST stop sending packets of the indicated protocol at the earliest opportunity.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
