document: rfc-9536
kind: privacy-consideration
summary: Providing reverse search in RDAP introduces threats of Correlation, Disclosure, and Misuse of data (per RFC 6973). RDAP providers must mitigate these through appropriate access control measures including RBAC, PBAC, ABAC, or TBAC paradigms.
section: "12"
topics:
