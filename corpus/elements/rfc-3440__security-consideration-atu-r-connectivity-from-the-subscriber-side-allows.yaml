document: rfc-3440
kind: security-consideration
summary: ATU-R connectivity from the subscriber side allows manipulation of the ADSL link and the overhead/embedded operations channel (AOC/EOC). Unchecked subscriber-initiated fluctuations could generate notification floods sufficient to overwhelm the management interface or element manager.
