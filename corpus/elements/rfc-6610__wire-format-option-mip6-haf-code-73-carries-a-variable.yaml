document: rfc-6610
kind: wire-format
summary: OPTION_MIP6_HAF (code 73) carries a variable-length FQDN field encoded per RFC 3315 Section 8, resolving to one or more A or AAAA records for the home agent. It must appear only inside one of the three Home Network Information container options.
section: "3.5"
