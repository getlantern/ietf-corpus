document: rfc-8325
kind: design-rationale
summary: High-Throughput Data (AF1x) is mapped to UP 0 rather than AC_BK because the 802.11 four-AC model has no corresponding fit; assigning to AC_BK would impose a lower-than-best-effort penalty on legitimate business traffic, while AC_BE at least provides parity with the standard class.
section: 4.2.8
topics:
