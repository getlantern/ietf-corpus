document: rfc-5732
kind: normative-requirement
summary: '"pendingDelete" status MUST NOT be combined with either "clientDeleteProhibited" or "serverDeleteProhibited" status; "pendingUpdate" MUST NOT be combined with either update-prohibited status; and the four pending status values MUST NOT be combined with each other.'
section: "2.3"
rfc2119_level: MUST NOT
