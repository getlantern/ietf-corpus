document: rfc-2821
kind: normative-requirement
summary: 'To prevent the end-of-data marker from appearing in message text, transparency is required: any line beginning with a period must have an additional period prepended by the sender, and the receiver strips the leading period. The end-of-data sequence <CRLF>.<CRLF> MUST NOT be treated as equivalent to <LF>.<LF>.'
section: 4.5.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
