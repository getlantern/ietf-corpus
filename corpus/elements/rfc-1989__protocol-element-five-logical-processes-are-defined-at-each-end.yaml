document: rfc-1989
kind: protocol-element
summary: 'Five logical processes are defined at each end of the duplex link: Link-Manager (transmits/receives LQRs, enforces policy), Mux (prioritized multiplexer), Tx (maintains OutLQRs and inserts PeerOut fields), Rx (maintains InLQRs/InGoodOctets and inserts SaveIn fields), and Demux (demultiplexer following Rx).'
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
