document: rfc-4006
kind: interoperability-note
summary: Section 11 defines a RADIUS/Diameter credit-control interworking model where a RADIUS AAA server acts as a Diameter credit-control client gateway. This enables RADIUS-based service elements (e.g., NAS) to utilize Diameter real-time credit-control without requiring modification to the service element itself.
section: "11"
topics:
    - diameter
    - radius
