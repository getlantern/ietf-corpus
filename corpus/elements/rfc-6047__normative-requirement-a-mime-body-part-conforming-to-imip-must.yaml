document: rfc-6047
kind: normative-requirement
summary: A MIME body part conforming to iMIP MUST have a Content-Type of 'text/calendar' and MUST also include the MIME parameter 'method', whose value MUST be the same (ignoring case) as the METHOD property within the iCalendar object.
section: "2.4"
rfc2119_level: MUST
topics:
    - email
