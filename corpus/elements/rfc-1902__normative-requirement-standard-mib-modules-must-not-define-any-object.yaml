document: rfc-1902
kind: normative-requirement
summary: Standard MIB modules must not define any object with SYNTAX Opaque. The Opaque type must not be used for any newly-defined object types; it exists solely to preserve backward compatibility with existing SNMPv1 MIBs.
section: 7.1.9
rfc2119_level: MUST
topics:
    - snmp
