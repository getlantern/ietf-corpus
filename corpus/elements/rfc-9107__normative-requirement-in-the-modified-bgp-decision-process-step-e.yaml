document: rfc-9107
kind: normative-requirement
summary: In the modified BGP Decision Process step e), the interior cost of a route is determined by calculating the metric from the selected IGP location to the NEXT_HOP for the route using the shortest IGP path tree rooted at the selected IGP location, rather than from the route reflector itself.
section: "3.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
