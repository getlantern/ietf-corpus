document: rfc-4429
kind: normative-requirement
summary: If an Optimistic Node cannot determine the router's SLLAO without violating the rules above (no NS, no RS with SLLAO), it MUST leave the address Tentative until DAD completes rather than using it as an Optimistic Address.
section: "3.2"
rfc2119_level: MUST
