summary: dot1dStpTxHoldCount (dot1dStp 17) is a read-write Integer32 in the range 1..10 used by the Port Transmit state machine to limit maximum transmission rate. Default value is 3, corresponding to IEEE 802.1w clause 17.16.6 TxHoldCount.
