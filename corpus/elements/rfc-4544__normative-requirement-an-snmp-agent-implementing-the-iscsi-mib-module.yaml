document: rfc-4544
kind: normative-requirement
summary: An SNMP agent implementing the iSCSI MIB module SHOULD NOT send more than three iSCSI notifications in any 10-second period, to prevent inundating the network or notification host during error bursts.
section: "6.16"
rfc2119_level: SHOULD NOT
topics:
