document: rfc-2206
kind: protocol-element
summary: rsvpIfTable (rsvpObjects 6) stores per-interface RSVP configuration and state, indexed by ifIndex. Key objects include rsvpIfEnabled (TruthValue), rsvpIfUdpRequired (TruthValue), rsvpIfRefreshInterval (TimeInterval, default 3000 ms), rsvpIfRefreshMultiple K (default 3), rsvpIfRefreshBlockadeMultiple Kb (default 4), rsvpIfTTL (SEND_TTL override, default 0), and rsvpIfRouteDelay (default 200 hundredths of a second).
section: "3.5"
topics:
    - snmp
    - qos
