document: rfc-7782
kind: normative-requirement
summary: For multicast egress, when the LAALP selection function designates the receiving RBridge as the single exit point for a multi-destination packet in a given Data Label, that RBridge MUST egress the packet; otherwise it MUST NOT egress the packet for that AAE group.
section: 5.3.1
rfc2119_level: MUST
topics:
    - routing
