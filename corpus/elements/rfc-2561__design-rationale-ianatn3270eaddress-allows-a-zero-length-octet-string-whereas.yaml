document: rfc-2561
kind: design-rationale
summary: IANATn3270eAddress allows a zero-length octet string whereas TAddress (RFC 1903) does not. This is necessary because some objects using this syntax serve as table indexes where a zero-length string carries a special 'absent address' meaning.
