document: rfc-8108
kind: normative-requirement
summary: It is RECOMMENDED that SSRCs be explicitly removed by sending an RTCP BYE packet. An endpoint that ceases transmission of all RTP streams but remains in the session MUST maintain at least one active SSRC for RTCP reporting and feedback.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
