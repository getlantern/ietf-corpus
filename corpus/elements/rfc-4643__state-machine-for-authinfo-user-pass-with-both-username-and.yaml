document: rfc-4643
kind: state-machine
summary: 'For AUTHINFO USER/PASS with both username and password required: server MUST return 381 to AUTHINFO USER; MUST return 482 to AUTHINFO PASS if no cached username; MUST use the most recent AUTHINFO USER argument; MUST NOT return 381 to AUTHINFO PASS. On success, server returns 281; on failure, 481.'
section: 2.3.2
topics:
