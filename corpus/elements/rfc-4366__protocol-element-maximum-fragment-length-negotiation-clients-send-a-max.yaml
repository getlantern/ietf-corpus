document: rfc-4366
kind: protocol-element
summary: 'Maximum Fragment Length Negotiation: clients send a max_fragment_length extension containing a MaxFragmentLength enum whose allowed values are 2^9(1), 2^10(2), 2^11(3), 2^12(4). Servers echo the same value if they accept. The default TLS maximum plaintext fragment is 2^14 bytes.'
section: "3.2"
topics:
