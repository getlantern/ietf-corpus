document: rfc-4738
kind: normative-requirement
summary: Upon receiving a valid I_MESSAGE, the Responder MUST send an R_MESSAGE if SIGNi can be correctly verified and the timestamp is current. If an SP payload is present, the Responder MUST return one of the proposed security policies matching its local policy.
section: "3.5"
rfc2119_level: MUST
topics:
    - realtime
    - security
