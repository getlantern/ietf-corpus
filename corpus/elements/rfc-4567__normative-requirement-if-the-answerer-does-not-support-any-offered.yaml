document: rfc-4567
kind: normative-requirement
summary: If the answerer does not support any offered key management protocols and the session is aborted, the answerer SHOULD return '488 Not Acceptable Here'. Re-keying MUST be handled as a new offer and MUST use the same key management protocol as the original.
section: 4.1.2
rfc2119_level: MUST
topics:
    - realtime
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
