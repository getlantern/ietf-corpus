document: rfc-9593
kind: normative-requirement
summary: If the responder has sent CERTREQ payload(s) in IKE_SA_INIT and any Announcement in the SUPPORTED_AUTH_METHODS notification has a non-zero Cert Link field, the responder SHOULD resend the same CERTREQ payload(s) in the IKE_INTERMEDIATE response containing the notification.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ipsec
    - pkix
