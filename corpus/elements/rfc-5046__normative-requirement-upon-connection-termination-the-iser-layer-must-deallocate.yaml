document: rfc-5046
kind: normative-requirement
summary: Upon connection termination, the iSER layer MUST deallocate all connection and task resources and invalidate Local and Remote Mappings (associating ITTs to local and Advertised STags) before notifying the iSCSI layer via Connection_Terminate_Notify.
section: "5.2"
rfc2119_level: MUST
topics:
    - security
