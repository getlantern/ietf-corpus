document: rfc-1559
kind: security-consideration
summary: Section 9 addresses security considerations for the DECnet Phase IV MIB. The MIB exposes numerous read-write objects (executor state, routing parameters, circuit costs, polling thresholds) that, if modified by unauthorized parties via SNMP, could disrupt DECnet routing and end-system connectivity; access control relies on the SNMP community-based security model of RFC 1157.
section: "9"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
