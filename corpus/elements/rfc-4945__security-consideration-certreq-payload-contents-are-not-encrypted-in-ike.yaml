document: rfc-4945
kind: security-consideration
summary: CERTREQ payload contents are not encrypted in IKE, potentially leaking private information such as trust anchor identities in some environments. Administrators may use empty Certification Authority fields to prevent such leakage at the cost of performance.
section: "7.1"
topics:
    - ipsec
    - security
    - privacy
