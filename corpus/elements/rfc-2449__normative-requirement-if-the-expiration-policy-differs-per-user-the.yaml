document: rfc-2449
kind: normative-requirement
summary: If the expiration policy differs per user, the server MUST announce in AUTHENTICATION state the smallest value which could be set for any user. If a site uses any automatic deletion policy, it SHOULD use the EXPIRE capability to announce this.
section: "6.7"
rfc2119_level: MUST
topics:
    - email
