document: rfc-6098
kind: normative-requirement
summary: If the A bit is set in a GNM but no GNAM is received within a reasonable time, the GNM SHOULD be retransmitted. The minimum time between retransmissions MUST NOT be less than 1 second, and each successive retransmission timeout SHOULD be at least twice the previous period (exponential backoff).
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
