summary: diffServSchedulerTable models scheduling elements that accept inputs from queues or preceding schedulers. The scheduling method is identified by an OBJECT-IDENTITY OID (diffServSchedulerMethod), allowing new scheduling algorithms to be defined in other MIBs.
