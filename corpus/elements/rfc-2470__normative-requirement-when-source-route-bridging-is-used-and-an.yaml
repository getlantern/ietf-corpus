document: rfc-2470
kind: normative-requirement
summary: When source route bridging is used and an implementation derives MTU from the LF subfield, it must maintain separate MTU values for each neighbor. The IPv6 MTU is the MAC MTU (from the LF subfield) minus 8 octets for the LLC header.
section: "2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
