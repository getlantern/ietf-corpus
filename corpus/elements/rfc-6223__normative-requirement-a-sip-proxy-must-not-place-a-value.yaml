document: rfc-6223
kind: normative-requirement
summary: A SIP proxy MUST NOT place a value into the "keep" parameter of the topmost Via header field of a request it receives before forwarding it. A proxy SHOULD remove any "keep" parameter values in Via header fields below the topmost one in responses before forwarding them.
section: "10"
rfc2119_level: MUST NOT
topics:
    - sip
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
