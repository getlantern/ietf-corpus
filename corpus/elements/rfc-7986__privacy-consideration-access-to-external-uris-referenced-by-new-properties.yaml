document: rfc-7986
kind: privacy-consideration
summary: Access to external URIs referenced by new properties can be tracked, compromising subscriber privacy. Calendar publishers wishing to protect privacy MUST use HTTPS (not HTTP) for calendar and ancillary data access. Clients SHOULD obtain user permission before dereferencing external URIs.
section: "8"
topics:
    - privacy
    - security
