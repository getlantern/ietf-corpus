document: rfc-8159
kind: protocol-element
summary: 'The keyed IPv6 tunnel uses a static 1:1 mapping without a control plane: the management plane creates a one-to-one mapping between the access-side L2 attachment circuit (identified by port ID or port ID + VLAN ID) and the network-side IPv6 address (which also identifies the tunnel endpoint). There is a single session per tunnel.'
section: "2"
