document: rfc-3729
kind: protocol-element
summary: 'TransactionAggregationType is a textual convention enumerating four aggregation modes: flows(1) aggregates by app/server/client 3-tuple, clients(2) by app/client, servers(3) by app/server, and applications(4) by application alone. This is declared a complete set because cross-application aggregation is not meaningful.'
