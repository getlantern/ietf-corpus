document: rfc-7212
kind: design-rationale
summary: GAP messages include no checksum by design; integrity is optional and achieved via the authentication mechanism in Section 6. This avoids mandatory processing overhead for deployments that rely on lower-layer integrity guarantees.
section: "3.3"
topics:
