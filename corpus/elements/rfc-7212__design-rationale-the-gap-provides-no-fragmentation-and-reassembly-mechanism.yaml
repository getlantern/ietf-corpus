document: rfc-7212
kind: design-rationale
summary: The GAP provides no fragmentation and reassembly mechanism. This responsibility is explicitly delegated to applications that need to send data larger than the path MTU, keeping the core protocol simple and avoiding a feature rarely needed by OAM use cases.
