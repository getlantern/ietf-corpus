document: rfc-5329
kind: normative-requirement
summary: In OSPFv3, the Link ID sub-TLV SHOULD NOT be sent and MUST be ignored upon receipt; the Neighbor ID sub-TLV MUST be used for link identification instead.
section: "4.1"
rfc2119_level: MUST
