document: rfc-6733
kind: security-consideration
summary: AVPs containing sensitive user credentials or identity information must be protected by transport-level security (TLS/DTLS/IPsec) since Diameter no longer provides an end-to-end AVP-level security framework. Implementations must be aware that agents may inspect and modify AVPs in transit, so sensitive data should traverse only trusted paths.
section: "13.3"
topics:
    - diameter
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
