document: rfc-5603
kind: design-rationale
summary: The PW may optionally be modeled as an etherLike virtual interface in the ifTable (via pwEnetPwIfIndex), enabling management of the PW via the existing Etherlike-MIB for statistics gathering, status, and configuration. This is a design choice to leverage existing tooling without requiring new Ethernet-specific management infrastructure.
