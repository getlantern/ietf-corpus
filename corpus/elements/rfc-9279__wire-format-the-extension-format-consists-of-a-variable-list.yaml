document: rfc-9279
kind: wire-format
summary: The Extension Format consists of a variable list of TLVs appended to the Additional Data section of IGMPv3/MLDv2 messages. Each TLV has a 2-octet Extension Type, 2-octet Extension Length, and variable-length Extension Value field. There is no alignment or padding between TLVs.
