document: rfc-7761
kind: security-consideration
summary: PIM-SM is vulnerable to denial-of-service attacks including state exhaustion via forged Join messages creating spurious (S,G) or (*,G) entries, bandwidth exhaustion via forged Register messages, and CPU exhaustion via high-rate Assert or Hello floods. Rate limiting of data-triggered Assert messages is specified as SHOULD.
section: "6.4"
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
