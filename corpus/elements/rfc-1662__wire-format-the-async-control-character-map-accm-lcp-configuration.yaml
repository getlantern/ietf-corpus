document: rfc-1662
kind: wire-format
summary: The Async-Control-Character-Map (ACCM) LCP Configuration Option has Type=2, Length=6, and a 4-octet ACCM field transmitted most significant octet first. Each bit position corresponds to the ASCII control character of the same value; a set bit means that octet MUST remain mapped.
section: "7.1"
