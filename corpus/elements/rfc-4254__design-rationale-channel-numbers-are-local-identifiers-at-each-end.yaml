document: rfc-4254
kind: design-rationale
summary: Channel numbers are local identifiers at each end of the connection and may differ on each side; any channel-related message uses the recipient's channel number. This avoids requiring a global channel namespace and allows each side to allocate numbers independently.
section: "5"
topics:
    - security
