document: rfc-2797
kind: normative-requirement
summary: Transaction management uses a transactionId (id-cmc 5) generated by the client. If the original request contains a transactionID, all subsequent request and response messages MUST include the same transactionID. Replay protection uses senderNonce (id-cmc 6) and recipientNonce (id-cmc 7); if a message includes a senderNonce, the response MUST reflect it as recipientNonce and include a new senderNonce.
section: "5.6"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
