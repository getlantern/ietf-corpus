document: rfc-3828
kind: normative-requirement
summary: Applications using UDP-Lite MUST NOT make assumptions about the correctness of received data beyond the position indicated by the Checksum Coverage field and should introduce their own validity checks for the uncovered portion.
section: "3.3"
rfc2119_level: SHOULD
