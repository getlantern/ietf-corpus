document: rfc-2834
kind: normative-requirement
summary: Should the HIPPI-SC LAN not support broadcast, the HARP server(s) MUST emulate broadcast through a Protocol for Internet Broadcast Emulation Server (PIBES). This memo REQUIRES the PIBES extension to the HARP protocol, guaranteeing broadcast service to upper-layer protocols like IP.
section: "7"
rfc2119_level: MUST
topics:
    - ip
    - multicast
