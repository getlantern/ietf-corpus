document: rfc-5644
kind: protocol-element
summary: Type-P-Spatial-One-way-Delay-Vector decomposes end-to-end one-way delay into the sequence <T,dT1,dT2,...,dTn,dT> where dTi is the one-way delay from Src to router Hi (wire-time last bit), or undefined if the packet does not pass Hi within the loss threshold.
section: 5.1.4
