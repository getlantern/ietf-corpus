document: rfc-6753
kind: normative-requirement
summary: The Location Server MUST NOT provide any information about the Target except its location unless policy from a Rule Maker allows otherwise, and MUST only provide an unlinked pseudonym in the 'entity' attribute of the PIDF-LO document unless the Rule Maker policy allows identity disclosure.
section: "6"
rfc2119_level: MUST NOT
topics:
    - privacy
    - security
