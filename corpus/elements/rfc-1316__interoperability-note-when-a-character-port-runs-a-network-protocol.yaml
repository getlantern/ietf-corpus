document: rfc-1316
kind: interoperability-note
summary: When a character port runs a network protocol (SLIP or PPP), a corresponding Interfaces table entry must exist with ifOperStatus 'off' when not running a protocol and 'on' when running one; charPortOperStatus is 'down' during network use and Character MIB operational counters are inactive.
