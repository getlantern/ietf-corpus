document: rfc-8196
kind: normative-requirement
summary: Extended IS reachability (TLV 22) and IP reachability (TLV 135) MUST be used. Routers in autoconfiguration mode MUST NOT use legacy TLVs 2, 128, or 130, and MUST ignore those TLVs on receipt.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
