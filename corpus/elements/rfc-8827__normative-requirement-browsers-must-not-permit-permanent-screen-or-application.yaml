document: rfc-8827
kind: normative-requirement
summary: Browsers MUST NOT permit permanent screen or application sharing permissions to be installed as a response to a JS request. Browsers MUST provide a separate dialog request for screen/application sharing permissions, and MUST indicate any windows currently being shared in an unambiguous way.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
