document: rfc-8827
kind: protocol-element
summary: The IdP proxy is JavaScript downloaded from a well-known URI at the IdP's domain and runs in an isolated security context within the browser. The PeerConnection component communicates with it via a secure message-passing channel. The proxy performs both identity assertion generation and verification, decoupling the browser from any specific identity protocol.
section: "7.2"
topics:
