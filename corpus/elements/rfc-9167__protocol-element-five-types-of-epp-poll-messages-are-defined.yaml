document: rfc-9167
kind: protocol-element
summary: 'Five types of EPP poll messages are defined for Registry Maintenance Notification via the <maint:pollType> element: create, update, delete, courtesy, and end. Poll responses include a <maint:infData> element within <resData> containing the <maint:item> element.'
