document: rfc-7331
kind: protocol-element
summary: The BFD-STD-MIB module (OID { mib-2 222 }) defines managed objects for configuring and monitoring BFD sessions per RFC 5880, RFC 5881, RFC 5883, and RFC 7130, covering BFD versions 0 and 1. The MIB is organized into bfdScalarObjects, bfdSessTable, bfdSessPerfTable, bfdSessDiscMapTable, and bfdSessIpMapTable.
