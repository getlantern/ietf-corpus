document: rfc-6450
kind: interoperability-note
summary: Version 1 implementations (predating this specification) exist and do not include the Version option. A server receiving a message without a Version option or with a version other than 2 SHOULD respond with a Server Response setting version to 2, and a client receiving such a response MUST stop sending requests.
section: "3.2"
topics:
    - multicast
