document: rfc-8754
kind: registry
summary: 'This document creates the ''Segment Routing Header TLVs'' IANA registry (8-bit codepoint, IETF Review). Values 0–127 are for TLVs that do not change en route; 128–255 for TLVs that may change en route. Initial entries: 0 (Pad1), 4 (PadN), 5 (HMAC TLV), with 1–3, 6, 127, 255 reserved and 124–126, 252–254 for experimentation.'
section: "8.2"
