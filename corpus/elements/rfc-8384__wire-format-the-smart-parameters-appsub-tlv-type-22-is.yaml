document: rfc-8384
kind: wire-format
summary: The Smart-Parameters APPsub-TLV (type 22) is 4 bytes long and contains a 2-byte Holding Time (unsigned integer, seconds) and a 2-byte Flags field (all bits currently reserved, sent as zero). It MUST appear in every Smart-Hello inside a TRILL GENINFO TLV.
section: "4.1"
