summary: The identifiers '/.well-known/openid-configuration', 'op_policy_uri', and 'op_tos_uri' appear OpenID-specific but are reused in RFC 8414 to refer to general OAuth 2.0 features not specific to OpenID Connect, for backwards compatibility.
