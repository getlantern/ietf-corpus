document: rfc-9132
kind: state-machine
summary: 'Mitigation status transitions through states 1–8: (1) setup in progress, (2) successfully mitigating, (3) attack stopped, (4) exceeded provider capacity, (5) client withdrawn but terminating, (6) mitigation terminated, (7) mitigation withdrawn by server, (8) mitigation pending signal-channel-loss trigger only. For preconfigured mitigations (trigger-mitigation=false), status 3 and 7 are transmitted four times before transitioning to 8.'
section: 4.4.2
topics:
    - security
