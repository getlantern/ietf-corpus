document: rfc-7606
kind: normative-requirement
summary: If Total Attribute Length is exceeded when parsing enclosed path attributes, or insufficient octets remain to parse a minimum-sized attribute, treat-as-withdraw MUST be used. The Total Attribute Length MUST then be relied upon to locate the beginning of the NLRI field.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
