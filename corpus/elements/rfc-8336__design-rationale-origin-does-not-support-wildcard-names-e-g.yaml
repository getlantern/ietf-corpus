document: rfc-8336
kind: design-rationale
summary: ORIGIN does not support wildcard names (e.g., '*.example.com') in Origin-Entry. Sending ORIGIN with a wildcard certificate in use effectively disables any origins not explicitly listed, since wildcards cannot be enumerated.
section: "2.2"
topics:
    - http
