document: rfc-5277
kind: interoperability-note
summary: When a <create-subscription> is sent while another subscription is already active on that session (without :interleave), the server returns an 'operation-failed' protocol error. The :interleave capability must be present to allow multiple subscriptions or interleaved RPCs.
section: "6.5"
topics:
    - netconf
