document: rfc-1647
kind: normative-requirement
summary: Clients negotiating a terminal device-type with '-E' suffix, the DYNAMIC type, or any printer device-type MUST be able to respond to both the Read Partition Query (Type 02) and all forms of the Read Partition Query List (Type 03) 3270 structured field commands.
section: "12"
rfc2119_level: MUST
