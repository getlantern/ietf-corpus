document: rfc-3443
kind: interoperability-note
summary: In the Short Pipe Model with PHP enabled, the TTL of the tunneled packet is unchanged after the PHP operation itself; the egress node performs the final decrement. This differs from non-PHP behavior only in which node performs the second decrement.
