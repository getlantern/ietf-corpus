document: rfc-5052
kind: security-consideration
summary: 'FEC Object Transmission Information obtained out-of-band via session descriptions is a security concern: a forged or corrupted session description causes receivers to use incorrect protocol parameters for decoding. It is RECOMMENDED that source authentication be used to ensure receivers only accept legitimate session descriptions from authorized senders.'
section: "11"
topics:
    - security
    - multicast
