document: rfc-3388
kind: normative-requirement
summary: '''a=group'' lines MUST NOT contain identification-tags that correspond to ''m'' lines with port set to zero (refused streams). Grouping of ''m'' lines MUST always be requested by the offerer, never the answerer.'
