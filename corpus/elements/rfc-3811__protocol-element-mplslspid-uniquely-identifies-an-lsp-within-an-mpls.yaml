document: rfc-3811
kind: protocol-element
summary: MplsLSPID uniquely identifies an LSP within an MPLS network, assigned at the head end and carried by the signaling protocol. For CR-LDP, it is 6 bytes (2-byte CR-LSPID + 4-byte Router ID); for RSVP-TE, it is 2 bytes.
