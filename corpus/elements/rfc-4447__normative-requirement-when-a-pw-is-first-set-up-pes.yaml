document: rfc-4447
kind: normative-requirement
summary: When a PW is first set up, PEs MUST attempt to negotiate the usage of the PW Status TLV by including it in the initial Label Mapping message. If the remote PE does not include a PW Status TLV in its Label Mapping, both PEs revert to the label withdraw method for signaling PW status.
section: 5.4.3
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
