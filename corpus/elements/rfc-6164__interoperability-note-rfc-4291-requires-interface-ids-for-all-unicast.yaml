document: rfc-6164
kind: interoperability-note
summary: RFC 4291 requires interface IDs for all unicast addresses (except those starting with binary 000) to be 64 bits in Modified EUI-64 format; /127 prefixes conflict with this requirement, and operators must be aware that Subnet-Router anycast must be disabled to avoid address collisions.
