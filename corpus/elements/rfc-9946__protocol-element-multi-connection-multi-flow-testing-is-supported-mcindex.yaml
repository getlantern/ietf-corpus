document: rfc-9946
kind: protocol-element
summary: 'Multi-connection (multi-flow) testing is supported: mcIndex (1 octet, 0-based) identifies a connection within a test, mcCount (1 octet) is the total connection count, and mcIdent (2 octets, pseudorandom non-zero) associates all connections of a single test. Each connection is processed independently by the server.'
section: "6.1"
topics:
