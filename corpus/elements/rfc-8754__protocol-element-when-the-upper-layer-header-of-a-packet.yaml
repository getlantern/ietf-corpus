document: rfc-8754
kind: protocol-element
summary: When the upper-layer header of a packet matching a locally instantiated SRv6 SID is IPv4 or IPv6 and local configuration permits, the node performs IPv6 decapsulation and resubmits the inner packet. Otherwise it sends an ICMP Parameter Problem with error code 4 ('SR Upper-layer Header Error').
section: 4.3.1.2
topics:
    - ip
    - routing
