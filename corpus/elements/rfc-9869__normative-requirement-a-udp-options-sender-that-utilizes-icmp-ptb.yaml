document: rfc-9869
kind: normative-requirement
summary: A UDP Options sender that utilizes ICMP PTB messages MUST use the quoted packet to validate the UDP port information in combination with the token contained in the UDP Option before processing the packet using the DPLPMTUD method.
section: "8"
rfc2119_level: MUST
topics:
