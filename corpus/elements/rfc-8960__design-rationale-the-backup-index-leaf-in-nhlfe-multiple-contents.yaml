document: rfc-8960
kind: design-rationale
summary: The 'backup-index' leaf in 'nhlfe-multiple-contents' allows referencing an alternate next-hop entry for Fast Reroute protection, referencing RFC 4090 (RSVP-TE FRR) and RFC 5714 (IP FRR Framework). This design cleanly separates primary and backup path configuration within the same NHLFE list structure.
section: "2.5"
topics:
