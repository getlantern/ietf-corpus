document: rfc-3315
kind: wire-format
summary: 'DUID-LLT encodes: type=1 (16 bits), hardware type (16 bits), time in seconds since 2000-01-01 UTC modulo 2^32 (32 bits), and variable-length link-layer address in canonical form. Both time and hardware type are stored in network byte order.'
