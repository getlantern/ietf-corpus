document: rfc-8898
kind: normative-requirement
summary: When the UAC sends a non-REGISTER request, it MUST include an Authorization header field with a 'Bearer' scheme carrying a valid access token obtained from the AS indicated in the challenge, as specified in RFC 6750.
section: 2.1.4
rfc2119_level: MUST
topics:
