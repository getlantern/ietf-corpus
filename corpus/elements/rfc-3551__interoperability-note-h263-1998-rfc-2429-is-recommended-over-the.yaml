document: rfc-3551
kind: interoperability-note
summary: H263-1998 (RFC 2429) is RECOMMENDED over the original H263 (RFC 2190) for new implementations. RFC 2190 continues to be used by existing implementations and may be required for backward compatibility; implementations using 1998 H.263 features MUST use RFC 2429.
section: "5.4"
topics:
