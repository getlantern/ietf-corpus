document: rfc-3807
kind: normative-requirement
summary: On receiving a Link Status Start Reporting message, the SG SHALL respond immediately with a Link Status Indication and SHALL continue sending Link Status Indication messages on all subsequent link status changes. System Management SHALL send this message on interface activation for all links.
section: "4.4"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
