document: rfc-2865
kind: normative-requirement
summary: An Access-Request MUST contain either a User-Password or a CHAP-Password or a State attribute. It MUST NOT contain both a User-Password and a CHAP-Password. It MUST also contain either a NAS-IP-Address or a NAS-Identifier (or both).
section: "4.1"
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
