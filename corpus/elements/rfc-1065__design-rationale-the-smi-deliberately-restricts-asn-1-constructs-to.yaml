document: rfc-1065
kind: design-rationale
summary: The SMI deliberately restricts ASN.1 constructs (to four primitive types and specific SEQUENCE forms) solely for simplicity, not because the full ASN.1 generality is technically incorrect. Future editions may relax these restrictions as understanding matures.
