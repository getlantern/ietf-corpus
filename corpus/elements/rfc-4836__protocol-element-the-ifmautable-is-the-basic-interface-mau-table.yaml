document: rfc-4836
kind: protocol-element
summary: The ifMauTable is the basic interface MAU table, indexed by {ifMauIfIndex, ifMauIndex}. Each entry carries ifMauType (operational MAU type), ifMauStatus, ifMauMediaAvailable, ifMauMediaAvailableStateExits, ifMauJabberState, ifMauJabberingStateEnters, ifMauFalseCarriers (Counter32), ifMauDefaultType (read-write administrative type), ifMauAutoNegSupported (TruthValue), ifMauTypeListBits (IANAifMauTypeListBits), and ifMauHCFalseCarriers (Counter64).
