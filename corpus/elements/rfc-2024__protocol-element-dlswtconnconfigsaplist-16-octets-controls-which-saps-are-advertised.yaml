document: rfc-2024
kind: protocol-element
summary: dlswTConnConfigSapList (16 octets) controls which SAPs are advertised per partner transport connection. Changes affect only new circuit establishments, not existing ones. The default value ('AA000000000000000000000000000000'H) enables SAPs 0, 4, 8, and C.
