document: rfc-1883
kind: design-rationale
summary: Flow labels are allocated pseudo-randomly so that any set of bits within the 24-bit Flow Label field is suitable for use as a hash key by routers when looking up flow-handling state, enabling efficient per-flow processing without dedicated key negotiation.
