document: rfc-2849
kind: normative-requirement
summary: A zero-length attribute value MUST be represented as AttributeDescription ':' FILL SEP (e.g., 'seeAlso:' followed by a newline). It is also permissible for URL-referenced values to be zero length.
section: Notes on LDIF Syntax
rfc2119_level: MUST
topics:
