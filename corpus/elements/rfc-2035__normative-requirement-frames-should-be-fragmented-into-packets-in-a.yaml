document: rfc-2035
kind: normative-requirement
summary: Frames SHOULD be fragmented into packets in a manner that avoids fragmentation at lower network layers (e.g., IP). When restart markers are used, frames SHOULD be fragmented so each packet starts with a restart interval.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
