document: rfc-6363
kind: interoperability-note
summary: The use of RTP for repair packets is independent of whether RTP is used for source packets. FEC schemes are expected to recover entire transport payloads for recovered source packets in all cases; for RTP source flows this includes recovering the complete UDP payload, including the RTP header.
section: "3"
topics:
