document: rfc-3866
kind: interoperability-note
summary: Per RFC 2251, non-supporting servers treat an AttributeDescription with language tag options as an unrecognized attribute type. To ensure proper function of non-supporting clients, supporting clients SHOULD ensure entries populated with tagged values are also populated with non-tagged values.
section: "5"
topics:
