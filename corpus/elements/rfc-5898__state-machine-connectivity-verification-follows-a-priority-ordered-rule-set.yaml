document: rfc-5898
kind: state-machine
summary: 'Connectivity verification follows a priority-ordered rule set: (1) if an explicit mechanism (e.g., ICE) is negotiated, precondition is met when that mechanism succeeds; (2) else if connection-oriented transport is negotiated, precondition is met when connection is established; (3) else if transport provides implicit verification, met when that succeeds; (4) else connectivity cannot be verified and precondition will never be satisfied.'
section: "4"
topics:
