document: rfc-4727
kind: security-consideration
summary: The experimental IPv4 options defined in Section 2.5 are not included in IPsec AH calculations, making it impossible to authenticate their use. For IPv6 experimental options, the 'chg' field value determines whether the option is included in AH calculations.
