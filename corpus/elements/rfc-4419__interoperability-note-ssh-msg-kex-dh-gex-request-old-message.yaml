document: rfc-4419
kind: interoperability-note
summary: 'SSH_MSG_KEX_DH_GEX_REQUEST_OLD (message 30) exists for backward compatibility: the client sends only ''n'' instead of ''min || n || max'', and the exchange hash H is computed using only ''n'' rather than the full triple. Implementations must handle both variants.'
