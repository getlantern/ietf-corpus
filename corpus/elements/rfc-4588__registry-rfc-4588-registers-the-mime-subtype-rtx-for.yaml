document: rfc-4588
kind: registry
summary: 'RFC 4588 registers the MIME subtype "rtx" for four media types: audio/rtx, video/rtx, text/rtx, and application/rtx. Each registration defines a required "apt" parameter and an optional "rtx-time" parameter. The MIME subtype name "rtx" is used in SDP rtpmap attributes to bind retransmission payload type numbers.'
section: "11"
