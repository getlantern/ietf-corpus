document: rfc-8876
kind: security-consideration
summary: To address replay attacks, a CAP document contains mandatory <identifier>, <sender>, and <sent> elements plus an optional <expires> element that together make each alert unique per sender with time restrictions. An entity that has already received a CAP alert within the indicated timeframe can detect replayed messages.
section: "9"
topics:
    - sip
    - security
    - realtime
