document: rfc-9012
kind: normative-requirement
summary: If a Tunnel Encapsulation attribute has no valid TLVs or lacks the transitive bit, the 'Treat-as-withdraw' procedure of RFC 7606 is applied. If a TLV's final octet is not the final octet of its final sub-TLV, the TLV MUST be considered malformed and Treat-as-withdraw applied.
section: "13"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
