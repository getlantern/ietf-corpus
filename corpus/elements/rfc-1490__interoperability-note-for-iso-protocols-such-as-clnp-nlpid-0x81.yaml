document: rfc-1490
kind: interoperability-note
summary: For ISO protocols such as CLNP (NLPID 0x81), the NLPID is considered the first octet of the protocol data and must not be removed before passing to upper layers; it serves double duty as both the demultiplexor and the start of the PDU. For non-ISO protocols like IP, the NLPID is not part of the protocol data.
section: "9"
