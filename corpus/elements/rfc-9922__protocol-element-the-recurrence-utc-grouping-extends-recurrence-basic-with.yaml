document: rfc-9922
kind: protocol-element
summary: The 'recurrence-utc' grouping extends recurrence-basic with a 'recurrence-first' container (start-time-utc in UTC, duration in seconds) and a 'recurrence-end' choice (until via utc-until, or count). The count value MUST be greater than 1; start-time-utc counts as the first occurrence.
section: 3.3.4
topics:
