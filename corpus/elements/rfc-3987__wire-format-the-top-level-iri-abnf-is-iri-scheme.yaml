kind: wire-format
summary: 'The top-level IRI ABNF is: IRI = scheme ":" ihier-part [ "?" iquery ] [ "#" ifragment ]. IRI-reference = IRI / irelative-ref. The grammar closely follows RFC 3986 with non-terminals renamed (URI→IRI or prefixed ''i'') wherever the unreserved set is expanded.'
