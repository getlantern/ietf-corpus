document: rfc-4468
kind: normative-requirement
summary: If the IMAP URL uses the 'submit+' access identifier prefix, the submit server MUST refuse the BURL command unless the userid in the URL's access token matches the submit client's authorization identity.
section: "3.3"
rfc2119_level: MUST
topics:
