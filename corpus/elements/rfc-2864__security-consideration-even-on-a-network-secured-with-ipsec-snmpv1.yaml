document: rfc-2864
kind: security-consideration
summary: Even on a network secured with IPsec, SNMPv1 provides no control over which principals on that secure network are permitted to GET objects from this MIB. Proper SNMP entity configuration restricting access to legitimate principals is the customer/operator's responsibility.
section: "7"
topics:
    - snmp
    - security
    - ipsec
