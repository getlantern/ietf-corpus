document: rfc-4449
kind: normative-requirement
summary: Where a node has been configured to use this mechanism with a particular peer, it SHOULD NOT attempt to use another mechanism even if the peer requests it or claims not to support this mechanism, to prevent bidding down attacks.
section: "4"
rfc2119_level: SHOULD NOT
