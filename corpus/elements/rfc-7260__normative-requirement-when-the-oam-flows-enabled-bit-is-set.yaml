document: rfc-7260
kind: normative-requirement
summary: When the 'OAM Flows Enabled' bit is set, OAM mechanisms MUST be enabled; if cleared, OAM mechanisms MUST be disabled. When 'OAM Alarms Enabled' is set, consequent actions MUST be executed including management system notification; when cleared, no action SHOULD be executed and the management system SHOULD NOT be notified.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
