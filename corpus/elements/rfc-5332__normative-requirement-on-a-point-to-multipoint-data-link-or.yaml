document: rfc-5332
kind: normative-requirement
summary: On a point-to-multipoint data link or tunnel, the top labels of all MPLS packets MUST be of the same type — either all upstream-assigned or all downstream-assigned. All receivers must know a priori which type is in use.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
