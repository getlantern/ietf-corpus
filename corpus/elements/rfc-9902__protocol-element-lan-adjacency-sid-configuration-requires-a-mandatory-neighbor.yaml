document: rfc-9902
kind: protocol-element
summary: LAN adjacency-SID configuration requires a mandatory neighbor-system-id leaf (isis:system-id type), added via augmentation of the adj-sids list when the interface-type is 'broadcast'. This distinguishes LAN adj-SIDs from point-to-point adj-SIDs.
