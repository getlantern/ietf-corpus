document: rfc-3389
kind: normative-requirement
summary: Under the RTP/AVP profile (RFC 1890), static payload type 13 is assigned for CN at an RTP timestamp clock rate of 8,000 Hz. If other clock rates are needed, they MUST be defined through dynamic payload types.
