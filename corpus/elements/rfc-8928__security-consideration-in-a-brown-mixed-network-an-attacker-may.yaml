document: rfc-8928
kind: security-consideration
summary: In a brown (mixed) network, an attacker may attach to a legacy 6LR that cannot perform the Crypto-ID challenge. Security is only fully effective after all 6LRs in the network are upgraded; the 'A' flag should be set only at that point.
section: "7.1"
topics:
    - security
    - ip
