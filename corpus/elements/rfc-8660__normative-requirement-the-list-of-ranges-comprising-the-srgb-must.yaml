document: rfc-8660
kind: normative-requirement
summary: The list of ranges comprising the SRGB MUST NOT overlap, and every range MUST NOT cover or overlap with a reserved label value or range (RFC 7274). If the SRGB does not conform to these rules, it MUST be completely ignored by all routers in the routing domain.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
