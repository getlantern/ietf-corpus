document: rfc-4404
kind: normative-requirement
summary: It is RECOMMENDED that implementers support the SNMPv3 framework with full cryptographic mechanisms (authentication and privacy). Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; SNMPv3 with cryptographic security SHOULD be deployed instead.
section: "5"
rfc2119_level: RECOMMENDED
topics:
