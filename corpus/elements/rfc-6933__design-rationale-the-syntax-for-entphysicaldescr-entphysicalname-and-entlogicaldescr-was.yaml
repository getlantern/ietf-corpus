document: rfc-6933
kind: design-rationale
summary: The syntax for entPhysicalDescr, entPhysicalName, and entLogicalDescr was changed from DisplayString to SnmpAdminString in v2, which the ENTMIB WG acknowledged was not strictly allowed by SMIv2. Deprecating and redefining the objects was judged to have a more adverse impact on backward compatibility given the specific semantics of these objects.
section: "2.11"
topics:
    - snmp
