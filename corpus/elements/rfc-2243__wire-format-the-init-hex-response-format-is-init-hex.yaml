document: rfc-2243
kind: wire-format
summary: The init-hex response format is 'init-hex:<current-OTP>:<new-params>:<new-OTP>' where current-OTP and new-OTP are hex-64bit values and new-params is 'algorithm sequence-number seed' (e.g., 'md5 499 ke6118'). The init-word response uses word-64bit encoding for OTP fields.
section: "4.1"
topics:
    - security
