document: rfc-7357
kind: normative-requirement
summary: The high-priority bit SHOULD be set on ESADI-LSP fragment zero to ensure the ESADI Parameter APPsub-TLV gets through promptly, but SHOULD NOT be set on other fragments to avoid giving undue priority to less urgent PDUs.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
