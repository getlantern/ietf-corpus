document: rfc-9776
kind: wire-format
summary: 'IGMPv3 Membership Report message (type 0x22): 8-bit Type, 8-bit Reserved, 16-bit Checksum, 16-bit Flags, 16-bit Number of Group Records (M), followed by M Group Records. Each Group Record contains Record Type (8 bits), Aux Data Len (8 bits), Number of Sources N (16 bits), 32-bit Multicast Address, N 32-bit Source Addresses, and optional Auxiliary Data.'
