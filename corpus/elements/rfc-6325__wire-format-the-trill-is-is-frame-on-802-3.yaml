document: rfc-6325
kind: wire-format
summary: The TRILL IS-IS frame on 802.3 uses an Outer Ethernet Header with the All-IS-IS-RBridges multicast destination, source RBridge MAC, optional Outer.VLAN tag, L2-IS-IS Ethertype, IS-IS payload, and FCS. It carries no TRILL header.
