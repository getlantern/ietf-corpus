document: rfc-6794
kind: normative-requirement
summary: A proxy MUST verify that a request does not already contain the local policy server URI in a Policy-ID header field before rejecting with 488. If rejecting, the proxy MUST insert a Policy-Contact header field with its policy server URI(s) in the 488 response.
section: 4.4.2
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
