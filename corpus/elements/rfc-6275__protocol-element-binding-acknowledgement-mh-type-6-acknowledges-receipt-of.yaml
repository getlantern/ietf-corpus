document: rfc-6275
kind: protocol-element
summary: Binding Acknowledgement (MH Type 6) acknowledges receipt of a Binding Update when acknowledgement was requested or an error occurred. It carries a Status code, sequence number, and lifetime. A Binding Authorization Data option with MAC is required when sent to a mobile node that used the return routability procedure.
section: 6.1.8
topics:
