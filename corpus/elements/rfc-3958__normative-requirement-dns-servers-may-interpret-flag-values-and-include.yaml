document: rfc-3958
kind: normative-requirement
summary: DNS servers MAY interpret flag values and include appropriate NAPTR, SRV, or A records in the Additional Information portion of the DNS packet. Clients are encouraged to check for additional information but are not required to do so.
section: "6.7"
rfc2119_level: MAY
