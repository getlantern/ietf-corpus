document: rfc-9173
kind: wire-format
summary: The BCB-AES-GCM Authentication Tag result (Result Id 1) is a CBOR byte string and MUST be 128 bits prior to CBOR encoding. It MAY be stored as a BCB security result or included with the ciphertext in the security target block-type-specific data field.
section: 4.4.1
rfc2119_level: MUST
topics:
    - crypto
    - cbor
