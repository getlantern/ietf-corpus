document: rfc-6626
kind: normative-requirement
summary: Once the home agent allocates a prefix, it MUST maintain the prefix registration table as defined in RFC5177. The lifetime of the allocated prefix equals the lifetime of the binding cache entry.
section: "3.2"
rfc2119_level: MUST
