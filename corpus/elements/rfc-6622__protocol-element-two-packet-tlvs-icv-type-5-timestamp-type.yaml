document: rfc-6622
kind: protocol-element
summary: Two Packet TLVs (ICV type=5, TIMESTAMP type=6), two Message TLVs (ICV type=5, TIMESTAMP type=6), and two Address Block TLVs (ICV type=5, TIMESTAMP type=6) are defined for affixing ICVs and timestamps to RFC 5444 packets, messages, and addresses respectively. IANA assigns the same numerical value to Packet, Message, and Address Block TLV types with the same name.
