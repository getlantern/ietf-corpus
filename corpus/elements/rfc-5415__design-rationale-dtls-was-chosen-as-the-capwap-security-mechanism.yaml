document: rfc-5415
kind: design-rationale
summary: DTLS was chosen as the CAPWAP security mechanism rather than IPsec because DTLS operates at the application layer, requires no kernel modifications, and is readily implementable alongside the CAPWAP stack. DTLS is based on TLS, which has been widely deployed, analyzed, and is available in hardware acceleration silicon.
section: "2"
topics:
