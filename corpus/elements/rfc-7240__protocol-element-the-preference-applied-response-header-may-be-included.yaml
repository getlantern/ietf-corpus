document: rfc-7240
kind: protocol-element
summary: The Preference-Applied response header MAY be included in a response to indicate which Prefer tokens were honored by the server. Its ABNF is `Preference-Applied = "Preference-Applied" ":" 1#applied-pref` where `applied-pref = token [ BWS "=" BWS word ]`; parameters are not included.
section: "3"
topics:
