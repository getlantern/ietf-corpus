document: rfc-7523
kind: normative-requirement
summary: If a client authentication JWT is invalid, the authorization server MUST return an error response with the 'error' parameter set to 'invalid_client'. The server MAY include 'error_description' or 'error_uri' with additional detail.
section: "3.2"
rfc2119_level: MUST
topics:
