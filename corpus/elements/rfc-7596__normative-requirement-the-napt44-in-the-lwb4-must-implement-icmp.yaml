document: rfc-7596
kind: normative-requirement
summary: The NAPT44 in the lwB4 MUST implement ICMP message handling conforming to RFC 5508. If the lwB4 receives an ICMP error for errors detected inside the IPv6 tunnel, it relays the ICMP error message to the original source, conforming to RFC 2473 Section 8.
section: 5.2.1
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
