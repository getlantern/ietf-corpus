document: rfc-1002
kind: protocol-element
summary: 'NM_FLAGS contains: AA (Authoritative Answer), TC (Truncation—set when datagram would exceed 576 bytes), RD (Recursion Desired—only valid in requests to NBNS), RA (Recursion Available—only valid in NBNS responses), and B (Broadcast/multicast flag). RA must be zero in all non-NBNS responses.'
section: 4.2.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
