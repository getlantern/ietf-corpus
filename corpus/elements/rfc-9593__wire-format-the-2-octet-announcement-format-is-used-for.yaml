document: rfc-9593
kind: wire-format
summary: The 2-octet announcement format is used for authentication methods not concerned with public key cryptography. It consists of a Length octet (value 2) followed by an Auth Method octet. Applicable for Shared Key Message Integrity Code (2) and NULL Authentication (13).
section: 3.2.1
topics:
