document: rfc-3995
kind: interoperability-note
summary: Two new status codes (successful-ok-ignored-subscriptions 0x0003 and client-error-ignored-all-subscriptions 0x0414) are defined. The former indicates partial success where some subscriptions were ignored; the latter indicates total failure where no subscriptions could be created, allowing clients to distinguish partial from complete failure.
section: "12"
