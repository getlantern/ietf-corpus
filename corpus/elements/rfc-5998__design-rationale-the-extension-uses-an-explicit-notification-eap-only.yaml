document: rfc-5998
kind: design-rationale
summary: The extension uses an explicit notification (EAP_ONLY_AUTHENTICATION) from the initiator rather than silently ignoring the responder's AUTH payload (Appendix A.1 alternative). This allows the EAP method selection to take the authentication mode into account and avoids relying on undefined behavior.
section: "3"
topics:
