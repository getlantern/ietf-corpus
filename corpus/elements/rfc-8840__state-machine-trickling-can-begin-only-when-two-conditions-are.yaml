document: rfc-8840
kind: state-machine
summary: 'Trickling can begin only when two conditions are met: (1) Trickle ICE support at the peer agent is confirmed, and (2) a dialog has been created between the peers. For reliable provisional responses with PRACK, both conditions are satisfied immediately; for unreliable responses, the Answerer must wait for an INFO request from the Offerer to confirm the early dialog is established at both ends.'
section: "4.3"
