document: rfc-9292
kind: wire-format
summary: 'The binary message begins with a Framing Indicator, a single variable-length integer. Values 0–3 are defined: 0 = known-length request, 1 = known-length response, 2 = indeterminate-length request, 3 = indeterminate-length response. Any other value makes the message invalid.'
