document: rfc-8106
kind: security-consideration
summary: An attacker can send a fraudulent RA with a bogus RDNSS address, redirecting IPv6 hosts to a malicious DNS server. Similarly, a fraudulent DNSSL can cause hosts to resolve short unqualified names to unintended IP addresses.
section: "7.1"
topics:
    - dns
    - ip
    - security
