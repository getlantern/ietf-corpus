document: rfc-5935
kind: interoperability-note
summary: Application developers must account for special semantics of Gauge32, Counter32, Counter64, and TimeTicks (as specified in RFC 2578) when using their values for anything beyond display, storage, or literal transmission; XSD compliance alone does not capture those semantics.
