document: rfc-3986
kind: security-consideration
summary: Malicious URIs can be constructed to mislead users about the resource being accessed, for example by embedding misleading userinfo that resembles a trusted domain name (e.g., "http://www.trusted.example.com@evil.example.com/"). Applications rendering URIs for user feedback should display userinfo distinctly.
section: "7.2"
topics:
    - http
    - security
