document: rfc-8482
kind: normative-requirement
summary: A DNS initiator that receives an HINFO or single-RRset response to an ANY query MAY cache the response normally. Such cached records SHOULD be retained following normal caching semantics, as with any other DNS response.
section: "5"
rfc2119_level: SHOULD
topics:
    - dns
