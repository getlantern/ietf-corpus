document: rfc-2132
kind: design-rationale
summary: 'If a vendor encodes multiple items in the Vendor Specific Information option, it SHOULD use ''Encapsulated vendor-specific options'': a nested TLV sequence identical in syntax to the DHCP options field but without a magic cookie, allowing vendor-defined sub-codes within code 43.'
section: "8.4"
