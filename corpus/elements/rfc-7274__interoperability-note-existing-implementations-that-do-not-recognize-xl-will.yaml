document: rfc-7274
kind: interoperability-note
summary: Existing implementations that do not recognize XL will treat it as a single special-purpose label and will not expect an ESPL to follow. Consequently, if ESPLs appear in some packets of a flow, those packets may be load-balanced onto different paths and be reordered.
section: "3"
topics:
    - mpls
