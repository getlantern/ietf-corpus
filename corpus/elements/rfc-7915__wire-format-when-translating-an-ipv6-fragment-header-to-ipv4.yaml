document: rfc-7915
kind: wire-format
summary: When translating an IPv6 Fragment Header to IPv4, the IPv4 Identification field takes the low-order 16 bits from the IPv6 Fragment Header Identification field. The IPv4 MF flag is copied from the IPv6 M flag, and the IPv4 DF flag is cleared (set to zero), allowing further fragmentation by IPv4 routers.
section: 5.1.1
topics:
    - ip
    - v6ops
