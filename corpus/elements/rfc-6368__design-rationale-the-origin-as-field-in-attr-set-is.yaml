document: rfc-6368
kind: design-rationale
summary: The Origin AS field in ATTR_SET is included specifically to prevent a route originating in one customer AS's iBGP from being silently leaked into a different AS without proper AS_PATH manipulation, enabling correct eBGP-like attribute construction when routes cross AS boundaries at VRF import.
