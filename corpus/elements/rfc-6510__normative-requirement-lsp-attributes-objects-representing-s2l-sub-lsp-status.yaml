document: rfc-6510
kind: normative-requirement
summary: LSP Attributes objects representing S2L sub-LSP status MUST follow a S2L_SUB_LSP object. Only the first instance of LSP_ATTRIBUTES within the context of a S2L_SUB_LSP object is meaningful; subsequent instances SHOULD be ignored and MUST be forwarded unchanged.
section: "3"
rfc2119_level: MUST
topics:
