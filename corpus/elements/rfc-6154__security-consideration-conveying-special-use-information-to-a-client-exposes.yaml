document: rfc-6154
kind: security-consideration
summary: Conveying special-use information to a client exposes extra information that could be of value to an attacker — for example, knowing that \All contains pointers to every message the user has. If the IMAP channel is not protected from passive eavesdropping, this disclosure could be an issue.
section: "7"
topics:
    - email
    - security
    - privacy
