document: rfc-6098
kind: security-consideration
summary: When the FA relays a GNM between MN and HA without sharing a mobility security association with either peer, non-authentication extensions between the MN-FA or FA-HA pairs are not integrity protected. In this case, all such non-authentication extensions should be silently discarded.
section: "7.2"
topics:
    - mobility
    - security
