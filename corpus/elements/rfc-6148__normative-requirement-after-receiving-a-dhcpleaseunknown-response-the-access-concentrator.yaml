document: rfc-6148
kind: normative-requirement
summary: After receiving a DHCPLEASEUNKNOWN response, the access concentrator SHOULD NOT attempt another DHCPLEASEQUERY to the same DHCP server with the same Remote ID sub-option. It MAY store the negative result for future use.
section: "4.6"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
