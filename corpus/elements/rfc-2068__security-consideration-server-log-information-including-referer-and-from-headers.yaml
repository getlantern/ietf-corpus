document: rfc-2068
kind: security-consideration
summary: Server log information including Referer and From headers can reveal sensitive details about users' browsing habits and email addresses. This information MUST be treated with discretion; users should be made aware of what information is logged and how it may be used.
section: "15.3"
topics:
    - http
    - security
    - privacy
