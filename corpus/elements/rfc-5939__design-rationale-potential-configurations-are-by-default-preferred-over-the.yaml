document: rfc-5939
kind: design-rationale
summary: Potential configurations are by default preferred over the actual configuration in the 'm=' line. This allows an offerer to place the least-common-denominator (e.g., plain RTP) in the actual configuration for backwards compatibility with legacy endpoints while expressing a preference for a more capable option (e.g., SRTP) as a potential configuration.
section: "3.2"
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
