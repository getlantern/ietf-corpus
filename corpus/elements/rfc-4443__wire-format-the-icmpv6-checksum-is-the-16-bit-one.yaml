document: rfc-4443
kind: wire-format
summary: The ICMPv6 checksum is the 16-bit one's complement of the one's complement sum of the entire ICMPv6 message, prepended with a pseudo-header of IPv6 fields (Next Header value 58). The checksum field is set to zero before computation.
