document: rfc-4730
kind: protocol-element
summary: 'Three timers govern digit collection: the inter-digit timer (default 4000 ms) is the maximum wait between digits; the critical-digit timer (default 1000 ms) is the wait when a match exists but a longer match is still possible; the extra-digit timer (default 500 ms) is the wait when the longest match has been reached but an enterkey may follow.'
section: "3.2"
topics:
    - sip
    - realtime
