document: rfc-2652
kind: normative-requirement
summary: A noop command must be acknowledged with response code 200 (command OK, no response forthcoming). The noop command must not require a signed MIME object, though implementations should accept validly signed noop commands.
section: 2.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
