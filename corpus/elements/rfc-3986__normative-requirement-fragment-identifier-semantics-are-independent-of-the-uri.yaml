document: rfc-3986
kind: normative-requirement
summary: Fragment identifier semantics are independent of the URI scheme and cannot be redefined by scheme specifications. The fragment is separated from the rest of the URI prior to dereference and resolved solely by the user agent.
section: "3.5"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
