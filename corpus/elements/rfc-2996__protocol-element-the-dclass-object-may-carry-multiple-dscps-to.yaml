document: rfc-2996
kind: protocol-element
summary: The DCLASS object may carry multiple DSCPs to enable the host to discriminate sub-flows within a behavior aggregate. For example, for the AF PHB group, the network may return DSCPs 001010, 001100, and 001110 corresponding to increasing levels of drop precedence within Class 1. The significance of DSCP ordering is not defined by this document.
section: "2"
