document: rfc-9656
kind: security-consideration
summary: 'The rlt-mode configurable container is sensitive: a malicious client could modify the bonded/protecting carrier counts, changing the intended behavior of the radio link. The tx-frequency and channel-separation leaves are also sensitive: unauthorized modification could alter frequency configuration, render the configuration invalid, and stop carrier operation.'
section: "3"
topics:
    - yang
    - netconf
    - security
