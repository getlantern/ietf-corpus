document: rfc-6554
kind: protocol-element
summary: The Pad field (4-bit) indicates the number of unused octets used for padding after Address[n] at the end of the SRH, which may arise when CmprI or CmprE is non-zero. The Segments Left field is initialized by the originator to n, the total number of addresses in Addresses[1..n].
