document: rfc-3095
kind: wire-format
summary: Window-based LSB (W-LSB) encoding adds robustness by having the compressor maintain a sliding window of candidate reference values the decompressor may use. The compressor selects k = max(g(v_min, v), g(v_max, v)) to guarantee correct decompression regardless of which window entry the decompressor uses as reference.
section: 4.5.2
topics:
