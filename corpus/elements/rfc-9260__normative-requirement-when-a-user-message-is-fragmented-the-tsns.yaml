document: rfc-9260
kind: normative-requirement
summary: When a user message is fragmented, the TSNs assigned to its fragments MUST be strictly sequential, all fragments MUST carry the same Stream Sequence Number, and each fragment of an unordered message MUST have its U bit set to 1.
section: 3.3.1
rfc2119_level: MUST
topics:
