summary: 'Proof-of-possession (POP) linking is OPTIONAL. For DTLS 1.2, the tls-unique value (first Finished message) is added as a challengePassword in the PKCS #10 CSR. For DTLS 1.3, a 32-byte tls-exporter binding derived using ''EXPORTER-Channel-Binding'' is used instead.'
