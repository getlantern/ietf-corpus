document: rfc-7678
kind: privacy-consideration
summary: The AVPs defined in this document reveal privacy-sensitive information such as subscriber addresses that can be used for tracking. All these AVPs are considered security-sensitive, and the security considerations of RFC 6733 Section 13.3 MUST be followed for Diameter messages containing them.
section: "6.2"
rfc2119_level: MUST
topics:
    - privacy
    - security
    - diameter
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
