document: rfc-2837
kind: design-rationale
summary: Both module numbering within a Fabric Element and port numbering within a module are permitted to be non-contiguous (sparse). This allows module indices to match physical slot labels (e.g., cards 3, 5, 6, 7 in a 13-slot chassis) and permits modules and ports to come and go without triggering a management reset of sysUpTime.
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
