document: rfc-9082
kind: normative-requirement
summary: URLs MUST be properly encoded according to the rules of RFC 3986. For example, spaces in search patterns must be percent-encoded (e.g., 'Bobby Joe*' becomes 'Bobby%20Joe*').
section: 3.2.3
rfc2119_level: MUST
topics:
    - http
