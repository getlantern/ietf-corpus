document: rfc-3640
kind: wire-format
summary: 'Each AU-header may contain the following fields in order: AU-size, AU-Index or AU-Index-delta, CTS-flag, CTS-delta, DTS-flag, DTS-delta, RAP-flag, and Stream-state. The length of each field (except the flag fields) is configured via MIME format parameters; a default value of zero indicates the field is absent.'
