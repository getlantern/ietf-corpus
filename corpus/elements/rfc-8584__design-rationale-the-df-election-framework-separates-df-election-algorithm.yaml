document: rfc-8584
kind: design-rationale
summary: The DF election framework separates 'DF election algorithm' (the function mapping inputs to a winner PE) from 'DF election capability' (pre-processing steps that modify inputs or candidate lists before the algorithm runs). This separation allows new algorithms and capabilities to be introduced independently and combined in arbitrary pairings, as assessed case-by-case.
section: "1.4"
topics:
