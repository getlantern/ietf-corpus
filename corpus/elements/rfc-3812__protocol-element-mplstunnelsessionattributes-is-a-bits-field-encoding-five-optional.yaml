document: rfc-3812
kind: protocol-element
summary: 'mplsTunnelSessionAttributes is a BITS field encoding five optional session behaviors: fastReroute(0) permits local repair without tearing down the tunnel, mergingPermitted(1) allows session merging for scalability, isPersistent(2) enables auto-restoration after failure, isPinned(3) pins loose hops, and recordRoute(4) requests path recording by the signaling protocol.'
section: "11"
