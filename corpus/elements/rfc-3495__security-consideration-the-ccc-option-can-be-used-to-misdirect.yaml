document: rfc-3495
kind: security-consideration
summary: The CCC option can be used to misdirect network traffic by providing incorrect DHCP server addresses, provisioning server addresses, or Kerberos realm names. This enables Denial of Service attacks via invalid addresses, man-in-the-middle attacks via snooper addresses, and customer theft by a malicious TSP altering the Kerberos realm designation.
section: "10"
topics:
    - security
    - crypto
