document: rfc-1755
kind: normative-requirement
summary: Systems implementing a Public ATM UNI interface MUST support a configurable inactivity timer to clear idle connections; the timer's range SHOULD span from a few minutes to 'infinite', with a default of 20 minutes RECOMMENDED. The inactivity timer MUST monitor traffic in both directions of the connection.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
