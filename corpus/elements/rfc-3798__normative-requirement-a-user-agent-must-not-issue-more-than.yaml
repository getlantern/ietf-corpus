document: rfc-3798
kind: normative-requirement
summary: A user agent MUST NOT issue more than one MDN on behalf of each particular recipient. Once an MDN has been issued for a recipient, no further MDNs may be issued even if another disposition is performed.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - email
