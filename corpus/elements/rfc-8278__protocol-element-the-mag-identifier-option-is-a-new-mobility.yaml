document: rfc-8278
kind: protocol-element
summary: The MAG Identifier option is a new mobility header option (Type 64) used in PBU and PBA messages to convey the MAG's identity. It contains a Subtype field referencing the 'Mobile Node Identifier Option Subtypes' registry and a variable-length Identifier field.
