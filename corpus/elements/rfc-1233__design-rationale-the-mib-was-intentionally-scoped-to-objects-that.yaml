document: rfc-1233
kind: design-rationale
summary: The MIB was intentionally scoped to objects that can generally be read from deployed CSUs (both in-chassis and external via proxy), rather than attempting to manage multiplexors, DSUs, and other equipment. This up-front design decision closely aligned the MIB with operationally available data.
