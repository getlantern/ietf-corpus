document: rfc-2616
kind: design-rationale
summary: HTTP/1.1 introduced strict version negotiation requirements (stricter than HTTP/1.0) because the proliferation of incompletely-implemented HTTP/1.0 applications made it impossible for two communicating applications to determine each other's true capabilities.
