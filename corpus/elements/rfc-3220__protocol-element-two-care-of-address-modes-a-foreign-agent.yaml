document: rfc-3220
kind: protocol-element
summary: 'Two care-of address modes: (a) Foreign agent care-of address — provided by the FA in its Agent Advertisement; the FA is the tunnel endpoint and decapsulates datagrams. (b) Co-located care-of address — acquired by the mobile node itself (e.g., via DHCP); the mobile node is the tunnel endpoint. The ''D'' bit in the Registration Request indicates co-located mode.'
section: "1.7"
topics:
    - mobility
    - ip
    - nat
