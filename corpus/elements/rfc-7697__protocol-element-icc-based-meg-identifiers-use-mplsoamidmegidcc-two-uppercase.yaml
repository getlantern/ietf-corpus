document: rfc-7697
kind: protocol-element
summary: ICC-based MEG identifiers use mplsOamIdMegIdCc (two uppercase alpha chars, Country Code), mplsOamIdMegIdIcc (up to 6-char ITU Carrier Code), and mplsOamIdMegIdUmc (up to 7-char unique operator-assigned code). Together CC+ICC+UMC form the globally unique ICC-based MEG_ID per RFC 6923.
section: "7"
