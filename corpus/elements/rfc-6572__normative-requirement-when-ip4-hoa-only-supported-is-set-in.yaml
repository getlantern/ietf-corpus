document: rfc-6572
kind: normative-requirement
summary: When IP4_HOA_ONLY_SUPPORTED is set in the MIP6-Feature-Vector, the PMIP6_SUPPORTED flag MUST also be set and IP4_HOA_SUPPORTED MUST NOT be set; the Access-Accept SHOULD NOT carry the IPv6 Home Network Prefix.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - radius
