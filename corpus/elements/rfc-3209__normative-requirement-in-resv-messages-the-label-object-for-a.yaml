document: rfc-3209
kind: normative-requirement
summary: In Resv messages, the LABEL object for a sender MUST immediately follow the FILTER_SPEC for that sender, prior to any subsequent FILTER_SPEC. No more than one LABEL and/or RECORD_ROUTE may follow each FILTER_SPEC.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
