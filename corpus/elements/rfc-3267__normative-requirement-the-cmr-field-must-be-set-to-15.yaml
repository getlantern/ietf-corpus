document: rfc-3267
kind: normative-requirement
summary: The CMR field MUST be set to 15 for packets sent to a multicast group. The encoder SHOULD ignore mode requests when sending to a multicast session but MAY use RTCP feedback as a hint that a mode change is needed.
section: 4.3.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - multicast
