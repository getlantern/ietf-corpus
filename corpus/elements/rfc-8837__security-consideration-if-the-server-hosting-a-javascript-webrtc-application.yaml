document: rfc-8837
kind: security-consideration
summary: If the server hosting a JavaScript WebRTC application is compromised, many browsers could simultaneously transmit flows with elevated DSCP markings, potentially constituting a network abuse attack. The Diffserv architecture's ingress traffic conditioning is the expected mitigation.
