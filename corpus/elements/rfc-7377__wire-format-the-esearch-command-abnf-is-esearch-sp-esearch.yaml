summary: 'The ESEARCH command ABNF is: ''ESEARCH [SP esearch-source-opts] [SP search-return-opts] SP search-program'', where esearch-source-opts is ''IN SP ( source-mbox [SP ( scope-options )] )'' and source-mbox is one or more filter-mailboxes items separated by SP.'
