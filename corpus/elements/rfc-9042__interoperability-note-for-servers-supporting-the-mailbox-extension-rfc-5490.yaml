document: rfc-9042
kind: interoperability-note
summary: For servers supporting the mailbox extension (RFC 5490), if both :create and :mailboxid are provided and no matching mailbox is found, a new mailbox is created with the name from the positional argument but receives a server-chosen MAILBOXID rather than the one specified in :mailboxid.
section: "4.1"
topics:
    - email
