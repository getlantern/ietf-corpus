document: rfc-6615
kind: normative-requirement
summary: In a failover group, exactly one session has member type primary(1) and all others MUST have type secondary(2). For load-balancing or parallel export groups, all sessions MUST share the same member type (either loadBalancing(4) or parallel(3)).
section: "5.4"
rfc2119_level: MUST
topics:
    - snmp
    - measurement
