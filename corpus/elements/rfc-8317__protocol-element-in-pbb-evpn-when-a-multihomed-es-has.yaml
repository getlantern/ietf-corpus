document: rfc-8317
kind: protocol-element
summary: 'In PBB-EVPN, when a multihomed ES has both Root and Leaf sites, two B-MAC addresses are advertised: one per-ES B-MAC (implicitly Root, per RFC 7623) without the E-Tree extended community, and one per-PE B-MAC explicitly marking Leaf with the E-Tree extended community Leaf-Indication flag set.'
section: "5"
