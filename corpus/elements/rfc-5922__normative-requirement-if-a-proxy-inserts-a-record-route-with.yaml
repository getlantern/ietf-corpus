document: rfc-5922
kind: normative-requirement
summary: If a proxy inserts a Record-Route with the expectation that the route uses secure connections, the proxy MUST insert into the Record-Route header a URI that corresponds to an identity for which the proxy has a certificate.
section: "7.5"
rfc2119_level: MUST
