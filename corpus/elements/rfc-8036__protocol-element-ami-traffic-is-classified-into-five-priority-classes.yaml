summary: 'AMI traffic is classified into five priority classes: C1 (high-priority critical, <5s, <100 bytes), C2 (critical, <10s, <150 bytes), C3 (normal, <30s, <200 bytes), C4 (low priority, 2-hour window, <400 bytes), and C5 (background, firmware updates within 7 days).'
