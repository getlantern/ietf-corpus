document: rfc-8171
kind: protocol-element
summary: 'TRILL directory service supports two distribution models: Push Mode, in which a directory server pushes address mapping information to subscribing TRILL switches via ESADI, and Pull Mode, in which a TRILL switch queries a server for needed information via RBridge Channel messages. Hybrid operation combining both modes is also supported.'
