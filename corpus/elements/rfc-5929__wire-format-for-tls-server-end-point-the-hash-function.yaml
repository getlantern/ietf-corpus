summary: 'For ''tls-server-end-point'', the hash function is chosen as: SHA-256 if the certificate signatureAlgorithm uses MD5 or SHA-1; otherwise use the hash function from the signatureAlgorithm. If the signatureAlgorithm uses no hash or multiple hashes, the channel binding type is undefined.'
