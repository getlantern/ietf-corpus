document: rfc-7807
kind: protocol-element
summary: The 'status' member conveys the HTTP status code for consumer convenience. Generators MUST use the same status code in the actual HTTP response. The member is advisory; generic HTTP software uses the HTTP status code, not this field.
section: "3.1"
