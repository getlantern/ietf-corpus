document: rfc-8798
kind: security-consideration
summary: The introduction of new measurement units poses no additional security risks beyond those in RFC 8428, except a potential for confusion about the proper unit to use and the risk that an implementation assuming only primary units may no longer work correctly when secondary units are present. Implementations that process secondary units are expected to have been developed with awareness of the risks of multiple units for the same logical type.
section: "5"
topics:
    - security
