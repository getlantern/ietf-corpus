document: rfc-4142
kind: design-rationale
summary: Classic facsimile is interactive allowing real-time capability discovery, while Internet mail is store-and-forward with long latency; content negotiation mechanisms are therefore needed to allow senders to transfer richer document forms than the safe-but-universal default.
