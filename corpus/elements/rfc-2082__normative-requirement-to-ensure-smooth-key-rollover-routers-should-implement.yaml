document: rfc-2082
kind: normative-requirement
summary: To ensure smooth key rollover, routers SHOULD implement an algorithm that detects which keys neighbors are using, and transmit messages using both the old and new keys until all neighbors have adopted the new key or the old key's lifetime expires.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
