document: rfc-8682
kind: protocol-element
summary: The tinymt32_init(s, seed) initialization function accepts a 32-bit unsigned integer seed (including 0 as a valid value), runs a MIN_LOOP of 8 mixing iterations, and then advances the state PRE_LOOP (8) steps before the PRNG is ready for use.
