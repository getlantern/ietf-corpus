document: rfc-2439
kind: design-rationale
summary: Separate, slower decay rates while a route is unreachable are recommended so that routes reachable for a larger percentage of the flap cycle recover faster; this avoids penalizing intermittently-reachable routes as heavily as continuously-flapping ones.
