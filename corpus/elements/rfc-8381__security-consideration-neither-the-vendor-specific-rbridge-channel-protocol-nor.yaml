document: rfc-8381
kind: security-consideration
summary: Neither the Vendor-Specific RBridge Channel Protocol nor the basic RBridge Channel Protocol provides any security assurances or features. Any needed security must be provided by fields or processing within the Vendor-Protocol-Specific Data, or by nesting Vendor Channel use inside the RBridge Channel Header Extension Protocol (RFC 7978), which can provide some security services.
section: "5"
topics:
    - security
    - routing
