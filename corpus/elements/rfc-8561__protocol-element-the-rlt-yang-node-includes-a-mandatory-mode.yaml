document: rfc-8561
kind: protocol-element
summary: 'The RLT YANG node includes a mandatory ''mode'' leaf (identityref based on rlt-mode) expressing the X+Y configuration: X bonded carrier terminations plus Y protecting carrier terminations. Defined modes include one-plus-zero, one-plus-one, and two-plus-zero.'
