document: rfc-6597
kind: normative-requirement
summary: Senders MUST set the RTP header marker bit (M) to '1' for any RTP packet that contains the final byte of a KLVunit. For all other packets, senders MUST set the marker bit to '0'.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
