document: rfc-4023
kind: normative-requirement
summary: An IPsec-secured MPLS-in-IP or MPLS-in-GRE tunnel MUST provide authentication and integrity; implementations MUST support ESP with null encryption. ESP with encryption MAY be supported for confidentiality. The tunnel tail MUST verify the source IP address on a given SA.
section: "8.1"
rfc2119_level: MUST
topics:
    - mpls
    - security
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
