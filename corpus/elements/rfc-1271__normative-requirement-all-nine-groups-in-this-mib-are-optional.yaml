document: rfc-1271
kind: normative-requirement
summary: All nine groups in this MIB are optional. If a remote monitoring device implements a group, it must implement all objects in that group. Implementations must also implement the system and interfaces groups of MIB-II.
section: "4.3"
rfc2119_level: MUST
