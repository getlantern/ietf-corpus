document: rfc-5070
kind: interoperability-note
summary: Several IODEF classes (Assessment, Impact, Node, Address, Service, Confidence) were derived from the Intrusion Detection Message Exchange Format (IDMEF), facilitating reuse of IDMEF-based tooling. The IODEF was designed to be complementary to other security data representations being standardized at the time.
section: "1.3"
