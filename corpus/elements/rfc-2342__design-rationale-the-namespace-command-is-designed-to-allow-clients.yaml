document: rfc-2342
kind: design-rationale
summary: The NAMESPACE command is designed to allow clients to automatically create personal mailboxes (e.g., 'Sent Mail', 'Drafts') by discovering the correct namespace prefix, eliminating the need for users to manually configure prefix values when mixing IMAP4 clients and servers.
section: "3"
