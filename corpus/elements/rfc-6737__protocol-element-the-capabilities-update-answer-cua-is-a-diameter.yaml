kind: protocol-element
summary: The Capabilities-Update-Answer (CUA) is a Diameter command with Command Code 328 and the 'R' bit cleared, sent in response to a CUR. It carries Origin-Host, Origin-Realm, a mandatory Result-Code AVP, and an optional Error-Message AVP.
