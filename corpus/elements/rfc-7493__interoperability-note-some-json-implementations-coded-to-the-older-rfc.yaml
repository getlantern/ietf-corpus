document: rfc-7493
kind: interoperability-note
summary: Some JSON implementations coded to the older RFC 4627 specification only accept JSON objects or arrays at the top level. Protocol designers should avoid top-level scalars to maintain compatibility with these implementations.
section: "4.1"
topics:
