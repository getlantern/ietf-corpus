document: rfc-1662
kind: normative-requirement
summary: The 'shared zero mode' Flag Sequence '011111101111110' SHOULD NOT be used for bit-stuffed framing. When unavoidable, an implementation MUST ensure that the first detected Flag Sequence is promptly communicated to the link layer.
section: "5.1"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
