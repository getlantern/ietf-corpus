document: rfc-3265
kind: protocol-element
summary: The '202 Accepted' response to SUBSCRIBE indicates the request was understood but authorization may not yet be granted, allowing notifiers to mask authorization policy. The '489 Bad Event' response indicates the event package in the 'Event' header is not understood.
