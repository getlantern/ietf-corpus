document: rfc-2370
kind: security-consideration
summary: Database overflow risk is heightened by Opaque LSAs introducing new advertisement types. Routers with limited resources can be accommodated by configuring OSPF stub areas and NSSAs; RFC 1765 describes handling unanticipated database overflows.
