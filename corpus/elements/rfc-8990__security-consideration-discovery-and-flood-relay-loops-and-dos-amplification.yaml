document: rfc-8990
kind: security-consideration
summary: 'Discovery and flood relay loops and DoS amplification are mitigated by: decrementing loop counts and dropping at zero; caching and rejecting duplicate Session ID + initiator pairs; and rate-limiting relay output to a small multiple of the observed normal traffic rate.'
