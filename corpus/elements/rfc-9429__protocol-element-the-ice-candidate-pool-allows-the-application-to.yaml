document: rfc-9429
kind: protocol-element
summary: The ICE candidate pool allows the application to pre-gather candidates for a specified number of ICE components before setLocalDescription is called. The pool is only used for the first offer/answer exchange and is emptied thereafter; pre-gathering consumes STUN/TURN server resources for potentially long periods.
section: 3.5.4
topics:
    - webrtc
    - realtime
