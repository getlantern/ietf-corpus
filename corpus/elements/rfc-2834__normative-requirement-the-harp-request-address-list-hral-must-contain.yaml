document: rfc-2834
kind: normative-requirement
summary: The HARP Request Address List (HRAL) MUST contain at least two HIPPI hardware addresses identifying HARP services. All HARP clients MUST be configured identically with the same HRAL. The first REQUIRED entry is the broadcast address (0x07000FE1, FF:FF:FF:FF:FF:FF) and the second REQUIRED entry is the official HARP server address (0x07000FE0, 00:00:00:00:00:00).
section: "4.2"
rfc2119_level: REQUIRED
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
