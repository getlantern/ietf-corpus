document: rfc-5139
kind: design-rationale
summary: Street numbering (HNO element) applies to the most specific road element specified — the first from RDSUBBR, RDBR, RDSEC, or RD — because sections can have repeated street numbers, so the section must be identified to uniquely locate an address.
