document: rfc-7469
kind: protocol-element
summary: The OPTIONAL includeSubDomains directive, when asserted, extends the Pinning Policy to all subdomains of the host's domain name. The OPTIONAL report-uri directive specifies a URI to which the UA SHOULD POST Pin Validation failure reports as a JSON object.
section: 2.1.3
topics:
