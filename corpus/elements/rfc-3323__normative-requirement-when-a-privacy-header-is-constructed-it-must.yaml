document: rfc-3323
kind: normative-requirement
summary: When a Privacy header is constructed, it MUST consist of either the value 'none', or one or more of the values 'user', 'header', and 'session' (each appearing at most once), which MAY in turn be followed by the 'critical' indicator. User agents MUST NOT populate any other priv-values in a Privacy header that contains a value of 'none'.
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
