document: rfc-5080
kind: normative-requirement
summary: RADIUS clients SHOULD incorporate jitter (uniform random factor between -0.1 and +0.1) and congestive backoff into their retransmission algorithm. The recommended defaults are IRT=2s, MRC=5, MRT=16s, MRD=30s. MRD MUST be set and SHOULD be between 5 and 30 seconds.
section: 2.2.1
rfc2119_level: MUST
topics:
    - radius
