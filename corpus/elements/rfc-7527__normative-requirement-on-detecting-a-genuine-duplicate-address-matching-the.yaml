document: rfc-7527
kind: normative-requirement
summary: On detecting a genuine duplicate address matching the tentative or optimistic address of a trusted access concentrator's interface, the access concentrator SHOULD log a system management message, drop the received ND message, and block the modem on whose Layer 2 service identifier the duplicate NS(DAD) or NA message was received.
section: "5"
rfc2119_level: SHOULD
topics:
    - ip
    - security
