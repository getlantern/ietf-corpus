document: rfc-5187
kind: normative-requirement
summary: The OSPFv3 Interface ID MUST be preserved by the restarting router across restarts, because changes in the Interface ID during graceful restart will cause a mismatch between pre-restart LSAs and neighbor adjacency state, terminating the graceful restart prematurely.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
