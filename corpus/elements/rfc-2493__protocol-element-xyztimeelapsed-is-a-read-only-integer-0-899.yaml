document: rfc-2493
kind: protocol-element
summary: xyzTimeElapsed is a read-only INTEGER (0..899) indicating the number of seconds elapsed since the beginning of the current 15-minute measurement period. If the current interval exceeds the maximum due to clock adjustments, the agent returns the maximum value of 899.
