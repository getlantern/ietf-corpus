document: rfc-8951
kind: normative-requirement
summary: If the CA requires a particular cryptographic algorithm or signature scheme, it MUST provide that information in the CSR Attributes Response. If an EST server requires linking of identity and POP information, it MUST include the challengePassword OID (1.2.840.113549.1.9.7) in the CSR Attributes Response.
