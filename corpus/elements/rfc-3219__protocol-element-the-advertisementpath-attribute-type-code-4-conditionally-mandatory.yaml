document: rfc-3219
kind: protocol-element
summary: The AdvertisementPath attribute (Type Code 4, conditionally mandatory with ReachableRoutes/WithdrawnRoutes) records all ITADs through which an advertisement has passed, using AP_SEQUENCE (ordered, 1-octet type, 1-octet count, 4-octet ITAD entries) and AP_SET (unordered) segment types. Analogous to BGP AS_PATH.
section: "5.4"
topics:
