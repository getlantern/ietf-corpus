document: rfc-5537
kind: normative-requirement
summary: Transports for Netnews articles MUST treat articles as uninterpreted sequences of octets, excluding NUL (%d00, which MUST NOT occur), and CR (%d13) and LF (%d10) MUST only appear as a CR+LF pair denoting a line separator.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
