document: rfc-4236
kind: normative-requirement
summary: An OPES processor removing transfer encodings MUST remove the Transfer-Encoding header before sending the header part to the callout service, and MUST send a correct Transfer-Encoding header to the next HTTP recipient regardless of what the callout server returned.
section: "3.7"
rfc2119_level: MUST
topics:
    - http
