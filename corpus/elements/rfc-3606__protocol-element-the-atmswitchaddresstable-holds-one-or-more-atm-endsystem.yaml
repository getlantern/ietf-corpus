document: rfc-3606
kind: protocol-element
summary: The atmSwitchAddressTable holds one or more ATM endsystem addresses per switch used to identify the switch itself. When no ILMI network prefixes are configured for certain interfaces, network prefixes derived from these switch addresses may be used for ILMI address registration.
section: 3.1.16
