document: rfc-5814
kind: security-consideration
summary: Passive monitoring implementations that expose performance data to other applications (e.g., via SNMP) must use authentication to prevent unauthorized reads and modifications; SNMPv3 with full cryptographic mechanisms is RECOMMENDED. Rate limiting on performance queries is also desirable to prevent overwhelming the data store.
section: "16"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - measurement
    - security
    - snmp
