document: rfc-1647
kind: normative-requirement
summary: The FUNCTIONS IS command sent in acceptance must contain a function-list that exactly matches the list received in the preceding FUNCTIONS REQUEST command. To avoid infinite loops, neither party should re-add a function it previously proposed and the other side removed.
section: 7.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
