document: rfc-2822
kind: interoperability-note
summary: Single-character military time zones (A–Z) from RFC 822 were defined incorrectly and are therefore unpredictable. They SHOULD all be treated as equivalent to '-0000' (unknown local time) unless out-of-band information confirms their meaning.
section: "4.3"
topics:
