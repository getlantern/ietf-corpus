document: rfc-7552
kind: interoperability-note
summary: Legacy RFC 5036-compliant IPv4-only LSRs may abort processing an entire Label Mapping message if it contains IPv6 FEC-labels, discarding even valid IPv4 FEC-labels. The Dual-Stack capability TLV detection mechanism in Section 7 prevents IPv6 bindings from being sent to such peers, enabling incremental LDPv6 deployment in existing networks.
section: A.1
topics:
    - mpls
    - ip
    - v6ops
