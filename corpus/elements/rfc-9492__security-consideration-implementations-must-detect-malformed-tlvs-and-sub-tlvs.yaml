document: rfc-9492
kind: security-consideration
summary: Implementations must detect malformed TLVs and sub-TLVs and ensure they do not facilitate vulnerabilities. Reception of a malformed TLV SHOULD be counted and/or logged, and such logging SHOULD be rate-limited to prevent denial-of-service attacks from overloading the OSPF control plane.
section: "13"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
