document: rfc-3263
kind: normative-requirement
summary: DNS lookup procedures MUST be performed exactly once per transaction. Once a SIP server has been successfully contacted, all retransmissions of the request and ACK for non-2xx responses to INVITE MUST be sent to the same host.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - dns
