document: rfc-2207
kind: normative-requirement
summary: When the GPI FILTER_SPEC is used, each node must create a data classifier for the flow described by the quadruple (DestAddress, protocol ID, SrcAddress, GPI). The GPI must be extracted from transport header offset +4 for AH, and offset +0 for ESP.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
