document: rfc-6160
kind: normative-requirement
summary: When key agreement is used, the same key-wrap algorithm MUST be used for both key and content encryption. AES-128 content encryption requires AES-128 key-wrap; AES-256 content encryption requires AES-256 key-wrap.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - security
