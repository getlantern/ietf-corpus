document: rfc-6729
kind: protocol-element
summary: The 'state' clause is a new optional extension to the Received header field (defined in SMTP RFC 5321 Section 4.4) that indicates the nature of additional handling imposed on a message. It is followed by a single keyword identifying the queue or processing state entered.
