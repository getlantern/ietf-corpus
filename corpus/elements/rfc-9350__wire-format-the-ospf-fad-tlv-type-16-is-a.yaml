document: rfc-9350
kind: wire-format
summary: The OSPF FAD TLV (Type 16) is a top-level TLV of the Router Information (RI) LSA. Its fixed portion encodes Flex-Algorithm (1 octet), Metric-Type (1 octet), Calc-Type (1 octet), and Priority (1 octet), followed by optional sub-TLVs. Area-scoped flooding is REQUIRED; AS-scoped flooding SHOULD NOT be used unless local policy requires domain-wide advertisement.
section: "5.2"
topics:
    - routing
