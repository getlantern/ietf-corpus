document: rfc-8049
kind: normative-requirement
summary: When a Hub site and a Spoke site must be meshed on the same PE, the management system MUST place them in different VRFs. The management system MUST take into account all constraints on Hub-and-Spoke connections in both the Hub-and-Spoke and Hub-and-Spoke Disjoint topologies.
section: 6.2.1.3
rfc2119_level: MUST
topics:
