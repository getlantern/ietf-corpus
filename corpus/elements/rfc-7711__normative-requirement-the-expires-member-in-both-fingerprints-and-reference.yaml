document: rfc-7711
kind: normative-requirement
summary: The 'expires' member in both fingerprints and reference documents MUST be a non-negative integer. If the 'expires' value is 0, the POSH client MUST consider the verification material (or delegation) to be invalid.
section: "3.1"
rfc2119_level: MUST
