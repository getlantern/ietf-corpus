document: rfc-1655
kind: design-rationale
summary: When using BGP over Switched Virtual Circuits (SVCs), periodic KEEPALIVE messages may be undesirable because they keep SVCs permanently open. BGP supports SVC operation by allowing zero Hold Time in the OPEN message, eliminating periodic KEEPALIVEs and relying on the circuit manager and TCP instead.
section: "9"
topics:
