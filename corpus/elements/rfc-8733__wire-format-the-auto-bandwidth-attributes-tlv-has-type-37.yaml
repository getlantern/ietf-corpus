document: rfc-8733
kind: wire-format
summary: The AUTO-BANDWIDTH-ATTRIBUTES TLV has Type=37 and a variable Length field; its value consists of one or more sub-TLVs. It is carried in the LSPA object within PCInitiate, PCUpd, and PCRpt messages. Absence of this TLV indicates the speaker wishes to disable the auto-bandwidth feature.
section: "5.2"
topics:
    - mpls
