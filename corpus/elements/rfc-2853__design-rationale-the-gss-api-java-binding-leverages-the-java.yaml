document: rfc-2853
kind: design-rationale
summary: The GSS-API Java binding leverages the Java Cryptography Architecture (JCA) provider model to support pluggable security mechanisms. Providers can be added system-wide or per-instance of GSSManager, enabling applications to use Kerberos v5, SPKM, or other mechanisms without code changes. The SPI specification for provider discovery is deferred and not mandatory for adoption.
section: "4.2"
topics:
    - crypto
