document: rfc-7470
kind: normative-requirement
summary: If the Enterprise Number in a Vendor Information TLV is unknown to the PCE, it MUST treat the TLV as an unknown TLV and handle it as described in RFC 5440, which requires unrecognized TLVs to be ignored.
section: "3"
rfc2119_level: MUST
topics:
    - routing
