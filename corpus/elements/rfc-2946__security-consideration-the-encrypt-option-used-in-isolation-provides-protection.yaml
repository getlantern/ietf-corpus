document: rfc-2946
kind: security-consideration
summary: The ENCRYPT option used in isolation provides protection only against passive attacks (eavesdropping), not active attacks. An attacker able to modify packets in flight could prevent the ENCRYPT option from being negotiated at all.
section: "6"
topics:
