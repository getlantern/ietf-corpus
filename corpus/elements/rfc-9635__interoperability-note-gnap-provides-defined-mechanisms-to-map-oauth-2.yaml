document: rfc-9635
kind: interoperability-note
summary: GNAP provides defined mechanisms to map OAuth 2.0 concepts such as scopes and client IDs into GNAP constructs (Appendix B.5 and Appendix A). This allows deployments to support both protocols in parallel and facilitates migration from existing OAuth 2.0 systems to GNAP.
section: Appendix A
