document: rfc-9632
kind: normative-requirement
summary: The same digest algorithm MUST be used for both calculating the message digest of the geofeed file content and for calculating the message digest on the SignerInfo SignedAttributes; the algorithm identifier MUST appear in both CMS SignedData DigestAlgorithmIdentifiers and SignerInfo DigestAlgorithmIdentifier.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - pkix
