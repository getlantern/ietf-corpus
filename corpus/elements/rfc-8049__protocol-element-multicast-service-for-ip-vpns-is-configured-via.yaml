document: rfc-8049
kind: protocol-element
summary: Multicast service for IP VPNs is configured via the 'multicast' container. Parameters include customer tree flavors (bidirectional, shared, source-based), RP-to-group mappings with provider-managed or customer-managed RP options (redundancy, optimal-traffic-delivery), and RP discovery mechanism (auto-rp, static-rp default, or bsr-rp).
