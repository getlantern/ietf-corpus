document: rfc-9935
kind: design-rationale
summary: 'The CHOICE of three private key formats (seed, expandedKey, both) provides interoperability: some implementations want to retain only the compact 64-byte seed while others only support the expanded format. The ''both'' format bridges these without forcing a single representation.'
