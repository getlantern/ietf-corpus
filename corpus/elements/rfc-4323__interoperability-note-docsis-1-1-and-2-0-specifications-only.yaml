document: rfc-4323
kind: interoperability-note
summary: DOCSIS 1.1 and 2.0 specifications only require CMs to process IPv4 customer traffic; this MIB design reflects that constraint. Future versions of DOCSIS are expected to require IPv6 support, which would require MIB updates.
