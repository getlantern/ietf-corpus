document: rfc-9554
kind: normative-requirement
summary: When PHONETIC value is 'script' (unknown phonetic system), the SCRIPT parameter MUST also be set. The LANGUAGE parameter SHOULD NOT contain a script subtag; any such subtag MUST be ignored in favor of the SCRIPT parameter.
section: "4.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
