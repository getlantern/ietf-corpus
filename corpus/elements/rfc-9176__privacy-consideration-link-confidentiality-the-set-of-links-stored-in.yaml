document: rfc-9176
kind: privacy-consideration
summary: 'Link confidentiality: the set of links stored in the RD may reveal sensitive information about devices and their capabilities. The RD SHOULD enforce access control on lookup so that only authorized clients can discover registered resources. Segmentation via sectors is one mechanism.'
section: "7.3"
topics:
    - privacy
    - security
