document: rfc-5568
kind: normative-requirement
summary: When the source IP address of the FBU is PCoA (FBU sent from PAR's link), the HI message MUST have Code 0. When the source IP address is not PCoA (FBU from NAR's link), the HI message MUST have Code 1.
section: "4"
rfc2119_level: MUST
topics:
