document: rfc-9678
kind: normative-requirement
summary: AT_KDF_FS and AT_PUB_ECDHE MUST NOT be added to EAP-Request/AKA'-Identity, EAP-Response/AKA'-Identity, EAP-Response/AKA'-Synchronization-Failure, EAP-Response/AKA'-Authentication-Reject, or EAP-Response/AKA'-Client-Error messages. Any appearance of these attributes in those messages MUST be ignored.
