document: rfc-2678
kind: design-rationale
summary: Two different packet types (P1 and P2) are allowed in the forward and reverse directions of Type-P1-P2-Interval-Temporal-Connectivity because many applications use different packet types for forward and reverse traffic (e.g., TCP SYN vs. SYN-ACK), making this a more realistic model of application-level connectivity.
