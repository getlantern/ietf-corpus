document: rfc-5604
kind: normative-requirement
summary: If the configured jitter buffer depth (pwTDMCfgJtrBfrDepth) is not supported by the implementation, the agent MUST return an error code 'jtrBfrDepth' in pwTDMConfigError. The actual jitter buffer size SHOULD be at least twice the configured value.
section: "8"
rfc2119_level: MUST
topics:
    - snmp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
