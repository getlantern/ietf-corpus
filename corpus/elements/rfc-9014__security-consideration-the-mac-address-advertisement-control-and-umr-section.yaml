document: rfc-9014
kind: security-consideration
summary: The MAC-address advertisement control and UMR (Section 3.5.1) protect DC NVEs from being overwhelmed with excessive MAC/IP routes learned on GWs from the WAN. The ARP/ND flooding control (Section 3.5.2) can reduce or suppress broadcast storms injected from the WAN into the DC.
section: "5"
