document: rfc-3896
kind: interoperability-note
summary: The DS3 Fractional Table (dsx3FracTable) has been deprecated since RFC 2496. Implementors must use ifStackTable combined with channelization objects (dsx3Channelization, dsx1ChanMappingTable, dsx0ChanMappingTable) to represent DS3-to-DS1-to-DS0 and DS3-to-DS2-to-DS1 channelization hierarchies.
section: 2.2.2
topics:
