summary: IANA maintains the IDNA Context Registry of approved contextual rules for all CONTEXTO and CONTEXTJ code points. Each entry includes the code point, a plain-English overview, whether the rule applies at lookup time, and a pseudo-code rule set. Additions or changes require IETF Review.
