document: rfc-6749
kind: interoperability-note
summary: As a highly extensible framework with many optional components and several undefined required components (e.g., client registration, endpoint discovery, authorization server capabilities), OAuth 2.0 on its own is likely to produce non-interoperable implementations without additional profiles.
section: "1.8"
topics:
    - oauth
