document: rfc-6021
kind: protocol-element
summary: The timeticks type (uint32) represents time modulo 2^32 in hundredths of a second between two epochs. The timestamp type derives from timeticks and records the timeticks value at which a specific occurrence happened; it resets to zero when the associated timeticks attribute wraps (after ~497 days).
