document: rfc-1294
kind: design-rationale
summary: 'The 802.6 Common PDU Header and Trailer are carried in bridged 802.6 frames to enable pipelining: the egress bridge can extract the BAsize length field and begin transmitting the 802.6 PDU before the complete frame is received, rather than buffering the whole frame to compute the length.'
section: "7.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
