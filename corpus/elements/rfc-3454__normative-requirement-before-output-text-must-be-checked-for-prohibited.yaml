document: rfc-3454
kind: normative-requirement
summary: Before output, text MUST be checked for prohibited code points. If any prohibited code point is found, only an error is returned; the process never emits both an error and a string. Implementations MUST map based on the tables in Appendix C, not the prose descriptions.
section: "5"
rfc2119_level: MUST
topics:
