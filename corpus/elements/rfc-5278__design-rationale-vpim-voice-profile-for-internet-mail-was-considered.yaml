document: rfc-5278
kind: design-rationale
summary: VPIM (Voice Profile for Internet Mail) was considered but rejected because it supports only non-real-time, non-session-based routing of already-deposited messages between domains. The vmsg Enumservice was created specifically to enable real-time interaction with voice and video messaging systems.
section: "1"
topics:
    - voip
    - sip
    - realtime
