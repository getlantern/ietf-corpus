document: rfc-5438
kind: normative-requirement
summary: If IMDN-Record-Route header fields appear in the IM, the IM Recipient constructing the IMDN MUST copy the contents into IMDN-Route header fields and maintain their order. If there is no IMDN-Record-Route header field, the IM Recipient MUST send the IMDN to the URI in the From header field.
section: 7.2.1
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
