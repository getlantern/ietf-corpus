document: rfc-5740
kind: protocol-element
summary: The NORM Positive Acknowledgment Procedure allows a sender to request explicit acknowledgment of reliable receipt from a specific subset of receivers using NORM_CMD(FLUSH) or NORM_CMD(ACK_REQ). The sender uses an ACK list and timeout/retry mechanism until all listed receivers respond with NORM_ACK or the process times out.
section: 5.5.3
topics:
    - multicast
