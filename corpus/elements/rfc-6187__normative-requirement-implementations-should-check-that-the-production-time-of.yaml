document: rfc-6187
kind: normative-requirement
summary: Implementations SHOULD check that the production time of an OCSP response is acceptable. It is RECOMMENDED (but not REQUIRED) that implementations reject certificates whose status is revoked. If OCSP is indicated but no response is available, the certificate is RECOMMENDED to be rejected.
section: "2.1"
rfc2119_level: RECOMMENDED
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
