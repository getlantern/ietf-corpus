document: rfc-8909
kind: protocol-element
summary: The <deletes> element lists objects deleted since the prior deposit; it is present in Differential and Incremental Deposits and MUST NOT appear in Full Deposits. The <contents> element carries objects added or modified (or all objects in a Full Deposit).
section: 5.1.3
topics:
    - registry
