document: rfc-7493
kind: normative-requirement
summary: Timestamp and duration data items in I-JSON protocols are RECOMMENDED to be expressed as string values in ISO 8601 / RFC 3339 format, using uppercase letters, including the timezone, and including optional trailing seconds even when '00'.
section: "4.3"
rfc2119_level: RECOMMENDED
topics:
    - json
