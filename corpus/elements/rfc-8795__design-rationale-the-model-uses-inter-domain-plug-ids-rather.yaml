document: rfc-8795
kind: design-rationale
summary: The model uses inter-domain plug IDs (rather than remote node ID/link ID) as the preferred option for identifying neighboring domains and resolving inter-domain TE links. This is more flexible because providers may not know the respective remote node IDs/link IDs, and it allows clients to mix and match multiple topologies from the same providers.
section: "4.3"
topics:
    - yang
    - netconf
