document: rfc-8668
kind: wire-format
summary: 'The L2 Bundle Member LAN Adjacency SID Sub-TLV (Type 42) wire format: Type (1 octet) = 42, Length (1 octet, variable), Neighbor System ID (6 octets), Flags (1 octet: F|*|V|L|S|P|rr), Weight (1 octet), followed by one SID/Index/Label per bundle member — 3-octet local label when V- and L-Flags are SET, or 4-octet index when V- and L-Flags are unset.'
section: "4.2"
