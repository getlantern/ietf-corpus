document: rfc-1542
kind: normative-requirement
summary: A BOOTP client MUST set the 'giaddr' field to zero (0.0.0.0) in all BOOTREQUEST messages it generates. A client MUST NOT interpret the 'giaddr' field of a BOOTREPLY as the IP address of an IP router, and SHOULD completely ignore it.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
