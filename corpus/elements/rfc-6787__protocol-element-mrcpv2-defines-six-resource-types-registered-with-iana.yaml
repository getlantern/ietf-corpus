document: rfc-6787
kind: protocol-element
summary: 'MRCPv2 defines six resource types registered with IANA: speechrecog (Speech Recognizer), dtmfrecog (DTMF Recognizer), speechsynth (Speech Synthesizer), basicsynth (Basic Synthesizer), speakverify (Speaker Verification), and recorder (Speech Recorder). The resource type follows ''@'' in the channel identifier.'
section: "4.2"
topics:
