document: rfc-9509
kind: interoperability-note
summary: The NF-EKU ASN.1 module (id-mod-nf-eku, OID arc 1.3.6.1.5.5.7.0 decimal 108) is defined using IMPLICIT TAGS and follows ITU-T X.680 and X.690 (BER/CER/DER encoding rules). Implementers must use this module to ensure consistent OID assignment and encoding across 5G NF certificate implementations.
