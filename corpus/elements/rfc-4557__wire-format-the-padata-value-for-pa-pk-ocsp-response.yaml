document: rfc-4557
kind: wire-format
summary: The padata-value for PA-PK-OCSP-RESPONSE is the DER encoding of PKOcspData, defined as SEQUENCE OF OcspResponse, where each OcspResponse is an OCTET STRING containing a complete OCSP response as defined in RFC 2560.
