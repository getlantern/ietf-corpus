document: rfc-2110
kind: security-consideration
summary: HTML documents may contain executable content (JavaScript) or links to executable content (Java applets). It is exceedingly dangerous for a receiving UA to execute such content received through a mail message without careful restrictions on its capabilities.
section: "12"
topics:
