document: rfc-5109
kind: normative-requirement
summary: When generating the FEC payload, if the lengths of the protected RTP packets are not equal, each shorter packet MUST be padded to the length of the longest packet by appending octet 0 at the end.
section: "8.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
