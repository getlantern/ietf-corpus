document: rfc-7757
kind: normative-requirement
summary: Under intrinsic hairpinning, when the destination (or inner source for ICMP errors) was translated via RFC 6052 and is found in the EAMT, the implementation MUST immediately translate the packet back to IPv6 before forwarding, applying simple hairpinning rules during the second pass.
section: 4.2.2
rfc2119_level: MUST
topics:
