document: rfc-5066
kind: wire-format
summary: EfmProfileIndex is a Textual Convention defined as Unsigned32 (1..255), providing a unique identifier for each PME configuration profile. EfmProfileIndexOrZero extends this to Unsigned32 (0..255) where zero indicates unknown or no profile.
