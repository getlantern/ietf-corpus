document: rfc-2935
kind: security-consideration
summary: Security of IOTP messages depends primarily on digital signatures within IOTP as described in RFC 2801 and RFC 2802. Confidentiality protection requires a separate secure channel such as SSL/TLS (RFC 2246). Security of payment protocols transported by IOTP is the responsibility of those payment protocols, not of IOTP.
section: "6"
topics:
    - security
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
