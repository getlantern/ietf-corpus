document: rfc-2206
kind: normative-requirement
summary: rsvpIfUdpRequired, when TRUE, forces UDP encapsulation on the interface via manual configuration. When FALSE, UDP encapsulation is used only if rsvpIfUdpNbrs is non-zero (i.e., there are neighbors using UDP encapsulation).
section: "3.5"
rfc2119_level: SHOULD
topics:
    - snmp
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
