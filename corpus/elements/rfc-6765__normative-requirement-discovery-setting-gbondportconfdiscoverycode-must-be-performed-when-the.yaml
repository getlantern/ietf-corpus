document: rfc-6765
kind: normative-requirement
summary: Discovery (setting gBondPortConfDiscoveryCode) MUST be performed when the link is administratively 'down'; changes MUST be rejected with inconsistentValue when 'up' or initializing. The discovery code MUST be instantiated for -O subtype GBS before BCE write operations on gBondBceConfRemoteDiscoveryCode are performed.
section: "6"
rfc2119_level: MUST
topics:
