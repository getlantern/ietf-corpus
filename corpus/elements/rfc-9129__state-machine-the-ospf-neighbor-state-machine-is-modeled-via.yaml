document: rfc-9129
kind: state-machine
summary: 'The OSPF neighbor state machine is modeled via the ''nbr-state-type'' enumeration with states: down (1), attempt (2), init (3), 2-way (4), exstart (5), exchange (6), loading (7), full (8). Transitions are driven by Hello receipt, Database Description exchange, and LSA flooding completion per RFC 2328.'
