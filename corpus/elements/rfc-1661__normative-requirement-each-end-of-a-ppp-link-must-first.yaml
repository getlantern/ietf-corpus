document: rfc-1661
kind: normative-requirement
summary: Each end of a PPP link MUST first send LCP packets to configure and test the data link before any network-layer protocol traffic. After LCP reaches Opened state, PPP MUST send NCP packets to configure each desired network-layer protocol.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
