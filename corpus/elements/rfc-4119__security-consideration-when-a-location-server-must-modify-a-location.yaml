document: rfc-4119
kind: security-consideration
summary: 'When a Location Server must modify a Location Object (e.g., to coarsen location before forwarding), end-to-end S/MIME encryption must be relaxed: the Generator MAY encrypt with a key decryptable by the Location Server, which then re-signs and re-encrypts for the Recipient. This is a necessary exception to the end-to-end model.'
section: "4"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
