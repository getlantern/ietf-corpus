document: rfc-9050
kind: normative-requirement
summary: For PCC-based label allocation (C bit set), the PCC MUST try to allocate the label and MUST report to the PCE via a PCRpt or PCErr message. If the PCC wishes to withdraw or modify a previously assigned label, it MUST send a PCRpt message.
section: 5.5.8
rfc2119_level: MUST
topics:
    - routing
    - mpls
