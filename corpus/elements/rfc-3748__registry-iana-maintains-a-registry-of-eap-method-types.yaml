document: rfc-3748
kind: registry
summary: IANA maintains a registry of EAP Method Types. Types 1–6 and 254–255 are defined by RFC 3748. Types 1–191 require IETF consensus; Types 192–253 are available for vendor-specific allocation by IANA; Type 254 is Expanded Types; Type 255 is Experimental use.
section: "6.2"
