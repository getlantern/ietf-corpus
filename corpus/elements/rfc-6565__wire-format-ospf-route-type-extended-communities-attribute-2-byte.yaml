summary: 'OSPF Route Type Extended Communities Attribute: 2-byte type field (0x0306), 4-byte Area Number, 1-byte Route Type, and 1-byte Options. The Options E-bit (bit 1) indicates Type-2 external metric when set; clear means Type-1. This attribute MUST be present.'
