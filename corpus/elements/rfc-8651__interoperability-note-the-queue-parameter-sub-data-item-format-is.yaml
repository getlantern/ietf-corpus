document: rfc-8651
kind: interoperability-note
summary: The Queue Parameter Sub-Data Item format is patterned after the standard DLEP Data Item format (RFC 8175, Section 11.3), and Sub-Data Item Type values are scoped within the parent Queue Parameters Data Item Type to avoid collisions with other DLEP extensions.
