document: rfc-5838
kind: interoperability-note
summary: All protocol modifications in this specification apply only to non-IPv6-unicast AFs using multiple OSPFv3 instances and are not applicable to IPv6 unicast topologies. Non-capable routers operating in an IPv6 unicast topology are unaffected. Gradual deployment of new AFs does not disturb existing OSPFv3 routing domains because non-capable routers will not form adjacencies in non-IPv6-unicast instances (no AF-bit set in their Hello Options).
section: "3"
topics:
    - routing
