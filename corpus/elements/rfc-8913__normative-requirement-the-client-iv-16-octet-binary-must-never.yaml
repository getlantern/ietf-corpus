document: rfc-8913
kind: normative-requirement
summary: The Client-IV (16-octet binary) MUST never be repeated for different sessions using the same secret key. RFC 4656 recommends using a cryptographically secure pseudo-random number source to generate it without cumbersome state.
section: "5.2"
rfc2119_level: MUST
