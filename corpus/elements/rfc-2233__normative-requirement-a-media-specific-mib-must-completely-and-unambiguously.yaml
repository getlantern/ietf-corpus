document: rfc-2233
kind: normative-requirement
summary: A media-specific MIB MUST completely and unambiguously specify the layering model used, including each sub-layer, the ifStackTable portrayal of sub-layer relationships, whether virtual circuits are assigned ifTable entries, and the applicability of ifRcvAddressTable. It MUST NOT change semantics, DESCRIPTION, or applicability where the interfaces MIB is already specific.
section: "4"
rfc2119_level: MUST
topics:
