document: rfc-3207
kind: normative-requirement
summary: A client MUST NOT attempt to start a TLS session if a TLS session is already active. A server MUST NOT return the STARTTLS extension in response to an EHLO command received after a TLS handshake has completed.
section: "4.2"
rfc2119_level: MUST NOT
