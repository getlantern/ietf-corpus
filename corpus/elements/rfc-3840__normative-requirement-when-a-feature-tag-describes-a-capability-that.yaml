document: rfc-3840
kind: normative-requirement
summary: When a feature tag describes a capability that can also be represented with a SIP header field (e.g., Allow and sip.methods, Accept and type, Accept-Language and language, Allow-Events and sip.events), a UA MUST use the header field. A UA receiving a message with both MUST use the header field, not the feature tag.
section: "7"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
