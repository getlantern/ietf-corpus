document: rfc-9480
kind: normative-requirement
summary: Each CMP server supporting HTTP or HTTPS MUST support the path prefix '/.well-known/' with the registered name 'cmp' to ease interworking in multi-vendor environments. The URI structure supports optional /p/<name> and /<operation> path segments.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
    - pkix
    - security
