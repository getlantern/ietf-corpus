document: rfc-9929
kind: normative-requirement
summary: For IS-IS UPA propagation across levels, the normal requirement that a prefix be reachable in the source level before propagation MUST NOT be applied, because UPAs propagate unreachability. The original metric value MUST be preserved, and the cost to reach the UPA originator MUST NOT be added when readvertising.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
