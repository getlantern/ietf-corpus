document: rfc-5357
kind: normative-requirement
summary: The Number of Scheduled Slots and Number of Packets fields in Request-TW-Session MUST be set to 0 because the Session-Reflector does not process incoming test packets for performance metrics and does not need to know the packet count or timing schedule.
section: "3.5"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
