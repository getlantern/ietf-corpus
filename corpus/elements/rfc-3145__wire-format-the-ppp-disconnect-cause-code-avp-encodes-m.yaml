summary: 'The PPP Disconnect Cause Code AVP encodes: M/H bits (1 bit each), 4-bit reserved, 10-bit Length (minimum 11 octets), 2-octet Vendor ID (0), 2-octet Attribute Type (46), 2-octet Disconnect Code, 2-octet Control Protocol Number, 1-octet Direction, and optional UTF-8 descriptive text in remaining octets.'
