document: rfc-2284
kind: wire-format
summary: 'The base EAP packet format contains: Code (1 octet, identifies packet type), Identifier (1 octet, matches requests to responses), Length (2 octets, total packet length including Code/Identifier/Length/Data), and Data (variable). Octets outside the Length range are treated as Data Link Layer padding and ignored.'
section: "2.2"
topics:
    - security
