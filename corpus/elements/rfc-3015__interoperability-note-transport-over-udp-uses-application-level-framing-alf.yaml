document: rfc-3015
kind: interoperability-note
summary: Transport over UDP uses Application Level Framing (ALF) with at-most-once delivery semantics enforced by transaction identifiers and a three-way handshake. Retransmission timers are computed adaptively. Transport over TCP provides ordering and reliability natively, with different provisional-response and retransmission considerations (Annex D).
section: Annex D
topics:
    - realtime
    - udp
    - tcp
