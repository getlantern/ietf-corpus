document: rfc-9399
kind: normative-requirement
summary: Implementations that support audio MUST support MP3 (audio/mpeg). Implementations SHOULD support text-based audio (text/plain;charset=UTF-8) for text-to-speech. When text-based audio is used, LogotypeAudioInfo MUST be present with language specified, and fileSize, playTime, and channels MUST be 0 with sampleRate absent.
section: "8"
rfc2119_level: MUST
topics:
    - pkix
