document: rfc-7158
kind: interoperability-note
summary: String comparison implementations should transform strings into sequences of Unicode code units and compare numerically, code unit by code unit. Comparing strings with escaped characters unconverted may incorrectly find that 'a\\b' and 'a\u005Cb' are unequal.
section: "8.3"
topics:
    - json
