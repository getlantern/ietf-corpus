document: rfc-2021
kind: normative-requirement
summary: If a remote monitoring device implements a group, it must implement all objects in that group. For example, an agent implementing the network layer matrix group must implement both nlMatrixSDTable and nlMatrixDSTable.
section: "2.2"
rfc2119_level: MUST
