document: rfc-7564
kind: interoperability-note
summary: Changes to Unicode code point properties between versions can alter derived property values, potentially causing different behavior across implementations running different Unicode versions. Implementers should be aware that treatment of certain characters may differ between Unicode 5.2, 7.0, and future versions.
section: "13.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
