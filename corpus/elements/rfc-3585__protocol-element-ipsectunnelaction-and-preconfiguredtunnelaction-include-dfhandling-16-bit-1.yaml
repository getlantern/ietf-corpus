document: rfc-3585
kind: protocol-element
summary: 'IPsecTunnelAction and PreconfiguredTunnelAction include DFHandling (16-bit): 1=copy DF bit from inner IP header to outer, 2=force outer DF=1, 3=clear outer DF=0. This controls fragmentation behavior for IPsec tunnel-mode encapsulation.'
section: "6.13"
topics:
