document: rfc-2058
kind: normative-requirement
summary: A NAS MUST treat an unknown or unsupported Service-Type value in an Access-Accept as though an Access-Reject had been received instead. This prevents silent misconfiguration when new service types are introduced.
section: "5.6"
rfc2119_level: MUST
topics:
    - radius
    - security
