kind: protocol-element
summary: The rx-missed-pkts counter (yang:counter64, in iptfs-outer-pkt-stats) records outer IP-TFS packets detected as missing via a gap in the sequence number space, as distinct from rx-errored-pkts which counts packets that arrived but were dropped due to errors.
