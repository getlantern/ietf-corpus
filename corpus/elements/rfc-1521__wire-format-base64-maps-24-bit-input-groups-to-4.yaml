document: rfc-1521
kind: wire-format
summary: 'Base64 maps 24-bit input groups to 4 output characters drawn from a 65-character alphabet (A–Z, a–z, 0–9, ''+'', ''/'', ''=''). Output lines must be no more than 76 characters. Padding uses ''='': two ''='' for an 8-bit final quantum, one ''='' for a 16-bit final quantum. Characters outside the alphabet must be ignored by decoders.'
