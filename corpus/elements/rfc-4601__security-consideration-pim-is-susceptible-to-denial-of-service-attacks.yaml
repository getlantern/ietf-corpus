document: rfc-4601
kind: security-consideration
summary: 'PIM is susceptible to denial-of-service attacks: forged Join messages cause routers to maintain unnecessary multicast state and attract unwanted traffic; forged Prune messages suppress legitimate traffic. Without cryptographic authentication (e.g., IPsec), there is no protocol-level defense against these state-exhaustion attacks.'
section: "6.4"
topics:
    - multicast
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
