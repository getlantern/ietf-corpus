document: rfc-3922
kind: normative-requirement
summary: When a subscription request is approved, the XMPP-CPIM gateway MUST return a 'subscribed' presence stanza to the XMPP entity and notify it of the target's current available presence; thereafter the gateway MUST notify on every presence change until cancellation.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
