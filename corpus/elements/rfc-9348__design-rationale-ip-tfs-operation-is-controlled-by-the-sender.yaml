document: rfc-9348
kind: design-rationale
summary: IP-TFS operation is controlled by the sender independently per direction; both peers independently decide whether to use IP-TFS on their outbound SA. This is reflected in the model by providing separate per-direction counters that may be zero or idle when IP-TFS is used only one-way.
section: "2"
topics:
