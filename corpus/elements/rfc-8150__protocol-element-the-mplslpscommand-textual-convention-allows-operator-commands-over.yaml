document: rfc-8150
kind: protocol-element
summary: 'The MplsLpsCommand textual convention allows operator commands over a protection domain: noCmd(1), clear(2), lockoutOfProtection(3), forcedSwitch(4), manualSwitchToWork(5), manualSwitchToProtect(6), exercise(7), freeze(8), clearfreeze(9). The exercise, freeze, and clearfreeze commands are not applicable to PSC mode.'
section: "5.1"
