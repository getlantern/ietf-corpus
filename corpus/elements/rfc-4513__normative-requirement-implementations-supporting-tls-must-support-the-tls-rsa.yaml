document: rfc-4513
kind: normative-requirement
summary: Implementations supporting TLS MUST support the TLS_RSA_WITH_3DES_EDE_CBC_SHA ciphersuite and SHOULD support TLS_DHE_DSS_WITH_3DES_EDE_CBC_SHA to encourage interoperability with earlier LDAP StartTLS specifications.
section: "2"
rfc2119_level: MUST
