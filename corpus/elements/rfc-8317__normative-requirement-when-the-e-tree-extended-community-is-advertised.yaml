document: rfc-8317
kind: normative-requirement
summary: When the E-Tree extended community is advertised with an EAD-ES route (ESI=0) for BUM traffic egress filtering, the Leaf label MUST be set to a valid MPLS label (non-reserved, assigned per RFC 3032) and the Leaf-Indication flag SHOULD be set to zero. The receiving PE MUST ignore the Leaf-Indication flag.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
