document: rfc-5860
kind: security-consideration
summary: OAM messages can reveal sensitive information such as passwords, performance data, and network topology details. OAM protocol solutions MUST include authentication facilities to prove message origin and verify destination; use of such facilities MUST be configurable. OAM systems SHOULD be designed so functions cannot be accessed without authorization.
section: "4"
topics:
