document: rfc-8044
kind: wire-format
summary: The 'ipv6prefix' data type (value 10) encodes an IPv6 prefix as a 1-octet Reserved field (MUST be zero), a 1-octet Prefix-Length (0–128), and up to 16 octets of Prefix. Total length is 2 to 18 octets. Prefix-Length > 128 MUST be treated as invalid.
section: "3.10"
