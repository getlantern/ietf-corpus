document: rfc-6165
kind: protocol-element
summary: The Topology Identifier field in MT-PORT-CAP is 12 bits; when set to zero, it indicates the TLV carries base topology information. Similarly, a zero Topology-id/Nickname in MAC-RI implies MAC addresses are reachable across all topologies or nicknames of the originating IS.
section: "2.1"
