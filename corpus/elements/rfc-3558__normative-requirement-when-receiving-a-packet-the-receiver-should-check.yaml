document: rfc-3558
kind: normative-requirement
summary: When receiving a packet, the receiver SHOULD check validity of ToC fields and match packet length against ToC-indicated lengths; mismatches or invalidity SHOULD cause the packet to be discarded and treated as lost.
section: "9.2"
rfc2119_level: SHOULD
