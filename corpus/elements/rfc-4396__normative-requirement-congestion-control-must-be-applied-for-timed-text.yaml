document: rfc-4396
kind: normative-requirement
summary: Congestion control MUST be applied for timed text streams. Senders MUST react to signs of congestion by reducing the transmission rate, following RFC 2914. The use of UDP for RTP timed text does not exempt senders from this requirement.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
