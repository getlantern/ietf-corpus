document: rfc-3311
kind: normative-requirement
summary: Unlike re-INVITE, UPDATE MUST be responded to promptly; the user cannot generally be prompted to approve changes. If the UAS cannot change session parameters without user approval, it SHOULD reject with 504. If the new session description is unacceptable, the UAS may return 488 with a Warning header.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
