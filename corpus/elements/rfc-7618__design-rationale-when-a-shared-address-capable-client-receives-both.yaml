document: rfc-7618
kind: design-rationale
summary: When a shared-address-capable client receives both a shared-address offer and a full-IPv4 offer, it SHOULD prefer the full IPv4 offer unless specifically configured otherwise, acknowledging that shared addresses carry operational restrictions not present with full addresses.
