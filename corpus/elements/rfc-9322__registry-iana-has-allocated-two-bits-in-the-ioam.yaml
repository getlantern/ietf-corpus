summary: 'IANA has allocated two bits in the ''IOAM Trace-Flags'' registry: Bit 1 as ''Loopback'' (L-bit) and Bit 2 as ''Active'' (A-bit), with RFC 9322 as the reference. Bit 0 (most significant) was previously allocated by RFC 9197 as the Overflow bit.'
