document: rfc-5401
kind: normative-requirement
summary: When a NACK message must be truncated due to payload limits, the NACK content SHOULD contain requests for the ordinally lowest repair content needed from the sender. A single NACK message should be generated per cycle.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - multicast
