document: rfc-4643
kind: security-consideration
summary: Implementations MUST support a configuration where authentication mechanisms vulnerable to passive eavesdropping (such as AUTHINFO USER/PASS and SASL PLAIN) are not advertised or used without an external security layer such as TLS, and this SHOULD be the default configuration.
section: "6"
topics:
    - security
    - tls
