document: rfc-867
kind: wire-format
summary: One popular syntax is 'Weekday, Month Day, Year Time-Zone' (e.g., 'Tuesday, February 22, 1982 17:37:43-PST'). Another popular syntax (used in SMTP) is 'dd mmm yy hh:mm:ss zzz' (e.g., '02 FEB 82 07:59:01 PST'). No single format is mandated.
section: Daytime Syntax
extracted_by: claude-sonnet-4-6
