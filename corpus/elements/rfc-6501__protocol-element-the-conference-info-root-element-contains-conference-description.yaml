document: rfc-6501
kind: protocol-element
summary: 'The <conference-info> root element contains: <conference-description>, <host-info>, <conference-state>, <floor-information>, <users>, <sidebars-by-ref>, and <sidebars-by-val> child elements. The ''entity'' attribute is extended to hold the XCON-URI (in addition to the SIP URI defined in RFC 4575).'
section: "3.4"
topics:
