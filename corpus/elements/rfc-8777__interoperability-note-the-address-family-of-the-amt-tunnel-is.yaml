document: rfc-8777
kind: interoperability-note
summary: The address family of the AMT tunnel is independent of the address family of the multicast traffic. A gateway may use an IPv4 AMT tunnel to receive IPv6 multicast, or vice versa.
section: "2.2"
topics:
