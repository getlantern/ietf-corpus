document: rfc-3456
kind: normative-requirement
summary: The chaddr field of the DHCPDISCOVER MUST include an identifier unique to the virtual subnet. The client MUST use the same chaddr field in all subsequent messages within the same DHCPv4 exchange.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
