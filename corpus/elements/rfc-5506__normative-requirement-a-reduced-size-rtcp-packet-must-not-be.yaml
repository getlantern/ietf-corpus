document: rfc-5506
kind: normative-requirement
summary: A Reduced-Size RTCP packet MUST NOT be used for Regular (scheduled) RTCP report purposes and MUST NOT be used with the RTP/AVP profile (RFC 3551) or the RTP/SAVP profile (RFC 3711).
section: "4.1"
rfc2119_level: MUST NOT
