document: rfc-2131
kind: normative-requirement
summary: A DHCPREQUEST in SELECTING state MUST include the 'server identifier' option indicating the chosen server, and the 'requested IP address' option MUST be set to the yiaddr value from the chosen DHCPOFFER. The message MUST use the same 'secs' value and broadcast address as the original DHCPDISCOVER.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
