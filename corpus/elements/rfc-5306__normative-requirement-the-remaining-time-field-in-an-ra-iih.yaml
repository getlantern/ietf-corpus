document: rfc-5306
kind: normative-requirement
summary: The Remaining Time field in an RA IIH MUST be set to the current time in seconds before the holding timer on the acknowledged adjacency is due to expire, ensuring the restarting router can accurately track its window for completing synchronization.
section: 3.2.1
rfc2119_level: MUST
topics:
    - routing
