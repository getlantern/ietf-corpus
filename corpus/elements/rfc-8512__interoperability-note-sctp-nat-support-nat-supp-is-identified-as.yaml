document: rfc-8512
kind: interoperability-note
summary: SCTP NAT support (NAT-SUPP) is identified as requiring future extension; the mapping-entry would need two optional SCTP-specific fields (Internal Verification Tag and External Verification Tag). TCP-specific timers are not generalized to other connection-oriented protocols pending a standards document specifying such behavior.
section: "2.4"
topics:
