document: rfc-8824
kind: normative-requirement
summary: SCHC header compression Rules MUST remain tightly coupled between the compressor and the decompressor. If Rules get out of sync, a Compression Residue might be decompressed differently than the original message submitted to compression.
section: "9"
rfc2119_level: MUST
topics:
    - security
