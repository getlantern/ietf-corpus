document: rfc-5247
kind: normative-requirement
summary: Physical authenticators implementing virtual authenticators are REQUIRED to cache associated authorizations along with EAP keying material and apply them on each network access regardless of which virtual authenticator is accessed. It is RECOMMENDED that physical authenticators maintain separate key caches per virtual authenticator to prevent cross-authenticator key reuse attacks.
section: 2.3.1
rfc2119_level: REQUIRED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
