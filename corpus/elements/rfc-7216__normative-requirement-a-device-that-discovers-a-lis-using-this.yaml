document: rfc-7216
kind: normative-requirement
summary: A Device that discovers a LIS using this method MUST NOT provide that LIS with additional information that might reveal its position (such as location measurements per RFC 7105) unless it has a secondary method for determining the LIS's authenticity, such as a white list.
section: "5"
rfc2119_level: MUST NOT
topics:
    - privacy
    - security
