summary: Loss-Pair-Counts N(i,j) are the absolute frequencies of the four Loss Pair outcome types — (0,0), (0,1), (1,0), (1,1) — in a sample of n Loss Pairs. They are the fundamental building block for all derived loss episode proto-metrics and final metrics.
