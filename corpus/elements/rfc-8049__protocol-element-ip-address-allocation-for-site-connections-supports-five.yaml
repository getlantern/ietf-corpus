document: rfc-8049
kind: protocol-element
summary: 'IP address allocation for site connections supports five modes: provider-dhcp, provider-dhcp-relay (customer provides DHCP server addresses), static-address, slaac (IPv6 only), and provider-dhcp-slaac (IPv6 only). In dynamic modes, the SP is expected to provide at minimum an IP address, mask, and default gateway.'
section: 6.3.2.2.1
