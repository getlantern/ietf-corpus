document: rfc-8825
kind: security-consideration
summary: 'WebRTC security covers three areas: security of the components (browsers and servers, aiming to introduce no additional vulnerability), security of communication channels (verifying crypto parameters), and security of partner identities (positive identification or anonymity as needed). The security analysis and requirements are in RFC 8826.'
