document: rfc-6864
kind: normative-requirement
summary: Originating sources MAY set the IPv4 ID field of atomic datagrams to any value, since the field has no meaning for such datagrams. The previous uniqueness requirement no longer applies to atomic datagrams.
section: "4.1"
rfc2119_level: MAY
topics:
