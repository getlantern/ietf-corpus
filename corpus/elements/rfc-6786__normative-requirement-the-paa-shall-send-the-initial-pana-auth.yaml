document: rfc-6786
kind: normative-requirement
summary: The PAA SHALL send the initial PANA-Auth-Request carrying one or more Encryption-Algorithm AVPs it supports. The PaC SHALL select one algorithm and respond with the initial PANA-Auth-Answer carrying exactly one Encryption-Algorithm AVP for the selected algorithm.
section: "2"
rfc2119_level: SHALL
topics:
