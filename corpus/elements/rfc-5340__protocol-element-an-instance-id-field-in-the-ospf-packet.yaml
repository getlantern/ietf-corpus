document: rfc-5340
kind: protocol-element
summary: An Instance ID field in the OSPF packet header and interface data structures enables multiple independent OSPF protocol instances to run on a single link, keeping separate routing domains distinct even when sharing physical links. The Instance ID defaults to 0 and solely affects packet reception.
section: "2.4"
topics:
    - routing
