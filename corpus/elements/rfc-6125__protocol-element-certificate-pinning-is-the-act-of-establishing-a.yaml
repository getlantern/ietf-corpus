document: rfc-6125
kind: protocol-element
summary: Certificate pinning is the act of establishing a cached name association between a service's certificate and a client's reference identifier despite no identifier match, accomplished by explicit human user acceptance. Once pinned, the client verifies future connections by matching against the pinned certificate rather than re-checking identifiers.
section: "1.8"
topics:
    - tls
    - pkix
    - security
