document: rfc-7671
kind: normative-requirement
summary: 'Clients SHOULD use digest algorithm agility when processing DANE TLSA records: after discarding unusable/malformed records, for each usage and selector process only Full(0) records plus records whose digest algorithm is considered strongest among usable records with that usage and selector.'
