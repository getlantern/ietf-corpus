document: rfc-9345
kind: normative-requirement
summary: The server MUST send the delegated credential as an extension in the CertificateEntry of its end-entity certificate; the client MUST NOT use delegated credentials sent as extensions to any other certificate. If the server sends multiple delegated credentials extensions in a single CertificateEntry, the client MUST abort with an 'illegal_parameter' alert.
section: 4.1.1
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
