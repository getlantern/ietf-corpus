document: rfc-9249
kind: protocol-element
summary: The 'refid' typedef is a union type that can be an IPv4 address, a uint32 (first 32 bits of MD5 hash of IPv6 address), or a 4-character string (for reference identifiers and kiss codes such as 'AUTH', 'DROP', 'RATE', 'NIST', 'ATOM'). The MD5 hash use here is not for cryptographic purposes.
