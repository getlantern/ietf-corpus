document: rfc-5092
kind: protocol-element
summary: The mailbox access key is a per-user, per-mailbox unpredictable random string with at least 128 bits of entropy, generated by software or hardware. Two users sharing the same mailbox each have a different mailbox access key for that mailbox.
section: 6.1.1.2
topics:
    - email
    - security
    - crypto
