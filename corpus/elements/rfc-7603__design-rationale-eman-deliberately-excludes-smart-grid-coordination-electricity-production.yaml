document: rfc-7603
kind: design-rationale
summary: EMAN deliberately excludes Smart Grid coordination, electricity production, and distribution from its scope. It can support demand response only indirectly by allowing an EnMS to translate a signal from an outside grid entity into device-level control actions.
section: 4.3.3
