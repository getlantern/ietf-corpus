summary: 'MOBILEIPV6-MIB is assigned OID { mib-2 133 } and is organized into four major object groups: mip6Core (generic, common to all MIPv6 entities), mip6Mn (mobile node), mip6Cn (correspondent node), and mip6Ha (home agent), plus a mip6Notifications group for asynchronous events.'
