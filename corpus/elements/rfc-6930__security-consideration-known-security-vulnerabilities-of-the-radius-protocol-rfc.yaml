document: rfc-6930
kind: security-consideration
summary: Known security vulnerabilities of the RADIUS protocol (RFC 2607, RFC 2865, RFC 2869) apply to this use. Use of IPsec (RFC 4301) for securing RADIUS carried over IPv6 is discussed in RFC 3162.
