document: rfc-1381
kind: interoperability-note
summary: 'lapbFlowChangeReason correlates with MIB-II ifOperStatus when ifOperStatus is not ''testing'': ifOperStatus is ''up'' when lapbFlowChangeReason is abmEntered, abmeEntered, abmReset, or abmeReset; it is ''down'' for notStarted or dmReceived through n2Timeout. No correlation exists when the value is ''other''.'
section: "4"
topics:
