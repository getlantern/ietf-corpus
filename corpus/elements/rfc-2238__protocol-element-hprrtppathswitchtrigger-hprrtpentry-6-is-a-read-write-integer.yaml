document: rfc-2238
kind: protocol-element
summary: hprRtpPathSwitchTrigger (hprRtpEntry 6) is a read-write INTEGER with values ready(1) and switchPathNow(2). Setting it to switchPathNow(2) triggers an immediate operator-requested path switch; repeated sets to switchPathNow each trigger a fresh switch. No specific new path can be specified via this object.
