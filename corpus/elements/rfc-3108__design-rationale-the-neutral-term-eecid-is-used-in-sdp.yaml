document: rfc-3108
kind: design-rationale
summary: The neutral term 'eecid' is used in SDP session descriptors instead of 'bnc-id' in order to provide a common SDP baseline for both ISUP/Q.1901 applications and SIP/SIP+ applications, since 'backbone network connection identifier' implies a scope that does not match SIP usage.
section: 5.6.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
