document: rfc-5303
kind: interoperability-note
summary: If the Point-to-Point Three-Way Adjacency option is not present in a received IIH, the link is assumed to be functional in both directions and standard ISO 10589 section 8.2.4.2 procedures are followed. This ensures full interoperability with systems that do not support the extension.
section: "3.2"
topics:
    - routing
