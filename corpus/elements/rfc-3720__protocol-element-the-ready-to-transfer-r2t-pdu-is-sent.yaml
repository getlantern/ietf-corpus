kind: protocol-element
summary: The Ready To Transfer (R2T) PDU is sent by the target to solicit outgoing write data from the initiator, specifying Buffer Offset and Desired Data Transfer Length. It implements flow control for write data, replacing traditional SCSI bus arbitration.
