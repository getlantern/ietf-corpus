document: rfc-7310
kind: normative-requirement
summary: A channel MUST NOT be paired with more than one other channel in the stereo-channel-pairs parameter. When a channel is stereo paired, the first channel as defined in stereo-channel-pairs MUST be specified in the embedded-autosync-channels list, and the second channel MUST be specified in the embedded-aux-channels list.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
