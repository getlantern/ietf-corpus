document: rfc-8611
kind: normative-requirement
summary: When a responder LSR receives an echo request with the LAG Description Indicator flag set and the I flag (Interface and Label Stack Object Request) set, it MUST add the Detailed Interface and Label Stack TLV in the echo reply; if the incoming interface is a LAG, it MUST add the Incoming Interface Index Sub-TLV with the LAG Member Link Indicator flag set.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
