document: rfc-3165
kind: design-rationale
summary: The Script MIB supports both push (SNMP set requests into smCodeTable, fragmented to handle SNMP message size limits) and pull (URL in smScriptSource, allowing FTP/HTTP for large scripts) transfer models, plus built-in hard-wired scripts, because no single transfer method suits all deployment scenarios.
section: "4.2"
topics:
