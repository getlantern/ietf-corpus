document: rfc-9735
kind: security-consideration
summary: DNs are used in mappings that are part of the LISP control plane and may be encoded using LCAF; thus, the security considerations of RFC 9301 (LISP Control Plane) and RFC 8060 (LCAF) apply to DN usage.
