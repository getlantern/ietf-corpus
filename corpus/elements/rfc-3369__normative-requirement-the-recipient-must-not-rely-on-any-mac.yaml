document: rfc-3369
kind: normative-requirement
summary: The recipient MUST NOT rely on any MAC values or message digest values computed by the originator in AuthenticatedData. The recipient must independently compute the MAC and verify it equals the mac field; when authAttrs is present, the message digest must also be independently verified.
section: "9.3"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
