document: rfc-9128
kind: protocol-element
summary: Per-address-family topology-tree-info provides read-only multicast route state keyed by (group, source-address, is-rpt) for both IPv4 and IPv6, including incoming-interface, RPF neighbor, RP address, SPT bit, up-time, expiration, and a list of outgoing interfaces with J/P state (no-info, join, prune-pending).
