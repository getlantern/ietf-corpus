summary: 'QPACK uses three indexing schemes: absolute indexing (fixed for the entry''s lifetime, starting at 0), relative indexing (context-sensitive; in encoder instructions, 0 = most recent; in field representations, 0 = Base-1), and post-Base indexing (used in representations for entries with absolute index >= Base, starting at 0 for Base).'
