document: rfc-9354
kind: privacy-consideration
summary: IP addresses derived from short link-layer addresses without sufficient entropy are vulnerable to address scanning and tracking. Other schemes such as limited DHCPv6 lease periods, CGAs (RFC 3972), Temporary Address Extensions (RFC 8981), HBAs (RFC 5535), or semantically opaque addresses (RFC 7217) SHOULD be used to enhance IID privacy.
section: "8"
rfc2119_level: SHOULD
topics:
    - privacy
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
