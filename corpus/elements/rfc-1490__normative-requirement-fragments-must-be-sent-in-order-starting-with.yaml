document: rfc-1490
kind: normative-requirement
summary: Fragments must be sent in order starting with a zero offset, ending with the final fragment (F=1), and must not be interrupted by other packets or information intended for the same DLC. An end station must be able to reassemble up to 2K octets.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
