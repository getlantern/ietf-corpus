document: rfc-6757
kind: design-rationale
summary: The ANI option is optional and not mandatory for PMIPv6, because the Access Technology Type (ATT) option in RFC 5213 already provides a baseline and not all deployments require granular access network identification. The ATT option continues to be mandatory in all PMIPv6 signaling.
section: "1"
