document: rfc-7892
kind: design-rationale
summary: The registration policy for the OTN Signal Type subregistry was expanded from Standards Action only to also include Specification Required, enabling registration by documents outside the Standards Track. This change facilitates broader use and registration of OTN signal types without requiring full IETF Standards Track progression.
