document: rfc-5036
kind: interoperability-note
summary: Loop Detection MUST be enabled in ALL LSRs within an MPLS domain to function correctly; partial deployment may result in either undetected loops or falsely detected loops, making it an all-or-nothing domain-wide configuration.
