document: rfc-8245
kind: normative-requirement
summary: If requested by a protocol, the multiplexer MUST include a Packet Sequence Number, the sequence number MUST be specific to the interface, and separate sequence numbers MUST be maintained for each destination. Addition of Packet Sequence Numbers MUST be consistent for each interface and destination.
section: 4.4.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
