document: rfc-3101
kind: design-rationale
summary: NSSAs were created because standard OSPF stub areas cannot import AS external routes, forcing networks like BBN Planet's leaf sites to run RIP between border routers rather than including them fully in OSPF. The NSSA option allows limited external route import via Type-7 LSAs while preserving the benefits of stub area topology.
section: "1.1"
topics:
