document: rfc-7339
kind: normative-requirement
summary: If overload control information is inserted into a 100 Trying response, the server MUST re-insert the same (or updated) overload control parameters in the first non-100 Trying response, because 100 Trying may be consumed at the transaction layer and not reach the TU.
section: "5.11"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
