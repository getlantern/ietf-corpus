document: rfc-5436
kind: normative-requirement
summary: 'The header field ''Auto-Submitted: auto-notified'' MUST be included in every notification message. mailto URI headers with hname ''auto-submitted'' are considered unsafe and MUST be ignored.'
section: "2.7"
rfc2119_level: MUST
