document: rfc-6492
kind: protocol-element
summary: The Request-Not-Performed response (type='error_response') carries a numeric status code and an optional human-readable description element. Error codes range from 1101–1104 (protocol errors), 1201–1204 (issuance errors), 1301–1302 (revocation errors), and 2001 (internal server error).
