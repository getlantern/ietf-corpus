document: rfc-6902
kind: interoperability-note
summary: JSON object member ordering is not significant; therefore operation objects with the same members in different orders are equivalent (e.g., {"op":"add","path":"/a","value":"foo"} equals {"value":"foo","path":"/a","op":"add"}).
section: "4"
