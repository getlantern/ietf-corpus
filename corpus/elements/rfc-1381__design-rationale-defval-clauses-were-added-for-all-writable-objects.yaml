document: rfc-1381
kind: design-rationale
summary: DEFVAL clauses were added for all writable objects to allow future MIB extensions to define LAPB interface creation mechanisms without needing to deprecate the existing objects for lack of defaults. The DEFVAL values are reasonable but not mandatory.
