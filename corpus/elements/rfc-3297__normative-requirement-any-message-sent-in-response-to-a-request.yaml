document: rfc-3297
kind: normative-requirement
summary: Any message sent in response to a request for alternative data MUST include an Original-Message-ID header containing the Original-message-ID value from the received disposition notification (which is the Message-ID from the original message).
section: "3.3"
rfc2119_level: MUST
topics:
    - email
