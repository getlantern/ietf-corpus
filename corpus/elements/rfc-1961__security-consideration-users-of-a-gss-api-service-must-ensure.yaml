document: rfc-1961
kind: security-consideration
summary: Users of a GSS-API service must ensure the quality of protection provided by the mechanism implementation is consistent with their security policy. Where GSS-API negotiation is supported, constraints on acceptable mechanisms may be imposed to ensure suitability for authenticated firewall traversal.
section: "9"
topics:
