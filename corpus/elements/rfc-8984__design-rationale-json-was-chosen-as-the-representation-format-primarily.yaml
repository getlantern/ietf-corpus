document: rfc-8984
kind: design-rationale
summary: 'JSON was chosen as the representation format primarily as a pragmatic decision: widespread adoption makes JSCalendar easier to integrate, and production-ready JSON parsers eliminate parser-related interoperability issues that iCalendar has long suffered from. The stricter I-JSON subset is required for additional determinism.'
