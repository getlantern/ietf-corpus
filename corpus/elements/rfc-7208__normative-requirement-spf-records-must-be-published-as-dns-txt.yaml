document: rfc-7208
kind: normative-requirement
summary: SPF records MUST be published as DNS TXT (type 16) Resource Records only, encoded as US-ASCII. The SPF RR type is no longer supported in SPF version 1 due to its negligible adoption and the fundamental flaw in the dual-RR transition model of RFC 4408.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
