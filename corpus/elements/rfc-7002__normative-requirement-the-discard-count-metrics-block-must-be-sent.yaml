document: rfc-7002
kind: normative-requirement
summary: The Discard Count Metrics Block MUST be sent in the same compound RTCP packet as the Measurement Information Block. If the measurement interval is not received in the same compound RTCP packet, this metrics block MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
