document: rfc-5672
kind: interoperability-note
summary: For signers and verifiers that had been using the i= tag as the primary value delivered to the assessor, this Update requires a software change to use the d= tag instead. The standardized minimum output of a DKIM-compliant library is the verification yes/no result and the d= value.
