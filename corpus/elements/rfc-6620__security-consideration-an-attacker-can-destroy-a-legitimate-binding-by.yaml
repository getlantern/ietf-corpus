document: rfc-6620
kind: security-consideration
summary: An attacker can destroy a legitimate binding by preventing the bound host from replying to a DAD_NS (e.g., intercepting the NA or DoS-ing the host). If no NA is seen from the original binding anchor, the SAVI device may grant the binding to the attacker's port.
section: "4.2"
topics:
    - ip
    - security
