document: rfc-9758
kind: protocol-element
summary: The Null ipn URI has all three components set to zero (0). No resource identified by it exists; any destination identified by it is unreachable. It represents the BPv7 Null endpoint and is equivalent to dtn:none, ipn:0.0, and ipn:0.0.0.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
