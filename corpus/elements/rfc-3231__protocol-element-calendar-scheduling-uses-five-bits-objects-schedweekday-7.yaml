document: rfc-3231
kind: protocol-element
summary: 'Calendar scheduling uses five BITS objects: schedWeekDay (7 bits, sunday–saturday), schedMonth (12 bits, january–december), schedDay (62 bits, d1–d31 for forward and r1–r31 for reverse-from-end-of-month), schedHour (24 bits, h0–h23), and schedMinute (60 bits, m0–m59). Multiple bits set create an OR within an object; objects are ANDed together.'
section: "3.2"
topics:
    - snmp
