document: rfc-2677
kind: design-rationale
summary: The indexing scheme for nhrpCacheTable (and nhrpServerCacheTable) deliberately mirrors the MPC Ingress Cache Table and MPS Ingress Cache Table in the MPOA MIB, even though other schemes were possible. A consistent indexing scheme across these complementary, non-overlapping MIBs was considered more advantageous from an implementation standpoint.
