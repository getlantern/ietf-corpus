document: rfc-3402
kind: interoperability-note
summary: A given Rule Database may be used by more than one Application (e.g., ENUM and URI Resolution sharing a DNS database). Each rule must use its Services and/or substitution expression to match only those AUSs for which it is valid, to prevent cross-application interference.
section: "5"
topics:
    - dns
