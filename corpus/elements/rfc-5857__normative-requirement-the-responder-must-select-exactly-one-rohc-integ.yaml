document: rfc-5857
kind: normative-requirement
summary: The responder MUST select exactly one ROHC_INTEG algorithm from the initiator's proposals and send it back. If the responder does not accept any proposed algorithm, ROHC MUST NOT be enabled on the SA. The selected integrity algorithm MUST be used in both directions.
section: 3.1.2
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - crypto
    - security
