document: rfc-7710
kind: security-consideration
summary: An attacker able to inject DHCP messages could include the Captive-Portal option and force users to contact an address of the attacker's choosing. Because the attacker could also hijack the default gateway, this does not significantly expand attack capabilities, but clients aware they are connecting to a captive-portal device can sandbox the page and label it as untrusted.
section: "4"
topics:
