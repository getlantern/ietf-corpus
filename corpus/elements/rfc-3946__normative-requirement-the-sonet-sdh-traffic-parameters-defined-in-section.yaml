document: rfc-3946
kind: normative-requirement
summary: The SONET/SDH traffic parameters defined in Section 2.1 MUST be used when the label is encoded as SUKLM or when requesting Section/RS or Line/MS overhead transparent STS-1/STM-0 or STS-3*N/STM-N signals. The traffic parameters and label encoding from RFC 3471 Section 3.2 MUST be used for fully transparent signals (all overhead left unmodified).
section: "2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
