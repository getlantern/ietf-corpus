document: rfc-9922
kind: protocol-element
summary: The 'ietf-schedule' YANG module defines reusable groupings for scheduling purposes including generic-schedule-params, period-of-time, recurrence-basic, recurrence-utc, recurrence-with-time-zone, recurrence-utc-with-periods, recurrence-time-zone-with-periods, icalendar-recurrence, and schedule-status variants. It is designed to be imported and reused by other YANG modules rather than deployed standalone.
section: "3"
