document: rfc-5662
kind: protocol-element
summary: 'The state_protect_how4 enumeration defines three state-protection modes for EXCHANGE_ID: SP4_NONE (no special protection), SP4_MACH_CRED (machine-credential-protected operations specified via must-enforce/must-allow bitmaps), and SP4_SSV (SSV-GSS protected with negotiated hash and encryption algorithms).'
