document: rfc-6909
kind: protocol-element
summary: The EnableIPv4TrafficOffloadSupport configuration variable (default 0/disabled) controls whether IPv4 traffic offload is enabled on the MAG or LMA. When set to 1 on the MAG, it requests offload policy from the LMA for all mobility sessions; configured values must survive server reboots.
section: "4"
topics:
