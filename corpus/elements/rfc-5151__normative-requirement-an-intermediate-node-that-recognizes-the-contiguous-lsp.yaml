document: rfc-5151
kind: normative-requirement
summary: An intermediate node that recognizes the 'Contiguous LSP' bit but cannot support contiguous TE LSPs MUST send a PathErr with error code 'Routing Problem'/'Contiguous LSP type not supported' upon receiving a Path message with this bit set.
section: "4.1"
rfc2119_level: MUST
topics:
