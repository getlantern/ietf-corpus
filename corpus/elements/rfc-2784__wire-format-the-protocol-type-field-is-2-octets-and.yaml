document: rfc-2784
kind: wire-format
summary: The Protocol Type field is 2 octets and carries the ETHER TYPE of the payload packet as defined in RFC 1700 and the IANA Ethernet Numbers registry. An implementation receiving an unrecognized Protocol Type SHOULD discard the packet.
section: "2.4"
rfc2119_level: SHOULD
