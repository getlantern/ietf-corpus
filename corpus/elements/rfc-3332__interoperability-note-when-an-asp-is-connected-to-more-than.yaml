document: rfc-3332
kind: interoperability-note
summary: When an ASP is connected to more than one SGP, the same SS7 network context may be assigned different Network Appearance values at each SGP. The M3UA layer at the ASP must independently maintain availability, restriction, and congestion status per route and derive a combined destination status to present correctly to MTP3-Users.
section: 1.3.2
topics:
    - realtime
    - voip
