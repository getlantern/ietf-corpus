document: rfc-2002
kind: wire-format
summary: 'Authentication Extensions (Mobile-Home Type 32, Mobile-Foreign Type 33, Foreign-Home Type 34) each carry: Type (1 byte), Length (1 byte), SPI (4 bytes), Authenticator (variable). Length = 4 plus Authenticator bytes. The Authenticator covers UDP payload, all prior extensions, and the Type and Length of the authentication extension itself.'
