document: rfc-9668
kind: normative-requirement
summary: An application profile MUST NOT specify support for the EDHOC + OSCORE request when it indicates that the server shall send EDHOC message_4, because the optimized workflow is incompatible with message_4 and using both together will always fail.
section: "5"
rfc2119_level: MUST NOT
topics:
    - security
