document: rfc-3986
kind: wire-format
summary: 'Percent-encoding represents a data octet as a character triplet: the percent character "%" followed by two hexadecimal digits. ABNF: pct-encoded = "%" HEXDIG HEXDIG. Uppercase and lowercase hex digits are equivalent.'
section: "2.1"
