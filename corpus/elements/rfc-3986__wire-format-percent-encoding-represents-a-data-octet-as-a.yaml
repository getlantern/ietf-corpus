document: rfc-3986
kind: wire-format
summary: 'Percent-encoding represents a data octet as a character triplet: pct-encoded = "%" HEXDIG HEXDIG. The percent character itself must be encoded as "%25" when used as data within a URI.'
section: "2.1"
