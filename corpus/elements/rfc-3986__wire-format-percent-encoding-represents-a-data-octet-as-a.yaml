document: rfc-3986
kind: wire-format
summary: 'Percent-encoding represents a data octet as a triplet: pct-encoded = "%" HEXDIG HEXDIG. Uppercase hex digits A–F are equivalent to lowercase a–f; producers and normalizers should use uppercase for all percent-encodings for consistency.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
