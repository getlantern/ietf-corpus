document: rfc-6276
kind: normative-requirement
summary: When the mobile router is on its home link, the home agent MUST use the home link to exchange DHCPv6PD messages with the mobile router, and the DHCPv6 co-located relay function MUST be disabled.
section: "3.2"
rfc2119_level: MUST
