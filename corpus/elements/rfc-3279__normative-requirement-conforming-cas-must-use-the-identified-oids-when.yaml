document: rfc-3279
kind: normative-requirement
summary: Conforming CAs MUST use the identified OIDs when issuing certificates containing public keys for RSA, DSA, DH, KEA, ECDSA, and ECDH algorithms. Conforming applications supporting any of these algorithms MUST, at a minimum, recognize the OID.
section: "2.3"
rfc2119_level: MUST
topics:
