document: rfc-4035
kind: protocol-element
summary: 'Authenticated denial of existence uses NSEC RRs: if the queried name matches an NSEC owner name, the type bitmap proves which types are absent; if the name falls canonically between an NSEC owner name and its Next Domain Name field, no RRsets with that name exist — but proving no wildcard match exists may require additional NSEC RRs.'
section: "5.4"
