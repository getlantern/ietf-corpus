document: rfc-8503
kind: normative-requirement
summary: In mvpnMrouteCmcastGroupAddr and mvpnMrouteCmcastSourceAddrs, address bits beyond the corresponding prefix length MUST be set to zero. This requirement also applies to the equivalent objects in mvpnMrouteNextHopTable.
section: "3.2"
rfc2119_level: MUST
topics:
    - multicast
    - snmp
