summary: 'The ''tp-tools'' container holds two mandatory boolean leaves: ''continuity-check'' (whether CC/ping is supported at this test point) and ''path-discovery'' (whether traceroute-style path discovery is supported). These act as capability flags and constraint anchors when the base model is extended.'
