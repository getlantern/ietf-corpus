summary: The MIB introduces the concept of a 'Fibre Channel management instance' (indexed by fcmInstanceIndex) to allow a single SNMP agent with multiple AgentX sub-agents to represent multiple FC management instances within the same SNMP context. All tables are indexed by this arbitrary integer.
