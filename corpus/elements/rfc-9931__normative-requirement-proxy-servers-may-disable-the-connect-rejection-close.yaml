document: rfc-9931
kind: normative-requirement
summary: Proxy servers MAY disable the CONNECT-rejection close mitigation if the client is known to wait for a 2xx response before forwarding untrusted TCP payload data. Servers can identify compliant clients via the User-Agent header field and vendor documentation.
section: "8"
rfc2119_level: MAY
topics:
