document: rfc-4342
kind: protocol-element
summary: The Send Loss Event Rate feature (feature number 192, server-priority, initial value 0) lets endpoints negotiate whether the receiver MUST provide Loss Event Rate options on acknowledgements. When set to 1, the receiver MUST send Loss Event Rate options; it MAY send them when set to 0.
section: "8.4"
topics:
    - congestion
    - registry
