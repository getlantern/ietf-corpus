document: rfc-4683
kind: normative-requirement
summary: Whenever a certificate is updated, a new R SHOULD be generated and the SIM SHOULD be recomputed, because reusing a prior SIM value allows an attacker to correlate certificates associated with the same individual.
section: "8"
rfc2119_level: SHOULD
