document: rfc-2806
kind: privacy-consideration
summary: Placing a call via a tel/fax/modem URL may reveal the user's phone number (including unlisted numbers) to the remote party through caller-identification data, potentially correlating it with other identifiers such as an email or IP address. The local entity's design MUST account for this risk.
section: "5"
topics:
    - privacy
    - security
