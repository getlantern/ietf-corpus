document: rfc-5196
kind: protocol-element
summary: The <mobility> element indicates whether a device is <fixed> (stationary, associated with a fixed network point) or <mobile> (not associated with a fixed point). Note that cordless phones are classified as fixed, not mobile, per RFC 3840.
section: 3.3.2
topics:
    - sip
    - realtime
    - mobility
