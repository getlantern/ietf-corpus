document: rfc-9131
kind: design-rationale
summary: RFC 4861 Section 7.2.5 directed routers to silently discard unsolicited NAs with no existing NC entry because 'the recipient has apparently not initiated any communication with the target.' This reasoning is valid for host-to-host on-link traffic but not for host-to-router scenarios where the router needs a cache entry to forward return traffic.
section: "4.2"
topics:
    - ip
    - routing
