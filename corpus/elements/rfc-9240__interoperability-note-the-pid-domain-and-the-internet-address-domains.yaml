document: rfc-9240
kind: interoperability-note
summary: The PID domain and the Internet address domains (ipv4, ipv6) are completely independent. An ALTO server MAY choose to assign some or all of a PID's properties to the address prefixes in that PID, but this is not required; a property value on a PID entity does not automatically propagate to the IP addresses it contains.
section: 6.2.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
