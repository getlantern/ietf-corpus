document: rfc-1902
kind: protocol-element
summary: The NOTIFICATION-TYPE macro defines the information carried in an unsolicited SNMPv2-Trap-PDU or InformRequest-PDU, listing an ordered sequence of MIB objects via an optional OBJECTS clause plus mandatory STATUS and DESCRIPTION. No OBJECTS-listed object may have MAX-ACCESS of 'not-accessible'.
