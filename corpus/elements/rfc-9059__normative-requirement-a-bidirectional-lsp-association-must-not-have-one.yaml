document: rfc-9059
kind: normative-requirement
summary: A Bidirectional LSP Association MUST NOT have one LSP identified as co-routed and the other as non-co-routed. Violation MUST result in PCErr Error-Type=26, Error-value=18 (Bidirectional LSP co-routed mismatch).
section: "5.7"
rfc2119_level: MUST
topics:
    - mpls
    - routing
