document: rfc-9069
kind: normative-requirement
summary: The Peer Up notification Sent OPEN Message is a fabricated BGP OPEN message. Capabilities MUST include the 4-octet ASN and all necessary capabilities to represent the Loc-RIB Route Monitoring messages, and only capabilities that will actually be used MUST be included.
section: "5.2"
rfc2119_level: MUST
topics:
