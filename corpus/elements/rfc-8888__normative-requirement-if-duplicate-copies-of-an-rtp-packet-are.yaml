document: rfc-8888
kind: normative-requirement
summary: If duplicate copies of an RTP packet are received, the arrival time of the first copy MUST be reported. If any duplicate is ECN-CE marked, an ECN-CE mark MUST be reported for that packet; otherwise, the ECN mark of the first copy is reported.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
