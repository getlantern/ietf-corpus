document: rfc-8956
kind: protocol-element
summary: Type 8 (ICMPv6 Code) encodes as type (1 octet) followed by {numeric_op, value} pairs matching the Code field of an ICMPv6 packet. Like Type 7, it never matches when the upper-layer protocol is not 58 (ICMPv6), when the packet is a non-first fragment, or when the transport header cannot be located.
section: "3.5"
topics:
