document: rfc-9574
kind: wire-format
summary: 'The Inclusive Multicast Ethernet Tag route NLRI is used without modification: RD (8 octets), Ethernet Tag ID (4 octets), IP Address Length (1 octet), and Originating Router''s IP Address (4 or 16 octets). The PMSI Tunnel Attribute carries the new Assisted Replication Tunnel type and the new T/BM/U flag bits alongside the existing Tunnel Type, MPLS Label, and Tunnel Identifier fields.'
