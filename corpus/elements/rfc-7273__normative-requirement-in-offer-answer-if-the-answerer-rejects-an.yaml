document: rfc-7273
kind: normative-requirement
summary: In offer/answer, if the answerer rejects an offer because reference clocks are incompatible, the rejection MUST contain at least one timestamp reference clock specification usable by the answerer for diagnostic purposes. Similarly, a media-clock rejection MUST contain a media clock specification supported by the answerer.
section: 6.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
