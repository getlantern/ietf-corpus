document: rfc-4972
kind: normative-requirement
summary: If the MPLS TE mesh-group is contained within a single OSPF area, the TE-MESH-GROUP TLV MUST be generated within an Area-local Router Information LSA. If it spans multiple areas, the TLV MUST be generated within a Routing-domain scope Router Information LSA.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
