document: rfc-5213
kind: normative-requirement
summary: If the Home Network Prefix option, Handoff Indicator option, or Access Technology Type option is absent from the PBU, the LMA MUST reject the request with the corresponding status code (MISSING_HOME_NETWORK_PREFIX_OPTION, MISSING_HANDOFF_INDICATOR_OPTION, or MISSING_ACCESS_TECH_TYPE_OPTION).
section: 5.3.1
rfc2119_level: MUST
topics:
    - mobility
