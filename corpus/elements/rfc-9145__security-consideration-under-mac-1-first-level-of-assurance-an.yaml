document: rfc-9145
kind: security-consideration
summary: Under MAC#1 (first level of assurance), an active attacker can modify the Base Header (e.g., decrement TTL to cause the next SFF to discard the packet) since the Base Header is outside the integrity-protection scope. Under MAC#2, SFFs can detect illegitimate modification of the Base Header.
section: "9.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
