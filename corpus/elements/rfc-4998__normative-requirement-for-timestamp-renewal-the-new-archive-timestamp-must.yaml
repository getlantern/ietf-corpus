document: rfc-4998
kind: normative-requirement
summary: For Timestamp Renewal, the new Archive Timestamp MUST be added to the ArchiveTimeStampChain, and its hash tree MUST use the same hash algorithm as the old Archive Timestamp (taken from the digestAlgorithm field or, if absent, from within the timestamp itself).
section: "5.2"
rfc2119_level: MUST
topics:
    - crypto
