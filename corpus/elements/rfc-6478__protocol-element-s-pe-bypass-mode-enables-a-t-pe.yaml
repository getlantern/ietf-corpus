document: rfc-6478
kind: protocol-element
summary: S-PE bypass mode enables a T-PE using LDP to bypass all S-PEs in an MS-PW and send a status message directly to the remote T-PE in-band with PW PDUs. It is OPTIONAL and MUST be supported by both T-PEs; it MUST NOT be used if the first PW segment at either T-PE is not LDP-controlled.
section: "5.5"
topics:
    - mpls
