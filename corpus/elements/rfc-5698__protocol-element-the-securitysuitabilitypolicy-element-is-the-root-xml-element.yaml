summary: The SecuritySuitabilityPolicy element is the root XML element of a DSSC policy. It contains PolicyName, Publisher, PolicyIssueDate, optional NextUpdate, optional Usage, one or more Algorithm elements, and an optional Signature element. It carries optional 'id', 'lang', and 'version' attributes.
