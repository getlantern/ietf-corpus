document: rfc-5122
kind: protocol-element
summary: The authority component of an XMPP IRI/URI, when present (preceded by "//"), encodes a node@domain and signals the processing application to authenticate as that account rather than using configured default credentials. Its presence distinguishes xmpp://guest@example.com (authenticate as guest) from xmpp:guest@example.com (identify guest).
section: "2.3"
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
