document: rfc-9243
kind: protocol-element
summary: 'The server module defines two RPCs: delete-address-lease (removes an active address lease by leafref, guarded by na-assignment feature) and delete-prefix-lease (removes an active prefix lease by leafref, guarded by prefix-delegation feature). Both carry nacm:default-deny-all and return an optional localized string message per BCP 18.'
section: "4.2"
