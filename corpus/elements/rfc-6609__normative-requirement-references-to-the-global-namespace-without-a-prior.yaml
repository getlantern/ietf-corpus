document: rfc-6609
kind: normative-requirement
summary: References to the 'global' namespace without a prior require statement for the 'include' extension MUST cause an error. Unset global variables SHALL evaluate to an empty string, consistent with how the 'variables' extension handles unknown variables.
section: 3.4.2
rfc2119_level: MUST
