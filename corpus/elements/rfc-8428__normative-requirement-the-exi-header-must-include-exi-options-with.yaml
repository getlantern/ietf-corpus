document: rfc-8428
kind: normative-requirement
summary: The EXI header MUST include EXI Options with schemaId set to 'a', indicating the schema provided in RFC 8428. An EXI Cookie SHOULD NOT be used when data is transported over CoAP or HTTP, as it is redundant and increases size.
section: "8"
rfc2119_level: MUST
topics:
    - http
