document: rfc-5492
kind: interoperability-note
summary: When the peer signals it does not support capabilities advertisement by returning an Unsupported Optional Parameter NOTIFICATION, the local speaker should fall back to establishing a session without sending the Capabilities Optional Parameter, preserving backward compatibility with non-capable peers.
