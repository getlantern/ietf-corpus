kind: protocol-element
summary: The atmSigDescrParamTable extends the ATM VCL table to carry signalling parameters from ATM Forum UNI 3.0/3.1, grouped into ATM Adaptation Layer Parameters, Broadband High Layer Information, and Broadband Low Layer Information. Users create entries here to specify signalling characteristics for SVCs.
