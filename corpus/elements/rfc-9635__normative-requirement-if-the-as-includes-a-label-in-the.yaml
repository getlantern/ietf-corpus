document: rfc-9635
kind: normative-requirement
summary: If the AS includes a label in the token request, the AS MUST include the same label in the token response. The label value is opaque to the AS and not intended to be exposed to or used by the end user.
section: 2.1.1
rfc2119_level: MUST
topics:
    - oauth
