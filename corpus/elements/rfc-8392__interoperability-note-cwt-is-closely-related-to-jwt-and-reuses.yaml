document: rfc-8392
kind: interoperability-note
summary: CWT is closely related to JWT and reuses JWT claim names and semantics; CWT claims should normally have a corresponding JWT claim. The CWT Claims registry is coordinated with the JWT Claims registry to avoid duplication and maintain alignment.
section: "9.1"
