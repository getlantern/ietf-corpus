document: rfc-8048
kind: normative-requirement
summary: The XMPP-to-SIP gateway SHOULD send a new SIP SUBSCRIBE request to the SIP contact whenever the XMPP user initiates a presence session, and also sufficiently in advance of when the SIP notification dialog is scheduled to expire during an active XMPP presence session.
section: 5.2.2
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
