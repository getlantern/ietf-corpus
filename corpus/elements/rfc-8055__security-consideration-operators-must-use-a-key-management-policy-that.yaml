document: rfc-8055
kind: security-consideration
summary: Operators MUST use a key management policy that protects against unauthorized access to JWS signing keys stored in network nodes and against cryptanalysis attacks using captured wire data. The signing key must be known only to entities that sign/add and verify/consume the 'received-realm' parameter.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - crypto
    - security
