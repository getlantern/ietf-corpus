document: rfc-3866
kind: normative-requirement
summary: If a server does not support storing language tag options with attribute values, it MUST treat an AttributeDescription with a language tag option as an unrecognized attribute in Add and Modify operations, and MUST fail the request with an appropriate result code.
section: "2.5"
rfc2119_level: MUST
topics:
    - ldap
