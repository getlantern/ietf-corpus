document: rfc-3739
kind: security-consideration
summary: The associated private key for a Qualified Certificate must be unique for the subject and maintained under the subject's sole control. A CA should not issue a qualified certificate if the means to use the private key is not protected against unintended usage, implying the CA requires knowledge of the subject's cryptographic module.
section: "4"
topics:
    - pkix
    - security
    - crypto
