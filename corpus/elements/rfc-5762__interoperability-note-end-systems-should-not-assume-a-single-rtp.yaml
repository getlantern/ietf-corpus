document: rfc-5762
kind: interoperability-note
summary: End systems SHOULD NOT assume a single RTP SSRC when using DCCP framing. A unicast DCCP connection does not imply a two-party RTP session; RTP mixers and translators may introduce multiple synchronisation sources.
section: "4.4"
topics:
    - rtp
    - realtime
