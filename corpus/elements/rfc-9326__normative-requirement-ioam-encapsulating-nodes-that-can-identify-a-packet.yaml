document: rfc-9326
kind: normative-requirement
summary: IOAM encapsulating nodes that can identify a packet as an IOAM exported packet MUST NOT push a DEX Option-Type into such a packet, to prevent nested exporting and exporting loops. IOAM nodes SHOULD NOT be configured to export packets over a path or tunnel subject to IOAM direct exporting.
section: 3.1.2
rfc2119_level: MUST NOT
topics:
    - measurement
    - security
