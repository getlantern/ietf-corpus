document: rfc-4577
kind: normative-requirement
summary: When a PE router receives any LSA from a CE router with the DN bit set, the information from that LSA MUST NOT be used in route calculation. Similarly, if a Type 5 LSA from a CE carries the VPN Route Tag value, it MUST NOT be used in route calculation.
section: 4.2.6
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
