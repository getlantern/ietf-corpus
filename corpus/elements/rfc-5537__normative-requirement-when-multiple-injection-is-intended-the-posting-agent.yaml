document: rfc-5537
kind: normative-requirement
summary: When multiple injection is intended, the posting agent MUST supply identical Message-ID, Date, and Injection-Date header fields in all copies of the proto-article. Re-injection of an already-injected article requires removing Xref and removing or renaming Injection-Info and Path header fields first.
section: 3.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
