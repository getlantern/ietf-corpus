document: rfc-9608
kind: protocol-element
summary: The noRevAvail certificate extension (id-ce-noRevAvail, OID { id-ce 56 }) allows a CA to indicate that no revocation information will be made available for the certificate. Its syntax is NULL (DER encoding '0500'H) and it MUST be marked non-critical.
