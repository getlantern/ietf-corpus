document: rfc-5187
kind: protocol-element
summary: The Grace Period TLV (Type=1, Length=4) encodes the number of seconds that the router's neighbors should continue to advertise the router as fully adjacent regardless of database synchronization state. This TLV MUST always appear in a grace-LSA.
section: "2.2"
topics:
    - routing
