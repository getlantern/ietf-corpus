document: rfc-9445
kind: protocol-element
summary: The DHCPv6-Options Attribute (identifier 245.3) uses the Long Extended Type format with Type=245 and Extended-Type=3. Its Value field contains a list of DHCPv6 options as defined in Section 21 of RFC 8415. Multiple instances of the same DHCPv6 option MAY be included.
section: "3.1"
