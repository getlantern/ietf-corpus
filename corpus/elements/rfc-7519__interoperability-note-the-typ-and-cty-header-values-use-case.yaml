document: rfc-7519
kind: interoperability-note
summary: The "typ" and "cty" header values use case-insensitive comparison (per media type rules), unlike all other JWT string comparisons which are case-sensitive. However, "JWT" is RECOMMENDED to always be spelled in uppercase for compatibility with legacy implementations.
section: "7.3"
topics:
