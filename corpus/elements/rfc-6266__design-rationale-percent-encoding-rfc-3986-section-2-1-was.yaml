document: rfc-6266
kind: design-rationale
summary: Percent-encoding (RFC 3986 Section 2.1) was rejected for the filename parameter because the character encoding used for decoding varies unpredictably across user agents based on page encoding, locale, and configuration, making it practically impossible to use reliably.
section: C.2
topics:
