document: rfc-1377
kind: protocol-element
summary: 'OSINLCP has one Configuration Option: Align-NPDU (type 1), which allows a receiver to negotiate a particular alignment of the OSI NPDU. Alignment is accomplished through a combination of PPP header compression and leading zero padding.'
