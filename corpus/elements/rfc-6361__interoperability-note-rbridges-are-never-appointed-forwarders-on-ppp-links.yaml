document: rfc-6361
kind: interoperability-note
summary: RBridges are never appointed forwarders on PPP links. If the peer is not an RBridge, TNCP negotiation fails and TRILL is not used on the link, ensuring TRILL does not activate on links without a compatible peer.
section: "3"
topics:
