summary: 'In EVPN, a spoke initially sends four CP-ORF entries (one per EVPN route type: Autodiscovery, MAC/IP, Inclusive Multicast, Ethernet Segment) to pull all base infrastructure routes from the RR, then sends a fifth MAC-specific CP-ORF to discover direct routes to specific MAC addresses.'
