document: rfc-2348
kind: normative-requirement
summary: If the server accepts the blocksize option, it sends an Option Acknowledgment (OACK) to the client. The value in the OACK must be less than or equal to the value requested by the client.
section: Blocksize Option Specification
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
