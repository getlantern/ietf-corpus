document: rfc-5042
kind: security-consideration
summary: A man-in-the-middle attacker who can intercept and modify packets may perform RDMA Read/Write operations or invalidate STags on exposed Data Buffers. End-to-end integrity protection and authentication (e.g., IPsec) is required; physical network isolation is an alternative for constrained deployments.
section: 5.1.3
topics:
    - security
