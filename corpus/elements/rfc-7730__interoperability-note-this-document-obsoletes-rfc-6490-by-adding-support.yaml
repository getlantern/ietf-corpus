document: rfc-7730
kind: interoperability-note
summary: This document obsoletes RFC 6490 by adding support for multiple URIs in a TAL. The TAL format is otherwise compatible with RFC 6490, extending it to allow the URI section to contain one or more rsync URIs.
section: "1"
topics:
