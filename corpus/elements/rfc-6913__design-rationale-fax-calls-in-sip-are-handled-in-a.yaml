document: rfc-6913
kind: design-rationale
summary: 'Fax calls in SIP are handled in a ''voice first'' manner: the call is set up as a voice call first, and only after connection does a switchover to T.38 occur. This means fax calls cannot be distinguished from voice calls at initiation, leading to misrouting to non-fax-capable UAs.'
section: "1"
topics:
    - sip
    - voip
