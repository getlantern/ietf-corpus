document: rfc-5610
kind: protocol-element
summary: 'The informationElementUnits Information Element (IE 345, unsigned16) describes the units of an IPFIX Information Element. Defined values range 0–12: none, bits, octets, packets, flows, seconds, milliseconds, microseconds, nanoseconds, 4-octet words, messages, hops, entries.'
