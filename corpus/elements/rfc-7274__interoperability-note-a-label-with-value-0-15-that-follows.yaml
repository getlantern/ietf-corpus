document: rfc-7274
kind: interoperability-note
summary: A label with value 0-15 that follows an XL does not retain its regular special-purpose meaning (with the sole exception of ELI/label 7). The XL context overrides normal interpretation, and most such values are illegal in that position.
section: "3.1"
