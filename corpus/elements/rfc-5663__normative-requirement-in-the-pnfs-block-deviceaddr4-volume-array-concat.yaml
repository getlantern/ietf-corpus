document: rfc-5663
kind: normative-requirement
summary: In the pnfs_block_deviceaddr4 volume array, concat, slice, and stripe volumes MUST refer to volumes defined by lower-indexed elements of the array. The array is ordered so that the root of the volume hierarchy is the last element.
section: 2.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
