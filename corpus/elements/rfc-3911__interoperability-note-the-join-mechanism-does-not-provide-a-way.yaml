document: rfc-3911
kind: interoperability-note
summary: The Join mechanism does not provide a way to match multiple dialogs, an entire call, an entire transaction, or to follow a chain of proxy forking logic — it matches exactly one dialog identified by call-id, to-tag, and from-tag.
