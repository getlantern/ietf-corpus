document: rfc-5663
kind: normative-requirement
summary: For LAYOUTRETURN with LAYOUTRETURN4_FILE_return type, the opaque lrf_body field MUST have length zero — there is no block-layout-specific return payload. Multiple LAYOUTRETURN operations within a single COMPOUND may be used to return disjoint file regions.
section: 2.3.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
