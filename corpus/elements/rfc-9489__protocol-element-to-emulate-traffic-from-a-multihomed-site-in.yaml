document: rfc-9489
kind: protocol-element
summary: To emulate traffic from a multihomed site in EVPN Echo Requests, an EVPN Ethernet A-D sub-TLV and an ESI Split Horizon Group MPLS label immediately preceding the GAL in the MPLS label stack are included. When using P2MP P-tree, the Split Horizon label is upstream assigned.
section: 6.2.2
topics:
    - mpls
    - routing
    - multicast
