document: rfc-5380
kind: design-rationale
summary: The MAP reduces signalling overhead by requiring only one binding update message from the mobile node when it moves within a MAP domain, regardless of the number of correspondent nodes. Only the RCoA (not the LCoA) needs to be registered with CNs and the HA, making intra-domain mobility transparent.
