document: rfc-1661
kind: design-rationale
summary: 'Configure-Nak and Configure-Reject serve distinct purposes despite causing the same automaton state transition: Configure-Nak refuses a specific option value and suggests an acceptable alternative, while Configure-Reject refuses all negotiation of an option (typically because it is unrecognized or administratively prohibited).'
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
