document: rfc-1532
kind: normative-requirement
summary: Hosts or routers supporting a BOOTP server MUST accept BOOTREQUEST messages with IP source 0.0.0.0 (overriding Martian filtering) and MUST silently discard any UDP message with destination port BOOTPC (68).
section: "5.1"
rfc2119_level: MUST
