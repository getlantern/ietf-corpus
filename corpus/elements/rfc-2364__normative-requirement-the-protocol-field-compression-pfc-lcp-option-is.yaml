document: rfc-2364
kind: normative-requirement
summary: The Protocol Field Compression (PFC) LCP option is NOT RECOMMENDED. The MRU option MUST NOT be negotiated to a size larger than the maximum CPCS-SDU size specified in the virtual connection's traffic contract.
section: "9"
rfc2119_level: MUST NOT
