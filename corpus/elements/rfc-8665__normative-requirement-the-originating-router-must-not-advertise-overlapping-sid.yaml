document: rfc-8665
kind: normative-requirement
summary: The originating router MUST NOT advertise overlapping SID/Label ranges. It MUST preserve the advertisement order across graceful restarts (via checkpointing or nonvolatile storage). Receiving routers MUST adhere to the advertised order when computing SID/label from an index.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
