document: rfc-5731
kind: normative-requirement
summary: Transfer of a domain object MUST implicitly transfer all host objects subordinate to the domain object. For example, transferring 'example.com' when 'ns1.example.com' exists MUST transfer the host object as part of the domain transfer.
section: 3.2.4
rfc2119_level: MUST
topics:
    - dns
