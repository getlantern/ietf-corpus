document: rfc-6116
kind: interoperability-note
summary: ENUM clients MUST support current NAPTR syntax (Section 3.4.3) and SHOULD also support the obsolete RFC 2916 syntax, as deployed zones may still contain old-format NAPTRs. ENUM clients MUST also handle non-E2U DDDS application identifiers without failure.
section: "5.2"
topics:
