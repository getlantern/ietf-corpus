document: rfc-7173
kind: design-rationale
summary: If a pseudowire supports fragmentation and reassembly, there is no reason to perform TRILL MTU testing on it, and the pseudowire will not constrain the TRILL campus-wide MTU size (Sz). This is because F&R is rarely deployed in practice.
section: "2.1"
topics:
