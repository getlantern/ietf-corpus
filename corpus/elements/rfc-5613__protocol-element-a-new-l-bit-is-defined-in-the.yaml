document: rfc-5613
kind: protocol-element
summary: A new L-bit is defined in the OSPF Options field (both OSPFv2 and OSPFv3 variants). Routers set the L-bit in Hello and DD packets to signal that the packet contains an LLS data block; the LLS block is only examined when this bit is set.
section: "2.1"
topics:
    - routing
