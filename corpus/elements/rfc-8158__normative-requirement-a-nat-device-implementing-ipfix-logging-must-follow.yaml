document: rfc-8158
kind: normative-requirement
summary: A NAT device implementing IPFIX logging MUST follow the IPFIX specification in RFC 7011. The NAT device will specify the template it is going to use for each event, and the Collector MUST support receiving multiple templates from the same source.
section: "4"
rfc2119_level: MUST
topics:
    - nat
    - registry
