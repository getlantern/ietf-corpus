document: rfc-3984
kind: protocol-element
summary: 'Three packetization modes are defined: Single NAL Unit Mode (packetization-mode=0, default) for H.241-compliant conversational systems; Non-Interleaved Mode (packetization-mode=1) for low-delay applications; and Interleaved Mode (packetization-mode=2) for systems tolerating higher latency. Each mode restricts which NAL unit types 24-29 are permitted.'
section: "5.4"
topics:
