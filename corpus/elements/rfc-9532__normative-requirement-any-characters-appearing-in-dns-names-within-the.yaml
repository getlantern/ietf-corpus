document: rfc-9532
kind: normative-requirement
summary: Any characters appearing in DNS names within the next-hop-aliases list that do not belong to the set of URI unreserved characters (RFC 3986 Section 2.3) MUST be percent-encoded as defined in RFC 3986 Section 2.1, to prevent commas or other special characters from causing incorrect parsing.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
