document: rfc-9218
kind: normative-requirement
summary: It is RECOMMENDED that servers respect the incremental parameter. Incremental responses of the same urgency SHOULD be served by sharing bandwidth among them rather than serializing. Servers are RECOMMENDED to avoid starvation when mixing incremental and non-incremental responses at the same urgency level.
section: "10"
rfc2119_level: RECOMMENDED
topics:
    - http
