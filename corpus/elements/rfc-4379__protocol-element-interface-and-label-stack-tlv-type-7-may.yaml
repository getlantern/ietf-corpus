document: rfc-4379
kind: protocol-element
summary: Interface and Label Stack TLV (Type 7) MAY be included in a reply to report the interface on which the echo request was received and the label stack as it was received. If any TTL values were changed by the reporting router, they SHOULD be restored. The Address Type field (1-4) distinguishes IPv4/IPv6 numbered/unnumbered interfaces.
section: "3.6"
topics:
    - mpls
