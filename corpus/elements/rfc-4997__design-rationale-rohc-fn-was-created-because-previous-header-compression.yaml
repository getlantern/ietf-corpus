document: rfc-4997
kind: design-rationale
summary: ROHC-FN was created because previous header compression profiles specified using English text combined with ASCII box notation were sometimes unclear and ambiguous, revealing limitations when defining complex structures and encodings for compressed formats. No other formal notation existed that met the requirements for rigorously defining both compressed and uncompressed formats and the relationships between them.
section: "1"
