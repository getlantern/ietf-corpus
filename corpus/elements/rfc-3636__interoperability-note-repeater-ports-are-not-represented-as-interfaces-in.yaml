document: rfc-3636
kind: interoperability-note
summary: Repeater ports are not represented as interfaces in the Interfaces MIB; only interface MAUs have a corresponding ifIndex. Agents implementing repeater-MAU objects must comply with RFC 2108 (802.3 Repeater MIB) but need not implement IF-MIB entries for repeater ports.
section: 3.4.1
topics:
