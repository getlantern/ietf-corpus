document: rfc-8829
kind: protocol-element
summary: The ICE candidate pool allows pre-gathering of candidates before setLocalDescription is called. When gathering starts, the JSEP implementation SHOULD use pool candidates first. The pool is used only for the first offer/answer exchange and is emptied afterward; pre-gathering consumes STUN/TURN resources.
section: 3.5.4
topics:
    - webrtc
    - realtime
