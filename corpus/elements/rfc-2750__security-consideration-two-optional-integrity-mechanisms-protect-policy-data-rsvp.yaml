document: rfc-2750
kind: security-consideration
summary: 'Two optional integrity mechanisms protect POLICY_DATA: RSVP-level integrity (RFC 2747/MD5) provides a chain of trust when all nodes are policy-capable; the INTEGRITY object within POLICY_DATA provides end-to-end integrity between non-neighboring PEPs traversing untrusted PIN nodes.'
