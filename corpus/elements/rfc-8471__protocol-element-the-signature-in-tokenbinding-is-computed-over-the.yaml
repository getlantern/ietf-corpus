document: rfc-8471
kind: protocol-element
summary: The signature in TokenBinding is computed over the concatenation of TokenBindingType, TokenBindingKeyParameters, and the EKM value from the current TLS connection. The EKM is exported using RFC 5705 with label 'EXPORTER-Token-Binding' (no NUL terminator), no application context, and length 32 bytes.
section: "3.3"
topics:
    - tls
    - crypto
