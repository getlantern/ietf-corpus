document: rfc-6121
kind: protocol-element
summary: 'Each roster <item/> element carries: ''jid'' (REQUIRED), ''name'' (OPTIONAL user-assigned handle, opaque to server), ''subscription'' (none/to/from/both/remove), ''ask'' (value ''subscribe'' signals Pending Out, server-generated), ''approved'' (boolean for subscription pre-approval, server-generated), and zero or more <group/> children.'
section: 2.1.2
