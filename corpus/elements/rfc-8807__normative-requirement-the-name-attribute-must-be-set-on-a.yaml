document: rfc-8807
kind: normative-requirement
summary: The "name" attribute MUST be set on a <loginSec:event> when the "type" attribute is "stat" or "custom". For type "cipher", "name" MUST be set with the cipher suite name; for "tlsProtocol", "name" MUST be set with the TLS protocol name.
section: "3.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
