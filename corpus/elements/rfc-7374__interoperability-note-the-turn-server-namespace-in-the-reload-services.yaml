document: rfc-7374
kind: interoperability-note
summary: The 'turn-server' namespace in the RELOAD Services Registry allows the ReDiR-based service discovery mechanism to be used as an alternative to the TURN server discovery mechanism already specified in the RELOAD base protocol (RFC 6940), providing backward-compatible co-existence.
