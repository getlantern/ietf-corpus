document: rfc-9733
kind: interoperability-note
summary: BRSKI-AE with CMP can be combined with Constrained BRSKI (cBRSKI), using CoAP for enrollment message transport as described by CoAP Transfer for CMP [RFC9482]. In such scenarios, the EST-specific parts of cBRSKI do not apply.
