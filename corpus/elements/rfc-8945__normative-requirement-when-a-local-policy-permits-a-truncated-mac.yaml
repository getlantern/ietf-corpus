document: rfc-8945
kind: normative-requirement
summary: When a local policy permits a truncated MAC for a given algorithm, it SHOULD also permit lesser truncation (longer MAC) up to full output length. A reply SHOULD carry a MAC at least as long as the MAC in the corresponding request.
section: "7"
rfc2119_level: SHOULD
topics:
    - dns
    - security
    - crypto
