document: rfc-2137
kind: normative-requirement
summary: The owner name of any update-authorizing KEY RR must either (1) be the same as the owner name of any RRs being added or deleted, or (2) be a wildcard name whose extended scope (with punch-through) includes the name of any RRs being added or deleted within the same zone.
section: 3.1.1
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
