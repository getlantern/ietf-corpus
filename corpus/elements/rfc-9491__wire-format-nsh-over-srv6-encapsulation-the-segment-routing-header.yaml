document: rfc-9491
kind: wire-format
summary: 'NSH over SRv6 encapsulation: the Segment Routing Header (SRH) precedes the NSH. The NSH is indicated by the IP protocol number for NSH (145) in the SRH Next Header field. The SRH contains the standard fields (Next Header, Hdr Ext Len, Routing Type, Segments Left, Last Entry, Flags, Tag, Segment List) followed by the NSH Base Header, Service Path Header, and optional variable-length context headers.'
section: "6.2"
topics:
    - routing
    - ip
