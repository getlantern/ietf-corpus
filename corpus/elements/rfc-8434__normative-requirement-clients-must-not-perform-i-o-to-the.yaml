document: rfc-8434
kind: normative-requirement
summary: Clients MUST NOT perform I/O to the storage device if they do not hold layouts for the files in question, MUST NOT perform I/O outside the specified ranges in the layout segment, and MUST NOT perform I/O inconsistent with the iomode specified in the layout segments they hold.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
