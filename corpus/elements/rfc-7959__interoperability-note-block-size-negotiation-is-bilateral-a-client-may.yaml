document: rfc-7959
kind: interoperability-note
summary: 'Block size negotiation is bilateral: a client may propose a size in the initial request; the server may respond with a smaller size. For Block2, subsequent requests MUST use the server''s chosen size. For Block1, the client SHOULD heed the server''s preference and may need to renumber blocks if the size decreases mid-transfer.'
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
