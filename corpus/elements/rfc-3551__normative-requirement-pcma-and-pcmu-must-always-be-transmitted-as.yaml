document: rfc-3551
kind: normative-requirement
summary: PCMA and PCMU MUST always be transmitted as 8-bit samples; the 56 kb/s and 48 kb/s modes of G.711 are not applicable to RTP. Each G.711 octet SHALL be octet-aligned in an RTP packet with the sign bit in the most significant bit position.
section: 4.5.14
rfc2119_level: MUST
topics:
    - rtp
    - realtime
