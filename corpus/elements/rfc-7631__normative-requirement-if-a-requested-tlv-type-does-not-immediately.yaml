document: rfc-7631
kind: normative-requirement
summary: If a requested TLV type does not immediately define all corresponding type extensions, a common name SHOULD NOT be assigned for that TLV type. This prevents future extensions from bearing an inappropriate inherited name.
section: "3.1"
rfc2119_level: SHOULD NOT
topics:
