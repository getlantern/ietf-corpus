document: rfc-9826
kind: security-consideration
summary: The YANG module imports ietf-netconf-acm (RFC 8341) to apply NACM annotations; security-sensitive nodes such as authentication keys and TLS configuration carry nacm:default-deny-all or nacm:default-deny-write to prevent unauthorized access via NETCONF/RESTCONF management interfaces.
section: "9"
topics:
