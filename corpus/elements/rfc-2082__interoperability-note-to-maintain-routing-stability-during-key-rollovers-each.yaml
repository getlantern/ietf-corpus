document: rfc-2082
kind: interoperability-note
summary: To maintain routing stability during key rollovers, each communicating RIP-2 system must be updated with the new key several minutes before the current key expires and before the new key lifetime begins. During the overlap period, a system may receive and authenticate messages using either key, selected by Key-ID.
section: "4.2"
topics:
    - routing
    - security
