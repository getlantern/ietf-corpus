document: rfc-4698
kind: privacy-consideration
summary: Internet address registries store contact details that may be abused. The XML schema makes all data elements optional in responses, allowing registries to control what is disclosed based on their policies. Combined with IRIS transport authentication, registries can implement authorization policies (e.g., restricting NOC contact email to authenticated members) without compromising general privacy.
section: A
topics:
    - privacy
    - registry
