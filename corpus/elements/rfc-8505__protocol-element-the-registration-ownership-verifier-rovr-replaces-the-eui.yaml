document: rfc-8505
kind: protocol-element
summary: The Registration Ownership Verifier (ROVR) replaces the EUI-64 field of the ARO. It is 64 bits for backward compatibility, or optionally 128, 192, or 256 bits; it need not be derived from a MAC address and may carry cryptographic tokens. The ROVR's scope is a single IPv6 Address registration and MUST NOT be used to correlate registrations of different addresses.
section: "5.3"
topics:
    - ip
    - v6ops
    - security
