document: rfc-6679
kind: protocol-element
summary: 'Three ECN initiation methods are defined: (1) using RTP probe packets with RTCP feedback (mandatory-to-implement), (2) using ECT-marked STUN within ICE for faster pre-media verification (optional), and (3) a leap-of-faith method assuming ECN works without pre-verification (optional, restricted use).'
section: "7.2"
topics:
