document: rfc-2342
kind: wire-format
summary: 'The NAMESPACE response has the form: ''* NAMESPACE'' followed by three Namespace fields (Personal, Other Users'', Shared). Each Namespace field is either NIL or a parenthesized list of namespace descriptors, each containing a prefix string and a hierarchy delimiter (quoted char or NIL), optionally followed by Namespace_Response_Extensions.'
