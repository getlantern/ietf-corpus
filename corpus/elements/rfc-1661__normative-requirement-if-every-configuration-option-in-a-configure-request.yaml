document: rfc-1661
kind: normative-requirement
summary: If every Configuration Option in a Configure-Request is recognizable and all values are acceptable, the implementation MUST transmit a Configure-Ack. The acknowledged options MUST NOT be reordered or modified in any way.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
