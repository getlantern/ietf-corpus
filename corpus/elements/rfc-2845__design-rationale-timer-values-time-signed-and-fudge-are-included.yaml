document: rfc-2845
kind: design-rationale
summary: Timer values (Time Signed and Fudge) are included in the digest to defend against replay attacks. Without this, an attacker could replay old messages by updating just the Time Signed and Fudge fields to make the message appear fresh.
section: "3.3"
topics:
    - dns
    - security
