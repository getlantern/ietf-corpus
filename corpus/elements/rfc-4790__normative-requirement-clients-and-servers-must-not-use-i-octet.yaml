document: rfc-4790
kind: normative-requirement
summary: Clients and servers MUST NOT use i;octet with protocols not based on octet-strings. If the protocol permits use of collations with non-string data structures, the protocol MUST describe the default behavior for such cases.
section: "5.7"
rfc2119_level: MUST NOT
