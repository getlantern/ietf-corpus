document: rfc-6389
kind: protocol-element
summary: The MPLS Context Label TLV (type 31) carries a <Source Address, MPLS Context Label> tuple, where the context label is upstream-assigned by Ru. When downstream LSRs look up this label combined with the incoming interface, this MUST be sufficient to uniquely determine Ru's context-specific label space.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
