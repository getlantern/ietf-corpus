document: rfc-1349
kind: normative-requirement
summary: A transport protocol MUST use the TOS requested by the application when sending a datagram. There is no requirement that both ends of a transport connection use the same TOS, and it is permissible to change the TOS mid-connection if the nature of traffic changes.
section: "5.2"
rfc2119_level: MUST
topics:
    - ip
    - tcp
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
