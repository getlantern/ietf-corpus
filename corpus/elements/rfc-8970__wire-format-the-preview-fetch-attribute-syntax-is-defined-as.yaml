document: rfc-8970
kind: wire-format
summary: 'The PREVIEW FETCH attribute syntax is defined as: fetch-att =/ "PREVIEW" [SP "(" preview-mod *(SP preview-mod) ")"]. The response uses msg-att-dynamic =/ "PREVIEW" SP nstring, where nstring allows NIL (only when LAZY is used). The only defined modifier is "LAZY".'
section: "6"
topics:
