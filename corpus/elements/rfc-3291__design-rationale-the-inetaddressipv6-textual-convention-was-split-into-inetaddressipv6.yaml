document: rfc-3291
kind: design-rationale
summary: 'The InetAddressIPv6 textual convention was split into InetAddressIPv6 (global) and InetAddressIPv6z (non-global with zone index), and InetAddressIPv4z was added. The motivations are: enabling a TC for non-global IPv4 addresses, alignment with transport address TCs, simpler compliance statements when zone index support is not required, and simpler host implementations that never need zone indices.'
