document: rfc-6823
kind: registry
summary: 'IANA created a new ''IS-IS GENINFO Application Identifiers'' registry. Identifiers are unsigned 16-bit numbers from 1 to 65535 (0 reserved). Registration procedure is Expert Review. Each entry must specify: ID value, description, whether allowed in Instance zero (Y/N), and reference specification.'
