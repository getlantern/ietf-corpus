document: rfc-5970
kind: design-rationale
summary: The Boot File URL option does not constrain the download protocol beyond requiring URL expressibility. HTTP (RFC 2616) is strongly recommended over TFTP for administrative simplicity; this supersedes RFC 906's recommendation of TFTP for IPv6 network boot, reflecting the maturity of HTTP as a transfer protocol.
section: "5"
topics:
