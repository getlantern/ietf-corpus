document: rfc-7577
kind: security-consideration
summary: Write access to the alarm threshold objects (batteryAlarmLowCharge, batteryAlarmLowVoltage, batteryAlarmLowCapacity, batteryAlarmHighCycleCount, batteryAlarmHighTemperature, batteryAlarmLowTemperature) allows an attacker to suppress critical alarms or set them to values that cause device shutdowns, data loss, or physical battery damage.
