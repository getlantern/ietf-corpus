document: rfc-7428
kind: normative-requirement
summary: A node MUST NOT compute the NodeID from the IID if the first 6 bytes of the IID do not comply with the format 0000:00ff:fe00; in that case, RFC 6775 address resolution mechanisms apply.
section: "4"
rfc2119_level: MUST NOT
