document: rfc-5189
kind: normative-requirement
summary: 'Access to policy rules is ownership-based: the owner is the authenticated agent that created the rule, and it does not change during the rule''s lifetime. All policy rules in a group must share the same owner, so an agent either has access to all members of a group or to none.'
section: 2.1.5
rfc2119_level: MUST
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
