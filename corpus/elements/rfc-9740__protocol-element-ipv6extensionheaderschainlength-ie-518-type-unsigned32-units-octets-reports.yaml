document: rfc-9740
kind: protocol-element
summary: ipv6ExtensionHeadersChainLength (IE 518, type unsigned32, units octets) reports the total byte length of an extension header chain observed in a Flow, as the sum of the lengths of all extension headers in the chain. Helps identify performance degradation caused by oversized extension header chains.
section: "3.6"
topics:
    - ip
