document: rfc-8887
kind: normative-requirement
summary: Before the WebSocket handshake, the client MUST perform a TLS handshake on the wss:// endpoint. If the TLS handshake fails, the client MUST close the connection.
section: "4.2"
rfc2119_level: MUST
