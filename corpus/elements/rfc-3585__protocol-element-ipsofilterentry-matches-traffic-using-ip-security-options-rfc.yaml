document: rfc-3585
kind: protocol-element
summary: 'IPSOFilterEntry matches traffic using IP Security Options (RFC 1108) header fields: MatchConditionType selects ClassificationLevel (1) or ProtectionAuthority (2); MatchConditionValue MUST be a value from RFC 1108 (e.g., ClassificationLevel: TopSecret=61, Secret=90, Confidential=150, Unclassified=171). Used to adjust IPsec encryption strength according to traffic classification.'
section: "5.4"
topics:
    - ipsec
    - security
