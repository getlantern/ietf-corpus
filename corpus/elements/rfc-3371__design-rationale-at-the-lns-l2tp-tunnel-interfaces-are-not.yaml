document: rfc-3371
kind: design-rationale
summary: 'At the LNS, L2TP tunnel interfaces are not at the top of the ifStack because PPP interfaces are layered on top; at the LAC, tunnel interfaces appear at the top of the stack. This asymmetry reflects the role difference: LNS terminates PPP sessions while LAC originates them.'
section: 3.1.1
topics:
