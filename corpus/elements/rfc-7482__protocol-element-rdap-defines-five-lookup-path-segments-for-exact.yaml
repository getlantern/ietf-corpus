document: rfc-7482
kind: protocol-element
summary: 'RDAP defines five lookup path segments for exact-match queries: ''ip'' (IP networks), ''autnum'' (Autonomous System numbers), ''domain'' (reverse DNS or domain names), ''nameserver'' (nameserver host names), and ''entity'' (contact/registrant/registrar identifiers). A sixth segment ''help'' retrieves server capability information.'
section: "3.1"
topics:
