document: rfc-735
kind: normative-requirement
summary: The LITERAL subcommand cannot be used during Telnet subcommands, since Telnet subcommands are defined to end with the next occurrence of IAC SE; including a BM LITERAL subcommand inside another subcommand would prematurely terminate the containing subcommand.
section: "2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
