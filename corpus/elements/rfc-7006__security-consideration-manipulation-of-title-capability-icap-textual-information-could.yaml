document: rfc-7006
kind: security-consideration
summary: Manipulation of title capability ('icap') textual information could provide false information to users, leading to wrong choices regarding available media streams. If protecting capability attribute values is essential, one of the security mechanisms proposed in RFC 5939 SHOULD be used.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - realtime
