summary: 'The Bandwidth Profile TLV Profile field is an 8-bit flag vector: bit 0 is the Coupling Flag (CF) selecting between two rate enforcement algorithm modes, and bit 1 is the Color Mode (CM) flag indicating color-blind (0) or color-aware (1) operation per MEF10.2.'
