document: rfc-1116
kind: protocol-element
summary: 'Three new Telnet control characters are defined: IAC EOF (236) signals end-of-file to the process; IAC SUSP (237) suspends the current process so another may take control; IAC ABORT (238) aborts or terminates the connected process, distinguished from IAC IP which may also suspend.'
