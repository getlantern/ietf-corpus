document: rfc-5607
kind: interoperability-note
summary: 'The attributes defined in this document can be used directly as Diameter AVPs from the RADIUS compatibility code space (1-255) with no special translation. Data types map as: Framed-Management-Protocol → Enumerated, Management-Policy-Id → UTF8String, Management-Privilege-Level → Integer; all carry M-bit MUST and P-bit MAY flags.'
