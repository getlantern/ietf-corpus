document: rfc-3175
kind: normative-requirement
summary: The aggregating router MUST change the IP Protocol number of E2E Path, PathTear, and ResvConf messages from RSVP (46) to RSVP-E2E-IGNORE (134) when forwarding them onto interior interfaces of the aggregation region.
section: "2.1"
rfc2119_level: MUST
