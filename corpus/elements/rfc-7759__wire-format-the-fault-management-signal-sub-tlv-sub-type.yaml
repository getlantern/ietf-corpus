document: rfc-7759
kind: wire-format
summary: The Fault Management Signal Sub-TLV (sub-type 300) encodes E (AIS/LKR enable, default 1), S (server MEP subscription, default 0), and T (timer enable, default 0) flags, a 13-bit reserved field, and a 9-bit Refresh Timer (1-20 seconds per RFC 6427). It MAY contain a Traffic Class sub-TLV.
section: 2.2.9
topics:
