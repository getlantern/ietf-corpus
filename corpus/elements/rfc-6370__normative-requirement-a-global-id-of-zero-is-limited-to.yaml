document: rfc-6370
kind: normative-requirement
summary: A Global_ID of zero is limited to entities contained within a single operator and MUST NOT be used across an NNI. ASN 0 is reserved and cannot be assigned to an operator.
section: "3"
rfc2119_level: MUST NOT
