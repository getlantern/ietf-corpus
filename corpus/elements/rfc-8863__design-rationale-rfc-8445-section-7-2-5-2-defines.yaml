document: rfc-8863
kind: design-rationale
summary: RFC 8445 Section 7.2.5.2 defines conditions under which a candidate pair fails well before the connectivity check transaction timeout — for example, a check to a non-routable address that immediately receives an ICMP error — leaving only failed pairs in the checklist and triggering premature failure.
section: "3.3"
topics:
