document: rfc-7714
kind: wire-format
summary: The 12-octet SRTP IV for AES-GCM is formed by concatenating 2 zero octets, the 4-octet SSRC, the 4-octet Rollover Counter (ROC), and the 2-octet sequence number (SEQ), then XORing the 12-octet result with the 12-octet encryption salt.
section: "8.1"
topics:
