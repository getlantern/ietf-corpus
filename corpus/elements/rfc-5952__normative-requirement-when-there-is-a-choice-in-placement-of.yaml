document: rfc-5952
kind: normative-requirement
summary: When there is a choice in placement of '::', the longest run of consecutive 16-bit 0 fields MUST be shortened. When runs are equal length, the first sequence MUST be shortened. For example, 2001:db8::1:0:0:1 is the correct representation of 2001:db8:0:0:1:0:0:1.
section: 4.2.3
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
