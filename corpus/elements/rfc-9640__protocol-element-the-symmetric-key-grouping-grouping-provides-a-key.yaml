document: rfc-9640
kind: protocol-element
summary: 'The ''symmetric-key-grouping'' grouping provides a ''key-format'' identityref and a three-way choice: ''cleartext-symmetric-key'' (binary), ''hidden-symmetric-key'' (type empty, not exportable via management interfaces), or ''encrypted-symmetric-key'' (uses encrypted-value-grouping). Each case is gated by a corresponding feature statement.'
