document: rfc-6422
kind: design-rationale
summary: The server preference for the innermost RSOO value (relay agent closest to the client) as the default conflict-resolution rule reflects the principle that the relay agent with the most direct knowledge of the client's network attachment is most authoritative for client-facing options.
