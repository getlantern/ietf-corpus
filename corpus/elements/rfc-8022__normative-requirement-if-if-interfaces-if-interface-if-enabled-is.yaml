document: rfc-8022
kind: normative-requirement
summary: If '/if:interfaces/if:interface/if:enabled' is set to false, all routing and forwarding functions MUST be disabled on that interface. Similarly, setting 'ip:ipv4/ip:enabled' or 'ip:ipv6/ip:enabled' to false MUST disable all IPv4 or IPv6 routing and forwarding on that interface.
section: "6.1"
rfc2119_level: MUST
topics:
    - yang
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
