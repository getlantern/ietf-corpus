document: rfc-3931
kind: normative-requirement
summary: The recipient of a StopCCN MUST send an ACK message and maintain enough control connection state to properly accept StopCCN retransmissions over at least a full retransmission cycle (recommended at least 31 seconds).
section: 3.3.2
rfc2119_level: MUST
