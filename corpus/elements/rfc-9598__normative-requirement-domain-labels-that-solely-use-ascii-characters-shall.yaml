document: rfc-9598
kind: normative-requirement
summary: Domain labels that solely use ASCII characters SHALL use NR-LDH restrictions as specified by Section 2.3.1 of RFC 5890. All NR-LDH and A-label labels that constitute the domain part SHALL only be encoded with lowercase letters to facilitate octet-for-octet comparisons.
section: "3"
rfc2119_level: SHALL
topics:
