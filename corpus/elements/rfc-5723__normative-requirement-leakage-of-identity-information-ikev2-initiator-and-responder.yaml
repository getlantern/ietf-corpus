document: rfc-5723
kind: normative-requirement
summary: Leakage of identity information (IKEv2 initiator and responder identities) from the opaque ticket state MUST be avoided. The ticket MUST be presented to the responder only once to prevent linkability.
section: "9.10"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - privacy
