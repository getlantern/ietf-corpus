kind: protocol-element
summary: The vplsPwBindTable links VPLS instances to pseudowires. Each entry specifies vplsPwBindConfigType (manual or autodiscovery) and vplsPwBindType (mesh or spoke), both of which must be specified at row creation and cannot be changed while active.
