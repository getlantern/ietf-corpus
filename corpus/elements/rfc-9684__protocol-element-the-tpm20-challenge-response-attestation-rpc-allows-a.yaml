document: rfc-9684
kind: protocol-element
summary: The tpm20-challenge-response-attestation RPC allows a Verifier to request signed TPM PCRs from a TPM 2.0 cryptoprocessor. Input includes a nonce, PCR bank selection with hash algorithm, and optional certificate name(s); output includes TPMS_QUOTE_INFO, quote-signature, optional unsigned PCR values, and uptime.
section: 2.1.1.3.2
