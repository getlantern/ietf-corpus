document: rfc-5801
kind: normative-requirement
summary: Authentication MUST NOT succeed if GSS_Init/Accept_sec_context returns anything other than GSS_S_CONTINUE_NEEDED or GSS_S_COMPLETE, if the GS2 header does not match the ABNF, or if authorization of the client principal to the requested authzid fails.
section: "7"
rfc2119_level: MUST NOT
topics:
