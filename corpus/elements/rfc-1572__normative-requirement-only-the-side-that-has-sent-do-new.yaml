document: rfc-1572
kind: normative-requirement
summary: Only the side that has sent DO NEW-ENVIRON may initiate a SEND command requesting environment variables. Only the side that has sent WILL NEW-ENVIRON may transmit actual environment data via IS or INFO commands.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
