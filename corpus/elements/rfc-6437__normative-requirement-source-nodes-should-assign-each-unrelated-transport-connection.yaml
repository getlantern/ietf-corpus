document: rfc-6437
kind: normative-requirement
summary: Source nodes SHOULD assign each unrelated transport connection and application data stream to a new flow, and SHOULD set the flow label field for all packets of a given flow to the same value chosen from an approximation to a discrete uniform distribution.
