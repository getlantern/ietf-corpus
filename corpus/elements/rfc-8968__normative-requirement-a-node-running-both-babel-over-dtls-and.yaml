document: rfc-8968
kind: normative-requirement
summary: A node running both Babel over DTLS and unprotected Babel MUST ensure that it runs them on separate interfaces, as the security properties of Babel over DTLS rely on ignoring unprotected Babel packets other than Multicast Hellos.
section: "2.6"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
