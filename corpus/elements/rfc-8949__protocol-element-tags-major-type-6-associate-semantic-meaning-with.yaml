document: rfc-8949
kind: protocol-element
summary: 'Tags (major type 6) associate semantic meaning with an enclosed data item via a registered tag number. Key tag numbers from RFC 7049 include: 0 (RFC 3339 date/time string), 1 (epoch-based date/time), 2/3 (unsigned/negative bignum), 4/5 (decimal fraction/bigfloat), 24 (embedded CBOR), 21–23 (expected base64url/base64/base16), 55799 (self-described CBOR).'
section: "3.4"
