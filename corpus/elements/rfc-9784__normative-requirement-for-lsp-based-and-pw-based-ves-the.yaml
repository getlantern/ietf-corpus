document: rfc-9784
kind: normative-requirement
summary: For LSP-based and PW-based vES, the non-DF PE SHOULD signal PW-status 'standby' to the Aggregation PE, applicable where there is a one-to-one mapping between EVI and the PW. A new DF PE MAY send an LDP MAC withdraw message as a MAC address flush notification.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
