document: rfc-9103
kind: normative-requirement
summary: An AXFR-over-TCP server compliant with this specification MUST be able to handle multiple concurrent AXFR sessions on a single TCP connection. Response streams for concurrent AXFRs MAY be intermingled, and pipelining clients MUST be able to handle intermingled responses.
section: "6.2"
rfc2119_level: MUST
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
