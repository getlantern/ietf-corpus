document: rfc-7450
kind: normative-requirement
summary: 'The P flag in the Request message determines the protocol the relay MUST use in the query response: P=0 means the relay MUST respond with an IPv4/IGMPv3 General Query; P=1 means the relay MUST respond with an IPv6/MLDv2 General Query.'
section: 5.1.3.4
rfc2119_level: MUST
topics:
    - multicast
    - udp
