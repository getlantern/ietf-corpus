document: rfc-6581
kind: wire-format
summary: Enhanced MPA Request/Reply Frame uses a 16-byte Key field (ASCII 'MPA ID Req Frame' or 'MPA ID Rep Frame'), followed by a flags byte (M, C, R, S bits), a Rev byte, and a 16-bit PD_Length field. The new 'S' bit in the previously reserved 'Res' field signals that Private Data begins with enhanced RDMA connection establishment data.
section: "6"
topics:
