document: rfc-9002
kind: normative-requirement
summary: When persistent congestion is declared — all packets sent between two lost ack-eliciting packets over a duration exceeding (smoothed_rtt + max(4*rttvar, kGranularity) + max_ack_delay) * kPersistentCongestionThreshold are unacknowledged — the congestion window MUST be reduced to kMinimumWindow (recommended 2 * max_datagram_size).
section: 7.6.2
rfc2119_level: MUST
topics:
    - quic
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
