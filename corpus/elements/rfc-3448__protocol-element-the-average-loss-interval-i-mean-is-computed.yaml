document: rfc-3448
kind: protocol-element
summary: 'The average loss interval I_mean is computed over the n most recent loss event intervals (recommended n=8) using linearly decreasing weights: w_i=1 for i<n/2 and w_i=1-(i-(n/2-1))/(n/2+1) otherwise. The loss event rate p = 1/I_mean.'
