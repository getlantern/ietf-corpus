document: rfc-8070
kind: normative-requirement
summary: If the realm requires freshness and the PA_PK_AS_REQ does not contain a freshness token, the KDC MUST return a KRB_ERROR with error-code KDC_ERR_PREAUTH_FAILED and include a valid PA_AS_FRESHNESS padata-value.
section: "2.4"
rfc2119_level: MUST
topics:
    - security
