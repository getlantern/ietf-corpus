document: rfc-2529
kind: protocol-element
summary: IPv6 multicast is mapped to IPv4 multicast addresses in the 239.192.0.0/16 block (Organization-Local Scope). The OLS octet SHOULD be 192. If the /16 block is exhausted, expansion blocks from RFC 2365 (using only a /16 sized sub-block) may be used.
section: "6"
topics:
