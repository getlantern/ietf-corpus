document: rfc-5568
kind: wire-format
summary: 'Link-Layer Address (LLA) Option (ND option, Type 19): variable-length LLA field, padded to 8-octet boundary. Option-Code values 0–7 encode wildcard (0), new AP LLA (1), MN LLA (2), NAR LLA (3), source LLA (4), same-interface AP (5), no-prefix-info (6), no-fast-handover-support (7).'
