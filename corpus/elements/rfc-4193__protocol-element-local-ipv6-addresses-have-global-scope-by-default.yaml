document: rfc-4193
kind: protocol-element
summary: Local IPv6 addresses have global scope by default—they are not ambiguous like deprecated site-local addresses. Their limitation is routability (restricted to a site and explicit inter-site agreements), not addressing scope. A site may have multiple such prefixes simultaneously.
section: "3.3"
topics:
