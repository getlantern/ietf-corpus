document: rfc-1374
kind: design-rationale
summary: The 68-burst per-connection limit exists to ensure fair-share access among multiple Sources contending for a single Destination; without such a limit, the Source sending the most data per connection would capture the greatest share of bandwidth.
section: Rules For Connections
