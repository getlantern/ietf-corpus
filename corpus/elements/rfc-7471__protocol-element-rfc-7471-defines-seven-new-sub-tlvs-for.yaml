document: rfc-7471
kind: protocol-element
summary: 'RFC 7471 defines seven new sub-TLVs for the OSPF TE Link TLV: Unidirectional Link Delay (type 27), Min/Max Unidirectional Link Delay (type 28), Unidirectional Delay Variation (type 29), Unidirectional Link Loss (type 30), Unidirectional Residual Bandwidth (type 31), Unidirectional Available Bandwidth (type 32), and Unidirectional Utilized Bandwidth (type 33). These sub-TLVs distribute network performance information within OSPFv2 and OSPFv3 TE LSAs. All metrics are unidirectional, representing the forward path from the advertising node to its neighbor.'
section: "3"
topics:
    - routing
    - mpls
    - measurement
