document: rfc-3863
kind: normative-requirement
summary: A PIDF document MUST have the XML declaration and SHOULD contain an encoding declaration. Every conformant application MUST accept UTF-8 character encoding to ensure minimal interoperability.
section: "4.1"
rfc2119_level: MUST
