document: rfc-5723
kind: security-consideration
summary: A stolen 'ticket by value' cannot be used by an attacker to resume a session because the ticket contents are encrypted and the attacker cannot prove knowledge of the secret IKE state during IKE_AUTH. The responder MUST use strong encryption and integrity protection on the ticket.
section: "9.1"
topics:
    - ipsec
    - security
    - crypto
