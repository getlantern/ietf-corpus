document: rfc-5452
kind: design-rationale
summary: 'A crypto-strength (pseudo-)random number generator is required rather than a simple increment or weak PRNG because weak generators expose internal state: an attacker observing several sequential ''random'' values can predict future ones, effectively reducing the ID space to near zero.'
