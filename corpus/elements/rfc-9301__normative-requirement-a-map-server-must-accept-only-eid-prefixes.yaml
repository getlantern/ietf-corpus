document: rfc-9301
kind: normative-requirement
summary: A Map-Server MUST accept only EID-Prefixes that are pre-configured for each registering ETR. Failure to enforce this check leaves the Mapping System vulnerable to trivial EID-Prefix hijacking attacks.
section: "8.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
