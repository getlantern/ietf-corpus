document: rfc-3986
kind: protocol-element
summary: 'The host subcomponent is one of: an IP-literal (IPv6 or IPvFuture address enclosed in "[" and "]"), an IPv4address in dotted-decimal form, or a reg-name. The first-match-wins rule disambiguates IPv4address from reg-name. IPv6 literals are the only context where square brackets are allowed in URI syntax.'
section: 3.2.2
topics:
    - ip
    - dns
