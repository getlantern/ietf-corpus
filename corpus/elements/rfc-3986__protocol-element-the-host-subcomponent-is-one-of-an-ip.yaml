document: rfc-3986
kind: protocol-element
summary: 'The host subcomponent is one of: an IP literal (IPv6 or IPvFuture) enclosed in square brackets, an IPv4 address in dotted-decimal form, or a registered name: host = IP-literal / IPv4address / reg-name. The host subcomponent is case-insensitive. Disambiguation uses a first-match-wins rule.'
section: 3.2.2
topics:
