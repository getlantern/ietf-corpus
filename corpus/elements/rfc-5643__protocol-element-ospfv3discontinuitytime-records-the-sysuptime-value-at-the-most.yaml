document: rfc-5643
kind: protocol-element
summary: ospfv3DiscontinuityTime records the sysUpTime value at the most recent counter discontinuity event such as an OSPFv3 process restart. Management entities reading MIB counters should consult this object to determine whether counter values remain valid.
