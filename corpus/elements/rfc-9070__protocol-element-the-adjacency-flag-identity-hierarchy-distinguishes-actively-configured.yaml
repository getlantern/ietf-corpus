summary: The 'adjacency-flag' identity hierarchy distinguishes actively configured adjacencies (adjacency-flag-active) from passively accepted ones (adjacency-flag-passive). A hello-adjacency may carry both flags simultaneously, visible in the 'flag' leaf-list of adjacency state.
