document: rfc-9908
kind: normative-requirement
summary: In a CertificationRequestInfoTemplate, the 'subject' field MUST be present if the server places any requirements on RDNs of the subject name; otherwise it MUST be absent. An RDN type that the client must include MUST appear in the 'subject' field; absent RDN types MUST be omitted.
section: "3.4"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
