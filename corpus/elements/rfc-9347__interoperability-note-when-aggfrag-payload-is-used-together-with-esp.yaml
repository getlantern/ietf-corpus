document: rfc-9347
kind: interoperability-note
summary: When AGGFRAG_PAYLOAD is used together with ESP replay detection, the replay window and the reorder window MAY both be reduced to the smaller of the two window sizes, since packets outside the smaller window would be dropped anyway. However, there is no requirement to unify them.
section: 2.2.3
topics:
    - ipsec
    - vpn
    - security
