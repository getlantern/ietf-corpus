document: rfc-5658
kind: protocol-element
summary: 'The double Record-Routing technique consists of inserting two Record-Route headers before any existing ones: the first URI reflects the input interface (including scheme and/or URI parameters), and the second reflects the output interface. No modification of the recorded route is required when processing responses, and it is fully backward compatible with RFC 3261.'
section: "5"
