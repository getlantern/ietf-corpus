document: rfc-5552
kind: security-consideration
summary: Exposing a VoiceXML media service at a well-known address increases exploitation risk (e.g., triggering billing events). The VoiceXML Media Server is RECOMMENDED to authenticate requesting endpoints and authorize per local policy using standard SIP mechanisms (RFC 3261). To mitigate DoS attacks, it is RECOMMENDED to time-limit VoiceXML application execution.
section: "9"
topics:
    - sip
    - security
    - voip
