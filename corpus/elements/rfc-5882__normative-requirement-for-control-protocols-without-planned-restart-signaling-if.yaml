document: rfc-5882
kind: normative-requirement
summary: For control protocols without planned restart signaling, if the restart is planned, an implementation MAY adjust BFD session timing parameters so that the Detection Time exceeds the restart period. The restarting system SHOULD NOT send any BFD Control packets until there is a high likelihood that neighbors know a Graceful Restart is taking place.
section: 4.3.2.2
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
