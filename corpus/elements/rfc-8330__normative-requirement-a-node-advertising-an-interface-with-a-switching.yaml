document: rfc-8330
kind: normative-requirement
summary: A node advertising an interface with a Switching Capability that supports variable discrete bandwidth SHOULD contain one or more Availability SCSI-TLVs in its OSPF-TE LSA messages, each providing bandwidth capacity for a specified availability level.
section: "4.2"
rfc2119_level: SHOULD
