document: rfc-3687
kind: protocol-element
summary: OpenAssertionType (OID 1.2.36.79672281.1.5.3) is a placeholder LDAP syntax semantically equivalent to an omitted SYNTAX field in an X.500 MATCHING-RULE; it signals that the assertion syntax is determined at use time by the target attribute's syntax. It MUST NOT be used as an attribute syntax.
section: "6.1"
topics:
    - ldap
