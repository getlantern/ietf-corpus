document: rfc-8766
kind: normative-requirement
summary: The SOA SERIAL field MUST be zero for Discovery Proxy zones. The MINIMUM field (negative cache TTL) SHOULD be 10. MNAME SHOULD be the Discovery Proxy's host name, RNAME SHOULD be the responsible mailbox.
section: "6.1"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
