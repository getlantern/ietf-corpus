document: rfc-8979
kind: security-consideration
summary: The presence of multiple Subscriber Identifier Context Headers in the same NSH allows a misbehaving node to bind these identifiers to the same subscriber for tracking. Use of non-persistent randomized identifiers and removal of headers by the last SF that uses them mitigates this risk.
section: "7"
topics:
    - security
    - privacy
