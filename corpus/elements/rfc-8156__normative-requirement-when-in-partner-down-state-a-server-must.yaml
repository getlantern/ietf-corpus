document: rfc-8156
kind: normative-requirement
summary: When in PARTNER-DOWN state, a server MUST allocate new leases only from its own pool and MUST NOT use its partner's pool for new IPv6 address leases. During COMMUNICATIONS-INTERRUPTED, an operational partner MAY extend existing address leases but MUST NOT lease addresses that were assigned to its downed partner and later expired or were released.
section: 4.2.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
