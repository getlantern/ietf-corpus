document: rfc-2598
kind: protocol-element
summary: The EF PHB is not a mandatory part of the Differentiated Services architecture; a node is not required to implement the EF PHB to be DS-compliant. However, when a DS-compliant node claims to implement EF PHB, the implementation must conform to this specification.
