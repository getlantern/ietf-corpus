document: rfc-6876
kind: normative-requirement
summary: All PT-TLS implementations compliant with this specification MUST at least support the PLAIN SASL mechanism (RFC 4616). Implementations MUST provide the EXTERNAL SASL mechanism if both parties authenticated during TLS establishment. Implementations MUST also support the case where no client authentication is required.
section: 3.8.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
