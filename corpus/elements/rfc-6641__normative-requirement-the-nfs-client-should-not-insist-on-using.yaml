document: rfc-6641
kind: normative-requirement
summary: The NFS client SHOULD NOT insist on using a writable copy of the domain root file system if read-only copies exist, nor a zero-age copy over one that is slightly older, in order to minimize server overhead.
section: "4.2"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
