document: rfc-2873
kind: normative-requirement
summary: TCP must ignore the precedence of all received segments. During synchronization, both ends must ignore the precedence fields of SYN and SYN ACK packets, and a connection must be established if all RFC 793 conditions are satisfied except precedence.
section: "4"
rfc2119_level: MUST
topics:
    - tcp
    - ip
    - diffserv
