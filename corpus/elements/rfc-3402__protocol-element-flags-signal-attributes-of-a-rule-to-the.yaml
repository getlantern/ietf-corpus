document: rfc-3402
kind: protocol-element
summary: Flags signal attributes of a Rule to the Application, including whether the Rule is terminal. Flags are unique across Applications; one Application cannot redefine a Flag used by another Application, though it may reference another Application's flag definition.
section: "3.1"
