document: rfc-1904
kind: protocol-element
summary: The CREATION-REQUIRES clause in a VARIATION names the columnar objects to which values must be explicitly assigned (via a Set operation) before the agent will allow a row's status column to be set to 'active'. All named columnar objects in this clause must have read-create access.
section: 6.5.2.4
