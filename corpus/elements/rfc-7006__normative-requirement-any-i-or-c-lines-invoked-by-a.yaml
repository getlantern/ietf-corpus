document: rfc-7006
kind: normative-requirement
summary: Any 'i=' or 'c=' lines invoked by a configuration MUST replace the corresponding line, if present within the media description. Any 'b=' line invoked by a configuration MUST replace any 'b=' of the same bandwidth type at the media level, but not at the session level.
section: "4"
rfc2119_level: MUST
topics:
