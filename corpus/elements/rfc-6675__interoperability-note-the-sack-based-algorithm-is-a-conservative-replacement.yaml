document: rfc-6675
kind: interoperability-note
summary: The SACK-based algorithm is a conservative replacement for fast recovery (RFC 5681) and can be safely used alongside standard TCP congestion control. Alternate SACK-based loss recovery methods may be used as long as they follow RFC 5681 guidelines.
section: "1"
topics:
    - tcp
    - congestion
