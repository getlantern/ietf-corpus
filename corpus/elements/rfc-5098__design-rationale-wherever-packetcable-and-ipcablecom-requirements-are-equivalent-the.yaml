document: rfc-5098
kind: design-rationale
summary: Wherever PacketCable and IPCablecom requirements are equivalent, the PacketCable reference is used in REFERENCE clauses as a convention. IPCablecom-compliant MTA devices MUST use the equivalent IPCablecom references. This avoids duplicating normative text while maintaining compliance with both ecosystems.
section: "4"
rfc2119_level: MUST
