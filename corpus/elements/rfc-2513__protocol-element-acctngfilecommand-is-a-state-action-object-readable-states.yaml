document: rfc-2513
kind: protocol-element
summary: 'acctngFileCommand is a state/action object: readable states are idle(1) and cmdInProgress(2); writable actions are swapToNewFile(3) (terminates current file and begins a new one) and collectNow(4) (immediately stores records for all qualifying active connections). Writing is only permitted when the value is ''idle''.'
