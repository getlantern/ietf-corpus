document: rfc-8851
kind: design-rationale
summary: Future RTP payload format registrations whose parameters match RID restrictions SHOULD name those parameters to match the RID restriction names and SHOULD explicitly state how fmtp parameters relate to RID restrictions, to enable consistent codec-agnostic negotiation.
