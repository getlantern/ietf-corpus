document: rfc-3229
kind: design-rationale
summary: 'The HTTP message-generation sequence is formalized as: resource → variant → instance (with entity tag assigned) → entity-body (after instance-manipulation) → message-body (after transfer-coding). Delta encoding is explicitly an instance-manipulation applied after the entity tag is assigned.'
