summary: If a PCELS application requires functionality provided by PCLS base classes (pcimPolicy, pcimRuleConditionAssociation, pcimRuleActionAssociation, pcimConditionAuxClass, pcimActionAuxClass, pcimRepository), those PCLS classes MUST also be supported by PCELS implementations.
