document: rfc-7543
kind: normative-requirement
summary: 'If the ROUTE-REFRESH AFI is equal to L2VPN, the Route Type MUST be one of: 1 (Ethernet Autodiscovery Route), 2 (MAC/IP Advertisement Route), 3 (Inclusive Multicast Route), or 4 (Ethernet Segment), taken from the IANA EVPN Registry.'
section: "2"
rfc2119_level: MUST
topics:
