document: rfc-8028
kind: normative-requirement
summary: Hosts SHOULD apply off-link redirects only for the specific pair of source and destination addresses concerned, so the host's Destination Cache might need source-specific entries. This extends the validity check in Section 8.1 of RFC 4861.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
