document: rfc-3031
kind: protocol-element
summary: Label Retention Mode is either Liberal (bindings from non-next-hop LSRs are retained for faster rerouting on topology change) or Conservative (such bindings are discarded, requiring fewer labels). Liberal mode adapts faster to routing changes; conservative mode minimizes label table size.
section: "3.8"
topics:
    - routing
