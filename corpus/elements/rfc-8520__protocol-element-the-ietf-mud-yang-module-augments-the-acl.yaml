document: rfc-8520
kind: protocol-element
summary: 'The ietf-mud YANG module augments the ACL model with MUD-specific match abstractions: manufacturer (host matching authority of another Thing''s MUD URL), same-manufacturer (null-valued, matches same authority), model (matches entire MUD URL), local-networks (null-valued, expands to local addresses), controller (URI naming a registered class), and my-controller (null-valued, matches configured controllers for this MUD URL).'
section: "4"
topics:
