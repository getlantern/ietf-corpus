summary: 'assocApplicationType is an INTEGER with four values: ua-initiator(1), ua-responder(2), peer-initiator(3), peer-responder(4), distinguishing whether the remote end is a user agent or peer, and whether it initiated or responded to the connection. MTAs and messaging gateways are classified as peers.'
