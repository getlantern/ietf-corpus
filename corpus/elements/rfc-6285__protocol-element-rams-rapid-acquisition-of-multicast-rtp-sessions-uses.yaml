document: rfc-6285
kind: protocol-element
summary: RAMS (Rapid Acquisition of Multicast RTP Sessions) uses a unicast RTP burst session carrying Reference Information, formatted as RTP retransmission packets per RFC 4588, to precede or accompany a primary multicast RTP session. The burst may be transmitted at faster than natural bitrate, allowing the receiver to acquire Reference Information quickly before or during multicast join.
section: "6.1"
topics:
    - rtp
    - multicast
    - realtime
