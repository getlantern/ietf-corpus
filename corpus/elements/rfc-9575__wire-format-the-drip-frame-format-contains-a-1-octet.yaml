document: rfc-9575
kind: wire-format
summary: The DRIP Frame format contains a 1-octet Frame Type field followed by up to 111 octets of Frame Evidence Data, all encapsulated in the UA-Signed Evidence Structure. At publication only an Experimental range (0xF0–0xFF) is defined; Frame Type content is left to future specifications.
