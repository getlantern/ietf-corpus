document: rfc-4511
kind: design-rationale
summary: ASN.1 extensibility is implied where allowed by ASN.1 (SEQUENCE, SET, CHOICE, and enumerated types), and explicit ellipses (...) mark explicitly extensible types. This design allows forward-compatible protocol extensions without incrementing the version number, avoiding the need for version negotiation on each new extension.
