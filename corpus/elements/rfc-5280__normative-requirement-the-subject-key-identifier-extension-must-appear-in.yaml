document: rfc-5280
kind: normative-requirement
summary: The subject key identifier extension MUST appear in all conforming CA certificates (those with basicConstraints cA=TRUE). The value MUST match the keyIdentifier placed in the authorityKeyIdentifier of certificates issued by this CA. MUST be marked non-critical.
section: 4.2.1.2
rfc2119_level: MUST
