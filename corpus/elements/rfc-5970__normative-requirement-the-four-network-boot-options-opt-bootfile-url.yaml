document: rfc-5970
kind: normative-requirement
summary: The four network boot options (OPT_BOOTFILE_URL, OPT_BOOTFILE_PARAM, OPTION_CLIENT_ARCH_TYPE, OPTION_NII) MUST NOT appear in DHCPv6 messages other than Solicit, Advertise, Request, Renew, Rebind, Information-Request, and Reply.
section: "4"
rfc2119_level: MUST NOT
