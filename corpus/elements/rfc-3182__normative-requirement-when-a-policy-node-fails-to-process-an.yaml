document: rfc-3182
kind: normative-requirement
summary: When a policy node fails to process an AUTH_DATA element, it SHOULD insert a POLICY_ERROR_OBJECT with the appropriate ErrorValue into a PATH_ERROR or RESV_ERROR message. The AUTH_DATA in PATH or RESV messages SHOULD NOT contain POLICY_ERROR_OBJECT.
section: 3.3.4
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
