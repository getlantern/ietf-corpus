document: rfc-3834
kind: interoperability-note
summary: DSNs (RFC 3464) and MDNs (RFC 3798) are separate specifications governing their own generation and format; this document does not alter those specifications. Responses that fit DSN or MDN criteria should be generated per those specs rather than per RFC 3834.
