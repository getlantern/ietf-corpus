document: rfc-7480
kind: normative-requirement
summary: A client that receives a 429 (Too Many Requests) response SHOULD decrease its query rate and honor the Retry-After header field if one is present. Servers may place stricter limits upon clients that do not honor the Retry-After header.
section: "5.5"
rfc2119_level: SHOULD
topics:
    - http
