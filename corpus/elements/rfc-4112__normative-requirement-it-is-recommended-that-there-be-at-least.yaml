document: rfc-4112
kind: normative-requirement
summary: It is RECOMMENDED that there be at least one user-visible Ecom field on every web page containing any Ecom fields when ECML is used via the web, because some web software may require user activation to trigger autofill.
section: "3.2"
rfc2119_level: RECOMMENDED
