document: rfc-2261
kind: protocol-element
summary: An SNMP context is a collection of management information accessible by an SNMP entity. A context is identified by the combination of a contextEngineID and a contextName, which together unambiguously identify a context within an administrative domain. A contextEngineID uniquely identifies the SNMP entity that may realize an instance of a context with a particular contextName.
section: 3.3.1
topics:
    - snmp
