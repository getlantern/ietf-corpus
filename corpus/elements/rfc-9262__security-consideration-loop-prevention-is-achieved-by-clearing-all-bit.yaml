document: rfc-9262
kind: security-consideration
summary: Loop prevention is achieved by clearing all bit positions associated with the receiving BFR's adjacencies from every outgoing packet copy before forwarding. DNC adjacencies are the only exception; they are constrained to forward_connected() adjacencies, whose link-layer port-unique destination addresses (e.g., MAC addresses) provide an additional safeguard against inadvertent loop closure from physical miswiring.
section: 5.2.1
topics:
    - security
    - routing
