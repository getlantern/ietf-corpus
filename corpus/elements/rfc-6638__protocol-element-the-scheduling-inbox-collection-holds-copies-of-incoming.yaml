document: rfc-6638
kind: protocol-element
summary: The Scheduling Inbox Collection holds copies of incoming scheduling messages from Organizers and Attendee replies. It MUST report DAV:collection and CALDAV:schedule-inbox in its DAV:resourcetype, MUST NOT contain sub-collections, and MUST NOT be a child of a calendar collection. UID uniqueness constraints from RFC 4791 do not apply here.
section: "2.2"
topics:
    - http
