document: rfc-8778
kind: protocol-element
summary: 'The LM-OTS algorithm has five parameters: n (hash output bytes, 32 for SHA-256), H (preimage-resistant hash function), w (Winternitz coefficient width in bits: 1, 2, 4, or 8), p (number of n-byte signature elements), and ls (left-shift bits for checksum). Four variants are defined: LMOTS_SHA256_N32_W1/W2/W4/W8.'
section: "2.3"
