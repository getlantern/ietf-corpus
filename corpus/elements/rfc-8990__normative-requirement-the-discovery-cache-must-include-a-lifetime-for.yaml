document: rfc-8990
kind: normative-requirement
summary: The discovery cache MUST include a lifetime for each entry derived from the ttl parameter in Discovery Response messages. Cached entries MUST be ignored or deleted after their lifetime expires. The discovery mechanism needs to track the node's current address to ensure Discovery Responses always indicate the correct address.
section: 2.5.4.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
