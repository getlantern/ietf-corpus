document: rfc-3124
kind: protocol-element
summary: 'The lossmode field in cm_update() is a bit-vector with four values: CM_NO_FEEDBACK (timeout, no feedback received), CM_LOSS_FEEDBACK (duplicate-ACK or data-driven loss detection), CM_EXPLICIT_CONGESTION (ECN echo), and CM_NO_CONGESTION (non-congestion loss).'
section: "3.3"
topics:
