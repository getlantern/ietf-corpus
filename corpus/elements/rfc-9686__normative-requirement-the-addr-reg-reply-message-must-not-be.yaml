document: rfc-9686
kind: normative-requirement
summary: The ADDR-REG-REPLY message MUST NOT be considered an indication of address validity and MUST NOT be required for the address to be usable. DHCPv6 relays or snooping devices MUST NOT add or alter forwarding or security state based on ADDR-REG-REPLY messages.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
