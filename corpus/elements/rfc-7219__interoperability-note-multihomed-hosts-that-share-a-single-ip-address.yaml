document: rfc-7219
kind: interoperability-note
summary: Multihomed hosts that share a single IP address across interfaces, or send packets from one interface using another interface's address, are not directly supported. Workarounds are connecting at least one interface to a Trusted port or manually configuring multi-anchor bindings.
section: "2.4"
topics:
    - ip
