document: rfc-4035
kind: security-consideration
summary: An active attacker who can set the CD bit in a DNS query or the AD bit in a DNS response can defeat the protection DNSSEC attempts to provide to security-oblivious recursive-mode resolvers. Use of these control bits by a security-aware recursive-mode resolver therefore requires a secure channel.
section: "7"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
