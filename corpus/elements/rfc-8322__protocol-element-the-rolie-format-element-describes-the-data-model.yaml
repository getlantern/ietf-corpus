document: rfc-8322
kind: protocol-element
summary: The rolie:format element describes the data model of the content referenced by atom:content. It carries a required 'ns' attribute (absolute URI identifying the data model) and optional 'version', 'schema-location' (URI of a validation schema), and 'schema-type' (media type of the schema) attributes.
