document: rfc-3443
kind: protocol-element
summary: For IP packet routing, the outgoing IP TTL is set to oTTL (iTTL - 1). For MPLS Swap-only, the swapped label TTL is set to oTTL. For Swap followed by Push, the swap is performed first and pushed label TTLs are determined per section 3.6.
section: "3.5"
topics:
