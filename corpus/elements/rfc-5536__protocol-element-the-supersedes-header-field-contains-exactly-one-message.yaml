document: rfc-5536
kind: protocol-element
summary: The Supersedes header field contains exactly one message identifier specifying an article to be superseded upon arrival of the current article. It is equivalent to a 'cancel' control message for the specified article followed immediately by the new article without the Supersedes header.
section: 3.2.12
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
