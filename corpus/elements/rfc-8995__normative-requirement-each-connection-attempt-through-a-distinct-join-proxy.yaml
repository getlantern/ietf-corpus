document: rfc-8995
kind: normative-requirement
summary: Each connection attempt through a distinct Join Proxy MUST have a unique nonce in the voucher-request. The proxy MUST NOT assume any specific TLS version and passes TLS bytes without examination.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
    - tls
