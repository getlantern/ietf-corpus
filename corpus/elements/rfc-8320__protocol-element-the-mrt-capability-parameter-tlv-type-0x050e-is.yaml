document: rfc-8320
kind: protocol-element
summary: The MRT Capability Parameter TLV (type 0x050E) is a new LDP Capability TLV with U-bit=1, F-bit=0, length=1, and a single S-bit field. It is advertised to signal support for MRT-Blue and MRT-Red LSP establishment procedures.
