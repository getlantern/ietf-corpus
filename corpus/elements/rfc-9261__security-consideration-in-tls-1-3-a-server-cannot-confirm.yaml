document: rfc-9261
kind: security-consideration
summary: In TLS 1.3, a server cannot confirm receipt of the client's Finished message from TLS alone. To prevent disagreement on EA authentication status, servers MUST verify the client Finished message before sending an Exported Authenticator or processing a received one.
section: "9"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
