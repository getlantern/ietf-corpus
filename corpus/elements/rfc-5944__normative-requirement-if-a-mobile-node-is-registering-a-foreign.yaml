document: rfc-5944
kind: normative-requirement
summary: If a mobile node is registering a foreign agent care-of address, it MUST register via that foreign agent. If using a co-located care-of address and returning home, the mobile node MUST register directly with its home agent.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
