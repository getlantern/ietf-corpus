document: rfc-8320
kind: interoperability-note
summary: 'The egress LSR conditions from RFC 5036 Section 2.6.1.2 are modified for MRT FECs. An LSR may be egress for a red(blue) FEC if: (1) the prefix refers to the LSR itself, (2) the LSR is the red(blue) proxy-node attachment router, or (3) the LSR is an ABR and the MRT LDP peer requires non-best-area behavior. Notably, condition 3 scopes egress status to a particular peer.'
section: 5.2.3
topics:
    - mpls
    - routing
