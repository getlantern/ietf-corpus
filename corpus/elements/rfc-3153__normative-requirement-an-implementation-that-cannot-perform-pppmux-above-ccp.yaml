document: rfc-3153
kind: normative-requirement
summary: An implementation that cannot perform PPPMux above CCP or ECP MUST issue Protocol-Reject for the per-link forms of CCP (0x80FD per-link variant) and ECP (0x8055) if PPPMux has been negotiated.
section: "4"
rfc2119_level: MUST
