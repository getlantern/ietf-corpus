document: rfc-5307
kind: design-rationale
summary: The Interface Switching Capability Descriptor sub-TLV is permitted to appear multiple times in a single extended IS reachability TLV because a single interface may have more than one switching capability (e.g., both packet and lambda switching), each requiring its own descriptor.
