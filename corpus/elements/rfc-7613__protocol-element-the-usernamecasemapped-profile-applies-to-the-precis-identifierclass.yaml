document: rfc-7613
kind: protocol-element
summary: 'The UsernameCaseMapped profile applies to the PRECIS IdentifierClass and enforces five rules in order: (1) width mapping, (2) no additional mapping, (3) case folding to lowercase via Unicode Default Case Folding, (4) NFC normalization, (5) Bidi Rule from RFC 5893.'
section: "3.2"
topics:
