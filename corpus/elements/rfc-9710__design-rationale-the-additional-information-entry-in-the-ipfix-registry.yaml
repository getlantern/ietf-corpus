document: rfc-9710
kind: design-rationale
summary: The 'Additional Information' entry in the IPFIX registry should contain a link to an existing IANA sub-registry rather than embedding registry values inline in 'Description'. Inline values require updating the description each time the referenced registry changes, causing maintenance burden and staleness.
section: "1"
topics:
    - registry
    - measurement
