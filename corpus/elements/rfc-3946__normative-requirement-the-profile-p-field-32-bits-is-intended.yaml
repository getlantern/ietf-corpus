document: rfc-3946
kind: normative-requirement
summary: The Profile (P) field (32 bits) is intended for future capability signaling (e.g., monitoring). No standard profile is currently defined; this field SHOULD be set to zero when transmitted and SHOULD be ignored when received.
section: "2.1"
rfc2119_level: SHOULD
