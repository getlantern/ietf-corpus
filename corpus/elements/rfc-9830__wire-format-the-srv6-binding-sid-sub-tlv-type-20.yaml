document: rfc-9830
kind: wire-format
summary: The SRv6 Binding SID sub-TLV (Type 20) carries a 16-octet SRv6 SID plus optional 8-octet SRv6 Endpoint Behavior and SID Structure. Flags include S-Flag, I-Flag, and B-Flag (indicates presence of Endpoint Behavior encoding). Length MUST be 26 when Endpoint Behavior is present, else 18.
section: 2.4.3
topics:
    - routing
    - bgp
