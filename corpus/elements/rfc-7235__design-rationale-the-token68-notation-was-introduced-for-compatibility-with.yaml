document: rfc-7235
kind: design-rationale
summary: The token68 notation was introduced for compatibility with existing authentication schemes (such as Basic) that use a single base64-encoded value. New schemes ought to use auth-param syntax instead, because token68 can only be used once per challenge or credential, making future extensions impossible if used.
section: 5.1.2
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
