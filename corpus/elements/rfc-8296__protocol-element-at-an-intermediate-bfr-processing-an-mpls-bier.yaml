document: rfc-8296
kind: protocol-element
summary: At an intermediate BFR processing an MPLS BIER packet, when a BIER-MPLS label rises to the top of the stack, the BFR infers BSL, SI, and SD from the label, then follows RFC 8279 forwarding procedures, swapping the label to the neighbor's advertised BIER-MPLS label for the same <SD, SI, BSL> with TTL decremented by one.
section: "3"
topics:
    - mpls
    - multicast
