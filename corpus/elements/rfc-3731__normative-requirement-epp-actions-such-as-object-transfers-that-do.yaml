document: rfc-3731
kind: normative-requirement
summary: EPP actions such as object transfers that do not preserve the superordinate relationship between domain objects and subordinate host objects MUST be explicitly disallowed. When ns1.example1.com is used as a name server for example2.com, it MUST be treated as an internal host subject to the rules governing subordinate hosts.
section: "1.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
