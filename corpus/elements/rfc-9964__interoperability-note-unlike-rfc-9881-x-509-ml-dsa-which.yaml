document: rfc-9964
kind: interoperability-note
summary: Unlike RFC 9881 (X.509 ML-DSA), which supports the expanded private key format to maximize interoperability with existing implementations, this document uses only the seed format. Implementations interoperating with RFC 9881-based systems must handle the difference in private key representation.
