document: rfc-5161
kind: normative-requirement
summary: When multiple ENABLE commands are issued in a session, each corresponding ENABLED response SHOULD only contain extensions enabled by the corresponding ENABLE command. ENABLE is additive across commands.
section: "3.1"
rfc2119_level: SHOULD
