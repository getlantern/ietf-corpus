document: rfc-4462
kind: normative-requirement
summary: Servers MUST NOT advertise the 'null' host key algorithm unless it is the only algorithm advertised. SSH_MSG_KEXGSS_HOSTKEY MUST NOT be sent when the 'null' host key algorithm is in use.
section: "5"
rfc2119_level: MUST NOT
topics:
