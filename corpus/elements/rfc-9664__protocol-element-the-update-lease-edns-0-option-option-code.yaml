kind: protocol-element
summary: The Update Lease EDNS(0) option (OPTION-CODE 2) is included in DNS Update messages within an OPT pseudo-RR. It carries a LEASE field (u_int32_t, 4 bytes) and an optional KEY-LEASE field (u_int32_t, 4 bytes), with OPTION-LENGTH of 4 or 8 respectively.
