document: rfc-9934
kind: protocol-element
summary: TLS servers may configure multiple ECH PEM file names; for example, only a subset of ECHConfigList values from those files may be used as the retry_configs value in the ECH fallback scenario. In that case, retry_configs might contain different public keys.
section: "3"
