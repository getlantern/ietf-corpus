document: rfc-3877
kind: security-consideration
summary: 'VACM-based access control for alarm objects is inherently awkward: checking whether varbinds in a Notification are accessible can only be done where the Notification originates, and only when security credentials are available. The security credentials of the alarm model creator are bound to the model and constrain what information may populate the active alarm, variable, cleared alarm, and ITU alarm tables.'
section: "3.4"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
