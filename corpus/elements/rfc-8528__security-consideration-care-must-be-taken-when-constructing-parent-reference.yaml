document: rfc-8528
kind: security-consideration
summary: Care must be taken when constructing 'parent-reference' XPath expressions, because the evaluation result is added to the accessible tree for all XPath expressions in the mounted schema, potentially exposing unintended data nodes from the parent schema to mounted schema logic.
section: "11"
topics:
    - security
    - yang
    - netconf
