document: rfc-8842
kind: normative-requirement
summary: When using the 'tls-id' attribute with TLS (RFC 4145), offerers and answerers MUST ensure that the 'connection' attribute value and the 'tls-id' attribute value do not conflict regarding whether a new TLS connection is to be established. Both attributes MUST always be used together.
section: "7"
rfc2119_level: MUST
topics:
    - realtime
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
