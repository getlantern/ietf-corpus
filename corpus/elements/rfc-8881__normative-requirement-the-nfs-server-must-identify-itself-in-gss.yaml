document: rfc-8881
kind: normative-requirement
summary: The NFS server MUST identify itself in GSS-API via a GSS_C_NT_HOSTBASED_SERVICE name of the form 'nfs@hostname'. For Kerberos V5, the form 'nfs/hostname' is RECOMMENDED.
section: 2.2.1.1.1.3
rfc2119_level: MUST
topics:
