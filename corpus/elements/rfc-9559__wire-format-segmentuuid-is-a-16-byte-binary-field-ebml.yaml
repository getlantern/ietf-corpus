document: rfc-9559
kind: wire-format
summary: SegmentUUID is a 16-byte binary field (EBML ID 0x73A4) equivalent to UUID v4 with all bits randomly chosen. The value MUST contain at least one bit set to 1 and is required when the Segment participates in a Linked Segment.
section: 5.1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
