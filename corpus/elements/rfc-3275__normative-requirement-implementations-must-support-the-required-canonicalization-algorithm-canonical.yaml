document: rfc-3275
kind: normative-requirement
summary: Implementations MUST support the REQUIRED canonicalization algorithm (Canonical XML). Implementations MUST support DSA-SHA1 signature algorithm (REQUIRED). RSA-SHA1 (PKCS1) is RECOMMENDED. SHA-1 as a digest algorithm is REQUIRED. HMAC-SHA1 is OPTIONAL.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
