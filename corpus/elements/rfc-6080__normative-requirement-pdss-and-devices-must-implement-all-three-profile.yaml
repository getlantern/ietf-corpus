document: rfc-6080
kind: normative-requirement
summary: PDSs and devices MUST implement all three profile types (local-network, device, user). A device not configured otherwise SHOULD try to obtain all three in the default order, with an exception for bootstrapping where it SHOULD request the device profile first.
section: 5.1.1
rfc2119_level: MUST
topics:
    - sip
