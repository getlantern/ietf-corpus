document: rfc-5163
kind: interoperability-note
summary: 'A recommended ordering of Extension Headers within an SNDU is provided: TimeStamp first (link framing), then encryption extensions (entire payload), then PDU-Concat or TS-Concat (group of PDUs), then PDU-specific extensions last. This ordering is a guideline for optimizing receiver processing, not a strict requirement.'
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
