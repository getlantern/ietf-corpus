document: rfc-8035
kind: normative-requirement
summary: If the answer does not contain an 'a=rtcp-mux' attribute, the offerer and answerer MUST NOT multiplex RTP and RTCP packets on a single port; instead they should use the usual port-selection rules for RTCP.
section: "3.1"
rfc2119_level: MUST NOT
