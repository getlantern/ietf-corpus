document: rfc-8308
kind: normative-requirement
summary: Applications MUST ignore unrecognized extension-names. Applications that do not implement or recognize an extension MUST ignore its extension-value regardless of size or content. Applications MUST tolerate any sequence of bytes — including null bytes at any position — in an unknown extension's extension-value.
section: "2.5"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
