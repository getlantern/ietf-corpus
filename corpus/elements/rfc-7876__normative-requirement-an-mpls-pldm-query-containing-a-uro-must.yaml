document: rfc-7876
kind: normative-requirement
summary: An MPLS-PLDM Query containing a URO MUST NOT include an RFC 6374 Return Address TLV (TLV 1), and the return-address construction method from Source Address TLV (TLV 130) described in RFC 6374 Section 3.5.2 MUST NOT be used for such Queries, preventing ambiguity about the reply target.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - mpls
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
