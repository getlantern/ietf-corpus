document: rfc-9839
kind: design-rationale
summary: The XML Characters subset retains C1 controls because they are less likely than C0 controls to appear erroneously in data and have not been observed as a frequent source of problems; noncharacters above U+FFFF are also retained because they are rarely encountered.
section: "4.2"
