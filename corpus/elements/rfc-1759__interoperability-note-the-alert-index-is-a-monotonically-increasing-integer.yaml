document: rfc-1759
kind: interoperability-note
summary: The Alert Index is a monotonically increasing integer; gaps in Alert Table index values indicate that alerts were deleted (due to overflow management). Management applications should treat index gaps as a signal to re-acquire full printer state to detect missed state changes.
section: 2.2.13.4
topics:
    - snmp
