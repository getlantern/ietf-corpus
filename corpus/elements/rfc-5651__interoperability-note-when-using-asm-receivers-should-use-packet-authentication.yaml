document: rfc-5651
kind: interoperability-note
summary: When using ASM, receivers SHOULD use packet authentication mechanisms because all packets sent to multicast group G may be received regardless of sender. With SSM the receiver only gets packets from the specific sender S, which prevents injection attacks that are possible with ASM.
section: "4.1"
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
