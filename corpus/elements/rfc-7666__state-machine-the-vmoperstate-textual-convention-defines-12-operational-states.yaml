document: rfc-7666
kind: state-machine
summary: 'The vmOperState textual convention defines 12 operational states for a virtual machine: unknown(1), other(2), preparing(3), running(4), suspending(5), suspended(6), resuming(7), paused(8), migrating(9), shuttingdown(10), shutdown(11), and crashed(12). Transient states (suspending, resuming, shuttingdown, migrating, preparing) connect major stable states. Notifications are generated on each transition between major states.'
