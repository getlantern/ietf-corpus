document: rfc-8688
kind: normative-requirement
summary: Implementations MUST NOT insert line breaks into the base64url encodings of the JOSE header or JWT, and UACs MUST be prepared to receive arbitrarily long octet streams from the URI referenced by the Call-Info header field.
section: "4.1"
rfc2119_level: MUST NOT
