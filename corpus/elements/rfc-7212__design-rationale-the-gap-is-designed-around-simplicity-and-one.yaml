document: rfc-7212
kind: design-rationale
summary: The GAP is designed around simplicity and one-way information distribution; how the receiver uses advertised data is a local matter outside the protocol scope. This contrasts with negotiation-based protocols, reducing complexity and avoiding oscillation between peer configurations.
