document: rfc-9628
kind: wire-format
summary: The Picture ID (PID) field is 7 or 15 bits depending on the M extension bit in the first PID octet. The PID is present only when the I bit is set. In flexible mode, reference indices (P_DIFF, 7 bits each, up to 3) follow when both P and F are set.
