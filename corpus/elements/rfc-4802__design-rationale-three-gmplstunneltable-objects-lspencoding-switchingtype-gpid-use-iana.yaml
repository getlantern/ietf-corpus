document: rfc-4802
kind: design-rationale
summary: Three gmplsTunnelTable objects (LSPEncoding, SwitchingType, GPid) use IANA-maintained textual conventions (IANAGmplsLSPEncodingTypeTC, IANAGmplsSwitchingTypeTC, IANAGmplsGeneralizedPidTC) rather than locally defined enumerations, in order to protect GMPLS-TE-STD-MIB from requiring updates whenever the signaling protocol adds new enumeration values.
