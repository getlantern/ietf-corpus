document: rfc-7138
kind: normative-requirement
summary: A different ISCD MUST be used for each different muxing hierarchy (muxing tree) and different TS granularity supported within the TE-Link. A single ISCD MAY be used for unbundled or bundled links supporting homogeneous multiplexing hierarchies and the same TS granularity.
section: "4"
rfc2119_level: MUST
topics:
    - routing
