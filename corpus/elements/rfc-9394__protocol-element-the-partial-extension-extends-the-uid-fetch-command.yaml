document: rfc-9394
kind: protocol-element
summary: The PARTIAL extension extends the UID FETCH command with a PARTIAL FETCH modifier, which has the same syntax as the PARTIAL SEARCH result option. It instructs the server to return FETCH results only for messages in the specified range, useful when the sequence-set parameter includes an unknown number of messages.
section: "3.3"
topics:
