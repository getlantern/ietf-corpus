document: rfc-8285
kind: normative-requirement
summary: When SDP Offer/Answer is used, negotiation for mixed one-byte and two-byte extensions MUST use SDP Offer/Answer. Without such negotiation (e.g., declarative SDP), mixed headers MUST NOT occur unless all recipients are known to support this mode.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
