document: rfc-1144
kind: normative-requirement
summary: Serial line IP drivers that allow header compression SHOULD include a user-configurable flag to disable compression entirely, for interoperability with existing SLIP links that do not implement this compression. Compression SHOULD default to off until negotiated on.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - ip
