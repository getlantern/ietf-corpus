document: rfc-1730
kind: normative-requirement
summary: The mailbox name INBOX is reserved to mean 'the primary mailbox for this user on this server'. It is an error to attempt to delete INBOX; renaming INBOX is permitted, which creates a new empty INBOX in its place.
section: "5.1"
rfc2119_level: MUST
topics:
    - email
