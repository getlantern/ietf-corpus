document: rfc-1521
kind: protocol-element
summary: 'The Content-Type header field specifies the type and subtype of the body using the syntax ''content := "Content-Type" ":" type "/" subtype *(";"; parameter)''. Seven top-level types are defined: text, multipart, message, image, audio, video, and application. Type, subtype, and parameter names are case-insensitive; parameter values are case-sensitive unless otherwise specified.'
section: "4"
topics:
