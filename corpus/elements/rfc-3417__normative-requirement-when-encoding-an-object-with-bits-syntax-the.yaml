document: rfc-3417
kind: normative-requirement
summary: When encoding an object with BITS syntax, the value is encoded as an OCTET STRING placing named bits from first to last into bits 8-1 of successive octets; remaining bits of the final octet are set to zero on generation and ignored on receipt.
section: "8"
rfc2119_level: MUST
