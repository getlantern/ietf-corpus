document: rfc-4328
kind: protocol-element
summary: 'The ODUk label space is structured as a tree: t1 (1 bit) identifies ODU1; t2 (3 bits) identifies ODU2 directly (t2=1) or an ODU1 tributary slot in ODTUG2 (t2=2..5); t3 (6 bits) identifies ODU3 directly (t3=1), ODU1 tributary slots in ODTUG3 (t3=2..17), or ODU2 tributary slots in ODTUG3 (t3=18..33). A label field equal to zero is invalid.'
section: "4.1"
