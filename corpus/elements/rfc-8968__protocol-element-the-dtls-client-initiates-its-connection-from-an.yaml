document: rfc-8968
kind: protocol-element
summary: The DTLS client initiates its connection from an ephemeral UDP port. Nodes SHOULD ensure new client connections use different ephemeral ports from recently used ones to allow servers to differentiate old from new DTLS connections; alternatively, DTLS connection identifiers may be used.
section: "2.1"
topics:
    - routing
    - security
