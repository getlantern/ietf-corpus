document: rfc-9014
kind: wire-format
summary: The Unknown MAC Route (UMR) is encoded as a regular EVPN MAC/IP Advertisement route with MAC Address Length set to 48, MAC address set to all zeros, and the ESI field set to the DC GW's I-ESI. It is defined in RFC 7543.
section: 3.5.1
topics:
