document: rfc-6374
kind: wire-format
summary: 'Timestamp formats: 0=Null (no meaningful timestamp), 1=64-bit sequence number, 2=NTPv4 64-bit (32b seconds + 32b fractional seconds), 3=truncated IEEE 1588v2 PTP (32b seconds + 32b nanoseconds). Formats of fewer than 64 bits SHALL use the n high-order bits; low-order bits SHOULD be set to 0 and MUST be ignored on reading.'
section: "3.4"
