document: rfc-1035
kind: interoperability-note
summary: Compression pointers may only be used in domain name positions whose format is not class-specific. This ensures name servers and resolvers do not need to understand all possible RR formats in order to follow pointers correctly.
section: 4.1.4
topics:
    - dns
