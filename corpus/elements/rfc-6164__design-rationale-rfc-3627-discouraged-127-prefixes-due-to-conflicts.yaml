document: rfc-6164
kind: design-rationale
summary: RFC 3627 discouraged /127 prefixes due to conflicts with Subnet-Router anycast addresses. This document reevaluates that position, concluding that the Subnet-Router anycast address has questionable utility on point-to-point links and that operational experience shows /127 prefixes can be used successfully when anycast is explicitly disabled.
section: "4"
topics:
