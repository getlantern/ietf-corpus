document: rfc-3640
kind: security-consideration
summary: Implementations that support MPEG-4 scripts (a subset of ECMAScript) MUST ensure that script actions are limited solely to the domain of the single presentation in which they reside, disallowing session-to-session communication, access to local resources and storage, and unrestricted network access.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
