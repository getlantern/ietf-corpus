document: rfc-8435
kind: state-machine
summary: 'Tightly coupled locking model: stateids are generated by the MDS and propagated to storage devices via control protocol. OPENs, OPEN_DOWNGRADE, CLOSE, advisory and mandatory locks, delegations, and FREE_STATEID all require MDS-to-storage-device state synchronization. Lease expiration on storage devices is possible.'
section: 2.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
