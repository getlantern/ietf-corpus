document: rfc-4842
kind: normative-requirement
summary: SONET/SDH fragments MUST be byte aligned with the SONET/SDH SPE or VT, with the first bit of each received byte placed as the Most Significant Bit of each fragment byte. Fragments MUST be constructed without knowledge or processing of any incidental payload scrambling.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
