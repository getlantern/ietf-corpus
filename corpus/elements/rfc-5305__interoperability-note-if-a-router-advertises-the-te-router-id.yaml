document: rfc-5305
kind: interoperability-note
summary: If a router advertises the TE Router ID TLV and also advertises prefixes via BGP with the BGP next-hop attribute set to the BGP router ID, the TE Router ID SHOULD be the same as the BGP router ID to ensure consistent topology references.
section: "4.3"
topics:
    - routing
    - bgp
