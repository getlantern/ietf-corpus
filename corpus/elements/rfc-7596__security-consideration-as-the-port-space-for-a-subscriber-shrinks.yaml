document: rfc-7596
kind: security-consideration
summary: As the port space for a subscriber shrinks due to IPv4 address sharing, the randomness of source port numbers is decreased significantly, making it easier for an attacker to guess the port number in use. This can result in attacks ranging from throughput reduction to broken connections or data corruption.
section: "9"
topics:
