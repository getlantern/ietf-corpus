document: rfc-3986
kind: protocol-element
summary: Unreserved characters (ALPHA, DIGIT, hyphen, period, underscore, tilde) may appear unencoded in a URI. URIs differing only in replacement of an unreserved character with its percent-encoded equivalent identify the same resource.
section: "2.3"
topics:
