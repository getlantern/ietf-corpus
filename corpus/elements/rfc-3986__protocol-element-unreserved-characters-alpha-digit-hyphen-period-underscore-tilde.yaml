document: rfc-3986
kind: protocol-element
summary: Unreserved characters—ALPHA, DIGIT, hyphen, period, underscore, tilde—may appear unencoded in any URI component. URIs differing only in replacement of an unreserved character with its percent-encoded equivalent identify the same resource.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
