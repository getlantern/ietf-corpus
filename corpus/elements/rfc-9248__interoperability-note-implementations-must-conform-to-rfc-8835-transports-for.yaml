document: rfc-9248
kind: interoperability-note
summary: Implementations MUST conform to RFC 8835 (Transports for WebRTC) except for its guidance on the WebRTC data channel, which this specification does not use. Support for multiple simultaneous SIP registrations from different RUE devices sharing the same SIP URI SHOULD be permitted by the provider.
section: "5.5"
topics:
