document: rfc-1629
kind: state-machine
summary: 'IS-IS Level 1 routing: a Level 1 IS recognizes whether a destination address is within its area (routes toward the destination using the ID field) or outside (forwards to the nearest Level 2 IS that advertises ''attached'' status in its Level 1 routing packets). A Level 1 IS refuses to neighbor with a router whose area addresses do not overlap its own.'
section: "3.2"
topics:
    - routing
