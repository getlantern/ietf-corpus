document: rfc-4271
kind: normative-requirement
summary: When advertising a route to an external peer, the BGP speaker MUST prepend its own AS number to the AS_PATH attribute. When advertising to an internal peer, the speaker SHALL NOT modify the AS_PATH.
section: 5.1.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
