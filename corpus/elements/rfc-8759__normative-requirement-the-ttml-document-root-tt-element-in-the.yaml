document: rfc-8759
kind: normative-requirement
summary: The TTML document root 'tt' element (in the http://www.w3.org/ns/ttml namespace) MUST include a 'timeBase' attribute in the TTML parameter namespace with the value 'media'. This prohibits the 'smpte' and 'clock' time bases.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
