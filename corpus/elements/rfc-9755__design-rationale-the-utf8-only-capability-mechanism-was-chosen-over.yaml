document: rfc-9755
kind: design-rationale
summary: The 'UTF8=ONLY' capability mechanism was chosen over the simpler approach of 'just-send-UTF-8' because diagnosing interoperability problems caused by an undeclared UTF-8 mode is difficult. Explicit server announcement and client confirmation simplify failure diagnosis when legacy support is absent.
section: A
