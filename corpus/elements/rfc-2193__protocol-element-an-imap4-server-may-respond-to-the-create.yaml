document: rfc-2193
kind: protocol-element
summary: An IMAP4 server MAY respond to the CREATE command with one or more IMAP mailbox referrals to direct the client to issue the CREATE against another server, using the mailbox hierarchy to determine the target server.
section: "4.2"
