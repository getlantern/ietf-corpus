document: rfc-9598
kind: protocol-element
summary: SmtpUTF8Mailbox is a new otherName variant for representing internationalized email addresses in X.509 GeneralName structures. It is defined as a UTF8String of at least one character, with OID id-on-SmtpUTF8Mailbox (1.3.6.1.5.5.7.8.9), and may appear in subjectAltName, issuerAltName, or anywhere GeneralName is used.
