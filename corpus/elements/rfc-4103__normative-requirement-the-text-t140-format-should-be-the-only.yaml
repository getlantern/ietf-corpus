document: rfc-4103
kind: normative-requirement
summary: The text/t140 format SHOULD be the only payload type in the RTP stream, because it relies on sequence numbers for loss detection and interleaving with other payload types would make loss detection at stream boundaries unreliable.
section: "5.3"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
