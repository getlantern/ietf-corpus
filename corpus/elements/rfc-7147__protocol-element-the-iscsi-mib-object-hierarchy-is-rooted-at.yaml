summary: The iSCSI MIB object hierarchy is rooted at iscsiInstance, which contains iscsiPortal (with iscsiTargetPortal and iscsiInitiatorPortal sub-objects), iscsiNode (with iscsiTarget, iscsiInitiator, iscsiTgtAuthorization, iscsiIntrAuthorization sub-objects), and iscsiSession (containing iscsiConnection).
