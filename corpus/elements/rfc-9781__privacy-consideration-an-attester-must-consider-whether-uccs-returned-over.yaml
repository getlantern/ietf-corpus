document: rfc-9781
kind: privacy-consideration
summary: An Attester must consider whether UCCS returned over a privacy-preserving Secure Channel compromises privacy. For example, including the EAT UEID claim in UCCS allows a Verifier to correlate UCCS from a single Attesting Environment across many sessions, which may be unacceptable for user devices.
section: "5.2"
topics:
    - privacy
    - cbor
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
