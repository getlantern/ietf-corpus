document: rfc-3115
kind: interoperability-note
summary: Per RFC 2002, extensions numbered 0–127 in a registration message that are not recognized MUST be silently discarded. Since CVSE-TYPE-NUMBER 38 falls in this range, RFC 3115 is compliant with RFC 2002 and additionally specifies behavior when the extension is recognized but the vendor ID or vendor type within is unknown.
section: "2.3"
topics:
    - mobility
