document: rfc-9536
kind: normative-requirement
summary: Servers MUST NOT provide or implement reverse searches or reverse search mappings that are not registered with IANA. A reverse search is defined as the triple <searchable resource type, related resource type, property> mapped to an RDAP object member via a JSONPath expression.
section: "3"
rfc2119_level: MUST NOT
topics:
    - registry
    - security
