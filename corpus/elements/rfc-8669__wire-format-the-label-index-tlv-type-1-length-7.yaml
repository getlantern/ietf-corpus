document: rfc-8669
kind: wire-format
summary: The Label-Index TLV (Type=1, Length=7) encodes an 8-bit RESERVED field, a 16-bit Flags field, and a 32-bit Label Index representing the index value in the SRGB space. RESERVED and Flags MUST be clear on transmission and ignored on reception.
section: "3.1"
