document: rfc-8630
kind: design-rationale
summary: The TAL was introduced to allow Trust Anchor CA certificates to change their Internet Number Resource (INR) extensions over time without requiring redistribution of the TA itself. The TAL remains constant as long as the TA's public key and location do not change, decoupling key distribution from resource set updates.
section: "2.1"
topics:
