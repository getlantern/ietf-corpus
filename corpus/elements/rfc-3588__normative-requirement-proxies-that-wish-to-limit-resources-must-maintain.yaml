document: rfc-3588
kind: normative-requirement
summary: Proxies that wish to limit resources MUST maintain session state; all proxies MUST maintain transaction state. Relay agents MUST NOT reorder AVPs, and proxies MUST NOT reorder AVPs. Translation agents MUST be session-stateful and MUST maintain transaction state.
section: 2.8.2
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
