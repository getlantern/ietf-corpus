document: rfc-2067
kind: design-rationale
summary: The optional header format features from RFC 1374 (optional short burst first, D1 fill bytes, nonzero D2 offset) were removed to make the header format non-variable. Since no RFC 1374 implementations used these options, the change eliminates complexity without interoperability impact.
section: "2.1"
topics:
