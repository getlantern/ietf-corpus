document: rfc-2122
kind: design-rationale
summary: The URL mechanism was chosen for VEMMI service selection because a VEMMI server may host multiple simultaneous applications, and the URL fully describes which service to activate. It also enables Web browsers to launch VEMMI client modules for vemmi:// links in HTML documents.
section: "2"
