document: rfc-4433
kind: normative-requirement
summary: When using co-located CoA, the MN MUST cache the Assigned HA address for the length of the Mobile IP session and MUST use this cached address as the home agent address in subsequent Re-Registration and De-Registration Requests.
section: 5.1.2
rfc2119_level: MUST
topics:
