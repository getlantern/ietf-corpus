document: rfc-5627
kind: normative-requirement
summary: If the contact URI in a REGISTER request is equivalent to the AOR, or is a GRUU for the AOR, the registrar MUST reject with a 403. If the contact is not a SIP URI, the request MUST also be rejected with a 403.
section: "5.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
