kind: protocol-element
summary: pppIpConfigCompression is a read-write INTEGER (none(1), vj-tcp(2)) with default none(1) that controls whether the local node attempts to negotiate IP compression during IPCP; changes take effect when the link is next restarted. References RFC 1332 Section 4.0.
