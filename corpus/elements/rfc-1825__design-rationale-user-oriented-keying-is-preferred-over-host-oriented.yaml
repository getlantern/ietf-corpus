document: rfc-1825
kind: design-rationale
summary: User-oriented keying is preferred over host-oriented keying on multi-user hosts because host-oriented keying allows a malicious user to obtain the shared key via chosen-plaintext attack and then read or forge other users' traffic.
section: "4.4"
topics:
