document: rfc-3055
kind: design-rationale
summary: The configuration table augments the Application MIB (RFC 2287) sysApplInstallPkgEntry using the AUGMENTS construct rather than replicating sysLocation/sysContact, to avoid information duplication. A separate pintSysContact is still defined because the PINT administrator may differ from the system administrator.
