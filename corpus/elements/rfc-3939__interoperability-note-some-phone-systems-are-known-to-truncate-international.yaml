document: rfc-3939
kind: interoperability-note
summary: Some phone systems are known to truncate international numbers to 10 digits even though this behavior is undesirable. Implementors should be aware of this limitation, which can cause misinterpretation (e.g., an Irish number '353 91 73 3307' truncated to '53 91 73 3307' misread as a North American number).
section: "3.2"
topics:
    - email
