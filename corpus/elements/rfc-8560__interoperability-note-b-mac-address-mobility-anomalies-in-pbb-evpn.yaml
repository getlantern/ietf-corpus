document: rfc-8560
kind: interoperability-note
summary: 'B-MAC address mobility anomalies in PBB-EVPN/PBB-VPLS integration: when the same B-MAC appears behind both a remote PBB-VPLS PE (learned in the data plane) and a PBB-EVPN PE (learned via BGP), the local PE SHOULD notify the operator, since there is no legitimate B-MAC mobility in this context.'
section: "4.3"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
