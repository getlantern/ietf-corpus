document: rfc-5884
kind: normative-requirement
summary: The local discriminator assigned by the egress LSR MUST be used as the My Discriminator field in BFD session packets sent by the egress LSR. The egress LSR MUST also send Control packets to the ingress LSR with the Your Discriminator field set to the ingress LSR's local discriminator.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
