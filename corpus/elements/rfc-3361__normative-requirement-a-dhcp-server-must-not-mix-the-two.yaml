document: rfc-3361
kind: normative-requirement
summary: A DHCP server MUST NOT mix the two encodings (domain name and IPv4 address) in the same DHCP message, even if it sends two different instances of option 120, because DHCP processing concatenates multiple instances of the same option before processing.
section: "3"
rfc2119_level: MUST NOT
topics:
    - sip
