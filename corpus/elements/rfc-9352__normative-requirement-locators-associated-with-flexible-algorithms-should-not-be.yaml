document: rfc-9352
kind: normative-requirement
summary: Locators associated with Flexible Algorithms SHOULD NOT be advertised in Prefix Reachability TLVs (236 or 237), because doing so would cause forwarding to follow the algorithm 0 path instead of the Flexible Algorithm path.
