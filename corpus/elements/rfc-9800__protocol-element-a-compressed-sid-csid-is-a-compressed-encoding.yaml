document: rfc-9800
kind: protocol-element
summary: A Compressed-SID (CSID) is a compressed encoding of an SRv6 SID that includes the Locator-Node and Function bits of the SID being compressed. If either constituent is empty (zero length), the same applies to its CSID encoding. The combined Locator-Node and Function length is called CSID length (LNFL).
section: "2"
topics:
