document: rfc-8254
kind: design-rationale
summary: The predecessor registration procedure (RFC 3406) required IETF Consensus for formal URN namespaces. This requirement discouraged registrations and increased the risk of 'squatting'—use of names without registration—leading to potential confusion when the same name identifies different namespaces with different rules.
section: "1"
topics:
    - registry
