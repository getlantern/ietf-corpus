document: rfc-2250
kind: protocol-element
summary: For MPEG System/Transport stream encapsulation, each RTP packet carries a 90 KHz timestamp synchronized to the MPEG PCR or SCR, representing the target transmission time of the first byte of the payload. This timestamp is not passed to the MPEG decoder and is used solely to estimate network jitter and synchronize transmitter/receiver clock drift.
section: "2"
topics:
