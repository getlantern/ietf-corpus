document: rfc-6081
kind: protocol-element
summary: The Port-Preserving Symmetric NAT Extension enables traversal between port-preserving symmetric NATs and port-restricted NATs by having clients listen on a randomly chosen local port, predict the same port will be used externally, and exchange the random port number via the Random Port Trailer in indirect bubbles.
