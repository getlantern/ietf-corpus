document: rfc-1654
kind: normative-requirement
summary: A BGP speaker must never advertise a peer's own address back to that peer as a NEXT_HOP for an originated route, and must never install a route with itself as the next hop.
section: 5.1.3
rfc2119_level: MUST NOT
topics:
