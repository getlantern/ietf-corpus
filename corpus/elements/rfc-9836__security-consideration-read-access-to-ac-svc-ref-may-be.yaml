document: rfc-9836
kind: security-consideration
summary: Read access to 'ac-svc-ref' may be used to track the set of VPN instances in which a given customer is involved, creating a privacy-relevant information exposure. 'ac-ntw-ref', unlike 'ac-svc-ref', is unique within the scope of a node and may multiplex many peer CEs.
section: "7"
topics:
    - security
    - privacy
    - yang
    - vpn
