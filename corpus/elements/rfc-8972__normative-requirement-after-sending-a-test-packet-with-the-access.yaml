document: rfc-8972
kind: normative-requirement
summary: After sending a test packet with the Access Report TLV, the Session-Sender MUST arm a retransmission timer and MUST retransmit if the timer expires before a reflected packet with Access Report TLV is received. Retransmission SHOULD be repeated up to four times; default timer value SHOULD be three seconds.
section: "4.6"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
