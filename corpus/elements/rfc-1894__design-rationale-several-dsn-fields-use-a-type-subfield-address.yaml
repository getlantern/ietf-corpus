document: rfc-1894
kind: design-rationale
summary: Several DSN fields use a "-type" subfield (address-type, diagnostic-type, mta-name-type) followed by a semicolon and value. This design allows DSNs to carry addresses, diagnostic codes, and MTA names from arbitrary foreign mail systems without assuming any particular format, enabling multi-protocol interoperability.
section: 2.1.2
topics:
    - email
extracted_by: claude-sonnet-4-6
