document: rfc-8692
kind: security-consideration
summary: SHAKE128 with 256-bit output offers 128 bits of collision and preimage resistance and is RECOMMENDED with 2048-bit (112-bit security) or 3072-bit (128-bit security) RSA modulus, or curves with 256-bit group order. SHAKE256 with 512-bit output offers 256 bits of resistance and is RECOMMENDED with 4096-bit RSA modulus or curves with at least 512-bit group order such as NIST P-521.
section: "6"
topics:
    - crypto
    - security
    - pkix
