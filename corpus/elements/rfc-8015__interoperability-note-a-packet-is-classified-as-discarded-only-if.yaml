document: rfc-8015
kind: interoperability-note
summary: A packet is classified as 'discarded' only if it arrives within the implementation-specific time window but is too early, too late, or thrown away before playout due to duplication or redundancy. Packets dropped during decoding by a higher-layer decoder are NOT counted as discarded.
