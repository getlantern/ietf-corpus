document: rfc-4207
kind: normative-requirement
summary: If the Trace type is not supported, the ERROR_CODE in TraceMonitorNack MUST indicate 'Unsupported Trace Type'. If the TRACE object value does not match the observed trace, the ERROR_CODE MUST indicate 'Invalid Trace Message' and TraceMismatch SHOULD NOT be sent as a result of that mismatch.
section: 4.1.3
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
