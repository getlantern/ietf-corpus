document: rfc-4583
kind: security-consideration
summary: BFCP assumes an initial integrity-protected channel is used to exchange self-signed certificates between a client and floor control server. For SDP carried in SIP, S/MIME is the natural choice for this channel, enabling TLS-based mutual authentication for the BFCP connection.
