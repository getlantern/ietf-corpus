document: rfc-5630
kind: interoperability-note
summary: SIP and SIPS URIs that are identical except for the scheme refer to the same resource and are treated equivalently for routing purposes. Registering with a SIPS Contact creates an implicit binding for the corresponding SIP Contact as well.
section: "4.1"
