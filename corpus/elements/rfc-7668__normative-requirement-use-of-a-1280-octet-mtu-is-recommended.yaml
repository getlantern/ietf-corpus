document: rfc-7668
kind: normative-requirement
summary: Use of a 1280-octet MTU is RECOMMENDED to avoid the need for Path MTU Discovery procedures, even though the IPSP allows negotiating larger MTUs. Implementations requiring equal MTU in both directions SHALL use the smallest of the two negotiated values.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
