document: rfc-6720
kind: interoperability-note
summary: GTSM for LDP as defined here applies only to single-hop LDP peering sessions and IPv4; LDP over IPv6 has GTSM built into its protocol definition. Multi-hop LDP peering is explicitly out of scope.
