document: rfc-8491
kind: security-consideration
summary: 'Advertisement of an incorrect MSD value has negative consequences: a value smaller than supported may cause path computation to fail to find a viable path, while a value larger than supported may cause instantiation of a path the head-end cannot actually support. The presence of MSD information may also inform an attacker of how to induce these failure conditions.'
section: "7"
topics:
    - security
    - routing
    - mpls
