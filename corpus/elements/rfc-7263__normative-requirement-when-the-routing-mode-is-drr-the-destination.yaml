document: rfc-7263
kind: normative-requirement
summary: 'When the routing mode is DRR, the destination peer MUST construct the Destination List for the response with exactly one entry: the requesting peer''s Node-ID taken from the Via List. If there is not exactly one destination in the DRR request, the destination peer MUST return an Error_Unknown_Extension response via SRR.'
section: 5.4.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
