document: rfc-3831
kind: normative-requirement
summary: The default MTU for IPv6 over Fibre Channel is 65280 octets, but the MTU MUST NOT be lower than 1280 octets as required by IPv6. Router Advertisements specifying an MTU larger than 65280 MUST be ignored.
section: "5"
rfc2119_level: MUST
topics:
    - ip
