document: rfc-1522
kind: wire-format
summary: An encoded-word has the form '=?' charset '?' encoding '?' encoded-text '?=', where charset and encoding are tokens (no whitespace, no especials), and encoded-text is printable ASCII excluding '?' and SPACE. Both charset and encoding names are case-independent.
