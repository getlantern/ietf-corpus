document: rfc-7766
kind: interoperability-note
summary: When using TCP Fast Open (TFO) with anycast DNS services, all servers sharing the anycast address must use the same TFO key so that they generate identical Fast Open cookies for a given client IP address; otherwise clients will fall back to the regular three-way handshake.
section: "9"
topics:
    - dns
    - tcp
