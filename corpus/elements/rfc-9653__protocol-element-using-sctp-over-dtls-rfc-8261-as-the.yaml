document: rfc-9653
kind: protocol-element
summary: 'Using SCTP over DTLS (RFC 8261) as the alternate error detection method satisfies both requirements: it provides stronger integrity than CRC32c and since middleboxes cannot observe the encrypted SCTP packet, there is no risk of path failure from middleboxes expecting correct CRC32c checksums. EDMID value 1 is assigned for ''SCTP over DTLS''.'
section: "6"
topics:
