document: rfc-5819
kind: wire-format
summary: 'The ABNF production ''status-option'' is defined as: "STATUS" SP "(" status-att *(SP status-att) ")", and is added to ''return-option'' via the extension production ''return-option =/ status-option''. This complies with the option-extension syntax from RFC 5258.'
