document: rfc-8495
kind: normative-requirement
summary: For the EPP <transfer> command, the command MUST contain a child <allocationToken:allocationToken> element. The Allocation Token authorization is in addition to, and does not replace, the object's standard transfer authorization mechanism. If invalid or not required, the server MUST return EPP error 2201.
section: 3.2.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
