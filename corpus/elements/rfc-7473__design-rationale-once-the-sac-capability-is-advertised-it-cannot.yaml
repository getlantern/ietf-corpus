document: rfc-7473
kind: design-rationale
summary: Once the SAC capability is advertised it cannot be withdrawn (S-bit always 1). Application state advertisement can be re-enabled or re-disabled dynamically by sending updated capability TLVs, but the capability itself persists for the lifetime of the session.
section: "4.1"
topics:
