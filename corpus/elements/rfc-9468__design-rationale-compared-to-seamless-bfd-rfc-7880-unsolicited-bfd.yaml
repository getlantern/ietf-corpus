document: rfc-9468
kind: design-rationale
summary: Compared to Seamless BFD (RFC 7880), unsolicited BFD involves only minor procedural enhancements to widely deployed BFD and does not require exchange of BFD discriminators over an out-of-band channel before session bring-up, making it simpler to deploy.
