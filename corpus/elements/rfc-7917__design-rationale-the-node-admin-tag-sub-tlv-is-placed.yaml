document: rfc-7917
kind: design-rationale
summary: The Node-Admin-Tag sub-TLV is placed inside the Router CAPABILITY TLV (TLV 242) rather than a new top-level TLV, because route and path selection functionality applies to both TE and non-TE applications and Router CAPABILITY TLV already provides the necessary flooding scope options.
