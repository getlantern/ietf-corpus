document: rfc-6728
kind: interoperability-note
summary: A CacheField with ieEnterpriseNumber set to 29305 denotes a Reverse Information Element for bidirectional flow export. When such fields are present, the Cache MUST generate Data Records in accordance with RFC 5103.
