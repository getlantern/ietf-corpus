document: rfc-2749
kind: normative-requirement
summary: After reconnecting to a new or original PDP that issues an SSQ request, the PEP must reissue requests corresponding to all current RSVP state (as if recently updated) and should include the current cached decision for each state in LPDPDecision.
section: "3.5"
rfc2119_level: MUST
topics:
