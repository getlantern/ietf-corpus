document: rfc-6329
kind: normative-requirement
summary: When two equal-cost paths exist, the path with fewest hops between fork/join points Must win the tie; if hops are also equal, the path traversing the intermediate node with the lower BridgeID Must be selected by the default tie-breaking rule.
section: "11"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
