document: rfc-7519
kind: protocol-element
summary: The "exp" (expiration time) claim identifies the time on or after which the JWT MUST NOT be accepted. Its value MUST be a NumericDate (seconds since 1970-01-01T00:00:00Z UTC). Implementers MAY allow a small clock-skew leeway. Use is OPTIONAL.
section: 4.1.4
topics:
    - jose
    - oauth
