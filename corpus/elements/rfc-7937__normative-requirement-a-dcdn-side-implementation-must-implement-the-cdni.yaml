document: rfc-7937
kind: normative-requirement
summary: 'A dCDN-side implementation MUST implement the cdni_http_request_v1 record type and MUST support providing valid values for all mandatory fields: date, time, time-taken, c-groupid, s-ip, s-hostname, s-port, cs-method, cs-uri, u-uri, protocol, sc-status, sc-total-bytes, sc-entity-bytes, cs(*), sc(*), and s-cached.'
section: 3.4.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
