document: rfc-6170
kind: protocol-element
summary: The certificate image otherLogos type is identified by OID id-logo-certimage, defined as { id-pkix 20 3 }, where id-pkix is { iso(1) identified-organization(3) dod(6) internet(1) security(5) mechanisms(5) pkix(7) }. It extends the Logotype extension of RFC 3709 to carry a complete visual representation of the certificate.
