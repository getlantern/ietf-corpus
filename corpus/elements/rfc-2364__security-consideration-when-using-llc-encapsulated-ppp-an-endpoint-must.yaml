document: rfc-2364
kind: security-consideration
summary: When using LLC-encapsulated PPP, an endpoint MUST NOT assume that PPP session authentication and related security mechanisms also secure other LLC-encapsulated flows on the same virtual connection. Each non-PPP flow is unprotected by PPP-layer authentication.
section: "10"
topics:
    - security
    - ip
