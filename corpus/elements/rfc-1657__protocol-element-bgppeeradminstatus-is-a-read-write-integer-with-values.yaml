document: rfc-1657
kind: protocol-element
summary: bgpPeerAdminStatus is a read-write INTEGER with values stop(1) and start(2). Transitioning from stop to start generates a BGP Start Event; transitioning from start to stop generates a BGP Stop Event, enabling restart of peer connections via SNMP.
section: "5"
topics:
