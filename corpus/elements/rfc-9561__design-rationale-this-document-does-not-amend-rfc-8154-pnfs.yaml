document: rfc-9561
kind: design-rationale
summary: This document does not amend RFC 8154 (pNFS SCSI layout); instead it establishes a mapping from SCSI constructs to NVMe constructs. This approach allows NVMe namespaces to be used within the existing SCSI layout framework without modifying the base specification.
section: "1"
