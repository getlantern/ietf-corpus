document: rfc-9705
kind: normative-requirement
summary: A router that is not an MP MUST send a Conditional PathTear (containing the CONDITIONS object) if the PHOP link or adjacency goes down and the ingress requested node protection AND no PathTear was received from the upstream node.
section: 4.4.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
