document: rfc-7953
kind: privacy-consideration
summary: When VAVAILABILITY components are shared with other users, calendaring systems MUST provide a mechanism to remove nonessential properties (e.g., SUMMARY, LOCATION, DESCRIPTION) before sharing, since recipients may not need or should not see that detail.
section: "9"
rfc2119_level: MUST
topics:
    - privacy
