document: rfc-5440
kind: wire-format
summary: 'PCEP TLVs have a fixed structure: Type (2 bytes), Length (2 bytes, length of value portion only), and Value (variable). TLVs are padded to 4-byte alignment; padding bytes are not counted in the Length field. Unrecognized TLVs MUST be ignored.'
section: "7.1"
