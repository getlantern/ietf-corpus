document: rfc-8008
kind: design-rationale
summary: The document considers a query/response model versus a state-replication (advertisement) model for the FCI. When the volume of FCI updates would exceed request volume, querying dCDNs upon each request (as in recursive redirection) may scale better, but the advertisement model is adopted as the baseline semantic.
section: "2.3"
