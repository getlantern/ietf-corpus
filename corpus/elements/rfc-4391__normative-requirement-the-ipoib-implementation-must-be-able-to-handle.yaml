document: rfc-4391
kind: normative-requirement
summary: The IPoIB implementation MUST be able to handle packets received with or without the use of GRH (Global Routing Header). GRH is required for multicast and inter-subnet unicast, but optional for intra-subnet unicast.
section: "6"
rfc2119_level: MUST
topics:
