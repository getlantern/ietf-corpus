document: rfc-4193
kind: interoperability-note
summary: Site border routers should respond with ICMPv6 Destination Unreachable messages when rejecting packets to Local IPv6 destinations. This feedback is important to avoid transport protocol timeouts.
section: "4.3"
topics:
