document: rfc-3323
kind: protocol-element
summary: 'The Privacy header field is defined to allow user agents to request specific privacy handling for SIP requests and responses. Its syntax is: Privacy-hdr = ''Privacy'' HCOLON priv-value *(";" priv-value), where priv-value = "header" / "session" / "user" / "none" / "critical" / token.'
section: "4.2"
topics:
    - sip
    - privacy
