document: rfc-9769
kind: protocol-element
summary: In interleaved symmetric mode, both peers must support the mode; Peer A MUST NOT send a packet in interleaved mode unless it has an active configured association or received a valid interleaved packet from Peer B, did not send a packet since the last valid reception, and the previous packet was the only response to a received packet.
