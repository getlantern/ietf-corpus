document: rfc-6228
kind: normative-requirement
summary: It is RECOMMENDED that a UAC not insert a '100rel' option-tag in the Require header field when it also indicates support for 199 responses, because proxies are not allowed to generate and send 199 responses when the UAC has required reliable provisional responses.
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
