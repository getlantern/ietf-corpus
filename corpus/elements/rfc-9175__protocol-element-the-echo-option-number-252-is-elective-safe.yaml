document: rfc-9175
kind: protocol-element
summary: The Echo option (number 252) is elective, safe to forward, NoCacheKey, and not repeatable. Its format is opaque with length 1–40 bytes and no default value. It carries a server-generated challenge value that clients must echo back to prove freshness or network reachability.
section: 2.2.1
topics:
