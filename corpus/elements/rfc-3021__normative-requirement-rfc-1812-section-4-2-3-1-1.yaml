summary: 'RFC 1812 Section 4.2.3.1(1) update: in a 31-bit point-to-point link, a packet addressed to {<Network-prefix>, -1} corresponds to one endpoint and MUST be treated as directed to the router on which the address is applied, not as a broadcast.'
