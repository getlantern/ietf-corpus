document: rfc-9491
kind: protocol-element
summary: In SR-based SFC with the integrated NSH service plane, each SF is represented as a segment of the SR segment list. The SFF strips SR information, forwards the packet to the SF, then caches the SR segment list indexed by NSH SPI and SI decremented by 1 for use when the SF returns the packet.
