document: rfc-9740
kind: protocol-element
summary: ipv6ExtensionHeaderType (IE 513, unsigned8, identifier) carries the Next Header code of a single IPv6 extension header type observed in a Flow, drawn from the IANA 'IPv6 Extension Header Types' registry. It is used as a sub-element within ipv6ExtensionHeaderTypeCountList.
