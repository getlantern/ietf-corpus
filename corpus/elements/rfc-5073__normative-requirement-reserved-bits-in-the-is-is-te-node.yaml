document: rfc-5073
kind: normative-requirement
summary: Reserved bits in the IS-IS TE Node Capability Descriptor sub-TLV MUST be set to zero on transmission and MUST be ignored on reception. Any unknown bit flags SHALL be treated as reserved.
section: "4.2"
rfc2119_level: MUST
