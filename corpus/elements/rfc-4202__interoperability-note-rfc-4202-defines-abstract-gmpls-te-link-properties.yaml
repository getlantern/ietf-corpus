document: rfc-4202
kind: interoperability-note
summary: RFC 4202 defines abstract GMPLS TE link properties only; the actual TLV encoding of these properties into IS-IS is specified in RFC 4205 (GMPLS-ISIS) and into OSPF in RFC 4203 (GMPLS-OSPF). Implementations must refer to those documents for wire-format details.
