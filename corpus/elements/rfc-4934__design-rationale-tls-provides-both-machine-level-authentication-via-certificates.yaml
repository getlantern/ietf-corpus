document: rfc-4934
kind: design-rationale
summary: TLS provides both machine-level authentication (via certificates) and channel protection, while EPP additionally uses a client identifier and password for user-level identity. The two-layer approach allows a server to assign multiple user identities per client machine.
section: "8"
