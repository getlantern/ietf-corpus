document: rfc-6089
kind: normative-requirement
summary: Home agents receiving BUs with both BID options and flow identification options MUST logically process BID options first, because BID reference sub-options in flow identification options may refer to BIDs defined in BID options in the same message.
section: 5.3.1
rfc2119_level: MUST
topics:
    - ip
    - mobility
