document: rfc-4261
kind: normative-requirement
summary: All PEP implementations of COPS/TLS MUST support an access control mechanism to identify authorized PDPs. When access control is enabled, the PEP MUST NOT initiate COPS/TLS connections to systems not authorized as PDPs.
section: "7"
rfc2119_level: MUST
topics:
    - tls
    - security
