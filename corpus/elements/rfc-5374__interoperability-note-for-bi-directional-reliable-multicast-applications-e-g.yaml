document: rfc-5374
kind: interoperability-note
summary: For bi-directional reliable multicast applications (e.g., NORM), GKM SHOULD use the 2-tuple {destination IP address, SPI} to identify each IPsec SA and SHOULD allocate a unique unicast destination address for inverse (unicast) data flows to avoid SPI collisions with IKEv2-installed SAs.
section: A.2
topics:
    - ipsec
    - multicast
