document: rfc-2426
kind: normative-requirement
summary: The UTC-OFFSET value MUST use the extended ISO 8601 format with a colon separator between hours and minutes (e.g., +hh:mm). Hour values are 00-23 and minute values are 00-59, with leading zeroes required.
section: 2.4.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
