document: rfc-7780
kind: errata
summary: 'RFC 6325 Section 4.3.2 uses strict ''>'' for MTU test threshold; it should be ''>='' (Err3053). The corrected rule is: if X is not >= Sz, set the ''failed minimum MTU test'' flag; if X >= Sz, advertise the largest tested X for that adjacency.'
section: 5.1.3
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
