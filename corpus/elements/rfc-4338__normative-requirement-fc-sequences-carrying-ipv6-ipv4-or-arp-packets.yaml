document: rfc-4338
kind: normative-requirement
summary: FC Sequences carrying IPv6, IPv4, or ARP packets are REQUIRED to be non-streamed. An Nx_Port is REQUIRED to use continuously increasing SEQ_CNT to avoid FC frame aliasing by Sequence_ID reuse. Each Exchange MUST start SEQ_CNT at zero and increment by one per frame.
section: "11"
rfc2119_level: REQUIRED
topics:
    - ip
