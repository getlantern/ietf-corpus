document: rfc-5865
kind: design-rationale
summary: 'Two PHB implementation models are described: multi-priority (separate queues at different priorities with separate policers) and multi-policer (separate policers feeding a common priority queue). The multi-priority model transfers jitter from higher to lower priority queues; the multi-policer model distributes jitter equally within the high-priority class.'
