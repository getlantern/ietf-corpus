document: rfc-9527
kind: interoperability-note
summary: An end user can redirect a third-party domain (e.g., example.com) to the ISP-assigned Registered Homenet Domain using CNAME, DNAME, or CNAME+DNAME redirection, enabling use of a custom domain without changing the HNA outsourcing configuration.
section: A.2
topics:
