document: rfc-3281
kind: protocol-element
summary: The AAControls PKC extension (id-pe-aaControls, { id-pe 6 }) constrains which attribute types an AC issuer below a given AA CA may include in ACs, using pathLenConstraint, permittedAttrs, excludedAttrs, and permitUnSpecified (default TRUE). When AAControls are used, all PKCs from the AA CA down to the AC issuer MUST contain an AAControls extension.
section: "7.4"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
