document: rfc-7400
kind: interoperability-note
summary: Specifications using the 6CIO must be designed so that receivers that do not receive or do not process a capability indication can still interoperate, presumably without exploiting the indicated capability. The option is meant to be sent sparsely—once the sender has reason to believe the indication was received, there is no need to continue sending it.
section: "3.4"
topics:
    - ip
