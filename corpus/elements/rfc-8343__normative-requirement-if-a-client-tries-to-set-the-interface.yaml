document: rfc-8343
kind: normative-requirement
summary: If a client tries to set the interface 'type' to a value that can never be used by the system (unsupported type or type mismatch with name), the server MUST reject the request; a NETCONF server MUST reply with an rpc-error with the error-tag 'invalid-value'.
section: "5"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
