document: rfc-9887
kind: protocol-element
summary: TLS resumption is supported using PSK identity tied to a NewSessionTicket; clients SHOULD use resumption when holding a valid unused ticket (each ticket is for single use only). Certificates must be verified for revocation since the last NewSessionTicket during resumption.
section: "3.6"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
