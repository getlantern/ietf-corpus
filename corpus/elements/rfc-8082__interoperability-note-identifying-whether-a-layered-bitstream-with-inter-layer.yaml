document: rfc-8082
kind: interoperability-note
summary: Identifying whether a layered bitstream with inter-layer prediction (pyramid-shaped) is in use is non-trivial. A reliable indicator in SDP environments is that RTP streams are grouped using the SDP Grouping Framework (RFC 5888) combined with layer dependency signaling (RFC 5583).
