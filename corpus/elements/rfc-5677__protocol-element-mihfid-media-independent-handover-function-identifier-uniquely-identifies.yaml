document: rfc-5677
kind: protocol-element
summary: MIHFID (Media Independent Handover Function Identifier) uniquely identifies MIHF endpoints for delivering mobility services. It must be implemented as either a Fully Qualified Domain Name (FQDN) or Network Access Identifier (NAI) and can be pre-configured or discovered dynamically.
