document: rfc-9097
kind: protocol-element
summary: The formal metric "Type-P-IP-Sender-Bit-Rate" measures IP-Layer bits transmitted from the Source during sub-interval st within test interval S, where S SHALL be longer than I. It validates that the sender actually generated desired rates and is not a path performance metric.
section: "7.1"
