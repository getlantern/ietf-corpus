document: rfc-8166
kind: wire-format
summary: 'The RPC-over-RDMA version 1 fixed header (rdma_msg) contains four 32-bit fields in fixed order: rdma_xid (transaction ID), rdma_vers (protocol version), rdma_credit (flow-control credit), and the rdma_body union discriminator (rdma_proc). These four fields must remain at the same positions in all subsequent protocol versions.'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
