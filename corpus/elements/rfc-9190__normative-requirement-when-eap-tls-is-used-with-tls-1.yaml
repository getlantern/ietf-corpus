document: rfc-9190
kind: normative-requirement
summary: When EAP-TLS is used with TLS 1.3, the revocation status of all certificates in the certificate chains MUST be checked (except the trust anchor). EAP-TLS servers supporting TLS 1.3 MUST implement Certificate Status Requests (OCSP stapling) per RFC 6066 and Section 4.4.2.1 of RFC 8446.
section: "5.4"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
