document: rfc-4997
kind: normative-requirement
summary: ROHC-FN specifications are case-sensitive and are written in the 7-bit ASCII character set. A specification consists of zero or more constant definitions, an optional global control field list, and one or more encoding method definitions.
section: "4.1"
rfc2119_level: MUST
