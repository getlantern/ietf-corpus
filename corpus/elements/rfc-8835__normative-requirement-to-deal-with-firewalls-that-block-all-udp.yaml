document: rfc-8835
kind: normative-requirement
summary: To deal with firewalls that block all UDP traffic, the mode of TURN using TCP between the WebRTC endpoint and the TURN server MUST be supported, and the mode using TLS over TCP MUST also be supported.
section: "3.4"
rfc2119_level: MUST
