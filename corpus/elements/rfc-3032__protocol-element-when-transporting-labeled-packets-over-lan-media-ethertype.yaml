document: rfc-3032
kind: protocol-element
summary: When transporting labeled packets over LAN media, ethertype 0x8847 indicates an MPLS unicast packet and ethertype 0x8848 indicates an MPLS multicast packet. These ethertypes work with both the ethernet encapsulation and 802.3 LLC/SNAP encapsulation.
