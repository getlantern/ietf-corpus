document: rfc-5389
kind: normative-requirement
summary: When STUN runs standalone over TLS-over-TCP, TLS_RSA_WITH_AES_128_CBC_SHA MUST be implemented at minimum. The client MUST verify the server certificate and identity per RFC 2818 Section 3.1; if the certificate is invalid or does not identify the correct party, the client MUST NOT proceed with the STUN transaction.
section: 7.2.2
rfc2119_level: MUST
topics:
    - nat
    - tls
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
