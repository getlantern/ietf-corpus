document: rfc-2797
kind: security-consideration
summary: Under no circumstances should a signing key be archived, as doing so allows the archiving entity to potentially use the key for forging signatures. Prior to archiving any key, users should be made especially aware that proper verification is made of the certificate used to encrypt the private key material.
section: "9"
topics:
    - pkix
    - security
    - crypto
