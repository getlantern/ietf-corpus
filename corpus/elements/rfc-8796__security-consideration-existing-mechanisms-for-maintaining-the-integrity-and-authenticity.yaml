document: rfc-8796
kind: security-consideration
summary: Existing mechanisms for maintaining the integrity and authenticity of RSVP messages per RFC 2747 (RSVP Cryptographic Authentication) can be applied to protect against message interception and tampering. Security considerations from RFC 4090 and RFC 5920 (MPLS/GMPLS Security Framework) also apply.
