document: rfc-6572
kind: normative-requirement
summary: The User-Name attribute MUST be present in every MAG Access-Request and MUST carry an NAI-format identifier. At least one of NAS-IP-Address, NAS-IPv6-Address, or NAS-Identifier MUST also be present. Service-Type SHOULD be set to 1 (Login).
section: "5.1"
rfc2119_level: MUST
topics:
    - mobility
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
