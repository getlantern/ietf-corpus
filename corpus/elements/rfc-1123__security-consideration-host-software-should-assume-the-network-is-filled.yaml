document: rfc-1123
kind: security-consideration
summary: Host software should assume the network is filled with malevolent entities sending packets designed to have the worst possible effect. Hosts must be prepared not only to survive misbehaving peers but to cooperate in limiting the disruption such hosts can cause to the shared communication facility.
section: 1.2.2
topics:
    - security
