document: rfc-6607
kind: normative-requirement
summary: DHCPv4 and DHCPv6 servers receiving a VSS option MUST return an instance of that option in the reply if the server successfully uses it to allocate an IP address. The server MUST NOT include the option if it is unable to support VSS or the requested VPN in particular.
section: "7.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
