document: rfc-8669
kind: normative-requirement
summary: When a BGP speaker receives a path with an 'invalid' or 'conflicting' BGP Prefix-SID attribute, or cannot process it, it MUST ignore the attribute and MUST assign a local (dynamic, non-SRGB) label as per classic RFC 8277 operation.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
