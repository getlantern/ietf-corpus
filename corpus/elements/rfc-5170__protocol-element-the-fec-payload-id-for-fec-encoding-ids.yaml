document: rfc-5170
kind: protocol-element
summary: The FEC Payload ID for FEC Encoding IDs 3 and 4 is a 32-bit field composed of a 12-bit Source Block Number (allowing up to 2^12 blocks per object) and a 20-bit Encoding Symbol ID (allowing up to 2^20 encoding symbols per block). ESIs 0 to k-1 identify source symbols; k to n-k-1 identify repair symbols.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
