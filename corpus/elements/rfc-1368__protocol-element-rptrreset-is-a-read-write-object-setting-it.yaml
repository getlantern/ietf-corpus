document: rfc-1368
kind: protocol-element
summary: rptrReset is a read-write object; setting it to reset(2) causes a transition to the START state of the IEEE 802.3 repeater state machine and triggers a disruptive self-test. Management counters and portAdminStatus parameters are not reset. A rptrResetEvent trap should be sent on completion.
section: "4.2"
topics:
    - snmp
