document: rfc-3852
kind: wire-format
summary: 'The EnvelopedData version is assigned as follows: version 4 if originatorInfo is present with other-typed certs or CRLs; version 3 if v2 attribute certificates, pwri, or ori RecipientInfo structures are present; version 0 if originatorInfo and unprotectedAttrs are absent and all RecipientInfos are version 0; otherwise version 2.'
section: "6.1"
topics:
