document: rfc-2440
kind: normative-requirement
summary: If an evaluating implementation encounters a critical subpacket (bit 7 of type octet set) that it does not recognize, it SHOULD consider the signature to be in error. Unknown non-critical subpackets SHOULD be silently ignored.
section: 5.2.3.1
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
