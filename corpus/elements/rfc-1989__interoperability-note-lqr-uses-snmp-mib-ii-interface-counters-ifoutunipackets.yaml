document: rfc-1989
kind: interoperability-note
summary: LQR uses SNMP MIB-II interface counters (ifOutUniPackets, ifOutOctets, ifInUniPackets, ifInDiscards, ifInErrors, ifInOctets) as defined in RFC 1213. These counters are not reset when LCP enters Establishment phase.
