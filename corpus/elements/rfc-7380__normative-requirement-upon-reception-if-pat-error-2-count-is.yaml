document: rfc-7380
kind: normative-requirement
summary: Upon reception, if PAT_error_2_count is available (i.e., not 0xFFFF), receivers MUST ignore PAT_error_count. Similarly, if PMT_error_2_count is available, receivers MUST ignore PMT_error_count.
