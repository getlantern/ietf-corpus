document: rfc-3124
kind: normative-requirement
summary: When a stream terminates, the application SHOULD invoke cm_close(cm_streamid) to inform the CM. PMTU information used by cm_mtu() SHOULD be obtained via path MTU discovery and MAY be statically configured if that mechanism is unavailable.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - congestion
