document: rfc-9219
kind: interoperability-note
summary: The extension is designed so new "smimeStatus" values added by future extensions can be treated similarly to existing values (e.g., a new "encrypted+signed/verified" value can be treated as "signed/verified" for the purposes of "hasVerifiedSmime"), preserving backward compatibility.
