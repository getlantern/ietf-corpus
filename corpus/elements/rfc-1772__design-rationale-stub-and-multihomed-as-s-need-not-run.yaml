document: rfc-1772
kind: design-rationale
summary: Stub and multihomed AS's need not run BGP; they may use EGP or other protocols. This minimizes impact on the existing Internet infrastructure without degrading inter-AS routing quality for traffic to or from those AS's.
section: "3.1"
topics:
    - bgp
    - routing
