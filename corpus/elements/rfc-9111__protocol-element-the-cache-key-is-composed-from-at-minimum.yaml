document: rfc-9111
kind: protocol-element
summary: The cache key is composed from at minimum the request method and target URI. Content-negotiated responses are differentiated by incorporating Vary-nominated request header fields. Caches may add additional material such as the referring site's identity ('double keying') to mitigate privacy risks.
