document: rfc-9967
kind: protocol-element
summary: 'The ''sub_id'' object for SCIM events contains: ''format'' (set to ''scim''), ''uri'' (REQUIRED SCIM relative path), ''externalId'' (OPTIONAL cross-domain identifier), and ''id'' (OPTIONAL for backwards compatibility). Additional uniqueness-scoped SCIM attributes MAY also be included.'
