document: rfc-6098
kind: protocol-element
summary: 'The 64-bit Identification field serves dual purposes: matching a GNM to its corresponding GNAM and providing replay protection. When timestamps are used it is formatted as an NTP 64-bit timestamp; when nonces are used the high-order 32 bits carry the receiver''s nonce and the low-order 32 bits carry the sender''s nonce.'
section: "4.1"
topics:
    - mobility
    - security
    - ip
