document: rfc-2955
kind: design-rationale
summary: The connection descriptor table separates shared IWF behavioral attributes from the cross-connect index entries. Multiple connections requiring the same DE/CLP mapping, congestion mapping, encapsulation, fragmentation, and ARP settings all reference the same descriptor row, avoiding redundant per-connection storage.
section: "3.2"
