summary: The document includes a Security Considerations section (Section 14). The mapping process itself transforms YANG data models into validation schemas; the security properties of the resulting NETCONF content validation depend on the correctness of the mapping implementation and the completeness of the generated DSDL schemas in capturing all YANG constraints.
