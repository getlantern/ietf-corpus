document: rfc-1342
kind: protocol-element
summary: 'The ''Q'' encoding is similar to RFC 1341 Quoted-Printable: any 8-bit value may be represented as ''='' followed by two hex digits; the underscore ''_'' always represents hexadecimal 20 (SPACE); other printable ASCII characters (excluding ''='', ''?'', ''_'', SPACE) may be used literally. It is recommended for Latin character sets.'
section: The "Q" encoding
topics:
