document: rfc-5447
kind: protocol-element
summary: The MIP6-Agent-Info AVP (AVP code 486) is of type Grouped and contains necessary information to assign a home agent to the mobile node. It MUST contain either the MIP-Home-Agent-Address AVP, the MIP-Home-Agent-Host AVP, or both. It may also include an optional MIP6-Home-Link-Prefix sub-AVP.
section: 4.2.1
topics:
    - diameter
    - mobility
    - realtime
