document: rfc-9964
kind: security-consideration
summary: The ML-DSA seed and the private key expanded from the seed require the same level of protection. If an unauthorized party obtains the seed, they can forge signatures, undermining authenticity and integrity guarantees.
section: "7.1"
topics:
