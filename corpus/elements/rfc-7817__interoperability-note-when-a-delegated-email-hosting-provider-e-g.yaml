document: rfc-7817
kind: interoperability-note
summary: When a delegated email hosting provider (e.g., 'imap.hosting.example.net') serves email for another domain (e.g., 'example.org'), the TLS certificate must include SRV-IDs or DNS-IDs for the served domain to avoid mandatory manual user confirmation of certificate exceptions.
section: "4.1"
topics:
    - tls
    - email
    - pkix
    - dns
