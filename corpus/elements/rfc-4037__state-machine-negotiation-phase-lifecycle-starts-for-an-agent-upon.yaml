document: rfc-4037
kind: state-machine
summary: 'Negotiation Phase lifecycle: starts for an agent upon receiving the first NO or sending the first NR not part of an existing Phase; ends on the first NR sent or received after which no further negotiations are expected. Phases do not overlap; multiple Phases may occur per connection. An agent keeps the Phase open by including a true ''Offer-Pending'' parameter.'
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
