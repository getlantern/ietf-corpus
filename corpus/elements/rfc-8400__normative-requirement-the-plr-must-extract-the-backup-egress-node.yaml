document: rfc-8400
kind: normative-requirement
summary: The PLR MUST extract the backup egress node from the respective SERO object in either a Path or Resv message; if no matching SERO is found, the PLR tries to find the backup egress node by matching the destination IP address of the LSP.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
