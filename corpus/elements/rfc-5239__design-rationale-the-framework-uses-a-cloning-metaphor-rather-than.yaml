document: rfc-5239
kind: design-rationale
summary: The framework uses a 'cloning' metaphor rather than 'inheritance' because it more closely fits object replication rather than data-type re-usage and extension. A cloned child conference object contains all parent data by default, may expand data within supported schema types, but cannot override parent-enforceable data elements unless the child is declared independent of its parent.
section: "7.1"
topics:
    - realtime
