document: rfc-4363
kind: protocol-element
summary: dot1dUserPriorityRegenTable maps each incoming User Priority (0..7) to a Regenerated User Priority (0..7) on a per-port basis. This only affects media that support native User Priority. The default mapping is identity (each priority maps to itself).
