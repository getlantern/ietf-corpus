document: rfc-6378
kind: normative-requirement
summary: When the LER transitions into Normal state, the PSC Control Process SHALL check the persistent state of local triggers to decide if it should further transition into a new state. In Normal state, the end point SHALL transmit an NR(0,0) message.
section: 4.3.3.1
rfc2119_level: MUST
topics:
