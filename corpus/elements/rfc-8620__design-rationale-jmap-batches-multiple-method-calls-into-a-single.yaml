document: rfc-8620
kind: design-rationale
summary: JMAP batches multiple method calls into a single HTTP request to reduce round trips and improve battery life on mobile devices. The ResultReference mechanism and createdIds map allow dependent calls to be chained in a single batch without needing extra round trips.
