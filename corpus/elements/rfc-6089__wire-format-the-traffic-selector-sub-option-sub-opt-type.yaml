document: rfc-6089
kind: wire-format
summary: The Traffic Selector Sub-Option (Sub-Opt Type 3) encodes an 8-bit TS Format field (0 reserved), an 8-bit Reserved field, and a variable-length Traffic Selector field whose format is defined externally (RFC 6088 is mandatory to implement). At most one such sub-option may appear per flow identification mobility option.
section: 4.2.1.4
topics:
    - ip
    - mobility
