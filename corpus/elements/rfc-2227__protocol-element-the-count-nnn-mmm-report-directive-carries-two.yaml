document: rfc-2227
kind: protocol-element
summary: 'The ''count=NNN/MMM'' report directive carries two decimal integers: the count of uses since the last report and the count of reuses. Its transmission in a request with no other Meter directive also implicitly conveys ''will-report-and-limit''. Proxies SHOULD NOT transmit ''count=0/0''.'
section: "3.4"
topics:
    - http
