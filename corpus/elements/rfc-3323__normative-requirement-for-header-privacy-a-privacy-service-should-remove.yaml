document: rfc-3323
kind: normative-requirement
summary: For header privacy, a privacy service SHOULD remove all Via headers added prior to the request's arrival (Via stripping) and add a single Via header representing itself. It SHOULD replace the Contact header value with a URI that dereferences to the privacy service, and that replacement URI MUST dereference to the privacy service.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
