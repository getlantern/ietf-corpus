document: rfc-9274
kind: design-rationale
summary: New cost mode definitions should indicate whether the mode applies to all or a subset of cost metrics. This recommendation prevents nondeterministic behavior when a cost mode is paired with a metric for which the association is ambiguous or meaningless.
section: "3.1"
extracted_by: claude-sonnet-4-6
