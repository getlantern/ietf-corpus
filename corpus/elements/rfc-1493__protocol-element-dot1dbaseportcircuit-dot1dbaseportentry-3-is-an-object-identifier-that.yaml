document: rfc-1493
kind: protocol-element
summary: dot1dBasePortCircuit (dot1dBasePortEntry 3) is an OBJECT IDENTIFIER that disambiguates ports sharing the same dot1dBasePortIfIndex, for example multiple X.25 virtual circuits on one interface. Ports with a unique ifIndex may set this to { 0 0 }.
