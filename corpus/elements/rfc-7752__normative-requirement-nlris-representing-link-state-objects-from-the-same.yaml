document: rfc-7752
kind: normative-requirement
summary: NLRIs representing link-state objects from the same routing universe MUST carry the same Identifier value. NLRIs with different Identifier values MUST be considered to be from different routing universes.
section: "3.2"
rfc2119_level: MUST
