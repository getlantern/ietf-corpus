document: rfc-3602
kind: interoperability-note
summary: HMAC-SHA-1 and HMAC-MD5 are currently considered sufficient strength to serve as IKE generators of 128-bit AES keys and as ESP authenticators for AES encryption using 128-bit keys, without requiring SHA-256/384/512.
section: "5.4"
topics:
