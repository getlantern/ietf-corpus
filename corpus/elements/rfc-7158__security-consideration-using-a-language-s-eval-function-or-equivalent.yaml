document: rfc-7158
kind: security-consideration
summary: Using a language's eval() function (or equivalent) to parse JSON texts constitutes an unacceptable security risk, since the text could contain executable code along with data declarations. This applies to JavaScript and any other language in which JSON texts conform to that language's syntax.
section: "12"
topics:
    - json
    - security
