document: rfc-1654
kind: normative-requirement
summary: If a system does not receive successive KEEPALIVE, UPDATE, or NOTIFICATION messages within the Hold Time period, it must send a NOTIFICATION with Error Code Hold Timer Expired and close the BGP connection.
section: "6.5"
rfc2119_level: MUST
topics:
    - bgp
    - routing
