document: rfc-9005
kind: design-rationale
summary: The Policy Association mechanism avoids conveying policy details in PCEP messages, allowing PCEP speakers to associate LSPs with policies without knowing policy internals. This simplifies network operations, avoids frequent software upgrades, and speeds introduction of new policies.
