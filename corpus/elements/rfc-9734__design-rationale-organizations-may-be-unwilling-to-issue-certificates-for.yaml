document: rfc-9734
kind: design-rationale
summary: Organizations may be unwilling to issue certificates for an IM client using a general KeyPurposeId such as id-kp-serverAuth or id-kp-clientAuth because of the risk that such certificates could be abused in a cross-protocol attack. A dedicated IM URI EKU avoids this risk.
section: "1"
topics:
