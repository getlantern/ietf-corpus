document: rfc-2894
kind: protocol-element
summary: The KeepLen field in a Use-Prefix Part specifies a number of bits to copy from the Matched Prefix into the New Prefix at positions UseLen through UseLen+KeepLen-1, enabling a single PCO to preserve site subnetting structure when changing a global prefix across an entire site.
section: 3.2.1.2
topics:
    - ip
    - v6ops
