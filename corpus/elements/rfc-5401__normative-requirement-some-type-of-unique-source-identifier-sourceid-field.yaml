document: rfc-5401
kind: normative-requirement
summary: Some type of unique source identifier <sourceId> field SHOULD be present in packets transmitted by reliable multicast session members. Identity based solely on arriving packet source addresses is insufficient due to routing changes, NAT devices, multiple interfaces, and other network bridging approaches.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - multicast
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
