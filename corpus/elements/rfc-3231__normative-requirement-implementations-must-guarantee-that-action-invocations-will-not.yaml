document: rfc-3231
kind: normative-requirement
summary: Implementations MUST guarantee that action invocations will not occur before at least schedInterval seconds have passed since the previous invocation. A periodic schedule with schedInterval=0 MUST be ignored and never invoke an action.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
