document: rfc-8946
kind: protocol-element
summary: The "div" PASSporT type is a new PASSporT extension carrying a "div" claim that indicates the previous destination of a call before retargeting. It is created by authentication services at retargeting entities and conveys the original called-party identifier that caused the call to be routed to the retargeting entity.
section: "3"
topics:
