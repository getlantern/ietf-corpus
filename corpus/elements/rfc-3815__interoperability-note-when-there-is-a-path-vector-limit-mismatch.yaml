document: rfc-3815
kind: interoperability-note
summary: When there is a Path Vector Limit mismatch between an LDP Entity and its Peer during session initialization, the session uses the Entity's configured Path Vector Limit value. A mplsLdpPathVectorLimitMismatch notification is sent to alert the operator of the discrepancy.
section: 3.5.4
topics:
    - mpls
