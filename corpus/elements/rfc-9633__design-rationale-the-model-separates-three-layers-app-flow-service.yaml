document: rfc-9633
kind: design-rationale
summary: The model separates three layers — App-flow, service sub-layer, and forwarding sub-layer — corresponding to edge, relay, and transit node types. A shared traffic-profile referenced by any layer avoids repeating traffic parameters at each level; membership back-references are automatically populated as read-only state.
