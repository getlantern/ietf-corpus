document: rfc-2305
kind: security-consideration
summary: Offramp facsimile causes an outdial that imposes significant resource consumption including financial cost, making unauthorized use and unsolicited bulk email serious threats. Offramp gateways SHOULD provide the ability to authorize senders, typically through originator authentication (cleartext keywords or encryption-based signing) and/or source filtering.
section: 5.2.2
rfc2119_level: SHOULD
topics:
    - security
    - email
