document: rfc-9198
kind: protocol-element
summary: Routing Class is a Route that treats a class of different packet types equally (designated 'C'). Knowledge of such a class allows any packet type within the class to be used for subsequent Route measurement, and is determined primarily by the hash functions used at each ECMP instance on the path.
section: "3.1"
topics:
    - measurement
    - routing
