document: rfc-4456
kind: normative-requirement
summary: None of the BGP path attributes defined for route reflection (ORIGINATOR_ID, CLUSTER_LIST) should be modifiable through configuration when exchanging internal routing information between RRs, Clients, and Non-Clients, as modification could result in routing loops.
section: "10"
rfc2119_level: SHOULD NOT
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
