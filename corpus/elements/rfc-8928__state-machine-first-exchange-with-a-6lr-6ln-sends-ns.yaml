kind: state-machine
summary: 'First exchange with a 6LR: 6LN sends NS(EARO, C-flag) → 6LR challenges with NA(EARO, status=Validation Requested, NonceLR) → 6LN responds with NS(EARO, CIPO, NonceLN, NDPSO) → 6LR verifies and replies with NA(EARO). Subsequent renewals skip the challenge if state is consistent.'
