document: rfc-9589
kind: security-consideration
summary: Restricting the RPKI Signed Object profile to only the signing-time attribute (removing binary-signing-time) eliminates the ambiguity that arose when both attributes were present but expressed different date/time values, even though RFC 6019 mandated they match.
