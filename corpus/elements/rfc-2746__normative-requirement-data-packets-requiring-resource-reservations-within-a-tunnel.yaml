document: rfc-2746
kind: normative-requirement
summary: Data packets requiring resource reservations within a tunnel MUST be encapsulated with an outer IP header and a UDP header; the UDP port numbers distinguish packets of different RSVP sessions so that intermediate routers can apply standard filterspec handling.
section: 2.2.1
rfc2119_level: MUST
topics:
    - qos
    - vpn
