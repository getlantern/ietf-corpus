document: rfc-3821
kind: interoperability-note
summary: FC Primitive Signals, Primitive Sequences, and Class 1 FC Frames are NOT transmitted across an FCIP Link because they cannot be encoded using FC Frame Encapsulation. FCIP is also explicitly not a replacement for the FC Arbitrated Loop interconnect.
