document: rfc-2788
kind: security-consideration
summary: SNMPv1 alone is not a secure environment; even on a network secured with IPsec there is no control over which hosts on that network may GET objects from this MIB. SNMPv3 with USM and VACM is recommended to enforce per-principal access control.
section: "8"
topics:
    - snmp
    - security
    - ipsec
