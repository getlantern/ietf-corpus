document: rfc-9369
kind: design-rationale
summary: QUIC version 2 is not intended to deprecate version 1, and the two are defined as mutually compatible versions under RFC 9368. Servers are encouraged to support both simultaneously to maximize compatibility, especially for HTTP/3 via Alt-Svc.
