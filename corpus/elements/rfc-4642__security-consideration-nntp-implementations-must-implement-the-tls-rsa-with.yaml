document: rfc-4642
kind: security-consideration
summary: NNTP implementations MUST implement the TLS_RSA_WITH_RC4_128_MD5 cipher suite and SHOULD implement TLS_DHE_DSS_WITH_3DES_EDE_CBC_SHA to assure interoperability between compliant implementations. All other cipher suites are OPTIONAL.
