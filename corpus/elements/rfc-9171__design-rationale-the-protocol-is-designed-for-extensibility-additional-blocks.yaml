document: rfc-9171
kind: design-rationale
summary: 'The protocol is designed for extensibility: additional blocks, administrative records, control flags, and status report types may be defined in supplementary specifications. Unrecognized bundle and block processing control flags MUST be ignored to permit incremental deployment across nodes that may not implement the same extension set simultaneously.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
