document: rfc-7611
kind: security-consideration
summary: ACCEPT_OWN permits a router's own route prefix to be advertised to a different VRF on the same router. Such a route shares the same security vulnerabilities as any other BGP route and does not introduce new vulnerabilities beyond those inherent in BGP VPN (RFC 4364).
section: "6"
topics:
    - security
    - bgp
