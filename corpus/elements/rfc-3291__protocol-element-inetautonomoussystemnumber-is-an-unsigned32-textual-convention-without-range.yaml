document: rfc-3291
kind: protocol-element
summary: InetAutonomousSystemNumber is an Unsigned32 textual convention (without range restriction) representing an AS number. The unrestricted range is intentional to accommodate a future expansion from 16-bit to 32-bit AS number space.
