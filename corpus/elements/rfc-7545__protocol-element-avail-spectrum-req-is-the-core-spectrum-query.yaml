document: rfc-7545
kind: protocol-element
summary: AVAIL_SPECTRUM_REQ is the core spectrum query. When a Master Device queries on its own behalf, deviceDesc and location are REQUIRED. When querying on behalf of a Slave Device, masterDeviceLocation is REQUIRED, while the Slave Device's location is OPTIONAL. The optional requestType field (max 64 octets) can modify query behavior per ruleset.
section: 4.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
