document: rfc-5415
kind: protocol-element
summary: The CAPWAP Discovery phase allows WTPs to dynamically locate ACs by sending Discovery Request messages to known unicast addresses, multicast groups, or broadcast. Any AC receiving the request responds with a Discovery Response containing its capabilities, allowing the WTP to select an AC for DTLS session establishment.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
