document: rfc-3411
kind: protocol-element
summary: An SNMP engine is the core of an SNMP entity, consisting of a Dispatcher, a Message Processing Subsystem, a Security Subsystem, and an Access Control Subsystem. There is a one-to-one association between an SNMP engine and the SNMP entity that contains it. The engine is uniquely identified within an administrative domain by its snmpEngineID.
section: 3.1.1
topics:
    - snmp
