document: rfc-6265
kind: protocol-element
summary: The HttpOnly attribute instructs the user agent to omit the cookie when providing access via non-HTTP APIs such as document.cookie in browsers. It is independent of the Secure attribute; a cookie may carry both.
section: 4.1.2.6
