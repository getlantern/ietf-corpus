document: rfc-4129
kind: protocol-element
summary: '''Channel Number out of range'' (0x1c) is sent when a received message contains a channel number greater than 63 for DPNSS or 31 for DASS 2. ''Channel Number not configured'' (0x1d) is sent when the channel number is valid in range but not provisioned.'
section: 2.5.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
