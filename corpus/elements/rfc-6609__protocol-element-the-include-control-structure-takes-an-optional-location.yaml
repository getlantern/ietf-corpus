document: rfc-6609
kind: protocol-element
summary: The 'include' control structure takes an optional LOCATION parameter (':personal' or ':global', defaulting to ':personal'), an optional ':once' parameter, an optional ':optional' parameter, and a constant string script name. It executes the named script inline at the point of the command.
