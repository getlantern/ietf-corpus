document: rfc-7307
kind: design-rationale
summary: The use of multiple topologies for LDP does not require different label spaces for each topology; an LSR can use the same label space for all MT FECs as for the default topology, and signaling for different topologies can be done within a single LDP session. This avoids data-plane changes.
