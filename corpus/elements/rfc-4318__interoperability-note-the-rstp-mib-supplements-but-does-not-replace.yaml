document: rfc-4318
kind: interoperability-note
summary: The RSTP-MIB supplements but does not replace the Bridge MIB (RFC 4188). RFC 4188 updated the original RFC 1493 Bridge MIB to SMIv2, added dot1dStpPortPathCost32 for 802.1t support, and clarified interpretations of dot1dStpPriority, dot1dStpPortPriority, and dot1dStpTimeSinceTopologyChange for RSTP.
