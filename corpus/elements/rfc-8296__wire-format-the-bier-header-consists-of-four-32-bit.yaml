summary: 'The BIER header consists of four 32-bit rows: (1) BIFT-id (20 bits), TC (3 bits), S bit (1 bit), TTL (8 bits); (2) Nibble (4 bits), Ver (4 bits), BSL (4 bits), Entropy (20 bits); (3) OAM (2 bits), Rsv (2 bits), DSCP (6 bits), Proto (6 bits), BFIR-id (16 bits); followed by the BitString of variable length.'
