document: rfc-6320
kind: normative-requirement
summary: Support of the Generic Response message, both as sender and as receiver, is REQUIRED for all ANCP agents regardless of what capabilities they support. It is used to return a result code and diagnostic information (via Status-Info TLV) when no data other than success/failure need be returned.
section: "4.2"
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
