document: rfc-5384
kind: protocol-element
summary: When a Prune is received from a downstream neighbor that had previously sent attributes, those attributes are considered withdrawn. The upstream router may need to send a new Join with the updated attribute set derived from remaining downstream neighbors.
section: 3.3.4
topics:
