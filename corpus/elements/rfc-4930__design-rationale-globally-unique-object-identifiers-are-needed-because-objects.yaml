document: rfc-4930
kind: design-rationale
summary: Globally unique object identifiers are needed because objects such as name servers and contacts can have utility in multiple repositories; maintaining disjoint copies can cause inconsistencies with adverse Internet consequences (e.g., stale DNS delegation after renaming a name server in only one repository).
section: "2.8"
topics:
    - dns
