document: rfc-8655
kind: protocol-element
summary: 'DetNet architecture comprises three planes: the Application Plane (User Agent, Flow Management Entity, TSpec abstractions, Northbound Service Interface), the Controller Plane (Controller Plane Functions including PCE and NME, computes deterministic paths), and the Network Plane (DetNet nodes, NICs, Southbound Interface). This mirrors SDN layering from RFC 7426.'
section: "4.4"
topics:
    - routing
    - qos
