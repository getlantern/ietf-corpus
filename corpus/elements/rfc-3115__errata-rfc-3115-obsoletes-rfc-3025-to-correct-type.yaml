document: rfc-3115
kind: errata
summary: 'RFC 3115 obsoletes RFC 3025 to correct type number discrepancies: CVSE-TYPE-NUMBER was assigned 37 in RFC 3025 but 38 by IANA; NVSE-TYPE-NUMBER was 133 in RFC 3025 but 134 by IANA. Current implementations follow the IANA assignments, making the correction necessary.'
section: RFC Editor Note
topics:
    - mobility
    - registry
