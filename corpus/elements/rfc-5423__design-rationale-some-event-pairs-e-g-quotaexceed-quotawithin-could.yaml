document: rfc-5423
kind: design-rationale
summary: Some event pairs (e.g., QuotaExceed/QuotaWithin) could be collapsed into a single event type with a distinguishing parameter, but until a subscription model is formulated it is impractical to make that decision, so they are defined as separate event types.
