document: rfc-2020
kind: normative-requirement
summary: Training completion requires that 24 consecutive error-free training frames be received. If fewer are passed, dot12Status transitions to linkFailure; if 24 pass but training configuration bits indicate a problem, the state transitions to openFailure.
section: "3.8"
rfc2119_level: REQUIRED
