document: rfc-4819
kind: wire-format
summary: 'The ''listattributes'' response returns zero or more packets each encoded as: string ''attribute'', string attribute name, boolean compulsory. The ''compulsory'' field indicates whether the attribute is enforced by server administrative policy regardless of client specification. A status packet MUST be sent after all responses.'
section: "4.4"
rfc2119_level: MUST
