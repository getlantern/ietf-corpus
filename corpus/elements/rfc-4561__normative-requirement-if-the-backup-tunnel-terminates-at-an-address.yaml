document: rfc-4561
kind: normative-requirement
summary: If the backup tunnel terminates at an address different from the MP's node-id (Case 2), a node-id sub-object MUST also be included in the RRO of the backup tunnel so the PLR can compare node-ids across primary and backup tunnel RROs to find the MP.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
