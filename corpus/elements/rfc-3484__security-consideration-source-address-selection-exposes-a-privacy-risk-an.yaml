document: rfc-3484
kind: security-consideration
summary: 'Source address selection exposes a privacy risk: an unfriendly node can probe a target by sending requests to anycast or multicast addresses (or via upper-layer protocols that do not fix the reply source), causing the target to reveal its own addresses through its choice of source address for reply packets, enabling correlation of multiple addresses.'
section: "9"
topics:
