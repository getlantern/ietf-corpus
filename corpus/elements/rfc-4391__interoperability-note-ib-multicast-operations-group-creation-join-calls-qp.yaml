document: rfc-4391
kind: interoperability-note
summary: IB multicast operations (group creation, join calls, QP attachment) are subject to resource-constraint failures that can cause silent packet-forwarding failures — for example, a router's 'NonMember' join failure for a newly created group. Implementations SHOULD log errors from any IB multicast operation failure.
section: "12"
rfc2119_level: SHOULD
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
