document: rfc-5287
kind: normative-requirement
summary: The CEP/TDM Payload Bytes parameter is OPTIONAL; if omitted, the default payload size defined for the corresponding service MUST be assumed. For CESoPSN PWs, the specified value P MUST be an integer multiple of N, where N is the number of timeslots.
section: "3.2"
rfc2119_level: MUST
topics:
