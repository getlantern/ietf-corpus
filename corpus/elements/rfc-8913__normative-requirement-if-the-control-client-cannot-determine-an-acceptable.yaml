document: rfc-8913
kind: normative-requirement
summary: If the Control-Client cannot determine an acceptable mode — or when bit combinations do not make sense (e.g., authenticated and unauthenticated bits both set) — it MUST respond with zero Mode bits in the Set-Up-Response message, indicating it will not continue the control connection.
section: "4.1"
rfc2119_level: MUST
topics:
    - measurement
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
