document: rfc-4271
kind: interoperability-note
summary: BGP version negotiation is accomplished by retrying connection attempts starting with the highest supported version. If a peer returns NOTIFICATION with error OPEN Message Error / Unsupported Version Number, the Data field carries the largest locally-supported version less than the peer's bid, enabling rapid convergence on the highest common version.
section: "7"
topics:
    - bgp
    - routing
