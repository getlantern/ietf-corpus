document: rfc-2491
kind: design-rationale
summary: NBMA shortcuts use ND Redirect messages to inform a source host of a better first hop, retaining the standard IPv6 host stack without per-link-layer modifications. This design allows destination interfaces to perform their own dynamic load sharing since NHRP returns the NBMA address chosen by the target when it first accepted the flow.
section: "3.2"
topics:
