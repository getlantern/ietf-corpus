document: rfc-4872
kind: design-rationale
summary: Both the S (Secondary) bit and P (Protecting) bit are required because the S bit alone is insufficient to determine whether resource allocation should be performed for an LSP within the protected entity. A single bit cannot distinguish a secondary protecting LSP from other LSP roles; the P bit resolves this unambiguously.
section: 4.2.2
topics:
    - mpls
    - routing
