document: rfc-9125
kind: protocol-element
summary: To carry the receiving gateway's SID for prefix X, each Tunnel TLV in the Tunnel Encapsulation attribute contains a Prefix-SID sub-TLV (per RFC 9012) for X. This SID becomes the next SID processed before the gateway completes packet processing.
