document: rfc-1964
kind: normative-requirement
summary: When source address channel binding values are provided and the received token bears address restrictions, it is recommended that the implementation check that the source address matches and return GSS_S_BAD_BINDINGS if a mismatch is detected.
section: 1.1.1
rfc2119_level: SHOULD
topics:
    - security
