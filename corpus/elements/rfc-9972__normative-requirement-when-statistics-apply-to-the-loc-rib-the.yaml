document: rfc-9972
kind: normative-requirement
summary: When statistics apply to the Loc-RIB, the 'Peer Type' field in the Per-Peer Header of the BMP Statistics Report message MUST be set to 3 (Loc-RIB Instance Peer) per RFC 9069; otherwise it MUST be set as defined in Section 4.2 of RFC 7854.
section: "3.1"
rfc2119_level: MUST
topics:
    - bgp
    - measurement
