document: rfc-4508
kind: protocol-element
summary: 'The Refer-To header field BNF is extended to allow feature parameters (feature-param) in addition to generic parameters. The extended grammar is: Refer-To = ("Refer-To" / "r") HCOLON ( name-addr / addr-spec ) *(SEMI refer-param), where refer-param = generic-param / feature-param.'
section: "3"
topics:
    - sip
extracted_by: claude-sonnet-4-6
