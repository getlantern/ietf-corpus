document: rfc-5310
kind: security-consideration
summary: The mechanism does not protect IS-IS against replay attacks. An adversary could replay old IIHs to bring down adjacencies, or replay old CSNPs/PSNPs to trigger LSP flooding. Crypto sequence numbers are noted as a potential solution but are out of scope.
