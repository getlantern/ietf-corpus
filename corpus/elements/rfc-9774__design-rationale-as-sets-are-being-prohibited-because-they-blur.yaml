document: rfc-9774
kind: design-rationale
summary: AS_SETs are being prohibited because they blur the semantics of the origin AS for aggregated prefixes, which prevents authentication of route origin in RPKI-based security technologies and can cause reachability problems. Analysis of historical Internet routing data shows AS_SET aggregation is very seldom used in practice.
section: "1"
topics:
    - bgp
    - routing
    - security
