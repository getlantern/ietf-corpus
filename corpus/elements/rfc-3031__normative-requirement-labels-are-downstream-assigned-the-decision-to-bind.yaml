document: rfc-3031
kind: normative-requirement
summary: 'Labels are downstream-assigned: the decision to bind a label L to FEC F is made by the downstream LSR (Rd), which then informs the upstream LSR (Ru). Label bindings are therefore distributed in the downstream-to-upstream direction.'
section: "3.4"
rfc2119_level: MUST
topics:
    - routing
