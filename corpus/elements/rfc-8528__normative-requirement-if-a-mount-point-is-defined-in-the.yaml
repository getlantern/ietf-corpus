document: rfc-8528
kind: normative-requirement
summary: If a mount point is defined in the parent schema but has no entry in the '/schema-mounts/mount-point' list, then the mounted schema is void and instances of that mount point MUST NOT contain any data except those defined in the parent schema.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
