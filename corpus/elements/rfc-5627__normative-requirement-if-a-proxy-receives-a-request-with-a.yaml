document: rfc-5627
kind: normative-requirement
summary: If a proxy receives a request with a 'gr' URI parameter in the Request-URI that does not match a currently valid GRUU in the domain, it SHOULD reject with 404. If there are no registered contacts bound to the GRUU, the proxy MUST return 480.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
