document: rfc-8824
kind: design-rationale
summary: CoAP's asymmetric message format—where requests and responses carry different options (e.g., Uri-Path in requests only, Content-Format in responses only)—required introducing the Direction Indicator (DI) in SCHC Field Descriptors, allowing a single Rule to process upstream and downstream headers differently rather than requiring separate Rules per direction.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
