document: rfc-5837
kind: security-consideration
summary: Policy controls on what sub-objects to include MAY be implemented based on the destination IP address of the ICMP reply, allowing detailed information (ifIndex, name) to be sent to management addresses within the administrative domain while withholding it from external or untrusted destinations.
section: "6"
rfc2119_level: MAY
