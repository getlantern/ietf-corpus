document: rfc-4271
kind: normative-requirement
summary: When connection collision occurs, one connection MUST be closed. The connection initiated by the BGP speaker with the higher-valued BGP Identifier (treated as a 4-octet unsigned integer in host byte order) is retained.
section: "6.8"
rfc2119_level: MUST
topics:
    - bgp
    - routing
