summary: 'The SIZE status attribute value is encoded as ''number64'', defined as 1*DIGIT representing an unsigned 63-bit integer in the range 0 to 9,223,372,036,854,775,807. The grammar rule is: status-att-val =/ "SIZE" SP number64.'
