document: rfc-9166
kind: design-rationale
summary: IGMP/MLD snooping is independent of the IGMP/MLD protocols themselves, so the data model defined in this document does not augment or require the IGMP/MLD data model defined in RFC 8652. The snooping switch analyzes packets without running IGMP/MLD protocols.
