document: rfc-8189
kind: normative-requirement
summary: In multi-cost responses, if a cost type is not available for a particular source/destination pair, the ALTO Server MUST use the JSON 'null' value for that array element; if none of the cost types are available, the Server MAY omit the entry entirely.
section: 4.1.3
rfc2119_level: MUST
topics:
    - http
    - json
