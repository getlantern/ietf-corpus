document: rfc-6887
kind: protocol-element
summary: The PEER Opcode creates explicit dynamic outbound mappings for existing or planned outbound connections and is used to learn the NAT-assigned external address or to reduce keepalive traffic. PEER adds Remote Peer Port (16 bits) and Remote Peer IP Address (128 bits) to the MAP fields, fully identifying the five-tuple.
