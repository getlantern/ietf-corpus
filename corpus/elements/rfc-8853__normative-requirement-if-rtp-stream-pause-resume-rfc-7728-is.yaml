document: rfc-8853
kind: normative-requirement
summary: If RTP stream pause/resume (RFC 7728) is supported and a rid-id is marked as initially paused (prefixed by '~'), support for RTP stream pause/resume MUST also be included under the same 'm=' line, and all related RTP payload types MUST be listed as pause/resume capable.
section: "5.2"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
