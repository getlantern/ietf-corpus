document: rfc-2532
kind: normative-requirement
summary: Recipients MUST be configurable to silently ignore a request for an MDN. Automated systems MAY be configured to always respond to MDN requests but MUST be configurable to never generate MDNs.
section: 2.2.1
rfc2119_level: MUST
