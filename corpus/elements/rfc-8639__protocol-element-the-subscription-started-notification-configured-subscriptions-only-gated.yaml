document: rfc-8639
kind: protocol-element
summary: The 'subscription-started' notification (configured subscriptions only, gated by the 'configured' feature) indicates a configured subscription has started. It carries all subscription parameters except transport connection and egress origin information. If a referenced filter was used, the notification provides its contents inline under 'within-subscription'. No 'subscription-started' is ever sent for dynamic subscriptions.
section: 2.7.1
topics:
    - yang
    - netconf
