document: rfc-1748
kind: protocol-element
summary: dot5StatsLostFrameErrors is incremented when a transmitting station's TRR timer expires in strip mode — meaning the station did not receive the trailer of its own frame before the timer elapsed. This detects a class of ring failure distinct from other error counters.
