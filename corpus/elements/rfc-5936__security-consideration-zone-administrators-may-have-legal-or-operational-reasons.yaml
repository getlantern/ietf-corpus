document: rfc-5936
kind: security-consideration
summary: Zone administrators may have legal or operational reasons to restrict AXFR access to prevent exposure of full zone contents. Implementations SHOULD support IP-range and TSIG/SIG(0)-based authorization, and SHOULD NOT default to open access. Closing a TCP connection in response to suspected abuse SHOULD be reserved for extreme cases.
section: "5"
topics:
    - dns
    - security
    - privacy
