document: rfc-7950
kind: protocol-element
summary: The 'anydata' statement (new in YANG 1.1) defines a data node that can contain an unknown set of YANG-modelable nodes (excluding anyxml). It is RECOMMENDED over 'anyxml' when the contained data can be modeled in YANG.
