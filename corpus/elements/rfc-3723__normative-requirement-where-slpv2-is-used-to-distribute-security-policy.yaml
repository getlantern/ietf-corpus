document: rfc-3723
kind: normative-requirement
summary: Where SLPv2 is used to distribute security policy or configuration information, per-packet data origin authentication, integrity, and replay protection MUST be used to protect the discovery protocol, as it would constitute a weak link for the protocols whose security it configures.
section: 2.3.4
rfc2119_level: MUST
topics:
    - security
    - ipsec
