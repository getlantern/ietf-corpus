document: rfc-4985
kind: normative-requirement
summary: Conforming implementations MUST convert internationalized domain names to ASCII Compatible Encoding (ACE) format as specified in RFC 3490 section 4 before storage in the Name part of SRVName. The AllowUnassigned flag SHALL NOT be set, UseSTD3ASCIIRules SHALL be set, and each label SHALL be processed with ToASCII.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
