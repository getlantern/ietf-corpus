document: rfc-9582
kind: normative-requirement
summary: The maxLength element SHOULD NOT be encoded if the maximum length is equal to the prefix length. Certification Authorities SHOULD anticipate that future Relying Parties will treat superfluous maxLength elements as encoding errors.
section: 4.3.2.2
rfc2119_level: SHOULD NOT
