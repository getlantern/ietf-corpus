document: rfc-5216
kind: privacy-consideration
summary: EAP-TLS supports optional privacy by using an anonymous NAI in EAP-Response/Identity and sending an empty client certificate list in the first handshake to avoid disclosing the peer username. The actual peer certificate is transmitted inside the encrypted second TLS session triggered by the server's hello_request.
section: 2.1.4
topics:
    - tls
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
