summary: 'The Require-Recipient-Valid-Since header field is encoded as: `rrvs = "Require-Recipient-Valid-Since:" addr-spec ";" date-time CRLF`, where addr-spec is the recipient address and date-time uses the message header field date format from RFC 5322.'
