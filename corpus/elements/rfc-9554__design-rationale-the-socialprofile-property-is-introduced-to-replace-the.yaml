document: rfc-9554
kind: design-rationale
summary: The SOCIALPROFILE property is introduced to replace the widely-used but unregistered X-SOCIALPROFILE experimental property. Similarly, SERVICE-TYPE replaces X-SERVICE-TYPE, providing IANA-registered equivalents for de-facto conventions in vCard address book implementations.
section: "3.5"
