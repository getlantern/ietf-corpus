document: rfc-8401
kind: design-rationale
summary: BIER information is tied to host prefixes (node addresses) rather than any prefix, ensuring each advertisement is unambiguously associated with a specific BFR node. Advertisements for non-host prefixes are ignored to prevent misuse.
section: "4.2"
topics:
    - routing
    - multicast
