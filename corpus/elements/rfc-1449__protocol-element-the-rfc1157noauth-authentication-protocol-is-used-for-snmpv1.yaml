document: rfc-1449
kind: protocol-element
summary: The rfc1157noAuth authentication protocol is used for SNMPv1 proxy. When active, partyAuthPublic, partyAuthClock, and partyAuthLifetime are irrelevant; partySecretsAuthPrivate is used as the SNMPv1 community string and must be at least one octet long (no maximum specified).
section: "7.2"
