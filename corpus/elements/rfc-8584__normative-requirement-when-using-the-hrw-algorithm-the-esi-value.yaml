document: rfc-8584
kind: normative-requirement
summary: When using the HRW algorithm, the ESI value in the Weight function SHOULD be set to that of the corresponding ES. The 14-octet stream for D(V,Es) MUST be formed by concatenating the 4-octet Ethernet Tag and the 10-octet ESI in network byte order.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
