kind: protocol-element
summary: PSNTP (Packet Sequence Number This Packet) is a 16-bit unsigned integer initialized to a random number and incremented monotonically per session 5-tuple. It wraps and is intended for use while analyzing packet traces to correlate packets across observation points.
