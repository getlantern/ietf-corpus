document: rfc-1452
kind: design-rationale
summary: Creation and deletion of conceptual rows is inconsistent using the SNMPv1 framework. The SNMPv2 framework corrects this. For MIB modules under early review that contain conceptual tables allowing row creation/deletion, it may be worthwhile to deprecate the old objects and replace them with SNMPv2-style objects.
section: "2.1"
topics:
    - snmp
