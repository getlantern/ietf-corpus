document: rfc-7742
kind: design-rationale
summary: CVO orientation signaling via RTP header extension is preferred over codec-specific in-band mechanisms because pre-encoding rotation may not be practical when the camera interface returns pre-compressed frames, and swapping mid-stream adds resolution-change complexity already present for screen-source video.
