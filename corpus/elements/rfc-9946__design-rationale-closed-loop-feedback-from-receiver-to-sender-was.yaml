document: rfc-9946
kind: design-rationale
summary: 'Closed-loop feedback from receiver to sender was the primary gap motivating UDPSTP: OWAMP (RFC 4656), TWAMP (RFC 5357), and STAMP (RFC 8762) support asymmetric traffic and two-way communication but lack closed-loop feedback, which is necessary to limit congestion of the measured bottleneck to a short time range.'
