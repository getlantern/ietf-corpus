document: rfc-6492
kind: normative-requirement
summary: If both the signing-time and binary-signing-time attributes are present, they MUST both represent the same underlying time value. The signing-time attribute may use UTCTime or GeneralizedTime per RFC 5652 Section 11.3.
section: 3.1.1.6.4.3
rfc2119_level: MUST
topics:
