document: rfc-3332
kind: design-rationale
summary: SCTP is the recommended transport for M3UA because it provides explicit packet-oriented delivery, multi-stream in-sequence delivery, multi-homing for network-level fault tolerance, resistance to flooding and masquerade attacks, and MTU-aware data segmentation. TCP MAY be substituted only in back-to-back connections without redundancy requirements.
section: 1.3.1
topics:
    - realtime
    - sctp
