document: rfc-9059
kind: design-rationale
summary: If the Bidirectional LSP Association Group TLV is absent, it implies the LSP is a forward LSP and is not co-routed. This default avoids mandatory inclusion of the TLV for the common forward non-co-routed case, reducing message overhead.
section: "4.2"
topics:
    - mpls
    - routing
