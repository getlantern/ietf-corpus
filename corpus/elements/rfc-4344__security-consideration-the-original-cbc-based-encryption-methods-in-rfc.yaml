document: rfc-4344
kind: security-consideration
summary: The original CBC-based encryption methods in RFC 4253 are vulnerable to chosen-plaintext privacy attacks. The new SDCTR mode methods described in this document are provably secure replacements, provided rekeying recommendations are followed and the underlying MAC is secure.
section: "6.2"
topics:
    - security
    - crypto
