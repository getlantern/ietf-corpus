document: rfc-6132
kind: registry
summary: 'This document registers three new notification-capability parameters in the IANA registry: ''busy'' (values: ''yes'', ''no'', ''unknown''), ''show'' (values: ''away'', ''chat'', ''dnd'', ''offline'', ''xa'', ''unknown''), and ''status'' (free-form human-readable string). Future extensions adding new presence items should register them similarly using the instructions in RFC 5435 Section 9.3.'
