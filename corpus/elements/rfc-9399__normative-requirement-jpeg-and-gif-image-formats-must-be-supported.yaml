document: rfc-9399
kind: normative-requirement
summary: JPEG and GIF image formats MUST be supported. SVG+GZIP (image/svg+xml+gzip) MUST be supported. SVG and PNG SHOULD be supported. When SVG is used, the SVG Tiny 1.2 profile MUST be followed; the SVG image MUST NOT contain external IRI references of type B, C, or D, and MUST NOT contain any script element.
section: "7"
rfc2119_level: MUST
topics:
    - pkix
