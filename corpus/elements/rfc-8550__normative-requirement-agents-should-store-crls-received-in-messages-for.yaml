document: rfc-8550
kind: normative-requirement
summary: Agents SHOULD store CRLs received in messages for use in processing later messages. Receiving and sending agents SHOULD retrieve and utilize CRL information every time a certificate is verified as part of a certification path validation even if the certificate was already verified in the past.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - email
    - pkix
