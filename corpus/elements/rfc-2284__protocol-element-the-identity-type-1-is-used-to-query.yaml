document: rfc-2284
kind: protocol-element
summary: The Identity type (1) is used to query the identity of the peer, typically issued as the initial Request. The Request MAY include an optional displayable message; the Response MUST be Type 1 and contains the peer's identity (zero-length if unknown). The field MUST NOT be null-terminated.
section: "3.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
