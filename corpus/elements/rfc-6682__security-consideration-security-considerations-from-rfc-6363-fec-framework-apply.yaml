document: rfc-6682
kind: security-consideration
summary: Security considerations from RFC 6363 (FEC Framework) apply in full. RTP packets are subject to confidentiality, integrity, and source authenticity requirements; SRTP (RFC 3711) is RECOMMENDED, with IPsec and TLS as alternatives. The appropriate mechanism depends on the application, transport, and signaling protocol.
section: "13"
rfc2119_level: RECOMMENDED
topics:
