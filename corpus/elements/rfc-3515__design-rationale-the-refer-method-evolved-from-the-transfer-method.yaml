document: rfc-3515
kind: design-rationale
summary: The REFER method evolved from the TRANSFER method and then from BYE/Also (draft-ietf-sip-cc-01). The change to REFER improved on BYE/Also by disassociating transfers from BYE processing, facilitating recovery from failed transfers and clarifying state management.
