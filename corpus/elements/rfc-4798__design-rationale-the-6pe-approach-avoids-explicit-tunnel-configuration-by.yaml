summary: The 6PE approach avoids explicit tunnel configuration by using MP-BGP to convey the IPv4 address of the egress 6PE as an IPv4-mapped IPv6 Next Hop, allowing dynamic use of existing IPv4-signaled LSPs without additional provisioning.
