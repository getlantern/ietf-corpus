document: rfc-2069
kind: normative-requirement
summary: If the nextnonce field is present in Authentication-info, the client is strongly encouraged to use it for the next request. Failure to do so may result in a 401 re-authentication challenge with stale=TRUE.
section: 2.1.3
rfc2119_level: SHOULD
topics:
    - http
    - security
