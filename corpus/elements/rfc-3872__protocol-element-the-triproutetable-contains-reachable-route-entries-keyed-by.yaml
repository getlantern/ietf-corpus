kind: protocol-element
summary: The tripRouteTable contains reachable route entries keyed by applIndex, application protocol, address family, address prefix, and peer. Each entry exposes TRIB membership (adjTribIns, extTrib, locTrib, adjTribOut), next-hop server, MED, local preference, advertisement path, routed path, atomic aggregate, unknown attributes, withdrawn flag, converted flag, and received time.
