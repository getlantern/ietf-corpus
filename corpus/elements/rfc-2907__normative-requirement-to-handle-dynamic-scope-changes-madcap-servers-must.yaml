document: rfc-2907
kind: normative-requirement
summary: 'To handle dynamic scope changes, MADCAP servers MUST include mechanisms to determine: (a) whether a nesting decision is still under consideration or is definitive, (b) whether either scope has been destroyed, and (c) whether boundaries have changed so a previous nesting relationship is now reversed. Servers MUST implement two timers: NEST_NO_DECISION_TIMER and ZONES_EXIST_TIMER.'
section: "4"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
