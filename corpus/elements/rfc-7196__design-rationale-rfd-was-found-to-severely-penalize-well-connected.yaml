document: rfc-7196
kind: design-rationale
summary: RFD was found to severely penalize well-connected sites because topological richness amplifies the number of BGP update messages exchanged, causing many operators to disable RFD entirely. This document recommends parameter adjustments rather than algorithmic overhaul to reduce risk with minimal change.
section: "1"
topics:
