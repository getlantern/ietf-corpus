document: rfc-7171
kind: security-consideration
summary: PT-EAP itself provides no authentication, ciphersuite negotiation, mutual authentication, integrity protection, replay protection, confidentiality, key derivation, fast reconnect, or fragmentation. All such protections are delegated entirely to the outer EAP tunnel method.
