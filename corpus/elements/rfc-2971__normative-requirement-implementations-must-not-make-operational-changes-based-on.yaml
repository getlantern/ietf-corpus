document: rfc-2971
kind: normative-requirement
summary: Implementations MUST NOT make operational changes based on the data sent as part of the ID command or response. The ID command is for human consumption only and must not be used to improve performance, work around bugs, provide features, or deny service.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
