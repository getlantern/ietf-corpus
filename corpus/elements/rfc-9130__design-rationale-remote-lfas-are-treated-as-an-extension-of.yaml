document: rfc-9130
kind: design-rationale
summary: 'Remote LFAs are treated as an extension of LFAs: remote LFAs cannot be enabled if LFAs are not enabled. This design choice enforces the dependency relationship between the two FRR mechanisms rather than allowing independent activation.'
