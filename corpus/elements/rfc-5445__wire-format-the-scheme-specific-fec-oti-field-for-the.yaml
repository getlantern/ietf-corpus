document: rfc-5445
kind: wire-format
summary: The Scheme-Specific FEC OTI field for the Small Block, Large Block, and Expandable FEC Scheme begins with a 1-octet Length field specifying the total field length in 4-octet words. A Length of zero indicates no Instance-specific OTI, in which case three zero-valued padding bytes SHALL follow to maintain 4-octet alignment.
section: 4.2.2.3
topics:
    - multicast
