document: rfc-8267
kind: normative-requirement
summary: 'NFS version 4 clients SHOULD follow chunk list complexity prescriptions: the Read list can contain either a Position Zero Read chunk, one Read chunk with a non-zero Position, or both; the Write list can contain no more than one Write chunk; any chunk can contain up to sixteen RDMA segments. NFS version 4 servers MUST accept and process such requests.'
section: 6.4.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
