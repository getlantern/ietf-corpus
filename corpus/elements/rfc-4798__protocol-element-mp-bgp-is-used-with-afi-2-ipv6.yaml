document: rfc-4798
kind: protocol-element
summary: MP-BGP is used with AFI=2 (IPv6) and SAFI=4 (labeled) to distribute IPv6 prefixes with bound MPLS labels across the IPv4 core. The BGP Next Hop encodes the egress 6PE's IPv4 address as an IPv4-mapped IPv6 address.
