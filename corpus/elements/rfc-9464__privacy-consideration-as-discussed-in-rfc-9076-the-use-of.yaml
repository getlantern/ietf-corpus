document: rfc-9464
kind: privacy-consideration
summary: As discussed in RFC 9076, the use of encrypted DNS does not reduce the data available at the DNS resolver itself. Privacy properties are inherited from the specific encrypted DNS protocol used (e.g., RFC 8484 Section 8 for DoH, RFC 9250 Section 7 for DoQ).
section: "7"
topics:
    - dns
    - privacy
