document: rfc-7197
kind: security-consideration
summary: A malevolent third party could intercept and rewrite SDP packets to alter the 'duplication-delay' value, causing receivers to wait unnecessarily long (if delay is increased) or to drop packets prematurely (if delay is reduced). Integrity protection and source authentication via S/MIME, HTTPS, or SAP authentication are recommended.
section: "5"
topics:
    - security
    - realtime
