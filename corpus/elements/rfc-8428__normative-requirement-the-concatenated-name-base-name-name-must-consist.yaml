document: rfc-8428
kind: normative-requirement
summary: The concatenated Name (Base Name + Name) MUST consist only of characters A-Z, a-z, 0-9, '-', ':', '.', '/', and '_', and MUST start with A-Z, a-z, or 0-9. It is RECOMMENDED that concatenated names be represented as URIs or URNs.
section: 4.5.1
rfc2119_level: MUST
