document: rfc-8393
kind: interoperability-note
summary: Legacy SFC-aware nodes unaware of Next Protocol value 'None' will silently drop packets with that value unless explicitly configured to forward them per RFC 8300 Section 2.2. SFFs may be configured to forward them; SFC proxies, SFIs, and classifiers will most likely drop them.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
