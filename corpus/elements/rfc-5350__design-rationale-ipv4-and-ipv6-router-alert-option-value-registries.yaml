document: rfc-5350
kind: design-rationale
summary: IPv4 and IPv6 Router Alert Option Value registries are kept as separate registries rather than being aligned. The initial allocations in RFC 2711 and the aggregation-level allocations in RFC 3175 made a unified numbering scheme impossible after the fact.
