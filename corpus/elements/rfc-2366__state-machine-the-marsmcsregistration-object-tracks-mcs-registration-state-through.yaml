summary: 'The marsMcsRegistration object tracks MCS registration state through five values: notRegistered(1), registering(2), registered(3), reRegisteringFault(4) for fault-driven re-registration, and reRegisteringRedirMap(5) for re-registration after receiving MARS_REDIRECT_MAP directing the MCS to a different MARS.'
