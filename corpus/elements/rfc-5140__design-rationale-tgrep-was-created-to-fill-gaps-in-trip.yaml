document: rfc-5140
kind: design-rationale
summary: 'TGREP was created to fill gaps in TRIP: TRIP defines inter-provider telephony routing but has no mechanism for injecting routes from within a network (from gateways), nor for selecting a specific gateway when a call arrives. TGREP addresses both gaps by providing a gateway-to-LS registration protocol.'
