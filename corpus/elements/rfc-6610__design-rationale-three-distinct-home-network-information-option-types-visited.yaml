document: rfc-6610
kind: design-rationale
summary: 'Three distinct Home Network Information option types (Visited, Identified, Unrestricted) are defined to cover the three principal discovery scenarios: local home agent discovery, home-domain-specific discovery, and operator-administered discovery. This separation lets clients signal precisely what kind of home agent they seek.'
