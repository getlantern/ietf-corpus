document: rfc-8480
kind: interoperability-note
summary: 'When using 6P alongside the minimal 6TiSCH configuration (RFC 8180), it is RECOMMENDED to use two separate slotframes: slotframe 0 for minimal-configuration cells at higher priority, and slotframe 1 for dynamically allocated 6P cells. This prevents dynamically allocated cells from masking the always-on minimal-configuration cell.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
