document: rfc-9844
kind: protocol-element
summary: A zone identifier is a text string, defined in RFC 4007, that qualifies a limited-scope IPv6 address (especially link-local unicast) by identifying the network interface. It is concatenated to the address using '%' as delimiter, e.g., 'fe80::1234%eth0' (Linux) or 'fe80::4321%7' (Windows).
section: "1"
