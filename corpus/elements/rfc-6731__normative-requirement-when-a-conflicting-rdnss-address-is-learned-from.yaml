document: rfc-6731
kind: normative-requirement
summary: When a conflicting RDNSS address is learned from a less-trusted interface, the node MUST ignore the option; it MUST NOT remove previously obtained information, and SHOULD NOT extend the lifetime of earlier information.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - security
