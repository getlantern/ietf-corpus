document: rfc-4592
kind: interoperability-note
summary: RRSIG records at a wildcard domain name in a signed zone are synthesized together with the answer RRSet. The synthesized owner name does not invalidate the signature because the label count field in the RRSIG instructs the verifying resolver to disregard the synthesized labels.
section: "4.8"
topics:
    - dns
    - security
