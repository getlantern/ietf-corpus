document: rfc-4996
kind: protocol-element
summary: 'The Master Sequence Number (MSN) is a ROHC-TCP control field created by the compressor and incremented by one for each packet sent. It is not derived from any TCP header field. It serves two purposes: differentiating packets for feedback acknowledgment, and inferring the values of incrementing fields such as IP-ID. The full 16-bit MSN is sent in IR/IR-DYN packets; an LSB-encoded subset is carried in CO packets.'
section: 6.1.1
topics:
    - tcp
