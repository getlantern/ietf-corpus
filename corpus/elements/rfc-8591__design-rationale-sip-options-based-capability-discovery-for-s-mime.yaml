document: rfc-8591
kind: design-rationale
summary: SIP OPTIONS-based capability discovery for S/MIME is unreliable because SIP proxies may fork requests and return only the 'best' response, meaning the sender may learn capabilities of only one of the recipient's multiple devices. Out-of-band methods are recommended instead.
section: "7.2"
topics:
    - sip
