document: rfc-2380
kind: interoperability-note
summary: 'When using RSVP automatic tunneling through non-RSVP routers, multicast end-point identification becomes problematic: the RESV message may arrive via a different route than the PATH message, making it impossible to identify the correct ATM end-point for the reservation.'
