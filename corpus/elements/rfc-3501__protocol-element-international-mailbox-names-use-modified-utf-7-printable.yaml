document: rfc-3501
kind: protocol-element
summary: 'International mailbox names use modified UTF-7: printable US-ASCII characters except ''&'' represent themselves, ''&'' is encoded as ''&-'', and other characters are encoded in modified BASE64 using '','' instead of ''/''. All names must start and end in US-ASCII.'
section: 5.1.3
topics:
