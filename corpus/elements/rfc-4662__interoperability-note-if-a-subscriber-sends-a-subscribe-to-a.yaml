document: rfc-4662
kind: interoperability-note
summary: 'If a subscriber sends a SUBSCRIBE to a list resource URI without including ''Supported: eventlist'', the notifier will typically return a 421 (Extension Required). Unlike the general RFC 3261 advice to avoid 421, here it is appropriate because the URI fundamentally represents a list resource and the subscription cannot proceed without the extension.'
section: "4.1"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
