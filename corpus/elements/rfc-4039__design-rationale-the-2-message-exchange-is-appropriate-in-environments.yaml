document: rfc-4039
kind: design-rationale
summary: The 2-message exchange is appropriate in environments with high client mobility and frequent attachment-point changes, where the protections of the 4-message exchange (avoiding address waste with multiple servers) may not be needed. It is safe when only one server is present or when addresses are plentiful.
section: "1"
