document: rfc-8331
kind: security-consideration
summary: Re-embedders inserting ANC data into SDI SHOULD validate Line_Number and Horizontal_Offset to ensure ANC data is inserted into a legal area of the output SDI video bit stream, to prevent downstream SDI systems from being confused by bad ANC data packets used for denial-of-service.
section: "7"
topics:
