document: rfc-6435
kind: wire-format
summary: The LI message format contains a 4-bit Version field (currently 1), a 20-bit Reserved field (MUST be zero on transmission), an 8-bit Refresh Timer field (maximum seconds between successive LI messages, default 1, value 0 not permitted), followed by a variable-length MEP Source ID TLV identifying the originating MEP.
