document: rfc-4121
kind: normative-requirement
summary: 'Token identifiers (TOK_ID) in the range 0x60 0x00 through 0x60 0xFF inclusive are reserved and SHALL NOT be assigned. This enables unambiguous detection of the generic GSS-API pseudo-ASN.1 framing by inspecting the first two octets: a leading 0x60 byte indicates the outer GSS-API wrapper is present.'
section: "4.4"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
