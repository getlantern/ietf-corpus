document: rfc-4971
kind: security-consideration
summary: LSPs may now contain additional router capability information, making this data available to an attacker who can snoop or modify LSPs. Specifications based on this mechanism must describe security considerations around disclosure and modification of their information. An integrity mechanism such as RFC 3567 or IS-IS-HMAC SHOULD be applied if there is high risk from modification of capability information.
section: "5"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
