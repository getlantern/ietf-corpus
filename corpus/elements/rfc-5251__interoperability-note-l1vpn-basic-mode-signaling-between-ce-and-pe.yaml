document: rfc-5251
kind: interoperability-note
summary: L1VPN Basic Mode signaling between CE and PE follows the GMPLS overlay model defined in RFC 4208. The overlay rules for Notification and RRO object processing (e.g., an edge PE MAY remove or edit Provider Notification and RRO objects when passing messages to CEs) apply in the shuffling case.
section: 4.3.1.3
topics:
    - vpn
    - mpls
