document: rfc-6735
kind: wire-format
summary: The SIP-Resource-Priority-Namespace AVP (AVP Code 613) is of type UTF8String and contains a string identifying a unique ordered set of priority values as described in RFC 4412. The SIP-Resource-Priority-Value AVP (AVP Code 614) is of type UTF8String and contains a namespace entry identifying a member of the priority value set.
