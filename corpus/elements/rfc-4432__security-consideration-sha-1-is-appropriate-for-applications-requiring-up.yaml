document: rfc-4432
kind: security-consideration
summary: SHA-1 is appropriate for applications requiring up to 80 bits of security; SHA-256 is appropriate for those requiring up to 128 bits of security, consistent with RFC 3447's recommendation that hash output length be twice the required security level.
