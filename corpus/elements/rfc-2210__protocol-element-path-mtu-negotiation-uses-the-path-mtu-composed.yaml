document: rfc-2210
kind: protocol-element
summary: Path MTU negotiation uses the PATH_MTU composed characterization parameter (param 10, service 1) accumulated in the ADSPEC as it flows from sender to receiver. Each receiver takes the minimum PATH_MTU across all arriving ADSPECs and uses it as [M] in its FLOWSPEC; the merged FLOWSPEC arriving at each sender carries the smallest MTU acceptable across all data paths.
section: 2.3.2
topics:
    - qos
