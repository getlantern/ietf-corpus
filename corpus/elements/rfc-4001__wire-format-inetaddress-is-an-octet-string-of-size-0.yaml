document: rfc-4001
kind: wire-format
summary: InetAddress is an OCTET STRING of SIZE (0..255) whose interpretation depends on the associated InetAddressType. When used as an index object, a SIZE clause MUST be included to limit the number of potential instance sub-identifiers due to the SMIv2 128 sub-identifier limit.
section: "3"
topics:
