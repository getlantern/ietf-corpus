document: rfc-3456
kind: protocol-element
summary: After DHCPACK processing, the remote host establishes a new IPsec tunnel mode SA using the assigned virtual address. All future DHCP messages (DHCPREQUEST, DHCPINFORM, DHCPDECLINE, DHCPRELEASE) and server messages (DHCPOFFER, DHCPACK, DHCPNAK) then flow over this new VPN SA.
section: "4.4"
topics:
    - ipsec
    - vpn
