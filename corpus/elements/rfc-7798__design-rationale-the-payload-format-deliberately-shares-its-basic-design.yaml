document: rfc-7798
kind: design-rationale
summary: The payload format deliberately shares its basic design with RFC 6184 (H.264 RTP) and RFC 6190 (scalable H.264 RTP) because RFC 6184 is widely deployed and familiar to the implementer community. Differences are highlighted rather than repeating well-known specifications, reducing the learning curve.
