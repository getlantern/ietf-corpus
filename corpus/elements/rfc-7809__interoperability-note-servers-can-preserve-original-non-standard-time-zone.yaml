document: rfc-7809
kind: interoperability-note
summary: Servers can preserve original non-standard time zone definitions supplied by clients, reject them with CALDAV:valid-timezone, or map them to standard equivalents. The chosen behavior must be consistent and clients must be prepared for any of these responses.
section: 3.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
