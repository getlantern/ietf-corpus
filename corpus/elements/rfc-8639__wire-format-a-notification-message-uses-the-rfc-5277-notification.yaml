document: rfc-8639
kind: wire-format
summary: A notification message uses the RFC 5277 <notification> envelope with an <eventTime> element at the top level (yang:date-and-time encoding), followed by the YANG-defined event record payload. The encoding (XML or JSON) is negotiated per-subscription via the 'encoding' leaf.
section: "2.6"
