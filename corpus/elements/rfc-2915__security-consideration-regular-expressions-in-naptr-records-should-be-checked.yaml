document: rfc-2915
kind: security-consideration
summary: Regular expressions in NAPTR records should be checked for sanity before use and MUST NOT be blindly passed to interpreters such as Perl. The rewrite rules expose identifiers from other namespaces to the same DNS-based attacks as normal domain names.
section: "13"
topics:
    - dns
    - security
