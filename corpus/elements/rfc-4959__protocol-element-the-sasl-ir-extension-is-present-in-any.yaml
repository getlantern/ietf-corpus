document: rfc-4959
kind: protocol-element
summary: The SASL-IR extension is present in any IMAP server that returns 'SASL-IR' as one of the supported capabilities in its CAPABILITY response. Servers supporting this extension accept an optional initial client response with the AUTHENTICATE command for SASL mechanisms that support it.
