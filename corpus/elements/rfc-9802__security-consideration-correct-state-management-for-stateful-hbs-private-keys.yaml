document: rfc-9802
kind: security-consideration
summary: 'Correct state management for stateful HBS private keys is crucial. Recommended strategies include: logging OTS key indexes and checking before each signature release; limiting total signatures to a manageable count; and applying a state reservation strategy (reserving upcoming states in advance) to reduce synchronizations between nonvolatile and volatile memory.'
