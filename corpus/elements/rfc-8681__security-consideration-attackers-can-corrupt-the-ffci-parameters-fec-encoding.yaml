document: rfc-8681
kind: security-consideration
summary: Attackers can corrupt the FFCI parameters (FEC Encoding ID or E), causing receivers to misinterpret FEC packet formats or compute incorrect symbol sizes, resulting in DoS or corrupted decoded content. It is RECOMMENDED that integrity protection measures from RFC 6363 be applied to the FFCI.
section: "7.2"
topics:
    - security
