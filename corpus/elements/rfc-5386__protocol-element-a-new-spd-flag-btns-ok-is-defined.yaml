document: rfc-5386
kind: protocol-element
summary: A new SPD flag 'BTNS_OK' is defined. Traffic to/from peers matching a BTNS PAD entry will only match SPD entries with the BTNS_OK flag set, allowing fine-grained control over which traffic flows accept unauthenticated peers.
