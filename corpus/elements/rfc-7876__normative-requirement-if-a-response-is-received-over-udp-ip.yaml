document: rfc-7876
kind: normative-requirement
summary: If a Response is received over UDP/IP but an out-of-band Response was not requested, the Response SHOULD be dropped and the event SHOULD be reported to the operator through the management system with overload precautions.
section: "4.4"
rfc2119_level: SHOULD
