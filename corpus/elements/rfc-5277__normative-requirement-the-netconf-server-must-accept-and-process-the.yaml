document: rfc-5277
kind: normative-requirement
summary: The NETCONF server MUST accept and process the <close-session> operation even while a notification subscription is active. Other commands MAY be accepted; otherwise they will be rejected and the server MUST send a 'resource-denied' error.
section: "1.3"
rfc2119_level: MUST
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
