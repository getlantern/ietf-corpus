document: rfc-4967
kind: design-rationale
summary: DTMF post-dial sequences (e.g., voicemail access followed by mailbox digits, or strings with pauses and wait-for-completion) have no standardized encoding, causing interoperability problems between endpoints and gateways. The dialstring encoding addresses this by including P (pause) and X (wait-for-call-completion) characters.
section: "1"
topics:
