document: rfc-8775
kind: normative-requirement
summary: The DR SHOULD consider a neighbor as a GDR Candidate and insert it into the DRLB-List if the neighbor's DRLB-Cap announces the same hash algorithm and the neighbor has the same DR priority as the DR.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - multicast
    - realtime
