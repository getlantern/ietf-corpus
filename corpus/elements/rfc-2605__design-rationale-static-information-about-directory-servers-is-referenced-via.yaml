document: rfc-2605
kind: design-rationale
summary: Static information about Directory Servers is referenced via Distinguished Name pointers into the Directory itself rather than replicated into the MIB. Directory management applications are expected to use those DNs to retrieve further detail, keeping the MIB focused on dynamic operational data.
