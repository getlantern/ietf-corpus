document: rfc-2932
kind: protocol-element
summary: ipMRouteDifferentInIfPackets (Counter32) counts packets received from the (S,G) sources that were dropped because they arrived on an interface other than ipMRouteInIfIndex (RPF failures). Packets not subject to an incoming interface check (e.g., CBT) are not counted.
section: "4"
topics:
