document: rfc-8006
kind: normative-requirement
summary: A single HostMetadata or PathMetadata object MUST NOT contain multiple GenericMetadata objects of the same type; if duplicate types are present, the receiver MUST ignore all but the first occurrence.
section: "3.3"
rfc2119_level: MUST NOT
