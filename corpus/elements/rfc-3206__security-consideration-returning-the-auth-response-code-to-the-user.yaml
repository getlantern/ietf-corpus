document: rfc-3206
kind: security-consideration
summary: Returning the AUTH response code to the USER command reveals to the client that the specified username exists, constituting an information disclosure. It is strongly RECOMMENDED that the server not issue the AUTH response code in reply to the USER command.
section: "5"
topics:
    - email
    - security
    - privacy
