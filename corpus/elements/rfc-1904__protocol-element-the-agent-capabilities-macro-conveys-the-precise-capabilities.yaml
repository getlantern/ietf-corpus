document: rfc-1904
kind: protocol-element
summary: The AGENT-CAPABILITIES macro conveys the precise capabilities of a SNMPv2 agent with respect to one or more MIB modules. Its value is an OBJECT IDENTIFIER bound to an instance of sysORID, allowing management stations to discover and optimize behavior for specific agents.
section: "2.4"
topics:
