document: rfc-5401
kind: design-rationale
summary: FEC erasure coding is termed a 'repair process' rather than retransmission because any parity packet can fill any erasure within its coding block, enabling deterministic repair strategies without explicit per-receiver loss knowledge. Hybrid proactive/reactive FEC use is possible, and reactive parity delivery in response to NACKs minimizes wasted bandwidth.
