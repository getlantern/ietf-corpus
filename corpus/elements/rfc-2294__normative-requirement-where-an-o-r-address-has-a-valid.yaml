document: rfc-2294
kind: normative-requirement
summary: Where an O/R Address has a valid Printable String form and a T.61 form, both must be present in the DIT, with one as an alias for the other, so that direct lookup works independent of the variant used.
section: "1"
rfc2119_level: MUST
