document: rfc-9669
kind: wire-format
summary: 'A basic BPF instruction is 64 bits wide, encoding four fields: ''opcode'' (8 bits, split into ''specific'' and ''class''), ''regs'' (8 bits, encoding src_reg and dst_reg as 4-bit nibbles with byte-order-dependent nibble order), ''offset'' (16-bit signed integer), and ''imm'' (32-bit signed integer). Multi-byte fields use host byte order.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
