document: rfc-2243
kind: normative-requirement
summary: A generator SHOULD warn the user if the sequence number falls below ten, MUST refuse to generate OTPs with a sequence number below one, and SHOULD NOT retry a failed re-initialization or perform re-initialization without the user's permission.
section: "4.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
