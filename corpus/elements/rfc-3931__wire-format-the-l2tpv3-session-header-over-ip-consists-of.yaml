document: rfc-3931
kind: wire-format
summary: The L2TPv3 session header over IP consists of a 32-bit Session ID followed by an optional Cookie of up to 64 bits. The Session ID of zero is reserved for control messages; data messages carry a non-zero Session ID assigned by the peer.
section: 4.1.1.1
topics:
    - vpn
    - ip
