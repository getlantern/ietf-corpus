document: rfc-8339
kind: design-rationale
summary: An Aggregate P2MP Tree requires an upstream-assigned label so that on the Leaf PE (L-PE), traffic can be associated with a VPN or VPLS instance, because many P2MP PWs can share the same P2MP MPLS LSP. For an Inclusive P2MP Tree, the P2MP MPLS LSP label itself uniquely identifies the service being carried.
section: "1"
topics:
