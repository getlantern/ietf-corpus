document: rfc-2510
kind: protocol-element
summary: 'CA key update requires four certificate attribute values in the X.500 directory: OldWithOld (self-signed with old key), OldWithNew (old public key signed with new private key), NewWithOld (new public key signed with old private key), and NewWithNew (self-signed with new key). Validity periods of the transitional certificates must be carefully set to cover the transition window.'
section: "2.4"
topics:
    - pkix
    - security
    - pkix
