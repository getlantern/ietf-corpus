document: rfc-5425
kind: normative-requirement
summary: A transport receiver MUST use the message length field to delimit syslog messages. A transport receiver MUST be able to process messages up to and including 2048 octets; SHOULD be able to process messages up to and including 8192 octets.
section: 4.3.1
rfc2119_level: MUST
topics:
    - syslog
    - tls
