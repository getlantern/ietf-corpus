document: rfc-6945
kind: protocol-element
summary: The rpkiRtrCacheServerConnectionToGoStale notification carries V4/V6 active record counts, LatestSerial, SessionID, RefreshTimer, and TimeToRefresh; it is suggested to fire when TimeToRefresh drops below 60 seconds, alerting an NMS that cached RPKI data may soon be stale.
section: "4"
topics:
