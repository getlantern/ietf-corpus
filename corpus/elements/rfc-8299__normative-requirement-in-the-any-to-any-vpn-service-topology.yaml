document: rfc-8299
kind: normative-requirement
summary: In the any-to-any VPN service topology, all sites MUST have the `any-to-any-role`. In Hub-and-Spoke or Hub-and-Spoke disjoint topologies, sites MUST be assigned either a Hub role or a Spoke role.
section: "6.4"
rfc2119_level: MUST
