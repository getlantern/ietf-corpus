document: rfc-1388
kind: interoperability-note
summary: RFC 1058 specifies that RIP packets of version 0 are discarded, version 1 packets are discarded if any Must-Be-Zero field is non-zero, and packets of any version greater than 1 should not be discarded solely because an MBZ field is non-zero. RIP-2 is therefore fully backwards compatible with RFC 1058-compliant RIP-1 implementations.
section: "4"
topics:
