document: rfc-5793
kind: normative-requirement
summary: The Posture Broker Server MUST assign a unique Posture Validator Identifier (not 0xffff) to each Posture Validator and that value MUST NOT change during a PT session. The Posture Broker Client similarly assigns Posture Collector Identifiers that MUST NOT change during the session. When EXCL is set, the relevant identifier field MUST be set to the target component.
section: "4.5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
