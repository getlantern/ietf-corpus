document: rfc-3193
kind: normative-requirement
summary: The initiator MUST allow the responder to float its port and SHOULD allow the responder to choose a new IP address. The initial filter set MUST be present before L2TP tunnel setup messages start to flow.
section: "4.2"
rfc2119_level: MUST
