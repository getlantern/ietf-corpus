document: rfc-4788
kind: protocol-element
summary: 'Three RTP packet formats are supported for EVRC-B: interleaved/bundled, header-free, and compact bundled. For interleaved/bundled and header-free formats, EVRC-B operational details are identical to EVRC as defined in RFC 3558, except the mode change request field in the ToC MUST be interpreted per the RATE_REDUC parameter definition in EVRC-B.'
section: "3"
