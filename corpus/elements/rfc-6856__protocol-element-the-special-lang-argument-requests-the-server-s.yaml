document: rfc-6856
kind: protocol-element
summary: 'The special ''LANG *'' argument requests the server''s administrator-preferred language, which MAY vary by active user. When issued with no argument, the server returns a language listing: one line per supported language tag, optionally followed by a space and a human-readable UTF-8 description of that language.'
section: "3.2"
topics:
    - email
