document: rfc-7603
kind: protocol-element
summary: 'The EMAN framework defines an information model for electrical equipment covering four areas: energy object identification, energy object context, power measurement, and power characteristics. SNMP MIB modules are specified based on this model, though other mechanisms such as YANG/NETCONF are equally applicable.'
