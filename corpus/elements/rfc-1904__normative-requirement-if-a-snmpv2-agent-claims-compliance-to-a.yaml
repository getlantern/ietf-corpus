document: rfc-1904
kind: normative-requirement
summary: If a SNMPv2 agent claims compliance to a MIB module, it must implement every object and notification in each conformance group listed in the MODULE-COMPLIANCE MANDATORY-GROUPS clause. Returning noSuchObject for any mandatory object in any MIB view means the implementation is non-conformant.
section: 5.4.1
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
