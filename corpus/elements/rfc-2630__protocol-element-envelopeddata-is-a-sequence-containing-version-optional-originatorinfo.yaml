document: rfc-2630
kind: protocol-element
summary: EnvelopedData is a SEQUENCE containing version, optional originatorInfo, recipientInfos (SET OF RecipientInfo, at least one required), encryptedContentInfo, and optional unprotectedAttrs. The recipientInfos field precedes encryptedContentInfo to enable single-pass decryption.
