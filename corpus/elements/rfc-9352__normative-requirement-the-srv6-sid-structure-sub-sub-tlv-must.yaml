document: rfc-9352
kind: normative-requirement
summary: The SRv6 SID Structure sub-sub-TLV MUST NOT appear more than once in its parent sub-TLV; if it does, the parent sub-TLV MUST be ignored. It MUST NOT be used at a transit node for forwarding packets; it is for informational use by control and management planes only.
section: "9"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
