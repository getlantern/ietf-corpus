document: rfc-6450
kind: security-consideration
summary: 'The Session ID provides only partial spoofing mitigation: an on-path attacker can eavesdrop traffic, learn a valid Session ID, and forge Echo Request messages that the server will honor until the Session ID expires. The spec acknowledges there is no stronger on-path protection in this version.'
section: "8"
topics:
    - security
    - multicast
