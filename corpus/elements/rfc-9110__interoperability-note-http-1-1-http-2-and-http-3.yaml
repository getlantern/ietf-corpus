document: rfc-9110
kind: interoperability-note
summary: HTTP/1.1, HTTP/2, and HTTP/3 all rely on the same semantics defined in RFC 9110. HTTP/2 adds multiplexed sessions over TLS+TCP with header compression; HTTP/3 uses QUIC over UDP. None of these versions obsoletes the others since each has distinct benefits depending on deployment context.
section: "1.2"
topics:
