document: rfc-2232
kind: protocol-element
summary: dlurPuActiveDlusName (dlurPuEntry 8) is the SNA name of the currently active DLUS for a PU. A zero-length string indicates no active DLUS. When non-empty it follows the SnaControlPointName textual convention (DisplayString SIZE 0..17).
