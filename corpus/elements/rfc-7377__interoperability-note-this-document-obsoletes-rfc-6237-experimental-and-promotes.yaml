summary: 'This document obsoletes RFC 6237 (Experimental) and promotes the extension to Standards Track. Changes include: addition of a paragraph on duplicate source mailboxes (server MAY return BAD), and addition of Section 2.3 explicitly permitting fuzzy text matching in multimailbox searches.'
