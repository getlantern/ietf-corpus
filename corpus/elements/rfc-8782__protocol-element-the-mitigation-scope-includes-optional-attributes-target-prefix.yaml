document: rfc-8782
kind: protocol-element
summary: 'The mitigation scope includes optional attributes: ''target-prefix'' (CIDR prefixes), ''target-port-range'' (lower/upper bounds), ''target-protocol'' (IANA protocol numbers), ''target-fqdn'', ''target-uri'', ''alias-name'', and mandatory ''lifetime''. At least one of target-prefix, target-fqdn, target-uri, or alias-name MUST be present.'
