document: rfc-8560
kind: design-rationale
summary: PBB-VPLS integration with EVPN and VPLS integration with PBB-EVPN are explicitly out of scope because no service provider requirements exist for these cross-technology combinations. The expected migration path is VPLS→EVPN and PBB-VPLS→PBB-EVPN, not cross-PBB integration.
