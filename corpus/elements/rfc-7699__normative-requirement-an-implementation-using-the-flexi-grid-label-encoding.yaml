document: rfc-7699
kind: normative-requirement
summary: An implementation using the flexi-grid label encoding MUST follow RFC 3473 and RFC 3471 (as updated by RFC 6205), MUST set Grid to 3 and C.S. to 5, MUST set Identifier to indicate the local laser identifier, MUST set n per the frequency formula, and MUST set m per the slot width formula.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
