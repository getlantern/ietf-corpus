document: rfc-3502
kind: protocol-element
summary: 'The APPEND command accepts one or more messages to upload, each specified as an optional flag parenthesized list, an optional date/time string, and a message literal. The ABNF is: append = "APPEND" SP mailbox 1*append-message; append-message = [SP flag-list] [SP date-time] SP literal.'
section: 6.3.11
topics:
    - email
