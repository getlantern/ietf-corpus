document: rfc-6506
kind: protocol-element
summary: The Authentication Trailer length is not included in the OSPFv3 header Length field but IS included in the IPv6 payload length. The trailer length equals the total IPv6 payload length minus the OSPFv3 packet length minus any LLS block length.
section: "2"
topics:
