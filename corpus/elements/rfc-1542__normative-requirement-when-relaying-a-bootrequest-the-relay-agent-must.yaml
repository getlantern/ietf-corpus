document: rfc-1542
kind: normative-requirement
summary: When relaying a BOOTREQUEST, the relay agent MUST fill 'giaddr' with the receiving interface's IP address if 'giaddr' is zero; if 'giaddr' is non-zero, it MUST NOT be modified. The relay agent MUST NOT under any circumstances place a broadcast address in 'giaddr'.
section: 4.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
