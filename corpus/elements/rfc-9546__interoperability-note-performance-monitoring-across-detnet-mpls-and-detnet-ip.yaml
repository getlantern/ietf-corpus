document: rfc-9546
kind: interoperability-note
summary: Performance monitoring across DetNet MPLS and DetNet IP domains can use STAMP (RFC 8762) and its extensions (RFC 8972) to measure packet loss and delay, enabling composable metrics (RFC 6049) that reflect end-to-end DetNet service performance.
