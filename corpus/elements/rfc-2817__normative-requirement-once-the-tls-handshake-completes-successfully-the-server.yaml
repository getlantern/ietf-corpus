document: rfc-2817
kind: normative-requirement
summary: Once the TLS handshake completes successfully, the server MUST continue with the response to the original request. Any TLS handshake failure MUST lead to disconnection per the TLS error alert specification.
section: "3.3"
rfc2119_level: MUST
topics:
    - http
    - tls
