document: rfc-3332
kind: normative-requirement
summary: Traffic requiring in-sequence delivery SHOULD be assigned to the same SCTP stream. MTP3-User traffic may be mapped to streams based on the SLS value in the MTP3 Routing Label or the ISUP CIC assignment, subject to the maximum stream count supported by the SCTP association.
section: 1.4.7
rfc2119_level: SHOULD
topics:
    - realtime
    - sctp
