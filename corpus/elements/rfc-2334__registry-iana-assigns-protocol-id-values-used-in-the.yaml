summary: 'IANA assigns Protocol ID values used in the Mandatory Common Part to identify which protocol employs SCSP (currently: ATMARP=1, NHRP=2, MARS=3, DHCP=4, LNNI=5). IANA also assigns hash algorithm identifiers for the Authentication Extension.'
