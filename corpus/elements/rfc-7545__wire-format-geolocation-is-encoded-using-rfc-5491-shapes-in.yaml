document: rfc-7545
kind: wire-format
summary: 'GeoLocation is encoded using RFC 5491 shapes in JSON: an Ellipse (center Point in WGS84 lat/lon degrees, optional semiMajorAxis/semiMinorAxis in meters, optional orientation in degrees from North) for a point, or a Polygon (list of 4+ Points, counter-clockwise, first equals last) for a region. An optional confidence integer (default 95) expresses location certainty as a percentage.'
