document: rfc-3998
kind: normative-requirement
summary: Disable-Printer causes the Printer to reject subsequent Job Creation operations and return 'server-error-not-accepting-jobs'. The IPP Printer MUST accept the request in any state and set 'printer-is-accepting-jobs' to 'false'; it has no effect on printer-state or processing of existing jobs.
section: 3.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
