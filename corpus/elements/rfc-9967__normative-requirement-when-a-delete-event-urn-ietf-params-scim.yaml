document: rfc-9967
kind: normative-requirement
summary: When a DELETE event (urn:ietf:params:scim:event:prov:delete) is sent, a corresponding 'feedRemove' event SHALL NOT be issued. A delete event has no payload attributes and the 'full'/'notice' qualifiers SHALL NOT be used.
section: 2.4.4
rfc2119_level: SHALL NOT
