summary: 'The i= tag ABNF is: sig-i-tag = %x69 [FWS] "=" [FWS] [ Local-part ] "@" domain-name. The Local-part is optional; when omitted, the AUID defaults to an empty Local-part followed by "@" and the d= domain.'
