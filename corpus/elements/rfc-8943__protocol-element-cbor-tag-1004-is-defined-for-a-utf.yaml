document: rfc-8943
kind: protocol-element
summary: CBOR tag 1004 is defined for a UTF-8 text string representing a calendar date without a time, formatted as an RFC 3339 'full-date' string (e.g., '1940-10-09'). This tag enables textual Gregorian calendar date representation in CBOR data items.
