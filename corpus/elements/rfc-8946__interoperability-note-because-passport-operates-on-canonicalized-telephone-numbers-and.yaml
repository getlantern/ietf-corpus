document: rfc-8946
kind: interoperability-note
summary: Because PASSporT operates on canonicalized telephone numbers and normalized URIs, many minor syntactic changes to identifiers that might be captured by History-Info or Diversion headers will not require a new "div" PASSporT; a "div" PASSporT is only needed when the canonical form of the "dest" identifier actually changes.
section: "4.1"
topics:
