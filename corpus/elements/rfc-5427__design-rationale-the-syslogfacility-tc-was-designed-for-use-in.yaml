document: rfc-5427
kind: design-rationale
summary: The SyslogFacility TC was designed for use in SNMP Manager user interfaces, providing a stable normative mapping even though OS syslog.conf files may vary. The label 'cron2' was introduced specifically to distinguish between the two facility codes (9 and 15) that both represent clock daemon messages in different implementations.
section: "3"
topics:
