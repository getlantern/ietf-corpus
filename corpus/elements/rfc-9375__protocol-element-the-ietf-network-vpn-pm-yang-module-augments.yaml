document: rfc-9375
kind: protocol-element
summary: The 'ietf-network-vpn-pm' YANG module augments the RFC 8345 'ietf-network' and 'ietf-network-topology' modules to provide performance monitoring (PM) for both underlay networks and overlay VPN services. The presence or absence of the 'service' container in 'network-types' distinguishes VPN service PM from network PM.
