document: rfc-7653
kind: normative-requirement
summary: When operating in secure mode, the requestor MUST attempt to negotiate a TLS connection; if negotiation fails, the requestor MUST close the TCP connection. The requestor MUST validate the DHCPv6 server's digital certificate during the TLS handshake.
section: "8.2"
rfc2119_level: MUST
topics:
    - tls
    - security
