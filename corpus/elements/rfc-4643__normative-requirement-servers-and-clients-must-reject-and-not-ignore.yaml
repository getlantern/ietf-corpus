document: rfc-4643
kind: normative-requirement
summary: Servers and clients MUST reject (and not ignore) any character not explicitly allowed by the Base64 alphabet, and MUST reject any Base64 sequence containing the pad character ('=') anywhere other than the end of the string.
section: 2.4.2
rfc2119_level: MUST
topics:
    - security
