document: rfc-4044
kind: interoperability-note
summary: Fibre Channel management instances with a corresponding software module use fcmInstanceSoftwareIndex to point to hrSWInstalledIndex in the Host Resources MIB (RFC 2790). A value of zero indicates no correspondence; agents are not required to support non-zero values.
section: "5.3"
