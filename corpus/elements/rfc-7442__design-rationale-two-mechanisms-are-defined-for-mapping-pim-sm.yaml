document: rfc-7442
kind: design-rationale
summary: 'Two mechanisms are defined for mapping PIM-SM ASM trees to mLDP P2MP LSPs. Mechanism 1 (non-transitive) is OPTIONAL; Mechanism 2 (transitive) is REQUIRED for conformance. The two are mutually exclusive in deployment: a network may use one or the other, but not both.'
