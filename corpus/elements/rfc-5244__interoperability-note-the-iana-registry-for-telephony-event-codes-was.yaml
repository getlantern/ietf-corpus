document: rfc-5244
kind: interoperability-note
summary: The IANA registry for telephony event codes was established by RFC 4733, not RFC 2833. Event code assignments originally made in RFC 2833 appear in the registry only if reaffirmed in RFC 4733 or an update such as RFC 5244.
section: "2"
topics:
