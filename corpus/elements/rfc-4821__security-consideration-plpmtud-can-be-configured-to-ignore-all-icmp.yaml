document: rfc-4821
kind: security-consideration
summary: PLPMTUD can be configured to ignore all ICMP messages globally or per-application, making it unattackable via spoofed ICMP PTB messages; an attacker can only degrade performance by causing probe packets to be lost, which is less damaging than attacking congestion control by causing arbitrary packet loss.
