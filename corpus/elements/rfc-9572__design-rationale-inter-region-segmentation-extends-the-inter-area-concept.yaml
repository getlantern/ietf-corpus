document: rfc-9572
kind: design-rationale
summary: Inter-region segmentation extends the inter-area concept by defining a region as a BGP peer group rather than an IGP area, allowing more flexible deployment scenarios including single-area networks and ASes with external links included in a region. This enables segmentation even when ASBRs don't support it natively.
section: "6.1"
topics:
    - mpls
    - routing
