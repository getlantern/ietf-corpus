document: rfc-3471
kind: normative-requirement
summary: Upon receipt of a 'Routing problem/Label allocation failure' error due to bidirectional LSP label contention, the node SHOULD try to allocate a different Upstream Label (and a different Suggested Label if used) to the bidirectional path.
