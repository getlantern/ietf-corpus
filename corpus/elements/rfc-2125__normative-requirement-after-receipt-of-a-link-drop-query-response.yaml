document: rfc-2125
kind: normative-requirement
summary: After receipt of a Link-Drop-Query-Response with Response Code Request-Ack, the transmitter of the Link-Drop-Query-Request MUST initiate link teardown by sending an LCP Terminate-Request on the designated link.
