document: rfc-6855
kind: interoperability-note
summary: When an IMAP server uses a mailbox format that supports UTF-8 headers and permits selection without first issuing "ENABLE UTF8=ACCEPT", it is the server's responsibility to comply with RFC 3501 and RFC 5322 for all header information transmitted over the wire.
