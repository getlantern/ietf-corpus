document: rfc-3739
kind: normative-requirement
summary: The issuer field SHALL identify the organization responsible for issuing the certificate, using an appropriate subset of domainComponent, countryName, stateOrProvinceName, organizationName, localityName, and serialNumber. Additional attributes MAY be present but SHOULD NOT be necessary to identify the issuing organization.
section: 3.1.1
rfc2119_level: SHALL
