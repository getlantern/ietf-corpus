document: rfc-5389
kind: wire-format
summary: 'All STUN messages start with a 20-byte header: 16-bit message type, 16-bit message length, 32-bit magic cookie (0x2112A442), and 96-bit transaction ID. The most significant 2 bits MUST be zeroes, enabling demultiplexing from other protocols sharing the same port.'
