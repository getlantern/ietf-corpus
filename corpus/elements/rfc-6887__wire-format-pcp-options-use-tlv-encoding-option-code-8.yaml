document: rfc-6887
kind: wire-format
summary: 'PCP options use TLV encoding: Option Code (8 bits; MSB=0 mandatory, MSB=1 optional-to-process), Reserved (8 bits), Option Length (16 bits, semantic length in octets, excluding padding), Data. Options are padded to 4-octet alignment; Option Length does not include padding.'
section: "7.3"
