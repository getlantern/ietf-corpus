document: rfc-1002
kind: normative-requirement
summary: The TC (Truncation) flag must be set if the Name Service message would exceed 576 bytes in a datagram. When TC is set, the client should use TCP to retrieve the full response from the NBNS.
section: 4.2.1.1
rfc2119_level: MUST
topics:
    - tcp
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
