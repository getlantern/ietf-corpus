document: rfc-5142
kind: normative-requirement
summary: Upon receipt of a Home Agent Switch message, the mobile node MUST stop using its current home agent and MUST delete its home binding by sending a Binding Update message as described in RFC 3775 Section 11.7.1, which serves as acknowledgement.
section: "6.1"
rfc2119_level: MUST
topics:
    - mobility
