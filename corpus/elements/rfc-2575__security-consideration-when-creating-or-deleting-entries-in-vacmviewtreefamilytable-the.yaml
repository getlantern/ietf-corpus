document: rfc-2575
kind: security-consideration
summary: 'When creating or deleting entries in vacmViewTreeFamilyTable, the recommended sequence must be followed: create ''excluded'' entries before ''included'' entries, and delete ''included'' entries before ''excluded'' entries. Reversing this order can result in unintended access being granted during the transition.'
section: "7.1"
topics:
    - snmp
    - security
