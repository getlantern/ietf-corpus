document: rfc-4282
kind: design-rationale
summary: Conversion of internationalized domain names to ASCII is left to end systems (clients and AAA servers) so that intermediate AAA proxies need not perform translations and can operate without awareness of international character sets, providing a canonical wire representation.
section: "2.4"
topics:
    - dns
    - security
