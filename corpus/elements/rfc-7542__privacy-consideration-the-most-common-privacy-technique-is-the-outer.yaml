document: rfc-7542
kind: privacy-consideration
summary: 'The most common privacy technique is the outer/inner identifier split in TLS-based EAP methods (e.g., EAP-TTLS): an anonymous ''@realm'' outer identifier routes the request to the home domain while keeping the real username confidential from the visited network; the real identity is exchanged only in the inner TLS-protected authentication.'
section: "2.4"
topics:
    - privacy
    - security
    - radius
