document: rfc-4534
kind: normative-requirement
summary: The groupName field MUST be unique relative to the Group Owner. If the optional edition field is present, group entities MUST accept a policy token only when the edition value is greater than the last value seen in a valid token for that group.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
    - multicast
