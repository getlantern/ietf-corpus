document: rfc-4244
kind: normative-requirement
summary: If the response is being forwarded outside the proxy's domain and there is a Privacy header with priv-value 'session', 'header', or 'history' in the original request, the proxy MUST remove the History-Info header (all hi-entries) prior to forwarding the response.
section: 4.3.3.2
rfc2119_level: MUST
topics:
    - sip
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
