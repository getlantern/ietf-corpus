document: rfc-8655
kind: security-consideration
summary: DoS attacks on DetNet QoS availability can be mitigated via traffic admission control at DetNet domain ingress (Section 3.2.1) and fault-mitigation methods (Section 3.3.2). Delay attacks by external entities can be countered by authentication and authorization of devices within the DetNet domain.
