document: rfc-8489
kind: protocol-element
summary: The ALTERNATE-SERVER mechanism allows a server to redirect a client using a 300 (Try Alternate) error response with at least one ALTERNATE-SERVER attribute carrying an IP address of the same family as the source address. A client MUST NOT follow a redirection to a server it has already contacted within the last five minutes, preventing redirect loops.
section: "10"
topics:
    - nat
