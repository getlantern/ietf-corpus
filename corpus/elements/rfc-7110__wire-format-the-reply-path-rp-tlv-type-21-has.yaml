document: rfc-7110
kind: wire-format
summary: The Reply Path (RP) TLV (Type 21) has a 2-octet Type field, 2-octet Length field, 2-octet Reply Path return code field, 2-octet Flags field, and a variable-length Reply Path field containing zero or more Target FEC sub-TLVs. The Flags field carries A (Alternative path) and B (Bidirectional) bits.
section: "4.2"
topics:
