document: rfc-1044
kind: normative-requirement
summary: The value 6 MUST be placed in byte 8 of a 32-bit HYPERchannel message carrying IP traffic. For interoperability with older drivers, a value of 0 in byte 8 SHOULD be treated as a 16-bit address message. All IP drivers MUST be prepared to send and receive both basic (16-bit) and extended (32-bit) format messages.
section: EXTENDED (32-BIT) MESSAGE ENCAPSULATION / MESSAGE TYPE
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
