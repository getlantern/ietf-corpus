document: rfc-9525
kind: security-consideration
summary: The textual representation of an IPv4 address may be misinterpreted as a valid FQDN in some contexts, leading different system components to classify the identifier differently and producing insecure behavior. Consistent classification of identifiers by all components is required to avoid this vulnerability.
section: "7.4"
topics:
    - tls
    - ip
    - security
