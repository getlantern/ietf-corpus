kind: protocol-element
summary: 'The BRIDGE-MIB module defines five major subtrees under dot1dBridge (mib-2 17): dot1dBase (all bridges), dot1dStp (Spanning Tree Protocol), dot1dSr (source routing, defined in RFC 1525), dot1dTp (transparent bridging), and dot1dStatic (destination-address filtering).'
