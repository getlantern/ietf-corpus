document: rfc-5182
kind: design-rationale
summary: The extension avoids wasted bandwidth and round-trip delay by eliminating the need for the server to send a message list to the client, the client to reformat it, and resend it. It also enables pipelining of SEARCH with FETCH/STORE/COPY/EXPUNGE and allows server-side query optimization.
