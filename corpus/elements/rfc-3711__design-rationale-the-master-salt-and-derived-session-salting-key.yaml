document: rfc-3711
kind: design-rationale
summary: The master salt and derived session salting key protect against pre-computation attacks and time-memory tradeoff attacks on the key derivation and the stream cipher. The salt is explicitly included in the IV rather than via an implicit mechanism to ease hardware implementation.
