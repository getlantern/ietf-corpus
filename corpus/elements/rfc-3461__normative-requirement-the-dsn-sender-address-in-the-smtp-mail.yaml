document: rfc-3461
kind: normative-requirement
summary: The DSN sender address in the SMTP MAIL command MUST be a null reverse-path ('<>'). When transmitting a DSN via SMTP, the RET parameter MUST NOT be used. If NOTIFY is used, its value MUST be NEVER.
section: "6.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
