document: rfc-7774
kind: normative-requirement
summary: A node MUST leave an MPL Domain if it receives updated, all-valid MPL Parameter Configuration Options that contain no configuration for that domain, unless the node has an overriding manual configuration for the domain.
section: "2.3"
rfc2119_level: MUST
topics:
    - routing
