document: rfc-9734
kind: security-consideration
summary: The id-kp-imUri EKU reduces existing security risks by providing a means to identify whether a certificate is generated to sign IM identity credentials, mitigating cross-protocol attack risks that arise when general-purpose KeyPurposeIds like id-kp-serverAuth or id-kp-clientAuth are used for IM clients.
