document: rfc-5664
kind: normative-requirement
summary: When a file's permissions or ACL change, the metadata server MUST change the POLICY ACCESS TAG (capability version attribute) on all objects comprising the file to implicitly invalidate outstanding capabilities before committing to the new access policy.
section: "13"
rfc2119_level: MUST
topics:
    - security
