document: rfc-1532
kind: interoperability-note
summary: For BOOTP over IEEE 802.5 Token Ring networks, the client SHOULD send its broadcast BOOTREQUEST with an All Routes Explorer RIF; servers/relay agents that cannot cache the return route SHOULD reply using a Spanning Tree Rooted RIF. This avoids communication failures on bridged rings where the server is on a different segment.
section: "2.4"
topics:
    - ip
