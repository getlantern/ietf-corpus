document: rfc-7940
kind: design-rationale
summary: Variant symmetry (if A is a variant of B, then B is a variant of A) and transitivity are NOT automatically implied; they must be spelled out explicitly in the LGR. This was a deliberate choice to make symmetry verifiable mechanically and to avoid hidden assumptions in implementations.
section: 5.3.1
