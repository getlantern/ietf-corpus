document: rfc-7578
kind: normative-requirement
summary: Senders SHOULD NOT generate any parts with a Content-Transfer-Encoding header field. Use of Content-Transfer-Encoding (e.g., 'quoted-printable') for non-ASCII parts is deprecated in binary-capable transports such as HTTP.
section: "4.7"
rfc2119_level: SHOULD NOT
topics:
    - http
