document: rfc-4567
kind: security-consideration
summary: An active attacker who can modify unprotected SDP messages may change attributes (e.g., address information) that key management indirectly relies on, causing DoS or indirect compromise. Only the key management parameters themselves are end-to-end protected by this framework; session-level SDP integrity requires external means.
section: "8"
topics:
