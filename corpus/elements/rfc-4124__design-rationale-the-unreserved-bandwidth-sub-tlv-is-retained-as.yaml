document: rfc-4124
kind: design-rationale
summary: The Unreserved Bandwidth sub-TLV is retained as the sole vehicle for dynamic bandwidth information for constraint-based routing, but its semantics are generalized so that the eight values correspond to TE-Classes rather than raw preemption priorities. This avoids mandatory IGP changes while enabling per-CT bandwidth differentiation.
section: "5.2"
topics:
