document: rfc-2670
kind: protocol-element
summary: 'docsIfSignalQualityTable monitors PHY signal quality: unerrored/corrected/uncorrectable codeword counters (Counter32), SNR in tenths of dB, microreflections in dBc (0–255), and equalization data (OCTET STRING). At CM it covers the downstream channel; at CMTS it covers upstream channels and may exclude contention intervals.'
section: 3.1.1
topics:
