document: rfc-7881
kind: normative-requirement
summary: The UDP source port of S-BFD Control packets transmitted by SBFDInitiator sessions MUST NOT be 7784. The same UDP source port MUST be used for all S-BFD Control packets associated with a particular SBFDInitiator session, and the source port number MUST be unique among all SBFDInitiator sessions on the system.
section: "2"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
