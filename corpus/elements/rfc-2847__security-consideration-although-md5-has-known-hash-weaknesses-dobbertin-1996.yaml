document: rfc-2847
kind: security-consideration
summary: Although MD5 has known hash weaknesses (Dobbertin 1996), these weaknesses do not affect the security of HMAC-MD5, so HMAC-MD5 remains secure for its role as the mandatory integrity MAC in SPKM-3.
