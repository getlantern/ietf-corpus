kind: protocol-element
summary: 'The service parameters convention follows RFC 3761 where ''type'' defines the service (more generic) and ''subtype'' defines the URI scheme. For ''pstn'', the subtype ''tel'' maps to the tel: URI scheme and ''sip'' maps to the sip: URI scheme.'
