document: rfc-3207
kind: design-rationale
summary: The post-TLS EHLO response MAY differ from the pre-TLS response, allowing servers to conditionally advertise capabilities (e.g., certain SASL mechanisms) only after a client has presented an appropriate certificate, enabling authentication-conditional feature advertisement.
