document: rfc-1833
kind: design-rationale
summary: The network identifier (r_netid) is defined as a system-local string assigned by a system administrator, and cannot be depended upon to have the same value across different systems. This allows local flexibility while preserving universal address portability.
section: "2.1"
topics:
