document: rfc-735
kind: wire-format
summary: 'The DEFINE subcommand has the form: IAC SB BM <DEFINE=1> <macro byte> <count> <replacement string> IAC SE. The <count> field is one 8-bit binary byte indicating how many replacement string characters follow (not counting the trailing IAC SE); doubled IACs in the string count as one character per pair.'
section: "2"
extracted_by: claude-sonnet-4-6
