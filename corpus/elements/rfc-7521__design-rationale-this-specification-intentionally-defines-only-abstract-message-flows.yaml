document: rfc-7521
kind: design-rationale
summary: This specification intentionally defines only abstract message flows and processing rules. Companion specifications (e.g., RFC 7522 for SAML 2.0 and RFC 7523 for JWT) are necessary to provide concrete instantiations, allowing the framework to interwork with multiple identity assertion formats.
