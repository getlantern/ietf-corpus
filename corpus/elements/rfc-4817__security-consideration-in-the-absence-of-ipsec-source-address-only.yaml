document: rfc-4817
kind: security-consideration
summary: In the absence of IPsec, source-address-only filtering at domain boundaries is insufficient protection unless the MPLS over L2TPv3 decapsulator also validates the IP source address. Destination address filtering may be impossible when tunnels traverse the public Internet.
section: "6.1"
topics:
    - mpls
    - security
    - vpn
