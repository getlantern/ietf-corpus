document: rfc-726
kind: wire-format
summary: The RCTE subnegotiation format is IAC SB RCTE <cmd> [BC1 BC2] [TC1 TC2] IAC SE. <cmd> is a single 8-bit byte. BC1/BC2 (two bytes) optionally follow to specify new break character classes; TC1/TC2 (two bytes) optionally follow to specify new transmission classes. These optional fields are present only when the corresponding bits in <cmd> are set.
section: "2"
