document: rfc-3543
kind: interoperability-note
summary: Revocation support for a co-located mobile node registering via a foreign agent because the 'R' bit was set in the agent's advertisement is not supported. A foreign agent wishing to revoke bindings MUST set the 'R' bit but SHOULD deny co-located registrations as 'Administratively Prohibited'.
section: 4.3.1
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
