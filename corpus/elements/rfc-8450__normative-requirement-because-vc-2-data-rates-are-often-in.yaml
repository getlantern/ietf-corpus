document: rfc-8450
kind: normative-requirement
summary: Because VC-2 data rates are often in the gigabits per second range, the 16-bit RTP sequence number is extended to 32 bits. The RTP Sequence Number field MUST hold the low-order 16 bits, and the Extended Sequence Number field in the payload header MUST contain the high-order 16 bits.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
