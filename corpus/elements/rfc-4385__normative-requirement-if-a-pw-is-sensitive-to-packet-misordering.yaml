document: rfc-4385
kind: normative-requirement
summary: If a PW is sensitive to packet misordering and is carried over an MPLS PSN that uses MPLS payload contents to select the ECMP path, it MUST employ a mechanism that prevents packet misordering, such as the PWMCW for data or the PWACH for channel-associated traffic.
section: "2"
rfc2119_level: MUST
topics:
    - mpls
