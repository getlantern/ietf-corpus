document: rfc-9248
kind: security-consideration
summary: When a Communications Assistant participates in a relay call, the CA has access to the full conversation content even though the call is nominally between the two endpoints. Confidentiality of CA-handled conversations is governed by contractual or legal requirements.
section: "11"
topics:
    - security
    - privacy
