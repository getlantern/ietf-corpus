document: rfc-5506
kind: security-consideration
summary: The reduction in packet validation strength for RTCP receivers accepting Reduced-Size RTCP may result in a higher rate of acceptance of spurious data as real RTCP. This vulnerability can be mitigated by using a security mechanism that provides authentication, such as SRTP (RFC 3711).
section: "6"
topics:
