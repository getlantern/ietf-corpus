document: rfc-6647
kind: normative-requirement
summary: It is RECOMMENDED to implement greylisting based on a tuple of (IP address, RFC5321.MailFrom, first RFC5321.RcptTo). After a successful retry, all further SMTP traffic from that IP address in the tuple SHOULD be allowed regardless of envelope information.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
