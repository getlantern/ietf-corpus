document: rfc-4220
kind: interoperability-note
summary: If the TE link is a Forwarding Adjacency (FA), teLinkLocalIpAddr is set to the head-end address and teLinkRemoteIpAddr to the tail-end address of the FA-LSP. If ipAddrTable is implemented, teLinkLocalIpAddr must match the corresponding ipAdEntAddr value for the same ifIndex.
section: "9"
topics:
