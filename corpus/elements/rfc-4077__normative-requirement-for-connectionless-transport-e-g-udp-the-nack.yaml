document: rfc-4077
kind: normative-requirement
summary: For connectionless transport (e.g., UDP), the NACK message must be sent back to the originator at the port and IP address from which the failed message was sent, and must be sent from the IP address and port to which the uninterpretable message was directed.
section: "2.2"
rfc2119_level: MUST
topics:
    - udp
