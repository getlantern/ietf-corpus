document: rfc-5175
kind: normative-requirement
summary: During transmission, the EFO MUST only occur in Router Advertisement messages, MUST occur prior to any additional options associated with any flags set in this option, MUST only occur once in the RA message, MUST NOT be added if no flags in the option are set, and MUST set all unused flags to zero.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
