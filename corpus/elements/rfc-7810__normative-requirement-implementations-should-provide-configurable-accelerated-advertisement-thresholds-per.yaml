document: rfc-7810
kind: normative-requirement
summary: Implementations SHOULD provide configurable accelerated advertisement thresholds per sub-TLV so that immediate advertisement occurs when a measured parameter falls outside configured bounds or when the difference from the last advertised value exceeds a configured threshold.
