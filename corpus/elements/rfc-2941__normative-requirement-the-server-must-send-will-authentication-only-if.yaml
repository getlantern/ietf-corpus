document: rfc-2941
kind: normative-requirement
summary: The server MUST send WILL AUTHENTICATION only; if it receives DO AUTHENTICATION it must respond with WONT. The client MUST respond with DONT if it receives WILL AUTHENTICATION. Authentication is negotiated only in one direction.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - crypto
