document: rfc-4791
kind: security-consideration
summary: CalDAV inherits all security considerations from WebDAV and requires TLS (RFC 2818) for transport. Access control is enforced via WebDAV ACL (RFC 3744); the CALDAV:read-free-busy privilege allows limited free-busy disclosure without exposing full event details, supporting a privacy-preserving sharing model.
section: "11"
topics:
    - security
    - privacy
