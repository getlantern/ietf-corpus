document: rfc-9604
kind: protocol-element
summary: The R (Removal) flag, bit 0 of the Flags field in the TE-PATH-BINDING TLV, when set to 1 indicates that the requesting PCEP peer requires removal of the binding value for the LSP. It is used in PCRpt and PCUpd messages and ignored in other PCEP messages.
section: "4"
