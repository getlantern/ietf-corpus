document: rfc-7822
kind: security-consideration
summary: Malicious use of extension fields cannot amplify DDoS attacks against NTP servers because servers ignore unknown extension fields and do not propagate or echo extension fields from incoming packets; servers create their own extension fields only when needed for a response.
section: "4"
topics:
