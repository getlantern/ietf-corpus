document: rfc-8723
kind: design-rationale
summary: Header extensions are excluded from the inner (E2E) integrity protection so that an MD holding only the outer key can modify them freely. This is an explicit design choice accepting weaker E2E protection for header extensions in exchange for MD flexibility.
section: "5"
topics:
