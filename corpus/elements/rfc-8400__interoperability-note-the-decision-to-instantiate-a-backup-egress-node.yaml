document: rfc-8400
kind: interoperability-note
summary: The decision to instantiate a backup egress node for protecting the primary egress node can be initiated by either the ingress node or the primary egress node, but not both simultaneously; mutual exclusivity is enforced by requiring configuration on one side only.
