document: rfc-7711
kind: registry
summary: RFC 7711 establishes the 'POSH Service Names' registry under the 'Uniform Resource Identifier (URI) Schemes' group. Registration policy is Expert Review or IETF Review; requests go to posh@ietf.org; review period is 14 days, with 21-day escalation to IESG.
