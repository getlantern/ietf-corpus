document: rfc-8278
kind: design-rationale
summary: The MAG Identifier option is required alongside the MAG Multipath Binding option in PBU requests so the LMA can uniquely identify the MAG across multiple access paths, which is necessary when the MAG registers CoAs from different access networks (e.g., LTE and WLAN).
