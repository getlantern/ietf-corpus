document: rfc-2895
kind: design-rationale
summary: The ianaAssigned pseudo-protocol exists for protocols that 'almost' conform to a well-known identifier format but require additional criteria (e.g., configuration-based) for identification, making them impossible to identify by packet examination alone. A centrally maintained IANA list is required for interoperability.
section: "4.2"
