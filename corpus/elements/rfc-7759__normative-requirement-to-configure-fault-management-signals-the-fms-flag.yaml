document: rfc-7759
kind: normative-requirement
summary: To configure Fault Management Signals, the FMS Flag in the MPLS OAM Functions TLV MUST be set and the FMS sub-TLV MUST be included when modifying default configuration. The Refresh Timer value MUST be between 1 and 20 seconds as specified in RFC 6427.
section: 2.1.3
rfc2119_level: MUST
topics:
    - mpls
    - measurement
