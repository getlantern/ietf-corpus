document: rfc-8986
kind: registry
summary: IANA created the 'Segment Routing' top-level registry and the 'SRv6 Endpoint Behaviors' 16-bit subregistry (range 0–65535). Range 1–32767 is First Come First Served; 32768–34815 is Private Use; 34816–65534 is Reserved; 65535 (0xFFFF) is Opaque. Initial registrations include End (1), End.X (5), End.T (9), End.DX6 (16), End.DX4 (17), End.DT6 (18), End.DT4 (19), End.DT46 (20), End.DX2 (21), End.DT2M (24), End.B6.Encaps (14), End.B6.Encaps.Red (27), End.BM (15), and flavor combinations thereof.
section: "10.2"
topics:
    - registry
    - routing
