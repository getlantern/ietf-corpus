document: rfc-3185
kind: normative-requirement
summary: MSG2.KEK is derived by reversing the bytes of MSG1.CEK. The application MUST ensure that the relevant algorithms are compatible, i.e., the CEK and KEK must use the same type and size of symmetric key.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
