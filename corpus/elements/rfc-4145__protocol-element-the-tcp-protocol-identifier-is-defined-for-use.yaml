document: rfc-4145
kind: protocol-element
summary: The 'TCP' protocol identifier is defined for use in the SDP 'm' line proto field to indicate TCP-based media transport. An 'm' line specifying 'TCP' must further qualify the application-layer protocol using a fmt identifier.
