document: rfc-726
kind: protocol-element
summary: 'Nine character classes are defined for break and transmission class bitmaps: 1=upper-case (A-Z), 2=lower-case (a-z), 3=digits (0-9), 4=format effectors (<BS><CR><LF><FF><HT><VT>), 5=non-format effector controls including <DEL> and <ESC>, 6=punctuation (.,;:?!), 7=brackets ({[(<>)]}), 8=special symbols (''"/%@$&#+-*=^_|~), 9=space. The sequence <cr><lf> counts as one character and is a single break when class 4 is set.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
