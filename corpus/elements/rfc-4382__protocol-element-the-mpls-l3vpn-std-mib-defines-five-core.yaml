document: rfc-4382
kind: protocol-element
summary: 'The MPLS-L3VPN-STD-MIB defines five core tables: mplsL3VpnVrfTable (VRF instances), mplsL3VpnIfConfTable (VRF-enabled interfaces), mplsL3VpnVrfPerfTable (performance counters), mplsL3VpnVrfRouteTable (VRF routing entries), and mplsL3VpnVrfRTTable (route target associations). Together these tables provide full configuration and monitoring of MPLS L3VPN on an LSR.'
section: "5"
topics:
