document: rfc-9186
kind: design-rationale
summary: P2MP BFD using Demand mode is chosen over Asynchronous mode because it creates less BFD state in point-to-multipoint environments, making it more scalable for shared media segments like Ethernet where PIM-SM is commonly deployed.
