summary: 'The XML validation schema adds uniqueness constraints enforced via xsd:key declarations: metadataID must be unique, LFBClassIDs must be unique, componentID/capabilityID/event baseID must be unique per LFB, eventIDs must be unique per LFB, and special values in atomic types must be unique per type.'
