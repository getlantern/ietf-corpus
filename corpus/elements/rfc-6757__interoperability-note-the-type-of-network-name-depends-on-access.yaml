document: rfc-6757
kind: interoperability-note
summary: 'The type of Network Name depends on access technology: IEEE 802.11 networks use SSID, 3GPP access uses the PLMN Identifier, and 3GPP2 access uses the Access Network Identifier (ANI). The encoding convention must be matched to the access technology in use.'
