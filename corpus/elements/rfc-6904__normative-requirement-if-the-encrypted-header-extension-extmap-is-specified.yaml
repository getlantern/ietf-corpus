document: rfc-6904
kind: normative-requirement
summary: If the encrypted header extension extmap is specified as a media-level SDP attribute, it MUST appear only on SRTP-based media. If specified as a session-level attribute, at least one media in the session MUST use an SRTP-based RTP profile; the attribute MUST be ignored for non-SRTP media.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
