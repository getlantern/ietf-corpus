document: rfc-4860
kind: normative-requirement
summary: When requesting a new aggregate reservation, the Deaggregator MUST include a SESSION-OF-INTEREST object containing the GENERIC-AGGREGATE SESSION in the E2E PathErr message with error code NEW-AGGREGATE-NEEDED. The DCLASS object is no longer needed since PHB-ID is in the SESSION.
section: "4"
rfc2119_level: MUST
topics:
