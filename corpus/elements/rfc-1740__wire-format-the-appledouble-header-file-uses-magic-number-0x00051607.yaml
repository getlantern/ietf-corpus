document: rfc-1740
kind: wire-format
summary: The AppleDouble header file uses magic number 0x00051607 (vs. 0x00051600 for AppleSingle), has the same header structure as AppleSingle but omits the Data Fork entry. The AppleDouble data file contains only the raw data fork with no additional header.
