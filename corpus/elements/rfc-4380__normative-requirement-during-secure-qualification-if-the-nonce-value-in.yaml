document: rfc-4380
kind: normative-requirement
summary: During secure qualification, if the nonce value in the server's Router Advertisement response does not match the nonce sent by the client, the packet MUST be discarded. If stronger HMAC-based authentication is used and the computed authentication values do not match, the packet MUST also be discarded.
section: 5.2.2
rfc2119_level: MUST
topics:
    - ip
    - nat
    - security
    - v6ops
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
