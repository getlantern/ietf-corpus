document: rfc-3347
kind: design-rationale
summary: The symmetric connection binding approach (connection allegiance) was chosen over the asymmetric approach (all commands on one connection, data on another). Symmetric allegiance keeps command, data, and status on the same connection, guarantees status is received after data via TCP ordering, and reduces inter-processor communication when connections span processors.
section: "3.4"
topics:
    - tcp
