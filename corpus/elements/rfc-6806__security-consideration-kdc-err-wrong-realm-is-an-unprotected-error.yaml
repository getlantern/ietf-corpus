document: rfc-6806
kind: security-consideration
summary: KDC_ERR_WRONG_REALM is an unprotected error response, so an attacker may redirect a client to authenticate to an unintended realm. This can provide the attacker an advantage in attacking client credentials, especially in shared-password scenarios.
section: "13"
topics:
    - security
