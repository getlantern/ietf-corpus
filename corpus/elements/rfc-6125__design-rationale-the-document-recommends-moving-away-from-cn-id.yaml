document: rfc-6125
kind: design-rationale
summary: The document recommends moving away from CN-ID and toward subjectAltName entries (DNS-ID, SRV-ID, URI-ID) because Common Name is not strongly typed — it might contain a human-friendly string rather than a DNS domain name — and because subjectAltName was specifically designed for machine-parseable service identity.
section: "1.5"
