document: rfc-9931
kind: interoperability-note
summary: 'The WebSocket protocol already forbids optimistic use of HTTP Upgrade: RFC 6455 Section 4.1 requires the client to wait for the server''s response before sending any further data. Additionally, WebSocket mandates high-entropy masking of all client-to-server frames, providing a second layer of protection.'
section: "6.2"
topics:
    - http
    - websocket
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
