document: rfc-7310
kind: normative-requirement
summary: Coded samples MUST be packed contiguously into payload octets in network byte order (big-endian), starting with the most significant bit, and an integer number of coded samples MUST be within the same packet.
section: "5.2"
rfc2119_level: MUST
