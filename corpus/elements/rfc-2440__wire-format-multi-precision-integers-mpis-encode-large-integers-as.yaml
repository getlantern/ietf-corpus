document: rfc-2440
kind: wire-format
summary: Multi-Precision Integers (MPIs) encode large integers as a two-octet bit-length scalar followed by big-endian integer octets. Total size is ((MPI.length + 7) / 8) + 2 octets. The length counts from the most significant non-zero bit; leading zero bits are not permitted.
section: "3.2"
topics:
