document: rfc-6991
kind: design-rationale
summary: The date-and-time type profiles RFC 3339 rather than using the XML Schema dateTime type directly because RFC 3339 prohibits negative years, distinguishes -00:00 (unknown timezone) from +00:00/Z, uses a different full-date/full-time separator, and provides higher resolution for fractional seconds.
