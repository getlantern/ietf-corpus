document: rfc-4250
kind: registry
summary: 'IANA registry for SSH Message Numbers: byte values 1–255 allocated in bands — transport layer generic (1–19), algorithm negotiation (20–29), key exchange method specific (30–49), user authentication generic (50–59), auth method specific (60–79), connection protocol generic (80–89), channel-related (90–127), reserved (128–191), local extensions (192–255). Initial assignments include SSH_MSG_DISCONNECT (1) through SSH_MSG_CHANNEL_FAILURE (100).'
section: "4.1"
