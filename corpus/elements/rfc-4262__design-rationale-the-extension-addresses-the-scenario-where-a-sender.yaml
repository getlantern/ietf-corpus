document: rfc-4262
kind: design-rationale
summary: The extension addresses the scenario where a sender of an encrypted message has no prior knowledge of the recipient's cryptographic capabilities through S/MIME exchanges. Since S/MIME encryption already requires possession of the recipient's certificate, embedding capabilities there avoids reliance on out-of-band means or potentially incompatible default configurations.
section: "1"
topics:
