document: rfc-9251
kind: normative-requirement
summary: IGMPv1 routes are considered invalid; the PE MUST apply the 'treat-as-withdraw' procedure per RFC 7606. Implementations are expected to only use IGMPv2 and above for IPv4 and MLDv1 and above for IPv6.
section: "10"
rfc2119_level: MUST
topics:
    - multicast
