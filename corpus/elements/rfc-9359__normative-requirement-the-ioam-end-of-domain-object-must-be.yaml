document: rfc-9359
kind: normative-requirement
summary: The IOAM End-of-Domain Object MUST be present in the IOAM Capabilities Response Container sent by an IOAM decapsulating node, unless the IOAM Edge-to-Edge Capabilities Object is also present. When E2E is enabled, including only the IOAM Edge-to-Edge Capabilities Object (without End-of-Domain) is RECOMMENDED.
section: 3.2.6
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
