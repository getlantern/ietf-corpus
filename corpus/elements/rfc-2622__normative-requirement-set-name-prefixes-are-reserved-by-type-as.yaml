document: rfc-2622
kind: normative-requirement
summary: 'Set name prefixes are reserved by type: ''as-'' for as-set, ''rs-'' for route-set, ''rtrs-'' for rtr-set, ''fltr-'' for filter-set, and ''prng-'' for peering-set. A hierarchical set name X1:...:Xn can only be created by the maintainer of the object named X1:...:Xn-1, partitioning the namespace.'
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
