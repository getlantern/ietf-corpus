document: rfc-4871
kind: interoperability-note
summary: The DKIM-Signature header SHOULD be treated as a trace header field (prepended, not reordered). Signing existing DKIM-Signature header fields is error-prone because some intermediate MTAs may reorder them, breaking those signatures.
section: "3.5"
topics:
    - email
