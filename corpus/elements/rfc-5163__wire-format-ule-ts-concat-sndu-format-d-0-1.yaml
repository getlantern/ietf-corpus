document: rfc-5163
kind: wire-format
summary: 'ULE TS-Concat SNDU format (D=0): 1-bit D flag, 15-bit Length, 16-bit Type (0x0002), 6-byte NPA address, followed by one or more 188-byte TS Packets, and a trailing 32-bit CRC-32. When D=1, the NPA address is absent and TS Packets follow directly after the 4-byte header.'
section: "3.1"
