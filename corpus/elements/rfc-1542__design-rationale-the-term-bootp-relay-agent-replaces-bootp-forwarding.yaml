document: rfc-1542
kind: design-rationale
summary: The term 'BOOTP relay agent' replaces 'BOOTP forwarding agent' to avoid confusion with IP router forwarding. A relay agent receives BOOTP messages as a final destination and generates new messages; it must not simply forward packets transparently like a router.
section: "4"
