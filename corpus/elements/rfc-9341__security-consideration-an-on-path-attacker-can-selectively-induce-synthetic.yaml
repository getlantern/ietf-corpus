document: rfc-9341
kind: security-consideration
summary: An on-path attacker can selectively induce synthetic delay to delay-colored packets, causing systematic error in delay measurements. Attacks on the underlying time synchronization protocol (see RFC 7384) can further compromise measurement integrity.
section: "10"
topics:
    - security
    - measurement
