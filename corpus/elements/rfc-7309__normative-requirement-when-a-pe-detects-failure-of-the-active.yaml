document: rfc-7309
kind: normative-requirement
summary: When a PE detects failure of the active inter-domain PW in the 3:1 Option A scenario, it SHOULD switch to another local standby inter-domain PW if available and send an LDP PW status message with the 'request switchover' bit set on that standby PW to the remote PE.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
