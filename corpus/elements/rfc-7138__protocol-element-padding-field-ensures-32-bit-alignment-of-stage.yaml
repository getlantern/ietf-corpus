document: rfc-7138
kind: protocol-element
summary: 'Padding field: Ensures 32-bit alignment of Stage fields. Length in bytes = 4 - (Num_of_stages % 4). MUST be set to zero on transmission and MUST be ignored on receipt. Unreserved Padding (16 bits) similarly aligns Unreserved ODUj fields when the number of priorities is odd.'
section: 4.1.3
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
