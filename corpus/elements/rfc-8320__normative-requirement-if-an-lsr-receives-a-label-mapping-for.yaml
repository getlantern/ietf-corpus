document: rfc-8320
kind: normative-requirement
summary: If an LSR receives a label mapping for a Rainbow FEC while retaining a label mapping for the corresponding red or blue FEC, it MUST continue to use the red or blue FEC mapping and MUST send a Label Release message for the Rainbow FEC. Conversely, if it receives a red or blue FEC mapping while retaining a Rainbow FEC mapping, it MUST continue to use the Rainbow FEC mapping and MUST send a Label Release for the red or blue FEC.
section: 5.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
