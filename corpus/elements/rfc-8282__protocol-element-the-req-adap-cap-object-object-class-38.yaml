summary: The REQ-ADAP-CAP object (Object-Class 38, Object-Type 1) is optional and specifies the requested adaptation capability for both ends of the lower-layer LSP, using Switching Capability (8 bits) and Encoding (8 bits) fields based on RFC 6001 semantics.
