document: rfc-1035
kind: normative-requirement
summary: DNS uses server port 53 (decimal) for both UDP (standard queries) and TCP (zone transfers and other operations). Zone refresh activities must use TCP (virtual circuits) for reliable transfer.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - tcp
    - udp
