document: rfc-8187
kind: normative-requirement
summary: Recipients implementing this specification MUST support the UTF-8 character encoding. RFC 2231 did not specify a mandatory-to-implement character encoding, making it hard for senders to choose; this specification closes that gap.
section: "3.2"
rfc2119_level: MUST
topics:
