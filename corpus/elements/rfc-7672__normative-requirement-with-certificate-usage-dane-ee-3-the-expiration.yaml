document: rfc-7672
kind: normative-requirement
summary: With certificate usage DANE-EE(3), the expiration date of the server certificate MUST be ignored. The validity period of the TLSA record key binding is determined by the validity interval of the TLSA record DNSSEC signature.
section: 3.1.1
rfc2119_level: MUST
