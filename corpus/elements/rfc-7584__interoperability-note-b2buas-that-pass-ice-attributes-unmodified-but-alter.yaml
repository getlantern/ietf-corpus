document: rfc-7584
kind: interoperability-note
summary: B2BUAs that pass ICE attributes unmodified but alter the default 'm=' and 'c=' destination will be detected as an ice-mismatch by ICE endpoints, causing ICE processing to abort; the session may continue only if endpoints can reach each other on the default candidate.
