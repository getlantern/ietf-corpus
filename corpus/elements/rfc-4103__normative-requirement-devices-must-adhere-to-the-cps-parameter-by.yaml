document: rfc-4103
kind: normative-requirement
summary: Devices MUST adhere to the 'cps' parameter by transmitting characters at or below the specified rate. However, receivers of text/t140 MUST be designed to handle temporary reception of characters at a higher rate than the parameter specifies, since implementations may pre-date the parameter's definition.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
