document: rfc-8995
kind: normative-requirement
summary: The registrar AN_join_registrar M_FLOOD message MUST be sent periodically; the default period SHOULD be 60 seconds, SHOULD be operator configurable, and SHOULD NOT be smaller than 60 seconds. Registrars MUST announce all supported protocols and MUST support TCP traffic.
section: "4.3"
rfc2119_level: MUST
topics:
    - zeroconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
