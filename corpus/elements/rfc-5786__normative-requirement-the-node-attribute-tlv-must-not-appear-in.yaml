document: rfc-5786
kind: normative-requirement
summary: The Node Attribute TLV MUST NOT appear in more than one TE LSA originated by a router, and such an LSA MUST NOT include more than one Node Attribute TLV, ensuring a single authoritative advertisement per router.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - routing
