document: rfc-6364
kind: normative-requirement
summary: Individual source flows MUST be identified with unique integer identifiers using the 'fec-source-flow' attribute. The 'id' parameter MUST be an integer. If an Explicit Source FEC Payload ID is used, the 'tag-len' parameter MUST exist; otherwise it MUST NOT exist.
section: "4.4"
rfc2119_level: MUST
topics:
    - realtime
