document: rfc-2163
kind: protocol-element
summary: Gate table entries ('gate1' and 'gate2') are distinguished from standard mapping entries ('table1' and 'table2') by appending the literal '.G.' suffix to the MAPX400 field in PX RDATA. This suffix must be stripped before using the mapping data. Its presence signals that DDA encoding (for gate2) or LHS encoding (for gate1) should be applied.
section: "4.4"
topics:
