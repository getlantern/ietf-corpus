document: rfc-5858
kind: security-consideration
summary: Implementers should use a strong integrity check algorithm for verifying decompressed headers. A weak algorithm increases the probability that an invalidly decompressed packet will be forwarded into the protected domain undetected.
section: "5"
topics:
