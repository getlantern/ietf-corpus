document: rfc-9172
kind: normative-requirement
summary: When BIBs and BCBs share a security target, BCBs MUST be evaluated first and BIBs second. A BIB MUST NOT be processed if its security target is also the security target of a BCB in the bundle.
section: "5.1"
rfc2119_level: MUST
topics:
    - security
