document: rfc-8196
kind: design-rationale
summary: To minimize recurrence of dual System ID and Router-Fingerprint duplication after a restart, routers SHOULD include the LSP sequence number of the next LSP they will send as additional entropy when regenerating the Router-Fingerprint.
section: 3.4.6
topics:
    - routing
