document: rfc-8896
kind: design-rationale
summary: A Server SHOULD advertise the smallest 'time-interval-size' it can provide in the IRD, because Clients requiring coarser granularity can aggregate multiple values, but Clients requiring finer granularity cannot subdivide them. This maximizes the utility of a single IRD announcement.
section: "4.1"
topics:
    - http
