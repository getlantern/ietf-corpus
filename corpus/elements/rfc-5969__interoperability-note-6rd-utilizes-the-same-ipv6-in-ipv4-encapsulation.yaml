document: rfc-5969
kind: interoperability-note
summary: 6rd utilizes the same IPv6-in-IPv4 encapsulation mechanism as 6to4 (RFC 3056/RFC 4213). 6to4 routes with the 2002::/16 prefix may coexist with 6rd in a CE router and may offer efficiencies when communicating directly with 6to4 routers.
