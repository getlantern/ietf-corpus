document: rfc-3720
kind: wire-format
summary: The ISID field in the Login Request is 6 bytes structured as a 2-bit type designator (T field) encoding OUI, EN, or random format, plus a type-specific 46-bit value. ISID is entirely initiator-assigned and is a key part of the session identifier.
section: 10.12.5
topics:
