document: rfc-7321
kind: interoperability-note
summary: The IPsec community generally prefers ESP with NULL encryption over AH for authentication-only use cases. AH is still required in some protocols and environments where IP header options like source routing headers must be protected, since ESP inherently cannot protect those IP options.
section: "3"
topics:
