document: rfc-5272
kind: normative-requirement
summary: Servers MUST use the Extended CMC Status Info control (id-cmc-statusInfoV2). Clients MUST be able to process the Extended CMC Status Info control. The older CMC Status Info control is retained for backwards compatibility with RFC 2797.
section: "6.1"
rfc2119_level: MUST
topics:
    - pkix
