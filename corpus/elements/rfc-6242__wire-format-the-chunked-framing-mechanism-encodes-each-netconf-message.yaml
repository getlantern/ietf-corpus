document: rfc-6242
kind: wire-format
summary: The chunked framing mechanism encodes each NETCONF message as one or more chunks, each prefixed by LF '#' chunk-size LF, followed by chunk-data octets. The message is terminated by LF '##' LF (end-of-chunks). The chunk-size field is a decimal string with no leading zeros; maximum value is 4294967295.
section: "4.2"
topics:
