document: rfc-9596
kind: design-rationale
summary: The "typ" parameter was added to COSE to provide parity with the JOSE "typ" header parameter, enabling explicit typing as recommended by RFC 8725 (JWT Best Current Practices). COSE previously lacked a mechanism to declare the type of the entire COSE data structure, only the payload type.
section: "1"
topics:
