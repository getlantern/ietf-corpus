document: rfc-7256
kind: normative-requirement
summary: The AN MUST process Command TLVs in order of appearance and MUST interrupt processing at the first error, discarding remaining commands; processing of a Multicast Replication Control message with Result=AckAll MUST produce a Generic Response with Result=Success on complete success, while Result=Nack requires no response.
section: 4.3.2
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
