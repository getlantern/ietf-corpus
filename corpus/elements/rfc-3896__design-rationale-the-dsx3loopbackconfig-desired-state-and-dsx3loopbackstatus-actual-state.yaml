document: rfc-3896
kind: design-rationale
summary: The dsx3LoopbackConfig (desired state) and dsx3LoopbackStatus (actual state) are split into two separate objects to distinguish manager-requested loopback from the actual state which may also include far-end-requested loopbacks. This allows duals (both near-end inward and far-end line loopback) to be represented simultaneously.
section: 2.2.4
topics:
