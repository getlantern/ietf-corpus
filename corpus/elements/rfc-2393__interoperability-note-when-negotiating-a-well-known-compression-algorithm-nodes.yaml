document: rfc-2393
kind: interoperability-note
summary: When negotiating a well-known compression algorithm, nodes MAY select a CPI in the pre-defined range 0-63. Each node independently selects a CPI value for its outbound direction; there is no relationship between the two separately chosen CPIs.
section: "3.3"
