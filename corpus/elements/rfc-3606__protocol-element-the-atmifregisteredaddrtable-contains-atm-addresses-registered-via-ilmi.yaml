document: rfc-3606
kind: protocol-element
summary: The atmIfRegisteredAddrTable contains ATM addresses (registered via ILMI or statically configured) usable for calls to/from a switch or service interface. It applies only to switches and network services, not hosts, and does not expose PNNI reachability information.
