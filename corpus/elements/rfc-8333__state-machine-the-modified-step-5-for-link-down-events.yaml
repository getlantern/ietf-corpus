summary: 'The modified step 5 for link-down events: upon SPF_DELAY expiry, SPF is computed; if a single local link-down event is confirmed, RIB/FIB update is deferred by ULOOP_DELAY_DOWN_TIMER; if a new event arrives during the deferral, the timer is cancelled and normal convergence resumes.'
