document: rfc-9242
kind: normative-requirement
summary: Because window size is initially 1, all IKE_INTERMEDIATE exchanges MUST be sequential and MUST all complete before IKE_AUTH is initiated. The IKE SA MUST NOT be considered established until IKE_AUTH successfully completes.
section: "3.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
