document: rfc-4443
kind: normative-requirement
summary: An IPv6 node MUST limit the rate of ICMPv6 error messages it originates. A token-bucket mechanism is recommended, limiting average rate to N packets/second or a fraction of link bandwidth while allowing bursts up to B messages. Rate-limiting parameters SHOULD be configurable.
section: "2.4"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
