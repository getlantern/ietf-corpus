document: rfc-8658
kind: interoperability-note
summary: If the BNG does not receive a Softwire46-Configuration Attribute in Access-Accept, it may fall back to preconfigured local Softwire46 configuration. If Access-Reject is received, Softwire46 configuration MUST NOT be supplied to the CE.
section: "4"
rfc2119_level: MUST NOT
