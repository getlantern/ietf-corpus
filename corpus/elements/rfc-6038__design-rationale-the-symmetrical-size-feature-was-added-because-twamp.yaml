document: rfc-6038
kind: design-rationale
summary: The Symmetrical Size feature was added because TWAMP recommends padding truncation to achieve equal packet sizes but does not guarantee the Session-Reflector will perform truncation, and truncation is impossible when there is insufficient padding. A new Session-Sender format that explicitly embeds the size difference as MBZ octets removes this uncertainty.
