document: rfc-6585
kind: design-rationale
summary: Captive portals typically identify unknown clients by MAC address, block all traffic except TCP port 80, and redirect it to a login server. The 511 code allows non-browser clients to distinguish portal responses from origin responses.
section: "6.1"
topics:
