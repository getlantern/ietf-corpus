document: rfc-9459
kind: normative-requirement
summary: AES-CBC requires padding of the plaintext; the padding algorithm specified in Section 6.3 of RFC 5652 MUST be used prior to encrypting the plaintext to allow the decryptor to unambiguously remove padding.
section: "5"
rfc2119_level: MUST
topics:
