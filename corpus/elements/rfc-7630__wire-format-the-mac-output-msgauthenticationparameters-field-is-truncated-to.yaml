summary: 'The MAC output (msgAuthenticationParameters field) is truncated to: 16 octets for usmHMAC128SHA224AuthProtocol, 24 octets for usmHMAC192SHA256AuthProtocol, 32 octets for usmHMAC256SHA384AuthProtocol, and 48 octets for usmHMAC384SHA512AuthProtocol. This contrasts with the 12-octet truncation used in HMAC-MD5-96 and HMAC-SHA-96.'
