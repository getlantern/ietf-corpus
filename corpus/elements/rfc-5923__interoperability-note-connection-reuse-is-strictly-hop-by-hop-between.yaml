document: rfc-5923
kind: interoperability-note
summary: Connection reuse is strictly hop-by-hop between adjacent SIP entities; there is no requirement to share a complete path. The mechanism complements but does not replace RFC 3261 persistent connection behavior, which governs reuse of a connection for responses and subsequent requests by the original connection initiator.
section: "6"
topics:
    - sip
