document: rfc-9420
kind: normative-requirement
summary: Applications MUST use PrivateMessage to encrypt application messages, and SHOULD use PrivateMessage for handshake messages. PublicMessage MAY be used for handshake messages only when the Delivery Service needs to examine them.
section: "6"
rfc2119_level: MUST
topics:
