document: rfc-2331
kind: normative-requirement
summary: IP over ATM entities SHOULD take advantage of traffic parameter negotiation whenever possible by specifying PCR equal to the link rate in the ATM Traffic Descriptor IE of the SETUP message and a minimum of zero PCR in the Minimum Acceptable ATM Traffic Descriptor IE.
section: 5.3.2
rfc2119_level: SHOULD
topics:
