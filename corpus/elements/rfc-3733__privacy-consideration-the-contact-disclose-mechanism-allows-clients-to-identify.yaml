document: rfc-3733
kind: privacy-consideration
summary: The <contact:disclose> mechanism allows clients to identify fields requiring exceptional handling to allow or restrict disclosure to third parties. The server announces a default policy at session establishment; per-object overrides are set at create/update time and reviewable via <info>.
section: "2.9"
topics:
    - privacy
