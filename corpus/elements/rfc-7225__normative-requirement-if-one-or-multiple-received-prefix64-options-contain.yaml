document: rfc-7225
kind: normative-requirement
summary: If one or multiple received PREFIX64 options contain a destination IPv4 prefix list, the PCP client MUST associate the included IPv4 prefixes with the corresponding Pref64::/n and suffix, and the host MUST enforce destination-based prefix selection for local address synthesis.
section: "4.3"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
