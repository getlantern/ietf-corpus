document: rfc-3814
kind: interoperability-note
summary: The MIB imports Dscp from DIFFSERV-DSCP-TC (RFC 3289), InetAddressType/InetAddress/InetPortNumber from INET-ADDRESS-MIB (RFC 3291), and mplsStdMIB from MPLS-TC-STD-MIB (RFC 3811). Full compliance also requires IF-MIB (RFC 2863) groups ifGeneralInformationGroup and ifCounterDiscontinuityGroup.
