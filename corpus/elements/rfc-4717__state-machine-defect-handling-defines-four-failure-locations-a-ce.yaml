document: rfc-4717
kind: state-machine
summary: 'Defect handling defines four failure locations: (a) CE-to-PE ATM connection, (b) ATM side of the PW, (c) PSN side of the PE, (d) in the PSN. For failures at (a)/(b), the ingress PE generates F4/F5 AIS toward the PSN; for failures at (c)/(d), the egress PE generates F4/F5 AIS toward the CE.'
section: "7.4"
topics:
