document: rfc-8361
kind: wire-format
summary: 'The NICKFLAG RECORD in the Nickname Flags APPsub-TLV is a 32-bit structure: bits 0-15 carry the Nickname, bit 16 is IN, bit 17 is SE, bit 18 is R (Replication Nickname), bit 19 is C (Special RPF Check), and bits 20-31 are RESV.'
