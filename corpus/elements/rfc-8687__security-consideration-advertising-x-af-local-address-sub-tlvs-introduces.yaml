document: rfc-8687
kind: security-consideration
summary: Advertising X-AF Local Address sub-TLVs introduces no new security threats beyond those already present in OSPFv2 (RFC 2328), OSPFv3 (RFC 5340), and RFC 5786, because the advertisement of these sub-TLVs in any OSPF instance is not precluded by RFC 5786.
