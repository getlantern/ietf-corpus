document: rfc-7817
kind: normative-requirement
summary: 'For DNS-ID and CN-ID identifier types, the client MUST use one or more of the following as reference identifiers: (a) the domain portion of the user''s email address, or (b) the hostname used to open the connection (without CNAME canonicalization). The client MAY also use a value securely derived from (a) or (b) via DNSSEC.'
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - email
    - dns
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
