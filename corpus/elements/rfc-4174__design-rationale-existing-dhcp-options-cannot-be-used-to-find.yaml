document: rfc-4174
kind: design-rationale
summary: Existing DHCP options cannot be used to find iSNS servers because (a) iSNS functionality is a significant superset of typical name resolution protocols such as DNS, and (b) the DHCP option must specify not just the server location but also which subset of iSNS services may be actively used by the client.
section: "1"
topics:
