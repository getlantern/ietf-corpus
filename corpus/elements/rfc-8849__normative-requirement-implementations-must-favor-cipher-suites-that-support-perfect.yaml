document: rfc-8849
kind: normative-requirement
summary: Implementations MUST favor cipher suites that support Perfect Forward Secrecy (PFS) over non-PFS cipher suites and SHOULD favor AEAD over non-AEAD cipher suites. NULL Protection profiles MUST NOT be used for RTP or RTCP.
section: "7"
rfc2119_level: MUST
topics:
