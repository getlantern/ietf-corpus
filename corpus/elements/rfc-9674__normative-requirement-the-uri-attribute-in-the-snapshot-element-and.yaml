document: rfc-9674
kind: normative-requirement
summary: The 'uri' attribute in the snapshot element and optional delta elements MUST be part of the same origin as the Update Notification File, meaning referenced URIs MUST have the same scheme, host, and port as the URI for the Update Notification File specified in the referring RRDP SIA AccessDescription.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
