document: rfc-1294
kind: normative-requirement
summary: A Frame Relay DTE must allow the maximum acceptable frame size to be configurable; the network must support at least a 262-octet maximum, and the minimum frame size is five octets between opening and closing flags.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
