document: rfc-1377
kind: interoperability-note
summary: For ES-IS over very unreliable PPP links, it may be necessary to set the Holding Timer to slightly more than three times the Configuration Timer (rather than the ISO 9542 recommendation of twice) to ensure loss of configuration information is an unusual event.
section: "1.1"
topics:
    - routing
