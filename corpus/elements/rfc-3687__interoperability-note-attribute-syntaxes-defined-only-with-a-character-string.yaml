document: rfc-3687
kind: interoperability-note
summary: Attribute syntaxes defined only with a character string encoding (no explicit or implied ASN.1 type definition) cannot use the component matching capabilities described in this document unless and until a semantically equivalent ASN.1 type definition is provided for them.
