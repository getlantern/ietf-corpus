document: rfc-7148
kind: wire-format
summary: 'The Delegated Mobile Network Prefix (DMNP) option carries a mobile router''s IPv4 (4-byte) or IPv6 (16-byte) prefix in a Mobility Header option with type 55. Fields are: Type (8-bit), Length (8-bit), V-flag (1-bit indicating IPv4 prefix), Reserved (7-bit, MUST be 0), Prefix Length (8-bit), and Prefix value. Alignment requirement is 8n+2.'
section: "4.1"
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
