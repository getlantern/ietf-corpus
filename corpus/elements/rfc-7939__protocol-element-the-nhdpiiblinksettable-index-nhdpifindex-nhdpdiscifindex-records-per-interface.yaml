document: rfc-7939
kind: protocol-element
summary: The nhdpIibLinkSetTable (INDEX { nhdpIfIndex, nhdpDiscIfIndex }) records per-interface link state for 1-hop neighbors with fields L_HEARD_time (nhdpIibLinkSetLHeardTime), L_SYM_time (nhdpIibLinkSetLSymTime), L_pending (nhdpIibLinkSetLPending, TruthValue), L_lost (nhdpIibLinkSetLLost, TruthValue), and L_time (nhdpIibLinkSetLTime, expiration timestamp). L_quality is intentionally omitted.
section: "7"
topics:
