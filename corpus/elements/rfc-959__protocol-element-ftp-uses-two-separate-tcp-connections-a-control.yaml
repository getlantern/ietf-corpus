document: rfc-959
kind: protocol-element
summary: 'FTP uses two separate TCP connections: a control connection (following the Telnet protocol) between user-PI and server-PI for commands and replies, and a separate data connection between DTPs for file transfer. The control connection must remain open while data transfer is in progress.'
section: "2.3"
