document: rfc-7225
kind: security-consideration
summary: Learning Pref64::/n via PCP enables use of DNSSEC in NAT64 environments, which is better than no DNSSEC but less safe than DNSSEC without DNS64/NAT64. The best mitigation against Pref64::/n discovery attacks is adding IPv6 support to all endpoints to reduce reliance on address synthesis.
section: "7"
topics:
