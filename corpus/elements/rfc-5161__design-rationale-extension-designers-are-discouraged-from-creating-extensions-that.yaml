document: rfc-5161
kind: design-rationale
summary: Extension designers are discouraged from creating extensions that require ENABLE unless there is no good alternative. Extensions that cause potentially incompatible behavior changes to deployed server responses have a higher complexity cost than those that do not.
section: "3.3"
