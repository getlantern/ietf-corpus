document: rfc-2815
kind: design-rationale
summary: A delay bound has no scope outside a single L2 domain. The end-to-end delay for a flow must be computed by summing per-domain values using standard RSVP path mechanisms; the L2 domain exports its contribution as C and D terms to L3 devices.
