document: rfc-6797
kind: protocol-element
summary: The Strict-Transport-Security (STS) HTTP response header field is the mechanism by which an HSTS Host declares its HSTS Policy to user agents. It must be sent only over secure transport (TLS/SSL) and its reception causes the UA to treat the issuing host as a Known HSTS Host.
section: "6.1"
topics:
    - http
    - tls
    - security
