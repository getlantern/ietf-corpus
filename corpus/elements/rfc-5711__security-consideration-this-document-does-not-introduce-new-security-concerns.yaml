document: rfc-5711
kind: security-consideration
summary: This document does not introduce new security concerns beyond those of existing MPLS-TE as specified in RFC 3209 and RFC 3473. By clarifying node behavior, it reduces the security risk introduced by non-conformant implementations that might incorrectly clear or retain state.
