document: rfc-1902
kind: normative-requirement
summary: If any non-editorial change is made to a managed object definition beyond the specific allowed revisions (adding enumerations, deprecating status, adding DEFVAL/REFERENCE/UNITS, augmenting rows, or adding new objects), the OBJECT IDENTIFIER value and descriptor for that object must both be changed.
section: "10.2"
rfc2119_level: MUST
