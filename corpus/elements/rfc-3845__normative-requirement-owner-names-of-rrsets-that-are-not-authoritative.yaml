document: rfc-3845
kind: normative-requirement
summary: Owner names of RRsets that are not authoritative for the given zone (such as glue records) MUST NOT be listed in the Next Domain Name unless at least one authoritative RRset exists at the same owner name.
section: 2.1.1
rfc2119_level: MUST NOT
topics:
