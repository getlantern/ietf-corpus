document: rfc-2455
kind: normative-requirement
summary: 'When an SNA name is used as a table index, agents treat trailing blanks as significant: a GetNext request for index ''#INTER  '' does not match the row indexed ''#INTER''. This allows management stations to position GetNext traversal within a table.'
section: "3"
rfc2119_level: MUST
topics:
