document: rfc-8981
kind: normative-requirement
summary: When a temporary address becomes deprecated, a new one MUST be generated. However, if deprecation was caused by a Prefix Information option with a zero preferred lifetime, a new temporary address MUST NOT be generated in response to that same option.
section: "3.5"
rfc2119_level: MUST
topics:
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
