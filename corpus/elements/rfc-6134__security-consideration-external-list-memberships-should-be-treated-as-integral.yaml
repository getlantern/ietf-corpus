document: rfc-6134
kind: security-consideration
summary: External list memberships should be treated as integral parts of the Sieve script. A temporary failure to access an external list SHOULD be handled the same way as a temporary failure to retrieve the Sieve script itself — typically by delaying message delivery until the list can be accessed.
section: "3"
topics:
