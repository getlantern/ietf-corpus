document: rfc-9559
kind: protocol-element
summary: 'The Segment element (EBML ID 0x18538067, master type) is the Root Element containing all other Top-Level Elements. It allows unknown size and must occur exactly once per EBML Document. Eight Top-Level child elements are defined: SeekHead, Info, Tracks, Chapters, Cluster, Cues, Attachments, and Tags.'
section: "5.1"
