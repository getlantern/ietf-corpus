document: rfc-7468
kind: wire-format
summary: The strict ABNF (Figure 3) requires a pre-encapsulation boundary followed by a newline, then full 64-base64char lines each terminated by eol, a final line with up to 64 chars and optional padding, and a post-encapsulation boundary followed by a newline. New implementations SHOULD emit this strict format.
