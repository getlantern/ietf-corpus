document: rfc-5685
kind: normative-requirement
summary: If the IKE_SA_INIT request did not include REDIRECT_SUPPORTED, the responder MUST NOT send the REDIRECT payload to the VPN client. This applies to all REDIRECT scenarios (IKE_SA_INIT, IKE_AUTH, and gateway-initiated INFORMATIONAL).
section: "3"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
