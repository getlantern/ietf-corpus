document: rfc-9567
kind: privacy-consideration
summary: DNS error reporting is performed without any authentication between the reporting resolver and the authoritative server of the agent domain. Query name minimization (RFC 9156) SHOULD be applied to error report queries to limit disclosure of the full QNAME to intermediate nameservers.
section: "9"
topics:
    - dns
    - privacy
