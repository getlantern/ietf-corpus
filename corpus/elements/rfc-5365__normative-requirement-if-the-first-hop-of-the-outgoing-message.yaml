document: rfc-5365
kind: normative-requirement
summary: If the first hop of the outgoing MESSAGE request is not trusted and the incoming request included a Privacy header field with a value other than 'none', the MESSAGE URI-list service MUST NOT include a P-Asserted-Identity header field in the outgoing request.
section: "7.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
