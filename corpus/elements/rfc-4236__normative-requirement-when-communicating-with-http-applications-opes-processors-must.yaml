document: rfc-4236
kind: normative-requirement
summary: When communicating with HTTP applications, OPES processors MUST ensure correctness of all computable HTTP headers (e.g., Content-Length, Content-MD5) in specifications they claim compliance with. By default, processors must validate and recalculate, add, or remove such headers.
section: "3.8"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
