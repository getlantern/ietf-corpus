document: rfc-6313
kind: interoperability-note
summary: Unlike classical IPFIX, structured data embeds type information inside Data Records rather than Template Records (e.g., a basicList IE in a Template does not specify the list element type). A Collecting Process must therefore resolve Templates mid-record when decoding subTemplateMultiList content.
section: "7"
