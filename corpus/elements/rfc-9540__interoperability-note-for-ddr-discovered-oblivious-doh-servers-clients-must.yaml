document: rfc-9540
kind: interoperability-note
summary: For DDR-discovered oblivious DoH servers, clients must still perform TLS certificate checks as described in Section 4.2 of RFC 9462 (DDR). Since Gateway and Target Resources must be on the same host, the certificate presented by the gateway must pass the required checks.
section: 4.2.1
topics:
    - dns
    - security
    - http
