document: rfc-9647
kind: normative-requirement
summary: For HMAC-based MAC algorithms, the key value length MUST be between 0 and an upper limit at least the size of the output length (32 octets for HMAC-SHA256). For BLAKE2s-128, the length MUST be between 0 and 32 bytes inclusive.
section: "2.3"
rfc2119_level: MUST
topics:
