document: rfc-6425
kind: wire-format
summary: 'The P2MP Responder Identifier TLV (Type 11, variable length) contains zero or more sub-TLVs: Sub-Type 1 (IPv4 Egress Address, 4 bytes), Sub-Type 2 (IPv6 Egress Address, 16 bytes), Sub-Type 3 (IPv4 Node Address, 4 bytes), Sub-Type 4 (IPv6 Node Address, 16 bytes). If more than one sub-TLV is present, only the first MUST be processed.'
section: "3.2"
topics:
