document: rfc-5023
kind: protocol-element
summary: A Service Document (media type application/atomsvc+xml) groups available Collections into Workspaces and is used by clients to discover Collection IRIs, accepted media types, and available categories before authoring begins. The document's root element is app:service under the namespace http://www.w3.org/2007/app.
