document: rfc-2203
kind: protocol-element
summary: 'Appendix A defines numeric values for all GSS-API major status codes, since RFC 2078 (GSS-API v2) did not assign them. Key values: GSS_S_COMPLETE=0x00000000, GSS_S_CONTINUE_NEEDED=0x00000001. The 32-bit status code is partitioned into Calling Error (bits 31-24), Routine Error (bits 23-16), and Supplementary Info (bits 15-0) fields.'
section: Appendix A
