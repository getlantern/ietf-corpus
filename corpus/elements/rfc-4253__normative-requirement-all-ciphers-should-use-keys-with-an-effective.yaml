document: rfc-4253
kind: normative-requirement
summary: All ciphers SHOULD use keys with an effective key length of 128 bits or more. The ciphers in each direction MUST run independently. Initially, the MAC algorithm MUST be 'none'.
section: "6.3"
rfc2119_level: SHOULD
