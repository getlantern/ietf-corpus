document: rfc-9677
kind: interoperability-note
summary: When a dCDN has been delegated to by a uCDN, the dCDN presents the 'delegated_credential' (rather than its own certificate) during the TLS handshake per RFC 8446 to the User Agent, and must also possess the corresponding private key so the User Agent can verify the CertificateVerify message signature.
section: "4"
topics:
    - tls
    - security
