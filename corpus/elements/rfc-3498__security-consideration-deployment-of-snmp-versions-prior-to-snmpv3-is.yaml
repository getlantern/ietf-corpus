document: rfc-3498
kind: security-consideration
summary: Deployment of SNMP versions prior to SNMPv3 is not recommended. Implementers should use SNMPv3 with full cryptographic mechanisms (authentication and privacy). SNMPv3 access controls should restrict GET/SET rights to only those principals with legitimate authority, since older SNMP versions lack per-principal access control even on otherwise secure networks.
section: "9"
topics:
    - snmp
    - security
