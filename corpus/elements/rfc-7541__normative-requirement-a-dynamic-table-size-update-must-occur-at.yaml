document: rfc-7541
kind: normative-requirement
summary: A dynamic table size update MUST occur at the beginning of the first header block following a change to the maximum dynamic table size. When multiple size changes occur between header blocks, the smallest intermediate size MUST be signaled, followed by the final size (at most two updates).
section: "4.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
