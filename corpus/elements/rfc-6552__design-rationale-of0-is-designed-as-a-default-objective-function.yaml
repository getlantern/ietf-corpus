document: rfc-6552
kind: design-rationale
summary: OF0 is designed as a default Objective Function to enable interoperation between RPL implementations across a wide spectrum of use cases. Because RPL has no built-in default OF and no metric container, two implementations without a common OF cannot interoperate; OF0 fills that gap without requiring protocol extensions.
section: "1"
topics:
    - routing
