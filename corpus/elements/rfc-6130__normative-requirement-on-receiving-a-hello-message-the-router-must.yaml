document: rfc-6130
kind: normative-requirement
summary: On receiving a HELLO message, the router MUST check for invalidity conditions defined in Section 12.1 and discard invalid messages. For valid messages, the router MUST update its Interface and Neighbor Information Bases in the exact order specified in Sections 12.3–12.6.
section: "12"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
