document: rfc-6270
kind: security-consideration
summary: '''tn3270'' URIs do not add any new security issues beyond those of the Telnet session itself; security considerations are the same as those for the ''telnet'' URI scheme specified in RFC 4248. Generic URI security considerations from RFC 3986 Section 7 also apply.'
