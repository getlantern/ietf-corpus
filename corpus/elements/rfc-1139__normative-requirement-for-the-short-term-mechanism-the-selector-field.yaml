document: rfc-1139
kind: normative-requirement
summary: For the short term mechanism, the selector field of the destination NSAP address in an echo-request PDU must contain the echo-request selector value, and the selector field of the source NSAP address must contain the echo-reply selector value.
section: "3.1"
rfc2119_level: MUST
topics:
