document: rfc-9051
kind: protocol-element
summary: 'System flags are predefined tokens beginning with ''\'': \Seen, \Answered, \Flagged, \Deleted, \Draft. The \Recent flag is deprecated in IMAP4rev2. Specification-defined keywords include $Forwarded, $MDNSent, $Junk, $NotJunk, and $Phishing; $Junk and $NotJunk are mutually exclusive and clients MUST treat both being set as if neither is set.'
section: 2.3.2
topics:
    - email
