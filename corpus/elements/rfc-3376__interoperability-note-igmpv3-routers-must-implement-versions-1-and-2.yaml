document: rfc-3376
kind: interoperability-note
summary: IGMPv3 routers MUST implement versions 1 and 2 of IGMP and maintain a Group Compatibility Mode variable (IGMPv1/v2/v3) per group record, based on received Membership Report versions and the Older Version Host Present timer. When in IGMPv1 mode, routers MUST ignore Leave Group messages and send queries with Max Resp Code=0.
section: 7.3.2
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
