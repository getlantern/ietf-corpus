document: rfc-6597
kind: normative-requirement
summary: When a lost RTP packet is detected, the receiver MUST consider the first KLVunit received after the lost packet as damaged, including all packets up to and including the next one with the M-bit set to '1'.
section: 4.3.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
