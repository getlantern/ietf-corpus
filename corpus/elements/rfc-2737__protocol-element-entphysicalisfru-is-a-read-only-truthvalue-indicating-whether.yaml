document: rfc-2737
kind: protocol-element
summary: entPhysicalIsFRU is a read-only TruthValue indicating whether a physical entity is a field-replaceable unit. Components permanently contained within an FRU should return false(2); agents are not required to provide serial number or asset ID write access for non-FRU entities.
