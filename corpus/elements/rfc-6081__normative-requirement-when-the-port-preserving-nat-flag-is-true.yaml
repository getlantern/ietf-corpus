document: rfc-6081
kind: normative-requirement
summary: When the Port-Preserving NAT flag is TRUE and the Symmetric NAT flag is set, and the peer is not trusted and the Random Port is zero, the client MUST select a random port and begin listening on it. If the Random Port is non-zero, the client MUST append a Random Port Trailer to indirect bubbles.
section: 5.4.4.2
rfc2119_level: MUST
topics:
    - nat
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
