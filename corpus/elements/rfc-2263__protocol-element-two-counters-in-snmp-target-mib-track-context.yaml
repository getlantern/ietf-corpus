document: rfc-2263
kind: protocol-element
summary: 'Two counters in SNMP-TARGET-MIB track context errors: snmpUnavailableContexts counts packets dropped because the context in the received message was unavailable, and snmpUnknownContexts counts packets dropped because the context was unknown. These are mandatory objects for command responder compliance.'
