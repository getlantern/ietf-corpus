document: rfc-4044
kind: security-consideration
summary: 'Several MIB objects have read-write access and could affect FC network behavior if accessed by unauthorized parties: fcmInstanceTextName, fcmInstanceDescr, fcmPortAdminType, fcmPortAdminSpeed, fcmSwitchDomainId, and fcmISPortClassFCredit. Implementations should apply SNMP access controls to restrict write access to authorized managers.'
section: "10"
topics:
