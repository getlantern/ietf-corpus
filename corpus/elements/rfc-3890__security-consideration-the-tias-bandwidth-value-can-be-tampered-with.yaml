document: rfc-3890
kind: security-consideration
summary: The TIAS bandwidth value can be tampered with if not integrity protected. An attacker could cause a receiver to reserve too much bandwidth (wasting resources) or too little (degrading quality), or to reject a session by claiming excessive resource requirements. It is strongly RECOMMENDED that SDP be integrity protected and source authenticated, and that receivers sanity-check received bandwidth values.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
