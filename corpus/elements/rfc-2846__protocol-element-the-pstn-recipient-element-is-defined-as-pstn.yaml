summary: 'The pstn-recipient element is defined as: pstn-recipient = [ recipient-name ] [ 1*( recipient-qualifier ) ]. It optionally supplements the pstn-mbox with originator and/or recipient name and physical address details, particularly for onramp/offramp gateways.'
