document: rfc-7541
kind: security-consideration
summary: 'An attacker may attempt to exhaust decoder memory. HPACK bounds both peak and steady-state memory: the dynamic table size is limited by the protocol (SETTINGS_HEADER_TABLE_SIZE in HTTP/2), and sequential processing of header fields limits transient memory use.'
section: "7.3"
