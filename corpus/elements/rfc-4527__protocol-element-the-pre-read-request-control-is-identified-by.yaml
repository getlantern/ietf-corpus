document: rfc-4527
kind: protocol-element
summary: The Pre-Read request control is identified by OID 1.3.6.1.1.13.1. Its controlValue is a BER-encoded AttributeSelection and it is appropriate for modifyRequest, delRequest, and modDNRequest messages. The corresponding response control returns a BER-encoded SearchResultEntry.
