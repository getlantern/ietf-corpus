document: rfc-2622
kind: protocol-element
summary: 'The default attribute specifies a fallback routing policy: ''default: to <peering> [action <action>] [networks <filter>]''. A router uses the default only if it has received routes matched by the optional filter from the specified peer. Multiple defaults with different pref actions enable ordered preference among candidates.'
section: "6.5"
topics:
    - routing
    - bgp
