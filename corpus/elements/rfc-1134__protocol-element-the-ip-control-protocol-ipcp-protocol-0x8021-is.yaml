document: rfc-1134
kind: protocol-element
summary: The IP Control Protocol (IPCP, Protocol=0x8021) is an NCP that configures, enables, and disables IP on both ends of the link. IPCP uses the same packet format as LCP but only Codes 1-7 are valid; IP datagrams may not be sent until both LCP and IPCP reach the Open state.
section: "5"
