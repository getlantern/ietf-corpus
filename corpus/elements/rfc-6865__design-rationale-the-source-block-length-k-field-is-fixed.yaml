document: rfc-6865
kind: design-rationale
summary: The Source Block Length (k) field is fixed at 16 bits in both Source and Repair Payload IDs regardless of m, providing a single common format for all m values. While 16 bits exceeds what is needed for m <= 8, it is necessary when 8 < m <= 16.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
