document: rfc-5667
kind: design-rationale
summary: The NFSv4 COMPOUND maximum size is unbounded even with RDMA chunks, making a configuration protocol exchange unworkable due to layering issues in how COMPOUNDs are built; however, typical NFSv4 clients behave predictably and support traditional rsize/wsize parameters.
section: "5"
