document: rfc-5986
kind: security-consideration
summary: 'The primary attack against LIS discovery is impersonation of a LIS. Three attack stages are identified: (1) falsifying the domain name input to U-NAPTR, (2) altering DNS records used in U-NAPTR resolution, and (3) impersonating the LIS itself.'
