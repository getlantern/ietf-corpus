document: rfc-7712
kind: protocol-element
summary: 'POSH prooftype for XMPP: the server''s proof is a PKIX certificate checked per RFC 6120 and RFC 6125; the client''s verification material is a hash of the certificate retrieved over HTTPS at a well-known URI (RFC 5785). Secure DNS is not required because the HTTPS retrieval relies on the PKI chain of trust.'
section: "5.2"
topics:
