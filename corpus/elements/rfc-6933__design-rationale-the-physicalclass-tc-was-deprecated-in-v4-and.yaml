document: rfc-6933
kind: design-rationale
summary: The PhysicalClass TC was deprecated in v4 and its content moved to IANA-ENTITY-MIB as IANAPhysicalClass so that new hardware class enumerations (e.g., future entity types) can be added by IANA assignment without requiring a new RFC to revise the ENTITY-MIB module.
section: 2.16.1
topics:
