document: rfc-3984
kind: normative-requirement
summary: MANEs MUST NOT duplicate any NAL unit except sequence or picture parameter set NAL units. Any allowed parameter set duplication MUST NOT affect the contents of any active parameter set and SHOULD be performed at the application layer rather than by duplicating RTP packets with identical sequence numbers.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
