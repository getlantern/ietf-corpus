document: rfc-8537
kind: normative-requirement
summary: If the indicated forward bypass tunnel or the associated reverse bypass tunnel is not found, the upstream PLR SHOULD send a Notify message with Error Code 'FRR Bypass Assignment Error' (value 44) and Sub-code 'Bypass Tunnel Not Found' (value 1) to the downstream PLR.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
