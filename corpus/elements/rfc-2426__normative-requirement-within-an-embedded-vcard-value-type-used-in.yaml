document: rfc-2426
kind: normative-requirement
summary: Within an embedded vcard value type (used in AGENT), type declarations MUST be terminated with the backslash escape sequence \n or \N instead of CRLF, and COMMA, SEMI-COLON, and COLON characters MUST be backslash-escaped.
section: 2.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
