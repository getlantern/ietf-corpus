document: rfc-933
kind: interoperability-note
summary: After output marking is established, User-Telnet must remap all cursor-addressing operations from the application so that they target only the usable (non-banner) portion of the screen; failure to do so would cause application output to overwrite the security banner.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
