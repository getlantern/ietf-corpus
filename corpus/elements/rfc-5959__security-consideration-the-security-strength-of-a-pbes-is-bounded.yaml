document: rfc-5959
kind: security-consideration
summary: The security strength of a PBES is bounded by the password's entropy. A 20-character user-chosen password from a 94-character keyboard provides only ~36 bits of entropy; a randomly chosen 20-character password provides ~131 bits. NIST SP800-63 provides further guidance on password entropy.
section: "6"
topics:
