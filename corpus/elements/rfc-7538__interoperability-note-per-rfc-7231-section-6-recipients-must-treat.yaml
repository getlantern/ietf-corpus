document: rfc-7538
kind: interoperability-note
summary: Per RFC 7231 Section 6, recipients MUST treat unknown 3xx status codes the same as 300 (Multiple Choices). Servers cannot rely on automatic redirection behavior for clients that do not recognize 308; use of 308 should be restricted to clients known to support it or where a fallback to 300 semantics is acceptable.
section: "4"
topics:
