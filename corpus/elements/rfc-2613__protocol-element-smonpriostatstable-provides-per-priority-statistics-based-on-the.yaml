document: rfc-2613
kind: protocol-element
summary: smonPrioStatsTable provides per-priority statistics based on the 3-bit user_priority field in the IEEE 802.1Q Tag Control Information field. The table has at most eight rows per statistical set (smonPrioStatsId 0..7) and carries Counter32/Counter64 pairs for packets and octets.
section: "3.3"
topics:
