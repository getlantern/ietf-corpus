document: rfc-6553
kind: normative-requirement
summary: When the router is the source of the original packet and the destination is known to be within the same RPL Instance, it SHOULD include the RPL Option directly within the original packet. Otherwise, routers MUST use IPv6-in-IPv6 tunneling and place the RPL Option in the tunnel header.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
