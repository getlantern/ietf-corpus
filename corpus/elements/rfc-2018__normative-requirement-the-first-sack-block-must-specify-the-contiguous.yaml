document: rfc-2018
kind: normative-requirement
summary: The first SACK block MUST specify the contiguous block of data containing the segment which triggered the ACK, unless that segment advanced the Acknowledgment Number field. This ensures the SACK option reflects the most recent change to the receiver's buffer queue.
section: "4"
rfc2119_level: MUST
topics:
    - tcp
