document: rfc-7521
kind: security-consideration
summary: 'Unauthorized disclosure threat: assertions may carry authentication information, role, or other personal attributes. Countermeasures include TLS confidentiality for wire exchanges, optional assertion encryption for sensitive payloads, and obtaining prior consent for release of attributes from the resource owner.'
section: "8.3"
topics:
