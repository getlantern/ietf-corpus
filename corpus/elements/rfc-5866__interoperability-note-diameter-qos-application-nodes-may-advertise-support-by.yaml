document: rfc-5866
kind: interoperability-note
summary: Diameter QoS application nodes MAY advertise support by including Application-Id 9 in the Auth-Application-Id or Acct-Application-Id of CER/CEA; the value 0 (relay) SHOULD be used for base protocol commands STR/STA, ASR/ASA, and RAR/RAA within QoS sessions.
