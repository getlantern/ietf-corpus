document: rfc-5052
kind: protocol-element
summary: The FEC Instance ID is an integer value that identifies a specific instance of an Under-Specified FEC scheme. It is scoped by the FEC Encoding ID, is not used for Fully-Specified FEC schemes, and its values are subject to IANA registration. The FEC Instance ID ranges from 0 to 65535.
section: "6.1"
topics:
    - registry
    - multicast
