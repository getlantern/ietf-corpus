document: rfc-5796
kind: normative-requirement
summary: The IPsec implementation MUST support multiple SPDs with an SPD selection function that selects a specific SPD based on interface. It MUST be able to use source address, destination address, protocol, and direction as selectors, and MUST tag inbound packets with the interface ID on which they arrived.
section: "6"
rfc2119_level: MUST
topics:
    - ipsec
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
