document: rfc-7746
kind: normative-requirement
summary: If the RSVP messages establishing the LSP were delivered over IPv4, the LSP Self-ping UDP datagram MUST be encapsulated in an IPv4 header; if over IPv6, it MUST be encapsulated in an IPv6 header.
section: "3"
rfc2119_level: MUST
topics:
