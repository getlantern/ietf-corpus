document: rfc-8706
kind: interoperability-note
summary: RFC 5306 permitted omitting the Restarting Neighbor System ID from the Restart TLV when RA is set, allowing legacy implementations on LANs to have their RA accepted. RFC 8706 makes this an implementation choice; omission is only ambiguous when multiple systems on a LAN restart simultaneously.
section: "3.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
