document: rfc-5730
kind: normative-requirement
summary: An EPP server MUST respond to client-initiated communication (connection or <hello>) by returning a <greeting>. The server MUST promptly respond to each EPP command with a coordinated response describing the results of processing.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
