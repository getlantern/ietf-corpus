document: rfc-5305
kind: normative-requirement
summary: Implementations MUST NOT inject a /32 prefix for the IPv4 interface address (Sub-TLV 6) or neighbor address (Sub-TLV 8) into their routing or forwarding table, as this can cause forwarding loops with systems not supporting these sub-TLVs.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
