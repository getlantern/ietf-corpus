document: rfc-7471
kind: wire-format
summary: The Unidirectional Residual Bandwidth sub-TLV (type 31, length 4) carries a 32-bit IEEE 754 single-precision floating-point value representing residual bandwidth in bytes per second. Residual bandwidth is defined as Maximum Bandwidth minus bandwidth currently allocated to RSVP-TE LSPs.
