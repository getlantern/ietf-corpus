document: rfc-9967
kind: design-rationale
summary: The 'sub' JWT claim was prohibited for SCIM events to prevent confusion with JWT authorization tokens, a risk noted in RFC 8417 Section 3. Using a structured 'sub_id' with format='scim' avoids ambiguity and provides richer identification including SCIM-specific attributes.
section: "2.1"
topics:
    - security
    - json
