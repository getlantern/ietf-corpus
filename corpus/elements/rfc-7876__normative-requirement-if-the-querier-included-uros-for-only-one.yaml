document: rfc-7876
kind: normative-requirement
summary: If the querier included UROs for only one IP address family and no return path of that family is available, the Query MUST be discarded and the operator SHOULD be informed via the management system using a rate-limited approach.
section: "4.3"
rfc2119_level: MUST
