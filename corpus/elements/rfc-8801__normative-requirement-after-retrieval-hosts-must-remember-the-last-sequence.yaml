document: rfc-8801
kind: normative-requirement
summary: After retrieval, hosts MUST remember the last Sequence Number in RAs for that PvD ID. When a new RA arrives with a different Sequence Number, or when the expiry date is reached, hosts MUST deprecate the Additional Information and stop using it.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
