document: rfc-8765
kind: wire-format
summary: The UNSUBSCRIBE message has DSO-LENGTH = 2 and DSO-DATA containing the 2-octet MESSAGE ID of the SUBSCRIBE request being canceled. MESSAGE ID in the header MUST be zero (unidirectional message).
