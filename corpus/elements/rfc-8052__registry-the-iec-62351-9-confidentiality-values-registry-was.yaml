summary: 'The ''IEC 62351-9 Confidentiality Values'' registry was created to define Enc Alg values: NONE (1), AES-CBC-128 (2, N), AES-CBC-256 (3, N), AES-GCM-128 (4, Y), AES-GCM-256 (5, Y), where Y/N indicates whether authenticated encryption is provided. Future assignments are by Expert Review.'
