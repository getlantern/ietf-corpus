document: rfc-7318
kind: design-rationale
summary: RFC 6487 neither explicitly allowed nor disallowed PolicyQualifierInfo objects, creating ambiguity. Some RPKI Certificate Authorities have an operational need to include policy qualifiers (specifically CPS URIs) in their certificates, motivating this clarifying update.
section: "2"
topics:
