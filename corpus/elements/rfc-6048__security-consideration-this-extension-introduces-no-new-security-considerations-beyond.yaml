document: rfc-6048
kind: security-consideration
summary: This extension introduces no new security considerations beyond those in RFC 3977 and RFC 5537. Implementors should be aware of distribution leakage (exposing internal routing information) and e-mail denial-of-service risks during the moderation process described in RFC 5537.
section: "6"
topics:
    - security
