document: rfc-9133
kind: normative-requirement
summary: If the DOTS server finds the ACL name and the request passes RFC 9132 Section 4.4.1 validation, the DOTS server MUST proceed with the 'activation-type' update and MUST also update the lifetime of the corresponding ACL as it would for a data channel refresh (RFC 8783 Section 7.2).
section: 3.2.1
rfc2119_level: MUST
topics:
    - security
