document: rfc-1483
kind: wire-format
summary: 'LLC Encapsulation for routed ISO PDUs: Payload begins with 3-octet LLC header 0xFE-FE-03 (DSAP=0xFE, SSAP=0xFE, Control=0x03 Unnumbered Information), followed directly by the ISO PDU whose first octet is the NLPID identifying the specific ISO protocol.'
section: "4.1"
