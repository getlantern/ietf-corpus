document: rfc-3246
kind: design-rationale
summary: RFC 3246 replaces RFC 2598 primarily by adding mathematical formalism to give a more rigorous definition. The original EF definition lacked equations that could be used to bound the delay of an individual EF packet; the new equations address this deficiency. Full rationale is in RFC 3247.
