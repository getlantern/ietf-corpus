document: rfc-5044
kind: protocol-element
summary: Private Data is a 0–512 octet field carried in MPA Request and Reply Frames, conveying ULP-specific connection parameters (such as Protection Domain identity, RDMA Read capacity, or client authentication data) before a DDP endpoint is bound. Private Data enables immediate-startup RDMA connections without prior TCP streaming-mode negotiation.
section: 7.1.4
topics:
    - tcp
