document: rfc-4004
kind: normative-requirement
summary: Mobility agents MUST issue a Session-Termination-Request (STR) if the Authorization Lifetime has expired and no subsequent MIP registration request has been received. The AAAH SHOULD only deallocate all resources after receiving the STR from the home agent, not from a foreign agent.
section: 4.1.3
rfc2119_level: MUST
topics:
    - diameter
    - mobility
