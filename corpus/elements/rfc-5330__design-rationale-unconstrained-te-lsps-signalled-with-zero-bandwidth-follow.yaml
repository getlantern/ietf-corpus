document: rfc-5330
kind: design-rationale
summary: Unconstrained TE LSPs (signalled with zero bandwidth) follow IGP shortest paths and are used for fast-reroute protection meshes; in symmetric ECMP networks, path cost and hop count cannot serve as tie-breakers, motivating advertisement of LSP counts to enable load balancing algorithms.
