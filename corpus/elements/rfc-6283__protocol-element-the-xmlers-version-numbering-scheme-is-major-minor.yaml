document: rfc-6283
kind: protocol-element
summary: The XMLERS version numbering scheme is '<major>.<minor>' where both numbers are treated as separate integers. Leading zeros MUST be ignored by recipients and MUST NOT be sent. The major version increments only for format changes that break backward compatibility; the minor version increments for significant new optional capabilities.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
