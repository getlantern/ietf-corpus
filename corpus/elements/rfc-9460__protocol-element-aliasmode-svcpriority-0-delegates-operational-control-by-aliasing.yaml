document: rfc-9460
kind: protocol-element
summary: AliasMode (SvcPriority=0) delegates operational control by aliasing a service to TargetName, enabling CNAME-like functionality at zone apices where CNAME is prohibited. Recipients MUST ignore any SvcParams present in AliasMode records.
section: 2.4.2
topics:
    - dns
