document: rfc-3396
kind: interoperability-note
summary: Because many currently-deployed DHCP protocol agents do not implement option concatenation, agents should not transmit split options unless the recipient is known to support reassembly or it does not matter if the recipient fails to do so correctly.
section: "4"
