document: rfc-8226
kind: design-rationale
summary: Certificate freshness for STIR may be handled either by short-lived certificates (front-end burden on enrollment) or by online status protocols like OCSP (back-end burden on verification); no single mechanism is mandated, as implementation experience is needed to determine the optimal approach.
