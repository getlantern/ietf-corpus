document: rfc-8074
kind: design-rationale
summary: Forwarding a defended DAD message is explicitly prohibited because it may cause other SAVI devices on the perimeter to send additional defense NAs, and the rate of defense NAs should be limited to reduce DoS exposure from a malicious host flooding DAD messages.
section: 6.1.2.2
topics:
    - security
    - ip
