document: rfc-3755
kind: design-rationale
summary: 'Changing all three type codes (SIG, KEY, NXT) rather than a subset was chosen because it is the cleanest and safest approach: the behavior of resolvers receiving unknown type codes is well understood, it avoids potential new incompatibilities from partial changes, and it leaves legacy resolvers completely blinded to DNSSEC rather than confusingly partially aware.'
