document: rfc-8895
kind: protocol-element
summary: 'An ALTO update message uses the SSE ''event'' field to carry two comma-separated subfields: ''media-type'' and ''data-id''. The SSE ''id'' field is not used. The comma separator is unambiguous because RFC 6838 prohibits commas in media-type names.'
section: "5.1"
topics:
