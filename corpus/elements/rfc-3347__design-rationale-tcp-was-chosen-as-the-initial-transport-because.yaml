document: rfc-3347
kind: design-rationale
summary: TCP was chosen as the initial transport because it is widely deployed, well-understood, and has proven congestion avoidance behavior. Using TCP minimizes new invention, enables rapid adoption, and provides the greatest compatibility with Internet architecture.
