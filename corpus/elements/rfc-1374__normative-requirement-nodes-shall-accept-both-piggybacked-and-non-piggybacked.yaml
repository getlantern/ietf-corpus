document: rfc-1374
kind: normative-requirement
summary: Nodes shall accept both piggybacked and non-piggybacked forms of HIPPI-LE address resolution messages; each recipient of an ARP request or reply may use information in the packet to augment its address mapping tables even if it is neither the target nor the requester.
section: Address Resolution/ARP Procedure
rfc2119_level: MUST
topics:
    - ip
