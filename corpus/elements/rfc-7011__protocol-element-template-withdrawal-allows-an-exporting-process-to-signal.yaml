document: rfc-7011
kind: protocol-element
summary: Template Withdrawal allows an Exporting Process to signal that a Template ID is no longer in use by sending a Template Record with Field Count = 0 for that Template ID. After receiving a withdrawal, a Collecting Process MUST stop using the Template to interpret subsequently exported Data Sets. Template Withdrawal does not apply to UDP transport.
section: "8.1"
topics:
    - measurement
