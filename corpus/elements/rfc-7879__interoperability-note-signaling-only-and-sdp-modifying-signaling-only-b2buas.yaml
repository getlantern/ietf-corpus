document: rfc-7879
kind: interoperability-note
summary: Signaling-only and SDP-modifying signaling-only B2BUAs (RFC 7092 Sections 3.1.2 and 3.1.3) commonly alter fields such as the Contact URI that are covered by the identity signature, and are likely to violate the rules for end-to-end DTLS-SRTP unless they carefully constrain their modifications to fields permitted by RFC 4474 or SIP-ID.
section: "4.2"
topics:
    - sip
    - tls
    - security
