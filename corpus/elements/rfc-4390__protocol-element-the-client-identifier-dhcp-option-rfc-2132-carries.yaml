document: rfc-4390
kind: protocol-element
summary: The 'client-identifier' DHCP option (RFC 2132) carries a type-identifier pair. Over IPoIB, this option replaces 'chaddr' as the unique client identifier; when a hardware address is used, the type field should be an ARP hardware type from the IANA registry.
