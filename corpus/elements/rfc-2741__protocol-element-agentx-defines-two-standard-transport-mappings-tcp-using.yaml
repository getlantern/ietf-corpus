summary: 'AgentX defines two standard transport mappings: TCP using well-known port 705, and UNIX-domain sockets using the well-known path /var/agentx/master. Both provide reliable ordered byte-stream delivery; UNIX-domain sockets are preferred when master and subagents are co-located.'
