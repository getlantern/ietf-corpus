document: rfc-2997
kind: design-rationale
summary: The Null Service is particularly applicable to networks combining diffserv QoS mechanisms with RSVP signaling. In this environment, QoS policy agents (PEPs/PDPs) can direct signaled application traffic to a particular diffserv class of service, solving the classification and provisioning challenges of pure diffserv networks.
