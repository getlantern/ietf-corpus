document: rfc-927
kind: interoperability-note
summary: Although the TUID option is intended primarily for TAC-to-host connections under TACACS, it can be used between any two cooperating hosts for double login avoidance, such as between hosts at the same site (e.g., all BBN hosts TELNETing to one another).
