document: rfc-8375
kind: protocol-element
summary: The HNCP default domain is updated from '.home' to 'home.arpa.' for network-wide zone qualification. An administrator MAY configure a different domain via the Domain-Name TLV; if multiple TLVs are announced, the domain of the node with the greatest node identifier takes precedence.
