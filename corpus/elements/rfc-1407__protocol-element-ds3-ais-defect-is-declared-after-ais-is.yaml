document: rfc-1407
kind: protocol-element
summary: DS3 AIS defect is declared after AIS is present in contiguous M-frames for time T (0.2 ms ≤ T ≤ 100 ms) and terminated after AIS is absent for the same duration T. E3 AIS is a continuous stream of ones; AIS detection and consequent actions must complete within 1 ms.
