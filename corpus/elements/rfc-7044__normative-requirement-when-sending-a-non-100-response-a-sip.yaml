document: rfc-7044
kind: normative-requirement
summary: When sending a non-100 response, a SIP entity MUST include all cached hi-entries in the response, subject to privacy constraints. If the received request contained no hi-entries and no 'histinfo' in Supported, the entity MUST NOT include History-Info in the response.
section: "9.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
