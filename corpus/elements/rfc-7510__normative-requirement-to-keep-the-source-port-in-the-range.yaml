document: rfc-7510
kind: normative-requirement
summary: To keep the source port in the range 49152–65535, the encapsulator SHOULD calculate a 14-bit hash and set the two most significant bits to binary 11, placing the result in the least-significant 14 bits of the source port field.
section: "3"
rfc2119_level: SHOULD
