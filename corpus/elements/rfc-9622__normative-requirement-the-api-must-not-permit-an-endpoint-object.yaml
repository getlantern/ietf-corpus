document: rfc-9622
kind: normative-requirement
summary: The API MUST NOT permit an Endpoint object to be configured with multiple Endpoint Identifiers of the same type (e.g., two IP addresses). Two IP addresses are represented as two separate Endpoint objects.
section: "6.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
