document: rfc-4362
kind: interoperability-note
summary: The LLA profile is not applicable when the UDP checksum is enabled; this is always the case for IPv6/UDP. For IPv4/UDP, the sender may choose to disable the UDP checksum to use the LLA profile.
section: "3.4"
topics:
    - rtp
    - udp
