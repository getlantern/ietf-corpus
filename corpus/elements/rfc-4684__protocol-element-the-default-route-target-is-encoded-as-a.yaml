document: rfc-4684
kind: protocol-element
summary: The default route target is encoded as a zero-length prefix and signals willingness to receive all VPN route advertisements—for instance, a route reflector advertising to its PE router clients. Non-default route targets may be expressed as prefixes to encompass all RTs assigned by a given Global Administrator.
