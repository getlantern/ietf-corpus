document: rfc-2261
kind: protocol-element
summary: The Dispatcher is a single component within an SNMP engine that enables concurrent support of multiple SNMP message versions. It sends and receives SNMP messages from the network, determines the SNMP version of each message, interacts with the corresponding Message Processing Model, and provides abstract interfaces for SNMP applications to send and receive PDUs.
section: 3.1.1.2
topics:
