document: rfc-9530
kind: design-rationale
summary: Integrity preference fields (Want-Content-Digest, Want-Repr-Digest) are defined as hints rather than binding requirements. The receiver may reply with any algorithm or omit the field entirely; this avoids making algorithm negotiation a hard protocol dependency and lets application policy layer additional constraints on top.
section: "4"
topics:
