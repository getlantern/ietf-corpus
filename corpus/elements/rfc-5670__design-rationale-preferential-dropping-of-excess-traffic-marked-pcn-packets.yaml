document: rfc-5670
kind: design-rationale
summary: Preferential dropping of excess-traffic-marked PCN-packets is a SHOULD rather than a MUST because other dropping behaviours may be preferable in specific circumstances (e.g., preferential dropping of unmarked packets with the 'marked flow' termination edge behaviour, or tail-dropping for implementation simplicity).
section: B.4
topics:
