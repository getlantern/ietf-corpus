document: rfc-9287
kind: interoperability-note
summary: When an extension uses the QUIC Bit alongside grease_quic_bit, recipients must distinguish a randomized value from one carrying extension-defined semantics. The extension should require endpoints to set the bit per its rules but defer acting on the information until the extension's own transport parameter is received.
section: "3.2"
topics:
    - quic
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
