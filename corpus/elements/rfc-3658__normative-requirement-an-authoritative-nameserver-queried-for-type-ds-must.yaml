document: rfc-3658
kind: normative-requirement
summary: An authoritative nameserver queried for type DS MUST return the DS RRset in the answer section. When authoritative for the parent zone at a delegation point, it MUST answer based on parent zone data regardless of also being authoritative for the child zone.
section: 2.2.1
rfc2119_level: MUST
topics:
    - dns
