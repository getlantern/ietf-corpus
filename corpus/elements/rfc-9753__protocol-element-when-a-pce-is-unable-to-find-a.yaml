document: rfc-9753
kind: protocol-element
summary: When a PCE is unable to find a path meeting all constraints for objects that cannot be ignored (P flag set), the PCUpd message MAY optionally include the PCEP objects that caused path computation failure along with an empty ERO to communicate the failure details.
