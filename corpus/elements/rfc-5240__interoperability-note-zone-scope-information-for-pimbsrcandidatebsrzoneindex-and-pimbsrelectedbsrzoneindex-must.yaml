document: rfc-5240
kind: interoperability-note
summary: Zone-scope information for pimBsrCandidateBSRZoneIndex and pimBsrElectedBSRZoneIndex must be correlated with the ipMcastZoneTable defined in the IP Multicast MIB (RFC 5132). The value zero is reserved as a default-zone request and is not a valid index value in this MIB.
