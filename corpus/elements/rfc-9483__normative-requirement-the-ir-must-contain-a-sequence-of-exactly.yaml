document: rfc-9483
kind: normative-requirement
summary: The ir MUST contain a sequence of exactly one CertReqMsg. The certReqId MUST be 0. The certTemplate MUST contain the subject field and/or subjectAltName, and MUST include the publicKey when local key generation is used.
section: 4.1.1
rfc2119_level: MUST
