document: rfc-7455
kind: normative-requirement
summary: On edge interfaces, MEPs MUST be configured to prevent leaking TRILL OAM packets out of the TRILL campus as native frames. The TRILL Encapsulation/Decapsulation layer is responsible for this containment.
