document: rfc-5750
kind: normative-requirement
summary: When verifying a signature, if a signingCertificate attribute (RFC 2634) or signingCertificateV2 attribute (RFC 5035) is found in an S/MIME message, it SHALL be used to identify the signer's certificate. Otherwise, identification uses issuerAndSerialNumber or subjectKeyIdentifier.
section: "4.2"
rfc2119_level: REQUIRED
topics:
    - pkix
    - email
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
