document: rfc-5049
kind: normative-requirement
summary: When SIP messages are retransmitted, they MUST be re-compressed taking into account any SigComp states created or invalidated since the previous transmission. Implementations MUST NOT cache and retransmit a previously compressed result.
section: "8"
rfc2119_level: MUST NOT
topics:
