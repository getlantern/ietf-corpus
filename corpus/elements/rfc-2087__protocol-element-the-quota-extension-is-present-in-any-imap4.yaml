document: rfc-2087
kind: protocol-element
summary: The QUOTA extension is present in any IMAP4 implementation which returns 'QUOTA' as one of the supported capabilities to the CAPABILITY command. Servers may support limits on any number of named resources, each with an atom name and an integer-valued interpretation.
