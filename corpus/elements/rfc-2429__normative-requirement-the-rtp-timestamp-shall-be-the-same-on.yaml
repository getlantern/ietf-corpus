document: rfc-2429
kind: normative-requirement
summary: The RTP timestamp shall be the same on successive packets if a video frame spans more than one packet. In a multilayer scenario, all pictures corresponding to the same temporal reference should use the same timestamp. The RTP timestamp is based on a 90 kHz clock.
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
