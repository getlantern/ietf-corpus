document: rfc-7964
kind: protocol-element
summary: A 'Group Best Path' is the most preferred path within a group of routes sharing the same neighbor-AS. The MED is only comparable among routes with the same neighbor-AS, so route selection conceptually groups paths by neighbor-AS first, selects the Group Best Path per group, then selects the overall best path among those.
section: "4"
topics:
