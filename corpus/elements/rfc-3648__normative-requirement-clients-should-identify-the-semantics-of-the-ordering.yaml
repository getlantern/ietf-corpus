document: rfc-3648
kind: normative-requirement
summary: Clients SHOULD identify the semantics of the ordering with a URI in the Ordering-Type header when creating an ordered collection, although they MAY use DAV:custom. Clients SHOULD NOT access the resource at the ordering-type URI to avoid overburdening its server.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - http
