document: rfc-4861
kind: wire-format
summary: 'All ND options use a TLV format: Type (8-bit), Length (8-bit, in units of 8 octets including Type and Length fields; value 0 is invalid), followed by variable data. Options are padded to 64-bit boundaries. Five option types are defined: Source Link-Layer Address (1), Target Link-Layer Address (2), Prefix Information (3), Redirected Header (4), MTU (5).'
section: "4.6"
