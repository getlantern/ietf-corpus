document: rfc-6122
kind: normative-requirement
summary: A resourcepart MUST be formatted such that the Resourceprep profile of stringprep can be applied without failing. Before comparing two resourceparts, an application MUST first ensure Resourceprep has been applied to each identifier.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
