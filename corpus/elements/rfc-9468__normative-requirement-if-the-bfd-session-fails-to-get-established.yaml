document: rfc-9468
kind: normative-requirement
summary: If the BFD session fails to get established within a time at least equal to the local failure detection time, or if an established session goes down, the passive side MUST stop sending BFD Control packets and SHOULD delete the BFD session until the active side initiates again.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
