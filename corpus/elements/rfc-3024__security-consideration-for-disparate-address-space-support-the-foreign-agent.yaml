document: rfc-3024
kind: security-consideration
summary: For disparate address space support, the foreign agent uses link-layer information to select the correct reverse tunnel for a mobile node. Because unauthenticated link-layers (e.g., shared Ethernet) allow a malicious mobile node to misuse another's tunnel, the link-layer MUST securely authenticate traffic; unauthenticated technologies are not recommended for disparate address support.
section: "6.3"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
