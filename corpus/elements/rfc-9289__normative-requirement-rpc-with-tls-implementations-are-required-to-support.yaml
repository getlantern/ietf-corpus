document: rfc-9289
kind: normative-requirement
summary: RPC-with-TLS implementations are REQUIRED to support PKIX certificate-based mutual authentication per RFC 5280. DNS-ID identifier type support is REQUIRED in both clients and servers; DNS domain names in certificates MUST NOT contain the wildcard character '*'.
section: 5.2.1
rfc2119_level: REQUIRED
topics:
    - tls
    - pkix
    - security
