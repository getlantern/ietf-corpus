document: rfc-7647
kind: normative-requirement
summary: An element accepting a REFER request MUST NOT reply with a 202 response code and MUST treat any 202 responses received as identical to a 200 response. Wherever RFC 3515 requires sending a 202, a 200 MUST be sent instead.
section: "5"
rfc2119_level: MUST NOT
topics:
    - sip
