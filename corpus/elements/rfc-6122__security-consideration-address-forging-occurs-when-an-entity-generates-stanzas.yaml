document: rfc-6122
kind: security-consideration
summary: Address forging occurs when an entity generates stanzas whose 'from' address does not correspond to authenticated credentials. It is difficult but possible if a poorly implemented server ignores 'from' stamping or a malicious server generates stanzas for any registered account. End-to-end signing of XMPP stanzas could mitigate this risk.
section: 4.3.1
topics:
    - security
