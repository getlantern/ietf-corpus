document: rfc-9608
kind: design-rationale
summary: The noRevAvail extension was originally defined by ITU-T for attribute certificates (X.509-2000) and already profiled by RFC 3281; a recent Technical Corrigendum (X.509-2019-TC2) extended its applicability to public key certificates, motivating this RFC.
