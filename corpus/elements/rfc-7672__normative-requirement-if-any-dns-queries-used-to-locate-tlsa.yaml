document: rfc-7672
kind: normative-requirement
summary: If any DNS queries used to locate TLSA records fail (bogus, indeterminate, timeouts, malformed replies, SERVFAIL, etc.), the SMTP client MUST treat that server as unreachable and MUST NOT deliver the message via that server. If no servers are reachable, delivery is delayed.
section: 2.1.2
rfc2119_level: MUST NOT
topics:
    - dns
    - email
    - security
    - tls
