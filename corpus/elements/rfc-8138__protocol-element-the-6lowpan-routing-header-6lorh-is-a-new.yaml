document: rfc-8138
kind: protocol-element
summary: 'The 6LoWPAN Routing Header (6LoRH) is a new dispatch type operating in 6LoWPAN Page 1 (Dispatch byte 11110001) using bit pattern 10xxxxxx. It is expressed as a Type-Length-Value (TLV) field in two forms: Elective (101xxxxx, may be skipped if not understood) and Critical (100xxxxx, must not be ignored), each with a separate IANA Type registry.'
section: "3.1"
topics:
    - ip
    - routing
