document: rfc-2741
kind: protocol-element
summary: The session ID is assigned by the master agent in the agentx-Response-PDU to an Open request; the subagent-supplied value is ignored. All subsequent PDUs on the session carry the assigned session ID. In master agents supporting multiple transports, session IDs should be globally unique.
section: "6.1"
topics:
    - snmp
