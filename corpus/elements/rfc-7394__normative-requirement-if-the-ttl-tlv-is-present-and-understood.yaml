document: rfc-7394
kind: normative-requirement
summary: If the TTL TLV is present and understood, and the Value field is non-zero, the receiver MUST use the TTL value from the TTL TLV when creating the MPLS header of the MPLS Echo Reply. This value takes precedence over any TTL determined by other means, including the Switching Point TLV.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
