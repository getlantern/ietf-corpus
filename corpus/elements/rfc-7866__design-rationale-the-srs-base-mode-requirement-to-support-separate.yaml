document: rfc-7866
kind: design-rationale
summary: The SRS base-mode requirement to support separate m-lines (one per CS media direction) was chosen to enable minimum interoperability without mandating full mixing support. It also allows SRS implementations targeting specific use cases (e.g., security cameras, one-way audio) without having to support all modalities.
section: "8.4"
