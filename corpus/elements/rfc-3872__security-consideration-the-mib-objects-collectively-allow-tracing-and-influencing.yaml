document: rfc-3872
kind: security-consideration
summary: The MIB objects collectively allow tracing and influencing TRIP connections and reveal connection characteristics. Improper manipulation of read-write objects MAY result in denial of service by disrupting a large number of available routes. Implementations should use SNMPv3 with authentication and privacy to restrict access.
section: "7"
topics:
    - security
    - snmp
    - voip
