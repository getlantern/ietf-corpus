document: rfc-9777
kind: security-consideration
summary: Bogus State-Change Report messages can cause multicast routers to maintain unnecessary multicast forwarding state, wasting memory and bandwidth. Current-State Report messages can be spoofed to prevent routers from timing out stale state. Link-layer security or SEND is needed to fully address these threats.
section: "10.3"
topics:
    - multicast
    - security
