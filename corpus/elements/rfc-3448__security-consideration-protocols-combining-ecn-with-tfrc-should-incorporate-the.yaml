document: rfc-3448
kind: security-consideration
summary: Protocols combining ECN with TFRC should incorporate the ECN nonce mechanism to prevent a receiver from concealing marked packets (accidentaly or maliciously), which would otherwise cause the sender to underestimate congestion. ECN nonce details are outside the scope of this document.
