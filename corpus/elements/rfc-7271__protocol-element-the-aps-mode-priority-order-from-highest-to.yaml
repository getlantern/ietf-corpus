document: rfc-7271
kind: protocol-element
summary: 'The APS mode priority order from highest to lowest is: Operator Clear (local only), Lockout of protection, Clear Signal Fail or Degrade (local only), SF-P, Forced Switch, SF-W, Signal Degrade, Manual Switch, WTR Timer Expiry (local only), WTR (remote only), Exercise, Reverse Request (remote only), Do-Not-Revert (remote only), No Request. Remote requests rank just below the identical local request except for NR and equal-priority cases.'
section: "10.2"
topics:
