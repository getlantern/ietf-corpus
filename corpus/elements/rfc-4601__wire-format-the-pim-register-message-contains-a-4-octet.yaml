document: rfc-4601
kind: wire-format
summary: The PIM Register message contains a 4-octet common PIM header followed by a 32-bit flags word with Border bit (B, bit 0) and Null-Register bit (N, bit 1) and 30 reserved bits, followed by the encapsulated IP multicast data packet. The B bit indicates the encapsulating DR is a PIM multicast border router.
section: 4.9.3
topics:
