document: rfc-4261
kind: normative-requirement
summary: If a subjectAltName extension of type dNSName or iPAddress is present in the PDP's certificate, it MUST be used as the PDP identity. If both types are present, dNSName SHOULD be used. If neither is present, the most specific Common Name SHOULD be used.
section: "7"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
