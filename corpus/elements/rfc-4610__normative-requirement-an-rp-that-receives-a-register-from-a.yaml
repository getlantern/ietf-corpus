document: rfc-4610
kind: normative-requirement
summary: An RP that receives a Register from a DR MUST create (S,G) state. It MAY join back to the source-tree by triggering an (S,G) Join toward the source, but state creation is mandatory regardless.
section: "3"
rfc2119_level: MUST
topics:
    - multicast
    - routing
