document: rfc-1596
kind: normative-requirement
summary: frPVCConnectRowStatus MUST be initially set to createAndWait. While in this state the agent validates that the In parameters of one PVC endpoint equal the Out parameters of the other endpoint. The object MUST NOT be set to active unless frPVCConnectAdminStatus and frPVCConnectGenericPointer exist in the row.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
