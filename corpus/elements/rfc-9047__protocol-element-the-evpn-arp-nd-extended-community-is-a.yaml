document: rfc-9047
kind: protocol-element
summary: The EVPN ARP/ND Extended Community is a transitive BGP Extended Community (Type 0x06, Sub-Type 0x08) advertised alongside EVPN MAC/IP Advertisement routes carrying IPv4 or IPv6 addresses. It carries a Flags octet (third octet) with R, O, and I flag bits, with the remaining octets reserved and set to zero.
