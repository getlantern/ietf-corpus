summary: IANA registered the SCRAM-* family of SASL mechanisms, SCRAM-SHA-1, and SCRAM-SHA-1-PLUS in the SASL Mechanism registry. New SCRAM-SASL mechanisms MUST be explicitly registered via IETF Review. A GSS-API OID for SCRAM-SHA-1 (1.3.6.1.5.5.14) was also assigned.
