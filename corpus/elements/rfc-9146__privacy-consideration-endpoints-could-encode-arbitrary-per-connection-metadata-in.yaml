document: rfc-9146
kind: privacy-consideration
summary: Endpoints could encode arbitrary per-connection metadata in CID values, potentially leaking information to on-path observers. Implementations concerned about this SHOULD refuse to use CIDs.
section: "8"
rfc2119_level: SHOULD
topics:
