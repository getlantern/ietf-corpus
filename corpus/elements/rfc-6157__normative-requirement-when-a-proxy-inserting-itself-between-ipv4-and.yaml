document: rfc-6157
kind: normative-requirement
summary: 'When a proxy inserting itself between IPv4 and IPv6 networks uses an IP address (rather than an FQDN) in the Record-Route header, it MUST insert two Record-Route headers: one with its address compatible with the downstream server''s network type and one with its address compatible with the upstream client''s network type.'
section: 3.1.1
rfc2119_level: MUST
topics:
    - sip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
