document: rfc-5035
kind: normative-requirement
summary: The first certificate identified in the certs sequence of SigningCertificateV2 MUST be the certificate used to verify the signature. The encoding of ESSCertIDv2 for this certificate SHOULD include the issuerSerial field.
section: "3"
rfc2119_level: MUST
topics:
