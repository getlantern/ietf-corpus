document: rfc-4433
kind: design-rationale
summary: The HA selection mechanism is intentionally left outside the scope of the specification. The document only defines the messaging (Registration Request/Reply extensions and error codes); the network can use any criteria such as load balancing, geographical proximity, DHCP option 68, AAA, or DNS to select the optimal HA.
section: "1"
topics:
