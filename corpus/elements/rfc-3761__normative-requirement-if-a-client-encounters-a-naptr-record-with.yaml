document: rfc-3761
kind: normative-requirement
summary: If a client encounters a NAPTR record with an unknown flag, it MUST ignore it and move to the next Rule. This test takes precedence over any ordering since flags can control the interpretation placed on fields.
section: 2.4.1
rfc2119_level: MUST
