summary: The IANAifType textual convention is defined as a separate MIB module (OID mib-2 30) managed by IANA. It defines the enumerated integer values for ifType (54 initial values, other(1) through propMultiplexor(54)) and will be periodically re-issued by IANA to add new interface type values.
