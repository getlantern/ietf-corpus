document: rfc-2018
kind: interoperability-note
summary: Older TCP implementations without SACK support will not be unfairly disadvantaged when competing against SACK-capable TCPs. SACK's worst-case unnecessary retransmission exposure is strictly less than that of current non-SACK TCP.
