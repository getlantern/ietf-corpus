document: rfc-5357
kind: normative-requirement
summary: The shared secret passphrase MUST be encoded using Appendix B of RFC 5198 (ASCII Network Virtual Terminal Definition). It MUST NOT contain newlines (CR and/or LF characters), and control characters SHOULD be avoided.
section: "3.1"
rfc2119_level: MUST
