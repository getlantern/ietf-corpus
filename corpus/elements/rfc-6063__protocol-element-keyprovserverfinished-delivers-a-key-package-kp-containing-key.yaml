document: rfc-6063
kind: protocol-element
summary: KeyProvServerFinished delivers a Key Package (KP) containing key usage attributes but never K_TOKEN itself, along with a key confirmation MAC = DSKPP-PRF(K_MAC, 'MAC 1 computation' || SHA-256(msg_1,...,msg_n), dsLen). A Status='Success' acts as a Commit instruction to the cryptographic module.
