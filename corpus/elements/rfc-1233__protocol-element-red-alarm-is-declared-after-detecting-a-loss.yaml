document: rfc-1233
kind: protocol-element
summary: Red Alarm is declared after detecting a Loss of Signal, a persistent OOF event, or an AIS for at least 2-10 seconds; it is cleared at the onset of 10 consecutive seconds with no SES. Yellow Alarm is declared after detecting the Yellow Signal per ANSI T1.107-1989.
section: "4.3"
topics:
