document: rfc-8299
kind: protocol-element
summary: Cloud access is configured via the `cloud-accesses` container under a VPN service. Each `cloud-access` entry references a provider-defined cloud identifier, supports NAT44 address translation, and uses `permit-any`, `deny-any-except` (with `permit-site` list), or `permit-any-except` (with `deny-site` list) authorization flavors.
section: 6.2.2
topics:
