document: rfc-6384
kind: interoperability-note
summary: The behavior of an ALG is undefined when a client issues both PASV and PORT before a transfer command. Implementations SHOULD NOT try to detect this situation but rather translate commands as they occur sequentially.
section: "9"
topics:
