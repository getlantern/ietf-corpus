document: rfc-2184
kind: protocol-element
summary: 'The encoded-word format from RFC 2047 is extended to carry language information by suffixing the charset with an asterisk and a language tag: `=?charset*language?encoding?encoded-text?=`. For example: `=?US-ASCII*EN?Q?Keith_Moore?=`.'
