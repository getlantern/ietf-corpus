summary: ifMauTypeList and the integer-encoded auto-negotiation capability objects (ifMauAutoNegCapability, ifMauAutoNegCapAdvertised, ifMauAutoNegCapReceived) were deprecated in favor of BITS-typed replacements to support capability sets larger than 32 bits and to allow future extensibility without integer encoding arithmetic.
