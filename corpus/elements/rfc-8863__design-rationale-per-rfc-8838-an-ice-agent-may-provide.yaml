document: rfc-8863
kind: design-rationale
summary: Per RFC 8838, an ICE agent may provide zero candidates if it knows the remote endpoint is directly reachable. Under strict RFC 8445 procedures this causes immediate ICE failure because the peer's checklist is empty; the PAC timer prevents this premature failure.
section: "3.1"
topics:
    - webrtc
    - realtime
