document: rfc-4141
kind: design-rationale
summary: Content-Convert header fields alone serve only as advisory guidance to intermediaries; they do not block delivery on conversion failure. Coupling Content-Convert with CONPERM raises the originator's preference to a requirement enforced by the mail transfer service.
section: "3"
topics:
