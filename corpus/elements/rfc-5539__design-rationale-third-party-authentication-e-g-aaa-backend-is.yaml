document: rfc-5539
kind: design-rationale
summary: Third-party authentication (e.g., AAA backend) is not supported because TLS does not specify that authentication model and NETCONF depends on its transport protocol for authentication services. BEEP or SSH transports should be used when AAA is needed.
section: "4"
topics:
    - netconf
    - tls
    - security
