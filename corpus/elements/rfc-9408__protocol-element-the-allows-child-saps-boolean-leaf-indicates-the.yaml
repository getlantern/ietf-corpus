document: rfc-9408
kind: protocol-element
summary: The 'allows-child-saps' boolean leaf indicates the attachment interface can host per-service sub-interfaces. When true, a service orchestrator knows it can instantiate sub-interfaces (child SAPs) rather than attaching directly to the parent SAP; whether a service can also attach directly to the parent SAP is service-dependent.
section: "5"
topics:
