document: rfc-9577
kind: design-rationale
summary: When an Origin sends multiple token challenges, it should sort its preferred challenge first as a hint to Clients, since Clients are free to pick any. Challenges SHOULD only mix token types with functionally equivalent properties, as mixing non-equivalent challenges for the same use case is semantically inconsistent.
section: 2.1.2.1
topics:
    - http
    - privacy
