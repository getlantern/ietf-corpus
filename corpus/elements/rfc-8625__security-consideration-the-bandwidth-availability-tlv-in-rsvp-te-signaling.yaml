document: rfc-8625
kind: security-consideration
summary: The Bandwidth Availability TLV in RSVP-TE signaling inherits GMPLS security mechanisms from RFC 3945 and RFC 5920, including RSVP-TE authentication and control-plane protection. GMPLS networks are often considered closed, limiting exposure to packet insertion, modification, or inspection by outside parties.
section: "4"
topics:
    - security
    - routing
    - mpls
