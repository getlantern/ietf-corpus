document: rfc-9260
kind: protocol-element
summary: The SACK chunk (Type=3) acknowledges DATA chunks via a Cumulative TSN Ack, an Advertised Receiver Window Credit (a_rwnd), and zero or more Gap Ack Blocks identifying out-of-order TSNs received after a gap. Gap Ack Blocks SHOULD be isolated so that the TSN just before and after each block has not been received.
section: 3.3.4
topics:
    - sctp
    - congestion
