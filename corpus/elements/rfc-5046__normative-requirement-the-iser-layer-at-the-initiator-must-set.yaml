document: rfc-5046
kind: normative-requirement
summary: The iSER layer at the initiator MUST set IRD (Inbound RDMA Read Queue Depth) to 1 or higher if R2Ts are to be used on the connection. The iSER-IRD value SHOULD be set to the IRD value and MUST NOT exceed the IRD value.
section: 5.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
