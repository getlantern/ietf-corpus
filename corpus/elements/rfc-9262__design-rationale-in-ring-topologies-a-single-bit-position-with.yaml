document: rfc-9262
kind: design-rationale
summary: In ring topologies, a single bit position with DNC set on forward_connected() adjacencies pointing clockwise allows a packet to traverse the entire ring without consuming one bit per link. Two ring BPs (one per direction) suffice for a full bidirectional ring, with DNC cleared at a designated 'stop' link to prevent endless circulation.
section: 5.1.6
topics:
    - routing
