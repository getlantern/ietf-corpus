document: rfc-9394
kind: interoperability-note
summary: When SAVE and PARTIAL are combined with COUNT, the PARTIAL and COUNT options are returned and the "$" marker always contains references to all messages found by the SEARCH or UID SEARCH command, not just the PARTIAL subset.
