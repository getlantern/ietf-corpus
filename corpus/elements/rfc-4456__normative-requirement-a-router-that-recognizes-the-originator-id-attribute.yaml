document: rfc-4456
kind: normative-requirement
summary: A router that recognizes the ORIGINATOR_ID attribute SHOULD ignore a route received with its own BGP Identifier as the ORIGINATOR_ID, preventing routing loops caused by a reflected route returning to its originator.
section: "8"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
