document: rfc-3344
kind: normative-requirement
summary: Exactly one authorization-enabling extension MUST be present in all Registration Requests and in all Registration Replies generated by the Home Agent. The Mobile-Home Authentication Extension is always authorization-enabling for registration messages in this document.
section: 3.5.2
rfc2119_level: MUST
topics:
