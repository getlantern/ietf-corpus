document: rfc-4343
kind: wire-format
summary: In Master Files and human-readable ASCII contexts, octets outside the inclusive range 0x21 to 0x7E (plus 0x2E, the period) must be escaped using a backslash followed by exactly three decimal digits representing the octet value. A backslash followed by only one or two decimal digits is undefined.
section: "2.1"
topics:
    - dns
