document: rfc-3355
kind: design-rationale
summary: An implementation MAY use more than one AAL5 connection between LAC and LNS to provide differentiated QoS to different client connections. QoS mechanisms involving inverse multiplexing across multiple VCs (e.g., Differentiated UBR) are deferred for further study.
