document: rfc-6361
kind: normative-requirement
summary: TRILL MTU-probe and MTU-ack messages are not needed on PPP links. Implementations MUST NOT send MTU-probe messages and SHOULD NOT reply to them. The MTU computed by LCP SHOULD be used instead.
section: "3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
