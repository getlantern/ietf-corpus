document: rfc-9447
kind: protocol-element
summary: The 'atc' tkauth-type specifies a standard JWT (RFC 7519) signed with JWS (RFC 7515). It may be used for any number of different ACME Identifier Types. A non-JWT Authority Token format requires a different tkauth-type.
