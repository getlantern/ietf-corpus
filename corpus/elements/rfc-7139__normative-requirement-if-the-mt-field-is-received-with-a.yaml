document: rfc-7139
kind: normative-requirement
summary: If the MT field is received with a zero value, the node MUST generate a PathErr with 'Traffic Control Error/Bad Tspec value'. If Signal Type is not ODU1/ODU2/ODU3 and NVC is not 0, the node MUST similarly generate a PathErr.
