document: rfc-5329
kind: normative-requirement
summary: A link-local address MUST NOT be specified for the Router IPv6 Address TLV. The TLV MUST appear in exactly one Traffic Engineering LSA originated by an OSPFv3 router supporting TE extensions.
section: "3"
rfc2119_level: MUST NOT
