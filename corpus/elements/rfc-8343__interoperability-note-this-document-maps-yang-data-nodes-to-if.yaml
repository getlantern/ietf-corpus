document: rfc-8343
kind: interoperability-note
summary: 'This document maps YANG data nodes to IF-MIB objects: ''name''→ifName, ''type''→ifType, ''description''→ifAlias, ''admin-status''→ifAdminStatus, ''oper-status''→ifOperStatus, ''if-index''→ifIndex, ''phys-address''→ifPhysAddress, ''higher-layer-if''/''lower-layer-if''→ifStackTable, ''speed''→ifSpeed/ifHighSpeed, and all statistics counters to their HC (64-bit) IF-MIB counterparts.'
