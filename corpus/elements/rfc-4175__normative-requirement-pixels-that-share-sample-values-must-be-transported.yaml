document: rfc-4175
kind: normative-requirement
summary: Pixels that share sample values MUST be transported together as a pixel group. If 10-bit or 12-bit samples are used, several pixels MUST be combined into an octet-aligned pixel group for transmission.
section: "3"
rfc2119_level: MUST
topics:
