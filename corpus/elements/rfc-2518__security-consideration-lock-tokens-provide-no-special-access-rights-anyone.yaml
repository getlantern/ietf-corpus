document: rfc-2518
kind: security-consideration
summary: Lock tokens provide no special access rights — anyone can discover another's lock token via lock discovery. Locks MUST be enforced based on the server's authentication mechanism, not on token secrecy. Servers should require authentication before allowing any write operation.
section: "17.1"
topics:
    - http
    - security
