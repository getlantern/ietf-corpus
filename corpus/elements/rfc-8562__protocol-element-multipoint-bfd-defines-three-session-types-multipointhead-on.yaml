document: rfc-8562
kind: protocol-element
summary: 'Multipoint BFD defines three session types: MultipointHead (on the sender, transmits BFD Control packets over a multipoint path, never receives), MultipointTail (on each receiver, receives BFD Control packets from the head), and PointToPoint (classic BFD per RFC 5880). These types are encoded in the bfd.SessionType state variable.'
section: "5.2"
topics:
    - routing
    - multicast
