document: rfc-6265
kind: wire-format
summary: 'The Cookie request header is encoded as: `cookie-string = cookie-pair *( ";" SP cookie-pair )`, containing only name=value pairs with no attributes. The user agent MUST NOT attach more than one Cookie header field to an HTTP request.'
section: 4.2.1
topics:
