document: rfc-8016
kind: normative-requirement
summary: A server MUST retain the old MOBILITY-TICKET for at least 30 seconds after issuing a new one, so it can recognize retransmissions of the Refresh request from the client using the old ticket.
section: 3.2.2
rfc2119_level: MUST
