document: rfc-7756
kind: design-rationale
summary: The 'on a stick' network-based ER variant connects both IPv4 and IPv6 interfaces to the same network segment so that dual-stack nodes retain native IPv6 connectivity while still benefiting from IPv4 translation. Native IPv6 traffic bypasses the ER entirely; only IPv4 traffic is routed through it.
section: 3.2.1
topics:
