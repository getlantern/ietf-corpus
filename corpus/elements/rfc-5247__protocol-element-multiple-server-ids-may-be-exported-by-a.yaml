document: rfc-5247
kind: protocol-element
summary: Multiple Server-Ids may be exported by a single EAP method (e.g., from inner and outer tunnel exchanges). Because authenticators can fail over between EAP servers dynamically, the EAP peer may communicate with a different EAP server on reconnection, which can cause fast reconnect failures if the new server lacks access to the prior session's TLS Master Key.
section: "2.5"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
