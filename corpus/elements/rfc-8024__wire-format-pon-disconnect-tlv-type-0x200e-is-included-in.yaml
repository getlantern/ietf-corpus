document: rfc-8024
kind: wire-format
summary: PON Disconnect TLV (Type=0x200E) is included in the RG Disconnect message to signal termination of the PON application connection. It carries only optional Sub-TLVs beyond the standard TLV header; U and F bits are both 0.
