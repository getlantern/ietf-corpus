summary: The BIB-HMAC-SHA2 Integrity Scope Flags parameter (Parm Id 3) is a CBOR unsigned integer processed as a 16-bit field (max 65535). Bit 0 = include primary block, Bit 1 = include target header, Bit 2 = include security header. Default value is 7 (all assigned bits set).
