document: rfc-1755
kind: design-rationale
summary: Best Effort capability is identified as the most convenient model for IP over ATM because IP itself is a best-effort service with no throughput guarantees. When Best Effort is unavailable, requesting a fraction (e.g., 1/10th) of link bandwidth is RECOMMENDED rather than full link rate, to reduce the probability of call rejection.
section: "7.1"
topics:
