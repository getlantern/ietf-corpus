summary: 'The severity typedef enumerates five ordered levels: indeterminate (2), warning (3), minor (4), major (5), and critical (6), drawn from ITU-T X.733. Clearance is a separate boolean ''is-cleared'' flag; ''cleared'' is not a severity value.'
