document: rfc-5538
kind: wire-format
summary: The 'nntp' URI has the form 'nntp:' server '/' group ['/' article-number], where server is '//' authority, group is 1*(group-char / pct-encoded), article-number is 1*16DIGIT, and group-char is ALPHA / DIGIT / '-' / '+' / '_' / '.'.
