document: rfc-6310
kind: normative-requirement
summary: For ATM PW in AC receive defect state with coupled OAM loops mode, PE1 MUST send FDI to PE2 and MUST commence ATM RDI cell insertion towards CE1. With single emulated OAM loop mode, PE1 MUST transparently relay or insert ATM AIS cells over the PW towards CE2; if the defect interferes with NS OAM, PE1 MUST send FDI to PE2.
section: 7.3.4
rfc2119_level: MUST
topics:
    - mpls
