summary: 'IANA assigned two new PCEP TLV type values in the ''PCEP TLV Type Indicators'' subregistry: Type 46 for DISJOINTNESS-CONFIGURATION TLV and Type 47 for DISJOINTNESS-STATUS TLV. IANA also created a new ''DISJOINTNESS-CONFIGURATION TLV Flag Field'' subregistry with Standards Action policy, defining bits 27-31 for T, P, S, N, L flags respectively.'
