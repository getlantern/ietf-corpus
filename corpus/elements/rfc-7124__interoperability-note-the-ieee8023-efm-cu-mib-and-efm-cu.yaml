document: rfc-7124
kind: interoperability-note
summary: The IEEE8023-EFM-CU-MIB and EFM-CU-MIB MIB modules can coexist. Existing deployments of the EFM-CU-MIB need not be upgraded, but operators should expect that new equipment will use the IEEE8023-EFM-CU-MIB.
