document: rfc-2749
kind: protocol-element
summary: Stateless Policy Data carries one or more RSVP policy elements (per RFC 2750) assumed understood by the LPDP. It adds to the PDP decision but cannot override it, and may apply individually to each context flagged in REQ messages with different semantic interpretations per context.
