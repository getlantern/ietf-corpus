document: rfc-3986
kind: design-rationale
summary: The fragment identifier is handled client-side by design, preventing information providers from denying reference authors the right to selectively refer to information within a resource. This also allows new media types to be defined more easily than new URI schemes.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
