kind: protocol-element
summary: The pimSGRptTable and pimSGRptITable expose (S,G,rpt) override state used in PIM-SM when a receiver has joined the RP tree but wants to suppress data from a specific source. These tables track upstream prune state and per-interface join/prune state for the (S,G,rpt) entries.
