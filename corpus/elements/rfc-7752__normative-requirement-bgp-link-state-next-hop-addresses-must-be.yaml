document: rfc-7752
kind: normative-requirement
summary: BGP link-state next-hop addresses MUST be encoded as described in RFC 4760. If next-hop length is 4 it is IPv4; if 16 it is a global IPv6 address; if 32, it is a global IPv6 address followed by a link-local IPv6 address.
section: "3.4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
