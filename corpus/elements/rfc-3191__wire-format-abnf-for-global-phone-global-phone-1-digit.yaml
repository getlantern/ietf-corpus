document: rfc-3191
kind: wire-format
summary: 'ABNF for global-phone: ''global-phone = "+" 1*(DIGIT / written-sep)'' where written-sep is "-" or ".". The leading "+" is strictly reserved for E.164 global-phone syntax and MUST NOT be used by other dialing schemes.'
