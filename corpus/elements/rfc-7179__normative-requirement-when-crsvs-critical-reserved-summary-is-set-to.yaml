document: rfc-7179
kind: normative-requirement
summary: When CRSVS (Critical Reserved Summary) is set to one, RBridges in the reserved class (a future-defined subset of transit RBridges, e.g., multi-level IS-IS border RBridges) MUST drop frames with CRSVS set unless they implement all critical hop-by-hop and all critical reserved extensions present.
section: 2.3.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
