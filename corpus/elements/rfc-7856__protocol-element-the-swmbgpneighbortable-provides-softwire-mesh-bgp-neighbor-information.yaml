document: rfc-7856
kind: protocol-element
summary: The swmBGPNeighborTable provides softwire mesh BGP neighbor information for an AFBR, including the neighbor's address (swmBGPNeighborInetAddress) and the tunnel type selected to communicate with that neighbor (swmBGPNeighborTunnelType). It is indexed by ifIndex, swmBGPNeighborInetAddressType, and swmBGPNeighborInetAddress.
section: "4.3"
