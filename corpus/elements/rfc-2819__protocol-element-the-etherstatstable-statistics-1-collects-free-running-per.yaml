document: rfc-2819
kind: protocol-element
summary: The etherStatsTable (statistics 1) collects free-running per-interface counters including octets, total packets, broadcast/multicast packets, CRC/align errors, undersizePkts (<64 octets), oversizePkts (>1518 octets), fragments, jabbers, collisions, and seven packet-size distribution buckets (64; 65-127; 128-255; 256-511; 512-1023; 1024-1518 octets).
