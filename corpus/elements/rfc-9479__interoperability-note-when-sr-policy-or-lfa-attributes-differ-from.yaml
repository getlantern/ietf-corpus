document: rfc-9479
kind: interoperability-note
summary: When SR Policy or LFA attributes differ from RSVP-TE on a given link, attributes for those applications MUST be advertised using ASLA advertisements with the L-flag clear, even if some attributes are shared with RSVP-TE (requiring duplicate advertisement of shared attributes).
section: 6.3.2
topics:
    - routing
