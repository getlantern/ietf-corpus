document: rfc-7925
kind: design-rationale
summary: 'The PSK ciphersuite (TLS_PSK_WITH_AES_128_CCM_8) does not offer perfect forward secrecy because it does not use a DH exchange. This is an explicit trade-off: the PSK ciphersuite offers excellent performance, very small memory footprint, and lowest on-wire overhead, making it suitable for the most constrained IoT devices.'
