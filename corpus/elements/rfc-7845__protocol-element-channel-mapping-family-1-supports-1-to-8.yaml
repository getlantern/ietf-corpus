document: rfc-7845
kind: protocol-element
summary: Channel Mapping Family 1 supports 1 to 8 channels using Vorbis channel order, defining speaker locations for mono through 7.1 surround. This ordering differs from WAVE and FLAC formats and requires permutation when interfacing with those formats.
section: 5.1.1.2
