document: rfc-2369
kind: wire-format
summary: Each list header field value consists of angle-bracket ('<', '>') enclosed URLs. Multiple alternate URLs MAY be specified as a comma-separated list with preference order left to right. Internal whitespace within brackets MUST NOT be inserted by MTAs but clients SHOULD ignore any such whitespace.
