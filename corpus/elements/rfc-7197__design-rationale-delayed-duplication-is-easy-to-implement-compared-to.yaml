document: rfc-7197
kind: design-rationale
summary: Delayed duplication is easy to implement compared to FEC or redundant encoding because it requires no special encoding or decoding; the sender simply retransmits original packets after a time delay. The delay is chosen to span the expected network reconvergence time (typically tens to hundreds of milliseconds).
section: "1"
topics:
