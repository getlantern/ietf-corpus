document: rfc-8253
kind: normative-requirement
summary: PCEPS implementations MUST, at a minimum, support negotiation of TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256 and SHOULD support TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384. Implementations SHOULD support the NIST P-256 (secp256r1) curve.
section: "3.4"
rfc2119_level: MUST
topics:
