document: rfc-8973
kind: normative-requirement
summary: The DHCPv4 client MUST silently discard multicast and host loopback addresses from OPTION_V4_DOTS_ADDRESS; if more than one OPTION_V4_DOTS_RI is received, only the first instance MUST be used; if OPTION_V4_DOTS_RI contains multiple names (multiple root labels), only the first name MUST be used.
section: 5.2.3
rfc2119_level: MUST
topics:
    - ip
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
