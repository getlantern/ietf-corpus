document: rfc-5426
kind: normative-requirement
summary: Syslog receivers MUST support accepting syslog datagrams on the well-known UDP port 514 but MAY be configurable to listen on a different port. Syslog senders MUST support sending syslog message datagrams to UDP port 514 but MAY be configurable to send to a different port.
section: "3.3"
rfc2119_level: MUST
topics:
    - syslog
    - udp
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
