document: rfc-7911
kind: interoperability-note
summary: The only explicit indication that ADD-PATH extended NLRI encoding is in use is the exchange of Capabilities (Section 4). A packet analyzer lacking prior knowledge of the negotiated capabilities may not be able to correctly decode BGP UPDATE messages on an active ADD-PATH session.
section: "6"
topics:
    - bgp
    - routing
