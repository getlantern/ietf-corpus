document: rfc-4508
kind: security-consideration
summary: Feature tags can provide sensitive information about a user or UA. Once this information is conveyed in a REFER, it may be relayed to third parties. RFC 3840 cautions against providing sensitive information to another party, and this specification extends that concern to the REFER context.
section: "5"
topics:
    - sip
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
