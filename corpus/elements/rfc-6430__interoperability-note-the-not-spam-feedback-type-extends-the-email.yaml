document: rfc-6430
kind: interoperability-note
summary: The "not-spam" feedback type extends the Email Feedback Reports specification defined in RFC 5965. Implementations must conform to the ARF base format defined there, including use of DKIM signing (as suggested in RFC 5965 Section 8.2) for report authenticity.
