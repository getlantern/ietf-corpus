document: rfc-9077
kind: normative-requirement
summary: Zone operators whose signers and DNS servers cannot immediately be updated are encouraged to set their SOA record TTL and SOA MINIMUM field to the same value, so that the TTL used for aggressive NSEC/NSEC3 matches the SOA TTL for negative responses.
section: "4"
topics:
