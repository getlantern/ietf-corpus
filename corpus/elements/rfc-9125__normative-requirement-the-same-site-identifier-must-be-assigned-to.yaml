document: rfc-9125
kind: normative-requirement
summary: The same site identifier MUST be assigned to every gateway to the same site, and each site MUST have a different identifier. This requires coordination, probably through a central management agent, as misconfiguration results in gateways failing to auto-discover each other.
section: "9"
rfc2119_level: MUST
topics:
    - bgp
    - routing
