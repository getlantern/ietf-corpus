document: rfc-3301
kind: protocol-element
summary: 'The Service Category AVP (Attribute Type 42) is a 16-bit mask with one defined bit (S): S=0 indicates non-real-time, S=1 indicates real-time ATM service. It MAY appear in OCRQ and ICRQ to select CBR/rt-VBR vs. UBR/nrt-VBR/ABR/GFR service categories.'
section: "5.2"
topics:
