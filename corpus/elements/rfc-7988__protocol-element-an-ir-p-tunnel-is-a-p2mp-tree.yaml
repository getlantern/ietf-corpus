document: rfc-7988
kind: protocol-element
summary: An IR P-tunnel is a P2MP tree whose nodes are BGP speakers (PE routers, ASBRs, or ABRs). A parent node transmits multicast data to each child by labeling the packet with a P-tunnel label assigned by the child, then unicasting the packet through any P2P or MP2P unicast tunnel to that child — no Layer 2, IP, or MPLS multicast is used.
section: "2"
topics:
