document: rfc-5076
kind: protocol-element
summary: The e164val EPP extension framework provides a mechanism for mapping ENUM validation information within EPP domain object operations. It extends the EPP domain name mapping (RFC 3731) to carry proof that the holder of an ENUM domain name coincides with the Assignee of the corresponding E.164 number or number range.
section: "1"
topics:
