document: rfc-1653
kind: interoperability-note
summary: A minimal client may use this extension only to compare its estimated message size against the server's advertised fixed maximum from the EHLO SIZE parameter, without ever issuing the extended MAIL command. Such a client cannot detect temporary resource limits or per-recipient limits.
section: "6"
topics:
