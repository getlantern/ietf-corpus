document: rfc-3633
kind: interoperability-note
summary: A requesting router uses the same message exchanges as described in RFC 3315 section 18 (Solicit, Advertise, Request, Reply, Renew, Rebind, Release, Reconfigure) to obtain or update prefixes from a delegating router. The IA_PD Prefix option is used analogously to the IA Address option used for assigned addresses.
section: "12"
