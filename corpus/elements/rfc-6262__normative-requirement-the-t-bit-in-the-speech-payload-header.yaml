document: rfc-6262
kind: normative-requirement
summary: The T bit in the speech payload header MUST always be set to 0; the D bit MUST always be set to 1. Receivers MAY discard packets where T is not 0 or D is not 1.
section: "3.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
