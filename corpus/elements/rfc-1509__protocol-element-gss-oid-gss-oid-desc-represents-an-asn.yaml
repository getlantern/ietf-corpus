document: rfc-1509
kind: protocol-element
summary: gss_OID (gss_OID_desc) represents an ASN.1 BER-encoded object identifier, with an OM_uint32 length and a void* elements pointer to the encoded bytes. It is used to select underlying security mechanisms and name types. Applications must treat gss_OID_desc values returned by GSSAPI as read-only and must not attempt to deallocate them.
section: 2.1.4
topics:
    - security
    - crypto
