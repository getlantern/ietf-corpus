document: rfc-6876
kind: normative-requirement
summary: The Message Identifier MUST be a monotonically increasing counter starting at zero per message sender per TLS session. The sender MUST roll over to zero upon reaching the 2^32nd message; recipients MUST handle rollover without generating errors.
section: "3.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
