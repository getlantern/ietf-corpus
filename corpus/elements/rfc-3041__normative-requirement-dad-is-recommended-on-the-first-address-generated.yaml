document: rfc-3041
kind: normative-requirement
summary: DAD is recommended on the first address generated from a given randomized identifier, but should be skipped on all subsequent addresses generated from the same randomized interface identifier, since running DAD on every temporary address provides little benefit.
section: "3.3"
rfc2119_level: RECOMMENDED
topics:
