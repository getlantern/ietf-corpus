document: rfc-2782
kind: security-consideration
summary: Fine-grained port specification in SRV records makes it impossible for routers to block clients from accessing specific external services by well-known port alone, and slightly complicates blocking of unauthorized internal services. DNS and routing operations personnel must cooperate more closely.
section: Security Considerations
topics:
    - dns
    - security
