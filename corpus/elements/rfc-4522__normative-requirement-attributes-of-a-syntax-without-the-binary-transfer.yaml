document: rfc-4522
kind: normative-requirement
summary: 'Attributes of a syntax without the binary transfer requirement SHOULD be returned in the form explicitly requested: binary if the binary option was in the request, non-binary otherwise. A server MAY omit an attribute from the result if it does not support the requested encoding.'
