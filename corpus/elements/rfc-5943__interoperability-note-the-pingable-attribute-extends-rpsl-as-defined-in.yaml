document: rfc-5943
kind: interoperability-note
summary: The pingable attribute extends RPSL as defined in RFC 2622 and RPSLng as defined in RFC 4012; implementations must support both IPv4 address syntax from RFC 2622 and IPv6 address syntax from RFC 4012 to handle pingable attributes in route and route6 objects respectively.
