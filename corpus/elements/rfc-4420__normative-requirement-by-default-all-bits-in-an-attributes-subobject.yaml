document: rfc-4420
kind: normative-requirement
summary: By default, all bits in an Attributes subobject SHOULD be set to zero. If a received Attributes subobject is not long enough to include a specific numbered bit, that bit MUST be treated as present and set to zero. If no RRO subobject is present for a hop, all bits MUST be assumed zero.
section: 7.3.4
rfc2119_level: MUST
topics:
    - mpls
    - realtime
