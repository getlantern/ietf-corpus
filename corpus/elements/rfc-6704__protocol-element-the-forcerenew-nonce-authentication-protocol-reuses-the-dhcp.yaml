document: rfc-6704
kind: protocol-element
summary: The Forcerenew Nonce Authentication protocol reuses the DHCP Authentication option (code 90, RFC 3118) with Protocol set to 3 (Reconfigure Key), Algorithm set to 1 (HMAC-MD5), and RDM set to 0. The Authentication Information field carries either the nonce value or the HMAC-MD5 digest.
section: 3.1.2
topics:
    - crypto
    - security
