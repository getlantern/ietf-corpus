document: rfc-9408
kind: design-rationale
summary: 'Comparing both ''admin-status'' and ''oper-status'' within ''service-status'', alongside ''sap-status'', enables anomaly detection: a service that is administratively up but whose SAP is down should have oper-status down; a mismatch is a trigger to investigate inconsistency between intended and observed state.'
section: "5"
topics:
