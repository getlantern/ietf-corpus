document: rfc-7949
kind: wire-format
summary: OSPFv3 packets are encapsulated directly within IPv4 packets as the payload, omitting the IPv6 header. The IPv4 Protocol field is set to 89, and the OSPFv3 header Version field is set to 3. An optional OSPF LLS extension data block may trail the OSPFv3 body within the same IPv4 packet.
section: "3"
topics:
