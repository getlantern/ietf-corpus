document: rfc-3189
kind: normative-requirement
summary: Receivers SHOULD implement an error concealment strategy to accommodate lost or missing DIF blocks, for example by repeating the corresponding DIF block from the previous image, enabling the sender's optional bandwidth reduction by discarding unchanged blocks.
