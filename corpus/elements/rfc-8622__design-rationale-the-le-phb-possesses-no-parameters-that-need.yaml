document: rfc-8622
kind: design-rationale
summary: The LE PHB possesses no parameters that need to be configured, requires no admission or policing, and needs no traffic meters, droppers, or shapers. Because LE traffic causes no harm to other PHBs, providers can trust LE markings from end systems and need not police or re-mark incoming LE traffic, simplifying deployment.
section: "7"
