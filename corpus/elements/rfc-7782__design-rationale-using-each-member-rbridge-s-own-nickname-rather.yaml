document: rfc-7782
kind: design-rationale
summary: Using each member RBridge's own nickname (rather than a shared pseudo-nickname) as the ingress nickname avoids the MAC flip-flopping problem by requiring remote RBridges to maintain all multiple MAC attachments simultaneously. This approach allows coexistence with other AAE solutions (e.g., RFC 7781) in the same campus.
section: "1"
topics:
    - routing
