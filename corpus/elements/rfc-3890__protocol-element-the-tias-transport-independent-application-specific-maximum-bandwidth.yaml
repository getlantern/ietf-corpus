document: rfc-3890
kind: protocol-element
summary: The TIAS (Transport Independent Application Specific Maximum) bandwidth modifier is defined as 'b=TIAS:<bandwidth-value>' with an integer bit-rate value in bits per second, excluding IP and transport layer overhead. For RTP streams, only the RTP payload (including payload format header and data) is counted, excluding RTP headers, extensions, CSRC list, and lower layers.
section: 6.2.2
topics:
    - realtime
    - rtp
