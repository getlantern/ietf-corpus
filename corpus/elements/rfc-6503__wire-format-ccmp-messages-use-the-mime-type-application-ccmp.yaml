document: rfc-6503
kind: wire-format
summary: CCMP messages use the MIME type 'application/ccmp+xml', which MUST appear in the Content-Type and Accept header fields of HTTP requests and responses. XML documents MUST be encoded in UTF-8 and the 'charset' parameter MUST be included with the XML document.
section: "4.4"
rfc2119_level: MUST
topics:
    - http
    - realtime
