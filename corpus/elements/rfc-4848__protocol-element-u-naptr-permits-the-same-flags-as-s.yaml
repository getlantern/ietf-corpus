document: rfc-4848
kind: protocol-element
summary: U-NAPTR permits the same flags as S-NAPTR ('S', 'A', or empty) plus the 'U' flag. The 'U' flag signals that the REGEXP field contains a URI-producing regular expression and that REPLACEMENT is empty.
section: "2.1"
topics:
    - dns
