document: rfc-6754
kind: normative-requirement
summary: If a downstream router receives ECMP Redirects from multiple upstream routers, it SHOULD use the Preference, Metric, and address fields as tiebreakers (same procedure as PIM Assert) to choose the most preferred RPF interface and neighbor.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
