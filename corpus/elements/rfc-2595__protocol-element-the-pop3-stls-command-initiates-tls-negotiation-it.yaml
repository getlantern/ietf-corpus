document: rfc-2595
kind: protocol-element
summary: The POP3 STLS command initiates TLS negotiation. It is only valid in AUTHORIZATION state; a -ERR response MAY result if a security layer is already active. After STLS, the client SHOULD re-issue the CAPA command.
