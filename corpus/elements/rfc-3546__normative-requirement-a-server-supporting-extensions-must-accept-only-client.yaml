document: rfc-3546
kind: normative-requirement
summary: A server supporting extensions MUST accept only client hello messages in either original or extended ClientHello format, MUST verify the message length matches exactly one of those formats, and MUST send a fatal decode_error alert if not. This overrides the TLS 1.0 forward compatibility note.
section: "2.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
