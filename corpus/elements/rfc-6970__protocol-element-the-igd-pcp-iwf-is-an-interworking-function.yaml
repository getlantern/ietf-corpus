document: rfc-6970
kind: protocol-element
summary: The IGD-PCP IWF is an interworking function embedded in Customer Premises routers that translates between UPnP IGD WANIPConnection messages on the LAN side and PCP MAP requests/responses on the external side. It includes PCP client functionality and maintains a local port mapping table.
