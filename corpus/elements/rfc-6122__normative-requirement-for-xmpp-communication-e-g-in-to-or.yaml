document: rfc-6122
kind: normative-requirement
summary: 'For XMPP communication (e.g., in ''to'' or ''from'' stanza addresses), an entity''s address MUST be represented as a JID, not as a URI or IRI. XMPP IRIs (xmpp: scheme) are only for identification outside XMPP contexts such as web page linking.'
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
