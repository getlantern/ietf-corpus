document: rfc-9554
kind: normative-requirement
summary: When the PHONETIC parameter is used, the ALTID parameter MUST be set with equal values on both the related property and the property bearing PHONETIC. If multiple same-named properties share a PHONETIC and equal ALTID, at most one MAY omit the LANGUAGE parameter; all others MUST have LANGUAGE set with distinct values.
section: "4.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
