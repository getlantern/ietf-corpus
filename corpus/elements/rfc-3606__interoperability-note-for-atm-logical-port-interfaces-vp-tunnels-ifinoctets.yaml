document: rfc-3606
kind: interoperability-note
summary: For ATM Logical Port interfaces (VP tunnels), ifInOctets and ifOutOctets support is not mandatory; ifInErrors and ifInUnknownProtos are always zero because HEC and protocol errors are attributed to the underlying physical ATM cell-layer interface (ifType=37) beneath the tunnel.
section: 3.1.10.2
topics:
