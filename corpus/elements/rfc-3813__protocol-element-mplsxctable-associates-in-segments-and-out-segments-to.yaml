document: rfc-3813
kind: protocol-element
summary: mplsXCTable associates in-segments and out-segments to form cross-connects. It supports point-to-point, point-to-multipoint, and multipoint-to-point connections. LSPs originating at the LSR use a special mplsXCInSegmentIndex of 0x00; LSPs terminating at the LSR use a special mplsXCOutSegmentIndex of 0x00.
section: "5.7"
topics:
