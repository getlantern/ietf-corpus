document: rfc-9677
kind: wire-format
summary: The 'private-key' field uses JSON Web Encryption (JWE) RFC 7516 base64 compact serialization (Section 7.1 of RFC 7516) as its envelope format, with the private key included as JWE Ciphertext. The JWE content-type field MAY signal the media type of the encrypted key.
