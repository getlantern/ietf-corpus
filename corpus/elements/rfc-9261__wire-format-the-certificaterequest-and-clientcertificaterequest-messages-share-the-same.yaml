kind: wire-format
summary: 'The CertificateRequest and ClientCertificateRequest messages share the same structure: a variable-length certificate_request_context (0–255 octets) followed by a variable-length extensions field (2–65535 octets). They are encoded as TLS handshake messages with length and type fields but without TLS record-layer framing or encryption.'
