document: rfc-9470
kind: design-rationale
summary: Clients are advised to retain both old (lower-assurance) and new (higher-assurance) tokens rather than replacing the old token, because the new token may be intentionally narrow (e.g., short validity for one-off high-sensitivity calls) and suboptimal for routine operations.
