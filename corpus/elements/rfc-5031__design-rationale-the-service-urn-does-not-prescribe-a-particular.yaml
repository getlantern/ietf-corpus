document: rfc-5031
kind: design-rationale
summary: The service URN does not prescribe a particular resolution mechanism. A Location-to-Service Translation Protocol (LoST) is expected to be used for mapping service URNs to URLs based on geographic location, but multiple resolution protocols may coexist for different services.
