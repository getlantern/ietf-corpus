document: rfc-7676
kind: design-rationale
summary: The 1280-octet minimum GMTU requirement for IPv6 payload tunnels mirrors IPv6's minimum MTU requirement, ensuring that GRE tunnels do not prevent compliant IPv6 communication. Tunnels unable to meet this without fragmentation must not be activated.
section: "3.2"
topics:
