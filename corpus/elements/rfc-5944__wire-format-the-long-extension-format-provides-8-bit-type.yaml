document: rfc-5944
kind: wire-format
summary: 'The Long Extension Format provides: 8-bit Type, 8-bit Sub-Type, 16-bit Length (bytes of Data only), variable Data. It is used for non-skippable extensions carrying more than 256 bytes; skippable extensions MUST NOT use this format.'
