document: rfc-3986
kind: design-rationale
summary: The generic URI syntax is a superset of all valid URI schemes, enabling a scheme-independent parser to extract components without knowing scheme-specific requirements. This decouples the evolution of identification schemes from the evolution of protocols and implementations.
section: 1.1.1
