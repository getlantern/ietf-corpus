document: rfc-7303
kind: security-consideration
summary: Any information outside direct user control—including CSS stylesheets, XSL transformations, XML-entity declarations, and DTDs—can be an attack vector. A 'whiteout attack' on a shared stylesheet could silently alter the rendering of many documents without modifying them directly. Security of any XML document depends on all documents it recursively references.
section: "10"
topics:
    - security
