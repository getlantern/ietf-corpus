document: rfc-6625
kind: protocol-element
summary: 'For data transmission, a PE matches a (C-S,C-G) flow against originated S-PMSI A-D routes using a priority order: exact (C-S,C-G) match first; then (C-S,C-*) if C-G is SSM; then (C-*,C-G) if C-G is ASM; finally (C-*,C-*). The matched route''s P-tunnel is used for transmission.'
section: "3.1"
topics:
    - multicast
    - routing
