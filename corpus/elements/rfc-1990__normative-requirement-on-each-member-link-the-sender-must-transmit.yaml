document: rfc-1990
kind: normative-requirement
summary: On each member link, the sender MUST transmit fragments with strictly increasing sequence numbers modulo the sequence space. Sequence numbers are not reset per PPP packet; a number is consumed even for single-fragment (B=1, E=1) packets.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
