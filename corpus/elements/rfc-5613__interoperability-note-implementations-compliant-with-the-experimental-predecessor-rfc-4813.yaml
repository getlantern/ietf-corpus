document: rfc-5613
kind: interoperability-note
summary: Implementations compliant with the experimental predecessor RFC 4813 are already deployed; routers not implementing RFC 4813 ignore LLS data at the end of the OSPF packet. The primary behavioral change from RFC 4813 is the addition of OSPFv3 support, mandatory private enterprise codes in private TLVs, and promotion from Experimental to Standards Track.
section: "4"
topics:
    - routing
