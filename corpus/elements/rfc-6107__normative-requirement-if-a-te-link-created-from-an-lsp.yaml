document: rfc-6107
kind: normative-requirement
summary: If a TE link created from an LSP is advertised in the same IGP instance as the traversed TE links, the addresses for the new link and the links it is built from MUST come from the same address space. If advertised into another IGP instance, addresses MAY be drawn from overlapping address spaces.
section: "3.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
