document: rfc-6887
kind: normative-requirement
summary: The PCP client MUST include its own source IP address in the PCP Client's IP Address field of every request. The server MUST return ADDRESS_MISMATCH if that field does not match the source IP of the received datagram, preventing silent creation of non-functional mappings via an undetected intermediate NAT.
section: "8.1"
rfc2119_level: MUST
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
