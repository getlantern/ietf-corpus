document: rfc-6501
kind: normative-requirement
summary: A 'closedAuthenticated' policy MUST have each participant in the <allowed-users-list> and authenticated, and MUST NOT include a <deny-users-list>. An 'openAuthenticated' policy MUST NOT include an <allowed-users-list>. An 'anonymous' policy MUST NOT include either list; if any prohibited list appears, it MUST be ignored.
section: 4.6.2
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
