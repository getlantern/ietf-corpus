document: rfc-7787
kind: normative-requirement
summary: When a Node Endpoint TLV is received over unicast from an unknown peer, the remote node MUST be added as a peer and a Peer TLV MUST be created for it. If a peer sends no keep-alives and no lower-layer presence verification exists, the peer MUST be considered no longer present and SHOULD NOT be re-added until it resumes sending keep-alives.
section: "4.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
