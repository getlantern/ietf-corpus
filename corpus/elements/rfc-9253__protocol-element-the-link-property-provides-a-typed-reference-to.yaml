document: rfc-9253
kind: protocol-element
summary: The LINK property provides a typed reference to external information related to a calendar component. It accepts URI, UID, or XML-REFERENCE values and requires LINKREL and FMTTYPE parameters; it is a serialization of the RFC 8288 web linking model.
section: "8.2"
