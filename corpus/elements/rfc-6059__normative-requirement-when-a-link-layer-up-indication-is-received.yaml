document: rfc-6059
kind: normative-requirement
summary: When a link-layer 'up' indication is received, the host SHOULD immediately send a single Router Solicitation to the all-routers multicast address (FF02::2) using a valid link-local address as the source. Even if the host holds more than one valid IPv6 address, it MUST send only one RS.
section: 5.5.1
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
