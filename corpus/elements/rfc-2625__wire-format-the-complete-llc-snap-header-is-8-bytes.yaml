summary: 'The complete LLC/SNAP Header is 8 bytes: DSAP (1 byte, 0xAA), SSAP (1 byte, 0xAA), CTRL (1 byte, 0x03), OUI (3 bytes, 0x00-00-00 for routed protocols), and PID (2 bytes, 0x08-00 for IP or 0x08-06 for ARP/InARP).'
