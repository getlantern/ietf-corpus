document: rfc-2509
kind: protocol-element
summary: NON_TCP_SPACE is a 2-octet field indicating the maximum context identifier value for non-TCP compression contexts, used in COMPRESSED_NON_TCP, COMPRESSED_UDP, and COMPRESSED_RTP packets. Suggested value is 15; valid range is 0 to 65535.
