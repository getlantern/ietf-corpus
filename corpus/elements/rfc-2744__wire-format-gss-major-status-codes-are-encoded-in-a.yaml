document: rfc-2744
kind: wire-format
summary: 'GSS major status codes are encoded in a 32-bit OM_uint32 value: bits 31–24 hold the calling error field, bits 23–16 hold the routine error field, and bits 15–0 hold the supplementary info field. A non-zero upper 16 bits indicates failure; GSS_S_xxx symbols equate to complete OM_uint32 values (e.g., GSS_S_BAD_NAMETYPE = 3<<16).'
section: 3.9.1
topics:
    - security
