document: rfc-7484
kind: interoperability-note
summary: Entities (contacts, registrants, registrars) can be queried by handle per RFC 7482, but there is no global namespace for entities; therefore, this document does not define a bootstrap method for entity lookups. An entity handle received from a prior RDAP query may be requeried at the same server, or a fully referenced URL may be used directly.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
