document: rfc-3655
kind: interoperability-note
summary: Organizations requiring that all DNS responses contain cryptographically verified data must separate the authoritative name server and signature verification functions, since authoritative servers are not required to validate signatures of data for which they are authoritative.
section: 2.2.1
topics:
    - dns
    - security
