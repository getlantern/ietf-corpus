document: rfc-9463
kind: protocol-element
summary: Service Parameters (SvcParams) are encoded following the wire-format rules of RFC 9460 Section 2.2. The 'alpn' and 'port' SvcParams MUST be supported. The 'dohpath' SvcParam is RECOMMENDED. SvcParams MUST NOT include 'ipv4hint' or 'ipv6hint', as these are superseded by the explicitly included IP addresses.
section: 3.1.5
topics:
    - dns
