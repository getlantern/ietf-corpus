document: rfc-7877
kind: normative-requirement
summary: SPPF clients and servers MUST accept a UTF-8 BOM if present, though emitting a UTF-8 BOM is NOT RECOMMENDED. UTF-8 is the RECOMMENDED character encoding for use with SPPF; the encoding attribute in the XML declaration is OPTIONAL if UTF-8 is used.
section: "8.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
