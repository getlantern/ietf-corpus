document: rfc-7532
kind: interoperability-note
summary: Deleting an FSN removes it only from the federation namespace; the fileset data is not deleted. Junctions targeting the deleted FSN become dangling references, detectable when a fileserver attempts to resolve them against the NSDB.
section: 5.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
