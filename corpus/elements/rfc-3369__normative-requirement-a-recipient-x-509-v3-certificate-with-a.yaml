document: rfc-3369
kind: normative-requirement
summary: A recipient X.509 v3 certificate with a key usage extension used for key transport MUST assert the keyEncipherment bit. For key agreement, the certificate MUST assert the keyAgreement bit.
section: 6.2.1
rfc2119_level: MUST
