summary: The LetterDigits (A) category covers Unicode General_Category values {Ll, Lu, Lo, Nd, Lm, Mn, Mc} — lowercase letters, uppercase letters, other letters, decimal numbers, modifier letters, nonspacing marks, and spacing marks. Code points in this category are the primary candidates for PVALID status.
