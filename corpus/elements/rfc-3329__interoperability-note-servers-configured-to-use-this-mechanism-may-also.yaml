document: rfc-3329
kind: interoperability-note
summary: Servers configured to use this mechanism may also accept requests from clients using TLS per RFC 3263 rules. Clients that do not support this extension and do not support TLS cannot be accepted, breaking interoperability. This extension should therefore only be deployed in environments where every client implements it or supports TLS, or where insecure communication is explicitly unacceptable.
section: "3"
topics:
