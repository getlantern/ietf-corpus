document: rfc-3820
kind: security-consideration
summary: The pCPathLenConstraint field and Key Usage / Extended Key Usage extension bits in the ProxyCertInfo extension allow an EEC to limit subsequent delegation depth and permitted operations. Key usage bits can only be decreased along a PC chain; once removed by a PI they cannot be re-added by a subsequent PC.
section: "6.2"
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
