document: rfc-8265
kind: design-rationale
summary: Width mapping for usernames must be applied before the PRECIS IdentifierClass check because the HasCompat category would otherwise forbid fullwidth and halfwidth code points, even though they should be permitted after mapping to their decomposition equivalents.
