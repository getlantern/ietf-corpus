document: rfc-3008
kind: normative-requirement
summary: The original TTL in a SIG record MUST be greater than or equal to the TTL of the SIG record itself, since intermediate servers cannot increase the TTL. This field may be ignored for SIG(0) records.
section: "2.4"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
