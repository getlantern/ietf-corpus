document: rfc-7987
kind: protocol-element
summary: MaxAge is the architectural constant defining the maximum value for the Remaining Lifetime in an LSP, defined by ISO10589 as 20 minutes (1200 seconds). Implementations may support configurable MaxAge values to allow longer lifetimes, reducing periodic LSP regeneration in stable topologies.
section: "3.1"
topics:
    - routing
