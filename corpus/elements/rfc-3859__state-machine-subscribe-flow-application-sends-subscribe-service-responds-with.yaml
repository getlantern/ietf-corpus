document: rfc-3859
kind: state-machine
summary: 'Subscribe flow: application sends subscribe → service responds with response (success/failure) → on success, service immediately sends notify → for non-zero duration, service sends notify on each presence change until duration expires. Cancellation: application sends subscribe with duration=0 and existing SubscriptID → triggers a final notify (which watcher may discard) → service responds.'
section: "3.1"
topics:
    - realtime
    - sip
