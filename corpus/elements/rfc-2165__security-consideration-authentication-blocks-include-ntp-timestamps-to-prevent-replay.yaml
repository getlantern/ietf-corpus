document: rfc-2165
kind: security-consideration
summary: 'Authentication blocks include NTP timestamps to prevent replay attacks: both registrations and deregistrations must be timestamped so that a captured deregistration cannot later nullify a valid registration, and a captured registration cannot nullify a valid deregistration.'
section: "4.3"
topics:
    - security
    - crypto
