document: rfc-7900
kind: normative-requirement
summary: When I-PMSIs are instantiated by Ingress Replication in an extranet, if a PE assigns an MPLS label in the PTA of an I-PMSI A-D route, that label value MUST NOT appear in the PTA of any other I-PMSI or S-PMSI A-D route originated by the same PE.
section: 5.2.2
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
