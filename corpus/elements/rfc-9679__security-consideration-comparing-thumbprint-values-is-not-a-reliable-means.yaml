document: rfc-9679
kind: security-consideration
summary: 'Comparing thumbprint values is not a reliable means of excluding particular keys: an attacker can supply a transformed key (e.g., RSA modulus 3*N) that produces a different thumbprint but still functions for a fraction of operations.'
