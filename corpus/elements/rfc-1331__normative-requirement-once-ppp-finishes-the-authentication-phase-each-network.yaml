document: rfc-1331
kind: normative-requirement
summary: Once PPP finishes the Authentication phase, each network-layer protocol MUST be separately configured by the appropriate NCP. Network-layer protocol packets received when the corresponding NCP is not in the Opened state SHOULD be silently discarded.
section: "4.6"
rfc2119_level: MUST
topics:
