document: rfc-8271
kind: normative-requirement
summary: The BYPASS_ASSIGNMENT subobject MUST NOT be changed by downstream LSRs and MUST NOT be added to a Resv RRO; it SHOULD be inserted into the Path RRO by the downstream PLR and SHOULD NOT be inserted by a node that is not a downstream PLR.
section: "7.1"
rfc2119_level: MUST NOT
