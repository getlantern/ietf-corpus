document: rfc-3558
kind: wire-format
summary: The Interleaved/Bundled packet format begins with an Interleave Octet (2-bit reserved, 3-bit LLL interleave length, 3-bit NNN interleave index), followed by a second octet (3-bit MMM mode request, 5-bit frame count), then ToC entries (4 bits each), optional 4-bit padding, and codec data frames.
