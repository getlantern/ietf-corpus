document: rfc-4301
kind: protocol-element
summary: 'Non-initial IP fragments lack port/ICMP-type/MH-type selector fields. RFC 4301 defines three handling models: (1) tunnel mode SAs carrying all fragments; (2) separate tunnel mode SAs for non-initial fragments; (3) stateful fragment checking. If an SA requires non-ANY port selectors, arriving non-initial fragments MUST be discarded.'
section: "7"
topics:
