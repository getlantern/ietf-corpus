document: rfc-9769
kind: normative-requirement
summary: 'Peer A MUST NOT send Peer B a packet in interleaved mode unless three conditions are all met: (1) an active configured association or prior interleaved receipt, (2) no packet sent since last valid receipt, and (3) the previous sent packet was the sole response to a received packet.'
section: "3"
rfc2119_level: MUST NOT
topics:
    - ntp
