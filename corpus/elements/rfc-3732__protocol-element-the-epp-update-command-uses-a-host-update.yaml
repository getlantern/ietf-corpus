document: rfc-3732
kind: protocol-element
summary: The EPP <update> command uses a <host:update> element containing the host name and optional <host:add>, <host:rem>, and <host:chg> child elements; at least one of these MUST be provided. <host:chg> carries a new <host:name> to rename the host.
section: 3.2.5
