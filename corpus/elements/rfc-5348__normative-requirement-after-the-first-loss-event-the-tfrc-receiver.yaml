document: rfc-5348
kind: normative-requirement
summary: 'After the first loss event, the TFRC receiver MUST initialize the loss history by computing a synthetic first loss interval: the receiver finds p such that the throughput equation gives a rate within 5% of X_target = max(X_recv_max, 0.5/R), then seeds the loss history with I_0 = 1/p.'
section: 6.3.1
rfc2119_level: MUST
topics:
    - congestion
