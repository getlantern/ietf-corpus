document: rfc-9514
kind: interoperability-note
summary: A Prefix NLRI with an SRv6 Locator TLV is considered both a routing prefix and an SRv6 locator only when an IGP Metric TLV (TLV 1095) is also present; without it, the NLRI is treated solely as an SRv6 locator advertisement.
section: "5.1"
topics:
    - routing
    - bgp
    - ip
