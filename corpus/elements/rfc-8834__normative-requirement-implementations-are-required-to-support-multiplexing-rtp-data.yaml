document: rfc-8834
kind: normative-requirement
summary: Implementations are REQUIRED to support multiplexing RTP data packets and RTCP control packets on a single transport-layer flow (RFC 5761). This multiplexing MUST be negotiated before use; if SDP is used, the mechanism defined in RFC 5761 MUST be used for negotiation.
section: "4.5"
rfc2119_level: REQUIRED
topics:
    - webrtc
    - rtp
    - nat
    - udp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
