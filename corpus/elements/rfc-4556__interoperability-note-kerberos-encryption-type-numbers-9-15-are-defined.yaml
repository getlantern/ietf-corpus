document: rfc-4556
kind: interoperability-note
summary: Kerberos encryption type numbers 9-15 are defined to indicate support for CMS algorithms in the etype field of AS-REQ; this practice is deprecated and new numbers should not be assigned. The supportedCMSTypes field in AuthPack is the preferred mechanism, and its preference order overrides the etype field order.
section: 3.1.4
topics:
    - crypto
    - security
