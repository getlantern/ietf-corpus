document: rfc-9467
kind: protocol-element
summary: Window-based verification extends the neighbour table entry to a triple (Index, PCh, Window), where PCh is a 32-bit highest-PC value and Window is a vector of S booleans (default S=128 RECOMMENDED) representing whether each PC value in the range [PCh-S+1, PCh] has been seen.
section: "3.2"
topics:
    - routing
    - security
