document: rfc-5480
kind: normative-requirement
summary: If the keyUsage extension is present in a certificate indicating id-ecDH or id-ecMQV, the keyAgreement bit MUST be present, and digitalSignature, nonRepudiation, keyTransport, keyCertSign, and cRLSign MUST NOT be present.
section: "3"
rfc2119_level: MUST
