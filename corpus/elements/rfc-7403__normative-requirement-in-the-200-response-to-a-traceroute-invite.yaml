document: rfc-7403
kind: normative-requirement
summary: In the 200 response to a traceroute INVITE, the B2BUA MUST add a Reason header (per RFC 3326) with protocol field 'SIP', cause field '483', and reason-text 'Traceroute Response' to distinguish a traceroute hop answer from a final UAS answer.
section: "3.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
