document: rfc-8232
kind: normative-requirement
summary: The LSP-DB-VERSION TLV MUST be included in the end-of-synchronization PCRpt message (PLSP-ID=0, SYNC=0). If a PCEP speaker's LSP-DB did not survive a restart or the database is empty at startup, the PCEP speaker MUST NOT include the LSP-DB-VERSION TLV in the OPEN object.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
