document: rfc-1002
kind: wire-format
summary: 'Name Service packet header is 12 bytes: NAME_TRN_ID (16-bit transaction ID), OPCODE (5-bit field with R flag), NM_FLAGS (7-bit flags), RCODE (4-bit result code), QDCOUNT, ANCOUNT, NSCOUNT, and ARCOUNT (each 16 bits). Structure is compatible with DNS RFC 883.'
section: 4.2.1.1
topics:
