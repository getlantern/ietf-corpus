document: rfc-1730
kind: protocol-element
summary: The SEARCH command searches for messages matching criteria including flag state, header fields (FROM, TO, CC, BCC, SUBJECT, HEADER), body text, date ranges (BEFORE/ON/SINCE for internal date; SENTBEFORE/SENTON/SENTSINCE for RFC 822 Date), and size (LARGER/SMALLER). Multiple keys are ANDed; OR and NOT are also supported.
section: 6.4.4
topics:
