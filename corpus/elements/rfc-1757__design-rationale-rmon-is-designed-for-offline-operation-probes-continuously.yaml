document: rfc-1757
kind: design-rationale
summary: 'RMON is designed for offline operation: probes continuously collect statistics, detect threshold crossings, and log results even when disconnected from management stations, then notify the station when conditions warrant. This supports WAN/dialup links and fault-tolerant management across network failures.'
section: "2.1"
