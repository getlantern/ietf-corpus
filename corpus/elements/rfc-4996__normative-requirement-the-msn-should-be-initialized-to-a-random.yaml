document: rfc-4996
kind: normative-requirement
summary: The MSN SHOULD be initialized to a random value. The compressor should only initialize a new MSN for the initial IR or IR-CR packet for a CID whose context is not already associated with this profile; otherwise the MSN continues to increment monotonically across flows.
section: 6.1.1
rfc2119_level: SHOULD
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
