document: rfc-5815
kind: design-rationale
summary: The Export Table was designed to support advanced exporter topologies — failover (primary + secondary sessions), duplicate parallel export to multiple Collectors, and load-balancing — by grouping Transport Sessions under a shared ipfixExportIndex with typed membership roles, rather than hardcoding a single export destination.
