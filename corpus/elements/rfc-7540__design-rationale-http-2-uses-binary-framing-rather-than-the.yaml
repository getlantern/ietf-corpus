document: rfc-7540
kind: design-rationale
summary: HTTP/2 uses binary framing rather than the text-based framing of HTTP/1.1 to enable efficient parsing, reduced error rates from whitespace ambiguity, and natural support for multiplexing without head-of-line blocking. The frame and stream layers are intentionally tailored to HTTP semantics and server push rather than defined as a general-purpose binary protocol.
