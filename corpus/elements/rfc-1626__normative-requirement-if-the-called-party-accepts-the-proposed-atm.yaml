document: rfc-1626
kind: normative-requirement
summary: If the called party accepts the proposed ATM MTU values from the SETUP message, it shall include an AAL Parameters IE in its CONNECT response with Forward and Backwards Maximum CPCS-SDU Size fields equal to the corresponding SETUP values.
section: Switched Virtual Circuits
rfc2119_level: MUST
topics:
