document: rfc-4666
kind: normative-requirement
summary: The DATA (Payload) message MUST NOT be sent on SCTP stream 0. ASPSM, MGMT, and RKM message classes SHOULD be sent on stream 0, except for BEAT, BEAT ACK, and NTFY messages. SSNM, ASPTM classes, and BEAT, BEAT ACK, and NTFY messages can be sent on any stream.
section: 1.4.7
rfc2119_level: MUST NOT
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
