document: rfc-9820
kind: interoperability-note
summary: When CoAP-EAP runs over a reliable CoAP transport (Confirmable messages, CoAP over TCP/TLS/WebSockets per RFC 8323), the EAP retransmission timer SHOULD be set to an infinite value so that retransmissions do not occur at the EAP layer, as specified in RFC 3748 for reliable lower layers.
section: "3"
topics:
    - security
    - tcp
