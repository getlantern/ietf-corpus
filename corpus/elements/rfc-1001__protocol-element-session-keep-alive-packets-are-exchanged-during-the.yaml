document: rfc-1001
kind: protocol-element
summary: Session keep-alive packets are exchanged during the steady-state data transfer phase to detect loss of the TCP connection in the absence of application data. Session data is encapsulated with a NetBIOS session header over the TCP byte stream.
section: 16.3.2
