document: rfc-7260
kind: protocol-element
summary: 'Two LSP Attribute Flags are defined: bit 10 ''OAM MEP entities desired'' (used in LSP_ATTRIBUTES) requests MEP establishment at LSP endpoints; bit 11 ''OAM MIP entities desired'' (used in LSP_ATTRIBUTES or LSP_REQUIRED_ATTRIBUTES) requests MIP establishment at every transit node. Both are valid on Path, Resv, and RRO.'
section: "4.1"
topics:
    - routing
    - mpls
    - registry
