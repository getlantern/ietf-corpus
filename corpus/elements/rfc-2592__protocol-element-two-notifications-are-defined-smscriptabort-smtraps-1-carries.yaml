document: rfc-2592
kind: protocol-element
summary: 'Two notifications are defined: smScriptAbort (smTraps 1) carries smRunExitCode, smRunEndTime, smRunError and is generated automatically by the MIB implementation on non-noError exit. smScriptResult (smTraps 2) carries smRunResult and is emitted explicitly by the executing script itself to notify managers of results; it is NOT automatically generated.'
