document: rfc-3270
kind: normative-requirement
summary: E-LSPs using a signaled EXP↔PHB mapping MUST enforce the merge condition through explicit checking at label setup that the merged LSPs support the exact same set of PHBs. E-LSPs using the preconfigured mapping may be freely merged within a single MPLS Diff-Serv domain since all such E-LSPs are required to support the same BA set.
section: "3.6"
rfc2119_level: MUST
topics:
    - mpls
    - diffserv
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
