document: rfc-9237
kind: wire-format
summary: The REST-method-set is encoded as an unsigned integer bit field. Each method's bit position equals its CoAP method number minus 1 (GET=0, POST=1, PUT=2, DELETE=3, FETCH=4, PATCH=5, iPATCH=6). Dynamic-X variants use the same bit position plus Dynamic-Offset=32 (e.g., Dynamic-DELETE=35).
section: "3"
topics:
