document: rfc-6426
kind: protocol-element
summary: The Reverse-path Target FEC Stack TLV (type 16) has the same format as the Target FEC Stack TLV defined in RFC 4379. Sub-TLV assignments for both TLVs MUST be kept identical; any new sub-type added to the Target FEC Stack TLV MUST also apply to the Reverse-path Target FEC Stack TLV.
section: 3.4.2
topics:
