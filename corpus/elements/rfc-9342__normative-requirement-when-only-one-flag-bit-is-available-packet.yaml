document: rfc-9342
kind: normative-requirement
summary: 'When only one flag bit is available: packet-loss measurement MUST be done using the network clustering partition (Section 6/5), and delay measurement MUST be done according to mean delay calculation representative of the multipoint path (Section 7.1.1). Single-Marking based on first/last packet cannot be applied.'
section: "9"
rfc2119_level: MUST
topics:
    - measurement
