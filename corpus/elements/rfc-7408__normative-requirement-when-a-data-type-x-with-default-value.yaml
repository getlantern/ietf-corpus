document: rfc-7408
kind: normative-requirement
summary: When a data type X with default value A is referenced from a data type Y with default value B, Y's default value B overrides A. Default values of LFB components override any default value from the dataTypeDef definition.
section: "2.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
