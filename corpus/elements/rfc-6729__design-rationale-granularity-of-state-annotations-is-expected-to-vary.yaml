document: rfc-6729
kind: design-rationale
summary: Granularity of state annotations is expected to vary by circumstance. Typical use is limited to 'unusual' transitions; finer granularity may be used for transitions of administrative responsibility (e.g., MTA to MLM handoff), but excessive fields risk triggering false loop detection.
