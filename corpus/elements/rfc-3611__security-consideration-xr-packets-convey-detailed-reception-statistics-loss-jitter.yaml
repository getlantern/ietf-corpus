document: rfc-3611
kind: security-consideration
summary: XR packets convey detailed reception statistics (loss, jitter, delay, signal quality) that could reveal network topology or user behavior to passive eavesdroppers; the same profile-specific confidentiality mechanisms used to protect RTP and RTCP data SHOULD be applied to XR packets.
section: "7"
topics:
