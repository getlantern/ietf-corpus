document: rfc-5173
kind: protocol-element
summary: 'The :content transform matches MIME parts of specified content types independently. Content type matching rules: a type with a slash specifies a full type/subtype pair; without a slash, it specifies only a type and any subtype matches; an empty string matches all MIME content types.'
section: "5.2"
