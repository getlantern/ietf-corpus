document: rfc-5804
kind: protocol-element
summary: Server capabilities are sent automatically upon connection and after successful STARTTLS and AUTHENTICATE. Defined capabilities include IMPLEMENTATION, SASL, SIEVE, STARTTLS, MAXREDIRECTS, NOTIFY, LANGUAGE, OWNER, and VERSION. Capability names are case-insensitive and each may appear at most once.
section: "1.7"
topics:
