document: rfc-7986
kind: privacy-consideration
summary: Conferencing systems accessed via the CONFERENCE property may log user activity and participation. Calendar user agents SHOULD track which conferencing systems are used and warn users the first time a new one is about to be accessed, especially when the client auto-dials in at event start.
section: "8"
topics:
    - privacy
