document: rfc-7030
kind: wire-format
summary: 'Simple enrollment (/simpleenroll, /simplereenroll) requests use Content-Type application/pkcs10 with Content-Transfer-Encoding base64, carrying a PKCS #10 CSR (RFC 2986). Successful responses use Content-Type application/pkcs7-mime with smime-type certs-only, containing only the issued certificate.'
