document: rfc-9326
kind: normative-requirement
summary: The subset of traffic forwarded with a DEX Option-Type SHOULD NOT exceed 1/N of the interface capacity on any of the IOAM encapsulating node's interfaces, where N is operator-configurable. If there is an upper bound M on transit nodes in any path, it is RECOMMENDED to use N >> M; if topology is unknown, N > 100 is RECOMMENDED.
section: 3.1.1
rfc2119_level: SHOULD NOT
topics:
    - measurement
