document: rfc-5190
kind: normative-requirement
summary: MIDCOM-MIB implementations MUST track interface changes of IP interface indices in the ifTable. After a re-initialization, implementations MUST ensure each InterfaceIndexOrZero instance still points to the same interface; for any instance where this is not possible, all affected entries MUST be terminated, disabled, or deleted per the DESCRIPTION clause of the respective object.
section: "6.6"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
