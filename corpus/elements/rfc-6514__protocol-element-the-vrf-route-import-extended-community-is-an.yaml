document: rfc-6514
kind: protocol-element
summary: The VRF Route Import Extended Community is an IP-address-specific, transitive Extended Community that uniquely identifies a VRF. Its Global Administrator field MUST be set to an IP address of the PE (e.g., loopback, common for all VRFs), and the Local Administrator field is a 2-octet number uniquely identifying the VRF within the PE.
section: "7"
topics:
    - bgp
    - multicast
    - vpn
    - routing
