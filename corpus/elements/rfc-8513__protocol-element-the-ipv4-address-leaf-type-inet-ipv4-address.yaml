document: rfc-8513
kind: protocol-element
summary: The 'ipv4-address' leaf (type inet:ipv4-address) configures an IPv4 address for the local AFTR or B4 used for troubleshooting (e.g., ICMP reporting and traceroute). The address 192.0.0.1 is reserved for the AFTR, and 192.0.0.0/29 is reserved for B4 elements.
