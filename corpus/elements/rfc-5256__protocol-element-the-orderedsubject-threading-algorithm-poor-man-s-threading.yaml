document: rfc-5256
kind: protocol-element
summary: The ORDEREDSUBJECT threading algorithm ('poor man's threading') sorts searched messages by base subject then sent date, groups them into threads by identical base subject, and sorts threads by the sent date of the first message. All children are at depth one; there are no grandchildren. Clients SHOULD treat any server-returned descendents of a child as siblings of that child.
section: "3"
rfc2119_level: SHOULD
topics:
    - email
