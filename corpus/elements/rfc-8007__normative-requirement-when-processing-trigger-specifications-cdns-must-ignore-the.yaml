document: rfc-8007
kind: normative-requirement
summary: When processing Trigger Specifications, CDNs MUST ignore the URL scheme (HTTP or HTTPS) when comparing URLs. Content MUST be invalidated or purged regardless of the protocol clients used to request it.
section: "4.8"
rfc2119_level: MUST
