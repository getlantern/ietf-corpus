document: rfc-7655
kind: normative-requirement
summary: For the G.711.0 storage mode defined in this RFC, the version octet MUST be set to 0x00. If the version octet is non-zero, the remainder of the payload MUST NOT be passed to the G.711.0 decoder.
section: "6.3"
rfc2119_level: MUST
topics:
