document: rfc-2960
kind: protocol-element
summary: The Transmission Sequence Number (TSN) is a 32-bit per-chunk counter used for reliable delivery and duplicate detection, entirely independent of the per-stream Stream Sequence Number. SACK acknowledges all received TSNs including out-of-order, enabling gap reporting.
section: 1.3.4
topics:
