document: rfc-7434
kind: normative-requirement
summary: When sending UUI, the sending SIP entity MUST include a protocol discriminator octet conforming to Table 4-26 of ITU-T Q.931 as the first octet of the UUI data. A receiving entity MUST ignore a User-to-User header field if the 'content' parameter is present with a value other than 'isdn-uui'.
section: "9"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
