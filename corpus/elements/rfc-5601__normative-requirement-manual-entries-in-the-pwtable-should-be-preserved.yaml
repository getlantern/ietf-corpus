document: rfc-5601
kind: normative-requirement
summary: Manual entries in the pwTable SHOULD be preserved after a reboot; the agent MUST ensure their integrity. If entries for a specific row are found inconsistent after reboot, pwOperStatus MUST be declared as notPresent(5).
section: "12"
rfc2119_level: MUST
topics:
