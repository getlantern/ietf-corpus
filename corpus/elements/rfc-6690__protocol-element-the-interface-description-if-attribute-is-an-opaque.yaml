document: rfc-6690
kind: protocol-element
summary: The Interface Description 'if' attribute is an opaque string providing a name or URI indicating a specific interface definition used to interact with the target resource. Multiple Interface Descriptions MAY be included separated by spaces. The 'if' attribute MUST NOT appear more than once in a link.
section: "3.2"
