document: rfc-5459
kind: wire-format
summary: 'The complete RTP payload consists of: a 1-octet header (MBS and FT fields), followed by zero or more consecutive audio frames at the same bit rate, followed by zero or one SID frame. FT values 0-11 map to encoding rates 8-32 kbps with frame sizes 20-80 octets; FT=14 indicates a SID (2, 3, or 6 octets); FT=15 indicates NO_DATA (0 octets).'
