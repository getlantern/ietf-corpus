document: rfc-2138
kind: registry
summary: 'RFC 2138 defines the RADIUS attribute type space: types 1–63 are assigned in this document (with 17 and 21 unassigned); types 40–59 are reserved for accounting; types 192–223 are reserved for experimental use; 224–240 for implementation-specific use; 241–255 are reserved and MUST NOT be used. Unknown attribute types MAY be ignored by both clients and servers.'
