document: rfc-6909
kind: normative-requirement
summary: When the MAG sends a PBU for Binding Lifetime Extension or De-Registration, it SHOULD copy the IPv4 Traffic Offload Selector option from the initial PBU, and considerations from RFC 5213 Sections 6.9.1.3 and 6.9.1.4 MUST be applied.
section: "3.2"
rfc2119_level: SHOULD
