document: rfc-3432
kind: protocol-element
summary: The measurement procedure collects packets from T0 to Tf at MP(Src), and from T0 to (Tf + dTstop) at MP(Dst). Data consolidation occurs at Tf + Tcons, with the constraint that dTcons >= dTstop to avoid premature collection termination.
