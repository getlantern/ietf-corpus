document: rfc-2439
kind: interoperability-note
summary: In topologies with multiple AS paths, aggressive damping by a distant AS can suppress a stable secondary path when the primary flaps. This can be mitigated by damping near the source of the flap, using consistent parameters, or disabling penalties on AS path changes.
section: "5"
topics:
