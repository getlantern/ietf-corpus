document: rfc-3472
kind: normative-requirement
summary: An egress node receiving a REQUEST with the R bit set in the Admin Status TLV SHOULD send a MAPPING containing an Admin Status TLV with the same values (except the R bit cleared). Absence of the Admin Status TLV is equivalent to receiving one with all bits zero.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
