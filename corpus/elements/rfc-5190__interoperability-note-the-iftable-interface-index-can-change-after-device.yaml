document: rfc-5190
kind: interoperability-note
summary: The ifTable interface index can change after device re-initialization when physical interfaces are added or removed. MIDCOM clients SHOULD check whether the middlebox has been re-initialized before using interface index values, as silent index reassignment could cause MIDCOM-MIB objects to reference unintended interfaces.
section: "6.6"
topics:
    - snmp
