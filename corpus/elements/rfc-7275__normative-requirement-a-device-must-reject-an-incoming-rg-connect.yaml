document: rfc-7275
kind: normative-requirement
summary: A device MUST reject an incoming RG Connect message if the PE is not a member of the specified RG or if the maximum number of simultaneous ICCP connections is exceeded. Otherwise the PE MUST bring up the connection by responding with an appropriate RG Connect.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
