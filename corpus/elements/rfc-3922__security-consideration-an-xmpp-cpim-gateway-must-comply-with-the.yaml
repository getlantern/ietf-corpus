document: rfc-3922
kind: security-consideration
summary: An XMPP-CPIM gateway MUST comply with the minimum security requirements of the instant messaging and presence protocols it interfaces with. End-to-end security properties (confidentiality and integrity) between user agents through a gateway can only be provided if common formats are supported, as specified in XMPP-E2E (RFC 3923).
section: "7"
topics:
