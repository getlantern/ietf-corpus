document: rfc-4724
kind: security-consideration
summary: 'If an attacker successfully opens a TCP connection impersonating a legitimate peer, the attack window for route insertion is small: the legitimate peer will reconnect, terminating the attacker''s connection, reducing the attack to a transient denial of service rather than a persistent route hijack.'
