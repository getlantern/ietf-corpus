document: rfc-5465
kind: protocol-element
summary: The SELECTED-DELAYED mailbox specifier requires the server to delay MessageExpunge events until the client issues a command that allows returning information about expunged messages (e.g., NOOP or IDLE). This allows clients using MSNs to avoid MSN invalidation from unsolicited expunge notifications.
section: 6.1.2
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
