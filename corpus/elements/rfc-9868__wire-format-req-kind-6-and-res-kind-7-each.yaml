document: rfc-9868
kind: wire-format
summary: REQ (Kind=6) and RES (Kind=7) each have Len=6 with a 4-byte opaque token field used for UDP packet-level acknowledgment by upper layer protocols such as DPLPMTUD. The token in a RES MUST be a token previously received in a REQ by the transmitter.
section: "11.7"
topics:
    - udp
