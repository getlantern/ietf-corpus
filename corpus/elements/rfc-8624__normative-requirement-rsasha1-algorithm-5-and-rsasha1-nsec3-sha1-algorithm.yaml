document: rfc-8624
kind: normative-requirement
summary: RSASHA1 (algorithm 5) and RSASHA1-NSEC3-SHA1 (algorithm 7) are NOT RECOMMENDED for DNSSEC signing but MUST be supported for DNSSEC validation to maintain interoperability with widely deployed zones.
