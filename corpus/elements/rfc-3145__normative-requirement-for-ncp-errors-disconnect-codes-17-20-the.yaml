document: rfc-3145
kind: normative-requirement
summary: For NCP errors (Disconnect Codes 17–20), the Control Protocol Number SHOULD correspond to the PPP Network Control Protocol number in use. Where multiple NCPs are in use, multiple copies of this AVP MAY be given; otherwise the Control Protocol Number SHOULD reflect the last failing NCP.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - vpn
