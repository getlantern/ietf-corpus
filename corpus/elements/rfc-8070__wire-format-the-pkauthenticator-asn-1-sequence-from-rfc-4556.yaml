document: rfc-8070
kind: wire-format
summary: The PKAuthenticator ASN.1 SEQUENCE (from RFC 4556 Section 3.2.1) is extended with an optional freshnessToken field tagged [4] OCTET STRING OPTIONAL. This field MUST be present if the KDC sent a freshness token; it carries the opaque PA_AS_FRESHNESS padata-value verbatim.
