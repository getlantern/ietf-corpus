document: rfc-5026
kind: security-consideration
summary: An attacker obtaining a legitimate HA address via DNS could use it to mount a DoS attack on the Home Agent. This is not unique to bootstrapping; every MIPv6 HA faces this risk. Mitigations include overprovisioning, traffic monitoring, hot spares, and IKEv2 cookie-based anti-DoS.
section: "9.1"
topics:
    - mobility
    - security
