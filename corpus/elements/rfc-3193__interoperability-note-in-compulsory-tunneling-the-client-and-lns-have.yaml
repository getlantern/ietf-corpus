document: rfc-3193
kind: interoperability-note
summary: 'In compulsory tunneling, the client and LNS have unequal knowledge of security services: the LNS knows IPsec is in place between itself and the LAC, but the client does not. This asymmetry affects how each side negotiates PPP ECP and CCP compression/encryption.'
section: 5.2.1
topics:
    - vpn
    - ipsec
