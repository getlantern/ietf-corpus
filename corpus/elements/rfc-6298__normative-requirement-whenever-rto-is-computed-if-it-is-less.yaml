document: rfc-6298
kind: normative-requirement
summary: Whenever RTO is computed, if it is less than 1 second, it SHOULD be rounded up to 1 second. This minimum is required to keep TCP conservative and avoid spurious retransmissions.
section: "2.4"
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
