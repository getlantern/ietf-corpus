document: rfc-9598
kind: interoperability-note
summary: 'This document obsoletes RFC 8398 with three major changes: (1) domain labels SHALL always be encoded as LDH/A-labels, never U-labels; (2) the matching algorithm is updated to only accept A-label domain representations; (3) the rfc822Name name constraint procedure is updated to only accept A-label domain representations.'
section: "8"
