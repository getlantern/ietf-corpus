document: rfc-9176
kind: design-rationale
summary: 'Registrations are soft state and must be periodically refreshed rather than being persistent. This design tolerates node failures and network partitions gracefully: a registration that is not refreshed automatically expires, keeping the RD consistent without explicit cleanup from crashed nodes.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
