document: rfc-2931
kind: normative-requirement
summary: For all transaction SIG(0)s, the signer field MUST be a name of the originating host and there MUST be a KEY RR at that name with the public key corresponding to the private key used to calculate the signature.
section: "3"
rfc2119_level: MUST
topics:
