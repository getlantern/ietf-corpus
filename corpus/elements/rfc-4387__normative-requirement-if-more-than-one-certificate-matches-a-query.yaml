document: rfc-4387
kind: normative-requirement
summary: If more than one certificate matches a query, the response MUST be returned as a multipart/mixed response. The returned data MUST NOT use any additional content- or transfer-encoding at the HTTP level (e.g., compression or base64).
section: "2"
rfc2119_level: MUST
topics:
