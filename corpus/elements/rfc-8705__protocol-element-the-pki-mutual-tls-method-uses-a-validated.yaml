document: rfc-8705
kind: protocol-element
summary: The PKI mutual-TLS method uses a validated certificate chain (RFC 5280) and a single subject DN or SAN to authenticate the client. The client is authenticated if the subject information matches the registered value; revocation checking is at the authorization server's discretion.
