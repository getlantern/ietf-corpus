document: rfc-5724
kind: normative-requirement
summary: Simply activating a link with an 'sms' URI SHOULD NOT cause a message to be sent without prior user confirmation. User agents SHOULD provide means for message composition before sending.
section: 1.2.4
rfc2119_level: SHOULD NOT
