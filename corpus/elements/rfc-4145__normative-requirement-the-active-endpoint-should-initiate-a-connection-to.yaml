document: rfc-4145
kind: normative-requirement
summary: The active endpoint SHOULD initiate a connection to the port on the other endpoint's 'm' line. The active endpoint SHOULD specify port 9 (discard port) on its own 'm' line and MUST NOT specify port zero except to refuse a stream.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - tcp
    - realtime
