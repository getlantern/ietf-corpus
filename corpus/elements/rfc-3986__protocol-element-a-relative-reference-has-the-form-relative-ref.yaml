document: rfc-3986
kind: protocol-element
summary: 'A relative reference has the form: relative-ref = relative-part [ "?" query ] [ "#" fragment ]. It can be a network-path reference ("//…"), absolute-path reference ("/…"), or relative-path reference; a first segment containing ":" must be preceded by "./".'
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
