document: rfc-8344
kind: normative-requirement
summary: The mandatory-to-implement secure transport for NETCONF access is SSH (RFC 6242); for RESTCONF access it is TLS (RFC 5246). Access control is provided by the NETCONF access control model (RFC 8341).
