document: rfc-3987
kind: normative-requirement
summary: When comparing IRIs character by character, the comparison function MUST NOT map IRIs to URIs, as such a mapping would create spurious equivalences. An IRI SHOULD NOT be modified when transported if there is any chance it might be used as an identifier.
section: 5.3.1
rfc2119_level: MUST NOT
topics:
    - ip
