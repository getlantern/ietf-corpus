document: rfc-3575
kind: normative-requirement
summary: For Designated Expert review, the Expert must post to the AAA WG mailing list for comment, then within 30 days either approve or deny the registration request, notify the list, and inform IANA. A denial must be justified with an explanation and, where possible, suggestions for modification.
section: "2.1"
rfc2119_level: REQUIRED
