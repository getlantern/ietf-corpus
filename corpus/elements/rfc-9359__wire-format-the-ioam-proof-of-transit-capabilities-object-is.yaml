document: rfc-9359
kind: wire-format
summary: 'The IOAM Proof of Transit Capabilities Object is a single 32-bit payload: 16-bit Namespace-ID, 8-bit IOAM-POT-Type, 2-bit SoP (Size of POT), and 6-bit Reserved. SoP value 0b00 indicates 64-bit PktID and 64-bit Cumulative data; values 0b01–0b11 are reserved.'
section: 3.2.3
topics:
