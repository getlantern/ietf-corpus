document: rfc-9112
kind: protocol-element
summary: A trailer section (trailer-section = *( field-line CRLF )) allows the sender to include additional fields at the end of a chunked message for dynamically generated metadata. A recipient MUST NOT merge a trailer field into the header section unless the field definition explicitly permits it.
section: 7.1.2
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
