document: rfc-2327
kind: design-rationale
summary: Transport protocol is specified separately from media format because the same standard media formats may be carried over different protocols—a historical example is vat PCM audio versus RTP PCM audio. This separation also enables transport-protocol-specific but format-independent tools such as relays and monitoring tools.
section: "6"
topics:
