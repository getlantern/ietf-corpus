document: rfc-5275
kind: security-consideration
summary: GL members and GLOs MUST use glkCompromise to report a compromised shared KEK. The GLA always redirects the message to the GLO for further action. The glkCompromise message MAY itself be enclosed in an EnvelopedData generated using the compromised KEK.
section: 3.1.8
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
