document: rfc-4754
kind: design-rationale
summary: ECDSA signatures are smaller than RSA signatures of similar cryptographic strength, and ECDSA public keys and certificates are smaller than comparable-strength DSA keys. This results in improved communications efficiency and motivates its addition as a third authentication option alongside RSA and DSA in IKE/IKEv2.
section: "3"
topics:
