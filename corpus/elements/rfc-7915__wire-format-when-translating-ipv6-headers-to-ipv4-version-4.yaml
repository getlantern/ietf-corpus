document: rfc-7915
kind: wire-format
summary: 'When translating IPv6 headers to IPv4: Version=4, IHL=5 (no IPv4 options), TOS copied from IPv6 Traffic Class, Total Length = IPv6 Payload Length + IPv4 header size, TTL derived from Hop Limit. The DF flag is cleared if the translated IPv4 packet is ≤1260 bytes; otherwise it is set to one.'
section: "5.1"
topics:
    - ip
    - v6ops
