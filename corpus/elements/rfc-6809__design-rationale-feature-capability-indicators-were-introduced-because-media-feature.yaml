document: rfc-6809
kind: design-rationale
summary: Feature-capability indicators were introduced because media feature tags (RFC 3840) can only be conveyed in the Contact header field, which is tied to the URI of the SIP entity. Proxies, registrars, and B2BUAs whose Contact URI represents another entity have no existing mechanism to signal their own capabilities.
section: "1"
topics:
