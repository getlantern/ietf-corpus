document: rfc-9045
kind: security-consideration
summary: The entropy of the password is crucial for Password-Based MAC security because hardware hash acceleration is available at low cost, reducing the protection afforded by high iteration counts. Real-world passwords have a median entropy of only ~27 bits; randomly generated strings of 10+ characters from a large alphabet are recommended.
