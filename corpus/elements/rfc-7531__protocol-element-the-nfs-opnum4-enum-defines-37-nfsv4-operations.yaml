kind: protocol-element
summary: The nfs_opnum4 enum defines 37 NFSv4 operations (OP_ACCESS=3 through OP_RELEASE_LOCKOWNER=39) plus OP_ILLEGAL=10044. All operations are dispatched via the COMPOUND RPC procedure; there is no per-operation RPC.
