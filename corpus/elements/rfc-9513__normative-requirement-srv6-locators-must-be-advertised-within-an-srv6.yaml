document: rfc-9513
kind: normative-requirement
summary: SRv6 Locators MUST be advertised within an SRv6 Locator TLV using an SRv6 Locator LSA. Forwarding entries for advertised locators MUST be installed in the forwarding plane of receiving SRv6-capable routers when the associated algorithm is supported by the receiving router.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - ip
