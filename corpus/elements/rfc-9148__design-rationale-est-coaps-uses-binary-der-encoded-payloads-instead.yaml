document: rfc-9148
kind: design-rationale
summary: EST-coaps uses binary DER-encoded payloads instead of Base64 encoding (as used by HTTP-based EST) because binary is 30% smaller and well-supported by CoAP, reducing overhead for constrained devices where payload size is critical.
