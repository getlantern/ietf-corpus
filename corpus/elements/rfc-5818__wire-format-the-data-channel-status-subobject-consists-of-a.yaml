document: rfc-5818
kind: wire-format
summary: The Data Channel Status subobject consists of a 1-byte Type, 1-byte Length, 2-byte Data Channel Status flags (0x0000=available/free, 0x0001=unavailable/in-use), and a variable-length Data Channel ID encoded as a label value. All subobjects must be padded to a four-byte boundary with trailing zeros; the Length field excludes padding bytes.
section: "5.2"
topics:
    - routing
