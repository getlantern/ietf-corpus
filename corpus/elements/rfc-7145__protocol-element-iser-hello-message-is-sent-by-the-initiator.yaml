document: rfc-7145
kind: protocol-element
summary: 'iSER Hello Message is sent by the initiator as the first iSER Message (when iSERHelloRequired=''Yes'') declaring the iSER-IRD value. The target responds with an iSER HelloReply Message declaring iSER-ORD, which the target sets to min(target-ORD, initiator-declared iSER-IRD). Failure conditions include: iSER-IRD>0 but target-ORD=0, or non-overlapping iSER protocol versions.'
section: 5.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
