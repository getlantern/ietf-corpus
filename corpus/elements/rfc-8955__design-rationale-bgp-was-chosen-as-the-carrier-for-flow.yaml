document: rfc-8955
kind: design-rationale
summary: BGP was chosen as the carrier for Flow Specification dissemination because it allows reuse of existing internal route distribution infrastructure (route reflectors, confederation design) and existing external BGP sessions, providing an incremental addition to already-deployed mechanisms rather than requiring a new protocol.
