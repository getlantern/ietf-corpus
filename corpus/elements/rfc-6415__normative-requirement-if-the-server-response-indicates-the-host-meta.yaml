document: rfc-6415
kind: normative-requirement
summary: If the server response indicates the host-meta resource is located elsewhere (301, 302, or 307), the client SHOULD try to obtain the resource from the redirect location. If the resource is not available (404 or 410), the client SHOULD infer that metadata is not available via this mechanism.
section: "2"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
