document: rfc-3307
kind: registry
summary: This document requests creation of a new IANA registry for permanent IPv6 multicast group IDs, covering the range 0x40000000 to 0x7FFFFFFF, allocated on an Expert Review basis. These IDs are intended for use across multiple domains with the unicast-prefix-based multicast architecture.
