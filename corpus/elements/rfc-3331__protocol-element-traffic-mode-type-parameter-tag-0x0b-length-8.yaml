document: rfc-3331
kind: protocol-element
summary: 'Traffic Mode Type parameter (Tag 0x0b, Length=8) in ASPAC/ASPAC Ack specifies how an ASP operates within an AS: Override (0x1, primary/backup take-over), Load-share (0x2, traffic distribution), Broadcast (0x3, all active ASPs receive all traffic). Only one mode per AS is permitted.'
section: 3.3.2.7
topics:
    - realtime
    - sctp
