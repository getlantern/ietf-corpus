document: rfc-6282
kind: design-rationale
summary: LOWPAN_HC1 (RFC 4944) is insufficient because it requires full 128-bit addresses for routable or multicast destinations, cannot shorten IIDs derived from 16-bit short addresses, and cannot compress Hop Limit values other than 1. LOWPAN_IPHC remedies all three limitations.
section: "1"
