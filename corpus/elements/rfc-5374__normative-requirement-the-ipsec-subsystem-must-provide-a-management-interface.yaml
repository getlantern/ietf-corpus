document: rfc-5374
kind: normative-requirement
summary: The IPsec subsystem MUST provide a management interface allowing the GKM subsystem to add and delete IPsec SAs. A GKM/IPsec implementation MUST support at least two concurrent IPsec SAs per Group Sender to enable re-key rollover continuity.
section: 4.2.1
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
