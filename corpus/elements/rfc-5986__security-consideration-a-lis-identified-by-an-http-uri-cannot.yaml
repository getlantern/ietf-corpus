document: rfc-5986
kind: security-consideration
summary: A LIS identified by an HTTP URI cannot be authenticated and does not meet HELD requirements for confidentiality and integrity, leaving Devices vulnerable to multiple attacks. Lower-layer protections such as Layer 2 traffic separation may provide some guarantees.
