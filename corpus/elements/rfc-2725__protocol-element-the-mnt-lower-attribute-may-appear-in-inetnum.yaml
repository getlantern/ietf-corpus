document: rfc-2725
kind: protocol-element
summary: The mnt-lower attribute may appear in inetnum, route, as-block, or aut-num objects. In inetnum/route objects it acts like mnt-routes but only for more specific prefixes; in as-block it allows addition of more specific as-block or aut-num objects.
section: "10.1"
topics:
