document: rfc-1116
kind: interoperability-note
summary: SLC_FORW2 SHOULD only be used if SLC_FORW1 is already in use. The client is required to forward buffered data on SLC_FORW1, SLC_FORW2, or FORWARDMASK characters, on normal line terminators, and on special signals; it may also freely forward on other characters it chooses.
section: "5.5"
topics:
