document: rfc-1516
kind: protocol-element
summary: rptrMonitorPortShortEvents (rptrMonitorPortEntry 8) counts CarrierEvents with ActivityDuration less than ShortEventMaxTime (between 74 and 82 bit times). Short events may indicate external noise causing the repeater to transmit runts or propagate late collisions to other ports.
section: "3.3"
