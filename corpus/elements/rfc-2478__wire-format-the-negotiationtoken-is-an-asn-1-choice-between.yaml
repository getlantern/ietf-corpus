summary: The NegotiationToken is an ASN.1 CHOICE between negTokenInit (tag [0]) sent by the initiator and negTokenTarg (tag [1]) returned by the target. The innerContextToken field of the GSS-API InitialContextToken carries this structure, encoded in DER.
