document: rfc-3640
kind: protocol-element
summary: 'The RTP payload is divided into three octet-aligned sections: the AU Header Section (containing one or more AU-headers), the Auxiliary Section (containing auxiliary data), and the Access Unit Data Section (containing AU data). The first two sections MAY be empty, but the Access Unit Data Section MUST NOT be empty.'
