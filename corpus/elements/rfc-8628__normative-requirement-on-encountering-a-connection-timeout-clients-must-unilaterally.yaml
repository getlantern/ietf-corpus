document: rfc-8628
kind: normative-requirement
summary: On encountering a connection timeout, clients MUST unilaterally reduce their polling frequency before retrying. Use of exponential backoff (e.g., doubling the interval on each timeout) is RECOMMENDED.
section: "3.5"
rfc2119_level: MUST
topics:
    - oauth
