document: rfc-8551
kind: normative-requirement
summary: A sending agent MUST decide whether weak encryption is acceptable before sending; if weak encryption is unacceptable for the data, the agent MUST NOT use a weak algorithm regardless of the recipient's known capabilities. Capabilities from messages with unverifiable signatures or timestamps far in the future MUST NOT be accepted.
section: 2.7.1
rfc2119_level: MUST NOT
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
