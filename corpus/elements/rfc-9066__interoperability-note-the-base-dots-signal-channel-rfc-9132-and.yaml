document: rfc-9066
kind: interoperability-note
summary: The base DOTS signal channel (RFC 9132) and the DOTS signal channel Call Home can coexist on the same device; the same node may embed both a DOTS server and a Call Home DOTS client (at the network provider side) or both a DOTS client and a Call Home DOTS server (at the source network side). The DMS provider must be on the default forwarding path of outbound traffic for Call Home to function.
section: "4"
topics:
