document: rfc-9530
kind: wire-format
summary: Content-Digest and Repr-Digest are Structured Fields Dictionaries (RFC 8941 Section 3.2). Each dictionary member key is an Algorithm Key string and the value is a Byte Sequence (Section 3.3.5 of RFC 8941) containing the base64-encoded digest output. Multiple algorithm/digest pairs may appear in one field.
section: "2"
topics:
