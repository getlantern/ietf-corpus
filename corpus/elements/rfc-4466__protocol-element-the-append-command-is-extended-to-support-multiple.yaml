document: rfc-4466
kind: protocol-element
summary: 'The APPEND command is extended to support multiple messages (MULTIAPPEND) and binary data with NULs (BINARY). The new syntax is: ''APPEND mailbox 1*append-message'' where each append-message consists of append-opts (flags, date-time, extensions) followed by append-data.'
section: "2.7"
topics:
