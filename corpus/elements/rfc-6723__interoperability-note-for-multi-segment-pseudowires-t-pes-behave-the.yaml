document: rfc-6723
kind: interoperability-note
summary: For multi-segment pseudowires, T-PEs behave the same as PEs in the single-segment case, but S-PEs must be upgraded to implement the Label Request forwarding mechanism defined in this document. S-PEs that are not upgraded will not correctly propagate the renegotiation.
