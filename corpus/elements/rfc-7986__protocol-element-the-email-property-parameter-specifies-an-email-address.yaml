document: rfc-7986
kind: protocol-element
summary: The EMAIL property parameter specifies an email address for identifying or contacting an ORGANIZER or ATTENDEE when the calendar user address is not a recognizable identifier (e.g., an opaque token). Its value is a plain email address.
section: "6.2"
