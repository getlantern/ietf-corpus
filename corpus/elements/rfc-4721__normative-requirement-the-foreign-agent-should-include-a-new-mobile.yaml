document: rfc-4721
kind: normative-requirement
summary: The foreign agent SHOULD include a new Mobile-Foreign Challenge extension in any Registration Reply (successful or not). If omitting it, the FA MUST still respond with an agent advertisement containing a previously unused challenge in response to subsequent agent solicitations.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - mobility
    - security
