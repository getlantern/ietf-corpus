document: rfc-3101
kind: normative-requirement
summary: Type-7 LSAs with the P-bit set MUST have a non-zero forwarding address. If a non-zero forwarding address is unavailable and the P-bit is required, the Type-7 LSA MUST NOT be originated into the NSSA.
section: "2.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
