document: rfc-6597
kind: interoperability-note
summary: Data items in application/smpte336m can be very diverse; receivers might only be capable of interpreting a subset of possible data items, and unrecognized items are skipped. Agreement on data items to be used is typically done out of band via an application profile.
section: "6.1"
topics:
