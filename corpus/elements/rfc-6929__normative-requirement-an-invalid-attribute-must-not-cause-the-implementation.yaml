document: rfc-6929
kind: normative-requirement
summary: An invalid attribute MUST NOT cause the implementation to discard the entire packet or treat the packet as a negative acknowledgment. Only the invalid attribute itself is treated specially; it SHOULD be silently discarded.
section: "2.8"
rfc2119_level: MUST NOT
