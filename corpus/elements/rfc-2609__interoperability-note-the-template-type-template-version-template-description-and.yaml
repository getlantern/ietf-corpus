document: rfc-2609
kind: interoperability-note
summary: The template-type, template-version, template-description, and template-url-syntax items are defined as SLPv2 attributes and MAY accompany any service registration, enabling a recipient to discover exactly which template version was used to register the service.
section: "3.2"
