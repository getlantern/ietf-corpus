summary: The prefix-len field in OPTION_PD_EXCLUDE MUST be strictly greater than the OPTION_IAPREFIX prefix-length and at most 128; that is, OPTION_IAPREFIX prefix-length+1 ≤ prefix-len ≤ 128.
