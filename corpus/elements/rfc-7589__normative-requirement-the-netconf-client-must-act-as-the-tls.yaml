document: rfc-7589
kind: normative-requirement
summary: The NETCONF client MUST act as the TLS client, actively opening the TLS connection. The well-known TCP port 6513 is used by NETCONF servers to listen for incoming TLS connections.
section: "2"
rfc2119_level: MUST
