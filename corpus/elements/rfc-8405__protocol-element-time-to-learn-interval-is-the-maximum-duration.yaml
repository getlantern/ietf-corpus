document: rfc-8405
kind: protocol-element
summary: TIME_TO_LEARN_INTERVAL is the maximum duration to collect all IGP events related to a single component failure, recommended at 500 ms (default). The FSM uses this as the LEARN_TIMER duration; expiration triggers transition from SHORT_WAIT to LONG_WAIT.
