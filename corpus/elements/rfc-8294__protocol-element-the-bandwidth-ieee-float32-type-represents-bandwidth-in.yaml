document: rfc-8294
kind: protocol-element
summary: The bandwidth-ieee-float32 type represents bandwidth in IEEE 754 floating-point 32-bit binary format with units of octets per second. The encoding is restricted to normalized, non-negative, non-fraction hexadecimal-significant character sequences (e.g., 0x1p10, 0x1.abcde2p+20).
