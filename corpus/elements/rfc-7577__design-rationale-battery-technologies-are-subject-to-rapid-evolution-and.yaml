document: rfc-7577
kind: design-rationale
summary: Battery technologies are subject to rapid evolution and replacement, so a fixed enumeration would quickly become obsolete. An extensible IANA registry was chosen instead, allowing new technologies to be added without revising the MIB module. New entries are restricted to technologies in commercial use and relevant to Internet-based battery monitoring.
section: "3.2"
topics:
    - snmp
    - registry
