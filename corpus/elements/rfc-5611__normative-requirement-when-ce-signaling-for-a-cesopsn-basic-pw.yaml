document: rfc-5611
kind: normative-requirement
summary: When CE signaling for a CESoPSN basic PW is transported in a separate PW instance, both PW instances MUST use the same PW type, MUST have identical TDM AVP fields except for the SP field, and MUST both either use or not use the RTP header.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
