document: rfc-3530
kind: state-machine
summary: 'File open state transitions: OPEN returns an open stateid (seqid incremented per transition); the first OPEN by an open_owner4 may require OPEN_CONFIRM to validate. Open access can be downgraded via OPEN_DOWNGRADE. CLOSE releases open state. The first LOCK operation transitions from an open stateid to a lock stateid using the open_to_lock_owner4 structure.'
section: "8.10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
