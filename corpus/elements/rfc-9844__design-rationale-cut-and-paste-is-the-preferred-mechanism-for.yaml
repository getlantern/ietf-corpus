document: rfc-9844
kind: design-rationale
summary: Cut-and-paste is the preferred mechanism for transferring complete IPv6 link-local addresses between UIs because such addresses (e.g., 'fe80::8d0f:7f26:f5c8:780b%enx525400d5e0fb') are long hexadecimal strings where manual re-entry is highly error prone.
