document: rfc-9468
kind: security-consideration
summary: 'The YANG module''s writable data nodes (enabled, local-multiplier, interval parameters) are sensitive: unauthorized write access can enable unsolicited session creation globally or alter BFD packet rates and failure detection times. The read-only ''role'' leaf discloses local system role and should have controlled read access.'
section: "6.3"
topics:
    - security
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
