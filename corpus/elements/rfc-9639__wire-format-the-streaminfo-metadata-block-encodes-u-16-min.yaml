document: rfc-9639
kind: wire-format
summary: 'The streaminfo metadata block encodes: u(16) min block size, u(16) max block size, u(24) min frame size, u(24) max frame size, u(20) sample rate, u(3) channels-1, u(5) bits_per_sample-1, u(36) total interchannel samples, u(128) MD5 checksum of raw PCM. Min and max block sizes MUST be in the range 16–65535.'
section: "8.2"
