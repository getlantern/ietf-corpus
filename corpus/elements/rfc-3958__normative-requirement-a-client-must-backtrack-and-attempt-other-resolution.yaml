document: rfc-3958
kind: normative-requirement
summary: A client MUST backtrack and attempt other resolution paths when failure occurs, including when the remote server fails to provide appropriate security credentials for the originating domain, connection otherwise fails, or the S-NAPTR-designated DNS lookup fails to yield expected results.
section: 2.2.4
rfc2119_level: MUST
topics:
