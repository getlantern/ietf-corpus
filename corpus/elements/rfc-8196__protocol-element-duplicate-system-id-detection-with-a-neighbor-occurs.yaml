document: rfc-8196
kind: protocol-element
summary: 'Duplicate System ID detection with a neighbor occurs when an IIH carries a System ID identical to the local System ID but a different Router-Fingerprint. With a non-neighbor, duplication is detected when a received LSP #0 has the same System ID but a different Router-Fingerprint.'
section: 3.4.3
topics:
    - routing
