document: rfc-6794
kind: protocol-element
summary: The Policy-Contact header field is inserted by a proxy into 488 responses or INVITE/UPDATE/PRACK requests to convey one or more policy server URIs to the UAC or UAS. It supports alternative URIs via the 'alt-uri' parameter (indicating different transport schemes for the same policy) and a 'non-cacheable' parameter to prevent URI caching.
section: 4.4.5.2
topics:
    - sip
