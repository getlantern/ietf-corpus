document: rfc-8205
kind: normative-requirement
summary: To create or add a signature, a BGPsec speaker MUST possess a private key corresponding to the public key in a valid RPKI end entity certificate (RFC 8209) whose AS number resource extension includes the speaker's AS number. It is RECOMMENDED that origination only occur if a valid ROA authorizes the AS.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
