document: rfc-4250
kind: interoperability-note
summary: The encryption algorithm 'des-cbc' is listed as HISTORIC and is generally regarded as obsolete per FIPS-46-3. It is the one historic algorithm included in RFC 4250 solely for registry completeness; implementations should not use it.
section: 4.11.1
topics:
