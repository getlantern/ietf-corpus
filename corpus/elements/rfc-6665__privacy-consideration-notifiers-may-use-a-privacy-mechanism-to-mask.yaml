document: rfc-6665
kind: privacy-consideration
summary: 'Notifiers may use a privacy mechanism to mask authorization decisions: instead of revealing a rejection, a notifier sends 200 OK to the SUBSCRIBE and then sends a NOTIFY with neutral or fake state, hiding whether authorization was granted or denied from the subscriber.'
section: "6.2"
topics:
    - privacy
    - security
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
