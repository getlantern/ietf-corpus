document: rfc-9785
kind: normative-requirement
summary: If the DF algorithm values in the Ethernet Segment routes across PEs are inconsistent (e.g., a mix of Highest-Preference and Lowest-Preference, or one PE using a different algorithm), the DF election MUST fall back to the default (modulus-based) DF algorithm per RFC 7432.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
