summary: 'The ''site'' concept is ill-defined: it may map to security, reachability, routing, QoS, administrative, or funding boundaries, and scope cannot be mapped into concentric circles because scopes overlap and extend into one another, especially with mobile nodes, VPNs, and network merges.'
