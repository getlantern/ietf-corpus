document: rfc-2421
kind: protocol-element
summary: 'VPIM addresses use RFC 822 format with a numeric local part. Four forms are defined: plain mailbox number, mailbox+extension, +E.164 international number, and +E.164 number with PBX extension (e.g., +17035245550+230@ema.org). The ''+'' prefix signals E.164 format.'
section: 4.1.1
topics:
