document: rfc-3853
kind: normative-requirement
summary: Since SIP is 8-bit clean, all implementations MUST use 8-bit binary Content-Transfer-Encoding for S/MIME in SIP. Implementations MAY also be able to receive base-64 Content-Transfer-Encoding.
section: "3"
rfc2119_level: MUST
topics:
