document: rfc-8076
kind: normative-requirement
summary: Under USER-CHAIN-ACL, the store request MUST be denied if the signer's certificate username does not match a variable resource name pattern, or if the hashed Resource Name does not match the Resource-ID, or if access rights cannot be verified via ACL validation.
section: "6.6"
rfc2119_level: MUST
