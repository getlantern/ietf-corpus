document: rfc-3417
kind: security-consideration
summary: SNMPv1 by itself is not a secure environment; even on a network secured with IPSec, there is no control over which principals on that network may GET or SET MIB objects. Implementors are recommended to use the SNMPv3 User-based Security Model (RFC 3414) and the View-based Access Control Model (RFC 3415).
section: "12"
topics:
    - snmp
    - security
