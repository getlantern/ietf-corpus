document: rfc-5425
kind: normative-requirement
summary: Implementations MUST support certification path validation and MUST support matching a locally configured host name against a dNSName in the subjectAltName extension. Wildcard certificates (left-most label only) MUST be supported but MAY be disabled via configuration.
section: "5.2"
rfc2119_level: MUST
topics:
