document: rfc-2097
kind: design-rationale
summary: Controlling the multicast rate is important because some NetBIOS applications use multicasts to communicate, while other applications do not need multicasts at all. The Multicast-Filtering option allows negotiation to balance these requirements rather than imposing a fixed policy.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
