document: rfc-907
kind: protocol-element
summary: The GOPRI field (bits 12–13 of word 0) carries advisory information in SIMP-to-Host messages indicating the lowest priority currently being accepted by the SIMP. Hosts may optionally provide similar priority information to the SIMP to avoid originating messages that will be refused.
