document: rfc-5929
kind: protocol-element
summary: The 'tls-unique' channel binding type is defined as the first TLS Finished message sent (the Finished struct, not the record layer message) in the most recent TLS handshake of the TLS connection being bound. For full handshakes the client sends first; for abbreviated handshakes (session resumption) the server sends first.
section: "3.1"
topics:
    - tls
    - security
    - crypto
