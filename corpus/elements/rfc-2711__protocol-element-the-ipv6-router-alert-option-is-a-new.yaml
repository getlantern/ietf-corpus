document: rfc-2711
kind: protocol-element
summary: The IPv6 Router Alert Option is a new Hop-by-Hop Option type that signals transit routers to more closely examine the contents of a datagram. Its presence indicates the datagram may require special processing by routers along the path; its absence signals safe forwarding without further parsing.
section: "1.0"
topics:
