document: rfc-4174
kind: security-consideration
summary: When no DHCP security is used, there is a risk of distribution of false discovery information via a spoofed iSNS server. The primary countermeasure is authentication by the IP storage protocols (iFCP, iSCSI) discovered through iSNS. When this risk is significant, IPsec SAs SHOULD be used as specified in RFC 3723.
section: "3"
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
