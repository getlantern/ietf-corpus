document: rfc-6327
kind: normative-requirement
summary: On receipt of a TRILL LAN Hello, if Circuit Type is not 1, Area Address TLV is absent or not Area zero, Protocols Supported TLV lacks TRILL NLPID 0xC0, MT Port Capabilities TLV with VLAN-FLAGS is absent, maximumAreaAddresses is not 1, or IS-IS authentication fails, the PDU is discarded.
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
