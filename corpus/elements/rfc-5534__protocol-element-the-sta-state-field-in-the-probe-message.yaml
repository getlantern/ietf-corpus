document: rfc-5534
kind: protocol-element
summary: 'The Sta (State) field in the Probe message is a 2-bit field with three legal values: 0 (Operational) — sender believes both sides can communicate; 1 (Exploring) — sender has not seen traffic from recipient; 2 (InboundOk) — sender sees packets from recipient but recipient may not yet see packets from sender.'
section: "5.2"
topics:
