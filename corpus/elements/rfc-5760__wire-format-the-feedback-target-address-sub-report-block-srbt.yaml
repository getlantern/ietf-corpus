document: rfc-5760
kind: wire-format
summary: The Feedback Target Address sub-report block (SRBT 0=IPv4, 1=IPv6, 2=DNS) carries a 2-octet Port and variable-length Address (4 octets IPv4, 16 octets IPv6, or UTF-8 DNS name zero-padded to 32-bit boundary). A port value of 0 is invalid and MUST NOT be used.
section: 7.1.8
topics:
    - rtp
    - realtime
