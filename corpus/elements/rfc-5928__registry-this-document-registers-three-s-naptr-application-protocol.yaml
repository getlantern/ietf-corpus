document: rfc-5928
kind: registry
summary: 'This document registers three S-NAPTR application protocol tags: ''turn.udp'' (TURN over UDP), ''turn.tcp'' (TURN over TCP), and ''turn.tls'' (TURN over TLS). All three are used with the ''RELAY'' application service tag in NAPTR records to express TURN transport preferences.'
