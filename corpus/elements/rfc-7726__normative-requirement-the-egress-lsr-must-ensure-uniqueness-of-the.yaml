document: rfc-7726
kind: normative-requirement
summary: The egress LSR must ensure uniqueness of the <MPLS LSP, FEC, Remote Discriminator> tuple. A new BFD session is bootstrapped only when no local session corresponds to the remote discriminator received in the MPLS Echo request.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
