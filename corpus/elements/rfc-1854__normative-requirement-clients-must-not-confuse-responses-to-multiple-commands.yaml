document: rfc-1854
kind: normative-requirement
summary: Clients MUST NOT confuse responses to multiple commands with multiline responses. Each command requires one or more lines of response, where the last line does not contain a dash between the response code and string.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - email
