document: rfc-9776
kind: protocol-element
summary: The QRV (Querier's Robustness Variable) field carries the querier's Robustness Variable; if > 7, QRV is set to zero. Non-querier routers adopt the QRV from the most recently received Query as their own Robustness Variable, unless QRV was zero, in which case they use the default value.
section: 4.1.6
topics:
    - multicast
