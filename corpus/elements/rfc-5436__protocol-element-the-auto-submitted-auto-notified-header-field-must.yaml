document: rfc-5436
kind: protocol-element
summary: 'The ''Auto-Submitted: auto-notified'' header field MUST include at least one of two parameters: ''owner-email'' (a quoted addr-spec identifying the Sieve script owner) or ''owner-token'' (an opaque token allowing owner identification while protecting privacy). It is treated as a trace field, placed above any ''Received:'' fields copied from the triggering message.'
section: 2.7.1
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
