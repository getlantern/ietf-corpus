document: rfc-5085
kind: normative-requirement
summary: When LSP Ping is used as CV Type, the LSP Ping header MUST be used per RFC 4379 and MUST contain the target FEC Stack with the appropriate sub-TLV (sub-Type 8, 9, 10, or 11) to identify the PW to be verified.
section: 5.2.2
rfc2119_level: MUST
