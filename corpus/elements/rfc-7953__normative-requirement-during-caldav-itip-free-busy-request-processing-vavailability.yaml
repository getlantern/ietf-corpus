document: rfc-7953
kind: normative-requirement
summary: During CalDAV iTIP free-busy request processing, VAVAILABILITY components from all contributing calendar collections AND from the CALDAV:calendar-availability property on the targeted user's Inbox MUST all be included in the free-busy calculation.
section: 7.2.5
rfc2119_level: MUST
