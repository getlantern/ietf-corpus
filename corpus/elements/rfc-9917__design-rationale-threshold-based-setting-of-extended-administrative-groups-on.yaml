document: rfc-9917
kind: design-rationale
summary: Threshold-based setting of Extended Administrative Groups on links should use hysteresis (higher threshold to set, lower to unset) and IGP throttling mechanisms to avoid excessive LSP/LSA flooding and constant Flex-Algorithm recalculation when link quality fluctuates near a boundary.
