document: rfc-6080
kind: security-consideration
summary: The local-network profile enrollment uses an anonymous From address and is accessible without credentials, making it vulnerable to unauthorized data collection. Providers SHOULD limit the information in local-network profiles to what is safe to expose to any device on the network.
section: "9.1"
topics:
    - sip
    - security
