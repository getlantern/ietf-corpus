document: rfc-7044
kind: protocol-element
summary: The 'histinfo' SIP option tag is defined. A UAC includes it in the Supported header field to signal willingness to receive History-Info in responses. It is never used in Require or Proxy-Require because History-Info support is optional.
section: "14.1"
