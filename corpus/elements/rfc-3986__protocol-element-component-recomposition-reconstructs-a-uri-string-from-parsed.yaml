document: rfc-3986
kind: protocol-element
summary: 'Component recomposition reconstructs a URI string from parsed components: scheme+":", then "//"+authority if defined, then path, then "?"+query if defined, then "#"+fragment if defined. An undefined component (no delimiter) differs from an empty component (delimiter present).'
section: "5.3"
