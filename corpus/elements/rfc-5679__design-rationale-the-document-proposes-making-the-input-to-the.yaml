document: rfc-5679
kind: design-rationale
summary: The document proposes making the input to the DDDS First Well Known Rule dynamic (based on resolver search path) rather than fixed, because a Mobility Server will not necessarily host all three MIH services together, requiring independent discovery of each service type.
