document: rfc-3720
kind: protocol-element
summary: The CmdSN/ExpCmdSN/MaxCmdSN triple implements session-wide command flow control. CmdSN is a 32-bit counter advanced by 1 per non-immediate command; MaxCmdSN minus ExpCmdSN plus 1 defines the target's command receive window; immediate commands carry the current CmdSN but do not advance it.
section: 3.2.2.1
topics:
    - tcp
