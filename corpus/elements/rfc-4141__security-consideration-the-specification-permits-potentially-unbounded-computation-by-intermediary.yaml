document: rfc-4141
kind: security-consideration
summary: The specification permits potentially unbounded computation by intermediary MTAs for content conversion. This could enable denial-of-service attacks, since Internet mail typically allows intermediaries to receive messages from all Internet sources.
section: "10"
topics:
    - email
    - security
