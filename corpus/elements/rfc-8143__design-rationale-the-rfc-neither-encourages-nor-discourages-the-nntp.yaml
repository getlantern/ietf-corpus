document: rfc-8143
kind: design-rationale
summary: 'The RFC neither encourages nor discourages the NNTP COMPRESS extension (RFC 8054) because it has slightly stronger security properties than TLS-level compression: NNTP compression can be activated after authentication, reducing the risk of credential leakage via CRIME-style attacks.'
section: "3.1"
topics:
    - tls
    - security
