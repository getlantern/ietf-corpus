document: rfc-6604
kind: protocol-element
summary: An xNAME chain is a series of one or more xNAMEs each of which refers to another xNAME except the last, which refers to a non-xNAME or results in an error. Chains may cross multiple authoritative zones and involve multiple query cycles.
