document: rfc-6575
kind: normative-requirement
summary: When the local CE generates an ARP request, the PE MUST proxy the ARP response using its own MAC address as the source hardware address and the remote CE IP as the source protocol address, and MUST respond only to ARP requests whose destination protocol address matches the remote CE IP.
section: 4.2.1
rfc2119_level: MUST
topics:
    - vpn
