document: rfc-4227
kind: interoperability-note
summary: RFC 3288 used the profile URI 'http://iana.org/beep/soap' for SOAP 1.1. Implementations supporting SOAP 1.1 should recognize both that legacy URI and 'http://iana.org/beep/soap/1.1' for backward compatibility.
section: "2"
