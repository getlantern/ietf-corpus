document: rfc-7659
kind: design-rationale
summary: NATV2-MIB replaces NAT-MIB (RFC 4008) because NAT-MIB did not fit well with existing NAT implementations and was not itself much implemented. RFC 7658 provides a detailed analysis of its deficiencies. NATV2-MIB is intentionally not backwards compatible.
section: "2"
topics:
    - nat
    - snmp
