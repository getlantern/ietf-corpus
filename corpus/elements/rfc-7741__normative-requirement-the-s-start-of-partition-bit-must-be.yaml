document: rfc-7741
kind: normative-requirement
summary: The S (start of partition) bit MUST be set to 1 for the first packet of each encoded frame. It SHOULD be set to 1 when the first payload octet begins a new VP8 partition, and MUST NOT be 1 otherwise.
section: "4.2"
rfc2119_level: MUST
topics:
