document: rfc-868
kind: security-consideration
summary: RFC 868 includes no security considerations section and provides no authentication, integrity protection, or confidentiality for the time value. A network-level adversary can forge or replay time responses to manipulate a host's clock. The protocol should be used only in trusted network environments.
topics:
    - security
