summary: 'IPv6 MPLS tunnel support in this MIB follows the approach of RFC 4990: a 32-bit LSR ID (not a full IPv6 address) is used as the ingress/egress identifier in all tables, maintaining compatibility with existing 32-bit index fields in mplsTunnelTable.'
