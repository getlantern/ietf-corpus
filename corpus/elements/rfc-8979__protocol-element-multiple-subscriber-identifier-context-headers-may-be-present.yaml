document: rfc-8979
kind: protocol-element
summary: Multiple Subscriber Identifier Context Headers MAY be present in the NSH simultaneously, each carrying a distinct opaque value but all pointing to the same subscriber. This supports environments where different SFs use different identifier types (e.g., IP address vs. non-IP identifiers).
section: "3"
topics:
