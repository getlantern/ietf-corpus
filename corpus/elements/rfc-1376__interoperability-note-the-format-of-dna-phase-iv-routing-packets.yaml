document: rfc-1376
kind: interoperability-note
summary: The format of DNA Phase IV Routing packets over PPP is the same as the format used over Ethernet, without the Ethernet header, Pad, and FCS fields. This approach treats the serial link as an Ethernet rather than using DDCMP with different control messages.
