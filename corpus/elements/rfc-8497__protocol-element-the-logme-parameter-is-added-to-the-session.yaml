document: rfc-8497
kind: protocol-element
summary: The 'logme' parameter is added to the Session-ID header field (RFC 7989) to mark SIP signaling as being of interest to logging. The parameter carries no device-specific or user-specific information and is designed to pass through B2BUAs and other intermediaries end to end.
section: "3.1"
topics:
    - sip
    - realtime
