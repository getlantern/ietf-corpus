document: rfc-3273
kind: normative-requirement
summary: mediaIndependentDataSource and other read-create configuration objects in the mediaIndependentTable may not be modified if the associated mediaIndependentStatus object is equal to active(1). This row-creation pattern is used consistently across all configurable tables in the MIB.
