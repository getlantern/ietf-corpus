document: rfc-2597
kind: interoperability-note
summary: The recommended AF codepoint mappings do not interfere with the local use spaces nor the Class Selector codepoints defined in RFC 2474. The Default PHB codepoint '000000' may continue to be used for best-effort traffic, and '11x000' may remain for network control traffic.
