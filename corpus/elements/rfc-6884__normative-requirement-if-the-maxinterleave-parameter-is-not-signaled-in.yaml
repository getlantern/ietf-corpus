document: rfc-6884
kind: normative-requirement
summary: If the maxinterleave parameter is not signaled in SDP, the maximum interleaving length MUST be 5. The interleaving lengths used in the entire session MUST NOT exceed the negotiated maxinterleave value.
section: 9.1.1
rfc2119_level: MUST
