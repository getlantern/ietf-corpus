document: rfc-3747
kind: normative-requirement
summary: When a configuration template is activated on an interface, it MUST be cloned so that the original template remains available for reuse. The cloning process must generate new indices for each element and update all NEXT RowPointers accordingly; the original pointers must not be reused.
section: "6"
rfc2119_level: MUST
topics:
    - diffserv
    - snmp
