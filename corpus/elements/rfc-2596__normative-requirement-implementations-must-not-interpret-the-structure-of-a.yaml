document: rfc-2596
kind: normative-requirement
summary: Implementations MUST NOT interpret the structure of a language code when comparing two codes, and MUST treat them as simply strings of characters. Client and server implementations MUST allow any arbitrary string following RFC 1766 patterns to be used as a language code.
section: "2"
rfc2119_level: MUST NOT
topics:
    - ldap
