document: rfc-8840
kind: normative-requirement
summary: Agents initiating Trickle ICE without an SDP Answer (via provisional response without Answer) MUST retransmit these responses with exponential backoff timers per RFC 3262, ceasing on receipt of an in-dialog request or on transmission of the 2xx Answer.
section: 4.3.3
rfc2119_level: MUST
topics:
    - sip
    - webrtc
