document: rfc-5518
kind: normative-requirement
summary: If the RDATA in a DNS TXT record contains multiple character-strings (per RFC 1035 Section 3.3), the code handling the DNS reply MUST assemble all those text blocks into a single string before any syntactic verification takes place.
section: "5"
rfc2119_level: MUST
topics:
    - email
    - dns
