kind: wire-format
summary: The AttributeCertificate is a SEQUENCE of acinfo (AttributeCertificateInfo), signatureAlgorithm (AlgorithmIdentifier), and signatureValue (BIT STRING). The AttributeCertificateInfo contains version, holder, issuer, signature, serialNumber, attrCertValidityPeriod, attributes, and optional issuerUniqueID and extensions fields.
