document: rfc-9516
kind: wire-format
summary: 'The Reply Service Function Path TLV (Type=3) carries: Reply SFP (1-octet, value 3), Reserved (1-octet), Length (2-octet, MUST equal 4), Reply Service Function Path Identifier (3-octet SFP identifier), and Service Index (1-octet). The TLV specifies the return SFP over which the Echo Reply should be transmitted.'
section: 6.5.1
topics:
    - routing
