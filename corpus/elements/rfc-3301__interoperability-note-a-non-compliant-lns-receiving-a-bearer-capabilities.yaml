document: rfc-3301
kind: interoperability-note
summary: A non-compliant LNS receiving a Bearer Capabilities AVP with the B bit set will treat it as an unrecognized AVP and fail tunnel establishment with Result Code 2, Error Code 3 ('Reserved field was non-zero'), preventing silent misoperation.
section: "5.3"
