document: rfc-9135
kind: security-consideration
summary: EVPN RT-5 uses an Overlay Index requiring recursive resolution to an EVPN RT-2 route. Any action that filters or modifies the RT-2 route used as the Overlay Index will affect RT-5 resolution and therefore forwarding of packets to remote subnets.
section: "10"
topics:
    - security
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
