document: rfc-7655
kind: design-rationale
summary: Because G.711.0 is both lossless and stateless, it can be applied transparently multiple times on individual hops between G.711 endpoints; multiple lossless transcodes do not degrade voice quality, unlike lossy codec transcodes.
