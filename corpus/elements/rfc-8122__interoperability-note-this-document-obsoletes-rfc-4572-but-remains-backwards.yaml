document: rfc-8122
kind: interoperability-note
summary: This document obsoletes RFC 4572 but remains backwards compatible with older implementations. Key changes include clarified handling of multiple fingerprints, updated preferred hash from SHA-1 to SHA-256, and deprecation of MD2 and MD5.
