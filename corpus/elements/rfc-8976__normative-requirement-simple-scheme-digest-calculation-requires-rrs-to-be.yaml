document: rfc-8976
kind: normative-requirement
summary: SIMPLE scheme digest calculation requires RRs to be processed in DNSSEC canonical on-the-wire format (no name compression) per RFC 4034 Sections 6.1–6.3, with RRsets sharing the same owner name additionally ordered numerically ascending by RR TYPE.
section: 3.3.1.2
rfc2119_level: MUST
topics:
