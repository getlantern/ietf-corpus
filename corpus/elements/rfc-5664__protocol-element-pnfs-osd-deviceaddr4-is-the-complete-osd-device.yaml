document: rfc-5664
kind: protocol-element
summary: 'pnfs_osd_deviceaddr4 is the complete OSD device address: a discriminated union for the SCSI target (anonymous, SCSI name string, or SCSI device ID opaque), an optional netaddr4 for the network endpoint, oda_lun[8] (SAM-3 64-bit LUN), opaque oda_systemid<>, root object credentials oda_root_obj_cred, and opaque oda_osdname<>.'
section: "4.2"
