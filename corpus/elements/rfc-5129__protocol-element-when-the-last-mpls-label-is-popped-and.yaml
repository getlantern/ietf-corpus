document: rfc-5129
kind: protocol-element
summary: When the last MPLS label is popped and the IP header is to carry ECN onward, the IP ECN field is set to CE if the EXP field was CM. If the EXP field was Not-CM, the IP ECN field remains unchanged regardless of its current value (Not-ECT, ECT(0), ECT(1), or CE).
section: "4.6"
topics:
    - mpls
    - ecn
    - congestion
