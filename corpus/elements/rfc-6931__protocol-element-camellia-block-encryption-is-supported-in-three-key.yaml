document: rfc-6931
kind: protocol-element
summary: Camellia block encryption is supported in three key sizes via 'xmldsig-more#camellia128-cbc', '#camellia192-cbc', and '#camellia256-cbc'. It uses 128-bit block size, CBC mode with a 128-bit IV prepended to the ciphertext, then base64-encoded — identical to AES usage in XML Encryption.
section: 2.6.2
topics:
    - crypto
    - security
