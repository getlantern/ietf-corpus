document: rfc-8611
kind: normative-requirement
summary: For each LAG member link, the responder MUST add a Local Interface Index Sub-TLV with the LAG Member Link Indicator flag set, and MUST add a Multipath Data Sub-TLV if multipath information was requested in the received DDMAP TLV.
