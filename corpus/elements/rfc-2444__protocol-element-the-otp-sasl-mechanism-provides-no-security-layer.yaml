document: rfc-2444
kind: protocol-element
summary: The OTP SASL mechanism provides no security layer. The client initiates by sending an authorization identity (up to 255 octets, NUL-terminated) followed by an authentication identity (up to 255 octets). The server responds with an OTP challenge.
