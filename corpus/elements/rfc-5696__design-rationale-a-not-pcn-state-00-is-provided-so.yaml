document: rfc-5696
kind: design-rationale
summary: A not-PCN state (00) is provided so that non-PCN traffic can share a PCN-compatible DSCP; since PCN redefines the ECN field meaning for that DSCP, operators still need a way to distinguish non-PCN-capable packets.
