document: rfc-7904
kind: security-consideration
summary: Fork bombs (DoS via SIP forking amplification) are a lower concern in RELOAD SIP than in conventional SIP proxy infrastructure because the calling party is involved in each retargeting event and can directly measure and throttle the number of forks.
section: 8.2.1
topics:
