document: rfc-9179
kind: interoperability-note
summary: W3C Geolocation API values can be mapped to the YANG grouping with potential precision loss. Only YANG values for Earth using 'wgs-84' as geodetic-datum can be directly mapped back to W3C values, as W3C lacks support for non-Earth bodies or alternate systems.
section: 5.1.2
topics:
    - yang
    - netconf
