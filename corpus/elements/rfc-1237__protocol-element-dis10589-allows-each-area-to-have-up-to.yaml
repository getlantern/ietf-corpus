document: rfc-1237
kind: protocol-element
summary: DIS10589 allows each area to have up to a maximum of three area addresses (an architectural constant per Clause 7.2.11 and Table 2 of Clause 7.5.1). This enables graceful area renaming, merging, and partitioning by temporarily maintaining multiple addresses before removing old ones.
