document: rfc-8628
kind: design-rationale
summary: The device authorization grant requires only a one-way communication channel (device to authorization server) to maximize viability in restricted environments such as TV applications capable of only outbound requests. A return channel from the authorizing device to the OAuth client device, if it exists, may be used as an alternative to polling but is outside the scope of this specification.
section: "3.5"
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
