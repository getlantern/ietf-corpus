document: rfc-5652
kind: normative-requirement
summary: The AuthAttributes structure MUST be DER encoded. If authAttrs is present it MUST contain at minimum a content-type attribute and a message-digest attribute; authAttrs MUST be present when the EncapsulatedContentInfo content type is not id-data, and if present, digestAlgorithm MUST also be present.
section: "9.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
