document: rfc-8323
kind: protocol-element
summary: The Max-Message-Size Option (CSM option number 2) indicates the maximum message size in bytes the sender can receive. Its base value is 1152. Values greater than 1152 in combination with Block-Wise-Transfer Option also signal BERT support.
