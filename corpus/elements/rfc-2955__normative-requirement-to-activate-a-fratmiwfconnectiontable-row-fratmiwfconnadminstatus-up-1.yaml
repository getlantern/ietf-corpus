document: rfc-2955
kind: normative-requirement
summary: To activate a frAtmIwfConnectionTable row (frAtmIwfConnAdminStatus = up(1)), the OperStatus/AdminStatus of the corresponding endpoints MUST be up(1). Conversely, to deactivate, the atmVclAdminStatus of the ATM endpoint MUST be down(2) before the deactivation completes.
section: "4.1"
rfc2119_level: MUST
topics:
