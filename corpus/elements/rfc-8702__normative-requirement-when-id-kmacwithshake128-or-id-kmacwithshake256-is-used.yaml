document: rfc-8702
kind: normative-requirement
summary: When id-KmacWithSHAKE128 or id-KmacWithSHAKE256 is used as the MAC algorithm identifier, the parameters field is OPTIONAL. If absent, the SHAKE output length used in KMAC is 32 or 64 bytes respectively, and the customization string defaults to an empty string.
section: "3.4"
rfc2119_level: OPTIONAL
topics:
