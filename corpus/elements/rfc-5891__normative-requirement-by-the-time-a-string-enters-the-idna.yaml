document: rfc-5891
kind: normative-requirement
summary: By the time a string enters the IDNA registration process, it MUST be in Unicode and in Normalization Form C (NFC). Registries MUST accept only the exact string for which registration is requested, free of any mappings or local adjustments.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
