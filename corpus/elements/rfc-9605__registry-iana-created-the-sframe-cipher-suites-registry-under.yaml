document: rfc-9605
kind: registry
summary: IANA created the 'SFrame Cipher Suites' registry under the 'SFrame' group. The cipher suite field is 2 bytes (0x0000-0xFFFF); 0x0000 is reserved, 0x0001-0x0005 are initial recommended entries, 0xF000-0xFFFF are reserved for private use. New assignments require Specification Required; setting Recommended to 'Y' or 'D' requires Standards Action.
section: "8.1"
topics:
    - registry
    - security
    - realtime
    - crypto
