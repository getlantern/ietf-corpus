document: rfc-6605
kind: wire-format
summary: ECDSA public key (Q) is stored in DNSKEY RRs as an uncompressed curve point in the form 'x | y' — a simple bit string with no compression indicator byte. For P-256 this is 64 octets; for P-384 it is 96 octets.
