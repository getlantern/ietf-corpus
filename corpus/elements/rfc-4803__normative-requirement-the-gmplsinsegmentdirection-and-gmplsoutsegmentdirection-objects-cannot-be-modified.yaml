document: rfc-4803
kind: normative-requirement
summary: The gmplsInSegmentDirection and gmplsOutSegmentDirection objects cannot be modified when the corresponding mplsInSegmentRowStatus or mplsOutSegmentRowStatus is active(1). Similarly, no objects in a gmplsLabelEntry (except gmplsLabelRowStatus and gmplsLabelStorageType) can be modified when the row is active(1).
section: "7"
rfc2119_level: MUST NOT
topics:
    - mpls
