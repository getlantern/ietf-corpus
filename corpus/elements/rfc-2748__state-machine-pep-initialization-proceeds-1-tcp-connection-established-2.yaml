document: rfc-2748
kind: state-machine
summary: 'PEP initialization proceeds: (1) TCP connection established, (2) optional security negotiation via Client-Type=0 OPN/CAT, (3) PEP sends OPN per supported client-type, (4) PDP responds with CAT (accepted) or CC (rejected, possibly with redirect). After CAT, PEP may begin issuing REQ messages.'
