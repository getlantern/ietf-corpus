document: rfc-5666
kind: protocol-element
summary: The Connection Configuration Protocol (RPC program 100417, VERS1) provides a single CONF_RDMA procedure. The client sends maxcall_sendsize, maxreply_sendsize, and maxrdmaread; the server returns its accepted maxcall_sendsize, alignment recommendation, and maxrdmaread. Use is OPTIONAL.
section: "6.2"
