document: rfc-3597
kind: wire-format
summary: Unknown RR type text representation uses 'TYPE' immediately followed by the decimal type number (no whitespace) in the type field, and 'CLASS' followed by the decimal class number in the class field. The RDATA is encoded as the special token '\#', an unsigned decimal integer for the RDATA length in octets, and zero or more whitespace-separated hexadecimal words each with an even number of hex digits.
section: "5"
