document: rfc-4583
kind: interoperability-note
summary: BFCP clients and floor control servers follow the rules in RFC 4572 regarding certificate choice and presentation for TLS connections established via the offer/answer model. SIP with S/MIME provides the initial integrity-protected channel for exchanging self-signed certificates.
