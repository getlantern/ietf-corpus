document: rfc-6145
kind: wire-format
summary: 'IPv6 Fragment Header fields when added during IPv4-to-IPv6 translation: Next Header in IPv6 header = 44 (Fragment); Fragment Header Next Header = ICMPv6(58) or copied protocol; Fragment Offset copied from IPv4; M flag copied from IPv4 MF bit; Identification = low-order 16 bits of IPv4 Identification field, high-order 16 bits set to zero.'
section: "4.1"
topics:
