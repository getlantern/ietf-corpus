document: rfc-6926
kind: interoperability-note
summary: The 2-octet message-size TCP framing is not compatible with the UDP message format; a TCP-framed request sent as a UDP datagram will have all DHCPv4 protocol fields offset by two bytes and will likely be invalid.
section: "5"
topics:
