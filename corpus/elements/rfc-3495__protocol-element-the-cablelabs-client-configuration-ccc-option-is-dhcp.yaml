document: rfc-3495
kind: protocol-element
summary: The CableLabs Client Configuration (CCC) option is DHCP option code 122. It uses a tag-length-value format where the tag is code 122, followed by a length octet (not counting itself or the tag), followed by sub-option content. Both CM and MTA DHCP clients request this option.
