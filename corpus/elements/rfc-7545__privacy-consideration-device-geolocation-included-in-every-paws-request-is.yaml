document: rfc-7545
kind: privacy-consideration
summary: Device geolocation included in every PAWS request is sensitive personal-location data. HTTPS (TLS) protects it from eavesdropping. Implementors should be aware that geolocation data can reveal a user's location and movement patterns, and databases should limit retention and use of this data.
section: "10.3"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
