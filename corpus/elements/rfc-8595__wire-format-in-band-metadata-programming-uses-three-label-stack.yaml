document: rfc-8595
kind: wire-format
summary: 'In-band metadata programming uses three label stack entries after the SFC unit: Extension Label (value 15), Metadata Present Indicator (MPI, value 17), and a Metadata Label. Metadata is formatted as a TLV with 16-bit Length, 16-bit Metadata Type (from NSH MD Types registry), and variable-length Metadata padded to a 4-octet boundary.'
section: "12.2"
