document: rfc-1730
kind: protocol-element
summary: The CAPABILITY command causes the server to return a single untagged CAPABILITY response with 'IMAP4' as the first listed capability before the tagged OK. Capabilities other than 'IMAP4' refer to extensions or amendments; no capability is enabled without explicit client action.
section: 6.1.1
