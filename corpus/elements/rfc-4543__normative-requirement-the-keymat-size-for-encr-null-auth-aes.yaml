document: rfc-4543
kind: normative-requirement
summary: The KEYMAT size for ENCR_NULL_AUTH_AES_GMAC and AUTH_AES_GMAC MUST be four octets longer than the AES key size, with the trailing four octets used as the nonce salt value (20, 28, or 36 octets for 128-, 192-, or 256-bit keys respectively).
section: "5.4"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
