document: rfc-6565
kind: normative-requirement
summary: OSPFv3 sham link endpoint addresses MUST be configured (they cannot default to the 32-bit Router ID as in OSPFv2) and MUST be distributed by BGP as routable VPN IPv6 addresses with a 128-bit prefix length.
