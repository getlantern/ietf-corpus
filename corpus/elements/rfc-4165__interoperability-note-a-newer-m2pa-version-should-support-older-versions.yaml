document: rfc-4165
kind: interoperability-note
summary: A newer M2PA version SHOULD support older versions and refrain from sending messages an older version cannot process. If a Link Status Alignment message with an unsupported version is received, the receiver SHOULD reply with Link Status Out of Service and not complete alignment.
section: 4.1.9
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
