document: rfc-8797
kind: normative-requirement
summary: If the RPC-over-RDMA version 1 CM Private Data Format Identifier is not found in the received Private Data buffer, an RPC-over-RDMA version 1 receiver MUST behave as if no RPC-over-RDMA version 1 CM Private Data has been provided.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
