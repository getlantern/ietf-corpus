document: rfc-6327
kind: security-consideration
summary: 'This document improves the description of four aspects of the TRILL LAN Hello protocol and does not change the security considerations of the TRILL base protocol. Security considerations from RFC 6325 Section 6 apply, including the use of IS-IS authentication on links: Hellos failing authentication are discarded.'
