document: rfc-6146
kind: normative-requirement
summary: For incoming IPv4 UDP packets with a zero checksum, the NAT64 MUST reassemble fragments and calculate the UDP checksum if resources permit; otherwise it MUST silently discard the packets. This behavior deviates from RFC 6145.
section: "3.4"
rfc2119_level: MUST
topics:
    - nat
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
