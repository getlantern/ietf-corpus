document: rfc-9454
kind: design-rationale
summary: OSPF terminology is updated to replace 'master/slave' with 'Leader/Follower' to align with inclusive language guidelines designated by the IETF, specifically the NIST guidance (NISTIR 8366). The protocol operation is not modified by these terminology changes.
