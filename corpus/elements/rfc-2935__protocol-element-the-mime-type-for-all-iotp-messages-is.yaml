document: rfc-2935
kind: protocol-element
summary: The MIME type for all IOTP messages is APPLICATION/IOTP. The experimental type APPLICATION/X-IOTP has been used for development and SHOULD also be recognized. No content-transfer-encoding is required for HTTP transport.
section: "4.1"
rfc2119_level: SHOULD
