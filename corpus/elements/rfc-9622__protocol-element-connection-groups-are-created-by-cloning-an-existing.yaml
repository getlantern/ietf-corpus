document: rfc-9622
kind: protocol-element
summary: Connection Groups are created by cloning an existing Connection (Connection.Clone()), which produces a new Connection sharing Transport Properties, Security Parameters, and scheduling context with the original. Multistream transports may map grouped Connections to streams of a single underlying transport connection.
section: "7.4"
