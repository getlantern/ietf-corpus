document: rfc-3321
kind: protocol-element
summary: 'Checkpoint state: a compressor designates a state as a checkpoint by setting its state_retention_priority to the highest value it has sent. A checkpoint state must be explicitly acknowledged by the decompressor, providing a reliable fallback to prevent decompression failures when states are lost or evicted due to memory pressure.'
section: "5.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
