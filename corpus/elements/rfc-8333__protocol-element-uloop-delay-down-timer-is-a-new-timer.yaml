document: rfc-8333
kind: protocol-element
summary: ULOOP_DELAY_DOWN_TIMER is a new timer introduced by this document used to slow down local node convergence in case of link-down events. Its value should be set according to the maximum IGP convergence time observed in the network.
section: "5.1"
topics:
    - routing
