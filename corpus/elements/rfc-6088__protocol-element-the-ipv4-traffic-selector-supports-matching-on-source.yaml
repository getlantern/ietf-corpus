document: rfc-6088
kind: protocol-element
summary: The IPv4 traffic selector supports matching on source/destination IPv4 address ranges (32-bit each), IPsec SPI ranges (32-bit), source/destination TCP/UDP port ranges (16-bit), differentiated services ranges (8-bit), and IP protocol number ranges (8-bit). All fields are optional and their presence is indicated by per-field flags A through N.
section: "3.1"
topics:
