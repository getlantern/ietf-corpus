document: rfc-7924
kind: security-consideration
summary: 'If an attacker injects a forged fingerprint, two outcomes arise: (1) the fingerprint maps to no cached state and the server falls back to a full exchange, or (2) the fingerprint maps to data the client has not cached, causing a signature verification failure that aborts the handshake.'
