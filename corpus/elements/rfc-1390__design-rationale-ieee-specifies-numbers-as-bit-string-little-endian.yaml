document: rfc-1390
kind: design-rationale
summary: IEEE specifies numbers as bit-string little-endian (least significant bit first), while Internet protocols are documented in big-endian order. An appendix provides a conversion table for all relevant constants (UI, SAP for SNAP, XID, TEST, etc.) to avoid confusion between the two conventions.
section: Appendix on Numbers
topics:
    - ip
