document: rfc-2002
kind: design-rationale
summary: Foreign agent care-of address mode is preferred over co-located care-of address because it allows many mobile nodes to share a single IP address, reducing pressure on the limited IPv4 address space. Co-located addresses require maintaining per-foreign-subnet address pools, which is difficult to manage efficiently.
section: "1.7"
topics:
    - ip
