document: rfc-1596
kind: interoperability-note
summary: Frame Relay Service interfaces use ifType value 44 (frameRelayService). Each FR logical port is represented as an ifEntry. The ifTable and ifStackTable from MIB-II must be used alongside this MIB; frame counts per virtual connection are outside ifTable scope and are handled in this MIB module.
section: "3.3"
topics:
    - routing
