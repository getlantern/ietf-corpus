document: rfc-8724
kind: security-consideration
summary: A buffer reservation attack sends many fragments with distinct DTag values, exhausting reassembler memory. Receivers that are under-resourced MUST respond with a SCHC Receiver-Abort or MUST silently drop messages they cannot process, to avoid unbounded resource consumption.
section: 12.2.1
topics:
    - security
    - ip
