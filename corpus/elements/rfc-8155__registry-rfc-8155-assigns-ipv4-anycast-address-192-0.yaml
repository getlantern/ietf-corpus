document: rfc-8155
kind: registry
summary: RFC 8155 assigns IPv4 anycast address 192.0.0.10/32 ('Traversal Using Relays around NAT Anycast') in the IANA IPv4 Special-Purpose Address Registry (RFC 6890). The address is globally routable, forwardable, and has no termination date.
section: "8.1"
