document: rfc-7915
kind: protocol-element
summary: 'ICMPv4 query messages are translated as follows: Echo (Type 8) and Echo Reply (Type 0) are mapped to ICMPv6 Types 128 and 129 respectively. ICMPv4 Information Request/Reply (Types 15/16), Timestamp (Types 13/14), Address Mask (Types 17/18), Router Advertisement (Type 9), Router Solicitation (Type 10), IGMP, and unknown ICMPv4 types are all silently dropped.'
section: "4.2"
topics:
