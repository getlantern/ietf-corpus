document: rfc-2422
kind: protocol-element
summary: The MIME sub-type audio/32KADPCM holds binary audio data encoded in 32 kbit/s ADPCM exactly as defined by ITU-T Recommendation G.726. No header information shall be included as part of the audio data; content transfer encoding is typically binary or base64.
section: "3.1"
topics:
    - realtime
