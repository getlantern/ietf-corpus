document: rfc-8279
kind: normative-requirement
summary: For each sub-domain to which a BFR belongs and in which it may act as BFIR or BFER, the BFR MUST be provisioned with a BFR-id that is unique within that sub-domain. Each BFR MUST also be assigned a single BFR-prefix per sub-domain, which MUST be routable in that sub-domain.
section: "2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
