document: rfc-7666
kind: normative-requirement
summary: Changes to vmPerVMNotificationsEnabled and vmBulkNotificationsEnabled MUST NOT persist across re-initialization of the management system (e.g., SNMP agent). If per-VM notifications are not implemented, vmPerVMNotificationsEnabled MUST report false(2); similarly for vmBulkNotificationsEnabled.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
