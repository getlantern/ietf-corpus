document: rfc-9928
kind: protocol-element
summary: The DHCPv4-over-DHCPv6 Relay Agent (4o6RA) is a new relay agent role that performs DHCPv4-over-DHCPv6 encapsulation and decapsulation on behalf of legacy IPv4-only clients, which are unaware that their DHCPv4 messages are being transported over DHCPv6. The 4o6RA acts as a DHCP 4o6 client toward the DHCPv6 network, satisfying all RFC 7341 client prerequisites.
section: "3"
topics:
