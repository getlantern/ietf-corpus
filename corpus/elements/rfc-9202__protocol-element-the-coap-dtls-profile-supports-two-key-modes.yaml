document: rfc-9202
kind: protocol-element
summary: 'The coap_dtls profile supports two key modes: Raw Public Key (RPK) mode using asymmetric keys per RFC 7250, and Pre-Shared Key (PSK) mode using symmetric keys per RFC 4279. Both use CoAP over DTLS 1.2 or later for communication between the client and resource server.'
