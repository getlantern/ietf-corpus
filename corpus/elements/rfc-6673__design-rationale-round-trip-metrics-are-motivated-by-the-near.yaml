document: rfc-6673
kind: design-rationale
summary: Round-trip metrics are motivated by the near-universal need for two-way communication (e.g., TCP three-way handshake) and the practical simplicity of echo-based test systems; they provide a basis for inferring application performance more easily than one-way measurements.
