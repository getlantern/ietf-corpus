document: rfc-7591
kind: normative-requirement
summary: A software statement presented to an authorization server MUST be digitally signed or MACed using JSON Web Signature (JWS) and MUST contain an 'iss' (issuer) claim. It is RECOMMENDED that software statements be signed using the 'RS256' algorithm.
section: "2.3"
rfc2119_level: MUST
topics:
    - oauth
    - jose
    - crypto
