document: rfc-1212
kind: protocol-element
summary: The DEFVAL clause specifies an acceptable default value the agent may use when creating a columnar object instance not supplied in the Set-PDU operands. This clause enables the third row-creation paradigm where the agent fills in unspecified columns.
section: 4.1.7
