document: rfc-8046
kind: privacy-consideration
summary: Advertising IP addresses in LOCATOR_SET parameters may expose a host's location even when the host uses a VPN or virtual interface for privacy. Implementations SHOULD provide a mechanism for the administrator to block exposure of selected addresses or address ranges.
section: "6.4"
topics:
    - privacy
    - ip
    - mobility
