document: rfc-4572
kind: normative-requirement
summary: Self-signed certificates MUST use one of the FIPS 180 algorithms (SHA-1, SHA-224, SHA-256, SHA-384, or SHA-512) as their signature algorithm, and thus also MUST use one of these to calculate certificate fingerprints.
