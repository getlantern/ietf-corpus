summary: The RTCP IDMS Settings Packet (PT=211) is 7 32-bit words containing a standard RTCP header (V=2, P, Reserved, PT=211, length, SSRC of packet sender) followed by SSRC of media source (32 bits), Media Stream Correlation Identifier (32 bits), Packet Received NTP timestamp (64 bits), Packet Received RTP timestamp (32 bits), and Packet Presented NTP timestamp (64 bits).
