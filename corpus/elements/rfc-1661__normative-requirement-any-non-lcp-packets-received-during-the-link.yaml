document: rfc-1661
kind: normative-requirement
summary: Any non-LCP packets received during the Link Establishment phase MUST be silently discarded. Similarly, during the Link Termination phase, any non-LCP packets received MUST be silently discarded.
section: "3.4"
rfc2119_level: MUST
