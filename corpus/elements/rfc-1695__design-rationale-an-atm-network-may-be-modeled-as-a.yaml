document: rfc-1695
kind: design-rationale
summary: An ATM network may be modeled as a single large distributed switch by hiding all internal connectivity, enabling Customer Network Management (CNM) without exposing internal topology. This justifies implementing both link and cross-connect groups in carrier networks.
