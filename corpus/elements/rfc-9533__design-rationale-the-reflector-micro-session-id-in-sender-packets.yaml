document: rfc-9533
kind: design-rationale
summary: The Reflector Micro-session ID in sender packets allows the Session-Reflector to validate that test packets arrive on the correct member link. The Session-Sender must learn this identifier via preconfiguration or from data plane observation (e.g., reflected test packets); the document intentionally does not specify the discovery mechanism.
section: 4.2.2
