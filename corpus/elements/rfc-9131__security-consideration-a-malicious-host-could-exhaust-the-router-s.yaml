document: rfc-9131
kind: security-consideration
summary: A malicious host could exhaust the router's Neighbor Cache by creating large numbers of STALE entries via unsolicited NAs. However, this attack vector is not new — the attacker could equivalently use NS or RS with SLLAO. All RFC 6583 recommendations still apply.
section: "10"
topics:
    - security
    - ip
