document: rfc-7771
kind: design-rationale
summary: From a PSC protocol perspective, an SS-PW is treated as a single-hop LSP and an MS-PW as a multi-hop LSP. This abstraction allows the existing PSC machinery to provide end-to-end protection for both SS-PWs and MS-PWs, including protection against failed intermediate S-PE nodes in the MS-PW case.
section: A.2
topics:
