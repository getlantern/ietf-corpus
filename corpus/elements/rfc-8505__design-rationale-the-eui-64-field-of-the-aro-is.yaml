document: rfc-8505
kind: design-rationale
summary: The EUI-64 field of the ARO is renamed to ROVR and generalized to support cryptographic tokens of variable size (64–256 bits). This enables cryptographic proof of address ownership (as in AP-ND) while retaining backward compatibility when the size is constrained to 64 bits.
section: "5.3"
