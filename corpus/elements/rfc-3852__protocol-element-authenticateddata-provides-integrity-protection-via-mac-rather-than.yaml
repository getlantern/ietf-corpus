document: rfc-3852
kind: protocol-element
summary: AuthenticatedData provides integrity protection via MAC rather than digital signature. It contains version, optional originatorInfo, recipientInfos, macAlgorithm, optional digestAlgorithm, encapContentInfo, optional authAttrs (DER encoded AuthAttributes SET), mac OCTET STRING, and optional unauthAttrs.
