document: rfc-9190
kind: normative-requirement
summary: Whenever an EAP-TLS 1.3 implementation encounters a fatal error condition, it MUST send an appropriate TLS Error alert, strengthening the TLS 1.3 base requirement where alerts are not mandatory after a fatal error.
section: 2.1.4
rfc2119_level: MUST
topics:
