document: rfc-4873
kind: normative-requirement
summary: The ASSOCIATION object with Resource Sharing type MUST NOT be used when association is made according to the methods defined in RFC 4090. The Association ID MUST be set to a value that uniquely identifies the association of LSPs.
section: "3.2"
rfc2119_level: MUST NOT
