document: rfc-8030
kind: normative-requirement
summary: An application server MUST include the TTL (Time-To-Live) header field in its request for push message delivery. A push service MUST return a 400 (Bad Request) status code in response to requests that omit the TTL header field.
section: "5.2"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
