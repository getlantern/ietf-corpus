document: rfc-9904
kind: protocol-element
summary: The initial 'Digest Algorithms' registry values (Table 3) set SHA-256 (2) as RECOMMENDED/MUST for delegation and validation. SHA-1 (1) is MUST NOT for delegation but MUST for validation implementation and RECOMMENDED for validation use. NULL (0) and GOST R 34.11-94 (3) are MUST NOT for delegation.
