document: rfc-1194
kind: normative-requirement
summary: For a {U}{C} query, the response MUST include at least the full name of the specified user. If the user is logged in, at minimum the same information returned by a {C} query for that user MUST also be returned.
section: 2.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
