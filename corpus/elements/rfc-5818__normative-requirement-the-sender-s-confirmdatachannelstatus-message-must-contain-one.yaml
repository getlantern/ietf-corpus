document: rfc-5818
kind: normative-requirement
summary: The SENDER's ConfirmDataChannelStatus message MUST contain one or more DATA_LINK objects, each of which MUST contain one or more Data Channel Status subobjects. The Data Channel ID MUST indicate which channel needs confirmation and MUST report the sender's channel status.
section: "6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
