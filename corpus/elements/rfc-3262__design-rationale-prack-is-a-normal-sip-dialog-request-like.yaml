document: rfc-3262
kind: design-rationale
summary: PRACK is a normal SIP dialog request (like BYE) rather than a special message like ACK, giving it hop-by-hop reliability through stateful proxies and requiring it to have its own response. This design was necessary so PRACK could traverse proxy servers compliant to RFC 2543.
section: "1"
topics:
    - sip
    - realtime
