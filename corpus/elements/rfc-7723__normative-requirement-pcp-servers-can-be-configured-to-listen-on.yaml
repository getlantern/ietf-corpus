document: rfc-7723
kind: normative-requirement
summary: PCP servers can be configured to listen on the anycast addresses for incoming PCP requests. When a PCP server receives a PCP request destined for an anycast address it supports, it MUST send the corresponding PCP replies using that same anycast address as the source address.
section: "2.2"
rfc2119_level: MUST
topics:
    - pcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
