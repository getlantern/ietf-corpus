document: rfc-7531
kind: protocol-element
summary: 'The nfs_lock_type4 enum defines four lock modes: READ_LT (1), WRITE_LT (2), READW_LT (3, blocking read), and WRITEW_LT (4, blocking write). The locker4 union distinguishes first-lock requests (open_to_lock_owner4) from subsequent requests (exist_lock_owner4).'
section: "2"
