document: rfc-8650
kind: state-machine
summary: A subscription does not move to the active state until the subscriber sends an HTTP GET to the subscription URI returned by 'establish-subscription'. The subscription is terminated upon receipt of 'delete-subscription' or 'kill-subscription' RPC, or loss of TLS heartbeat.
section: "3"
