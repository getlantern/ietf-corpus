document: rfc-6731
kind: interoperability-note
summary: OPTION_RDNSS_SELECTION coexists with DHCPv6 OPTION_DNS_SERVERS (RFC 3646), DHCPv4 Domain Server option (RFC 2132), and IPv6 RA RDNSS Option (RFC 6106). If a node signals support for OPTION_RDNSS_SELECTION, the DHCPv6 server MAY omit OPTION_DNS_SERVERS to allow low-preference-only advertisement.
section: "4.6"
topics:
    - dns
