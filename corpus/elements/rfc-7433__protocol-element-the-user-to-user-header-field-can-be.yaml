document: rfc-7433
kind: protocol-element
summary: The User-to-User header field can be present in INVITE requests and responses (1xx excluding 100, 2xx, 3xx) and BYE requests and responses. For redirection and referral use cases, the header is included (escaped) within the Contact URI or Refer-To URI respectively.
