document: rfc-5815
kind: normative-requirement
summary: The template and options-template refresh timeout and packet-count objects (ipfixTransportSessionTemplateRefreshTimeout, etc.) MUST be zero for any transport protocol other than UDP (17), since template refresh applies only to unreliable transports.
section: "5.1"
rfc2119_level: MUST
topics:
    - snmp
    - measurement
    - udp
