document: rfc-5365
kind: normative-requirement
summary: A UAC creating a multiple-recipient MESSAGE request MUST format it according to RFC 3428 Section 4, MUST include a 'recipient-list' body with Content-Disposition 'recipient-list', and MUST include the 'recipient-list-message' option-tag in a Require header field.
section: "6"
rfc2119_level: MUST
topics:
