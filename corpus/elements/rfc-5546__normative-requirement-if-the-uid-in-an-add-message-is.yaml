document: rfc-5546
kind: normative-requirement
summary: If the UID in an ADD message is not found on the recipient's calendar, the recipient SHOULD send a REFRESH to the Organizer to obtain the latest version. If an Attendee does not support ADD, it should respond with REQUEST-STATUS value 3.14.
section: 3.2.4
rfc2119_level: SHOULD
topics:
    - email
