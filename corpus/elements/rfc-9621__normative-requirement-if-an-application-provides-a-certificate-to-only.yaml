document: rfc-9621
kind: normative-requirement
summary: If an application provides a certificate to only be used as client authentication for outbound TLS and QUIC connections, the Transport Services System MUST NOT use this automatically in other contexts such as server authentication for inbound connections or in non-equivalent security protocol handshakes.
section: "6"
rfc2119_level: MUST NOT
topics:
    - security
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
