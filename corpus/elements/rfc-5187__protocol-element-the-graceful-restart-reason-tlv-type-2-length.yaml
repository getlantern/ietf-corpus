document: rfc-5187
kind: protocol-element
summary: 'The Graceful Restart Reason TLV (Type=2, Length=1) encodes the reason for the router restart: 0 (unknown), 1 (software restart), 2 (software reload/upgrade), or 3 (switch to redundant control processor). This TLV MUST always appear in a grace-LSA.'
section: "2.2"
