document: rfc-6823
kind: design-rationale
summary: GENINFO MUST use a non-zero IS-IS protocol instance (RFC 6822) to decouple non-routing information flooding and processing from the information necessary for correct routing. This allows non-routing information to be independently prioritized and prevents it from degrading IS-IS routing operation.
section: "5"
topics:
    - routing
