document: rfc-4202
kind: protocol-element
summary: Shared Risk Link Group (SRLG) Information is an unordered list of 32-bit SRLG identifiers (unique within an IGP domain) indicating which shared-risk groups a link belongs to. The SRLG of an LSP is the union of the SRLGs of all its member links; for a bundled link it is the union of all component link SRLGs.
section: "2.3"
topics:
    - routing
