document: rfc-2933
kind: design-rationale
summary: igmpCacheExpiryTime explicitly notes that implementations may process local membership reports the same way as reports from other hosts, so a value of 0 (present only due to igmpCacheSelf) is not required — this accommodates differing local-membership handling strategies across implementations.
