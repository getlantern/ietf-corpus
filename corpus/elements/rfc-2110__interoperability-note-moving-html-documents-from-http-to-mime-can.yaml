document: rfc-2110
kind: interoperability-note
summary: Moving HTML documents from HTTP to MIME can invalidate checksum integrity checks because HTTP allows non-CRLF line endings while MIME requires CRLF canonical form. Additionally, HTTP Content-Encoding is not allowed in MIME, and some charsets cannot represent line breaks as CRLF.
section: "11"
topics:
    - email
    - http
