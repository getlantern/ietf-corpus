document: rfc-8615
kind: normative-requirement
summary: At a minimum, a well-known URI registration must reference a specification that defines the format and associated media type(s) to be obtained by dereferencing the well-known URI, along with the URI scheme(s) it can be used with. If no URI schemes are explicitly specified, 'http' and 'https' are assumed.
section: "3"
rfc2119_level: REQUIRED
topics:
    - http
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
