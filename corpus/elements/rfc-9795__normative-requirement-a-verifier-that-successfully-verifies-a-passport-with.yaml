document: rfc-9795
kind: normative-requirement
summary: 'A verifier that successfully verifies a PASSporT with an "rcd" claim MUST ensure: valid signature per RFC 8225, correct claim construction per Section 5, and compliance with any JWT Claim Constraints in the certificate. If any criterion is not met, relying parties MUST NOT use any claims from the PASSporT.'
section: "8.1"
rfc2119_level: MUST NOT
topics:
    - security
    - jose
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
