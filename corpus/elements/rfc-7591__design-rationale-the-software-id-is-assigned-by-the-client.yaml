document: rfc-7591
kind: design-rationale
summary: The 'software_id' is assigned by the client developer and SHOULD remain stable across all instances and versions of a given software package, while 'client_id' is server-issued and SHOULD vary per instance. This separation allows authorization servers to correlate different deployments of the same software without conflating software identity with registration identity.
section: "2"
topics:
    - oauth
