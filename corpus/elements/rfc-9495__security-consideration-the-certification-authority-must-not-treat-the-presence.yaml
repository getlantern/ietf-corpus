document: rfc-9495
kind: security-consideration
summary: The Certification Authority MUST NOT treat the presence of a matching "issuemail" Property alone as sufficient validation of the email address. The CA MUST still validate the email address according to its relevant policy documents and practice statements; CAA is a supplemental check only.
section: "6"
rfc2119_level: MUST NOT
topics:
