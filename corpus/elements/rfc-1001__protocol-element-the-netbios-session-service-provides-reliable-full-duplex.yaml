document: rfc-1001
kind: protocol-element
summary: The NetBIOS Session Service provides reliable, full-duplex, sequenced message exchange over TCP between a pair of named NetBIOS applications. Messages range from 0 to 131,071 bytes. Session establishment involves a CALL/LISTEN phase; a RETARGET response may redirect the caller to a different IP address and port.
section: "16.1"
