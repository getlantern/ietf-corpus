document: rfc-6515
kind: normative-requirement
summary: To assign both IPv4 and IPv6 MVPN traffic to an I-PMSI tunnel, two I-PMSI A-D routes MUST be originated — one with AFI=1 and one with AFI=2. The same PMSI Tunnel attribute value may appear in both routes to reuse the same tunnel for both traffic types.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
