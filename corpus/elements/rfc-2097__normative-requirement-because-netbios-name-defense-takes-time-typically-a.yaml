document: rfc-2097
kind: normative-requirement
summary: Because NetBIOS name defense takes time (typically a minimum of 3 seconds), it is suggested that if Name-Projection is negotiated, NBFCP timeouts are increased to 10 seconds.
section: "2"
rfc2119_level: SHOULD
