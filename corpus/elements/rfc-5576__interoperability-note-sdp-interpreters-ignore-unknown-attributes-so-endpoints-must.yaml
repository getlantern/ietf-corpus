document: rfc-5576
kind: interoperability-note
summary: SDP interpreters ignore unknown attributes, so endpoints MUST be prepared that recipients may not understand explicit source descriptions unless an external mechanism confirms they were. Some deployed RTP implementations may not support multiple media sources in a media stream.
