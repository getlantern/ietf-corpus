document: rfc-5531
kind: design-rationale
summary: The transaction ID (xid) is used only for matching replies to calls and detecting retransmissions; servers may use it to implement execute-at-most-once semantics by caching previously executed xids, but must not treat it as a sequence number.
section: "5"
