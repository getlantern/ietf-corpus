document: rfc-2879
kind: design-rationale
summary: 'CIELAB color depth tags describe the number of representable values for a color component, not the rendering resolution of a device. This separation is intentional: a system may be able to represent 256 L-values yet render only 100 distinct luminance values, and color rendering resolution is explicitly out of scope.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
