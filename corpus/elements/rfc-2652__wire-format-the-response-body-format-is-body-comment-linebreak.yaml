document: rfc-2652
kind: wire-format
summary: 'The response body format is: body = comment linebreak payload, where linebreak = CR (13) LF (10). The comment is intended for human consumption only and must not be depended upon by the protocol; if absent, the first line must be empty.'
section: "2.2"
