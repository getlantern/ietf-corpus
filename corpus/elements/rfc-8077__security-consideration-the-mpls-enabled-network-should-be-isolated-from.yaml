document: rfc-8077
kind: security-consideration
summary: The MPLS-enabled network SHOULD be isolated from outside packet insertion; MPLS packets SHOULD NOT be accepted from external interfaces unless the top label was legitimately distributed. The three main data-plane threats are spoofing, alteration, and inspection of PW PDUs.
section: "9.1"
topics:
    - security
    - mpls
