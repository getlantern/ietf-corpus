document: rfc-866
kind: normative-requirement
summary: If the user list does not fit in a single UDP datagram, the server MUST send a sequence of datagrams without breaking a single user's entry (a line) across datagrams.
section: UDP Based Active Users Service
rfc2119_level: MUST
topics:
    - udp
    - measurement
