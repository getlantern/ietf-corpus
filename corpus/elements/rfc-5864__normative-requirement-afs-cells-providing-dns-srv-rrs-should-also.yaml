document: rfc-5864
kind: normative-requirement
summary: AFS cells providing DNS SRV RRs SHOULD also provide AFSDB RRs for backward compatibility with clients that do not support DNS SRV RRs. The AFSDB RR SHOULD list servers that provide both VLDB and PTS service on the standard ports (7003 and 7002) via Rx over UDP.
section: "5"
rfc2119_level: SHOULD
topics:
    - dns
