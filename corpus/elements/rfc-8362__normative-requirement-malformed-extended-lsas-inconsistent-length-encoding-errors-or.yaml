document: rfc-8362
kind: normative-requirement
summary: Malformed Extended LSAs (inconsistent length, encoding errors, or missing required TLVs) MUST NOT be installed in the Link State Database, acknowledged, or flooded. Malformed LSA reception SHOULD be counted and/or logged.
section: "5"
rfc2119_level: MUST
