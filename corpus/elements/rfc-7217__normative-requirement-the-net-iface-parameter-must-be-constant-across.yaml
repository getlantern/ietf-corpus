document: rfc-7217
kind: normative-requirement
summary: The Net_Iface parameter MUST be constant across system bootstrap sequences and other network events, and MUST be different for each network interface simultaneously in use. This stability is required for the resulting addresses to remain stable within each subnet.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
