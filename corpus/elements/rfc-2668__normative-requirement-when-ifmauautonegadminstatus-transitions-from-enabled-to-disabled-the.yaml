document: rfc-2668
kind: normative-requirement
summary: When ifMauAutoNegAdminStatus transitions from enabled to disabled, the agent implementation MUST ensure that the operational MAU type (as reported by ifMauType) correctly transitions to the value specified by ifMauDefaultType, rather than continuing at the auto-negotiated value.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
