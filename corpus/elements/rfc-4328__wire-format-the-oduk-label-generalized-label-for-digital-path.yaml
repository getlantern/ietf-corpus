summary: 'The ODUk label (Generalized Label for Digital Path layer) is a 32-bit value with fields: Reserved (22 bits), t3 (6 bits), t2 (3 bits), t1 (1 bit). Reserved bits MUST be set to zero when sent and SHOULD be ignored when received.'
