document: rfc-3851
kind: security-consideration
summary: 40-bit encryption (e.g., RC2/40) is considered weak and offers little security over plaintext. A sender SHOULD NOT send the same message encrypted with both strong and weak algorithms simultaneously, as an attacker can learn the strongly-encrypted message content by decrypting the weakly-encrypted copy.
section: "5"
topics:
