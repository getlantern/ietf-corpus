document: rfc-9270
kind: normative-requirement
summary: When an intermediate node on the protecting LSP receives a Path message, the SMP preemption priority value in the Preemption Priority field MUST be stored for that protecting LSP, to be used by the APS protocol when resolving resource competition.
section: "5.4"
rfc2119_level: MUST
topics:
