document: rfc-3480
kind: normative-requirement
summary: If the REQUEST message contains the LSP_TUNNEL_INTERFACE_ID TLV, the tail-end LSR MUST allocate an identifier to the Forwarding Adjacency and the MAPPING message MUST contain an LSP_TUNNEL_INTERFACE_ID TLV with the tail-end's Router ID and its allocated Interface ID.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
