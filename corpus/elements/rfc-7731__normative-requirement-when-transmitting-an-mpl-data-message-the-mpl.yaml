document: rfc-7731
kind: normative-requirement
summary: When transmitting an MPL Data Message, the MPL Forwarder MUST either set the M flag to zero or set it accurately to indicate whether the message's sequence number is the largest received from the MPL Seed.
section: "9.2"
rfc2119_level: MUST
topics:
