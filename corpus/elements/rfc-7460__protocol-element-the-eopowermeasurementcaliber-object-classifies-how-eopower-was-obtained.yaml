document: rfc-7460
kind: protocol-element
summary: 'The eoPowerMeasurementCaliber object classifies how eoPower was obtained: unavailable(1), unknown(2), actual(3) — hardware measurement, estimated(4) — algorithmic derivation from state/utilization, or static(5) — external tables or model specifications. Implementation of eoEnergyParametersTable only makes sense when caliber is actual(3).'
section: "5.4"
