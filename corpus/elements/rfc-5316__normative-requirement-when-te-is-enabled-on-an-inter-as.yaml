document: rfc-5316
kind: normative-requirement
summary: When TE is enabled on an inter-AS link and the link is up, the ASBR SHOULD advertise the link using normal ISIS-TE procedures. When the link is down or TE is disabled, the ASBR SHOULD withdraw the advertisement.
section: "4"
rfc2119_level: SHOULD
topics:
