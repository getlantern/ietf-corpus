document: rfc-8599
kind: interoperability-note
summary: A UA that supports both timer-based and push-based binding refresh MUST still send a binding-refresh REGISTER upon receiving a push notification, even if it has already refreshed via a timer. Push notifications for incoming SIP requests are always sent regardless of the non-push capability.
section: 4.1.4
topics:
    - sip
