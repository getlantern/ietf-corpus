document: rfc-6944
kind: design-rationale
summary: RSASHA256 and RSASHA512 are assigned 'Recommended to Implement' because major deployments, including the root zone, use these algorithms. It is expected they will replace older algorithms such as RSA/SHA-1 that have a perceived weakness.
