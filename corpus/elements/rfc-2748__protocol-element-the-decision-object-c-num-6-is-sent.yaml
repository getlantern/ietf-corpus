document: rfc-2748
kind: protocol-element
summary: The Decision Object (C-Num=6) is sent by the PDP and includes mandatory Decision Flags (C-Type=1) with a 16-bit Command-Code (0=NULL, 1=Install, 2=Remove) and a 16-bit Flags field (0x01=Trigger Error). Optional subtypes include Stateless Data (C-Type=2), Replacement Data (C-Type=3), Client Specific Decision Data (C-Type=4), and Named Decision Data (C-Type=5).
section: 2.2.6
topics:
