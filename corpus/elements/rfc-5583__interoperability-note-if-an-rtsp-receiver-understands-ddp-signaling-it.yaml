document: rfc-5583
kind: interoperability-note
summary: If an RTSP receiver understands DDP signaling, it SHALL set up all media streams required to decode its chosen Operation Point. If it does not understand DDP signaling, it falls back to normal SDP processing, selecting from media types within its capabilities.
section: "6.2"
topics:
    - realtime
    - rtp
