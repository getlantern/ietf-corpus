summary: 'The Claims-Set CDDL defines standard CWT claims with integer keys in CBOR mode: iss(1), sub(2), aud(3), exp(4), nbf(5), iat(6), cti(7). The cti claim label is CBOR-only integer 7; the JWT equivalent jti uses a different name and is text-encoded.'
