document: rfc-8627
kind: normative-requirement
summary: The SSRC of each repair stream SHALL be randomly assigned per RFC 3550 Section 8 guidelines. The repair stream's CNAME SHOULD be identical to the CNAME of the source RTP stream(s) it protects.
section: 4.2.1
