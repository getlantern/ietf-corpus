document: rfc-8154
kind: normative-requirement
summary: The layout hint attribute (loh_type LAYOUT4_SCSI_VOLUME) is not supported; the pNFS server MUST reject setting this attribute during OPEN or SETATTR, and MUST NOT report the layout_hint attribute in supported_attrs on a SCSI-only file system.
section: 2.4.9
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
