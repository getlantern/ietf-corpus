document: rfc-9749
kind: normative-requirement
summary: Every time the server sends a push message to a PushSubscription URL, it MUST authenticate the POST request using the VAPID protocol (RFC 8292). This applies to both StateChange events and PushVerification notifications.
section: "4"
rfc2119_level: MUST
topics:
