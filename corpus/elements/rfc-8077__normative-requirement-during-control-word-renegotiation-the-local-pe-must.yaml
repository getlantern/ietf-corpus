document: rfc-8077
kind: normative-requirement
summary: During control-word renegotiation, the local PE MUST send a Label Withdraw to the remote PE, MUST send a Label Release for the specific label, and MUST send a Label Request before waiting for the remote PE's new preference. The renegotiation process SHOULD NOT be interrupted.
section: "7.3"
rfc2119_level: MUST
topics:
    - mpls
