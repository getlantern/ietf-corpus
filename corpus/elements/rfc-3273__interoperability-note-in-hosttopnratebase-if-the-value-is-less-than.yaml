document: rfc-3273
kind: interoperability-note
summary: In hostTopNRateBase, if the value is less than or equal to 7, report entries are created in the legacy hostTopNTable; if the value is greater than or equal to 8 (the new HC-specific values), entries are created in the hostTopNHighCapacityTable. The rateBase field thus serves as both a sort key and a table selector.
