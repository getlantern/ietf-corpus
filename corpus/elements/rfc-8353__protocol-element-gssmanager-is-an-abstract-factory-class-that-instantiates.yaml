summary: GSSManager is an abstract factory class that instantiates GSSName, GSSCredential, and GSSContext objects, and provides mechanism query methods (getMechs, getNamesForMech, getMechsForName). A default instance is obtained via getInstance(); subclasses may be provided for custom implementations.
