document: rfc-9665
kind: design-rationale
summary: SRP Updates omit DNS Update prerequisites to allow a complete registration in a single transaction. The registrar applies implicit predicates (FCFS key checks, structural validation) rather than requiring the requester to probe current state across multiple round-trips.
section: 3.2.3
topics:
    - dns
    - zeroconf
