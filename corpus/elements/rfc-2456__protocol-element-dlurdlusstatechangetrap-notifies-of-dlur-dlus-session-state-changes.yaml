summary: dlurDlusStateChangeTrap notifies of DLUR-DLUS session state changes, carrying dlurDlusTableChanges and dlurDlusSessnStatus. It follows the same active/inactive-only sending rules as the other state-change traps and is controlled by appnTrapControl.
