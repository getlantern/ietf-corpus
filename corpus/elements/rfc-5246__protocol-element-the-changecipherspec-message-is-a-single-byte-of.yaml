document: rfc-5246
kind: protocol-element
summary: The ChangeCipherSpec message is a single byte of value 1 sent under the current (not pending) cipher spec. Upon sending, the sender MUST immediately make the write pending state the write active state; upon reception, the receiver copies the read pending state to the read current state.
section: "7.1"
topics:
    - tls
