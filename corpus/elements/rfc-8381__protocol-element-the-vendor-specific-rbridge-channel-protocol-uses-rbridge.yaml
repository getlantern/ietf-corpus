document: rfc-8381
kind: protocol-element
summary: The Vendor-Specific RBridge Channel Protocol uses RBridge Channel protocol number 0x008 to carry typed messages from a specific organization, identified by OUI or CID, over the TRILL RBridge Channel facility. It enables vendor-specific diagnostic or control messages within a TRILL campus.
section: "1"
