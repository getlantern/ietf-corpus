document: rfc-2380
kind: normative-requirement
summary: When the VC used to forward RSVP control messages is abnormally released and cannot be reestablished, the RSVP associated QoS VCs MUST also be released. This maintains synchronization between forwarding and reservation states.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - qos
