document: rfc-4622
kind: normative-requirement
summary: Characters used as IRI delimiters that are allowed in native XMPP addresses ("#", "?" in node IDs; "/", "?", "#", "@", and space in resource IDs) MUST be percent-encoded when transforming an XMPP address into an XMPP IRI.
section: 2.7.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
