document: rfc-8766
kind: design-rationale
summary: Protocol designers are advised to avoid placing link-local names or link-local IP addresses in TXT record key values when translation would be required for off-link operation. Instead, host names should appear only in well-defined places (owner names, SRV target fields) where the Discovery Proxy expects to find and translate them.
section: 5.5.5
topics:
    - dns
    - zeroconf
