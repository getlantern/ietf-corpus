document: rfc-8227
kind: security-consideration
summary: The MSRP mechanism inherits the security considerations of MPLS-TP. Because RPS messages are carried in-band on the G-ACh, unauthorized injection or modification of RPS PDUs could cause spurious protection switches or suppress legitimate switches. Operators should secure access to management and OAM channels that can originate administrative commands such as LP, FS, and MS.
section: "8"
topics:
    - mpls
    - security
