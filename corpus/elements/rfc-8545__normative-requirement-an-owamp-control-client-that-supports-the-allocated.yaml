document: rfc-8545
kind: normative-requirement
summary: An OWAMP-Control client that supports the allocated OWAMP-Test Receiver Port MAY request that port in the Request-Session command. If the Server does not support it or the port is unavailable, the Server sends an alternate port in Accept-Session with Accept field = 0.
section: "5.2"
rfc2119_level: MAY
topics:
    - measurement
