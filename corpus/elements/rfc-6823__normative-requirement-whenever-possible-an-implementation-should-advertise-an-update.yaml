document: rfc-6823
kind: normative-requirement
summary: Whenever possible, an implementation SHOULD advertise an update to a GENINFO TLV in the LSP with the same number as the advertisement it replaces. Where this is not possible, the two affected LSPs SHOULD be flooded as an atomic action.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
