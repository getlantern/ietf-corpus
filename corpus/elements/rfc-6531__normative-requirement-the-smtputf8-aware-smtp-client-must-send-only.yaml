document: rfc-6531
kind: normative-requirement
summary: The SMTPUTF8-aware SMTP client MUST send only ASCII (LDH label or A-label) domains in the EHLO command, since it cannot know server SMTPUTF8 support before receiving the EHLO response. EHLO responses from SMTPUTF8-aware servers MUST also use LDH labels or A-labels.
section: 3.7.1
rfc2119_level: MUST
topics:
    - email
