document: rfc-9061
kind: wire-format
summary: 'ESP encapsulation type (esp-encap) is an enumeration with three values: ''espintcp'' (ESP in TCP per RFC 8229), ''espinudp'' (ESP in UDP per RFC 3948), or ''none''. Source and destination ports default to 4500. An optional ''oaddr'' leaf-list records the original pre-NAT IP address(es).'
section: 5.1.2
topics:
    - ipsec
    - nat
    - yang
