document: rfc-8661
kind: normative-requirement
summary: When a Mapping Client (MC) receives both an SR-mapping advertisement from a Mapping Server and a Prefix-SID Advertisement in a prefix reachability advertisement for the same prefix, the MC MUST prefer the SID from the prefix reachability advertisement; the Mapping Server Advertisement MUST be ignored for that prefix.
section: 3.2.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
