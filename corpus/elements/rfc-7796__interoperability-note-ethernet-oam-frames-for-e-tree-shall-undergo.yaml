document: rfc-7796
kind: interoperability-note
summary: Ethernet OAM frames for E-Tree SHALL undergo the same VLAN mapping as data traffic. Root VLAN SHOULD be applied to segment OAM frames to prevent them from being filtered by the leaf-filtering mechanism.
