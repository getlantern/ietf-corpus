document: rfc-9009
kind: protocol-element
summary: The 'I' (Invalidate previous route) flag is added to the Transit Information option (bit 1). The target node sets this flag in its regular DAO to signal the common ancestor node to generate a DCO for the previous route. Setting the flag is not counterproductive even when no previous route exists.
section: "4.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
