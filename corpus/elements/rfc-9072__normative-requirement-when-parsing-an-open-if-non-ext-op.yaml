document: rfc-9072
kind: normative-requirement
summary: When parsing an OPEN, if Non-Ext OP Len. is non-zero, the BGP speaker MUST inspect the Non-Ext OP Type octet to determine which encoding is in use. If that value is 255, the extended format is used; otherwise RFC 4271 encoding applies.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
