document: rfc-3903
kind: security-consideration
summary: ESCs SHOULD authenticate EPAs and apply authorization policies to all PUBLISH requests, since published event state may be sensitive. Implementations MUST support Digest authentication with replay protection as defined in RFC 3261.
section: "14.1"
