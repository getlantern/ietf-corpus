document: rfc-5116
kind: normative-requirement
summary: If the AD input is constructed from multiple data elements, it MUST be unambiguously parseable into its constituent elements without using unauthenticated data in the parsing process (i.e., the AD must be an injective function of the data elements).
section: "3.3"
rfc2119_level: REQUIRED
topics:
    - crypto
    - security
