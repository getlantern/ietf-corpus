document: rfc-8550
kind: normative-requirement
summary: Receiving agents MUST support chaining based on the distinguished name fields. Sending agents SHOULD include at least one chain of certificates up to, but not including, a CA that the sender believes the recipient may trust as authoritative.
section: "2.3"
rfc2119_level: MUST
