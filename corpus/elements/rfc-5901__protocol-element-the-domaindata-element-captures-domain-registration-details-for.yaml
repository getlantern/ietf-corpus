document: rfc-5901
kind: protocol-element
summary: 'The DomainData element captures domain registration details for lure or collection sites: Name (required), DateDomainWasChecked, RegistrationDate, ExpirationDate, Nameservers, and DomainContacts (required). SystemStatus attribute (spoofed, fraudulent, innocent-hacked, innocent-hijacked, unknown) and DomainStatus (from RFC 3982 domainStatusType plus unknown) classify domain involvement.'
section: 5.9.2
topics:
    - dns
    - security
