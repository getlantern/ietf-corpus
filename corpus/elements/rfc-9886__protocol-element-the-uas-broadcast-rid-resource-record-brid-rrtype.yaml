document: rfc-9886
kind: protocol-element
summary: The UAS Broadcast RID Resource Record (BRID, RRType 68) is a CBOR-encoded DNS record holding static Broadcast RID information including UAS type, UAS IDs, optional authentication data (Broadcast Endorsements), self-identification, area, classification, and operator ID fields derived from the ASTM F3411 data dictionary.
