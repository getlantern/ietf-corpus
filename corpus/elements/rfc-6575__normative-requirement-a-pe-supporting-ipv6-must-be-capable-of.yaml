document: rfc-6575
kind: normative-requirement
summary: A PE supporting IPv6 MUST be capable of intercepting ICMPv6 ND and IND packets over both AC and PW, recording IPv6 interface and link-layer addresses, possibly modifying packets per egress AC type, and forwarding them toward the original destination.
section: 4.3.2
rfc2119_level: MUST
topics:
    - vpn
    - ip
