document: rfc-9572
kind: normative-requirement
summary: To address backward-compatibility, an upgraded PE MUST indicate in its per-PE I-PMSI A-D route that it supports the new procedures by setting a flag bit in the EVPN Multicast Flags Extended Community. All per-PE I-PMSI A-D routes are restricted to the local AS.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
