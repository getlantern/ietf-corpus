document: rfc-3038
kind: protocol-element
summary: 'VC directionality governs VCID procedures: the VCID procedure for a VC is always triggered from the upstream node. Bidirectional label-switched VCs require two VCID procedures (one per direction); unidirectional VCs require only one.'
section: "2.2"
