document: rfc-7787
kind: protocol-element
summary: DNCP is an abstract state synchronization protocol in which each node publishes up to 64 KB of TLV tuples; a hash tree of height 1 (network state hash) combined with the Trickle algorithm provides a shared, consistent view of all bidirectionally reachable nodes' data across the DNCP network.
