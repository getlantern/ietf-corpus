document: rfc-7477
kind: normative-requirement
summary: If a bit in the Type Bit Map has been set that a parental agent does not understand, the parental agent MUST NOT act upon the record; it must not simply copy the data but must understand the semantics of any set bit.
section: 2.1.1.2.1
rfc2119_level: MUST NOT
topics:
