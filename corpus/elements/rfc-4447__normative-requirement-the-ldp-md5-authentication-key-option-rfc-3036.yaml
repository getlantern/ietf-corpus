document: rfc-4447
kind: normative-requirement
summary: The LDP MD5 authentication key option (RFC 3036 section 2.9) MUST be implemented and, for greater security, must be used. This provides integrity and authentication for LDP messages and eliminates source address spoofing.
section: "8.2"
rfc2119_level: MUST
