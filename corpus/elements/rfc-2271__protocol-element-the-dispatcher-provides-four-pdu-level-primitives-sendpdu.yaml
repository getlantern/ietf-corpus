document: rfc-2271
kind: protocol-element
summary: 'The Dispatcher provides four PDU-level primitives: sendPdu (application sends outgoing request/notification), processPdu (incoming PDU delivered to application), returnResponsePdu (application returns response to dispatcher), and processResponsePdu (incoming response delivered to application). Applications may also call registerContextEngineID/unregisterContextEngineID to claim or release responsibility for specific contextEngineID and pduType combinations.'
section: "4.1"
topics:
    - snmp
