document: rfc-3545
kind: protocol-element
summary: 'Enhanced CRTP robust operation uses a parameter N representing link quality: the probability of more than N adjacent packet losses is small. For each context change, the compressor includes the update in N+1 consecutive packets, ensuring the decompressor stays synchronized as long as no more than N adjacent packets are lost.'
section: "2.3"
topics:
