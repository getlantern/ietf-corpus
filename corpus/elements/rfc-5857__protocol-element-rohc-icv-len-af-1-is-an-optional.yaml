document: rfc-5857
kind: protocol-element
summary: ROHC_ICV_LEN (AF=1) is an optional attribute specifying the number of ICV octets the sender expects on incoming ROHC packets. The negotiated ROHC_INTEG ICV MUST be truncated to this length by taking its first ROHC_ICV_LEN bytes; if zero, no ICV is sent.
section: 3.1.2
topics:
    - ipsec
    - vpn
    - security
