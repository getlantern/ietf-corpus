document: rfc-7697
kind: interoperability-note
summary: This MIB module is designed to work in parallel with the MPLS TE MIB defined in RFC 3812. The mplsOamIdMeServicePointer references entries in mplsTunnelTable (RFC 3812) for tunnel, LSP, and section service types, and in pwTable (RFC 5601) for pseudowire service types.
