document: rfc-8277
kind: normative-requirement
summary: A BGP speaker SHOULD NOT send an UPDATE binding more labels than its peer's announced Count. If a speaker receives an UPDATE with more labels than it announced it can receive, it MUST apply the 'treat-as-withdraw' strategy of RFC 7606 to that UPDATE.
section: "2.1"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
