document: rfc-5267
kind: normative-requirement
summary: The client MUST process ADDTO and REMOVEFROM return data items in the order they appear, including those within a single ESEARCH response; correspondingly, servers MUST generate them such that results are maintained in the requested order.
section: 4.3.2
rfc2119_level: MUST
