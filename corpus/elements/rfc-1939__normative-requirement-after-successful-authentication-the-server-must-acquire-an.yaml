document: rfc-1939
kind: normative-requirement
summary: After successful authentication the server must acquire an exclusive-access lock on the maildrop before entering TRANSACTION state. If the lock cannot be acquired the server responds with a negative indicator and must release any partially acquired lock before rejecting the command.
section: "4"
rfc2119_level: REQUIRED
topics:
    - email
