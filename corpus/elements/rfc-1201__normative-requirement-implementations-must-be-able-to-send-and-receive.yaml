document: rfc-1201
kind: normative-requirement
summary: Implementations must be able to send and receive IP datagrams up to 576 octets in length, and are strongly encouraged to handle datagrams up to 1500 octets. Implementations may accept arriving datagrams larger than their configured MTU and are not required to discard them.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - ip
