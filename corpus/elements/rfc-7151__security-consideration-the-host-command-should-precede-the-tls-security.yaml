document: rfc-7151
kind: security-consideration
summary: The HOST command SHOULD precede the TLS security handshake when the user-PI is not providing the 'server_name' TLS SNI extension, so both peers can map the FTP HOST to the correct server certificate before establishing the secure session.
section: "4"
rfc2119_level: SHOULD
topics:
    - security
    - tls
