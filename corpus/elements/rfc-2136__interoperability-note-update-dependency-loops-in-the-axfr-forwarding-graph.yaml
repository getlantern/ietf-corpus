document: rfc-2136
kind: interoperability-note
summary: UPDATE dependency loops in the AXFR forwarding graph are prohibited because UPDATE forwarding has no loop detection analogous to the SOA SERIAL pretest used by AXFR. Historically, mutually dependent slaves were permitted for AXFR but this configuration is incompatible with UPDATE forwarding.
section: "7.17"
topics:
    - dns
