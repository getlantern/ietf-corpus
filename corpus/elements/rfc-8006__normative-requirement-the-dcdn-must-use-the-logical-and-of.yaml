document: rfc-8006
kind: normative-requirement
summary: The dCDN MUST use the logical AND of all ACLs (LocationACL, TimeWindowACL, ProtocolACL) to determine whether a request is allowed; a request denied by any single ACL is denied overall.
section: 4.2.2
rfc2119_level: MUST
topics:
