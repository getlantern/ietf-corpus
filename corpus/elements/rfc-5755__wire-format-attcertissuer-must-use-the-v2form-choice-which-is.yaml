document: rfc-5755
kind: wire-format
summary: AttCertIssuer MUST use the v2Form CHOICE, which is a V2Form SEQUENCE containing an optional issuerName (GeneralNames), baseCertificateID ([0] IssuerSerial), and objectDigestInfo ([1] ObjectDigestInfo). In this profile, only issuerName may be present; baseCertificateID and objectDigestInfo MUST NOT be present.
section: 4.2.3
topics:
