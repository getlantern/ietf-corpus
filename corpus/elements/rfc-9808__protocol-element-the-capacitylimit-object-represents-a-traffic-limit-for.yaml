summary: The CapacityLimit Object represents a traffic limit for delegation from uCDN to dCDN. Mandatory properties are 'limit-type' (registered type string) and 'maximum-hard' (unsigned integer). Optional properties include 'id', 'maximum-soft', 'current', and 'telemetry-source'.
