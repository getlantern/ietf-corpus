document: rfc-8834
kind: design-rationale
summary: A new short-term persistent RTCP CNAME is generated per RTCPeerConnection (rather than reusing a long-term identifier) because long-term persistent identifiers are problematic from a privacy viewpoint — they can be used to track a user or device across different services.
section: "4.9"
topics:
