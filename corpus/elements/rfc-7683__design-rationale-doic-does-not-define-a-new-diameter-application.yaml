document: rfc-7683
kind: design-rationale
summary: DOIC does not define a new Diameter application; instead, overload control AVPs are piggybacked onto existing request and answer messages. This allows the solution to apply to existing and future Diameter applications without requiring changes to the Diameter base protocol (RFC 6733).
section: "4.1"
topics:
    - diameter
    - radius
