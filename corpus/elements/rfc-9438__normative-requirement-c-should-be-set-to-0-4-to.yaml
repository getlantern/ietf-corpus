document: rfc-9438
kind: normative-requirement
summary: C SHOULD be set to 0.4 to balance Reno-friendliness and aggressiveness of window increase. It is NOT RECOMMENDED to set C to a very low value such as 0.04, as CUBIC with a low C cannot efficiently use bandwidth in fast and long-distance networks.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - congestion
    - tcp
