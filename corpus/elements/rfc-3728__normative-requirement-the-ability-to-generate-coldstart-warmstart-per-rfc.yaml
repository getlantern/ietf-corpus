document: rfc-3728
kind: normative-requirement
summary: The ability to generate coldStart/WarmStart (per RFC 3418) and linkUp/linkDown (per RFC 2863) notifications is required. A linkDown notification MAY be generated whenever any of lof, lol, los, lpr, ES, SES, or UAS threshold crossing occurs.
section: "2.6"
rfc2119_level: MAY
topics:
    - snmp
