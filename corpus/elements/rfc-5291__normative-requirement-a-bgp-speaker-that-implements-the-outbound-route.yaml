document: rfc-5291
kind: normative-requirement
summary: A BGP speaker that implements the Outbound Route Filtering Capability MUST support the BGP ROUTE-REFRESH message. A speaker advertising the ORF Capability does not have to separately advertise the BGP Route Refresh Capability to that peer.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
