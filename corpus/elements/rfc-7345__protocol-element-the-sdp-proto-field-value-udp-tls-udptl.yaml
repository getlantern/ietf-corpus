document: rfc-7345
kind: protocol-element
summary: The SDP 'proto' field value 'UDP/TLS/UDPTL' is defined to indicate a UDPTL-over-DTLS media stream in an SDP 'm=' line. This value is used together with the SDP 'setup' and 'fingerprint' attributes from RFC 4145 and RFC 4572.
