document: rfc-6021
kind: protocol-element
summary: The zero-based-counter32 and zero-based-counter64 types derive from counter32/counter64 with a defined initial value of zero (default '0'), allowing applications to use the creation value as a delta. Applications must track the minimum wrap time and discard data if polling intervals exceed it.
