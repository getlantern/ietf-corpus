document: rfc-6917
kind: normative-requirement
summary: In Query mode, the <mediaResourceRequest> MUST be carried in the body of an HTTP/HTTPS POST request. The media type MUST be 'application/mrb-consumer+xml' and MUST be reflected in Content-Type and Accept headers. The HTTP/HTTPS 200 response body MUST contain only an <mrbconsumer> with a single <mediaResourceResponse> child.
section: 5.2.1
rfc2119_level: MUST
topics:
    - http
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
