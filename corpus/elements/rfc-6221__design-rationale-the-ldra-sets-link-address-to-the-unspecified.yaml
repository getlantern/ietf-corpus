document: rfc-6221
kind: design-rationale
summary: The LDRA sets link-address to the Unspecified Address (::) because it resides on the same link as the client and has no IP routing capability, making the concept of a meaningful link-address inapplicable. Servers must be updated to ignore zero link-address fields for address selection.
section: "5.1"
topics:
    - ip
