document: rfc-4818
kind: protocol-element
summary: The Delegated-IPv6-Prefix attribute (Type 123) carries an IPv6 prefix to be delegated to the user for use in the user's network, for example via DHCP Prefix Delegation. It differs from Framed-IPv6-Prefix in that it is specifically designed for delegation rather than assignment to the user's interface.
