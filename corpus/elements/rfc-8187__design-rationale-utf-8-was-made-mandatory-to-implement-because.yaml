document: rfc-8187
kind: design-rationale
summary: UTF-8 was made mandatory-to-implement because RFC 2231 left the character encoding unspecified, creating ambiguity for senders. Mandating UTF-8 eliminates that ambiguity and covers all Unicode code points.
section: "3.2"
topics:
    - http
