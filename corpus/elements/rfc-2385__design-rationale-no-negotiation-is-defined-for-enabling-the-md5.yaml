document: rfc-2385
kind: design-rationale
summary: No negotiation is defined for enabling the MD5 option; its use is purely a matter of site policy. This avoids the need for a negotiation phase and keeps the sending of signatures entirely under application control rather than subject to remote host behavior.
section: "2.0"
topics:
    - tcp
    - bgp
    - security
