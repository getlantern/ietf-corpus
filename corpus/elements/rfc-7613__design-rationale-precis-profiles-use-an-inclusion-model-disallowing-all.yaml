document: rfc-7613
kind: design-rationale
summary: PRECIS profiles use an 'inclusion model' (disallowing all characters except those explicitly allowed), in contrast to stringprep's 'exclusion model' (allowing all characters except those explicitly disallowed). This mirrors the approach originally used for internationalized domain names in RFC 5891.
section: Appendix A
topics:
    - security
