document: rfc-8480
kind: wire-format
summary: The 6P ADD Request appends Metadata (16 bits), CellOptions (8 bits), NumCells (8 bits), and a variable-length CellList to the generic header. The ADD Response and Confirmation contain only the generic header plus a variable-length CellList.
section: 3.3.1
