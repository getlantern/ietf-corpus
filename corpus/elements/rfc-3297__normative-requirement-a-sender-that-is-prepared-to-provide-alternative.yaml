document: rfc-3297
kind: normative-requirement
summary: 'A sender that is prepared to provide alternative message data formats MUST send: a default message data format, a Message-ID header, appropriate Content-features headers, an MDN request, an Alternative-available MDN option, and Content-alternative headers indicating available alternatives.'
section: "3.1"
rfc2119_level: MUST
topics:
    - email
