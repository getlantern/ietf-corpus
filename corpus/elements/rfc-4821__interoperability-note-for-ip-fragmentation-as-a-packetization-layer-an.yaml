document: rfc-4821
kind: interoperability-note
summary: For IP fragmentation as a Packetization Layer, an implementation SHOULD rely on path MTU sharing plus an adjunct protocol (e.g., ICMP ECHO) to probe Path MTU because the IP layer has no mechanism to determine whether packets are ultimately delivered without direct application participation.
section: "10.3"
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
