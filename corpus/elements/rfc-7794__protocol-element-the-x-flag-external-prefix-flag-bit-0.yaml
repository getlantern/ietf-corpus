document: rfc-7794
kind: protocol-element
summary: The X-Flag (External Prefix Flag, Bit 0) is set when a prefix has been redistributed from another protocol, including redistribution from another IS-IS instance in a multi-virtual-router scenario. It MUST be preserved when leaked between levels.
