document: rfc-7716
kind: normative-requirement
summary: In order for both sets of GTM procedures (this document's and RFC 7524's) to co-exist in the same network, the PBRs MUST be provisioned so that for any given IP group address in the global table, all egress PBRs use the same set of procedures for that group address.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
