document: rfc-5185
kind: design-rationale
summary: Using secondary addresses to place a link in multiple areas requires extra IP configuration, does not apply to unnumbered interfaces, and inflates the routing table. Configuring a single-address link in multiple areas would violate the OSPF definition of an area as a collection of subnets. The proposed solution avoids both problems.
section: "1.2"
topics:
    - routing
