summary: The PCE-CAP-FLAGS sub-TLV (type=5, length a multiple of 4 octets) carries an array of 32-bit flags numbered from most significant bit as bit zero, each bit representing one PCE capability such as GMPLS constraints, bidirectional paths, diversity, load balancing, synchronization, and request prioritization.
