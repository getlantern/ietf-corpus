document: rfc-7405
kind: protocol-element
summary: The 'quoted-string' terminal is defined as DQUOTE followed by zero or more printable US-ASCII characters (SP and VCHAR, excluding DQUOTE itself, i.e., %x20-21 / %x23-7E), closed by DQUOTE.
section: "2.2"
