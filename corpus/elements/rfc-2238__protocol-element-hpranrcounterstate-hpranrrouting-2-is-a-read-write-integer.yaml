document: rfc-2238
kind: protocol-element
summary: hprAnrCounterState (hprAnrRouting 2) is a read-write INTEGER allowing a management station to turn ANR packet counting on (active(2)) or off (notActive(1)) in the hprAnrRoutingTable. Its initial value is an implementation choice.
