document: rfc-2578
kind: wire-format
summary: ExtUTCTime is an OCTET STRING of SIZE(11|13) encoding timestamps as YYMMDDHHMMZ (years 1900–1999 only) or YYYYMMDDHHMMZ (any year), always suffixed with 'Z' to denote GMT. Years after 1999 must use the four-digit format.
