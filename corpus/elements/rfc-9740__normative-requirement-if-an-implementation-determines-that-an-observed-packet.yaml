document: rfc-9740
kind: normative-requirement
summary: If an implementation determines that an observed packet includes an extension header (even one it does not support), the exact observed Next Header code MUST be echoed in the ipv6ExtensionHeaderTypeCountList IE rather than replaced with a generic unknown value.
section: "3.4"
rfc2119_level: MUST
topics:
