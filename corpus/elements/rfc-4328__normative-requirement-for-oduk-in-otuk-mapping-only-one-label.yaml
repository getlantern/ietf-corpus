document: rfc-4328
kind: normative-requirement
summary: For ODUk in OTUk mapping, only one label appears in the Generalized Label as a single 32-bit value. For ODUj in ODUk multiplexing (k > j), an explicit ordered list of labels is provided; the order must reflect the logical order of ODUj in the multiplex, not the physical order of tributary slots.
section: "4.2"
topics:
    - mpls
