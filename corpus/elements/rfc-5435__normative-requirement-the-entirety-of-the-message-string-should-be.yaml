document: rfc-5435
kind: normative-requirement
summary: The entirety of the :message string SHOULD be sent, though implementations MAY shorten it for technical or aesthetic reasons. If :message is absent, a default containing at least the From and Subject header values is RECOMMENDED.
section: "3.6"
rfc2119_level: SHOULD
