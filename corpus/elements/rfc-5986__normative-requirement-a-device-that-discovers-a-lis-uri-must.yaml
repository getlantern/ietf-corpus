document: rfc-5986
kind: normative-requirement
summary: A Device that discovers a LIS URI MUST attempt to verify that the LIS is able to provide location information. For HELD, this is done by making a location request; any HTTP 200 response containing a HELD response (except 'notLocatable') signifies success.
section: "2"
rfc2119_level: MUST
topics:
    - dns
