document: rfc-8838
kind: interoperability-note
summary: An ICE-lite agent supporting Trickle ICE generates a full generation of candidates accompanied by an end-of-candidates indication. A full ICE implementation performing full trickle may send an initial description with no candidates; after receiving the ICE-lite response, it can skip further trickling because the ICE-lite agent will discover candidates as peer-reflexive through connectivity checks.
section: B
