document: rfc-6047
kind: normative-requirement
summary: The Organizer MUST ignore an iTIP message from a spoofed address that attempts to decline a meeting invitation on behalf of another attendee. Only the respondent is authorized to indicate their status to the Organizer.
section: 2.2.1
rfc2119_level: MUST
topics:
    - email
    - security
