document: rfc-6063
kind: design-rationale
summary: Two-pass DSKPP is chosen when pre-existing legacy keys must be transported, when a device has a manufacturer's pre-shared key (e.g., SIM or smart card), or when it has a keypad for passphrase entry. These conditions enable efficient one-round-trip provisioning without on-the-fly key agreement.
section: 3.2.4.2
topics:
    - crypto
    - security
