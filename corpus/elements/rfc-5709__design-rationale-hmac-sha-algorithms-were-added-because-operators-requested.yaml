document: rfc-5709
kind: design-rationale
summary: HMAC-SHA algorithms were added because operators requested the NIST SHS family instead of Keyed-MD5. While published MD5 weaknesses do not directly attack Keyed-MD5, some organizations (e.g., the US government) prefer NIST algorithms for policy reasons.
