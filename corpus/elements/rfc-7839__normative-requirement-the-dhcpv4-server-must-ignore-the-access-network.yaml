document: rfc-7839
kind: normative-requirement
summary: The DHCPv4 server MUST ignore the Access-Network-Identifier option and process the rest of the message per base DHCPv4 specifications if the message includes Network-Name, Access-Point-Name, or Access-Point-BSSID sub-options but does not include the Access-Technology-Type Sub-option.
section: "7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
