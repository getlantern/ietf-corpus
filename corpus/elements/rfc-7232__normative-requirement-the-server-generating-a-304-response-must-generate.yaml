document: rfc-7232
kind: normative-requirement
summary: 'The server generating a 304 response MUST generate any of the following header fields that would have been sent in a 200 (OK) response to the same request: Cache-Control, Content-Location, Date, ETag, Expires, and Vary.'
section: "4.1"
rfc2119_level: MUST
topics:
