document: rfc-9502
kind: normative-requirement
summary: Flexible Algorithm participation MUST be advertised for each Flexible Algorithm data plane independently. IP Flexible Algorithm data plane participation MUST be signaled independently of any other Flexible Algorithm data plane (e.g., SR). A router may participate in a Flex-Algorithm for the IP data plane but not for the SR data plane.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - ip
