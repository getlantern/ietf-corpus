document: rfc-6487
kind: normative-requirement
summary: Revocation check requires that the public key used to verify the signature on the CRL is the same public key used to verify the certificate itself. A relying party using separate validation paths for a certificate and its CRL risks incorrect revocation decisions.
section: "7.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
