document: rfc-8563
kind: normative-requirement
summary: If a BFD Control packet is received with the Poll (P) bit set to 1 and the Multipoint (M) bit is also set, the responding packet transmission MUST be delayed by a random amount of time between zero and (0.9 * bfd.RemoteMinRxInterval); otherwise it MUST be transmitted as soon as practicable.
section: 6.13.3
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
