document: rfc-8166
kind: normative-requirement
summary: Senders MUST NOT send RDMA_MSGP procedures. Responders receiving RDMA_MSGP SHOULD reply with RDMA_ERROR (ERR_CHUNK); Requesters receiving RDMA_MSGP MUST silently discard the message. RDMA_MSGP was never fully specified or prototyped.
section: 4.6.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
