document: rfc-9914
kind: normative-requirement
summary: A packet that was forwarded along a Track MUST NOT subsequently be forwarded along the default route of the main Instance. This prevents routing loops in the multi-topology domain where Track Instances underlay the main Instance.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
