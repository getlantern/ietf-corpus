summary: 'The OPT TTL field (32 bits) encodes: EXTENDED-RCODE (bits 0–7, upper 8 bits of the 12-bit RCODE), VERSION (bits 8–15, EDNS implementation level), DO flag (bit 16, DNSSEC OK), and Z (bits 17–31, reserved, must be zero).'
