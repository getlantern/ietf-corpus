document: rfc-6765
kind: security-consideration
summary: The GBOND-MIB contains writable objects (bonding scheme, data rate targets, discovery codes, notification thresholds) whose unauthorized modification could disrupt bonded xDSL service or cause misconfiguration. Implementors are directed to SNMPv3 framework security (RFC 3410) to protect read-write and read-create objects, with the most sensitive objects requiring authPriv-level access.
section: "8"
topics:
    - security
    - snmp
