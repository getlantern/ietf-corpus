document: rfc-4455
kind: design-rationale
summary: 'The 3-notifications-per-10-seconds rate limit was chosen as a compromise: one notification every three seconds is frequent enough for operational awareness, and allowing short bursts of up to three simultaneous notifications avoids suppressing coincident distinct alerts, without flooding the network.'
