document: rfc-5619
kind: design-rationale
summary: Pre-shared keys for IPsec authentication are acceptable only when the number of SI and SC nodes is small; as scale grows, certificate-based authentication is preferred because group pre-shared keys are vulnerable to MITM attacks and per-pair key management becomes unmanageable.
section: 3.5.2
topics:
    - ipsec
    - crypto
    - security
