document: rfc-8658
kind: design-rationale
summary: Using separate TLV-Type values 4 (BMR) and 5 (FMR) for Softwire46-Rule achieves the same design goals as the 'Softwire46 Rule Flags' F-flag in DHCPv6 OPTION_S46_RULE (Section 4.1 of RFC 7598), avoiding the need for a flags field within the RADIUS TLV.
section: 3.1.3.1
topics:
