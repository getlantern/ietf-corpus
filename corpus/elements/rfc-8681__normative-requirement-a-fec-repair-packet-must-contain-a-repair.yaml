document: rfc-8681
kind: normative-requirement
summary: A FEC Repair Packet MUST contain a Repair FEC Payload ID prepended to the repair symbol(s). When a packet contains multiple repair symbols, they MUST all have been generated from the same encoding window.
section: 4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
