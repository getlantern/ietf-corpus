document: rfc-8986
kind: protocol-element
summary: H.Encaps (SR Headend with Encapsulation) pushes a new IPv6 header with an SRH, sets the outer SA to T (a local IPv6 address) and outer DA to the first SID of the SR Policy, decrements the inner Hop Limit or TTL, and submits the packet for IPv6 FIB lookup.
section: "5.1"
topics:
    - routing
    - ip
