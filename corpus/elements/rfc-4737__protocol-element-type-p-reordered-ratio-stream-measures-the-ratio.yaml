document: rfc-4737
kind: protocol-element
summary: 'Type-P-Reordered-Ratio-Stream measures the ratio R of reordered packets to received packets in a sample: R = (count of packets with Type-P-Reordered=TRUE) / L, where L is the number of received packets (duplicates removed). When R = 0, no further reordering metrics need be examined.'
section: "4.1"
topics:
    - measurement
