document: rfc-3880
kind: protocol-element
summary: The 'mail' node sends an email notification to a 'mailto' URL when executed. It has a single result (no failure output) since e-mail delivery failures cannot be reliably detected in real time. Execution continues to the next node after sending.
section: "7.1"
