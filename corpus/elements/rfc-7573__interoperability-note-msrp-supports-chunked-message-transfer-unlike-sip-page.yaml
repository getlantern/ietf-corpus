document: rfc-7573
kind: interoperability-note
summary: MSRP supports chunked message transfer (unlike SIP page-mode messaging limited to 1300 bytes); the MSRP gateway acting as an MSRP endpoint is responsible for receiving chunked MSRP SEND requests and reassembling them into a single message before delivering to the XMPP recipient.
