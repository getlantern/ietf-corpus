document: rfc-9111
kind: normative-requirement
summary: When a stored response is used to satisfy a request without validation, a cache MUST generate an Age header field with a value equal to the stored response's current_age, replacing any existing Age field in the response.
section: "4"
rfc2119_level: MUST
topics:
