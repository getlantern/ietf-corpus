document: rfc-5170
kind: normative-requirement
summary: 'For each source block, the actual number of encoding symbols n MUST be determined using the n-algorithm: n = floor(k * max_n / B), where k is the current source block length, max_n is the maximum number of encoding symbols for any block, and B is the maximum source block length.'
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
