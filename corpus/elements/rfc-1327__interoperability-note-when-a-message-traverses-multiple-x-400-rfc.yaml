document: rfc-1327
kind: interoperability-note
summary: When a message traverses multiple X.400/RFC 822 gateways, service quality degrades to approximately the lowest common denominator (RFC 822 service level). X.400 services without RFC 822 equivalents are not expected to survive a round trip through an RFC 822 network.
section: 1.5.4
topics:
    - email
