document: rfc-8342
kind: normative-requirement
summary: Functionality that is neither enabled nor operational on the system is considered not to be 'in use' and SHOULD be omitted from <operational>. Requests to retrieve nodes from <operational> always return the value in use if the node exists.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - netconf
    - yang
