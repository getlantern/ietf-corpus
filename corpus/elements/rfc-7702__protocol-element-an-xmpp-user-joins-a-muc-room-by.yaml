document: rfc-7702
kind: protocol-element
summary: An XMPP user joins a MUC room by sending a directed <presence/> stanza to the room occupant JID (e.g., montague@chat.example.org/JuliC) containing an empty <x/> element in the 'http://jabber.org/protocol/muc' namespace. The gateway transforms this into a SIP INVITE with an SDP offer specifying an MSRP media line.
section: "5.1"
topics:
    - sip
    - realtime
