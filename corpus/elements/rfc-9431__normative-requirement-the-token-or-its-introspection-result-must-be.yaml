document: rfc-9431
kind: normative-requirement
summary: The token or its introspection result MUST be cached by the Broker to authorize a Client's future PUBLISH and SUBSCRIBE messages, since those packets do not carry access tokens. The Broker SHOULD use a cache timeout to introspect tokens regularly.
section: "2.3"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
