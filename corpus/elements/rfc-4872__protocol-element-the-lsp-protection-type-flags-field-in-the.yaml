document: rfc-4872
kind: protocol-element
summary: 'The LSP Protection Type Flags field in the PROTECTION object is 6 bits wide and encodes the desired end-to-end recovery type: 0x00=Unprotected, 0x01=Full Rerouting, 0x02=Rerouting without Extra-Traffic, 0x04=1:N Protection with Extra-Traffic, 0x08=1+1 Unidirectional Protection, 0x10=1+1 Bidirectional Protection. Only one value SHOULD be set at a time.'
section: "14.1"
topics:
    - mpls
    - routing
