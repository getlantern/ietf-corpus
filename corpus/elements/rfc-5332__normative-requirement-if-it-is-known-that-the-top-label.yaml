document: rfc-5332
kind: normative-requirement
summary: If it is known that the top label of a GRE packet with a multicast destination IP address is upstream-assigned, the occurrence of ethertype 0x8847 in such a packet MUST be considered an error and the packet MUST be discarded.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
