document: rfc-7349
kind: design-rationale
summary: 'SA IDs make key rolling convenient while maintaining protocol operation: each SA ID maps to an independent algorithm and key, so a new SA can be introduced without disrupting existing adjacencies. Multiple valid SAs may coexist and the sender may use any of them.'
