document: rfc-3828
kind: interoperability-note
summary: UDP-Lite has been assigned IP protocol number 136 (UDPLite), separate from UDP (17). A UDP-Lite-unaware destination will return an ICMP 'Protocol Unreachable' or ICMPv6 'Payload Type Unknown' error, providing a simple detection mechanism for unaware systems.
