document: rfc-7988
kind: normative-requirement
summary: 'An intermediate node originating two Leaf A-D routes with different route keys MUST specify distinct non-zero MPLS labels in their respective PTAs, unless all three conditions hold: same parent node, same forwarding set of downstream neighbors, and identical per-downstream encapsulation for both P-tunnels.'
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
