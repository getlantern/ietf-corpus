document: rfc-5925
kind: design-rationale
summary: TCP-AO uses a different option Kind (29) than TCP MD5 (19) to allow both to coexist for different connections simultaneously (supporting legacy interoperability) while ensuring they are never permitted on the same connection. The explicit Kind avoids any ambiguity about which mechanism protects a given segment.
section: "1.3"
topics:
    - tcp
    - security
