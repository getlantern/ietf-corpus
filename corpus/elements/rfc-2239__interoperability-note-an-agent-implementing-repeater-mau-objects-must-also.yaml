document: rfc-2239
kind: interoperability-note
summary: An agent implementing repeater-MAU objects must also implement the 802.3 Repeater MIB (RFC 2108). The rpMauGroupIndex and rpMauPortIndex values must match rptrPortGroupIndex and rptrPortIndex for the corresponding repeater port.
section: 2.3.2
topics:
