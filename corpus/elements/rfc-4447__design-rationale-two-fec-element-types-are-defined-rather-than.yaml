summary: 'Two FEC element types are defined rather than one: the PWid FEC (0x80) for simpler cases where both endpoints are pre-provisioned with a 32-bit PW ID, and the Generalized PWid FEC (0x81) for structured endpoint identifiers supporting auto-discovery and more complex provisioning models such as VPLS.'
