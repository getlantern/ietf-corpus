document: rfc-2381
kind: normative-requirement
summary: All rates and token bucket depth parameters mapped from IP-level to ATM parameters MUST be corrected for added headers and cell segmentation overhead. IP parameters are in bytes/bytes-per-sec; ATM parameters are in cells/cells-per-sec.
section: "4.1"
rfc2119_level: MUST
