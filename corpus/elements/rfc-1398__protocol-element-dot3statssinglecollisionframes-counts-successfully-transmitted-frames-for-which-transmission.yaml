document: rfc-1398
kind: protocol-element
summary: dot3StatsSingleCollisionFrames counts successfully transmitted frames for which transmission was inhibited by exactly one collision. Such frames are also counted in ifOutUcastPkts or ifOutNUcastPkts and are mutually exclusive with dot3StatsMultipleCollisionFrames.
