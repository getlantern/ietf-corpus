document: rfc-9777
kind: protocol-element
summary: The Querier election mechanism selects one multicast router per subnet to send periodic and triggered Query messages. All routers on the subnet maintain the same multicast listening state so any can assume the Querier role if the current Querier fails.
section: 7.6.2
topics:
    - multicast
    - routing
