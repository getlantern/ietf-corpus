document: rfc-5447
kind: interoperability-note
summary: The MIP6-Feature-Vector AVP (code 124) and MIP6-Home-Link-Prefix AVP (code 125) are allocated from the RADIUS Attribute Type space (values 0-255) to maintain RADIUS backward compatibility, while MIP6-Agent-Info (code 486) is allocated from the normal Diameter AVP Code space.
