document: rfc-1759
kind: protocol-element
summary: The prtLocalizationTable identifies each supported natural language, country, and character set. Language is a two-character ISO 639 code (e.g., EN, FR, DE); country is a two-character ISO 3166 code; character set is a CodedCharSet value referencing the IANA Character Set registry.
