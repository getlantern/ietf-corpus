document: rfc-8512
kind: protocol-element
summary: NAT state is organized under /nat/instances/instance (keyed by uint32 id, must be >= 1), where each instance carries an optional name, enable boolean, read-only capabilities container, a policy list, a mapping-table, and a statistics subtree. Multiple instances and multiple policies per instance are independently supported.
section: "2.1"
