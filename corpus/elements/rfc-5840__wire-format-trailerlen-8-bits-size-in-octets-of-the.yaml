document: rfc-5840
kind: wire-format
summary: 'TrailerLen (8 bits): Size in octets of the Integrity Check Value (ICV) as negotiated in the IPsec SA. MUST be set to zero when using ESP with encryption. The receiver MUST accept the packet only if this field matches the value computed from the negotiated SA.'
