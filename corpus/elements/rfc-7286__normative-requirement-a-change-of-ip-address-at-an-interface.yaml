document: rfc-7286
kind: normative-requirement
summary: A change of IP address at an interface invalidates the result of the ALTO server discovery procedure; it is required to re-run the discovery procedure without relying on earlier information (e.g., after host mobility).
section: "4.2"
rfc2119_level: REQUIRED
topics:
    - ip
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
