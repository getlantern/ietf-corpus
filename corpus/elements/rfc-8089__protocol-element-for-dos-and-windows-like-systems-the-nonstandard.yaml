document: rfc-8089
kind: protocol-element
summary: 'For DOS- and Windows-like systems, the nonstandard local-path rule can include a drive-letter segment: local-path = [ drive-letter ] path-absolute, where drive-letter = ALPHA ":". URIs of the form "file:///c:/path/to/file" are already supported by path-absolute; "file:c:/path/to/file" requires this extension.'
section: E.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
