document: rfc-5596
kind: security-consideration
summary: A DCCP server SHOULD by default permit generation of DCCP-Listen packets. A server MAY disable DCCP-Listen generation to prevent information disclosure, but doing so may inhibit middlebox traversal without affecting other DCCP state transitions.
section: "4"
rfc2119_level: SHOULD
topics:
    - security
    - nat
    - congestion
