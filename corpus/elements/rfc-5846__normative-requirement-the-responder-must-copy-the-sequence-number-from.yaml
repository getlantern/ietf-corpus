document: rfc-5846
kind: normative-requirement
summary: The responder MUST copy the Sequence Number from the BRI into the BRA and MUST mirror the P, G, and V bits. The responder MUST send a BRA for every accepted or rejected BRI; if the BRI is discarded (e.g., security check failed), no BRA is sent.
section: 6.1.2
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
