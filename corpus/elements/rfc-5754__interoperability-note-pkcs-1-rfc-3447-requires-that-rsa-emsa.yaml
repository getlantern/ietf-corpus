document: rfc-5754
kind: interoperability-note
summary: PKCS#1 (RFC 3447) requires that RSA EMSA-PKCS1-v1_5 padding MUST use SHA2 AlgorithmIdentifiers with NULL parameters, creating an exception to the general rule that SHA2 AlgorithmIdentifiers MUST be generated with absent parameters. Implementations must handle both forms when accepting.
section: "2"
