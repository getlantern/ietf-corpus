document: rfc-3550
kind: interoperability-note
summary: RTP version 2 (V=2) is the current version; V=1 was the first draft and V=0 was used by the 'vat' audio tool. There are no wire-format changes between RFC 1889 and RFC 3550; only the RTCP transmission interval algorithm and related rules were updated.
