document: rfc-3986
kind: state-machine
summary: 'Relative reference resolution (Section 5.2.2) transforms a reference R against base URI B into target URI T: if R has a scheme, use R entirely; else if R has an authority, use R''s authority and apply remove_dot_segments to R''s path; else if R''s path is empty, inherit base path (and optionally base query); else merge paths and remove dot segments. The fragment always comes from R.'
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
