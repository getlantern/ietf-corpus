document: rfc-2122
kind: protocol-element
summary: The 'vemmi' URL scheme designates multimedia interactive services conforming to the VEMMI standard (ITU-T T.107 and ETSI ETS 300 709). It takes the form vemmi://<host>:<port>/<vemmiservice>;<attribute>=<value>, where the port defaults to 575 and the vemmiservice component is optional.
