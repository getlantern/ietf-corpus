document: rfc-7403
kind: normative-requirement
summary: If a B2BUA receives a media-loopback INVITE with Max-Forwards of 0 but its local policy does not allow answering it, it SHOULD respond with 483 Too Many Hops per RFC 3261, behaving as it would without this traceroute support.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
