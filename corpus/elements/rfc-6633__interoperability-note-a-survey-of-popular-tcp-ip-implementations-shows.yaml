document: rfc-6633
kind: interoperability-note
summary: A survey of popular TCP/IP implementations shows that Linux (since 2004), FreeBSD, NetBSD, OpenBSD, and Solaris 10 (since 2005) have all removed or disabled support for ICMP Source Quench messages, confirming the practical obsolescence of the feature prior to formal deprecation.
