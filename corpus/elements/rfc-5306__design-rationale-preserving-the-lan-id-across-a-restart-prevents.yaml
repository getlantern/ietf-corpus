document: rfc-5306
kind: design-rationale
summary: Preserving the LAN-ID across a restart prevents generation of new pseudonode LSPs and corresponding changes in all LSPs referencing them. Using a different LAN-ID would create unnecessary churn, so the restarting router SHOULD use the same LAN-ID as before the restart.
section: 3.3.1
topics:
    - routing
