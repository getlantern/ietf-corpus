document: rfc-3987
kind: normative-requirement
summary: In documents with a native character encoding, IRIs MUST be encoded in that encoding; if it is not UTF-8, IRIs MUST NOT be placed into the document in UTF-8 encoding. IRI characters not expressible in the native encoding SHOULD be escaped using the document format's escaping conventions.
section: "6.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
