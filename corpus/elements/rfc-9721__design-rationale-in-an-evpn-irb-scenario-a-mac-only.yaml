document: rfc-9721
kind: design-rationale
summary: In an EVPN-IRB scenario, a MAC-only RT-2 advertisement is optional for host MAC addresses already advertised via MAC+IP RT-2 because the MAC+IP route makes the MAC-only route redundant. MAC-only RT-2 may still be issued for non-IP host MAC addresses not included in MAC+IP RT-2.
section: "3.1"
topics:
    - routing
