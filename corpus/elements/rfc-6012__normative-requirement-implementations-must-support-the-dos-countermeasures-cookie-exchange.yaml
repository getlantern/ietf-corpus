document: rfc-6012
kind: normative-requirement
summary: Implementations MUST support the DoS countermeasures (cookie exchange) defined by DTLS. The transport sender MUST NOT send any syslog messages before the DTLS handshake has successfully completed.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - tls
    - syslog
    - security
