document: rfc-1327
kind: interoperability-note
summary: For X.400(1984) interworking, Appendix G must be followed. If a message is transferred to a 1984 system via a 1988 MTA, following Appendix G provides a slightly better service. The main specification does not define a 1984-compatible subset.
