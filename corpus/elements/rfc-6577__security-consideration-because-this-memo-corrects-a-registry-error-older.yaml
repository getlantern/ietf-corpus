document: rfc-6577
kind: security-consideration
summary: Because this memo corrects a registry error, older implementations may not recognize the corrected 'fail' result string and may only recognize 'hardfail'. Implementers are advised to support both result strings for some period of time to maintain interoperability, noting that some implementations already use the SPF-defined 'fail' string.
