document: rfc-1990
kind: normative-requirement
summary: Implementations MUST NOT include the Address and Control Field (0xFF 0x03) in the logical entity to be fragmented. An implementation MUST accept reassembled packets with and without leading zeroes in the Protocol Field.
section: "3"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
