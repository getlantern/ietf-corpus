document: rfc-6647
kind: protocol-element
summary: SMTP DATA greylisting can be applied on receipt of the DATA command (entire envelope known) or on completion of DATA (message content available). Tuple components may include source, return address, recipients, message header fields, content digests, or arbitrary body analysis.
