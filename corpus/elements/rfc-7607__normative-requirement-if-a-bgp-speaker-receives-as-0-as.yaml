document: rfc-7607
kind: normative-requirement
summary: If a BGP speaker receives AS 0 as the peer AS in an OPEN message, it MUST abort the connection and send a NOTIFICATION with Error Code 'OPEN Message Error' and subcode 'Bad Peer AS'.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
