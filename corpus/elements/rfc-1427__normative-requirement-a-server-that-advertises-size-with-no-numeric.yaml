document: rfc-1427
kind: normative-requirement
summary: A server that advertises SIZE with no numeric parameter may not issue a 250 response to an extended MAIL command with a SIZE specification without first checking whether sufficient resources are available to transfer and retain the message; if possible, it should actually reserve the storage space.
section: "7"
rfc2119_level: SHOULD
topics:
    - email
