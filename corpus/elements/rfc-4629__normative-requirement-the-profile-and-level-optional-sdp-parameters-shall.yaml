document: rfc-4629
kind: normative-requirement
summary: The PROFILE and LEVEL optional SDP parameters SHALL NOT be used with any of the other optional parameters when using the H263-2000 media type. A system that specifies a PROFILE MUST also specify the supported LEVEL.
section: 8.1.2
rfc2119_level: SHALL NOT
