document: rfc-8791
kind: design-rationale
summary: The standard YANG 'augment' statement cannot be used to augment a YANG data structure defined with 'structure' because a YANG compiler or other tool is not required to understand the 'structure' extension. The new 'augment-structure' statement was introduced to handle this case explicitly.
section: "1"
topics:
    - yang
    - netconf
