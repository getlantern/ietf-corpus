document: rfc-9067
kind: protocol-element
summary: Policy conditions include call-policy (subroutine invocation), source-protocol (route origin), match-interface, match-prefix-set, match-neighbor-set, match-tag-set, and match-route-type. Match behavior is modified by match-set-options (any/all/invert); prefix and neighbor sets restrict options to any/invert only.
section: "4.2"
topics:
