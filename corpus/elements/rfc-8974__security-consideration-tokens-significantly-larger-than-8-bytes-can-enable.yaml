document: rfc-8974
kind: security-consideration
summary: 'Tokens significantly larger than 8 bytes can enable denial-of-service attacks on constrained-memory nodes: an on-path attacker or malicious client can send large tokens to exhaust the node''s memory. Implementations must be prepared to handle such messages.'
section: "5.1"
topics:
