document: rfc-5953
kind: protocol-element
summary: SnmpTLSFingerprint is a textual convention composed of a 1-octet hashing algorithm identifier (from the IANA TLS HashAlgorithm Registry per RFC 5246) followed by the fingerprint value. A zero-length value is permitted for use in optional-fingerprint contexts.
