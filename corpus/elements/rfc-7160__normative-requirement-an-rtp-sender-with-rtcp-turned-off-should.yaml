document: rfc-7160
kind: normative-requirement
summary: An RTP Sender with RTCP turned off SHOULD use a different SSRC for each different clock rate but MAY use different clock rates on the same SSRC as long as the RTP timestamp is calculated using the start_offset/capture_start formula defined in this section.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
