document: rfc-3731
kind: normative-requirement
summary: The <renew> command requires a <domain:curExpDate> element containing the current validity period expiration date. This value ensures that repeated <renew> commands do not result in multiple unanticipated successful renewals.
section: 3.2.3
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
