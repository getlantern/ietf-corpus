document: rfc-6533
kind: wire-format
summary: The EmbeddedUnicodeChar encoding uses the syntax \x{HEXPOINT} where HEXPOINT is 2 to 6 hexadecimal digits representing a Unicode code point; it encodes characters outside ASCII and ASCII special characters (CTLs, SP, '\', '+', '=') for use in utf-8-addr-xtext and utf-8-addr-unitext forms.
