document: rfc-6810
kind: design-rationale
summary: The protocol requires the router to make an explicit Reset Query request when it cannot receive incremental updates (rather than having the cache initiate a full transfer), because the cache has no way of knowing whether the router has established sessions with other caches that might provide better service.
section: "4"
topics:
    - routing
    - bgp
