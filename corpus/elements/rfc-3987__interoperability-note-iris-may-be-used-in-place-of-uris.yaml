document: rfc-3987
kind: interoperability-note
summary: 'IRIs may be used in place of URIs only when: (a) the protocol or format element is explicitly designated to carry IRIs, (b) the carrying protocol/format has a mechanism to represent the wide range of IRI characters, and (c) the corresponding URI encodes original characters into octets using UTF-8.'
section: "1.2"
topics:
    - ip
