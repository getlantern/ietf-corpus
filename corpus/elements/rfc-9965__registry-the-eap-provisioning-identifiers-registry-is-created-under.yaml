summary: The 'EAP Provisioning Identifiers' registry is created under the 'Extensible Authentication Protocol (EAP) Registry' group with Expert Review procedure. Initial entries are '@noob.eap.arpa' (EAP-NOOB, RFC 9140) and 'portal@tls.eap.arpa' (EAP-TLS, RFC 9190). Each entry has an NAI, Method Type, and Reference.
