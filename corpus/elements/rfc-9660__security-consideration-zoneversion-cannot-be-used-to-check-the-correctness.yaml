document: rfc-9660
kind: security-consideration
summary: ZONEVERSION cannot be used to check the correctness of an entire zone; ZONEMD (RFC 8976) is better suited for zone integrity verification. ZONEVERSION only correlates a specific answer with a zone version and provides no special integrity function beyond a normal field value.
section: "7"
topics:
    - dns
    - security
