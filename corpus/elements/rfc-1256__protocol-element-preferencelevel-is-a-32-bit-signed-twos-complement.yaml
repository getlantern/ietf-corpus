document: rfc-1256
kind: protocol-element
summary: PreferenceLevel is a 32-bit signed twos-complement integer indicating relative preferability of a router address as a default router. Higher values are more preferable. The minimum value hex 80000000 is reserved to mean the address must not be used as a default router, even if advertised.
section: "4.1"
topics:
    - ip
    - routing
