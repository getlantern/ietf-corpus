document: rfc-2131
kind: design-rationale
summary: DHCP messages use the BOOTP message format (RFC 951) to enable BOOTP relay agents to forward DHCP messages without modification, eliminating the need for a DHCP server on every physical subnet. This also allows existing BOOTP clients to interoperate with DHCP servers without software changes.
section: "1"
topics:
