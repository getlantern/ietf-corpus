document: rfc-8019
kind: normative-requirement
summary: When processing "Hash and URL" Certificate Encoding, the Responder SHOULD read only the initial bytes to decode ASN.1 length, download no more than that many bytes, apply a configurable hard limit, and SHOULD provide the ability to disable or restrict this feature to trusted URLs.
section: "4.7"
rfc2119_level: SHOULD
topics:
    - ipsec
    - security
    - pkix
