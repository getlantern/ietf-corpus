document: rfc-2389
kind: normative-requirement
summary: FTP implementations that support FEAT MUST include in the FEAT response all properly documented FTP extensions beyond RFC 959, including those that existed before FEAT. A client receiving a FEAT response may assume the listed extensions are the only ones supported.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
