document: rfc-5182
kind: normative-requirement
summary: 'Servers implementing SEARCHRES MUST implement ESEARCH and conform to additional ESEARCH interaction requirements: when SAVE is combined with MIN or MAX only, "$" contains only the MIN/MAX message; when SAVE is combined with ALL and/or COUNT, "$" contains all found messages.'
section: "2.4"
rfc2119_level: MUST
