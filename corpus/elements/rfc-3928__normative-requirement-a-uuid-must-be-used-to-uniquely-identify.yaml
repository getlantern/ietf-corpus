document: rfc-3928
kind: normative-requirement
summary: A UUID MUST be used to uniquely identify entries in LCUP. Servers MUST support UUIDs and SHOULD expose them as a single-valued operational attribute (e.g., 'entryUUID') with efficient indexed search support.
section: "3.2"
rfc2119_level: MUST
topics:
    - ldap
