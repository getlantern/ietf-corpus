document: rfc-7777
kind: normative-requirement
summary: When a receiving node receives an RI LSA that changes the set of tags applicable to any originating node with features depending on node administrative tags, the receiving node MUST repeat any computation or processing based on those administrative tags.
section: 2.2.3
rfc2119_level: MUST
topics:
    - routing
