document: rfc-6552
kind: normative-requirement
summary: Stretching the step_of_rank is NOT RECOMMENDED because it increases the apparent distance to the root, distorts the DODAG from its optimal shape, and may cause instabilities from greedy behaviors where nodes augment their Ranks to use each other as parents in a loop.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
    - routing
