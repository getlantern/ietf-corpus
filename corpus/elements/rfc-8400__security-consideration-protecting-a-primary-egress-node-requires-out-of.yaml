document: rfc-8400
kind: security-consideration
summary: Protecting a primary egress node requires out-of-band communication between the primary and backup egress nodes to convey service labels (as UA labels) and related forwarding information. It is important to verify that identifiers used to identify primary and backup egress nodes in the LSP match those used in the out-of-band protocol (such as BGP).
section: "7"
topics:
