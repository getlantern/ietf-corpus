document: rfc-6184
kind: normative-requirement
summary: MANEs MUST NOT duplicate any NAL unit except for sequence or picture parameter set NAL units. Parameter set duplication MUST NOT affect any active parameter set, and duplication SHOULD be performed at the application layer rather than by duplicating RTP packets with identical sequence numbers.
section: "6.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
