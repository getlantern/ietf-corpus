document: rfc-4090
kind: protocol-element
summary: 'Two new SESSION_ATTRIBUTE flags: ''Bandwidth protection desired'' (0x08) requests a backup path with a bandwidth guarantee equal to the protected LSP bandwidth or the value in FAST_REROUTE; ''Node protection desired'' (0x10) requests a backup that bypasses at least the next node of the protected LSP.'
section: "4.3"
topics:
    - mpls
    - routing
