document: rfc-1509
kind: protocol-element
summary: gss_seal signs and optionally encrypts a message. conf_req_flag=true requests confidentiality plus integrity; false requests integrity only. The output_message_buffer contains both the protected data and the signature. conf_state reports whether confidentiality was actually applied.
