summary: 'Line Coding Violation (LCV) counts both Bipolar Violations (BPVs) and Excessive Zeros (EXZs): for B3ZS, EXZ is any zero string of length ≥3; for HDB3, length >4. An EXZ increments LCV by exactly one regardless of zero string length.'
