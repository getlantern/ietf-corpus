document: rfc-5939
kind: normative-requirement
summary: If a session-level 'a=creq' attribute contains an option tag unsupported by the answerer, the answerer MUST NOT use any potential configuration attributes in any media description, and MUST continue with standard RFC 3264 procedures while including 'a=csup' listing the extensions it supports.
section: 3.6.2
rfc2119_level: MUST NOT
topics:
