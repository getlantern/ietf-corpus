document: rfc-1723
kind: security-consideration
summary: The basic RIP protocol is not secure. RIP-2 adds an extensible authentication mechanism to address this, currently supporting simple plaintext password authentication (type 2). The authentication entry uses 16 octets of plaintext password, which provides minimal security and is vulnerable to eavesdropping.
section: "5"
topics:
