document: rfc-8163
kind: normative-requirement
summary: IPv6 header compression MUST be implemented on all 6LoBAC nodes. The REQUIRED compression mechanism is LOWPAN_IPHC as specified in RFC 6282. Implementations MAY also support Generic Header Compression (RFC 7400) for transport layer headers.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
