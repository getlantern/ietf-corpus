document: rfc-7139
kind: protocol-element
summary: The Length field (12 bits) in the OTN-TDM Generalized Label indicates the total number of TSs in the HO ODUk link. Values of 4 and 16 indicate 2.5 Gbps TS granularity; values 2, 8, 32, and 80 indicate 1.25 Gbps TS granularity.
section: "6.1"
