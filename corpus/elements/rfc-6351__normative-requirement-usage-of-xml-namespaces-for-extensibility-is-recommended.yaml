document: rfc-6351
kind: normative-requirement
summary: Usage of XML namespaces for extensibility is RECOMMENDED for extensions that have no equivalent in plain-text vCard. Unregistered extensions starting with 'X-' and 'VND-...-' are expressed using elements starting with 'x-' and 'vnd-...-'.
section: "5.1"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
