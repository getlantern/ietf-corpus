document: rfc-6242
kind: security-consideration
summary: Defaulting to TCP port 830 enables firewalls and network devices to identify and filter NETCONF over SSH traffic, but also makes it easier for attackers to identify. Allowing the subsystem on other ports without corresponding firewall changes may expose NETCONF to unauthorized access.
section: "6"
topics:
    - netconf
    - security
