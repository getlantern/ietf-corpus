document: rfc-4438
kind: protocol-element
summary: The t11NsRejectRegNotify notification is sent when a registration request is rejected for a Name Server Information Subset where t11NsInfoSubsetRejReqNotfyEnable is 'true'. It carries the switch WWN, the rejected port's Port Name, the CT_IU command string, and the three reject code objects.
