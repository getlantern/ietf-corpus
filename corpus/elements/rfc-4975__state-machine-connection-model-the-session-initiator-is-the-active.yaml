document: rfc-4975
kind: state-machine
summary: 'Connection model: the session initiator is the ''active'' endpoint and MUST connect to the answerer''s URI; upon connection the active endpoint sends an immediate SEND (possibly bodiless). The passive endpoint waits for the first incoming SEND, matches its To-Path URI to a session, and associates the connection with that session.'
section: "5.4"
topics:
    - realtime
    - tcp
