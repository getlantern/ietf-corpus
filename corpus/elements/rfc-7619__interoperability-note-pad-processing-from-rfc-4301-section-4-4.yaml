document: rfc-7619
kind: interoperability-note
summary: PAD processing from RFC 4301 Section 4.4.3 is updated to add NULL authentication as a supported method (with no authentication data), add ID_NULL as an allowed ID type, and add an SPD flag indicating whether unauthenticated peers may use an SPD entry. Only SPD entries with the flag explicitly set can be used for unauthenticated connections.
section: "2.4"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
