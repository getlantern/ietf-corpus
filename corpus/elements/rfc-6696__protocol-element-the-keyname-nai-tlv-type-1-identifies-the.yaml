document: rfc-6696
kind: protocol-element
summary: The keyName-NAI TLV (Type=1) identifies the rIK protecting an ERP message. The username part contains the 64-bit EMSKname encoded as 16 hexadecimal octets; the realm identifies the ER server's domain. Exactly one keyName-NAI attribute SHALL be present in each EAP-Initiate/Re-auth and EAP-Finish/Re-auth packet.
section: 5.3.2
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
