document: rfc-6555
kind: normative-requirement
summary: A stateful Happy Eyeballs implementation that falls back to a non-preferred address family MUST occasionally make connection attempts using the host's preferred address family (as it may have become functional again) and SHOULD do so every 10 minutes.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
