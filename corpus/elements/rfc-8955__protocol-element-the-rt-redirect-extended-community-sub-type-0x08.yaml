document: rfc-8955
kind: protocol-element
summary: 'The rt-redirect Extended Community (sub-type 0x08) supports three encoding formats: 0x8008 (2-octet AS, 4-octet value), 0x8108 (4-octet IPv4, 2-octet value), 0x8208 (4-octet AS, 2-octet value), redirecting matching traffic to the VRF whose import policy lists the specified route-target.'
section: "7.4"
