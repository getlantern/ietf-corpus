document: rfc-5939
kind: protocol-element
summary: The 'a=csup' attribute lists the SDP Capability Negotiation extensions (identified by option tags) supported by the entity that generated the SDP session description. It may appear at session level (applies to entire description) or media level (applies only to that media description), with at most one occurrence at each level.
section: 3.3.1
topics:
    - realtime
    - sip
