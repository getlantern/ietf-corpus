summary: 'Three new flags are added to the LSP Object: N (P2MP flag, bit 3) indicating a P2MP TE LSP message, F (Fragmentation flag, bit 2) indicating fragmented LSP messages, and E (ERO-compression flag, bit 1) indicating compressed route format using SERO/SRRO objects.'
