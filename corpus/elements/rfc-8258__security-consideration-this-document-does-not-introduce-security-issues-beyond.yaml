document: rfc-8258
kind: security-consideration
summary: This document does not introduce security issues beyond those in RFC 4203 and RFC 5307. ISCD information is not used for SPF computation or normal routing, so extensions have no direct effect on IP routing. However, tampering with GMPLS TE Link State Advertisements may affect the underlying transport network, and mechanisms such as RFC 2154 and RFC 5304 are suggested to protect this information.
section: "5"
topics:
    - security
    - routing
    - mpls
