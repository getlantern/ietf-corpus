document: rfc-1723
kind: security-consideration
summary: For maximum security when authentication is enabled, RIP-1 messages should be ignored (via the compatibility switch set to RIP-2 multicast mode), since RIP-1 messages carry no authentication and could be used to inject false routing information.
section: "4.2"
topics:
    - routing
    - security
