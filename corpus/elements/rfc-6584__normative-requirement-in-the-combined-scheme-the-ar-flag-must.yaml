document: rfc-6584
kind: normative-requirement
summary: In the Combined scheme the AR flag MUST be set to 1 (anti-replay is mandatory). The receiver MUST first check the Group-keyed MAC and drop on failure, then check the Digital Signature and drop on failure.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - multicast
