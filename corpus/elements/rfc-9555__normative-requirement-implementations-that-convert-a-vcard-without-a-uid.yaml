document: rfc-9555
kind: normative-requirement
summary: Implementations that convert a vCard without a UID property MUST generate a unique identifier as value for the uid property. This value SHOULD be the same when converting the same vCard multiple times, but how to achieve this is implementation-specific.
section: 2.1.1
rfc2119_level: MUST
topics:
    - json
