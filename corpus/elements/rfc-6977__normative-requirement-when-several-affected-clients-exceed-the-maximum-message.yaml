document: rfc-6977
kind: normative-requirement
summary: When several affected clients exceed the maximum message size, the relay MUST generate multiple Reconfigure-Request messages to carry all Client Identifier Options. The relay MUST NOT add clients to the list in retransmissions but MAY remove them.
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
