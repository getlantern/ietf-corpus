document: rfc-5213
kind: state-machine
summary: 'A PMIPv6 mobility session transitions through: (1) New Session — initial PBU triggers BCE creation and tunnel/prefix-route setup; (2) Lifetime Extension No Handoff — same MAG refreshes binding; (3) Lifetime Extension After Handoff — new MAG updates BCE, old routes removed, new tunnel and routes created; (4) De-Registration — lifetime=0 PBU starts MinDelayBeforeBCEDelete timer, then BCE deleted.'
section: "5.3"
topics:
    - mobility
