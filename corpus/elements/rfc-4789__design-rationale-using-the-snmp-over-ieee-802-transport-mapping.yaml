document: rfc-4789
kind: design-rationale
summary: Using the SNMP over IEEE 802 transport mapping inherently restricts messages to a single logical IEEE 802 LAN, bridged LAN, or VLAN. Only a single SNMP engine can be addressed on a given IEEE 802 network interface, requiring command generators and notification receivers to share a single transport endpoint.
section: "3"
topics:
