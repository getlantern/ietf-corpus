document: rfc-9293
kind: protocol-element
summary: 'RST generation rules depend on state: (1) CLOSED — send RST for any non-RST incoming segment; (2) non-synchronized states — send RST for unacceptable ACK or security mismatch; (3) synchronized states — respond with empty ACK for out-of-window segments, and send RST only for security level mismatch, transitioning to CLOSED.'
section: 3.5.2
topics:
    - tcp
