document: rfc-9588
kind: design-rationale
summary: SPAKE pre-authentication was designed as an alternative to FAST for protecting 2FA credentials because FAST requires a secondary trust relationship (often a CA) that is cumbersome to deploy. SPAKE creates a high-entropy encryption channel implicitly from the shared long-term key, enabling 2FA without any third-party trust anchor.
section: "1.3"
topics:
    - crypto
    - security
