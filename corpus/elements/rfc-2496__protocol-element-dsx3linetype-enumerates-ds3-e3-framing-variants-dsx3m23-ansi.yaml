document: rfc-2496
kind: protocol-element
summary: 'dsx3LineType enumerates DS3/E3 framing variants: dsx3M23 (ANSI T1.107-1988), dsx3SYNTRAN (ANSI T1.107-1988), dsx3CbitParity (ANSI T1.107a-1990), dsx3ClearChannel (ANSI T1.102-1987), e3Framed (CCITT G.751), and e3Plcp (ETSI T/NA(91)18). The type determines interpretation of error and usage statistics.'
