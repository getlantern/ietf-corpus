document: rfc-6990
kind: protocol-element
summary: PTS_error_count is a 32-bit count of PTS_errors, which occur when the Presentation Time Stamp (PTS) repetition is more than 700 ms within the MPEG-2 TS (ETSI Section 5.2.2). The PTS is used to help the decoder present the program on time and synchronized.
