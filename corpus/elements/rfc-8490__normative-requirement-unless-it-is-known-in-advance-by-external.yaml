document: rfc-8490
kind: normative-requirement
summary: Unless it is known in advance by external means that a client supports DSO, a server MUST NOT initiate DSO request messages or DSO unidirectional messages until a DSO Session has been mutually established by at least one successful DSO request/response exchange initiated by the client.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - dns
