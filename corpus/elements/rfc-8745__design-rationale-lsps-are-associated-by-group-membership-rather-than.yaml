document: rfc-8745
kind: design-rationale
summary: LSPs are associated by group membership rather than by listing peer LSPs, using the generic ASSOCIATION object from RFC 8697. This allows both PCC- and PCE-initiated associations and supports passive, active stateful, and PCE-initiated modes uniformly.
section: "3.1"
topics:
    - mpls
    - routing
