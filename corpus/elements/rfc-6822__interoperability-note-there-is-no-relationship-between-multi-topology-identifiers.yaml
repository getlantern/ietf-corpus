document: rfc-6822
kind: interoperability-note
summary: There is no relationship between Multi-Topology Identifiers (MTIDs) from RFC 5120 and the ITIDs defined in this document. MI-IS-IS runs a separate Update Process and LSDB per ITID, unlike M-ISIS which uses a single LSDB for all topologies within a standard instance.
section: "4"
topics:
