document: rfc-6779
kind: design-rationale
summary: Two TEXTUAL-CONVENTIONs, NeighborIfIndex and NeighborRouterIndex, are defined to bridge NHDP's dynamic address-set-based neighbor identification and SMIv2's requirement for statically defined table indexes. Without this mapping, it would be impossible to index MIB tables using NHDP's variable-length address sets.
section: "5.3"
topics:
