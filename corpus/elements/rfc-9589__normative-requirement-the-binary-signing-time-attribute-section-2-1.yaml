summary: The binary-signing-time attribute (Section 2.1.6.4.4 of RFC 6488) is disallowed entirely; its section is removed. The signedAttrs field MUST NOT contain the binary-signing-time attribute OID 1.2.840.113549.1.9.16.2.46.
section: "4"
rfc2119_level: MUST NOT
