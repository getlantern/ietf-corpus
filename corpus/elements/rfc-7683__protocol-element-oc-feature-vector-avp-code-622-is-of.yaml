document: rfc-7683
kind: protocol-element
summary: OC-Feature-Vector AVP (code 622) is of type Unsigned64, encoding a 64-bit capability flags field. Bit OLR_DEFAULT_ALGO (0x0000000000000001) indicates support for or selection of the loss algorithm. Absence of the AVP in a request implies only loss-algorithm support; absence in an answer implies loss algorithm is selected.
