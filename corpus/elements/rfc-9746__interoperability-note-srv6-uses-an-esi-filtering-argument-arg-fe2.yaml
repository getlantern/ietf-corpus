document: rfc-9746
kind: interoperability-note
summary: SRv6 uses an ESI filtering argument (Arg.FE2) in the service SID to identify the source ES of BUM packets, making its default split-horizon behavior analogous to ESI Label filtering. Both local bias (source IP) and ESI Label methods are supported.
section: "1.2"
topics:
