document: rfc-8664
kind: design-rationale
summary: SR-TE paths are carried in the existing ERO object via new SR-ERO subobjects rather than defining new PCEP message types. This preserves compatibility with existing PCEP message flows (PCRep, PCInitiate, PCUpd, PCRpt) while adding SR-specific semantics through a new subobject type.
