document: rfc-2327
kind: normative-requirement
summary: To register a new transport protocol name, an RFC MUST be produced describing the protocol. New bandwidth specifiers MUST reference a standards-track RFC explaining why existing specifiers do not suffice. New nettype registrations MUST reference an RFC giving network and address type details and MUST include at least one address type registration.
section: Appendix B
rfc2119_level: MUST
topics:
    - realtime
    - registry
    - process
