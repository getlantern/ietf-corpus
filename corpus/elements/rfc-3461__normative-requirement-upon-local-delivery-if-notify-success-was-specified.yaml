document: rfc-3461
kind: normative-requirement
summary: Upon local delivery, if NOTIFY=SUCCESS was specified the MTA MUST issue a 'delivered' DSN. If NOTIFY was specified without SUCCESS, the MTA MUST NOT issue a DSN. If NOTIFY was not supplied, the MTA MUST NOT issue a DSN.
section: 5.2.3
rfc2119_level: MUST
topics:
    - email
