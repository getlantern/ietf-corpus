document: rfc-7688
kind: design-rationale
summary: 'Path computation synchronization is simple: until a Resource Block Information sub-TLV is received for a system, path computation cannot use the other four sub-TLVs because the nature of the resources (wavelength converters, regenerators, etc.) is unknown. Once received, computation proceeds with whatever sub-TLVs are available.'
