document: rfc-5630
kind: normative-requirement
summary: When a derived dialog (e.g., created via REFER, Replaces, or Join) originates from a SIPS dialog, the UAC MUST NOT establish the new dialog using SIP without explicit authorization from the entities involved.
section: 5.1.1.3
rfc2119_level: MUST NOT
topics:
