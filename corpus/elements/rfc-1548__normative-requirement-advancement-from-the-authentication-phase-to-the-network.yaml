document: rfc-1548
kind: normative-requirement
summary: Advancement from the Authentication phase to the Network-Layer Protocol phase MUST NOT occur until authentication has completed using the negotiated protocol. If authentication fails, PPP SHOULD proceed to the Link Termination phase.
section: "3.5"
rfc2119_level: MUST NOT
topics:
    - security
