document: rfc-3573
kind: protocol-element
summary: The Timeout field in the Modem On-Hold Status AVP is a 4-bit quantity encoding negotiated maximum on-hold duration per V.92, ranging from 10 seconds (0001) to no limit (1101); values 0000, 1110, and 1111 are reserved. It is valid only when H=1.
section: "4.2"
topics:
