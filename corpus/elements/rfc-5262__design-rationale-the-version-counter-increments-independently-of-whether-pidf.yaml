document: rfc-5262
kind: design-rationale
summary: The 'version' counter increments independently of whether <pidf-full> or <pidf-diff> content is transported — a single shared counter spans both document types. This enables 'state delta' processing per RFC 3265 and aligns with the partial notification model of RFC 5263.
section: "3"
