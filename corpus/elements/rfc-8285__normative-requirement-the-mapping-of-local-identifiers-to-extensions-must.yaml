document: rfc-8285
kind: normative-requirement
summary: The mapping of local identifiers to extensions MUST be performed out of band (e.g., via SDP). Each extension URI MUST be absolute, and URIs containing a domain name SHOULD also contain a month-date in the form mmyyyy.
section: "5"
rfc2119_level: MUST
topics:
