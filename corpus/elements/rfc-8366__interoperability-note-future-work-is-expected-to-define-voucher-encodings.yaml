document: rfc-8366
kind: interoperability-note
summary: Future work is expected to define voucher encodings in CBOR (replacing JSON) and alternative signature containers using JOSE or COSE (replacing CMS). XML and ASN.1 formats are also conceivable; each new format would register its own media type.
