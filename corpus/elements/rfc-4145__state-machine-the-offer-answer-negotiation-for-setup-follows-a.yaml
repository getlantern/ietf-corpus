kind: state-machine
summary: 'The offer/answer negotiation for ''setup'' follows a defined compatibility table: offer ''active'' → answer must be ''passive'' or ''holdconn''; offer ''passive'' → answer must be ''active'' or ''holdconn''; offer ''actpass'' → answer may be ''active'', ''passive'', or ''holdconn''; offer ''holdconn'' → answer must be ''holdconn''. Default is ''active'' in offer and ''passive'' in answer.'
