document: rfc-6146
kind: interoperability-note
summary: NAT64 is compliant with RFC 4787 (NAT UDP requirements), RFC 5382 (TCP NAT requirements), and RFC 5508 (ICMP NAT requirements), and consequently supports both Endpoint-Independent Mapping and both Endpoint-Independent and Address-Dependent Filtering modes.
