document: rfc-3520
kind: security-consideration
summary: Replay attacks are the primary threat; the START_TIME field (for the non-associated model) and SESSION_ID (for other models) are the defense mechanisms. Failure to synchronize clocks via NTP undermines START_TIME-based replay protection entirely.
