document: rfc-5065
kind: normative-requirement
summary: When advertising to a confederation peer in a neighboring Member-AS, the speaker prepends its own Member-AS Number to an AS_CONFED_SEQUENCE segment. If prepending would overflow 255 ASes, it SHOULD prepend a new AS_CONFED_SEQUENCE segment.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
