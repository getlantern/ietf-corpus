document: rfc-6376
kind: design-rationale
summary: The body length limit (l= tag) was provided because mailing lists commonly append trailers to messages. This allows a Signer to cover only the original body and allows Verifiers to accept messages with extraneous appended data as a matter of policy, though this introduces security risks described in Section 8.2.
section: 5.3.1
topics:
    - email
