document: rfc-7946
kind: protocol-element
summary: A 'geo' URI with two coordinates and absent or zero uncertainty maps to a GeoJSON Point with coordinates [lon, lat]. A 'geo' URI with altitude maps to coordinates [lon, lat, alt]. GeoJSON has no concept of uncertainty, so imprecise 'geo' URIs cannot be mapped to GeoJSON.
