kind: wire-format
summary: The JSON format uses media type 'application/problem+json'. The XML format uses media type 'application/problem+xml' with XML namespace 'urn:ietf:rfc:7807'. In the XML format, extension arrays are serialized as elements containing child elements named 'i', and extension objects as elements containing named child elements.
