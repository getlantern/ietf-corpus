document: rfc-6038
kind: wire-format
summary: The Symmetrical Size Session-Sender packet (Unauthenticated mode) inserts 27 MBZ octets between the Error Estimate field and the Packet Padding, replacing the area where the Session-Reflector's larger header fields reside, so that both directions carry equal-length packets without truncation.
