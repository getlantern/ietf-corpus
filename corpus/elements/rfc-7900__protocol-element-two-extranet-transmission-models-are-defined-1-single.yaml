document: rfc-7900
kind: protocol-element
summary: 'Two extranet transmission models are defined: (1) ''single PMSI per C-flow'' — each extranet packet is sent on exactly one PMSI (with or without extranet separation), supported for both BGP and PIM PE-PE protocols; and (2) ''multiple PMSIs per C-flow'' — a PE may send a packet on several PMSIs, supported only with PIM.'
section: "3"
