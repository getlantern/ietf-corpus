document: rfc-4040
kind: security-consideration
summary: A receiver may be overloaded by receipt of too many packets from undesired sources. Network-layer authentication MAY be used to discard such packets, though the processing cost of authentication itself may be prohibitive. The ptime parameter can be used to negotiate an appropriate packetization period during session setup to avoid sender-induced overload.
section: "6"
rfc2119_level: MAY
topics:
    - security
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
