document: rfc-6172
kind: design-rationale
summary: iFCP address translation mode is deprecated rather than updated because the FC control frame standards (FC-LS, FCP-3, and forthcoming FC-LS-2 and FCP-4) have changed significantly since RFC 4172 was published, rendering Section 7.3 of RFC 4172 incorrect. Updating it would create a continuing requirement to track future FC changes for an unused protocol mode.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
