document: rfc-8214
kind: design-rationale
summary: Because VPWS traffic from an originating Ethernet Segment can only be forwarded to a single destination Ethernet Segment, no MAC lookup is required; the MPLS label associated with the per-EVI Ethernet A-D route alone is sufficient to identify the destination AC and perform forwarding.
