document: rfc-6427
kind: design-rationale
summary: The L-Flag is not automatically propagated in hierarchical LSP scenarios, and the server-failure determination rules of Section 2.1.1 must be re-applied at each layer. This prevents premature triggering of protection switching at higher layers during transient conditions.
