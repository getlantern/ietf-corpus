document: rfc-5627
kind: normative-requirement
summary: The user and host parts of a GRUU learned in a REGISTER response MUST be treated opaquely by the UA; the UA MUST NOT modify them, MUST NOT modify or remove unrecognized URI parameters, and MUST NOT add, remove, or modify transport, lr, maddr, ttl, user, or comp URI parameters.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - sip
