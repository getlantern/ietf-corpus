document: rfc-5018
kind: security-consideration
summary: Client impersonation is mitigated by TLS (floor control server assumes attackers cannot hijack authenticated TLS connections); server impersonation is mitigated by requiring servers to present certificates at TLS connection establishment; message tampering is prevented by TLS integrity protection; eavesdropping is mitigated by TLS confidentiality.
