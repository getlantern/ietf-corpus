document: rfc-4010
kind: normative-requirement
summary: If an S/MIME client is required to support symmetric encryption with SEED, the SMIMECapabilities attribute MUST contain the SEED OID (id-seedCBC) in the symmetric algorithms category, and the associated parameter MUST be SeedSMimeCapability ::= NULL.
section: "4"
rfc2119_level: MUST
