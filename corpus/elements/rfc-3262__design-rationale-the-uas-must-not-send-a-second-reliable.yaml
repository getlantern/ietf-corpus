document: rfc-3262
kind: design-rationale
summary: The UAS MUST NOT send a second reliable provisional response until the first is acknowledged because the first conveys the initial RSeq sequence number; sending additional responses before acknowledgment would prevent the UAS from guaranteeing in-order delivery.
section: "3"
topics:
