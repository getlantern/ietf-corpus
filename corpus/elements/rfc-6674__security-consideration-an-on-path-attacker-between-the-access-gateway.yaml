document: rfc-6674
kind: security-consideration
summary: An on-path attacker between the access gateway and AFTR can modify the Context Identifier in the packet, causing it to be associated with an incorrect access device. This threat is analogous to an attacker modifying the source/destination IP address of a packet.
section: "7"
topics:
