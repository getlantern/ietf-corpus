document: rfc-2769
kind: design-rationale
summary: A lightweight mirror (e.g., a router) needs only to trust its adjacent mirror, check that mirror's signature, and apply changes without any authorization re-check — enabling routers to mirror only the objects needed for route filter configuration with minimal implementation complexity.
section: B.4
topics:
    - routing
