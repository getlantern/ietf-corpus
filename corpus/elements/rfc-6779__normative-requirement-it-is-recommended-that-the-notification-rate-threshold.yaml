document: rfc-6779
kind: normative-requirement
summary: It is RECOMMENDED that the notification rate threshold be set to 10 occurrences within a time window of at least 5 × nhdpHelloInterval. Only one notification is sent per event. This is more conservative than the RFC 4750 OSPF recommendation because NHDP operates on lossier wireless channels.
section: 5.1.3.2
rfc2119_level: RECOMMENDED
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
