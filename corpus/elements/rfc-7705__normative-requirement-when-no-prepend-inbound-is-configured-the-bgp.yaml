document: rfc-7705
kind: normative-requirement
summary: When 'No Prepend Inbound' is configured, the BGP router MUST NOT append the 'Local AS' ASN value to the AS_PATH when installing or advertising inbound updates to iBGP neighbors, but MUST still append the globally configured ASN when advertising to other local eBGP neighbors.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
