document: rfc-5452
kind: normative-requirement
summary: Resolvers SHOULD favor authoritative nameservers with which a trust relation has been established; stub-resolvers SHOULD be able to use TSIG (RFC 2845) or IPsec (RFC 4301) when communicating with their recursive resolver.
section: "9.2"
rfc2119_level: SHOULD
topics:
