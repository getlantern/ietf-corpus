document: rfc-3648
kind: protocol-element
summary: DAV:ordering-type is a protected live property that indicates whether a collection is ordered and, if so, uniquely identifies the semantics of the ordering via a URI. It cannot be set via PROPPATCH; it is set only via the Ordering-Type header on MKCOL or via ORDERPATCH. Two predefined values are DAV:custom (ordered, semantics not advertised) and DAV:unordered (not ordered).
section: 4.1.1
topics:
    - http
    - registry
