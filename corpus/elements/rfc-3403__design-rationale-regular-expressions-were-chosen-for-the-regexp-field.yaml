document: rfc-3403
kind: design-rationale
summary: Regular expressions were chosen for the REGEXP field for their compactness-to-expressivity ratio, allowing a great deal of information to be encoded in a relatively small DNS packet. This was the original motivation for the NAPTR record in the URN Working Group.
