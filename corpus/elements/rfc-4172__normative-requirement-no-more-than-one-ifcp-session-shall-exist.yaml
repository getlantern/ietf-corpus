document: rfc-4172
kind: normative-requirement
summary: No more than one iFCP session SHALL exist between a given pair of N_PORTs. All iFCP traffic between a given remote and local N_PORT pair MUST flow through the same iFCP session.
section: 5.2.1
rfc2119_level: MUST
topics:
