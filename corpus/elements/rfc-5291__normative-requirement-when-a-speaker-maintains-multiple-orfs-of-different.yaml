document: rfc-5291
kind: normative-requirement
summary: When a speaker maintains multiple ORFs of different ORF-Types for a peer, the decision to advertise a route is made by passing it through each ORF and combining results such that any DENY result combined with PERMIT yields DENY.
section: "6"
rfc2119_level: MUST
topics:
