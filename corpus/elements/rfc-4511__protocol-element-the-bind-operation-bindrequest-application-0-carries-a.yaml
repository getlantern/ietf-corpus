kind: protocol-element
summary: The Bind operation (BindRequest APPLICATION 0) carries a version INTEGER (1..127), a name LDAPDN, and an AuthenticationChoice of simple (OCTET STRING password) or sasl (SaslCredentials with mechanism LDAPString and optional credentials OCTET STRING). BindResponse includes optional serverSaslCreds for mutual authentication.
