document: rfc-9664
kind: normative-requirement
summary: When sending a Registration Request, the Requester MUST delay the initial transmission by a random amount between 0–3000 milliseconds with granularity of no more than 10 milliseconds, to prevent synchronization of multiple devices upon recovery from a power failure.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
