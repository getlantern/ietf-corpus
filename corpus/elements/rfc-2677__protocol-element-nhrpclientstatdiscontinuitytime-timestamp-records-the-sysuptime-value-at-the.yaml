document: rfc-2677
kind: protocol-element
summary: nhrpClientStatDiscontinuityTime (TimeStamp) records the sysUpTime value at the most recent counter discontinuity for a client. All client Counter32 statistics reference this object to allow management systems to detect and handle counter resets. A zero value means no discontinuity since last re-initialization.
