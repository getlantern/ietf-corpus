document: rfc-3863
kind: protocol-element
summary: The <tuple> element carries a PRESENCE TUPLE consisting of a mandatory <status> element, optional extension elements, an optional <contact> element, optional <note> elements, and an optional <timestamp> element. It MUST have an 'id' attribute whose value is unique within all tuples for the same presentity.
