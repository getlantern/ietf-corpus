document: rfc-9404
kind: registry
summary: RFC 9404 registers the JMAP error code 'unknownDataType' with IANA. This error is returned when a server does not recognise the data type specified in a Blob/lookup typeNames list, or the capability enabling that type is absent from the current Request Object.
section: "6.2"
topics:
