summary: Defined encryption algorithms include 3des-cbc (REQUIRED), aes128-cbc (RECOMMENDED), and numerous OPTIONAL ciphers including aes256-cbc, twofish256-cbc, arcfour, and none (NOT RECOMMENDED). The 'none' algorithm provides no confidentiality protection.
