document: rfc-4021
kind: protocol-element
summary: 'The Disclose-Recipients header field, primarily an X.400 facility, tells whether recipients are to be informed of the names of other recipients. In Internet mail, recipient disclosure is done via To:, Cc:, and Bcc: header fields. RFC 2156 (MIXER); not for general use.'
section: 2.1.64
topics:
    - email
    - privacy
