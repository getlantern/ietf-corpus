document: rfc-7473
kind: security-consideration
summary: RFC 7473 does not introduce any new security considerations beyond those that already apply to the base LDP specification (RFC 5036) and the MPLS/GMPLS security framework (RFC 5920). The SAC capability only suppresses state advertisement and does not alter authentication or integrity mechanisms.
