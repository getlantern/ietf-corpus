document: rfc-9301
kind: normative-requirement
summary: For deployments unaware of underlay path MTU restrictions, LISP control message size MUST be limited to 576 bytes for IPv4 or 1280 bytes for IPv6, considering the entire IP packet, per RFC 8085.
