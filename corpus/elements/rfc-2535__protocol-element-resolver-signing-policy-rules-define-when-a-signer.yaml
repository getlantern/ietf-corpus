document: rfc-2535
kind: protocol-element
summary: 'Resolver signing-policy rules define when a signer name is valid for authenticating an RRset: (1) Owner is the same as or a subdomain of Signer (descending the tree); (2) Owner is a superdomain of Signer and Signer is statically configured or its subdomain (ascending from trusted keys); (3) Signer exactly matches a statically configured key (cross-certification).'
section: 6.3.1
topics:
    - dns
    - security
