document: rfc-5280
kind: normative-requirement
summary: Internationalized domain names in dNSName or uniformResourceIdentifier fields of the subjectAltName or issuerAltName extensions MUST use the ACE (Punycode/IDNA) encoding per RFC 3490. Comparisons of such names in path validation MUST use the rules specified in Section 7.2.
section: "7.2"
rfc2119_level: MUST
topics:
    - pkix
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
