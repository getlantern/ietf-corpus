document: rfc-1134
kind: wire-format
summary: The FCS field is normally 16 bits (2 octets), calculated over the Address, Control, Protocol, and Information fields, excluding flags, start/stop bits, and transparency-inserted octets. By prior agreement, a 32-bit (4-octet) FCS may be used for improved error detection.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
