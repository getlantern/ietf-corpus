document: rfc-8826
kind: normative-requirement
summary: A script from origin A MUST only be allowed to initiate communications (and hence to access the camera and microphone) if the user has specifically authorized access for that origin. The basic unit of Web sandboxing is the origin, so consent must be scoped to it.
section: 4.1.3
rfc2119_level: MUST
topics:
    - webrtc
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
