document: rfc-9301
kind: wire-format
summary: The Encapsulated Control Message (Type=8) wraps a LISP control message inside an outer IP/UDP header (RLOC addresses, dest port 4342) and an inner IP/UDP header (EID or RLOC addresses). The S-bit triggers LISP-SEC authentication data; the D-bit requests DDT Map-Referral processing.
