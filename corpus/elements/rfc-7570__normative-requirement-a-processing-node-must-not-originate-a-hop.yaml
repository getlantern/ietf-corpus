document: rfc-7570
kind: normative-requirement
summary: A processing node MUST NOT originate a Hop Attributes TLV longer than the ERO Hop Attributes subobject. A node receiving a Hop Attributes TLV longer than the enclosing ERO subobject SHOULD return a PathErr with Error Code 'Routing Error' and Error Value 'Bad EXPLICIT_ROUTE object'.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
