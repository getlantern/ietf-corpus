document: rfc-5295
kind: normative-requirement
summary: Usage definitions MUST NOT use the EMSK in any way other than to derive Root Keys via the specified derivation. They MUST NOT use the EMSK directly, and SHOULD NOT require caching of the EMSK.
section: "5"
rfc2119_level: MUST NOT
