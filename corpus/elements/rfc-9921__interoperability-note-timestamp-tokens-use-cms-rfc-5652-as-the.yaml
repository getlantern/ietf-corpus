document: rfc-9921
kind: interoperability-note
summary: Timestamp tokens use CMS (RFC 5652) as the signature envelope format and RFC 3161 for timestamp token validation. The TSTInfo payload within the CMS SignedData contains the MessageImprint, including the hash algorithm OID, enabling receivers to identify the algorithm without out-of-band negotiation.
