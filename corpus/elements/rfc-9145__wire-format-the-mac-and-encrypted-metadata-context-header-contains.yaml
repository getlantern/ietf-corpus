summary: 'The ''MAC and Encrypted Metadata'' Context Header contains: Metadata Class (16 bits), Type (8 bits), U bit, Length (7 bits), Key Id Len (8 bits), Key Identifier (variable), Timestamp (8 bytes), Nonce Length (8 bits), Nonce (variable), and Message Authentication Code with optional Encrypted Context Headers (variable). Padded to a multiple of 4 bytes.'
