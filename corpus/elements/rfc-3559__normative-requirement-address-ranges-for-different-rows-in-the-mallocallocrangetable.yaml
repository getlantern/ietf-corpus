document: rfc-3559
kind: normative-requirement
summary: Address ranges for different rows in the mallocAllocRangeTable must be disjoint and must be contained within the address range of the corresponding mallocScopeTable row. Deleting an allocation range has the side effect of deleting any mallocAddressTable entries within that range.
section: "4"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
