document: rfc-2091
kind: normative-requirement
summary: An Update Response with the Flush flag set MUST be sent at power-on and SHOULD NOT contain any routes, in order to flush the peer's routing table from a previous incarnation and avoid confusion from stale acknowledgements.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
