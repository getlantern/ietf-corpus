document: rfc-7521
kind: protocol-element
summary: When acting on behalf of an anonymous user, a mutually agreed-upon pseudonymous or static Subject identifier (e.g., 'anonymous') is used. Authorization may rely on additional attributes or claims in the assertion (e.g., an age claim) without disclosing the user's identity.
section: 6.3.1
topics:
    - oauth
    - privacy
