document: rfc-8008
kind: security-consideration
summary: The security requirements of the FCI can be met by transport-layer security (e.g., TLS per RFC 7525) with domain certificates. No object-level security is deemed necessary because FCI trust relationships are bilateral between uCDN and dCDN rather than transitive.
section: "7"
topics:
    - security
    - tls
    - pkix
