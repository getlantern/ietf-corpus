document: rfc-9131
kind: normative-requirement
summary: Routers SHOULD create a new Neighbor Cache entry for the target address with the link-layer address set to the Target Link-Layer Address Option (if supplied) when receiving an unsolicited NA with no existing NC entry. The entry's reachability state MUST be set to STALE.
section: 6.1.1
rfc2119_level: SHOULD
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
