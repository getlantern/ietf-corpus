document: rfc-1964
kind: protocol-element
summary: The Exported Name Object Form for Kerberos V5 is required for GSS_Export_name() in GSS-API Version 2. For distinguished encoding, all '@', '/', and '\' characters in principal components and realm names must be quoted, and control characters (null, backspace, tab, newline) must be represented with escape sequences.
section: 2.1.3
topics:
    - security
