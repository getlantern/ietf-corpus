document: rfc-3758
kind: normative-requirement
summary: When a FORWARD TSN chunk arrives, the receiver MUST first update its cumulative TSN point to the value in the chunk, then MUST further advance its cumulative TSN point locally if subsequent contiguous TSNs are already received.
section: "3.6"
rfc2119_level: MUST
