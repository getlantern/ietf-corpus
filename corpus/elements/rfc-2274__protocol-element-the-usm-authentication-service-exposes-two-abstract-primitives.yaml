kind: protocol-element
summary: 'The USM authentication service exposes two abstract primitives: authenticateOutgoingMsg(authKey, wholeMsg) returning authenticatedWholeMsg, and authenticateIncomingMsg(authKey, authParameters, wholeMsg) returning authenticatedWholeMsg. These decouple the authentication module from the core USM procedures.'
