document: rfc-2510
kind: protocol-element
summary: InfoTypeAndValue ::= SEQUENCE { infoType OBJECT IDENTIFIER, infoValue ANY DEFINED BY infoType OPTIONAL } is used in GenMsgContent and GenRepContent for extensible general-purpose PKI information exchange. Defined id-it OIDs include CAProtEncCert, SignKeyPairTypes, EncKeyPairTypes, PreferredSymmAlg, CAKeyUpdateInfo, and CurrentCRL.
