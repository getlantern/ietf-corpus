document: rfc-9203
kind: normative-requirement
summary: Both client and RS MUST set the Master Salt to the concatenation salt | N1 | N2 (CBOR byte strings in order). In JSON mode, each component is prefixed by its 1-byte size before base64 encoding.
section: "4.3"
rfc2119_level: MUST
