document: rfc-9159
kind: security-consideration
summary: The routing protocol required for IPv6 mesh over BLE introduces additional opportunities for threats and attacks. RFC 7416 provides a systematic overview of threats against RPL (failures to authenticate, integrity attacks, availability attacks) whose guidance is applicable when RPL is used, and may partly apply to other routing protocols as well.
section: "5"
topics:
