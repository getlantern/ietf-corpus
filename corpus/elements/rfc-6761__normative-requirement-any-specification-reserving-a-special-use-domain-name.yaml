document: rfc-6761
kind: normative-requirement
summary: 'Any specification reserving a Special-Use Domain Name MUST address all seven ''Domain Name Reservation Considerations'' categories: Users, Application Software, Name Resolution APIs and Libraries, Caching DNS Servers, Authoritative DNS Servers, DNS Server Operators, and DNS Registries/Registrars.'
