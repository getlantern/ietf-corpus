document: rfc-7285
kind: normative-requirement
summary: An ALTO server MUST make one information resource directory available via HTTP GET at a discoverable URI. For a Root IRD, the 'meta' field MUST include 'default-alto-network-map' specifying the resource ID of a default network map.
