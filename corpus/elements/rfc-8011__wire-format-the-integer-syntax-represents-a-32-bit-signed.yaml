document: rfc-8011
kind: wire-format
summary: The 'integer' syntax represents a 32-bit signed value in the range -2**31 to 2**31-1; per-attribute allowed ranges are written as (m:n). The 'rangeOfInteger' syntax encodes a lower and upper integer bound pair. The 'resolution' syntax encodes cross-feed and feed resolution values in dots-per-inch or dots-per-centimeter.
section: 5.1.13
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
