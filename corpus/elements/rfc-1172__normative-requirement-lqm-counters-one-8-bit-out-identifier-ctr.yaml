document: rfc-1172
kind: normative-requirement
summary: LQM counters (one 8-bit Out-Identifier-Ctr and four 32-bit counters for packets/octets sent/received) may be initialized to any value before the first LQR but MUST NOT be reset again while LCP remains in the Open state. Counters wrap at their maximum value.
section: "3.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
