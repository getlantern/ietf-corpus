document: rfc-7180
kind: errata
summary: RFC 6325 Section 4.6 erroneously does not allow MTU-probe and MTU-ack PDUs to be unicast. The corrected text requires RBridges to accept these PDUs when the Outer.MacDA is either All-IS-IS-RBridges or the unicast MAC address of the receiving RBridge port (Errata ID 3003).
section: 5.1.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
