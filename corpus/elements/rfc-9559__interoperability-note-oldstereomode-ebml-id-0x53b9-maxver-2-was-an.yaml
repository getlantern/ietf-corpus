document: rfc-9559
kind: interoperability-note
summary: OldStereoMode (EBML ID 0x53B9, maxver=2) was an incorrect stereo-mode field written by libmatroska up to version 0.9.0 and MUST NOT be used in new files. Readers may encounter it in legacy content.
