document: rfc-6486
kind: protocol-element
summary: A CA MAY use a 'one-time-use' EE certificate (new key pair per manifest) or a 'sequential-use' EE certificate (same key signs a sequence of manifests). For sequential-use, the same file name must be used across manifest versions to keep the EE certificate valid for the object sequence.
section: "3"
topics:
