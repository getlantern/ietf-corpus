document: rfc-3814
kind: normative-requirement
summary: Entries mapped to an interface by specifying its non-zero interface index in mplsFTNMapIndex are applied ahead of entries with mplsFTNMapIndex equal to zero (wildcard all-interfaces entries). This defines the priority ordering between per-interface and all-interface rules.
section: "9"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
