document: rfc-8966
kind: normative-requirement
summary: 'Route selection SHOULD include hysteresis: the strategy should only switch from the currently selected route to a different route if the latter has been consistently better for some period of time, limiting oscillation when two parallel routes fluctuate around a common metric value.'
section: "3.6"
rfc2119_level: SHOULD
topics:
    - routing
