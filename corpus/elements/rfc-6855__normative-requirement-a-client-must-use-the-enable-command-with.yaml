document: rfc-6855
kind: normative-requirement
summary: A client MUST use the "ENABLE" command with the "UTF8=ACCEPT" option to indicate acceptance of UTF-8 in quoted-strings. The "ENABLE UTF8=ACCEPT" command is only valid in the authenticated state.
section: "3"
rfc2119_level: MUST
