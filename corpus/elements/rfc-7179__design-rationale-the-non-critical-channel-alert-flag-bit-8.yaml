document: rfc-7179
kind: design-rationale
summary: The non-critical Channel Alert flag (bit 8) was defined separately from the critical flag (bit 7) to support use cases such as a 'record route' function in RBridge Channel messages where it is acceptable for transit RBridges that do not support the function to skip recording, without requiring them to discard the frame.
section: "3.1"
topics:
    - routing
