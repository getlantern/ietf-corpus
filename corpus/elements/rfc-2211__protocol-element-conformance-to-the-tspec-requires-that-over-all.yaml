document: rfc-2211
kind: protocol-element
summary: Conformance to the TSpec requires that over all time periods T, the amount of data sent does not exceed rT+b (the token bucket rule). Packets smaller than the minimum policed unit m are counted as size m. Packets causing a violation of rT+b, or exceeding the outgoing link MTU, are nonconformant.
section: "7"
