document: rfc-7833
kind: normative-requirement
summary: A successful <samlp:Response> in the ABFAB Authentication Profile MUST contain exactly one assertion; that assertion MUST contain a <saml:AuthnStatement> and a <saml:SubjectConfirmation> with a cm:user or cm:machine confirmation method. The InResponseTo attribute MUST match the request ID when the response is solicited.
section: 7.4.2
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
