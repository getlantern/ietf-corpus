document: rfc-4625
kind: protocol-element
summary: The t11FcRouteTable is the central Fibre Channel routing table for locally managed switches, listing all configured and computed routes across all Fabrics. Route lookup compares a received frame's D_ID (logical-ANDed with t11FcRouteDestMask) against t11FcRouteDestAddrId, and similarly for S_ID and optional ingress interface.
