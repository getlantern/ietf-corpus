document: rfc-3253
kind: protocol-element
summary: DAV:predecessor-set on a version (protected) identifies each predecessor version via DAV:href elements; the root version has an empty set. On a checked-out resource it determines the predecessor-set of the version created by checkin. Defined as <!ELEMENT predecessor-set (href*)>.
section: 3.4.1
topics:
    - http
extracted_by: claude-sonnet-4-6
