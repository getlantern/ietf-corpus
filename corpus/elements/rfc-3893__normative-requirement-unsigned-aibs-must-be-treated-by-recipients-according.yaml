document: rfc-3893
kind: normative-requirement
summary: Unsigned AIBs MUST be treated by recipients according to the rules for AIBs that do not validate (Section 7). After signing, the AIB SHOULD be added to existing MIME bodies, transitioning to 'multipart/mixed' if necessary.
section: "2"
rfc2119_level: MUST
