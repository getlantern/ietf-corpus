document: rfc-9884
kind: protocol-element
summary: Six new Target FEC Stack sub-TLVs are defined (sub-types 49–54) for use in LSP Ping to support connectivity verification of SR paths that include Path Segment Identifiers (PSIDs). They apply to TLV Types 1 (Target FEC Stack), 16 (Reverse-Path Target FEC Stack), and 21 (Reply Path).
