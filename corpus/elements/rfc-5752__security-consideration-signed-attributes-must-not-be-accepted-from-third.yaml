document: rfc-5752
kind: security-consideration
summary: Signed attributes must not be accepted from third parties for inclusion in a signer's signedAttrs, because the attributes describe the signature being applied. Third-party meta-information must be attached via a separate signature and countersignature, not by injecting attributes into another signer's structure.
section: B.2
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
