document: rfc-8177
kind: normative-requirement
summary: Keys used with the cleartext algorithm are considered insecure and SHOULD NOT be reused with more secure algorithms. Similarly, MD5 and SHA-1 usage is NOT RECOMMENDED and should be confined to backward-compatibility deployments.
section: "5"
rfc2119_level: SHOULD NOT
