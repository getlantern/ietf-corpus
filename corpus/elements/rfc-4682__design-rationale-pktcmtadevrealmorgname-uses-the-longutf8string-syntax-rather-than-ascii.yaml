document: rfc-4682
kind: design-rationale
summary: pktcMtaDevRealmOrgName uses the LongUtf8String syntax (rather than ASCII) to accommodate the X.509 OrganizationName attribute from the Telephony Service Provider certificate, which is defined using UTF-8 encoding. UTF-8 characters may span 1–4 octets under RFC 3629.
