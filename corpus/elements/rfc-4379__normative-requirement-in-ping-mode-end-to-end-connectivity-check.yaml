document: rfc-4379
kind: normative-requirement
summary: In ping mode (end-to-end connectivity check), the TTL in the outermost label is set to 255. In traceroute mode (fault isolation), the TTL is set successively to 1, 2, and so on. The sender SHOULD increment the Sequence Number by 1 for subsequent echo requests.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
