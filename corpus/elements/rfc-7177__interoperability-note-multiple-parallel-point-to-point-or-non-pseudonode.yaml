document: rfc-7177
kind: interoperability-note
summary: Multiple parallel point-to-point or non-pseudonode LAN adjacencies between the same two RBridges appear as a single adjacency in LSPs. Their cost MAY be adjusted downward to reflect parallel paths; unicast TRILL Data traffic may freely multipath across them on a per-flow basis, but multi-destination traffic is restricted as specified in RFC 6325.
section: "3.5"
topics:
    - routing
