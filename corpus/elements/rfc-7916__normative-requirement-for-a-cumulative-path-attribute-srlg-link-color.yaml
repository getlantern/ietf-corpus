document: rfc-7916
kind: normative-requirement
summary: For a cumulative path attribute (SRLG, link color, node color), an implementation SHOULD record the attribute value on each element (link and node) along the alternate path. For a unitary attribute (bandwidth), only the first element's value is recorded.
section: 6.2.5.2
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
