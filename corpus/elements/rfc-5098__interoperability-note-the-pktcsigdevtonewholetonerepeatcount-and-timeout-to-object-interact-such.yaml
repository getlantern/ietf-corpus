document: rfc-5098
kind: interoperability-note
summary: The pktcSigDevToneWholeToneRepeatCount and timeout (TO) object interact such that if repeat count exceeds TO, the TO truncates the tone; if repeat count ends before TO, the repeat count takes precedence. It is RECOMMENDED that TO always be set longer than the desired repeat-count duration.
section: "5"
topics:
