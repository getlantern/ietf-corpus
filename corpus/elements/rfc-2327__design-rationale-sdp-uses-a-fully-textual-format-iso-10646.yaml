document: rfc-2327
kind: design-rationale
summary: SDP uses a fully textual format (ISO 10646 UTF-8) rather than a binary encoding such as ASN.1 or XDR to enhance portability, enable diverse transports (e.g., MIME email), and allow flexible text-based toolkits. The compact encoding and strict field ordering enable rapid detection and discarding of malformed or encrypted announcements.
