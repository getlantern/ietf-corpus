document: rfc-7197
kind: security-consideration
summary: Delayed duplication could act as a cryptographic attack accelerator (e.g., Million Message attack, Lucky 13) if the media packets are cryptographically protected with a weak or broken mechanism. Deployments should avoid weak security mechanisms and apply hard limits on duplication counts.
section: "5"
topics:
    - security
    - crypto
    - realtime
