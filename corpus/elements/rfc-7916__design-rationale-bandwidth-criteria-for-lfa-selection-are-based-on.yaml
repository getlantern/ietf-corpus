document: rfc-7916
kind: design-rationale
summary: Bandwidth criteria for LFA selection are based on link speed rather than available bandwidth because a PLR using per-prefix LFAs distributes destinations across multiple alternates and cannot predict per-destination traffic volumes. Link speed is easily available and provides a useful approximation at low cost.
section: 6.2.4.3
topics:
    - routing
