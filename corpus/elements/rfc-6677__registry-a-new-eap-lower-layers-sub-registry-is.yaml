document: rfc-6677
kind: registry
summary: 'A new ''EAP Lower Layers'' sub-registry is created under the IANA EAP Numbers registry. Registration requires Expert Review to prevent duplicate entries. Initial values: 1=Wired IEEE 802.1X, 2=IEEE 802.11 (no-pre-auth), 3=IEEE 802.11 (pre-auth), 4=IEEE 802.16e, 5=IKEv2, 6=PPP, 7=PANA (no pre-auth), 8=GSS-API, 9=PANA (pre-auth).'
