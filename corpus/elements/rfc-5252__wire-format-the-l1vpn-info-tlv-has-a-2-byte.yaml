document: rfc-5252
kind: wire-format
summary: The L1VPN Info TLV has a 2-byte Type field, 2-byte Length field (excluding TLV header and padding), followed by a 64-bit L1VPN Globally Unique Identifier, 32-bit PE TE Address, 32-bit Link Local Identifier, variable-length L1VPN Auto-Discovery Information, and optional padding.
