document: rfc-4175
kind: protocol-element
summary: The Continuation (C) bit in the line header determines whether an additional scan line header follows the current one. It is set to 1 if more than one scan line's data is carried in the RTP packet; otherwise 0. The only way to determine the number of scan lines per packet is to parse the payload headers.
section: "4.2"
topics:
    - rtp
    - realtime
