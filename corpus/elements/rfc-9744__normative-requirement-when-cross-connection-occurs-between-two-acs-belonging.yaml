document: rfc-9744
kind: normative-requirement
summary: When cross-connection occurs between two ACs belonging to two multi-homed ESs on the same set of multi-homing PEs, traffic between the two ACs MUST be locally switched within the PE rather than forwarded via the MPLS/IP network.
section: 3.3.1
rfc2119_level: MUST
topics:
    - vpn
    - routing
