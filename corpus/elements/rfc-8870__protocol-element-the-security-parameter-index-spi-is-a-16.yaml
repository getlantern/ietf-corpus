document: rfc-8870
kind: protocol-element
summary: The Security Parameter Index (SPI) is a 16-bit field in the FullEKTField that identifies the EKTKey, EKT Cipher, and associated SRTP master salt to be used for processing a given packet. Each distinct EKT parameter set MUST be associated with a distinct SPI value.
section: "4.1"
