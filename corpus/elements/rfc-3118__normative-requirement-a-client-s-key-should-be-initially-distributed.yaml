document: rfc-3118
kind: normative-requirement
summary: A client's key SHOULD be initially distributed through an out-of-band mechanism and SHOULD be stored locally. Once given its key, the client SHOULD use that key for all transactions even if its configuration changes (e.g., new network address).
section: "5.4"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
