document: rfc-4338
kind: interoperability-note
summary: Implementations following RFC 4338 are expected to interoperate with RFC 2625 for IPv4 packet transmission and reception. For compatibility with RFC 2625 implementations, an Nx_Port with format 0x1 N_Port_Name MUST send both FC ARP and Ethernet ARP Requests, and MUST respond to Ethernet ARP Requests. Support of compatibility mode is REQUIRED and MUST be administratively configurable.
section: "13"
rfc2119_level: REQUIRED
topics:
