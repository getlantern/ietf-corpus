document: rfc-8855
kind: wire-format
summary: BFCP attributes are encoded in TLV format and are 32-bit aligned. Each attribute begins with a 7-bit Type, a 1-bit Mandatory (M) flag, and an 8-bit Length field (in octets, excluding padding), followed by variable-length Attribute Contents. Padding of 1–3 octets aligns the attribute to 32-bit boundaries.
section: "5.2"
