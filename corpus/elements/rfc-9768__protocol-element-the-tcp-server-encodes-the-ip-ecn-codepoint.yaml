document: rfc-9768
kind: protocol-element
summary: The TCP Server encodes the IP-ECN codepoint it received on the SYN into the (AE,CWR,ECE) bits of the SYN/ACK per Table 2, providing feedback of the SYN's IP-ECN field. This allows both endpoints to detect middlebox mangling of the ECN field during the handshake.
section: "2.5"
topics:
    - tcp
    - congestion
    - ecn
