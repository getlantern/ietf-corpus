document: rfc-4439
kind: design-rationale
summary: FC-SW-3 warns that RCF causes complete Fabric reconfiguration with possible address changes, so BF should be attempted first. FC-MI prohibits autonomous RCF generation, requiring an outside administrative function to request it. This MIB's t11FamRestart and t11FamAutoReconfigure objects are that administrative mechanism, consistent with both constraints.
section: "5.10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
