summary: 'IANA registry for CERT RR certificate types: values 0x0000-0x00FF and 0xFF00-0xFFFF require IETF standards action; values 0x0100-0xFEFF are assigned through IETF Consensus with RFC documentation. This document assigns types 1-3 (PKIX, SPKI, PGP) and 253-254 (URI, OID private).'
