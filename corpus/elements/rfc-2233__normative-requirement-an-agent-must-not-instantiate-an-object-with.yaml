document: rfc-2233
kind: normative-requirement
summary: An agent MUST NOT instantiate an object with an incorrect value when the true value is unknown; it MUST respond with the appropriate error or exception (e.g., noSuchInstance for SNMPv2). Reporting a zero counter when occurrences cannot be counted would misinform management applications.
section: 3.1.18
rfc2119_level: MUST NOT
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
