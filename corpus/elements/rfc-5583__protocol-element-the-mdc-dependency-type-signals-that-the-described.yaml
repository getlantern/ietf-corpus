document: rfc-5583
kind: protocol-element
summary: The 'mdc' dependency type signals that the described media stream is part of a set of a Multiple Description Coding (MDC) Media Bitstream. At least N-out-of-M media streams of the group are required to form an Operation Point; the values of N and M are not signaled within the depend attribute.
section: 5.2.2
topics:
    - realtime
    - rtp
