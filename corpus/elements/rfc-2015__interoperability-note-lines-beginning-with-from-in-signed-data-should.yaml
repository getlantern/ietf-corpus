document: rfc-2015
kind: interoperability-note
summary: Lines beginning with 'From ' in signed data should have the 'F' encoded (e.g., using Quoted-Printable) to prevent MTAs from inserting a '>' prefix, which would invalidate the signature. Trailing whitespace should also be encoded to survive BITNET-style gateways.
