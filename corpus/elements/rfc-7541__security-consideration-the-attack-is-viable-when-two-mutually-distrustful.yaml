document: rfc-7541
kind: security-consideration
summary: The attack is viable when two mutually distrustful entities share an HTTP/2 connection—e.g., an intermediary multiplexing requests from multiple clients toward an origin, or web origins on the same browser connection. In these cases, one entity may probe table entries inserted by another.
section: 7.1.1
topics:
