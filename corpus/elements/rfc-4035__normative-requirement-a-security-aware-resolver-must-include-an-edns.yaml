document: rfc-4035
kind: normative-requirement
summary: A security-aware resolver MUST include an EDNS OPT pseudo-RR with the DO bit set when sending queries, MUST support a message size of at least 1220 octets, and MUST use the 'sender's UDP payload size' field to advertise the message size it is willing to accept.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
