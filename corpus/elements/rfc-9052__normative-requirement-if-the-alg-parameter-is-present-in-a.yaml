document: rfc-9052
kind: normative-requirement
summary: If the 'alg' parameter is present in a COSE_Key, the application MUST verify it matches the algorithm for which the key is being used. If algorithms do not match, the key object MUST NOT be used for the cryptographic operation.
section: "7.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
