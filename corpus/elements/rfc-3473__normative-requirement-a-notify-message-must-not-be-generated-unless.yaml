document: rfc-3473
kind: normative-requirement
summary: A Notify message MUST NOT be generated unless an appropriate Notify Request object has been previously received. When generating Notify messages for multiple LSPs sharing the same ERROR_SPEC, a node SHOULD combine them into a single message.
section: 4.3.2
rfc2119_level: MUST NOT
topics:
