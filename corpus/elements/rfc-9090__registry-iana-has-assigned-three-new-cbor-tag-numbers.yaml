summary: 'IANA has assigned three new CBOR tag numbers in the 1+1 byte space (24..255) of the CBOR Tags registry: tag 111 (absolute OID, BER encoding), tag 110 (relative OID / SDNV sequence, BER encoding), and tag 112 (OID relative to 1.3.6.1.4.1, BER encoding). All apply to byte string, array, or map data items.'
