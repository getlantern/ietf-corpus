document: rfc-2562
kind: protocol-element
summary: tn3270eRtDataTable holds per-collection or per-client response time measurements. It is indexed by tn3270eSrvrConfIndex, tn3270eClientGroupName, tn3270eRtDataClientAddrType, tn3270eRtDataClientAddress, and tn3270eRtDataClientPort. Aggregate entries use address type unknown(0) and a zero-length address.
