document: rfc-2227
kind: design-rationale
summary: 'The max-uses count does not include the use of a response to satisfy the end-client request that triggered the proxy''s fetch. This supports prefetch semantics: a cache may receive max-uses=0, store the response, and serve one client request without revalidation, giving the origin server precise control over actual use count.'
section: "3.3"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
