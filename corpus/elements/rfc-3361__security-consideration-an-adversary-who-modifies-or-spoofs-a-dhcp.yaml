document: rfc-3361
kind: security-consideration
summary: An adversary who modifies or spoofs a DHCP server response could redirect SIP user agents to a rogue SIP server that intercepts call requests or denies service. A modified DHCP answer could also omit TLS-capable SIP server names, facilitating interception.
section: "4"
topics:
