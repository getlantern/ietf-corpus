document: rfc-2510
kind: security-consideration
summary: The use of confidentiality in PKI management protocols is deliberately minimized to ease regulatory problems; however, when encrypted values are transported (e.g., private keys or encrypted certificates), the EncryptedValue structure from CRMF is used and requires the sender and recipient to share or derive a symmetric key.
section: "1.3"
topics:
    - pkix
    - security
    - crypto
