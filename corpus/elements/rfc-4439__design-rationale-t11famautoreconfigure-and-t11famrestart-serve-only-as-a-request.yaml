document: rfc-4439
kind: design-rationale
summary: 't11FamAutoReconfigure and t11FamRestart serve only as a request mechanism: a successful SNMP SetRequest causes the SW_ILS (RCF or BF) to be sent, but SNMP cannot and does not guarantee the SW_ILS operation succeeds. The MIB compliance requires a minimum of read-only access for these two objects.'
section: "5.10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
