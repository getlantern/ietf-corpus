document: rfc-9573
kind: design-rationale
summary: The 'domain' for DCB purposes need not include internal P routers, because DCB labels only appear at the top of the stack when traffic arrives at PE routers. Excluding P routers means they do not need to reserve the same label block.
section: "3"
topics:
