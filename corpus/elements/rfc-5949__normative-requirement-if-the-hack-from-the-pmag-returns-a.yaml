document: rfc-5949
kind: normative-requirement
summary: If the HAck from the PMAG returns a different HNP or the subsequent PMIPv6 binding registration fails, the NMAG MUST withdraw the advertised HNP by sending a Router Advertisement with zero prefix lifetime for that HNP, per Section 6.12 of RFC 5213.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
    - ip
