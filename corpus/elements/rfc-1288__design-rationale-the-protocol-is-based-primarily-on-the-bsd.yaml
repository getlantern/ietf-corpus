document: rfc-1288
kind: design-rationale
summary: The protocol is based primarily on the BSD UNIX Finger implementation from UC Berkeley, which provides the de facto behavioral baseline. However, BSD Finger provides few options for tailoring security policy or protecting users from dangerous data, motivating the security recommendations in this memo.
section: "1.1"
topics:
