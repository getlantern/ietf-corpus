document: rfc-7783
kind: normative-requirement
summary: For ingress multi-destination forwarding, an edge RBridge RBk encapsulates frames with a TRILL Header setting the Ingress Nickname field to RBv (the virtual RBridge nickname) and forwards on a distribution tree where RBv is associated with RBk.
section: "5.4"
rfc2119_level: MUST
topics:
    - routing
    - multicast
