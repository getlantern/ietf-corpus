document: rfc-9695
kind: interoperability-note
summary: 'For ISOBMFF/mp4 files, the intended designations are: ''haptics/mp4'' for files with haptic tracks only, ''video/mp4'' for files with video, audio, and haptics, and ''audio/mp4'' for files with audio and haptics, preserving consistency with existing mp4 registrations.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
