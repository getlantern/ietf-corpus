document: rfc-4366
kind: normative-requirement
summary: If a server receives a max_fragment_length value other than the allowed enum values it MUST abort with illegal_parameter. If a client receives a response that differs from the requested length it MUST also abort with illegal_parameter.
section: "3.2"
rfc2119_level: MUST
topics:
