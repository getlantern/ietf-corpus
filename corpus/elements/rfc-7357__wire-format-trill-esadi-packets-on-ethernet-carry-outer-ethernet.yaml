document: rfc-7357
kind: wire-format
summary: 'TRILL ESADI packets on Ethernet carry: outer Ethernet header, TRILL header (V=0, R=0, M=1 for multicast), inner Ethernet header (Inner.MacDA = All-Egress-RBridges, Inner.MacSA = origin RBridge MAC), 4- or 8-byte VLAN or FGL Data Label, L2-IS-IS Ethertype (0x22F4), and ESADI payload formatted as IS-IS E-L1CS PDU.'
