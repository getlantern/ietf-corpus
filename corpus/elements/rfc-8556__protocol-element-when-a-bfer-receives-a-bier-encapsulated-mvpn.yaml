document: rfc-8556
kind: protocol-element
summary: 'When a BFER receives a BIER-encapsulated MVPN packet, the BIER layer passes to the multicast flow overlay: the sub-domain-id and BFIR-id from the BIER header (or BIFT-id as an implementation choice), and the payload MPLS packet whose top label is the upstream-assigned label interpreted in the context of the BFIR-id and sub-domain-id.'
section: "4.2"
topics:
    - multicast
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
