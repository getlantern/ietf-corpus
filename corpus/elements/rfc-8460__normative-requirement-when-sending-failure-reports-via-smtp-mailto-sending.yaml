document: rfc-8460
kind: normative-requirement
summary: When sending failure reports via SMTP (mailto), Sending MTAs MUST deliver reports despite any TLS-related failures and SHOULD NOT include that SMTP session in the next report, meaning reports may be delivered unencrypted.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - tls
