document: rfc-8163
kind: privacy-consideration
summary: Per RFC 8065, temporary (short-lived) IPv6 addresses SHOULD be changed frequently to mitigate correlation of activities over time. Nodes that act as both servers (stable addresses) and clients (temporary addresses) SHOULD support simultaneous use of multiple addresses per device.
section: "12"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - privacy
