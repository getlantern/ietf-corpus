document: rfc-3588
kind: registry
summary: 'IANA manages the Diameter Application Identifier registry. Defined values: Diameter Common Messages (0), NASREQ (1), Mobile-IP (2), Diameter Base Accounting (3), Relay (0xffffffff). Every Diameter application specification MUST have an IANA-assigned or vendor-specific Application Identifier.'
section: "11.3"
