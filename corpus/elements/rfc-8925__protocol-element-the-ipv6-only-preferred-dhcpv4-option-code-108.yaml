document: rfc-8925
kind: protocol-element
summary: The IPv6-Only Preferred DHCPv4 option (code 108) allows a client to indicate it does not need an IPv4 address if the network provides IPv6-only connectivity via NAT64/DNS64. The server responds with a V6ONLY_WAIT timer value telling the client how long to suppress DHCPv4.
section: "3"
topics:
