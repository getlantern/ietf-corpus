document: rfc-2518
kind: protocol-element
summary: MKCOL is a new HTTP method for creating collection resources (analogous to directory creation). It returns 201 on success, 405 if the resource already exists, 409 if intermediate collections are missing, and 507 if storage is insufficient.
section: "8.3"
