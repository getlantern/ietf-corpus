document: rfc-4577
kind: normative-requirement
summary: A PE router that attaches to more than one OSPF domain MUST run an independent instance of OSPF for each domain, and each such instance MUST be associated with a single VRF. OSPF instances for different VPNs must not leak routes to each other.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - vpn
