document: rfc-2875
kind: design-rationale
summary: LeadingInfo (Subject DN) and TrailingInfo (Issuer DN) from the recipient's certificate are included in the key derivation for the Static DH POP to bind the integrity value to a specific certificate, preventing cross-certificate replay of the POP value.
