document: rfc-8011
kind: design-rationale
summary: IPP uses URI-based object identity so Printers and Jobs can be unambiguously referenced across the Internet. A Printer exposes multiple URIs to support simultaneous access via different security configurations; 'uri-security-supported' and 'uri-authentication-supported' are required to have the same cardinality as 'printer-uri-supported' to keep security metadata aligned with each access channel.
section: "3.4"
topics:
    - security
