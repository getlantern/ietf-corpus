document: rfc-2645
kind: state-machine
summary: 'ODMR has three states: Initial (EHLO, AUTH, QUIT valid), Authenticated (ATRN, QUIT valid), and Reversed (roles swap; provider becomes SMTP client, customer becomes server). Transitions: AUTH success → Authenticated; ATRN success → Reversed; QUIT → Termination from any state.'
