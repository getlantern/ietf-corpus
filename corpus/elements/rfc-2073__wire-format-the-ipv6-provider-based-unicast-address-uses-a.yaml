document: rfc-2073
kind: wire-format
summary: 'The IPv6 provider-based unicast address uses a 128-bit format: 3-bit Format Prefix ''010'', 5-bit Registry ID, n-bit Provider ID, (56-n)-bit Subscriber ID, and 64-bit Intra-Subscriber part. The total non-intra-subscriber portion is 64 bits, leaving 64 bits for local addressing.'
section: "3.1"
topics:
