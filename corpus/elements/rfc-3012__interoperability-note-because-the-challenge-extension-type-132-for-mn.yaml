document: rfc-3012
kind: interoperability-note
summary: Because the Challenge extension type (132 for MN-FA) falls in the range 128–255 (skippable), a Home Agent that does not recognize it MUST still process the Registration Request per RFC 2002, but will send a Reply without the Challenge extension.
