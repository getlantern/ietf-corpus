document: rfc-4551
kind: security-consideration
summary: The Conditional STORE extension is believed not to introduce new security concerns beyond those already present in IMAP4 (RFC 3501). However, its availability may enable use of IMAP4 in critical applications (such as multi-client message queues) where correct server implementation and operation become significantly more important.
