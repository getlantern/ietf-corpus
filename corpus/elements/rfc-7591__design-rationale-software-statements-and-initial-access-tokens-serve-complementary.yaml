document: rfc-7591
kind: design-rationale
summary: 'Software statements and initial access tokens serve complementary but distinct purposes: a software statement attests to the identity and properties of client software (who the software is), while an initial access token authorizes use of the registration endpoint (permission to register). An authorization server MUST consider both together when evaluating a registration request.'
section: "5"
topics:
    - oauth
    - security
