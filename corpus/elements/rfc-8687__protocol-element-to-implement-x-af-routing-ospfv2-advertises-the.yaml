document: rfc-8687
kind: protocol-element
summary: To implement X-AF routing, OSPFv2 advertises the Node IPv6 Local Address sub-TLV (from RFC 5786) to carry the router's local IPv6 addresses into the OSPFv2 TE database, enabling IPv6-destined LSP tail-end identification via an OSPFv2-maintained TE infrastructure.
