document: rfc-2910
kind: protocol-element
summary: 'Tag value 0x7F is reserved for extending the type space beyond 255 values: when this tag is present, the first 4 bytes of the value field are interpreted as the actual tag value. Values 0x00–0x37777777 are reserved for IETF standards track; 0x40000000–0x7FFFFFFF are reserved for vendor extensions.'
section: 3.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
