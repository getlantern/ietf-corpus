document: rfc-6110
kind: normative-requirement
summary: 'All XPath expressions in YANG ''must'', ''when'', and ''path'' statements MUST be translated to fully conformant XPath 1.0: every unprefixed node name MUST be prepended with the local module''s namespace prefix. Inside top-level groupings, the local prefix MUST instead be represented as the variable ''$pref'' so that the Schematron schema can substitute the correct module namespace at validation time.'
section: "9.3"
rfc2119_level: MUST
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
