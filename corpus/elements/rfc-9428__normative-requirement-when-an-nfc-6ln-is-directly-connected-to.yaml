document: rfc-9428
kind: normative-requirement
summary: When an NFC 6LN is directly connected to a 6LBR, the 6LN MUST register its address with the 6LBR by sending a Neighbor Solicitation (NS) with the Extended Address Registration Option (EARO) per RFC 8505. Duplicate Address Detection (DAD) is not required in this case.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
