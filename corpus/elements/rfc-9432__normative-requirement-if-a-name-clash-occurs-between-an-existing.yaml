document: rfc-9432
kind: normative-requirement
summary: If a name clash occurs between an existing zone and an incoming member zone (via transfer or update), the new instance MUST be ignored and an error SHOULD be logged. A clash MUST NOT be treated as a migration attempt except via the coo mechanism.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
