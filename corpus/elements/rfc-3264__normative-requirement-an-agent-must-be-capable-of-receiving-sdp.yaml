document: rfc-3264
kind: normative-requirement
summary: An agent MUST be capable of receiving SDP with a connection address of 0.0.0.0, in which case it means that neither RTP nor RTCP should be sent to the peer.
section: "8.4"
rfc2119_level: MUST
