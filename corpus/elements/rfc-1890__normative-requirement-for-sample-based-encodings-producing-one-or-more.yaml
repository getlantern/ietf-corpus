document: rfc-1890
kind: normative-requirement
summary: For sample-based encodings producing one or more octets per sample, samples from different channels at the same sampling instant are packed in consecutive octets (left then right for stereo). Multi-octet encodings are transmitted in network byte order (most significant octet first).
section: "4.2"
rfc2119_level: REQUIRED
topics:
    - rtp
    - realtime
