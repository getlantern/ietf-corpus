document: rfc-5932
kind: design-rationale
summary: This document amends RFC 4132 by adding SHA-2 family counterparts to the original Camellia cipher suites, which used only SHA-1. The motivation is to modernize the cipher suite portfolio as SHA-2 became the preferred hash family for TLS 1.2.
section: "1"
topics:
