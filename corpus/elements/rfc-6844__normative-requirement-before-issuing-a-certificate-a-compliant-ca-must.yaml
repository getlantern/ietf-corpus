document: rfc-6844
kind: normative-requirement
summary: Before issuing a certificate, a compliant CA MUST check for publication of a relevant CAA Resource Record set. If such a record set exists, a CA MUST NOT issue a certificate unless the request is consistent with the applicable CAA RRset or an exception in the relevant CP/CPS applies.
section: "4"
rfc2119_level: MUST
topics:
    - dns
    - pkix
    - security
