document: rfc-8105
kind: wire-format
summary: IPv6 link-local addresses are formed by appending the 64-bit IID (derived from 40-bit DECT address expanded to 48 bits, then processed per RFC 4291 Appendix A) to the FE80::/64 prefix. The U/L bit (7th bit) is zero, indicating the IID is not globally unique.
section: 3.2.1
topics:
    - ip
    - v6ops
