document: rfc-2907
kind: normative-requirement
summary: If the ZONES_EXIST_TIMER expires for state entry X/Y, the server SHOULD conclude that zone X or zone Y no longer exists and SHOULD destroy both X/Y and Y/X state. The timer resets only when Zone Announcement Messages (ZAMs) have been received for both zones since the last restart.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
