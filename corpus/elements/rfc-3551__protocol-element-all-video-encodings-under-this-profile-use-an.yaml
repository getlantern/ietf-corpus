document: rfc-3551
kind: protocol-element
summary: All video encodings under this profile use an RTP timestamp frequency of 90,000 Hz, chosen to yield exact integer increments for 24, 25, 29.97, and 30 Hz frame rates. The timestamp resolution MUST also be sufficient for the jitter estimate in RTCP receiver reports.
