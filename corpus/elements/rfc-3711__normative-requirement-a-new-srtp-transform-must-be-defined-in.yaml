document: rfc-3711
kind: normative-requirement
summary: A new SRTP transform MUST be defined in a companion standards-track RFC. That RFC MUST list any additional cryptographic context parameters, MUST explain interactions between the new transform and SRTP, and the new message integrity transform SHOULD define a minimum key/tag size for SRTCP equivalent in strength to the HMAC-SHA1 defaults.
section: "6"
rfc2119_level: MUST
topics:
