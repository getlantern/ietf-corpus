document: rfc-8402
kind: protocol-element
summary: 'BGP Peering Segments enable source-routed inter-domain paths for Egress Peer Engineering (EPE). Three types are defined: PeerNode SID (next-hop is the peering node), PeerAdj SID (next-hop via the specific peering interface), and PeerSet SID (load-balance across a group of peers).'
