document: rfc-9761
kind: interoperability-note
summary: In (D)TLS 1.3, all handshake messages except the ClientHello are encrypted, so a passive middlebox can only inspect fields visible in the ClientHello and ServerHello (supported versions, named groups, cipher suites, signature algorithms, extension list, and chosen cipher). Full handshake inspection of TLS 1.3 requires the middlebox to act as a proxy.
section: "4"
topics:
    - tls
    - security
