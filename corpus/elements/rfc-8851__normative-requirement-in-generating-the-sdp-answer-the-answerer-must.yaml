document: rfc-8851
kind: normative-requirement
summary: In generating the SDP answer, the answerer MUST reverse the direction field ('send'↔'recv'), MUST NOT modify the rid-id, MUST NOT include restrictions absent from the offer, and any modified restriction values MUST be more restrictive than those in the offer.
section: "6.3"
rfc2119_level: MUST
topics:
