document: rfc-7752
kind: wire-format
summary: The IP Reachability Information TLV (code 265) is mandatory in Prefix NLRIs. It contains a 1-octet Prefix Length followed by the most-significant octets of the IP prefix (packed, not padded to a fixed width). Length is variable.
