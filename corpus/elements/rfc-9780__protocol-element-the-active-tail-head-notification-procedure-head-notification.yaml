document: rfc-9780
kind: protocol-element
summary: 'The active tail head notification procedure (Head Notification without Polling, RFC 8563 Section 5.2.1): upon detecting P2MP LSP failure, the egress LSR sends unsolicited BFD Control packets with Poll (P) bit set, Sta=Down, Diag=Control Detection Time Expired, and Your Discriminator set to the session''s demultiplexing value, at one-per-second until the ingress LSR acknowledges with the Final (F) bit set.'
