document: rfc-7865
kind: design-rationale
summary: Some metadata (media format, codec properties) is derivable from SDP and is not repeated in the XML document; only metadata not available from SIP/SDP signaling (participant details, grouping, association times) is included in the 'application/rs-metadata+xml' body. The SDP 'a=label' attribute bridges the XML stream elements to SDP m-lines.
