document: rfc-7321
kind: normative-requirement
summary: For ESP authentication, HMAC-SHA1-96 (RFC 2404) MUST be implemented. AES-GMAC with AES-128 (RFC 4543) SHOULD+ be implemented. AES-XCBC-MAC-96 (RFC 3566) SHOULD be implemented. NULL authentication MAY be implemented.
section: "2.3"
rfc2119_level: MUST
topics:
