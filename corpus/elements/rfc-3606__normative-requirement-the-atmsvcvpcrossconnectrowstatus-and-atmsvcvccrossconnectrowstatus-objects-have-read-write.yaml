document: rfc-3606
kind: normative-requirement
summary: The atmSvcVpCrossConnectRowStatus and atmSvcVcCrossConnectRowStatus objects have read-write access solely to allow tear-down of SVC cross-connects; all other cross-connect fields are read-only. This restricts SNMP write access to connection tear-down only.
section: 3.1.1
rfc2119_level: MAY
topics:
    - realtime
    - snmp
