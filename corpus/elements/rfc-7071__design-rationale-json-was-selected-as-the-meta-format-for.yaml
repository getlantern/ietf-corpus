document: rfc-7071
kind: design-rationale
summary: JSON was selected as the meta-format for reputons rather than XML or other alternatives, leading to the definition of the application/reputon+json media type. The JSON syntax is intentionally extensible to allow provider-specific information beyond the standard fields.
