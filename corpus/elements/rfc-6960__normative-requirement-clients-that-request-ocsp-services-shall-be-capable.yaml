document: rfc-6960
kind: normative-requirement
summary: Clients that request OCSP services SHALL be capable of processing responses signed with RSA with SHA-256 (sha256WithRSAEncryption). Clients SHOULD also support RSA with SHA-1 and DSA with SHA-1, and MAY support other algorithms.
section: "4.3"
rfc2119_level: REQUIRED
