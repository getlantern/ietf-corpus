document: rfc-6221
kind: normative-requirement
summary: The Interface-ID SHOULD be considered an opaque value by servers (servers SHOULD NOT parse it), the LDRA SHOULD use the same Interface-ID value for a given interface, and this value SHOULD be retained across restarts to ensure reliable use in server parameter assignment policies.
section: 5.3.2
rfc2119_level: SHOULD
topics:
    - ip
