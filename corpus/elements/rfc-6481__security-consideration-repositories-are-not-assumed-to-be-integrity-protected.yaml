document: rfc-6481
kind: security-consideration
summary: Repositories are not assumed to be integrity-protected databases; retrieval operations may be vulnerable to man-in-the-middle attacks. Object corruption is detectable via signature validation; object replay (substitution with older versions) is detectable via manifests; revoked certificate insertion is detected via CRL processing.
