document: rfc-7317
kind: normative-requirement
summary: When 'radius' is included in the user-authentication-order leaf-list, a RADIUS server MUST be configured under /system/radius/server; a YANG 'must' constraint enforces this with the error message 'When radius is used, a RADIUS server must be configured.'
section: "6"
rfc2119_level: MUST
topics:
    - yang
    - netconf
    - radius
