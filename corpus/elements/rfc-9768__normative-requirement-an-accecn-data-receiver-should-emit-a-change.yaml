document: rfc-9768
kind: normative-requirement
summary: An AccECN Data Receiver SHOULD emit a Change-Triggered ACK whenever a data packet marked CE arrives after the previous packet was not CE. This rule exists so the sender can detect queue growth as early as possible.
section: 3.2.2.5.1
rfc2119_level: SHOULD
topics:
    - tcp
    - congestion
    - ecn
