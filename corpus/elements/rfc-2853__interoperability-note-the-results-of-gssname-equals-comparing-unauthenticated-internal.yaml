document: rfc-2853
kind: interoperability-note
summary: The results of GSSName.equals() (comparing unauthenticated internal names) will in general differ from those obtained by canonicalize+export followed by byte-array comparison (which tests whether a specific mechanism authenticates them as the same principal). These operations agree only for mechanism names (MNs).
section: "4.13"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
