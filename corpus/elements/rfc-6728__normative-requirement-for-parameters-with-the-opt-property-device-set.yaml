document: rfc-6728
kind: normative-requirement
summary: For parameters with the {opt.} property (device-set optional), the Monitoring Device MUST set an appropriate value at configuration time, and that value MUST NOT subsequently be changed by the device. The user MUST NOT expect a static device-specific default.
section: "3.2"
rfc2119_level: MUST
topics:
