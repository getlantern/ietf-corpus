document: rfc-6575
kind: normative-requirement
summary: A PE performing ARP Mediation for IPv6 MUST intercept ND and IND packets from both the AC and PW, learn the IPv6 configuration from them, forward them (possibly modified) to the appropriate destination, and generate interworking packets to bridge between ND and IND.
section: "2"
rfc2119_level: MUST
topics:
    - vpn
    - ip
