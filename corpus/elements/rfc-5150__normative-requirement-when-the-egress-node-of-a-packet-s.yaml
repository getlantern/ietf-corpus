document: rfc-5150
kind: normative-requirement
summary: When the egress node of a packet S-LSP is also the egress of the e2e LSP and PHP is required, the node MUST send back a Resv trigger message for the S-LSP with the Implicit or Explicit NULL Label. These steps MUST NOT be used for non-packet LSPs or packet LSPs where PHP is not desired.
section: 5.1.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
