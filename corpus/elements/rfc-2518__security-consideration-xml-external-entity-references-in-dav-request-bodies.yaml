document: rfc-2518
kind: security-consideration
summary: XML external entity references in DAV request bodies can be used for denial of service attacks or to read local files on the server (e.g., /etc/passwd via file:// URIs). Servers MUST carefully handle or disallow XML external entity processing.
section: "17.7"
topics:
    - http
    - security
