document: rfc-8664
kind: security-consideration
summary: The MSD field in the SR-PCE-CAPABILITY sub-TLV of the Open message discloses the MPLS label imposition capability of edge devices. Without strong encryption on the PCEP session, an attacker can use this field to enumerate network edge device capabilities.
section: "7"
topics:
    - security
    - routing
    - mpls
