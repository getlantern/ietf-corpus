document: rfc-5860
kind: normative-requirement
summary: If a defect or fault occurs on a PW, LSP, or Section, mechanisms MUST be provided to detect, diagnose, localize, and notify appropriate nodes. Mechanisms MUST also be available for a service provider to be aware of faults outside his domain.
section: 2.2.1
rfc2119_level: MUST
topics:
