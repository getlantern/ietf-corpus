document: rfc-7522
kind: normative-requirement
summary: The 'assertion' parameter MUST contain a single SAML 2.0 Assertion encoded using base64url (RFC 4648 Section 5, padding bits set to zero). The encoded data MUST NOT be line wrapped and pad characters ('=') MUST NOT be included.
section: "2.1"
rfc2119_level: MUST
topics:
    - oauth
    - json
