document: rfc-2206
kind: protocol-element
summary: rsvpResvFwdTable (rsvpObjects 5) models RESV messages being sent upstream to previous-hop neighbors, indexed by (rsvpSessionNumber, rsvpResvFwdNumber). It mirrors rsvpResvTable but reflects the merged/forwarded reservation state rather than the received state, with all fields read-only except rsvpResvFwdStatus.
section: "3.4"
