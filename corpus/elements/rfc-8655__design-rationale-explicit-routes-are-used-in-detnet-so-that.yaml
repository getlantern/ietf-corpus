document: rfc-8655
kind: design-rationale
summary: Explicit routes are used in DetNet so that the path of a DetNet flow does not change immediately in response to network topology events, avoiding even very brief losses of connectivity caused by routing/bridging protocol convergence. This is distinct from service protection, which handles failures on those fixed paths.
section: 3.2.3
topics:
    - routing
    - mpls
