document: rfc-8837
kind: interoperability-note
summary: WebRTC's use of multiple DSCP values may result in packets with certain DSCP values being blocked by a network. RFC 8835 Section 4.2 discusses how WebRTC implementations establish and maintain connectivity when such blocking occurs.
