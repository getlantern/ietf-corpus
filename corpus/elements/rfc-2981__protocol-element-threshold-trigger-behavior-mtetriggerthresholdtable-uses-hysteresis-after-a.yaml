document: rfc-2981
kind: protocol-element
summary: 'Threshold trigger behavior (mteTriggerThresholdTable) uses hysteresis: after a rising event fires, another rising event is not triggered until the value drops below the threshold and reaches the falling threshold, and vice versa. Separate rising and falling thresholds exist for both absolute values and delta values.'
