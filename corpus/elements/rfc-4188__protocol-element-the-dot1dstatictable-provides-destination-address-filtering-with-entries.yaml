document: rfc-4188
kind: protocol-element
summary: The dot1dStaticTable provides destination-address filtering with entries keyed by (dot1dStaticAddress, dot1dStaticReceivePort). dot1dStaticAllowedToGoTo is a bitmap OCTET STRING (0..512 bytes) where each bit represents one port; bit=1 means the port is in the allowed forwarding set.
