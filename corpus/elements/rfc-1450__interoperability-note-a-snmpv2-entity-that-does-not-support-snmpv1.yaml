document: rfc-1450
kind: interoperability-note
summary: A SNMPv2 entity that does not support SNMPv1 should count packets whose first octet is 0x30 (hex) in snmpStats30Something, as these are possibly misdirected SNMPv1 Messages that arrived at a SNMPv2-only agent.
section: "3.1"
