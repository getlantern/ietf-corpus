document: rfc-3264
kind: normative-requirement
summary: An agent MUST NOT generate a new offer if it has received an offer it has not yet answered or rejected, and MUST NOT generate a new offer if it has sent a prior offer for which it has not yet received an answer.
section: "4"
rfc2119_level: MUST NOT
topics:
