document: rfc-6157
kind: design-rationale
summary: 'IPv6 user agents bear the greater burden during the IPv4-to-IPv6 transition: since IPv6 UAs are fewer and expected to be dual-stack anyway, it is more pragmatic for them to obtain IPv4 addresses (via STUN relays) than to mandate an IPv6 upgrade across the vastly larger IPv4-only installed base.'
