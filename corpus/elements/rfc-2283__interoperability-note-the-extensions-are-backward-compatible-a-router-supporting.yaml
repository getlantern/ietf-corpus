document: rfc-2283
kind: interoperability-note
summary: 'The extensions are backward compatible: a router supporting multiprotocol extensions can interoperate with a router that does not support them, because MP_REACH_NLRI and MP_UNREACH_NLRI are optional non-transitive attributes that unsupporting routers will ignore.'
