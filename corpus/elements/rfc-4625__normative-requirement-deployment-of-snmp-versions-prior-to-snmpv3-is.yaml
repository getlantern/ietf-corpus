document: rfc-4625
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; SNMPv3 with cryptographic security enabled is RECOMMENDED instead, with operators responsible for configuring access controls to restrict GET/SET to authorized principals.
section: "9"
rfc2119_level: RECOMMENDED
