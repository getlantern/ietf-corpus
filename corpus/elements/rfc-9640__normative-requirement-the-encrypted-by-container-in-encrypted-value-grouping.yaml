document: rfc-9640
kind: normative-requirement
summary: The 'encrypted-by' container in encrypted-value-grouping MUST be augmented by consuming modules with key references. A symmetric key MUST be referenced via a leaf named 'symmetric-key-ref' and an asymmetric key via 'asymmetric-key-ref'. These leaf nodes MUST be direct descendants in the data tree.
section: 2.1.4.1
rfc2119_level: MUST
topics:
    - yang
    - crypto
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
