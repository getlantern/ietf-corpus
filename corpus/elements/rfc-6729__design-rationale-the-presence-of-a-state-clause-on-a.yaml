document: rfc-6729
kind: design-rationale
summary: The presence of a state clause on a trace field indicates entry of the message into that state; a later trace field added by the same or next agent implies departure from that state. This entry/exit signaling is implicit rather than requiring an explicit 'exit' annotation.
