document: rfc-8416
kind: protocol-element
summary: A ROA Prefix Assertion is a JSON object that MUST contain a 'prefix' member (IPv4 or IPv6 string) and an 'asn' member (number), and MAY contain a 'maxPrefixLength' member (number) and a 'comment' string. This tuple describes a VRP as per RFC 6811.
