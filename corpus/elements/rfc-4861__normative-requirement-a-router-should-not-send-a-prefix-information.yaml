document: rfc-4861
kind: normative-requirement
summary: A router SHOULD NOT send a Prefix Information option for the link-local prefix, and a host SHOULD ignore such an option. Received Router Advertisements SHOULD NOT modify the invalidation timer for the link-local prefix.
section: 4.6.2
rfc2119_level: SHOULD NOT
topics:
