document: rfc-4684
kind: normative-requirement
summary: A VPN NLRI route should be advertised to a peer that participates in RT membership exchange if that peer has advertised either the default Route Target membership NLRI or an RT membership NLRI containing any of the targets in the VPN route's extended communities attribute.
section: "6"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
