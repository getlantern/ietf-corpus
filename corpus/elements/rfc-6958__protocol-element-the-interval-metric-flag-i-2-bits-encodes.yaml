document: rfc-6958
kind: protocol-element
summary: The Interval Metric flag (I, 2 bits) encodes whether the reported values are Interval Duration (I=10), Cumulative Duration (I=11), or Sampled Value (I=01). The value I=00 is reserved. Burst/gap loss metrics can only be measured over definite intervals, not sampled.
section: "3.2"
