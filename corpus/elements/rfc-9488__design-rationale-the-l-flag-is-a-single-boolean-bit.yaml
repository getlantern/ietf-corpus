document: rfc-9488
kind: design-rationale
summary: The L flag is a single boolean bit and cannot distinguish between PROTECTION MANDATORY, UNPROTECTED MANDATORY, PROTECTION PREFERRED, and UNPROTECTED PREFERRED — all of which are needed to enforce different SLA policies on LSPs sharing the same topology. This limitation motivates the introduction of the E flag.
section: "4.2"
topics:
