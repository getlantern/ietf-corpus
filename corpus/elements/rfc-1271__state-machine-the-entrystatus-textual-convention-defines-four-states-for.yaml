document: rfc-1271
kind: state-machine
summary: 'The EntryStatus textual convention defines four states for table row lifecycle: valid(1), createRequest(2), underCreation(3), and invalid(4). A new row is created with createRequest, immediately transitions to underCreation, and must be set to valid(1) by the management station or invalid(4) to abort; the agent may also force invalid(4) if underCreation persists abnormally long.'
section: "4.2"
topics:
