document: rfc-8279
kind: interoperability-note
summary: 'When a BFIR encounters a BitStringLength mismatch (next-hop BFR does not support the packet''s BitStringLength), the BFR has three options: (1) discard, (2) re-encapsulate with a supported BitStringLength (potentially creating additional copies), or (3) treat the next-hop BFR as non-BIER and apply the procedures of Section 6.9. There is no signaling to advertise which option a BFR will use.'
section: 6.10.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
