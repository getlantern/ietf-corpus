document: rfc-7463
kind: protocol-element
summary: The <exclusive> boolean element, a child of <dialog>, indicates when true that the UA will not accept an INVITE with Join or Replaces for that dialog. It is a hint only; a UA must still be ready to reject such INVITEs independently. Absent, it defaults to false.
section: 5.2.2
topics:
    - sip
    - realtime
