document: rfc-2562
kind: normative-requirement
summary: A TN3270E server MUST integrate its normal TIMING-MARK processing with its use of TIMING-MARKs for computing response times, and MUST NOT send a second TIMING-MARK request to a client while waiting for the first to return, as this is prohibited by the TIMING-MARK protocol itself.
section: 3.4.2
rfc2119_level: MUST
topics:
    - snmp
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
