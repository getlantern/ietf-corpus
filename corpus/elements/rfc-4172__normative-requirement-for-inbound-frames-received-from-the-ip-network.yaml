document: rfc-4172
kind: normative-requirement
summary: For inbound frames received from the IP network, the receiving gateway SHALL replace the D_ID field with the destination N_PORT ID and the S_ID field with the assigned N_PORT alias from the session descriptor, and MUST then recalculate the FC CRC. The received S_ID and D_ID values are considered undefined.
section: 4.6.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
