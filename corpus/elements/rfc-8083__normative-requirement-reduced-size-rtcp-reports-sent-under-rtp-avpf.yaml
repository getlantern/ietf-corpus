document: rfc-8083
kind: normative-requirement
summary: Reduced-size RTCP reports sent under RTP/AVPF early feedback rules that do not contain an RTCP SR or RR packet MUST be ignored by the congestion circuit breaker but MUST be counted as received packets for the RTCP timeout circuit breaker.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
