document: rfc-8580
kind: protocol-element
summary: The "fcc" notification-capability value is defined for use with the notify_method_capability test. It returns "yes" if a copy of the notification message can be filed into a target mailbox, or "no" if it cannot. Values MUST be in lowercase.
section: "6.1"
