document: rfc-8226
kind: normative-requirement
summary: 'Implementations MUST support both ECDSA with the P-256 curve and RSA PKCS #1 v1.5 for certificate signatures. RSA PKCS #1 v1.5 is mandated only as a transitional mechanism and is anticipated to be eventually deprecated.'
