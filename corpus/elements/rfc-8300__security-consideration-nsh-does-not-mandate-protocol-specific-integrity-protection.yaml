document: rfc-8300
kind: security-consideration
summary: NSH does not mandate protocol-specific integrity protection. If an operator deems cryptographic integrity protection necessary, a transport encapsulation that provides such protection (e.g., IPsec) MUST be used. If connectivity between SFC-enabled devices traverses the public Internet, such connectivity MUST be secured at the transport encapsulation layer.
section: 8.2.1
topics:
    - security
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
