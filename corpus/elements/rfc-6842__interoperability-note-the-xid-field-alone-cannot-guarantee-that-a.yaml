document: rfc-6842
kind: interoperability-note
summary: The 'xid' field alone cannot guarantee that a particular DHCP response is intended for a particular client, because 'xid' values generated by multiple clients within a subnet need not be unique. Without 'client identifier', a client with 'chaddr' set to zero cannot confirm a response is intended for it.
section: "2"
topics:
