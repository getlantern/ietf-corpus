kind: design-rationale
summary: Label Sets are needed because some optical endpoints can only generate a small set of wavelengths, some intermediate nodes cannot perform wavelength conversion (CI-incapable), and some links support different wavelength sets at each end — requiring the label selection to be constrained to a mutually acceptable subset.
