document: rfc-5440
kind: normative-requirement
summary: The DeadTimer SHOULD be set to 0 and MUST be ignored when Keepalive is set to 0. If Keepalive is nonzero, the recommended default DeadTimer is 4 times the value of the Keepalive used by the remote peer to avoid excessive TCP keepalive traffic.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
