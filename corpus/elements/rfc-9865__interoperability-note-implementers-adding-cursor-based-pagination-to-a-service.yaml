document: rfc-9865
kind: interoperability-note
summary: Implementers adding cursor-based pagination to a service provider that previously supported only index-based pagination should use index as the default pagination method to avoid breaking clients that expect index-based behavior when no pagination parameters are specified.
section: "2.4"
topics:
    - security
