document: rfc-8706
kind: security-consideration
summary: A false IIH with the PR bit set can cause a neighbor to modify its adjacency Holding Time and suppress topology update flooding in the false belief that the router's forwarding plane is not processing changes, resulting in unnecessary forwarding disruption.
