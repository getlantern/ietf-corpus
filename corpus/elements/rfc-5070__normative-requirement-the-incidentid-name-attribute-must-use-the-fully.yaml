document: rfc-5070
kind: normative-requirement
summary: The IncidentID 'name' attribute MUST use the fully qualified domain name of the CSIRT to achieve a globally unique identifier. The combination of name and element content MUST be globally unique, and documents MUST NOT reuse the same value unless referencing the same incident.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
