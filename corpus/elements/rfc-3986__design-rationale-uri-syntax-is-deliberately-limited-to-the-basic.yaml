document: rfc-3986
kind: design-rationale
summary: URI syntax is deliberately limited to the basic Latin alphabet, digits, and a few special characters to support global transcription—copying a URI between media such as paper and keyboard. The ability to transcribe a URI was considered more important than allowing the most semantically meaningful characters.
section: 1.2.1
extracted_by: claude-sonnet-4-6
