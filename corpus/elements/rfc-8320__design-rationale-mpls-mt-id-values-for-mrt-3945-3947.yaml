document: rfc-8320
kind: design-rationale
summary: MPLS MT-ID values for MRT (3945-3947) were assigned within the range 1-4095 to align with PIM MT-ID values (RFC 6420 limits PIM MT-ID to 1-4095). This allows the same numerical value to be used for PIM MT-ID and MPLS MT-ID for the same MRT Profile, reducing management overhead and simplifying troubleshooting for multicast use cases.
section: "7"
topics:
