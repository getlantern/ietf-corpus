document: rfc-9000
kind: privacy-consideration
summary: Connection migration can allow observers to link pre- and post-migration traffic if the same connection ID is reused across network paths. Endpoints SHOULD retire connection IDs when they stop using a local or destination address and use fresh connection IDs on each new path to prevent correlation.
section: "9.5"
topics:
    - quic
    - privacy
