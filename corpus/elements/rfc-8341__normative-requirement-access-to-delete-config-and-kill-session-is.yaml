document: rfc-8341
kind: normative-requirement
summary: Access to <delete-config> and <kill-session> is denied by default; the exec-default leaf does not apply to these operations, and access control rules must be explicitly configured to allow invocation by a non-recovery session.
section: 3.2.7
rfc2119_level: MUST
topics:
    - netconf
    - security
