document: rfc-1743
kind: protocol-element
summary: dot5TestInsertFunc (dot5Tests 1) is an OBJECT-IDENTITY for use with ifTestTable to test the insert ring logic of the hardware when a lobe media cable is connected to a wiring concentrator. Invoking it inserts the station into the network, which may disrupt operational rings.
