document: rfc-6402
kind: normative-requirement
summary: In a certification request using Change Subject Name, the name in the certification request MUST match the name in the certificate used to verify the request, so that identity and possession proofs are correctly applied. The subject name change is conveyed via the ChangeSubjectName attribute, not by directly altering the request template.
section: "2.8"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
