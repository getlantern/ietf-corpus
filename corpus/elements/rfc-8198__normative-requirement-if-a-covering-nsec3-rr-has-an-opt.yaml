document: rfc-8198
kind: normative-requirement
summary: If a covering NSEC3 RR has an Opt-Out flag, the covering NSEC3 RR does not prove the non-existence of the domain name and aggressive negative caching is not possible for that domain name.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
