document: rfc-1509
kind: protocol-element
summary: 'Six independent boolean context service flags are defined as bit-mask constants: GSS_C_DELEG_FLAG (1), GSS_C_MUTUAL_FLAG (2), GSS_C_REPLAY_FLAG (4), GSS_C_SEQUENCE_FLAG (8), GSS_C_CONF_FLAG (16), and GSS_C_INTEG_FLAG (32). They are requested in req_flags and reported back in ret_flags by both gss_init_sec_context and gss_accept_sec_context.'
section: "3.3"
topics:
