document: rfc-7587
kind: interoperability-note
summary: Using Comfort Noise as defined in RFC 3389 with Opus is discouraged; instead, the Opus decoder's built-in frame loss concealment generates comfort noise for DTX gaps. Receivers distinguish DTX from packet loss by gaps in the RTP sequence number.
section: 3.1.3
topics:
    - rtp
    - realtime
