document: rfc-4007
kind: protocol-element
summary: 'Default zone index assignment algorithm: by default, an implementation should initially assign a unique interface index for each interface and a unique link index for each interface, producing a one-to-one mapping. Manual configuration is only required for the less common cases of multiple interfaces on the same link or interfaces in multicast-only zones of different scopes.'
section: "6"
