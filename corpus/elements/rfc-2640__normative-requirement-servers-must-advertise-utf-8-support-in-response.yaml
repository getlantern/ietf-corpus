document: rfc-2640
kind: normative-requirement
summary: Servers MUST advertise UTF-8 support in response to the FEAT command as a line containing exactly the string "UTF8" (case-insensitive, SHOULD be upper case). The feature line MUST follow RFC 2389 single-space indentation.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
