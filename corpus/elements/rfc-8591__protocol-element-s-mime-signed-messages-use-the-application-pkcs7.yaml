document: rfc-8591
kind: protocol-element
summary: S/MIME signed messages use the application/pkcs7-mime media type with smime-type=signed-data. The application/pkcs7-mime format is preferred over multipart/signed because it is more compact and less susceptible to intermediary tampering.
section: "4.1"
