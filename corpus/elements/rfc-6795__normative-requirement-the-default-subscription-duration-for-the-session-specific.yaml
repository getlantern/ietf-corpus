document: rfc-6795
kind: normative-requirement
summary: The default subscription duration for the session-specific policy package is two hours. The subscription duration SHOULD be longer than the typical duration of a session, and subscribers MUST refresh the subscription before the last SUBSCRIBE request expires.
section: "3.4"
rfc2119_level: MUST
topics:
    - sip
