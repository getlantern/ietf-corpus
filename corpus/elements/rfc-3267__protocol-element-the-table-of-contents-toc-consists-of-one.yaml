document: rfc-3267
kind: protocol-element
summary: 'The Table of Contents (ToC) consists of one entry per speech frame. Each entry carries: F (1 bit, more frames follow), FT (4 bits, frame type index including SID, SPEECH_LOST, or NO_DATA), and Q (1 bit, frame quality indicator set to 0 for severely damaged frames).'
