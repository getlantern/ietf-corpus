document: rfc-8543
kind: protocol-element
summary: 'The EPP <info> response for organizations returns <org:infData> containing id, roid, one or more roles, status values, optional parentId, postal info (up to two forms: ''int'' and ''loc''), voice, fax, email, url, contacts, clID, crID, crDate, and optional upID/upDate fields.'
