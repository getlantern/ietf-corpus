document: rfc-1665
kind: security-consideration
summary: Several objects in the SNANAU MIB have read-create or read-write access; improper use could cause disruption of network services. Implementations should apply the SNMPv2 security mechanisms defined in RFC 1445 to restrict access to sensitive objects such as snaNodeAdminState and RowStatus objects.
section: "7"
topics:
    - snmp
    - security
