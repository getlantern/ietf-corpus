document: rfc-7495
kind: security-consideration
summary: Receiving an IODEF document containing an unknown ReferenceName (i.e., a SpecIndex that does not exist in the IANA table) may indicate a misled or malicious source. Recipients should treat unknown SpecIndex values with suspicion.
section: "3"
topics:
