document: rfc-8428
kind: design-rationale
summary: CBOR integer map keys for RFC 8428's defined fields are declared conclusive — no additional integer keys will be defined. Future extensions must use string keys. This design allows translators between CBOR and JSON to handle all future string-keyed labels without implementation updates.
