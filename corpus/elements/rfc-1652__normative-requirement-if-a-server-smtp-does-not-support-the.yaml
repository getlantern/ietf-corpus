document: rfc-1652
kind: normative-requirement
summary: If a server SMTP does not support the 8-bit MIME transport extension, the client SMTP must not, under any circumstances, attempt to transfer content containing characters outside the US-ASCII octet range (hex 00-7F).
section: "3"
rfc2119_level: MUST NOT
