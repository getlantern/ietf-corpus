document: rfc-6020
kind: normative-requirement
summary: YANG XPath expressions MUST be syntactically correct, and all prefixes used MUST be present in the XPath context. Clients and servers are not required to implement an XPath interpreter but MUST ensure that the encoded requirements are enforced.
section: "6.4"
rfc2119_level: MUST
topics:
