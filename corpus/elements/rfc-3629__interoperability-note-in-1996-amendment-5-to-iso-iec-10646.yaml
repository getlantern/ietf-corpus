document: rfc-3629
kind: interoperability-note
summary: In 1996, Amendment 5 to ISO/IEC 10646 and Unicode 2.0 moved and expanded the Korean Hangul block, making all prior Hangul-containing data invalid under the new version. This 'Korean mess' is the only known incompatible change; the relevant committees have committed never to repeat such a change.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
