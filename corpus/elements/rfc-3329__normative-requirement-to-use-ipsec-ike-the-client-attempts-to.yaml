document: rfc-3329
kind: normative-requirement
summary: To use 'ipsec-ike', the client attempts to establish an IKE connection to the host part of the Request-URI. If the IKE connection attempt fails, the agreement procedure MUST be considered to have failed and MUST be terminated.
section: "2.4"
rfc2119_level: MUST
topics:
    - sip
    - ipsec
    - security
