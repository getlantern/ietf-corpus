document: rfc-5948
kind: interoperability-note
summary: The WiMAX Forum specifies an IP MTU of 1400 octets for IPv4 CS, whereas this specification defaults to 1500 octets. An IPv4 CS MS configured with 1500-octet MTU entering a WiMAX network may experience silent packet drops, and an IPv4 CS client cannot use ARP probing to discover the link MTU.
section: Appendix C
topics:
    - ip
