document: rfc-1390
kind: normative-requirement
summary: The broadcast Internet address must be mapped to the all-ones FDDI broadcast address. The 32-bit IP broadcast (host part all ones) maps to the 48-bit FDDI broadcast (all binary ones).
section: Broadcast Address
rfc2119_level: MUST
topics:
    - ip
    - multicast
