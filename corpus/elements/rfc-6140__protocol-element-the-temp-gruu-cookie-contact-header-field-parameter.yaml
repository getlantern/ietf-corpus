document: rfc-6140
kind: protocol-element
summary: The 'temp-gruu-cookie' Contact header field parameter is included by the SSP on all 200-class REGISTER responses for contacts containing a 'bnc' parameter. It is base64-encoded, fixed-length, unforgeable, and invariant across registration refreshes, enabling the SIP-PBX to construct decodable temporary GRUUs.
section: 7.1.2.1
topics:
    - sip
    - realtime
    - crypto
