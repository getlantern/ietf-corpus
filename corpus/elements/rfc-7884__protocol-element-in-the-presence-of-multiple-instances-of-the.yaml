document: rfc-7884
kind: protocol-element
summary: In the presence of multiple instances of the OSPFv2/OSPFv3 Router Information LSA, the S-BFD Discriminators for an OSPF router are the union of all discriminators advertised in all instances of the S-BFD Discriminator TLV in all advertised non-MaxAge OSPF Router Information LSAs.
