document: rfc-1595
kind: state-machine
summary: 'VT-Path AIS state machine: VT-Path AIS defect is detected as all-ones in V1 and V2 bytes for three contiguous VT superframes; terminated on a valid VT pointer with NDF=''1001'' for one superframe or ''0110'' for three. VT-Path AIS failure is declared at 2.5±0.5 s and cleared when absent for 10±0.5 s. Incoming VT-Path AIS shall not cause declaration of a VT LOP defect.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
