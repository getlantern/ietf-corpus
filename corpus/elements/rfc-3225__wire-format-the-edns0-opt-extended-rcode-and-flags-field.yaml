document: rfc-3225
kind: wire-format
summary: 'The EDNS0 OPT extended RCODE and flags field is 16 bits: bytes 0-1 carry EXTENDED-RCODE and VERSION; bytes 2-3 carry DO as the MSB (bit 0) followed by 15 Z (reserved) bits. DO is the leftmost bit of the TTL field of the OPT record.'
