document: rfc-9403
kind: design-rationale
summary: The 'metric' and 'tag' augmentations for RIB routes include a YANG 'when' condition that excludes OSPF and IS-IS source protocols, because the YANG data models for OSPF (RFC 9129) and IS-IS (RFC 9130) already define their own 'metric' and 'tag' augmentations for RIB routes, avoiding duplication.
