document: rfc-9963
kind: design-rationale
summary: TLS 1.3 dropped RSASSA-PKCS1-v1_5 in CertificateVerify in favor of RSASSA-PSS, but legacy hardware cryptographic devices—most notably TPMs—often cannot produce RSASSA-PSS signatures compatible with TLS 1.3, blocking migration for affected deployments.
section: "1"
topics:
    - tls
    - crypto
