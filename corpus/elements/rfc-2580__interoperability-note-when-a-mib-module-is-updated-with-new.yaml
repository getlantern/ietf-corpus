document: rfc-2580
kind: interoperability-note
summary: When a MIB module is updated with new enumerations or changed labels in enumerated INTEGERs or BITS constructs, existing AGENT-CAPABILITIES macros written against the old revision may be affected, as the SYNTAX clause in VARIATION may no longer accurately reflect supported values.
