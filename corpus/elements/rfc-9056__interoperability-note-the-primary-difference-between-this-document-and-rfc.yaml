document: rfc-9056
kind: interoperability-note
summary: The primary difference between this document and RFC 8964 (DetNet MPLS) is that relay nodes are at the edges of the MPLS domain and function as T-PEs, whereas in RFC 8964 the T-PEs are located at the end systems and MPLS spans the whole DetNet service. MPLS service sub-layer functions are not provided over the DetNet IP network.
section: "4.1"
topics:
    - mpls
    - routing
