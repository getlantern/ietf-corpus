document: rfc-4619
kind: interoperability-note
summary: The legacy bit ordering (B and F reversed) is used for PW type 0x0001 'Frame Relay DLCI (Martini Mode)', while the new bit ordering is used for PW type 0x0019 'Frame Relay DLCI'. The IANA Pseudowire Type registry (RFC4446) governs these allocations.
