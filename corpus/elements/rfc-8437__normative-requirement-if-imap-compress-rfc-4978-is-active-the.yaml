document: rfc-8437
kind: normative-requirement
summary: If IMAP COMPRESS (RFC 4978) is active, the server terminates its outgoing compression layer after the CRLF following the OK response, and the client terminates its outgoing compression layer after the CRLF following UNAUTHENTICATE. Compression terminates before the SASL layer when both are active.
section: "4.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
