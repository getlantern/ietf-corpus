document: rfc-5496
kind: design-rationale
summary: In networks with a BGP-free core, core routers do not maintain routes to external destinations. Without an extension, core routers cannot determine where to forward PIM Join messages for sources outside the network, preventing multicast distribution tree construction.
section: "1"
topics:
