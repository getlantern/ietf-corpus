document: rfc-9203
kind: state-machine
summary: 'The OSCORE security context lifecycle: ACTIVE (after derivation) → DISCARDED. Client triggers: sequence number space exhausted, token expires/invalidates, repeated 4.01 responses with same context, or new nonce received when reposting a non-expired token. RS triggers: sequence number space exhausted, token expires, or client successfully replaces context via authz-info.'
