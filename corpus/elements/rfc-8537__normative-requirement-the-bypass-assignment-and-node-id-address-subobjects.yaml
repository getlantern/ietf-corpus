document: rfc-8537
kind: normative-requirement
summary: The BYPASS_ASSIGNMENT and Node-ID address subobjects MUST be added by the downstream PLR node in the RECORD_ROUTE Object (RRO) of the RSVP Path message of the forward LSP to indicate the local bypass tunnel assignment.
