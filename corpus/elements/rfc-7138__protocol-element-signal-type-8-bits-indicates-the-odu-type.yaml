document: rfc-7138
kind: protocol-element
summary: 'Signal Type (8 bits): Indicates the ODU type being advertised in a Bandwidth sub-TLV. Values are defined in RFC 7139. For ODUflex, three distinct signal types are defined: 20 = ODUflex(CBR), 21 = ODUflex(GFP-F) resizable, 22 = ODUflex(GFP-F) non-resizable.'
section: 4.1, 4.1.3
