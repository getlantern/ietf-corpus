document: rfc-7112
kind: security-consideration
summary: Fragmented packets whose header chain spans multiple fragments can be used to evade stateless packet filtering, because the First Fragment alone does not carry enough information for the firewall to enforce its forwarding policy. This document forbids such packets to close this security vulnerability.
