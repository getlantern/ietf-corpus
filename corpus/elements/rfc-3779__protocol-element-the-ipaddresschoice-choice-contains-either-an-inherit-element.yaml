document: rfc-3779
kind: protocol-element
summary: The IPAddressChoice CHOICE contains either an inherit element (NULL) or an addressesOrRanges element (SEQUENCE OF IPAddressOrRange). When inherit is present, the authorized IP addresses are taken from the issuer's certificate chain recursively until an addressesOrRanges element is found.
section: 2.2.3.4
topics:
