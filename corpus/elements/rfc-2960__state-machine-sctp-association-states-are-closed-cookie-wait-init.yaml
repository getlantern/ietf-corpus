document: rfc-2960
kind: state-machine
summary: 'SCTP association states are: CLOSED, COOKIE-WAIT (INIT sent), COOKIE-ECHOED (COOKIE ECHO sent), ESTABLISHED, SHUTDOWN-PENDING (SHUTDOWN requested by ULP), SHUTDOWN-SENT, SHUTDOWN-RECEIVED, and SHUTDOWN-ACK-SENT. Transitions are triggered by ULP primitives (ASSOCIATE, SHUTDOWN, ABORT) or received chunks.'
