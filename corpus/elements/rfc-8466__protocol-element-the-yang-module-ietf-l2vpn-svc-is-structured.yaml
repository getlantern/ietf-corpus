document: rfc-8466
kind: protocol-element
summary: 'The YANG module ''ietf-l2vpn-svc'' is structured around two top-level containers: ''vpn-services'' (global VPN parameters per customer, keyed by vpn-id) and ''sites'' (site connection details, keyed by site-id). A vpn-profiles container holds shared provider identifiers (cloud, QoS, BFD, remote-carrier).'
