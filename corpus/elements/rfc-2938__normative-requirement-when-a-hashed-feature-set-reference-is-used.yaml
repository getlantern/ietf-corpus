document: rfc-2938
kind: normative-requirement
summary: When a hashed feature set reference is used, conformance to the hashing rules takes precedence over any other determination of the feature expression. Any expression obtained by other means may not be substituted for the hash-based reference unless it yields the correct hash value.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
