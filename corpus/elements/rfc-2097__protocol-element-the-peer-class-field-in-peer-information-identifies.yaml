document: rfc-2097
kind: protocol-element
summary: 'The Peer-class field in Peer-Information identifies the sender''s implementation type: 2 = PPP NetBIOS Gateway Server, 4 = PPP Local Access Only Server, 6 = PPP NBF Bridge, 8 = PPP End-System. Values 1, 3, 5, and 7 are reserved for legacy implementations.'
