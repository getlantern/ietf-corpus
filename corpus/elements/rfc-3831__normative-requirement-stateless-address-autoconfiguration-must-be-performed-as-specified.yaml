document: rfc-3831
kind: normative-requirement
summary: Stateless address autoconfiguration MUST be performed as specified in RFC 2462. An IPv6 Address Prefix used for stateless autoconfiguration of an Nx_Port MUST have a length of 64 bits.
section: "6.1"
rfc2119_level: MUST
