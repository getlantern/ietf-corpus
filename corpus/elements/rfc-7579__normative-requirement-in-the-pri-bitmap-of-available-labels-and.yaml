document: rfc-7579
kind: normative-requirement
summary: In the PRI bitmap of Available Labels and Shared Backup Labels fields, a bit MUST be set (1) for each priority represented in the sub-TLV and MUST NOT be set (0) when the corresponding priority is absent. At least one priority level MUST be advertised.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
