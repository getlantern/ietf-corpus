document: rfc-9568
kind: protocol-element
summary: The Max Advertise Interval is a 12-bit field indicating the time interval in centiseconds between advertisements, with a default of 100 centiseconds (1 second). Backup Routers use this value from received advertisements to compute Skew_Time and Active_Down_Interval.
section: 5.2.7
