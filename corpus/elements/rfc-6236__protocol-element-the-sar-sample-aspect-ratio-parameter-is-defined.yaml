document: rfc-6236
kind: protocol-element
summary: The sar (sample aspect ratio) parameter is defined as dx/dy where dx and dy are the physical pixel sizes. Square pixels give sar=1.0. In the send direction, sar defines the aspect ratio associated with the given resolution; in the recv direction, sar expresses the receiver's preferred aspect ratio. Default sar value is 1.0 if absent.
section: 3.1.1
topics:
    - realtime
