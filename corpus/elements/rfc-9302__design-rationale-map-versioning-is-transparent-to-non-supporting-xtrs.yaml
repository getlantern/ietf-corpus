document: rfc-9302
kind: design-rationale
summary: Map-Versioning is transparent to non-supporting xTRs because both the V-bit in the LISP-specific header and the Map-Version field in Map Records occupy bits that older implementations safely ignore, providing full backward compatibility without a negotiation mechanism.
