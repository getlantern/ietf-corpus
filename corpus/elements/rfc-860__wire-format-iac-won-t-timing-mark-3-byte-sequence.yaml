document: rfc-860
kind: wire-format
summary: 'IAC WON''T TIMING-MARK (3-byte sequence: 0xFF 0xFC 0x06) signals refusal to guarantee insertion at the appropriate place. IAC DON''T TIMING-MARK (0xFF 0xFE 0x06) notifies the receiver that a previously transmitted WILL TIMING-MARK has been ignored.'
section: "2"
