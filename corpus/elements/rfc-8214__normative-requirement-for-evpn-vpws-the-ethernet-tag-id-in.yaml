document: rfc-8214
kind: normative-requirement
summary: For EVPN-VPWS, the Ethernet Tag ID in the Ethernet A-D route MUST be set to a non-zero value for all four service interface types, in contrast to standard EVPN where port-based, VLAN-based, and VLAN bundle modes use zero.
section: "1"
rfc2119_level: MUST
topics:
