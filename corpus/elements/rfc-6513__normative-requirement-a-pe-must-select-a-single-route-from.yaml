document: rfc-6513
kind: normative-requirement
summary: A PE MUST select a single route from the UMH Route Candidate Set. The default procedure, which MUST be implemented, selects the candidate whose Upstream PE address is numerically highest (treating the 32-bit IP address as an unsigned integer), ensuring all PEs converge on the same upstream PE given stable routing.
section: 5.1.3
rfc2119_level: MUST
topics:
    - bgp
    - mpls
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
