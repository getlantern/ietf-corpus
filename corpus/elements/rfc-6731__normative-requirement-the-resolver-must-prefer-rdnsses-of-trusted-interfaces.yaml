document: rfc-6731
kind: normative-requirement
summary: The resolver MUST prefer RDNSSes of trusted interfaces. RDNSSes of untrusted interfaces can be of highest preference only if trusted interfaces specifically configure low-preference RDNSSes.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - security
