document: rfc-4328
kind: protocol-element
summary: 'Two new LSP Encoding Type code-points are defined: value 12 for G.709 ODUk (Digital Path) and value 13 for G.709 Optical Channel. The G.709 Digital Path code-point MUST be used for G.709-compliant Digital Path layer encoding; the existing ''Digital Wrapper'' code-point is reserved for non-G.709 compliant encoding.'
section: 3.1.1
