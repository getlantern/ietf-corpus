document: rfc-1195
kind: protocol-element
summary: For LAN subnetworks, a pseudonode represents the LAN in the link-state database. The elected designated router sends an LSP on behalf of the pseudonode advertising links to all routers on the LAN, reducing n² adjacency announcements to n. The pseudonode LSP does NOT include IP reachability information.
section: "4.3"
topics:
    - routing
    - ip
