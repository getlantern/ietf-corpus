document: rfc-3592
kind: normative-requirement
summary: A SONET/SDH interface MUST support at least n=4 completed 15-minute intervals; the default is 32 and the maximum is 96. The sonetMediumValidIntervals object reports the count of intervals for which data is available.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
