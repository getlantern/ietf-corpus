document: rfc-7230
kind: wire-format
summary: HTTP-version is encoded as the case-sensitive literal `HTTP-name "/" DIGIT "." DIGIT` (e.g., `HTTP/1.1`). The major digit indicates messaging syntax; the minor digit indicates the highest compatible minor version the sender conforms to.
section: "2.6"
topics:
