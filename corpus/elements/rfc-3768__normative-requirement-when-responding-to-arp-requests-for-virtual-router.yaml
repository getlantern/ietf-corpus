document: rfc-3768
kind: normative-requirement
summary: When responding to ARP requests for virtual router IP addresses, the Master MUST reply with the virtual MAC address and MUST NOT reply with its physical MAC address, so clients always use a consistent MAC regardless of which router is currently Master.
section: "8.2"
rfc2119_level: MUST NOT
topics:
    - ip
