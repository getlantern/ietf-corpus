document: rfc-2232
kind: protocol-element
summary: dlurDlusTable (dlurDlusInfo 1) contains information about active CPSVRMGR pipes to DLUSs, indexed by dlurDlusName (SnaControlPointName). Each entry records only the DLUS name and the combined contention-winner/contention-loser session status.
