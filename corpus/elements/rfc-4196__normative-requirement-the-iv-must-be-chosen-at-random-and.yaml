document: rfc-4196
kind: normative-requirement
summary: The IV MUST be chosen at random and MUST be unpredictable. Including the IV in each datagram ensures decryption can be performed even when datagrams are dropped or reordered in transit.
section: "3"
rfc2119_level: MUST
