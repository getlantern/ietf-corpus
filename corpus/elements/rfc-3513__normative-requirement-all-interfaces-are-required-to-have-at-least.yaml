document: rfc-3513
kind: normative-requirement
summary: All interfaces are required to have at least one link-local unicast address. Implementations must treat all addresses not matching the listed special prefixes (unspecified, loopback, multicast, link-local, site-local) as global unicast addresses.
section: "2.1"
rfc2119_level: REQUIRED
topics:
