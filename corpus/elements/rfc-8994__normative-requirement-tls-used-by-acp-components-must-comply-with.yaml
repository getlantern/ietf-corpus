document: rfc-8994
kind: normative-requirement
summary: TLS used by ACP components MUST comply with RFC 7525; TLS 1.2 is REQUIRED and older versions MUST NOT be used. TLS 1.3 SHOULD be supported. Cipher suites MUST offer TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 and TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384 and MUST NOT offer options with less than 256-bit symmetric key strength or hash strength less than 384 bits.
section: "6.1"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
