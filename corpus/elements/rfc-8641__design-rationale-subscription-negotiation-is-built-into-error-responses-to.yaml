document: rfc-8641
kind: design-rationale
summary: Subscription negotiation is built into error responses to failed RPC requests so that random guessing of parameters by a subscriber is discouraged. Hints such as suggested periods, acceptable dampening periods, and object-count estimates are returned to increase the likelihood of subsequent success.
section: "3.2"
topics:
