document: rfc-6492
kind: wire-format
summary: 'The list_response class element includes attributes: class_name (issuer-assigned identifier), cert_url (comma-separated URIs of issuer''s CA cert; at least one MUST be an rsync URI), resource_set_as (AS numbers in canonical RFC 3779 form), resource_set_ipv4 (IPv4 prefixes/ranges), resource_set_ipv6 (IPv6 prefixes/ranges in RFC 5952 format), and resource_set_notafter (ISO 8601 UTC datetime).'
section: 3.3.2
