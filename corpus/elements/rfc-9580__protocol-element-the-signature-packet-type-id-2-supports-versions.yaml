document: rfc-9580
kind: protocol-element
summary: The Signature packet (Type ID 2) supports versions 3, 4, and 6. Versions 4 and 6 use an extensible subpacket system divided into hashed (cryptographically protected) and unhashed (advisory) sections. Version 6 adds a mandatory random salt and wider subpacket length fields (4-octet vs 2-octet).
section: "5.2"
topics:
