document: rfc-1964
kind: wire-format
summary: 'The KRB_AP_REQ authenticator carries a checksum of type 0x8003 with a value field of at least 24 bytes: Lgth (bytes 0-3, little-endian 16), Bnd (bytes 4-19, MD5 hash of channel bindings), Flags (bytes 20-23, little-endian bit vector). Optional delegation fields DlgOpt/Dlgth/Deleg extend the field beyond 24 bytes.'
section: 1.1.1
topics:
    - security
    - crypto
