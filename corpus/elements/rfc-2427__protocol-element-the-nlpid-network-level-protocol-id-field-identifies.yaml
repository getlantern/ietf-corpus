document: rfc-2427
kind: protocol-element
summary: The NLPID (Network Level Protocol ID) field identifies the encapsulated protocol or encapsulation method. It is administered by ISO and ITU; values are defined in ISO/IEC TR 9577. A NLPID of 0x00 is invalid under Frame Relay encapsulation because it is indistinguishable from the pad field.
section: "3"
