document: rfc-8166
kind: wire-format
summary: An RDMA read segment (xdr_read_chunk) prepends a 32-bit Position field (byte offset in the unreduced Payload stream where the chunk is reinserted) to a plain xdr_rdma_segment. All RDMA read segments belonging to the same Read chunk share the same Position value.
section: 3.4.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
