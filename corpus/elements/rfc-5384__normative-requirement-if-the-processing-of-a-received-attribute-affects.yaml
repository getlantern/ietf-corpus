document: rfc-5384
kind: normative-requirement
summary: If the processing of a received attribute affects the construction of the multicast distribution tree or the set of forwarded attributes, state MUST be maintained associating the received attribute with the adjacency or adjacencies from which it was received.
section: 3.3.1
rfc2119_level: MUST
