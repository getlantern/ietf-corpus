document: rfc-6544
kind: normative-requirement
summary: Agents SHOULD obtain host candidates (passive and S-O) for each component of each TCP-capable media stream on each interface. It is highly RECOMMENDED that a host obtain at least one set of host candidates and one set of relayed candidates.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - nat
    - tcp
