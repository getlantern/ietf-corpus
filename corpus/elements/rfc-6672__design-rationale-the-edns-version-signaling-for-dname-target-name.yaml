document: rfc-6672
kind: design-rationale
summary: The EDNS version signaling for DNAME target name compression described in RFC 2672 was never actually specified and is explicitly removed in this revision. There is no EDNS version signaling for DNAME, and the target name MUST always be sent uncompressed.
section: "2.5"
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
