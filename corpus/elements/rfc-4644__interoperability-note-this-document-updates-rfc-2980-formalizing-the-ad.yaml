document: rfc-4644
kind: interoperability-note
summary: This document updates RFC 2980, formalizing the ad-hoc CHECK and TAKETHIS commands and deprecating the MODE STREAM command. Implementations conforming to RFC 2980 will remain compatible since servers MUST still accept MODE STREAM.
