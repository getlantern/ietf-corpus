document: rfc-8287
kind: normative-requirement
summary: For IGP-Adjacency Segment ID validation when Adj. Type is 4 or 6, the responder must validate that the Remote Interface ID matches the local identifier of the interface on which the packet was received, and that the Receiving Node Identifier is the local IGP identifier.
section: "7.4"
rfc2119_level: REQUIRED
