document: rfc-8895
kind: security-consideration
summary: An update stream server is vulnerable to resource exhaustion DoS if many clients open streams simultaneously. Mitigations include requiring client authentication/authorization, limiting concurrent open streams per client, closing inactive streams, and redirecting clients to other servers.
section: "10.1"
topics:
    - security
    - http
