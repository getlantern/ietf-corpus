document: rfc-2834
kind: normative-requirement
summary: IP multicast packets over HIPPI SHALL be sent using the same algorithm as if the packet were sent to 255.255.255.255, since HIPPI does not directly support multicast addressing and there are no mappings from IP multicast addresses to HIPPI multicast services.
section: "7.3"
rfc2119_level: SHALL
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
