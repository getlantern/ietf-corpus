document: rfc-5003
kind: design-rationale
summary: Globally unique AII values (enabled by embedding the provider's ASN as Global ID) facilitate PW management and security in large inter-AS and inter-provider environments, eliminating the need for AII NAT boxes during signaling and enabling source-validity checks on AII distribution.
