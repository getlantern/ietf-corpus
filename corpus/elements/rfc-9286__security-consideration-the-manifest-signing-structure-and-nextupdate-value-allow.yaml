document: rfc-9286
kind: security-consideration
summary: The manifest signing structure and nextUpdate value allow an RP to detect attempted alteration of the manifest itself. However, replay attacks within finer-grained time frames (shorter than the manifest update interval) are not necessarily detectable by the manifest structure.
section: "8"
topics:
