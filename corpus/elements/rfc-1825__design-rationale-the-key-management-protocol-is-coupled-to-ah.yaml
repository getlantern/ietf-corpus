document: rfc-1825
kind: design-rationale
summary: The key management protocol is coupled to AH and ESP only via the Security Parameters Index (SPI), allowing AH and ESP to be defined without specifying key management and enabling multiple key management systems — including manual configuration — to be used interchangeably.
