document: rfc-4577
kind: normative-requirement
summary: When a type 3 LSA or type 5 LSA is sent from a PE router to a CE router, the DN bit MUST be set to prevent the CE from re-advertising the LSA to another PE, which would cause routing loops.
section: 4.2.5.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
