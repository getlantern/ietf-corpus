document: rfc-7574
kind: normative-requirement
summary: PEX_RESv4 (single IPv4 address and port) and PEX_RESv6 (single IPv6 address and port) messages MUST only be used in a benign environment such as a private network, as they provide no guarantee that the addressed host actually participates in a PPSPP swarm.
