document: rfc-5938
kind: normative-requirement
summary: In response to Stop-N-Sessions, the Server MUST reply with one or more Stop-N-Ack commands with Accept fields corresponding to one or more of the SIDs. The Number of Sessions field MUST be one or greater and MUST equal the count of SID fields.
section: "3.5"
rfc2119_level: MUST
topics:
    - measurement
