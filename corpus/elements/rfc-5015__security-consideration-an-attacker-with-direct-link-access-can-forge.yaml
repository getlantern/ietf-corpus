document: rfc-5015
kind: security-consideration
summary: An attacker with direct link access can forge DF-election messages to either win the DF election itself (advertising the best metric) or install an arbitrary router as DF (impersonating the current DF in a Pass message). A concurrent DoS attack on the impersonated router can prevent it from detecting and correcting the anomaly.
section: 5.1.1
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
