document: rfc-8177
kind: protocol-element
summary: The ietf-key-chain YANG module defines a list of key chains, each identified by a unique name, containing one or more keys indexed by a uint64 Key ID. Each key includes a key string, a mandatory cryptographic algorithm (identityref), and optional send/accept lifetimes.
