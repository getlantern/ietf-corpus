document: rfc-3807
kind: design-rationale
summary: New MPH primitives (Link Status Start/Stop Reporting, Sa-Bit messages) were introduced because V5.2 system management must interact directly with V5.2 Layer 1, but in the backhaul architecture these entities are physically separated across MGC and SG, requiring explicit IP-based signaling to bridge them.
