document: rfc-7033
kind: protocol-element
summary: 'A link relation object in the ''links'' array may contain: ''rel'' (required, URI or registered type), ''type'' (optional, media type), ''href'' (optional, target URI), ''titles'' (optional, language-tagged human-readable strings), and ''properties'' (optional, URI-keyed values). The order of the ''links'' array MAY indicate preference.'
