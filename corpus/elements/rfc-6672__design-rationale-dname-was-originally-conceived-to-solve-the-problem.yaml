document: rfc-6672
kind: design-rationale
summary: DNAME was originally conceived to solve the problem of maintaining address-to-name mappings during network renumbering. With careful setup, a renumbering event does not require changes to the authoritative server holding address-to-name mappings. A secondary use is aliasing entire name spaces, such as providing punycode alternates.
