document: rfc-6681
kind: protocol-element
summary: For the single sequenced flow scheme, the Encoding Symbol ID for a source packet is derived as ESI = (Ns - I) * LP, where Ns is the packet sequence number, I is the Initial Sequence Number of the source block, and LP is the Source Packet Information Length in symbols.
section: 8.2.2
extracted_by: claude-sonnet-4-6
