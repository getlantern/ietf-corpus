summary: 'The IEEE Std 1588-2008 ''portIdentity'' struct is decomposed across the YANG model: portIdentity.portNumber is the list key in port-ds-list, while portIdentity.clockIdentity is accessed via ../../default-ds/clock-identity, avoiding duplication while preserving the full identity.'
