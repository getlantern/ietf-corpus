document: rfc-9777
kind: security-consideration
summary: A malicious node can send bogus MLDv2 Query messages causing all listeners on a link to immediately transmit Reports, producing a report storm. Securing MLD using the Multicast Listener Discovery Security (SEND) mechanisms or similar link-layer security is recommended to mitigate this threat.
section: "10.1"
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
