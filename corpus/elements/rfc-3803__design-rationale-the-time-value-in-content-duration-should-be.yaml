document: rfc-3803
kind: design-rationale
summary: The time value in Content-Duration should be exact, but the exact value cannot be known without opening and playing the content. This mechanism simply allows placing a sender-determined value in the header; if an exact value is required, the content itself must be examined.
section: "2.2"
topics:
    - email
