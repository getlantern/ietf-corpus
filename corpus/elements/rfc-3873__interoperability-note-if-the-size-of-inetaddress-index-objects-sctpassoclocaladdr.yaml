document: rfc-3873
kind: interoperability-note
summary: If the size of InetAddress index objects (sctpAssocLocalAddr, sctpAssocRemAddr) exceeds 114 octets, or sctpAssocRemHostName exceeds 115 octets, the resulting OIDs will have more than 128 sub-identifiers and cannot be accessed using SNMPv1, SNMPv2c, or SNMPv3.
section: 3.1.3.1
topics:
    - sctp
    - snmp
