document: rfc-2806
kind: normative-requirement
summary: The post-dial sequence MUST be sent using DTMF in-band signalling or pulse dialing after call setup is complete. If the user-agent does not support DTMF or pulse dialing post-connection, the post-dial sequence MUST be ignored and the user SHOULD be notified.
section: 2.5.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
