document: rfc-6307
kind: protocol-element
summary: 'The Native Service Processing (NSP) function performs three operations: (1) Idle Suppression — drops received FC Idle Primitive Signals and regenerates them at the far end; (2) FC Primitive Sequence Reduction — forwards only a subset (e.g., every fourth) of repeated Primitive Sequences; (3) Alternate Simple Flow Control (ASFC) — a pause/resume protocol for buffer management across the PW.'
section: "2"
