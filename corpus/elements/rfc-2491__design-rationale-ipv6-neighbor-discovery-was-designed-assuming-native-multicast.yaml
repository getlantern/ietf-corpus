document: rfc-2491
kind: design-rationale
summary: IPv6 Neighbor Discovery was designed assuming native multicast at the link layer, which NBMA networks do not provide. This document augments MARS (RFC 2022) to emulate multicast for ND, generalizing its applicability beyond ATM to all NBMA technologies.
section: "1.1"
topics:
    - ip
    - v6ops
