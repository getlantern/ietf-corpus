document: rfc-5751
kind: protocol-element
summary: A certificate management message uses a degenerate SignedData where the encapContentInfo eContent field MUST be absent and signerInfos MUST be empty, wrapped in application/pkcs7-mime with smime-type='certs-only' and file extension .p7c. It is used to transport certificates and/or CRLs.
section: "3.7"
topics:
