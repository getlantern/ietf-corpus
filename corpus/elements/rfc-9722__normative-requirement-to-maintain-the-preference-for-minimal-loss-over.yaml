document: rfc-9722
kind: normative-requirement
summary: To maintain the preference for minimal loss over duplicate traffic, the original (non-recovering) PE SHOULD carve slightly before the recovering PE by applying DF-to-NDF transitions at SCT minus skew and NDF-to-DF transitions at SCT.
section: "3"
rfc2119_level: SHOULD
