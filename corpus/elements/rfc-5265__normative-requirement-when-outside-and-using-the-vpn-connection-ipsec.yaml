document: rfc-5265
kind: normative-requirement
summary: When outside and using the VPN connection, IPsec policies MUST be configured to encrypt all traffic sent to and from the enterprise network; specific SPD entries depend on VPN type (plain IPsec vs. L2TP/IPsec, full vs. split tunneling).
