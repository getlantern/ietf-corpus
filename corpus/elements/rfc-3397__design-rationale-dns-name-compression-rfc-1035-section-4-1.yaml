document: rfc-3397
kind: design-rationale
summary: DNS name compression (RFC 1035 section 4.1.4) was chosen for encoding the searchlist because DHCP option space is limited and domain searchlists are likely to contain repeated instances of the same domain name, making compression both useful and likely to be effective.
