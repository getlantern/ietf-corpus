document: rfc-4747
kind: protocol-element
summary: t11vfLocallyEnabledTable tracks which VF_IDs are locally enabled on each port, indexed by InterfaceIndex and T11FabricIndex. The set of VFs actually operational on a port is the bitwise AND of locally-enabled VF_IDs on both sides of the link.
