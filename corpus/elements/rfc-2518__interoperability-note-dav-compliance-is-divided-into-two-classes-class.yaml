document: rfc-2518
kind: interoperability-note
summary: 'DAV compliance is divided into two classes: Class 1 requires all HTTP/1.1 methods plus PROPFIND, PROPPATCH, MKCOL, COPY, MOVE, LOCK (optional), and UNLOCK (optional), plus the DAV header, new status codes, and the multistatus response. Class 2 requires Class 1 plus mandatory LOCK/UNLOCK support and the supportedlock property.'
