document: rfc-2954
kind: protocol-element
summary: 'frLportVCSigProtocol identifies the Local In-Channel Signaling Protocol in use on a UNI/NNI logical port: none(1), lmi(2) (Stratacom/Nortel/DEC LMI), ansiT1617D(3) (ANSI T1.617 Annex D), ansiT1617B(4) (ANSI T1.617 Annex B), or ccittQ933A(5) (ITU Q.933 Annex A). A parallel read-write object frLportVCSigProtocolAdmin allows administrative configuration of the desired protocol.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
