document: rfc-5752
kind: protocol-element
summary: 'SignerInfo evaluation has three independent components: (1) cryptographic math verification (success, failure, or cannot evaluate), (2) certificate path validation per RFC 5280 yielding success/failure/indeterminate/warning, and (3) application and local policy compliance on SignerInfo contents such as mandatory signed attributes or algorithm requirements.'
