document: rfc-9081
kind: security-consideration
summary: The capabilities specified in this document introduce no additional security considerations beyond those in RFC 6514 and RFC 3618. Moreover, eliminating VPN-specific MSDP sessions between PEs actually reduces control message amplification caused by redundant MSDP SA and MVPN SA messages being carried in parallel.
section: "4"
topics:
