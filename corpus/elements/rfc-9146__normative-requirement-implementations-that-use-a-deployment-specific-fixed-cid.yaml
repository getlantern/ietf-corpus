document: rfc-9146
kind: normative-requirement
summary: Implementations that use a deployment-specific fixed CID length MUST still be able to send CIDs of different lengths to other parties. Variable-length CID implementations are responsible for making CID values self-delineating since length is not carried in the record.
section: "3"
rfc2119_level: MUST
topics:
    - tls
