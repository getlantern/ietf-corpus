document: rfc-6719
kind: normative-requirement
summary: If the selected metric is a link metric and the metric of the link to a neighbor is not available, the path cost for that path SHOULD be set to MAX_PATH_COST, preventing it from being selected.
section: "3.1"
rfc2119_level: SHOULD
