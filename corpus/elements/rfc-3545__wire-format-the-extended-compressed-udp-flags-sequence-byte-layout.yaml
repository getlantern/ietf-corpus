document: rfc-3545
kind: wire-format
summary: 'The extended COMPRESSED_UDP flags/sequence byte layout is: F(1 bit)|I(1 bit)|dT(1 bit)|dI(4 bits link sequence). When F=1, an extension flags byte follows: M|S|T|P|C|0|0|0. When C=1, an additional byte with CC in the lower 4 bits is appended after the two flag bytes.'
section: "2.1"
