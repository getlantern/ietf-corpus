document: rfc-8138
kind: normative-requirement
summary: A 6LoRH header MUST always be placed after any Fragmentation Header and/or Mesh Header (RFC 4944) and MUST always be placed before the LOWPAN_IPHC (RFC 6282). It MUST only appear in a zone where the Page 1 context is active (i.e., after a Page 1 Paging Dispatch byte and before any subsequent Paging Dispatch).
section: 3.2.1
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
