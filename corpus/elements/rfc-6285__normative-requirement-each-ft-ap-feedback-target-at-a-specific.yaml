document: rfc-6285
kind: normative-requirement
summary: Each FT_Ap (feedback target at a specific address and port) MUST be associated with only a single RTP session to avoid ambiguity when an RTP_Rx sends a RAMS-R without specifying individual media sender SSRCs.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - multicast
