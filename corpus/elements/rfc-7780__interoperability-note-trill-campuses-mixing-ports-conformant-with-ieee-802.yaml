document: rfc-7780
kind: interoperability-note
summary: TRILL campuses mixing ports conformant with IEEE 802.1Q-2011-or-later and pre-2011 ports — especially with actual Token Ring links — may operate incorrectly and corrupt data due to the changed interpretation of the CFI/DEI bit, mirroring the same issue in bridged LANs.
