document: rfc-1112
kind: normative-requirement
summary: A Report MUST be sent with an IP destination address equal to the host group address being reported and with TTL of 1, enabling other members on the same network to suppress their own pending Reports for that group.
section: Appendix I
rfc2119_level: MUST
topics:
    - multicast
    - ip
