document: rfc-6869
kind: security-consideration
summary: Publication of device identification details in publicly accessible vCard repositories increases the probability of exploitation of existing vulnerabilities, particularly for devices with no good software/firmware update mechanism; device administrators must follow best current security practices and employ proper upgrade and patch strategies.
