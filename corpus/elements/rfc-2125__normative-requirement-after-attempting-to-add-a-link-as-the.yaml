document: rfc-2125
kind: normative-requirement
summary: After attempting to add a link as the result of a Call-Request or Callback-Request, an implementation MUST send a Call-Status-Indication to report success or failure. If the Action octet is Retry, a subsequent Call-Status-Indication MUST follow each retry attempt.
section: 5.5.7
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
