document: rfc-9248
kind: protocol-element
summary: The configuration versioning mechanism uses a major/minor scheme where minor version increments indicate backwards-compatible changes and major version increments indicate breaking changes. Implementations MUST ignore any object members they do not recognize. Minor version definitions SHALL only add objects or optional members, never delete or change existing ones.
section: 9.2.3
topics:
    - json
