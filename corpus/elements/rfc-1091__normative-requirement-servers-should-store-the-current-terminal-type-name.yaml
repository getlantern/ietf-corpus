document: rfc-1091
kind: normative-requirement
summary: Servers SHOULD store the current terminal type name and the list of available names in a manner accessible to both the user (via keyboard command) and any applications that need the information, and SHOULD provide a mechanism to request a type change.
section: "7"
rfc2119_level: SHOULD
