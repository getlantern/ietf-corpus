document: rfc-9363
kind: wire-format
summary: 'Fragmentation header field sizes are expressed in bits: dtag-size (uint8, default 0), w-size (uint8, present only in ACK-Always and ACK-on-Error modes), fcn-size (uint8, mandatory). Layer 2 Word size is l2-word-size (uint8, default 8 bits = byte-aligned; value 1 means bit-oriented with no padding).'
