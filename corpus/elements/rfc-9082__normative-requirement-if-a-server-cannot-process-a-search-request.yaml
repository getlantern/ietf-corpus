document: rfc-9082
kind: normative-requirement
summary: If a server cannot process a search request because it does not support a particular style of partial match searching, it SHOULD return an HTTP 422 (Unprocessable Entity) response to indicate search is supported but this specific query cannot be processed.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - http
