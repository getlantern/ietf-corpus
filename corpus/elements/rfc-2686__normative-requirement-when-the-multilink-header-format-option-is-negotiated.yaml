document: rfc-2686
kind: normative-requirement
summary: When the Multilink Header Format option is negotiated, the accepting implementation MUST either transmit all subsequent multilink packets on all links of the bundle with the negotiated header format, or Configure-Nak or Configure-Reject the option.
section: "6.1"
rfc2119_level: MUST
topics:
    - realtime
