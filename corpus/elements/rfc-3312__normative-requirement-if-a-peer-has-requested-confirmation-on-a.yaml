document: rfc-3312
kind: normative-requirement
summary: If a peer has requested confirmation on a stream, an agent MUST flag that stream; when all flagged rows have current='yes', a new offer MUST be sent. If any flagged row later transitions to 'no', a new offer MUST be sent as well.
section: "7"
rfc2119_level: MUST
topics:
    - sip
    - qos
