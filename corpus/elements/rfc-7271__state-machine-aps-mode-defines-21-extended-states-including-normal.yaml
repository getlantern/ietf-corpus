document: rfc-7271
kind: state-machine
summary: APS mode defines 21 extended states including Normal (N), Unavailable states (UA:LO:L/R, UA:P:L/R, UA:DP:L/R), Protecting Failure states (PF:W:L/R, PF:DW:L/R), Switching Administrative states (SA:F:L/R, SA:MW:L/R, SA:MP:L/R), WTR, DNR, and Exercise states (E::L, E::R). Transitions are triggered by local inputs (OC, LO, SFDc, SF-P, FS, SF-W, SD-P, SD-W, MS-W, MS-P, WTRExp, EXER) and remote messages.
section: "11"
