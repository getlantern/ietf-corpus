document: rfc-9622
kind: protocol-element
summary: 'Selection Properties use a five-level Preference Enumeration: Require (only select protocols/paths providing the property), Prefer, No Preference, Avoid, and Prohibit (only select protocols/paths not providing the property). Most Selection Properties default to values implementable over TCP.'
