document: rfc-7611
kind: state-machine
summary: 'If a BGP speaker supports and is configured for ACCEPT_OWN, an additional step is inserted after the LOCAL_PREF comparison in the BGP decision process: when comparing routes for a BGP destination, the route carrying ACCEPT_OWN is preferred over the route without it. All other decision process steps remain unchanged.'
