document: rfc-2019
kind: normative-requirement
summary: The default MTU size for IPv6 packets on an FDDI network is 4352 octets. This may be reduced by a Router Advertisement MTU option or by manual configuration; DHCP-supplied values are treated as manually configured.
section: Maximum Transmission Unit
rfc2119_level: MUST NOT
topics:
    - ip
    - mobility
