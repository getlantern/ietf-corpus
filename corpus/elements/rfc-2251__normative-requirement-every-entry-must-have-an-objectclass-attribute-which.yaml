document: rfc-2251
kind: normative-requirement
summary: Every entry MUST have an objectClass attribute, which cannot be removed. Servers MUST NOT permit clients to add attributes to an entry unless those attributes are permitted by the object class definitions, the controlling subschema, or are operational attributes known to the server.
section: 3.2.1
rfc2119_level: MUST
topics:
