document: rfc-9207
kind: security-consideration
summary: Mix-up attacks are only relevant to clients interacting with multiple authorization servers. Clients currently using a single authorization server must still apply countermeasures when they add support for a second, as adding multi-AS support makes them newly vulnerable.
section: "4"
topics:
