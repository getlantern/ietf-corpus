document: rfc-4237
kind: protocol-element
summary: The vPIMSupportedMessageContext attribute provides guidance to the sender about message contexts the recipient is likely to accept, as defined in RFC 3458. It is a multi-value attribute offering coarser-grained capability information than media type lists, but more useful in unified messaging environments with media-conversion gateways.
section: "2.6"
topics:
