document: rfc-5630
kind: design-rationale
summary: SIPS provides transitive trust through compliant proxies but cannot serve as an end-to-end security guarantee equivalent to HTTPS. Because any proxy or B2BUA can bypass SIPS requirements, it is inappropriate to display a padlock or similar visual indication of end-to-end security based solely on a SIPS Request-URI.
section: "4"
topics:
