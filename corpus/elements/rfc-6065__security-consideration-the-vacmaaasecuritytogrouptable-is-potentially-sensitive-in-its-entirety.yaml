document: rfc-6065
kind: security-consideration
summary: 'The vacmAaaSecurityToGroupTable is potentially sensitive in its entirety: walking it reveals user names, security models, session identifiers, and group names. SNMPv3 with cryptographic authentication and privacy is RECOMMENDED; deployment of pre-SNMPv3 SNMP versions is NOT RECOMMENDED.'
section: "9.2"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
    - privacy
