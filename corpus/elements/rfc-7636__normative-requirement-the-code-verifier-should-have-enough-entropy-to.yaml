document: rfc-7636
kind: normative-requirement
summary: The code_verifier SHOULD have enough entropy to make it impractical to guess. It is RECOMMENDED that a suitable random number generator produce a 32-octet sequence, which is then base64url-encoded to a 43-octet URL-safe string.
section: "4.1"
rfc2119_level: SHOULD
topics:
