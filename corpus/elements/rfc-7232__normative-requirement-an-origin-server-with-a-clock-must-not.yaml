document: rfc-7232
kind: normative-requirement
summary: An origin server with a clock MUST NOT send a Last-Modified date that is later than the server's time of message origination (Date). If the last modification time evaluates to a future time, the origin server MUST replace that value with the message origination date.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
    - http
