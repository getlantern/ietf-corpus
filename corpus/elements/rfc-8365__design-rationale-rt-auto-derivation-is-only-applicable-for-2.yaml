document: rfc-8365
kind: design-rationale
summary: RT auto-derivation is only applicable for 2-octet AS numbers. For 4-octet AS numbers, the RT must be manually configured because a 3-octet VNI field cannot fit within the 2-octet local administrator field of the RT format.
section: 5.1.2.1
topics:
