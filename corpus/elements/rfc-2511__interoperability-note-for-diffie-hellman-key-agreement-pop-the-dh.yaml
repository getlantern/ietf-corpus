document: rfc-2511
kind: interoperability-note
summary: For Diffie-Hellman key agreement POP, the DH parameters used to calculate the entity's public key SHOULD be those specified in the CA's DH certificate. The CA must be able to generate a short-term or one-time key pair with appropriate parameters if needed.
section: "4.3"
topics:
    - pkix
    - crypto
