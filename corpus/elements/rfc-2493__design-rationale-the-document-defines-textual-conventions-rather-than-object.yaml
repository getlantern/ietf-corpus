document: rfc-2493
kind: design-rationale
summary: The document defines Textual Conventions rather than object types so that MIB modules requiring 15-minute performance history data share consistent semantics. This follows the RFC 1903 Textual Conventions mechanism, improving human readability and semantic precision over raw SMI types.
