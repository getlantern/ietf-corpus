document: rfc-7005
kind: protocol-element
summary: The De-Jitter Buffer (DJB) Metrics Block (BT=23) is an RTCP XR block that reports de-jitter buffer configuration and performance at the RTP receiver or mixer. It references the SSRC of the measured stream and uses the Measurement Information Block (RFC 6776) for measurement period context.
section: "4"
topics:
