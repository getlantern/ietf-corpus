document: rfc-4756
kind: normative-requirement
summary: A node that does not understand FEC grouping SHOULD respond to an offer containing FEC grouping either by ignoring the grouping attribute in the answer, or by refusing the request (e.g., SIP 488 or 606).
section: "4.2"
rfc2119_level: SHOULD
