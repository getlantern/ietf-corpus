document: rfc-4712
kind: design-rationale
summary: The APP (application-specific) part of the PDU is designed to accommodate new application extensions without requiring a new PDU type value registration, enabling modular extensibility. RRCs are required to recognize but not necessarily interpret vendor extensions.
section: 2.1.3
topics:
