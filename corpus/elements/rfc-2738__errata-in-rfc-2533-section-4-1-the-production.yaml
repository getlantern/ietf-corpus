document: rfc-2738
kind: errata
summary: 'In RFC 2533 section 4.1, the production for ''setentry'' incorrectly uses ''/'' as a character literal separator: ''setentry = value "/" range''. The correct ABNF uses ''/'' as an alternative separator: ''setentry = value / range''. This fix is normative and enables set expressions like ''( width=[3,4,6..17/2] )''.'
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
