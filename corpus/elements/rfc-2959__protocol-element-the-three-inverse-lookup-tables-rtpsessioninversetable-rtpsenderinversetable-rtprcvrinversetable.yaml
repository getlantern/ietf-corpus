summary: The three inverse lookup tables (rtpSessionInverseTable, rtpSenderInverseTable, rtpRcvrInverseTable) are optional and indexed by network address and domain fields, enabling retrieval of session/sender/receiver rows without a full table walk; each contains only a creation timestamp (TimeStamp).
