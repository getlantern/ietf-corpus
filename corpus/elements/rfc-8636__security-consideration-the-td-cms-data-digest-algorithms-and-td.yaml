document: rfc-8636
kind: security-consideration
summary: The TD_CMS_DATA_DIGEST_ALGORITHMS and TD_CERT_DIGEST_ALGORITHMS discovery mechanisms use unauthenticated Kerberos error messages; an attacker can forge these errors to attempt a downgrade to weaker digest algorithms. Local policy governs whether clients accept such downgrades.
section: "9"
topics:
    - crypto
    - security
