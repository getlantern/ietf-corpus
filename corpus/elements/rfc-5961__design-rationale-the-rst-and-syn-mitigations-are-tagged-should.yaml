summary: The RST and SYN mitigations are tagged SHOULD rather than MUST because they involve changes to existing RFC 793 state-machine behavior and were intended to be strongly recommended but not mandated, allowing implementers flexibility while strongly encouraging adoption for vulnerable deployment scenarios.
