document: rfc-9033
kind: state-machine
summary: 'A node booting with MSF transitions through six sequential steps: (1) choose frequency, (2) receive EBs, (3) set up autonomous cells for join, (4) acquire RPL Rank, (5) set up first Tx negotiated cells, (6) send EBs and DIOs. The end state is synchronization, mutual authentication, a selected routing parent, one AutoRxCell, and one negotiated Tx cell to the parent.'
