document: rfc-6765
kind: protocol-element
summary: The Bonding Channel Entity (BCE) represents an individual xDSL line or bearer channel in the ifTable with an ifType relevant to the underlying xDSL technology (e.g., shdsl(169), vdsl(97), adsl(94), vdsl2(251)). Each BCE participates in exactly one GBS aggregation group.
