document: rfc-9960
kind: security-consideration
summary: Failure to protect the SRv6 domain with inbound IACLs on external interfaces, combined with failure to implement BCP 38 or apply IACLs on nodes provisioning SIDs, permits attackers from outside the SR domain to send packets to receivers of multipoint services.
section: "7"
topics:
