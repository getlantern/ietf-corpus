document: rfc-9721
kind: protocol-element
summary: In a routed overlay, host /32 or /128 IP reachability is distributed via EVPN Route Type 5 (RT-5) with a zero or non-zero ESI, and the sequence number mobility Extended Community from RFC 7432 Section 7.7 MAY be associated with the host IP prefix. No MAC route is advertised in the EVPN overlay control plane, and both inter- and intra-subnet traffic is IP routed at the EVPN PE.
section: "7"
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
