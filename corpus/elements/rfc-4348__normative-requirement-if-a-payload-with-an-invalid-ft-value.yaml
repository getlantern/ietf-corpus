document: rfc-4348
kind: normative-requirement
summary: If a payload with an invalid FT value is received, the payload MUST be discarded. For ToC entries with FT=14 (Erasure) or FT=15 (Blank), there will be no corresponding speech frame data in the payload.
section: 6.3.3
rfc2119_level: MUST
