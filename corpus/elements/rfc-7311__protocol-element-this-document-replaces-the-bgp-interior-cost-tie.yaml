document: rfc-7311
kind: protocol-element
summary: 'This document replaces the BGP ''interior cost'' tie-breaker with an ''AIGP-enhanced interior cost'': for a route with next hop N, this equals the AIGP TLV value of the installed route to N (computed per Section 3.4.3) plus the IGP distance from R1 to the recursively-resolved BGP next hop of N.'
section: "4.2"
topics:
    - bgp
    - routing
