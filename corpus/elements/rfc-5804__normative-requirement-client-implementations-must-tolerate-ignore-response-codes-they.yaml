document: rfc-5804
kind: normative-requirement
summary: Client implementations MUST tolerate (ignore) response codes they do not recognize; clients supporting a parent code (e.g., QUOTA) MUST treat an unrecognized child (e.g., QUOTA/MAXSCRIPTS) as the parent.
