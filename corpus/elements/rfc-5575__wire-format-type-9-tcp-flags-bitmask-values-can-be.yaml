document: rfc-5575
kind: wire-format
summary: Type 9 (TCP flags) bitmask values can be encoded as 1 or 2 bytes. A 1-byte value matches byte 13 of the TCP header (bits 8–15 of the 4th 32-bit word); a 2-byte encoding matches bytes 12 and 13 with the data offset field treated as don't-care.
