document: rfc-4338
kind: normative-requirement
summary: To transmit IPv6, IPv4, or ARP packets, an Nx_Port MUST use dedicated unidirectional Exchanges (Sequence Initiative bit MUST be zero, RX_ID MUST be 0xFFFF). Unicast data traffic MUST be sent in long-lived Exchanges; control protocol packets SHOULD use short-lived Exchanges.
section: "12"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
