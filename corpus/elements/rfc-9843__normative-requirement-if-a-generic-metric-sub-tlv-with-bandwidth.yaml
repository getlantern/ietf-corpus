document: rfc-9843
kind: normative-requirement
summary: If a Generic Metric sub-TLV with Bandwidth metric-type is explicitly advertised for a link, the Flex-Algorithm calculation MUST use that advertised Bandwidth Metric and MUST NOT use the automatically derived metric for that link. The Reference Bandwidth field MUST be non-zero; a zero value causes the FADRB sub-TLV to be ignored.
section: 4.1.3.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
