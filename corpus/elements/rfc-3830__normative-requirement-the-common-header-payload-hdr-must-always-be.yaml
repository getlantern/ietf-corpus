document: rfc-3830
kind: normative-requirement
summary: The Common Header Payload (HDR) MUST always be the first payload in every MIKEY message. The CSB ID MUST be unique per Initiator-Responder pair (not globally), and the Initiator MUST check for collisions when choosing it.
section: "6.1"
rfc2119_level: MUST
topics:
    - crypto
