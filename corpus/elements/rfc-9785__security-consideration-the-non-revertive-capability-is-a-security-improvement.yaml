document: rfc-9785
kind: security-consideration
summary: 'The non-revertive capability is a security improvement: intentional link or node flapping by an attacker causes service disruption only once (when the PE transitions to Non-Designated Forwarder), not repeatedly. However, an attacker with configuration access can disable non-revertive behavior by advertising a conflicting DF algorithm, forcing fallback to the default.'
section: "5"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
