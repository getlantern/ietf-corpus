document: rfc-9951
kind: protocol-element
summary: pathDelaySumDeltaMicroseconds (ElementID 533) reports the sum of path delays of all packets in a Flow in microseconds, encoded as unsigned64 with deltaCounter semantics. The larger type is required to avoid overflow for high-delay, high-packet-count flows.
section: 6.2.4
