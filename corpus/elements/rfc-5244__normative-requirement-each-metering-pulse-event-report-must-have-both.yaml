document: rfc-5244
kind: normative-requirement
summary: Each metering pulse event report MUST have both the 'M' and 'E' bits set. Senders MUST be prepared to transmit both telephone-event and audio payload types simultaneously, since meter pulsing normally occurs during conversation.
section: "2.7"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
