document: rfc-7635
kind: design-rationale
summary: Long-term STUN username/password credentials cannot be kept secret in WebRTC JavaScript web applications, enabling unauthorized use if discovered. OAuth 2.0 ephemeral tokens limit the damage window even if a token is compromised.
