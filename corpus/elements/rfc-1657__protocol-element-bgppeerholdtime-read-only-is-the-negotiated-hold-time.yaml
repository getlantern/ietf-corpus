document: rfc-1657
kind: protocol-element
summary: bgpPeerHoldTime (read-only) is the negotiated Hold Time in seconds, computed as the minimum of bgpPeerHoldTimeConfigured and the Hold Time received in the peer's OPEN message; must be at least 3 seconds if non-zero. bgpPeerHoldTimeConfigured (read-write, suggested 90 seconds) is the locally configured value placed in OPEN messages.
