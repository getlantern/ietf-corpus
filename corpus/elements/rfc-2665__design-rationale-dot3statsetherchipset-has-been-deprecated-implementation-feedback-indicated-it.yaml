document: rfc-2665
kind: design-rationale
summary: 'dot3StatsEtherChipSet has been deprecated. Implementation feedback indicated it is more useful in theory than practice: it identifies only the MAC chip (not PHY, PMD, or driver), and the administrative overhead of maintaining a central OID registry cannot be justified for an object of questionable utility.'
section: "3.4"
topics:
    - registry
