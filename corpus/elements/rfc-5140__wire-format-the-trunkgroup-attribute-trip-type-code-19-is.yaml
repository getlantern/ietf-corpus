document: rfc-5140
kind: wire-format
summary: The TrunkGroup attribute (TRIP Type Code 19) is a variable-length sequence of trunkgroup identifiers, each encoded as a 1-octet Length followed by a Value field containing a trunkgroup label and trunk context separated by ';'. A Length of 0 for the whole attribute means the gateway can terminate ALL trunkgroups.
section: 4.5.1
