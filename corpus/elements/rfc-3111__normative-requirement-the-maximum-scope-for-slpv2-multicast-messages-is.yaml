document: rfc-3111
kind: normative-requirement
summary: The maximum scope for SLPv2 multicast messages is site-local (FF05). An SLPv2 agent MUST issue multicast requests using a source address whose scope is no less than the scope of the multicast group.
section: 4.2.2
rfc2119_level: MUST
topics:
    - multicast
    - v6ops
