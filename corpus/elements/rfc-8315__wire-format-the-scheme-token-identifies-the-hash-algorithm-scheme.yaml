document: rfc-8315
kind: wire-format
summary: 'The <scheme> token identifies the hash algorithm: scheme = "sha256" / "sha512" / 1*scheme-char / obs-scheme; scheme-char = ALPHA / DIGIT / "-" / "/". The value "sha256" is mandatory to implement; "sha512" is optional; "sha224" and "sha384" are limited-use; "md5" is obsolete.'
section: "2"
topics:
