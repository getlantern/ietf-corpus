document: rfc-7195
kind: normative-requirement
summary: In the 'm=' line for a circuit-switched bearer, the port subfield SHOULD be set to '9' (the discard port) and MUST be ignored on reception. The proto subfield SHOULD be set to 'PSTN'.
section: 5.2.2
rfc2119_level: SHOULD
