document: rfc-5239
kind: protocol-element
summary: Floor control (using BFCP per RFC 4582) allows an authorized client (floor chair) to manage access to a floor—a set of resources for which temporary access is granted to a participant or group. Floor control is not mandatory but provides advanced media input control. Each floor control message must include the conference object ID and conference user ID.
section: "8.4"
topics:
    - realtime
