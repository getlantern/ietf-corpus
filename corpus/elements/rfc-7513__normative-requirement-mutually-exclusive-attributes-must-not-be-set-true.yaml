document: rfc-7513
kind: normative-requirement
summary: Mutually exclusive attributes MUST NOT be set TRUE on the same attachment point. Trust is mutually exclusive with DHCP-Snooping, Data-Snooping, and Validating; all other pairwise combinations are compatible.
section: 4.2.6
rfc2119_level: MUST NOT
