document: rfc-4011
kind: design-rationale
summary: PolicyScript uses a loosely-typed 'var' class (modeled after ECMAScript semantics) instead of native C++ types so that scripts can remain short and easy to write. The var type holds either an integer (-2^63 to 2^64-1) or a string (sequence of 8-bit values), with automatic coercion between types.
section: "5.2"
topics:
    - snmp
