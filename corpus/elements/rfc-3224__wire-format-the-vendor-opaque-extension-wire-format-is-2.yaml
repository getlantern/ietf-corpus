document: rfc-3224
kind: wire-format
summary: 'The Vendor Opaque Extension wire format is: 2-byte Extension ID (0x0003), 3-byte Next Extension Offset, 4-byte Enterprise Number (unsigned integer), followed by variable-length Extension Data. The Enterprise Number field guarantees unambiguous vendor identification.'
