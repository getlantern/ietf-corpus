document: rfc-2545
kind: normative-requirement
summary: The link-local address shall be included in the Next Hop field if and only if the BGP speaker shares a common subnet with the entity identified by the global IPv6 address carried in the Next Hop field and the peer the route is being advertised to.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - ip
    - v6ops
    - routing
