document: rfc-3075
kind: interoperability-note
summary: 'Application-specific or non-standard transforms reduce verifiability: ''applications should refrain from using application-specific transforms if they wish their signatures to be verifiable outside of their application domain.'' Only standardized transform algorithms guarantee broad interoperability.'
section: 4.3.3.4
topics:
