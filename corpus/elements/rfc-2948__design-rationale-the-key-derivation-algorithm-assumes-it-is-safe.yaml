document: rfc-2948
kind: design-rationale
summary: The key derivation algorithm assumes it is safe to use a non-DES key (or part thereof) as a DES key. This is not universally true but is specified as default for compatibility with popular authentication systems and existing implementations. New AUTHENTICATION mechanisms may specify alternative key derivation if needed.
section: "5"
topics:
