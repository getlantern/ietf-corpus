summary: 'The MRU AVP (attr 94) and MRRU AVP (attr 95) each have a 6-octet fixed portion: M/H/reserved bits, Length field, Vendor ID 0, and a 2-octet MRU or MRRU value. Total length before hiding is 8 octets.'
