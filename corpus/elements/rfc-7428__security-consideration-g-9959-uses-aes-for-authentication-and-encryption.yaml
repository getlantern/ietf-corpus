document: rfc-7428
kind: security-consideration
summary: G.9959 uses AES for authentication and encryption of frames and employs challenge-response handshaking to prevent replay attacks. Devices communicating outside the PAN (e.g., billing or safety-critical products) SHOULD additionally use end-to-end security such as IPsec or TLS.
section: "6"
topics:
