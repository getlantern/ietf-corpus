document: rfc-9347
kind: normative-requirement
summary: The DS (Differentiated Services) field SHOULD NOT be copied from inner to outer headers by default in AGGFRAG mode, since multiple inner packets may have different DS values; a sender SHOULD allow the DS value to be set by configuration.
section: 2.2.5.3
rfc2119_level: SHOULD NOT
