document: rfc-7395
kind: design-rationale
summary: Server discovery uses Web-host Metadata (RFC 6415) via HTTPS rather than DNS SRV records because web browsers and WebSocket-capable applications typically cannot perform DNS SRV lookups. This is functionally equivalent to DNS SRV from a security standpoint.
section: "4"
topics:
    - websocket
    - dns
    - realtime
