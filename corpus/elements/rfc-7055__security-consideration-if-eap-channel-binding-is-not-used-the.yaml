document: rfc-7055
kind: security-consideration
summary: If EAP channel binding is not used, the system is vulnerable to phishing attacks where users are diverted to a different service. For deployments where AAA membership is broad, EAP channel binding is critical; implementations are therefore required to implement and use it. Without mutual authentication via channel binding, an attacker can only divert users between servers within the same AAA infrastructure.
section: "8"
topics:
    - security
