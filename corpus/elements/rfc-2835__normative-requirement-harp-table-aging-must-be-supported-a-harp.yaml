document: rfc-2835
kind: normative-requirement
summary: HARP table aging MUST be supported. A HARP client MUST invalidate table entries after 15 minutes; a HARP server MUST delete table entries after 20 minutes. A client MUST revalidate an invalidated entry before transmitting non-address-resolution traffic to it.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
