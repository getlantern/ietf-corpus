document: rfc-4360
kind: interoperability-note
summary: By default, when routes are aggregated without the ATOMIC_AGGREGATE attribute, the resulting aggregate SHOULD carry an Extended Communities attribute containing the set union of all Extended Communities from the aggregated routes. This default may be overridden by local configuration.
