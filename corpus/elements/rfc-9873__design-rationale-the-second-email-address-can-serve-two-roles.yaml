document: rfc-9873
kind: design-rationale
summary: 'The second email address can serve two roles: an alternate ASCII-only fallback when the primary SMTPUTF8 address has delivery issues, or an SMTPUTF8 contact address where the base ASCII address is the fallback. The ''primary'' attribute on <addlEmail:email> signals which role applies.'
