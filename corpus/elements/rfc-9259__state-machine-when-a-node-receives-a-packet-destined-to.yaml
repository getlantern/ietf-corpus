document: rfc-9259
kind: state-machine
summary: 'When a node receives a packet destined to local SID S with the O-flag set and local configuration permits O-flag processing (step S01.1): (a) make a copy of the packet, (b) send the copy with a timestamp to the OAM process. O-flag processing occurs before regular SID processing (inserted between lines S01 and S02 of RFC 8754 pseudocode).'
section: 2.1.1
topics:
    - routing
    - ip
