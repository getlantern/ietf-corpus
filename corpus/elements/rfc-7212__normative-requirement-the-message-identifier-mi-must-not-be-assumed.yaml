document: rfc-7212
kind: normative-requirement
summary: The Message Identifier (MI) MUST NOT be assumed to be a sequence number. A sender MUST NOT reuse an MI over a given channel until confident all ADBs associated with it have been expired by the receiver.
section: "5.1"
rfc2119_level: MUST NOT
topics:
