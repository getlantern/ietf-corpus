document: rfc-5475
kind: interoperability-note
summary: Trajectory Sampling (consistent selection of the same packets at multiple Observation Points) requires all Observation Points to use the same Hash Function, Hash Domain, and Hash Selection Range. Hash Domain fields must be invariant along the packet path; TTL and header CRC are therefore excluded.
section: 6.2.1.1
topics:
    - measurement
