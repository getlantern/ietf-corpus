document: rfc-2653
kind: interoperability-note
summary: 'A sender-CIP in a known homogeneous CIPv3 mesh MAY send the ''# CIP-Version: 3'' string and immediately follow it with the CIPv3 request without waiting for the 300 response, as an optimization to avoid the negotiation roundtrip.'
section: "2.1"
