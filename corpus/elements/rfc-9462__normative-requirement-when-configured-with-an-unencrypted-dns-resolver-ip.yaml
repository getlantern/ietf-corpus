document: rfc-9462
kind: normative-requirement
summary: When configured with an Unencrypted DNS Resolver IP address, a client SHOULD query _dns.resolver.arpa. with the SVCB resource record type (64) before making other queries, to allow switching to encrypted DNS for all subsequent queries.
section: "4"
rfc2119_level: SHOULD
topics:
    - dns
    - security
    - privacy
