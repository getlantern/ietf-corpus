document: rfc-8182
kind: interoperability-note
summary: Relying Parties encountering operational failures (unretrievable or invalid files) SHOULD attempt alternative repository access mechanisms listed in the certificate's SIA accessMethod elements (e.g., rsync), keep old cached objects for continued validation, and perform proactive re-validation before manifests or CRLs go stale.
section: 3.4.5
topics:
    - routing
