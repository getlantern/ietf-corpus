document: rfc-5267
kind: normative-requirement
summary: An ADDTO containing message sequence numbers added as a result of message delivery or APPEND MUST be sent after the EXISTS notification, so that those sequence numbers are valid when processed by the client.
section: 4.3.3
rfc2119_level: MUST
