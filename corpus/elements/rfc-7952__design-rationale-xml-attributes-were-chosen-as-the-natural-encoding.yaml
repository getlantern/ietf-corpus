document: rfc-7952
kind: design-rationale
summary: XML attributes were chosen as the natural encoding for metadata in XML instance documents. For JSON, a special encoding using '@'-prefixed member names was introduced because JSON has no established convention for metadata, while remaining consistent with RFC 7951 YANG-JSON encoding.
