document: rfc-1548
kind: protocol-element
summary: The Restart timer (default 3 seconds, MUST be configurable) guards against packet loss for Configure-Request and Terminate-Request retransmission. Max-Terminate defaults to 2, Max-Configure defaults to 10, and Max-Failure defaults to 10 (all MUST be configurable). When Max-Failure Configure-Naks are sent without a Configure-Ack, further Naks are converted to Configure-Rejects.
section: "4.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
