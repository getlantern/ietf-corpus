document: rfc-1902
kind: normative-requirement
summary: The next-to-last sub-identifier in the OBJECT IDENTIFIER name of any newly-defined notification must have the value zero. This maintains compatibility with procedures employed by SNMPv1/v2 proxy agents.
section: "8.5"
rfc2119_level: MUST
topics:
    - snmp
