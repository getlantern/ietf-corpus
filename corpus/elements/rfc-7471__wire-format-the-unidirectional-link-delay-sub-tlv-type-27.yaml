document: rfc-7471
kind: wire-format
summary: The Unidirectional Link Delay sub-TLV (type 27, length 4) contains a 1-bit Anomalous (A) flag, 7 reserved bits, and a 24-bit Delay field encoding average link delay in microseconds as an integer. Maximum encodable value is 16,777,215 microseconds (≈16.78 sec), which also serves as a saturation sentinel.
section: "4.1"
topics:
    - routing
    - measurement
