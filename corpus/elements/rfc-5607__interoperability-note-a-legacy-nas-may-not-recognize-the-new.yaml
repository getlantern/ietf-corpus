document: rfc-5607
kind: interoperability-note
summary: A legacy NAS may not recognize the new management authorization attributes and may silently discard them while still permitting CLI access via NAS-Prompt or Administrative Service-Type, potentially granting users more access rights than intended. RADIUS servers SHOULD ascertain NAS support before including these attributes in Access-Accept messages.
section: "12.1"
topics:
    - radius
    - security
