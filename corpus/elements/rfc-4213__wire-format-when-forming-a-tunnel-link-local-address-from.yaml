document: rfc-4213
kind: wire-format
summary: When forming a tunnel link-local address from an IPv4 address, the 128-bit address is FE80::/64 followed by 32 zero bits followed by the 32-bit IPv4 address. The U/L bit is zero, indicating the identifier is not globally unique.
