document: rfc-8543
kind: protocol-element
summary: The EPP <check> command for organizations uses <org:check> containing one or more <org:id> elements. The response returns <org:chkData> with <org:cd> elements, each containing an <org:id> with a boolean 'avail' attribute and an optional <org:reason> element.
section: 4.1.1
