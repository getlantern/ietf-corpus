document: rfc-5269
kind: normative-requirement
summary: The PAR MUST discard the handover key after FMIPv6 forwarding for the previous Care-of Address times out or when HK-LIFETIME expires. The MN SHOULD discard the handover key after MIPv6 binding update is complete on the new AR.
section: "3.6"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
