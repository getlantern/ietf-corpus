document: rfc-2215
kind: security-consideration
summary: Implementation of the characterization parameters described in this memo creates no known new avenues for malicious attack on the network infrastructure. However, these parameters do reveal additional information about a network's performance characteristics, which in extremely rare circumstances could be viewed as a security concern by the network provider.
