document: rfc-5451
kind: security-consideration
summary: Intentionally malformed or extraordinarily large Authentication-Results header fields may be used to exploit weaknesses in header parsing code. Implementors must thoroughly verify all such header fields and be robust against both intentional and unintentional malformation.
section: "7.8"
topics:
