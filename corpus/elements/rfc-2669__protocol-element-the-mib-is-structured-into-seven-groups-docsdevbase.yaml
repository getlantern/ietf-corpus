summary: 'The MIB is structured into seven groups: docsDevBase (system extension), docsDevNmAccessGroup (SNMP access security), docsDevSoftware (firmware upgrades), docsDevServer (provisioning server state), docsDevEvent (event logging and traps), docsDevFilter (LLC and IP packet filtering), and docsDevCpe (CPE IP address anti-spoofing, CM-only).'
