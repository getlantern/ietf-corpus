kind: protocol-element
summary: 'The Mailbox/changes response includes an additional ''updatedProperties'' field: when only totalEmails, unreadEmails, totalThreads, and/or unreadThreads changed since the old state, this lists those properties. If the server cannot determine this, it MUST return null.'
