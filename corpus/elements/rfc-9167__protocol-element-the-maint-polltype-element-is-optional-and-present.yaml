document: rfc-9167
kind: protocol-element
summary: The <maint:pollType> element is OPTIONAL and present only in poll messages; values MUST be 'create', 'update', 'delete', 'courtesy', or 'end'. For 'create'/'update' the server includes post-change state; for 'delete' it includes pre-delete state; 'courtesy' is a reminder; 'end' signals event completion.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
