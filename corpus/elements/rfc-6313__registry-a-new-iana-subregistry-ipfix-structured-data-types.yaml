document: rfc-6313
kind: registry
summary: 'A new IANA subregistry ''IPFIX Structured Data Types Semantics'' is created with six initial values: undefined (0, default), noneOf (1), exactlyOneOf (2), oneOrMoreOf (3), allOf (4), and ordered (5). The 1-byte Semantic field in every Structured Data IE references this registry.'
