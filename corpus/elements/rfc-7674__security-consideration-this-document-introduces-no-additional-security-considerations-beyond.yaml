document: rfc-7674
kind: security-consideration
summary: This document introduces no additional security considerations beyond RFC 5575. However, the previously ambiguous wildcard matching behavior—if implemented—could lead to Flowspec rules being installed in an incorrect VRF, causing traffic to be incorrectly delivered.
