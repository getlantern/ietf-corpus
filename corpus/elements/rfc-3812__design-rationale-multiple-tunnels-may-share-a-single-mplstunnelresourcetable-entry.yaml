document: rfc-3812
kind: design-rationale
summary: Multiple tunnels may share a single mplsTunnelResourceTable entry by pointing to the same mplsTunnelResourceIndex. An entry referenced by a zero-instance tunnel holds configured parameters; an entry referenced by a non-zero instance reflects in-use parameters that may have been negotiated by the signaling protocol.
section: "6.2"
topics:
