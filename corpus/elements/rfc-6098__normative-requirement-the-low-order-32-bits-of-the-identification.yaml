document: rfc-6098
kind: normative-requirement
summary: The low-order 32 bits of the Identification field MUST be copied unchanged from the GNM into the corresponding GNAM. The receiver MUST verify that these bits in any received GNAM are identical to those sent in the GNM, to correlate responses and detect mismatches.
section: "7.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
