document: rfc-6913
kind: normative-requirement
summary: A calling UA SHOULD include the 'sip.fax' media feature tag in the Accept-Contact header of an INVITE request to express its desire for routing to a fax-capable UA; without this tag, fax call determination is not possible until after the call is connected.
section: "4"
rfc2119_level: SHOULD
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
