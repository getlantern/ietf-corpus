document: rfc-5944
kind: wire-format
summary: 'Registration Reply (Type=3) is a UDP message containing: 8-bit Type, 8-bit Code, 16-bit Lifetime, 32-bit Home Address, 32-bit Home Agent, 64-bit Identification, followed by Extensions. The Code field encodes success (0–1) or denial by the foreign agent (64–88, 194) or home agent (128–136).'
section: "3.4"
