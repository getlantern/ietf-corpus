document: rfc-4703
kind: security-consideration
summary: DHCP servers currently have difficulty establishing confidence in client identities because DHCP itself lacks entity authentication. The DHCID mechanism is advisory only and does not provide cryptographic binding between client identity and DNS records.
section: "6"
topics:
