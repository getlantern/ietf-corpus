document: rfc-9483
kind: normative-requirement
summary: If certificate confirmation is required, the EE MUST send a certConf message on successful receipt of the certificate. On receiving a valid certConf, the PKI management entity MUST respond with pkiConf. If certConf is not received in time, the entity MUST treat it as rejection.
section: 4.1.1
rfc2119_level: MUST
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
