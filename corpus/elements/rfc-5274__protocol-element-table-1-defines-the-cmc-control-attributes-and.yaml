summary: 'Table 1 defines the CMC control attributes and required support levels (MUST/SHOULD/MAY/N/A) for each of EE, RA, and CA roles. Key MUST controls for all three roles include: Extended CMC Status Info, Identity Proof V2, Identification, POP Link Random, POP Link Witness V2, Data Return, Transaction ID, Sender Nonce, Recipient Nonce, Query Pending, and Confirm Cert Acceptance.'
