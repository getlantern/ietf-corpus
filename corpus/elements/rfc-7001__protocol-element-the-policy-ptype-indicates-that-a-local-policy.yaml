document: rfc-7001
kind: protocol-element
summary: The 'policy' ptype indicates that a local policy mechanism was applied that augments or overrides the result returned by the authentication mechanism. The property and value identify the local policy applied and its result; these names are arbitrary and ADMD-local, not IANA-registered.
