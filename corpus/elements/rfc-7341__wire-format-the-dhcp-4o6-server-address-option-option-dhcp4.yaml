kind: wire-format
summary: The DHCP 4o6 Server Address option (OPTION_DHCP4_O_DHCP6_SERVER, code 88) carries zero or more 16-octet IPv6 addresses of DHCP 4o6 servers. option-len is a multiple of 16; minimal length is 0 (empty option signals use of multicast).
