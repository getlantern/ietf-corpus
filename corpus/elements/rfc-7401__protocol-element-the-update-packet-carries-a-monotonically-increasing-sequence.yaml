document: rfc-7401
kind: protocol-element
summary: The UPDATE packet carries a monotonically increasing sequence number and is explicitly acknowledged by the peer via an ACK parameter. UPDATE is protected by both HIP_MAC and HIP_SIGNATURE; requiring only signature processing for UPDATE would be a DoS vector against intermediate systems.
section: "4.2"
topics:
    - ip
    - security
