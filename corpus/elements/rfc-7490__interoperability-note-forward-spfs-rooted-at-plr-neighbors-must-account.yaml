document: rfc-7490
kind: interoperability-note
summary: Forward SPFs rooted at PLR neighbors must account for IS-IS overload, OSPF stub router advertisement (RFC 6987), and costed-out links. A repair tunnel path may otherwise traverse a node or link that should be excluded, requiring two additional MUST NOT checks on the first-hop metric and tunnel endpoint overload state.
section: "5.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
