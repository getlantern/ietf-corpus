document: rfc-8624
kind: normative-requirement
summary: During a DS algorithm rollover, administrators MUST complete the DS algorithm upgrade before starting a rollover process for a new KSK; upgrading an algorithm simultaneously with a KSK rollover will cause DNSSEC validation failures.
section: "5"
rfc2119_level: MUST
topics:
