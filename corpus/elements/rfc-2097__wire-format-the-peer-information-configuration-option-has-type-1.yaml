document: rfc-2097
kind: wire-format
summary: The Peer-Information Configuration Option has Type (1 octet, value 2), Length (1 octet, >=8), Peer-class (1 octet), Peer-version-major (2 octets), Peer-version-minor (2 octets), and optional Peer-name (up to 32 octets). Length of 8 indicates no peer name is present.
section: "3.2"
