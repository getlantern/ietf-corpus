summary: 'The overall dereference flow consists of three steps: (1) Target acquires a location URI from the LIS via a location configuration protocol; (2) Target conveys the URI to the Location Recipient; (3) Location Recipient dereferences the URI using HELD to obtain the PIDF-LO.'
