document: rfc-6597
kind: protocol-element
summary: A KLVunit is a logical collection of all KLV items to be presented at a specific time, comprised of one or more KLV items. Multiple KLV items occur one after another with no padding or stuffing between items. Compound items (sets, packs) are allowed but must not be split across two KLVunits.
section: 4.2.1
topics:
