document: rfc-3840
kind: normative-requirement
summary: When a UAC refreshes its registration, it MUST include its feature parameters in the refresh if it wishes them to remain active. When a registrar returns a 200 OK to a REGISTER, each Contact header field value MUST include all feature parameters associated with that URI.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
