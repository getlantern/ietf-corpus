document: rfc-4930
kind: protocol-element
summary: The <login> command contains <clID> (client identifier), <pw> (plain text password), optional <newPW> (new password), an <options> element with <version> and <lang> whose values MUST exactly match those in the greeting, and a <svcs> element listing object namespace URIs to manage during the session.
section: 2.9.1.1
