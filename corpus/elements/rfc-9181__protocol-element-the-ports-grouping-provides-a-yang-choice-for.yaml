document: rfc-9181
kind: protocol-element
summary: The 'ports' grouping provides a YANG choice for source and destination port specification, each capable of expressing either a range (lower-port to upper-port, both inet:port-number) or a single port with an operator (e.g., eq, lt, gt). It reuses the 'port-range-or-operator' grouping from ietf-packet-fields (RFC 8519).
section: "3"
topics:
