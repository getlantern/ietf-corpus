document: rfc-8167
kind: protocol-element
summary: Chunks MAY be used in the reverse direction and operate the same way as in the forward direction. Implementations supporting only ULPs without DDP-eligible data may choose not to implement chunk support in the reverse direction, in which case reverse-direction messages are always Short Messages.
section: "5.3"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
