document: rfc-3887
kind: interoperability-note
summary: Option identifiers beginning with 'vnd.' are reserved for vendor use and follow a reversed-domain naming convention (e.g., vnd.com.example.extinfo). These vendor options MAY be registered with IANA but are not required to be.
