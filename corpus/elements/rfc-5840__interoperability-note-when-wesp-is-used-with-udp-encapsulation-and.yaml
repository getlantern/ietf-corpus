document: rfc-5840
kind: interoperability-note
summary: When WESP is used with UDP encapsulation and IPv6, the 4-octet Protocol Identifier (0x00000002) already achieves 8-octet alignment, so the IPv6 padding (P bit) is not needed and need not be set.
