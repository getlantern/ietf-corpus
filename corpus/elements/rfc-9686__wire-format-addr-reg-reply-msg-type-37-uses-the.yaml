document: rfc-9686
kind: wire-format
summary: ADDR-REG-REPLY (msg-type 37) uses the same 1-byte msg-type + 3-byte transaction-id + variable options layout as ADDR-REG-INFORM. It MUST contain an IA Address option identical to the one in the corresponding ADDR-REG-INFORM.
section: "4.3"
topics:
