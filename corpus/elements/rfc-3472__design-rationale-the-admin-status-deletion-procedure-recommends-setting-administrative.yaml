document: rfc-3472
kind: design-rationale
summary: The Admin Status deletion procedure recommends setting administrative status before tearing down an LSP—particularly in optical networks—to give all nodes advance notice and allow graceful resource release rather than abrupt removal. The 30-second fallback timer covers nodes that do not understand the Admin Status TLV.
section: 7.2.1
topics:
    - routing
