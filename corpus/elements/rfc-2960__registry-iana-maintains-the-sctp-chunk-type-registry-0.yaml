document: rfc-2960
kind: registry
summary: IANA maintains the SCTP Chunk Type registry (0–255). Chunk types 0–14 are defined by this RFC; 63, 127, 191, 255 are for IETF-defined extensions; remaining ranges are reserved. New assignments require IETF consensus.
