document: rfc-2863
kind: interoperability-note
summary: The requirement that ifIndex values be less than ifNumber was removed. Existing agent implementations already conform to the new looser definition, preserving backward compatibility. The value of ifNumber continues to represent the count of conceptual rows and increases or decreases as interfaces are dynamically added or removed.
section: 3.1.5
topics:
    - snmp
