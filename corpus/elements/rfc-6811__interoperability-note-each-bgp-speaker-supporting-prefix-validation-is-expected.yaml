document: rfc-6811
kind: interoperability-note
summary: Each BGP speaker supporting prefix validation is expected to communicate with one or more RPKI caches via the protocol described in RFC 6810. The prefix-to-AS mappings are expected to be updated over time as the RPKI database changes.
