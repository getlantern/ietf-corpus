document: rfc-3798
kind: wire-format
summary: 'The message/disposition-notification body is formatted as RFC 2822 header fields with this structure: optional Reporting-UA, optional MDN-Gateway, optional Original-Recipient, required Final-Recipient, optional Original-Message-ID, required Disposition, followed by zero or more Failure, Error, Warning, and extension fields, each terminated by CRLF.'
