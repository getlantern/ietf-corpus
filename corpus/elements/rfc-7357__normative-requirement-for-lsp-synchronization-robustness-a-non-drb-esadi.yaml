document: rfc-7357
kind: normative-requirement
summary: For LSP synchronization robustness, a non-DRB ESADI RBridge SHOULD also transmit an ESADI-CSNP for an instance if it has ESADI neighbors, does not believe it is the DRB, and has not received or sent a CSNP for longer than the average of the DRB's CSNP Time and its own CSNP Time.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
