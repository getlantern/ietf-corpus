document: rfc-7033
kind: security-consideration
summary: WebFinger cannot guarantee the accuracy of information provided by users or that information has not been manipulated at the server. HTTPS addresses transit manipulation but not server-side falsification; clients should treat information from untrusted sources with skepticism.
section: "9.4"
topics:
