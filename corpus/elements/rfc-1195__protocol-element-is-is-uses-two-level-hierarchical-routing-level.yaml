document: rfc-1195
kind: protocol-element
summary: 'IS-IS uses two-level hierarchical routing: Level 1 routers know the topology within their area and forward off-area traffic to the nearest Level 2 router; Level 2 routers know the inter-area topology and route based on area addresses. A router may be both Level 1 and Level 2.'
section: "1.2"
topics:
    - routing
