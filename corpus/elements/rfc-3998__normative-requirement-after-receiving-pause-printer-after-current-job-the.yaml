document: rfc-3998
kind: normative-requirement
summary: After receiving Pause-Printer-After-Current-Job, the IPP Printer MUST complete sending any job already in progress to an Output Device or Subordinate Printer, but MUST NOT send any additional jobs, and additional jobs MUST NOT enter the 'processing' state. This operation MUST NOT affect the acceptance of Job Creation requests.
section: 3.2.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
