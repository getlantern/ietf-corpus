document: rfc-3984
kind: normative-requirement
summary: DON-related fields (DON, DONB, DOND) MUST produce a decoding order that conforms to NAL unit decoding order per H.264 section 7.4.1.2. NAL units whose order is switched without preserving decoding order MUST NOT have the same DON value.
section: "5.5"
rfc2119_level: MUST
topics:
