document: rfc-8159
kind: protocol-element
summary: The IPv6 Traffic Class may be set by the ingress router to ensure correct PHB treatment and QoS disposition. The IPv6 Flow Label may be set to indicate a packet flow that must not be reordered, enabling finer-grained ECMP load balancing beyond per-circuit granularity.
