document: rfc-8264
kind: normative-requirement
summary: If case mapping is desired, it is RECOMMENDED to use the Unicode toLowerCase() operation rather than toCaseFold(). The toCaseFold() operation is appropriate for search comparisons but is not well understood by most developers and users, making toLowerCase() the safer general choice.
section: 5.2.3
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
