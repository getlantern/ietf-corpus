document: rfc-8775
kind: state-machine
summary: 'GDR role state: a router transitions to GDR when it is in the DRLB-List Candidate field and the hash algorithm selects it for a group; it transitions out of GDR (and sends an Assert with near-maximum metric) when removed from the list, when the DRLB-List is no longer received, or when the DR neighbor liveness timer expires.'
section: "5.6"
topics:
    - multicast
    - realtime
