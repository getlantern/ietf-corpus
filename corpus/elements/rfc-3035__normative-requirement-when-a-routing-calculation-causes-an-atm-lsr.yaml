document: rfc-3035
kind: normative-requirement
summary: When a routing calculation causes an ATM-LSR to change the next hop for a FEC, it MUST notify the former next hop via LDP that the label binding associated with the FEC is no longer needed. When an ATM-LSR destroys a binding, it MUST notify the next hop for the FEC that the binding is no longer needed.
section: "8.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
