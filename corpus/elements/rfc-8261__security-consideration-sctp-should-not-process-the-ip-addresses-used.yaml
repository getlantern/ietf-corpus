document: rfc-8261
kind: security-consideration
summary: SCTP should not process the IP addresses used for the underlying DTLS communication because DTLS provides no guarantees about those addresses. The combination of SCTP and DTLS introduces no new security considerations beyond those specified for each protocol individually.
section: "8"
topics:
    - sctp
    - tls
    - security
