document: rfc-749
kind: protocol-element
summary: 'Four negotiation commands are defined: IAC WILL SUPDUP-OUTPUT (server requests permission to send SUPDUP-OUTPUT messages), IAC WON''T SUPDUP-OUTPUT (server will no longer send such messages), IAC DO SUPDUP-OUTPUT (user grants permission), IAC DON''T SUPDUP-OUTPUT (user demands cessation).'
section: "2"
