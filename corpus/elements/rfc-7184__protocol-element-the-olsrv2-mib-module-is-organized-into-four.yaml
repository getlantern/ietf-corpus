kind: protocol-element
summary: 'The OLSRv2-MIB module is organized into four functional groups: Configuration Group (protocol parameters), State Group (current operating state reflecting RFC 7181 Information Bases), Performance Group (operational metrics for troubleshooting), and Notifications Group (asynchronous event triggers). The module is assigned OID { mib-2 219 }.'
