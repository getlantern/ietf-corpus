document: rfc-6098
kind: protocol-element
summary: The Generic Notification Acknowledgement Message (GNAM, Type 23) is sent by mobility agents or MNs to indicate successful receipt of a GNM. Its fixed header mirrors the GNM layout but replaces the A flag with a Code field (8 bits) indicating success (0), FA denial (64–69), HA denial (128–133), or MN denial (192–197).
section: "4.2"
topics:
