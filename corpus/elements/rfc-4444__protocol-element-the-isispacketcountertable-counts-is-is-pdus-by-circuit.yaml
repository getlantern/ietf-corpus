summary: 'The isisPacketCounterTable counts IS-IS PDUs by circuit, level (L1/L2), and direction (sending/receiving) across seven types: IIH, ISH, ESH, LSP, CSNP, PSNP, and unknown. Point-to-point IIH PDUs are counted at the lowest enabled level.'
