document: rfc-4796
kind: design-rationale
summary: The existing 'label' attribute could in principle convey media content information, but its namespace is unrestricted and already used in application-specific ways by existing implementations, making it impossible to reserve portions without conflict. A new 'content' attribute with a defined namespace was therefore introduced.
section: "3"
topics:
    - realtime
    - sip
