document: rfc-8143
kind: normative-requirement
summary: NNTP implementations and deployments SHOULD disable TLS-level compression (per Section 3.3 of RFC 7525), overriding the earlier RFC 4642 guidance that encouraged using TLS as a means to provide data compression.
section: "2"
rfc2119_level: SHOULD
topics:
    - tls
    - security
