document: rfc-2575
kind: wire-format
summary: vacmViewTreeFamilyMask is encoded as an OCTET STRING of SIZE 0..16. The most significant bit of the i-th octet corresponds to the (8i-7)-th OID sub-identifier of vacmViewTreeFamilySubtree. When the mask is shorter than the subtree length, it is implicitly extended with ones; a zero-length mask therefore acts as all-ones (exact match, no wildcarding).
