document: rfc-7484
kind: interoperability-note
summary: This bootstrap method does not cover entities, nameservers, help queries, or search-pattern queries that do not contain a terminating string matching registry entries. Implementors must use alternative means (e.g., RDAP aggregators or redirectors) for these object types.
