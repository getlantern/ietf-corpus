document: rfc-5447
kind: design-rationale
summary: MIP-Home-Agent-Address takes precedence over MIP-Home-Agent-Host when both appear in MIP6-Agent-Info because MIP-Home-Agent-Address points to a specific home agent, while MIP-Home-Agent-Host may identify a group of HAs within the same realm.
