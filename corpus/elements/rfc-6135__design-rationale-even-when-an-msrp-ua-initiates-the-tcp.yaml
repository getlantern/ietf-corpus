document: rfc-6135
kind: design-rationale
summary: Even when an MSRP UA initiates the TCP connection towards its relay, the UA will only send a SEND request if the UA is active based on the COMEDIA negotiation. The relay connection direction and the COMEDIA active/passive role are independent.
section: "4.5"
