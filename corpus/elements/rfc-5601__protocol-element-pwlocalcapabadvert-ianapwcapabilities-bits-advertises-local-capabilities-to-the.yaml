document: rfc-5601
kind: protocol-element
summary: pwLocalCapabAdvert (IANAPwCapabilities BITS) advertises local capabilities to the peer during maintenance protocol exchange. The default value MUST be the full set of local node capabilities; the agent MUST reject any attempt to set an unsupported capability.
