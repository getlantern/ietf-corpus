document: rfc-4256
kind: interoperability-note
summary: The client MUST be prepared to handle multiple SSH_MSG_USERAUTH_INFO_REQUEST/RESPONSE exchanges in sequence, as the server may send as many requests as needed. However, only one request may be outstanding at a time.
section: "3.2"
topics:
