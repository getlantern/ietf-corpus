document: rfc-9503
kind: interoperability-note
summary: This document introduces no additional interoperability considerations with TWAMP Light beyond those in RFC 8762 Section 4.6. If STAMP extensions defined here are used by a STAMP Session-Sender, a TWAMP Light Session-Reflector will treat them as the Packet Padding field.
