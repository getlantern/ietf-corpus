document: rfc-4108
kind: security-consideration
summary: 'Stale version rollback protection is inherently limited: the inclusion of a stale version designator in a firmware package cannot completely prevent subsequent use of the stale firmware package if the hardware module loads the stale package before ever loading a package with the stale designator.'
section: "6.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
