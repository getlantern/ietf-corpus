document: rfc-1289
kind: state-machine
summary: 'The DDCMP multipoint tributary polling state machine (phivControlPollingState) has five states: AUTOMATIC, ACTIVE, INACTIVE, DYING, and DEAD. When in AUTOMATIC mode, phivControlPollingSubState shows the algorithm-determined substate; thresholds phivControlDeadThreshold, phivControlDyingThreshold, and phivControlInactThreshold control transitions between states.'
