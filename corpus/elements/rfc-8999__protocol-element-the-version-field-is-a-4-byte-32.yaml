document: rfc-8999
kind: protocol-element
summary: The Version field is a 4-byte (32-bit) identifier appearing in long headers that identifies the QUIC version in use. The value 0x00000000 is reserved exclusively for Version Negotiation packets; all other values are potentially valid version identifiers.
