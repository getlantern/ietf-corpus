document: rfc-5104
kind: state-machine
summary: 'TMMBR owner/non-owner states: a receiver is an ''owner'' if its (bit rate, overhead) tuple appears in the media sender''s TMMBN bounding set, and a ''non-owner'' otherwise. Owners send TMMBR when their values change; non-owners apply the bounding-set algorithm and send TMMBR only if their tuple would enter the bounding set. A receiver checks each TMMBN to determine its current status.'
section: 3.5.4.1
topics:
    - rtp
    - realtime
    - congestion
