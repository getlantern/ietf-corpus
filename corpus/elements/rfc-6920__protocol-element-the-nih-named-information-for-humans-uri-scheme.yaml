document: rfc-6920
kind: protocol-element
summary: The nih (Named Information for Humans) URI scheme provides a human-speakable form using lowercase ASCII hex encoding, with format 'nih:<alg>;<hexval>[;<checkdigit>]'. Separators ('-') MAY be interspersed in the hash value, and a Luhn mod N (N=16) checkdigit (per ISO/IEC 7812) MAY be appended to catch transcription errors.
