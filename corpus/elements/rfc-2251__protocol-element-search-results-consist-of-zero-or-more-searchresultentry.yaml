document: rfc-2251
kind: protocol-element
summary: Search results consist of zero or more SearchResultEntry ([APPLICATION 4]) and SearchResultReference ([APPLICATION 19]) messages in any order, terminated by a single SearchResultDone ([APPLICATION 5] LDAPResult). SearchResultReference contains at least one LDAPURL and MUST include the dn part.
