document: rfc-6572
kind: normative-requirement
summary: If the RADIUS Access-Accept contains contradicting MIP6-Feature-Vector bits (e.g., both IP4_HOA_ONLY_SUPPORTED and IP4_HOA_SUPPORTED set), the RADIUS client MUST treat the Access-Accept as an Access-Reject and SHOULD log the event. Symmetrically, if the Access-Request contains contradicting bits, the RADIUS server MUST reply with Access-Reject and SHOULD log.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
