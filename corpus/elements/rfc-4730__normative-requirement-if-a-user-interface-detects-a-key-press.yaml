document: rfc-4730
kind: normative-requirement
summary: If a User Interface detects a key press that triggers a one-shot KPML event, it MUST set the 'Subscription-State' header in the NOTIFY to 'terminated' and MUST consider the subscription expired.
section: "3.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
