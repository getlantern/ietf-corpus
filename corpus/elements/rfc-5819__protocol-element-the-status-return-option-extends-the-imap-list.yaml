document: rfc-5819
kind: protocol-element
summary: The STATUS return option extends the IMAP LIST command (as defined by the LIST-EXTENDED framework in RFC 5258) to request STATUS data items alongside normal LIST responses. The option takes one or more status-att items as parameters.
