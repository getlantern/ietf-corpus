document: rfc-9092
kind: normative-requirement
summary: Canonicalization of geofeed content for signing MUST use UTF-8 encoding with CRLF line endings; non-printable characters MUST NOT be changed; trailing blank lines MUST NOT appear at end of file; end-of-file markers MUST NOT be processed by the digital signature algorithm.
section: "4"
rfc2119_level: MUST
topics:
    - crypto
    - security
