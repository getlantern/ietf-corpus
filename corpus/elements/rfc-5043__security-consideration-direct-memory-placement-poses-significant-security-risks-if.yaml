document: rfc-5043
kind: security-consideration
summary: Direct memory placement poses significant security risks if adequate local controls are absent; these are addressed by RFC 5041 (DDP), RFC 5040 (RDMA), and RFC 5042 (Security). This document adds no security risks beyond those in RFC 4960. IPsec requirements for RDDP over SCTP follow RFC 3723 to enable a common profile with iSCSI.
section: "13"
topics:
    - security
    - ipsec
    - sctp
