document: rfc-4454
kind: interoperability-note
summary: Fragmentation and reassembly (per [L2TPFRAG]) MUST NOT be used for Cell Relay ATMPWs—concatenating cells then fragmenting the resulting packet is counterproductive. For AAL5-SDU Mode, only one fragmentation method (L2TP-layer or IP-layer) SHOULD be used for a given session.
section: "9.2"
topics:
    - routing
