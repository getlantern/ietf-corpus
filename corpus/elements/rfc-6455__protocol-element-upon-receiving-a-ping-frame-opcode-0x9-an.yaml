document: rfc-6455
kind: protocol-element
summary: Upon receiving a Ping frame (opcode 0x9), an endpoint MUST send a Pong frame (opcode 0xA) in response unless it has already sent a Close frame. A Pong sent in response MUST carry the identical application data as the triggering Ping. An endpoint MAY send unsolicited Pong frames.
section: 5.5.2
topics:
    - websocket
