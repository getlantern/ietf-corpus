document: rfc-4817
kind: normative-requirement
summary: When securing L2TPv3 with IPsec, the implementation MUST support ESP with null encryption. ESP with encryption MAY be supported if confidentiality is required. Securing L2TPv3 using IPsec MUST provide authentication and integrity.
section: "6.3"
rfc2119_level: MUST
topics:
    - mpls
    - ipsec
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
