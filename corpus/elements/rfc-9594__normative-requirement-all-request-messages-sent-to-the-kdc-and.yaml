document: rfc-9594
kind: normative-requirement
summary: All request messages sent to the KDC and all success response messages from the KDC that include a payload and specify a Content-Format MUST use Content-Format 'application/ace-groupcomm+cbor' (registered in Section 11.2). CBOR map keys for parameters are defined in Section 8.
section: "4.1"
rfc2119_level: MUST
topics:
