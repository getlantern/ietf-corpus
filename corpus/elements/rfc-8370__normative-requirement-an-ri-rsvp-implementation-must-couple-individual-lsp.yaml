document: rfc-8370
kind: normative-requirement
summary: An RI-RSVP implementation MUST couple individual LSP state with the state of the corresponding RSVP-TE signaling adjacency; upon detecting adjacency failure, the speaker MUST treat all Path and Resv states learned via that adjacency as timed out.
section: "3"
rfc2119_level: MUST
topics:
