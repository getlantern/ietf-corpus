document: rfc-7676
kind: normative-requirement
summary: When an IPv6 payload packet exceeds the GMTU and GMTU < 1280, the GRE ingress MUST encapsulate the entire IPv6 packet in a single GRE header and IP delivery header, then fragment the delivery header for reassembly by the GRE egress.
section: "3.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
