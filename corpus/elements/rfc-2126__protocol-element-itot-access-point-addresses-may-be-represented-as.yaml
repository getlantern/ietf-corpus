document: rfc-2126
kind: protocol-element
summary: ITOT access point addresses may be represented as printable strings (per RFC1278, extended for IPv6) or as OSI Network Addresses (NSAPAs, per RFC1277 for IPv4 and RFC1888 for IPv6). For IPv6-encoded ITOT addresses, the default selector of the NSAPA is defined as '10000000'B.
