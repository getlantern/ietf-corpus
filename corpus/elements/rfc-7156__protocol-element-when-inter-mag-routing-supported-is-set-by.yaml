document: rfc-7156
kind: protocol-element
summary: When INTER_MAG_ROUTING_SUPPORTED is set by the MAG or LMA in the MIP6-Feature-Vector AVP in a request, it indicates to the HAAA that inter-MAG direct routing may be provided to the identified mobile node. When set in the response by the HAAA, it indicates that direct routing is authorized.
section: "4.4"
topics:
    - mobility
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
