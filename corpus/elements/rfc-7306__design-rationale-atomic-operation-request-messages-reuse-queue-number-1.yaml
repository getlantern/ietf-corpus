document: rfc-7306
kind: design-rationale
summary: Atomic Operation Request messages reuse Queue Number 1 (the RDMA Read Request Queue) so that Atomic Operations can share the existing ORD/IRD flow-control infrastructure already defined for RDMA Read Requests, avoiding a new flow-control mechanism.
