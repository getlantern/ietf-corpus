document: rfc-8697
kind: normative-requirement
summary: If association information received from a peer does not match locally configured operator information, the receiver MUST return PCErr Error-Type 26, Error-value 5 ('Operator-configured association information mismatch'). Conflicting information received from the same peer about a previously seen association yields Error-value 6 ('Association information mismatch').
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
