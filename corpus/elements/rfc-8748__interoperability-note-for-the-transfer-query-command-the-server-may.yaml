document: rfc-8748
kind: interoperability-note
summary: For the <transfer> query command, the server MAY include a <fee:trnData> element in the response only if the client is authorized to view transfer information. Servers SHOULD omit <fee:credit> when responding to the gaining client and omit <fee:fee> when responding to the losing client. If no <fee:trnData> is included, no fee is assessed.
section: 5.1.2
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
