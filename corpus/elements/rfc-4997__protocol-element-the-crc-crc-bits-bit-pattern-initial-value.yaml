document: rfc-4997
kind: protocol-element
summary: The crc(crc_bits, bit_pattern, initial_value, block_data_value, block_data_length) encoding method produces a CRC calculated using the algorithm defined in RFC 4995. The CRC is computed in LSB order; the bit_pattern omits the highest-order term (always implicit) so an n-term polynomial uses n-1 bits.
section: 4.11.6
topics:
    - security
