document: rfc-4348
kind: normative-requirement
summary: If the calculated payload length based on session information and payload header field values does not match the received packet size, the receiver SHOULD discard the packet to avoid speech quality degradation and invoke the VMR-WB built-in frame error concealment mechanism. Invalid packets SHALL be treated as lost packets.
section: 6.4.1
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
