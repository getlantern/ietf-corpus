document: rfc-2794
kind: normative-requirement
summary: The Registration Reply MUST include a nonzero Home Agent address and mobile node's Home Address. If not, the foreign agent SHOULD send the Reply with Code MISSING_HOME_AGENT (98) or MISSING_HOMEADDR (99) respectively.
section: "3"
rfc2119_level: MUST
topics:
    - mobility
