document: rfc-2578
kind: normative-requirement
summary: Objects with Counter32 or Counter64 syntax must not be specified in an INDEX clause, since a single Counter value has no information content. If a BITS object is used in an INDEX clause, it is treated as a variable-length string.
section: "7.7"
rfc2119_level: MUST NOT
topics:
    - snmp
