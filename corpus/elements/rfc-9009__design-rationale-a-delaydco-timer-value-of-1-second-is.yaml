document: rfc-9009
kind: design-rationale
summary: A DelayDCO timer value of 1 second is recommended (mirroring the default DelayDAO timer) so that the common ancestor can collect updated DAOs from all preferred parents before initiating a DCO, reducing unnecessary DCO control overhead in multi-parent topologies.
section: 4.6.4
topics:
    - routing
