document: rfc-1213
kind: interoperability-note
summary: The Address Translation group (atTable) is deprecated in MIB-II but must still be supported for compatibility with MIB-I nodes; it will most likely be excluded from MIB-III. From MIB-II onward, each network protocol group contains its own address translation tables.
section: "3.1"
