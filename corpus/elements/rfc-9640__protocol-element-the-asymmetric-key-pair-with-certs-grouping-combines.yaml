document: rfc-9640
kind: protocol-element
summary: The 'asymmetric-key-pair-with-certs-grouping' combines asymmetric-key-pair-grouping, a 'certificates' container (list of named end-entity-cert-grouping instances), and generate-csr-grouping. Implementations MUST assert that certificates contain the matching public key. This is the primary grouping for managing asymmetric keys with multiple associated certificates.
section: 2.1.4.12
topics:
    - yang
    - crypto
    - pkix
