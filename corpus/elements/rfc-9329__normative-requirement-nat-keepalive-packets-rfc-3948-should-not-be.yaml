document: rfc-9329
kind: normative-requirement
summary: NAT-keepalive packets (RFC 3948) SHOULD NOT be sent when using TCP encapsulation. Any implementation using TCP encapsulation MUST silently drop incoming NAT-keepalive packets and not treat them as errors.
section: "6.6"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
