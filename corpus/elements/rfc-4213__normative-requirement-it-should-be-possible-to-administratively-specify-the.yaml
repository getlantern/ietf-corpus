document: rfc-4213
kind: normative-requirement
summary: It SHOULD be possible to administratively specify the source IPv4 address of a tunnel to ensure the encapsulator uses the correct address that the decapsulator expects, particularly when multiple addresses, interfaces, or frequently-changing routes are present.
