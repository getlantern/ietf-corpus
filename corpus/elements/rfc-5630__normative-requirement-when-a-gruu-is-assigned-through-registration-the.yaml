document: rfc-5630
kind: normative-requirement
summary: When a GRUU is assigned through registration, the registrar MUST assign both a SIP GRUU and a SIPS GRUU. The version returned MUST match the scheme of the Contact header field in the REGISTER request.
section: 5.2.1
rfc2119_level: MUST
topics:
