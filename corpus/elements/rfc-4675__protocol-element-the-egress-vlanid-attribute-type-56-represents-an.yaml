document: rfc-4675
kind: protocol-element
summary: The Egress-VLANID attribute (Type 56) represents an allowed IEEE 802 egress VLANID for a port, indicating whether frames on that VLAN are tagged or untagged. Multiple instances may appear in a packet, each adding a VLAN to the allowed egress list.
