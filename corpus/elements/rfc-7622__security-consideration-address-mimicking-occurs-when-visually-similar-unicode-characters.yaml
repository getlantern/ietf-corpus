document: rfc-7622
kind: security-consideration
summary: Address mimicking occurs when visually similar Unicode characters are used to create JIDs that appear identical to a human user but are technically distinct (e.g., using Arabic numeral '1' in place of lowercase 'l'). XMPP services and clients are strongly encouraged to implement consistent policies for registration, storage, and presentation of visually similar characters, following recommendations in RFC 7564.
section: 7.3.2
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
