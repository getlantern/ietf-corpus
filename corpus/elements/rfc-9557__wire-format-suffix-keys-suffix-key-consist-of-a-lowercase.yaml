document: rfc-9557
kind: wire-format
summary: Suffix keys (suffix-key) consist of a lowercase letter or underscore followed by lowercase letters, digits, or hyphens. Suffix values (suffix-values) are one or more alphanumeric items delimited by hyphens. Time zone names follow time-zone-part = time-zone-initial *time-zone-char, with '.' and '..' explicitly excluded.
section: "4.1"
