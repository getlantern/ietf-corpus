document: rfc-8582
kind: protocol-element
summary: The OC-OLR AVP is extended to include the optional OC-Maximum-Rate AVP. When the rate algorithm is active, this field carries the per-reacting-node traffic cap and replaces (rather than supplements) the OC-Reduction-Percentage AVP.
section: "7.2"
