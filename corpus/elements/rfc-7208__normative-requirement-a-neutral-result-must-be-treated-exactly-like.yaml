document: rfc-7208
kind: normative-requirement
summary: A 'neutral' result MUST be treated exactly like the 'none' result. Treating 'neutral' more harshly would discourage ADMDs from testing SPF records, since '?all' is the implicit default for unterminated records.
section: "8.2"
rfc2119_level: MUST
topics:
