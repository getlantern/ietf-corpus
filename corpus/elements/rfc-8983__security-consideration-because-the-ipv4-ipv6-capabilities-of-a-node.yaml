document: rfc-8983
kind: security-consideration
summary: Because the IPv4/IPv6 capabilities of a node are readily observable from the traffic it generates, the new IP4_ALLOWED and IP6_ALLOWED notifications do not introduce any new security considerations beyond those already described in RFC 7296.
