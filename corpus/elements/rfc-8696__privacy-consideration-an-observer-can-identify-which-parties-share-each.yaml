document: rfc-8696
kind: privacy-consideration
summary: An observer can identify which parties share each PSK by watching the PSK key identifiers (pskid) in messages. However, this does not meaningfully worsen privacy compared to baseline CMS, because key transport always exposes RecipientIdentifier and key agreement always exposes IssuerAndSerialNumber or RecipientKeyIdentifier.
section: "8"
topics:
