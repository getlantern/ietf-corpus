document: rfc-9172
kind: normative-requirement
summary: 'Security operations in a bundle MUST be unique: the same security service MUST NOT be applied to the same security target more than once. A new security block MUST NOT be added if a preexisting security block of the same type already covers the same target.'
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - security
