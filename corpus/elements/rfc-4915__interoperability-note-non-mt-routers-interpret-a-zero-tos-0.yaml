document: rfc-4915
kind: interoperability-note
summary: Non-MT routers interpret a zero TOS 0 metric field as a valid metric and will consider links as part of the default topology even if the MT router intends them otherwise. To safely exclude links from the default topology, all routers in the area must be in DefaultExclusionCapability mode.
section: "5"
topics:
