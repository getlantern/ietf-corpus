document: rfc-6591
kind: normative-requirement
summary: For 'adsp' failure type, the DKIM-ADSP-DNS field MUST be included. For 'revoked' and 'signature' failure types, DKIM-Domain and DKIM-Selector MUST be included. For 'signature', DKIM-Canonicalized-Header SHOULD also be included.
section: "3.3"
rfc2119_level: MUST
