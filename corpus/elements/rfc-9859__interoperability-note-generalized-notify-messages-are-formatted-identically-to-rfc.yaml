document: rfc-9859
kind: interoperability-note
summary: Generalized NOTIFY messages are formatted identically to RFC 1996 NOTIFY messages, with only the qtype field changed (CDS or CSYNC instead of SOA). This reuse of the existing wire format and transport means no DNS protocol changes are required.
