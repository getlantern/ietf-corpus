document: rfc-5934
kind: normative-requirement
summary: Each trust anchor store MUST have a unique name, and each trust anchor MUST contain a unique public key. A public key MUST NOT appear more than once in a trust anchor store. If apex support is provided, the trust anchor store MUST store exactly one apex trust anchor.
section: 1.3.2
rfc2119_level: MUST
topics:
    - security
    - pkix
