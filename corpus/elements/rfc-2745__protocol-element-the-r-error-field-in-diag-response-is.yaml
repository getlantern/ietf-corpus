document: rfc-2745
kind: protocol-element
summary: 'The R-error field in DIAG_RESPONSE is a 3-bit flags field indicating per-hop error conditions: 0x00 (no error), 0x01 (No PATH state), 0x02 (packet too big), 0x04 (ROUTE object too big). Multiple bits may be set simultaneously.'
