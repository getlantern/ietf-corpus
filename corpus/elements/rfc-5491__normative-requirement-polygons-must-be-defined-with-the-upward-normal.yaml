document: rfc-5491
kind: normative-requirement
summary: Polygons MUST be defined with the upward normal pointing up, accomplished by defining vertices in a counter-clockwise direction. Points in a 3D polygon MUST all have the same altitude.
section: "5.1"
rfc2119_level: MUST
