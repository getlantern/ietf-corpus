document: rfc-8766
kind: normative-requirement
summary: A Discovery Proxy SHOULD offer a configurable option, enabled by default, to suppress Unicast DNS answers for records not useful outside the local link, including IPv4/IPv6 link-local addresses, private addresses when the client is in a different address realm, and IPv6 Unique Local Addresses.
section: 5.5.2
rfc2119_level: SHOULD
topics:
    - dns
    - zeroconf
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
