document: rfc-8745
kind: normative-requirement
summary: When protection type is set to 1:N (type=0x04), there MUST be at maximum only one protection LSP, and working LSPs MUST NOT exceed N within a PPAG; violations MUST result in PCErr Error-Type 26, Error-Value 10.
section: "4.5"
rfc2119_level: MUST
topics:
