document: rfc-3275
kind: normative-requirement
summary: XML-based canonicalization implementations MUST be provided with an XPath node-set originally formed from the document containing SignedInfo, indicating SignedInfo, its descendants, and the attribute and namespace nodes. Text-based canonicalization of SignedInfo is NOT RECOMMENDED.
section: 4.3.1
rfc2119_level: MUST
topics:
