document: rfc-7877
kind: design-rationale
summary: SPPF is intentionally agnostic to the substrate protocol, separating the data model (specified via XSD) from the protocol transport. This allows multiple substrates to carry SPPF over time while maintaining a single interoperable data model; SOAP (RFC 7878) is the required initial substrate.
