document: rfc-3840
kind: protocol-element
summary: The sip.events feature tag lists SIP event packages (RFC 3265) supported by the UA; values are taken from the IANA SIP Event types namespace registry. The sip.methods tag lists SIP methods the UA can receive (same semantics as the Allow header field).
