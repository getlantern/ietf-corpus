document: rfc-7614
kind: normative-requirement
summary: A UA MUST NOT include the 'explicitsub' or 'nosub' option tag in the Require header field of any request other than REFER, and MUST NOT include them in any SIP response other than a 200 or 421 response to a REFER request.
section: "6"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
