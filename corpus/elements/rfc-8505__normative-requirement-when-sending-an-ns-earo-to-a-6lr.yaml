document: rfc-8505
kind: normative-requirement
summary: When sending an NS(EARO) to a 6LR, a 6LN MUST use a Link-Local Address as the Source Address, whether the registered address is link-local or global. That Link-Local Address MUST be either already registered to the 6LR or the address being registered.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
