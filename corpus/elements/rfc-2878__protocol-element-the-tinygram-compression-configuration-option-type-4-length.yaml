document: rfc-2878
kind: protocol-element
summary: The Tinygram-Compression Configuration Option (Type 4, Length 3) contains an Enable/Disable field (1=enabled, 2=disabled). It permits compression of sub-minimum 802.3 frames by stripping trailing zero octets before the LAN FCS, reducing bandwidth on low-speed lines. Peers need not agree on the setting.
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
