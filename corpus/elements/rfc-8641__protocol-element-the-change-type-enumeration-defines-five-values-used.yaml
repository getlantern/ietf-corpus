document: rfc-8641
kind: protocol-element
summary: 'The change-type enumeration defines five values used in on-change subscriptions and the excluded-change leaf-list: create, delete, insert, move, and replace. It is based on YANG Patch edit operations but extended to allow ''create'' on an existing node and ''delete'' on a missing node as valid operations indicating churn.'
section: "5"
topics:
