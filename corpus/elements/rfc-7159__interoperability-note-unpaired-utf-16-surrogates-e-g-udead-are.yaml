document: rfc-7159
kind: interoperability-note
summary: Unpaired UTF-16 surrogates (e.g., '\uDEAD') are syntactically permitted by the ABNF but produce unpredictable behavior in receivers, including incorrect string length reporting or fatal runtime exceptions. These arise from libraries that truncate UTF-16 strings mid-surrogate-pair.
section: "8.2"
