document: rfc-1388
kind: design-rationale
summary: Multicast (224.0.0.9) is made configurable rather than mandatory to maintain backwards compatibility with RIP-1 deployments that do not support or listen to multicast; the default mode (RIP-1 compatibility) uses broadcast instead.
