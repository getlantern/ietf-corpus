document: rfc-5293
kind: interoperability-note
summary: If the presence or value of a header field affects how the implementation parses or decodes other message parts (e.g., Content-Type affecting body decoding), the implementation MAY ignore changes to those header fields for parsing purposes, while still requiring that direct tests see the modified values.
