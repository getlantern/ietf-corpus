document: rfc-3606
kind: protocol-element
summary: The atmSvcVpCrossConnectTable models each bi-directional SVC VP cross-connect between switched VPLs (including Soft PVPs). A point-to-point cross-connect is one entry; a point-to-multipoint with N leafs is N entries; a multipoint-to-multipoint with N parties is N(N-1)/2 entries, all sharing the same atmSvcVpCrossConnectIndex.
section: 3.1.1
topics:
