document: rfc-9574
kind: security-consideration
summary: An attack on an AR-REPLICATOR — or a change to its advertised AR type — will redirect or block BM traffic for all AR-LEAFs that selected it. If no alternative AR-REPLICATOR is available, affected AR-LEAF nodes are forced into standard ingress replication mode, degrading performance since AR-LEAFs are typically low-replication-capability devices.
section: "10"
topics:
    - mpls
    - routing
    - security
