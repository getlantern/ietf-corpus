document: rfc-2137
kind: normative-requirement
summary: Mode B updates MUST be supported as long as there is a non-expired zone key that indicates Mode B. When zone policy is in transition and multiple dynamic update KEY RRs exist with different non-zero signatory fields, strong and unique name restrictions must be enforced as long as a non-expired Mode A zone key with those bits set exists.
section: "3.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
