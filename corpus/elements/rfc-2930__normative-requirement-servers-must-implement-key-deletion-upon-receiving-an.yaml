document: rfc-2930
kind: normative-requirement
summary: 'Servers MUST implement key deletion: upon receiving an authenticated delete request for a TKEY RR by name, the server discards the key. If no key with that name exists, the server returns BADNAME. Key deletion queries MUST be authenticated.'
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
