kind: protocol-element
summary: A SCIM Event is a Security Event Token (SET) containing standard JWT top-level claims and an 'events' claim with event URI subclaims. All events use the URI prefix 'urn:ietf:params:scim:event' with sub-namespaces 'feed' (feed control) or 'prov' (provisioning).
