summary: 'The Color Extended Community Flags field is extended with a 2-bit Color-Only Type (bits 0–1): Type 0 requires specific Endpoint match, Type 1 allows specific or null Endpoint, Type 2 allows specific, null, or any Endpoint, and Type 3 is reserved and MUST be treated as Type 0.'
