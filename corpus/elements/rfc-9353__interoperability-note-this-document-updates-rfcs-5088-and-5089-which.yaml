document: rfc-9353
kind: interoperability-note
summary: This document updates RFCs 5088 and 5089, which previously stated no new sub-TLVs would be added to the PCED TLV. The addition of KEY-ID and KEY-CHAIN-NAME sub-TLVs is an explicit exception justified by the requirement to discover PCEP security support prior to establishing a PCEP session.
section: "4"
topics:
    - routing
    - security
