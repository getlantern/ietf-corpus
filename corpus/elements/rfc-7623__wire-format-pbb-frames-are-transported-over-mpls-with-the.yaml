summary: 'PBB frames are transported over MPLS with the stack: IP/MPLS Header | PBB Header | Ethernet Header | Ethernet Payload | Ethernet FCS. This is identical to classical Ethernet over MPLS except for the additional PBB header inserted between the MPLS and Ethernet layers.'
