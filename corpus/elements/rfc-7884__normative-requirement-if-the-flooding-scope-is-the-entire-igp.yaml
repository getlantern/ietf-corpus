document: rfc-7884
kind: normative-requirement
summary: If the flooding scope is the entire IGP domain, the S-BFD Discriminator TLV MUST be carried within an OSPFv2 type 11 Router Information LSA or an OSPFv3 Router Information LSA with the S1 bit clear and the S2 bit set.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
