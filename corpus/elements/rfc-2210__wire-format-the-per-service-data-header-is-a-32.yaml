document: rfc-2210
kind: wire-format
summary: 'The Per-Service Data Header is a 32-bit XDR unsigned integer: bits 31-24 are SVC_NUMBER, bit 23 is the break bit B (set if the service was unsupported or unrecognized at some network element), bits 22-16 are reserved, and bits 15-0 are SVC_LENGTH in 32-bit words not including the header word.'
