document: rfc-7260
kind: normative-requirement
summary: When the Path message arrives at the receiver, the remote end MUST establish and configure OAM entities per the OAM information in the Path message. If this is not possible, a PathErr message SHOULD be sent and neither the OAM entities nor the LSP SHOULD be established.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
