document: rfc-7711
kind: wire-format
summary: The well-known URI path pattern is '/.well-known/posh/{servicedesc}.json' where '{servicedesc}' is an application-specific service name registered in the POSH Service Names registry. An example full URI is 'https://bar.example.com/.well-known/posh/spice.json'.
