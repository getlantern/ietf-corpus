document: rfc-4776
kind: protocol-element
summary: 'The ''what'' field specifies the entity whose location is being described: value 0 = DHCP server location, value 1 = network element closest to client, value 2 = client location. Value 2 SHOULD be used; values 0 and 1 SHOULD NOT be used unless the client is known to be in close physical proximity.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
