document: rfc-8829
kind: state-machine
summary: 'The JSEP state machine defines five states: stable, have-local-offer, have-remote-offer, have-local-pranswer, and have-remote-pranswer. Transitions are triggered by setLocalDescription and setRemoteDescription calls with offer, pranswer, answer, or rollback types. A rollback returns the machine to the previous stable state.'
section: "3.2"
