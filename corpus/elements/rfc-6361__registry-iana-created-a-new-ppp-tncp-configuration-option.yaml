document: rfc-6361
kind: registry
summary: IANA created a new 'PPP TNCP Configuration Option Types' registry in the PPP-Numbers registry, using the same format as the existing 'PPP LCP Configuration Option Types' registry. All option types except 0 are Unassigned and available for future use via IETF Review. Option 0 is allocated for Vendor-Specific Options per RFC 2153.
