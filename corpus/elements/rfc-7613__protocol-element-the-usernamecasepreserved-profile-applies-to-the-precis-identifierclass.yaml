document: rfc-7613
kind: protocol-element
summary: 'The UsernameCasePreserved profile applies to the PRECIS IdentifierClass and differs from UsernameCaseMapped solely in the case-mapping rule: uppercase and titlecase characters MUST NOT be mapped to their lowercase equivalents. All other rules (width mapping, NFC, Bidi Rule) are identical.'
section: "3.3"
