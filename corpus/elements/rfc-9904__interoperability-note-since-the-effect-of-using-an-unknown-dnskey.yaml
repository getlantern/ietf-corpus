document: rfc-9904
kind: interoperability-note
summary: Since the effect of using an unknown DNSKEY algorithm is that the zone is treated as insecure (not as invalid), the gradual deprecation approach ensures resolvers continue to validate zones using older algorithms until deployment of those algorithms is sufficiently low to mark them MUST NOT.
section: "1.2"
topics:
    - dns
    - security
    - crypto
