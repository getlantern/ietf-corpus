document: rfc-6754
kind: wire-format
summary: The Metric field (64 bits) is the second tiebreaker when Preference values are equal; smaller values win. When both Preference and Metric are equal, the Neighbor Address or Interface ID (whichever identifies the RPF neighbor) is the third tiebreaker, with the larger value winning.
section: 5.5.2
topics:
    - multicast
    - routing
