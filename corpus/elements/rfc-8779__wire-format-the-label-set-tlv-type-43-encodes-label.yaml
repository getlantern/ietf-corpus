document: rfc-8779
kind: wire-format
summary: The LABEL-SET TLV (Type 43) encodes label or label range restrictions with an 8-bit Action field, reserved bits, L/O/U flag bits, a Label Type field, and variable-length Subchannel fields. The L bit indicates a suggested (loose) label set; U indicates upstream direction; O indicates old label for reoptimization.
section: 2.5.2.5
topics:
