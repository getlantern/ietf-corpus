document: rfc-8732
kind: design-rationale
summary: SHA-1 has known security concerns (RFC 6194) and MODP groups with fewer than 2048 bits are deprecated per NIST SP 800-131A. This document replaces SHA-1-based GSS key exchange methods with SHA-2 variants and larger DH groups to address these weaknesses.
section: "2"
topics:
    - crypto
    - security
