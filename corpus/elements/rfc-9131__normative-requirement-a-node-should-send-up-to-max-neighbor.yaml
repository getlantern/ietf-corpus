document: rfc-9131
kind: normative-requirement
summary: A node SHOULD send up to MAX_NEIGHBOR_ADVERTISEMENT Neighbor Advertisement messages when configuring a new global IPv6 address to notify first-hop routers. These advertisements MUST be separated by at least RetransTimer seconds.
section: 6.1.2
rfc2119_level: SHOULD
topics:
