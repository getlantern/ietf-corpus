document: rfc-2890
kind: protocol-element
summary: The Sequence Number field is a 4-octet free-running counter (modulo 2^32) inserted by the encapsulator when the Sequence Number Present bit is set. The first datagram is sent with sequence number 0. If the Key bit is also set, the sequence number is specific to the traffic flow identified by the Key field.
section: "2.2"
topics:
