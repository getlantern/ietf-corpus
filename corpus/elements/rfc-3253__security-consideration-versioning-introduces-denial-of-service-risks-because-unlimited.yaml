document: rfc-3253
kind: security-consideration
summary: Versioning introduces denial-of-service risks because unlimited version histories can consume unbounded server storage. Servers should implement policies to bound the number of versions stored per resource or version history.
section: "16.4"
topics:
    - security
    - http
