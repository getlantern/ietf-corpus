document: rfc-9013
kind: protocol-element
summary: The Tunnel Encapsulations TLV (type code 13) is a new TLV of the OSPF Router Information Opaque LSA that advertises the tunnel encapsulation types supported by a decapsulator router. It contains one or more Tunnel Sub-TLVs and is applicable to both OSPFv2 and OSPFv3.
