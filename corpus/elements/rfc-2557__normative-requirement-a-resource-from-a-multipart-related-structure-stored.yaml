document: rfc-2557
kind: normative-requirement
summary: A resource from a multipart/related structure stored in a cache MUST NOT be retrieved from that cache except by a reference from a body part in the same multipart/related structure, preventing cache-poisoning attacks using misrepresented Content-Location labels.
section: "11.2"
rfc2119_level: MUST NOT
topics:
    - security
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
