document: rfc-5162
kind: design-rationale
summary: The message sequence match data parameter allows a client to provide a small sample of sequence number-to-UID mappings. The server uses this to restrict the range for which it provides expunged message information, potentially saving substantial bandwidth when expunges have not happened or occur only toward the end of the mailbox.
section: "3.1"
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
