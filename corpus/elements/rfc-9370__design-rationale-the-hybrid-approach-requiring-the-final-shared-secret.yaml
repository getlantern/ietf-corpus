document: rfc-9370
kind: design-rationale
summary: The hybrid approach—requiring the final shared secret to depend on all component key exchanges—is chosen because no single post-quantum algorithm is yet trusted at the level of (EC)DH. The overall security is at least as strong as each individual primitive, hedging against the possibility that any one algorithm is broken.
