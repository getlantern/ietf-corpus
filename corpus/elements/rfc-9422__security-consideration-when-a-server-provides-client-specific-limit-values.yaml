document: rfc-9422
kind: security-consideration
summary: When a server provides client-specific limit values rather than general server-wide limits, it unavoidably leaks reputation information to the sender. Malicious senders can exploit this to build reputation before switching to abusive behavior.
section: "6"
topics:
