document: rfc-2487
kind: security-consideration
summary: Any protocol interactions before the TLS handshake are in the clear and may be modified by an active attacker. Therefore, clients and servers MUST discard knowledge obtained prior to the start of the TLS handshake upon its completion.
section: "7"
topics:
    - email
    - tls
    - security
