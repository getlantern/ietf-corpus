kind: wire-format
summary: Strings begin and end with quotation marks (0x22). Characters that must be escaped include quotation mark, reverse solidus, and control characters U+0000 through U+001F. Non-BMP characters are encoded as a 12-character UTF-16 surrogate pair escape sequence (e.g., `\uD834\uDD1E` for U+1D11E).
