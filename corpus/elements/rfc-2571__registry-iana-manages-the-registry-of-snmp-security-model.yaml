document: rfc-2571
kind: registry
summary: IANA manages the registry of SNMP Security Model values. Reserved value is 0; SNMPv1 is 1; SNMPv2c is 2; User-Based Security Model (USM) is 3. Values in ranges 1–255 are standards-track; 256–65535 are enterprise-specific.
section: "6.1"
