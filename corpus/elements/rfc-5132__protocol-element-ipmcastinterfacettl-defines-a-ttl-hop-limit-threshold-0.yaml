document: rfc-5132
kind: protocol-element
summary: ipMcastInterfaceTtl defines a TTL/Hop Limit threshold (0..256) for an interface; datagrams with TTL less than this value are not forwarded out the interface. A value of 0 forwards all multicast packets; a value of 256 forwards none.
section: "6"
topics:
    - multicast
    - snmp
