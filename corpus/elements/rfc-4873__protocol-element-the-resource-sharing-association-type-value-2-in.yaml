document: rfc-4873
kind: protocol-element
summary: The Resource Sharing Association Type (value 2) in the ASSOCIATION object enables make-before-break resource sharing for segment recovery LSPs where the LSP endpoint may change — extending RFC 3209 make-before-break which only worked when the LSP egress was the same.
section: 3.2.2
topics:
