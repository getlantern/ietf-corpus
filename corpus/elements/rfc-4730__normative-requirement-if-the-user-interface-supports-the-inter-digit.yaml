document: rfc-4730
kind: normative-requirement
summary: If the User Interface supports the inter-digit timer specification but not at the requested granularity, it MUST round up the requested value to the closest supported value. If it does not support specification at all, it MUST silently ignore the specification.
section: "3.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
