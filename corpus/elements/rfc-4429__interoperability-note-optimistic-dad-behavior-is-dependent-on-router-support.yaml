document: rfc-4429
kind: interoperability-note
summary: 'Optimistic DAD behavior is dependent on router support: the router must include SLLAOs in Router Advertisements and must be willing to redirect traffic on behalf of the Optimistic Node. Where a router does not behave in this way, Optimistic DAD inherently reverts to Standard DAD behavior.'
section: "4.4"
topics:
    - ip
    - v6ops
