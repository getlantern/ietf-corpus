document: rfc-5818
kind: security-consideration
summary: RFC 4204 describes how LMP messages between peers can be secured; those measures apply equally to the new messages. Although the procedures do not cause network state changes, intercepted or spoofed messages could trigger bogus management plane alerts, so use of LMP security measures from RFC 4204 is RECOMMENDED. The procedures may also serve as an additional security check to verify data channels have not been illicitly modified.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
