document: rfc-6607
kind: normative-requirement
summary: A DHCPv4 server that supports the VSS sub-option MUST copy the VSS sub-option into the outgoing Relay Agent Information option and MUST NOT copy the VSS-Control sub-option into the outgoing Relay Agent Information option. If it does not honor the sub-option for any reason, it MUST NOT echo either sub-option.
section: "7.2"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
