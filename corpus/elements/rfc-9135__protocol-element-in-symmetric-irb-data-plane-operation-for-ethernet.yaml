summary: In symmetric IRB data plane operation, for Ethernet NVO tunnels, the ingress PE sets the inner Ethernet header's source MAC to its own router MAC and destination MAC to the egress PE's router MAC (learned via EVPN Router's MAC Extended Community), using Label2 as the VNI/MPLS label.
