document: rfc-8563
kind: protocol-element
summary: bfd.SilentTail is a new state variable that, when set to 1, prevents a tail from sending any BFD Control packets to the head even when the head is soliciting traffic. Default value MUST be 1. Only pertinent when bfd.SessionType is MultipointTail.
section: 6.3.1
topics:
    - routing
    - multicast
