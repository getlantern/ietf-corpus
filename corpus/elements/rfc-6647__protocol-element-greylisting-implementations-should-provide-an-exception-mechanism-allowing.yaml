document: rfc-6647
kind: protocol-element
summary: Greylisting implementations SHOULD provide an exception mechanism allowing specific IP addresses, CIDR blocks, host names, or domain names to bypass greylisting. Known good senders that do not respond well to greylisting, or that are certain to retry, are typical candidates for exceptions.
section: "2.7"
topics:
    - email
