document: rfc-5296
kind: interoperability-note
summary: 'Lower-layer specifications require updates to support ERP: IEEE 802.1x must be revised to carry EAP messages with code values higher than 4, and RFC 4306 (IKEv2) must be updated to accept EAP code values above 4 and to support peer-initiated ERP. Other lower layers may require similar revisions.'
