document: rfc-2883
kind: protocol-element
summary: 'Network packet replication is detectable via D-SACK: a D-SACK block whose sequence space is lower than the cumulative ACK field in the same packet and does not match any previously retransmitted segment indicates the network replicated a data packet.'
section: "5.1"
topics:
