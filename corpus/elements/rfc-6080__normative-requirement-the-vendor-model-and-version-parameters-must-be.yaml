document: rfc-6080
kind: normative-requirement
summary: The 'vendor', 'model', and 'version' parameters MUST be provided in the SUBSCRIBE request for all profile types. The implementer SHOULD use their DNS domain name as the 'vendor' value to ensure global uniqueness.
section: 6.2.2
rfc2119_level: MUST
topics:
    - sip
