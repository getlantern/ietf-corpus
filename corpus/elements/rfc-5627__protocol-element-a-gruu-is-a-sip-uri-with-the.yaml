document: rfc-5627
kind: protocol-element
summary: 'A GRUU is a SIP URI with the ''gr'' URI parameter (with or without a value) that routes to a specific UA instance and is globally routable. There are two types: public GRUUs (expose the underlying AOR, constructed by adding ''gr'' with the instance ID value to the AOR) and temporary GRUUs (hide the AOR for privacy).'
section: "3.1"
topics:
    - sip
