document: rfc-5669
kind: security-consideration
summary: No security problem has been found on SEED. It is secure against differential cryptanalysis, linear cryptanalysis, and related key attacks; the best known attack is exhaustive key search. Non-reuse of counter values, critical for CTR and CCM/GCM security, is ensured by SRTP procedures from RFC 3711.
section: "6"
topics:
