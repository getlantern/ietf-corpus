document: rfc-7916
kind: design-rationale
summary: FIB resources may be scarce; activating LFAs by default on all interfaces and address families can waste resources since typically only a small number of destinations (e.g., loopbacks supporting MPLS services) require protection. Fine-grained activation granularity allows operators to protect only what matters.
section: "5"
topics:
    - routing
    - mpls
