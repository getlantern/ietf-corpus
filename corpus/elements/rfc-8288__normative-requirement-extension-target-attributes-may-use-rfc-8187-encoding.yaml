document: rfc-8288
kind: normative-requirement
summary: Extension target attributes MAY use RFC 8187 encoding (e.g., 'example' and 'example*'). When both forms are present, they SHOULD be considered the same attribute and applications SHOULD use the '*'-suffixed value after decoding.
section: 3.4.2
rfc2119_level: MAY
topics:
