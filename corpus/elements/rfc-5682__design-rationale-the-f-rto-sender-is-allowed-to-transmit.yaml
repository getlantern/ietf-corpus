document: rfc-5682
kind: design-rationale
summary: The F-RTO sender is allowed to transmit up to two new segments in step 2b because a conventional TCP sender would also transmit two segments when the first new ACK arrives after an RTO retransmission; this is consistent with TCP congestion control requirements and does not inject extra traffic.
section: "2.2"
topics:
