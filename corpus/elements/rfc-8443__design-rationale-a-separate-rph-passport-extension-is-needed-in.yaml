document: rfc-8443
kind: design-rationale
summary: A separate 'rph' PASSporT extension is needed in addition to the telephone-number attestation PASSporT because priority authorization must be separately cryptographically signed to prevent spoofing of the SIP 'Resource-Priority' header field, which could lead to misuse of scarce network resources during congestion.
section: "1"
topics:
    - sip
    - security
