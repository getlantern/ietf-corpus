document: rfc-5491
kind: wire-format
summary: Coordinate and measure numerical values are expressed using the XML Schema 'double' lexical representation; leading and trailing zeros past the decimal are not significant (e.g., '03.07500' equals '3.075'). Both gml:pos (per-vertex) and gml:posList (compact) forms are permitted for polygon coordinates.
