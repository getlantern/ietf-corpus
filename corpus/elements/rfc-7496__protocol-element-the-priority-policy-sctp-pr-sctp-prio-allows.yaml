document: rfc-7496
kind: protocol-element
summary: The Priority Policy (SCTP_PR_SCTP_PRIO) allows a sender to assign a numeric priority to a user message. A value of zero is the highest priority; larger values denote lower priorities. User messages sent reliably are considered higher priority than any Priority Policy message.
section: "3.2"
topics:
    - sctp
