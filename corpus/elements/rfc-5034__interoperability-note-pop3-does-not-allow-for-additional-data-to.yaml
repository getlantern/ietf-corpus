document: rfc-5034
kind: interoperability-note
summary: POP3 does not allow for additional data to be sent with a message indicating a successful outcome (i.e., the +OK reply), unlike some other SASL-enabled protocols. This is a known difference from the general SASL framework defined in RFC 4422 Section 3.6.
section: "4"
topics:
