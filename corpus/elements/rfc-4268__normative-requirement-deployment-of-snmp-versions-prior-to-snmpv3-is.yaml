document: rfc-4268
kind: normative-requirement
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. SNMPv3 with full cryptographic mechanisms for authentication and privacy is RECOMMENDED. Implementers SHOULD consider the SNMPv3 security framework per RFC 3410 section 8.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
