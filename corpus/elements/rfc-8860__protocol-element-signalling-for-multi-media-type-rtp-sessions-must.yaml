document: rfc-8860
kind: protocol-element
summary: 'Signalling for multi-media-type RTP sessions must ensure: (1) all participants are aware of the multi-media-type nature, (2) payload type values are globally unique across all media types in the session, (3) session-level RTCP and transport parameters are consistent, and (4) RTP/RTCP functions are reused rather than duplicated.'
section: "7"
