document: rfc-4875
kind: interoperability-note
summary: 'LSRs not supporting P2MP extensions may be included as transit LSRs via LSP stitching and LSP hierarchy (RFC 4206): a P2P LSP segment is signaled between P2MP-capable LSRs spanning the legacy stretch. Ingress, branch, and egress roles MUST be performed only by P2MP-capable LSRs.'
