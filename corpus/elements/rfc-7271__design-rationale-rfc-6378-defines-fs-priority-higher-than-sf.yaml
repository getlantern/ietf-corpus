document: rfc-7271
kind: design-rationale
summary: RFC 6378 defines FS priority higher than SF-P, which can cause an out-of-service situation when the protection path fails and PSC communication stops. This document swaps the priorities so SF-P is higher than FS, aligning MPLS-TP behavior with SDH, OTN, and Ethernet transport networks where operators expect traffic to remain protected even when a maintenance FS command is active.
section: "4.1"
topics:
    - mpls
    - routing
