document: rfc-4235
kind: protocol-element
summary: 'The package defines four Event header parameters: call-id, to-tag, from-tag, and include-session-description. To subscribe to a specific dialog, all three of call-id, to-tag, and from-tag MUST be present; to subscribe to all dialogs resulting from a single INVITE, call-id and to-tag MUST be present.'
section: "3.2"
topics:
    - sip
    - realtime
