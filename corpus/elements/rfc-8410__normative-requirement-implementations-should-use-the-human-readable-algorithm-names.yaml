document: rfc-8410
kind: normative-requirement
summary: 'Implementations SHOULD use the human-readable algorithm names defined in Section 8: ''ECDH'' for X25519/X448 when curve is unknown, ''X25519''/''X448'' when curve is known, ''EdDSA'' for signing when curve is unknown, and ''Ed25519''/''Ed448'' when curve is known.'
section: "8"
rfc2119_level: SHOULD
topics:
