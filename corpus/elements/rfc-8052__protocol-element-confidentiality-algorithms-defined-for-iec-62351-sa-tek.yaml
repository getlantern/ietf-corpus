summary: 'Confidentiality algorithms defined for IEC 62351 SA TEK: NONE (value 1), AES-CBC-128 (value 2, no authentication), AES-CBC-256 (value 3, no authentication), AES-GCM-128 (value 4, authenticated), and AES-GCM-256 (value 5, authenticated). AES-GCM modes provide authentication and are used with NONE auth algorithm.'
