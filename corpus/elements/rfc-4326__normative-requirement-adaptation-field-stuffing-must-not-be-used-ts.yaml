document: rfc-4326
kind: normative-requirement
summary: Adaptation Field stuffing MUST NOT be used; TS Packets from a ULE Encapsulator MUST be sent with an Adaptation Field Control (AFC) value of '01'. Receivers MUST discard TS Packets on ULE channels that carry other AFC values.
section: "3"
rfc2119_level: MUST
topics:
    - ip
