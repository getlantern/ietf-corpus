document: rfc-6016
kind: protocol-element
summary: Backbone admission control is achieved by establishing MPLS-TE tunnels between ingress and egress PEs (per RFC 4804), treating each tunnel as a virtual link with a capacity. Individual per-customer reservations are mapped onto aggregate tunnel reservations; packets subject to backbone admission control are distinguished by a specific MPLS EXP value.
section: "4"
