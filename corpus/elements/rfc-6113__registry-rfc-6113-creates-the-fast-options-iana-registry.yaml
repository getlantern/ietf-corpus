document: rfc-6113
kind: registry
summary: 'RFC 6113 creates the FAST Options IANA registry for FastOptions bit flags. Bits 1-15 are critical options requiring Standards Action; bits 16 and above are non-critical requiring IETF Review. Currently assigned: RESERVED (0), hide-client-names (1), kdc-follow-referrals (16).'
section: "7.3"
topics:
