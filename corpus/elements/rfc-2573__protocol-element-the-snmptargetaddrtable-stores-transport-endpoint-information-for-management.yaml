document: rfc-2573
kind: protocol-element
summary: 'The snmpTargetAddrTable stores transport endpoint information for management targets: snmpTargetAddrTDomain (transport type), snmpTargetAddrTAddress (transport address), snmpTargetAddrTimeout (expected round-trip time, default 1500 centiseconds), snmpTargetAddrRetryCount (default 3), snmpTargetAddrTagList (tag values for grouping), and snmpTargetAddrParams (pointer to snmpTargetParamsTable entry).'
