document: rfc-9279
kind: normative-requirement
summary: 'TLV validation requires: at least one TLV present, no data in the IP payload after the last TLV, and the total Extension length MUST NOT exceed the remainder of the IP payload length. If validation fails, the entire Additional Data field MUST be ignored.'
section: "5"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
