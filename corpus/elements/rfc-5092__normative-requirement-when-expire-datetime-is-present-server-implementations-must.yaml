document: rfc-5092
kind: normative-requirement
summary: When ';EXPIRE=<datetime>' is present, server implementations MUST reject the URL after that date and time. The URLAUTH component MUST be at the end of the URL.
section: 6.1.2
rfc2119_level: MUST
topics:
