document: rfc-9893
kind: interoperability-note
summary: When credit window information provided by a modem exceeds a router's queue capacity, the router SHOULD use a subset of the provided credit windows or MAY reset the session and indicate the extension is not supported; capability mismatches SHOULD be reported via network management.
section: "2.4"
topics:
    - qos
