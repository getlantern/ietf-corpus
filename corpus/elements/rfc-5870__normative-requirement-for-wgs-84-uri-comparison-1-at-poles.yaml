document: rfc-5870
kind: normative-requirement
summary: 'For WGS-84 URI comparison: (1) at poles (latitude ±90), longitude MUST be ignored; (2) a longitude of 180 degrees MUST be considered equal to -180 degrees (''date line'' case). Parameter order is not significant for URI comparison.'
section: 3.4.4
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
