document: rfc-6768
kind: protocol-element
summary: g9981PortPm1DayTable stores up to 7 historical 1-day PM buckets per port (indexed by ifIndex and g9981PortPm1DayIntervalIndex 1..7), mirroring the 15-minute structure with monitored seconds, lost cell counts, and differential delay values per day. Intervals 2..7 are OPTIONAL. Entries MUST be persistent.
