document: rfc-7655
kind: design-rationale
summary: 'G.711.0 was designed with bounded expansion: an uncompressible G.711 payload of X octets expands to at most X+1 octets, ensuring that worst-case overhead is one octet. This makes G.711.0 safe to deploy even over modem/FAX channels that resist compression.'
section: "3.2"
