document: rfc-4479
kind: design-rationale
summary: Attributes are affiliated with the component they describe, not the component that reported them. For example, if a cell phone reports that a user is in a meeting, that 'in-a-meeting' attribute belongs in the Person component because it describes the human user, not the device.
section: "3"
topics:
