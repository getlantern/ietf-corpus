document: rfc-6773
kind: protocol-element
summary: DCCP Reset Code 12 ('Encapsulated Port Reuse') is sent when a DCCP-UDP server cannot accept a new DCCP connection due to UDP 4-tuple conflict. Data byte 1 carries the DCCP Packet Type; data bytes 2 and 3 carry the encapsulated UDP source port in network order.
section: "3.8"
topics:
    - udp
    - nat
