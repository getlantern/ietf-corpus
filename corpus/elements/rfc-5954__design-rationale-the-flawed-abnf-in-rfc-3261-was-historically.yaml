document: rfc-5954
kind: design-rationale
summary: The flawed ABNF in RFC 3261 was historically derived from Appendix B of RFC 2373, which was itself erroneous. RFC 2373 has since been obsoleted by RFC 4291. This explains why the error propagated into SIP.
