document: rfc-2509
kind: wire-format
summary: 'The NCP configuration option for IP Header Compression carries: Type (1 octet, value 2), Length (>= 14 octets), IP-Compression-Protocol (2 octets, value 0x0061), TCP_SPACE (2 octets), NON_TCP_SPACE (2 octets), F_MAX_PERIOD (2 octets), F_MAX_TIME (2 octets), MAX_HEADER (2 octets), and optional suboptions. Fields are transmitted left to right.'
