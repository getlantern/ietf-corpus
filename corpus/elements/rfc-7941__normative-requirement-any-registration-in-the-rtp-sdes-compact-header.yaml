document: rfc-7941
kind: normative-requirement
summary: Any registration in the RTP SDES Compact Header Extensions sub-registry using a URI starting with 'urn:ietf:params:rtp-hdrext:sdes:' MUST also have a registered Source Description item in the 'RTP SDES item types' registry, and security and privacy considerations MUST be provided.
section: "5.2"
rfc2119_level: MUST
topics:
    - rtp
    - registry
    - realtime
