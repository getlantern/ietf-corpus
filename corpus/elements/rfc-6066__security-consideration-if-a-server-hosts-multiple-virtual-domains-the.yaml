document: rfc-6066
kind: security-consideration
summary: If a server hosts multiple virtual domains, the owners of each domain must ensure that hosting together satisfies their security needs. Implementations MUST ensure buffer overflows cannot occur on arbitrary values of the length fields in server_name.
section: "11.1"
topics:
    - tls
    - security
