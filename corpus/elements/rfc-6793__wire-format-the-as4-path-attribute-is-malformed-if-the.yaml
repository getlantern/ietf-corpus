summary: 'The AS4_PATH attribute is malformed if: the attribute length is not a multiple of two or is less than 6; the path segment length is zero or inconsistent with the attribute length; or the path segment type is not one of AS_SEQUENCE, AS_SET, AS_CONFED_SEQUENCE, or AS_CONFED_SET.'
