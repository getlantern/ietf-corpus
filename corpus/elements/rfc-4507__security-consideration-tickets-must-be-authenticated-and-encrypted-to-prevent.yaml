document: rfc-4507
kind: security-consideration
summary: Tickets MUST be authenticated and encrypted to prevent modification or eavesdropping. A TLS server MUST use strong encryption and integrity protection (e.g., keyed HMAC-SHA1 and AES-128) to prevent brute-force recovery or forgery of ticket contents.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - security
