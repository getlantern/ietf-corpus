document: rfc-6005
kind: normative-requirement
summary: When a UNI-N core node receives a Notify message with the SESSION object tunnel endpoint address set to zero, it MUST locate the Endpoint ID TLV in the CALL_ATTRIBUTES object; if the object or TLV are not present, the node MUST discard the message and MUST NOT send a Message ID Acknowledgment.
section: 2.2.1
rfc2119_level: MUST
topics:
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
