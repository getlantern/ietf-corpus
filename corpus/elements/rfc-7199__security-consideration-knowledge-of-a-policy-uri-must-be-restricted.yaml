document: rfc-7199
kind: security-consideration
summary: Knowledge of a policy URI MUST be restricted to authorized Rule Makers. When neither application-layer nor network-layer security is provided, location servers MUST reject requests using the PUT and DELETE methods.
section: "7.2"
rfc2119_level: MUST
topics:
