document: rfc-9574
kind: protocol-element
summary: 'Three roles are defined for nodes in an AR-enabled Broadcast Domain: AR-REPLICATOR (capable of replicating incoming BM traffic from an overlay tunnel to other overlay tunnels and local ACs), AR-LEAF (an NVE/PE with poor replication performance that sends all BM traffic to an AR-REPLICATOR), and RNVE (a regular NVE/PE without AR capabilities that performs standard ingress replication per RFC 8365).'
section: "1"
topics:
    - mpls
    - routing
