document: rfc-1112
kind: interoperability-note
summary: Level 0 hosts that do not support IP multicasting may receive misdelivered multicast IP datagrams on some network types. Such datagrams are identifiable by a Class D destination address and should be quietly discarded.
section: "3"
topics:
