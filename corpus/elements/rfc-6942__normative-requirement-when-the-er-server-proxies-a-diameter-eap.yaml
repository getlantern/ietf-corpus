document: rfc-6942
kind: normative-requirement
summary: When the ER server proxies a Diameter-EAP-Answer with a Session-Id corresponding to a message to which it added ERP-RK-Request and the Result-Code is DIAMETER_SUCCESS, it MUST examine, save, and remove any Key AVP with Key-Type set to rRK.
section: "5.1"
rfc2119_level: MUST
topics:
