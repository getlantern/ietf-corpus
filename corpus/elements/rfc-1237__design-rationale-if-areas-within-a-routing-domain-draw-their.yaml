document: rfc-1237
kind: design-rationale
summary: If areas within a routing domain draw their addresses from unrelated allocation authorities, no common prefix exists for summarization at routing domain boundaries. This is analogous to flat routing in the IP Internet and cannot scale to internets with tens or hundreds of thousands of routing domains.
section: "5.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
