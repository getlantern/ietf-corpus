document: rfc-5120
kind: normative-requirement
summary: The nexthops derived from the MT SPF MUST belong to the adjacencies conforming to the same MT for correct forwarding. Results of each computation SHOULD be stored in a separate RIB to avoid forwarding loops with overlapping addresses.
section: "6"
rfc2119_level: MUST
topics:
    - routing
