document: rfc-8915
kind: protocol-element
summary: The NTPv4 Server Negotiation record (type 6) carries an ASCII string that is either an IPv4 address in dotted decimal, an RFC 4291 IPv6 address (no zone identifiers), or a FQDN. If absent, the client SHALL associate with an NTP server at the same IP as the NTS-KE server.
section: 4.1.7
topics:
    - ntp
