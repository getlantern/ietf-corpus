document: rfc-1832
kind: wire-format
summary: Variable-length array (type-name identifier<m>) encodes a 4-byte unsigned element count n followed by the n elements in order. Default maximum m is 2^32-1. It is an error to encode n greater than the specified maximum.
section: "3.13"
