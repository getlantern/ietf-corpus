document: rfc-2058
kind: protocol-element
summary: The Vendor-Specific attribute (Type 26, minimum Length 7) carries a 4-octet Vendor-Id (SMI Private Enterprise Code, high octet 0) followed by vendor-defined sub-attributes. Servers that do not recognize vendor-specific data MUST ignore it; it MUST NOT affect RADIUS protocol operation.
section: "5.26"
