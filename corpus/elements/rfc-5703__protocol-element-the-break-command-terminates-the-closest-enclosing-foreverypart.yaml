document: rfc-5703
kind: protocol-element
summary: The 'break' command terminates the closest enclosing 'foreverypart' loop, or if a ':name' parameter is given, terminates the nearest enclosing loop with that matching name. It is an error to use a named break with no enclosing loop of that name.
