document: rfc-8168
kind: protocol-element
summary: A prefix-length hint is communicated by setting the 'IPv6 prefix' field of an IAPREFIX option to zero and the 'prefix-length' field to a non-zero value, encapsulated within an IA_PD option. Servers are free to ignore the hint depending on server policy.
