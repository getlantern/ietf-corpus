document: rfc-4933
kind: wire-format
summary: The postalInfo element uses a 'type' attribute with enumerated values 'int' (internationalized, content restricted to 7-bit ASCII subset of UTF-8) or 'loc' (localized, content may be unrestricted UTF-8). Up to two postalInfo elements may appear per contact.
