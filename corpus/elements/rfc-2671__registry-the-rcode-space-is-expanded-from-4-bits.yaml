document: rfc-2671
kind: registry
summary: The RCODE space is expanded from 4 bits to 12 bits by combining the original 4-bit RCODE with the 8-bit EXTENDED-RCODE in the OPT TTL field. IANA may now assign more than the original 16 RCODE values. Extended RCODE 16 is assigned to 'BADVERS'.
