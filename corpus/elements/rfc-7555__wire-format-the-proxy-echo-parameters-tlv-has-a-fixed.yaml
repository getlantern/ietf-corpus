document: rfc-7555
kind: wire-format
summary: 'The Proxy Echo Parameters TLV has a fixed 12-octet header: Address Type (1 octet), Reply Mode (1 octet), Proxy Flags (2 octets), TTL (1 octet), Requested DSCP (1 octet), Source UDP Port (2 octets), Global Flags (2 octets), MPLS Payload Size (2 octets). This is followed by a variable-length Destination IP Address (4 octets for IPv4, 16 for IPv6) and optional sub-TLVs.'
section: "5.1"
topics:
    - mpls
    - routing
