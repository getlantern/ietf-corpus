document: rfc-8311
kind: security-consideration
summary: As a process memo relaxing experimentation restrictions, RFC 8311 itself introduces no new protocol security risks. Security considerations for specific experiments are deferred to their respective Experimental RFCs, and IETF/IESG review of those documents provides assurance that Internet congestion control is not broken.
section: "8"
topics:
