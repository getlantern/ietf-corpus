document: rfc-9259
kind: interoperability-note
summary: Ping to an End.X SID only validates that the SID is locally programmed at the target node and does not validate switching to the correct outgoing interface. To exercise the full behavior of a SID, the OAM probe should be constructed similarly to a data packet exercising that SID behavior.
section: "2.2"
topics:
    - routing
    - ip
