document: rfc-3312
kind: design-rationale
summary: A UA that supports QoS but does not intend to use it still includes desired-status lines with the 'none' strength-tag. This allows the answerer to upgrade the precondition to 'optional' or 'mandatory' without requiring a new offer/answer exchange.
section: 5.1.1
topics:
