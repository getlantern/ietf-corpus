document: rfc-7529
kind: interoperability-note
summary: When an iTIP message with an unsupported RSCALE calendar system is received, the receiving agent SHOULD reject it and return REQUEST-STATUS 3.1. If the message is accepted and treated as non-recurring, REQUEST-STATUS 2.8 or 2.10 SHOULD be returned.
section: "7"
extracted_by: claude-sonnet-4-6
