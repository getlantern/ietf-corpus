document: rfc-2380
kind: design-rationale
summary: When a QoS downgrade replacement VC fails, the larger-than-needed old allocation is intentionally left in place because it maximizes service delivery to the user and conforms to RSVP error handling rules in RFC 2205 sections 2.5, 3.1.8, and 3.11.2.
