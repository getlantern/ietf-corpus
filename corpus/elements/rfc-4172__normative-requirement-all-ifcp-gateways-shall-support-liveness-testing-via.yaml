document: rfc-4172
kind: normative-requirement
summary: All iFCP gateways SHALL support liveness testing via the LTEST message. An iFCP session SHALL be terminated if LTEST message contents are incorrect or an LTEST message is not received within twice the specified interval.
section: 5.2.2.4
rfc2119_level: REQUIRED
topics:
    - ip
    - tcp
