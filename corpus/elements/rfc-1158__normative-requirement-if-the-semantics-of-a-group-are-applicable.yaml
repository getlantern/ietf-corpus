document: rfc-1158
kind: normative-requirement
summary: If the semantics of a group are applicable to an implementation, then it must implement all objects in that group. For example, an implementation must implement the EGP group if and only if it implements EGP.
section: "4.1"
rfc2119_level: MUST
topics:
