document: rfc-6388
kind: normative-requirement
summary: If a FEC TLV contains a P2MP FEC Element, the P2MP FEC Element MUST be the only FEC Element in the FEC TLV. The same constraint applies to MP2MP FEC Elements.
section: "2.2"
rfc2119_level: MUST
