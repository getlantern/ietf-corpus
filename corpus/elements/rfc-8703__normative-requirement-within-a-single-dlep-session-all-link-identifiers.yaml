document: rfc-8703
kind: normative-requirement
summary: Within a single DLEP session, all Link Identifiers MUST be unique per MAC address, making a Layer 3 DLEP Destination uniquely identified by the pair {MAC Address, Link Identifier}. Link Identifiers MUST NOT be reused within the lifetime of a single DLEP peer-to-peer session.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
