document: rfc-7655
kind: registry
summary: 'This document registers the media type audio/G711-0 in the IANA ''Media Types'' registry. Required parameters: clock rate and complaw (values ''al'' or ''mu''). Optional parameters: channels, ptime, maxptime. Magic numbers for storage files: ''#!G7110A\n'' (A-law) and ''#!G7110M\n'' (mu-law).'
