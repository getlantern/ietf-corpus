document: rfc-2741
kind: protocol-element
summary: The agentx-IndexAllocate-PDU lets a subagent request index value allocation from the master agent before registering a table row. Flags NEW_INDEX and ANY_INDEX control whether a new unique value or any available value is requested. agentx-IndexDeallocate-PDU releases previously allocated values.
section: 6.2.12
topics:
