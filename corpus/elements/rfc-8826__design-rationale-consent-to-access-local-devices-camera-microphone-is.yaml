document: rfc-8826
kind: design-rationale
summary: Consent to access local devices (camera/microphone) is orthogonal to consent to transmit network traffic. Device access consent protects user privacy from malicious sites; communications consent prevents the browser being used to attack its local network. Both must be enforced independently — WebSockets requires consent even without camera/microphone access.
section: "4.1"
topics:
    - webrtc
    - security
    - privacy
