document: rfc-4380
kind: security-consideration
summary: Teredo punches a hole in the NAT allowing incoming UDP packets from any sender who knows the mapped address and port. Cone NAT clients are directly reachable; restricted/port-restricted NAT clients require a prior bubble exchange, limiting unsolicited exposure but not eliminating it.
section: "7.1"
topics:
