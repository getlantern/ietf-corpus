document: rfc-6735
kind: security-consideration
summary: Integrity mechanisms SHOULD be used when mapping values from one protocol into Diameter priority AVPs. Examples include S/MIME with the SIP Resource Priority Header or an INTEGRITY object within a POLICY_DATA object in RSVP. Changes in priority values may result in allocation of additional or fewer resources.
section: "6"
rfc2119_level: SHOULD
topics:
    - diameter
    - security
    - qos
