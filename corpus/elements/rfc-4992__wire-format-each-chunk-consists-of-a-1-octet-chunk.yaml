document: rfc-4992
kind: wire-format
summary: 'Each chunk consists of a 1-octet chunk descriptor, a 2-octet chunk data length, and variable-length chunk data. The chunk descriptor encodes: bit 0 = last chunk (LC), bit 1 = data complete (DC), bits 2–4 = reserved (MUST be 0), bits 5–7 = chunk type (CT).'
