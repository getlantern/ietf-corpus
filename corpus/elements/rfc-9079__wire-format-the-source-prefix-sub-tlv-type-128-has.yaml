document: rfc-9079
kind: wire-format
summary: The Source Prefix sub-TLV (Type=128) has a 1-octet Type field, 1-octet Length field, 1-octet Source Plen, and a variable-length Source Prefix field of ceil(Source Plen/8) octets. The body length is normally 1+ceil(Source Plen/8) octets.
