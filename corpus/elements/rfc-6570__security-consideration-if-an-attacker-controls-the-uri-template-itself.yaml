document: rfc-6570
kind: security-consideration
summary: If an attacker controls the URI Template itself or controls variable values used with an expression type that allows reserved characters ("+ " or "#"), unanticipated URIs may be crafted. Security depends on who provides the template and values, in what execution context expansion occurs, and where the resulting URIs are used.
section: "4"
topics:
