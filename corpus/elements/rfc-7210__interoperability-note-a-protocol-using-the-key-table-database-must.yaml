document: rfc-7210
kind: interoperability-note
summary: 'A protocol using the key table database must specify nine items: how to map table rows to outgoing messages, how to locate peer identifier and LocalKeyName in incoming messages, how to verify messages, form and validation rules for LocalKeyName/PeerKeyName, form and validation rules for Peers, supported algorithms and KDFs, form of ProtocolSpecificInfo, canonicalization rules, and whether Interfaces support is required.'
