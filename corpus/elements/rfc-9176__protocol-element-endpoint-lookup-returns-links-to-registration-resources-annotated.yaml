document: rfc-9176
kind: protocol-element
summary: Endpoint lookup returns links to registration resources annotated with ep, d (if present), base, and rt=core.rd-ep. Lifetime (lt) is not reported. Clients SHOULD NOT attempt to dereference or manipulate registration resource URIs obtained via endpoint lookup.
section: "6.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
