document: rfc-1784
kind: normative-requirement
summary: If the server accepts the timeout option, it sends an Option Acknowledgment (OACK) to the client, and the timeout value in the OACK must match the value specified by the client.
section: Timeout Interval Option Specification
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
