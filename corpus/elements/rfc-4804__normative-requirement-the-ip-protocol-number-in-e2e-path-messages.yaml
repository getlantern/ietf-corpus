document: rfc-4804
kind: normative-requirement
summary: The IP Protocol number in E2E Path messages MUST be left as 'RSVP' and MUST NOT be changed to 'RSVP-E2E-IGNORE', because the absence of Router Alert already hides the message from transit LSRs.
section: "4.2"
rfc2119_level: MUST
topics:
