document: rfc-3851
kind: protocol-element
summary: The smime-type parameter on application/pkcs7-mime indicates the security operation (enveloped-data, signed-data, certs-only, compressed-data) without requiring ASN.1 decoding, serving as a hint for mail clients to display 'signed' or 'encrypted' status.
