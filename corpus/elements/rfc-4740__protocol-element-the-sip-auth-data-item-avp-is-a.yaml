summary: 'The SIP-Auth-Data-Item AVP is a grouped AVP carrying authentication material for a single exchange: SIP-Authentication-Scheme (Enumerated), SIP-Item-Number (Unsigned32), SIP-Authenticate (OctetString), SIP-Authorization (OctetString), SIP-Authentication-Info (OctetString), and HTTP Digest sub-AVPs including Digest-HA1.'
