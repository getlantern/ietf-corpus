document: rfc-4918
kind: security-consideration
summary: Write access and other privileges MUST be enforced through normal authentication mechanisms, not based on lock token obscurity. Having a lock does not confer full privilege; authentication checks MUST precede conditional header checks.
section: "20.1"
topics:
