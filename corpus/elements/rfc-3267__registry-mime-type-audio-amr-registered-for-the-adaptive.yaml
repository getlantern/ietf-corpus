summary: MIME type audio/AMR registered for the Adaptive Multi-Rate codec, covering both RTP real-time transfer and storage file format. Optional RTP parameters include octet-align, mode-set, mode-change-period, mode-change-neighbor, maxptime, ptime, channels, interleaving, and robust-sorting.
