document: rfc-3868
kind: state-machine
summary: An Application Server (AS) transitions among AS-DOWN, AS-INACTIVE, AS-ACTIVE, and AS-PENDING states based on the aggregate state of its constituent ASPs. AS-PENDING is entered when the last active ASP becomes unavailable, causing the SGP to buffer messages for timer T(r) until an ASP becomes available or T(r) expires.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
