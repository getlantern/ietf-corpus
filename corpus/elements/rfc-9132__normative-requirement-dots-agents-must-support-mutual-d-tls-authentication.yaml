document: rfc-9132
kind: normative-requirement
summary: DOTS agents MUST support mutual (D)TLS authentication. The DOTS client MUST authenticate itself to the DOTS server; the server MUST reject unauthenticated clients. The DOTS server MAY derive the client identity from the client certificate per RFC 7589 Section 7.
section: "8"
rfc2119_level: MUST
topics:
    - security
    - tls
    - pkix
