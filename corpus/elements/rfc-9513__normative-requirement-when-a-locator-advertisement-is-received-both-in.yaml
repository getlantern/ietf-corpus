document: rfc-9513
kind: normative-requirement
summary: When a locator advertisement is received both in a prefix reachability advertisement (Legacy or Extended LSA) and in an SRv6 Locator TLV, the prefix reachability advertisement MUST be preferred for installing forwarding plane entries to prevent inconsistent forwarding between SRv6-capable and SRv6-incapable routers.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - ip
