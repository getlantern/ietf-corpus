document: rfc-4122
kind: protocol-element
summary: For version 1 UUIDs, the timestamp is a 60-bit count of 100-nanosecond intervals since 00:00:00.00, 15 October 1582 (the Gregorian calendar reform date). For versions 3 and 5 the timestamp bits are derived from a cryptographic hash of a name; for version 4 they are randomly generated.
section: 4.1.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
