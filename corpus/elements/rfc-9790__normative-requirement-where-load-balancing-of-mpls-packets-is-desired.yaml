document: rfc-9790
kind: normative-requirement
summary: Where load balancing of MPLS packets is desired, it is RECOMMENDED that the load-balancing mechanism use the value of a dedicated label, for example an Entropy Label (RFC 6790) or a FAT Pseudowire Label (RFC 6391), rather than inspecting the PFN.
section: 2.1.1.1
rfc2119_level: RECOMMENDED
topics:
    - mpls
