document: rfc-2018
kind: design-rationale
summary: 'RFC 2018 modifies RFC 1072''s SACK proposal in exactly two ways: (1) the first SACK block always reports the most recently received data, reducing the need for long SACK options; and (2) full 32-bit sequence numbers are carried instead of offsets, simplifying implementation and improving robustness.'
