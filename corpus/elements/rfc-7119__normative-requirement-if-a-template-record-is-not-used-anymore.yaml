document: rfc-7119
kind: normative-requirement
summary: If a Template Record is not used anymore in an outgoing Transport Session, it MUST be withdrawn with an IPFIX Template Withdrawal Message on that specific outgoing Transport Session, and its entry MUST be removed from the Template Mapping.
section: "4.1"
rfc2119_level: MUST
topics:
