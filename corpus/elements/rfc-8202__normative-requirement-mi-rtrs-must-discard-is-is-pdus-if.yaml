document: rfc-8202
kind: normative-requirement
summary: 'MI-RTRs MUST discard IS-IS PDUs if: (a) the destination multicast address is AllL1IS, AllL2IS, or AllIS and the PDU contains an IID-TLV, or (b) the destination is AllL1MI-ISs or AllL2MI-ISs and the PDU contains an IID-TLV with IID=0 or has no IID-TLV.'
section: 3.6.1
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
