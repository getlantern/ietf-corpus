document: rfc-4366
kind: normative-requirement
summary: The OCSP nonce (id-pkix-ocsp-nonce) MUST be a DER-encoded OCTET STRING encapsulated as another OCTET STRING. A zero-length request_extensions value means no extensions, not a zero-length ASN.1 SEQUENCE.
section: "3.6"
rfc2119_level: MUST
topics:
    - tls
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
