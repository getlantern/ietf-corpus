document: rfc-9842
kind: normative-requirement
summary: If the 'id' value is present and has nonzero length, the client MUST echo it in a 'Dictionary-ID' request header when sending 'Available-Dictionary' for the same dictionary. The server identifier MUST NOT be relied upon to guarantee dictionary contents; the dictionary hash MUST be validated before use.
section: 2.1.3
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
