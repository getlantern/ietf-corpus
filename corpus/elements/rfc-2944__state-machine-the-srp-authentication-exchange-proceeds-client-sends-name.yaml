document: rfc-2944
kind: state-machine
summary: 'The SRP authentication exchange proceeds: client sends NAME then AUTH, server replies PARAMS, client sends EXP, server replies CHALLENGE, client sends RESPONSE, server replies ACCEPT or REJECT. The CHALLENGE message may be computed before but not sent before EXP.'
