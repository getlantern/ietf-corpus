document: rfc-9479
kind: design-rationale
summary: The Application-Specific SRLG TLV (Type 238) uses sub-TLVs for link identifiers rather than fixed fields, allowing it to support IPv4, IPv6, and unnumbered links in a single TLV unlike legacy TLVs 138 and 139, which each support only a subset of link identifier types.
section: "4.3"
topics:
    - routing
