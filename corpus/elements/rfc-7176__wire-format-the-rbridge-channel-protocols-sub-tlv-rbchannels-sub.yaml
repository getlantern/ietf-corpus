document: rfc-7176
kind: wire-format
summary: The RBridge Channel Protocols sub-TLV (RBCHANNELS, sub-TLV type 16) carries zero or more byte-aligned bit vectors; each bit vector begins with a 7-bit BVL (byte count) and 9-bit BVO (offset) header followed by BVL bytes of channel protocol support bits. A one bit indicates support for the corresponding RBridge Channel protocol.
section: 2.3.9
topics:
    - routing
