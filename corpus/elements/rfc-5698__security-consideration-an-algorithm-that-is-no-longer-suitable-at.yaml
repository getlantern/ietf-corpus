document: rfc-5698
kind: security-consideration
summary: An algorithm that is no longer suitable at a time of interest does not necessarily mean the entire data structure is insecure. For example, a 1024-bit RSA signature timestamped with a 2048-bit RSA key before 1024-bit RSA was broken may still be valid if 2048-bit RSA remains suitable.
section: "7"
topics:
