document: rfc-6213
kind: security-consideration
summary: Inappropriate manipulation of the BFD-Enabled TLV could prevent IS-IS adjacency formation or cause failure to detect bidirectional forwarding failures, both of which are forms of denial of service. However, an attacker capable of manipulating this TLV already has the capability to disrupt IS-IS routing by other means. The introduction of this TLV has no impact on the use or non-use of IS-IS or BFD authentication.
section: "7"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
