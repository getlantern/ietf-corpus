document: rfc-9560
kind: normative-requirement
summary: Once the OP is known, the RP MUST form an Authentication Request per Section 3 of OIDCC. The OAuth 2.0 Implicit Flow is considered insecure and MUST NOT be used; the authorization code flow (response_type=code) is the assumed path.
section: 3.1.4.2
rfc2119_level: MUST NOT
topics:
    - oauth
    - security
