summary: 'Seven TLS cipher suites are defined using ChaCha20-Poly1305: TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256 (0xCC,0xA8), TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256 (0xCC,0xA9), TLS_DHE_RSA_WITH_CHACHA20_POLY1305_SHA256 (0xCC,0xAA), TLS_PSK_WITH_CHACHA20_POLY1305_SHA256 (0xCC,0xAB), TLS_ECDHE_PSK_WITH_CHACHA20_POLY1305_SHA256 (0xCC,0xAC), TLS_DHE_PSK_WITH_CHACHA20_POLY1305_SHA256 (0xCC,0xAD), and TLS_RSA_PSK_WITH_CHACHA20_POLY1305_SHA256 (0xCC,0xAE). All use SHA-256 as the PRF hash function.'
