document: rfc-2243
kind: normative-requirement
summary: A generator MUST be able to generate standard OTP responses, MUST use standard responses unless an extended challenge has been received for the particular server AND seed, MUST generate the type field in lower case, and MUST NOT send a response type the server has not indicated support for.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
