document: rfc-5049
kind: normative-requirement
summary: A SIP/SigComp application SHOULD use a UUID URN (RFC 4122) as its SIP/SigComp identifier due to difficulties in equality comparisons for other URN kinds. If another URN scheme is used, it MUST be selected so that no other SIP/SigComp application would choose the same URN value.
section: "9.1"
rfc2119_level: SHOULD
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
