document: rfc-7582
kind: normative-requirement
summary: In Flat Partitioned I-PMSI reception, if a (C-*,C-G-BIDIR) packet is received on a P-tunnel other than the one expected from the distinguished PE's I-PMSI A-D route, the packet MUST be discarded.
