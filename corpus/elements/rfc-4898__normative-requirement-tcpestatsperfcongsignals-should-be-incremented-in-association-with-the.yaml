document: rfc-4898
kind: normative-requirement
summary: tcpEStatsPerfCongSignals SHOULD be incremented in association with the Fast Retransmit algorithm to minimize spurious congestion indications due to out-of-order segments. Retransmission timeouts SHOULD also be included.
section: "4"
rfc2119_level: SHOULD
