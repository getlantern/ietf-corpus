document: rfc-3392
kind: normative-requirement
summary: If a BGP speaker receives a NOTIFICATION with Error Subcode set to Unsupported Optional Parameter in response to an OPEN containing the Capabilities Optional Parameter, it SHOULD re-attempt the BGP connection without including the Capabilities Optional Parameter.
section: "3"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
