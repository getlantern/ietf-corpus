document: rfc-1271
kind: design-rationale
summary: The OwnerString textual convention is defined to facilitate resource sharing among multiple management stations by labeling each function with the identity of its initiator. It is explicitly noted that OwnerString affords resource contention resolution only among cooperating managers and realizes no access control against uncooperative parties.
