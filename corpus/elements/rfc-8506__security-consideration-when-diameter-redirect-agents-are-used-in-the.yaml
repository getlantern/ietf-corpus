document: rfc-8506
kind: security-consideration
summary: When Diameter redirect agents are used in the credit-control path, a malicious redirect agent could direct the credit-control client to a rogue server; implementations SHOULD use TLS/DTLS or IPsec to authenticate and protect connections to redirect agents and the servers they recommend.
section: "14.1"
topics:
    - diameter
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
