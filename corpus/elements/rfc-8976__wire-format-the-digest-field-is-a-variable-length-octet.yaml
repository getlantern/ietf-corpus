document: rfc-8976
kind: wire-format
summary: The Digest field is a variable-length octet sequence whose length is derived from the RDATA size minus the fixed 6-octet prefix. It MUST NOT be shorter than 12 octets (96 bits of equivalent strength minimum for future algorithms).
