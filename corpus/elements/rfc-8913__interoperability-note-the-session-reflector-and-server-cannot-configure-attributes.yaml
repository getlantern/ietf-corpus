document: rfc-8913
kind: interoperability-note
summary: The Session-Reflector and Server cannot configure attributes on a per-session or per-connection basis because they have no foreknowledge of incoming sessions. All configurable parameters must be set at the device level and apply uniformly to all incoming connections or sessions.
section: "3.4"
topics:
    - measurement
    - yang
