document: rfc-2455
kind: security-consideration
summary: Section 5 addresses security for the APPN MIB. The MIB includes read-write objects—appnPortCommand and appnLsCommand (activate, deactivate, recycle) and appnNodeNnSafeStoreFreq—that can disrupt network operations; unauthorized SET access to these objects must be controlled via SNMP access control mechanisms.
section: "5"
topics:
    - snmp
    - security
