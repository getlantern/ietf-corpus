document: rfc-2024
kind: interoperability-note
summary: The DLSw MIB uses ifIndex (from IF-MIB / RFC 1573) as the index into dlswIfTable and as a reference from circuit entries (dlswCircuitS1Index) and SDLC link station entries (dlswSdlcLsTable). Implementations must also support the Interface Group MIB.
section: "2.1"
