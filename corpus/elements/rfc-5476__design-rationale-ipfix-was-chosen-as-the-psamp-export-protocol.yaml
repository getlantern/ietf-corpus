document: rfc-5476
kind: design-rationale
summary: IPFIX was chosen as the PSAMP export protocol because the IPFIX and PSAMP architectures match very well and the means provided by IPFIX are sufficient for PSAMP export. PSAMP export can be viewed as a special IPFIX Flow Record containing information about a single packet rather than aggregated flows.
