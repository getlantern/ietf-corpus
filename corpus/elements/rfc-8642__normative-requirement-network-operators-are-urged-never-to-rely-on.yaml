document: rfc-8642
kind: normative-requirement
summary: Network operators are urged never to rely on any implicit understanding of a neighbor ASN's BGP community handling; before announcing prefixes with NO_EXPORT or any other community to a neighbor, operators should confirm with that neighbor how the community will be treated.
section: "6"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
