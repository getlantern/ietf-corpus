document: rfc-7286
kind: design-rationale
summary: PTR lookup on an interface's IP address to determine the DNS domain name is not recommended for resource-consumer-initiated ALTO server discovery due to the widespread use of NAT, which would yield an unroutable or incorrect domain name.
section: "2"
topics:
