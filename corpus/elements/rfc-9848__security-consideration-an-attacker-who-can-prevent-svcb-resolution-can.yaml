document: rfc-9848
kind: security-consideration
summary: An attacker who can prevent SVCB resolution can deny clients any associated security benefits, including ECH. Network intermediaries can prevent resolution even when DNSSEC and secure transport are used; clients SHOULD abandon the connection when such a downgrade attack is detected.
section: "8"
topics:
