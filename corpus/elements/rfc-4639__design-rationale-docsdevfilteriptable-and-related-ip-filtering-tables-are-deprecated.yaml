document: rfc-4639
kind: design-rationale
summary: docsDevFilterIpTable and related IP filtering tables are deprecated in favor of the Data Path, Classifier, and Action tables from the Differentiated Services MIB (RFC 3289), in order to support IPv6 filtering and DSCP marking, which the legacy IPv4-only tables could not accommodate.
section: 3.3.3
topics:
