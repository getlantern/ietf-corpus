document: rfc-4087
kind: security-consideration
summary: SNMP versions prior to SNMPv3 lack adequate security. Even on an IPsec-secured network, there is no per-principal access control for MIB objects without SNMPv3. Operators must configure SNMP entities to restrict GET/SET access to authorized principals only.
section: "6"
topics:
    - snmp
    - security
