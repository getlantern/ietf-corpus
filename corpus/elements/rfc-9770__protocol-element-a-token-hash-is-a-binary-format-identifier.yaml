document: rfc-9770
kind: protocol-element
summary: A token hash is a binary-format identifier for an access token, computed as a named-information hash (per RFC 6920) over the HASH_INPUT value. The first byte of the token hash embeds the identifier of the hash function used. Token hashes have no relation to the 'cti' or 'jti' claims.
section: "4"
topics:
