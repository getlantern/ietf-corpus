document: rfc-7306
kind: registry
summary: 'A new ''RDMAP Message Atomic Operation Subcodes'' registry is created under ''Remote Direct Data Placement (RDDP)''. Values are 4-bit codes assigned by Standards Action. Initial contents: 0x0 (FetchAdd), 0x1 (Reserved), 0x2 (CmpSwap). New codes should be assigned sequentially to support hardware implementations.'
