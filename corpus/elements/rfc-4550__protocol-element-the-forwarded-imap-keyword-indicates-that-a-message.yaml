document: rfc-4550
kind: protocol-element
summary: The $Forwarded IMAP keyword indicates that a message was resent to another email address, embedded or attached to a new message. Mail clients set this keyword upon successful forwarding, typically to display a different icon for forwarded messages.
section: "2.8"
