summary: 'Additional error codes for PATCH/iPATCH beyond FETCH errors: 4.04 (Not Found) if PATCH cannot apply to a non-existent resource, 4.12 (Precondition Failed) for failed If-Match/If-None-Match conditions, 4.09 (Conflict) for modifications causing inconsistent resource state, and 5.03 (Service Unavailable) for concurrent modification conflicts.'
