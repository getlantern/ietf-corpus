summary: 'SHA3-224, SHA3-256, SHA3-384, and SHA3-512 are assigned OIDs under the NIST hashAlgs arc: id-sha3-224 { hashAlgs 7 }, id-sha3-256 { hashAlgs 8 }, id-sha3-384 { hashAlgs 9 }, id-sha3-512 { hashAlgs 10 }. These identifiers are used in digestAlgorithms, digestAlgorithm, and related CMS fields.'
