document: rfc-5763
kind: security-consideration
summary: When RFC 4474 is used, the channel between the UA and the authentication service MUST be secured and the authentication service MUST verify the UA's identity. An attacker controlling the authentication service can impersonate the UA; this is an intentional feature of SIP Identity, as the auth service owns the namespace.
section: "8.6"
topics:
    - security
    - sip
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
