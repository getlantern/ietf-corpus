document: rfc-5116
kind: wire-format
summary: The recommended nonce format consists of a Fixed field followed by a Counter field (Figure 1). The Counter field forms a monotonically increasing unsigned integer sequence in network byte order. Implementations SHOULD support 12-octet nonces with a 4-octet Counter field.
section: "3.2"
topics:
    - crypto
