document: rfc-8275
kind: normative-requirement
summary: The mode_umask attribute is only meaningful for object-creation operations (CREATE and OPEN). In any other operation that takes fattr4 arguments, the server MUST reject the attribute with NFS4ERR_INVAL.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
