document: rfc-4037
kind: protocol-element
summary: 'Premature adapted dataflow termination: the callout server sends Want Stop Sending Data (DWSS); the OPES processor replies with Stop Sending Data (DSS), after which the server terminates adapted dataflow with AME 206. The processor then reconstructs the full application message from original data.'
section: "8.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
