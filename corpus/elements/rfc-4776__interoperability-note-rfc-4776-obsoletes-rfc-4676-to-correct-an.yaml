document: rfc-4776
kind: interoperability-note
summary: RFC 4776 obsoletes RFC 4676 to correct an error in the assignment of the numeric value of the DHCPv6 option-code for the civic location option. Implementations of RFC 4676 that used the erroneous code must be updated to use option code 36.
section: RFC Editor Note
extracted_by: claude-sonnet-4-6
