document: rfc-9251
kind: normative-requirement
summary: All-Active multihoming PEs for a given ES MUST support IGMP synchronization procedures (Membership Report Synch and Leave Synch routes) if they need to perform IGMP Proxy for hosts connected to that ES, because IGMP messages and their corresponding Leaves can arrive at different PEs in the redundancy group.
section: "6"
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
