document: rfc-4874
kind: protocol-element
summary: The Explicit Exclusion Route Subobject (EXRS) is a new ERO subobject (Type 33) that encodes exclusions scoped to the path segment between two adjacent abstract nodes in the ERO. An EXRS contains one or more nested EXRS subobjects with the same format as XRO subobjects, and MUST NOT appear inside an XRO.
section: "4.1"
topics:
    - mpls
    - routing
