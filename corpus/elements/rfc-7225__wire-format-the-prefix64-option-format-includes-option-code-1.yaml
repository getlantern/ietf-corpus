document: rfc-7225
kind: wire-format
summary: 'The PREFIX64 option format includes: Option Code (1 octet, value 129), Reserved (1 octet), Option Length (2 octets), Prefix64 Length (2 octets, allowed values 4/5/6/7/8/12 per RFC 6052), Prefix64 (variable), Suffix (variable, length = 12 - Prefix64 Length octets), and an optional IPv4 Prefix List.'
