document: rfc-3111
kind: protocol-element
summary: The multicast group-id for a given service type is computed by hashing the UTF-8 service type string using a polynomial hash (h = h*33 + byte), then taking the low 10 bits (range 0–1023) as the offset into FF0X::1:1000.
section: "4.1"
topics:
