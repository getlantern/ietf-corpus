document: rfc-8845
kind: protocol-element
summary: An Encoding Group is a set of one or more Individual Encodings plus a maximum combined bitrate for the group. It allows a Provider to signal bandwidth constraints across multiple Capture Encodings. Each Capture Encoding bitrate MUST NOT exceed its Individual Encoding maximum, and the sum of all Capture Encoding bitrates MUST NOT exceed the Encoding Group maximum.
section: "9.2"
topics:
    - realtime
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
