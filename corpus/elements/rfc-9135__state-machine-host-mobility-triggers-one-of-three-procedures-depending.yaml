document: rfc-9135
kind: state-machine
summary: 'Host mobility triggers one of three procedures depending on TS behavior: (1) TS sends gratuitous ARP to target NVE triggering MAC Mobility per RFC 7432 with incremented sequence number; (2) TS sends data without ARP, causing data-plane MAC learning and subsequent ARP probing; (3) silent TS detected only by age-out timer on source NVE triggering ARP probe.'
section: "7"
topics:
