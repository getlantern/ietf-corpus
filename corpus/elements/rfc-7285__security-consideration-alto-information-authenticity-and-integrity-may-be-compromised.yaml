document: rfc-7285
kind: security-consideration
summary: ALTO information authenticity and integrity may be compromised by an on-path attacker modifying responses. The primary protection is HTTPS/TLS; however, cached or redistributed ALTO information is not protected by the original TLS session, and future mechanisms such as digital signatures for cached content are identified as needed work.
section: "15.1"
topics:
    - security
