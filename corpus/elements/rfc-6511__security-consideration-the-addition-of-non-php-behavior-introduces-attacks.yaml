document: rfc-6511
kind: security-consideration
summary: The addition of non-PHP behavior introduces attacks on the label assigned by the egress node, since a change in the egress label value reported in the RRO can cause the LSP to be torn down. Additional security measures for protecting egress-assigned labels are required, referencing RFC 5920, RFC 2205, RFC 3209, RFC 3473, RFC 5420, and RFC 4875.
section: "3"
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
