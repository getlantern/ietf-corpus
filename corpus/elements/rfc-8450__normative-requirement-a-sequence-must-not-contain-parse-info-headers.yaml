document: rfc-8450
kind: normative-requirement
summary: A Sequence MUST NOT contain Parse Info Headers with Parse Codes other than 0x00, 0x10, 0x20, 0x30, or 0xEC. Every HQ Picture Fragment MUST be no longer than 65535 bytes and MUST use Slice Prefix Bytes and Slice Size Scaler values no greater than 65535.
section: "4.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
