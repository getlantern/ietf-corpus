document: rfc-9196
kind: normative-requirement
summary: For the runtime use case, capabilities SHOULD be available via NETCONF or RESTCONF from the live server during runtime. Implementations that support changing capabilities at runtime SHOULD support on-change notifications about the system-capabilities container.
section: "2"
rfc2119_level: SHOULD
topics:
    - yang
    - netconf
