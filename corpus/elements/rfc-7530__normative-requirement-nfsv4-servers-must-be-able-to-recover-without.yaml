document: rfc-7530
kind: normative-requirement
summary: NFSv4 servers must be able to recover without data loss from multiple power failures, OS failures, and hardware failures of non-storage components. Stable storage must represent a genuine commitment of data, e.g., media commit, battery-backed intermediate storage with recovery software, or UPS-protected cache with recovery software.
section: "1.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
