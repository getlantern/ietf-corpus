document: rfc-1123
kind: normative-requirement
summary: A Telnet IAC byte (value 255) to be sent as data MUST be doubled. In Binary mode, the stream MUST still be scanned for IAC; embedded Telnet commands MUST be obeyed; IAC data bytes MUST be doubled; and CR/end-of-line processing MUST NOT be performed.
section: 3.2.6
rfc2119_level: MUST
topics:
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
