document: rfc-7874
kind: normative-requirement
summary: WebRTC endpoints MUST support RFC 3389 comfort noise (CN) for streams encoded with G.711 or any other supported codec that does not provide its own CN. Use of RFC 3389 CN with Opus is NOT RECOMMENDED because Opus provides its own CN mechanism.
section: "3"
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
    - rtp
