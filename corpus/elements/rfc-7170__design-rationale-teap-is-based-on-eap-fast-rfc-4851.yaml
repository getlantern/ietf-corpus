document: rfc-7170
kind: design-rationale
summary: TEAP is based on EAP-FAST (RFC 4851) with minor changes to satisfy the RFC 6678 requirements for a standards-track tunnel-based EAP method. EAP-FAST was selected because it had already been widely adopted across devices and platforms, giving TEAP a proven deployment base.
