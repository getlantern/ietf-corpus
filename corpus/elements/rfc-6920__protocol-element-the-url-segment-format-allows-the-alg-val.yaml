document: rfc-6920
kind: protocol-element
summary: The URL Segment format allows the 'alg-val' production (e.g., 'sha-256;UyaQV-...') to be embedded in the pathname, query string, or fragment of existing HTTP URLs without the ni scheme. Clients MUST NOT assume any URL with a pathname component matching 'alg-val' was produced per this specification.
section: "5"
topics:
    - http
    - security
