document: rfc-8264
kind: normative-requirement
summary: In accordance with RFC 5198, Normalization Form C (NFC) is RECOMMENDED for the normalization rule of a PRECIS profile. Extreme care should be taken when specifying NFKC or NFKD, as these normalization forms can cause significant information loss depending on the language and script involved.
section: 5.2.4
rfc2119_level: RECOMMENDED
topics:
    - security
