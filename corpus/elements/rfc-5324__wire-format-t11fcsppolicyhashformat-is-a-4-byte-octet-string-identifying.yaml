document: rfc-5324
kind: wire-format
summary: 'T11FcSpPolicyHashFormat is a 4-byte OCTET STRING identifying the hash function used to summarize a Policy Object: SHA-1 is ''00000001''h (20-byte output) and SHA-256 is ''00000002''h (32-byte output). Every instance of this TC must be paired with a corresponding T11FcSpPolicyHashValue object (OCTET STRING, SIZE 0..64).'
section: "6.1"
