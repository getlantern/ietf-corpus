document: rfc-4976
kind: normative-requirement
summary: The MSRP URI returned by a relay in a Use-Path MUST contain at least 64 bits of cryptographically random material so it is not guessable by attackers. The URI MUST be invalidated when the client's connection is closed and reopened, and MUST be invalidated after the Expires time.
section: "6.3"
rfc2119_level: MUST
topics:
    - realtime
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
