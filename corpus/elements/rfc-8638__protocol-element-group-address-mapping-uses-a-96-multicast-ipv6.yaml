document: rfc-8638
kind: protocol-element
summary: Group address mapping uses a /96 multicast IPv6 prefix (mPrefix64) provisioned on each AFBR. AFBRs prepend mPrefix64 to an IPv4 multicast group address to form an IPv4-embedded IPv6 multicast address, with the IPv4 group address occupying bits 96-127.
section: "5.2"
topics:
    - multicast
    - ip
    - v6ops
