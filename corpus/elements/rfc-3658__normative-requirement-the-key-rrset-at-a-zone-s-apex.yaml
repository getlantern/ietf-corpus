document: rfc-3658
kind: normative-requirement
summary: The KEY RRset at a zone's apex MUST be self-signed by a private key whose public counterpart appears in a zone signing KEY RR at the apex specifying a mandatory-to-implement algorithm, and this KEY RR MUST be identified by a DS RR in a signed DS RRset in the parent zone.
section: 2.2.3.2
rfc2119_level: MUST
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
