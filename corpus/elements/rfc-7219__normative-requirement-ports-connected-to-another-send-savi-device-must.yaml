document: rfc-7219
kind: normative-requirement
summary: Ports connected to another SEND SAVI device MUST be configured as Trusted. Ports connected to routers MUST also be Trusted, since routers legitimately forward transit traffic with off-link source addresses.
section: "3.4"
rfc2119_level: MUST
topics:
