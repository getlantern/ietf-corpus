document: rfc-8731
kind: design-rationale
summary: Curve448-sha512 is included as a hedge to combat unforeseen analytical advances against Curve25519 and SHA-256, providing more than 128 bits of security strength. "curve25519-sha256" is the preferred choice, but "curve448-sha512" is recommended for implementation.
