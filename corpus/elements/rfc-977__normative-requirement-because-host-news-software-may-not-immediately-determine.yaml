document: rfc-977
kind: normative-requirement
summary: Because host news software may not immediately determine article appropriateness, a server is permitted to acknowledge successful transfer (235) and later silently discard the article. This allows asynchronous validation by the underlying news posting software.
section: "3.4"
rfc2119_level: MAY
topics:
    - tcp
