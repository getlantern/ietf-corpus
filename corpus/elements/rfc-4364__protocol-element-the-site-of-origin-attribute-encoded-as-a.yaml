document: rfc-4364
kind: protocol-element
summary: The Site of Origin attribute, encoded as a Route Origin Extended Community, uniquely identifies the set of routes learned from a particular site. It prevents a route from being redistributed back to the originating site via a different PE/CE connection, and is especially important when multiple CEs share the same ASN.
section: "7"
topics:
