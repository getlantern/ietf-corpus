document: rfc-7001
kind: normative-requirement
summary: Agents performing 'iprev' DNS queries MUST limit the number of names evaluated via A/AAAA queries so as not to unduly tax the DNS infrastructure; this limit MAY be administrator-configurable. Section 5.5 of RFC 4408 (SPF) chose a limit of 10 as an example.
section: "3"
rfc2119_level: MUST
topics:
    - dns
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
