document: rfc-1425
kind: security-consideration
summary: RFC 1425 does not introduce new security issues beyond those already present in RFC 821 and conforming email implementations. The EHLO verb does announce server capabilities, but all information from the initial extension set can be deduced by probing standard SMTP verbs. Security implications of specific extensions are deferred to their defining RFCs.
section: "9"
topics:
    - email
    - security
