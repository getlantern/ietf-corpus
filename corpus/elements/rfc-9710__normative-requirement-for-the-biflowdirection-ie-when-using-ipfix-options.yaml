document: rfc-9710
kind: normative-requirement
summary: For the 'biflowDirection' IE, when using IPFIX Options to apply it to all flows within an Observation Domain or from an Exporting Process, the Option SHOULD be sent reliably. If reliable transport is not available (i.e., when using UDP), this IE SHOULD appear in each Flow Record.
section: "6.7"
rfc2119_level: SHOULD
topics:
    - measurement
    - udp
