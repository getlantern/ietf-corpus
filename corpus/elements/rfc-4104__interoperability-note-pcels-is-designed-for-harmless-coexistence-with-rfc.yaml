document: rfc-4104
kind: interoperability-note
summary: 'PCELS is designed for harmless coexistence with RFC 3703 (PCLS) implementations in the same data repository. However, three compatibility impacts exist: pcimRoles is now also used by pcelsPolicySet; condition/action association classes originally for pcimRule are now also used by pcelsRule subclasses; and pcimRepository containers may include entries of types unknown to PCLS implementations.'
section: "4.5"
topics:
