document: rfc-5303
kind: normative-requirement
summary: The Extended Local Circuit ID field SHALL contain a value assigned by the IS when the circuit is created, and SHALL be unique among all circuits of the Intermediate System. This value is not necessarily related to the Local Circuit ID field in the IIH PDU.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
