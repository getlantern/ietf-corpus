document: rfc-3782
kind: normative-requirement
summary: For the first partial ACK that arrives during Fast Recovery, the retransmit timer MUST be reset (Step 5). Subsequent partial ACKs do not reset the timer under the Impatient variant.
section: "3"
rfc2119_level: MUST
