summary: 'Domain-wide prefix distribution trades scalability for optimality: it increases memory consumption, transmission requirements, and SPF computation throughout the domain, though it does not affect the first aspect of IS-IS scalability (area-based LSP containment). Administrators should provision and monitor networks accordingly.'
