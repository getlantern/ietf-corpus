document: rfc-6597
kind: design-rationale
summary: The damaged-KLVunit rules are defined to apply regardless of the M-bit value of the lost packet itself, enabling very basic receivers to look solely at the M-bit to determine the outer boundaries of damaged KLVunits without needing to track lost-packet M-bit state.
section: 4.3.1.1
topics:
