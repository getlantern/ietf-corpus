document: rfc-8402
kind: interoperability-note
summary: For LAN subnetworks, additional IGP protocol mechanisms (IS-IS and OSPF extensions) are required so that each router in the LAN can advertise an Adj-SID per neighbor, since standard DR/DIS flooding does not expose individual node-to-node adjacencies.
section: 3.4.2
topics:
    - routing
