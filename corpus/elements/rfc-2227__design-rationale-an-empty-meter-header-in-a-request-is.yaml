document: rfc-2227
kind: design-rationale
summary: 'An empty Meter header in a request is defined as equivalent to ''will-report-and-limit'', and sending only ''Connection: Meter'' with no explicit Meter header achieves the same effect, making the most common case maximally efficient with minimal bytes.'
section: "3.3"
