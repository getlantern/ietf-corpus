document: rfc-4803
kind: security-consideration
summary: Unauthorized write access to gmplsInterfaceTable, gmplsInSegmentTable, gmplsOutSegmentTable, and gmplsLabelTable could result in disruption of traffic on the network, especially if an LSP has already been established. SET operations on these tables in a non-secure environment without proper protection can have a negative effect on network operations.
section: "9"
topics:
    - mpls
    - security
