document: rfc-8167
kind: protocol-element
summary: To receive incoming reverse-direction Replies, an RPC-over-RDMA server endpoint posts enough additional Receive buffers to handle replies for each reverse-direction Call it sends. On reconnect, it re-posts buffers for retransmitted reverse Calls and for incoming forward-direction Calls.
section: 4.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
