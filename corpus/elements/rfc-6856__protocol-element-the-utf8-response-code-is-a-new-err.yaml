document: rfc-6856
kind: protocol-element
summary: The UTF8 response code is a new -ERR response code valid for LIST, TOP, and RETR commands. It indicates failure because the requested message content contains UTF-8 strings but the client has not entered UTF-8 mode. The client MAY reissue the command after issuing the UTF8 command.
section: "5"
topics:
