document: rfc-5098
kind: protocol-element
summary: pktcSigDefCallSigDscp and pktcSigDefMediaStreamDscp (Dscp, read-write) set default DSCP values for call signaling and media stream IP headers respectively. The MTA MUST NOT update pktcSigDefMediaStreamDscp from CMS-supplied NCS message values; active connections are unaffected by SNMP updates. Both MUST NOT persist across reboots.
section: "5"
topics:
