document: rfc-1717
kind: interoperability-note
summary: Systems are not required to fragment small packets, segments need not be equal in size, and a packet may be sent as a single fragment (both B and E bits set). Individual member links may have PPP options (ACCM, Magic Number, LQM, compression, etc.) that differ from each other.
section: "3"
