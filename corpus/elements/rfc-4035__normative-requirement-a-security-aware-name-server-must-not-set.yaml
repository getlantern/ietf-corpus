document: rfc-4035
kind: normative-requirement
summary: A security-aware name server MUST NOT set the AD bit in a response unless it considers all RRsets in the Answer and Authority sections to be authentic and MUST NOT assert authenticity of authoritative-zone data unless the zone was obtained via secure means (such as secure zone transfer) and that behavior is explicitly configured.
section: 3.1.6
rfc2119_level: MUST NOT
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
