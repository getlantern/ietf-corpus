document: rfc-9122
kind: protocol-element
summary: The `reject` action refuses delivery of the message and cancels the implicit keep. It is incompatible with the `vacation` action and is typically not permitted alongside delivery actions such as `keep`, `fileinto`, and `redirect`. It cannot be used with IMAP events.
section: "2.2"
topics:
    - email
