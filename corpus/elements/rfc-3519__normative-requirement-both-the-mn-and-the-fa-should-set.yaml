document: rfc-3519
kind: normative-requirement
summary: Both the MN and the FA SHOULD set the 'T' bit when requesting MIP UDP tunnelling, even if not all traffic will be reverse tunnelled, to ensure that a HA not prepared for reverse tunnelling will reject the registration before it becomes unusable.
section: 3.1.5
rfc2119_level: SHOULD
topics:
    - nat
    - mobility
