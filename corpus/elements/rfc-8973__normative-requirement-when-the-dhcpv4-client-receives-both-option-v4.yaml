document: rfc-8973
kind: normative-requirement
summary: When the DHCPv4 client receives both OPTION_V4_DOTS_RI and OPTION_V4_DOTS_ADDRESS, the name from OPTION_V4_DOTS_RI MUST NOT be passed to an underlying resolution library; addresses from OPTION_V4_DOTS_ADDRESS are used directly while the name serves only as a PKIX reference identifier.
section: 5.2.3
rfc2119_level: MUST NOT
topics:
    - dns
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
