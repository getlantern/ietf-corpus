document: rfc-9264
kind: security-consideration
summary: The 'third-party links' model allows one party to provide links with another party's resource as the anchor. Applications MUST consider whether sufficient trust exists in the third party and MAY treat third-party links differently from first-party links.
section: "9"
topics:
    - security
    - http
