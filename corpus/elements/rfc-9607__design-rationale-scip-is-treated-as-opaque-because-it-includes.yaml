document: rfc-9607
kind: design-rationale
summary: SCIP is treated as opaque because it includes built-in mechanisms for protocol version negotiation and capability exchange. Middleboxes attempting to parse SCIP payloads serve no useful purpose and risk causing protocol ossification (as described in RFC 9170) as SCIP evolves.
section: "1"
topics:
    - rtp
    - security
