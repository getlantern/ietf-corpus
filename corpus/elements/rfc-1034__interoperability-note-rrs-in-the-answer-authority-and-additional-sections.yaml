document: rfc-1034
kind: interoperability-note
summary: RRs in the answer, authority, and additional sections of responses may include data with varying authority levels (authoritative vs. cached). Name servers mark responses to indicate whether data is authoritative. Resolvers must never let cached information override authoritative zone data when both are present.
section: 5.3.2
topics:
    - dns
