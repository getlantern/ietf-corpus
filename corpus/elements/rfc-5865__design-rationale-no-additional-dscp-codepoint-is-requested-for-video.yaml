document: rfc-5865
kind: design-rationale
summary: No additional DSCP codepoint is requested for video classes because video has not had the history of mixing admitted and non-admitted traffic in the same PHB as EF has. Instead, the recommended best practice is to perform admission control for all traffic in three video classes (CS4, CS3 for VoD, AF4).
