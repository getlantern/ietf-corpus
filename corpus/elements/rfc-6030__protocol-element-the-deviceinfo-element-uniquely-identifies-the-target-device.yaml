document: rfc-6030
kind: protocol-element
summary: The <DeviceInfo> element uniquely identifies the target device using combinations of <Manufacturer>, <SerialNo>, <Model>, <IssueNo>, <DeviceBinding>, <StartDate>, <ExpiryDate>, and <UserId> child elements. Manufacturer values MUST be prefixed with 'oath.' (from OATH registry) or 'iana.' (from IANA PEN registry).
section: 4.3.1
topics:
