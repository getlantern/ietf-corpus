document: rfc-7352
kind: protocol-element
summary: 'The unique ID for a message is determined by: the Message-ID header field (default), the content of a specific header field when '':header'' is used, or an explicit string value when '':uniqueid'' is used. The '':header'' and '':uniqueid'' arguments are mutually exclusive.'
