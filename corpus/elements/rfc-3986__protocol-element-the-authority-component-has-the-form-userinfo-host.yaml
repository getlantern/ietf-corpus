document: rfc-3986
kind: protocol-element
summary: The authority component has the form [ userinfo "@" ] host [ ":" port ] and is preceded by "//". It is terminated by the next "/", "?", "#", or the end of the URI. When authority is present, the path must be empty or begin with "/".
section: "3.2"
