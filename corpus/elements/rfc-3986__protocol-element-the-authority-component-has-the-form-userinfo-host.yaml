document: rfc-3986
kind: protocol-element
summary: The authority component has the form [ userinfo "@" ] host [ ":" port ], preceded by "//" and terminated by the next "/", "?", "#", or end of URI. If authority is present, the path must be empty or begin with "/".
section: "3.2"
