document: rfc-5251
kind: protocol-element
summary: In 'shuffling' sessions, a single end-to-end LSP spans CE-to-CE; the ingress PE replaces CPIs with PPIs in Session and Sender Template objects, and the egress PE performs the reverse. The CE sees a virtual point-to-point link CE–PE(–)PE–CE and is shielded from provider topology details.
section: 4.3.1.1
topics:
    - vpn
    - mpls
