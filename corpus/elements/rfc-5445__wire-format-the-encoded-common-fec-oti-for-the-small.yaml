summary: 'The encoded Common FEC OTI for the Small Block Systematic FEC Scheme is 14 bytes: Transfer Length (48 bits), FEC Instance ID (16 bits), Encoding Symbol Length (16 bits), Maximum Source Block Length (16 bits, max 65535), and Maximum Number of Encoding Symbols (16 bits), all as unsigned integers.'
