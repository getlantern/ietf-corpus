document: rfc-6956
kind: protocol-element
summary: RedirectIn and RedirectOut LFBs abstract packet transmission between CEs and FEs (the redirect path). RedirectIn accepts packets from the CE with a RedirectIndex metadata indicating the target group output port; RedirectOut sends packets up to the CE.
section: "5.4"
topics:
