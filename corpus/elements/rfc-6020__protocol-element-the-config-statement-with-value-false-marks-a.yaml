document: rfc-6020
kind: protocol-element
summary: The config statement with value 'false' marks a node's subtree as state data. State data is returned by NETCONF <get> but not by <get-config>, and it cannot be manipulated with <edit-config>. Parent containers, lists, and key leafs of state data are also reported to provide context.
section: 7.19.1
topics:
    - yang
    - netconf
