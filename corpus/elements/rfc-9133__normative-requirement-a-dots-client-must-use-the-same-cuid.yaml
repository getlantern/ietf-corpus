document: rfc-9133
kind: normative-requirement
summary: A DOTS client must use the same 'cuid' for both the DOTS signal and data channels (RFC 9132 Section 4.4.1). This requirement facilitates binding of channels used by the same DOTS client and is the mechanism by which ACL names are associated with the correct client across channels.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
