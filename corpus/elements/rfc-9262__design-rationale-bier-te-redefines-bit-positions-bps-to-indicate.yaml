document: rfc-9262
kind: design-rationale
summary: BIER-TE redefines bit positions (BPs) to indicate adjacencies in the network topology rather than BFERs as in non-TE BIER. A packet's BitString therefore encodes the edges of the forwarding tree, enabling per-packet stateless strict and loose path steering without requiring in-network routing state.
section: "1"
topics:
    - multicast
    - routing
