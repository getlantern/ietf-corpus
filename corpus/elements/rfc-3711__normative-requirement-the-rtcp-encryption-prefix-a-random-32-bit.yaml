document: rfc-3711
kind: normative-requirement
summary: The RTCP encryption prefix (a random 32-bit quantity) specified in RFC 3550 Section 6.1 MUST NOT be used in SRTCP, as it applies only to the encryption method defined in RFC 3550 and is not needed by SRTP's cryptographic mechanisms.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
    - security
    - interoperability-note
