document: rfc-857
kind: protocol-element
summary: 'The TELNET connection is full-duplex; each direction may independently operate in echo mode. Five distinct echoing configurations exist: neither end echoes, one end echoes for itself, one end echoes for the other, both ends echo for themselves, or one end echoes for both.'
section: "5"
