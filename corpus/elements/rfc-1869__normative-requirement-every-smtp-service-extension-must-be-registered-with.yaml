document: rfc-1869
kind: normative-requirement
summary: Every SMTP service extension must be registered with IANA and defined in a standards-track or IESG-approved experimental RFC. The registration must include the keyword, parameter syntax, any new verbs, any MAIL FROM/RCPT TO parameters, behavioral description, and maximum command-length increment.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
