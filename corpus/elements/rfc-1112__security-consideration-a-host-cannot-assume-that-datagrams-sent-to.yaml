document: rfc-1112
kind: security-consideration
summary: A host cannot assume that datagrams sent to a transient host group address will reach only intended hosts, or that received datagrams are actually intended for it. Misdelivery must be detected at a level above IP using higher-level identifiers or authentication tokens. Information sent to a host group should be encrypted or controlled by administrative routing if confidentiality is required.
section: Appendix II
topics:
    - multicast
    - ip
    - security
