document: rfc-2332
kind: protocol-element
summary: 'NHRP extensions are TLV-encoded with a 16-bit header: the high bit (C) is the Compulsory flag requiring the responding station to understand the extension or return an Unrecognized Extension error; bit 14 is unused (must be zero); bits 13–0 are the Type. The extensions list is terminated by the Null TLV (Type=0, Length=0).'
section: "5.3"
