document: rfc-2806
kind: normative-requirement
summary: Unless the sender is certain of shared private-network access strings, they MUST NOT use a local dialing-plan number; they SHOULD use a global number or, as a last resort, a private context. If the local entity does not support the indicated private context, the request MUST be rejected.
section: 2.5.2
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
