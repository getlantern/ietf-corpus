document: rfc-7939
kind: protocol-element
summary: The nhdpLibLocalIfSetTable records local interface address tuples (address type, InetAddress 4 or 16 bytes, prefix length, IfIndex) for each NHDP-configured interface. The nhdpLibRemovedIfAddrSetTable records addresses recently removed from local interfaces, including an IR_time expiration timestamp.
