document: rfc-3280
kind: wire-format
summary: TBSCertificate is a SEQUENCE containing version, serialNumber (INTEGER), signature (AlgorithmIdentifier), issuer (Name), validity (notBefore/notAfter), subject (Name), subjectPublicKeyInfo, optional issuerUniqueID and subjectUniqueID (v2/v3 only), and optional extensions (v3 only). The Extensions field is itself a SEQUENCE of Extension values, each being extnID (OID), critical (BOOLEAN DEFAULT FALSE), and extnValue (OCTET STRING).
