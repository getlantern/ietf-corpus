document: rfc-4055
kind: normative-requirement
summary: If the keyUsage extension is present in a certificate conveying an RSA public key with id-RSAES-OAEP, the extension MUST contain only keyEncipherment and/or dataEncipherment; however, both keyEncipherment and dataEncipherment SHOULD NOT be present simultaneously.
section: "1.2"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
