document: rfc-7234
kind: normative-requirement
summary: The no-store request or response directive requires that a cache MUST NOT intentionally store any part of the request or response in non-volatile storage and MUST make a best-effort to remove it from volatile storage promptly. This directive is explicitly noted as NOT a reliable or sufficient mechanism for ensuring privacy.
section: 5.2.1.5
rfc2119_level: MUST NOT
topics:
    - http
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
