document: rfc-9441
kind: normative-requirement
summary: Window numbers and their corresponding bitmaps included in the SCHC Compound ACK message MUST be ordered from the lowest-numbered to the highest-numbered window. If window number zero is present, it MUST always be first and its window number MUST be placed in the SCHC ACK Header.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
