document: rfc-4261
kind: state-machine
summary: 'PEP-initiated TLS negotiation: PEP sends Client-Open (Client-Type=0, Integrity-TLS); PDP responds with Client-Accept (Client-Type=0, Integrity-TLS); PEP initiates TLS handshake; subsequent COPS messages flow over TLS. If the PDP refuses, it sends Client-Close with error 15.'
section: "5.1"
topics:
