document: rfc-9569
kind: security-consideration
summary: 'TIPS enables a new class of DoS attacks: malicious clients may create excessive TIPS views to exhaust server resources. Mitigations include limiting active TIPS views and pending long-poll requests (returning HTTP 429), applying TIPS view eviction policies, IP reputation filtering, rate limiting, and threshold compartmentalization. Clients MAY establish SLAs with servers.'
section: "9.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
