document: rfc-5215
kind: protocol-element
summary: A Vorbis Packed Configuration (VDT=1) packs the Identification and Setup headers (which MUST be packed as-is) and a Comment header (which MAY be replaced with a dummy). The count and length fields use a variable-length encoding where the MSB of each byte is a continuation flag and the lower 7 bits carry data.
section: 3.1.1
topics:
