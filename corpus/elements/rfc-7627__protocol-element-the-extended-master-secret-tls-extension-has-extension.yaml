document: rfc-7627
kind: protocol-element
summary: The 'extended_master_secret' TLS extension has extension type 0x0017 (decimal 23). Its extension_data field is empty, so the full on-wire encoding is 00 17 00 00 (hexadecimal). The extension is applicable to both TLS and DTLS.
section: "5.1"
topics:
