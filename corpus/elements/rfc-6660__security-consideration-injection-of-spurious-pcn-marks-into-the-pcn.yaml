document: rfc-6660
kind: security-consideration
summary: Injection of spurious PCN-marks into the PCN-domain is a potential attack vector, but can only succeed if a PCN-ingress-node is misconfigured. The effect is to admit fewer flows or terminate existing flows prematurely, causing visible under-utilisation that good management should quickly detect.
section: "7"
topics:
