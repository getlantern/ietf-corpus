document: rfc-1395
kind: interoperability-note
summary: Use of undefined generic tag types (range 18-127) without registration may conflict with other BOOTP implementations. Nonessential options such as hostname and quote-of-the-day server may be omitted and discovered later via RLP or DNS WKS records.
section: Extensions
