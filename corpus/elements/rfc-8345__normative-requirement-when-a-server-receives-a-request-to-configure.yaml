document: rfc-8345
kind: normative-requirement
summary: When a server receives a request to configure an overlay network, it SHOULD validate that supporting nodes/links/termination points exist in the operational state datastore. Configuration requests referencing non-existent supporting objects SHOULD be rejected.
section: 4.4.3
rfc2119_level: SHOULD
topics:
    - yang
    - netconf
    - routing
