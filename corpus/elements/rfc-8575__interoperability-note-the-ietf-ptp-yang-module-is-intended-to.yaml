document: rfc-8575
kind: interoperability-note
summary: The ietf-ptp YANG module is intended to be importable by profile-specific modules (e.g., telecom or automotive PTP profiles) using YANG 'import' and 'augment', enabling extensibility while maintaining a common base derived from IEEE Std 1588-2008 data sets.
