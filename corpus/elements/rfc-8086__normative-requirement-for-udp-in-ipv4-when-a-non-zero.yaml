document: rfc-8086
kind: normative-requirement
summary: For UDP in IPv4, when a non-zero UDP checksum is used, it MUST be processed per RFC 768 and RFC 1122. When a decapsulator receives a packet with a non-zero checksum, it MUST verify the checksum before accepting the packet; if verification fails, the packet MUST be dropped.
section: "6.1"
rfc2119_level: MUST
topics:
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
