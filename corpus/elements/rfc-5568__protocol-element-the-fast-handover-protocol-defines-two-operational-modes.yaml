summary: 'The Fast Handover protocol defines two operational modes: Predictive (MN sends FBU from PAR''s link and receives FBack before disconnecting) and Reactive (MN sends FBU from NAR''s link after handover, or resends FBU after connecting to NAR without having received FBack).'
