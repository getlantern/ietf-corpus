document: rfc-9404
kind: normative-requirement
summary: Digest algorithm names in supportedDigestAlgorithms MUST be present in the HTTP Digest Algorithm Values registry (RFC 3230) but MUST be lowercased in JMAP (e.g., 'sha-256' not 'SHA-256'). Clients SHOULD prefer algorithms listed earlier in the array.
section: "3.1"
rfc2119_level: MUST
topics:
    - json
    - http
