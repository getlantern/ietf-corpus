document: rfc-7049
kind: protocol-element
summary: Tags (major type 6) precede a single data item and carry an integer tag number encoded as a positive integer. Tag 0 is an RFC 3339 date/time string, tag 1 is epoch-based numeric time, tags 2/3 are positive/negative bignums (byte strings in network byte order), tags 4/5 are decimal fraction and bigfloat, and tag 55799 is self-describe CBOR.
