document: rfc-3842
kind: normative-requirement
summary: Message counter values have a maximum of 4,294,967,295 (2^32 - 1). Notifiers MUST NOT generate a request with a larger value, and Subscribers MUST treat a larger value as 2^32-1.
section: "3.5"
rfc2119_level: MUST
