document: rfc-2326
kind: design-rationale
summary: RTSP is text-based (UTF-8) rather than binary because text protocols are easier to extend with optional self-describing parameters, allow easy prototyping in scripting languages, and the low frequency of commands makes processing efficiency a non-issue.
