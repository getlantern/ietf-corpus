document: rfc-8302
kind: normative-requirement
summary: If the sender's IP has been seen before but with a different MAC address or a different ingress nickname, the RBridge SHOULD verify whether a duplicate IP address is in use or the end station has moved. The RBridge SHOULD update the saved {IP, MAC, ingress nickname} triplet based on verification results.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
