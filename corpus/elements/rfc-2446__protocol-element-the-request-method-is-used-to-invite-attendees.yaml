document: rfc-2446
kind: protocol-element
summary: The REQUEST method is used to invite Attendees, reschedule, update, reconfirm, delegate, or change Organizer for a VEVENT. If the UID is not found on the recipient's calendar, it is a new event; if found with a higher SEQUENCE or DTSTAMP, it is a reschedule; if found with the same SEQUENCE, it is an update. Multiple VEVENT components in one REQUEST are permitted only if they share the same UID.
section: 3.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
