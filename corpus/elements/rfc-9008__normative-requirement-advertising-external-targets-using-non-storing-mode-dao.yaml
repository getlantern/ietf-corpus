document: rfc-9008
kind: normative-requirement
summary: Advertising external targets using Non-Storing mode DAO messaging, even in a Storing mode network, is RECOMMENDED. This keeps external routes out of the DODAG and routes all packets to external targets through the root, which terminates the IP-in-IP tunnel.
section: 4.1.1
rfc2119_level: RECOMMENDED
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
