document: rfc-9766
kind: design-rationale
summary: No bitmap4 of accepted attributes is included in the LAYOUT_WCC result because the attributes are entirely optional and the client has no recourse if the server ignores them; returning a bitmap would add wire overhead with no actionable value for the client.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
