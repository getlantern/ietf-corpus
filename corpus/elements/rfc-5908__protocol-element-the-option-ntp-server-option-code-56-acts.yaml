document: rfc-5908
kind: protocol-element
summary: The OPTION_NTP_SERVER option (code 56) acts as a container for NTP/SNTP server location information. It can appear multiple times in a DHCPv6 message; each instance represents a distinct server for the client to include in its configuration. The order of multiple instances is not significant.
