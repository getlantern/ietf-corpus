document: rfc-9398
kind: security-consideration
summary: 'The YANG module is designed for access via NETCONF (mandatory secure transport: SSH per RFC 6242) or RESTCONF (mandatory secure transport: TLS per RFC 8446). Deployment must use these secure transports to protect configuration and state data.'
