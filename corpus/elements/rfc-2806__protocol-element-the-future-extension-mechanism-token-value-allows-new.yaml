document: rfc-2806
kind: protocol-element
summary: The future-extension mechanism (';token[=value]') allows new parameters to be appended after a semicolon. Extensions used in open environments MUST be documented in an RFC; the nonterminal is compatible with the <other-param> defined in RFC 2543.
section: 2.5.11
