document: rfc-2273
kind: normative-requirement
summary: When a command generator receives a response, it MUST discard the response if any of messageProcessingModel, securityModel, securityName, contextEngineID, contextName, pduVersion, or request-id differ from the values used in the original request.
section: "3.1"
rfc2119_level: MUST
topics:
