document: rfc-3543
kind: normative-requirement
summary: A registration revocation message MUST be protected by a valid home-foreign authenticator (for home-foreign agent communication) or a mobile-home authenticator (for home agent to co-located mobile node). If not adequately protected, the revocation message MUST be ignored and silently discarded.
section: "3.3"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
