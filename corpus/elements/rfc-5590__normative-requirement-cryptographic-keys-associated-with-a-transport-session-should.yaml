document: rfc-5590
kind: normative-requirement
summary: Cryptographic keys associated with a transport session SHOULD be used to provide authentication, integrity, and encryption. The cryptographic protocols SHOULD ensure fresh new session keys are generated for each session to prevent cross-session replay attacks.
section: 3.3.4
rfc2119_level: SHOULD
topics:
