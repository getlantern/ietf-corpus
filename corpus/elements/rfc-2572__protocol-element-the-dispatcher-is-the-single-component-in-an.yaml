document: rfc-2572
kind: protocol-element
summary: The Dispatcher is the single component in an SNMP engine responsible for sending and receiving SNMP messages, dispatching PDUs to applications, and delegating version-specific message preparation to Message Processing Models. There is exactly one Dispatcher per SNMP engine.
section: "2.1"
