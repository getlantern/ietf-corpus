document: rfc-4429
kind: protocol-element
summary: 'Optimistic address is a new address state introduced by this memo: an address assigned to an interface and available for use (subject to restrictions) while its uniqueness on a link is being verified via DAD. It differs from Tentative (not usable) and Preferred (unrestricted).'
