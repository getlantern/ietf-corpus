document: rfc-2688
kind: normative-requirement
summary: A strict implementation of admission control for Guaranteed Service on byte-stuffed PPP links SHOULD double the RSpec of link traffic in making flow admission decisions, since byte stuffing can in the worst case double frame sizes.
section: "4.1"
rfc2119_level: SHOULD
