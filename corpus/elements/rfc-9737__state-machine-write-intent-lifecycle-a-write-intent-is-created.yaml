document: rfc-9737
kind: state-machine
summary: 'Write intent lifecycle: a write intent is created when a client opens a file and receives LAYOUTIOMODE4_RW. During MDS recovery, the MDS tracks write intents and transitions each to either ''recovered'' (client reclaims with no errors), ''resilver-needed'' (client reports error or grace period expires without reclaim), or ''resilvering'' (once no outstanding write intents remain on the file).'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
