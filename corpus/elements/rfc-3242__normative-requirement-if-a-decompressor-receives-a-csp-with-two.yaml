document: rfc-3242
kind: normative-requirement
summary: If a decompressor receives a CSP with two non-equal CID values, the packet MUST be discarded. After a CSP has been received and processed, the packet including any data following the encapsulated compressed header MUST be discarded.
section: 4.1.2
rfc2119_level: MUST
topics:
    - rtp
