document: rfc-3803
kind: security-consideration
summary: In some environments, explicitly identifying the time duration of audio/* or video/* content in a header may be a security issue and should not be noted. Reliance on the Content-Duration header cannot be trusted for determining exact data size; the exact length must be determined by examining the data itself.
section: "4"
topics:
