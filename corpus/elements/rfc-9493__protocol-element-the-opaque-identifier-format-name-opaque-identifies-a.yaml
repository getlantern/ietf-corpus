document: rfc-9493
kind: protocol-element
summary: 'The Opaque Identifier Format (name: "opaque") identifies a subject with a string with no asserted semantics beyond its use as an identifier (e.g., a UUID or hash). It MUST contain an "id" member that is a non-null, non-empty JSON string.'
