document: rfc-7788
kind: normative-requirement
summary: Each node MUST include an HNCP-Version TLV indicating the currently supported version in its node data and MUST ignore (except for DNCP synchronization) any TLVs with type greater than 32 published by nodes that did not also publish an HNCP-Version TLV.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
