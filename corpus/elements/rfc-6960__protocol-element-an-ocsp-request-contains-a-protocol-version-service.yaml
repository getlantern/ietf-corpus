document: rfc-6960
kind: protocol-element
summary: An OCSP request contains a protocol version, service request, target certificate identifier (CertID), and optional extensions. Upon receipt, the responder checks whether the message is well-formed, whether it is configured for the requested service, and whether the request contains sufficient information.
