document: rfc-6827
kind: interoperability-note
summary: The same codepoint values (12 for Export Upward, 13 for Export Downward) MUST be used for the Inter-RA Export sub-TLVs regardless of whether they appear inside the Link TLV, Node Attribute TLV, or Router Address TLV, ensuring consistent interpretation across all advertisement contexts.
