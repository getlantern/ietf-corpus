document: rfc-6726
kind: wire-format
summary: 'ALC/LCT packets carrying an FDT Instance consist of (in order): UDP header, default LCT header with TOI=0, LCT Header Extensions (EXT_FDT, optionally EXT_CENC and EXT_FTI), FEC Payload ID, and Encoding Symbols for the FDT Instance payload. All integer fields are in network byte order.'
section: "3.4"
