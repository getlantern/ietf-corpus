kind: protocol-element
summary: The /changes method returns delta updates (created, updated, destroyed id arrays) since a given sinceState string. It supports a maxChanges cap and a hasMoreChanges flag; when changes are too numerous the server SHOULD synthesize intermediate states or return 'cannotCalculateChanges'.
