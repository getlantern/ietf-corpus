document: rfc-5388
kind: design-rationale
summary: XML was chosen over binary formats (DISMAN-TRACEROUTE-MIB SMIv2 and IPFIX) because it supports clean data structuring, is human-readable, and benefits from extensive tooling. Expected data volumes for traceroute measurements are not extremely high, making XML's resource overhead an acceptable tradeoff.
