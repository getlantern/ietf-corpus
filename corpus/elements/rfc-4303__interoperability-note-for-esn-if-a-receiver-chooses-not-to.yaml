document: rfc-4303
kind: interoperability-note
summary: For ESN, if a receiver chooses not to enable anti-replay for an SA, the receiver SHOULD NOT negotiate ESN, because managing the anti-replay window (required to reconstruct the high-order ESN bits for ICV computation) contradicts the intent of disabling anti-replay.
section: 3.3.3
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
