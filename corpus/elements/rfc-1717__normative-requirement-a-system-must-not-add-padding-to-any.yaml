document: rfc-1717
kind: normative-requirement
summary: A system MUST NOT add padding to any packet that cannot be recognized as padded by the peer; non-terminal fragments MUST NOT be padded by any method other than Self-Describing-Padding. A system that may pad non-terminal fragments MUST negotiate Self-Describing-Padding (RFC 1570) on the member link before sending multilink data.
section: "3.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
