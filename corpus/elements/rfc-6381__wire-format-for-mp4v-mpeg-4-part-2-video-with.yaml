document: rfc-6381
kind: wire-format
summary: For 'mp4v' (MPEG-4 part-2 video) with OTI 20, the third element is the decimal VideoProfileLevelIndication—e.g., 'mp4v.20.9' for MPEG-4 Visual Simple Profile Level 0. For AVC family entries ('avc1', 'avc2', 'svc1', 'mvc1', 'mvc2'), the second element ('avcoti') is 6 hex digits encoding profile_idc, constraint_set flags byte, and level_idc from the SPS NAL unit.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
