document: rfc-2091
kind: protocol-element
summary: The Update Acknowledge (Command/Operation 11) is sent in response to every Update Response packet received. If the Update Response has the Flush flag set, the corresponding Acknowledge must also have the Flush flag set, and it echoes the same Sequence Number.
section: "4.3"
topics:
    - routing
