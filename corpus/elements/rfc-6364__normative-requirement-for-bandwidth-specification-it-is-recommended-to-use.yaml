document: rfc-6364
kind: normative-requirement
summary: For bandwidth specification, it is RECOMMENDED to use the TIAS bandwidth modifier (RFC 3890) with 'a=maxprate', unless the AS bandwidth modifier is used. The use of AS is NOT RECOMMENDED because TIAS accounts for IP version and transport protocol differences.
section: "4.7"
rfc2119_level: RECOMMENDED
topics:
