document: rfc-8414
kind: security-consideration
summary: Publishing metadata in a standard format makes it easier for both legitimate clients and attackers to use the authorization server. The same defenses against attacks should be applied regardless of whether metadata is published in a standard or ad hoc format.
section: "6.3"
topics:
    - oauth
    - security
