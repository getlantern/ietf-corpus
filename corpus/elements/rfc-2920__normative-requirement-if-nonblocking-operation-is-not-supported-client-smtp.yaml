document: rfc-2920
kind: normative-requirement
summary: If nonblocking operation is not supported, client SMTP implementations MUST check the TCP window size and ensure each group of commands fits entirely within the window (usually 4K octets). Failure to perform this check can lead to deadlock conditions.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
    - tcp
