document: rfc-2021
kind: design-rationale
summary: '''Application Level'' in RMON 2 does not mean OSI Layer 7 exclusively; it denotes any protocol above the MAC and network layers, including transport, session, presentation, and application-layer protocols. This broader definition enables tracking of TCP, UDP, DNS, and similar protocols.'
