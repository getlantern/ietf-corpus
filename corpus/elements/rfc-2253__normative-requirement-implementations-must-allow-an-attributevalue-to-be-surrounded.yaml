document: rfc-2253
kind: normative-requirement
summary: Implementations MUST allow an AttributeValue to be surrounded by double-quote characters (QUOTATION, ASCII 34) which are not part of the value; inside the quoted value, ',', '=', '+', '<', '>', '#', and ';' may appear without escaping.
