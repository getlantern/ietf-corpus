document: rfc-9348
kind: security-consideration
summary: 'Access to the YANG module MUST be via NETCONF or RESTCONF with mandatory-to-implement secure transports: SSH (RFC 6242) for NETCONF and TLS 1.3 (RFC 8446) for RESTCONF. Unprotected write access to the traffic-flow-security subtree can negatively affect network operations by altering IP-TFS congestion sensitivity or fixed-rate parameters.'
section: "5"
topics:
    - ipsec
    - security
    - tls
    - netconf
