document: rfc-7216
kind: design-rationale
summary: The set of label-shortening steps (1 and 2 labels for IPv4; 16, 18, 20, and 24 labels for IPv6) is chosen to provide network operators flexibility in placing LIS discovery records while limiting DNS queries to at most five U-NAPTR resolutions per IP address. This does not create a classful addressing hierarchy.
section: "4.3"
topics:
    - dns
    - ip
