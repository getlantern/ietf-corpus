document: rfc-2015
kind: interoperability-note
summary: Many existing mail gateways will convert data to Quoted-Printable or Base64 when the next hop does not support MIME or 8-bit data. This conversion invalidates multipart/signed signatures, which is why signed data must be restricted to 7 bits.
section: "3"
topics:
