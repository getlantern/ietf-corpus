document: rfc-3015
kind: interoperability-note
summary: 'In text encoding, Local and Remote descriptors consist of SDP session descriptions (RFC 2327). Exceptions allowed in MGC-to-MG direction: ''s='', ''t='', and ''o='' lines are optional; CHOOSE and alternative value lists may replace single parameter values. Implementations SHALL accept fully RFC 2327-conformant session descriptions.'
section: 7.1.8
topics:
    - realtime
    - sip
