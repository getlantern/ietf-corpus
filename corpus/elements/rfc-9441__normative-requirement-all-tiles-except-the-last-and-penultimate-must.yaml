document: rfc-9441
kind: normative-requirement
summary: 'All tiles except the last and penultimate MUST be of equal (regular) size. The last tile MUST be smaller than or equal to the regular tile size. A Profile MUST pick one of two options for the penultimate tile: it MUST be the regular tile size, or it MUST be either regular size or regular size minus one L2 Word.'
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
