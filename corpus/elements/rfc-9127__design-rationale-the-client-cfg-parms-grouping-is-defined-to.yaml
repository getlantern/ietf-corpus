document: rfc-9127
kind: design-rationale
summary: The 'client-cfg-parms' grouping is defined to allow BFD clients such as IGPs to configure BFD for auto-discovered peers (multiplier and intervals only), since IGPs do not pre-configure peer addresses and discover them dynamically. Authentication parameters for client-created sessions are still specified in BFD directly.
section: "2.1"
topics:
    - yang
    - netconf
