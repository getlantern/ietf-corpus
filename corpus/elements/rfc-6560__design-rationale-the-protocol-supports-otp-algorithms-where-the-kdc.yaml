document: rfc-6560
kind: design-rationale
summary: The protocol supports OTP algorithms where the KDC cannot obtain the plaintext OTP (e.g., RFC 2289 challenge-response). When must-encrypt-nonce is not set, the OTP value is sent in the otp-value field of the PA-OTP-REQUEST; keys then fall back to the Armor Key, at the cost of losing KDC-authentication via the OTP mechanism itself.
section: "1.2"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
