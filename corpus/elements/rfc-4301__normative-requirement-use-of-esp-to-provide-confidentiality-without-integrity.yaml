document: rfc-4301
kind: normative-requirement
summary: Use of ESP to provide confidentiality without integrity is NOT RECOMMENDED. An ESP SA that employs both NULL encryption and no integrity algorithm MUST NOT be instantiated; an attempt to negotiate such an SA is an auditable event.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - security
    - crypto
