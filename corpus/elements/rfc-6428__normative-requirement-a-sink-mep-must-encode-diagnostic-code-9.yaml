document: rfc-6428
kind: normative-requirement
summary: A sink MEP MUST encode diagnostic code 9 (mis-connectivity defect) when CV PDU processing indicates a mis-connectivity defect. A sink MEP SHOULD encode code 1 (Control Detection Time Expired) when detection time is exceeded, and code 5 (Path Down) upon receiving LDI.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
