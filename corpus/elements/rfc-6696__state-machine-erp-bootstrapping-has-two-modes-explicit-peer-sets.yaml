document: rfc-6696
kind: state-machine
summary: 'ERP bootstrapping has two modes: explicit (peer sets bootstrap flag B=1 in EAP-Initiate/Re-auth to obtain rRK/domain name from home ER server) and implicit (local ER server requests DSRK from home EAP server during the initial full EAP exchange). The authenticator/local ER server MUST verify current possession of root keys before deciding which path to take.'
