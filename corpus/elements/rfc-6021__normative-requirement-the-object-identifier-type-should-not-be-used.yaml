document: rfc-6021
kind: normative-requirement
summary: The object-identifier type SHOULD NOT be used to represent the SMIv2 OBJECT IDENTIFIER type; the object-identifier-128 type SHOULD be used instead, since the unrestricted type is a superset and interoperability with 128-sub-identifier-limited implementations cannot be guaranteed.
section: "3"
rfc2119_level: SHOULD NOT
