document: rfc-7549
kind: protocol-element
summary: The 'visiteda-homeb' value indicates that the SIP entity responsible for the host part represents the end of a traffic leg between the originating visited network and the terminating home network; in 3GPP, this is between the TRF and the home S-CSCF of the called user in RAVEL scenarios.
