document: rfc-7591
kind: privacy-consideration
summary: For native applications installed on a single device, per-instance client identifiers could be uniquely tracked across OAuth 2.0 transactions. Clients are forbidden from creating their own client identifiers to prevent cross-server tracking via colluding authorization servers.
section: "6"
topics:
    - oauth
    - privacy
