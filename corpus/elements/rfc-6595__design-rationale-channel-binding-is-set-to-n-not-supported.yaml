document: rfc-6595
kind: design-rationale
summary: Channel binding is set to 'n' (not supported) because channel-binding data cannot be integrity protected by the SAML negotiation itself. In theory it could be inserted into the SAML flow and verified by the server, but this is currently not supported in SAML.
section: "3.1"
topics:
    - security
