document: rfc-5258
kind: protocol-element
summary: The \HasChildren attribute indicates that a mailbox has child mailboxes. A server SHOULD NOT set this attribute if the user has no access to any child mailbox; \HasNoChildren SHOULD be used instead. It is an error to return both \HasChildren and \HasNoChildren in the same LIST response.
section: "4"
topics:
    - email
