document: rfc-6604
kind: protocol-element
summary: The AA (Authoritative Answer) bit in a DNS response header is set based on whether the server providing the answer with the first owner name in the answer section is authoritative. In an xNAME chain, this reflects the authority status of the first xNAME encountered, not subsequent redirections.
section: "2.1"
topics:
    - dns
