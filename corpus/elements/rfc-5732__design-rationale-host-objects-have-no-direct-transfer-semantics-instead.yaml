document: rfc-5732
kind: design-rationale
summary: Host objects have no direct transfer semantics; instead they transfer implicitly when the superordinate domain object is transferred. This design preserves the subordinate relationship and is why EPP <transfer> and <renew> commands have no host mapping.
section: 3.2.4
topics:
    - dns
