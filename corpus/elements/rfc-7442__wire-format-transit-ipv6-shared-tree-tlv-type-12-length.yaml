document: rfc-7442
kind: wire-format
summary: 'Transit IPv6 Shared Tree TLV: Type=12, Length=32. RP field is an IPv6 RP address (16 octets). Group field is an IPv6 multicast group address (16 octets). Encoding is identical to the IPv6 Source Tree TLV (RFC 6826) except the Source field is replaced by RP.'
