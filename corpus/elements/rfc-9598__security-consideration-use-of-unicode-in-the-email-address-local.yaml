document: rfc-9598
kind: security-consideration
summary: Use of Unicode in the email address Local-part introduces the risk of visually similar and identical characters (homograph attacks) that can be exploited to deceive the recipient. RFC 5890 Section 4.4 and RFC 6532 Section 4 reference mitigations against these attacks.
section: "7"
topics:
    - security
    - pkix
    - email
