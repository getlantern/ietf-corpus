document: rfc-1717
kind: normative-requirement
summary: On each member link the sender MUST transmit fragments with strictly increasing sequence numbers modulo the sequence space size. The sequence number is not reset per PPP packet; a sequence number is consumed even for single-fragment packets.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
