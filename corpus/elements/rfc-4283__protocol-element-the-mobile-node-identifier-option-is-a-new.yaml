document: rfc-4283
kind: protocol-element
summary: The Mobile Node Identifier option is a new optional data field carried in Mobile IPv6 messages that include a Mobility header. It contains an Option Type (8-bit, value 8), Option Length (8-bit, length of Subtype and Identifier fields), a Subtype field (8-bit, specifying the identifier type), and a variable-length Identifier field.
section: "3"
topics:
