document: rfc-6353
kind: security-consideration
summary: Implementations MUST support TLS 1.1 as a minimum; TLS 1.2 (RFC 5246) is RECOMMENDED. Implementations SHOULD support cipher suites providing perfect forward secrecy (PFS) to limit damage from long-term key compromise. Configuration settings for mapping algorithms to SNMPv3 security levels SHOULD be offered.
section: "9.2"
topics:
    - tls
    - snmp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
