document: rfc-9618
kind: normative-requirement
summary: Certificate authorities SHOULD NOT issue certificates with the policy mappings extension. Applications maintaining policies for accepted trust anchors are RECOMMENDED to forbid this extension in participating CAs, as inhibiting policy mapping mitigates the attack and simplifies implementations.
section: "6.4"
rfc2119_level: SHOULD NOT
topics:
