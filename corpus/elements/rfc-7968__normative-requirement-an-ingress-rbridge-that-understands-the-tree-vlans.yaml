document: rfc-7968
kind: normative-requirement
summary: An ingress RBridge that understands the TREE-VLANs APPsub-TLV SHOULD select tree-VLAN correspondences and advertise them in TREE-VLAN-USE APPsub-TLVs. If multiple tree nicknames are announced for VLAN x, the ingress RBridge chooses one (e.g., closest root) and SHOULD relate each Data Label to only one tree ID.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
