document: rfc-7244
kind: protocol-element
summary: The Interval Metric Flag (I) is a 2-bit field indicating whether the Synchronization Offset is a Sampled Value (I=01), Interval Duration (I=10), or Cumulative Duration (I=11). The value I=00 is reserved and MUST NOT be used.
