document: rfc-8260
kind: normative-requirement
summary: FORWARD-TSN MUST be used with DATA chunks and MUST NOT be used with I-DATA chunks. I-FORWARD-TSN MUST be used with I-DATA chunks and MUST NOT be used with DATA chunks. Reception of the wrong variant MUST cause the receiver to abort the association.
section: 2.3.1
rfc2119_level: MUST
topics:
