document: rfc-8255
kind: security-consideration
summary: Because language parts use Content-Type 'message/rfc822' or 'message/global', they may contain From fields that differ from the top-level From address. A non-conforming email client that exposes these inner From values could mislead a recipient about the true sender's identity.
section: "10"
topics:
    - email
    - security
