document: rfc-3947
kind: wire-format
summary: The NAT-OA payload has a standard ISAKMP header, then an ID Type byte (RESERVED byte, RESERVED 2 bytes), followed by the IPv4 address (4 octets) or IPv6 address (16 octets). Only ID_IPV4_ADDR and ID_IPV6_ADDR types are allowed. Payload type is 21.
section: "5.2"
topics:
    - ipsec
    - vpn
    - nat
