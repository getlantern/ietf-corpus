document: rfc-9844
kind: security-consideration
summary: RFC 4007 imposes no formal limit on zone identifier string length. A UI implementation should apply an appropriate length limit (typically the OS limit on interface names) when inputting a zone identifier to minimize the risk of a buffer overrun.
section: "6"
