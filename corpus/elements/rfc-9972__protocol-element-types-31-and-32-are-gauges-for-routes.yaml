document: rfc-9972
kind: protocol-element
summary: Types 31 and 32 are Gauges for routes remaining before a license-customized route threshold is exceeded, globally and per-AFI/SAFI. These MUST NOT be reported if no such license is configured or if the license imposes no hard limit.
