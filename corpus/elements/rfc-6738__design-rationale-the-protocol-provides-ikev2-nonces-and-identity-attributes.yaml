document: rfc-6738
kind: design-rationale
summary: The protocol provides IKEv2 nonces and identity attributes to the HAAA so that the HAAA can compute a session-specific SK, avoiding transmission of a long-term PSK over the Diameter interface and supporting per-session key derivation by external protocols such as 3GPP2 X.S0047 and X.S0058.
section: "1"
topics:
