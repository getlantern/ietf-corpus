document: rfc-7701
kind: normative-requirement
summary: The conference focus MUST only use Message/CPIM as the top-level wrapper for MSRP message payloads, and MUST declare it in the SDP offer/answer. If an SDP offer does not include 'Message/CPIM' in accept-types, the focus SHOULD reject the MSRP stream or the entire SDP offer.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
