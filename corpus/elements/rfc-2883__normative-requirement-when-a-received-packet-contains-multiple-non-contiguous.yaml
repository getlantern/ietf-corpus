document: rfc-2883
kind: normative-requirement
summary: When a received packet contains multiple non-contiguous partial duplicate sub-segments, only the first duplicate sub-segment is reported in the D-SACK block. Subsequent duplicate sub-segments within the same packet are not reported.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - tcp
