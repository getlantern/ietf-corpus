document: rfc-5935
kind: interoperability-note
summary: Values of MIB objects defined with Textual Convention syntax are always encoded in XML as the underlying SMI base datatype, not as the TC type. This means, for example, InetAddress-typed objects use OctetString encoding, not IpAddress.
section: "1"
topics:
    - snmp
