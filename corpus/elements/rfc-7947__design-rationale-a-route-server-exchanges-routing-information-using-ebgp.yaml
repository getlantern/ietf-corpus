document: rfc-7947
kind: design-rationale
summary: A route server exchanges routing information using EBGP but does not forward traffic itself and is therefore not a router. It is analogous to a route reflector (RFC 4456) but operates using EBGP instead of IBGP.
section: "1"
topics:
