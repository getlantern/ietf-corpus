document: rfc-5295
kind: interoperability-note
summary: It is NOT RECOMMENDED to use keys derived from the EMSK as an exclusive security mechanism when their usage is not inherently tied to the lower layer where network access authentication was performed, as this creates problematic dependencies across architectural layers.
section: "1.1"
rfc2119_level: RECOMMENDED
topics:
    - crypto
    - security
