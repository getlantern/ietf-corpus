document: rfc-4291
kind: wire-format
summary: IPv6 multicast addresses have an 8-bit all-ones prefix (0xFF), a 4-bit flags field (0|R|P|T), a 4-bit scope field, and a 112-bit group ID. The T flag distinguishes IANA-assigned permanent (T=0) from transient (T=1) addresses.
section: "2.7"
topics:
    - ip
    - v6ops
    - multicast
