document: rfc-3033
kind: interoperability-note
summary: When a B-ISDN signaling message containing a User-user IE enters an ATM network that does not support User-to-user Signaling, the network clears the call, discards the information element, or discards the signaling message (per Q.2931 sections 4.5.1 and 5.6.8.1, Q.2957 section 1.9, and Q.2971 annex D).
section: 4.2.1
