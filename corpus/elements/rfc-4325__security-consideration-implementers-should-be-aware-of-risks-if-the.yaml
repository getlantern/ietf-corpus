document: rfc-4325
kind: security-consideration
summary: Implementers should be aware of risks if the AIA extensions of corrupted CRLs contain links to malicious code, and should always validate retrieved data to ensure it is properly formed. Additionally, the possible existence of multiple unrelated CAs and CRL issuers with the same name should be taken into account.
section: "3"
topics:
