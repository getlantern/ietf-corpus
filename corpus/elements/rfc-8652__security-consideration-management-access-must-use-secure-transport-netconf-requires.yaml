document: rfc-8652
kind: security-consideration
summary: 'Management access must use secure transport: NETCONF requires SSH (RFC 6242) as the mandatory-to-implement transport; RESTCONF requires HTTPS with TLS (RFC 8446). Access control is provided by NACM (RFC 8341) to restrict users to authorized operations and content.'
