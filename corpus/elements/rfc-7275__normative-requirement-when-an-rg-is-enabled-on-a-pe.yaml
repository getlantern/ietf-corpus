document: rfc-7275
kind: normative-requirement
summary: When an RG is enabled on a PE, an LDP session to every remote PE in that RG MUST be created if one does not already exist, and the ICCP capability MUST then be advertised to all LDP peers in that RG per RFC 5561. If the peer does not support dynamic capability advertisements, the ICCP Capability TLV MUST be included in LDP initialization.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
