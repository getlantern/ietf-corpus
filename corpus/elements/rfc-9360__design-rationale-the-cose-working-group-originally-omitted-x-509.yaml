document: rfc-9360
kind: design-rationale
summary: The COSE Working Group originally omitted X.509 certificate support from RFC 8152 and RFC 9052 because no use cases were presented at the time. This document was created after subsequent use cases emerged, such as constrained BRSKI device enrollment and EDHOC long-term certificate authentication.
