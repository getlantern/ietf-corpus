document: rfc-3256
kind: security-consideration
summary: Operation relies on an implied trusted relationship between the DHCP relay agent and the DHCP server, and between the cable modem and the relay agent via DOCSIS signaling. The device class identifier provided by the relay agent is assumed to be trusted, but cryptographic or other authentication techniques for the device class are outside the scope of this document.
section: "3"
topics:
