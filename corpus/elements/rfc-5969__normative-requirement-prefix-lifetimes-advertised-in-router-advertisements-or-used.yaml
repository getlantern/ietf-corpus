document: rfc-5969
kind: normative-requirement
summary: Prefix lifetimes advertised in Router Advertisements or used by DHCP on the CE LAN side MUST be equal to or shorter than the IPv4 address lease time. If the IPv4 lease time is unknown, the lifetime SHOULD follow the defaults specified in RFC 4861.
section: "4"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
