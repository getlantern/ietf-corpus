document: rfc-2829
kind: design-rationale
summary: The ANONYMOUS and PLAIN SASL mechanisms are not used with LDAP because LDAP provides native anonymous and plaintext authentication methods. This avoids redundancy and potential confusion between equivalent mechanisms.
