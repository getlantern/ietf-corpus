document: rfc-8159
kind: security-consideration
summary: Keyed IPv6 encapsulation provides traffic separation via separate 128-bit IPv6 addresses identifying tunnel endpoints. The mandatory 64-bit cookie provides an additional check ensuring arriving packets are intended for the identified tunnel, protecting against inadvertent frame leakage into customer VPNs as documented in RFC 3931 Section 8.2.
section: "8"
topics:
    - security
    - vpn
    - ip
