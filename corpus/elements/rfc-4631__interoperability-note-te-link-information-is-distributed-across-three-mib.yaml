document: rfc-4631
kind: interoperability-note
summary: 'TE link information is distributed across three MIB modules that must remain consistent: ifTable (RFC 2863) for interface parameters, lmpTeLinkTable for LMP-specific flags, and teLinkTable in TE-LINK-STD-MIB (RFC 4220) for generic TE link data. All three tables are co-indexed by the same ifIndex value.'
section: "6.4"
topics:
    - routing
    - mpls
