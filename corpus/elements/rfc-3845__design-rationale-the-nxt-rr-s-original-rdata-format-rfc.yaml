document: rfc-3845
kind: design-rationale
summary: The NXT RR's original RDATA format (RFC 2535) could only carry information about the existence of the first 127 types. RFC 2535 reserved a bit for an extension mechanism but never defined it, motivating this redefinition via NSEC rather than extending NXT.
section: "1"
topics:
