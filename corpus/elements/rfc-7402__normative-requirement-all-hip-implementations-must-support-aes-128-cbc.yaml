document: rfc-7402
kind: normative-requirement
summary: All HIP implementations MUST support AES-128-CBC and AES-256-CBC. The mandatory suite for interoperability is AES-128-CBC with HMAC-SHA-256; NULL with HMAC-SHA-256 SHOULD also be supported.
section: 3.3.5
rfc2119_level: MUST
