document: rfc-9234
kind: normative-requirement
summary: The OTC ingress and egress procedures apply ONLY to AFI 1 (IPv4) and AFI 2 (IPv6) with SAFI 1 (unicast), and MUST NOT be applied to other address families by default. The operator MUST NOT have the ability to modify these procedures.
section: "5"
rfc2119_level: MUST NOT
topics:
