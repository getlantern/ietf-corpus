document: rfc-5259
kind: protocol-element
summary: The CONVERT and UID CONVERT commands transcode a MIME part to another media type; they are structured similarly to FETCH/UID FETCH and return untagged CONVERTED responses. A single CONVERT command performs only one type of conversion; multiple conversions require multiple commands.
