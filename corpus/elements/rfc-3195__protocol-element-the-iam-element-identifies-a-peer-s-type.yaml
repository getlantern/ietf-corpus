document: rfc-3195
kind: protocol-element
summary: The 'iam' element identifies a peer's type (device, relay, or collector), FQDN, and IP address to the other end of a BEEP channel. The identity in effect is that of the most recently accepted 'iam'. An 'iam' may be rejected if authentication or authorization is inadequate.
section: 4.4.1
topics:
    - syslog
    - security
