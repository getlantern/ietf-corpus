document: rfc-8745
kind: normative-requirement
summary: When protection type is set to 1+1 (type=0x08 or 0x10), there MUST be at maximum only one working LSP and one protection LSP within a PPAG; attempts to add another MUST result in PCErr Error-Type 26, Error-Value 10.
section: "4.5"
rfc2119_level: MUST
topics:
