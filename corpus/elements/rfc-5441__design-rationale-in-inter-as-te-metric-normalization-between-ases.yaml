document: rfc-5441
kind: design-rationale
summary: In inter-AS TE, metric normalization between ASes may be required for path computation to be meaningful. Service providers should agree on a TE metric normalization scheme and use the TE metric (requested via the METRIC object) rather than modifying IGP metrics.
