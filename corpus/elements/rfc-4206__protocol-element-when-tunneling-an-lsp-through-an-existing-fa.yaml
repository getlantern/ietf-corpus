document: rfc-4206
kind: protocol-element
summary: When tunneling an LSP through an existing FA-LSP, the ERO is adjusted by removing the subsequence of hops within the FA-LSP and replacing it with just the endpoint of the FA-LSP. The PHOP in the message is set to the head-end of the FA-LSP.
section: "6.2"
topics:
    - mpls
    - routing
