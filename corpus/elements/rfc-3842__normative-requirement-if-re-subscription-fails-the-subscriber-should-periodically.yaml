document: rfc-3842
kind: normative-requirement
summary: If re-subscription fails, the Subscriber SHOULD periodically retry until a subscription is successful, taking care to backoff to avoid network congestion. If a subscription has expired, new re-subscriptions MUST use a new Call-ID.
section: "3.6"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
