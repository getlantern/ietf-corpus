document: rfc-4695
kind: protocol-element
summary: An RTP MIDI packet consists of an RTP header followed by a MIDI payload. The MIDI payload MUST begin with the MIDI command section (a possibly empty list of timestamped MIDI commands) and MAY also contain a journal section that provides resiliency by coding the recent history of the stream.
section: "2"
topics:
