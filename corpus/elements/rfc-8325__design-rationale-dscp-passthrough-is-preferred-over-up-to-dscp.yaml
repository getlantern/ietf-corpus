document: rfc-8325
kind: design-rationale
summary: DSCP passthrough is preferred over UP-to-DSCP mapping for upstream traffic because the 6→3→6-bit round-trip loses information (collapsing 12 differentiated service classes to 8), whereas passing the original DSCP preserves the full marking. Additionally, setting DSCP is far more accessible to application developers than setting 802.11 UP values.
section: "5.3"
topics:
    - diffserv
    - qos
