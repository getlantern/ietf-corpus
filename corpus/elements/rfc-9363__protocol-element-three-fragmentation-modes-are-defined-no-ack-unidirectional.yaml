summary: 'Three fragmentation modes are defined: No-ACK (unidirectional, no acknowledgment sent back), ACK-Always (each fragmentation window must be explicitly acknowledged before proceeding), and ACK-on-Error (a window is acknowledged only when the receiver detects missing fragments).'
