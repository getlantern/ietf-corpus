document: rfc-6430
kind: design-rationale
summary: Not-spam reports should not be used as immediate, automatic overrides (e.g., marking all similar messages as good based on a single report). Reports will likely be considered alongside other information and analysis because different users have different views of what constitutes spam, and users sometimes press "report not spam" accidentally.
section: "1.1"
topics:
    - email
