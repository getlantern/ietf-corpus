document: rfc-9168
kind: normative-requirement
summary: If the L (LPM) bit is set and the receiver does not support LPM route installation from Flow Specifications in the Flow Filter TLV, the peer MUST respond with PCErr Error-Type 30, Error-value 5 (Unsupported LPM Route).
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
