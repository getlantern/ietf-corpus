document: rfc-7196
kind: interoperability-note
summary: Cisco defaults use a Suppress Threshold of 2,000 and Re-Advertisement penalty of 0, while Juniper defaults use 3,000 and 1,000 respectively. There is currently no consensus on a single set of default RFD parameter values across implementations.
