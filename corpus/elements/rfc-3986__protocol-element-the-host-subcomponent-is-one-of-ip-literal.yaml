document: rfc-3986
kind: protocol-element
summary: 'The host subcomponent is one of: IP-literal (IPv6address or IPvFuture enclosed in "[" "]"), IPv4address in dotted-decimal, or reg-name. The "first-match-wins" rule disambiguates IPv4address from reg-name; host is case-insensitive.'
section: 3.2.2
topics:
