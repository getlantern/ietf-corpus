document: rfc-3403
kind: design-rationale
summary: The PREFERENCE field is separated from ORDER to allow domain administrators to direct clients toward more capable hosts or lighter-weight protocols among otherwise equivalent rules, while ORDER enforces mandatory processing sequence. DNS SRV or multiple A records are recommended for load balancing rather than PREFERENCE.
section: "4.1"
topics:
    - dns
