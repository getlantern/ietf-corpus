document: rfc-6262
kind: wire-format
summary: 'The Speech Payload Header is 12 bits: T (1 bit, reserved, must be 0), CR (3 bits, coding rate index), BR (3 bits, base rate index), D (1 bit, reserved, must be 1), A (1 bit, byte alignment), GR (2 bits, grouping size minus 1), R (1 bit, redundancy presence).'
