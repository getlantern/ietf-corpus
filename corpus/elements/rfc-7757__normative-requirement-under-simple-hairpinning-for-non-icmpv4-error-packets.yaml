document: rfc-7757
kind: normative-requirement
summary: Under simple hairpinning, for non-ICMPv4-error packets, the EAM algorithm MUST NOT be used to translate the source address in the IPv4 header; for ICMPv4 errors, the EAM algorithm MUST NOT be used for the inner destination address.
section: 4.2.1
rfc2119_level: MUST NOT
topics:
