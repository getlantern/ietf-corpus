document: rfc-9810
kind: security-consideration
summary: Trust anchor provisioning via CMP messages requires that the initial trust anchor is acquired through a trustworthy out-of-band mechanism; bootstrapping (e.g., BRSKI or SZTP) establishes the root CA public key before any CMP message-based provisioning can be considered secure.
section: "8.9"
topics:
    - pkix
    - security
