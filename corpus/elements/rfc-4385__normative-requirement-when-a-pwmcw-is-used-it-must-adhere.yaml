document: rfc-4385
kind: normative-requirement
summary: When a PWMCW is used, it MUST adhere to the Generic format with bits 0–3 set to zero. It SHOULD also use the Preferred format (Flags, FRG, Length, Sequence Number) to provide consistency across PW designs.
