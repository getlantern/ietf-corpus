document: rfc-9358
kind: design-rationale
summary: VNAG IDs are dynamic and created by the parent PCE (MDSC) based on VN operations, rather than being operator-configured. This design reflects that the parent PCE determines VN membership in response to customer requests, making static operator assignment of ID ranges unnecessary and potentially conflicting.
section: "3"
topics:
    - mpls
    - routing
