document: rfc-3659
kind: interoperability-note
summary: Pathnames containing the CRLF character pair cannot be transmitted over an FTP data connection (it is indistinguishable from the end-of-line indicator). Files with such names must either encode the sequence or be omitted from directory listings.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
