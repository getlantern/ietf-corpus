document: rfc-8044
kind: design-rationale
summary: Tagged attributes (RFC 2868) are not given their own data types because RFC 6158 Section 2.1 discourages their use and they are defined as backwards-compatible with existing types. Similarly, some complex attributes like CHAP-Password are left as 'string' to avoid excessive specification complexity.
