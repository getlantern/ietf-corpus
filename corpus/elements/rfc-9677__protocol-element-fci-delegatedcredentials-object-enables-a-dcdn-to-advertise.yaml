document: rfc-9677
kind: protocol-element
summary: FCI.DelegatedCredentials object enables a dCDN to advertise the maximum number of delegated credentials it supports, typically corresponding to the number of servers designated to support delegated credentials. It contains a mandatory integer property 'number-delegated-certs-supported' and an optional 'PrivateKeyEncryptionKey' property.
section: "3.1"
topics:
