document: rfc-9375
kind: security-consideration
summary: The YANG module must be accessed via NETCONF over SSH (mandatory-to-implement, RFC 6242) or RESTCONF over HTTPS/TLS 1.3 (mandatory-to-implement, RFC 8446). Access control must be enforced using NACM (RFC 8341) to restrict read and write access to sensitive PM data nodes.
section: "6"
topics:
