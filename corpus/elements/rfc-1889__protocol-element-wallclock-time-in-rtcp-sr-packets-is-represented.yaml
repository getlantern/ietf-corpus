document: rfc-1889
kind: protocol-element
summary: Wallclock time in RTCP SR packets is represented as a 64-bit NTP timestamp (seconds since 0h UTC 1 January 1900); compact representations elsewhere use the middle 32 bits (low 16 of integer part, high 16 of fractional part). The DLSR field is expressed in units of 1/65536 seconds.
section: "4"
topics:
