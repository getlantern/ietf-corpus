document: rfc-4314
kind: normative-requirement
summary: The server MUST either grant all tied rights to the identifier in a mailbox or grant none. The same right MUST NOT be listed more than once in the LISTRIGHTS response.
section: "3.7"
rfc2119_level: MUST
