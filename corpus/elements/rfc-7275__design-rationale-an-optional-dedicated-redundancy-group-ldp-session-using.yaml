document: rfc-7275
kind: design-rationale
summary: An optional dedicated Redundancy Group LDP session (using a separate TCP/IP session with a non-zero label space identifier) is defined to distribute load across processors and avoid head-of-line blocking to other LDP applications when large volumes of RG information must be exchanged rapidly.
