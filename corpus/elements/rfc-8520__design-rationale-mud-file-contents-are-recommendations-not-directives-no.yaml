document: rfc-8520
kind: design-rationale
summary: 'MUD file contents are recommendations, not directives: ''no matter what the manufacturer specifies in a MUD file, these are not directives, but suggestions.'' Local network administrators ultimately decide how and whether to instantiate them, preserving operational autonomy.'
