document: rfc-4836
kind: protocol-element
summary: ifMauDefaultType is a read-write AutonomousType object identifying the administratively-configured MAU type. When auto-negotiation is disabled it determines the operational type; when auto-negotiation is enabled it is the type the MAU will revert to if auto-negotiation is later disabled. Implementors must ensure ifMauType tracks this value correctly when auto-negotiation is disabled.
section: "4"
topics:
