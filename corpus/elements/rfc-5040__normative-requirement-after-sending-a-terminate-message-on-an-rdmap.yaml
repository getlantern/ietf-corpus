document: rfc-5040
kind: normative-requirement
summary: After sending a Terminate Message on an RDMAP Stream, the Local Peer MUST NOT send any more Messages on that stream. The Terminate Message MUST reference Queue Number 2, and MUST be Delivered to the Remote Peer's RDMAP layer, which MUST then Deliver it to the ULP.
section: "5.4"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
