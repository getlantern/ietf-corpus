document: rfc-8286
kind: security-consideration
summary: An attacker who modifies splicing timestamps could cause splicing to fail (substitutive content unavailable at the right time) or could prevent receivers from receiving main content by inserting spurious splicing intervals. Header extension authentication should be used to prevent these attacks.
section: "7"
