document: rfc-9002
kind: normative-requirement
summary: When a PTO timer expires, the PTO backoff MUST be increased by doubling the PTO period. The backoff is reset when an acknowledgment is received, except a client does not reset the PTO backoff on receiving Initial packet acknowledgments until the server completes address validation.
section: 6.2.1
rfc2119_level: MUST
topics:
    - quic
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
