document: rfc-2024
kind: protocol-element
summary: dlswTConnConfigInitCirRecvWndw (0–65535 SSP messages, default 1) sets the initial circuit receive pacing window sent in the capabilities exchange for future transport connections. A larger value is appropriate for partners reachable via high-latency paths.
