document: rfc-2579
kind: wire-format
summary: The DISPLAY-HINT for INTEGER-syntax objects consists of a format character ('x', 'd', 'o', 'b') and an optional decimal-point offset specified as '-N' (e.g., 'd-2' renders 1234 as '12.34'). Leading zeros are omitted; negative values prefix a minus sign.
section: "3.1"
