document: rfc-3492
kind: security-consideration
summary: If a Unicode string could map to multiple ACE labels, an internationalized domain name could map to multiple ASCII domain names controlled by different authorities, enabling spoofing attacks that hijack service requests. Punycode is therefore designed so that each Unicode string has exactly one encoding.
section: "8"
topics:
    - dns
    - security
