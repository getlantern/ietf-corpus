document: rfc-8840
kind: normative-requirement
summary: When an Answerer sends an Answer in an unreliable provisional response, the Offerer MUST send a Trickle ICE INFO request as soon as it receives that Answer; this INFO request MUST repeat the candidates that were already provided in the Offer.
section: 4.3.2
rfc2119_level: MUST
