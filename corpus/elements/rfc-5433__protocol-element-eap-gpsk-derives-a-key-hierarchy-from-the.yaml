summary: 'EAP-GPSK derives a key hierarchy from the PSK: Master Key MK (KS octets), MSK (64 octets), EMSK (64 octets), session integrity key SK (KS octets), and optional session encryption key PK (KS octets). All keys are derived via the ciphersuite-specified KDF over inputString = RAND_Peer || ID_Peer || RAND_Server || ID_Server.'
