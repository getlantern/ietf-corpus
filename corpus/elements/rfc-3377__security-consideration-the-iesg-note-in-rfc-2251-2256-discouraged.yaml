document: rfc-3377
kind: security-consideration
summary: The IESG Note in RFC 2251–2256 discouraged deployment of LDAPv3 clients or servers implementing update functionality until a Proposed Standard for mandatory authentication was published. RFC 2829 satisfies that requirement, formally addressing the security concern. Implementors should refer to RFC 2829, RFC 2251, and RFC 2830 for LDAPv3 security details.
section: "4"
topics:
    - ldap
    - security
