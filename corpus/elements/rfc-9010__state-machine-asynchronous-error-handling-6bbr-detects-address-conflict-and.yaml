summary: 'Asynchronous error handling: 6BBR detects address conflict and sends NA(EARO) to 6LBR → 6LBR sends EDAC to root → root sends DCO to 6LR → 6LR sends NA(EARO) with R=0 to 6LN. The RUL then attempts re-registration with a different 6LR.'
