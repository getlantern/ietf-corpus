document: rfc-8345
kind: protocol-element
summary: The `ietf-network-topology` module augments `ietf-network` with a `link` list keyed by `link-id` (type `inet:uri`). A link has `source` (source-node, source-tp) and `destination` (dest-node, dest-tp) containers, plus a `supporting-link` list for underlay link mappings. Links are strictly point-to-point and unidirectional.
section: "4.2"
topics:
