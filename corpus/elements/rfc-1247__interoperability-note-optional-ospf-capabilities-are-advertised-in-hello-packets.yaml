document: rfc-1247
kind: interoperability-note
summary: Optional OSPF capabilities are advertised in Hello packets, Database Description packets, and LSAs. Mismatch in area-wide capabilities (e.g., E-bit for external routing in stub areas) prevents neighbor relationships from forming; mismatch in negotiable capabilities reduces the set of LSAs exchanged.
section: "4.5"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
