document: rfc-4825
kind: protocol-element
summary: When a server rejects a PUT with 409 (Conflict), it MAY return an application/xcap-error+xml body (namespace urn:ietf:params:xml:ns:xcap-error) providing a structured error element. Defined error types include 'schema-validation-error', 'cannot-insert', 'uniqueness-failure', 'constraint-failure', 'not-xml-frag', 'not-xml-att-value', 'no-parent', and 'not-well-formed'.
section: "11"
topics:
    - http
