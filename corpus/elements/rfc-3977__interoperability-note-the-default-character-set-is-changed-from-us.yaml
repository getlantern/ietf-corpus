document: rfc-3977
kind: interoperability-note
summary: The default character set is changed from US-ASCII (RFC 977) to UTF-8 in this specification. Implementations MUST be prepared to receive headers using octets 128–255 in other encodings when articles arrive from external sources, and MUST NOT assume headers are always valid UTF-8.
section: "10"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
