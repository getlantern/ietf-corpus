document: rfc-6550
kind: security-consideration
summary: 'RPL defines three security modes: unsecured (relies on link-layer security), preinstalled (pre-deployed keys protect RPL control messages), and authenticated (pre-installed key allows leaf-only joining; becoming a router requires a key from an external authentication authority whose key-distribution mechanism is out of scope and must be specified in a companion document).'
section: 3.2.3
topics:
    - routing
    - security
    - crypto
