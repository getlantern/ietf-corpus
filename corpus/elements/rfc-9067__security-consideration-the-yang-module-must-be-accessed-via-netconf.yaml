document: rfc-9067
kind: security-consideration
summary: The YANG module must be accessed via NETCONF over SSH (mandatory secure transport per RFC 6242) or RESTCONF over HTTPS/TLS 1.3 (RFC 8446). Access control should be enforced using the Network Configuration Access Control Model (NACM, RFC 8341).
section: "8"
topics:
