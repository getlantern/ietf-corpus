document: rfc-6549
kind: normative-requirement
summary: Implementations that support both this specification and the OSPF MIB (RFC 4750) should also implement SNMP Notification filtering (RFC 3413 Section 6) to suppress spurious ospfIfAuthFailure or ospfVirtIfAuthFailure notifications generated when legacy OSPFv2 routers are deployed on the same subnet.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - routing
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
