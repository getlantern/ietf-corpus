document: rfc-3412
kind: normative-requirement
summary: The msgID field MUST NOT be the same as the msgID used for any currently outstanding request. Values must be chosen to avoid replay attacks; they do not need to be unpredictable but must not repeat across outstanding requests.
section: "7.1"
rfc2119_level: MUST NOT
topics:
    - snmp
    - security
