document: rfc-7463
kind: protocol-element
summary: The <joined-dialog> element, a child of <dialog>, carries the call-id, local-tag, and remote-tag of any dialogs mixed or bridged with the current dialog. Joined dialogs share the same appearance number, and only the UA controlling the mixing should include this element in publications.
section: 5.2.3
topics:
    - sip
    - realtime
