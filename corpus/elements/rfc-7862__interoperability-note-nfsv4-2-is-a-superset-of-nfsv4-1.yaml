document: rfc-7862
kind: interoperability-note
summary: NFSv4.2 is a superset of NFSv4.1 with all new features optional. An NFSv4.2 metadata server can hand out pNFS file layouts to NFSv4.1 storage devices; stateids returned by NFSv4.2 COMPOUNDs may be used in NFSv4.1 COMPOUNDs directed to data servers.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
