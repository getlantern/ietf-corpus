document: rfc-2333
kind: protocol-element
summary: The Q bit in an NHRP Request indicates that the requesting party is a router. If the Q bit is set and the destination is directly adjacent to the egress router as a stable topological configuration, the egress router may issue a corresponding NHRP reply.
section: "3"
topics:
