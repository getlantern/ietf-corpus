document: rfc-1171
kind: normative-requirement
summary: The Magic-Number field in Echo-Request, Echo-Reply, and Discard-Request packets MUST always be transmitted as zero and MUST always be ignored on reception unless modified by a Configuration Option. It aids in detecting loopbacked links.
section: 4.4.8
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
