document: rfc-9545
kind: interoperability-note
summary: Similar to Synonymous Flow Labels (RFC 8957), the introduction of a PSID to an existing flow may cause that flow to take a different path under ECMP; therefore the SFL considerations in Section 5 of RFC 8957 also apply to PSIDs.
section: "2.1"
topics:
    - mpls
    - routing
