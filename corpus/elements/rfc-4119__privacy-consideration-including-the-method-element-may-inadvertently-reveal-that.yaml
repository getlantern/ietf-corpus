document: rfc-4119
kind: privacy-consideration
summary: Including the 'method' element may inadvertently reveal that location information has been coarsened; for example, a 'DHCP' method tag paired with only city-level location strongly signals withheld information. Implementers should weigh this disclosure risk when including the 'method' element.
section: 2.2.3
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
