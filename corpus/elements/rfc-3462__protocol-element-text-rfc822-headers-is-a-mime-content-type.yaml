document: rfc-3462
kind: protocol-element
summary: 'Text/RFC822-Headers is a MIME content type (type: Text, subtype: RFC822-Headers) that provides a mechanism to label and return only the RFC 822 headers of a failed message. No required or optional parameters are defined; 7-bit encoding is sufficient for normal RFC 822 headers.'
