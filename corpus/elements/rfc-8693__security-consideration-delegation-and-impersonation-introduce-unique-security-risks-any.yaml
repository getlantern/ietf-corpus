document: rfc-8693
kind: security-consideration
summary: 'Delegation and impersonation introduce unique security risks: any time one principal is delegated the rights of another, the potential for abuse exists. Use of the ''scope'' claim, combined with limited token lifetimes, is recommended to mitigate abuse by restricting the contexts in which delegated rights can be exercised.'
section: "5"
topics:
    - oauth
    - security
