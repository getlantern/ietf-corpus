document: rfc-5839
kind: normative-requirement
summary: A Suppress-If-Match header field with entity-tag value of '*' MUST always evaluate to true, effectively quenching the subscription so only state-change notifications and out-of-dialog SUBSCRIBE responses are received (without body).
section: "6.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
