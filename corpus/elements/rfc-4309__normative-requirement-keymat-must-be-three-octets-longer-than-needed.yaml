document: rfc-4309
kind: normative-requirement
summary: 'KEYMAT MUST be three octets longer than needed for the AES key. For 128-bit key: 19 octets (16 key + 3 salt); 192-bit: 27 octets; 256-bit: 35 octets. The trailing 3 octets are the salt.'
section: "7.1"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
