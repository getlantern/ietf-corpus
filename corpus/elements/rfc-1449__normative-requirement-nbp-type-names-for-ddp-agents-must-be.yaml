document: rfc-1449
kind: normative-requirement
summary: NBP type names for DDP agents must be 'SNMP Agent' and for notification sinks must be 'SNMP Trap Handler'; these names must be stored in stable storage and should not change more often than a typical TCP/IP node's IP address.
section: "5.2"
rfc2119_level: MUST
topics:
    - snmp
