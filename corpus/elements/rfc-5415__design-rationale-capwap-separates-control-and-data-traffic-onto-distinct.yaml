document: rfc-5415
kind: design-rationale
summary: CAPWAP separates control and data traffic onto distinct UDP ports (5246 and 5247 respectively) to allow different QoS treatment and independent security policies. DTLS protection is mandatory for control traffic but optional for data traffic, accommodating performance-sensitive forwarding scenarios.
section: 4.5.2
topics:
    - udp
    - qos
