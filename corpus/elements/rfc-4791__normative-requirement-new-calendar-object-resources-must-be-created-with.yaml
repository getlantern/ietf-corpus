document: rfc-4791
kind: normative-requirement
summary: 'New calendar object resources MUST be created with a PUT request targeted at an unmapped URI. Clients SHOULD use the HTTP "If-None-Match: *" request header on the PUT request when creating a new non-collection resource to avoid overwriting an existing resource.'
section: 5.3.2
rfc2119_level: MUST
topics:
    - http
