document: rfc-6236
kind: design-rationale
summary: It is recommended that a device with no image size preference still includes 'imageattr' with wildcard parameters (e.g., 'a=imageattr:97 send * recv *') so that the other side can express its own preferences. Without this, the answerer cannot include imageattr in the answer.
section: 3.2.1
topics:
    - realtime
