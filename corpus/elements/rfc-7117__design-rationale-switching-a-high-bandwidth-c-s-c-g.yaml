document: rfc-7117
kind: design-rationale
summary: Switching a high-bandwidth (C-S, C-G) stream to a Selective tree is beneficial when the pseudo-wasted bandwidth—bandwidth multiplied by the number of PEs receiving the stream but having no receivers—exceeds a configured threshold; low-bandwidth streams may not warrant the additional tree state even if sparsely subscribed.
section: "8"
topics:
