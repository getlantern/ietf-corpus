summary: 'Two new TLV types are registered in the IANA IS-IS TLV registry: GADDR-TLV (type 142, LSP only, multiple occurrences allowed) and TRILL Neighbor TLV (type 145, IIH only, multiple occurrences allowed). Eleven new sub-TLVs are registered across the MT-PORT-CAP, Router Capability, and Extended IS Reachability TLV sub-registries.'
