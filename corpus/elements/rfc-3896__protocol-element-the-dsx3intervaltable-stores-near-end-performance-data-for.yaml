document: rfc-3896
kind: protocol-element
summary: The dsx3IntervalTable stores near-end performance data for up to 96 completed 15-minute intervals (24 hours), indexed by dsx3IntervalIndex and dsx3IntervalNumber (1=most recent). Includes a dsx3IntervalValidData TruthValue flag to indicate whether interval data is valid.
