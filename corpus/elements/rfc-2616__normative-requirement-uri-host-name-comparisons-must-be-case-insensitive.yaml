document: rfc-2616
kind: normative-requirement
summary: URI host name comparisons MUST be case-insensitive and scheme name comparisons MUST be case-insensitive. An empty abs_path is equivalent to '/' and an absent port is equivalent to the default port for the scheme.
section: 3.2.3
rfc2119_level: MUST
topics:
    - http
