document: rfc-3730
kind: protocol-element
summary: 'The <transfer> command manages object sponsorship changes using an ''op'' attribute: ''request'' initiates, ''cancel'' withdraws, ''approve'' accepts, ''reject'' declines, and ''query'' checks status. Transfer responses MUST include object identity, transfer status, requesting/authorized client identifiers, request/action timestamps, and optionally a validity-period change timestamp.'
section: 2.9.3.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
