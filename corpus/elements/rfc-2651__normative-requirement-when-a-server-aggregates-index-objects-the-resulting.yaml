document: rfc-2651
kind: normative-requirement
summary: When a server aggregates index objects, the resulting object must have Base-URIs characteristic of the local server for each protocol it supports, and the outgoing objects should have the DSI of the local server.
section: 3.2.3
rfc2119_level: MUST
