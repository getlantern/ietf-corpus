document: rfc-4509
kind: design-rationale
summary: Zone operators should consider deploying both SHA-1 and SHA-256 DS records for every DNSKEY during the transition period, because zone administrators cannot control how quickly validators add SHA-256 support, and dropping SHA-1 prematurely could break authentication paths.
