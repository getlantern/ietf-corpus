document: rfc-9300
kind: normative-requirement
summary: Locator-Status-Bits MUST NOT be used over the public Internet and SHOULD only be used in trusted and closed deployments. They SHOULD be coupled with Map-Versioning to prevent race conditions where LSBs are interpreted as referring to different RLOCs than intended.
section: "10"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
