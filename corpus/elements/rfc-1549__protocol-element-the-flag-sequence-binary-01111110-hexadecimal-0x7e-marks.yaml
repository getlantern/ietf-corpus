document: rfc-1549
kind: protocol-element
summary: The Flag Sequence (binary 01111110, hexadecimal 0x7e) marks the beginning or end of a frame and serves as a frame separator. Only one Flag Sequence is required between two frames; two consecutive Flag Sequences constitute an empty frame that is ignored and not counted as an FCS error.
section: "3.1"
