document: rfc-6001
kind: protocol-element
summary: The Interface Adjustment Capability Descriptor (IACD) is a TE link sub-TLV that describes the adjustment capability between two switching layers at a hybrid node, including Lower SC, Lower Encoding, Upper SC, Upper Encoding, Max LSP Bandwidth at eight priority levels (IEEE 754 float, bytes/second), and variable Adjustment Capability-specific information.
section: "3.2"
topics:
