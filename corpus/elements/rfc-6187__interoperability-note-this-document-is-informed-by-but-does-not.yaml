document: rfc-6187
kind: interoperability-note
summary: This document is informed by but does not maintain strict compatibility with an earlier proposal for X.509v3 certificates in SSH by O. Saarenmaa and J. Galbraith. Signing and verification for x509v3-ssh-dss, x509v3-ssh-rsa, and x509v3-ecdsa-sha2-* use the same encoding as their non-certificate SSH counterparts (ssh-dss, ssh-rsa, ecdsa-sha2-*).
section: "1"
topics:
