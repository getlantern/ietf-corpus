summary: 'Two diagnostic test identities are defined: dot3TestTdr (Time-Domain Reflectometry, specific to 10Base5/10Base2, returns a time interval in 10 MHz ticks to the nearest cable fault) and dot3TestLoopBack (internal MAC chip loopback of memory, data paths, and logic; requires the interface to be offline).'
