document: rfc-5908
kind: wire-format
summary: The NTP_SUBOPTION_SRV_FQDN suboption (code 3) carries the Fully-Qualified Domain Name of an NTP/SNTP server. The suboption-len reflects the variable length of the FQDN field, encoded per RFC 3315 Section 8. Internationalized domain names are not allowed.
section: "4.3"
topics:
    - ntp
    - dns
