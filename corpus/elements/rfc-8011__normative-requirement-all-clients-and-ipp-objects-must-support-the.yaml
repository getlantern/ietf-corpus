document: rfc-8011
kind: normative-requirement
summary: All Clients and IPP objects MUST support the 'utf-8' charset. If a Printer does not support the Client-supplied charset value, the Printer MUST reject the request, set 'attributes-charset' to 'utf-8' in the response, and return 'client-error-charset-not-supported' with any text or name attributes encoded in UTF-8.
section: 4.1.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
