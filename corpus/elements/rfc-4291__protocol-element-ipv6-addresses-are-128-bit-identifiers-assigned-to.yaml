summary: 'IPv6 addresses are 128-bit identifiers assigned to interfaces, not nodes. There are three types: Unicast (single interface), Anycast (nearest of a set), and Multicast (all in a group). IPv6 eliminates broadcast; multicast supersedes that function.'
