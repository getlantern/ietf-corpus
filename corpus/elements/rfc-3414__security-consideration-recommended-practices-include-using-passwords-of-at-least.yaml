document: rfc-3414
kind: security-consideration
summary: Recommended practices include using passwords of at least 8 characters drawn from at least 64 possible characters, generating localized keys from passwords using the password-to-key algorithm rather than using short passwords directly as keys, and using different passwords for different security levels and users.
