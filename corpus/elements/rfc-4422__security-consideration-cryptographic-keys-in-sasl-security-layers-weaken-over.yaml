document: rfc-4422
kind: security-consideration
summary: Cryptographic keys in SASL security layers weaken over time and use. The SASL framework does not itself provide re-keying; mechanism designers should consider providing it. Implementations wishing to re-key where the mechanism does not support it SHOULD reauthenticate with the same identities to replace expiring security layers.
section: "6.3"
topics:
    - security
    - crypto
