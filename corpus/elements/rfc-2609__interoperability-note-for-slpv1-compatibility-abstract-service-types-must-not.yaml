document: rfc-2609
kind: interoperability-note
summary: 'For SLPv1 compatibility: abstract service types must not be used (SLPv1 does not support them); opaque values must be converted from ''\FF'' hex notation to radix-64; escape characters must use HTML convention ''&#DIGIT;'' rather than ''\'' HEXDIG HEXDIG.'
section: 1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
