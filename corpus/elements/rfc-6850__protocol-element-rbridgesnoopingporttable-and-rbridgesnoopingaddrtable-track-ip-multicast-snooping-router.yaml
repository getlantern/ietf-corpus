summary: 'rbridgeSnoopingPortTable and rbridgeSnoopingAddrTable track IP multicast snooping: router type (ipv4, ipv6, ipv4v6) per port/VLAN, and listener port sets per multicast address. Only global IPv4 (4-byte) and IPv6 (16-byte) address types are required.'
