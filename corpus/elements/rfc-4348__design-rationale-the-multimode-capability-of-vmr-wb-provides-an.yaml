summary: 'The multimode capability of VMR-WB provides an advantage for congestion control over single-rate codecs: bandwidth demand can be adjusted by selecting a different operating mode, and the number of frame-blocks per RTP payload can also be tuned to reduce header overhead at the expense of increased delay.'
