document: rfc-9196
kind: interoperability-note
summary: If different data nodes covered by a single subscription have different values for a specific capability, using values acceptable for only some of those nodes may result in the rejection of the subscription. Subscribers must account for the most restrictive capability across the subscription scope.
section: "5.2"
topics:
    - yang
    - netconf
