document: rfc-1256
kind: state-machine
summary: A router interface transitions to 'advertising' state when enabled with at least one Advertise=TRUE address, when IP forwarding is turned on, or when an Advertise flag is set TRUE. It leaves advertising state when disabled, shut down, forwarding is turned off, or all Advertise flags become FALSE. On cessation, it is recommended (not required) to send a final advertisement with Lifetime=0.
section: "4.3"
topics:
    - ip
    - routing
