document: rfc-9956
kind: security-consideration
summary: Traffic protection mechanisms that maintain per-microflow state are vulnerable to flow-state exhaustion attacks. This document requires that traffic protection be designed such that the node does not fail (e.g., crash) if microflow state is exhausted, for example by limiting resources dedicated to tracking misbehaving flows.
section: "9"
topics:
