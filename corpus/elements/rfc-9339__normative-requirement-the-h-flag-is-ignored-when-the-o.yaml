document: rfc-9339
kind: normative-requirement
summary: The H flag is ignored when the O flag is set; these two flags are mutually exclusive. When H is set and O is clear, the metric from the TLV is used only when it is higher than the provisioned metric.
section: "6"
rfc2119_level: MUST
topics:
    - routing
