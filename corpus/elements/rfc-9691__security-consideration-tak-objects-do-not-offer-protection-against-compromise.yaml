document: rfc-9691
kind: security-consideration
summary: TAK objects do not offer protection against compromise of the current or successor TA private key. A malicious actor using TAK objects to cause RPs to transition to a successor key requires first having compromised the current TA private key, which already gives complete control over the TA.
section: "10.2"
topics:
    - routing
    - pkix
    - security
