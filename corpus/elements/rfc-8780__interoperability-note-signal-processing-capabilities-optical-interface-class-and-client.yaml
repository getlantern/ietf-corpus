document: rfc-8780
kind: interoperability-note
summary: Signal processing capabilities (Optical Interface Class and Client Signal) are already addressed in GMPLS signaling (RFC 7581, RFC 7688). This document extends PCEP to carry the same constraints during path computation, ensuring the PCE-computed path is compatible with the signaling-layer signal compatibility requirements.
section: "4.4"
topics:
    - routing
