document: rfc-821
kind: normative-requirement
summary: Undeliverable mail notification messages must use a null reverse-path in the MAIL command (MAIL FROM:<>) to prevent error-notification loops. Server-SMTPs must not send notification messages about problems with notification messages.
section: "3.6"
rfc2119_level: MUST
topics:
    - email
