document: rfc-2467
kind: normative-requirement
summary: The default MTU size for IPv6 packets on an FDDI network is 4352 octets. This is smaller than the theoretical maximum of 4470 octets to allow for variable sizes and possible future extensions of the MAC header and frame status fields.
section: "2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
