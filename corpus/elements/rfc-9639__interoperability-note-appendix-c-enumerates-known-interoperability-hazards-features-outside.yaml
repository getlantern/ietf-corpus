document: rfc-9639
kind: interoperability-note
summary: 'Appendix C enumerates known interoperability hazards: features outside the streamable subset, variable block size handling, 5-bit Rice parameters, Rice escape codes, uncommon block sizes and bit depths, multi-channel audio, uncommon sample rates, and changing audio properties mid-stream. Older decoders may not support these features.'
