document: rfc-8375
kind: normative-requirement
summary: An authoritative DNS server that checks for delegation before answering authoritatively for 'home.arpa.' MUST be configurable to either skip this check or ignore its results, since 'home.arpa.' will never have a global delegation.
section: "4"
rfc2119_level: MUST
topics:
    - dns
