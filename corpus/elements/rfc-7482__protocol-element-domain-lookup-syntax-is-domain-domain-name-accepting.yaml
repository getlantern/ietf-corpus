document: rfc-7482
kind: protocol-element
summary: Domain lookup syntax is 'domain/<domain name>', accepting fully qualified domain names in in-addr.arpa or ip6.arpa zones (for RIRs) or zones administered by the server (for DNRs). IDNs in either A-label or U-label format per RFC 5890 are also valid.
section: 3.1.3
topics:
    - dns
    - http
    - registry
