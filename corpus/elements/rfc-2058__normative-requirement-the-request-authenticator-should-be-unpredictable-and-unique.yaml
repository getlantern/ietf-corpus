document: rfc-2058
kind: normative-requirement
summary: The Request Authenticator SHOULD be unpredictable and unique over the lifetime of the shared secret; reuse of a value with the same secret would allow an attacker to replay a previously intercepted response. The value SHOULD exhibit global and temporal uniqueness.
section: "3"
rfc2119_level: SHOULD
