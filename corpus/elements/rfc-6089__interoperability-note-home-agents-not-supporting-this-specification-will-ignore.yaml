document: rfc-6089
kind: interoperability-note
summary: Home agents not supporting this specification will ignore flow identification mobility options and sub-options, leaving the rest of the protocol unaffected. A Binding Acknowledgement returned without flow identification options signals the peer's inability to support these extensions.
section: 5.2.6
topics:
