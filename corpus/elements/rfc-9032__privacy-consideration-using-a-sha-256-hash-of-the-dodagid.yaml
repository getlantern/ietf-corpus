document: rfc-9032
kind: privacy-consideration
summary: Using a SHA-256 hash of the DODAGID (typically the IPv6 address of the RPL mesh root) for the network ID provides some privacy compared to using the DODAGID directly, as it does not directly reveal addresses used within the network.
