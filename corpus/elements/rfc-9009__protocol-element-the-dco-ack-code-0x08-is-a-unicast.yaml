document: rfc-9009
kind: protocol-element
summary: The DCO-ACK (code 0x08) is a unicast acknowledgment message for DCO. It includes RPLInstanceID, D flag, DCOSequence (echoed from DCO), and a DCO-ACK Status field based on the RPL Status Format. A StatusValue of 0 with U=0 indicates success; StatusValue of 1 with U=1 indicates 'No routing entry'.
section: 4.3.4
topics:
    - routing
