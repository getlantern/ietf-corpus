document: rfc-856
kind: interoperability-note
summary: When receiving binary data into a process, the OS may intercept certain control characters (e.g., ETX/Control-C on TOPS-20) and not pass them to the process, potentially breaking transparent binary delivery; implementers must consider this.
section: "6"
