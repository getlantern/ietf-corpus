document: rfc-7978
kind: interoperability-note
summary: IS-IS CRYPTO_AUTH-Based Authentication (SType = 1) is applicable to RBridge-to-RBridge extended RBridge Channel messages because RBridges are IS-IS routers and can be expected to hold IS-IS keying material. However, how end stations would obtain such material is out of scope, so this SType may not be usable for native RBridge Channel messages between an RBridge and an end station.
section: "4.3"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
