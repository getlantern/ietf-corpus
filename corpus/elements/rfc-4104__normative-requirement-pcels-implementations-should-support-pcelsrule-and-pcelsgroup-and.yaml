document: rfc-4104
kind: normative-requirement
summary: PCELS implementations SHOULD support pcelsRule and pcelsGroup (and their subclasses) and MAY also support the superseded pcimRule and pcimGroup from RFC 3703. Applications supporting pcelsRule/pcelsGroup MUST use pcelsPolicySetAssociation for aggregation.
section: "4.5"
rfc2119_level: SHOULD
