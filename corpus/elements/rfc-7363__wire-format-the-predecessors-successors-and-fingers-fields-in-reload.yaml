document: rfc-7363
kind: wire-format
summary: The 'predecessors', 'successors', and 'fingers' fields in RELOAD Update requests are variable-length, preceded by two length bytes (allowing lengths up to 2^16-1). The number of NodeId structures can be calculated from the length bytes since each NodeId is 16 bytes.
section: "5.1"
