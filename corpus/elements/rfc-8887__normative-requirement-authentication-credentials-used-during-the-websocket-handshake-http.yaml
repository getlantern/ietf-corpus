document: rfc-8887
kind: normative-requirement
summary: Authentication credentials used during the WebSocket handshake HTTP request remain in effect for the duration of the WebSocket connection. If credentials expire, the server MAY send a Close frame with status code 1008 (Policy Violation).
section: "4.2"
rfc2119_level: MAY
topics:
    - websocket
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
