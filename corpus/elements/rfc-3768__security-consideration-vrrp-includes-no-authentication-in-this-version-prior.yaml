document: rfc-3768
kind: security-consideration
summary: 'VRRP includes no authentication in this version. Prior authentication types were removed because operational experience showed they did not provide real security: even with cryptographic protection of VRRP messages, a hostile router can still behave as a Master, creating multiple masters and causing the same disruption as having no routers.'
section: "10"
topics:
    - security
