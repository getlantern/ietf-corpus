document: rfc-8628
kind: design-rationale
summary: User codes are recommended to use a case-insensitive A-Z character set (avoiding vowels and ambiguous characters like '0'/'O', '1'/'l'/'I') with dashes for readability, to optimize for mobile input speed and reduce entry errors. An example base-20 charset ('BCDFGHJKLMNPQRSTVWXZ') with 8 characters yields approximately 34.5 bits of entropy.
section: "6.1"
topics:
    - oauth
