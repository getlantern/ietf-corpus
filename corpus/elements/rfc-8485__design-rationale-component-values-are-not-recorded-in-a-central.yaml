document: rfc-8485
kind: design-rationale
summary: Component values are not recorded in a central registry because they are always interpreted in the context of a specific trustmark. A 'P1' from one trust framework and a 'P1' from another may have very different meanings; only the component demarcators (P, C, M, A) are registered centrally to encourage reuse across frameworks.
section: "6"
topics:
