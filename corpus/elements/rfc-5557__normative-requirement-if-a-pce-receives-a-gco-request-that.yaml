document: rfc-5557
kind: normative-requirement
summary: If a PCE receives a GCO request that violates administrative privileges (PCE policy does not allow GCO), it sends a PCErr with Error-Type=5, Error-value=5 and stops processing. The PCC MUST cancel the corresponding GCO request.
section: "5.6"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
