document: rfc-3454
kind: design-rationale
summary: The bidirectional rules (section 6) are optional in profiles, but omitting them makes it easy to create two strings with the same characters in different order that display identically, creating security-relevant user confusion analogous to look-alike character attacks.
section: "6"
topics:
    - security
