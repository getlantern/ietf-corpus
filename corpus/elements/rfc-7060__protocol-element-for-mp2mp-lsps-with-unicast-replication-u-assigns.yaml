document: rfc-7060
kind: protocol-element
summary: For MP2MP LSPs with unicast replication, U assigns upstream labels (L3 for traffic from D1, L4 for traffic from D2); when U receives a packet from D1 (label L3), it swaps to D2's label (L2) and unicasts to D2 only, preventing loopback to D1.
section: "5"
topics:
