document: rfc-3588
kind: registry
summary: IANA manages the Diameter AVP Code namespace (Section 11.1.1). New AVP codes require an IANA request with specification and list of commands that use the AVP. The registry also covers AVP Flags, Result-Code AVP Values, Accounting-Record-Type, Termination-Cause, Disconnect-Cause, and other enumerated AVP value spaces.
section: "11.1"
