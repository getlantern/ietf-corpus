document: rfc-8168
kind: design-rationale
summary: Servers are not required to remember the prefix-length hint from a client's Solicit message. The client's preference may change over time, and requiring servers to store hints would add complexity; the Renew/Rebind message itself should carry the current preference.
section: "3.5"
topics:
    - ip
    - v6ops
