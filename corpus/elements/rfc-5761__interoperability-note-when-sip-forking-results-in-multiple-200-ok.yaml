document: rfc-5761
kind: interoperability-note
summary: When SIP forking results in multiple 200 OK responses to an INVITE that offers RTP/RTCP multiplexing, some answerers may support multiplexing and some may not. The offerer must listen and send RTCP on both the RTP port and the usual RTCP port until call branches are re-negotiated.
section: 5.1.2
topics:
    - rtp
    - realtime
    - sip
