document: rfc-8325
kind: interoperability-note
summary: RFC 7561 (based on GSMA IPX Guidelines) specifies DSCP-to-UP mappings that conflict with RFC 4594 and this document. The two plans cannot be normalized; they belong to separate Differentiated Services Domains, requiring codepoint translation at domain boundaries.
