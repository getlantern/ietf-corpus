document: rfc-5778
kind: security-consideration
summary: Diameter messages between the HA and Diameter server may traverse AAA brokers or Diameter agents, so security relies on the properties of those intermediary networks and agents. The specification does not define how the Diameter server derives MN-HA session keys, leaving security properties deployment-specific.
section: "10"
topics:
    - security
    - diameter
    - mobility
    - crypto
