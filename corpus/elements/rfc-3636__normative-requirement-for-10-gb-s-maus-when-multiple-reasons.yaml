document: rfc-3636
kind: normative-requirement
summary: 'For 10 Gb/s MAUs, when multiple reasons for a local fault state can be identified, only the highest-precedence error should be reported, in descending precedence: pxsLinkFault, pmdLinkFault, wisFrameLoss, wisSignalLoss, pcsLinkFault, excessiveBER, dxsLinkFault.'
section: "4"
rfc2119_level: SHOULD
