document: rfc-8186
kind: security-consideration
summary: Use of a particular timestamp format (NTP or PTPv2) in a test session does not introduce any additional security threats beyond those already present in OWAMP (RFC 4656) and TWAMP (RFC 5357). The general security considerations for active measurement of live networks apply.
section: "4"
topics:
