document: rfc-4454
kind: interoperability-note
summary: In Cell Relay Mode, the ATM Header Error Checksum (HEC) is not transported across the ATMPW; errors or corruption in the 4-byte ATM cell header introduced during encapsulation or transit may not be detected on an end-to-end basis.
section: "9.2"
topics:
