document: rfc-4893
kind: normative-requirement
summary: A NEW BGP speaker that has advertised and received the 4-octet AS Number Capability with a peer MUST encode AS numbers as 4-octet entities in both AS_PATH and AGGREGATOR attributes sent to that peer, and MUST assume received attributes encode 4-octet AS numbers.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
