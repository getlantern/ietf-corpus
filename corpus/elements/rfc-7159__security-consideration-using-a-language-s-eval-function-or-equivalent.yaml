document: rfc-7159
kind: security-consideration
summary: Using a language's eval() function (or equivalent) to parse JSON texts is an unacceptable security risk because the text could contain executable code alongside data declarations. This applies to JavaScript and any other language whose syntax is a superset of JSON.
section: "12"
topics:
    - json
    - security
