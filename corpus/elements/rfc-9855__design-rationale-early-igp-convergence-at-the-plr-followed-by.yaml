document: rfc-9855
kind: design-rationale
summary: Early IGP convergence at the PLR followed by early release of TI-LFA paths can cause micro-loops, particularly for paths computed via Sections 5.2–5.4. Local convergence delay (RFC 8333) is one mechanism to prevent this.
