document: rfc-7978
kind: protocol-element
summary: 'The SType (Security Type) field describes the security services applied to the extended RBridge Channel message. Defined values are: 0 (None), 1 (IS-IS CRYPTO_AUTH-Based Authentication), 2 (DTLS Pairwise Security), 3 (Composite Security = DTLS + IS-IS CRYPTO_AUTH), 4–14 (Unassigned), 15 (Reserved).'
