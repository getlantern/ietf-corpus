document: rfc-5040
kind: interoperability-note
summary: RDMAP version 00b (RDMA Consortium specification) and version 01b (this RFC 5040 specification) are both valid version values in the RDMA Version field. Interoperability between implementations of different versions depends on MPA protocol version negotiation such as MPA marker and MPA CRC settings.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
