document: rfc-7881
kind: normative-requirement
summary: The Source IP Address field of S-BFD Control packets sent by the SBFDInitiator MUST be set to a local IP address expected to be routable by the target (i.e., not an IPv6 link-local address when the target is multiple hops away).
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
