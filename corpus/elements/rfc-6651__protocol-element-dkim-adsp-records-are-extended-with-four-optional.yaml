document: rfc-6651
kind: protocol-element
summary: 'DKIM ADSP records are extended with four optional tags: ''ra='' (reporting address local-part), ''rp='' (report percentage), ''rr='' (requested report types: all/o/p/s/u), and ''rs='' (SMTP error string). The full reporting address appends ''@'' and the RFC5322.From domain.'
