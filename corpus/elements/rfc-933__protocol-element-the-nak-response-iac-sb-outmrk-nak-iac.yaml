document: rfc-933
kind: protocol-element
summary: The NAK response 'IAC SB OUTMRK NAK IAC SE' (NAK = ASCII 21) is sent by User-Telnet when the supplied banner data is unacceptable, requiring Server-Telnet to restart the sequence with different data or terminate the connection.
