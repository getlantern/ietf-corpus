document: rfc-1116
kind: interoperability-note
summary: If the server does not support some editing functions, it should send 'SLC xxx SLC_DEFAULT 0' (not SLC_NOSUPPORT) in response to a SLC 0 SLC_DEFAULT 0 request, allowing the client to use its own local values rather than being forced to disable those functions.
section: "5.5"
