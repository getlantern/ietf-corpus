document: rfc-7755
kind: design-rationale
summary: SIIT-DC targets single-stack IPv6 operation rather than dual-stack to reduce operational complexity and address IPv4 exhaustion. Dual-stack runs two protocols with little ROI while large parts of the Internet remain IPv4-only and does not reduce IPv4 address consumption. Decommissioning SIIT-DC when IPv4 is finally retired requires only shutting off the BRs.
section: "1"
topics:
