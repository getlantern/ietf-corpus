document: rfc-5302
kind: normative-requirement
summary: L1L2 routers MUST NOT advertise L2->L1 inter-area routes (those with the up/down bit set, learned via L1 routing) back into L2. This restriction prevents persistent forwarding loops.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
