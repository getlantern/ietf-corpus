document: rfc-7987
kind: protocol-element
summary: 'ISO10589 Section 7.3.16 defines LSP comparison rules: higher sequence numbers are newer; a zero Remaining Lifetime (purged LSP) is newer than the same LSP with non-zero Remaining Lifetime at equal sequence numbers; two LSPs with non-zero Remaining Lifetimes and equal sequence numbers are considered the same regardless of differing Remaining Lifetime values.'
section: "2"
