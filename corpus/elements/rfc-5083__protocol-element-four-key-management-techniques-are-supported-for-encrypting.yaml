summary: 'Four key management techniques are supported for encrypting the content-authenticated-encryption key: Key Transport (encrypted in recipient''s public key), Key Agreement (pairwise symmetric KEK from sender/recipient key pair), Symmetric Key-Encryption Keys (pre-distributed symmetric KEK), and Passwords (KEK derived from password/shared secret).'
