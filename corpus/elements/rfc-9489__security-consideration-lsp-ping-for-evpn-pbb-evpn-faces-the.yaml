document: rfc-9489
kind: security-consideration
summary: 'LSP Ping for EVPN/PBB-EVPN faces the same security threats as baseline LSP Ping (RFC 8029): DoS via excessive Echo Requests, obfuscation of MPLS data plane state by spoofing/hijacking/replaying Echo messages, and unauthorized network topology disclosure. The same mitigations from RFC 8029 apply.'
section: "7"
topics:
    - mpls
    - routing
    - security
