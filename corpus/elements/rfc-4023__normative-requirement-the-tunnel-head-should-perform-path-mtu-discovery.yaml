document: rfc-4023
kind: normative-requirement
summary: The tunnel head SHOULD perform Path MTU Discovery (RFC 1191 for IPv4, RFC 1981 for IPv6) and MUST maintain a Tunnel MTU for each tunnel, defined as the minimum of an administratively configured value and the discovered Path MTU minus encapsulation overhead.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
