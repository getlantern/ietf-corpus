document: rfc-7277
kind: protocol-element
summary: 'The IPv6 autoconf container controls SLAAC behavior: ''create-global-addresses'' (boolean, default true) follows RFC 4862, and ''create-temporary-addresses'' (boolean, default false, gated by feature ''ipv6-privacy-autoconf'') follows RFC 4941. Temporary address lifetimes are configurable via ''temporary-valid-lifetime'' (default 604800s) and ''temporary-preferred-lifetime'' (default 86400s).'
section: "4"
