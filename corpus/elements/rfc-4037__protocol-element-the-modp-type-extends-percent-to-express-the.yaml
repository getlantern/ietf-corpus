document: rfc-4037
kind: protocol-element
summary: The modp type extends percent to express the sender's confidence (0–100) that application data will be modified. A value of 0 guarantees no modification; 100 guarantees modification; intermediate values are probabilistic. Carried in the 'Modp' parameter of DUM messages.
section: "10.9"
extracted_by: claude-sonnet-4-6
