document: rfc-8393
kind: normative-requirement
summary: An SFC-aware node SHOULD NOT create a packet with 'Next Protocol' set to 'None', Metadata Type set to 0x2, and an NSH Length of 0x2, as this would produce a packet with no metadata and no payload.
section: "3.1"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
