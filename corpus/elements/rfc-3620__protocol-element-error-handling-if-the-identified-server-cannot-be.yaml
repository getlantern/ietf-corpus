document: rfc-3620
kind: protocol-element
summary: 'Error handling: if the identified server cannot be contacted, an ''error'' element is returned and any initiated connection is closed. If the destination does not offer a BEEP greeting or does not advertise the TUNNEL profile, this is also treated as an error; the beginning of any reply from the destination SHOULD be included as CDATA for debugging.'
section: "4"
topics:
    - realtime
