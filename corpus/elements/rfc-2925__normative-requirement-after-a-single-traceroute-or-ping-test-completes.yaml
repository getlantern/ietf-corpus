document: rfc-2925
kind: normative-requirement
summary: After a single traceroute (or ping) test completes, the number of seconds defined by traceRouteCtlFrequency (or pingCtlFrequency) MUST elapse before the next test is started. A value of 0 disables repetition.
section: 3.2.2
rfc2119_level: MUST
topics:
