document: rfc-5098
kind: interoperability-note
summary: IPCablecom-compliant MTA devices must use the equivalent IPCablecom references (ITU-T J.169, ETSI TS 101 909-9, etc.) wherever PacketCable references appear in REFERENCE clauses, since the two ecosystems define equivalent requirements under different specifications.
