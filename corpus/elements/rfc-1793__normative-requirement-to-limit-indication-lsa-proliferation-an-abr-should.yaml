document: rfc-1793
kind: normative-requirement
summary: To limit indication-LSA proliferation, an ABR SHOULD NOT originate indication-LSAs into an area that already has non-indication LSAs with DC-bit clear, and SHOULD NOT originate into an area if another ABR with a higher OSPF Router ID has already originated one there.
section: 2.5.1.1
rfc2119_level: SHOULD NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
