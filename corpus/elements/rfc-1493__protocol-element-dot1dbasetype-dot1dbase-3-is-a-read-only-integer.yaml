kind: protocol-element
summary: 'dot1dBaseType (dot1dBase 3) is a read-only INTEGER indicating bridge capability: unknown(1), transparent-only(2), sourceroute-only(3), or srt(4). Whether a specific bridging mode is actually active is confirmed by the presence of entries in mode-specific port tables.'
