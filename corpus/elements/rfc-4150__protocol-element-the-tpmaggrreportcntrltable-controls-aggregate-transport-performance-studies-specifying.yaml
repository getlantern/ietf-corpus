document: rfc-4150
kind: protocol-element
summary: The tpmAggrReportCntrlTable controls aggregate transport performance studies, specifying data source, aggregation type (flows/clients/servers/applications), report interval, requested and granted table sizes, and number of saved reports. Unlike typical RMON control/data pairs, one entry enables multiple per-interval report snapshots rather than a single data table. Control entries persist across reboots.
section: 2.3.2
topics:
    - snmp
    - measurement
