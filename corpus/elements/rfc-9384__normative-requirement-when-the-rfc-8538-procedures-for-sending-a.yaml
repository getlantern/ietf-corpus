document: rfc-9384
kind: normative-requirement
summary: When the RFC 8538 procedures for sending a Cease/Hard Reset NOTIFICATION are required and the BGP connection is being terminated because BFD went Down, the 'BFD Down' subcode SHOULD be encapsulated in the Hard Reset's data portion of the NOTIFICATION message.
section: "4"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
