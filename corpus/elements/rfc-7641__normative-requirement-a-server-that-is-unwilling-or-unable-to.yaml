document: rfc-7641
kind: normative-requirement
summary: A server that is unwilling or unable to add a client to its observer list MAY silently ignore the Observe Option and process the GET normally. The resulting response MUST NOT include an Observe Option, signalling to the client that it will not be notified and should poll instead.
section: "4.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
