document: rfc-2165
kind: protocol-element
summary: Service Requests embed a predicate using a prefix-notation boolean grammar of the form <srvtype>[.<na>]/<scope>/<where>/. The where-clause supports AND (&) and OR (|) conjunctions over attribute comparisons and keyword tests; logical negation is absent.
section: "5.4"
