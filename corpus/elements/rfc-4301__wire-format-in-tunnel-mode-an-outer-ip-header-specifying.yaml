document: rfc-4301
kind: wire-format
summary: In tunnel mode, an outer IP header specifying the IPsec endpoints wraps the original packet; the AH or ESP security protocol header appears after the outer IP header and before the inner IP header. In IPv4 transport mode, the security protocol header appears immediately after the IP header and any options, before TCP/UDP.
section: "4.1"
topics:
    - ipsec
    - ip
