document: rfc-7311
kind: security-consideration
summary: Spurious introduction of an AIGP attribute (through error or malfeasance) could result in selection of unintended paths. Improper configuration on both ends of an EBGP connection could allow the AIGP attribute to pass between service providers, resulting in unsound path selection.
section: "7"
topics:
