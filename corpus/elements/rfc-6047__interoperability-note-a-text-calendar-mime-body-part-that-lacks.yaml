document: rfc-6047
kind: interoperability-note
summary: A 'text/calendar' MIME body part that lacks the 'method' parameter is not considered an iMIP body part and is not subject to iMIP requirements. Receiving implementations must distinguish iMIP messages from generic iCalendar attachments by the presence of this parameter.
section: "2.4"
topics:
    - email
