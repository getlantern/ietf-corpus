document: rfc-8866
kind: protocol-element
summary: 'Media direction is controlled by four mutually exclusive property attributes: ''a=recvonly'', ''a=sendrecv'', ''a=sendonly'', and ''a=inactive''. At most one may appear at session level and at most one per media description. The default if none is present is ''a=sendrecv''.'
