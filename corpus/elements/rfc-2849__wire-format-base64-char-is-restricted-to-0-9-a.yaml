document: rfc-2849
kind: wire-format
summary: BASE64-CHAR is restricted to '+', '/', '0'–'9', '=', 'A'–'Z', and 'a'–'z' as specified in RFC 2045. No extraneous characters (other than line-folding whitespace) are permitted in LDIF base64 strings.
section: Formal Syntax Definition of LDIF
topics:
    - ldap
