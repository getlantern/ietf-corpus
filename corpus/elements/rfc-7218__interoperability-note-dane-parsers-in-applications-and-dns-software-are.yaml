document: rfc-7218
kind: interoperability-note
summary: DANE parsers in applications and DNS software are expected to support parsing the acronyms for each TLSA field in addition to numeric values, enabling use of human-readable forms like 'PKIX-TA CERT SHA2-512' in place of '0 0 2'.
