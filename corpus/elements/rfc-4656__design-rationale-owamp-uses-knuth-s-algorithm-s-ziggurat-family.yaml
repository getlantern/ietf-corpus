document: rfc-4656
kind: design-rationale
summary: OWAMP uses Knuth's Algorithm S (ziggurat family) for generating exponential random variates rather than a log-based algorithm. Log-based algorithms produce potentially different floating-point results across implementations, which would cause sender and receiver to compute divergent packet schedules and misattribute lost packets.
section: "5"
topics:
    - measurement
