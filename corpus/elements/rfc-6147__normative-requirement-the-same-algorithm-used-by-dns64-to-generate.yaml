document: rfc-6147
kind: normative-requirement
summary: The same algorithm used by DNS64 to generate the IPv6 representation of an IPv4 address MUST also be used by the paired IPv6/IPv4 translator. The algorithm MUST be reversible (the original IPv4 address must be derivable from the IPv6 representation). Input MUST be limited to the IPv4 address, Pref64::/n, and optionally stable configured parameters.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - v6ops
    - nat
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
