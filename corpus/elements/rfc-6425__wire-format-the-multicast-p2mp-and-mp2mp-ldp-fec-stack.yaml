document: rfc-6425
kind: wire-format
summary: 'The Multicast P2MP and MP2MP LDP FEC Stack sub-TLVs (Sub-Types 19 and 20) share the same variable-length format: Address Family (2 octets), Address Length (1 octet), Root LSR Address (variable), Opaque Length (2 octets), Opaque Value (variable) that uniquely identifies the P2MP LSP in the context of the Root LSR.'
