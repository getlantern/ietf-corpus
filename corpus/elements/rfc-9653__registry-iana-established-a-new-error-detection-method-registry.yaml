summary: 'IANA established a new ''Error Detection Method'' registry for SCTP using the Specification Required policy. Initial entries: 0 (Reserved), 1 (SCTP over DTLS), 2–4294967295 (Unassigned). New registrations must document the method name, why it meets the false-negative and middlebox requirements, and any method-specific constraints.'
