document: rfc-6633
kind: normative-requirement
summary: A host MUST NOT send ICMP Source Quench messages. There is no known valid reason for a host to generate this message, and sending it unnecessarily consumes network and endpoint resources.
section: "3"
rfc2119_level: MUST NOT
