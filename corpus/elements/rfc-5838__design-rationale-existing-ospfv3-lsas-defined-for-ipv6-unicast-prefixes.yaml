document: rfc-5838
kind: design-rationale
summary: Existing OSPFv3 LSAs (defined for IPv6 unicast prefixes) are reused for advertising prefixes from other AFs without modification, because each prefix already includes a Length field enabling advertisement of different-length prefixes. No new LSA types are required.
section: "2.3"
topics:
    - routing
