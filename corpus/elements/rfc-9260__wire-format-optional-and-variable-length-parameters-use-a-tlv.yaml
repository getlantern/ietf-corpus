document: rfc-9260
kind: wire-format
summary: 'Optional and variable-length parameters use a TLV format: Parameter Type (16-bit), Parameter Length (16-bit, inclusive), and variable-length Parameter Value. Total parameter length MUST be a multiple of 4 bytes; padding is not counted in Parameter Length and MUST be ignored by the receiver.'
section: 3.2.1
topics:
