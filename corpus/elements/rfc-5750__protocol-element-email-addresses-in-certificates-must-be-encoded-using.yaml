document: rfc-5750
kind: protocol-element
summary: Email addresses in certificates MUST be encoded using the rfc822Name CHOICE of the GeneralName type in the subjectAltName extension. Multiple email addresses MAY be present since SubjectAltName is a SEQUENCE OF GeneralName.
section: 4.4.3
