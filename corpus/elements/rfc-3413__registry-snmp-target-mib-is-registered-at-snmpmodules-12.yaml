summary: SNMP-TARGET-MIB is registered at snmpModules 12, providing the snmpTargetAddrTable and snmpTargetParamsTable for remotely configuring SNMP message generation parameters. It also defines the SnmpTagValue and SnmpTagList textual conventions and the snmpTargetSpinLock object.
