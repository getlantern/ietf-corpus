document: rfc-6575
kind: wire-format
summary: The Stack Capability Interface Parameter sub-TLV has Parameter ID 0x16, Length 4, and a 16-bit Stack Capability bit field. Bit 0 (bitmask 0x0001) indicates IPv6 Stack Capability; remaining bits (0x0002–0x8000) are unassigned and require IETF Review for allocation.
