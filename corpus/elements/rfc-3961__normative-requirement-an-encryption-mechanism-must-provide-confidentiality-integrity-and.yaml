document: rfc-3961
kind: normative-requirement
summary: An encryption mechanism must provide confidentiality, integrity, and non-malleability of the original plaintext. Use of a random confounder prepended to the plaintext is recommended so an observer cannot determine if two ciphertexts correspond to the same plaintext, even with identical keys and cipher state.
section: "2"
rfc2119_level: RECOMMENDED
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
