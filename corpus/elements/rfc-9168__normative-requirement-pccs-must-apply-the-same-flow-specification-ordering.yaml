document: rfc-9168
kind: normative-requirement
summary: PCCs MUST apply the same Flow Specification ordering and prioritization rules defined in RFC 8955 Section 5.1. When both BGP and PCEP distribute Flow Specifications, implementations supporting both MUST apply RFC 8955 ordering regardless of which protocol distributed them.
section: "8.7"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - bgp
