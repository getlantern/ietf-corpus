document: rfc-7151
kind: interoperability-note
summary: User-PI implementations created before the introduction of HOST will not support the new command. A user-PI receiving a 500 or 502 reply to HOST SHOULD assume the server does not implement virtual servers via HOST and MAY proceed to log in as if HOST had not been sent.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
