document: rfc-9909
kind: protocol-element
summary: 'HashSLH-DSA pre-hash algorithm is embedded in the OID name after ''-with-'': SHA-256, SHA-512, SHAKE128 (256-bit output), or SHAKE256 (512-bit output), chosen to be twice the length of the internal hash/XOF for collision resistance. For example, id-hash-slh-dsa-sha2-128s-with-sha256 uses SHA-256 as the pre-hash.'
