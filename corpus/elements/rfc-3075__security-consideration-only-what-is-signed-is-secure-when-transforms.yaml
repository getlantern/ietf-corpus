document: rfc-3075
kind: security-consideration
summary: 'Only what is signed is secure: when Transforms are applied, the signer is signing the transformed output, not the original document. An application must verify that the transforms produce the expected content, as malicious transforms could sign meaningless or misleading data.'
section: 8.1.1
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
