document: rfc-9195
kind: design-rationale
summary: Partial data sets are explicitly allowed (principle P6), meaning mandatory, min-elements, require-instance, must, and when constraints MAY be violated. This enables offline documentation of incomplete configurations such as default access control rules without requiring a full valid YANG tree.
