document: rfc-9353
kind: normative-requirement
summary: The KEY-CHAIN-NAME field MUST be encoded using UTF-8, and a receiving entity MUST NOT interpret invalid UTF-8 sequences. UTF-8 'Shortest Form' encoding is REQUIRED to guard against technical issues outlined in UTR36.
section: 3.3.1
rfc2119_level: MUST
topics:
    - security
    - routing
