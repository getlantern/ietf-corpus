document: rfc-891
kind: design-rationale
summary: The DCN supports up to 256 hosts per local net using 8-bit host IDs. Subnet capability is provided for class-B nets by treating the third octet of the Internet address as a subnet number, and for class-A nets by using the third octet (ARPANET logical-host field) for routing between DCN local nets, enabling multi-net topologies without modifying the Internet address structure.
section: "2"
topics:
