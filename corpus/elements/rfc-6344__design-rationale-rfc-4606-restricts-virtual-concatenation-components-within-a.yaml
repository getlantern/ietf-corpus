document: rfc-6344
kind: design-rationale
summary: RFC 4606 restricts virtual concatenation components within a single LSP to travel over the same component link due to label-to-link binding, making diversely routed VCG members impossible with one LSP. Multiple control plane LSPs are therefore required to support diversely routed VCG member sets.
section: "5"
topics:
    - routing
    - mpls
