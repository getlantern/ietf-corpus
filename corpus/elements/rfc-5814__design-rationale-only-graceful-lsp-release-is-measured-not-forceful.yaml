document: rfc-5814
kind: design-rationale
summary: 'Only graceful LSP release is measured (not forceful) because graceful release is preferred in GMPLS-controlled optical networks: it does not trigger restoration or protection mechanisms and constitutes ''alarm-free connection deletion'' as described in RFC 4208.'
section: "8.1"
topics:
