document: rfc-7668
kind: normative-requirement
summary: The 6LBR MUST set the 'on-link' flag (L) to zero in the Prefix Information Option in Neighbor Discovery messages, causing 6LNs to always send packets to the 6LBR, including when the destination is another 6LN using the same prefix.
section: 3.2.2
rfc2119_level: MUST
topics:
    - ip
    - v6ops
