document: rfc-3398
kind: protocol-element
summary: 'The CPG Event Code to SIP provisional response mapping: event 1 (Alerting) → 180 Ringing, event 2 (Progress) → 183 Session Progress, event 3 (In-band information) → 183, events 4/5/6 (call forward variants) → 181 Call is Being Forwarded, no event code → 183. A CPG not indicating Alerting does not change the current state.'
