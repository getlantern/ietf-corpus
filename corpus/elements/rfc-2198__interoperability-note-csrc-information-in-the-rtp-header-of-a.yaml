document: rfc-2198
kind: interoperability-note
summary: CSRC information in the RTP header of a redundant packet relates to the primary only; CSRC is not preserved per redundant block. Since CSRC is expected to change infrequently, applications may apply the header CSRC to reconstructed redundant data.
section: "4"
topics:
