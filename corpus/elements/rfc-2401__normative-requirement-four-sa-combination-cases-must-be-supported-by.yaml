document: rfc-2401
kind: normative-requirement
summary: 'Four SA combination cases MUST be supported by compliant IPsec hosts or security gateways: (1) end-to-end host-to-host, (2) security gateway-to-gateway VPN tunnel, (3) nested end-to-end plus gateway-to-gateway, and (4) remote host tunneling to a security gateway with an end-to-end SA to an internal host.'
section: "4.5"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
