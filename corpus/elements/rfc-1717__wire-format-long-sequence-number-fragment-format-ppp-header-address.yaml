summary: 'Long-sequence-number fragment format: PPP header (Address 0xff, Control 0x03, PID 0x003d), followed by a 4-byte MP header with B (Beginning) bit, E (Ending) bit, 6 reserved bits (must be zero), and a 24-bit sequence number, then fragment data and PPP FCS.'
