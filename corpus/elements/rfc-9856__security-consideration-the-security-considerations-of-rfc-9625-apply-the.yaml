document: rfc-9856
kind: security-consideration
summary: The security considerations of RFC 9625 apply. The Warm Standby method has low impact on PE processing capabilities due to its lightweight control plane, while the Hot Standby method adds significantly more control-plane burden on all PEs of the tenant that have sources or receivers.
