summary: 'Four key management techniques are supported for wrapping the AES CEK in enveloped-data: (1) Key Transport via recipient RSA public key, (2) Key Agreement via ES-DH or SS-DH, (3) Previously Distributed Symmetric KEK, and (4) Password Encryption via password-derived KEK.'
