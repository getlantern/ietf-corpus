document: rfc-8047
kind: design-rationale
summary: Including LOCATOR_SET in R2 rather than R1 has the advantage that the host avoids divulging additional locators until after the I2 is successfully processed, providing a privacy benefit; the tradeoff is slightly delayed locator discovery compared to announcing in R1.
section: 4.2.8
topics:
    - mobility
    - privacy
