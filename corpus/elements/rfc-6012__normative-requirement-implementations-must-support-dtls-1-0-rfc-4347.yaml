document: rfc-6012
kind: normative-requirement
summary: Implementations MUST support DTLS 1.0 (RFC 4347) and MUST support the mandatory cipher suite TLS_RSA_WITH_AES_128_CBC_SHA (RFC 5246). Implementations MUST NOT negotiate a cipher suite that employs NULL integrity or authentication algorithms.
section: "5.3"
rfc2119_level: MUST
topics:
    - tls
    - crypto
    - syslog
