document: rfc-3288
kind: protocol-element
summary: 'Request/N-responses exchange pattern: the client sends a BEEP ''MSG'' containing a SOAP envelope; the server sends back zero or more ''ANS'' messages each containing an envelope, followed by a terminating ''NUL'' message, implementing a one-to-many exchange for streaming or multi-result responses.'
section: "4.3"
extracted_by: claude-sonnet-4-6
