document: rfc-3946
kind: design-rationale
summary: 'Transforms on the Elementary Signal must be applied in a strict order: (1) contiguous concatenation via RCC/NCC, (2) virtual concatenation via NVC, (3) transparency via T, (4) multiplication via MT. This ordering prevents ambiguous interpretations of combined transform parameters.'
