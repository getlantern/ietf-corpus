document: rfc-3336
kind: interoperability-note
summary: PPP over AAL2 allows co-existence of multiple SSCS types within the same AAL2 VCC; CIDs not used for PPP over AAL2 may run conventional AAL2 SSCS functions, so implementations must not assume a uniform SSCS across all CIDs on a connection.
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
