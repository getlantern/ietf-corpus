document: rfc-8920
kind: protocol-element
summary: The Application-Specific Link Attributes (ASLA) sub-TLV is a sub-TLV of the OSPFv2 Extended Link TLV (type 10) and OSPFv3 Router-Link TLV (type 11). It carries a Standard Application Identifier Bit Mask (SABM), a User-Defined Application Identifier Bit Mask (UDABM), and nested link attribute sub-sub-TLVs, enabling per-application advertisement of link attributes.
section: "5"
