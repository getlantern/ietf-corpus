document: rfc-5151
kind: design-rationale
summary: Replacing Notify recipients at domain border nodes allows domains to handle notifiable events locally (e.g., enabling protection switching within a domain), but introduces the cost of processing and forwarding Notify messages at domain borders, a cost that increases linearly with the number of domains.
section: "3.4"
topics:
    - mpls
    - routing
