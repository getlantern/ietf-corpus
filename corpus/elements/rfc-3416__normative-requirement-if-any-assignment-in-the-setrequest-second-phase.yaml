document: rfc-3416
kind: normative-requirement
summary: If any assignment in the SetRequest second phase fails, all other assignments must be undone and error-status is set to commitFailed. If undo is not possible, error-status is set to undoFailed with error-index zero. Implementations are strongly encouraged to avoid both of these conditions.
section: 4.2.5
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
