summary: In RFC 2328 (OSPFv2), the 'master/slave' relationship used during database synchronization is renamed to 'Leader/Follower'. The 'master (MS) bit' in the Database Description packet is renamed the 'Leader (L) bit'. Protocol operation is unchanged.
