document: rfc-6787
kind: interoperability-note
summary: There is no expectation that an MRCPv2 client will work with an MRCPv1 server or vice versa. There is no migration plan or gateway definition between the two protocols; MRCPv1 was taken only as input to the design of MRCPv2.
