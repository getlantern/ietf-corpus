document: rfc-6321
kind: protocol-element
summary: In xCal, component elements (e.g., IC:vevent, IC:vtodo) are contained within an IC:components XML element. Within a component, IC:components may appear for nested components, or IC:properties encapsulates iCalendar properties. Each property element contains zero or one IC:parameters element and one or more value elements.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
