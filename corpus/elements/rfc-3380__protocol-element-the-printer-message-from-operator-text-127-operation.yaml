document: rfc-3380
kind: protocol-element
summary: The 'printer-message-from-operator' (text(127)) operation attribute is defined for use with Pause-Printer, Resume-Printer, and Purge-Jobs operations. When supplied, the Printer copies the value to the 'printer-message-from-operator' Printer Description attribute and also updates 'printer-message-time' and 'printer-message-date-time' as side effects.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
