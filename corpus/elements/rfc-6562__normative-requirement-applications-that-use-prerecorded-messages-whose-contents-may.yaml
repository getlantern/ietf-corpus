document: rfc-6562
kind: normative-requirement
summary: Applications that use prerecorded messages whose contents may be of any value to an eavesdropper SHOULD NOT use codecs in VBR mode. IVR applications are particularly vulnerable because rate information can be used to recognize prompts.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - security
    - rtp
    - voip
