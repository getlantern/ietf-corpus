document: rfc-5648
kind: wire-format
summary: The Binding Identifier mobility option (Type=35) carries the BID, an 8-bit Status field, a 1-bit H flag, and an optional Care-of Address field. The Length field MUST be 4 (no CoA), 8 (IPv4 CoA), or 20 (IPv6 CoA). Alignment is 2n without CoA, 8n+2 with CoA.
section: "4.3"
topics:
    - mobility
    - ip
