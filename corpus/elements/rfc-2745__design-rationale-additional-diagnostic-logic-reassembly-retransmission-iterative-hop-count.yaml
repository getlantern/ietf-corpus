document: rfc-2745
kind: design-rationale
summary: Additional diagnostic logic (reassembly, retransmission, iterative hop-count expansion) is placed in diagnostic clients rather than RSVP nodes, following the principle that network nodes should not hold more state than necessary. Third-party hosts running the diagnostic client are not required to run an RSVP daemon.
