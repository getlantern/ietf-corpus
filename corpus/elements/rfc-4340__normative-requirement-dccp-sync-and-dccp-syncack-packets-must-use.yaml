document: rfc-4340
kind: normative-requirement
summary: DCCP-Sync and DCCP-SyncAck packets MUST use 48-bit sequence numbers (X=1) and are used to resynchronize endpoints after large bursts of packet loss and to recover from half-open connections. Each valid DCCP-Sync immediately elicits a DCCP-SyncAck.
section: "5.7"
rfc2119_level: MUST
topics:
    - udp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
