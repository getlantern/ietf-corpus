document: rfc-2890
kind: design-rationale
summary: The sequence number is intended to provide unreliable but in-order delivery, not reliable delivery. Its use is recommended only when the tunneled protocol requires in-sequence delivery; it should be avoided when the carried protocol already has higher-layer in-order delivery or is tolerant to out-of-order arrival.
section: "2.2"
