document: rfc-8082
kind: protocol-element
summary: When a layered codec is in use, a Decoder Refresh Point must include hard or gradual single-layer decoder refresh points for all layers, thereby completely resetting the entire decoder — not just one layer — to a known state. This extends the RFC 5104 Section 2.2 definition to cover pyramid-structured layered bitstreams.
section: "3"
topics:
    - rtp
    - realtime
