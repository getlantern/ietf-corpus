document: rfc-8935
kind: normative-requirement
summary: The SET Recipient MUST respond to a retransmitted SET as it would if the SET had not been previously received. The SET Recipient MUST NOT depend on a SET Transmitter to retransmit a SET once the SET Recipient has acknowledged successful receipt.
section: "2"
rfc2119_level: MUST
topics:
    - http
