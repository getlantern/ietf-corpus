document: rfc-5571
kind: normative-requirement
summary: After IPV6CP is completed, the Softwire Initiator MUST send a Router Solicitation to the SC. The SC MUST respond with a Router Advertisement that MUST contain the global IPv6 prefix of the PPP link if Neighbor Discovery is used to configure endpoint addresses.
section: "5.3"
rfc2119_level: MUST
topics:
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
