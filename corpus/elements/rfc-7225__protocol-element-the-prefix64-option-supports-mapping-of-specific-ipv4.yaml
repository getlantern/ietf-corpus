document: rfc-7225
kind: protocol-element
summary: The PREFIX64 option supports mapping of specific IPv4 address ranges (via the IPv4 Prefix List) to separate Pref64::/n prefixes, enabling destination-based NAT64 prefix selection. If no IPv4 Prefix List is returned, the client assumes the prefix is valid for any destination IPv4 address.
section: "4.1"
topics:
    - nat
    - v6ops
    - ip
