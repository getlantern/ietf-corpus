document: rfc-9537
kind: privacy-consideration
summary: Servers including redaction signals provide unauthorized clients additional information about the existence of data. Servers MAY omit redacted member entries for fields where the data-existence signal itself constitutes a privacy risk, and MAY publish a redaction policy describing their implementation.
section: "4.2"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
