document: rfc-2440
kind: protocol-element
summary: 'V4 signature subpackets include: signature creation time (type 2, MUST appear in hashed area), issuer key ID (type 16), key expiration time (type 9), preferred symmetric/hash/compression algorithm lists (types 11/21/22), trust signature (type 5), revocation key (type 12), key flags (type 27), and reason for revocation (type 29). Bit 7 of the subpacket type byte is the ''critical'' flag.'
section: 5.2.3.1
topics:
