document: rfc-3398
kind: normative-requirement
summary: A gateway MUST wait until a complete ISUP message is received—which may involve waiting for one or more Segmentation Messages (SGMs)—before sending any corresponding INVITE. Encapsulating an incomplete ISUP message may be confusing to terminating gateways.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
