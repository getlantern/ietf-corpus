document: rfc-922
kind: security-consideration
summary: 'Directed broadcasts (sending to all hosts on a remote network) pose an amplification risk: a single datagram arriving at a gateway is replicated to every host on the target network. The document notes that broadcasts impose a cost on every host that hears them and should not be used indiscriminately.'
