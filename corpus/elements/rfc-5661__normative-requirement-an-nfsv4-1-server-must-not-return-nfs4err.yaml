document: rfc-5661
kind: normative-requirement
summary: An NFSv4.1 server MUST NOT return NFS4ERR_WRONGSEC in response to a put filehandle operation immediately followed by LOOKUP, OPEN by component name, LOOKUPP, SECINFO, or SECINFO_NO_NAME. The server MUST NOT return NFS4ERR_WRONGSEC from SECINFO or SECINFO_NO_NAME itself.
section: 2.6.3.1.1
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
