document: rfc-9604
kind: design-rationale
summary: The TE-PATH-BINDING TLV is deliberately generic, supporting both MPLS labels and SRv6 SIDs via the Binding Type (BT) field, to unify binding label/SID handling across SR-TE, RSVP-TE, and any future path setup types. This avoids separate TLVs for each data-plane technology.
section: "1.2"
topics:
