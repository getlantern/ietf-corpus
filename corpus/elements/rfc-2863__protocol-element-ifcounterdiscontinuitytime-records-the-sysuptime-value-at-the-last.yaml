document: rfc-2863
kind: protocol-element
summary: ifCounterDiscontinuityTime records the sysUpTime value at the last counter discontinuity on an interface. Management applications must discard calculated counter differences whenever this value differs between successive polls, and check it in addition to sysUpTime to detect agent re-initialization.
section: 3.1.5
topics:
    - snmp
