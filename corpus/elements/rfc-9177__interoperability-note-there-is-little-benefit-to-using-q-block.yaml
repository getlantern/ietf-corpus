document: rfc-9177
kind: interoperability-note
summary: There is little benefit to using Q-Block options over reliable transports (RFC 8323, e.g., CoAP over TCP/TLS/WebSockets) since CON/NON distinctions do not apply. Using Q-Block1/2 with NoSec mode is NOT RECOMMENDED because the source endpoint cannot be trusted and intermediaries may manipulate unprotected Outer options.
section: "3.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
