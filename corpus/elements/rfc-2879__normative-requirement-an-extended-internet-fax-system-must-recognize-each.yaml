document: rfc-2879
kind: normative-requirement
summary: An extended Internet fax system MUST recognize each feature tag in the defined list and deal with it according to its own capabilities. Unrecognized or unused feature tags are effectively ignored by the feature-set matching rules.
section: "3"
rfc2119_level: MUST
