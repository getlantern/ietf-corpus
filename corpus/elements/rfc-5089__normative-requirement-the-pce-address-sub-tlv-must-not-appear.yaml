document: rfc-5089
kind: normative-requirement
summary: The PCE-ADDRESS sub-TLV MUST NOT appear more than once for the same address type. If it appears more than once for the same address type, only the first occurrence is processed and any others MUST be ignored.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - routing
