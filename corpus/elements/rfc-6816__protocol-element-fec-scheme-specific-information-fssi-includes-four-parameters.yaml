document: rfc-6816
kind: protocol-element
summary: 'FEC Scheme-Specific Information (FSSI) includes four parameters: PRNG seed (32-bit), encoding symbol length E (16-bit), Strict flag S (1-bit, indicates whether E is fixed or maximum per block), and N1m3 (3-bit, value 0–7, giving N1 = N1m3 + 3 ones per column in the parity check matrix).'
section: 5.1.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
