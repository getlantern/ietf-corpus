document: rfc-8765
kind: wire-format
summary: 'The PUSH message DSO-DATA contains one or more change notification records formatted as DNS RRs: NAME, TYPE (16-bit), CLASS (16-bit), TTL (32-bit unsigned), RDLEN (16-bit), RDATA. TTL values 0–0x7FFFFFFF indicate addition; 0xFFFFFFFF indicates individual removal; 0xFFFFFFFE indicates collective removal.'
section: 6.3.1
topics:
