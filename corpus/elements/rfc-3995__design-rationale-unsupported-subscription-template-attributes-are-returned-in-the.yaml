document: rfc-3995
kind: design-rationale
summary: Unsupported Subscription Template Attributes are returned in the per-Subscription Attributes Group rather than in the global Unsupported Attributes Group (as defined in RFC 2911) because a single request can create multiple Subscription Objects, and each object's set of unsupported attributes must be associated with the correct object.
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
