document: rfc-2743
kind: protocol-element
summary: 'GSS-API supports three name forms: INTERNAL NAME (opaque, implementation-defined), contiguous OCTET STRING tagged with a namespace OID, and the Exported Name Object (a flat binary form identified by GSS_C_NT_EXPORT_NAME, generated by GSS_Export_name(), suitable for direct memcmp() comparison in access control lists). A Mechanism Name (MN) is an INTERNAL NAME guaranteed to correspond to exactly one mechanism.'
section: 1.1.5
topics:
    - security
