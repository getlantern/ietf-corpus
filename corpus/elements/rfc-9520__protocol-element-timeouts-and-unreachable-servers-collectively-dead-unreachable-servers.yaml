document: rfc-9520
kind: protocol-element
summary: Timeouts and unreachable servers (collectively 'dead/unreachable servers' per RFC 2308) include ICMP port unreachable, TCP connection refused, TLS handshake failure, and lack of response within a timeout period. Resolvers may have both a retry-trigger timeout and a larger server-unresponsive timeout.
section: "2.3"
topics:
    - dns
