document: rfc-3788
kind: errata
summary: Section 6 describes STARTTLS/STARTTLS_ACK as using message class 10, but Section 10 (IANA Considerations) reserves message class 12 for these messages. The IANA registration in Section 10 (class 12) is the authoritative assignment; the class 10 reference in Section 6 is an inconsistency.
section: "6"
topics:
    - security
