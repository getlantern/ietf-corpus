document: rfc-6486
kind: wire-format
summary: 'The Manifest eContent is ASN.1 DER-encoded as a SEQUENCE containing: version (INTEGER DEFAULT 0), manifestNumber (INTEGER 0..MAX), thisUpdate (GeneralizedTime), nextUpdate (GeneralizedTime), fileHashAlg (OBJECT IDENTIFIER), and fileList (SEQUENCE OF FileAndHash). FileAndHash pairs a file name (IA5String) with a hash (BIT STRING).'
