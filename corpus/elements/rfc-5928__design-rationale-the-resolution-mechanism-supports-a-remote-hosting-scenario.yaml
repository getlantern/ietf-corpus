document: rfc-5928
kind: design-rationale
summary: The resolution mechanism supports a Remote Hosting scenario where a VoIP provider can delegate TURN service to a third-party operator by publishing a single NAPTR record pointing to the operator's domain, allowing the operator to manage servers independently while keeping the indirection opaque to end users.
