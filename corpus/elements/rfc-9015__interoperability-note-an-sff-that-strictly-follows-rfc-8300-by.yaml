document: rfc-9015
kind: interoperability-note
summary: An SFF that strictly follows RFC 8300 by decrementing SI by exactly one per hop is fully compatible with this specification, since RFC 9015's gap-handling behavior (reducing to the next meaningful SI) is a strict superset of RFC 8300 SI handling.
section: 4.5.1
topics:
    - bgp
    - routing
