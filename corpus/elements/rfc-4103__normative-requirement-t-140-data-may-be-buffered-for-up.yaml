document: rfc-4103
kind: normative-requirement
summary: T.140 data MAY be buffered for up to 500 ms; a buffering time of 300 ms is RECOMMENDED when application or network conditions are not known to require another value. The buffering time MUST be selected so that users perceive real-time text flow.
section: "5.1"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
