document: rfc-6690
kind: normative-requirement
summary: Implementations not supporting filtering MUST simply ignore the query string and return the whole resource for unicast requests. A multicast request with a query string SHOULD NOT be responded to if filtering is not supported or the filter does not match.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
