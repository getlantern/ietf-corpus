document: rfc-8311
kind: protocol-element
summary: 'ECN uses four codepoints in the two-bit ECN field of the IP header: Not-ECT (not ECN capable), ECT(0) and ECT(1) (both indicate ECN-Capable Transport), and CE (Congestion Experienced). Senders set ECT(0) or ECT(1) to signal ECN capability; network nodes set CE to signal congestion.'
section: "1.1"
topics:
    - ecn
    - ip
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
