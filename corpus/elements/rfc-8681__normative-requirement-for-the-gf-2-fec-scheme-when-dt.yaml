document: rfc-8681
kind: normative-requirement
summary: For the GF(2) FEC scheme when DT=15, the sender MUST set the Repair_Key field to zero and receivers MUST ignore it, because all coefficients are necessarily 1 and the coefficient generation function does not invoke the PRNG.
section: 5.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
