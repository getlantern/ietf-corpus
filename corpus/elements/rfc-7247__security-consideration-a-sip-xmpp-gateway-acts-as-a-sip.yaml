document: rfc-7247
kind: security-consideration
summary: A SIP-XMPP gateway acts as a SIP back-to-back user agent (B2BUA), making it susceptible to the amplification vulnerability described in RFC 5393. Gateways SHOULD implement the loop-detection methods in RFC 5393 to mitigate amplification attacks.
section: "8"
rfc2119_level: SHOULD
topics:
    - sip
    - security
    - realtime
