document: rfc-3124
kind: normative-requirement
summary: The CM MUST provide cm_thresh(float rate_downthresh, float rate_upthresh, float rtt_downthresh, float rtt_upthresh) so streams can specify thresholds for cmapp_update() callbacks. The CM SHOULD invoke the callback only when rates or RTTs change by the requisite factors.
section: "3.2"
rfc2119_level: MUST
topics:
    - congestion
