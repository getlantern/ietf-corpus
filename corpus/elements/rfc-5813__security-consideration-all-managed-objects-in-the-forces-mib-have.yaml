document: rfc-5813
kind: security-consideration
summary: All managed objects in the ForCES MIB have MAX-ACCESS of read-only or accessible-for-notify; there are no read-write or read-create objects, so there is no risk of an intruder altering or creating MIB objects via SNMP SET operations.
section: "8"
topics:
    - snmp
    - security
