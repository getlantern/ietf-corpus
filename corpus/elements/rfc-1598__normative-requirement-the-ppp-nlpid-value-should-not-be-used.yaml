document: rfc-1598
kind: normative-requirement
summary: The PPP NLPID value SHOULD NOT be used to demultiplex circuits which use the Zero NLPID in call setup. When such a Zero NLPID circuit coexists with PPP-encapsulated circuits, only network layer traffic not negotiated by the associated NCP is sent over the Zero NLPID circuit.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - ip
