document: rfc-9930
kind: protocol-element
summary: The Identity-Type TLV (type 2, mandatory, length 2) allows the server to hint which identity type to use. The Identity-Type field is 2 octets with values 1=User and 2=Machine. A server receiving a mismatched Identity-Type MUST fail unless the returned type is server-policy-permitted and was not already used for a successful authentication.
section: 4.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
