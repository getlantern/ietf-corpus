document: rfc-1519
kind: normative-requirement
summary: It is recommended that preconfiguration of aggregation ranges be used rather than purely dynamic aggregation, because it allows precise specification of the range of destinations to aggregate and avoids ambiguity when a constituent route is temporarily unreachable.
section: "4.4"
rfc2119_level: RECOMMENDED
