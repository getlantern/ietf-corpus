document: rfc-3550
kind: registry
summary: 'RTCP packet types are registered with IANA. Values defined in this document: SR=200, RR=201, SDES=202, BYE=203, APP=204. Implementations SHOULD ignore RTCP packets with unknown types. Additional types may be registered with IANA.'
