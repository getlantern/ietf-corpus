document: rfc-6093
kind: interoperability-note
summary: All widely deployed TCP implementations interpret the Urgent Pointer as pointing to the octet following the urgent data (RFC 793 section 3.1 semantics), not the last octet of urgent data (RFC 1122 semantics). The RFC 1122 clarification was never adopted in practice.
section: "3.2"
topics:
