document: rfc-6222
kind: security-consideration
summary: Implementations MUST NOT rely on the uniqueness of RTCP CNAMEs for any essential security services. Any participant can choose any CNAME value, allowing impersonation; no CNAME generation scheme can prevent this because an attacker can simply set the CNAME directly.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
