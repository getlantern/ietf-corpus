document: rfc-8689
kind: protocol-element
summary: TLS-Required is a new message header field used to request that recipient-side TLS policy mechanisms (MTA-STS, DANE) be ignored when relaying a message. Its only defined parameter value is 'No', indicating the sender prioritizes delivery over enforced TLS.
section: "3"
topics:
