document: rfc-6809
kind: protocol-element
summary: A B2BUA referenced by a Record-Route header field (not a Contact URI) inserts Feature-Caps in outgoing requests to signal capabilities toward downstream entities, and in responses toward upstream entities. It MAY also copy received Feature-Caps from an incoming request/response to the outgoing message before inserting its own.
section: 4.2.2
topics:
    - sip
extracted_by: claude-sonnet-4-6
