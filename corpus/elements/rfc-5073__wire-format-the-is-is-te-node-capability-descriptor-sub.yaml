document: rfc-5073
kind: wire-format
summary: 'The IS-IS TE Node Capability Descriptor sub-TLV uses type 1, variable length, with a value field consisting of an array of 8-bit units of flags numbered from the most significant bit as bit zero. Format follows RFC 3784: 1-octet type, 1-octet length, value field.'
