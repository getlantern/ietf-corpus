document: rfc-4972
kind: normative-requirement
summary: If the flooding scope of a TE-MESH-GROUP sub-TLV is limited to an IS-IS level/area, it MUST NOT be leaked across level/area boundaries and the S flag of the Router Capability TLV MUST be cleared. If the scope is the entire routing domain, the TLV MUST be leaked and the S flag MUST be set.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
