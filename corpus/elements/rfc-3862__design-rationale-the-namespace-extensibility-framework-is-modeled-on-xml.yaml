document: rfc-3862
kind: design-rationale
summary: The namespace extensibility framework is modeled on XML namespaces to allow different implementers to create extension headers without name collision risk. Namespace prefixes are strictly local to a message; only the namespace URI has global significance, so different prefix strings can denote identical namespaces across messages.
section: "3.4"
topics:
    - realtime
