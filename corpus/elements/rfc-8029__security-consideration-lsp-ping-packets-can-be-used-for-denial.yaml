document: rfc-8029
kind: security-consideration
summary: LSP ping packets can be used for denial-of-service attacks; implementations should rate-limit processing of echo requests and apply access control to restrict which sources may send MPLS echo requests. The diagnostic nature of the protocol means exposure should be limited to authorized network operators.
section: "5"
topics:
    - mpls
    - security
