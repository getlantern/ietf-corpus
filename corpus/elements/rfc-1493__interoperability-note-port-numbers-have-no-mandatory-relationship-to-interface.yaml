document: rfc-1493
kind: interoperability-note
summary: Port numbers have no mandatory relationship to interface numbers; in simple cases they match, but multiple ports may share one ifIndex (e.g., multiple X.25 virtual circuits on one interface). The dot1dBasePortCircuit object disambiguates such cases with a unique OID per port.
section: 3.2.2
topics:
