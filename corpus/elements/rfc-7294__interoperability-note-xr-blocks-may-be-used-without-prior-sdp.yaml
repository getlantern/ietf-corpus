document: rfc-7294
kind: interoperability-note
summary: XR blocks MAY be used without prior SDP signaling. When SDP is used in Offer/Answer context, the SDP Offer/Answer usage defined in RFC 3611 applies. The 'thresh' parameter for Severely Concealed Seconds is declared by the offerer.
section: "5.2"
topics:
    - rtp
    - realtime
