document: rfc-9342
kind: interoperability-note
summary: The Clustered Alternate-Marking Method applies only to unicast flows (multipoint-to-multipoint, anycast, ECMP). For BUM traffic, RFC 9341's basic method applies link by link. Fragmented packets are handled per the guidance in Section 6 of RFC 9341.
