document: rfc-3841
kind: normative-requirement
summary: A redirect server returning contacts MUST NOT include feature parameters for entries in the target set after applying caller preferences, to prevent double application. If feature parameters are desired, it MUST redirect using the original target set and q-values before preference application.
section: 7.2.4
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
