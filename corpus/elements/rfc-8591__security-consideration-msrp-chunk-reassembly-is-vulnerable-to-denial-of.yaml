document: rfc-8591
kind: security-consideration
summary: MSRP chunk reassembly is vulnerable to denial-of-service via large Byte-Range header values. Implementations must sanity-check these values before allocating memory for reassembly, as described in RFC 4975 Section 14.5.
section: "12"
topics:
    - security
