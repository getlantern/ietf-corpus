document: rfc-3407
kind: design-rationale
summary: The capability description (cdsc) refers to send and receive capability by default because the mechanism is designed to express what an endpoint is capable of supporting, not what it commits to using — actual commitment is done via separate session negotiation (e.g., offer/answer).
