document: rfc-5292
kind: normative-requirement
summary: 'The values of the Sequence, Length, Minlen, and Maxlen fields must satisfy: 0 <= Length < Minlen <= Maxlen. Tests related to Minlen or Maxlen should be omitted when those fields are unspecified (value 0).'
section: "2"
rfc2119_level: MUST
