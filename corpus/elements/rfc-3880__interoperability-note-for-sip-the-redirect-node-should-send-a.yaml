document: rfc-3880
kind: interoperability-note
summary: 'For SIP, the redirect node SHOULD send a 3xx response: ''301 Moved Permanently'' if permanent=''yes'', or ''302 Moved Temporarily'' otherwise. The reject node SHOULD map named statuses to SIP codes (e.g., ''busy''→486, ''notfound''→404, ''reject''→603, ''error''→500).'
section: 6.2.1
topics:
    - sip
    - voip
