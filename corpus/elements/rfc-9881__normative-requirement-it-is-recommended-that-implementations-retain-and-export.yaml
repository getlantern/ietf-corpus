document: rfc-9881
kind: normative-requirement
summary: It is RECOMMENDED that implementations retain and export the seed even when also exporting the expanded private key, because expanding a seed is a one-way function — once the seed is discarded, it cannot be recovered from the expanded private key.
section: "8.1"
rfc2119_level: RECOMMENDED
topics:
    - pkix
    - crypto
