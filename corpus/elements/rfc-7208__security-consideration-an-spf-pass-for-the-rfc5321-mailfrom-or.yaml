document: rfc-7208
kind: security-consideration
summary: An SPF 'pass' for the RFC5321.MailFrom or HELO identity does not authenticate the RFC5322.From header visible to users. Forgers can obtain an SPF pass for their own domain while displaying a different, trusted sender name to the recipient.
section: "11.2"
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
