document: rfc-7529
kind: protocol-element
summary: 'The SKIP element controls handling of invalid dates generated during recurrence expansion: OMIT (default) ignores the invalid date, BACKWARD shifts to the previous valid date, and FORWARD shifts to the next valid date. SKIP MUST NOT be present unless RSCALE is also present.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
