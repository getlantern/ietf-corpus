document: rfc-1271
kind: normative-requirement
summary: The probe must only grant write access to alarmVariable in those MIB views that have read access to all objects on the probe, because no SNMP access control mechanism can restrict the OID to objects within a particular view.
section: "6"
rfc2119_level: MUST
topics:
    - snmp
    - security
