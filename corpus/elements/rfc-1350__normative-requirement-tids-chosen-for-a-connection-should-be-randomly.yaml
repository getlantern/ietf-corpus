document: rfc-1350
kind: normative-requirement
summary: TIDs chosen for a connection should be randomly chosen so that the probability of the same number being chosen twice in immediate succession is very low. TIDs must be between 0 and 65,535 to be valid as UDP port numbers.
section: "4"
rfc2119_level: SHOULD
topics:
    - udp
