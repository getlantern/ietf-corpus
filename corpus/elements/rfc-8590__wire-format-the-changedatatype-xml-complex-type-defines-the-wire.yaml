summary: 'The changeDataType XML complex type defines the wire structure: a sequence of operation (operationType), date (dateTime), svTRID (epp:trIDStringType), who (whoType, 1–255 char normalizedString), optional caseId (caseIdType), and optional reason (eppcom:reasonType), plus a ''state'' attribute of stateType defaulting to ''after''.'
