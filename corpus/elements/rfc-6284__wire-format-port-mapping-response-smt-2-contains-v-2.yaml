document: rfc-6284
kind: wire-format
summary: 'Port Mapping Response (SMT=2): contains V=2/P/SMT/PT=TOKEN header, 32-bit SSRC of server, 32-bit SSRC of requesting client, 64-bit Associated Nonce, variable-length Token Element (16-bit length-value, 32-bit aligned), 64-bit Absolute Expiration Time (NTP seconds), 32-bit Relative Expiration Time (seconds; zero means Token denied), and variable-length Packet Types Element (8-bit length-value listing RTCP types requiring authentication).'
section: "4.2"
topics:
    - rtp
    - realtime
