document: rfc-6350
kind: protocol-element
summary: The GENDER property specifies sex (biological) and gender identity as a two-component structured value separated by a semicolon. The sex component is a single letter (M/F/O/N/U or empty); the gender identity component is free-form text. Both components are optional.
section: 6.2.7
topics:
    - privacy
