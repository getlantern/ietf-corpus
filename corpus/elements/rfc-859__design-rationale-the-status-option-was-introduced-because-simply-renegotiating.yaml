document: rfc-859
kind: design-rationale
summary: The STATUS option was introduced because simply renegotiating options to verify their state could produce nonterminating request loops as described in the General Considerations section of the Telnet specification. This option allows verification without triggering renegotiation.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
