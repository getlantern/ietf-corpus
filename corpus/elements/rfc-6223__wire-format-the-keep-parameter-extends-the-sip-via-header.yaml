document: rfc-6223
kind: wire-format
summary: 'The "keep" parameter extends the SIP Via header ABNF as: `keep = "keep" [ EQUAL 1*(DIGIT) ]`. The optional numeric value represents the recommended keep-alive frequency in seconds. A value of zero means no recommended frequency.'
