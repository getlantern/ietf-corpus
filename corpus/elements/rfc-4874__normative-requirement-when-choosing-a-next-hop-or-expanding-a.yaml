document: rfc-4874
kind: normative-requirement
summary: When choosing a next hop or expanding a loose hop, a node MUST NOT introduce any explicit or abstract node that equals or is a member of any XRO subobject with L=0 (mandatory exclusion), and MUST NOT introduce links or resources identified by a mandatory SRLG subobject. The number of avoided (L=1) nodes and SRLGs SHOULD be minimized.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
