document: rfc-9911
kind: protocol-element
summary: 'RFC 9911 introduces nine new duration types: hours32 (int32), minutes32 (int32), seconds32 (int32), centiseconds32 (int32), milliseconds32 (int32), microseconds32 (int32), microseconds64 (int64), nanoseconds32 (int32), and nanoseconds64 (int64). All represent signed time periods in their respective units and should be range-restricted to ''0..max'' when only non-negative values are needed.'
