document: rfc-9442
kind: design-rationale
summary: ACK-on-Error mode is chosen as optimal for reliable Uplink SCHC Packet transmission over Sigfox because it leads to a reduced number of ACKs in the lower-capacity Downlink channel and allows Downlink messages to be sent asynchronously and opportunistically. ACK-Always would not minimize ACKs, and No-ACK would not allow reliable transmission.
section: 3.5.1.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
