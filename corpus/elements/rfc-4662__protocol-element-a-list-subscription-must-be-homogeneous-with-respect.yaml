document: rfc-4662
kind: protocol-element
summary: A list subscription must be homogeneous with respect to the underlying event package — a single list subscription applies only one event package to all resources in the resource list. List subscriptions support arbitrary nesting, where elements within the list may be atomic resources or sub-lists themselves.
