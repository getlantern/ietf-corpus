document: rfc-5429
kind: design-rationale
summary: 'The original RFC 3028 ''reject'' action required sending an MDN to the envelope sender, which contributed to ''Joe-job'' blowback: forged spam caused floods of MDNs to innocent third-parties. RFC 5429 updates ''reject'' to permit SMTP-level refusal and introduces ''ereject'' to require it, reducing the risk of misdirected MDNs.'
section: "1"
topics:
    - email
    - security
