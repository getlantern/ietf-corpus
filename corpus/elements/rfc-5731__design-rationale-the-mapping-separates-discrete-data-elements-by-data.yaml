document: rfc-5731
kind: design-rationale
summary: The mapping separates discrete data elements by data type rather than aggregating them into opaque strings. This allows XML Schema processors to perform basic syntax validation, reducing ambiguity and the amount of parsing and syntax-checking work required of protocol processors.
