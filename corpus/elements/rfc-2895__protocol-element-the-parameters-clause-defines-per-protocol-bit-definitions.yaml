document: rfc-2895
kind: protocol-element
summary: 'The PARAMETERS clause defines per-protocol bit definitions encoded into the protocolDirParameters octet. Two reserved bits are defined: countsFragments(0) indicating correct fragment attribution, and tracksSessions(1) indicating correct tracking of remapped session ports (e.g., TFTP).'
