document: rfc-9761
kind: security-consideration
summary: The middlebox MUST adhere to the invariants in RFC 8446 Section 9.3 when acting as a compliant (D)TLS proxy. While malware mimicking legitimate IoT device (D)TLS profiles is challenging due to per-model and per-manufacturer variability, it is not impossible; network security services should also use contextual network data (domain name, IP reputation, anomaly detection) to detect false negatives.
section: "9"
topics:
    - tls
    - security
