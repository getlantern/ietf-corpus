document: rfc-3473
kind: normative-requirement
summary: When establishing a bidirectional LSP, the Upstream_Label object MUST indicate a label that is valid for forwarding at the time the Path message is sent. An unacceptable upstream label MUST cause the receiver to issue a PathErr with 'Routing problem/Unacceptable label value'.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
