document: rfc-4827
kind: design-rationale
summary: 'Three use cases motivate persistent XCAP-based presence: (1) person-related state during periods with no active devices (e.g., vacation), (2) advertising always-available services like email/MMS/SMS without requiring a constantly-active publishing device, and (3) setting default state in the absence of any actively-publishing device.'
