document: rfc-3798
kind: protocol-element
summary: The Final-Recipient field identifies the recipient for whom the MDN is issued and MUST be present. Its generic-address subfield MUST contain the mailbox address as it was when the MDN was generated, and the case of alphabetic characters MUST be preserved.
section: 3.2.4
topics:
