document: rfc-9480
kind: wire-format
summary: CertReqTemplateContent (id-it 19) is a SEQUENCE of a CertTemplate and optional Controls (keySpec). The publicKey field in certTemplate MUST NOT be used; supported key algorithms are specified via id-regCtrl-algId (id-pkix pkip regCtrl 11) and id-regCtrl-rsaKeyLen (id-pkix pkip regCtrl 12) controls.
