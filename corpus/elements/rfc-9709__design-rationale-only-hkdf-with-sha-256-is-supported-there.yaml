document: rfc-9709
kind: design-rationale
summary: Only HKDF with SHA-256 is supported; there is no provision for other KDFs or hash functions. This deliberate constraint keeps the design simple and avoids negotiation; a new object identifier can be assigned later if an alternative is ever needed.
section: "1.3"
topics:
    - crypto
