kind: wire-format
summary: 'The Privacy Header provides confidentiality via encryption and contains: SAID (32-bit), Initialization Vector (optional, presence/length SAID-dependent), and encrypted fields: Next Header (8-bit), Length (8-bit), Reserved, Protected Data (variable, may contain full encapsulated IPv6 datagram or transport payload), and algorithm-dependent Trailer.'
