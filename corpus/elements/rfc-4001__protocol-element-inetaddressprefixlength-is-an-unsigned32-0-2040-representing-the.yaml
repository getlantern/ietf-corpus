document: rfc-4001
kind: protocol-element
summary: InetAddressPrefixLength is an Unsigned32 (0..2040) representing the number of contiguous 1-bits from the MSB of an address mask. Maximum significant values are 32 for IPv4/IPv4z and 128 for IPv6/IPv6z; the maximum for dns(16) is 0.
