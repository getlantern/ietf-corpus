document: rfc-7179
kind: protocol-element
summary: The TRILL Header Op-Length field (5 bits) specifies the length of the extensions area in units of 4 octets, allowing up to 124 octets of header extension. When Op-Length is non-zero, the extension area immediately follows the Ingress RBridge Nickname field, and its first 32 bits are always the extended header flags word.
section: "2"
