document: rfc-9790
kind: wire-format
summary: An MPLS label stack consists of consecutive 4-octet Label Stack Entries, each encoding a 20-bit label, a 3-bit TC (Traffic Class) field, a 1-bit Bottom-of-Stack flag (S), and an 8-bit TTL. The Bottom-of-Stack flag is set in the final entry. The PFN is the top 4 bits of the first byte immediately after the last label stack entry.
section: "1.4"
topics:
    - mpls
