document: rfc-9802
kind: wire-format
summary: HSS, XMSS, and XMSS^MT public keys are each encoded as an ASN.1 OCTET STRING (e.g., HSS-LMS-HashSig-PublicKey, XMSS-HashSig-PublicKey, XMSSMT-HashSig-PublicKey) with no additional ASN.1 wrapping. When placed in SubjectPublicKeyInfo, the OCTET STRING is mapped bit-for-bit into the subjectPublicKey BIT STRING.
