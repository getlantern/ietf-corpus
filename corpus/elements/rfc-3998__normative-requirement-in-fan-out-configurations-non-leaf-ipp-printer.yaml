document: rfc-3998
kind: normative-requirement
summary: In Fan-Out configurations, Non-Leaf IPP Printer objects MUST NOT forward Printer-affecting operations (Enable-Printer, Disable-Printer, Hold-New-Jobs, Deactivate-Printer, Activate-Printer, Restart-Printer, Shutdown-Printer, Startup-Printer, Get-Printer-Attributes, Pause-Printer, Resume-Printer, Set-Printer-Attributes) to any Subordinate Printer. Clients targeting a Subordinate Printer MUST specify its URI directly.
section: 10.7.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
