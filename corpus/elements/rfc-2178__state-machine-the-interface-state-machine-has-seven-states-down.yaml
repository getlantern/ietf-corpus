document: rfc-2178
kind: state-machine
summary: 'The interface state machine has seven states: Down, Loopback, Waiting, Point-to-Point, DROther, Backup, and DR. Key triggers include InterfaceUp (Down→Waiting or Point-to-Point), WaitTimer or BackupSeen (Waiting→DR/Backup/DROther), and NeighborChange (re-evaluates DR/BDR election).'
section: "9.3"
topics:
    - routing
