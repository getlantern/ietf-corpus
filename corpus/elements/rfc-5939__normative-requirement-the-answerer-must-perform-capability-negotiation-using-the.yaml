document: rfc-5939
kind: normative-requirement
summary: The answerer MUST perform capability negotiation using the most preferred valid potential configuration, subject to local policy. A potential configuration is valid only if its syntax is correct, its config-number is unique in the media description, and all referenced capabilities are valid and present at the correct scope level.
section: 3.6.2
rfc2119_level: MUST
topics:
    - realtime
