document: rfc-7541
kind: protocol-element
summary: 'The dynamic table entry size is computed as: length of name in octets + length of value in octets + 32. The 32-octet overhead accounts for estimated per-entry structure cost (e.g., two 64-bit pointers and two 64-bit reference counts). Huffman encoding is not applied when calculating size.'
section: "4.1"
topics:
