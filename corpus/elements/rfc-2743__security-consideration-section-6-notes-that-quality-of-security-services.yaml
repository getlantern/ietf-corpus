document: rfc-2743
kind: security-consideration
summary: Section 6 notes that quality of security services provided depends on the strength and correct implementation of underlying mechanisms. Callers should not assume confidentiality protection for channel binding information; mechanisms are encouraged but not required to provide it.
section: "6"
topics:
