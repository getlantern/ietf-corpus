document: rfc-8000
kind: protocol-element
summary: 'NFSv4 servers may require two kinds of identity mappings: (1) auth-to-authz mapping between authentication identity and authorization context information, and (2) wire-to-disk mapping between on-the-wire and on-disk authorization identity representations. A name service such as LDAP often provides these.'
section: "4.1"
topics:
    - security
    - ldap
