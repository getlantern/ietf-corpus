document: rfc-5425
kind: normative-requirement
summary: Syslog applications SHOULD be implemented to permit administrators to select the cryptographic level and authentication options as a matter of local policy. Security parameters of a resumed TLS session SHOULD be checked against the requirements of the new session.
section: 4.2.3
rfc2119_level: SHOULD
topics:
    - tls
    - syslog
    - crypto
    - security
