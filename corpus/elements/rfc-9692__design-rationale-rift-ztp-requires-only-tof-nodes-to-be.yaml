document: rfc-9692
kind: design-rationale
summary: RIFT ZTP requires only ToF nodes to be explicitly configured as such; all other nodes (spines and leaves) derive their level automatically through LIE exchange. This zero-configuration approach allows large fabrics to be provisioned with minimal human intervention.
