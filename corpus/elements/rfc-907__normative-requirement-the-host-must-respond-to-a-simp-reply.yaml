document: rfc-907
kind: normative-requirement
summary: The host must respond to a SIMP Reply with a Reply Acknowledgment within 1 second. The host should receive a Reply to a setup request requiring global communication within 2 seconds, and to a request requiring only local SIMP communication within 1 second.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
