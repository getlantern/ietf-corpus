document: rfc-8311
kind: normative-requirement
summary: 'If a Congestion Marking Differences experiment modifies ECT(1) network behavior in a way requiring sender congestion response changes, the Experimental RFC MUST specify both: the sender congestion response to CE marking, and router behavior changes (or absence thereof) in forwarding CE-marked experiment packets.'
section: "4.2"
rfc2119_level: MUST
topics:
    - ecn
    - congestion
