document: rfc-5588
kind: design-rationale
summary: The GSS-API does not provide credential import/export interfaces analogous to its context import/export interfaces, and there is no mechanism for delegated credential handles to be made available for acquisition via GSS_Acquire_cred()/GSS_Add_cred(). This asymmetry motivates the new primitive.
section: "1"
topics:
    - security
