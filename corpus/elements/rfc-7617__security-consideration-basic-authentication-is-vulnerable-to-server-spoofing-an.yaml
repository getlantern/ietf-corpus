document: rfc-7617
kind: security-consideration
summary: 'Basic authentication is vulnerable to server spoofing: an attacker posing as a legitimate server can solicit and capture the user''s password. Software components that take over message framing on an existing connection (e.g., NPH scripts) need to be used carefully or not at all.'
