document: rfc-5763
kind: protocol-element
summary: In the forking scenario, each answerer that responds to a forked INVITE establishes an independent DTLS association with the offerer. The offerer correlates each SDP answer to the correct DTLS association by comparing the fingerprint in the answer to the hashed certificate.
