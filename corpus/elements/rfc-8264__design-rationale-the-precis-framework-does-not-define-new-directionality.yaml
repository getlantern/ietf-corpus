document: rfc-8264
kind: design-rationale
summary: The PRECIS framework does not define new directionality rules because no widely accepted solution exists for the safe display of arbitrary bidirectional strings. Profile authors are strongly encouraged to use the 'Bidi Rule' (RFC 5893) for IdentifierClass profiles or the Unicode bidirectional algorithm (UAX9) for FreeformClass profiles rather than inventing new rules.
section: 5.2.5
topics:
    - security
