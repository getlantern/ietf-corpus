document: rfc-5520
kind: design-rationale
summary: A PCE that cannot retain information about previously used path-key values across a restart SHOULD embed a timestamp or version number in the path-key to guarantee uniqueness, since the 30-minute non-reuse window depends on persistent memory of prior key assignments.
section: "2.1"
topics:
    - routing
    - security
