document: rfc-6880
kind: protocol-element
summary: A KeySet groups symmetric secret keys for a principal by key version number (kvno). Each KeySet is associated with exactly one principal and MUST contain one or more Keys. For any given enctype, a KeySet MUST NOT contain more than one key with that enctype.
section: "4.2"
topics:
    - security
    - crypto
