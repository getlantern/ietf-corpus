document: rfc-2806
kind: security-consideration
summary: The local entity SHOULD provide a mechanism for the user to filter unwanted numbers, SHOULD NOT perform rapid redialing on busy signals (to avoid network congestion), and SHOULD detect premature call termination and refrain from automatic retry without user instruction.
section: "5"
rfc2119_level: SHOULD
topics:
