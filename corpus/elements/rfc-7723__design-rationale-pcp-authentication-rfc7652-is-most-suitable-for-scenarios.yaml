document: rfc-7723
kind: design-rationale
summary: PCP authentication [RFC7652] is most suitable for scenarios with many users and a trusted network operator (large corporate or campus networks with parallel NATs/firewalls), but less suitable for high-trust small scenarios (residential gateways) or low-trust environments (airport Wi-Fi) where the setup cost outweighs benefits. A thorough cost-benefit analysis per scenario is recommended.
section: "5.2"
