document: rfc-6955
kind: design-rationale
summary: The Discrete Logarithm Signature was introduced to provide POP for DH keys that do not share a common parameter set. When multiple keys share the same DH parameters, the probability of collisions increases and brute-force attacks can target the entire parameter set at once; a signature-based approach with a q parameter eliminates this dependency.
section: "5"
topics:
