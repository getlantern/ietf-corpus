document: rfc-3547
kind: normative-requirement
summary: A GROUPKEY-PUSH message MUST NOT change the group policy without creating a new KEK; if full forward access control is required, two sequential GROUPKEY-PUSH messages changing the KEK MUST be sent.
section: 4.2.1
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - multicast
