document: rfc-9580
kind: registry
summary: IANA maintains the 'OpenPGP Packet Types' registry (formerly 'PGP Packet Types') with Type IDs 0–63. IDs 0–39 are critical; 40–63 are non-critical. This document defines packet types including the new Padding Packet (ID 21) and reserves IDs 20 and 22–39.
