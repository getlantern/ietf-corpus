document: rfc-4293
kind: protocol-element
summary: ipForwarding is a read-write INTEGER object (forwarding(1)/notForwarding(2)) controlling whether this entity acts as an IPv4 router. Changes should be saved to non-volatile storage; a SHOULD (rather than MUST) is used because the object was previously defined with weaker language.
