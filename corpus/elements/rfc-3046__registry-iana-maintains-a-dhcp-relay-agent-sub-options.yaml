document: rfc-3046
kind: registry
summary: IANA maintains a 'DHCP Relay Agent Sub-options' number space in the BOOTP-DHCP Parameters Registry. Initial assignments are sub-option 1 (Agent Circuit ID) and sub-option 2 (Agent Remote ID). Future sub-options require IETF Consensus per RFC 2434.
