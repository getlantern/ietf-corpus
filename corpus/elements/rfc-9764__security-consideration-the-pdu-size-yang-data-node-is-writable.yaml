document: rfc-9764
kind: security-consideration
summary: 'The ''pdu-size'' YANG data node is writable and sensitive: changing it for a session in the Up state may cause the session to go Down. Operators must be mindful that multiple BFD clients may rely on the status of a given BFD session when changing this value.'
section: "6.1"
topics:
    - security
    - routing
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
