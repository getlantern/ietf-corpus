document: rfc-4683
kind: normative-requirement
summary: Before calculating a PEPSI, conforming implementations MUST process the userPassword with the six-step LDAPBIS stringprep algorithm, with the mapping step extended to include characters mapped to nothing (RFC 3454 Appendix B.1) and step 6 (Insignificant Character Removal) omitted.
section: "5.2"
rfc2119_level: MUST
topics:
    - pkix
    - ldap
