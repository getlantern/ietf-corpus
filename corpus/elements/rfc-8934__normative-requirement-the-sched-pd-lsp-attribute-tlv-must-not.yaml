document: rfc-8934
kind: normative-requirement
summary: The SCHED-PD-LSP-ATTRIBUTE TLV MUST NOT be included unless both PCEP peers have set the B and PD bits to 1. If received when either bit is zero, the peer MUST generate a PCErr with Error-Type=19 and Error-value=15.
section: 5.2.2
rfc2119_level: MUST NOT
topics:
    - routing
    - mpls
