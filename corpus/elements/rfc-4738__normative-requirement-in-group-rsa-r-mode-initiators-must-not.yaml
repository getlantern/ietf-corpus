document: rfc-4738
kind: normative-requirement
summary: In group RSA-R mode, Initiators MUST NOT send the SP payload. The Responder sends the SP payload in the R_MESSAGE to convey the session policy for all group members.
section: "3.2"
rfc2119_level: MUST NOT
