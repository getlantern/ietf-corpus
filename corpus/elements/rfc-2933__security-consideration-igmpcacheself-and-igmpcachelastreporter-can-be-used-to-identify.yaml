document: rfc-2933
kind: security-consideration
summary: igmpCacheSelf and igmpCacheLastReporter can be used to identify machines listening to a given multicast group address, exposing potentially sensitive membership information. Unauthorized read access is described as relatively innocuous but still warrants access control.
