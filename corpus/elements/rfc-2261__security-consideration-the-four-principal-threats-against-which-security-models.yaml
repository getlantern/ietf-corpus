document: rfc-2261
kind: security-consideration
summary: 'The four principal threats against which Security Models SHOULD protect are: (1) Modification of Information — unauthorized alteration of in-transit SNMP messages; (2) Masquerade — assuming the identity of an authorized principal; (3) Message Stream Modification — malicious re-ordering, delay, or replay of messages beyond natural network effects; (4) Disclosure — eavesdropping on exchanges between SNMP engines.'
section: "1.4"
topics:
    - snmp
    - security
