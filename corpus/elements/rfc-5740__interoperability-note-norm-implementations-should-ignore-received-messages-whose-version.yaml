document: rfc-5740
kind: interoperability-note
summary: NORM implementations SHOULD ignore received messages whose 'version' field differs from their own, as differing version numbers indicate non-interoperable protocol upgrades. The current version number is 1. This allows future protocol versions to coexist on the same multicast group without causing mis-processing.
section: "4.1"
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
