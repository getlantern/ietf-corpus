document: rfc-8883
kind: normative-requirement
summary: Before using the Pointer field as an offset into the invoking packet data, a node MUST first validate that the pointer value is less than the length of the invoking packet data. This applies to both the Parameter Problem and Destination Unreachable error formats.
section: "2.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
