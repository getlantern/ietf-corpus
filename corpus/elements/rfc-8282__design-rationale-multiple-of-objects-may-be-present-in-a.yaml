document: rfc-8282
kind: design-rationale
summary: Multiple OF objects MAY be present in a PCReq to allow different Objective Functions to be applied within different network layers. The first OF object specifies an objective function for the higher-layer network, and subsequent OF objects specify objective functions for the subsequent lower-layer networks.
section: "4.1"
topics:
    - routing
    - mpls
