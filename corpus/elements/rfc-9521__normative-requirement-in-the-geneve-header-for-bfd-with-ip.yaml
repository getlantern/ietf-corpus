document: rfc-9521
kind: normative-requirement
summary: 'In the Geneve header for BFD with IP payload: the O bit MUST be set to 1, the C bit MUST be set to 0, and the Protocol Type field MUST be set to 0x0800 (IPv4) or 0x86DD (IPv6) depending on the address family of the inner IP packet.'
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - ip
