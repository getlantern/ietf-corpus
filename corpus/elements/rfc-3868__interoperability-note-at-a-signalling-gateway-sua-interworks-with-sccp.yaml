document: rfc-3868
kind: interoperability-note
summary: At a Signalling Gateway, SUA interworks with SCCP by translating SCCP management primitives (SSP, SSA, SST, SSC) to SUA SNM messages (DUNA, DAVA, DAUD, DRST, DUPU, SCON) and vice versa; full SCCP–SUA interworking procedures for both connectionless and connection-oriented transfer are defined in section 4.7.
section: "4.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
