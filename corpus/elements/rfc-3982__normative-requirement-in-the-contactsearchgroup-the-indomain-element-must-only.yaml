document: rfc-3982
kind: normative-requirement
summary: In the contactSearchGroup, the <inDomain> element MUST only contain a valid domain name (without an '@' symbol), and matching SHOULD take place only on the given domain without partial substring or parent-domain matches. Non-ASCII content in <inDomain> or the domain part of <exactMatch> MUST be normalized per RFC 3491.
section: 3.1.7
rfc2119_level: MUST
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
