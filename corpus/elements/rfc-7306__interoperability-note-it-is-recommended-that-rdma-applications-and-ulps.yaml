document: rfc-7306
kind: interoperability-note
summary: It is RECOMMENDED that RDMA applications and ULPs negotiate the use of Immediate Data and Atomic Operations at the application or ULP level before using them. Existing applications SHOULD NOT assume these extensions are supported; in the absence of negotiation, errors returned by the remote peer can be used to probe capability.
section: "1.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
