document: rfc-4436
kind: security-consideration
summary: Adjusting security configuration (e.g., disabling a personal firewall) based on DNAv4 results is NOT RECOMMENDED, since a spoofed reachability test response could trick the host into lowering its security posture on an untrusted network.
