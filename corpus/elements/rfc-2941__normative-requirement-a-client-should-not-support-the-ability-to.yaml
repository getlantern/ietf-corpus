document: rfc-2941
kind: normative-requirement
summary: A client SHOULD NOT support the ability to turn off encryption once it has been enabled. If an attempt to re-enable encryption fails after it was disabled, the client MUST terminate the telnet connection.
section: "5"
rfc2119_level: SHOULD NOT
topics:
    - security
    - crypto
