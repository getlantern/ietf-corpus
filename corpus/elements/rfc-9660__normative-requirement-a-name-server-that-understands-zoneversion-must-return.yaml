document: rfc-9660
kind: normative-requirement
summary: A name server that understands ZONEVERSION MUST return a FORMERR response when the ZONEVERSION OPTION-LENGTH is not zero in a query, or when more than one ZONEVERSION option is present in a query.
section: 3.2.1
rfc2119_level: MUST
