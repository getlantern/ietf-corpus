document: rfc-6120
kind: normative-requirement
summary: Resource binding is mandatory-to-negotiate for client-to-server streams. After SASL success the server MUST advertise the resource binding feature, and a client MUST complete resource binding before it may send XML stanzas to entities other than the connected server.
section: 7.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
