document: rfc-9785
kind: interoperability-note
summary: When using Highest-Preference or Lowest-Preference with AC-DF capability, a PE is not considered a DF candidate until both its Ethernet A-D per ES and Ethernet A-D per EVI routes are received, consistent with RFC 8584 AC-DF procedures.
