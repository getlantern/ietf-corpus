document: rfc-4656
kind: security-consideration
summary: Long-term manually managed keys create operational risks because they are never automatically rotated. Operators SHOULD use short shared secrets, rotate them frequently, and be aware that a compromised key allows session replay and timestamp forgery until the key is changed.
section: "6.8"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
