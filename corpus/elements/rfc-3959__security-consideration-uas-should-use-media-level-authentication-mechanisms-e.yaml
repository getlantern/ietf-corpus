document: rfc-3959
kind: security-consideration
summary: UAs SHOULD use media-level authentication mechanisms (e.g., SRTP) to prevent attackers from guessing transport addresses and injecting media. UAs wishing to keep communications confidential SHOULD use media-level encryption mechanisms such as SRTP.
