document: rfc-5577
kind: design-rationale
summary: RFC 5577 obsoletes RFC 3047 primarily to add Superwideband (14 kHz) audio support defined in Annex C of the revised ITU-T G.722.1, and to add a 32 kHz sampling rate alongside the original 16 kHz rate. Text was also updated to conform to current RFC and media type registration rules.
