document: rfc-7012
kind: normative-requirement
summary: Information Element names MUST be unique within the IANA 'IPFIX Information Elements' registry. Names MUST start with lowercase letters, and composed names MUST use camelCase (first letter of each component capitalized except the first).
section: "2.3"
rfc2119_level: MUST
