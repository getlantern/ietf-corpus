document: rfc-2263
kind: protocol-element
summary: The SnmpTagValue and SnmpTagList textual conventions (OCTET STRING, SIZE 0–255, UTF-8 encoded) provide a mechanism for grouping management target addresses. A tag value may not contain delimiter characters (space 0x20, TAB 0x09, CR 0x0D, LF 0x0B) and may not have zero length. A tag list separates tag values with exactly one delimiter character and may not have leading, trailing, or adjacent delimiters.
section: 4.1.1
topics:
    - snmp
