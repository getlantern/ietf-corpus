document: rfc-4607
kind: registry
summary: IANA allocates IPv4 SSM addresses in the range 232.0.0.1 through 232.0.0.255, and IPv6 SSM addresses in FF3x::4000:0001 through FF3x::7FFF:FFFF, allocated according to IETF Consensus. 232.0.0.0 and FF3x::4000:0000 are reserved as null values and must not be allocated.
section: "9"
topics:
