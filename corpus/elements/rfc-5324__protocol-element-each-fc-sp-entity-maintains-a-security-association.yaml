document: rfc-5324
kind: protocol-element
summary: Each FC-SP entity maintains a Security Association Database (SADB) containing active SAs and Traffic Selectors. Each SA entry includes an SPI (Security Parameters Index carried in transmitted frames), a Sequence Number counter, and transform parameters (encryption algorithm, integrity algorithm, mode, keys). Traffic Selector entries are ordered by precedence and indicate either bypass/drop or protection/verification actions.
section: 3.4.2
topics:
    - security
    - crypto
