document: rfc-5340
kind: wire-format
summary: OSPFv3 is encapsulated directly in IPv6 with the Next Header field of the immediately encapsulating IPv6 header set to 89. IPv6 prefixes in LSAs are represented as [PrefixLength (8-bit), PrefixOptions (8-bit), Address Prefix] with the prefix field padded to a 32-bit word boundary. The default route is expressed as a prefix with length 0.
section: "4.2"
topics:
    - routing
    - ip
