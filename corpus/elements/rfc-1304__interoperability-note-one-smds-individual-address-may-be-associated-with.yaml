document: rfc-1304
kind: interoperability-note
summary: One SMDS individual address may be associated with multiple IP addresses, and one SNI may be associated with multiple Logical IP Subnetworks (LISs). The ipOverSMDSTable is indexed by both interface number and IP address to represent these many-to-many relationships.
