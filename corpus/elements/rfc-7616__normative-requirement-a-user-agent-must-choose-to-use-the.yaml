document: rfc-7616
kind: normative-requirement
summary: A user agent MUST choose to use the strongest auth-scheme it understands when a server offers multiple authentication schemes, as the effective security is only as strong as the weakest scheme used.
section: "5.6"
rfc2119_level: MUST
