document: rfc-2206
kind: protocol-element
summary: ADSPEC general characterization parameters in rsvpSenderEntry include rsvpSenderAdspecBreak (global break bit), rsvpSenderAdspecHopCount (INTEGER 0..65535), rsvpSenderAdspecPathBw (BitRate), rsvpSenderAdspecMinLatency (Integer32, microseconds), and rsvpSenderAdspecMtu (INTEGER 0..65535, bytes). Zero or noSuchValue indicates the parameter was absent or invalid.
section: "3.2"
topics:
