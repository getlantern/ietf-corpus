document: rfc-7843
kind: privacy-consideration
summary: The THIRD_PARTY_ID carries a context identifier that might contain privacy-sensitive information. Creation of PCP messages containing the THIRD_PARTY_ID option should be done by operator-controlled entities (e.g., the web portal or UPnP IGD-PCP IWF), not directly by the subscriber, to prevent exposure of sensitive identifiers.
section: "7"
topics:
