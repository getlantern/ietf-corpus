document: rfc-5191
kind: wire-format
summary: 'Each AVP carries: a 16-bit AVP Code, a 16-bit AVP Flags field (V-bit for vendor-specific), a 16-bit AVP Length (value octets only, excluding header fields), a 16-bit Reserved field, an optional 32-bit Vendor-Id, and a variable-length Value field. OctetString AVPs MUST be padded to a 32-bit boundary; padding is not counted in AVP Length.'
section: "6.3"
topics:
    - security
