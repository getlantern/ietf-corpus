document: rfc-1508
kind: security-consideration
summary: The ability for an entity to acquire and use credentials associated with a given identity is equivalent to the ability to assert that principal's identity. Underlying mechanisms and OS functions below the GSS-API are responsible for constraining credential acquisition and use to appropriate processes; implementors must treat this responsibility seriously.
section: 1.1.1
topics:
    - security
