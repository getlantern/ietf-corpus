document: rfc-2472
kind: normative-requirement
summary: A Configure-Request MUST contain exactly one instance of the Interface-Identifier option, and the interface identifier MUST be unique within the PPP link so that different values are selected for each end upon completion of negotiation.
section: "4.1"
rfc2119_level: MUST
topics:
