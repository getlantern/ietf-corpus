document: rfc-4807
kind: design-rationale
summary: Policy tables use generic names (without 'SA', 'IPsec' prefixes) because packet classification and filter-to-action matching is more general than IPsec alone. The same tables can be reused for firewall configuration or other packet-transforming actions, avoiding protocol-specific lock-in.
