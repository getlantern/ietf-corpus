document: rfc-5232
kind: security-consideration
summary: The extension intentionally does not allow setting IMAP flags on an arbitrary message in the IMAP message store; it is scoped exclusively to the message currently being delivered. The document states it introduces no additional security concerns beyond those in RFC 3501, RFC 5228, and RFC 5229.
