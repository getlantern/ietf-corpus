document: rfc-3890
kind: interoperability-note
summary: 'Converting an IPv4 bandwidth value to IPv6 requires the packet rate: new bandwidth = IPv4 bandwidth + packet_rate * 20 bytes (the typical difference between IPv6 and IPv4 headers). This conversion is generally not possible without explicit packet rate information, which ''a=ptime'' does not reliably provide.'
section: "3.3"
topics:
    - realtime
    - ip
