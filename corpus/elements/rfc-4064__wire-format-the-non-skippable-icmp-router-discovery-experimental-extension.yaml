document: rfc-4064
kind: wire-format
summary: The non-skippable ICMP router discovery experimental extension (EXP-NONSKIP-EXT-TYPE = 127) uses a 1-byte Type, 1-byte Length, and variable-length Opaque field; a node that does not recognize it should ignore it, but a mobility entity that understands the extension type but not the content must drop the router advertisement.
