document: rfc-1134
kind: protocol-element
summary: 'PPP is composed of three main components: (1) a method for encapsulating datagrams over serial links using HDLC as a basis, (2) an extensible Link Control Protocol (LCP) to establish, configure, and test the data-link connection, and (3) a family of Network Control Protocols (NCP) for establishing and configuring different network-layer protocols simultaneously.'
section: "1.2"
