document: rfc-6637
kind: wire-format
summary: EC points are encoded in uncompressed format within an MPI as '04 || x || y', where x and y are big-endian zero-padded to the field size rounded up to 8-bit boundary. Payload sizes are 515 bits for P-256, 771 for P-384, and 1059 for P-521.
