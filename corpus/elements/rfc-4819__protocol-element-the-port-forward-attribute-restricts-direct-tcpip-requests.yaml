document: rfc-4819
kind: protocol-element
summary: The 'port-forward' attribute restricts direct-tcpip requests to a comma-separated list of allowed hosts; an empty value denies all. The 'reverse-forward' attribute similarly restricts tcpip-forward requests to specified port numbers. Both SHOULD be critical.
section: "4.1"
topics:
    - security
    - crypto
