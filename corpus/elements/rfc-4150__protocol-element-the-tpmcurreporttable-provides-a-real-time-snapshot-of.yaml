document: rfc-4150
kind: protocol-element
summary: The tpmCurReportTable provides a real-time snapshot of in-progress and recently completed sub-application transactions. Each entry records a single metric value (tpmCurReportMetricValue) and a completion status (current or completed), making transaction state visible to management applications even while it spans a report boundary.
section: 2.3.3
topics:
