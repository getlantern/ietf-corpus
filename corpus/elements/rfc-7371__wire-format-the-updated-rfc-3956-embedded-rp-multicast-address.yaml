summary: 'The updated RFC 3956 (Embedded-RP) multicast address format is: 8 bits (0xFF prefix) | ff1 (4 bits) | scop (4 bits) | ff2 (4 bits) | RIID (4 bits) | plen (8 bits) | network prefix (64 bits) | group ID (32 bits). ff1 carries X, R, P, T flags; ff2 carries four reserved r bits.'
