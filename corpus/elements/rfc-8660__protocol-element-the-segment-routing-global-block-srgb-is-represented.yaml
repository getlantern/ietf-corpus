document: rfc-8660
kind: protocol-element
summary: The Segment Routing Global Block (SRGB) is represented as a list of MPLS label ranges [Ll(1),Lh(1)], [Ll(2),Lh(2)], ..., [Ll(k),Lh(k)]; the SRGB need not be a contiguous range of labels. The SRGB is used exclusively to instantiate global SIDs into the MPLS forwarding plane.
section: "2.3"
topics:
