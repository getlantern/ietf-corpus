document: rfc-4737
kind: protocol-element
summary: 'Type-P-Packet-n-Reordering-Stream: a received packet with arrival index i is n-reordered if and only if all n packets preceding it in arrival order (indexes i-n through i-1) have larger source sequence numbers. The degree of n-reordering is m/l, where m is the count of n-reordered packets and l is packets received.'
section: "5"
