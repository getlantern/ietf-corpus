summary: The EVRC-B storage format begins with the magic number '#!EVRC-B\n' (0x2321 0x4556 0x5243 0x2d42 0x0a). Each codec data frame is prefixed by a one-octet ToC entry field (RFC 3558 ToC extended to one octet by setting the four most significant bits to zero).
