document: rfc-6113
kind: protocol-element
summary: 'KRB-FX-CF2 combines two protocol keys of potentially different enctypes using the RFC 3961 pseudo-random function: PRF+(K1, pepper1) XOR PRF+(K2, pepper2) is passed to random-to-key(). Mechanism designers MUST specify distinct pepper1 and pepper2 values so that combining identical keys does not produce a trivial result.'
section: "5.1"
topics:
    - crypto
