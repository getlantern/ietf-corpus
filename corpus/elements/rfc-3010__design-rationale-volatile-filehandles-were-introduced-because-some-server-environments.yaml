document: rfc-3010
kind: design-rationale
summary: Volatile filehandles were introduced because some server environments cannot provide file system level invariants needed for persistent filehandles (e.g., hierarchical storage management or file system reorganization). The increased client implementation burden is deemed acceptable for the overall protocol gains.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
