document: rfc-3586
kind: design-rationale
summary: Some hosts' IPsec policies may be derived from a more comprehensive higher-layer security policy managed by another system, or from proprietary vendor tools. IPSP therefore only requires deriving a policy specification for aspects involving interoperability with other IPSP hosts.
section: "2"
topics:
    - ipsec
    - security
