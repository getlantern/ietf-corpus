document: rfc-6172
kind: protocol-element
summary: Protocol Number 133 was allocated for Fibre Channel (FC) and used by a pre-standard version of FCIP that encapsulated FC frames directly in IP packets. The standard FCIP protocol (RFC 3821) encapsulates FC frames in TCP and does not use Protocol Number 133.
