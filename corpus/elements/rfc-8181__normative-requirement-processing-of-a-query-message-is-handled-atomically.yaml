document: rfc-8181
kind: normative-requirement
summary: 'Processing of a query message is handled atomically: either the entire query succeeds or none of it does. When a query contains multiple PDUs, failure of any PDU may require the server to roll back actions triggered by earlier PDUs.'
section: "2.2"
rfc2119_level: REQUIRED
topics:
