document: rfc-5905
kind: wire-format
summary: NTP extension fields consist of a 16-bit Field Type, a 16-bit Length (total octets including padding), a variable-length Value, and zero-padding to a 4-octet word boundary. The minimum field length is 16 octets. A MAC must always be present when an extension field is present.
section: "7.5"
