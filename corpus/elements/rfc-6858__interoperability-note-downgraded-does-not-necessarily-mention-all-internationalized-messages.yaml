document: rfc-6858
kind: interoperability-note
summary: DOWNGRADED does not necessarily mention all internationalized messages in the mailbox — only those that were synthesized during the specific FETCH operation. A message not listed may still contain internationalized content in fields not fetched (e.g., an internationalized Subject but non-internationalized From/To/Cc).
