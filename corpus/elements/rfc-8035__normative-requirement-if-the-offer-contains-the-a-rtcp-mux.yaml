document: rfc-8035
kind: normative-requirement
summary: If the offer contains the 'a=rtcp-mux' attribute and the answerer wishes to multiplex RTP and RTCP onto a single port, the answerer MUST include a media-level 'a=rtcp-mux' attribute in the answer.
section: "3.1"
rfc2119_level: MUST
topics:
