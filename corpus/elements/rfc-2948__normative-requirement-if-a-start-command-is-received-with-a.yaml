document: rfc-2948
kind: normative-requirement
summary: If a START command is received with a different keyid, the encryption/decryption machine must be re-initialized immediately after the START command using the new key and the last received OFB64_IV initial vector.
section: "3"
rfc2119_level: MUST
topics:
