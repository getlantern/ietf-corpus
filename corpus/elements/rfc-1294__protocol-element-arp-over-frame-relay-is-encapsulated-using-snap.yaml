document: rfc-1294
kind: protocol-element
summary: ARP over Frame Relay is encapsulated using SNAP (NLPID=0x80, OUI=0x00-00-00, PID=0x0806). The hardware type (ar$hrd) assigned to Frame Relay is 15 decimal (0x000F), and the hardware address length (ar$hln) is 2, 3, or 4 bytes matching the Q.922 address size.
section: "10"
