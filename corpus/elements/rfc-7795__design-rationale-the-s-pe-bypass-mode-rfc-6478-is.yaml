document: rfc-7795
kind: design-rationale
summary: The S-PE Bypass mode (RFC 6478) is prohibited when S-PE provides PW redundancy because the bypass would prevent the S-PE from receiving PW status messages from T-PEs, which are essential for the S-PE to determine correct Preferential Forwarding status and perform switchovers.
