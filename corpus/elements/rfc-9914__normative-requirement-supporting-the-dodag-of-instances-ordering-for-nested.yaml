document: rfc-9914
kind: normative-requirement
summary: Supporting the DODAG-of-Instances ordering for nested Tracks is OPTIONAL, but validating the ordering between a Track Instance and the main Instance is REQUIRED. When the DODAG of underlay Instances is not provided, all Track Instances are treated by default as children of the main Instance.
section: "3.2"
rfc2119_level: REQUIRED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
