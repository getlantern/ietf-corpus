document: rfc-6113
kind: state-machine
summary: 'The pre-authentication model tracks five state variables per request: the reply key, how strongly the client identity has been authenticated, whether the reply key has been used, whether it has been replaced, and whether the KDC reply can be verified by the client. Each pre-authentication mechanism reads and updates these states before and after processing.'
