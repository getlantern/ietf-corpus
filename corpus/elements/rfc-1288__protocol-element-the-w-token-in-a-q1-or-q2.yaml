document: rfc-1288
kind: protocol-element
summary: The /W token in a {Q1} or {Q2} query SHOULD be interpreted at the last RUIP to signify a higher level of verbosity in user information output, or at worst be ignored. Its placement is at the beginning of the query line.
section: 2.5.4
