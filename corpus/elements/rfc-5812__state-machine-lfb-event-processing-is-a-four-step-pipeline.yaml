kind: state-machine
summary: 'LFB event processing is a four-step pipeline: (1) detect a change to the declared event target and check CE subscription; (2) evaluate the declared condition on the event target; (3) apply runtime event filters (suppress if filtered); (4) submit the declared report to the CE.'
