document: rfc-4165
kind: normative-requirement
summary: If M2PA receives a User Data message with an out-of-order FSN, M2PA SHALL discard the message. For non-User Data message types, the FSN is set to the FSN of the last User Data message sent.
section: 4.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
