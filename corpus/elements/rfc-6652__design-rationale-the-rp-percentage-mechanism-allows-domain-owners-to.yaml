document: rfc-6652
kind: design-rationale
summary: The 'rp=' percentage mechanism allows domain owners to throttle report generation to a statistical sample, acknowledging that full reporting of all failures may be impractical at scale. Report generators MAY use the ARF 'Incidents:' field to indicate more reportable events than reports sent.
section: "3"
topics:
