document: rfc-9247
kind: interoperability-note
summary: 'The S-BFD Discriminators TLV is derived from protocol-specific advertisements: IS-IS S-BFD Discriminators sub-TLV (RFC 7883) and OSPFv2/OSPFv3 S-BFD Discriminator TLV (RFC 7884). BGP-LS carries the same information that these IGP protocols advertise locally.'
section: "3"
topics:
