document: rfc-8154
kind: normative-requirement
summary: A pNFS client MUST NOT perform direct I/O operations that are not permitted by an extent held by the client. Layout extents are the sole means of obtaining permission for direct I/O to storage devices.
section: 2.4.6
rfc2119_level: MUST NOT
topics:
    - security
