document: rfc-3711
kind: wire-format
summary: 'An SRTCP packet appends three mandatory fields to the RTCP compound packet: a 1-bit E-flag (encrypt/no-encrypt), a 31-bit SRTCP index, and a configurable-length authentication tag; plus an optional MKI. The Encrypted Portion begins at the ninth octet of the first RTCP packet and extends to the end of the compound packet.'
section: "3.4"
topics:
    - realtime
    - rtp
    - security
