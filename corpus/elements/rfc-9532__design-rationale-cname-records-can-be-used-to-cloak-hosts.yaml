document: rfc-9532
kind: design-rationale
summary: CNAME records can be used to 'cloak' hosts that perform tracking or malicious activity behind more innocuous hostnames. Clients such as web browsers use the chain of DNS names to influence cookie usage policies or block malicious hosts, making the full CNAME chain valuable information to expose to clients of forward proxies.
section: "1"
topics:
    - http
    - dns
    - privacy
    - security
