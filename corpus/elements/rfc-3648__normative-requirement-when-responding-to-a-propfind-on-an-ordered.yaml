document: rfc-3648
kind: normative-requirement
summary: 'When responding to a PROPFIND on an ordered collection, the server MUST order response elements according to the ordering defined on that collection. For Depth: infinity responses, members of different collections may be interleaved, but members of any ordered collection MUST appear in their defined order.'
section: "8"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
