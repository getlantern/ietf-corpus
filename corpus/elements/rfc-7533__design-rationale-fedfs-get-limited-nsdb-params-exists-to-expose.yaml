document: rfc-7533
kind: design-rationale
summary: FEDFS_GET_LIMITED_NSDB_PARAMS exists to expose only the FedFsConnectionSec security type (not the full connection parameters including potentially sensitive TLS certificate material) to less-privileged callers. This allows checking what security mechanism is in use without revealing the trust anchor certificate.
section: 5.10.2
topics:
    - security
