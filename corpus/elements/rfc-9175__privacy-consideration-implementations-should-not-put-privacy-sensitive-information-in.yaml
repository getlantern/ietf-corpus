document: rfc-9175
kind: privacy-consideration
summary: Implementations SHOULD NOT put privacy-sensitive information in Echo or Request-Tag option values. Unencrypted timestamps can reveal server location, time since reboot, or certificate expiry tolerance. Timestamps MAY be used only when the Echo option is encrypted end-to-end (e.g., DTLS without proxies or OSCORE Inner option).
section: "6"
topics:
    - privacy
    - security
