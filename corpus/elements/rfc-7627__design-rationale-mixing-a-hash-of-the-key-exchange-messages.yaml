document: rfc-7627
kind: design-rationale
summary: Mixing a hash of the key-exchange messages into master key derivation follows the recommendation that keys should be bound to the security contexts that compute them (NIST SP800-108) and is already used in SSH (RFC 4251). The extended master secret extends this principle to TLS full handshakes.
