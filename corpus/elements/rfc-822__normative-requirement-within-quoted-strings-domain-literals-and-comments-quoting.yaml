document: rfc-822
kind: normative-requirement
summary: Within quoted-strings, domain-literals, and comments, quoting (backslash preceding the character) is REQUIRED for CR and backslash, and for the characters that delimit the token (e.g., parentheses in comments). Quoting is permitted for any character.
