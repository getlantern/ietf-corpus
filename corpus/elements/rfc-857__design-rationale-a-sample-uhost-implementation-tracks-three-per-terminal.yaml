document: rfc-857
kind: design-rationale
summary: A sample UHOST implementation tracks three per-terminal state bits — Physical (P), Desired (D), and Actual (A) — to manage echo mode. The A-bit is set to the MIN of the received request, P-bit, and D-bit, allowing user-level preferences to override server-requested echo modes without violating protocol semantics.
section: "6"
extracted_by: claude-sonnet-4-6
