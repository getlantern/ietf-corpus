document: rfc-9103
kind: protocol-element
summary: 'Authentication mechanisms for XoT are classified by three properties: Data Origin Authentication (DO) — verifies message origin and integrity; Channel Confidentiality (CC) — encrypts the connection; Channel Authentication (CA) — authenticates the connection endpoint identity. mTLS provides CC and CA for both sides; TSIG provides DO for both sides; IP-based ACL provides CA for the client only.'
section: "9"
