document: rfc-864
kind: normative-requirement
summary: The TCP-based character generator service must be prepared for either a careful (graceful) close or a rude (abrupt) abort of the TCP connection, since users are likely to terminate abruptly.
section: TCP Based Character Generator Service
rfc2119_level: SHOULD
topics:
    - tcp
