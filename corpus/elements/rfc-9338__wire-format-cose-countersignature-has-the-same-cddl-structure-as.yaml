kind: wire-format
summary: COSE_Countersignature has the same CDDL structure as COSE_Signature (protected headers bstr, unprotected header map, signature bstr). Tagged form uses CBOR tag 19. COSE_Countersignature0 is simply a bstr containing only the raw signature value.
