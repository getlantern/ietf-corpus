document: rfc-6562
kind: design-rationale
summary: The significance of VBR information leakage is highly scenario-dependent. Near-perfect recognition is possible for prerecorded messages with a known message set; structured dialogs are also vulnerable. Recognizing unconstrained conversational speech from rate information alone is currently unreliable but expected to improve over time.
