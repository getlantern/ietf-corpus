document: rfc-8639
kind: normative-requirement
summary: A publisher MUST send subscription state change notifications when subscription management events occur. These notifications are never filtered out, cannot be stored in replay buffers, and are delivered only to impacted receivers.
section: "2.7"
rfc2119_level: MUST
topics:
    - yang
    - netconf
