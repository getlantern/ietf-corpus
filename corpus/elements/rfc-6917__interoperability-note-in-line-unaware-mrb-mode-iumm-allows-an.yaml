document: rfc-6917
kind: interoperability-note
summary: In-line Unaware MRB Mode (IUMM) allows an MRB to function transparently for Application Servers with no knowledge of the MRB. The MRB deduces resource requirements by inspecting SDP content, the AS address, or Request-URI parameters (per RFC 4240), rather than receiving explicit <mediaResourceRequest> XML.
section: "5.3"
topics:
    - sip
    - realtime
