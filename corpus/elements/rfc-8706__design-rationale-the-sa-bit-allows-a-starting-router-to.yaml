document: rfc-8706
kind: design-rationale
summary: The SA bit allows a starting router to suppress adjacency advertisements by neighbors until it has propagated newer LSPs from its previous incarnation. Without this, stale LSPs with apparently higher sequence numbers can persist, causing temporary blackholes.
section: 3.2.2
topics:
    - routing
