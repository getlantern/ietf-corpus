document: rfc-6726
kind: normative-requirement
summary: A receiver MUST NOT use a received FDT Instance to interpret packets beyond its expiration time. A sender MUST use an expiration time in the future (relative to Sender Current Time) upon creation of an FDT Instance.
section: "3.3"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
