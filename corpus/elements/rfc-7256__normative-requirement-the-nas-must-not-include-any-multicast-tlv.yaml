document: rfc-7256
kind: normative-requirement
summary: The NAS MUST NOT include any multicast TLV in Provisioning or Port Management messages unless that TLV is supported by the negotiated capability set; specifically, White-List-CAC MUST NOT be sent unless conditional access with white/black lists is negotiated, and MRepCtl-CAC MUST NOT be sent unless NAS-initiated replication or grey-list capabilities are negotiated.
section: 4.1.1
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
