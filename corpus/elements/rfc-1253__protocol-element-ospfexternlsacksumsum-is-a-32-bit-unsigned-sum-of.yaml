document: rfc-1253
kind: protocol-element
summary: ospfExternLSACksumSum is a 32-bit unsigned sum of LS checksums for all external (type 5) LSAs in the database; it can detect database changes and compare the link-state databases of two routers without enumerating all LSAs.
section: "5.1"
topics:
