document: rfc-5923
kind: interoperability-note
summary: Servers that do not support or choose not to honor the "alias" Via parameter MUST treat the request as a normal RFC 3261 request, ensuring that a client can include the "alias" parameter without risk that the server will reject the SIP request because of its presence.
section: "8.2"
topics:
    - sip
