document: rfc-9472
kind: interoperability-note
summary: Clients MUST observe the Content-Type header on HTTP/CoAP responses to determine which SBOM or vulnerability format is being transmitted, since multiple formats (SPDX, CycloneDX, CSAF) may be served from the same endpoint.
