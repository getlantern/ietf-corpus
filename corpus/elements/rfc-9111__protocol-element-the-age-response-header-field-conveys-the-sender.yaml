document: rfc-9111
kind: protocol-element
summary: The Age response header field conveys the sender's estimate of the number of seconds since the response was generated or validated at the origin server. Its presence implies the response was not generated directly for the current request; its absence does not imply the origin was contacted.
section: "5.1"
topics:
    - http
