document: rfc-8322
kind: registry
summary: A new 'Resource-Oriented Lightweight Information Exchange (ROLIE) URN Parameters' top-level registry was created with Specification Required policy. Each entry records a Name of the form {type}:{label} (type is 'category' or 'property'), an Extension URI of the form 'urn:ietf:params:rolie:{name}', a Reference, and an optional Subregistry. Initial entries include category:information-type and four property entries.
section: "8.3"
