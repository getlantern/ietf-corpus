document: rfc-2893
kind: wire-format
summary: An IPv4-compatible IPv6 address consists of a 96-bit all-zeros prefix (0:0:0:0:0:0) followed by a 32-bit IPv4 address in the low-order bits. This format is used exclusively by nodes supporting automatic tunneling to encode the tunnel endpoint address within the IPv6 destination address.
section: "5.1"
topics:
    - ip
    - v6ops
