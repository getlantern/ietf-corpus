document: rfc-9863
kind: design-rationale
summary: The term 'color' in this document must not be interpreted as the 'thread color' from RFC 3063 or the 'resource color' (link color) from RFCs 3630, 5329, 5305, and 7308. This clarification prevents confusion with pre-existing TE coloring concepts that serve distinct purposes.
