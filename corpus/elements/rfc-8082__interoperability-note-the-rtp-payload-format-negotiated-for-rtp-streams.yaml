document: rfc-8082
kind: interoperability-note
summary: The RTP payload format negotiated for RTP streams alone is not a reliable indicator of layered bitstream use with inter-layer prediction. H.264/SVC can form decodable sub-bitstreams from enhancement layers only without inter-layer prediction, making blind application of the full-refresh FIR rule potentially suboptimal for such exotic bitstreams.
section: "5"
topics:
    - rtp
    - realtime
