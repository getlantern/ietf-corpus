document: rfc-8784
kind: protocol-element
summary: Each IKE peer is configured with a tuple (Peer, PPK, PPK_ID, mandatory_or_not). The PPK is independent of any IKEv2 preshared key used for authentication; the mandatory_or_not flag controls whether the exchange is aborted if the peer does not support PPKs.
