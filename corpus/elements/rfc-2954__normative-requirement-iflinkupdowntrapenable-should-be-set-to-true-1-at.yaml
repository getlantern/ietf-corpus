document: rfc-2954
kind: normative-requirement
summary: ifLinkUpDownTrapEnable SHOULD be set to true(1) at the frame relay service layer, and it is recommended that underlying physical layer notifications be disabled. This ensures that management stations receive linkUp/linkDown notification on interface failure even though PVC-level notifications are suppressed during interface outages.
section: 2.5.2
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
