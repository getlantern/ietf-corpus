document: rfc-3744
kind: security-consideration
summary: Because access control is enforced per-principal, a compromised user account gains all privileges granted to that principal. Administrators should apply the principle of least privilege when constructing ACLs, and authentication mechanisms must be strong (Digest or better).
section: "12.1"
topics:
    - security
