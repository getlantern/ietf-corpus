document: rfc-5789
kind: design-rationale
summary: PATCH collisions may be more dangerous than PUT collisions because some patch formats need to operate from a known base-point; applying them to an unexpected state will corrupt the resource rather than simply overwrite it, motivating the conditional-request SHOULD.
section: "2"
