document: rfc-4209
kind: design-rationale
summary: Admin status of an LSP known to peer nodes (via the Admin Status object of GMPLS signaling) can be communicated to OLSes to suppress spurious alarm reporting, motivating the peer node-to-OLS LMP session for alarm management.
