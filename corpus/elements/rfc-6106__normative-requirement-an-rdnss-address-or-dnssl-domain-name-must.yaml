document: rfc-6106
kind: normative-requirement
summary: An RDNSS address or DNSSL domain name MUST be used only as long as both the RA router Lifetime and the corresponding option Lifetime have not expired, because the RDNSS may be unreachable or the DNSSL invalid on the current network.
section: "5.2"
rfc2119_level: MUST
topics:
    - dns
    - ip
    - v6ops
