document: rfc-6575
kind: wire-format
summary: The LDP Notification message for CE IP address updates includes a Status TLV with status code 0x0000002C ('IP address of CE'), an IP Address List TLV, and a PWid or Generalized ID FEC. The Message ID field is set to 0 as it does not refer to a specific message.
