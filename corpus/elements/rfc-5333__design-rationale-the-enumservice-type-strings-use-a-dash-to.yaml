document: rfc-5333
kind: design-rationale
summary: The Enumservice type strings use a dash '-' to allow hierarchical sub-typing (e.g., 'ical-sched', 'ical-access'), because neither RFC 3761 nor its immediate successors foresaw sub-subtyping. The dash is seen as a practical forward-compatible solution since intended successor documents explicitly allow it.
section: "2"
topics:
