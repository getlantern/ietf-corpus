document: rfc-9253
kind: design-rationale
summary: REFID is designed as a pure retrieval key with no semantic meaning, contrasting with CONCEPT (which imparts categorization meaning) and CATEGORIES (informal tagging). This allows grouping components (e.g., all tasks in a project) without encoding hierarchical structure or semantic categories.
section: "1.2"
