document: rfc-5584
kind: normative-requirement
summary: When multiple frames are carried in a single RTP packet, each frame MUST be complete; the number of frames MUST be integral. An RTP packet MUST NOT contain fragments of multiple ATRAC frames and MUST NOT mix complete and fragmented frames.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
