document: rfc-7705
kind: normative-requirement
summary: When 'Replace Old AS' (outbound) is configured, the BGP speaker MUST NOT append the globally configured ASN to the AS_PATH for outbound BGP UPDATEs toward the eBGP neighbor, and MUST append only the configured 'Local AS' ASN value.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
