document: rfc-9489
kind: normative-requirement
summary: The total length of the EVPN IP Prefix sub-TLV MUST be either 32 bytes (IPv4) or 56 bytes (IPv6). The IP prefix and gateway IP address MUST be from the same IP address family.
section: "4.4"
rfc2119_level: MUST
topics:
