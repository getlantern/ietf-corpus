document: rfc-9747
kind: protocol-element
summary: The session begins with a slow transmission rate of no greater than one packet per second until the session on device A reaches Up state. After the session goes Down, the slow transmission rate is resumed. When Up, the provisioned transmission interval is used.
section: "2"
topics:
