document: rfc-5455
kind: protocol-element
summary: TE-Class determination uses the CT value from the CLASSTYPE object combined with the setup priority from the LSPA object. If the LSPA object is absent, setup priority is assumed to be 0. A CT and preemption priority pair maps to one of up to 8 TE-classes.
section: "3.4"
topics:
