document: rfc-8587
kind: interoperability-note
summary: Although a client may prematurely cease scanning for trunkable addresses when receiving a location attribute from an older server that does not follow the required ordering constraint (trunking entries before replica entries), the harm is expected to be limited since older servers would not present trunking path information.
section: 5.2.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
