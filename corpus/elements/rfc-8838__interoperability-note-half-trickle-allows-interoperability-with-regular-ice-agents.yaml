document: rfc-8838
kind: interoperability-note
summary: 'Half Trickle allows interoperability with regular ICE agents: the initiator gathers a full generation of candidates before sending the initial ICE description, which can be processed by regular ICE agents. The initial ICE description still indicates Trickle ICE support, so a Trickle-capable responder can still use optimized gathering and connectivity checks.'
