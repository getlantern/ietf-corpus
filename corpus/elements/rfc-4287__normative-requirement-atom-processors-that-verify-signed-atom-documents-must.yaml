document: rfc-4287
kind: normative-requirement
summary: 'Atom Processors that verify signed Atom Documents MUST support exclusive XML canonicalization (URI: http://www.w3.org/2001/10/xml-exc-c14n#) and MUST be able to verify RSA signatures. DSA signature verification is not required. MACs SHOULD NOT be used for signatures due to key-management risks.'
section: "5.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
