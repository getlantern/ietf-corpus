document: rfc-8019
kind: normative-requirement
summary: When not under attack, the half-open SA timeout SHOULD be set high enough that the Initiator can send multiple retransmissions, minimizing the chance that transient network congestion causes IKE failure.
section: "4.1"
rfc2119_level: SHOULD
