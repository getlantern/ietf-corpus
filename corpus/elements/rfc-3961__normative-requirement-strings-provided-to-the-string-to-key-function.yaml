document: rfc-3961
kind: normative-requirement
summary: Strings provided to the string-to-key function in encodings other than UTF-8 MUST first be converted to UTF-8 before applying the function. No specific Unicode version should be assumed; all valid UTF-8 strings must be accepted.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
