document: rfc-3412
kind: design-rationale
summary: The reportableFlag is a secondary aid for determining whether a Report PDU must be sent, used only when the PDU portion cannot be decoded (e.g., incorrect encryption key). When the PDU can be decoded, the pduType alone governs Report PDU generation decisions.
