document: rfc-5732
kind: normative-requirement
summary: When a server defers completing a transform command for offline review, the server MUST return a 1001 response code, MUST manage object status to reflect pending state, and MUST notify all involved clients via service message when the action completes.
section: "3.2"
rfc2119_level: MUST
