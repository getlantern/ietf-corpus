document: rfc-7392
kind: normative-requirement
summary: Each S-PE MUST be assigned an address as specified in Section 3.2 of RFC 7267. An S-PE capable of dynamic MS-PW signaling that has not been assigned an S-PE address and receives a Label Mapping message for a dynamic MS-PW MUST follow the procedures in Section 3.2 of RFC 7267.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
