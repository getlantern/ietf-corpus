document: rfc-2069
kind: normative-requirement
summary: A shared cache that has received a request containing an Authorization header MUST NOT return that response to any other request, unless the response included a must-revalidate or public Cache-Control directive.
section: 2.1.2
rfc2119_level: MUST NOT
topics:
