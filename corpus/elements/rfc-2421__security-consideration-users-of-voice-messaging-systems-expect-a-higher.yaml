document: rfc-2421
kind: security-consideration
summary: Users of voice messaging systems expect a higher level of message privacy than is provided by Internet mail without security enhancements. This expectation SHOULD be preserved; the profile does not preclude use of Internet object or channel security protocols for encryption, authentication, or non-repudiation.
section: 10.2.3
topics:
    - email
    - security
    - privacy
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
