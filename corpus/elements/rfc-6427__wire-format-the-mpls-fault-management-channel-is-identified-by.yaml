document: rfc-6427
kind: wire-format
summary: The MPLS Fault Management Channel is identified by ACH with Associated Channel Type 0x0058. The FM Channel MUST NOT include the ACh TLV header. The ACH consists of a 4-bit version prefix '0001', Version, Reserved, and the 0x0058 FM Channel code point in a 32-bit header.
section: "3"
topics:
