document: rfc-4871
kind: design-rationale
summary: The signing identity (i= tag) is intentionally not required to match any message header field address, because recipient mail systems apply broad and varied interpretations. This separates cryptographic signer identity from the purported author identity.
section: "1.1"
topics:
    - email
