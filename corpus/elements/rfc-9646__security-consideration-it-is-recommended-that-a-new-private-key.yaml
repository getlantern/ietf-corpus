document: rfc-9646
kind: security-consideration
summary: It is RECOMMENDED that a new private key be generated for each CSR. When a new key cannot be protected as well as the built-in IDevID private key, it is RECOMMENDED to reuse the built-in private key rather than generate a less-protected new key. Implementations MUST use cryptographically strong PRNGs.
section: 4.1.2
topics:
    - security
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
