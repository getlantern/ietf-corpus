document: rfc-2355
kind: protocol-element
summary: Valid terminal device-types are IBM-3278-2, IBM-3278-2-E, IBM-3278-3, IBM-3278-3-E, IBM-3278-4, IBM-3278-4-E, IBM-3278-5, IBM-3278-5-E, and IBM-DYNAMIC; the sole printer device-type is IBM-3287-1. Device-names and resource-names must not exceed 8 bytes.
