document: rfc-8681
kind: normative-requirement
summary: For each incoming ADU, an ADUI MUST be created by prepending a 1-byte Flow ID and a 2-byte Length field, then padding with zeros to a multiple of E bytes.
section: "3.2"
rfc2119_level: MUST
