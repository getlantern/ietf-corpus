document: rfc-6688
kind: normative-requirement
summary: A pNFS client operating system that supports block layouts SHOULD recognize the pNFS block storage GUID and SHOULD use its presence to prevent data access to pNFS block devices until a layout that includes the device is received from the MDS.
section: "3"
rfc2119_level: SHOULD
topics:
    - security
