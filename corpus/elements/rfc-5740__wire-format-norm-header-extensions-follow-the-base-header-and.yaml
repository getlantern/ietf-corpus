document: rfc-5740
kind: wire-format
summary: NORM header extensions follow the base header and precede the payload. Variable-length extensions (het 0–127) include an 8-bit 'hel' field giving extension length in 32-bit words. Fixed-length extensions (het 128–255) are exactly one 32-bit word with no 'hel' field.
section: "4.1"
topics:
