document: rfc-8322
kind: normative-requirement
summary: A ROLIE Feed MUST contain one or more atom:link elements with rel='service' and an href attribute pointing to an Atom Service Document associated with the Feed, enabling discovery of additional content if a client accesses the Feed without first accessing the Service Document.
section: 6.1.2
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
