document: rfc-4685
kind: interoperability-note
summary: Atom processors that do not understand the in-reply-to extension will not recognize the threading relationship. Publishers are advised to also include a 'related' link to the parent resource so that a meaningful semantic relationship is visible to non-extension-aware processors.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
