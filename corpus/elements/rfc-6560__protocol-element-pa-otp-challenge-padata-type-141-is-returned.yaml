document: rfc-6560
kind: protocol-element
summary: PA-OTP-CHALLENGE (padata-type 141) is returned by the KDC in a KRB-ERROR when OTP pre-authentication is required. It carries a server-generated nonce, optional otp-service string, one or more OTP-TOKENINFO elements describing acceptable tokens, and optional salt and string-to-key parameters.
section: "4.1"
topics:
