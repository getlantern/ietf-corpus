document: rfc-5361
kind: design-rationale
summary: The <trans-handling> element is explicitly described as informational rather than an action as defined in Common Policy (RFC 4745), meaning the Common Policy conflict resolution mechanism does not apply to it. This avoids unintended interactions with the conflict resolution framework.
