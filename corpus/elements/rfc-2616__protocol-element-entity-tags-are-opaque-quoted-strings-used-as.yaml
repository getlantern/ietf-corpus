document: rfc-2616
kind: protocol-element
summary: Entity tags are opaque quoted strings used as cache validators, optionally prefixed with 'W/' for weak comparison. A strong entity tag MAY be shared by two entities only if equivalent by octet equality; a weak entity tag requires only semantic equivalence. Entity tags MUST be unique across all versions of a resource.
section: "3.11"
topics:
    - http
