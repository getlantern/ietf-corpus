kind: protocol-element
summary: 'EVRC-WB operates on 20-ms frames producing output of three sizes: 171 bits (full rate), 80 bits (1/2 rate), or 16 bits (1/8 rate), plus zero-bit blank and erasure frame types. Frame type values 0-5 map to Blank, 1/8, 1/4, 1/2, 1 (full), and Erasure respectively.'
