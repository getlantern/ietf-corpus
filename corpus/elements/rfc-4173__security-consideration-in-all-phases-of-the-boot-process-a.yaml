document: rfc-4173
kind: security-consideration
summary: In all phases of the boot process, a client must ensure that a server is authorized to send it information. The authenticated identity of a server must carry an authorization indication; authorized server lists may be pre-configured or downloaded in authenticated form from a prior boot stage.
section: "8"
topics:
    - security
