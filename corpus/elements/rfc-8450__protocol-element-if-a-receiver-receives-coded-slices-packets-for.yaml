document: rfc-8450
kind: protocol-element
summary: If a receiver receives Coded Slices packets for a picture but no Transform Parameters packet, it MAY assume parameters are unchanged from the last picture (risking malformed pictures) or MAY discard the picture (resulting in dropped frames). The choice is implementation-dependent.
section: "4.2"
topics:
    - rtp
    - realtime
