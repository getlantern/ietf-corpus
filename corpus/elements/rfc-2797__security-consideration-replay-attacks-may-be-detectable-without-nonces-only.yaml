document: rfc-2797
kind: security-consideration
summary: Replay attacks may be detectable without nonces only when the CA maintains significant state information. Developers of state-constrained PKI clients are strongly encouraged to incorporate the senderNonce and recipientNonce attributes. The choice of whether to use them depends on careful consideration of the operational environment.
section: "9"
topics:
