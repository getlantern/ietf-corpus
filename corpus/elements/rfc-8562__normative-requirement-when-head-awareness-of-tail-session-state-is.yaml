document: rfc-8562
kind: normative-requirement
summary: When head-awareness of tail session state is required in a multipoint deployment, it is RECOMMENDED to implement the extension described in RFC 8563, since the head has no BFD-based mechanism to detect tail-side link failures.
section: "6"
rfc2119_level: RECOMMENDED
topics:
