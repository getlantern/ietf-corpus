document: rfc-4606
kind: design-rationale
summary: The SUKLM label scheme extends the ITU-T G.707 (K,L,M) numbering by prepending S and U fields to address higher-order multiplexing (STS-N/STM-N). The higher-order numbering scheme from G.707 Sections 7.3.1–7.3.6 is explicitly not used, as SUKLM provides a unified SONET/SDH label space.
section: "3"
extracted_by: claude-sonnet-4-6
