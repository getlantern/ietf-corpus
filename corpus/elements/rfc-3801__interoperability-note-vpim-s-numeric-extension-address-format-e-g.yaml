document: rfc-3801
kind: interoperability-note
summary: VPIM's numeric+extension address format (e.g., +16137637582@vm.nortel.ca) is not compatible with the addressing formats of RFCs 2303–2304. Convergence with general telephony addressing formats is expected as telephony services become more widespread on the Internet.
section: 4.1.1
topics:
    - email
