document: rfc-6956
kind: interoperability-note
summary: An LFB is a functionally accurate abstraction of FE processing capabilities, not a hardware-accurate representation. The purpose of LFB definitions is to represent functions for interoperability between separate CEs and FEs; vendors may also define proprietary LFB classes per RFC 5812.
