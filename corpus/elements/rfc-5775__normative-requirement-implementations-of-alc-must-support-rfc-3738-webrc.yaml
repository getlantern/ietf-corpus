document: rfc-5775
kind: normative-requirement
summary: Implementations of ALC MUST support RFC 3738 (WEBRC) as the minimum multiple rate congestion control building block. Congestion control MUST be applied to all packets within a session independently of which object information is carried.
section: "2.2"
rfc2119_level: MUST
topics:
    - congestion
    - multicast
