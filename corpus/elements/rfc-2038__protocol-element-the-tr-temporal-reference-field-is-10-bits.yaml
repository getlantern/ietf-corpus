document: rfc-2038
kind: protocol-element
summary: The TR (Temporal-Reference) field is 10 bits and carries the temporal reference of the current picture within the current GOP, ranging 0–1023. It is constant across all RTP packets of a given picture and is used by receivers to detect lost GOP headers and Picture headers.
