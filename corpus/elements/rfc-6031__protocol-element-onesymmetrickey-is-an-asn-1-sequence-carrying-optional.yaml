document: rfc-6031
kind: protocol-element
summary: OneSymmetricKey is an ASN.1 SEQUENCE carrying optional per-key attributes (sKeyAttrs, a SEQUENCE OF Attribute constrained to SKeyAttributes) and an optional sKey OCTET STRING containing the raw key value. At least one of sKeyAttrs or sKey MUST be present.
