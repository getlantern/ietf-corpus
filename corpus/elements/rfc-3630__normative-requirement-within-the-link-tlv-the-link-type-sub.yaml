document: rfc-3630
kind: normative-requirement
summary: Within the Link TLV, the Link Type (sub-TLV 1) and Link ID (sub-TLV 2) are mandatory and must appear exactly once. All other sub-TLVs defined in this document may occur at most once. Unrecognized sub-TLVs are ignored.
section: 2.4.2
rfc2119_level: REQUIRED
topics:
    - routing
