document: rfc-1933
kind: interoperability-note
summary: When an IPv4-compatible IPv6 address is assigned to a host supporting automatic tunneling, both an A record (low-order 32 bits) and an AAAA record (full IPv4-compatible IPv6 address) must be listed in DNS so that both IPv4-only and IPv6 resolvers can locate the host.
section: 3.2.1
topics:
    - ip
    - v6ops
    - dns
