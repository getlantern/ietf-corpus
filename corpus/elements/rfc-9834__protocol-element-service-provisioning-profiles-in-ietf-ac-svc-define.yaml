summary: 'Service provisioning profiles in ''ietf-ac-svc'' define five reusable identifier types: encryption-profile, QoS-profile, failure-detection-profile, forwarding-profile, and routing-profile. These allow providers to maintain named policy bundles that can be referenced across multiple ACs.'
