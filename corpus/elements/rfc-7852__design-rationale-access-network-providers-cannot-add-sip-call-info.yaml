document: rfc-7852
kind: design-rationale
summary: Access network providers cannot add SIP Call-Info headers because they do not participate in application-layer signaling. The <provided-by> element in PIDF-LO was chosen as the mechanism for access network providers to supply additional data alongside location information they already deliver via protocols such as HELD.
section: "6"
topics:
