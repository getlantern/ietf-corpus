document: rfc-5703
kind: normative-requirement
summary: When 'replace' is used without ':mime', the replacement is treated as a text/plain part in UTF-8. When ':mime' is specified, the replacement string is a full MIME entity including MIME headers and content.
section: "5"
rfc2119_level: MUST
