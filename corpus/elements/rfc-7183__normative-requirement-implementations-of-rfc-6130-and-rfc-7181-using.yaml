document: rfc-7183
kind: normative-requirement
summary: Implementations of RFC 6130 and RFC 7181 using this mechanism MUST support a TIMESTAMP TLV based on POSIX time, and deployments SHOULD use it if clocks in all routers can be synchronized with sufficient precision.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - routing
