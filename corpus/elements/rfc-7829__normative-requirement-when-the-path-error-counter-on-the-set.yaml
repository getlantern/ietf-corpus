document: rfc-7829
kind: normative-requirement
summary: When the path error counter on the set primary path exceeds PSMR, the SCTP implementation MUST autonomously select a new primary path — specifically the path that would currently be chosen for data transfer. It MUST be possible to disable Primary Path Switchover to retain RFC 4960 switchback behavior.
section: "5"
rfc2119_level: MUST
topics:
    - sctp
    - multipath
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
