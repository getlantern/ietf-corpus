document: rfc-7671
kind: normative-requirement
summary: When the TLSA base domain is the result of 'secure' CNAME expansion, the resulting domain name MUST be used as the HostName in the client's SNI extension and MUST be the primary reference identifier for peer certificate matching (except DANE-EE(3)).
section: "7"
rfc2119_level: MUST
topics:
