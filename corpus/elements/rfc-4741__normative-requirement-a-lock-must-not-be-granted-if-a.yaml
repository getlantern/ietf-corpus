document: rfc-4741
kind: normative-requirement
summary: A lock MUST NOT be granted if a lock is already held by any NETCONF session or another entity, or if the <candidate> target has uncommitted modifications. An attempt to lock MUST fail in these cases.
section: "7.5"
rfc2119_level: MUST
topics:
    - netconf
