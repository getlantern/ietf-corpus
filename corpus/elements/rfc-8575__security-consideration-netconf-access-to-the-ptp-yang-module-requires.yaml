document: rfc-8575
kind: security-consideration
summary: NETCONF access to the PTP YANG module requires SSH (mandatory-to-implement per RFC 6242) as the secure transport; RESTCONF requires HTTPS with TLS (RFC 8446). General security considerations for time protocols are referenced in RFC 7384.
section: "4"
topics:
    - security
    - yang
    - netconf
    - ntp
