document: rfc-9262
kind: protocol-element
summary: A forward_routed() adjacency encapsulates the BIER-TE packet for delivery by the routing underlay to a specified L3 neighbor address. It supports any encapsulation (MPLS label stack, IP/GRE, etc.) that can carry a BIER-TE payload, enabling traffic to traverse non-BIER-TE routers.
section: 4.2.2
topics:
    - routing
    - multipath
