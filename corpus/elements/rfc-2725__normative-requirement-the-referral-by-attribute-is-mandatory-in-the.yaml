document: rfc-2725
kind: normative-requirement
summary: The referral-by attribute is mandatory in the maintainer object, records which maintainer created it, and may never be altered after the addition of the maintainer. Maintainers cannot be deleted as long as they are referenced by a referral-by attribute elsewhere.
section: "10.1"
rfc2119_level: REQUIRED
topics:
    - routing
    - registry
    - security
