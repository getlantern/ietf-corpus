document: rfc-3816
kind: protocol-element
summary: rohcInstanceTable lists properties of running ROHC compressor and decompressor instances, indexed by ifIndex, rohcInstanceType, and rohcChannelID. Key fields include rohcInstanceMaxCID (1..16383), rohcInstanceLargeCIDs (short vs. embedded CID), rohcInstanceMRRU (max reconstructed reception unit), and rohcInstanceContextStorageTime (default 3600 seconds).
section: 4.1.2
