document: rfc-7153
kind: interoperability-note
summary: This document modifies RFC 5701 by removing any requirement for the second octet of IPv6-Address-Specific Extended Community Type codepoints to match the codepoints in IPv4-Address-Specific Sub-Types registries. Separate transitive and non-transitive IPv6-Address-Specific registries are established.
section: "3"
topics:
