document: rfc-8871
kind: normative-requirement
summary: An endpoint MUST maintain a list of SSRCs from received RTP flows and each SSRC's associated E2E key information, and MUST discard old E2E keys no later than when it leaves the conference.
section: "4.3"
rfc2119_level: MUST
