document: rfc-8883
kind: wire-format
summary: The ICMPv6 Parameter Problem message for extension header limit errors uses Type=4, one of Codes 5–10, a 32-bit Checksum, and a 32-bit Pointer field identifying the octet offset within the invoking packet where the limit was exceeded. The invoking packet is included up to the minimum IPv6 MTU.
section: "2.1"
topics:
    - ip
