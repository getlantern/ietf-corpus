document: rfc-5360
kind: design-rationale
summary: Return routability tests are included as an authentication method because SIP identity is not yet widely available on the public Internet. They provide a better-than-nothing security level by using cryptographically unguessable URIs delivered over SIPS, with the expectation that relays will migrate to SIP identity as it becomes available.
section: 5.6.1.3
topics:
    - sip
    - security
