document: rfc-4303
kind: security-consideration
summary: The requirement for ESP receivers to accept IP fragments for reassembly creates denial-of-service vulnerabilities; an implementation MAY choose not to support fragmentation and MUST support ICMP PMTU signaling to minimize fragmentation likelihood.
section: 3.3.4
topics:
    - ipsec
    - security
    - ip
