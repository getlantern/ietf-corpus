document: rfc-8876
kind: security-consideration
summary: There are no rate-limiting mechanisms in SIP; non-interactive emergency calls could be used by malicious actors or misbehaving automated devices to effect a denial-of-service attack on emergency services, potentially more easily than interactive calls since no human initiation is required.
