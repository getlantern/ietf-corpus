document: rfc-3860
kind: normative-requirement
summary: Applications that send message operations to a CPIM gateway MUST implement the common message format defined in MSGFMT (RFC 3862) in order to maintain end-to-end security properties. Applications MAY support other content formats.
section: "3.3"
rfc2119_level: MUST
