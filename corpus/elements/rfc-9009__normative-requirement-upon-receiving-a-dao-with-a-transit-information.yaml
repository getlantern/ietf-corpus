document: rfc-9009
kind: normative-requirement
summary: Upon receiving a DAO with a Transit Information option having the 'I' flag set, and as a delayed response removing a routing adjacency to the indicated target, the common ancestor node SHOULD generate a DCO to the next hop associated with that adjacency.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - routing
