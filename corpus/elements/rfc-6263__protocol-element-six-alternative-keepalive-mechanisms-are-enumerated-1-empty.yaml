summary: 'Six alternative keepalive mechanisms are enumerated: (1) empty 0-byte transport packet, (2) RTP packet with comfort noise payload, (3) RTCP packets multiplexed with RTP packets, (4) STUN Binding Indication packet, (5) RTP packet with incorrect version number (set to zero), (6) RTP packet with unknown dynamic payload type of 0 length.'
