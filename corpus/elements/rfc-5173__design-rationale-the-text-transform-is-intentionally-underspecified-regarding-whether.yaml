document: rfc-5173
kind: design-rationale
summary: The :text transform is intentionally underspecified regarding whether it produces a single string or multiple strings, allowing sophisticated implementations to strip mark-up or convert non-text media types to text prior to matching, while simple implementations may treat it identically to :content "text".
section: "5.3"
topics:
    - email
