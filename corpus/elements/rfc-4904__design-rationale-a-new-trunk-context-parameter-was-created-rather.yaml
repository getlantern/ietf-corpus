document: rfc-4904
kind: design-rationale
summary: A new 'trunk-context' parameter was created rather than reusing tel URI's 'phone-context' because 'phone-context' is semantically applicable only to local telephone numbers, while trunk groups may appear in both local and global telephone numbers.
section: "4.2"
topics:
