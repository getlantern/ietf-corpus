document: rfc-4271
kind: normative-requirement
summary: The Marker field in every message header MUST be set to all ones. If the received Marker is not all ones, the Error Subcode MUST be set to Connection Not Synchronized and a NOTIFICATION sent.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
