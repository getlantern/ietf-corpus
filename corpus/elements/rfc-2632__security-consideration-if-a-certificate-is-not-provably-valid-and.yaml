document: rfc-2632
kind: security-consideration
summary: 'If a certificate is not provably valid and associated with a message, processing software should take immediate and noticeable steps to inform the end user. Failure conditions include: no matching email address, no chain to a trusted CA, inability to check the CRL, an expired or revoked certificate, or an invalid/expired CRL.'
section: "5"
topics:
    - email
    - pkix
    - security
