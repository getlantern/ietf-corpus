document: rfc-8187
kind: design-rationale
summary: The requirement to support ISO-8859-1 (present in RFC 5987) was removed because UTF-8 is sufficient to express all Unicode code points; implementations like Internet Explorer 9 already omitted ISO-8859-1 support.
