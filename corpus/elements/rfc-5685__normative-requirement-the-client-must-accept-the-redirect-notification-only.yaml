document: rfc-5685
kind: normative-requirement
summary: The client MUST accept the REDIRECT notification only in the first or last IKE_AUTH response; it MUST NOT accept a REDIRECT notification in an intermediate IKE_AUTH response (e.g., during multi-round EAP exchanges).
section: "6"
rfc2119_level: MUST NOT
