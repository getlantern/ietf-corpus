document: rfc-2584
kind: security-consideration
summary: Authentication of received SNMP requests and controlled access to management information SHOULD be employed in sensitive network environments. SNMPv3 USM (RFC 2274) and VACM (RFC 2275) provide authentication and access control respectively.
section: "5"
rfc2119_level: SHOULD
