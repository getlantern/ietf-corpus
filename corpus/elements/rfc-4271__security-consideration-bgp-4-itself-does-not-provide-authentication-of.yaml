document: rfc-4271
kind: security-consideration
summary: BGP-4 itself does not provide authentication of routing information. An attacker who can inject or alter BGP messages can cause incorrect routing, including traffic attraction, black-holing, or routing loops. The document notes that TCP MD5 authentication (RFC 2385) should be used to protect BGP sessions against spoofed RST segments and injected data.
section: Security Considerations
topics:
    - bgp
    - routing
    - security
