document: rfc-6602
kind: normative-requirement
summary: When a mobile node roams to a new MAG, the LMA SHOULD update the bulk binding update group identifier and MUST include the updated identifier in the PBA to the new MAG (sub-type 1), unless the new PBU did not have (B)=1, in which case the session MUST NOT be included in any bulk group.
section: 5.2.2
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
