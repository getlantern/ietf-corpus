document: rfc-1989
kind: state-machine
summary: 'LQR transmission is triggered by three events: (1) expiry of the LQR timer (normal case), (2) receipt of an incoming LQR when no timer is in use, or (3) receipt of two successive LQRs with the same PeerInLQRs value indicating a missed LQR. LQM MAY commence only after LCP reaches Opened state.'
section: "2.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
