document: rfc-5936
kind: design-rationale
summary: The original RFC 1034/1035 AXFR specification implicitly assumed one TCP connection per AXFR session, evidenced by no requirement to copy the Question section or message ID. This was unintentional; the modern specification requires multiple concurrent AXFR sessions and other DNS queries to be supported over a single connection.
section: "4.1"
topics:
    - dns
    - tcp
