document: rfc-6870
kind: design-rationale
summary: For Generalized PWid FEC tiebreaking in independent mode, the PE with the lowest system IP uses AGI::SAII::TAII while the PE with the highest system IP uses AGI::TAII::SAII, so that both PEs compare the same values (since SAII and TAII are mirror values at each end).
