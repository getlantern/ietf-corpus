document: rfc-5239
kind: security-consideration
summary: The mapping between conference user identifiers and call-signaling-specific user identities is sensitive. The conferencing system must protect this data, restrict manipulation to authorized users via CCP, and ensure that only appropriate users receive it through the notification protocol. Identity mapping is typically restricted to conferencing system administrators.
section: "11.2"
topics:
    - realtime
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
