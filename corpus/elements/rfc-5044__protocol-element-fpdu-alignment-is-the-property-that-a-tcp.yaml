document: rfc-5044
kind: protocol-element
summary: FPDU Alignment is the property that a TCP segment begins with an FPDU (Header Alignment) and contains an integer number of complete FPDUs. Aligned delivery allows DDP to place data directly into application buffers without intermediate buffering, which is the primary performance motivation for MPA.
