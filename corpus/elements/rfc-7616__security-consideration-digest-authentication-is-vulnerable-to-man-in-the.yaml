document: rfc-7616
kind: security-consideration
summary: 'Digest Authentication is vulnerable to man-in-the-middle attacks: a hostile proxy can strip strong auth challenges and substitute a Basic-only challenge, then use the captured cleartext credentials to authenticate to the origin server using the stronger scheme.'
