document: rfc-9785
kind: design-rationale
summary: The document optionally allows a local policy on a per-Ethernet-Tag-range basis to override the signaled Highest-/Lowest-Preference algorithm for load balancing, without requiring new BGP signaling for each range. This avoids per-tag BGP advertisements in segments with thousands of tags.
section: "4.2"
topics:
    - routing
    - bgp
