document: rfc-5571
kind: design-rationale
summary: L2TPv2 always uses UDP encapsulation even when no NAT/NAPT is present because L2TPv2 cannot autodetect NAT/NAPT along the path. UDP bypass and NAT autodetect are listed as optional requirements in RFC 4925 and are not required.
section: "2.1"
topics:
    - vpn
    - nat
    - udp
