document: rfc-8138
kind: normative-requirement
summary: In strict source routing, the first entry of the first SRH-6LoRH MUST match an address of the router receiving the packet. If the router is not the current segment endpoint, it MUST drop the packet.
section: "5.6"
rfc2119_level: MUST
topics:
    - ip
    - routing
