document: rfc-8082
kind: protocol-element
summary: Reference Picture Selection Indication (RPSI, RFC 4585 Section 6.3.3) requires no specification update for layered codecs. Reception of RPSI indicating a missing reference picture on any layer forces the encoder to handle that missing reference in the indicated layer and all dependent layers. No implementations with layered codecs are known.
section: "6.3"
topics:
    - rtp
    - realtime
