document: rfc-4675
kind: security-consideration
summary: An attacker gaining control of a RADIUS/Diameter server or proxy can modify the User-Priority-Table attribute, causing degradation of quality of service (by downgrading priority) or denial of service (by raising priority at multiple ports and oversubscribing switch or link capabilities).
