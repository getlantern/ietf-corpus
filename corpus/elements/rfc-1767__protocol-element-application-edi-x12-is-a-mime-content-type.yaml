document: rfc-1767
kind: protocol-element
summary: Application/EDI-X12 is a MIME content-type for EDI data conforming to ASC X12 specifications (ANSI X12.5, X12.6, EDIV). It requires no mandatory parameters; CHARSET is optional. The object is self-defining as to which specific EDI objects are included.
