document: rfc-5590
kind: security-consideration
summary: Using a non-transport-aware Security Model (SNMPv1, SNMPv2c, USM) with a Secure Transport Model is NOT RECOMMENDED. Such models base access control decisions on the unauthenticated message-level identity (community name or USM user), not on the transport-authenticated identity, creating a security gap.
section: "7.1"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
