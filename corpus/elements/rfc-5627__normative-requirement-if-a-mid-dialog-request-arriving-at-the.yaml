document: rfc-5627
kind: normative-requirement
summary: If a mid-dialog request arriving at the authoritative proxy has Route header field values beyond the one pointing to the proxy itself, stored Path URIs MUST be discarded to avoid call spirals and failures; this is required local policy when GRUUs are in use.
section: "6.1"
rfc2119_level: MUST
topics:
    - sip
