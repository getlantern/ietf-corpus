document: rfc-7286
kind: normative-requirement
summary: Implementations MAY give the user the opportunity to specify an individual domain name for every address family on every interface. Implementations SHOULD allow the user to specify a default name used when no more specific name has been configured.
section: 3.1.1
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
