document: rfc-5910
kind: normative-requirement
summary: In the DS Data Interface, it is RECOMMENDED that the child zone operator have key data online in the DNS tree to allow the parent zone administrator to validate the data. The key data SHOULD have the Secure Entry Point (SEP) bit set as described in RFC 3757 and RFC 4034.
section: "4.1"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
