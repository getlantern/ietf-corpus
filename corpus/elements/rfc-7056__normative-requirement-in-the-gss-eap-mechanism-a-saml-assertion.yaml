document: rfc-7056
kind: normative-requirement
summary: In the GSS-EAP mechanism, a SAML assertion carried in an integrity-protected and authenticated AAA protocol SHALL be successfully validated; attributes from that assertion SHALL be returned from GSS_Get_name_attribute with the authenticated output set to true.
section: "6.2"
rfc2119_level: REQUIRED
