document: rfc-5245
kind: normative-requirement
summary: Agents MUST support both Regular Nomination and respond correctly to the USE-CANDIDATE flag. The controlling agent nominates by sending a STUN request with the USE-CANDIDATE attribute set; once the nominated pair's STUN transaction completes, both sides cancel further checks for that media stream.
section: 8.1.1
rfc2119_level: MUST
topics:
    - nat
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
