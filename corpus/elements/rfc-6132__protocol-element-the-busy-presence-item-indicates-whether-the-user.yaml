document: rfc-6132
kind: protocol-element
summary: The 'busy' presence item indicates whether the user is considered busy ('yes'), not busy ('no'), or 'unknown' if it cannot be determined. The meaning of 'busy' is left to the implementation and may be synthesized from other information.
