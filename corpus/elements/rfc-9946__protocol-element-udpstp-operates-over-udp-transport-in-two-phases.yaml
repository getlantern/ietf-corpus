summary: 'UDPSTP operates over UDP transport in two phases: a Control phase (Test Setup Request/Response and Test Activation Request/Response) and a Data phase (Load PDUs and Status Feedback PDUs). The client always initiates the connection to a server listening on the standard UDPSTP port.'
