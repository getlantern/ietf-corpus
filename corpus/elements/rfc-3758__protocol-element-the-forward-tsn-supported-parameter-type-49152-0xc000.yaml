document: rfc-3758
kind: protocol-element
summary: 'The Forward-TSN-Supported parameter (type 49152 / 0xC000) is an OPTIONAL parameter added to INIT and INIT ACK chunks to indicate that the endpoint supports the FORWARD TSN chunk. It has a fixed length of 4 bytes: a 16-bit type field and a 16-bit length field.'
section: "3.1"
topics:
