document: rfc-3038
kind: interoperability-note
summary: When an LSP uses a point-to-multipoint VC and an ATM switch in an LSR is not capable of VC merge, adding a new leaf may require temporarily splitting the active LSP to send an inband VCID PROPOSE notification, causing potential performance and QoS impact.
section: "2.1"
topics:
    - mpls
