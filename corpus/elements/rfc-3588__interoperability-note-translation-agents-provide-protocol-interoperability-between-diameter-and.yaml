document: rfc-3588
kind: interoperability-note
summary: Translation agents provide protocol interoperability between Diameter and RADIUS or TACACS+. They allow legacy RADIUS-only devices to communicate with a Diameter infrastructure without requiring simultaneous migration. Translation can only occur when the agent recognizes the application of the request, so translation agents MUST advertise only their locally supported applications.
section: 2.8.4
topics:
    - radius
    - security
