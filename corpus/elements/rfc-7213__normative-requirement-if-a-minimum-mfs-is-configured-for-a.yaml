document: rfc-7213
kind: normative-requirement
summary: If a minimum MFS is configured for a link and the peer-advertised MFS is lower, the operator MUST be notified of the mismatch; the operator may then choose to shut down the link or verify via OAM.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
