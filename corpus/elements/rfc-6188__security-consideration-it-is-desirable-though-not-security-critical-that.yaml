document: rfc-6188
kind: security-consideration
summary: It is desirable (though not security-critical) that AES_192_CM use a 192-bit authentication key and AES_256_CM use a 256-bit authentication key. Because authentication forgery opportunities close when a session ends, this document defines new ciphers but not new authentication functions.
section: "6"
topics:
