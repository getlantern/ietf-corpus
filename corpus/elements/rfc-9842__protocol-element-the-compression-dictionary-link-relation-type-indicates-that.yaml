document: rfc-9842
kind: protocol-element
summary: The 'compression-dictionary' link relation type indicates that fetching and caching the specified resource is likely to be beneficial for future requests. The linked resource must include a 'Use-As-Dictionary' response header and a caching header to be usable as a compression dictionary.
section: "3"
topics:
