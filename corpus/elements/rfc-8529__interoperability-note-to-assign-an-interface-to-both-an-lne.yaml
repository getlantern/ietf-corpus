document: rfc-8529
kind: interoperability-note
summary: To assign an interface to both an LNE and an NI, the interface must first be assigned to the LNE using RFC 8530 mechanisms; within that LNE's interface module, the LNE's representation of that interface is then assigned to an NI using bind-ni-name.
section: "3.2"
topics:
    - yang
    - netconf
    - routing
    - vpn
