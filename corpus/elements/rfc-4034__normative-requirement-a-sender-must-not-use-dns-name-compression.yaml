document: rfc-4034
kind: normative-requirement
summary: A sender MUST NOT use DNS name compression on the Next Domain Name field when transmitting an NSEC RR. A zone MUST NOT include an NSEC RR for any domain name that only holds glue records.
section: 4.1.1
rfc2119_level: MUST NOT
topics:
    - dns
