document: rfc-9017
kind: design-rationale
summary: The ELI rule in RFC 7274 was revised to remove the special carve-out that allowed ELI (label 7) to appear after an XL. The original carve-out existed for backward compatibility with deployed hardware that detects ELI without checking the preceding label, but this conflicted with the general rule that 0–15 are invalid after XL and caused implementer confusion.
section: "4"
topics:
