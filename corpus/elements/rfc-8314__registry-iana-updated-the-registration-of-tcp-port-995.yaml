summary: IANA updated the registration of TCP port 995 (pop3s) and TCP port 993 (imaps) to reference RFC 8314. IANA also assigned TCP port 465 an alternate usage as 'submissions' (Message Submission over TLS protocol) as a one-time procedural exception, without a corresponding UDP assignment.
