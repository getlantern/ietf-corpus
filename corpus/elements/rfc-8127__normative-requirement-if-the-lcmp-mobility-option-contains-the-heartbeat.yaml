document: rfc-8127
kind: normative-requirement
summary: If the LCMP mobility option contains the Heartbeat Control Sub-Option, the MAG MUST overwrite its local heartbeat timer parameters with the received values. If any parameter except HB-Retransmission-Delay is ZERO, the PBA MUST be ignored and an error SHOULD be logged.
section: "5.2"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
