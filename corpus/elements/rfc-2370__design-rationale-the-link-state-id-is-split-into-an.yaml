document: rfc-2370
kind: design-rationale
summary: The link-state ID is split into an 8-bit Opaque Type and a 24-bit Opaque ID rather than using the LSA type field alone. This allows multiple independent applications to share a single LSA type number while each having its own ID space within the type.
section: "3.0"
topics:
    - routing
