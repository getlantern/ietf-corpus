document: rfc-6190
kind: normative-requirement
summary: For an RTP packet whose payload is a PACSI NAL unit, the RTP timestamp MUST equal the NALU-time of the next non-PACSI NAL unit in transmission order.
section: "4.1"
rfc2119_level: MUST
