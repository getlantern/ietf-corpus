document: rfc-9133
kind: protocol-element
summary: '''acl-name'' is a mandatory sub-attribute of ''acl-list'' that names an access list previously defined using the DOTS data channel (RFC 8783 Section 4.3) and associated with the DOTS client. An ACL name uniquely identifies an ACL bound to a given DOTS client, though the same name may be reused by distinct clients.'
section: 3.2.1
topics:
    - security
    - yang
