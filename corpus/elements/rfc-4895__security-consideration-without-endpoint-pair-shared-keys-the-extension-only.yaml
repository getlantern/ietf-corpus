document: rfc-4895
kind: security-consideration
summary: Without endpoint pair shared keys, the extension only protects against modification or injection by attackers who did not capture the initial handshake. With endpoint pair shared keys, even a man-in-the-middle who intercepts the initial exchange cannot inject authenticated chunks.
section: "9"
