summary: The 'mrb-publish/1.0' Control Package is the Publish interface used by Media Servers to report capabilities and resource status to an MRB via the Media Control Channel Framework (RFC 6230). It defines <mrbrequest>, <mrbresponse>, and <mrbnotification> elements carried in CONTROL and REPORT messages.
