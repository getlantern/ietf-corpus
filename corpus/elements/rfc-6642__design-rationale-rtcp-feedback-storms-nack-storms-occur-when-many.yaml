document: rfc-6642
kind: design-rationale
summary: RTCP feedback storms ('NACK storms') occur when many receivers simultaneously lose synchronization and send duplicate feedback to the same media source. The TPLR message was designed to allow intermediaries to signal receivers to suppress redundant feedback, addressing transient overload of media sources and networks.
section: "1"
