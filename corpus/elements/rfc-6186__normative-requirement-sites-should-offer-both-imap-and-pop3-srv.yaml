document: rfc-6186
kind: normative-requirement
summary: Sites SHOULD offer both IMAP and POP3 SRV record sets and set priority values such that the preferred service has a lower-numbered priority. When an MUA supports both protocols, it SHOULD retrieve records for both and use the one with the lowest priority value.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - email
    - dns
