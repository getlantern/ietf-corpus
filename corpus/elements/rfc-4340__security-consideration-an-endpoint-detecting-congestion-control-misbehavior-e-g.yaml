document: rfc-4340
kind: security-consideration
summary: An endpoint detecting congestion-control misbehavior (e.g., receiving ECN Nonce Echoes inconsistent with reported losses) sends DCCP-Reset with Reset Code 11, 'Aggression Penalty', to penalize peers attempting to exploit congestion control.
