document: rfc-1996
kind: normative-requirement
summary: The zone's servers must be organized into a dependency graph with a single primary master and no loops. All other servers must use AXFR or IXFR from the primary master or from a slave that is also a master.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
