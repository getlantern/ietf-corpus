document: rfc-6644
kind: normative-requirement
summary: In response to a Rebind message, the server generates and sends a Reply as described in RFC 3315 Sections 18.2.4 and 18.2.8, including options for configuration parameters. The server MAY include IAs and new parameter values even if not requested in the Rebind.
section: "4"
rfc2119_level: MAY
