document: rfc-9027
kind: protocol-element
summary: A new PASSporT claim key 'sph' (SIP Priority Header) is defined as an optional claim within the 'rph' PASSporT. Its only defined value is 'psap-callback', corresponding to the SIP 'Priority' header field for emergency services callback calls as defined in RFC 7090.
