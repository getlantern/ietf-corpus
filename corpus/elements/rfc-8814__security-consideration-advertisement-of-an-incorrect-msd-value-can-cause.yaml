document: rfc-8814
kind: security-consideration
summary: Advertisement of an incorrect MSD value can cause path computation failure (if value is too small) or an attempt to instantiate an unsupportable path at the head-end (if value is too large). The presence of MSD information may also inform an attacker of how to induce these conditions.
section: "7"
topics:
