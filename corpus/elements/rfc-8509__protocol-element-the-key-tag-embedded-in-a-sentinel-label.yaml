document: rfc-8509
kind: protocol-element
summary: The <key-tag> embedded in a sentinel label is expressed as an unsigned decimal integer zero-padded to exactly five digits (e.g., Key Tag 42 becomes '00042'). Labels that do not conform to this format MUST NOT be processed as sentinel queries.
section: "2.1"
topics:
    - dns
