document: rfc-1333
kind: interoperability-note
summary: LQR negotiation is independent in each direction; one peer may request LQRs while the other does not. The negotiation process guarantees that at least one side uses a LQR timer so the protocol does not deadlock when both sides set Reporting-Period to zero.
section: "1"
