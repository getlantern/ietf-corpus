document: rfc-6506
kind: registry
summary: 'IANA created the ''Keying and Authentication for Routing Protocols (KARP) Parameters'' category containing the ''Authentication Cryptographic Protocol ID'' registry: value 0 is Reserved, value 1 is OSPFv3, values 2-65535 are Unassigned. This registry enables cross-protocol replay attack prevention by providing unique per-protocol identifiers appended to authentication keys.'
