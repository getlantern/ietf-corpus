document: rfc-7232
kind: interoperability-note
summary: Content codings are a property of representation data, so a strong entity-tag for a content-encoded representation must be distinct from the entity-tag of an unencoded representation to prevent conflicts during cache updates and range requests. Transfer codings, in contrast, do not result in distinct entity-tags.
section: 2.3.3
topics:
    - http
