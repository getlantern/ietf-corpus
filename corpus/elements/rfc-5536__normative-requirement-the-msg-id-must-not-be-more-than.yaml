document: rfc-5536
kind: normative-requirement
summary: The msg-id MUST NOT be more than 250 octets in length, ensuring systems that accept message identifiers as parameters (e.g., NNTP per RFC 3977) can rely on a bounded length.
section: 3.1.3
rfc2119_level: MUST NOT
