document: rfc-7469
kind: normative-requirement
summary: Known Pinned Hosts are identified only by domain names, never IP addresses. If the host in the Request-URI matches an IP-literal or IPv4address production, the UA MUST NOT note this host as a Known Pinned Host.
section: 2.3.3
rfc2119_level: MUST NOT
topics:
    - http
    - security
    - ip
