document: rfc-5934
kind: protocol-element
summary: 'The apex trust anchor MAY include two public keys: an operational public key (used for any TAMP message validation) and a contingency public key (usable only once, exclusively to sign an Apex Trust Anchor Update that replaces both keys). The contingency public key is distributed in encrypted form; its decryption key is provided as an unsigned attribute in the Apex Trust Anchor Update message.'
section: 1.2.1
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
