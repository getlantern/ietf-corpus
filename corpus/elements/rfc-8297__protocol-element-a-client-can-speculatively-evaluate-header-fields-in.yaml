document: rfc-8297
kind: protocol-element
summary: A client can speculatively evaluate header fields in a 103 (Early Hints) response while waiting for the final response — for example, recognizing a Link header with rel=preload and prefetching the target resource. These header fields are hints only and do not replace header fields on the final response.
section: "2"
topics:
