document: rfc-4327
kind: security-consideration
summary: The LMP-MIB contains read-write and read-create objects that can affect LMP operation (e.g., enabling/disabling control channels, modifying Hello intervals, triggering link verification). Unauthorized access to these objects could disrupt traffic-engineering link management. SNMPv3 with authentication and privacy is recommended for managing this MIB.
section: "10"
topics:
    - snmp
    - security
    - realtime
