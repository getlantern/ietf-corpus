document: rfc-8500
kind: normative-requirement
summary: A sender MUST transmit only a single Reverse Metric TLV in an IS-IS Hello PDU. If a received IIH contains more than one Reverse Metric TLV, an implementation MUST ignore all the Reverse Metric TLVs.
section: "2"
rfc2119_level: MUST
topics:
    - routing
