document: rfc-5866
kind: design-rationale
summary: The token-based three-party scheme is used in environments where a prior application-layer interaction (e.g., SIP) has already produced an authorization token; this token binds the application-layer authorization to the QoS signaling session and must contain an AE identifier, application session identifier, and a keyed message digest or digital signature.
section: 3.3.1
