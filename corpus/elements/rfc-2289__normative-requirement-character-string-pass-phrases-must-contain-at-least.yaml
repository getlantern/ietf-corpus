document: rfc-2289
kind: normative-requirement
summary: Character string pass-phrases MUST contain at least 10 characters to reduce risk from exhaustive search or dictionary attacks. All implementations MUST support pass-phrases of at least 63 characters.
section: "6"
rfc2119_level: MUST
