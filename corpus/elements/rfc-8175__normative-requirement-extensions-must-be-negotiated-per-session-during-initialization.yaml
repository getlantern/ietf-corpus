document: rfc-8175
kind: normative-requirement
summary: Extensions MUST be negotiated per-session during initialization via the Extensions Supported Data Item. Once initialization Messages have been exchanged, an implementation MUST NOT emit any Message, Signal, Data Item, or status code associated with an extension not declared in the peer's initialization Message.
section: "9"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
