document: rfc-7627
kind: security-consideration
summary: SSL 3.0 is equally vulnerable to triple handshake attacks and uses obsolete cryptographic constructions. Since the extended master secret countermeasure relies on a TLS extension, it cannot be used with SSL 3.0, which has been deprecated by RFC 7568.
section: "6.4"
topics:
    - tls
    - security
