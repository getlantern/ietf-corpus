document: rfc-2024
kind: normative-requirement
summary: To take a TConnConfig row out of service, the manager should set dlswTConnConfigRowStatus to notInService rather than using the excluded setup type. Changes to capabilities-exchange-related MIB objects should be grouped into as few SNMP SET requests as possible to reduce network traffic from run-time capabilities exchange messages.
section: 2.5.2
rfc2119_level: SHOULD
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
