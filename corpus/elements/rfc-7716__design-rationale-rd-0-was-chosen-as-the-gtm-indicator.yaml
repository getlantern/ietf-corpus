document: rfc-7716
kind: design-rationale
summary: RD=0 was chosen as the GTM indicator in MCAST-VPN routes because no VRF may be configured with an RD of zero, providing an unambiguous signal that distinguishes GTM routes from VPN-specific routes without requiring a new SAFI or NLRI format.
section: "2.1"
topics:
