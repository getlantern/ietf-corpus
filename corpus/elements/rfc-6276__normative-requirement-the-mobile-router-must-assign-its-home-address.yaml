document: rfc-6276
kind: normative-requirement
summary: The mobile router MUST assign its home address from the prefix on its Home Link, since it cannot derive its home address from its mobile network prefixes (which are not yet known before registering with the home agent).
section: "3.1"
rfc2119_level: MUST
