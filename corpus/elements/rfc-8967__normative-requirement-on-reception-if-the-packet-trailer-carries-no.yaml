document: rfc-8967
kind: normative-requirement
summary: On reception, if the packet trailer carries no MAC TLV the packet MUST be immediately dropped. If no configured key produces a MAC matching one in the packet, the packet MUST be silently dropped.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
    - security
