document: rfc-9524
kind: normative-requirement
summary: 'An implementation of a Replication segment for SRv6 MUST enforce the same ICMPv6 error message restrictions as RFC 4443 Section 2.4 (which prohibits ICMPv6 errors for packets destined to multicast addresses), with the same two exceptions: Packet Too Big messages and ICMPv6 Parameter Problem with Code 2.'
section: 2.2.3
rfc2119_level: MUST
topics:
    - ip
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
