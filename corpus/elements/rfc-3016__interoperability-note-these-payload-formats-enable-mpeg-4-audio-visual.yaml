document: rfc-3016
kind: interoperability-note
summary: These payload formats enable MPEG-4 Audio/Visual transport without MPEG-4 Systems (Sync Layer, Object Descriptors), which may make interoperability with MPEG-4 Systems environments difficult; other payload formats may be better suited to those applications.
