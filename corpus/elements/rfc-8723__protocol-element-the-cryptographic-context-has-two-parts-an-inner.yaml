document: rfc-8723
kind: protocol-element
summary: 'The cryptographic context has two parts: an inner (end-to-end) part used by originating and consuming endpoints to protect media integrity across the full path, and an outer (hop-by-hop) part used between endpoints and the MD. RTCP is protected only by the hop-by-hop part.'
