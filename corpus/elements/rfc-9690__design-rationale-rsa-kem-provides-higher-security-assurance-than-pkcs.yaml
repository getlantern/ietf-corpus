document: rfc-9690
kind: design-rationale
summary: 'RSA-KEM provides higher security assurance than PKCS #1 v1.5 because its input is a structureless random integer (avoiding adversarial exploitation of structure) and the input is independent of the keying material (so the RSA decryption result is not directly available to an adversary), yielding a tight security proof in the random oracle model.'
section: "1.1"
