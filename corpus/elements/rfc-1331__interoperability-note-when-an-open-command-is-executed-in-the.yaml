document: rfc-1331
kind: interoperability-note
summary: When an Open command is executed in the Opened, Closing, Stopping, or Stopped states (indicating a user's desire to renegotiate), the recommended implementation is to issue a Down event immediately followed by an Up event, causing link renegotiation without harmful side effects.
section: "5.4"
topics:
    - tcp
    - ip
