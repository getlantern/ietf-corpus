document: rfc-4303
kind: interoperability-note
summary: ESP does not contain a version number, so backward compatibility concerns MUST be addressed by a signaling mechanism between peers (e.g., IKEv2) or an out-of-band configuration mechanism to ensure compatible versions of ESP are in use.
