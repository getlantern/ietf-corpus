document: rfc-3966
kind: security-consideration
summary: Tel URIs may reveal private information, including unlisted phone numbers. The presence of the 'tel:' scheme identifier makes it easier for search engines to discover numbers that would otherwise be harder to find in plain text.
section: "11"
topics:
