document: rfc-4512
kind: protocol-element
summary: The Directory Information Base (DIB) is organized as a tree of entries called the Directory Information Tree (DIT). Arcs between vertices define superior/subordinate relationships; an entry's Distinguished Name is the concatenation of its RDN and its immediate superior's DN.
