document: rfc-8383
kind: normative-requirement
summary: RBridges that implement the Address Flush message SHOULD implement TLV types 7 and 8 so that specific MAC addresses can be flushed. If they do not, the effect will be to flush all MAC addresses for the indicated Data Labels, which may be inefficient.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
