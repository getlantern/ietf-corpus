document: rfc-3732
kind: interoperability-note
summary: An internal host used as a name server for a domain in the same repository that is not its own superordinate (e.g., ns1.example1.com used for example2.com) MUST be treated as an internal host subject to rules governing operations on subordinate hosts within the same repository.
section: "1.1"
topics:
    - dns
