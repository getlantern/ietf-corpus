document: rfc-9336
kind: protocol-element
summary: The certificate validation procedure processes Excluded KeyPurposeId restrictions first, then Permitted KeyPurposeId restrictions. If a KeyPurposeId meets an Excluded condition, the certificate is rejected; if it meets a Permitted condition, it is accepted.
