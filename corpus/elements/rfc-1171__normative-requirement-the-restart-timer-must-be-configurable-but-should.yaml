document: rfc-1171
kind: normative-requirement
summary: The Restart timer MUST be configurable but should default to 3 seconds. It is used to time out transmissions of Configure-Request and Terminate-Request packets, triggering retransmission on expiration.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
