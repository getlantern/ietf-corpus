document: rfc-3293
kind: protocol-element
summary: For the SYN message of the adjacency protocol in Ethernet encapsulation, the Destination Address is the broadcast address 0xFFFFFFFFFFFF. Alternatively, a configured unicast 48-bit IEEE MAC address may be used. For all other messages, the unicast MAC address of the destination is used.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
