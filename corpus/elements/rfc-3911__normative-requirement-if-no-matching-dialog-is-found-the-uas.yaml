document: rfc-3911
kind: normative-requirement
summary: If no matching dialog is found, the UAS rejects the INVITE with a 481 Call/Transaction Does Not Exist response. Likewise, if the Join header matches a dialog not created with an INVITE, the UAS MUST reject the request with a 481 response.
section: "4"
rfc2119_level: MUST
topics:
