document: rfc-8384
kind: normative-requirement
summary: Both Smart Endnodes and edge RBridges supporting Smart Endnodes MUST send a Smart-Hello at least three times during their Holding Time. If no Smart-Hellos are received within the most recent Holding Time sent, the peer is assumed no longer available.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
