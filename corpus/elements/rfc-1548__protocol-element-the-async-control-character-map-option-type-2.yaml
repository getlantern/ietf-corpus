document: rfc-1548
kind: protocol-element
summary: The Async-Control-Character-Map option (Type=2, Length=6) is a 32-bit bitmask negotiating which control characters (octets below 0x20) must be escaped on asynchronous links. The default value is 0xffffffff (all control characters mapped); for non-async links the default is 0.
section: "6.2"
extracted_by: claude-sonnet-4-6
