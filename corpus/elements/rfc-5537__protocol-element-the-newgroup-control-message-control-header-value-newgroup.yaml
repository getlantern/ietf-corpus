document: rfc-5537
kind: protocol-element
summary: The newgroup control message (Control header value 'newgroup <newsgroup-name> [moderated]') requests creation of a new newsgroup. Its body SHOULD be of type application/news-groupinfo providing a description; a serving agent need not act on it and SHOULD authenticate the sender.
section: 5.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
