document: rfc-5053
kind: wire-format
summary: The Common FEC OTI encodes Transfer Length F as a 48-bit field (upper 32 bits + lower 16 bits, with 16 reserved bits), followed by Encoding Symbol Length T as a 16-bit field, totalling 10 octets. F must be less than 2^^45; T must be less than 2^^16.
section: 3.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
