document: rfc-4917
kind: security-consideration
summary: If the extension is added by the Foreign Agent (subtype 2) to a Registration Reply, it MUST appear after the Mobile-Home Authentication Extension (when present) and MUST appear before the Mobile-Foreign Authentication Extension (when present). If no security association exists between Mobile Node and Foreign Agent, the extension may be unauthenticated.
section: "5"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
