document: rfc-3035
kind: normative-requirement
summary: A VC-merge-capable ATM-LSR configured for LDPV MUST include a path vector in upstream binding responses when informing neighbors of an increased hop count, it is not the LSP egress, and it supports VC-merge. An LSR SHOULD NOT store path vectors once the corresponding object has been transmitted.
section: "11.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
