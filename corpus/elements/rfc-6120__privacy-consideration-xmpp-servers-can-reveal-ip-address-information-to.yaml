document: rfc-6120
kind: privacy-consideration
summary: XMPP servers can reveal IP address information to peer servers and potentially to clients via stanza routing metadata; presence information (availability, status, timestamps) can expose user activity patterns to contacts and servers. Implementations should limit what stream metadata is exposed beyond what the protocol requires.
section: "13.10"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
