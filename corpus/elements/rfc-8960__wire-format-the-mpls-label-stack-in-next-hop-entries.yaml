document: rfc-8960
kind: wire-format
summary: The MPLS label stack in next-hop entries is encoded as a list of entries, each with 'id' (uint8 key), 'label' (rt-types:mpls-label), 'ttl' (uint8), and 'traffic-class' (uint8). This structure appears in both simple-next-hop and next-hop-list augmentations and mirrors the MPLS label stack encoding from RFC 3032.
section: "2.4"
topics:
    - mpls
    - yang
