document: rfc-4172
kind: normative-requirement
summary: A gateway operating in address translation mode MUST assign a locally significant N_PORT alias to each remotely attached device and MUST establish an iFCP session descriptor mapping the alias to the appropriate TCP/IP connection context and N_PORT ID.
section: "4.6"
rfc2119_level: MUST
