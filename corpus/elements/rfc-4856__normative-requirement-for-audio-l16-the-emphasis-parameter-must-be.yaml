document: rfc-4856
kind: normative-requirement
summary: For audio/L16, the 'emphasis' parameter MUST be omitted if no analog preemphasis was applied to the signal before quantization. The only defined value is 'emphasis=50-15' for the 50/15 microsecond preemphasis used with Compact Discs.
section: 2.1.15
rfc2119_level: MUST
