document: rfc-8202
kind: normative-requirement
summary: 'IIDs MUST be unique within the same routing domain. IID #0 is reserved for the standard instance supported by legacy systems, and IS-IS PDUs associated with the standard instance MUST NOT include an IID-TLV (except as noted).'
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
