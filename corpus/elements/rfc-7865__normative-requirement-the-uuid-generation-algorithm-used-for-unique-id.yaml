document: rfc-7865
kind: normative-requirement
summary: The UUID generation algorithm used for unique_id MUST ensure that it does not use any potentially personally identifying information. Each instance of a CS-RS Association MUST have a session_id attribute identifying the CS to which it belongs.
section: "6.10"
rfc2119_level: MUST
