document: rfc-3749
kind: security-consideration
summary: 'Combining compression with encryption can reveal information through length: compressed ciphertext lengths may allow adversaries to infer properties of the plaintext, particularly with stream ciphers or CBC with fixed padding. This is an inherent risk of TLS compression.'
section: "6"
topics:
