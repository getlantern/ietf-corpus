document: rfc-7549
kind: security-consideration
summary: The 'iotl' parameter SHOULD only be used for policy decisions by nodes within the same trust domain (per RFC 3325), and network boundary entities MUST NOT forward 'iotl' information received from untrusted entities, to prevent abuse affecting user billing or service availability.
section: "7"
rfc2119_level: MUST NOT
topics:
    - sip
    - security
