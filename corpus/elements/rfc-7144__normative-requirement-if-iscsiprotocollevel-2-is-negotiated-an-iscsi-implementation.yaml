document: rfc-7144
kind: normative-requirement
summary: If iSCSIProtocolLevel=2 is negotiated, an iSCSI implementation MUST NOT reject a Task Management Function Request PDU requesting one of the new task management functions; such a reject would report an iSCSI protocol error rather than a SCSI error.
section: "4.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
