document: rfc-9190
kind: design-rationale
summary: EAP-TLS 1.3 provides mandatory privacy (no cleartext peer identity) without extra round trips because TLS 1.3 encrypts the certificate messages natively. The separate HelloRequest-based privacy handshake required by EAP-TLS with TLS 1.2 is eliminated.
section: 2.1.8
topics:
    - tls
    - privacy
