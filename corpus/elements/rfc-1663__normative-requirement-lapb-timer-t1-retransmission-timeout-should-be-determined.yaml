document: rfc-1663
kind: normative-requirement
summary: LAPB Timer T1 (retransmission timeout) SHOULD be determined dynamically based on the measured round-trip time at the LAPB level. If RTT cannot be determined, T1 SHOULD be set to (2 * link_bit_rate / max_bits_per_frame) + 100 ms.
section: "5.4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
