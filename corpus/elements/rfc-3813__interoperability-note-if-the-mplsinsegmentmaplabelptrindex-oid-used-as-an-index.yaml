summary: If the mplsInSegmentMapLabelPtrIndex OID (used as an index in mplsInSegmentMapTable) has more than 111 sub-identifiers, the resulting column instance OIDs will exceed 128 sub-identifiers and cannot be accessed using SNMPv1, SNMPv2c, or SNMPv3.
