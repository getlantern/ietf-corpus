document: rfc-4781
kind: normative-requirement
summary: Under alternative procedures, the LSR SHOULD retain the preserved MPLS forwarding state at least until it sends an End-of-RIB marker to all neighbors, and SHOULD delete the preserved state after that (with an optional configurable additional retention period via MAY).
section: "5"
rfc2119_level: SHOULD
topics:
