document: rfc-9915
kind: interoperability-note
summary: 'This document obsoletes RFC 8415 and removes two features: the IA_TA option (temporary address assignment) and the Server Unicast option with UseMulticast status code, both of which were not widely implemented. Implementations upgrading from RFC 8415 that previously sent Server Unicast options may continue to receive unicast client messages during transition.'
section: "1.1"
topics:
    - ip
