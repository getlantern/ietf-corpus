document: rfc-9001
kind: protocol-element
summary: TLS alerts are converted to QUIC connection errors by adding the AlertDescription value to 0x0100, producing a QUIC error code in the CRYPTO_ERROR range. All TLS alerts are treated as fatal by QUIC.
section: "4.8"
topics:
