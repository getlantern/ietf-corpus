document: rfc-4915
kind: normative-requirement
summary: For inter-area routing in MT topologies to work across areas, the backbone area also needs to be configured for the same topology. Inter-area routing for an MT-area still depends on the backbone area.
section: "6"
rfc2119_level: MUST
