document: rfc-2557
kind: security-consideration
summary: A sender can misrepresent the source of a body part by labeling it with a Content-Location URI pointing to a different resource. Recipients MUST treat Content-Location only as a label for intra-structure URI resolution, not as a verified source indicator.
section: "11.1"
topics:
    - security
    - email
