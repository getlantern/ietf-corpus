document: rfc-9751
kind: design-rationale
summary: 'The origins of the ''RTP Payload Format Media Types'' registry are unknown: RFC 4855 was cited as providing maintenance instructions but contains no such text, and no other specification establishing the registry was found. It was likely created via email correspondence or at an Area Director''s request, so there is no known specification requiring an update upon closure.'
