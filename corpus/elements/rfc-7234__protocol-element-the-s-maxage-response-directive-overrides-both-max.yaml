document: rfc-7234
kind: protocol-element
summary: The s-maxage response directive overrides both max-age and Expires for shared caches and additionally implies proxy-revalidate semantics (responses with s-maxage=0 require revalidation before use). It is the highest-priority freshness source in the freshness lifetime calculation for shared caches.
section: 5.2.2.9
topics:
    - http
