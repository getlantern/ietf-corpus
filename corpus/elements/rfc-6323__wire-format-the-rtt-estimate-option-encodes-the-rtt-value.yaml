document: rfc-6323
kind: wire-format
summary: The RTT Estimate Option encodes the RTT value in 1–3 bytes (option type 128, length 3–5). The value is in units of 1 microsecond, allowing values up to 16.7 seconds (0xFFFFFE). The reserved value 0xFFFFFF signals a delay spike larger than 16.7 seconds; 0x000000 indicates no valid RTT sample.
section: 3.2.1
topics:
    - congestion
