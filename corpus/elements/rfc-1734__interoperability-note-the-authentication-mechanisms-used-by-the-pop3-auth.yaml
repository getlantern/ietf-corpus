document: rfc-1734
kind: interoperability-note
summary: The authentication mechanisms used by the POP3 AUTH command are those defined for IMAP4. Any use of the string "imap" in a server authentication identity within an IMAP4 authentication mechanism definition is replaced with the string "pop" when used with POP3.
section: "2"
topics:
    - security
