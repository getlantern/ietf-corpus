kind: wire-format
summary: 'The APPENDUID response code syntax is: "APPENDUID" SP nz-number SP append-uid, where append-uid is a uniqueid (or uid-set if MULTIAPPEND is used). The COPYUID response code syntax is: "COPYUID" SP nz-number SP uid-set SP uid-set.'
