document: rfc-1122
kind: normative-requirement
summary: A host MUST implement IP fragment reassembly. If reassembly times out (recommended range 60–120 seconds, must be configurable), the incomplete datagram MUST be discarded and an ICMP Time Exceeded (Fragment Reassembly Time Exceeded) message MUST be sent to the source if the first fragment was received.
section: 3.3.2
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
