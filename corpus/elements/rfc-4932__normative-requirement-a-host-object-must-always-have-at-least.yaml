document: rfc-4932
kind: normative-requirement
summary: A host object MUST always have at least one associated status value. A client MUST NOT alter status values set by the server; a server MAY alter or override status values set by a client subject to local policies.
section: "2.3"
rfc2119_level: MUST
topics:
    - registry
