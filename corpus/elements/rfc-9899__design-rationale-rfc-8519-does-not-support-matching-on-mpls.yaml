document: rfc-9899
kind: design-rationale
summary: RFC 8519 does not support matching on MPLS header fields. The enhanced module adds MPLS match parameters (traffic-class, label-position, upper/lower-label-range, label-block-name, ttl-value) guarded by a 'match-on-mpls' feature.
