document: rfc-7032
kind: protocol-element
summary: 'Seamless MPLS defines six reference access topology variants: [I1] single AN to single AGN, [I] daisy-chained ANs to single AGN, [V] single AN dual-homed to two AGNs, [U2] two ANs dual-homed to two AGNs, [Y] chained ANs to two AGNs, and [U] ring-chained ANs dual-homed to two AGNs. All topologies use either static routing or a dedicated access IGP, with AGN1x nodes acting as access ABRs.'
section: "2"
