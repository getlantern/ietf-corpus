document: rfc-7644
kind: protocol-element
summary: SCIM PATCH requests use operations based on JSON Patch (RFC 6902) but without array indexing or 'move' operations. The request body MUST use schema URI 'urn:ietf:params:scim:api:messages:2.0:PatchOp' and include an 'Operations' array with 'add', 'remove', or 'replace' entries.
section: 3.5.2
topics:
