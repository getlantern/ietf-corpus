document: rfc-7074
kind: design-rationale
summary: The original approach of using Switching Types to indicate hierarchy levels within a technology (e.g., PSC-1 through PSC-4) proved problematic because different technologies of the same switching type can require different SCSI field formats, making implicit type-to-format mapping impractical for multi-technology implementations.
section: "1"
topics:
