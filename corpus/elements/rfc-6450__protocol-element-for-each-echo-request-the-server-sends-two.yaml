document: rfc-6450
kind: protocol-element
summary: 'For each Echo Request, the server sends two Echo Reply messages: one unicast to the source IP address and UDP port of the requesting client, and one multicast to the requested group G and the source UDP port. Both are sent from the same port on which the request was received.'
