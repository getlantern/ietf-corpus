document: rfc-6307
kind: normative-requirement
summary: The receiving FC PW PE MUST check for presence of an 8b K28.5 value (0xBC) at the start of each Ordered Set and MUST send that value as a 10b K28.5 character on the attached FC link; the three following Dxx.y 8b values MUST be sent as Dxx.y 10b characters and MUST NOT be sent as 10b Kxx.y characters.
section: 3.3.2
rfc2119_level: MUST
topics:
    - mpls
