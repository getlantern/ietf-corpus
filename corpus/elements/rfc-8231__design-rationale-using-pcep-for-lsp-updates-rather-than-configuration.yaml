document: rfc-8231
kind: design-rationale
summary: Using PCEP for LSP updates rather than configuration tools (CLI, NETCONF) provides better scale and performance (lightweight operations), security (limited LSP-attribute scope vs. full device control), interoperability (common information model across vendors), and efficient bidirectional state synchronization.
section: 3.1.3
topics:
