document: rfc-9881
kind: normative-requirement
summary: Conforming CA implementations MUST specify ML-DSA algorithms explicitly using the OIDs from Section 2 when encoding ML-DSA signatures in certificates and CRLs. Conforming client implementations that process such certificates and CRLs MUST recognize the corresponding OIDs.
section: "3"
rfc2119_level: MUST
topics:
