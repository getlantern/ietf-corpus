document: rfc-7330
kind: protocol-element
summary: BfdCtrlSourcePortNumberTC is a Textual Convention for the UDP source port of BFD control packets, referencing the ephemeral range 49152..65535 from RFC 5881. The value 0 is reserved for special conditions and is not a valid port number.
