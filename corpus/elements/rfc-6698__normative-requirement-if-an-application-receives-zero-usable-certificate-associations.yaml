document: rfc-6698
kind: normative-requirement
summary: If an application receives zero usable certificate associations, it processes TLS normally without TLSA input. If one or more usable associations are received but none matches the server's certificate during the TLS handshake, the TLS client MUST abort the handshake.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
