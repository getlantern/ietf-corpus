document: rfc-2616
kind: normative-requirement
summary: All HTTP/1.1 applications MUST be able to receive and decode the 'chunked' transfer-coding and MUST ignore chunk-extension extensions they do not understand. A server MUST NOT send transfer-codings to an HTTP/1.0 client.
section: 3.6.1
rfc2119_level: MUST
topics:
    - http
