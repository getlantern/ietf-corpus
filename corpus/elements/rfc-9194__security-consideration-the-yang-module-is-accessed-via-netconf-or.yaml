document: rfc-9194
kind: security-consideration
summary: The YANG module is accessed via NETCONF or RESTCONF; NETCONF requires SSH as the mandatory secure transport, and RESTCONF requires TLS 1.3. NACM (RFC 8341) provides access control for restricting operations and content to authorized users.
section: "4"
topics:
