document: rfc-9242
kind: normative-requirement
summary: The initiator indicates support for Intermediate Exchange by including INTERMEDIATE_EXCHANGE_SUPPORTED in the IKE_SA_INIT request; the responder includes it in the response if it also supports the exchange. Both peers must signal support before the initiator may use IKE_INTERMEDIATE.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
