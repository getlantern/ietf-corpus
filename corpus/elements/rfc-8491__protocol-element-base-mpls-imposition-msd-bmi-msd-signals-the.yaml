document: rfc-8491
kind: protocol-element
summary: Base MPLS Imposition MSD (BMI-MSD) signals the total number of MPLS labels that can be imposed, including all service, transport, and special labels. The absence of BMI-MSD advertisements indicates only that the advertising node does not support advertisement of this capability.
