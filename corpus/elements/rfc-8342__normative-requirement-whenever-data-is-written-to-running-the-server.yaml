document: rfc-8342
kind: normative-requirement
summary: Whenever data is written to <running>, the server MUST also immediately update and validate <intended>. <intended> MUST always be a valid configuration data tree as defined in RFC 7950 Section 8.1.
section: 5.1.4
rfc2119_level: MUST
