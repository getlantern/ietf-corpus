document: rfc-5046
kind: normative-requirement
summary: To enable iSER-assisted mode, both the initiator and target MUST exchange RDMAExtensions=Yes on the leading connection during the LoginOperationalNegotiation stage. If negotiation fails or either party offers No, the connection MUST continue with standard iSCSI semantics per RFC 3720.
section: "5.1"
rfc2119_level: MUST
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
