document: rfc-7222
kind: normative-requirement
summary: The Service Request Identifier (SR-ID) is always allocated by the local mobility anchor. A MAG initiating a new QoS Service Request MUST set SR-ID to (0) in the initial request; the LMA assigns the actual SR-ID value and includes it in the response.
section: "4.1"
rfc2119_level: REQUIRED
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
