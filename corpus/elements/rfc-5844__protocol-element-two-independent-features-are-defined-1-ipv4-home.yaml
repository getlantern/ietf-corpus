summary: 'Two independent features are defined: (1) IPv4 home address mobility support enabling dual-stack or IPv4-only mobile nodes to obtain and retain an IPv4 home address across handoffs, and (2) IPv4 transport support allowing PMIPv6 signaling to be exchanged over an IPv4 network between LMA and MAG.'
