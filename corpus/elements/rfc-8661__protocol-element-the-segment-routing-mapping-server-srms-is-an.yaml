document: rfc-8661
kind: protocol-element
summary: The Segment Routing Mapping Server (SRMS) is an IGP node that advertises mappings between Prefix-SIDs and prefixes owned by non-SR-capable routers, enabling SR-to-LDP interworking. It consists of a Mapping Server (MS) that advertises SID-to-prefix assignments and a Mapping Client (MC) that receives and applies them.
section: 3.2.1
topics:
    - mpls
    - routing
