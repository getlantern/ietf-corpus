document: rfc-5629
kind: security-consideration
summary: SIPS is RECOMMENDED for user agents compliant to this specification to ensure that only on-path or on-path-trusted applications can obtain dialog identifiers needed to instantiate user interface components. Without SIPS or cryptographically random dialog IDs, automatic authorization MUST NOT be granted even if valid dialog identifiers are presented.
section: "13"
topics:
    - sip
    - security
