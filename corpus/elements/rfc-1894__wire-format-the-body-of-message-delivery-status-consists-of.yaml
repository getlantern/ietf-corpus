document: rfc-1894
kind: wire-format
summary: 'The body of message/delivery-status consists of per-message fields followed by one or more groups of per-recipient fields, each group preceded by a blank line. Formally: delivery-status-content = per-message-fields 1*( CRLF per-recipient-fields ).'
