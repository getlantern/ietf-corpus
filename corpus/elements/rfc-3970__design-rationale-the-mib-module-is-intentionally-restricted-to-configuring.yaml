document: rfc-3970
kind: design-rationale
summary: The MIB module is intentionally restricted to configuring and monitoring a TE Tunnel only at its ingress. The ingress uses a signaling protocol such as RSVP-TE to propagate setup information to other routers. Extension for use at transit or egress points is left for further study.
