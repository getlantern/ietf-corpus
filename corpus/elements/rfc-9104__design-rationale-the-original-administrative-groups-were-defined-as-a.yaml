document: rfc-9104
kind: design-rationale
summary: The original administrative groups were defined as a fixed-length 32-bit bitmask. As networks grew and more use cases emerged, the 32-bit length was found to be constraining, motivating the introduction of extended administrative groups (EAGs) in RFC 7308.
section: "1"
topics:
