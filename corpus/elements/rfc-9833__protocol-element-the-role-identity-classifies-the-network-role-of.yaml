document: rfc-9833
kind: protocol-element
summary: 'The ''role'' identity classifies the network role of an AC: uni (User-to-Network Interface), nni (Network-to-Network Interface), and public-nni (public peering, e.g., at an IXP). The ''bgp-role'' identity (per RFC 9234) covers provider, client, rs, rs-client, and peer roles for BGP session establishment.'
section: "4.2"
topics:
