document: rfc-2446
kind: protocol-element
summary: VTODO REPLY Attendees may set PARTSTAT to ACCEPTED, DECLINED, TENTATIVE, DELEGATED, PARTIAL, and COMPLETED — a superset of the VEVENT REPLY values. This reflects the need to convey task progress states (partial completion, full completion) that have no equivalent for meeting attendance.
section: "3.4"
