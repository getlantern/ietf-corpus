document: rfc-2911
kind: normative-requirement
summary: All clients and IPP objects MUST support the 'utf-8' charset. If the Printer does not support the client-supplied charset value, it MUST reject the request, set 'attributes-charset' to 'utf-8' in the response, and return the 'client-error-charset-not-supported' status code.
section: 3.1.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
