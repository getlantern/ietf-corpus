document: rfc-2326
kind: normative-requirement
summary: After resuming playback or recording following a PAUSE, synchronization of the tracks MUST be maintained. A PAUSE request discards all queued PLAY requests, but the pause point in the media stream MUST be maintained.
section: "10.6"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
