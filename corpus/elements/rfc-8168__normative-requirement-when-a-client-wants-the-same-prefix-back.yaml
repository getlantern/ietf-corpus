document: rfc-8168
kind: normative-requirement
summary: When a client wants the same prefix back but is willing to accept a different length as fallback, it MUST send a Solicit with the same IAID, one IAPREFIX option containing the previously delegated prefix, and another IAPREFIX option containing only the prefix-length hint. No ordering requirement applies to the two IAPREFIX options.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
