document: rfc-9359
kind: registry
summary: 'The IOAM TSF Capability registry defines the 2-bit TSF field in the IOAM Edge-to-Edge Capabilities Object. Initial entries: 0b00=PTP Truncated Timestamp Format, 0b01=NTP 64-bit Timestamp Format, 0b10=POSIX-based Timestamp Format. Value 0b11 is available for assignment via IETF Review.'
