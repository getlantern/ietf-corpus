document: rfc-7105
kind: normative-requirement
summary: Measurement validation MUST be used if measurement data for a particular Device can be easily acquired by unauthorized location recipients, as described in the unauthorized acquisition threat, to prevent unauthorized access to location information.
section: 7.2.1.1
