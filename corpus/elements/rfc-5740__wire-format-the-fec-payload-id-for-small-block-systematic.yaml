document: rfc-5740
kind: wire-format
summary: 'The FEC Payload ID for small block systematic codes (fec_id=129) is 8 bytes: a 32-bit ''source_block_number'', a 16-bit ''source_block_len'' (number of source symbols in the block), and a 16-bit ''encoding_symbol_id''. Symbols with encoding_symbol_id >= source_block_len are FEC parity; those below are source data.'
