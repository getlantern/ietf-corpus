document: rfc-9915
kind: protocol-element
summary: 'The DHCP Unique Identifier (DUID) uniquely identifies each DHCPv6 client and server. Four types are defined: DUID-LLT (link-layer + time), DUID-EN (vendor enterprise number), DUID-LL (link-layer only), and DUID-UUID (128-bit UUID). The DUID body is 1–128 octets plus a 2-octet type prefix.'
