document: rfc-4898
kind: normative-requirement
summary: All MIB objects MUST have the same persistence properties as the underlying TCP implementation. On a reboot, all zero-based counters MUST be cleared, all dynamically created table rows MUST be deleted, and all read-write objects MUST be restored to their default values.
section: "3.1"
rfc2119_level: MUST
topics:
    - snmp
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
