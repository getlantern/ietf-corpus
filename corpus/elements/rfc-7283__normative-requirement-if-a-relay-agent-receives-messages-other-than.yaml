document: rfc-7283
kind: normative-requirement
summary: If a relay agent receives messages other than Relay-forward and Relay-reply and does not recognize the message type, it MUST forward them toward the server as described in Section 20.1.1 of RFC 3315.
section: "4.2"
rfc2119_level: MUST
topics:
