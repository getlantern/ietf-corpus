document: rfc-1233
kind: protocol-element
summary: Errored Seconds (ES) is defined as a second with one or more Coding Violations, one or more Out of Frame events, or an AIS. Severely Errored Seconds (SES) is a second with 44 or more Coding Violations, one or more OOF events, or an AIS.
