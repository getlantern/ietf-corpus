document: rfc-3153
kind: design-rationale
summary: PPP Multiplexing is motivated by L2TP tunneling scenarios where per-frame PPP overhead (HDLC flag, Address/Control fields, Protocol ID, CRC) is amplified; multiplexing amortizes that overhead across several small packets carried in one frame.
