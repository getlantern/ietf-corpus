summary: The YANG module 'ietf-bfd-large' defines a 'padding' feature statement and a 'padded-pdu-size' typedef (uint16, range 24..65535, units bytes) used to configure per-session PDU padding. It augments BFD YANG modules for single-hop, multihop, LAG, and MPLS session types.
