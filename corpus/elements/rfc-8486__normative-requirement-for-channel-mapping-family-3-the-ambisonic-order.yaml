document: rfc-8486
kind: normative-requirement
summary: For channel mapping family 3, the Ambisonic order MUST be lower than 12 if full order is utilized and the number of coded streams equals the Ambisonic order plus two non-diegetic channels, due to the identification header page limit of 65,025 octets.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
