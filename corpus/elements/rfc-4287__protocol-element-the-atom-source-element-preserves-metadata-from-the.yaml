document: rfc-4287
kind: protocol-element
summary: The atom:source element preserves metadata from the source feed when an entry is copied across feeds. Aggregators performing such copying SHOULD include at least atom:id, atom:title, and atom:updated from the source feed in the atom:source element.
section: 4.2.11
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
