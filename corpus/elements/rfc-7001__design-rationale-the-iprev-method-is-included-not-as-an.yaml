document: rfc-7001
kind: design-rationale
summary: The 'iprev' method is included not as an endorsement but as acknowledgement that reverse DNS validation remains common practice and there should be a standard way to report its results. The RFC explicitly notes that RFC DNSOP-REVERSE recommends against using this test for authentication or security purposes.
section: "3"
topics:
