document: rfc-4479
kind: protocol-element
summary: The Person component models the human user's static characteristics (e.g., aliases) and dynamic status (e.g., 'in a meeting', 'on the phone'). There is conceptually one person per presentity, but multiple occurrences are permitted to represent ambiguity from conflicting data sources.
