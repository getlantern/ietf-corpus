document: rfc-6779
kind: protocol-element
summary: nhdpIibLinkSetTable records per-local-interface Link Set state, indexed by {nhdpIfIndex, nhdpDiscIfIndex}. Fields are nhdpIibLinkSetLHeardTime, nhdpIibLinkSetLSymTime, nhdpIibLinkSetLPending (TruthValue), nhdpIibLinkSetLLost (TruthValue), and nhdpIibLinkSetLTime (expiry). L_quality is deliberately excluded.
