document: rfc-3623
kind: normative-requirement
summary: During graceful restart, the restarting router MUST NOT install OSPF routes into the system forwarding table; it relies exclusively on forwarding entries installed prior to the restart. OSPF routing calculations are still run to restore virtual links.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
