document: rfc-3518
kind: security-consideration
summary: If a bridged PPP link comes up with a rogue peer, network topology information may be learned from forwarded multicast traffic, or denial-of-service attacks may be created by closing loops that should be isolated or by offering rogue spanning tree load. PPP authentication during LCP startup is recommended to mitigate these risks.
section: "7"
topics:
