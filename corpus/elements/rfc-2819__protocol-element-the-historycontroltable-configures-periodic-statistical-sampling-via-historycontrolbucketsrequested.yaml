summary: The historyControlTable configures periodic statistical sampling via historyControlBucketsRequested (default 50), historyControlBucketsGranted (read-only, set by agent), and historyControlInterval (1–3600 seconds, default 1800). The probe maintains a circular buffer of the granted number of sample buckets.
