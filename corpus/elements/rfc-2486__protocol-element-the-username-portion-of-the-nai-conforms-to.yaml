document: rfc-2486
kind: protocol-element
summary: The username portion of the NAI conforms to the dot-string BNF from RFC 821 (SMTP). Characters allowed include printable ASCII excluding specials (angle brackets, parentheses, brackets, backslash, dot, comma, semicolon, colon, at-sign, double-quote) and control characters.
