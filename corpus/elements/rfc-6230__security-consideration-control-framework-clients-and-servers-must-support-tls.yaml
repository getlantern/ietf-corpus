document: rfc-6230
kind: security-consideration
summary: Control Framework clients and servers MUST support TLS and SHOULD use it by default. They MUST implement the TLS ClientExtendedHello server name indication extension. The cipher suite TLS_RSA_WITH_AES_128_CBC_SHA MUST be supported. TLS provides authentication, integrity, replay protection, and confidentiality for Control Channel traffic.
section: "12.2"
rfc2119_level: MUST
topics:
    - tls
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
