document: rfc-5627
kind: design-rationale
summary: Temporary GRUUs accumulate during the lifetime of a registration (each refresh produces a new valid temporary GRUU rather than replacing prior ones) to support scenarios like ad-hoc conferencing where a UA has handed out a previous GRUU in an ongoing session that must continue to be reachable.
section: "3.2"
