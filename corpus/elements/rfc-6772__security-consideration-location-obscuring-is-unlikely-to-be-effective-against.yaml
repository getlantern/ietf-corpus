document: rfc-6772
kind: security-consideration
summary: 'Location obscuring is unlikely to be effective against a determined or resourceful adversary. Withholding location entirely is the most effective privacy protection. Selective withholding itself conveys information: if location is only obscured around a user''s home and office, the absence of location at specific times reveals the user''s presence at those locations.'
section: "13.5"
topics:
    - privacy
    - security
