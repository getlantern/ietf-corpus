document: rfc-7884
kind: normative-requirement
summary: If the flooding scope is area local, the S-BFD Discriminator TLV MUST be carried within an OSPFv2 type 10 Router Information LSA or an OSPFv3 Router Information LSA with the S1 bit set and the S2 bit clear.
section: "2.2"
rfc2119_level: MUST
topics:
