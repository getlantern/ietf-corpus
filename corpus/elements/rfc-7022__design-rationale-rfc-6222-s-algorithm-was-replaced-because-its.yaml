document: rfc-7022
kind: design-rationale
summary: RFC 6222's algorithm was replaced because its CNAMEs were potentially linkable across multiple RTCP sessions even when a new CNAME was generated per session, which undermined the privacy property that per-session CNAMEs are supposed to provide.
section: "1"
topics:
    - rtp
    - realtime
    - privacy
    - security
