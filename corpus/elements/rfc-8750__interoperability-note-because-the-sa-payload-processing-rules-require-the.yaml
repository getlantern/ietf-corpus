document: rfc-8750
kind: interoperability-note
summary: Because the SA payload processing rules require the IKEv2 responder to select algorithms only from the initiator's proposal, a responder will never send an IIV transform to an initiator that did not propose it, ensuring safe negotiation with non-supporting peers.
