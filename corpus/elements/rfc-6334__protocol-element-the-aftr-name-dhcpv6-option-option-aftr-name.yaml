document: rfc-6334
kind: protocol-element
summary: The AFTR-Name DHCPv6 option (OPTION_AFTR_NAME, code 64) carries a fully qualified domain name (FQDN) identifying the Address Family Transition Router (AFTR) tunnel endpoint to which a DS-Lite B4 element MAY connect. The option consists of a 2-octet option-code, 2-octet option-len, and a variable-length tunnel-endpoint-name field encoded as a DNS FQDN.
section: "3"
topics:
