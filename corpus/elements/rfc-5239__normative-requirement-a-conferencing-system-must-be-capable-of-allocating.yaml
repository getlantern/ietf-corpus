document: rfc-5239
kind: normative-requirement
summary: A conferencing system MUST be capable of allocating and distributing a conference user identifier during the first signaling interaction with the conferencing system. When a user joins via a dial-in signaling protocol (e.g., SIP), a conference user identifier MUST be assigned if one is not already associated with that user.
section: "6.3"
rfc2119_level: MUST
topics:
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
