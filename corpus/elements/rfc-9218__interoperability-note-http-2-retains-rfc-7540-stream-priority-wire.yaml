document: rfc-9218
kind: interoperability-note
summary: HTTP/2 retains RFC 7540 stream priority wire elements for compatibility, so these signals may still appear even when SETTINGS_NO_RFC7540_PRIORITIES is negotiated. Implementations using extensible priorities may encounter both signal types simultaneously.
section: "2"
topics:
