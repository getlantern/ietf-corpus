document: rfc-6475
kind: protocol-element
summary: PMIPV6-TC-MIB defines textual conventions for Proxy Mobile IPv6 management information, including Pmip6TimeStamp64, Pmip6MnIdentifier, Pmip6MnLLIdentifier, Pmip6MnIndex, Pmip6MnLLIndex, and Pmip6MnInterfaceATT. It is assigned OID mib-2 205 and is intended to be imported by PMIPv6-related MIB modules.
