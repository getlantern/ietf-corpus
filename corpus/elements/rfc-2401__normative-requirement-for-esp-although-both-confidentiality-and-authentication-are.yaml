document: rfc-2401
kind: normative-requirement
summary: For ESP, although both confidentiality and authentication are optional, they cannot both be omitted. At least one MUST be selected; it MUST NOT be possible to configure both the encryption and authentication algorithms as NULL.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - crypto
