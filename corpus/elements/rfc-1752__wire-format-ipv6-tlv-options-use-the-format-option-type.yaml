document: rfc-1752
kind: wire-format
summary: 'IPv6 TLV options use the format: Option Type (8-bit), Opt Data Len (8-bit, length of Option Data in octets), Option Data (variable). The two high-order bits of Option Type encode the action when the option is unrecognized: 00=skip, 01=discard packet, 10=discard and send ICMP Unrecognized Type, 11=undefined.'
section: 12.2.2
topics:
    - ip
