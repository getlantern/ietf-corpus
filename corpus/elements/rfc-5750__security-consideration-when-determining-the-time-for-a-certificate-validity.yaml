document: rfc-5750
kind: security-consideration
summary: When determining the time for a certificate validity check, the SigningTime attribute found in an S/MIME message MUST NOT be used unless it is from a trusted agent, as it could be deliberately set to direct checking of a stale CRL or cause improper validity period results.
section: "5"
topics:
