document: rfc-2049
kind: normative-requirement
summary: Conforming user agents MUST NOT send non-MIME messages containing anything other than US-ASCII text. If non-standard support for non-US-ASCII in non-MIME messages is provided, it MUST apply only to received messages.
section: "2"
rfc2119_level: MUST NOT
topics:
    - email
