document: rfc-5256
kind: normative-requirement
summary: In the REFERENCES algorithm, the parent/child links created in steps 1.A and 1.B MUST be kept consistent with one another at ALL times. No parent/child link may be created if it would introduce a loop (i.e., making A the parent of B when A is already a descendant of B).
section: "3"
rfc2119_level: MUST
topics:
    - email
