document: rfc-6723
kind: normative-requirement
summary: When an S-PE receives a Label Request message from one of its adjacent PEs during multi-segment PW control-word renegotiation, it MUST send a matching Label Request message to the other adjacent PE, because the S-PE does not have complete interface-parameter field information for the FEC advertisement.
section: "4.1"
rfc2119_level: MUST
topics:
    - realtime
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
