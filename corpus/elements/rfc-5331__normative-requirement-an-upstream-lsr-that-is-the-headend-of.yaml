document: rfc-5331
kind: normative-requirement
summary: An upstream LSR that is the headend of multiple tunnels SHOULD, by default, assign upstream-assigned labels for all LSPs carried over those tunnels from a single label space common to all tunnels, and SHOULD use the same IP address as the head identifier of those tunnels.
section: "5"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
