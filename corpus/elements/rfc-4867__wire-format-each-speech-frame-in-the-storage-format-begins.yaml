document: rfc-4867
kind: wire-format
summary: 'Each speech frame in the storage format begins with a 1-octet frame header: P (1 bit, padding/reserved), FT (4 bits, frame type), Q (1 bit, quality), and 2 padding bits. Speech bits follow, octet-aligned, with the last octet zero-padded.'
