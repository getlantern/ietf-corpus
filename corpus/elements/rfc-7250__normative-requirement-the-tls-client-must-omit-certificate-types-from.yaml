document: rfc-7250
kind: normative-requirement
summary: The TLS client MUST omit certificate types from the server_certificate_type extension if it is unable to process the corresponding type. If only X.509 would remain, the client MUST omit the entire server_certificate_type extension from the ClientHello.
section: "4.1"
rfc2119_level: MUST
topics:
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
