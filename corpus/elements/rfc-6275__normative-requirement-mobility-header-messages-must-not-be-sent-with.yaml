document: rfc-6275
kind: normative-requirement
summary: Mobility Header messages MUST NOT be sent with a type 2 routing header (except for Binding Acknowledgement per Section 9.5.4) and MUST NOT be used with a Home Address destination option (except for Binding Update per Sections 11.7.1 and 11.7.2). Binding Cache/Update List state MUST NOT be used when sending Mobility Header messages.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - ip
