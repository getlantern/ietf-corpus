document: rfc-8706
kind: normative-requirement
summary: A router that supports any of the functionality defined in this document MUST include the Restart TLV in all transmitted IIHs. Absence of the TLV indicates the sender supports none of the defined functionality.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
