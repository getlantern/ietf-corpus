document: rfc-5837
kind: normative-requirement
summary: If the eliciting datagram is IPv4, the IP Address Sub-Object MUST represent an IPv4 address; if IPv6, it MUST represent an IPv6 address. In all other circumstances (address family mismatch), IP address information MUST NOT be included.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
