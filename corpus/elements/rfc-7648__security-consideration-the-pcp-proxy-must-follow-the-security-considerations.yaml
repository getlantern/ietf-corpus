document: rfc-7648
kind: security-consideration
summary: The PCP proxy MUST follow the security considerations in RFC 6887 for both its client and server sides. THIRD_PARTY options MUST NOT be enabled unless the network on which PCP messages are sent is fully trusted (via physical or cryptographic security), to prevent malicious users from creating mappings on behalf of third parties.
section: "4"
rfc2119_level: MUST NOT
topics:
    - pcp
    - security
    - nat
