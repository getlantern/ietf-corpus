document: rfc-9291
kind: protocol-element
summary: 'The ''ietf-l2vpn-ntw'' module uses two top-level containers: ''vpn-profiles'' (reusable provider-defined policy profiles) and ''vpn-services'' (the set of managed L2VPN services). Each ''vpn-service'' contains ''vpn-nodes'', which in turn contain ''vpn-network-accesses'', forming a three-level hierarchy.'
section: "7.1"
topics:
