document: rfc-6546
kind: normative-requirement
summary: RID systems MUST use TLS version 1.1 or higher for confidentiality, identification, and authentication. RID systems MUST NOT request, offer, or use any version of SSL or any version of TLS prior to 1.1.
section: "3"
rfc2119_level: MUST
topics:
    - tls
    - security
