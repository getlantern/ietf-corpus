document: rfc-2047
kind: normative-requirement
summary: The encoded-text in an encoded-word MUST be self-contained and MUST NOT be continued across encoded-words. Each encoded-word MUST encode an integral number of octets and represent an integral number of characters; a multi-octet character may not be split across adjacent encoded-words.
section: "5"
rfc2119_level: MUST
