document: rfc-6840
kind: normative-requirement
summary: Validating resolvers SHOULD only set the AD bit in a response when the response meets the conditions of RFC 4035 Section 3.2.3 AND the request contained either a set DO bit or a set AD bit, to avoid confusing legacy stub resolvers and middleboxes.
section: "5.8"
rfc2119_level: SHOULD
topics:
    - dns
