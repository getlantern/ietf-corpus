document: rfc-6503
kind: security-consideration
summary: Clients MUST verify they have contacted the correct conference server using TLS server certificate validation, or an equivalent mechanism, to prevent man-in-the-middle attacks and ensure that sensitive conference data and credentials are not disclosed to an impersonating server.
section: "10.1"
rfc2119_level: MUST
topics:
