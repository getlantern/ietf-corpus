document: rfc-1407
kind: protocol-element
summary: 'dsx3LineStatus is a read-only bit-map integer (1..1023) that can represent multiple simultaneous states: NoAlarm(1), RcvRAIFailure(2), XmitRAIAlarm(4), RcvAIS(8), XmitAIS(16), LOF(32), LOS(64), LoopbackState(128), RcvTestCode(256), OtherFailure(512). dsx3NoAlarm must be set if and only if no other flag is set.'
