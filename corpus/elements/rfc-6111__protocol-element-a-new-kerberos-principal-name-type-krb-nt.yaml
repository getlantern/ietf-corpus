document: rfc-6111
kind: protocol-element
summary: A new Kerberos principal name type KRB_NT_WELLKNOWN (value 11) is defined for well-known principal names. A well-known principal name MUST have at least two KerberosString components, and the first component MUST be the string literal "WELLKNOWN".
section: "3.1"
topics:
    - security
