document: rfc-9862
kind: normative-requirement
summary: The SR Policy Identifier MUST be uniform across all PCEP sessions, and Candidate Paths within an SR Policy MUST carry the same SR Policy Identifiers in their SRPAs. Candidate Paths MUST NOT change their SR Policy Identifiers for the lifetime of the PCEP session; violations trigger PCErr Error-Type=26, Error-value=20.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
