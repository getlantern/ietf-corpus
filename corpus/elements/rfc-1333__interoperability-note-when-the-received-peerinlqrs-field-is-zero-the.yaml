document: rfc-1333
kind: interoperability-note
summary: When the received PeerInLQRs field is zero, the LastOut... fields are indeterminate and the PeerIn... fields contain only initial peer values; no delta calculations can be performed until a subsequent LQR is received with a non-zero PeerInLQRs.
