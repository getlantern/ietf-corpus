document: rfc-6926
kind: security-consideration
summary: TCP introduces SYN-flooding and connection-exhaustion risks; servers SHOULD restrict incoming connections by source, limit accepted connections and per-connection in-process queries, and impose idle-connection timeouts to defend against malicious or misbehaving requestors.
section: "9"
topics:
