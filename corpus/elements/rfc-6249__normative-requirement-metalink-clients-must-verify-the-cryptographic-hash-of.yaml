document: rfc-6249
kind: normative-requirement
summary: Metalink clients MUST verify the cryptographic hash of the file once the download has completed. If the hash does not match the Instance Digest from the Metalink server, error correction via Metalink/XML partial hashes SHOULD be attempted.
section: "7"
rfc2119_level: MUST
topics:
    - http
    - security
