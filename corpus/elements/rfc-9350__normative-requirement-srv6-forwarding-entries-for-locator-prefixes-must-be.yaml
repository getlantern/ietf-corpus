document: rfc-9350
kind: normative-requirement
summary: SRv6 forwarding entries for locator prefixes MUST be installed in the forwarding plane of receiving routers when the associated topology/algorithm is being participated in. Forwarding entries for locators associated with Flex-Algorithms in which the node is not participating MUST NOT be installed.
section: "14.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
