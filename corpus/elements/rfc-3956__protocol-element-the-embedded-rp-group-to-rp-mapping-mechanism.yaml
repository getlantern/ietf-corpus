document: rfc-3956
kind: protocol-element
summary: The embedded-RP group-to-RP mapping mechanism operates as a PIM-SM group-to-RP mapping method. Routers use the derived RP address for RPF lookups, Join/Prune processing, and Register-encapsulation. Results may be cached per-implementation to avoid recomputation per packet.
section: "7.1"
topics:
