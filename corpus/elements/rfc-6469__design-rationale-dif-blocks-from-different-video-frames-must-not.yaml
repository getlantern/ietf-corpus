document: rfc-6469
kind: design-rationale
summary: DIF blocks from different video frames MUST NOT be mixed in one RTP packet because the transition between frames is indicated solely by an RTP timestamp change; mixing frames would also increase receiver processing complexity.
section: "2.3"
topics:
    - rtp
    - realtime
