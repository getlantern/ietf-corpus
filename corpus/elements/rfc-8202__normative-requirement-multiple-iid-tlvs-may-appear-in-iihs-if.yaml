document: rfc-8202
kind: normative-requirement
summary: Multiple IID-TLVs MAY appear in IIHs; if present and the IID value in all IID-TLVs is not the same, the PDU MUST be ignored. The supported ITID set is the union of all ITIDs across all IID-TLVs.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
