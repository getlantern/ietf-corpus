document: rfc-3443
kind: normative-requirement
summary: The oTTL check MUST verify that oTTL is greater than 0; if the check fails, the packet is not forwarded. The oTTL check is only performed when an outgoing TTL (IP or MPLS) is set to oTTL.
section: "2.3"
rfc2119_level: MUST
topics:
    - mpls
