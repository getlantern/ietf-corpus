document: rfc-4412
kind: normative-requirement
summary: A UAS implementing queueing SHOULD generate a 182 (Queued) response if its resources are busy, continuing until it can provide a final response. A UAC MUST be prepared to receive a 182 response from an RP actor that has queued the request.
section: 4.7.2.2
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
