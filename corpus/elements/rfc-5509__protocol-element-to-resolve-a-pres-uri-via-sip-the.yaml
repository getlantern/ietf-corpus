document: rfc-5509
kind: protocol-element
summary: To resolve a 'pres:' URI via SIP, the UA performs a DNS SRV lookup for "_pres._sip.<domain>", following procedures defined in RFC 3861. For example, pres:fred@example.com resolves via _pres._sip.example.com to a SIP URI such as sip:fred@simple.example.com.
section: "3"
topics:
    - sip
    - dns
