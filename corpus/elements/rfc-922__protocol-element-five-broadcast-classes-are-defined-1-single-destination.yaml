summary: 'Five broadcast classes are defined: (1) single-destination datagrams sent as link-layer broadcasts, (2) local hardware network broadcast using all-ones host number, (3) directed broadcast to a remote hardware network, (4) multi-subnet broadcast using all-ones subnet number, and (5) Internet-wide broadcast (deemed undesirable).'
