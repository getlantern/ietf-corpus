document: rfc-9020
kind: security-consideration
summary: Unauthorized modification of SRLB (/segment-routing/mpls/srlb) is subject to the same DoS risk as SRGB modification. Read access to /segment-routing/mpls/sid-db should also be restricted, as knowledge of SID-to-prefix mappings enables targeted DoS or traffic redirection attacks against other routers in the SR domain.
section: "9"
topics:
    - security
    - mpls
    - routing
