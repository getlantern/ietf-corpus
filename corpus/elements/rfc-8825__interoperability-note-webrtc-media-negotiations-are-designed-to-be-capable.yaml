document: rfc-8825
kind: interoperability-note
summary: WebRTC media negotiations are designed to be capable of representing the same SDP offer/answer semantics (RFC 3264) used in SIP, enabling signaling gateways between SIP and WebRTC. It will be possible to gateway between legacy SIP devices that support ICE without using a media gateway.
section: "7"
topics:
