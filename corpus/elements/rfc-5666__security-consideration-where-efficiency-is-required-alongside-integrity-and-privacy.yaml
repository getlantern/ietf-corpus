document: rfc-5666
kind: security-consideration
summary: Where efficiency is required alongside integrity and privacy, link-level IPsec (potentially co-located in RDMA hardware) is preferred over RPCSEC_GSS. Use of RPCSEC_GSS Version 2 (RFC 5403) with Channel Binding (RFC 5056) and IPsec Channel Connection Latching (RFC 5660) is REQUIRED where both integrity/privacy and efficiency are needed.
section: "11"
topics:
