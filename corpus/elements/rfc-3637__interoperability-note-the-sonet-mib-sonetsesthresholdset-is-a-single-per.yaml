document: rfc-3637
kind: interoperability-note
summary: The SONET-MIB sonetSESthresholdSet is a single per-network-element enumerated value controlling thresholds for all layers simultaneously, while 802.3ae defines per-interface integer thresholds for each layer separately; these objects are semantically non-equivalent.
