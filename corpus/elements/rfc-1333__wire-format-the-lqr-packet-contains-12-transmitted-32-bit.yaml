document: rfc-1333
kind: wire-format
summary: 'The LQR packet contains 12 transmitted 32-bit fields: Magic-Number, LastOutLQRs, LastOutPackets, LastOutOctets, PeerInLQRs, PeerInPackets, PeerInDiscards, PeerInErrors, PeerInOctets, PeerOutLQRs, PeerOutPackets, PeerOutOctets. Five additional 32-bit SaveIn... fields (SaveInLQRs, SaveInPackets, SaveInDiscards, SaveInErrors, SaveInOctets) are appended locally by the Rx process and are not transmitted over the link.'
section: "2.6"
topics:
    - tcp
