document: rfc-4780
kind: normative-requirement
summary: Support for sipCommonCfgServiceNotifEnable notifications is OPTIONAL; either none or all notification values MUST be supported. If notifications are supported, the default value SHOULD have sipCommonServiceColdStart and sipCommonServiceWarmStart enabled and sipCommonServiceStatusChanged disabled, and the value SHOULD persist across reboots.
section: "7.2"
rfc2119_level: SHOULD
topics:
    - sip
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
