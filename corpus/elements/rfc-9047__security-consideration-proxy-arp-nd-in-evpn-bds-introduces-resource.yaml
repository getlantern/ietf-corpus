document: rfc-9047
kind: security-consideration
summary: 'Proxy-ARP/ND in EVPN BDs introduces resource exhaustion risk: attackers can inject ARP/ND messages to create state across all PEs in a BD. Mitigations include limiting the number of proxy-ARP/ND entries per BD and/or per port, and rate-limiting dynamic entry creation.'
section: "4"
topics:
    - security
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
