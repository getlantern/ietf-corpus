document: rfc-7159
kind: wire-format
summary: A JSON number is encoded in base 10 as '[ minus ] int [ frac ] [ exp ]'. Leading zeros are not allowed; Infinity and NaN are not permitted. Fraction part is a decimal point followed by one or more digits; exponent part begins with 'e' or 'E' optionally followed by '+' or '-' and one or more digits.
section: "6"
