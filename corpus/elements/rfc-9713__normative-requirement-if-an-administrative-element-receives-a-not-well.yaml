document: rfc-9713
kind: normative-requirement
summary: If an administrative element receives a not-well-formed ADU or an administrative record type code that cannot be processed, the record SHALL be ignored by the element. This does not affect bundle delivery or related bundle protocol agent processing.
section: "2"
rfc2119_level: REQUIRED
