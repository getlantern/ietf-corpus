document: rfc-3645
kind: normative-requirement
summary: Section 4.2 of RFC 2845 is modified to allow a server to generate a signed response to an unsigned TKEY query when a secret key is established after processing the client's query. Signing responses to unsigned TKEY queries MUST be explicitly specified in the description of the individual secret key establishment algorithm.
section: "2.2"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
