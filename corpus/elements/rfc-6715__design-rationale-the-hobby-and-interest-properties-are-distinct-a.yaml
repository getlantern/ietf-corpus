document: rfc-6715
kind: design-rationale
summary: 'The HOBBY and INTEREST properties are distinct: a hobby is an activity one actively engages in, while an interest is a topic one finds interesting but does not necessarily participate in. This semantic distinction is made explicit to aid correct usage.'
