document: rfc-8476
kind: normative-requirement
summary: When a Link MSD is present for a given MSD-Type, its value MUST take precedence over the Node MSD. When a Link MSD-Type is not signaled but the Node MSD-Type is, the Node MSD-Type value MUST be used as the MSD value for that link.
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
