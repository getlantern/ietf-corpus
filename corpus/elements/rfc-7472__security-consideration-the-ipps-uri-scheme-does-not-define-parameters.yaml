document: rfc-7472
kind: security-consideration
summary: The 'ipps' URI scheme does not define parameters to specify the required IPP Client authentication mechanism. IPP Clients should query the printer for 'uri-authentication-supported' to discover the required authentication mechanisms.
section: 6.2.4
