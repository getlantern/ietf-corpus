document: rfc-6533
kind: design-rationale
summary: The EmbeddedUnicodeChar encoding (\x{HEXPOINT}) is explicitly described as a transitional mechanism to avoid xtext encoding for non-ASCII characters; it is expected to be phased out as SMTPUTF8 support becomes universal and systems requiring 7-bit fallback become less common.
