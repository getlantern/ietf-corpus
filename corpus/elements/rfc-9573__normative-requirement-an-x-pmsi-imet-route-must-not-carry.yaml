document: rfc-9573
kind: normative-requirement
summary: An x-PMSI/IMET route MUST NOT carry both the DCB-flag and the Context-Specific Label Space ID EC. A received route with both present MUST be treated as withdrawn.
section: "4.2"
rfc2119_level: MUST NOT
