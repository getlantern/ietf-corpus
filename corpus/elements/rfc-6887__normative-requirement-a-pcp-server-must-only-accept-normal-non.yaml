document: rfc-6887
kind: normative-requirement
summary: A PCP server MUST only accept normal (non-THIRD_PARTY) requests arriving on the interface from which it normally receives traffic from that client, and MUST silently ignore requests on any other interface. A residential NAT gateway, for example, ignores PCP requests arriving on its WAN interface.
section: "8.2"
rfc2119_level: MUST
topics:
    - nat
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
