document: rfc-7306
kind: security-consideration
summary: RDMAP traffic from structured HPC applications (e.g., MPI) exhibits distinctive patterns in message timing, source/destination, and size that can reveal sensitive information (application type, dataset size, progress) even when encrypted. ESPv3 Traffic Flow Confidentiality (RFC 4303) should be used to obfuscate these characteristics; ESPv3 requirements for RDMAP are specified in RFC 7146.
section: "9"
topics:
    - security
    - privacy
    - vpn
    - ipsec
