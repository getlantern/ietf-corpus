document: rfc-3327
kind: normative-requirement
summary: The registering UA SHOULD use S/MIME mechanisms to provide a protected copy of the original request to the registrar, including a Supported header field indicating Path support in the protected copy. Registrars receiving such a request MUST honor the Path extension only if support is indicated in the protected header field.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
