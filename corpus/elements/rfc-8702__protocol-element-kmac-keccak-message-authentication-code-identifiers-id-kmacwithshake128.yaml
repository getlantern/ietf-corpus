document: rfc-8702
kind: protocol-element
summary: KMAC (Keccak message authentication code) identifiers id-KmacWithSHAKE128 and id-KmacWithSHAKE256 are used in AuthenticatedData macAlgorithm field. The variable N is 0xD2B282C2, S is an empty string, and L is 256 or 512 bits for KmacWithSHAKE128 or KmacWithSHAKE256 respectively.
section: "3.4"
topics:
