document: rfc-7159
kind: wire-format
summary: 'JSON defines six structural characters: begin-array (%x5B ''[''), begin-object (%x7B ''{''), end-array (%x5D '']''), end-object (%x7D ''}''), name-separator (%x3A '':''), and value-separator (%x2C '',''). Insignificant whitespace (space %x20, tab %x09, line feed %x0A, carriage return %x0D) is allowed before or after any structural character.'
section: "2"
topics:
