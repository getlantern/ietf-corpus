document: rfc-3865
kind: normative-requirement
summary: When rejecting a message using the NO-SOLICITING extension and Enhanced Mail Status Codes (RFC 3463), the correct error code is typically '5.7.1' (sender not authorized due to per-host or per-recipient filtering). An implementation MAY impose size/quota limits by solicitation class and SHOULD use the appropriate status code for that limit.
section: "2.4"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
