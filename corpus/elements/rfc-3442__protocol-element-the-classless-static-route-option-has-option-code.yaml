document: rfc-3442
kind: protocol-element
summary: The Classless Static Route Option has option code 121 and a minimum length of 5 bytes. It carries one or more static routes, each consisting of a destination descriptor (subnet mask width + significant subnet octets) followed by a 4-octet router IP address.
section: Classless Route Option Format
