document: rfc-6757
kind: normative-requirement
summary: Location and access network information MUST NOT be exposed outside the PMIPv6 domain without a subscriber-approved agreement. If exposed, it MUST be done using a PIDF-LO carrying the subscriber's agreed usage rules.
section: "1"
rfc2119_level: MUST NOT
topics:
    - ip
    - mobility
    - privacy
