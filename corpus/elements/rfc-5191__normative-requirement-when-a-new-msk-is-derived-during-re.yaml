document: rfc-5191
kind: normative-requirement
summary: When a new MSK is derived during re-authentication, any key derived from the old MSK MUST be updated to one derived from the new MSK. One Key-Id AVP MUST be carried in the final C-bit PAR and PAN, containing a value that uniquely identifies the MSK within the PANA session.
section: "5.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
