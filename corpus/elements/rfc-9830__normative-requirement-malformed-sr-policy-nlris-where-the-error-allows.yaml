document: rfc-9830
kind: normative-requirement
summary: Malformed SR Policy NLRIs where the error allows skipping MUST be handled as treat-as-withdraw. Where encoding errors prevent processing the entire BGP UPDATE, the router SHOULD apply AFI/SAFI disable or MUST perform session reset if AFI/SAFI disable is not possible.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
