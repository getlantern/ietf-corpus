document: rfc-5919
kind: design-rationale
summary: In LDP Graceful Restart, without End-of-LIB Notification, stale forwarding state must be retained until a configured time period expires. Receiving End-of-LIB allows a speaker to immediately discard stale state from a restarted peer and reclaim resources rather than waiting for timeout.
section: "5.2"
topics:
    - mpls
    - routing
