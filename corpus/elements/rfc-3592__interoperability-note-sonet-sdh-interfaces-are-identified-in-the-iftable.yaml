document: rfc-3592
kind: interoperability-note
summary: 'SONET/SDH interfaces are identified in the ifTable by three ifType values: sonet(39) for the combined Medium/Section/Line layer, sonetPath(50) for SONET/SDH Paths, and sonetVT(51) for Virtual Tributaries/Containers. The ifStackTable and ifInvStackTable convey the multiplexing relationships between layers.'
section: "3"
