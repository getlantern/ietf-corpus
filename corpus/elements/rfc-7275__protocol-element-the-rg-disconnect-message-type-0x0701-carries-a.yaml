document: rfc-7275
kind: protocol-element
summary: The RG Disconnect message (type 0x0701) carries a Disconnect Code TLV (Type=0x0004) with status 'ICCP RG Removed' or 'ICCP Application Removed from RG'. If status is 'RG Removed', the message MUST NOT contain Application Disconnect TLVs; if 'Application Removed from RG', it MUST contain exactly one Application Disconnect TLV.
section: "6.3"
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
