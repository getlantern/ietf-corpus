document: rfc-8325
kind: normative-requirement
summary: Wireless client operating systems SHOULD map CS6 and CS7 DSCP to UP 0 and SHOULD re-mark such packets to DSCP 0, because CS6/CS7 are intended for network control and SHOULD NOT be sourced from wireless endpoint devices.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - diffserv
    - qos
    - security
