document: rfc-6353
kind: protocol-element
summary: The snmpTLSTCPDomain (snmpDomains 8) and snmpDTLSUDPDomain (snmpDomains 9) are transport domain OIDs for SNMP over TLS/TCP and DTLS/UDP respectively. Their associated securityName prefixes are 'tls' and 'dtls', used by security models to identify which secure transport authenticated a principal.
