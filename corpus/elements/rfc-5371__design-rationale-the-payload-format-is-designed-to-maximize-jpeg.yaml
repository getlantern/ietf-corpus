document: rfc-5371
kind: design-rationale
summary: The payload format is designed to maximize JPEG 2000 scalability features, including markers for headers and fragments, tile numbering for packet association, interlace odd/even field markers, and priority indicators — because JPEG 2000's intra-frame structure and scalability layers are key differentiators over JPEG.
