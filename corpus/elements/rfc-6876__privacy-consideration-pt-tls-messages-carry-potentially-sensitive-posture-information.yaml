document: rfc-6876
kind: privacy-consideration
summary: PT-TLS messages carry potentially sensitive posture information (software versions, patch levels, configuration details). TLS confidentiality protects this data in transit; however, data held within the NEA Server's assessment components may also be sensitive and should be protected at rest and disclosed only to authorized parties.
section: "5"
topics:
