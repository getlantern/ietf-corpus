document: rfc-6374
kind: wire-format
summary: 'Loss Measurement (LM) message format (after ACH): Version(4b)/Flags(4b)/Control Code(8b)/Message Length(16b); DFlags(4b)/OTF(4b)/Reserved(24b); Session Identifier(26b)/DS(6b); Origin Timestamp(64b); Counter 1–4 (each 64b); optional TLV Block. 32-bit counter values are written to the low-order 32 bits with the high-order 32 bits set to 0.'
