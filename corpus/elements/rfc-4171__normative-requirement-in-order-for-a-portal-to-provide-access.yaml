document: rfc-4171
kind: normative-requirement
summary: In order for a Portal to provide access to an iSCSI Node, the Portal Group Tag (PGT) of the PG object MUST be non-NULL; a NULL PGT or absent PGT means the Portal does not provide access to that iSCSI Node in the Entity.
section: "3.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
