document: rfc-4425
kind: normative-requirement
summary: VC-1 video frames MUST be transmitted in the coded order. The RTP timestamp field MUST be set to the presentation time of the video frame contained in the first AU in the RTP packet. A clock rate of 90 kHz MUST be used.
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
