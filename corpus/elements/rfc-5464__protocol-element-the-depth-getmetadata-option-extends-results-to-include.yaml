document: rfc-5464
kind: protocol-element
summary: The DEPTH GETMETADATA option extends results to include child entries. DEPTH 0 returns only the specified entry; DEPTH 1 returns the entry and its immediate children; DEPTH infinity returns the entry and all descendants. If DEPTH is omitted, DEPTH 0 is assumed.
section: 4.2.2
topics:
