document: rfc-7184
kind: security-consideration
summary: The OLSRv2-MIB contains numerous read-write configuration objects (message intervals, hop limits, willingness, link metric type) that directly affect routing behavior; unauthorized writes could destabilize the MANET. Implementations must apply SNMP access control (e.g., SNMPv3 USM/VACM) to restrict write access to these objects.
section: "8"
topics:
    - routing
    - snmp
    - security
