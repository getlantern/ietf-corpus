document: rfc-3956
kind: interoperability-note
summary: With embedded-RP, BSR or other RP configuration mechanisms are not required throughout the PIM domain, since each embedded-RP group address self-identifies the RP. Embedded-RP can fully replace BSR for automatic RP discovery in compatible deployments.
section: "6.4"
topics:
    - multicast
    - routing
