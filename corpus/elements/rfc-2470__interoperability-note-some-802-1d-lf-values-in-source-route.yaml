document: rfc-2470
kind: interoperability-note
summary: Some 802.1D LF values in source route bridging result in a maximum IP MTU less than the IPv6 minimum of 1280 bytes (e.g., LF base 001 yields IP MTU 1462, but lower LF values yield less). Communication across such paths using IPv6 is generally not possible.
section: "2"
topics:
    - ip
    - v6ops
