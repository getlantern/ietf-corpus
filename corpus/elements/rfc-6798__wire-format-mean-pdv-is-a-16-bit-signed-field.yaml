document: rfc-6798
kind: wire-format
summary: Mean PDV is a 16-bit signed field in S11:4 format (milliseconds). For MAPDV2, it is generated per ITU-T G.1020 Clause 6.2.3.2; for 2-point PDV, it is the mean of per-packet 2-point PDV values. Unavailable MUST be coded 0x7FFF.
section: "3.2"
topics:
