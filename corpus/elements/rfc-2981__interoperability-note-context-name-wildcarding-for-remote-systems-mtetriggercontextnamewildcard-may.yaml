document: rfc-2981
kind: interoperability-note
summary: Context name wildcarding for remote systems (mteTriggerContextNameWildcard) MAY not be supported, as a local list of available contexts on a remote system is not defined by any current standard. Implementations are permitted to limit this feature to local monitoring.
