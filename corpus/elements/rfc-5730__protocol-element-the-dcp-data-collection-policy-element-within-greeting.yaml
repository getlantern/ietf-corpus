document: rfc-5730
kind: protocol-element
summary: The <dcp> (data collection policy) element within <greeting> describes the server's privacy policy via an <access> element (all/none/null/personal/personalAndOther/other), one or more <statement> elements each containing <purpose>, <recipient>, and <retention> child elements, and an optional <expiry> element.
section: "2.4"
topics:
    - privacy
