document: rfc-6939
kind: normative-requirement
summary: DHCPv6 relay agents MAY include the link-layer source address of the received DHCPv6 message in the Client Link-Layer Address option in relayed Relay-Forward messages, but only for messages originating from clients (e.g., Solicit, Request) — not for Relay-Forward or Advertise messages.
section: "5"
rfc2119_level: MAY
topics:
