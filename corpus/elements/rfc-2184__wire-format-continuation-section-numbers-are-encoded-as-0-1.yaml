document: rfc-2184
kind: wire-format
summary: Continuation section numbers are encoded as `*0`, `*1`, … with `initial-section := "*1"` treated specially and `other-sections` covering values 2–9 plus multi-digit extensions. The `*0` section is used for the first (or only) chunk of a continued value.
