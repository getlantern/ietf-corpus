document: rfc-7809
kind: protocol-element
summary: The CALDAV:calendar-timezone-id WebDAV property allows clients to set the default time zone for a calendar collection using only a time zone identifier (PCDATA), as an alternative to providing the full VTIMEZONE component via CALDAV:calendar-timezone.
section: "5.2"
