document: rfc-5034
kind: wire-format
summary: 'A server challenge during AUTH is sent as a line beginning with ''+'' followed by a single space and a Base64-encoded string. This line MUST NOT contain any text other than the Base64-encoded challenge. The continue-req ABNF is: ''+ SP [base64] CRLF''.'
