document: rfc-4935
kind: protocol-element
summary: 't11FcsPortTable (indexed by fcmInstanceIndex, fcmSwitchIndex, t11FcsFabricIndex, t11FcsIeName, t11FcsPortName) stores per-port attributes: Port_Name (WWN, 8 or 16 bytes), port type (FcPortType), TX type (T11FcPortTxType, 13 values including 10G variants), module type (0–255), physical port number (4-byte unrestricted vendor field), attached port name list pointer, state, speed capabilities (2 bytes), operating speed (2 bytes), and zoning enforcement status (12 bytes).'
section: "6"
