document: rfc-5433
kind: security-consideration
summary: 'The GPSK-Protected-Fail result indication leaks account existence information to attackers: a server can distinguish ''PSK Not Found'' (no such user) from ''Authentication Failure'' (wrong PSK) from ''Authorization Failure''. Implementers in sensitive environments should consider disabling protected result indications.'
section: "12.3"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
