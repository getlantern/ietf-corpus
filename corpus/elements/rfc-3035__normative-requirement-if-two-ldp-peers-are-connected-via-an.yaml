document: rfc-3035
kind: normative-requirement
summary: If two LDP peers are connected via an LC-ATM interface, a non-MPLS connection capable of carrying unlabeled IP packets MUST be available. This connection MUST use the LLC/SNAP encapsulation of RFC 2684 and is used to carry LDP packets between the two peers.
section: "7"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
