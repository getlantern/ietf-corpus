document: rfc-9574
kind: normative-requirement
summary: A selective AR-LEAF MUST advertise a Leaf A-D route after receiving a Replicator-AR route with L=1. It MUST locally select a single selective AR-REPLICATOR, send a Leaf A-D route scoped to that AR-REPLICATOR's IP-address-specific Route Target, and send all BM packets for the BD to that AR-REPLICATOR.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
