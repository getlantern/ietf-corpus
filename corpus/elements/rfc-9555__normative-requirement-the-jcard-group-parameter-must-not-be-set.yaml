document: rfc-9555
kind: normative-requirement
summary: The jCard GROUP parameter MUST NOT be set in a vCard; it is exclusively for use in jCard. Implementations that wish to preserve the exact property group name of a vCard property MAY record it in the JSContact vCardProps or vCardParams properties.
section: 2.3.9
rfc2119_level: MUST NOT
