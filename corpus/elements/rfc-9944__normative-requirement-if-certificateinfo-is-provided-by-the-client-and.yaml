document: rfc-9944
kind: normative-requirement
summary: If certificateInfo is provided by the client and accepted by the server, the server MUST return that multivalued attribute in its response. If the server accepts a certificate and also produces a clientToken, control and telemetry servers MUST validate both.
section: 6.3.1
rfc2119_level: MUST
