document: rfc-8810
kind: design-rationale
summary: A survey was conducted beginning August 14, 2015 to discover existing uses of code points in the formerly 'Private Use' range 128-255 before reclassifying them. Discovered uses were registered as deprecated entries to avoid collision; any undiscovered remaining uses are considered no worse than typical code point squatting.
