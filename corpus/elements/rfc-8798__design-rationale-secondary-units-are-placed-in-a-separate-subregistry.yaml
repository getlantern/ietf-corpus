document: rfc-8798
kind: design-rationale
summary: Secondary units are placed in a separate subregistry rather than the main SenML Units registry because they are derived by linear transformation from existing primary units. This separation preserves the direct-comparison property of primary units while still providing a standardized mapping for convenience units like ms, kW, and km/h.
section: "3"
