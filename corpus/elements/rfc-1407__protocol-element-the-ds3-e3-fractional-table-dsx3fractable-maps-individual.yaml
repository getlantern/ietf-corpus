document: rfc-1407
kind: protocol-element
summary: The DS3/E3 Fractional table (dsx3FracTable) maps individual channels to logical interfaces via dsx3FracIfIndex. DS3 applications (M23, SYNTRAN, CbitParity, ClearChannel) support 28 channels (1–28); e3Framed supports 16 channels (1–16) corresponding directly to time-slots. A channel with no interface assigned has dsx3FracIfIndex=0.
section: "4.3"
