document: rfc-5465
kind: protocol-element
summary: The MessageExpunge event covers both MessageExpunge and MessageExpire from RFC 5423. For the selected mailbox, notification uses EXPUNGE (or VANISHED if QRESYNC is enabled). For other mailboxes, an unsolicited STATUS (UIDNEXT MESSAGES) response is sent.
section: "5.3"
