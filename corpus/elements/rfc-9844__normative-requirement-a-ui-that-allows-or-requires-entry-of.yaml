document: rfc-9844
kind: normative-requirement
summary: A UI that allows or requires entry of an IPv6 address other than a global unicast address MUST provide a means for entering a link-local address or scoped multicast address and selecting a zone identifier as specified by RFC 4007.
section: "5"
rfc2119_level: MUST
topics:
