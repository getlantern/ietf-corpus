document: rfc-3981
kind: normative-requirement
summary: For compatibility and per RFC 2277, use of UTF-8 is RECOMMENDED with IRIS. The application-transport layer MUST define a common set of character set encodings understood by both client and server. Entity definitions SHOULD use the 'language' type to aid client localization.
section: "9"
rfc2119_level: RECOMMENDED
topics:
    - registry
