document: rfc-7899
kind: protocol-element
summary: 'Recommended default parameter values are: increment-factor=1000, cutoff-threshold=3000, decay-half-life=10s, reuse-threshold=1500, and a maximum figure-of-merit cap of 20×increment-factor (20000). With these values, a state changing less than once per 6 seconds will never be damped; a state changing at maximum pace will remain damped for approximately 37 seconds after activity stops.'
section: "7.3"
topics:
    - multicast
    - routing
