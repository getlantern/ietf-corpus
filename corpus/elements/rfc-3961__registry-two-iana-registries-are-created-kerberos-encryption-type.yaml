document: rfc-3961
kind: registry
summary: 'Two IANA registries are created: Kerberos Encryption Type Numbers and Kerberos Checksum Type Numbers. Values are signed 32-bit integers; positive values require Standards Action (for standards-track) or Expert Review (for non-standards-track RFCs); negative values are private-use; zero is reserved. Smaller positive values are preferred for IETF standards-track mechanisms due to ASN.1 encoding efficiency.'
