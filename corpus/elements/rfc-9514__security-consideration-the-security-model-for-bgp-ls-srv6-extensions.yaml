document: rfc-9514
kind: security-consideration
summary: The security model for BGP-LS SRv6 extensions inherits from RFC 7752. IGP instances originating these TLVs are assumed to support all required security and authentication mechanisms per RFC 9352 and RFC 9513; the extensions themselves do not alter the BGP-LS security model.
section: "11"
topics:
    - routing
    - bgp
    - security
