document: rfc-4976
kind: normative-requirement
summary: MSRP clients and relays MUST implement TLS. The cipher suite TLS_RSA_WITH_AES_128_CBC_SHA MUST be supported. Clients MUST send TLS ClientExtendedHello with server name indication (RFC 4366).
