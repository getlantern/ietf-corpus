document: rfc-5059
kind: security-consideration
summary: Unicast Bootstrap messages are accepted only during a brief window after reboot, during which a spoofed unicast BSM from an off-domain attacker (using a neighbor's source address) could be accepted. Mitigation is border/leaf interface filtering and PMBR source-address filtering for infrastructure addresses.
section: 6.3.1
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
