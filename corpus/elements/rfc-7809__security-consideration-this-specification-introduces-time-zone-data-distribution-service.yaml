document: rfc-7809
kind: security-consideration
summary: This specification introduces time zone data distribution service (RFC7808) servers as critical components in the calendaring architecture, creating a new attack vector. CalDAV server administrators SHOULD ensure that advertised time zone distribution servers are protected by a level of security commensurate with all other system components.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
