document: rfc-5426
kind: wire-format
summary: A syslog UDP datagram carries exactly one syslog message as the UDP payload, formatted per RFC 5424. Maximum payload size is 65535 octets minus the UDP header (and IP header for IPv4), derived from the 16-bit UDP length field. No framing or length prefix is added beyond the UDP header itself.
section: "3.1"
topics:
    - syslog
    - udp
    - ip
