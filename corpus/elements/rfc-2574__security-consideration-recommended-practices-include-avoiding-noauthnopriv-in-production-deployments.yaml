document: rfc-2574
kind: security-consideration
summary: 'Recommended practices include: avoiding noAuthNoPriv in production deployments, using passwords different from system login passwords, not using obvious passwords, and ensuring managers verify key change success before discarding the old key. The usmUserTable should be treated with the same care as a system password file.'
section: "11.1"
