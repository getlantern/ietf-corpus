document: rfc-3023
kind: protocol-element
summary: text/xml-external-parsed-entity and application/xml-external-parsed-entity are media types for XML external parsed entities. External parsed entities cannot have standalone document declarations or DTDs, so they are not interchangeable with XML document entities and require distinct labeling.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
