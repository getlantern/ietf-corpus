document: rfc-5884
kind: normative-requirement
summary: To establish a BFD session, an LSP Ping Echo request message MUST carry the local discriminator assigned by the ingress LSR; this MUST subsequently be used as the My Discriminator field in BFD session packets sent by the ingress LSR.
section: "6"
rfc2119_level: MUST
