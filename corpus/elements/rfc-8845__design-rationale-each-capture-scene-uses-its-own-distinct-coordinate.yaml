document: rfc-8845
kind: design-rationale
summary: Each Capture Scene uses its own distinct coordinate system unrelated to other Scenes. This design supports MCUs that aggregate Streams from multiple Endpoints, each with potentially different and unknown physical scales; the 'No Scale' value is intended specifically for this MCU use case where scale can vary per Capture.
