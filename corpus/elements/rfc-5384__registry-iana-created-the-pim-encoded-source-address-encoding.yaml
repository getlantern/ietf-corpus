document: rfc-5384
kind: registry
summary: IANA created the 'PIM Encoded-Source Address Encoding Type' registry for the Encoding Type field of the Encoded-Source Address format. Encoding type 0 ('native encoding for the address family', reference RFC 4601) and encoding type 1 ('native encoding with zero or more PIM Join Attributes present', reference RFC 5384) are defined. Assignments follow 'IETF Review'.
