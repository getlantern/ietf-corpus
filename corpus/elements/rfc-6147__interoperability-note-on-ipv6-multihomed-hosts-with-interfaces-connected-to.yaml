document: rfc-6147
kind: interoperability-note
summary: On IPv6 multihomed hosts with interfaces connected to different networks (e.g., one via NAT64 and one with native IPv6), synthetic AAAA records received on one interface may be unusable on other interfaces. Hosts should treat DNS answers as local to the interface on which they were received.
section: 6.3.1
topics:
    - dns
    - v6ops
    - nat
