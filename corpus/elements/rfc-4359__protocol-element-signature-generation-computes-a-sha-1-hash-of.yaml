document: rfc-4359
kind: protocol-element
summary: Signature generation computes a SHA-1 hash of the authenticated portion of the AH or ESP packet (message M), signs the hash using the sender's RSA private key (K), and encodes the result using RSASSA-PSS or RSASSA-PKCS1-v1_5. The output S becomes the ICV field.
section: "2"
topics:
