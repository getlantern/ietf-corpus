document: rfc-4025
kind: design-rationale
summary: IPSECKEY RRs are looked up primarily via reverse DNS (IN-ADDR.ARPA / IP6.ARPA) because security gateways often have only the IP address of the target and not a forward name. Forward-name lookup is supported but not required.
section: "1.2"
topics:
    - dns
    - ipsec
