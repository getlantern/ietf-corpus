document: rfc-7652
kind: state-machine
summary: 'PA session states: (1) Initiation — client sends PA-Initiation or server sends AUTHENTICATION_REQUIRED; (2) EAP Exchange — PA-Server/PA-Client messages carry EAP request/response; (3) AUTHENTICATION_SUCCEEDED or AUTHENTICATION_FAILED/AUTHORIZATION_FAILED; (4) Active — common PCP messages protected by transport key; (5) Re-authentication — triggered by lifetime expiry or sequence number rollover; (6) Termination — SESSION_TERMINATED from either peer.'
section: "3"
topics:
    - pcp
    - security
