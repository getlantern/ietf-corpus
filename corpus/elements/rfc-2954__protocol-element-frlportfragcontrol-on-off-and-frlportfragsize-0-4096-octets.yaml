document: rfc-2954
kind: protocol-element
summary: frLportFragControl (on/off) and frLportFragSize (0..4096 octets) control FRF.12 interface fragmentation. The fragment size includes the frame relay header, UI octet, NLPID, fragmentation header, and payload octets. Both objects are read-write and default to off and zero respectively.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
