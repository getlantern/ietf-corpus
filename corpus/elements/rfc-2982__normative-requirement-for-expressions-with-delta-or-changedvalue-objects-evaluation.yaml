document: rfc-2982
kind: normative-requirement
summary: For expressions with delta or changedValue objects, evaluation occurs continuously every delta interval even if no application is reading the results. Delta state must be maintained constantly, creating ongoing CPU and memory overhead.
section: 2.3.3
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
