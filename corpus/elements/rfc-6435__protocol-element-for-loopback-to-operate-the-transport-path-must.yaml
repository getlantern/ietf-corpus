document: rfc-6435
kind: protocol-element
summary: For loopback to operate, the transport path must be bidirectional, the loopback node must lie on both forward and return paths (possible for MEPs and MIPs on co-routed bidirectional LSPs, PWs, and MPLS Sections, but only for MEPs on associated bidirectional LSPs), and test packet TTL must be large enough for the round trip.
section: "4.1"
topics:
    - mpls
