document: rfc-5280
kind: design-rationale
summary: Certificates are signed by a trusted CA and distributed over untrusted channels and stored in unsecured repositories because the CA's digital signature and the validity period can be independently verified by any relying party without trusting the distribution medium. This separates integrity from transport trust.
section: "3.1"
topics:
    - pkix
    - security
