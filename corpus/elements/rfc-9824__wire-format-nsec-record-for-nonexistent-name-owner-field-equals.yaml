document: rfc-9824
kind: wire-format
summary: 'NSEC record for nonexistent name: owner field equals QNAME; Next Domain Name equals ''\000.QNAME'' (null-label prepended); Type Bit Maps contains RRSIG, NSEC, NXNAME bits only. Example: ''a.example.com. 300 IN NSEC \000.a.example.com. RRSIG NSEC NXNAME''.'
