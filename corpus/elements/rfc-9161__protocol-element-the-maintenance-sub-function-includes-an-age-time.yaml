document: rfc-9161
kind: protocol-element
summary: The Maintenance sub-function includes an age-time procedure (flush dynamic entries that are not refreshed) and an optional send-refresh procedure in which the PE periodically sends ARP probe or NS messages to dynamic entry owners; refresh timer is RECOMMENDED to be one-third to one-half of the age-time.
section: "3.5"
topics:
