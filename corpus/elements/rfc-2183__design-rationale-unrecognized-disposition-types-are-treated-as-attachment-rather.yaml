document: rfc-2183
kind: design-rationale
summary: Unrecognized disposition types are treated as 'attachment' rather than 'inline' because a sender who goes to the trouble of producing a Content-Disposition header with a novel type is more likely aiming for something more elaborate than inline presentation.
