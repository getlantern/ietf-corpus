document: rfc-4585
kind: wire-format
summary: Slice Loss Indication (SLI) FCI uses 32-bit entries encoding First macroblock address (13 bits, raster-scan order from upper-left), Number of lost macroblocks (13 bits), and PictureID (6 least-significant bits of the codec-specific picture identifier). Packet length MUST be set to 2+n.
section: 6.3.2.2
