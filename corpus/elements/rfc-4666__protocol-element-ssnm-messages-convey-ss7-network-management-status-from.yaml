document: rfc-4666
kind: protocol-element
summary: 'SSNM messages convey SS7 network management status from an SGP to ASPs: Destination Unavailable (DUNA, type 1), Destination Available (DAVA, type 2), Destination State Audit (DAUD, type 3), Signalling Congestion (SCON, type 4), Destination User Part Unavailable (DUPU, type 5), and Destination Restricted (DRST, type 6). These parallel MTP-PAUSE, MTP-RESUME, and MTP-STATUS primitives in an SS7 node.'
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
