document: rfc-2845
kind: design-rationale
summary: TSIG is intentionally unsuitable for general server-to-server authentication among many servers because key management becomes unwieldy as the number of shared secrets grows quadratically. It is designed for the common case of a few resolvers each talking to a small number of recursive servers.
section: "1.5"
topics:
    - dns
    - security
