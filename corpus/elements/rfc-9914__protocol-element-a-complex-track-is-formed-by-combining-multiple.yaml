document: rfc-9914
kind: protocol-element
summary: A Complex Track is formed by combining multiple protection paths sharing the same TrackID, potentially interleaved at common nodes. Each individual protection path and segment carries its own SegmentID within the TrackID namespace for independent lifecycle management. Nodes at interleaving points may have multiple next hops in the Track RIB and select one that can reach the next loose hop.
section: "3.6"
topics:
    - routing
