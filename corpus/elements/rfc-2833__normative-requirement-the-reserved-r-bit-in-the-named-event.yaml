document: rfc-2833
kind: normative-requirement
summary: The reserved R bit in the named event payload MUST be set to zero by the sender and MUST be ignored by the receiver. The same requirement applies to the 4-bit reserved fields flanking each frequency entry in the tone payload.
section: "3.5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
