document: rfc-8550
kind: design-rationale
summary: 'PKCS #6 extended certificates are prohibited because they are not in widespread use and because PKIX certificate extensions address much of the same functionality and flexibility. Version 1 ACs are prohibited because they are not widely implemented and have been superseded by version 2 ACs.'
section: 2.2.1
