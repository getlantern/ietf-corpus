document: rfc-954
kind: normative-requirement
summary: MILNET TAC users must be registered in the NIC WHOIS database. DCA requests that all individuals with a directory on an ARPANET or MILNET host capable of passing DoD Internet traffic also register.
section: WHO SHOULD BE IN THE DATABASE
