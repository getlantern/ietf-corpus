document: rfc-2543
kind: normative-requirement
summary: A proxy server MUST add itself to the beginning of the Via header list when forwarding a request. On the response path, each proxy MUST remove its own Via entry so that routing information is hidden from the callee and external networks.
section: 1.4.5
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
