document: rfc-4995
kind: protocol-element
summary: 'ROHC defines three feedback message categories: ACK (successful decompression, context valid), NACK (dynamic context partially or fully invalid), and STATIC-NACK (entire static context invalid or unestablished). Feedback is encoded as FEEDBACK-1 (1 octet) or FEEDBACK-2 (at least 2 octets with Acktype field).'
section: 5.2.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
