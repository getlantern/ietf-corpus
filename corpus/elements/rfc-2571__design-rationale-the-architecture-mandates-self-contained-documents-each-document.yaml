document: rfc-2571
kind: design-rationale
summary: 'The architecture mandates self-contained documents: each document defines the elements of procedure and MIB objects for a specific portion of the SNMP framework, without requiring references to other documents. This modularity allows Security Models, message formats, and authentication mechanisms to be upgraded independently on separate standards-track timelines.'
section: "1.5"
topics:
