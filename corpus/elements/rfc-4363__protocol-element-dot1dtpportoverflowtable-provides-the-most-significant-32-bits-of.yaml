document: rfc-4363
kind: protocol-element
summary: dot1dTpPortOverflowTable provides the most-significant 32 bits of the port statistics counters (InFrames, OutFrames, InDiscards) for SNMPv1 agents that cannot use Counter64. Managers must account for possible overflow of the lower-32-bit counter between samples when combining the two tables.
section: "4"
topics:
