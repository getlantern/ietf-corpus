document: rfc-7530
kind: design-rationale
summary: Volatile filehandles were introduced because some server environments cannot provide a file system-level invariant suitable for constructing persistent filehandles, and because volatile handles ease implementation of hierarchical storage management and file system migration. The tradeoff is increased client implementation burden to track path components for recovery.
section: "4.2"
