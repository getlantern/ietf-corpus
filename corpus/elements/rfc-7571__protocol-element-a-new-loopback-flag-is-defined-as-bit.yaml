document: rfc-7571
kind: protocol-element
summary: A new Loopback flag is defined as bit number 13 in the Attribute Flags TLV (RFC5420). It is carried in Path messages and RRO Attributes subobjects, but not in Resv messages. It indicates that a particular node on the LSP is required to enter loopback mode.
section: "2.2"
topics:
