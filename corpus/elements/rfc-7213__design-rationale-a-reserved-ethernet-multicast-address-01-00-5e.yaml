document: rfc-7213
kind: design-rationale
summary: A reserved Ethernet multicast address (01-00-5E-90-00-00) is recommended as a non-negotiated destination MAC for point-to-point links because it avoids the administrative complexity of static configuration while limiting distribution to only nodes that recognize the MPLS-TP multicast address.
