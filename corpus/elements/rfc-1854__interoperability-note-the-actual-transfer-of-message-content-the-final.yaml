document: rfc-1854
kind: interoperability-note
summary: The actual transfer of message content (the final dot of a previous message body) is explicitly allowed to be the first 'command' in a pipeline group, so an RSET/MAIL FROM sequence for a new message can be batched with the final headers and body of the previous message.
section: "2.1"
topics:
    - email
