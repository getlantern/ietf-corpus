document: rfc-6788
kind: normative-requirement
summary: The Edge Router MUST ensure that tunneled RAs do not exceed the MTU of the link between the Edge Router and the AN, because the AN may not be capable of handling reassembly of fragmented datagrams.
section: "6.2"
rfc2119_level: MUST
