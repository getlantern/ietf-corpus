document: rfc-8079
kind: normative-requirement
summary: A media-aware B2BUA MUST update the SSRC in SR/RR packet headers and all Report Blocks if it changed the SSRC of any referenced RTP stream. If it changed the base RTP sequence number, that change MUST be reflected in the 'extended highest sequence number received' field in Report Blocks.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
