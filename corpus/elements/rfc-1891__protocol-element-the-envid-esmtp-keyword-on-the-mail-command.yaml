document: rfc-1891
kind: protocol-element
summary: The ENVID esmtp-keyword on the MAIL command carries an opaque envelope identifier (encoded as xtext, up to 100 characters) that is propagated with the message and included in any DSNs, allowing the sender to correlate DSNs with the original transmission.
