document: rfc-6066
kind: wire-format
summary: The CertificateURL message contains a CertChainType (individual_certs(0) or pkipath(1)) and a URLAndHash list. Each URLAndHash entry contains a variable-length URL (opaque, 1..2^16-1), a padding byte (MUST be 0x01), and a 20-byte SHA1Hash of the certificate or chain.
