document: rfc-6333
kind: registry
summary: IANA allocated the IPv4 prefix 192.0.0.0/29 for DS-Lite interface numbering. The /29 reserves six usable addresses to accommodate multi-homed nodes with multiple B4 elements; 192.0.0.1 is the default AFTR address and 192.0.0.2 is the default B4 address.
