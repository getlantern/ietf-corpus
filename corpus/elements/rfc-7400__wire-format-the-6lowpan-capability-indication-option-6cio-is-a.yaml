document: rfc-7400
kind: wire-format
summary: The 6LoWPAN Capability Indication Option (6CIO) is a Neighbor Discovery option (Figure 5) with Type=36, Length=1, and a G bit at position 15 (the 31st bit of the option) indicating GHC capability. All unassigned bits MUST be sent as zero and MUST be ignored on reception.
section: "3.3"
