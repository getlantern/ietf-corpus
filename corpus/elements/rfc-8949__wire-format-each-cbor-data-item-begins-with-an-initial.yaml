document: rfc-8949
kind: wire-format
summary: Each CBOR data item begins with an initial byte whose high-order 3 bits encode the major type (0–7) and whose low-order 5 bits encode additional information. Together with any following bytes needed to construct the unsigned integer argument, this is called the 'head' of the data item.
