document: rfc-7959
kind: design-rationale
summary: Block sizes are restricted to powers of two between 16 and 1024 bytes (SZX 0–6) to keep implementation as simple as possible and reduce code size on constrained nodes. The value 7 (2048 bytes) is reserved rather than permitted, keeping the range small.
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
