document: rfc-6016
kind: security-consideration
summary: A PE SHOULD support mechanisms to rate-limit the fraction of its CPU and memory resources consumed by RSVP messages from any single CE or customer, to prevent a denial-of-service attack where a malicious customer overwhelms the PE with excessive RSVP signaling.
section: "10"
rfc2119_level: SHOULD
topics:
    - security
    - qos
