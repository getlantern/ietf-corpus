document: rfc-9635
kind: protocol-element
summary: 'A GNAP grant request JSON object contains: access_token (REQUIRED if requesting API access), subject (REQUIRED if requesting subject information), client (REQUIRED, identifies the client instance and its key), user (OPTIONAL, identifies the end user), and interact (REQUIRED if interaction is supported). Extensions may add fields via the GNAP Grant Request Parameters registry.'
section: "2"
