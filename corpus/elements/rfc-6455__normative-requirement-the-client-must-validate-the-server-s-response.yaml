document: rfc-6455
kind: normative-requirement
summary: 'The client MUST validate the server''s response: status code must be 101, Upgrade header must contain ''websocket'', Connection must contain ''Upgrade'', and Sec-WebSocket-Accept must match the expected base64-SHA-1 value. Any mismatch requires failing the WebSocket connection.'
section: "4.1"
rfc2119_level: MUST
topics:
    - websocket
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
