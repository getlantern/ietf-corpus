document: rfc-5763
kind: normative-requirement
summary: When making anonymous calls, the content of the subjectAltName attribute inside the certificate MUST NOT contain information that allows correlation or identification of the user. A new self-signed certificate SHOULD be used for each call to prevent call correlation.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - privacy
    - tls
    - sip
    - security
