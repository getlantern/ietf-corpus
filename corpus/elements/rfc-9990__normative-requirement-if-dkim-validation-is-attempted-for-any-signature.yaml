document: rfc-9990
kind: normative-requirement
summary: 'If DKIM validation is attempted for any signature, those results MUST be included in the aggregate report. A report SHOULD contain no more than 100 DKIM signatures per ''row'', listed in decreasing priority: strict-aligned pass, relaxed-aligned pass, other passing, then failing.'
section: 3.1.1.11
rfc2119_level: MUST
topics:
