document: rfc-1144
kind: design-rationale
summary: The connection ID is limited to one byte (256 maximum simultaneous connections) because in practice no more than sixteen connection states were observed to be needed even on a busy 64-port terminal multiplexer. This simplification allows the IP protocol field in UNCOMPRESSED_TCP packets to double as the connection index without adding a separate field.
section: 3.2.2
topics:
