document: rfc-5838
kind: normative-requirement
summary: IPv6 MUST be enabled on an OSPFv3 link even if the link is not participating in any IPv6 AFs, because OSPFv3 runs on top of IPv6 and uses IPv6 link-local addresses for control packets.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - ip
