document: rfc-9303
kind: design-rationale
summary: The per-message OTK derivation chain (ITR-OTK → MS-OTK via KDF) enables the ITR to independently verify both the Map-Server's EID-Prefix authorization (via EID-AD signed with ITR-OTK) and the ETR's Map-Reply integrity (via PKT-AD signed with MS-OTK), using only the single locally stored ITR-OTK.
