document: rfc-5444
kind: protocol-element
summary: Addresses in an Address Block are decomposed into a shared Head, individual Mid portions, and a shared Tail (Head:Mid:Tail). This allows compact aggregation of addresses sharing common prefixes or suffixes, such as IPv6 addresses on the same interface.
section: "5.3"
topics:
    - routing
