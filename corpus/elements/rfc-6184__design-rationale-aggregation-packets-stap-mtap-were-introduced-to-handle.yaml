document: rfc-6184
kind: design-rationale
summary: Aggregation packets (STAP/MTAP) were introduced to handle the dramatic MTU size difference between wireline IP networks (~1500-byte Ethernet) and wireless systems (often ≤254 bytes preferred transmission units), allowing efficient packing of small NAL units without media transcoding at the boundary.
