document: rfc-8705
kind: protocol-element
summary: For token introspection (RFC 7662), the hash of the certificate to which the token is bound is conveyed as a top-level 'cnf' member with 'x5t#S256' in the introspection response JSON, allowing the protected resource to verify proof-of-possession without embedding the hash in a JWT.
section: "3.2"
topics:
