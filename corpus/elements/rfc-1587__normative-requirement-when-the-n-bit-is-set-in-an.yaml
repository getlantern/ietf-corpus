document: rfc-1587
kind: normative-requirement
summary: When the N-bit is set in an interface's options field, the E-bit must be cleared. A mismatch between the N-bit or E-bit in a received Hello packet and the locally configured values causes the Hello to be dropped and no adjacency to form.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
