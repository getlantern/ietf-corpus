document: rfc-3971
kind: protocol-element
summary: The CGA Option (Type 11) carries the CGA Parameters data structure (containing the node's public key and associated parameters as defined in RFC 3972) to allow receivers to verify that the sender owns the claimed IPv6 address. It includes Type, Length, Pad Length, Reserved, CGA Parameters, and variable-length Padding fields.
section: "5.1"
