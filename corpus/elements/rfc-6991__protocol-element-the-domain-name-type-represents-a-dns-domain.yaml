document: rfc-6991
kind: protocol-element
summary: The domain-name type represents a DNS domain name of 1..253 characters in US-ASCII encoding. Internationalized domain names MUST use A-labels per RFC 5890, and schema nodes using this type MUST document how and when names are resolved to IP addresses.
