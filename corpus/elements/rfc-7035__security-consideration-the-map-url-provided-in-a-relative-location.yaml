document: rfc-7035
kind: security-consideration
summary: The map URL provided in a relative location could inadvertently reveal Target location information. The coverage area of the map or parameters in the URL itself could disclose location when acquired by a Location Recipient, particularly combined with knowledge of the set of potential Targets.
section: "7"
topics:
    - security
    - privacy
