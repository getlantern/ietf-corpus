document: rfc-8685
kind: state-machine
summary: During OPEN procedure, a child PCE sets the P-flag in H-PCE-CAPABILITY TLV to request parent role. If the parent accepts, the H-PCE relationship is established; if neither entity sends the TLV, no H-PCE relationship is created. If both set P-flag, the session fails.
section: "4.1"
topics:
