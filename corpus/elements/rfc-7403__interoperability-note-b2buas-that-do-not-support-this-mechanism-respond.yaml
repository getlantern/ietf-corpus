document: rfc-7403
kind: interoperability-note
summary: B2BUAs that do not support this mechanism respond to a Max-Forwards 0 INVITE with 483 Too Many Hops, which is indistinguishable from the original SIP traceroute behavior defined in RFC 3261; the UAC will not receive a media-loopback session from such hops.
