document: rfc-3971
kind: wire-format
summary: 'The Timestamp Option (Type 13, fixed Length=2) carries a 64-bit unsigned integer: the first 48 bits encode integer seconds since 1970-01-01 00:00 UTC; the remaining 16 bits encode 1/65536 fractions of a second. Preceded by a 48-bit Reserved field.'
