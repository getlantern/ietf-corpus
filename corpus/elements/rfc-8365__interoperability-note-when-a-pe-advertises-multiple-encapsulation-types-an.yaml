document: rfc-8365
kind: interoperability-note
summary: When a PE advertises multiple encapsulation types, an ingress NVE can send a frame to an egress NVE only if the intersection of their supported encapsulation sets is non-empty; it is the ingress NVE's discretion which encapsulation to use from that intersection.
section: "6"
topics:
    - routing
