document: rfc-3922
kind: normative-requirement
summary: An XMPP-CPIM gateway MUST NOT map to an XMPP presence stanza a 'Message/CPIM' object whose encapsulated MIME Content-type is other than 'application/pidf+xml' (except for multi-part MIME objects as specified in XMPP-E2E).
section: "5.2"
rfc2119_level: MUST NOT
