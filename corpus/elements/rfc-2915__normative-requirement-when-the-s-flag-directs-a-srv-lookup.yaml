document: rfc-2915
kind: normative-requirement
summary: When the 'S' flag directs a SRV lookup, the domain-name from the NAPTR record MUST be used in SRV queries with NO transformations. NAPTR applications using SRV MUST NOT attempt to interpret or restructure these domain names according to the SRV specification's query domain conventions.
section: "5"
rfc2119_level: MUST
topics:
    - dns
