document: rfc-9061
kind: wire-format
summary: The encryption algorithm identifier (encr-alg-t) is a uint16 value drawn from the IANA IKEv2 Transform Type 1 registry. Acceptable values MUST follow the requirement levels in RFC 8221 (ESP/AH) and RFC 8247 (IKEv2). The integrity algorithm identifier (intr-alg-t) is similarly a uint16 from the IANA IKEv2 Transform Type 3 registry.
section: 5.1.2
topics:
    - ipsec
    - crypto
    - registry
