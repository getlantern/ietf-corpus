document: rfc-3945
kind: design-rationale
summary: LMP is specified independently of the GMPLS signaling specification because it operates as a local protocol between data-plane adjacent nodes. This independence allows LMP to be used in non-GMPLS contexts with other signaling protocols.
section: "1.3"
