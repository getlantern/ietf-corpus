document: rfc-5452
kind: interoperability-note
summary: Birthday attacks are possible when an attacker forces a resolver to have multiple identical outstanding queries (same QNAME, QTYPE, QCLASS) to the same authoritative server simultaneously; each forged packet then has a proportionally higher chance of matching, rising linearly with the number of outstanding identical queries.
section: "5"
topics:
    - dns
    - security
