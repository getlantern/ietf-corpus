document: rfc-9260
kind: normative-requirement
summary: INIT, INIT ACK, and SHUTDOWN COMPLETE chunks MUST NOT be bundled with any other chunk in a single SCTP packet. All other chunks MAY be bundled provided the resulting packet does not exceed the PMTU.
section: "3"
rfc2119_level: MUST NOT
topics:
    - sctp
