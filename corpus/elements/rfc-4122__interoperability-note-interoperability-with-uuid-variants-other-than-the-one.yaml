document: rfc-4122
kind: interoperability-note
summary: Interoperability with UUID variants other than the one defined in this document (variant bits '10' in octet 8) is not guaranteed and is not likely to be an issue in practice. Each variant defines an independent interpretation of all other UUID bits.
section: 4.1.1
