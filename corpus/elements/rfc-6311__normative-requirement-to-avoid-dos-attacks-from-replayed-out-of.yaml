document: rfc-6311
kind: normative-requirement
summary: To avoid DoS attacks from replayed out-of-window messages, the peer MUST NOT initiate counter synchronization for any particular IKE SA more than once per failover event.
section: "7"
rfc2119_level: MUST NOT
