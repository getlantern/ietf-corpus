document: rfc-6562
kind: normative-requirement
summary: For scenarios where VBR is considered unsafe, a CBR codec SHOULD be negotiated and used instead, or the VBR codec SHOULD be operated in a CBR mode. If the codec does not support CBR, RTP padding SHOULD be used to reduce the information leak to an insignificant level.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
