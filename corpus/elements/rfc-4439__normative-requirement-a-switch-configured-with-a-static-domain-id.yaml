document: rfc-4439
kind: normative-requirement
summary: A switch configured with a static Domain_ID shall reply with an SW_RJT having Reason Code Explanation 'E_Port is Isolated' and shall isolate the receiving E_Port upon receiving an EFP, BF, RCF, DIA, or RDI SW_ILS.
section: "6.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
