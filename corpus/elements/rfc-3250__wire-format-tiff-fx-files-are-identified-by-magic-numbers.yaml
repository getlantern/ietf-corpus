document: rfc-3250
kind: wire-format
summary: 'TIFF-FX files are identified by magic numbers: little-endian (II) files begin with 49 49 2A 00 hex; big-endian (MM) files begin with 4D 4D 00 2A hex. The file extension is .TFX and the Macintosh File Type Code is TFX.'
