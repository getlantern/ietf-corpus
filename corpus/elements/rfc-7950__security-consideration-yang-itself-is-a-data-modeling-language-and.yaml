document: rfc-7950
kind: security-consideration
summary: YANG itself is a data modeling language and does not define protocol-level security mechanisms. Security for YANG-based management protocols (e.g., NETCONF) must be provided by those protocols. The security considerations of RFC 6241 (NETCONF) apply when YANG is used with NETCONF.
section: "17"
topics:
    - yang
    - security
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
