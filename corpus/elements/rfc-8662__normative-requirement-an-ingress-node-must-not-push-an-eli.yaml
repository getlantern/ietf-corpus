document: rfc-8662
kind: normative-requirement
summary: An ingress node MUST NOT push an ELI/EL associated with a Binding SID unless that Binding SID has the entropy label capability set, preventing misforwarding when the tail-end LSP is not EL-capable.
section: "6"
rfc2119_level: MUST NOT
topics:
    - routing
