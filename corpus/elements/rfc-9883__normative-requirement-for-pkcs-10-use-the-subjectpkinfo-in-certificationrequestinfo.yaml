document: rfc-9883
kind: normative-requirement
summary: 'For PKCS#10 use: the `subjectPKInfo` in `certificationRequestInfo` MUST contain the public key for the key establishment algorithm, and the attributes MUST include the `privateKeyPossessionStatement` attribute. The `signatureAlgorithm` MUST be one that can be validated with the public key in the signature certificate.'
section: "4"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
