document: rfc-2640
kind: normative-requirement
summary: UCS Transformation Format 8 (UTF-8) SHALL be used as the transfer encoding for the international character set. Prior to pathname exchange, pathnames SHOULD be converted to ISO/IEC 10646 format and UTF-8 encoded.
section: "2.2"
rfc2119_level: SHOULD
