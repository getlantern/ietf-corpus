document: rfc-2478
kind: interoperability-note
summary: A GSS-API implementation that does not support the SPNEGO negotiation mechanism will return GSS_S_BAD_MECH upon receiving a negotiation token, behaving as if a specific but unsupported basic security mechanism had been requested. This provides defined failure semantics for mixed deployments.
section: "2.2"
topics:
    - crypto
    - security
