document: rfc-4028
kind: normative-requirement
summary: A UAC that supports the session timer MUST include a Supported header field with option tag 'timer' in each request (except ACK), even if it is not requesting use of the session timer for that session.
section: "7.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
