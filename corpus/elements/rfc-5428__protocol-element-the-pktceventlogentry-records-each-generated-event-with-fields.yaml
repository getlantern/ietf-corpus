document: rfc-5428
kind: protocol-element
summary: 'The pktcEventLogEntry records each generated event with fields including: index (chronological), time (DateAndTime), organization (IANA enterprise number), identifier, text (up to 127 octets), endpoint name (FQDN/IP format, up to 255 octets), type (actions taken), target info, correlation ID, and additional info. Log entries cannot be individually deleted.'
