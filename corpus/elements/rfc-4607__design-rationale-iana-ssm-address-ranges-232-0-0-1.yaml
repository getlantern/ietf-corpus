document: rfc-4607
kind: design-rationale
summary: IANA SSM address ranges (232.0.0.1-255 and FF3x::4000:0001-7FFF:FFFF) are reserved for services requiring a well-known SSM destination address. Outside this range, IANA SHALL NOT allocate SSM addresses to particular entities, preserving the ability for hosts to autonomously self-allocate from a large flat space.
section: "9"
topics:
    - multicast
    - registry
