document: rfc-2574
kind: protocol-element
summary: 'A USM user is defined by: userName, securityName (model-independent), authProtocol (HMAC-MD5-96 or HMAC-SHA-96), authKey (private, not SNMP-accessible), privProtocol (CBC-DES), and privKey (private, not SNMP-accessible). Keys are localized per authoritative SNMP engine and updated only via authKeyChange/privKeyChange objects.'
section: "2.1"
topics:
