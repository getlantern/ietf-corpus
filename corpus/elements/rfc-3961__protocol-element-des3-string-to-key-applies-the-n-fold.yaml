document: rfc-3961
kind: protocol-element
summary: DES3 string-to-key applies the n-fold algorithm (168-fold) to the concatenation of password and salt, invokes random-to-key to produce a temporary key, then applies DK(tmpKey, KerberosConstant) where KerberosConstant is the 8-byte ASCII encoding of 'kerberos' (0x6b65726265726f73).
section: 6.3.1
topics:
    - crypto
