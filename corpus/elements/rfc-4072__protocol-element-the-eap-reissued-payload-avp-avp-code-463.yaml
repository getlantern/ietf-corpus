document: rfc-4072
kind: protocol-element
summary: The EAP-Reissued-Payload AVP (AVP Code 463, type OctetString) carries the previous EAP Request when the server signals a non-fatal error via DIAMETER_MULTI_ROUND_AUTH without an EAP-Payload, enabling RADIUS translation to include the reissued packet.
