document: rfc-9066
kind: normative-requirement
summary: If the Call Home DOTS server does not receive any traffic from the peer Call Home DOTS client long enough to exhaust the maximum 'missing-hb-allowed' threshold, it concludes the session is disconnected and MUST try to establish a new DOTS signal channel session, preferably by resuming the (D)TLS session.
section: 5.2.1
rfc2119_level: MUST
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
