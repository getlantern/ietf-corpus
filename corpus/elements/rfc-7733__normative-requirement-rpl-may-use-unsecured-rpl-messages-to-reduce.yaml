document: rfc-7733
kind: normative-requirement
summary: RPL MAY use unsecured RPL messages to reduce message size, but if any single node uses unsecured RPL messages, link-layer security MUST be used on all nodes. All RPL messages MUST be secured using RPL message security, link-layer security, or both.
section: 4.1.8
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
