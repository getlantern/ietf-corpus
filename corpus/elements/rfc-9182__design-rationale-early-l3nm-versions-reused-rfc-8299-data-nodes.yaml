document: rfc-9182
kind: design-rationale
summary: Early L3NM versions reused RFC 8299 data nodes to avoid duplication, but that approach was abandoned in favor of the shared 'ietf-vpn-common' module (RFC 9181) because reusing L3SM nodes was interpreted as implying that L3NM deployment depends on L3SM, which is not intended.
