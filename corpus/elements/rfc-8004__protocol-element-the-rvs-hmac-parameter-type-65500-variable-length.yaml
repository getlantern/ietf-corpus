document: rfc-8004
kind: protocol-element
summary: The RVS_HMAC parameter (type 65500, variable length) is identical to the HIP HMAC parameter except for its type code, which positions it after the FROM parameter. It is keyed with the HIP-lg or HIP-gl integrity key established at rendezvous registration.
