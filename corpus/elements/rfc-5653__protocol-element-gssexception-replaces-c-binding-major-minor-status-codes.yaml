document: rfc-5653
kind: protocol-element
summary: GSSException replaces C-binding major/minor status codes. It carries one of 22 defined major status codes (BAD_BINDINGS=1 through GAP_TOKEN=22) and an optional mechanism-specific minor code. DUPLICATE_TOKEN, OLD_TOKEN, UNSEQ_TOKEN, and GAP_TOKEN are fatal only during context establishment; during per-message calls they appear as supplementary info in MessageProp.
section: 5.12.1
topics:
    - security
