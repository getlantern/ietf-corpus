document: rfc-5340
kind: normative-requirement
summary: On all OSPF interfaces except virtual links, OSPF packets MUST be sent using the interface's associated link-local unicast address as the source address. On virtual links, a global scope IPv6 address MUST be used as the source address for OSPF protocol packets.
section: "2.5"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
