document: rfc-8428
kind: registry
summary: IANA has created the 'SenML Units' registry (under the 'Sensor Measurement Lists (SenML)' top-level registry) with over 60 initial unit symbols covering SI base and derived units, ratios, percentages, and domain-specific quantities. New entries require Expert Review. Only one symbol per measurement type is allowed; SI units are preferred.
