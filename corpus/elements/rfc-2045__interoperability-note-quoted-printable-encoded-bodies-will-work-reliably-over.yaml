document: rfc-2045
kind: interoperability-note
summary: 'Quoted-Printable encoded bodies will work reliably over most mail gateways but may not work perfectly over gateways involving EBCDIC translation. For higher reliability through EBCDIC gateways, additionally quoting ''!"#$@[\]^`{|}~'' per rule #1 is recommended; base64 offers yet higher confidence.'
section: "6.7"
topics:
    - email
