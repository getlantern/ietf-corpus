document: rfc-3388
kind: normative-requirement
summary: The 'mid' value in an SDP answer MUST be the same as the 'mid' value in the corresponding offer. Subsequent offers (e.g., re-INVITE) SHOULD use the same 'mid' value for already existing media streams.
section: "8.1"
rfc2119_level: MUST
topics:
    - realtime
    - sip
