document: rfc-7989
kind: normative-requirement
summary: The UAC initiating a session MUST create a new, previously unused UUID and transmit it; likewise, the UAS MUST create a new, previously unused UUID and transmit it to the UAC. These two distinct UUIDs together form the session identifier {A,B}, which is symmetric ({A,B} equals {B,A}).
section: "4.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
