document: rfc-2038
kind: normative-requirement
summary: When multiple audio frames are encapsulated in one RTP packet, an integral number of audio frames MUST be contained and the Frag_offset header SHALL be set to 0. The audio fragmentation indicator header (Section 3.5) SHALL be present for all MPEG1/2 Audio payload types.
section: "3.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
