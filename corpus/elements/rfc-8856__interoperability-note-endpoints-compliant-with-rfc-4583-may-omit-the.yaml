document: rfc-8856
kind: interoperability-note
summary: Endpoints compliant with RFC 4583 may omit the 'floorctrl' attribute. For backward compatibility, if the attribute is absent, the offerer acts as floor control client and the answerer acts as floor control server.
section: "5.1"
topics:
