document: rfc-2684
kind: wire-format
summary: 'Bridged 802.6 LLC Encapsulation payload: LLC 0xAA-AA-03 + OUI 0x00-80-C2 + PID 0x00-0B + Common PDU Header (Reserved, BEtag, BAsize) + MAC destination address + remainder + Common PDU Trailer. CRC-32 presence is indicated by the CIB bit in the MAC frame header, so the same PID is used either way.'
section: "5.2"
