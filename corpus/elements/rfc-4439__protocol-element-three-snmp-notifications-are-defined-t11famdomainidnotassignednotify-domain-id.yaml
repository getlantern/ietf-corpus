document: rfc-4439
kind: protocol-element
summary: 'Three SNMP notifications are defined: t11FamDomainIdNotAssignedNotify (Domain_ID not obtained, E_Ports isolated), t11FamNewPrincipalSwitchNotify (sent after twice the F_S_TOV timer on Principal Switch election), and t11FamFabricChangeNotify (sent on BF or RCF sent or received; suppressed if t11FamNewPrincipalSwitchNotify is sent for the same event).'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
