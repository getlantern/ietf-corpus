document: rfc-9176
kind: normative-requirement
summary: An RD implementing this specification MUST implement simple registration. Registrants MUST be able to serve a GET request to /.well-known/core after having requested simple registration. The RD MUST delete simple registrations after their lifetime expires.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
