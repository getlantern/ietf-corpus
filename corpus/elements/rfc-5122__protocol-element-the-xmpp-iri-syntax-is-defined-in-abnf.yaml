document: rfc-5122
kind: protocol-element
summary: 'The XMPP IRI syntax is defined in ABNF as: xmppiri = "xmpp" ":" ihierxmpp ["?" iquerycomp] ["#" ifragment], where ihierxmpp supports both authority-path (iauthpath) and direct path (ipathxmpp) forms. The path encodes an XMPP address as [inodeid "@"] ihost ["/" iresid].'
section: "2.2"
