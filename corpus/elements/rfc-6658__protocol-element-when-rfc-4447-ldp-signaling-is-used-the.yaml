document: rfc-6658
kind: protocol-element
summary: When RFC 4447 LDP signaling is used, the PE with the higher-value IP address uses PacketPWEthA as the Ethernet source/destination, while the LDP peer with the lower-value IP address uses PacketPWEthB. This deterministic assignment avoids the need to configure addresses manually when signaling is available.
section: "5"
topics:
