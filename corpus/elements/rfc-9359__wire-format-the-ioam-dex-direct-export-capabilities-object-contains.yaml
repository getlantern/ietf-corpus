summary: 'The IOAM DEX (Direct Export) Capabilities Object contains: 24-bit IOAM-Trace-Type (per RFC 9326 Section 3.2), 8-bit Reserved, 16-bit Namespace-ID, and 16-bit Reserved. Its presence indicates the IOAM direct exporting function is enabled at the transit node.'
