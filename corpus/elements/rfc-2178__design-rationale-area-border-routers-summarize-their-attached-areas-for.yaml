document: rfc-2178
kind: design-rationale
summary: Area border routers summarize their attached areas for the backbone using summary-LSAs rather than flooding full topology, creating an information-hiding hierarchy. This star topology (backbone as hub, non-backbone areas as spokes) reduces database size and routing traffic significantly.
section: "3.2"
topics:
