document: rfc-8899
kind: normative-requirement
summary: DPLPMTUD SHOULD only be performed at one layer between a pair of endpoints; an upper PL or application should avoid using DPLPMTUD when already enabled in a lower layer. A PL MUST adjust the MPS indicated by DPLPMTUD to account for any additional overhead introduced by the PL.
section: "5"
rfc2119_level: MUST
topics:
    - udp
    - sctp
    - quic
