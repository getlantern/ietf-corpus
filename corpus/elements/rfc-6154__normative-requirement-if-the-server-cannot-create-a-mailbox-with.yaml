document: rfc-6154
kind: normative-requirement
summary: If the server cannot create a mailbox with the designated special use, it MUST NOT create the mailbox and MUST respond to the CREATE command with a tagged NO response. If the failure is related to the special-use attribute, the server SHOULD include the 'USEATTR' response code in the tagged response.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
