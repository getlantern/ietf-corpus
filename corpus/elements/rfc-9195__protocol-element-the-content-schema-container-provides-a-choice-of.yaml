summary: 'The content-schema container provides a choice of three methods for specifying the YANG modules defining the instance data: simplified-inline (leaf-list of module names with optional revision dates), inline (anydata carrying ietf-yang-library conformant data), or uri (same-schema-as-file leaf referencing another instance data file).'
