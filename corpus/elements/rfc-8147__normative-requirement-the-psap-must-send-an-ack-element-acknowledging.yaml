document: rfc-8147
kind: normative-requirement
summary: The PSAP MUST send an <ack> element acknowledging receipt of every unsolicited MSD sent by the IVS (e.g., in the initial INVITE). The <ack> element MUST include a 'received' boolean indicating whether the PSAP considers the MSD successfully received.
section: 9.1.1
rfc2119_level: MUST
topics:
    - sip
    - security
