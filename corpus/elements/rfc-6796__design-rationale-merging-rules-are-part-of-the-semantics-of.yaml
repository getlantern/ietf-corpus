document: rfc-6796
kind: design-rationale
summary: Merging rules are part of the semantics of each session policy XML element, so it is not possible to build an entity that can mechanically merge two session policy documents without understanding the semantics of all elements. This design choice places merging responsibility on semantics-aware UAs.
section: "1"
topics:
    - sip
    - realtime
