document: rfc-3927
kind: protocol-element
summary: IPv4 Link-Local addresses are drawn from the 169.254/16 prefix, specifically 169.254.1.0 to 169.254.254.255. The first and last 256 addresses (169.254.0.x and 169.254.255.x) are reserved for future use and must not be selected by dynamic configuration. This gives 65024 usable addresses.
section: "2.1"
topics:
