document: rfc-9580
kind: normative-requirement
summary: An implementation MUST generate a version 6 signature when signing with a version 6 key, and MUST generate a version 4 signature when signing with a version 4 key. Implementations MUST NOT create version 3 signatures; they MAY accept version 3 signatures for backward compatibility.
section: "5.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
