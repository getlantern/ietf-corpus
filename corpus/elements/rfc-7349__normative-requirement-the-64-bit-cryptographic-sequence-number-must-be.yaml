document: rfc-7349
kind: normative-requirement
summary: The 64-bit Cryptographic Sequence Number MUST be incremented for every LDP Hello message sent, and upon reception the sequence number MUST be greater than the sequence number in the last accepted Hello from that neighbor; otherwise the message is treated as a replay and dropped.
section: "2.3"
rfc2119_level: MUST
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
