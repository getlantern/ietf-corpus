document: rfc-6120
kind: design-rationale
summary: XMPP uses persistent, long-lived XML streams over TCP rather than stateless request-response connections, enabling either party to push data at any time. This 'Availability for Concurrent Transactions' (ACT) model is intentionally distinct from REST, enabling near-real-time communication where knowledge of peer availability precedes message exchange.
section: "2.3"
topics:
