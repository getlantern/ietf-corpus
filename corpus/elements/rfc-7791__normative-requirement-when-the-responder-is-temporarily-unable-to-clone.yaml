document: rfc-7791
kind: normative-requirement
summary: When the responder is temporarily unable to clone the IKE SA (e.g., insufficient resources or the SA is being deleted), the responder SHOULD reject the request with the TEMPORARY_FAILURE notification. The initiator MAY retry after waiting.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
