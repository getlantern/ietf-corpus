document: rfc-9408
kind: protocol-element
summary: Service Attachment Points (SAPs) are abstractions of network reference points — typically the PE side of an Attachment Circuit, or the CE side for a provider-managed CE — where network services can be delivered to customers. A SAP can be bound to one or multiple ACs, and the same SAP may appear under multiple service types using the same identifier.
