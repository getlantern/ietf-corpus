document: rfc-8166
kind: normative-requirement
summary: A Requester MUST NOT send unacknowledged requests in excess of the Responder's currently granted credit limit. Exceeding the granted value may cause the RDMA layer to signal an error, possibly terminating the connection.
section: 3.3.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
