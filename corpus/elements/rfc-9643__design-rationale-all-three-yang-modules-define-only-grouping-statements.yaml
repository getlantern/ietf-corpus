document: rfc-9643
kind: design-rationale
summary: 'All three YANG modules define only ''grouping'' statements with no protocol-accessible nodes of their own. This maximizes reusability: the groupings are instantiated by importing modules (e.g., SSH, TLS, HTTP, NETCONF, RESTCONF client/server models), which themselves provide the actual protocol-accessible nodes.'
section: 2.1.4
topics:
    - yang
    - netconf
