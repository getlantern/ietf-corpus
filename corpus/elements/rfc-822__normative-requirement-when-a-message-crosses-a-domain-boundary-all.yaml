document: rfc-822
kind: normative-requirement
summary: When a message crosses a domain boundary, all addresses must be specified in full format ending with the top-level name-domain in the right-most field. Mail forwarding services are responsible for expanding abbreviated addresses to full form.
section: 6.2.2
rfc2119_level: MUST
topics:
    - email
