document: rfc-8660
kind: protocol-element
summary: 'SR FEC types for incoming label collision resolution are: (Prefix, Routing Instance, Topology, Algorithm); (next hop, outgoing interface); (number of adjacencies, list of next hops, list of outgoing interface IDs) for parallel adjacencies; (Endpoint, Color) for SR Policy; and (Mirror SID). Zero MUST be used for Topology and Algorithm fields when not defined by an MCC.'
section: "2.5"
topics:
