document: rfc-9314
kind: protocol-element
summary: BFD IP multihop sessions are modeled in 'ietf-bfd-ip-mh' as 'session-group' lists keyed by {source-addr, dest-addr}; each group may contain multiple operational 'sessions' for ECMP paths. The grouping adds 'tx-ttl' (outgoing hop count, default 255) and 'rx-ttl' (mandatory minimum allowed incoming hop count) leaves.
section: "2.7"
