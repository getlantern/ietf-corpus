document: rfc-5265
kind: protocol-element
summary: The Trusted Networks Configured (TNC) extension is a new skippable short-format MIPv4 extension included by an i-HA in a Registration Reply when the registration request source address belongs to a configured trusted subnet. Its presence is the mandatory signal that allows the MN to conclude it is connected to the internal network and safely stop using IPsec.
section: "3.4"
topics:
    - vpn
    - mobility
    - security
