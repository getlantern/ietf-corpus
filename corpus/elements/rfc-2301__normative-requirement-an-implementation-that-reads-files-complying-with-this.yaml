document: rfc-2301
kind: normative-requirement
summary: An implementation that reads files complying with this specification SHALL read multiple IFDs, enabling multi-page fax document support. A standard Baseline TIFF reader is not required to read beyond the first IFD, but a TIFF-FX reader must.
section: 2.1.1
rfc2119_level: REQUIRED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
