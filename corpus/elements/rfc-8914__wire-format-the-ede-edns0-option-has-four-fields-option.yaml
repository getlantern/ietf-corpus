document: rfc-8914
kind: wire-format
summary: 'The EDE EDNS0 option has four fields: OPTION-CODE (2 octets, value 15), OPTION-LENGTH (2 octets, length of payload after OPTION-LENGTH), INFO-CODE (16 bits, network MSB byte order, indexes the Extended DNS Errors registry), and EXTRA-TEXT (variable-length UTF-8 encoded text, may be zero-length).'
