document: rfc-5654
kind: interoperability-note
summary: MPLS-TP MUST support transport paths through multiple homogeneous domains and SHOULD support paths through non-homogeneous domains. Any new MPLS-TP functionality must be agreed within IETF through the IETF consensus process per RFC 4929.
section: "2.1"
topics:
    - mpls
    - routing
