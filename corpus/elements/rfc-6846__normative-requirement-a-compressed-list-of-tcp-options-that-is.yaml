document: rfc-6846
kind: normative-requirement
summary: A compressed list of TCP options that is part of the dynamic chain (IR or IR-DYN packets) must have all list items present; all X-bits in the XI list MUST be set, ensuring the full options context is transmitted during initialization.
section: 6.3.5
rfc2119_level: MUST
topics:
