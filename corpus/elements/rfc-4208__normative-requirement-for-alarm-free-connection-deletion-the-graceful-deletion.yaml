document: rfc-4208
kind: normative-requirement
summary: 'For alarm-free connection deletion, the graceful deletion procedure SHOULD be followed: an ADMIN_STATUS object MUST be sent in a Path or Resv message along the connection''s path to inform all nodes of the intended deletion prior to the actual deletion.'
section: "6.1"
rfc2119_level: MUST
