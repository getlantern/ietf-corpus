summary: 'The WA Method field defines four values: 0 = unspecified/any (implied when sub-TLV is absent), 1 = First-Fit (lowest-index available wavelength), 2 = Random, 3 = Least-Loaded (largest residual capacity, for multi-fiber networks). Values 4–127 are unassigned.'
