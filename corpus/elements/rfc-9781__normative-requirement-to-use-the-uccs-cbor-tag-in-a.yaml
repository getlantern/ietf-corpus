document: rfc-9781
kind: normative-requirement
summary: To use the UCCS CBOR tag in a scope outside RATS, the secure channel and/or the application protocol MUST specify the roles of the endpoints in a fashion that the security properties of conveying UCCS via a Secure Channel between the roles are well-defined.
section: "7"
rfc2119_level: MUST
topics:
