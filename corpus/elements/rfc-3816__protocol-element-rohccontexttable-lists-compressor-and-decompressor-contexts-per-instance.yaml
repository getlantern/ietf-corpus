summary: rohcContextTable lists compressor and decompressor contexts per instance, indexed by rohcChannelID and rohcContextCID (0..16383). It tracks CID state, used profile, decompressor depth, storage time, activation/deactivation times, and optional compression ratio and packet size statistics.
