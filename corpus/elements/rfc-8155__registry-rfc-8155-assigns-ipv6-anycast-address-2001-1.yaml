summary: RFC 8155 assigns IPv6 anycast address 2001:1::2/128 ('Traversal Using Relays around NAT Anycast') in the IANA IPv6 Special-Purpose Address Registry (RFC 6890). The address is globally routable, forwardable, and has no termination date.
