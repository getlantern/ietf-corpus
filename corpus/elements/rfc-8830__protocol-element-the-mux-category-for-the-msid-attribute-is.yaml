document: rfc-8830
kind: protocol-element
summary: The Mux Category for the 'msid' attribute is NORMAL (per RFC 8859), meaning the process of deciding on 'msid' attributes does not need to consider whether RTP streams are bundled; it depends on the association of RTP streams with media descriptions, not with RTP transports.
