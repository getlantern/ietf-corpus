document: rfc-9445
kind: interoperability-note
summary: In deployments where the NAS acts as DHCPv6 relay agent, RADIUS CoA-Requests carrying updated DHCPv6-Options (e.g., changed encrypted DNS resolver information) trigger DHCPv6 Reconfigure messages to clients via the procedure in RFC 6977.
