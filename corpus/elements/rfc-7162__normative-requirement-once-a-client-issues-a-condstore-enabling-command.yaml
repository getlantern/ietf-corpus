document: rfc-7162
kind: normative-requirement
summary: Once a client issues a CONDSTORE enabling command, the server MUST include mod-sequence data in all subsequent untagged FETCH responses for the duration of the connection, whether caused by a regular STORE, a conditional STORE, or an external agent.
section: "3.1"
rfc2119_level: MUST
topics:
    - email
