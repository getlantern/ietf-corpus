document: rfc-9129
kind: design-rationale
summary: A single 'ietf-ospf' YANG module serves both OSPFv2 and OSPFv3. The mandatory 'version' field selects the protocol version, and the data model varies accordingly to accommodate differences between the two versions, avoiding separate modules.
