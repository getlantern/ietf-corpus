document: rfc-4761
kind: security-consideration
summary: Compromise of the BGP control plane can divert VPLS traffic to the wrong VPLS or blackhole it. TCP MD5 (RFC 2385) helps authenticate BGP messages; inter-AS BGP sessions between ASBRs, PEs, and Route Reflectors must also be protected in multi-AS deployments.
section: "6"
topics:
