document: rfc-7459
kind: interoperability-note
summary: RFC 5491 defines a fixed confidence of 95% for PIDF-LO, while this document introduces a 'confidence' element permitting other values. Recipients that ignore the confidence element are no worse off than if the server had ignored confidence, but misinterpretation (e.g., by systems reducing confidence) is a noted risk.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
