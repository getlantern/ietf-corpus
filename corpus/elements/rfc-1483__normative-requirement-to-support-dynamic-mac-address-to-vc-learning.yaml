document: rfc-1483
kind: normative-requirement
summary: To support dynamic MAC-address-to-VC learning, a bridged PDU SHALL conform to the LLC encapsulation described in section 4, enabling the receiving ATM interface to inspect the MAC destination address and associate it with the originating ATM station.
section: "6"
rfc2119_level: MUST
