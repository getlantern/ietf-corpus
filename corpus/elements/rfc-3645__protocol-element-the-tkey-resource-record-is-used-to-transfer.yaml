document: rfc-3645
kind: protocol-element
summary: The TKEY resource record is used to transfer GSS tokens between client and server. The TKEY record carries Algorithm Name = 'gss-tsig', Mode = 3 (GSS-API negotiation), Key Size = size of output_token in octets, and Key Data = output_token.
