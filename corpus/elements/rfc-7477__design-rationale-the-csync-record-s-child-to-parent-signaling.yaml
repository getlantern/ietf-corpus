document: rfc-7477
kind: design-rationale
summary: The CSYNC record's child-to-parent signaling model was chosen to ease the burden on child zone operators who struggle to keep delegation records (NS, A, AAAA glue) in sync with the parent, a problem caused by operator complexity and the lack of an automated update mechanism.
