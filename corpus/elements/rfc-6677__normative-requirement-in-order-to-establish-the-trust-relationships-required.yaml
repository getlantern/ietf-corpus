document: rfc-6677
kind: normative-requirement
summary: 'In order to establish the trust relationships required for channel binding, an EAP method MUST provide: mutual authentication between peer and server; derivation of keying material including an integrity-protection key known only to peer and EAP server (not the authenticator); and transmission of channel-binding request and result over integrity-protected channels in both directions.'
section: "9.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
