kind: protocol-element
summary: MacAddress is a textual convention defined as OCTET STRING (SIZE 6) representing a 6-octet MAC address in 'canonical' order (least significant bit first) as defined by IEEE 802.1a. 16-bit addresses are represented by setting the upper 4 octets to zero.
