document: rfc-9354
kind: normative-requirement
summary: For privacy reasons, the IID derived from the MAC address SHOULD only be used for link-local address configuration. A PLC host SHOULD use the IID derived from the short link-layer address for public network communication to avoid exposing the MAC address.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - ip
    - privacy
    - v6ops
