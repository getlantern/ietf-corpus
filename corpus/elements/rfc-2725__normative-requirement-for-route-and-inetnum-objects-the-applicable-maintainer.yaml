document: rfc-2725
kind: normative-requirement
summary: For route and inetnum objects, the applicable maintainer for authorization is taken from mnt-routes attributes if present; only in the absence of mnt-routes are mnt-by attributes used for that object.
section: "9.9"
rfc2119_level: MUST
