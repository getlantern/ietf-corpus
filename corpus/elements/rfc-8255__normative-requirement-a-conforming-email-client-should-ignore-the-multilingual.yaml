document: rfc-8255
kind: normative-requirement
summary: A conforming email client SHOULD ignore the multilingual preface and select the best-matching language part for the user's preferred language. The matching schemes of RFC 4647 are RECOMMENDED as a starting point. If no language match exists, the client SHOULD select the language-independent part if present, otherwise the first language part after the preface.
section: "4"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
