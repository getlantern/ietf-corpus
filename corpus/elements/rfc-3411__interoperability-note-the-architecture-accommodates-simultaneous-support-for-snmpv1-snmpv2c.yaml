document: rfc-3411
kind: interoperability-note
summary: The architecture accommodates simultaneous support for SNMPv1, SNMPv2c, and SNMPv3 within a single SNMP engine via multiple Message Processing Models in the Dispatcher. Coexistence between these versions and transition guidance are addressed in separate coexistence documents such as RFC 2576.
section: "2.3"
topics:
    - snmp
