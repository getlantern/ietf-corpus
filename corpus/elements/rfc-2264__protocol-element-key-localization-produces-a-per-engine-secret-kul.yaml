document: rfc-2264
kind: protocol-element
summary: Key localization produces a per-engine secret Kul = H(Ku || snmpEngineID || Ku), where Ku is derived from the user's password via a password-to-key algorithm and H is the hash function of the user's authentication protocol (MD5 or SHA). This ensures different secrets at each authoritative SNMP engine even when a user uses a single password.
section: "2.6"
topics:
    - snmp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
