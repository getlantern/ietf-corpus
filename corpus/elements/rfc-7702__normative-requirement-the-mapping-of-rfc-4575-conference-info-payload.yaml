document: rfc-7702
kind: normative-requirement
summary: 'The mapping of RFC 4575 conference-info payload elements to XMPP participant list elements MUST follow the defined table: <conference-info/> ''entity'' maps to room JID, <subject/> to room subject, <user/> ''entity'' to occupant JID, <display-text/> to participant nickname, and <user/> ''associated-aors'' to user full JID.'
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
