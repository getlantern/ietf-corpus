document: rfc-3758
kind: interoperability-note
summary: The PR-SCTP receiver side can support any PR-SCTP service definition used by the sender, even if the receiver's sending side does not implement that service. The receiver need only correctly handle the Forward-TSN-Supported parameter and FORWARD TSN chunks.
section: "3.6"
topics:
    - sctp
