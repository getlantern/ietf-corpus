document: rfc-5925
kind: normative-requirement
summary: TCP implementations that support TCP MD5 MUST support TCP-AO. A system supporting both MUST use TCP-AO unless not supported by its peer, at which point it MAY use TCP MD5. A TCP implementation MUST NOT use both TCP-AO and TCP MD5 for the same connection.
section: "8"
rfc2119_level: MUST
topics:
    - tcp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
