document: rfc-5196
kind: protocol-element
summary: 'The <actor> element indicates the type of entity at the service URI: <principal> (direct communication with the person), <attendant> (intermediary), <msg-taker> (message-taking automaton or person), or <information> (information provider). Uses <supported> and <notsupported> containers.'
