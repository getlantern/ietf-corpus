document: rfc-5357
kind: normative-requirement
summary: In TWAMP, the Timeout field in Request-TW-Session defines the interval that the Session-Reflector MUST wait after receiving a Stop-Sessions message; the Reflector MUST reflect test packets arriving within the Timeout interval and MUST NOT reflect packets arriving after the timeout.
section: "3.5"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
