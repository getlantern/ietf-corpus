document: rfc-4217
kind: design-rationale
summary: Only two PROT levels—'C' (Clear) and 'P' (Private)—are defined for FTP-TLS because TLS negotiation inherently encompasses and exceeds the distinctions between the 'S' (Safe/integrity-only) and 'E' (Confidential/privacy-only) levels; a single TLS session provides both integrity and confidentiality simultaneously.
section: "9"
topics:
