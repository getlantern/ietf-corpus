document: rfc-8838
kind: normative-requirement
summary: 'When trickling candidates, agents SHOULD respect the order of components as reflected by their component IDs: candidates for a given component SHOULD NOT be conveyed prior to candidates for a component with a lower ID number within the same foundation.'
