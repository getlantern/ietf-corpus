document: rfc-7513
kind: normative-requirement
summary: If a DHCP or data message would trigger creation of a new binding entry, the binding entry limit on the binding anchor MUST NOT be exceeded. This prevents malicious or malfunctioning nodes from overloading the BST.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - security
    - ip
