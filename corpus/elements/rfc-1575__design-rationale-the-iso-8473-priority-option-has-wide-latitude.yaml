document: rfc-1575
kind: design-rationale
summary: The ISO 8473 priority option has wide latitude in the specification and is rarely implemented in today's Internet. Using a priority value other than 0 (Normal) on echo-request packets may produce unexpected results; value 0 is recommended as safest until priority is more widely deployed.
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
