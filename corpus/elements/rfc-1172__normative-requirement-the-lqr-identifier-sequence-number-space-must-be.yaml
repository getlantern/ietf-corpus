document: rfc-1172
kind: normative-requirement
summary: The LQR Identifier sequence number space MUST be separate from that of all other LCP packets; transmitting an LCP Echo-Request must not increment Out-Identifier-Ctr. LQRs MUST be consistently transmitted with the same amount of padding so that In-Tx-Octets and In-Rx-Octets calculations remain correct.
section: "3.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
