document: rfc-8777
kind: protocol-element
summary: The AMTRELAY resource record (RRType 260) is defined for publishing AMT relays or discovery brokers for source-specific multicast channels. The reverse IP DNS zone for a sender's IP address is configured with AMTRELAY RRs to advertise relays that can receive and forward multicast from that sender.
section: "4.1"
topics:
    - dns
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
