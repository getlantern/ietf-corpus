document: rfc-9892
kind: normative-requirement
summary: When a packet matches both a DSCP in a Diffserv Sub-Data Item and a VID/PCP in an Ethernet Sub-Data Item, the TID associated with the matching VLAN/PCP MUST be used — Ethernet matching takes precedence.
section: 2.3.1
rfc2119_level: MUST
topics:
    - diffserv
    - qos
