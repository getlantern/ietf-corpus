document: rfc-9038
kind: protocol-element
summary: A server that includes "urn:ietf:params:xml:ns:epp:unhandled-namespaces-1.0" in its greeting signals that it supports unhandled namespace wrapping for both poll messages and general responses. A client that includes this URI in its login signals it will monitor responses for <extValue> elements carrying unhandled namespace data.
section: "4"
