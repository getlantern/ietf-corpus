document: rfc-7811
kind: design-rationale
summary: SPF (shortest-path first) is required for traversing the GADAG to compute blue and red next hops rather than an arbitrary traversal, because different traversal algorithms produce different next hops; SPF is mandated to ensure all routers produce consistent and interoperable MRT next hops.
section: 5.7.3
topics:
    - routing
