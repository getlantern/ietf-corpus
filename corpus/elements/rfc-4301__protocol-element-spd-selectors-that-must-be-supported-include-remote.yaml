document: rfc-4301
kind: protocol-element
summary: SPD selectors that MUST be supported include Remote IP Address(es), Local IP Address(es), Next Layer Protocol, Local Port/ICMP type+code/MH type, and Remote Port/ICMP type+code/MH type. Each selector supports ranges, lists of ranges, and the special values ANY and OPAQUE.
section: 4.4.1.1
