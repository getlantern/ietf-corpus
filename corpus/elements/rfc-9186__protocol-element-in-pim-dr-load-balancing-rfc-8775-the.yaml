document: rfc-9186
kind: protocol-element
summary: In PIM DR Load Balancing (RFC 8775), the head router administratively sets bfd.SessionState to Up in the MultipointHead session only if it is a GDR Candidate. For each GDR Candidate including the BFD Discriminator Option, the PIM DR MUST create a MultipointTail session.
section: "2.2"
topics:
    - multicast
    - routing
