document: rfc-3804
kind: protocol-element
summary: The VPIM address uses service-selector 'VPIM' and the vpim-mbox element, defined as an optional 'VPIM=' prefix followed by a global or local phone number with optional /EXT= and /DL= sub-address qualifiers. The '+' separator is supported as an alias for /EXT= for backward compatibility with VPIM v2.
section: 4.2.1
topics:
