document: rfc-4398
kind: interoperability-note
summary: The algorithm field in the CERT RR has the same meaning as in DNSKEY and RRSIG RRs, except that an algorithm value of zero indicates the algorithm is unknown to secure DNS — which may simply mean it has not been standardized for DNSSEC. The CERT RR reuses the DNS Security Algorithm Numbers registry and requires algorithm 0 remain reserved.
section: "2"
topics:
