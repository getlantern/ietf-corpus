document: rfc-4164
kind: protocol-element
summary: The IR-CR (IR packet for Context Replication) is a new IR packet type that initializes a new context by referencing a base context. It contains a combination of uncompressed and compressed information plus a reference to the base context, omitting fields being replicated.
