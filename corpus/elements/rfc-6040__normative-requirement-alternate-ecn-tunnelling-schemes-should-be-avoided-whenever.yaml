document: rfc-6040
kind: normative-requirement
summary: Alternate ECN tunnelling schemes SHOULD be avoided whenever possible, as the deployment burden of handling exceptional PHBs across all affected tunnel implementations is significant. A PHB definition need not mention ECN tunnelling if the default behaviour in this specification suffices.
section: "4"
rfc2119_level: SHOULD
