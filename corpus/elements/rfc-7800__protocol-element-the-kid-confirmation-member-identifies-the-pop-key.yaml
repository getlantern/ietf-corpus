document: rfc-7800
kind: protocol-element
summary: The "kid" confirmation member identifies the PoP key by a Key ID string instead of conveying the key directly. The recipient must be able to obtain the key using this identifier. Content of "kid" is application specific; a JWK Thumbprint value may be used.
