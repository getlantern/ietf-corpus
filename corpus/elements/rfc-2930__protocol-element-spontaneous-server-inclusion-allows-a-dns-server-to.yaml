document: rfc-2930
kind: protocol-element
summary: Spontaneous server inclusion allows a DNS server to include a TKEY RR in the additional information section of a response (e.g., to notify key deletion). This SHOULD only be done if the server knows the querier understands TKEY; there is no way to receive an acknowledgment, especially over UDP.
section: "5"
topics:
    - dns
