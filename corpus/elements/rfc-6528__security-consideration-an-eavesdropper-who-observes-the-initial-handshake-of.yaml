document: rfc-6528
kind: security-consideration
summary: An eavesdropper who observes the initial handshake of a connection learns its ISN state and can still launch guessing attacks by impersonating that connection; since the offset between a fake and real connection is roughly constant for the secret's lifetime, preventing capture of handshake packets is important.
section: "4"
topics:
    - tcp
    - security
