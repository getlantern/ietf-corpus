document: rfc-8659
kind: protocol-element
summary: The Issuer Critical Flag (bit 0 of the Flags octet, value 128) signals that a Property is critical. A CA MUST NOT issue certificates for any FQDN if the Relevant RRset contains a CAA critical Property for an unknown or unsupported Property Tag. This mechanism allows future CAA versions to introduce mandatory semantics.
section: "4.5"
topics:
    - dns
    - pkix
    - security
