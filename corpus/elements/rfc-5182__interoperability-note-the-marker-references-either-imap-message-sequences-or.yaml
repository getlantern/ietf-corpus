document: rfc-5182
kind: interoperability-note
summary: The "$" marker references either IMAP message sequences or UID sequences depending on context. A SEARCH (SAVE) result used with UID FETCH is interpreted as a UID sequence, while a UID SEARCH (SAVE) result used with FETCH is interpreted as a message sequence; servers must handle both directions.
section: "2.1"
topics:
    - email
