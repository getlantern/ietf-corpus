document: rfc-6842
kind: normative-requirement
summary: When a client receives a DHCP message containing a 'client identifier' option, the client MUST compare that client identifier to the one it is configured to send. If the two client identifiers do not match, the client MUST silently discard the message.
section: "3"
rfc2119_level: MUST
topics:
    - ip
