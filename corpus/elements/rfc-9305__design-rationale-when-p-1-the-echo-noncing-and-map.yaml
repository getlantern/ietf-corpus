document: rfc-9305
kind: design-rationale
summary: When P=1, the Echo-Noncing and Map-Versioning features (bits N, E, V) become unavailable. The document justifies this by noting that equivalent capabilities can be implemented via LISP-GPE shim headers, allowing incremental deployment of new features without changing the base header.
