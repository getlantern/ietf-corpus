document: rfc-1158
kind: interoperability-note
summary: DisplayString (DisplayString ::= OCTET STRING) is introduced as a textual convention restricted to NVT ASCII (RFC 854 pages 10-11). sysDescr and ifDescr are redefined in terms of DisplayString; this change has no effect on syntax or BER encoding but clarifies that these fields must contain only printable ASCII.
section: "3.2"
topics:
    - snmp
