document: rfc-7453
kind: protocol-element
summary: mplsTunnelExtNodeConfigTable maps each Global_ID::Node_ID or ICC_Operator_ID::Node_ID to a unique local 4-byte identifier (0–16777215) used as the Ingress/Egress LSR ID in the existing mplsTunnelTable. Each entry is indexed by mplsTunnelExtNodeConfigLocalId and must contain a unique [Global_ID, Node_ID] or [CC::ICC, Node_ID] combination.
section: 6.2.1
topics:
    - mpls
