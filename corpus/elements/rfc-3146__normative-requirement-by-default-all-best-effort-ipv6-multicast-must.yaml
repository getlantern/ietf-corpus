document: rfc-3146
kind: normative-requirement
summary: By default, all best-effort IPv6 multicast MUST use asynchronous stream packets whose channel number equals the BROADCAST_CHANNEL register channel field. This includes all-nodes, all-routers, and solicited-node multicast addresses.
section: "9"
rfc2119_level: MUST
topics:
    - ip
    - multicast
