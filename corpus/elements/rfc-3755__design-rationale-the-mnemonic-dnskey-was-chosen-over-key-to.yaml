document: rfc-3755
kind: design-rationale
summary: The mnemonic DNSKEY was chosen over KEY to indicate that these keys are not for application use (per RFC 3445); RRSIG replaces SIG to indicate resource record signatures; NSEC replaces NXT to signal 'Next SECure'. Mnemonic changes were deemed necessary to avoid operational confusion alongside the type code changes.
