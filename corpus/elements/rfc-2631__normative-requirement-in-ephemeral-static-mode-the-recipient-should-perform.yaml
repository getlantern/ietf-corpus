document: rfc-2631
kind: normative-requirement
summary: In Ephemeral-Static mode, the recipient SHOULD perform the public key check of Section 2.1.5 to resist small subgroup attacks. The check MAY be omitted if an opponent cannot determine decryption success or failure.
section: "2.3"
rfc2119_level: SHOULD
