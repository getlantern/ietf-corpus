document: rfc-2677
kind: protocol-element
summary: nhrpNextIndex is a read-only scalar (Unsigned32) in the General Group that provides unique index values for creating rows in nhrpClientTable and nhrpServerTable. It returns 0 if no new rows can be created, and its value MUST be saved in non-volatile storage across agent re-initializations.
section: "3.1"
topics:
