document: rfc-9830
kind: normative-requirement
summary: SR Policy NLRIs carrying the NO_ADVERTISE community MUST NOT be propagated. By default, a BGP node MUST NOT propagate SR Policy NLRIs to any EBGP neighbor; explicit configuration is required to enable inter-AS propagation.
