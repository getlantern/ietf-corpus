document: rfc-4211
kind: security-consideration
summary: 'Key escrow implementations must ensure: the client correctly identifies the escrow entity; transport algorithms match the sensitivity of the escrowed data; only authorized entities can retrieve escrowed keys; and the escrow database is stored securely (e.g., re-encrypted under keys known only to the escrow agent).'
section: "9"
topics:
