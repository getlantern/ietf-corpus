document: rfc-8920
kind: protocol-element
summary: 'The Standard Application Identifier Bit Mask defines three initial application bits: bit 0 (R-bit) for RSVP-TE, bit 1 (S-bit) for Segment Routing Policy, and bit 2 (F-bit) for Loop-Free Alternate (LFA, including all LFA types). Bit assignments are managed in the ''Link Attribute Applications'' registry defined in RFC 8919.'
section: "5"
topics:
    - routing
    - registry
