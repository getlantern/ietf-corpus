document: rfc-8400
kind: wire-format
summary: The IPv4 P2P LSP ID subobject (Type=3) contains a 4-byte P2P LSP Tunnel Egress IPv4 Address, a 16-bit Reserved field (MUST be zero), a 16-bit Tunnel ID, and a 4-byte Extended Tunnel ID. The IPv6 variant (Type=4) uses 16-byte addresses for both the egress address and Extended Tunnel ID.
section: 4.1.2
topics:
    - routing
    - mpls
