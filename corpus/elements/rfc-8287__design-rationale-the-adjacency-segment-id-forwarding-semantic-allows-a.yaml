document: rfc-8287
kind: design-rationale
summary: The Adjacency Segment ID forwarding semantic allows a misprogrammed node to forward a packet to the wrong neighbor or over the wrong link, yet the exposed next segment may still deliver the packet to the intended destination — making simple connectivity verification insufficient for path validation in SR networks.
section: "4.1"
topics:
    - mpls
    - routing
    - security
