document: rfc-7222
kind: wire-format
summary: The QoS Traffic Selector attribute (Type 10, variable length) contains an 8-bit Reserved field, an 8-bit TS Format field (reusing the namespace from RFC 6089), and a variable-length Traffic Selector field; it scopes the DSCP marking and all co-located per-flow QoS attributes to the identified IP flows.
section: 4.2.10
topics:
