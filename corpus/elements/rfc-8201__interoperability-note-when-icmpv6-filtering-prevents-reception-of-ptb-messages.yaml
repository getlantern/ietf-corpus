document: rfc-8201
kind: interoperability-note
summary: When ICMPv6 filtering prevents reception of PTB messages, PMTUD fails silently and can cause black-hole connections. Packetization Layer Path MTU Discovery (RFC 4821) does not rely on ICMPv6 and is more robust in filtered environments.
