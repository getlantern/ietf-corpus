document: rfc-7953
kind: protocol-element
summary: The AVAILABLE subcomponent is nested inside VAVAILABILITY and marks periods of free time within the enclosing component's range. It REQUIRES DTSTAMP, DTSTART, and UID, and supports recurrence properties (RRULE, RDATE, EXDATE, RECURRENCE-ID) to express repeating availability.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
