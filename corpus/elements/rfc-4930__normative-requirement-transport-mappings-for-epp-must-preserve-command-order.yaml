document: rfc-4930
kind: normative-requirement
summary: 'Transport mappings for EPP MUST: preserve command order, address session/connection relationships, preserve protocol statefulness, frame data units, use a congestion-aware transport (TCP or SCTP), ensure reliability, and explicitly allow or prohibit pipelining.'
section: "2.1"
rfc2119_level: MUST
