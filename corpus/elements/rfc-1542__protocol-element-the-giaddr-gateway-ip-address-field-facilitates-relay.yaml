document: rfc-1542
kind: protocol-element
summary: The 'giaddr' (gateway IP address) field facilitates relay of BOOTREQUEST messages from clients through relay agents to servers on different networks. It is set by the relay agent to its receiving interface address, not by the client, and must never contain a broadcast address.
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
