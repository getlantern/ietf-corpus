document: rfc-2531
kind: interoperability-note
summary: For interoperability with non-fax applications that use only pixel-based measurements, pixel dimensions (pix-x, pix-y from RFC 2534) may be declared in addition to the physical inch-based size-x/size-y measurements defined in this document.
section: A.1
