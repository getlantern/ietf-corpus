document: rfc-5746
kind: normative-requirement
summary: During secure renegotiation, the server MUST verify that the ClientHello does not contain the SCSV (abort if present), MUST verify that `renegotiation_info` is present (abort if absent), and MUST verify that `renegotiated_connection` equals the saved `client_verify_data`. The ServerHello MUST include `renegotiation_info` with both `client_verify_data` and `server_verify_data`.
section: "3.7"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
