document: rfc-3539
kind: interoperability-note
summary: AAA protocols running over reliable transport (TCP or SCTP) experience nearly double the packet traffic compared to UDP because AAA traffic is application-driven, leaving insufficient reverse traffic to enable ACK piggybacking, causing delayed ACKs to comprise nearly half the traffic.
section: B.1
topics:
    - tcp
    - sctp
    - diameter
    - radius
