document: rfc-7674
kind: interoperability-note
summary: Implementations matching a received Redirect Extended Community's Route Target value must account for the community's specific format (AS-2byte, IPv4, or AS-4byte) and not perform format-agnostic wildcard matching, as the format is now encoded in the high-order type octet.
section: "1"
topics:
    - bgp
    - routing
