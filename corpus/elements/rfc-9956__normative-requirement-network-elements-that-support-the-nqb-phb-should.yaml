document: rfc-9956
kind: normative-requirement
summary: Network elements that support the NQB PHB SHOULD support a traffic protection function to identify and reclassify or discard microflows inconsistent with NQB sender requirements. The traffic protection function MUST NOT base its decisions on application-layer constructs (port numbers, IP addresses); it MUST be designed such that the node does not fail if per-microflow state is exhausted.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - diffserv
    - qos
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
