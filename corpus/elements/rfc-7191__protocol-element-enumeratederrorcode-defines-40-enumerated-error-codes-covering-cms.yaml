document: rfc-7191
kind: protocol-element
summary: EnumeratedErrorCode defines 40+ enumerated error codes covering CMS processing failures including decode failures, bad structures (SignedData, EnvelopedData, AuthenticatedData, AuthEnvelopedData), cryptographic failures, authorization errors, and key package-specific errors. Values 1–33 are aligned with RFC 5934 (TAMP).
