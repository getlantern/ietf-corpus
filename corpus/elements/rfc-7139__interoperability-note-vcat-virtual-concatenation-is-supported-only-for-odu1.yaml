document: rfc-7139
kind: interoperability-note
summary: VCAT (Virtual Concatenation) is supported only for ODU1, ODU2, and ODU3 Signal Types per G.709-2012; VCAT of OPU0, OPU2e, OPU4, and OPUflex is not supported. The One LSP approach for VCGs requires the explicit ordered list of labels to reflect the order of VCG members.
