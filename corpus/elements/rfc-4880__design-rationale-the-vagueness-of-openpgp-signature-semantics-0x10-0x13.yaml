document: rfc-4880
kind: design-rationale
summary: The vagueness of OpenPGP signature semantics (0x10–0x13 certification levels) is intentional, not a flaw. Because OpenPGP places final authority for validity upon the receiver, one signer's casual act may be more rigorous than another authority's positive act.
section: 5.2.1
topics:
    - security
    - crypto
