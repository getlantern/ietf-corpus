document: rfc-3211
kind: wire-format
summary: 'The formatted CEK block consists of: (1) a one-byte count of CEK bytes, (2) a three-byte check value (bitwise complement of first three CEK bytes), (3) the CEK itself, and (4) random padding to make the block a multiple of the KEK block length and at least two KEK cipher blocks long.'
section: 2.3.1
