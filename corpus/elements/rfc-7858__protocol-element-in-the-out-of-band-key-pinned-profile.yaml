document: rfc-7858
kind: protocol-element
summary: In the out-of-band key-pinned profile, clients authenticate servers by matching SPKI Fingerprints analogously to RFC 7469 (HTTP Public Key Pinning). Client administrators SHOULD deploy a backup pin alongside the primary pin to facilitate key rollover without simultaneous client coordination.
section: "4.2"
