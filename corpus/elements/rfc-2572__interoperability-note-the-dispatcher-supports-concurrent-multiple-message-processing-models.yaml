document: rfc-2572
kind: interoperability-note
summary: The Dispatcher supports concurrent multiple Message Processing Models (v1MP, v2cMP, v3MP, and others) identified by the messageProcessingModel value. An incoming message's SNMP version is determined before dispatching to the correct version-specific model.
