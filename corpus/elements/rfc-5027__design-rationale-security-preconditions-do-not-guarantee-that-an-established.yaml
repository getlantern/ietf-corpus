document: rfc-5027
kind: design-rationale
summary: Security preconditions do not guarantee that an established media stream will be secure; they only guarantee that the recipient can perform relevant decryption and integrity checking. For example, SRTP using NULL encryption and no message integrity qualifies as a "secure media stream" for precondition purposes even though it provides no real protection.
