document: rfc-7743
kind: wire-format
summary: 'The Relay Node Address Stack TLV header contains: Type (2 octets, value 32768), Length (2 octets), Initiator Source Port (2 octets), Reply Address Type (1 octet, 0=Null/1=IPv4/2=IPv6), Reserved (1 octet, MUST be zero), Source Address of Replying Router (0, 4, or 16 octets), Destination Address Offset (2 octets), Number of Relayed Addresses (2 octets), followed by the Stack of Relayed Addresses.'
section: "3.2"
topics:
    - mpls
