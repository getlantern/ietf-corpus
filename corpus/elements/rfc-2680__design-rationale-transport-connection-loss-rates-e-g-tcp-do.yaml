document: rfc-2680
kind: design-rationale
summary: Transport connection loss rates (e.g., TCP) do not reflect unbiased samples because TCP transmits in bursts (inducing additional loss) and adapts its rate to minimize loss, making IPPM Poisson-sampled measurements necessary for unbiased network characterization.
