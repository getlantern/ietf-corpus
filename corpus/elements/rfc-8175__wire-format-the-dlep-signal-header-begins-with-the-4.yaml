summary: The DLEP Signal Header begins with the 4-byte ASCII magic 'DLEP' (U+0044 U+004C U+0045 U+0050), followed by a 16-bit Signal Type and a 16-bit Length indicating total octets of Data Items (not including the header). Carried in UDP datagrams only.
