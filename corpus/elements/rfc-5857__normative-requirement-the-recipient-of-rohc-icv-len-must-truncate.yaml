document: rfc-5857
kind: normative-requirement
summary: The recipient of ROHC_ICV_LEN MUST truncate the ICV to the announced length. If no ROHC_ICV_LEN attribute is sent, or if the value exceeds the full ICV length of the selected algorithm, the full ICV MUST be sent.
section: 3.1.2
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - security
