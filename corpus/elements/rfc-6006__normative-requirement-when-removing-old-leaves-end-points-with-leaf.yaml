document: rfc-6006
kind: normative-requirement
summary: When removing old leaves, END-POINTS with leaf type 2 must be present; if no type-2 END-POINTS exist in a pruning request, the PCE MUST send Error-Type=17, Error-Value=1. Old leaves must be provided as RRO lists following their END-POINTS objects.
section: "3.10"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
