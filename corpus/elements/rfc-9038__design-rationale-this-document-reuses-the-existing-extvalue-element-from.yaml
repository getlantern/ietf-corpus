document: rfc-9038
kind: design-rationale
summary: This document reuses the existing <extValue> element from RFC 5730 (originally intended only for error diagnostics) rather than defining new EPP protocol elements. This allows signaling via an existing extension point while maintaining backward compatibility with RFC 5730.
