document: rfc-3843
kind: protocol-element
summary: The ROHC IP compression profile (0x0004) generates a 16-bit sequence number (SN) that increases by one for each compressed packet, analogous to ROHC UDP. The most important differences from ROHC UDP are static chain termination and handling of multiple IP headers.
