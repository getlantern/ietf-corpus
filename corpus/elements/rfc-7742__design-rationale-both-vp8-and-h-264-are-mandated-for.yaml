document: rfc-7742
kind: design-rationale
summary: Both VP8 and H.264 are mandated for WebRTC because the licensing landscape for video codecs was uncertain at the time of writing; the RTCWEB working group intended to revisit codec requirements for Non-Browsers if one became unambiguously royalty-free, while browser requirements were considered settled.
