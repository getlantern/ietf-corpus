document: rfc-2677
kind: interoperability-note
summary: The NHRP MIB and the MPOA MIB were designed to be complementary and non-overlapping. The MPOA MIB (designed prior by the LANE/MPOA Working Group at ATM Forum) should also support this MIB, and the shared indexing scheme facilitates joint implementation.
