document: rfc-5881
kind: normative-requirement
summary: On a point-to-point link, the source address of a BFD Control packet MUST NOT be used to identify the session. The initial BFD packet MUST be accepted with any source address, and subsequent packets MUST be demultiplexed solely by the Your Discriminator field.
section: "6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
