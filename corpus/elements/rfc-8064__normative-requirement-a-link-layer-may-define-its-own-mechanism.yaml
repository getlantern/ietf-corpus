document: rfc-8064
kind: normative-requirement
summary: A link layer MAY define its own mechanism for stable IPv6 address generation that is more efficient but does not address the security and privacy considerations of RFC 8064. When such a mechanism exists, the choice of whether to enable the security- and privacy-preserving mechanism SHOULD be configurable.
section: "3"
rfc2119_level: SHOULD
topics:
    - ip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
