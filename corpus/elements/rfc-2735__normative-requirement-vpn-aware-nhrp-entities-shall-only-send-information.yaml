document: rfc-2735
kind: normative-requirement
summary: VPN-aware NHRP entities SHALL only send information to non-VPN-aware NHRP entities if that information belongs to the VPN in which the non-VPN-aware entity is contained, and information sent to a non-VPN-aware NHRP entity MUST NOT include any indication of the VPN-ID.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - vpn
