document: rfc-9071
kind: normative-requirement
summary: It is RECOMMENDED that an RTP mixer discard text causing delays exceeding 15 seconds and insert a general indication of possible text loss; if the main text contributor is identifiable, the mixer MAY avoid deleting text from that participant.
section: "8"
rfc2119_level: RECOMMENDED
