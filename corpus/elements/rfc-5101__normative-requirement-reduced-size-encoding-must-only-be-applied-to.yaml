document: rfc-5101
kind: normative-requirement
summary: Reduced size encoding MUST only be applied to integer types unsigned64, signed64, unsigned32, signed32, unsigned16, and signed16, preserving the signed/unsigned property with only leading zeroes dropped. It MUST NOT be applied to dateTimeMicroseconds or dateTimeNanoseconds as these have an inherent structure.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - measurement
