document: rfc-7552
kind: normative-requirement
summary: If an LSR is configured to change an interface or peer from Single-stack LDP to Dual-stack LDP, it SHOULD use Typed Wildcard FEC procedures (RFC 5918) to request label bindings for the newly enabled address family without resetting the session.
section: "7.2"
rfc2119_level: SHOULD
