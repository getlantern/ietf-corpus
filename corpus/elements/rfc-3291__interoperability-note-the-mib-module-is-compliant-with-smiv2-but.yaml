document: rfc-3291
kind: interoperability-note
summary: The MIB module is compliant with SMIv2 but can be translated to SMIv1. The resulting translated MIB is semantically equivalent except where objects are omitted because no translation is possible (e.g., Counter64). Machine-readable information in SMIv2 becomes textual descriptions in SMIv1, which is not considered a semantic change.
section: "2"
