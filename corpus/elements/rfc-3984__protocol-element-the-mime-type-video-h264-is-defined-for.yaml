summary: 'The MIME type video/H264 is defined for this payload format. Key MIME parameters include: packetization-mode (0/1/2), sprop-parameter-sets (base64-encoded SPS/PPS for out-of-band delivery), profile-level-id (3-octet hex), sprop-interleaving-depth, sprop-deint-buf-req, deint-buf-cap, sprop-init-buf-time, and sprop-max-don-diff.'
