document: rfc-5658
kind: design-rationale
summary: The recommendation against 'transport=tls' in Record-Route URIs exists because this usage was deprecated by RFC 3261. To signal TLS, proxies must instead use SIPS URIs or construct URIs such that RFC 3263 resolution selects TLS.
section: "6.2"
topics:
    - sip
    - tls
    - realtime
