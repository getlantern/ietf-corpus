document: rfc-6622
kind: normative-requirement
summary: Any Packet ICV TLVs already present in the Packet TLV block MUST be removed before calculating the ICV, the Packet TLV block size MUST be recalculated accordingly, and removed ICV TLVs MUST be restored after calculating the ICV value.
section: "8.1"
rfc2119_level: MUST
topics:
