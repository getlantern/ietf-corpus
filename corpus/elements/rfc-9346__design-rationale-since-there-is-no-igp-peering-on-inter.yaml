document: rfc-9346
kind: design-rationale
summary: Since there is no IGP peering on inter-AS links, there is no bidirectional TE link information. The ASBR therefore 'proxies' for the remote ASBR by advertising an additional LSP describing the remote device's view of the link, enabling CSPF to perform two-way checks on the inter-AS link.
section: "4"
topics:
    - routing
    - mpls
