document: rfc-6265
kind: protocol-element
summary: The Max-Age attribute specifies cookie lifetime as a number of seconds. If both Max-Age and Expires are present, Max-Age takes precedence. A Max-Age value of zero or less causes immediate expiry. Some user agents do not support Max-Age and ignore it.
section: 4.1.2.2
topics:
    - http
