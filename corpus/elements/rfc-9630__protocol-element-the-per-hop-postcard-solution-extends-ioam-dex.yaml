document: rfc-9630
kind: protocol-element
summary: The Per-Hop Postcard solution extends IOAM DEX with a Multicast Branch ID field so that each node on the multicast tree exports a postcard containing only its local data plus the branch identifier, enabling the data collector to reconstruct multicast tree topology from the postcards.
