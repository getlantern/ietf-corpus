document: rfc-8139
kind: wire-format
summary: 'The AppointmentBitmap APPsub-TLV (type 17) encodes scattered VLAN appointments over a compact range: 2-byte Appointee Nickname, 4-bit RESV, 12-bit Starting VLAN ID, and a variable-length Bit Map where each bit represents the VLAN at Starting VLAN ID + N. Length field = 4 + bitmap size in bytes.'
section: "10.2"
