document: rfc-4970
kind: wire-format
summary: The OSPFv2 RI Opaque LSA header uses LS type 9, 10, or 11 (link/area/AS scope), Opaque type field set to 4, and Opaque ID set to 0. The LSA body carries TLVs in the same format as Traffic Engineering Extensions to OSPF (RFC 3630).
section: "2.1"
topics:
