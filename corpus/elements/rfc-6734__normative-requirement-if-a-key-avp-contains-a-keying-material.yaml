document: rfc-6734
kind: normative-requirement
summary: If a Key AVP contains a Keying-Material AVP that is not already protected, then the Diameter messages containing that Key AVP MUST only be sent protected via mutually authenticated TLS or IPsec.
section: "4"
rfc2119_level: MUST
topics:
