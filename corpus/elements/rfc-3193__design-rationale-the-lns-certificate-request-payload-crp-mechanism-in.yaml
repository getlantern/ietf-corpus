document: rfc-3193
kind: design-rationale
summary: The LNS certificate request payload (CRP) mechanism in IKE allows the LNS to trust multiple certificate authorities, enabling tunnel clients to connect using their own PKI credentials. Certificate revocation list checking MAY be enabled on a per-CA basis due to differences among PKI providers.
section: 5.1.2
topics:
    - ipsec
    - pkix
    - security
