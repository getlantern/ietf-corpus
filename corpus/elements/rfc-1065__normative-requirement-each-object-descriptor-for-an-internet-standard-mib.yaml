document: rfc-1065
kind: normative-requirement
summary: Each OBJECT DESCRIPTOR for an Internet-standard MIB object type shall be a unique, mnemonic, printable string to enable a common human language for MIB discussion and simple table mappings in user interfaces.
section: "4.1"
