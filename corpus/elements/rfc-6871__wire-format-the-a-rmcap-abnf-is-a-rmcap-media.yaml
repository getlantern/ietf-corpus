document: rfc-6871
kind: wire-format
summary: 'The ''a=rmcap'' ABNF is: ''a=rmcap:<media-cap-num-list> <encoding-name>/<clock-rate>[/<encoding-parms>]''; ''a=omcap'' is: ''a=omcap:<media-cap-num-list> <format-name>''. A media-cap-num-list is a comma-separated list of integers or hyphenated ranges; each media-cap-num is a non-zero decimal integer up to 10 digits.'
section: 3.3.1
topics:
