document: rfc-5451
kind: normative-requirement
summary: For security, any MTA conforming to this specification MUST delete any discovered instance of this header field that claims to have been added within its trust boundary but did not come from another trusted MTA, to prevent acceptance of forged authentication results.
section: "5"
rfc2119_level: MUST
