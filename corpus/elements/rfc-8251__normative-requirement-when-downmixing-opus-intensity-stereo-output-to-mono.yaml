document: rfc-8251
kind: normative-requirement
summary: When downmixing Opus intensity-stereo output to mono, the decoder MAY choose not to apply the 180-degree phase shift on a per-band basis. This avoids energy cancellation in affected bands that would otherwise cause audible artifacts in the mono mix.
section: "10"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
