document: rfc-6679
kind: design-rationale
summary: 'Multicast ECN support is conservative: all known receivers must demonstrate ECN capability before the sender may send ECN-marked packets, because allowing some non-ECN-capable receivers creates fairness issues when the bottleneck link is shared between ECN and non-ECN flows.'
section: "3.2"
topics:
    - rtp
    - ecn
    - congestion
    - multicast
