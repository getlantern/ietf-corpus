document: rfc-8181
kind: normative-requirement
summary: For <withdraw/> PDUs, the 'hash' attribute MUST be present. For <publish/> PDUs overwriting an existing object, the hash MUST be present; when writing to a new URI, the hash MUST NOT be present.
section: "2.2"
rfc2119_level: MUST
