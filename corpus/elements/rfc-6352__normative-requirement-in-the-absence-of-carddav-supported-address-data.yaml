document: rfc-6352
kind: normative-requirement
summary: In the absence of CARDDAV:supported-address-data, a server MUST only accept 'text/vcard' at version 3.0. Any attempt to store a resource with an unsupported media type MUST fail with the CARDDAV:supported-address-data precondition.
section: 6.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
