document: rfc-5425
kind: security-consideration
summary: Mutual authentication of transport sender and receiver (Sections 5.1 and 5.2) are the RECOMMENDED default policy configurations. Unauthenticated configurations risk accepting attacker data, disclosing sensitive log content, or enabling denial-of-service and resource consumption attacks.
section: "6.1"
