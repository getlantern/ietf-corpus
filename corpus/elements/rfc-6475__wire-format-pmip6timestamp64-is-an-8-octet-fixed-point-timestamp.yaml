document: rfc-6475
kind: wire-format
summary: Pmip6TimeStamp64 is an 8-octet fixed-point timestamp. The first 48 bits hold integer seconds since January 1, 1970 00:00 UTC; the remaining 16 bits hold 1/65536 fractions of a second. Display hint is '6d:2d'.
