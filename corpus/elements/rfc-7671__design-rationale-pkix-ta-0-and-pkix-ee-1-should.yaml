document: rfc-7671
kind: design-rationale
summary: PKIX-TA(0) and PKIX-EE(1) SHOULD NOT be used in opportunistic security contexts because they require agreement on a mutually trusted CA, which is fragile and creates connection failures when valid peers don't share a common CA, undermining the non-intrusive nature of opportunistic security.
section: "4.1"
topics:
    - tls
    - dns
    - security
    - pkix
