summary: The Source OSPF Router-ID TLV (Type 1174, Length 4 octets) is OSPF-only and carries the 4-octet OSPF Router-ID of the node originating the prefix; derived from the Prefix Source OSPF Router-ID Sub-TLV defined in RFC 9084.
