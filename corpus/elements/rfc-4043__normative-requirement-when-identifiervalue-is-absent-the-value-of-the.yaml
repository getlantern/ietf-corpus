document: rfc-4043
kind: normative-requirement
summary: When identifierValue is absent, the value of the serialNumber attribute from the deepest RDN of the subject DN is used as the identifierValue. In such a case, there MUST be at least one serialNumber attribute in the subject DN; otherwise the PermanentIdentifier SHALL NOT be used.
section: "2"
rfc2119_level: MUST
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
