document: rfc-6609
kind: normative-requirement
summary: Implementations MUST generate an error at execution time if an included script does not exist, except when ':optional' is specified. Implementations MUST NOT generate errors for missing scripts at upload time to avoid forcing upload ordering.
section: "3.1"
rfc2119_level: MUST
topics:
