document: rfc-5666
kind: protocol-element
summary: 'xdr_rdma_segment encodes a registered memory region as three fields: uint32 handle (steering tag), uint32 length (chunk bytes), uint64 offset (virtual address or base offset). The offset field is unconditionally included to support pre-registration and region-based registrations.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
