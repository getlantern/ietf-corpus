document: rfc-3339
kind: interoperability-note
summary: The 'T' and 'Z' characters in the syntax may alternatively be lower-case 't' or 'z'. However, specifications used in environments that distinguish case (e.g., XML) MAY further restrict them to upper-case only.
section: "5.6"
