document: rfc-2730
kind: protocol-element
summary: 'MADCAP defines 8 message types: DISCOVER (1), OFFER (2), REQUEST (3), RENEW (4), ACK (5), NAK (6), RELEASE (7), GETINFO (8). DISCOVER, REQUEST, RENEW, RELEASE, and GETINFO are client-only; OFFER, ACK, and NAK are server-only.'
