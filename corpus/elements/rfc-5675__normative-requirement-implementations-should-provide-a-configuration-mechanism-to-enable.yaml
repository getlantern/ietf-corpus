document: rfc-5675
kind: normative-requirement
summary: Implementations SHOULD provide a configuration mechanism to enable/disable generation of OID label parameters ('lN') and alternate value representation parameters ('aN'), since including them increases message size and may cause SYSLOG message truncation.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - snmp
    - syslog
