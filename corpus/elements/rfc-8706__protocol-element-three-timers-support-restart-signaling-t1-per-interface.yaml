document: rfc-8706
kind: protocol-element
summary: 'Three timers support restart signaling: T1 (per-interface, ~3s) tracks unacknowledged (re)start retransmissions; T2 (per LSPDB, ~60s) bounds the maximum wait for LSP database synchronization; T3 (system-wide, initialized to 65535s) is used only by restarting routers and tracks time before declaring synchronization failure by setting the overload bit.'
section: "3.1"
topics:
    - routing
