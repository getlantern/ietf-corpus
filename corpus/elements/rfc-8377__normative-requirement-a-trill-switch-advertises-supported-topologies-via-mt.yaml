document: rfc-8377
kind: normative-requirement
summary: A TRILL switch advertises supported topologies via MT TLVs in its LSP. It MUST support topology zero. MT TLVs SHOULD be advertised in core LSP fragment zero for robust and rapid flooding.
section: "2.3"
rfc2119_level: MUST
topics:
    - routing
