document: rfc-6980
kind: design-rationale
summary: For traditional ND, the only plausible reason to fragment would be a Router Advertisement carrying a very large number of options, but this can always be avoided by splitting the information across multiple RA messages instead. Splitting is preferable even for interoperability since some ND implementations silently ignore fragmented RAs.
section: "2"
