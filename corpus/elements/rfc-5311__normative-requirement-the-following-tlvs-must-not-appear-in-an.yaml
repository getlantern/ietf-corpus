document: rfc-5311
kind: normative-requirement
summary: 'The following TLVs MUST NOT appear in an Extended LSP: ES Neighbors (3), Part. DIS (4), and Prefix Neighbors (5). If received, an Extension-Capable IS MUST ignore those TLVs and SHOULD report an error; other TLVs in the set MUST be processed normally.'
section: 4.2.1
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
