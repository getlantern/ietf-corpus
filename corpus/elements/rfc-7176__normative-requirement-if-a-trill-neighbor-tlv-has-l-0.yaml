document: rfc-7176
kind: normative-requirement
summary: If a TRILL Neighbor TLV has L=0, its highest MAC address MUST also appear in some other TRILL Neighbor TLV. If S=0, its lowest MAC address MUST also appear in another TRILL Neighbor TLV. An IS with no neighbors MUST send a TRILL Neighbor TLV with an empty neighbor record list (both S and L bits set).
section: "2.5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
