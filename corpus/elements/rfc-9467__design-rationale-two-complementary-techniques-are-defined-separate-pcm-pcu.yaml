document: rfc-9467
kind: design-rationale
summary: 'Two complementary techniques are defined: separate PCm/PCu states allow arbitrary reordering between unicast and multicast packets, while window-based verification allows bounded reordering between arbitrary packets. The former is RECOMMENDED because Babel is designed to tolerate occasional packet loss, making the window approach merely OPTIONAL.'
