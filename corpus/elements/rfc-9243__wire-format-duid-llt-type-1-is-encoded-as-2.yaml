document: rfc-9243
kind: wire-format
summary: 'DUID-LLT (type 1) is encoded as: 2-octet type field (0x0001), 2-octet IANA hardware type, 4-octet creation time (seconds since 2000-01-01 UTC modulo 2^32), and a variable-length link-layer address. Example: 0001 0006 28490058 00005E005300.'
