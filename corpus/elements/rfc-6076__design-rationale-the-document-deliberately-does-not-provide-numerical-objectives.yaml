document: rfc-6076
kind: design-rationale
summary: The document deliberately does not provide numerical objectives or acceptance threshold values for the SIP performance metrics, as setting such targets is beyond the scope of IETF activities. The metrics provide a common measurement foundation; numeric targets are left to service providers and operators.
