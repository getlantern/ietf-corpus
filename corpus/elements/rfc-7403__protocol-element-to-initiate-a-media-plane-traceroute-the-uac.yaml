document: rfc-7403
kind: protocol-element
summary: To initiate a media-plane traceroute, the UAC sends a SIP INVITE to the target AOR with Max-Forwards set to 0 and SDP constructed per RFC 6849 media loopback. Each subsequent test call increments Max-Forwards by 1 to reach the next B2BUA further downstream.
