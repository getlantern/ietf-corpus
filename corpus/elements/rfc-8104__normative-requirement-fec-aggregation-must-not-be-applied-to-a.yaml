document: rfc-8104
kind: normative-requirement
summary: FEC aggregation MUST NOT be applied to a context identifier's FEC, and every router MUST assign a unique label to the FEC. This prevents bypass tunnels from being misrouted due to label sharing.
section: 4.3.2
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
