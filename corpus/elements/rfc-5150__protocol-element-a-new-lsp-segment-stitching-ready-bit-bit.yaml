document: rfc-5150
kind: protocol-element
summary: A new 'LSP segment stitching ready' bit (Bit Number 5) is defined in the Flags field of the RRO Attributes subobject. The egress node of an S-LSP MUST set this bit in the Resv to confirm it can support stitching, enabling the head end to know that correct stitching actions will be carried out.
section: 5.1.1
topics:
    - mpls
    - routing
    - registry
