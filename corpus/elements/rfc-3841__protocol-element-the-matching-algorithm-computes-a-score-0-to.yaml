document: rfc-3841
kind: protocol-element
summary: The matching algorithm computes a score (0 to 1) per contact against each Accept-Contact predicate by counting the fraction of predicate feature tags explicitly present in the contact predicate. The overall caller preference Qa is the arithmetic average of all per-predicate scores. Contacts are sorted first by callee-provided q-value, then within each equivalence class by Qa.
section: 7.2.4
