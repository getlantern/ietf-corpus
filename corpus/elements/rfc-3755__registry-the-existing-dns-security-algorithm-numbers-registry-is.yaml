document: rfc-3755
kind: registry
summary: The existing 'DNS Security Algorithm Numbers' registry is modified to add two columns indicating whether each algorithm may be used for zone signing, transaction security mechanisms (SIG(0)/TKEY), or both. Only RSA/SHA-1, DSA/SHA-1, and private algorithm types 253 and 254 may be used for zone signing.
section: "4.2"
topics:
    - dns
    - registry
    - crypto
