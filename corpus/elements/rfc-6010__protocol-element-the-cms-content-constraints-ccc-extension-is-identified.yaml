document: rfc-6010
kind: protocol-element
summary: The CMS Content Constraints (CCC) extension is identified by the OID id-pe-cmsContentConstraints (pkix pe 18) and restricts the content types for which a public key may be used to verify a signature or MAC. The extension appears in trust anchor objects or X.509 certificates and MUST appear at most once.
section: "2"
topics:
