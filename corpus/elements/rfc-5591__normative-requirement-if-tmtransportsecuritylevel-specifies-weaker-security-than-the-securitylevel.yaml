document: rfc-5591
kind: normative-requirement
summary: If tmTransportSecurityLevel specifies weaker security than the securityLevel requested (e.g., noPriv when Priv is required), the snmpTsmInadequateSecurityLevels counter is incremented and an unsupportedSecurityLevel error indication is returned.
