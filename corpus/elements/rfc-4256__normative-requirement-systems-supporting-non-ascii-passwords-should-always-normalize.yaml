document: rfc-4256
kind: normative-requirement
summary: Systems supporting non-ASCII passwords SHOULD always normalize passwords and usernames when added to a database or compared to existing entries. SSH implementations that store and compare passwords SHOULD use SASLprep (RFC 4013) for normalization.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
