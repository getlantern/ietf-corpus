document: rfc-2131
kind: protocol-element
summary: The first four octets of the options field contain the magic cookie values 99, 130, 83, and 99 (decimal), matching the RFC 1497 cookie. The remainder of the options field consists of tagged parameters; the last option must always be the 'end' option.
