document: rfc-4780
kind: design-rationale
summary: The NETWORK-SERVICES-MIB framework (RFC 2788) was adopted to meet the requirement that a single system with a single SNMP agent can support multiple instances of various SIP MIB modules. Each SIP entity instance gets its own applIndex row, with recommended naming conventions such as 'sip_proxy1' or 'sip_registrar2' to ensure uniqueness.
section: "5.2"
topics:
