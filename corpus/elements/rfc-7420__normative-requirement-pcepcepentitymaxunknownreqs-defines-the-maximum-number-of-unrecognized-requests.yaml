document: rfc-7420
kind: normative-requirement
summary: pcePcepEntityMaxUnknownReqs defines the maximum number of unrecognized requests and replies any session will accept per minute before terminating the session. An unrecognized reply has an RP object whose request ID does not match any in-progress request; an unrecognized request has a request ID of zero.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
