document: rfc-4419
kind: state-machine
summary: 'The group exchange proceeds in five steps: (1) client sends min/n/max size request; (2) server responds with chosen group (p, g); (3) client sends e = g^x mod p; (4) server computes K, H, signs H, and sends K_S || f || signature; (5) client verifies host key, computes K and H, and verifies the signature.'
