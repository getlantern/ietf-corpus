document: rfc-5436
kind: normative-requirement
summary: Implementations MUST allow messages with empty envelope senders to trigger notifications. If the envelope sender of the triggering message is empty, the envelope sender of the notification message MUST be empty as well to avoid message loops.
section: "2.7"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
