document: rfc-9936
kind: protocol-element
summary: 'ML-KEM defines three functions: KeyGen() producing a public encapsulation key (ek) and private decapsulation key (dk); Encapsulate(ek) producing ciphertext (c) and shared secret (ss); Decapsulate(dk, c) producing the shared secret (ss). All security levels use SHA3-256, SHA3-512, SHAKE128, and SHAKE256 internally.'
section: "1.2"
topics:
    - crypto
