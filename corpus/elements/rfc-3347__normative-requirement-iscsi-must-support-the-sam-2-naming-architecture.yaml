document: rfc-3347
kind: normative-requirement
summary: iSCSI MUST support the SAM-2 naming architecture and MUST provide a means of identifying an iSCSI storage device by a unique identifier independent of the path on which it is found. The format for iSCSI names MUST use existing naming authorities.
section: "8.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
