document: rfc-8560
kind: normative-requirement
summary: When an EVPN PE receives both a VPLS A-D route and an EVPN IMET route from the same remote PE for the same VPN instance, it MUST give preference to the EVPN route for discovery purposes. This ensures EVPN-capable PEs are distinguished from VPLS-only PEs.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
