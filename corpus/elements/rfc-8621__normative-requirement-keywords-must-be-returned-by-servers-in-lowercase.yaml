document: rfc-8621
kind: normative-requirement
summary: Keywords MUST be returned by servers in lowercase because JSON is case-sensitive. A keyword is a case-insensitive string of 1–255 characters in ASCII subset %x21–%x7e, excluding the characters ( ) { ] % * " \.
section: 4.1.1
rfc2119_level: MUST
topics:
    - email
    - json
