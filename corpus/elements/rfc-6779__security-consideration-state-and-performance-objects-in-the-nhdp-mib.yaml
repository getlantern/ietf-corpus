document: rfc-6779
kind: security-consideration
summary: State and performance objects in the NHDP-MIB expose the topology of the MANET including neighbor addresses, link symmetry, and 2-hop neighbor reachability. Access to these read-only objects should be restricted to authorized management stations to prevent topology reconnaissance by adversaries.
section: "8"
topics:
    - security
    - snmp
    - privacy
