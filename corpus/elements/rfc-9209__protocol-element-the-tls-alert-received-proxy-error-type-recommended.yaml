document: rfc-9209
kind: protocol-element
summary: The 'tls_alert_received' proxy error type (recommended HTTP 502) carries 'alert-id' (an Integer from the TLS Alerts registry) and 'alert-message' (a Token or String with the description string). It is not exclusively generated by intermediaries, as the alert comes from the next hop.
section: 2.3.15
topics:
