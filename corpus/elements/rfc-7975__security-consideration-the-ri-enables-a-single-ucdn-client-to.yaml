document: rfc-7975
kind: security-consideration
summary: The RI enables a single uCDN client to probe a dCDN's edge topology by making repeated RI requests for different content and UA IP addresses. The scope dictionary amplifies this risk by reducing the number of queries needed to infer surrogate assignments. The same information would be harder to gather without the RI, requiring distributed machines with varied IP addresses.
section: "5"
topics:
    - security
    - privacy
