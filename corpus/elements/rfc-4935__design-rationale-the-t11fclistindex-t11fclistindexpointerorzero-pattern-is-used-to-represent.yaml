kind: design-rationale
summary: The T11FcListIndex / T11FcListIndexPointerOrZero pattern is used to represent multi-valued attributes (management address lists, attached port name lists, node name lists) as separate tables pointed to by index, avoiding variable-length embedded sequences within a single row.
