document: rfc-4056
kind: normative-requirement
summary: During signature validation, the trailerField in the certificate subjectPublicKey.algorithm parameters and signatureAlgorithm parameters MUST be the same. If any of the four validation steps fails, the signature checking algorithm MUST fail validation.
