document: rfc-8940
kind: design-rationale
summary: PEAP Session-Id is defined to follow the same pattern as EAP-TLS (RFC 5216 Section 2.3), using client.random || server.random with the PEAP type code 0x19. This definition was already in widespread use in all known PEAP implementations before being formally specified here.
