document: rfc-9462
kind: protocol-element
summary: To prevent name lookup deadlock, clients MUST NOT use a specific Encrypted DNS Resolver for queries needed to resolve that resolver's own name or to perform certificate revocation checks for it, as described in RFC 8484 Section 10.
