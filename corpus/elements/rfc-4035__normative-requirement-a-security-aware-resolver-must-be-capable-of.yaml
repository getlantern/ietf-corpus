document: rfc-4035
kind: normative-requirement
summary: A security-aware resolver MUST be capable of being configured with at least one trusted public key or DS RR (trust anchor) and SHOULD be capable of being configured with multiple trust anchors. The resolver SHOULD have a robust mechanism for obtaining such keys when it boots.
section: "4.4"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
