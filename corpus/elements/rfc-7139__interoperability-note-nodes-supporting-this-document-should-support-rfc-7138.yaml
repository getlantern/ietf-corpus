document: rfc-7139
kind: interoperability-note
summary: Nodes supporting this document SHOULD support RFC 7138 for backward compatibility with deployed RFC 4328 implementations. A node supporting both sets of procedures is not required to act as a signaling version translator. Nodes that do not support this document will generate a PathErr with 'Routing problem/Switching Type' per RFC 3473.
