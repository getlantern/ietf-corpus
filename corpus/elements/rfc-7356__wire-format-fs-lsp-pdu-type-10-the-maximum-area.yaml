document: rfc-7356
kind: wire-format
summary: 'FS-LSP PDU (type 10): the Maximum Area Addresses field is replaced by an 8-bit Scope field where bits 1–7 encode the flooding scope and bit 8 is the Priority (P) bit. The FS LSP ID is either Standard format (Source ID + 1-octet Pseudonode ID + 1-octet FS LSP Number) or Extended format (Source ID + 2-octet Extended FS LSP Number); the format is determined per-scope at scope definition time.'
section: "3.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
