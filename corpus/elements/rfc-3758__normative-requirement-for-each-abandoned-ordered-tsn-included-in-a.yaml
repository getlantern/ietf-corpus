document: rfc-3758
kind: normative-requirement
summary: For each abandoned ordered TSN included in a FORWARD TSN, the sender MUST include the stream and sequence number; each stream SHOULD only be reported once using the highest abandoned stream sequence number.
section: "3.5"
rfc2119_level: MUST
