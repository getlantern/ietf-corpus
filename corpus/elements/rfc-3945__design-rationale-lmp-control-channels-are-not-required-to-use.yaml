document: rfc-3945
kind: design-rationale
summary: LMP control channels are not required to use the same physical medium as the data-bearing links they manage. This physical diversity means control channel health does not necessarily correlate to data link health, requiring LMP to provide independent link management mechanisms for provisioning and fault isolation.
section: "6.1"
topics:
    - routing
