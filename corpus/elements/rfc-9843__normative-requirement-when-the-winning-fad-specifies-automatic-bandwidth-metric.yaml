document: rfc-9843
kind: normative-requirement
summary: When the winning FAD specifies automatic Bandwidth Metric calculation and a link has neither an explicit Bandwidth Metric nor an advertised Link Bandwidth, the link MUST be pruned from the Flex-Algorithm calculations. A calculated metric of zero MUST be replaced with 1.
section: "5"
rfc2119_level: MUST
topics:
    - routing
