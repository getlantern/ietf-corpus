document: rfc-2743
kind: protocol-element
summary: Channel bindings (chan_binding) allow callers to bind security context establishment to characteristics of the underlying communications channel such as addresses or transformed representations of encryption keys, limiting the scope within which an intercepted token can be reused. Both initiator and acceptor must provide consistent channel binding values for validation to succeed.
section: 1.1.6
topics:
    - security
    - crypto
