document: rfc-7119
kind: design-rationale
summary: Template IDs are unique only per Exporter, per Transport Session, and per Observation Domain (per RFC 7011), so there is no guarantee that the same Template Record will have the same Template ID on incoming and outgoing Transport Sessions at a Mediator. This necessitates the Template Mapping mechanism.
section: "4.1"
topics:
    - measurement
