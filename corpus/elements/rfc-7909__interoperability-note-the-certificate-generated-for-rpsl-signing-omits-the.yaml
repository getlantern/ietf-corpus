document: rfc-7909
kind: interoperability-note
summary: The certificate generated for RPSL signing omits the Subject Information Access (SIA) extension mandated by RFC 6487, because that extension requires an rsync URI for the accessLocation and RPSL does not currently support database access via rsync.
