document: rfc-6510
kind: interoperability-note
summary: A node supporting RFC 4875 and RFC 5420 but not RFC 6510 will interpret the first LSP_ATTRIBUTES object in a per-S2L-formatted Resv message as representing LSP operational status rather than S2L sub-LSP status. Networks wishing to use per-S2L operational reporting must deploy this extension.
section: 3.2.1
topics:
    - routing
    - mpls
