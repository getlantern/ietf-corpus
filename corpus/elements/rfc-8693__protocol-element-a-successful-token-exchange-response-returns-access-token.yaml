kind: protocol-element
summary: A successful token exchange response returns 'access_token' (REQUIRED, the issued security token), 'issued_token_type' (REQUIRED, URI identifier for the issued token's type), 'token_type' (REQUIRED, e.g., 'Bearer' or 'N_A'), 'expires_in' (RECOMMENDED), and optionally 'scope' and 'refresh_token'.
