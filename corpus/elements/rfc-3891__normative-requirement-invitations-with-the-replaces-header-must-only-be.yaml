document: rfc-3891
kind: normative-requirement
summary: Invitations with the Replaces header MUST only be accepted if the peer requesting replacement has been properly authenticated using a standard SIP mechanism (Digest or S/MIME), and authorized to request a replacement of the target dialog.
section: "8"
rfc2119_level: MUST
