document: rfc-8428
kind: normative-requirement
summary: Systems receiving JSON SenML measurements MUST be able to process the full range of IEEE 754 double-precision floating-point numbers. The exponent character 'e' MUST be lowercase; the mantissa SHOULD be less than 19 characters and the exponent less than 5 characters.
section: "5"
rfc2119_level: MUST
topics:
    - json
