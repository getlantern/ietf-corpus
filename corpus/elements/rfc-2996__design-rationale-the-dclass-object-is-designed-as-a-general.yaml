document: rfc-2996
kind: design-rationale
summary: The DCLASS object is designed as a general tool for conveying DSCP information in RSVP messages, not limited to upstream marking. A secondary use case is carrying marking decisions from a DS network egress router (where the appropriate behavior aggregate is determined) to the ingress router (where actual packet marking occurs), decoupling the decision point from the enforcement point.
section: "1.1"
topics:
    - qos
    - diffserv
