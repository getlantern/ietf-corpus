document: rfc-1516
kind: protocol-element
summary: rptrMonitorPortAlignmentErrors (rptrMonitorPortEntry 6) counts frames with both FCSError and FramingError asserted and no CollisionEvent, within minFrameSize..maxFrameSize. If this counter is incremented for a frame, rptrMonitorPortFCSErrors shall not also be incremented for that same frame.
section: "3.3"
