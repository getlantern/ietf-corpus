document: rfc-5225
kind: wire-format
summary: Compressed lists of RTP CSRC identifiers use a 1-byte header with a PS bit (0 = 4-bit XI fields, 1 = 8-bit XI fields) and a 4-bit count m, followed by m XI items each containing an X presence bit and an Index into the item table, followed by the items whose X bit is set. Reserved bits MUST be zero; the decompressor MUST discard packets where they are non-zero.
section: 6.6.13.3
topics:
    - realtime
    - rtp
