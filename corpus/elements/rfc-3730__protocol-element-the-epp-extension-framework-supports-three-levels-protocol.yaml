document: rfc-3730
kind: protocol-element
summary: 'The EPP extension framework supports three levels: protocol extensions (new top-level <extension> child of <epp>), object extensions (new managed object types via XML namespace, referenced in <objURI>/<extURI>), and command-response extensions (per-command <extension> element agreed between client and server).'
section: "2.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
