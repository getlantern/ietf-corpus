document: rfc-3207
kind: security-consideration
summary: Both client and server must check the TLS negotiation result for acceptable authentication and privacy. Ignoring this step completely invalidates TLS security. If the negotiation yields insufficient privacy or authentication, either party should terminate the session.
section: "6"
topics:
