document: rfc-3544
kind: protocol-element
summary: TCP/Non-TCP Selective Compression Suboption (Type=3, Length=3, Parameter=1 octet) allows disabling TCP compression (Parameter=1) or non-TCP compression (Parameter=2). Including it twice with both values disables all compression. Overrides TCP_SPACE and NON_TCP_SPACE field values.
section: "2.4"
topics:
    - ip
    - tcp
