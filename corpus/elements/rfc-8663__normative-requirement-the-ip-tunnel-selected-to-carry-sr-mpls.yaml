document: rfc-8663
kind: normative-requirement
summary: The IP tunnel selected to carry SR-MPLS MUST have its remote endpoint (destination) address equal to the address of the next node capable of SR-MPLS identified as being on the SR path (i.e., the egress of the active segment).
section: "2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
