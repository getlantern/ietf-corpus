document: rfc-2137
kind: protocol-element
summary: 'The four-bit signatory field of a zone KEY RR encodes: bit 0 (mode — 0 = Mode A, 1 = Mode B), bit 1 (strong update feature enabled), bit 2 (unique name update feature enabled), and bit 3 (general — must be one if dynamic update is supported and other bits are zero).'
