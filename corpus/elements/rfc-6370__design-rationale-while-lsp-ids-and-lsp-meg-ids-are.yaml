document: rfc-6370
kind: design-rationale
summary: While LSP_IDs and LSP MEG_IDs are syntactically identical, they carry different semantics. If both are encoded in TLVs, different type codes MUST be assigned to distinguish them; the same applies to PW_Path_IDs and PW MEG_IDs.
