document: rfc-2255
kind: security-consideration
summary: The LDAP URL format allows specification of an arbitrary LDAP search operation; following an LDAP URL may cause unexpected results such as retrieval of large amounts of data or initiation of a long-lived search. The security implications are the same as resolving an LDAP search query.
section: "7"
topics:
    - ldap
    - security
