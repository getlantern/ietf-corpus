document: rfc-8150
kind: protocol-element
summary: The mplsLpsConfigTable configures MPLS-TP linear protection domains, indexed by mplsLpsConfigDomainIndex. Key objects include mplsLpsConfigMode (psc/aps), mplsLpsConfigProtectionType (1+1 unidirectional, 1:1 bidirectional, 1+1 bidirectional), mplsLpsConfigRevertive (revertive/nonrevertive), timer parameters, and mplsLpsConfigCommand for operator actions.
