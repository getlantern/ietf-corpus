document: rfc-9393
kind: design-rationale
summary: Integer indices are used instead of text labels to avoid the need for an explicit CoSWID version number. New constructs can be added by assigning new integer indices via the CoSWID Items registry; deprecated constructs can be replaced with new indices, allowing implementations to identify constructs by index alone.
