document: rfc-8311
kind: interoperability-note
summary: Routers not involved in ECN experiments should continue to treat ECT(0) and ECT(1) as equivalent, as specified in RFC 3168. This preserves backwards compatibility with deployed infrastructure while experiments that require differentiated treatment must be governed by their own Experimental RFC.
section: "2.2"
topics:
    - ecn
    - congestion
