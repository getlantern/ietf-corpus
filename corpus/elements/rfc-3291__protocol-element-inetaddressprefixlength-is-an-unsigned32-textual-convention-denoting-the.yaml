document: rfc-3291
kind: protocol-element
summary: InetAddressPrefixLength is an Unsigned32 textual convention denoting the number of contiguous leading 1-bits in an address mask. Maximum significant values are 32 for ipv4/ipv4z, 128 for ipv6/ipv6z, and 0 for dns. Must always be interpreted in the context of an InetAddressType.
section: "3"
topics:
