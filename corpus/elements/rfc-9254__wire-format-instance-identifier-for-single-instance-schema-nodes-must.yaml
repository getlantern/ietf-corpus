document: rfc-9254
kind: wire-format
summary: Instance-identifier for single-instance schema nodes MUST be encoded as a CBOR unsigned integer set to the target SID. For list entries, it MUST be a CBOR array whose first entry is the target SID and subsequent entries are the list key values in key-statement order.
section: 6.13.1
topics:
