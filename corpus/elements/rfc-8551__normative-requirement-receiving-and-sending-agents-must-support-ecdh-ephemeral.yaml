document: rfc-8551
kind: normative-requirement
summary: Receiving and sending agents MUST support ECDH ephemeral-static mode for P-256 (RFC 5753) and MUST support ECDH ephemeral-static for X25519 using HKDF-256 (RFC 8418) for key encryption. RSA encryption MUST- be supported; RSAES-OAEP SHOULD+ be supported.
section: "2.3"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
