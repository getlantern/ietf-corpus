document: rfc-9604
kind: normative-requirement
summary: For SRv6 BSIDs, it is RECOMMENDED to always explicitly specify the SRv6 Endpoint Behavior and SID Structure by setting BT=3. A sender MAY set BT=2, in which case the receiver interprets the SRv6 Endpoint Behavior and SID Structure according to local policy.
section: "5"
rfc2119_level: RECOMMENDED
topics:
