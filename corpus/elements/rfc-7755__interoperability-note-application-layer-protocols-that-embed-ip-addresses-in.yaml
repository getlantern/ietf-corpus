document: rfc-7755
kind: interoperability-note
summary: Application-layer protocols that embed IP addresses in their payload (e.g., FTP) are incompatible with SIIT-DC translation. Such protocols can be supported by deploying an ER that reverses the BR's translations before packets reach the NAT-incompatible application. Protocols that work through standard NAT44 will generally work through SIIT-DC.
section: "4.2"
topics:
    - ip
    - v6ops
    - nat
