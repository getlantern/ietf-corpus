document: rfc-6427
kind: design-rationale
summary: The clearing mechanism uses a 3.5× Refresh Timer expiration as a passive clearing method, with an active R-Flag procedure for faster clearing. The two-method design accommodates both normal fade-out and explicit notification without requiring the receiver to track sender state beyond the timer.
section: "5.2"
