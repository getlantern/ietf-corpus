document: rfc-7900
kind: security-consideration
summary: Provisioning errors in extranet VPN configurations are particularly dangerous because an extranet intentionally cross-connects VPNs; incorrect RT assignments or improperly scoped UMH-eligible routes can deliver multicast traffic to VPNs that should not receive it, constituting a VPN security violation.
section: "10"
topics:
