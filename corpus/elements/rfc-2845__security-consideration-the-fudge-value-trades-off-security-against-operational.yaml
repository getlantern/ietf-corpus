document: rfc-2845
kind: security-consideration
summary: The Fudge value trades off security against operational reliability. A too-large Fudge opens the server to replay attacks; a too-small Fudge causes failures on unsynchronized clocks or delayed networks. The recommended value is 300 seconds.
section: "6.4"
topics:
    - dns
    - security
