document: rfc-9697
kind: security-consideration
summary: By detecting an inconsistent Repository Server immediately and switching to the latest Snapshot File, RPs increase the probability of replacing stale or incorrect objects before they expire under the staleness rules of RFC 9286 Section 6.6, thereby reducing the window of invalid route-origin decisions.
section: "6"
topics:
    - routing
    - bgp
    - security
