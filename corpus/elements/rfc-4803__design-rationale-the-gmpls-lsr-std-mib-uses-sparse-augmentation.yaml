document: rfc-4803
kind: design-rationale
summary: The GMPLS-LSR-STD-MIB uses sparse augmentation of MPLS-LSR-STD-MIB tables rather than replacement, so that migration from MPLS to GMPLS management requires only adding new table support without removing existing MPLS objects. The gmplsInterfaceSignalingCaps object also allows GMPLS-LSR-STD-MIB to be deployed on MPLS-only interfaces for supplemental information.
section: "1.1"
topics:
    - mpls
