document: rfc-8665
kind: normative-requirement
summary: If an OSPF router advertises multiple Prefix-SIDs for the same prefix, topology, and algorithm, all of them MUST be ignored. A Prefix-SID with an algorithm value not advertised in the SR-Algorithm TLV by the remote node MUST also be ignored.
section: "5"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
