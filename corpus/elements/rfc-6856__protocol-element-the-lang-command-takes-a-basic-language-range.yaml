document: rfc-6856
kind: protocol-element
summary: The LANG command takes a basic language range argument (RFC 4647). On success, the server returns +OK followed by a space, the selected language tag, another space, and a human-readable confirmation in the chosen language encoded as UTF-8. On failure, -ERR is returned and the previous language remains in effect.
section: "3.2"
topics:
    - email
