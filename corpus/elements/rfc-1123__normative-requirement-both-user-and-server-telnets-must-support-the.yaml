document: rfc-1123
kind: normative-requirement
summary: Both User and Server Telnets MUST support the control functions AO, AYT, DM, IP, NOP, SB, and SE. A host MUST be able to receive and ignore any Telnet control function it does not support.
section: 3.2.3
rfc2119_level: MUST
topics:
