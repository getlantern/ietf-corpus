kind: normative-requirement
summary: If the URI list includes resources tagged with 'copyControl' set to 'to' or 'cc', the URI-list service SHOULD include a URI list in each outgoing MESSAGE request formatted as per RFC 4826 and RFC 5364, following procedures for 'anonymize', 'count', and 'copyControl' attributes.
