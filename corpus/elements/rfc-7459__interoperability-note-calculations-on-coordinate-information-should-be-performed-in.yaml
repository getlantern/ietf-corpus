document: rfc-7459
kind: interoperability-note
summary: Calculations on coordinate information should be performed in Cartesian (ECEF) space, not by treating latitude/longitude as Cartesian axes. The axes are not orthogonal, and treating them as such causes errors from earth curvature and convergence of longitude lines.
section: "5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
