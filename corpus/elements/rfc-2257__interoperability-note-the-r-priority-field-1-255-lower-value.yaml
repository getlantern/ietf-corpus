document: rfc-2257
kind: interoperability-note
summary: The r.priority field (1-255, lower value = higher precedence) in agentx-Register-PDU enables deterministic dispatching when independently developed subagents register overlapping or identical OID regions. Subagents with no priority preference should register at the default value of 255.
section: 7.1.5.1
topics:
    - snmp
