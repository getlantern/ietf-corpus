document: rfc-8486
kind: normative-requirement
summary: For channel mapping family 3, the demixing matrix MUST be provided in the channel mapping table part of the identification header. The total output channel number C MUST be set in the third field of the identification header.
section: "3.2"
rfc2119_level: MUST
