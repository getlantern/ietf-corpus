document: rfc-9593
kind: protocol-element
summary: SUPPORTED_AUTH_METHODS is a new IKEv2 Notify Message Type (value 16443) that carries a list of authentication methods supported by the sending party, ordered by preference. Protocol ID is set to 0 and SPI Size is set to 0. The notification data contains a variable-length list of announcements.
