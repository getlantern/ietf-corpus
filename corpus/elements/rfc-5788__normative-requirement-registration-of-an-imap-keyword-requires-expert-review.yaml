document: rfc-5788
kind: normative-requirement
summary: Registration of an IMAP keyword requires Expert Review per RFC 5226. The registration request must be posted to the Message Organization WG mailing list and CC'd to IANA, with at least two weeks allowed for community input before the expert decides.
section: "3"
rfc2119_level: REQUIRED
