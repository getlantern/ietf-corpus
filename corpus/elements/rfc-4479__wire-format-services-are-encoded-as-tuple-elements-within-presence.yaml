document: rfc-4479
kind: wire-format
summary: Services are encoded as <tuple> elements within <presence>; the service URI is carried in the <contact> child element. The 'id' attribute of <tuple> carries the service occurrence identifier. New attributes appear as direct children of <tuple>; pre-existing status attributes (e.g., <basic>) remain under <status>.
