document: rfc-8960
kind: security-consideration
summary: Read access to next-hop information paths (augmented with MPLS labels) and RPC active-route paths must be controlled, as disclosure of per-prefix next-hop and label information could facilitate further network attacks. NETCONF requires SSH (RFC 6242) and RESTCONF requires TLS 1.3 (RFC 8446) as mandatory secure transports.
section: "4"
topics:
    - mpls
    - yang
    - security
    - tls
