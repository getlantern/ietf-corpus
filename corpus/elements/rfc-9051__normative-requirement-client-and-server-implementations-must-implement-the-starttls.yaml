document: rfc-9051
kind: normative-requirement
summary: Client and server implementations MUST implement the STARTTLS and LOGINDISABLED capabilities on cleartext ports, and MUST implement the AUTH=PLAIN capability on both cleartext and Implicit TLS ports. These are mandatory baseline security requirements.
section: 6.1.1
rfc2119_level: MUST
