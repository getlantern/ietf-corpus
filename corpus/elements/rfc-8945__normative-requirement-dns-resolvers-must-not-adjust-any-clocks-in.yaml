document: rfc-8945
kind: normative-requirement
summary: DNS resolvers MUST NOT adjust any clocks in the client based on BADTIME errors. The server's time in the Other Data field SHOULD be logged for diagnostic purposes.
section: 5.4.3
rfc2119_level: MUST NOT
