document: rfc-7766
kind: security-consideration
summary: Wider use of DNS over TCP exposes servers to a higher risk of DoS attacks, including intentional connection exhaustion attacks. Servers are advised to engage in TCP connection management, including maintaining connection state, setting idle timeouts, controlling request queues, and limiting connections per source IP/subnet.
section: "10"
topics:
    - dns
    - tcp
    - security
