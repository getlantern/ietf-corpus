document: rfc-5497
kind: protocol-element
summary: A single-value Time TLV (tismultivalue flag cleared) contains one <time-data> structure in its value field, allowing a single time-value that may vary by hop count. It may appear as a Packet TLV, Message TLV, or Address Block TLV.
