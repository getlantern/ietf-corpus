document: rfc-9764
kind: security-consideration
summary: The 'ietf-bfd-large' YANG module must be accessed via YANG-based management protocols (NETCONF, RESTCONF) using a secure transport layer (SSH, TLS, QUIC) with mutual authentication. NACM (RFC 8341) provides access control for NETCONF/RESTCONF users.
section: "6.1"
topics:
