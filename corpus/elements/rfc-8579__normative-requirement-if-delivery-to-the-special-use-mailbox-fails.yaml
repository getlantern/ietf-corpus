document: rfc-8579
kind: normative-requirement
summary: If delivery to the special-use mailbox fails for reasons unrelated to its existence, the Sieve interpreter MUST NOT attempt delivery to the default mailbox as a fallback; it MUST proceed as if ':specialuse' were absent and delivery to the named mailbox had failed.
section: "4"
rfc2119_level: MUST NOT
topics:
    - email
