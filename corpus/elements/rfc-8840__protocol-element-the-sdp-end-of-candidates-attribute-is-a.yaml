document: rfc-8840
kind: protocol-element
summary: The SDP 'end-of-candidates' attribute is a property attribute (no value) that, when included by a sending agent in an Offer, Answer, or INFO request, indicates it will not trickle further candidates. It applies to the whole session at session level or to the corresponding media description at media level.
section: "8.1"
topics:
