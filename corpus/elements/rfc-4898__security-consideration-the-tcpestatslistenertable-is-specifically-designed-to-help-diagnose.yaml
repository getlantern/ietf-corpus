document: rfc-4898
kind: security-consideration
summary: The tcpEStatsListenerTable is specifically designed to help diagnose SYN-flood denial-of-service attacks by exposing counters for SYNs received, backlog entries, connections dropped from the backlog, and connections successfully accepted, providing operators visibility into attack severity without requiring packet captures.
