document: rfc-6329
kind: protocol-element
summary: The SPBV-ADDR sub-TLV (type 4, in MT-Capability TLV of LSP) advertises group MAC addresses for SPBV mode, associated with a 12-bit SPVID and 2-bit SR (service requirement) bits from MMRP. Each 48-bit MAC entry includes T (Transmit) and R (Receive) bits controlling multicast FDB state installation on transit bridges.
section: "16.2"
topics:
    - routing
