document: rfc-8500
kind: normative-requirement
summary: If the sub-TLV Len field is non-zero, the Value field MUST also contain one or more sub-TLVs. The sub-TLV Len value MUST be set to zero when an IS-IS router does not have Traffic Engineering sub-TLVs to send.
section: "2"
rfc2119_level: MUST
topics:
    - routing
