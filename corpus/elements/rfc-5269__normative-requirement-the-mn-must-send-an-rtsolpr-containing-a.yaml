document: rfc-5269
kind: normative-requirement
summary: The MN MUST send an RtSolPr containing a Handover Key Request Option with the handover encryption public key. A CGA MUST be the source address, and the MN MUST include the SEND CGA Option and SEND Signature Option. The SEND Nonce MUST also be included for anti-replay protection.
section: "3.1"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
