document: rfc-3292
kind: protocol-element
summary: The Reservation Management messages (Reservation Request, Delete Reservation, Delete All Reservations) allow the controller to pre-reserve switch resources identified by a Reservation ID; a valid non-zero Reservation ID in an Add Branch message causes the reserved traffic parameters to be applied and allows the Traffic Parameters Block to be omitted.
