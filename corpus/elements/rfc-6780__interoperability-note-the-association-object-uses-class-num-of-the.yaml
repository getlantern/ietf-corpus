document: rfc-6780
kind: interoperability-note
summary: The ASSOCIATION object uses Class-Num of the form 11bbbbbb (value 199) ensuring that non-supporting nodes ignore the object but forward it without modification per RFC 2205. Transit nodes that support ASSOCIATION but not Extended C-Types will forward without modification; egress nodes may generate an 'Unknown object C-Type' error that propagates to ingress.
section: "5"
topics:
    - mpls
    - routing
