document: rfc-5929
kind: interoperability-note
summary: '''tls-server-end-point'' is only available when cipher suites use the Certificate handshake message (PKIX-based), and is unavailable for anonymous, PSK (non-RSA), Kerberos, SRP (non-DSS/RSA), and OpenPGP cipher suites. ''tls-unique'' is applicable to more contexts.'
section: "6"
topics:
