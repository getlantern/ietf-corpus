document: rfc-9258
kind: design-rationale
summary: TLS 1.3 mandates that each PSK be used with only a single hash function to simplify protocol analysis. This constraint motivates the PSK importer interface, which binds external PSKs to a specific KDF, protocol version, and optional context string so that a single external PSK yields distinct imported PSKs per target.
