document: rfc-4291
kind: wire-format
summary: The preferred text representation of IPv6 addresses is x:x:x:x:x:x:x:x, where each 'x' is one to four hexadecimal digits of the eight 16-bit pieces. Leading zeros within a field may be omitted but every field must have at least one numeral.
