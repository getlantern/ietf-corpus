document: rfc-9132
kind: protocol-element
summary: The 'trigger-mitigation' boolean (default true) controls when mitigation activates. When set to false, mitigation is not triggered unless the DOTS signal channel session is lost, enabling preconfigured 'break-glass' mitigation that activates on session loss.
section: 4.4.1.1
topics:
