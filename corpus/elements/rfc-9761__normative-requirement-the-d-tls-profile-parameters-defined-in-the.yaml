document: rfc-9761
kind: normative-requirement
summary: The (D)TLS profile parameters defined in the YANG module MUST NOT include GREASE values for extension types, named groups, signature algorithms, (D)TLS versions, pre-shared key exchange modes, cipher suites, and any other TLS parameters defined in future RFCs.
section: "5"
rfc2119_level: MUST NOT
