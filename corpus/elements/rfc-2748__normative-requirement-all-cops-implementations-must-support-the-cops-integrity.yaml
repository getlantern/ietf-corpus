document: rfc-2748
kind: normative-requirement
summary: All COPS implementations MUST support the COPS Integrity object and its mechanisms, including HMAC-MD5-96 as the mandatory minimum cryptographic algorithm (HMAC applied to MD5, truncated to 96 bits). The Keyed Message Digest field MUST be 96 bits when HMAC-MD5-96 is used.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - crypto
