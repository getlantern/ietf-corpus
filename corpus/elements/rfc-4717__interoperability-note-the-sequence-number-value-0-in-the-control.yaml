document: rfc-4717
kind: interoperability-note
summary: The sequence number value 0 in the control word indicates that the sequence number check algorithm is not used; a PE that negotiated not to use sequence number processing and receives a non-zero sequence number SHOULD send a PW status message indicating a receive fault and disable the PW.
section: 5.1.3
rfc2119_level: SHOULD
topics:
    - mpls
