document: rfc-6530
kind: design-rationale
summary: In-transit downgrading was eliminated from the standards-track specifications after experimentation revealed that the earlier mechanism (RFC 5504) caused interoperability problems among initial implementations and was more complex and less necessary than assumed. Requiring each non-ASCII address to be accompanied by an all-ASCII equivalent also raised unauthenticated address-pairing security concerns.
section: "6"
topics:
