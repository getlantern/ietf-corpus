document: rfc-6347
kind: normative-requirement
summary: Implementations MUST either discard or buffer all application data packets for a new epoch until they have received the Finished message for that epoch, preventing use of keying material before the handshake completes.
section: 4.2.4
rfc2119_level: MUST
topics:
    - tls
    - security
