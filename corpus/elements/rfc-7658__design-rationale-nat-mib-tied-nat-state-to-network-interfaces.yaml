document: rfc-7658
kind: design-rationale
summary: NAT-MIB tied NAT state to network interfaces (interface table, map entries grouped by interface), but many NAT implementations do not track the interface or associate mappings to sets of interfaces. The lesson is that NAT is a logical function that may be independent of interfaces.
section: "3.1"
topics:
    - nat
    - snmp
