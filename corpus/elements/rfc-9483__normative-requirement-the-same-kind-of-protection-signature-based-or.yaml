document: rfc-9483
kind: normative-requirement
summary: The same kind of protection (signature-based or MAC-based) MUST be used for all messages of a single PKI management operation. Protection MUST be present except for error messages where protection is not technically feasible.
section: "3.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
