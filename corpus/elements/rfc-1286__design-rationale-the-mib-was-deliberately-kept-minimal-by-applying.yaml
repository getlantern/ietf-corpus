document: rfc-1286
kind: design-rationale
summary: 'The MIB was deliberately kept minimal by applying six criteria: start small; require objects be essential for fault or configuration management; consider evidence of current use; limit total object count; exclude objects derivable from other MIBs; and instrument at most one counter per critical section per layer.'
