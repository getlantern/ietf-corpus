document: rfc-7224
kind: registry
summary: The 'ifType definitions' registry (IANA SMI numbers registry) is the authoritative source for interface type assignments. This document adds RFC 7224 as a reference to that registry and adds a note requiring the iana-if-type YANG module to be updated whenever the registry is modified.
