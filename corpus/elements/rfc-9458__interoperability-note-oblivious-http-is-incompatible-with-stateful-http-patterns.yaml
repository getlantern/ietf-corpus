document: rfc-9458
kind: interoperability-note
summary: Oblivious HTTP is incompatible with stateful HTTP patterns such as cookies, HTTP authentication, and alternative services, because it removes transport-layer linkability between requests. It is only suitable for applications that do not carry state between requests.
section: "2.1"
topics:
    - http
    - privacy
