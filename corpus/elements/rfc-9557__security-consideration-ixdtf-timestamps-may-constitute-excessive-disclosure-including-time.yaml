document: rfc-9557
kind: security-consideration
summary: 'IXDTF timestamps may constitute excessive disclosure: including time zone names, calendar system, or language preferences reveals information about the originator that may violate the data minimization principle. Generators must assess whether such information is appropriate to divulge and err on the side of omission when the recipient set is not under the originator''s control.'
section: "7.1"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
