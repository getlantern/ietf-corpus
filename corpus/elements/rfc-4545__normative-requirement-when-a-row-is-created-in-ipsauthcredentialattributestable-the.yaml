document: rfc-4545
kind: normative-requirement
summary: When a row is created in ipsAuthCredentialAttributesTable, the management station MUST also create a corresponding row in the table specified by ipsAuthCredAuthMethod (e.g., ipsAuthCredChapAttributesTable for CHAP). When the credential row is deleted, the agent MUST automatically delete the corresponding method-specific row.
