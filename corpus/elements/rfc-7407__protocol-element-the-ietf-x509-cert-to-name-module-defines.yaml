document: rfc-7407
kind: protocol-element
summary: 'The ietf-x509-cert-to-name module defines a cert-to-name grouping used to map X.509 certificates to names. Each list entry (keyed by uint32 id) specifies a fingerprint, a map-type identityref (one of: specified, san-rfc822-name, san-dns-name, san-ip-address, san-any, common-name), and an optional name string active when map-type is ''specified''.'
section: "4.1"
topics:
