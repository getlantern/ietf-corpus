summary: 'The DHCP Authentication option (code 90) format used by this protocol: Code (8 bits), Length (8 bits), Protocol=3 (8 bits), Algorithm=1 (8 bits), RDM=0 (8 bits), Replay Detection (64 bits), Authentication Information (variable). The Authentication Information sub-field format is: Type (8 bits) + Value (128 bits).'
