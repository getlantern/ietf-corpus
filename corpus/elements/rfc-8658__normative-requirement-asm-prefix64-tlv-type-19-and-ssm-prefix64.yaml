document: rfc-8658
kind: normative-requirement
summary: ASM-Prefix64 (TLV-Type 19) and SSM-Prefix64 (TLV-Type 20) MUST each be a /96 prefix per RFC 8115, encoded as a 16-octet ipv6prefix TLV. The conveyed ASM prefix MUST belong to the ASM range and SSM prefix MUST belong to the SSM range.
section: 3.3.1
rfc2119_level: MUST
topics:
    - radius
    - multicast
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
