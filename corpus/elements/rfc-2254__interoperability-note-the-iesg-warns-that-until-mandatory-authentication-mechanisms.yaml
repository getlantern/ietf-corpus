document: rfc-2254
kind: interoperability-note
summary: The IESG warns that until mandatory authentication mechanisms are standardized, clients and servers implementing LDAP update functionality are UNLIKELY TO INTEROPERATE, or MAY INTEROPERATE ONLY IF AUTHENTICATION IS REDUCED TO AN UNACCEPTABLY WEAK LEVEL.
section: "1"
topics:
