document: rfc-4302
kind: normative-requirement
summary: If AH is incorporated into a system that supports auditing, the AH implementation MUST support auditing and MUST allow a system administrator to enable or disable auditing. There is no requirement to transmit a message to the sender upon detection of an auditable event, to avoid denial-of-service risks.
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
