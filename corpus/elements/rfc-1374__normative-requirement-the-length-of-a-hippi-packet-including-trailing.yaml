document: rfc-1374
kind: normative-requirement
summary: The length of a HIPPI packet including trailing fill shall be a multiple of 8 octets as required by HIPPI-LE; D2_Size shall contain the number of octets in the IEEE 802.2 LLC Type 1 PDU (not including fill) and shall not exceed 65,288 decimal.
section: Protocol/Packet Format
rfc2119_level: MUST
topics:
    - ip
