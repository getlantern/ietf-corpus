document: rfc-4931
kind: normative-requirement
summary: The 'ok' status MUST NOT be combined with any other status. The five pending* status values MUST NOT be combined with each other. Each pending* status MUST NOT be combined with its corresponding *Prohibited status (e.g., pendingDelete MUST NOT combine with clientDeleteProhibited or serverDeleteProhibited).
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - dns
