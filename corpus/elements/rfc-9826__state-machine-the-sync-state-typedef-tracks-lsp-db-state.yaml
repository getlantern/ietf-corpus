document: rfc-9826
kind: state-machine
summary: 'The ''sync-state'' typedef tracks LSP-DB state synchronization with three values: pending(0, not started), ongoing(1), and finished(2), as defined for stateful PCE synchronization in RFC 8231. The ''lspdb-sync'' leaf in the session node uses this type.'
