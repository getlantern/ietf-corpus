document: rfc-8016
kind: normative-requirement
summary: When a server receives a Refresh request with MOBILITY-TICKET and the decrypted ticket's 5-tuple does not identify an existing allocation, the server MUST reject the request with a 437 (Allocation Mismatch) error.
