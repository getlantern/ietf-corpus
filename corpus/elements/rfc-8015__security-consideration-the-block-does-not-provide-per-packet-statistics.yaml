document: rfc-8015
kind: security-consideration
summary: The block does not provide per-packet statistics, so the per-packet confidentiality risk in RFC 3611 Section 7 paragraph 3 does not apply. However, the gap timing information could reveal when competing multimedia streams were active on the path, allowing inference of when a competing stream was present.
section: "7"
topics:
    - security
    - rtp
    - realtime
