document: rfc-2560
kind: protocol-element
summary: 'Three time fields convey response validity: thisUpdate (time at which the indicated status is known correct), nextUpdate (time at or before which newer status will be available), and producedAt (time the OCSP responder signed the response). Absence of nextUpdate means newer revocation information is continuously available.'
section: "2.4"
