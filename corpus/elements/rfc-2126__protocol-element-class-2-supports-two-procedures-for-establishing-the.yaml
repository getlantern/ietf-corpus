summary: 'Class 2 supports two procedures for establishing the separate Expedited Data TCP connection: Forward Connection (Splitting and Recombining, defined in ISO 8073) and Reverse Connection (not in ISO 8073), where the responder opens a second TCP connection back to the initiator''s listening port before issuing the CC TPDU.'
