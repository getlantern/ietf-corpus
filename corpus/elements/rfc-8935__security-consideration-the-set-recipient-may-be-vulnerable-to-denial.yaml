document: rfc-8935
kind: security-consideration
summary: The SET Recipient may be vulnerable to denial-of-service attacks where a malicious party sends high volumes of invalid SETs, exhausting resources on cryptographic operations. Mitigations include mutual TLS for transmitter authentication and rate-limiting problematic transmitters.
section: "5.4"
topics:
    - security
    - tls
