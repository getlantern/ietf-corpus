document: rfc-9270
kind: protocol-element
summary: 'The Operational (O) bit in the PROTECTION object is updated: when set to 1, it indicates the protecting LSP is carrying traffic after protection switching. The O bit is only applicable when the P bit is set to 1 and the LSP Protection Type is 0x04, 0x08, 0x10, or 0x20.'
section: "6.2"
topics:
    - mpls
    - routing
