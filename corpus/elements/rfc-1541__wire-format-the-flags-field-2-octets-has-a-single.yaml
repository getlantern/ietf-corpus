document: rfc-1541
kind: wire-format
summary: 'The ''flags'' field (2 octets) has a single defined bit: the BROADCAST (B) flag at the leftmost position. Remaining 15 bits are MBZ (MUST BE ZERO). Clients set B=1 when they cannot receive unicast before being configured with an IP address.'
