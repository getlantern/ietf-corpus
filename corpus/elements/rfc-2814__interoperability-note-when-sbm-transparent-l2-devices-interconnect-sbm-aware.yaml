document: rfc-2814
kind: interoperability-note
summary: When SBM-transparent L2 devices interconnect SBM-aware devices, the resulting managed segment spans multiple physical segments and the single DSBM must approximate aggregate capacity with limited topology knowledge. A conservative policy configures the DSBM for the lowest-capacity path; a liberal policy uses the highest-capacity path.
section: "6.2"
topics:
    - qos
