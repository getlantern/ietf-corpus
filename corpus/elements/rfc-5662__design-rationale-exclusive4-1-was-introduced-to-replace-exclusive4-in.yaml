document: rfc-5662
kind: design-rationale
summary: EXCLUSIVE4_1 was introduced to replace EXCLUSIVE4 in non-persistent sessions because EXCLUSIVE4_1 combines the creation verifier with initial attribute setting in a single creatverfattr structure, avoiding a separate SETATTR round-trip while still providing exactly-once create semantics.
