document: rfc-1044
kind: protocol-element
summary: The CRC (End-End Message Integrity) flag in the 32-bit Message Flags causes newer-technology adapters to append a 32-bit CRC over the entire network message to the end of the Associated Data on transmission, and verify and strip it on reception. If a message arrives at the host with this bit still set, the associated data is four bytes longer than expected because the hardware CRC was not removed.
section: 32-BIT MESSAGE FIELDS / MESSAGE FLAGS (CRC)
topics:
    - security
    - ip
