document: rfc-6374
kind: wire-format
summary: 'Combined Loss/Delay Measurement message merges DM and LM: second word carries DFlags(4b)/QTF(4b)/RTF(4b)/RPTF(4b)/Reserved(16b), followed by Session Identifier/DS, four 8-byte Timestamp fields, four 8-byte Counter fields, and an optional TLV Block. The QTF and Timestamp 1 fields serve the roles of OTF and Origin Timestamp.'
