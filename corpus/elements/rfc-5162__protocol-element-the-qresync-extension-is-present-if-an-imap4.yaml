document: rfc-5162
kind: protocol-element
summary: The QRESYNC extension is present if an IMAP4 server returns 'QRESYNC' as one of the supported capabilities to the CAPABILITY command. Servers supporting this extension MUST implement and advertise support for the ENABLE IMAP extension. The presence of 'QRESYNC' capability implies support for CONDSTORE even if CONDSTORE is not advertised.
section: "1"
topics:
