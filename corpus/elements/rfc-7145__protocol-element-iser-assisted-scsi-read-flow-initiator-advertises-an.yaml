document: rfc-7145
kind: protocol-element
summary: 'iSER-assisted SCSI Read flow: initiator advertises an STag in the SCSI Command PDU; target uses one or more RDMA Writes to place data into the advertised buffer; target sends SCSI Response PDU via Send Message, optionally using Send with Invalidate for automatic STag invalidation.'
