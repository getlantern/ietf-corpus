document: rfc-4598
kind: design-rationale
summary: 'Concatenation of E-AC-3 frames in RTP packets is constrained so that program sets and frame sets are kept intact within a single packet. This minimizes the impact of packet loss: losing one packet does not render the contents of another packet unusable.'
section: "4.3"
topics:
