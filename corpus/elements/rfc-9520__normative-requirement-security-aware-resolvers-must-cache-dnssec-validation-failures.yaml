document: rfc-9520
kind: normative-requirement
summary: Security-aware resolvers MUST cache DNSSEC validation failures (with restrictions on TTL). This strengthens RFC 4035 Section 4.7, which previously allowed caching with MAY.
section: "3.4"
rfc2119_level: MUST
