document: rfc-6818
kind: design-rationale
summary: The acceptable encodings for the explicitText field were updated to prohibit IA5String (previously allowed) and to permit VisibleString and BMPString (previously prohibited). This change aligns the specification with existing deployed practice rather than requiring a break from common implementations.
