document: rfc-6022
kind: interoperability-note
summary: The dropped-sessions counter is NOT incremented for sessions closed by <close-session> or killed by <kill-session>; it only counts abnormally terminated sessions (idle timeout, transport close), which implementers must distinguish carefully.
