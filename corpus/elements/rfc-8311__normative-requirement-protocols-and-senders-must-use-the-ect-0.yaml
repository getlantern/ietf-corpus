document: rfc-8311
kind: normative-requirement
summary: Protocols and senders MUST use the ECT(0) codepoint to indicate ECN-Capable Transport (ECT) unless otherwise specified by an Experimental RFC in the IETF document stream. Protocols and senders MUST NOT use the ECT(1) codepoint to indicate ECT unless otherwise specified by an Experimental RFC in the IETF document stream.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
