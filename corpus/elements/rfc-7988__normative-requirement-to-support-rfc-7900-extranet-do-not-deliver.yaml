document: rfc-7988
kind: normative-requirement
summary: To support RFC 7900 extranet 'Do Not Deliver Packets from the Wrong P-tunnel' procedures, the MPLS labels in Leaf A-D routes from a given egress PE MUST be unique for the ordered triple <root, root RD, parent node>, where root RD is taken from the RD field in the IR P-tunnel identifier.
section: "7.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
