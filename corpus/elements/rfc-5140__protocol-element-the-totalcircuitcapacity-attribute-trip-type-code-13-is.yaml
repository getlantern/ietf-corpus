document: rfc-5140
kind: protocol-element
summary: The TotalCircuitCapacity attribute (TRIP Type Code 13) is a 4-octet unsigned integer representing the total number of PSTN circuits administratively provisioned for a route. It reflects static capacity as opposed to real-time availability and MAY be propagated beyond the receiving LS.
section: "4.1"
