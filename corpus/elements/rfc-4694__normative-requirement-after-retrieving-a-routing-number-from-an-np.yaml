document: rfc-4694
kind: normative-requirement
summary: After retrieving a routing number from an NP database for a geographical telephone number, the network node MUST add both the "rn" parameter and the "npdi" parameter to the "tel" URI. If no routing number is retrieved, it MUST still add "npdi".
section: 5.2.1
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
