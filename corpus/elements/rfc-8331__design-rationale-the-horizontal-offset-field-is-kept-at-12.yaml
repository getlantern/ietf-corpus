document: rfc-8331
kind: design-rationale
summary: The Horizontal_Offset field is kept at 12 bits to maintain easy conversion to/from SMPTE ST 2038, which also uses a 12-bit Horizontal_Offset field, even though some future formats might require larger values (handled by the 0xFFC special value).
