document: rfc-8348
kind: protocol-element
summary: The 'ietf-hardware' module defines a flat list of hardware components under '/hardware/component', each identified by a mandatory 'name' key and a mandatory 'class' leaf (identityref based on 'ianahw:hardware-class'). Components may reference parent/child relationships and carry identification, revision, sensor, and state sub-containers.
