document: rfc-9164
kind: wire-format
summary: An IPv6 address-with-prefix (Interface Format) is encoded as tag 54 wrapping a two-element array with the full 16-byte address first, followed by the network prefix length; an optional third element carries the zone identifier as an integer (interface index) or text string (interface name).
