document: rfc-7044
kind: normative-requirement
summary: 'A SIP entity MUST add an hi-index to each hi-entry following these rules: forwarding without target change appends ''.1'' to the current index; subsequent forks by the same entity increment the rightmost integer; the first index is always 1; and a gap (missing entry) is represented by inserting ''.0'' before the new index.'
section: "10.3"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
