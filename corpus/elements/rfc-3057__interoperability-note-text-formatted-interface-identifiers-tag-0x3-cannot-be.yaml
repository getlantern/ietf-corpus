document: rfc-3057
kind: interoperability-note
summary: Text-formatted Interface Identifiers (Tag 0x3) cannot be mixed with integer (Tag 0x1) or integer-range (Tag 0x8) types in the same message. An SG that only supports integer format will return an 'Unsupported Interface Identifier Type' error, requiring the ASP to resend with an integer Interface Identifier.
section: 3.3.2.5
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
