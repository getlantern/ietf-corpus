document: rfc-5256
kind: design-rationale
summary: Translations of 're' or 'fw'/'fwd' subject prefix tokens are not specified for removal in base subject extraction, because adding language-specific translated tokens would result in a geometrically complex and ultimately unimplementable task. Instead, [RFC2822] recommends adopting 're:' universally, with localization handled at display time by the client.
section: "7"
