document: rfc-7372
kind: design-rationale
summary: The codes are introduced to serve mailing list software and other agents that need to distinguish authentication failures from other rejection reasons (e.g., invalid recipient). A single SMTP exchange can return only one enhanced status code, so the multiple-failure code X.7.26 exists to convey that more than one mechanism failed without requiring enumeration.
