document: rfc-8999
kind: protocol-element
summary: A Connection ID is an opaque field of arbitrary length whose primary function is to ensure that lower-layer addressing changes (UDP, IP) do not cause packets to be delivered to the wrong QUIC endpoint. The connection ID is chosen by each endpoint using version-specific methods, and packets for the same connection may use different connection ID values.
section: "5.3"
topics:
    - quic
