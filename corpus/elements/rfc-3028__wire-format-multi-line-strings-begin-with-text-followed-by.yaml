document: rfc-3028
kind: wire-format
summary: Multi-line strings begin with 'text:' followed by CRLF and end with a CRLF, a single period, and another CRLF. Lines beginning with '.' are dot-stuffed (an extra '.' is prepended) to allow embedded single-dot lines; the implementation removes these extra dots when interpreting the script.
section: 2.4.2
topics:
    - email
