document: rfc-6514
kind: wire-format
summary: The Intra-AS I-PMSI A-D Route NLRI carries an 8-octet Route Distinguisher (encoded per RFC 4364) followed by the Originating Router's IP Address. The <RD, Originating Router's IP Address> tuple uniquely identifies a multicast VRF.
