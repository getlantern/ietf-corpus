document: rfc-5656
kind: normative-requirement
summary: Implementers SHOULD ensure that ephemeral private keys and random values (including k in ECDSA and ephemeral keys in ECDH/ECMQV) are generated from a proper RNG, protected from leakage, not reused outside the protocol context, and erased from memory when no longer needed.
section: "9"
rfc2119_level: SHOULD
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
