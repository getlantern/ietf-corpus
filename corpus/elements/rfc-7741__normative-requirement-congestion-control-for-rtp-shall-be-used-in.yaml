document: rfc-7741
kind: normative-requirement
summary: Congestion control for RTP SHALL be used in accordance with RFC 3550 and applicable RTP profiles. Media-aware network elements MAY use the VP8 payload descriptor to identify non-reference frames and discard them to reduce congestion, but only when the stream is unencrypted.
section: "8"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
