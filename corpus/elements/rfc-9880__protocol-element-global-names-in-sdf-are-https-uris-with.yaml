document: rfc-9880
kind: protocol-element
summary: Global names in SDF are https:// URIs with JSON Pointer fragment identifiers. The absolute-URI is the default namespace; the fragment is derived from the JSON Pointer to the definition. These URIs are not required to be dereferenceable.
