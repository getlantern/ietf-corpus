document: rfc-2515
kind: design-rationale
summary: AAL5 in an ATM switch is managed via a proprietary virtual (pseudo-ATM) internal interface in ifTable to represent the AAL5 entity as an infrastructure resource, while per-VCC AAL5 performance uses a separate aal5VccTable; this separation allows both entity-level and connection-level management.
