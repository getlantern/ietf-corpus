document: rfc-4825
kind: security-consideration
summary: The default authorization policy permits each user to read, modify, and delete only the documents under their own home directory. Any user may read documents in the global tree, but only explicitly provisioned trusted users may modify global documents. Application usages may override this default.
section: "5.7"
topics:
    - security
    - http
extracted_by: claude-sonnet-4-6
