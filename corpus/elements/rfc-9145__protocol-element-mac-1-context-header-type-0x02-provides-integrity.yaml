document: rfc-9145
kind: protocol-element
summary: MAC#1 Context Header (Type 0x02) provides integrity protection covering the Service Path Header, Context Headers, and the inner packet, but excludes the Base Header (first level of assurance). It does not require sharing MAC_KEY with SFFs and does not require SFFs to recompute the MAC during TTL processing.
section: "5.1"
topics:
