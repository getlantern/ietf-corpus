document: rfc-4030
kind: protocol-element
summary: Algorithm 1 (HMAC-SHA1) requires a shared secret key configured at both relay agent and DHCP server. A 32-bit Key ID identifies which shared key was used; Key ID values are locally significant only and carry no protocol-level semantics.
