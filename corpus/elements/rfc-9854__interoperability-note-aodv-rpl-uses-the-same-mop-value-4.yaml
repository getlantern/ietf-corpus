document: rfc-9854
kind: interoperability-note
summary: AODV-RPL uses the same MOP value (4, 'P2P Route Discovery') as P2P-RPL (RFC 6997) but does not conflict with it because AODV-RPL uses newly defined DIO option types (0x0B, 0x0C, 0x0D) and a newly allocated multicast group (224.0.0.69). AODV-RPL can operate concurrently with P2P-RPL or base RPL (RFC 6550).
section: "1"
topics:
    - routing
