document: rfc-5740
kind: interoperability-note
summary: NORM is compatible with both IPv4 and IPv6. It can operate with NAT devices provided the NAT supports IP multicast and/or can maintain UDP source port mappings for unicast return-path feedback. NORM does not define NAT traversal mechanisms itself; correct NAT behavior is an environmental prerequisite.
section: "1.4"
topics:
    - multicast
    - nat
    - ip
    - v6ops
