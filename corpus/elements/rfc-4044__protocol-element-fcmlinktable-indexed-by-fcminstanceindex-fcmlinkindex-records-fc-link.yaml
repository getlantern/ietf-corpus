document: rfc-4044
kind: protocol-element
summary: fcmLinkTable (indexed by {fcmInstanceIndex, fcmLinkIndex}) records FC link topology as known to local management instances. Each entry captures both ends of a link (node WWN, physical port number, port WWN), plus the remote end's agent address, port type, unit type, and FC address identifier.
