document: rfc-1938
kind: design-rationale
summary: The seed is transmitted in clear text so that clients can use the same secret pass-phrase on multiple machines using different seeds, and can safely recycle pass-phrases by changing the seed without ever sending the pass-phrase over the network.
section: "6.0"
topics:
    - security
