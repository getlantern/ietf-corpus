document: rfc-3840
kind: security-consideration
summary: Media feature tags reveal sensitive information about the user or UA, including capability information (media types, methods, extensions) that could be used for industrial espionage, and more sensitive characteristics (mobility, priority, isfocus, language) that reveal user preferences and behavior. Applications utilizing these tags SHOULD provide confidentiality, integrity, and authenticity mechanisms.
section: "11.1"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
