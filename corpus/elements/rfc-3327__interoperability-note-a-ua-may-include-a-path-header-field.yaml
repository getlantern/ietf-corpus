document: rfc-3327
kind: interoperability-note
summary: 'A UA MAY include a Path header field in a REGISTER request, but caution is required: intermediate proxies will treat the UA-inserted value as if it were inserted by a previously traversed proxy, which could result in unexpected routing behavior where the UA is asked to act as a proxy.'
section: "5.1"
topics:
    - sip
    - realtime
