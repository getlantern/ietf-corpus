document: rfc-7463
kind: protocol-element
summary: The 'shared' Event header field parameter is included in SUBSCRIBE, NOTIFY, and PUBLISH requests for the dialog event package to signal support for this specification. Its presence in a NOTIFY also allows UAs to discover the Appearance Agent without a failed SUBSCRIBE.
