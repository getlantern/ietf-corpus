document: rfc-1116
kind: wire-format
summary: 'The SLC suboption carries a list of octet triplets: the first octet is the function code (1–18), the second contains level bits (SLC_LEVELBITS, mask 0x03) plus flag bits SLC_ACK (128), SLC_FLUSHIN (64), and SLC_FLUSHOUT (32), and the third is the ASCII character value. Any octet equal to IAC must be doubled.'
