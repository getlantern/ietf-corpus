summary: 'Link-Protecting + Downstream-paths-only LFA inequality: D_opt(N,PO_i) + Cost(PO_i,P) < D_opt(S,PO_best) + Cost(PO_best,P). This stricter condition ensures N''s path to P is strictly shorter than S''s best path, applicable to more complex failure scenarios.'
