document: rfc-8826
kind: normative-requirement
summary: It MUST NOT be possible for arbitrary sites to initiate calls to arbitrary locations without user consent. Allowing arbitrary sites to initiate calls would allow any malicious site to bug a user's computer without their knowledge.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - security
