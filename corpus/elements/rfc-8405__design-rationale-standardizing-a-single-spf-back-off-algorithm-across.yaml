document: rfc-8405
kind: design-rationale
summary: Standardizing a single SPF back-off algorithm across implementations reduces the differential in SPF computation timing between routers, which in turn reduces the probability and duration of transient micro-loops during IGP convergence caused by routers computing FIBs from different LSDB versions.
