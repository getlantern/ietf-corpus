document: rfc-3339
kind: design-rationale
summary: Two-digit years are deprecated because they introduce ambiguity and because programs that compute years as offsets from 1900 can produce three-digit or non-numeric representations for years after 1999, demonstrating why all dates and times in Internet protocols MUST be fully qualified.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
