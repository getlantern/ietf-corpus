document: rfc-5619
kind: normative-requirement
summary: For the softwire mesh data plane, softwire MUST support IPsec tunnel; the implementation MUST support ESP with null encryption (RFC 4303) or AH (RFC 4302). If no PKI is available, the IPsec Tunnel Authentication sub-TLV (RFC 5566) MUST be used before SA establishment.
section: 4.4.2
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
