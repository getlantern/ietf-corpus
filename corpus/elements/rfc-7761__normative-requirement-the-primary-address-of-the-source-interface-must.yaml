document: rfc-7761
kind: normative-requirement
summary: The primary address of the source interface MUST NOT be listed within the Address List Hello option. All addresses within one Address List Hello option MUST be of the same address family; mixing IPv4 and IPv6 addresses in one message is not permitted.
section: 4.3.4
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
