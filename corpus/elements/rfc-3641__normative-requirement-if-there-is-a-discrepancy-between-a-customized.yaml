document: rfc-3641
kind: normative-requirement
summary: If there is a discrepancy between a customized ABNF description provided by another specification and the GSER encoding defined by this document, the GSER encoding takes precedence. Specifications providing customized ABNF SHOULD state this explicitly.
section: "1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
