document: rfc-9965
kind: security-consideration
summary: On-path attackers can succeed against the provisioning methods defined here because public credentials and/or skipping server certificate validation removes normal EAP protections. All EAP session data must be treated as visible and modifiable by attackers, and these methods must only be used for initial bootstrapping.
section: "7.1"
topics:
    - security
