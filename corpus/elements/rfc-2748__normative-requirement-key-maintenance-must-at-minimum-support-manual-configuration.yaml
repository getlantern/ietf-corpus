document: rfc-2748
kind: normative-requirement
summary: Key maintenance MUST at minimum support manual configuration of keys and their parameters locally. Keys MUST be configurable with overlapping lifetimes to allow smooth transitions; senders should switch to the longer-lived key at the midpoint of the overlap period.
section: "4.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
