document: rfc-3454
kind: protocol-element
summary: Appendix B.2 provides case-folding mapping tables for use with NFKC normalization; Appendix B.3 provides case-folding tables for use without normalization. Both map uppercase to lowercase and are derived from the Unicode 3.2 CaseFolding.txt file. B.2 adds entries for Greek characters and symbols containing Latin characters that B.3 omits.
