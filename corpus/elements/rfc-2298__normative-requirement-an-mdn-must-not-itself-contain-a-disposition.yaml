document: rfc-2298
kind: normative-requirement
summary: An MDN MUST NOT itself contain a Disposition-Notification-To header, and MUST NOT be generated in response to another MDN. This prevents mail loops.
section: "2.1"
rfc2119_level: MUST NOT
topics:
