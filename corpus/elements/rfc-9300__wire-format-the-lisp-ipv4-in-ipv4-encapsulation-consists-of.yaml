document: rfc-9300
kind: wire-format
summary: The LISP IPv4-in-IPv4 encapsulation consists of an outer IPv4 header (OH) with Protocol=17, a UDP header with destination port 4341, an 8-octet LISP-specific header containing N/L/E/V/I/R/KK flag bits, a Nonce/Map-Version field, and an Instance ID/Locator-Status-Bits field, followed by the inner IP header with EID source and destination addresses.
section: "5.1"
topics:
