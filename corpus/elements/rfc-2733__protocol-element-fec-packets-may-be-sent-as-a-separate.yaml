document: rfc-2733
kind: protocol-element
summary: FEC packets may be sent as a separate RTP stream (with its own sequence number space) or as a secondary codec using the RFC 2198 redundant encodings payload format. When sent as a separate stream, FEC timestamps are derived from the media but increment monotonically, which is compatible with header compression requiring fixed deltas.
section: "3"
topics:
