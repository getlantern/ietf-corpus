document: rfc-6188
kind: security-consideration
summary: AES-128 is considered more than adequate for confidentiality today, but AES-192 and AES-256 serve as a fallback against future cryptanalytic advances. AES-256 is conjectured to provide security even against adversaries with quantum computers operating on 256 or more qubits.
