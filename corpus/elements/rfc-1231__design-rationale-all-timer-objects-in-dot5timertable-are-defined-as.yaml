document: rfc-1231
kind: design-rationale
summary: All timer objects in dot5TimerTable are defined as read-only, but implementors are explicitly encouraged to provide read-write access where possible and useful, while giving due consideration to the dangers of writable timers. This balances operational flexibility against the risk of misconfiguration.
