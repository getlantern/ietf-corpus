document: rfc-3893
kind: normative-requirement
summary: In an AIB for a response to an INVITE, the From header MUST correspond to the address-of-record of the responder (not the From of the request), and the To header field of the request MUST NOT be included.
section: "6"
rfc2119_level: MUST
topics:
