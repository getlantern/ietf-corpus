document: rfc-6503
kind: normative-requirement
summary: For blueprintsRequest and confsRequest messages, the <confObjID> and <operation> parameters MUST NOT be included, as these are retrieve-only operations for listing available blueprints or conferences. The <confUserID> MUST be included in every such message.
section: 5.3.1
rfc2119_level: MUST NOT
