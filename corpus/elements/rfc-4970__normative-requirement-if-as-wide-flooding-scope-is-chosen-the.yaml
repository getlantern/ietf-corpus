document: rfc-4970
kind: normative-requirement
summary: If AS-wide flooding scope is chosen, the originating router should also advertise area-scoped RI LSA(s) into any attached NSSA areas. TLV flooding scope rules MUST be specified on a per-TLV basis in accompanying specifications for new RI LSA TLVs.
section: "2.5"
rfc2119_level: MUST
topics:
    - routing
