document: rfc-3633
kind: interoperability-note
summary: This use of DHCP is not bound to the assignment of IP addresses or other configuration information to hosts, and no mechanism is currently available to communicate delegated prefixes to a DHCP server that serves such a function. Future work may address this gap.
