document: rfc-3412
kind: normative-requirement
summary: The reportableFlag MUST always be zero for PDUs from the Unconfirmed Class (Report PDU, response-type PDUs, unacknowledged notifications) and MUST always be one for PDUs from the Confirmed Class (request-type PDUs, Inform PDU). If misset, receivers MUST treat the flag as if correctly set.
section: "6.4"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
