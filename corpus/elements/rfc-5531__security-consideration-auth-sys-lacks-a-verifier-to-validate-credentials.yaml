document: rfc-5531
kind: security-consideration
summary: AUTH_SYS lacks a verifier to validate credentials and is therefore insecure; it must not be mandated for Standards Track services. AUTH_DH is obsolete and insecure per RFC 2695. All non-trivial new RPC programs should implement RPCSEC_GSS-based security.
section: "14"
topics:
    - security
