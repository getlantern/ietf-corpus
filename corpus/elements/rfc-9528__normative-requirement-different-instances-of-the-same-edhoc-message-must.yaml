document: rfc-9528
kind: normative-requirement
summary: Different instances of the same EDHOC message MUST NOT be processed in one EDHOC session. Message deduplication MUST be done by the transport protocol or, if not supported, as described in Section 7 (explicit deduplication).
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - security
