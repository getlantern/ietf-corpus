document: rfc-4932
kind: protocol-element
summary: The EPP <check> command uses a <host:check> element containing one or more <host:name> elements. The response returns a <host:chkData> element with one or more <host:cd> elements, each containing a <host:name> with a boolean 'avail' attribute and an optional <host:reason> element.
