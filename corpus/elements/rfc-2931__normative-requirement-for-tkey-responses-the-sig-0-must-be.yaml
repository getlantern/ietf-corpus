document: rfc-2931
kind: normative-requirement
summary: For TKEY responses, the SIG(0) MUST be checked and the message rejected if the checks fail unless otherwise specified for the TKEY mode in use. For all other responses, it MAY be checked and the message rejected if the checks fail.
section: "3.2"
rfc2119_level: MUST
topics:
