document: rfc-5651
kind: security-consideration
summary: Incorrect or maliciously modified session description information may result in receivers being unable to correctly receive session content or may cause them to attempt reception at much higher rates than they are capable of. Protocol instantiations MUST authenticate and protect integrity of the session description and MUST allow receivers to verify the correspondence between session description and LCT data packets.
section: "8"
topics:
    - security
    - multicast
