summary: The SmtpUTF8Mailbox type (defined in RFC 8398) is used within the otherName choice of GeneralName to carry internationalized email addresses whose local-part contains non-ASCII characters. The comparison rules for such addresses are also defined in RFC 8398 Section 5.
