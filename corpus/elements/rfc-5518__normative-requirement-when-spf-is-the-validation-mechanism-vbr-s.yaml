document: rfc-5518
kind: normative-requirement
summary: When SPF is the validation mechanism, VBR's md= MUST be the same value as the domain in the SMTP MAIL command's reverse-path address, and the SPF process must produce a "pass" result for the domain to be valid.
section: "7.3"
rfc2119_level: MUST
topics:
    - email
