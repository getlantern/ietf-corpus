summary: 'The JMAPACCESS response has the formal syntax: `resp-jmapaccess = "JMAPACCESS" SP quoted`, where `quoted` is the JMAP session resource URL using IMAP quoted string encoding. It is added to `mailbox-data` and `command-auth` is extended with `"GETJMAPACCESS"`.'
