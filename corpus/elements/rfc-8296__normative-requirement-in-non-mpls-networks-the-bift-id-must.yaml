document: rfc-8296
kind: normative-requirement
summary: In non-MPLS networks, the BIFT-id MUST be assigned for every <SD, SI, BSL> combination and is domain-wide unique (unlike MPLS where it is locally significant and may change hop-by-hop).
section: 2.2.1.1
rfc2119_level: MUST
topics:
    - multicast
