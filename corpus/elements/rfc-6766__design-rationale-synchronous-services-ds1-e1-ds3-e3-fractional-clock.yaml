document: rfc-6766
kind: design-rationale
summary: Synchronous services (DS1/E1/DS3/E3/fractional/clock) positioned earlier in the G.Bond/TDIM frame have higher drop priority than asynchronous services (Ethernet/ATM/GFP) positioned later. Within the same type, lower position index means higher priority. This prioritization is non-configurable and inherent to the TDIM framing scheme.
section: 5.3.1
topics:
    - snmp
