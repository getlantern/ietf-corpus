document: rfc-2402
kind: normative-requirement
summary: The anti-replay sliding receive window MUST support a minimum size of 32; a window size of 64 is preferred and SHOULD be employed as the default. Packets with Sequence Numbers below the left edge of the window are rejected.
section: 3.4.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
