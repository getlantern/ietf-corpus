document: rfc-9252
kind: normative-requirement
summary: When an egress PE signals an SRv6 L3 or L2 Service TLV, the BGP ingress PE receiving the route MUST perform IPv6 encapsulation and insert an SRH (RFC 8754) when required for SRv6-policy-based steering.
section: "5"
rfc2119_level: MUST
