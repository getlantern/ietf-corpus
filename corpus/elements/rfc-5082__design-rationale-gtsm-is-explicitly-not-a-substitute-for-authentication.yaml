document: rfc-5082
kind: design-rationale
summary: GTSM is explicitly not a substitute for authentication mechanisms and does not secure against insider on-the-wire attacks such as packet spoofing or replay; it only protects against infrastructure attacks based on forged protocol packets from outside the network.
