document: rfc-4712
kind: wire-format
summary: Data Source Address (DA) and Receiver Address (RA) are each 32 bits for IPv4 or 160 bits for IPv6; the S and R flag bits in the PDU header indicate which address family is used. All string fields (Application Name, Data Source Name, Receiver Name, Session Setup Status) start with an 8-bit length octet followed by UTF-8 text, padded to a 32-bit boundary.
section: 2.1.2
topics:
