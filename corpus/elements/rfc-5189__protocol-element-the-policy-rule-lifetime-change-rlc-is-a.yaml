document: rfc-5189
kind: protocol-element
summary: The Policy Rule Lifetime Change (RLC) is a mandatory configuration transaction allowing an agent to extend, shorten, or delete a policy rule. Deletion is requested by proposing a lifetime of zero; after a successful zero-lifetime reply the middlebox treats the rule as non-existent.
section: 2.3.10
topics:
