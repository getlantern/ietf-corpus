document: rfc-9349
kind: design-rationale
summary: The MIB exposes only read-only operational and state data (mirroring the RFC 9348 YANG model) so that existing SNMP-based network management systems can monitor IP-TFS without requiring a full YANG/NETCONF deployment. Write configuration is intentionally out of scope.
section: "1"
topics:
    - snmp
    - ipsec
    - yang
