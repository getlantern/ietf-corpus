document: rfc-8285
kind: protocol-element
summary: The appbits field in the two-byte header is a 4-bit application-dependent field treated as a special extension assigned to local identifier 256. If no extension is specified for ID 256, the sender SHOULD set appbits to 0 and the receiver MUST ignore it.
section: "4.3"
topics:
    - rtp
    - realtime
