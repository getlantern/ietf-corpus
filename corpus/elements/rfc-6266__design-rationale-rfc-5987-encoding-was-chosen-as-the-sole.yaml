document: rfc-6266
kind: design-rationale
summary: RFC 5987 encoding was chosen as the sole internationalization mechanism for the 'filename*' parameter because it is the only IETF-standardized, interoperable solution; encoding-sniffing heuristics (switching to UTF-8 when it 'looks like' UTF-8) are non-interoperable and risk misinterpreting actual ISO-8859-1 values.
section: C.3
topics:
    - http
