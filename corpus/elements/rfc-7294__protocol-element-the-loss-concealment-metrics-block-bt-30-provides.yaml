document: rfc-7294
kind: protocol-element
summary: The Loss Concealment Metrics Block (BT=30) provides metrics for actions taken by the receiver to mitigate packet loss and discard, including On-Time Playout Duration, Loss Concealment Duration, Buffer Adjustment Concealment Duration, Playout Interrupt Count, and Mean Playout Interrupt Size. Block length is 6 (32-bit words minus one).
