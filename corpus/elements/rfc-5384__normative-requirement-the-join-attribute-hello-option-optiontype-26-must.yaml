document: rfc-5384
kind: normative-requirement
summary: The 'Join Attribute' Hello option (OptionType 26) MUST be included in PIM Hellos of any router willing to receive type 1 Encoded-Source Addresses. A router MUST NOT send a type 1 Encoded-Source Address on any interface where a PIM neighbor has not included this option.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
