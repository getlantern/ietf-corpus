document: rfc-5888
kind: design-rationale
summary: The restriction from RFC 3388 that an 'm' line identifier could only appear in a single group using a given semantics was lifted in RFC 5888. Legacy implementations enforced this only for supported semantics, so lifting it does not cause backward-compatibility issues when new semantics are introduced.
section: "10"
topics:
