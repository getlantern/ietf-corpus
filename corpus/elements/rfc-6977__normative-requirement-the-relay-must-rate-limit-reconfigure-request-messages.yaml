document: rfc-6977
kind: normative-requirement
summary: The relay MUST rate-limit Reconfigure-Request messages sent to the server and MUST be configured with required rate-limit parameters. The maximum Reconfigure-Request packet size SHOULD be configurable and the default value MUST be 1280 octets.
section: "7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
