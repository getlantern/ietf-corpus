document: rfc-4207
kind: interoperability-note
summary: The encoding type in the BeginVerify message for SONET/SDH MUST equal the value given for 'SDH ITU-T G.707/SONET ANSI T1.105' as defined in RFC 3471. The transmission rate is represented in IEEE floating-point format as a 32-bit number in bytes per second, consistent with RFC 3471 SONET/SDH values.
section: "3"
topics:
