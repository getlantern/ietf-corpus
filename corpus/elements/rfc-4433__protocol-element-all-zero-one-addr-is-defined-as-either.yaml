document: rfc-4433
kind: protocol-element
summary: ALL-ZERO-ONE-ADDR is defined as either 0.0.0.0 or 255.255.255.255. An address of 255.255.255.255 indicates a preference for an HA in the home domain; 0.0.0.0 indicates no preference for home vs. visited domain.
