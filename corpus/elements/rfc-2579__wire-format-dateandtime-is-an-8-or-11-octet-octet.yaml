summary: DateAndTime is an 8- or 11-octet OCTET STRING encoding year (2 octets, network byte order), month, day, hour, minutes, seconds (0–60 to allow leap seconds), deci-seconds, and optionally UTC direction ('+'/'-'), hours-from-UTC, and minutes-from-UTC. DISPLAY-HINT is '2d-1d-1d,1d:1d:1d.1d,1a1d:1d'.
