document: rfc-7737
kind: normative-requirement
summary: The responder LSR SHOULD select the first available return path listed in the Reply Mode Order TLV. The Reply Mode value of the selected path MUST be set in the Reply Mode field of the MPLS echo reply to inform the initiator which return path was chosen.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - mpls
