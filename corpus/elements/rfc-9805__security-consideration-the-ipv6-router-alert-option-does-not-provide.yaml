document: rfc-9805
kind: security-consideration
summary: The IPv6 Router Alert option does not provide a universal mechanism to accurately and reliably distinguish between wanted and unwanted Router Alert packets, exposing the router control plane to flooding by unwanted traffic and denial-of-service attacks.
