document: rfc-7925
kind: normative-requirement
summary: TLS/DTLS clients MUST implement support for client certificate URLs (RFC 6066) for environments where client-side certificates are used and the server-side is not constrained. This extension is NOT RECOMMENDED for constrained servers due to additional workload and DoS risk.
section: 4.4.5
rfc2119_level: MUST
topics:
    - tls
    - pkix
