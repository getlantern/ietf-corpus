document: rfc-6021
kind: protocol-element
summary: The counter32 type (uint32 base) represents a non-negative integer that monotonically increases to 2^32-1 (4294967295) then wraps to zero. Counters have no defined initial value; discontinuities should be accompanied by a companion schema node indicating the last discontinuity time. Equivalent to SMIv2 Counter32.
