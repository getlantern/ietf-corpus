document: rfc-7513
kind: state-machine
summary: 'The Data Snooping Process adds three states beyond the DHCP Snooping states: DETECTION (ARP/NS duplicate address detection in progress), RECOVERY (DHCP Leasequery in progress to confirm address assignment), and VERIFY (verifying that the attached device''s hardware address matches the leasequery response). EVE_DATA_UNMATCH triggers entry from NO_BIND into DETECTION or RECOVERY.'
section: "7.3"
