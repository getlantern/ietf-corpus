document: rfc-8864
kind: normative-requirement
summary: Each agent application MUST wait to send data until it has confirmation that the data channel at the peer is instantiated — either when the SCTP association is established, when the offer is received and channel created, or when the answer confirming acceptance is received (whichever comes first).
section: "6.5"
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
