document: rfc-5389
kind: protocol-element
summary: The USERNAME attribute is a variable-length UTF-8 value of less than 513 bytes, processed with SASLprep. It identifies the username/password combination used for message-integrity checks and is required by both short-term and long-term credential mechanisms.
section: "15.3"
