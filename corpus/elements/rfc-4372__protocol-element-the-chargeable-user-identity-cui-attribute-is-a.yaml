document: rfc-4372
kind: protocol-element
summary: The Chargeable-User-Identity (CUI) attribute is a RADIUS attribute that serves as an alias or handle to the user's real identity, assigned by the home network. It may represent an individual user or a group, and is passed to roaming partners for billing and fraud prevention. RADIUS clients and proxies outside the home network MUST NOT modify it.
section: "2.1"
topics:
    - radius
    - security
