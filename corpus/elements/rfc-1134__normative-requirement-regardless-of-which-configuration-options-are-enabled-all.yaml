document: rfc-1134
kind: normative-requirement
summary: Regardless of which Configuration Options are enabled, all LCP packets MUST always be sent in the full, standard form as if no options were enabled. This ensures Configure-Request packets are always recognizable even when one end mistakenly believes the link is Open.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
