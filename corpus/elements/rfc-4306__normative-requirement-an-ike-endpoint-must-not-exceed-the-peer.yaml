document: rfc-4306
kind: normative-requirement
summary: An IKE endpoint MUST NOT exceed the peer's stated window size for transmitted requests; when window size is N, the initiator must wait for responses to all requests through X-N before sending request X. The endpoint MUST keep copies of sent requests and a number of previous responses equal to its declared window size to support retransmission.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
