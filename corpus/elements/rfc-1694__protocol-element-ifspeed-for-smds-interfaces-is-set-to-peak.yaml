document: rfc-1694
kind: protocol-element
summary: ifSpeed for SMDS interfaces is set to peak bandwidth in bits per second from the supporting Level 2 protocol (e.g., 1.17 Mbps for SIP DS1 SNIs; 1.536 Mbps for DXI DS1 DXI-SNIs). ifHighSpeed is the user data rate in Mbps, set to zero when less than 1 Mbps.
