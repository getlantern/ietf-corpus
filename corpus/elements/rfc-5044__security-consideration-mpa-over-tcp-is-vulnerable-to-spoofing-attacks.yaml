document: rfc-5044
kind: security-consideration
summary: MPA over TCP is vulnerable to spoofing attacks including impersonation, stream hijacking, and man-in-the-middle attacks because TCP provides no inherent authentication. IPsec SHOULD be used to protect MPA connections from these threats; the MPA key exchange in the Startup Phase does not authenticate endpoints.
section: 9.1.1
topics:
    - security
    - tcp
    - ipsec
