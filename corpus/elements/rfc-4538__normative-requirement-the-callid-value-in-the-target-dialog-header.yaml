document: rfc-4538
kind: normative-requirement
summary: The callid value in the Target-Dialog header field MUST equal the Call-ID of the target dialog. The 'remote-tag' parameter MUST be present and contain the tag viewed as remote by the recipient. The 'local-tag' parameter MUST be present and contain the tag viewed as local by the recipient.
section: "3"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
