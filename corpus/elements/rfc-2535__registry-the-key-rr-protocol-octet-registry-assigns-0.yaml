document: rfc-2535
kind: registry
summary: 'The KEY RR protocol octet registry assigns: 0 (reserved), 1 (TLS), 2 (email), 3 (DNSSEC), 4 (IPSEC/Oakley), 255 (All protocols). Values 5–254 are available for IANA assignment. Use of value 255 is discouraged; separate keys per protocol are preferred.'
