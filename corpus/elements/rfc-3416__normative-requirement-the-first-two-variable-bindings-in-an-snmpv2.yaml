document: rfc-3416
kind: normative-requirement
summary: The first two variable bindings in an SNMPv2-Trap-PDU must be sysUpTime.0 and snmpTrapOID.0, in that order. Additional variables from the NOTIFICATION-TYPE OBJECTS clause are appended in order, followed by any optional extra variables chosen by the generating entity.
section: 4.2.6
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
