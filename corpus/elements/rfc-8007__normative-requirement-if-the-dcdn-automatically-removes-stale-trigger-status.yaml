document: rfc-8007
kind: normative-requirement
summary: If the dCDN automatically removes stale Trigger Status Resources, it MUST report the retention period using 'staleresourcetime' in the collection. It is RECOMMENDED that completed resources are retained for at least 24 hours before automatic deletion.
section: "4.5"
rfc2119_level: MUST
topics:
    - http
