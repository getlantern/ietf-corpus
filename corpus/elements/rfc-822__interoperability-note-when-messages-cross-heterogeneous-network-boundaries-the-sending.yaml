document: rfc-822
kind: interoperability-note
summary: When messages cross heterogeneous network boundaries, the sending gateway must reverse the current network's idiosyncratic transformations (restoring canonical form) and then impose the next network's requirements. This two-step process prevents format corruption across network boundaries.
section: 3.4.10
topics:
    - email
