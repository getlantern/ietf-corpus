summary: 'MplsLabel is a 32-bit Unsigned32 (0..4294967295) encoding MPLS labels across multiple transport types: 20-bit shim header labels (bits 20-31 MUST be zero), 10- or 23-bit Frame Relay DLCI labels, 28-bit ATM VPI/VCI labels, and GMPLS labels exceeding 2^24-1.'
