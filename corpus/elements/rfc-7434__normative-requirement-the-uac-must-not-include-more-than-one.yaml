document: rfc-7434
kind: normative-requirement
summary: The UAC MUST NOT include more than one User-to-User header field for the isdn-uui package in any single SIP request or response. When multiple such headers are received, the UAC MUST discard all of them, as there is no mechanism for determining which is the intended UUI data.
section: "7"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
