document: rfc-6827
kind: protocol-element
summary: The Local and Remote TE Router ID sub-TLV unambiguously identifies the local and remote transport-node endpoints for a TE link. When present, it supersedes the Link-ID sub-TLV for transport-plane path computation, and the Link-ID sub-TLV MUST be ignored.
section: "6.1"
topics:
    - routing
