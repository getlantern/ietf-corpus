document: rfc-4805
kind: design-rationale
summary: A single MIB covering DS1, J1, E1, DS2, and E2 was chosen because the line disciplines are similar enough to make separate MIBs unwarranted. Differences such as LOF definition rigor between ESF and D4, or Yellow Alarm generation between T1 and J1, exist in both specifications and are handled by object semantics rather than separate MIBs.
