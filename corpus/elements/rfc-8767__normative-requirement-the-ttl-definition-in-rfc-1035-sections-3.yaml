document: rfc-8767
kind: normative-requirement
summary: The TTL definition in RFC 1035 Sections 3.2.1 and 4.1.3 is amended so that if data cannot be authoritatively refreshed when the TTL expires, the record MAY be used as though it is unexpired. This formally permits stale data usage by recursive resolvers.
section: "4"
rfc2119_level: MAY
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
