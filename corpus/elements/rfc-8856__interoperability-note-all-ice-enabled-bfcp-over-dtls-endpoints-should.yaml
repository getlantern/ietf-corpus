document: rfc-8856
kind: interoperability-note
summary: All ICE-enabled BFCP-over-DTLS endpoints SHOULD implement support for UDP/TLS/BFCP to maximize interoperability. Endpoints treat all ICE candidate pairs on a BFCP stream as part of the same DTLS association, resulting in a single DTLS handshake.
section: "9"
topics:
