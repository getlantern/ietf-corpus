document: rfc-9286
kind: normative-requirement
summary: Each RP MUST verify that a purported new manifest contains a higher manifestNumber than previously validated manifests. If the new manifest's manifestNumber is equal to or lower, the RP SHOULD use locally cached objects.
section: 4.2.1
rfc2119_level: MUST
topics:
