document: rfc-5545
kind: protocol-element
summary: The UID property provides a globally unique identifier for a calendar component. It MUST be present in VEVENT, VTODO, VJOURNAL, and VFREEBUSY components. The value is a text string that SHOULD be generated using a globally unique algorithm such as one based on an Internet mail address.
section: 3.8.4.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
