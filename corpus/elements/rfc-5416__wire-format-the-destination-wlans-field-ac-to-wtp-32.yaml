document: rfc-5416
kind: wire-format
summary: The Destination WLANs field (AC-to-WTP, 32 bits) contains a 16-bit WLAN ID bitmap (bit 15 = WLAN 1, bit 0 = WLAN 16) identifying target WLANs for broadcast/multicast frame replication, followed by 16 reserved bits. Must be set to zero for unicast frames and is unused when the WTP does not provide 802.11 encryption.
section: "4"
