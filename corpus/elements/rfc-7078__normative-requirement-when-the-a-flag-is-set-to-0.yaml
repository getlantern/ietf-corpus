document: rfc-7078
kind: normative-requirement
summary: When the A flag is set to 0, a client SHOULD NOT automatically add rows to the policy table. Additionally, if the Address Selection option includes a POLICY TABLE option, automatic row addition SHOULD NOT be performed against the distributed policy table regardless of the A flag.
section: "2"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - v6ops
