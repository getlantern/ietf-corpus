document: rfc-9692
kind: protocol-element
summary: TIDE (Topology Information Description Element) carries descriptors of TIEs stored by a node; TIRE (Topology Information Request Element) carries TIDE descriptors to confirm received TIEs or request missing ones. Together they drive RIFT's database synchronization protocol.
