document: rfc-1782
kind: normative-requirement
summary: Options that the server does not support should be omitted from the OACK; they must not cause an ERROR packet to be generated. If an option's value is invalid, the option specification determines whether to omit it, propose an alternate value, or send ERROR code 8.
section: Negotiation Protocol
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
