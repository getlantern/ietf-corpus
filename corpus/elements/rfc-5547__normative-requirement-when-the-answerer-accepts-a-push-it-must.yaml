document: rfc-5547
kind: normative-requirement
summary: When the answerer accepts a push, it MUST copy 'name', 'type', and 'size' selectors from the offer into the answer, copy the 'file-transfer-id', add 'recvonly', and MUST NOT include 'file-icon', 'file-disposition', or 'file-date' attributes in the SDP answer.
section: 8.3.1
rfc2119_level: MUST
topics:
    - realtime
