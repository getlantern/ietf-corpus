document: rfc-3355
kind: normative-requirement
summary: If an implementation supports SVCs, it MUST use the Q.2931 Annex C procedure to negotiate connection setup, encoding the B-LLI IE to signal either VC-multiplexed L2TP or LLC encapsulated L2TP.
