document: rfc-8277
kind: wire-format
summary: 'The Multiple Labels Capability value field consists of one or more 4-octet triples: AFI (2 octets), SAFI (1 octet), Count (1 octet). Count specifies the maximum number of labels the sender can process in a received UPDATE of that AFI/SAFI; Count=255 means no limit.'
section: "2.1"
topics:
