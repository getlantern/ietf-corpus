document: rfc-9448
kind: normative-requirement
summary: If the authorization credentials are invalid or the account identifier does not exist, the Token Authority response code MUST be 403 (Forbidden). Other 4xx and 5xx responses MUST follow standard HTTP error condition conventions (RFC 9110).
section: "5.5"
rfc2119_level: MUST
