document: rfc-5225
kind: normative-requirement
summary: The time_stride_value parameter MUST be set to zero unless the compressor has received a feedback message with the CLOCK_RESOLUTION option set to a non-zero value, preventing erroneous activation of timer-based compression.
section: "6.7"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
