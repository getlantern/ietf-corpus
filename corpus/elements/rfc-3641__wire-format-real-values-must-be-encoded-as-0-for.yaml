document: rfc-3641
kind: wire-format
summary: REAL values MUST be encoded as "0" for zero, "PLUS-INFINITY", "MINUS-INFINITY", an optionally signed base-10 realnumber (mantissa of the form digits[.digits] and exponent "E" digits), or as a SequenceValue for non-zero base-2 or base-10 REAL values.
section: "3.19"
rfc2119_level: MUST
