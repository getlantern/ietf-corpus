document: rfc-4817
kind: design-rationale
summary: The L2TPv3 Cookie was chosen to provide a middle ground between plain IP/GRE (limited spoofing protection) and full IPsec (higher operational and processing overhead). A randomly seeded Cookie is much harder to guess than a source IP address, thwarting blind packet-insertion attacks.
