document: rfc-4703
kind: protocol-element
summary: 'When the FQDN is already in use, the DNS UPDATE request includes two prerequisites: (1) the FQDN exists, and (2) the FQDN has a DHCID RR whose contents match the client identity. The update section conditionally deletes existing A/AAAA RRs and adds new ones.'
section: 5.3.2
topics:
    - dns
