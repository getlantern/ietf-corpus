document: rfc-9323
kind: security-consideration
summary: RSC data is self-asserted. Relying Parties MUST NOT make any assumptions about the signer beyond the fact that it had sufficient control of the issuing CA to create the object. The CA that issued the CA certificate has not verified the content of the RSC.
section: "8"
