document: rfc-6990
kind: security-consideration
summary: Error counter values may have contractual SLA implications; an attacker could manipulate RTP endpoints into reporting false data, or modify reported data in transit, to cause financial harm to network operators. To prevent this, an authentication and integrity protection framework such as SRTP combined with AVPF into SAVPF (RFC 5124) SHOULD be applied to the RTCP XR block.
section: "6"
topics:
    - rtp
    - realtime
    - security
