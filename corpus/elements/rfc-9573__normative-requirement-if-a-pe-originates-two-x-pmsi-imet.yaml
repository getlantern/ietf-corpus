document: rfc-9573
kind: normative-requirement
summary: If a PE originates two x-PMSI/IMET routes sharing the same tunnel, they MUST all carry the DCB-flag, or all carry the Context-Specific Label Space ID EC, or none carry the DCB-flag, or none carry the Context-Specific Label Space ID EC. Inconsistent mixing causes receiving PEs to treat the routes as withdrawn.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
