document: rfc-8684
kind: wire-format
summary: 'The Data Sequence Signal (DSS) option carries up to five variable-length fields controlled by flags: Data ACK (4 or 8 octets), Data Sequence Number (4 or 8 octets), Subflow Sequence Number (4 octets), Data-Level Length (2 octets), and optional Checksum (2 octets). Maximum option length with all flags set is 28 octets.'
section: "3.3"
topics:
