document: rfc-7670
kind: security-consideration
summary: IKEv2 deployments using raw public keys must use an out-of-band public-key validation procedure to ensure key authenticity. Recommended approaches include pre-configuration (e.g., 'smart object' deployments) or secure DNS using the IPSECKEY DNS RR type (RFC 4025) combined with DANE (RFC 6394).
section: "4"
topics:
    - ipsec
    - security
    - dns
