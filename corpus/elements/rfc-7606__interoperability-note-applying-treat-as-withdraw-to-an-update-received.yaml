document: rfc-7606
kind: interoperability-note
summary: Applying treat-as-withdraw to an UPDATE received over an IBGP session can cause routing inconsistency within an AS, potentially resulting in long-lived forwarding loops and black holes. Operators should trace malformed attributes to the ingress router and apply filters there to restore consistency.
section: "6"
topics:
    - bgp
    - routing
