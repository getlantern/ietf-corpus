document: rfc-7731
kind: normative-requirement
summary: An MPL Forwarder MUST NOT free a Seed Set entry before its remaining lifetime expires. When an accepted MPL Data Message is processed, the Lifetime of the corresponding Seed Set entry MUST be reset to SEED_SET_ENTRY_LIFETIME.
section: "7.3"
rfc2119_level: MUST NOT
topics:
    - multicast
    - ip
