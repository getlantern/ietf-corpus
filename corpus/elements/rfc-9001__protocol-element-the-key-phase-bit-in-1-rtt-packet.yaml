document: rfc-9001
kind: protocol-element
summary: The Key Phase bit in 1-RTT packet short headers indicates which set of packet protection keys is in use. It is initially 0 and toggled with each key update. The same header protection key is used for the full connection lifetime and is not updated during key updates.
section: "6"
topics:
