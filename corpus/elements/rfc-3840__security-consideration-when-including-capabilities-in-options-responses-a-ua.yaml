document: rfc-3840
kind: security-consideration
summary: When including capabilities in OPTIONS responses, a UA SHOULD verify with the user whether capability information should be divulged; if the requester's identity cannot be cryptographically verified, the user SHOULD be alerted. S/MIME MAY be used to protect capability information in OPTIONS responses.
section: "11.3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
