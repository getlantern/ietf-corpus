document: rfc-8225
kind: normative-requirement
summary: A PASSporT object MUST contain exactly one "orig" claim with exactly one identity claim object, and a "dest" claim with at least one identity claim object. Both claims represent identities as either "tn" (telephone number) or "uri" types.
section: 5.2.1
rfc2119_level: MUST
