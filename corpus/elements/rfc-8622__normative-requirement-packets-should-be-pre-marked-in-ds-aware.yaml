document: rfc-8622
kind: normative-requirement
summary: Packets SHOULD be pre-marked in DS-aware end systems by applications due to their specific knowledge of packet precedence. There is no incentive for DS domains to distrust this initial LE marking because letting LE traffic enter a domain causes no harm, and thus policing (e.g., rate limiting) is not necessary at the DS boundary.
section: "5"
rfc2119_level: SHOULD
topics:
    - diffserv
    - qos
