document: rfc-2597
kind: normative-requirement
summary: 'Congestion indication feedback to end nodes MUST be gradual rather than abrupt to allow the overall system to reach a stable operating point. RED uses two thresholds: no drop below first, linearly increasing drop probability between thresholds, and 100% drop above the second.'
