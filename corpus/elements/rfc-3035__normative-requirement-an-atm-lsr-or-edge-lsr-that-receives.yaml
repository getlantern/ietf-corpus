document: rfc-3035
kind: normative-requirement
summary: An ATM-LSR or Edge LSR that receives multiple binding requests for the same FEC from the same ATM-LSR MUST generate a new binding for each request (assuming adequate resources), retain any existing bindings, and MUST also generate a new binding request toward the next hop for each received request.
section: "8.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
