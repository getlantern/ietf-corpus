document: rfc-9001
kind: security-consideration
summary: 0-RTT data is susceptible to replay attacks because it is sent before the server can verify client liveness. QUIC cannot prevent all replays; application protocols MUST define a 0-RTT usage profile and clients MUST NOT send application data in 0-RTT without one.
section: "9.2"
topics:
    - quic
    - tls
    - security
