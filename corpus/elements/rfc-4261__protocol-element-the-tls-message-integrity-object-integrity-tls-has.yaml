document: rfc-4261
kind: protocol-element
summary: The TLS Message Integrity Object (Integrity-TLS) has C-Num=16 and C-Type=2. It is a 8-byte object with a 16-bit reserved field and a 16-bit Flags field; flag 0x01 (StartTLS) indicates the sender wishes to initiate a TLS handshake. It MUST NOT appear in any COPS message other than Client-Open or Client-Accept.
section: "4.1"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
