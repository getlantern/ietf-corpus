document: rfc-5497
kind: protocol-element
summary: A multi-value Time TLV (tismultivalue flag set) contains a sequence of <time-data> structures in its value field, one per address in the associated Address Block. Each <time-data> structure must contain the same number of (time-value, hop-count) pairs.
