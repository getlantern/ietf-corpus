document: rfc-9020
kind: security-consideration
summary: Unauthorized write access to /segment-routing/mpls/bindings can cause a DoS attack or allow an attacker to create segment conflicts (same SID for different purposes), redirecting traffic to compromised nodes or bypassing security functions (e.g., firewalls) within the trusted SR domain.
