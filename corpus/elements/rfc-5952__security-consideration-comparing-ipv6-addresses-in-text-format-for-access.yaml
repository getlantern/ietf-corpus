document: rfc-5952
kind: security-consideration
summary: Comparing IPv6 addresses in text format for access control purposes is a security risk due to multiple valid representations of the same address. Binary comparison should be used instead; the X.509 certificate example in Section 3.2.5 illustrates how textual comparison can produce incorrect results.
section: "8"
topics:
