document: rfc-6779
kind: interoperability-note
summary: The NHDP-MIB module does not duplicate objects from the System group of SNMPv2-MIB (RFC 3418), which is mandatory for all systems. NHDP-MIB imports from SNMPv2-SMI, SNMPv2-TC, SNMPv2-CONF, IF-MIB, INET-ADDRESS-MIB, and FLOAT-TC-MIB.
section: "6.1"
topics:
