document: rfc-8434
kind: normative-requirement
summary: New layout type defining documents MUST address (1) the fencing of clients after a layout is revoked and (2) the security implications of the native capabilities of the storage devices with respect to the requirements of the NFSv4.1 security model. Additionally, they must clarify how other NFSv4.1 semantic requirements such as locking are met.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - process
