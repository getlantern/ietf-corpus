document: rfc-6723
kind: normative-requirement
summary: When an S-PE receives a Label Release message from a remote PE during renegotiation, it MUST send a corresponding Label Release message to the other remote PE if it holds a label for the PW from that remote PE.
section: "4.1"
rfc2119_level: MUST
