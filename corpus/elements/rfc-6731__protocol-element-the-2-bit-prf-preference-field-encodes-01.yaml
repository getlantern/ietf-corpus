document: rfc-6731
kind: protocol-element
summary: 'The 2-bit ''prf'' preference field encodes: 01=High, 00=Medium, 11=Low, 10=Reserved. The Reserved value (10) MUST NOT be sent; on receipt it MUST be treated as Medium (00). Medium preference is also used for RDNSSes learned from sources that carry no explicit preference.'
section: "4.2"
topics:
