document: rfc-9186
kind: normative-requirement
summary: The HeadDiscriminator field MUST be included and its value MUST NOT be zero. If it equals zero, the option MUST be considered invalid and the receiver MUST ignore it.
section: "2"
rfc2119_level: MUST NOT
