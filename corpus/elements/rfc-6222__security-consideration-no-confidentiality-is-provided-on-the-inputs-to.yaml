document: rfc-6222
kind: security-consideration
summary: No confidentiality is provided on the inputs to the RTCP CNAME generation algorithm. An attacker who observes an RTCP CNAME may be able to reverse-engineer the inputs (NTP timestamp, EUI-64, etc.) used to generate that value.
section: "6.1"
topics:
    - rtp
    - realtime
    - security
