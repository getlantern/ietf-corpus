document: rfc-8163
kind: design-rationale
summary: To co-exist with legacy MS/TP devices and allow incremental upgrades, no changes are permitted to the MS/TP addressing modes, frame header format, control frames, or Master Node state machine as specified in BACnet Clause 9. Legacy implementations simply ignore COBS-encoded frames (Frame Types 32–127).
section: "1.4"
topics:
