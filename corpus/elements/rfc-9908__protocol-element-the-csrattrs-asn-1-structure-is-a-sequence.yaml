document: rfc-9908
kind: protocol-element
summary: The CsrAttrs ASN.1 structure is a SEQUENCE OF AttrOrOID, where each element is either a bare OBJECT IDENTIFIER or an Attribute containing a 'type' OID and a 'values' SET. This structure is unchanged from RFC 7030 to maintain bits-on-the-wire compatibility.
section: "3.2"
