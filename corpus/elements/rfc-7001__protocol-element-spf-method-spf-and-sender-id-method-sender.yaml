document: rfc-7001
kind: protocol-element
summary: SPF (method 'spf') and Sender ID (method 'sender-id') use result codes none, pass, fail, softfail, policy, neutral, temperror, and permerror, derived from RFC 4408. An additional 'policy' result is defined for when the authentication passed but local policy deems the result unacceptable (e.g., domain is on a blocklist). If sender policies do not authenticate the local-part, it SHOULD NOT be included in the pvalue.
section: 2.6.2
topics:
    - email
    - security
