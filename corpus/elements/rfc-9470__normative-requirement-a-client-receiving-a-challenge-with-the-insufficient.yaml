document: rfc-9470
kind: normative-requirement
summary: A client receiving a challenge with the `insufficient_user_authentication` error code SHOULD parse the WWW-Authenticate header for `acr_values` and `max_age` and use them, if present, when constructing a subsequent authorization request.
section: "4"
rfc2119_level: SHOULD
topics:
