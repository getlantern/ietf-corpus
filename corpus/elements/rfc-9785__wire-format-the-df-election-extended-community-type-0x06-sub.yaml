document: rfc-9785
kind: wire-format
summary: The DF Election Extended Community (Type=0x06, Sub-Type=0x06) is 8 octets encoding RSV (3 bits), DF Alg (5 bits), Bitmap (2 octets), Reserved (1 octet), and DF Preference (2 octets). This document repurposes the last two reserved octets as the DF Preference field when Alg is 2 or 3.
