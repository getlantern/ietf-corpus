document: rfc-8748
kind: security-consideration
summary: The fee extension passes financial information over EPP, so confidentiality and integrity protection must be provided by the transport mechanism. All RFC 5730-compliant transports provide the needed protections. The server will only provide financial information relevant to the authenticated client.
section: "7"
topics:
