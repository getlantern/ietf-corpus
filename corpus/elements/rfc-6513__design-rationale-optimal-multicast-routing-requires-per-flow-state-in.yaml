document: rfc-6513
kind: design-rationale
summary: Optimal multicast routing requires per-flow state in P routers proportional to the number of VPN multicast flows, which is outside SP control and scales poorly. The framework aggregates customer multicast flows onto shared P-tunnels, trading routing optimality for P-router scalability; SPs configure their own balance between the two.
section: "2.1"
topics:
