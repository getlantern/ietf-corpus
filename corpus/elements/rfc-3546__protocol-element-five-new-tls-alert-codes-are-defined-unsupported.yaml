document: rfc-3546
kind: protocol-element
summary: 'Five new TLS alert codes are defined: unsupported_extension(110) (fatal), certificate_unobtainable(111) (MAY be fatal), unrecognized_name(112) (MAY be fatal), bad_certificate_status_response(113) (fatal), bad_certificate_hash_value(114) (fatal). These MUST NOT be sent unless the sender has received an extended hello from the peer.'
