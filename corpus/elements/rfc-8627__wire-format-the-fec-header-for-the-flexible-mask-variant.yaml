document: rfc-8627
kind: wire-format
summary: The FEC header for the flexible mask variant (R=0, F=0) contains a 16-bit length recovery field, a 32-bit TS recovery field, a 16-bit SN base per SSRC, and a variable-length bitmask of 15, 46, or 110 bits (controlled by the k-bit) indicating which source packets are protected.
