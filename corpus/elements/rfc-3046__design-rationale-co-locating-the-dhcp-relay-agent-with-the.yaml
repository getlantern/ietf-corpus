document: rfc-3046
kind: design-rationale
summary: Co-locating the DHCP relay agent with the circuit access equipment allows unicast forwarding of DHCP replies to only the correct circuit, avoids replicating broadcast replies to thousands of access circuits, and enables use of circuit-layer identity (e.g., ATM VC, cable modem ID) as a trusted DHCP client identifier.
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
