document: rfc-8911
kind: normative-requirement
summary: Parameters MUST have well-defined names and a well-specified data format. Any Parameter names and definitions that do not appear in the Reference Method Specification MUST appear in the Fixed Parameters or Runtime Parameters column of the Registry Entry.
section: 7.2.2
rfc2119_level: MUST
