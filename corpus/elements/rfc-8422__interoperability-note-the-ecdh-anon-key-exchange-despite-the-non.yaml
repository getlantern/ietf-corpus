document: rfc-8422
kind: interoperability-note
summary: The ECDH_anon key exchange, despite the non-'E' prefix in its name, uses ephemeral keys just like ECDHE_RSA and ECDHE_ECDSA; the naming convention follows DH_anon from earlier TLS and does not reflect the ephemeral nature of the keys.
