document: rfc-2796
kind: design-rationale
summary: Route reflection topology should be congruent with the physical network topology when multiple paths exist for a prefix, to prevent routing loops and maintain consistent routing views. POP-based reflection (each POP has its own fully-meshed RRs) is a commonly used approach.
section: "9"
topics:
