document: rfc-7635
kind: normative-requirement
summary: The TURN client MUST include the ACCESS-TOKEN attribute only in Allocate and Refresh requests. The lifetime returned by the TURN server in Allocate and Refresh responses MUST be less than or equal to the remaining lifetime of the token.
section: "9"
rfc2119_level: MUST
topics:
    - nat
    - oauth
