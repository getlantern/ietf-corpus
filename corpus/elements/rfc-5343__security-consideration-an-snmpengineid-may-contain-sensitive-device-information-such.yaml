document: rfc-5343
kind: security-consideration
summary: An snmpEngineID may contain sensitive device information such as MAC address, IPv4/IPv6 address, or administratively assigned text. An attacker may use the discovery mechanism to obtain device fingerprinting information that is otherwise not directly accessible.
