summary: RFC 3720 establishes an IANA registry for iSCSI extension items, covering new Opcodes, Login/Text operational keys, authentication methods, and digest algorithms. Registration requires community presentation, IESG approval, and satisfaction of naming, mechanism specification, publication, and security requirements.
