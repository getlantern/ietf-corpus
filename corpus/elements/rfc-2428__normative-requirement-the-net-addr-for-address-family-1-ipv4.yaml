document: rfc-2428
kind: normative-requirement
summary: The <net-addr> for address family 1 (IPv4) MUST be in dotted-decimal format (e.g., 132.235.1.2), and for address family 2 (IPv6) MUST use the IPv6 string representations defined in RFC 2373.
section: "2"
rfc2119_level: MUST
