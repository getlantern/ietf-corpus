document: rfc-5844
kind: protocol-element
summary: 'Five encapsulation modes are defined for tunneling: IPv4-or-IPv6-over-IPv6, IPv4-or-IPv6-over-IPv4, IPv4-or-IPv6-over-IPv4-UDP, IPv4-or-IPv6-over-IPv4-UDP-TLV, and IPv4-or-IPv6-over-IPv4-GRE. The mode used for IPv4 transport depends on whether NAT-like middleboxes are present.'
section: "2.2"
topics:
    - mobility
    - ip
    - vpn
