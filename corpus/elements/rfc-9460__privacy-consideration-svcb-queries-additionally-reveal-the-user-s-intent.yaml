document: rfc-9460
kind: privacy-consideration
summary: SVCB queries additionally reveal the user's intent to use a particular protocol, beyond the domain name already revealed by standard address queries. This information is visible to the recursive resolver and to many other parties when plaintext DNS transport is used.
section: "13"
topics:
