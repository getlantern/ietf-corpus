document: rfc-9570
kind: normative-requirement
summary: The Router Alert IP Option MUST NOT be set in the IP header of an MPLS echo request message. This reverses the prior requirement in RFC 8029 Section 4.3 that mandated setting the RAO.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
    - ip
