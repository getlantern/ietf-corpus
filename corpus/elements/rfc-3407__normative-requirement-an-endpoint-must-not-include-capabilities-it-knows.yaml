document: rfc-3407
kind: normative-requirement
summary: An endpoint MUST NOT include capabilities it knows it cannot use in a particular session. If a new capability set is received from the other endpoint, the old capability set MUST NOT be used any longer.
section: "3"
rfc2119_level: MUST NOT
topics:
    - realtime
    - sip
