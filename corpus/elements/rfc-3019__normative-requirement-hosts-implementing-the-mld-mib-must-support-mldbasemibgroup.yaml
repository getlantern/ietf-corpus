document: rfc-3019
kind: normative-requirement
summary: Hosts implementing the MLD MIB MUST support mldBaseMIBGroup (mldCacheSelf, mldCacheStatus, mldInterfaceStatus) and mldHostMIBGroup (mldInterfaceQuerier). Write access to mldInterfaceStatus is not required for host compliance.
section: "3"
rfc2119_level: MUST
topics:
