document: rfc-8286
kind: normative-requirement
summary: The main RTP sender MUST send the Splicing Interval well in advance of the splicing-in point, to enable the splicer to obtain the substitutive content before splicing starts. The advance time can be estimated using the RTT derived from RTCP Receiver Reports.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
