document: rfc-6501
kind: protocol-element
summary: The <conference-time> element contains one or more <entry> elements specifying scheduling information for each conference occurrence, including iCalendar <base>, <mixing-start-offset>, <mixing-end-offset>, <can-join-after-offset>, <must-join-before-offset>, <request-user>, <notify-end-of-conference>, and <allowed-extend-mixing-end-offset>.
