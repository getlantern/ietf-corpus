document: rfc-4106
kind: normative-requirement
summary: Implementations MUST support a full-length 16-octet ICV, MAY support 8 or 12 octet ICVs, and MUST NOT support other ICV lengths. A zero-length ICV is intentionally disallowed because GCM provides no integrity protection with a zero-length Authentication Tag.
section: "6"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
