document: rfc-3655
kind: normative-requirement
summary: An authoritative server MUST only set the AD bit for authoritative answers from a secure zone if it has been explicitly configured to do so; the default for this behavior SHOULD be off.
section: "2.2"
rfc2119_level: MUST
topics:
