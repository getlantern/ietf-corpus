document: rfc-5629
kind: normative-requirement
summary: If a user agent supports presentation-capable user interfaces, it MUST support the REFER method, MUST support the target dialog specification (tdialog), MUST support SIP user agent capabilities, MUST be capable of being REFERed to an HTTP URI, and MUST include a 'schemes' Contact header field parameter including the HTTP URI scheme.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
