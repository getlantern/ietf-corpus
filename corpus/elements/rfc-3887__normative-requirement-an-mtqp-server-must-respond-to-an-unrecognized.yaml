document: rfc-3887
kind: normative-requirement
summary: An MTQP server MUST respond to an unrecognized, unimplemented, or syntactically invalid command with a -BAD status indicator, and MUST respond to a command issued in an incorrect session state with a -ERR status indicator.
section: "2.3"
rfc2119_level: MUST
