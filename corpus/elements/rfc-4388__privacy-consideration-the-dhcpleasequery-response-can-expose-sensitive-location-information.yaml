document: rfc-4388
kind: privacy-consideration
summary: The DHCPLEASEQUERY response can expose sensitive location information, specifically the mapping of a hardware (MAC) address to an IP address lease, which constitutes an invasion of broadband subscriber privacy. Servers should use RFC 3118 authentication and non-sensitive option lists to limit this exposure.
section: "7"
topics:
    - privacy
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
