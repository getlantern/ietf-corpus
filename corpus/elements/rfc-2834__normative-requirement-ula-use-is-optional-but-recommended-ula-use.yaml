document: rfc-2834
kind: normative-requirement
summary: ULA use is OPTIONAL but RECOMMENDED. ULA use is REQUIRED if a port wishes to interoperate with a conventional network (Ethernet, FDDI, 802 LAN). It is RECOMMENDED that all HARP servers run on ports with a non-zero ULA.
section: 6.2.1
rfc2119_level: REQUIRED
