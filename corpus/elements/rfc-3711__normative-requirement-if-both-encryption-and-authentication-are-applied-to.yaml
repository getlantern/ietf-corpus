document: rfc-3711
kind: normative-requirement
summary: If both encryption and authentication are applied to an SRTP packet, encryption SHALL be applied before authentication on the sender side, and conversely (authenticate first, then decrypt) on the receiver side.
section: "3.1"
rfc2119_level: SHALL
topics:
    - realtime
    - rtp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
