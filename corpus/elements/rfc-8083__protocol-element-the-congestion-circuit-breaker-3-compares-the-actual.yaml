document: rfc-8083
kind: protocol-element
summary: The Congestion circuit breaker (#3) compares the actual RTP sending rate against 10 * X, where X is an estimated TCP throughput using loss fraction p and RTT Tr; it triggers when the sending rate exceeds this threshold over CB_INTERVAL RTCP reporting intervals.
