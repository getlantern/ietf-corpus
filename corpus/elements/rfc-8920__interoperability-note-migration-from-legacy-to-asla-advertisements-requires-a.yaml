document: rfc-8920
kind: interoperability-note
summary: 'Migration from legacy to ASLA advertisements requires a staged approach: (1) send new application-specific advertisements while retaining legacy ones, (2) enable use of application-specific advertisements on all routers, and (3) keep legacy advertisements if needed for RSVP-TE. Only after full migration can incongruent per-application attribute values be advertised.'
section: 12.2.3
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
