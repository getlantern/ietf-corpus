document: rfc-5228
kind: wire-format
summary: 'The encoded-character capability enables two escape syntaxes in strings: ''${hex:HH...}'' embeds arbitrary octets by hex pairs, and ''${unicode:HHHH...}'' embeds UTF-8 encoded Unicode characters by code point. Unicode values outside 0–D7FF and E000–10FFFF are errors.'
section: 2.4.2.4
topics:
    - email
