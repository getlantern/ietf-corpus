document: rfc-6116
kind: normative-requirement
summary: ENUM clients MUST use case-insensitive processing when exposed to NAPTR records that may hold field content of different capitalization, as in Public ENUM scenarios. A client MAY use case-sensitive processing only if it is known to operate in a fully controlled environment.
section: "3.6"
rfc2119_level: MUST
topics:
    - dns
