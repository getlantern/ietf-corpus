document: rfc-2665
kind: interoperability-note
summary: MAC Control frames are consumed or generated by the interface layer itself and are not counted by ifIn*castPkts or ifOut*castPkts. However, they are included in ifInOctets and ifOutOctets, creating an asymmetry between octet and packet counters in the IF-MIB.
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
