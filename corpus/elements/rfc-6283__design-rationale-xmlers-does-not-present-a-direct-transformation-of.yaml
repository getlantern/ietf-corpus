document: rfc-6283
kind: design-rationale
summary: XMLERS does not present a direct transformation of ERS in ASN.1 syntax (RFC 4998) because XML processing rules and characteristics differ fundamentally from ASN.1. XMLERS is a standalone document based on RFC 4998 conceptually only, and does not support importing ASN.1 values in XML tags.
section: "1.1"
topics:
    - crypto
    - security
