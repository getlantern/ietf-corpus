document: rfc-9721
kind: design-rationale
summary: For multi-homed ES hosts, all PE devices sharing the ES must advertise local MAC and MAC-IP routes with the same sequence number regardless of learning order. Inconsistent sequence numbers across multi-homing PEs create ambiguity for remote PEs handling same-ESI paths with different sequence numbers and break consistent route versioning needed for EVPN mobility.
section: "5.3"
topics:
    - routing
