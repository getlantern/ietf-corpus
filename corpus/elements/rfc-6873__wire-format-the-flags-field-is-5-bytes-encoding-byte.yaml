summary: 'The Flags Field is 5 bytes encoding: byte 1 = Request (''R'') or Response (''r''); byte 2 = Original (''O''), Duplicate (''D''), or Stateless (''S'') transmission; byte 3 = Sent (''S'') or Received (''R''); byte 4 = Transport (U=UDP, T=TCP, S=SCTP, IANA-assigned); byte 5 = Encrypted (''E'') or Unencrypted (''U'').'
