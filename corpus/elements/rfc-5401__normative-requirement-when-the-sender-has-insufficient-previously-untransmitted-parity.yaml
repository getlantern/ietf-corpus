document: rfc-5401
kind: normative-requirement
summary: When the sender has insufficient previously untransmitted parity symbols for a coding block, the sender MUST resort to transmitting the explicit set of repair vectors requested by receivers rather than fresh parity symbols.
section: 3.2.3.1
rfc2119_level: MUST
topics:
    - multicast
