document: rfc-4592
kind: normative-requirement
summary: When a wildcard domain name appears in a query's QNAME, no special wildcard processing occurs; an asterisk label in QNAME matches only a literal asterisk label in the zone tree. Similarly, an asterisk label in resource data has no special meaning.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
