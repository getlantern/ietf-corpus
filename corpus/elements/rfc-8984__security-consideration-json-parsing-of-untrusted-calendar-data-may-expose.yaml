document: rfc-8984
kind: security-consideration
summary: JSON parsing of untrusted calendar data may expose implementations to parser exploits. Since JSCalendar requires I-JSON (a strict subset), implementations should use a conformant parser and be wary of input crafted to exploit parser edge cases.
section: "7.2"
topics:
    - security
    - json
