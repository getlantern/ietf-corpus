document: rfc-8600
kind: normative-requirement
summary: A Broker SHOULD support only the 'authorize' access model (Topic owner approves subscription requests) and the 'whitelist' access model (only preconfigured Platforms can subscribe). The open, presence, and roster models are inappropriate for XMPP-Grid.
section: 8.3.4
rfc2119_level: SHOULD
topics:
    - security
    - realtime
