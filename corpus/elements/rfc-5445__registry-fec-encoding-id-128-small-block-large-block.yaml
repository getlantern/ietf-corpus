document: rfc-5445
kind: registry
summary: FEC Encoding ID 128 (Small Block, Large Block, and Expandable FEC Codes) and FEC Encoding ID 129 (Small Block Systematic FEC Codes) are assigned as Under-Specified in the ietf:rmt:fec:encoding namespace, updating RFC 3452. Three corresponding FEC Instance ID sub-namespaces (ietf:rmt:fec:encoding:instance:128, :129, :130) are established with First Come First Served assignment policy.
