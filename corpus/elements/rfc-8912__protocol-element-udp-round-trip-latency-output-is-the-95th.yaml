document: rfc-8912
kind: protocol-element
summary: 'UDP Round-Trip Latency output is the 95th percentile of the conditional distribution of round-trip delay (Registry Entry ID 1: RTDelay_Active_IP-UDP-Periodic_RFC8912sec4_Seconds_95Percentile). The 95th percentile is defined as the smallest delay value for which the EDF is >= 95% of the singleton values per RFC 2330 Section 11.3.'
