document: rfc-8231
kind: normative-requirement
summary: The State Timeout Interval MUST be greater than or equal to the Redelegation Timeout Interval. Upon expiration without successful redelegation, the PCC MUST flush any LSP state set by the PCE and revert to operator-defined defaults, done in a make-before-break fashion.
section: 5.7.2.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
