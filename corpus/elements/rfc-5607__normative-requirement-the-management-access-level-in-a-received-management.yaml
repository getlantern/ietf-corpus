document: rfc-5607
kind: normative-requirement
summary: The management access level in a received Management-Privilege-Level (136) Attribute MUST be applied to the session. If the NAS supports this attribute but the privilege level is unknown, the NAS MUST treat the Access-Accept as an Access-Reject.
section: "6.4"
rfc2119_level: MUST
topics:
    - radius
