document: rfc-5357
kind: normative-requirement
summary: MBZ (Must Be Zero) bits MUST be set to zero by senders and MUST be ignored by receivers throughout all TWAMP messages. All multi-octet quantities are unsigned integers in network byte order unless specified otherwise.
