document: rfc-3201
kind: security-consideration
summary: Several MIB objects have read-write or read-create access and could be exploited in a non-secure environment to disrupt network operations by creating, modifying, or deleting circuit-to-interface mappings. The use of SNMPv3 with USM (RFC 2574) and VACM (RFC 2575) is recommended to restrict access to authorized principals.
section: "9"
topics:
    - snmp
    - security
