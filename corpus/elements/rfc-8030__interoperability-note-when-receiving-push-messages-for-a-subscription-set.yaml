document: rfc-8030
kind: interoperability-note
summary: When receiving push messages for a subscription set, the PUSH_PROMISE synthetic request MUST provide a URI for the push resource in a 'urn:ietf:params:push' link relation so the user agent can differentiate the source subscription for each delivered message.
section: "6.1"
