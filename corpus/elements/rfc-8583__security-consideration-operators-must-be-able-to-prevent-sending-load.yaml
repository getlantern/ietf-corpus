document: rfc-8583
kind: security-consideration
summary: Operators must be able to prevent sending load information to unauthorized nodes. Since Diameter only provides transport-level node authentication and lacks end-to-end security, conveying load information to non-peer nodes requires a transitive-trust model.
section: "8"
topics:
