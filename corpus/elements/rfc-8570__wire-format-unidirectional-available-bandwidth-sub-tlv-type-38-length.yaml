document: rfc-8570
kind: wire-format
summary: 'Unidirectional Available Bandwidth sub-TLV (Type 38, Length 4): a 32-bit IEEE 754 floating-point field in bytes per second. Available bandwidth is residual bandwidth minus measured bandwidth used for actual forwarding of non-RSVP-TE packets; for bundled links it is the sum of component link available bandwidths.'
