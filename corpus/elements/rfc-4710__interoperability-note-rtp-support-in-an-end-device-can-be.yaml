document: rfc-4710
kind: interoperability-note
summary: RTP support in an end-device can be detected by presence of the RTP MIB (RFC 2959) or by the Application Name (Section 5.32) beginning with the string 'RTP'; this detection governs which measurement methodology (RFC 3550 vs. RFC 2679/2680/2681) applies to delay, jitter, and packet loss metrics.
section: "5.11"
topics:
    - qos
    - realtime
    - rtp
