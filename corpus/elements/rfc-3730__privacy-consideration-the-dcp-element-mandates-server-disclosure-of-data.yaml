document: rfc-3730
kind: privacy-consideration
summary: The <dcp> element mandates server disclosure of data collection policies covering access scope, collection purposes (admin/contact/prov/other), recipients (ours/public/same/unrelated/other), and retention periods (business/indefinite/legal/none/stated). Policy implications extend beyond the client-server relationship to the originating data sources.
section: "2.4"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
