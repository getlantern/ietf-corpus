document: rfc-3108
kind: protocol-element
summary: The <transport> parameter in the 'm' line specifies the encapsulation standard for the service payload. Defined values include AAL1/ATMF, AAL1/ITU, AAL5/ATMF, AAL5/ITU, AAL2/ATMF, AAL2/ITU, AAL1/custom, AAL2/custom, AAL5/custom, corporate-name variants, IEEE OUI variants, and RTP/AVP (for H.323 Annex C applications).
section: 5.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
