document: rfc-5531
kind: design-rationale
summary: Binding a client to a particular service and transport is intentionally NOT part of the RPC protocol specification, leaving rendezvous to higher-level software (e.g., the RPC binder/portmapper) so the core protocol remains transport-independent.
