document: rfc-6840
kind: normative-requirement
summary: When proving a delegation is insecure, a validator MUST check for the presence of the NS bit in the matching NSEC or NSEC3 RR, or verify the delegation is covered by an NSEC3 RR with the Opt-Out flag set, in addition to checking absence of DS and SOA bits.
section: "4.4"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
