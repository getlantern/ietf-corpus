document: rfc-7670
kind: design-rationale
summary: The SubjectPublicKeyInfo format from RFC 5280 (X.509 PKIX) is reused for carrying raw public keys, mirroring the approach taken by RFC 7250 for TLS. This provides a simple, standard way to indicate key type using existing ASN.1 structures that can be recognized by block comparison.
section: "3"
topics:
