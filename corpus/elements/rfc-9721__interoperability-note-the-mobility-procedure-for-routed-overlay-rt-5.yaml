document: rfc-9721
kind: interoperability-note
summary: The mobility procedure for routed overlay RT-5 host IP routes does not apply to 'anycast' IPv6 hosts advertised via Neighbor Advertisement (NA) messages with the Override Flag (O Flag) set to 0. Similarly, duplicate detection procedures for Scenarios B and C do not apply to such anycast IPv6 hosts per RFC 9161.
section: "7"
topics:
    - routing
    - ip
