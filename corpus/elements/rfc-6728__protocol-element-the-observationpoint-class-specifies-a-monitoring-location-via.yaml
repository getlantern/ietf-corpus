document: rfc-6728
kind: protocol-element
summary: The ObservationPoint class specifies a monitoring location via interface name or index (ifName/ifIndex) or physical entity name or index (entPhysicalName/entPhysicalIndex), an observationDomainId, and a traffic direction parameter ("ingress", "egress", or "both"; default "both"). observationPointId is a read-only state parameter assigned by the device.
section: "4.1"
