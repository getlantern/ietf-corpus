document: rfc-8417
kind: normative-requirement
summary: Methods for distribution of SETs SHOULD require transport-layer security. Parties MUST support TLS 1.2 or higher and MAY support additional mechanisms. When using TLS the client MUST perform a TLS server certificate check per RFC 6125.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - security
    - oauth
