document: rfc-9532
kind: protocol-element
summary: The next-hop-aliases parameter uses a comma (',') as a separator between DNS names in the list. If a comma appears within a name itself, it must be percent-encoded as '%2C'. The parameter can be included independently of the next-hop parameter.
section: "2"
topics:
