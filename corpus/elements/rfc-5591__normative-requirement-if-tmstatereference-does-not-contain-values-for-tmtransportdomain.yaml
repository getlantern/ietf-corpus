kind: normative-requirement
summary: If tmStateReference does not contain values for tmTransportDomain, tmTransportAddress, tmSecurityName, and tmTransportSecurityLevel, the snmpTsmInvalidCaches counter is incremented, an error is returned, and Security Model processing stops.
