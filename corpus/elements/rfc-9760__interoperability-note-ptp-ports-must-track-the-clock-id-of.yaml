document: rfc-9760
kind: interoperability-note
summary: PTP Ports must track the Clock ID of received messages and not just IP or Layer 2 addresses in networks with Transparent Clocks, since Transparent Clocks may replace IP addresses on retransmitted PTP messages.
section: "5"
