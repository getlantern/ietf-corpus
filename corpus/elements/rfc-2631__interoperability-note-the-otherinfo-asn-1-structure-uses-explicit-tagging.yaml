document: rfc-2631
kind: interoperability-note
summary: The OtherInfo ASN.1 structure uses EXPLICIT tagging throughout. In ASN.1, EXPLICIT tagging is the default unless IMPLICIT is explicitly specified, so no IMPLICIT qualifier appears in the OtherInfo and KeySpecificInfo definitions.
section: 2.1.2
topics:
    - crypto
    - security
