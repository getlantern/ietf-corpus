document: rfc-5520
kind: protocol-element
summary: The Path-Key Subobject (PKS) is a fixed-length subobject containing a Path-Key identifier (token scoped to the issuing PCE) and a PCE-ID. It is carried in PCEP ERO objects and RSVP-TE explicit route objects to represent a hidden CPS without revealing internal topology.
section: "2.1"
