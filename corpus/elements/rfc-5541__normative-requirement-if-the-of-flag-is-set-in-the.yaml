document: rfc-5541
kind: normative-requirement
summary: If the OF flag is set in the RP object and policy permits, the PCE MUST include an OF object in the PCRep indicating the objective function used. If policy does not permit, it MUST send a PCErr with error type 5 and error value 4 (OF bit of the RP object set, request rejected).
section: 3.3.1
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
