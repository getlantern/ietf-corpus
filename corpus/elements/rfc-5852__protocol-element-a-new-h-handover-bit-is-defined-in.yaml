document: rfc-5852
kind: protocol-element
summary: A new H (Handover) bit is defined in the ADMIN_STATUS Object at bit number 25 (hex value 0x00000040). When set in a Path message, it signals that the message is part of a Handover procedure and that no Data Plane operations should result from normal CP signaling.
section: "7.1"
topics:
    - routing
    - mpls
