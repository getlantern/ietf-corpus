document: rfc-7788
kind: normative-requirement
summary: HNCP nodes MUST use DNCP's per-endpoint keep-alive extension on all endpoints. The default keep-alive interval is 20 seconds with a multiplier of 2.1 on virtually lossless links; a considerably higher multiplier (e.g., 15) should be used on lossy links.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
