document: rfc-6936
kind: normative-requirement
summary: A port for which zero UDP checksum has been enabled MUST NOT log a received datagram solely because the checksum value is zero; however, datagrams received with zero checksum on ports that have not enabled it SHOULD still be logged per RFC 2460.
section: "4"
rfc2119_level: MUST NOT
topics:
    - udp
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
