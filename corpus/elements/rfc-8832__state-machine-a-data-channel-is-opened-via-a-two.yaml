document: rfc-8832
kind: state-machine
summary: 'A data channel is opened via a two-way handshake: the initiator sends DATA_CHANNEL_OPEN on a chosen outgoing stream; the peer responds with DATA_CHANNEL_ACK on the stream with the same identifier; upon exchange the data channel is open. The opening side MAY send user data before receiving the ACK.'
