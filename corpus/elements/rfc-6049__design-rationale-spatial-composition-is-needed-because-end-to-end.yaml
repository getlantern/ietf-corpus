document: rfc-6049
kind: design-rationale
summary: 'Spatial composition is needed because end-to-end measurement is sometimes impractical: paths may cross independent domains with conflicting policies, tools, and timing, so each domain measures its own sub-path and results are combined to estimate complete-path performance.'
