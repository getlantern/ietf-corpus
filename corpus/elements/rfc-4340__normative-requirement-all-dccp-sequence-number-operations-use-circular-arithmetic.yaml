document: rfc-4340
kind: normative-requirement
summary: All DCCP sequence number operations use circular arithmetic modulo 2^48. Sequence numbers increment by one per packet including pure acknowledgements (DCCP-Ack), enabling detection of all packet loss including acknowledgement loss.
section: "7"
rfc2119_level: MUST
