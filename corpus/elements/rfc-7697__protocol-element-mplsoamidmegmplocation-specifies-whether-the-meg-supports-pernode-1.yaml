document: rfc-7697
kind: protocol-element
summary: mplsOamIdMegMpLocation specifies whether the MEG supports perNode(1) MEPs/MIPs (one MP per LSR) or perInterface(2) MEPs/MIPs (up to two MPs per LSR for incoming and outgoing interfaces). When perNode, mplsOamIdMeMpIfIndex may be zero to indicate OAM packets originate from the forwarding engine.
section: "7"
topics:
