document: rfc-7293
kind: normative-requirement
summary: It is RECOMMENDED that receivers remove all instances of the Require-Recipient-Valid-Since header field prior to local mailbox delivery, or remove actionable instances prior to forwarding, to prevent inadvertent exposure of the timestamp and recipient relationship.
