document: rfc-1034
kind: design-rationale
summary: The DNS was designed to replace the centralized HOSTS.TXT distribution model, whose bandwidth cost scaled as the square of the number of hosts. The distributed zone-and-delegation architecture allows local administrators to make changes immediately visible without coordinating with a central authority.
section: "2.1"
topics:
    - dns
