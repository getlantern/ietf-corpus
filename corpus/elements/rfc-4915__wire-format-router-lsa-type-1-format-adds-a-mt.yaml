document: rfc-4915
kind: wire-format
summary: Router-LSA (Type 1) format adds a '# MT-ID' field (8 bits) after the link Type field, followed by per-MT-ID entries each consisting of MT-ID (8 bits), a zero byte, and MT-ID metric (16 bits). The base metric field remains unchanged.
