document: rfc-8696
kind: security-consideration
summary: When a PSK is shared among a group, group members can record each other's traffic and decrypt it if they ever gain access to a large-scale quantum computer. Large groups also increase the risk of PSK theft; once an attacker obtains the PSK, stored traffic becomes vulnerable if the attacker later acquires a quantum computer.
section: "7"
topics:
    - security
    - crypto
