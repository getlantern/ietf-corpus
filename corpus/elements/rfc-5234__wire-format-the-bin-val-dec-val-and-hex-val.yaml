document: rfc-5234
kind: wire-format
summary: The bin-val, dec-val, and hex-val rules each allow either a series of dot-concatenated values or a single dash-delimited range, but not both in the same value. The repeat rule is '1*DIGIT / (*DIGIT "*" *DIGIT)'.
section: "4"
extracted_by: claude-sonnet-4-6
