document: rfc-2806
kind: protocol-element
summary: 'The area-specifier parameter ('';phone-context='') qualifies a local phone number with the numbering context in which it is valid. It takes one of three forms: global-network-prefix (''+'' followed by E.164 digits), local-network-prefix (a local dial string), or private-prefix (an opaque private context name).'
section: 2.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
