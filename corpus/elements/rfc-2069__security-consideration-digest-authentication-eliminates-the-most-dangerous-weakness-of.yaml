document: rfc-2069
kind: security-consideration
summary: Digest Authentication eliminates the most dangerous weakness of Basic — password exposure to network eavesdroppers — but an intercepted digest may still be used in a replay attack against the exact same URI. For GET requests a replay is usually pointless; for POST and PUT it can cause counterfeit actions.
section: "3.1"
topics:
    - http
    - security
