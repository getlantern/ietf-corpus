document: rfc-5661
kind: normative-requirement
summary: Regardless of GSS mechanism in use, the NFS server MUST identify itself via a GSS_C_NT_HOSTBASED_SERVICE name of the form 'nfs@hostname'; for Kerberos V5 the form 'nfs/hostname' is RECOMMENDED.
section: 2.2.1.1.1.3
rfc2119_level: MUST
topics:
