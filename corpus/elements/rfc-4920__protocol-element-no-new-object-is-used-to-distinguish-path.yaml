document: rfc-4920
kind: protocol-element
summary: No new object is used to distinguish Path/Resv messages for an alternate LSP under crankback re-routing. The alternate LSP uses the same SESSION and SENDER_TEMPLATE/FILTER_SPEC objects as the initial LSP.
