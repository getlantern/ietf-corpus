document: rfc-4327
kind: design-rationale
summary: Control channels are not required to be modeled as interfaces. The lmpCcIsIf flag explicitly allows implementations where control channels exist only as logical connections between LMP-capable nodes without a corresponding ifTable entry, avoiding mandatory coupling to IF-MIB.
