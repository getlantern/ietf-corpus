document: rfc-8742
kind: normative-requirement
summary: Fragment identifier syntax and semantics for '+cbor-seq' media types SHOULD be the same as specified for 'application/cbor-seq'. For specific 'xxx/yyy+cbor-seq' types, if the fragment identifier resolves per '+cbor-seq' rules it SHOULD be processed as such; otherwise process per 'xxx/yyy+cbor-seq'.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - cbor
    - registry
