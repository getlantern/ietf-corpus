document: rfc-7272
kind: normative-requirement
summary: A receiver SHALL report on RTP packet arrival times and MAY additionally report on presentation (playout) times. If no Packet Presented NTP timestamp is available, the field SHALL be set to 0 and the P flag SHALL be set to 0.
section: "9"
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
