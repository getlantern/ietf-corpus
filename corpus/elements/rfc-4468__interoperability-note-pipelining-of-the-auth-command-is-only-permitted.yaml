document: rfc-4468
kind: interoperability-note
summary: Pipelining of the AUTH command is only permitted if the selected SASL mechanism can be completed in one round trip with a client initial response and no SASL security layer negotiated; this applies to PLAIN and EXTERNAL but not most other SASL mechanisms.
section: "3.4"
topics:
    - email
