document: rfc-5015
kind: normative-requirement
summary: When a router participates in a DF election for an RPA on the interface that its MRIB indicates as the RPF Interface, it MUST always advertise an infinite metric. On any other interface it MUST advertise the MRIB-provided metrics.
section: 3.5.2
rfc2119_level: MUST
topics:
    - multicast
    - routing
