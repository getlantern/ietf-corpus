document: rfc-8503
kind: normative-requirement
summary: mvpnSPTunnelLimit (Unsigned32, range 1..4294967295) sets the maximum number of selective provider tunnels allowed for a particular MVPN on the PE, per RFC 6513 Section 13. This is a read-write scalar, configurable by the operator.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - multicast
    - mpls
    - snmp
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
