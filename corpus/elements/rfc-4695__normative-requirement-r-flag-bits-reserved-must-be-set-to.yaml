document: rfc-4695
kind: normative-requirement
summary: R flag bits (reserved) MUST be set to 0 by senders and MUST be ignored by receivers. LENGTH fields code the number of octets in the containing structure including its own header; receivers MUST use LENGTH to advance past a structure rather than relying on knowledge of its internal format.
section: "1.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
