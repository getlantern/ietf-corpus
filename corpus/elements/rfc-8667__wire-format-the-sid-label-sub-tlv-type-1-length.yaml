document: rfc-8667
kind: wire-format
summary: The SID/Label sub-TLV (Type 1, Length 3 or 4) contains a SID or MPLS label. If Length is 3, the 20 rightmost bits represent an MPLS label value; if Length is 4, the value is a 32-bit index.
