document: rfc-2364
kind: normative-requirement
summary: When using LLC encapsulation, endpoints MUST NOT send packets belonging to any protocol that has an active NCP within the PPP session as non-PPP LLC flows. They SHOULD do packet scheduling that minimizes performance impact on QoS commitments.
section: "6"
rfc2119_level: MUST NOT
topics:
    - ip
    - qos
