document: rfc-4396
kind: normative-requirement
summary: UTF-16 text strings transported by this payload format MUST be serialized in big endian (network byte) order. Little endian serialization is explicitly not supported. Senders MUST set the U bit to zero in TYPE 3, TYPE 4, and TYPE 5 headers.
section: 4.1.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
