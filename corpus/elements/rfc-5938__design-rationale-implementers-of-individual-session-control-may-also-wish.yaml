document: rfc-5938
kind: design-rationale
summary: Implementers of Individual Session Control may also wish to implement the 'Reflect Octets' feature because RFC 5357 sessions are established serially and total setup time grows with session count. Reflect Octets allows a Control-Client to distinguish parallel Request-TW-Session commands by having the Server echo back a local index.
section: "1"
topics:
    - measurement
