document: rfc-9601
kind: normative-requirement
summary: During reassembly of outer IP fragments at a tunnel egress, the packet MUST be discarded if the ECN fields of the outer headers being reassembled consist of a mixture of Not-ECT and other ECN codepoints.
section: "5"
rfc2119_level: MUST
topics:
    - ecn
    - ip
    - congestion
