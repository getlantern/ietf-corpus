document: rfc-8338
kind: security-consideration
summary: The security measures from RFC 8077 are generally adequate, but the use of MD5 to secure the LDP control plane is no longer considered sufficiently secure. Implementations should be designed to migrate to a stronger cryptographic hash function for LDP authentication.
section: "6"
topics:
