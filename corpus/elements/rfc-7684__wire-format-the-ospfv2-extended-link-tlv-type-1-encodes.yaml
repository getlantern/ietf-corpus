document: rfc-7684
kind: wire-format
summary: The OSPFv2 Extended Link TLV (Type=1) encodes a 1-octet Link Type, 3 Reserved octets, a 4-octet Link ID, a 4-octet Link Data (all matching Router-LSA definitions from RFC 2328 Section A.4.2), and optional Sub-TLVs. Only one such TLV SHALL appear per Extended Link Opaque LSA.
section: "3.1"
topics:
    - routing
