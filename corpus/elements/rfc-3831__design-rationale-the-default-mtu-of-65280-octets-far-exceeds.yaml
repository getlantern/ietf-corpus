document: rfc-3831
kind: design-rationale
summary: The default MTU of 65280 octets far exceeds typical Internet message sizes, so implementations SHOULD implement Path MTU Discovery or maintain different MTU values for on-link and off-link destinations to avoid fragmentation in routed environments.
