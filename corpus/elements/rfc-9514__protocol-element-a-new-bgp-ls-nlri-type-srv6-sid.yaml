document: rfc-9514
kind: protocol-element
summary: A new BGP-LS NLRI type, SRv6 SID NLRI (type 6), is introduced to advertise SRv6 SIDs associated with a node. It comprises a Protocol-ID (1 octet), Identifier (8 octets), Local Node Descriptors, and SRv6 SID Descriptors, enabling granular per-SID advertisement without inflating Node NLRI updates.
section: "6"
