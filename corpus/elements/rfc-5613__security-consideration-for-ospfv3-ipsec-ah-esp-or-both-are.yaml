document: rfc-5613
kind: security-consideration
summary: For OSPFv3, IPsec AH, ESP, or both are applied to the entire OSPFv3 payload including the LLS block, so OSPFv3 LLS data inherits the authentication and encryption provided by the OSPFv3 security architecture (RFC 4552).
