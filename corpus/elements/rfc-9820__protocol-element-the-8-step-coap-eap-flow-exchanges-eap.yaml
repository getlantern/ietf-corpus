document: rfc-9820
kind: protocol-element
summary: 'The 8-step CoAP-EAP flow exchanges EAP messages over CoAP POST requests: the EAP peer sends a trigger (Step 0), the authenticator sends EAP-Req/Id with RID-C and optional cipher suites (Step 1), the peer responds with EAP-Resp/Id, RID-I, and selected cipher suite (Step 2), EAP method messages are exchanged (Steps 3–6), and the authenticator sends EAP Success in an OSCORE-protected POST for key confirmation (Step 7), confirmed by an OSCORE-protected 2.04 Changed (Step 8).'
section: "3.2"
topics:
    - security
    - crypto
