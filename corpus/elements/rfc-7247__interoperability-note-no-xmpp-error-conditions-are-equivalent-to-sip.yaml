document: rfc-7247
kind: interoperability-note
summary: No XMPP error conditions are equivalent to SIP provisional (1xx) or successful (2xx) response codes; therefore this document suggests error mappings only for SIP redirection (3xx), request failure (4xx), server failure (5xx), and global failure (6xx) families.
