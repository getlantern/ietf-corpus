document: rfc-4842
kind: normative-requirement
summary: All CEP SPE implementations MUST support a packet size of 783 bytes and MAY support other packet sizes. VT emulation implementations MUST support payload size of one full VT super-frame and MAY support 1/2 and 1/4 VT super-frame payload sizes.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
