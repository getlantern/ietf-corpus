document: rfc-3207
kind: design-rationale
summary: Publicly-referenced SMTP servers are prohibited from requiring STARTTLS for local mail delivery to preserve the interoperability of the existing Internet SMTP infrastructure, ensuring that not all mail servers need to support TLS for the email system to function.
section: "4"
topics:
