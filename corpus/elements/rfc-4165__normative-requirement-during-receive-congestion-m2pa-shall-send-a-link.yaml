document: rfc-4165
kind: normative-requirement
summary: During receive congestion, M2PA SHALL send a Link Status Busy message at onset (and MAY send additional ones), SHALL NOT acknowledge the triggering message or any messages before Link Status Busy Ended, and the peer MUST NOT send User Data messages after receiving Link Status Busy and before receiving Link Status Busy Ended.
section: 4.1.5
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
