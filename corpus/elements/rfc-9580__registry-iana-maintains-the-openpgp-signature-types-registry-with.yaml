document: rfc-9580
kind: registry
summary: IANA maintains the 'OpenPGP Signature Types' registry with 15 defined type IDs from 0x00 to 0xFF, and the 'OpenPGP Secret Key Encryption (S2K Usage Octet)' registry defining values 0 (Unprotected), 253 (AEAD), 254 (CFB), and 255 (MalleableCFB). Both registries were renamed and updated from RFC 4880 predecessors.
