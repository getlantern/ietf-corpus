document: rfc-3057
kind: protocol-element
summary: The Traffic Mode Type parameter (Tag 0xb) in ASPAC/ASPIA messages specifies either Over-ride (0x1), where the ASP takes over all traffic for an AS, or Load-share (0x2), where it shares traffic with other active ASPs. Only one Traffic Mode Type is allowed per Interface Identifier.
section: 3.3.2.5
topics:
    - sctp
