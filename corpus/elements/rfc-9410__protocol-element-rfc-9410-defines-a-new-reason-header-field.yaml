document: rfc-9410
kind: protocol-element
summary: RFC 9410 defines a new Reason header field protocol value "STIR" for use with SIP-based STIR applications. This protocol value enables STIR-specific error cause codes defined in RFC 8224 to be carried in Reason header fields, including in provisional (1xx) and final responses.
