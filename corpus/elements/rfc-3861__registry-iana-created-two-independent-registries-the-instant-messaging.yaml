document: rfc-3861
kind: registry
summary: 'IANA created two independent registries: the Instant Messaging SRV Protocol Label registry and the Presence SRV Protocol Label registry. Each entry consists of a label name and a pointer to a specification describing how the named protocol uses SRV. Specifications must conform to RFC 2434 ''specification required'' requirements.'
