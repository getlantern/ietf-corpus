document: rfc-6846
kind: normative-requirement
summary: When decompressing IR or IR-DYN packets, the decompressor MUST validate header integrity using CRC-8; on failure the packet MUST NOT be delivered to upper layers. For CO packets, CRC verification MUST be performed; repair attempts must also pass CRC verification before delivery, and the context MUST NOT be updated on any failure.
section: 5.3.1.1
rfc2119_level: MUST
topics:
    - tcp
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
