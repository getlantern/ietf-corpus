document: rfc-5035
kind: normative-requirement
summary: When the SHA-1 hash function is used, the SigningCertificate attribute MUST be used. The SigningCertificateV2 attribute MUST be used if any algorithm other than SHA-1 is used and SHOULD NOT be used for SHA-1.
section: "2"
rfc2119_level: MUST
topics:
