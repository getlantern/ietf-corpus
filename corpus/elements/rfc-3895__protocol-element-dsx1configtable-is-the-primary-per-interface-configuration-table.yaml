summary: dsx1ConfigTable is the primary per-interface configuration table, indexed by dsx1LineIndex (which SHOULD equal ifIndex). It contains 22 objects covering line type, coding, loopback config/status, signal mode, transmit clock source, channelization, FDL usage, circuit identifier, and line build-out.
