document: rfc-3986
kind: wire-format
summary: Unreserved characters (ALPHA / DIGIT / "-" / "." / "_" / "~") may appear in a URI without percent-encoding. A URI differing only in whether an unreserved character is percent-encoded identifies the same resource.
section: "2.3"
extracted_by: claude-sonnet-4-6
