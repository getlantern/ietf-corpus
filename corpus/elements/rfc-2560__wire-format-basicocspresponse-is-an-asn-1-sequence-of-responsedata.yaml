summary: BasicOCSPResponse is an ASN.1 SEQUENCE of ResponseData, signatureAlgorithm (AlgorithmIdentifier), signature (BIT STRING computed over hash of DER-encoded ResponseData), and optional certs. ResponseData includes version, responderID, producedAt (GeneralizedTime), responses (SEQUENCE OF SingleResponse), and optional extensions.
