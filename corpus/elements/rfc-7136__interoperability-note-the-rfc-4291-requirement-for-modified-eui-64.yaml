document: rfc-7136
kind: interoperability-note
summary: The RFC 4291 requirement for 'Modified EUI-64 format' is inapplicable to IIDs not actually based on an underlying EUI-64 address. In practice the IETF has assigned 64-bit IIDs that have nothing to do with EUI-64, making the original blanket requirement misleading for implementors of new IID schemes.
section: "2"
topics:
    - ip
