document: rfc-4372
kind: normative-requirement
summary: Upon receiving a non-nul CUI in an Access-Request, the home RADIUS server MAY verify the CUI matches the one from the previous Access-Accept. If verification fails, the server SHOULD respond with an Access-Reject.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
