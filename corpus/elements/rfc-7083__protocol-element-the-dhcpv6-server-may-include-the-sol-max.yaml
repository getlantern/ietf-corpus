document: rfc-7083
kind: protocol-element
summary: The DHCPv6 server MAY include the SOL_MAX_RT option in any response to a client that requested it via Option Request option. The option MUST be sent in the main body of the message, not encapsulated inside IA_NA, IA_TA, or IA_PD options.
