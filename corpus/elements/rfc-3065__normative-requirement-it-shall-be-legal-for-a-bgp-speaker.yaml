document: rfc-3065
kind: normative-requirement
summary: It SHALL be legal for a BGP speaker to advertise an unchanged NEXT_HOP and MED attribute to peers in a neighboring AS within the same confederation, and the restriction against sending LOCAL_PREFERENCE to intra-confederation peers is removed.
section: "7"
rfc2119_level: MUST
topics:
    - bgp
    - routing
