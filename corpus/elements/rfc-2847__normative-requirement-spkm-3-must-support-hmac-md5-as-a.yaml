document: rfc-2847
kind: normative-requirement
summary: SPKM-3 MUST support HMAC-MD5 as a mandatory integrity algorithm (MAC) because DES-MAC's 56-bit security is inadequate and the initiator, being anonymous at the SPKM-3 level, cannot use digital signature algorithms after context establishment.
section: 2.3.1
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
