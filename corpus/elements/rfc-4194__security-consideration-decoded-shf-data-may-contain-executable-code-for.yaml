document: rfc-4194
kind: security-consideration
summary: Decoded SHF data may contain executable code for a target platform. Consumers of SHF dumps intended for firmware or embedded code targets should apply additional transport security, certificates, or platform-level checksums as appropriate for their threat model.
section: "9"
topics:
