document: rfc-8873
kind: interoperability-note
summary: 'A gateway can interwork MSRP over data channels with MSRP over TCP/TLS in two modes: as a B2BUA (no further specification needed) or at transport level using MSRP CEMA. If the non-data-channel endpoint does not support MSRP CEMA, transport-level interworking is not possible and the gateway must act as a B2BUA.'
section: "6"
topics:
