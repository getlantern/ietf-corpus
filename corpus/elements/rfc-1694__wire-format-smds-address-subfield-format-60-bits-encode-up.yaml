document: rfc-1694
kind: wire-format
summary: 'SMDS address subfield format: 60 bits encode up to 15 BCD decimal digits, left-most most significant, with unused digit positions padded on the right with ones. For country code 0001, the subsequent 40 bits must be BCD-encoded 10-digit addresses and the remaining 16 LSBs must be all ones.'
section: "4.6"
