document: rfc-7003
kind: normative-requirement
summary: Senders MUST NOT use the Interval Metric flag values I=00 or I=01. If a block is received with I=00 or I=01, the receiver MUST discard the block.
section: "3.2"
rfc2119_level: MUST NOT
