document: rfc-5420
kind: normative-requirement
summary: A node MUST NOT push an RRO Attributes subobject onto the RECORD_ROUTE object without also pushing an IPv4, IPv6, or Unnumbered Interface ID subobject. The Attributes subobject SHOULD be pushed after the Record Label subobject(s) and is bound to the immediately following LSR-identifying subobject.
section: 7.3.1
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
