document: rfc-1042
kind: protocol-element
summary: When the 802.5 'address not recognized' indicator is set after transmission, the preferred recovery action is to delete the ARP cache entry and send a new ARP request. This allows graceful recovery from first-hop bridge/router failures and changed hardware addresses.
section: For IEEE 802.5
topics:
    - ip
