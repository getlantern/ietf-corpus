document: rfc-7611
kind: design-rationale
summary: ACCEPT_OWN is defined as a BGP community rather than a new attribute because a community is the minimal, backward-compatible signal needed. A PE that does not support ACCEPT_OWN will simply ignore the community and continue to reject its own routes, preserving existing behavior.
section: "1"
topics:
    - bgp
    - routing
