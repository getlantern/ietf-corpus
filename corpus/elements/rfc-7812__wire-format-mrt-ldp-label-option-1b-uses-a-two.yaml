document: rfc-7812
kind: wire-format
summary: 'MRT LDP Label Option 1B uses a two-label stack: a top topology-id label identifying MRT-Red or MRT-Blue, and a second FEC label. Transit routers pop the topology-id label, use it for next-hop selection, swap the FEC label using normal LDP bindings, then push the topology-id label for the next hop.'
section: 6.1.1.2
topics:
    - routing
    - mpls
