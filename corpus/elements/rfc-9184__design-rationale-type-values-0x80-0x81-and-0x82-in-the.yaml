document: rfc-9184
kind: design-rationale
summary: Type values 0x80, 0x81, and 0x82 in the BGP Transitive Extended Community Types registry were originally marked as 'Experimental Use', but they have been actively used in RFC 5575 and RFC 7674 (both obsoleted by RFC 8955) for Flowspec. Their primary use is non-experimental, making the 'Experimental Use' label misleading.
