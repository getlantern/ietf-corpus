document: rfc-6295
kind: security-consideration
summary: Section 9 addresses security considerations for RTP MIDI. As an RTP payload format, standard RTP security mechanisms apply; SRTP should be used for confidentiality, integrity, and replay protection. MIDI commands can directly control hardware devices and instruments, making integrity protection particularly important to prevent unauthorized command injection.
section: "9"
topics:
