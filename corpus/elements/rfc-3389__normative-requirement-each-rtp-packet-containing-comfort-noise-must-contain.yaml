document: rfc-3389
kind: normative-requirement
summary: Each RTP packet containing comfort noise MUST contain exactly one CN payload per channel, because the CN payload has variable length. If multiple audio channels are used, each channel MUST use the same spectral model order M.
section: "4"
rfc2119_level: MUST
