document: rfc-9000
kind: normative-requirement
summary: A QUIC endpoint MUST expand the payload of all UDP datagrams carrying Initial packets to at least 1200 bytes (using PADDING frames), preventing amplification attacks during the handshake and ensuring Version Negotiation responses are triggered.
section: "14.1"
rfc2119_level: MUST
topics:
    - quic
    - security
