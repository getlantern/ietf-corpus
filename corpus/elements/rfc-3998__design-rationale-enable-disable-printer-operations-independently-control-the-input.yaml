document: rfc-3998
kind: design-rationale
summary: Enable/Disable Printer operations independently control the 'input of new jobs' to the IPP Printer, while Pause/Resume operations independently control the 'output of new jobs' to the Output Device. This orthogonal design allows operators to separately gate job intake and job dispatch.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
