document: rfc-3312
kind: protocol-element
summary: The confirm-status attribute specifies a threshold for resource reservation. When that threshold is reached or crossed (in either direction), the receiving UA MUST send a new offer reflecting updated current status as soon as allowed by SIP offer/answer rules.
