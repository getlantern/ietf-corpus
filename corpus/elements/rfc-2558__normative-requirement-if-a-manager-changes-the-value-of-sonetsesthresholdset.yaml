document: rfc-2558
kind: normative-requirement
summary: If a manager changes the value of sonetSESthresholdSet, then the SES statistics collected prior to this change must be invalidated. A SONET/SDH interface must support at least 4 completed 15-minute intervals; the default is 32 and the maximum is 96.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
