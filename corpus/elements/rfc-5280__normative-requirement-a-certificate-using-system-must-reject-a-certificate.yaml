document: rfc-5280
kind: normative-requirement
summary: A certificate-using system MUST reject a certificate if it encounters a critical extension it does not recognize or cannot process. Non-critical extensions MAY be ignored if not recognized, but MUST be processed if recognized.
section: "4.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
