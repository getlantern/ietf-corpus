document: rfc-2853
kind: protocol-element
summary: GSSName is an interface representing a principal identity in GSS-API. It supports multiple simultaneous namespace representations internally (for multi-mechanism environments), export to a canonical byte-array form (NT_EXPORT_NAME), canonicalization to a mechanism name (MN), and equality testing via equals().
