document: rfc-9946
kind: normative-requirement
summary: The load rate adjustment algorithm MUST NOT be used as a general Congestion Control Algorithm (CCA); its purpose is limited to determining Maximum IP-Layer Capacity during infrequent, diagnostic, short-term measurements.
section: "5.1"
rfc2119_level: MUST NOT
