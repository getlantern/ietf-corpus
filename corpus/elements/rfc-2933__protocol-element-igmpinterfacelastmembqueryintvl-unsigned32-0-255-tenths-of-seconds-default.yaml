document: rfc-2933
kind: protocol-element
summary: igmpInterfaceLastMembQueryIntvl (Unsigned32, 0–255 tenths of seconds, default 10) is the Max Response Time inserted into Group-Specific Queries sent in response to Leave Group messages, and the interval between such queries. Tuning this value modifies leave latency; it is irrelevant when igmpInterfaceVersion is 1.
section: "4"
topics:
