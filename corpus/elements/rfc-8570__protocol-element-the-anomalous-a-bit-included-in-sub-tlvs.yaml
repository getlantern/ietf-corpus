document: rfc-8570
kind: protocol-element
summary: The Anomalous (A) bit, included in sub-TLVs for delay (types 33, 34), loss (type 36), and not in variation or bandwidth sub-TLVs. The A bit is set when a measured value exceeds a configured maximum threshold, and cleared when the value falls below a configured reuse threshold, enabling receivers to trigger failover or failback actions.
section: "2"
topics:
