document: rfc-1237
kind: interoperability-note
summary: A third multi-homing solution assigns a single prefix from one TRD and selectively propagates the route to a limited set of other TRDs rather than globally. This is particularly appropriate for special-interest group backbones whose routing prefixes should not be advertised to the general internet.
section: "5.4"
