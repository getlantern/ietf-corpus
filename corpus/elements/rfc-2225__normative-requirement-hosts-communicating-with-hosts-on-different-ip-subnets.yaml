document: rfc-2225
kind: normative-requirement
summary: Hosts communicating with hosts on different IP subnets MUST communicate via an intermediate IP router even though it may be possible to open a direct VC between the two IP members over the ATM network.
section: "5.1"
rfc2119_level: MUST
topics:
