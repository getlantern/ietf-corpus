document: rfc-7173
kind: normative-requirement
summary: The sending pseudowire TRILL switch port SHOULD map the inner priority of TRILL Data packets to the Traffic Class field of the pseudowire label to minimize the probability that higher priority packets will be discarded due to lower priority packet congestion.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - mpls
    - qos
    - routing
