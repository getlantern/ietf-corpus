document: rfc-5925
kind: interoperability-note
summary: TCP-AO cannot interoperate natively across NAT/NAPT devices because the IP addresses and/or ports included in the MAC computation are modified in transit. Traversal may require encapsulation (e.g., in UDP) analogous to IPsec NAT traversal.
section: "9.2"
topics:
    - tcp
    - security
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
