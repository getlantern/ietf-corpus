document: rfc-5676
kind: wire-format
summary: SyslogParamValueString is an OCTET STRING encoding UTF-8 (RFC 3629) text for SYSLOG SD-PARAM values. Byte sequences not corresponding to valid UTF-8 code points (0x00000000–0x7FFFFFFF), overlong sequences, and out-of-range sequences are prohibited.
