document: rfc-1044
kind: normative-requirement
summary: A value of 0xFF SHOULD be placed in the Trunks to Try field (byte 0) to assure delivery over any HYPERchannel technology. For messages to destinations outside the immediate network, 0xFF in this byte ensures all possible trunks in intermediate networks are tried. Other values should only be used when specific site hardware requires it.
section: TRUNKS TO TRY
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
