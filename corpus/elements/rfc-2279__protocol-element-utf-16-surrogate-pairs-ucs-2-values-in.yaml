document: rfc-2279
kind: protocol-element
summary: UTF-16 surrogate pairs — UCS-2 values in the range D800–DFFF — represent UCS-4 characters above U+FFFF and require special treatment when encoding UCS-2 to UTF-8. The UTF-16 transformation must first be reversed to recover the underlying UCS-4 code point, which is then encoded as a 4-byte UTF-8 sequence.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
