document: rfc-4234
kind: design-rationale
summary: ABNF was extracted from RFC 822 to allow selective reference by non-email specifications. The design balances compactness and simplicity with reasonable representational power, diverging from standard BNF in naming rules, repetition, alternatives, order-independence, and value ranges.
