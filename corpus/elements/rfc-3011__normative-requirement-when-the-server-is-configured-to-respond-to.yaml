document: rfc-3011
kind: normative-requirement
summary: When the server is configured to respond to the subnet selection option, is allocating an address, and the option is present, the server MUST allocate the address on either the specified subnet or a subnet on the same network segment as the specified subnet.
section: "2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
