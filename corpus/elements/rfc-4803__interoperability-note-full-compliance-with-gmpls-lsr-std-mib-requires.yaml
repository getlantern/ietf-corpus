document: rfc-4803
kind: interoperability-note
summary: Full compliance with GMPLS-LSR-STD-MIB requires mandatory support for IF-MIB groups (ifGeneralInformationGroup, ifCounterDiscontinuityGroup), all MPLS-LSR-STD-MIB mandatory groups, and the three GMPLS groups (gmplsInterfaceGroup, gmplsInSegmentGroup, gmplsOutSegmentGroup). GMPLS-LABEL-STD-MIB is not mandatory if all labels fit within 32 bits.
