document: rfc-3859
kind: design-rationale
summary: CPP deliberately defines only minimum-necessary attributes for interoperability; presence protocol functions corresponding to CPP operations may carry additional information that will not be mapped by CPP gateways. This minimalism allows diverse protocols to comply without constraining their richer native feature sets.
section: "2"
