summary: 'Two bits are allocated in the Admin_Status object: bit 23 ''OAM Flows Enabled'' (M, hex 0x00000100) controls enabling/disabling OAM mechanisms, and bit 24 ''OAM Alarms Enabled'' (O, hex 0x00000080) controls whether OAM-triggered alarms and consequent actions are executed.'
