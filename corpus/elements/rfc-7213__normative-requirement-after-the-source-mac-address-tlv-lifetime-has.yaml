document: rfc-7213
kind: normative-requirement
summary: After the Source MAC Address TLV lifetime has expired (due to peer ceasing transmission, removing the TLV, or disconnecting), the expired MAC address MUST NOT be used, and the node MUST return to selecting MAC addresses as though no advertisements were received.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
