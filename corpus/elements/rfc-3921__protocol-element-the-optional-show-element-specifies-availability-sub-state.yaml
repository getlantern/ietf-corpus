document: rfc-3921
kind: protocol-element
summary: 'The optional <show/> element specifies availability sub-state and MUST contain one of four values: ''away'', ''chat'' (actively interested in chatting), ''dnd'' (Do Not Disturb), or ''xa'' (Extended Away). A presence stanza MUST NOT contain more than one <show/> element.'
section: 2.2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
