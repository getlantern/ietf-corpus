document: rfc-7524
kind: protocol-element
summary: 'Two new BGP Extended Community Sub-Types are defined: ''Inter-Area P2MP Next-Hop'' as both a Transitive IPv4-Address-Specific and a Transitive IPv6-Address-Specific Extended Community. The Global Administrator field MUST be set to the IP address of the PE, ABR, or ASBR originating or advertising the route; the Local Administrator field MUST be set to 0.'
section: "4"
topics:
