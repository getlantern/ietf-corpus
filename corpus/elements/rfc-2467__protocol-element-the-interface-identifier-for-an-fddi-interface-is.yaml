document: rfc-2467
kind: protocol-element
summary: 'The Interface Identifier for an FDDI interface is derived from the EUI-64 identifier formed from the 48-bit IEEE 802 MAC address: the OUI (first 3 octets) becomes the company_id, octets 4–5 are set to FFFE hexadecimal, and the last 3 octets of the MAC address become the last 3 octets of the EUI-64.'
