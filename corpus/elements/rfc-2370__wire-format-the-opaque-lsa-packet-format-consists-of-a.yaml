document: rfc-2370
kind: wire-format
summary: The Opaque LSA packet format consists of a standard LSA header (LS age, Options, LS type 9/10/11, Advertising Router, LS Sequence Number, LS checksum, Length) followed by an 8-bit Opaque Type field and a 24-bit Opaque ID in the Link-State ID position, then variable-length Opaque Information padded to 32-bit alignment.
section: A.2
topics:
    - routing
