document: rfc-6887
kind: protocol-element
summary: The FILTER option (MAP only) restricts inbound traffic for a mapping to packets from a specific remote peer IP address and port prefix, providing per-mapping source filtering. If the server cannot create the requested number of filters it returns EXCESSIVE_REMOTE_PEERS (result code 13).
section: "13.3"
topics:
    - nat
    - security
