document: rfc-7978
kind: design-rationale
summary: DTLS Pairwise Security and Composite Security are designed exclusively for pairwise (unicast) use. For multi-destination delivery, the specification requires serial unicasting to each data-accessible RBridge in the recipient group, with a note that a true group-keyed SType for multicast/broadcast will be defined in a separate document.
section: "4"
topics:
