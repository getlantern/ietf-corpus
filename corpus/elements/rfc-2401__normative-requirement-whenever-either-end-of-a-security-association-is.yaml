document: rfc-2401
kind: normative-requirement
summary: Whenever either end of a security association is a security gateway, the SA MUST be tunnel mode. Thus any SA between two security gateways, or between a host and a security gateway carrying transit traffic, is always tunnel mode.
section: "4.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
