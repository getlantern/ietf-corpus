document: rfc-3220
kind: wire-format
summary: 'Mobility Agent Advertisement Extension (Type 16) appended to ICMP Router Advertisement: Type (1 byte), Length (1 byte, 6+4*N), Sequence Number (2 bytes), Registration Lifetime (2 bytes, 0xffff=infinity), flags R/B/H/F/M/G/r/T (1 byte), reserved (1 byte), followed by N Care-of Addresses (4 bytes each). The ''F'' bit indicates foreign agent service; ''H'' indicates home agent service.'
section: 2.1.1
