document: rfc-4558
kind: design-rationale
summary: In GMPLS networks, control plane and data plane are separated, meaning RSVP Hello messages are terminated at control channel endpoints (identified by Node-ID) rather than on data bearer link interfaces. This separation necessitates Node-ID based Hello sessions rather than interface-bound Hello sessions.
section: "1"
topics:
