document: rfc-3816
kind: design-rationale
summary: ROHC is described as an evolving technology, so managed objects are split into a general ROHC-MIB module and profile-specific modules (ROHC-UNCOMPRESSED-MIB, ROHC-RTP-MIB). This flexible approach allows future profiles (e.g., TCP, SCTP) to be supported each by its own small, easy-to-design module without modifying the base MIB.
