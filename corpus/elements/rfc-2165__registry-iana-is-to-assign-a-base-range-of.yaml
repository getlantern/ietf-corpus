document: rfc-2165
kind: registry
summary: IANA is to assign a base range of 1024 contiguous multicast addresses for Service-Specific Discovery Addresses. Service-specific multicast addresses are derived by adding the SLPhash value (0-1023) of the ASCII-encoded Service Type string to this base address.
