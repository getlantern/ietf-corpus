document: rfc-9259
kind: design-rationale
summary: The centralized monitoring approach extends RFC 8403 (MPLS centralized OAM) to SRv6 by using loopback probes that originate and terminate at the controller node (N100), allowing the controller to monitor arbitrary SRv6 paths without deploying OAM at every intermediate node.
section: A.4
