document: rfc-3416
kind: design-rationale
summary: 'The request-id field serves dual purposes: correlating potentially multiple outstanding requests with incoming responses, and identifying messages duplicated by the unreliable datagram network. Using the same request-id on retransmission allows either the original or retransmitted response to satisfy the request, but a different request-id is recommended for RTT calculation.'
section: "4.1"
topics:
    - snmp
