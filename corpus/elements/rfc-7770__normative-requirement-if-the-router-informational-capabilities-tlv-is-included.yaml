document: rfc-7770
kind: normative-requirement
summary: If the Router Informational Capabilities TLV is included in the RI LSA, it MUST be the first TLV in the first instance (Instance 0) of the OSPF RI LSA and MUST accurately reflect the router's capabilities in the advertised scope.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
