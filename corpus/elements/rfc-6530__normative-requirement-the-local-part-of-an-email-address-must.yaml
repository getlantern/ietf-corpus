document: rfc-6530
kind: normative-requirement
summary: The local part of an email address MUST be interpreted and assigned semantics only by the host specified in the domain part of the address. This rule — unchanged since RFC 1123 (1989) — means that in-transit downgrade mechanisms that transform local parts cannot be used in relay.
section: "9"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
