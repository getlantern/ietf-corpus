document: rfc-2518
kind: normative-requirement
summary: 'All DAV compliant resources MUST support the PROPFIND method. PROPFIND without a Depth header MUST act as if ''Depth: infinity'' was included. DAV compliant servers MUST support ''Depth: 0'', ''1'', and ''infinity'' behaviors.'
section: "8.1"
rfc2119_level: MUST
topics:
    - http
