document: rfc-5778
kind: protocol-element
summary: The Service-Selection AVP (AVP Code 493, UTF8String) identifies the service or external network with which the mobility service should be associated; it can be extracted from the IKEv2 IDr payload or the Service Selection Mobility Option in the BU. If present in both request and reply, it SHOULD contain the same service name.
section: "6.2"
topics:
