document: rfc-8797
kind: normative-requirement
summary: When both peers have set the R flag, each RDMA Send with Invalidate operation MUST invalidate only an STag associated with the Transaction ID (XID) in the rdma_xid field of the RPC-over-RDMA Transport Header it carries.
section: "4.1"
rfc2119_level: MUST
