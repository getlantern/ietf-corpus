document: rfc-7825
kind: security-consideration
summary: RTSP signaling SHOULD be protected using TLS to prevent eavesdropping and modification of ICE candidate information. The STUN amplification attack (ICE §18.5.2) is mitigated by the high-reachability option, which limits server-initiated checks to addresses from which the server has already received an incoming check.
section: "11.1"
rfc2119_level: SHOULD
topics:
    - security
    - nat
    - realtime
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
