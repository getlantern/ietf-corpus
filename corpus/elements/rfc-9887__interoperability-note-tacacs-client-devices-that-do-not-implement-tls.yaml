document: rfc-9887
kind: interoperability-note
summary: TACACS+ client devices that do not implement TLS require access to separate non-TLS TACACS+ servers. TLS TACACS+ servers MUST NOT serve non-TLS clients; operators must deploy dedicated non-TLS servers for legacy devices.
section: "6.2"
topics:
