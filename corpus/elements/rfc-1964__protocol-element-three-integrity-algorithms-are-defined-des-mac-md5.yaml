document: rfc-1964
kind: protocol-element
summary: 'Three integrity algorithms are defined: DES MAC MD5 (MD5 hash of plaintext, then DES-CBC MAC on 16-byte result), MD2.5 (byte-reversed-key DES-CBC seed prepended to data, then MD5 with first 8 bytes stored), and DES MAC (direct 64-bit DES-CBC MAC on plaintext). Support for DES MAC may not be present in all implementations.'
section: 1.2.1.1
topics:
