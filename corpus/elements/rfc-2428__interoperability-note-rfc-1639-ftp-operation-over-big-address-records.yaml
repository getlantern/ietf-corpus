document: rfc-2428
kind: interoperability-note
summary: RFC 1639 (FTP Operation Over Big Address Records) provided earlier extensions for non-IPv4 FTP but was found to fail in multi-protocol environments during IPv4-to-IPv6 transition; RFC 2428 supersedes that approach for IPv6.
