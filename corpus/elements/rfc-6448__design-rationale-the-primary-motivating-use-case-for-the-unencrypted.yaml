document: rfc-6448
kind: design-rationale
summary: The primary motivating use case for the unencrypted KRB-CRED form is the SAML V2.0 Kerberos Attribute Profile, where an Identity Provider transfers a Kerberos service ticket to a Service Provider inside an encrypted and signed SAML attribute statement, eliminating the need for pre-shared Kerberos keys between the two parties.
