document: rfc-6856
kind: interoperability-note
summary: MIME binary content-transfer-encoding (RFC 2045 Section 6.2) remains prohibited even in UTF-8 mode; only MIME 8bit content-transfer-encoding (8BITMIME, RFC 6152) is permitted for non-ASCII content.
