document: rfc-9390
kind: normative-requirement
summary: When no external capability discovery mechanism is deployed, a Diameter node SHOULD append the Session-Group-Capability-Vector AVP to application messages to announce its grouping capability, and MUST set the BASE_SESSION_GROUP_CAPABILITY flag within that AVP.
section: 4.1.2
rfc2119_level: MUST
