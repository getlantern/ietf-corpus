document: rfc-8955
kind: security-consideration
summary: Flow Specification BGP speakers (e.g., automated DDoS controllers) that are improperly programmed or rogue may announce unintended Flow Specifications, send updates at a high rate, or generate a large number of specifications, potentially stressing receiving systems or exceeding their capacity. Service providers need to consider device capacity and may need to limit accepted Flow Specifications.
section: "12"
topics:
    - bgp
    - routing
    - security
