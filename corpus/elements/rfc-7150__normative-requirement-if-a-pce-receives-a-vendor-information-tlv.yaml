document: rfc-7150
kind: normative-requirement
summary: If a PCE receives a Vendor Information TLV with an unknown Enterprise Number, it MUST treat it as an unknown TLV and handle it per RFC 5440, which requires that unrecognized TLVs MUST be ignored.
section: "3"
rfc2119_level: MUST
topics:
    - routing
