document: rfc-2915
kind: interoperability-note
summary: Backslashes in a regexp must be entered twice in a DNS zone master file in order to appear once in query responses due to DNS escaping rules. This double-escaping requirement may not have been tested by all DNS server implementors.
section: "10"
topics:
    - dns
