document: rfc-3382
kind: wire-format
summary: The begCollection tag includes the attribute name field (with nonzero name-length) and a zero-length value field. The memberAttrName tag always has a zero name-length (making it part of a 1setOf sequence) and its value field contains the name of the member attribute.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
