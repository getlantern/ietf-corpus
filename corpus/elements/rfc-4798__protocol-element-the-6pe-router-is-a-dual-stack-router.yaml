document: rfc-4798
kind: protocol-element
summary: The 6PE router is a Dual Stack router at the border of the IPv4 MPLS cloud, connecting IPv6 islands to the MPLS core. It speaks MP-BGP over IPv4 to exchange IPv6 reachability and uses IPv4-signaled LSPs for data transport without requiring IPv6 in the core.
