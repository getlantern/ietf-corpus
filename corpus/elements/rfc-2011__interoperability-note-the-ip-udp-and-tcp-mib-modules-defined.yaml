document: rfc-2011
kind: interoperability-note
summary: The IP, UDP, and TCP MIB modules defined here support only IPv4. They use the IpAddress type defined as an OCTET STRING of length 4 to represent 32-bit IPv4 addresses and do not support 128-bit IPv6 addresses.
