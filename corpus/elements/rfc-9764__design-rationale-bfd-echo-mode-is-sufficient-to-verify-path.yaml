document: rfc-9764
kind: design-rationale
summary: BFD Echo mode is sufficient to verify Path MTU for directly connected single-hop systems, but for multihop BFD (RFC 5883) this guarantee does not hold, motivating the need for a padded-PDU approach to Path MTU verification over multiple hops.
