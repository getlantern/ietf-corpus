document: rfc-6059
kind: protocol-element
summary: 'The Simple DNA Address Table (SDAT) is a per-interface data structure indexed by router identifier (link-local IPv6 address plus link-layer MAC address of the router). Each entry stores the IPv6 address and its lifetimes, prefix (SLAAC), DHCP-specific parameters (DUID, IAID, IA type), and three flags: D-Flag (SLAAC vs DHCPv6), O-Flag (operable/inoperable), and S-Flag (whether SEND was used in the RA that created the entry).'
section: "4"
topics:
    - ip
    - v6ops
