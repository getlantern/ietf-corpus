document: rfc-6871
kind: normative-requirement
summary: For RTP-based media capabilities used in a potential configuration, payload type mappings MUST be provided via the 'pt=' parameter in the 'pcfg' attribute. Payload type escaping may be used in 'mfcap', 'mscap', and 'acap' attribute arguments via the '%m=<cap-num>%' substitution sequence.
section: 3.3.4.2
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
