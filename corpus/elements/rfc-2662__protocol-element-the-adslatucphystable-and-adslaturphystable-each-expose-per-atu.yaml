kind: protocol-element
summary: 'The adslAtucPhysTable and adslAturPhysTable each expose per-ATU physical-layer parameters: inventory fields (serial number up to 32 chars, vendor ID up to 16 chars, version number up to 16 chars), adslAtu*CurrSnrMgn in tenth dB (range -640..640), adslAtu*CurrAtn in tenth dB (0..630), adslAtu*CurrOutputPwr in tenth dBm (-310..310), and adslAtu*CurrAttainableRate in bps.'
