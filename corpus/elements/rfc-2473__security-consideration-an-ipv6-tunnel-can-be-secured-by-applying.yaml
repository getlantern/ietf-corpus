document: rfc-2473
kind: security-consideration
summary: An IPv6 tunnel can be secured by applying IPsec (AH per RFC 2402, or ESP per RFC 2406) between the entry-point and exit-point nodes per the security architecture of RFC 2401. Security headers are prepended as part of the tunnel headers and processed at the exit-point; there is no dependency between tunnel-level and payload-level security.
section: "9"
topics:
    - ip
    - vpn
    - ipsec
    - security
