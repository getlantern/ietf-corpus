document: rfc-5341
kind: interoperability-note
summary: When a tel URI with a proposed parameter will be converted to a URI used by SIP or H.323, the Designated Expert must assess whether the parameter encapsulates signaling information (e.g., ISUP parameters) that is not meaningful to request processing in the converted URI's domain.
section: "4.2"
