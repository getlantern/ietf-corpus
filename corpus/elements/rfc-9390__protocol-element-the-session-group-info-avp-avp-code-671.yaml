document: rfc-9390
kind: protocol-element
summary: The Session-Group-Info AVP (AVP Code 671) is of type Grouped and contains a Session-Group-Control-Vector AVP and an optional Session-Group-Id AVP. It carries the group identifier and the action to be performed for the associated session or group.
