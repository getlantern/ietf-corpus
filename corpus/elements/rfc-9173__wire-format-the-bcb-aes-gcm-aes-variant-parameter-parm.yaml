document: rfc-9173
kind: wire-format
summary: The BCB-AES-GCM AES Variant parameter (Parm Id 2) is a CBOR unsigned integer. Value 1 = A128GCM, value 3 = A256GCM (default). Regardless of variant, the generated authentication tag MUST always be 128 bits.
section: 4.3.2
rfc2119_level: MUST
topics:
    - crypto
    - cbor
