document: rfc-4021
kind: interoperability-note
summary: The Content-Base header field was included in the first version of MHTML (RFC 2110) and HTTP 1.1 but was removed in the second version (RFC 2557). Implementations using Content-Location should be preferred for resolving relative URIs within a content part.
section: 2.2.6
topics:
