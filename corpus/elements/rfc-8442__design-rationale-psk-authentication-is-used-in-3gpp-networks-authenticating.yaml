summary: PSK authentication is used in 3GPP networks (authenticating subscribers and networks) and IoT deployments where it is preferred for performance and energy efficiency. ECDHE is included to provide Perfect Forward Secrecy, which is mandatory in HTTP/2 and CoAP.
