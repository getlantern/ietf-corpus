document: rfc-7856
kind: normative-requirement
summary: The tunnelIfRemoteInetAddress MUST be set to '0.0.0.0' for IPv4 or '::' for IPv6 in the IP Tunnel MIB, because the softwire mesh uses a point-to-multipoint tunnel model where the actual per-destination address is stored in swmEncapsIIPDst.
section: "5.2"
rfc2119_level: MUST
topics:
    - snmp
    - vpn
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
