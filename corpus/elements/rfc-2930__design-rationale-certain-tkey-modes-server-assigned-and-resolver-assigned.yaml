document: rfc-2930
kind: design-rationale
summary: Certain TKEY modes (server assigned and resolver assigned) perform encryption of keying material, which may affect export or import status for some countries. This is why these modes are OPTIONAL while DH exchange, which does not encrypt transmitted data, is mandatory.
section: "1"
topics:
