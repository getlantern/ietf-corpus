document: rfc-9360
kind: protocol-element
summary: The 'x5chain' header parameter (label 33, value type COSE_X509) carries an ordered array of X.509 certificates, starting with the end-entity certificate followed by the signing certificate and so on. The full chain need not be present if the relying party can locate missing certificates.
