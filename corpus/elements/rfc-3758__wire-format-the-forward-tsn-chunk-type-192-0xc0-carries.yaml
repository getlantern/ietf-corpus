document: rfc-3758
kind: wire-format
summary: The FORWARD TSN chunk (type 192 / 0xC0) carries a 32-bit New Cumulative TSN field followed by variable-length Stream-N (16-bit) and Stream Sequence-N (16-bit) pairs, one per skipped ordered stream. Flags are set to 0x00 and ignored on receipt.
