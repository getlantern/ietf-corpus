document: rfc-5316
kind: normative-requirement
summary: The Remote AS Number sub-TLV MUST be included when a router advertises an inter-AS TE link. When only 2-octet AS numbers are used, the left (high-order) 2 octets of the 4-octet field MUST be set to 0.
section: 3.3.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
