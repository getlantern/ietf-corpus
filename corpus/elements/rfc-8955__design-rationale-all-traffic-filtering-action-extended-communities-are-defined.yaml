document: rfc-8955
kind: design-rationale
summary: All Traffic Filtering Action Extended Communities are defined as transitive, correcting RFC 5575 which left traffic-rate as non-transitive and left the transitivity of other actions undefined. Transitive communities allow actions to propagate appropriately across AS boundaries.
