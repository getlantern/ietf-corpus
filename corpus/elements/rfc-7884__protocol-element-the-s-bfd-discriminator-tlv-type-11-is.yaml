document: rfc-7884
kind: protocol-element
summary: The S-BFD Discriminator TLV (type 11) is a new OSPF Router Information (RI) TLV defined to flood S-BFD discriminator values associated with a target network identifier. It applies to both OSPFv2 and OSPFv3.
