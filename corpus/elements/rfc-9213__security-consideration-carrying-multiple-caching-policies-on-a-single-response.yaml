document: rfc-9213
kind: security-consideration
summary: Carrying multiple caching policies on a single response can cause confusion about how that response will be cached in different systems, potentially resulting in unintentional reuse of responses containing sensitive information. Implementers must exercise care when deploying targeted cache-control headers alongside Cache-Control.
section: "5"
topics:
    - http
    - security
    - privacy
