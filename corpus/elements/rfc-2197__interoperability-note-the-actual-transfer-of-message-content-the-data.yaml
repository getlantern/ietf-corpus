document: rfc-2197
kind: interoperability-note
summary: The actual transfer of message content (the DATA body) is explicitly allowed to be the first 'command' in a pipeline group, permitting a RSET/MAIL FROM sequence for a new transaction to be grouped with the final content transfer of the previous message.
section: "4.1"
topics:
