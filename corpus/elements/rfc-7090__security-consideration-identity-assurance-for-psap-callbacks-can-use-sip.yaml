document: rfc-7090
kind: security-consideration
summary: Identity assurance for PSAP callbacks can use SIP Identity (RFC 4474, cryptographic) or P-Asserted-Identity (RFC 3325, chain of trust), as well as TLS between neighboring SIP entities. The STIR working group was revising these mechanisms at time of writing to better handle legacy interworking.
section: "5.3"
topics:
