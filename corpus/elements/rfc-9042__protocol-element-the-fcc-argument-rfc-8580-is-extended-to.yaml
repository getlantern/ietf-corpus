document: rfc-9042
kind: protocol-element
summary: 'The :fcc argument (RFC 8580) is extended to accept an optional :mailboxid argument. ABNF: MAILBOXID-OPT = ":mailboxid" objectid; FCC-OPTS =/ MAILBOXID-OPT. When specified, the Sieve interpreter checks for a mailbox with the given MAILBOXID and files there if found; otherwise falls back to the :fcc target mailbox.'
section: "5"
topics:
    - email
