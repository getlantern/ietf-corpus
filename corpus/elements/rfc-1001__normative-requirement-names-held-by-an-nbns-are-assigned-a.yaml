document: rfc-1001
kind: normative-requirement
summary: 'Names held by an NBNS are assigned a lifetime during registration negotiation: the end-node proposes a lifetime; the NBNS sets the actual value and may respond with any definite period greater than or equal to that proposed. The end-node must send NAME REFRESH REQUEST packets before lifetime expiry or the NBNS considers the name silently released.'
section: 15.1.3.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
