document: rfc-4821
kind: security-consideration
summary: Because Packetization Layer protocols may share PMTU state, an untrusted or hostile packetization protocol (particularly an application) could harm other protocols on the same host by reducing shared effective MTU state; untrusted protocols SHOULD NOT be permitted to write to shared path MTU state.
section: "11"
topics:
    - security
    - ip
