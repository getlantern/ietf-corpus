document: rfc-9575
kind: protocol-element
summary: 'DRIP defines four SAM Types within ASTM Authentication Type 0x5 (Specific Authentication Method): DRIP Link (0x01) for Broadcast Endorsements, DRIP Wrapper (0x02) for signing full ASTM Messages, DRIP Manifest (0x03) for hashes of ASTM Messages, and DRIP Frame (0x04) for future extensibility.'
