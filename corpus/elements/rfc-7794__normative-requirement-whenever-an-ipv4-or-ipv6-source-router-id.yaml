document: rfc-7794
kind: normative-requirement
summary: Whenever an IPv4 or IPv6 Source Router ID sub-TLV is used, the originating router SHOULD also advertise the corresponding address-family-specific router ID TLV (TLV 134 for IPv4, TLV 140 for IPv6).
section: "2.3"
rfc2119_level: SHOULD
topics:
    - routing
