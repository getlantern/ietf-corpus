document: rfc-9444
kind: interoperability-note
summary: Server newOrder handling for subdomain requests generally follows RFC 8555 Section 7.4. When the server allows subdomain authorizations for the ancestorDomain, it creates an authorization object against that ancestor domain and includes subdomainAuthAllowed=true.
