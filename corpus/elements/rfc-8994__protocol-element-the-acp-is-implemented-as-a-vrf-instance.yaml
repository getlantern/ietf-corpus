document: rfc-8994
kind: protocol-element
summary: The ACP is implemented as a VRF instance with a dedicated IPv6 forwarding table and routing table, entirely separate from the data plane. ACP secure channels are mapped to ACP virtual interfaces attached to this VRF. An ACP loopback interface within the VRF holds the node's ULA ACP address.
