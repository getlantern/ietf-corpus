document: rfc-2275
kind: normative-requirement
summary: An authoritative SNMP engine supporting VACM SHOULD be configured during installation with one of three initial security configurations (initial-minimum-security, initial-semi-security, or initial-no-access), including pre-populated entries in vacmContextTable, vacmSecurityToGroupTable, vacmAccessTable, and vacmViewTreeFamilyTable as specified in Appendix A.
section: A.1
rfc2119_level: SHOULD
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
