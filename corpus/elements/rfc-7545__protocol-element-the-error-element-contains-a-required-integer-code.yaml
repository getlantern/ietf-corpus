document: rfc-7545
kind: protocol-element
summary: 'The Error Element contains a required integer code, an optional human-readable message string, and optional structured data. Standard error codes include: MISSING (101), INVALID_VALUE (102), UNSUPPORTED (103), UNIMPLEMENTED (104), OUTSIDE_COVERAGE (105), DATABASE_CHANGE (106), and NOT_REGISTERED (107).'
section: "5.17"
