document: rfc-3080
kind: interoperability-note
summary: All BEEP peers, including those acting only in the client role, MUST be prepared to receive MSG messages and handle them gracefully. All profiles must provide an appropriate error message for unexpected MSG messages, reflecting BEEP's peer-to-peer nature.
section: "2.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
