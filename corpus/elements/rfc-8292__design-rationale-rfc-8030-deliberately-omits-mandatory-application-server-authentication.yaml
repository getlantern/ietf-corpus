document: rfc-8292
kind: design-rationale
summary: RFC 8030 deliberately omits mandatory application server authentication to avoid constraining user agent/application server interactions and to preserve privacy properties; VAPID is a voluntary, opt-in supplement that addresses denial-of-service risks and subscription leakage without mandating identity.
section: "1"
topics:
    - security
    - privacy
