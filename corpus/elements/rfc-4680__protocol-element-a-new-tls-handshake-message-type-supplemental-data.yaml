document: rfc-4680
kind: protocol-element
summary: A new TLS handshake message type, supplemental_data(23), is defined to carry supplemental application data objects negotiated via TLS hello extensions. It bundles together all supplemental data objects into a single handshake message rather than defining separate messages per data type.
section: "2"
