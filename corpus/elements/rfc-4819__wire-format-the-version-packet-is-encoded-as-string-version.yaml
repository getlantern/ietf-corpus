document: rfc-4819
kind: wire-format
summary: 'The version packet is encoded as: string ''version'', uint32 protocol-version-number. Both sides MUST start the connection by sending this packet and MUST wait to receive it before continuing. This document defines version 2; the ''version'' packet MUST NOT be sent again after the initial exchange.'
section: "3.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
