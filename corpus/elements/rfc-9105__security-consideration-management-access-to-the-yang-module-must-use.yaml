document: rfc-9105
kind: security-consideration
summary: 'Management access to the YANG module MUST use a secure transport: NETCONF over SSH (RFC 6242) or RESTCONF over HTTPS/TLS 1.3 (RFC 8446). NACM (RFC 8341) SHOULD be used to restrict access to sensitive data nodes.'
