document: rfc-5796
kind: normative-requirement
summary: PIM-SM link-local packets not protected with AH or ESP, or that fail authentication checks, MUST be silently discarded by IPsec. An implementation may maintain a counter of such discarded packets.
section: "4"
rfc2119_level: MUST
topics:
