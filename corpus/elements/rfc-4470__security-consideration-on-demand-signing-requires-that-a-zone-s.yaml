document: rfc-4470
kind: security-consideration
summary: On-demand signing requires that a zone's authoritative servers have continuous access to the zone's private keys. Storing private keys on well-known Internet-accessible servers significantly increases the risk of unintended key disclosure compared to offline signing.
section: "5"
topics:
    - dns
    - security
    - crypto
