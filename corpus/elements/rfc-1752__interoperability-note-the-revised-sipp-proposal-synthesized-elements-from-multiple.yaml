document: rfc-1752
kind: interoperability-note
summary: 'The revised SIPP proposal synthesized elements from multiple IETF efforts: the basic protocol from SIPP, autoconfiguration and transition influenced by TUBA, addressing structure based on CIDR work, and the Routing Header evolving from SDRP deliberations. Implementations must account for this multi-lineage origin of the specification.'
