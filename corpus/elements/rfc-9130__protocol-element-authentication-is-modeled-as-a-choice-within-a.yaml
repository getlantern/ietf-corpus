document: rfc-9130
kind: protocol-element
summary: 'Authentication is modeled as a choice within a ''authentication-type'' node offering two cases: ''key-chain'' (referencing RFC 8177 key-chain-ref, feature-guarded) and ''password'' (a plaintext key plus an identityref for the crypto-algorithm). This applies globally and per-interface/per-level.'
section: "2.5"
topics:
