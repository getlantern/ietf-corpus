document: rfc-7911
kind: security-consideration
summary: Advertising multiple paths for a large number of prefixes may allow a BGP peer to cause memory exhaustion or network-wide instability on the receiving speaker, which can constitute a denial-of-service attack. The document notes this is not a new vulnerability but is present in the base BGP specification (RFC 4272).
section: "8"
topics:
    - bgp
    - routing
    - security
