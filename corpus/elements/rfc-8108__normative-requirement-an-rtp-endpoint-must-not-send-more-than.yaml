document: rfc-8108
kind: normative-requirement
summary: An RTP endpoint MUST NOT send more than four compound RTCP packets with zero initial delay when joining a session, regardless of how many SSRCs it has. Additional SSRCs MUST be reported later following normal RTCP timing rules.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
