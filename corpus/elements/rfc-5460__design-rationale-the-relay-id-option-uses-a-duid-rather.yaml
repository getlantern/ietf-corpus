document: rfc-5460
kind: design-rationale
summary: The Relay-ID option uses a DUID rather than an IP address to identify relay agents because a relay may have multiple addresses or its address may change, while a DUID provides stable long-term identity suitable for associating bindings across relay replacements.
section: 5.4.1
