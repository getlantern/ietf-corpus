document: rfc-8064
kind: normative-requirement
summary: By default, nodes SHOULD NOT employ IPv6 address generation schemes that embed a stable link-layer address in the IID. In particular, the schemes specified in RFC 2464, RFC 2467, RFC 2470, RFC 2491, RFC 2492, RFC 2497, RFC 2590, RFC 3146, RFC 3572, RFC 4338, RFC 4391, RFC 5072, and RFC 5121 are not recommended.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - ip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
