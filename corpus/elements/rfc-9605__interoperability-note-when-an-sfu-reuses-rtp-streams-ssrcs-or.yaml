document: rfc-9605
kind: interoperability-note
summary: When an SFU reuses RTP streams (SSRCs or MIDs) to carry media from different participants, receivers authenticate the true sender from the SFrame KID value rather than from the transport-layer stream identifier, preventing the SFU from causing receivers to misattribute media.
section: 6.1.1
topics:
    - realtime
    - rtp
    - security
