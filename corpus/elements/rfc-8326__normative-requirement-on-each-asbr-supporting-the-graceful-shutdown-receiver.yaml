document: rfc-8326
kind: normative-requirement
summary: On each ASBR supporting the graceful shutdown receiver procedure, an inbound BGP route policy MUST be applied on all EBGP sessions that matches the GRACEFUL_SHUTDOWN community and sets LOCAL_PREF to a low value.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
