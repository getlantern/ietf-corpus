document: rfc-9418
kind: design-rationale
summary: 'New subservice types are added via augmentation of a separate YANG module (not by modifying the base module). Naming conventions are prescribed: module names start with `ietf-service-assurance-`, namespaces with `urn:ietf:params:xml:ns:yang:ietf-service-assurance-`, and prefixes with `sain-`, enabling consistent vendor and IETF extensions.'
