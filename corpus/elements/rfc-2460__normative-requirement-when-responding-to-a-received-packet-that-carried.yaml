document: rfc-2460
kind: normative-requirement
summary: When responding to a received packet that carried a Routing header, the response must not include a Routing header automatically derived by reversing the received Routing header unless the integrity and authenticity of the received Source Address and Routing header have been verified (e.g., via Authentication header).
section: "8.4"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
