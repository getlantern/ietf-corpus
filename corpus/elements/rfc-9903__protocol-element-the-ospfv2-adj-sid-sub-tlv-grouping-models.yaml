document: rfc-9903
kind: protocol-element
summary: The OSPFv2 Adj-SID Sub-TLV grouping models adj-sid-flags, mt-id (0–127), weight (uint8 for load-balancing), and SID encoding. The LAN Adj-SID Sub-TLV additionally includes neighbor-router-id (rt-types:router-id), per RFC 8665 Section 6.
