document: rfc-8794
kind: normative-requirement
summary: An EBML Schema MUST declare exactly one Root Element (occurring exactly once in the EBML Body), MUST document all EBML Body Elements, and MUST NOT reuse Element ID 0x1A45DFA3 (reserved for the EBML Header). The DocType value MUST be unique and registered in the IANA EBML DocTypes registry.
section: "11.1"
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
