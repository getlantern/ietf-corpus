document: rfc-4172
kind: normative-requirement
summary: All iFCP implementations MUST support operations in address translation mode; implementation of address transparent mode is OPTIONAL. An implementation MUST NOT allow the addressing mode to be changed after the gateway begins processing FC frame traffic, permit operation in more than one mode simultaneously, or establish an iFCP session with a gateway not in the same mode.
section: "4.4"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
