document: rfc-7260
kind: security-consideration
summary: 'Automatic establishment of OAM entities based on RSVP-TE messages creates an overload attack vector: a remote attacker could send frequent Path messages requesting liveliness monitoring of large numbers of LSPs. This is mitigated by deploying message integrity and node authentication per RFC 2747 (RSVP Cryptographic Authentication).'
section: "6"
topics:
    - security
    - routing
    - mpls
