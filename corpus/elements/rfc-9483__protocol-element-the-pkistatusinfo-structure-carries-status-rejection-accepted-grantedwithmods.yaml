summary: The PKIStatusInfo structure carries status ('rejection', 'accepted', 'grantedWithMods', 'waiting'), an optional human-readable statusString, and an optional failInfo bitfield using PKIFailureInfo values such as badCertId, badPOP, certRevoked, badCertTemplate, transactionIdInUse, notAuthorized, systemUnavail, and systemFailure.
