document: rfc-5124
kind: normative-requirement
summary: In SDP offer/answer negotiation, the four profiles AVP, AVPF, SAVP, and SAVPF are mutually exclusive for a given media description. An offerer capable of supporting more than one profile SHOULD offer all acceptable alternatives, listed in order of preference, preferring secure profiles over non-secure ones.
section: 3.3.1
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
    - security
