summary: The bits of security provided by ECC key size, hash algorithm, and named curve should be roughly equivalent. A table maps ECDSA key sizes (160–512+ bits) to appropriate hash algorithms and recommended NIST curves at security levels of 80, 112, 128, 192, and 256 bits.
