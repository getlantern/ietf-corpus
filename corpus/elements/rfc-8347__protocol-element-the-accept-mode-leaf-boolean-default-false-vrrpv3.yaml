document: rfc-8347
kind: protocol-element
summary: The 'accept-mode' leaf (boolean, default false, VRRPv3 only) controls whether a master virtual router accepts packets addressed to the address owner's IP address when it is not the owner. IPv6 Neighbor Solicitations and Advertisements MUST NOT be dropped even when accept-mode is false.
