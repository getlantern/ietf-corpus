document: rfc-7235
kind: protocol-element
summary: 'The Proxy-Authenticate header field consists of at least one challenge indicating authentication scheme(s) and parameters applicable to the proxy. Unlike WWW-Authenticate, it applies only to the next outbound client on the response chain. ABNF: Proxy-Authenticate = 1#challenge.'
section: "4.3"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
