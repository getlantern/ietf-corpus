document: rfc-3812
kind: normative-requirement
summary: When the MPLS signaling protocol is rsvp(2), mplsTunnelIndex SHOULD equal the Tunnel Id of the RSVP Session object, and mplsTunnelInstance SHOULD equal the LSP Id of the Sender Template object. For crldp(3), mplsTunnelIndex SHOULD equal the CR-LDP LSP ID.
section: "11"
rfc2119_level: SHOULD
topics:
    - mpls
