document: rfc-5426
kind: normative-requirement
summary: Each syslog UDP datagram MUST contain only one syslog message, which MAY be complete or truncated. Additional data MUST NOT be present in the datagram payload. The message MUST be formatted and truncated according to RFC 5424.
section: "3.1"
rfc2119_level: MUST
topics:
    - syslog
    - udp
