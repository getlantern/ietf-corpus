document: rfc-1894
kind: normative-requirement
summary: The Last-Attempt-Date field MUST NOT be included if the actual date and time of the last delivery attempt are not available. Date/time MUST use RFC 822 date-time format with numeric timezones ([+/-]HHMM format).
section: 2.3.7
rfc2119_level: MUST NOT
