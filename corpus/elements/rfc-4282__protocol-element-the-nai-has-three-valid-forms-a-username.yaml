document: rfc-4282
kind: protocol-element
summary: 'The NAI has three valid forms: a username alone, ''@'' followed by a realm, or a username followed by ''@'' and a realm. The username grammar derives from RFC 821 (SMTP), extended for internationalization, and the realm grammar is based on RFC 1035 DNS labels.'
