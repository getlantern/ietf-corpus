document: rfc-4862
kind: security-consideration
summary: Any node on a link can respond to a Neighbor Solicitation for another node's tentative address, causing the legitimate node to treat that address as a duplicate and refuse to use it — a denial-of-service attack against address assignment. The Secure Neighbor Discovery protocol (RFC 3971) can mitigate this; RFC 3756 discusses the full threat model.
section: "6"
topics:
