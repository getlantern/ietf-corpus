kind: protocol-element
summary: The firmware-package-message-digest attribute (id-aa-fwPkgMessageDigest, OID …aa.41) provides a SEQUENCE{AlgorithmIdentifier, msgDigest OCTET STRING} computed over the raw firmware package before any compression, encryption, or signing, allowing post-load integrity verification.
