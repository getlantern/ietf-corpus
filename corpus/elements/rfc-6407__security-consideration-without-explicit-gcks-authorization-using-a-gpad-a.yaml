document: rfc-6407
kind: security-consideration
summary: 'Without explicit GCKS authorization using a GPAD, a rogue GDOI participant can execute a man-in-the-middle attack between a group member and a GCKS. Both sides must verify identity: the GM checks the GCKS against its GPAD; the GCKS authorizes the GM by Phase 1 identity before providing group keying material.'
section: "3.1"
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
