document: rfc-4037
kind: normative-requirement
summary: An OPES processor MUST send a Negotiation Offer (NO) immediately after sending CS. If there is nothing to negotiate, it MUST send NO with an empty features list. This bootstraps the mandatory first Negotiation Phase.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
