document: rfc-3560
kind: normative-requirement
summary: Implementations MUST represent encoding parameter P using id-pSpecified with an OCTET STRING, MUST support a zero length P value, and encryptors MUST omit pSourceFunc when P is zero length. Decryptors MUST recognize both the explicit OID and an absent pSourceFunc as indicating zero length P.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
