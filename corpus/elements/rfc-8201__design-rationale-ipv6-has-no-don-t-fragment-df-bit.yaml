document: rfc-8201
kind: design-rationale
summary: IPv6 has no Don't Fragment (DF) bit (unlike IPv4/RFC 1191) and all Packet Too Big messages report the MTU of the constricting link, eliminating the need for MTU plateau tables used in IPv4 PMTUD.
