document: rfc-4815
kind: normative-requirement
summary: IR packets update only the fields they carry, not the entire context. Fields not updated by an IR (e.g., list compression translation tables) MUST NOT be invalidated by the decompressor when it assumes context damage.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - rtp
    - ip
