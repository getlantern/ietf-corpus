document: rfc-9079
kind: normative-requirement
summary: A node MUST NOT send more than one Source Prefix sub-TLV in a TLV, and a node receiving more than one Source Prefix sub-TLV in a single TLV MUST ignore the TLV. It MAY ignore the whole packet.
section: "7"
rfc2119_level: MUST NOT
topics:
    - routing
