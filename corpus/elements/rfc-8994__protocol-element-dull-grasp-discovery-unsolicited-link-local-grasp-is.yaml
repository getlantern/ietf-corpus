document: rfc-8994
kind: protocol-element
summary: DULL GRASP (Discovery Unsolicited Link-Local GRASP) is used for per-link ACP neighbor discovery on all native interfaces without any prior configuration. Each candidate peer discovered via multiple interfaces results in one adjacency entry per interface in the ACP adjacency table.
section: "6.4"
topics:
