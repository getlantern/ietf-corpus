document: rfc-9504
kind: normative-requirement
summary: If a stateful PCE has no LSP state information available to carry out LSP reoptimization when the R bit is set in the RP object, it SHOULD report Error-Type 19 Error-value 23 ('LSP state info unavailable for reoptimization').
section: "7.2"
rfc2119_level: SHOULD
topics:
    - routing
