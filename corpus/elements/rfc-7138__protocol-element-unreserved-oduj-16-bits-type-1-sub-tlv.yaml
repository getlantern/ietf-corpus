summary: 'Unreserved ODUj (16 bits, Type 1 sub-TLV): Indicates the count of unreserved ODUs of the advertised Signal Type at a particular priority level. One field MUST be present per bit set in the Priority field; fields MUST NOT be present for unadvertised priorities.'
