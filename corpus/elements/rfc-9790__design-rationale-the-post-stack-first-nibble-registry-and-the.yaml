document: rfc-9790
kind: design-rationale
summary: 'The ''Post-Stack First Nibble'' registry and the ''IP Version Numbers'' registry (RFC 2780) serve entirely different purposes: the former tracks PSH types, the latter tracks IP version numbers in IP headers. Their only intersection is values 0x4 and 0x6, which are reserved in the PFN registry for backward compatibility with legacy routers that heuristically identify IPv4 and IPv6.'
section: "2.4"
