document: rfc-9739
kind: protocol-element
summary: The PIM Light Interface (PLI) is a new type of PIM interface that accepts Join/Prune messages from unknown PIM routers without requiring a PIM Hello message. It does not create general-purpose state for neighboring PIM routers and only processes Join/Prune messages from downstream routers in the multicast routing table.
section: "3"
topics:
    - multicast
    - routing
