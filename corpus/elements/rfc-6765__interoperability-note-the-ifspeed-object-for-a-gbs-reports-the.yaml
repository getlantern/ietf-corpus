document: rfc-6765
kind: interoperability-note
summary: The ifSpeed object for a GBS reports the sum of operating data rates of all BCEs, without encapsulation and G.Bond overhead but accounting for Inter-Frame Gaps. For asymmetric GBS, ifSpeed shows the lower of upstream and downstream rates, consistent with IF-MIB conventions.
section: 4.1.5
topics:
    - snmp
