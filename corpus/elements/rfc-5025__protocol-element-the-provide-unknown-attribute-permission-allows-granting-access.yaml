document: rfc-5025
kind: protocol-element
summary: The <provide-unknown-attribute> permission allows granting access to proprietary or future presence attributes not known to the server. It takes mandatory 'name' (unqualified element name) and 'ns' (namespace URI) attributes. Its interpretation can change if the server is upgraded to recognize the previously unknown namespace.
section: 3.3.2.14
topics:
    - sip
    - privacy
