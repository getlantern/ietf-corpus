summary: The AES_256_CM_HMAC_SHA1_80 crypto suite uses a 256-bit master key, 112-bit master salt, AES_256_CM_PRF as KDF, AES_256_CM for encryption, HMAC-SHA1 with 160-bit auth key, 80-bit SRTP auth tag, 80-bit SRTCP auth tag, and default key lifetime of 2^31 packets.
