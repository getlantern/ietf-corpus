document: rfc-7545
kind: interoperability-note
summary: For multi-ruleset devices interoperating with multiple Databases, the Master Device MAY include the union of all required parameters for all supported rulesets in a single request. The Database MUST ignore all parameters it does not understand, providing forward-compatible extensibility across regulatory domains.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
