document: rfc-7212
kind: security-consideration
summary: GAP messages are sent in cleartext. An unauthorized party with access to the MPLS data plane can observe message content. Confidentiality is not guaranteed by the protocol; sensitive data requiring confidentiality must not be sent via GAP without application-level encryption.
section: "9"
topics:
    - mpls
    - security
