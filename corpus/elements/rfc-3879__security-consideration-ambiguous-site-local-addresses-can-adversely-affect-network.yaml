document: rfc-3879
kind: security-consideration
summary: Ambiguous site-local addresses can adversely affect network security through leaks, misrouting, and ambiguity. Deprecating them helps solve many of these problems. Blocking rules that previously relied on the FEC0::/10 prefix can be reconfigured for any replacement prefix, so deprecation does not inherently endanger security.
section: "5"
topics:
