document: rfc-2749
kind: normative-requirement
summary: Once a COPS decision is cached, the PEP can apply it to RSVP refreshes without re-querying the PDP. When the PEP detects a change in corresponding Resv or Path state, it should update the PDP with a new request; PEPs may continue using cached state until receiving the PDP response.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
