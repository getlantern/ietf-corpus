document: rfc-6874
kind: interoperability-note
summary: 'Web browsers have been inconsistent in supporting ZoneIDs: some Firefox versions accepted a bare "%" before the zone ID (later removed for RFC 3986 consistency); some Internet Explorer versions accepted "%25"-prefixed ZoneIDs. No normative browser requirements are made because there is no formal distinction between browser input dialogue syntax and URI syntax.'
section: "3"
topics:
