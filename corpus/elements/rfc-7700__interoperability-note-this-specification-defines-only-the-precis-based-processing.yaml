document: rfc-7700
kind: interoperability-note
summary: This specification defines only the PRECIS-based processing rules. Application protocols (MSRP, XCON, XMPP, etc.) are responsible for specifying which protocol slots accept nicknames, which entities enforce the rules, and when in processing the rules are enforced.
