summary: 'DS3 PLCP alarm state machine has three states: noAlarm (no defects), receivedFarEndAlarm (incoming Yellow Signal received), and incomingLOF (Loss of Frame declared). Transition from failure back to noAlarm occurs when no defects are received for more than 10 seconds.'
