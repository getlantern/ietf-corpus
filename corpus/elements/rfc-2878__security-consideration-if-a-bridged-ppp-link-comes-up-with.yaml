document: rfc-2878
kind: security-consideration
summary: If a bridged PPP link comes up with a rogue peer, network topology information may be learned from forwarded multicast traffic, and denial-of-service attacks may be created by injecting loops that the spanning tree should detect and isolate, or by offering rogue load. It is recommended that links susceptible to rogue peers be configured to use PPP authentication during the LCP startup phase.
section: "7"
topics:
    - security
