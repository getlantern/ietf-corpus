document: rfc-7144
kind: normative-requirement
summary: For I_T NEXUS RESET, the target MUST drop all connections in the session over which the function is received, and MUST consider each participating connection to have immediately timed out (leading to FREE state), independent of DefaultTime2Wait and DefaultTime2Retain.
section: "6.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
