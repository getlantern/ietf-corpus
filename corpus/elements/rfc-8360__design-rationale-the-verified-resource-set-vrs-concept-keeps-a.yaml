document: rfc-8360
kind: design-rationale
summary: The Verified Resource Set (VRS) concept keeps a per-certificate running intersection of INRs separate from the raw resource extension values. This allows a CA certificate to temporarily contain overclaimed resources without being outright rejected, while ensuring no subordinate attestation can be valid for those overclaimed resources.
section: "4.1"
topics:
