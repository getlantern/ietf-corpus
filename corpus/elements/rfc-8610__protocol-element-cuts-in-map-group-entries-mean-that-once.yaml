document: rfc-8610
kind: protocol-element
summary: Cuts ('^') in map group entries mean that once a member key matches an entry carrying a cut, later entries in the group may no longer match that key — even if the value does not match the cut entry's value type, causing the entire map to fail. The ':' colon shortcut implicitly includes cut semantics.
section: 3.5.4
topics:
    - cbor
