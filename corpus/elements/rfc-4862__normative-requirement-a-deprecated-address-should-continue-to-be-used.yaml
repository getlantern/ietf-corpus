document: rfc-4862
kind: normative-requirement
summary: A deprecated address SHOULD continue to be used as source in existing communications but SHOULD NOT initiate new communications if a preferred address of sufficient scope is available. IP and higher layers (TCP, UDP) MUST continue to accept and process datagrams destined to a deprecated address.
section: 5.5.4
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - tcp
