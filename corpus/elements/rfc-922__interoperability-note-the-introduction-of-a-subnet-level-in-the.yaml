document: rfc-922
kind: interoperability-note
summary: The introduction of a subnet level in the IP addressing hierarchy is at variance with the base IP specification (RFC 791), which does not define subnetting. RFC 922's broadcast scheme is explicitly designed to accommodate subnetting as defined in RFC 917.
section: "2"
topics:
