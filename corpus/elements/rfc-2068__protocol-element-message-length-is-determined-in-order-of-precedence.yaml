document: rfc-2068
kind: protocol-element
summary: 'Message length is determined in order of precedence: (1) responses that MUST NOT include a body terminate at the first empty line; (2) chunked Transfer-Encoding defines length; (3) Content-Length value; (4) multipart/byteranges self-delimiting; (5) server closes connection.'
section: "4.4"
