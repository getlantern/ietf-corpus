document: rfc-9815
kind: wire-format
summary: 'The SPF Status TLV (type 1184) is a 1-octet field shared across Node, Link, and Prefix NLRIs. For Node NLRIs: 1 = unreachable, 2 = no transit; for Link NLRIs: 1 = unreachable; for Prefix NLRIs: 1 = unreachable. Values 0 and 255 are reserved.'
section: 5.2.1.1
