document: rfc-2125
kind: wire-format
summary: 'BAP Request/Indication packets contain: Type (1 octet), Identifier (1 octet), Length (2 octets), Data. BAP Response packets insert a Response Code octet (0x00=Request-Ack, 0x01=Request-Nak, 0x02=Request-Rej, 0x03=Request-Full-Nak) between Length and Data.'
section: "5.5"
