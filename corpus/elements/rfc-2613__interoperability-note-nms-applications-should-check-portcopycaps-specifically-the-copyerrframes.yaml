document: rfc-2613
kind: interoperability-note
summary: NMS applications SHOULD check portCopyCaps (specifically the copyErrFrames capability and whether it is enabled) before interpreting statistics from a copy-port destination, because errored frames may or may not be included in the replicated traffic.
section: 2.4.1
rfc2119_level: SHOULD
topics:
