document: rfc-3798
kind: normative-requirement
summary: MDNs SHOULD NOT be sent automatically if the address in the Disposition-Notification-To header differs from the address in the Return-Path header; user confirmation SHOULD be obtained, or if not possible, the MDN SHOULD NOT be sent.
section: "2.1"
rfc2119_level: SHOULD NOT
