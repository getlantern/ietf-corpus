document: rfc-7045
kind: design-rationale
summary: Extension headers are numbered from the existing IP Protocol Number space, meaning there is no collected list of them. An implementor consulting only RFC 2460 will miss all extension headers defined subsequently. The new 'IPv6 Extension Header Types' registry is created specifically to address this discoverability problem.
section: "1"
topics:
    - ip
    - registry
