document: rfc-3115
kind: wire-format
summary: 'The CVSE wire format comprises: Type (1 octet, value 38), Reserved (1 octet, must be zero), Length (2 octets, excludes Type and Length bytes), Vendor/Org-ID (4 octets, high-order octet 0 followed by SMI Network Management Private Enterprise Code in network byte order), Vendor-CVSE-Type (2 octets), and variable-length Vendor-CVSE-Value.'
section: "2.1"
topics:
    - mobility
