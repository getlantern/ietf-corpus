document: rfc-4738
kind: normative-requirement
summary: For certificate handling in RSA-R mode, the X.509v3 URL Cert type MUST be implemented as the default. The HTTP URL for fetching a certificate per RFC 2585 MUST be supported; FTP URL support is not required.
section: "3.8"
rfc2119_level: MUST
topics:
