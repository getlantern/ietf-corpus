document: rfc-9777
kind: normative-requirement
summary: The ICMPv6 checksum MUST be verified before processing any received MLDv2 Query or Report message. The checksum covers the entire MLDv2 message plus the IPv6 pseudo-header.
section: 5.1.2
rfc2119_level: MUST
topics:
    - multicast
    - security
