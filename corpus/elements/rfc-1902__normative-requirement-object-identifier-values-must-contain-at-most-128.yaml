document: rfc-1902
kind: normative-requirement
summary: OBJECT IDENTIFIER values must contain at most 128 sub-identifiers, and each sub-identifier must not exceed 2^32-1 (4294967295). All OBJECT IDENTIFIER values must have at least two sub-identifiers, and the final sub-identifier of any administratively assigned object name must be positive (zero is reserved).
section: "3.5"
rfc2119_level: MUST
topics:
    - snmp
