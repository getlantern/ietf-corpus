document: rfc-2141
kind: interoperability-note
summary: A URL resolver conforming to the URL syntax specification will extract `urn:` as the scheme value rather than `urn:<nid>`, so URN resolution requires either a built-in URN resolver or an external one that the URL resolver can delegate to.
section: A
