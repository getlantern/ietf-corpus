document: rfc-4807
kind: normative-requirement
summary: Rows within a policy group MUST be processed in ascending order of spdGroupContPriority. If an action executes as a result of processing a row, processing of further rows in that group MUST stop.
section: "6"
rfc2119_level: MUST
topics:
