document: rfc-1766
kind: protocol-element
summary: A new 'Differences' parameter is defined for the Multipart/Alternative content type. Its value is one or more of 'Content-Type' or 'Content-Language' (or other IANA-registered header names from published RFCs), indicating which headers a MIME reader should examine to intelligently select the best alternative for the user. If absent, Differences=Content-Type is assumed.
section: "4.1"
topics:
    - email
