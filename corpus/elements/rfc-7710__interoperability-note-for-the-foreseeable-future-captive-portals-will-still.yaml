document: rfc-7710
kind: interoperability-note
summary: For the foreseeable future, captive portals will still need to implement legacy interception techniques to serve clients that do not support the Captive-Portal DHCP/RA option; this option is intended to improve the experience for capable clients, not to replace interception entirely.
