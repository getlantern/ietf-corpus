document: rfc-2741
kind: normative-requirement
summary: The master agent must implement MIB view application and access control policy; these are not delegated to subagents. Subagents are shielded from SNMP protocol details and must not be exposed to raw SNMP messages.
section: "4.1"
rfc2119_level: MUST
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
