document: rfc-3279
kind: security-consideration
summary: MD2 is subject to a near-collision attack (Rogier and Chauvaud, 1995) where only the checksum step prevents full collisions; its use for new applications is discouraged. MD5 has known pseudo-collisions; its use for new applications is also discouraged. Both remain acceptable only for verifying existing signatures.
section: 2.1.1
topics:
    - pkix
    - crypto
    - security
