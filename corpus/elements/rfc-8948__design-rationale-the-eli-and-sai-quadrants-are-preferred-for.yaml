document: rfc-8948
kind: design-rationale
summary: The ELI and SAI quadrants are preferred for data-center VM migration scenarios because their assignments are governed by IEEE Std 802c rules ensuring MAC address uniqueness globally across the data center, whereas AAI addresses only need to be unique within a single administrative region.
