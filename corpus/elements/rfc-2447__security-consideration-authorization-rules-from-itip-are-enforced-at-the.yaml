document: rfc-2447
kind: security-consideration
summary: 'Authorization rules from iTIP are enforced at the iMIP layer: only the Organizer may modify or cancel entries they organize, and only the Attendee may reply on their own behalf. Messages from unauthorized originators must be ignored.'
