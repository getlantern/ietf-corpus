document: rfc-3275
kind: normative-requirement
summary: Implementations MUST generate laxly schema valid Signature elements as specified by the schema. The Signature element is the root element of an XML Signature and contains SignedInfo, SignatureValue, optional KeyInfo, and zero or more Object elements.
section: "4.1"
rfc2119_level: MUST
