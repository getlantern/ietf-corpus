document: rfc-7208
kind: registry
summary: This document notes that the SPF DNS Record Type (type 99) is deprecated and no longer used for SPF version 1. SPF records MUST use TXT (type 16). The historical SPF RR type registration is noted in Section 14.1.
section: "14.1"
