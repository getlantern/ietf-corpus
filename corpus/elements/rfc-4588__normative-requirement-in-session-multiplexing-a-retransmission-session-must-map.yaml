document: rfc-4588
kind: normative-requirement
summary: In session-multiplexing, a retransmission session MUST map to exactly one original session; the same retransmission session MUST NOT be used for multiple original sessions, as receivers would otherwise receive retransmissions for sessions they did not join.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
