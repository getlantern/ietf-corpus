document: rfc-5670
kind: protocol-element
summary: 'A PCN-interior-node comprises four functional blocks: (1) a behaviour-aggregate (BA) classifier that identifies PCN-packets, (2) an optional dropper, (3) a threshold-meter, and (4) an excess-traffic-meter, whose results feed a marker that sets the encoding state of outgoing PCN-packets.'
