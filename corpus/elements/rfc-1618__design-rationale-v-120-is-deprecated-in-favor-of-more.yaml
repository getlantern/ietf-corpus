document: rfc-1618
kind: design-rationale
summary: V.120 is deprecated in favor of more modern standards such as 'PPP in Frame Relay' because V.120 is not interoperable with bit-synchronous links (it lacks octet-to-bit-stuffing conversion), and its framing mode is difficult to distinguish from Frame Relay.
