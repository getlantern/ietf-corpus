document: rfc-9017
kind: normative-requirement
summary: Values 0–15 of the Extended Special-Purpose MPLS Label Values registry are reserved and MUST NOT be used as eSPLs. An implementation MUST NOT place a label with a value in the range 0–15 in the label stack immediately following an XL.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
