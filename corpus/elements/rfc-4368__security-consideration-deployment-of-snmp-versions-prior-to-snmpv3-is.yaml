document: rfc-4368
kind: security-consideration
summary: Deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED; SNMPv3 with cryptographic security (authentication and privacy) is RECOMMENDED. Read access to LC-ATM/LC-FR configuration objects may reveal sensitive topology information and should be controlled.
