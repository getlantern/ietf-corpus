document: rfc-9346
kind: security-consideration
summary: The protocol extensions can be secured within the AS using existing IS-IS security mechanisms such as cleartext passwords or Hashed Message Authentication Codes (RFC 5304, RFC 5310). There is no exchange of information between ASes and no new IS-IS security relationship between ASes is required.
section: "5"
topics:
    - security
    - routing
