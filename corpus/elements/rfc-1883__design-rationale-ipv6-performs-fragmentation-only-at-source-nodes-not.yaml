document: rfc-1883
kind: design-rationale
summary: IPv6 performs fragmentation only at source nodes, not at intermediate routers. This simplifies router processing, reduces per-packet overhead in the network core, and places path MTU responsibility on end systems using Path MTU Discovery (RFC-1191).
section: "4.5"
topics:
    - ip
