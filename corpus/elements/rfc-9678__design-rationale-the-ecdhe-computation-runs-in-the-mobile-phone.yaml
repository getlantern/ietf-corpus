document: rfc-9678
kind: design-rationale
summary: The ECDHE computation runs in the mobile phone rather than the USIM card, so no new credentials, no USIM card updates, and no changes to the USIM-terminal interface are required. Existing subscribers can benefit from forward secrecy without reissuing SIMs.
