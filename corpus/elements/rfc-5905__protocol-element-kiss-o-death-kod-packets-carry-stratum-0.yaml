document: rfc-5905
kind: protocol-element
summary: Kiss-o'-Death (KoD) packets carry Stratum = 0 and a four-character left-justified zero-filled ASCII kiss code in the Reference ID field. Defined kiss codes include DENY (access denied), RSTR (local policy denial), RATE (rate exceeded), AUTH (authentication failed), CRYP (cryptographic failure), INIT (not yet synchronized), and STEP (step change occurred). The Receive and Transmit Timestamps in KoD packets are undefined.
section: "7.4"
topics:
