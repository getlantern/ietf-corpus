document: rfc-3486
kind: design-rationale
summary: The comp=sigcomp parameter is designed to mean both 'support' and 'willingness' to receive compressed messages. This dual meaning allows the receiver of a SIP message to influence the decision of whether or not to use SigComp at a given time.
section: "2"
