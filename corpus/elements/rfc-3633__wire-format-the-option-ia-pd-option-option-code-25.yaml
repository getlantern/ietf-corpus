document: rfc-3633
kind: wire-format
summary: 'The OPTION_IA_PD option (option-code 25) carries a prefix delegation identity association. Its format is: 2-octet option-code, 2-octet option-length (12 + length of IA_PD-options), 4-octet IAID, 4-octet T1 (seconds), 4-octet T2 (seconds), followed by variable-length IA_PD-options field.'
