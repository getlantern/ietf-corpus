document: rfc-3986
kind: wire-format
summary: 'The authority component has the structure: authority = [ userinfo "@" ] host [ ":" port ], preceded by "//" and terminated by the next "/", "?", "#", or end of URI. The userinfo subcomponent uses the format *( unreserved / pct-encoded / sub-delims / ":" ).'
section: "3.2"
extracted_by: claude-sonnet-4-6
