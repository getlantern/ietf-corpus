document: rfc-1981
kind: protocol-element
summary: A management interface should allow operators to disable Path MTU Discovery on a given path (causing the IP layer to limit packets to the IPv6 minimum link MTU), change the cached PMTU value for a path, and adjust the stale-PMTU aging timeout.
section: "5.6"
topics:
    - ip
