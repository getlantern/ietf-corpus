document: rfc-7147
kind: design-rationale
summary: Digest method attributes use OIDs (object identities from the iscsiDescriptors subtree) rather than enumerated integers so that vendors can define additional digest methods in enterprise MIB modules and return those OIDs without modifying the base ISCSI-MIB.
