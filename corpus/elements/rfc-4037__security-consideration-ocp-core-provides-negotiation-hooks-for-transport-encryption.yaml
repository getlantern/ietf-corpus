document: rfc-4037
kind: security-consideration
summary: OCP Core provides negotiation hooks for transport encryption and mutual authentication but does not mandate them. OCP is expected to be deployed in closed environments where trust is established externally. Application profiles and OCP extensions may require specific security mechanisms; implementations must demand needed features via the negotiation mechanism based on configuration and environment.
section: "13"
topics:
    - security
    - crypto
