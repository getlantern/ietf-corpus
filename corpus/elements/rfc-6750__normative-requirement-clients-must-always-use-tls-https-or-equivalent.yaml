document: rfc-6750
kind: normative-requirement
summary: Clients MUST always use TLS (https) or equivalent transport security when making requests with bearer tokens. Client implementations MUST ensure that bearer tokens are not leaked to unintended parties.
section: "5.3"
rfc2119_level: MUST
topics:
