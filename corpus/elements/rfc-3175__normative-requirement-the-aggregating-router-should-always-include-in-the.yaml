document: rfc-3175
kind: normative-requirement
summary: The aggregating router SHOULD always include in the Aggregate Path a SENDER_TSPEC at least as large as the maximum FLOW_SPEC the deaggregator could require, ensuring the deaggregator is not arbitrarily prevented from sizing the aggregate reservation.
section: "2.4"
rfc2119_level: SHOULD
topics:
