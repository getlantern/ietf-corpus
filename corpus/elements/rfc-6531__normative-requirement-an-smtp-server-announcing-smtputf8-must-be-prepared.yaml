document: rfc-6531
kind: normative-requirement
summary: An SMTP server announcing SMTPUTF8 MUST be prepared to accept a UTF-8 string in any position where RFC 5321 specifies a mailbox can appear. Any domain name looked up in DNS MUST conform to IDNA (RFC 5890) processing.
section: "3.2"
rfc2119_level: MUST
topics:
    - email
    - dns
