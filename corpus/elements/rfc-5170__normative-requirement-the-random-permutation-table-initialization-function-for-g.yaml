document: rfc-5170
kind: normative-requirement
summary: The random permutation table initialization function (for G > 1) MUST be called immediately after creating the parity check matrix, before any further PRNG calls, both at sender and receiver. This ensures both sides use the same repair symbol ordering.
section: "5.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
