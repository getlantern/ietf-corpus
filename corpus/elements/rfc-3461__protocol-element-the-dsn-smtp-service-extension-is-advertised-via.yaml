document: rfc-3461
kind: protocol-element
summary: The DSN SMTP service extension is advertised via the EHLO keyword 'DSN'. It adds two optional parameters to RCPT (NOTIFY, ORCPT) and two to MAIL (RET, ENVID), enabling senders to specify conditions for delivery status notification generation.
