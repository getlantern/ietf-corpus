document: rfc-9769
kind: protocol-element
summary: Two timestamp sets are available to compute offset and delay in interleaved client/server mode. The first set (T1=prev-request-tx, T2=prev-response-rx, T3=latest-response-tx, T4=prev-response-rx) is RECOMMENDED for clients that filter on delay; the second set gives a more accurate current offset but is sensitive to frequency error.
section: "2"
topics:
