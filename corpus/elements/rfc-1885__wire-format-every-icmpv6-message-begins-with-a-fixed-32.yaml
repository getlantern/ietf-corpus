document: rfc-1885
kind: wire-format
summary: 'Every ICMPv6 message begins with a fixed 32-bit header: Type (8 bits), Code (8 bits), and Checksum (16 bits), followed by a variable-length message body. Error messages have Type values 0–127; informational messages have Type values 128–255.'
