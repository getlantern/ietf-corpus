document: rfc-5905
kind: wire-format
summary: 'NTP defines three time formats: a 128-bit date format (64-bit signed seconds split into 32-bit Era Number and 32-bit Era Offset, plus 64-bit fraction resolving 0.05 attoseconds), a 64-bit timestamp format (32-bit unsigned seconds spanning 136 years, 32-bit fraction resolving 232 picoseconds), and a 32-bit short format (16-bit seconds, 16-bit fraction). The prime epoch is 0h 1 January 1900 UTC; a value of zero indicates unknown or unsynchronized time.'
