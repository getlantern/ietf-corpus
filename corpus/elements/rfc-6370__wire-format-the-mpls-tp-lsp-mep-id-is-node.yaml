document: rfc-6370
kind: wire-format
summary: 'The MPLS-TP LSP_MEP_ID is Node_ID::Tunnel_Num::LSP_Num, where Node_ID identifies the node hosting the MEP, Tunnel_Num is unique to that node, and LSP_Num is the single value for co-routed or the local value for associated bidirectional LSPs. For global uniqueness: Global_ID::Node_ID::Tunnel_Num::LSP_Num.'
