document: rfc-9484
kind: security-consideration
summary: Where an endpoint knows its peer is only allowed to send from a specific IP prefix (via out-of-band configuration or ADDRESS_ASSIGN capsules), endpoints MUST follow BCP38 recommendations to prevent source address spoofing, since IP proxying can facilitate denial-of-service attacks via falsified source addresses.
section: "11"
rfc2119_level: MUST
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
