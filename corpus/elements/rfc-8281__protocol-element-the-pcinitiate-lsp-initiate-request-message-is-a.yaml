document: rfc-8281
kind: protocol-element
summary: The PCInitiate (LSP Initiate Request) message is a new PCEP message (Message-Type=12) sent by a PCE to a PCC to trigger LSP instantiation or deletion. It carries a list of PCE-initiated LSP requests, each consisting of SRP and LSP objects, and optionally END-POINTS, ERO, and other attribute objects.
section: "5.1"
topics:
