document: rfc-6675
kind: protocol-element
summary: The scoreboard is a per-connection data structure used to store incoming SACK information. It tracks which octets have been cumulatively ACKed or SACKed, and must support Update(), IsLost(), SetPipe(), and NextSeg() operations. Implementations typically manage this as sequence number ranges rather than individual octets.
