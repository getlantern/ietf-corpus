document: rfc-9751
kind: design-rationale
summary: The 'RTP Payload Format Media Types' registry was closed because it served no functional purpose beyond tracking which media types have RTP payload formats, and authors frequently omitted registration there without any practical impact. The canonical 'Media Types' registry already provides the necessary collision avoidance and specification reference functions.
section: "1"
