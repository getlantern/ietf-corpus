document: rfc-5191
kind: state-machine
summary: 'A PANA session transitions through four phases: Authentication and Authorization (initial EAP exchange), Access (data traffic allowed, liveness testing), Re-authentication (EAP re-run to extend session), and Termination (explicit disconnect or session expiry). Re-authentication is a sub-phase of Access; failure in re-authentication terminates the session.'
section: "3"
topics:
