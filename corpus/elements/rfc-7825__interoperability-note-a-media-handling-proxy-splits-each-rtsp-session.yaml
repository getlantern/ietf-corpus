document: rfc-7825
kind: interoperability-note
summary: A media-handling proxy splits each RTSP session into two media legs and MUST implement ICE-RTSP fully, acting as both controlling and controlled ICE peer. It SHALL include the 'setup.ice-d-m' feature tag in Proxy-Supported headers.
section: "7.1"
topics:
    - nat
    - realtime
