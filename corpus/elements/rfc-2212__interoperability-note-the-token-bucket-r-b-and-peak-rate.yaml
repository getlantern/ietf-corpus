document: rfc-2212
kind: interoperability-note
summary: 'The token bucket (r, b) and peak rate (p) used by guaranteed service map directly to ATM Q.2931 QoS parameters for Variable Bit Rate traffic: Sustained Cell Rate, Burst Size, and Peak Cell Rate. ATM implementations must also account for per-cell and per-datagram overhead when scaling token bucket parameters for VC setup.'
section: Guidelines for Implementors
topics:
    - qos
