document: rfc-6135
kind: security-consideration
summary: With COMEDIA, either the SDP offer sender or receiver can become the active party. RFC 4975 requires the active party to immediately issue an MSRP SEND request upon connection establishment, allowing the passive party to bind the inbound TCP connection to the session. COMEDIA does not change this security binding requirement.
section: "6"
topics:
    - security
    - realtime
