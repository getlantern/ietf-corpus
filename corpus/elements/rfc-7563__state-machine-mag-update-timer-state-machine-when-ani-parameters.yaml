document: rfc-7563
kind: state-machine
summary: 'MAG Update-Timer state machine: when ANI parameters change, if the timer has expired the MAG sends a PBU; if not expired, no PBU is sent. When the timer expires, the MAG checks for changes — if changed since last report it sends a PBU; otherwise it does not and the timer remains expired.'
section: "4.1"
topics:
