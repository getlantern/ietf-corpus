document: rfc-9671
kind: protocol-element
summary: The :deletecancelled argument instructs the implementation that upon receiving a cancellation message it SHOULD remove the associated calendar object. If omitted, the object's status is set to cancelled and it remains on the calendar.
section: "4.5"
topics:
