document: rfc-6923
kind: protocol-element
summary: ICC_Operator_ID-based MIP_IDs are formed by prefixing the IF_ID of the interface on which the MIP resides with the ICC_Operator_ID. For per-node MIP models (one MIP per node), MIP_ID uses the Node_ID with IF_Num=0.
