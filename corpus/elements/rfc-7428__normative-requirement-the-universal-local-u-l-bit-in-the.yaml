document: rfc-7428
kind: normative-requirement
summary: The Universal/Local (U/L) bit in the IID used for the IPv6 link-local address MUST be set to zero, consistent with the fact that the G.9959 NodeID is not globally unique.
section: "4.2"
rfc2119_level: MUST
