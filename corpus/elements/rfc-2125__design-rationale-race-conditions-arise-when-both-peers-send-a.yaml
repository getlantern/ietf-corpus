document: rfc-2125
kind: design-rationale
summary: 'Race conditions arise when both peers send a Call-Request, Callback-Request, or Link-Drop-Query-Request simultaneously. The Favored-Peer Magic-Number mechanism resolves these deterministically without requiring additional round trips: the peer with the lower Magic-Number is favored.'
section: "5.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
