document: rfc-6116
kind: design-rationale
summary: The E.164 number is reversed digit-by-digit and appended to 'e164.arpa' so that the DNS delegation hierarchy mirrors the ITU E.164 numbering hierarchy (country code at the top), enabling decentralized zone administration at each level of the number plan.
section: "3.2"
topics:
    - dns
