document: rfc-8188
kind: security-consideration
summary: 'Message truncation is a threat: an attacker may exploit willingness to process partial messages to hold a receiver in an intermediate state. Processing of partial messages must not advantage an attacker, and partial messages must not be cached as complete.'
section: "4.2"
topics:
    - http
    - security
