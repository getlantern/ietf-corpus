document: rfc-8590
kind: design-rationale
summary: The extension only extends the EPP <poll> response and does not extend the EPP <poll> command. This design allows clients to receive server-initiated change notifications via the existing poll mechanism without requiring changes to client-side command processing.
section: "1"
