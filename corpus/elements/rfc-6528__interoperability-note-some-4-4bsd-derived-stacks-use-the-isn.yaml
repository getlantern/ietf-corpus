document: rfc-6528
kind: interoperability-note
summary: Some 4.4BSD-derived stacks use the ISN of an incoming SYN to heuristically allow a new connection incarnation while the previous one is still in TIME-WAIT; the proposed algorithm preserves this behavior within a connection-id space, unlike pure random ISN selection.
