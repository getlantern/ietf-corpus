document: rfc-9002
kind: normative-requirement
summary: An endpoint MUST NOT set its PTO timer for the Application Data packet number space until the handshake is confirmed, preventing retransmission of data before either peer has keys to process the packets or their acknowledgments.
section: 6.2.1
rfc2119_level: MUST NOT
topics:
    - quic
    - congestion
