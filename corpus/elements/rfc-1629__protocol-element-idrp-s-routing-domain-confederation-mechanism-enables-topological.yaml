document: rfc-1629
kind: protocol-element
summary: IDRP's Routing Domain Confederation mechanism enables topological and policy abstraction by replacing a sequence of RDIs in the RD_PATH attribute with a single RDCI. Complementarily, the route aggregation mechanism handles NLRI (reachability) abstraction. Both mechanisms together provide scalable inter-domain routing and are designed to be used together without conflict.
section: 3.3.1
topics:
    - routing
