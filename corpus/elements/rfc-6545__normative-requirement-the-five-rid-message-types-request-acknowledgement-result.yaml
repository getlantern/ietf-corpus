document: rfc-6545
kind: normative-requirement
summary: The five RID message types (Request, Acknowledgement, Result, Report, Query) MUST be implemented. RID messages use both IODEF and RID documents, which MUST be encapsulated for transport as specified in RFC 6546.
section: "4.2"
rfc2119_level: MUST
