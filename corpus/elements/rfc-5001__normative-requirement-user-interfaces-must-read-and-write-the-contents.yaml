document: rfc-5001
kind: normative-requirement
summary: User interfaces MUST read and write the contents of the NSID option as a sequence of hexadecimal digits, two digits per payload octet. Any comparison between NSID payloads MUST be a comparison of the raw binary data.
section: "2.4"
rfc2119_level: MUST
topics:
    - dns
