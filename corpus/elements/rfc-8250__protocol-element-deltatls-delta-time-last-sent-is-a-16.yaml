document: rfc-8250
kind: protocol-element
summary: DELTATLS (Delta Time Last Sent) is a 16-bit unsigned integer representing the elapsed time from when the last packet was sent to when the current packet is sent (receive time packet n minus send time packet n-1). Its scale is given by SCALEDTLS. Used to derive round-trip delay when combined with DELTATLR.
section: 3.2.1
topics:
    - ip
    - measurement
