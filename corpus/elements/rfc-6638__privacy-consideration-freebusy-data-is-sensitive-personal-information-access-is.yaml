document: rfc-6638
kind: privacy-consideration
summary: Freebusy data is sensitive personal information. Access is controlled by the CALDAV:schedule-query-freebusy privilege on the target's Inbox. Servers MUST check this privilege before returning or disclosing any busy time data to the requesting calendar user.
section: "11.4"
topics:
