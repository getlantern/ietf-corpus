document: rfc-9074
kind: protocol-element
summary: A UID property may be added to VALARM components to provide a globally unique identifier, enabling cross-referencing between alarm components (e.g., for snooze relationships). It follows the definition from RFC 5545 Section 3.8.4.7 with privacy/security updates from RFC 7986 Section 5.3.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
