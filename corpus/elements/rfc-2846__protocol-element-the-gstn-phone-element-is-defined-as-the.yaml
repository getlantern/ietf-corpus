document: rfc-2846
kind: protocol-element
summary: 'The gstn-phone element is defined as the union of global-phone and local-phone: gstn-phone = ( global-phone / local-phone ). This extends the minimal pstn-mbox definition from RFC 2303 to cover alternative national numbering schemes.'
