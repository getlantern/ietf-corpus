document: rfc-1471
kind: protocol-element
summary: 'pppLinkConfigTable provides read-write LCP configuration objects representing initial link parameters: pppLinkConfigInitialMRU (default 1500), pppLinkConfigReceiveACCMap and pppLinkConfigTransmitACCMap (default 0xFFFFFFFF), pppLinkConfigMagicNumber (default false), and pppLinkConfigFcsSize (default 16 bits). Changes take effect when the link is next restarted.'
