document: rfc-7737
kind: design-rationale
summary: Ordering Reply Mode values from most to least preferred in the TLV allows a responder that cannot honor the top choice to fall back automatically, avoiding the timeout-then-retry cycle that operators would otherwise experience when a preferred return path is unavailable.
