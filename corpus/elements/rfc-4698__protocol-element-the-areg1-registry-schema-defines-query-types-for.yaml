summary: 'The AREG1 registry schema defines query types for searching IP address and ASN information: <findContacts>, <findOrganizations>, <findAutonomousSystemsByName>, <findNetworksByName>, <findNetworksByAddress>, <findNetworksByHandle>, <findASByNumber>, <findByContact>, and <findNetworksByNameServer>. These are derived from the IRIS core query type.'
