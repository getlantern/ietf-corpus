document: rfc-2630
kind: interoperability-note
summary: 'CMS is derived from PKCS #7 v1.5 (RFC 2315) with backward compatibility preserved where possible. Breaking changes were required to support attribute certificate transfer and key agreement key management. CertificateChoices includes PKCS #6 extended certificates for backward compatibility, but their use should be avoided as PKCS #6 is obsolete.'
