document: rfc-7388
kind: design-rationale
summary: The fragmentation-related counters were modeled after those in the IP-MIB (RFC 4293) for consistency. The discard counters are placed at the end of input and output chains but can be incremented at any time a datagram is discarded for reasons not covered by more specific counters.
