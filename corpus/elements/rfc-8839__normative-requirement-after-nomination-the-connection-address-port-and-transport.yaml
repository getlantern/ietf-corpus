document: rfc-8839
kind: normative-requirement
summary: After nomination, the connection address, port, and transport protocol in each 'c=' and 'm=' line MUST match the nominated pair. The controlling agent MUST include the 'remote-candidates' attribute for each data stream in the Completed state, listing remote candidates of each nominated pair.
section: 4.4.1.2.2
rfc2119_level: MUST
topics:
