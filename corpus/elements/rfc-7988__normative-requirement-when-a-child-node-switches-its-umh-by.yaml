document: rfc-7988
kind: normative-requirement
summary: When a child node switches its UMH by modifying the RT of its Leaf A-D route, the old UMH MUST continue transmitting to the child for the duration of the parent-continues timer. Concurrently, the child MUST run the switch-parents-delay timer and MUST continue accepting packets from the old UMH until it expires.
section: "10"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
