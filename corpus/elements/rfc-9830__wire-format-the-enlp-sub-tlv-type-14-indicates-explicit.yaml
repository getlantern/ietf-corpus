document: rfc-9830
kind: wire-format
summary: 'The ENLP sub-TLV (Type 14) indicates Explicit NULL Label Policy for unlabeled IP packets steered into SR Policy: 1-octet Flags, 1-octet Reserved, and 1-octet ENLP value (1=push IPv4 NULL, 2=push IPv6 NULL, 3=push both, 4=push neither). Length MUST be 3.'
