document: rfc-8320
kind: design-rationale
summary: The 'LDP Peer' concept from RFC 5036 is restricted in the MRT context to mean only LDP peers for which the LDP MRT Capability has been negotiated (called 'MRT LDP peers'). This scoping ensures that MRT FEC label distribution procedures only apply between MRT-capable nodes.
section: 5.2.1
topics:
