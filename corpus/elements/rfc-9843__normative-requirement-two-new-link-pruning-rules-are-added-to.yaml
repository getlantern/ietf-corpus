document: rfc-9843
kind: normative-requirement
summary: 'Two new link pruning rules are added to the Flex-Algorithm computation (updating RFC 9350 Section 13): Rule 6 prunes links that fail the FAEMB bandwidth threshold; Rule 7 prunes links that fail the FAEMD delay threshold. In both cases, links lacking the respective advertisement are not pruned.'
section: "6"
rfc2119_level: MUST
topics:
    - routing
