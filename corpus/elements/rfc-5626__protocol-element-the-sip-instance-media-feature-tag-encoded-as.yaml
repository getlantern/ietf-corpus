document: rfc-5626
kind: protocol-element
summary: The 'sip.instance' media feature tag (encoded as '+sip.instance' in the Contact header field parameter) carries a URN uniquely identifying a UA instance. It is used by registrars to associate multiple registrations over different flows with the same UA.
