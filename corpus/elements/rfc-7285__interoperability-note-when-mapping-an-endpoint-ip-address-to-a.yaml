document: rfc-7285
kind: interoperability-note
summary: When mapping an endpoint IP address to a PID for 'ipv4' or 'ipv6' network maps, the ALTO server uses a longest-prefix-match algorithm over the IP prefixes associated with each PID. A catch-all PID entry (e.g., 0.0.0.0/0 or ::/0) may be used to cover endpoints not otherwise listed.
section: 11.2.2
topics:
    - ip
