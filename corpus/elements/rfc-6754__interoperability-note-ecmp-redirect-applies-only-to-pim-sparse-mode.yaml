document: rfc-6754
kind: interoperability-note
summary: ECMP Redirect applies only to PIM Sparse Mode shared and source trees per RFC 4601. Its use in PIM Dense Mode (RFC 3973) or Bidirectional PIM (RFC 5015) is explicitly out of scope.
