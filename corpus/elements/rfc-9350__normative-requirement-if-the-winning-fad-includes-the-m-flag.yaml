document: rfc-9350
kind: normative-requirement
summary: If the winning FAD includes the M-flag, an ABR or ASBR MUST include the FAPM in its inter-area/inter-domain prefix advertisement for that Flex-Algorithm when the prefix is reachable, and MUST NOT include it when the prefix is unreachable. If the FAPM for a Flex-Algorithm is absent from an inter-area or external prefix advertisement, that prefix MUST be treated as unreachable for that Flex-Algorithm.
section: "13.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
