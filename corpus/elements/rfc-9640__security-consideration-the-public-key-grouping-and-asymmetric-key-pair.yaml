document: rfc-9640
kind: security-consideration
summary: The public-key-grouping and asymmetric-key-pair-grouping enable configuration of keys without usage constraints (e.g., encryption vs. verification). The asymmetric-key-pair-with-cert-grouping partially mitigates this by requiring associated certificates to constrain key usage according to local policy.
section: "3.3"
topics:
    - security
    - crypto
    - pkix
