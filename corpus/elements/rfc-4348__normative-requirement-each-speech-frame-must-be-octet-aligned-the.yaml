document: rfc-4348
kind: normative-requirement
summary: 'Each speech frame MUST be octet-aligned: the last octet MUST be padded with zeroes at the end if not all bits are used. When multiple speech frames are present, they MUST be arranged one whole frame after another.'
section: 6.3.4
rfc2119_level: MUST
