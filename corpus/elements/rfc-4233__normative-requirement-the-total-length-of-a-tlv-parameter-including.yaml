document: rfc-4233
kind: normative-requirement
summary: The total length of a TLV parameter (including Tag, Parameter Length, and Value fields) MUST be a multiple of 4 bytes; the sender pads at the end with zero bytes and MUST NOT pad with more than 3 bytes. The receiver MUST ignore padding bytes.
section: 3.1.5
rfc2119_level: MUST
topics:
    - sctp
