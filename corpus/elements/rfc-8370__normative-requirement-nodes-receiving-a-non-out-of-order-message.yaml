document: rfc-8370
kind: normative-requirement
summary: Nodes receiving a non-out-of-order message containing a MESSAGE_ID object with the ACK_Desired flag set MUST respond with a MESSAGE_ID_ACK object. This upgrades the RFC 2961 SHOULD to a MUST for implementations supporting these techniques.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
