document: rfc-2561
kind: state-machine
summary: 'tn3270eSrvrConfAdminStatus drives the desired server state: up(1) activates the server, down(2) requests graceful shutdown (server SHOULD close all sessions), stopImmediate(3) forces immediate termination. tn3270eSrvrConfOperStatus reflects the actual state: up(1), down(2), busy(3) (active but not accepting new connections), or shuttingDown(4).'
section: "4.0"
extracted_by: claude-sonnet-4-6
