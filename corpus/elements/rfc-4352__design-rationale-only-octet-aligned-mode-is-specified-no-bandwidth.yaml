document: rfc-4352
kind: design-rationale
summary: Only octet-aligned mode is specified; no bandwidth-efficient mode is defined. Because all AMR-WB+ extension frame types are natively octet-aligned and the primary use case is streaming servers, the bandwidth savings of a bandwidth-efficient mode would be negligible.
section: "1"
topics:
