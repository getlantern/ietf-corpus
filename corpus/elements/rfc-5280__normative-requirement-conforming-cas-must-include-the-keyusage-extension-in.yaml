document: rfc-5280
kind: normative-requirement
summary: Conforming CAs MUST include the keyUsage extension in certificates whose public keys are used to validate signatures on other certificates or CRLs, and SHOULD mark this extension as critical. The keyCertSign bit MUST NOT be set unless the cA bit in basicConstraints is also asserted.
section: 4.2.1.3
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
