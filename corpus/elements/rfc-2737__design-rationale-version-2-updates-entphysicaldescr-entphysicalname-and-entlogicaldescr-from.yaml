document: rfc-2737
kind: design-rationale
summary: Version 2 updates entPhysicalDescr, entPhysicalName, and entLogicalDescr from the obsolete DisplayString TC to SnmpAdminString. The working group chose to update in-place rather than deprecate and define new objects because deprecating would have a more adverse impact on backward compatibility given the semantics of these objects.
