document: rfc-5475
kind: interoperability-note
summary: The Hash Domain for IPv4 BOB cannot include options fields, nor can an IPv6 Hash Domain include stacked extension headers. If the payload is shorter than the configured number of bytes N, the Hash Function cannot be applied; padding with zeros may be considered in the future.
section: "7.2"
topics:
