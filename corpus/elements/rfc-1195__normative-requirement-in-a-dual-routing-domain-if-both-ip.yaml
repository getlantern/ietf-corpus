document: rfc-1195
kind: normative-requirement
summary: In a dual routing domain, if both IP and OSI traffic are to be routed between areas, all Level 2 routers MUST be dual. Within a dual area, ONLY dual routers may be used.
section: "1.4"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
