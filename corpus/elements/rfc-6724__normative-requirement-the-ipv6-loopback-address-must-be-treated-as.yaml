document: rfc-6724
kind: normative-requirement
summary: The IPv6 loopback address MUST be treated as having link-local scope and 'preferred' configuration status. NSAP addresses and other addresses with undefined format prefixes MUST be treated as having global scope and 'preferred' status.
section: "3.4"
rfc2119_level: MUST
