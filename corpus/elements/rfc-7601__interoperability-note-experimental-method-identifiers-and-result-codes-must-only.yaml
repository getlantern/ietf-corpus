document: rfc-7601
kind: interoperability-note
summary: Experimental method identifiers and result codes MUST only be used within ADMDs that have explicitly consented to their use. Any MTA, MUA, or downstream filter intended for production use SHOULD ignore or delete any Authentication-Results header field that includes an experimental or unknown method identifier or extension result.
section: 2.7.6
topics:
    - email
