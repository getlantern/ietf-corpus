document: rfc-8444
kind: protocol-element
summary: The BIER Sub-TLV is a sub-TLV of the OSPFv2 Extended Prefix TLV (RFC 7684) used to distribute BIER information. It carries sub-domain-id (1 octet), MT-ID (1 octet), BFR-id (2 octets), BAR (1 octet), and IPA (1 octet) fields, plus nested sub-TLVs. Type value is 9.
section: "2.1"
topics:
