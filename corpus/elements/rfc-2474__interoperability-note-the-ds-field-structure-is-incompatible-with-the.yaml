document: rfc-2474
kind: interoperability-note
summary: The DS field structure is incompatible with the IPv4 TOS octet definition in RFC 791. DS domains are expected to protect themselves with re-marking boundary nodes; domains not isolated by suitably configured boundary nodes may deliver unpredictable service.
section: "3"
