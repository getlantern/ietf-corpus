document: rfc-8936
kind: privacy-consideration
summary: SET Transmitters should attempt to deliver SETs targeted to the specific business and protocol needs of subscribers, minimizing over-sharing of personal or confidential data. Legal agreements and user consent MUST be in place when sharing PII.
