document: rfc-1252
kind: protocol-element
summary: The ospfLsdbTable (OID ospf 4) represents the OSPF Link State Database, indexed by ospfLsdbAreaId, ospfLsdbType, ospfLsdbLSID, and ospfLsdbRouterId. LSA types are routerLink(1), networkLink(2), summaryLink(3), asSummaryLink(4), and asExternalLink(5). The table is intended primarily for network debugging.
