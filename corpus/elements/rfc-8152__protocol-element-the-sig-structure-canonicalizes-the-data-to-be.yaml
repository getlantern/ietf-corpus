summary: 'The Sig_structure canonicalizes the data to be signed as a CBOR array [context: tstr, body_protected: bstr, sign_protected?: bstr, external_aad: bstr, payload: bstr]. The context string is ''Signature'', ''Signature1'', or ''CounterSignature''; the sign_protected field is omitted for COSE_Sign1.'
