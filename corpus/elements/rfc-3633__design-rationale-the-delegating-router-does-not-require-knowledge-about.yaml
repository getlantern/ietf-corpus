document: rfc-3633
kind: design-rationale
summary: The delegating router does not require knowledge about the topology of the links in the network to which the prefixes will be assigned. The mechanism is designed for cross-administrative-boundary delegation, such as an ISP assigning a prefix to a CPE device, where the ISP need only know the identity of the requesting router.
section: "5"
topics:
