document: rfc-6876
kind: normative-requirement
summary: When a PT-TLS error message is received, the recipient MUST NOT respond with another PT-TLS error, as this could cause an infinite error loop. Recipients may log, ignore, or terminate the assessment.
section: "3.9"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
