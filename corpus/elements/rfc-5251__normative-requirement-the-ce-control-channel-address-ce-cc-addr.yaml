document: rfc-5251
kind: normative-requirement
summary: The CE Control Channel Address (CE-CC-Addr) and PE Control Channel Address (PE-CC-Addr) are REQUIRED to be unique within the L1VPN they belong to, but are not required to be unique across multiple L1VPNs. Control channel addresses are not shared among multiple VPNs.
section: "3.3"
rfc2119_level: REQUIRED
topics:
    - vpn
    - ip
