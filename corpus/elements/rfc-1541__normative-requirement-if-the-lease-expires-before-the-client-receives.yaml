document: rfc-1541
kind: normative-requirement
summary: If the lease expires before the client receives a DHCPACK, the client moves to INIT state and MUST immediately stop any other network processing. If subsequently given a new network address, the client MUST NOT continue using the previous network address.
section: 4.4.4
rfc2119_level: MUST
topics:
    - ip
