document: rfc-4649
kind: normative-requirement
summary: Each vendor MUST ensure that the remote-id is unique for its enterprise-number, so that the octet sequence of enterprise-number followed by remote-id is globally unique. Including the relay agent's DUID in the remote-id is one way to achieve this.
section: "3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
