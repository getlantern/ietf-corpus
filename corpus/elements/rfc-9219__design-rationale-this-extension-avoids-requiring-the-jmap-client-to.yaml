document: rfc-9219
kind: design-rationale
summary: This extension avoids requiring the JMAP client to download signature body parts or decode CMS, reducing network bandwidth and client-side code complexity. It is suitable when these benefits outweigh security concerns about trusting the JMAP server, such as when the same organization controls both client and server.
