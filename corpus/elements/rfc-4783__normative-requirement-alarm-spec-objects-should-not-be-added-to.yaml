document: rfc-4783
kind: normative-requirement
summary: ALARM_SPEC objects SHOULD NOT be added to LSPs in 'alarm communication inhibited' state (I bit set). They MAY be added to LSPs in 'administratively down' state (A bit set).
section: 3.1.2
rfc2119_level: SHOULD NOT
