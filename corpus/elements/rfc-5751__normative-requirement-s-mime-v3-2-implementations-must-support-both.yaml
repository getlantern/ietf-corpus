document: rfc-5751
kind: normative-requirement
summary: S/MIME v3.2 implementations MUST support both issuerAndSerialNumber and subjectKeyIdentifier for SignerIdentifier. Implementations MUST be prepared for multiple certificates to share the same subjectKeyIdentifier value and MUST try each matching certificate during signature verification before indicating an error.
section: "2.6"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
