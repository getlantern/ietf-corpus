document: rfc-8873
kind: protocol-element
summary: The msrp-scheme portion of the MSRP URI for a data channel endpoint is always 'msrps', indicating the session is always secured using DTLS as specified in RFC 8831. This applies to both the SDP 'path' attribute and MSRP message headers.
section: "4.2"
topics:
    - webrtc
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
