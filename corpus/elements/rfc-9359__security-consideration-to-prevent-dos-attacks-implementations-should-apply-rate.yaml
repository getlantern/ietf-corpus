document: rfc-9359
kind: security-consideration
summary: To prevent DoS attacks, implementations SHOULD apply rate-limiting to incoming echo requests and replies. Implementations MUST provide a means of checking source addresses of echo request messages against an access list before accepting them.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - measurement
