document: rfc-7975
kind: normative-requirement
summary: A uCDN SHOULD only include in RI requests information absolutely necessary for content delivery. Cookies in particular SHOULD NOT be conveyed in RI requests due to security and privacy sensitivity.
section: "4.1"
rfc2119_level: SHOULD NOT
topics:
