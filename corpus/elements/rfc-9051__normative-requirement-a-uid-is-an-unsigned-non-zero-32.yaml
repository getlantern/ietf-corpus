document: rfc-9051
kind: normative-requirement
summary: A UID is an unsigned non-zero 32-bit value; combined with UIDVALIDITY it forms a 64-bit value that MUST NOT refer to any other message in the mailbox or any subsequent mailbox with the same name, ever. UIDs MUST be assigned in strictly ascending order and MUST NOT change during the session.
section: 2.3.1.1
rfc2119_level: MUST NOT
topics:
    - email
