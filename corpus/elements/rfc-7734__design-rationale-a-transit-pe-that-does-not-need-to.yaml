document: rfc-7734
kind: design-rationale
summary: A transit PE that does not need to participate in tandem calculations at the B-MAC layer can use the IS-IS overload bit to exclude itself from SPBM tandem paths and behave as a pure interworking platform, simplifying its role in the network.
