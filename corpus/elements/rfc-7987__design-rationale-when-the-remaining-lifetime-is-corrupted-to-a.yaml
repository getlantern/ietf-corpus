document: rfc-7987
kind: design-rationale
summary: 'When the Remaining Lifetime is corrupted to a value smaller than the originator intended, the LSP may age out prematurely, causing two harms: temporary loss of reachability for destinations in that LSP, and unnecessary flooding from the premature purge followed by the originator regenerating and reflooding a new version.'
section: "1"
topics:
    - routing
