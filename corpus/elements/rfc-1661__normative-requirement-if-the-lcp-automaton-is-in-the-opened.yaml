document: rfc-1661
kind: normative-requirement
summary: If the LCP automaton is in the Opened state and a PPP packet with an unknown Protocol field is received, a Protocol-Reject MUST be sent. Upon reception of a Protocol-Reject, the implementation MUST stop sending packets of the indicated protocol at the earliest opportunity.
section: "5.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
