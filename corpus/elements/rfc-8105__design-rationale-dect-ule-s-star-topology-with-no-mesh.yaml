summary: DECT ULE's star topology with no mesh networking capability means the Multi-Link Subnet / NBMA model was chosen to avoid the complexity of implementing a separate /64 subnet per DECT ULE link, while still supporting 6LN-to-6LN communication via the 6LBR.
