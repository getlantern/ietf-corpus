document: rfc-8542
kind: normative-requirement
summary: The lowest NETCONF layer is the secure transport layer, and the mandatory-to-implement secure transport is SSH (RFC 6242). The lowest RESTCONF layer is HTTPS, and the mandatory-to-implement secure transport is TLS (RFC 8446).
