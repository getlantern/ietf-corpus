document: rfc-1388
kind: protocol-element
summary: The Route Tag (RT) field is a 2-byte per-entry field intended to carry EGP/BGP Autonomous System numbers for route redistribution. Any RIP system that receives a route entry with a non-zero RT value must re-advertise that value; routes with no RT value must advertise RT = 0.
section: "3.3"
topics:
    - routing
    - bgp
