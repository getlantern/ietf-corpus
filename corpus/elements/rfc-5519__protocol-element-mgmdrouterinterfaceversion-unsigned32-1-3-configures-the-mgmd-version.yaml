document: rfc-5519
kind: protocol-element
summary: 'mgmdRouterInterfaceVersion (Unsigned32 1..3) configures the MGMD version running on a router interface: 1 = IGMPv1, 2 = IGMPv2/MLDv1, 3 = IGMPv3/MLDv2. For IGMP and MLD to function correctly, all routers on a LAN must be configured to run the same version.'
section: "5"
topics:
    - multicast
