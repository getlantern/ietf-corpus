document: rfc-5619
kind: normative-requirement
summary: A softwire implementation MUST NOT use the 'incremental update of checksum' option (option 1 of RFC 3948) because IKEv2 does not have the NAT-OA payload information required to compute that checksum.
section: 3.5.3
rfc2119_level: MUST NOT
topics:
    - ipsec
    - nat
    - vpn
