document: rfc-4252
kind: normative-requirement
summary: The server MUST carefully check 'user name' and 'service name' in every SSH_MSG_USERAUTH_REQUEST message, and MUST flush any accumulated authentication states if they change. If it is unable to flush an authentication state, it MUST disconnect if these fields change.
section: "5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
