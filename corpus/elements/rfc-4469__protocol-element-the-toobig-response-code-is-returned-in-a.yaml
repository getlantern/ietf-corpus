document: rfc-4469
kind: protocol-element
summary: The TOOBIG response code is returned in a tagged NO response if the resulting message would exceed the 4-GB IMAP message limit, or a server-specific message size limit. The server may also use TOOBIG to enforce its own size policy.
section: "4.2"
