document: rfc-2833
kind: protocol-element
summary: The duration field in both payload formats is a 16-bit unsigned integer measured in RTP timestamp units. At 8000 Hz this allows durations up to approximately 8 seconds. The event begins at the RTP timestamp instant and has lasted for the stated duration.
