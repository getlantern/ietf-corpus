document: rfc-6920
kind: security-consideration
summary: The presence of a domain name in the authority field of an ni URI implies nothing about the relationship between the domain name owner and the referenced content. Application developers MUST NOT assume any relationship between the domain registrant and matching content.
section: "10"
topics:
    - security
