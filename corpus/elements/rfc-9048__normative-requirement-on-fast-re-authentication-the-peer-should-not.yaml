document: rfc-9048
kind: normative-requirement
summary: On fast re-authentication, the peer SHOULD NOT attempt fast re-authentication when it knows the network name in the current access network differs from the one used in the initial full authentication, and the server SHOULD fall back to full authentication upon detecting a changed network name.
section: "3.3"
rfc2119_level: SHOULD NOT
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
