document: rfc-5296
kind: design-rationale
summary: The rMSK is derived using the SEQ sequence number as an additional KDF input. This simultaneously provides replay protection for ERP and binds each rMSK to a specific exchange, ensuring that multiple simultaneous re-authentications produce distinct, non-reusable session keys.
section: "4.6"
