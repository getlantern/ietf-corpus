document: rfc-6391
kind: design-rationale
summary: The flow label value is a local matter for the ingress PE and is not signalled. Only the desire to include the flow LSE in the label stack (via the T and R bits) is signalled. This keeps the signalling lightweight and the ECMP hash function implementation-specific.
section: "4"
topics:
