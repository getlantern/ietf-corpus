document: rfc-6720
kind: normative-requirement
summary: If an LSR does not recognize the G flag or receives G=0 in a Link Hello, it MUST NOT enforce GTSM in the subsequent TCP/LDP peering session, ensuring backward compatibility and automatic GTSM deactivation.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - security
