document: rfc-8627
kind: normative-requirement
summary: If a peer supporting both FLEX FEC and other RTP retransmission methods (RFC 4588) receives an Offer including both, it MUST respond with an Answer containing only FLEX FEC.
section: 1.1.7
rfc2119_level: MUST
