document: rfc-7090
kind: security-consideration
summary: The 'psap-callback' Priority header value can be inserted by any SIP entity, including attackers, enabling bypass of blacklists, call-forwarding, and UI settings such as vibrate-only mode. Preferential treatment must only be granted when the PSAP identity is verified against a trusted white list.
section: "5.1"
topics:
    - sip
    - security
