document: rfc-8766
kind: design-rationale
summary: 'The ten-second TTL cap is chosen based on user-experience: a device that is powered on should become discoverable within approximately ten seconds, and negative cache entries should expire quickly enough that newly available devices are usable without excessive delay.'
