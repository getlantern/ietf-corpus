document: rfc-9242
kind: wire-format
summary: IntAuth_[i/r]*A covers from the first octet of the IKE Header through the last octet of the Encrypted payload generic header (scope identical to AEAD Associated Data per RFC 5282 Section 5.1). IntAuth_[i/r]*P covers the inner plaintext payloads of the Encrypted payload, excluding IV, Padding, Pad Length, and Integrity Checksum Data.
section: 3.3.2
topics:
    - ipsec
    - crypto
