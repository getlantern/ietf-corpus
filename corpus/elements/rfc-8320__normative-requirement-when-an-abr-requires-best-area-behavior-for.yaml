document: rfc-8320
kind: normative-requirement
summary: When an ABR requires best-area behavior for a red(blue) FEC, it MUST withdraw any existing Rainbow FEC label mapping advertisements and advertise label mappings for the red(blue) FEC. When non-best-area behavior is required, it MUST withdraw existing red and blue FEC label mappings and advertise the corresponding Rainbow FEC label binding.
section: 5.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
