document: rfc-5605
kind: interoperability-note
summary: In atmTransparent(3) mode, VPI and VCI index fields in the Nto1 tables must be set to 0xFFFF (the ATM identifier maximum) during set operations, since transparent mode carries cells without interpreting VPI/VCI values.
