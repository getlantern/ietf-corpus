document: rfc-2616
kind: security-consideration
summary: 'Server log information is sensitive: logs contain request URIs, IP addresses, and potentially personal information. Operators MUST protect logs and consider privacy when designing log retention. Clients SHOULD NOT include sensitive information in query strings since those appear in logs and Referer headers.'
section: "15.1"
topics:
    - http
    - security
    - privacy
