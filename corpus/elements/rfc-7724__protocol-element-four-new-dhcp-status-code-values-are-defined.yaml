document: rfc-7724
kind: protocol-element
summary: 'Four new dhcp-status-code values are defined: DataMissing (5), indicating requested binding data is unavailable; ConnectionActive (6), sent as a keepalive; CatchUpComplete (7), signaling end of the catch-up phase; and TLSConnectionRefused (8), indicating TLS is not permitted.'
section: 5.2.2
