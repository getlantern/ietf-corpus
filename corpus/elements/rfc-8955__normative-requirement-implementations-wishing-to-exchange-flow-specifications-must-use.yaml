document: rfc-8955
kind: normative-requirement
summary: Implementations wishing to exchange Flow Specifications MUST use BGP's Capability Advertisement facility to exchange the Multiprotocol Extension Capability Code (Code 1). The (AFI, SAFI) pair MUST be (AFI=1, SAFI=133) for IPv4 Flow Specification and (AFI=1, SAFI=134) for VPNv4 Flow Specification.
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
