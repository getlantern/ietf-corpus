document: rfc-4815
kind: errata
summary: 'RFC 3095 Section 5.7.7.6 was unclear about how the RTP X (eXtension) bit is updated via the dynamic chain. The corrected rule: if RX=1, X carries the RTP header X bit value and updates context(X); if RX=0, context(X) is updated to zero.'
section: "6.5"
topics:
    - rtp
