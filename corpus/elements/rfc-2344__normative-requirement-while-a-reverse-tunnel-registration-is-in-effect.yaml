document: rfc-2344
kind: normative-requirement
summary: While a reverse-tunnel registration is in effect, the home agent MUST process each valid reverse-tunneled packet by decapsulating it, recovering the original packet, and forwarding it to the correspondent host on behalf of the mobile node.
section: 4.3.2
rfc2119_level: MUST
topics:
