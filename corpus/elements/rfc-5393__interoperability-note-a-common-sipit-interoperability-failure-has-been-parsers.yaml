document: rfc-5393
kind: interoperability-note
summary: A common SIPit interoperability failure has been parsers objecting to Via header field values from other elements. Implementations must avoid assumptions about the format of another element's Via beyond basic RFC 3261 constraints; unknown parameter names, valueless parameters, or quoted/unquoted parameter values must not cause failure.
section: 4.2.4
topics:
    - sip
