document: rfc-2239
kind: protocol-element
summary: ifMauDefaultType is a read-write OBJECT IDENTIFIER identifying the administratively configured MAU type. When auto-negotiation is disabled, this value determines the operational MAU type (ifMauType); when auto-negotiation is re-disabled after being enabled, the MAU must revert to this type.
