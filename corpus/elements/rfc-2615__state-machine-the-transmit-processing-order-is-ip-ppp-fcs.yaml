document: rfc-2615
kind: state-machine
summary: 'The transmit processing order is: IP -> PPP -> FCS generation -> Byte stuffing -> Scrambling -> SONET/SDH framing. The receive order is the reverse: SONET/SDH framing -> Descrambling -> Byte destuffing -> FCS detection -> PPP -> IP.'
section: "2"
