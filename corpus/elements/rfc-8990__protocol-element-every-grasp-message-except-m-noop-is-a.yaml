document: rfc-8990
kind: protocol-element
summary: Every GRASP message except M_NOOP is a CBOR array with the structure [MESSAGE_TYPE, session-id, ?initiator, *grasp-option]. MESSAGE_TYPE is 0–255; session-id is a 32-bit unsigned integer. Options are presented serially. The complete normative definition uses CDDL (RFC 8610).
section: 2.8.2
topics:
