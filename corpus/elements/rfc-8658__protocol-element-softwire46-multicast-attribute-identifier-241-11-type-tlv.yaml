document: rfc-8658
kind: protocol-element
summary: Softwire46-Multicast Attribute (identifier 241.11, type 'tlv') conveys IPv6 prefixes used to synthesize multicast and unicast IPv4-embedded IPv6 addresses per RFC 8114. The BNG uses these prefixes to populate the DHCPv6 PREFIX64 Option (RFC 8115).
