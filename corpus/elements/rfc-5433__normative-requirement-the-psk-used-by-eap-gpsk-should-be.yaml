document: rfc-5433
kind: normative-requirement
summary: The PSK used by EAP-GPSK SHOULD be a strong key of at least 16 octets. Use of a password or passphrase as the PSK is NOT RECOMMENDED because EAP-GPSK is vulnerable to dictionary attacks.
section: "4"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
