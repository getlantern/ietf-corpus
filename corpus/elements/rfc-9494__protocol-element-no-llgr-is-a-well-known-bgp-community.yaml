document: rfc-9494
kind: protocol-element
summary: 'NO_LLGR is a well-known BGP community (value: 0xFFFF0007) used to mark routes that must not be retained as long-lived stale routes. Routes marked with NO_LLGR must be removed per normal BGP operation when the LLGR period begins.'
section: "3.3"
topics:
    - bgp
    - routing
