document: rfc-6761
kind: normative-requirement
summary: Caching DNS servers SHOULD recognize private-address reverse-mapping names as special and SHOULD NOT, by default, query authoritative DNS servers for them; instead they SHOULD generate immediate responses. A configuration option (disabled by default) to enable upstream resolution SHOULD be offered.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - dns
