document: rfc-1368
kind: interoperability-note
summary: The MIB-II 'interfaces' group has NO specific relationship to a repeater's ports. The interfaces group applies only to the network interface(s) used by the management entity; it does not apply to the repeater's forwarding ports, consistent with the physical-layer nature of a repeater.
section: 3.4.2
topics:
    - snmp
