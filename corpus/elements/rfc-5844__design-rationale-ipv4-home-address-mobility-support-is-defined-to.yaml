document: rfc-5844
kind: design-rationale
summary: 'IPv4 home address mobility support is defined to be independent of IPv6 home address mobility support: a mobile node can obtain IPv4-only service without any IPv6 address assignment, enabling the same PMIPv6 infrastructure to serve IPv4-only, IPv6-only, or dual-stack nodes.'
