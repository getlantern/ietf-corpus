summary: The SFC Active OAM Header consists of a 4-bit version field (V, currently 0), a 6-bit Msg Type field identifying the OAM protocol, a 6-bit Reserved field (MUST be zeroed on transmission), and a 2-octet Length field indicating the length of the SFC Active OAM Control Packet in octets.
