document: rfc-1134
kind: wire-format
summary: 'Configuration Options use a TLV encoding: Type (1 octet), Length (1 octet, includes Type and Length fields), and variable-length Data. Options apply in half-duplex fashion and should not appear more than once in a list unless the specific option overrides this rule.'
section: 4.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
