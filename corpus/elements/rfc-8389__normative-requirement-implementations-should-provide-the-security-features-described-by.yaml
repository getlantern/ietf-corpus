document: rfc-8389
kind: normative-requirement
summary: Implementations SHOULD provide the security features described by the SNMPv3 framework, and deployment of SNMP versions prior to SNMPv3 is NOT RECOMMENDED. Instead, it is RECOMMENDED to deploy SNMPv3 and enable cryptographic security.
section: "7"
rfc2119_level: SHOULD
topics:
