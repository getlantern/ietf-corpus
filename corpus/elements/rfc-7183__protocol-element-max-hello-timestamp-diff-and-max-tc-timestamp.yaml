document: rfc-7183
kind: protocol-element
summary: MAX_HELLO_TIMESTAMP_DIFF and MAX_TC_TIMESTAMP_DIFF are router parameters controlling the maximum acceptable age of HELLO and TC messages respectively for replay protection. MAX_TC_TIMESTAMP_DIFF MAY be made dependent on the number of hops a TC message has traveled.
section: "5"
topics:
    - security
    - routing
