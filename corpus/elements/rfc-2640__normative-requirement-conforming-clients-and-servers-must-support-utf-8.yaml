document: rfc-2640
kind: normative-requirement
summary: Conforming clients and servers MUST support UTF-8 for transfer and receipt of pathnames. Unless configured for a specific native character set, implementations MUST check for a valid UTF-8 byte sequence to determine if a presented pathname is UTF-8.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
