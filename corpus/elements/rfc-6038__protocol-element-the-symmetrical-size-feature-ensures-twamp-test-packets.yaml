document: rfc-6038
kind: protocol-element
summary: The Symmetrical Size feature ensures TWAMP-Test packets are the same size in both directions by defining a new Session-Sender packet format that includes 27 MBZ octets (56 in Authenticated/Encrypted mode) to compensate for the Session-Reflector's larger header, making equal-size packets guaranteed rather than dependent on optional truncation.
