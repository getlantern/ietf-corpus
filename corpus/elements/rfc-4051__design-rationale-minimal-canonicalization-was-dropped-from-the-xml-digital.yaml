document: rfc-4051
kind: design-rationale
summary: Minimal Canonicalization was dropped from the XML Digital Signature standards track (RFC 3275) because two independent interoperable implementations had not been demonstrated, as required for advancement from Proposed to Draft Standard. It is preserved in this document with its original URI prefix to avoid changing the XMLDSIG namespace.
