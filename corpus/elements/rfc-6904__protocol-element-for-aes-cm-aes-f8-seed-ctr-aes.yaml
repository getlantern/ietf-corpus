document: rfc-6904
kind: protocol-element
summary: For AES-CM, AES-f8, SEED-CTR, AES_192_CM, and AES_256_CM transforms, the header extension keystream is generated using the same transform and IV as the SRTP payload, but substituting k_he and k_hs for k_e and k_s. For the NULL encryption transform, the header extension keystream is all-zero.
section: "3.2"
topics:
