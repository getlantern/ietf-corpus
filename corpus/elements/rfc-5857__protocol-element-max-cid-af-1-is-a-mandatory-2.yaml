document: rfc-5857
kind: protocol-element
summary: MAX_CID (AF=1) is a mandatory 2-octet attribute indicating the maximum context identifier value supported by the decompressor. Its value MUST be between 0 and 16383, and the compressor MUST only use context identifiers up to MAX_CID.
section: 3.1.2
topics:
    - ipsec
    - vpn
