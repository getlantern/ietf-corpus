document: rfc-9569
kind: normative-requirement
summary: The tips-view-uri scheme MUST be 'http' or 'https', and ALTO servers SHOULD use 'https'. A server MUST NOT reuse the same URI for different TIPS views. The URI MUST contain only ASCII characters; international characters MUST be percent-encoded.
section: "6.2"
rfc2119_level: MUST
topics:
    - http
    - security
