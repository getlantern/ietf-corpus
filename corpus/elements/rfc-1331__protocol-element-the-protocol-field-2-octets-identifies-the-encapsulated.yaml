document: rfc-1331
kind: protocol-element
summary: The Protocol field (2 octets) identifies the encapsulated network-layer protocol. Values 0x0000–0x3FFF are network-layer protocols; 0x8000–0xBFFF are associated NCPs; 0x4000–0x7FFF are low-volume protocols without NCPs; 0xC000–0xFFFF are link-layer control protocols (e.g., LCP at 0xC021). Protocol values must be assigned by IANA.
section: "3.1"
