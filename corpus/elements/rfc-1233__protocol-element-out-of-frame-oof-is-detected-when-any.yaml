document: rfc-1233
kind: protocol-element
summary: Out of Frame (OOF) is detected when any three or more errors occur in sixteen or fewer consecutive F-bits within a DS3 M-frame, and is cleared when reframe occurs. Loss of Signal (LOS) is declared upon observing 175 +/- 75 contiguous pulse positions with no pulses.
section: "4.3"
topics:
