document: rfc-1256
kind: security-consideration
summary: Any system on a multicast or broadcast link can masquerade as a default router by sending fraudulent Router Advertisements, enabling eavesdropping, denial of forwarding service, and packet modification. On most such links, eavesdropping is already feasible, and ARP offers a similar opportunity for service denial and message stream modification.
section: "7"
