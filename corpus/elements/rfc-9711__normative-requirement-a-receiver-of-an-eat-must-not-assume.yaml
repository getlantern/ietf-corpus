document: rfc-9711
kind: normative-requirement
summary: A receiver of an EAT MUST NOT assume that debug is turned off in a submodule because a superior module claims it is disabled. Every submodule must explicitly describe its own debug state; there is no inheritance.
section: 4.2.9
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
