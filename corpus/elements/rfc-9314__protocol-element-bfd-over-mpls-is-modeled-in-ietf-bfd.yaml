document: rfc-9314
kind: protocol-element
summary: BFD-over-MPLS is modeled in 'ietf-bfd-mpls' with session groups keyed by 'mpls-fec' (inet:ip-prefix) for ingress and a separate 'egress' container for egress BFD configuration (enabled, multiplier, intervals, authentication). MPLS encapsulation identities 'encap-gach' and 'encap-ip-gach' are defined in addition to the base 'encap-ip'.
section: "2.9"
topics:
    - yang
    - mpls
