summary: 'Three new Event header field parameters are defined: ''max-rate'' (maximum notifications per second), ''min-rate'' (minimum notifications per second), and ''adaptive-min-rate'' (adaptive minimum notifications per second). These parameters are added to both the Event header field and the Subscription-State header field.'
