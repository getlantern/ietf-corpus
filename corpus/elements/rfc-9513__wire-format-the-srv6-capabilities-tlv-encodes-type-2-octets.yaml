summary: 'The SRv6 Capabilities TLV encodes: Type (2 octets, value=20), Length (2 octets), Flags (2 octets, O-flag at bit 1), Reserved (2 octets, must be zero). The Flags field O-flag indicates the router supports the O-flag in the SRH.'
