document: rfc-5454
kind: interoperability-note
summary: Minimal Encapsulation (RFC 2004) CANNOT be used to carry IPv6 traffic over the Mobile IPv4 tunnel because RFC 2004 does not support an IPv6 inner header. Only IPinIP (RFC 4213) and GRE (RFC 2784) are compatible.
section: 3.3.2
topics:
    - ip
    - mobility
    - v6ops
