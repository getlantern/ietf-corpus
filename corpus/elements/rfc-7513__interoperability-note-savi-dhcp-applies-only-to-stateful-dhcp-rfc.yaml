document: rfc-7513
kind: interoperability-note
summary: SAVI-DHCP applies only to stateful DHCP (RFC 2131, RFC 3315). For hosts using SLAAC, FCFS SAVI (RFC 6620) must be used instead. SAVI-DHCP does not block link-local addresses as they are not DHCP-assigned; a complementary SAVI solution for link-local addresses (e.g., FCFS SAVI) is RECOMMENDED.
section: "1"
topics:
