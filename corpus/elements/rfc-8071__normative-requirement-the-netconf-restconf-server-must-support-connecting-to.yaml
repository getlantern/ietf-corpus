document: rfc-8071
kind: normative-requirement
summary: The NETCONF/RESTCONF server MUST support connecting to one of the IANA-assigned call home ports, but MAY be configured to connect to a different port. Port 4334 is used for NETCONF over SSH, 4335 for NETCONF over TLS, and 4336 for RESTCONF over TLS.
section: "4.1"
rfc2119_level: MUST
topics:
    - netconf
