document: rfc-7904
kind: interoperability-note
summary: Third-party registration (RFC 3261 Section 10.2) cannot be directly translated to P2PSIP because only the certificate owner can store a SIP-REGISTRATION. It can be implemented using the USER-CHAIN-ACL mechanism from the ShaRe draft with a new 'SIP-3P-REGISTRATION' Kind.
section: A
topics:
