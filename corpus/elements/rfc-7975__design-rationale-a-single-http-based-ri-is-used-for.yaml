document: rfc-7975
kind: design-rationale
summary: A single HTTP-based RI is used for both DNS and HTTP redirection (rather than separate interfaces) so that CDN operators only need to deploy, monitor, manage, and build tooling for one interface regardless of UA redirection method. This also avoids needing to embed CDNI-specific data inside DNS/HTTP requests.
section: "4"
topics:
