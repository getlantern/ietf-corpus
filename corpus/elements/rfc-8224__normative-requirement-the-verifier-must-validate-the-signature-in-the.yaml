document: rfc-8224
kind: normative-requirement
summary: The verifier MUST validate the signature in the Identity header over the reconstructed PASSporT object. The verifier must also check Date header freshness against local policy (sixty seconds RECOMMENDED) and ensure the Date falls within the credential's validity period.
section: "6.2"
rfc2119_level: MUST
topics:
    - sip
    - security
