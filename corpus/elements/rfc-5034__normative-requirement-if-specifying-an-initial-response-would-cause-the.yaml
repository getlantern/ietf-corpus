document: rfc-5034
kind: normative-requirement
summary: If specifying an initial response would cause the AUTH command to exceed the 255-octet limit defined in RFC 2449 Section 4, the client MUST NOT use the initial-response parameter and must instead send its initial response after an empty challenge.
section: "4"
rfc2119_level: MUST NOT
topics:
    - email
    - security
