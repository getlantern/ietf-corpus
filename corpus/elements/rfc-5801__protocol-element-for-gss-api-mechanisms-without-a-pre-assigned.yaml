document: rfc-5801
kind: protocol-element
summary: For GSS-API mechanisms without a pre-assigned SASL name, the GS2 SASL name is 'GS2-' concatenated with the Base32 (uppercase, RFC 4648) encoding of the first 55 bits of the SHA-1 hash of the ASN.1 DER encoding (including tag and length) of the mechanism OID.
section: "3.1"
