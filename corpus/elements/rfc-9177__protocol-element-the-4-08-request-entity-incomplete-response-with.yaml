document: rfc-9177
kind: protocol-element
summary: The 4.08 (Request Entity Incomplete) response with content type 'application/missing-blocks+cbor-seq' carries a CBOR Sequence of unique unsigned integers identifying the missing block numbers. The Content-Format option MUST be set to this type and the blocks MUST be listed in ascending order without duplicates.
