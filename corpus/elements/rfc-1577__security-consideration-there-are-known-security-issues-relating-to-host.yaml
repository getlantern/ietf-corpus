document: rfc-1577
kind: security-consideration
summary: There are known security issues relating to host impersonation via address resolution protocols used in the Internet. No special security mechanisms have been added to the ATMARP/InATMARP address resolution mechanism defined in this memo. Authenticated call management, end-to-end communications authentication, and data encryption are believed to be needed in globally connected ATM networks but are beyond this memo's scope.
section: "9"
topics:
    - security
    - ip
