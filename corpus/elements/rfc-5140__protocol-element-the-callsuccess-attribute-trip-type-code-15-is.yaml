document: rfc-5140
kind: protocol-element
summary: 'The CallSuccess attribute (TRIP Type Code 15) is two 4-octet unsigned integers: the first is the count of successfully terminated calls, the second is the total attempted calls, both measured over a given time window. It is used ONLY between a gateway and its peer LS and MUST NOT be disseminated.'
section: "4.3"
topics:
