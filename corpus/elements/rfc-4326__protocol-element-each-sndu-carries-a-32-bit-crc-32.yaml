kind: protocol-element
summary: Each SNDU carries a 32-bit CRC-32 trailer using the polynomial 0x104C11DB7 (same as Ethernet and AAL5), initialized to 0xFFFFFFFF and computed over all SNDU header and payload bytes in order of increasing position without bit reversal.
