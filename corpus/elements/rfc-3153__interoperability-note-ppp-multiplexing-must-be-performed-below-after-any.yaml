document: rfc-3153
kind: interoperability-note
summary: PPP multiplexing must be performed below (after) any bundle-level CCP/ECP and above (before) MP and any per-link CCP/ECP. To achieve the transmit path CCP→PPPMux→ECP, bundle-level CCP (0x80FD) and per-link ECP (0x8055) are negotiated alongside PPPMux.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
