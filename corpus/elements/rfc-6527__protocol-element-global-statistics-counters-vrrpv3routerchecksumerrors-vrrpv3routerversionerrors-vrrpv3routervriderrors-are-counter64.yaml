document: rfc-6527
kind: protocol-element
summary: Global statistics counters (vrrpv3RouterChecksumErrors, vrrpv3RouterVersionErrors, vrrpv3RouterVrIdErrors) are Counter64 objects tracking router-wide packet reception errors. Counter discontinuities are tracked via vrrpv3GlobalStatisticsDiscontinuityTime (sysUpTime at last discontinuity).
