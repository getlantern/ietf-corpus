document: rfc-4556
kind: normative-requirement
summary: All PKINIT implementations MUST support aes128-cts-hmac-sha1-96 and aes256-cts-hmac-sha1-96 as AS reply key enctypes, sha-1WithRSAEncryption as the signature algorithm, and the Diffie-Hellman key delivery method. Implementations MUST also process the EKU extension and the id-pkinit-san otherName in X.509 certificates.
section: 3.1.1
rfc2119_level: MUST
topics:
    - crypto
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
