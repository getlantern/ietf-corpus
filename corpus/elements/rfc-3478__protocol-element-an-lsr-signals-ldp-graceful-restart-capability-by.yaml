summary: 'An LSR signals LDP Graceful Restart capability by including the Fault Tolerant (FT) Session TLV as an Optional Parameter in the LDP Initialization message. The TLV carries two key fields: FT Reconnect Timeout and Recovery Time, both in milliseconds.'
