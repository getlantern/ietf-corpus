document: rfc-6262
kind: design-rationale
summary: The media subtype name 'ip-mr_v2.5' was registered to specify an internal codec version; it was later frozen and published as 'IP-MR'. The subtype name is kept for implementation compatibility even though 'IP-MR' and 'IP-MR v2.5' are now synonyms.
