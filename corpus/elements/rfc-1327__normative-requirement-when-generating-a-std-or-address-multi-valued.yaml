document: rfc-1327
kind: normative-requirement
summary: When generating a std-or-address, multi-valued components (Organisational Units, Domain Defined Attributes) shall be in hierarchical order with the most significant component on the RHS; Organisation attributes shall appear to the right of any OU attributes. This ordering shall also be followed when generating msg-id values.
section: 4.3.3
rfc2119_level: MUST
topics:
    - email
