document: rfc-7714
kind: normative-requirement
summary: 'The AEAD authentication tag MUST NOT be truncated; authentication tags MUST be a full 16 octets in length when AES-GCM is used in SRTP/SRTCP. Two configurations are defined: AEAD_AES_128_GCM (AES-128, 16-octet tag) and AEAD_AES_256_GCM (AES-256, 16-octet tag).'
section: "1"
rfc2119_level: MUST NOT
topics:
    - crypto
    - rtp
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
