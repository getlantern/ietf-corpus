document: rfc-3585
kind: protocol-element
summary: 'PeerIDPayloadFilterEntry filters on IKE ID payload values and applies only to IKERule responders: immediately in aggressive mode, delayed in main mode. MatchIdentityValue supports wildcards: ''*@example.com'' for user FQDNs, ''*.example.com'' for host FQDNs, ''cn=*,...'' for DN patterns, CIDR notation (e.g., ''193.190.125.0/24'') and glob patterns for IP addresses.'
section: "5.5"
topics:
    - ipsec
    - security
