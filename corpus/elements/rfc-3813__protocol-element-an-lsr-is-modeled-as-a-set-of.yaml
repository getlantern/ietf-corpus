document: rfc-3813
kind: protocol-element
summary: An LSR is modeled as a set of in-segments, out-segments, and cross-connects. An in-segment corresponds to an incoming MPLS label; an out-segment corresponds to an outgoing label; a cross-connect associates one or more in-segments with one or more out-segments to form an LSP. A cross-connect with no in-segment represents an LSP originating at the LSR.
section: "2"
topics:
