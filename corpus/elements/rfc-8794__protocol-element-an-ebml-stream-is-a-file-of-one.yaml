document: rfc-8794
kind: protocol-element
summary: An EBML Stream is a file of one or more concatenated EBML Documents. Each EBML Document begins with an EBML Header at the Root Level; encountering a new EBML Header signals the start of a new EBML Document and the end of the previous one.
section: "9"
