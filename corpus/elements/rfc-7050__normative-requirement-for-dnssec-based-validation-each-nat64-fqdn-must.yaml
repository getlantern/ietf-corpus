document: rfc-7050
kind: normative-requirement
summary: For DNSSEC-based validation, each NAT64 FQDN MUST have one or more AAAA records containing Pref64::WKA, and each Pref64::WKA MUST have a PTR record pointing back to the NAT64 FQDN. The NAT64 FQDN's records MUST be signed with DNSSEC.
section: 3.1.1
rfc2119_level: MUST
topics:
    - dns
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
