document: rfc-6427
kind: protocol-element
summary: The Link Down Indication (LDI) is communicated by setting the L-Flag to 1 in an AIS message. Receipt of an AIS with L-Flag set MAY be treated as equivalent to Loss of Continuity (LOC) at the client layer; the choice depends on the rate at which Continuity Check is running.
section: 2.1.1
topics:
    - mpls
