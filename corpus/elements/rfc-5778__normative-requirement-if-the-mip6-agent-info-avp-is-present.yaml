document: rfc-5778
kind: normative-requirement
summary: If the MIP6-Agent-Info AVP is present in an answer message and Result-Code is DIAMETER_SUCCESS_RELOCATE_HA, the HA MUST initiate an HA switch procedure towards the MN. For any other result code, the HA SHOULD initiate the switch.
section: "6.6"
rfc2119_level: MUST
topics:
