document: rfc-9635
kind: protocol-element
summary: 'GNAP defines four interaction start modes: redirect (client redirects user to arbitrary URI), app (client launches application URI), user_code (client displays short user code for entry at a known URI), and user_code_uri (client displays short code and URI). Each mode indicates a different capability of the client instance.'
section: 2.5.1
topics:
