document: rfc-9642
kind: protocol-element
summary: 'The ''central-asymmetric-key-certificate-ref-grouping'' provides a two-part reference to a certificate: ''asymmetric-key'' (leafref to the key name) and ''certificate'' (leafref to the certificate name within that key). Each leaf has a ''must'' constraint requiring the other leaf to also be present.'
