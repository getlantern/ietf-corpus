document: rfc-9342
kind: protocol-element
summary: The closed-loop 'network zooming' approach allows an SDN controller or NMS to start with coarse cluster measurements and progressively refine by either (1) changing traffic filters to select more detailed flows or (2) activating new measurement points with more specified clusters, down to per-flow point-to-point analysis when a problem is localized.
section: "10"
