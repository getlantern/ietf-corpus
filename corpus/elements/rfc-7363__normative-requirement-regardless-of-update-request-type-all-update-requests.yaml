document: rfc-7363
kind: normative-requirement
summary: Regardless of Update request type, all Update requests MUST include an 'uptime' field containing the sender's current uptime in seconds. The self-tuning extensions require uptime information on peers in the routing table.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
