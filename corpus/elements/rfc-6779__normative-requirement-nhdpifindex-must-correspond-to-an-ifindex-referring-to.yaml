document: rfc-6779
kind: normative-requirement
summary: nhdpIfIndex MUST correspond to an ifIndex referring to a valid entry in the Interfaces Table (RFC 2863). If the corresponding ifTable entry is deleted, the nhdpInterfaceTable entry is automatically deleted and NHDP is disabled on that interface.
section: "7"
rfc2119_level: MUST
