document: rfc-9277
kind: normative-requirement
summary: CBOR Protocol designers must obtain a CBOR tag for each kind of object stored in files. To be in the 4-byte range with no leading zero bytes, the tag value must be in the range 0x01000000 (16777216) to 0xFFFFFFFF (4294967295) inclusive.
section: "2.1"
rfc2119_level: MUST
topics:
    - cbor
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
