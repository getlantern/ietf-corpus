kind: interoperability-note
summary: 'Dynamic locations assume the same WGS 84 coordinate reference systems constrained by RFC 5491: either the 2D CRS ''urn:ogc:def:crs:EPSG::4326'' (latitude, longitude) or the 3D CRS ''urn:ogc:def:crs:EPSG::4979'' (latitude, longitude, altitude).'
