document: rfc-6923
kind: wire-format
summary: 'The PW Path Identifier (PW_Path_ID) uses the ICC_Operator_ID in place of Global_ID. The AII is composed of ICC_Operator_ID, Node_ID, and AC_ID (per RFC 5003), forming: A1-{ICC_Operator_ID::Node_ID::AC_ID}::Z9-{ICC_Operator_ID::Node_ID::AC_ID}.'
