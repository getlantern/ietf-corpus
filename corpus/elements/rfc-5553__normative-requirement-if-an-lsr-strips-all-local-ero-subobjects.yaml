document: rfc-5553
kind: normative-requirement
summary: If an LSR strips all local ERO subobjects and finds the next subobject is a PKS, it MUST attempt to resolve the PKS to a CPS. Resolution may use PCEP to contact the identified PCE, any PCE acting as proxy, or locally cached CPS information.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
