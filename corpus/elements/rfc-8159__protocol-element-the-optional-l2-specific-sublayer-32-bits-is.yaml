kind: protocol-element
summary: The optional L2-Specific Sublayer (32 bits) is present when VCCV and/or frame sequencing is required. Bit 0 (V-bit) set indicates VCCV messages; bit 1 (S-bit) set indicates a valid frame sequence number in bits 8-31.
