document: rfc-5102
kind: registry
summary: IANA administers the IPFIX Information Elements registry. IANA-assigned IE identifiers are in the range 1–32767; identifier 0 is reserved. Identifiers 1–127 are compatible with NetFlow version 9 field types; 128–32767 are further IPFIX-specific identifiers.
section: "7.1"
