summary: 'Automatic Bandwidth Metric Calculation supports two modes: Simple Mode uses a single Layer 3 link''s Maximum Link Bandwidth; Interface Group Mode aggregates bandwidth of all parallel adjacencies between two nodes and assigns the resulting metric to each parallel link, correcting for traffic attraction on multi-link bundles.'
