document: rfc-3456
kind: design-rationale
summary: 'DHCPv4 was chosen over IKECFG because IKECFG does not meet basic IPsec remote access configuration requirements: it lacks configuration leases, reconfiguration support, address pool management, and integration with existing IP address management facilities. Past experience with PPP IPCP demonstrated that minimal configuration mechanisms inevitably duplicate the functionality of DHCP.'
section: Appendix
topics:
