document: rfc-3193
kind: normative-requirement
summary: The L2TP security protocol MUST provide authentication, integrity and replay protection for control packets. It SHOULD protect confidentiality of control packets. It MUST provide integrity and replay protection of data packets, and MAY protect confidentiality of data packets.
section: "2.1"
rfc2119_level: MUST
topics:
    - vpn
    - ipsec
    - security
