document: rfc-735
kind: interoperability-note
summary: A macro byte can be defined to expand into itself (IAC SB BM DEFINE X <1> X IAC SE) to negate its macro effect. Sending IAC SB BM DEFINE X <0> IAC SE causes X to be silently ignored in the data stream.
section: "2"
