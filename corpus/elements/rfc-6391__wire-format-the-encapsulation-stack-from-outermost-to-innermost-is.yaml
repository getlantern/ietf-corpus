summary: 'The encapsulation stack from outermost to innermost is: MPLS Tunnel LSE(s) (n*4 octets), PW LSE (4 octets), Flow LSE (4 octets), Optional Control Word (4 octets), and Payload (n octets). The flow LSE is a standard MPLS LSE placed directly above the control word or payload.'
