document: rfc-7188
kind: protocol-element
summary: The NBR_ADDR_TYPE TLV value field is a bit field. Bit 7 (0x01) indicates the address is an ORIGINATOR address; bit 6 (0x02) indicates it is a ROUTABLE address reachable via the originating router; bits 0-5 are unassigned.
