document: rfc-7049
kind: protocol-element
summary: 'Strict mode requires a decoder to reject: maps with duplicate keys, tags applied to an incorrect data item type, and data items incorrectly formatted for their type (e.g., invalid UTF-8). On encountering an unknown tag or simple value, a strict decoder may either error or pass the unknown item to the application with an ''unrecognized'' indication.'
section: "3.10"
topics:
    - cbor
    - security
