document: rfc-9904
kind: normative-requirement
summary: Algorithms downgraded to NOT RECOMMENDED or lower SHOULD NOT be used by authoritative nameservers and DNSSEC signers to create new DNSKEYs, since using an unknown DNSKEY algorithm causes a zone to be treated as insecure.
