document: rfc-7361
kind: normative-requirement
summary: The MAC Flush TLV SHOULD be placed after the existing TLVs in the RFC 4762 MAC flush message. MBZ flags (bits 2–7) SHOULD be set to zero on transmission and ignored on reception.
