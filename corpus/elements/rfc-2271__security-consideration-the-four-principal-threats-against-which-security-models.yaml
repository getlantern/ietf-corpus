document: rfc-2271
kind: security-consideration
summary: 'The four principal threats against which Security Models SHOULD provide protection are: modification of information (unauthorized alteration of in-transit messages), masquerade (assuming another principal''s identity to perform unauthorized operations), message stream modification (malicious reordering, delay, or replay beyond normal subnetwork behavior), and disclosure (eavesdropping on exchanges between SNMP engines).'
section: "1.4"
topics:
    - snmp
    - security
