document: rfc-5664
kind: wire-format
summary: pnfs_osd_deviceaddr4 encodes the SCSI target as a discriminated union on pnfs_osd_targetid_type4 (OBJ_TARGET_ANON=void, OBJ_TARGET_SCSI_NAME=variable-length string, OBJ_TARGET_SCSI_DEVICE_ID=variable-length opaque); oda_lun is a fixed 8-byte opaque field; oda_systemid and oda_osdname are variable-length opaque.
section: "4.2"
