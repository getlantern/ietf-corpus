document: rfc-7159
kind: interoperability-note
summary: RFC 7159 expands the definition of a JSON text to allow any JSON value (not just objects or arrays as required by RFC 4627). Implementations generating only objects or arrays will remain interoperable with all conforming implementations.
section: "2"
topics:
    - json
