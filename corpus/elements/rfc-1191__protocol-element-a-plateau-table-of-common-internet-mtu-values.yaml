document: rfc-1191
kind: protocol-element
summary: A plateau table of common Internet MTU values (ranging from 68 to 65535 octets, covering Ethernet at 1500, FDDI at 4352, SLIP at 1006, X.25 at 576, and others) is used to search for an accurate PMTU when old-style Datagram Too Big messages are received; the recommended estimate is the greatest plateau value less than the returned Total Length.
section: "7"
