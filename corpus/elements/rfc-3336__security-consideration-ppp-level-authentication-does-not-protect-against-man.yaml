document: rfc-3336
kind: security-consideration
summary: PPP-level authentication does not protect against man-in-the-middle attacks; applications requiring such protection are encouraged to use authentication headers, encrypted payloads, and/or ATM-layer security services per ATM Forum af-sec-0100.002.
