document: rfc-8881
kind: protocol-element
summary: A lease is a server-defined time interval during which a client is irrevocably granted locks. Locks may be revoked if the lease is not renewed within the interval, and must be revoked if a conflicting lock was granted after the lease expired. A server grants each client a single lease covering all state.
section: "1.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
