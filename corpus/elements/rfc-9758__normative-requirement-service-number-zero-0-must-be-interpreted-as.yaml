document: rfc-9758
kind: normative-requirement
summary: Service Number zero (0) MUST be interpreted as the Administrative Endpoint of the node as defined in RFC 9171 Section 3.2. Non-zero Service Numbers MUST NOT be used to identify the Administrative Endpoint of a bundle node in an ipn EID.
section: "5.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
