document: rfc-5568
kind: normative-requirement
summary: Implementations of this specification MUST NOT send ICMPv6 HI and HAck messages as defined in RFC 5268. They MAY interpret received ICMPv6 HI and HAck messages as defined in RFC 5268.
section: "1"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
    - v6ops
