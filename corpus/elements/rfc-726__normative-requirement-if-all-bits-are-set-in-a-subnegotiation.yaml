document: rfc-726
kind: normative-requirement
summary: If all bits are set in a subnegotiation argument byte such as TC2 or BC2, that byte must be preceded by an IAC flag byte, following the standard Telnet convention of doubling the escape character to use its value as data.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
