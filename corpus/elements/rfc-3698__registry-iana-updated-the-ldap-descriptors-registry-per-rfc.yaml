summary: 'IANA updated the LDAP descriptors registry (per RFC 3383) to add 12 matching rule descriptors: booleanMatch (2.5.13.13), caseExactMatch (2.5.13.5), caseExactOrderingMatch (2.5.13.6), caseExactSubstringsMatch (2.5.13.7), caseIgnoreListSubstringsMatch (2.5.13.12), directoryStringFirstComponentMatch (2.5.13.31), integerOrderingMatch (2.5.13.15), keywordMatch (2.5.13.33), numericStringOrderingMatch (2.5.13.9), octetStringOrderingMatch (2.5.13.18), storedPrefixMatch (2.5.13.41), wordMatch (2.5.13.32). No new OIDs are assigned; only LDAP descriptions are associated with existing X.500 OIDs.'
