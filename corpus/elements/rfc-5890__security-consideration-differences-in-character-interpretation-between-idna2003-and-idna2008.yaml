document: rfc-5890
kind: security-consideration
summary: Differences in character interpretation between IDNA2003 and IDNA2008—particularly for characters such as ZWJ and ZWNJ that were mapped to nothing in IDNA2003 but permitted in some IDNA2008 contexts—can be exploited for name-matching or name-confusion attacks if registries do not take care to manage strings with dual interpretations.
section: "4.6"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
