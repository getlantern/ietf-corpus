document: rfc-4749
kind: normative-requirement
summary: 'In offer-answer, the maxbitrate parameter is bidirectional: if the offerer sets a value, the answerer MUST reply with a smaller or equal value, and the session maximum is the minimum of the two. If a received value is outside 8000–32000, the session MUST be rejected.'
section: 6.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
