document: rfc-6363
kind: security-consideration
summary: 'Applying FEC protection does not provide any security. The FEC Framework can itself be subject to attacks: forged or replayed FEC source/repair packets can corrupt decoding or cause DoS; tampered FEC Framework Configuration Information (sent out-of-band) can prevent decoding; and modified Repair FEC Payload IDs can assign packets to wrong source blocks.'
section: "9.1"
topics:
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
