document: rfc-6350
kind: interoperability-note
summary: Property and parameter names are case-insensitive. Based on experience with vCard 3 interoperability, it is RECOMMENDED that property and parameter names be upper-case on output to maximize compatibility with existing implementations.
section: "3.3"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
