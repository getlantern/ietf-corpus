document: rfc-9009
kind: normative-requirement
summary: The D flag MUST be set when a local RPLInstanceID is used, and the DODAGID field MUST be present when the D flag is set and MUST NOT be present when the D flag is not set. This applies to both the DCO and DCO-ACK messages.
section: "4.3"
rfc2119_level: MUST
topics:
    - routing
