kind: wire-format
summary: The IPv6 link-local address for a Frame Relay interface is formed by appending the 64-bit Frame Relay interface identifier to the prefix FE80::/64, yielding a 128-bit address with the standard 10-bit link-local prefix followed by 54 zero bits and the interface identifier.
