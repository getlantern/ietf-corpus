document: rfc-8919
kind: wire-format
summary: 'The Application Identifier Bit Mask header consists of two octets: SABM Length+Flag (bit 7 is the L-flag/Legacy Flag, bits 0-6 encode SABM length in octets 0-8) and UDABM Length+Flag (bit 7 is reserved, bits 0-6 encode UDABM length in octets 0-8), followed by variable-length SABM and UDABM fields.'
section: "4.1"
