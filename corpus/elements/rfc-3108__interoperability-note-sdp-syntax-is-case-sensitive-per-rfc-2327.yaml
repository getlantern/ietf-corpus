document: rfc-3108
kind: interoperability-note
summary: SDP syntax is case-sensitive per RFC 2327, and these ATM conventions strictly conform to that rule. However, it is suggested (but not required) that SDP parsers for ATM applications be case-tolerant where ignoring case does not introduce ambiguity. Encoding names defined outside the SDP protocol are case-insensitive.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
