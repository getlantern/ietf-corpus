document: rfc-4849
kind: normative-requirement
summary: NAS-Filter-Rule and NAS-Traffic-Rule attributes MUST NOT appear in the same RADIUS packet. If a NAS-Traffic-Rule attribute is present, a NAS implementing this specification MUST silently discard any NAS-Filter-Rule attributes that are present.
section: "2"
rfc2119_level: MUST NOT
topics:
    - radius
