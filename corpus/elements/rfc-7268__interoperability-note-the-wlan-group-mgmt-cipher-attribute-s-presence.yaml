document: rfc-7268
kind: interoperability-note
summary: The WLAN-Group-Mgmt-Cipher Attribute's presence in an Access-Request or Accounting-Request indicates that the Station negotiated management frame protection during association; its absence signifies no such negotiation took place. This implicit signaling means implementations must treat absence and presence as semantically distinct.
section: "2.17"
topics:
    - radius
    - security
