document: rfc-6909
kind: interoperability-note
summary: When the mobile node performs an inter-MAG handover, the new MAG may not support IPv4 traffic offload, so the offload policy may change at handover boundaries even though the LMA cannot change policy mid-session for the same MAG.
section: "3.3"
