document: rfc-6422
kind: design-rationale
summary: DHCPv6 clients cannot receive options directly from relay agents because relay agents are required to deliver the server's payload unmodified. The RSOO indirection mechanism — relay sends options to the server, server forwards them to client — was chosen to work within this constraint while enabling relay-agent-specific information delivery.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
