document: rfc-1473
kind: security-consideration
summary: The PPP MIB allows operators to configure and control PPP links including authentication protocols, representing a security risk. To mitigate this, security-sensitive variables are placed in separate optional MIB Groups so implementors may elect not to implement them.
section: "6"
topics:
