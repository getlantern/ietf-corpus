document: rfc-2320
kind: interoperability-note
summary: An ipAddrEntry's ipAdEntAddr ANDed with its ipAdEntNetMask SHOULD equal the corresponding ipoaLisEntry's ipoaLisSubnetAddr, establishing the linkage between the standard IP address table and the IPOA LIS table.
section: 3.1.1
