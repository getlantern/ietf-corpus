document: rfc-8964
kind: normative-requirement
summary: DetNet network nodes MUST defend DetNet QoS by discarding or remarking packets not associated with a completed resource allocation, MUST NOT use a DetNet-allocated resource for non-matching packets, MUST ensure a QoS flow does not exceed its allocated resources, and MUST ensure a CoS flow does not impact other flows.
section: 4.2.3.2
rfc2119_level: MUST
topics:
    - mpls
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
