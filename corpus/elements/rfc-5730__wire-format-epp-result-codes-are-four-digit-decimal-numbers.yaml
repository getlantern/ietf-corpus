document: rfc-5730
kind: wire-format
summary: 'EPP result codes are four-digit decimal numbers. The first digit indicates success (1) or failure (2). The second digit categorizes: 0=Protocol Syntax, 1=Implementation Rules, 2=Security, 3=Data Management, 4=Server System, 5=Connection Management. The third and fourth digits provide detail within the category.'
