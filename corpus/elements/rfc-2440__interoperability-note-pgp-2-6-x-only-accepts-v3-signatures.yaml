document: rfc-2440
kind: interoperability-note
summary: PGP 2.6.x only accepts V3 signatures and old-format packet headers, and will not accept key-material packets with version numbers greater than 3. One-Pass Signature packets (Tag 4) do not interoperate with PGP 2.6.x or earlier; software targeting that version must avoid them.
section: "5.4"
topics:
    - security
    - crypto
