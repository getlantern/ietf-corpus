document: rfc-5268
kind: interoperability-note
summary: This document obsoletes RFC 4068. The FNA message defined in RFC 4068 is deprecated; implementations MUST use UNA instead. Section 8 details behavioral changes including BADF replacing the prior security mechanism and revised retransmission rules.
