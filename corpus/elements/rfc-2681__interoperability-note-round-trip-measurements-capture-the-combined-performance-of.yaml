document: rfc-2681
kind: interoperability-note
summary: Round-trip measurements capture the combined performance of two distinct paths (forward and reverse), which may traverse different routers due to asymmetric routing or have radically different performance characteristics due to asymmetric queueing, making direct comparison with one-way metrics non-trivial.
