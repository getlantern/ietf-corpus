document: rfc-3588
kind: normative-requirement
summary: Each Diameter application MUST have an IANA-assigned Application Identifier. Relay and redirect agents MUST advertise the Relay Application Identifier (0xffffffff). All other nodes MUST advertise only locally supported applications. The Application-ID in the header MUST match that in relevant AVPs.
section: "2.4"
rfc2119_level: MUST
topics:
    - registry
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
