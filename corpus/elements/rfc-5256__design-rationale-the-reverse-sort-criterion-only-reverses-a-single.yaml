document: rfc-5256
kind: design-rationale
summary: The REVERSE sort criterion only reverses a single criterion and does not affect the implicit sequence-number tie-breaker. Consequently, reversing a multi-criterion sort requires placing REVERSE before each criterion individually. In general, it is faster and simpler for the client to reverse the final result list rather than issuing a new SORT command.
