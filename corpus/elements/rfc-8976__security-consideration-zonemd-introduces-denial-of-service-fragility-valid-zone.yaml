document: rfc-8976
kind: security-consideration
summary: 'ZONEMD introduces denial-of-service fragility: valid zone data becomes unavailable if any portion is missing or corrupt and verification is enforced. Misconfigurations and implementation bugs are indistinguishable from tampering. Operators are advised to deploy verification gradually, initially treating failures as warnings.'
section: "6.6"
topics:
    - dns
    - security
