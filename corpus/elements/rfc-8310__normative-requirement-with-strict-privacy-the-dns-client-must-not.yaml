document: rfc-8310
kind: normative-requirement
summary: With Strict Privacy, the DNS client MUST NOT commence sending DNS queries until at least one privacy-enabling DNS server becomes available. During captive-portal bootstrap the system MUST alert that DNS is not private.
section: "6.6"
rfc2119_level: MUST NOT
