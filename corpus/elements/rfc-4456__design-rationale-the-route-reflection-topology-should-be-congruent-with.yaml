document: rfc-4456
kind: design-rationale
summary: The route reflection topology should be congruent with the network topology when multiple paths exist for a prefix, to prevent routing loops and maintain a consistent routing view. The POP-based reflection model (each POP has its own RRs, all RRs fully meshed) is one commonly used approach.
section: "11"
topics:
