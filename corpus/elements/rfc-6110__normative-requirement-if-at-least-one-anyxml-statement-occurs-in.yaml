document: rfc-6110
kind: normative-requirement
summary: If at least one 'anyxml' statement occurs in any input YANG module, a single global RELAX NG named pattern '__anyxml__' MUST be added exactly once as a child of the root <rng:grammar> element; it accepts any combination of attributes, child elements (recursively), and text.
section: "10.1"
rfc2119_level: MUST
topics:
    - yang
    - netconf
