document: rfc-4668
kind: interoperability-note
summary: 'The deprecated radiusAuthServerTable MAY continue to be supported under two conditions: (1) the managed entity only supports IPv4, or (2) the entity supports both IPv4 and IPv6 and the deprecated table is maintained for backwards compatibility with older management stations, but only when the IP addresses in the new table are in IPv4 format representable in both tables.'
section: "6"
topics:
