document: rfc-9164
kind: wire-format
summary: 'An IPv4 prefix is encoded as tag 52 wrapping a two-element array with the prefix length (unsigned integer) first, followed by the minimal-length prefix byte string with trailing zero bytes omitted. Example: 52([24, h''c00002'']) for 192.0.2.0/24.'
