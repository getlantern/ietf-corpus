document: rfc-8141
kind: design-rationale
summary: The URN syntax deliberately restricts all characters to ASCII (requiring percent-encoding for others) to maintain stability and persistence as protocols evolve. The character set and encoding issues are acknowledged as involving fundamental unresolved trade-offs in the information sciences community, so the specification imposes restrictions rather than comprehensive rules.
section: 1.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
