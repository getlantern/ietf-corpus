document: rfc-9793
kind: design-rationale
summary: BIFT-id ranges may overlap across different encapsulation types (MPLS vs. non-MPLS) because the forwarding context distinguishes them; only overlaps within the same encapsulation type on the same BFR are prohibited as they would cause ambiguity.
