document: rfc-1582
kind: normative-requirement
summary: After 10 unacknowledged retransmissions, routes via the next hop MUST be marked unreachable and the hold-down timer started. The peer is then polled at 60-second intervals with triggered requests; after an administrator-configurable minimum of 5 failed polls the destination MAY be marked as not supporting the mechanism.
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
