document: rfc-9786
kind: normative-requirement
summary: Non-DF routers SHOULD implement a bidirectional blocking scheme for all traffic comparable to Single-Active redundancy mode, albeit across all VLANs. Non-DF routers MAY bring and keep the peering access interface in an operational down state, or MAY set the LACP state to Out of Sync (OOS) instead for better convergence.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
