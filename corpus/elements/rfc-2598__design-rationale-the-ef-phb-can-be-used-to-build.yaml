document: rfc-2598
kind: design-rationale
summary: The EF PHB can be used to build a Virtual Leased Line (VLL) service, also known as Premium service, which appears to endpoints like a point-to-point connection with quantified peak bandwidth. Simulation results confirm FTP flows over VLL achieve rates nearly identical to a dedicated link at the subscribed rate.
