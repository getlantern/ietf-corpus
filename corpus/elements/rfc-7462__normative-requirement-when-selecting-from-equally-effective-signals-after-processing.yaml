document: rfc-7462
kind: normative-requirement
summary: 'When selecting from equally effective signals after processing all received URNs, the least-specific signal SHOULD be chosen; a more-specific signal may be chosen only if the choice is based on information derived from the containing SIP message (e.g., a ''Priority: urgent'' header field).'
section: "11.1"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
