document: rfc-4382
kind: security-consideration
summary: Unauthorized write access to mplsL3VpnVrfTable, mplsL3VpnIfConfTable, and mplsL3VpnVrfRouteTable could disrupt traffic on provisioned VPNs. SNMPv3 with VACM and USM MUST be used; SET operations in non-secure environments without protection can have disastrous network effects.
section: "8"
topics:
