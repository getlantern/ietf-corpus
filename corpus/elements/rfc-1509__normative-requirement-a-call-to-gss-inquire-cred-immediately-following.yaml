document: rfc-1509
kind: normative-requirement
summary: A call to gss_inquire_cred immediately following gss_acquire_cred must return valid credential data, even if the implementation defers actual credential acquisition until context establishment time. The deferred-acquisition optimization must be invisible to the calling application.
section: "3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
