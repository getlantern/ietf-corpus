document: rfc-3219
kind: design-rationale
summary: TRIP uses a link-state flooding mechanism for intra-domain synchronization (similar to OSPF/IS-IS/SCSP) rather than BGP's iBGP full-mesh requirement. This permits arbitrary intra-domain LS topologies, simplifying configuration and improving scalability within large telephony domains.
section: "2"
topics:
