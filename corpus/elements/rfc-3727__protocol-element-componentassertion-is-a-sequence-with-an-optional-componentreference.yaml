document: rfc-3727
kind: protocol-element
summary: ComponentAssertion is a SEQUENCE with an optional ComponentReference field (SIZE 1..MAX), a useDefaultValues BOOLEAN defaulting to TRUE, a rule field of type MATCHING-RULE.&id, and a value field of type MATCHING-RULE.&AssertionType. It represents a single component-level assertion against a directory attribute value.
