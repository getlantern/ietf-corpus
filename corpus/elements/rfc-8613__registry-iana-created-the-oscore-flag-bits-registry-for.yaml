document: rfc-8613
kind: registry
summary: IANA created the 'OSCORE Flag Bits' registry for the flag bits in the first byte of the OSCORE option value. Bits 0–4 are assigned (n bits 0–2 for Partial IV length, k for kid, h for kid context); bits 5–7 are reserved. New entries require Expert Review.
