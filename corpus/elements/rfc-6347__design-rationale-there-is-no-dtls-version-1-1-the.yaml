document: rfc-6347
kind: design-rationale
summary: There is no DTLS version 1.1; the version number was skipped to harmonize DTLS version numbers with TLS, so that DTLS 1.2 aligns with TLS 1.2. DTLS 1.0 was originally defined as a delta from TLS 1.1.
