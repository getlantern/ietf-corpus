document: rfc-3575
kind: registry
summary: 'Attribute Values for certain RADIUS attributes (e.g., NAS-Port-Type) are registered via Designated Expert review. Up to 2^32 values per attribute are possible. The Service-Type attribute (6) is an exception: its values require IETF Consensus because they define new modes of RADIUS operation.'
