document: rfc-8444
kind: design-rationale
summary: The flooding scope is limited to area-local for the BIER Sub-TLV LSA; inter-area propagation is handled explicitly by ABRs copying the Sub-TLV, rather than using a domain-wide flooding scope. This follows OSPF's hierarchical area model.
section: "2.3"
topics:
