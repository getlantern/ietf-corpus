document: rfc-5788
kind: protocol-element
summary: The $MDNSent keyword (SHARED, COMMON use) specifies that a Message Disposition Notification must not be sent for the annotated message. It is set when a client acts on an MDN request or uploads a sent/draft message, and can also be set by a delivery agent.
section: 3.4.1
topics:
