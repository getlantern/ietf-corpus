document: rfc-3984
kind: wire-format
summary: 'FU-A structure: 1-byte FU indicator (F|NRI|Type=28), 1-byte FU header (S|E|R|Type), and variable-length FU payload. FU-B is identical but inserts a 16-bit DON field between the FU header and payload. S=1 marks the first fragment; E=1 marks the last; both MUST NOT be set simultaneously in one FU.'
section: "5.8"
topics:
