document: rfc-9149
kind: security-consideration
summary: Ticket reuse is a security and privacy concern. Clients must take care when pooling tickets; if servers do not rotate session ticket encryption keys frequently, clients may be encouraged to use tickets beyond reasonable lifetime windows such as 24 hours.
section: "6"
topics:
    - tls
    - security
    - privacy
