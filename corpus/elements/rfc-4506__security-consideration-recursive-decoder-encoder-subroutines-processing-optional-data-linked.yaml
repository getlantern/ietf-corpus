document: rfc-4506
kind: security-consideration
summary: Recursive decoder/encoder subroutines processing optional-data linked structures (e.g., struct m { int x; struct m *next; }) can be exploited via long lists to cause stack overflow. Implementations should use non-recursive algorithms or enforce a list-length limit.
section: "8"
topics:
    - security
