document: rfc-9008
kind: normative-requirement
summary: A node decompressing the RPI-6LoRH compressed header (RFC 8138) MUST decompress using the RPI Option Type that is currently active — either 0x23 (new) or 0x63 (old) — as indicated by the DODAG Configuration option flag.
section: "4.3"
rfc2119_level: MUST
