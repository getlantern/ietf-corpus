document: rfc-9328
kind: normative-requirement
summary: When sprop-max-don-diff = 0, the transmission order of NAL units in the RTP stream MUST be the same as the NAL unit decoding order. When sprop-max-don-diff > 0, transmission order MAY differ from decoding order, and the DON mechanism is used to reconstruct decoding order at the receiver.
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
