document: rfc-8037
kind: protocol-element
summary: 'The algorithm "EdDSA" is defined for use as the value of the "alg" parameter in JSON Web Signature (JWS). It supports two key subtypes: "Ed25519" (using Ed25519 variant) and "Ed448" (using Ed448 variant), both with key type "OKP".'
