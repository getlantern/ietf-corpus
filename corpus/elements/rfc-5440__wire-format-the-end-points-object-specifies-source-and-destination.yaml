document: rfc-5440
kind: wire-format
summary: The END-POINTS object specifies source and destination IP addresses. IPv4 (Object-Type=1) body is 8 bytes (two 32-bit addresses); IPv6 (Object-Type=2) body is 32 bytes (two 128-bit addresses). The P flag MUST be set; if received cleared, a PCErr with Error-Type=10 Error-value=1 MUST be sent.
section: "7.6"
topics:
    - routing
    - mpls
    - ip
