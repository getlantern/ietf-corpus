document: rfc-7563
kind: design-rationale
summary: The MAG-Group-Identifier is introduced to allow operators to express AP group affiliation (e.g., floor or small building), which serves as a proxy for coarse location and enables group-level policy (QoS, charging, DPI) to be applied by the LMA for all APs in the group.
