document: rfc-2065
kind: design-rationale
summary: 'The NXT name space is treated as circular: the last NXT in a zone has its RDATA set to the zone name itself, handling the problem of indicating the entire remainder of the name space beyond the last existing name without needing a special sentinel value.'
