document: rfc-8985
kind: design-rationale
summary: The RACK reordering window persists for up to 16 loss recoveries before resetting to min_RTT/4. This bounds spurious fast recovery episodes caused by a temporarily inflated window to approximately once every 16 recoveries (less than 7%), balancing adaptation to sustained reordering against unnecessary sensitivity.
section: "6.2"
