document: rfc-9729
kind: wire-format
summary: 'The TLS key exporter context encodes: Signature Algorithm (16-bit), Key ID (variable-length integer prefixed), Public Key (variable-length integer prefixed), Scheme (variable-length integer prefixed), Host (variable-length integer prefixed), Port (16-bit network byte order), and Realm (variable-length integer prefixed). Length fields use QUIC variable-length integer encoding and MUST be encoded in the minimum number of bytes.'
