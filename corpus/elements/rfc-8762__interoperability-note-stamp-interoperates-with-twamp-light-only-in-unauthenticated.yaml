document: rfc-8762
kind: interoperability-note
summary: 'STAMP interoperates with TWAMP Light only in unauthenticated mode because STAMP uses HMAC-SHA-256 while TWAMP uses HMAC-SHA-1. Two use cases are supported: STAMP Session-Sender with TWAMP Light Session-Reflector, and TWAMP Light Session-Sender with STAMP Session-Reflector.'
section: "4.6"
topics:
