document: rfc-8579
kind: security-consideration
summary: Restricting special-use mailbox lookup to the user's personal namespace prevents malicious or accidental filing of messages into shared mailboxes that have special-use attributes assigned. This restriction may be lifted for future special-use attributes only after careful security review.
section: "7"
topics:
