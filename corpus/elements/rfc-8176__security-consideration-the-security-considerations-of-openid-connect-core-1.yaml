document: rfc-8176
kind: security-consideration
summary: The security considerations of OpenID Connect Core 1.0, OAuth 2.0 (RFC 6749), and the OAuth 2.0 Threat Model (RFC 6819) all apply. Additionally, taking a hard dependency on specific authentication methods creates brittle systems because appropriate methods vary over time as attacks evolve and new methods are deployed.
section: "5"
topics:
