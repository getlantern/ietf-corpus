document: rfc-7407
kind: protocol-element
summary: 'The ietf-snmp-engine submodule defines /snmp/engine with leaves: enabled (boolean), listen list (name, transport choice defaulting to UDP with ip and port), version container (v1/v2c/v3 as empty leaves), engine-id, and enable-authen-traps. The transport choice is extensible via augmentation for SSH, TLS, and DTLS.'
section: "2.4"
