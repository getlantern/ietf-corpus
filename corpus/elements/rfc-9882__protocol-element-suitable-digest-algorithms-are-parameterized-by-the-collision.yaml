summary: 'Suitable digest algorithms are parameterized by the collision strength λ of each ML-DSA variant: ML-DSA-44 supports SHA-256/384/512, SHA3-256/384/512, SHAKE128/256; ML-DSA-65 supports SHA-384/512, SHA3-384/512, SHAKE256; ML-DSA-87 supports SHA-512, SHA3-512, SHAKE256.'
