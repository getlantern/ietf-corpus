document: rfc-3367
kind: interoperability-note
summary: The special wildcard value '*' in a property means all admissible values for that typed property, enabling ordered preference lists (e.g., de-DE, then fr-FR, then any language). This value is only applicable to properties, not to the CommonName element itself.
section: 4.2.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
