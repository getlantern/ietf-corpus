document: rfc-8187
kind: security-consideration
summary: 'Known attack scenarios exist related to decoding UTF-8, including malformed sequences. The specification does not mandate specific error-handling behavior but lists acceptable strategies: ignoring the parameter, stripping non-decodable octets, or substituting U+FFFD.'
