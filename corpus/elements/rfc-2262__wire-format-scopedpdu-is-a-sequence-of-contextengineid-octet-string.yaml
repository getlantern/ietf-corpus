kind: wire-format
summary: ScopedPDU is a SEQUENCE of contextEngineID (OCTET STRING), contextName (OCTET STRING), and data (ANY, e.g., PDUs per RFC 1905). It is either carried as plaintext in scopedPduData or as an encryptedPDU OCTET STRING when privacy is applied.
