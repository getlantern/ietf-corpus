document: rfc-6651
kind: normative-requirement
summary: A report generator SHOULD NOT issue more than one report to any given domain as a result of a single message, and SHOULD establish an upper bound on total reports per message, to prevent conversion into a DoS amplifier.
section: "3.3"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
