document: rfc-3019
kind: protocol-element
summary: mldInterfaceRobustness (Unsigned32, default 2) is the MLD Robustness Variable, which tunes packet-loss tolerance. MLD is robust to (Robustness Variable - 1) packet losses; increasing the value on lossy subnets is recommended per RFC 2710 Section 7.1.
