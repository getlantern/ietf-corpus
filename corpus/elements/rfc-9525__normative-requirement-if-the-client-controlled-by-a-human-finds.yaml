document: rfc-9525
kind: normative-requirement
summary: If the client controlled by a human finds no matching presented identifier, it SHOULD inform the user of the identity mismatch and automatically terminate the communication attempt. Such clients MAY give advanced users the option of proceeding despite the mismatch, but only with extreme caution.
section: "6.6"
rfc2119_level: SHOULD
topics:
    - tls
    - pkix
    - security
