document: rfc-4648
kind: protocol-element
summary: Base 32 encoding ('base32') uses a 33-character US-ASCII subset of uppercase letters A–Z and digits 2–7 plus pad '='. It represents 40-bit input groups as 8 encoded output characters, encoding 5 bits per character, and is case insensitive.
