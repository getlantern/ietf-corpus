document: rfc-8227
kind: wire-format
summary: 'The RPS PDU is a 64-bit G-ACh packet. Bits 0–3 are 0001 (G-ACh indicator); bits 4–7 are Version; bits 8–15 are Reserved; bits 16–31 carry the RPS Channel Type (0x002A). The second word contains: Destination Node ID (bits 0–6, 7-bit field), Source Node ID (bits 8–14, 7-bit field), Request code (bits 16–23, 8-bit field), and Protection-Switching Mode M (bits 24–25, 2-bit field).'
section: 5.2.2
topics:
    - mpls
    - routing
