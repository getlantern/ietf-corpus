document: rfc-6008
kind: interoperability-note
summary: Multiple DKIM signatures on a single message may share the same 'header.d' or 'header.i' values, making those properties insufficient for disambiguation in Authentication-Results. The 'header.b' property defined here is designed to be the uniqueness backstop when all other properties collide.
