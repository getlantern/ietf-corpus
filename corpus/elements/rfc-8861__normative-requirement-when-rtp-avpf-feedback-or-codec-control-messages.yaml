document: rfc-8861
kind: normative-requirement
summary: When RTP/AVPF feedback or codec control messages are sent as compound RTCP packets by Reporting Group members, those compound packets MUST include either an RTCP RGRS packet (for non-reporting sources) or an RTCP RGRP SDES item (for reporting sources).
section: "3.3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
