document: rfc-7947
kind: normative-requirement
summary: A route server MUST accept all UPDATE messages received from each of its clients for inclusion in its Adj-RIB-In. These UPDATE messages MAY be omitted from the route server's Loc-RIB or Loc-RIBs due to policy filters.
section: "2.1"
rfc2119_level: MUST
topics:
