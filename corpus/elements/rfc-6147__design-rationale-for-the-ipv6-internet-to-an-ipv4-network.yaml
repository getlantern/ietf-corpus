document: rfc-6147
kind: design-rationale
summary: For the 'IPv6 Internet to an IPv4 network' scenario, publishing real AAAA RRs (pre-computed using RFC 6052 algorithm) is recommended over on-the-fly AAAA synthesis, because static DNS records are easier to debug than dynamically synthesized responses.
