document: rfc-2476
kind: protocol-element
summary: Port 587 is reserved for email message submission. Messages received on this port are defined to be submissions, using the ESMTP protocol with additional restrictions. Sites MAY also use port 25 for submission by designating some hosts as MSAs.
section: "3.1"
topics:
    - email
