document: rfc-3209
kind: interoperability-note
summary: The ERO and RRO are assigned class values of the form 0bbbbbbb, so RSVP nodes that do not recognize them respond with 'Unknown Object Class' errors, causing path setup to fail. Both objects MUST only be used when all routers along the path are RSVP-capable and support the respective object.
section: 4.3.1
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
