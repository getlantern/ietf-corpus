document: rfc-8519
kind: design-rationale
summary: To apply an ACL to any attachment point other than an interface (e.g., VRF, vty/tty, QoS policy, routing protocol), vendors MUST augment the ACL YANG model. The base model only provides interface attachment natively, intentionally keeping the core simple.
section: "1"
topics:
    - yang
    - netconf
    - routing
