summary: 'This document registers three media types: ''audio/rtp-midi'' for native RTP MIDI streams, mode ''rtp-midi'' for the ''audio/mpeg4-generic'' media type to support MPEG 4 Audio Object Types (General MIDI, DLS 2, Structured Audio), and ''audio/asc'' for AudioSpecificConfig data.'
