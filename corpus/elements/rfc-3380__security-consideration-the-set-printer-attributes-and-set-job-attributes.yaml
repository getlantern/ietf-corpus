document: rfc-3380
kind: security-consideration
summary: The Set-Printer-Attributes and Set-Job-Attributes operations modify printer and job configuration and therefore require authenticated operator or administrator access rights. The security considerations are the same as those defined in IPP/1.1 [RFC2911], and all authentication and authorization mechanisms defined there apply equally to these new operations.
section: "13"
topics:
    - security
