document: rfc-8006
kind: interoperability-note
summary: When DNS-based redirection is employed, a dCDN cannot evaluate PathMetadata-level constraints at request-routing time because only the hostname is available. dCDNs SHOULD still process all PathMetadata before accepting a redirection request to detect unsupported mandatory-to-enforce metadata.
section: 4.1.6
topics:
    - dns
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
