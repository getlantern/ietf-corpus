document: rfc-3931
kind: normative-requirement
summary: If the L2TP data channel operates over a public or untrusted network where privacy or sophisticated attacks are expected, IPsec MUST be made available to secure L2TP traffic. L2TPv3 over UDP MUST follow the recommendations in RFC 3193.
section: 4.1.3
rfc2119_level: MUST
topics:
    - vpn
    - ipsec
    - security
