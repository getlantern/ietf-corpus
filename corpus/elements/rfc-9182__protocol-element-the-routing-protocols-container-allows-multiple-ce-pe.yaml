document: rfc-9182
kind: protocol-element
summary: The 'routing-protocols' container allows multiple CE-PE routing instances (each with a unique 'id' and 'type'), supporting static, BGP, OSPF, IS-IS, RIP, and VRRP. Each instance can reference provider 'routing-profiles'; low-level policies are deferred to device configuration outside the L3NM scope.
section: 7.6.3
topics:
