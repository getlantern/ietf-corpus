document: rfc-9574
kind: normative-requirement
summary: When an AR-REPLICATOR is selected for a given flow or BD, the AR-LEAF MUST send all BM packets to that AR-REPLICATOR using the forwarding information in the Replicator-AR route with Tunnel Type 0x0A; the underlay destination IP address MUST be the AR-IP advertised by the chosen AR-REPLICATOR.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
