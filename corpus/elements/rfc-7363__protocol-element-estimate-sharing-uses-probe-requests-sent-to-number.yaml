document: rfc-7363
kind: protocol-element
summary: Estimate sharing uses Probe requests sent to number-of-peers-to-probe (default 4) random peers from the finger table each stabilization interval. At the end of each interval, the 75th percentile of all collected estimates (own plus received) is used for the next interval.
section: "6.5"
topics:
