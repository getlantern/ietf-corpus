document: rfc-9011
kind: normative-requirement
summary: The RuleID MUST be 8 bits and encoded in the LoRaWAN FPort field. The uplink and downlink fragmentation FPorts MUST be different to distinguish fragmented datagram directions.
section: "5.2"
rfc2119_level: MUST
