summary: 'Optional reputon fields include: "confidence" (0.0–1.0 certainty of the rating), "normal-rating" (expected baseline rating), "sample-size" (unsigned 64-bit integer count of data points), "generated" (Unix timestamp of generation), and "expires" (Unix timestamp after which the score is likely invalid). Applications registered with IANA may define additional extension fields.'
