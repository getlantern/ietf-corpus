document: rfc-7064
kind: protocol-element
summary: The 'stun' and 'stuns' URI schemes designate a stand-alone STUN server or any Internet host performing STUN server operations in the context of STUN usages (RFC 5389 Section 14). The STUN protocol supports UDP, TCP, or TLS-over-TCP.
