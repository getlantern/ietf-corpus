document: rfc-2646
kind: normative-requirement
summary: 'If a change in quoting depth occurs on a flowed line, this is an improperly formatted message. The receiver SHOULD handle this using the ''quote-depth-wins'' rule: ignore the flowed indicator and treat the line as fixed, ending the paragraph.'
section: "4.5"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
