document: rfc-4904
kind: normative-requirement
summary: The originating (ingress) trunk group MUST appear in the Contact header of a SIP request. Trunk group parameters in the Contact header URI signify the trunk group over which the call arrived.
section: "6"
rfc2119_level: MUST
