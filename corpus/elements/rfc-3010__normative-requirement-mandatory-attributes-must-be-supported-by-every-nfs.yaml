document: rfc-3010
kind: normative-requirement
summary: Mandatory attributes MUST be supported by every NFS version 4 client and server to ensure a minimum level of interoperability; the server must store and return them and the client must be able to function with only these attributes.
section: "5.1"
rfc2119_level: MUST
