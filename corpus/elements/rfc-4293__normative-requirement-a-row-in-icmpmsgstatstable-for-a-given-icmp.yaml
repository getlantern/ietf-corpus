document: rfc-4293
kind: normative-requirement
summary: A row in icmpMsgStatsTable for a given ICMP type X MAY be instantiated before the first message of that type, but MUST be instantiated after it is received or transmitted. Subsequent messages of the same type must increment the relevant counter.
section: 3.2.10
rfc2119_level: MUST
topics:
    - snmp
    - ip
