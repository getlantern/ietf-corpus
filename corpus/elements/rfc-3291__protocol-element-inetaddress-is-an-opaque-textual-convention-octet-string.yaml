document: rfc-3291
kind: protocol-element
summary: InetAddress is an opaque textual convention (OCTET STRING, SIZE 0..255) representing a generic Internet address whose interpretation is always determined by an associated InetAddressType object. Every usage must specify which InetAddressType object provides the context.
