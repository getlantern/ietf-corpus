document: rfc-6420
kind: design-rationale
summary: PIM MT-ID extends PIM signaling to identify the topology used for RPF when constructing multicast distribution trees, enabling disjoint multicast paths for resilience. For example, two source trees (S1,G1) and (S1,G2) can be built using separate network segments so a single failure does not interrupt the stream.
section: "1"
topics:
