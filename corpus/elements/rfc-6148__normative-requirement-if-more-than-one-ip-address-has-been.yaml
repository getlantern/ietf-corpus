document: rfc-6148
kind: normative-requirement
summary: If more than one IP address has been involved in DHCP exchanges with the client identified by the Remote ID, the list of all those IP addresses MUST be returned in the Associated-IP option of the DHCPLEASEACTIVE response, regardless of whether it was in the Parameter Request List.
section: "4.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
