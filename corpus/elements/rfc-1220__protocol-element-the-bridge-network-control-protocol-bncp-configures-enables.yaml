document: rfc-1220
kind: protocol-element
summary: 'The Bridge Network Control Protocol (BNCP) configures, enables, and disables bridge operation on both ends of the PPP link. It is structurally identical to LCP except it uses Protocol field 0x8031 and supports only Codes 1–7 with a separate set of Configuration Options: MAC Types supported, Tinygram Compression, LAN Identification, and Ring/Bridge Identification.'
section: "6.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
