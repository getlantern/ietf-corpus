document: rfc-7261
kind: normative-requirement
summary: When the offer or answer has G729 (including G729D or G729E) and the annexb parameter is absent, this MUST be treated as if annexb=yes, because all G729 implementations understand the annexb attribute and 'yes' is the implied default per RFC 4856.
section: "3.3"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
