document: rfc-7464
kind: protocol-element
summary: 'A JSON text sequence consists of any number of JSON texts, each encoded in UTF-8, each prefixed by an ASCII Record Separator (RS, 0x1E), and each followed by a Line Feed (LF, 0x0A). The format uses two distinct ABNF grammars: one for parsers (tolerating truncation) and one for encoders (assuming complete elements).'
section: "2"
