document: rfc-5440
kind: state-machine
summary: 'The PCEP FSM (Appendix A) defines states: Idle, TCPPending, OpenWait (awaiting Open after TCP established), KeepWait (awaiting Keepalive after Open sent), and SessionUp. Transitions are triggered by TCP connection events, reception/validity of Open and Keepalive messages, PCErr, timer expiry (OpenWait or KeepWait, both 1 minute), and Close reception.'
section: A
topics:
