document: rfc-5658
kind: normative-requirement
summary: The ability to force the transport protocol in UAs for initial requests SHOULD be avoided; bypassing RFC 3263 for initial requests causes the UA to be forced into the RFC 3263-preferred transport for subsequent requests, leading to transport-switching failures mid-dialog.
section: "6.1"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
