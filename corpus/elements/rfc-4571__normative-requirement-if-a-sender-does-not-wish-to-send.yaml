document: rfc-4571
kind: normative-requirement
summary: If a sender does not wish to send RTCP, it MUST add both 'b=RS:0' AND 'b=RR:0' lines to the media description. If both offer and answer contain these lines, an RTCP TCP flow MUST NOT be created; otherwise endpoints MUST establish two TCP connections (one RTP, one RTCP).
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - tcp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
