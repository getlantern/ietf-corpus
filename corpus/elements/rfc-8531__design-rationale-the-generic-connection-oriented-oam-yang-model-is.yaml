document: rfc-8531
kind: design-rationale
summary: The generic connection-oriented OAM YANG model is based on the CFM (IEEE 802.1Q) framework because of its wide adoption across Ethernet, MPLS-TP, TRILL, and MEF OAM. The model abstracts CFM constructs into a technology-independent framework extensible by technology-specific augmentations, keeping each model smaller and enabling independent development.
