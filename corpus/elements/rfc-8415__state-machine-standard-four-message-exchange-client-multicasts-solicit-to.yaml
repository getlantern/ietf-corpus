document: rfc-8415
kind: state-machine
summary: 'Standard four-message exchange: client multicasts Solicit to ff02::1:2 → servers respond with Advertise → client selects server and sends Request → server responds with Reply containing confirmed addresses/prefixes/configuration. An accelerated two-message path is available if the client includes Rapid Commit in Solicit and the server honors it with an immediate Reply.'
