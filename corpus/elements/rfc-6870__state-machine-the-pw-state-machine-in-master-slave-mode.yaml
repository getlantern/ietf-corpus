document: rfc-6870
kind: state-machine
summary: 'The PW state machine in master/slave mode defines two states (ACTIVE and STANDBY) with transitions: ACTIVE→STANDBY when master puts PW in standby (transmit Preferential Forwarding bit set) or slave receives bit set; STANDBY→ACTIVE when master activates PW (transmit bit clear) or slave receives bit clear. Unsupported bit reception causes no state change.'
section: 6.2.1
topics:
    - mpls
