document: rfc-3485
kind: protocol-element
summary: 'Implementations may load only a priority subset of the dictionary to conserve UDVM memory. The RFC provides string and table offset/length values for five subsets: priority 1 only, 1–2, 1–3, 1–4, and 1–5 (full dictionary), enabling fine-grained resource trade-offs.'
