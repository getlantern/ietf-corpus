document: rfc-5109
kind: protocol-element
summary: A FEC packet consists of an RTP header (12+ octets), a 10-octet FEC header, and one or more FEC level headers each immediately followed by their FEC level payload. All protection parameters (mask, protection length, SN base) are conveyed in-band within this structure.
section: "7.1"
