document: rfc-5692
kind: protocol-element
summary: Each SS has a unique 48-bit MAC address used during initial ranging and PKM authentication. However, forwarding over the air relies solely on CID values in the IEEE 802.16 MAC header, not on MAC addresses in the payload.
