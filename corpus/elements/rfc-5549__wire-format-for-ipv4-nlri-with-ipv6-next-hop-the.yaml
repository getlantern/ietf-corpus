document: rfc-5549
kind: wire-format
summary: For IPv4 NLRI with IPv6 Next Hop, the MP_REACH_NLRI carries AFI=1, SAFI=1/2/4/128, Length of Next Hop Address=16 or 32, and the Next Hop Address field contains the IPv6 address (optionally followed by a link-local IPv6 address) encoded as per RFC2545 Section 3.
