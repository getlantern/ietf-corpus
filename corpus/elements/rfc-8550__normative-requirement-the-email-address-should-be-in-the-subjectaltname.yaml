document: rfc-8550
kind: normative-requirement
summary: The email address SHOULD be in the subjectAltName extension and SHOULD NOT be in the subject distinguished name. If the local portion of the email address is ASCII it MUST be encoded using the rfc822Name CHOICE; if not ASCII it MUST be encoded using the otherName CHOICE as described in RFC 8398.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - pkix
