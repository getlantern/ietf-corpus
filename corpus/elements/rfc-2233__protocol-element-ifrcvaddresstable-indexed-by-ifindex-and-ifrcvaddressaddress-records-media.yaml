summary: ifRcvAddressTable (indexed by ifIndex and ifRcvAddressAddress) records media-level addresses at which this interface receives packets, including unicast, multicast, and broadcast addresses. ifRcvAddressStatus (RowStatus) and ifRcvAddressType (other/volatile/nonVolatile) control lifecycle.
