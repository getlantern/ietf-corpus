document: rfc-7683
kind: normative-requirement
summary: A reporting node MUST select a single abatement algorithm in its OC-Feature-Vector AVP, and that algorithm MUST be drawn from the set advertised in the reacting node's request. This ensures the agreed algorithm is usable by both sides.
section: 5.1.2
rfc2119_level: MUST
