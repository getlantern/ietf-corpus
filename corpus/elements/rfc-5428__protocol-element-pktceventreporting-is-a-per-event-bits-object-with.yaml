document: rfc-5428
kind: protocol-element
summary: 'pktcEventReporting is a per-event BITS object with four bits: local(0), syslog(1), snmpTrap(2), snmpInform(3). Setting a bit to ''1'' enables the corresponding action when the event fires. Default values are derived from the event''s severity level: emerg/alert/crit/err events default to local+syslog+snmpInform; all others default to local+syslog.'
section: "6"
topics:
