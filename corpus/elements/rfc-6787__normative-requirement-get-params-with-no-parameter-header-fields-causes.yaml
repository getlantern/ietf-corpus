document: rfc-6787
kind: normative-requirement
summary: GET-PARAMS with no parameter header fields causes the server MUST return all settable parameters and their values. If requested header fields are unsupported, the server MUST reject with 403 and MUST include the unsupported fields without values. Wildcard GET-PARAMS is RECOMMENDED to be used sparingly due to processing cost.
section: 6.1.2
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
