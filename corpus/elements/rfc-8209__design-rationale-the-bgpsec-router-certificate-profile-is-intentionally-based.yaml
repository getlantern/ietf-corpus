document: rfc-8209
kind: design-rationale
summary: The BGPsec Router Certificate profile is intentionally based on the RPKI Resource Certificate profile (RFC 6487), and issuance has minimal impact on existing RPKI CAs because CA certificate and CRL profiles remain unchanged; only processing of a new profiled certificate request is added.
