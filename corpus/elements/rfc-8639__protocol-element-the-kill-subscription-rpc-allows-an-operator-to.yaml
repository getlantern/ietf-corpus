document: rfc-8639
kind: protocol-element
summary: The 'kill-subscription' RPC allows an operator to terminate a dynamic subscription that is not associated with the current transport session. A publisher MUST terminate any dynamic subscription identified by the 'id' parameter. Publishers MUST reject any RPC attempt to kill a configured subscription.
section: 2.4.5
topics:
    - yang
    - netconf
