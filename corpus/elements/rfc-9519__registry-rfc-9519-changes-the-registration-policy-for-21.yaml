document: rfc-9519
kind: registry
summary: RFC 9519 changes the registration policy for 21 registries within the IANA 'Secure Shell (SSH) Protocol Parameters' group from IETF Review to Expert Review. Affected registries include Authentication Method Names, Encryption Algorithm Names, Key Exchange Method Names, MAC Algorithm Names, Public Key Algorithm Names, and others defined in RFCs 4250, 4716, 4819, and 8308.
