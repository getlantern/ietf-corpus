document: rfc-1483
kind: protocol-element
summary: 'The SNAP header is 5 octets: OUI (3 octets, identifies the organization administering the PID) and PID (2 octets, identifies a distinct routed or bridged protocol). OUI 0x00-00-00 specifies that PID is an EtherType; OUI 0x00-80-C2 (802.1) specifies a bridged media type.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
