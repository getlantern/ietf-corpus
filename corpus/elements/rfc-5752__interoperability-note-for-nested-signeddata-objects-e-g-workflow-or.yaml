document: rfc-5752
kind: interoperability-note
summary: 'For nested SignedData objects (e.g., workflow or S/MIME with ESS features), evaluation policy may differ: a workflow application may consider only the outermost signature, while an S/MIME application may strip outer signatures that fail validation and rely solely on the innermost valid originator signature.'
section: "5.3"
topics:
    - crypto
    - email
