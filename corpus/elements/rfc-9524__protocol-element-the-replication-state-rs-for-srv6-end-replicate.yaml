document: rfc-9524
kind: protocol-element
summary: 'The Replication state (RS) for SRv6 End.Replicate contains: Node-Role (Head, Transit, Leaf, or Bud), an optional IPv6 Hop Limit Threshold (default zero), and a Replication-List of entries each specifying a downstream node identifier, downstream Replication-SID, and an optional Segment-List. For a leaf node, the replication list is zero length.'
section: 2.2.1
topics:
