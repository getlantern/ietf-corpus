summary: The OBJECT-IDENTITY macro documents administrative OBJECT IDENTIFIER assignments, particularly type identification values. Its clauses include mandatory STATUS (current, deprecated, or obsolete) and DESCRIPTION, plus optional REFERENCE; its value is an OBJECT IDENTIFIER.
