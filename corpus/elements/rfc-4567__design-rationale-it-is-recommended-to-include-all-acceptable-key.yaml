document: rfc-4567
kind: design-rationale
summary: It is RECOMMENDED to include all acceptable key management protocols in a single offer rather than sequentially offering alternatives after error responses, because unauthenticated error messages can be faked by a MITM to steer the offerer toward a weaker protocol.
