document: rfc-4865
kind: normative-requirement
summary: If an MSA generates a DSN for a message with a Future Message Release request, the MSA MUST include both an Arrival-Date field and a Future-Release-Request field in the machine-readable body part of the DSN.
section: 5.1.2
rfc2119_level: MUST
topics:
