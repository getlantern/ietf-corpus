document: rfc-4396
kind: normative-requirement
summary: A default timestamp clockrate of 1000 Hz is RECOMMENDED for live streaming. Other clockrates MAY be used, in which case the typical behavior is to match the timed text clockrate to an associated audio or video stream.
section: "4"
rfc2119_level: RECOMMENDED
