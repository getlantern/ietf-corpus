document: rfc-3189
kind: normative-requirement
summary: If multiple DV encoding formats are used within one RTP session, multiple dynamic payload types MUST be assigned, one per encoding format. The sender MUST change to the corresponding payload type whenever the encoding format changes.
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
