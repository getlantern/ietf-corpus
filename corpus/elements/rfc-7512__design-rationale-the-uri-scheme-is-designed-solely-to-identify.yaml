document: rfc-7512
kind: design-rationale
summary: 'The URI scheme is designed solely to identify and work with existing PKCS #11 storage objects, tokens, and slots — not to create new objects or tokens. A subset of PKCS #11 structure members was chosen to be sufficient for unique identification while remaining easy to use on command lines and configuration files.'
