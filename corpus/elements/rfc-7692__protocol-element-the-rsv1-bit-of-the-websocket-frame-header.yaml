document: rfc-7692
kind: protocol-element
summary: The RSV1 bit of the WebSocket frame header is allocated for PMCEs and designated the 'Per-Message Compressed' bit. When set on the first fragment of a data message, it indicates the message payload is compressed; the bit MUST NOT be set on control frames or non-first fragments.
section: "6"
topics:
    - websocket
