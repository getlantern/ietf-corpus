document: rfc-8724
kind: protocol-element
summary: 'A SCHC C/D Rule contains an ordered list of Field Descriptors, each specifying: Field Identifier (FID), Field Length (FL), Field Position (FP), Direction Indicator (DI, one of Up/Dw/Bi), Target Value (TV), Matching Operator (MO), and Compression/Decompression Action (CDA). Field Descriptors are ordered as they appear in the packet header.'
section: "7.1"
topics:
