document: rfc-3757
kind: wire-format
summary: The SEP flag occupies bit 15 (the least significant bit) of the 16-bit flags field in the DNSKEY RR. When set to 1, the key is intended to be used as a secure entry point key; setting it to 0 carries no special meaning.
