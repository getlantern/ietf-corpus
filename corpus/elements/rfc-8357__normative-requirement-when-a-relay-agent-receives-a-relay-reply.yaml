document: rfc-8357
kind: normative-requirement
summary: When a relay agent receives a Relay-reply message with the 'Relay Source Port Option' and the 'Downstream Source Port' field is non-zero, it MUST use that UDP port number to forward the Relay-reply message to the downstream relay agent.
section: "5.2"
rfc2119_level: MUST
topics:
    - udp
