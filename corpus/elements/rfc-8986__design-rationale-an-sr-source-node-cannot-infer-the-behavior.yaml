document: rfc-8986
kind: design-rationale
summary: An SR source node cannot infer the behavior by examining the FUNCT value of a SID; therefore, the SRv6 Endpoint Behavior codepoint is advertised in the control plane alongside the SID so that source nodes can map a received SID to its intended behavior.
section: "3.2"
topics:
    - routing
