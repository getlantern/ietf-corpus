document: rfc-3588
kind: state-machine
summary: 'The Authorization Session State Machine (Section 8.1) has states: Idle, Pending, Open, and Disconnected. Two variants exist — stateful (server maintains session state) and stateless. Transitions are triggered by authorization requests and answers, re-auth requests (RAR/RAA), session timeouts, and session termination (STR/STA).'
section: "8.1"
topics:
    - security
