document: rfc-5077
kind: protocol-element
summary: The NewSessionTicket handshake message (assigned HandshakeType number 4) is sent by the server before ChangeCipherSpec to deliver a session ticket to the client. It contains a ticket_lifetime_hint (uint32, seconds) and a variable-length opaque ticket field.
