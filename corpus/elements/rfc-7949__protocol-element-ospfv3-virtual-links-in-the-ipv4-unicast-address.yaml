document: rfc-7949
kind: protocol-element
summary: OSPFv3 virtual links in the IPv4 unicast address family are now supported when the transport is also IPv4. This is accomplished by setting the IPv4 destination address to a reachable IPv4 unicast address for the virtual link endpoint, relaxing the restriction in Section 2.8 of RFC 5838.
section: "3.4"
topics:
    - routing
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
