document: rfc-8089
kind: design-rationale
summary: The syntax is derived from the generic URI syntax of RFC 3986, which postdates previous file URI specifications in RFC 1630 and RFC 1738. Where incompatibilities arise they are usually in parts that were underspecified in earlier definitions and have been tightened by more recent specifications.
