document: rfc-8261
kind: normative-requirement
summary: All SCTP associations over DTLS are single-homed because DTLS does not expose address management to its upper layer. It is RECOMMENDED to set the SCTP parameter path.max.retrans equal to association.max.retrans.
section: "6.1"
rfc2119_level: RECOMMENDED
topics:
    - sctp
    - tls
