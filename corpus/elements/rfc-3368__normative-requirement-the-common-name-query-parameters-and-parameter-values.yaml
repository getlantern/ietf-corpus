document: rfc-3368
kind: normative-requirement
summary: The common-name, query parameters, and parameter values MUST be encoded using the UTF-8 encoding scheme, and any octet that is not one of the permitted characters MUST instead be represented by a '%' followed by two hexadecimal characters.
section: "3.4"
rfc2119_level: MUST
