document: rfc-9835
kind: design-rationale
summary: 'BGP authentication follows the recommendations of RFC 4364 Section 13.2: TCP-AO (RFC 5925) is the preferred option, with MD5 supported for installed-base compatibility. TCP-AO parameters (SendID, RecvID per RFC 5925 Section 3.1) are assumed preconfigured in the referenced key chain, extending beyond the scope of RFC 8177.'
