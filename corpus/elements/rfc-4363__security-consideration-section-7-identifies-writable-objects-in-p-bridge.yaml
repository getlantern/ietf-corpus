document: rfc-4363
kind: security-consideration
summary: 'Section 7 identifies writable objects in P-BRIDGE-MIB and Q-BRIDGE-MIB (such as traffic class mappings, VLAN membership, GARP timers, and GMRP administrative controls) as security-sensitive: unauthorized write access could disrupt bridge forwarding, alter VLAN topology, or suppress multicast group registration. SNMPv3 with authentication and privacy is recommended.'
section: "7"
topics:
    - snmp
    - security
