document: rfc-3539
kind: normative-requirement
summary: When failover is initiated, the combination of an end-to-end identifier and the origin host MUST be used to identify duplicate messages. Hop-by-hop identifiers alone are insufficient since the same message can arrive from multiple agents with different hop-by-hop IDs.
section: 3.4.1
rfc2119_level: MUST
topics:
    - diameter
    - radius
