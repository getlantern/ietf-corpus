summary: The dynamicSubtrees operational attribute (OID 1.3.6.1.4.1.1466.101.119.4, NO-USER-MODIFICATION) is present in the Root DSE and lists the subtrees for which the server supports dynamic extensions. It may be absent if the server supports dynamic entries in all naming contexts.
