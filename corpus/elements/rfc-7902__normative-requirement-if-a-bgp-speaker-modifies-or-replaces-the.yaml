document: rfc-7902
kind: normative-requirement
summary: If a BGP speaker modifies or replaces the 'PMSI Tunnel' attribute such that the Extension flag is no longer set, any 'Additional PMSI Tunnel Attribute Flags' Extended Communities MUST be removed before propagating the UPDATE. If the 'PMSI Tunnel' attribute is removed entirely, those Extended Communities MUST also be removed.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
