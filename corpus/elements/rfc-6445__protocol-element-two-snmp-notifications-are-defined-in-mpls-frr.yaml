document: rfc-6445
kind: protocol-element
summary: 'Two SNMP notifications are defined in MPLS-FRR-FACILITY-STD-MIB: mplsFrrFacilityInitialBackupTunnelInvoked (sent once when FRR first activates on an interface) and mplsFrrFacilityFinalTunnelRestored (sent once when the last protected tunnel is restored); both carry DB statistics and protecting tunnel status/bandwidth.'
