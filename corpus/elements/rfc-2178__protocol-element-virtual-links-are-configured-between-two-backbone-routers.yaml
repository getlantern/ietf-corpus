document: rfc-2178
kind: protocol-element
summary: Virtual links are configured between two backbone routers sharing a common non-backbone transit area. The protocol treats them as unnumbered point-to-point backbone links whose cost equals the intra-area distance between the two routers. Virtual links may not traverse stub areas.
section: "15"
topics:
    - routing
