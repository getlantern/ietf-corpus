document: rfc-6611
kind: protocol-element
summary: The bootstrapping architecture in the integrated scenario consists of a mobile node, NAS/DHCP relay (co-located), DHCP server, and AAAH. The AAAH conveys assigned home agent information to the NAS via AAA protocol (e.g., Diameter per RFC 5447), which the NAS relays to the DHCP server via Relay-Supplied Options.
section: "4.1"
topics:
    - mobility
    - ip
    - diameter
