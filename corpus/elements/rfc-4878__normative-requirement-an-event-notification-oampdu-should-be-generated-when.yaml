document: rfc-4878
kind: normative-requirement
summary: An Event Notification OAMPDU should be generated when any of the four threshold-crossing event counters exceeds its configured threshold within its configured window. If a threshold is set to zero, notifications are sent periodically at the end of every window.
section: "6"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
