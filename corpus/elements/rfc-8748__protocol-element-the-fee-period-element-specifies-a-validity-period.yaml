document: rfc-8748
kind: protocol-element
summary: The <fee:period> element specifies a validity period in years ('y') or months ('m') via the 'unit' attribute, derived from <domain:period> of RFC 5731. It is OPTIONAL in <check> commands (server uses default if absent) but MUST be present in <check> responses.
section: "3.3"
