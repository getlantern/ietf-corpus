document: rfc-6049
kind: protocol-element
summary: Type-P-One-way-pdv-refmin-<Sample>-Stream defines packet delay variation (PDV) as PDV[n] = FiniteDelay[n] - MinDelay, where MinDelay is the minimum finite one-way delay observed in the stream. This normalizes all variation to the minimum-delay reference.
section: "6.1"
topics:
    - measurement
