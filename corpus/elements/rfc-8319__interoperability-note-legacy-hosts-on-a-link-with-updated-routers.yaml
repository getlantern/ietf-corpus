document: rfc-8319
kind: interoperability-note
summary: Legacy hosts on a link with updated routers may have issues with a Router Lifetime exceeding 9000 seconds. While tested general-purpose operating system implementations appear to handle values above 9000, RFC 4861 already requires receivers to handle any value, so non-compliant implementations may incorrectly reject such RAs.
section: "5"
topics:
