summary: The ROHC profile identifier used in rohcProfile (0..65535) is drawn from the IANA registry 'RObust Header Compression (ROHC) Profile Identifiers'. RFC 3816 assigns OIDs mib-2 112 (ROHC-MIB), mib-2 113 (ROHC-UNCOMPRESSED-MIB), and mib-2 114 (ROHC-RTP-MIB) under the MIB-2 subtree.
