document: rfc-8762
kind: normative-requirement
summary: In the TWAMP Light Session-Sender / STAMP Session-Reflector interoperability scenario, if the TWAMP Light Session-Sender does not support port 862, the test management system MUST set the STAMP Session-Reflector to the appropriate port, and the Session-Reflector MUST be set to use NTP as the default timestamp format.
section: "4.6"
rfc2119_level: MUST
topics:
    - measurement
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
