document: rfc-2806
kind: protocol-element
summary: The service-provider parameter (';tsp=') carries the fully qualified Internet domain name of the telephony service provider, enabling the user-agent to route the call over a specific carrier, improve billing estimates, or optimize its behavior. It may be ignored by the user-agent.
section: 2.5.10
extracted_by: claude-sonnet-4-6
