document: rfc-4920
kind: interoperability-note
summary: This document does not introduce backward compatibility issues provided that existing implementations conform to the TLV processing rules defined in RFC 3471 and RFC 3473. LSRs not supporting these extensions can continue to process PathErr, ResvErr, or Notify messages carrying the newly defined IF_ID ERROR_SPEC TLVs.
