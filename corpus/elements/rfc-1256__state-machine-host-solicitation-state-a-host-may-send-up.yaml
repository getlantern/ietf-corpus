document: rfc-1256
kind: state-machine
summary: 'Host solicitation state: a host MAY send up to MAX_SOLICITATIONS (3) Router Solicitations, triggered by interface initialization, reinitialization after failure, router-to-host role change, or PerformRouterDiscovery changing to TRUE. Retransmissions use SOLICITATION_INTERVAL (3 seconds) without randomization; initial transmission is delayed by a random value up to MAX_SOLICITATION_DELAY (1 second).'
section: "5.3"
topics:
