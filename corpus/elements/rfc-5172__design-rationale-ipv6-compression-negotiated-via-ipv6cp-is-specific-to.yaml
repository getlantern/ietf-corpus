document: rfc-5172
kind: design-rationale
summary: IPv6 compression negotiated via IPV6CP is specific to IPv6 datagrams and must not be confused with compression negotiated via the PPP Compression Control Protocol (CCP), which potentially affects all datagrams. This separation keeps IPv6-specific compression distinct from link-layer compression.
section: "2.1"
topics:
    - ip
    - v6ops
