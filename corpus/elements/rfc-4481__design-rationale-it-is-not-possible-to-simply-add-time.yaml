document: rfc-4481
kind: design-rationale
summary: It is not possible to simply add time range attributes to the PIDF <status> element because PIDF parsers without this capability would ignore those attributes and be unable to distinguish current from future presence status information, motivating the separate <timed-status> child element approach.
section: "1"
topics:
    - realtime
