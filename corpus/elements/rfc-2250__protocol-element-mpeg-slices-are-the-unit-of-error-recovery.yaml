document: rfc-2250
kind: protocol-element
summary: MPEG slices are the unit of error recovery. The beginning of a slice must be either the first data in a packet (after any ES headers) or must follow an integral number of complete slices, ensuring that the next slice boundary after a packet loss can be located without scanning packet contents.
section: "3.1"
topics:
    - rtp
    - realtime
