document: rfc-2564
kind: security-consideration
summary: The running application element control table enables termination, suspension, and reconfiguration of application processes; access to these read-write objects must be restricted via SNMP access control to authorized principals to prevent unauthorized disruption or denial-of-service.
section: "9"
