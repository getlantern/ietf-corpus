document: rfc-8189
kind: interoperability-note
summary: Legacy ALTO Clients will ignore the 'max-cost-types' capability and send single-cost requests using 'cost-type'; the Server will respond with a legacy single-valued cost map. Multi-cost-aware Clients detect 'max-cost-types' and use 'multi-cost-types' instead.
