document: rfc-8138
kind: protocol-element
summary: Address coalescence expands a compressed IPv6 address by overriding the N rightmost bytes of a reference address with the N-byte compressed value. The reference address may itself be compressed, but MUST be of equal or greater length than the address being coalesced. Type 4 SRH-6LoRH entries (16 bytes) are a complete override with no reference needed.
section: 4.3.1
topics:
    - ip
    - routing
