document: rfc-3962
kind: protocol-element
summary: The Kerberos algorithm profile uses PBKDF2+DK for string-to-key, SHA-1 as the hash function, 12-octet (96-bit) HMAC output, 1-octet message block size, and AES in CBC-CTS mode with 16-octet cipher block size. The next-to-last block (or last block if only one) is used as the CBC-style IV.
