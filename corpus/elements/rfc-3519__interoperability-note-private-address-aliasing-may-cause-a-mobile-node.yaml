document: rfc-3519
kind: interoperability-note
summary: Private address aliasing may cause a mobile node to fail to detect movement when two private networks use identical addressing (e.g., both 10.0.0.1/8). Implementations SHOULD monitor link-layer gateway addresses (e.g., via ARP) as a movement-detection heuristic, since IP addresses alone are insufficient across NATs.
section: "5.1"
topics:
    - nat
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
