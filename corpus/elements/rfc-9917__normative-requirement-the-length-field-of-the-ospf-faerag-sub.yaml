document: rfc-9917
kind: normative-requirement
summary: The Length field of the OSPF FAERAG Sub-TLV MUST be a multiple of 4 octets. If not, the entire sub-TLV MUST be ignored. The OSPF FAERAG Sub-TLV MUST NOT appear more than once in an OSPF FAD TLV; if it does, the entire FAD TLV MUST be ignored.
section: "8"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
