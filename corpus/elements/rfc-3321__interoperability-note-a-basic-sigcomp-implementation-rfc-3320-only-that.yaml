document: rfc-3321
kind: interoperability-note
summary: A basic SigComp implementation (RFC 3320 only) that receives a message containing shared_state_id or acked_state_id identifiers in the returned SigComp parameters will silently ignore these identifiers. Implementations using extended features are therefore backward-compatible with non-extended endpoints.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
