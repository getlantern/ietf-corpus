document: rfc-5070
kind: security-consideration
summary: The 'restriction' attribute conveys disclosure guidelines but provides no security, as there are no specified technical means to ensure that recipients handle information as requested. Operational IODEF implementations must address confidentiality, integrity, and authentication through transport-layer mechanisms (e.g., S/MIME, TLS) negotiated out-of-band.
section: "3.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
