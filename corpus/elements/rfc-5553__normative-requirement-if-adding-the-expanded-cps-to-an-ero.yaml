document: rfc-5553
kind: normative-requirement
summary: If adding the expanded CPS to an ERO causes the Path message to exceed MTU, the LSR MAY replace part of the ERO with loose hops or a further PKS; if unable to reduce size, it MUST send a PathErr with 'Routing Problem' / 'ERO too large for MTU' (value 34).
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
