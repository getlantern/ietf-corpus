document: rfc-3080
kind: protocol-element
summary: The 'close' element is sent on channel zero to close a channel (number != 0) or release the session (number == 0). It carries a numeric reply code and optional xml:lang and textual diagnostic. A peer receiving a close request MAY reject it with an error, or MUST drain all queued/outstanding MSG messages before accepting with an 'ok' reply.
section: 2.3.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
