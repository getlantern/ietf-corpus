document: rfc-3010
kind: design-rationale
summary: NFS version 4 eliminates the separate MOUNT protocol for initial path-to-filehandle mapping, instead providing ROOT and PUBLIC special filehandles, because the MOUNT protocol had deficiencies in security and firewall traversal.
section: "4.1"
