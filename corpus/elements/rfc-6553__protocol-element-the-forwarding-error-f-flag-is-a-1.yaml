document: rfc-6553
kind: protocol-element
summary: The Forwarding-Error 'F' flag is a 1-bit field as defined in RFC 6550 Section 11.2, indicating that a child router could not deliver the datagram and is returning it to try a different path. Processing SHALL follow RFC 6550 Section 11.2 rules.
