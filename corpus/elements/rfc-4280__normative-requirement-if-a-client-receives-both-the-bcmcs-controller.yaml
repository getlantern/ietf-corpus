document: rfc-4280
kind: normative-requirement
summary: If a client receives both the BCMCS Controller Domain Name List and an IP Address option, it SHOULD use the Domain Name List option and SHOULD NOT fall back to the IP Address option unless the domain name servers cannot be resolved or reached.
section: "4.5"
rfc2119_level: SHOULD
topics:
    - dns
    - multicast
