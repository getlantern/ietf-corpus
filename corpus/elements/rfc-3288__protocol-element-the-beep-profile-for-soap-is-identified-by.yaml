document: rfc-3288
kind: protocol-element
summary: The BEEP profile for SOAP is identified by the URI 'http://iana.org/beep/soap' in the BEEP 'profile' element during channel creation. The 'serverName' attribute in the 'start' element identifies the virtual host associated with the server-role peer, analogous to HTTP's 'Host' header.
section: "2"
