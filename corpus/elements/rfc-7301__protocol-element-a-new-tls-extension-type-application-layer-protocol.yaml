document: rfc-7301
kind: protocol-element
summary: A new TLS extension type 'application_layer_protocol_negotiation' is assigned the value 16. It may be included by the client in ClientHello and returned by the server in ServerHello to negotiate the application-layer protocol within the TLS handshake.
