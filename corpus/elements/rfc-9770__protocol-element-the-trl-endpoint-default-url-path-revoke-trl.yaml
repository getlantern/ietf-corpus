document: rfc-9770
kind: protocol-element
summary: 'The TRL endpoint (default url-path: /revoke/trl) supports only the GET method and two query types: full query (returning all current pertaining token hashes) and diff query (returning ordered diff entries of recent TRL updates). The AS MUST support full queries; diff queries are optional.'
section: "6"
