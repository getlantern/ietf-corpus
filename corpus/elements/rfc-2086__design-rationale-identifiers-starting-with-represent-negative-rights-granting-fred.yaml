document: rfc-2086
kind: design-rationale
summary: 'Identifiers starting with ''-'' represent negative rights: granting ''-fred'' the ''w'' right means the ''w'' right is removed from users matching ''fred''. Implementations need not support negative-rights identifiers in ACLs.'
section: "3"
topics:
