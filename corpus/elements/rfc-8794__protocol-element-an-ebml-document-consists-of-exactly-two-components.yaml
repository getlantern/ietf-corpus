document: rfc-8794
kind: protocol-element
summary: 'An EBML Document consists of exactly two components: an EBML Header followed by an EBML Body. The EBML Header (Element ID 0x1A45DFA3) declares the DocType, version numbers, and constraints (EBMLMaxIDLength, EBMLMaxSizeLength) that govern the EBML Body.'
