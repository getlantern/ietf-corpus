document: rfc-2446
kind: design-rationale
summary: 'The COUNTER/DECLINECOUNTER method pair was introduced to support negotiation workflows common in existing calendar systems, where an Attendee may propose an alternate time or location. The Organizer retains final authority: acceptance of a COUNTER requires the Organizer to issue a new REQUEST (rescheduling), while rejection uses DECLINECOUNTER.'
section: 3.2.7
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
