document: rfc-4334
kind: protocol-element
summary: The WLAN SSID attribute certificate attribute (id-aca-wlanSSID, { id-aca 7 }) associates a list of SSIDs with a public key certificate via an attribute certificate when the public key certificate does not include the WLAN SSID certificate extension. It uses the same SSIDList syntax.
