document: rfc-4077
kind: protocol-element
summary: ID_NOT_UNIQUE (code 21) and STATE_TOO_SHORT (code 23) include the partial state identifier in Error Details (6-20 bytes). For STATE_TOO_SHORT, implementors must return only the partial state identifier that was requested, not any extended identifier, to prevent attackers from gaining unauthorized state access.
section: "3.2"
topics:
    - security
