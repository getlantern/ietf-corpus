document: rfc-8655
kind: protocol-element
summary: 'End systems are categorized by DetNet awareness: DetNet-unaware (classic case, requires service proxies), DetNet-f-aware (knows forwarding sub-layer, e.g., TSN reservation, but not service protection), DetNet-s-aware (supplies sequence numbers but not resource allocation), and DetNet-sf-aware (fully functional, same forwarding paradigm as the DetNet domain).'
section: 4.2.1
