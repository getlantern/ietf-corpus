document: rfc-2617
kind: normative-requirement
summary: Proxies MUST be completely transparent regarding user agent authentication by origin servers; they must forward the WWW-Authenticate and Authorization headers untouched. Proxy-Authenticate and Proxy-Authorization are hop-by-hop headers and must not be forwarded end-to-end.
section: "1.2"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
