document: rfc-8168
kind: design-rationale
summary: 'The Renew/Rebind approach of including two IAPREFIX options (current prefix + hint) serves a dual purpose: it extends the lifetime of the currently used prefix to avoid connection disruption while simultaneously signaling the client''s preference for a different prefix length, enabling a graceful switchover.'
