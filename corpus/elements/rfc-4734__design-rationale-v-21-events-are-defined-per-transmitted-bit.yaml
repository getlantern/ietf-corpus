document: rfc-4734
kind: design-rationale
summary: V.21 events are defined per transmitted bit rather than per transition because per-bit reporting increases redundancy—each event completion is retransmitted three times, reducing risk of data corruption in unreliable networks without requiring separate reliability mechanisms.
section: "2.2"
topics:
    - rtp
    - realtime
