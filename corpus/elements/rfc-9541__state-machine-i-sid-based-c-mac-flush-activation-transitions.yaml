document: rfc-9541
kind: state-machine
summary: I-SID-based C-MAC flush activation transitions a PE between inactive (not generating or processing B-MAC/I-SID routes) and active states on a per-I-SID basis. Activation is triggered administratively; deactivation removes the capability per I-SID. When active, the PE generates flush notifications on AC-down events and processes incoming B-MAC/I-SID routes.
section: "4.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
