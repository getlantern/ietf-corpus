summary: The P2MP PW Upstream FEC Element (FEC type 0x82) is the primary FEC used by the R-PE to signal P2MP PW to all L-PEs; it carries the AGI, SAII identifying the P2MP PW root, and the PMSI Tunnel Info identifying the underlying transport LSP.
