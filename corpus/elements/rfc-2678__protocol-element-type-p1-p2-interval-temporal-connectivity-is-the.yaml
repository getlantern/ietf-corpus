document: rfc-2678
kind: protocol-element
summary: 'Type-P1-P2-Interval-Temporal-Connectivity is the primary metric defined in this document: Src has this connectivity to Dst during [T, T+dT] if there exist times T1, T2 and durations dT1, dT2 all within the interval such that T1+dT1 <= T2, Src has P1 instantaneous connectivity to Dst at T1 (with dT1 the transit time), and Dst has P2 instantaneous connectivity to Src at T2 (with dT2 the transit time). This captures the ability for Src to send a packet that elicits a response.'
section: "6"
