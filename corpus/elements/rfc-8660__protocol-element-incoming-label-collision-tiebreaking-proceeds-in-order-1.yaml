document: rfc-8660
kind: protocol-element
summary: 'Incoming label collision tiebreaking proceeds in order: (1) lowest FEC administrative distance wins; (2) if tied, smallest numerical FEC value wins using defined FEC encodings. First-come-first-served tiebreaking is explicitly prohibited. The network operator MUST deploy the same tiebreaking rules within an IGP flooding area.'
section: 2.5.1
topics:
    - mpls
    - routing
