document: rfc-6326
kind: wire-format
summary: The Group MAC Address (GMAC-ADDR) sub-TLV (type 1 within GADDR TLV) encodes multicast listeners by 48-bit group and source MAC address. Fields include a 2-byte Topology-ID (unused in TRILL, sent zero), a 2-byte VLAN ID, a 1-byte group record count, and variable-length group records each comprising a 1-byte source count, a 6-byte group address, and zero or more 6-byte source addresses.
section: 2.1.1
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
