document: rfc-1231
kind: protocol-element
summary: dot5TimerNoToken (dot5TimerEntry 6) is the timeout used to recover from token-related error situations. Its normal value is dot5TimerReturnRepeat + N*dot5TimerHolding, where N is the maximum number of stations on the ring.
