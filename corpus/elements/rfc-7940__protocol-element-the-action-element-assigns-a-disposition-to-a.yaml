summary: The 'action' element assigns a disposition to a label triggered by a rule match ('match' attribute) or non-match ('not-match' attribute), or by variant type qualifiers ('any-variant', 'all-variants', 'only-variants'). Actions are evaluated in document order and the first matching action wins.
