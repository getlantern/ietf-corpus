document: rfc-5059
kind: security-consideration
summary: BSR threats include DoS attacks (advertising bogus RPs to prevent traffic delivery) and traffic-diversion attacks (registering malicious RPs to redirect multicast streams for monitoring or man-in-the-middle interception). An attacker can also flood third parties by specifying them as RPs.
section: "6.1"
topics:
    - multicast
    - security
