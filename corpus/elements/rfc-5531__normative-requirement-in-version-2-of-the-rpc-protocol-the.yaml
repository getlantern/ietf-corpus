document: rfc-5531
kind: normative-requirement
summary: In version 2 of the RPC protocol, the rpcvers field in the call_body MUST be equal to 2. The first implementation of a new remote program MUST NOT use version number zero.
section: "8.1"
rfc2119_level: MUST
topics:
