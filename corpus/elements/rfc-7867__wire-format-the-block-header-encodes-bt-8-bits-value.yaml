document: rfc-7867
kind: wire-format
summary: 'The block header encodes: BT (8 bits, value=34), Interval Metric Flag I (2 bits), Video Loss Concealment Method Type V (2 bits), RSV (4 bits reserved), and Block Length (16 bits). The Block Length MUST be set to 5 when V=10 (frame-freeze) and 4 when V=11 (other concealment).'
section: "4"
topics:
