document: rfc-9770
kind: normative-requirement
summary: Communications between the AS and an administrator MUST be mutually authenticated, encrypted, integrity-protected, and replay-protected. Mutual authentication is REQUIRED when establishing the secure association. Suitable mechanisms include TLS/DTLS with mutual authentication or OSCORE via EDHOC.
section: "10"
rfc2119_level: MUST
topics:
    - security
    - crypto
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
