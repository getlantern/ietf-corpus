document: rfc-8630
kind: protocol-element
summary: 'The TAL file format is an ordered sequence of: (1) an optional comment section with lines beginning with ''#'', (2) a URI section with one or more TA URIs (rsync or HTTPS), (3) a blank line, and (4) the subjectPublicKeyInfo in DER format encoded in base64. Line breaks may use CRLF or LF.'
