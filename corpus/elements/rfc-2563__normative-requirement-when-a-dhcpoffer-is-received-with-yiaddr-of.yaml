document: rfc-2563
kind: normative-requirement
summary: When a DHCPOFFER is received with 'yiaddr' of 0x00000000 and the Auto-Configure option is set to DoNotAutoConfigure, the DHCPOFFER MUST be ignored and the client MUST NOT generate a link-local IP address.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - ip
