document: rfc-3267
kind: normative-requirement
summary: If the recalculated CRC over received class A bits does not match the payload CRC, the receiver SHALL consider the class A bits damaged and MUST clear the Q flag (set to 0), causing the frame to be marked SPEECH_BAD or SID_BAD before passing to the speech decoder.
section: 4.4.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
