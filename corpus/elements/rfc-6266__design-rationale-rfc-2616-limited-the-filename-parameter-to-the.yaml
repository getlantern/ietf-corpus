document: rfc-6266
kind: design-rationale
summary: RFC 2616 limited the 'filename' parameter to the quoted-string form only. RFC 6266 also allows the token form to match actual implementations, since restricting to quoted-string would be an exceptional parameter syntax inconsistent with how the field is actually used.
section: A
topics:
    - http
