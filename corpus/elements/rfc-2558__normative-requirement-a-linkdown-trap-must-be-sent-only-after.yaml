document: rfc-2558
kind: normative-requirement
summary: A linkDown trap must be sent only after the agent has determined for certain that the unavailable state has been entered, but the timestamp on the trap must reflect the time of the first UAS (i.e., 10 seconds earlier). A linkUp trap must be handled similarly.
section: "3.5"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
