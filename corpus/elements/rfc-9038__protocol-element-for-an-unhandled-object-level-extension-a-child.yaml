document: rfc-9038
kind: protocol-element
summary: For an unhandled object-level extension (a child of <resData>), the <resData> element is removed and the object-level extension child element is moved into an <extValue><value> element, converting the response from an object response to a general EPP response.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
