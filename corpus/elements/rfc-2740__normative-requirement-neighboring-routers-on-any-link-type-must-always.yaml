document: rfc-2740
kind: normative-requirement
summary: Neighboring routers on any link type MUST always be identified by their OSPF Router ID; IPv4 behavior of identifying broadcast/NBMA neighbors by IP address is not used. The Router ID 0.0.0.0 is reserved and SHOULD NOT be assigned.
section: "2.11"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
