document: rfc-1368
kind: normative-requirement
summary: rptrResetEvent trap is not sent when the agent restarts and sends an SNMP coldStart or warmStart trap; however, it is recommended that a repeater agent include rptrOperStatus as an optional object in coldStart and warmStart trap PDUs.
section: "4.5"
rfc2119_level: RECOMMENDED
