document: rfc-5278
kind: security-consideration
summary: Publishing vmsg Enumservice data in public ENUM trees (e.g., e164.arpa) makes E.164-to-messaging-URI mappings visible to anonymous third parties. This enables data harvesting for unsolicited communications (e.g., SPIT — SPAM over Internet Telephony), though analogous to telephone directory publication. Carriers may mitigate this by restricting ENUM data to private or trusted-network trees.
section: "3"
topics:
    - security
    - dns
    - voip
    - privacy
