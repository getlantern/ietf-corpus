document: rfc-5152
kind: normative-requirement
summary: When an operator does not desire local reoptimization of certain inter-domain LSPs, procedures from RFC 4736 MUST be used, and any reoptimization event within the domain MUST be reported to the Head-end node. This SHOULD be a configurable policy.
section: "6.2"
rfc2119_level: MUST
topics:
    - realtime
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
