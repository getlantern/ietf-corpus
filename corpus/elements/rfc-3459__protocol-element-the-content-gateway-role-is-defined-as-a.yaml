document: rfc-3459
kind: protocol-element
summary: The content gateway role is defined as a gateway connecting a first network to a second network of lesser capability. It may be integrated with the receiving UA, positioned between MTAs, or operate as a post-processing disaggregated step after the final MTA has accepted the message.
