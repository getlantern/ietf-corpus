document: rfc-5340
kind: interoperability-note
summary: OSPFv3 implementations based on RFC 2740 will fully interoperate with RFC 5340 implementations since all protocol additions and changes are backward compatible. However, RFC 2740 routers that still enforce the deprecated stub-area unknown-LSA flooding restriction may not propagate newly defined LSA types with U-bit=1.
section: "3"
topics:
