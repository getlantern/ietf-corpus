document: rfc-7766
kind: normative-requirement
summary: All general-purpose DNS implementations MUST support both UDP and TCP transport. This updates Section 6.1.3.2 of RFC 1123, making TCP support a required part of a full DNS protocol implementation.
section: "5"
rfc2119_level: MUST
topics:
    - dns
    - tcp
