document: rfc-6891
kind: design-rationale
summary: Binary Labels (RFC 2673) were moved to Experimental and are now deprecated because introducing a new label type was found to be extremely difficult due to lack of support in clients and intermediate gateways. Extended label types remain defined but their use is discouraged.
