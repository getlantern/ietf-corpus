document: rfc-2543
kind: registry
summary: SIP defines IANA registries for option tags (Section 4.4.1), SIP methods, response codes, and header fields. New option tags must be registered with IANA; the Require header field is used by a UAC to require the server to support a given option tag, and Unsupported is returned when the server does not support it.
