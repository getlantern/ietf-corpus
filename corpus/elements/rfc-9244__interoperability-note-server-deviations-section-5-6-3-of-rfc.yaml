document: rfc-9244
kind: interoperability-note
summary: Server deviations (Section 5.6.3 of RFC 7950) for the 'ietf-dots-telemetry' YANG module are strongly discouraged because peer DOTS agents have no means to retrieve the list of deviations, making interoperability failures likely. The module is not intended for NETCONF/RESTCONF management use.
section: "4.4"
topics:
    - yang
    - netconf
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
