document: rfc-1406
kind: interoperability-note
summary: DS1 interfaces appear as ifType ds1(18) and e1(19) in MIB-II. The ds1 OID subtree (transmission 18) subsumes cept(19); there is no separate CEPT MIB. Both T1 and E1 disciplines are covered by this single MIB because 'the various T1 and E1 line disciplines are similar enough that separate MIBs are unwarranted.'
section: "3"
topics:
