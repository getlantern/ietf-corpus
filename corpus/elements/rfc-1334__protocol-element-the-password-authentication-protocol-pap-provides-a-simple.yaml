document: rfc-1334
kind: protocol-element
summary: The Password Authentication Protocol (PAP) provides a simple 2-way handshake for peer identity establishment at initial link setup only. The peer repeatedly sends an Id/Password pair until authentication is acknowledged or the connection is terminated. Passwords are transmitted in cleartext with no replay protection.
section: "2"
topics:
