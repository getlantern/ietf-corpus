document: rfc-6326
kind: design-rationale
summary: The Sender Nickname field in the VLAN-Flags sub-TLV is included to support intelligent end stations that determine the egress RBridge for unicast data through a directory service and need a first-hop nickname to correctly format TRILL-encapsulated frames, as described in RFC 6325 Section 4.6.2.
section: 2.2.1
topics:
    - routing
