document: rfc-2819
kind: normative-requirement
summary: Immediately after completing a createRequest operation, the agent MUST set the EntryStatus object to underCreation(3). An entry in underCreation state may exist in an incomplete or inconsistent state until the manager sets it to valid(1) or invalid(4).
