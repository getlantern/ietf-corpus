document: rfc-7606
kind: normative-requirement
summary: Treat-as-withdraw MUST be used for error cases involving ORIGIN, AS_PATH, NEXT_HOP, MULTI_EXIT_DISC, or LOCAL_PREF that previously specified session reset. Attribute discard MUST be used for ATOMIC_AGGREGATE or AGGREGATOR error cases that previously specified session reset.
