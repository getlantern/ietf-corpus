document: rfc-2789
kind: design-rationale
summary: 'Message flow inside an MTA is modeled in four steps: (1) receive from UA/MTA/gateway, (2) determine next hop, (3) convert format if needed, (4) transmit. Storage may occur at different points in this pipeline, which is why received, stored, and transmitted counts can differ.'
section: "2"
