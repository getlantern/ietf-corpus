document: rfc-7618
kind: design-rationale
summary: IPv4 address exhaustion during the transition to native IPv6 networks drove the design. Rather than deploying CGN devices, this solution distributes the same public IPv4 address to multiple clients differentiated by non-overlapping Layer 4 port sets, following the Address plus Port (A+P) model.
