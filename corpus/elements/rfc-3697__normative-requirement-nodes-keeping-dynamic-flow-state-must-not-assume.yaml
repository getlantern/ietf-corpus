document: rfc-3697
kind: normative-requirement
summary: Nodes keeping dynamic flow state MUST NOT assume packets arriving 120 seconds or more after the previous packet of a flow still belong to the same flow, unless a flow state establishment method defines a longer lifetime or the flow state has been explicitly refreshed within the lifetime duration.
section: "2"
rfc2119_level: MUST NOT
topics:
    - ip
