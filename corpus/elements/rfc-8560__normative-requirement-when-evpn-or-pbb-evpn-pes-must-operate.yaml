document: rfc-8560
kind: normative-requirement
summary: When EVPN or PBB-EVPN PEs must operate seamlessly with VPLS or PBB-VPLS PEs, they MUST use Single-Active redundancy mode. All-Active redundancy is not applicable to VPLS and PBB-VPLS, making it out of scope for seamless integration.
section: "2"
rfc2119_level: MUST
topics:
    - mpls
