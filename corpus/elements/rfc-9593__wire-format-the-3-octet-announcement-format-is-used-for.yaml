document: rfc-9593
kind: wire-format
summary: The 3-octet announcement format is used for public key authentication methods. It consists of Length (value 3), Auth Method, and Cert Link octets. The Cert Link field links the announcement to the N-th trust anchor from the CERTREQ payload(s), or 0 to allow any CA.
section: 3.2.2
topics:
