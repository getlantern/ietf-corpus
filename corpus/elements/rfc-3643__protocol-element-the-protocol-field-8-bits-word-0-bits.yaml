document: rfc-3643
kind: protocol-element
summary: The Protocol# field (8 bits, word 0 bits 0-7) SHALL contain an IANA-assigned number identifying which encapsulating protocol is employing the FC Encapsulation. The -Protocol# field SHALL contain the one's complement of Protocol# for header validation.
