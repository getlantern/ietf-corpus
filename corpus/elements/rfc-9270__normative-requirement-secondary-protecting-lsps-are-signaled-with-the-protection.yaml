document: rfc-9270
kind: normative-requirement
summary: Secondary protecting LSPs are signaled with the PROTECTION object S bit=1, P bit=1, N bit=1, and the ASSOCIATION object Association ID set to the primary working LSP_ID, which MUST be known before signaling the secondary LSP. The Path message MUST include at least one PRIMARY_PATH_ROUTE object.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
