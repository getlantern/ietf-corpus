document: rfc-5103
kind: interoperability-note
summary: No facility is provided for allocating reverse counterparts of enterprise-specific Information Elements using the Reverse PEN (PEN 29305). Enterprise-specific reverse IEs are left to each organization's discretion; enterprises may reserve one of the fifteen available bits in the IE ID to signify reverse direction (e.g., reserving IDs 0x4000–0x7FFF for reverse of 0x0000–0x3FFF).
section: "6.2"
topics:
    - measurement
