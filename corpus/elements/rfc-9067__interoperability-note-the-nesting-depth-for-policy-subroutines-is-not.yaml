document: rfc-9067
kind: interoperability-note
summary: The nesting depth for policy subroutines is not prescribed by the model and varies among implementations. An implementation may only support a single level of subroutine recursion; creating policies nested beyond two to three levels is discouraged.
section: "4.4"
