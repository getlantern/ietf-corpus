document: rfc-3805
kind: design-rationale
summary: A single Alert Table rather than per-group alert associations was chosen because one sub-unit entry can produce multiple simultaneous alerts (e.g., paper jams in multiple locations along a media path). Associating additional alert information with the source entry would limit it to one alert per entry.
section: 2.2.13.3
topics:
    - snmp
