document: rfc-4916
kind: protocol-element
summary: The UPDATE method (RFC 3311) is the primary vehicle for sending connected identity. The UAS for an INVITE sends an UPDATE after receiving the ACK to convey callee identity; re-INVITE may also be used when simultaneously needed for other purposes such as SDP renegotiation.
section: "3"
topics:
