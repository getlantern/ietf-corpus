document: rfc-9856
kind: interoperability-note
summary: 'This document extends RFC 9573 DCB label usage: DCB-allocated ESI labels MAY be used with Ingress Replication (IR) tunnels, and MAY be used by PEs that do not themselves use DCB-allocated PMSI labels. RFC 9573 originally restricted DCB labels to MP2MP, P2MP, and BIER tunnels.'
section: "5.2"
topics:
    - routing
    - multicast
    - mpls
