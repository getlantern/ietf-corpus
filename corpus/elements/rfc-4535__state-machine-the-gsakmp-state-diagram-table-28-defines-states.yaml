kind: state-machine
summary: 'The GSAKMP state diagram (Table 28) defines states: Start, Await_RTJ (GC/KS listening), Await_KeyDL (GM waiting for response), Await_KeyDL-A/F (GC/KS waiting for acknowledgement), and Member (fully established). Transitions are triggered by receipt of RTJ, KeyDL, KeyDL-A/F, LOA, RTJ-Err, Rekey Event, and Departure messages, or by timeout events.'
