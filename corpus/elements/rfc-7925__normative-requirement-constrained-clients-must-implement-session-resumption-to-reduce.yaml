document: rfc-7925
kind: normative-requirement
summary: Constrained clients MUST implement session resumption to reduce message exchanges, computational overhead, and bandwidth. When the server is constrained, the client MUST implement RFC 5077 (stateless ticket-based resumption) to avoid requiring per-session state on the server.
section: "7"
rfc2119_level: MUST
topics:
    - tls
    - security
