document: rfc-6285
kind: design-rationale
summary: RAMS deliberately reuses existing RTP/RTCP machinery (RFC 4588 retransmission format, RFC 4585 feedback framework, RFC 5760 unicast feedback for SSM) rather than defining a new protocol. This was chosen to improve versatility of existing implementations, promote faster deployment, and achieve better interoperability.
section: "1"
topics:
    - rtp
    - multicast
    - realtime
