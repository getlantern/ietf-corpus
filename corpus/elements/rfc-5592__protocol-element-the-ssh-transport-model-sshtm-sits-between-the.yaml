document: rfc-5592
kind: protocol-element
summary: The SSH Transport Model (SSHTM) sits between the SSH transport layer and the SNMP Message Dispatcher, translating SSH-specific security parameters into SNMP model-independent parameters. It establishes an SSH channel carrying SNMP messages between two SNMP engines, with multiple SNMP messages MAY be passed through the same channel.
