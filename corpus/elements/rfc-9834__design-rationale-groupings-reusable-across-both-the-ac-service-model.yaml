document: rfc-9834
kind: design-rationale
summary: Groupings reusable across both the AC service model and the AC network model are placed in the shared 'ietf-ac-common' module (RFC 9833), while groupings reusable only among service models are kept in 'ietf-ac-svc'. This minimizes duplication and keeps service-layer and network-layer concerns separate.
section: 5.2.1
