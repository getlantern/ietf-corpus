document: rfc-8855
kind: security-consideration
summary: BFCP messages MUST be protected using TLS over TCP or DTLS over UDP to prevent tampering, eavesdropping, and replay attacks. Error code 9 (Use TLS) and error code 11 (Use DTLS) allow servers to redirect clients to a secure transport when an insecure connection is attempted.
section: "7"
topics:
    - security
    - tls
    - realtime
