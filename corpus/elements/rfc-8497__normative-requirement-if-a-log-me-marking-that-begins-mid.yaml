document: rfc-8497
kind: normative-requirement
summary: If a 'log me' marking that begins mid-dialog error is detected, the entity MUST NOT forward the 'log me' marker, MUST NOT log the message, MUST NOT mark subsequent requests and responses, and MUST NOT log subsequent messages in the same dialog.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
