document: rfc-3830
kind: normative-requirement
summary: In the public-key method, an encrypted copy of the Initiator's identity (IDi) is placed inside the KEMAC payload as a man-in-the-middle countermeasure. The encrypted IDi MUST always be verified to equal the expected IDi.
section: "3.2"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
