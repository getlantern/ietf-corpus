document: rfc-5575
kind: interoperability-note
summary: Port, source port, and destination port flow specification components evaluate to FALSE if the IP protocol is not TCP or UDP, if the packet is fragmented and not the first fragment, or if the system cannot locate the transport header. Implementations may or may not decode the transport header in the presence of IP options or ESP NULL encryption.
section: "4"
topics:
    - bgp
    - routing
    - ip
    - ipsec
