document: rfc-2231
kind: design-rationale
summary: Long MIME parameter values interact poorly with header line wrapping because proper folding requires linear whitespace (LWSP) that may not be present or recognizable in parameter values, causing truncation or damage by incorrect implementations. A continuation mechanism is therefore needed that breaks values into smaller units without altering the MIME header syntax.
