document: rfc-6931
kind: protocol-element
summary: ECDSA signature algorithms are identified for ECDSA-SHA1/224/256/384/512 under '2001/04/xmldsig-more#' and ECDSA-RIPEMD160, ECDSA-Whirlpool under '2007/05/xmldsig-more#'. The signature value is the base64 encoding of the concatenation of the I2OSP-encoded integers r and s, each padded to the byte length of the curve's base point order.
