document: rfc-6503
kind: design-rationale
summary: HTTP was chosen as the CCMP transport over SOAP and REST alternatives. HTTP POST was preferred because it allows arbitrary XML payload in the body without constraining the data model to URI path hierarchies, and avoids SOAP's processing overhead. The stateless HTTP model aligns with CCMP's stateless design.
