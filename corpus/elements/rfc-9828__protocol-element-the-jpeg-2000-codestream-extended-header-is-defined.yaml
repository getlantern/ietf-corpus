document: rfc-9828
kind: protocol-element
summary: The JPEG 2000 codestream Extended Header is defined as all bytes from and including the SOC marker through and including the first SOD marker. This is a superset of the JPEG 2000 main header (SOC to first SOT) and is specific to this payload format. Body Packet payloads must not contain any Extended Header bytes.
section: "5.1"
topics:
    - rtp
    - realtime
