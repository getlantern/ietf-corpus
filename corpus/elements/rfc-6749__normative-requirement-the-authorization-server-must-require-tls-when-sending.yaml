document: rfc-6749
kind: normative-requirement
summary: The authorization server MUST require TLS when sending requests to the authorization endpoint, MUST support HTTP GET for the authorization endpoint, and MUST ignore unrecognized request parameters. Request and response parameters MUST NOT be included more than once.
section: "3.1"
rfc2119_level: MUST
topics:
