document: rfc-8551
kind: wire-format
summary: 'A multipart/signed message requires two parameters: protocol MUST be ''application/pkcs7-signature'' (quoted because of the ''/''), and micalg indicates the digest algorithm(s) used (e.g., ''sha-256'', ''sha-512''). Multiple digest algorithms are comma-separated per RFC 1847.'
section: 3.5.3.2
topics:
    - email
    - security
