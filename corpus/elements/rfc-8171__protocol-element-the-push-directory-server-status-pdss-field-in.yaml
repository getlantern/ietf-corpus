document: rfc-8171
kind: protocol-element
summary: 'The Push Directory Server Status (PDSS) field in the ESADI-Parameter APPsub-TLV encodes server state: 0 = not a server, 1 = Stand-By, 2 = Active but not complete, 3 = Active and has pushed complete data. Each Push Directory server has a configurable 8-bit priority (PushDirPriority, default 0x3F) and a configurable N (1–8, default 2) indicating how many copies should be pushed per Data Label.'
section: "2.2"
topics:
    - routing
