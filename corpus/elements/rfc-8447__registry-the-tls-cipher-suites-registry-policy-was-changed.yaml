document: rfc-8447
kind: registry
summary: The TLS Cipher Suites registry policy was changed from IETF Consensus to Specification Required for values with first byte 0-254, with first byte 255 reserved for Private Use. A 'Recommended' column was added marking specific ECDHE/DHE cipher suites with AES-GCM, AES-CCM, and ChaCha20-Poly1305 as 'Y'.
section: "8"
topics:
