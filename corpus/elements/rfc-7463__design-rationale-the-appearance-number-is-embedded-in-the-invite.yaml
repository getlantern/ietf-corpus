document: rfc-7463
kind: design-rationale
summary: 'The appearance number is embedded in the INVITE''s Alert-Info header field (not only delivered via NOTIFY) to satisfy REQ-9: if the NOTIFY is delayed or lost, a UA still knows the correct appearance number to render during alerting. Dialog package notification takes precedence should the two conflict.'
section: "4.2"
topics:
    - sip
    - realtime
