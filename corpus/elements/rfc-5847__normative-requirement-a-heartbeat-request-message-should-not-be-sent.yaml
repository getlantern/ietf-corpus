document: rfc-5847
kind: normative-requirement
summary: A Heartbeat Request message SHOULD NOT be sent if the MAG has no proxy Binding Cache entries at the LMA for any mobile node attached to it. Similarly, the LMA SHOULD NOT send a Heartbeat Request to a MAG if there is no active Binding Cache entry created by that MAG.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
