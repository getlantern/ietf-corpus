document: rfc-6265
kind: protocol-element
summary: The Secure attribute restricts the cookie to 'secure' channels (typically HTTPS/TLS). It protects only the cookie's confidentiality in transit; an active network attacker can still overwrite Secure cookies from an insecure channel, undermining their integrity.
section: 4.1.2.5
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
