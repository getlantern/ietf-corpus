document: rfc-5712
kind: state-machine
summary: 'Soft preemption defines a ''PPend'' (Preemption Pending) state for a TE LSP: entered when the preempting node zeros local BW accounting and sends a PathErr Reroute notification; exited either by successful make-before-break reroute (head-end tears old path) or by timer expiry triggering hard preemption (PathTear + ResvTear or PathErr with Path_State_Removed).'
section: "6.1"
