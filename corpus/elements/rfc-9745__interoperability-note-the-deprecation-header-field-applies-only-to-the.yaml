document: rfc-9745
kind: interoperability-note
summary: The Deprecation header field applies only to the specific resource identified by the response (per Section 6.4.2 of RFC 9110). Servers may define an increased scope (e.g., all API resources), but consumers unaware of that scope will interpret the header as applying to the single resource only.
section: "2.2"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
