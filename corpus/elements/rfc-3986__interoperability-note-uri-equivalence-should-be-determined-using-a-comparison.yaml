document: rfc-3986
kind: interoperability-note
summary: 'URI equivalence should be determined using a comparison ladder: simple string comparison (always required), syntax-based normalization (percent-encoding case, default port removal, dot-segment removal), scheme-based normalization, and protocol-based normalization (e.g., HTTP HEAD). Stronger normalization reduces false inequalities at the cost of additional processing.'
section: "6.2"
topics:
    - http
