document: rfc-3776
kind: design-rationale
summary: IKEv1 main mode with preshared secrets cannot determine the correct key from a care-of address (unlike a stable home address), requiring aggressive mode when preshared secrets are used; certificates with home addresses in SubjectAltName are also complicated because many IKE implementations cannot carry IKE on one address while another is named in the certificate.
section: "4.4"
topics:
    - ipsec
    - mobility
    - security
