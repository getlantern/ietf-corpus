summary: The decompression buffer is prefixed by a 48-byte predefined dictionary consisting of the source IPv6 address (16 bytes), destination IPv6 address (16 bytes), and a 16-byte static dictionary (16 fe fd 17 fe fd 00 01 00 00 00 00 00 01 00 00). These bytes are available for backreferencing but not copied into the final payload.
