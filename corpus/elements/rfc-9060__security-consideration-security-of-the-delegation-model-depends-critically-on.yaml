document: rfc-9060
kind: security-consideration
summary: Security of the delegation model depends critically on enforcement of 'encompassing' semantics. When delegating from an SPC-based TNAuthList to telephone number ranges, verifying encompassing may require access to industry numbering databases that may not exist in all operating environments; how this is policed is left to operational profiles.
section: "12"
topics:
