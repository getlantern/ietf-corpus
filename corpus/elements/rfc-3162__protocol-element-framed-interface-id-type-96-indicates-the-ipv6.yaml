document: rfc-3162
kind: protocol-element
summary: Framed-Interface-Id (Type 96) indicates the IPv6 interface identifier to be configured for the user. It MAY be used in Access-Accept packets and has a fixed length of 10 octets (2 octets header + 8 octets interface ID).
