document: rfc-3987
kind: security-consideration
summary: Software automatically detecting IRIs in plain text must not treat a non-ASCII character as the end of an IRI, and must correctly transcode the detected IRI from the document's character encoding to the system-wide invocation mechanism's encoding, otherwise the wrong resource may be retrieved.
section: "7.3"
topics:
    - security
    - ip
