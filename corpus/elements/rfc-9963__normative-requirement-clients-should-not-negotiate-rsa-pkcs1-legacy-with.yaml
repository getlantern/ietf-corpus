document: rfc-9963
kind: normative-requirement
summary: Clients SHOULD NOT negotiate rsa_pkcs1_*_legacy with keys that support RSASSA-PSS, though this may not be practical to determine in all applications (e.g., testing a key for support might produce side effects).
