document: rfc-4201
kind: protocol-element
summary: 'For a bidirectional LSP, one or two TLVs SHOULD be used: the first always indicates the downstream component link identifier, and the optional second indicates the upstream component link identifier. If only one TLV is present, it serves both directions.'
section: "2.3"
topics:
