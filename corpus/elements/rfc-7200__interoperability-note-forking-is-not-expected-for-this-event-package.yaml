document: rfc-7200
kind: interoperability-note
summary: Forking is not expected for this event package because subscriptions are addressed to clearly defined neighboring SIP entities. In the unlikely case forking does occur, only the first potential dialog-establishing message may create a dialog, per RFC 6665 Section 5.4.9.
section: "4.9"
