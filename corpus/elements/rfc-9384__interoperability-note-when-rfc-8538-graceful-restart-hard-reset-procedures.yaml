document: rfc-9384
kind: interoperability-note
summary: When RFC 8538 Graceful Restart Hard Reset procedures apply alongside a BFD Down event, the 'BFD Down' subcode must be encapsulated inside the Hard Reset NOTIFICATION data field rather than used as a standalone subcode, ensuring both mechanisms interoperate correctly.
