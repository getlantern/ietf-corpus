document: rfc-6667
kind: design-rationale
summary: Using a Typed Wildcard PW FEC in an LDP Address Withdraw message allows a PE to withdraw MAC addresses for all VPLS instances (or all instances of a given PW type) in a single message, avoiding the per-VPLS-instance Address Withdraw messages otherwise required by RFC 4762 procedures.
section: "4.4"
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
