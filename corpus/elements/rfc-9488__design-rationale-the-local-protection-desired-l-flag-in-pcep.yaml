document: rfc-9488
kind: design-rationale
summary: The Local Protection Desired (L) flag in PCEP's LSPA object originated in RSVP-TE, where it signals to downstream routers that they may use local repair, but does not require them to do so. Different PCEP implementations interpreted the L flag as either PROTECTION MANDATORY or PROTECTION PREFERRED, creating operational inconsistencies that this document resolves.
section: "4.1"
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
