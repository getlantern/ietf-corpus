document: rfc-1377
kind: design-rationale
summary: OSI protocols have peculiar alignment problems because they are often encapsulated in data link protocols with odd-length headers, while PPP defaults to even-length headers. A router switching an OSI packet may encounter inconvenient memory boundaries, addressable by leading zero padding.
section: "2.2"
topics:
