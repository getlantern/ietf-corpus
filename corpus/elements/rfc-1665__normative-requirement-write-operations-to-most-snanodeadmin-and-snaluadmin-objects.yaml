document: rfc-1665
kind: normative-requirement
summary: Write operations to most snaNodeAdmin and snaLuAdmin objects do not take effect (i.e., do not change the corresponding Oper object values) until the Node has been re-activated. Exceptions include snaNodeAdminEnablingMethod (may change immediately for demand↔onlyMS transitions) and snaNodeAdminHostDescription.
section: "4"
rfc2119_level: MUST NOT
topics:
    - snmp
