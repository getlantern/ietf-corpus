document: rfc-1493
kind: wire-format
summary: MacAddress is a 6-octet OCTET STRING encoded in 'canonical' order (least significant bit first, as defined by IEEE 802.1a), even for 802.5 which transmits MAC addresses MSB first. 16-bit addresses are represented by setting the upper 4 octets to zero (e.g., AAFF → 00000000AAFF).
