document: rfc-3173
kind: normative-requirement
summary: The CPI SHOULD be sent as a 16-bit number in the IKE SPI field (SPI size=2). It MAY be sent as a 32-bit value (SPI size=4), with the CPI in the two least significant octets and the two most significant octets set to zero and ignored. The receiving node MUST be able to process both forms.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - ip
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
