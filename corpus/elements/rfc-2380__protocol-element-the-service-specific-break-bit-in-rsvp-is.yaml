document: rfc-2380
kind: protocol-element
summary: The service-specific break bit in RSVP is used to signal to receivers that RSVP and Integrated Services are supported by the router but that the requested service cannot be delivered over the ATM network. This is distinct from the global break bit.
section: "3.3"
