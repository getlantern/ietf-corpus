document: rfc-7283
kind: protocol-element
summary: 'A message is valid for constructing a new Relay-forward message if: (a) it is a Relay-forward message, (b) the relay agent recognizes the message type and is not the intended target, or (c) the relay agent does not recognize the message type. This extends Section 20.1 of RFC 3315.'
section: "4.1"
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
