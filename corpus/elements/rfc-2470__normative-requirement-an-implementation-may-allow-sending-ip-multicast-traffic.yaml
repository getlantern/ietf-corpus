document: rfc-2470
kind: normative-requirement
summary: An implementation MAY allow sending IP multicast traffic using an All Routes Explorer (for compatibility with old bridges that do not support Spanning Tree Explorer), but this ability must be configurable by a system administrator and the default MUST be to use the Spanning Tree Explorer.
section: "7"
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
