document: rfc-3963
kind: design-rationale
summary: The protocol places no restriction on the number of levels of nested mobility (Mobile Router attaching to another Mobile Router's network), but notes that each nesting level introduces an additional IPv6 header encapsulation overhead. Loops must be avoided, making the nesting graph a tree in Basic Support.
section: "1"
