document: rfc-9241
kind: security-consideration
summary: An attacker may impersonate an ALTO server for a dCDN and provide false capabilities/footprints, potentially causing a uCDN to select incorrect dCDNs. Additionally, a dCDN could deliberately provide limited capabilities to avoid serving traffic, or launch DoS attacks via resource-intensive queries.
section: "8"
topics:
    - security
