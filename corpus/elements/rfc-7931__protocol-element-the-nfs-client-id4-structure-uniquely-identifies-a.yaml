document: rfc-7931
kind: protocol-element
summary: The nfs_client_id4 structure uniquely identifies a specific client boot instance. It contains a verifier4 field (boot instance identifier used to detect client reboots) and an opaque id field (variable-length, up to NFS4_OPAQUE_LIMIT bytes) that uniquely identifies the client across reboots. The server uses this structure to manage leases and detect when a client has rebooted.
section: 5.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
