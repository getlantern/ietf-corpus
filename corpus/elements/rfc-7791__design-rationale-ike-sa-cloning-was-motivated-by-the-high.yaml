document: rfc-7791
kind: design-rationale
summary: IKE SA cloning was motivated by the high cost (multiple round trips, user interaction for EAP-SIM/EAP-TLS, crypto overhead) of full IKEv2 re-authentication when establishing VPNs on multiple interfaces. Reusing an authenticated SA avoids this delay while enabling parallel VPNs.
section: "1"
topics:
    - ipsec
    - vpn
