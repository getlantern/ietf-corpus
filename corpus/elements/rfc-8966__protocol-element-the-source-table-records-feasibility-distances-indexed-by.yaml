document: rfc-8966
kind: protocol-element
summary: The source table records feasibility distances, indexed by triples (prefix, plen, router-id). Each entry stores the minimum (seqno, metric) distance ever advertised by the local node for that source. It is shared across all route table entries with the same source and is garbage-collected after a timer on the order of minutes.
section: 3.2.5
topics:
    - routing
