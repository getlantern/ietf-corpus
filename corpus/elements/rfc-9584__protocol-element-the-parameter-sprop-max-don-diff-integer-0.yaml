document: rfc-9584
kind: protocol-element
summary: The parameter sprop-max-don-diff (integer 0–32767) specifies the maximum AbsDon difference between any two NAL units where one precedes in decoding order but follows in transmission order. sprop-depack-buf-bytes signals the required de-packetization buffer size in bytes (0–4294967295). depack-buf-cap signals the receiver's available de-packetization buffer capacity.
section: "7.2"
