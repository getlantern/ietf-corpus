document: rfc-7956
kind: normative-requirement
summary: An IP router or ES connected to an edge RBridge through an external L3 network SHOULD run an IP routing protocol with that edge RBridge so the RBridge can learn the prefixes behind it; without such a protocol, only explicitly configured prefixes are accessible.
section: "5.1"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
