document: rfc-3267
kind: design-rationale
summary: 'Two payload modes are provided: bandwidth-efficient packs all bits contiguously to minimize padding overhead, while octet-aligned aligns every field individually for implementation efficiency. Only octet-aligned mode supports the advanced robustness features: robust sorting, interleaving, and frame CRC.'
