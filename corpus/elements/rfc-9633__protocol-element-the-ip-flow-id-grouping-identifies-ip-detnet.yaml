summary: 'The ''ip-flow-id'' grouping identifies IP DetNet flows using: src/dest IP prefix (inet:ip-prefix), protocol/next-header (uint8), DSCP (inet:dscp), IPv6 flow-label, source and destination port ranges (range or operator), and optionally an IPsec SPI (uint32, range 1..max, per RFC 4303 ESP).'
