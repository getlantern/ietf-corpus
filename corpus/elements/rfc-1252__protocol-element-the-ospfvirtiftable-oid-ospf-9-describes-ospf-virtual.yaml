document: rfc-1252
kind: protocol-element
summary: The ospfVirtIfTable (OID ospf 9) describes OSPF virtual links, indexed by ospfVirtIfAreaID (the transit area, which must not be 0.0.0.0) and ospfVirtIfNeighbor (the far-end RouterID). Fields mirror the physical interface table but ospfVirtIfState is limited to down(1) and pointToPoint(4).
section: "5.9"
topics:
    - snmp
    - routing
