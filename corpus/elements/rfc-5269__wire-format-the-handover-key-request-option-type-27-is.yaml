document: rfc-5269
kind: wire-format
summary: The Handover Key Request Option (Type=27) is a TLV IPv6 Neighbor Discovery option carried in RtSolPr. It contains an 8-bit Type, 8-bit Length (in units of 8 octets), 8-bit Pad Length, 4-bit AT algorithm type field, 4-bit Reserved field, a variable-length Handover Key Encryption Public Key, and variable-length Padding.
section: "4.1"
