document: rfc-3195
kind: normative-requirement
summary: BEEP peer identities used for SASL authentication SHOULD correspond to the FQDN of the initiating peer; e.g., a relay on relay.example.com should use 'relay.example.com' as the SASL user ID and as the FQDN in its 'iam' element.
section: "5.5"
rfc2119_level: SHOULD
topics:
    - syslog
    - security
    - crypto
