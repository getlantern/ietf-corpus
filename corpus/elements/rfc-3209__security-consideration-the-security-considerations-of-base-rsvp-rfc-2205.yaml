document: rfc-3209
kind: security-consideration
summary: The security considerations of base RSVP (RFC 2205) apply to this specification. LSP tunnels bypass normal IP routing and filtering mechanisms; operators should consider that label-switched traffic is opaque to intermediate nodes and may circumvent IP-layer access controls.
section: "6"
topics:
    - mpls
    - routing
    - security
