document: rfc-5365
kind: normative-requirement
summary: A MESSAGE URI-list service MUST include a From header field in the outgoing MESSAGE request whose value is the same as the From header field in the incoming MESSAGE request, subject to privacy requirements. Failure to do so results in unacceptable security and privacy failures.
section: "7.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
