document: rfc-4871
kind: protocol-element
summary: Selectors subdivide the key namespace within a signing domain to support multiple concurrent public keys. Given d=example.com and s=foo.bar, the DNS lookup is for foo.bar._domainkey.example.com. Periods in selectors create DNS label boundaries.
