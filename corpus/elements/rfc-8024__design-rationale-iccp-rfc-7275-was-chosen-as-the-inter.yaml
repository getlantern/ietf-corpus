kind: design-rationale
summary: ICCP (RFC 7275) was chosen as the inter-chassis communication framework for MC-PON because it already provides a generic mechanism for synchronizing state and configuration between a set of PEs, and it only required application-specific TLV extensions rather than a new protocol.
