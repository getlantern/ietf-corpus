document: rfc-9525
kind: protocol-element
summary: IP-ID is a subjectAltName entry of type iPAddress as defined in PKIX. It is direct and unrestricted. An IP address is either a 4-octet IPv4 address or a 16-octet IPv6 address, and identifiers may need to be converted from textual representation to obtain the raw value for matching.
section: "1.5"
topics:
