document: rfc-5183
kind: normative-requirement
summary: The environment test MUST fail unconditionally if the specified information item does not exist. A script MUST NOT fail with an error if the item does not exist, allowing scripts to handle nonexistent items gracefully.
section: "4"
rfc2119_level: MUST
