document: rfc-9922
kind: protocol-element
summary: 'Two YANG features are defined: ''basic-recurrence'' (server supports basic scheduled recurrence) and ''icalendar-recurrence'' (server supports comprehensive iCalendar-based recurrence per RFC 5545 Sections 3.3.10 and 3.8.5). Implementations may support one or both depending on the scheduling context.'
section: "3.1"
topics:
