document: rfc-8138
kind: normative-requirement
summary: The IP-in-IP-6LoRH Hop Limit field MUST be at least 1; when it reaches 0 the packet is dropped per RFC 2460. The minimum valid Length of an IP-in-IP-6LoRH header is therefore 1 (Hop Limit only, Encapsulator Address elided).
section: "7"
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
