document: rfc-9965
kind: protocol-element
summary: The NAI 'portal@tls.eap.arpa' signals that an EAP peer wishes to obtain peer unauthenticated EAP-TLS access to a captive portal, as defined in RFC 5216 Section 2.1.1 and RFC 9190. The EAP server must authenticate itself (e.g., via server certificate), and the peer must be placed into a limited captive portal network.
section: "4.2"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
