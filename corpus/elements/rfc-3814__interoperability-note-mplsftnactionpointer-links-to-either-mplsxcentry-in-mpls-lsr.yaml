document: rfc-3814
kind: interoperability-note
summary: mplsFTNActionPointer links to either mplsXCEntry in MPLS-LSR-STD-MIB (RFC 3813) for non-TE LSP actions or mplsTunnelEntry in MPLS-TE-STD-MIB (RFC 3812) for TE tunnel actions. If the pointed-to row does not currently exist, no action is taken on matching packets until that row is created.
