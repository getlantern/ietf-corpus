document: rfc-4217
kind: protocol-element
summary: The AUTH TLS command (parameter 'TLS') initiates TLS negotiation on the FTP control connection. The server responds with '234' to indicate it will honor the request; '334' is incorrect for this exchange as no ADAT command follows.
