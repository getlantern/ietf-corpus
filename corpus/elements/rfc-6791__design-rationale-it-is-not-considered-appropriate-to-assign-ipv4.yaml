document: rfc-6791
kind: design-rationale
summary: It is not considered appropriate to assign IPv4-translatable IPv6 addresses for all internal points in the IPv6 network that may originate ICMPv6 messages, because IPv4/IPv6 translation is intended for contexts where IPv4 addresses may not be readily available.
section: "3.1"
