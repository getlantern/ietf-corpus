document: rfc-6005
kind: protocol-element
summary: The EVPL service supports optional VLAN ID translation at the egress UNI, signaled via the explicit label control mechanism of RFC4208, allowing a different VLAN ID at egress than at ingress when bundling and VLAN ID preservation are not simultaneously required.
