document: rfc-2263
kind: protocol-element
summary: 'The SNMP-NOTIFICATION-MIB defines three tables: snmpNotifyTable (selects target addresses for notification generation and specifies trap vs. inform type), snmpNotifyFilterProfileTable (sparsely augments snmpTargetAddrTable to associate filter profiles with management targets), and snmpNotifyFilterTable (defines subtree-based filters controlling which notifications are sent to particular targets).'
section: "4.2"
topics:
    - snmp
