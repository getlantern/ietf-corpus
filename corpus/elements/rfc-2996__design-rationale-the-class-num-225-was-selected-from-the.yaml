document: rfc-2996
kind: design-rationale
summary: The Class-Num 225 was selected from the range of unknown RSVP object classes that must be ignored and forwarded by unrecognized nodes. This choice ensures that DCLASS objects pass through non-DCLASS-aware RSVP nodes without disruption, maximizing backward compatibility in deployments with mixed RSVP implementations.
