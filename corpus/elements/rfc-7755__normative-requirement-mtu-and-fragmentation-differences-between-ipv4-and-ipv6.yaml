document: rfc-7755
kind: normative-requirement
summary: MTU and fragmentation differences between IPv4 and IPv6 MUST be considered when deploying SIIT-DC. The recommendations in Section 4.9 seek to minimize IPv6 fragmentation, which operators may find undesired or operationally impossible.
section: "4.9"
rfc2119_level: MUST
