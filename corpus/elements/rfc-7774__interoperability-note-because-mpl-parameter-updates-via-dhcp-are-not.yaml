document: rfc-7774
kind: interoperability-note
summary: Because MPL parameter updates via DHCP are not synchronized across nodes, nodes may temporarily hold inconsistent parameter sets. Inconsistent Trickle timer parameters reduce performance but remain functional as long as both old and new sets are reasonable for the communication load. Operators must account for nodes that lag behind refresh intervals.
section: "2.6"
topics:
    - routing
