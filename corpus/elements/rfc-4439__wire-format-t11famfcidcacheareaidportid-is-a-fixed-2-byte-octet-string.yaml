document: rfc-4439
kind: wire-format
summary: t11FamFcIdCacheAreaIdPortId is a fixed 2-byte OCTET STRING encoding the Area_ID and Port_ID of the first FC address identifier in a cached range. t11FamFcIdCachePortIds (Unsigned32, 0..65535) gives the count of consecutive identifiers in that range.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
