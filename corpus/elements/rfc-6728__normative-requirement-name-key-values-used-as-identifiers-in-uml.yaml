document: rfc-6728
kind: normative-requirement
summary: Name key values used as identifiers in UML associations and multi-occurrence aggregations MUST be unique within the given XML subtree. This uniqueness requirement is mandated by YANG for list keys and enables individual NETCONF addressability.
section: "3.2"
rfc2119_level: MUST
topics:
    - yang
    - netconf
