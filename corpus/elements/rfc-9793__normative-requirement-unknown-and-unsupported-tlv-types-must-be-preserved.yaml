document: rfc-9793
kind: normative-requirement
summary: Unknown and unsupported TLV types MUST be preserved and propagated within the BIER attribute. The presence of unknown or unexpected TLVs MUST NOT result in the NLRI or the BIER attribute being considered malformed.
section: "3"
rfc2119_level: MUST
