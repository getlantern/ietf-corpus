document: rfc-9142
kind: protocol-element
summary: ECC key exchange methods for SSH include ECDH using curve25519 (128-bit security), curve448 (224-bit security), nistp256 (128-bit), nistp384 (192-bit), and nistp521 (512-bit), as well as ECMQV. GSS-API variants prefixed with 'gss-' are defined for all these curves.
section: "3.1"
