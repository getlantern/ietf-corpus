document: rfc-3321
kind: normative-requirement
summary: For a shared state, the state_address and state_instruction parameters must be set to zero, state_retention_priority must be set to 65535, and other parameters follow RFC 3320. This ensures the shared state is independent of the compression algorithm used in each direction.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
