document: rfc-854
kind: wire-format
summary: The NVT character set is 7-bit USASCII in an 8-bit field. The NVT printer recognizes NUL (0, no-op), LF (10, next line same column), and CR (13, left margin) as required; BEL (7), BS (8), HT (9), VT (11), and FF (12) have defined but non-required effects. Codes 32–126 are the 95 printable USASCII graphics.
section: THE NETWORK VIRTUAL TERMINAL
