document: rfc-8414
kind: wire-format
summary: 'The metadata document is retrieved via an HTTP GET request. For an issuer with no path component (e.g., ''https://example.com''), the metadata URL is ''https://example.com/.well-known/oauth-authorization-server''. For an issuer with a path (e.g., ''https://example.com/issuer1''), the well-known string is inserted before the path: ''https://example.com/.well-known/oauth-authorization-server/issuer1''.'
section: "3.1"
topics:
    - oauth
    - http
