document: rfc-7641
kind: normative-requirement
summary: The Content-Format in a 2.xx notification MUST be the same as in the initial response to the GET request. If the server cannot continue sending in that format, it SHOULD send a 4.06 (Not Acceptable) notification and MUST remove the entry from the observer list.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
