document: rfc-1390
kind: normative-requirement
summary: Gateway implementations must be prepared to accept packets as large as the MTU and fragment them when necessary. Gateways should also be able to accept packets as large as can be carried within a maximum-size FDDI frame.
section: MAC Layer Details
rfc2119_level: MUST
topics:
    - ip
