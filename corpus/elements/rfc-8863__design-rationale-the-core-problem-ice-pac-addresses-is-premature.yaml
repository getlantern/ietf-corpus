document: rfc-8863
kind: design-rationale
summary: 'The core problem ICE PAC addresses is premature ICE failure: if an agent runs out of candidate pairs to check before inbound connectivity checks from the remote peer have had a chance to trigger peer-reflexive candidate discovery, it will declare failure even though a valid pair could still be found.'
