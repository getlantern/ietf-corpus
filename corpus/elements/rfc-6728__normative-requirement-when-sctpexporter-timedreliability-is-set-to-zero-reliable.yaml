document: rfc-6728
kind: normative-requirement
summary: When SctpExporter timedReliability is set to zero, reliable SCTP transport MUST be used for all Data Records. Regardless of timedReliability, the Exporting Process MAY use reliable transport for Data Sets associated with certain Options Templates.
section: 4.4.1
rfc2119_level: MUST
topics:
    - measurement
    - sctp
