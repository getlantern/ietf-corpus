document: rfc-2948
kind: protocol-element
summary: 'The number of DES keys to use is derived as: keys_to_use = bytes of key data / 8. Keys are labeled key1 through key6 in 8-byte segments. Different key assignments apply depending on whether 2, 3, 4, 5, or 6 keys are available, with server and client using distinct key combinations.'
