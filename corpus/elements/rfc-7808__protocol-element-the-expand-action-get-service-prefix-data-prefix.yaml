document: rfc-7808
kind: protocol-element
summary: The "expand" action (GET {/service-prefix,data-prefix}/zones{/tzid}/observances{?start,end}) returns pre-computed observances over a fixed period, each with an onset UTC date-time, utc-offset-from, and utc-offset-to in seconds, enabling thin clients to determine UTC offsets without evaluating DST rules.
section: "5.4"
