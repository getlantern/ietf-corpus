document: rfc-4250
kind: security-consideration
summary: The SSH protocol provides a secure encrypted channel over an insecure network. Full security considerations are deferred to the SSH Architecture document (RFC 4251); RFC 4250 itself only establishes IANA registries and does not define new cryptographic mechanisms.
