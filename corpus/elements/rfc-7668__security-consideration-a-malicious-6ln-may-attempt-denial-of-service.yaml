document: rfc-7668
kind: security-consideration
summary: A malicious 6LN may attempt denial-of-service attacks such as packet flooding. Mitigations include not bridging link-local multicast between Bluetooth LE links and rate-limiting per-6LN traffic using Bluetooth LE L2CAP credit-based flow control.
section: "4"
topics:
