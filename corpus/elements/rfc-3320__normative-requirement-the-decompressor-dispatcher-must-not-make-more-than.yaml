document: rfc-3320
kind: normative-requirement
summary: The decompressor dispatcher MUST NOT make more than one SigComp message available to a given instance of the UDVM; in particular, it MUST NOT concatenate two SigComp messages to form a single message.
section: "4.2"
rfc2119_level: MUST NOT
