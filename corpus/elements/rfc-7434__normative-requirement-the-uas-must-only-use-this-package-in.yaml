document: rfc-7434
kind: normative-requirement
summary: The UAS MUST only use this package in association with the initial INVITE and BYE methods. The UAS MUST NOT include the User-to-User header field in a dialog if the original INVITE did not include it, and MUST NOT include it in header URI parameters of 3xx redirect responses.
section: "8"
rfc2119_level: MUST
topics:
    - sip
    - realtime
