document: rfc-9326
kind: security-consideration
summary: Integrity protection mechanisms defined in IOAM-DATA-INTEGRITY are not applicable to the DEX Option-Type because DEX does not include IOAM-Data-Fields. Injection or modification of IOAM-Option-Type headers are acknowledged threats not addressed in IOAM; integrity protection must rely on the encapsulating protocol.
section: "6"
topics:
    - security
    - measurement
