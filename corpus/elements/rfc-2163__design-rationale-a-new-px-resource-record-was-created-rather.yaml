document: rfc-2163
kind: design-rationale
summary: A new PX resource record was created rather than reusing existing DNS RR types (e.g., PTR) to avoid clashes with existing data structures and to provide an appropriate data structure for the specific format and syntax of MCGAM rules, as well as to allow flexibility for future development.
