document: rfc-7591
kind: security-consideration
summary: If a server receives a registration for a client sharing the same 'software_id' and 'software_version' as an existing registration and does not expect multiple simultaneous instances, it SHOULD treat the new registration as suspect and reject it to prevent impersonation.
section: "5"
topics:
