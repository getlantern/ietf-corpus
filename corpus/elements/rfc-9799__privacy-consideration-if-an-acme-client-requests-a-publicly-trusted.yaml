document: rfc-9799
kind: privacy-consideration
summary: If an ACME client requests a publicly trusted WebPKI certificate, the Hidden Service's existence is exposed publicly via Certificate Transparency logs. Hidden Service operators MUST consider the CT privacy implications before requesting WebPKI certificates; ACME client developers SHOULD warn users about this risk.
section: "8.9"
topics:
    - privacy
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
