document: rfc-2449
kind: normative-requirement
summary: If a server supports PIPELINING, it MUST process each command in turn. If a client uses PIPELINING, it MUST keep track of outstanding commands and match server responses to commands in order. If either side uses blocking writes, it MUST NOT exceed the window size of the underlying transport layer.
section: "6.6"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
