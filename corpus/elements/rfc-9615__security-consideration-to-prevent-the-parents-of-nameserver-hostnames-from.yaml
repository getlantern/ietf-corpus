document: rfc-9615
kind: security-consideration
summary: To prevent the parents of nameserver hostnames from becoming single points of failure (both for resolution availability and for the protocol's trust model), operators are advised to diversify the path from the root to nameserver hostnames, for example by using different independently operated TLDs for each nameserver.
section: "6"
topics:
    - dns
    - security
