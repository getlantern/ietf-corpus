document: rfc-4287
kind: wire-format
summary: Date constructs encode a date-time value conforming to the RFC 3339 'date-time' production. An uppercase 'T' MUST separate date and time, and an uppercase 'Z' MUST be present when no numeric time zone offset is provided.
section: "3.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
