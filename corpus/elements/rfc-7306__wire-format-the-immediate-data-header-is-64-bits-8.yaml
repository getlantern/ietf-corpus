document: rfc-7306
kind: wire-format
summary: The Immediate Data Header is 64 bits (8 bytes) of opaque ULP data placed immediately after the DDP header. Both Immediate Data (opcode 1000b) and Immediate Data with SE (opcode 1001b) carry exactly this 8-byte payload and no additional ULP message payload.
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
