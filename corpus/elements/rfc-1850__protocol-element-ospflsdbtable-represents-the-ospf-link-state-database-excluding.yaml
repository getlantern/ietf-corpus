document: rfc-1850
kind: protocol-element
summary: ospfLsdbTable represents the OSPF Link State Database (excluding AS External LSAs), indexed by ospfLsdbAreaId, ospfLsdbType, ospfLsdbLsid, and ospfLsdbRouterId. LSA types include routerLink(1), networkLink(2), summaryLink(3), asSummaryLink(4), asExternalLink(5), multicastLink(6), and nssaExternalLink(7). The full raw advertisement is exposed via ospfLsdbAdvertisement (OCTET STRING).
section: "3.4"
