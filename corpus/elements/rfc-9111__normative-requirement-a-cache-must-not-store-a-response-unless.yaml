document: rfc-9111
kind: normative-requirement
summary: 'A cache MUST NOT store a response unless: the request method is understood, the response status is final, no no-store directive is present, shared-cache restrictions on private/Authorization are satisfied, and the response contains at least one of: public/private directive, Expires, max-age, s-maxage, a permitting cache extension, or a heuristically cacheable status code.'
section: "3"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
