summary: The OSPF KEY-CHAIN-NAME sub-TLV has Type=7, variable Length (padding not included), followed by the Key Chain Name string zero-padded to 4-octet alignment. The IS-IS variant uses the same Type=7 with variable length encoding the value field length.
