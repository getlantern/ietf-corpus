document: rfc-8419
kind: interoperability-note
summary: PureEdDSA requires two passes over the input, which may cause API or bandwidth issues in environments that assume digital signature algorithms only need one pass. This is especially relevant when signed-data is used without signed attributes over large content.
section: "4"
topics:
