document: rfc-4033
kind: design-rationale
summary: DNSSEC deliberately does not provide confidentiality, as DNS was designed on the assumption that responses are identical regardless of the querier and all data is visible. Access control lists and differentiation between inquirers are explicitly out of scope.
section: "4"
topics:
    - dns
    - security
    - privacy
