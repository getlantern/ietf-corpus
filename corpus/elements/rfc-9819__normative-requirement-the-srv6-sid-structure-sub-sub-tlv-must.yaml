document: rfc-9819
kind: normative-requirement
summary: The SRv6 SID Structure Sub-Sub-TLV MUST be included when signaling an SRv6 SID corresponding to an Endpoint Behavior that supports arguments. This allows the receiver to verify argument consistency and correctly encode the ARG value within the SID.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
