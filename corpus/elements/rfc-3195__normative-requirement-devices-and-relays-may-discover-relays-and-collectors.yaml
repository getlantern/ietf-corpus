document: rfc-3195
kind: normative-requirement
summary: Devices and relays MAY discover relays and collectors via the DNS SRV algorithm, using service name 'syslog' and protocol 'tcp'. This allows central administration, fallback for failures, and static load balancing, though hardware or firewall constraints may make DNS SRV inappropriate.
section: "2"
rfc2119_level: MAY
topics:
    - syslog
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
