document: rfc-4072
kind: protocol-element
summary: The Diameter-EAP-Answer (DEA) command uses Command-Code 268 with the 'R' bit cleared. It is sent by the server to indicate multi-round continuation (DIAMETER_MULTI_ROUND_AUTH), authentication success (DIAMETER_SUCCESS with optional EAP-Master-Session-Key and authorization AVPs), or failure.
section: "3.2"
