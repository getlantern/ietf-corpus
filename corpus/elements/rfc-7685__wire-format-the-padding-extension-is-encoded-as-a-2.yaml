summary: The padding extension is encoded as a 2-byte extension_type (0x00 0x15 for value 21), a 2-byte extension_data length field, followed by zero or more zero bytes. The smallest valid encoding is four bytes (0x00 0x15 0x00 0x00 with zero-length extension_data).
