document: rfc-9733
kind: normative-requirement
summary: 'The ''<enrollment-protocol>'' URI component MUST reference the protocol being used (existing values: ''est'', ''cmp''). If present, the ''<request>'' path component MUST describe the operation requested depending on the enrollment protocol.'
