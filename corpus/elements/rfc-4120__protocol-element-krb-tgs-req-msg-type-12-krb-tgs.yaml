document: rfc-4120
kind: protocol-element
summary: KRB_TGS_REQ (msg-type 12) / KRB_TGS_REP (msg-type 13) form the Ticket-Granting Service exchange. The client authenticates using a TGT embedded in a PA-TGS-REQ padata element, and the KDC returns a new service ticket encrypted in the TGT's session key.
