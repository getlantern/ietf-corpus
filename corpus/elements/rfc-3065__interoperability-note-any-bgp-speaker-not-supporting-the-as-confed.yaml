document: rfc-3065
kind: interoperability-note
summary: Any BGP speaker not supporting the AS_CONFED_SET and AS_CONFED_SEQUENCE extensions will generate a NOTIFICATION message specifying an UPDATE Message Error with sub-code Malformed AS_PATH when it receives an UPDATE containing these segment types.
