document: rfc-4106
kind: normative-requirement
summary: The AES-GCM-ESP IV field MUST be eight octets. For a given key, the IV MUST NOT repeat. The encrypter may use any IV generation method (e.g., counter, LFSR) that meets the uniqueness requirement without coordinating with the decrypter.
section: "3.1"
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
