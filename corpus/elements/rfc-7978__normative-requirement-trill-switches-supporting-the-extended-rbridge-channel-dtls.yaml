document: rfc-7978
kind: normative-requirement
summary: TRILL switches supporting the extended RBridge Channel DTLS Pairwise SType MUST support the use of pre-shared keys. If the psk_identity is two bytes, it is treated as a Key ID (RFC 5310) and the value derived via HKDF (Section 4.1) is used as the pre-shared key.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
    - security
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
