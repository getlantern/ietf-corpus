document: rfc-4606
kind: design-rationale
summary: GMPLS virtual concatenation components must travel over the same component link if they are part of the same LSP, because labels are bound to a single component link. This is a restriction compared to the standard ANSI/ITU-T definition that allows each VCAT component to travel over diverse paths; in GMPLS, multi-path VCAT requires establishing separate LSPs that are then associated.
section: "3"
