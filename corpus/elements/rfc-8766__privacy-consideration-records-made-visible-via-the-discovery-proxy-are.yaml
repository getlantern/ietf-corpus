document: rfc-8766
kind: privacy-consideration
summary: Records made visible via the Discovery Proxy are queryable from anywhere in the world, potentially leaking device presence and location (e.g., a mobile device appearing/disappearing in 'My House.example.com'). The IPv4/IPv6 reverse zones are especially sensitive, allowing attackers to enumerate hosts and infer network activity.
section: "9.2"
topics:
    - privacy
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
