summary: 'A system journal is a 2-octet header (S flag, D/V/Q/F/X TOC bits, 10-bit LENGTH) followed by system chapters: D (Song Select, Tune Request, Reset, undefined commands), V (Active Sense), Q (Sequencer State), F (MTC Tape Position), X (System Exclusive).'
