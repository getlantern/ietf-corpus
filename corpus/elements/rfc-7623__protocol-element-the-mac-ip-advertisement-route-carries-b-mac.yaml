document: rfc-7623
kind: protocol-element
summary: The MAC/IP Advertisement route carries B-MAC addresses of PE nodes rather than C-MAC addresses of end-stations. The MAC address field contains the B-MAC, the Ethernet Tag is set to 0, and the route is tagged with the RT of the associated EVI (analogous to B-VID).
section: "5.2"
topics:
