document: rfc-7234
kind: normative-requirement
summary: A cache MUST NOT store a response unless the request method is understood and cacheable, the response status code is understood, no 'no-store' directive is present, the 'private' directive is absent (for shared caches), the Authorization header is absent (for shared caches, unless explicitly overridden), and the response contains an explicit expiration indicator, a cacheable-by-default status code, or a 'public' directive.
section: "3"
rfc2119_level: MUST NOT
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
