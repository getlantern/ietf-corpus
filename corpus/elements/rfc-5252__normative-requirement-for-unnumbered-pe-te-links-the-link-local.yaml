document: rfc-5252
kind: normative-requirement
summary: For unnumbered PE TE links, the Link Local Identifier field MUST contain a value advertised per RFC 4203 in a Link Local/Remote Identifiers link sub-TLV. For numbered links, this field MUST be set to 0.
