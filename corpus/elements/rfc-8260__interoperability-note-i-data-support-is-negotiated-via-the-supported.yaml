document: rfc-8260
kind: interoperability-note
summary: I-DATA support is negotiated via the Supported Extensions Parameter (RFC 5061) during association setup. Both endpoints must indicate I-DATA support for it to be used. Implementations must coexist with both DATA-only and I-DATA associations simultaneously.
