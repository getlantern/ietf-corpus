document: rfc-9039
kind: privacy-consideration
summary: 'DEV URNs as long-term stable unique identifiers have privacy implications: they enable correlating information about a specific device over long periods and location tracking. In some systems, identifiers cannot be changed, so they should be used with care per RFC 7721.'
section: "6.1"
topics:
    - privacy
    - security
