document: rfc-6080
kind: normative-requirement
summary: If profile data provided via content indirection contains sensitive data, the PDS MUST use an HTTPS URI. PCCs and devices MUST NOT use plain HTTP for sensitive profile data, except when bootstrapping a device via the device profile for the first time.
section: 5.2.2
rfc2119_level: MUST
topics:
    - sip
    - security
    - http
    - tls
