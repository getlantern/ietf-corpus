document: rfc-4622
kind: security-consideration
summary: XMPP addresses of the form node@domain/resource are ephemeral (tied to temporary client sessions), so the IRI/URI identifying such an address may not reliably identify the same session over time. Addresses of the form domain.tld are the most stable.
section: "5.1"
topics:
    - security
