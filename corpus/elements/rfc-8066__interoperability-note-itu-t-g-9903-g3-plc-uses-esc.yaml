document: rfc-8066
kind: interoperability-note
summary: ITU-T G.9903 (G3-PLC) uses ESC dispatch type with Command IDs 0x01 to 0x1F for native mesh routing and bootstrapping. The G.9903 frame format uses the ESC octet followed by a Command ID and Command Payload.
