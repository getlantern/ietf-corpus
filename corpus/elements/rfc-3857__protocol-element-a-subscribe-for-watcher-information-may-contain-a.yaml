document: rfc-3857
kind: protocol-element
summary: 'A SUBSCRIBE for watcher information MAY contain a body for filtering purposes. Without a body, the default policy applies: notifications are generated on every state change, SUBSCRIBE-triggered notifications carry full state, and change-triggered notifications carry only the changed watcher''s state.'
section: "4.3"
topics:
