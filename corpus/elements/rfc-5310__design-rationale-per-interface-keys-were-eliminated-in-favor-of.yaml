document: rfc-5310
kind: design-rationale
summary: Per-interface keys were eliminated in favor of Key IDs that map to IS-IS Security Associations. This allows different authentication algorithms to be associated with different Key IDs, enabling smooth key rollover and introduction of new authentication mechanisms without disrupting IS-IS peering.
section: "2"
topics:
    - routing
    - security
