document: rfc-8431
kind: security-consideration
summary: The 'receive' special nexthop and route-add RPC can be used to direct arbitrary traffic to a device's control plane, creating potential for DoS attacks on the router; the YANG model includes a rate-limiter option on the 'receive' special nexthop specifically to mitigate this risk.
section: "3"
topics:
    - yang
    - routing
    - security
