document: rfc-7155
kind: normative-requirement
summary: When a user's session is disconnected, the NAS MUST issue a Session-Termination-Request (STR) to its Diameter server to free server resources. A NAS receiving an ASR MUST issue an ASA and disconnect the session.
section: "2.3"
rfc2119_level: MUST
topics:
    - diameter
