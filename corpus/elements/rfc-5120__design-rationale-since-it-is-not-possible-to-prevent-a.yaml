document: rfc-5120
kind: design-rationale
summary: Since it is not possible to prevent a non-MT-aware router from being DIS, distinct DIS elections per MT and special MT TLVs in pseudo-node LSPs are not supported; pseudo-node LSPs include all LAN nodes regardless of their MT capabilities.
