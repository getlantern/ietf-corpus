document: rfc-6222
kind: normative-requirement
summary: An RTP endpoint wishing to generate a long-term persistent RTCP CNAME MUST generate and store a UUID (version 1, 2, or 4 per RFC 4122) with the 'urn:uuid:' prefix stripped, yielding a 36-octet printable string used as the 'host' part.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
