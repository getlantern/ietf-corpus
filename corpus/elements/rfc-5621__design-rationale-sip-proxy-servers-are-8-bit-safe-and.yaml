document: rfc-5621
kind: design-rationale
summary: SIP proxy servers are 8-bit safe and can handle binary bodies, so there is no need to use encodings such as base64 to transport binary bodies in SIP messages. This justifies mandating binary transfer encoding as the default.
section: "3.2"
topics:
