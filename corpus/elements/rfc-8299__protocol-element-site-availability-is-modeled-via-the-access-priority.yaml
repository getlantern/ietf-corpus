document: rfc-8299
kind: protocol-element
summary: Site availability is modeled via the `access-priority` leaf (uint32) under the `availability` container of each `site-network-access`. Higher values indicate higher priority. This parameter informs the management system how to rank accesses during multihoming and traffic protection scenarios.
