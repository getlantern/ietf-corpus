document: rfc-7887
kind: security-consideration
summary: The hierarchical encoding has no additional security impact compared to RFC 5384's encoding. A forged message attack with certain attribute values is equally difficult regardless of encoding. However, a wrong message-wide attribute could affect all sources in the message—but this is equivalent to including that bad attribute for every source individually.
section: "6"
topics:
    - security
    - multicast
