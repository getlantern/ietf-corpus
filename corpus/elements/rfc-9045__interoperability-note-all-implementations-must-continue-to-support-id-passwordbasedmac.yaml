document: rfc-9045
kind: interoperability-note
summary: All implementations MUST continue to support id-PasswordBasedMAC from RFC 4211 for backward compatibility. Support for PBMAC1 (RFC 8018, Section 7.1) is optional (MAY), enabling a migration path to the newer algorithm.
