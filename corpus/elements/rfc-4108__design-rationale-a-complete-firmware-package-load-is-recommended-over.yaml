document: rfc-4108
kind: design-rationale
summary: A complete firmware package load is RECOMMENDED over incremental loading because incremental loading requires dependency tracking, a reference monitor to isolate independent code segments, and makes security evaluation of arbitrary software combinations extremely difficult.
