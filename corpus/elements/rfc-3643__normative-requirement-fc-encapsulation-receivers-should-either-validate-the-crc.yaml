document: rfc-3643
kind: normative-requirement
summary: FC Encapsulation receivers SHOULD either validate the CRC or compare the one's complement field pairs (Protocol#/-Protocol#, Version/-Version, Flags/-Flags, Frame Length/-Frame Length) to verify that an FC Encapsulation Header is being processed, according to a policy defined by the encapsulating protocol.
section: "3.1"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
