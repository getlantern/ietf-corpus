document: rfc-7981
kind: protocol-element
summary: The IS-IS Router CAPABILITY TLV (Type 242) carries a 4-octet Router ID, a 1-octet Flags field, and an optional set of sub-TLVs (0–250 octets). The total value field length ranges from 5 to 255 octets. Sub-TLVs are formatted per RFC 5305.
