document: rfc-3958
kind: protocol-element
summary: 'The Application-Unique String for S-NAPTR is the domain label for which an authoritative server for a particular service is sought. The First Well-Known Rule is identity: the output equals the input domain label, which is used as the key for the first NAPTR DNS lookup.'
section: "6.1"
