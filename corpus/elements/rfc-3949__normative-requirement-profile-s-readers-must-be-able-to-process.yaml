document: rfc-3949
kind: normative-requirement
summary: Profile S readers MUST be able to process files without RTCs and SHOULD process files with RTCs. RTCs (6 consecutive EOLs) MAY only be included by writers when EOLs are not byte-aligned (T4Options bit 2 = 0).
section: 3.4.1
rfc2119_level: MUST
topics:
    - email
