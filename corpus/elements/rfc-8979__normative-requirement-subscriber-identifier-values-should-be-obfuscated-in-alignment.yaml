document: rfc-8979
kind: normative-requirement
summary: Subscriber identifier values SHOULD be obfuscated, in alignment with Section 8.2.2 of RFC 8300, because no cryptographic protection is provided for their internal structure and any structure will be visible on the wire if no secure transport encapsulation is used.
section: "3"
rfc2119_level: SHOULD
topics:
    - privacy
    - security
