document: rfc-6531
kind: normative-requirement
summary: 'SMTPUTF8-aware SMTP servers MUST NOT include non-ASCII characters in replies except in the limited cases specifically permitted: 251/551 replies when SMTPUTF8 is in the MAIL command, and VRFY/EXPN replies when the client uses the SMTPUTF8 parameter.'
section: 3.7.4.2
rfc2119_level: MUST NOT
topics:
    - email
