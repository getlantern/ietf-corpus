document: rfc-5482
kind: design-rationale
summary: No reliability handshake is defined for UTO option delivery because UTO is purely advisory and does not change processing of subsequent segments. A lost UTO option simply means the peer misses a chance to update its timeout, which is an acceptable outcome.
section: "3.2"
topics:
    - tcp
