document: rfc-3996
kind: normative-requirement
summary: When the Printer terminates Event Wait Mode, it MUST return the 'notify-get-interval' operation attribute. The Notification Recipient MUST accept this response and MUST disconnect; if it does not disconnect, the Printer SHOULD do so.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
