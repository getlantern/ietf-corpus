document: rfc-7788
kind: normative-requirement
summary: In case of DNS zone naming conflicts, the announcement of the node with the greatest node identifier takes precedence and all other nodes MUST cease to announce the conflicting TLV. The default network-wide zone is ".home" but an administrator MAY configure a Domain-Name TLV for a different one.
section: "8"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
