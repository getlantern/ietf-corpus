document: rfc-6887
kind: normative-requirement
summary: For multi-interface hosts, PCP requests SHOULD use a globally reachable IPv6 source address (GUA) and SHOULD NOT use ULA addresses. IPv4 private addresses MAY be used given NAT ubiquity. If IPv6 privacy addresses are used for PCP mappings, a new PCP request must be issued whenever the privacy address changes.
section: "8.4"
rfc2119_level: SHOULD
topics:
    - nat
    - ip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
