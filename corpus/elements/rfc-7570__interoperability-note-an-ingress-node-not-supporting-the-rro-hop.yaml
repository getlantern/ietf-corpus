document: rfc-7570
kind: interoperability-note
summary: An ingress node not supporting the RRO Hop Attributes subobject will drop the information per RFC 3209 Section 4.4.5. A node may use the RRO Hop Attributes subobject to report an LSP attribute from LSP_ATTRIBUTES/LSP_REQUIRED_ATTRIBUTES only if both the attribute flag is allowed on both objects and the reporting in RRO Hop Attributes is specified in the defining document.
section: 3.2.3
topics:
    - mpls
    - routing
