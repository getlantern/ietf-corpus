document: rfc-1195
kind: normative-requirement
summary: When a dual router must forward an IP packet to an OSI-only router (or vice versa), the packet MUST be discarded and an error report (destination unreachable) MAY be returned.
section: "4.5"
rfc2119_level: MUST
topics:
    - routing
    - ip
