document: rfc-3945
kind: protocol-element
summary: 'Label restriction allows an upstream node to confine a downstream node''s label choice to a Label Set specifying inclusive or exclusive ranges. It supports four optical cases: limited endpoint wavelength capability, wavelength-continuity requirements (no conversion), limiting total wavelength conversions, and mismatched wavelength sets on link endpoints.'
section: "7.9"
topics:
