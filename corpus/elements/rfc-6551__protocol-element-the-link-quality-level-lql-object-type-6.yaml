document: rfc-6551
kind: protocol-element
summary: The Link Quality Level (LQL) object (type 6) quantifies link reliability on a discrete scale from 0 (unknown) to 7, where 1 is the highest quality. When recorded, the LQL object body contains one or more 1-byte Type 1 sub-objects each encoding a 3-bit Val and 5-bit Counter (number of links at that LQL value) to compress path-wide link quality information.
section: 4.3.1
topics:
    - routing
