document: rfc-3065
kind: design-rationale
summary: BGP confederations were designed to avoid the O(n^2) full-mesh IBGP scaling problem by subdividing a large AS into Member-ASes while presenting the entire confederation as a single AS to external peers, thus hiding internal topology and avoiding AS_PATH inflation visible to the global Internet.
section: "4"
topics:
