document: rfc-5415
kind: wire-format
summary: 'The CAPWAP Preamble is a single octet: bits 0-3 carry the Version field (must be 0) and bits 4-7 carry the Type field (0 = plain CAPWAP, 1 = DTLS-protected CAPWAP). This preamble precedes either the CAPWAP DTLS Header or the CAPWAP Header.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
