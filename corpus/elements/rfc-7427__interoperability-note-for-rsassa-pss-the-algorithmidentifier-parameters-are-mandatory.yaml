document: rfc-7427
kind: interoperability-note
summary: For RSASSA-PSS, the AlgorithmIdentifier parameters are mandatory (not optional or NULL) and must encode hashAlgorithm, maskGenAlgorithm, saltLength, and trailerField. For RSA PKCS#1 v1.5 algorithms, NULL parameters must be explicitly present. For DSA and ECDSA algorithms, optional parameters are always omitted.
section: "3"
