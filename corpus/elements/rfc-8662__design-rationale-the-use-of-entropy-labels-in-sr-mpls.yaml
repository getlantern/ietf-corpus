document: rfc-8662
kind: design-rationale
summary: 'The use of entropy labels in SR-MPLS is motivated by the difficulty of deep packet inspection at transit LSRs: it is unreasonable to expect an LSR to inspect UDP ports within a GRE tunnel carried over a 15-label SPRING stack. The EL computed at ingress provides entropy without requiring per-LSR deep inspection.'
section: "9"
topics:
