document: rfc-5553
kind: security-consideration
summary: Alteration or forgery of the Path Key in a PKS can cause erroneous CPS expansion, leading to incorrect EROs, misdirected traffic (potentially enabling interception), or LSP setup failure. Prevention requires protecting PCEP and RSVP-TE protocol exchanges using their respective security mechanisms.
section: "4"
topics:
