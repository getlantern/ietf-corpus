document: rfc-4467
kind: protocol-element
summary: The URLFETCH command requests the server return message text data for one or more URLAUTH-authorized IMAP URLs. It executes with the access rights of the userid in the server component of the URL and does not require any mailbox to be selected, nor does it interfere with any selected mailbox.
section: BASE.6.3.URLFETCH
topics:
