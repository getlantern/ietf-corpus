document: rfc-6076
kind: protocol-element
summary: Session Request Delay (SRD) measures the time from sending the first INVITE until receiving the first provisional response (non-100 Trying) or first final response. It covers both successful and failed session setup, and is similar to Post-Selection Delay defined in ITU-T E.721. Output SHOULD be in seconds.
section: "4.3"
topics:
    - realtime
    - voip
    - measurement
