document: rfc-6295
kind: protocol-element
summary: 'Recovery journal system chapters encode system-level MIDI state: Chapter D (Song Select 0xF3, Tune Request 0xF6, Reset 0xFF, undefined commands), V (Active Sense 0xFE), Q (Sequencer State 0xF2/0xF8/0xFA/0xFB/0xFC), F (MTC Tape Position 0xF1), X (System Exclusive). The system journal appears whenever any system chapter is required.'
