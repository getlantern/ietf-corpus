document: rfc-3264
kind: normative-requirement
summary: To reject an offered stream, the port number in the corresponding stream in the answer MUST be set to zero. The t= line in the answer MUST equal that of the offer; session time cannot be negotiated.
section: "6"
rfc2119_level: MUST
