document: rfc-4034
kind: protocol-element
summary: The Labels field in RRSIG specifies the number of labels in the original RRSIG owner name (excluding the root label and any wildcard label). Validators use it to determine whether an answer was synthesized from a wildcard and to reconstruct the original owner name for signature validation.
section: 3.1.3
topics:
