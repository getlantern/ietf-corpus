document: rfc-7956
kind: wire-format
summary: 'The Tenant Label and Gateway MAC APPsub-TLV (Type 7) encodes: 2-byte Type, 2-byte Length (12 for VLAN, 14 for FGL), 4-byte Tenant ID, 4-bit Resv1 + 12-bit Label1 (VLAN or high 12 bits of FGL), optionally 4-bit Resv2 + 12-bit Label2 (low 12 bits of FGL), and 6-byte Tenant Gateway MAC.'
section: "7.1"
