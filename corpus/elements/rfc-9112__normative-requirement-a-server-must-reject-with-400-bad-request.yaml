document: rfc-9112
kind: normative-requirement
summary: A server MUST reject with 400 (Bad Request) any request message that contains whitespace between a header field name and colon. A proxy MUST remove any such whitespace from a response before forwarding downstream.
section: "5.1"
rfc2119_level: MUST
topics:
    - http
    - security
