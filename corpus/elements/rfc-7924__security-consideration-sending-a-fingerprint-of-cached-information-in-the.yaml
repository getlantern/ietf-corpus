document: rfc-7924
kind: security-consideration
summary: Sending a fingerprint of cached information in the unencrypted ClientHello and ServerHello allows a passive observer or active attacker to correlate independent TLS sessions, potentially undermining unlinkability goals depending on the sensitivity of the cached object type.
