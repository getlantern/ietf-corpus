document: rfc-5678
kind: normative-requirement
summary: The DHCP client (mobile node) MUST try domain name records in the listed order, applying the DNS-based MIH discovery mechanism from RFC 5679 for each, and only proceeds to the next name if the previous attempt failed or yielded no common transport protocols.
section: "3"
rfc2119_level: MUST
topics:
