document: rfc-8658
kind: wire-format
summary: Softwire46-BR (TLV-Type 6) has a fixed TLV-Length of 18 octets and carries the Border Relay IPv6 address as a 16-octet ipv6addr field. Softwire46-DMR (TLV-Type 7) carries a variable-length ipv6prefix (dmr-ipv6-prefix) with TLV-Length of 4 plus prefix length in octets; prefixes 0–96 bits are allowed, right-padded to octet boundary.
section: 3.1.3.2
topics:
    - radius
    - v6ops
