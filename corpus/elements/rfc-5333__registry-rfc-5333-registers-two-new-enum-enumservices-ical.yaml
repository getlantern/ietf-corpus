summary: 'RFC 5333 registers two new ENUM Enumservices: ''ical-sched'' (with subtype ''mailto'') for scheduling via iMIP, and ''ical-access'' (with subtypes ''http'' and ''https'') for CalDAV-based calendar access. These are registered per the procedures in RFC 3761.'
