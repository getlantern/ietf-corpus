document: rfc-7513
kind: interoperability-note
summary: SAVI-DHCP must be considered in the context of Detecting Network Attachment (DNA). When a client detaches and reattaches using a Confirm message rather than a full DHCP exchange, the binding may need to be re-established via the INIT_BIND state and a subsequent LEASEQUERY, requiring coordination with DNA procedures.
section: "11.4"
topics:
    - ip
    - security
