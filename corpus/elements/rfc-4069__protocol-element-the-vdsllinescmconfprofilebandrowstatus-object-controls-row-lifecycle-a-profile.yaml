document: rfc-4069
kind: protocol-element
summary: 'The vdslLineSCMConfProfileBandRowStatus object controls row lifecycle: a profile is activated by setting it to ''active'', at which point the system validates the profile. No columns may be modified while ''active''. The profile must be unreferenced from all associated lines before it can be deleted or set to ''notInService''.'
