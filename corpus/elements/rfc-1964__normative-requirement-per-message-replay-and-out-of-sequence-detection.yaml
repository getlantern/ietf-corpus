document: rfc-1964
kind: normative-requirement
summary: 'Per-message replay and out-of-sequence detection are optional. Implementations offering these services should honor a caller''s request to disable them: if replay_det_req_flag is FALSE, replay_det_state should be returned FALSE and GSS_DUPLICATE_TOKEN/GSS_OLD_TOKEN should not be indicated.'
section: 1.2.1.2
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
