document: rfc-6505
kind: protocol-element
summary: The <join> element requests creation of one or more media streams between a connection and a conference, between two connections, or between two conferences, identified by mandatory 'id1' and 'id2' attributes. Optional child <stream> elements control individual streams; if absent, all streams are joined by default.
section: 4.2.2.2
