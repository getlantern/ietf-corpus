document: rfc-9581
kind: protocol-element
summary: Keys -11 (elective) and 11 (critical) carry IXDTF suffix information (e.g., calendar preference) as a map of suffix-key to suffix-value text strings per RFC 9557. When both -11 and 11 are present, the two maps MUST NOT have entries with the same map keys.
section: "3.7"
