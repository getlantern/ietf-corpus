document: rfc-2262
kind: normative-requirement
summary: For an incoming Response-PDU, the v3MP MUST compare the message's securityEngineID, securityModel, securityName, securityLevel, contextEngineID, and contextName against cached values from the original request; if any differ, the message MUST be discarded without further processing.
section: "7.2"
rfc2119_level: MUST
topics:
    - snmp
    - security
