document: rfc-6249
kind: security-consideration
summary: Spoofing attacks are possible if an attacker publishes Metalinks with false mirror URIs, deceiving users into downloading malicious files or enabling distributed denial-of-service via unrelated URIs. Clients should only download from trusted sources and must implement loop prevention.
section: "9.2"
topics:
    - security
    - http
