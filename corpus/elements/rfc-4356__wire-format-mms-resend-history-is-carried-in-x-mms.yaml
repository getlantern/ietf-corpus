document: rfc-4356
kind: wire-format
summary: MMS resend history is carried in 'X-Mms-Previously-Sent-By:' and 'X-Mms-Previously-Sent-Date-and-Time:' headers, each prefixed with a sequence number starting at '0' for the original submission. These map to RFC 2822 'Resent-From:' and 'Resent-Date:' headers on conversion to Internet format, with date-time converted between HTTP-date and RFC 2822 date-time syntax.
section: 2.1.3.2
topics:
    - email
