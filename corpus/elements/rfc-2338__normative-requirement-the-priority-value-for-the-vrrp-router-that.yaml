document: rfc-2338
kind: normative-requirement
summary: The priority value for the VRRP router that owns the IP address(es) associated with the virtual router MUST be 255. VRRP routers backing up a virtual router MUST use priority values between 1–254.
section: 5.3.4
rfc2119_level: MUST
topics:
    - routing
