document: rfc-7512
kind: protocol-element
summary: 'The pkcs11 URI scheme identifies PKCS #11 storage objects, tokens, slots, and Cryptoki libraries. It uses a path component of semicolon-delimited attribute-value pairs and an optional query component with ampersand-delimited attributes. The scheme does not use an authority component or fragment identifier.'
