document: rfc-9636
kind: wire-format
summary: 'The TZif data block contains seven variable-length elements in order: transition times (timecnt × TIME_SIZE), transition types (timecnt × 1 octet), local time type records (typecnt × 6 octets), time zone designations (charcnt octets), leap-second records (leapcnt × (TIME_SIZE + 4)), standard/wall indicators (isstdcnt octets), and UT/local indicators (isutcnt octets). TIME_SIZE is 4 in v1 and 8 in v2+.'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
