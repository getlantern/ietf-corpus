document: rfc-1548
kind: design-rationale
summary: Loop detection (Magic-Number option) is provided as an optional negotiated mechanism rather than mandatory, because some links (hard-wired, non-async) do not require it. The automaton also uses the Discard-Request and Echo-Request/Reply as data-link-layer loopback tools to assist in detecting loops without relying on network-layer protocols.
section: "4.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
