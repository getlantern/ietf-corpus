document: rfc-5392
kind: normative-requirement
summary: In OSPFv2 advertisements, the IPv4 Remote ASBR ID sub-TLV MUST be included if the neighboring ASBR has an IPv4 address. If the neighboring ASBR does not have an IPv4 address, the IPv6 Remote ASBR ID sub-TLV MUST be included instead.
section: 3.3.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
