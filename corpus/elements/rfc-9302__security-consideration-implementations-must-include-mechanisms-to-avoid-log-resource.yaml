document: rfc-9302
kind: security-consideration
summary: Implementations MUST include mechanisms to avoid log resource exhaustion attacks, since the specification requires logging actions upon certain events (e.g., unexpected Map-Version numbers). The specific mechanisms are outside the scope of this document.
