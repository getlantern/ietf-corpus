document: rfc-4878
kind: normative-requirement
summary: Peer information in dot3OamPeerTable is not available (entries absent) when dot3OamOperStatus is disabled(1), linkFault(2), passiveWait(3), activeSendLocal(4), or nonOperHalfDuplex(10); entries are auto-created only once the peer is communicating.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
