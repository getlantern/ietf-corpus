document: rfc-3065
kind: normative-requirement
summary: A BGP speaker receiving an AS_PATH containing an AS matching its own confederation, or an AS_CONFED_SEQUENCE/AS_CONFED_SET containing its own Member AS Number, SHALL treat the path as if it contained its own AS number (loop detection).
section: "6"
rfc2119_level: MUST
topics:
