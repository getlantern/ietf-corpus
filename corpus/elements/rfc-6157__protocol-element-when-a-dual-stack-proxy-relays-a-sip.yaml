document: rfc-6157
kind: protocol-element
summary: 'When a dual-stack proxy relays a SIP request between an IPv4 client and an IPv6 server and uses IP addresses in Record-Route, it inserts two Record-Route headers: the first contains the proxy''s IPv6 address (facing the downstream UAS) and the second contains the proxy''s IPv4 address (facing the upstream UAC), ensuring each party has the correct proxy address for subsequent requests.'
section: 3.1.1
topics:
    - sip
    - v6ops
