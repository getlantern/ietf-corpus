document: rfc-9622
kind: design-rationale
summary: The API is message-oriented rather than stream-oriented. Where the underlying transport does not provide message framing, application-assisted Message Framers are used. This abstraction allows a unified API across datagram and stream-oriented transports without exposing the framing difference to the application.
section: "2"
extracted_by: claude-sonnet-4-6
