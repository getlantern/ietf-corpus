document: rfc-3456
kind: normative-requirement
summary: The chaddr SHOULD be persistent between reboots so the DHCP server can re-assign the same address. For LAN interfaces, chaddr SHOULD be derived from the active LAN interface with the lowest interface number.
section: "4.1"
rfc2119_level: SHOULD
