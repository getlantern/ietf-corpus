document: rfc-6005
kind: normative-requirement
summary: For EVPL services, VLAN ID mapping from ingress UNI to a different VLAN ID at egress (where bundling and VLAN ID preservation are not both supported) MUST be requested and signaled using the explicit label control mechanism defined in RFC4208, not the mechanisms in RFC6004.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
