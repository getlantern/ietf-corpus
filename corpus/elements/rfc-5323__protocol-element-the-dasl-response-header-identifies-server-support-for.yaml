document: rfc-5323
kind: protocol-element
summary: 'The DASL response header identifies server support for query grammars in the OPTIONS response. Its value is a comma-separated list of angle-bracket-enclosed URIs indicating supported grammar types (e.g., DASL: <DAV:basicsearch>). The ABNF is: DASLHeader = "DASL" ":" 1#Coded-URL.'
section: "3.2"
topics:
