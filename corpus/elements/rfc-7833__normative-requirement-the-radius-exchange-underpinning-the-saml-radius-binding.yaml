document: rfc-7833
kind: normative-requirement
summary: The RADIUS exchange underpinning the SAML RADIUS binding MUST be protected using TLS encryption for RADIUS (RFC 6614) to provide confidentiality and integrity, unless alternative methods such as IPsec tunnels or a sufficiently secure internal network are used.
section: "4.2"
rfc2119_level: REQUIRED
topics:
