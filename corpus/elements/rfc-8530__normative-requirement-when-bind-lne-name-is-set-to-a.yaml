document: rfc-8530
kind: normative-requirement
summary: When bind-lne-name is set to a valid LNE name, an implementation MUST take whatever steps are internally necessary to assign the interface to the LNE or provide an error message with an indication of why the assignment failed.
section: "3.1"
rfc2119_level: MUST
