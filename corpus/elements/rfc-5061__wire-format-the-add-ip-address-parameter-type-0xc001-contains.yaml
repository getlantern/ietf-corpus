document: rfc-5061
kind: wire-format
summary: The Add IP Address parameter (type 0xC001) contains a 32-bit ASCONF-Request Correlation ID followed by a variable-length IPv4 or IPv6 Address Parameter TLV. If the address is 0.0.0.0 or ::0, the source address of the packet MUST be added.
section: 4.2.1
topics:
