document: rfc-8484
kind: wire-format
summary: The 'application/dns-message' media type carries a single DNS message in the DNS on-the-wire format defined in RFC 1035 Section 4.1, with a maximum message size of 65535 bytes. This differs from DNS-over-TLS (RFC 7858) which uses the two-length-byte framing from RFC 1035 Section 4.2.2.
section: "6"
topics:
