document: rfc-7055
kind: wire-format
summary: The Error subtoken (type 0x80000001, always critical) encodes a 4-octet RFC 2744 major status followed by a 4-octet GSS-EAP error code, both in network byte order. Initiators MUST ignore octets beyond the error code for extensibility.
section: "5.3"
topics:
    - security
