document: rfc-8660
kind: protocol-element
summary: FEC fields are encoded in big-endian order for numerical comparison. Routing Instance ID is 16 bits; address family is 8 bits (IPv4=100, IPv6=110, IPv4 must be numerically less); all addresses are 128 bits (IPv4 in most-significant bits); prefixes are (8+128) bits with length preceding the prefix; Algorithm is 16 bits; Color ID is 32 bits.
section: 2.5.1
