document: rfc-4740
kind: normative-requirement
summary: The Diameter client in the assigned SIP server MUST include its own URI in the SIP-Server-URI AVP of the SAR message. If SIP-Server-Assignment-Type is REGISTRATION, RE_REGISTRATION, UNREGISTERED_USER, NO_ASSIGNMENT, AUTHENTICATION_FAILURE, or AUTHENTICATION_TIMEOUT, exactly one SIP-AOR AVP MUST be present.
section: "8.3"
rfc2119_level: MUST
topics:
    - sip
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
