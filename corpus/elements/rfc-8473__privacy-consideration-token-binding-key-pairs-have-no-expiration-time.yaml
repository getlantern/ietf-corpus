document: rfc-8473
kind: privacy-consideration
summary: Token Binding key pairs have no expiration time, allowing servers to track users long-term like persistent cookies. HTTPS User Agents SHOULD provide a UI for discarding key pairs, and MUST discard Token Binding key pairs generated during a private browsing session after that session ends.
section: "8.2"
rfc2119_level: MUST
topics:
    - privacy
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
