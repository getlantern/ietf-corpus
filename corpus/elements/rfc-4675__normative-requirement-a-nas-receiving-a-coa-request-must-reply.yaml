document: rfc-4675
kind: normative-requirement
summary: A NAS receiving a CoA-Request MUST reply with a CoA-NAK if the request contains an unsupported attribute; it is recommended that an Error-Cause attribute with value 'Unsupported Attribute' (401) be included in the CoA-NAK.
section: "1.3"
rfc2119_level: MUST
topics:
