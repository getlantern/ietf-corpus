document: rfc-3645
kind: state-machine
summary: 'A GSS-TSIG security context has three states: Uninitialized, Negotiating Context, and Context Established. Every connection begins in the Uninitialized state, advances to Negotiating Context during token exchange, and reaches Context Established upon successful GSS negotiation completion.'
