document: rfc-3801
kind: normative-requirement
summary: 'The MIME-Version: header MUST be present. Conforming systems SHOULD include the comment ''(Voice 2.0)'' to identify the profile version; however, this comment SHOULD NOT be used programmatically to identify a VPIM message — the presence of Multipart/Voice-Message content type SHOULD be used instead.'
section: 4.2.10
rfc2119_level: MUST
topics:
    - email
