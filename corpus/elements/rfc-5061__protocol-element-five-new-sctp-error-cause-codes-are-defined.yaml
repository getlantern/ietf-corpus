document: rfc-5061
kind: protocol-element
summary: 'Five new SCTP error cause codes are defined: 0x00A0 (Request to Delete Last Remaining IP Address), 0x00A1 (Operation Refused Due to Resource Shortage), 0x00A2 (Request to Delete Source IP Address), 0x00A3 (Association Aborted Due to Illegal ASCONF-ACK), and 0x00A4 (Request Refused - No Authorization). Error causes copy the original ASCONF TLV into the variable-length cause body.'
section: "4.3"
topics:
    - sctp
    - registry
