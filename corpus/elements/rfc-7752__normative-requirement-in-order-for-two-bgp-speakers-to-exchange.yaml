summary: In order for two BGP speakers to exchange Link-State NLRI, they MUST use BGP Capabilities Advertisement (capability code 1, multi-protocol BGP) with AFI 16388 / SAFI 71 for BGP-LS or AFI 16388 / SAFI 72 for BGP-LS-VPN.
