document: rfc-7769
kind: normative-requirement
summary: If the sequence number in a received MAC withdraw message is smaller than or equal to the value in the receiver's register, MAC TLVs are not processed, but an ACK with the received sequence number MUST be sent as a response.
section: "4.2"
rfc2119_level: MUST
topics:
