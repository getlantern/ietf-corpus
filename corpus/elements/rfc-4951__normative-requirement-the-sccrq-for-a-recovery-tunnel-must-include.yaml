document: rfc-4951
kind: normative-requirement
summary: The SCCRQ for a recovery tunnel MUST include the Tunnel Recovery AVP to identify the old tunnel being recovered, and MUST NOT include the Failover Capability AVP in its SCCRQ or SCCRP messages.
section: 3.2.1
rfc2119_level: MUST
