summary: The SRv6 Endpoint Behavior TLV (Type 1250, Length 4) encodes a 2-octet Endpoint Behavior code point (from RFC 8986 registry), a 1-octet Flags field, and a 1-octet Algorithm. It is a mandatory attribute TLV for each SRv6 SID NLRI.
