document: rfc-7854
kind: normative-requirement
summary: If the active party is unable to connect to the passive party, it periodically retries the connection. Retries MUST be subject to some variety of backoff; exponential backoff with a default initial value of 30 seconds and a maximum of 720 seconds is suggested.
section: "3.2"
rfc2119_level: MUST
topics:
    - bgp
    - measurement
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
