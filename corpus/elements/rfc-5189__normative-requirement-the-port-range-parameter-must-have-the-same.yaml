document: rfc-5189
kind: normative-requirement
summary: The port range parameter must have the same value for each of address tuples A0, A1, A2, and A3. A policy rule with port range n is semantically equivalent to n individual rules each covering a single port number starting from the base port.
section: 2.3.6
rfc2119_level: MUST
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
