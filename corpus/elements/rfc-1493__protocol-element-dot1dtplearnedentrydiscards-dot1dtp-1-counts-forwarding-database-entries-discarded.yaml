document: rfc-1493
kind: protocol-element
summary: dot1dTpLearnedEntryDiscards (dot1dTp 1) counts forwarding database entries discarded due to insufficient storage space. A persistently increasing value indicates the FDB is regularly full, which has 'unpleasant performance effects on the subnetwork.'
section: "5.4"
