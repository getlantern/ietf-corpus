document: rfc-8410
kind: normative-requirement
summary: Key encoding requirements from RFC 7748 and RFC 8032 must be enforced when importing keys. Enforcement may be done by applying masking or mod p operations, or by rejecting non-conforming keys with an import failure.
section: A
rfc2119_level: REQUIRED
