document: rfc-8976
kind: design-rationale
summary: The SIMPLE scheme is intentionally limited to static digest-over-whole-zone for small/stable zones. The extensible Scheme field anticipates future incremental-update schemes for large or highly dynamic zones, which SIMPLE cannot efficiently support.
