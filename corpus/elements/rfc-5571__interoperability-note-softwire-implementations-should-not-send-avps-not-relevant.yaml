document: rfc-5571
kind: interoperability-note
summary: Softwire implementations SHOULD NOT send AVPs not relevant to Softwires (e.g., outgoing-call AVPs), but SHOULD silently ignore them if received. This allows Softwire code to be layered on existing L2TPv2 stacks without breaking compatibility.
section: 5.1.1.3
topics:
    - vpn
