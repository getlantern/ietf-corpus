document: rfc-6607
kind: normative-requirement
summary: A DHCPv4 relay agent that includes a VSS sub-option in the Relay Agent Information option MUST also include a VSS-Control sub-option in that same Relay Agent Information option. This pairing enables the relay agent to detect whether the server actually processed the VSS information.
section: "5"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
