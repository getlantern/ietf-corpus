document: rfc-2848
kind: privacy-consideration
summary: PINT requests reveal to the server the identity of parties to a telephone call and the content being transmitted. The 'clir' attribute provides a mechanism for callers to request suppression of calling line identity, but PINT itself does not mandate that Executive Systems honor it in all jurisdictions.
section: 5.1.3
topics:
    - privacy
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
