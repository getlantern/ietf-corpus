document: rfc-8824
kind: normative-requirement
summary: For ETag, If-Match, If-None-Match, Location-Path, and Location-Query options, the Rule description MUST always send these values in the Compression Residue; a Rule entry cannot store these fields' values.
section: "5.5"
rfc2119_level: MUST
