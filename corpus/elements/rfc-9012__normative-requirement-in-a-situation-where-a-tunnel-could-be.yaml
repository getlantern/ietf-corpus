document: rfc-9012
kind: normative-requirement
summary: In a situation where a tunnel could be encoded as a 'barebones' TLV (no sub-TLVs other than Tunnel Egress Endpoint), it MUST instead be encoded using the corresponding Encapsulation Extended Community for backwards compatibility. Implementations MUST also be prepared to process barebones TLVs.
section: "4.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
