document: rfc-4745
kind: interoperability-note
summary: The Common Policy XML format is an exchange format between RM and PS only; it does not mandate any internal representation. The PS may translate rules to a relational database, use simple traversal, or any other mechanism. The XML schema uses 'lax' processing for unknown namespace elements in conditions, actions, and transformations to support forward compatibility.
section: "6"
topics:
