document: rfc-8610
kind: protocol-element
summary: Range expressions use '..' for bounds inclusive on both sides and '...' to exclude the upper bound (e.g., '0..255' for a byte). Ranges are defined only between two integers or two floating-point values; mixing the two numeric kinds (e.g., '0..10.0') is explicitly not defined.
section: 2.2.2.1
topics:
