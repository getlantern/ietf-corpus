document: rfc-2668
kind: protocol-element
summary: ifMauTable provides descriptive and status information about MAU(s) attached to interfaces, indexed by ifMauIfIndex and ifMauIndex. Entries include type, status, media availability, jabber state, false carrier counter, default type, auto-negotiation support flag, and the ifMauTypeListBits capability field.
