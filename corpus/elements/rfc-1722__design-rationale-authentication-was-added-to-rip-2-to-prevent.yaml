document: rfc-1722
kind: design-rationale
summary: Authentication was added to RIP-2 to prevent insertion of bogus routing information by parties who cannot directly observe the network. Confidentiality of routing messages is considered unimportant; integrity is the goal. The authentication field allows for extensible authentication types, though only 16 octets are available due to the original RIP packet format.
section: "3.3"
topics:
    - routing
    - security
