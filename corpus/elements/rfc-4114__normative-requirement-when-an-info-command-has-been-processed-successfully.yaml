document: rfc-4114
kind: normative-requirement
summary: When an <info> command has been processed successfully, the EPP <resData> element MUST contain child elements as described in the EPP domain mapping, and the EPP <extension> element MUST contain a child <e164:infData> element identifying the extension namespace and schema location.
section: 3.1.2
rfc2119_level: MUST
