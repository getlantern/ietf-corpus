document: rfc-9711
kind: protocol-element
summary: 'The ''oemid'' claim identifies the hardware OEM in one of three forms: a PEN-based integer, a 3-byte IEEE MA-L/MA-M/MA-S/CID identifier, or a 16-byte random number. The receiver MUST be able to handle all three forms.'
section: 4.2.3
topics:
