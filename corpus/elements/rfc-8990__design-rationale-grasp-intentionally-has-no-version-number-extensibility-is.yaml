document: rfc-8990
kind: design-rationale
summary: GRASP intentionally has no version number; extensibility is achieved by adding new message types and options. The M_INVALID message signals that an implementation does not recognize a message or option, supporting both forward and backward compatibility detection without a version field.
section: "2.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
