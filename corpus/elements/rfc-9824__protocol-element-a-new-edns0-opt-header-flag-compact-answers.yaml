document: rfc-9824
kind: protocol-element
summary: A new EDNS0 OPT header flag, Compact Answers OK (CO), is defined at bit 1 (second most significant bit) of the EDNS0 flags field. When set in a query, it signals the resolver will accept a NODATA response with a signed NXNAME together with RCODE NXDOMAIN, enabling signaled response code restoration.
section: "5.1"
topics:
    - dns
