document: rfc-6154
kind: normative-requirement
summary: A server supporting the METADATA tie-in MUST check the validity of changes to special-use attributes done through metadata in the same way it checks validity for the CREATE command. It MUST NOT blindly accept client-set metadata that would result in unsupported special uses or other invalid states.
section: "4"
rfc2119_level: MUST
topics:
    - email
