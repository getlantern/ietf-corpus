document: rfc-9853
kind: design-rationale
summary: The choice between basic and enhanced path validation depends on the threat model and other factors including implementation complexity, privacy concerns, and path-switch latency. The decision may be exposed as a configuration option to the TLS implementation user. Enhanced validation specifically counters off-path attackers racing packets to trigger address rebinding.
section: "5"
topics:
