document: rfc-3036
kind: protocol-element
summary: An LDP PDU consists of an LDP header followed by one or more LDP messages. The header contains a 2-octet Version field, a 2-octet PDU Length (excluding Version and PDU Length fields), and a 6-octet LDP Identifier. Maximum PDU length defaults to 4096 bytes prior to session negotiation.
section: "3.1"
topics:
    - mpls
    - routing
