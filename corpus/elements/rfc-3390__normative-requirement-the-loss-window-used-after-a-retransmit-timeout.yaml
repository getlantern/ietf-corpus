document: rfc-3390
kind: normative-requirement
summary: The loss window (used after a retransmit timeout) must remain 1 segment of MSS bytes to permit the lowest possible window size in severe congestion. This change does NOT alter the loss window.
section: "1"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
