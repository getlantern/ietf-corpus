document: rfc-7911
kind: normative-requirement
summary: To send multiple paths to a peer, a BGP speaker MUST advertise the ADD-PATH Capability with Send/Receive set to 2 or 3, and MUST receive from its peer the ADD-PATH Capability with Send/Receive set to 1 or 3, for the corresponding <AFI, SAFI>.
section: "5"
rfc2119_level: MUST
topics:
    - bgp
    - routing
