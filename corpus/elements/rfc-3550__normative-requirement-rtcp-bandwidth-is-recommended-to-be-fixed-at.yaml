document: rfc-3550
kind: normative-requirement
summary: RTCP bandwidth is RECOMMENDED to be fixed at 5% of session bandwidth, with 1/4 of that allocated to senders and 3/4 to receivers. All participants MUST use the same session bandwidth value so all compute the same RTCP transmission interval.
section: "6.2"
rfc2119_level: RECOMMENDED
topics:
    - rtp
    - realtime
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
