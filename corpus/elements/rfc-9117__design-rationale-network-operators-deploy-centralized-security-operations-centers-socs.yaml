document: rfc-9117
kind: design-rationale
summary: Network operators deploy centralized Security Operations Centers (SOCs) to detect and mitigate attacks; requiring Flow Specification origination at specific egress border routers is operationally cumbersome in ASes with thousands of ASBRs and complex policies. Centralizing origination at a BGP route controller simplifies intra-domain traffic filtering policy distribution at scale.
section: "3"
topics:
    - bgp
    - security
