document: rfc-7252
kind: protocol-element
summary: 'CoAP defines two URI schemes: ''coap'' (default port 5683, no security) and ''coaps'' (default port 5684, DTLS-secured). The client decomposes the URI into Uri-Host, Uri-Port, Uri-Path, and Uri-Query options before sending the request, using default values for efficiency; the server reconstructs the URI from these options.'
