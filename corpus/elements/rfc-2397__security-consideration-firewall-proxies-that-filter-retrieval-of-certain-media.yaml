document: rfc-2397
kind: security-consideration
summary: Firewall proxies that filter retrieval of certain media types (e.g., application script languages) will find it difficult to screen against those types when embedded via the data URL scheme, as the data is inline rather than fetched from a remote server.
section: "6"
