document: rfc-2397
kind: wire-format
summary: 'The data URL has the form: `data:[<mediatype>][;base64],<data>`. The mediatype is an Internet media type with optional parameters; `;base64` signals base64 encoding; otherwise data is percent-encoded per RFC 2396.'
