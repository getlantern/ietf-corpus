document: rfc-8534
kind: normative-requirement
summary: An ingress node SHOULD NOT originate a (C-S,C-G) S-PMSI A-D route whose PTA specifies 'no tunnel information present' if it already originates a wildcard S-PMSI A-D route with LIR-pF set that covers that flow; such a route would not provide any additional functionality.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - multicast
    - mpls
    - routing
