document: rfc-7876
kind: protocol-element
summary: The UDP Return Object (URO) Type value is 131. It carries the destination UDP port and IP address to which the responder should send the MPLS-PLDM Response. Multiple UROs MAY be included in a single Query to request identical Responses be sent to multiple address-port pairs.
section: "3.1"
topics:
