document: rfc-6072
kind: protocol-element
summary: The rsa-sha256 identity signature algorithm is defined, computed identically to rsa-sha1 from RFC 4474 except using sha256WithRSAEncryption per RFC 5754. Implementations of this specification MUST implement both rsa-sha1 and rsa-sha256.
