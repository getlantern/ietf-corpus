document: rfc-4871
kind: protocol-element
summary: The DKIM-Signature header field stores all signature and key-fetching data as a tag=value list. Required tags are v= (version '1'), a= (algorithm), b= (RSA signature, base64), bh= (body hash, base64), d= (signing domain), h= (signed header field list), and s= (selector).
section: "3.5"
