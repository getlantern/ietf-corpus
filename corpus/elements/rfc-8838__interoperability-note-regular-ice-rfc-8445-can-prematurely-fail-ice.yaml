document: rfc-8838
kind: interoperability-note
summary: Regular ICE (RFC 8445) can prematurely fail ICE processing when only a subset of candidates are known at checklist formation time — for example, if all initial pairs fail before trickled candidates arrive. Trickle ICE's modified failure conditions (Section 8) are specifically designed to prevent this premature failure.
section: A
topics:
    - webrtc
    - nat
