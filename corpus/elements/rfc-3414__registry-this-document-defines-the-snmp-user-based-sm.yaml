summary: This document defines the SNMP-USER-BASED-SM-MIB (OID snmpModules 15), which includes usmStats counters (usmStatsUnsupportedSecLevels, usmStatsNotInTimeWindows, usmStatsUnknownUserNames, usmStatsUnknownEngineIDs, usmStatsWrongDigests, usmStatsDecryptionErrors), the usmUserTable, and OBJECT-IDENTITY registrations for authentication protocols (usmHMACMD5AuthProtocol at snmpAuthProtocols 2, usmHMACSHAAuthProtocol at snmpAuthProtocols 3) and privacy protocols (usmDESPrivProtocol at snmpPrivProtocols 2).
