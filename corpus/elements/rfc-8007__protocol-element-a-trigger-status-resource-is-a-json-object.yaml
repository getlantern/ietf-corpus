document: rfc-8007
kind: protocol-element
summary: 'A Trigger Status Resource is a JSON object with mandatory fields: ''trigger'' (Trigger Specification), ''ctime'' (command receipt time), ''mtime'' (last modification time), and ''status'' (current state). Optional fields include ''etime'' (estimated completion), and ''errors'' (array of Error Descriptions). Media type is ''application/cdni; ptype=ci-trigger-status''.'
section: 5.1.2
topics:
    - http
    - json
