document: rfc-9809
kind: protocol-element
summary: 'Defines four new KeyPurposeIds for the EKU extension: id-kp-configSigning (OID { id-kp 41 }) for general-purpose configuration file signature verification, id-kp-trustAnchorConfigSigning (OID { id-kp 42 }) for trust anchor configuration file signature verification, id-kp-updatePackageSigning (OID { id-kp 43 }) for software or firmware update package signature verification, and id-kp-safetyCommunication (OID { id-kp 44 }) for authenticating communication peers in safety-critical communication.'
