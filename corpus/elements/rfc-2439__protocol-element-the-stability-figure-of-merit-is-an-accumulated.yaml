document: rfc-2439
kind: protocol-element
summary: The stability figure of merit is an accumulated, time-decayed, per-route instability score. It is incremented by 1 on each transition from reachable to unreachable, clipped to a ceiling value, and decayed exponentially at a configurable rate while the route is reachable or unreachable.
