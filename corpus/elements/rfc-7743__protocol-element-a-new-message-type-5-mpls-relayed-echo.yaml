document: rfc-7743
kind: protocol-element
summary: A new Message Type 5 (MPLS Relayed Echo Reply) is defined. It is a UDP packet using port 3503 (same as RFC 4379 LSP Ping), with the same payload format as Echo Request/Reply, used by a replying LSR when sending to an intermediate relay node rather than directly to the initiator.
section: "3.1"
topics:
    - mpls
