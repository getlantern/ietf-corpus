document: rfc-9130
kind: design-rationale
summary: The 'ietf-isis' YANG module augments the 'control-plane-protocol' list in the 'ietf-routing' module (RFC 8349) rather than defining a standalone module, aligning with the Network Management Datastore Architecture (NMDA) as described in RFC 8342. This design integrates IS-IS configuration within a unified routing management framework.
section: "2"
topics:
