document: rfc-9546
kind: protocol-element
summary: The d-ACH Sequence Number is an 8-bit unsigned circular field with a sequence space of 0–255. App-flow and OAM use separate, independent sequence number spaces; PREOF algorithms execute with respect to the sequence number space identified by the flow's characteristic information.
