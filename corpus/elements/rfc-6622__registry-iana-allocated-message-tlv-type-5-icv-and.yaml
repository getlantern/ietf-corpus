summary: 'IANA allocated Message TLV type 5 (ICV) and type 6 (TIMESTAMP) from the RFC 5444 Message TLV Types namespace (0-127 range), with type extension registries. TIMESTAMP type extensions include: 0 (arbitrary unsigned), 1 (POSIX 32-bit), 2 (NTP format per RFC 5905), 3 (signed arbitrary).'
