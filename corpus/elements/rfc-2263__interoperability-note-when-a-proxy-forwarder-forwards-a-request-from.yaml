document: rfc-2263
kind: interoperability-note
summary: When a proxy forwarder forwards a request from SNMPv2/SNMPv3 to an SNMPv1 target, it must apply the translation rules documented in RFC 1908. Conversely, when forwarding a response from SNMPv1 to an SNMPv2/SNMPv3 originator, the same RFC 1908 translation rules apply.
section: 3.5.1.1
topics:
    - snmp
