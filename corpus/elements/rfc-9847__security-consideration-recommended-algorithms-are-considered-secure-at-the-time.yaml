document: rfc-9847
kind: security-consideration
summary: Recommended algorithms are considered secure at the time of registration, but cryptographic algorithms and parameters may be broken or weakened over time. The 'Recommended' status in the registry may lag behind advances in cryptanalysis, so implementers must independently verify that listed algorithms still provide the expected level of security.
section: "17"
topics:
