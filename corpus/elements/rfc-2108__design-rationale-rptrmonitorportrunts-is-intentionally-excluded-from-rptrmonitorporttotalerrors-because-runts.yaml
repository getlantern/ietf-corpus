document: rfc-2108
kind: design-rationale
summary: rptrMonitorPortRunts is intentionally excluded from rptrMonitorPortTotalErrors because runts usually indicate collision fragments, which are a normal network event. TotalErrors sums FCSErrors, AlignmentErrors, FrameTooLongs, ShortEvents, LateEvents, VeryLongEvents, DataRateMismatches, and SymbolErrors only.
