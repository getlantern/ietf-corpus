document: rfc-5960
kind: security-consideration
summary: 'Where enhanced security is desirable, an LSR MAY implement a packet-discard policy: accept an MPLS packet only if a processed label was distributed by the receiving LSR to that neighbor, or was distributed to a peer known to be reachable via that neighbor.'
