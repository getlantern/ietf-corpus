document: rfc-7124
kind: security-consideration
summary: The objects ifCapStackStatus and ifInvCapStackStatus can identify cross-connect capability of multi-layer (stacked) network interfaces, potentially revealing the underlying hardware architecture of the managed device. It is important to control GET and NOTIFY access and possibly encrypt these values when sending over SNMP.
section: "5"
topics:
    - snmp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
