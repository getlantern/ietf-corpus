document: rfc-9593
kind: interoperability-note
summary: If the initiator doesn't support this extension, it ignores the SUPPORTED_AUTH_METHODS notification received in IKE_SA_INIT as an unknown status notify, per standard IKEv2 behavior. Sending and using the notification are optional for both initiator and responder.
section: "3.1"
topics:
