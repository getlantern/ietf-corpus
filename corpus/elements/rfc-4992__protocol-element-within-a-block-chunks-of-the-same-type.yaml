document: rfc-4992
kind: protocol-element
summary: 'Within a block, chunks of the same type MUST be contiguous and ordered: authentication chunks (sd, as, or af) first, then data chunks (nd or ad), then information chunks (vi or oi). At most one variant per category may appear in a single block.'
