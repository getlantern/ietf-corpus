document: rfc-9390
kind: design-rationale
summary: This document does not define new Diameter commands. Instead, it extends existing Command Code Formats (CCFs) with optional AVPs, preserving minimal impact to existing applications and enabling fallback to single-session operation when the peer does not support grouping.
