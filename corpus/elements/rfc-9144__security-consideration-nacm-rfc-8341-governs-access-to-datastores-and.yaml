document: rfc-9144
kind: security-consideration
summary: NACM (RFC 8341) governs access to datastores and RPCs. Subtrees to which a requestor does not have read access are silently skipped and not included in the comparison result, preventing information leakage about unauthorized portions of the datastore.
section: "8"
topics:
