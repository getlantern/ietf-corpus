document: rfc-959
kind: security-consideration
summary: Access controls define users' privileges to the system and its files and are necessary to prevent unauthorized or accidental use. It is the prerogative of the server-FTP process to invoke access controls; the protocol does not mandate a specific access control mechanism.
section: "2.2"
topics:
    - security
