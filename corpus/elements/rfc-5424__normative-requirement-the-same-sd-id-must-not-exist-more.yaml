document: rfc-5424
kind: normative-requirement
summary: The same SD-ID MUST NOT exist more than once in a message. SD-IDs without an at-sign are IANA-reserved and MUST be registered before use; private SD-IDs MUST use the format name@<private-enterprise-number>.
section: 6.3.2
rfc2119_level: MUST NOT
topics:
    - registry
