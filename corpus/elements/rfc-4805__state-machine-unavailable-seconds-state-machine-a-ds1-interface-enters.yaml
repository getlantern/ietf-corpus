document: rfc-4805
kind: state-machine
summary: 'Unavailable Seconds state machine: a DS1 interface enters unavailable state at the onset of 10 contiguous SESs (or at onset of a failure condition). It returns to available state at onset of 10 contiguous seconds with no SESs when no failure is present. During unavailable state only the UAS counter increments; ES, BES, SES, SEFS, PCV, and DM counters are frozen per ANSI T1.231.'
section: 3.4.3
topics:
    - snmp
    - measurement
