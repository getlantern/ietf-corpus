document: rfc-6910
kind: normative-requirement
summary: The caller's agent MUST NOT maintain more than one CC request for a single caller directed to a single original destination URI. If CC is requested a second time for the same destination, the agent MUST consolidate by reusing or terminating and recreating the existing subscriptions.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - sip
