document: rfc-5619
kind: protocol-element
summary: L2TPv2 is used in the Hubs and Spokes solution in a voluntary tunnel model only. The SI acts as an L2TP Access Concentrator (LAC) and PPP endpoint; the L2TPv2 tunnel is always initiated from the SI.
