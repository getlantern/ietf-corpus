document: rfc-4470
kind: security-consideration
summary: If the epsilon functions are predictable, on-demand signing may enable a chosen-plaintext attack on the zone's private keys. Zones using this technique should prefer cryptographic algorithms resistant to chosen-plaintext attacks. No zone is required to use any particular signing algorithm.
section: "5"
topics:
    - dns
    - security
    - crypto
