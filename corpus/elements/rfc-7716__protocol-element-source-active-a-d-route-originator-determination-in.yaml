document: rfc-7716
kind: protocol-element
summary: 'Source Active A-D route originator determination in GTM: if the route carries a VRF Route Import EC, the originating PBR is identified by the Global Administrator field of that EC; if not, the originating PBR is the router identified in the route''s Next Hop field. This differs from MVPN where the originator is determined by RD uniqueness.'
section: 2.8.1
topics:
    - bgp
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
