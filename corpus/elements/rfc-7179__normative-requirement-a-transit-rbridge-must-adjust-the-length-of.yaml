document: rfc-7179
kind: normative-requirement
summary: A transit RBridge MUST adjust the length of the extensions area (including changing Op-Length in the TRILL Header) if it adds or removes the extended header flags word, and MUST correctly set the critical summary bits if it adds the word or changes any critical flags.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
