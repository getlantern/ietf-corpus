document: rfc-4012
kind: protocol-element
summary: <mp-filter> extends the RPSL <filter> expression to allow IPv6 prefixes and prefix ranges in addition to IPv4. An Address-Prefix Set in an <mp-filter> may contain both IPv4 and IPv6 prefixes, e.g., { 192.0.2.0/24, 2001:0DB8::/32 }.
section: 2.5.2
topics:
    - routing
    - ip
