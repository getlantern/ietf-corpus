document: rfc-9132
kind: protocol-element
summary: Session configuration (Section 4.5) allows negotiation of 'heartbeat-interval' (seconds between heartbeats), 'missing-hb-allowed' (consecutive missed heartbeats before session declared lost), 'max-retransmit', 'ack-timeout', and 'ack-random-factor', permitting DOTS agents to tune reliability and keepalive behavior.
section: "4.5"
topics:
    - security
