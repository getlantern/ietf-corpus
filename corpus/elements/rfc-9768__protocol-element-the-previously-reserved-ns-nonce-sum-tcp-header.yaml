document: rfc-9768
kind: protocol-element
summary: The previously reserved NS (Nonce Sum) TCP header flag at bit offset 7 is renamed to AE (Accurate ECN). During the handshake it participates in ECN capability negotiation; after the handshake it forms the most significant bit of the 3-bit ACE counter field.
section: 3.1.1
topics:
    - tcp
    - congestion
    - registry
