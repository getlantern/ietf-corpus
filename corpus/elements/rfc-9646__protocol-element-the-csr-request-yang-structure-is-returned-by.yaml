document: rfc-9646
kind: protocol-element
summary: The 'csr-request' YANG structure is returned by the SZTP-server in the 'error-info' node of an HTTP 400 response. It specifies the selected key algorithm (DER-encoded AlgorithmIdentifier), selected CSR format (identityref), and an optional 'cert-req-info' (CertificationRequestInfo) the client must sign.
