document: rfc-5286
kind: normative-requirement
summary: For node-protecting alternates, neighbor N must satisfy D_opt(N,D) < D_opt(N,E) + D_opt(E,D). If this inequality is not strictly met, it SHOULD be assumed that the alternate does not offer node protection, because N may have equal-cost paths through E.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
