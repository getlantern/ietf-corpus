document: rfc-3032
kind: protocol-element
summary: Label value 2 is the IPv6 Explicit NULL Label, legal only at the bottom of the stack; it signals that the label stack must be popped and forwarding based on the IPv6 header. Label value 3 is the Implicit NULL Label, which never appears in the encapsulation but is used in the Label Distribution Protocol to signal a pop operation instead of a label replacement.
section: "2.1"
topics:
    - mpls
