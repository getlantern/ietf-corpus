document: rfc-5269
kind: normative-requirement
summary: If the RtSolPr validates and the CGA is already associated with a shared handover key, the AR MUST return the existing key. If no key exists, the AR MUST construct a new shared handover key, encrypt it with the handover key encryption public key, and insert it into a Handover Key Reply Option in the PrRtAdv.
section: "3.2"
rfc2119_level: MUST
topics:
    - mobility
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
