document: rfc-4618
kind: protocol-element
summary: 'Frame Relay Port mode provides many-to-one mapping: all FR VCs carried over a FR UNI/NNI interface between a CE and PE are mapped into a single HDLC PW. PW type 0x000F is used for Frame Relay Port mode, distinct from HDLC type 0x0006.'
