document: rfc-2401
kind: security-consideration
summary: The security afforded by IPsec is critically dependent on the quality of implementation and the operating environment, including OS security, quality of random number sources, and system management practices—none of which are within the scope of IPsec standards. IPsec is only one part of an overall system security architecture.
section: "11"
topics:
    - ipsec
    - security
