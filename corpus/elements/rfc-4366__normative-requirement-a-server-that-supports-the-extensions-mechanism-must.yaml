document: rfc-4366
kind: normative-requirement
summary: A server that supports the extensions mechanism MUST accept client hello messages in either the original or extended ClientHello format, MUST verify that the message length precisely matches one of these formats, and MUST send a fatal decode_error alert if it does not.
section: "2.1"
rfc2119_level: MUST
topics:
    - tls
    - security
