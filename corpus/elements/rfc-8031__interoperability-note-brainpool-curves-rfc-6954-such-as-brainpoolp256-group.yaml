document: rfc-8031
kind: interoperability-note
summary: Brainpool curves (RFC 6954), such as brainpoolP256 (group 28), provide comparable security to Curve25519 and NIST P-256 and are also generated in a fully verifiable way, but are significantly slower due to use of a pseudorandom prime.
