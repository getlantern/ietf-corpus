document: rfc-4769
kind: security-consideration
summary: Publishing PSTN Enumservice data in the public e164.arpa tree makes it anonymously visible to anyone. While comparable to telephone directory publication, it provides no indication of when or by whom data has been accessed, enabling data harvesting for purposes such as unsolicited telemarketing calls.
section: "7"
topics:
    - security
    - dns
    - privacy
