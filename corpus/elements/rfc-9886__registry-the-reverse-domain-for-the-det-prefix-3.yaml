document: rfc-9886
kind: registry
summary: The reverse domain for the DET prefix (3.0.0.1.0.0.2.ip6.arpa.) is managed by IANA, which liaises with ICAO to verify authenticity of delegations to Civil Aviation Authorities (CAAs). ISO 3166-1 country RAA assignments grant each nation 4 RAAs and optionally a /40 prefix covering all four.
