document: rfc-8550
kind: normative-requirement
summary: S/MIME agents MUST verify that a public key is valid before using it, and MUST use PKIX certificates to do so as described in RFC 5280. S/MIME agents MUST meet the certificate-processing requirements in this document in addition to those in RFC 5280.
section: "1"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - security
