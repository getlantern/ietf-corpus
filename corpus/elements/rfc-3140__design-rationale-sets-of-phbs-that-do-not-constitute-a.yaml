document: rfc-3140
kind: design-rationale
summary: Sets of PHBs that do not constitute a PHB Scheduling Class can still be identified, but must use more than one PHBID rather than a single set-encoding, because the single-PHBID set encoding carries the semantic guarantee of no reordering.
