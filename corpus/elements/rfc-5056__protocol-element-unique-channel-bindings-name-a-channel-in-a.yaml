document: rfc-5056
kind: protocol-element
summary: Unique channel bindings name a channel in a cryptographically secure manner and uniquely in time. End-point channel bindings name the authenticated end-points of a channel which are securely bound to the channel, but do not identify the channel uniquely in time.
section: "2"
topics:
