document: rfc-9625
kind: protocol-element
summary: Each Tenant Domain must be associated with a Supplementary Broadcast Domain (SBD). The SBD is treated as a real BD in the control plane but has no Attachment Circuits. It serves as the apparent source BD when a receiving PE is not attached to the actual source BD of a tunneled frame.
section: "2.1"
topics:
    - routing
    - mpls
