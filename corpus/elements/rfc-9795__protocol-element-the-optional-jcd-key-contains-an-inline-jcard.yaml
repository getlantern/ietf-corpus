document: rfc-9795
kind: protocol-element
summary: The optional "jcd" key contains an inline jCard JSON object (RFC 7095) with structured caller information. It is mutually exclusive with "jcl"; the jCard MAY contain URI-referenced content but those URIs MUST NOT further reference additional URIs.
