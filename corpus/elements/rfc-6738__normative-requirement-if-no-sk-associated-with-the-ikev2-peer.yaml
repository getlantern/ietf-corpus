document: rfc-6738
kind: normative-requirement
summary: If no SK associated with the IKEv2 peer is found, the IKEv2 server MUST send an Authorize-Only (Auth-Request-Type set to 'Authorize-Only') Diameter IKEv2-SK-Request message to the HAAA to obtain the SK.
section: "4.1"
rfc2119_level: MUST
topics:
