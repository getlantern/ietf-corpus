document: rfc-5258
kind: design-rationale
summary: The LIST-EXTENDED extension was created to avoid exponential growth in specialized list commands. Each new extension previously had to add its function to both LIST and LSUB, and combining extensions required yet more commands; LIST-EXTENDED consolidates these into mutually compatible options on a single command.
