document: rfc-9828
kind: interoperability-note
summary: This format differs from RFC 5371 (the earlier JPEG 2000 RTP payload format) by not relying on PLM/PLT marker segments, thus supporting sub-codestream latency. It also adds code-block caching, progressive segmented frame (PsF) support, explicit colorspace signaling (PRIMS/TRANS/MAT/RANGE), and an extended sequence number.
section: "1"
topics:
