document: rfc-5170
kind: design-rationale
summary: For small objects, reducing the encoding symbol length E artificially increases the number of symbols k, which improves LDPC code protection since LDPC codes perform better with larger block sizes. The E parameter is therefore optionally made a function of the object transfer length.
section: "5.3"
