document: rfc-7543
kind: normative-requirement
summary: When the BGP ROUTE-REFRESH message carries CP-ORF entries, the ORF Type MUST be equal to CP-ORF (65), the AFI MUST be equal to IPv4, IPv6, or L2VPN, and the Match field MUST be equal to PERMIT.
section: "2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
