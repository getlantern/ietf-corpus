document: rfc-8918
kind: interoperability-note
summary: 'LSP purge handling has evolved through multiple incompatible specifications: ISO 10589 allows TLVs in purges (just ignores them), RFC 5304 restricted purges to authentication TLV only, and RFC 6233/6232 further extended allowed purge TLVs. Each change is not backwards compatible with the prior behavior.'
section: "3.2"
topics:
    - routing
    - security
