document: rfc-5935
kind: design-rationale
summary: OctetString is mapped to hexBinary rather than xs:string because xs:string cannot faithfully represent all valid octet values (0–255) in a way that provides easy human readability. The hexBinary canonical form reliably encodes arbitrary binary data.
