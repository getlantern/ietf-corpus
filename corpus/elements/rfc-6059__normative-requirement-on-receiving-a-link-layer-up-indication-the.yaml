document: rfc-6059
kind: normative-requirement
summary: On receiving a link-layer 'up' indication, the host will initiate a DHCPv6 exchange (per RFC 3315) to verify whether DHCPv6-assigned addresses and configuration are still usable on the link. The Simple DNA procedure does not modify the DHCPv6 protocol or state machine.
section: 5.5.4
rfc2119_level: OPTIONAL
topics:
