document: rfc-6505
kind: protocol-element
summary: The <createconference> element requests creation of a new conference mixer. It carries optional 'conferenceid', 'reserved-talkers', and 'reserved-listeners' attributes, and optional child elements <codecs>, <audio-mixing>, <video-layouts>, <video-switch>, and <subscribe> for full conference configuration at creation time.
