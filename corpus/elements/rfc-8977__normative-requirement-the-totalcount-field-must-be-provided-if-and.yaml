document: rfc-8977
kind: normative-requirement
summary: The 'totalCount' field MUST be provided if and only if the query string contains the 'count' parameter. 'pageSize' and 'pageNumber' MUST be provided if and only if the total number of objects exceeds the page size.
section: "2.1"
rfc2119_level: MUST
