document: rfc-5040
kind: wire-format
summary: 'The Terminate Control field is 19 bits structured as: Layer (4 bits; 0000b=RDMA, 0001b=DDP, 0010b=LLP), EType (4 bits; 0000b=Local Catastrophic, 0001b=Remote Protection, 0010b=Remote Operation), Error Code (8 bits), and HdrCt (3 bits: M=DDP Segment Length valid, D=DDP Header included, R=RDMA Header included).'
