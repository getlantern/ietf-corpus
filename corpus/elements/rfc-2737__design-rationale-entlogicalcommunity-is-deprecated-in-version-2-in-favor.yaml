document: rfc-2737
kind: design-rationale
summary: entLogicalCommunity is deprecated in Version 2 in favor of entLogicalContextEngineID and entLogicalContextName, which provide proper SNMPv3 context identification. SNMPv3 agents may return a zero-length string for entLogicalCommunity or continue to support it for tri-lingual agent compatibility.
section: 2.14.4
topics:
