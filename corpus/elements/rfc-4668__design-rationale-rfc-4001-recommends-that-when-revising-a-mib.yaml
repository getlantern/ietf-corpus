document: rfc-4668
kind: design-rationale
summary: RFC 4001 recommends that when revising a MIB with IPv4-specific tables, new tables using version-neutral InetAddressType/InetAddress textual conventions should be defined with status 'current', while old IPv4-only tables should be changed to 'deprecated'. Having multiple similar tables for different IP versions is strongly discouraged. RFC 4668 follows this guidance by deprecating radiusAuthServerTable and introducing radiusAuthServerExtTable.
section: "4"
topics:
    - radius
    - snmp
    - security
