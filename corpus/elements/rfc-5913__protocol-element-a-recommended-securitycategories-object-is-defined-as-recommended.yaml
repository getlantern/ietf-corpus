document: rfc-5913
kind: protocol-element
summary: A recommended securityCategories object is defined as 'recommended-category SECURITY-CATEGORY ::= { BIT STRING IDENTIFIED BY OID }'. The type-specific intersection for this type is a bitwise AND of the two BIT STRING values; an all-zeros result is treated as an empty intersection.
