document: rfc-2232
kind: design-rationale
summary: CPSVRMGR pipe status is presented as a single combined value rather than exposing two separate contention-winner and contention-loser session states, because the meaningful operational state for management purposes is the aggregate pipe status. A matrix in the MIB description documents how individual session states map to the combined value.
