document: rfc-8007
kind: normative-requirement
summary: Trigger Status Resources belonging to a uCDN MUST NOT be visible to any other CDN. The dCDN must enforce isolation, e.g., by offering different collection URLs per uCDN and filtering responses by authenticated identity.
section: "3"
rfc2119_level: MUST NOT
