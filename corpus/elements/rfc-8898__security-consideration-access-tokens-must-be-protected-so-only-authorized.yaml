document: rfc-8898
kind: security-consideration
summary: Access tokens MUST be protected so only authorized SIP servers can access them. SIP endpoints MUST use encrypted JWTs unless another mechanism provides equivalent protection, because TLS alone is insufficient due to SIP intermediary proxies.
section: "5"
topics:
