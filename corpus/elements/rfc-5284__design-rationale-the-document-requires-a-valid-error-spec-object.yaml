document: rfc-5284
kind: design-rationale
summary: The document requires a valid ERROR_SPEC object to always accompany USER_ERROR_SPEC in order to not change the mandatory contents of PathErr, ResvErr, and Notify messages, maintaining compliance with RFC 2205 and RFC 3473.
