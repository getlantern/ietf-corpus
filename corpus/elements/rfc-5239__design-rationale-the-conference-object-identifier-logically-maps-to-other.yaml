document: rfc-5239
kind: design-rationale
summary: The conference object identifier logically maps to other protocol-specific identifiers (e.g., BFCP 'confid') rather than requiring those protocols to use the URI natively. This mapping is treated as sensitive because it reveals internal conference topology and identifier associations to parties who should not have that visibility.
section: 6.2.1
topics:
    - realtime
    - security
