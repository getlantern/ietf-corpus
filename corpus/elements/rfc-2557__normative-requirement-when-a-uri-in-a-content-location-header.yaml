document: rfc-2557
kind: normative-requirement
summary: When a URI in a Content-Location header contains octets outside the 7-bit range and the correct charset cannot be established, the charset parameter value 'UNKNOWN-8BIT' MUST be used; otherwise the correct charset SHOULD be used, or 'US-ASCII' if the URI is entirely 7-bit.
section: 4.4.1
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
