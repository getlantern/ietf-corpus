document: rfc-5990
kind: security-consideration
summary: The security of RSA-KEM is tightly related to the difficulty of solving the RSA problem or breaking the symmetric key-wrapping scheme, assuming the KDF is modeled as a random oracle and the wrapping scheme satisfies data encapsulation mechanism properties. The RSA key size and underlying components should be selected consistent with the desired symmetric security level.
