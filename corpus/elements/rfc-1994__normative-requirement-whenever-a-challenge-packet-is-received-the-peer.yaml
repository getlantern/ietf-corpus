document: rfc-1994
kind: normative-requirement
summary: Whenever a Challenge packet is received, the peer MUST transmit a Response packet (Code=2). The Response Identifier MUST be copied from the Identifier field of the Challenge that triggered the Response.
section: "4.1"
rfc2119_level: MUST
