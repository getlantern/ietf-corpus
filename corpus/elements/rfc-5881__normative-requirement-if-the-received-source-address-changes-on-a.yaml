document: rfc-5881
kind: normative-requirement
summary: If the received source address changes on a point-to-point link, the local system MUST NOT use the new address as the destination in outgoing BFD Control packets; it MUST continue to use the address configured at session creation.
section: "6"
rfc2119_level: MUST NOT
topics:
    - routing
