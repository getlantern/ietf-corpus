document: rfc-4741
kind: protocol-element
summary: 'The <rpc-error> element carries structured error information including: error-type (transport/rpc/protocol/application), error-tag, error-severity (error/warning), error-app-tag, error-path (XPath), error-message, and error-info for protocol- or data-model-specific content.'
