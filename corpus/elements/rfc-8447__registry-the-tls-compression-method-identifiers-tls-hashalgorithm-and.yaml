summary: 'The TLS Compression Method Identifiers, TLS HashAlgorithm, and TLS SignatureAlgorithm registries were annotated as orphaned: their values apply only to (D)TLS versions prior to 1.3. TLS 1.3 values for signature algorithms are registered in the TLS SignatureScheme registry instead.'
