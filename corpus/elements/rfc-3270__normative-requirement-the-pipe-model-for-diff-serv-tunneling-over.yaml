document: rfc-3270
kind: normative-requirement
summary: The Pipe Model for Diff-Serv tunneling over MPLS MUST be supported. In this model the LSP hides intermediate nodes from the Diff-Serv perspective, conveying both LSP Diff-Serv information (meaningful to intermediate and egress nodes) and Tunneled Diff-Serv information (meaningful beyond the egress) simultaneously and operates without PHP.
section: 2.6.2
rfc2119_level: MUST
topics:
    - mpls
    - diffserv
    - qos
