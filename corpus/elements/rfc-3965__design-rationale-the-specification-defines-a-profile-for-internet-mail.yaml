document: rfc-3965
kind: design-rationale
summary: The specification defines a profile for Internet mail rather than creating a distinct 'facsimile over the Internet' service. This ensures interoperability with existing email users and software without requiring new data structures or mechanisms beyond standard Internet mail.
section: "1"
