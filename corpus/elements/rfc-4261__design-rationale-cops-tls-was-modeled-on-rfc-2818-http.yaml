document: rfc-4261
kind: design-rationale
summary: COPS/TLS was modeled on RFC 2818 (HTTP Over TLS). The Upward Negotiation approach was selected over Separate Ports because the latter requires a new well-known port per secure protocol variant and does not scale; existing issues with Separate Ports are documented in RFC 2595.
section: "3"
topics:
