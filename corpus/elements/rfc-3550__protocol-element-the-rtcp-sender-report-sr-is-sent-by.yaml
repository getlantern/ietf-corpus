document: rfc-3550
kind: protocol-element
summary: The RTCP Sender Report (SR) is sent by active data senders and conveys a 64-bit NTP wallclock timestamp, a 32-bit RTP timestamp, a 32-bit cumulative sender packet count, and a 32-bit cumulative octet count, followed by up to 31 reception report blocks (one per source).
