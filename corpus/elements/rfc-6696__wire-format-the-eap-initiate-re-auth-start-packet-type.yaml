document: rfc-6696
kind: wire-format
summary: The EAP-Initiate/Re-auth-Start packet (Type=1, Code=5) contains the standard EAP header, a Reserved byte (MUST be zero), and optional TV/TLV attributes. The Domain name TLV (Type=4, variable length up to NAI realm limits) SHOULD be present so the peer can learn the local domain without lower-layer support.
section: 5.3.1
topics:
    - security
