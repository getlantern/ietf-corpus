document: rfc-3655
kind: design-rationale
summary: Embedding a full DNSSEC resolver into every application was rejected because DNSSEC validation is CPU and network intensive (requiring caching), and requires non-trivial configuration including root key and island-of-security keys; the AD bit approach minimizes configuration points.
section: "1.1"
topics:
    - dns
    - security
