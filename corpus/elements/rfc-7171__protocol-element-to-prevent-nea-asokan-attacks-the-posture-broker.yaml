document: rfc-7171
kind: protocol-element
summary: To prevent NEA Asokan attacks, the Posture Broker on an EMA-equipped endpoint must pass the tls-unique channel binding (RFC 5929) from PT-EAP's tunnel method to the EMA. The EMA includes it in its attestation, allowing the Posture Validator to confirm both ends of the tunnel share the same tls-unique value.
section: "3.4"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
