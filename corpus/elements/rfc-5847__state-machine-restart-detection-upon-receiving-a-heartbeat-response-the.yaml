document: rfc-5847
kind: state-machine
summary: 'Restart detection: upon receiving a Heartbeat Response, the node compares the included Restart Counter to the stored value. If different (or no prior value), it assumes the peer crashed and recovered, stores the new counter, and signals the restart to the local PMIPv6 stack.'
section: "3.2"
