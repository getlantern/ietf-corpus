document: rfc-8224
kind: protocol-element
summary: The Identity header field consolidates Identity-Info from RFC 4474 into a single header with 'info', 'alg', and optional 'ppt' (PASSporT Type) parameters. Unlike RFC 4474, the Identity header field may appear more than once in a single SIP request. The signed-identity-digest contains a base64-encoded PASSporT (full or compact form).
section: "4"
