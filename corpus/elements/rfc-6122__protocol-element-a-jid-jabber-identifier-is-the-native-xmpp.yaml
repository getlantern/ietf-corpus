document: rfc-6122
kind: protocol-element
summary: 'A JID (Jabber Identifier) is the native XMPP address, structured as an ordered sequence of optional localpart, required domainpart, and optional resourcepart, demarcated by ''@'' and ''/'' separators respectively. The ABNF is: jid = [ localpart "@" ] domainpart [ "/" resourcepart ].'
section: "2.1"
topics:
    - security
