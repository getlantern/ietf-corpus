document: rfc-2280
kind: interoperability-note
summary: The optional 'protocol <p1> into <p2>' clauses on import/export attributes extend RPSL to non-BGP protocols and support route redistribution between protocols (e.g., BGP4 into OSPF or STATIC into BGP4). Both protocol fields default to the Internet exterior gateway protocol (BGP) if omitted.
section: "6.3"
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
