document: rfc-5854
kind: protocol-element
summary: The 'metalink:file' element represents an individual file and acts as a container for its metadata. It MUST have a unique 'name' attribute and MUST contain at least one metalink:url or metalink:metaurl element. It SHOULD contain exactly one metalink:size element.
section: 4.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
