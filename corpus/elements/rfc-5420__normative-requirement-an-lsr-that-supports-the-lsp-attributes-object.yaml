document: rfc-5420
kind: normative-requirement
summary: An LSR that supports the LSP_ATTRIBUTES object but does not recognize a TLV type code carried in it MUST pass the TLV on unaltered in the downstream Path message. An LSR that does not recognize a set bit in the Attribute Flags TLV MUST forward the TLV unchanged.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
