summary: 'Each MPLS label stack entry in the object payload is encoded as 4 octets: a 20-bit Label field, a 3-bit Exp (Experimental Use) field, a 1-bit S (Bottom of Stack) field, and an 8-bit TTL field. The total object length is 4 + 4*(number of MPLS LSEs).'
