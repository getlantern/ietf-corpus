document: rfc-7179
kind: normative-requirement
summary: Any egress RBridge receiving a frame with a critical ingress-to-egress extension it does not implement MUST drop the frame if it is a unicast frame (M bit = 0). For a multi-destination frame (M=1), the RBridge MUST NOT egress the frame but still forwards it on the distribution tree.
section: "2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
