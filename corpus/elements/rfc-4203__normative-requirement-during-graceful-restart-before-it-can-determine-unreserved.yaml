document: rfc-4203
kind: normative-requirement
summary: During graceful restart, before it can determine unreserved resources, the restarting node SHOULD originate TE LSAs with 0 unreserved bandwidth; for LSC or FSC links, also with 0 Max LSP Bandwidth. This discourages new LSP establishment through the restarting router.
section: "2"
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
