document: rfc-2192
kind: normative-requirement
summary: When `;AUTH=<enc_auth_type>` is present, the client SHOULD request credentials from that mechanism and use the AUTHENTICATE command instead of LOGIN. If no user name is specified, one SHOULD be obtained from the mechanism or requested from the user.
section: "3"
rfc2119_level: SHOULD
topics:
    - email
