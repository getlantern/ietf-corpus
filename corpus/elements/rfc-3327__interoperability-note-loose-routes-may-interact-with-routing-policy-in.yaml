document: rfc-3327
kind: interoperability-note
summary: Loose routes may interact with routing policy in non-obvious ways at the home proxy. The stored path vector is generally appended to any locally configured route needed to egress the service cluster; the combination must provide valid routing in the local environment. The service proxy MAY transform the stored path vector as needed.
section: "5.4"
topics:
    - sip
    - realtime
