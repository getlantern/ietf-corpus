document: rfc-9777
kind: interoperability-note
summary: MLDv2 is designed to interoperate with MLDv1. Nodes maintain a per-interface Host Compatibility Mode variable. In the presence of MLDv1 routers, MLDv2 listeners fall back to sending MLDv1 Reports; in the presence of MLDv1 listeners, MLDv2 routers must still provide multicast service. Query version is determined by message length and content.
section: "8"
topics:
