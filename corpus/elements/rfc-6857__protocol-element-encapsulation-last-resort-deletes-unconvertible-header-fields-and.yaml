document: rfc-6857
kind: protocol-element
summary: 'Encapsulation (last resort) deletes unconvertible header fields and replaces them with Downgraded-* header fields whose values are the original field values encoded as encoded-words. Defined fields are: Downgraded-Message-Id, Downgraded-Resent-Message-Id, Downgraded-In-Reply-To, Downgraded-References, Downgraded-Original-Recipient, and Downgraded-Final-Recipient.'
section: 3.1.10
topics:
    - email
