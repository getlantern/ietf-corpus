document: rfc-7613
kind: protocol-element
summary: 'The OpaqueString profile applies to the PRECIS FreeformClass and enforces five rules: (1) fullwidth/halfwidth characters MUST NOT be mapped to decompositions, (2) non-ASCII space MUST be mapped to ASCII space U+0020, (3) no case mapping, (4) NFC normalization, (5) no directionality rule.'
section: "4.2"
topics:
