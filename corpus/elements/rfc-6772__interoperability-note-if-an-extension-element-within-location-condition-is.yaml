document: rfc-6772
kind: interoperability-note
summary: If an extension element within <location-condition> is not understood by the rule evaluator, the entire rule evaluates to FALSE. However, a <location-condition> is considered TRUE if any <location> element understood by the evaluator is TRUE, allowing partial forward compatibility.
section: "4"
topics:
