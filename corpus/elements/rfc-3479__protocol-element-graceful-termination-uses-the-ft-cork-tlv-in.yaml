document: rfc-3479
kind: protocol-element
summary: 'Graceful termination uses the FT Cork TLV in a Keepalive to quiesce a session before controlled shutdown or software upgrade. It triggers a three-way handshake: the initiating peer requests a flush, the remote peer ACKs and optionally piggybacks its own Protection TLV, and upon full acknowledgment the ''Temporary Shutdown'' Notification is sent before disconnecting.'
section: 4.6.1
topics:
    - mpls
    - routing
