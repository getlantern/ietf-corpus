document: rfc-8375
kind: design-rationale
summary: An exception is made for stub resolvers to use locally provided resolvers for 'home.arpa.' even when configured to use other resolvers because non-local resolvers will either fail to answer or provide incorrect answers for homenet-local subdomains.
