document: rfc-1889
kind: normative-requirement
summary: Senders are collectively allocated at least 1/4 of the RTCP control traffic bandwidth so that newly joining participants receive CNAME for active sending sites quickly. The RTCP interval is varied randomly over [0.5, 1.5] times the calculated value to avoid unintended synchronization.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
