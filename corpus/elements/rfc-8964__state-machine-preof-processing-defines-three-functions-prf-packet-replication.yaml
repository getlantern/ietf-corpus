document: rfc-8964
kind: state-machine
summary: 'PREOF processing defines three functions: PRF (Packet Replication Function) copies App-flow data to multiple outgoing member flows; PEF (Packet Elimination Function) discards duplicate sequence numbers on receipt; POF (Packet Ordering Function) reorders packets per d-CW sequence number. A relay node may chain PEF then PRF, and the sequence number is preserved across the compound operation.'
section: 4.2.2
topics:
    - mpls
