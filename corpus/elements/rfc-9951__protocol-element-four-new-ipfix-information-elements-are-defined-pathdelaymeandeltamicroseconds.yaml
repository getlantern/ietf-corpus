summary: 'Four new IPFIX Information Elements are defined: pathDelayMeanDeltaMicroseconds (530), pathDelayMinDeltaMicroseconds (531), pathDelayMaxDeltaMicroseconds (532), and pathDelaySumDeltaMicroseconds (533). These expose On-Path delay measured at OAM header transit and decapsulating nodes within an IPFIX Flow Record.'
