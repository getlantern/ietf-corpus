summary: 'UUIDv1 layout: time_low (32-bit, bits 0-31), time_mid (16-bit, bits 32-47), ver=0b0001 (4-bit, bits 48-51), time_high (12-bit, bits 52-63), var=0b10 (2-bit, bits 64-65), clock_seq (14-bit, bits 66-79), node (48-bit IEEE 802 MAC or random, bits 80-127). Timestamp is 60-bit count of 100-nanosecond intervals since 15 October 1582 (Gregorian Epoch).'
