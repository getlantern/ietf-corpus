document: rfc-7662
kind: normative-requirement
summary: If the introspection call is properly authorized but the token is not active, does not exist, or the protected resource is not allowed to introspect it, the authorization server MUST return an introspection response with the 'active' field set to 'false'.
section: "2.2"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
