document: rfc-9447
kind: design-rationale
summary: An Authority Token may attest all resources a client is eligible for, not just those in the current certificate request. This pre-authorization allows the client to avoid returning to the Token Authority for subsequent narrower-scope certificates within the token's expiry period.
section: "3.2"
topics:
    - acme
    - pkix
