document: rfc-5946
kind: normative-requirement
summary: By default, the RSVP Receiver Proxy MUST NOT include the Path_State_Removed flag in the ERROR_SPEC of the PathErr message, ensuring predictable operations in environments where some RSVP routers do not understand that flag.
