document: rfc-6487
kind: normative-requirement
summary: Every resource certificate MUST contain either the IP Address Delegation or the Autonomous System Identifier Delegation extension (or both), and these extensions MUST be marked as critical. The sorted canonical format with maximal spanning ranges MUST be used for the resource extension field.
section: "2"
rfc2119_level: MUST
topics:
    - pkix
    - security
    - routing
