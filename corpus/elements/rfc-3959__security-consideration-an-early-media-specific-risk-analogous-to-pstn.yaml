document: rfc-3959
kind: security-consideration
summary: 'An early media-specific risk analogous to PSTN toll fraud exists: rogue UAs may establish a bidirectional early media session and never send a 2xx response to exploit charging policies that treat early media as free. Operators should consider charging early media sessions that last too long or stopping them at the media level.'
section: "8"
topics:
    - sip
    - security
    - realtime
