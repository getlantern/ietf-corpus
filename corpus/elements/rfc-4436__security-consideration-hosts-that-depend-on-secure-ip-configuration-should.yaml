document: rfc-4436
kind: security-consideration
summary: Hosts that depend on secure IP configuration SHOULD NOT use DNAv4 but SHOULD instead use DHCP authentication (RFC3118), possibly combined with the Rapid Commit Option (RFC4039). The effect of ARP/DHCP spoofing attacks is typically limited to denial of service unless the IP configuration is used for security or location determination.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - security
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
