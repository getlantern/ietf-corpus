summary: The Router Informational Capabilities TLV (Type=1) is the first defined TLV in the RI LSA body. Its Value field is a variable-length sequence of capability bits rounded to a multiple of 4 octets; initially 4 octets (32 bits) of capability bits are defined, numbered left-to-right from bit 0.
