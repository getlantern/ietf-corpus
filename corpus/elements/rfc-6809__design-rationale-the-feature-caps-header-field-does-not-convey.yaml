document: rfc-6809
kind: design-rationale
summary: The Feature-Caps header field does not convey the address of the SIP entity that inserted it. If address information about the inserting entity is needed, the individual feature-capability indicator definition must specify a way to include that address as an indicator value.
section: 4.2.1
topics:
    - sip
