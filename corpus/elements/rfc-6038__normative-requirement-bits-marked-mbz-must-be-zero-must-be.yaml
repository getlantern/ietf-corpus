document: rfc-6038
kind: normative-requirement
summary: Bits marked MBZ (Must Be Zero) MUST be set to zero by senders and MUST be ignored by receivers. The HMAC MUST be calculated as defined in Section 3.2 of RFC 4656.
section: "1"
rfc2119_level: MUST
