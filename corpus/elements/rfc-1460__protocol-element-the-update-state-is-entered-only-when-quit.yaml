document: rfc-1460
kind: protocol-element
summary: The UPDATE state is entered only when QUIT is issued from the TRANSACTION state. The server deletes all messages marked for deletion, releases the exclusive-access lock on the maildrop, replies with the outcome, and closes the TCP connection. Issuing QUIT from AUTHORIZATION terminates without entering UPDATE.
section: "6"
topics:
