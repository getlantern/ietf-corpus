document: rfc-8444
kind: normative-requirement
summary: The supported BAR and IPA algorithms MUST be consistent for all routers supporting a given BFR sub-domain. If a router receives a BIER Sub-TLV with mismatched BAR or IPA values, it MUST report a misconfiguration and MUST ignore the BIER Sub-TLV containing the error.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
