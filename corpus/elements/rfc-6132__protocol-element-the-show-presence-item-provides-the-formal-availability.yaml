document: rfc-6132
kind: protocol-element
summary: 'The ''show'' presence item provides the formal availability status of the user with defined values: ''away'' (temporarily away), ''chat'' (online and interested in chatting), ''dnd'' (Do Not Disturb), ''offline'', ''xa'' (extended away), or ''unknown''. This mirrors the XMPP presence element defined in RFC 6121 Section 4.7.2.1.'
section: "2"
