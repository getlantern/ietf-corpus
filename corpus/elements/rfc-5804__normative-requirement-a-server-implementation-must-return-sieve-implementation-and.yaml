document: rfc-5804
kind: normative-requirement
summary: A server implementation MUST return SIEVE, IMPLEMENTATION, and VERSION capabilities in response to every capabilities exchange. The SASL capability list MUST be non-empty after TLS is established.
section: "1.7"
rfc2119_level: MUST
