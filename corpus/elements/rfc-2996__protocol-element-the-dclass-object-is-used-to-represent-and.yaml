document: rfc-2996
kind: protocol-element
summary: The DCLASS object is used to represent and carry Differentiated Services Code Points (DSCPs) within RSVP messages, enabling RSVP signaling to request QoS services in a differentiated service network. It is added to RESV messages by RSVP-aware network elements to convey upstream packet marking information.
