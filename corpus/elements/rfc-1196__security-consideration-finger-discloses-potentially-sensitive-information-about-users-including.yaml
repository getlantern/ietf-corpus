document: rfc-1196
kind: security-consideration
summary: Finger discloses potentially sensitive information about users, including last login time, mail status, and recent correspondents. Sites should make an explicit decision about whether to run Finger and what information to expose, as existing implementations can reveal enough to track ongoing conversations.
section: "3.2"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
