document: rfc-6059
kind: normative-requirement
summary: 'Where NS/NA and RS/RA results conflict for the same router, the RS/RA result is definitive. Exception: if the NA was SEND-secured but the RA was not, the host MUST wait SEND_NA_GRACE_TIME (40 ms) for a SEND-secured RA before adopting NS/NA conclusions.'
section: 5.7.3.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
