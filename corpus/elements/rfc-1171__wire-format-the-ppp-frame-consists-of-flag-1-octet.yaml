document: rfc-1171
kind: wire-format
summary: 'The PPP frame consists of: Flag (1 octet, 0x7e), Address (1 octet, 0xff), Control (1 octet, 0x03), Protocol (2 octets), Information (variable, default max 1500 octets), FCS (2 or 4 octets), and closing Flag (0x7e). Fields are transmitted left to right, most significant octet first.'
