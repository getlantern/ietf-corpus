document: rfc-9665
kind: design-rationale
summary: SRP uses two protocol variants because low-power CNN devices have severe battery constraints; the series of DNS lookups needed for full registrar discovery would waste energy. CNN devices receive registrar addresses during network join, avoiding these lookups.
section: 3.1.3
topics:
