document: rfc-7666
kind: normative-requirement
summary: A command generator MUST use vmUUID (the 128-bit UUID) to identify a given virtual machine of interest, because vmIndex may not persist across hypervisor re-initializations. The UUID MUST uniquely identify a VM across all virtual machines in an administrative domain.
section: "6.1"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
