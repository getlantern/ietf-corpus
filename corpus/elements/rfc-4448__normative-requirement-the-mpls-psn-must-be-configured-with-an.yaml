document: rfc-4448
kind: normative-requirement
summary: The MPLS PSN MUST be configured with an MTU large enough to transport a maximum-sized Ethernet frame encapsulated with a control word, a pseudowire demultiplexer, and a tunnel encapsulation — likely 8 or more bytes greater than the largest frame size with MPLS tunneling.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
