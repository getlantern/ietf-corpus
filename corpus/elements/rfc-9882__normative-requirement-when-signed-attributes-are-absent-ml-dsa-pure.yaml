document: rfc-9882
kind: normative-requirement
summary: When signed attributes are absent, ML-DSA pure mode signatures are computed over the value of the encapContentInfo eContent OCTET STRING (tag and length octets not included). When signed attributes are present, signatures are computed over the complete DER encoding of SignedAttrs with an EXPLICIT SET OF tag.
section: "3.2"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
