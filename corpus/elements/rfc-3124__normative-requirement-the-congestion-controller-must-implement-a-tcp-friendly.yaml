document: rfc-3124
kind: normative-requirement
summary: The congestion controller MUST implement a TCP-friendly congestion control algorithm. The congestion control module MUST implement the abstract query(), notify(), and update() interfaces to allow modular interoperability with separately developed schedulers.
section: "4.1"
rfc2119_level: MUST
topics:
    - congestion
    - tcp
