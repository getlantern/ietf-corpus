document: rfc-3344
kind: normative-requirement
summary: When an Extension with Type 0–127 is encountered but not recognized, the message containing that extension MUST be silently discarded. When an Extension with Type 128–255 is not recognized, that extension is ignored but the rest of the message MUST still be processed.
section: "1.8"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
