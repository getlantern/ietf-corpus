document: rfc-3775
kind: interoperability-note
summary: Mobile IPv6 uses IPv6 Neighbor Discovery instead of ARP, decoupling the protocol from any particular link layer and allowing operation across heterogeneous media (Ethernet, wireless LAN, etc.) without link-layer-specific adaptations. IPv6 Neighbor Unreachability Detection also assures symmetric reachability between the mobile node and its default router.
