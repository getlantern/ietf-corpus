document: rfc-6148
kind: protocol-element
summary: The DHCPLEASEQUERY message uses DHCP message format from RFC 2131 with message type number 10 (option 53). It carries option 82 with only the Remote ID sub-option (sub-option 2) to identify the circuit/connection being queried.
