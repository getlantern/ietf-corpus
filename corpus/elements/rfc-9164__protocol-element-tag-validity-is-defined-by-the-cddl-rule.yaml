document: rfc-9164
kind: protocol-element
summary: Tag validity is defined by the CDDL rule ip-address-or-prefix (Figure 1), which constrains overall structure, integer value ranges (IPv6 prefix length 0..128, IPv4 0..32), and byte-string lengths (IPv6 address exactly 16 bytes, IPv4 exactly 4 bytes, prefix byte strings at most 16 or 4 bytes). An instance is valid if it matches this rule and satisfies the encoder/decoder prefix constraints of Sections 4.2 and 4.3.
