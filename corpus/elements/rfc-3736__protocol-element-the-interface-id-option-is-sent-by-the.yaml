document: rfc-3736
kind: protocol-element
summary: The Interface-ID option is sent by the DHCP relay agent and returned by the server to identify the interface to be used when forwarding a message to the client (RFC 3315 section 22.18). It is required for relay agents in stateless DHCP service.
section: "5.2"
topics:
