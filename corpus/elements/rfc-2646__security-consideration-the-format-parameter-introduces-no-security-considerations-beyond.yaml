document: rfc-2646
kind: security-consideration
summary: The Format parameter introduces no security considerations beyond those applicable to Text/Plain. The interaction between Format=Flowed and digital signatures or encryption is discussed in section 4.6, requiring that cryptographic processing operate on the on-wire formatted content.
