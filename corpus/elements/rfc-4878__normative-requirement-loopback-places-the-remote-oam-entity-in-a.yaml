document: rfc-4878
kind: normative-requirement
summary: Loopback places the remote OAM entity in a state where every received frame (except OAMPDUs) is echoed back without modification; normal traffic forwarding is disabled at the remote entity during loopback. This is described as an intrusive operation that should be used accordingly.
section: "3.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
