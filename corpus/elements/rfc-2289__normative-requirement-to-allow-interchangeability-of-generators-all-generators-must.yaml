document: rfc-2289
kind: normative-requirement
summary: To allow interchangeability of generators, all generators MUST support a secret pass-phrase of 10 to 63 characters. Implementations MAY support longer pass-phrases but risk loss of interchangeability.
section: "6"
rfc2119_level: MUST
topics:
    - security
