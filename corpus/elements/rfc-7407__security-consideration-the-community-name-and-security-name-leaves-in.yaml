document: rfc-7407
kind: security-consideration
summary: The community name and security-name leaves in ietf-snmp-community carry nacm:default-deny-all annotations, meaning NETCONF access control must be explicitly granted before these values can be read or written. This prevents inadvertent exposure of community strings through NETCONF.
section: "4.8"
topics:
    - snmp
    - security
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
