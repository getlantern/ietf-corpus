document: rfc-9760
kind: design-rationale
summary: Delay Request messages MAY be sent as either multicast or unicast, allowing interoperability with Ordinary Clocks that do not support the Enterprise Profile if they are timeReceiver Only Clocks. This mixed approach is the central innovation of this profile.
