document: rfc-6544
kind: normative-requirement
summary: If there are TCP candidates for a media stream, a controlling agent MUST use the regular selection algorithm (not aggressive). This prevents a race condition where aggressive selection could cause a transient pair to be selected, causing other connections to be closed prematurely.
section: "8"
rfc2119_level: MUST
topics:
    - tcp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
