document: rfc-7987
kind: interoperability-note
summary: When the originating IS has a smaller MaxAge than the receiving IS, setting the received Remaining Lifetime to the local MaxAge prevents premature purge. When the receiver's MaxAge is smaller than the originator's, premature purging may still occur; implementors may make the floor value configurable to address this.
section: "3.1"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
