document: rfc-9294
kind: normative-requirement
summary: Application-specific link attributes received from an OSPF node using an ASLA sub-TLV, or from an IS-IS node using either an ASLA sub-TLV or an Application-Specific SRLG TLV, MUST be encoded in the BGP-LS ASLA TLV as sub-TLVs (with specified exceptions).
section: "4"
rfc2119_level: MUST
topics:
    - routing
    - bgp
