document: rfc-2661
kind: security-consideration
summary: L2TP tunnel authentication uses a CHAP-style challenge/response mechanism. The LAC and LNS exchange Challenge AVPs in SCCRQ/SCCRP and must return a valid Challenge Response AVP (16-octet MD5 hash) in SCCRP/SCCCN before the tunnel is considered authenticated.
section: 5.1.1
topics:
    - vpn
    - crypto
    - security
