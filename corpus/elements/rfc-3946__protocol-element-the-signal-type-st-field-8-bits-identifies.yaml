document: rfc-3946
kind: protocol-element
summary: 'The Signal Type (ST) field (8 bits) identifies the Elementary Signal for an LSP. Twelve values are defined: VT1.5 SPE/VC-11 (1), VT2 SPE/VC-12 (2), VT3 SPE (3), VT6 SPE/VC-2 (4), STS-1 SPE/VC-3 (5), STS-3c SPE/VC-4 (6), and transparency-only signals STS-1/STM-0 through STS-768/STM-256 (7–12). Successive transforms (contiguous concatenation, virtual concatenation, transparency, multiplication) are applied to the Elementary Signal to produce the Final Signal.'
section: "2.1"
topics:
    - mpls
    - routing
