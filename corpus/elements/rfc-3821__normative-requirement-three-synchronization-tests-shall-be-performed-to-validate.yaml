document: rfc-3821
kind: normative-requirement
summary: 'Three synchronization tests SHALL be performed to validate the incoming byte stream: (1) Frame Length in range 15 < Length < 545, (2) Frame Length equals ones complement, and (3) a valid EOF is found at the location indicated by the Frame Length field.'
section: 5.6.2.2
rfc2119_level: REQUIRED
