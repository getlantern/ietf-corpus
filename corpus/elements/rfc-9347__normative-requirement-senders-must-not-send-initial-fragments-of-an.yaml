document: rfc-9347
kind: normative-requirement
summary: Senders MUST NOT send initial fragments of an inner packet using one SA and subsequent fragments in a different SA, because sequence numbers are reset when switching SAs (e.g., on rekeying).
section: 2.2.3
rfc2119_level: MUST NOT
