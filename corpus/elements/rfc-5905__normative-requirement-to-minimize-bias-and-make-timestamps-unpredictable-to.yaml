document: rfc-5905
kind: normative-requirement
summary: To minimize bias and make timestamps unpredictable to an intruder, the non-significant bits of timestamp fractions should be set to an unbiased random bit string. Clock resolution is defined as 2^(-p) seconds where p is the number of significant bits.
section: "6"
rfc2119_level: SHOULD
topics:
    - ntp
    - security
