document: rfc-8695
kind: protocol-element
summary: The redistribute container supports importing routes from BGP (by ASN), CG-NAT, connected, IPsec, IS-IS (by instance and level), NAT, OSPFv2 (RIPv2 only, by instance and route-type), OSPFv3 (RIPng only, by instance and route-type), RIPv2-to-RIPv2, RIPng-to-RIPng, and static routes. Each redistribution entry supports optional metric (0..16) and route-policy.
