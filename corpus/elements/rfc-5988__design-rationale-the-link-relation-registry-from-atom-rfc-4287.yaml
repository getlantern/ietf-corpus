document: rfc-5988
kind: design-rationale
summary: The link relation registry from Atom (RFC 4287) is broadened to a format-independent registry to allow typed links that are independent of their serialisation (HTML, Atom, HTTP headers), especially useful when a resource has representations in multiple formats.
