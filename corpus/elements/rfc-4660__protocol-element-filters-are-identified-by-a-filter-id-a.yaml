document: rfc-4660
kind: protocol-element
summary: Filters are identified by a filter ID. A filter is replaced by reissuing it with the same filter ID; changing the filter ID while keeping the resource URI is an error causing the server to assume two filters for the same resource.
section: 3.3.3
topics:
