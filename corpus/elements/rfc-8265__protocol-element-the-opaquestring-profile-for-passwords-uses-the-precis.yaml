document: rfc-8265
kind: protocol-element
summary: 'The OpaqueString profile for passwords uses the PRECIS FreeformClass with: no Width Mapping, Additional Mapping of non-ASCII space to SPACE (U+0020), no Case Mapping, NFC Normalization, and no Directionality Rule. The absence of the Bidi Rule is intentional to maximize password entropy.'
section: 4.2.2
topics:
    - security
    - registry
