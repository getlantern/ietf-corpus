summary: Using the optimized workflow, a minimum of 128-bit security against online brute-force attacks is achieved after the client receives and successfully verifies the first OSCORE-protected response. With method 3 and cipher suite 2, this combines 64-bit MACs from EDHOC message_3 and the first OSCORE request/response.
