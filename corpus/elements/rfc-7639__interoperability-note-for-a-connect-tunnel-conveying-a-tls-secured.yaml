document: rfc-7639
kind: interoperability-note
summary: For a CONNECT tunnel conveying a TLS-secured protocol, the value of the ALPN header field MUST contain the same list of ALPN identifiers that will be sent in the TLS ClientHello message. For protocols without negotiation, a single ALPN identifier is used.
section: "2.3"
topics:
    - http
    - tls
