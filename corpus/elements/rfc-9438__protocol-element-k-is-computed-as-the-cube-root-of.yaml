document: rfc-9438
kind: protocol-element
summary: K is computed as the cube root of (W_max − cwnd_epoch) / C, representing the time needed to grow from the congestion-avoidance starting window back to W_max. Upon a timeout, K is set to 0 and W_max is set to cwnd at the start of the congestion avoidance stage.
section: "4.2"
topics:
    - congestion
    - tcp
