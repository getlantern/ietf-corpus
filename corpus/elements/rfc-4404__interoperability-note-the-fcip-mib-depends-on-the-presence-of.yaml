document: rfc-4404
kind: interoperability-note
summary: The FCIP MIB depends on the presence of the TCP MIB (RFC 4022), the Interfaces Group MIB (RFC 2863), and the Fibre Channel Management MIB (RFC 4044). Objects available from those MIBs are not duplicated in FCIP-MGMT-MIB.
