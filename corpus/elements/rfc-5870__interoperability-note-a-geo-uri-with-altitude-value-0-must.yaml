document: rfc-5870
kind: interoperability-note
summary: A 'geo' URI with altitude value 0 MUST NOT be mistaken to mean 'ground elevation'; altitudes are relative to the WGS-84 reference geoid, not Earth's physical surface. A consumer of a URI with undefined altitude MAY assume the location is on Earth's physical surface.
section: 3.4.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
