document: rfc-2380
kind: design-rationale
summary: Traditional VC inactivity timeout mechanisms are unnecessary and harmful for RSVP-controlled VCs because RSVP provides explicit mechanisms (messages and timeouts) to determine when a data VC is no longer needed. Premature teardown would break reservation state synchronization.
section: "2.3"
topics:
