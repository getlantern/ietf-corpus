document: rfc-8997
kind: normative-requirement
summary: As soon as practicable, MSPs currently supporting SSL 2.x, SSL 3.0, TLS 1.0, or TLS 1.1 SHOULD transition their users to TLS 1.2 or later and discontinue support for those earlier versions of SSL and TLS.
section: "3"
rfc2119_level: SHOULD
