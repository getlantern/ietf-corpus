document: rfc-8154
kind: interoperability-note
summary: The pNFS SCSI layout type is based on RFC 5663 (pNFS Block/Volume Layout) and shares its volume topology data structures above the base-volume level and extent data structures. RFC 5663 remains the defining document for the existing block layout type; the two layout types coexist in the pNFS Layout Types Registry.
section: "1"
