document: rfc-6245
kind: interoperability-note
summary: An FA may include a GRE key value of zero in the GRE Key Extension to signal that the HA should assign GRE keys in both directions. This allows HA-driven key assignment without requiring the FA to supply non-zero key values.
section: "4.1"
topics:
    - mobility
    - vpn
