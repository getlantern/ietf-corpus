document: rfc-4931
kind: normative-requirement
summary: The EPP <info> command MUST return all available information when the querying client is the sponsoring client or provides valid authorization information. For non-sponsoring clients without valid authInfo, server policy determines which optional elements are returned.
section: 3.1.2
rfc2119_level: MUST
topics:
