document: rfc-3284
kind: protocol-element
summary: An application-defined code table is transmitted as a VCDIFF delta of the new 1536-byte serialized table (ordered as 256 type1, 256 type2, 256 size1, 256 size2, 256 mode1, 256 mode2 bytes) against the serialized default code table. The delta encoding of the code table itself MUST use the default code table.
section: "7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
