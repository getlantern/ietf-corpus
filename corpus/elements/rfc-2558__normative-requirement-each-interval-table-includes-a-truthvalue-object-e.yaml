document: rfc-2558
kind: normative-requirement
summary: Each interval table includes a TruthValue object (e.g., sonetSectionIntervalValidData) indicating whether data for that interval is valid in the sense intended by ANSI T1.231 clause 9.1.2.2. This flag was added in RFC 2558 to all seven interval tables (Section, Line, Far End Line, Path, Far End Path, VT, Far End VT).
section: 4.2.2
rfc2119_level: OPTIONAL
topics:
    - snmp
