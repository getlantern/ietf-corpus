document: rfc-3977
kind: protocol-element
summary: 'NNTP response codes are three-digit status indicators. The first digit signals success (2xx), continuation (3xx), command failure (4xx), or server/syntax error (5xx). The second digit indicates function category: x0x connection, x1x newsgroup selection, x2x article selection, x4x posting, x8x authentication/privacy (reserved), x9x private use.'
section: "3.2"
extracted_by: claude-sonnet-4-6
