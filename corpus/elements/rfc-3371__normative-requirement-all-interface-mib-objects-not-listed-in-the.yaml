document: rfc-3371
kind: normative-requirement
summary: All Interface MIB objects not listed in the ifGeneralInformationGroup tables for L2TP tunnel interfaces MUST be supported as described in RFC 2863. Implementations must support ifGeneralInformationGroup and one of ifPacketGroup, ifHCPacketGroup, or ifVHCPacketGroup.
section: 3.1.2
rfc2119_level: MUST
topics:
