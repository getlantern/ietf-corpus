document: rfc-1697
kind: interoperability-note
summary: rdbmsSrvTable and rdbmsSrvInfoTable are both indexed by applIndex from APPLICATION-MIB (RFC 1565), extending the applTable. Objects such as applName, applVersion, applOperStatus, and applInboundAssociations in applTable have RDBMS-specific interpretations defined in the rdbmsSrvInfoTable description.
