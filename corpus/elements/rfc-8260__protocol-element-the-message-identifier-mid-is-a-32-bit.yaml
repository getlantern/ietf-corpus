document: rfc-8260
kind: protocol-element
summary: The Message Identifier (MID) is a 32-bit unsigned integer, the same for all fragments of a user message. For ordered messages it replaces the SSN for in-order delivery. Two independent counters per outgoing stream (one for ordered, one for unordered) start at 0 and increment by 1 per message, using serial number arithmetic (RFC 1982, SERIAL_BITS=32).
section: "2.1"
topics:
