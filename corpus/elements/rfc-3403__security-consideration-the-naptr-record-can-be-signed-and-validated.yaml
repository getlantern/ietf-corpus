document: rfc-3403
kind: security-consideration
summary: The NAPTR record can be signed and validated using DNSSEC procedures. This Database makes identifiers from other namespaces subject to the same attacks as normal domain names, which may be a new exposure since those identifiers were not previously easily resolvable.
