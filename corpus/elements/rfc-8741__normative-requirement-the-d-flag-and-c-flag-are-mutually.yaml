document: rfc-8741
kind: normative-requirement
summary: The D flag and C flag are mutually exclusive in a PCUpd message. The PCE MUST NOT send a control request for an LSP that is already delegated to the PCE; if the D flag is set, the C flag MUST NOT be set.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
