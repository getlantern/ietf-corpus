document: rfc-3946
kind: protocol-element
summary: The Requested Contiguous Concatenation (RCC) field (8 bits) is a flag vector indicating which contiguous concatenation types the upstream node supports. Flag 1 (bit 1) indicates standard SONET/SDH contiguous concatenation per T1.105/G.707. Setting the entire field to zero means no contiguous concatenation is requested. A downstream node that cannot support any indicated type MUST refuse the LSP request.
section: "2.1"
topics:
    - mpls
    - routing
