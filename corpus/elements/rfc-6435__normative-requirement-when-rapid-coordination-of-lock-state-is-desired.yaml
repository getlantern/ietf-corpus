document: rfc-6435
kind: normative-requirement
summary: When rapid coordination of lock state is desired, after locking the transport path the source MEP MUST send an LI message targeting the remote MEP and MUST retransmit LI messages at the frequency indicated by the Refresh Timer value set in the message.
section: "6.1"
rfc2119_level: MUST
