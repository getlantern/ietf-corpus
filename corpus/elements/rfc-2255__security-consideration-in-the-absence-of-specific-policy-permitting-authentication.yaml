document: rfc-2255
kind: security-consideration
summary: In the absence of specific policy permitting authentication information to be sent to a server, a client should use an anonymous connection. Reusable passwords sent to the server may reveal easily-abused information and should not be used in URL processing unless explicitly permitted by policy.
section: "7"
topics:
    - ldap
    - security
    - privacy
