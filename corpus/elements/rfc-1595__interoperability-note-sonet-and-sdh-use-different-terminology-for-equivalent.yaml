document: rfc-1595
kind: interoperability-note
summary: 'SONET and SDH use different terminology for equivalent concepts: SONET SPE/VT corresponds to SDH Virtual Container (VC), and SONET STS corresponds to SDH STM. sonetMediumType distinguishes sonet(1) from sdh(2). SDH Performance Monitoring definitions follow CCITT G.783 and differ from but are analogous to the SONET definitions given in this document.'
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
