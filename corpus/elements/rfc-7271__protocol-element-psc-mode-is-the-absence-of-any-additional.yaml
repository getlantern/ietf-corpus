document: rfc-7271
kind: protocol-element
summary: PSC mode is the absence of any additional capabilities (Flags=0x0) and corresponds to the behavior defined in RFC 6378. A node may signal PSC mode by sending no Capabilities TLV or by sending one with Flags=0x0; an implementation MUST be configurable between these two options to support backward compatibility.
section: 9.2.1
topics:
    - mpls
    - routing
