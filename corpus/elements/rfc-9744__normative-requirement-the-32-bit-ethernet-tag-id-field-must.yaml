document: rfc-9744
kind: normative-requirement
summary: The 32-bit Ethernet Tag ID field MUST be set to the VPWS service instance identifier value. For FXC with a 12-bit ID, this identifier equals the single-tag normalized VID and must be the same on both VPWS service endpoints; for a 24-bit ID it equals the double-tag normalized VID.
section: "3.1"
rfc2119_level: MUST
topics:
    - vpn
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
