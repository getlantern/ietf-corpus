document: rfc-7662
kind: normative-requirement
summary: To prevent token scanning attacks, the introspection endpoint MUST require some form of authorization to access it, such as client authentication or a separate OAuth 2.0 access token. The authorization server SHOULD require protected resources to be specifically authorized to call the endpoint.
section: "2.1"
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
