document: rfc-5796
kind: design-rationale
summary: 'When the speaking router is used as the local Group Controller/Key Server (GC/KS), no duplication for reliability is needed: if the key server is down, the speaking router is almost certainly also down. This makes co-location of the key server with the speaking router a practical and reliable design choice.'
section: "7.3"
topics:
    - multicast
    - routing
    - ipsec
