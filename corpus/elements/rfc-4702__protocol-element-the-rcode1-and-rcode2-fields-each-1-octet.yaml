document: rfc-4702
kind: protocol-element
summary: The RCODE1 and RCODE2 fields (each 1 octet) are deprecated. A client SHOULD set them to 0 and SHOULD ignore them on receipt. A server SHOULD set them to 255 when sending and MUST ignore them on receipt.
section: "2.2"
