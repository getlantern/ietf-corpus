document: rfc-3931
kind: security-consideration
summary: The L2TP data channel provides no cryptographic security of any kind. If privacy or protection against sophisticated attacks is required, IPsec MUST be used. IPsec protection of L2TP is not a substitute for end-to-end security between communicating hosts.
section: "8.1"
topics:
    - vpn
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
