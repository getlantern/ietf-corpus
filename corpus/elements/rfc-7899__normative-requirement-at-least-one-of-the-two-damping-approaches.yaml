document: rfc-7899
kind: normative-requirement
summary: At least one of the two damping approaches (PIM-based per Section 5.1 or BGP C-multicast route damping per Section 5.2) MUST be implemented; implementing the BGP approach is recommended so that damping can also be applied on Route Reflectors and ASBRs.
section: "5.2"
rfc2119_level: MUST
topics:
