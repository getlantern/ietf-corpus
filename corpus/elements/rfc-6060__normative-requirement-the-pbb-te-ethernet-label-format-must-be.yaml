document: rfc-6060
kind: normative-requirement
summary: The PBB-TE Ethernet Label format MUST be used for both P2P and P2MP Eth-LSPs. For P2P, the fields specify a VID and unicast MAC address; for P2MP, a VID and a group MAC address is carried.
section: "4.3"
rfc2119_level: MUST
topics:
