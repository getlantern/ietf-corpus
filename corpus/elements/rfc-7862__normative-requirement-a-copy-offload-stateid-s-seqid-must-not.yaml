document: rfc-7862
kind: normative-requirement
summary: A copy offload stateid's seqid MUST NOT be zero. Using seqid zero to mean 'most recent' is inappropriate when multiple asynchronous COPY operations may be in progress on the same file in parallel.
section: "4.8"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
