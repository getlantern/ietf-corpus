document: rfc-2631
kind: security-consideration
summary: 'Security level depends on three factors: symmetric key length (2^l for l-bit key), size of prime q (2^{m/2} level), and size of prime p (subexponential in bit size). A balanced design should equalize all three levels; overall security is limited by the weakest factor.'
