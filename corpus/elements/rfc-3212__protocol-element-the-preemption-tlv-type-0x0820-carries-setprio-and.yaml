document: rfc-3212
kind: protocol-element
summary: The Preemption TLV (type 0x0820) carries SetPrio and HoldPrio fields (0-7, where 0 is highest priority). LSPs without an explicit Preemption TLV SHOULD be treated as having default priority 4. When an established LSP is preempted, the initiating LSR sends a Withdraw upstream and Release downstream.
section: "4.4"
topics:
    - mpls
    - qos
