document: rfc-4306
kind: wire-format
summary: 'The IKE fixed header contains: Initiator SPI (8 octets), Responder SPI (8 octets), Next Payload type (1 octet), Major/Minor Version (1 octet, 4 bits each), Exchange Type (1 octet), Flags including I(nitiator) and R(esponse) bits (1 octet), Message ID (4 octets), and Total Length (4 octets). An SPI value of zero in the Responder SPI field indicates the remote SPI is not yet known.'
section: "3.1"
