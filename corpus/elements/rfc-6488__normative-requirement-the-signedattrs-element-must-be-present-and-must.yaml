document: rfc-6488
kind: normative-requirement
summary: The signedAttrs element MUST be present and MUST include the content-type attribute and the message-digest attribute. The signer MAY also include the signing-time or binary-signing-time attributes. Other signed attributes MUST NOT be included.
section: 2.1.6.4
rfc2119_level: MUST
topics:
