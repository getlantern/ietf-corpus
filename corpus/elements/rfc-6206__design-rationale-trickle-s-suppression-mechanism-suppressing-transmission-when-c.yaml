document: rfc-6206
kind: design-rationale
summary: Trickle's suppression mechanism (suppressing transmission when c >= k) allows communication rate to scale logarithmically with network density. In a lossless single-hop network of n nodes, each node's transmission rate is 1/nth of the total communication rate, ensuring that denser networks do not consume more shared channel capacity.
