document: rfc-4201
kind: protocol-element
summary: A bundled link is partitioned into disjoint component link subsets such that (a) the partition is minimal, and (b) within each subset, a label alone suffices to identify the resource used by an LSP. Each such subset is called a 'component link'; the overall logical construct is the 'bundled link'.
section: "2"
topics:
