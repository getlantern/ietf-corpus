document: rfc-6823
kind: interoperability-note
summary: Sub-TLVs (APPsub-TLVs) are used in GENINFO to allow backwards-compatible addition of new application information; implementations are required to ignore sub-TLVs they do not understand, consistent with the general IS-IS TLV handling model from RFC 5305. Sub-TLV codepoints are scoped to the combination of GENINFO TLV codepoint and Application ID, making them private to each application.
section: "3.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
