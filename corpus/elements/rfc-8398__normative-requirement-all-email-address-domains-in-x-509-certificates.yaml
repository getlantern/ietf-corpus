document: rfc-8398
kind: normative-requirement
summary: All email address domains in X.509 certificates MUST conform to IDNA2008 (RFC 5890) and avoid any mappings mentioned in that document. This applies to both SmtpUTF8Mailbox and rfc822Name wherever used.
section: "4"
rfc2119_level: MUST
topics:
