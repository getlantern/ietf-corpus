document: rfc-7863
kind: wire-format
summary: nfl_util4 (uint32_t) includes the new NFSv4.2 flag NFL42_UFLG_IO_ADVISE_THRU_MDS=0x00000004, indicating that IO_ADVISE hints in a pNFS file layout should be forwarded through the MDS rather than sent directly to the data server.
