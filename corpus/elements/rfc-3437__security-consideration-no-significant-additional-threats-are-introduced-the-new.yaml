document: rfc-3437
kind: security-consideration
summary: No significant additional threats are introduced. The new AVPs expose link characteristics and interface information that could be snooped by a rogue party, but this information is the same as what is already negotiated in PPP LCP packets over the tunneled link—it is merely presented in a different form.
