document: rfc-7635
kind: normative-requirement
summary: When a TURN access token expires, the client MUST obtain a new token and MUST use it to refresh existing allocations, not only for new allocations, so only one token per TURN server need be maintained.
section: "9"
rfc2119_level: MUST
topics:
