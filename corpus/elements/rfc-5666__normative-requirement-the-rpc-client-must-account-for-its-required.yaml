document: rfc-5666
kind: normative-requirement
summary: The RPC client MUST account for its required RDMA_DONE messages to the server in its accounting of available credits. The server SHOULD provide sufficient credits to allow RDMA_DONE messages to be sent without deadlock.
section: "3.8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
