document: rfc-6791
kind: normative-requirement
summary: The source address used for the translated ICMP message SHOULD NOT cause the ICMP packet to be discarded, and SHOULD NOT be drawn from RFC1918 or RFC6598 address space, because that space is likely subject to uRPF filtering.
section: "3.1"
rfc2119_level: SHOULD NOT
