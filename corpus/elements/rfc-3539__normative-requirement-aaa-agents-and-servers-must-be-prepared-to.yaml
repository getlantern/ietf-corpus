document: rfc-3539
kind: normative-requirement
summary: AAA agents and servers MUST be prepared to handle duplicates, and MUST assume that duplicates can arrive on any connection. This is necessary because failover can cause the same transaction to be sent to multiple agents or servers before expiration of the time-wait interval.
section: "2.5"
rfc2119_level: MUST
topics:
    - diameter
    - radius
