document: rfc-9143
kind: normative-requirement
summary: Since a single BUNDLE transport is used for all bundled media, the symmetric RTP mechanism (RFC 4961) MUST be used for RTP-based bundled media. All RTP-based media within a single BUNDLE group belong to a single RTP session and share a single SSRC numbering space.
section: "9.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
