document: rfc-5552
kind: interoperability-note
summary: Certain applications may pass large amounts of data via Request-URI parameters, causing the INVITE to exceed network MTU. Implementations must use a transport appropriate for larger messages (e.g., TCP) or pass data indirectly (e.g., a session identifier key used to retrieve data from an HTTP server).
section: "2.2"
topics:
    - sip
    - voip
