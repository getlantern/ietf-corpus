document: rfc-9056
kind: protocol-element
summary: DetNet IP flows are treated as App-flows from the DetNet MPLS perspective. The IP payload (IP header plus next-protocol header) is encapsulated with a DetNet Control Word (d-CW) and MPLS labels, carried over a link or sub-network layer (L2, TSN, or UDP/IP).
section: "4.2"
topics:
