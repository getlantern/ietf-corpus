document: rfc-7550
kind: normative-requirement
summary: When processing a Rebind for an IA with no client binding, a server SHOULD only create new bindings if it is configured to respond to Solicit messages with Rapid Commit, to avoid the same issue of multiple servers creating bindings from a single Rebind broadcast.
section: 4.4.7
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
