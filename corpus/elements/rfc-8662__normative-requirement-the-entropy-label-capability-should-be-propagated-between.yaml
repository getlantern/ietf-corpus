document: rfc-8662
kind: normative-requirement
summary: The entropy label capability SHOULD be propagated between signaling domains. Each Binding SID SHOULD have its own ELC that MUST be inherited from the ELC of the associated LSP. If the advertising router does not know the ELC state of the target FEC, it MUST NOT set the ELC for the Binding SID.
section: "6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
