document: rfc-8267
kind: normative-requirement
summary: If an NFS version 4.1 client cannot support Long Calls in its backchannel (i.e., backchannel ca_maxrequestsize is not larger than inline thresholds), an NFS version 4 server MUST use only Short messages to convey backchannel operations.
section: 6.5.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
