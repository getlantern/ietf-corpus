document: rfc-3648
kind: normative-requirement
summary: Both the ordering type (DAV:ordering-type property) and the ordering of collection members MUST be recorded upon CHECKIN or VERSION-CONTROL, and both MUST be restored upon CHECKOUT, UNCHECKOUT, or UPDATE for version-controlled ordered collections.
section: "9"
rfc2119_level: MUST
