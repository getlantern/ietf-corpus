document: rfc-8446
kind: interoperability-note
summary: 'Middlebox compatibility mode (Appendix D.4): clients send a non-empty legacy_session_id and both peers send a ChangeCipherSpec record at specific points during the handshake. This makes TLS 1.3 traffic resemble TLS 1.2 session resumption, avoiding breakage by middleboxes that perform stateful TLS inspection.'
section: D.4
topics:
