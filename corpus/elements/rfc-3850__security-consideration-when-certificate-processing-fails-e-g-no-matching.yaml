document: rfc-3850
kind: security-consideration
summary: When certificate processing fails (e.g., no matching email address, no trusted chain, expired certificate, revoked certificate, unavailable CRL), processing software MUST take immediate and noticeable steps to inform the end user rather than silently proceeding.
