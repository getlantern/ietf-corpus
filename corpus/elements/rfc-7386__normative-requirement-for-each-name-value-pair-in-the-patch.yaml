document: rfc-7386
kind: normative-requirement
summary: For each Name/Value pair in the patch where Value is null and the Name exists in the Target, the Name/Value pair MUST be removed from Target. If the Name does not exist in Target, the null entry is silently ignored.
section: "2"
rfc2119_level: MUST
topics:
