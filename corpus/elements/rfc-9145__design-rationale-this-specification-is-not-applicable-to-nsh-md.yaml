document: rfc-9145
kind: design-rationale
summary: This specification is not applicable to NSH MD Type 0x01 (fixed-length context header) because its fixed 16-byte size is insufficient to accommodate both the metadata and the message integrity data required by this mechanism. Only MD Type 0x02 (variable-length) is supported.
section: "1"
topics:
    - security
