document: rfc-6035
kind: security-consideration
summary: RTCP quality reports contain sensitive information about session nature and duration. Any third party (COLLECTOR) wishing to receive this information SHOULD be properly authenticated by the SIP UA using standard SIP mechanisms. Event content MAY be encrypted for confidentiality using mechanisms from RFC 3261.
section: "6"
topics:
    - sip
    - voip
    - security
    - privacy
