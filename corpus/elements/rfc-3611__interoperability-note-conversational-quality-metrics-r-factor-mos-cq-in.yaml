document: rfc-3611
kind: interoperability-note
summary: Conversational quality metrics (R factor, MOS-CQ) in the VoIP Metrics Report Block are defined only for one-to-one or one-to-many voice sessions; these metrics SHOULD be identified as unavailable (value 127) in multicast conferencing applications.
