document: rfc-6120
kind: normative-requirement
summary: An initiating entity (client or server) MUST open a TCP connection to the receiving entity before negotiating XML streams, and the parties MUST maintain that TCP connection for as long as the XML streams are in use.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
