document: rfc-9611
kind: interoperability-note
summary: IKEv2 (RFC 7296) already permits multiple Child SAs with identical Traffic Selectors, but provides no way to signal that they are resource-bound. This document adds that signaling capability as an extension, leaving existing IKEv2 behavior unchanged for peers that do not include SA_RESOURCE_INFO.
section: "1"
topics:
    - ipsec
    - vpn
