kind: state-machine
summary: 'Each interface in the GADAG is in one of three direction states: UNDIRECTED (initial), OUTGOING (directed away from the local router), or INCOMING (directed toward the local router). An interface may be both OUTGOING and INCOMING simultaneously, indicating it lies on a cut-link. Transitions occur during GADAG construction (Section 5.5) and augmentation (Section 5.6).'
