document: rfc-3108
kind: protocol-element
summary: 'The ''eecid'' (end-to-end connection identifier) attribute is synonymous with the 4-byte ''bnc-id'' parameter used by ITU Q.1901. It correlates service-level connections with ATM bearer connections: in the forward SVC model the call-terminating gateway selects and transmits the eecid; in the backward model the call-originating gateway does. Its value need only be unique within the SVC-terminating node.'
section: 5.6.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
