document: rfc-6354
kind: protocol-element
summary: The anti-shadow buffer stores forward-shifted redundant frames at the receiver. In normal mode it is continuously filled with incoming AS data and purged of frames older than the last primary frame played out, keeping it full with the next 'forwardshift' amount of redundant frames.
section: A.2.1
topics:
    - rtp
    - realtime
