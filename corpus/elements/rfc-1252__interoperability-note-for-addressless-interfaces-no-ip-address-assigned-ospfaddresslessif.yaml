document: rfc-1252
kind: interoperability-note
summary: For addressless interfaces (no IP address assigned), ospfAddressLessIf and related index objects take the value of the corresponding ifIndex from the Internet Standard MIB, while interfaces with IP addresses use the value 0; this scheme unifies instancing across both interface types.
