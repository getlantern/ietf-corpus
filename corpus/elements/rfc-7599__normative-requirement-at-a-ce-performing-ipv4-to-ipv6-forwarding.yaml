document: rfc-7599
kind: normative-requirement
summary: At a CE performing IPv4-to-IPv6 forwarding, the source address and source port range of packets after NAPT44 processing MUST correspond to the IPv4 address and port range assigned via the BMR. The CE MUST support a Default Mapping Rule and SHOULD support one or more Forwarding Mapping Rules.
section: "8.1"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
