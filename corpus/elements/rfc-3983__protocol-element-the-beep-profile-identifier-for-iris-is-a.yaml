document: rfc-3983
kind: protocol-element
summary: The BEEP profile identifier for IRIS is a URI composed of the IRIS schema URN followed by a slash and the IRIS registry type URN, with both URNs abbreviated per IRIS rules. The profile-uri prefix is 'http://iana.org/beep/', yielding identifiers such as 'http://iana.org/beep/iris1/dreg1'.
section: "3"
topics:
