summary: 'The block begins with a 1-octet Block Type (BT=22), 1-octet Reserved field, and a 16-bit Block Length fixed at 11. It is followed by a 32-bit SSRC of Source, 16-bit begin_seq, 16-bit end_seq, and nine 32-bit error-count fields: TS_sync_loss_count, Sync_byte_error_count, Continuity_count_error_count, Transport_error_count, PCR_error_count, PCR_repetition_error_count, PCR_discontinuity_indicator_error_count, PCR_accuracy_error_count, and PTS_error_count.'
