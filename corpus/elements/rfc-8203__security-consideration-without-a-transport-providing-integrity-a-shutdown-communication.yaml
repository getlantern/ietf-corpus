document: rfc-8203
kind: security-consideration
summary: Without a transport providing integrity, a Shutdown Communication message could be forged; without confidentiality, it could be snooped. These risks are common to BGP messages generally but are of greater concern here since the communication is intended for human-to-human use.
section: "6"
topics:
    - bgp
    - security
    - routing
