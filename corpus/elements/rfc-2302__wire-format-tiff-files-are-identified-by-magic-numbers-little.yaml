summary: 'TIFF files are identified by magic numbers: little-endian (II) files begin with 0x49 0x49 0x42 0x00; big-endian (MM) files begin with 0x4D 0x4D 0x00 0x42. File extension is .TIF; Macintosh file type code is TIFF.'
