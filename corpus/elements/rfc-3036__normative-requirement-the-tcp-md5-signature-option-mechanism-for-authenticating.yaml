document: rfc-3036
kind: normative-requirement
summary: The TCP MD5 Signature Option mechanism for authenticating LDP TCP sessions MUST be supported as a configurable option. An LSR configured for MD5 is given a shared-secret password per peer; segments failing MD5 validation are silently dropped.
section: "2.9"
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
