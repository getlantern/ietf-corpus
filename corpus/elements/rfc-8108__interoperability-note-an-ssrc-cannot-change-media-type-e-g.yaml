document: rfc-8108
kind: interoperability-note
summary: An SSRC cannot change media type (e.g., audio to video) or RTP timestamp clock rate. An endpoint that previously stopped sending and wants to send a new stream with a different type or rate must generate a new SSRC value.
section: "6.1"
topics:
    - rtp
    - realtime
