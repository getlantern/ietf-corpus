document: rfc-6326
kind: security-consideration
summary: IS-IS authentication per RFC 5304 and RFC 5310 may be used to secure the IS-IS messages defined here. However, even with authentication, replays of Hello packets can create denial-of-service conditions (see RFC 6039); these issues are analogous to those in RFC 6325 Section 6.2 and the same mitigations apply.
section: "6"
topics:
