document: rfc-9588
kind: protocol-element
summary: PA-SPAKE-HINT is an ASN.1 SEQUENCE containing the KDC's supported groups and second factors; it is provided within authentication sets to help clients assess whether SPAKE is likely to succeed before choosing an authentication set. A KDC MUST NOT include PA-SPAKE-HINT directly in a pa-value field.
section: "9"
topics:
