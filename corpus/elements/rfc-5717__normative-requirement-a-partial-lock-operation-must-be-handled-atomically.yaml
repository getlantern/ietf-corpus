document: rfc-5717
kind: normative-requirement
summary: 'A <partial-lock> operation MUST be handled atomically by the NETCONF server: either all requested parts are locked or none. If any part cannot be locked, the server MUST unlock all parts already locked during that operation.'
section: 2.4.1
rfc2119_level: MUST
topics:
    - netconf
    - yang
