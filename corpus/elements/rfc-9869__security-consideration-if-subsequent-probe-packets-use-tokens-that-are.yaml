document: rfc-9869
kind: security-consideration
summary: If subsequent probe packets use tokens that are easily derived from the initial value (e.g., sequential increments), an on-path observer can predict future token values and forge RES Options or manipulate DPLPMTUD behavior even for probe packets not transiting the observer.
section: "8"
topics:
