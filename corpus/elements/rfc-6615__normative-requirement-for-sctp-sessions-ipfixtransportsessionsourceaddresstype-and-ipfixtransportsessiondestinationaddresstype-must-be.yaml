document: rfc-6615
kind: normative-requirement
summary: For SCTP sessions, ipfixTransportSessionSourceAddressType and ipfixTransportSessionDestinationAddressType MUST be set to unknown(0), and the address objects MUST be set to a zero-length string; ipfixTransportSessionSctpAssocId MUST be zero for all non-SCTP protocols.
