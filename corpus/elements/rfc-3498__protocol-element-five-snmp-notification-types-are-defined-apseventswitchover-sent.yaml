document: rfc-3498
kind: protocol-element
summary: 'Five SNMP notification types are defined: apsEventSwitchover (sent when apsChanStatusSwitchovers increments), apsEventModeMismatch (apsStatusModeMismatches increments), apsEventChannelMismatch (apsStatusChannelMismatches increments), apsEventPSBF (apsStatusPSBFs increments), and apsEventFEPLF (apsStatusFEPLFs increments). Each is selectively enabled via the apsNotificationEnable BITS object.'
