document: rfc-3057
kind: normative-requirement
summary: For carrier-grade networks, the failure or isolation of a particular ASP SHOULD NOT cause stable calls to be dropped, implying ASPs need to share or pass call state; however, ASP-to-ASP call state communication is outside the scope of this document.
section: 1.3.3
rfc2119_level: SHOULD NOT
