kind: protocol-element
summary: 'Three YANG actions are defined: ''clear-peer'' (clears TCP connection to a specific peer), ''clear-all-peers'' (clears all peer TCP connections), and ''clear'' on sa-cache (clears SA cache entries filterable by group, source-addr, peer-address, or peer-as).'
