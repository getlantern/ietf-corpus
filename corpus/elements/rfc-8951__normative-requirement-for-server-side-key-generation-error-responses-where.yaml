document: rfc-8951
kind: normative-requirement
summary: For Server-Side Key Generation error responses where content-type is not set, the response data MUST be a plaintext human-readable error message; servers MAY use the 'text/plain' content-type (RFC 2046) for human-readable errors.
section: "5.2"
rfc2119_level: MUST
