document: rfc-6917
kind: protocol-element
summary: The <mrbconsumer> root element wraps Consumer interface messages. It carries either a <mediaResourceRequest> (from AS to MRB) or a <mediaResourceResponse> (from MRB to AS). The Consumer interface supports both HTTP/HTTPS (Query mode) and SIP INVITE (IAMM) transports, using the 'application/mrb-consumer+xml' media type.
section: "5.2"
