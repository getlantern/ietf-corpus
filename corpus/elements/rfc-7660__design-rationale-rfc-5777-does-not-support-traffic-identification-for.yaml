document: rfc-7660
kind: design-rationale
summary: RFC 5777 does not support traffic identification for ECN-marked packets (RFC 3168) and lacks specific actions for congested flows; this document fills that gap by adding ECN-IP-Codepoint for classification and Congestion-Treatment for congestion-specific actions while reusing existing RFC 5777 attributes.
section: "1"
topics:
    - diameter
    - ecn
    - congestion
    - qos
