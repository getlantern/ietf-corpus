document: rfc-4291
kind: normative-requirement
summary: The unspecified address (::) must never be assigned to any node, must not be used as a destination address in IPv6 packets or in Routing headers, and must never be forwarded by an IPv6 router when appearing as a source address.
section: 2.5.2
rfc2119_level: MUST NOT
