document: rfc-1826
kind: interoperability-note
summary: Reassembly of fragmented IPv4 packets MUST occur prior to Authentication Header processing by the local implementation. Because IPv4 packets may be subject to intermediate fragmentation in routers, this ordering is critical for correct authentication.
section: "4"
topics:
    - ipsec
    - ip
