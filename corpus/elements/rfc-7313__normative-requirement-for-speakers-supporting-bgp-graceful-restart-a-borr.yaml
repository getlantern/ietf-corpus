document: rfc-7313
kind: normative-requirement
summary: For speakers supporting BGP Graceful Restart, a BoRR MUST NOT be sent for an <AFI, SAFI> to a neighbor before the EoR (End-of-RIB from Graceful Restart) for that <AFI, SAFI> has been sent to that neighbor.
section: "4"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
