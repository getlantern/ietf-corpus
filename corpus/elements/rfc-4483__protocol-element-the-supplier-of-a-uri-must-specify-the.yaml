document: rfc-4483
kind: protocol-element
summary: The supplier of a URI MUST specify the time period for which the URI is valid via an 'EXPIRATION' parameter on the Content-Type header, formatted as an RFC 1123 GMT date-time value. This is a mandatory parameter.
