document: rfc-8484
kind: protocol-element
summary: A successful HTTP response with a 2xx status code is used for any valid DNS response, regardless of the DNS response code. This includes DNS failures such as SERVFAIL or NXDOMAIN. Non-2xx HTTP status codes indicate transport-level errors, not DNS errors.
section: 4.2.1
topics:
    - dns
    - http
