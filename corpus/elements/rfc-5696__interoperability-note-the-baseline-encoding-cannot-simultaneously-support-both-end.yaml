document: rfc-5696
kind: interoperability-note
summary: The baseline encoding cannot simultaneously support both end-to-end ECN marking and PCN marking within a PCN-domain. Supporting both requires either IP-in-IP tunneling to carry e2e ECN in the inner header, or a richer experimental encoding scheme.
section: "6"
topics:
