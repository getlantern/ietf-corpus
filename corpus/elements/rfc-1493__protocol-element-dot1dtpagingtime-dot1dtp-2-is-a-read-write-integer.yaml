kind: protocol-element
summary: dot1dTpAgingTime (dot1dTp 2) is a read-write INTEGER (10..1000000 seconds) specifying the timeout for aging out dynamically learned forwarding entries. IEEE 802.1D-1990 recommends a default of 300 seconds.
