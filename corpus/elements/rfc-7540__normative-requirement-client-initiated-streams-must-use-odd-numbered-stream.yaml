document: rfc-7540
kind: normative-requirement
summary: Client-initiated streams MUST use odd-numbered stream identifiers; server-initiated streams MUST use even-numbered stream identifiers. New stream identifiers MUST be numerically greater than all streams previously opened or reserved by the initiating endpoint. Stream identifiers cannot be reused; identifier exhaustion requires opening a new connection.
section: 5.1.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
