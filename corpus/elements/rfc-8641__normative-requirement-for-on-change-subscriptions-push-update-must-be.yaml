document: rfc-8641
kind: normative-requirement
summary: For on-change subscriptions, push-update MUST be used as the initial synchronization notification when sync-on-start is required. The publisher MAY also send a push-update later to resync the subscription.
section: "3.7"
rfc2119_level: MUST
