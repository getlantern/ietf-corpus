document: rfc-3813
kind: normative-requirement
summary: For mplsInterfaceLabelParticipationType, at least one of the perPlatform(0) or perInterface(1) bits MUST be set. For entries with index 0 (per-platform label space), the perPlatform(0) bit MUST be set. Agents MUST ensure label ranges are specified consistently and MUST return an inconsistentValue error when they are not.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
