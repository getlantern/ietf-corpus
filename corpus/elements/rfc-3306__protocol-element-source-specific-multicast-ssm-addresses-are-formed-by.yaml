document: rfc-3306
kind: protocol-element
summary: Source-Specific Multicast (SSM) addresses are formed by setting P=1, plen=0, and network prefix=0, creating the address range FF3x::/32 where 'x' is any valid scope value. The IPv6 source address identifies the owner.
