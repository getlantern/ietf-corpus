document: rfc-6726
kind: security-consideration
summary: Corrupting FDT Instances can cause denial-of-service by making receivers reject correctly received files (e.g., via forged MD5 checksums) or by substituting FEC parameters to vastly increase processing load. It is RECOMMENDED that FDT Instance integrity and sender authentication be guaranteed, using XML digital signatures when no packet-level scheme is used.
section: 7.3.2
topics:
    - security
