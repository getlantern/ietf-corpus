document: rfc-4454
kind: wire-format
summary: ATM Cell Mode encapsulation consists of an optional ATM-Specific Sublayer, followed by a 4-byte ATM cell header (VPI, VCI, PTI, CLP) and a 48-byte ATM cell payload; HEC is not included. Multiple cells may be concatenated in a single PDU.
