document: rfc-3253
kind: security-consideration
summary: 'Versioning can expose information through security-through-obscurity issues: version URLs are permanent and stable, meaning that a URL that was once visible to a user may remain accessible even after the current version-controlled resource has moved or been restricted.'
section: "16.3"
topics:
