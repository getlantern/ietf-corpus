document: rfc-7055
kind: normative-requirement
summary: Implementations MUST NOT apply NAI (RFC 4282) internationalization preparation rules to the user-or-service or realm components of the mechanism name. EAP servers SHOULD prepare host portions using RFC 5891 (IDNA) before comparing them.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - security
