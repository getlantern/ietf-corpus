document: rfc-7752
kind: normative-requirement
summary: All auxiliary Router-IDs of both the local and the remote node MUST be included in the link attribute of each Link NLRI. The MPLS Protocol Mask TLV MUST NOT be included in NLRIs whose Protocol-ID is an IGP value (IS-IS or OSPF).
section: 3.3.2.1
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
