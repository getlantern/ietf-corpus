document: rfc-3246
kind: design-rationale
summary: The 'last bit' of a packet is defined to include the layer-2 trailer (if present) for both arrival time a_j/A_j and departure time d_j/D_j, because a packet cannot generally be considered available for forwarding until such a trailer has been received.
