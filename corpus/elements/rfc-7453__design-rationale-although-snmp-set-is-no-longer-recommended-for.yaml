document: rfc-7453
kind: design-rationale
summary: Although SNMP SET is no longer recommended for configuring MPLS networks (as noted in RFC 3812), certain objects in these extension MIBs are defined with MAX-ACCESS read-write or read-create to keep the extension tables consistent with the base tables they augment. Configuration examples in Section 9 illustrate expected MIB values, not a prescribed configuration method.
