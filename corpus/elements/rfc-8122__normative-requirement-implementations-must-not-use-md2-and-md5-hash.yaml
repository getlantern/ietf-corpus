document: rfc-8122
kind: normative-requirement
summary: Implementations MUST NOT use MD2 and MD5 hash functions to calculate fingerprints or to verify received fingerprints calculated using them. SHA-256 is the preferred hash function.
section: "5"
rfc2119_level: MUST NOT
topics:
