document: rfc-9519
kind: design-rationale
summary: The change from IETF Review to Expert Review is aligned with similar policy changes undertaken for certain IPsec and TLS registries, and was motivated by a February 2021 discussion on the CURDLE mailing list. The previous IETF Review policy was considered too burdensome for routine SSH parameter registrations.
