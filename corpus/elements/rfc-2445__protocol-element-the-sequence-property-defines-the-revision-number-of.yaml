document: rfc-2445
kind: protocol-element
summary: The SEQUENCE property defines the revision number of a calendar component, starting at 0 and incremented each time the Organizer makes a significant revision. It is used with UID and ORGANIZER to manage versioning across scheduling messages.
section: 4.8.7.4
