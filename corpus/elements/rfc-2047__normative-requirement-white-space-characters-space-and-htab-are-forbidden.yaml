document: rfc-2047
kind: normative-requirement
summary: White space characters (SPACE and HTAB) are FORBIDDEN within an encoded-word; they must be encoded (e.g., SPACE as '=20' in Q encoding). An encoded-word must appear as an 'atom' to an RFC 822 parser, so unencoded white space breaks parsing.
section: "2"
rfc2119_level: MUST NOT
topics:
