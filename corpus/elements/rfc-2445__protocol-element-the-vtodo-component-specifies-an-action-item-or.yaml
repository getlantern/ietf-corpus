document: rfc-2445
kind: protocol-element
summary: The VTODO component specifies an action item or to-do task. It requires UID and DTSTAMP and adds PERCENT-COMPLETE, COMPLETED, and DUE properties. PARTSTAT for VTODO extends the VEVENT values with COMPLETED and IN-PROCESS.
section: 4.6.2
