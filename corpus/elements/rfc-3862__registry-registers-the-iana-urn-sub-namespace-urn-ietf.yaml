document: rfc-3862
kind: registry
summary: Registers the IANA URN sub-namespace 'urn:ietf:params:cpim-headers:' per RFC 3553. Index values are CPIM message header names; URNs are formed by percent-encoding non-URN characters in the header name and prepending the namespace prefix string.
