document: rfc-8178
kind: interoperability-note
summary: 'To establish interoperability, a client and server arrive at a common variant: if the client''s minor version is lower, the server accepts it and acts as if extensions from later minor versions are unknown; if the server''s minor version is lower, the client uses the server''s lower minor version. Within the common variant, the client must additionally probe which OPTIONAL elements the server supports.'
section: 4.4.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
