document: rfc-7233
kind: normative-requirement
summary: The Range header field is evaluated only after evaluating precondition header fields defined in RFC 7232 and only if the result in absence of Range would be a 200 (OK) response; Range is ignored when a conditional GET would produce a 304 (Not Modified).
section: "3.1"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
