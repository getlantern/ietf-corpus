document: rfc-8618
kind: protocol-element
summary: A Block is a CBOR map containing 'block-preamble' (mandatory), and optional 'block-statistics', 'block-tables', 'query-responses', 'address-event-counts', and 'malformed-messages'. Each array, if present, must not be empty. Blocks share common BlockParameters identified by an index into the file-level array.
