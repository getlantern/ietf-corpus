document: rfc-8948
kind: protocol-element
summary: 'The SLAP quadrant structure defines four regions of the local MAC address space distinguished by the Y-bit and Z-bit in the IEEE 48-bit address: Quadrant 00 (AAI, Administratively Assigned), Quadrant 01 (ELI, Extended Local Identifier), Quadrant 10 (Reserved), and Quadrant 11 (SAI, Standard Assigned Identifier).'
