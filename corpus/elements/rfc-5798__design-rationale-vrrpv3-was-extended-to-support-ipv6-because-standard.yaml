document: rfc-5798
kind: design-rationale
summary: VRRPv3 was extended to support IPv6 because standard IPv6 Neighbor Discovery unreachability detection takes approximately 38 seconds with default parameters before switching to an alternate router. VRRP provides failover in approximately 3 seconds without host involvement.
section: "1.3"
topics:
    - routing
    - ip
