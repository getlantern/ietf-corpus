document: rfc-9177
kind: normative-requirement
summary: After transmitting every MAX_PAYLOADS_SET of a single body, a delay of NON_TIMEOUT_RANDOM MUST be introduced before sending the next set, unless a 'Continue' is received from the peer for the current set, in which case the next set MAY start immediately.
section: "7.2"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
