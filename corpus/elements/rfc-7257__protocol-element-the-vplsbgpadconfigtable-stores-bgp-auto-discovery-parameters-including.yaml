document: rfc-7257
kind: protocol-element
summary: The vplsBgpADConfigTable stores BGP auto-discovery parameters including vplsBgpADConfigRouteDistinguisher (OCTET STRING 0..256 per RFC 4364), vplsBgpADConfigVplsId (unique identifier for all VSIs in a VPLS), and vplsBgpADConfigPrefix (overrides loopback address in NLRI per RFC 6074).
