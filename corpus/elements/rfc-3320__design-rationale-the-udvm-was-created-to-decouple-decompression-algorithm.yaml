document: rfc-3320
kind: design-rationale
summary: 'The UDVM was created to decouple decompression algorithm choice from the protocol: rather than negotiating one of a small set of pre-defined algorithms, any algorithm can be used by uploading its decompression bytecode within the SigComp message. Typical decompression bytecode is sub-100 bytes.'
section: "8"
extracted_by: claude-sonnet-4-6
