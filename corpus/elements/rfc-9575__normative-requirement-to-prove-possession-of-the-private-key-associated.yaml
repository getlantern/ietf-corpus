document: rfc-9575
kind: normative-requirement
summary: To prove possession of the private key associated with the DET, the UA MUST sign and send data that is unique and unpredictable but easily validated by the Observer. Verification of this signed data MUST be performed by the Observer as part of the received UAS RID information trust assessment.
section: 3.1.2.2
rfc2119_level: MUST
topics:
    - security
    - crypto
