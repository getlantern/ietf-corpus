document: rfc-7273
kind: protocol-element
summary: PTP reference clocks are identified by a version tag (`IEEE1588-2002`, `IEEE1588-2008`, or `IEEE802.1AS-2011`), a 64-bit EUI-64 grandmaster ClockIdentity, and an optional PTP domain (textual name for IEEE 1588-2002; numeric 0–127 for IEEE 1588-2008; always 0 for 802.1AS). The token `traceable` replaces the ClockIdentity when traceable time is asserted.
section: "4.3"
topics:
    - rtp
    - realtime
