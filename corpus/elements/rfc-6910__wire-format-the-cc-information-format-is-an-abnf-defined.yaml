document: rfc-6910
kind: wire-format
summary: 'The CC Information Format is an ABNF-defined MIME type (application/call-completion) consisting of header-like lines: cc-state (REQUIRED when NOTIFY expiry is nonzero, values ''queued'' or ''ready''), cc-service-retention (''true'' when retain option supported), and cc-URI (addr-spec for CC call and suspend/resume PUBLISH). Names are case-insensitive; unknown lines are ignored.'
