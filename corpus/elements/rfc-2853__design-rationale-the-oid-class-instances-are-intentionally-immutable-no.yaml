document: rfc-2853
kind: design-rationale
summary: The Oid class instances are intentionally immutable — no mutator methods are defined — so that Oid objects can be treated as shared statics without defensive copying. This simplifies memory management and avoids aliasing bugs in multi-mechanism environments.
section: "4.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
