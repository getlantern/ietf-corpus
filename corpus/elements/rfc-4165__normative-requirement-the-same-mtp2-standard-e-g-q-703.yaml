document: rfc-4165
kind: normative-requirement
summary: The same MTP2 standard (e.g., Q.703 or T1.111) MUST be followed on both ends of the M2PA link. Except as modified in this document, M2PA SHOULD follow the requirements of the applicable MTP2 specification.
section: "4"
rfc2119_level: MUST
