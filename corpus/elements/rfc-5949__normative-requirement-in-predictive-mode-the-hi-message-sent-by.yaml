document: rfc-5949
kind: normative-requirement
summary: In predictive mode, the HI message sent by the PMAG to the NMAG MUST have the 'P' flag set and MUST include the MN ID, the Home Network Prefix(es), and the LMA address currently serving the mobile node. If a valid MN link-layer identifier exists, it MUST also be included.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
