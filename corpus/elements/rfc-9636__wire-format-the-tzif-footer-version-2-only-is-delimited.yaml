document: rfc-9636
kind: wire-format
summary: The TZif footer (version 2+ only) is delimited by two ASCII newline characters (0x0A) surrounding a POSIX TZ environment variable string. The TZ string MUST NOT contain NUL octets, MUST NOT be NUL-terminated, and SHOULD NOT begin with ':'.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
