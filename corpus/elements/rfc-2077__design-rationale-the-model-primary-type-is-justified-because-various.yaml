document: rfc-2077
kind: design-rationale
summary: The 'model' primary type is justified because various model subtypes (VRML, mesh, IGES) can be converted between each other with less loss of information than to subtypes of other primary types. This is analogous to how images and videos are grouped together to minimize conversion loss.
