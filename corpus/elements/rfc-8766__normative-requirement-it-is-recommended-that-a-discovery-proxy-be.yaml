document: rfc-8766
kind: normative-requirement
summary: It is RECOMMENDED that a Discovery Proxy be configured with a single domain name for both the IPv4 and IPv6 '.local.' zones on the local link, issuing both IPv4 and IPv6 mDNS queries when a unicast query is received and combining the results.
section: "8"
rfc2119_level: RECOMMENDED
