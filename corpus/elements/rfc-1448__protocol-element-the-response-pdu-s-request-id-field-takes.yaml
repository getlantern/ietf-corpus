document: rfc-1448
kind: protocol-element
summary: The Response-PDU's request-id field takes the same value as the request PDU to which it responds. If error-status is non-zero, the error-index field identifies the variable binding (1-based index) that caused the failure; the value fields of all variable bindings are ignored when error-status is non-zero.
