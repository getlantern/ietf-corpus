document: rfc-6680
kind: normative-requirement
summary: When GSS_Set_name_attribute() is called on a non-MN and succeeds even though no mechanisms understand the attribute, subsequent credential acquisition (GSS_Acquire_cred/GSS_Add_cred) MUST fail for mechanisms that do not understand the set attributes.
section: "7.6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
