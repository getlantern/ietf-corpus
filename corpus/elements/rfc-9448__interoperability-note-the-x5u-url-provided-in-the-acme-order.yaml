document: rfc-9448
kind: interoperability-note
summary: The 'x5u' URL provided in the ACME order object for PASSporT use must respond to a GET request (not POST-as-GET as required for the ACME 'certificate' URL). This requires either the ACME client to download and re-host the certificate, or the CA to host it at a publicly accessible GET endpoint.
section: "7"
topics:
