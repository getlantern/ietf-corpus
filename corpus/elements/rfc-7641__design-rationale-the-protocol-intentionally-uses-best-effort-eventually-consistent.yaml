document: rfc-7641
kind: design-rationale
summary: The protocol intentionally uses best-effort, eventually-consistent delivery rather than guaranteeing every state change is delivered. This bounded inconsistency model is enforced via the Max-Age Option and is necessary given congestion control constraints and the lossy nature of constrained networks.
section: "1.3"
