document: rfc-7244
kind: design-rationale
summary: The Synchronization Offset field uses a 64-bit signed NTP-format timestamp (integer part in first 32 bits, fractional part in last 32 bits) for sub-millisecond precision, mirroring the jitter calculation approach from RFC 3550 to ensure consistency with existing RTP implementations.
