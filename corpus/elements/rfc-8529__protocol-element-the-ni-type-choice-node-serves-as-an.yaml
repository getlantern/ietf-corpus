document: rfc-8529
kind: protocol-element
summary: The 'ni-type' choice node serves as an anchor point for augmentations that define type-specific VRF/VSI information. Each augmenting case is expected to contain containers for configuration and state data and, when needed, a type-specific mount point distinct from the well-known ones.
