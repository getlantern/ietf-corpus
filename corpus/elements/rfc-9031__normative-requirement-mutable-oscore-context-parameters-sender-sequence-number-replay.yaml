document: rfc-9031
kind: normative-requirement
summary: Mutable OSCORE context parameters (Sender Sequence Number, Replay Window) MUST be stored in persistent memory. Each update of the Replay Window MUST be written to persistent memory to guarantee nonce uniqueness and replay resistance across reboots and rejoins.
section: 7.3.1
rfc2119_level: MUST
topics:
    - security
    - crypto
