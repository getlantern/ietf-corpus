document: rfc-7782
kind: protocol-element
summary: In a TRILL Active-Active Edge (AAE) group, each member RBridge encapsulates frames from attached end systems using its own nickname as the ingress nickname, regardless of whether the frame is unicast or multicast. This causes remote RBridges to observe multiple attachment points (ingress RBridges) for the same host MAC address.
section: "3"
topics:
    - routing
