document: rfc-4252
kind: normative-requirement
summary: Systems supporting non-ASCII passwords SHOULD always normalize passwords and user names when added to or compared against the database. SSH implementations that both store and compare passwords SHOULD use RFC4013 (SASLprep) for normalization.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
