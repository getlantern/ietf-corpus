document: rfc-7924
kind: normative-requirement
summary: For each cached info type indicated in the ServerHello, the server MUST alter transmission of the respective payload. The server MUST only include CachedObjects of types also indicated by the client in the ClientHello.
section: "4"
rfc2119_level: MUST
