document: rfc-2535
kind: protocol-element
summary: The NXT RR (type 30) provides authenticated denial of existence by creating a chain of all literal owner names in a zone in canonical order. Its RDATA points to the next owner name in that order and carries a bit map of RR types present at the current owner. The zone name is placed in the RDATA of the last NXT to make the chain circular.
section: "5.1"
topics:
    - dns
    - security
