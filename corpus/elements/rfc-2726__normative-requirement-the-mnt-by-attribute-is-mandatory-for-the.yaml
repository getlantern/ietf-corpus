document: rfc-2726
kind: normative-requirement
summary: The mnt-by attribute is mandatory for the key-cert object; therefore a mntner object must exist before a key-cert object can be created. The referenced mntner must not have its auth attribute set to NONE.
section: "2.1"
rfc2119_level: REQUIRED
topics:
    - security
