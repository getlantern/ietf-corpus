document: rfc-5665
kind: wire-format
summary: 'The uaddr format for IPv4 transports using 16-bit ports (RDMA, SCTP, TCP, UDP) is the US-ASCII string ''h1.h2.h3.h4.p1.p2'', where h1–h4 are the four IPv4 address octets in ASCII-decimal and p1.p2 encodes the 16-bit port as two ASCII-decimal octets (big-endian). Example: address 0xC0000207 on port 0xCB51 yields ''192.0.2.7.203.81''.'
section: 5.2.3.3
topics:
    - ip
