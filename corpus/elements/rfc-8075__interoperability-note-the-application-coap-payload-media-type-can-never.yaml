document: rfc-8075
kind: interoperability-note
summary: The 'application/coap-payload' media type can never be used directly in CoAP messages because there is no mechanism to encode the mandatory 'cf' parameter in CoAP. It is exclusively an HTTP-side representation for passing through CoAP payloads with unmapped content-formats.
section: "9.2"
topics:
    - http
