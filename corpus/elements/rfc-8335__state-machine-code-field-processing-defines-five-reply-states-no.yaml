document: rfc-8335
kind: state-machine
summary: 'Code field processing defines five reply states: No Error (0) when query succeeds; Malformed Query (1) when structure or L-bit/identification-type constraints are violated; No Such Interface (2) when L-bit is set but interface not found on proxy; No Such Table Entry (3) when L-bit is clear but address not in ARP/Neighbor Cache; Multiple Interfaces Satisfy Query (4) when multiple interfaces match.'
