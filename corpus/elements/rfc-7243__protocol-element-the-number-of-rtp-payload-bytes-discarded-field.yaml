document: rfc-7243
kind: protocol-element
summary: The 'Number of RTP payload bytes discarded' field is a 32-bit unsigned integer counting RTP payload bytes of discarded packets; it excludes RTP header extensions and padding. The discarded packet is associated with the interval in which it was discarded, not when it was expected.
