document: rfc-8779
kind: design-rationale
summary: The LABEL-REQUEST TLV is separate from the TE-LSP label request (expressed by the SWITCH-LAYER object) because endpoint labels and TE-LSP labels can be different, supporting different LABEL-REQUESTs (e.g., in multi-layer requests where endpoints have distinct switching capabilities from the path itself).
section: 2.5.2.4
topics:
