document: rfc-9370
kind: normative-requirement
summary: For ADDKE Transform Types, the responder's chosen set MUST NOT contain duplicated algorithms (those with identical Transform ID and attributes), except for the Transform ID of NONE. If it cannot avoid duplicates, it MUST reject with NO_PROPOSAL_CHOSEN.
section: 2.2.1
rfc2119_level: MUST NOT
