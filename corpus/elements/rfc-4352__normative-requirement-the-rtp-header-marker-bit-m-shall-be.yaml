document: rfc-4352
kind: normative-requirement
summary: The RTP header marker bit (M) SHALL be set to 1 whenever the first frame carried in the packet is the first frame in a talkspurt; for all other packets M SHALL be set to 0.
section: "4.1"
rfc2119_level: MUST
topics:
