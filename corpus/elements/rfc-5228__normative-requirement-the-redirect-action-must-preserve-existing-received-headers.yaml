document: rfc-5228
kind: normative-requirement
summary: The 'redirect' action MUST preserve existing Received headers, and the count of Received headers in the outgoing message MUST be larger than in the received message. If the incoming message has an empty envelope sender, the outgoing message MUST also have an empty envelope sender to prevent DSN loops.
section: "4.2"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
