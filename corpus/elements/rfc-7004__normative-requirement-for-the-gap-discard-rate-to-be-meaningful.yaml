document: rfc-7004
kind: normative-requirement
summary: For the Gap Discard Rate to be meaningful, 2 instances of the Discard Count Block [RFC7002] with DT=1 and DT=2 MUST be included in the same RTCP XR packet as the Burst/Gap Discard Summary Statistics Block.
section: 3.2.2
rfc2119_level: MUST
