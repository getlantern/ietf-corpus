document: rfc-8632
kind: protocol-element
summary: The purge-alarms action deletes alarms from the alarm list matching a filter on clearance status, age (seconds/minutes/hours/days/weeks), severity (below/is/above), and operator state. The compress-alarms action removes all status-change history entries except the most recent.
