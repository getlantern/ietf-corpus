document: rfc-2835
kind: protocol-element
summary: PIBES (Protocol for IP Broadcast Emulation Server) is required when the LIS does not support hardware broadcast. It uses the HARP server's current table as the target list, validates source addresses against this list, and forwards only packets addressed to IP LIS broadcast, multicast, or 255.255.255.255 to all addresses in the target list.
section: "7.1"
topics:
    - ip
    - multicast
