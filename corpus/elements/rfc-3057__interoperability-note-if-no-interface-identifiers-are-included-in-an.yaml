document: rfc-3057
kind: interoperability-note
summary: If no Interface Identifiers are included in an ASPAC message, the message applies to all provisioned Interface Identifiers within the AS(s) in which the ASP is provisioned. Including only a subset notes the ASP as Active for all Interface Identifiers provisioned for that AS.
section: 3.3.2.5
topics:
    - sctp
