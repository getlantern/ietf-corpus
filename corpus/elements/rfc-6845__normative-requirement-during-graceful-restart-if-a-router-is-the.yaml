document: rfc-6845
kind: normative-requirement
summary: During graceful restart, if a router is the DR on the hybrid interface, the pre-restart network-LSA MUST NOT be used to determine the previous set of adjacencies. If in state DROther, an adjacency to a non-DR or non-BDR neighbor is considered reestablished when the neighbor reaches state 2-Way.
section: "4.8"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
