document: rfc-7515
kind: protocol-element
summary: The 'crit' (Critical) Header Parameter is a JSON array listing Header Parameter names whose extensions MUST be understood and processed. If any listed extension is not understood, the JWS is invalid. The 'crit' parameter MUST occur only within the JWS Protected Header and MUST NOT contain an empty list.
section: 4.1.11
topics:
    - jose
    - security
