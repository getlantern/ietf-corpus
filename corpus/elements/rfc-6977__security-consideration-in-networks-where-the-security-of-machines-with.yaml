document: rfc-6977
kind: security-consideration
summary: In networks where the security of machines with access to the data path is not under the control of the server administrator, IPsec (RFC 4301) is necessary to prevent spoofing of Reconfigure-Request messages. DHCPv6 servers MUST silently discard Reconfigure-Request messages originating from unknown relay agents.
section: "9"
rfc2119_level: MUST
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
