document: rfc-2380
kind: normative-requirement
summary: The configurable inactivity timer MUST be set to 'infinite' for VCs initiated at the request of RSVP. This overrides RFC 1755's recommendation to tear down VCs inactive for twenty minutes.
section: "2.3"
rfc2119_level: MUST
