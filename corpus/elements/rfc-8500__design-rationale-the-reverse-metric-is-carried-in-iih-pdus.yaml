document: rfc-8500
kind: design-rationale
summary: The Reverse Metric is carried in IIH PDUs rather than LSPs so that provisioning needs to be performed only on a single node, allowing traffic to shift bidirectionally away from a link without reconfiguring the remote neighbor. This avoids the operational complexity of coordinating metric changes on both ends simultaneously.
section: "1.5"
topics:
    - routing
