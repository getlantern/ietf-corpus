document: rfc-5590
kind: protocol-element
summary: The prepareDataElements and processIncomingMsg ASIs (RFC 3411) are extended with a new IN parameter tmStateReference, passed from the Dispatcher into the Message Processing Subsystem and then to the Security Subsystem. How or if each model utilizes the tmStateReference is model-specific.
