document: rfc-8310
kind: normative-requirement
summary: DANE meta-queries for TLSA records MUST be validated using DNSSEC as described in RFC 6698; the DNS client may perform these meta-queries via Opportunistic Privacy or in the clear to avoid trust recursion.
