document: rfc-8405
kind: normative-requirement
summary: The HOLDDOWN_INTERVAL MUST be defaulted or configured to be longer than the TIME_TO_LEARN_INTERVAL to ensure the FSM does not return to QUIET before all events of a single failure have been collected.
