document: rfc-7035
kind: normative-requirement
summary: Access to map URLs MUST be secured with TLS (i.e., the map URL must be an https URI) unless the map URL cannot leak information about the Target's location. If the map URL conveys more information about a Target than a map server is authorized to receive, that URL MUST NOT be included in the PIDF-LO.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - privacy
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
