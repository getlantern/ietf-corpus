document: rfc-8338
kind: design-rationale
summary: The R-PE sends Label Mapping Messages as soon as the transport LSP ID is known regardless of the LSP's operational state, and does not withdraw labels when the transport LSP goes down. L-PEs also retain P2MP PW labels regardless of transport LSP status, decoupling PW signaling from transport LSP lifecycle to simplify operations.
section: 3.2.1
topics:
    - mpls
