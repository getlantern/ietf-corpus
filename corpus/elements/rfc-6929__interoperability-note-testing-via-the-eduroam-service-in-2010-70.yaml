document: rfc-6929
kind: interoperability-note
summary: Testing via the EDUROAM service in 2010 (70 proxies) found that 24% filtered unknown attributes, 11% truncated them, and 1% discarded the entire request. Only 63% forwarded attributes verbatim as required. Wide deployment of Extended Attributes depends on fixing non-conformant proxies.
section: "5.2"
