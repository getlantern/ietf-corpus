document: rfc-9588
kind: security-consideration
summary: A stateless KDC MUST maintain confidentiality and integrity of its PA-FX-COOKIE (which holds scalar x and transcript hash). The KDC SHOULD limit cookie replay windows with a timestamp and SHOULD bind cookies to specific pre-authentication mechanisms and client principals.
section: "10.4"
topics:
    - crypto
    - security
