document: rfc-9553
kind: design-rationale
summary: Id-keyed maps (Id[ObjectType]) are used instead of arrays throughout JSContact to represent unordered sets of objects. This allows concise PatchObject-based updates and enables cross-referencing between objects (e.g., Title objects referencing Organization objects by Id).
section: 1.4.1
topics:
    - json
