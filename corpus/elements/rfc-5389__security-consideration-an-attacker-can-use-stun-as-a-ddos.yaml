document: rfc-5389
kind: security-consideration
summary: An attacker can use STUN as a DDoS amplifier (Attack I) by sending Binding requests with a victim's IP as the source address, directing server responses at the victim. Requiring authentication prevents unauthenticated amplification but is not always practical for public servers.
section: 16.2.1
topics:
    - nat
    - security
