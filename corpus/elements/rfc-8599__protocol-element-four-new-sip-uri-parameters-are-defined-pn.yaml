document: rfc-8599
kind: protocol-element
summary: 'Four new SIP URI parameters are defined: ''pn-provider'' (identifies PNS type), ''pn-prid'' (the Push Resource ID), ''pn-param'' (PNS-specific auxiliary parameters, e.g., APNs Team ID and Topic), and ''pn-purr'' (Proxy Unique Registration Reference for mid-dialog push support). All are carried in Contact header field URIs of REGISTER requests.'
section: "8.7"
topics:
