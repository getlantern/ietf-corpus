document: rfc-7460
kind: interoperability-note
summary: Energy Objects that lack an ENTITY-MIB instance (e.g., building gateway proxies for BACnet, home energy controllers) set eoPhysicalEntity to zero using the PhysicalIndexOrZero Textual Convention. The ENERGY-OBJECT-MIB is therefore applicable to devices where ENTITY-MIB and ENTITY-SENSOR-MIB cannot be assumed.
section: "7.1"
topics:
    - snmp
