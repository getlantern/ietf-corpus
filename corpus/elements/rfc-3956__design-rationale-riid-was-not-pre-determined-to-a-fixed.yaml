document: rfc-3956
kind: design-rationale
summary: RIID was not pre-determined to a fixed value (e.g., '1') because doing so would eliminate address assignment flexibility for operators. Allowing the operator to choose any RIID value from 1–F enables flexible RP placement across different network topologies and prefix lengths.
section: A
topics:
