document: rfc-7931
kind: normative-requirement
summary: If transferring stateids would result in a conflict with an existing stateid on the destination server for the same client, transparent state migration MUST NOT happen for that client. Servers using transparent state migration should coordinate stateid assignment policies to make such conflicts unlikely or impossible.
section: 6.1.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
