document: rfc-1723
kind: normative-requirement
summary: 'On interfaces where RIP-1 routers may hear RIP-2 entries: (1) information internal to one network must never be advertised into another network; (2) more-specific subnet information may not be advertised where RIP-1 routers would treat it as a host route; (3) supernet routes must not be advertised where they could be misinterpreted by RIP-1 routers.'
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
