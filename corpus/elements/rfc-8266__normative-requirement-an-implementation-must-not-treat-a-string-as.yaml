document: rfc-8266
kind: normative-requirement
summary: An implementation MUST NOT treat a string as conforming to the Nickname profile until the enforcement operation has been completed; it MUST NOT assume an input string is conforming beforehand.
section: "2.3"
rfc2119_level: MUST NOT
