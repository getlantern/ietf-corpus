document: rfc-7395
kind: security-consideration
summary: Browser-based applications cannot inspect and verify at the application layer the certificate used for the WebSocket connection. In multi-tenant situations where XMPP service domain differs from WebSocket origin, the host-meta process SHOULD be used to delegate trust, provided the host-meta exchange occurs over secure HTTP.
section: "6"
topics:
    - security
    - tls
    - websocket
