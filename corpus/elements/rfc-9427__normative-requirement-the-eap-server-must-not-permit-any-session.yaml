document: rfc-9427
kind: normative-requirement
summary: The EAP server MUST NOT permit any session ticket to successfully resume authentication unless the inner tunnel authentication has completed successfully. Session tickets for sessions terminating in EAP Failure MUST be either invalidated or discarded.
section: "3"
rfc2119_level: MUST NOT
topics:
