document: rfc-5546
kind: normative-requirement
summary: 'The primary key for correlating iCalendar components is the UID property value; for recurring component instances, the primary key is composed of UID and RECURRENCE-ID together. The secondary key is the SEQUENCE property: among components with the same UID and RECURRENCE-ID, the one with the highest SEQUENCE value obsoletes all lower-valued revisions.'
section: 2.1.5
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
