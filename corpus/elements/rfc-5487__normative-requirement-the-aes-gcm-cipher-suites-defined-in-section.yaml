document: rfc-5487
kind: normative-requirement
summary: The AES-GCM cipher suites defined in Section 2 can only be negotiated in TLS version 1.2 or higher. The SHA-256/384 CBC cipher suites defined in Section 3 can be negotiated in any negotiated TLS version.
section: "1.1"
rfc2119_level: MUST
topics:
    - tls
    - security
