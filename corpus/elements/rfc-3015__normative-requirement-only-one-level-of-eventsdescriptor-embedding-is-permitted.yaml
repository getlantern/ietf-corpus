document: rfc-3015
kind: normative-requirement
summary: 'Only one level of EventsDescriptor embedding is permitted: an embedded EventsDescriptor SHALL NOT contain another embedded EventsDescriptor. An embedded EventsDescriptor may contain an embedded SignalsDescriptor. A MGC SHALL NOT send an EventsDescriptor with an event both marked KeepActive and containing an embedded SignalsDescriptor.'
section: 7.1.9
rfc2119_level: SHALL NOT
topics:
    - realtime
