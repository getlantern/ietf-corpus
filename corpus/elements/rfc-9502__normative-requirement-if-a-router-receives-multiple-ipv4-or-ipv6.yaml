document: rfc-9502
kind: normative-requirement
summary: If a router receives multiple IPv4 (or IPv6) Algorithm Prefix Reachability advertisements for the same prefix from different originators that do not all advertise the same algorithm, it MUST ignore all of them and MUST NOT install any forwarding entries based on those advertisements. This situation SHOULD be logged as an error.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
