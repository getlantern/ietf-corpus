document: rfc-2250
kind: protocol-element
summary: The T bit signals that an MPEG-2 video-specific header extension (Section 3.4.1) follows the base video header. Its inclusion is optional and intended to improve error resilience by supplying picture coding parameters for GOP/Picture_Header reconstruction after packet loss.
section: "3.4"
