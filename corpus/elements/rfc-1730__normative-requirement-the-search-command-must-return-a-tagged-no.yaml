document: rfc-1730
kind: normative-requirement
summary: The SEARCH command MUST return a tagged NO (not BAD) if the server does not support the specified CHARSET. MIME-encoded strings in RFC 822/MIME headers and content-transfer-encodings MUST be decoded before matching.
section: 6.4.4
rfc2119_level: MUST
