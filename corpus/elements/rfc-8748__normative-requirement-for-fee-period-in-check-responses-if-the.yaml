document: rfc-8748
kind: normative-requirement
summary: 'For <fee:period> in <check> responses: if the parent <fee:command> is ''restore'', the <fee:period> element MUST NOT be included; otherwise it MUST be included. If no period appeared in the client command, the server MUST return its default period value.'
section: 5.1.1
rfc2119_level: MUST
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
