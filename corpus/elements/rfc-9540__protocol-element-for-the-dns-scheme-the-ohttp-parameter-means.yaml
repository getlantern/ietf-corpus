document: rfc-9540
kind: protocol-element
summary: For the "dns" scheme, the "ohttp" parameter means the DNS server has a DoH service accessible via Oblivious HTTP. Requests use binary HTTP with "message/bhttp" wrapping inner requests with "application/dns-message" media type.
