document: rfc-8780
kind: protocol-element
summary: 'Two new XRO subobjects are defined for signal processing exclusion: Type 8 (Optical Interface Class List) and Type 9 (Client Signal Information). Each has an X bit, 7-bit Type, Length, Reserved (8 bits), Attribute (8 bits, 0=Interface or 1=Node), and the respective information encoded per RFC 7581.'
