document: rfc-6823
kind: wire-format
summary: The GENINFO TLV value field begins with a 1-octet Flags field, followed by a 2-octet Application ID, optional 4-octet IPv4 address (if I bit set), optional 16-octet IPv6 address (if V bit set), and then additional application-specific information. Total length is 3 to 255 octets.
