document: rfc-7261
kind: normative-requirement
summary: When the offer has G729 with no annexb parameter and the answer has G729 with annexb=yes, the offerer and answerer MUST proceed as if G729 is negotiated with annexb=yes.
section: "3.3"
rfc2119_level: MUST
topics:
