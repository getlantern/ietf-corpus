document: rfc-7023
kind: normative-requirement
summary: For PWs established over MPLS or MPLS/IP PSN using mechanisms other than LDP (e.g., static configuration), in-band signaling using VCCV-BFD SHOULD be used to convey AC and PW status and defects; alternatively, mechanisms in RFC 6478 MAY be used.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
