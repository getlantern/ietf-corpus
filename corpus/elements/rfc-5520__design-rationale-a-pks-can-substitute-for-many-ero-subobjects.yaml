document: rfc-5520
kind: design-rationale
summary: A PKS can substitute for many ERO subobjects, potentially providing significant message size reduction. This benefit is especially pronounced for bidirectional LSPs (which carry node IDs, TE link IDs, component link IDs, and label IDs in both directions) and point-to-multipoint LSPs.
