document: rfc-5247
kind: normative-requirement
summary: MSK and EMSK MUST be named using the EAP Session-Id and a binary or textual indication of the specific key type. TSK naming is specified by the lower layer; TEK naming MAY be specified by the EAP method.
section: 1.4.1
rfc2119_level: MUST
topics:
