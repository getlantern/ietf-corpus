document: rfc-7811
kind: interoperability-note
summary: For IS-IS IP/LDP FRR, the mrt_node_id is the 7-octet neighbor system ID and pseudonode number from the Extended IS Reachability TLV (type 22) or Multi-Topology IS Neighbor TLV (type 222), and the metric is the 3-octet metric field from the same TLVs. For point-to-point links the pseudonode number (7th octet) is zero.
section: "5.1"
topics:
    - routing
