document: rfc-9725
kind: normative-requirement
summary: 'WHIP supports only a single MediaStream: all ''m='' sections MUST contain a ''msid'' attribute with the same value, and the MediaStream MUST NOT have two or more MediaStreamTracks of the same media kind. If these constraints are violated, the endpoint MUST reject with ''422 Unprocessable Content'' or ''400 Bad Request''.'
section: 4.4.2
rfc2119_level: MUST
topics:
    - webrtc
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
