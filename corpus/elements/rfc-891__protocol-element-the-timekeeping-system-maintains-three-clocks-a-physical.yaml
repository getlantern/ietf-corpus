document: rfc-891
kind: protocol-element
summary: 'The timekeeping system maintains three clocks: a physical clock (hardware oscillator), an apparent clock (CLK.CLOCK, 48-bit fixed-point running at 1000 Hz, reset at midnight UT), and an actual clock (the time provided by an outside reference). CLK.DELTA is a 48-bit correction factor slewed into CLK.CLOCK by the ADJUST-CLOCK event.'
section: "3.2"
topics:
    - ntp
