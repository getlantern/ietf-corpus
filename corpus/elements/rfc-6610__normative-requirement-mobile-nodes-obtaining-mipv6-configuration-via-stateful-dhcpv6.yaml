document: rfc-6610
kind: normative-requirement
summary: Mobile nodes obtaining MIPv6 configuration via stateful DHCPv6 SHOULD include the same options in every message sent to the server. For stateless exchanges, mobile nodes SHOULD reconfigure whenever a change in the attached network is detected.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - mobility
    - ip
