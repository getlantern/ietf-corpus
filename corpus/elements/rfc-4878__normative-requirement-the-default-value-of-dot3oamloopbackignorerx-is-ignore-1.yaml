document: rfc-4878
kind: normative-requirement
summary: The default value of dot3OamLoopbackIgnoreRx is ignore(1), meaning received loopback commands are silently discarded unless explicitly configured to process(2). This prevents unsolicited remote loopback activation.
section: "6"
rfc2119_level: SHOULD
topics:
