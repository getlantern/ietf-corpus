kind: protocol-element
summary: The fattr4 structure encodes file attributes as a pair of (bitmap4 attrmask, attrlist4 attr_vals), where the bitmap selects which attributes are present and the opaque list encodes their values in attribute-number order. REQUIRED attributes span IDs 0–11 and 19, 75; RECOMMENDED attributes span IDs 12–74 and 76.
