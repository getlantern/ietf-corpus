document: rfc-3280
kind: normative-requirement
summary: All certificates issued after December 31, 2003 MUST use the UTF8String encoding of DirectoryString in distinguished names. Prior to that date, conforming CAs MUST choose PrintableString, then BMPString, then UTF8String in preference order; TeletexString and UniversalString SHOULD NOT be used for new subjects.
section: 4.1.2.4
rfc2119_level: MUST
topics:
    - pkix
