document: rfc-7357
kind: interoperability-note
summary: Unicast ESADI PDU support is backwards compatible because unicasting is only employed when the recipient RBridge explicitly advertises support via the UN flag in its ESADI Parameter APPsub-TLV. RBridges not advertising unicast support continue to receive multicast ESADI PDUs.
section: A.2
topics:
    - routing
