document: rfc-6595
kind: normative-requirement
summary: Clients and servers MUST treat the IdP-Identifier as a domain name slot. They SHOULD support internationalized domain names (IDNs), and if they do, all labels MUST be A-labels or NR-LDH labels.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
