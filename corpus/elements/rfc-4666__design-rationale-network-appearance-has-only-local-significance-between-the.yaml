document: rfc-4666
kind: design-rationale
summary: Network Appearance has only local significance between the SGP and ASP rather than being globally meaningful. This design allows the same physical SS7 network context to be represented by different Network Appearance values at different SGPs, accommodating the common scenario where a single ASP is connected to multiple SGPs for redundancy.
section: 3.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
