document: rfc-8381
kind: normative-requirement
summary: The priority of an error response message MAY be reduced from the priority of the Vendor Channel message causing the error (unless already minimum priority), and the Drop Eligibility Indicator bit MAY be set in an error response. Vendor Channel error responses MAY be rate-limited.
section: "3.1"
rfc2119_level: MAY
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
