document: rfc-5857
kind: security-consideration
summary: 'Negotiating a short ROHC ICV length via ROHC_ICV_LEN may introduce vulnerabilities: a short ICV can allow erroneous (or malicious) packets to pass header integrity checks and be forwarded into the protected domain. This is a trade-off against the bandwidth overhead of longer ICVs.'
section: "4"
topics:
    - ipsec
    - vpn
    - security
    - crypto
