document: rfc-3281
kind: protocol-element
summary: The ProxyInfo extension (id-pe-ac-proxying, { id-pe 10 }) enables controlled AC proxying via a SEQUENCE OF Targets. The extension MUST be critical. A proxy check passes if the sender's authenticated identity matches the holder field or a proxy set, and the current server is a valid target in that same proxy set.
section: "7.2"
topics:
    - pkix
    - security
