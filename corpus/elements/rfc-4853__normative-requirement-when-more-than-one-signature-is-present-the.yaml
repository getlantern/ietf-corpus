document: rfc-4853
kind: normative-requirement
summary: When more than one signature is present, the successful validation of one signature associated with a given signer is usually treated as a successful signature by that signer. Applications that employ a different rule must specify those rules explicitly.
section: "3"
rfc2119_level: MUST
topics:
