document: rfc-9989
kind: normative-requirement
summary: The 'v' tag MUST be the first tag in a DMARC Policy Record, its value is case-sensitive, and the only valid value is 'DMARC1'. If the tag is not first, absent, or has any other value, the entire record MUST be ignored.
section: "4.7"
rfc2119_level: MUST
topics:
    - email
    - dns
