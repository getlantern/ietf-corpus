document: rfc-854
kind: normative-requirement
summary: For remote terminal access, the TELNET server MUST listen on well-known TCP port 23 (octal 27). The server can handle many simultaneous connections on port 23 because each TCP connection is identified by the (server-port, user-port) pair.
section: CONNECTION ESTABLISHMENT
rfc2119_level: MUST
topics:
    - tcp
