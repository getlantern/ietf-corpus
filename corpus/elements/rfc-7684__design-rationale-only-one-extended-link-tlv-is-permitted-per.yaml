document: rfc-7684
kind: design-rationale
summary: Only one Extended Link TLV is permitted per Extended Link Opaque LSA to allow fine-grained topology change advertisements — a single link attribute change triggers re-origination of only the LSA for that link, avoiding unnecessary churn for unrelated links.
