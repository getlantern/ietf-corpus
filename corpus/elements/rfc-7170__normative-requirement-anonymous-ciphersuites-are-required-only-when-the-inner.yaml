document: rfc-7170
kind: normative-requirement
summary: Anonymous ciphersuites are REQUIRED only when the inner authentication method provides mutual authentication, key generation, and resistance to man-in-the-middle and dictionary attacks. TLS renegotiation indications defined in RFC 5746 MUST be supported.
section: "3.2"
rfc2119_level: REQUIRED
topics:
