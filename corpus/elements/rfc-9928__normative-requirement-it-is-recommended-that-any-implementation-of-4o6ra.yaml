document: rfc-9928
kind: normative-requirement
summary: It is RECOMMENDED that any implementation of 4o6RA be combined with an LDRA implementation (RFC 6221) in a back-to-back structure, and that the LDRA implementation includes a mechanism to obtain interface information to provide the Interface-ID option to outgoing DHCPV4-QUERY messages per Section 5.3.2 of RFC 6221, in order to preserve full topology information.
section: "3.2"
rfc2119_level: RECOMMENDED
topics:
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
