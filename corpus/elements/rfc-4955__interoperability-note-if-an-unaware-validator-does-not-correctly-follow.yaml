document: rfc-4955
kind: interoperability-note
summary: If an unaware validator does not correctly follow RFC 4035 rules (e.g., it interprets a DNSSEC record before validating it), or if the experiment modifies more than just DNSSEC semantics, the experiment may not be sufficiently masked and may cause unintended resolution failures.
section: "6"
topics:
