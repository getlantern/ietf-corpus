document: rfc-6206
kind: normative-requirement
summary: It is RECOMMENDED that protocols which need to allow disabling suppression reserve k=0 to mean k=infinity, since k=0 has no meaningful value as a natural number and avoids off-by-one confusion in packet inspection.
section: "6.5"
rfc2119_level: RECOMMENDED
topics:
