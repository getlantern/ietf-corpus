document: rfc-2460
kind: normative-requirement
summary: New flow labels must be chosen pseudo-randomly and uniformly from the range 1 to FFFFF hex, to make any bit subset usable as a router hash key. A source must not reuse a flow label for a new flow within the maximum lifetime of any previously established flow state for that label.
section: "6"
rfc2119_level: MUST
topics:
    - ip
    - qos
