document: rfc-8883
kind: normative-requirement
summary: Codes 6 ('Extension header too big'), 7 ('Extension header chain too long'), 8 ('Too many extension headers'), and 9 ('Too many options in extension header') SHOULD each be sent when the corresponding limit is exceeded, with the Pointer set to the first octet at or beyond the limit.
