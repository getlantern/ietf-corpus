document: rfc-7596
kind: design-rationale
summary: Lightweight 4over6 moves the NAPT44 function from the centralized AFTR to the distributed lwB4 CPE. This reduces AFTR state from per-flow (active NAPT sessions) to per-subscriber (binding table entries), lowering memory, processing, and logging overhead at the service provider and eliminating the need for a Carrier Grade NAT.
section: "1"
topics:
