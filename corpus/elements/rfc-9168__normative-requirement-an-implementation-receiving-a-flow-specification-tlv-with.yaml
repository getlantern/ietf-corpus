document: rfc-9168
kind: normative-requirement
summary: An implementation receiving a Flow Specification TLV with an unrecognized or unsupported type MUST respond with PCErr Error-Type 30, Error-value 1 (Unsupported FlowSpec) and MUST NOT install the Flow Specification.
