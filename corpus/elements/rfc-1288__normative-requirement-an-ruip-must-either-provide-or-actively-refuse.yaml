document: rfc-1288
kind: normative-requirement
summary: An RUIP MUST either provide or actively refuse the {Q2} forwarding service. If it provides the service, it MUST open a connection to the rightmost host in the query, forward the remainder of the query, relay the response back, and close only when the remote RUIP closes.
section: "2.4"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
