document: rfc-5374
kind: protocol-element
summary: Inbound IPsec multicast processing extends RFC 4301 by accepting packets addressed to a multicast group (not just unicast addresses of the device itself). A new processing step (3aa) performs SAD lookup using SPI plus destination address (or SPI plus destination and source) for multicast-destined AH/ESP packets.
section: "5.2"
topics:
    - ipsec
    - multicast
