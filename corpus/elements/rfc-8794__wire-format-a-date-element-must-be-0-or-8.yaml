document: rfc-8794
kind: wire-format
summary: A Date Element MUST be 0 or 8 octets and stores a signed 64-bit integer (same encoding as Signed Integer) expressing nanoseconds relative to 2001-01-01T00:00:00.000000000 UTC, covering dates from approximately 1708 to 2293.
