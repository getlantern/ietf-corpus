document: rfc-7940
kind: normative-requirement
summary: All 'char' elements in the 'data' section MUST have distinct 'cp' attributes. 'range' elements MUST NOT specify code point ranges that overlap another range or any single 'char' element. An LGR defining the same code point more than once MUST be rejected.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
