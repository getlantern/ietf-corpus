document: rfc-6004
kind: wire-format
summary: The EVPL Generalized Label (Label Type value 2) is a 16-bit field consisting of 4 reserved bits followed by a 12-bit VLAN ID. The reserved bits MUST be set to zero on transmission and MUST be ignored on receipt.
