document: rfc-7071
kind: protocol-element
summary: A "reputon" is a single independent JSON object containing reputation information. A reputation query response may contain one or more reputons. The top-level JSON object carries an "application" member identifying the reputation application context and a "reputons" array of reputon objects.
section: "2.1"
