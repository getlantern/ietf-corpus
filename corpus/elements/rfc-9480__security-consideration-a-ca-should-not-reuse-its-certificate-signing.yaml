document: rfc-9480
kind: security-consideration
summary: A CA should not reuse its certificate signing key for other purposes such as protecting CMP responses or TLS connections. Separating the CA signing key minimizes its exposure and reduces its usage to a minimum. This fixes Errata ID 5731.
section: "2.22"
topics:
    - pkix
    - security
    - crypto
