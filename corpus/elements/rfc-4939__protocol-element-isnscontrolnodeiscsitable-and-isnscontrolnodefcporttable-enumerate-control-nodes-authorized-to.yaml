document: rfc-4939
kind: protocol-element
summary: isnsControlNodeIscsiTable and isnsControlNodeFcPortTable enumerate control nodes authorized to manage an iSNS server, identified by iSCSI node index/name or FC Port WWN respectively. Each entry indicates whether the node is currently registered and whether it receives Management SCNs.
