document: rfc-3530
kind: normative-requirement
summary: A persistent filehandle MUST be accepted by the server for the lifetime of the object, including after server restart and after filesystem migration. When presented with a persistent filehandle referring to a deleted object, the server MUST return NFS4ERR_STALE.
section: 4.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
