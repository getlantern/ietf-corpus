document: rfc-8370
kind: interoperability-note
summary: Both RI-RSVP and Per-Peer Flow Control are fully backward compatible and can be deployed incrementally. If a peer does not signal the corresponding capability bit, the feature is not activated for that peer and traditional RSVP behavior is used.
