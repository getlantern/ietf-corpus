document: rfc-8598
kind: security-consideration
summary: An initiator MUST only accept INTERNAL_DNSSEC_TAs for whitelisted domains because the mechanism allows the IKE authentication credential to be leveraged into authenticating credentials for other connections, including overriding TLS trust via TLSA/DANE records.
section: "8"
topics:
