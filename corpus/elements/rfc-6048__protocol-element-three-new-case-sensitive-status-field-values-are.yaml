document: rfc-6048
kind: protocol-element
summary: 'Three new case-sensitive status field values are defined for LIST ACTIVE responses: ''x'' (no local postings or peer articles accepted), ''j'' (only peer articles accepted, not locally filed except optionally in ''junk''), and ''=other.group'' (alias — peer articles filed under other.group).'
