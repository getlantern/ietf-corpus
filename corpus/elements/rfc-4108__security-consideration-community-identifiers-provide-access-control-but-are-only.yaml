document: rfc-4108
kind: security-consideration
summary: Community identifiers provide access control, but are only as strong as the integrity of community membership records. If the bootstrap loader cannot determine community membership, it MUST treat the hardware module as excluded, erring on the side of rejection.
section: "6.4"
topics:
    - security
