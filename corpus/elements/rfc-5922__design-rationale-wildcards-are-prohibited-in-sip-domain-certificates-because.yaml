document: rfc-5922
kind: design-rationale
summary: Wildcards are prohibited in SIP domain certificates because RFC 3261 provides no guidance on wildcard handling and the potential for misidentification in a federated environment is significant; this is a deliberate departure from the HTTPS practice in RFC 2818.
section: "7.2"
topics:
    - sip
    - pkix
    - tls
