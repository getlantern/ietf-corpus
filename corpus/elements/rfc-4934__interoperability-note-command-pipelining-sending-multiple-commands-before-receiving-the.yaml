document: rfc-4934
kind: interoperability-note
summary: Command pipelining (sending multiple commands before receiving the first response) is possible with TCP transport but does not change the basic single-command, single-response operating mode of the core EPP protocol; batch processing (multiple EPP commands in a single data unit) is not permitted.
section: "3"
