document: rfc-5251
kind: protocol-element
summary: A CE requests a network-protected LSP (PE-to-PE protection) using the technique in RFC 4873. Failure notifications are requested via a Notify Request object in Path or Resv messages; a PE receiving such an object SHOULD store the Notify Node Address and SHOULD include a Notify Request in the outgoing message.
section: "4.4"
topics:
    - vpn
    - mpls
