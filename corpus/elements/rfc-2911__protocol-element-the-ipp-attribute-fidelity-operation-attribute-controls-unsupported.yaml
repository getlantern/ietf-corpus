document: rfc-2911
kind: protocol-element
summary: The 'ipp-attribute-fidelity' operation attribute controls unsupported Job Template attribute handling. When 'true', the Printer MUST reject the job if any supplied attribute or value is unsupported; when 'false', the Printer accepts the job and ignores unsupported attributes, returning them in the Unsupported Attributes group.
section: 3.2.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
