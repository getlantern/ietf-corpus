document: rfc-2344
kind: normative-requirement
summary: The mobile node MUST place the Encapsulating Delivery Style Extension after the Mobile-Home Authentication Extension and before the Mobile-Foreign Authentication Extension (if present). The extension MUST NOT be included if the 'T' bit is not set in the Registration Request.
section: "3.3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
