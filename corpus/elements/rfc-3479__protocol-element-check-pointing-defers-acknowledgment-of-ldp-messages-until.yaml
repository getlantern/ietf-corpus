document: rfc-3479
kind: protocol-element
summary: Check-pointing defers acknowledgment of LDP messages until a Keepalive carrying the FT Protection TLV is sent, which requests a flush of all pending acknowledgments. The C bit in the FT Session TLV enables check-pointing; when C is set without S, all labels become Check-Pointable FT Labels.
section: "4.6"
topics:
    - mpls
    - routing
