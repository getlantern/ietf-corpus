document: rfc-9521
kind: interoperability-note
summary: A BFD session can only be established between two VAPs that are mapped to the same VNI and that use the same way to encapsulate data packets. Due to N-to-1 mapping between VAPs and VNIs, multiple BFD sessions between two NVEs for the same VNI are allowed.
section: "4.1"
topics:
    - routing
