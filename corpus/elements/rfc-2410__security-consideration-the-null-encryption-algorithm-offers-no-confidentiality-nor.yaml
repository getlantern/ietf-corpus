document: rfc-2410
kind: security-consideration
summary: The NULL encryption algorithm offers no confidentiality nor any other security service. ESP_NULL is considered no less secure than AH when using the same authentication algorithm, but an ESP SA MUST specify at least one cryptographically strong encryption or authentication algorithm.
