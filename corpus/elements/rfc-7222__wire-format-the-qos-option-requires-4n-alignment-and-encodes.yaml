document: rfc-7222
kind: wire-format
summary: 'The QoS option requires 4n alignment and encodes: Type (8-bit, value 58), Length (8-bit), SR-ID (8-bit Service Request Identifier), TC (8-bit Traffic Class: 6-bit DSCP + 2-bit reserved), OC (8-bit Operational Code), Reserved (24-bit), followed by zero or more TLV-encoded QoS Attributes.'
section: "4.1"
topics:
