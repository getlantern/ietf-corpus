document: rfc-7959
kind: security-consideration
summary: Partial block transfers can bypass Intrusion Detection Systems (IDSs); it is RECOMMENDED that IDSs analyzing CoAP traffic implement the Block options to reassemble entire representations. Techniques analogous to IP fragmentation attacks (interleaving blocks from different paths) may still defeat IDS reassembly.
section: "7"
rfc2119_level: RECOMMENDED
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
