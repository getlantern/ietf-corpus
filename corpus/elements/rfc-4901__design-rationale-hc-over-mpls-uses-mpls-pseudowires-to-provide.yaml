document: rfc-4901
kind: design-rationale
summary: HC over MPLS uses MPLS pseudowires to provide emulation of a single point-to-point link between compressor and decompressor, allowing existing HC algorithms (designed for single link-layer hops) to operate without compression/decompression cycles at intermediate LSRs. This avoids per-router decompression overhead and increases both bandwidth efficiency and scalability.
section: "3"
topics:
