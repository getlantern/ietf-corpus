document: rfc-7774
kind: normative-requirement
summary: If a DHCPv6 client with an MPL Forwarder configured via this option cannot receive a valid server response within T2 (stateful) or twice the information refresh time (stateless), it MUST suspend the MPL Forwarders configured by the option. MPL Forwarders configured by other methods (e.g., static file) MUST NOT be suspended.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
