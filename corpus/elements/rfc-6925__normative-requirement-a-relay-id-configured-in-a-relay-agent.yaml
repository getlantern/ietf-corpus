document: rfc-6925
kind: normative-requirement
summary: A Relay-ID configured in a relay agent MUST be unique within its administrative domain. Duplicate Relay-IDs may cause resource allocation problems as the DHCP server attempts to allocate the same resource to devices behind different relay agents.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
