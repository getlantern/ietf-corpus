document: rfc-1968
kind: design-rationale
summary: Vendors wishing to use proprietary encryption may use the OUI mechanism (option type 0) to negotiate without requesting an IANA-assigned option number. OUI is derived from the vendor's IEEE 802 Ethernet address.
