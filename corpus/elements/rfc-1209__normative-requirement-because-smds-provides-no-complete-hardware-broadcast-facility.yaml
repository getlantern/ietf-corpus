document: rfc-1209
kind: normative-requirement
summary: Because SMDS provides no complete hardware broadcast facility, the broadcast Internet address (host part all binary ones) MUST be mapped to smds$lis-ga.
section: IP Broadcast Address
rfc2119_level: MUST
