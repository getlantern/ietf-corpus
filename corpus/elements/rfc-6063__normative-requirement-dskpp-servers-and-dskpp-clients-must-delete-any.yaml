document: rfc-6063
kind: normative-requirement
summary: DSKPP Servers and DSKPP Clients MUST delete any secret values generated as a result of failed runs of DSKPP. Session identifiers MAY be retained for replay detection but MUST NOT be reused for subsequent protocol runs.
section: "3.3"
rfc2119_level: MUST
topics:
    - security
    - crypto
