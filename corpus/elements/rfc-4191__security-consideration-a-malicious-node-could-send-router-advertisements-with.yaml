document: rfc-4191
kind: security-consideration
summary: A malicious node could send Router Advertisements with High Default Router Preference or specific routes to divert traffic from legitimate routers, or include infinite Route Information Option lifetimes causing routes to linger indefinitely. These attacks mirror existing Prefix Information Option attacks but cause continued reachability probing rather than loss of connectivity.
