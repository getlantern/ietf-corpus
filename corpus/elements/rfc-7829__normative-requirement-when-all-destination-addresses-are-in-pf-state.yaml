document: rfc-7829
kind: normative-requirement
summary: When all destination addresses are in PF state (or some PF and some inactive), the sender MUST choose a PF-state destination and SHOULD pick the one with the lowest error count (fewest consecutive timeouts) for transmission.
section: "3.2"
rfc2119_level: MUST
topics:
    - sctp
    - multipath
