document: rfc-5034
kind: protocol-element
summary: The SASL capability is advertised via the CAPA command and lists supported SASL mechanisms as a space-separated argument. It permits use of the AUTH command to begin a SASL negotiation as defined in RFC 4422. This capability supersedes the definition in Section 6.3 of RFC 2449.
section: "3"
topics:
