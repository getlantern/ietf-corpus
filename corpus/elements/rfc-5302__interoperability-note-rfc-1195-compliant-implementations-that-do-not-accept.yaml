document: rfc-5302
kind: interoperability-note
summary: RFC 1195-compliant implementations that do not accept TLV 130 in L1 LSPs will be unable to compute external L1 routes, potentially causing routing loops between L1-only routers that understand external L1 routes and those that rely on the default route to the nearest L1L2 router.
section: "4"
topics:
