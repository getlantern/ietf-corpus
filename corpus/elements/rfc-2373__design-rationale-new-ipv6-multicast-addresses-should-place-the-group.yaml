document: rfc-2373
kind: design-rationale
summary: New IPv6 multicast addresses should place the group identifier in the low-order 32 bits so that the mapping to IEEE 802 MAC addresses (which uses the low-order 32 bits of the IPv6 multicast address) produces unique MAC addresses. Group IDs of 32 bits or less guarantee unique MAC-layer multicast addresses.
section: 2.7.2
topics:
    - ip
    - v6ops
    - multicast
