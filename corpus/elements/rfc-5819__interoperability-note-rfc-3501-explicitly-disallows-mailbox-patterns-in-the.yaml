document: rfc-5819
kind: interoperability-note
summary: RFC 3501 explicitly disallows mailbox patterns in the STATUS command. Clients that do not advertise or recognize the LIST-STATUS capability must continue using the legacy LIST-then-STATUS-per-mailbox pattern; this extension is opt-in via capability advertisement.
section: "2"
topics:
    - email
