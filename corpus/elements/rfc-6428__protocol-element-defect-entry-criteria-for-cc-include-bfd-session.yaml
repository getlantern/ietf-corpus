document: rfc-6428
kind: protocol-element
summary: 'Defect entry criteria for CC include: BFD session timeout (loss of continuity) or receipt of LDI/Lock Report. Defect entry for CV mis-connectivity includes: unexpected encapsulation, unexpected globally unique Source MEP-ID, unexpected session discriminator in Your Discriminator field, discriminator present but with unexpected label, or incorrect BFD authentication.'
