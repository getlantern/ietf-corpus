document: rfc-9175
kind: normative-requirement
summary: For block-wise body integrity, the client MUST NOT recycle a request tag in a new operation unless the previous matchable operation has concluded, defined as all messages sent in the operation being invalid if replayed by the server.
section: 3.5.1
rfc2119_level: MUST NOT
topics:
    - security
