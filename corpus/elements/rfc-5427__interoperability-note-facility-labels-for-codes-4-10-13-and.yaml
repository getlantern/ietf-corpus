document: rfc-5427
kind: interoperability-note
summary: Facility labels for codes 4, 10, 13, and 14 and the label 'cron' are known to vary across different operating systems. To disambiguate codes 9 and 15, RFC 5427 assigns the label 'cron2' to facility code 15. OS syslog.conf mechanisms are not standardized and may use different label sets or mappings than the MIB.
section: "3"
topics:
