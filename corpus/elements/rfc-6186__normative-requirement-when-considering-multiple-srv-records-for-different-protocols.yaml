document: rfc-6186
kind: normative-requirement
summary: When considering multiple SRV records for different protocols at the same priority but with different weights, the client MUST first select the protocol it intends to use, then apply the weight selection algorithm from RFC 2782 to records for that protocol only.
section: "3.4"
rfc2119_level: MUST
topics:
    - email
    - dns
