document: rfc-9801
kind: protocol-element
summary: 'Two new SRv6 encapsulation behaviors are defined: H.Encaps.L1 encapsulates a frame from an IWF in an IPv6 packet with an SRH (next header set to 147), and H.Encaps.L1.Red is an optimization that excludes the first SID from the SRH, placing it only in the IPv6 Destination Address field.'
section: 5.1.1
topics:
    - ip
    - routing
