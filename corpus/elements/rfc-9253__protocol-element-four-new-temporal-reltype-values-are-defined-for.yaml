summary: 'Four new temporal RELTYPE values are defined for RELATED-TO: FINISHTOSTART, FINISHTOFINISH, STARTTOFINISH, and STARTTOSTART. These model project-management predecessor/successor relationships; the property appears in the predecessor entity and refers to the successor.'
