document: rfc-922
kind: design-rationale
summary: 'Broadcasts are described as an imperfect substitute for multicasting: datagrams are broadcast at the hardware layer, but filtering in receiving hosts produces the effect of multicast. The document explains this tradeoff explicitly to motivate why broadcast should not be used indiscriminately.'
