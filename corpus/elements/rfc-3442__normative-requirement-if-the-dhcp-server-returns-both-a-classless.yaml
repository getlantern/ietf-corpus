document: rfc-3442
kind: normative-requirement
summary: If the DHCP server returns both a Classless Static Routes option and a Router option, the DHCP client MUST ignore the Router option. Similarly, if the server returns both a Classless Static Routes option and a Static Routes option, the client MUST ignore the Static Routes option.
section: DHCP Client Behavior
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
