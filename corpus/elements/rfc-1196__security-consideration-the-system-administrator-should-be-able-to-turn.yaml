document: rfc-1196
kind: security-consideration
summary: The system administrator SHOULD be able to turn off RUIP acceptance of {C} (online user list) queries. If disabled, the RUIP MUST return a service refusal message such as 'Finger online user list denied'.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - security
