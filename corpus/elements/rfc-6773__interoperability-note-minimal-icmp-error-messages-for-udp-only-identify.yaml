document: rfc-6773
kind: interoperability-note
summary: Minimal ICMP error messages for UDP only identify UDP source and destination ports, not the encapsulated DCCP ports. A DCCP-UDP endpoint supporting multiple DCCP connections over the same UDP 4-tuple may be unable to associate an ICMP message with a unique DCCP-UDP connection.
section: "3.6"
topics:
    - udp
    - nat
