document: rfc-8623
kind: wire-format
summary: The S2LS Object format contains a 32-bit Flags field with bits 29-31 used as the O (Operational) 3-bit field representing the operational status of the group of destinations. Bits 0-28 are unassigned and must be set to 0 on transmission and ignored on receipt.
section: "7.2"
