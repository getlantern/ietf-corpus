document: rfc-9130
kind: protocol-element
summary: IP FRR support models LFA (RFC 5286) and remote LFA (RFC 7490) via a 'fast-reroute' container at both the global and interface levels. The global 'lfa' container is intentionally empty to permit augmentation; the 'fast-reroute' container may be augmented for MRTs (RFC 7812) and TI-LFA.
section: "2.8"
topics:
    - yang
    - routing
