document: rfc-3723
kind: normative-requirement
summary: Within IKE Phase 1, conformant IP block storage implementations MUST support ID_IPV4_ADDR, ID_IPV6_ADDR (if IPv6 is supported), and ID_FQDN Identity Payloads. The ID_KEY_ID Identity Payload MUST NOT be used. The ID port and protocol fields MUST be set to zero or UDP port 500.
section: 2.3.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
