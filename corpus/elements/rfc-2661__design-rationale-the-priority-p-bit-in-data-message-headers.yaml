document: rfc-2661
kind: design-rationale
summary: The Priority (P) bit in data message headers allows LCP echo requests and other keepalive traffic to receive preferential local queuing. Without it, temporary congestion could interfere with keepalive messages and cause unnecessary link loss.
section: "3.1"
