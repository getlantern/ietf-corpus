summary: 'GenericHybridParameters is a SEQUENCE containing two fields: ''kem'' (KeyEncapsulationMechanism, identifying the RSA-KEM mechanism via id-kem-rsa) and ''dem'' (DataEncapsulationMechanism, identifying the symmetric key-wrapping scheme). This structure appears in AlgorithmIdentifier parameters for id-rsa-kem.'
