document: rfc-2942
kind: interoperability-note
summary: A user may log in as a different user than the Kerberos principal by sending 'IAC SB AUTHENTICATION NAME <username> IAC SE' before the AUTH command. The server authenticates the Kerberos identity but uses the NAME to determine account access if permitted.
section: "4"
topics:
