document: rfc-2257
kind: wire-format
summary: A VarBind encodes a variable binding as a 2-byte v.type field, a reserved 2-byte field, a v.name Object Identifier, and v.data. Integer, Counter32, Gauge32, and TimeTicks are 4 bytes; Counter64 is 8 bytes; Null, noSuchObject, noSuchInstance, and endOfMibView carry no value data.
