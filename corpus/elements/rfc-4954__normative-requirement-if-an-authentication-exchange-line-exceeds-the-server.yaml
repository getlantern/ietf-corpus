document: rfc-4954
kind: normative-requirement
summary: If an authentication exchange line exceeds the server's buffer, the server MUST fail the AUTH command with a 500 reply (enhanced status code 5.5.6). Clients and servers MUST be able to handle the maximum encoded size of challenges and responses generated by their supported mechanisms; 12288 octets is noted as sufficient at time of writing.
section: "4"
rfc2119_level: MUST
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
