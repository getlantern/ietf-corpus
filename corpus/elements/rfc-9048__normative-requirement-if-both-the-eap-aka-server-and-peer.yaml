document: rfc-9048
kind: normative-requirement
summary: If both the EAP-AKA server and peer would have been able to use EAP-AKA' (as indicated by AT_BIDDING with D=1 on both sides), the peer SHOULD abort the EAP-AKA authentication, as a bidding down attack may have occurred.
section: "4"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
