document: rfc-5648
kind: normative-requirement
summary: When a node receives packets with a Home Address destination option from a mobile node, it MUST verify that the source care-of address matches one of the care-of addresses in the binding cache entry. If no match is found, the packets MUST be discarded and a Binding Error message MUST be sent.
section: "6.5"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
