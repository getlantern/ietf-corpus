document: rfc-8056
kind: design-rationale
summary: The existing RDAP 'prohibited' statuses ('renew prohibited', 'update prohibited', 'transfer prohibited', 'delete prohibited') do not directly map to EPP prohibited statuses because EPP distinguishes whether an action is prohibited due to server policy versus a client request. This distinction must be preserved in RDAP, necessitating new status values.
section: "2"
topics:
