document: rfc-6679
kind: interoperability-note
summary: An ECN-unaware legacy RTP translator is expected to ignore ECN bits on received packets and set ECN bits to not-ECT on sending, causing ECN negotiation to fail on any path containing such a translator. New translators that do not support ECN should behave similarly.
section: "3.2"
topics:
    - rtp
    - ecn
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
