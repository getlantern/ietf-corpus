document: rfc-3779
kind: normative-requirement
summary: A range of addresses that can be encoded as a prefix MUST be encoded using an IPAddress BIT STRING element; a range that cannot be encoded as a prefix MUST be encoded using an IPAddressRange SEQUENCE of two BIT STRINGs.
