document: rfc-8526
kind: interoperability-note
summary: The 'config' element in <edit-data>'s edit-content choice uses 'anydata' (YANG 1.1, RFC 7950), whereas <edit-config>'s corresponding element used 'anyxml'. Implementations must account for this difference.
section: 3.1.2
topics:
