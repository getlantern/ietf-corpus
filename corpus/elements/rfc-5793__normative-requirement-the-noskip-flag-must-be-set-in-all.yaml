document: rfc-5793
kind: normative-requirement
summary: The NOSKIP flag MUST be set in all PB-PA messages. Any receiver of a PB-PA message with NOSKIP not set MUST ignore the message and respond with a fatal Invalid Parameter error. All Posture Broker Client and Server implementations MUST support this message type.
section: "4.5"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
