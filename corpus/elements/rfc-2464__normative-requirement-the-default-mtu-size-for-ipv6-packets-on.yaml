document: rfc-2464
kind: normative-requirement
summary: The default MTU size for IPv6 packets on an Ethernet is 1500 octets. An MTU option in a Router Advertisement specifying an MTU larger than 1500 (or larger than a manually configured value) may be logged but must otherwise be ignored.
section: "2"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
