document: rfc-2156
kind: wire-format
summary: 'T.61String characters outside the PrintableString repertoire are represented in ASCII using curly-brace quoting: each octet is encoded as 3 decimal digits inside ''{}'' (e.g., Yen character hex A5 as ''{165}''). The default G1 page is ISO Latin 1; escape sequences may change the page setting within a pair of curly brackets, reverting after the closing ''}''.'
