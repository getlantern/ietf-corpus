document: rfc-9733
kind: protocol-element
summary: BRSKI-AE supports a Local Registration Authority (LRA) co-located with the registrar that delegates part of its enrollment authority to a backend RA. The registrar optionally checks certification requests and forwards them to the backend RA, which performs final validation and authorization, relaying responses back on the same channel.
section: "4.1"
topics:
    - pkix
    - security
