document: rfc-9084
kind: normative-requirement
summary: For intra-area prefix advertisements, the Prefix Source OSPF Router-ID Sub-TLV MUST be considered invalid and ignored if the OSPF Router ID field does not match the Advertising Router field in the containing LSA.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
