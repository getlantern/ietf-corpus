document: rfc-5651
kind: normative-requirement
summary: A receiver that is concurrently joined to multiple LCT sessions MUST perform congestion control on each session individually. The receiver MAY optimize packet flow performance across sessions as long as it adheres to each session's congestion control rules.
section: "6.2"
rfc2119_level: MUST
topics:
    - congestion
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
