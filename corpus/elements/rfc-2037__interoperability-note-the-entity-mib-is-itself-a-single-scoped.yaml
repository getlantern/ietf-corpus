document: rfc-2037
kind: interoperability-note
summary: The Entity MIB is itself a single-scoped MIB. The entLogicalTAddress and entLogicalTDomain objects support a historical multiplexing mechanism and are not intended to identify other SNMP agents; an agent's entLogicalTable is not required to contain information about logical entities managed primarily by other agents.
section: "3.8"
topics:
    - snmp
