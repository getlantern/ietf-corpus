document: rfc-5416
kind: normative-requirement
summary: IEEE 802.11 MAC management frames SHOULD use 802.1p precedence value 7, except Probe Requests which SHOULD use value 4. For DSCP, MAC management frames SHOULD use the CS6 per-hop behavior; Probe Requests should use the Low Drop Assured Forwarding per-hop behavior.
section: 2.6.2
rfc2119_level: SHOULD
topics:
    - qos
