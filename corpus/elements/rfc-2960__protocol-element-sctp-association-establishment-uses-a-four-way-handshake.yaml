document: rfc-2960
kind: protocol-element
summary: 'SCTP association establishment uses a four-way handshake: initiator sends INIT, responder replies with INIT ACK containing a State Cookie, initiator echoes the cookie in COOKIE ECHO, and responder confirms with COOKIE ACK. The last two legs may carry user data for fast setup.'
