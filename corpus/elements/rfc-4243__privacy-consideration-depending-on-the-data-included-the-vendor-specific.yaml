document: rfc-4243
kind: privacy-consideration
summary: Depending on the data included, the Vendor-Specific suboption may convey information identifying a specific host or user on the network. If DHCP messages travel outside the service provider's own network or suboption values become visible to other users, this may raise privacy concerns for the access or service provider.
section: "6"
topics:
    - privacy
extracted_by: claude-sonnet-4-6
