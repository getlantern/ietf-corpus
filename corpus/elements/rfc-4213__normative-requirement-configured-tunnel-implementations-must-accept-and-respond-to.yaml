document: rfc-4213
kind: normative-requirement
summary: Configured tunnel implementations MUST accept and respond to NUD probe packets. Neighbor Discovery packets on tunnel links SHOULD NOT include Source or Target Link Layer Address options; receivers MUST silently ignore such options if present, consistent with point-to-point link behavior.
section: "3.8"
rfc2119_level: MUST
topics:
