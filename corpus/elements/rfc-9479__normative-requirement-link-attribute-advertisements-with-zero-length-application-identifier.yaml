document: rfc-9479
kind: normative-requirement
summary: Link attribute advertisements with zero-length Application Identifier Bit Masks MUST be used by applications when no advertisement with a non-zero-length bit mask and a matching application bit exists for a given link. Otherwise, such advertisements MUST NOT be used.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
