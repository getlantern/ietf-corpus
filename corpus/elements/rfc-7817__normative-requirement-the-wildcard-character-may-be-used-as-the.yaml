document: rfc-7817
kind: normative-requirement
summary: The '*' wildcard character MAY be used as the left-most name component of a DNS-ID or CN-ID in the certificate, but MUST NOT be used as a fragment of the left-most name component (e.g., '*oo.example.com' or 'foo*.example.com' are prohibited).
section: "3"
rfc2119_level: MAY
topics:
    - tls
    - email
    - pkix
