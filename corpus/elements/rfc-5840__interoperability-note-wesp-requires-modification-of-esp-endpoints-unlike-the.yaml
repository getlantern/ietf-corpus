document: rfc-5840
kind: interoperability-note
summary: WESP requires modification of ESP endpoints, unlike the heuristics approach which inspects unchanged ESP traffic. Both approaches are expected to coexist for years; intermediate nodes SHOULD support both during transition, as heuristics are needed for endpoints not yet upgraded to WESP.
section: "1.2"
topics:
    - ipsec
