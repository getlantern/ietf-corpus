document: rfc-8485
kind: protocol-element
summary: Identity Proofing (P) captures how strongly identity attributes were verified. The 'P' demarcator is used with digits (e.g., P0–P3) reflecting ordered strength of proofing. Only a single value is recommended per transaction. Higher values are largely subsumptive of lower values in the default framework.
section: "2.1"
topics:
    - oauth
    - security
