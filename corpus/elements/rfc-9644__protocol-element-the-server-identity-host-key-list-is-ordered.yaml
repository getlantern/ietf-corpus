document: rfc-9644
kind: protocol-element
summary: The 'server-identity/host-key' list is ordered-by user and requires min-elements 1; each entry presents either a public-key (inline or keystore asymmetric key) or a certificate (X.509v3, feature-gated). The server uses this ordered list to construct its SSH_MSG_KEXINIT algorithm list per RFC 4253 Section 7.1.
section: "4.3"
