document: rfc-1869
kind: normative-requirement
summary: A client SMTP must not cache any information returned if the EHLO command succeeds; it must issue EHLO at the start of each SMTP session if information about extended facilities is needed.
section: "4.2"
rfc2119_level: MUST NOT
