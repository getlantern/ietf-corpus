document: rfc-8551
kind: normative-requirement
summary: Receiving agents MUST support RSA/RSASSA-PSS verification for key sizes 2048–4096 bits; keys <= 2047 bits SHOULD NOT be accepted. For decryption, RSA key sizes 2048–4096 MUST be supported; keys <= 2047 bits MAY be decrypted for historic mail.
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
