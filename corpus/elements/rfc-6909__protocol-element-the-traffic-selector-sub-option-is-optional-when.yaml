document: rfc-6909
kind: protocol-element
summary: The Traffic Selector sub-option is optional when the IPv4 Traffic Offload Selector option is carried in a Proxy Binding Update, but is mandatory when carried in a Proxy Binding Acknowledgement. Its format is defined in RFC 6089 Section 4.2.1.4.
