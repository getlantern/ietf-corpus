document: rfc-9740
kind: protocol-element
summary: ipv6ExtensionHeaderTypeCountList (IE 516, type subTemplateList) records the ordered sequence and consecutive occurrence count of extension header types in a Flow, using a subTemplateList of ipv6ExtensionHeaderType and ipv6ExtensionHeaderCount IEs. It preserves extension header ordering, unlike the bitfield IEs.
section: "3.4"
topics:
