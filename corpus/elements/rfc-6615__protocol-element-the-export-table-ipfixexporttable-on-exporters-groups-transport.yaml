document: rfc-6615
kind: protocol-element
summary: 'The Export Table (ipfixExportTable) on Exporters groups Transport Sessions by ipfixExportIndex to support failover, load-balancing, or parallel export. Each member is assigned a type: primary(1), secondary(2), parallel(3), or loadBalancing(4), governing how flows are distributed across sessions.'
