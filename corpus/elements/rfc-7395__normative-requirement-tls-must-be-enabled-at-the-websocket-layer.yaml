document: rfc-7395
kind: normative-requirement
summary: TLS MUST be enabled at the WebSocket layer using secure WebSocket connections via the 'wss' URI scheme; it cannot be used at the XMPP subprotocol layer. A server MUST NOT advertise TLS as a stream feature, and a client MUST ignore any advertised TLS stream feature.
section: "3.9"
rfc2119_level: MUST
topics:
    - tls
    - websocket
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
