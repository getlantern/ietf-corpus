document: rfc-2510
kind: design-rationale
summary: When a RA forwards an end entity's protected PKI message to a CA, the RA MAY nest the entire end-entity PKIMessage inside a new PKIMessage (NestedMessageContent ::= PKIMessage) and apply its own protection. This preserves the original message integrity while adding the RA's authentication layer.
section: 3.1.3
topics:
    - pkix
    - security
