document: rfc-3815
kind: normative-requirement
summary: The MPLS-LDP-STD-MIB Module MUST be implemented and at least one of the Layer 2 MIB Modules MUST be implemented on an LSR or LER. Ethernet requires MPLS-LDP-GENERIC-STD-MIB; ATM requires MPLS-LDP-ATM-STD-MIB; Frame Relay requires MPLS-LDP-FRAME-RELAY-STD-MIB; all three media require all four modules.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - snmp
