document: rfc-7361
kind: normative-requirement
summary: If the optimized MAC flush procedure is used in a Backbone VPLS or regular VPLS/H-VPLS context, the C-bit MUST be ZERO (C=0). If used in an I-component context, the C-bit MUST be set (C=1).
section: 5.1.2
rfc2119_level: MUST
topics:
