document: rfc-2298
kind: design-rationale
summary: The restriction against auto-sending MDNs when Disposition-Notification-To differs from Return-Path, or when multiple addresses are specified, is explicitly to reduce the possibility of mail loops and the use of MDNs for mail bombing attacks.
section: "2.1"
topics:
