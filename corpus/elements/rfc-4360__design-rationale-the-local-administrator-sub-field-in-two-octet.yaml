document: rfc-4360
kind: design-rationale
summary: 'The Local Administrator sub-field in Two-Octet AS Specific and IPv4 Address Specific communities is intentionally free-form: the organization identified by the Global Administrator field can encode any information, with semantics defined per sub-type. This delegation model avoids centralized coordination for local numbering spaces.'
