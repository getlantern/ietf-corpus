document: rfc-5491
kind: normative-requirement
summary: Where a PIDF document contains more than one <geopriv> element, priority of interpretation is given to the first <device> element containing a location; if absent, the first <tuple>; locations in <person> elements SHOULD only be used as a last resort.
section: "3"
rfc2119_level: SHOULD
topics:
    - privacy
