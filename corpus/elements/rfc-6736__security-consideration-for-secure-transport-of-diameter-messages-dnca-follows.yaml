document: rfc-6736
kind: security-consideration
summary: For secure transport of Diameter messages, DNCA follows the recommendations of RFC 6733, requiring TLS or IPsec to protect Diameter messages in transit. Unauthorized control of NAT bindings could allow traffic redirection, session hijacking, or service disruption for endpoints sharing public addresses.
section: "5.1"
topics:
    - security
    - nat
    - diameter
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
