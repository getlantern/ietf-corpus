document: rfc-6680
kind: protocol-element
summary: Attribute names are represented as OCTET STRING values. If an attribute name contains a space (ASCII 0x20), the first space separates the primary (most significant) component ('prefix') from the remainder. If the primary component contains ':' (ASCII 0x3a), it is treated as a URI; otherwise, the attribute is a local attribute.
section: "6"
topics:
