document: rfc-3479
kind: normative-requirement
summary: An upstream LDP peer MUST preserve state for a Sequence Numbered FT Label even after releasing bandwidth resources, and MUST release state only upon receiving an ACK to its Label Release or Label Abort, or upon sending a Label Release in response to a Label Withdraw from the downstream peer.
section: "5.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
