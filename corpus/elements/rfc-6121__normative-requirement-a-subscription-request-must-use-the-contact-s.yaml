document: rfc-6121
kind: normative-requirement
summary: A subscription request MUST use the contact's bare JID <contact@domainpart> as the 'to' attribute, not a full JID, so the user receives presence from all of the contact's resources rather than a single one.
section: 3.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
