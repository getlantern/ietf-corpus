document: rfc-6585
kind: security-consideration
summary: 'A 511 response will not come from the origin server, presenting security issues: an attacking intermediary may insert cookies into the original domain''s namespace or observe cookies and HTTP authentication credentials sent by the user agent. These risks also apply to captive portals not using 511.'
section: "7.4"
