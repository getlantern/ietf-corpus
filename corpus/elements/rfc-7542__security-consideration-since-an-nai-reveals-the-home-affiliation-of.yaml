document: rfc-7542
kind: security-consideration
summary: Since an NAI reveals the home affiliation of a user, it may assist an attacker in probing the username space. Protocols that transmit the NAI in clear text (such as RADIUS) should use confidentiality services such as RADIUS over IPsec or Diameter over TLS to prevent username snooping.
section: "4"
topics:
    - security
    - radius
    - diameter
    - privacy
