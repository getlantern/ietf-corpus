document: rfc-1088
kind: interoperability-note
summary: Due to the 512-byte NetBIOS datagram MTU, any host anywhere on the internet communicating with a host on a NetBIOS network may be required to accept and reassemble fragmented IP datagrams.
section: Maximum Transmission Unit
