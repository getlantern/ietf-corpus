summary: 'PPP encapsulation consists of three fields transmitted left to right: Protocol (8 or 16 bits), Information (variable, up to MRU), and Padding (optional). The Protocol field identifies the encapsulated datagram; default MRU for Information plus Padding is 1500 octets.'
