document: rfc-5923
kind: normative-requirement
summary: If a client places an "alias" parameter in the topmost Via header of a request, it MUST accept requests over that connection — in addition to its default listening port — from its downstream peer, and SHOULD keep the connection open for as long as operating-system resources allow.
section: "8.1"
rfc2119_level: MUST
topics:
    - sip
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
