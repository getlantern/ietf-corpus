document: rfc-6275
kind: protocol-element
summary: Binding Update (MH Type 5) notifies a correspondent node or home agent of a mobile node's current care-of address. When sent to the home agent it is marked as a home registration. The message includes a sequence number, lifetime, flags (H=home registration, A=acknowledgement requested, L=link-local address compat, K=key management), and optional mobility options.
section: 6.1.7
topics:
    - ip
