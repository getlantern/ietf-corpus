document: rfc-8615
kind: registry
summary: The 'Uniform Resource Identifier (URI) Schemes' registry gains a new 'Well-Known URI Support' field (default value '-'). Initial non-default values include coap, coap+tcp, coap+ws, coaps, coaps+tcp, coaps+ws (RFC 7252/8323), http/https (RFC 8615), ws/wss (RFC 8307).
