summary: docsDevFilterIpTable (deprecated in favor of DiffServ MIB) is a classifier table where each row matches IP packets by source/destination address+mask, upper-layer protocol, port ranges, and ToS. Matched packets may be dropped, accepted, or subjected to a policy via docsDevFilterPolicyTable indirection.
