document: rfc-8614
kind: normative-requirement
summary: In multihoming scenarios, the S-bit evaluation SHOULD be independent per PW, following the same rules as Section 3.2; an S-bit mismatch prevents PW establishment for that specific PW, potentially leaving a multihomed site effectively single-homed.
section: "6.2"
rfc2119_level: SHOULD
