document: rfc-9895
kind: design-rationale
summary: This extension builds on RFC 9892 (Traffic Classification Data Item) and RFC 9893 (Credit-Based Flow Control Messages and Data Items) rather than defining its own independent mechanism, enabling a layered approach where IEEE 802.1Q awareness is an additive capability. The companion Diffserv-based approach is in RFC 9894.
section: "1"
