document: rfc-4005
kind: security-consideration
summary: Authorization-only requests (Auth-Request-Type set to authorization-only) introduce a significant security vulnerability because service cannot be started based solely on such a response without an access decision; implementers must be aware that no equivalent protection exists in RADIUS.
section: "2"
topics:
