document: rfc-5793
kind: protocol-element
summary: 'PB-TNC defines eight IETF Standard Message Types (Vendor ID 0): PB-Experimental (0, testing only), PB-PA (1, carries a PA message), PB-Assessment-Result (2), PB-Access-Recommendation (3), PB-Remediation-Parameters (4), PB-Error (5), PB-Language-Preference (6), and PB-Reason-String (7). Vendor-specific types use non-zero SMI PEN Vendor IDs.'
section: "4.3"
