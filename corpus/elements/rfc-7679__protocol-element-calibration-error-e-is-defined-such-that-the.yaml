document: rfc-7679
kind: protocol-element
summary: Calibration error 'e' is defined such that the reported value is within (true value - e) to (true value + e) at least 95% of the time; the total calibration error includes clock-related uncertainty plus the largest absolute deviation at the 2.5th or 97.5th percentile of host error measurements.
section: 3.7.3
topics:
