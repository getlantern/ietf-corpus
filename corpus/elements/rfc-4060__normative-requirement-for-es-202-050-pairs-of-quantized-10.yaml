document: rfc-4060
kind: normative-requirement
summary: For ES 202 050, pairs of quantized 10 ms mel-cepstral frames MUST be grouped together and protected with a 4-bit CRC forming a 92-bit FP, then padded with 4 zeros to the MSB 4 bits of the last octet to achieve octet alignment.
section: 3.2.1.1
rfc2119_level: MUST
