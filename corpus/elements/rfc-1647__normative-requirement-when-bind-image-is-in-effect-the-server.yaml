document: rfc-1647
kind: normative-requirement
summary: When BIND-IMAGE is in effect, the server MUST send a BIND-IMAGE data message to the client once the SNA Bind RU and Start Data Traffic RU have been responded to positively. The data portion MUST contain the bind image exactly as received. An UNBIND message must be sent when the SNA session terminates.
section: "10.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
