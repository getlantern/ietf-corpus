document: rfc-3621
kind: security-consideration
summary: Setting pethMainPseUsageThreshold or pethNotificationControlEnable to incorrect values can produce an excessive number of SNMP traps sent to management stations. Even readable objects such as pethPsePortPowerPriority and pethPsePortPowerClassifications may be sensitive and should have controlled GET and NOTIFY access, with values optionally encrypted.
section: "9"
topics:
    - security
    - snmp
