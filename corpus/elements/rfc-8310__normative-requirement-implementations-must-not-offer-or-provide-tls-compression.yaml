document: rfc-8310
kind: normative-requirement
summary: Implementations MUST NOT offer or provide TLS compression, since compression can leak significant amounts of information (in the style of CRIME attacks) to a network observer capable of forcing the user to perform an arbitrary DNS lookup.
section: "9"
rfc2119_level: MUST NOT
topics:
    - dns
    - tls
    - security
