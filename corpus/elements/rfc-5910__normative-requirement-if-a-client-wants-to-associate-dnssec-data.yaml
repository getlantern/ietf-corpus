document: rfc-5910
kind: normative-requirement
summary: If a client wants to associate DNSSEC data with a domain on <create>, the command MUST contain an <extension> element and that element MUST contain a child <secDNS:create> element identifying the extension namespace.
section: 5.2.1
rfc2119_level: MUST
topics:
    - dns
    - security
