document: rfc-6276
kind: protocol-element
summary: When sending a Relay-forward message, the relay agent sets msg-type to RELAY-FORW, hop-count to 1, link-address to the home address of the mobile router, peer-address to the home address of the mobile router, and options MUST include a Relay Message option.
