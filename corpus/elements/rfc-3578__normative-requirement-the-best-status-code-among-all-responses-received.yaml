document: rfc-3578
kind: normative-requirement
summary: The best status code among all responses received for all INVITEs generated during overlap signalling is used to compute the cause value of the REL sent to ISUP, computed in the same manner as a forking proxy selects its best response; this is not necessarily the response to the INVITE with the most digits.
section: "3.2"
rfc2119_level: MUST
topics:
    - sip
    - voip
    - realtime
