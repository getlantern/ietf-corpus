document: rfc-8768
kind: protocol-element
summary: When a loop is detected and a 5.08 error is generated, the detecting proxy includes an identifier (e.g., proxy name, alias, or IP address) in the diagnostic payload. Each intermediate proxy relaying the error prepends its own identifier separated by a space.
