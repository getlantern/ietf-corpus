document: rfc-3015
kind: protocol-element
summary: The LocalControl Descriptor contains the Mode property (send-only, receive-only, send/receive, inactive, loop-back — relative to the exterior of the Context) and the boolean ReserveValue and ReserveGroup properties governing how the MG reserves resources for over-specified media alternatives. Signals and Events are unaffected by mode.
