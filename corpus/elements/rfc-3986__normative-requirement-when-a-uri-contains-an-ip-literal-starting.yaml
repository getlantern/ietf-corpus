document: rfc-3986
kind: normative-requirement
summary: When a URI contains an IP-literal starting with "v" (an IPvFuture version flag) that an application does not recognize, the application should return an error for "address mechanism not supported" rather than attempting to dereference it.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
