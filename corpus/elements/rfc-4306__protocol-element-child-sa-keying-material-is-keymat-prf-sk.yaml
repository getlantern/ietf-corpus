document: rfc-4306
kind: protocol-element
summary: 'CHILD_SA keying material is KEYMAT = prf+(SK_d, Ni | Nr), or KEYMAT = prf+(SK_d, g^ir(new) | Ni | Nr) when the CREATE_CHILD_SA exchange includes a DH payload. Keys are assigned in order: initiator-to-responder encryption key, integrity key, then responder-to-initiator encryption key, integrity key.'
section: "2.17"
topics:
