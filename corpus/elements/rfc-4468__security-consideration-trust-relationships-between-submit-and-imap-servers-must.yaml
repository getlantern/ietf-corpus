document: rfc-4468
kind: security-consideration
summary: Trust relationships between submit and IMAP servers must not use super-user proxy credentials, as a compromised submit server should not automatically compromise all IMAP accounts. URLAUTH-based access or a trusted third-party credential model (e.g., Kerberos 5) is preferred.
section: "8"
topics:
