document: rfc-5095
kind: design-rationale
summary: Blocking all Routing Headers in firewalls (rather than only Type 0) is explicitly discouraged because even a small percentage of firewalls doing so would make it impossible in practice to extend IPv6 Routing Headers, and would render Mobile IPv6 (which uses Type 2 Routing Header) undeployable.
section: "4.2"
topics:
    - ip
    - security
    - v6ops
    - mobility
