document: rfc-4643
kind: normative-requirement
summary: A server MUST implement at least one of AUTHINFO USER or AUTHINFO SASL commands in order to advertise the AUTHINFO capability label. The AUTHINFO capability MUST NOT be advertised after successful authentication.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
