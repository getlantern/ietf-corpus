document: rfc-1158
kind: protocol-element
summary: ipNetToMediaTable replaces the deprecated atTable for IP, providing IpAddress-to-physical-address mapping per interface. Each ipNetToMediaEntry contains ipNetToMediaIfIndex, ipNetToMediaPhysAddress (OCTET STRING), ipNetToMediaNetAddress (IpAddress), and ipNetToMediaType (other/invalid/dynamic/static).
