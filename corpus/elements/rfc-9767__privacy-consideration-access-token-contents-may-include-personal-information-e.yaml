document: rfc-9767
kind: privacy-consideration
summary: Access token contents may include personal information (e.g., medical record numbers) that gets exposed to every RS that validates the token, even RSs with no need for that data. Mitigations include per-RS token sections in structured formats or limited introspection responses scoped to each RS.
section: "7.1"
topics:
    - privacy
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
