document: rfc-9803
kind: protocol-element
summary: The <ttl:create> element is used in EPP <create> commands and MUST contain one or more <ttl:ttl> records. The <ttl:update> element is used in EPP <update> commands and MUST contain one or more <ttl:ttl> records. Both are placed in the <extension> element of the command.
section: "2.2"
topics:
