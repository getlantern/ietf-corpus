document: rfc-2428
kind: registry
summary: The <net-prt> field in EPRT/EPSV uses IANA address family numbers from the Assigned Numbers RFC (RFC 1700). This document registers usage of AF number 1 (IPv4) and AF number 2 (IPv6) for FTP extended commands.
