document: rfc-5384
kind: normative-requirement
summary: When conflicting attributes of the same type are received from different downstream routers, the attribute from the PIM adjacency with the numerically smallest IP address is used. For IPv6, the link-local address is used; when two neighbors share the same IP address, the interface index MUST be used as a tie breaker.
section: 3.3.3
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
