document: rfc-2745
kind: design-rationale
summary: Diagnostic messages are explicitly designed to produce no side-effects and not change any RSVP state at nodes or hosts. This makes them safer than SNMP for state inspection, and distinguishes them from error messages which convey only failure-point information.
section: "1"
