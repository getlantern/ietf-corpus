document: rfc-7542
kind: interoperability-note
summary: The AAA system may also convert realms to Punycode and perform all realm comparisons on the resulting Punycode strings as an alternative normalization strategy. Where the utf8-realm is entirely ASCII, case-insensitive matching MAY be continued as it has been shown to work in practice.
