document: rfc-7022
kind: protocol-element
summary: RTCP CNAMEs may be either persistent (long-term or short-term, used across sessions) or per-session (a new CNAME is generated for each RTP session). Per-session CNAMEs provide a limited form of privacy by preventing session correlation, but longer-term persistent CNAMEs facilitate third-party monitoring and network management.
section: "4.1"
topics:
    - rtp
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
