document: rfc-8981
kind: design-rationale
summary: REGEN_ADVANCE is expressed as a function of DAD parameters rather than a fixed constant to ensure a new preferred address is always available before the current one is deprecated, even in the worst case of TEMP_IDGEN_RETRIES consecutive DAD failures.
section: "3.8"
