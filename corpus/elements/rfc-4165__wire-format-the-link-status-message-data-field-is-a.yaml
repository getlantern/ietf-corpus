document: rfc-4165
kind: wire-format
summary: 'The Link Status message data field is a single 32-bit State field with nine valid values: Alignment (1), Proving Normal (2), Proving Emergency (3), Ready (4), Processor Outage (5), Processor Recovered (6), Busy (7), Busy Ended (8), and Out of Service (9). The Proving variant optionally carries a variable-length filler field.'
section: 2.3.2
