summary: The X.509 MUD URL extension (id-pe-mud-url, OID id-pe 25) is a non-critical certificate extension containing an IA5String MUD URL; a companion id-pe-mudsigner extension (id-pe 30) carries the subject Name of the MUD file signing certificate, enabling binding of the file to a specific signer.
