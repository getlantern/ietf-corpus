document: rfc-8214
kind: state-machine
summary: In All-Active multihoming, all active PEs set P=1 and the B Flag SHOULD NOT be set. A remote PE performs per-flow load-balancing across all PEs advertising P=1 for the same Ethernet Tag and ESI. If multiple PEs advertise P=1 in transient scenarios, the last advertising PE is selected as primary.
section: "3.1"
topics:
    - routing
    - mpls
    - bgp
