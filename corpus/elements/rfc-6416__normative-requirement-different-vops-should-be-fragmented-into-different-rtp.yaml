document: rfc-6416
kind: normative-requirement
summary: Different VOPs SHOULD be fragmented into different RTP packets so that each RTP timestamp uniquely indicates the VOP time framing. An exception allows multiple consecutive small VOPs in one RTP packet.
section: "5.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
