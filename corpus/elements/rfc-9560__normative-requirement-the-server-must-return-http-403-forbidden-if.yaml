document: rfc-9560
kind: normative-requirement
summary: The server MUST return HTTP 403 (Forbidden) if the requested 'farv1_qp' purpose is not in the end user's allowed purposes. The server MUST return HTTP 403 if it is unable to perform the action requested by 'farv1_dnt'. Unrecognized query parameters MUST be ignored.
section: 4.2.1
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
