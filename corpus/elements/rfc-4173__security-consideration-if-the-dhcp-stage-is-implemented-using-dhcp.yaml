document: rfc-4173
kind: security-consideration
summary: If the DHCP stage is implemented using DHCP, the iSCSI boot client SHOULD implement DHCP authentication (RFC 3118 for IPv4, RFC 3315 for IPv6), and an administration interface SHOULD be provided for configuring DHCP authentication credentials.
section: "8"
rfc2119_level: SHOULD
topics:
