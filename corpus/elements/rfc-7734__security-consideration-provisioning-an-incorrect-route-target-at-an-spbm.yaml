document: rfc-7734
kind: security-consideration
summary: Provisioning an incorrect route target at an SPBM-PE, or associating the RT with the wrong interface, can cause incorrect cross-connection of SPBM domains via EVPN, resulting in black-holing or incorrect delivery of data with associated privacy implications. Consistency-checking RT provisioning during service additions and changes is recommended.
section: "6"
topics:
    - security
    - privacy
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
