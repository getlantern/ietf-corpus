summary: 'For OSPFv2, applicable sub-TLVs that MAY appear within the L2 Bundle Member Attributes sub-TLV include: Adj-SID (2), LAN Adj-SID/Label (3), Application-Specific Link Attributes (10), Shared Risk Link Group (11), Unidirectional Link Delay (12), Min/Max Unidirectional Link Delay (13), Unidirectional Delay Variation (14), Unidirectional Link Loss (15), Residual/Available/Utilized Bandwidth (16-18), Administrative Group (19), Extended Administrative Group (20), TE Metric (22), and Maximum Link Bandwidth (23).'
