document: rfc-4917
kind: normative-requirement
summary: If the Home Agent receives the message from an external source (e.g., a RADIUS server) in an encoding other than UTF-8, the Home Agent MUST convert it to UTF-8 encoded ISO-10646 characters before including it in the extension.
section: "4"
rfc2119_level: MUST
topics:
    - mobility
