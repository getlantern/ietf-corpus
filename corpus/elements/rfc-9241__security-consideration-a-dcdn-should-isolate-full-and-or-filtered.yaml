document: rfc-9241
kind: security-consideration
summary: A dCDN SHOULD isolate full and/or filtered CDNI Advertisement resources for different uCDNs to prevent information leakage across uCDN agreements; URIs may be generated by hashing company IDs and agreement terms. A dCDN SHOULD avoid exposing all resources in a single IRD.
section: "8"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
