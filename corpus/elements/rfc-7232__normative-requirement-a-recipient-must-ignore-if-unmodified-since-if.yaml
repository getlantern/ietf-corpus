document: rfc-7232
kind: normative-requirement
summary: A recipient MUST ignore If-Unmodified-Since if the request contains an If-Match header field, as If-Match is considered a more accurate replacement. A recipient MUST also ignore If-Unmodified-Since if the received field-value is not a valid HTTP-date.
section: "3.4"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
