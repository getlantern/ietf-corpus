document: rfc-9642
kind: design-rationale
summary: Built-in keys (e.g., manufacturer-installed IDevID keys) are represented as 'hidden' keys in the YANG model and are expected to appear in the <operational> datastore with 'or:origin' set to 'or:system', reflecting that they are provided by the server rather than configured by an operator.
section: "3"
topics:
