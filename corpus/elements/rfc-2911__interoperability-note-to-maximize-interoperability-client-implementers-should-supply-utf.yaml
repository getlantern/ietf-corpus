document: rfc-2911
kind: interoperability-note
summary: To maximize interoperability, client implementers SHOULD supply 'utf-8' in 'attributes-charset' even when the client only uses a simpler charset such as US-ASCII, since IPP objects are only required to support utf-8. The client must then filter or convert characters it cannot present from the response.
section: 3.1.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
