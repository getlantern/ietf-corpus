document: rfc-4866
kind: normative-requirement
summary: When the mobile node returns to its home link and wishes to deregister, it MUST initiate the home deregistration first and MUST wait for a successful Binding Acknowledgment before initiating correspondent deregistration. This prevents the home agent from proxying the mobile node's address during Duplicate Address Detection.
section: "4.1"
rfc2119_level: MUST
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
