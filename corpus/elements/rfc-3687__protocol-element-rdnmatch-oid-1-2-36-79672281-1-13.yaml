document: rfc-3687
kind: protocol-element
summary: rdnMatch (OID 1.2.36.79672281.1.13.3) is a new matching rule that evaluates to TRUE if a component value and assertion value are the same RelativeDistinguishedName, using the same comparison method as distinguishedNameMatch. Its assertion syntax is the RDN syntax (OID 1.2.36.79672281.1.5.0).
section: 3.2.2.1
