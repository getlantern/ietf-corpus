document: rfc-7450
kind: security-consideration
summary: The MAC-based source authentication mechanism defends against resource exhaustion via source-address spoofing. Spoofed Request messages are stateless and create no relay state; spoofed Membership Update messages will fail MAC verification and be rejected, preventing the allocation of forwarding state.
section: 4.2.1.2
topics:
    - security
    - multicast
