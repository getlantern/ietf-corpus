document: rfc-3211
kind: normative-requirement
summary: Implementations SHOULD NOT include keystream generator (KSG) ciphers such as RC4, or a block cipher in OFB mode, as KEK encryption algorithms. Block ciphers in ECB mode SHOULD NOT be included.
section: "2.2"
rfc2119_level: SHOULD NOT
topics:
