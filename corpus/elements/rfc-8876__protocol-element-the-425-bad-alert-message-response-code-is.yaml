document: rfc-8876
kind: protocol-element
summary: The 425 (Bad Alert Message) response code is a new SIP error indicating the request was malformed to the degree that no reasonable emergency response can be determined. It may be sent by a UAS or a SIP intermediary that detects a malformed alert.
section: "5.1"
topics:
