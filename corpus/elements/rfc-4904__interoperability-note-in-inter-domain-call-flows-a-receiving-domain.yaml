document: rfc-4904
kind: interoperability-note
summary: In inter-domain call flows, a receiving domain that is not authoritative for the 'trunk-context' value does not interpret the trunk group parameters; it simply passes the Contact header (including trunk group parameters) as-is for use as the R-URI in subsequent requests back toward the originating domain.
section: "7.3"
topics:
    - sip
    - voip
