document: rfc-3591
kind: protocol-element
summary: Tandem Connection Monitoring (ODUkT) supports up to six nested TCM levels per ODUk termination. Each TCM field contains TTI, BIP8, BDI, BEI, and STAT subfields. TCM connections can be nested or cascaded, controlled via optIfODUkTSourceMode, optIfODUkTTimDetMode, and optIfODUkTTimActEnabled.
section: "2.7"
