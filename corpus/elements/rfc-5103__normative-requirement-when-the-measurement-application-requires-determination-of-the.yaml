document: rfc-5103
kind: normative-requirement
summary: When the measurement application requires determination of the initiator and responder of a communication, the Metering Process SHOULD define the Biflow Source to be the initiator, where possible. This can be approximated by treating the first packet seen as the initiating packet, improved using transport/application protocol knowledge (e.g., TCP flags).
section: "5.1"
rfc2119_level: SHOULD
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
