document: rfc-6424
kind: normative-requirement
summary: The Return Code 'See DDM TLV for Return Code and Return Subcode' (value 14) MUST be used only in the MPLS echo reply message header and MUST NOT be set in the echo request; if set in an echo request it MUST be ignored.
section: 3.2.1
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
