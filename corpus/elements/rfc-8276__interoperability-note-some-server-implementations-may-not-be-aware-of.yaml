document: rfc-8276
kind: interoperability-note
summary: Some server implementations may not be aware of the new xattr operations and may return NFS4ERR_OP_ILLEGAL or an XDR decode error rather than NFS4ERR_NOTSUPP. Clients should only issue these operations after determining that support is present.
section: "8.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
