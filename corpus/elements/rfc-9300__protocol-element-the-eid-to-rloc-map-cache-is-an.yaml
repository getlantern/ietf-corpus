document: rfc-9300
kind: protocol-element
summary: The EID-to-RLOC Map-Cache is an on-demand, shortest-lived cache maintained by ITRs and PITRs that stores EID-Prefix-to-Locator-Set mappings. Entries are expired based on TTL, populated via the LISP control plane (RFC 9301), and support reachability information for RLOCs.
