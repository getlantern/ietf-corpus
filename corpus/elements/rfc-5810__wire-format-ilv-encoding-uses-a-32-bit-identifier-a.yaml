document: rfc-5810
kind: wire-format
summary: ILV encoding uses a 32-bit Identifier (a local ForCES component ID), a 32-bit Length field (covering I+L+Value), and a variable-length Value field. ILV identifiers are of local scope defined by the LFB class definition, distinct from TLV global type spaces.
