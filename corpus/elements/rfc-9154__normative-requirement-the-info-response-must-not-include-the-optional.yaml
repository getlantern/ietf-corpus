document: rfc-9154
kind: normative-requirement
summary: The info response MUST NOT include the optional authorization information element with a non-empty authorization value. The registry MAY return an empty authorization information value to the sponsoring registrar to indicate that the authorization information is set.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - security
