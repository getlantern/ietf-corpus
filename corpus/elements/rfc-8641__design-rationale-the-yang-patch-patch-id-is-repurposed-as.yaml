document: rfc-8641
kind: design-rationale
summary: The YANG Patch patch-id is repurposed as a uint32 counter in YANG-Push to allow easy identification of lost or out-of-sequence update records. The RFC 8072 specification leaves patch-id as an arbitrary string, but YANG-Push assigns a specific counter semantic while remaining backward-compatible with the string type.
section: "3.7"
topics:
    - yang
    - netconf
