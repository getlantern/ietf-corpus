document: rfc-5322
kind: interoperability-note
summary: 'Two-digit years in obsolete date syntax are interpreted as: 00–49 maps to 2000–2049; 50–99 maps to 1950–1999. Three-digit years also add 1900. Military single-letter time zones defined in RFC 822 were non-standard and SHOULD all be treated as equivalent to ''-0000'' unless out-of-band information confirms their meaning.'
section: "4.3"
topics:
