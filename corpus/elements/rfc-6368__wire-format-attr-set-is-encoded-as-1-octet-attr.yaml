document: rfc-6368
kind: wire-format
summary: 'ATTR_SET is encoded as: 1-octet Attr Flags (Optional|Transitive, code=128), 1 or 2 octet Attr Length (extended length bit determines size), 4-octet Origin AS (unsigned integer, network byte order), followed by variable-length BGP path attributes conforming to BGP UPDATE encoding rules. Total length is 4 plus the length of the enclosed attributes.'
