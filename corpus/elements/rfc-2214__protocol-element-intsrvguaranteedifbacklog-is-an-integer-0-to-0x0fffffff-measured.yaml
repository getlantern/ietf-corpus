document: rfc-2214
kind: protocol-element
summary: intSrvGuaranteedIfBacklog is an INTEGER (0 to 0x0FFFFFFF) measured in bytes representing the data backlog caused by implementation deviation from strict bit-by-bit service (e.g., Maximum Packet Size for packetized WFQ). Individual element values range up to 2^28; the end-to-end sum saturates at (2^32)-1.
section: "3.1"
topics:
    - snmp
    - qos
