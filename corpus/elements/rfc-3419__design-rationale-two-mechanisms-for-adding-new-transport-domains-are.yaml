document: rfc-3419
kind: design-rationale
summary: 'Two mechanisms for adding new transport domains are provided: updating this MIB module (which also updates the TransportAddressType enumeration) or defining new OIDs in other MIB modules (which cannot extend TransportAddressType). MIB designers choose between compact/limited-extensibility or verbose/fully-extensible approaches.'
