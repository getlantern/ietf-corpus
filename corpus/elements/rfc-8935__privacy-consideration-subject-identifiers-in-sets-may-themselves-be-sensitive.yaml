document: rfc-8935
kind: privacy-consideration
summary: Subject identifiers in SETs may themselves be sensitive; their inclusion could enable correlation or de-anonymization. SET Issuers and Transmitters should consider these ramifications and choose appropriate subject identifiers for their use cases.
section: "6"
topics:
