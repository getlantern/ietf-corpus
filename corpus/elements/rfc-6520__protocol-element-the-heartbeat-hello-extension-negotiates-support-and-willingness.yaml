document: rfc-6520
kind: protocol-element
summary: The Heartbeat Hello Extension negotiates support and willingness to receive heartbeats. A peer indicates either peer_allowed_to_send(1) — willing to receive HeartbeatRequest messages and respond — or peer_not_allowed_to_send(2), which only permits sending requests. The mode may change at each renegotiation.
