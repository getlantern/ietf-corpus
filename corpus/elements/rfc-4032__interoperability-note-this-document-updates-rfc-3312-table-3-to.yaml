document: rfc-4032
kind: interoperability-note
summary: This document updates RFC 3312 Table 3 to permit answerers to downgrade current status values when moving a stream to a new address. Implementations conforming to RFC 3312 alone will not permit such downgrades and may mishandle session-mobility scenarios.
section: "4.1"
topics:
    - sip
