document: rfc-8839
kind: registry
summary: RFC 8839 maintains the ICE Options Registry (Specification Required policy) for 'ice-options' identifiers. Option tags are RECOMMENDED to be no longer than 20 characters. Registrations must include the option identifier, change control contact, a short description, and specification references.
section: "10.2"
