document: rfc-5286
kind: protocol-element
summary: SRLG protection is limited to SRLGs containing links directly connected to the calculating router (SRLG_local(S)). Each node D is associated with SRLG_set(N,D) — the set of SRLGs crossed forwarding through neighbor N — computed during SPT(N) by taking the union of parent SRLG sets plus locally-connected SRLG memberships.
