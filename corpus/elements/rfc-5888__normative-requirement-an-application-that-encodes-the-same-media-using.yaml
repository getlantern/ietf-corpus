document: rfc-5888
kind: normative-requirement
summary: An application that encodes the same media using different codecs simultaneously MUST NOT use FID to group those media lines, since FID is only appropriate when one codec is used at a time (alternative codecs, not parallel encodings).
section: 8.5.1
rfc2119_level: MUST NOT
topics:
    - realtime
    - rtp
