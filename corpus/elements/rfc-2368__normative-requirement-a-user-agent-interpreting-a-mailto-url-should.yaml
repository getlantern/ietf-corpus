document: rfc-2368
kind: normative-requirement
summary: A user agent interpreting a mailto URL SHOULD choose not to create a message if any of the headers are considered dangerous; it may also choose to create a message with only a subset of the headers given in the URL.
section: "4"
rfc2119_level: SHOULD
