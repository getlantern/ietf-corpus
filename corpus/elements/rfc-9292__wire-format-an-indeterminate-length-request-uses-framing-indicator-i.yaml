document: rfc-9292
kind: wire-format
summary: An Indeterminate-Length Request uses Framing Indicator (i)=2; field sections are terminated by a zero Content Terminator byte, and content is sent as one or more non-zero-length chunks each preceded by a Chunk Length variable-length integer, followed by a Content Terminator (i)=0. The indeterminate-length response uses Framing Indicator (i)=3.
section: "3.2"
topics:
