document: rfc-7037
kind: security-consideration
summary: A compromised DHCPv6 relay agent can forge RADIUS attributes in OPTION_RADIUS of RELAY-FORW messages, potentially influencing parameter assignment on the DHCPv6 server for DHCPv6 clients. This attack vector is mitigated in practice by the NAS and DHCPv6 server belonging to the same administrative domain.
section: "8"
topics:
    - security
    - radius
    - ip
