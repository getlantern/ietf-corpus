document: rfc-5252
kind: security-consideration
summary: Security issues are limited to within the OSPF domain; mechanisms to deliver VPN membership information to CEs are out of scope. The approach reuses RFC 2328 and RFC 5250 security mechanisms, including OSPF authentication, LSA origination rate limiting, and database overflow protection.
section: "5"
topics:
