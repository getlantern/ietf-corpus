document: rfc-6486
kind: state-machine
summary: 'Manifest validation (Section 4.4) requires an RP to: (1) verify the eContentType is id-ct-rpkiManifest, (2) confirm version is 0, and (3) confirm thisUpdate precedes nextUpdate. An invalid manifest MUST be discarded and treated as absent. Valid manifests are then subject to further RP state tests in Section 6.1.'
section: "4.4"
topics:
