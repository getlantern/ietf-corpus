document: rfc-4826
kind: interoperability-note
summary: URI uniqueness in <entry>, <entry-ref>, and <external> elements is enforced by case-sensitive string comparison, which may differ from functional URI equality for a given scheme (e.g., SIP). Two URIs functionally equal may be treated as distinct by XCAP, causing unexpected PUT insertions or DELETE failures.
section: 3.4.7
topics:
    - sip
