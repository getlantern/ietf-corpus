document: rfc-5724
kind: interoperability-note
summary: When sending to an SMS recipient whose support for concatenated messages is unknown, the SMS client MAY use the backwards-compatible text-based concatenation method defined in the SMS specification rather than the header-based standard method.
section: 1.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
