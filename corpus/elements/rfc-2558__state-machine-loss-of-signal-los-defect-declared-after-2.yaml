document: rfc-2558
kind: state-machine
summary: 'Loss of Signal (LOS): defect declared after 2.3–100 µs of no transitions; cleared after 125 µs with no defect. LOS failure declared when defect persists for 2.5 ±0.5 s; cleared after 10 ±0.5 s absence. Declaration of LOS failure clears any existing LOF failure.'
