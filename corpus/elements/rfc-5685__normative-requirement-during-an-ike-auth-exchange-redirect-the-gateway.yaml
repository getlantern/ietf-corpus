document: rfc-5685
kind: normative-requirement
summary: During an IKE_AUTH exchange redirect, the gateway MUST verify the client's AUTH payload before sending the REDIRECT payload, and the client MUST verify the gateway's AUTH payload before acting on the REDIRECT payload.
