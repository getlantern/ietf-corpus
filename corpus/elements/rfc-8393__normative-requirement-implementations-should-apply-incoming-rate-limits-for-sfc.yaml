document: rfc-8393
kind: normative-requirement
summary: Implementations SHOULD apply incoming rate limits for SFC packets with 'Next Protocol' set to 'None' to protect against other nodes not applying suitable rate limits. When a packet is dropped due to rate limits, a counter SHOULD be incremented and an alert MAY be raised.
section: "7"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
