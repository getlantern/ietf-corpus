document: rfc-8185
kind: normative-requirement
summary: If PE1 detects failure of the working PW, it MUST inform PE2 of the working PW state using the PW Status TLV in DHC messages and change the forwarding status of PW1 to standby. On receipt, PE2 SHOULD change PW2 to active and set up connections per the forwarding state machine.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
