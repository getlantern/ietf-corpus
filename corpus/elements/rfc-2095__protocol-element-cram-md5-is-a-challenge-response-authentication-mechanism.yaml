document: rfc-2095
kind: protocol-element
summary: CRAM-MD5 is a challenge-response authentication mechanism for IMAP4 and POP3 that avoids transmitting cleartext passwords. The server sends a challenge containing random digits, a timestamp, and the server's fully-qualified primary hostname, formatted as an RFC 822 msg-id.
