document: rfc-7899
kind: normative-requirement
summary: An implementation of RFC 6513 that uses PIM to carry C-multicast routing information MUST support the VRF PIM-SM damping technique (suppressing Prune(S,G) by not withdrawing the C-multicast BGP route) to be compliant with this specification.
section: "5.2"
rfc2119_level: MUST
topics:
    - multicast
    - vpn
    - routing
    - bgp
