document: rfc-8801
kind: protocol-element
summary: 'PvD Additional Information is a JSON object (restricted to the I-JSON profile, RFC 7493) with three mandatory keys: ''identifier'' (PvD ID FQDN string), ''expires'' (RFC 3339 date after which the object is invalid), and ''prefixes'' (array of IPv6 prefix strings valid for this PvD). Optional keys include ''dnsZones'' and ''noInternet''.'
section: "4.3"
topics:
    - ip
    - json
