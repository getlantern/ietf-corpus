document: rfc-7916
kind: normative-requirement
summary: Link color information SHOULD be signaled in the IGP, and administrative-group IGP extensions (RFC 5305 for IS-IS, RFC 3630 for OSPF) SHOULD be used for encoding and signaling link colors. A protected interface SHOULD support multiple include and exclude colors with preference levels.
section: 6.2.4.2
rfc2119_level: SHOULD
topics:
    - routing
