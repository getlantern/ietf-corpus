document: rfc-4287
kind: normative-requirement
summary: atom:feed MUST contain one or more atom:author elements unless every child atom:entry contains at least one atom:author element. It MUST contain exactly one atom:id, one atom:title, and one atom:updated element.
section: 4.1.1
rfc2119_level: MUST
