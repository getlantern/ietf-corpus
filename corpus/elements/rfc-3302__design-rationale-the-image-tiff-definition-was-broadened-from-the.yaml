document: rfc-3302
kind: design-rationale
summary: The image/tiff definition was broadened from the earlier RFC 1528 reference to TIFF Class F subset to encompass all of TIFF 6.0, consistent with existing practice for TIFF-aware Internet applications. The application parameter was introduced to allow identification of specific subsets without restricting the base type.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
