document: rfc-6228
kind: security-consideration
summary: 'The 199 response may be attractive for attacks targeting specific early dialogs: a man-in-the-middle could forge a 199 response to cause the UAC and stateful intermediates to prematurely release resources for a dialog, while the UAS remains unaware. SIP security mechanisms such as hop-to-hop TLS are recommended to mitigate or eliminate this risk.'
section: "10"
topics:
    - sip
    - security
    - realtime
