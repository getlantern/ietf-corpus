document: rfc-8208
kind: interoperability-note
summary: This document updates RFC 7935 to add support for a different algorithm (ECDSA P-256) for BGPsec certificate requests, a different Subject Public Key Info format for BGPsec certificates, and different signature formats — all needed specifically for BGPsec speakers, while non-BGPsec RPKI components continue to use the RFC 7935 algorithms.
section: "1"
topics:
    - bgp
    - routing
    - crypto
    - pkix
