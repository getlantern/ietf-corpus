document: rfc-2937
kind: protocol-element
summary: The Name Service Search Option (DHCP option code 117) allows a DHCP server to specify the ordered list of name services a client should consult when resolving hostnames. The minimum length is 2 bytes, and each name service is represented as a 16-bit network byte order integer option code.
section: Definitions
