document: rfc-8508
kind: interoperability-note
summary: 'REPLACE applies to IMAP Events in Sieve (RFC 6785) the same way APPEND does: it can cause a Sieve script to be invoked with imap.cause set to "APPEND". Because the intermediate STORE +FLAGS.SILENT \DELETED state is not exposed, no action will result in an imap.cause of FLAG.'
section: "4.4"
