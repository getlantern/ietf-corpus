document: rfc-9838
kind: normative-requirement
summary: When the GCKS Sender-ID counter reaches its final value, the GCKS MUST exclude all GMs from the group before distributing any new Sender-ID values, forcing re-registration so that new Sender-IDs are paired with new Data-Security SAs with fresh keys, preventing nonce reuse.
section: 2.5.1
rfc2119_level: MUST
topics:
    - ipsec
    - crypto
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
