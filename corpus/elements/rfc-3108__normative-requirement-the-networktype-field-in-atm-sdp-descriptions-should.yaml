document: rfc-3108
kind: normative-requirement
summary: The <networkType> field in ATM SDP descriptions SHOULD be set to the string value 'ATM' or wildcarded to '$' or '-'. The 'v' line is strongly RECOMMENDED at the beginning of each SDP session description; in Megaco contexts it is optional but MUST be present when multiple session descriptions are provided in sequence, where it serves as a delimiter.
section: "4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
