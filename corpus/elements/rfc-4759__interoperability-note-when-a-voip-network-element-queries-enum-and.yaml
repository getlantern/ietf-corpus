document: rfc-4759
kind: interoperability-note
summary: When a VoIP network element queries ENUM and the result is a "tel" URI with a different E.164 number that lacks the enum dip indicator, the client can either perform another query against that number or pass the request on, as a matter of local policy.
section: 4.2.3
topics:
