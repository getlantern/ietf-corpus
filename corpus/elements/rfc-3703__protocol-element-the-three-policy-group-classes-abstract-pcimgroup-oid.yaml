summary: The three policy group classes — abstract pcimGroup (OID 1.3.6.1.1.6.1.2), auxiliary pcimGroupAuxClass (1.3.6.1.1.6.1.3), and structural pcimGroupInstance (1.3.6.1.1.6.1.4) — collectively map the PCIM PolicyGroup class, providing maximum DIT design flexibility. The single attribute pcimGroupName is a user-friendly, optionally naming string.
