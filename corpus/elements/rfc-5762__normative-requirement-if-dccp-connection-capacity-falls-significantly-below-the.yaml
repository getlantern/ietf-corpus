document: rfc-5762
kind: normative-requirement
summary: If DCCP connection capacity falls significantly below the nominal session bandwidth causing RTCP delays, the session parameters SHOULD be re-negotiated to more closely match available capacity (e.g., via a SIP re-invite with an updated 'b=' line).
section: "4.2"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
