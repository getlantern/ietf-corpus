document: rfc-1349
kind: design-rationale
summary: The 'minimize monetary cost' TOS value was defined as 0001 (setting no RFC-791 bits) so that pre-existing implementations would treat it as the default TOS rather than as a low-delay or high-throughput request. A value meaning 'must not cost money' or 'willing to pay' was rejected as philosophically inconsistent and impractical.
section: B.1
topics:
