document: rfc-9799
kind: privacy-consideration
summary: If a Hidden Service operator does not want different Hidden Services correlated by a CA, they MUST use separate ACME account keys for each Hidden Service. Operators SHOULD also provide minimal or obfuscated subscriber information when registering with an ACME server.
section: 8.9.3
topics:
    - privacy
    - security
