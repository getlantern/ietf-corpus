document: rfc-8246
kind: protocol-element
summary: The `immutable` Cache-Control response extension indicates that the origin server will not update the representation of that resource during the freshness lifetime of the response. It takes no arguments; any arguments present have no meaning. Multiple instances are equivalent to one instance.
section: "2"
topics:
