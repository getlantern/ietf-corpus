document: rfc-5440
kind: security-consideration
summary: PCEP is vulnerable to impersonation of a PCE or PCC, man-in-the-middle injection of crafted requests or replies, and replay attacks that could cause incorrect paths to be computed and deployed in the network. TCP-level or PCEP-level authentication and integrity protection are required to mitigate these risks.
section: "10.1"
topics:
    - security
    - routing
    - tcp
