document: rfc-5052
kind: protocol-element
summary: 'Common FEC OTI elements include: FEC Instance ID (0-65535), Transfer-Length (object length in octets, up to 2^^48-1), Encoding-Symbol-Length (symbol length in octets), Maximum-Source-Block-Length (maximum source symbols per source block), and Max-Number-of-Encoding-Symbols. CDP encoding formats MUST support specified maximum value ranges for each.'
section: 6.2.4
topics:
    - multicast
