document: rfc-8622
kind: interoperability-note
summary: RFC 8325 (Mapping Diffserv to IEEE 802.11) is updated to add LE DSCP as the primary mapping for Low-Priority Data to UP 1 / AC_BK (Background), retaining CS1 as a legacy mapping. The recommendation to map Low-Priority Data is updated to include both LE DSCP and legacy CS1 DSCP mapped to UP 1.
