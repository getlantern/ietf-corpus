document: rfc-5601
kind: interoperability-note
summary: In practice, most equipment failures result in 'lowerLayerDown' at the PW level where a notification has already been emitted from a higher layer (port or tunnel). Implementations should correlate notifications to suppress redundant PW-level notifications in such cases.
