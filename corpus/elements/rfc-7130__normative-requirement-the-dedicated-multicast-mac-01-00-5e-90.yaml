document: rfc-7130
kind: normative-requirement
summary: The dedicated multicast MAC 01-00-5E-90-00-01 MUST be used for initial BFD packets in Down/AdminDown and Init states, and for the first bfd.DetectMult packets when a session transitions to Up state. All implementations MUST be able to send and receive BFD packets in Up state using this dedicated MAC.
section: "2.3"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
