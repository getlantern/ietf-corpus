document: rfc-9621
kind: interoperability-note
summary: The Transport Services System is designed to coexist with the Socket API rather than replace it entirely, as coexistence has been recommended for incremental deployability (RFC 8170). Only applications built on the Transport Services API are managed by the Transport Services Implementation.
