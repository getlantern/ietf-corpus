document: rfc-8079
kind: normative-requirement
summary: For a Media Terminator B2BUA, it SHOULD advertise and negotiate Reduced-Size RTCP support on each side independently if available, and MUST NOT otherwise, since the B2BUA terminates RTCP and the two sides are decoupled.
section: "3.3"
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
