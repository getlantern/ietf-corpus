document: rfc-3920
kind: normative-requirement
summary: The initiating entity MUST validate the TLS certificate presented by the receiving entity. Certificates MUST be checked against the hostname as provided by the initiating entity (user-supplied), not the DNS-resolved hostname — e.g., 'example.com' even when SRV lookup returned 'im.example.com'.
section: "5.1"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
