document: rfc-6681
kind: interoperability-note
summary: FEC Scheme 1 (Raptor for arbitrary packet flows) is equivalent to the scheme defined in 3GPP TS 26.346 (MBMS Protocols and codecs); Schemes 3 and 5 (optimized and single sequenced flow using Raptor) are equivalent to those defined in ETSI TS 102.034 (DVB over IP).
