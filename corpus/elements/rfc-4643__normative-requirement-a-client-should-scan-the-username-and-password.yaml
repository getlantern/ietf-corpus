document: rfc-4643
kind: normative-requirement
summary: A client SHOULD scan the username and password for white space and warn the user if any is detected, as servers may not preserve exact white space sequences. SASL PLAIN is recommended as an alternative that does not suffer from these issues.
section: 2.3.2
rfc2119_level: SHOULD
topics:
    - security
