document: rfc-8343
kind: protocol-element
summary: The 'enabled' leaf (boolean, default true) represents the configured desired state of the interface. Systems implementing IF-MIB map this to ifAdminStatus ('up' when true, 'down' when false). The 'admin-status' leaf (if-mib feature) is a read-only reflection of the same value from the operational state.
section: "5"
