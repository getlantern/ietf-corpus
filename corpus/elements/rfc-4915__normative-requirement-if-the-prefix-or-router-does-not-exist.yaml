document: rfc-4915
kind: normative-requirement
summary: If the prefix or router does not exist in the default topology in Summary-LSAs or AS-external-LSAs, the TOS 0 metric MUST be set to infinity (0xFFFFFF). The TOS 0 metric is always used for Summary-LSAs and Type-5/7 LSAs independent of DefaultExclusionCapability.
section: "4.5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
