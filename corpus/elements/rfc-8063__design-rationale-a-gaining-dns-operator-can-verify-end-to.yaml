document: rfc-8063
kind: design-rationale
summary: A gaining DNS operator can verify end-to-end delivery by checking via DNS whether the relayed DNSSEC key material has been added to the authoritative zone. This check verifies successful transfer of key material but does not validate the DNSSEC chain of trust itself.
section: "6"
topics:
    - dns
    - security
