document: rfc-9578
kind: protocol-element
summary: The Issuer directory is a JSON object at /.well-known/private-token-issuer-directory (media type application/private-token-issuer-directory) containing issuer-request-uri and a token-keys list; each token-keys entry has token-type (integer), token-key (base64url-encoded public key), and optional not-before (UNIX timestamp).
