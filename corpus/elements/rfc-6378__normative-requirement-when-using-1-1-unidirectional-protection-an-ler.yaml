document: rfc-6378
kind: normative-requirement
summary: When using 1+1 unidirectional protection, an LER that receives a remote request SHALL NOT perform any protection switching action; it will continue to select traffic from the working path and transport traffic on both paths.
section: "3.2"
rfc2119_level: MUST NOT
topics:
