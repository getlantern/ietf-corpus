document: rfc-4425
kind: protocol-element
summary: The 'config' media type parameter carries a base16 (hexadecimal) representation of decoder initialization parameters. For Simple/Main profiles this is STRUCT_C; for Advanced profile it is a sequence layer header directly followed by an entry-point header, both in EBDU format with Start Codes.
