document: rfc-3056
kind: interoperability-note
summary: 'When co-existing with an IPv4 NAT, the 6to4 router and NAT must be combined; V4ADDR is the globally unique address of the NAT. Hosts more than one NAT hop from global address space must all use 2002:: addresses derived from the outermost NAT''s global address.'
section: "5.8"
topics:
    - ip
    - v6ops
    - nat
