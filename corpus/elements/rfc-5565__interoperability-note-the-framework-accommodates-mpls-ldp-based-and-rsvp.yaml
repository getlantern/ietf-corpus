document: rfc-5565
kind: interoperability-note
summary: The framework accommodates MPLS (LDP-based and RSVP-TE-based), L2TPv3, GRE, IP-in-IP, and IPsec as tunneling technologies. No single technology is mandated; choice is a matter of deployment policy. Most can carry MPLS packets, so MPLS in the core is not presupposed.
section: "1"
topics:
