document: rfc-5664
kind: protocol-element
summary: pnfs_osd_version4 is an enum indicating the OSD protocol version (PNFS_OSD_VERSION_1=1, PNFS_OSD_VERSION_2=2) or that the component is unavailable (PNFS_OSD_MISSING=0). RAID algorithms that support redundancy use this to determine which components are missing for reconstruction.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
