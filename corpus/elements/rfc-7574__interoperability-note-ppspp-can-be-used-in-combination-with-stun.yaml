document: rfc-7574
kind: interoperability-note
summary: PPSPP can be used in combination with STUN (RFC 5389) for NAT traversal. The channel multiplexing scheme is designed to be compatible with NATs and firewalls, allowing multiple swarms to share a single UDP port.
