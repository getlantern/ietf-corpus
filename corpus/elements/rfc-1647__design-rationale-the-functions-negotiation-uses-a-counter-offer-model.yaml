document: rfc-1647
kind: design-rationale
summary: The FUNCTIONS negotiation uses a counter-offer model (both sides may send REQUEST with differing lists) rather than a simple accept/reject, enabling convergence to a mutually supported subset without requiring either side to know in advance exactly what the other supports. The anti-loop rule (do not re-add a function the other side removed) bounds the negotiation.
section: 7.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
