document: rfc-7252
kind: protocol-element
summary: CoAP options are classified as Critical (odd option number bit 0 set) or Elective (even), and as Safe-to-Forward or Unsafe for proxies. An endpoint that does not understand a critical option MUST return an error or reject the message; an endpoint that does not understand an elective option MUST silently ignore it. Proxies MUST forward safe-to-forward options even without understanding them.
section: 5.4.1
topics:
    - http
    - udp
