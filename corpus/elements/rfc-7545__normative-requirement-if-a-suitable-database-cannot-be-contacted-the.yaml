document: rfc-7545
kind: normative-requirement
summary: If a suitable Database cannot be contacted, the device MUST treat this as equivalent to a response indicating no available spectrum. Previously obtained spectrum data may continue to be used only until it expires; after that period, the device has no valid spectrum to use.
section: 4.1.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
