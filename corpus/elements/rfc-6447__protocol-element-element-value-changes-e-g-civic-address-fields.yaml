document: rfc-6447
kind: protocol-element
summary: Element value changes (e.g., civic address fields like country, A1, A2, A3, PC) are filtered using the <changed> element from RFC 4661. Multiple <changed> elements within a single <trigger> require ALL to change simultaneously; separate <trigger> elements fire on ANY individual change.
section: "3.3"
topics:
    - sip
    - realtime
