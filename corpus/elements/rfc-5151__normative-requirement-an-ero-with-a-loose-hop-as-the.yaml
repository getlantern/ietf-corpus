document: rfc-5151
kind: normative-requirement
summary: An ERO with a loose hop as the next hop MUST be expanded to determine the path to the next hop using path computation. In the absence of any ERO subobjects beyond the local domain border node, the LSP egress MUST be considered as the next loose hop.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
