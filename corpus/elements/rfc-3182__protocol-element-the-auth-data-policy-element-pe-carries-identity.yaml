document: rfc-3182
kind: protocol-element
summary: The AUTH_DATA policy element (PE) carries identity credentials inside RSVP POLICY_DATA objects. It contains a Length field, a P-Type field (Identity Type), and a variable-length Authentication Attribute List. P-Type 2 = AUTH_USER; P-Type 3 = AUTH_APP.
section: "3.2"
topics:
