document: rfc-7234
kind: normative-requirement
summary: 'A cache MUST NOT generate a stale response if prohibited by no-store, no-cache, must-revalidate, s-maxage, or proxy-revalidate directives. A cache MUST NOT send stale responses unless disconnected or explicitly allowed (e.g., by max-stale request directive). A cache SHOULD add Warning: 110 when sending a stale response.'
section: 4.2.4
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
