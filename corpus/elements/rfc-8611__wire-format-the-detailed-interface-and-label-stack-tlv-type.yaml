document: rfc-8611
kind: wire-format
summary: The Detailed Interface and Label Stack TLV (Type=6) uses an Address Type byte (1=IPv4 Numbered, 2=IPv4 Unnumbered, 3=IPv6 Numbered, 4=IPv6 Unnumbered) determining whether IP Address and Interface fields are 4 or 16 octets, followed by a list of sub-TLVs including Incoming Label Stack (sub-type 1) and Incoming Interface Index (sub-type 2, Length=8).
