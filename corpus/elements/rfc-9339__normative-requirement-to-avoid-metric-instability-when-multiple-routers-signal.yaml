document: rfc-9339
kind: normative-requirement
summary: To avoid metric instability when multiple routers signal RM on the same link, it is RECOMMENDED that the RM value signaled by a router not be derived from RM being signaled by any of its neighbors; routers should use their provisioned local metric values when computing RM to signal.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
