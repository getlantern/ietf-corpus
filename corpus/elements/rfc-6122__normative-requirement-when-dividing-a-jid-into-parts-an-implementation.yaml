document: rfc-6122
kind: normative-requirement
summary: When dividing a JID into parts, an implementation MUST match the separator characters '@' and '/' before applying any transformation algorithms, since Unicode decomposition could otherwise decompose certain code points (e.g., U+FE6B SMALL COMMERCIAL AT) into the separator characters.
section: "2.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
