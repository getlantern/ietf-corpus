document: rfc-7668
kind: protocol-element
summary: The Bluetooth LE network uses a star topology where the central acts as a 6LoWPAN Border Router (6LBR) and peripherals act as 6LoWPAN Nodes (6LNs). Direct communication only occurs between central and peripheral; peripheral-to-peripheral traffic is routed through the central via IP routing.
section: "2.2"
topics:
