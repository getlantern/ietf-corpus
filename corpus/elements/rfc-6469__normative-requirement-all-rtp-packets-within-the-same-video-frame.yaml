document: rfc-6469
kind: normative-requirement
summary: All RTP packets within the same video frame MUST have the same RTP timestamp. The timestamp SHOULD increment by the nominal interval for one DV frame time (e.g., 3003 for 525-60 mode, 3600 for 625-50 mode) using a 90 kHz clock.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
