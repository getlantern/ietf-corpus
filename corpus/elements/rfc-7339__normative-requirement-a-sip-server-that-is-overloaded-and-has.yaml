document: rfc-7339
kind: normative-requirement
summary: A SIP server that is overloaded and has started throttling MUST reject some requests from non-participating (non-overload-control-supporting) upstream clients with a 503 (Service Unavailable) response without a Retry-After header.
section: 5.10.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
