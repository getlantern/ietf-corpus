document: rfc-8267
kind: normative-requirement
summary: The first Write chunk in the Write list MUST be used by the first READ operation in an NFS version 4 COMPOUND procedure; subsequent Write chunks are consumed by subsequent READ operations in order.
section: 6.4.1
rfc2119_level: MUST
