document: rfc-6486
kind: normative-requirement
summary: A new manifest MUST be issued and published on or before the nextUpdate time. Additionally, a new manifest MUST NOT invalidate the manifest object URL of previously issued certificates, so the publication name (object URL) MUST remain unchanged across manifest generation cycles.
section: "5.2"
rfc2119_level: MUST
topics:
    - pkix
    - security
