document: rfc-2633
kind: normative-requirement
summary: Receiving agents MUST be able to handle zero or one instance of each signed attribute (signingTime, sMIMECapabilities, sMIMEEncryptionKeyPreference). Sending agents SHOULD generate one instance of each in every S/MIME message.
section: "2.5"
rfc2119_level: MUST
topics:
