summary: 'The SNMP group (mib-2 11) provides basic instrumentation counters: snmpInPkts (total messages from transport), snmpInBadVersions (unsupported version), snmpInASNParseErrs (ASN.1/BER decode errors), snmpSilentDrops, snmpProxyDrops, and the read-write control object snmpEnableAuthenTraps.'
