document: rfc-7780
kind: normative-requirement
summary: TRILL switches MUST, for multi-destination packets, either implement the RPF and tree-adjacency checks as described in RFC 6325 or implement the stronger alternative RPF check that validates the quadruplet {ingress nickname, source SNPA, tree, input port}. A campus may contain a mixture of both.
section: 3.6.2
rfc2119_level: MUST
topics:
    - routing
    - multicast
    - security
