document: rfc-3862
kind: design-rationale
summary: Pure RFC 2822/MIME was not used because of its irregular lexical structure (multiple encodings making digest computation unreliable), weak internationalization (7-bit ASCII only), mutability by gateways that obliterates signatures, lack of clear metadata/content separation, and limited extensibility via unstandardizable X-headers.
section: "1.2"
topics:
    - realtime
