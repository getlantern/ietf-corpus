document: rfc-1964
kind: design-rationale
summary: The GSS-API framing from RFC-1508 Appendix B is applied to all emitted tokens — KRB_AP_REQ, KRB_AP_REP, KRB_ERROR, context-deletion, and per-message tokens — not only the initial token. While not required by RFC-1508, this enables implementations to perform enhanced error-checking.
section: "1.1"
topics:
    - security
