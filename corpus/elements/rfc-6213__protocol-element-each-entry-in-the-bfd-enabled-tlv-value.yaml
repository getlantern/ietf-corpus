summary: 'Each entry in the BFD-Enabled TLV value field is a 3-octet MTID/NLPID pair: the first 2 octets carry 4 reserved bits followed by a 12-bit Multi-Topology Identifier (MTID), and the third octet carries the Network Layer Protocol Identifier (NLPID) identifying the protocol/address family for which BFD is enabled.'
