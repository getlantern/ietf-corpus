document: rfc-4788
kind: protocol-element
summary: The dtxmax parameter (0–255 frames) indicates the maximum DTX update interval; default is 32 frames per 3GPP2 C.S0076. The dtxmin parameter (0–255 frames) indicates the minimum DTX update interval; default is 12 frames. Both MUST be ignored if DTX is not used.
section: "6.1"
