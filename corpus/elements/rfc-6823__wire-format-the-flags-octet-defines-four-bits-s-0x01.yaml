document: rfc-6823
kind: wire-format
summary: 'The Flags octet defines four bits: S (0x01) for domain-wide flooding scope, D (0x02) set when leaking Level-2 to Level-1, I (0x04) indicating a 4-octet IPv4 address follows the Application ID, and V (0x08) indicating a 16-octet IPv6 address follows. The upper 4 bits are reserved.'
section: "3.1"
topics:
    - routing
