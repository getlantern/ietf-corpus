document: rfc-822
kind: normative-requirement
summary: Comments must NOT be included during protocol exchanges with mail servers. Comments are retained while the message is subject to interpretation according to this standard, but stripped before passing to mail transport services.
section: 3.4.3
rfc2119_level: MUST NOT
