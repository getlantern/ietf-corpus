document: rfc-7171
kind: wire-format
summary: 'The Flags field contains: S (Start) — indicates beginning of PT-EAP exchange, MUST be set only in first NEA Server message and MUST NOT accompany Data; R (Reserved, 4 bits) — MUST be set to 0 and ignored on receipt. The Version subfield (3 bits) follows the flags.'
section: "3.3"
rfc2119_level: MUST
topics:
    - security
