document: rfc-3220
kind: design-rationale
summary: Foreign agent care-of addresses are preferred over co-located care-of addresses because they allow many mobile nodes to share a single care-of address, reducing pressure on the limited IPv4 address space. Co-located addresses require a pool of addresses per foreign subnet and are harder to manage at scale.
section: "1.7"
topics:
    - mobility
    - ip
