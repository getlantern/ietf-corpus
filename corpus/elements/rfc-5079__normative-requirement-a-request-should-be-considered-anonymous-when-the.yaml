document: rfc-5079
kind: normative-requirement
summary: A request SHOULD be considered anonymous when the identity of the originator has been explicitly withheld, including when the From header contains a URI in the anonymous.invalid domain, a display name of 'Anonymous' or 'anonymous', or a Privacy header with value 'id' or 'user'.
section: "3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
