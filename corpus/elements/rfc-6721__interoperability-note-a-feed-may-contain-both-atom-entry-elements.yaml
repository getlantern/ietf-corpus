document: rfc-6721
kind: interoperability-note
summary: A feed MAY contain both atom:entry elements and at:deleted-entry elements sharing the same atom:id, representing an entry being published, then deleted, or deleted then republished. Timestamp comparison between 'when' and 'atom:updated' determines which condition applies.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
