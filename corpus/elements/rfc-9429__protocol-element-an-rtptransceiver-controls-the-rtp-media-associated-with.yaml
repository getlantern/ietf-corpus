document: rfc-9429
kind: protocol-element
summary: An RtpTransceiver controls the RTP media associated with one 'm=' section and contains one RtpSender and one RtpReceiver. It is associated with an 'm=' section when its mid property is non-null; once a session description is applied, each 'm=' section is associated with exactly one RtpTransceiver.
