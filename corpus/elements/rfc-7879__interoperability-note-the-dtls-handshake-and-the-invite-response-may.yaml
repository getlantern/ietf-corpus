document: rfc-7879
kind: interoperability-note
summary: The DTLS handshake and the INVITE response may proceed in parallel; a B2BUA must therefore be prepared to receive DTLS, STUN, and media packets on the ports it advertised in the SDP offer before it has received the SDP answer.
section: 5.1.1
topics:
