document: rfc-8929
kind: normative-requirement
summary: The MTU MUST have the same value on the backbone and on all federated LLNs in the MLSN. The 6BBR MUST advertise the same MTU value in RAs over the backbone and toward all LLN links, because legacy nodes will not perform Path MTU Discovery for intra-subnet destinations.
section: "4"
rfc2119_level: MUST
topics:
    - ip
