document: rfc-6047
kind: normative-requirement
summary: Authentication MUST be performed using S/MIME (RFC 5750, RFC 5751). Authentication is only possible on signed messages; unauthenticated (unsigned) messages may not be trusted.
section: 2.2.2
rfc2119_level: MUST
