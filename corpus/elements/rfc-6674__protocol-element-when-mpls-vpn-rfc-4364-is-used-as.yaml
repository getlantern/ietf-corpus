document: rfc-6674
kind: protocol-element
summary: When MPLS VPN (RFC 4364) is used as the softwire, the SWID is a generic VPN identifier and the AD's IPv4 address serves as the CID. For a given VPN, each AD's IPv4 address must be unique, so overlapping private addresses across ADs are not supported in this mode.
section: "6"
topics:
