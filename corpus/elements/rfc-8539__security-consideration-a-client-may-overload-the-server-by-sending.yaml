document: rfc-8539
kind: security-consideration
summary: A client may overload the server by sending rapid repeated source address update messages. This risk can be mitigated by implementing a server-side minimum time interval between client address changes (default 60 seconds per Section 8.1), and by using a random-based client identifier to reduce brute-force guessing risk.
section: "9"
