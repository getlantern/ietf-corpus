document: rfc-3805
kind: wire-format
summary: 'PrtSubUnitStatusTC is an Integer32 formed as the additive sum of five independent status dimensions: Availability (0/1/2/3/4/5/6), Non-Critical alert flag (0 or 8), Critical alert flag (0 or 16), On-Line flag (0 or 32), and Transitioning flag (0 or 64). For example, a jammed tray also low on paper yields 3+16+8=27.'
section: 2.2.13.2.2
