document: rfc-3472
kind: normative-requirement
summary: Transit nodes processing a REQUEST containing a Protection TLV MUST verify that the requested protection can be satisfied by the outgoing interface or tunnel. If not, the node MUST generate a NOTIFICATION with 'Routing problem/Unsupported Link Protection'.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
