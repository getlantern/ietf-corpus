document: rfc-4816
kind: normative-requirement
summary: ATM OAM cells MUST be transported transparently; PEs do not act on them. On PSN or pseudowire failure, PEs bring down ATM interfaces to CEs (e.g., generating LOS) rather than generating OAM cells.
section: "2"
rfc2119_level: MUST
topics:
