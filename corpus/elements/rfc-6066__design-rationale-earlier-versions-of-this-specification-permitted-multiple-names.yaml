document: rfc-6066
kind: design-rationale
summary: Earlier versions of this specification permitted multiple names of the same name_type in ServerNameList. In practice, clients only send one name and cannot determine which name the server selected, so multiple names of the same name_type are now prohibited.
section: "3"
topics:
    - tls
