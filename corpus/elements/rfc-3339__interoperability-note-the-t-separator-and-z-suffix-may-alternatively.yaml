document: rfc-3339
kind: interoperability-note
summary: The 'T' separator and 'Z' suffix may alternatively be lower case 't' or 'z' per ABNF and ISO 8601. However, specifications operating in case-sensitive environments (e.g., XML) MAY restrict the format to require uppercase, so generators SHOULD use uppercase to maximize compatibility.
section: "5.6"
