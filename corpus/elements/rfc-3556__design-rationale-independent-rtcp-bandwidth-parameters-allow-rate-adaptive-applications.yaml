document: rfc-3556
kind: design-rationale
summary: Independent RTCP bandwidth parameters allow rate-adaptive applications to set RTCP bandwidth consistent with a 'typical' data bandwidth lower than the session maximum, keeping RTCP under 5% of actual data bandwidth even when rate has been adapted downward.
