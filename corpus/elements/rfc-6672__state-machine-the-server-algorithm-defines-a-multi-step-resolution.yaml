document: rfc-6672
kind: state-machine
summary: 'The server algorithm defines a multi-step resolution process: (1) set recursion available, (2) search zones for nearest ancestor to QNAME, (3) match labels in zone triggering DNAME substitution and CNAME synthesis if a DNAME is encountered, (4) search cache including ancestor DNAME records, (5) use recursive resolution if requested, (6) add additional RRs.'
section: "3.2"
topics:
    - dns
