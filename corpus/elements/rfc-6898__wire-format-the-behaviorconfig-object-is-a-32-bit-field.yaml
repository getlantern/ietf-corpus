document: rfc-6898
kind: wire-format
summary: The BehaviorConfig object is a 32-bit field containing three 1-bit flags (S, D, C) in the most significant positions followed by a Must Be Zero (MBZ) field padded to ensure 32-bit alignment. The S bit signals SONET/SDH Trace support (RFC 4207), D bit signals DWDM support (RFC 4209), and C bit signals data channel consistency check support (RFC 5818).
section: "3.1"
topics:
    - mpls
