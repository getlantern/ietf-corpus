document: rfc-5643
kind: protocol-element
summary: ospfv3RouterId is a persistent read-write Unsigned32 (Ospfv3RouterIdTC, range 1..0xFFFFFFFF) uniquely identifying the router in the AS. It may default to a 32-bit representation of an IPv4 interface address when IPv4 is configured; otherwise it must be assigned by another method.
