document: rfc-9197
kind: design-rationale
summary: IOAM-Data-Field definitions intentionally focus on syntax and avoid specifying semantics or units (e.g., for buffer occupancy or queue depth). This allows nodes to supply data in their native format without unit conversions, delegating interpretation and conversion to management systems that process the data.
section: 4.4.2
topics:
    - measurement
