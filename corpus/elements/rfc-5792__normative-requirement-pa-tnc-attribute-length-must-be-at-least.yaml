document: rfc-5792
kind: normative-requirement
summary: PA-TNC Attribute Length MUST be at least 12 (the size of the attribute header). Recipients that receive a length less than 12, or a length inconsistent with a known fixed-length attribute, SHOULD respond with an Invalid Parameter PA-TNC error code.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
