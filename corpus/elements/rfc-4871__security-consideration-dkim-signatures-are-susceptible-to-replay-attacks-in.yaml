document: rfc-4871
kind: security-consideration
summary: DKIM signatures are susceptible to replay attacks in which a validly signed message is retransmitted to a larger or unintended audience. The x= expiration tag is not an anti-replay defense; mitigations are outside DKIM's scope.
section: "8.5"
topics:
    - email
    - security
