document: rfc-7200
kind: normative-requirement
summary: Any "drop" action applied to an unreliable transport (e.g., UDP) MUST be treated as if it were "reject", because dropping silently over UDP causes retransmissions that worsen overload.
section: "5.4"
rfc2119_level: MUST
topics:
    - sip
    - udp
    - realtime
