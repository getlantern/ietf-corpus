document: rfc-5611
kind: normative-requirement
summary: When opening a TDM PW session, an LCCE MUST include the TDM PW AVP in ICRQ or OCRQ, and MUST include the RTP AVP if and only if the RTP header is used. The peer MUST validate the TDM PW AVP and confirm it can meet the RTP AVP requirements.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
