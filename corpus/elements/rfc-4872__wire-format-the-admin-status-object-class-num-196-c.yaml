document: rfc-4872
kind: wire-format
summary: The ADMIN_STATUS object (Class-Num=196, C-Type=1) is extended with a 1-bit Lockout (L) field. When set, L forces the recovery LSP to be temporarily unavailable to transport traffic (either normal or extra-traffic). It MUST be set together with the Reflect (R) bit in the Path message.
section: "13"
topics:
