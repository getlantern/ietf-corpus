document: rfc-6435
kind: security-consideration
summary: The G-ACh is essentially connection-oriented, so injection or modification of LI control messages requires subversion of a transit node, which is considered hard in MPLS networks and not addressable at the protocol level; management-level techniques are more appropriate countermeasures.
section: "7"
topics:
