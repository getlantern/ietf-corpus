document: rfc-2256
kind: interoperability-note
summary: Until mandatory authentication mechanisms for LDAPv3 are standardized, clients and servers implementing update functionality are UNLIKELY TO INTEROPERATE, or MAY INTEROPERATE ONLY IF AUTHENTICATION IS REDUCED TO AN UNACCEPTABLY WEAK LEVEL. Implementors are discouraged from deploying LDAPv3 update functionality.
section: "1"
topics:
    - ldap
    - security
