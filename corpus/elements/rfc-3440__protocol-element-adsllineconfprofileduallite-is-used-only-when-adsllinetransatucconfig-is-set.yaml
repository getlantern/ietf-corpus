document: rfc-3440
kind: protocol-element
summary: adslLineConfProfileDualLite is used only when adslLineTransAtucConfig is set to both one or more full-rate and one or more G.Lite modes simultaneously (dual mode). For dynamic profiles its value equals the applicable row index in AdslLineConfProfileTable; for static profiles it is a fixed-length 14-character string concatenating ifIndex (zero-padded) with 'Full' or 'Lite'.
