document: rfc-4262
kind: protocol-element
summary: The S/MIME Capabilities extension embeds an SMIMECapabilities data structure (identical to the SMIMECapabilities attribute from RFC 3851) inside an X.509 certificate. The structure is a SEQUENCE OF SMIMECapability, where each SMIMECapability contains a capabilityID OID and optional parameters.
