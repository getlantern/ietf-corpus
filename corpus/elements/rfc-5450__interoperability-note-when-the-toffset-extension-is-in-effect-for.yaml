document: rfc-5450
kind: interoperability-note
summary: When the toffset extension is in effect for a stream, the offset MAY be omitted for packets sent at their nominal time (offset = 0). The implied transmission offset of an untagged packet is 0 if the extension is in effect, or unknown if the extension is not declared/negotiated.
section: "3"
topics:
