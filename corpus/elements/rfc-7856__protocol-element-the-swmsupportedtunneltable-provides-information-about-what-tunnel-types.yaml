document: rfc-7856
kind: protocol-element
summary: The swmSupportedTunnelTable provides information about what tunnel types an AFBR supports for softwire mesh scenarios, indexed by swmSupportedTunnelType (IANAtunnelType). Supported types include L2TPv3 over IP, GRE, Transmit tunnel endpoint, IPsec in Tunnel-mode, IP in IP with IPsec Transport Mode, MPLS-in-IP with IPsec Transport Mode, and IP in IP.
