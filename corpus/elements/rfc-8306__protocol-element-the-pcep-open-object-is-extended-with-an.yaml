document: rfc-8306
kind: protocol-element
summary: The PCEP OPEN object is extended with an optional P2MP-capable TLV (type 6, length 2 bytes, default value 0) to let a PCE advertise P2MP path computation capability during session establishment. A PCE behaving as a PCC in inter-domain cooperation SHOULD also include this TLV.
section: 3.1.2
topics:
