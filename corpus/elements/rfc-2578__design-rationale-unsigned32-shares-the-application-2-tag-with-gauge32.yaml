document: rfc-2578
kind: design-rationale
summary: 'Unsigned32 shares the APPLICATION 2 tag with Gauge32, making them wire-indistinguishable. The distinction is purely semantic: Gauge32 clamps at its bounds, while Unsigned32 is a plain non-negative integer with no clamping behavior.'
