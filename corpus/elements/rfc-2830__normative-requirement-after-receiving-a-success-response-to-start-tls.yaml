document: rfc-2830
kind: normative-requirement
summary: After receiving a success response to Start TLS, the client MUST either begin a TLS negotiation or close the connection; it will send TLS Record Protocol PDUs directly over the underlying TCP connection.
section: "3.2"
rfc2119_level: MUST
