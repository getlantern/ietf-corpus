kind: protocol-element
summary: natv2PortMapTable is indexed by NAT instance index, protocol number (ProtocolNumber), external realm (SnmpAdminString), external address type (InetAddressType), external address (InetAddress), and external port (InetPortNumber). No additional row index is needed because the external {realm, address, port} tuple uniquely identifies a mapping.
