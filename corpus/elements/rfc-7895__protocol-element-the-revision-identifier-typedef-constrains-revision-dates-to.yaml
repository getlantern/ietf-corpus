document: rfc-7895
kind: protocol-element
summary: The 'revision-identifier' typedef constrains revision dates to the pattern '\d{4}-\d{2}-\d{2}' (YYYY-MM-DD). A zero-length string is used in the 'revision' union leaf when no revision statement exists in the module.
