document: rfc-5247
kind: normative-requirement
summary: The Secure Association Protocol MUST operate directly between the peer and authenticator and MUST NOT be passed through to the backend authentication server or include additional parties, since TSKs need be known only by the peer and authenticator.
section: "3.1"
rfc2119_level: MUST
topics:
