document: rfc-4566
kind: security-consideration
summary: Intermediary systems (e.g., firewalls, NAT boxes) that intercept and modify SDP are NOT RECOMMENDED unless they can establish the authenticity of the session description and the authority of its source. SDP alone does not carry sufficient information for these checks; the encapsulating protocol (SIP, RTSP) must provide them.
section: "7"
topics:
    - realtime
    - security
    - nat
