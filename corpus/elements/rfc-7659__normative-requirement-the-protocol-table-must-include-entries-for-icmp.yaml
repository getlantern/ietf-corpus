document: rfc-7659
kind: normative-requirement
summary: The protocol table MUST include entries for ICMP(1), TCP(6), UDP(17), and ICMPv6(58). Depending on the application, it SHOULD include IPv4 encapsulation(4), IPv6 encapsulation(41), IPsec AH(51), and SCTP(132). Support for PIM(103) is described as highly desirable.
section: 3.3.5
rfc2119_level: MUST
topics:
