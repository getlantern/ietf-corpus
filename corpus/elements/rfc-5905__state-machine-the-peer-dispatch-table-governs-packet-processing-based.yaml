document: rfc-5905
kind: state-machine
summary: 'The peer dispatch table governs packet processing based on (association mode × packet mode): valid pairings dispatch to PROC (process the packet), while invalid ones result in DSCRD (discard), ERR (discard and demobilize symmetric passive association), FXMIT (stateless server response), MANY (manycast server response), NEWPS (mobilize symmetric passive), or NEWBC (mobilize broadcast client). ERR is a fatal protocol violation.'
section: "9.2"
