document: rfc-2930
kind: normative-requirement
summary: At any DNS server or resolver, only one octet string of keying material may be in place for any particular key name. An attempt to establish another set of keying material for an existing name returns a BADNAME error.
section: "2.1"
rfc2119_level: MUST
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
