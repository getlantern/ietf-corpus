document: rfc-7781
kind: normative-requirement
summary: When ingressing native frames from RBv ports, member RBridges MUST use the RBv's pseudo-nickname (not their regular nickname) as the ingress nickname in TRILL encapsulation. For frames received on non-RBv access ports, the regular nickname is used.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
