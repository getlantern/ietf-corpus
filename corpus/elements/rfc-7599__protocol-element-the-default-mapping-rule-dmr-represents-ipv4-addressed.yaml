document: rfc-7599
kind: protocol-element
summary: The Default Mapping Rule (DMR) represents IPv4-addressed destinations outside the MAP domain using IPv4-embedded IPv6 addresses (per RFC 6052) constructed from the BR's IPv6 prefix. A CE installs an IPv4 default route using the DMR; the BR uses the DMR to translate all outside IPv4 source addresses into the MAP domain.
section: "5.1"
topics:
    - nat
    - v6ops
    - ip
