document: rfc-9221
kind: security-consideration
summary: DATAGRAM frames share the same security properties as all other QUIC connection data; all application data in DATAGRAM frames MUST be protected by 0-RTT or 1-RTT keys. Application protocols allowing DATAGRAM frames in 0-RTT require a profile defining acceptable 0-RTT use per RFC 9001 Section 5.6.
section: "6"
topics:
    - quic
    - security
    - crypto
