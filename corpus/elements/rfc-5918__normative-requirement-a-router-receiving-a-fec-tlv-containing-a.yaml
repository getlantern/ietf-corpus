document: rfc-5918
kind: normative-requirement
summary: A router receiving a FEC TLV containing a Typed Wildcard FEC Element for a FEC Element Type it does not support or that does not support wildcarding MUST stop decoding the FEC TLV, abort processing the containing message, and send an 'Unknown FEC' Notification message to its LDP peer.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
