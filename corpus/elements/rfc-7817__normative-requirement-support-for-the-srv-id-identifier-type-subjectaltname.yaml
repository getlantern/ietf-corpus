document: rfc-7817
kind: normative-requirement
summary: Support for the SRV-ID identifier type (subjectAltName of SRVName type per RFC 4985) is REQUIRED for email client software implementations that support RFC 6186 service discovery. For the ManageSieve protocol, the service name 'sieve' is used.
