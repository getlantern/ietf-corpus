document: rfc-8063
kind: normative-requirement
summary: If a client receives a key relay object that has been sent previously, it MUST update the expiry time of the key material. This enables clients to extend the lifetime of key material when a transfer is delayed.
section: 2.1.1
rfc2119_level: MUST
topics:
    - dns
    - security
