document: rfc-6651
kind: protocol-element
summary: A DKIM Reporting TXT record is published in the DNS at '_report._domainkey.<d=value>' and contains tag-value pairs (ra=, rp=, rr=, rs=) that control report generation. It is independent of the DKIM key record and is queried only when 'r=y' appears in a DKIM-Signature.
section: "3.2"
topics:
