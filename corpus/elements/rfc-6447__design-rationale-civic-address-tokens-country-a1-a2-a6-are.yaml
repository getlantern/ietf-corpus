document: rfc-6447
kind: design-rationale
summary: 'Civic address tokens (country, A1, A2, ..., A6) are hierarchical: a change in a higher-level token (e.g., A3 ''city or town'') likely causes changes in tokens lower in the hierarchy (A4, A5, A6). This justifies using separate <trigger> elements when any one of multiple civic elements changing should fire a notification.'
section: "3.3"
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
