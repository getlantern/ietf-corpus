document: rfc-2024
kind: protocol-element
summary: dlswTConnOperFlowCntlMode reports whether the flow control in use is undetermined(1), standard RFC 1795 pacing(2), or other(3) (which covers RFC 1434+ xBusy or vendor-specific methods). Whether 'other' is xBusy can be inferred from dlswTConnOperPartnerVersion.
