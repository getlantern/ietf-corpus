document: rfc-6282
kind: normative-requirement
summary: Implementation of Section 10 of RFC 4944 (LOWPAN_HC1/HC2) is NOT RECOMMENDED. New implementations MAY implement decompression of RFC 4944 Section 10 but SHOULD NOT send packets compressed according to it.
