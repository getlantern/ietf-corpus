document: rfc-3295
kind: design-rationale
summary: The GSMP MIB scope explicitly excludes information learned via the protocol (e.g., 'all ports config'), relationships between virtual and physical entities, and management of switch partitions. These boundaries keep the MIB focused on configuring, monitoring, and maintaining the GSMP protocol entity itself.
section: "3.2"
topics:
    - snmp
