document: rfc-8197
kind: design-rationale
summary: Reversing an 'unwanted' label is considered out of scope for this mechanism, as it will likely require a mechanism other than call signaling. Service providers handling global or carrier-wide lists must account for unavoidable false-positive rates and use fraction-based rather than absolute count metrics.
section: "4"
topics:
