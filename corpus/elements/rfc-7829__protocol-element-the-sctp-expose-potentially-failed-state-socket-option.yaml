document: rfc-7829
kind: protocol-element
summary: The SCTP_EXPOSE_POTENTIALLY_FAILED_STATE socket option controls whether the PF state is exposed to the ULP via SCTP_PEER_ADDR_CHANGE events and SCTP_GET_PEER_ADDR_INFO queries. A new constant SCTP_ADDR_POTENTIALLY_FAILED is added to spc_state, and SCTP_POTENTIALLY_FAILED to spinfo_state.
section: "7.3"
