document: rfc-5537
kind: normative-requirement
summary: A serving agent MUST reject any article without an Approved header field that is posted to a newsgroup listed as moderated, and MUST reject any article that does not include all mandatory header fields or contains header fields with invalid contents.
section: "3.7"
rfc2119_level: MUST
