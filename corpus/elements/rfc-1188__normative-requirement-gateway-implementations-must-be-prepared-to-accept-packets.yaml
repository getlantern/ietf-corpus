document: rfc-1188
kind: normative-requirement
summary: Gateway implementations must be prepared to accept packets as large as the MTU and fragment them when necessary. Host implementations must not send datagrams longer than 576 octets unless they have explicit knowledge that the destination will accept them.
section: MAC Layer Details
rfc2119_level: MUST
topics:
    - ip
