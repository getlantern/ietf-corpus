document: rfc-5926
kind: design-rationale
summary: MAC outputs are truncated to 96 bits to balance security against message size, fitting the authentication tag within the TCP-AO option field. HMAC-SHA-1 produces 160 bits and AES-128-CMAC produces 128 bits before truncation.
section: "3.2"
topics:
