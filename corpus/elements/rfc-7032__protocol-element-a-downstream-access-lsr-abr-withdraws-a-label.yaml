document: rfc-7032
kind: protocol-element
summary: 'A downstream access LSR/ABR withdraws a label via Label Withdraw in five cases: BGP route withdrawal, IGP route withdrawal or downstream LDP session loss, downstream label withdrawal, next-hop change with no label from the new next hop, or configured policy rejection. The LSR attempts local LSP convergence before withdrawing upstream labels.'
section: "4.4"
topics:
