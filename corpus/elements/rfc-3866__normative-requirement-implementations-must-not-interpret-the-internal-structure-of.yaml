document: rfc-3866
kind: normative-requirement
summary: Implementations MUST NOT interpret the internal structure of a language tag when comparing two tags, and MUST treat them simply as strings of characters. Implementations MUST allow any arbitrary BCP 47-conforming string as a language tag.
section: "2"
rfc2119_level: MUST NOT
topics:
    - ldap
