document: rfc-7825
kind: protocol-element
summary: A feature tag 'setup.ice-d-m' is defined for the RTSP capabilities mechanism, indicating support for all mandatory functions of ICE-based datagram media transport NAT traversal. It applies to clients, servers, and proxies. Clients SHOULD include it in the Supported header of SETUP requests using D-ICE.
section: "4.4"
topics:
    - nat
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
