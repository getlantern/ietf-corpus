summary: For PRF calculation, the IKE Header Length field (Adjusted Length) is set to the sum of IntAuth_[i/r]*A and IntAuth_[i/r]*P lengths; the Encrypted payload Payload Length field (Adjusted Payload Length) is set to IntAuth_[i/r]*P length plus the four-octet Encrypted payload header size.
