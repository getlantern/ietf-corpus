document: rfc-5371
kind: interoperability-note
summary: If the receiver cannot handle the offered color space, it should reply with its preferred color space in the answer and gracefully end the session. Senders do not need to conform to the color space in the answer but should note the session ended due to color sampling issues.
section: "7.2"
topics:
    - rtp
    - realtime
