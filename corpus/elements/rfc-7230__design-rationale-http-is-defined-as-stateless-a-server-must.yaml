document: rfc-7230
kind: design-rationale
summary: HTTP is defined as stateless; a server MUST NOT assume two requests on the same connection are from the same user agent unless the connection is secured and specific to that agent. This statelessness enables proxy connection reuse, load balancing, and independent request processing.
section: "2.3"
topics:
    - http
