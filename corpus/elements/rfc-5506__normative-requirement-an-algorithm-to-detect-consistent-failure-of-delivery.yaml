document: rfc-5506
kind: normative-requirement
summary: An algorithm to detect consistent failure of delivery of Reduced-Size RTCP MUST be used by any application using Reduced-Size RTCP. If verification fails, it is strongly RECOMMENDED that only compound RTCP per RFC 3550 is transmitted.
section: 4.2.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
