document: rfc-6647
kind: interoperability-note
summary: For DATA-level greylisting, if any portion of the message is reformulated between delivery attempts (a behavior exhibited by some MTAs at submission time), the constructed tuple may differ from the original attempt, causing the delivery to be greylisted again as if new.
