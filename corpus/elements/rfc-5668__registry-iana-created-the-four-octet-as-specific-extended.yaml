kind: registry
summary: 'IANA created the ''Four-octet AS Specific Extended Community'' registry. Transitive type values are 0x0200-0x02ff; non-transitive are 0x4200-0x42ff. Initial assignments are: four-octet AS specific Route Target (0x0202) and four-octet AS specific Route Origin (0x0203). Future assignments use First Come First Served policy.'
