document: rfc-7877
kind: security-consideration
summary: Replay attacks on SPPF provisioning operations could result in unauthorized re-creation or deletion of SED objects. The substrate protocol must include replay protection mechanisms to prevent previously captured messages from being resubmitted.
section: "9.6"
topics:
    - security
