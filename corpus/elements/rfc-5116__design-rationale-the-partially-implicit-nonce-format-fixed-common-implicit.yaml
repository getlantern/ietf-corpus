document: rfc-5116
kind: design-rationale
summary: The partially implicit nonce format (Fixed-Common implicit, Fixed-Distinct and Counter explicit) is used by GCM ESP and CCM ESP, incorporating the Salt value in the Fixed field. This format ensures nonce reconstructibility from explicit data and supports multi-device key sharing.
section: 3.2.1
topics:
