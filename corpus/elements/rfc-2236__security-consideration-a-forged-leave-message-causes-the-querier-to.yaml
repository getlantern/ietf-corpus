document: rfc-2236
kind: security-consideration
summary: A forged Leave message causes the Querier to send Group-Specific Queries, creating extra processing load but not causing traffic loss. Defenses include source address validation and requiring Router Alert option presence while preventing routers from forwarding Leave messages.
section: "10"
topics:
    - multicast
    - security
