document: rfc-9449
kind: protocol-element
summary: 'The DPoP authentication scheme sends a DPoP-bound access token in the Authorization header using the syntax: Authorization: DPoP <token68>. Resource servers must also receive a DPoP proof in the DPoP header field and verify it per Section 4.3.'
