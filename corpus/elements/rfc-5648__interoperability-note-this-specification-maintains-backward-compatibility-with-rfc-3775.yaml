document: rfc-5648
kind: interoperability-note
summary: This specification maintains backward compatibility with RFC 3775. If a receiver does not understand the Binding Identifier mobility option, it skips it and processes the Binding Update per RFC 3775. If the mobile node finds no Binding Identifier mobility option in the received Binding Acknowledgement, it MUST fall back to legacy RFC 3775 behavior.
section: "3"
topics:
