document: rfc-1184
kind: interoperability-note
summary: SLC_FORW2 should only be used if SLC_FORW1 is already in use. The client is required to forward buffered data upon encountering SLC_FORW1, SLC_FORW2, or any FORWARDMASK character, but may also forward on additional characters it chooses—for example, forwarding on all control characters when the terminal driver cannot restrict to a subset.
section: "5.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
