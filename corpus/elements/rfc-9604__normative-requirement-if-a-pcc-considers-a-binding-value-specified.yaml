document: rfc-9604
kind: normative-requirement
summary: If a PCC considers a binding value specified by the PCE invalid, it MUST send PCErr with Error-Type=32, Error-value=1 ('Invalid SID'). If the value is valid but cannot be allocated, it MUST send Error-Type=32, Error-value=2 ('Unable to allocate the specified binding value').
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
