document: rfc-9252
kind: protocol-element
summary: 'The SRv6 SID Information Sub-TLV (Sub-TLV Type 1) carries a single SRv6 SID and its properties: RESERVED1 (1 octet), SRv6 SID Value (16 octets), SRv6 Service SID Flags (1 octet, currently all zero), SRv6 Endpoint Behavior (2 octets, codepoint from RFC 8986 registry), RESERVED2 (1 octet), and variable SRv6 Service Data Sub-Sub-TLVs.'
section: "3.1"
topics:
    - bgp
    - routing
    - ip
