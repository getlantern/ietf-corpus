document: rfc-7144
kind: normative-requirement
summary: A sender MUST NOT set the PRI field to a non-zero value unless iSCSIProtocolLevel=2 has been negotiated; iSCSI targets MUST ignore this field unless iSCSIProtocolLevel=2 was negotiated.
section: 5.1.1
rfc2119_level: MUST NOT
