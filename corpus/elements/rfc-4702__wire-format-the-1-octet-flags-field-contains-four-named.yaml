document: rfc-4702
kind: wire-format
summary: 'The 1-octet Flags field contains four named bits: S (bit 0, server should update A RR), O (bit 1, server overrode client''s S preference), N (bit 2, no server DNS updates), and E (bit 3, domain name encoding: 1=DNS wire format, 0=deprecated ASCII). Bits 4-7 are MBZ.'
section: "2.1"
