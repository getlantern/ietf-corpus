document: rfc-3648
kind: design-rationale
summary: An ordering is considered part of the state of a collection resource, so it is the same regardless of which URI is used to access the collection and is protected by locks and access control constraints on the collection. This design aligns ordering semantics with the existing WebDAV resource-state model.
section: "4"
topics:
