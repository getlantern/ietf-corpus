document: rfc-3986
kind: interoperability-note
summary: Some parsers allow a scheme name in a relative reference when it matches the base URI scheme (a loophole from RFC 1630). This usage should be avoided but is allowed for backward compatibility; a non-strict parser may ignore such a scheme if it is identical to the base URI's scheme.
section: 5.4.2
topics:
    - http
