document: rfc-3986
kind: interoperability-note
summary: Some parsers allow a scheme name in a relative reference when it matches the base URI scheme (a loophole from RFC 1630). This usage should be avoided but is permitted for backward compatibility; a non-strict parser may choose to ignore such a matching scheme.
section: 5.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
