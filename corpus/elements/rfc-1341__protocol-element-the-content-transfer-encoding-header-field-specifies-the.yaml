document: rfc-1341
kind: protocol-element
summary: The Content-Transfer-Encoding header field specifies the encoding transformation applied to the body for transport. Defined values are BASE64, QUOTED-PRINTABLE, 8BIT, 7BIT, and BINARY; the default when the field is absent is 7BIT. Values are case-insensitive.
