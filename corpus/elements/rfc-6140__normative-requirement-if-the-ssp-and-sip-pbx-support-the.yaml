document: rfc-6140
kind: normative-requirement
summary: If the SSP and SIP-PBX support the registration event package (RFC 3680), the SSP MUST proxy a SUBSCRIBE for the reg event package addressed to a bulk-registered AOR to the SIP-PBX in the same way it would proxy an INVITE, unless the SSP can maintain accurate, up-to-date registration information independently.
section: 7.2.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
