document: rfc-7171
kind: privacy-consideration
summary: PT-EAP does not directly utilize or require knowledge of any personally identifiable information (PII). However, deployers must leverage the outer EAP tunnel's confidentiality protections to prevent disclosure of PII potentially contained within PA-TNC or PB-TNC payloads carried in PT-EAP.
