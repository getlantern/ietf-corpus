document: rfc-5914
kind: security-consideration
summary: Usage of a certificate independently of the TrustAnchorInfo structure that envelopes it must be carefully managed to avoid violating constraints expressed in TrustAnchorInfo. When enveloping a certificate, values in the certificate should be evaluated for conflicts with TrustAnchorInfo values.
section: "4"
topics:
