document: rfc-6696
kind: protocol-element
summary: 'rMSK derivation: rMSK = KDF(rRK, S) where S includes the label ''Re-authentication Master Session Key@ietf.org'', ''\0'', SEQ (the 16-bit sequence number from the EAP-Initiate/Re-auth message encoded in network byte order), and length. Using SEQ as a KDF input produces a unique rMSK for each re-authentication.'
section: "4.6"
topics:
    - crypto
    - security
