document: rfc-3414
kind: security-consideration
summary: Access to the usmUserTable must be strictly controlled because it contains authentication and privacy protocol identifiers and key-change objects. An unauthorized principal gaining write access could change security parameters for any user, including changing keys to values known to the attacker.
section: "11.5"
topics:
    - snmp
    - security
