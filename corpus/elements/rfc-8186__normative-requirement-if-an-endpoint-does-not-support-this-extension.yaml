document: rfc-8186
kind: normative-requirement
summary: If an endpoint does not support this extension, the value of the PTPv2 Timestamp flag MUST be 0, as it resides in a Must Be Zero field. A flag value of 0 indicates the node can use and interpret only NTP timestamp format.
section: "2"
rfc2119_level: MUST
topics:
    - measurement
