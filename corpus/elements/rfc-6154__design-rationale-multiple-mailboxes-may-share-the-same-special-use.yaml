document: rfc-6154
kind: design-rationale
summary: Multiple mailboxes may share the same special-use attribute, and servers may either permit or refuse creation of a duplicate-attribute mailbox. This flexibility accommodates different server implementations rather than mandating a single-mailbox-per-use constraint.
section: "3"
topics:
