summary: 'The IACD sub-TLV (OSPF Type 25, IS-IS Type 27) encodes: Lower SC (8 bits), Lower Encoding (8 bits), Upper SC (8 bits), Upper Encoding (8 bits), followed by eight 4-octet IEEE floating-point Max LSP Bandwidth fields (priority 0–7), and variable Adjustment Capability-specific information.'
