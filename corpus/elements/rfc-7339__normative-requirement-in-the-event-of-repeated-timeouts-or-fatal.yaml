document: rfc-7339
kind: normative-requirement
summary: In the event of repeated timeouts or fatal transport errors from a downstream server, the SIP client MUST stop sending requests to that server and SHOULD use exponential back-off when probing liveness.
section: "5.9"
rfc2119_level: MUST
topics:
