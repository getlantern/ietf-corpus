document: rfc-5386
kind: security-consideration
summary: The BTNS PAD entry must be last and its child SA ID constraints must be non-overlapping with any other PAD entry. This ensures that no BTNS peer can impersonate another IPsec non-BTNS peer by asserting that peer's addresses as traffic selectors.
section: "4"
topics:
    - ipsec
    - security
