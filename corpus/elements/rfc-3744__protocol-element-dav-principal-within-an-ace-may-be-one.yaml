document: rfc-3744
kind: protocol-element
summary: 'DAV:principal within an ACE may be one of: DAV:href (a specific authenticated principal URL), DAV:all (every user), DAV:authenticated, DAV:unauthenticated, DAV:property (value of a resource property), or DAV:self (the resource itself as a principal). Servers may also support DAV:invert to negate a principal match.'
section: 5.5.1
topics:
    - security
