document: rfc-9669
kind: normative-requirement
summary: 'Signed modulo (SMOD) MUST use truncated division (where -13 % 3 == -1, as in C and Go), defined as: a % n = a - n * trunc(a / n). This resolves ambiguity between language implementations where Python/Ruby differ from C/Go/Java.'
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
