document: rfc-7197
kind: protocol-element
summary: 'The ''duplication-delay'' SDP attribute specifies the relative delay in milliseconds for each additional duplication of a media stream, supporting both single and multiple duplications. It is defined as both a media-level and session-level SDP attribute using ABNF syntax: ''a=duplication-delay:'' followed by one or more space-separated integer values in milliseconds.'
section: "3"
topics:
