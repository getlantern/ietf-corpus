document: rfc-4862
kind: protocol-element
summary: The Prefix Information option's Autonomous flag indicates whether the prefix applies to stateless autoconfiguration. The link-local prefix and any prefix whose preferred lifetime exceeds valid lifetime must be silently ignored during Router Advertisement processing.
