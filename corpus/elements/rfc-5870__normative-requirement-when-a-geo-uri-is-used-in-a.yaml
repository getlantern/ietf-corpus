document: rfc-5870
kind: normative-requirement
summary: When a 'geo' URI is used in a context where it identifies the location of a Target (thus becoming part of a Location Object), the privacy requirements of RFC 3693 (GEOPRIV Requirements) MUST be met.
section: "9.2"
rfc2119_level: MUST
topics:
    - privacy
    - security
