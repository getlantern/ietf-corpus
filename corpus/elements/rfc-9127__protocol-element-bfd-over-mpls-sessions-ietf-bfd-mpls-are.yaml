document: rfc-9127
kind: protocol-element
summary: BFD-over-MPLS sessions (ietf-bfd-mpls) are organized as 'session-group' entries keyed by mpls-fec (inet:ip-prefix). Multiple BFD sessions per FEC are supported for ECMP. An 'egress' container holds BFD parameters for the egress node; since LSPs are unidirectional, there is no LSP configuration on the egress node beyond this.
section: 2.1.4
topics:
    - yang
    - netconf
    - mpls
