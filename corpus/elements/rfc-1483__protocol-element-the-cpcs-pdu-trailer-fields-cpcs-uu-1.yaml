document: rfc-1483
kind: protocol-element
summary: 'The CPCS-PDU Trailer fields: CPCS-UU (1 octet, user-to-user, no function under this encapsulation, any value allowed); CPI (1 octet, coded 0x00 for 64-bit alignment only); Length (2 octets, length of Payload in octets; 0x00 signals abort); CRC (4 octets, protects entire CPCS-PDU except the CRC field itself).'
section: "3"
