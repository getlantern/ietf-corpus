document: rfc-5052
kind: design-rationale
summary: 'Two types of FEC schemes are defined: Fully-Specified (where the encoding scheme is formally specified in an IETF RFC enabling independent implementation) and Under-Specified (where the specification is unavailable or proprietary). This distinction allows standardization of the framework without requiring all FEC algorithms to be publicly specified.'
section: "6.1"
