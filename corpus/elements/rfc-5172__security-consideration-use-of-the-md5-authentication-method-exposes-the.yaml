document: rfc-5172
kind: security-consideration
summary: Use of the MD5 authentication method exposes the link to replay attacks, where an attacker could intercept and replay a station's identity and password hash to gain network access. Implementers are advised to consult RFC 3748 for a generic threat model and framework for selecting appropriate authentication methods.
section: "3"
topics:
    - security
    - ip
