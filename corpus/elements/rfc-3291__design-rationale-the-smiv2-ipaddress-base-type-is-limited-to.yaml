document: rfc-3291
kind: design-rationale
summary: The SMIv2 IpAddress base type is limited to 4-byte IPv4 addresses and is incompatible with IPv6. This document introduces a two-object pattern (InetAddressType + InetAddress) to provide a version-neutral, extensible address representation compatible with both SMIv1 and SMIv2.
section: "1"
topics:
