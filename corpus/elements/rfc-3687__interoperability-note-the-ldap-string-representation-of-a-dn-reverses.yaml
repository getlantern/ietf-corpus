document: rfc-3687
kind: interoperability-note
summary: The LDAP string representation of a DN reverses the order of RDNs relative to X.500 order. Consequently, in a DistinguishedName value the RDN "cn=Steven Legg" in the DN "cn=Steven Legg,o=Adacel,c=AU" corresponds to component reference "3" (from-beginning) or "-1" (from-end), not "1".
section: 3.2.2.1
topics:
    - ldap
