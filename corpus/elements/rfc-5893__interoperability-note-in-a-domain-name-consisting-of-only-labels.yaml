document: rfc-5893
kind: interoperability-note
summary: In a domain name consisting of only labels that satisfy the Bidi rule, the Label Uniqueness and Character Grouping requirements are satisfied. For domain names mixing LDH labels with Bidi-rule-satisfying labels, the requirements are satisfied as long as a label starting with an ASCII digit does not come after a right-to-left label.
section: "2"
topics:
