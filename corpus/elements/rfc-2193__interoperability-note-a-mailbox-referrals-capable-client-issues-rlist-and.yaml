document: rfc-2193
kind: interoperability-note
summary: A MAILBOX-REFERRALS capable client issues RLIST and RLSUB in lieu of LIST and LSUB, so that remote mailboxes are visible. Non-capable clients will not see inaccessible remote mailboxes because they only issue LIST/LSUB.
section: "3"
topics:
