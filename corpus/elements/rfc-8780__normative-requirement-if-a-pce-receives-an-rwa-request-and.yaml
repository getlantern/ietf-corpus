document: rfc-8780
kind: normative-requirement
summary: If a PCE receives an RWA request and cannot process it due to insufficient memory, the PCE MUST send a PCErr with Error-Type=27 and Error-value=1, stop processing, and the PCC MUST cancel the corresponding RWA request.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
