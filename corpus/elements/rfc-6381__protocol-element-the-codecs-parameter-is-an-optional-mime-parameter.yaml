document: rfc-6381
kind: protocol-element
summary: The 'codecs' parameter is an optional MIME parameter whose value is a single codec identifier or a comma-separated list. Each identifier consists of one or more dot-separated elements where the first element's namespace is determined by the MIME type and subsequent elements' namespaces are determined by the preceding element.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
