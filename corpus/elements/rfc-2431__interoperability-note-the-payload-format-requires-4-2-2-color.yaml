document: rfc-2431
kind: interoperability-note
summary: The payload format requires 4:2:2 color subsampling, resulting in 720 luminance samples per scan line and 360 samples per chrominance channel for normal 4:3 aspect ratio images, totaling 1440 samples per scan line and approximately 20 MB/s of network bandwidth.
