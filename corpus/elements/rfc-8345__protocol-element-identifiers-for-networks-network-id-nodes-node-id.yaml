document: rfc-8345
kind: protocol-element
summary: Identifiers for networks (`network-id`), nodes (`node-id`), links (`link-id`), and termination points (`tp-id`) are all defined as `inet:uri`. The SHOULD requirement is that the same real-world entity always maps to the same identifier across separate datastore instantiations.
