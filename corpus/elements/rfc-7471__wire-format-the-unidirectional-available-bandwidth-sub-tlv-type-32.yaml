summary: The Unidirectional Available Bandwidth sub-TLV (type 32, length 4) carries a 32-bit IEEE 754 single-precision floating-point value in bytes per second. Available bandwidth is residual bandwidth minus bandwidth used for actual forwarding of non-RSVP-TE LSP packets.
