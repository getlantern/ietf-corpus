document: rfc-5946
kind: state-machine
summary: 'A Receiver Proxy transitions from proxied-reservation state to regular-RSVP-midpoint state upon receiving a Resv message from downstream (indicating an RSVP-capable receiver or downstream Receiver Proxy exists). Trigger: receipt of downstream Resv. From that point it behaves as if it never acted as a Receiver Proxy for the flow.'
