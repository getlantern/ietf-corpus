document: rfc-9086
kind: wire-format
summary: 'BGP Peering SID TLV format consists of: 2-octet Type (1101/1102/1103), 2-octet Length (7 or 8), 1-octet Flags (V/L/B/P bits), 1-octet Weight, 2-octet Reserved, and a variable SID/Label/Index field (3 octets for label, 4 octets for index).'
