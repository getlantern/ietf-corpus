document: rfc-4622
kind: security-consideration
summary: The full Unicode character range permitted in XMPP IRIs may facilitate address spoofing (phishing/homograph attacks). Applications presenting XMPP IRIs to users must adhere to best practices regarding address mimicking as described in the IRI security considerations.
section: "5.6"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
