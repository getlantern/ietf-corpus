document: rfc-6546
kind: normative-requirement
summary: Wildcards MUST NOT appear in the DNS-ID or CN-ID of a certificate identifying a RID system. RID systems MUST verify the reference identifiers of their peers against those stored in presented certificates.
section: "3"
rfc2119_level: MUST NOT
