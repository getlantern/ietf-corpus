document: rfc-7480
kind: normative-requirement
summary: Clients SHOULD use either the HTTP GET or HEAD methods for RDAP queries. Servers are under no obligation to support other HTTP methods, so clients using other methods will likely not interoperate properly.
section: "4.1"
rfc2119_level: SHOULD
topics:
