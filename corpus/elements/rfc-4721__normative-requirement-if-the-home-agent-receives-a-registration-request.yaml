document: rfc-4721
kind: normative-requirement
summary: If the home agent receives a Registration Request with the Mobile-Foreign Challenge extension and recognizes it, the home agent MUST include the Challenge extension in the Registration Reply, placed after the Mobile-Home authentication extension.
section: "3.4"
rfc2119_level: MUST
