document: rfc-9635
kind: normative-requirement
summary: The grant request MUST be sent as a JSON object in the body of an HTTP POST to the AS grant endpoint with Content-Type application/json. A key proofing mechanism MAY define an alternative content type as long as the content is formed from the JSON object.
section: "2"
rfc2119_level: MUST
topics:
    - http
    - json
    - oauth
