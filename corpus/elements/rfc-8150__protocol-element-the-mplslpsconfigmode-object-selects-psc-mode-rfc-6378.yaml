document: rfc-8150
kind: protocol-element
summary: The mplsLpsConfigMode object selects PSC mode (RFC 6378) or APS mode (RFC 7271). Changing this value during operation causes the LER to generate PSC packets with a new Capabilities TLV, resulting in mplsLpsEventCapabilitiesMismatch notifications at both LERs. Both LERs MUST be restarted with the same new value when changing mode.
section: "8"
topics:
