document: rfc-3015
kind: normative-requirement
summary: The MG SHALL include mandatory properties and their values in its response to Local/Remote descriptors even when those properties were absent from the MGC's request (e.g., detailed video encoding parameters when only payload type was specified). A new Local or Remote Descriptor completely replaces the prior setting.
section: 7.1.8
rfc2119_level: SHALL
topics:
    - realtime
