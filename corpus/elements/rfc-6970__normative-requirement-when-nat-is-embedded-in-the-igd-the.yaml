document: rfc-6970
kind: normative-requirement
summary: When NAT is embedded in the IGD, the IGD-PCP IWF MUST update PCP requests with the IP address and/or port number belonging to the external interface of the IGD (i.e., post-NAT1), replacing any internal host addresses provided by the IGD Control Point.
section: "5.5"
rfc2119_level: MUST
topics:
    - nat
