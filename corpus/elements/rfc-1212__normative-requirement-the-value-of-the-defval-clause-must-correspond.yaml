document: rfc-1212
kind: normative-requirement
summary: The value of the DEFVAL clause must correspond to the SYNTAX clause for the object. If no acceptable default value exists for any columnar object in a row where instance creation is allowed, the INDEX objects must have ACCESS read-write so the management station can supply all required values.
section: 4.1.7
rfc2119_level: MUST
topics:
