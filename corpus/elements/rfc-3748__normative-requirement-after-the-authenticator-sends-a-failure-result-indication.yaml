document: rfc-3748
kind: normative-requirement
summary: After the authenticator sends a failure result indication to the peer, it MUST subsequently send a Failure packet regardless of the peer's response. After exchanging success result indications, the authenticator MUST send a Success packet. On the peer side, once the method completes unsuccessfully, the peer MUST terminate the conversation and indicate failure to the lower layer.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
