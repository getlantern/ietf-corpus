document: rfc-8044
kind: wire-format
summary: The 'vsa' data type (value 14) encodes a 4-octet Vendor-Id (IANA PEN) followed by one or more octets of VSA-Data. It MUST only appear in the Attr-Data field of a Vendor-Specific Attribute and MUST NOT appear in the contents of any other data type.
section: "3.14"
