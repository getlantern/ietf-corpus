document: rfc-9758
kind: protocol-element
summary: A Fully Qualified Node Number (FQNN) is the combination of the Allocator Identifier and Node Number components of an ipn URI and uniquely identifies a particular node. The term FQNN MUST be used when referring to a node identifier to avoid confusion with the raw Node Number component alone.
section: 3.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
