document: rfc-9244
kind: protocol-element
summary: Mitigation efficacy telemetry (Section 9.1, DOTS client to server) reports the client's assessment of how well the ongoing mitigation is working, including total-traffic, total-attack-traffic, and attack-detail attributes. Mitigation status telemetry (Section 9.2, DOTS server to client) provides the server's view of the attack and its mitigation actions.
