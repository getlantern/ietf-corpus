document: rfc-3042
kind: design-rationale
summary: Without Limited Transmit, when an ACK for new data arrives following packet reordering, a burst of segments is sent. Limited Transmit clocks data out via incoming ACKs, reducing burstiness in the presence of reordering.
section: "2"
topics:
