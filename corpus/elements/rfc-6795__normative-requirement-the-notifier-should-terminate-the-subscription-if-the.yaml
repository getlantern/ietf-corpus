document: rfc-6795
kind: normative-requirement
summary: The notifier SHOULD terminate the subscription if the policy decision is to reject a session and this decision will not change in the foreseeable future. The notifier SHOULD keep the subscription alive if rejection is temporary and resources may become available soon.
section: "3.8"
rfc2119_level: SHOULD
topics:
    - sip
