document: rfc-9261
kind: normative-requirement
summary: The signature scheme used in CertificateVerify MUST be a valid TLS 1.3 signature scheme; this excludes all RSASSA-PKCS1-v1_5 algorithms and ECDSA combined with hash algorithms not supported in TLS 1.3. If an authenticator request is present, the algorithm MUST be chosen from the 'signature_algorithms' extension of the request.
section: 5.2.2
rfc2119_level: MUST
topics:
    - tls
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
