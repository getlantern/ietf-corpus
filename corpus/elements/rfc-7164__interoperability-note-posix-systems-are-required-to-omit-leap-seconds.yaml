document: rfc-7164
kind: interoperability-note
summary: POSIX systems are required to omit leap seconds from reported time, with implementations varying between repeating the last second, mirroring NTP behavior, or warping time. Timestamps within the last second of a leap-second day are therefore ambiguous.
section: "3.3"
topics:
    - rtp
    - realtime
