document: rfc-5324
kind: wire-format
summary: 'T11FcSpType is a 2-octet OCTET STRING encoding the frame type identifier: for FC-2 frames the first octet is zero and the second contains the TYPE value; for CT_IUs the first octet is GS_Type and the second is GS_Subtype. Comparison is done numerically as (256 × 1st-octet) + 2nd-octet.'
section: "6.1"
topics:
