document: rfc-1035
kind: normative-requirement
summary: During a zone transfer via AXFR, a master must never send part of one zone version and part of another. If a new version is created mid-transfer, the master should continue with the old version or reset the connection.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - dns
