document: rfc-7579
kind: wire-format
summary: The Available Labels Field consists of an 8-bit PRI (Priority Flags) bitmap followed by Reserved bits and a variable-length Label Set Field. The PRI bitmap uses bit 0 (leftmost) for the highest priority (0) and bit 7 (rightmost) for the lowest priority (7).
