document: rfc-4702
kind: normative-requirement
summary: Clients that send the Client FQDN option in their messages MUST NOT also send the Host Name option. Clients that receive both options from a server SHOULD prefer the Client FQDN option data.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - dns
