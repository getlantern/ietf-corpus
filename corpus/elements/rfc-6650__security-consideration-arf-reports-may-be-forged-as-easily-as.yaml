document: rfc-6650
kind: security-consideration
summary: ARF reports may be forged as easily as ordinary Internet email. Feedback Providers that relay user complaints directly (rather than by reference to a stored message) could be duped into reporting a message the complaining user never received, enabling attacks on the purported originator. Reports SHOULD themselves be signed with DKIM and/or authorized by SPF.
section: "7.2"
topics:
    - email
    - security
