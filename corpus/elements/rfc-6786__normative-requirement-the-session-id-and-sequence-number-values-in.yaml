document: rfc-6786
kind: normative-requirement
summary: The Session ID and Sequence Number values in the AES128_CTR nonce SHALL be the same as those in the PANA message carrying the Encryption-Encap AVP. The Key-Id value SHALL be the same as the one used for deriving the encryption keys.
section: "4.1"
rfc2119_level: SHALL
topics:
