document: rfc-6872
kind: design-rationale
summary: Syslog is unsuitable as a primary SIP CLF mechanism because it mixes records from many originators requiring extra filtering, a collector may be unreachable (e.g., mobile clients), and sending every SIP log message to a remote collector imposes unacceptable overhead.
section: "5.3"
topics:
    - sip
    - realtime
    - syslog
