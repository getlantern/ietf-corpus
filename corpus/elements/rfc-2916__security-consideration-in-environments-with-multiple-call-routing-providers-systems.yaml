document: rfc-2916
kind: security-consideration
summary: In environments with multiple call routing providers, systems that allow users or their agents to change routing or supplier information may provide incentives for unauthorized changes or denial of legitimate change requests. Adequate mechanisms for identification, authentication, and authorization of change requesters are required.
section: "5"
topics:
