document: rfc-5321
kind: normative-requirement
summary: Contemporary SMTP implementations MUST support the basic extension mechanisms. Servers MUST support the EHLO command even if they do not implement any specific extensions, and clients and servers MUST support the original HELO mechanism as a fallback.
section: 2.2.1
rfc2119_level: MUST
topics:
    - email
