document: rfc-5789
kind: security-consideration
summary: Servers MUST take adequate precautions to ensure that malicious clients cannot consume excessive server resources (e.g., CPU, disk I/O) through the use of PATCH. Authorization and data integrity protections applicable to PUT apply equally to PATCH.
