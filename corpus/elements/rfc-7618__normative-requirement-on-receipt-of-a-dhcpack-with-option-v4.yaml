document: rfc-7618
kind: normative-requirement
summary: On receipt of a DHCPACK with OPTION_V4_PORTPARAMS, the client MUST NOT perform an in-use probe (e.g., ARP for duplicate address detection) on the allocated shared IPv4 address, because the same address is legitimately used by other clients.
section: "6"
rfc2119_level: MUST NOT
topics:
    - ip
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
