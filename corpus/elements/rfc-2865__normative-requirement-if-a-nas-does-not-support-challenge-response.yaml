document: rfc-2865
kind: normative-requirement
summary: If a NAS does not support challenge/response, it MUST treat an Access-Challenge as though it had received an Access-Reject. Similarly, if a NAS cannot forward a Reply-Message to the PAP dialing client, it MUST treat the Access-Challenge as an Access-Reject.
section: "4.4"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
