document: rfc-5027
kind: design-rationale
summary: Key duplication during precondition establishment (repeating the same crypto/key-mgmt data in the second offer/answer exchange) is not a replay attack. Implementations may recognize that the key management protocol data is identical and avoid forwarding it to the security layer for reprocessing.
