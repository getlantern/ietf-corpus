summary: 'The Link Layer Address Option for Neighbor Discovery between IPv6/NBMA interfaces is: [Type 1 octet][Length 1 octet][NTL 1 octet][STL 1 octet][NBMA Number variable][NBMA Subaddress variable, optional], padded to a multiple of 8 octets. Type 1 = source, Type 2 = target link-layer address.'
