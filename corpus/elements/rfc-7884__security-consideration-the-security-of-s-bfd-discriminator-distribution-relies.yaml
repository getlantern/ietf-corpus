document: rfc-7884
kind: security-consideration
summary: The security of S-BFD Discriminator distribution relies entirely on the security of OSPF. OSPF provides no encryption for LSA privacy, but this is not a concern because there is no need to hide discriminator values used to reach S-BFD reflectors.
