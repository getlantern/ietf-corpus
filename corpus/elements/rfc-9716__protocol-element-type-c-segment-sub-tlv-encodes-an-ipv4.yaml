document: rfc-9716
kind: protocol-element
summary: Type-C Segment sub-TLV encodes an IPv4 Node Address (mandatory, 4 octets), SR Algorithm (1 octet, used when A-Flag is set), and an optional SID (4 octets). When the SID field is present, it MUST be used for constructing the Reply Path.
section: "4.2"
topics:
    - routing
