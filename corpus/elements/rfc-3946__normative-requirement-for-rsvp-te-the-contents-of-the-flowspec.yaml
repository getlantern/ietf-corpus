document: rfc-3946
kind: normative-requirement
summary: For RSVP-TE, the contents of the FLOWSPEC object received in a Resv message SHOULD be identical to the SENDER_TSPEC object in the corresponding Path message. If they do not match, a ResvErr message with 'Traffic Control Error/Bad Flowspec value' SHOULD be generated.
section: "2.2"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
