document: rfc-8945
kind: protocol-element
summary: 'TSIG RR fixed fields: TYPE MUST be 250 (TSIG), CLASS MUST be ANY, TTL MUST be 0. The NAME field holds the key identifier in domain name syntax and SHOULD be globally unique to allow identification among a set of interacting hosts.'
