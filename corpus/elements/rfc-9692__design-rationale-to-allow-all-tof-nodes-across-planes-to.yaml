document: rfc-9692
kind: design-rationale
summary: To allow all ToF nodes across planes to share the same north topology database—required for transitive negative disaggregation to heal fallen leaves—ToF nodes in multi-plane fabrics are interconnected by bidirectional inter-plane rings, reserving at least two ports per ToF node. Rings are preferred over other topologies because they require fewer cables and have shorter flooding paths without single points of failure.
section: "5.4"
topics:
    - routing
