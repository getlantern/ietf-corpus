document: rfc-3736
kind: interoperability-note
summary: The operation of relay agents is identical for stateless and stateful DHCP service. A network element can simultaneously provide stateless DHCP service to hosts needing only configuration and relay stateful address-assignment messages to another DHCP server.
section: "1"
