document: rfc-5560
kind: normative-requirement
summary: The implementation MUST specify which packet fields are compared when deciding whether two packets are identical. For IPv4, these typically include version, ihl, identification, src, dst, protocol, and upper-layer data; for IPv6, version, next header, source, destination, and upper-layer data.
section: "2.5"
rfc2119_level: MUST
topics:
    - measurement
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
