document: rfc-3440
kind: normative-requirement
summary: The value of ifOperStatus (RFC 2863) SHALL be down(2) when the ADSL line interface is in G.Lite power state L3 (no power), and shall be up(1) for power states L0 or L1. Power state L2 is not applicable.
