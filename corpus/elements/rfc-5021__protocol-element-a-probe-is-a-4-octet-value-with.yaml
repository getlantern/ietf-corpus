document: rfc-5021
kind: protocol-element
summary: A PROBE is a 4-octet value with only the high bit set and the extension bitmask all zeros (i.e., the value has the high bit set but no extension bits set). A client sends a PROBE to discover which extensions a KDC supports before committing to a specific extension.
section: "3"
