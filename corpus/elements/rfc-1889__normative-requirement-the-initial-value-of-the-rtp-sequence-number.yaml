document: rfc-1889
kind: normative-requirement
summary: The initial value of the RTP sequence number must be random (unpredictable) to make known-plaintext attacks on encryption more difficult, even if the source itself does not encrypt, because packets may flow through a translator that does.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - security
    - realtime
