document: rfc-7825
kind: wire-format
summary: 'The ''candidates'' RTSP transport header parameter carries ICE candidates using the fields: foundation, component-id, transport, priority, connection-address, port, cand-type, optional rel-addr/rel-port, mandatory tcp-type-ext for TCP candidates, and optional extension attributes. Multiple candidates are semicolon-separated within a double-quoted string.'
