document: rfc-5651
kind: security-consideration
summary: The Close Session (A) and Close Object (B) flags can be manipulated to cause receivers to incorrectly terminate or continue receiving. The SCT and ERT time fields can be exploited to de-synchronize clients or mount DoS attacks. All these fields MUST be protected by protocol instantiation security mechanisms.
section: "8.1"
topics:
    - security
    - multicast
