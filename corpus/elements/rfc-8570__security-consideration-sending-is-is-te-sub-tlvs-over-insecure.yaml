document: rfc-8570
kind: security-consideration
summary: 'Sending IS-IS TE sub-TLVs over insecure links creates a man-in-the-middle risk: an attacker could delay real-time data to a site or destination, degrading the value of latency-sensitive traffic. The IS-IS cryptographic authentication mechanism (RFC 5304) SHOULD be used to mitigate this risk.'
section: "11"
topics:
    - security
    - routing
