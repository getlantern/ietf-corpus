document: rfc-8724
kind: normative-requirement
summary: In No-ACK mode, the W field MUST NOT be present; SCHC ACK and SCHC ACK REQ MUST NOT be sent; SCHC Receiver-Abort MUST NOT be sent; SCHC Sender-Abort MAY be sent. N (FCN field size) is RECOMMENDED to be 1. Tiles must be transmitted in the order they appear in the SCHC Packet.
section: 8.4.1
rfc2119_level: MUST NOT
topics:
    - ip
