document: rfc-4941
kind: privacy-consideration
summary: IPv6 stateless address autoconfiguration embeds a fixed interface identifier (derived from an IEEE MAC address) into every global address, enabling eavesdroppers to correlate seemingly unrelated transactions across time and topology changes, even when upper-layer payloads are encrypted.
section: "1.2"
topics:
    - privacy
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
