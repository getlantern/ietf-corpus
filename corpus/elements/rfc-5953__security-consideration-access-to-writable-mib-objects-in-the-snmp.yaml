document: rfc-5953
kind: security-consideration
summary: Access to writable MIB objects in the SNMP-TLS-TM-MIB (e.g., snmpTlstmCertToTSNTable, snmpTlstmAddrTable, snmpTlstmParamsTable) must be carefully controlled, as misconfiguration can allow unauthorized principals to be authenticated or valid sessions to be rejected.
section: "9.4"
topics:
