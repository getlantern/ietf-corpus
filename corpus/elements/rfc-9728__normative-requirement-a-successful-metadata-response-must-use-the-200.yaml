document: rfc-9728
kind: normative-requirement
summary: A successful metadata response MUST use the 200 OK HTTP status code and return a JSON object using the application/json content type. Any metadata parameters that are not understood MUST be ignored. Parameters with zero values MUST be omitted from the response.
section: "3.2"
rfc2119_level: MUST
topics:
    - oauth
    - http
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
