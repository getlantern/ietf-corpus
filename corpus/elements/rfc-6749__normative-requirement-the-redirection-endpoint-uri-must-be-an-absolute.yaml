document: rfc-6749
kind: normative-requirement
summary: The redirection endpoint URI MUST be an absolute URI and MUST NOT include a fragment component. Public clients and confidential clients using the implicit grant MUST register their redirection endpoint. If a redirect URI is missing, invalid, or mismatching, the authorization server MUST NOT automatically redirect the user-agent.
section: 3.1.2
rfc2119_level: MUST
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
