document: rfc-7400
kind: security-consideration
summary: Implementations must guard against buffer overflows and out-of-area backreferences during decompression. The backreferencing mechanism could be exploited to reference memory outside the valid expansion buffer if not carefully bounds-checked.
section: "5"
topics:
