document: rfc-7743
kind: security-consideration
summary: A receiver of an MPLS Echo Request MAY verify that the first address in the Relay Node Address Stack TLV matches the source IP address of the received IP header as an integrity check against spoofed or malformed relay stacks.
section: "6"
rfc2119_level: MAY
topics:
