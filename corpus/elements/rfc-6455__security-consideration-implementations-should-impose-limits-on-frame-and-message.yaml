document: rfc-6455
kind: security-consideration
summary: Implementations should impose limits on frame and message sizes, header field lengths, and connection counts to mitigate resource exhaustion. Servers can reduce load during attacks by delaying closure to reduce client reconnection rates.
section: "10.4"
topics:
    - websocket
    - security
