document: rfc-9561
kind: protocol-element
summary: Client fencing uses NVMe Persistent Reservations (PRs). Both the MDS and clients register a reservation key with the storage device, and the MDS creates an Exclusive Access - Registrants Only Reservation (RTYPE=4h) using the Reservation Acquire command.
