document: rfc-6570
kind: design-rationale
summary: Operator characters were chosen to match their roles as reserved characters in URI generic syntax (".", "/", ";", "?", "&", "#"), so the single-character operators correspond to the delimiter they introduce. This makes Level 1-3 templates readable without knowing the spec.
section: "1.3"
topics:
    - http
