document: rfc-4694
kind: normative-requirement
summary: When retrieving freephone NP information and the CIC belongs to another service provider, the network node MUST add the "cic" parameter. If a geographical telephone number is retrieved (first or second DB access), the node MUST replace the freephone number in the "tel" URI with the geographical number.
section: 5.2.2
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
