document: rfc-5092
kind: security-consideration
summary: Clients resolving IMAP URLs that wish to achieve data confidentiality and/or integrity SHOULD use STARTTLS (if supported) before authentication, or use a SASL mechanism such as GSSAPI that provides a confidentiality security layer.
