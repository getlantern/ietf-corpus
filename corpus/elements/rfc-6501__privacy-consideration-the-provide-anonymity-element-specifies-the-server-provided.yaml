document: rfc-6501
kind: privacy-consideration
summary: 'The <provide-anonymity> element specifies the server-provided anonymity level for a participant: ''private'' (completely anonymous identity), ''semi-private'' (anonymous to unprivileged users), or ''hidden'' (completely invisible to other participants). Real user information is stored in the data model but SHOULD NOT be provided to other conference participants.'
section: 4.6.5.1
rfc2119_level: SHOULD NOT
topics:
    - privacy
    - realtime
