document: rfc-3460
kind: normative-requirement
summary: Implementations MUST support the FirstMatching decision strategy; implementations MAY support the AllMatching decision strategy. FirstMatching enforces actions only for the highest-priority rule whose conditions evaluate to TRUE; AllMatching enforces all matching rules.
section: "5.5"
rfc2119_level: MUST
topics:
    - qos
