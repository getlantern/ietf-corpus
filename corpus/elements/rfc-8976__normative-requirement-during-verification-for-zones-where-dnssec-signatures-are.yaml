document: rfc-8976
kind: normative-requirement
summary: During verification, for zones where DNSSEC signatures are expected, the SOA and ZONEMD RRsets MUST have valid signatures chaining up to a trust anchor; if DNSSEC validation fails, digest verification MUST NOT be considered successful.
section: "4"
rfc2119_level: MUST
topics:
    - dns
    - security
