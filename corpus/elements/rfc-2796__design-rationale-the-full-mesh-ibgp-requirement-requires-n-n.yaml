document: rfc-2796
kind: design-rationale
summary: The full mesh IBGP requirement requires n*(n-1)/2 unique IBGP sessions for n BGP speakers, which does not scale for large networks. Route Reflection allows a Route Reflector to re-advertise IBGP-learned routes to other IBGP peers, eliminating the need for full mesh.
section: "1"
topics:
    - bgp
    - routing
