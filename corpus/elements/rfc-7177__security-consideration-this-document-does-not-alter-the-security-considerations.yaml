document: rfc-7177
kind: security-consideration
summary: This document does not alter the security considerations of the TRILL base protocol (RFC 6325, Section 6). IS-IS authentication via the Authentication TLV may be used on TRILL links; a Hello that fails authentication validation is discarded. BFD security considerations are addressed in RFC 7175.
section: "11"
topics:
