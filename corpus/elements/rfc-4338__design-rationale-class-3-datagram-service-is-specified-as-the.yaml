document: rfc-4338
kind: design-rationale
summary: Class 3 (datagram service) is specified as the recommended FC class for IP traffic because Classes 1 and 6 are specialized for avionics and dedicated connections, while Class 3 is commonly used for storage networking and supports the broadcast required for multicast/ARP.
