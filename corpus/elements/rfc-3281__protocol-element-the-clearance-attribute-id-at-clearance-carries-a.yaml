summary: The Clearance attribute (id-at-clearance) carries a policyId OID, a classList BIT STRING with values unmarked(0)/unclassified(1)/restricted(2)/confidential(3)/secret(4)/topSecret(5), and an optional SET OF SecurityCategory. BIT STRING positions 0-5 are reserved for this basic hierarchy.
