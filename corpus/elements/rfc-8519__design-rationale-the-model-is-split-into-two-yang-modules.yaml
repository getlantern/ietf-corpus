document: rfc-8519
kind: design-rationale
summary: 'The model is split into two YANG modules: ''ietf-access-control-list'' (generic ACL structure) and ''ietf-packet-fields'' (header-field groupings). The separation keeps the base module simple and allows packet-field groupings to be reused independently in other models.'
