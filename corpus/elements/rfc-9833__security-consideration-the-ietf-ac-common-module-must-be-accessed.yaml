document: rfc-9833
kind: security-consideration
summary: The 'ietf-ac-common' module must be accessed via YANG management protocols (NETCONF/RESTCONF) using a secure transport layer (SSH, TLS, or QUIC) with mutual authentication. NACM (RFC 8341) should be used to restrict access to authorized users.
