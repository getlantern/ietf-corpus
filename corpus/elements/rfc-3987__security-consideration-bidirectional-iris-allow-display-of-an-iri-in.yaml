document: rfc-3987
kind: security-consideration
summary: 'Bidirectional IRIs allow display of an IRI in a way that differs from its logical storage, enabling spoofing: an attacker could present a visually harmless IRI whose logical (transmitted) form is a different, malicious identifier. Section 4 restrictions mitigate but do not eliminate this risk.'
section: "8"
topics:
