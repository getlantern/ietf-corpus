document: rfc-927
kind: normative-requirement
summary: The default for the TUID option is WON'T TUID on the user side and DON'T TUID on the server side. A TELNET user host not implementing or using TUID will reply WON'T TUID to a DO TUID; a TELNET server host will reply DON'T TUID to a WILL TUID.
section: "3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
