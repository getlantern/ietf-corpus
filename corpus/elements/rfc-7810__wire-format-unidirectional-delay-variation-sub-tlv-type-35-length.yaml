document: rfc-7810
kind: wire-format
summary: 'Unidirectional Delay Variation sub-TLV (Type 35, Length 4): 8 reserved bits and a 24-bit Delay Variation field in microseconds as an integer. This sub-TLV omits the A bit (intentionally, to mitigate oscillations). A value of 0 indicates the metric has not been measured.'
