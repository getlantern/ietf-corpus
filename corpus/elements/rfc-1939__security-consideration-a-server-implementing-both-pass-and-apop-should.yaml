document: rfc-1939
kind: security-consideration
summary: A server implementing both PASS and APOP should not permit both authentication methods for the same user; for a given mailbox, only USER/PASS or APOP should be accepted, not both, to prevent downgrade to the weaker method.
section: "13"
topics:
