document: rfc-1349
kind: normative-requirement
summary: An ICMP error message (types 3, 4, 5, 11, 12) is always sent with the default TOS (0000). An ICMP reply message is sent with the same TOS value as was used in the corresponding ICMP request message.
section: "5.1"
rfc2119_level: MUST
topics:
    - ip
    - qos
