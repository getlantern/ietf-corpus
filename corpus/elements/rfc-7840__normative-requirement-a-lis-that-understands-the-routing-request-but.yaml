document: rfc-7840
kind: normative-requirement
summary: A LIS that understands the routing request but cannot obtain routing information for the end-device's location MUST set the defaultRoute attribute to 'true' and return a default PSAP or gateway URI along with the location information in the locationResponse.
section: "4"
rfc2119_level: MUST
