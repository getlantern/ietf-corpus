document: rfc-5321
kind: design-rationale
summary: The 251 (forwarding address) and 551 (user not local, forwarding suggested) reply codes are optional and potentially expose private address information. Implementations that support them SHOULD provide configuration mechanisms to disable or restrict their use for privacy-sensitive deployments.
section: "3.4"
topics:
    - email
    - privacy
