document: rfc-9092
kind: protocol-element
summary: An optional RPKI-based CMS detached signature may be appended to a geofeed file as '#' comments; it is a digest of the file body signed by the private key of the relevant RPKI certificate covering the geofeed's address range, bundled with the signing certificate.
