document: rfc-1450
kind: protocol-element
summary: 'The SNMPv1 Statistics Group provides two Counter32 objects: snmpV1BadCommunityNames (SNMPv1 messages using an unknown community name) and snmpV1BadCommunityUses (SNMPv1 messages containing an operation not allowed for the named community). This group is mandatory only for SNMPv2 entities that also implement SNMPv1.'
section: "3.2"
