document: rfc-3860
kind: normative-requirement
summary: When end-to-end security is required, the message operation MUST use MSGFMT and MUST secure the MSGFMT MIME body with S/MIME using CMS EnvelopeData (encryption) and/or CMS SignedData (signatures).
