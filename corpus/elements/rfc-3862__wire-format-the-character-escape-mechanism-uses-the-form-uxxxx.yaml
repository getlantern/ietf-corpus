document: rfc-3862
kind: wire-format
summary: The character escape mechanism uses the form \uxxxx where xxxx is exactly four hexadecimal digits representing the UCS code-point. Special sequences include \\, \", \', \b, \t, \n, and \r. This mechanism MUST be used for control characters (U+0000–U+001F or U+007F) appearing anywhere in a header.
section: "2.3"
topics:
    - realtime
