document: rfc-7727
kind: state-machine
summary: The ICCP STP application connection transitions to operational state when both PEs have sent and received STP Connect TLVs with A-bit=1. A PE sets A-bit=0 initially, then MUST resend with A-bit=1 upon receiving a Connect TLV from its peer, triggering the operational state.
section: 4.2.1
topics:
    - routing
