document: rfc-5905
kind: design-rationale
summary: NTP uses UDP rather than TCP because retransmissions in a reliable transport protocol would increase measured delay values and introduce errors; the returnable-time on-wire protocol depends only on measured clock offsets and is inherently tolerant of lost or reordered packets without needing retransmission.
section: "1"
topics:
    - ntp
