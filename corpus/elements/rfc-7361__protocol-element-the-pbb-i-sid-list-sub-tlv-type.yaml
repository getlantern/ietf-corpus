document: rfc-7361
kind: protocol-element
summary: The PBB I-SID List Sub-TLV (type 0x0408) carries one or more 24-bit I-SIDs identifying the I-component FIBs where MAC flushing should occur. A zero-length value (empty I-SID list) means flushing applies to all I-SIDs mapped to the B-VPLS indicated by the FEC TLV.
section: "5.2"
topics:
    - mpls
