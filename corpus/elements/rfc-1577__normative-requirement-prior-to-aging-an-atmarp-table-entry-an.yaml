document: rfc-1577
kind: normative-requirement
summary: Prior to aging an ATMARP table entry, an ATMARP server MUST generate an InARP_REQUEST on any open VC associated with that entry; if an InARP_REPLY is received, the entry is updated and not deleted. If no open VC exists, the entry is deleted.
section: "6.5"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
