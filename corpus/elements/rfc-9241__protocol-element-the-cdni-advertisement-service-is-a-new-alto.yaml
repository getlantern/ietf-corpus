document: rfc-9241
kind: protocol-element
summary: The CDNI Advertisement Service is a new ALTO service that conveys JSON objects of media type 'application/alto-cdni+json', transporting BaseAdvertisementObject objects defined in RFC 8008. It enables a dCDN to advertise its footprints and capabilities to a uCDN via the ALTO protocol.
