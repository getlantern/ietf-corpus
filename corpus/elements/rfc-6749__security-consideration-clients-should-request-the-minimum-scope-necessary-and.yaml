document: rfc-6749
kind: security-consideration
summary: Clients should request the minimum scope necessary and resource owners should be informed of the scope granted. Authorization servers must ensure that access tokens cannot be used to impersonate the resource owner to a greater degree than the original authorization grant permitted.
section: "10.3"
topics:
    - oauth
    - security
