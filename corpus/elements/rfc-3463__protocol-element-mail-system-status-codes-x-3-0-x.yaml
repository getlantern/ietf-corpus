summary: 'Mail system status codes X.3.0–X.3.5 cover system-level conditions: mail system storage exceeded (X.3.1, persistent transient), system not accepting network messages (X.3.2), unsupported features (X.3.3), message too big for system (X.3.4, permanent), and system misconfiguration (X.3.5).'
