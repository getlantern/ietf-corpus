document: rfc-3284
kind: design-rationale
summary: The minimum COPY instruction size of 4 in the default code table was chosen based on experiments showing that excluding short matches (less than 4 bytes) improved overall compression rates. The code table design allows encoders to override this for domain-specific data.
section: "5.6"
