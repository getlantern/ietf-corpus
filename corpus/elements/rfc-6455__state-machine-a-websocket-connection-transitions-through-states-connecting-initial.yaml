document: rfc-6455
kind: state-machine
summary: 'A WebSocket connection transitions through states: CONNECTING (initial, during handshake), OPEN (after successful handshake; data exchange permitted), CLOSING (after a Close frame has been sent or received), and CLOSED (after underlying TCP connection is closed). The ''Fail the WebSocket Connection'' procedure forces transition to CLOSED.'
section: "4.1"
topics:
    - websocket
