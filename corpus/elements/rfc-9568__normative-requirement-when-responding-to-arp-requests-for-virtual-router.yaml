document: rfc-9568
kind: normative-requirement
summary: When responding to ARP requests for Virtual Router IPv4 addresses, the Active Router MUST respond with the Virtual Router MAC address, not its physical MAC address. This ensures hosts always use the same MAC address regardless of which router is currently Active.
section: 8.1.2
rfc2119_level: MUST
topics:
    - routing
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
