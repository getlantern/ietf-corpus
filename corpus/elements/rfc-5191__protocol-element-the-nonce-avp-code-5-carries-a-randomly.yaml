document: rfc-5191
kind: protocol-element
summary: The Nonce AVP (code 5) carries a randomly chosen OctetString of 8–256 octets. The recommended maximum length is 20 octets (full HMAC-SHA1 output length). If both peers are trusted to generate random values, 10 octets (half the PRF key length) suffices; otherwise the full PRF key length is required.
section: "8.5"
