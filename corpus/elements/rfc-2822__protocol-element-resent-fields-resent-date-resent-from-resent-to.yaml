document: rfc-2822
kind: protocol-element
summary: Resent fields ('Resent-Date:', 'Resent-From:', 'Resent-To:', etc.) are prepended as a block when a user reintroduces a message into the transport system. They are strictly informational and MUST NOT be used in normal reply processing.
