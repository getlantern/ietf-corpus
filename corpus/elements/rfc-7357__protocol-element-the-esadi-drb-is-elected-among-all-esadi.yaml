document: rfc-7357
kind: protocol-element
summary: The ESADI DRB is elected among all ESADI instances for a Data Label by choosing the instance with the highest 7-bit priority (from the ESADI Parameter APPsub-TLV), with ties broken by System ID. The DRB issues ESADI-CSNP PDUs and responds to ESADI-PSNP PDUs but never creates a pseudonode.
section: "3"
topics:
