document: rfc-6826
kind: normative-requirement
summary: An ingress LSR MUST NOT use a particular opaque value type in an mLDP FEC Element unless it knows (through provisioning or other out-of-band means) that the root LSR supports the root-node procedures for that opaque value type.
section: "2"
rfc2119_level: MUST NOT
topics:
    - mpls
    - multicast
    - routing
