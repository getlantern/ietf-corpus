document: rfc-9289
kind: interoperability-note
summary: 'RPC-with-TLS fully interoperates with RPC implementations that do not support TLS: when a TLS-capable peer encounters one without TLS support, local policy determines whether to continue without TLS or terminate. The AUTH_TLS mechanism is designed so that a legacy server simply returns an error, not a STARTTLS token.'
section: "4.1"
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
