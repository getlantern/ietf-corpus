document: rfc-9836
kind: protocol-element
summary: The 'ac-glue' feature is defined to indicate that a VPN implementation supports binding a specific VPN network access or site access to an AC. Augmentations that glue a single network access entry to an AC are guarded by 'if-feature ac-glue'.
