document: rfc-9126
kind: normative-requirement
summary: The authorization server MUST validate authorization requests arising from a pushed request as it would any other authorization request. Authorization server policy MAY require PAR as the only means of passing authorization request data, refusing requests without a PAR-obtained 'request_uri' with 'invalid_request'.
section: "4"
rfc2119_level: MUST
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
