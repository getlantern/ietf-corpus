document: rfc-7692
kind: normative-requirement
summary: A server MUST NOT accept a PMCE extension negotiation offer together with another extension if the PMCE will conflict with that extension on their use of the RSV1 bit. A client receiving a response accepting such a conflicting combination MUST Fail the WebSocket Connection.
section: "5"
rfc2119_level: MUST NOT
topics:
    - websocket
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
