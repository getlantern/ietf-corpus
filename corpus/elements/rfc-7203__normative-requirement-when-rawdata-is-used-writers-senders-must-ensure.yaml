document: rfc-7203
kind: normative-requirement
summary: When RawData is used, writers/senders MUST ensure that the namespace specified by SpecID/ext-SpecID and the schema of the embedded XML are consistent; if not, the namespace identified by SpecID SHOULD be preferred and the inconsistency SHOULD be logged.
section: "4.4"
rfc2119_level: MUST
topics:
