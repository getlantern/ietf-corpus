document: rfc-7159
kind: interoperability-note
summary: Good interoperability can be achieved by implementations that expect no more numeric precision or range than IEEE 754-2008 binary64 (double precision). Integers in the range [-(2**53)+1, (2**53)-1] are interoperable; numbers outside this range or with extreme precision (e.g., 1E400) may cause interoperability problems.
