document: rfc-5360
kind: security-consideration
summary: Even with client authentication and authorization mechanisms in place (e.g., SPAM prevention per RFC 5039), authorized clients can still add recipients to a translation without those recipients' consent. This is why relays performing translations MUST implement this framework regardless of other security measures.
section: "7"
topics:
    - sip
    - security
