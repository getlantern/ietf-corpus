summary: 'Each checklist has a state: Running (initial), Completed (nominated pair exists for each component), or Failed (no valid pair for some component and all pairs are in Failed/Succeeded). Overall ICE state is Completed if all checklists are Completed, Failed if all are Failed, Running otherwise.'
