document: rfc-2814
kind: registry
summary: 'Two reserved local-scope IP multicast addresses are assigned: 224.0.0.16 (DSBMLogicalAddress) for DSBM clients and SBMs to address PATH messages to the DSBM, and 224.0.0.17 (AllSBMAddress) for the DSBM to forward PATH messages and for SBM election traffic. Corresponding MAC addresses use the 00:00:5e high-order prefix per RFC 1700.'
section: "5.2"
topics:
