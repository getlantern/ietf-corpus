document: rfc-2037
kind: protocol-element
summary: The entPhysicalTable contains one row per physical entity, indexed by entPhysicalIndex (PhysicalIndex, integer 1..2147483647). Each entry includes entPhysicalDescr, entPhysicalVendorType, entPhysicalContainedIn, entPhysicalClass, entPhysicalParentRelPos, and entPhysicalName. The table must always contain at least one row for an 'overall' physical entity.
