document: rfc-5019
kind: normative-requirement
summary: Clients SHOULD NOT send signed OCSPRequests. Responders MAY ignore the signature on OCSPRequests. If signed, the client SHALL specify its name in the OCSPRequest.requestorName field.
section: 2.1.2
rfc2119_level: SHOULD NOT
