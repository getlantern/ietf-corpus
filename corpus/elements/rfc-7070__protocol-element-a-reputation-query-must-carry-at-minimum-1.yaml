document: rfc-7070
kind: protocol-element
summary: 'A reputation query MUST carry at minimum: (1) the subject of the query, (2) the name of the reputation Application context, and optionally (3) the name(s) of specific reputation assertions of interest. Additional parameters may be required by specific transports or contexts.'
section: "6"
