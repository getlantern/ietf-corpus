document: rfc-9287
kind: interoperability-note
summary: Endpoints can set the QUIC Bit to 0 on all packets sent after receiving and processing transport parameters, including Initial, Handshake, and Retry packets. This applies once negotiation is confirmed through transport parameter exchange.
section: "3.1"
