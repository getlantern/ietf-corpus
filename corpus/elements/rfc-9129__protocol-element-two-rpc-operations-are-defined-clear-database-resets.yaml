document: rfc-9129
kind: protocol-element
summary: 'Two RPC operations are defined: ''clear-database'' resets the contents of an OSPF LSDB, forces neighbor adjacencies to DOWN, and reoriginates self-originated LSAs; ''clear-neighbor'' resets a specific OSPF neighbor or all neighbors on an interface.'
