document: rfc-5306
kind: interoperability-note
summary: Implementations based on earlier versions of this document (RFC 3847) may not include the Restarting Neighbor System ID field when the RA bit is set. A router expecting an RA on a LAN circuit SHOULD assume the acknowledgement is directed at the local system in this case.
section: "3.2"
topics:
    - routing
