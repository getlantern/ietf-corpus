document: rfc-2419
kind: normative-requirement
summary: Plain text that is already a multiple of 8 octets MUST have an additional 8 octets of padding (1, 2, 3...8) appended prior to encryption if the last octet of the plain text has a value between 1 and 8 inclusive.
section: "6.1"
rfc2119_level: MUST
