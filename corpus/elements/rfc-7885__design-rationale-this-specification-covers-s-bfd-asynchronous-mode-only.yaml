document: rfc-7885
kind: design-rationale
summary: This specification covers S-BFD asynchronous mode only; S-BFD Echo mode and fault detection with status signaling are explicitly out of scope. Only a single S-BFD Discriminator per PW is specified, with multi-discriminator use (e.g., per-Flow in FAT PWs) left as a future extension.
section: "1"
topics:
