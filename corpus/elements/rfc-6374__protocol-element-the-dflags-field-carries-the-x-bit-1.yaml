document: rfc-6374
kind: protocol-element
summary: The DFlags field carries the X bit (1 = all interfaces writing 64-bit counters; cleared to 0 by any 32-bit interface, propagated through query to response) and B bit (1 = octet counts, 0 = packet counts). The X flag governs whether 64-bit or 32-bit arithmetic is used in loss calculation.
section: "3.1"
topics:
