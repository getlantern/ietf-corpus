document: rfc-9866
kind: design-rationale
summary: RNFD is designed to operate in the background independently of RPL and to be deactivatable at any time without affecting RPL's operation. This minimizes changes to RPL's existing algorithms and allows RNFD to be an opt-in extension rather than a mandatory modification.
section: "1.2"
topics:
    - routing
