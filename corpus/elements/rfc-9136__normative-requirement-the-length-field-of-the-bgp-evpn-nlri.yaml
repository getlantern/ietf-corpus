document: rfc-9136
kind: normative-requirement
summary: The Length field of the BGP EVPN NLRI for an EVPN IP Prefix route MUST be either 34 (IPv4) or 58 (IPv6). The IP prefix and gateway IP address MUST be from the same IP address family.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
