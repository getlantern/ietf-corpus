document: rfc-6081
kind: wire-format
summary: 'Alternate Address Trailer (Type=0x03): used by the Hairpinning Extension in indirect bubbles only. Contains a 2-byte Reserved field (must be 0x0000) followed by an Alternate Address/Port List of 1–4 entries, each 6 bytes (4-byte IPv4 address + 2-byte port). Length field MUST be 8–26 and SHOULD be at most 14.'
section: "4.3"
topics:
    - nat
    - v6ops
