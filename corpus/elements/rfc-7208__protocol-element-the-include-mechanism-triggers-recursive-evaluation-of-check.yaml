document: rfc-7208
kind: protocol-element
summary: The 'include' mechanism triggers recursive evaluation of check_host() against a referenced domain; only the result is used (not the referenced record's mechanisms). A recursive 'pass' causes the include to match; 'fail', 'softfail', and 'neutral' cause not-match; 'none' causes 'permerror'.
section: "5.2"
topics:
