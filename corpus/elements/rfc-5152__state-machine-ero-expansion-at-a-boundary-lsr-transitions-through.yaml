document: rfc-5152
kind: state-machine
summary: 'ERO expansion at a boundary LSR transitions through: (1) determine next-hop boundary LSR (from ERO or auto-discovery), (2) compute constrained path to next loose hop, (3) insert computed hops as strict nodes in ERO and forward Path message, or (4) on failure, send PathErr upstream and optionally trigger crankback to select an alternate boundary LSR.'
section: "4"
