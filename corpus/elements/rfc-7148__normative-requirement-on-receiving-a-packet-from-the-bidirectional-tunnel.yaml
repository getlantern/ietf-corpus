document: rfc-7148
kind: normative-requirement
summary: On receiving a packet from the bidirectional tunnel with the LMA, the MAG MUST decapsulate the packet (remove the outer header) and then use the destination address of the inner packet to forward it to the interface through which the mobile router is reachable.
section: 5.1.4
rfc2119_level: MUST
topics:
    - mobility
