summary: RFC 6325 Section 3.7.3 nickname conflict text incorrectly references 'IS-IS ID (LAN ID)' and 'IS-IS System ID'; corrected to 'priority' and '7-byte IS-IS ID (LAN ID)' respectively (Err3002). Higher priority wins; ties broken by higher 7-byte IS-IS ID.
