document: rfc-6891
kind: normative-requirement
summary: Requestor UDP payload size values lower than 512 MUST be treated as equal to 512. Similarly, values less than 512 bytes in payload size selection MUST be treated as equal to 512.
section: 6.2.3
rfc2119_level: MUST
