document: rfc-3852
kind: design-rationale
summary: Each CMS content type is designed to permit single-pass processing using indefinite-length BER encoding, which is especially helpful for large or piped content. The tradeoff is that only signed attributes and authenticated attributes require the stricter DER encoding, as these must be independently re-encoded by recipients for verification.
section: "2"
topics:
