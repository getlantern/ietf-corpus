document: rfc-7946
kind: normative-requirement
summary: A specification that alters the semantics of GeoJSON members or otherwise modifies the format does not create a new version of GeoJSON; it defines an entirely new format that MUST NOT be identified as GeoJSON. No explicit versioning scheme is defined.
section: "8"
rfc2119_level: MUST NOT
topics:
