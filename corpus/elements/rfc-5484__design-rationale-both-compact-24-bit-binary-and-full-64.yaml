document: rfc-5484
kind: design-rationale
summary: Both compact (24-bit binary) and full (64-bit SMPTE 12M) time-code forms are provided. Compact saves bandwidth for use cases such as compressed audio; full is necessary when the date component must be conveyed or when the RTP transport serves as a transparent pipe.
