document: rfc-3984
kind: normative-requirement
summary: The RTP marker bit MUST be set for the very last packet of the access unit indicated by the RTP timestamp. For aggregation packets, the M bit MUST reflect what the last aggregated NAL unit's M bit would have been if transported alone. Decoders MAY use the M bit as an early indicator but MUST NOT rely on this property.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
