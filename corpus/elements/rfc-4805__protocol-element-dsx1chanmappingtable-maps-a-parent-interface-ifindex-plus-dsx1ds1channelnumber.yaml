document: rfc-4805
kind: protocol-element
summary: dsx1ChanMappingTable maps a parent interface ifIndex plus dsx1Ds1ChannelNumber to dsx1ChanMappedIfIndex for each channelized sub-interface. For DS3 channelized to DS1, 28 entries are created; for DS3 to DS2, 7 entries; for DS2 to DS1, 4 entries per DS2. This table enables navigation of the multiplexing hierarchy.
