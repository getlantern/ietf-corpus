document: rfc-6241
kind: security-consideration
summary: A server MUST NOT return application-level or data-model-specific error information in <rpc-error> to clients lacking sufficient access rights. This prevents unauthorized users from inferring configuration details through error message side-channels.
section: "4.3"
topics:
    - netconf
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
