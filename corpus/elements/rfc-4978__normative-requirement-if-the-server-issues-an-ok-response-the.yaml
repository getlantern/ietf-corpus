document: rfc-4978
kind: normative-requirement
summary: If the server issues an OK response, the server MUST compress starting immediately after the CRLF which ends the tagged OK response. If the server issues a BAD or NO response, the server MUST NOT turn on compression.
section: "3"
rfc2119_level: MUST
topics:
    - email
