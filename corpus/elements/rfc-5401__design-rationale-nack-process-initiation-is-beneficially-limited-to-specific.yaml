document: rfc-5401
kind: design-rationale
summary: NACK process initiation is beneficially limited to specific events such as end-of-transmission of an FEC coding block or detection of a subsequent block. This allows receivers to aggregate NACK content into fewer messages and provides loose synchronization among the receiver set to facilitate effective probabilistic suppression.
section: 3.2.1
topics:
    - multicast
