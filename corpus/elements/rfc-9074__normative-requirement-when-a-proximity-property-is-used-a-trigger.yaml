document: rfc-9074
kind: normative-requirement
summary: When a PROXIMITY property is used, a TRIGGER property is still required for backwards compatibility but SHOULD be ignored. Clients SHOULD use a value far in the past (e.g., '19760401T005545Z') to indicate a TRIGGER that is to be ignored.
section: "8"
rfc2119_level: SHOULD
