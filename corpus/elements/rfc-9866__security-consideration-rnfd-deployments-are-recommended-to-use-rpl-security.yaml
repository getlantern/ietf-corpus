document: rfc-9866
kind: security-consideration
summary: RNFD deployments are RECOMMENDED to use RPL security mechanisms (RFC 6550, RFC 7416) when control information might be modified or spoofed. RNFD does not introduce new traffic patterns or message types requiring mitigation beyond what RPL already provides. The DODAG root can detect false positives from its local CFRCs unless all its neighbors are compromised.
section: "7"
topics:
    - routing
    - security
