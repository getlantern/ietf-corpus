document: rfc-2364
kind: normative-requirement
summary: On a PVC, if an unexpected encapsulation transition is detected after Network-layer Protocol phase, the PPP Link MUST tear down active NCPs, SHOULD generate an error message, enter the Termination state, and silently drop all received packets.
section: "8"
rfc2119_level: MUST
topics:
