document: rfc-5575
kind: normative-requirement
summary: BGP implementations MUST enforce that the AS_PATH of a route received via eBGP contains the neighboring AS in the left-most position. Though optional in the base BGP specification, this rule is necessary to enforce for security reasons in the flow specification context.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
