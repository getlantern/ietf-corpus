document: rfc-3986
kind: state-machine
summary: 'The reference resolution algorithm transforms a URI reference R into target URI T: if R has a scheme, use all of R''s components with dot-segments removed; else if R has an authority, take authority/path/query from R with scheme from Base; else if R''s path is empty, inherit Base path and optionally Base query; else merge and remove dot-segments. T.fragment always comes from R.'
section: 5.2.2
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
