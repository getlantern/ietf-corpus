document: rfc-7450
kind: state-machine
summary: A gateway tunnel is created when a Membership Update message carrying an IGMP/MLD report creates one or more group subscriptions where none existed for that tunnel endpoint. The tunnel ceases to exist when all subscriptions are deleted via report/leave/done message, Teardown message, or expiry of per-group or per-tunnel timers on the relay.
section: 4.2.2
topics:
    - multicast
    - udp
