document: rfc-4004
kind: wire-format
summary: 'The MIP-MN-AAA-Auth grouped AVP (code 322) has the ABNF structure: MIP-MN-AAA-SPI (mandatory), MIP-Auth-Input-Data-Length (mandatory), MIP-Authenticator-Length (mandatory), MIP-Authenticator-Offset (mandatory). MIP-Auth-Input-Data-Length is the byte length of the Registration Request data to hash; MIP-Authenticator-Offset is the byte offset into Registration Request data where the authenticator begins.'
section: "7.6"
topics:
