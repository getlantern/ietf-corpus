summary: Opcode 42 (IUTF8) is encoded in the SSH terminal modes encoding with a single uint32 argument following the opcode byte. The value 0 disables IUTF8 mode and the value 1 enables it, consistent with the encoding rule in RFC 4254 Section 8 that opcodes 1–159 carry a single uint32 argument.
