document: rfc-3253
kind: protocol-element
summary: DAV:checked-in (protected) appears on a checked-in version-controlled resource and identifies the version that has the same content and dead properties as the resource. It is removed on checkout and re-added on checkin identifying the new version. Defined as <!ELEMENT checked-in (href)>.
section: 3.2.1
topics:
    - http
