document: rfc-6626
kind: design-rationale
summary: The Mobile Router's home address MAY be used to identify the client for prefix allocation; when the home address is zero (dynamic home address allocation), the NAI extension is used instead. This allows dynamic prefix allocation to work even when the home address is not yet known.
section: "3.2"
topics:
    - mobility
