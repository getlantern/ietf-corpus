document: rfc-3111
kind: normative-requirement
summary: A multihomed SA MUST issue DA discovery requests using multicast scope FF02 and, if it has a site-local or global address, MUST reissue with increasing scopes up to FF05. Active DA discovery must be attempted on all zones.
section: 4.2.4.3
rfc2119_level: MUST
topics:
    - multicast
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
