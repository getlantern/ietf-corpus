document: rfc-2893
kind: design-rationale
summary: The single-hop tunnel model was chosen to make tunnels invisible to the network; the tunnel appears as a single link-layer hop regardless of how many IPv4 hops lie inside. This simplifies the IPv6 topology visible to routing protocols and diagnostic tools.
section: "3.3"
