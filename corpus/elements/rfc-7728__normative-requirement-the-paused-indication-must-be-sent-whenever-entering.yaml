document: rfc-7728
kind: normative-requirement
summary: The PAUSED indication MUST be sent whenever entering Paused state or Local Paused state. It MUST also be included in at least the next two regular RTCP reports while still in that state. The PauseID in PAUSED MUST contain the current PauseID usable in a subsequent RESUME.
section: "8.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
