document: rfc-8310
kind: protocol-element
summary: An authentication domain name (ADN) is a domain name used to authenticate a privacy-enabling DNS server. It may be obtained via full direct configuration (ADN+IP), ADN-only direct configuration with IP resolved via meta-queries, DHCP, or DNSSEC/DANE chain.
section: "2"
topics:
