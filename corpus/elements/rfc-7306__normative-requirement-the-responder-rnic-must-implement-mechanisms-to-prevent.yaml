document: rfc-7306
kind: normative-requirement
summary: The Responder RNIC MUST implement mechanisms to prevent concurrent Atomic Operations to a memory location registered for Atomic Operations while an in-progress Atomic Operation is targeting that location, ensuring the read-modify-write is not interleaved by other RDMAP Streams on the same RNIC.
section: "5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
