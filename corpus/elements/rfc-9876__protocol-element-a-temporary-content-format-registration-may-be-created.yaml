document: rfc-9876
kind: protocol-element
summary: A temporary Content-Format registration may be created by IANA early allocation (RFC 7120) or when the referenced Media Type is provisional (listed in the Provisional Standard Media Type Registry). Temporary registrations are marked as such by IANA in the registry entry.
