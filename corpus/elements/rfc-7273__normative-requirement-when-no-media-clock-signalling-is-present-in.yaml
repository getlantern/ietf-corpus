document: rfc-7273
kind: normative-requirement
summary: When no media clock signalling is present in an SDP description, receivers MUST assume an asynchronously generated media clock (`sender`). When no reference clock signalling is present, a local reference clock MUST be assumed.
section: "6"
rfc2119_level: MUST
topics:
