document: rfc-5629
kind: protocol-element
summary: 'Capability advertisement for client-local UI is performed via SIP header fields in dialog-initiating requests and responses: Allow (listing REFER or SUBSCRIBE), Allow-Events (for KPML), Supported (for ''gruu'' and ''tdialog''), Contact (containing a GRUU with ''schemes'' parameter), and Accept (listing supported markup MIME types).'
