document: rfc-3633
kind: protocol-element
summary: An Identity Association for Prefix Delegation (IA_PD) is a construct through which a delegating router and a requesting router identify, group, and manage a set of related IPv6 prefixes. Each IA_PD consists of an IAID and associated configuration information, including one or more IPv6 prefixes with T1 and T2 timers. Unlike an IA for addresses, an IA_PD does not need to be associated with exactly one interface.
section: "6"
topics:
