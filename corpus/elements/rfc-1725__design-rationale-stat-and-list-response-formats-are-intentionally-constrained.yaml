document: rfc-1725
kind: design-rationale
summary: STAT and LIST response formats are intentionally constrained (discouraging extra fields) to simplify parsing. Minimal implementations end the response line with CRLF; the NOTE in sections 5 strongly discourages extra information in drop and scan listings.
