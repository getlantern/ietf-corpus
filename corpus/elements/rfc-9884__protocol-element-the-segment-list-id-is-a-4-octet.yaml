document: rfc-9884
kind: protocol-element
summary: The Segment-List-ID is a 4-octet identifier that uniquely identifies a segment list within the context of the candidate path of an SR Policy. It is used as a key field in the SR Segment List Associated PSID sub-TLVs and can be signaled via BGP, PCEP, or BGP-LS.
section: "2.2"
topics:
