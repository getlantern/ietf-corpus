document: rfc-1460
kind: protocol-element
summary: The PASS command, valid only after a successful USER command, supplies the password. On success, the server acquires an exclusive-access lock on the maildrop, parses it into individual messages, and the session enters the TRANSACTION state. If the lock cannot be acquired, the server responds -ERR and must release any partially acquired lock before rejecting the command.
section: "4"
