document: rfc-2024
kind: design-rationale
summary: DLSw MIB objects do not duplicate information from the underlying DLC layer MIBs (LLC, SDLC). Instead, circuit table entries use RowPointer (dlswCircuitS1Dlc) to reference conceptual rows in the appropriate enterprise-specific or standard DLC MIB, avoiding redundancy.
