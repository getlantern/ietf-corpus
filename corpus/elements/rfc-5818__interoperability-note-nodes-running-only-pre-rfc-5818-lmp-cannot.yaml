document: rfc-5818
kind: interoperability-note
summary: Nodes running only pre-RFC-5818 LMP cannot recognize the three new message types. Because legacy node behavior upon receipt of unknown messages is unspecified in RFC 4204, this document assumes deployments supporting this feature will consist entirely of nodes implementing these extensions. Mixed-environment deployment may become possible if LMP is extended with capability discovery.
section: "5.4"
topics:
    - routing
