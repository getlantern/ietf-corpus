document: rfc-8518
kind: normative-requirement
summary: When multiple ECMP L1/L2 routers are reachable in an IS-IS L1 area (ATT bit set), corresponding best LFAs SHOULD be computed for each primary next hop associated with the default route, treating it analogously to an ECMP MHP.
