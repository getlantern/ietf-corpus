document: rfc-5913
kind: design-rationale
summary: Any effective-clearance calculation algorithm that computes the intersection of the subject's Clearance, the TA's ACC, user input, and all intermediate CA/AA ACC extensions, and produces the same outcome as the algorithm described herein, is considered compliant. This allows implementors flexibility in the order or structure of the computation.
