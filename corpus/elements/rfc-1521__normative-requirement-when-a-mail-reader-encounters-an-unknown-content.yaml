document: rfc-1521
kind: normative-requirement
summary: When a mail reader encounters an unknown Content-Type value, it should treat it as equivalent to 'application/octet-stream'. If no Content-Type header is present, 'text/plain; charset=us-ascii' is assumed as the default.
section: "4"
rfc2119_level: SHOULD
topics:
    - email
