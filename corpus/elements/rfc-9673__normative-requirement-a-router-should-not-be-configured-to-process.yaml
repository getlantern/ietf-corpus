document: rfc-9673
kind: normative-requirement
summary: A router SHOULD NOT be configured to process the first Hop-by-Hop option if doing so adversely impacts the aggregate forwarding rate. A router SHOULD process additional Hop-by-Hop options, if configured, providing they also do not adversely impact the aggregate forwarding rate.
section: "5.2"
rfc2119_level: SHOULD NOT
topics:
    - ip
