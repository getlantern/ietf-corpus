document: rfc-5588
kind: design-rationale
summary: GSS_Store_cred() was introduced because delegated credential handles have no path into the implicit credential store, limiting acceptors to direct use with only GSS_Init_sec_context(), GSS_Inquire_cred*(), and GSS_Release_cred(). On Unix systems, a call to exec() obliterates any delegated credential handle in the process, making delegation effectively useless across process boundaries.
section: "1"
topics:
    - security
