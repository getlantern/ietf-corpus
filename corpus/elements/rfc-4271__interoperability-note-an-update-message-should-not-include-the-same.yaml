document: rfc-4271
kind: interoperability-note
summary: An UPDATE message SHOULD NOT include the same address prefix in both WITHDRAWN ROUTES and NLRI fields simultaneously, but a BGP speaker MUST be able to process such messages and SHOULD treat the prefix as not withdrawn.
section: "4.3"
topics:
