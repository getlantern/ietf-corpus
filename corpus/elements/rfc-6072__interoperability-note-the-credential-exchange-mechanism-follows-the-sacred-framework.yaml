summary: 'The credential exchange mechanism follows the SACRED Framework (RFC 3760) cTLS architecture: the UA authenticates the server via TLS certificate, and the server authenticates the UA using SIP Digest inside the TLS session, forming a strong session key protecting credentials in transit.'
