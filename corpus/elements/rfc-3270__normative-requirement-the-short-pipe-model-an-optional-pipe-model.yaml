document: rfc-3270
kind: normative-requirement
summary: The Short Pipe Model (an optional Pipe Model variant where the LSP Egress applies forwarding treatment based on the tunneled inner header rather than the LSP outer header) MAY be supported. Unlike the Pipe Model it can operate with PHP because the LSP Diff-Serv information need not reach the egress.
section: 2.6.2.1
rfc2119_level: MAY
topics:
    - mpls
    - diffserv
    - qos
