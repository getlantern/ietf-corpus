document: rfc-6131
kind: protocol-element
summary: The ':seconds' parameter specifies the minimum time interval in seconds between consecutive auto-replies to a given sender. It is used instead of ':days' when finer granularity is needed, and works analogously to the ':days' parameter defined in RFC 5230.
