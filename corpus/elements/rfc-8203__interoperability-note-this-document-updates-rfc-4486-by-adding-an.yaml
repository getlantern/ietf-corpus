document: rfc-8203
kind: interoperability-note
summary: This document updates RFC 4486 by adding an optional Shutdown Communication field to Cease NOTIFICATION messages with subcodes 2 and 4. BGP speakers that do not support this extension will still receive valid Cease NOTIFICATIONs since the communication is optional (Length may be zero).
section: "1"
topics:
