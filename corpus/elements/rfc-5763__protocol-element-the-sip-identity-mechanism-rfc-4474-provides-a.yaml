document: rfc-5763
kind: protocol-element
summary: The SIP Identity mechanism (RFC 4474) provides a digital signature across SIP header fields and body, including the SDP fingerprint. This prevents undetectable modification of the fingerprint by intermediate proxies, blocking MITM attacks on the DTLS handshake.
