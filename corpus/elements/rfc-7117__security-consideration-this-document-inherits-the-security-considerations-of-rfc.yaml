document: rfc-7117
kind: security-consideration
summary: This document inherits the security considerations of RFC 4761 (BGP-VPLS) and RFC 4762 (LDP-VPLS). Unauthorized injection or modification of BGP VPLS A-D routes or PMSI Tunnel attributes could redirect or disrupt VPLS multicast traffic; BGP security mechanisms (e.g., MD5 authentication, BGPsec) should be applied to protect A-D route exchange.
section: "13"
topics:
    - mpls
    - multicast
    - security
    - routing
