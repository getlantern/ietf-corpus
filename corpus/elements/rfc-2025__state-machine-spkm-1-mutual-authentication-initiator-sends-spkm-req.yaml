document: rfc-2025
kind: state-machine
summary: 'SPKM-1 mutual authentication: initiator sends SPKM-REQ, target responds with SPKM-REP-TI, initiator completes with SPKM-REP-IT. SPKM-2 mutual auth terminates after REP-TI. SPKM-2 unilateral uses only SPKM-REQ; SPKM-1 unilateral uses REQ and REP-TI.'
section: "3.1"
topics:
