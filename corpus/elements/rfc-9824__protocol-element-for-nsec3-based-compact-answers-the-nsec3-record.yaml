document: rfc-9824
kind: protocol-element
summary: For NSEC3-based Compact Answers, the NSEC3 record owner name is the NSEC3 hash of the relevant domain encoded in Base32 Extended Hex Alphabet prepended as a single label to the zone name. The Next Hashed Owner Name is computed by adding one to the binary hash value. For nonexistent names, the Type Bit Maps field contains only NXNAME; for ENTs, it is empty.
section: "4"
