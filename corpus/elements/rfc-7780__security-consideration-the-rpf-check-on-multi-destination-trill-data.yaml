document: rfc-7780
kind: security-consideration
summary: The RPF check on multi-destination TRILL Data packets is a critical security mechanism preventing traffic multiplication and looping during topology transients. The alternative stronger quadruplet RPF check (Section 3.6) closes a specific bypass on multi-access links where the standard triplet check is insufficient, but implementation is optional due to increased state cost.
section: "13"
topics:
    - routing
    - security
