summary: The entPhysicalContainedIn object holds the entPhysicalIndex of the containing physical entity, or zero if not contained. The containment relationships define a strict hierarchy with no recursion allowed; for double-wide modules, the containing entity with the lowest entPhysicalIndex value is used.
