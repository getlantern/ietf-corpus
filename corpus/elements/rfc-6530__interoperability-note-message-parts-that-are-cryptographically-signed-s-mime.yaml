document: rfc-6530
kind: interoperability-note
summary: Message parts that are cryptographically signed (S/MIME or PGP) or encrypted cannot be upgraded from RFC 2047 encoded-word form to normal UTF-8 without breaking the signature or requiring cryptographic key access. MUAs and mail filtering software must continue to accept and decode RFC 2047 encoded words indefinitely.
section: "11.3"
topics:
    - email
