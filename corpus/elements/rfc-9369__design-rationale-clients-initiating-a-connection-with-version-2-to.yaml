document: rfc-9369
kind: design-rationale
summary: Clients initiating a connection with version 2 to combat middlebox ossification must be reasonably certain the server supports it, or accept a round-trip penalty. A server issuing a version 2 session ticket signals intent to maintain version 2 support for the ticket's lifetime.
