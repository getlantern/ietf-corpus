document: rfc-1730
kind: wire-format
summary: 'When a protection mechanism is negotiated via AUTHENTICATE, subsequent protocol data is transmitted as length-prefixed ciphertext buffers: a 4-octet network-byte-order field giving the length of the following ciphertext, repeated for each buffer. Maximum buffer length is defined by the mechanism.'
