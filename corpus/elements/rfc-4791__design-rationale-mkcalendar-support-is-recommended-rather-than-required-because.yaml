document: rfc-4791
kind: design-rationale
summary: MKCALENDAR support is RECOMMENDED rather than REQUIRED because some calendar stores support only one calendar per user, which is pre-created at account provisioning time. Servers and clients are strongly encouraged to support it when possible.
