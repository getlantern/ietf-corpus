document: rfc-8058
kind: normative-requirement
summary: The message MUST have a valid DKIM signature that covers at least the List-Unsubscribe and List-Unsubscribe-Post headers, and both headers MUST be included in the 'h=' tag of a valid DKIM-Signature header field.
