document: rfc-9370
kind: design-rationale
summary: All key exchange algorithms—classical (EC)DH and post-quantum—are treated equivalently by the protocol and share a single Transform ID registry. This avoids categorizing algorithms as "post-quantum" or "classical" and ensures the extension remains usable if future algorithms with different properties emerge.
section: "2.1"
topics:
