document: rfc-1374
kind: design-rationale
summary: The MTU of 65280 octets was chosen because it allows the IP packet to fit in one 64K-byte buffer with up to 256 octets of overhead; at the time of writing, actual overhead was 40 octets, leaving 216 octets for future expansion.
section: Protocol/MTU
