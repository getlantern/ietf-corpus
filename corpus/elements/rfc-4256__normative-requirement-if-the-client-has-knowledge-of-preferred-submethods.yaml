document: rfc-4256
kind: normative-requirement
summary: If the client has knowledge of preferred submethods it MAY pass them as a comma-separated list; otherwise it MUST send the empty string. Server interpretation of submethods is implementation-dependent.
section: "3.1"
rfc2119_level: MUST
