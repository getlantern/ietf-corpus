document: rfc-6564
kind: design-rationale
summary: Hop-by-hop behavior is discouraged for new extension headers because some deployed Internet routers are configured to either ignore or drop packets containing headers with hop-by-hop behavior, and such headers can be subverted to create attacks on routers that process them.
section: "1"
topics:
