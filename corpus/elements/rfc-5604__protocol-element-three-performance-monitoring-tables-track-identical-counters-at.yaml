document: rfc-5604
kind: protocol-element
summary: 'Three performance monitoring tables track identical counters at different granularities: pwTDMPerfCurrentTable (current 15-minute interval), pwTDMPerfIntervalTable (up to 96 historical 15-minute intervals covering 24 hours), and pwTDMPerf1DayIntervalTable (up to 30 daily intervals). Counters include MissingPkts, PktsReOrder, JtrBfrUnderruns, MisOrderDropped, MalformedPkt, ESs, SESs, UASs, and FC.'
section: "6.3"
topics:
