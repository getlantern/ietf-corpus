document: rfc-8271
kind: interoperability-note
summary: Asymmetry in bypass tunnel assignments (e.g., upstream PLR receiving both link-protection and node-protection assignments from different downstream PLRs) can be avoided by using the 'node protection desired' flag in the SESSION_ATTRIBUTE object; when set, all PLRs assign node-protection bypass tunnels. Any residual asymmetry at failure time is corrected by the co-routing restoration procedure in Section 5.2.2.
section: 4.5.3
topics:
    - mpls
    - routing
