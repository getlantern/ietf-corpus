document: rfc-8794
kind: wire-format
summary: Element Data Size is a VINT of 1–8 octets by default (EBMLMaxSizeLength may extend this). Unlike Element IDs, Element Data Size VINT_DATA is not required to be at the shortest valid length. An all-ones VINT_DATA is reserved to signal unknown size.
section: "6.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
