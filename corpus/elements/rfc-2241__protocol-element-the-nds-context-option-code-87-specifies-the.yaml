document: rfc-2241
kind: protocol-element
summary: The NDS Context Option (code 87) specifies the initial NDS context the client should use. The context is a 16-bit Unicode string encoded as UTF-8. Because a context can exceed 255 octets, the option may appear multiple times in a DHCP packet and all instances must be concatenated.
section: "4"
extracted_by: claude-sonnet-4-6
