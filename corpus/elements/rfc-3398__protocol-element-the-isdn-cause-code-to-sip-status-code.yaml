document: rfc-3398
kind: protocol-element
summary: 'The ISDN Cause Code to SIP Status Code mapping (RECOMMENDED) covers: 1/2/3 (unallocated/no route) → 404, 17 (user busy) → 486, 18 (no user responding) → 408, 19/20 (no answer/absent) → 480, 21 (call rejected) → 403, 22 (number changed) → 301 with Contact or 410, 27 (destination out of order) → 502, 34/38/41/42/47 (resource unavailable) → 503, 102 (timer expiry) → 504, 127 → 500. Unknown causes default to 500.'
section: 7.2.4.1
topics:
    - sip
    - voip
    - realtime
