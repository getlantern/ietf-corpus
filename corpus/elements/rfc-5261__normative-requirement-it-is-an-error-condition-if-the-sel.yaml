document: rfc-5261
kind: normative-requirement
summary: It is an error condition if the 'sel' selector locates multiple nodes. The 'sel' value MUST identify a single unique target node from the target XML document.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
