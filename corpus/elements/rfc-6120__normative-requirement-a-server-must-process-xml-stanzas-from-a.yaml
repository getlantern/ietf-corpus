document: rfc-6120
kind: normative-requirement
summary: A server MUST process XML stanzas from a given sender in the order received and MUST NOT deliver stanzas from a given sender out of order, ensuring that a receiver processes stanzas in the sequence they were sent.
section: "10.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
