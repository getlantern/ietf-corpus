document: rfc-5539
kind: normative-requirement
summary: The client MUST use the hostname it used to open the connection (or the TLS server_name extension) for comparison and MUST NOT use any form of the server hostname derived from an insecure remote source such as insecure DNS lookup.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - netconf
    - tls
    - security
    - dns
