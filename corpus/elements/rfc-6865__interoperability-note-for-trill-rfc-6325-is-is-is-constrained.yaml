document: rfc-6865
kind: interoperability-note
summary: For TRILL (RFC 6325), IS-IS is constrained to operate only over TRILL links and not over external IP or Ethernet links, ensuring that TRILL IS-IS traffic is isolated from general IS-IS routing domains.
section: "7.1"
