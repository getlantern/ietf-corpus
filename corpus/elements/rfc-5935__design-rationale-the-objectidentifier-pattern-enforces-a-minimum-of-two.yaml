document: rfc-5935
kind: design-rationale
summary: The ObjectIdentifier pattern enforces a minimum of two sub-ids and limits the first two arcs to their ASN.1/BER-defined ranges (first arc 0–2; second arc 0–39 for arcs 0 and 1), avoiding a separate minLength restriction since the pattern itself enforces minimum length.
