document: rfc-7203
kind: interoperability-note
summary: Implementations are not required to support all specifications listed in the IANA SCI table; however, at minimum the initial MMDEF v1.2 entry must be supported. If an implementation receives unsupported data, it may expand functionality by consulting the IANA table or notify the sender of its inability to parse.
section: "4.1"
topics:
    - security
    - registry
