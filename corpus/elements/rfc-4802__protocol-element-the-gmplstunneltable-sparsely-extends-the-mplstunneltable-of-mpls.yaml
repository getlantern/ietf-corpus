document: rfc-4802
kind: protocol-element
summary: The gmplsTunnelTable sparsely extends the mplsTunnelTable of MPLS-TE-STD-MIB to allow GMPLS tunnels to be created, reconfigured, or removed between an LSR and a remote endpoint. It is indexed by mplsTunnelIndex, mplsTunnelInstance, mplsTunnelIngressLSRId, and mplsTunnelEgressLSRId. Row creation and modification are controlled by the corresponding mplsTunnelRowStatus.
section: "5.1"
topics:
    - mpls
    - snmp
    - yang
