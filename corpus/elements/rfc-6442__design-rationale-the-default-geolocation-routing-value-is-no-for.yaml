document: rfc-6442
kind: design-rationale
summary: 'The default Geolocation-Routing value is "no" for two reasons: (1) to make retention of the Target''s location moot because intermediaries never view it in the first place, and (2) to prevent differential routing treatment of SIP requests based on location the Target did not consent to share with intermediaries.'
section: "4.1"
topics:
    - realtime
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
