document: rfc-9744
kind: protocol-element
summary: In VLAN-Signaled FXC mode, the single EVPN-VPWS service tunnel is represented by multiple VPWS service IDs (one per normalized VID), and each normalized VID is signaled via an Ethernet A-D per-EVI route where the ESI represents the ES ID, the Ethernet Tag is set to the normalized VID, and all ACs share the same dynamically generated EVPN label.
section: "3.3"
topics:
    - vpn
    - bgp
    - routing
