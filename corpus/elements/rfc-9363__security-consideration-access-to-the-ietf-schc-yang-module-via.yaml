document: rfc-9363
kind: security-consideration
summary: Access to the ietf-schc YANG module via NETCONF requires mandatory-to-implement secure transport using SSH (RFC 6242); via RESTCONF it requires HTTPS with TLS (RFC 8446). The NACM model (RFC 8341) provides access control for NETCONF/RESTCONF users.
section: "8"
topics:
