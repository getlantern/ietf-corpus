document: rfc-5460
kind: design-rationale
summary: 'LEASEQUERY-DATA messages are introduced to reduce redundant data when returning multiple bindings: the LEASEQUERY-REPLY carries common fields (Server-ID, Client-ID, status), and each LEASEQUERY-DATA carries only per-client binding data without repeating the common header.'
section: 5.2.1
topics:
    - dns
