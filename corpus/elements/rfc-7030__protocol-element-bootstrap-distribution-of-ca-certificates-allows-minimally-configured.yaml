document: rfc-7030
kind: protocol-element
summary: Bootstrap Distribution of CA Certificates allows minimally configured clients with no TA database to provisionally complete a TLS handshake with the EST server unauthenticated, retrieve /cacerts, and then have a human user verify the CA certificate fingerprint (e.g., SHA-256 or SHA-512 hash) out-of-band before establishing the Explicit TA database.
section: 4.1.1
topics:
    - pkix
    - security
    - tls
