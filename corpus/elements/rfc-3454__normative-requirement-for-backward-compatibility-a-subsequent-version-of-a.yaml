document: rfc-3454
kind: normative-requirement
summary: For backward compatibility, a subsequent version of a profile MUST NOT move code points from AO (allowed output), MN (mapped/normalized away), or D (disallowed) categories to any other category. Only unassigned (U) code points may change category in a newer profile version.
section: "7.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
