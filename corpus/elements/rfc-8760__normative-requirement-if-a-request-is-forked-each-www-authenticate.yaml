document: rfc-8760
kind: normative-requirement
summary: If a request is forked, each WWW-Authenticate and Proxy-Authenticate value received in response to the forked request MUST be placed into the single response that is sent by the forking proxy to the UAC.
section: "2.5"
rfc2119_level: MUST
topics:
    - sip
    - security
