document: rfc-9810
kind: normative-requirement
summary: CAs and RAs MUST enforce Proof-of-Possession (POP) by some means because many operational protocols do not verify the binding between an end entity and its private key; without CA/RA enforcement, Internet PKI certificates would be less meaningful.
section: "4.3"
rfc2119_level: MUST
topics:
    - pkix
    - security
