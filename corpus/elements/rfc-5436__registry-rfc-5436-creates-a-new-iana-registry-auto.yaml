document: rfc-5436
kind: registry
summary: 'RFC 5436 creates a new IANA registry ''Auto-Submitted Header Field Keywords'' using the ''Specification Required'' policy. Initial entries registered are: ''no'' (human-authored message), ''auto-generated'' (automatic, not a direct response), ''auto-replied'' (automatic direct response), and ''auto-notified'' (generated by Sieve notification, requires owner-email or owner-token parameter).'
section: "6.2"
