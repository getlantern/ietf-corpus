summary: 'MRHOF defines a metric-to-Rank conversion table: Hop-Count maps Cost directly to Rank; Latency maps Cost/65536 to Rank; ETX maps Cost directly to Rank. For other metrics, Rank is undefined and the node must join as a Leaf.'
