document: rfc-8005
kind: security-consideration
summary: Secure hashes used to derive HITs from HIs (e.g., SHA-1) can become insecure over time due to discovered exploits against collision resistance. This motivates using HI-based rather than HIT-based peer authentication.
section: "8.2"
topics:
    - security
    - crypto
