document: rfc-9562
kind: interoperability-note
summary: Microsoft's Component Object Model (COM) GUIDs use little-endian encoding when saving GUIDs to binary, whereas this specification mandates big-endian. Cross-platform interoperability with COM GUIDs requires awareness of this byte-order difference, which is outside the scope of this specification.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
