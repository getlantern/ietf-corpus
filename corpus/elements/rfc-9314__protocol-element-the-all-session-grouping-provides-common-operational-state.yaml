document: rfc-9314
kind: protocol-element
summary: 'The ''all-session'' grouping provides common operational state for every session type: local/remote discriminator, remote multiplier, demand capability, source/dest UDP ports (when IP encapsulation is used), a ''session-running'' container (local-state, remote-state, diagnostics, detection mode, negotiated intervals, detection time), and a ''session-statistics'' container (counters for up/down transitions, packet send/receive, and invalid/failed packets).'
section: "2.11"
topics:
