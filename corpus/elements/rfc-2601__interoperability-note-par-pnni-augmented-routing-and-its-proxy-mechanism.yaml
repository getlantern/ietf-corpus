document: rfc-2601
kind: interoperability-note
summary: PAR (PNNI Augmented Routing) and its proxy mechanism (Proxy PAR) can distribute ATMARP server addresses and manage service registry tables network-wide, but are complementary to ILMI-based discovery. Hosts and routers can continue using ILMI-based or Proxy PAR-based discovery without changes to the mechanism defined in this memo.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
