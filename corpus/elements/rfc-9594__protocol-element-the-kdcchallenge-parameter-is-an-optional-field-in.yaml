document: rfc-9594
kind: protocol-element
summary: The 'kdcchallenge' parameter is an optional field in the Token Transfer Response from /authz-info; it carries a KDC-generated nonce N_S that the Client incorporates into the PoP input when computing 'client_cred_verify' in the Join Request. The same value MAY be reused by the Client for subsequent credential uploads.
section: 3.3.2
topics:
    - security
    - crypto
