document: rfc-4391
kind: interoperability-note
summary: The QPN in the IPoIB link-layer address may not be constant across reboots or network interface resets. Cached QPN entries in static ARP or RARP servers will fail unless implementations ensure QPN invariance. It is RECOMMENDED that ARP caches be revalidated periodically.
section: "9.4"
rfc2119_level: RECOMMENDED
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
