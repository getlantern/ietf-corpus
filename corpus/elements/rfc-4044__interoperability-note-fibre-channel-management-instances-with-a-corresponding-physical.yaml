document: rfc-4044
kind: interoperability-note
summary: Fibre Channel management instances with a corresponding physical component use fcmInstancePhysicalIndex to point to the entPhysicalIndex in the Entity MIB (RFC 2737). A value of zero indicates no correspondence; implementations are not required to support non-zero values.
