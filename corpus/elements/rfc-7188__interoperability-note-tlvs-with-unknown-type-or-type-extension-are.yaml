document: rfc-7188
kind: interoperability-note
summary: TLVs with unknown type or type extension are already specified to be ignored by RFC 6130 and RFC 7181 and are not a reason to reject a message; this document extends that tolerance to unknown TLV values for the TLV types defined in those RFCs.
