document: rfc-2735
kind: protocol-element
summary: The NHRP Device Capabilities extension (Type 0x0009) is a new NHRP extension that indicates VPN capabilities of source and destination NHRP entities, enabling VPN-aware ingress NHCs to determine whether egress NHCs are also VPN-aware before establishing shortcuts.
