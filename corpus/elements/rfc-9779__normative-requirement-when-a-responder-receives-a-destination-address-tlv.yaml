document: rfc-9779
kind: normative-requirement
summary: When a responder receives a Destination Address TLV (Type 129) in a query message and supports it, it MUST return Control Code 0x1 (Success) if it is the intended destination, or Error 0x15 (Invalid Destination Node Identifier) otherwise.
section: 4.1.2
rfc2119_level: MUST
topics:
    - mpls
    - routing
