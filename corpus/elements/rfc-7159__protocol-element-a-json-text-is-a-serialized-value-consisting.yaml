document: rfc-7159
kind: protocol-element
summary: A JSON text is a serialized value consisting of optional whitespace, a value, and optional whitespace. RFC 7159 removes the RFC 4627 constraint that a JSON text must be an object or array — any JSON value is now a valid JSON text.
section: "2"
