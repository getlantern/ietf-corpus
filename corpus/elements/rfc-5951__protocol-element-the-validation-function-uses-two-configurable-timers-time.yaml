summary: 'The Validation Function uses two configurable timers: Time-D (default ~2.5 ± 0.5 seconds) for fault cause persistency before declaring a failure, and Time-C (default ~10 ± 0.5 seconds) for fault cause absence before clearing a failure, as defined in ITU-T G.7710.'
