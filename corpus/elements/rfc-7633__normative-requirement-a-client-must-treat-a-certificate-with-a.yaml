document: rfc-7633
kind: normative-requirement
summary: A client MUST treat a certificate with a TLS feature extension as an invalid certificate if the features offered by the server do not contain all features present in both the client's ClientHello message and the TLS feature extension.
section: 4.3.3
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
