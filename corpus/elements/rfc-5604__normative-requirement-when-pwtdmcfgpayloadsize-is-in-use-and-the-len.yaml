document: rfc-5604
kind: normative-requirement
summary: When pwTDMCfgPayloadSize is in use and the LEN field in the control word is set to 0, the payload MUST assume the configured size; if the actual packet size is inconsistent with this length, the packet MUST be considered malformed.
