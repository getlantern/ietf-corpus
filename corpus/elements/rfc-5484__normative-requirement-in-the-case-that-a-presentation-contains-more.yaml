document: rfc-5484
kind: normative-requirement
summary: In the case that a presentation contains more than one stream, senders MUST continue to send the standard RTP synchronization information in RTCP, even if the streams carry SMPTE time-codes that could be used for synchronization.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
