document: rfc-2497
kind: wire-format
summary: The Interface Identifier for an ARCnet interface is formed from the EUI-64 by complementing the U/L bit (next-to-lowest order bit of the first octet). When no EUI-64 is available, the 8-bit ARCnet address is appended to 56 zero bits, resulting in a 64-bit identifier with the U/L bit set to 0 (local scope).
section: "4"
