document: rfc-5882
kind: interoperability-note
summary: BFD always interoperates at a basic level because asynchronous mode is mandatory and all other modes and functions are negotiated at run time. The interaction between BFD and client protocols is loosely coupled, so interoperability problems are very unlikely unless BFD is applied in contradictory ways.
section: "9"
topics:
