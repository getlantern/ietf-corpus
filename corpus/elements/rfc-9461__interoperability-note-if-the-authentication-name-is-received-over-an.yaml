document: rfc-9461
kind: interoperability-note
summary: If the authentication name is received over an insecure channel (e.g., a glue NS record), this specification cannot prevent the client from connecting to an attacker. The security of this mechanism depends on the integrity of the channel used to obtain the authentication name.
section: "6"
topics:
    - dns
    - security
