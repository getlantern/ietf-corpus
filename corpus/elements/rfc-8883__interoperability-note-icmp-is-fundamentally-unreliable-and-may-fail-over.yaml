document: rfc-8883
kind: interoperability-note
summary: ICMP is fundamentally unreliable and may fail over some paths. No protocol should be implemented that relies on reliable delivery of the ICMP errors defined in this document; alternative mechanisms such as PLPMTUD (RFC 4821) or Happy Eyeballs (RFC 8305) may be correlated to augment diagnosis.
section: "5.1"
topics:
