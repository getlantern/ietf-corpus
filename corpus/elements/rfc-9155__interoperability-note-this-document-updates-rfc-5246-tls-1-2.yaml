document: rfc-9155
kind: interoperability-note
summary: This document updates RFC 5246 (TLS 1.2) to prohibit MD5 and SHA-1 in digital signatures. Implementations that previously negotiated these hash algorithms based on RFC 5246 behavior must be updated to comply with these stricter requirements.
section: "1"
topics:
    - tls
    - security
