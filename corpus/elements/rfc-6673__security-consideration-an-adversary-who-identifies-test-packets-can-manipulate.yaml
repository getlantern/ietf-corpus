document: rfc-6673
kind: security-consideration
summary: An adversary who identifies test packets can manipulate their processing (increasing or decreasing delay) to distort measurements, or inject additional packets that appear to be part of the sample. Authentication or encryption (e.g., digital signatures as in RFC 5357) MAY be used to guard against injected traffic attacks.
section: "9.3"
rfc2119_level: MAY
topics:
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
