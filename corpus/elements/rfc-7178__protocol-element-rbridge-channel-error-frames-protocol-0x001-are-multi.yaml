document: rfc-7178
kind: protocol-element
summary: RBridge Channel Error frames (protocol 0x001) are multi-hop unicast messages returned on channel-level errors unless suppressed by the SL flag, Non-critical Alert processing, or rate limiting. The ERR field is non-zero and the frame includes the first 256 bytes of the erroneous message starting with the TRILL Header.
section: "3.2"
topics:
    - routing
