document: rfc-4920
kind: wire-format
summary: 'New IF_ID ERROR_SPEC TLV types 6-27 are defined for crankback reporting: types 6-7 (DOWNSTREAM/UPSTREAM_LABEL, variable length GMPLS label), type 8 (NODE_ID, 8 bytes, 32-bit Router ID), types 9/22 (OSPF_AREA, 8 bytes, 4-octet area identifier), types 10/23 (ISIS_AREA, variable 2-11 bytes + length field), types 11/24 (AUTONOMOUS_SYSTEM, 8 bytes, 32-bit AS number), types 12/13/25 (ERO subobjects, variable), types 14-20 (interface/label identifiers), types 26/27 (NODE_EXCLUSIONS and LINK_EXCLUSIONS, variable-length lists).'
section: "6.2"
topics:
    - mpls
    - routing
