document: rfc-4385
kind: normative-requirement
summary: When packet sequencing is enabled, the initial packet MUST be sent with sequence number one, subsequent packets MUST increment the sequence number by one, and the sequence number following 65535 is one (zero is skipped).
section: "4.1"
rfc2119_level: MUST
