document: rfc-6376
kind: security-consideration
summary: DKIM relies on DNS for public key distribution and is therefore vulnerable to DNS attacks including cache poisoning. DNSSEC can mitigate these risks but is not required by the specification.
section: "8.5"
topics:
    - email
    - dns
    - security
