document: rfc-5247
kind: normative-requirement
summary: 'The Secure Association Protocol MUST support: mutual proof of possession of EAP keying material (e.g., MSK); secure capabilities negotiation with integrity and replay protection of all negotiation messages; and explicit naming of keys used in the proof-of-possession exchange to prevent confusion when multiple key sets exist. Use of the key naming mechanism in Section 1.4.1 is RECOMMENDED.'
section: "3.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
