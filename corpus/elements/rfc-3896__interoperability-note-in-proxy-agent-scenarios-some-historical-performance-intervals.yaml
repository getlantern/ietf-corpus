document: rfc-3896
kind: interoperability-note
summary: In proxy agent scenarios, some historical performance intervals may be unavailable due to periods when the proxy was not communicating with the DS3/E3 device. dsx3ValidIntervals reports the maximum interval number for which data is available, and dsx3InvalidIntervals counts intervals with missing data.
