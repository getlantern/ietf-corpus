document: rfc-6249
kind: wire-format
summary: Mirror depth is expressed as an integer 'depth' attribute on Link header entries. 'depth=0' (default) means only the specific file is mirrored; 'depth=N' means N URI path segments closer to the host are also mirrored.
section: "3.4"
