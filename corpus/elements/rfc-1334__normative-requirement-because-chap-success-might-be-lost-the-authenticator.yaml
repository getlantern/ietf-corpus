document: rfc-1334
kind: normative-requirement
summary: Because CHAP Success might be lost, the authenticator MUST allow repeated Response packets after completing Authentication phase; responses with the current Challenge Identifier MUST return the same reply Code as when authentication completed. Response packets during any other phase MUST be silently discarded.
section: 3.2.1
rfc2119_level: MUST
topics:
    - security
    - crypto
