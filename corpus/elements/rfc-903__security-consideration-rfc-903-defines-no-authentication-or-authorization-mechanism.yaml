document: rfc-903
kind: security-consideration
summary: RFC 903 defines no authentication or authorization mechanism for RARP. Any host on the broadcast medium may respond to a RARP request with an arbitrary protocol address, making the protocol inherently vulnerable to spoofing by a malicious or misconfigured server on the same network segment.
section: III
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
