document: rfc-5428
kind: normative-requirement
summary: For PacketCable, IPCablecom, or ETSI events, the syslog facility field (pktcEventFacility) MUST be set to local0(16). This ensures consistent facility-based filtering at the syslog server.
section: "6"
rfc2119_level: MUST
topics:
