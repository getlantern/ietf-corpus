document: rfc-6602
kind: normative-requirement
summary: To disable bulk binding update support, the MAG MUST send a PBU with (B)=0 and MUST NOT include the Mobile Node Group Identifier option. The Binding Update List entry group identifier values MUST be set to 0 and the session MUST be excluded from bulk operations.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mobility
