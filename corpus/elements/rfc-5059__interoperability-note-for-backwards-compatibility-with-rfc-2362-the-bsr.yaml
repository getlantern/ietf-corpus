document: rfc-5059
kind: interoperability-note
summary: For backwards compatibility with RFC 2362, the BSR SHOULD treat a C-RP-Adv message containing no group ranges as though it carried the single group range ff00::/8 (IPv6) or 224/4 (IPv4), accepting it only if the router is the elected non-scoped BSR.
section: "3.3"
topics:
    - multicast
    - routing
