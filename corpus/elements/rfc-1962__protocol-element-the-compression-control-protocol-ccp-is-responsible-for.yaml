document: rfc-1962
kind: protocol-element
summary: The Compression Control Protocol (CCP) is responsible for configuring, enabling, and disabling data compression algorithms on both ends of a PPP link. It uses the same packet exchange mechanism as LCP, extended with Reset-Request and Reset-Ack codes (14 and 15) for decompression failure signaling.
