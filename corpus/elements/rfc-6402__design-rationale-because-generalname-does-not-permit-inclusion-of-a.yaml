document: rfc-6402
kind: design-rationale
summary: Because GeneralName does not permit inclusion of a port number, the specification designates port 5318 as the default CMC TCP port, to be used in the absence of other external configuration information. This avoids ambiguity without requiring a new name form.
section: "2.11"
