document: rfc-9112
kind: normative-requirement
summary: A server MUST respond with 400 (Bad Request) to any HTTP/1.1 request that lacks a Host header field, contains more than one Host field line, or has an invalid Host field value.
section: "3.2"
rfc2119_level: MUST
