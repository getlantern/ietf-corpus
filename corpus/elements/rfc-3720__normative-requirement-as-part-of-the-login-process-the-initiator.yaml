document: rfc-3720
kind: normative-requirement
summary: As part of the login process, the initiator and target SHOULD authenticate each other and MAY set a security association protocol for the session. An IPsec security association MAY be established before the Login request to protect the TCP connection.
section: 3.2.3
rfc2119_level: SHOULD
topics:
    - security
    - ipsec
    - crypto
