document: rfc-8138
kind: normative-requirement
summary: The encapsulating router that compresses a packet using this specification MUST also place an RPI in the packet when the DODAG cannot be identified without it — specifically when there is more than one DODAG in the network. The RPI must be present even when an SRH header is also placed in the packet.
section: 4.3.2
rfc2119_level: MUST
topics:
    - ip
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
