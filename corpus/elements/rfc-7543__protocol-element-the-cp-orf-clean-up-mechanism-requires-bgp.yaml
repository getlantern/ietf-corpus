document: rfc-7543
kind: protocol-element
summary: The CP-ORF clean-up mechanism requires BGP speakers to periodically evaluate and remove unneeded CP-ORF entries, since each CP-ORF consumes memory and compute resources on the supporting device. Criteria for removal are a matter of local policy.
