document: rfc-7622
kind: normative-requirement
summary: An entity preparing a string for inclusion in an XMPP domainpart slot MUST ensure it consists only of Unicode code points allowed in NR-LDH labels or U-labels as defined in RFC 5890, and MUST NOT include A-labels (each A-label MUST be converted to a U-label).
section: 3.2.1
rfc2119_level: MUST
topics:
    - dns
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
