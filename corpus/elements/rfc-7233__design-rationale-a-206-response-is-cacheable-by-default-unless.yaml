document: rfc-7233
kind: design-rationale
summary: A 206 response is cacheable by default unless otherwise indicated by explicit cache controls (per RFC 7234 Section 4.2.2). This allows partial content to be stored and reused without requiring explicit cache directives.
section: "4.1"
topics:
    - http
