document: rfc-8412
kind: normative-requirement
summary: The SWIMA-PC's event records MUST NOT contain coverage gaps. If undetected changes may have occurred, the SWIMA-PC MUST either compute a net change and update event records, or pick a new EID Epoch to signal a discontinuity.
section: 3.7.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
