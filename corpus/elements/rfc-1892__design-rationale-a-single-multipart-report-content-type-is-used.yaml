document: rfc-1892
kind: design-rationale
summary: A single Multipart/Report content-type is used as a container for all kinds of mail system reports so that mail processing programs benefit from a unified detection mechanism. Placing it as the outermost content type enables auto-processors to detect a report through RFC 822 header parsing without understanding the specific report subtype.
section: "1"
topics:
    - email
