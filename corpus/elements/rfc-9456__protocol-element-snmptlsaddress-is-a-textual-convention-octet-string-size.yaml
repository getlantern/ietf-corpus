document: rfc-9456
kind: protocol-element
summary: SnmpTLSAddress is a textual convention (OCTET STRING SIZE 1..255) representing an IPv4 dotted-decimal address, an RFC 5952 IPv6 address in square brackets, or an ASCII hostname, each followed by a colon and decimal port number. Internationalized hostnames MUST be encoded as A-labels per RFC 5890.
section: "4"
topics:
