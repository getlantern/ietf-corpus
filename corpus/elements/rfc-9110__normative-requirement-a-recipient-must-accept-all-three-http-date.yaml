document: rfc-9110
kind: normative-requirement
summary: A recipient MUST accept all three HTTP-date formats (IMF-fixdate, RFC 850, and ANSI C asctime). A sender generating a field containing timestamps MUST generate those timestamps in the IMF-fixdate format.
section: 5.6.7
rfc2119_level: MUST
topics:
    - http
