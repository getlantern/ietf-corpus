document: rfc-8990
kind: normative-requirement
summary: Generic objective names MUST NOT include a colon and MUST be registered with IANA. Privately defined objective names MUST include at least one colon, and the string preceding the last colon MUST be globally unique — acceptable methods are a PEN, an FQDN, or an email address.
section: 2.10.1
rfc2119_level: MUST
topics:
    - registry
