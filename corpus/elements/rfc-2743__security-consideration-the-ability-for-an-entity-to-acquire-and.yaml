document: rfc-2743
kind: security-consideration
summary: The ability for an entity to acquire and use credentials associated with a given identity is equivalent to that entity's ability to successfully assert that principal's identity. Underlying mechanisms and OS functions must constrain credential acquisition to appropriate processes; this responsibility must be taken seriously by implementors.
section: 1.1.1.2
topics:
    - security
