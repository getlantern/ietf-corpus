document: rfc-2749
kind: protocol-element
summary: 'COPS Decision Commands for RSVP are limited to Install (positive: accept/allow/admit an RSVP message or resource allocation) and Remove (negative: deny/reject). The single applicable Decision Flag is Trigger Error, which when set causes RSVP to schedule a PathErr (for Path) or ResvErr (for Resv).'
