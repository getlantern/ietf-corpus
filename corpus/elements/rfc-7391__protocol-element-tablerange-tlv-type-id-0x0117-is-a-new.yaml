document: rfc-7391
kind: protocol-element
summary: TABLERANGE-TLV (type ID 0x0117) is a new TLV associated with PATH-DATA-TLV that contains a 32-bit start index and a 32-bit end index to specify a range of table rows for GET or DEL operations. A start index of 0 implies the beginning of the table; an end index of 0xFFFFFFFF implies the last entry.
section: "3.1"
topics:
