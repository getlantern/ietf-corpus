document: rfc-5464
kind: protocol-element
summary: The GETMETADATA command retrieves server or mailbox annotations. An empty mailbox-name string retrieves server annotations; a non-empty string retrieves annotations on the named mailbox. It is available only in authenticated or selected state. Optional MAXSIZE and DEPTH options may be included.
section: "4.2"
topics:
    - email
