document: rfc-5574
kind: normative-requirement
summary: An RTP packet MAY contain Speex frames of the same or varying bit-rates, since bit-rate is conveyed in-band. Frames must be placed starting with the oldest frame and continue consecutively in time.
section: "3.3"
rfc2119_level: MAY
topics:
    - rtp
    - realtime
