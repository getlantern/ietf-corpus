document: rfc-8590
kind: protocol-element
summary: The <changePoll:caseId> element is an optional case identifier associated with the operation. Its required 'type' attribute is one of 'udrp', 'urs', or 'custom'; a 'name' attribute further qualifies custom case types using 7-bit US-ASCII.
