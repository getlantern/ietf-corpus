document: rfc-5804
kind: protocol-element
summary: 'Response codes provide machine-parsable detail within OK, NO, or BYE responses. The defined codes are: AUTH-TOO-WEAK, ENCRYPT-NEEDED, QUOTA (with sub-codes QUOTA/MAXSCRIPTS and QUOTA/MAXSIZE), REFERRAL, SASL, TRANSITION-NEEDED, TRYLATER, ACTIVE, NONEXISTENT, ALREADYEXISTS, TAG, and WARNINGS.'
section: "1.3"
topics:
