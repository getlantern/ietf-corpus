document: rfc-6120
kind: security-consideration
summary: XMPP services are susceptible to denial-of-service attacks including large XML stanza floods, deeply nested XML structures (XML bombs), excessive connection attempts, and excessive IQ requests. Servers SHOULD implement rate limiting, maximum stanza sizes, XML nesting depth limits, and connection throttling.
section: "13.12"
topics:
    - security
