document: rfc-8531
kind: protocol-element
summary: Within each Maintenance Domain, the 'mas' container holds a list of Maintenance Associations (MAs) keyed by 'ma-name-string'. Each MA has 'ma-name-format', 'connectivity-context' (extensible choice), 'cos-id' (uint8), 'cc-enable' (boolean), and contains lists of MEPs and optionally MIPs.
