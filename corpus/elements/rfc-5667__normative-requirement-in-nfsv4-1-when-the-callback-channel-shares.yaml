document: rfc-5667
kind: normative-requirement
summary: In NFSv4.1 when the callback channel shares a connection with client requests, the client MUST ascertain whether an incoming message is an RPC REPLY before processing it, and the server MUST ascertain whether an incoming message is an RPC CALL. Both MUST NOT reject or accept a message without determining its proper context.
section: "5.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
