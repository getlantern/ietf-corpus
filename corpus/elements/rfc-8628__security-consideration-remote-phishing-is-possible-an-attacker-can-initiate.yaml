document: rfc-8628
kind: security-consideration
summary: 'Remote phishing is possible: an attacker can initiate the device flow on a device they control and trick a victim into entering the user code. It is RECOMMENDED to inform the user they are authorizing a device and to confirm device possession; the authorization server SHOULD display device information so users can detect impersonation.'
section: "5.4"
rfc2119_level: RECOMMENDED
topics:
    - oauth
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
