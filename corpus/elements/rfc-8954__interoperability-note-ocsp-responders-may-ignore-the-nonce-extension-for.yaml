document: rfc-8954
kind: interoperability-note
summary: OCSP responders MAY ignore the Nonce extension for requests where the nonce length is less than 16 octets, providing a transition path while still accepting the minimum 1-octet nonces required for backward compatibility with RFC 6960 clients.
