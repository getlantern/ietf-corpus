document: rfc-4030
kind: design-rationale
summary: A fixed-length 4-byte Key ID was chosen over a variable-length key name (as used in DNS TSIG) to minimize the size expansion caused by the relay agent information option. Named keys would require more physical space and more complex encoding and parsing implementations.
section: "13.1"
topics:
    - security
    - crypto
