document: rfc-7160
kind: protocol-element
summary: Clock rate is the multiplier used to convert from a wallclock value in seconds to an equivalent RTP timestamp value (without the fixed random offset). RFC 3550 uses synonymous terms including 'clock frequency', 'media clock rate', 'timestamp unit', 'timestamp frequency', and 'RTP timestamp clock rate'.
