document: rfc-5103
kind: normative-requirement
summary: When a Biflow traverses a middlebox, it MUST be clear at the Collecting Process whether packets were observed before or after modification. The Observation Process SHOULD be located on one side of a middlebox, and the Exporting Process SHOULD communicate both the incoming and modified values of changed flow properties.
section: "4"
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
