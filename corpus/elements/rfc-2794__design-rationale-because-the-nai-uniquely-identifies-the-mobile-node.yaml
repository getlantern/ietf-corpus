document: rfc-2794
kind: design-rationale
summary: Because the NAI uniquely identifies the mobile node, a home address is not always necessary for authentication and authorization with a foreign AAA server. Allowing a zero Home Address in the Registration Request enables dynamic home address assignment via AAA infrastructure in foreign domains.
section: "1"
