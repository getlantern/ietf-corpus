document: rfc-4474
kind: security-consideration
summary: The display-name in the From header is not signed because display-names are not unique identifiers and enrollment practices cannot reliably bind them. An authentication service MAY enforce display-name policy and return 403 if policy is violated, but this is not mandatory.
section: "13.2"
topics:
    - sip
    - security
