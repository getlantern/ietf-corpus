document: rfc-3461
kind: security-consideration
summary: The DSN extension does not create new security exposures but adds implementation complexity and thus increases risk of implementation errors. Previous ad-hoc notification mechanisms sometimes produced notification storms due to unanticipated interactions with mailing list expansion; this specification carefully designs success notification to prevent such storms.
section: "8"
topics:
    - email
    - security
