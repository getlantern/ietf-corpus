document: rfc-4474
kind: normative-requirement
summary: A verifier MUST evaluate domain name correspondence between the From header domain and the signing certificate's subject by following RFC 2818, Section 3.1, substituting the SIP domain for the HTTP server hostname. Self-signed certificates are strongly RECOMMENDED against unless prior key exchange has justified trust.
section: "13.4"
rfc2119_level: MUST
topics:
    - sip
    - security
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
