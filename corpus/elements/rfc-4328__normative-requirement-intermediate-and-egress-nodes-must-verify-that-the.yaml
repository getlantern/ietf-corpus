document: rfc-4328
kind: normative-requirement
summary: Intermediate and egress nodes MUST verify that the node and its interfaces can support the requested Signal Type, NMC, and NVC values. If not supported, the node MUST generate a PathErr message with 'Traffic Control Error/Service unsupported'.
section: "6"
rfc2119_level: MUST
