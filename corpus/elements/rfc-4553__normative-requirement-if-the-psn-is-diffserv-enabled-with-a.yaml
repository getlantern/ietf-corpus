document: rfc-4553
kind: normative-requirement
summary: If the PSN is DiffServ-enabled with a PDB guaranteeing low jitter and low loss, SAToP SHOULD use this PDB. If IntServ-enabled, Guaranteed Service (GS) with bandwidth reservation equal to or greater than aggregate TDM traffic SHOULD be used.
section: "7"
rfc2119_level: SHOULD
