summary: 'A TAL is an ordered sequence of: (1) an rsync URI (RFC 5781), (2) a <CRLF> or <LF> line break, and (3) a subjectPublicKeyInfo (RFC 5280) in DER format encoded in Base64 (RFC 4648 Section 4). The format is ASCII text.'
