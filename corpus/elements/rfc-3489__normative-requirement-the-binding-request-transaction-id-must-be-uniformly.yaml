document: rfc-3489
kind: normative-requirement
summary: The Binding Request transaction ID MUST be uniformly and randomly distributed between 0 and 2^128 − 1; any two non-identical requests sent to different servers or from different source addresses/ports MUST carry different transaction IDs.
section: "9.3"
rfc2119_level: MUST
topics:
