document: rfc-4171
kind: protocol-element
summary: The State Change Notification (SCN) service allows the iSNS server to push notifications about network events to registered clients. Regular SCNs are scoped to shared Discovery Domains; Management SCNs, available only to Control Nodes, are not DD-scoped.
section: 2.2.3
