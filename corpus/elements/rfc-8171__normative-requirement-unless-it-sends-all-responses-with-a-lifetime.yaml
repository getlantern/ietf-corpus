document: rfc-8171
kind: normative-requirement
summary: 'Unless it sends all responses with a Lifetime of 0, a Pull Directory MUST take action by sending Update Messages to minimize the time a TRILL switch will continue to use stale information. If Method 3 tracking is used, the server MUST NOT clear the need-to-update indication until it receives an Acknowledge Message or has sent a configurable number of updates (default: 3 updates 100 ms apart).'
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
