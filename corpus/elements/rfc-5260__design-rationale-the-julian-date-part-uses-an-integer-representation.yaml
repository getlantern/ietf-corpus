document: rfc-5260
kind: design-rationale
summary: The 'julian' date-part uses an integer representation (Modified Julian Day), making i;ascii-numeric almost certainly the best comparator. Other numeric date-parts (year, month, day, hour, minute, second, weekday) use fixed-width string integers compatible with i;octet, i;ascii-casemap, and i;ascii-numeric equivalently.
section: "4.3"
