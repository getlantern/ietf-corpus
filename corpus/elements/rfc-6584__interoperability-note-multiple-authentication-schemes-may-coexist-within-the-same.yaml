document: rfc-6584
kind: interoperability-note
summary: Multiple authentication schemes MAY coexist within the same ALC or NORM session, even on the same communication path. All receivers MUST recognize EXT_AUTH but may ignore its content if they do not support the scheme indicated by the ASID; this allows incremental deployment.
section: "1"
topics:
    - security
    - multicast
