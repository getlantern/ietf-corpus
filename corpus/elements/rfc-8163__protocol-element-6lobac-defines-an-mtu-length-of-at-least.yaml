document: rfc-8163
kind: protocol-element
summary: 6LoBAC defines an MTU length of at least 1280 octets and at most 1500 octets; support for 1500 octets is RECOMMENDED. The network-layer MTU becomes the MSDU, which MS/TP then COBS-encodes; BACnet Clause 9 supports MSDUs up to 2032 octets.
