document: rfc-8050
kind: security-consideration
summary: This document does not introduce new security vulnerabilities beyond those in RFC 6396, but it permits export of more detailed routing data. Organizations storing BGP routing information in MRT format should consider the implications of recording additional path data in their environment.
section: "6"
topics:
