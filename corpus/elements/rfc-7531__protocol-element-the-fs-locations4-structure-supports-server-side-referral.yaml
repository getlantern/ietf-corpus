document: rfc-7531
kind: protocol-element
summary: 'The fs_locations4 structure supports server-side referral and migration: it encodes the original fs_root pathname plus a variable array of fs_location4 entries, each with one or more server names and a rootpath. This enables transparent filesystem relocation.'
