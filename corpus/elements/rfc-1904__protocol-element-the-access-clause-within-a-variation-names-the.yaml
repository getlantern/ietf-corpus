document: rfc-1904
kind: protocol-element
summary: The ACCESS clause within a VARIATION names the agent-specific access level, which may be lower than the object's defined maximum. For notifications, only 'not-implemented' is applicable; 'write-only' is included solely for backward compatibility and must not be used for newly defined object types.
