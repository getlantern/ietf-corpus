document: rfc-7524
kind: wire-format
summary: 'The MCAST-VPN NLRI Route Key field for Leaf A-D routes used for global table multicast encodes: RD (8 octets; 0 for S,G or all-ones for *,G), Multicast Source Length (1 octet), Multicast Source (variable), Multicast Group Length (1 octet), Multicast Group (variable), and Ingress PE''s IP Address (4 or 16 octets). The full NLRI additionally prepends Route Type=4 (1 octet) and Length (1 octet) and appends Originating Router''s IP Address.'
section: 6.2.2
topics:
    - mpls
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
