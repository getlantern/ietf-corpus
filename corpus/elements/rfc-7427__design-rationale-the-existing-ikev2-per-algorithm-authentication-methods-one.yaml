document: rfc-7427
kind: design-rationale
summary: 'The existing IKEv2 per-algorithm authentication methods (one for RSA, one for DSS/SHA-1, three for ECDSA curves each tied to one hash) are cumbersome: adding new hash functions or elliptic curves requires defining new authentication method codes, causing the number of required methods to become unmanageable. This RFC introduces a single generic ''Digital Signature'' method to replace all per-algorithm methods.'
section: "1"
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
