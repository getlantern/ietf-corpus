document: rfc-8485
kind: security-consideration
summary: VoT defines no policies for IdPs determining which vector values apply to a transaction, nor for RPs applying vector values to security decisions. These policies must be agreed upon by IdP and RP and documented in the human-readable trust framework at the trustmark URL.
section: "8"
topics:
