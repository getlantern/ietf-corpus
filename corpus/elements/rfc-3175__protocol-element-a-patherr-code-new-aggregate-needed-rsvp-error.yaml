document: rfc-3175
kind: protocol-element
summary: A PathErr code NEW-AGGREGATE-NEEDED (RSVP Error Code 26) is defined. It is sent by the deaggregator to the aggregator to signal that a new aggregate Path must be established for a given DSCP, without removing existing path state. The required DSCP is encoded in a DCLASS Object in the error message.
section: "3.2"
topics:
