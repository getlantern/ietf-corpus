summary: isdnBearerTable records per-B-channel operational data including channel type (dialup/leased), peer ISDN address and subaddress (E.164 preferred, '+' prefix), call origin, information transfer capability (isdnBearerInfoType), multirate flag, call setup and connect timestamps (TimeStamp), and charged units (Gauge32).
