document: rfc-1662
kind: normative-requirement
summary: When LCP control signals are not available, the implementation MUST signal the Up event to LCP upon initialization and SHOULD NOT signal the Down event. When signals are available, they SHOULD be used to signal Up and Down events.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
