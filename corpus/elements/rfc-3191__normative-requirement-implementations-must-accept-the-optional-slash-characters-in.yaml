document: rfc-3191
kind: normative-requirement
summary: Implementations MUST accept the optional slash characters in pstn-email addresses but SHOULD NOT generate them. Gateways are allowed to strip them off when converting to Internet mail addressing.
section: "4"
rfc2119_level: MUST
topics:
    - email
