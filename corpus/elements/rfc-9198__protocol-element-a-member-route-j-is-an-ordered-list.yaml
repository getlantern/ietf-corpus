document: rfc-9198
kind: protocol-element
summary: 'A Member Route j is an ordered list {h(1,j), ..., h(Nj,j)} where consecutive Hops are exactly one Hop apart and h(Nj,j)=Dst. Member Routes must be unique: any two Member Routes in the same Ensemble differ either in minimum Hop count or have at least one distinct Hop h(i,j) != h(i,k).'
section: "3.4"
