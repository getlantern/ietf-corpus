document: rfc-7552
kind: normative-requirement
summary: IPv6 LDP Link Hello packets MUST use ff02:0:0:0:0:0:0:2 (link-local scope) as the destination multicast address. Hellos received on other IPv6 all-routers multicast addresses MUST be dropped. The link-local IPv6 address MUST be used as the source IP address.
section: "5.1"
rfc2119_level: MUST
topics:
    - mpls
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
