document: rfc-4666
kind: normative-requirement
summary: The total length of a TLV parameter (Tag + Length + Value) MUST be a multiple of 4 octets. A sender MUST NOT pad with more than 3 octets. The receiver MUST ignore padding octets.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
