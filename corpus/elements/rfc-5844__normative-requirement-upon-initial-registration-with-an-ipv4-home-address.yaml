document: rfc-5844
kind: normative-requirement
summary: Upon initial registration with an IPv4 Home Address Request option set to ALL_ZERO, the LMA MUST allocate an IPv4 home address, create a single Binding Cache entry managing both IPv4 and IPv6 bindings, establish a bidirectional tunnel, create an IPv4 host route, and reply with a PBA containing the IPv4 Home Address Reply option.
section: 3.1.2.2
rfc2119_level: MUST
topics:
    - mobility
    - ip
