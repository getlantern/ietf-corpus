document: rfc-9193
kind: protocol-element
summary: The ABNF grammar defines Content-Format-Spec as either a Content-Format-Number or Content-Format-String. Content-Format-String is Content-Type followed by zero or more ('@' Content-Coding) segments. The grammar is adapted from RFC 9110, RFC 6838, RFC 5234, and RFC 8866.
