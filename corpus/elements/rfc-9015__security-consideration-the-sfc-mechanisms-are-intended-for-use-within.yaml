document: rfc-9015
kind: security-consideration
summary: The SFC mechanisms are intended for use within a single provider's operational domain (as mandated by RFC 8300), which limits the attack surface. However, BGP sessions carrying SFIR and SFPR routes must be secured to prevent unauthorized parties from advertising fraudulent SFPs or SFIs that redirect or intercept traffic flows.
section: "9"
topics:
    - bgp
    - routing
    - security
