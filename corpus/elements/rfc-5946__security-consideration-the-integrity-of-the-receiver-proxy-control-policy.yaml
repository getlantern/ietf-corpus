document: rfc-5946
kind: security-consideration
summary: 'The integrity of the Receiver Proxy Control policy element can be protected via two optional mechanisms: (1) the RSVP INTEGRITY object in RSVP messages providing a chain of trust, or (2) the INTEGRITY object within the POLICY_DATA object for guaranteeing integrity between non-adjacent PEPs. The latter MAY be supported.'
section: "5.2"
topics:
    - security
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
