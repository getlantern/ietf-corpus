document: rfc-6647
kind: security-consideration
summary: An attacker aware of the greylisting scheme in use could rotate SMTP client parameters to continuously generate new tuples, inflating the greylisting database toward denial-of-service. Implementers should configure a failure policy for when the database is unavailable or under attack.
section: "8.2"
topics:
    - email
    - security
