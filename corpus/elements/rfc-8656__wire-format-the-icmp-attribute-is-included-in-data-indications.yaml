document: rfc-8656
kind: wire-format
summary: The ICMP attribute is included in Data indications when the server relays an ICMP error to the client. It carries the ICMP type (8 bits), ICMP code (8 bits), and additional ICMP-type-specific data. ICMP forwarding always uses Data indications even when channel bindings are in use for UDP data.
section: "18.13"
