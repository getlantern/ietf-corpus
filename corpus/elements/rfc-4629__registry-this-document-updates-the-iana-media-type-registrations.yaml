document: rfc-4629
kind: registry
summary: This document updates the IANA media type registrations for video/H263-1998 and video/H263-2000, previously registered in RFC 3555, adding new optional SDP parameters including CPCF, PAR, BPP, HRD for H263-1998 and PROFILE, LEVEL, INTERLACE for H263-2000.
