document: rfc-7623
kind: design-rationale
summary: C-MAC mobility is supported without re-advertising B-MAC routes because C-MAC-to-B-MAC bindings are maintained in the data plane. B-MAC addresses are fixed to PE nodes/segments, so VM mobility does not trigger BGP updates.
