document: rfc-7389
kind: design-rationale
summary: Existing PMIPv6 specifications (RFC 6275, RFC 6463) allowed the MAG to separate control and user plane via the Alternate Care-of Address option, but provided no corresponding mechanism for the LMA to advertise a different address for its user plane. This document fills that gap by defining a new mobility option for the LMA.
section: "1"
topics:
    - mobility
    - ip
