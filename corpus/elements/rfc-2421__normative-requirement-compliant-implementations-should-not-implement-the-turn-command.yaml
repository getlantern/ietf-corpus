document: rfc-2421
kind: normative-requirement
summary: Compliant implementations SHOULD NOT implement the TURN command because SMTP lacks authentication, making TURN an opportunity to improperly fetch mail queued for another destination.
section: 5.1.5
rfc2119_level: SHOULD NOT
