document: rfc-8006
kind: design-rationale
summary: The interface uses HTTP and its native caching mechanisms (ETags, Cache-Control) for metadata cacheability, reducing acquisition latency while maintaining freshness. I-JSON is used for encoding to leverage existing data structure tooling rather than defining a new format.
