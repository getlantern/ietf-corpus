document: rfc-8089
kind: design-rationale
summary: The syntax definition in Section 2 makes the entire authority component, including double slashes "//", optional. This differs from RFC 1738, which required file URLs to always start with "file://" followed by a (possibly blank) host name. The change accommodates the minimal form "file:/path/to/file" found in widespread practice.
section: A
