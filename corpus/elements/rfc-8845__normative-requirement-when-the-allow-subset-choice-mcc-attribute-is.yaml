document: rfc-8845
kind: normative-requirement
summary: When the Allow Subset Choice MCC attribute is true and the MCC references other Captures, the Consumer MAY select a specific subset of those Captures in a Configure message, and the Provider MUST then include only that subset. If the attribute is false, the Consumer MUST NOT select a subset.
section: 7.2.1.4
rfc2119_level: MUST
topics:
    - realtime
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
