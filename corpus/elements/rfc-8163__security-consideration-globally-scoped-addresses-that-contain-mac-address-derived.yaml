document: rfc-8163
kind: security-consideration
summary: Globally scoped addresses that contain MAC-address-derived IIDs may expose a network to address-scanning attacks. It is RECOMMENDED that a 64-bit semantically opaque IID be generated for each globally scoped address, using methods such as RFC 3315, RFC 3972, RFC 4941, RFC 5535, or RFC 7217.
section: "12"
rfc2119_level: RECOMMENDED
topics:
    - ip
    - v6ops
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
