document: rfc-5565
kind: protocol-element
summary: For GRE (without options) and L2TPv3 softwires, signaling is BGP-based as specified in RFC 5512 (BGP Encapsulation SAFI and Tunnel Encapsulation Attribute). IP-in-IP and GRE without options require no signaling; MPLS uses LDP or RSVP-TE; IPsec uses IKEv2.
