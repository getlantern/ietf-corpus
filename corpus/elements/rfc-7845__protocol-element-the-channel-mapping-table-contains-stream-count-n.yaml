document: rfc-7845
kind: protocol-element
summary: The Channel Mapping Table contains Stream Count 'N' (8-bit unsigned), Coupled Stream Count 'M' (8-bit unsigned), and Channel Mapping (8*C bits, one octet per output channel). An index of 255 in the Channel Mapping indicates a silent output channel.
section: 5.1.1
