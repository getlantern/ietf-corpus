document: rfc-3686
kind: normative-requirement
summary: The same IV and key combination MUST NOT be used more than once. Any reuse of the per-packet IV with the same nonce and key is catastrophic, immediately leaking information about the plaintext in both packets.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - ipsec
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
