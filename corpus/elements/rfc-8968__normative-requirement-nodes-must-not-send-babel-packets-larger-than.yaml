document: rfc-8968
kind: normative-requirement
summary: Nodes MUST NOT send Babel packets larger than the attached interface's MTU adjusted for known lower-layer headers (at least UDP and IP) or 512 octets, whichever is larger, but not exceeding 2^16-1 adjusted for lower-layer headers.
section: "3"
rfc2119_level: MUST NOT
topics:
    - routing
