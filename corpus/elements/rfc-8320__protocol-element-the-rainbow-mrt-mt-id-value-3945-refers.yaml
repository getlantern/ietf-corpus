document: rfc-8320
kind: protocol-element
summary: The Rainbow MRT MT-ID (value 3945) refers to multiple MRT forwarding topologies and the default forwarding topology simultaneously. It allows an LSR to advertise a single label to all peers for the same (MT-ID, Prefix), reducing signaling overhead. IMPLICIT_NULL or EXPLICIT_NULL labeled with Rainbow MT-ID applies to all three FEC types (shortest path, red, and blue).
section: "4.2"
topics:
