document: rfc-3498
kind: protocol-element
summary: The apsCommandTable (indexed by group name and channel number, exists only while apsConfigEntry is active) provides apsCommandSwitch (ApsSwitchCommand) and apsCommandControl (ApsControlCommand) objects. Reading apsCommandSwitch returns the last command written since initialization, not necessarily the currently active request; the K1/K2 status objects must be read to determine current APS state.
