document: rfc-8591
kind: security-consideration
summary: Certificate validation must match the certificate to the SIP AoR the UAS relies upon for display or filtering, typically the From header field or P-Asserted-Identity, not just any header field. Online revocation checks should be performed as mobile messaging is typically an online application.
section: "12"
topics:
