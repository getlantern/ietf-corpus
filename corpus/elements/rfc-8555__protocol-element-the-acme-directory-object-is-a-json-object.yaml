document: rfc-8555
kind: protocol-element
summary: The ACME directory object is a JSON object mapping resource type names (newNonce, newAccount, newOrder, newAuthz, revokeCert, keyChange) to their URLs, plus an optional 'meta' object containing termsOfService, website, caaIdentities, and externalAccountRequired. It is the sole URL that clients need to bootstrap.
