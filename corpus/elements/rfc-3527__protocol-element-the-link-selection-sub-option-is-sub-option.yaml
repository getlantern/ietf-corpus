document: rfc-3527
kind: protocol-element
summary: The link-selection sub-option is sub-option 5 within the DHCP Relay Agent Information Option (RFC 3046). It contains a single IP address representing a subnet, computed by ANDing any address on the subnet with its subnet mask, leaving network/subnet bits intact and zeroing host bits.
