document: rfc-5416
kind: normative-requirement
summary: All IEEE 802.11 management frames MUST be tunneled using 802.11 Tunnel mode. The 802.3 Tunnel mode MUST NOT be selected in conjunction with Split MAC mode. The AC MUST NOT request a MAC mode or Tunnel Mode that was not advertised by the WTP during the discovery process.
section: "6.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
