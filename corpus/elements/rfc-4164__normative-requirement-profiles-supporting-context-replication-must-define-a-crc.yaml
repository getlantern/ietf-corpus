document: rfc-4164
kind: normative-requirement
summary: Profiles supporting context replication MUST define a CRC over the original uncompressed header as part of the profile-specific information in the IR-CR packet. This is necessary to allow the decompressor to verify that the replication process has succeeded.
section: 3.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
