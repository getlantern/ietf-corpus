document: rfc-4120
kind: normative-requirement
summary: If an unknown authorization data element type is received by a server other than the TGS in an AP-REQ or in a ticket in an AP-REQ, authentication MUST fail. Optional authorization elements SHOULD be enclosed in AD-IF-RELEVANT to avoid this.
section: 1.5.1
rfc2119_level: MUST
topics:
    - security
