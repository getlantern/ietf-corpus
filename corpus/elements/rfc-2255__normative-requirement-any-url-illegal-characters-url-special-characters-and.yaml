document: rfc-2255
kind: normative-requirement
summary: Any URL-illegal characters, URL special characters, and the reserved character '?' occurring inside a dn, filter, or other element of an LDAP URL MUST be escaped using the % method described in RFC 1738. A comma ',' inside an extension value MUST also be escaped using the % method.
section: "3"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
