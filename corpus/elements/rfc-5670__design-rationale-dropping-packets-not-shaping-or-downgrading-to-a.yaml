document: rfc-5670
kind: design-rationale
summary: Dropping packets (not shaping or downgrading to a lower-priority BA) is the only permitted action for overloaded PCN links because shaping is unsuitable for real-time inelastic traffic and downgrading causes packet mis-ordering.
section: B.4
topics:
