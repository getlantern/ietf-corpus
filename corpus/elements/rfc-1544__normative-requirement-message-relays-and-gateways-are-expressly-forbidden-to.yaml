document: rfc-1544
kind: normative-requirement
summary: Message relays and gateways are expressly forbidden to alter their processing based on the presence of the Content-MD5 field. However, a gateway is allowed to remove it if the corresponding MIME entity is translated to a different content-type.
section: "3"
rfc2119_level: MUST NOT
topics:
