document: rfc-2670
kind: protocol-element
summary: docsIfDownstreamChannelTable describes active downstream channels for a CMTS and the received downstream channel for a CM. Fields include channel ID (0–255), center frequency (Hz), bandwidth (Hz), modulation (QAM64/QAM256), FEC interleaving depth, and power level (TenthdBmV). Indexed by ifIndex with ifType docsCableDownstream(128).
