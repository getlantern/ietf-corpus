document: rfc-7231
kind: normative-requirement
summary: A client MUST NOT generate header fields in a TRACE request containing sensitive data (e.g., credentials or cookies) that might be disclosed by the response. A client MUST NOT send a message body in a TRACE request.
section: 4.3.8
rfc2119_level: MUST NOT
topics:
    - http
    - security
