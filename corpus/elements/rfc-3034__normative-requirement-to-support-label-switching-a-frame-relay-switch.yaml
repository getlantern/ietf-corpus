document: rfc-3034
kind: normative-requirement
summary: To support label switching, a Frame Relay switch MUST implement the label switching control component, consisting primarily of label allocation and maintenance procedures. The switch MUST also participate as a peer in network layer routing protocols (e.g., OSPF, IS-IS) since the control component uses routing information directly.
section: "6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
