document: rfc-2925
kind: security-consideration
summary: These MIBs can be misused to generate excessive network traffic toward arbitrary hosts, constituting a form of denial-of-service attack. Sending probes too frequently can negatively affect target system performance; implementations MUST be managed with SNMPv3 authentication and access control to restrict who may initiate operations.
section: "5.0"
topics:
    - security
    - snmp
    - measurement
