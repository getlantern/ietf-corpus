summary: nfsace4 encodes an ACE as type (acetype4, uint32_t), flag (aceflag4, uint32_t), access_mask (acemask4, uint32_t), and who (utf8str_mixed, variable-length UTF-8). ACE4_GENERIC_READ=0x00120081, ACE4_GENERIC_WRITE=0x00160106, ACE4_GENERIC_EXECUTE=0x001200A0 are predefined composite masks.
