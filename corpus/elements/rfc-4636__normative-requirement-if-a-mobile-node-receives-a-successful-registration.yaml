document: rfc-4636
kind: normative-requirement
summary: If a mobile node receives a successful Registration Reply (status code 0 or 1) with a FA Error Extension indicating the foreign agent is not honoring the reply, the mobile node SHOULD send a deregistration message to the home agent to prevent inconsistent registration state.
section: "5"
rfc2119_level: SHOULD
topics:
    - mobility
