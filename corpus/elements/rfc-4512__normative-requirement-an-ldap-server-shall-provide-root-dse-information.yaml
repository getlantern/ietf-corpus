document: rfc-4512
kind: normative-requirement
summary: An LDAP server SHALL provide root DSE information when a client performs a Search with empty baseObject, scope baseObject, and filter '(objectClass=*)'. The root DSE SHALL NOT be included if the client performs a subtree search starting from the root.
section: "5.1"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
