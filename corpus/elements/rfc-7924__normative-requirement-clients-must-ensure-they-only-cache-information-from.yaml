document: rfc-7924
kind: normative-requirement
summary: Clients MUST ensure they only cache information from legitimate sources. Information MUST only be cached after the successful completion of a TLS exchange to prevent cache poisoning by an attacker.
section: "7"
rfc2119_level: MUST
topics:
