document: rfc-9690
kind: protocol-element
summary: 'RSA-KEM is a one-pass KEM algorithm providing three functions: KeyGen() generates an RSA key pair; Encapsulate(pk) generates a random integer z, encrypts it as ct = z^e mod n, and derives a shared secret SS = KDF(Z, ssLen); Decapsulate(sk, ct) decrypts to recover z and derives the same shared secret.'
section: "1.2"
topics:
