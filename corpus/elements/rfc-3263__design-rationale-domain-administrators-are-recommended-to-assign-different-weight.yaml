document: rfc-3263
kind: design-rationale
summary: Domain administrators are RECOMMENDED to assign different weight values to SRV records with equal priority (e.g., 1000 and 1001 rather than both 1000), making deterministic ordering easier for stateless proxies without requiring algorithmic tie-breaking.
