document: rfc-2814
kind: protocol-element
summary: RSVP_HOP_L2 object extends the standard RSVP_HOP with the Layer 2 MAC address of the previous hop. It is included in PATH messages by L3 devices forwarding onto managed segments so that L2 device DSBMs can route RESV messages back without needing an ARP cache.
section: 4.2.2.5
