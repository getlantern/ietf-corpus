document: rfc-5552
kind: normative-requirement
summary: If VoiceXML call transfer is supported, the mechanisms described in Section 6 MUST be employed. For consultation transfers, implementations MUST NOT use RFC 4488 to suppress the implicit subscription associated with the REFER message, since the NOTIFY sipfrag response is required to determine transfer success or failure.
section: "6"
rfc2119_level: MUST
topics:
    - sip
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
