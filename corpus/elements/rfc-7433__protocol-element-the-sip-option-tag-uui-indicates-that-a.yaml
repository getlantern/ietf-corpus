document: rfc-7433
kind: protocol-element
summary: The SIP option tag 'uui' indicates that a UA supports and understands the User-to-User header field. It can be used in Require or Supported header fields to require or discover mechanism support, and proxies may use it to route to an appropriate UA.
section: "6.6"
