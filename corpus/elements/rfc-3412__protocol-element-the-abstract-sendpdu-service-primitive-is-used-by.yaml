document: rfc-3412
kind: protocol-element
summary: The abstract sendPdu() service primitive is used by applications to request the Dispatcher to send a PDU. It accepts transportDomain, transportAddress, messageProcessingModel, securityModel, securityName, securityLevel, contextEngineID, contextName, pduVersion, PDU, and expectResponse as inputs.
