document: rfc-6323
kind: design-rationale
summary: The update follows a recommendation in RFC 5348, Section 3.2.1 to measure RTT at the sender rather than the receiver. Sender-based RTT estimates enable more accurate X_recv measurement, better loss event disambiguation, accurate quiescence period computation, and can also help middleboxes verify conforming congestion control.
section: "2.2"
topics:
    - congestion
