document: rfc-2326
kind: normative-requirement
summary: A SET_PARAMETER request SHOULD only contain a single parameter to allow the client to determine why a particular request failed. If the request contains several parameters, the server MUST only act if all parameters can be set successfully.
section: "10.9"
rfc2119_level: MUST
topics:
    - realtime
