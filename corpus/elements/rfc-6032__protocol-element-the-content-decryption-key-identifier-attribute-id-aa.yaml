document: rfc-6032
kind: protocol-element
summary: The content-decryption-key-identifier attribute (id-aa-KP-contentDecryptKeyID) is an unprotected attribute for use with EncryptedData to identify the symmetric keying material needed for decryption when ambiguity exists. Its value is an OCTET STRING (ContentDecryptKeyID) with no imposed structure.
