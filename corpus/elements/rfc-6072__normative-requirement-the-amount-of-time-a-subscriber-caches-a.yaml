document: rfc-6072
kind: normative-requirement
summary: The amount of time a Subscriber caches a certificate SHOULD be configurable; a default of one day is RECOMMENDED. The UA MUST NOT cache a certificate for longer than the subscription duration.
section: "4"
rfc2119_level: SHOULD
