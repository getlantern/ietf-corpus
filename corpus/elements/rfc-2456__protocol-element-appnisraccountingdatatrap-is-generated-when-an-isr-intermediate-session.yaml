document: rfc-2456
kind: protocol-element
summary: appnIsrAccountingDataTrap is generated when an ISR (intermediate session routing) session passing through an APPN node is taken down, carrying final values of bidirectional FMD/non-FMD PIU and byte counts plus session uptime (appnIsInSessUpTime). It is controlled by appnIsInGlobeCtrAdminStatus in the APPN MIB, not by appnTrapControl.
section: "4"
