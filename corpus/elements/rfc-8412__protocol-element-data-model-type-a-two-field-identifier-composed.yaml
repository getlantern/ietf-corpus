document: rfc-8412
kind: protocol-element
summary: 'Data Model Type: a two-field identifier composed of a Private Enterprise Number (PEN, 3 bytes) and a Data Model Type value (1 byte), together identifying the format of a software inventory record. The IANA PEN (0x000000) governs centrally registered types; values 0xC0–0xFF are reserved for local enterprise use.'
section: 3.4.2
topics:
