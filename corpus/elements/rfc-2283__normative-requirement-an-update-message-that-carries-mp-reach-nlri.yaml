kind: normative-requirement
summary: An UPDATE message that carries MP_REACH_NLRI MUST also carry the ORIGIN and AS_PATH attributes (in both EBGP and IBGP exchanges), and in IBGP exchanges MUST also carry the LOCAL_PREF attribute.
