summary: 'Datapoint Corporation assigned ARCNET protocol IDs for this specification: 212 (decimal) for IP, 213 for ARP, and 214 for RARP. These differ from the protocol IDs used by RFC 1051, enabling coexistence of both encapsulations on the same ARCNET medium without interoperability.'
