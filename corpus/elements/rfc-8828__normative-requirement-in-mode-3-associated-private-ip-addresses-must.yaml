document: rfc-8828
kind: normative-requirement
summary: In Mode 3, associated private IP addresses MUST NOT be provided to the application; only addresses discovered via STUN and TURN on the default route are gathered. This may cause traffic to hairpin through a NAT or fall back to an application TURN server.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - webrtc
    - nat
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
