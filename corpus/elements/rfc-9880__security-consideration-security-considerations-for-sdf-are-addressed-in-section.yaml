document: rfc-9880
kind: security-consideration
summary: Security considerations for SDF are addressed in Section 8 of RFC 9880, referenced from the application/sdf+json media type registration. As SDF documents are JSON-encoded data modeling artifacts, standard JSON processing security considerations apply to implementors.
