document: rfc-8829
kind: normative-requirement
summary: When addIceCandidate encounters invalid field values or a processing error, the supplied IceCandidate MUST be ignored and an error MUST be returned. If both the m= section index and MID are null for a new remote candidate, this MUST be treated as an invalid condition.
section: 4.1.19
rfc2119_level: MUST
