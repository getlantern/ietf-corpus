document: rfc-4648
kind: design-rationale
summary: The URL-safe base64 alphabet uses '-' and '_' at positions 62 and 63 (replacing '+' and '/') because '/' is problematic in file names and URLs, '~' has special meaning in some file system environments, and '.' is undesirable when multiple dots are disallowed in filenames.
section: "5"
