document: rfc-5302
kind: protocol-element
summary: 'Six levels of route preference are defined: (1) L1 intra-area/external with internal metric; (2) L2 intra-area, L2 external, L1->L2 inter-area routes with internal metric; (3) L2->L1 inter-area routes with internal metric; (4) L1 external with external metric; (5) L2 external and L1->L2 inter-area external with external metric; (6) L2->L1 inter-area external with external metric.'
