document: rfc-2740
kind: normative-requirement
summary: 'When receiving an OSPF packet, the router MUST verify: version number equals 3, IPv6 checksum is valid, Area ID matches the receiving interface or the backbone (for virtual link packets), and Instance ID matches the receiving interface''s Instance ID. Packets failing any check MUST be discarded.'
section: 3.2.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
