document: rfc-4175
kind: protocol-element
summary: The pixel group (pgroup) is defined as the size in octets of the smallest grouping of pixels such that (1) the grouping comprises an integer number of octets and (2) if color sub-sampling is used, samples are only shared within the grouping.
