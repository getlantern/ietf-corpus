document: rfc-8390
kind: design-rationale
summary: The Path Affinity Set (PAS) was introduced to minimize the exchange of diversity information between core network nodes (CNs) and client devices (ENs). The PAS is a single abstract SRLG identifier associated with a given path, avoiding the need to share detailed SRLG lists across UNI boundaries where core network topology is confidential.
