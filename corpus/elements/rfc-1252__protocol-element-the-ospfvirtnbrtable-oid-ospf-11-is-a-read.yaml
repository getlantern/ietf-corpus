document: rfc-1252
kind: protocol-element
summary: The ospfVirtNbrTable (OID ospf 11) is a read-only table of virtual neighbor information derived from the virtual interface configuration, indexed by ospfVirtNbrArea and ospfVirtNbrRtrId. Fields include ospfVirtNbrIpAddr, ospfVirtNbrOptions, ospfVirtNbrState, ospfVirtNbrEvents, and ospfVirtNbrLSRetransQLen.
