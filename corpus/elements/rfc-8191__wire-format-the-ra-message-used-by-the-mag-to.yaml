summary: 'The RA message used by the MAG to announce HNP renumbering contains two Prefix Information Options: the first carries the old HNP with Preferred Lifetime set to 0 (deprecating it), the second carries the new HNP with both Valid Lifetime and Preferred Lifetime greater than 0.'
