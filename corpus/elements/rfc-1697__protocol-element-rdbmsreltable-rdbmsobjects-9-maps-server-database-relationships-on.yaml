document: rfc-1697
kind: protocol-element
summary: rdbmsRelTable (rdbmsObjects 9) maps server-database relationships on a host, indexed by { rdbmsDbIndex, applIndex }. Each entry carries rdbmsRelState and rdbmsRelActiveTime, enabling SNMP walk operations to enumerate all servers capable of accessing a given database.
