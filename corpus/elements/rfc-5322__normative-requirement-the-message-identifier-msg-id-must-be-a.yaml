document: rfc-5322
kind: normative-requirement
summary: The message identifier (msg-id) MUST be a globally unique identifier for a message, and the generator MUST guarantee its uniqueness. The recommended approach is to include a domain identifier on the right-hand side of the '@' and combine the current date/time with a system-unique value on the left.
section: 3.6.4
rfc2119_level: MUST
topics:
    - email
