document: rfc-6887
kind: protocol-element
summary: The PREFER_FAILURE option (MAP only) instructs the server to return CANNOT_PROVIDE_EXTERNAL rather than assign an alternate external port/address when the suggested external port is unavailable. This is implied for SCTP MAP requests and for all PEER requests; it is useful when the application requires a specific external port (e.g., active-mode FTP).
section: "13.2"
topics:
    - nat
