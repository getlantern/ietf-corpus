document: rfc-7874
kind: normative-requirement
summary: WebRTC endpoints are REQUIRED to implement Opus (RFC 6716 with RFC 7587 payload format), PCMA and PCMU (G.711 with RFC 3551 payload format), RFC 3389 comfort noise, and the 'audio/telephone-event' media type (RFC 4733). These form the mandatory baseline codec set.
section: "3"
rfc2119_level: REQUIRED
topics:
    - webrtc
    - realtime
    - rtp
