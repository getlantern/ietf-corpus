document: rfc-6370
kind: protocol-element
summary: An MPLS-TP Tunnel_ID identifies a transport service providing a stable binding to the client across protection or restoration events. It is formed as A1-{Node_ID::Tunnel_Num}::Z9-{Node_ID::Tunnel_Num}, where Tunnel_Num is a 16-bit unsigned integer unique within the context of a Node_ID.
section: "5.1"
topics:
    - routing
