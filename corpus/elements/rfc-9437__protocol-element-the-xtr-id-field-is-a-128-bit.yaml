document: rfc-9437
kind: protocol-element
summary: The xTR-ID field is a 128-bit identifier appended to the Map-Request after the last EID-Record when the I-bit is set. The Site-ID is a 64-bit field immediately following the xTR-ID. Together they uniquely identify the subscribing tunnel router within a LISP deployment.
