document: rfc-7731
kind: registry
summary: IANA allocated the variable-scope IPv6 multicast address FF0X:0:0:0:0:0:0:FC as ALL_MPL_FORWARDERS from the 'Variable Scope Multicast Addresses' sub-registry. By default MPL Forwarders use this address with Realm-Local scope (scop=3) as the MPL Domain Address for a single-domain deployment.
