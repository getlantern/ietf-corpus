document: rfc-9260
kind: state-machine
summary: 'The SCTP association state machine defines eight states: CLOSED, COOKIE-WAIT (INIT sent), COOKIE-ECHOED (COOKIE ECHO sent), ESTABLISHED (data transfer), SHUTDOWN-PENDING, SHUTDOWN-SENT, SHUTDOWN-RECEIVED, and SHUTDOWN-ACK-SENT. Transitions are triggered by sending or receiving INIT, INIT ACK, COOKIE ECHO, COOKIE ACK, SHUTDOWN, SHUTDOWN ACK, and SHUTDOWN COMPLETE chunks.'
