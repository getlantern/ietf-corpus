document: rfc-5990
kind: protocol-element
summary: RsaKemParameters is a SEQUENCE containing 'keyDerivationFunction' (an AlgorithmIdentifier for the KDF, MUST be KDF2 or KDF3 for ANS X9.44 alignment) and 'keyLength' (an INTEGER 1..MAX specifying the KEK length in bytes). These parameters appear as the associated parameters for id-kem-rsa.
