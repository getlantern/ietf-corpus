document: rfc-5988
kind: normative-requirement
summary: When extension relation types are compared, they MUST be compared as strings in a case-insensitive fashion, character-by-character (after converting to URIs if serialised in a different form). All-lowercase URIs SHOULD be used for extension relations.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
