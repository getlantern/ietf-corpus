document: rfc-7283
kind: design-rationale
summary: The sole purpose of requiring relay agents to forward unknown messages is to ensure that when legitimate new DHCPv6 messages are defined in the future, relay agents manufactured prior to those definitions will by default succeed in relaying such messages, maintaining forward compatibility.
