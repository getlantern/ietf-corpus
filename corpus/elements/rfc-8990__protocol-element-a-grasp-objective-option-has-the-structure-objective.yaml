document: rfc-8990
kind: protocol-element
summary: A GRASP objective option has the structure [objective-name, objective-flags, loop-count, ?objective-value]. The name is a UTF-8 string compared byte by byte; loop-count is 0–255 and controls relay depth and negotiation convergence; objective-value is any CBOR-serializable data.
section: 2.10.1
