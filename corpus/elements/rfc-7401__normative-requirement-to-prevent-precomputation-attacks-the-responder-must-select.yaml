document: rfc-7401
kind: normative-requirement
summary: 'To prevent precomputation attacks, the Responder MUST select #I such that the Initiator cannot guess it, and the construction MUST allow the Responder to verify that #I was selected by itself and not the Initiator. The Responder MUST periodically change its puzzle secret.'
section: 4.1.2
rfc2119_level: MUST
topics:
    - security
    - ip
