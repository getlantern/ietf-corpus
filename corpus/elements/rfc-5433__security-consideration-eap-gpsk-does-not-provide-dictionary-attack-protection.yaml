document: rfc-5433
kind: security-consideration
summary: EAP-GPSK does not provide dictionary attack protection. Users who derive the PSK from a password are not protected. The PSK SHOULD be drawn from a pool of at least 2^128 bits of uniformly random secrets.
section: "12.7"
topics:
    - security
    - crypto
