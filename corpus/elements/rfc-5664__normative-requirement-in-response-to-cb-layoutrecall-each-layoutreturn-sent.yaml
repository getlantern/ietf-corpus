document: rfc-5664
kind: normative-requirement
summary: In response to CB_LAYOUTRECALL, each LAYOUTRETURN sent MUST completely cover at least one outstanding layout segment; the client MUST NOT return a sub-range of a layout segment it holds, because OSD byte-range capabilities cannot be split.
section: "10.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
