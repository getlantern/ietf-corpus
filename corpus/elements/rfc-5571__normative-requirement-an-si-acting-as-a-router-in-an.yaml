document: rfc-5571
kind: normative-requirement
summary: An SI acting as a router in an IPv6 Softwire MUST include the IA_PD option (RFC 3633) in the DHCPv6 Solicit message to request an IPv6 prefix. The SC SHOULD inject a route for the delegated prefix to forward traffic to the relevant Softwire.
section: 5.4.1
rfc2119_level: MUST
topics:
    - v6ops
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
