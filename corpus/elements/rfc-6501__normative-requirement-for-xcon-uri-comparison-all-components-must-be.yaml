document: rfc-6501
kind: normative-requirement
summary: For XCON-URI comparison, all components MUST be converted to lowercase, then the URI comparison MUST be applied on a character-by-character basis as prescribed by RFC 3986 Section 6.2.1. This character-by-character comparison applies even when the host takes the form of an IP address.
section: 3.3.2
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
