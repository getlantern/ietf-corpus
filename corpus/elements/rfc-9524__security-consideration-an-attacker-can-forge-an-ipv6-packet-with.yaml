document: rfc-9524
kind: security-consideration
summary: An attacker can forge an IPv6 packet with a victim's source address, a Replication-SID as DA, and a low Hop Limit to cause forwarding nodes to generate a storm of ICMPv6 Time Exceeded messages toward the victim. The IPv6 Hop Limit Threshold check in Section 2.2 can help mitigate this attack.
section: "4"
topics:
    - security
    - ip
    - routing
