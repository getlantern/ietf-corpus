document: rfc-9509
kind: security-consideration
summary: The new EKU KeyPurposeIds reduce existing security risks by providing a means to identify whether a certificate is intended for JWT Claims Set signing, OAuth 2.0 access token signing, or JWE content-encryption key encryption, thereby mitigating cross-protocol attacks that arise when certificate purpose is not restricted.
