document: rfc-5621
kind: protocol-element
summary: The 'handling' parameter of the Content-Disposition header field specifies how a UAS reacts if it receives a body part with an unrecognized content type or disposition type. The value 'optional' means ignore it; 'required' means return a 415 response. The default value is 'required'.
section: "8.1"
topics:
    - sip
    - realtime
