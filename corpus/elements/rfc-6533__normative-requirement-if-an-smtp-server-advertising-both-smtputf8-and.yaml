document: rfc-6533
kind: normative-requirement
summary: If an SMTP server advertising both SMTPUTF8 and DSN needs to return an undeliverable SMTPUTF8 message to a return-path server that does not support SMTPUTF8, the undeliverable body and headers MUST be encoded using a 7-bit Content-Transfer-Encoding such as base64 or quoted-printable.
section: "4.5"
rfc2119_level: MUST
topics:
    - email
