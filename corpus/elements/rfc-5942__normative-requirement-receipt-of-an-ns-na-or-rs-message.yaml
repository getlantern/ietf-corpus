document: rfc-5942
kind: normative-requirement
summary: Receipt of an NS, NA, or RS message MUST NOT be used to modify the Prefix List. The Neighbor Cache may still be updated, but on-link status inferred solely from receiving these ND messages must not propagate to the Prefix List or Destination Cache.
section: "3"
rfc2119_level: MUST NOT
topics:
    - ip
    - security
    - v6ops
