document: rfc-4039
kind: normative-requirement
summary: If a client receives a DHCPACK with the Rapid Commit option, it SHOULD process it immediately (without waiting for additional DHCPOFFER or DHCPACK messages) and use the address and configuration information contained therein.
section: "3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
