document: rfc-9610
kind: normative-requirement
summary: When returning ContactCards, any Media with a 'data:' URI SHOULD return a blobId and omit the uri property; the mediaType MUST also be set. Clients MAY send a blobId instead of uri when creating or updating a ContactCard.
section: "3"
rfc2119_level: SHOULD
topics:
    - json
