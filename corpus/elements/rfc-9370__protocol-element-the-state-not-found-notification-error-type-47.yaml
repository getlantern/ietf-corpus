kind: protocol-element
summary: The STATE_NOT_FOUND notification (Error Type 47, Protocol ID and SPI Size both 0, empty data) is sent by the responder when it receives an IKE_FOLLOWUP_KE message for which it has no key exchange state, typically due to a timeout deleting the associated state.
