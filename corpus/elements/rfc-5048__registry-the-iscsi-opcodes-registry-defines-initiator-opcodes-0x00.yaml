document: rfc-5048
kind: registry
summary: The iSCSI Opcodes registry defines initiator opcodes (0x00–0x06, 0x10, 0x1c–0x1e) and target opcodes (0x20–0x26, 0x31–0x32, 0x3c–0x3e, 0x3f), with ranges 0x07–0x1b and 0x27–0x3b reserved to IANA, and opcode bit 2 designating initiator (0) vs. target (1) origin.
section: "11.2"
