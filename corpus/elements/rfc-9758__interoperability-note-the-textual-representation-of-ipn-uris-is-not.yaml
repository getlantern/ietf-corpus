document: rfc-9758
kind: interoperability-note
summary: The textual representation of ipn URIs is not forwards compatible with RFC 9171 when non-default Allocator Identifiers are present. The same interoperability constraints that apply to the three-element CBOR encoding also apply to the text representation in contexts such as the TCPCLv4 session initialization message.
section: "7.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
