document: rfc-4104
kind: protocol-element
summary: pcelsPolicySet is an abstract LDAP object class derived from pcimPolicy that represents a set of policies with a common decision strategy and role set. It includes attributes pcelsPolicySetName, pcelsDecisionStrategy, pcimRoles, and pcelsPolicySetList (DNs of subordinate pcelsPolicySetAssociation entries).
