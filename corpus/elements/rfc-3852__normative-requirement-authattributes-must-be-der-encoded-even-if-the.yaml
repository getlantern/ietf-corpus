document: rfc-3852
kind: normative-requirement
summary: AuthAttributes MUST be DER encoded even if the rest of AuthenticatedData is BER encoded. When authAttrs is present, it MUST contain at minimum a content-type attribute and a message-digest attribute, and the digestAlgorithm field MUST also be present; authAttrs MUST be present if the eContentType is not id-data.
section: "9.1"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
