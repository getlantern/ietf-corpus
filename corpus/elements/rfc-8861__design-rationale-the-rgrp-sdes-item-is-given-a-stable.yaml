document: rfc-8861
kind: design-rationale
summary: The RGRP SDES item is given a stable identifier (rather than derived from SSRCs) to ensure that the Reporting Group and its members can be correctly associated when multiple reporting sources exist, and so that the reporting SSRC can be matched to the correct group after an SSRC collision.
