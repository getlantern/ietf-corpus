document: rfc-1327
kind: design-rationale
summary: 'Five principles govern the specification: (1) pragmatism over academic complexity, (2) maximize cross-gateway functionality, (3) never discard information during transformation, (4) gateways must understand higher-level semantics beyond their operational layer, and (5) mappings should be reversible so a double transformation returns to the original.'
