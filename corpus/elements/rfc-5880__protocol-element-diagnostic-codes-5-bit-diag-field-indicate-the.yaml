document: rfc-5880
kind: protocol-element
summary: 'Diagnostic codes (5-bit Diag field) indicate the reason for the most recent session state change: 0=No Diagnostic, 1=Control Detection Time Expired, 2=Echo Function Failed, 3=Neighbor Signaled Session Down, 4=Forwarding Plane Reset, 5=Path Down, 6=Concatenated Path Down, 7=Administratively Down, 8=Reverse Concatenated Path Down; values 9–31 reserved.'
section: "4.1"
