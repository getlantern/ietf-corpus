document: rfc-4120
kind: normative-requirement
summary: Clock skew correction MUST use the offset technique (recording difference between KDC authtime and local clock) rather than directly adjusting the system clock, because the KDC reply is authenticated only to the user, not the workstation.
section: 3.1.5
rfc2119_level: MUST
topics:
    - security
    - ntp
