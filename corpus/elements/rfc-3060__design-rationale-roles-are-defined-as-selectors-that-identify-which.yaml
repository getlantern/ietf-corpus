document: rfc-3060
kind: design-rationale
summary: Roles are defined as selectors that identify which subset of policies apply to a resource, enabling a policy administrator to update policy for a role once and have the Policy Framework propagate configuration changes to all resources playing that role, rather than configuring each resource individually.
section: 5.2.1
