document: rfc-8414
kind: normative-requirement
summary: TLS certificate checking MUST be performed by the client when making an authorization server metadata request. Checking that the server certificate is valid for the issuer identifier URL prevents man-in-the-middle and DNS-based attacks.
section: "6.2"
rfc2119_level: MUST
topics:
    - tls
    - oauth
    - security
