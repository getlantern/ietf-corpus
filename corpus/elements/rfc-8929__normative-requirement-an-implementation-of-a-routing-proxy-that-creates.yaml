document: rfc-8929
kind: normative-requirement
summary: An implementation of a Routing Proxy that creates a Binding MUST also create an associated host route pointing to the Registering Node on the LLN interface. When a Binding is removed, the associated host route MUST also be removed.
section: "9"
rfc2119_level: MUST
topics:
    - ip
    - routing
