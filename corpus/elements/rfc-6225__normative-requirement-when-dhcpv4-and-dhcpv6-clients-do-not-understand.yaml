document: rfc-6225
kind: normative-requirement
summary: When DHCPv4 and DHCPv6 clients do not understand a datum value, they MUST assume a WGS84 datum (EPSG 4326 or 4979 depending on whether altitude is present) and proceed accordingly, ensuring some location is available even if less accurate.
section: 2.2.3.1
rfc2119_level: MUST
topics:
    - ip
