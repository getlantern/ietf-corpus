document: rfc-4776
kind: normative-requirement
summary: It is RECOMMENDED that all elements in a particular script (CAtype 128) and language (CAtype 0) be grouped together to reduce the number of script and language identifiers needed. Elements SHOULD be included in numeric order by CAtype within each script/language group.
section: "3.4"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
