document: rfc-9835
kind: interoperability-note
summary: The module supports both UNI and NNI use cases per RFC 9408, with the AC 'role' set accordingly. In NNI deployments (e.g., inter-AS with ASBRs), an ASBR treats the adjacent network's ASBR as a CE, and the AC role is set to 'ietf-sap-ntw:nni'.
section: "4.2"
topics:
