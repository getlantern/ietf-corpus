document: rfc-2233
kind: security-consideration
summary: The interfaces group MIB includes writable objects (notably ifAdminStatus and ifAlias) whose unauthorized modification could disrupt network connectivity or mislead management applications. Implementations should apply appropriate SNMP access controls to prevent unauthorized writes to these objects.
section: "9"
topics:
    - snmp
    - security
