document: rfc-2228
kind: normative-requirement
summary: It is not appropriate for a server to reject a command containing a base 64 encoding simply because it is long (assuming the decoding is otherwise well-formed). Case MUST NOT be ignored when reading commands and replies containing base 64 encodings.
section: "10"
rfc2119_level: MUST
topics:
    - security
