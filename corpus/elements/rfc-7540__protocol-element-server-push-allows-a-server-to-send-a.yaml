document: rfc-7540
kind: protocol-element
summary: Server push allows a server to send a PUSH_PROMISE frame on an open or half-closed (remote) stream to reserve an even-numbered server-initiated stream, then send a pushed response on that stream. A client may disable server push by setting SETTINGS_ENABLE_PUSH to 0; a server MUST NOT send PUSH_PROMISE frames after this setting is acknowledged.
section: "8.2"
topics:
    - http
