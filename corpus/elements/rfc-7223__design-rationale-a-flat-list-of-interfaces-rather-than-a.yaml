document: rfc-7223
kind: design-rationale
summary: A flat list of interfaces (rather than a hierarchical structure) was chosen to keep the data model simple, facilitate mapping to proprietary native data models, and to allow references by a single leafref. The model supports both physical and logical interfaces in the same flat list.
