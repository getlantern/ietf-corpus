document: rfc-1112
kind: normative-requirement
summary: When a host joins a new group, it SHOULD immediately transmit a Report for that group rather than waiting for a Query. It is RECOMMENDED that the Report be repeated once or twice after short delays to cover loss of the initial Report.
section: Appendix I
rfc2119_level: SHOULD
topics:
    - multicast
    - ip
