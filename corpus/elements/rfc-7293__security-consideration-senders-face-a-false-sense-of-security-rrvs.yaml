document: rfc-7293
kind: security-consideration
summary: 'Senders face a false sense of security: RRVS is a request, not a guarantee. Receiving systems may not implement the protocol correctly or at all, or may override it for local policy or legal reasons. Senders should avoid RRVS except when sending to known, trusted receivers.'
section: "13.3"
topics:
    - email
    - security
