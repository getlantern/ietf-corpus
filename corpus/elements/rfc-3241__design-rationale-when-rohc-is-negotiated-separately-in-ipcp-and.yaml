document: rfc-3241
kind: design-rationale
summary: When ROHC is negotiated separately in IPCP and IPV6CP with different parameter values, the effective channel parameters are the logical union (maximum of MAX_CID, MRRU, MAX_HEADER; union of PROFILES sets), because IPCP and IPV6CP together constitute exactly one ROHC channel per PPP link.
