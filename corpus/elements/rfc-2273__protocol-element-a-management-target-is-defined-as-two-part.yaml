kind: protocol-element
summary: 'A Management Target is defined as two-part information: (1) destination transport domain and transport address (transport endpoint), and (2) SNMP parameters consisting of message processing model, security model, security level, and security name. A many-to-many relationship may exist between transport endpoints and SNMP parameter sets.'
