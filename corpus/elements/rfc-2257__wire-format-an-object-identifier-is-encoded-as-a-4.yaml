document: rfc-2257
kind: wire-format
summary: 'An Object Identifier is encoded as a 4-byte header (n_subid: 1 byte, prefix: 1 byte, include: 1 byte, reserved: 1 byte) followed by n_subid 4-byte sub-identifiers. A non-zero prefix value x implies an implicit prefix 1.3.6.1.x, reducing encoding length.'
