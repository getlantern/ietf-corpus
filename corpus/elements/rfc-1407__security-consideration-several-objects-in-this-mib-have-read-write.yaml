document: rfc-1407
kind: security-consideration
summary: Several objects in this MIB have read-write ACCESS, including dsx3LineType, dsx3LineCoding, dsx3SendCode, dsx3LoopbackConfig, dsx3TransmitClockSource, and all far-end identification code objects. Unauthorized write access to these objects could disrupt DS3/E3 interface operation or alter the physical transmission configuration of the managed device.
section: "7"
topics:
    - snmp
    - security
