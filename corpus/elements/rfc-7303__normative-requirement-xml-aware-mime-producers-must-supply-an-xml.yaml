document: rfc-7303
kind: normative-requirement
summary: XML-aware MIME producers MUST supply an XML text declaration at the beginning of non-UNICODE XML external parsed entities that would otherwise begin with 0xFE 0xFF, 0xFF 0xFE, or 0xEF 0xBB 0xBF, to avoid mistaken BOM detection.
section: "3.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
