document: rfc-1662
kind: interoperability-note
summary: PPP frames can be automatically recognized during a login sequence by the octet sequences starting with 7e ff 03 c0 21 (standard), 7e ff 7d 23 c0 21 (escaped ETX), or 7e 7d df 7d 23 c0 21 (escaped DEL and ETX). Only the third form generates a correctly checksummed PPP frame.
section: B
