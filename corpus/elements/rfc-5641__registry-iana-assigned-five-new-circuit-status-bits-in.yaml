summary: 'IANA assigned five new Circuit Status Bits in the L2TP registry (managed per RFC 3931 Section 10.7): Bit 9 (S, Standby), Bit 10 (E, Local PSN-facing PW egress Tx Fault), Bit 11 (I, Local PSN-facing PW ingress Rx Fault), Bit 12 (T, Local AC egress Tx Fault), Bit 13 (R, Local AC ingress Rx Fault). Bit 14 (N, New) was updated to mark its use as deprecated.'
