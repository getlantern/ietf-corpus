document: rfc-9703
kind: protocol-element
summary: PeerAdj SID Sub-TLV (Type 38) identifies a specific inter-AS adjacency link, carrying Adj type (1 octet; 1=IPv4, 2=IPv6), 3 reserved octets, Local/Remote AS Numbers (4 octets each), Local/Remote BGP Router IDs (4 octets each), and Local/Remote Interface Addresses (4 octets each for IPv4, 16 octets each for IPv6), yielding a length of 28 (IPv4) or 52 (IPv6) octets.
section: "4.2"
topics:
