document: rfc-4025
kind: normative-requirement
summary: If the end-to-end integrity of the IPSECKEY RR is suspect, the end client MUST restrict use to cases where the RR owner name matches the content of the gateway field; records with a non-null gateway field obtained under unverified conditions MUST be ignored.
section: 4.1.2
rfc2119_level: MUST
topics:
    - dns
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
