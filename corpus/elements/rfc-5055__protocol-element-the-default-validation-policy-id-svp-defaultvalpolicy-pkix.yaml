document: rfc-5055
kind: protocol-element
summary: The default validation policy (id-svp-defaultValPolicy, pkix arc 19.1) corresponds to standard PKIX path processing with server-chosen defaults. It MUST use the basic validation algorithm and has no policy parameters. Conforming servers MUST support it, though a server may be configured to reject all requests using it for security reasons.
section: 3.2.4.1.1
topics:
    - pkix
