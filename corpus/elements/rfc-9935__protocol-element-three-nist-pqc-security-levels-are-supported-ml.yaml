document: rfc-9935
kind: protocol-element
summary: Three NIST PQC security levels are supported. ML-KEM-512 targets Level 1 (AES-128 equivalent), ML-KEM-768 targets Level 3 (AES-192 equivalent), and ML-KEM-1024 targets Level 5 (AES-256 equivalent). All parameter sets produce a 32-byte shared secret; ciphertext sizes are 768, 1088, and 1568 bytes respectively.
section: B
