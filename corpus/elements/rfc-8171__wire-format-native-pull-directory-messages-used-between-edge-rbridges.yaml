summary: Native Pull Directory messages used between edge RBridges and end stations use the same RBridge Channel Protocol number but expand the common 8-byte header to 12 or 16 bytes to add TRILL Header and inner Data Label information absent in native (non-TRILL-encapsulated) frames.
