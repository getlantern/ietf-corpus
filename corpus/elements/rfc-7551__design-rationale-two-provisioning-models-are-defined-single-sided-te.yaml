document: rfc-7551
kind: design-rationale
summary: 'Two provisioning models are defined: single-sided (TE tunnel configured on one endpoint only, which triggers reverse LSP creation at the far end via REVERSE_LSP Object) and double-sided (two tunnels configured independently at each endpoint using matching ASSOCIATION Objects). The split exists to support both management-plane-driven and operator-symmetric deployment scenarios.'
