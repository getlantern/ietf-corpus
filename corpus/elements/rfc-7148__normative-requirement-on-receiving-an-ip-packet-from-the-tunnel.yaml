document: rfc-7148
kind: normative-requirement
summary: On receiving an IP packet from the tunnel with the MAG, the LMA MUST decapsulate the packet and MUST ensure there is an established binding for the mobile router and that the source IP address is a DMNP delegated to a mobile router reachable over that tunnel.
section: 5.2.3
rfc2119_level: MUST
topics:
    - mobility
    - security
