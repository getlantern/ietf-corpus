document: rfc-6140
kind: interoperability-note
summary: All location-service records resulting from a single 'bnc' Contact URI expansion share a single Path. Proxies cannot make per-contact path-inclusion policy decisions. Similarly, all AORs registered in a single bulk REGISTER share a common service route.
section: "7.4"
