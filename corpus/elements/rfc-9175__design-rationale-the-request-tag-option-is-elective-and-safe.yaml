document: rfc-9175
kind: design-rationale
summary: The Request-Tag option is elective and safe-to-forward (not critical/unsafe) because servers unaware of it will treat differing Request-Tag values as separate operations — the correct safe behavior — and proxies can still forward such operations without interference.
section: "3.6"
topics:
    - security
