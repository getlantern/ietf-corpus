document: rfc-4615
kind: interoperability-note
summary: When used as the PRF in IKEv2 for generating keying material, AES-CMAC-PRF-128 is considered to take fixed-size 16-octet keys ('half the bits must come from Ni and half from Nr'). For authenticating with shared secrets (IKEv2 section 2.16), the key may vary in length.
section: "3"
topics:
