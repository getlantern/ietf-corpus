document: rfc-4383
kind: security-consideration
summary: TESLA security depends on correct computation of the 'safety condition' (Section 3.5 of RFC 4082) to verify that a disclosed key could not have been known by an attacker at the time the corresponding packet was sent. Packets that fail the safety condition are considered unauthenticated.
section: "7"
topics:
