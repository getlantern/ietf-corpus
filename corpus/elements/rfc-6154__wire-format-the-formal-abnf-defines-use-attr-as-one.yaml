document: rfc-6154
kind: wire-format
summary: The formal ABNF defines 'use-attr' as one of the seven named attributes (\All, \Archive, \Drafts, \Flagged, \Junk, \Sent, \Trash) or a 'use-attr-ext' (backslash followed by an atom) reserved for future extensions. 'create-param' is extended with 'USE SP '(' [use-attr *(SP use-attr)] ')'.
