document: rfc-3971
kind: normative-requirement
summary: When using SEND, NS, NA, RA, and Redirect messages MUST contain the RSA Signature option added as the last option in the message. Router Solicitation messages not sent with the unspecified source address MUST also contain the RSA Signature option.
section: 5.2.1
rfc2119_level: MUST
topics:
