document: rfc-5122
kind: security-consideration
summary: The full range of Unicode characters allowed in XMPP IRIs makes address spoofing ("phishing") easier, as visually similar Unicode characters can impersonate legitimate addresses. Applications presenting XMPP IRIs to human users must adhere to best practices regarding address mimicking as defined in RFC 3987's Security Considerations.
section: "5.6"
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
