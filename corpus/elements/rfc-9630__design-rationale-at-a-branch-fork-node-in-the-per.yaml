document: rfc-9630
kind: design-rationale
summary: At a branch fork node in the per-section postcard solution, only common data shared by all replicated packets (e.g., ingress interface and ingress timestamp) can be exported in the postcard, because branch-specific data (egress timestamp, egress interface, node delay) differs per copy.
