document: rfc-7487
kind: normative-requirement
summary: If an egress LSR does not support a requested capability (BFD version, encapsulation format, authentication type, mismatched Auth Key ID, timestamp format, delay/loss mode, jitter, dyadic, loopback, combined mode, or fault management signaling), it MUST generate the corresponding 'OAM Problem' PathErr sub-code.
