document: rfc-7356
kind: protocol-element
summary: The Scope Flooding Support TLV (type 243, length 1–127) is carried in IIH PDUs to announce which flooding scopes an IS supports on a circuit. Each value byte encodes a 7-bit Supported Scope and a Reserved bit. In L1 LAN IIHs, L2 and L2 circuit scopes MUST NOT be advertised; in L2 LAN IIHs, L1 and L1 circuit scopes MUST NOT be advertised.
