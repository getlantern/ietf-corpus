document: rfc-3418
kind: design-rationale
summary: The authenticationFailure DESCRIPTION was weakened from MUST to MAY (relative to RFC 1907) to reflect that while all implementations may be capable of generating the trap, the snmpEnableAuthenTraps object is the authoritative control, and the trap pertains to all SNMP entities, not just agents.
section: "7"
topics:
    - snmp
    - security
