document: rfc-5531
kind: interoperability-note
summary: A server may return an AUTH_SHORT verifier containing an opaque shorthand credential; the client may subsequently use this shorthand in place of the full AUTH_SYS credential. If the server flushes the cache, it rejects with AUTH_REJECTEDCRED and the client must revert to AUTH_SYS.
section: A
topics:
    - security
