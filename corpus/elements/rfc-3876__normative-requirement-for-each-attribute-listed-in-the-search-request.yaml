document: rfc-3876
kind: normative-requirement
summary: 'For each attribute listed in the Search Request''s attributes parameter, the server MUST apply the ValuesReturnFilter to each filtered entry: values evaluating TRUE against one or more filter items are included; values evaluating FALSE or undefined against all items are excluded, resulting in an empty set for that attribute if no values match.'
section: "2"
rfc2119_level: MUST
topics:
