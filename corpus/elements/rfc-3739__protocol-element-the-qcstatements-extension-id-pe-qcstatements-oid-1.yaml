document: rfc-3739
kind: protocol-element
summary: The qcStatements extension (id-pe-qcStatements, OID 1.3.6.1.5.5.7.1.3) is an optional extension containing a SEQUENCE OF QCStatement, each with a statementId OID and optional statementInfo. It may be critical or non-critical but MUST NOT mix the two — all statements in a single extension share the same criticality.
section: 3.2.6
topics:
