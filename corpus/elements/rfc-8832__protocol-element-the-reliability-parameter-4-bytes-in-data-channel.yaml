document: rfc-8832
kind: protocol-element
summary: The Reliability Parameter (4 bytes) in DATA_CHANNEL_OPEN specifies the maximum number of retransmissions for REXMIT channel types, or the maximum lifetime in milliseconds for TIMED channel types. For reliable channels it MUST be set to 0 and MUST be ignored on receipt.
section: "5.1"
rfc2119_level: MUST
topics:
    - webrtc
