document: rfc-3510
kind: normative-requirement
summary: IPP URLs MUST use RFC 2396 encoding, as do their equivalent HTTP URLs. Characters other than those in the 'reserved' and 'unsafe' sets are equivalent to their '%HEX HEX' encoding.
section: "4.4"
rfc2119_level: MUST
