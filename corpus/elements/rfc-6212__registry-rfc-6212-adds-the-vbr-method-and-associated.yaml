document: rfc-6212
kind: registry
summary: RFC 6212 adds the 'vbr' method and associated properties 'header.md' and 'header.mv' to the IANA 'Email Authentication Methods' registry originally created by RFC 5451. 'header.md' carries the DNS domain name subject of the VBR query; 'header.mv' carries the DNS domain name of the vouching entity.
section: "5"
topics:
