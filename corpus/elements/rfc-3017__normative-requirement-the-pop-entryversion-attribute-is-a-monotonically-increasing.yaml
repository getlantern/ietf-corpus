document: rfc-3017
kind: normative-requirement
summary: The pop 'entryVersion' attribute is a monotonically increasing integer that SHOULD be incremented each time the POP object is modified. It may be useful in merging and updating phone books.
section: 5.2.1
rfc2119_level: SHOULD
