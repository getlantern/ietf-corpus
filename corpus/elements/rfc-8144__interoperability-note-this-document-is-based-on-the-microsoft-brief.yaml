document: rfc-8144
kind: interoperability-note
summary: This document is based on the Microsoft 'Brief' and extended 'Depth' header fields. The behaviors in Sections 2.1 and 2.2 are identical to those of the Brief header field with PROPFIND and PROPPATCH; Section 4 behavior matches the '1,noroot' and 'infinity,noroot' Depth values. If a server receives both Brief and Prefer headers, clients can expect the server to ignore Brief and use only Prefer.
section: A
