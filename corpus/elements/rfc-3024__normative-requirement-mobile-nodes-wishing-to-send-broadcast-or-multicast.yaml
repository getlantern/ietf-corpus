document: rfc-3024
kind: normative-requirement
summary: Mobile nodes wishing to send broadcast or multicast packets via a foreign agent care-of address MUST use the Encapsulating Delivery Style. The Encapsulating Delivery Style Extension MUST NOT be included if the 'T' bit is not set in the Registration Request.
section: "5.3"
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - multicast
