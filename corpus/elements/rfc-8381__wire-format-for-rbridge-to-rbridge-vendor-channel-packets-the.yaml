document: rfc-8381
kind: wire-format
summary: For RBridge-to-RBridge Vendor Channel packets, the full packet includes Link Header, TRILL Header, Inner Ethernet Addresses, Data Label (VLAN or FGL), RBridge Channel Header (Ethertype 0x8946, Channel Protocol=0x008, Flags, ERR), and the Channel-Protocol-Specific Payload. Native messages (RBridge-to-end-station) omit the TRILL Header and Inner Ethernet Addresses.
section: "2"
topics:
