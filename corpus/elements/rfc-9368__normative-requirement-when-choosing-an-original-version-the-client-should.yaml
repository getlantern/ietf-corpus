document: rfc-9368
kind: normative-requirement
summary: When choosing an Original Version, the client SHOULD pick a version that maximizes the probability that the server can parse the first flight and that the version is compatible with the client's preferred version—typically the oldest supported version while advertising newer compatible versions.
