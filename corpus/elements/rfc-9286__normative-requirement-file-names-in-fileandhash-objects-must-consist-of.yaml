document: rfc-9286
kind: normative-requirement
summary: File names in FileAndHash objects MUST consist of characters from [a-zA-Z0-9\-_], followed by a single dot and a three-letter extension that MUST be one of those in the IANA 'RPKI Repository Name Schemes' registry. CAs and RPs MUST perform filesystem operations in a case-sensitive, case-preserving manner.
section: 4.2.2
rfc2119_level: MUST
topics:
    - pkix
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
