document: rfc-2878
kind: wire-format
summary: 'IEEE 802 Tagged Frame format for VLAN-aware bridged traffic over PPP: identical to the untagged format but inserts TPID (0x8100), a 16-bit Tag Control Information field (3-bit Pri, 1-bit Canonical flag C, 12-bit VLAN ID) after the Source MAC Address and before the Length/Type field. For 802.4/802.5/FDDI frames, the TPID is SNAP-encoded occupying two 32-bit words.'
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
