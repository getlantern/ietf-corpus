document: rfc-9082
kind: normative-requirement
summary: After parsing percent-encoding, an RDAP server treats each query string as Unicode in UTF-8 encoding. If a string is not valid UTF-8, the server can immediately return HTTP 400 (Bad Request).
section: "6.1"
rfc2119_level: MAY
topics:
