document: rfc-7180
kind: errata
summary: RFC 6325 Section 3.7.3 nickname conflict resolution incorrectly references 'IS-IS ID (LAN ID)' for priority comparison; the corrected text specifies that the RBridge with numerically higher priority keeps the nickname, or on a tie, the one with the numerically higher seven-byte IS-IS ID (LAN ID) keeps it (Errata ID 3002).
section: "4"
topics:
    - routing
