document: rfc-8495
kind: protocol-element
summary: The Allocation Token is a simple XML 'token' type element (<allocationToken:allocationToken>) used as a credential authorizing a client to request allocation of a specific object. Its exact format is up to server policy, and it is validated by the server to authorize assigning the initial sponsoring client of the object.
