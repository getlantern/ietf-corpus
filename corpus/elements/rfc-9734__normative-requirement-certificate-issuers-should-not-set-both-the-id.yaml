document: rfc-9734
kind: normative-requirement
summary: Certificate issuers SHOULD NOT set both the id-kp-imUri extended key purpose and an id-kp-clientAuth or id-kp-serverAuth extended key purpose simultaneously, as that would defeat the improved specificity offered by id-kp-imUri.
