document: rfc-7695
kind: design-rationale
summary: 'The Flooding Delay value represents a tradeoff: a value of 0 may be used when renumbering is harmless, while larger values reduce renumbering probability at the cost of slower convergence. The algorithm guarantees convergence within (2 * Flooding Delay * L) seconds, where L is the number of links.'
section: "3"
topics:
