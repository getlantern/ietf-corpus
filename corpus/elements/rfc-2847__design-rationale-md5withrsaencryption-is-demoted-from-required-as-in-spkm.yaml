document: rfc-2847
kind: design-rationale
summary: md5WithRSAEncryption is demoted from REQUIRED (as in SPKM-1) to RECOMMENDED in SPKM-3 due to RSA intellectual property considerations, though it is still strongly recommended given the proliferation of RSA-keyed certificates in existing PKI deployments.
