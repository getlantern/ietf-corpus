document: rfc-1629
kind: protocol-element
summary: In IDRP, a Boundary Intermediate System (BIS) participates in inter-domain routing. External neighbors are BISs in different domains sharing a common subnetwork; internal neighbors are BISs in the same domain that may communicate via intra-domain routing without sharing a subnetwork. Routing domains participating in IDRP are not allowed to overlap — a BIS may belong to only one domain.
section: "3.3"
topics:
    - routing
