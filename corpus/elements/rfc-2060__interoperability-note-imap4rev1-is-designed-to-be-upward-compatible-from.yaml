document: rfc-2060
kind: interoperability-note
summary: IMAP4rev1 is designed to be upward compatible from IMAP2 and the unpublished IMAP2bis protocols. Obsolete commands, responses, and data formats that an IMAP4rev1 implementation may encounter when used with earlier implementations are described separately in [IMAP-OBSOLETE].
