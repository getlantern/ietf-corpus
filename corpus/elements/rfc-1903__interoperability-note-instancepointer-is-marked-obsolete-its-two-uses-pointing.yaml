document: rfc-1903
kind: interoperability-note
summary: InstancePointer is marked obsolete; its two uses—pointing to a specific MIB object instance and pointing to a conceptual row—are replaced by VariablePointer and RowPointer respectively. Implementations should migrate to the replacement types.
