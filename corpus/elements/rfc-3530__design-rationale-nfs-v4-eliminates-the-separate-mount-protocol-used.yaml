document: rfc-3530
kind: design-rationale
summary: 'NFS v4 eliminates the separate MOUNT protocol used in v2/v3 for obtaining the first filehandle. Instead, two special filehandles are provided: ROOT (via PUTROOTFH) and PUBLIC (via PUTPUBFH). The MOUNT protocol was eliminated because it had security deficiencies and did not traverse firewalls well.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
