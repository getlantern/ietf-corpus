document: rfc-9887
kind: protocol-element
summary: A TLS connection for TACACS+ is a TCP/IP connection with TLS authentication and encryption, always between one TACACS+ client and one TACACS+ server. Once established, TACACS+ data exchanges proceed per RFC 8907 but all messages are transmitted as TLS application data.
section: "3.2"
topics:
    - tls
