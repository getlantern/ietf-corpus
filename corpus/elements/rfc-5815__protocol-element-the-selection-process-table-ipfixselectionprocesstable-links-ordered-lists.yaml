document: rfc-5815
kind: protocol-element
summary: The Selection Process Table (ipfixSelectionProcessTable) links ordered lists of Selector Functions to a Metering Process cache. Functions are applied in ascending ipfixSelectionProcessSelectorIndex order; each entry points via an OID to either the root of a parameterless function subtree or a specific parameter table entry.
