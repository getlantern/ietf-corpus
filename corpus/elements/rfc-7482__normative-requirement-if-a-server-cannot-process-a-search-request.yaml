document: rfc-7482
kind: normative-requirement
summary: If a server cannot process a search request because it does not support a particular style of partial match searching, it SHOULD return an HTTP 422 (Unprocessable Entity) response, optionally with an error response body per RFC 7483.
section: "4.1"
rfc2119_level: SHOULD
