document: rfc-6864
kind: security-consideration
summary: Allowing non-unique IPv4 IDs for atomic datagrams defeats techniques that count devices behind a NAT/ASM/rewriter by exploiting ID uniqueness patterns. This side effect is acknowledged but not intended as a security feature.
section: "7"
topics:
