document: rfc-6501
kind: normative-requirement
summary: The <allow-floor-events> element defaults to FALSE if undefined, causing subscription to floor control events to be rejected. A participant can subscribe via SDP offer/answer with SIP INVITE and BFCP parameters, or via the general BFCP authorization mechanism.
section: 4.5.2
rfc2119_level: MUST
topics:
    - realtime
