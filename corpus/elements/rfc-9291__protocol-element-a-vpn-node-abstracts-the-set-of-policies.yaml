document: rfc-9291
kind: protocol-element
summary: A 'vpn-node' abstracts the set of policies applied on a PE for one VPN service. It carries a network element identifier ('ne-id'), a 32-bit 'router-id', a role (hub, spoke, any-to-any), and 'active-global-parameters-profiles' that reference and selectively override service-level profiles. Both administrative and operational status are maintained.
section: "7.5"
topics:
