document: rfc-6352
kind: interoperability-note
summary: CARDDAV:allprop and CARDDAV:prop share names with DAV:allprop and DAV:prop but use the 'urn:ietf:params:xml:ns:carddav' namespace rather than 'DAV:'. Implementations must distinguish between the two namespaces to avoid misinterpreting WebDAV versus CardDAV elements.
section: 10.4.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
