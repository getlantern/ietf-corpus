summary: 'A new ''PNS'' subregistry is created under the SIP Parameters registry. It holds ''pn-provider'' values with ''Specification Required'' policy. Initial entries: ''apns'' (Apple Push Notification service), ''fcm'' (Firebase Cloud Messaging), and ''webpush'' (Generic Event Delivery Using HTTP Push per RFC 8030).'
