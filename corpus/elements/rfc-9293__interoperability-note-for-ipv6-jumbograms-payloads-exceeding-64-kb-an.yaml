document: rfc-9293
kind: interoperability-note
summary: For IPv6 Jumbograms (payloads exceeding 64 KB), an advertised MSS value of 65,535 is treated as infinity and Path MTU Discovery is used to determine the actual MSS, since the 16-bit MSS Option field cannot represent values larger than 65,535.
section: 3.7.5
topics:
    - tcp
    - ip
    - v6ops
