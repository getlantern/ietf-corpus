summary: MRCPv2 defines Success codes 200 (success) and 201 (success with optional header fields ignored); Client Failure codes 401–410 (method not allowed, illegal state, unsupported header, illegal value, resource not found, missing mandatory header, operation failed, unrecognized entity, unsupported value, out-of-order sequence); and Server Failure codes 501–504.
