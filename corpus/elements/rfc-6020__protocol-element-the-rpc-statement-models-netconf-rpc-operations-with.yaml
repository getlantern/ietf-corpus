document: rfc-6020
kind: protocol-element
summary: The rpc statement models NETCONF RPC operations with optional input and output child containers. The operation maps to NETCONF <rpc> and <rpc-reply> messages; the rpc node's children are XML-encoded as children of the operation element inside the NETCONF envelope.
