document: rfc-7274
kind: security-consideration
summary: The XL/ESPL mechanism provides a protocol-legal way to increase label stack depth by inserting additional {XL, ESPL} pairs. This could be exploited to attack nodes that can only process label stacks up to a certain depth, causing fragmentation or unprocessable packets.
section: "6"
topics:
    - mpls
    - security
