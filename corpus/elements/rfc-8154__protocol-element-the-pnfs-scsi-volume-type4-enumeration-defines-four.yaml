document: rfc-8154
kind: protocol-element
summary: 'The pnfs_scsi_volume_type4 enumeration defines four volume types: PNFS_SCSI_VOLUME_BASE (maps to a single LU), PNFS_SCSI_VOLUME_SLICE (a slice of another volume), PNFS_SCSI_VOLUME_CONCAT (concatenation of multiple volumes), and PNFS_SCSI_VOLUME_STRIPE (striped across multiple volumes).'
section: 2.3.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
