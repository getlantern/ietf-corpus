summary: 'The ERROR response type''s <add-info> is one of: INVALID-PORT (port out of range or malformed), NO-USER (connection not currently in use or not owned by an identifiable entity), HIDDEN-USER (user identified but withheld at user''s request), or UNKNOWN-ERROR (all other failures). Non-standard error codes must begin with ''X''.'
