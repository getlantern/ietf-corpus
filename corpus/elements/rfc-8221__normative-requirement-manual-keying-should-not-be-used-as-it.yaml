document: rfc-8221
kind: normative-requirement
summary: Manual keying SHOULD NOT be used, as it lacks Perfect Forward Secrecy, session key refresh, SPI uniqueness tracking, and single-use enforcement of nonces, IVs, and counters. This document assumes keying uses IKEv2 or higher.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - vpn
    - security
    - crypto
