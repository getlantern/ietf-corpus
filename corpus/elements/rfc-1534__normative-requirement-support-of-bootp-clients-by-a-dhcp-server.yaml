document: rfc-1534
kind: normative-requirement
summary: Support of BOOTP clients by a DHCP server is optional at the discretion of the local system administrator. If a DHCP server not configured to support BOOTP clients receives a BOOTREQUEST, it MUST silently discard the message.
section: "2"
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
