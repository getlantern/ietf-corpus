document: rfc-9488
kind: interoperability-note
summary: For PCE-initiated LSPs, the PCC MAY process the E flag from the PCE's PCUpd message, and the PCE SHOULD ignore the E flag from the PCC's PCRpt message, since either peer may not yet support this document.
