document: rfc-3758
kind: interoperability-note
summary: When a receiver of an INIT or INIT-ACK detects a Forward-TSN-Supported parameter but does not support the FORWARD TSN chunk type, it MUST follow the unrecognized parameter rules of RFC 2960 Section 3.3.3, which causes an operational error to be returned.
section: 3.3.2
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
