summary: 'Two operational modes are defined per link and per level: ''send'' mode causes the IS to include the ESN TLV in its own IS-IS PDUs, and ''verify'' mode causes the IS to enforce the presence and validity of the ESN TLV in received PDUs from neighbors.'
