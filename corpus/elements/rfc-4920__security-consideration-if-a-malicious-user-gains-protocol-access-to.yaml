document: rfc-4920
kind: security-consideration
summary: If a malicious user gains protocol access to the network, crankback information might be used to prevent establishment of valid LSPs. Existing RSVP-TE security features (authentication, anti-tampering, anti-spoofing from RFC 2205/3209/3473) SHOULD be made available by all implementations offering crankback, and re-routing attempt thresholds are particularly useful as a defense.
section: "9"
topics:
    - mpls
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
