document: rfc-4556
kind: normative-requirement
summary: The KDC MUST set the initial flag and include an AD_INITIAL_VERIFIED_CAS authorization data element in the issued ticket; AD-INITIAL-VERIFIED-CAS is a SEQUENCE OF ExternalPrincipalIdentifier identifying the certification path used to validate the client certificate.
