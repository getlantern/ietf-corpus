document: rfc-9463
kind: normative-requirement
summary: DHCPv6 and DHCPv4 clients MUST silently discard any Encrypted DNS option that fails the validation checks defined in Section 3.1.8, including absence of ADN, malformed SvcParams, no valid IP address, or presence of 'ipv4hint'/'ipv6hint' SvcParams.
section: "4.2"
rfc2119_level: MUST
topics:
    - dns
