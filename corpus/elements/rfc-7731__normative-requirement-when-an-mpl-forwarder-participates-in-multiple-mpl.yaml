document: rfc-7731
kind: normative-requirement
summary: When an MPL Forwarder participates in multiple MPL Domains simultaneously, all MPL Domains except at most one MUST be assigned a unique MPL Domain Address distinct from ALL_MPL_FORWARDERS. Each MPL Interface MUST subscribe to the MPL Domain Addresses for all MPL Domains it participates in.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
