document: rfc-9760
kind: security-consideration
summary: Time transfer protocols can be important to security mechanisms using time windows for keys and authorization. Multiple simultaneous timeTransmitters across multiple PTP domains can mitigate rogue timeTransmitters and on-path attacks including delay attacks, packet interception, and packet manipulation.
