document: rfc-5740
kind: protocol-element
summary: NORM congestion control (NORM-CC) is based on the TCP-Friendly Multicast Congestion Control (TFMCC) scheme. The sender collects round-trip timing via NORM_CMD(CC) and NORM_ACK feedback to dynamically adjust its transmission rate to be TCP-fair. The 'grtt' field in every sender message advertises the sender's current Group Round-Trip Time estimate.
section: 5.5.2
topics:
    - multicast
    - congestion
    - tcp
