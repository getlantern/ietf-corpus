document: rfc-4563
kind: security-consideration
summary: Because MTK delivery lacks source origin authentication, adding source origin authentication to RTP streams (e.g., via SRTP-TESLA) provides no benefit. The current Key ID extension usage is incompatible with SRTP-TESLA, which requires source origin authentication of the integrity key.
section: "7"
topics:
