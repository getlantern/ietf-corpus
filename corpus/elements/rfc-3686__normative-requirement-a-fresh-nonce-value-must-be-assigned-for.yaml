document: rfc-3686
kind: normative-requirement
summary: A fresh nonce value MUST be assigned for each security association and MUST be assigned at the beginning of the SA. The nonce MUST be unpredictable prior to the beginning of the security association.
section: "4"
rfc2119_level: MUST
