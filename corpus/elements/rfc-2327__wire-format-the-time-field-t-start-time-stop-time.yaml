document: rfc-2327
kind: wire-format
summary: The time field 't=<start-time> <stop-time>' uses decimal NTP timestamp values in seconds (subtract 2208988800 for UNIX time). A stop-time of zero means unbounded; both zero means permanent. Repeat times use 'r=<interval> <duration> <offset-list>' with optional unit suffixes d/h/m/s. Time zone adjustments use 'z=<ntp-time> <offset> ...'.
section: "6"
topics:
