document: rfc-8183
kind: design-rationale
summary: The underlying transport for the setup protocol is deliberately unspecified. Messages may be exchanged via USB stick, HTTPS web interface, PGP-signed email, a QR code on a T-shirt, or a carrier pigeon — any means providing acceptable data integrity and authentication is acceptable.
