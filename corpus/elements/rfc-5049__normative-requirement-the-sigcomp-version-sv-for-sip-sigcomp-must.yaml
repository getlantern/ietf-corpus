document: rfc-5049
kind: normative-requirement
summary: The SigComp_version (SV) for SIP/SigComp MUST be >= 0x02 (SigComp + NACK), implying that RFC 4077 (SigComp NACK mechanism) applies and decompression failures result in NACK messages sent to the originating compressor.
section: "4.4"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
