document: rfc-3381
kind: design-rationale
summary: The four new Job Description attributes are drawn from the PWG Job Monitoring MIB (RFC 2707) to enable cross-protocol consistency between IPP job progress monitoring and SNMP-based monitoring. This alignment allows implementations supporting both protocols to share the same underlying progress data.
section: "1"
