summary: 'SONET/SDH Generalized Labels are encoded across five objects: gmplsLabelSonetSdhSignalIndex (Integer32 0..4095, Signal Index S), gmplsLabelSdhVc (Integer32 0..15, VC Indicator U), gmplsLabelSdhVcBranch (Integer32 0..15, Branch K), gmplsLabelSonetSdhBranch (Integer32 0..15, Branch L), and gmplsLabelSonetSdhGroupBranch (Integer32 0..15, Group Branch M). Zero in any field means non-significant.'
