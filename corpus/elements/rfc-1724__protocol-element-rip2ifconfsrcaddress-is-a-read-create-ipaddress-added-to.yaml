document: rfc-1724
kind: protocol-element
summary: rip2IfConfSrcAddress is a read-create IpAddress added to support unnumbered interfaces, specifying the source address used for RIP packets sent on the interface. On numbered interfaces it must equal rip2IfConfAddress; on unnumbered interfaces it must be rip2IfConfAddress of some interface on the system.
section: "4.2"
topics:
    - routing
    - snmp
