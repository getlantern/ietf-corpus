document: rfc-4573
kind: security-consideration
summary: H.224 payload packets are subject to the security considerations of RFC 3550 (RTP). Confidentiality is achieved by encryption; SRTP (RFC 3711) MAY be used to provide both encryption and integrity protection of the RTP flow.
