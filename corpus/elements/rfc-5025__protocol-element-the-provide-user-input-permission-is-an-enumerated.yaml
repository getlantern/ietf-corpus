document: rfc-5025
kind: protocol-element
summary: 'The <provide-user-input> permission is an enumerated integer controlling access to the <user-input> element. Values are: false (0, remove element), bare (10, retain but strip idle-threshold and since attributes), thresholds (20, retain idle-threshold only), and full (30, retain all attributes).'
section: 3.3.2.12
topics:
