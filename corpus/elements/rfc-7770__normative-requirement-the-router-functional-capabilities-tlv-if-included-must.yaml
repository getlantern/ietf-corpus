document: rfc-7770
kind: normative-requirement
summary: The Router Functional Capabilities TLV, if included, MUST be present in the first instance of the RI LSA and MUST reflect the advertising router's actual functional capabilities, since this information is used to dictate OSPF protocol operation.
section: "2.6"
rfc2119_level: MUST
topics:
    - routing
