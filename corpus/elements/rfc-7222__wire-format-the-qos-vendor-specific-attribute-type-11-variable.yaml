summary: The QoS Vendor-Specific Attribute (Type 11, variable length) carries a 16-bit Reserved field, a 32-bit SMI Vendor ID (from IANA Private Enterprise Numbers), and an 8-bit Sub-Type managed by the vendor; multiple instances with different Sub-Type values are permitted in a single QoS option.
