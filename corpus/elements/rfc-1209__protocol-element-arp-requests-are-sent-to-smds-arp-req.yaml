document: rfc-1209
kind: protocol-element
summary: ARP requests are sent to smds$arp-req rather than a true broadcast. In the LIS configuration, smds$arp-req is set to smds$lis-ga (the group address of all LIS members). In larger public configurations, it could be set to an ARP server address.
section: Address Resolution
topics:
