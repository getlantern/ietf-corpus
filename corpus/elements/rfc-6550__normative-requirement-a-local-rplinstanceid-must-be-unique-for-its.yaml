document: rfc-6550
kind: normative-requirement
summary: A local RPLInstanceID MUST be unique for its DODAGID. The DODAGID MUST be a reachable IPv6 address of the owning node and MUST be used as an endpoint of all communications within that Local instance.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - ip
