summary: 'The Fragment header (Next Header value 44) encodes: Next Header (8-bit), Reserved (8-bit), Fragment Offset (13-bit unsigned, in 8-octet units relative to Fragmentable Part), Res (2-bit reserved), M flag (1-bit: 1=more fragments, 0=last), and Identification (32-bit).'
