document: rfc-7009
kind: normative-requirement
summary: After the authorization server returns HTTP 200, the token is immediately invalidated and clients must not try to use it again. Implementations should minimize any propagation delay window.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - oauth
    - security
