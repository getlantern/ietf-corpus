document: rfc-3202
kind: protocol-element
summary: frsldPvcCtrlPurge (0..172800 seconds, default 0) defines the delay after a DLCI disappears before automatic purge of sample history and reset of data counters to zero. frsldPvcCtrlDeleteOnPurge determines whether none(1), sampleControls(2), or all(3) associated rows are deleted on purge.
