document: rfc-2058
kind: normative-requirement
summary: An Access-Request MUST contain a User-Name attribute (Type 1) and MUST contain either a User-Password attribute or a CHAP-Password attribute. It SHOULD contain either NAS-IP-Address or NAS-Identifier (or both), and SHOULD contain NAS-Port or NAS-Port-Type unless not applicable.
section: "4.1"
rfc2119_level: MUST
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
