document: rfc-3981
kind: design-rationale
summary: Registry types derive element types from the base IRIS schema using XML Schema derivation rather than defining a single monolithic schema. This allows the IRIS framework to be extended for diverse registry needs (domain, address, etc.) without re-versioning the core protocol.
section: "4.3"
topics:
    - registry
