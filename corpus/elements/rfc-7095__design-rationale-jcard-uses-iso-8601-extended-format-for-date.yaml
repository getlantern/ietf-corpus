document: rfc-7095
kind: design-rationale
summary: jCard uses ISO 8601 extended format for date/time values (e.g., "1985-04-12" instead of "19850412") because the extended format is more commonly used in Internet applications that use JSON, improving readability and compatibility with existing JSON consumers.
