document: rfc-2617
kind: normative-requirement
summary: A 401 (Unauthorized) response MUST include a WWW-Authenticate header field containing at least one challenge applicable to the requested resource. A 407 (Proxy Authentication Required) response MUST include a Proxy-Authenticate header field containing at least one challenge applicable to the proxy for the requested resource.
section: "1.2"
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
