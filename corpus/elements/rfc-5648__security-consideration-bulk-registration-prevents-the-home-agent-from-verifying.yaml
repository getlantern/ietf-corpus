document: rfc-5648
kind: security-consideration
summary: Bulk registration prevents the home agent from verifying care-of address reachability for addresses carried in Binding Identifier mobility options. Home agents MAY reject bulk registration using MCOA BULK REGISTRATION PROHIBITED to mitigate this risk. Alternatively, initial per-CoA registration allows reachability verification before bulk refresh is used.
section: "10"
topics:
    - mobility
    - ip
    - security
