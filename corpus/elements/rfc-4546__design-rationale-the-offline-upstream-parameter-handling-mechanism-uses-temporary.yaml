document: rfc-4546
kind: design-rationale
summary: The offline upstream parameter handling mechanism uses temporary row entries so that a group of interdependent upstream channel parameters (modulation profile, channel type, slot size, S-CDMA attributes) can be validated for mutual consistency before being atomically committed to the in-service physical interface, minimizing channel outage windows.
