document: rfc-2787
kind: security-consideration
summary: SNMPv1 alone is not a secure environment. Even on an IPsec-protected network, SNMPv1 provides no access control over who may GET or SET MIB objects. Implementers are recommended to use SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575).
section: "4"
rfc2119_level: RECOMMENDED
topics:
    - snmp
    - security
