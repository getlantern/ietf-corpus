document: rfc-2049
kind: normative-requirement
summary: Conformant agents must recognize and display 'message/rfc822' encapsulations in a way that preserves recursive structure, displaying or offering to display the encapsulated data according to its own media type. Unrecognized message subtypes must be treated as 'application/octet-stream'.
section: "2"
rfc2119_level: MUST
topics:
    - email
