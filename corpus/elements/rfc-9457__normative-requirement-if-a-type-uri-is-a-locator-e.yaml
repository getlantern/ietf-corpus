document: rfc-9457
kind: normative-requirement
summary: If a type URI is a locator (e.g., 'http' or 'https' scheme), dereferencing it SHOULD provide human-readable documentation for the problem type. However, consumers SHOULD NOT automatically dereference the type URI unless providing information to developers (e.g., in a debugging tool).
section: 3.1.1
rfc2119_level: SHOULD NOT
topics:
    - http
    - json
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
