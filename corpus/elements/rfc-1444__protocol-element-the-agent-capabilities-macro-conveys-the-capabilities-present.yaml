document: rfc-1444
kind: protocol-element
summary: The AGENT-CAPABILITIES macro conveys the capabilities present in a SNMPv2 entity acting in an agent role. Its value is an OBJECT IDENTIFIER naming the sysObjectID or snmpORID for which the capabilities statement is valid, allowing management stations to optimize behavior when communicating with a particular agent.
section: "5"
topics:
