document: rfc-9309
kind: normative-requirement
summary: Octets in the URI and robots.txt paths outside the ASCII range and those in the reserved range defined by RFC 3986 MUST be percent-encoded prior to comparison. Percent-encoded ASCII octets in the URI MUST be unencoded prior to comparison unless reserved or outside the unreserved character range.
section: 2.2.2
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
