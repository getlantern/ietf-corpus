document: rfc-7766
kind: protocol-element
summary: Query pipelining allows sending multiple DNS queries over a single TCP connection without waiting for outstanding replies. Servers are expected to process pipelined queries concurrently and may return out-of-order responses identified by Message ID matching.
section: 6.2.1.1
topics:
    - dns
    - tcp
