document: rfc-7271
kind: interoperability-note
summary: When the Revertive (R) bit mismatches between two endpoints, both sides will still interwork and traffic is protected according to the state transition tables in Section 11; the node configured for non-revertive operation effectively operates as revertive when the revertive peer sends WTR messages. The node SHOULD notify the operator of the mismatch.
section: "12"
topics:
    - mpls
    - routing
