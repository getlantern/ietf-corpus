document: rfc-3896
kind: protocol-element
summary: The dsx3FarEndCurrentTable and dsx3FarEndIntervalTable collect far-end C-bit statistics (CESs, CSESs, CCVs, UASs) derived from the far end block error code within C-bits. These tables are only meaningful for C-bit Parity and SYNTRAN DS3 applications.
