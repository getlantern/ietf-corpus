document: rfc-5015
kind: design-rationale
summary: The RPA (Rendezvous Point Address) does not need to correspond to a physical interface of a real router, unlike PIM-SM which requires an actual RP router. This allows the RPA to be any routable address, giving administrators more flexibility in tree root placement.
section: "2.1"
topics:
    - multicast
    - routing
