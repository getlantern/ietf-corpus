document: rfc-6532
kind: design-rationale
summary: Encoded-words (RFC 2047) are deprecated for this extension because they only work in a subset of header locations, require complex processing, allow arbitrary charsets, and create significant error opportunities; direct UTF-8 is now available on most systems and is simpler.
section: "3.6"
