document: rfc-8500
kind: design-rationale
summary: 'For LDP/IGP synchronization on LANs, Reverse Metric provides a simpler alternative to RFC 6138''s approach: a new node advertises maximum inbound metric via Reverse Metric TLV, making only its own link last-resort without requiring all LAN nodes to change their metrics.'
