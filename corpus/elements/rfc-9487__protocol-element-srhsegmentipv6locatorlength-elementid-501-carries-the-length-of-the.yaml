document: rfc-9487
kind: protocol-element
summary: srhSegmentIPv6LocatorLength (ElementID 501) carries the length of the SRH segment IPv6 locator as a count of significant bits. Combined with srhSegmentIPv6, it enables calculation of the SRv6 Locator as described in RFC 8986 Section 3.1. It is a generic field for Options Templates.
section: 5.1.10
topics:
    - ip
    - routing
