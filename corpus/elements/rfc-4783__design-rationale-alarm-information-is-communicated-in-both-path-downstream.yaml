document: rfc-4783
kind: design-rationale
summary: Alarm information is communicated in both Path (downstream) and Resv (upstream) messages so that every node along an LSP has equal visibility into current alarm state. This enables operator display and diagnostic use at any point along the LSP.
section: "2"
