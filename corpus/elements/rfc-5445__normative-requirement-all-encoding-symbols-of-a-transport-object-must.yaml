document: rfc-5445
kind: normative-requirement
summary: All Encoding Symbols of a transport object MUST have length equal to the Encoding Symbol Length element, with the optional exception of the last source symbol of the last source block. This uniformity requirement was not present in RFC 3695 or RFC 3452.
section: 3.2.2.2
rfc2119_level: MUST
topics:
    - multicast
