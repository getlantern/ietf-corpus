document: rfc-7371
kind: protocol-element
summary: ff1 (flag field 1) is a 4-bit field at bits 13-16 of the IPv6 multicast address, renamed from 'flgs' in RFC 4291/3956. In the RFC 3306 context, ff1 carries bits X, Y, P, T; in the RFC 3956 context, ff1 carries X, R, P, T. X is for future assignment; Y is assigned meaning in RFC 3956.
section: "2"
topics:
