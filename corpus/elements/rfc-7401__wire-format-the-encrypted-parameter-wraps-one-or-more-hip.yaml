document: rfc-7401
kind: wire-format
summary: The ENCRYPTED parameter wraps one or more HIP parameters under confidentiality protection. It contains a 4-byte Reserved field, an algorithm-dependent Initialization Vector (IV), and the ciphertext of the encrypted parameters using the cipher negotiated via HIP_CIPHER.
