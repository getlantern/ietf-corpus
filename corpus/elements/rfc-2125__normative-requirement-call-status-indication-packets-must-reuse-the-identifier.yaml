document: rfc-2125
kind: normative-requirement
summary: Call-Status-Indication packets MUST reuse the Identifier from the original Call-Request or Callback-Request. All other Requests/Indications MUST use a unique Identifier per new request. Response packets MUST echo the Identifier from the corresponding Request/Indication.
section: "5.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
