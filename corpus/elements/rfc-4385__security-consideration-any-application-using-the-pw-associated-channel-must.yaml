document: rfc-4385
kind: security-consideration
summary: Any application using the PW Associated Channel MUST fully consider security issues and provide mechanisms to prevent an attacker from using the channel to disrupt PW or PE operation, or to use it as a conduit to deliver packets elsewhere.
