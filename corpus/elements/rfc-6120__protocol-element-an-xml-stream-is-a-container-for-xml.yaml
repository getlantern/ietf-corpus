document: rfc-6120
kind: protocol-element
summary: An XML stream is a container for XML element exchange delimited by an opening <stream> tag and closing </stream> tag. An XML stanza is a first-level element (depth=1) whose name is 'message', 'presence', or 'iq' and whose qualifying namespace is 'jabber:client' or 'jabber:server'; no other element at depth=1 qualifies as a stanza.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
