document: rfc-7303
kind: protocol-element
summary: 'Five XML media types are defined: application/xml and text/xml for document entities, application/xml-external-parsed-entity and text/xml-external-parsed-entity for external parsed entities, and application/xml-dtd for external DTD subsets and external parameter entities. The application/ variants are preferred.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
