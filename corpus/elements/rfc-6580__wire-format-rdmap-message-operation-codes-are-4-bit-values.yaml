document: rfc-6580
kind: wire-format
summary: RDMAP Message Operation Codes are 4-bit values. The eight defined operations range from 0x0 (RDMA Write) to 0x7 (Terminate); value 0xF is reserved for experimental use, and all other values are unassigned.
