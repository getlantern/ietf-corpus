document: rfc-5454
kind: normative-requirement
summary: A mobile node MUST NOT include an IPv6 tunneling mode extension if it uses the foreign agent care-of address mode; doing so may cause the HA to tunnel IPv6 packets to the FA, which will likely drop them for lack of appropriate state.
section: "3.5"
rfc2119_level: MUST NOT
topics:
    - ip
    - mobility
