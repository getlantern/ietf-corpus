document: rfc-3962
kind: wire-format
summary: The string-to-key parameter field is four octets encoding an unsigned big-endian iteration count for PBKDF2. A value of 00 00 00 00 means 2^32 (4,294,967,296) iterations; the minimum expressible count is 1.
section: "4"
