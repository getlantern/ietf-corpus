document: rfc-6581
kind: normative-requirement
summary: The Enhanced DDP Stream Session Reject function code (0x007) MUST be used to indicate rejection of an enhanced DDP stream session that would have been accepted under unenhanced negotiation. The enhanced DDP stream management MUST use the DDP stream session termination function code to terminate streams established using enhanced function codes.
section: "7"
rfc2119_level: MUST
topics:
    - realtime
    - sctp
