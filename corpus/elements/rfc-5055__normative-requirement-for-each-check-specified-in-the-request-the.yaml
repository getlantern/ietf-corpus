document: rfc-5055
kind: normative-requirement
summary: For each check specified in the request, the SCVP server MUST perform the requested check or return an error. A server may perform additional checks but cannot indicate in the response that additional checks have been performed (except in an error response).
section: 3.2.2
rfc2119_level: MUST
topics:
    - pkix
