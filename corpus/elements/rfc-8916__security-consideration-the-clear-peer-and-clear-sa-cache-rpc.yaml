document: rfc-8916
kind: security-consideration
summary: The clear-peer and clear-sa-cache RPC/action operations are sensitive; unauthorized access can force rebuilding of all MSDP peer connections or deletion of SA cache records, disrupting multicast service. Access must be restricted via NACM (RFC 8341).
section: "5"
topics:
    - security
    - yang
    - multicast
    - netconf
