document: rfc-9728
kind: registry
summary: This specification establishes the IANA "OAuth Protected Resource Metadata" registry for protected resource metadata parameter names, with Specification Required policy. Initial entries include resource, authorization_servers, jwks_uri, scopes_supported, bearer_methods_supported, resource_signing_alg_values_supported, resource_name, tls_client_certificate_bound_access_tokens, dpop_signing_alg_values_supported, dpop_bound_access_tokens_required, and signed_metadata.
section: "8.1"
topics:
    - oauth
    - registry
