document: rfc-5372
kind: normative-requirement
summary: In the SDP Offer/Answer model, if the optional parameter "mhc" is used it MUST appear in the offer with value "1", and if accepted it MUST appear in the answer. If "pt" is used, it MUST appear in the offer as a complete comma-separated list of supported priority table definitions, and the answer MUST contain a single selected definition.
section: "6.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
