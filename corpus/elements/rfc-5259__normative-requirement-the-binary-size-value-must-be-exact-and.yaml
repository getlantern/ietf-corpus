document: rfc-5259
kind: normative-requirement
summary: The BINARY.SIZE value MUST be exact and MUST NOT change during an IMAP session. Clients MUST NOT cache sizes of converted body parts beyond the duration of a session or use sizes from one connection in another.
section: "8.3"
rfc2119_level: MUST
topics:
    - email
