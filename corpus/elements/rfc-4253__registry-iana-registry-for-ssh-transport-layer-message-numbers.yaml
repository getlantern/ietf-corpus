document: rfc-4253
kind: registry
summary: 'IANA registry for SSH transport layer message numbers is managed through [SSH-NUMBERS] (RFC 4250). Core transport messages: SSH_MSG_DISCONNECT (1), SSH_MSG_IGNORE (2), SSH_MSG_UNIMPLEMENTED (3), SSH_MSG_DEBUG (4), SSH_MSG_SERVICE_REQUEST (5), SSH_MSG_SERVICE_ACCEPT (6), SSH_MSG_KEXINIT (20), SSH_MSG_NEWKEYS (21). Numbers 30-49 reserved for kex packets.'
