document: rfc-3460
kind: interoperability-note
summary: PCIMe deprecates PCIM's PolicyGroupInPolicyGroup, PolicyRuleInPolicyGroup, and PolicyRule.Priority, and replaces them with PolicySetComponent and PolicySetComponent.Priority. Implementations of RFC 3060 must migrate to these replacements; the deprecated elements are retained for backward reference only.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
