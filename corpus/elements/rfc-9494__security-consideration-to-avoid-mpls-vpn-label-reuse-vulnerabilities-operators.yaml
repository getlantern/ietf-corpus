document: rfc-9494
kind: security-consideration
summary: To avoid MPLS VPN label reuse vulnerabilities, operators MUST ensure the lower bound for label reuse time on a PE exceeds the upper bound of the Long-Lived Stale Time before enabling LLGR for a VPN address family. Relevant factors include BGP route churn load, label pool size, label allocation scheme, and reallocation policy.
section: "6"
topics:
    - bgp
    - routing
    - security
    - mpls
    - vpn
