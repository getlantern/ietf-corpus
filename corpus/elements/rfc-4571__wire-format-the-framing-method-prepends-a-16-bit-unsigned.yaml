document: rfc-4571
kind: wire-format
summary: The framing method prepends a 16-bit unsigned integer LENGTH field, coded in network byte order (big-endian), to each RTP or RTCP packet. If LENGTH is non-zero, the RTP or RTCP packet immediately follows; LENGTH == 0 codes the null packet.
