document: rfc-7037
kind: interoperability-note
summary: OPTION_RADIUS can only contain RADIUS attributes listed in the 'RADIUS Attributes Permitted in DHCPv6 RADIUS Option' registry; new attributes require Expert Review before being added. The RADIUS attribute Length field (per RFC 2865 Section 5) includes the Type and Length fields themselves.
section: "4.1"
topics:
    - radius
    - ip
    - registry
