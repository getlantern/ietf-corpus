document: rfc-2658
kind: protocol-element
summary: The number of bundled CODEC data frames in an RTP packet is not explicitly transmitted; receivers must parse octet 0 of each successive CODEC data frame until the end of the RTP payload to determine the count, since frames have variable length.
section: 3.3.1
topics:
