document: rfc-6052
kind: normative-requirement
summary: The Well-Known Prefix MUST NOT be used for Scenario 3 (the IPv6 Internet to an IPv4 network) in stateful translation deployments, because this would combine the Well-Known Prefix with non-global IPv4 addresses. A Network-Specific Prefix (e.g., /96) MUST be used in that scenario.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
