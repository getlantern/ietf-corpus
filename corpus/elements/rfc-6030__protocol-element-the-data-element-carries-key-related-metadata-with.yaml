document: rfc-6030
kind: protocol-element
summary: The <Data> element carries key-related metadata with child elements <Secret> (key value as base64Binary), <Counter> (event counter for HOTP), <Time> (time intervals for TOTP), <TimeInterval> (interval in seconds), and <TimeDrift> (device clock drift). Each supports plaintext via <PlainValue> or encrypted form via <EncryptedValue>, with optional <ValueMAC> for integrity.
section: "4.1"
topics:
    - crypto
    - security
