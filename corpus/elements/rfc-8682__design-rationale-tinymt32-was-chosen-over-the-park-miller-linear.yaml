document: rfc-8682
kind: design-rationale
summary: TinyMT32 was chosen over the Park-Miller Linear Congruential PRNG because the latter has well-known limitations. TinyMT32 passes BigCrush (TestU01) and AdaptiveCrush statistical tests, representing a major quality improvement while maintaining a small 127-bit internal state suitable for embedded devices.
