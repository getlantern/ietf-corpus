document: rfc-4470
kind: interoperability-note
summary: Setting the 'next name' field to a name other than the next instantiated name relaxes RFC 4034 Section 4.1.1. This change is expected to be fully compatible with all existing DNSSEC validators, which do not require the next name to be an instantiated zone name.
section: "3"
topics:
    - dns
    - security
