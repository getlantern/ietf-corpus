document: rfc-4683
kind: security-consideration
summary: Confidentiality of SIM relies on iterated hashing with the RA-supplied random R. Known SHA-1 collision attacks (Wang et al., Crypto 2005) are not applicable because the RA provides R and the end entity does not control all hashed inputs.
