document: rfc-7752
kind: design-rationale
summary: The AS Number and BGP-LS Identifier sub-TLVs together disambiguate Router-IDs that may be non-globally-unique (e.g., RFC 1918 private addresses used as IS-IS/OSPF Router-IDs), ensuring global uniqueness of node/link/prefix identifiers within the BGP-LS database.
section: 3.2.1
topics:
