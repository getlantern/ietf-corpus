document: rfc-5219
kind: interoperability-note
summary: When a receiver sees a sequence of identical ISNs (all 0xFFE, indicating no interleaving was used by the sender), it handles them as if the Interleave Cycle Count changed with each ADU frame, releasing ADU frames sequentially without reordering.
