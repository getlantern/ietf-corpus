document: rfc-7833
kind: normative-requirement
summary: The RP MUST treat a client identifier in a SAML <Subject> element as taking precedence over the identifier in the RADIUS User-Name attribute, and MUST discard any assertion whose subject confirmation requirements cannot be met.
