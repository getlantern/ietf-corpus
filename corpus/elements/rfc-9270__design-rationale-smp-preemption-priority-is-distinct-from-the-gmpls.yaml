document: rfc-9270
kind: design-rationale
summary: SMP preemption priority is distinct from the GMPLS Setup and Holding priorities in the SESSION_ATTRIBUTE object. Using separate priorities avoids the complexity of defining a unified policy that serves both GMPLS control plane LSP preemption and SMP shared resource competition resolution.
section: "5.4"
topics:
