document: rfc-3986
kind: state-machine
summary: 'The remove_dot_segments algorithm processes a path using input/output buffers: leading "../" or "./" are stripped; "/./" is replaced with "/"; "/../" removes the last output segment; lone "." or ".." are removed; otherwise the first segment is moved to output. This removes all dot-segments before forming the target URI.'
section: 5.2.4
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
