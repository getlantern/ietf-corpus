document: rfc-6333
kind: design-rationale
summary: AFTR reassembly of fragmented IPv6 packets is expensive because the AFTR must buffer partial fragments from many simultaneous tunnels, but the document notes this is only a fraction of AFTR workload in practice since most residential clients receive large packets (e.g., video) rather than sourcing them.
