document: rfc-8955
kind: wire-format
summary: The traffic-rate-bytes (0x8006) and traffic-rate-packets (0x800c) Extended Communities encode a 2-octet informational AS number followed by a 4-octet IEEE 754 floating-point rate value (bytes/s or packets/s respectively). A value of 0 discards all matching traffic.
