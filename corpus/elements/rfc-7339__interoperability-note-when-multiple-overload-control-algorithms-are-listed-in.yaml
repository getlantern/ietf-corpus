document: rfc-7339
kind: interoperability-note
summary: When multiple overload control algorithms are listed in "oc-algo", the client MAY order them by decreasing preference, but cannot assume the server will honor the preference order; the server's selection is final and remains until the server changes it.
section: "4.2"
