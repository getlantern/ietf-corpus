document: rfc-4349
kind: protocol-element
summary: HDLCPWs use L2TPv3 default encapsulation. The HDLC PDU is stripped of flags and trailing FCS, bit/byte unstuffing is performed, and the remaining data including address, control, and protocol fields is transported over the PW.
