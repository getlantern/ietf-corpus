document: rfc-7513
kind: design-rationale
summary: The DHCP Snooping Process requires the SAVI device to be the cut vertex separating the DHCP client from all DHCP servers/relays. When multiple paths exist or topology is dynamic (including local-link client movement), snooping may miss the DHCP exchange, motivating the complementary Data Snooping Process.
section: "6.1"
topics:
