summary: Q is a 160-bit prime (2**159 < Q < 2**160) always stored as 20 octets. P is in the range 2**(511+64T) < P < 2**(512+64T), making it 64+8*T octets long. G and Y are quantities modulo P allocated the same fixed size as P.
