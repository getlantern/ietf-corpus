document: rfc-8926
kind: registry
summary: IANA allocated UDP port 6081 as the well-known destination port for Geneve under the service name 'geneve'. Implementations SHOULD make this port configurable but SHOULD use 6081 by default; the port MUST NOT be reversed as with TCP.
