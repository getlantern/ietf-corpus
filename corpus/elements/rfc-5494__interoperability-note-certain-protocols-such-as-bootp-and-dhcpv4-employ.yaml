document: rfc-5494
kind: interoperability-note
summary: Certain protocols such as BOOTP and DHCPv4 employ ar$hrd values within an 8-bit field, so ar$hrd allocations above 255 are incompatible with those protocols. DHCPv6 DUID hardware type fields also use this namespace.
