document: rfc-6416
kind: protocol-element
summary: For scalable MPEG-4 Audio streams, audio data of each layer SHOULD be packetized onto different RTP streams to allow differentiated treatment at the IP level. All layers share one StreamMuxConfig, and LATM header information maps each layer to its configuration.
