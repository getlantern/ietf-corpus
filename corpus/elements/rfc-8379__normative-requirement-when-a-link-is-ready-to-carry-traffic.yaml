document: rfc-8379
kind: normative-requirement
summary: When a link is ready to carry traffic, the Graceful-Link-Shutdown sub-TLV MUST be removed from the Extended Link TLV/Router-Link TLV and the corresponding LSAs MUST be readvertised; similarly, the metric MUST be set to original values.
section: "5"
rfc2119_level: MUST
topics:
    - routing
