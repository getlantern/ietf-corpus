document: rfc-4551
kind: normative-requirement
summary: When a STORE UNCHANGEDSINCE operation succeeds for a message, the server MUST update the mod-sequence and MUST send an untagged FETCH response including the MODSEQ data item, even if the .SILENT suffix was specified.
section: "3.2"
rfc2119_level: MUST
