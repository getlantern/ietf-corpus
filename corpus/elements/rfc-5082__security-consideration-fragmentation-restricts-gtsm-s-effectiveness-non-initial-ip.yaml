document: rfc-5082
kind: security-consideration
summary: 'Fragmentation restricts GTSM''s effectiveness: non-initial IP fragments cannot be associated with a registered GTSM-enabled session and receive Unknown treatment; a legitimate initial fragment could be combined with spoofed non-initial fragments, leaving packet integrity unknown. Operators may need to rate-limit or discard all received fragments.'
section: "5.4"
topics:
    - security
    - ip
