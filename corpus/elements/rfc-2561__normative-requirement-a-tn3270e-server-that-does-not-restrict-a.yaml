document: rfc-2561
kind: normative-requirement
summary: A TN3270E server that does not restrict a local TCP port to a particular local IP address SHALL use the value unknown(0) for tn3270eSrvrConfPortAddrType and a zero-length octet string for tn3270eSrvrConfPortAddress.
section: 3.1.2
rfc2119_level: REQUIRED
