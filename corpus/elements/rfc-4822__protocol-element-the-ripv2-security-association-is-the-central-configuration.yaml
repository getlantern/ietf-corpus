document: rfc-4822
kind: protocol-element
summary: 'The RIPv2 Security Association is the central configuration construct containing: KEY-IDENTIFIER (8-bit), AUTHENTICATION ALGORITHM (KEYED-MD5, HMAC-SHA-1, HMAC-SHA-256, HMAC-SHA-384, or HMAC-SHA-512), AUTHENTICATION KEY, SEQUENCE NUMBER (32-bit), START TIME, and STOP TIME. A Security Association is always associated with an interface, not a router.'
section: "2.2"
topics:
