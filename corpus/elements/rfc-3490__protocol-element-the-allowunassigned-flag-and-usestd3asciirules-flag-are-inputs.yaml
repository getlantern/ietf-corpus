document: rfc-3490
kind: protocol-element
summary: The AllowUnassigned flag and UseSTD3ASCIIRules flag are inputs to ToASCII and ToUnicode. AllowUnassigned is set for 'query' strings per Stringprep rules; UseSTD3ASCIIRules triggers additional checks prohibiting non-LDH ASCII code points and leading/trailing hyphen-minus.
