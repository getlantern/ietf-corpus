document: rfc-7011
kind: wire-format
summary: 'The IPFIX Message Header is a fixed 16-octet structure containing: Version Number (16-bit, value 0x000a), Length (16-bit, total message length in octets), Export Time (32-bit unsigned, seconds since UNIX epoch), Sequence Number (32-bit, incremental counter of Data Records modulo 2^32), and Observation Domain ID (32-bit). All fields are exported in network byte order.'
section: "3.1"
topics:
