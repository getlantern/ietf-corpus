document: rfc-5027
kind: security-consideration
summary: An attacker who can remove or downgrade the strength-tag of security preconditions in an offer/answer exchange can cause premature user alerting for a session with no functioning media, or cause media clipping by removing protections against race conditions between offer/answer and secure media stream packets.
