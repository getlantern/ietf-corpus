document: rfc-4590
kind: normative-requirement
summary: 'Digest-Response-Auth or Digest-HA1 MUST NOT be sent in cases other than those specified: Digest-Response-Auth for qop=''auth'' (or unspecified) and Digest-HA1 for qop=''auth-int'' with MD5-sess or AKAv1-MD5-sess algorithm, or when IPsec protects the RADIUS link.'
section: 2.2.3
rfc2119_level: MUST NOT
topics:
    - radius
    - crypto
