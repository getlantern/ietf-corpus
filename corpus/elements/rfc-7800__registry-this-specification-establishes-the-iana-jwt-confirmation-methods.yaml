kind: registry
summary: 'This specification establishes the IANA "JWT Confirmation Methods" registry for JWT "cnf" member values, with initial entries: "jwk" (JSON Web Key Representing Public Key), "jwe" (Encrypted JSON Web Key), "kid" (Key Identifier), and "jku" (JWK Set URL). Registration requires Specification Required review.'
