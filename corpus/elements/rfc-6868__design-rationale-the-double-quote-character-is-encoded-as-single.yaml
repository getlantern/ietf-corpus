document: rfc-6868
kind: design-rationale
summary: The double-quote character is encoded as ^' (single-quote) rather than ^" to avoid any escape sequence that itself contains a double-quote, which would break backwards-compatible parsing by existing iCalendar/vCard parsers.
section: A
