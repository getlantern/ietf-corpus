document: rfc-9167
kind: protocol-element
summary: The <maint:item> element describes a single registry maintenance event during a specific period and is used in maintenance item EPP <info> command/response and <poll> responses. It contains id, type, pollType, systems, environment, start, end, reason, detail, description, tlds, intervention, crDate, and optional upDate.
section: "3.3"
