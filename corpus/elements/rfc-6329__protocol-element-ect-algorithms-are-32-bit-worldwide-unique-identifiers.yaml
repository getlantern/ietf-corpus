document: rfc-6329
kind: protocol-element
summary: ECT-ALGORITHMs are 32-bit worldwide unique identifiers (IEEE OUI 00-80-C2 concatenated with an index) for SPF tie-breaking rules. Sixteen standard algorithms (00-80-C2-01 through 00-80-C2-10) each apply XOR byte-by-byte of a predefined ECT-MASK with BridgeID, producing up to 16 diverse equal-cost shortest path trees per node-pair.
section: "12"
topics:
