document: rfc-7900
kind: security-consideration
summary: Misconfiguration of the Extranet Source Extended Community on a CE — attaching it to a route not intended as an extranet route — can trigger unintended cross-VPN route distribution and a VPN security violation. A PE SHOULD ignore the community if it appears on a route the CE should not have tagged.
section: 4.4.1
topics:
    - routing
    - bgp
    - mpls
    - multicast
    - vpn
    - security
