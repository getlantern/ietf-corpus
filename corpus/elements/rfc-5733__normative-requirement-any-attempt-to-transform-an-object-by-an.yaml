document: rfc-5733
kind: normative-requirement
summary: Any attempt to transform an object by an unauthorized client MUST be rejected; the server MUST return a 2201 response code to note that the client lacks privileges to execute the requested command.
section: "3.2"
rfc2119_level: MUST
