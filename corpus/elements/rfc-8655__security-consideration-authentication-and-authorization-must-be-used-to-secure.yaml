document: rfc-8655
kind: security-consideration
summary: Authentication and authorization must be used to secure the request and control of DetNet resources, especially for network controller devices. Centralized control should follow ACTN security considerations (RFC 8453 Section 9); distributed control relies on the security properties of the control protocols in use.
section: "5"
topics:
    - security
    - routing
