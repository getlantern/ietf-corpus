document: rfc-5178
kind: normative-requirement
summary: When the input_name_type parameter is the GSS_C_NT_DOMAINBASED_SERVICE OID, GSS_Import_name() implementations and GSS-API mechanisms MUST accept ACE-encoded internationalized domain names in the hostname and domain name slots.
section: "5.1"
rfc2119_level: MUST
