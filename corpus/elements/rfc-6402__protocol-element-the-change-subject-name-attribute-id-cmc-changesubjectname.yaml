document: rfc-6402
kind: protocol-element
summary: The Change Subject Name attribute (id-cmc-changeSubjectName, OID id-cmc 36) allows a client to request a change in subject name and/or subject alternative name as part of a certification request. The ASN.1 type ChangeSubjectName is a SEQUENCE with optional subject (Name) and subjectAlt (SubjectAltName) fields, at least one of which MUST be present.
section: "2.8"
topics:
    - pkix
