document: rfc-1723
kind: protocol-element
summary: 'Next Hop (4-byte field per route entry): the immediate next-hop IP address for packets to the destination. A value of 0.0.0.0 means route via the originator of the RIP advertisement. This is an advisory field; if ignored, a sub-optimal but valid route may be taken.'
section: "3.4"
topics:
    - routing
    - ip
