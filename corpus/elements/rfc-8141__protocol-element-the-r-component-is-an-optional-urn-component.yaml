document: rfc-8141
kind: protocol-element
summary: The r-component is an optional URN component introduced by '?+' and used to pass parameters to URN resolution services. It ends at a '?=' sequence (q-component), a '#' (f-component), or end of URN. Its exact semantics are reserved for future standardization.
section: 2.3.1
