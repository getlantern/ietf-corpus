document: rfc-3788
kind: interoperability-note
summary: SIGTRAN protocols use the same SCTP port number and payload protocol identifier when run over TLS as when run without TLS; the session upgrade procedure (STARTTLS) is required to initiate TLS-based communication on an established SCTP association.
