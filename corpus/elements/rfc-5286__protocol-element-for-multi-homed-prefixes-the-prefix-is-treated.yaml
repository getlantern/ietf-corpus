document: rfc-5286
kind: protocol-element
summary: For multi-homed prefixes, the prefix is treated in SPF computations as a virtual node with unidirectional links from each announcing router. Multiple prefixes sharing identical connectivity and relative metrics may share a single virtual node representation, enabling computation of true best-protection alternates.
section: "6.1"
topics:
