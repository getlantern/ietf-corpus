document: rfc-1793
kind: protocol-element
summary: A new OSPF interface configuration parameter 'ospfIfDemand' is defined. When TRUE, Section 3 procedures are followed. On point-to-point interfaces this enables circuit closure when idle; on broadcast/NBMA interfaces it reduces flooding traffic but cannot close the data-link due to required periodic Hellos.
section: B
topics:
    - routing
