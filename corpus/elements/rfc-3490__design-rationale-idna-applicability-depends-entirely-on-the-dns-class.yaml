document: rfc-3490
kind: design-rationale
summary: IDNA applicability depends entirely on the DNS CLASS (IN vs. non-IN) and not on the resource record TYPE, to avoid type-specific complexity. This will remain true even as new types are defined unless there is a compelling reason.
section: 3.2.1
topics:
    - dns
