document: rfc-8030
kind: protocol-element
summary: The Topic header field carries a string used to replace outstanding push messages with the same topic on the same subscription. Its value MUST be restricted to no more than 32 characters from the URL and filename-safe Base64 alphabet (RFC 4648).
