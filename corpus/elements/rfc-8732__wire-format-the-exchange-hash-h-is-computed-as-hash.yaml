document: rfc-8732
kind: wire-format
summary: 'The exchange hash H is computed as: hash(V_C || V_S || I_C || I_S || K_S || Q_C || Q_S || K), where all string fields are length-prefixed and K is an mpint. If no SSH_MSG_KEXGSS_HOSTKEY was sent, K_S is the empty string.'
