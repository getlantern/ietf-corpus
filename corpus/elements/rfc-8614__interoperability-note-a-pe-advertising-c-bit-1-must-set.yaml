document: rfc-8614
kind: interoperability-note
summary: A PE advertising C-bit=1 must set up its data plane to conditionally strip the CW only for frames received from PEs that indicated they send CW-marked frames, and must not strip CW from frames received from PEs that advertised C-bit=0.
