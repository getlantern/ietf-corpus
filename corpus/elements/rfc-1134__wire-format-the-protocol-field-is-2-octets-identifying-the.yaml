document: rfc-1134
kind: wire-format
summary: The Protocol field is 2 octets identifying the encapsulated protocol. Values in the 0x0xxx range identify network-layer data (e.g., 0x0021 = IP), 0x8xxx identifies NCP packets (e.g., 0x8021 = IPCP), and 0xcxxx identifies LCP/associated protocols (0xc021 = LCP). The Protocol field is transmitted most significant octet first.
section: "3.1"
