document: rfc-9052
kind: protocol-element
summary: COSE_Encrypt0 is a three-element CBOR array [protected, unprotected, ciphertext (bstr/nil)] used when the recipient implicitly knows the CEK. It does not support recipient structures; if key identification is needed, COSE_Encrypt should be used instead. CBOR tag 16 identifies COSE_Encrypt0.
section: "5.2"
topics:
    - cbor
    - crypto
