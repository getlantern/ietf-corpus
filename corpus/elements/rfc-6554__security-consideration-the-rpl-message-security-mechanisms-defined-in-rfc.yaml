document: rfc-6554
kind: security-consideration
summary: The RPL message security mechanisms defined in RFC 6550 do not apply to the SRH. The SRH specification provides no confidentiality, integrity, or authenticity mechanisms to protect the header. Attacks analogous to those that led to RH0 deprecation (RFC 5095) — including filtering bypass, topology discovery, bandwidth exhaustion, and defeating anycast — can be mounted from within a RPL routing domain.
section: "5.1"
topics:
    - ip
    - routing
    - security
