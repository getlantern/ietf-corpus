document: rfc-7953
kind: protocol-element
summary: The BUSYTYPE property specifies the default busy-time type for a VAVAILABILITY component. Valid values are BUSY, BUSY-UNAVAILABLE, and BUSY-TENTATIVE; the FREE value is not permitted. If omitted, the default is BUSY-UNAVAILABLE.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
