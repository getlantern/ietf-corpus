document: rfc-5858
kind: normative-requirement
summary: When IPsec implementations cannot process unprotected ICMP messages or lack a path MTU estimate, the implementation SHOULD NOT attempt to segment the ROHC-compressed packet, as it lacks full insight into the unprotected-domain path MTU.
section: "4.3"
rfc2119_level: SHOULD NOT
