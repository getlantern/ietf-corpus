document: rfc-6122
kind: normative-requirement
summary: A localpart MUST be formatted such that the Nodeprep profile of stringprep can be applied without failing. Before comparing two localparts, an application MUST first ensure Nodeprep has been applied to each identifier.
section: "2.3"
rfc2119_level: MUST
