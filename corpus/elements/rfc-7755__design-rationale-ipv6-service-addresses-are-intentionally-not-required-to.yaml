document: rfc-7755
kind: design-rationale
summary: IPv6 Service Addresses are intentionally not required to be IPv4-translatable addresses. Requiring IPv4-translatable addresses would force the entire IPv6 infrastructure to treat translated IPv4 traffic as a special case, significantly increasing complexity and violating SIIT-DC's simplicity goals. Use of IPv4-translatable IPv6 Service Addresses is therefore discouraged.
section: "4.10"
topics:
    - ip
    - v6ops
