document: rfc-8171
kind: normative-requirement
summary: Each Push Directory server MUST participate in ESADI for the Data Labels for which it will push mappings and MUST set the PDSS field in its ESADI-Parameter APPsub-TLV for that Data Label to a non-zero value to advertise its availability.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
