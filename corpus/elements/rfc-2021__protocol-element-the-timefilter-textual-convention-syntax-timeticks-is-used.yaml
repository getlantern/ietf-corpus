document: rfc-2021
kind: protocol-element
summary: The TimeFilter textual convention (syntax TimeTicks) is used as a table index to allow a management station to download only rows changed since a particular time. A row is considered changed if any object value changes or if the row is created or deleted; the table is purged if sysUpTime wraps.
