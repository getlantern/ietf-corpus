document: rfc-4866
kind: interoperability-note
summary: Enhanced Route Optimization is an amendment to base Mobile IPv6 route optimization [RFC 3775] and is designed to be applied alongside it. A mobile node may choose to use only CGA-based home address authentication, only concurrent care-of address tests, or both enhancements together. If neither enhancement applies, base Mobile IPv6 procedures govern.
section: "1"
topics:
    - mobility
