document: rfc-8697
kind: normative-requirement
summary: A PCEP speaker receiving overlapping Operator-configured Association Ranges for a given Association Type in the OP-CONF-ASSOC-RANGE TLV MUST consider the Open message malformed and MUST reject the PCEP session with Error-Type 1, Error-value 1.
section: "5.1"
rfc2119_level: MUST
