document: rfc-6584
kind: design-rationale
summary: The 40-bit anti-replay Sequence Number (vs. the 32-bit field in ESP/RFC 4303) is chosen because on a 10 Gbps network with 64-byte packets, a 40-bit counter takes more than 15 hours to cycle, making wraparound negligible for most sessions without requiring explicit counter extension negotiation.
section: 3.3.2
topics:
    - security
    - multicast
