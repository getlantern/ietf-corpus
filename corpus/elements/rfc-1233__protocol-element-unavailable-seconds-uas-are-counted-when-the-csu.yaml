document: rfc-1233
kind: protocol-element
summary: Unavailable Seconds (UAS) are counted when the CSU is in the Unavailable Signal State (Red or Yellow Alarm), including the initial 10 seconds to enter the state but not the 10 seconds to exit. Seconds counted as UAS may not also be counted as ES or SES.
section: "4.3"
topics:
