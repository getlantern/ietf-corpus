document: rfc-5626
kind: wire-format
summary: The CRLF keep-alive ping is a double-CRLF sequence (CR LF CR LF, 4 octets); the pong is a single CRLF (CR LF, 2 octets). These sequences must be sent between SIP messages and not in the middle of a SIP message; when sent over TLS or SigComp they are inside those channels.
section: 4.4.1
topics:
    - sip
    - tcp
    - nat
