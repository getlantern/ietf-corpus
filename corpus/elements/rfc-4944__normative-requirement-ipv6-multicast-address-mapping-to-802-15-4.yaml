document: rfc-4944
kind: normative-requirement
summary: IPv6 multicast address mapping to 802.15.4 16-bit addresses (Section 9) MUST only be used in a mesh-enabled LoWPAN. An IPv6 multicast destination DST maps to the 16-bit address '100' | DST[15][bits 3-7] | DST[16].
section: "9"
rfc2119_level: MUST
topics:
