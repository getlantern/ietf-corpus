document: rfc-6665
kind: protocol-element
summary: 'Event header field: identifies the event package for a subscription or notification. Both SUBSCRIBE and NOTIFY requests MUST contain exactly one Event header field with a registered token. Event template-packages are applied by appending ''.templatename'' to the base package name (e.g., ''presence.winfo'').'
section: 8.2.1
topics:
    - sip
    - realtime
