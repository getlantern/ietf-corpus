document: rfc-6991
kind: protocol-element
summary: The yang-identifier type is a string starting with an alphabetic character or underscore followed by alphanumeric characters, underscores, hyphens, or dots. It explicitly prohibits any case combination of the prefix 'xml' at the start, matching the identifier rule in RFC 6020 Section 12.
section: "3"
topics:
