document: rfc-3270
kind: normative-requirement
summary: L-LSPs can only be merged into one L-LSP if they support the same PHB Scheduling Class (PSC). This merge condition MUST be enforced by LSRs through explicit checking at label setup. Sufficient downstream bandwidth for the merged PSC traffic (especially EF) must also be ensured.
section: "4.6"
rfc2119_level: MUST
topics:
    - mpls
    - diffserv
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
