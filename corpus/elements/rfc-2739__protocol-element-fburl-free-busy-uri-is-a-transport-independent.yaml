document: rfc-2739
kind: protocol-element
summary: FBURL (Free/Busy URI) is a transport-independent URI pointing to a user's busy time data. Retrieving it via HTTP or FTP returns an iCalendar object containing one or more VFREEBUSY components in a 'text/calendar' MIME body part.
section: "1.1"
