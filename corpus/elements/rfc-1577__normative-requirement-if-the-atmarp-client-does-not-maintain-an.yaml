document: rfc-1577
kind: normative-requirement
summary: If the ATMARP client does not maintain an open VC to the server, the client MUST refresh its ATMARP information with the server at least once every 20 minutes by opening a VC to the server and exchanging the initial InATMARP packets.
section: "6.4"
rfc2119_level: MUST
topics:
    - ip
