document: rfc-4248
kind: interoperability-note
summary: Many RFCs have added authentication and encryption services to the Telnet protocol but have not specified new URI schemes for those services (analogous to how 'https' differs from 'http'). Some modern telnet clients attempt to invoke more-secure Telnet versions when resolving a 'telnet' URL, but others do not.
section: "2"
topics:
    - security
