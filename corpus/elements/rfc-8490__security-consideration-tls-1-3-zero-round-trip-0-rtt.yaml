document: rfc-8490
kind: security-consideration
summary: TLS 1.3 zero round-trip (0-RTT) early data may be used to begin a DSO Session, but only for DSO-TYPEs explicitly permitted in early data; unidirectional messages are never permitted as early data unless an implicit DSO Session exists. If a server receives an early-data DSO message with an impermissible Primary TLV, it MUST forcibly abort the connection.
section: "11.1"
topics:
    - dns
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
