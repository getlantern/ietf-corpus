document: rfc-5303
kind: interoperability-note
summary: The three-way handshake procedure works properly if neither the Neighbor System ID nor Neighbor Extended Local Circuit ID fields are ever included (minimum option with only the state field). This provides backward compatibility to an earlier version of this option.
