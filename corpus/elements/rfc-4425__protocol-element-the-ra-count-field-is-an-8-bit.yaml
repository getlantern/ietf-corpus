document: rfc-4425
kind: protocol-element
summary: The RA Count field is an 8-bit binary modulo-256 counter that MUST be incremented by 1 each time an AU is transmitted where the RA bit is set to 1. Its initial value is undefined and MAY be chosen randomly. It allows receivers to detect lost RTP packets that contained random access points.
section: "5.2"
topics:
    - rtp
    - realtime
