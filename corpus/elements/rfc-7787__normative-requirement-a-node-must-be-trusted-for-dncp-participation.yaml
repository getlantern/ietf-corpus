document: rfc-7787
kind: normative-requirement
summary: A node MUST be trusted for DNCP participation if and only if the effective trust verdict for its own certificate or any ancestor in its hierarchy is Cached or Configured Trust, AND none of the certificates in the hierarchy carry an effective verdict of Cached or Configured Distrust.
section: 8.3.1
rfc2119_level: MUST
topics:
    - security
    - pkix
