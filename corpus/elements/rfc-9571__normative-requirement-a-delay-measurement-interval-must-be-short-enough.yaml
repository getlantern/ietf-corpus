document: rfc-9571
kind: normative-requirement
summary: A delay measurement interval MUST be short enough that it will complete before the enclosing loss batch completes. A delay measurement MAY start at any point during a loss measurement batch subject to this constraint.
section: "6"
rfc2119_level: MUST
