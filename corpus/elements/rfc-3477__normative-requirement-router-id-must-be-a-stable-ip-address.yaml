document: rfc-3477
kind: normative-requirement
summary: Router ID MUST be a stable IP address (typically a loopback) that remains reachable as long as the LSR has any connectivity, so that it does not become unusable when an interface goes down. It is RECOMMENDED to align with the OSPF 'Router Address' or IS-IS 'Traffic Engineering Router ID'.
section: "2"
rfc2119_level: RECOMMENDED
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
