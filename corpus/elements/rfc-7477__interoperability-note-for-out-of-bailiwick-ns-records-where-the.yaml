document: rfc-7477
kind: interoperability-note
summary: For out-of-bailiwick NS records (where the NS target is outside the child zone), the parent will only update glue records that fall below the child's delegation point; glue for grandchild zones cannot be safely updated by the parent via CSYNC.
section: "4.3"
topics:
    - dns
