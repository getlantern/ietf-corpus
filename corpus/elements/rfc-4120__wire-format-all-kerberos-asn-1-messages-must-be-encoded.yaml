document: rfc-4120
kind: wire-format
summary: All Kerberos ASN.1 messages MUST be encoded using Distinguished Encoding Rules (DER) per X.690. BER encodings that are not also valid DER are not acceptable; this requirement is critical for interoperability and cryptographic integrity.
section: 5.1.1
topics:
    - security
