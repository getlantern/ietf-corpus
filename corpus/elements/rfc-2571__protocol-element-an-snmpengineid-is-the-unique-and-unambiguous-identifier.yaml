document: rfc-2571
kind: protocol-element
summary: An snmpEngineID is the unique and unambiguous identifier of an SNMP engine within an administrative domain. Because of the one-to-one engine-to-entity binding, it also uniquely identifies the SNMP entity; federation of domains may require reassignment of values.
section: 3.1.1.1
