document: rfc-7756
kind: design-rationale
summary: The SIIT-DC Dual Translation (ER) architecture is explicitly an adaptation of 464XLAT (RFC 6877) to an Internet Data Center environment, providing end-to-end IPv4 address transparency for applications, protocols, or nodes incompatible with IPv6 or NAT. The ER restores the native IPv4 illusion that standard SIIT-DC cannot provide for NAT-incompatible protocols.
section: "1"
topics:
