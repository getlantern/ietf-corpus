document: rfc-5779
kind: state-machine
summary: PMIPv6 Diameter entities (HAAA, MAG, LMA) SHOULD be stateful and maintain the Authorization Session State Machine defined in RFC 3588. A PMIPv6 mobility session identified by BCE Lookup Keys MUST map to a single Diameter Session-Id; if service selection is also a differentiator, one Diameter Session-Id MUST map to the BCE Lookup Keys plus selected service combination.
section: "6"
rfc2119_level: MUST
topics:
    - diameter
    - mobility
