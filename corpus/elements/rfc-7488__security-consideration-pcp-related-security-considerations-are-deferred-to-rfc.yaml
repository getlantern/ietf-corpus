document: rfc-7488
kind: security-consideration
summary: PCP-related security considerations are deferred to RFC 6887. The same Mapping Nonce SHOULD be reused across IP addresses of the same server to support nonce validation in the Simple Threat Model (RFC 6887 Section 18.1), which defends against off-path attacks.
section: "6"
topics:
    - pcp
    - nat
    - security
