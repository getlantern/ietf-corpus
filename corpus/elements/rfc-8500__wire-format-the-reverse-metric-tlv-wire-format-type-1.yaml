document: rfc-8500
kind: wire-format
summary: 'The Reverse Metric TLV wire format: Type (1 octet) = 16, Length (1 octet, variable 5–255), Flags (1 octet), Metric (3 octets, 24-bit unsigned integer), sub-TLV Len (1 octet), sub-TLV data (0–250 octets). The Flags field has two defined bits: W (0x01, Whole LAN) and U (0x02, Unreachable); reserved bits MUST be zero.'
section: "2"
topics:
