document: rfc-8015
kind: interoperability-note
summary: XR blocks, including this one, can be used without prior SDP signaling per RFC 3611. When SDP signaling is used, the new xr-format value 'ind-burst-gap-discard' signals use of this block via the 'rtcp-xr' attribute.
