document: rfc-5938
kind: design-rationale
summary: The Stop-N-Ack command was introduced to complete symmetry with the Start-N-Ack response — the base TWAMP Stop command had no acknowledgement. This mirrors the Start-ACK pattern and ensures both directions of session control have equivalent handshaking.
