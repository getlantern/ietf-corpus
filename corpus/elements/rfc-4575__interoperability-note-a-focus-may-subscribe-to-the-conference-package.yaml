document: rfc-4575
kind: interoperability-note
summary: A focus MAY subscribe to the conference package of a cascaded (peer) focus to discover its participant list, then include that list using <cascaded-focus> elements. Only flat (peer-to-peer) cascading topology is representable; the full graph requires correlating this package with the Dialog Package of each focus.
section: "3"
