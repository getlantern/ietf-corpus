document: rfc-7494
kind: protocol-element
summary: 'MAC Profile negotiation uses a two-message exchange: the WTP advertises supported profiles in a Discovery Request or Join Request message via the IEEE 802.11 Supported MAC Profiles element; the AC selects and configures the profile in the IEEE 802.11 WLAN Config Request alongside the Add WLAN element.'
