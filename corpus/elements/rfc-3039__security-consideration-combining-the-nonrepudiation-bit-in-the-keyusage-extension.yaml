document: rfc-3039
kind: security-consideration
summary: Combining the nonRepudiation bit in the keyUsage extension with other keyUsage bits may have security implications; this specification recommends against such practices. Both private key holder and relying party should ensure the key is used only with the consent of the legitimate holder.
section: "4"
topics:
