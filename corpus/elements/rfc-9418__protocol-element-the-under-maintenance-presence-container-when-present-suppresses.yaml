document: rfc-9418
kind: protocol-element
summary: The `under-maintenance` presence container, when present, suppresses symptom emission for the subservice and all subservices that depend on it. It has a mandatory `contact` leaf (free-form string) identifying who or what is responsible for the maintenance.
