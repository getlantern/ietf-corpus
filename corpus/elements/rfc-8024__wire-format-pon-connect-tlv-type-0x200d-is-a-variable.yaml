document: rfc-8024
kind: wire-format
summary: PON Connect TLV (Type=0x200D) is a variable-length TLV included in the RG Connect message. It carries a 2-octet Protocol Version (set to 0x0001), a 1-bit Acknowledgement flag (A bit), a Reserved field, and optional Sub-TLVs. U and F bits are both set to 0.
section: 2.1.1
