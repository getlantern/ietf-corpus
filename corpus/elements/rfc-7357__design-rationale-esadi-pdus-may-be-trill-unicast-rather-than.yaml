document: rfc-7357
kind: design-rationale
summary: ESADI PDUs MAY be TRILL unicast (rather than multicast) when there is only one recipient of interest, because multicasting over multi-hop distribution trees imposes substantially greater load than a unicast frame. Unicast is only used when the recipient has signaled support via the UN flag.
section: "4.1"
topics:
    - routing
