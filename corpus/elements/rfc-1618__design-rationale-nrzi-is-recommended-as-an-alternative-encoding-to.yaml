document: rfc-1618
kind: design-rationale
summary: NRZI is recommended as an alternative encoding to ensure a minimum ones density where required over the clear B-channel. Inverted NRZ (switching sense of mark and space) is deprecated as it was a historical workaround for bit-synchronous HDLC.
