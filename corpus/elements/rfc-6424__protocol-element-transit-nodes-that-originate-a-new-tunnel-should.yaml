document: rfc-6424
kind: protocol-element
summary: Transit nodes that originate a new tunnel SHOULD add one FEC Stack Change sub-TLV of operation type PUSH per new tunnel to the DDMAP in the echo reply, and SHOULD fill in the remote peer address. If FEC hiding is desired, the Nil FEC is used and the remote peer address type MUST be set to Unspecified.
section: 4.1.1
topics:
    - mpls
