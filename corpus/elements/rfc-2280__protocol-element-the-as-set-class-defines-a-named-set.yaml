document: rfc-2280
kind: protocol-element
summary: The as-set class defines a named set of AS numbers (name must start with 'as-'). Members can be listed explicitly via 'members' or implicitly via 'mbrs-by-ref'. An AS number in a route-set context implicitly defines the set of routes originated by that AS.
section: "5.2"
topics:
