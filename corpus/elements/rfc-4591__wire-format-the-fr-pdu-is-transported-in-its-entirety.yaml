document: rfc-4591
kind: wire-format
summary: The FR PDU is transported in its entirety excluding opening/closing HDLC flags and FCS, with bit stuffing undone. The two-octet FR header (REQUIRED) contains hi-dlci, C/R, lo-dlci, FECN, BECN, DE bits; a four-octet variant (OPTIONAL) extends the DLCI field across 4 bytes.
section: "4.1"
