document: rfc-1333
kind: protocol-element
summary: 'Three implementation-specific counters supplement the SNMP MIB-II interface counters: OutLQRs (32-bit, incremented before insertion into each transmitted LQR), InLQRs (32-bit, incremented before insertion into each received LQR), and InGoodOctets (32-bit, counts octets of successfully received frames only, excluding discards and errors).'
