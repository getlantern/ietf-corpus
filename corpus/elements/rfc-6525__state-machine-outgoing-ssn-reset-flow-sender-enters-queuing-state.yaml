document: rfc-6525
kind: state-machine
summary: 'Outgoing SSN Reset flow: sender enters ''queuing'' state (stops SSN assignment) on sending request; receiver may enter ''deferred reset processing'' state while waiting for cumulative ACK to reach Sender''s Last Assigned TSN; on success response, sender returns to normal operation and releases queued data.'
