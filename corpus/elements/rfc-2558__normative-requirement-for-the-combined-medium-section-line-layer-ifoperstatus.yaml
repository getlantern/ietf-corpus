document: rfc-2558
kind: normative-requirement
summary: For the combined Medium/Section/Line layer, ifOperStatus must assume the value down(2) if sonetSectionCurrentStatus or sonetLineCurrentStatus has any value other than sonetSectionNoDefect(1) and sonetLineNoDefect(1) respectively. ifLinkUpDownTrapEnable defaults to enabled(1).
