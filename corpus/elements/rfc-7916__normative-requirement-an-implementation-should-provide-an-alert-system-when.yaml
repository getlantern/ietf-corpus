document: rfc-7916
kind: normative-requirement
summary: An implementation SHOULD provide an alert system when total LFA coverage drops below a configured threshold or returns to normal, and similarly when per-link coverage crosses thresholds. Standard mechanisms such as syslog or SNMP traps are recommended.
section: "7.4"
rfc2119_level: SHOULD
topics:
    - routing
