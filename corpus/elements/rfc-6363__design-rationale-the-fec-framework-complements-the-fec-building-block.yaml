document: rfc-6363
kind: design-rationale
summary: The FEC Framework complements the FEC Building Block (RFC 5052) by addressing arbitrary packet flows over unreliable transport rather than object delivery. It separates the CDP definition from the FEC scheme definition so that CDPs and FEC schemes can be independently specified and combined.
