document: rfc-821
kind: normative-requirement
summary: The first command in an SMTP session must be the HELO command. If the HELO argument is not acceptable a 501 failure reply must be returned and the receiver-SMTP must stay in the same state.
section: 4.1.1
rfc2119_level: MUST
topics:
    - email
