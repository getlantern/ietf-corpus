summary: 'Each RBridge broadcast LAN port state record includes: enablement bit, 5-byte PORT-TRILL-VER sub-TLV data, SNPA address, Port ID, Holding Time, DRB priority, BFD support and BFD-Enabled flag, DRB state, a 16-bit unsigned Suspension Timer (seconds), Desired Designated VLAN, and a per-port adjacency table.'
