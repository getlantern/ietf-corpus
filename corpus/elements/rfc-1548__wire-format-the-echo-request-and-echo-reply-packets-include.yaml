document: rfc-1548
kind: wire-format
summary: The Echo-Request and Echo-Reply packets include a Magic-Number field (4 octets) following the standard Code/Identifier/Length header. Until the Magic-Number option is negotiated, the Magic-Number MUST be transmitted as zero. The Discard-Request uses the same layout.
section: "5.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
