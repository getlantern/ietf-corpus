document: rfc-6245
kind: normative-requirement
summary: If the HA receives a Registration Request with a GRE Key Extension but without the 'G' bit set, the HA SHOULD treat this as if the 'G' bit is set; i.e., the presence of a GRE Key Extension constitutes a request for GRE encapsulation.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
