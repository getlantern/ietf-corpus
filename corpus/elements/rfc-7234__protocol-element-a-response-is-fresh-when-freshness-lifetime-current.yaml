document: rfc-7234
kind: protocol-element
summary: 'A response is fresh when freshness_lifetime > current_age. Freshness lifetime is taken from the first matching source in priority order: s-maxage (shared caches only), then max-age, then Expires minus Date; otherwise heuristic freshness may apply. An explicit expiration time in the past forces the response to be stale.'
section: "4.2"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
