document: rfc-5497
kind: normative-requirement
summary: For a single-value Time TLV, the <length> field MUST contain the value 2n+1, where n is the number of (time-value, hop-count) pairs. The number of pairs n MUST be determined by inspecting the <length> field as n := (<length> - 1) / 2, and this MUST be an integer.
section: "6.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
