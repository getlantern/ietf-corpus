document: rfc-5041
kind: normative-requirement
summary: The MSN MUST be initialized to one and MUST increment by one (modulo 2^32) with each DDP Message targeting the specific Queue Number on the DDP Stream. The MSN MUST wrap to 0 after 0xFFFFFFFF.
section: "4.3"
rfc2119_level: MUST
topics:
