document: rfc-5852
kind: normative-requirement
summary: The ingress MUST start the Expiration timer when signaling the LSP with the H bit set. The timer SHOULD be configurable per LSP with a default value of 30 seconds.
section: "4.1"
rfc2119_level: MUST
topics:
