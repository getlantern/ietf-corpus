document: rfc-9107
kind: design-rationale
summary: BGP ORR allows an operator to specify one or more IGP locations for which the route reflector calculates interior cost to the next hop, enabling hot potato routing even when the route reflector is not in the forwarding path. A significant advantage is that route reflector clients do not need to be modified.
section: "3"
topics:
    - bgp
    - routing
