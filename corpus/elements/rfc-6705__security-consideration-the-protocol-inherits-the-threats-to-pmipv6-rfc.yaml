document: rfc-6705
kind: security-consideration
summary: The protocol inherits the threats to PMIPv6 (RFC 5213) identified in RFC 4832. LRI and LRA messages are protected using the same LMA-MAG IPsec security association defined in RFC 5213; a preexisting MAG-MAG security association is assumed when inter-MAG LR is needed.
