document: rfc-3095
kind: registry
summary: 'IANA maintains a registry of ROHC profile identifiers. RFC 3095 defines four initial values: 0x0000 (ROHC UNCOMPRESSED), 0x0001 (ROHC RTP), 0x0002 (ROHC UDP), and 0x0003 (ROHC ESP). Assignment of new profile identifiers requires IETF consensus.'
