document: rfc-4789
kind: security-consideration
summary: SNMPv1 and SNMPv2c messages are not considered secure. Implementors are recommended to use SNMPv3 with the User-based Security Model (USM, RFC 3414) and the View-based Access Control Model (VACM, RFC 3415) to provide authentication and access control.
section: "6"
topics:
    - snmp
    - security
