document: rfc-5749
kind: security-consideration
summary: Hop-by-hop AAA security means each intermediary (e.g., AAA proxy) on the path between KRS and KDS can access the distributed root key. In the absence of a fully trusted AAA infrastructure, end-to-end security mechanisms must be applied to protect key material between KRS and KDS.
section: "6.1"
topics:
