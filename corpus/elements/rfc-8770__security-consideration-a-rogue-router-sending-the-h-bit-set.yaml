document: rfc-8770
kind: security-consideration
summary: A rogue router sending the H-bit set without matching MaxLinkMetric cost could cause routing loops; however, the MaxLinkMetric advertisement by legitimate H-bit routers mitigates the risk by making the rogue router unattractive for transit regardless.
section: "8"
topics:
