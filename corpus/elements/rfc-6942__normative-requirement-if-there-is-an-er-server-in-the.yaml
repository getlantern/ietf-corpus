document: rfc-6942
kind: normative-requirement
summary: If there is an ER server in the same domain as the authenticator, Diameter routing MUST be configured so that ERP/DER messages reach that server even if the Destination-Realm differs from the local domain.
section: "4"
rfc2119_level: MUST
