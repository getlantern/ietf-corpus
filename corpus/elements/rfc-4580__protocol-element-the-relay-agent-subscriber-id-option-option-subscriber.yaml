kind: protocol-element
summary: The Relay Agent Subscriber-ID option (OPTION_SUBSCRIBER_ID, code 38) carries a variable-length subscriber identity value. It consists of a 2-octet option-code, 2-octet option-len, and a subscriber-id field of at least 1 octet.
