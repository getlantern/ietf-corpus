document: rfc-8185
kind: interoperability-note
summary: On the single-homing PE side (e.g., PE3), the working PW and protection PW are treated as if they terminate on the same remote PE node, so normal MPLS-TP linear protection coordination procedures (RFC 6378, RFC 7271, RFC 7324) apply unchanged on the single-homing PE without modification.
section: "4.2"
topics:
    - mpls
