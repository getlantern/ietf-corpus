document: rfc-8870
kind: normative-requirement
summary: If a received EKT Tag has an unknown Message Type, the receiver MUST discard the whole EKT Tag. Message Type MUST be 2 for FullEKTField and 0 for ShortEKTField.
section: "4.1"
