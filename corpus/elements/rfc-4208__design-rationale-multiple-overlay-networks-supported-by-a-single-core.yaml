document: rfc-4208
kind: design-rationale
summary: Multiple overlay networks supported by a single core network may use one or more address spaces according to privacy requirements. This can be achieved without varying core-node addresses since it is the <edge-node, core-node> tuple that constitutes address space membership.
section: "2"
topics:
