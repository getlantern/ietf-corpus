document: rfc-9465
kind: protocol-element
summary: The Packing Capability bit (P-bit, flag bit 0) is defined in the PIM Register-Stop message common header. When set by the RP, it signals the RP's ability to receive PIM Packed Null-Register messages and send PIM Packed Register-Stop messages.
