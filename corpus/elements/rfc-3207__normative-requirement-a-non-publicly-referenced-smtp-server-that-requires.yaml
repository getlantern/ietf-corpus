document: rfc-3207
kind: normative-requirement
summary: A non-publicly-referenced SMTP server that requires TLS negotiation before accepting commands SHOULD return reply code 530 ('Must issue a STARTTLS command first') to every command other than NOOP, EHLO, STARTTLS, or QUIT.
section: "4"
rfc2119_level: SHOULD
topics:
    - email
    - tls
