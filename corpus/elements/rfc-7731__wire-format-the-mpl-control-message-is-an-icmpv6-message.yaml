document: rfc-7731
kind: wire-format
summary: The MPL Control Message is an ICMPv6 message (Type 159, Code 0) with Hop Limit 255, source from the MPL Interface's AddressSet, and destination the link-scoped MPL Domain Address. It carries zero or more MPL Seed Info entries encoding the Seed Set and Buffered Message Set of the sender.
section: "6.2"
topics:
