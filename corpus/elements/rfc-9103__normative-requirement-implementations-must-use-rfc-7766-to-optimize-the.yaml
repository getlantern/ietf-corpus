document: rfc-9103
kind: normative-requirement
summary: Implementations MUST use RFC 7766 to optimize the use of TCP connections for zone transfers. XFR clients sending multiple XFRs MAY choose not to pipeline those queries, as XFRs are not as latency sensitive as other queries and carry significantly more state.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - tcp
