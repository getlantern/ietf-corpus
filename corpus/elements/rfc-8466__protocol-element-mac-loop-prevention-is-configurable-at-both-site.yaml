document: rfc-8466
kind: protocol-element
summary: MAC loop prevention is configurable at both site and site-network-access levels with protection-type, frequency, and retry-timer parameters. MAC address limits are set via limit-number, time-interval, and action, controlling behavior when the MAC table overflow threshold is reached.
