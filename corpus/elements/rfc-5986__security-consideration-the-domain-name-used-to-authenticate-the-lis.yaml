document: rfc-5986
kind: security-consideration
summary: The domain name used to authenticate the LIS is the input to U-NAPTR, not the output; therefore DNS query results do not need integrity protection. A client MAY reject URIs whose domain name differs from the U-NAPTR input to avoid authentication mismatches.
section: "5"
topics:
    - security
    - dns
