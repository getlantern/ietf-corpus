document: rfc-4035
kind: normative-requirement
summary: An RRSIG RR itself MUST NOT be signed. The NS RRset at the zone apex MUST be signed, but NS RRsets at delegation points and glue address RRsets MUST NOT be signed.
section: "2.2"
rfc2119_level: MUST NOT
topics:
    - dns
    - security
