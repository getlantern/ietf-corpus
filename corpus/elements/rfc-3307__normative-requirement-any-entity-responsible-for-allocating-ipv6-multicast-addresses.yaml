document: rfc-3307
kind: normative-requirement
summary: Any entity responsible for allocating IPv6 multicast addresses MUST implement the guidelines specified in this document. This applies to documents or entities assigning permanent addresses, allocating dynamic addresses, or defining permanent group identifiers.
