document: rfc-5880
kind: normative-requirement
summary: If the A bit is set and no authentication is in use (bfd.AuthType is zero), the packet MUST be discarded. Conversely, if the A bit is clear and authentication is in use, the packet MUST also be discarded. This enforces that authentication state is consistent between sender and receiver.
section: 6.8.6
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
