document: rfc-4848
kind: protocol-element
summary: U-NAPTR (Straightforward URI-Enabled NAPTR) is a DDDS application that maps domain names to URIs for particular application services and protocols. It extends S-NAPTR by permitting the 'U' flag and a specific limited form of REGEXP that produces a URI as the resolution result.
section: "2"
topics:
