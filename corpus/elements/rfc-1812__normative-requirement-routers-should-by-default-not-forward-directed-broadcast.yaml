document: rfc-1812
kind: normative-requirement
summary: Routers SHOULD by default not forward directed broadcast datagrams, as they can be exploited for amplification attacks. Forwarding of directed broadcasts SHOULD be a configurable option that defaults to disabled.
section: 5.3.5.2
rfc2119_level: SHOULD
