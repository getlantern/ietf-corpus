document: rfc-3214
kind: normative-requirement
summary: Upon receiving a Label Request Message requesting a new holding priority, the LSR assigns the new holding priority to both the existing incoming/outgoing labels and the new labels to be established for the LSPID, preventing self-bumping.
section: "3.3"
rfc2119_level: MUST
topics:
