document: rfc-9863
kind: design-rationale
summary: The COLOR TLV is carried in the LSP object (rather than a new object) because the LSP object is already a mandatory inclusion in PCRpt, PCUpd, and PCInitiate messages under the stateful PCE model, making it a natural container for per-LSP attributes like color.
