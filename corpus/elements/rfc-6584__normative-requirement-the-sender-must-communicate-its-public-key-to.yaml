document: rfc-6584
kind: normative-requirement
summary: The sender MUST communicate its public key to all receivers before the session starts. The use of SHA-256 as the one-way hash function is RECOMMENDED due to security threats on SHA-1.
section: "3.2"
rfc2119_level: RECOMMENDED
