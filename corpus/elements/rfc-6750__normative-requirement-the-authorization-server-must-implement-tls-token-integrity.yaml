document: rfc-6750
kind: normative-requirement
summary: The authorization server MUST implement TLS. Token integrity protection MUST be sufficient to prevent modification. Confidentiality protection MUST be applied using TLS with a ciphersuite providing both confidentiality and integrity.
section: "5.2"
rfc2119_level: MUST
topics:
    - oauth
    - tls
    - security
