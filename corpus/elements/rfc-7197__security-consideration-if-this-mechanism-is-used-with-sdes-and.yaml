document: rfc-7197
kind: security-consideration
summary: If this mechanism is used with SDES and the media protection key is derived from a dictionary-attackable secret, the duplication allows for a more efficient dictionary attack. The countermeasure is to use proper keying or ensure SDES keys are not dictionary-attackable.
section: "5"
topics:
