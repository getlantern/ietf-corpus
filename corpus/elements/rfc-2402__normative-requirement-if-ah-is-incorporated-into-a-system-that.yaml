document: rfc-2402
kind: normative-requirement
summary: If AH is incorporated into a system that supports auditing, the AH implementation MUST also support auditing and MUST allow a system administrator to enable or disable auditing for AH. There is no requirement for the receiver to transmit any message to the sender in response to an auditable event, to prevent denial of service.
section: "4"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
