document: rfc-7363
kind: normative-requirement
summary: A lower limit of 15 seconds for the stabilization period is RECOMMENDED; using a smaller stabilization period will with high probability cause too much traffic in the overlay. A number-of-peers-to-probe value smaller than 4 is NOT RECOMMENDED.
