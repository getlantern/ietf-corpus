document: rfc-9582
kind: protocol-element
summary: A Route Origin Authorization (ROA) is a CMS-wrapped, digitally signed object identified by OID id-ct-routeOriginAuthz (1.2.840.113549.1.9.16.1.24). It authorizes a single AS to originate routes to one or more IP address prefixes and uses the RPKI signed object template from RFC 6488.
