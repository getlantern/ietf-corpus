document: rfc-7989
kind: design-rationale
summary: Backwards compatibility with RFC 7329 is achieved by inspecting the presence and order of the 'remote-uuid' parameter rather than using option tags or feature tags, because neither the old nor new specification has versioning information embedded and adding it retroactively would break deployed implementations.
