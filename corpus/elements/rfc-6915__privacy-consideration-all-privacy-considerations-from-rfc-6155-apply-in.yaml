document: rfc-6915
kind: privacy-consideration
summary: All privacy considerations from RFC 6155 apply. In environments where the Location Server does not already have access to internal NAT state, a flow identity query reveals information about the client's communications that the server would not otherwise be able to discern, representing additional privacy exposure.
section: "6"
topics:
    - privacy
    - nat
