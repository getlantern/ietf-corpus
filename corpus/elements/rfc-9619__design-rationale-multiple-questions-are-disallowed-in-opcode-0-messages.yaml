document: rfc-9619
kind: design-rationale
summary: Multiple questions are disallowed in OPCODE = 0 messages because response parameters such as AA (Authoritative Answer) and RCODE have no defined meaning when a message contains multiple questions — there is no mechanism to signal which question those parameters relate to.
