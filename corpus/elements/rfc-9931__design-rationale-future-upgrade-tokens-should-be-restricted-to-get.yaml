document: rfc-9931
kind: design-rationale
summary: Future upgrade tokens should be restricted to GET requests with no content when the HTTP method is otherwise irrelevant and the request does not need to carry message content. This improves consistency with existing upgrade tokens (WebSocket, connect-udp, connect-ip) and simplifies server implementation.
section: "7.1"
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
