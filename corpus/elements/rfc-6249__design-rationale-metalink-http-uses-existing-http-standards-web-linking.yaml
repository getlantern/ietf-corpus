document: rfc-6249
kind: design-rationale
summary: Metalink/HTTP uses existing HTTP standards (Web Linking RFC 5988, Instance Digests RFC 3230, ETags RFC 2616) rather than defining new header fields, in order to provide Metalink/XML equivalent functionality while remaining compatible with standard HTTP infrastructure.
