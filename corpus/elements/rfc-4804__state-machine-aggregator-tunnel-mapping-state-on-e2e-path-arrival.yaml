document: rfc-4804
kind: state-machine
summary: 'Aggregator tunnel-mapping state: on E2E Path arrival the Aggregator makes a tentative mapping to a TE tunnel; on E2E Resv arrival it finalizes the mapping. If the final tunnel differs from the tentative one, the Aggregator MUST resend an E2E Path with the updated IF_ID RSVP_HOP before processing the Resv.'
