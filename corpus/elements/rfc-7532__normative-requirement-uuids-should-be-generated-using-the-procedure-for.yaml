document: rfc-7532
kind: normative-requirement
summary: UUIDs SHOULD be generated using the procedure for version 4 UUIDs as specified in RFC 4122 to minimize collision probability. Version 1 UUIDs are no longer considered sufficient because MAC addresses are no longer reliably unique (e.g., virtual machines).
section: "2.12"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
