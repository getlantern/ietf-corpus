document: rfc-5611
kind: normative-requirement
summary: For CESoPSN PWs, the Payload Bytes value MUST be an integer multiple of the number of DS0 channels. Additionally, for trunk-specific NxDS0 with CAS, the number of trunk frames per multiframe fragment MUST be an integer divisor of the number of frames per trunk multiframe.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
