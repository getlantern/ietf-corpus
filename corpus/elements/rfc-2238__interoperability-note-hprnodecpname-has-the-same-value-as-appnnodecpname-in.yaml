document: rfc-2238
kind: interoperability-note
summary: hprNodeCpName has the same value as appnNodeCpName in the APPN MIB when both objects refer to the same APPN node. Similarly, appnNodeCounterDisconTime in the APPN MIB is used to detect discontinuities in HPR global counters.
