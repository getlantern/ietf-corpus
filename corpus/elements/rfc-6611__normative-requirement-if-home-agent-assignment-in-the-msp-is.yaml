document: rfc-6611
kind: normative-requirement
summary: If home agent assignment in the MSP is required by the deployment, an implementation conforming to this specification SHALL be able to transfer the information received from the AAA server to the NAS, and from the NAS to the DHCP relay function, either by co-locating these functions or via an interface between them.
section: "3"
rfc2119_level: REQUIRED
