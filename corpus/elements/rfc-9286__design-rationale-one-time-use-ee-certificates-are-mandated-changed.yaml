document: rfc-9286
kind: design-rationale
summary: One-time-use EE certificates are mandated (changed from RFC 6486) because multiple RP implementations were found to be in a vulnerable position, possibly due to perceived ambiguity in the original specification that allowed 'sequential-use' EE certificates. The new key pair per manifest design prevents reuse-related attacks.
section: Appendix B
topics:
    - pkix
    - security
    - crypto
