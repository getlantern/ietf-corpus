document: rfc-8359
kind: security-consideration
summary: This document defines a special label value for the UPSTREAM_LABEL object and updates processing semantics for an existing RSVP object field. No new security implications are introduced; the security considerations of RFC 3473 and the MPLS/GMPLS security framework (RFC 5920) still apply.
