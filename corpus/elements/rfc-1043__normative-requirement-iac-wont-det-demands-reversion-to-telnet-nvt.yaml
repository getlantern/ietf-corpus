document: rfc-1043
kind: normative-requirement
summary: IAC WONT DET demands reversion to TELNET NVT mode if DET is active, or refuses DET if not yet active. IAC DONT DET has identical semantics. The connection reverts to NVT interpretation as described in MIL-STD-1782.
section: "2"
rfc2119_level: MUST
