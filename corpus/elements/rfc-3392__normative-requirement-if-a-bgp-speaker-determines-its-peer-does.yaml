document: rfc-3392
kind: normative-requirement
summary: If a BGP speaker determines its peer does not support a capability the speaker requires, it MAY send a NOTIFICATION with Error Subcode Unsupported Capability and terminate the peering. Such peering SHOULD NOT be re-established automatically.
section: "3"
rfc2119_level: SHOULD NOT
topics:
    - bgp
    - routing
