document: rfc-9697
kind: interoperability-note
summary: This document updates RFC 8182 Section 3.4.1 ('Processing the Update Notification File') by inserting a new paragraph that mandates hash comparison of previously seen delta serials when the session_id matches, and snapshot download when differences are detected. Implementations of RFC 8182 that do not implement this check cannot detect the mutation form of desynchronization.
section: "5"
topics:
    - routing
    - bgp
