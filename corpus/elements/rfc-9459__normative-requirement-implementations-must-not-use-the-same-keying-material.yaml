document: rfc-9459
kind: normative-requirement
summary: Implementations MUST NOT use the same keying material with more than one mode; for example, the same key must not be used with both AES-CTR and AES-CBC, to avoid cross-protocol concerns.
section: "8"
rfc2119_level: MUST NOT
