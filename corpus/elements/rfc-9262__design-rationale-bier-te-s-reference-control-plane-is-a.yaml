document: rfc-9262
kind: design-rationale
summary: BIER-TE's reference control plane is a centralized BIER-TE controller that directly populates BIFTs, eliminating the need for Bit Index Routing Tables (BIRTs) on BFRs and for BFR-specific routing underlay extensions. Distributed or decentralized control plane options are equally feasible but require additional coordination protocols not specified here.
section: "3.2"
topics:
    - routing
