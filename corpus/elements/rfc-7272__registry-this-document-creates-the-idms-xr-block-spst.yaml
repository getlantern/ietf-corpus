document: rfc-7272
kind: registry
summary: This document creates the IDMS XR Block SPST Registry subordinate to the IANA RTCP XR Block Type Registry. It is limited to 16 entries (0–15); value 0 is Reserved, values 1–4 are initially assigned (SC, MSAS, SC Prime Input, SC Prime Output), and values 5–15 are available via Specification Required policy.
section: "13.4"
