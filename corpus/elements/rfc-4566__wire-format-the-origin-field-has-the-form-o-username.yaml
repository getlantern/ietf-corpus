document: rfc-4566
kind: wire-format
summary: The origin field has the form `o=<username> <sess-id> <sess-version> <nettype> <addrtype> <unicast-address>`. The tuple of username, sess-id, nettype, addrtype, and unicast-address forms a globally unique session identifier; sess-version MUST increase on each modification.
section: "5.2"
topics:
    - realtime
