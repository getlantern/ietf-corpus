document: rfc-9927
kind: protocol-element
summary: The ROVR (Registration Ownership Verifier) is a variable-length field of 64, 128, 192, or 256 bits used to verify ownership of a registered IPv6 address. When the C-flag is set, this field contains a Crypto-ID as defined in RFC 8928.
