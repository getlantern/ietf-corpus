document: rfc-8149
kind: protocol-element
summary: The Fragment ID is a 16-bit integer (1-65535) incremented for each new RSVP message requiring semantic fragmentation, reset to 1 at wraparound. Its scope is limited to a single RSVP message type; Fragment IDs are not correlated across different message types (e.g., Path vs. PathErr).
section: "5.3"
topics:
    - routing
    - mpls
