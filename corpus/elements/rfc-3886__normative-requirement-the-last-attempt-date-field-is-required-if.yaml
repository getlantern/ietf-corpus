document: rfc-3886
kind: normative-requirement
summary: The Last-Attempt-Date field is REQUIRED if any delivery attempt has been made and the Action field does not have value 'opaque'. It MUST NOT be included if no delivery attempts have been made.
section: 3.3.6
rfc2119_level: REQUIRED
