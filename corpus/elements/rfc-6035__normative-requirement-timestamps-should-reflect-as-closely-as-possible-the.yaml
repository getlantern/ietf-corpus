document: rfc-6035
kind: normative-requirement
summary: Timestamps SHOULD reflect, as closely as possible, the actual time during which the media session was running to enable correlation to network events and billing records. Time zones other than 'Z' (UTC) are not allowed.
section: 4.6.1
rfc2119_level: SHOULD
