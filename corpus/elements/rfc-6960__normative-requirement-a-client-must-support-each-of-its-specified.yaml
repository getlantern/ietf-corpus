document: rfc-6960
kind: normative-requirement
summary: 'A client MUST support each of its specified preferred signature algorithms and MUST list them in order from most preferred to least preferred. A responder SHOULD apply the lowest-precedence selection that yields a supported, secure algorithm: (1) client preferred, (2) CRL signing algorithm, (3) request signing algorithm, (4) out-of-band default, (5) mandatory/recommended algorithm.'
section: 4.4.7.2
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
