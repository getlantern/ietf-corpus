document: rfc-3398
kind: design-rationale
summary: Overlap dialing via Subsequent Address Messages (SAM) is excluded from this specification's scope. Gateways facing ISUP networks that use overlap signaling must implement digit collection timers to ensure all digits are assembled before transmitting an en-bloc INVITE into the SIP network.
section: "4"
topics:
