document: rfc-9211
kind: protocol-element
summary: The `detail` parameter is a String or Token allowing caches to convey additional implementation-specific information not captured in other parameters. Its semantics are always specific to the cache that sent it; the same value from different caches may not have the same meaning.
section: "2.8"
topics:
