document: rfc-3927
kind: security-consideration
summary: The ARP protocol is insecure; a malicious on-link host may send fraudulent ARP packets to interfere with other hosts, including answering all ARP probes to prevent legitimate hosts from ever acquiring an address or cause them to loop infinitely through address selection.
