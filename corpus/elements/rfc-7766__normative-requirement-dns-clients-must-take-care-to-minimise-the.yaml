document: rfc-7766
kind: normative-requirement
summary: DNS clients MUST take care to minimise the idle time of established DNS-over-TCP sessions, and SHOULD close the TCP connection of an idle session unless an idle timeout has been established using some other signalling mechanism.
section: 6.2.3
rfc2119_level: MUST
topics:
    - dns
    - tcp
