document: rfc-2576
kind: normative-requirement
summary: When a proxy receives a GetBulkRequest-PDU and must forward it using SNMPv1, the proxy forwarder SHALL set non-repeaters and max-repetitions to 0 and change the PDU tag to GetNextRequest-PDU.
section: 4.2.1
rfc2119_level: MUST
topics:
    - snmp
