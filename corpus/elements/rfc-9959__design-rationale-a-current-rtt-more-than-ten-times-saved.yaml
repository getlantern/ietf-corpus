document: rfc-9959
kind: design-rationale
summary: A current RTT more than ten times saved_rtt is treated as indicating a path change. The factor of ten accommodates both buffering-induced latency increases and RTT sample variation without prematurely aborting Careful Resume on transient spikes.
section: 4.2.1
topics:
    - congestion
