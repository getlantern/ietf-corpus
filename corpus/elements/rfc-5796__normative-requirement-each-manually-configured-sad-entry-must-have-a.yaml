document: rfc-5796
kind: normative-requirement
summary: Each manually configured SAD entry must have a unique SPI assigned by the Administrator to avoid conflicts. The receiving router MUST use SPI plus destination address plus sender address in the SA lookup, and the interface ID tag, SPI, and sender address MUST all be used in the SA lookup process.
section: "11"
rfc2119_level: MUST
topics:
    - ipsec
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
