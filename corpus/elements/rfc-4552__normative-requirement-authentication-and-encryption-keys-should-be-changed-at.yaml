document: rfc-4552
kind: normative-requirement
summary: 'Authentication and encryption keys SHOULD be changed at least every 90 days to maintain link security. This recommendation is based on analysis of the weakest security case: NULL encryption with HMAC-MD5 authentication.'
section: "10.3"
rfc2119_level: SHOULD
topics:
