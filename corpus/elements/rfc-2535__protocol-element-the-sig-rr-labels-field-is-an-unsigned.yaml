document: rfc-2535
kind: protocol-element
summary: The SIG RR 'labels' field is an unsigned count of labels in the original owner name, excluding the root null label and any leading wildcard '*'. If the retrieved owner name has more labels than this count, the RR is a wildcard expansion; if it has fewer, the SIG is corrupt and must be ignored.
section: 4.1.3
topics:
    - dns
    - security
