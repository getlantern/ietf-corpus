document: rfc-3767
kind: security-consideration
summary: A MITM attack using the SACRED account password with DIGEST-MD5 is thwarted because the DIGEST-MD5 client hash includes a client-selected 'digest-uri-value' of 'sacred/<serverName>', which would not match what a MITM server presents.
section: "5"
topics:
