document: rfc-4352
kind: normative-requirement
summary: If the receiver finds a mismatch between the size of a received payload and the size indicated by the ToC, the receiver SHOULD discard the packet, because decoding a frame parsed from erroneous ToC data could severely degrade audio quality.
section: 4.5.2
rfc2119_level: SHOULD
topics:
    - rtp
    - realtime
