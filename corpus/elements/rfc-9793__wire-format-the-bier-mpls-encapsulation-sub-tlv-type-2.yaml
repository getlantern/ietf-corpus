document: rfc-9793
kind: wire-format
summary: The BIER MPLS Encapsulation sub-TLV (Type=2) encodes Max SI (1 octet), BS Len (4 bits), and Label (20 bits), optionally followed by sub-TLVs. The label range starts at Label and ends at Label + Max SI, with one label per Set Identifier.
section: "3.1"
topics:
