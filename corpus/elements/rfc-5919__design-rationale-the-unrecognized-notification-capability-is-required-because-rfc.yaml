document: rfc-5919
kind: design-rationale
summary: The Unrecognized Notification capability is required because RFC 5036 does not define behavior for an LDP speaker receiving a Notification with an unknown Status Code. Using this capability at session establishment avoids backward-compatibility problems when introducing new Status Codes such as End-of-LIB.
section: "1"
topics:
