document: rfc-2615
kind: wire-format
summary: The X^43+1 scrambler uses a 43-bit shift register XORed with the data stream. Scrambling is performed most-significant bit first (A[7], A[6], ... A[0], B[7], ...), which is opposite to the HDLC FCS bit order (least significant bit first).
section: "4"
