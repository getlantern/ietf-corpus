document: rfc-9843
kind: normative-requirement
summary: A metric value of 0xFFFFFF (IS-IS) or 0xFFFFFFFF (OSPF) is considered a maximum link metric, and a link with this value MUST be used during Flex-Algorithm calculations as a last resort link as described in Section 15.3 of RFC 9350.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
