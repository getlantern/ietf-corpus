document: rfc-1123
kind: normative-requirement
summary: A User-FTP using STREAM mode SHOULD send a PORT command to assign a non-default data port before each transfer command, because TIME-WAIT delays prevent immediate socket-pair reuse across multiple transfers in a single session.
section: 4.1.2.5
rfc2119_level: SHOULD
topics:
    - tcp
