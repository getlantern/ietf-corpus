document: rfc-8210
kind: wire-format
summary: 'Error Report PDU (Type=10, variable Length): Error Code (16-bit), Length of Encapsulated PDU (32-bit), Erroneous PDU (variable), Length of Error Text (32-bit), Diagnostic Message (variable, UTF-8). Error text is optional; if absent, Length of Error Text MUST be zero. An Error Report MUST NOT be sent in response to another Error Report.'
section: "5.11"
topics:
