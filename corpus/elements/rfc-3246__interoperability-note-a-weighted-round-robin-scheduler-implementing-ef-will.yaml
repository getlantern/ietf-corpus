document: rfc-3246
kind: interoperability-note
summary: A weighted round-robin scheduler implementing EF will typically not support R values as high as link speed, because the maximum EF service rate in the presence of competing traffic is bounded by the number of other queues and their weights. Its E_a is also typically higher than a strict priority queue implementation.
