document: rfc-5848
kind: protocol-element
summary: The Hash Block (HB) contains base64-encoded hashes of entire syslog messages, ordered left to right, space-separated, all within a single SD-PARAM. Each hash covers the complete syslog message starting from '<' of the PRI; hash size MUST NOT be shorter than 160 bits.
section: 4.2.7
topics:
    - syslog
    - crypto
    - security
