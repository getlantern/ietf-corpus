document: rfc-3513
kind: wire-format
summary: 'Multicast addresses are 128 bits with the format: 8-bit prefix 0xFF | 4-bit flags (high 3 reserved=0, T=0 permanent/T=1 transient) | 4-bit scope | 112-bit group ID. The leading 0xFF byte identifies the address as multicast.'
