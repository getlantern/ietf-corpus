document: rfc-8221
kind: design-rationale
summary: ENCR_CHACHA20_POLY1305 was not ready for RFC 7321 but was subsequently recommended by the CFRG as an AES-CBC and AES-GCM alternative. Insufficient ESP implementations existed at time of writing to raise it above SHOULD; it is expected to become MUST long term.
