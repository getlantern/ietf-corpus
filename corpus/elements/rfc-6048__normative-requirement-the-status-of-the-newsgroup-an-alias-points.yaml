document: rfc-6048
kind: normative-requirement
summary: The status of the newsgroup an alias points to MUST NOT be taken into account when an article arrives in the alias newsgroup; in particular, unapproved peer articles arriving for an alias pointing to a moderated group are accepted.
section: "3.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
