document: rfc-3411
kind: security-consideration
summary: The principal threats against which Security Models SHOULD protect are modification of information (unauthorized alteration of in-transit SNMP messages) and masquerade (performing operations by assuming the identity of an authorized principal). These require integrity and authentication services.
