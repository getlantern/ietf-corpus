document: rfc-4287
kind: design-rationale
summary: When both signing and encrypting, the document SHOULD be signed first and then encrypted. This provides integrity to the base document while hiding the signer's identity. If MACs are used, this ordering is REQUIRED.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
