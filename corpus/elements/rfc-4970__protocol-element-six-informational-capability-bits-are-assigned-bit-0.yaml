document: rfc-4970
kind: protocol-element
summary: 'Six informational capability bits are assigned: bit 0 (OSPF graceful restart capable), bit 1 (OSPF graceful restart helper), bit 2 (OSPF Stub Router support), bit 3 (OSPF Traffic Engineering support), bit 4 (OSPF point-to-point over LAN), bit 5 (OSPF Experimental TE). Bits 6-31 are unassigned and require Standards Action.'
