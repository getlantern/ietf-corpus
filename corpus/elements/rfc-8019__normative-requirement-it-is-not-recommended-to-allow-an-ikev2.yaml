document: rfc-8019
kind: normative-requirement
summary: It is NOT RECOMMENDED to allow an IKEv2 window size greater than one when NULL Authentication has been used, since there is no way to decrease window size once increased and a larger window amplifies resource exhaustion.
section: "5"
rfc2119_level: SHOULD NOT
