document: rfc-3857
kind: normative-requirement
summary: Watcherinfo notifications generated by the server MUST be in one of the formats specified in the Accept header field of the SUBSCRIBE request. If no Accept header field was present, notifications MUST use application/watcherinfo+xml.
section: "4.5"
rfc2119_level: MUST
topics:
    - sip
    - realtime
