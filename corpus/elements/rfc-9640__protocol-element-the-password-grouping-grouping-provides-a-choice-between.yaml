document: rfc-9640
kind: protocol-element
summary: The 'password-grouping' grouping provides a choice between 'cleartext-password' (string, guarded by cleartext-passwords feature) and 'encrypted-password' (uses encrypted-value-grouping, guarded by encrypted-passwords feature). Intended for remote authentication credentials; for local account passwords, the 'ianach:crypt-hash' typedef from RFC 7317 should be used instead.
section: 2.1.4.2
topics:
