document: rfc-8827
kind: security-consideration
summary: Because a broad range of characters are permitted in identity strings, attackers may craft identities confusable with other identities (homograph attacks). Those presenting identifiers to users should consider highlighting cases of mixed script usage per RFC 5890 Section 4.4.
section: 9.4.4.1
topics:
    - webrtc
    - security
