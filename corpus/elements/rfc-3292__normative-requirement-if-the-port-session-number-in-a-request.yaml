document: rfc-3292
kind: normative-requirement
summary: 'If the Port Session Number in a request message does not match the current Port Session Number for the specified port, a failure response message MUST be returned with Code ''5: Invalid port session number''. A new Port Session Number MUST be generated when a port returns to Available from Unavailable/Loopback or when line status returns to Up.'
section: 3.1.2
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
