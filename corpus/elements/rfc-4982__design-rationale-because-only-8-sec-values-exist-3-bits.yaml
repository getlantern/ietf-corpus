document: rfc-4982
kind: design-rationale
summary: Because only 8 Sec values exist (3 bits), Sec value reuse may eventually be necessary when old values are fully abandoned due to weak security. However, reuse is explicitly a last resort and requires a long deprecation period to prevent misinterpretation by old implementations.
section: "4.1"
