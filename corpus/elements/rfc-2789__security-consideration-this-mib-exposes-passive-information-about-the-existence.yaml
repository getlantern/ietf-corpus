document: rfc-2789
kind: security-consideration
summary: This MIB exposes passive information about the existence, type, and configuration of mail applications on a host (potential vulnerability indicators) and network usage patterns that could be used to analyze traffic; SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) is recommended to restrict access.
section: "8"
topics:
    - snmp
    - security
    - email
    - privacy
