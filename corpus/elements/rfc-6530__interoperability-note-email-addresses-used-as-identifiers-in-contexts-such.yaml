document: rfc-6530
kind: interoperability-note
summary: Email addresses used as identifiers in contexts such as X.509 certificates and web commerce systems will encounter difficulties when internationalized addresses are first used, because many such systems cannot handle even the full range of addresses permitted by existing ASCII-only email standards.
section: "11.2"
topics:
