document: rfc-8981
kind: normative-requirement
summary: New temporary addresses MUST be created by appending a randomized IID to the received prefix. The IID MUST be compared against reserved IPv6 IIDs and those already employed on the same interface and prefix before use.
section: "3.4"
rfc2119_level: MUST
topics:
    - ip
    - privacy
