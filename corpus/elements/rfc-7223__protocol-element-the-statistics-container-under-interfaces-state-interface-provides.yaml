document: rfc-7223
kind: protocol-element
summary: The 'statistics' container under '/interfaces-state/interface' provides read-only 64-bit counters (yang:counter64) for in-octets, in-unicast-pkts, in-broadcast-pkts, in-multicast-pkts, out-octets, out-unicast-pkts, out-broadcast-pkts, out-multicast-pkts, and 32-bit counters (yang:counter32) for in-discards, in-errors, in-unknown-protos, out-discards, out-errors. A mandatory 'discontinuity-time' leaf marks when counters last reset.
section: "5"
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
