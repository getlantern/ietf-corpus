document: rfc-5651
kind: normative-requirement
summary: There MUST be a Transport Session Identifier (TSI) associated with each LCT session, scoped by the sender IP address, and the two together MUST uniquely identify the session. If no underlying TSI is provided by the network or transport layer, the TSI MUST be included in the LCT header.
section: "4.1"
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
