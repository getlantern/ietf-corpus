document: rfc-7911
kind: protocol-element
summary: A Path Identifier is a four-octet locally assigned value that, combined with the address prefix, uniquely identifies a path advertised to a neighbor. The assignment is a local matter, but the (Prefix, Path Identifier) tuple MUST uniquely identify each advertised path.
section: "2"
topics:
