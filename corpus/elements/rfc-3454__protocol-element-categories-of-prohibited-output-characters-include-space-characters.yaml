document: rfc-3454
kind: protocol-element
summary: 'Categories of prohibited output characters include: space characters (C.1), control characters (C.2), private-use code points (C.3), non-character code points (C.4), surrogate codes D800–DFFF (C.5), characters inappropriate for plain text (C.6), ideographic description characters (C.7), characters that change display properties or are deprecated (C.8), and tagging characters (C.9).'
