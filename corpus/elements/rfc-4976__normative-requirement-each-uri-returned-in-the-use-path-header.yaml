document: rfc-4976
kind: normative-requirement
summary: Each URI returned in the Use-Path header SHOULD be used for only one unique session. The client MUST NOT reuse the same URI for multiple sessions and must protect these URIs from eavesdropping.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - realtime
    - security
