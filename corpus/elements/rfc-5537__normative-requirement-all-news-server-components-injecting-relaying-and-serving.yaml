document: rfc-5537
kind: normative-requirement
summary: All news server components (injecting, relaying, and serving agents) MUST prepend their path-identity to the Path header field when processing an article. Injecting agents MUST also use the same identity in Injection-Info header fields they add.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
