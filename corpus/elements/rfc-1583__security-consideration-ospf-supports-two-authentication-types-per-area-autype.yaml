document: rfc-1583
kind: security-consideration
summary: 'OSPF supports two authentication types per area: AuType 0 (no authentication, 64-bit authentication field set to zero) and AuType 1 (simple plaintext password, 8-octet password placed directly in the authentication field). The simple password provides only weak protection against passive eavesdroppers.'
