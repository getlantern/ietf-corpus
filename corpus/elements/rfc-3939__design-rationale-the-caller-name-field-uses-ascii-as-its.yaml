document: rfc-3939
kind: design-rationale
summary: The Caller-Name field uses ASCII as its base character set because North American delivery to customer equipment requires ASCII per T1.401, and the 7-bit graphical characters of IRA, T.61, ASCII, and ISO 8859-1 are all coded the same way.
