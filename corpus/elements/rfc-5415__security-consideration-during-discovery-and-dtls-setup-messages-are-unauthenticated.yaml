document: rfc-5415
kind: security-consideration
summary: During Discovery and DTLS setup, messages are unauthenticated and susceptible to tampering. Attackers may inject forged Discovery Responses directing WTPs to rogue ACs or send crafted DTLS handshake messages. Implementations must protect against these attacks by enforcing pre-provisioned AC credentials.
section: "12.3"
topics:
    - security
    - tls
