document: rfc-1364
kind: design-rationale
summary: The BGP identifier must equal the OSPF router ID so that an ASBR can determine which border router's AS_PATH to use when a route is imported by multiple ASBRs, and to allow administrators to correlate BGP and OSPF state.
section: "3"
topics:
