document: rfc-2847
kind: interoperability-note
summary: Adding cast5CBC, id-dsa-with-sha1, HMAC-MD5, and sha1WithRSAEncryption MA algorithm values to SPKM-1 and SPKM-2 does not impair backward compatibility because SPKM negotiates algorithms; an older SPKM-1/SPKM-2 peer that does not recognize these MA values will simply not select them.
section: "2.5"
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
