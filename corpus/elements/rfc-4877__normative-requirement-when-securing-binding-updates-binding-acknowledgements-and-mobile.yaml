document: rfc-4877
kind: normative-requirement
summary: When securing Binding Updates, Binding Acknowledgements, and Mobile Prefix Discovery messages, both mobile node and home agent MUST support ESP in transport mode and MUST use a non-null payload authentication algorithm to provide data origin authentication, connectionless integrity, and optional anti-replay protection.
section: "4.3"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - security
