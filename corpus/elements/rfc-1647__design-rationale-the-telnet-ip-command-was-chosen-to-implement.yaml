document: rfc-1647
kind: design-rationale
summary: The Telnet IP command was chosen to implement the 3270 ATTN key because IP was explicitly defined in the Telnet specification for interrupting a running process, which matches the SNA semantics of ATTN. The Telnet AO command was chosen for SYSREQ because it reflects the SNA behavior of preventing further host output while the user's process continues executing.
section: "11"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
