summary: For both channel mapping families 2 and 3, the allowed numbers of channels are (1+n)^2 + 2j for n=0..14 and j=0 or 1, yielding values 1, 3, 4, 6, 9, 11, 16, 18, 25, 27, ... up to 227, representing periphonic Ambisonics from zeroth to fourteenth order with optional non-diegetic stereo.
