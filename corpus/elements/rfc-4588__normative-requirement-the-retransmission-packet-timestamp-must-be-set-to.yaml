document: rfc-4588
kind: normative-requirement
summary: The retransmission packet timestamp MUST be set to the original timestamp of the associated original RTP packet, not a new or random value. Consequently, the initial RTP timestamp of the retransmission stream equals the original timestamp of the first retransmitted packet.
section: "4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
