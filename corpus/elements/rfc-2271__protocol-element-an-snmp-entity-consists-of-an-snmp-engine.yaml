document: rfc-2271
kind: protocol-element
summary: An SNMP entity consists of an SNMP engine (comprising a Dispatcher, Message Processing Subsystem, Security Subsystem, and Access Control Subsystem) plus one or more associated applications. There is a one-to-one association between an SNMP engine and the SNMP entity containing it.
section: 3.1.1
topics:
    - snmp
