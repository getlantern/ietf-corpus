document: rfc-3024
kind: protocol-element
summary: 'Selective reverse tunneling allows a mobile node with a co-located care-of address to selectively reverse-tunnel packets or not. A mobile node using a foreign agent care-of address may implement selective tunneling by requesting Encapsulating Delivery Style: un-encapsulated packets are forwarded normally; encapsulated packets are reverse-tunneled.'
section: "5.4"
topics:
    - mobility
    - ip
