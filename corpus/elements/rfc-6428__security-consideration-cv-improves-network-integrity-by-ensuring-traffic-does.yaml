document: rfc-6428
kind: security-consideration
summary: CV improves network integrity by ensuring traffic does not leak between LSPs. Globally unique MEP-IDs provide authoritative detection of persistent traffic leaking. Non-unique MEP-IDs could result in undetected leaking when two LSPs with common MEP-IDs are misconnected, though this is considered rare and difficult to exploit maliciously.
