document: rfc-6068
kind: normative-requirement
summary: For internationalized domain names in addr-spec, non-ASCII characters MUST first be encoded as UTF-8 and then each octet MUST be percent-encoded. URI-producing applications MUST NOT use percent-encoding in domain names unless it represents a UTF-8 character sequence.
section: "2"
rfc2119_level: MUST
topics:
    - email
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
