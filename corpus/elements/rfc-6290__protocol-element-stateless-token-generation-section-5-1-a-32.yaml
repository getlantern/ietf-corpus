document: rfc-6290
kind: protocol-element
summary: 'Stateless token generation (Section 5.1): a 32-octet QCD_SECRET stored in non-volatile storage is combined with the IKE initiator and responder SPIs using a hash: TOKEN_SECRET_DATA = HASH(QCD_SECRET | SPI-I | SPI-R). Up to 3 previous generations of QCD_SECRET may be retained for key rollover.'
section: "5.1"
topics:
    - ipsec
    - crypto
