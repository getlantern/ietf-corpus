document: rfc-2156
kind: normative-requirement
summary: Keyword matching of OR Address attribute keys (C, ADMD, PRMD, O, OU, CN, DD, etc.) shall be performed in a case-independent manner. Alternative keywords from X.400(1992) (e.g., A for ADMD, P for PRMD, DDA for DD, E.164 for NET-NUM) shall be recognized on input but shall not be generated on output.
section: 4.1.3
rfc2119_level: MUST
topics:
    - email
