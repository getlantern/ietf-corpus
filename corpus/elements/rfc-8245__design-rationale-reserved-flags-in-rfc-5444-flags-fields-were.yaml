document: rfc-8245
kind: design-rationale
summary: RESERVED flags in RFC 5444 flags fields were proposed during development to specify forwarding behavior, but were rejected because message forwarding is protocol-specific (e.g., OLSRv2 uses MPR-based forwarding rather than blind flooding), so structural flags must remain purely structural.
section: "5"
topics:
