document: rfc-2136
kind: security-consideration
summary: Without RFC 2137 (Secure DNS Update) or equivalent technology such as IPsec, anyone who can reach an authoritative name server can alter the contents of any zone on that server. It is very strongly recommended that DNS UPDATE not be deployed without such security measures.
section: "8.1"
topics:
    - dns
    - security
