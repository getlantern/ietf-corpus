document: rfc-8587
kind: design-rationale
summary: A set of network access paths with server-trunkable addresses and the same root-relative file system pathname is treated as a single replica with multiple network access paths in this document, differing from the older RFC 7530 and RFC 7931 approach where each replica was identified by a single network access path.
