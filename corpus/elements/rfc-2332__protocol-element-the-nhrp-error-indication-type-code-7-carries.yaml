document: rfc-2332
kind: protocol-element
summary: 'The NHRP Error Indication (type code 7) carries: Src Proto Len, Dst Proto Len, Error Code (16-bit), Error Offset (16-bit from start of fixed header), source NBMA address and subaddress, source and destination protocol addresses, and the contents of the offending NHRP packet. Defined error codes include 1 (Unrecognized Extension), 3 (Loop Detected), 6 (Protocol Address Unreachable), 7 (Protocol Error), 8 (SDU Size Exceeded), 9 (Invalid Extension), 10 (Invalid Resolution Reply), 11 (Authentication Failure), 15 (Hop Count Exceeded).'
section: 5.2.7
topics:
