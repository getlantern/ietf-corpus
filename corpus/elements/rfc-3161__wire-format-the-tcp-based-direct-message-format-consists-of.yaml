document: rfc-3161
kind: wire-format
summary: 'The TCP-based direct message format consists of a 32-bit length (network byte order, counting flag + value octets), an 8-bit flag, and a value field. Flag values: tsaMsg(0x00), pollRep(0x01), pollReq(0x02), negPollRep(0x03), partialMsgRep(0x04), finalMsgRep(0x05), errorMsgRep(0x06).'
