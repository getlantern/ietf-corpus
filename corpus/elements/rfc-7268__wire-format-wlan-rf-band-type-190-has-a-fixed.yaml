document: rfc-7268
kind: wire-format
summary: WLAN-RF-Band (Type 190) has a fixed Length of 6 (Type + Length + 4-octet Value). The three most significant octets MUST be set to zero by the sender; the least significant octet carries the RF Band field using values from IEEE 802.11ad Table 8-53a Band ID field.
section: "2.18"
