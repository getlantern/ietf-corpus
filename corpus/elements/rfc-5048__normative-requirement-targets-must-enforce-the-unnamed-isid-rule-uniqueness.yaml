document: rfc-5048
kind: normative-requirement
summary: 'Targets MUST enforce the UNNAMED ISID RULE: uniqueness of the 4-tuple <InitiatorName, ISID, NULL, TargetAddress> for Unnamed Discovery sessions. A new session with a matching tuple MUST reinstate the existing Unnamed Discovery session.'
section: 5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
