document: rfc-8582
kind: protocol-element
summary: 'Priority treatment extends the leaky bucket with two thresholds TAU1 < TAU2: all requests are admitted when X <= TAU1, only higher-priority requests when TAU1 < X <= TAU2, and all requests are rejected when X > TAU2. This generalizes to n priorities with n thresholds.'
section: 8.3.2
topics:
