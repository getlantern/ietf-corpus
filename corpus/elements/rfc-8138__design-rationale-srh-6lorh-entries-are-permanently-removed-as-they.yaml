document: rfc-8138
kind: design-rationale
summary: SRH-6LoRH entries are permanently removed as they are consumed rather than preserved as in standard IPv6 Routing Headers. Smaller frames reduce energy expenditure and improve transmission success on lossy LLN media. Reversing an RH is not useful in current RPL specifications, L2 security protects the path better than an Authentication Header, and RFC 2460 discourages RH reversal without authentication.
section: "5.3"
topics:
    - ip
    - routing
