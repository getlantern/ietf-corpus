document: rfc-6505
kind: interoperability-note
summary: This package is built on the Media Control Channel Framework (RFC 6230) and requires support for the framework's common XML schema (Appendix A.1 of RFC 6230), including 'connectionid' and 'conferenceid' attribute definitions. Framework-level error codes (400 invalid XML, 500 not understood) are distinct from package-level response codes.
