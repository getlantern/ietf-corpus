document: rfc-2686
kind: protocol-element
summary: Prefix elision associates a class number with a common byte prefix (e.g., a protocol identifier) that is stripped from every packet of that class before transmission and implicitly prepended after reassembly, reducing per-fragment overhead without replacing header or data compression.
