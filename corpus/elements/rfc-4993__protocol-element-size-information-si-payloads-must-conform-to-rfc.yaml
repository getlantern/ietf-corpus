document: rfc-4993
kind: protocol-element
summary: Size information ('si') payloads MUST conform to RFC 4991 XML and use <size> as root. Octet counts represent the total UDP packet length (UDP header + payload descriptor + XML payload). Servers send this when they cannot satisfy the client's requested maximum response length.
section: 3.1.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
