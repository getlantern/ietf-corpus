document: rfc-8741
kind: state-machine
summary: 'Normal delegation flow: PCC sets D flag to 1 in PCRpt to delegate; PCE confirms by setting D flag to 1 in PCUpd. PCC revokes by setting D flag to 0 in PCRpt; PCE relinquishes by setting D flag to 0 in PCUpd. PCE requests new control by setting C flag to 1 in PCUpd; PCC grants or denies by responding with D flag set to 1 or 0 in PCRpt.'
