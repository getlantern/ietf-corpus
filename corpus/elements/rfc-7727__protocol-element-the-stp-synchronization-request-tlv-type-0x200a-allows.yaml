document: rfc-7727
kind: protocol-element
summary: The STP Synchronization Request TLV (Type=0x200A) allows a PE device to request retransmission of configuration or state data from its peer. It includes a 2-octet Request Number (non-zero), C-bit (config request), S-bit (state request), 14-bit Request Type, and an InstanceID List.
section: "3.5"
topics:
