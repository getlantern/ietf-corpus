document: rfc-8887
kind: design-rationale
summary: WebSocket JMAP optionally supports per-message compression (RFC 7692). HTTP request compression has very low deployment and is not viable for JMAP over HTTP, making WebSocket a better substrate for compressed requests.
section: "1"
topics:
