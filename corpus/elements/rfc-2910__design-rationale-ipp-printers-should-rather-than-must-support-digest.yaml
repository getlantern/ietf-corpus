document: rfc-2910
kind: design-rationale
summary: IPP Printers SHOULD (rather than MUST) support Digest Authentication because low-end devices with limited ROM space may not need client authentication and forcing such devices to implement security to claim conformance would not make business sense and could stall adoption of the standard.
section: 8.1.1
topics:
    - security
