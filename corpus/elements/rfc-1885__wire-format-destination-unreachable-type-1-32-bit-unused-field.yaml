document: rfc-1885
kind: wire-format
summary: 'Destination Unreachable (Type 1): 32-bit unused field (zeroed), followed by as much of the invoking packet as fits within the 576-octet limit. Code values: 0=no route, 1=administratively prohibited, 2=not a neighbor (strict routing), 3=address unreachable, 4=port unreachable.'
