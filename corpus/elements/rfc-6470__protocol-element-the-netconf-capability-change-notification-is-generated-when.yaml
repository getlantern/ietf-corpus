document: rfc-6470
kind: protocol-element
summary: 'The ''netconf-capability-change'' notification is generated when server capabilities change. It carries changed-by-parms and three leaf-lists of URI type: ''added-capability'', ''deleted-capability'', and ''modified-capability'' (a modified capability has the same base URI but changed parameters; the full new URI is returned).'
section: "2.2"
topics:
    - netconf
    - yang
