document: rfc-6511
kind: normative-requirement
summary: When signaling a P2MP LSP where per-leaf responses to the OOB mapping flag are needed, the source node MUST use a separate Path message for each leaf in networks where RFC 6510 is not supported; with RFC 6510 deployed, single or multiple leaves per Path message MAY be used.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
