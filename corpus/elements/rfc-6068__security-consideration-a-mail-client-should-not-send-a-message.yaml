document: rfc-6068
kind: security-consideration
summary: A mail client SHOULD NOT send a message based on a 'mailto' URI without first disclosing and showing to the user the full message (including all header fields), fully decoded, and asking for user approval. The client SHOULD also make clear that an email will be sent.
section: "7"
rfc2119_level: SHOULD NOT
topics:
    - email
    - security
