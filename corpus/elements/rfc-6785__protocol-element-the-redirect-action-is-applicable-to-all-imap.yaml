document: rfc-6785
kind: protocol-element
summary: The 'redirect' action is applicable to all IMAP event cases. For messages lacking header or envelope information (e.g., APPENDed drafts), the Sieve engine must supply missing information and use message submission (RFC 6409); the MAIL FROM SHOULD be set to the mailbox owner's address.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - email
