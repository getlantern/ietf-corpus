document: rfc-6584
kind: protocol-element
summary: The ASID (Authentication Scheme IDentifier) is a 4-bit field present in every HET=1 (EXT_AUTH) header extension. It enables a receiver to determine which authentication scheme and format applies to a given packet, allowing multiple schemes to coexist in the same ALC or NORM session. The association between ASID value and scheme is communicated out-of-band at session startup.
section: "2"
topics:
    - security
    - multicast
