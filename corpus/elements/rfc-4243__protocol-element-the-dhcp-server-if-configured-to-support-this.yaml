document: rfc-4243
kind: protocol-element
summary: The DHCP server, if configured to support this suboption, may use the vendor-specific information—along with other relay agent option data and client options—to assign an IP address and/or configuration parameters to the client. No special additional processing is required beyond standard relay agent option handling.
