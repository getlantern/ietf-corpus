document: rfc-3986
kind: wire-format
summary: 'A URI scheme name must begin with a letter and be followed by any combination of letters, digits, plus (+), period (.), or hyphen (-). ABNF: scheme = ALPHA *( ALPHA / DIGIT / "+" / "-" / "." ). The canonical form is lowercase.'
