document: rfc-5462
kind: design-rationale
summary: The three-bit field in the MPLS label stack entry was originally named 'EXP' (experimental use) in RFC 3032 because the exact use as a Class of Service field was not agreed upon at publication time. The 'experimental use' designation led other SDOs and implementors to assume the field could be used for arbitrary purposes, necessitating the rename.
section: "1"
topics:
