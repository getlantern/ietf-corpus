document: rfc-9244
kind: normative-requirement
summary: When generating telemetry data, the DOTS agent MUST auto-scale so that the appropriate unit is used — specifically, the largest unit within a given unit class that yields a value greater than one. Only one unit per unit class is allowed in a telemetry message.
section: "7.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
