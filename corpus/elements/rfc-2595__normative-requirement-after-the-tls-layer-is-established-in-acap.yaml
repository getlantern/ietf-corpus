document: rfc-2595
kind: normative-requirement
summary: After the TLS layer is established in ACAP, the server MUST re-issue an untagged ACAP greeting and the client MUST discard cached capability information and replace it with the information from the new ACAP greeting.
section: "5.1"
rfc2119_level: MUST
topics:
