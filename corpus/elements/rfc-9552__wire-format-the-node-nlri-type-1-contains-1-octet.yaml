summary: 'The Node NLRI (Type=1) contains: 1-octet Protocol-ID, 8-octet Identifier (BGP-LS Instance-ID), and variable-length Local Node Descriptors TLV (Type 256). The Link NLRI (Type=2) additionally includes Remote Node Descriptors TLV (Type 257) and Link Descriptors TLVs.'
