document: rfc-1970
kind: security-consideration
summary: Nodes that change their link-layer address can multicast unsolicited Neighbor Advertisements to notify neighbors quickly; however, this mechanism is unreliable and not authenticated. The Neighbor Unreachability Detection algorithm provides the authoritative, if slower, resolution.
