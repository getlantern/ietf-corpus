document: rfc-7641
kind: interoperability-note
summary: The Observe Option is not part of the Cache-Key, so a cacheable response obtained with or without an Observe Option in the request can satisfy the other type of request. A stored response carrying an Observe Option MUST have the option stripped before being returned in reply to a normal GET.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
