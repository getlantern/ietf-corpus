summary: 'The PCInitiate message format is: <Common Header> followed by one or more <PCE-initiated-lsp-request> entries. An instantiation request contains <SRP> <LSP> [<END-POINTS>] <ERO> [<attribute-list>]; a deletion request contains only <SRP> <LSP>.'
