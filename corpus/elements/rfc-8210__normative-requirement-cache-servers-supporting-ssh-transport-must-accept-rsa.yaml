document: rfc-8210
kind: normative-requirement
summary: Cache servers supporting SSH transport MUST accept RSA authentication and SHOULD accept ECDSA. User authentication MUST be supported; host authentication MAY be supported. Client routers SHOULD verify the cache's public key to avoid MITM attacks. The protocol runs as an SSH subsystem named 'rpki-rtr'.
section: "9.1"
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
