document: rfc-6733
kind: registry
summary: 'IANA assigns Diameter Application IDs in a flat, unversioned space. Pre-assigned values include: Diameter common message (0), Diameter base accounting (3), and Relay (0xffffffff). Each Diameter application specification MUST have an IANA-assigned Application ID; there is no version relationship between applications sharing the same ID space.'
section: "2.4"
topics:
    - diameter
    - registry
