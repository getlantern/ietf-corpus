document: rfc-4037
kind: normative-requirement
summary: An OCP agent MUST forcefully terminate any OCP connection, negotiation, transaction, or other operation that is not making progress, covering both deadlock and livelock situations. Agents MAY rely on transport-level or external timeouts if guaranteed to trigger for a given OCP operation.
section: "2.7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
