document: rfc-4051
kind: normative-requirement
summary: For RSA-MD5, the value input to the signature function MUST contain a pre-pended algorithm object identifier for the hash function per EMSA-PKCS1-V1_5-ENCODE. The FF octet MUST be repeated enough times that the quantity being encrypted is exactly one octet shorter than the RSA modulus.
section: 2.3.1
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
