document: rfc-5222
kind: normative-requirement
summary: There MUST NOT be more than one <location> element for each distinct location profile in a <findService> request. The server uses the first location element whose profile it understands and ignores the others.
section: 8.3.1
rfc2119_level: MUST NOT
topics:
    - realtime
