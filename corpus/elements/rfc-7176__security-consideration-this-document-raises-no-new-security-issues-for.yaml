document: rfc-7176
kind: security-consideration
summary: This document raises no new security issues for IS-IS beyond those in the TRILL base protocol (RFC 6325). IS-IS authentication per RFC 5304 and RFC 5310 may be used to secure the IS-IS messages defined here. However, even with authentication, replays of Hello packets can create denial-of-service conditions (see RFC 6039), similar to those discussed in RFC 6325 Section 6.2.
section: "6"
topics:
    - security
    - routing
