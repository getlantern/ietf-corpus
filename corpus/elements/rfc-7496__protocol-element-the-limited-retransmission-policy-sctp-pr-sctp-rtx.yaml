document: rfc-7496
kind: protocol-element
summary: The Limited Retransmission Policy (SCTP_PR_SCTP_RTX) allows a sender to specify an upper limit on the number of retransmissions for each DATA chunk of a user message. It includes both fast and timer-based retransmissions in that count.
section: "3.1"
topics:
