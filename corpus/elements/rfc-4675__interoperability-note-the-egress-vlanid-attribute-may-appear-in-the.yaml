document: rfc-4675
kind: interoperability-note
summary: The Egress-VLANID attribute MAY appear in the same RADIUS packet as RFC 3580 tunnel attributes; however, the Egress-VLANID attribute is not necessary when it would configure the same untagged VLANID already set by the tunnel attributes.
section: "2.1"
topics:
