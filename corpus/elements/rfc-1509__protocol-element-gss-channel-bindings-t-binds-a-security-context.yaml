document: rfc-1509
kind: protocol-element
summary: gss_channel_bindings_t binds a security context to a communications channel. The structure holds initiator_addrtype, initiator_address, acceptor_addrtype, acceptor_address, and application_data fields. The mechanism signs the concatenation of these fields and binds the signature to the context-establishment token emitted by gss_init_sec_context.
section: 2.1.11
topics:
    - security
    - crypto
