document: rfc-8143
kind: design-rationale
summary: The mandatory-to-implement RC4 cipher suite (TLS_RSA_WITH_RC4_128_MD5) required by RFC 4642 for interoperability is removed because RC4 is now prohibited by RFC 7465; implementations must instead follow BCP195 cipher suite guidance.
