document: rfc-7345
kind: interoperability-note
summary: The DTLS record layer 'application_data' packet carries no indicator of whether it holds UDPTL or another protocol; therefore, a dedicated DTLS association per UDPTL stream must be negotiated explicitly via SDP before media can flow.
