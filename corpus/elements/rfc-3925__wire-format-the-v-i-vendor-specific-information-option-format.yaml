document: rfc-3925
kind: wire-format
summary: 'The V-I Vendor-Specific Information option format: 1-octet option-code (125), 1-octet option-len, then one or more repetitions of 4-octet enterprise-number, 1-octet data-len, and variable-length option-data. Encapsulated option-data is encoded as code/length/value sub-options with 1-octet subopt-code and 1-octet subopt-len.'
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
