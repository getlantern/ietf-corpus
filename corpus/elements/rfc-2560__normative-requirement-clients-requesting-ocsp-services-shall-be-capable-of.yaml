document: rfc-2560
kind: normative-requirement
summary: Clients requesting OCSP services SHALL be capable of processing responses signed with DSA keys as specified in RFC 2459 section 7.2.2. Clients SHOULD also be capable of processing RSA signatures. OCSP responders SHALL support the SHA1 hashing algorithm.
section: "4.3"
rfc2119_level: SHALL
topics:
    - pkix
    - crypto
