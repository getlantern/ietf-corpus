document: rfc-1323
kind: state-machine
summary: 'PAWS algorithm R1–R5 defines processing of all arriving segments on a synchronized connection: (R1) reject if SEG.TSval < TS.Recent and TS.Recent valid; (R2) reject if outside window; (R3) update TS.Recent if SEG.SEQ <= Last.ACK.sent; (R4) accept if in-sequence; (R5) queue as out-of-sequence. Timestamp is checked only on initial arrival, not on deferred delivery.'
section: 4.2.1
topics:
    - tcp
    - security
