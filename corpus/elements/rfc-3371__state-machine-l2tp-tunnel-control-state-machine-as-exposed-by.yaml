kind: state-machine
summary: 'L2TP tunnel control state machine as exposed by l2tpTunnelStatsState: tunnelIdle(1) → tunnelConnecting(2) → tunnelEstablished(3) → tunnelDisconnecting(4). Setting ifAdminStatus to ''up'' injects a ''Local Open'' request and ''down'' injects a ''Tunnel Close'' event into the tunnel FSM.'
