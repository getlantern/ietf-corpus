document: rfc-8724
kind: design-rationale
summary: SCHC uses a static Context shared by both ends to avoid resynchronization traffic. In LPWANs the return path may be restricted, expensive, or entirely unavailable; a compression protocol depending on feedback is incompatible with these constraints. The static approach also exploits the high predictability of LPWAN application traffic.
section: "1"
topics:
