document: rfc-5655
kind: interoperability-note
summary: IPFIX Files containing enterprise-specific Information Elements are not fully self-describing unless those IEs are additionally described via the Information Element Type Options Template (RFC 5610). A File Reader encountering unknown enterprise IEs can only treat them as opaque octet arrays.
section: "5.2"
topics:
    - measurement
