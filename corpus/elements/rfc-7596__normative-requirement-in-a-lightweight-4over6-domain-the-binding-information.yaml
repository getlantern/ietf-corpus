document: rfc-7596
kind: normative-requirement
summary: In a Lightweight 4over6 domain, the binding information MUST be synchronized across the lwB4s, the lwAFTRs, and the provisioning server. It is RECOMMENDED that operators use a single provisioning mechanism to prevent interworking complexity.
section: "7"
rfc2119_level: MUST
