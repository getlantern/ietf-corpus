document: rfc-9181
kind: protocol-element
summary: 'The ''route-distinguisher'' grouping provides a YANG choice among five RD assignment modes: directly-assigned (explicit rt-types:route-distinguisher), directly-assigned-suffix (explicit uint16 Assigned Number subfield), auto-assigned (from named pool or full-auto, with read-only auto-assigned-rd leaf), auto-assigned-suffix (auto Assigned Number only, read-only auto-assigned-rd-suffix uint16), and no-rd (empty leaf).'
section: "3"
topics:
    - yang
    - vpn
    - bgp
