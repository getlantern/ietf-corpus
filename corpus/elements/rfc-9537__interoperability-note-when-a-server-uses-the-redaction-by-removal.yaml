document: rfc-9537
kind: interoperability-note
summary: When a server uses the Redaction by Removal or Replacement Value Methods, the JSONPath expression in "prePath" will not resolve successfully against the redacted response. Clients MUST key off the "name" member for display logic rather than attempting to evaluate "prePath" against the response.
section: "5.1"
topics:
    - json
