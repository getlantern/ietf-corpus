document: rfc-4342
kind: interoperability-note
summary: All currently defined CCID 3-specific options (Loss Event Rate, Loss Intervals, Receive Rate) MUST be ignored when they appear on DCCP-Data packets. Loss Intervals options MUST NOT be sent on packets without an Acknowledgement Number.
