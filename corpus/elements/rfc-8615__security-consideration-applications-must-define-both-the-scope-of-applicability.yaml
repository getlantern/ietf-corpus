document: rfc-8615
kind: security-consideration
summary: Applications must define both the scope of applicability and how to discover well-known URIs; undefined scope can cause implementation deviations and confusion. Using a well-known URI to bootstrap a separate service (e.g., finding email policy via HTTPS) can trigger floods of requests resembling DoS attacks.
section: "4.3"
topics:
    - security
    - http
