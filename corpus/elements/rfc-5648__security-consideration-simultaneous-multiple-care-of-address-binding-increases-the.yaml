document: rfc-5648
kind: security-consideration
summary: Simultaneous multiple care-of address binding increases the risk of redirection attacks. A malicious mobile node can bind multiple victims' addresses as valid care-of addresses, then instruct the home agent to tunnel large traffic flows to those addresses. Unlike single-CoA MIPv6, the attacker can retain a valid care-of address for control while redirecting traffic to victims.
section: "10"
topics:
    - mobility
    - ip
    - security
