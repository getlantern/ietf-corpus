document: rfc-8838
kind: protocol-element
summary: A Generation is defined as all candidates conveyed within an ICE session correlated with a particular Username Fragment and Password combination. The generation concept is used to correlate trickled candidates and end-of-candidates indications with a specific ICE session, enabling detection of stale updates from a previous session after an ICE restart.
