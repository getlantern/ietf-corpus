document: rfc-7324
kind: normative-requirement
summary: 'When a Protection Type (PT) mismatch occurs, nodes MUST converge using a defined priority: UP > BS > BP. The lower-priority node MUST switch to the higher-priority mode if that mode is supported; for example, a node transmitting BP in a {BP, UP} mismatch MUST switch to UP mode if supported.'
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
