document: rfc-9628
kind: normative-requirement
summary: The D bit MUST be set to one if and only if the current spatial-layer SID frame depends on the spatial-layer SID-1 frame of the same picture; otherwise it MUST be zero. For the base-layer frame (SID=0), D MUST be zero.
section: "4.2"
rfc2119_level: MUST
topics:
