document: rfc-8970
kind: normative-requirement
summary: A server MUST NOT return NIL to a FETCH PREVIEW request made without the LAZY modifier. NIL is only permitted as a response when the LAZY modifier is used and preview generation would cause undue delay.
section: "3.2"
rfc2119_level: MUST NOT
topics:
