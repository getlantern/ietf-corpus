document: rfc-8334
kind: design-rationale
summary: The <launch:claimKey> is used as the lookup key to the CNIS instead of the domain name itself, to securely query the service without exposing a well-known value like a domain name that could be observed or enumerated by third parties.
section: 3.1.1
topics:
