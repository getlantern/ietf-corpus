document: rfc-6549
kind: design-rationale
summary: Earlier drafts considered drastic mechanisms to prevent legacy OSPFv2 routers from receiving multicast OSPFv2 packets with non-zero Instance IDs. These were removed because implementers confirmed that authentication-mismatch log dampening would make the spurious-log problem manageable in practice.
section: "6"
topics:
