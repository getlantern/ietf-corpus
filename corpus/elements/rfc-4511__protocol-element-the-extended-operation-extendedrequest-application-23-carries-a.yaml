summary: The Extended operation (ExtendedRequest APPLICATION 23) carries a requestName LDAPOID and optional requestValue OCTET STRING. ExtendedResponse (APPLICATION 24) includes LDAPResult components plus optional responseName [10] LDAPOID and responseValue [11] OCTET STRING. Recognized extensions are listed in the root DSE 'supportedExtension' attribute.
