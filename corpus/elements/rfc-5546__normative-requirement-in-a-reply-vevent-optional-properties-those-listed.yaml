document: rfc-5546
kind: normative-requirement
summary: In a REPLY VEVENT, optional properties (those listed as 0+ or 0 or 1) MUST NOT be changed from those of the original REQUEST; if property changes are desired, the COUNTER method must be used instead. Exactly one ATTENDEE (the replying Attendee) must be present.
section: 3.2.3
rfc2119_level: MUST NOT
topics:
    - email
