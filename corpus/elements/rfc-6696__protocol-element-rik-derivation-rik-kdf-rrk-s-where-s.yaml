document: rfc-6696
kind: protocol-element
summary: 'rIK derivation: rIK = KDF(rRK, S) where S includes the label ''Re-authentication Integrity Key@ietf.org'', ''\0'', an 8-bit cryptosuite identifier, and length. The cryptosuite and length are included as KDF inputs to ensure cryptographic separation when multiple rIKs of different lengths are derived from the same rRK.'
section: "4.3"
topics:
