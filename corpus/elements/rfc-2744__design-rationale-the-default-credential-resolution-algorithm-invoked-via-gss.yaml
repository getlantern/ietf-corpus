document: rfc-2744
kind: design-rationale
summary: The default credential resolution algorithm (invoked via GSS_C_NO_CREDENTIAL) is designed to allow security contexts to be established using default behavior wherever possible, making applications more portable across mechanisms and platforms than those that explicitly call gss_acquire_cred().
section: "3.5"
topics:
