kind: design-rationale
summary: 'QUIC version 2''s primary purpose is to combat ossification: middleboxes that assume long headers always encode version 1, or that the version 1 Initial key derivation is version-invariant, will not correctly process version 2 packets, forcing them to handle QUIC generically.'
