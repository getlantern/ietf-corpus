document: rfc-9741
kind: design-rationale
summary: 'The base-encoding operators are intentionally opinionated: base64url with padding and base32(hex) with padding are excluded because experience shows these combinations only occur in error. Adding ''c'' in .b64c ensures a deliberate choice for classic base64.'
