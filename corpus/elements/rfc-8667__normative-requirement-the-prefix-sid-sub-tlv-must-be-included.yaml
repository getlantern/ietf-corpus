document: rfc-8667
kind: normative-requirement
summary: The Prefix-SID sub-TLV MUST be included when the associated Prefix Reachability TLV is propagated across IS-IS level boundaries. The Level-1-2 router maintains the content (flags and SID) except as specified for N-Flag, R-Flag, P-Flag, and E-Flag handling.
section: 2.1.2
rfc2119_level: MUST
topics:
