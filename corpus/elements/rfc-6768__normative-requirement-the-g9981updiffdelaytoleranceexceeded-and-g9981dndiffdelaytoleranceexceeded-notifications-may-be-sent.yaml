document: rfc-6768
kind: normative-requirement
summary: The g9981UpDiffDelayToleranceExceeded and g9981DnDiffDelayToleranceExceeded notifications MAY be sent for GBS-C ports when the port is 'up', on crossing events in both directions; generation is controlled by g9981PortConfDiffDelayToleranceExceededEnable. These notifications are not applicable to GBS-R ports.
section: "6"
rfc2119_level: MAY
topics:
    - snmp
