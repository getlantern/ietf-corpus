document: rfc-8563
kind: state-machine
summary: The MultipointClient session state machine is the same as for MultipointHead (administratively driven transitions only). MultipointClient sessions SHOULD be destroyed when the MultipointHead session enters Down/AdminDown state. Sessions MAY be destroyed or maintained with a Poll Sequence upon receipt of unsolicited Down/AdminDown from a tail.
section: "6.5"
topics:
    - routing
    - multicast
