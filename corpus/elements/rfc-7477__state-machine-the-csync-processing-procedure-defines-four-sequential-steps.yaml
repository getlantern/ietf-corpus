document: rfc-7477
kind: state-machine
summary: 'The CSYNC processing procedure defines four sequential steps: (1) query child zone''s SOA, (2) query child zone''s CSYNC record, (3) query data records per Type Bit Map, (4) re-query SOA records. If SOA serials differ between steps, the operation is aborted; if they match and pass soaminimum checks, records are updated in the parent zone.'
section: "3.1"
topics:
    - dns
