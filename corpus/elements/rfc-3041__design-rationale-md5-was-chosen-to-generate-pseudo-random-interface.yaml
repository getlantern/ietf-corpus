document: rfc-3041
kind: design-rationale
summary: MD5 was chosen to generate pseudo-random interface identifiers because IPv6 nodes are already required to implement MD5 as part of IPsec, so the code will already be present. MD5's properties were deemed adequate to produce the desired level of randomization without requiring additional cryptographic infrastructure.
section: 3.2.1
topics:
    - crypto
    - ip
    - privacy
