document: rfc-2822
kind: protocol-element
summary: Header folding allows a long field body to be split across multiple lines by inserting CRLF before any whitespace (WSP). Unfolding reverses this by removing any CRLF immediately followed by WSP before further parsing.
section: 2.2.3
