document: rfc-9646
kind: normative-requirement
summary: The 'key-generation' node in the 'csr-request' response MUST only appear if the ZTP-client's 'csr-support' included the 'key-generation' node. The selected algorithm MUST be one of the algorithms specified in the client's 'supported-algorithms' node.
section: "3.2"
rfc2119_level: MUST
topics:
    - netconf
    - pkix
    - yang
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
