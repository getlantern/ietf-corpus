document: rfc-8279
kind: normative-requirement
summary: 'When a packet is forwarded to a BFR-NBR connected via multiple parallel interfaces, any entropy field in the BIER encapsulation SHOULD be respected: two packets with the same entropy value SHOULD be sent on the same interface. Packets of a given flow SHOULD NOT be split among multiple ECMP paths.'
section: "6.5"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
