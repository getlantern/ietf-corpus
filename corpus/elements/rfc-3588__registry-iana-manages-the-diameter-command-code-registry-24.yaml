document: rfc-3588
kind: registry
summary: IANA manages the Diameter Command Code registry (24-bit space); new codes can only be created by IETF Consensus. Values 16,777,214–16,777,215 (0xFFFFFE–0xFFFFFF) are reserved for experimental use. Base protocol defines codes 257 (CER/CEA), 258 (RAR/RAA), 271 (ACR/ACA), 274 (ASR/ASA), 275 (STR/STA), 280 (DWR/DWA), 282 (DPR/DPA).
section: 11.2.1
topics:
