document: rfc-2592
kind: normative-requirement
summary: Attempts to destroy or set notInService a smScriptTable row while the associated script is executing MUST fail with inconsistentValue. Similarly, destroying or setting notInService rows whose smScriptStorageType is 'permanent' or 'readOnly' MUST fail with inconsistentValue.
section: "6"
rfc2119_level: MUST
topics:
    - snmp
