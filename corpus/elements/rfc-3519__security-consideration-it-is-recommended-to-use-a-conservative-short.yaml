document: rfc-3519
kind: security-consideration
summary: It is RECOMMENDED to use a conservative (short) mobility binding lifetime when using NAT traversal (suggested maximum 60 seconds) to limit the duration of any redirection attack. IPsec is recommended for protecting user data confidentiality on insecure intermediate networks, but does not prevent the redirection attacks inherent to this mechanism.
section: "6"
rfc2119_level: RECOMMENDED
topics:
    - nat
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
