document: rfc-4217
kind: protocol-element
summary: Reply code '521' ('data connection cannot be opened with this PROT setting') is used when a data transfer command (STOR, RETR, NLST, LIST, STOU, APPE) is rejected due to an incorrect PROT level. Reply code '522' indicates that TLS negotiation on the data connection failed or was unacceptable after the '150' was already issued.
section: "10.2"
topics:
    - tls
