document: rfc-5675
kind: wire-format
summary: 'The SNMP-SD-ELEMENT ABNF defines varbind encoding: varbind names use ''vN='' (OID in dotted notation), optional labels use ''lN='', and values use type-specific prefixes (oN=OID, xN=hex OCTET STRING, cN=Counter32, CN=Counter64, uN=Unsigned32, dN=INTEGER, iN=IpAddress, pN=Opaque, tN=TimeTicks, nN=NULL). N is the 1-based position in the varbind list.'
section: "3.2"
topics:
