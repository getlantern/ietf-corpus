document: rfc-9525
kind: normative-requirement
summary: When matching DNS domain names, comparison MUST be performed using case-insensitive ASCII comparison of each label. For internationalized domain names, the client MUST convert U-labels to A-labels before comparison, and A-labels MUST be compared as case-insensitive ASCII.
section: "6.3"
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
