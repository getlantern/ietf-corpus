document: rfc-8534
kind: normative-requirement
summary: If multiple Leaf A-D routes are originated in response to a single S-PMSI A-D route and that S-PMSI A-D route is withdrawn, all corresponding Leaf A-D routes MUST also be withdrawn. A Leaf A-D route must also be withdrawn if the egress node changes its UMH for the tracked flow or no longer needs to receive it.
section: "5.2"
rfc2119_level: MUST
topics:
    - multicast
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
