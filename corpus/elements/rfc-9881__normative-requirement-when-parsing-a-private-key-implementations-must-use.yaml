document: rfc-9881
kind: normative-requirement
summary: 'When parsing a private key, implementations MUST use the ASN.1 tag to determine which CHOICE variant is present: context-specific IMPLICIT [0] (0x80) for seed, OCTET STRING (0x04) for expandedKey, and SEQUENCE (0x30) for both, rather than length-based heuristics.'
section: "6"
rfc2119_level: MUST
topics:
