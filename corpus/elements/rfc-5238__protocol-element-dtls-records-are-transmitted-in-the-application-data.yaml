document: rfc-5238
kind: protocol-element
summary: DTLS records are transmitted in the Application Data fields of DCCP-Data and DCCP-DataAck packets. Multiple DTLS records MAY be sent in one DCCP-Data packet as long as the resulting packet is within the PMTU currently in force.
