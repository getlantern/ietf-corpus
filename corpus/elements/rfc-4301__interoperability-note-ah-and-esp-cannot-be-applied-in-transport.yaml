document: rfc-4301
kind: interoperability-note
summary: AH and ESP cannot be applied in transport mode to IPv4 fragments; only tunnel mode can be used for fragmented IPv4 packets. For simplicity, the same restriction applies to IPv6, even though IPv6 would technically permit carrying a plaintext fragment on a transport mode SA.
section: "4.1"
topics:
    - ipsec
    - ip
