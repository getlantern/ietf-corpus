document: rfc-8630
kind: design-rationale
summary: Because the public key in the TAL and the TA must be stable, this motivates operating the TA CA in offline mode. A subordinate CA with the same INRs can be issued for online operations, keeping the TA private key offline and limiting exposure of the more vulnerable online key.
