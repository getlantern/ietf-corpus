document: rfc-8622
kind: design-rationale
summary: 'The LE PHB''s ''no harm'' property — that it does not consume resources from other PHBs and may be preempted completely — enables use as a security tool: untrusted external traffic or multicast from untrusted sources can be marked LE so that attackers cannot preempt internal (non-LE) traffic by flooding, and such traffic cannot harm non-LE behavior aggregates.'
section: "3"
topics:
