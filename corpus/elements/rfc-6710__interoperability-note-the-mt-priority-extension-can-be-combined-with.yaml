document: rfc-6710
kind: interoperability-note
summary: The MT-PRIORITY extension can be combined with the DELIVERBY SMTP extension (RFC 2852), and clients using both can specify smaller DELIVERBY timeouts for higher-priority messages. However, use of DELIVERBY alone does not guarantee priority processing.
section: "5.2"
topics:
