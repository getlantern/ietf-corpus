document: rfc-8360
kind: design-rationale
summary: Operators MAY issue separate ROAs for each IP address prefix and separate BGPsec Router Certificates for each ASN so that loss of one resource from a certificate's VRS does not invalidate authorizations for other resources. This granularity is explicitly recommended as a mitigation strategy.
section: 4.2.5
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
