document: rfc-1583
kind: normative-requirement
summary: All OSPF implementations must be capable of calculating routes based on IP Type of Service. However, routers may be configured to route all packets on the TOS 0 path, eliminating non-zero TOS path calculations to conserve routing table space and processing resources.
section: "2.4"
rfc2119_level: MUST
topics:
    - routing
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
