document: rfc-5536
kind: design-rationale
summary: Comments are prohibited in the Control, Distribution, Followup-To, Lines, Message-ID, Newsgroups, Path, Supersedes, and Xref header fields because news servers often need to process these fields very rapidly, and comment support would add parsing overhead that harms performance.
section: "3"
extracted_by: claude-sonnet-4-6
