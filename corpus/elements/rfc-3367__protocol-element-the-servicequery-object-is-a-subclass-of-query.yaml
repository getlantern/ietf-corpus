document: rfc-3367
kind: protocol-element
summary: The ServiceQuery object is a subclass of Query that supports dynamic discovery of a CNRP service's capabilities. Its response includes the Service object with property schema, service schema, query schema, and resourcedescriptor schema; returning the Service with serviceuri alone constitutes minimal compliant implementation.
section: 4.2.6
