document: rfc-6605
kind: design-rationale
summary: This document does not define NSEC3-specific algorithm aliases (as RFC 5155 did for older algorithms) because that mechanism was solely to protect pre-RFC-5155 implementations from unknown record types — a concern that does not apply to newly defined algorithms.
