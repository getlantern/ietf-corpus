document: rfc-5034
kind: interoperability-note
summary: The list of available SASL mechanisms MAY change after a successful STLS command. However, implementations MUST continue to include the SASL capability in CAPA responses even after a successful AUTH command has been completed, even though no further AUTH commands may be issued.
