document: rfc-6826
kind: design-rationale
summary: In-band signaling carries the multicast tree identity ((S,G) or (*,G)) in the 'opaque value' field of the mLDP FEC Element, avoiding a separate out-of-band mapping protocol. PIM control messages are sent periodically outside the MPLS domain, but mLDP messages are not repeated periodically.
section: "1"
topics:
    - mpls
    - multicast
    - routing
