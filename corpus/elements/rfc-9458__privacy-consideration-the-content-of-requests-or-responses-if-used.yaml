document: rfc-9458
kind: privacy-consideration
summary: The content of requests or responses, if used in forming new requests, can be used to correlate those requests. Cookies, authentication credentials, and any information that affects subsequent request formulation (including resource identities) can all compromise privacy even when transport-layer linkability is removed.
section: "7"
topics:
    - privacy
    - http
