document: rfc-4306
kind: wire-format
summary: The SA payload uses a hierarchical Proposal/Protocol/Transform/Attribute structure. Each Proposal contains one or more Protocols; each Protocol contains one or more Transforms with a Transform Type field; each Transform contains zero or more Attributes. The responder MUST choose exactly one transform of each type included in the accepted proposal.
section: "3.3"
topics:
