document: rfc-2686
kind: design-rationale
summary: The multi-class extension reuses previously unused bits in the existing PPP Multilink header (2 bits in the short sequence number format, 6 in the long format) as a class number, allowing multiple independent multilink instances without changing the PID or requiring a new protocol.
