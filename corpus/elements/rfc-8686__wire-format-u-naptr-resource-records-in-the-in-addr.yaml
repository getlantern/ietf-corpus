document: rfc-8686
kind: wire-format
summary: U-NAPTR resource records in the 'in-addr.arpa.' or 'ip6.arpa.' trees carry the service parameter 'ALTO:https' and a regexp field mapping the domain name to an ALTO IRD URI, e.g., '!.*!https://alto1.example.net/ird!'. Order and preference fields indicate relative priority.
section: "3.4"
