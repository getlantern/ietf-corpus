document: rfc-9577
kind: protocol-element
summary: The AuthenticatorInput structure used for token verification consists of token_type (2 octets), nonce (32 octets), challenge_digest (32 octets), and token_key_id (Nid octets). The authenticator in the Token structure is computed over these fields using the issuance protocol corresponding to the token type.
