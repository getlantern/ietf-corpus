kind: protocol-element
summary: pcelsCompoundConditionAuxClass and pcelsCompoundFilterConditionAuxClass are auxiliary classes derived from pcimConditionAuxClass enabling grouping of multiple conditions with a ConditionListType (disjunctive or conjunctive). pcelsCompoundFilterConditionAuxClass further specializes for filter-based conditions.
