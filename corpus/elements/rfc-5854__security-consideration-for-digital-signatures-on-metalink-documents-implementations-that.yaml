document: rfc-5854
kind: security-consideration
summary: For digital signatures on Metalink Documents, implementations that support signing or verifying SHOULD implement RSA with a minimum key size of 2048 bits with SHA-256. Metalink Processors MUST reject Metalink Documents with invalid signatures but MUST NOT reject a document solely because they cannot verify its signature.
section: "7.1"
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
