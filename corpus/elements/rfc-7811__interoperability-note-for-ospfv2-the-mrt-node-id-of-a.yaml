document: rfc-7811
kind: interoperability-note
summary: For OSPFv2, the mrt_node_id of a neighbor is the 4-octet Neighbor Router ID in the Link ID field of the corresponding point-to-point link in the Router-LSA, and the interface metric is the 2-octet Metric field for that link. For OSPFv3, the mrt_node_id is the 4-octet Neighbor Router ID field in the Router-LSA.
section: "5.1"
