document: rfc-735
kind: protocol-element
summary: The PLEASE CANCEL subcommand (IAC SB BM <PLEASE CANCEL> <macro byte> <REASON> IAC SE) allows the receiver of a defined macro byte to request the sender cancel its definition. The sender should (but is not required to) respond by redefining the macro byte to expand into itself.
section: "2"
extracted_by: claude-sonnet-4-6
