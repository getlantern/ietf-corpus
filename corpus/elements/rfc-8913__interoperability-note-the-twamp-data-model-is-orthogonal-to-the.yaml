document: rfc-8913
kind: interoperability-note
summary: The TWAMP data model is orthogonal to the management protocol used between the configuration client and server; both NETCONF (RFC 6241) and RESTCONF (RFC 8040) are valid transports. The model is compliant with the Network Management Datastore Architecture (NMDA, RFC 8342).
