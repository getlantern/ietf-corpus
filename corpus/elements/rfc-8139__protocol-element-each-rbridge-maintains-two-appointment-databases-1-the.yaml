document: rfc-8139
kind: protocol-element
summary: 'Each RBridge maintains two appointment databases: (1) the E-L1CS LSDB, which is semi-permanent and changed only by E-L1CS FS-LSPs or IS-IS purges, and (2) the Hello appointment database, which is transient and completely reset by each Hello from the DRB containing appointments. An RBridge considers itself Appointed Forwarder for VLAN-x if indicated by either database.'
section: "2.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
