document: rfc-6230
kind: security-consideration
summary: SIP clients using this specification MUST use appropriate security mechanisms such as TLS and S/MIME when deployed in open networks, because the 'cfw-id' SDP attribute carries important session correlation information across the SIP network that is vulnerable to interception or spoofing.
section: "12.1"
rfc2119_level: MUST
topics:
    - sip
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
