document: rfc-5881
kind: normative-requirement
summary: When BFD authentication is not in use, all BFD Control packets MUST be sent with TTL or Hop Limit value of 255, and received Control packets demultiplexed to the session MUST be discarded if the received TTL or Hop Limit is not equal to 255.
section: "5"
rfc2119_level: MUST
topics:
