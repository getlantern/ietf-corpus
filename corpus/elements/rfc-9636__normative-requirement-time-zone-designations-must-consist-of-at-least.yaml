document: rfc-9636
kind: normative-requirement
summary: Time zone designations MUST consist of at least 3 and no more than 6 ASCII characters from the set of alphanumerics, '-', and '+'. A reader encountering other bytes SHOULD act as if the designation were replaced by a signed numeric UT offset string (e.g., '-10', '+0530').
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
