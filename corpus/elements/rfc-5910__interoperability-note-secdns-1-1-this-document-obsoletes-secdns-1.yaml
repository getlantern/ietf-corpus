document: rfc-5910
kind: interoperability-note
summary: secDNS-1.1 (this document) obsoletes secDNS-1.0 (RFC 4310). If a server announces support for both in the EPP greeting, clients supporting both versions SHOULD prefer secDNS-1.1. A server migrating between versions SHOULD support both for a reasonable migration period.
section: "2"
topics:
    - dns
    - security
