document: rfc-6176
kind: design-rationale
summary: The SSL 2.0 CLIENT-HELLO format precludes the use of TLS extensions, which can only be sent as part of an (Extended) ClientHello handshake message, making SSL 2.0 compatibility increasingly costly to maintain.
