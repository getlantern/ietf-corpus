kind: protocol-element
summary: The Login Response carries Version-max and Version-active (negotiated version), TSIH (assigned by target on new session establishment), Status-Class (1 byte) and Status-Detail (1 byte) encoding success (0x00/0x00) or error class/detail, T-bit (transit), C-bit (continue), and negotiated parameters in the data segment.
