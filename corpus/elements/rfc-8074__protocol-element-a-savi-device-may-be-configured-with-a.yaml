document: rfc-8074
kind: protocol-element
summary: A SAVI device may be configured with a preference triplet of ("prefix" or "address", "anchor", "method") to override default First-Come, First-Served collision resolution; at least one of "anchor" and "method" MUST be specified in each such triplet.
