document: rfc-2595
kind: normative-requirement
summary: Both client and server MUST check the result of the STARTTLS command and subsequent TLS negotiation to verify whether acceptable authentication or privacy was achieved. Ignoring this step completely invalidates using TLS for security.
section: "2.5"
rfc2119_level: MUST
topics:
    - tls
    - security
