document: rfc-5444
kind: wire-format
summary: The message header (<msg-header>) consists of an 8-bit <msg-type>, a 4-bit <msg-flags>, a 4-bit <msg-addr-length> (address length in octets minus 1), a 16-bit <msg-size>, followed by optional <msg-orig-addr>, 8-bit <msg-hop-limit>, 8-bit <msg-hop-count>, and 16-bit <msg-seq-num> fields, each present only when the corresponding flag bit is set.
section: "5.2"
topics:
    - routing
