document: rfc-2308
kind: normative-requirement
summary: The TTL of the SOA record included in a negative response is taken from the minimum of the SOA.MINIMUM field and the SOA's own TTL. Upon reaching zero, a cached negative answer MUST NOT be used again.
section: "5"
rfc2119_level: MUST NOT
topics:
    - dns
