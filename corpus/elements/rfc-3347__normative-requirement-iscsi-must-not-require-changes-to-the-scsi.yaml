document: rfc-3347
kind: normative-requirement
summary: iSCSI MUST NOT require changes to the SCSI-3 command sets and SCSI client code except where SCSI specifications point to 'transport dependent' fields and behavior. iSCSI MUST be capable of supporting all SCSI-3 command sets and device types.
section: "6.2"
rfc2119_level: MUST NOT
