document: rfc-7686
kind: security-consideration
summary: Attackers may find keys that produce .onion service names that are visually or semantically similar to a desired service. This risk is magnified because .onion names are not human-meaningful and can be mitigated by generating human-meaningful names (at high computing cost) or by using bookmarks and trusted stores.
section: "4"
topics:
