summary: Per-connection RACK variables include RACK.reo_wnd (adaptive reordering window in time units), RACK.min_RTT (windowed minimum RTT), RACK.rtt (RTT of the most recently delivered non-spurious segment), RACK.reordering_seen, RACK.fack (highest forward-acknowledged sequence), RACK.dsack_round, RACK.reo_wnd_mult, and RACK.reo_wnd_persist.
