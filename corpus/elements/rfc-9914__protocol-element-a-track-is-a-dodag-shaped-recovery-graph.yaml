document: rfc-9914
kind: protocol-element
summary: A Track is a DODAG-shaped recovery graph composed of one or more protection paths and strict segments, oriented from a Track ingress to one or more Track egress nodes. It is associated with its own Local RPL Instance and its own Routing Information Base (RIB), which takes precedence over the main Instance RIB. The Track ingress IP address serves as the DODAGID for the associated Local Instance.
section: 2.4.5
topics:
    - routing
