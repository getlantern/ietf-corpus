document: rfc-2675
kind: protocol-element
summary: An MSS value of 65,535 received during TCP connection setup is to be treated as infinity. The actual MSS is determined by subtracting 60 from the Path MTU discovered via Path MTU Discovery over the path to the TCP peer.
section: "5.1"
topics:
    - tcp
