document: rfc-7056
kind: normative-requirement
summary: If multiple RADIUS attributes with the same name are present in a RADIUS message, a multi-valued GSS-API attribute SHOULD be returned. As an exception, implementations SHOULD concatenate RADIUS attributes (such as EAP-Message or large RFC 6929 attributes) that use multiple attributes to carry more than 253 octets.
section: "5"
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
