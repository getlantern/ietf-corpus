document: rfc-3986
kind: security-consideration
summary: Some platforms accept rare IP address formats (octal, hexadecimal, fewer-than-four dotted components) not matching the URI grammar's dotted-decimal form, allowing attackers to bypass access controls with URIs that resolve to unexpected addresses.
