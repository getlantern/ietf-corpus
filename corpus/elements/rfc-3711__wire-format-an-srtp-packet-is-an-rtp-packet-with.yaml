document: rfc-3711
kind: wire-format
summary: 'An SRTP packet is an RTP packet with two SRTP-specific appended fields: an OPTIONAL variable-length MKI (Master Key Identifier) and a RECOMMENDED variable-length authentication tag. The Encrypted Portion covers the RTP payload; the Authenticated Portion covers the RTP header plus the Encrypted Portion.'
section: "3.1"
topics:
