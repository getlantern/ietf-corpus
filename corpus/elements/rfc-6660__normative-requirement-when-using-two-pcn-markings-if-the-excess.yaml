document: rfc-6660
kind: normative-requirement
summary: When using two PCN-markings, if the excess-traffic-meter indicates a need to mark, the PCN-interior-node MUST change NM to ETM and MUST change ThM to ETM. If both meters indicate a need to mark, the Excess-traffic-marking rules MUST take precedence.
section: 5.2.2
rfc2119_level: MUST
topics:
    - ecn
    - diffserv
    - qos
    - congestion
