document: rfc-1460
kind: design-rationale
summary: The spec strongly encourages implementing the optional TOP and APOP commands rather than augmenting drop and scan listings with additional parsed information. The design philosophy is to place intelligence in the POP3 client, not the server, keeping the server minimal.
