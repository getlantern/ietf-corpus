summary: 'For outgoing messages, the Transport Security Model sets securityParameters to a zero-length OCTET STRING encoded as ''0400'' (BER: OCTET STRING tag 0x04, length 0x00). All security context is carried via the tmStateReference, not in the SNMP message header.'
