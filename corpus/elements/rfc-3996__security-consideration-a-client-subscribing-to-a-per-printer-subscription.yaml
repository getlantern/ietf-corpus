document: rfc-3996
kind: security-consideration
summary: A client subscribing to a Per-Printer Subscription for job events may receive unwanted events if many jobs are started and canceled by others; clients should prefer Per-Job Subscriptions to limit event scope to their own jobs.
section: "17.3"
topics:
    - security
