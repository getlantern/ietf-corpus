document: rfc-2381
kind: normative-requirement
summary: AAL type 5 encoding SHOULD be used as specified in RFC 1483 and RFC 1755. For AAL-5, specification of the maximum SDU size in both forward and reverse directions is REQUIRED; the TSpec M parameter SHOULD be used as the maximum SDU.
section: "2.3"
rfc2119_level: SHOULD
