document: rfc-5662
kind: interoperability-note
summary: NFS4ERR_RESOURCE (value 10018) is retained in the nfsstat4 enum for XDR compatibility with NFSv4.0 but is not a valid error code in NFSv4.1. Error value 19 is deliberately left unallocated because it carried a meaning in NFSv3 and reuse would create cross-version ambiguity.
