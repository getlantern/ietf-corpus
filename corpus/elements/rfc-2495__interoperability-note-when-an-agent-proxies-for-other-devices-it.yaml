document: rfc-2495
kind: interoperability-note
summary: When an agent proxies for other devices, it may have missed collection of some statistics intervals. dsx1ValidIntervals reports the maximum interval number for which data is available, and dsx1InvalidIntervals reports the count of intervals within that range for which no data exists.
