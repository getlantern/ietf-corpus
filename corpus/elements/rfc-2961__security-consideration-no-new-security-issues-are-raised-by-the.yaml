document: rfc-2961
kind: security-consideration
summary: No new security issues are raised by the RSVP Refresh Overhead Reduction Extensions. Implementers are referred to RFC 2205 for a general discussion of RSVP security considerations. The INTEGRITY object processing rules are preserved and apply normally within Bundle sub-messages.
