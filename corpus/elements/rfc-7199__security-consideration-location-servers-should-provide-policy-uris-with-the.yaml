document: rfc-7199
kind: security-consideration
summary: Location Servers SHOULD provide policy URIs with the 'https:' scheme and require HTTP over TLS to protect integrity and confidentiality. Servers SHOULD reject PUT and DELETE requests for 'http:' policy URIs unless other protection mechanisms are available.
section: "7.1"
topics:
    - tls
    - security
    - privacy
