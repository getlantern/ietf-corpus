document: rfc-1717
kind: security-consideration
summary: The security of the Multilink Protocol is entirely dependent on the underlying PPP authentication protocols. To securely join an existing bundle, authentication MUST be used; without it a hostile peer can join any bundle by presenting a falsified Endpoint Discriminator option.
section: "8"
topics:
    - security
