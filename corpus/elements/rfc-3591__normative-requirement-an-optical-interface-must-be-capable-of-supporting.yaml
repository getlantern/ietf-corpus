document: rfc-3591
kind: normative-requirement
summary: An optical interface MUST be capable of supporting at least N 15-minute PM intervals, where N has a minimum of 4, a default of 32, and a maximum of 96. Previous interval data may be unavailable if the agent restarted within the last 24 hours.
section: "3.2"
rfc2119_level: MUST
topics:
    - snmp
