document: rfc-8415
kind: normative-requirement
summary: Devices using DUID-LLT MUST store it in stable storage and MUST continue to use it even if the generating network interface is later removed. Devices without stable storage MUST NOT use DUID-LLT.
section: "11.2"
rfc2119_level: MUST
