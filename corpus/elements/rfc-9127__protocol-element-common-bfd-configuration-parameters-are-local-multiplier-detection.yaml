document: rfc-9127
kind: protocol-element
summary: 'Common BFD configuration parameters are: local-multiplier (detection time multiplier, default 3), desired-min-tx-interval (in microseconds, default 1000000), and required-min-rx-interval (in microseconds, default 1000000). An implementation may optionally support a single min-interval used for both tx and rx via the ''single-minimum-interval'' feature.'
