document: rfc-6283
kind: wire-format
summary: The <HashTree> element contains ordered <Sequence> elements each with one or more <DigestValue> elements containing base64-encoded hash values. DigestValue elements within each Sequence MUST be ordered in binary ascending order (by base64-decoded values).
