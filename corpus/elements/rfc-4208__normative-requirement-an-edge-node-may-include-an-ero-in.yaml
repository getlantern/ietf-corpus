document: rfc-4208
kind: normative-requirement
summary: An edge-node MAY include an ERO in a Path message. A core-node MAY reject a Path message containing an ERO; if it does, it SHOULD return a PathErr with error code 'Unknown object class' as described in RFC 3209.
section: "3"
rfc2119_level: MAY
topics:
    - mpls
    - routing
