document: rfc-2615
kind: protocol-element
summary: The Path Signal Label (C2) is set to 22 (0x16) to indicate PPP with X^43+1 scrambling. For backwards compatibility with RFC 1619, when scrambling is off, the value 207 (0xCF) is used to indicate PPP without scrambling.
