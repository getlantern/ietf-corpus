document: rfc-3893
kind: protocol-element
summary: The Authenticated Identity Body (AIB) is a MIME body of type 'message/sipfrag' with Content-Disposition disposition-type 'aib', digitally signed to provide cryptographic identity for the sender of a SIP message. It carries a subset of SIP headers sufficient to assert and verify the originator's identity.
section: "2"
