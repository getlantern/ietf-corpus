document: rfc-4361
kind: design-rationale
summary: RFC 2132 (DHCPv4) and RFC 3315 (DHCPv6) derive client identifiers by incompatible methods, guaranteeing DHCPv4 and DHCPv6 identifiers for the same host will differ. This breaks resource mediation (e.g., DNS updates) on dual-stack hosts.
section: "4.3"
topics:
    - ip
    - dns
