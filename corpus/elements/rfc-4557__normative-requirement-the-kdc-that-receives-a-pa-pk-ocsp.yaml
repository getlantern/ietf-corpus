document: rfc-4557
kind: normative-requirement
summary: The KDC that receives a PA-PK-OCSP-RESPONSE SHOULD send a PA-PK-OCSP-RESPONSE containing OCSP responses for certificates used in the KDC's PA-PK-AS-REP. The client can solicit this by sending a PKOcspData containing an empty sequence.
section: "3"
rfc2119_level: SHOULD
topics:
    - pkix
    - crypto
