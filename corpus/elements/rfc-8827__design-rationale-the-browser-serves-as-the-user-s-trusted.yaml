document: rfc-8827
kind: design-rationale
summary: The browser serves as the user's Trusted Computing Base (TCB). Any security property the user wishes to enforce must ultimately be guaranteed by the browser or transitively by some property the browser verifies. If the browser is compromised, no security guarantees are possible.
section: "3"
topics:
    - webrtc
    - security
