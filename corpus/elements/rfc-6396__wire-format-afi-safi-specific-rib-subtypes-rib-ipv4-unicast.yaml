document: rfc-6396
kind: wire-format
summary: AFI/SAFI-specific RIB subtypes (RIB_IPV4_UNICAST, RIB_IPV4_MULTICAST, RIB_IPV6_UNICAST, RIB_IPV6_MULTICAST) encode a 4-octet Sequence Number, 1-octet Prefix Length, variable Prefix, 2-octet Entry Count, and repeated variable RIB Entries. The Prefix encoding matches BGP NLRI with trailing bits padded to octet boundary.
section: 4.3.2
topics:
    - routing
    - bgp
