document: rfc-3775
kind: security-consideration
summary: The return routability procedure does not protect against attackers on the path between the home network and the correspondent node. However, such on-path attackers can perform the same traffic redirection attacks without Mobile IPv6; the procedure limits the attack surface to a single specific Internet path rather than anywhere on the Internet.
section: "5.2"
topics:
    - security
    - ip
    - mobility
