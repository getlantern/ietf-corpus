document: rfc-9904
kind: design-rationale
summary: Only values of 'MAY', 'RECOMMENDED', 'MUST NOT', and 'NOT RECOMMENDED' may be placed in the 'Use for' columns; 'MUST' is explicitly not allowed there. The 'Implement for' columns additionally allow 'MUST'. This distinction separates deployment guidance from implementation requirements.
section: "2.2"
topics:
    - dns
    - registry
    - security
