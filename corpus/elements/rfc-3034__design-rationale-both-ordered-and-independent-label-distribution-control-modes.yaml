document: rfc-3034
kind: design-rationale
summary: Both ordered and independent label distribution control modes are left as implementation or configuration choices, since each has advantages and disadvantages. In ordered control the FR-LSR waits for a downstream mapping before returning one upstream, propagating accurate hop counts; in independent control a binding is returned immediately using an 'unknown' hop count that is corrected later.
section: "7.1"
