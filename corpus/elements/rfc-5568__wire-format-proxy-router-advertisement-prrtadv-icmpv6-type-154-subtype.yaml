document: rfc-5568
kind: wire-format
summary: 'Proxy Router Advertisement (PrRtAdv): ICMPv6 Type 154, Subtype 3, Code 0–5. Header fields include Subtype (8-bit), Reserved (8-bit), Identifier (16-bit). Options in order: Source LLA, New AP LLA (MUST), New Router LLA (MUST when Code 0 or 1), New Router IP address, New Router Prefix Info, and optional New CoA.'
