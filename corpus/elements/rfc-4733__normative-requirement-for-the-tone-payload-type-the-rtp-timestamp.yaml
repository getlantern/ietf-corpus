document: rfc-4733
kind: normative-requirement
summary: For the tone payload type, the RTP timestamp MUST be updated for each successive packet (unlike named events, where the timestamp stays fixed for the event duration). The timestamp in each subsequent tone packet MUST equal the sum of the previous packet's timestamp and duration.
section: 4.4.1
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
