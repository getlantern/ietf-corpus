document: rfc-5602
kind: interoperability-note
summary: When using PHP (Penultimate Hop Popping) for the outer tunnel label, the actual packet may not carry the outer MPLS tunnel label, but tunnel entries still exist in the relevant MPLS MIB modules. The applicable mode remains either MPLS-TE or non-TE, not pwOnly.
