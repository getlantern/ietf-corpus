document: rfc-7473
kind: normative-requirement
summary: If an LSR receives a SAC Capability TLV containing an element with an App field value not defined in the specification, the receiver MUST ignore and discard that element and continue processing the rest of the TLV. If a receiver does not understand or support an application in a control element, it SHOULD silently skip such an element.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
