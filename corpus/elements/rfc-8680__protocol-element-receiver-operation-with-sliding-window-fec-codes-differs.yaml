document: rfc-8680
kind: protocol-element
summary: 'Receiver operation with sliding window FEC codes differs from block codes in steps 4 and 5: the FEC scheme inserts source and repair packets into the decoding window using received FEC Payload IDs, attempts decoding when at least one source packet is missing and at least one repair packet is available, then returns received and decoded ADUs along with indications of unrecoverable losses.'
section: "4.3"
topics:
