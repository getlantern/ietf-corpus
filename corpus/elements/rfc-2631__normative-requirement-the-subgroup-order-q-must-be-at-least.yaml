document: rfc-2631
kind: normative-requirement
summary: The subgroup order q MUST be at least 160 bits in length (m >= 160), and p must be a minimum of 512 bits. The private key x MUST be randomly generated in the interval [2, q-2].
section: "2.2"
rfc2119_level: MUST
