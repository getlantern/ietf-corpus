document: rfc-5604
kind: security-consideration
summary: The pwTDMTable, pwTDMPerfCurrentTable, pwTDMPerfIntervalTable, and pwTDMPerf1DayIntervalTable collectively expose TDM pseudowire connectivity topology and performance characteristics. Read access (GET/NOTIFY) to these objects should be controlled, and values should be encrypted when transmitted over SNMP if the topology information is sensitive.
section: "9"
topics:
