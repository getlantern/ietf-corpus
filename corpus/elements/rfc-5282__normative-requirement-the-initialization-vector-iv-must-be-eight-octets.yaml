document: rfc-5282
kind: normative-requirement
summary: The Initialization Vector (IV) MUST be eight octets for AES GCM and AES CCM. The IV MUST be chosen by the encryptor such that the same IV value is used only once for a given key.
section: "3.1"
rfc2119_level: MUST
topics:
