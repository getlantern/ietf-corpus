document: rfc-5056
kind: security-consideration
summary: Channel binding makes anonymous channels (where neither end-point is strongly authenticated) useful, but implementors should avoid making it easy to use such channels without channel binding, as doing so would reintroduce the MITM vulnerability that channel binding is designed to prevent.
section: "8"
topics:
    - security
    - crypto
