document: rfc-4174
kind: protocol-element
summary: 'The 16-bit Discovery Domain Access Field is a bitmap controlling which iSNS client types may modify Discovery Domains: bit 15 (Enabled), bit 14 (Control Node), bit 13 (iSCSI Target), bit 12 (iSCSI Initiator), bit 11 (iFCP Target Port), bit 10 (iFCP Initiator Port). If bit 15 is zero, the remaining bits MUST be ignored.'
section: "2.2"
topics:
