document: rfc-9630
kind: wire-format
summary: 'The Multicast Branch ID is carried as an optional field after the Flow ID and Sequence Number fields in the IOAM DEX Option-Type header. Its presence is indicated by two new Extension-Flag bits: bit 2 (N, Branching Node ID) and bit 3 (I, Interface Index), which MUST both be set or both be cleared.'
section: "4.1"
topics:
    - multicast
    - measurement
