document: rfc-7838
kind: normative-requirement
summary: Clients MUST have reasonable assurances that the alternative service is under control of and valid for the whole origin, established through use of a TLS-based protocol with the certificate checks defined in RFC 2818. Clients MAY impose additional criteria.
section: "2.1"
rfc2119_level: MUST
topics:
