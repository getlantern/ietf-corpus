document: rfc-3559
kind: security-consideration
summary: Unauthorized write access to madcapConfigExtraAllocationTime and madcapConfigOfferHold can cause reservations to last too long, potentially causing denial of service when allocation ranges are small. Unauthorized modification of madcapConfigNoResponseDelay can prevent a client from completing multicast address allocation.
section: "6"
topics:
    - security
    - multicast
