document: rfc-9231
kind: interoperability-note
summary: RFC 6931 accidentally included an erroneous URI for RSA-SHA224 (http://www.w3.org/2007/05/xmldsig-more#rsa-sha224) and for Canonical XML 1.1 (2006/12/xmlc12n11#). Implementations SHOULD only generate the correct URI but SHOULD understand both the correct and erroneous URI.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - crypto
