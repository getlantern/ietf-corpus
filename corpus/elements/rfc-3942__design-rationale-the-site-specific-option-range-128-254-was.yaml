document: rfc-3942
kind: design-rationale
summary: The site-specific option range (128-254) was large (127 options) but little used for its original purpose. Many DHCP client implementations also lacked well-documented means to request or extract site-specific options, making the range a candidate for reclassification.
section: "3.2"
