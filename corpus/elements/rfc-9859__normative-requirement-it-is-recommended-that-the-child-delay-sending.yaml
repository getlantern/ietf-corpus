document: rfc-9859
kind: normative-requirement
summary: It is RECOMMENDED that the child delay sending notifications until a consistent public view of the pertinent records can be ensured, to avoid the parent attempting CDS/CDNSKEY/CSYNC processing before records are fully propagated.
section: "4.2"
rfc2119_level: RECOMMENDED
