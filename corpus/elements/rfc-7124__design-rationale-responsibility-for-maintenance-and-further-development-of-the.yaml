summary: Responsibility for maintenance and further development of the EFM-CU-MIB module was transferred from the concluded IETF HUBMIB working group to the IEEE 802.3 working group. IEEE developed IEEE8023-EFM-CU-MIB in 2011, based on the original EFM-CU-MIB, and the current revision is defined in IEEE Std 802.3.1-2013.
