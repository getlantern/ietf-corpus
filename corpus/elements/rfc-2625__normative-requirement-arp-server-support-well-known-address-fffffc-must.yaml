document: rfc-2625
kind: normative-requirement
summary: ARP Server support (well-known address FFFFFC) MUST NOT be used. ARP broadcast support is REQUIRED. ARP requests SHALL use Class 3 service; ARP replies may use Class 1, 2, or 3.
