document: rfc-9458
kind: normative-requirement
summary: Clients SHOULD include a Date header field in Encapsulated Requests to allow Oblivious Gateway Resources to use date-windowed anti-replay. This may be omitted if the Client has prior knowledge that the gateway does not use Date for anti-replay.
section: 6.5.1
rfc2119_level: SHOULD
topics:
    - http
    - security
