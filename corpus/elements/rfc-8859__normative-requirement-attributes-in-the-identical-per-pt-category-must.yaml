document: rfc-8859
kind: normative-requirement
summary: Attributes in the IDENTICAL-PER-PT category MUST have identical values across all media descriptions for a given RTP payload type when repeated. Payload-type-specific attributes (rtpmap, fmtp, ptime, maxptime, framerate, rtcp-fb) fall into this category.
section: "4.7"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
    - webrtc
