document: rfc-1134
kind: interoperability-note
summary: The Configure-Reject mechanism distinguishes unrecognized options (reject outright, do not include in next Configure-Request) from unacceptable-but-recognized option values (nak with an acceptable value, retransmit with adjusted value). Implementations must handle both cases distinctly.
section: 4.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
