document: rfc-3369
kind: normative-requirement
summary: SignerInfo version MUST be 1 when SignerIdentifier is issuerAndSerialNumber and MUST be 3 when it is subjectKeyIdentifier. Implementations MUST support reception of both SignerIdentifier forms.
section: "5.3"
rfc2119_level: MUST
topics:
