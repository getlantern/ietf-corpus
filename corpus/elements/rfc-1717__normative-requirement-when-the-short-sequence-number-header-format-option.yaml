document: rfc-1717
kind: normative-requirement
summary: When the Short Sequence Number Header Format option is received, an implementation MUST either transmit all subsequent multilink packets on all bundle links using 12-bit sequence numbers or Configure-NAK/Configure-Reject the option.
section: 5.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
