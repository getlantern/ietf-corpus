document: rfc-6610
kind: normative-requirement
summary: If a Home Network Information option does not contain complete configuration information, the client MUST silently discard that option. Options received outside any Home Network Information container (unencapsulated) MUST also be silently discarded.
section: 4.1.2
rfc2119_level: MUST
topics:
