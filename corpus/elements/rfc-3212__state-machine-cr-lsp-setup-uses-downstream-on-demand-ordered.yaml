document: rfc-3212
kind: state-machine
summary: CR-LSP setup uses downstream-on-demand ordered control triggered by receipt of a Label Request with CR-TLVs. A Label Mapping is sent upstream either when (1) the LSR is the egress and a mapping was requested, or (2) a mapping was received from downstream for a CR-LSP with a pending upstream request.
