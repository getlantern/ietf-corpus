document: rfc-5124
kind: security-consideration
summary: Mixing secure and insecure media sessions across different RTP sessions may reveal information to third parties. The decision to mix them MUST be in line with a local security policy that specifies acceptable combinations (e.g., whether an unprotected audio stream alongside a protected video stream is acceptable).
section: "5"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - security
