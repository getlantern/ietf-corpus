document: rfc-9204
kind: design-rationale
summary: The Duplicate instruction (Section 4.3.4) allows an encoder to reinsert an existing dynamic table entry without retransmitting name or value. This is used to avoid referencing entries close to eviction ('draining entries'), which would block new insertions by creating unacknowledged references that prevent eviction.
section: 2.1.1.1
topics:
    - http
