document: rfc-2849
kind: normative-requirement
summary: Line folding MUST NOT occur before the first character of the line. Any line that begins with a single space MUST be treated as a continuation of the previous non-empty line, and exactly one leading space MUST be discarded when joining.
section: Notes on LDIF Syntax
rfc2119_level: MUST
topics:
    - ldap
