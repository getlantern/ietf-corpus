document: rfc-7712
kind: security-consideration
summary: Any future DNA prooftypes must thoroughly describe how they conform to the prooftype model of Section 7, including the server's proof, matching rules, how the client obtains verification material, and dependency on secure DNS. Prooftypes that rely on or are enhanced by secure DNS must also describe how they ensure secure delegation.
section: "10"
topics:
