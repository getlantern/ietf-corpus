document: rfc-7959
kind: normative-requirement
summary: For an atomic Block1 transfer, if not all previous blocks are available at the server when the final block (M=0) is received, the transfer fails and error code 4.08 (Request Entity Incomplete) MUST be returned. Clients SHOULD always start with block zero and send blocks in order.
section: "2.5"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
