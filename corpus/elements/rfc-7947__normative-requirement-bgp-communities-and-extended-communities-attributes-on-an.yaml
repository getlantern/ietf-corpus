document: rfc-7947
kind: normative-requirement
summary: BGP Communities and Extended Communities attributes on an NLRI UPDATE sent to a route server SHOULD NOT be modified, processed, or removed except as defined by local policy; if intended for processing by the route server itself, they MAY be modified or removed.
section: 2.2.4
rfc2119_level: SHOULD NOT
topics:
