document: rfc-9172
kind: normative-requirement
summary: Any security context used by a BCB MUST utilize a confidentiality cipher that provides authenticated encryption with associated data (AEAD). This ensures ciphertext integrity is always coupled with confidentiality.
section: "3.8"
rfc2119_level: MUST
