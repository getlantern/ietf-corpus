document: rfc-6378
kind: normative-requirement
summary: For protection switching within 50 ms, it is RECOMMENDED that the default interval of the first three rapid PSC messages SHOULD be no longer than 3.3 ms. Subsequent messages SHOULD be continuously transmitted with a default interval of 5 seconds.
section: "4.1"
rfc2119_level: RECOMMENDED
