document: rfc-9479
kind: normative-requirement
summary: Undefined bits in SABM and UDABM MUST be transmitted as 0 and MUST be ignored on receipt. Bits not transmitted MUST be treated as 0 on receipt. Bits not supported by an implementation MUST be ignored on receipt.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
