document: rfc-8224
kind: normative-requirement
summary: An authentication service MUST NOT add an Identity header field if it does not have authority over the identity in question. If not authoritative, it SHOULD process and forward the request normally unless local policy dictates blocking.
section: "6.1"
rfc2119_level: MUST NOT
topics:
    - sip
    - security
