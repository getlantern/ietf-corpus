document: rfc-2836
kind: design-rationale
summary: A uniform 16-bit encoding was chosen to uniquely identify PHBs in protocol messages (e.g., bandwidth broker negotiations, MPLS label distribution) because DSCP values are insufficient — there are only 64 DSCP values but no limit on the number of PHBs, and local DSCP mappings may differ across domains.
