document: rfc-3720
kind: design-rationale
summary: 'iSCSI allows ''phase-collapse'': a command and its write data may be shipped together (immediate data), and read data and the final status response may be combined in a single PDU from the target. This reduces round-trip latency and protocol overhead compared to a strict phase-separated model.'
section: "3.2"
topics:
