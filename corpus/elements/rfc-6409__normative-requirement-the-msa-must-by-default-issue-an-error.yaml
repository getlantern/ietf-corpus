document: rfc-6409
kind: normative-requirement
summary: The MSA MUST, by default, issue an error response (reply code 530) to the MAIL command if the session has not been authenticated using SMTP-AUTH, unless it has already independently established authentication or authorization (e.g., protected subnetwork).
section: "4.3"
rfc2119_level: MUST
topics:
    - email
    - security
