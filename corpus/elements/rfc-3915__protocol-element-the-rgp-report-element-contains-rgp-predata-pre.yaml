document: rfc-3915
kind: protocol-element
summary: 'The <rgp:report> element contains: <rgp:preData> (pre-delete registration data), <rgp:postData> (post-restore registration data), <rgp:delTime> (delete request timestamp), <rgp:resTime> (restore command timestamp), <rgp:resReason> (reason for restore), two <rgp:statement> elements (client attestations), and an optional <rgp:other> element for supporting information.'
