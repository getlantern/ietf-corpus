document: rfc-2608
kind: normative-requirement
summary: All SLP agents MUST implement DSA (BSD=0x0002). SAs MUST register services with DSA authentication blocks and MUST use DSA authentication blocks in SrvDeReg messages. DAs MUST use DSA authentication blocks in unsolicited DAAdverts.
section: "9.2"
rfc2119_level: MUST
