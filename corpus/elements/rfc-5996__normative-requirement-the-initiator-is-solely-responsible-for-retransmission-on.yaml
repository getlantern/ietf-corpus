document: rfc-5996
kind: normative-requirement
summary: The initiator is solely responsible for retransmission on timeout; the responder MUST NOT retransmit a response unless it receives a retransmission of the corresponding request. A retransmission from the initiator MUST be bitwise identical to the original request starting from the IKE header.
section: "2.1"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
