document: rfc-6184
kind: protocol-element
summary: 'Three packetization modes are defined: single NAL unit mode (packetization-mode=0, targeting H.241-compatible conversational systems), non-interleaved mode (packetization-mode=1, low-delay), and interleaved mode (packetization-mode=2, tolerating higher latency). Each mode restricts which packet types are permitted.'
