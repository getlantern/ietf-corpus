document: rfc-8342
kind: protocol-element
summary: The <running> configuration datastore holds the current configuration of the device. It MAY include configuration requiring further transformation (e.g., inactive configuration, templates) before it can be applied, but MUST always be a valid configuration data tree per RFC 7950 Section 8.1.
section: 5.1.3
