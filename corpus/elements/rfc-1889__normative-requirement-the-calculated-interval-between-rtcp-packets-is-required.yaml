document: rfc-1889
kind: normative-requirement
summary: The calculated interval between RTCP packets is required to be greater than a minimum of 5 seconds to avoid bursts of RTCP traffic exceeding allowed bandwidth when the number of participants is small and traffic does not smooth according to the law of large numbers.
section: "6.2"
rfc2119_level: REQUIRED
topics:
    - rtp
    - realtime
    - congestion
