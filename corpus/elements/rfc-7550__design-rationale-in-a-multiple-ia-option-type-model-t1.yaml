document: rfc-7550
kind: design-rationale
summary: In a multiple IA option type model, T1/T2 timers are protocol-level timers that should be independent of individual IA options. Had DHCPv6 been redesigned from scratch, T1/T2 would be carried in a separate option rather than within each IA option.
section: "4.3"
topics:
