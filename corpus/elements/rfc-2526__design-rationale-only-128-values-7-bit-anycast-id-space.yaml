document: rfc-2526
kind: design-rationale
summary: Only 128 values (7-bit anycast ID space) are reserved rather than 256 to ensure the minimum possible interface identifier size is 8 bits, allowing the subnet prefix / interface identifier boundary to be byte-aligned even in the smallest case.
