document: rfc-2590
kind: design-rationale
summary: Each VC termination point on a Frame Relay interface is treated as a 'pseudo-interface' or 'logical-interface', enabling a distinct IPv6 autoconfigured address (including a link-local address) to be associated with each DLCI. This models the fact that each VC acts as an independent virtual-link.
