document: rfc-8984
kind: normative-requirement
summary: The privacy property (default 'public') MUST NOT affect information sent to scheduled participants; it is only interpreted by protocols sharing calendar objects between users. Unknown privacy values MUST be preserved and treated as equivalent to 'private'.
section: 4.4.3
rfc2119_level: MUST
topics:
    - json
    - privacy
