document: rfc-2750
kind: interoperability-note
summary: This document updates RFC 2205 Section A.13 by defining the POLICY_DATA object (Class=14, C-Type=1), which was only a placeholder in the original RSVP functional specification. Existing RFC 2205 nodes that do not process policy information are treated as PIN nodes and must forward POLICY_DATA objects unmodified.
