document: rfc-5608
kind: security-consideration
summary: The Message-Authenticator Attribute (80) SHOULD be used with RADIUS messages described in this memo because it provides the best available tamper-evident integrity protection for service provisioning attributes in Access-Accept packets, mitigating the risk of attribute addition, deletion, or modification by an adversary.
section: "4"
rfc2119_level: SHOULD
