document: rfc-2797
kind: protocol-element
summary: The id-alg-noSignature mechanism (OID id-pkix id-alg 2) provides a signature placeholder for encryption-only keys that cannot produce a signature. The NoSignatureValue is an OCTET STRING containing a hash of the certification request; there is no security associated with this type, so if POP is required the encryptedPOP/decryptedPOP mechanism MUST be used.
section: 3.3.3.1
topics:
    - pkix
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
