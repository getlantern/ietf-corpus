document: rfc-8457
kind: security-consideration
summary: Identifying important messages or the mailbox holding them gives an attacker a strategic starting point. If the importance algorithm is well known, additional information may be inferred — for example, that senders of "$Important" messages are particularly significant to the mailbox owner.
section: "5"
topics:
    - email
    - security
    - privacy
