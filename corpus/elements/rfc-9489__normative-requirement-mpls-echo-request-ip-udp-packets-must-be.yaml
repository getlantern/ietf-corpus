document: rfc-9489
kind: normative-requirement
summary: MPLS Echo Request IP/UDP packets MUST be encapsulated with the Transport and EVPN label(s) followed by the GAL (RFC 5586) as the bottommost label, followed by a G-ACh header carrying the IPv4 (0x0021) or IPv6 (0x0057) Channel Type.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
