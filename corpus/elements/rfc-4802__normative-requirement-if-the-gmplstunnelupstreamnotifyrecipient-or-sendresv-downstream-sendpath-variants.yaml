document: rfc-4802
kind: normative-requirement
summary: If the gmplsTunnelUpstreamNotifyRecipient (or SendResv, Downstream, SendPath variants) is set to 0, the corresponding address type object MUST be set to unknown(0). This constraint applies to all four Notify recipient address pairs in gmplsTunnelEntry.
section: "8"
rfc2119_level: MUST
topics:
