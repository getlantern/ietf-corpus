document: rfc-8892
kind: design-rationale
summary: A new value should be used (rather than reusing an existing one) when key aspects such as header format or link model are significantly different; conversely, the same value should be reused when differences can be expressed via other YANG/MIB objects. The Teredo vs. UDP(8) example illustrates this.
section: "4.1"
topics:
