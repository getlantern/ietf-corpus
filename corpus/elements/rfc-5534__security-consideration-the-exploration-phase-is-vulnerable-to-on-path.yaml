document: rfc-5534
kind: security-consideration
summary: The exploration phase is vulnerable to on-path attackers who can cause denial-of-service, move communications to less-preferred address pairs, or prevent exploration from completing. Off-path attackers cannot easily guess both the context tag and correct probe nonces. IPsec cannot protect exploration because it operates above the Shim6 layer.
section: "8"
topics:
