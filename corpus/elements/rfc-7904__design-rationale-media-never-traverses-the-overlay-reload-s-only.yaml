document: rfc-7904
kind: design-rationale
summary: Media never traverses the overlay. RELOAD's only role is setting up the direct SIP connection; after ICE checks complete, ordinary SIP/SIPS is used for signaling and media connectivity checks are handled by normal SIP ICE procedures.
