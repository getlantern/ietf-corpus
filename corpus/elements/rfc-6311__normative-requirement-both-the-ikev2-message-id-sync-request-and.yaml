document: rfc-6311
kind: normative-requirement
summary: Both the IKEV2_MESSAGE_ID_SYNC request and response MUST NOT contain any additional payloads other than an optional IPSEC_REPLAY_COUNTER_SYNC notification in the request, and both MUST be sent with a Message ID value of zero.
section: "5.1"
rfc2119_level: MUST NOT
topics:
