document: rfc-3545
kind: protocol-element
summary: A new CRTP Headers Checksum (HDRCKSUM) option allows the compressor to replace a null UDP checksum with a 16-bit checksum covering the pseudo-IP header, UDP header, first 12 bytes of UDP data (fixed RTP header), and CSRC list. This enables header validation even when UDP checksum is absent.
section: "2.2"
topics:
    - rtp
    - realtime
