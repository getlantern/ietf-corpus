document: rfc-2263
kind: protocol-element
summary: The SNMP-PROXY-MIB defines a snmpProxyTable whose entries map incoming contextEngineID/contextName pairs to outgoing management target information. Each entry specifies the incoming SNMPv2 PDU type, incoming context, outgoing target parameters name, and optionally a single or multiple target address tags for request or notification forwarding respectively.
