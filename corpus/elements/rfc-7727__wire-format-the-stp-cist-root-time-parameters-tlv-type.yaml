summary: The STP CIST Root Time Parameters TLV (Type=0x2008) encodes MaxAge (16 bits), MessageAge (16 bits), FwdDelay (16 bits), HelloTime (16 bits), and RemainingHops (8 bits) for 9 octets total. All time values are in seconds with 1-second granularity.
