document: rfc-5191
kind: normative-requirement
summary: When a PaC changes its IP address, it MUST send any valid PANA message. If that message is valid and carries the new source IP address, the PAA MUST update the session record with the new PaC address. If a PANA SA exists, the message MUST be AUTH-protected.
section: "5.6"
rfc2119_level: MUST
topics:
    - security
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
