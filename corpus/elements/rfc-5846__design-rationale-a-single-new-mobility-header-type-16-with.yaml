document: rfc-5846
kind: design-rationale
summary: A single new Mobility Header type (16) with an inner sub-type field (Binding Revocation Type) was chosen rather than allocating separate MH types for BRI and BRA. This conserves the MH type numbering space and allows future revocation message subtypes to be added via the sub-type registry rather than requiring new MH allocations.
section: "5"
