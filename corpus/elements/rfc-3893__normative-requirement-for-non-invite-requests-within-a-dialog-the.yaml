document: rfc-3893
kind: normative-requirement
summary: For non-INVITE requests within a dialog, the From, Call-ID, Date, and Contact header fields are REQUIRED in an AIB. New SIP methods or extensions leveraging AIB security MUST identify any special identity requirements in their Security Considerations.
section: "5"
rfc2119_level: REQUIRED
topics:
    - sip
    - security
