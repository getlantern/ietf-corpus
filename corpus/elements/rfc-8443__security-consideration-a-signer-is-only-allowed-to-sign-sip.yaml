document: rfc-8443
kind: security-consideration
summary: A signer is only allowed to sign SIP 'Resource-Priority' header field content for which it has proper authorization. Before signing tokens, the signer MUST have a secure method for authentication of the end user or device being granted a token.
section: "7.2"
rfc2119_level: MUST
topics:
    - sip
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
