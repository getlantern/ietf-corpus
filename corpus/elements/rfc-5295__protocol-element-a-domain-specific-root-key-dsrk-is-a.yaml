document: rfc-5295
kind: protocol-element
summary: A Domain-Specific Root Key (DSRK) is a USRK with key label "dsrk@ietf.org" and optional data containing the ASCII string representing the target key management domain. The DSRK MUST be at least 64 octets long and is used to derive DSUSRKs.
