document: rfc-9234
kind: interoperability-note
summary: In AS migration scenarios (RFC 7705) where a router may represent multiple ASes, OTC Attribute procedures remain valid because the egress procedures attach the OTC value equal to the ASN the router is currently representing, preserving correctness regardless of migration state.
