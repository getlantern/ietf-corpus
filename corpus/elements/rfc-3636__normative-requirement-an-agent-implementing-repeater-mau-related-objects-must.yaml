document: rfc-3636
kind: normative-requirement
summary: An agent implementing repeater-MAU related objects MUST also comply with the snmpRptrModCompl compliance statement of the 802.3 Repeater MIB (RFC 2108). The rpMauGroupIndex and rpMauPortIndex values SHALL match rptrPortGroupIndex and rptrPortIndex of the connected port.
section: 3.4.2
rfc2119_level: MUST
topics:
    - snmp
