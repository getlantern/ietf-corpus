document: rfc-6111
kind: security-consideration
summary: If a well-known principal name was created before a KDC was updated to conform to this specification, it SHOULD be renamed. The provisioning code that manages account creation MUST be updated to disallow creation of principals with unsupported well-known names.
section: "4"
rfc2119_level: MUST
topics:
    - security
