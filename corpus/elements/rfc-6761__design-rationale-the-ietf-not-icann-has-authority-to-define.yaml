document: rfc-6761
kind: design-rationale
summary: The IETF — not ICANN — has authority to define Special-Use Domain Names because the IETF is responsible for DNS protocol rules. ICANN manages allocation of names made possible by those rules, but the IETF can define higher-level protocol rules (e.g., always return NXDOMAIN) that apply on all networks independent of ICANN allocation.
section: "3"
topics:
