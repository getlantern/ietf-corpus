document: rfc-9050
kind: state-machine
summary: 'A PCE-initiated PCECC LSP transitions through: PCInitiate to ingress (PLSP-ID=0) → PCC responds PCRpt GOING-UP → PCE downloads labels to all nodes via PCInitiate (CC-ID per node) → PCE sends PCUpd → ingress reports UP. The LSP is ''up'' by default on receipt of PCUpd.'
