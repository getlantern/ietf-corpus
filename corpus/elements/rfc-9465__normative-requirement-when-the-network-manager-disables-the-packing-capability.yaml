document: rfc-9465
kind: normative-requirement
summary: When the network manager disables the Packing Capability at the RP, the router MUST NOT advertise the Packing Capability. However, an implementation MAY still choose to parse received packed registers during transitional periods.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - multicast
    - routing
