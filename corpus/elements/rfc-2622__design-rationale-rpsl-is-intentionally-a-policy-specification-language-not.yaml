document: rfc-2622
kind: design-rationale
summary: RPSL is intentionally a policy specification language, not a router configuration language. Router configurations are generated from RPSL policy descriptions (aut-num class) combined with router descriptions (inet-rtr class) and global IRR database mappings, enabling protection against accidental or malicious distribution of inaccurate routing information.
section: "1"
topics:
