document: rfc-9935
kind: normative-requirement
summary: The seed-only private key format is RECOMMENDED as it is the most compact representation; both the expanded private key and the public key can be deterministically derived from the seed using ML-KEM.KeyGen_internal(d,z) (algorithm 16) with the first 32 octets as d and the remaining 32 octets as z.
section: "6"
rfc2119_level: RECOMMENDED
topics:
