document: rfc-4511
kind: normative-requirement
summary: When a server receives an Abandon Request on a Search operation while transmitting responses, the server MUST cease transmitting entry responses immediately and MUST NOT send the SearchResultDone. Abandon, Bind, Unbind, and StartTLS operations cannot themselves be abandoned.
section: "4.11"
rfc2119_level: MUST
topics:
    - ldap
