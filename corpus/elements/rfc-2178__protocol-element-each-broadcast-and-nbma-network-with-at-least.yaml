document: rfc-2178
kind: protocol-element
summary: Each broadcast and NBMA network with at least two attached routers elects a Designated Router (DR) and Backup Designated Router (BDR) via Hello priority fields. The DR originates a Network-LSA for the network and reduces required adjacencies from O(n²) to O(n), substantially reducing routing traffic.
section: "7.3"
topics:
    - routing
