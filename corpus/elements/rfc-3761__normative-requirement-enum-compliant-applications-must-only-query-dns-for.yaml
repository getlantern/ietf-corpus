document: rfc-3761
kind: normative-requirement
summary: ENUM compliant applications MUST only query DNS for what it believes is an E.164 number. The E2U portion of the service field MUST NOT be used for non-E.164 numbers.
section: "2"
rfc2119_level: MUST
