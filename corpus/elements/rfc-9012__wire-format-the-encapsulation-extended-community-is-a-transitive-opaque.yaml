document: rfc-9012
kind: wire-format
summary: The Encapsulation Extended Community is a Transitive Opaque Extended Community (type 0x03, sub-type 0x0c) with 4 reserved octets followed by a 2-octet Tunnel Type. It serves as a backwards-compatible minimal encoding equivalent to a 'barebones' Tunnel TLV with no sub-TLVs other than the Tunnel Egress Endpoint.
section: "4.1"
topics:
