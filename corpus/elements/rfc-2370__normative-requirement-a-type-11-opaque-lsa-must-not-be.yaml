document: rfc-2370
kind: normative-requirement
summary: A type-11 Opaque LSA must not be flooded out an interface associated with a stub area. A type-11 Opaque LSA received on a stub area interface must be discarded and not acknowledged, as the neighboring router has flooded it in error.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - routing
