document: rfc-3230
kind: normative-requirement
summary: The digest is computed on the entire instance before the application of any instance manipulation (range or delta coding). Computing the digest after such manipulation would not enable integrity checking of the reassembled instance.
section: "4.2"
rfc2119_level: MUST
topics:
    - http
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
