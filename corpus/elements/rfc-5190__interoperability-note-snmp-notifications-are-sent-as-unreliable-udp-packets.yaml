document: rfc-5190
kind: interoperability-note
summary: SNMP notifications are sent as unreliable UDP packets and may be dropped before reaching the MIDCOM client. Clients expecting an asynchronous notification on a specific transaction must poll the middlebox periodically using SNMP GET transactions to monitor transaction status when notifications may be lost.
section: 4.2.1
topics:
    - snmp
    - udp
