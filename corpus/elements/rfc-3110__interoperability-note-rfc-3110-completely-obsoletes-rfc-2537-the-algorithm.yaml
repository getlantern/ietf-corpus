document: rfc-3110
kind: interoperability-note
summary: RFC 3110 completely obsoletes RFC 2537. The algorithm number for RSA KEY RRs is changed from the RFC 2537 value to algorithm number 5, which is also used for RSA/SHA1 SIG RRs. Implementations must use the new algorithm number.
section: "1"
topics:
    - dns
    - crypto
