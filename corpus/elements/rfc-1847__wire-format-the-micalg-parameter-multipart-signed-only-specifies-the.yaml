document: rfc-1847
kind: wire-format
summary: The micalg parameter (multipart/signed only) specifies the Message Integrity Check algorithm(s) as a comma-separated list of tokens. The comma character is explicitly excluded from valid token characters. If multiple algorithms are listed, their purpose is defined by the protocol.
