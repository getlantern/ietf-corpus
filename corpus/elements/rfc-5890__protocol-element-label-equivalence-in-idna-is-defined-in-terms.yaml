document: rfc-5890
kind: protocol-element
summary: 'Label equivalence in IDNA is defined in terms of A-labels: two labels are equivalent if their A-label forms are equal under case-insensitive comparison. This covers exact U-label identity, case-insensitive A-label matching, and equivalence between a U-label and an A-label determined by translating and comparing.'
section: 2.3.2.4
