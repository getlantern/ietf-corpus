document: rfc-8856
kind: normative-requirement
summary: When generating an SDP answer, the answerer MUST check version compatibility via 'bfcpver'; if no supported BFCP version is found, it MUST NOT accept the 'm=' section. If accepted, it MUST include 'bfcpver' in the answer with values that are a subset of those in the offer.
section: "10.2"
rfc2119_level: MUST
topics:
    - realtime
    - webrtc
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
