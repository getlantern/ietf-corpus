document: rfc-4806
kind: interoperability-note
summary: In the EAP scenario, OCSP applies only to the server-side IKEv2 certificate, not to certificates used within EAP methods by the EAP peer or EAP server. In the event of conflict between this document and IKEv2 (RFC 4306) regarding the EAP illustrations, RFC 4306 SHALL dominate.
section: "5.2"
topics:
