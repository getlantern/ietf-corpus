document: rfc-1473
kind: protocol-element
summary: pppIpRemoteMaxSlotId is an INTEGER(0..255) reporting the Max-Slot-Id parameter advertised by the remote node for VJ-TCP header compression; value is 0 if VJ-TCP compression is not in use. Only meaningful when pppIpOperStatus is opened.
