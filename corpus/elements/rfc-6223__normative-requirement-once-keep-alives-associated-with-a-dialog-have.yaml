document: rfc-6223
kind: normative-requirement
summary: Once keep-alives associated with a dialog have been negotiated, they MUST be sent for the lifetime of the dialog until it is terminated. Re-negotiation of dialog keep-alives is not possible.
section: 4.2.3
rfc2119_level: MUST
topics:
    - sip
    - nat
