document: rfc-7200
kind: protocol-element
summary: The <target-sip-entity> condition element contains the URI of the entity that initiated the load-filtering policy (generally the notifier). It allows a filtering server with multiple routing paths to apply a policy only to requests destined for the specific overloaded entity rather than all matching requests.
section: 5.3.3
topics:
    - sip
    - realtime
