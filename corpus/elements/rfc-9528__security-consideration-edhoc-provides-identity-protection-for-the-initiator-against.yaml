document: rfc-9528
kind: security-consideration
summary: EDHOC provides identity protection for the Initiator against active attackers via the SIGMA-I design; the Responder's identity is protected against passive attackers only. Unprotected data in message_1 (METHOD, SUITES_I, G_X, C_I, EAD_1) is visible to observers and may reveal information about endpoints and supported capabilities.
section: "9.5"
topics:
    - security
    - privacy
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
