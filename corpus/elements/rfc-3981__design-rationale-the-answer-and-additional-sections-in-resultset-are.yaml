document: rfc-3981
kind: design-rationale
summary: 'The <answer> and <additional> sections in <resultSet> are separated to allow easier client processing: <answer> contains direct query results (root nodes in a tree widget), while <additional> contains pre-fetched referral results (leaf nodes), eliminating requeries while preserving the distinction for display purposes.'
