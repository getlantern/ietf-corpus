document: rfc-8765
kind: normative-requirement
summary: In the fallback-to-polling case, the interval between successive DNS queries for the same name, type, and class SHOULD be at least the minimum of 900 seconds (15 minutes) or two seconds more than the TTL of the answer RRset.
section: "6.8"
rfc2119_level: SHOULD
topics:
    - dns
