document: rfc-5677
kind: normative-requirement
summary: To discover a Mobility Server in the home network (Scenario S1), the MN SHOULD use the DNS-based MoS discovery method (RFC 5679). Alternatively, the MN MAY use DHCP options for MoS discovery (RFC 5678).
section: "5.1"
rfc2119_level: SHOULD
topics:
