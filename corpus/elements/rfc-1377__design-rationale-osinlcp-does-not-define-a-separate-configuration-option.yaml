document: rfc-1377
kind: design-rationale
summary: OSINLCP does not define a separate configuration option for OSI Network Layer address exchange; instead, the ES-IS protocol (ISO 9542) is used. ES-IS already provides a mechanism for determining the neighbor's Network Layer address(es) and whether the neighbor is an End System or Intermediate System.
section: "2.3"
topics:
    - ip
    - routing
