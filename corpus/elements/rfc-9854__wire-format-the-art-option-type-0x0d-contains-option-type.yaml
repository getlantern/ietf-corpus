document: rfc-9854
kind: wire-format
summary: 'The ART option (Type 0x0D) contains: Option Type (8-bit), Option Length (8-bit), Dest SeqNo (8-bit), 1 reserved X bit, Prefix Length (7 bits), and a variable-length Target Prefix/Address field of Ceil(Prefix Length/8) octets; if Prefix Length is 0 the address field is 128 bits and represents an IPv6 address rather than a prefix.'
section: "4.3"
topics:
    - routing
