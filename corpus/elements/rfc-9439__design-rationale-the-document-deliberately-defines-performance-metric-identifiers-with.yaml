document: rfc-9439
kind: design-rationale
summary: The document deliberately defines performance metric identifiers with coarse-grained semantics (name, description, units, measurement points) only, and uses the optional 'cost-context' mechanism to allow servers to optionally supply fine-grained details (method of measurement, parameters). This avoids requiring ALTO servers to always provide full IPPM-style six-component specifications that may not be feasible from routing-protocol data sources.
section: "3"
topics:
