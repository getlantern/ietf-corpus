document: rfc-5751
kind: design-rationale
summary: 'The SMIMECapabilities attribute is intentionally designed for simple table lookups and binary comparisons: DER encoding for any given capability MUST be identical across implementations. Algorithm profiles SHOULD explicitly document the correct byte sequence for common cases to ensure interoperability.'
