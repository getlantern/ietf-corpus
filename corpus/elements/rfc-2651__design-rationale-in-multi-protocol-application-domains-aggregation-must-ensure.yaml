document: rfc-2651
kind: design-rationale
summary: In multi-protocol application domains, aggregation must ensure referral chains never pass through mesh nodes that don't support the client's native protocol, because clients cannot resolve referrals they can't speak. This is declared a failure of query routing.
section: 3.2.3
