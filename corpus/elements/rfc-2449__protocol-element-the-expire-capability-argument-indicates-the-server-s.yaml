document: rfc-2449
kind: protocol-element
summary: The EXPIRE capability argument indicates the server's minimum guaranteed message retention period in days, or NEVER (no deletion) or 0 (messages must be deleted each session). An optional 'USER' token signals that per-user values are available after authentication.
