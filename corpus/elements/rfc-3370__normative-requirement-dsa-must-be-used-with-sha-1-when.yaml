document: rfc-3370
kind: normative-requirement
summary: DSA MUST be used with SHA-1. When id-dsa-with-sha1 is used, the AlgorithmIdentifier parameters field MUST be absent. DSA parameters (p, q, g) in the certificate AlgorithmIdentifier are optional; if absent the subject uses the same parameters as the issuer.
section: "3.1"
rfc2119_level: MUST
topics:
    - crypto
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
