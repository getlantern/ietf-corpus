document: rfc-5953
kind: interoperability-note
summary: The standard VACM access control model constrains securityNames to 32 octets or less. A tmSecurityName derived from an IPv6 subjectAltName iPAddress (32 hex chars) combined with a TSM transport prefix produces a 36-octet securityName that cannot be used with standard VACM or TARGET MIB modules.
section: 4.1.1
topics:
    - snmp
    - tls
    - pkix
