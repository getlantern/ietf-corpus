document: rfc-2290
kind: normative-requirement
summary: Ack(IP=0) MUST NOT be sent by a peer. An implementation MUST NOT use 0 as its IP address upon receiving Ack(IP=0), but MAY use some other non-zero interface address for packets sent on its PPP interface.
section: "2.5"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
