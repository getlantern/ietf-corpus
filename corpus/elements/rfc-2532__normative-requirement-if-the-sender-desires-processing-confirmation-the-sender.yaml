document: rfc-2532
kind: normative-requirement
summary: If the sender desires processing confirmation, the sender MUST request Message Disposition Notification per RFC 2298. MDNs MUST NOT be used for delivery confirmation — they are only useful for disposition notification.
section: 2.1.2
rfc2119_level: MUST NOT
