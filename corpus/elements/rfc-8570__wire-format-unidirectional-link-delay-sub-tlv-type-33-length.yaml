document: rfc-8570
kind: wire-format
summary: 'Unidirectional Link Delay sub-TLV (Type 33, Length 4): a 1-bit Anomalous (A) flag, 7-bit RESERVED, and a 24-bit integer Delay field in microseconds representing average forward-path latency. Maximum encodable value is 16,777,215 (≈16.8 s), meaning ''at least that value''.'
