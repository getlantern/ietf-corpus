document: rfc-8930
kind: design-rationale
summary: The MPLS label-swapping concept is leveraged to forward 6LoWPAN fragments that have no network-layer header (since fragmentation occurs below IP). The Datagram_Tag acts analogously to an MPLS label, enabling forwarding without examining IP headers in non-first fragments.
section: "2.2"
topics:
