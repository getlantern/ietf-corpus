document: rfc-2745
kind: normative-requirement
summary: A DREQ message MUST always consist of a single unfragmented IP datagram. One DREQ may generate multiple DREP packets, each carrying a fragment of the total response, reassembled by the requester.
section: "2"
rfc2119_level: MUST
