document: rfc-4842
kind: normative-requirement
summary: During negative pointer adjustment events, CEP implementations MUST include the H3 (or V3) byte in the SONET/SDH fragment; during positive pointer adjustment events, the stuff byte MUST be removed from the fragment. VT emulation implementations MUST NOT carry VT pointer bytes V1, V2, V3, and V4 as part of the CEP payload (except V3 during negative pointer adjustment).
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
