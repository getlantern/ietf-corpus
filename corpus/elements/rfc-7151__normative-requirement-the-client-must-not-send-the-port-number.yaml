document: rfc-7151
kind: normative-requirement
summary: The client MUST NOT send the port number as part of the HOST command, even when connecting to a non-standard port. The server-PI MUST respond with a 501 reply if a port number is included.
section: "3.1"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
