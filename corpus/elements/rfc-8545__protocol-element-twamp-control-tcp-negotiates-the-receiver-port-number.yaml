document: rfc-8545
kind: protocol-element
summary: TWAMP-Control (TCP) negotiates the Receiver Port number for TWAMP-Test (UDP) sessions. The Control-Client proposes a port from the Dynamic Ports range; the Session-Reflector sends and receives TWAMP-Test packets on that same UDP port.
