document: rfc-9869
kind: normative-requirement
summary: Use of DPLPMTUD MUST be explicitly enabled by the application. A DPLPMTUD receiver MUST NOT respond to a UDP REQ Option until DPLPMTUD has been enabled, to protect against misuse of the mechanism for other forms of probing.
section: "3"
rfc2119_level: MUST
topics:
    - udp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
