document: rfc-2110
kind: normative-requirement
summary: When HTML is transferred through mail, the charset parameter SHOULD be included in the Content-Type header rather than relying on the default, because the default charset differs between transport mechanisms (HTTP vs. MIME).
section: "11"
rfc2119_level: SHOULD
