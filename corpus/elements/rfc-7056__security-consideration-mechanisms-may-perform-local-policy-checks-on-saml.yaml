document: rfc-7056
kind: security-consideration
summary: Mechanisms may perform local policy checks on SAML assertions, attributes, and name identifiers. If an application accesses the same SAML assertion through a different path (e.g., via [AAA-SAML]), it may get different results; this is intended, since different paths may apply different policy checks.
section: "7"
topics:
    - security
