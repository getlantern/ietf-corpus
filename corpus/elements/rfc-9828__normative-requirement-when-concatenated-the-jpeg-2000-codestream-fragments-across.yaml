document: rfc-9828
kind: normative-requirement
summary: When concatenated, the JPEG 2000 codestream fragments across all RTP packets MUST form a valid sequence of JPEG 2000 codestreams, where successive codestreams MAY be separated by padding bytes. Each padding byte MUST be set to zero by the sender and MUST be ignored by the receiver.
section: "5.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
