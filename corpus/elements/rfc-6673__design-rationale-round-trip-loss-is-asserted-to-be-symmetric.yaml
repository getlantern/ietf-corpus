document: rfc-6673
kind: design-rationale
summary: 'Round-trip loss is asserted to be symmetric: Type-P-Round-trip-Loss(Src->Dst->Src) = Type-P-Round-trip-Loss(Dst->Src->Dst). This simplification (following RFC 2681) introduces minor ambiguity but is justified by measurement efficiency.'
