document: rfc-9362
kind: protocol-element
summary: The 'non-max-retransmit' attribute echoes NON_MAX_RETRANSMIT from RFC 9177, representing the maximum number of times retransmission of missing payloads can be requested without a remote peer response. It is optional, encoded as uint16, with a DOTS default of 3 (not CoAP's 4), and maps to CBOR key 32777.
section: "3"
topics:
