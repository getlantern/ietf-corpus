document: rfc-9035
kind: design-rationale
summary: The intent of this specification is to perform the migration from uncompressed to compressed exactly once ('once and for all') without the need for a flag day, and the 'T' flag is not designed to be toggled back and forth; rollback is possible but SHOULD be complete before non-RFC-8138 nodes are added.
section: "5"
topics:
