document: rfc-3645
kind: normative-requirement
summary: When GSS_Accept_sec_context returns GSS_S_COMPLETE with a non-NULL output_token, the server MUST return it to the client in the Key Data field of the TKEY RDATA, and the response message MUST be signed with a TSIG record.
section: 4.1.3
rfc2119_level: MUST
