document: rfc-8436
kind: interoperability-note
summary: In deployed networks, bleaching (intentionally setting to zero) of the IP Precedence field continues to be used, causing the first three bits of the DSCP field to become zero. DSCP assignments for PHBs like LE must account for this behavior to avoid unintentional traffic reclassification.
section: "1"
topics:
    - diffserv
    - qos
    - ip
