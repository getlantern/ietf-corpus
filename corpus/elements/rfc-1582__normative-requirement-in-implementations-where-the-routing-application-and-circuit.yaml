document: rfc-1582
kind: normative-requirement
summary: In implementations where the routing application and circuit manager have independent lifecycles, a keep-alive mechanism MUST be provided between them so that if either dies and restarts, they can resynchronize their state tables.
section: "8"
rfc2119_level: MUST
topics:
    - routing
