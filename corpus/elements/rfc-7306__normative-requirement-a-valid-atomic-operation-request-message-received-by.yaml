document: rfc-7306
kind: normative-requirement
summary: A valid Atomic Operation Request Message received by the Responder MUST be processed by the RDMAP layer and MUST NOT be delivered to the Responder's ULP. The Responder MUST reply with a valid Atomic Operation Response Message for every valid request received.
section: 5.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
