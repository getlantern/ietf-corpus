document: rfc-6439
kind: protocol-element
summary: A non-DRB RBridge processes Appointed Forwarder sub-TLVs only when the TRILL Hello arrives from the winning DRB port. Appointments specify contiguous intervals of VLAN IDs; the receiver becomes Appointed Forwarder only for those VLANs in the interval that are enabled on its ports. VLANs not included in any sub-TLV cause the receiver to lose prior Appointed Forwarder status for those VLANs.
section: 2.2.1
topics:
    - routing
