document: rfc-3308
kind: wire-format
summary: The CCDS AVP is encoded as a fixed 8-octet AVP with Vendor ID 0, Attribute Type 47, optional M and H bits, and a 16-bit left-justified PHB Code field in the last two octets. The length (before hiding) MUST be 8 octets.
