document: rfc-3946
kind: design-rationale
summary: The optional 'VC-3 via AU-3 at the end' signal type (value 20, Appendix 1) was introduced to accommodate LSRs that can only demultiplex a VC-3 received via the AU-3 branch, not the TU-3/TUG-3/VC-4/AU-4 branch, due to hardware switching fabric constraints. This allows the penultimate LSR to switch the VC-3 to the required branch before delivery.
section: Appendix 1
topics:
