document: rfc-9628
kind: normative-requirement
summary: For scalable streams, a VP9 frame that follows a frame that might be removed (in full decode order) MUST be encoded with 'error_resilient_mode' set to true, to prevent dependency on frames that could legitimately be absent.
section: "4.4"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
