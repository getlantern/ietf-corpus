document: rfc-3212
kind: normative-requirement
summary: When a Label Request Message includes CR-TLVs, ordered control MUST be used to set up the CR-LSP. An LSR implicitly infers ordered control from the existence of one or more CR-TLVs, even if configured for independent control for dynamically routed LSPs.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
