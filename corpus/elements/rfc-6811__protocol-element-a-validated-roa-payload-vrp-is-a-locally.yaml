document: rfc-6811
kind: protocol-element
summary: A Validated ROA Payload (VRP) is a locally stored object with content (IP address, prefix length, maximum length, origin AS number), loaded by the BGP speaker from the RPKI cache. VRPs form the database against which BGP routes are validated.
