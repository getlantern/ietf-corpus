document: rfc-8040
kind: normative-requirement
summary: The server MUST implement the 'ietf-yang-library' module (RFC 7895), which MUST identify all YANG modules used by the server in the 'modules-state/module' list. This defines the set of supported data nodes, RPC operations, and event notifications.
section: "1.3"
rfc2119_level: MUST
