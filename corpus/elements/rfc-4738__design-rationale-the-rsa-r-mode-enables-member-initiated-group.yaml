document: rfc-4738
kind: design-rationale
summary: The RSA-R mode enables member-initiated group key download, where group members (as MIKEY Initiators) request keying material from a group key server (the Responder). This contrasts with the group manager pushing keys to members and aligns with the MSEC group key management architecture (RFC 4046).
section: "2.2"
topics:
