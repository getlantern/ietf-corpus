document: rfc-2047
kind: normative-requirement
summary: Only printable and white space character data should be encoded using encoded-words. Mail readers SHOULD ensure that display of decoded data will not cause unwanted side-effects on the recipient's terminal, since the encoding allows arbitrary octet values.
section: "5"
rfc2119_level: SHOULD
topics:
    - email
    - security
