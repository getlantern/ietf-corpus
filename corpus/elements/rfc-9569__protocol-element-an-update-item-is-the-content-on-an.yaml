document: rfc-9569
kind: protocol-element
summary: An update item is the content on an edge of the updates graph, represented as a pair (op, data) where op indicates snapshot or incremental update, and data is the content. Mandatory incremental updates exist between consecutive versions i and i+1; optional shortcut updates may exist between non-consecutive versions.
section: "3.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
