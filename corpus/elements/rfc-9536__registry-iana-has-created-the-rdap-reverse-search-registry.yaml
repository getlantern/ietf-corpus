document: rfc-9536
kind: registry
summary: IANA has created the "RDAP Reverse Search" registry using the Specification Required policy. Entries are keyed by the triple (Searchable Resource Type, Related Resource Type, Property), which MUST be unique. Initial entries cover fn, handle, email, and role properties for domains/nameservers/entities with related resource type entity.
section: 11.2.3
