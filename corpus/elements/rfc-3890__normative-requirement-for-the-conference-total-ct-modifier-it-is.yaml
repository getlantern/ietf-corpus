document: rfc-3890
kind: normative-requirement
summary: For the Conference Total (CT) modifier, it is RECOMMENDED that the CT value be calculated using reasonable worst-case overhead, taking the largest transport protocol overhead plus the largest IP overhead expected, summed across all media streams.
section: "6.1"
rfc2119_level: RECOMMENDED
