document: rfc-5247
kind: normative-requirement
summary: An EAP method supporting key derivation MUST export an MSK of at least 64 octets and an EMSK of at least 64 octets. The EMSK MUST be at least as long as the MSK in size.
section: "1.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
