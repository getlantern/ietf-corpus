document: rfc-2184
kind: wire-format
summary: An extended parameter is encoded as `name*=charset'language'encoded-value` where an asterisk at the end of the parameter name signals that character set and language information precede the actual value, delimited by single quotes. Octets are percent-encoded using `%XX` hexadecimal notation.
