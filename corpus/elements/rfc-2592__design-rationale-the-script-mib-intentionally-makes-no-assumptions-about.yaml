document: rfc-2592
kind: design-rationale
summary: The Script MIB intentionally makes no assumptions about script languages, allowing use with Tcl, Java, compiled native code, or any other language. Languages are identified by OIDs registered with IANA or in enterprise OID subtrees, combined with version numbers, vendor OIDs, and implementation revision strings to enable precise capability matching.
section: "4.1"
topics:
