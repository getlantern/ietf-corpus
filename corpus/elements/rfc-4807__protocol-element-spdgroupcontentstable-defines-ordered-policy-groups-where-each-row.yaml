summary: spdGroupContentsTable defines ordered policy groups where each row (indexed by spdGroupContName, spdGroupContPriority) references either a rule (spdRuleDefinitionTable) or a sub-group, as indicated by spdGroupContComponentType. An optional per-row spdGroupContFilter pre-screens the component.
