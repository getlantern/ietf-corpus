document: rfc-9990
kind: protocol-element
summary: 'Policy override types for the ''reason'' element are: ''local_policy'' (receiver''s local policy exempted the message), ''mailing_list'' (message routed through mailing list), ''policy_test_mode'' (exempted by ''t'' tag), ''trusted_forwarder'' (known trusted forwarder), and ''other'' (anything else).'
