document: rfc-7572
kind: normative-requirement
summary: An IM-aware SIP-to-XMPP gateway SHOULD process SIP messages that contain message bodies of type "text/html"; if so, the gateway MUST transform the "text/html" content into XHTML content conforming to the XHTML-IM Integration Set (XEP-0071).
section: "7"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
