document: rfc-2261
kind: protocol-element
summary: A securityName is a human-readable string representing a principal (the 'who' on whose behalf services are provided). It has a model-independent format and can be used outside a particular Security Model. A model-dependent security ID is the model-specific representation of a securityName within a particular Security Model (e.g., community names, user names).
section: 3.2.2
topics:
