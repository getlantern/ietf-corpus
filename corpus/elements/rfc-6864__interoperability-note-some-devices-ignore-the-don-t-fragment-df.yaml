document: rfc-6864
kind: interoperability-note
summary: Some devices ignore the Don't Fragment (DF) bit and fragment datagrams regardless. Such DF-ignoring devices do not comply with existing standards; if fragments with reused IDs arrive interleaved at a destination, reassembly fails and traffic is silently dropped. This document does not make such devices compliant.
section: "5.1"
topics:
    - ip
