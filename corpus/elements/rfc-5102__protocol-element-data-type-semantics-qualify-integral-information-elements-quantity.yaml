document: rfc-5102
kind: protocol-element
summary: 'Data type semantics qualify integral Information Elements: ''quantity'' (discrete measured value), ''totalCounter'' (cumulative, counts independently of export and wraps at type limit), ''deltaCounter'' (reset to 0 on each export), ''identifier'' (equality comparisons only; arithmetic is meaningless), and ''flags'' (bitfield; logical operations appropriate).'
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
