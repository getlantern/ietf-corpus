document: rfc-5576
kind: protocol-element
summary: The 'cname' source attribute (a=ssrc:<ssrc-id> cname:<cname>) associates a media source with its RTCP CNAME SDES item. It MUST follow RFC 3550 CNAME syntax conventions and MUST NOT occur more than once for the same ssrc-id within a media stream.
section: "6.1"
topics:
    - rtp
    - realtime
