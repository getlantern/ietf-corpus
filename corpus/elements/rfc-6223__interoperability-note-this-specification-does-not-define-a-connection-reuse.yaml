document: rfc-6223
kind: interoperability-note
summary: This specification does not define a connection reuse mechanism. Entities that want to reuse connections MUST use a separate mechanism (e.g., RFC 5923 "alias" parameter) alongside the "keep" parameter, as the keep-alive mechanism only negotiates keep-alive sending/receiving and does not address the security aspects of connection reuse.
section: "6"
topics:
    - sip
    - nat
