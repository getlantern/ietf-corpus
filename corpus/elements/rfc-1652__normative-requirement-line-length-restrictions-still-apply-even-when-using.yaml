document: rfc-1652
kind: normative-requirement
summary: 'Line length restrictions still apply even when using 8BITMIME: servers may limit lines to as few as 1000 octets between two CR-LF pairs. This extension MAY support 8BIT content-transfer-encoding but does NOT provide a means of transferring BINARY content-transfer-encoding.'
section: "3"
rfc2119_level: MAY
topics:
