document: rfc-9303
kind: wire-format
summary: The LISP-SEC ECM Authentication Data consists of a fixed header with ECM AD Type (8 bits), Requested HMAC ID (16 bits), followed by OTK-AD containing OTK Length (16 bits), Key ID (8 bits), OTK Wrapping ID (8 bits), One-Time-Key Preamble (64 bits), and One-Time Key (128 bits), then EID-AD containing EID-AD Length, KDF ID, Record Count, E-bit, EID HMAC ID, per-record EID mask-len/AFI/Prefix, and EID HMAC.
section: "6.1"
topics:
    - security
    - crypto
    - routing
