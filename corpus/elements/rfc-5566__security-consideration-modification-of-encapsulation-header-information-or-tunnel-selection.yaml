document: rfc-5566
kind: security-consideration
summary: Modification of encapsulation header information or tunnel selection data may cause user packets to be misrouted, misdelivered, or dropped. When IPsec is in use, misdelivery is likely to result in authentication or decryption failure at the receiver, providing a built-in detection mechanism.
section: "5"
topics:
    - bgp
    - ipsec
    - security
