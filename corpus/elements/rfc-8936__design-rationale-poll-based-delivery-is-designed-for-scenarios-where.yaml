document: rfc-8936
kind: design-rationale
summary: Poll-based delivery is designed for scenarios where the recipient can make outbound HTTP requests but may not be able to receive push notifications. It is an alternative to push-based delivery (RFC 8935), chosen when the recipient cannot host a publicly reachable endpoint.
