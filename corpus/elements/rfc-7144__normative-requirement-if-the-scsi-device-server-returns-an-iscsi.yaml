document: rfc-7144
kind: normative-requirement
summary: If the SCSI device server returns an iSCSI version descriptor in standard INQUIRY data, the value MUST be set to the sum of the base value 0960h plus the negotiated iSCSIProtocolLevel (e.g., iSCSIProtocolLevel=2 yields 0962h).
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
