document: rfc-7880
kind: normative-requirement
summary: If an SBFDInitiator receives an S-BFD Control packet with the Demand (D) bit set, the packet MUST be discarded. This is symmetric to the reflector's D-bit check and prevents loop exploitation.
section: 7.3.3
rfc2119_level: MUST
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
