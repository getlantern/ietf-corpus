document: rfc-5384
kind: design-rationale
summary: Join Attributes are only useful within a single administrative domain (or small set of cooperating domains) where it can be determined a priori that all deployed PIM routers understand the type 1 Encoded-Source Address and any specific attributes in use, because routers that do not understand type 1 cannot process the Join at all.
section: "3.1"
topics:
    - multicast
