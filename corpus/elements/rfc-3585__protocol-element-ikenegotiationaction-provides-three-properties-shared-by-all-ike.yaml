summary: 'IKENegotiationAction provides three properties shared by all IKE/IPsec negotiation actions: MinLifetimeSeconds (minimum acceptable SA lifetime in seconds; 0=no minimum), MinLifetimeKilobytes (minimum kilobyte lifetime; 0=no minimum), and IdleDurationSeconds (inactivity timeout before SA deletion; 0=disable idle detection).'
