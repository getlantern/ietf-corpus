document: rfc-8627
kind: normative-requirement
summary: Repair packets with L=0 and D=0 in the fixed-variant FEC header MUST be ignored by the receiver. Current FLEX FEC implementations MUST NOT send packets with R=1 and F=1 (reserved variant), and receivers MUST ignore them.
section: 4.2.2
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
