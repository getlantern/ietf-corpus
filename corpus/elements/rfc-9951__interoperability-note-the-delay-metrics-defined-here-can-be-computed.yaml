document: rfc-9951
kind: interoperability-note
summary: The delay metrics defined here can be computed using IOAM (RFC 9197) via the Edge-to-Edge or Direct Exporting Option-Type, or using the Enhanced Alternate Marking Method per RFC 9947 applied to SRv6 Segment Routing Headers. Implementations must document at which forwarding-plane point the encapsulating timestamp is introduced.
