document: rfc-5568
kind: wire-format
summary: 'Fast Binding Update (FBU): Mobility Header Type 8, identical format to MIPv6 BU. Source is PCoA (from PAR''s link) or NCoA (from NAR''s link). ''A'' flag MUST be 1, ''H'' flag MUST be 1. Mobility Options MUST contain alternate CoA (set to NCoA when sent from PAR''s link) and BADF option.'
section: 6.2.2
topics:
