document: rfc-3454
kind: normative-requirement
summary: Stored strings using a stringprep profile MUST NOT contain any unassigned code points. Queries for matching strings MAY contain unassigned code points. This is the only place where requirements for queries differ from requirements for stored strings.
section: "7"
rfc2119_level: MUST
topics:
    - security
