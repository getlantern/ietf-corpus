document: rfc-3641
kind: protocol-element
summary: ChoiceOfStrings types are ASN.1 CHOICE types declared to be purely syntactic (no semantic significance to the chosen alternative), where every alternative is a restricted string type and all alternatives use different string types with identical or absent constraints. Declaring a type ChoiceOfStrings allows more compact encoding.
section: "3.3"
topics:
