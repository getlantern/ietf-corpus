document: rfc-9071
kind: wire-format
summary: Each multiparty-aware RTP packet carries CC=1, a single-element CSRC list containing the originating source SSRC, and a 'text/red' payload with one primary T140block and typically two redundant T140block generations. Timestamp offset fields in the redundancy header use the same clock tick units as the RTP timestamp.
section: "3.1"
