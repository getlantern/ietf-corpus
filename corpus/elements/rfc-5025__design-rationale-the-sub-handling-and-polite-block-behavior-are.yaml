document: rfc-5025
kind: design-rationale
summary: The <sub-handling> and polite-block behavior are combined into a single element because proper privacy handling requires a correlation between the subscription authorization decision and whether polite blocking is used. If they were separate, the combination algorithm would treat them independently.
