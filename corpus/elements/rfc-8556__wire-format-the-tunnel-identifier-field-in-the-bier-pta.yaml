document: rfc-8556
kind: wire-format
summary: 'The Tunnel Identifier field in the BIER PTA has three subfields: Sub-domain-id (1 octet identifying the BIER sub-domain), BFR-id (2 octets, the BFR-id of the PTA-constructing router in that sub-domain), and BFR-prefix (4 octets for IPv4 /32 or 16 octets for IPv6 /128). IPv4 vs. IPv6 is inferred from the total PTA length.'
section: "2"
topics:
