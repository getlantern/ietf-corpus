document: rfc-2388
kind: normative-requirement
summary: The sending application MAY supply a file name via the 'filename' parameter in the Content-Disposition header. If the sender's OS filename is not in US-ASCII, it might be approximated or encoded using RFC 2231.
section: "4.4"
rfc2119_level: MAY
topics:
