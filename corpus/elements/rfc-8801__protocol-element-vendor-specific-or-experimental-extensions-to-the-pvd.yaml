document: rfc-8801
kind: protocol-element
summary: Vendor-specific or experimental extensions to the PvD Additional Information JSON MUST use sub-dictionaries rather than top-level keys. Sub-dictionary keys SHOULD use a URN namespace if available, or follow the format 'vendor-*' for other private use (e.g., 'vendor-foobar'). Unknown sub-dictionary keys MUST be ignored.
section: "4.3"
topics:
    - ip
    - json
    - registry
