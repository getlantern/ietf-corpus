document: rfc-8022
kind: protocol-element
summary: A Routing Information Base (RIB) is represented as an entry of '/routing-state/ribs/rib' and contains only routes of one address family (an identity derived from 'rt:address-family'). The 'active-route' action returns the active RIB route for a given destination address.
section: "5.2"
