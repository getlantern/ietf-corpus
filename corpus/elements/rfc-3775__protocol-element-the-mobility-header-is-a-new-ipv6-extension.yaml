document: rfc-3775
kind: protocol-element
summary: 'The Mobility Header is a new IPv6 extension header (Next Header value 135) used by mobile nodes, correspondent nodes, and home agents for all binding management messaging. It carries eight message types: Binding Refresh Request (0), Home Test Init (1), Care-of Test Init (2), Home Test (3), Care-of Test (4), Binding Update (5), Binding Acknowledgement (6), and Binding Error (7).'
section: "6.1"
topics:
