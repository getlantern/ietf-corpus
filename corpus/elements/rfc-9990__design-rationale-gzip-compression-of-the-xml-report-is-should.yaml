document: rfc-9990
kind: design-rationale
summary: GZIP compression of the XML report is SHOULD-level rather than MUST because compression adds compute cost, but is strongly recommended because uncompressed aggregate XML can exceed SMTP maximum message size limits at receiving Mail Receivers.
section: 3.5.2
