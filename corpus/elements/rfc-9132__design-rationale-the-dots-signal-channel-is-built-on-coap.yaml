document: rfc-9132
kind: design-rationale
summary: The DOTS signal channel is built on CoAP because CoAP's features — expectation of packet loss, asynchronous Non-confirmable messaging, congestion control, small message overhead, and (D)TLS support — make it well-suited for DDoS signaling, which must remain functional under attack conditions.
