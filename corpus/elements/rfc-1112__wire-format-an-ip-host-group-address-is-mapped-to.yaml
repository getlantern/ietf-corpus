document: rfc-1112
kind: wire-format
summary: An IP host group address is mapped to an Ethernet multicast address by placing the low-order 23 bits of the IP address into the low-order 23 bits of the base Ethernet multicast address 01-00-5E-00-00-00. Because IP Class D has 28 significant bits, multiple group addresses may map to the same Ethernet address.
section: "6.4"
topics:
    - multicast
    - ip
