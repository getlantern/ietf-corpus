document: rfc-5061
kind: normative-requirement
summary: All addresses added via a received ASCONF chunk MUST be placed into the UNCONFIRMED state and MUST have path verification performed before they can be used as destinations, as defined in RFC 4960 Section 5.4 (rule F14).
section: "5.3"
rfc2119_level: MUST
topics:
    - sctp
    - multipath
