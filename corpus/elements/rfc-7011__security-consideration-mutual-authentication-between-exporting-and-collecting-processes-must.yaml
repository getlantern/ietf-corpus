document: rfc-7011
kind: security-consideration
summary: Mutual authentication between Exporting and Collecting Processes MUST be performed using TLS or DTLS with certificate-based authentication. The Collecting Process MUST authenticate the Exporting Process and vice versa to prevent unauthorized data export or collection.
section: "11.3"
rfc2119_level: MUST
topics:
