document: rfc-5368
kind: design-rationale
summary: No mechanism is provided for REFER-Issuers to receive per-target result status via the REFER itself; result tracking is application-specific (e.g., subscribing to the conference state event package RFC 4575). A future extension could enable per-target reporting without the norefersub suppression.
section: "3"
topics:
    - sip
