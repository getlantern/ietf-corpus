document: rfc-3520
kind: protocol-element
summary: SOURCE_ADDR (X-Type 3) and DEST_ADDR (X-Type 4) carry the authorized session endpoint addresses. Both support IPv4 (32-bit), IPv6 (128-bit), UDP_PORT_LIST (16 bits per entry), and TCP_PORT_LIST (16 bits per entry) sub-types.
