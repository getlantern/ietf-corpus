document: rfc-3101
kind: normative-requirement
summary: When an elected translator is deposed, aggregated Type-5 LSAs (from Type-7 address range aggregation) MUST be flushed after TranslatorStabilityInterval expires. Translated Type-5 LSAs (one-to-one translations) are NOT immediately flushed but age out normally to minimize flooding impact.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
