document: rfc-2155
kind: normative-requirement
summary: 'Counter discontinuity detection is provided via three TimeStamp objects: appnNodeCounterDisconTime, appnPortCounterDisconTime, and appnLsCounterDisconTime, each recording sysUpTime at the last re-initialization of the respective resource. Management stations must monitor these to detect counter wraps or resets.'
section: "4"
rfc2119_level: SHOULD
topics:
    - snmp
