document: rfc-4818
kind: interoperability-note
summary: When used in Diameter, Delegated-IPv6-Prefix uses AVP Code 123 from the RADIUS attribute compatibility space (codes 1–255) with data type OctetString. No translation is required for Diameter/RADIUS gateways beyond header, alignment, and padding changes.
