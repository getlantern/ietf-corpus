document: rfc-6295
kind: design-rationale
summary: The recovery journal uses stream history coding rather than packet retransmission to satisfy the no-indefinite-artifacts mandate. This avoids the latency penalty of retransmission-based schemes, making the format suitable for interactive real-time musical performance where retransmitted packets arrive too late to be useful.
