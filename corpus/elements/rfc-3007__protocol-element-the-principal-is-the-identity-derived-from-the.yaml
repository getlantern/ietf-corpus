document: rfc-3007
kind: protocol-element
summary: The principal is the identity derived from the message signing key. For SIG(0), the principal is the owner of the KEY RR that generated the SIG(0). For a statically configured TSIG, the principal is derived from the shared secret name. For a dynamically configured TSIG, the principal is the one that authenticated the TKEY process.
section: "2"
topics:
