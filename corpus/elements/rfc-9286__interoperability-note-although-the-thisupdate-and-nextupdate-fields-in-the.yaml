document: rfc-9286
kind: interoperability-note
summary: Although the thisUpdate and nextUpdate fields in the manifest eContent MUST match the corresponding fields in the associated CRL, RPs MUST NOT reject a manifest solely because these fields are not identical. The check is advisory, not grounds for rejection.
section: "4.4"
topics:
