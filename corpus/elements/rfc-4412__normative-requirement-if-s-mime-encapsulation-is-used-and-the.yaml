document: rfc-4412
kind: normative-requirement
summary: If S/MIME encapsulation is used and the Resource-Priority header is included in a signed message fragment, the S/MIME-signed SIP message or fragment MUST contain at minimum the Date, To, From, Call-ID, and Resource-Priority header fields to be considered valid authentication.
section: "11.3"
rfc2119_level: MUST
topics:
    - sip
    - security
    - crypto
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
