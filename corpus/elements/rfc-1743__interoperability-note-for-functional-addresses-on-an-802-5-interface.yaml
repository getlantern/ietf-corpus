document: rfc-1743
kind: interoperability-note
summary: 'For functional addresses on an 802.5 interface, only one ifRcvAddressTable entry is required: the entry whose ifRcvAddressAddress is the logical AND of the functional address bit with the bitmask of all functional addresses the interface accepts. The format matches ifPhysAddress.'
section: 3.3.4
