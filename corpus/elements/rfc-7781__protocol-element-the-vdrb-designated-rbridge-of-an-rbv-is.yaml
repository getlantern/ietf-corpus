document: rfc-7781
kind: protocol-element
summary: The vDRB (Designated RBridge of an RBv) is the member RBridge with the largest IS-IS System ID considered as an unsigned integer. The vDRB is responsible for selecting an available nickname as the pseudo-nickname for the RBv and announcing it via PN-RBv APPsub-TLV in E-L1FS FS-LSPs.
section: "4.2"
topics:
