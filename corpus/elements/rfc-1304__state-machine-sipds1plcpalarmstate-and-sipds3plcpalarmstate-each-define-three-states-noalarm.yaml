summary: 'sipDS1PLCPAlarmState and sipDS3PLCPAlarmState each define three states: noAlarm (no alarms present), receivedFarEndAlarm (incoming Yellow Signal received), and incomingLOF (loss of frame failure condition declared). Transitions are triggered by physical layer events per TR-TSV-000773.'
