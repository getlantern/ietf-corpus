document: rfc-4196
kind: protocol-element
summary: SEED is a 128-bit symmetric key block cipher with a 128-bit block size and 128-bit key length, using a 16-round Feistel structure. A 128-bit input is divided into two 64-bit blocks; the right 64-bit block is input to the round function with a 64-bit subkey derived from key scheduling.
section: "1.1"
topics:
