document: rfc-793
kind: normative-requirement
summary: A TCP must implement all defined options. The Maximum Segment Size option must only be sent in the initial connection request segment (one with the SYN control bit set); if absent, any segment size is permitted.
section: "3.1"
rfc2119_level: MUST
topics:
    - tcp
