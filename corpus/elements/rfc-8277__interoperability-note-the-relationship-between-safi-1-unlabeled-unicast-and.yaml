document: rfc-8277
kind: interoperability-note
summary: The relationship between SAFI-1 (unlabeled unicast) and SAFI-4 routes for the same prefix is implementation-defined. Some implementations treat them independently ('ships in the night'), others treat them as comparable for best-path selection, and some treat SAFI-1 receipt as an implicit withdrawal of SAFI-4 and vice versa.
section: "5"
topics:
