document: rfc-3645
kind: normative-requirement
summary: To guarantee interoperability between DNS clients and servers supporting GSS-TSIG, DNS servers MUST specify SPNEGO mech_type, and GSS APIs called by both client and server MUST support Kerberos v5. The client's GSS API MUST also support Kerberos v5.
section: "9"
rfc2119_level: REQUIRED
topics:
    - dns
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
