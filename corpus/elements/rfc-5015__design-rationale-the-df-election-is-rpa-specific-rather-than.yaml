document: rfc-5015
kind: design-rationale
summary: The DF election is RPA-specific rather than group-specific. Because all bidirectional groups sharing an RPA have the same upstream direction, a single per-RPA per-link election suffices, significantly reducing the number of elections that must be performed.
section: 3.5.1
topics:
    - multicast
    - routing
