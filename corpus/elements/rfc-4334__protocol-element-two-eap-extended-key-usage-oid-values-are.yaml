document: rfc-4334
kind: protocol-element
summary: 'Two EAP extended key usage OID values are defined: id-kp-eapOverPPP ({ id-kp 13 }) for EAP in PPP environments and id-kp-eapOverLAN ({ id-kp 14 }) for EAP in LAN/WLAN environments. Inclusion of both indicates the certified public key is appropriate for either environment.'
