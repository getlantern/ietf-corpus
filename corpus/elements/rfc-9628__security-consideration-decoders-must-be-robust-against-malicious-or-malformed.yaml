document: rfc-9628
kind: security-consideration
summary: Decoders MUST be robust against malicious or malformed VP9 payloads; a memory overrun in the decoder could lead to arbitrary code execution. The same robustness applies to encoders, though encoder vulnerabilities are typically rarer.
section: "8"
