document: rfc-7780
kind: protocol-element
summary: The Extended Color field (flags word bits 27-28) is a 2-bit field in the non-critical ingress-to-egress region. Ingress switches MAY set these bits for implementation-specific marking; transit switches MUST NOT change them. Support is advertised via the same bit positions in the TRILL version sub-TLV Capabilities field.
section: 10.2.2
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
