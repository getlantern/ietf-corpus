document: rfc-9928
kind: security-consideration
summary: In improperly configured networks where the DHCPv4 client is on the same Layer 2 scope as a DHCPv4 server, DHCPv4 messages could reach the server without traversing the 4o6RA, potentially causing erroneous state or misconfiguration. This is classified as a deployment error rather than a security concern introduced by this specification.
section: "5"
topics:
    - security
    - v6ops
