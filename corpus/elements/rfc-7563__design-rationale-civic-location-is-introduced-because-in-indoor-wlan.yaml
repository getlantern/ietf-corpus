document: rfc-7563
kind: design-rationale
summary: Civic location is introduced because in indoor WLAN (AP) deployments it is difficult to determine geospatial coordinates, yet many location-based applications only require a civic address (street address or room number). The existing Geo-Location sub-option from RFC 6757 is insufficient for these deployments.
section: "1"
topics:
    - mobility
    - ip
