document: rfc-6501
kind: protocol-element
summary: The Conference Object Identifier (XCON-URI) serves as the top-level identifier for a conference within a conferencing system. It acts as a key to access, manipulate, and delete a conference object, and provides an implicit binding to other protocol identifiers (CSP, BFCP, etc.).
