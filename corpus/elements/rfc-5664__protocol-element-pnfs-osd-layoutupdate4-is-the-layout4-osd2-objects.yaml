document: rfc-5664
kind: protocol-element
summary: pnfs_osd_layoutupdate4 is the LAYOUT4_OSD2_OBJECTS opaque body for LAYOUTCOMMIT, containing olu_delta_space_used (optional int64_t delta of OSD-reported capacity consumed by writes) and olu_ioerr_flag (MUST be set to true if I/O errors were encountered, deferring attribute updates until LAYOUTRETURN error report is received).
section: "6.2"
