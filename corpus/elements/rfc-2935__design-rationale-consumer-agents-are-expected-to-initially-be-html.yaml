document: rfc-2935
kind: design-rationale
summary: Consumer agents are expected to initially be HTML browsers, which lack native IOTP capability. The design relies on the browser's MIME type dispatch mechanism to launch a separate IOTP client application when the server returns an APPLICATION/IOTP response, cleanly separating IOTP client lifecycle from the browser.
section: "4"
topics:
