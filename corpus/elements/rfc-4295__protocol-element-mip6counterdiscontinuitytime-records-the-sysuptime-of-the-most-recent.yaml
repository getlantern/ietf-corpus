document: rfc-4295
kind: protocol-element
summary: mip6CounterDiscontinuityTime records the sysUpTime of the most recent occasion on which any global counter under mip6TotalTraffic, mip6CnGlobalStats, or mip6HaGlobalStats suffered a discontinuity; it is zero if no discontinuities have occurred since last re-initialization.
