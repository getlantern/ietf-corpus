document: rfc-8934
kind: normative-requirement
summary: The scheduled TLV MUST be included in the LSP object for scheduled LSPs in PCRpt, PCUpd, PCReq, and PCRep messages. If missing, the receiving PCEP speaker MUST send a PCErr with Error-Type=6 and Error-value=16 (Scheduled TLV missing).
section: "6"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
