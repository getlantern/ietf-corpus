document: rfc-2126
kind: interoperability-note
summary: Class 0 TPDU bit encoding in ITOT no longer allows credit and TPDU-NR (bits 0-6) fields to be ignored on input, correcting the inconsistent encoding rules defined in RFC1006 and aligning with ISO 8073 encoding rules.
