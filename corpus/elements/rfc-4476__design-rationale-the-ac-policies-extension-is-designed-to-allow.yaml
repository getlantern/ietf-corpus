document: rfc-4476
kind: design-rationale
summary: The AC policies extension is designed to allow relying parties to perform an additional validation test — assessing whether an AC's attributes can be accepted under one or more specific ACPs — analogous to the certificate policies extension in PKCs, without defining the content of the ACPs themselves.
