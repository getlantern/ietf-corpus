document: rfc-9322
kind: normative-requirement
summary: An IOAM node that supports reception and processing of the Loopback flag MUST support the ability to limit the rate of looped-back packets. The looped-back data rate SHOULD NOT exceed 1/N of interface capacity, with N>100 RECOMMENDED.
section: "4.2"
rfc2119_level: MUST
topics:
    - measurement
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
