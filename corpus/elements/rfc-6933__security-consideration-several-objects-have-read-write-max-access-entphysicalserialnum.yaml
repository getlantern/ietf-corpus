document: rfc-6933
kind: security-consideration
summary: Several objects have read-write MAX-ACCESS (entPhysicalSerialNum, entPhysicalAlias, entPhysicalAssetID, entPhysicalUris). Unauthorized writes could corrupt inventory and asset-tracking information; implementations should apply SNMPv3 access controls to restrict write operations to authorized principals.
section: "5"
topics:
