document: rfc-3323
kind: normative-requirement
summary: It is highly RECOMMENDED that user agents use network or transport layer security such as TLS when contacting a privacy service. Users SHOULD establish a direct (single pre-loaded Route header) connection to a privacy service to allow certificate inspection and reduce exposure of private information.
section: "4.3"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - privacy
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
