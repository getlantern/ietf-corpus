document: rfc-8888
kind: normative-requirement
summary: When using ECN with RTP, the guidelines in RFC 6679 Sections 7.2, 7.3, and 7.4 MUST be followed, except that feedback is carried in RTCP Congestion Control Feedback Packets rather than RTCP ECN Feedback Packets.
section: "7"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
    - ecn
