document: rfc-7884
kind: design-rationale
summary: S-BFD uses 4-octet discriminators, unique within an administrative domain, to identify network targets, eliminating many BFD negotiations. OSPF floods these discriminators so S-BFD initiators can map target nodes to discriminators and construct probes without per-session negotiation.
section: "1"
topics:
    - routing
    - security
