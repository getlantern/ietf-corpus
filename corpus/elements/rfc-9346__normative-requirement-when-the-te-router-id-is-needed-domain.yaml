document: rfc-9346
kind: normative-requirement
summary: When the TE Router ID is needed domain-wide, the IS-IS Router CAPABILITY TLV MUST be included in the ASBR's LSP. If the ASBR has an IPv4 TE Router ID, the IPv4 TE Router ID sub-TLV MUST be included; if not, the IPv6 TE Router ID sub-TLV MUST be included instead.
section: 3.5.1
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
