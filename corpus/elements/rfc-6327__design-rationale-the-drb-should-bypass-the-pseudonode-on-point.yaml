document: rfc-6327
kind: design-rationale
summary: 'The DRB SHOULD bypass the pseudonode on point-to-point-like links because the pseudonode adds complexity: for two RBridges, using a pseudonode generates 3 LSPs whereas bypass generates only 2. Pseudonodes are valuable only when three or more RBridges have simultaneous Report-state adjacencies.'
section: "6"
topics:
