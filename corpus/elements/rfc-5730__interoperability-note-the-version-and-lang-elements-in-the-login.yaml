document: rfc-5730
kind: interoperability-note
summary: The <version> and <lang> elements in the <login> command MUST exactly match one of the values advertised in the server's <greeting>. Clients negotiate a single protocol version and response language for the duration of the session from the server's advertised set.
section: 2.9.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
