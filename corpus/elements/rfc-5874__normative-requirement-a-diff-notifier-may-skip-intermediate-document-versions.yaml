document: rfc-5874
kind: normative-requirement
summary: A diff notifier MAY skip intermediate document versions (e.g., for rapidly changing resources) but MUST always report changes consistently so the diff client can correctly update the latest state (content and ETag) of locally cached resources.
section: "6"
rfc2119_level: MUST
topics:
