kind: normative-requirement
summary: To announce a TIPS information resource in the IRD, an ALTO server MUST specify the media-type ('application/alto-tips+json'), capabilities (TIPSCapabilities with incremental-change-media-types), and uses (array of resource IDs the TIPS service can serve).
