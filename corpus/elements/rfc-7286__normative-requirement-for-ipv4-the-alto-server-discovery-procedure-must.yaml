document: rfc-7286
kind: normative-requirement
summary: For IPv4, the ALTO server discovery procedure MUST try to retrieve DHCP option 213 (OPTION_V4_ACCESS_DOMAIN). If unavailable, the procedure SHOULD try option 15 (Domain Name); if neither is retrievable the procedure fails for that interface.
section: 3.1.2
rfc2119_level: MUST
topics:
    - ip
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
