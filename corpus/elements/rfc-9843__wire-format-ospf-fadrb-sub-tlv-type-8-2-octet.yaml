document: rfc-9843
kind: wire-format
summary: 'OSPF FADRB sub-TLV (Type 8): 2-octet Type, 2-octet Length (set to 14), 1-octet Flags (G-flag), 3 octets Reserved, 32-bit Reference Bandwidth (IEEE 754), and 32-bit Granularity Bandwidth (IEEE 754). OSPF FADBT sub-TLV (Type 9): Length = 2+N*8 octets; Threshold Metrics are 32-bit (vs. 24-bit in IS-IS), max metric value is 4,294,967,296.'
