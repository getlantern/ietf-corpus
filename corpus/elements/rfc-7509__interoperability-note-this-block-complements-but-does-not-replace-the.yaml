document: rfc-7509
kind: interoperability-note
summary: This block complements but does not replace the RFC 5725 post-repair loss RLE report block. RFC 5725 allows the sender to infer which specific packets were repaired, while this block provides only aggregate counts with lower overhead; implementations may use both.
