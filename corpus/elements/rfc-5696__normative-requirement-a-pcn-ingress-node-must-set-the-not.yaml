document: rfc-5696
kind: normative-requirement
summary: A PCN-ingress-node MUST set the Not-marked (10) codepoint on any arriving packet belonging to a PCN-flow, and MUST set the not-PCN (00) codepoint on all other packets sharing a PCN-compatible DSCP.
section: "4.2"
rfc2119_level: MUST
