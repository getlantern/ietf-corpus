document: rfc-7234
kind: wire-format
summary: 'Cache-Control ABNF: Cache-Control = 1#cache-directive; cache-directive = token [ ''='' ( token / quoted-string ) ]. Directives are case-insensitive. Warning ABNF: warning-value = warn-code SP warn-agent SP warn-text [ SP warn-date ], where warn-code is a 3-digit integer. Age ABNF: Age = delta-seconds = 1*DIGIT.'
