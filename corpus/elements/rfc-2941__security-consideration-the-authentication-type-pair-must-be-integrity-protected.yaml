document: rfc-2941
kind: security-consideration
summary: The authentication type pair must be integrity-protected at the end of the authentication exchange; each authentication type specification must define how to ensure both sides agree on the result of option negotiation. Some types may include all telnet AUTH negotiation exchanges in the integrity checksum.
section: "5"
topics:
