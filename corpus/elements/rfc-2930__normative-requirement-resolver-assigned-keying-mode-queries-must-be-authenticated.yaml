document: rfc-2930
kind: normative-requirement
summary: Resolver-assigned keying mode queries MUST be authenticated with a TSIG or SIG(0); without this, an attacker could forge a resolver-assigned TKEY query and install a shared secret key of their choosing.
section: "4.5"
rfc2119_level: MUST
topics:
