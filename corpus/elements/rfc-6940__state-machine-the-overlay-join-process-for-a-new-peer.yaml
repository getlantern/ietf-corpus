document: rfc-6940
kind: state-machine
summary: 'The overlay join process for a new peer proceeds through states: connect to a bootstrap node, send a Join request to the Admitting Peer (AP), receive Join response and data Stores from AP, receive routing table Updates from AP, then form independent connections to become a full peer. The first node in an overlay is a special case that skips connecting to bootstrap nodes.'
section: 4.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
