document: rfc-3517
kind: interoperability-note
summary: The first and second duplicate ACKs (before DupThresh is reached) may be used to trigger Limited Transmit (RFC 3042) transmission of previously unsent segments; this is compatible with and complementary to the SACK recovery algorithm.
