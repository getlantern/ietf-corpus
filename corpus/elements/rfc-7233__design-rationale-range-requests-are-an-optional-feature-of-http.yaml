document: rfc-7233
kind: design-rationale
summary: Range requests are an OPTIONAL feature of HTTP, designed so that recipients not implementing this feature can respond as if it is a normal GET request without impacting interoperability. Partial responses use a distinct status code so caches that do not implement the feature do not mistake them for full responses.
section: "1"
topics:
