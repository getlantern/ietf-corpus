summary: The 'ietf-ospf-sr-mpls' YANG module is a single module covering OSPF Segment Routing MPLS extensions for both OSPFv2 (RFC 8665) and OSPFv3 (RFC 8666). It is structured as an augmentation to the OSPF base YANG model (RFC 9129) and the base Segment Routing YANG module (RFC 9020).
