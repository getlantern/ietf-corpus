document: rfc-4880
kind: normative-requirement
summary: DSA signatures MUST use hashes that are equal in size to the number of bits of q. If the hash output is larger, the leftmost bits equal to q's bit size are used.
section: 5.2.2
rfc2119_level: MUST
topics:
    - crypto
    - security
