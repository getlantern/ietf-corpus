document: rfc-7361
kind: wire-format
summary: 'The Flags byte within the MAC Flush Parameters TLV contains two defined bits: C-flag (bit 0, 0x80) indicates PBB context (B-VPLS vs I-component), and N-flag (bit 1, 0x40) indicates positive (N=0, flush-all-but-mine) or negative (N=1, flush-all-from-me) MAC flush action. Bits 2–7 are MBZ.'
