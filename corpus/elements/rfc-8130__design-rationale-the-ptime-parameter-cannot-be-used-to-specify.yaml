document: rfc-8130
kind: design-rationale
summary: The 'ptime' parameter cannot be used to specify the MELPe operating mode because for certain values it is impossible to distinguish the mode (e.g., ptime=68 could mean one 67.5 ms frame or three 22.5 ms frames), requiring the explicit 'bitrate' parameter instead.
