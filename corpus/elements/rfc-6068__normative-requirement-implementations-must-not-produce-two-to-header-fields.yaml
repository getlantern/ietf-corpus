document: rfc-6068
kind: normative-requirement
summary: Implementations MUST NOT produce two "To:" header fields in a message; the "To:" header field may occur at most once. Creators of 'mailto' URIs MUST NOT include other message header fields multiple times if those fields can only appear once.
section: "2"
rfc2119_level: MUST NOT
topics:
    - email
