document: rfc-9130
kind: security-consideration
summary: The 'ietf-isis' YANG module defines writable data nodes that, if manipulated by unauthorized users, could disrupt IS-IS routing across a domain. Implementations must apply access control (e.g., NETCONF access control model, RFC 8341) to protect sensitive nodes such as authentication keys, overload status, and protocol enable/disable.
section: "7"
topics:
    - yang
    - routing
    - security
