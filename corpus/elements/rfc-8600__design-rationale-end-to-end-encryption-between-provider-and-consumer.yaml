document: rfc-8600
kind: design-rationale
summary: End-to-end encryption between Provider and Consumer is acknowledged as desirable but is out of scope because there is no standardized method for encryption of one-to-many XMPP messages. Implementers needing E2E must use the basic instant-messaging pattern (RFC 6121) instead of XEP-0060.
section: 8.3.7
topics:
    - security
    - crypto
    - realtime
