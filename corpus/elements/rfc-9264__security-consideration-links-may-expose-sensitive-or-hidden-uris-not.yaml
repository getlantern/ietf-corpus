document: rfc-9264
kind: security-consideration
summary: Links may expose sensitive or 'hidden' URIs not intended for broad sharing. If access to such URIs is meant to be restricted, technical access controls should be applied rather than relying on obscurity, since link sets make URIs explicitly visible.
section: "9"
topics:
    - security
    - http
