document: rfc-6673
kind: design-rationale
summary: Separate loss reporting is required because many measurement systems report statistics on a conditional delay distribution (conditioned on packet arrival), which excludes lost packets; lost packets must therefore be accounted for by a standardized loss metric.
section: "1.1"
