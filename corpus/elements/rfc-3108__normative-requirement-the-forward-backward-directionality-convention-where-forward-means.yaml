document: rfc-3108
kind: normative-requirement
summary: The forward/backward directionality convention—where 'forward' means away from the ATM node under consideration and 'backward' means toward it—MUST be used in all SDP-based session descriptions, regardless of whether the bearer is an SVC, PVC/SPVC, or dynamically allocated CID, and independently of which side originates the connection.
section: "2.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
