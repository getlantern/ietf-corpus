document: rfc-3309
kind: normative-requirement
summary: When sending an SCTP packet, the endpoint MUST include the CRC-32c checksum value calculated over the entire packet including the SCTP common header and all chunks, with the Checksum field initialized to 0 before calculation.
section: "2.1"
rfc2119_level: MUST
topics:
    - sctp
