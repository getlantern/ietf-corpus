summary: The intermediate symbols C[0..L-1] are uniquely determined by solving the L×L linear system A*C = D over GF(256), where A encodes both the pre-coding relationships and the source symbol encoding constraints, and D consists of S+H zero symbols followed by the K' source symbols.
