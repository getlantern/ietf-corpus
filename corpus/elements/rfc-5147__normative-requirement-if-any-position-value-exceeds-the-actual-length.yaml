document: rfc-5147
kind: normative-requirement
summary: If any position value exceeds the actual length of the MIME entity, it is treated as referring to the last position. If a range's first position value is greater than the second (improperly ordered), the fragment identifier MUST be ignored.
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
