document: rfc-3866
kind: protocol-element
summary: A language range option is formed as 'lang-' followed by an optional Language-Tag and a trailing '-'. The special range 'lang-' matches all language tag options. Language range options are not tagging options and cannot be stored with attributes.
section: "3"
