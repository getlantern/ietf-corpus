document: rfc-6549
kind: interoperability-note
summary: Reducing the AuType from 2 octets to 1 octet causes OSPFv2 routers not supporting this specification to fail packet authentication for any non-default instance. This is solely due to differing field definitions, not any explicit change to OSPFv2 authentication mechanisms (RFC 2328 Appendix D and RFC 5709).
section: "5"
topics:
    - routing
    - security
