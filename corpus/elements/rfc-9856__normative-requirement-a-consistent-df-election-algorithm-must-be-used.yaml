document: rfc-9856
kind: normative-requirement
summary: A consistent DF Election Algorithm MUST be used across all upstream PEs for the Single Forwarder election. In OISM networks, the Default Designated Forwarder Election Algorithm MUST NOT be used if redundant G-sources are attached to Broadcast Domains with different Ethernet Tags.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
