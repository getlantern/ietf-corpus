document: rfc-6492
kind: normative-requirement
summary: The crls field MUST be present and MUST contain the current CRL issued by the same CA that issued the EE certificate used to sign the CMS. This field MAY contain CRLs for other CAs covering included CA certificates, but MUST NOT contain any other CRLs.
section: 3.1.1.5
rfc2119_level: MUST
topics:
    - pkix
    - crypto
