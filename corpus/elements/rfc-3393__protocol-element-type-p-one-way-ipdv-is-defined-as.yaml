document: rfc-3393
kind: protocol-element
summary: 'Type-P-One-way-ipdv is defined as the difference between the one-way-delay of two selected packets from Src to Dst: specifically, dT2 minus dT1, where dT1 and dT2 are the one-way-delays of the first and second selected packets respectively. The value is a real number of seconds (positive, zero, or negative), or undefined if one or both packets are not received.'
section: "2.4"
topics:
    - measurement
    - realtime
    - rtp
