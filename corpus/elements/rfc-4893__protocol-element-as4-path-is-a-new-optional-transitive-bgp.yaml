document: rfc-4893
kind: protocol-element
summary: AS4_PATH is a new optional transitive BGP path attribute (type code 17) with the same semantics as AS_PATH but encoding AS numbers as 4-octet entities. AS_CONFED_SEQUENCE and AS_CONFED_SET segment types are invalid in AS4_PATH.
