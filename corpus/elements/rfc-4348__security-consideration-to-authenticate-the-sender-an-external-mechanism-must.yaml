document: rfc-4348
kind: security-consideration
summary: To authenticate the sender, an external mechanism MUST be used. It is RECOMMENDED that such a mechanism protect both the complete RTP header and the payload. Tampering with the CMR field by a man-in-the-middle attacker may result in speech of a different quality than desired.
section: "8.2"
rfc2119_level: MUST
topics:
    - security
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
