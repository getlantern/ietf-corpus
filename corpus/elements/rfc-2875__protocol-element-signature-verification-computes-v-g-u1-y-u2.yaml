document: rfc-2875
kind: protocol-element
summary: Signature verification computes v = ((g^u1 * y^u2) mod p) mod q, where u1 = m*w mod q, u2 = r*w mod q, and w = s^-1 mod q. The signature is valid if and only if v == r.
