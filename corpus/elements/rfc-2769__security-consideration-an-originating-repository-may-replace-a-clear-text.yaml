document: rfc-2769
kind: security-consideration
summary: 'An originating repository may replace a clear-text password signature with ''signature: clear-text-passwd <maintainer-name>'' to avoid propagating credentials, since clear-text passwords imply full trust to the originating repository and need not be forwarded.'
section: "7.6"
