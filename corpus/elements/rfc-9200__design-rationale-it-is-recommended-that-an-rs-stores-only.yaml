document: rfc-9200
kind: design-rationale
summary: It is RECOMMENDED that an RS stores only one token per PoP key, with a new token superseding the old one. This simplifies constrained implementations (reducing storage and resolution complexity) and avoids contradictory permissions or premature expiry creating security gaps.
section: 5.10.1
topics:
    - oauth
