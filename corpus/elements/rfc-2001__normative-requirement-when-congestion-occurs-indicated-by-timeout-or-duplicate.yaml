document: rfc-2001
kind: normative-requirement
summary: When congestion occurs (indicated by timeout or duplicate ACKs), one-half of the current window size (min of cwnd and advertised window, but at least two segments) MUST be saved in ssthresh. If congestion is indicated by a timeout, cwnd is additionally set to one segment.
section: "2"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
