document: rfc-2750
kind: protocol-element
summary: The INTEGRITY object option within POLICY_DATA establishes direct secure communications between non-neighboring PEPs without involving untrusted PIN nodes. The digest is computed over the POLICY_DATA object with a temporarily appended SESSION object, per the algorithm in Appendix B.
