document: rfc-5011
kind: security-consideration
summary: Allowing a resolver to update its trust anchor set based on in-band key information is potentially less secure than a manual process. However, given the scale of DNS resolvers requiring update upon key compromise and the lack of a standard DNS management framework, this approach is deemed no worse than the existing situation.
section: "8.3"
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
