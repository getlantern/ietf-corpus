document: rfc-2846
kind: design-rationale
summary: The qual2-label naming convention was intentionally made different from ITU F.401 labels to avoid conflict with X.400 addressing rules, even though the semantic meaning of the elements is derived from F.401. Other specifications extending this mechanism are cautioned to likewise avoid F.401 label names.
section: "3.2"
