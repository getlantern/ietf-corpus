document: rfc-7463
kind: protocol-element
summary: The Appearance Agent is the single point of control for a shared appearance group, implementing a dialog package State Agent (ESC). It allocates and releases appearance numbers, resolves contention, and sends NOTIFY messages to all subscribed UAs whenever dialog state changes for the AOR.
