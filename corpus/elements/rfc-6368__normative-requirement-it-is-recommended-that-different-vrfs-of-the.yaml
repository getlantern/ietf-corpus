document: rfc-6368
kind: normative-requirement
summary: It is RECOMMENDED that different VRFs of the same VPN configured with iBGP PE-CE peering sessions use different Route Distinguisher (RD) values, to ensure the BGP/MPLS VPN infrastructure has access to the full per-path detail contained in ATTR_SET rather than selecting a single path per NLRI.
section: "8"
rfc2119_level: RECOMMENDED
topics:
