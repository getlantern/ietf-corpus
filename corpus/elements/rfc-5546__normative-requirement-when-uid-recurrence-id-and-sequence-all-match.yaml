document: rfc-5546
kind: normative-requirement
summary: 'When UID, RECURRENCE-ID, and SEQUENCE all match, the DTSTAMP property is used as a tiebreaker: the component or Attendee response with the latest DTSTAMP overrides all others. CUAs MUST persist UID, RECURRENCE-ID, SEQUENCE, and DTSTAMP to correctly process iTIP messages.'
section: 2.1.5
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
