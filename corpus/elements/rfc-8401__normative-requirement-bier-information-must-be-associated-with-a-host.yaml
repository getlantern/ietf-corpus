document: rfc-8401
kind: normative-requirement
summary: BIER information MUST be associated with a host prefix that is a node address for the advertising node. Prefix length MUST be 32 for IPv4 or 128 for IPv6; otherwise the advertisement MUST be ignored.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - multicast
