document: rfc-3621
kind: protocol-element
summary: The pethNotificationControlTable provides per-group control over whether SNMP notifications are sent from the agent. The single writable object pethNotificationControlEnable (TruthValue) enables or disables notifications for each group. All read-write values are persistent across restart/reboot.
section: "5"
topics:
