document: rfc-5070
kind: protocol-element
summary: The EventData class describes a specific event within an incident, including involved systems (Flow), attack methods, assessment, forensic records (Record), and requested actions (Expectation). It is recursively defined; only leaf EventData instances (those containing no child EventData) represent actual events.
