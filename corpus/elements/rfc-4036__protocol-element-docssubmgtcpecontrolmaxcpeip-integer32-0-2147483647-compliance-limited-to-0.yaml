document: rfc-4036
kind: protocol-element
summary: docsSubMgtCpeControlMaxCpeIp (Integer32, 0..2147483647, compliance-limited to 0..16) specifies the maximum simultaneous IP addresses permitted behind a cable modem. A value of zero drops all CPE traffic; if DOCSIS provisioning supplies more IP entries than this value, the object is raised to match that count.
