summary: 'Four standard Telnet negotiation commands are defined: IAC WILL OUTMRK (sender willing to send marking), IAC WON''T OUTMRK (sender refuses to send), IAC DO OUTMRK (sender willing to receive marking), and IAC DON''T OUTMRK (sender refuses to accept marking).'
