document: rfc-4121
kind: wire-format
summary: 'The checksum Flags field (octets 20–23, little-endian) encodes context-establishment options: GSS_C_DELEG_FLAG=1, GSS_C_MUTUAL_FLAG=2, GSS_C_REPLAY_FLAG=4, GSS_C_SEQUENCE_FLAG=8, GSS_C_CONF_FLAG=16, GSS_C_INTEG_FLAG=32. Bits 12–19 (values 4096–524288) are reserved for legacy vendor extensions; all other undefined bits MUST be cleared by the sender and MUST be ignored by the receiver.'
section: 4.1.1.1
topics:
    - security
