document: rfc-5272
kind: normative-requirement
summary: When a server processes a Full PKI Request, a PKI Response MUST be returned. The response is a Simple PKI Response only if enrollment was successful and only certificates are returned; otherwise a Full PKI Response is used.
section: "3.2"
rfc2119_level: MUST
topics:
    - pkix
