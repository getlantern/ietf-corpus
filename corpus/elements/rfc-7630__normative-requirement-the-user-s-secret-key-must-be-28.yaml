document: rfc-7630
kind: normative-requirement
summary: The user's secret key MUST be 28 octets (SHA-224), 32 octets (SHA-256), 48 octets (SHA-384), or 64 octets (SHA-512) for the respective HMAC-SHA-2 protocols. Keys are derived using the corresponding SHA-2 hash function.
section: "4.1"
rfc2119_level: MUST
topics:
