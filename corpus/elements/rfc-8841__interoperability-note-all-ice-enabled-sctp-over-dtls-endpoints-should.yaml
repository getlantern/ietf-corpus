document: rfc-8841
kind: interoperability-note
summary: All ICE-enabled SCTP-over-DTLS endpoints SHOULD implement support for UDP/DTLS/SCTP to maximize interoperability. When ICE is not used, the proto value MUST always reflect the transport protocol actually in use.
