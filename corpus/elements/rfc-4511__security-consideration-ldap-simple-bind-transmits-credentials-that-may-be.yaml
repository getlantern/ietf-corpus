document: rfc-4511
kind: security-consideration
summary: LDAP simple Bind transmits credentials that may be intercepted unless a TLS or SASL confidentiality layer is in place. Servers may return substituted result codes to prevent unauthorized disclosure of directory topology. The Notice of Disconnection with strongerAuthRequired indicates an established security association has unexpectedly failed or been compromised.
section: "6"
topics:
    - ldap
    - security
    - tls
