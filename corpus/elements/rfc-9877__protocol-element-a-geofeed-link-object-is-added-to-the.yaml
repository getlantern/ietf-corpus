document: rfc-9877
kind: protocol-element
summary: A geofeed link object is added to the 'links' member of an IP network object in RDAP responses. It requires 'value', 'rel', and 'href' JSON members; the 'type' member is RECOMMENDED. The 'rel' is set to 'geofeed', 'href' to the HTTPS URL of the geofeed file, and 'type' to 'application/geofeed+csv'.
section: "2.2"
topics:
    - json
