document: rfc-3461
kind: normative-requirement
summary: The RET and ENVID parameters MUST NOT appear more than once each in any single MAIL command. The NOTIFY and ORCPT parameters MUST NOT appear more than once in any RCPT command. The ESMTP server SHOULD respond with '501 syntax error in parameters or arguments' if duplicates are present.
section: "4.5"
rfc2119_level: MUST NOT
topics:
    - email
