document: rfc-5896
kind: interoperability-note
summary: RFC 4120 does not adequately describe the behavior of the OK-AS-DELEGATE flag in a cross-realm environment; RFC 5896 clarifies that all cross-realm TGTs in the traversal path must have OK-AS-DELEGATE set for policy-based delegation to proceed.
section: "5"
topics:
