document: rfc-1354
kind: interoperability-note
summary: The inclusion of dynamic routing protocol values in ipForwardProto (EGP, OSPF, BGP, IS-IS, etc.) is not intended to imply that hosts should support those protocols; the field is descriptive of how the route was learned.
section: "4.1"
topics:
