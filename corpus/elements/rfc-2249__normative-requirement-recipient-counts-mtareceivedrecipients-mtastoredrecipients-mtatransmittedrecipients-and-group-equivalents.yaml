document: rfc-2249
kind: normative-requirement
summary: Recipient counts (mtaReceivedRecipients, mtaStoredRecipients, mtaTransmittedRecipients and group equivalents) must exclude recipients the MTA has no responsibility for — i.e., inactive envelope recipients or recipients referenced only in message headers.
section: "6"
rfc2119_level: SHOULD
topics:
