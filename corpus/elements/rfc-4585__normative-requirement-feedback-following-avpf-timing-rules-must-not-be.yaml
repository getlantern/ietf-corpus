document: rfc-4585
kind: normative-requirement
summary: Feedback following AVPF timing rules MUST NOT be sent for a media session unless the session description indicates the 'AVPF' profile. The SDP 'rtcp-fb' attribute MUST only be used as a media-level attribute and MUST NOT appear at the session level.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
