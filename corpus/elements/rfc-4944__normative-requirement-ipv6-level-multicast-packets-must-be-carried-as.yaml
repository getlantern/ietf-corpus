document: rfc-4944
kind: normative-requirement
summary: IPv6 level multicast packets MUST be carried as link-layer broadcast frames in IEEE 802.15.4 networks. The broadcast frames MUST only be heeded by devices within the specific PAN of the link in question, accomplished by including a matching PAN ID and short destination address 0xffff.
section: "3"
rfc2119_level: MUST
topics:
    - ip
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
