document: rfc-8011
kind: security-consideration
summary: IPP objects SHOULD restrict query results for Job attributes to Operators, Administrators, and the job-owner. Privileged operations such as Pause-Printer, Resume-Printer, Cancel-Job (for others' jobs), and Purge-Jobs require Operator or Administrator privilege; implementations MUST enforce appropriate access control based on site policy.
section: "9.5"
topics:
    - security
