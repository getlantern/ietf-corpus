document: rfc-8461
kind: wire-format
summary: The '_mta-sts' TXT record is a US-ASCII, semicolon-separated key/value string. Required fields are 'v' (must be 'STSv1') and 'id' (1–32 alphanumeric characters uniquely identifying the policy instance). The record MUST begin with the version field; records not beginning with 'v=STSv1;' are discarded.
