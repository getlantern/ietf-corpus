document: rfc-9197
kind: normative-requirement
summary: When using the Checksum Complement field over UDP-based encapsulations, an IOAM encapsulating or transit node adding data MUST either recompute the UDP Checksum or use the Checksum Complement to maintain UDP checksum correctness. IOAM decapsulating nodes MUST recompute the UDP Checksum.
section: 4.4.2.8
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
