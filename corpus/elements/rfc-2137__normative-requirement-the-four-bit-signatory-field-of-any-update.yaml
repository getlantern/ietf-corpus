document: rfc-2137
kind: normative-requirement
summary: The four-bit signatory field of any update-authorizing KEY RR must be non-zero. In addition, such KEY RRs must be entity or user keys and must not have the authentication-use-prohibited bit set.
section: 3.1.3
rfc2119_level: MUST
topics:
    - dns
    - security
