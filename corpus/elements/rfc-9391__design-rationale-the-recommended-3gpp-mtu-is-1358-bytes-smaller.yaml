document: rfc-9391
kind: design-rationale
summary: The recommended 3GPP MTU is 1358 bytes, smaller than the radio network's 1600-byte limit, to avoid fragmentation in the network backbone due to payload encryption size (which must be a multiple of 16) and additional core transport overhead.
