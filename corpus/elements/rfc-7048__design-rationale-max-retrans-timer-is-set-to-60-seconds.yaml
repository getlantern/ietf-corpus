document: rfc-7048
kind: design-rationale
summary: MAX_RETRANS_TIMER is set to 60 seconds for consistency with DHCPv6, providing a familiar upper bound for operators and ensuring retransmissions do not become so infrequent that link-layer address changes go undetected for excessively long periods.
