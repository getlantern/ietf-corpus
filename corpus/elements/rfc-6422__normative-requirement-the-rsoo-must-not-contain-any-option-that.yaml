document: rfc-6422
kind: normative-requirement
summary: The RSOO MUST NOT contain any option that is not specifically called out as an RSOO-enabled option. Specifications defining RSOO-enabled options MUST reference this specification and MUST state the option is RSOO-enabled. No DHCP option specified prior to this document is RSOO-enabled.
section: "4"
rfc2119_level: MUST NOT
topics:
    - registry
    - security
