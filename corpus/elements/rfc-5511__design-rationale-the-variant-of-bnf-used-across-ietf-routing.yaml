document: rfc-5511
kind: design-rationale
summary: The variant of BNF used across IETF Routing Area specifications (similar to a subset of Extended BNF) is internally consistent with only a small number of constructs. Providing a formal definition enables ease of interpretation of existing documents and facilitates automated verification of future protocol specifications.
