document: rfc-6286
kind: normative-requirement
summary: When connection collision occurs between external peers with identical BGP Identifiers, the connection initiated by the BGP speaker with the larger AS number is preserved. This covers 4-octet AS numbers per RFC 4893.
section: "2.3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
