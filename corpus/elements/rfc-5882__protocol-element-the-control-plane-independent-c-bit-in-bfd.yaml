document: rfc-5882
kind: protocol-element
summary: The Control Plane Independent 'C' bit in BFD Control packets announces whether BFD shares fate with the control plane. If the C bit is set in both directions, BFD is implemented in the forwarding plane and control plane restarts should not affect the BFD session.
section: "4.3"
topics:
    - routing
