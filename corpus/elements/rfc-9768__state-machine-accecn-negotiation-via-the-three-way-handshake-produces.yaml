document: rfc-9768
kind: state-machine
summary: 'AccECN negotiation via the three-way handshake produces one of three feedback modes: AccECN mode, Classic ECN feedback mode, or Not ECN mode. The Client enters the mode indicated by the first SYN/ACK it receives per Table 2; the Server enters the mode indicated by the first SYN. Mode cannot change once entered.'
section: 3.1.2
topics:
