document: rfc-1256
kind: interoperability-note
summary: Future backward-compatible extensions may specify contents for the Reserved field or add per-address information words beyond the current Router Address and Preference Level fields. Backward-incompatible changes will use different Code values. Hosts and routers must silently ignore unrecognized trailing octets and extra per-address words.
section: "5.2"
topics:
    - ip
    - routing
