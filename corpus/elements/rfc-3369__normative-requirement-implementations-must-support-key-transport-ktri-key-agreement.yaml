document: rfc-3369
kind: normative-requirement
summary: Implementations MUST support key transport (ktri), key agreement (kari), and symmetric key-encryption key (kekri) RecipientInfo types. All implementations MUST gracefully handle unimplemented alternatives within the RecipientInfo CHOICE, including unknown ori alternatives.
