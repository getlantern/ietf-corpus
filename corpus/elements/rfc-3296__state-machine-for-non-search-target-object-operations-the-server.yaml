document: rfc-3296
kind: state-machine
summary: 'For non-search target object operations, the server evaluates four cases: (1) target not in any naming context — return noSuchObject or superior referral; (2) target is a referral object — return ref URI; (3) target absent, nearest naming context has no covering referral — return noSuchObject; (4) target absent but covered by a referral object — return referral response based on ref URI.'
section: "5.2"
topics:
