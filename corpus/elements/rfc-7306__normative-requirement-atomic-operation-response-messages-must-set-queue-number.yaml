document: rfc-7306
kind: normative-requirement
summary: Atomic Operation Response messages MUST set Queue Number (QN) to 3 in the DDP header. Atomic Operation Request messages MUST use Queue Number 1 (the RDMA Read Request Queue).
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
