document: rfc-3411
kind: security-consideration
summary: Denial of service and traffic analysis are explicitly excluded as threats requiring protection. DoS attacks are often indistinguishable from normal network failures that management protocols must tolerate; SNMP traffic patterns are predictable enough that traffic analysis yields little advantage to attackers.
section: "1.4"
topics:
    - snmp
    - security
