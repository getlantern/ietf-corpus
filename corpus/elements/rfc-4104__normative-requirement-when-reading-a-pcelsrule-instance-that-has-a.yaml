document: rfc-4104
kind: normative-requirement
summary: When reading a pcelsRule instance that has a pcimConditionAuxClass attached, the attribute pcelsConditionList MUST be ignored from the policy rule perspective. Similarly, when a pcimActionAuxClass is attached, pcelsActionList MUST be ignored.
section: "5.4"
rfc2119_level: MUST
