document: rfc-6015
kind: normative-requirement
summary: In declarative SDP usage (e.g., RTSP or SAP), a participant MUST use the payload format configuration provided for the session. If multiple configurations are declared, receivers should choose the repair flow best suited to them.
section: 5.2.2
rfc2119_level: MUST
topics:
