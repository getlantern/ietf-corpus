document: rfc-8518
kind: interoperability-note
summary: When RFC1583Compatibility is set to 'enabled', multiple ASBRs in different areas advertising the same prefix are chosen based on cost and are all valid alternate ASBRs for LFA evaluation; the Section 4.2.2 inequalities then apply based on forwarding address and cost type.
section: 4.2.1.3
