document: rfc-9552
kind: design-rationale
summary: BGP-LS uses an IGP-neutral TLV representation so that consumers (PCEs, ALTO servers) do not need to understand OSPF or IS-IS protocol specifics. Although Link Attribute TLV encodings were originally defined for IS-IS, they carry data sourced by either IS-IS or OSPF.
section: "5"
topics:
