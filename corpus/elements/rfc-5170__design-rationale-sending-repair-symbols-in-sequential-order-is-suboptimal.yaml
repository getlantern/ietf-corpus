document: rfc-5170
kind: design-rationale
summary: Sending repair symbols in sequential order is suboptimal for erasure recovery; it is recommended to shuffle (randomize) the transmission order of repair symbols. The random permutation tables (Section 5.6) implement this shuffling transparently at both sender and receiver.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
