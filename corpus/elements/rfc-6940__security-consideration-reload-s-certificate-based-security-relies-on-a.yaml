document: rfc-6940
kind: security-consideration
summary: RELOAD's certificate-based security relies on a central enrollment server issuing unique Node-IDs and certificates. The enrollment server's ability to prevent attackers from obtaining large numbers of certificates is a primary defense against Sybil attacks on the P2P overlay.
section: "13.3"
topics:
    - security
    - pkix
