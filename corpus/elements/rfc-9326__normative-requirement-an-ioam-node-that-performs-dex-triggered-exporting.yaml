document: rfc-9326
kind: normative-requirement
summary: An IOAM node that performs DEX-triggered exporting MUST support the ability to limit the rate of exported packets. The exported data rate SHOULD NOT exceed 1/N of the interface capacity on any of the node's interfaces, with N > 100 RECOMMENDED.
section: 3.1.2
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
