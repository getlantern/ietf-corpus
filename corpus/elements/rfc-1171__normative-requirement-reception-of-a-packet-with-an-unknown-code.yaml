document: rfc-1171
kind: normative-requirement
summary: Reception of a packet with an unknown Code MUST be reported back by transmitting a Code-Reject (Code=7) with the inducing packet copied into the Rejected-Packet field. Upon reception of a Code-Reject, an implementation should immediately transition to the Closed state.
section: 4.4.6
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
