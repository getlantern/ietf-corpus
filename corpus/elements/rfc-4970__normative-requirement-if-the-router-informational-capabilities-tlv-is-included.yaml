document: rfc-4970
kind: normative-requirement
summary: If the Router Informational Capabilities TLV is included in an RI LSA, it MUST be the first TLV in the LSA and MUST accurately reflect the OSPF router's capabilities in the advertised scope.
section: "2.3"
rfc2119_level: MUST
topics:
