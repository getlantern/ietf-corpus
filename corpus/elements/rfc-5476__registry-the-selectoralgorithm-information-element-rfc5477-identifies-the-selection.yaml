document: rfc-5476
kind: registry
summary: 'The selectorAlgorithm Information Element [RFC5477] identifies the selection method. Values currently defined: 1 = systematic count-based sampling, 2 = systematic time-based sampling, 3 = random n-out-of-N sampling, 4 = uniform probabilistic sampling, 5 = property match filtering, 6 = BOB hash-based filtering, 7 = IPSX hash-based filtering, 8 = CRC hash-based filtering.'
