document: rfc-8618
kind: security-consideration
summary: C-DNS captures full DNS message content including client IP addresses and query names, which can reveal sensitive information about users' browsing and online activities. Operators must consider access controls, secure storage, and transmission security for C-DNS files, as they represent a comprehensive log of DNS client behavior.
section: "13"
topics:
