document: rfc-7345
kind: normative-requirement
summary: The answerer MUST assign the SDP 'setup' attribute a value of 'active' or 'passive' and MUST NOT assign 'holdconn'. If 'active' is assigned, the answerer MUST initiate a DTLS handshake by sending a DTLS ClientHello toward the offerer.
section: "4.3"
rfc2119_level: MUST
topics:
    - tls
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
