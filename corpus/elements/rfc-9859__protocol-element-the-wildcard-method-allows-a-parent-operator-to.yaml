document: rfc-9859
kind: protocol-element
summary: The wildcard method allows a parent operator to publish a default notification endpoint via wildcard records at *._dsync.example for CDS and CSYNC types respectively. If wildcards cannot be published, the _dsync label itself may be used (without wildcard), though this is NOT RECOMMENDED as it requires an extra discovery step.
section: "3.1"
