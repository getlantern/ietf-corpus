document: rfc-7781
kind: interoperability-note
summary: Two AAE methods (this document's pseudo-nickname approach and RFC 7782's multiple MAC attachments approach) can coexist in the same TRILL campus for different AAE groups. Deploying both requires all TRILL switches to support both methods, including the Affinity sub-TLV (RFC 7176, RFC 7783) for this document's method.
