document: rfc-2463
kind: normative-requirement
summary: 'An ICMPv6 error message MUST NOT be sent in response to: another ICMPv6 error message; a packet destined to a multicast, link-layer multicast, or link-layer broadcast address (with two specific exceptions); or a packet whose source address does not uniquely identify a single node (e.g., unspecified, multicast, or anycast).'
section: "2.4"
rfc2119_level: MUST NOT
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
