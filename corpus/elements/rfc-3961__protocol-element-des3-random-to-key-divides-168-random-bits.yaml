document: rfc-3961
kind: protocol-element
summary: DES3 random-to-key divides 168 random bits into three 56-bit groups; each is expanded to 64 bits by inserting parity bits at specified positions (bits 1–7, p; 9–15, p; ... ; 56, 48, 40, 32, 24, 16, 8, p). Each sub-key is corrected for DES weak/semi-weak keys, then the three 8-byte sub-keys are concatenated.
section: 6.3.1
topics:
    - crypto
