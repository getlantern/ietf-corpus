document: rfc-7433
kind: normative-requirement
summary: New 'content' values MUST describe the semantics of the UUI data and valid encodings. New content values are added to the IANA registry with a Standards Track RFC. New UUI content types cannot be added to existing packages—a new package must be defined instead.
section: "5.1"
rfc2119_level: MUST
topics:
