document: rfc-4745
kind: interoperability-note
summary: All three operation modes (passive request-response, active request-response, and event notification) are supported by a single rule set schema. Instances of the rule set can omit elements only applicable to the subscription model, allowing the same policy document to serve multiple protocol interaction patterns.
