document: rfc-6446
kind: protocol-element
summary: The Event header field is extended to appear in 2xx responses to NOTIFY requests, allowing subscribers to update rate control parameters mid-subscription. Other Event header field parameters in such responses have no meaning and MUST be ignored by the notifier.
section: "9.3"
topics:
