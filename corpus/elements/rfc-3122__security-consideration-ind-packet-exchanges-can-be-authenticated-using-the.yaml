document: rfc-3122
kind: security-consideration
summary: IND packet exchanges can be authenticated using the IP Authentication Header (IPsec). It SHOULD be possible for the system administrator to configure a node to ignore any IND messages that are not authenticated; such a switch SHOULD default to allowing unauthenticated messages.
section: "5"
topics:
    - ip
    - security
    - ipsec
