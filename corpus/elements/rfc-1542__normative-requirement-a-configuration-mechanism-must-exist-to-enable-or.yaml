document: rfc-1542
kind: normative-requirement
summary: A configuration mechanism MUST exist to enable or disable relaying of BOOTREQUEST messages, and relaying MUST be disabled by default. The relay agent MUST silently discard BOOTREQUEST messages whose 'hops' field exceeds 16; a configurable threshold SHOULD default to 4.
section: 4.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
