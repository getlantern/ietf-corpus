document: rfc-4385
kind: security-consideration
summary: If a PW has been configured to operate without a Control Word, the PW Associated Channel Type mechanism MUST NOT be used, to prevent user payloads from being fabricated to mimic the PWACH and attack applications using the Associated Channel.
section: "7"
rfc2119_level: MUST NOT
topics:
