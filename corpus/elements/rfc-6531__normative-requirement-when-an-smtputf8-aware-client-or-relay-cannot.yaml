document: rfc-6531
kind: normative-requirement
summary: When an SMTPUTF8-aware client or relay cannot transmit an internationalized message to a non-supporting server and is not an MSA choosing transformation, it SHOULD reject the message. Non-delivery notifications MUST conform to RFC 5321, RFC 3464, and RFC 6533.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - email
