document: rfc-9211
kind: protocol-element
summary: The `fwd-status` parameter is an Integer indicating which HTTP status code the next-hop server returned for the forwarded request. It is only meaningful when `fwd` is present; if absent but `fwd` is present, it defaults to the status code sent in the response.
section: "2.3"
topics:
