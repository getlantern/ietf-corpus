document: rfc-2456
kind: design-rationale
summary: The appnTrapControl object exists in this MIB so that implementations are not required to implement RFC 2273 (SNMPv3 Applications / snmpNotificationMIB) solely to control APPN notification generation. For a notification to be sent, it must be enabled by appnTrapControl AND not disabled by an snmpNotificationMIB entry.
section: "3.1"
topics:
    - snmp
