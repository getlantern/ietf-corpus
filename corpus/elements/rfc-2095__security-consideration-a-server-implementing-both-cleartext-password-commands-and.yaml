document: rfc-2095
kind: security-consideration
summary: A server implementing both cleartext password commands and CRAM-MD5 authentication should not allow both methods for a given user, since CRAM provides origin identification and replay protection that would be undermined by also permitting cleartext access.
section: "4"
topics:
