document: rfc-5423
kind: protocol-element
summary: MessageNew event is generated when a new message arrives via a message delivery agent. Parameters include a message identifier that MUST include UIDVALIDITY and a UID for IMAP-accessible stores, and MAY include SMTP envelope, message metadata, or the entire message content.
section: "4.1"
topics:
