document: rfc-3546
kind: normative-requirement
summary: Once a maximum fragment length other than 2^14 has been successfully negotiated, the client and server MUST immediately begin fragmenting all messages (including handshake messages) so that no fragment exceeds the negotiated length.
section: "3.2"
rfc2119_level: MUST
topics:
    - tls
