document: rfc-5672
kind: design-rationale
summary: DKIM's primary task is to communicate a single SDID to a recipient-side Identity Assessor. The SDID is the mandatory output; the AUID is optional. Any attempt by a receiver to intuit structured semantics from either identifier is a heuristic function outside the scope of DKIM's specification.
