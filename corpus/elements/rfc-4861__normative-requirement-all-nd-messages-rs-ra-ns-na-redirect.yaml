document: rfc-4861
kind: normative-requirement
summary: All ND messages (RS, RA, NS, NA, Redirect) MUST be sent with IPv6 Hop Limit set to 255. Receivers MUST verify the Hop Limit is 255 and silently discard messages with any other value.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
    - security
