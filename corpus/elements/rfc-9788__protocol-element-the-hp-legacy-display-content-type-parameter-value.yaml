document: rfc-9788
kind: protocol-element
summary: The hp-legacy-display Content-Type parameter (value '1') marks a text/plain or text/html leaf MIME node as containing a Legacy Display Element — a decorative backward-compatible copy of removed or obscured User-Facing Header Fields intended for Legacy MUAs. Conformant MUAs suppress rendering of this element.
section: 2.1.2
topics:
