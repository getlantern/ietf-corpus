document: rfc-4517
kind: security-consideration
summary: Security considerations for LDAP syntaxes and matching rules are addressed in the overall LDAP technical specification [RFC4510]. The LDAP-specific encoding of syntaxes always produces octet-aligned values, and clients must not make assumptions about the human-readability of values with unrecognized syntaxes.
section: "5"
topics:
