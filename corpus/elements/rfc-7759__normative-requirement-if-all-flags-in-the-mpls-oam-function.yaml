document: rfc-7759
kind: normative-requirement
summary: If all flags in the MPLS OAM Function Flags field are zero, this MUST be interpreted as the MPLS OAM Functions TLV not being present. If more than one such TLV appears in an Echo Request, the first SHOULD be processed and the rest ignored. Undefined flags MUST be set to zero and unknown flags MUST be ignored.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
