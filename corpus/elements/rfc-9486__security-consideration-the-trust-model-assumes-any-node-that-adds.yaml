document: rfc-9486
kind: security-consideration
summary: The trust model assumes any node that adds, removes, or modifies IOAM Data-Fields is allowed to do so. An IOAM node only processes IOAM extension headers when the directive comes from a trusted source and is validated; security breaches in this model may allow unauthorized IOAM manipulation.
section: "5"
topics:
