document: rfc-8950
kind: normative-requirement
summary: A BGP speaker that wishes to advertise an IPv6 next hop for IPv4 NLRI or VPN-IPv4 NLRI MUST use the Capability Advertisement procedures defined in RFC 5492 with the Extended Next Hop Encoding capability to determine whether its peer supports this for the relevant AFI/SAFI pair(s).
section: "4"
rfc2119_level: MUST
topics:
    - bgp
    - ip
    - v6ops
