document: rfc-9965
kind: security-consideration
summary: The provisioning network must be secured by allowing only traffic needed for the current provisioning method, blocking all other traffic (including DNS recursive resolvers to prevent exfiltration), limiting simultaneous device count, rate limiting per-device access, and capping both session duration and total data transfer.
section: "7.2"
topics:
    - security
