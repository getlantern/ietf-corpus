document: rfc-4023
kind: security-consideration
summary: 'The core security problems for IP/GRE tunnels are: (1) a packet appearing to come from the tunnel but not placed there by the tunnel transmit endpoint (no encapsulator authentication); (2) packet alteration in transit (no integrity guarantee); (3) packet content exposure in transit (no privacy). IPsec support is defined as OPTIONAL due to varying security requirements.'
section: "8"
topics:
