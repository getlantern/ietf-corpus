document: rfc-7770
kind: interoperability-note
summary: For existing OSPF capabilities, backwards compatibility dictates that RI LSA advertisement is used primarily for informational purposes. For future OSPF extensions, the RI LSA advertisement MAY be used as the sole mechanism for advertisement and discovery.
