document: rfc-8667
kind: normative-requirement
summary: The SR-Capabilities sub-TLV MUST be propagated throughout the IS-IS level and MUST NOT be advertised across level boundaries (Router Capability TLV S-Flag MUST be unset). A router MUST NOT advertise more than one SR-Capabilities sub-TLV and MUST NOT advertise overlapping SRGB ranges.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
