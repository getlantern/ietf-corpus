document: rfc-4415
kind: security-consideration
summary: ENUM data is publicly visible to anyone anonymously via DNS. This exposes published telephone numbers to automated harvesting by third parties, enabling unsolicited voice calls, junk faxes, and junk SMS—analogous to spam targeting of email addresses scraped from mailing lists.
section: "5"
topics:
    - security
    - privacy
    - dns
