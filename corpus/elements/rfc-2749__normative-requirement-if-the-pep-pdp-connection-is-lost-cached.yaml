document: rfc-2749
kind: normative-requirement
summary: If the PEP-PDP connection is lost, cached RSVP state may be retained for the RSVP timeout period for previously admitted flows only (not for new or updated state). If the PDP cannot be reestablished after the timeout, the PEP is expected to purge all cached decisions and must then reject new flows or resort to the LPDP.
section: "3.5"
rfc2119_level: MUST
topics:
    - qos
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
