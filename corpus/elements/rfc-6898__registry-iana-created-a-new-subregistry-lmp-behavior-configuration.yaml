document: rfc-6898
kind: registry
summary: 'IANA created a new subregistry ''LMP Behavior Configuration Flags'' under the LMP Parameters registry. Allocations require Standards Action. Bits are numbered from zero as the most significant bit. Initial entries: bit 0 (S) = SONET/SDH Test support, bit 1 (D) = DWDM support, bit 2 (C) = Data Channel consistency check support. Maximum 8152 bits are possible given the CONFIG object length field.'
section: "6.2"
