document: rfc-2233
kind: interoperability-note
summary: The restriction that ifIndex values must be less than ifNumber has been removed. Some management applications break as a result, but this is considered preferable to requiring changes to all agent implementations and the many existing media-specific MIBs. ifIndex values should still be assigned as small contiguous integers starting from 1 for user-friendliness.
section: 3.1.5
topics:
    - snmp
