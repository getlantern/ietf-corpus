document: rfc-7345
kind: interoperability-note
summary: If a remote endpoint does not support UDPTL over DTLS and secure fax is required, a fax media stream cannot be established. If secure fax is only preferred, SDP Capability Negotiation (RFC 5939) can be used to offer both UDP/TLS/UDPTL and plain UDPTL/UDP in the same offer.
section: "5.4"
topics:
