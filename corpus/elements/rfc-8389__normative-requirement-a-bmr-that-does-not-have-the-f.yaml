document: rfc-8389
kind: normative-requirement
summary: A BMR that does not have the F-flag set MUST NOT be used for forwarding. Only when the F-flag is set may a BMR also be used as an FMR for forwarding.
section: 4.1.1
rfc2119_level: MUST NOT
