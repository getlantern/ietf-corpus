document: rfc-7860
kind: security-consideration
summary: The security of each HMAC-SHA-2 authentication protocol depends on key length, hash function internal state size, and truncated MAC length. Key lengths range from 224 to 512 bits, internal states are 256 or 512 bits, and MAC lengths range from 128 to 384 bits across the four protocols.
