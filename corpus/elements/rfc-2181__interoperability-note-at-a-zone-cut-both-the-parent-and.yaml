document: rfc-2181
kind: interoperability-note
summary: At a zone cut, both the parent and child zone may have NXT records for the same name; these two NXT records do not form an RRSet even when both zones are hosted on the same server. NXT RRSets always contain exactly one RR.
section: 5.3.2
topics:
    - dns
    - security
