document: rfc-5105
kind: design-rationale
summary: RSA-SHA1 is required for backward compatibility but RSA-SHA256 is added because recent cryptanalysis has cast doubt on SHA1 security. Registry local policy specifies acceptable algorithms, allowing operators to phase out weaker choices over time.
