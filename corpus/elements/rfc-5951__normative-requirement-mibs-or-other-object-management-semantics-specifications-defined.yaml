document: rfc-5951
kind: normative-requirement
summary: MIBs or other object management semantics specifications defined to configure persistency timers SHOULD explicitly provide default values and SHOULD define the level of granularity for timer tables. Implementations MUST provide the ability to configure these timers.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - yang
