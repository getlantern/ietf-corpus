document: rfc-4004
kind: interoperability-note
summary: Mobile nodes interact with the HA and FA using only Mobile IPv4 and do not implement Diameter. The FA and HA act as Diameter clients on the MN's behalf, extracting relevant fields from Mobile IPv4 Registration Requests to construct Diameter AVPs.
section: "1.1"
topics:
    - diameter
    - mobility
