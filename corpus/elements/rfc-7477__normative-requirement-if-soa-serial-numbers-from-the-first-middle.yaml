document: rfc-7477
kind: normative-requirement
summary: If SOA serial numbers from the first, middle, and last steps of the processing procedure differ, the CSYNC record SHOULD NOT be processed. If the soaminimum flag is set and the SOA serial is less than the CSYNC record's SOA Serial field, the record MUST NOT be processed.
section: "3.1"
rfc2119_level: MUST NOT
topics:
    - dns
