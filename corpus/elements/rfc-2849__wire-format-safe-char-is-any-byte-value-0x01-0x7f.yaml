document: rfc-2849
kind: wire-format
summary: SAFE-CHAR is any byte value 0x01–0x7F except NUL (0x00), LF (0x0A), and CR (0x0D). SAFE-INIT-CHAR additionally excludes SPACE (0x20), colon (0x3A), and less-than (0x3C).
