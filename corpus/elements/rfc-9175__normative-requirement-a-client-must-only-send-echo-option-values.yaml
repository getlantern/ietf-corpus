document: rfc-9175
kind: normative-requirement
summary: A client MUST only send Echo option values to endpoints it received them from, where the security association is part of the endpoint identity. In OSCORE, Outer Echo values must go back in Outer options and Inner Echo values in Inner options within the same security context.
section: "2.3"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
