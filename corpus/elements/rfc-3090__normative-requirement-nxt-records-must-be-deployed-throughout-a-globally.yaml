document: rfc-3090
kind: normative-requirement
summary: NXT records MUST be deployed throughout a globally secured zone, clarifying RFC 2535 section 2.3.2. This requirement is open to modification if an alternate mechanism to NXT is defined along with a means for a zone to indicate its use.
section: 2.1.c
rfc2119_level: MUST
topics:
    - dns
    - security
