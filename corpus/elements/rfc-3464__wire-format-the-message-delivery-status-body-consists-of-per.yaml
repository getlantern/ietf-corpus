document: rfc-3464
kind: wire-format
summary: 'The message/delivery-status body consists of per-message fields followed by one or more per-recipient field groups, each group preceded by a blank line: delivery-status-content = per-message-fields 1*( CRLF per-recipient-fields ). Fields follow RFC 822 header syntax and are case-insensitive.'
section: "2.1"
