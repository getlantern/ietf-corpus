document: rfc-7482
kind: protocol-element
summary: Partial string searching uses the asterisk ('*', 0x002A) character to match zero or more trailing characters. A character string representing multiple domain name labels MAY be concatenated to the end of the search pattern to limit scope (e.g., 'exam*.com' matches 'example.com').
section: "4.1"
topics:
    - dns
    - http
    - registry
