document: rfc-3261
kind: state-machine
summary: 'Non-INVITE client transactions have states: Trying (request sent, Timer F started), Proceeding (1xx received), Completed (final response received; Timer K absorbs retransmissions on unreliable transport), and Terminated. Timer E drives retransmissions on unreliable transport while in Trying/Proceeding.'
section: 17.1.2
