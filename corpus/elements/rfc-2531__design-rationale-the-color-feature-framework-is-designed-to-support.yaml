document: rfc-2531
kind: design-rationale
summary: 'The color feature framework is designed to support capability description at varying levels of granularity: feature tags corresponding to implied, "don''t care", or unknown values may simply be omitted from a capability description. This avoids requiring exhaustive enumeration of all color parameters in simple cases.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
