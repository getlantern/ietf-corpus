document: rfc-9031
kind: normative-requirement
summary: The JRC MUST ensure that at any given time there are never two nodes using the same short identifier under the same link-layer key, because the short address is an input to the IEEE 802.15.4 TSCH link-layer nonce construction.
section: 8.4.4.1
rfc2119_level: MUST
topics:
    - security
