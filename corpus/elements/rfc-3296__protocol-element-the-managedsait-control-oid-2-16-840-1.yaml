document: rfc-3296
kind: protocol-element
summary: The ManageDsaIT control (OID 2.16.840.1.113730.3.4.2) may be included in add, compare, delete, modify, modifyDN, search, or applicable extended operations. Its criticality may be TRUE or absent; it has no control value. It causes all DSEs including referral objects to be treated as normal entries.
section: "3"
