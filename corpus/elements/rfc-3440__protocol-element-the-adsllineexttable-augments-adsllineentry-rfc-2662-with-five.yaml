summary: 'The adslLineExtTable augments adslLineEntry (RFC 2662) with five objects: adslLineTransAtucCap (read-only capability bitmask), adslLineTransAtucConfig (read-write enabled modes), adslLineTransAtucActual (read-only current mode, single bit), adslLineGlitePowerState (read-only power state), and adslLineConfProfileDualLite (read-write dual-mode profile name).'
