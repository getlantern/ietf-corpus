document: rfc-8995
kind: normative-requirement
summary: The registrar MUST use HTTPS for the BRSKI-MASA connection, regardless of what scheme or path may appear in the MASA URI extension. The registrar MUST again extract the serialNumber itself from the pledge's TLS certificate rather than relying on the value in the pledge voucher-request.
section: 2.3.2
rfc2119_level: MUST
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
