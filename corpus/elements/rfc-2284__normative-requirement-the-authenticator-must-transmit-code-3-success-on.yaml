document: rfc-2284
kind: normative-requirement
summary: The authenticator MUST transmit Code=3 (Success) on successful authentication and MUST transmit Code=4 (Failure) if it cannot authenticate the peer. An authenticator MAY issue multiple Requests before sending Failure to allow for human typing mistakes.
section: 2.2.2
rfc2119_level: MUST
topics:
    - security
