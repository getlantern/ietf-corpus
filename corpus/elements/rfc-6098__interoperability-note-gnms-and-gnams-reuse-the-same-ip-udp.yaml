document: rfc-6098
kind: interoperability-note
summary: GNMs and GNAMs reuse the same IP/UDP addressing (source/destination addresses and ports) as the prior Registration Request/Reply to the same peer. This design decision enables NAT traversal compatibility and ensures the same security association is used for both registration and notification traffic.
section: "4.1"
topics:
    - mobility
    - nat
    - ip
