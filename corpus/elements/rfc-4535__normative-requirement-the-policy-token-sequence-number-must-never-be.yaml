document: rfc-4535
kind: normative-requirement
summary: The Policy Token sequence number must never be reset to a lower value (no rollover to zero) as long as the group identifier remains valid and in use. The GO MUST preserve this sequence number across reboots to prevent replay attacks.
section: 4.4.3
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
