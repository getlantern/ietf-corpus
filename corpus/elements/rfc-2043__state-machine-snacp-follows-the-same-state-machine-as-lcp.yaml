document: rfc-2043
kind: state-machine
summary: SNACP follows the same state machine as LCP. Before SNA packets can be communicated, PPP must reach the Network-Layer Protocol phase and the appropriate SNACP must reach the Opened state. Once Opened, SNA datagrams can be sent; the link remains configured until explicit LCP or SNACP packets close it or an external event occurs.
section: "2"
