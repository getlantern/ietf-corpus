document: rfc-8086
kind: design-rationale
summary: Two deployment scenarios (default/Internet and TMCE) are defined because a tunnel implementation cannot detect its own deployment context, placing responsibility on operators to apply the correct requirements. The TMCE scenario allows weaker checksum and congestion requirements because the environment is controlled to avoid corruption and congestion.
