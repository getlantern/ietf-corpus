document: rfc-6575
kind: normative-requirement
summary: A PE MUST be prepared to advertise the PW FEC before the IPv4 address of the CE is known by using an IPv4 address value of zero. When the CE IPv4 address becomes available, the PE re-advertises the PW FEC with the actual address. If the address becomes invalid, the PE MUST re-advertise with a null IP address.
section: "5.1"
rfc2119_level: MUST
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
