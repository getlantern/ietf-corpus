document: rfc-8279
kind: protocol-element
summary: A BFR Identifier (BFR-id) is a positive integer in the range [1,65535] that uniquely identifies a BFR within a given sub-domain. Value 0 is not a legal BFR-id and, if advertised, MUST be interpreted as meaning the advertising BFR has no BFR-id in that sub-domain. Only BFRs that function as BFIR or BFER require a BFR-id.
section: "2"
topics:
    - routing
