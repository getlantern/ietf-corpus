document: rfc-9677
kind: security-consideration
summary: Systematic retrieval of consecutive delegated credentials and private keys would allow an attacker to impersonate dCDN nodes. The CDNI MI interfaces defined in RFC 8006 provide integrity, confidentiality, and mutual authentication protections to prevent such systematic retrieval.
section: "7"
topics:
