document: rfc-2630
kind: normative-requirement
summary: Any symmetric content-encryption algorithm included in a CMS implementation must also be supported as a key-encryption algorithm. Implementations must include Triple-DES wrapping of Triple-DES content-encryption keys.
section: 12.3.1
rfc2119_level: MUST
topics:
