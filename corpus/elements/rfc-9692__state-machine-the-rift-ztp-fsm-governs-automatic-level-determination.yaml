document: rfc-9692
kind: state-machine
summary: The RIFT ZTP FSM governs automatic level determination. Undefined FSM transitions in any RIFT FSM MUST be treated as unrecoverable errors, forcing the FSM back to _OneWay_ and flushing all flooding queues.
