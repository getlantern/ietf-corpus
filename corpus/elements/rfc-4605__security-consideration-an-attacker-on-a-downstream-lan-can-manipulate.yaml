document: rfc-4605
kind: security-consideration
summary: An attacker on a downstream LAN can manipulate the IGMP/MLD Querier election by advertising a lower IP address, causing itself to be elected Querier; since only the Querier forwards packets, this results in a black hole with no multicast traffic forwarded.
section: "5"
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
