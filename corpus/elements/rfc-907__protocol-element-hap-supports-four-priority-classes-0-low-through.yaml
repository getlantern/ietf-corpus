document: rfc-907
kind: protocol-element
summary: HAP supports four priority classes (0=low through 3=high) encoded in bits 8–9 of datagram word 3. Priority is used by the SIMP to arbitrate contention for satellite channel time; for streams, priority governs preemption of lower-priority streams at setup time.
