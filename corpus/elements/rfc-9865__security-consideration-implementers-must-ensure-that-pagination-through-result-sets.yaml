document: rfc-9865
kind: security-consideration
summary: Implementers MUST ensure that pagination through result sets is strictly confined to data that the actor's current identity has been authorized to access, even if the actor obtained a cursor generated by a different actor. Authorization checks MUST be continuously applied as an actor navigates through a result set; cursor possession MUST NOT grant supplementary access privileges.
section: "5.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
