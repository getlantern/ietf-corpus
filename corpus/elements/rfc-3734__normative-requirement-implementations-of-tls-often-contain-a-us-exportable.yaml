document: rfc-3734
kind: normative-requirement
summary: Implementations of TLS often contain a US-exportable cryptographic mode that SHOULD NOT be used to protect EPP; clients and servers desiring high security SHOULD use TLS with cryptographic algorithms less susceptible to compromise.
section: "8"
rfc2119_level: SHOULD NOT
