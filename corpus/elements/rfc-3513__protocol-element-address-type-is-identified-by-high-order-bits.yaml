document: rfc-3513
kind: protocol-element
summary: 'Address type is identified by high-order bits: unspecified is ::/128 (all zeros), loopback is ::1/128, multicast starts with FF00::/8, link-local unicast is FE80::/10, site-local unicast is FEC0::/10, and all other addresses are treated as global unicast. Anycast addresses are syntactically indistinguishable from unicast.'
section: "2.4"
