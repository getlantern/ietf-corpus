document: rfc-5884
kind: normative-requirement
summary: A BFD session MUST be established for a particular MPLS LSP to use BFD for fault detection on that LSP. BFD Control packets MUST be sent along the same data path as the LSP being verified.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - security
