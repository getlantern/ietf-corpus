summary: The dsliteNATBindTable extends the NATV2-MIB natv2PortMapTable by adding the IPv6 address of the B4 (dsliteTunnelStartAddress) to NAT binding entries. It is indexed by NAT instance, protocol, external realm, external address/port, ifIndex, and B4 tunnel start address.
