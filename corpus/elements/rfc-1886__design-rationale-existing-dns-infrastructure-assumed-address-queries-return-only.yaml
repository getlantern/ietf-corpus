document: rfc-1886
kind: design-rationale
summary: Existing DNS infrastructure assumed address queries return only 32-bit IPv4 addresses, making it impossible to extend for IPv6 without defining a new resource record type. The AAAA record and IP6.INT domain are designed to be backward-compatible, preserving existing IPv4 support.
section: "1"
topics:
    - dns
    - ip
    - v6ops
