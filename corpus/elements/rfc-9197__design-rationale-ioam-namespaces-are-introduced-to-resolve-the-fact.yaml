document: rfc-9197
kind: design-rationale
summary: IOAM-Namespaces are introduced to resolve the fact that IOAM node identifiers do not need to be globally unique and to allow namespace-specific interpretation of data fields (e.g., interface IDs, timestamp format, or buffer occupancy units). The Namespace-ID always travels with the data fields to provide necessary context.
section: "4.3"
topics:
