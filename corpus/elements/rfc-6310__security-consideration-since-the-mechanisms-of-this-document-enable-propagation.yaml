document: rfc-6310
kind: security-consideration
summary: Since the mechanisms of this document enable propagation of OAM messages and fault conditions between native service networks and PSNs, continuity of the end-to-end emulated service depends on a trust relationship between the operators of these networks. Security considerations for cross-operator scenarios are discussed in RFC 5254 Section 7; all generic PW security considerations from RFC 3985 Section 10 and VCCV security considerations from RFC 5085 apply.
section: "11"
topics:
    - security
    - mpls
