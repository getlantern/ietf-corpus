summary: The Keepalive message (Type=66) contains a 47-bit Receiver Context Tag, a 1-bit R field, a 7-bit Reserved1 field, a 32-bit Reserved2 field, and an optional Options field. It is a Shim6 control message with Next Header, Hdr Ext Len, and Checksum fields.
