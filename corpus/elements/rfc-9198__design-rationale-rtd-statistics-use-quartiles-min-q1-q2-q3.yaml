document: rfc-9198
kind: design-rationale
summary: RTD statistics use quartiles (min, Q1, Q2, Q3, max) rather than mean/variance because network traffic has a self-similar nature causing spiky queuing behavior; quartiles provide a nonparametric representation and the P² algorithm enables on-the-fly computation without storing the full dataset.
