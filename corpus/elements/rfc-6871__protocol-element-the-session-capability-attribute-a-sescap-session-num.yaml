document: rfc-6871
kind: protocol-element
summary: The session capability attribute 'a=sescap:<session-num> <list-of-configs> [<optional-configs>]' is a session-level attribute that specifies acceptable combinations of simultaneous media stream configurations (referencing 'pcfg' and/or 'lcfg' numbers). Lower session-num values are more preferred, and session preference order takes precedence over individual 'pcfg' preference order.
section: 3.3.8
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
