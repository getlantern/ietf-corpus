document: rfc-7147
kind: normative-requirement
summary: Individual objects within an active iscsiPortalAttributesEntry row may not be modified while the row is active. Changing attributes such as the IP address requires deleting and recreating the rows associated with the old values.
section: "6.4"
rfc2119_level: MUST NOT
topics:
