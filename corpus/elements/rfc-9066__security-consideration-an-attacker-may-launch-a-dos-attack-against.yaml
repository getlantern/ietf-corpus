document: rfc-9066
kind: security-consideration
summary: An attacker may launch a DoS attack against the Call Home DOTS client by causing it to perform computationally expensive (D)TLS operations before the attacker is detected as unauthorized. Common precautions such as temporarily adding a source address to a drop-list after a set number of unsuccessful authentication attempts are recommended.
section: "8"
topics:
