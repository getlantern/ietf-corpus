document: rfc-1508
kind: protocol-element
summary: 'Tokens are divided into two classes: context-level tokens exchanged to establish and manage a security context, and per-message tokens exchanged on an established context to provide protective services for data. Tokens are opaque to GSS-API callers and are generated and processed solely by the GSS-API implementation.'
section: 1.1.2
topics:
    - security
