kind: normative-requirement
summary: If the specified compression algorithm is zlib, the Certificate message MUST be compressed with the ZLIB compression algorithm (RFC 1950); brotli uses the Brotli algorithm (RFC 7932); zstd uses the Zstandard algorithm (RFC 8478).
