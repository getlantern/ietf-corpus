document: rfc-9833
kind: interoperability-note
summary: The authentication groupings support supplying explicit keys as ASCII strings rather than hexadecimal strings. Hexadecimal keys would afford greater entropy per octet but are excluded from this version because the underlying device modules (e.g., RFC 8695) do not support that format.
section: "6"
