document: rfc-3388
kind: protocol-element
summary: A 'media flow' is defined as a single media instance (e.g., audio or video) that may comprise one or more RTP sessions. FID semantics group 'm' lines that together constitute a single media flow, extending the RTSP definition of media stream.
