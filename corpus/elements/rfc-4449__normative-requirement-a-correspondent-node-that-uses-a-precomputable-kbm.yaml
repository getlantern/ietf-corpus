document: rfc-4449
kind: normative-requirement
summary: A correspondent node that uses a precomputable Kbm MUST keep track of the most recent value of the Sequence Number field of Binding Update messages using the precomputable Kbm value, for example by committing it to stable storage, to prevent replay attacks.
section: "3"
rfc2119_level: MUST
topics:
    - mobility
    - security
