document: rfc-6735
kind: protocol-element
summary: The Application-Level-Resource-Priority (ALRP) AVP (AVP Code 615) is a grouped AVP consisting of ALRP-Namespace (AVP Code 616) and ALRP-Value (AVP Code 617). It conveys the same priority semantics as SIP-Resource-Priority but uses numeric-only encoding rather than alpha-numeric.
