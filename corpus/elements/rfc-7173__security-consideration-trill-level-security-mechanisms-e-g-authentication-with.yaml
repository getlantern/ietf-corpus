document: rfc-7173
kind: security-consideration
summary: TRILL-level security mechanisms (e.g., authentication with TRILL IS-IS PDUs) are not affected by the use of pseudowire links. Layered security is possible via PPP security, pseudowire security, MPLS/IP security, or the underlying link technology's security.
section: "3"
topics:
