document: rfc-6019
kind: normative-requirement
summary: When encoding a multi-octet BinaryTime integer, the bits of the first octet and bit 8 of the second octet MUST NOT all be ones or all zeros, ensuring the integer is always encoded in the smallest possible number of octets.
