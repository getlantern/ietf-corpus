document: rfc-6321
kind: protocol-element
summary: Each iCalendar component (VEVENT, VTODO, VJOURNAL, VFREEBUSY, VTIMEZONE, STANDARD, DAYLIGHT, VALARM) is mapped to an XML element with the same name in lowercase. Future iCalendar components are converted in the same way.
section: "3.3"
