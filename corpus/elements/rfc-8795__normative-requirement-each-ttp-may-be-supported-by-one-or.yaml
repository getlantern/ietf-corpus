document: rfc-8795
kind: normative-requirement
summary: Each TTP MAY be supported by one or more supporting TTPs. If the TE node hosting the TTP refers to a supporting TE node, the supporting TTPs are hosted by that supporting TE node; if it refers to an underlay TE topology, the supporting TTPs are hosted by one or more specified TE nodes of the underlay topology.
section: "5.6"
rfc2119_level: MAY
topics:
    - yang
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
