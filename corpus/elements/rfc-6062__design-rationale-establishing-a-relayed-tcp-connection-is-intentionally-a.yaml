document: rfc-6062
kind: design-rationale
summary: Establishing a relayed TCP connection is intentionally a two-step process (Allocate, then Connect) rather than combined into one. Between steps, the client communicates the relayed transport address to the peer out-of-band (e.g., via ICE) so the peer can prepare by opening firewall holes, attempting simultaneous TCP open, etc.
section: "3"
topics:
    - nat
    - tcp
