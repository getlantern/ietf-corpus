document: rfc-4590
kind: normative-requirement
summary: The RADIUS server MUST verify that the RADIUS client is authorized to serve users of the realm in the Digest-Realm attribute; if not, it MUST send an Access-Reject and SHOULD log the event.
section: 2.2.1
rfc2119_level: MUST
