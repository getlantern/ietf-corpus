document: rfc-8871
kind: interoperability-note
summary: When RTP header extensions are encrypted HBH per RFC 6904, all hops — including Media Distributors — must decrypt and re-encrypt these header extensions. This is required to give the Media Distributor visibility into extensions such as the audio-level indicator (RFC 6464) while preserving HBH confidentiality.
section: "4.4"
topics:
    - rtp
    - realtime
