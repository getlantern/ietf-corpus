document: rfc-7902
kind: design-rationale
summary: The original 'PMSI Tunnel' attribute Flags field defined in RFC 6514 is only one octet, allowing only eight flags, which is considered insufficient for all future applications. This document creates a new Extended Community to carry additional flags beyond the eight-bit limit.
section: "1"
topics:
    - bgp
    - multicast
    - registry
