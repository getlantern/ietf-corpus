document: rfc-8300
kind: registry
summary: 'The ''NSH Next Protocol'' registry (8-bit values) defines: 0x01=IPv4, 0x02=IPv6, 0x03=Ethernet, 0x04=NSH, 0x05=MPLS, 0xFE/0xFF=Experiment. New values assigned via Expert Review. If assignments reach 128 values, IANA must alert the IESG for a stricter policy.'
section: 9.1.6
topics:
    - registry
    - security
