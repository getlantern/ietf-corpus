document: rfc-3498
kind: state-machine
summary: 'The apsChanStatusCurrent BITS object defines per-channel states: lockedOut (channel prevented from switching to protection, or for null channel, no working channel may switch), sd (Signal Degrade active), sf (Signal Failure active), switched (channel currently on protection line), and wtr (Wait-to-Restore timer active). These states are not mutually exclusive.'
