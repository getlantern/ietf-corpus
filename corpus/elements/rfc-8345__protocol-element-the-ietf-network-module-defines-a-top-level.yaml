document: rfc-8345
kind: protocol-element
summary: The `ietf-network` module defines a top-level `networks` container holding a list of `network` entries, each keyed by `network-id` (of type `inet:uri`). Each network contains a `network-types` augmentation target, a `supporting-network` list for underlay references, and a `node` list representing the network inventory.
section: "4.1"
