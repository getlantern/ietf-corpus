document: rfc-1122
kind: interoperability-note
summary: 'RFC-1122 corrects the TCP urgent pointer definition from RFC-793: the urgent pointer points to the sequence number of the last byte of urgent data, not one beyond it. Both interpretations are deployed; implementations must handle the ambiguity carefully when interoperating.'
section: 4.2.2.4
topics:
    - tcp
