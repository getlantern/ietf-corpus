document: rfc-7230
kind: normative-requirement
summary: A message with multiple Content-Length fields having differing values, or a single Content-Length with an invalid value, constitutes an unrecoverable framing error. Servers MUST respond with 400 and close; proxies MUST close and send 502; user agents MUST close and discard.
section: 3.3.3
rfc2119_level: MUST
topics:
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
