document: rfc-6810
kind: protocol-element
summary: Serial Number is a 32-bit strictly increasing unsigned integer that wraps from 2^32-1 to 0, denoting the logical version of a cache. A cache increments it when successfully completing a validated update from a parent cache or the Global RPKI. Serial Number arithmetic follows RFC 1982.
section: "2"
topics:
