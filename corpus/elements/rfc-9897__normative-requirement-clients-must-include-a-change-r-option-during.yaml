document: rfc-9897
kind: normative-requirement
summary: Clients MUST include a Change R option during the initial handshake request to supply a list of supported MP-DCCP protocol versions ordered by preference. Servers MUST include a Confirm L option in the subsequent response to agree on an MP-DCCP version from the client list, followed by the server's own supported versions ordered by preference.
section: "3.1"
rfc2119_level: MUST
topics:
    - multipath
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
