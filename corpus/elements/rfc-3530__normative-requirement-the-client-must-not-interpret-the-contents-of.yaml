document: rfc-3530
kind: normative-requirement
summary: The client MUST NOT interpret the contents of filehandles. If two filehandles from the same server are equal, they MUST refer to the same file. Clients MUST use filehandle comparisons only to improve performance, not for correct behavior.
section: 4.2.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
