document: rfc-9356
kind: normative-requirement
summary: Sub-TLVs that are not applicable to the L2 Bundle Member Attributes sub-TLV MUST NOT be used as nested sub-TLVs within it. An implementation MUST ignore any sub-TLVs received that are not applicable in the context of the L2 Bundle Member Attributes sub-TLV.
section: "2"
rfc2119_level: MUST NOT
topics:
    - routing
