document: rfc-8866
kind: normative-requirement
summary: The 'k=' line (encryption key field) is obsolete and MUST NOT be used. One MUST NOT include a 'k=' line in an SDP, and MUST discard it if received.
section: "5.12"
rfc2119_level: MUST NOT
