document: rfc-9855
kind: design-rationale
summary: TI-LFA cannot guarantee that a backup path protecting one segment in an SR policy honors the policy's path constraints, because those constraints are computed locally at the head-end or controller and are not visible at the PLR. For policy-compliant backup, end-to-end protection or a Flexible Algorithm node segment should be used instead.
section: "6.2"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
