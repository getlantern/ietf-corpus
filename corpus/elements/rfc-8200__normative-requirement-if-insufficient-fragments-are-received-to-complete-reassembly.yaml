document: rfc-8200
kind: normative-requirement
summary: If insufficient fragments are received to complete reassembly within 60 seconds of the first-arriving fragment, reassembly must be abandoned and all received fragments must be discarded. An ICMP Time Exceeded message should be sent if the first fragment has been received.
section: "4.5"
rfc2119_level: MUST
topics:
    - ip
