document: rfc-5810
kind: wire-format
summary: 'The ForCES common header is 24 octets: version (4 bits), rsvd (4 bits), Message Type (8 bits), Length (16 bits, in 4-byte DWORDs), Source ID (32 bits), Dest ID (32 bits), Correlator (64 bits), and Flags (32 bits). All fields are in network byte order and the message is 32-bit aligned.'
