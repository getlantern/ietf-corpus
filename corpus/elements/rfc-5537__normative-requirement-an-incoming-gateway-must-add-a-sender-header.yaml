document: rfc-5537
kind: normative-requirement
summary: An incoming gateway MUST add a Sender header field containing the mailbox of the gateway administrator. If the original message already contained a Sender header field, it SHOULD be renamed to Original-Sender to preserve its contents.
section: 3.10.2
rfc2119_level: MUST
topics:
    - email
