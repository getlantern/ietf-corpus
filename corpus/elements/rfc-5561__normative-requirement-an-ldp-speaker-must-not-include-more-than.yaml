document: rfc-5561
kind: normative-requirement
summary: An LDP speaker MUST NOT include more than one instance of a Capability Parameter (identified by the same TLV code point) in an Initialization or Capability message. If duplicates are received, the speaker SHOULD send a Notification with Status Code Malformed TLV value before terminating the session.
section: "3"
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
