document: rfc-8801
kind: privacy-consideration
summary: To minimize identity leakage when fetching PvD Additional Information, hosts SHOULD use an IPv6 temporary address (RFC 4941), SHOULD NOT include a User-Agent header or HTTP cookies, and MAY deprecate and regenerate the temporary address after the fetch to reduce linkability.
section: "7"
