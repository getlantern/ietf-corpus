document: rfc-3623
kind: wire-format
summary: Each TLV within the Grace-LSA body encodes Type (2 octets), Length (2 octets, value portion only), and Value. TLVs are padded to 4-octet alignment; padding is not included in the length field. Unrecognized TLV types are ignored.
