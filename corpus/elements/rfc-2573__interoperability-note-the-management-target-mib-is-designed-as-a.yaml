document: rfc-2573
kind: interoperability-note
summary: The Management Target MIB is designed as a general-purpose mechanism reusable beyond notification and proxy forwarding. Other documents that use this MIB are responsible for specifying how it is used; for example, [COEX] uses it for source address validation of SNMPv1 messages.
section: "4.1"
topics:
