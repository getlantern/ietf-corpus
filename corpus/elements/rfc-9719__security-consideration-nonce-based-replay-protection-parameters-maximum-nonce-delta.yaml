document: rfc-9719
kind: security-consideration
summary: Nonce-based replay protection parameters (maximum-nonce-delta, nonce-increasing-interval) are configurable via the model. Overly large nonce-delta values widen the replay-attack window; implementations should apply operational constraints consistent with RFC 9692 Section 6.9.4.
section: "4"
topics:
