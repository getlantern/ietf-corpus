document: rfc-5925
kind: normative-requirement
summary: The TCP-AO Length field MUST be greater than or equal to 4; when less than 4, TCP MUST discard the segment. The Length MUST also be consistent with the TCP header length; when invalid, TCP MUST discard the segment.
section: "2.2"
rfc2119_level: MUST
topics:
    - tcp
    - security
