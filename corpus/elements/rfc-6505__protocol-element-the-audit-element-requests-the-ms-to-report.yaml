document: rfc-6505
kind: protocol-element
summary: The <audit> element requests the MS to report its capabilities and the state of currently managed mixers. The corresponding <auditresponse> element returns <capabilities> and <mixers> child elements, with <conferenceaudit> and <joinaudit> describing each managed entity.
