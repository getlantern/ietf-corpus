document: rfc-9131
kind: design-rationale
summary: The Override flag MUST NOT be set for Optimistic Addresses to comply with RFC 4429 Section 2.2, ensuring that gratuitous NAs from an Optimistic Address cannot override an existing NC entry for the rightful address owner, preventing traffic disruption.
section: "4.1"
topics:
    - ip
