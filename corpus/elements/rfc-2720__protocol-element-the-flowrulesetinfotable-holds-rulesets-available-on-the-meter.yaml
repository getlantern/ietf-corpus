document: rfc-2720
kind: protocol-element
summary: The flowRuleSetInfoTable holds RuleSets available on the meter. A manager creates a row, sets flowRuleInfoSize and flowRuleInfoName, downloads rules, then sets flowRuleInfoStatus to active(1) to make the RuleSet ready to run. A running RuleSet cannot be modified.
