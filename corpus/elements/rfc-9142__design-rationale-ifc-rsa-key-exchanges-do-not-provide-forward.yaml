document: rfc-9142
kind: design-rationale
summary: IFC (RSA) key exchanges do not provide Forward Secrecy, unlike FFC (Diffie-Hellman) and ECC methods. This makes RSA key exchange inherently less secure for long-term session protection despite meeting minimum bit-strength requirements.
section: 1.2.3
topics:
    - crypto
    - security
