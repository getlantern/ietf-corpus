document: rfc-4737
kind: protocol-element
summary: A Sequence Discontinuity occurs when an arriving packet s > NextExp, indicating missing packets (lost or reordered). Its size is s - NextExp. A discontinuity is reclassified as a Reordering Discontinuity only if the missing packets subsequently arrive as reordered packets.
section: "3.4"
topics:
