document: rfc-6384
kind: normative-requirement
summary: An ALG used with a stateful translator MUST support EPSV translation and MAY support EPRT translation. An ALG used with a stateless translator MUST support EPSV translation and SHOULD also support EPRT translation.
section: "4"
rfc2119_level: MUST
