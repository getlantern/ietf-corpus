document: rfc-7839
kind: normative-requirement
summary: The Network-Name field encoding MUST be UTF-8 as described in RFC 3629. For PLMN Identifiers, both MNC and MCC MUST be three digits; if the MNC has only two digits it MUST be preceded with a '0'.
section: 4.3.1
rfc2119_level: MUST
