document: rfc-9338
kind: interoperability-note
summary: New implementations MUST support verification of the old 'CounterSignature' (label 7) to remain compatible with senders adhering to RFC 8152. Verification of 'CounterSignature0' (label 9) MAY be supported for further compatibility. New uses should migrate to CounterSignatureV2 (label 11) and CounterSignature0V2 (label 12).
section: "1"
rfc2119_level: MUST
topics:
    - cbor
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
