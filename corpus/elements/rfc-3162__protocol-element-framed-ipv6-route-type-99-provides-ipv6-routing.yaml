document: rfc-3162
kind: protocol-element
summary: Framed-IPv6-Route (Type 99) provides IPv6 routing information to be configured on the NAS for the user. It is used in Access-Accept packets, can appear multiple times, and its Text field is human-readable but MUST NOT affect protocol operation.
