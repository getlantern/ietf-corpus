document: rfc-9651
kind: security-consideration
summary: The size of most Structured Field types is not limited by this specification; extremely large field values could be an attack vector for resource consumption. HTTP implementations should limit sizes of individual fields and overall header/trailer sections to mitigate such attacks.
section: "6"
topics:
