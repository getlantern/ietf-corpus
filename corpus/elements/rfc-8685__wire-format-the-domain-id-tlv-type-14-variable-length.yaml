document: rfc-8685
kind: wire-format
summary: The Domain-ID TLV (Type=14, variable length) identifies PCE-managed domains. It encodes an 8-bit Domain Type (1=2-byte AS, 2=4-byte AS, 3=4-byte OSPF area, 4=variable IS-IS area) followed by a 24-bit Reserved field and a variable-length Domain ID padded to a 4-byte boundary.
section: 3.2.2
topics:
