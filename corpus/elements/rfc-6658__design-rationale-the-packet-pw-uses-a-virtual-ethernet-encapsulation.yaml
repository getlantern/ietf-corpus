document: rfc-6658
kind: design-rationale
summary: The packet PW uses a virtual Ethernet encapsulation because it is a well-known protocol stack already implemented on many hardware platforms, requires no new protocol design, and provides protocol multiplexing with fate sharing across all carried protocols. After evaluating PID-in-CW, PID label, and parallel PW approaches, virtual Ethernet was selected as the most readily deployable solution.
section: A.5
