document: rfc-9097
kind: protocol-element
summary: The formal singleton metric is "Type-P-One-way-IP-Capacity", defined as the number of IP-Layer bits (including header and data fields) correctly received at the Dst host during one contiguous sub-interval dt, divided by dt. Designated n0[dtn,dtn+1]/dt, it depends on Src, Dst, path, and Type-P.
section: "5.1"
topics:
