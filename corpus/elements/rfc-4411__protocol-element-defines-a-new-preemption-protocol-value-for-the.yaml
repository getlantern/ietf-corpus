document: rfc-4411
kind: protocol-element
summary: 'Defines a new ''Preemption'' protocol value for the SIP Reason header, carrying a cause parameter with four values: 1 (UA Preemption), 2 (Reserved Resources Preempted), 3 (Generic Preemption), and 4 (Non-IP Preemption). Syntax example: Reason: preemption ;cause=1 ;text="UA Preemption".'
