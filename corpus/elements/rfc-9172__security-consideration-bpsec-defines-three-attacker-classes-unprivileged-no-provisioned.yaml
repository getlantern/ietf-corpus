document: rfc-9172
kind: security-consideration
summary: 'BPSec defines three attacker classes: Unprivileged (no provisioned keys), Legitimate (has its own provisioned keys K_M), and Privileged (has keys of Alice and/or Bob). A privileged attacker constitutes full compromise; BPSec provides no mechanism to detect or remove such an attacker.'
section: "8.1"
topics:
    - security
    - crypto
