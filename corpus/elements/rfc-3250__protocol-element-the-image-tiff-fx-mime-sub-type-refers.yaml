document: rfc-3250
kind: protocol-element
summary: The image/tiff-fx MIME sub-type refers to TIFF-FX Profiles J, C, L, and M encoded image data and any future TIFF-FX extensions, or a subset. The image/tiff-fx content type may also be used for black-and-white data encoded using Profiles S or F.
section: "4"
