document: rfc-5533
kind: design-rationale
summary: The Context Tag is 47 bits — the largest value that fits in an 8-octet extension header while reserving one bit (the P bit) to distinguish Shim6 Payload Extension headers from Shim6 control messages, so that both can share a single IP protocol number (140) and pass through firewalls with a single rule.
section: "4.1"
topics:
