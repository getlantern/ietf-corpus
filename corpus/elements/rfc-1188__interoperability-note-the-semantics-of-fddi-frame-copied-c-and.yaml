document: rfc-1188
kind: interoperability-note
summary: The semantics of FDDI Frame Copied (C) and Address Recognized (A) indicators are not well defined as of the time of writing, especially in the presence of bridges. Implementors are urged to follow ANSI ASC X3T9.5 work on this issue to avoid interoperability problems.
section: MAC Layer Details
