document: rfc-2328
kind: design-rationale
summary: NBMA mode is more efficient (smaller database, less traffic) but requires full mesh connectivity among all attached routers. Point-to-MultiPoint mode avoids this constraint by treating each router-to-router connection as an independent point-to-point link, at the cost of larger databases. The choice depends on the underlying network's connectivity properties.
section: 2.1.1
topics:
    - routing
