document: rfc-922
kind: normative-requirement
summary: For multi-subnet broadcasts, a gateway should forward copies of the datagram on all connected links if and only if the datagram arrived on the link that is part of the best route back to the source (Reverse Path Forwarding). If not, the datagram must be discarded as a duplicate from another gateway.
section: "6.2"
rfc2119_level: SHOULD
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
