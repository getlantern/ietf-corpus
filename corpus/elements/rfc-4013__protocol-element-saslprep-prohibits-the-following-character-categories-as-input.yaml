document: rfc-4013
kind: protocol-element
summary: 'SASLprep prohibits the following character categories as input: non-ASCII space characters, ASCII and non-ASCII control characters, Private Use characters, non-character code points, surrogate code points, characters inappropriate for plain text or canonical representation, characters that change display properties or are deprecated, and tagging characters.'
section: "2.3"
topics:
