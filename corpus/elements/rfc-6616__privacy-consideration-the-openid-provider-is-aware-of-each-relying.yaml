document: rfc-6616
kind: privacy-consideration
summary: The OpenID Provider is aware of each Relying Party a user logs into; nothing in the protocol prevents the OP from tracking user access to services and collecting additional information. SASL servers should be aware of this OP visibility.
section: "6.3"
topics:
    - privacy
    - security
    - oauth
