document: rfc-2834
kind: design-rationale
summary: The new HARP message format was introduced (changing from RFC-1374) to properly acknowledge the HIPPI hardware address format and to eliminate the requirement for HIPPI-LE ARP for HARP to function, while also adding forward interoperability with HIPPI-6400 whose 6-byte-only ULA hardware address is distinguishable by length.
