document: rfc-9140
kind: privacy-consideration
summary: The PeerId assigned by the server is a persistent identifier linkable across network connections, enabling tracking of the peer device. The PeerInfo field may include device-identifying attributes (brand, model, serial number) that further facilitate tracking. Applications should limit PeerInfo content to what is necessary for OOB delivery, and the generic NAI 'noob@eap-noob.arpa' reveals that a device is being bootstrapped.
section: "6.10"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
