document: rfc-8277
kind: design-rationale
summary: The Compatibility field in the withdrawal NLRI is recommended to be 0x800000 (not 0x000000) for backwards compatibility with RFC 3107 implementations, even though its value is never significant. RFC 3107 allowed specifying a label value here, but that functionality was never implemented and is dropped.
section: "2.4"
topics:
