document: rfc-5969
kind: normative-requirement
summary: If a 6rd prefix requires the full 32-bit IPv4 address and non-aggregatable IPv4 space is used, the 6rd prefix MUST be no longer than /32 in order to offer a 6rd delegated prefix of at least /64.
section: "11"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
