document: rfc-9085
kind: security-consideration
summary: SR operates within a trusted domain, and SR traffic engineering policies using SIDs advertised via BGP-LS are expected to remain entirely within that trusted SR domain. Operators must take precautions to ensure BGP-LS SR information is not advertised to external BGP peering sessions outside the SR domain.
section: "5"
topics:
    - security
    - routing
    - bgp
