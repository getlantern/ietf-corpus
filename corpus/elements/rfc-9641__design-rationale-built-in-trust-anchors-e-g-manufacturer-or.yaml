document: rfc-9641
kind: design-rationale
summary: Built-in trust anchors (e.g., manufacturer or public CA certificates pre-installed on a device) are outside the scope of YANG configuration; they appear in <operational> and <system> datastores with 'or:origin' set to 'or:system', not in <intended>.
