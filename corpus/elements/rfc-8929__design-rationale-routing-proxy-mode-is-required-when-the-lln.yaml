document: rfc-8929
kind: design-rationale
summary: Routing Proxy mode is required when the LLN uses a link-layer address format incompatible with the backbone (e.g., EUI-64 vs EUI-48) and preferred when Layer 2 mobility signaling over a wide-area IP underlay is expensive. It avoids exposing LLN link-layer addresses on the backbone, reducing Layer 2 table size, instability, and gratuitous frames on roaming.
section: "7"
topics:
