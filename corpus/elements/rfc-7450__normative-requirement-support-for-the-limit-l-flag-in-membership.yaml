document: rfc-7450
kind: normative-requirement
summary: Support for the Limit (L) flag in Membership Query is RECOMMENDED. When L=1, the relay signals it is NOT accepting Membership Update messages from new gateway tunnel endpoints; a gateway should restart relay discovery rather than attempt to create new subscriptions.
section: 5.1.4.4
rfc2119_level: RECOMMENDED
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
