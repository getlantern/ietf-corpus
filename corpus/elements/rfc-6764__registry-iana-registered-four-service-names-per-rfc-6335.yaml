summary: 'IANA registered four service names per RFC 6335: ''caldav'' (CalDAV non-TLS, TCP, defined here) and ''caldavs'' (CalDAV over TLS, TCP, defined here); ''carddav'' (CardDAV non-TLS, TCP) and ''carddavs'' (CardDAV over TLS, TCP) are registered here but originally defined in RFC 6352. All support the TXT key ''path=<context path>''.'
