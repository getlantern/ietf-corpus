document: rfc-2817
kind: normative-requirement
summary: In the HTTP Upgrade Token Registry, the responsible party for the first registration of a 'product' token MUST approve later registrations of a 'version' token combined with that product token before the version token can be registered.
section: "7.2"
rfc2119_level: MUST
topics:
