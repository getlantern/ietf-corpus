document: rfc-1171
kind: wire-format
summary: 'The LCP packet format consists of: Code (1 octet, identifying packet type), Identifier (1 octet, for matching requests and replies), Length (2 octets, total packet length including Code/Identifier/Length/Data), and Data (variable). The Protocol field value 0xc021 identifies LCP packets.'
section: "4.4"
extracted_by: claude-sonnet-4-6
