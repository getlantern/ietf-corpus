document: rfc-9125
kind: protocol-element
summary: For MPLS SR, each gateway to an egress site may compute an SR TE path through the egress site to prefix X and place it in an MPLS Label Stack sub-TLV (RFC 9012) in the SR Tunnel TLV for that gateway, allowing ingress sites to perform SR TE through the egress site.
