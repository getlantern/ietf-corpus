document: rfc-6637
kind: design-rationale
summary: Only AES is recommended as the KEK algorithm for ECDH key wrapping because backward compatibility is not a concern for this new format; the KEK is scoped entirely within the ECDH Public-Key Encrypted Session Key Packet, unlike the session key algorithm for message encryption.
