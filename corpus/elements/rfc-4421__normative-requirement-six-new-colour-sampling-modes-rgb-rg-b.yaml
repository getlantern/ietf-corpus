document: rfc-4421
kind: normative-requirement
summary: Six new colour sampling modes ('RGB+', 'RG+B', 'R+GB', 'BGR+', 'BG+R', 'B+GR') MAY be signalled for use with RFC 4175. These modes use the same sample packing order as RGB and BGR modes respectively, except that an additional bit per sample MUST be used for the component marked by the '+' symbol.
section: "3"
rfc2119_level: MAY
topics:
    - rtp
    - realtime
