document: rfc-5195
kind: design-rationale
summary: BGP is used as the auto-discovery protocol because it operates across multiple autonomous systems, enabling L1VPNs that span multiple ASes. Although multi-AS L1VPNs are out of scope for the Basic Mode, the mechanism is designed to be extensible to that scenario.
section: "2"
topics:
