document: rfc-5996
kind: normative-requirement
summary: If a payload's critical flag is set and the payload type is unrecognized, the message MUST be rejected with an UNSUPPORTED_CRITICAL_PAYLOAD Notify containing the one-octet payload type. Payloads in IKE response messages MUST NOT have the critical flag set.
section: "2.5"
rfc2119_level: MUST
topics:
    - ipsec
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
