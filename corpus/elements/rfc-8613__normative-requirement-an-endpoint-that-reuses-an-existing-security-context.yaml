document: rfc-8613
kind: normative-requirement
summary: An endpoint that reuses an existing security context after losing mutable state (e.g., after a reboot) MUST NOT reuse a previous Sender Sequence Number and MUST NOT accept previously received messages.
section: "7.5"
rfc2119_level: MUST NOT
topics:
    - security
