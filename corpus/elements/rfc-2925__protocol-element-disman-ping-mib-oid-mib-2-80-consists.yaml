kind: protocol-element
summary: DISMAN-PING-MIB (OID mib-2 80) consists of pingMaxConcurrentRequests, pingCtlTable (test control with 23 columnar objects), pingResultsTable (per-test RTT aggregates), and pingProbeHistoryTable (ring-buffered per-probe results). Tests are started by setting pingCtlAdminStatus to enabled(1).
