document: rfc-7598
kind: normative-requirement
summary: When receiving OPTION_S46_PORTPARAMS with an explicit PSID, the client MUST use that PSID when configuring its softwire interface. The option with an explicit PSID MUST be discarded if the CE is not configured with a full IPv4 address.
section: "4.5"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
