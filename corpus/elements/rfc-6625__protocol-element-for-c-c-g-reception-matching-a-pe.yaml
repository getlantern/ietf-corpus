document: rfc-6625
kind: protocol-element
summary: For (C-*,C-G) reception matching, a PE matches against a (C-*,C-G) S-PMSI A-D route from the upstream PE if PE1 determines PE2 is the upstream PE for C-G's C-RP, or PE2 has Source Active A-D routes for C-G without corresponding (C-S,C-G) state, or C-G is BIDIR-PIM, or Source Active A-D routes are not used. If no (C-*,C-G) match, fallback to (C-*,C-*) under the same conditions applies.
section: 3.2.2
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
