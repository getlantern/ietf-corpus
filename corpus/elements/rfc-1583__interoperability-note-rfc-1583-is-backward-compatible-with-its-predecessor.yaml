document: rfc-1583
kind: interoperability-note
summary: RFC 1583 is backward-compatible with its predecessor RFC 1247. All differences are bug fixes and clarifications; implementations of RFC 1247 and RFC 1583 will interoperate. The key fixes are documented in Appendix E (virtual link fix, supernetting/subnet-0 support, TOS encoding update, etc.).
