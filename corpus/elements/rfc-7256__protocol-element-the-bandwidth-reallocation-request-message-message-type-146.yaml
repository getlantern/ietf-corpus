document: rfc-7256
kind: protocol-element
summary: The Bandwidth Reallocation Request message (Message Type 146) may be sent by either the NAS or the AN to request adjustment of the delegated multicast bandwidth total for a given access line; it contains a Target TLV and Bandwidth-Request TLV specifying both required and preferred bandwidth amounts.
