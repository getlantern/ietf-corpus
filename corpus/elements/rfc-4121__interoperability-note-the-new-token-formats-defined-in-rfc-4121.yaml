document: rfc-4121
kind: interoperability-note
summary: The new token formats defined in RFC 4121 are only recognized by new implementations. For backward compatibility with RFC 1964 peers, it is RECOMMENDED that new token formats SHOULD be used only when both peers are known to support the new mechanism—for example, when 'newer' enctypes are in use—to avoid requiring out-of-band negotiation or retry logic.
section: "6"
topics:
