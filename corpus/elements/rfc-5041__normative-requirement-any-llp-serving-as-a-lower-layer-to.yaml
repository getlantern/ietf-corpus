document: rfc-5041
kind: normative-requirement
summary: Any LLP serving as a lower layer to DDP MUST expose MULPDU and MULPDU changes so DDP can perform aligned segmentation. DDP MUST NOT be required to re-segment previously posted DDP Segments when the MULPDU changes.
section: "3"
rfc2119_level: MUST
topics:
    - realtime
