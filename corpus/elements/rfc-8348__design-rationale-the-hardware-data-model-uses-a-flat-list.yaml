document: rfc-8348
kind: design-rationale
summary: The hardware data model uses a flat list of components (rather than a nested tree) where hierarchy is expressed via 'parent' and 'contains-child' leafrefs. This design mirrors the ENTITY-MIB flat table approach and simplifies mapping between the YANG model and the MIB.
