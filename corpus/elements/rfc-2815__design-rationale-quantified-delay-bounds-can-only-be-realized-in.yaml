document: rfc-2815
kind: design-rationale
summary: Quantified delay bounds can only be realized in combination with admission control; priority scheduling alone provides only relative ordering and cannot enforce absolute delay or loss bounds for individual flows. The admission control algorithm determines which Int-Serv service level (Controlled Load vs. Guaranteed) is actually offered.
