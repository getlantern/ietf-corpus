document: rfc-8551
kind: design-rationale
summary: 'Two signed message formats are defined and both must be supported: multipart/signed (clear-signing) is preferred for sending because recipients without S/MIME can read the body, while application/pkcs7-mime with SignedData protects content integrity against intermediate agents that might alter transfer encoding, which would break a clear signature.'
section: 3.5.1
topics:
