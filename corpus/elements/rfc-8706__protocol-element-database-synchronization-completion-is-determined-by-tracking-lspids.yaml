document: rfc-8706
kind: protocol-element
summary: Database synchronization completion is determined by tracking LSPIDs from the first complete CSNP set received over each interface. Entries are removed as LSPs arrive or their remaining lifetime expires. Timer T2 is canceled when the LSPID list is empty and T1 is canceled on all interfaces with adjacencies at that level.
section: "3.4"
topics:
    - routing
