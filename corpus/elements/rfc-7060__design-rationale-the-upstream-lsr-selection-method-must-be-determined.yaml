document: rfc-7060
kind: design-rationale
summary: The upstream LSR selection method must be determined by the Service Provider and made known a priori (by provisioning) to all LSRs involved, because the base mLDP specification assumes IGP next hop and a directly connected LDP session, which does not hold in the Targeted mLDP case.
