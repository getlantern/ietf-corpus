document: rfc-8188
kind: normative-requirement
summary: The same salt parameter value MUST NOT be reused for two different payload bodies that have the same input-keying material. Generating a random salt for every application of the content coding ensures content-encryption key reuse is highly unlikely.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - http
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
