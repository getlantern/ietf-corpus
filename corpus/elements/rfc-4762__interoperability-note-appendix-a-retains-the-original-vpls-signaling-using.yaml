document: rfc-4762
kind: interoperability-note
summary: Appendix A retains the original VPLS signaling using the PWid FEC Element (FEC type 128) because live deployments use this version. The VCID in this context has global significance across all PEs in the VPLS instance, unlike the point-to-point service identifier use defined in RFC 4447.
section: Appendix A
