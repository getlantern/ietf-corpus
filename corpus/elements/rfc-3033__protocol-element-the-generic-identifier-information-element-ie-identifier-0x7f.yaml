document: rfc-3033
kind: protocol-element
summary: The Generic Identifier information element (IE identifier 0x7F) enables transfer of identifiers between end-to-end users in the ATM network. It is defined in Q.2941.1 and Q.2941.2 as optional for Q.2931 and Q.2971 UNI signaling. Up to three Generic Identifier IEs may appear in SETUP, ALERTING, CONNECT, RELEASE, RELEASE COMPLETE, ADD PARTY, PARTY ALERTING, ADD PARTY ACK, ADD PARTY REJECT, DROP PARTY, and DROP PARTY ACK messages.
section: "3.1"
topics:
    - mpls
    - ip
