document: rfc-7900
kind: protocol-element
summary: The 'extranet RD' is a second Route Distinguisher configured on a VRF that holds both extranet and non-extranet C-sources when extranet separation is used. UMH-eligible routes for extranet C-sources are exported carrying this extranet RD rather than the VRF's default RD.
