document: rfc-8842
kind: normative-requirement
summary: Every time an endpoint requests to establish a new DTLS association, the endpoint MUST generate a new local 'tls-id' attribute value. An unchanged local 'tls-id' value combined with non-changed fingerprints indicates reuse of the existing DTLS association.
section: "4"
rfc2119_level: MUST
topics:
    - realtime
    - sip
