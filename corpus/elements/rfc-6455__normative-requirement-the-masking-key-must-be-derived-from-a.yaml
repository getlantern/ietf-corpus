document: rfc-6455
kind: normative-requirement
summary: The masking key MUST be derived from a strong source of entropy (per RFC 4086) and MUST NOT be predictable from prior frame masking keys, to prevent malicious applications from selecting the bytes that appear on the wire.
section: "5.3"
rfc2119_level: MUST
topics:
    - websocket
    - security
