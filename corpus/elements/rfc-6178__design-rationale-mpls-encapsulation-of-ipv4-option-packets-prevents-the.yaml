document: rfc-6178
kind: design-rationale
summary: MPLS encapsulation of IPv4 option packets prevents the Router Alert IPv4 header option (option value 148) from forcing imposition of the MPLS Router Alert Label (label value 1) at ingress LERs, which could otherwise be exploited to trigger DoS conditions on downstream LSRs.
section: "4"
topics:
    - mpls
    - ip
    - security
