document: rfc-6514
kind: design-rationale
summary: The VRF Route Import Extended Community encodes the PE's IP address in the Global Administrator field and a locally assigned 2-octet VRF identifier in the Local Administrator field, enabling the community to globally and uniquely identify a VRF without requiring cross-PE coordination of VRF identifiers.
