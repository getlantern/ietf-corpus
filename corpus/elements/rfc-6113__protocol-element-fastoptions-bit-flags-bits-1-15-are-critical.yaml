document: rfc-6113
kind: protocol-element
summary: 'FastOptions bit flags: bits 1-15 are critical (KDC MUST fail with KDC_ERR_UNKNOWN_CRITICAL_FAST_OPTIONS if unsupported); bits 16+ are non-critical (KDC ignores unknown). Defined options: RESERVED (0), hide-client-names (1, critical — KDC identifies the client as anonymous principal in all replies), kdc-follow-referrals (16, non-critical, reserved).'
section: 5.4.2
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
