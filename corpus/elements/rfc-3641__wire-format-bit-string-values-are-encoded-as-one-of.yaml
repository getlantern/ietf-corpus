document: rfc-3641
kind: wire-format
summary: 'BIT STRING values are encoded as one of three forms: a named bit list (bit-list) using identifiers from the named bit list enclosed in braces, a hex string (hstring) of the form ''...''H when bits are a multiple of four, or a binary string (bstring) of the form ''...''B otherwise.'
section: "3.5"
