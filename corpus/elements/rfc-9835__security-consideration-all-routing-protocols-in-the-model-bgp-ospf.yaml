document: rfc-9835
kind: security-consideration
summary: All routing protocols in the model (BGP, OSPF, IS-IS, RIP) include an 'authentication' container supporting key chains (RFC 8177) or explicit key/algorithm configuration. The 'security' container at the AC level references 'encryption-profile-identifier' for encryption policy. These mechanisms protect routing sessions established over ACs from spoofing and tampering.
section: "5.8"
topics:
    - security
    - yang
    - netconf
    - crypto
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
