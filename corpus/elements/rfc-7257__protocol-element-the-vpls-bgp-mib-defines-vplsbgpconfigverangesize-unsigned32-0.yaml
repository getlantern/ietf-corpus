document: rfc-7257
kind: protocol-element
summary: The VPLS-BGP-MIB defines vplsBgpConfigVERangeSize (Unsigned32 0..65535, default 0) specifying the VPLS Edge Identifier range size for label block advertisement. The VE ID occupies 2 octets in BGP NLRI per RFC 4761, limiting the range to 65535.
section: "6.3"
topics:
    - snmp
    - routing
    - bgp
