document: rfc-8974
kind: normative-requirement
summary: Intermediaries SHOULD limit the size of client information they serialize into their own tokens, for example by capping the extended token lengths they accept from clients or by falling back to stateful operation when client information exceeds the limit.
section: "4.4"
rfc2119_level: SHOULD
topics:
    - security
