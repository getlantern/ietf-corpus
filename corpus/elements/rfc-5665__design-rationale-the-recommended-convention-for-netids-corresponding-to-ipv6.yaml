document: rfc-5665
kind: design-rationale
summary: The recommended convention for netids corresponding to IPv6 transports is to end the netid name with '6' (e.g., 'tcp6', 'udp6', 'sctp6', 'rdma6'). This is a convention, not a hard requirement, intended to improve readability and consistency.
