document: rfc-4860
kind: normative-requirement
summary: When the RSVP-AGGREGATE FILTER_SPEC is used with a GENERIC-AGGREGATE SESSION, Diffserv classification MUST rely on the DSCP associated with the PHB-ID of the generic aggregate reservation. Fine-grain classification MUST use the 3-tuple <DestAddress, SrcAddress, DSCP>.
section: "3.1"
rfc2119_level: MUST
topics:
