document: rfc-7877
kind: state-machine
summary: 'SED Group Offer has two states: ''offered'' (automatically set when a new offer is Added) and ''accepted'' (automatically set when the offer is Accepted). Rejection at any point deletes the offer and removes the data recipient''s organization ID from the SED Group''s peeringOrg list. Offers may be rejected even after prior acceptance.'
section: "7.4"
topics:
