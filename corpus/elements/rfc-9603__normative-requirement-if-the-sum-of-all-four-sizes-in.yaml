document: rfc-9603
kind: normative-requirement
summary: If the sum of all four sizes in the SID Structure is larger than 128 bits, the corresponding SRv6 SID MUST be considered invalid and a PCErr with Error-Type=10 and Error-Value=37 ('Invalid SRv6 SID Structure') is returned.
section: 4.3.1.1
rfc2119_level: MUST
topics:
    - routing
    - ip
