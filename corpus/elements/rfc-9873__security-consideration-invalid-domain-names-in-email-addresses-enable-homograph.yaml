document: rfc-9873
kind: security-consideration
summary: 'Invalid domain names in email addresses enable homograph attacks: a malicious actor can register a visually similar U-label domain and use social engineering to assume control of the contact''s domain. Registries SHOULD validate domain name syntax in email addresses and check code points against the IANA ''IDNA Rules and Derived Property Values'' registry.'
section: "8"
rfc2119_level: SHOULD
topics:
    - email
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
