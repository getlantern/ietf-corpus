document: rfc-9719
kind: security-consideration
summary: The YANG model exposes sensitive cryptographic configuration nodes—explicit authentication keys and key-chain references for TIE security and link security. NETCONF/RESTCONF access control must restrict read and write access to these subtrees to prevent unauthorized key disclosure or modification.
section: "4"
topics:
