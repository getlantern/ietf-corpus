document: rfc-8654
kind: normative-requirement
summary: When propagating an UPDATE larger than 4,096 octets to a neighbor that has not advertised the BGP Extended Message Capability, the speaker SHOULD try to reduce the outgoing message size by removing attributes eligible under the 'attribute discard' approach of RFC 7606.
section: "4"
rfc2119_level: SHOULD
topics:
    - bgp
    - routing
