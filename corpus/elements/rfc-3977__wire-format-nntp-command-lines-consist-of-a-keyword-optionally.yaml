document: rfc-3977
kind: wire-format
summary: NNTP command lines consist of a keyword optionally followed by arguments, terminated by CRLF. Command lines MUST NOT exceed 512 octets (including CRLF); arguments MUST NOT exceed 497 octets. Multiple commands MUST NOT appear on the same line.
section: "3.1"
