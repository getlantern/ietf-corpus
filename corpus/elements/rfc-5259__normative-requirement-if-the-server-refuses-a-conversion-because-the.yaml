document: rfc-5259
kind: normative-requirement
summary: If the server refuses a conversion because the request lists too many messages, it MUST return the MAXCONVERTMESSAGES response code. If too many body parts are requested at once, it MUST return the MAXCONVERTPARTS response code.
section: "8.5"
rfc2119_level: MUST
topics:
