document: rfc-9801
kind: design-rationale
summary: The default replacement data value of 0xAA (alternating 0s and 1s) was chosen because it maintains clock synchronization during packet loss and, for 64B/66B code-based services, ensures no invalid sync headers (which would have a sync header value of 11) are generated by the replacement pattern.
section: 7.2.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
