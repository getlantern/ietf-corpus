document: rfc-7095
kind: normative-requirement
summary: When converting vCard to jCard, lines MUST be unfolded first, then vCard escaping MUST be unescaped, then JSON escaping MUST be applied. The reverse order applies when converting jCard to vCard, with long lines SHOULD be folded as per RFC 6350.
section: "3.1"
rfc2119_level: MUST
topics:
    - json
