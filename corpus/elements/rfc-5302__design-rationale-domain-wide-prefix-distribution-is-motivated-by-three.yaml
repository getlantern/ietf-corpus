document: rfc-5302
kind: design-rationale
summary: 'Domain-wide prefix distribution is motivated by three needs: (1) optimal route computation when prefix summarization loses information, (2) accurate IGP metrics for BGP shortest-exit routing, and (3) accurate IS-IS metrics for BGP MED values across a multi-area domain. RFC 1195 summarization causes suboptimal routing because L2 routers lack intra-area topology detail.'
section: "1.1"
topics:
    - routing
    - bgp
