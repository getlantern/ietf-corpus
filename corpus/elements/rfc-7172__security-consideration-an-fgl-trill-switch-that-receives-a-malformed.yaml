document: rfc-7172
kind: security-consideration
summary: An FGL TRILL switch that receives a malformed TRILL Data packet and does not check the Ethertype after the Inner.MacSA could improperly egress the packet in VLAN X, violating security policy. End-to-end encryption and authentication should be considered for sensitive data traversing the TRILL campus.
section: "9"
topics:
    - routing
    - security
