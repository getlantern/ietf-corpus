document: rfc-4364
kind: protocol-element
summary: A VPN Routing and Forwarding (VRF) table is a per-VPN forwarding table maintained on PE routers. Each PE/CE attachment circuit is associated by configuration with one or more VRFs; incoming packets are looked up in the VRF determined by their ingress attachment circuit.
