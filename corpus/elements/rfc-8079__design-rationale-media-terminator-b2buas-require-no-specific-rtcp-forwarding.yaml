document: rfc-8079
kind: design-rationale
summary: Media Terminator B2BUAs require no specific RTCP forwarding guidelines because they terminate RTP/RTCP themselves and handle statistics and feedback directly. End-to-end RTCP interaction between participants does not exist in such topologies; the B2BUA is the RTCP endpoint on each side.
section: "3.3"
topics:
    - rtp
    - realtime
    - sip
