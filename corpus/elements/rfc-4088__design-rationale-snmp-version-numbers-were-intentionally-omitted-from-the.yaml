document: rfc-4088
kind: design-rationale
summary: SNMP version numbers were intentionally omitted from the URI scheme syntax to permit use of both older SNMP versions (v1, v2c via RFC 3584) and any possible future successor to SNMPv3, keeping the scheme forward-compatible.
