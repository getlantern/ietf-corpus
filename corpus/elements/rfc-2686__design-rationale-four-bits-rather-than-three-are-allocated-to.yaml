document: rfc-2686
kind: design-rationale
summary: 'Four bits (rather than three) are allocated to the class field in the long sequence number format so that prefix elision can be applied selectively: when only some packets of a priority level share a common prefix, two class numbers can be allocated, one with and one without the prefix association.'
