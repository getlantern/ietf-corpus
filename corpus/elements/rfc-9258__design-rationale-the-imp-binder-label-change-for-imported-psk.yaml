document: rfc-9258
kind: design-rationale
summary: The "imp binder" label change for imported PSK binder key derivation is introduced to prevent confusion between imported and non-imported PSKs. Without this change, a mismatch between endpoints (one importing, one not) would not be detected at binder verification time.
section: "5.2"
