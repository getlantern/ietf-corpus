document: rfc-5043
kind: normative-requirement
summary: The DDP-SSNs assigned to Data Chunks for a session MUST NOT have any gaps. If a received Payload Data Chunk conforms to none of the legal session patterns, the DDP Stream Session MUST be terminated.
section: "6"
rfc2119_level: MUST
