document: rfc-7845
kind: design-rationale
summary: The 61,440-octet audio packet size limit was derived from the maximum reasonable packet size of (7,664*N - 2) octets for 120 ms of 8-channel stereo CELT, rounded up to a multiple of 1,024, ensuring all implementations can process it without excessive memory use.
section: "6"
