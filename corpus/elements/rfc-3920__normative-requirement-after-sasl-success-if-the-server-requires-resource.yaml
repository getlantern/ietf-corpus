document: rfc-3920
kind: normative-requirement
summary: After SASL success, if the server requires resource binding, it MUST advertise an empty <bind/> element (qualified by 'urn:ietf:params:xml:ns:xmpp-bind') in stream features. The client MUST bind a resource via an IQ 'set' stanza; the server MUST be able to generate a unique resource identifier on behalf of the client.
section: "7"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
