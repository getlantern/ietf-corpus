document: rfc-8827
kind: protocol-element
summary: 'The SDP ''identity'' attribute is a session-level attribute used to convey an endpoint''s identity assertion to its peer. The identity-assertion value is base64-encoded JSON containing two keys: ''assertion'' (an opaque IdP-consumed string) and ''idp'' (a dictionary identifying the IdP by domain and protocol).'
