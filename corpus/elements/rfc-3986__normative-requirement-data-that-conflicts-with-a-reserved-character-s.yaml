document: rfc-3986
kind: normative-requirement
summary: Data that conflicts with a reserved character's delimiter role must be percent-encoded before the URI is formed. If a reserved character is found in a URI component and no delimiting role is known for it, it must be interpreted as the data octet for that character's US-ASCII encoding.
section: "2.2"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
