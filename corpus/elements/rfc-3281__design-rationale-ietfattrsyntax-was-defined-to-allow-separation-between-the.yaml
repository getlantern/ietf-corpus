document: rfc-3281
kind: design-rationale
summary: IetfAttrSyntax was defined to allow separation between the AC issuer and the attribute policy authority (a single policy authority can allocate values while multiple AC issuers deploy them), and to restrict value syntaxes to OCTET STRING, OID, and UTF8String to reduce matching complexity.
section: "4.4"
topics:
    - pkix
