document: rfc-7791
kind: normative-requirement
summary: If the initiator requests more cloned IKE SAs than the responder can handle (explicit or implicit limit), the responder SHOULD reject the request with NO_ADDITIONAL_SAS. This is a permanent condition; the initiator SHOULD NOT retry until existing SAs are deleted.
section: "5.3"
rfc2119_level: SHOULD
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
