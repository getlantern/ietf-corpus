document: rfc-6330
kind: design-rationale
summary: Source blocks are padded to the next K' value in the systematic index table rather than supporting arbitrary K values. This simplifies encoder/decoder design by requiring only a finite set of pre-computed systematic indices J(K'), and enables faster encoding/decoding by keeping K' as a well-analyzed value.
section: 5.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
