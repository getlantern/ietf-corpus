document: rfc-6825
kind: security-consideration
summary: The tedTable, tedLocalIfAddrTable, tedRemoteIfAddrTable, tedSwCapTable, and tedSrlgTable contain MPLS/GMPLS network topology information and should be considered sensitive. GET and NOTIFY access should be controlled and values may need to be encrypted when transmitted via SNMP.
