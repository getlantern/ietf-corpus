document: rfc-9303
kind: normative-requirement
summary: ITR-OTK confidentiality and integrity MUST be provided in the path between the ITR and the Map-Resolver, either by encrypting the ITR-OTK with the ITR/Map-Resolver pre-shared secret or by enabling DTLS between the ITR and Map-Resolver.
section: "6.4"
rfc2119_level: MUST
topics:
    - security
    - crypto
