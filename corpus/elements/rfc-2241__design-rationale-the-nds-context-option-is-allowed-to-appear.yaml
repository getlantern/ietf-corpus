document: rfc-2241
kind: design-rationale
summary: The NDS Context Option is allowed to appear more than once in a DHCP packet (concatenated per RFC 2131) because an NDS context name can exceed the 255-octet limit of a single DHCP option. Implementations are discouraged from enforcing any specific maximum on the final concatenated context.
section: "4"
extracted_by: claude-sonnet-4-6
