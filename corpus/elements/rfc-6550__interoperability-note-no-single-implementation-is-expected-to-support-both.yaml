document: rfc-6550
kind: interoperability-note
summary: No single implementation is expected to support both Storing and Non-Storing downward-route modes simultaneously. A given RPL Instance is either entirely Storing or entirely Non-Storing; hybrid operation is out of scope for this specification.
section: "3.3"
topics:
