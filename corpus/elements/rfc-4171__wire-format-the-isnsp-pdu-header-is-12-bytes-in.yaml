document: rfc-4171
kind: wire-format
summary: 'The iSNSP PDU header is 12 bytes in big-endian order: iSNSP Version (2 bytes), Function ID (2 bytes), PDU Length (2 bytes), Flags (2 bytes), Transaction ID (2 bytes), and Sequence ID (2 bytes). All iSNSP frame formats use big-endian network byte order.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
