document: rfc-2473
kind: protocol-element
summary: For IPv6 original packets, tunnel ICMP errors (hop limit exceeded, unreachable node, parameter problem) are reported to the original source as ICMPv6 Type 1 (Unreachable) Code 3 (address unreachable); Packet Too Big is reported as Type 2 Code 0 with the MTU field adjusted by subtracting the tunnel header length.
