document: rfc-9390
kind: normative-requirement
summary: When a node receives at least one Session-Group-Capability-Vector AVP with the BASE_SESSION_GROUP_CAPABILITY flag set, it MUST cache this capability information for the lifetime of the routing table entry associated with the peer identity / Application Id pair.
