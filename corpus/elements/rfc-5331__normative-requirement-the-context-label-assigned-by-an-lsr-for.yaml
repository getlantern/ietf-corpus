document: rfc-5331
kind: normative-requirement
summary: The context label assigned by an LSR for use on a particular LAN interface MUST be unique across all context labels assigned by other LSRs for use on the same LAN. When a labeled packet is received from the LAN, the context label MUST be looked up in the context of the LAN interface on which the packet is received.
section: "8"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
