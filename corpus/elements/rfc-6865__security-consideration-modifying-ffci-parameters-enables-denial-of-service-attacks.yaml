document: rfc-6865
kind: security-consideration
summary: 'Modifying FFCI parameters enables Denial of Service attacks: changing the FEC Encoding ID causes the receiver to use a different scheme; setting E too small creates incoherency for received symbols; changing m causes sender and receiver to interpret Payload ID fields differently and may impose excessive decoding load.'
section: "6.2"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
