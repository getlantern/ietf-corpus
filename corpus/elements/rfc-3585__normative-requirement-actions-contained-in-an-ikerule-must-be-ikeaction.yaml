document: rfc-3585
kind: normative-requirement
summary: Actions contained in an IKERule MUST be IKEAction or IKERejectAction (phase 1 actions); actions in an IPsecRule MUST be phase 2 or preconfigured SA actions (e.g., IPsecTransportAction, IPsecBypassAction). All SARule-contained actions MUST be subclasses of SAAction or instances of CompoundPolicyAction.
section: "4.7"
rfc2119_level: MUST
topics:
    - ipsec
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
