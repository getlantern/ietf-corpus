document: rfc-5652
kind: normative-requirement
summary: For message digest calculation when signedAttrs is present, the IMPLICIT [0] tag is NOT used; instead an EXPLICIT SET OF tag MUST be applied. The DER encoding of the SET OF tag, length, and SignedAttributes value octets are included in the digest input.
section: "5.4"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
