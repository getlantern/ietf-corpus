document: rfc-7578
kind: interoperability-note
summary: Many web applications use 'application/x-www-form-urlencoded' for form data and a receiving application may need to support both that format and multipart/form-data. The URL-encoded format is more compact but cannot label parts with a Content-Type or charset.
section: "5.3"
topics:
    - http
