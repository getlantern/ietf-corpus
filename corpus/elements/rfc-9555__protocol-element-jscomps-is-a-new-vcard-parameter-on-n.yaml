document: rfc-9555
kind: protocol-element
summary: JSCOMPS is a new vCard parameter on N and ADR that records the ordered sequence and separators for JSContact name or address components. Its structured value consists of a default separator entry followed by positional and separator entries, preserving isOrdered semantics across round-trips.
