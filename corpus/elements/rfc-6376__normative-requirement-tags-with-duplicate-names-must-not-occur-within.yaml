document: rfc-6376
kind: normative-requirement
summary: Tags with duplicate names MUST NOT occur within a single tag-list; if a tag name occurs more than once, the entire tag-list is invalid. Tags MUST be interpreted in a case-sensitive manner.
section: "3.2"
rfc2119_level: MUST NOT
