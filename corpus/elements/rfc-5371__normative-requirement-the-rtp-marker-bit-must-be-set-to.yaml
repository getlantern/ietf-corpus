document: rfc-5371
kind: normative-requirement
summary: The RTP marker bit MUST be set to 1 for the last RTP packet of a video frame; otherwise it MUST be 0. When transmission is performed by multiple RTP sessions, this bit is 1 in the last packet of the frame in each session.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
