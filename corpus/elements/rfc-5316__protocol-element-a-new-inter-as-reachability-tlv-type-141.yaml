document: rfc-5316
kind: protocol-element
summary: A new Inter-AS Reachability TLV (type 141) is defined to advertise inter-AS TE link information within an ISIS routing domain. It contains a 4-octet Router ID, 3-octet default metric, 1-octet control field (S bit, D bit, 6 reserved bits), 1-octet sub-TLV length, and 0-246 octets of sub-TLVs.
section: "3.1"
topics:
