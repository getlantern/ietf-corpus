document: rfc-4194
kind: normative-requirement
summary: A data Block MUST contain at least one (1) Word and MUST NOT be larger than (2^64)-1 bits. The total size in bits is (8 * word_size * length) and this expression MUST NOT exceed (2^64)-1.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
