document: rfc-5036
kind: design-rationale
summary: 'The TLV U-bit and F-bit mechanism was designed to allow future TLVs to be deployed in networks with older implementations: U=1 permits silent ignore, and U=1 with F=1 allows opaque forwarding through non-understanding nodes, enabling incremental capability introduction.'
