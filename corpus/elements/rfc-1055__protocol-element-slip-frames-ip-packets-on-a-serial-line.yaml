document: rfc-1055
kind: protocol-element
summary: SLIP frames IP packets on a serial line using two special characters (END and ESC) and byte stuffing. A data byte equal to END is replaced by the two-byte sequence ESC + ESC_END; a data byte equal to ESC is replaced by ESC + ESC_ESC. The framed packet is terminated by an END character.
section: PROTOCOL
