document: rfc-3923
kind: protocol-element
summary: The <e2e/> element, qualified by 'urn:ietf:params:xml:ns:xmpp-e2e', is a wrapper for an XML CDATA section containing a Message/CPIM, application/pidf+xml, or application/xmpp+xml S/MIME object. It appears as a child of <message/>, <presence/>, or other XMPP stanzas.
