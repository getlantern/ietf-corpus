document: rfc-1398
kind: protocol-element
summary: dot3StatsAlignmentErrors counts frames received that are not an integral number of octets and fail the FCS check. Incremented when the alignmentError status is returned by the MAC to the LLC; frames with multiple error conditions are counted exclusively by the first error status presented.
