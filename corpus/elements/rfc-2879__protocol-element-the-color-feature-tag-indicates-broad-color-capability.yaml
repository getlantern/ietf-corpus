document: rfc-2879
kind: protocol-element
summary: 'The ''color'' feature tag indicates broad color capability: Binary (bi-level), Limited (small number of fixed colors, interpreted as one-bit-per-color-sample for Internet fax), Mapped (palette-mapped), Grey (continuous-tone grey), or Full (full continuous-tone color).'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
