document: rfc-4721
kind: security-consideration
summary: To prevent denial-of-service attacks where an active attacker sends bogus Registration Requests or Agent Solicitations to exhaust challenges, the foreign agent MUST NOT invalidate previously unused challenges when responding to unauthenticated requests and MUST NOT allocate new storage in response to such messages.
section: "12"
topics:
