document: rfc-1519
kind: design-rationale
summary: Preconfigured aggregation ranges are preferred over purely dynamic aggregation because dynamic aggregation cannot distinguish a temporarily unreachable constituent route from one that does not belong to the aggregate, risking both under- and over-aggregation.
