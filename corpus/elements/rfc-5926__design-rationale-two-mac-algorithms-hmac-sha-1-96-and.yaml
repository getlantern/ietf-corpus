document: rfc-5926
kind: design-rationale
summary: 'Two MAC algorithms (HMAC-SHA-1-96 and AES-128-CMAC-96) are mandated rather than one: SHA-1 is included because it is widely deployed with sufficient strength; AES-128-CMAC is included to drive adoption of a stronger algorithm and provide a fallback if SHA-1 is ever compromised.'
