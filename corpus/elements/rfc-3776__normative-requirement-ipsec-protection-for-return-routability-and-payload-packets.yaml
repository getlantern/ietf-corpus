document: rfc-3776
kind: normative-requirement
summary: IPsec protection for return routability and payload packets MUST only be applied to traffic entering the IPv6 encapsulated tunnel interface between mobile node and home agent, achieved by defining SPD entries specific to the tunnel interface rather than the physical interface.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - ip
