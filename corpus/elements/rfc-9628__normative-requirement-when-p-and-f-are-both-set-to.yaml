document: rfc-9628
kind: normative-requirement
summary: When P and F are both set to one (non-keyframe in flexible mode), at least one reference index (P_DIFF) MUST be specified. A P_DIFF value of zero is invalid. Up to three total reference indices may be chained using the N bit.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
