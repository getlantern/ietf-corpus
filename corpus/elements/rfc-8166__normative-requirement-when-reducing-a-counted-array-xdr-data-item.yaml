document: rfc-8166
kind: normative-requirement
summary: When reducing a counted array XDR data item into a chunk, the array element count MUST remain in the Payload stream while the array elements MUST be moved to the chunk. XDR union data types MUST NOT be made DDP-eligible, though individual union arms MAY be.
section: 3.4.4.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
