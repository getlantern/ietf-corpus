document: rfc-4018
kind: security-consideration
summary: To counter denial-of-service attacks via false discovery information triggering repeated IKE negotiation, implementations MUST enforce IP address range limits, DNS domain limits, and maintain a negative authentication cache. These three countermeasures are all mandatory.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - ipsec
extracted_by: claude-sonnet-4-6
