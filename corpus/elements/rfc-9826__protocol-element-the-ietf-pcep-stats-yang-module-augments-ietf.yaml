document: rfc-9826
kind: protocol-element
summary: The 'ietf-pcep-stats' YANG module augments 'ietf-pcep' at the peer and session levels to add counters for PCReq, PCRep, PCErr, PCNtf, keepalive, unknown, and corrupt messages, plus PCE response time (avg/lwm/hwm) and stateful/path-key-specific counters. It provides a per-peer/session reset-statistics action and a global reset-pcep-statistics-all RPC.
section: "8.2"
topics:
    - yang
    - routing
    - netconf
