document: rfc-7677
kind: design-rationale
summary: A minimum iteration-count of 4096 is chosen as a practical floor because, while roughly 15,000 iterations are recommended for desktop performance targets, 4096 takes around 0.5 seconds on current mobile handsets, making higher values impractical for mobile use cases.
