document: rfc-1587
kind: wire-format
summary: 'The Type-7 LSA packet contains: a standard Link-State Header (with Options byte set to 7 in the type field), a 32-bit Network Mask, one or more TOS blocks each containing E-bit, TOS, and metric fields, a 32-bit Forwarding Address, and a 32-bit External Route Tag. Format is identical to type-5 except for the LSA type field.'
section: Appendix A
topics:
    - routing
