document: rfc-2720
kind: interoperability-note
summary: The RTFM Meter MIB was originally developed and tested using SNMPv1, then converted to SMIv2 following RFC 1908 guidelines. A MIB conforming to SMIv1 can be produced via appropriate translations, but Counter64 objects cannot be translated and will be omitted, losing machine-readable information.
