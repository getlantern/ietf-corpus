document: rfc-7180
kind: registry
summary: Nickname 0xFFC1 (previously reserved by RFC 6325) is allocated for use in the TRILL Header Egress Nickname field to indicate an OOMF (Overload Originated Multi-destination Frame), enabling overloaded RBridges to tunnel multi-destination frames to a non-overloaded neighbor.
