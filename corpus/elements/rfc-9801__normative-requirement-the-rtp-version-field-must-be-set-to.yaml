document: rfc-9801
kind: normative-requirement
summary: The RTP version field MUST be set to 2. The RTP timestamp clock MUST be 125 MHz for bit-streams up to 200 Gbps, and MUST be 250 MHz for bit-streams above 200 Gbps, based on the common clock I.
section: 5.2.2
rfc2119_level: MUST
topics:
    - rtp
