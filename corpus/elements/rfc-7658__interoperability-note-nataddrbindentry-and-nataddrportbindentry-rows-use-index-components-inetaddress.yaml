document: rfc-7658
kind: interoperability-note
summary: natAddrBindEntry and natAddrPortBindEntry rows use index components (InetAddress) that may produce OIDs exceeding 128 subidentifiers; implementers must avoid creating such entries, as they cannot be accessed via SNMPv1, SNMPv2c, or SNMPv3.
