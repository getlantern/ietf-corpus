document: rfc-6249
kind: security-consideration
summary: Metalinks SHOULD include digital signatures to provide authentication, message integrity, and non-repudiation. A shared ETag or Instance Digest from a mirror cannot strictly protect against a malicious actor who controls the mirror and can forge expected values.
section: "9.4"
topics:
    - security
    - crypto
