document: rfc-8667
kind: registry
summary: 'This document creates and updates several IANA IS-IS registries: Adj-SID (Type 31) and LAN-Adj-SID (Type 32) in Sub-TLVs for TLV 22/23/25/141/222/223; Prefix-SID (Type 3) in Sub-TLVs for TLV 135/235/236/237; SR-Capability (2), SR-Algorithm (19), SRLB (22), and SRMS Preference (24) in Sub-TLVs for TLV 242; new TLVs 149 (SID/Label Binding) and 150 (MT SID/Label Binding) plus a new sub-TLV registry for TLVs 149 and 150 (Expert Review).'
section: "4"
