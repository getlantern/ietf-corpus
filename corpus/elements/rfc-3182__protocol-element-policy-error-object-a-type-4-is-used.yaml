document: rfc-3182
kind: protocol-element
summary: POLICY_ERROR_OBJECT (A-Type 4) is used to convey policy control failure details. It includes a 2-octet reserved field, a 2-octet ErrorValue, and an optional OctetString with additional human-readable information. Length MUST be >= 8.
