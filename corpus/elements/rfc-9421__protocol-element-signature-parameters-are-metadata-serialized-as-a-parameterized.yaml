document: rfc-9421
kind: protocol-element
summary: 'Signature parameters are metadata serialized as a parameterized Structured Field Inner List. Defined parameters: created (UNIX timestamp Integer, RECOMMENDED), expires (UNIX timestamp Integer), nonce (random String), alg (algorithm identifier String from the HTTP Signature Algorithms registry), keyid (key identifier String), and tag (application-specific String). Additional parameters may be registered.'
