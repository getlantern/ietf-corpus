document: rfc-6506
kind: normative-requirement
summary: To achieve smooth key transition, KeyStartAccept SHOULD be less than KeyStartGenerate, and KeyStopGenerate SHOULD be less than KeyStopAccept. The KeyStartGenerate time for a new key MUST be less than or equal to the KeyStopGenerate time of the old key.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
