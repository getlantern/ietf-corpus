document: rfc-2578
kind: interoperability-note
summary: Although OCTET STRING allows up to 65535 octets, MIB designers should note that implementations may have interoperability limitations for sizes exceeding 255 octets. Similarly, BITS values exceeding 128 bits may encounter implementation constraints.
section: 7.1.2
topics:
