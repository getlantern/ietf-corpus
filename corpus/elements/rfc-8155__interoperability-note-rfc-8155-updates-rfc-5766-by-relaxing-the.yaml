document: rfc-8155
kind: interoperability-note
summary: 'RFC 8155 updates RFC 5766 by relaxing the MUST requirement for mutual STUN authentication: network-provided TURN servers MAY accept Allocation requests without STUN authentication, and TURN clients MAY accept success responses without STUN authentication from network-provided servers.'
