document: rfc-4287
kind: normative-requirement
summary: When an IRI that is not also a URI is dereferenced, it MUST be mapped to a URI using the steps in RFC 3987 Section 3.1. However, when an IRI serves as an atom:id value, it MUST NOT be so mapped, so that identity comparison works on raw IRI strings.
section: "2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
