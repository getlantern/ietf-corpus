document: rfc-9249
kind: security-consideration
summary: Readable sensitive data nodes include /ntp/clock-state (reveals synchronization topology), /ntp/associations (exposes peer relationships and network topology), and /ntp/ntp-statistics (reveals traffic patterns). Unauthorized read access should be restricted via NACM.
