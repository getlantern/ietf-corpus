document: rfc-5403
kind: normative-requirement
summary: Targets MUST support the RPCSEC_GSS_BIND_CHANNEL procedure. The NULL RPC procedure MUST be used when issuing RPCSEC_GSS_BIND_CHANNEL requests, the same as for RPCSEC_GSS_INIT and RPCSEC_GSS_CONTINUE_INIT.
section: "3.3"
rfc2119_level: MUST
