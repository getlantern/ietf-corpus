document: rfc-7361
kind: interoperability-note
summary: In Multi-Segment Pseudowire (MS-PW) deployments within VPLS, MAC flush messages are processed only at PW Terminating Provider Edge (T-PE) nodes; PW Switching Provider Edge (S-PE) nodes propagate MAC flush messages without taking any action. All PE-rs references in Section 5.1.3 apply only to T-PE nodes in the MS-PW case.
section: 5.1.3
topics:
    - mpls
