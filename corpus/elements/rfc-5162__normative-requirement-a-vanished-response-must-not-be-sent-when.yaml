document: rfc-5162
kind: normative-requirement
summary: A VANISHED response MUST NOT be sent when no command is in progress, nor while responding to a FETCH, STORE, or SEARCH command. A VANISHED response MAY be sent during a UID command, but MUST NOT be sent during a UID SEARCH command that contains message numbers in the search criteria.
section: "3.6"
rfc2119_level: MUST NOT
topics:
    - email
