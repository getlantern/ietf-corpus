document: rfc-6038
kind: normative-requirement
summary: When using the truncation process with Reflect Octets mode, the Session-Reflector MUST truncate the highest-numbered padding octets so the test packet equals the Session-Sender's packet length, truncating exactly 27 octets in Unauthenticated mode and exactly 56 octets in Authenticated/Encrypted modes.
section: 5.2.1
rfc2119_level: MUST
topics:
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
