document: rfc-3046
kind: wire-format
summary: Agent Circuit ID is sub-option code 1 with a variable-length value (c1..cN) encoding an agent-local identifier of the ingress circuit. The field is opaque; servers SHOULD treat it as an exact-match string qualified by the giaddr.
