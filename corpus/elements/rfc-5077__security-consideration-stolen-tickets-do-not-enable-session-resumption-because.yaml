document: rfc-5077
kind: security-consideration
summary: Stolen tickets do not enable session resumption because the ticket is encrypted with a key known only to the server. However, the server must use strong encryption and integrity protection to prevent brute-force recovery of ticket contents.
section: "5.2"
topics:
    - tls
    - security
