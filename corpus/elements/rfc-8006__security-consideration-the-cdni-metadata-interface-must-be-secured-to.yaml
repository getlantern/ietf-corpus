document: rfc-8006
kind: security-consideration
summary: The CDNI Metadata interface must be secured to ensure mutual authentication of uCDN and dCDN peers and integrity of exchanged metadata. Unauthenticated or tampered metadata could cause a dCDN to misserve content, violate content policies, or disclose sensitive policy information.
section: "8.1"
topics:
    - security
    - http
