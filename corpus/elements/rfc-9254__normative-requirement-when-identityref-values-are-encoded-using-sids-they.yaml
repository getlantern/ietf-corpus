document: rfc-9254
kind: normative-requirement
summary: When identityref values are encoded using SIDs, they MUST use a CBOR unsigned integer (major type 0); no delta mechanism is employed for identityref SIDs. When encoded as names and the identity is in a different module than the leaf, the namespace-qualified form MUST be used.
section: 6.10.1
rfc2119_level: MUST
topics:
    - yang
    - cbor
