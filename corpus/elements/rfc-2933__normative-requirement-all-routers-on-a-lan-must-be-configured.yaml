document: rfc-2933
kind: normative-requirement
summary: All routers on a LAN must be configured to run the same version of IGMP on that LAN. If queries are received with a version different from igmpInterfaceVersion, it indicates a configuration error tracked by igmpInterfaceWrongVersionQueries.
section: "4"
rfc2119_level: MUST
topics:
    - multicast
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
