document: rfc-6275
kind: normative-requirement
summary: Correspondent nodes MUST NOT accept nonces beyond MAX_NONCE_LIFETIME seconds after their first use. Expired nonce values MUST be discarded, and messages using stale or unknown nonce indices will be rejected.
section: 5.2.7
rfc2119_level: MUST
topics:
