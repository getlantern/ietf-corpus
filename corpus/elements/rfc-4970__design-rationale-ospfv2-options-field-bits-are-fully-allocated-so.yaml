document: rfc-4970
kind: design-rationale
summary: OSPFv2 options field bits are fully allocated, so new optional capabilities cannot be advertised there. This document introduces the RI opaque LSA as the mechanism for advertising new capabilities; for existing capabilities it is informational only, but future features MAY use it as the sole advertisement mechanism.
section: "1"
topics:
    - routing
