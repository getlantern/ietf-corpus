document: rfc-9682
kind: wire-format
summary: CDDL text string literals use the form %x22 *SCHAR %x22 (double-quoted). Valid content is defined by the updated SCHAR rule, and escape sequences by the updated SESC rule including the new \u{hex} brace form alongside the JSON-compatible \uXXXX and surrogate-pair forms.
