document: rfc-2640
kind: wire-format
summary: 'UTF-8 encodes UCS characters as 1–6 byte sequences: single-byte (0xxxxxxx) for U+0000–U+007F; two-byte (110xxxxx 10xxxxxx) for U+0080–U+07FF; three-byte (1110xxxx 10xxxxxx 10xxxxxx) for U+0800–U+FFFF; and longer sequences up to six bytes for U+04000000–U+7FFFFFFF. Continuation bytes always begin with 10.'
section: "2.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
