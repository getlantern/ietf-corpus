document: rfc-8542
kind: design-rationale
summary: The fabric topology model augments RFC 8345 (ietf-network and ietf-network-topology) rather than defining a standalone model, enabling integration with L1/L2/L3 topology models and use as a service topology layer that maps to underlay topologies such as L3 as defined in RFC 8346.
