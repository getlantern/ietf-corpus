document: rfc-4776
kind: protocol-element
summary: The DHCPv6 civic location option is identified by option code 36 (OPTION_GEOCONF_CIVIC). Its format includes a two-octet option-code, two-octet option-len, one-octet 'what' field, two-octet country code, and zero or more civic address elements.
