document: rfc-4320
kind: normative-requirement
summary: A transaction-stateful SIP element MUST NOT send a response with Status-Code of 408 to a non-INVITE request; as a consequence, an element that cannot respond before the transaction expires will send no final response at all.
section: "4.2"
rfc2119_level: MUST NOT
topics:
    - sip
    - realtime
