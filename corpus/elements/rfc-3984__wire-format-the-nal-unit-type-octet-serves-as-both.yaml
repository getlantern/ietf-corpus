document: rfc-3984
kind: wire-format
summary: 'The NAL unit type octet serves as both the NAL header and the RTP payload header. It contains three fields: F (1-bit forbidden_zero_bit), NRI (2-bit nal_ref_idc indicating reference importance), and Type (5-bit nal_unit_type identifying the payload structure).'
