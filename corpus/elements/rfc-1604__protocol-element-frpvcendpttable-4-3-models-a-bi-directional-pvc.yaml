kind: protocol-element
summary: 'frPVCEndptTable (4.3) models a bi-directional PVC segment end-point indexed by {ifIndex, frPVCEndptDLCIIndex}. Per-direction traffic parameters are: InMaxFrameSize/OutMaxFrameSize (octets), InBc/OutBc (committed burst, bits), InBe/OutBe (excess burst, bits), and InCIR/OutCIR (bits/second). Statistics include frame counts, DE-bit frames, excess frames, discards, and octet counts for each direction.'
