document: rfc-2834
kind: security-consideration
summary: HARP messages are not authenticated, which is a potential flaw that could allow corrupt information to be introduced into the server system. There are known security issues relating to port impersonation via address resolution protocols as described in Bellovin's 'Security Problems in the TCP/IP Protocol Suite'. No special security mechanisms have been added to HARP.
section: "10"
topics:
    - security
    - ip
