document: rfc-9461
kind: protocol-element
summary: '"dohpath" is a new single-valued SvcParamKey whose value MUST be a URI Template in relative form (RFC 6570) encoded in UTF-8. It is required when the "alpn" SvcParam indicates HTTP support. The URI Template MUST contain a "dns" variable and MUST produce a valid HTTP ":path" value after DoH URI Template expansion.'
section: "5"
topics:
    - dns
    - http
