document: rfc-7662
kind: normative-requirement
summary: The 'token' parameter is REQUIRED in the introspection request. If the server is unable to locate the token using a provided token_type_hint, it MUST extend its search across all of its supported token types.
section: "2.1"
rfc2119_level: MUST
topics:
    - oauth
