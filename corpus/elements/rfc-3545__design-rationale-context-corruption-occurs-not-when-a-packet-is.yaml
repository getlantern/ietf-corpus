document: rfc-3545
kind: design-rationale
summary: Context corruption occurs not when a packet is lost, but when the next compressed packet arrives with stale context. Absolute value updates (e.g., full RTP timestamp) can be repeated independently in successive packets, whereas delta value updates cannot compensate for a lost predecessor packet.
section: "1.3"
topics:
    - rtp
    - realtime
