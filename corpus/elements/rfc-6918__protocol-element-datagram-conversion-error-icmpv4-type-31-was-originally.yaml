document: rfc-6918
kind: protocol-element
summary: Datagram Conversion Error (ICMPv4 Type 31) was originally meant to report conversion errors in the TP/IX (RFC 1475) protocol. Since TP/IX was never widely implemented and RFC 1475 is Historic, this type is deprecated.
