document: rfc-1752
kind: wire-format
summary: 'The Authentication Header (Next Header value 51) contains: Next Header (8-bit), Auth Data Len (8-bit, in 8-octet units), Reserved (16-bit), Security Association ID (32-bit), and variable-length Authentication Data (integer multiple of 8 octets). The Security Assoc. ID combined with the Source Address identifies the pre-established security association.'
section: 12.2.5
topics:
    - ip
    - security
    - crypto
