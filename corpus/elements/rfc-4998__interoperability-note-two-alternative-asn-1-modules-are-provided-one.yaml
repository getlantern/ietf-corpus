document: rfc-4998
kind: interoperability-note
summary: Two alternative ASN.1 modules are provided — one for 1988 ASN.1 syntax and one for 1997 ASN.1 syntax — to accommodate compilers that only support the older version. In case of conflict between the two modules, the 1988 module takes precedence.
section: "2.1"
