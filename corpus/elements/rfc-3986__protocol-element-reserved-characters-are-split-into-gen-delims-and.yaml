document: rfc-3986
kind: protocol-element
summary: 'Reserved characters are split into gen-delims (:, /, ?, #, [, ], @) and sub-delims (!, $, &, '', (, ), *, +, ,, ;, =). They serve as component delimiters, and URIs differing only by replacement of a reserved character with its percent-encoded equivalent are not equivalent.'
section: "2.2"
topics:
    - http
