document: rfc-3986
kind: protocol-element
summary: 'Reserved characters are split into gen-delims (: / ? # [ ] @) and sub-delims (! $ & '' ( ) * + , ; =). Reserved characters used as data within a component must be percent-encoded; URIs that differ in the replacement of a reserved character with its percent-encoded equivalent are not equivalent.'
section: "2.2"
