document: rfc-3962
kind: security-consideration
summary: 'Generating a 256-bit key from a pass phrase of any length may be misleading: the effective entropy of a pass-phrase-derived key cannot approach 256 bits given the properties of the string-to-key function. Users and implementers should not assume key length alone implies security.'
section: "8"
topics:
    - crypto
    - security
