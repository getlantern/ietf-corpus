document: rfc-8896
kind: protocol-element
summary: CalendarResponseAttributes is a metadata object returned in ALTO Server responses to Calendar requests. It extends CalendarAttributes with 'calendar-start-time' (IMF-fixdate string) and an optional 'repeated' field (integer >= 1) indicating how many consecutive iterations of the Calendar have identical values, allowing clients to avoid redundant requests.
section: 5.1.2
