document: rfc-7904
kind: design-rationale
summary: RELOAD supports multiple registrations per AOR using a dictionary keyed by Node-ID. This allows a user with multiple devices (e.g., desk phone and cell phone) to each store a separate route mapping, and explicitly permits one Node-ID to forward to another.
section: "3.2"
topics:
    - sip
    - realtime
