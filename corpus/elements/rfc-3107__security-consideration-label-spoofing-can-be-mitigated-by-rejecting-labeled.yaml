document: rfc-3107
kind: security-consideration
summary: Label spoofing can be mitigated by rejecting labeled packets from external interfaces when all BGP-distributed labels are advertised via IBGP, since IBGP peers are under a single administrative domain and can generally be trusted not to spoof labels.
