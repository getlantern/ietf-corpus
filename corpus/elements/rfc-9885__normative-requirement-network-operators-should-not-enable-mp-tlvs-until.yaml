document: rfc-9885
kind: normative-requirement
summary: Network operators SHOULD NOT enable MP-TLVs until ensuring all implementations that will receive them can interpret them correctly. Implementations SHOULD NOT send multiple TLVs unless MP-TLV is applicable and the information to be sent exceeds 255 octets.
section: "8.2"
rfc2119_level: SHOULD NOT
topics:
    - routing
