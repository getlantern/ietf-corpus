document: rfc-2765
kind: design-rationale
summary: Fragmented UDP packets with zero checksum are dropped rather than translated because an informal backbone trace showed all 769 such packets (out of 34 million) were due to malicious or broken behavior (port scans, malformed fragments). The limitation is therefore not considered significant.
