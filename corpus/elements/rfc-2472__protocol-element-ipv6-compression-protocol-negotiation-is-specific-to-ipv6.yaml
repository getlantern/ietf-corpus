document: rfc-2472
kind: protocol-element
summary: IPv6-Compression-Protocol negotiation is specific to IPv6 datagrams and is independent of compression negotiated via the Compression Control Protocol (CCP), which may affect all datagrams. Each end must separately request this option for bidirectional compression.
section: "4.2"
