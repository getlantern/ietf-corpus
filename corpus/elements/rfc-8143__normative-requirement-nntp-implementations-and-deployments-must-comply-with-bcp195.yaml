document: rfc-8143
kind: normative-requirement
summary: NNTP implementations and deployments MUST comply with BCP195 (RFC 7525, 'Recommendations for Secure Use of TLS and DTLS'), covering protocol versions, cipher suites, compression, session resumption, public key lengths, forward secrecy, hostname validation, and certificate verification.
section: "1"
rfc2119_level: MUST
topics:
    - tls
    - security
