document: rfc-8999
kind: design-rationale
summary: The connection ID echoing requirement in Version Negotiation (swapping DCID and SCID from the triggering packet) gives clients modest assurance that the server actually received the initial packet and that the Version Negotiation was not forged by an on-path attacker unable to observe the original datagram.
section: "6"
topics:
