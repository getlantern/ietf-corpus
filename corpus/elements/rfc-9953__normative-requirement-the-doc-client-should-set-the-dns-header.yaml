document: rfc-9953
kind: normative-requirement
summary: The DoC client SHOULD set the DNS header ID field to 0 so that CoAP caches (e.g., proxies) can match repeated queries for the same data. A DoC server MUST copy the ID from the DNS query into its response.
section: 4.2.2
rfc2119_level: SHOULD
topics:
    - dns
