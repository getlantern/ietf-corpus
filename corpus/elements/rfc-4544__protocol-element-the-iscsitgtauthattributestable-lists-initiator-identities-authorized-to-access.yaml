document: rfc-4544
kind: protocol-element
summary: The iscsiTgtAuthAttributesTable lists initiator identities authorized to access each target. Each entry contains iscsiTgtAuthIdentity, a RowPointer into the IPS-AUTH MIB (RFC 4545) that holds the name, address, and credential information for the permitted initiator.
