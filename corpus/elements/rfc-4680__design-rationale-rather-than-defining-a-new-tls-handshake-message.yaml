document: rfc-4680
kind: design-rationale
summary: Rather than defining a new TLS handshake message type for each new kind of supplemental application data (e.g., username hints, attribute certificates, SAML assertions), this specification defines a single bundled message type that carries all supplemental data objects together, avoiding proliferation of handshake message types.
section: "1"
topics:
    - tls
