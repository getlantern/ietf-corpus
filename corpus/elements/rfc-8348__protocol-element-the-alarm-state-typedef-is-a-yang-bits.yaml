document: rfc-8348
kind: protocol-element
summary: 'The ''alarm-state'' typedef is a YANG bits type with bits: unknown (0), under-repair (1), critical (2), major (3), minor (4), warning (5), and indeterminate (6). When no bits are set, no active alarms are known and the component is not under repair.'
section: "7.1"
topics:
