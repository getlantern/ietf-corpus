document: rfc-7692
kind: protocol-element
summary: The WebSocket Per-Message Compression Extension (PMCE) framework defines how compression can be applied to WebSocket data message payloads on a per-message basis. PMCEs use the RSV1 bit of the WebSocket frame header to indicate whether a message is compressed, enabling endpoints to skip compression for incompressible content.
section: "4"
topics:
