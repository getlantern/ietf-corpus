document: rfc-5287
kind: wire-format
summary: 'The TDM Options interface parameter (Sub-TLV ID 0x0B) is a 4, 8, or 12 byte field containing: Parameter ID, Length, R (RTP Header Usage), D (Differential timestamping), F/X (reserved), SP (CESoPSN signaling), CAS (trunk framing), RSVD-1, PT (RTP Payload Type), RSVD-2, FREQ (timestamping clock frequency in 8 kHz units), and SSRC (RTP synchronization source ID).'
section: "3.8"
topics:
