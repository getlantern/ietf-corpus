document: rfc-8611
kind: interoperability-note
summary: When a responder LSR does not recognize the LSR Capability TLV, it must send an echo reply with return code 'One or more of the TLVs was not understood', after which the initiator LSR can retry without the LSR Capability TLV.
section: "3"
