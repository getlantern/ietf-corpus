document: rfc-7531
kind: protocol-element
summary: The nfsstat4 enum defines the complete NFSv4 error space, including POSIX-mapped errors (1–70), NFSv4-specific errors in the range 10001–10048, and NFS4_OK (0). Notable additions include NFS4ERR_WRONGSEC (10016), NFS4ERR_GRACE (10013), and NFS4ERR_CB_PATH_DOWN (10048).
