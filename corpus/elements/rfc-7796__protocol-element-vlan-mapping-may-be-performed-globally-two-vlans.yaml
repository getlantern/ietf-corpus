document: rfc-7796
kind: protocol-element
summary: VLAN mapping may be performed globally (two VLANs shared across the VPLS domain, no per-PW mapping needed) or locally (two VLANs provisioned independently per PE, requiring VLAN mapping on the PW). The local method is more scalable in VLAN use but requires mapping negotiation via signaling.
section: "5.2"
topics:
    - mpls
    - routing
