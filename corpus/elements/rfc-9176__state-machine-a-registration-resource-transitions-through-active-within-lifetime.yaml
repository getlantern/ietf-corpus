document: rfc-9176
kind: state-machine
summary: A registration resource transitions through active (within lifetime), timed-out (lifetime expired but resource retained), and removed (garbage collected) states. When timed-out, the RD SHOULD NOT respond to discovery queries for the endpoint but SHOULD continue providing access to the registration resource to allow refresh.
section: "5.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
