document: rfc-9642
kind: security-consideration
summary: All writable data nodes in the 'ietf-keystore' module have the NACM extension 'default-deny-write' applied, because any modification to a key or key reference may dramatically alter the implemented security policy. The 'cleartext-symmetric-key' and 'cleartext-private-key' nodes (imported from RFC 9640) have 'default-deny-all' applied and should never be returned to a client.
section: "5.3"
topics:
    - yang
    - netconf
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
