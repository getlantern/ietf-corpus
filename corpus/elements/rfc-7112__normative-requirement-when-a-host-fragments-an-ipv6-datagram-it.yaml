document: rfc-7112
kind: normative-requirement
summary: When a host fragments an IPv6 datagram, it MUST include the entire IPv6 Header Chain in the First Fragment. This ensures that all headers from the IPv6 base header through the Upper-Layer Header are present in the fragment with Fragment Offset equal to 0.
section: "5"
rfc2119_level: MUST
topics:
    - ip
    - security
