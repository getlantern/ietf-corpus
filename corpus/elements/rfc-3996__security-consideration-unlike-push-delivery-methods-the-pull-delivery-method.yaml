document: rfc-3996
kind: security-consideration
summary: Unlike Push Delivery Methods, the Pull Delivery Method eliminates the risk of spam notifications because the Notification Recipient initiates all Get-Notifications operations. Clients in Event Wait Mode can close the connection at any time to stop receiving notifications.
section: "17.3"
topics:
