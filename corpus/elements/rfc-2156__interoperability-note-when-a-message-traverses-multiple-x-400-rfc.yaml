document: rfc-2156
kind: interoperability-note
summary: When a message traverses multiple X.400 <-> RFC 822 gateways, the resulting service level is approximately the lowest common denominator (roughly the services offered by RFC 822). X.400 services without RFC 822 equivalents are not expected to survive a round-trip through multiple gateways.
section: 1.5.4
topics:
