document: rfc-7961
kind: design-rationale
summary: The Addr Sets End field is always 2 bytes and allows sub-sub-TLVs to always be locatable by a receiver even when some AFNs are unknown, because the boundary between Address Sets and sub-sub-TLVs is explicitly encoded rather than derived by parsing.
