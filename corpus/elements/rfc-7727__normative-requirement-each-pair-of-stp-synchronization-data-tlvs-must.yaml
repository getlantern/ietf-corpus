document: rfc-7727
kind: normative-requirement
summary: Each pair of STP Synchronization Data TLVs MUST occur in the same fragment. When total TLV size exceeds fragment maximum, TLVs MUST be divided into multiple sets each delimited by a pair of Synchronization Data TLVs across multiple fragments.
section: "3.6"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
