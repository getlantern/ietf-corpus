document: rfc-5925
kind: normative-requirement
summary: A single TCP segment MUST NOT have more than one TCP-AO in its options sequence. When multiple TCP-AOs appear, TCP MUST discard the segment.
section: "2.2"
rfc2119_level: MUST NOT
topics:
