document: rfc-9429
kind: normative-requirement
summary: The default BUNDLE policy MUST be 'balanced' as the best trade-off between performance and compatibility. The default RTP/RTCP multiplexing policy MUST be 'require'; implementations MAY reject attempts to set it to 'negotiate'.
