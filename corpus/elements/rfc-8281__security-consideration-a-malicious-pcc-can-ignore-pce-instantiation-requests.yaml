document: rfc-8281
kind: security-consideration
summary: A malicious PCC can ignore PCE instantiation requests, consuming PCE state resources. A PCE MUST protect itself by limiting pending requests or setting timeouts, and MAY close the session or remove all initiated LSPs if limits are breached.
section: "9.2"
topics:
    - security
    - routing
    - mpls
