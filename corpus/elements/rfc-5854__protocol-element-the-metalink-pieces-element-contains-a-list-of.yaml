document: rfc-5854
kind: protocol-element
summary: The 'metalink:pieces' element contains a list of cryptographic hashes for contiguous, non-overlapping pieces of a file. It MUST have a 'type' attribute (hash algorithm) and a 'length' attribute (piece size in octets). Hashes MUST be listed in file order.
section: 4.1.3
topics:
    - security
