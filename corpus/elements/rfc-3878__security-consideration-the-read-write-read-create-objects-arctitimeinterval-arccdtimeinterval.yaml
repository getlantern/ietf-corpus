document: rfc-3878
kind: security-consideration
summary: The read-write/read-create objects arcTITimeInterval, arcCDTimeInterval, arcState, arcNalmTimeRemaining, arcRowStatus, and arcStorageType are sensitive; unauthorized SET operations can cause omission of alarm notifications or flooding of unwanted alarms. Suppressing or deferring alarm reporting can prevent timely delivery of diagnostic information, including information that could help identify an attack.
section: "6"
topics:
    - snmp
    - security
