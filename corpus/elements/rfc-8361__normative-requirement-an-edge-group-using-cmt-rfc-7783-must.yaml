document: rfc-8361
kind: normative-requirement
summary: An edge group using CMT (RFC 7783) MUST NOT set the C flag on its pseudo-nickname. A pseudo-nickname MUST NOT be shared between a centralized replication edge group and a CMT-based edge group, as incorrect early pruning would prevent BUM traffic from reaching intended recipients.
section: "9"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
