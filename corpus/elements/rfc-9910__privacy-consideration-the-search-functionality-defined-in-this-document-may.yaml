document: rfc-9910
kind: privacy-consideration
summary: The search functionality defined in this document may affect the privacy of entities in the registry. Server operators should consult RFC 6973 and RFC 7481 for privacy threats specific to registration data. Many jurisdictions restrict use of Personal Data, and operators should ascertain whether their regulatory environment permits implementation of this functionality.
section: "8"
topics:
    - privacy
    - security
