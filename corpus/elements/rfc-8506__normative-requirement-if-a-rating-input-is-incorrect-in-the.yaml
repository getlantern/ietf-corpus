document: rfc-8506
kind: normative-requirement
summary: If a rating input is incorrect in the CCR or the server does not support the requested service context, the CCA MUST contain the error code DIAMETER_RATING_FAILED and MUST include one or more Failed-AVP AVPs; a client receiving DIAMETER_RATING_FAILED MUST NOT send similar requests in the future.
section: 4.1.3
rfc2119_level: MUST NOT
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
