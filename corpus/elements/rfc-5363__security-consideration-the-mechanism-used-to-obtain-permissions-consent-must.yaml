document: rfc-5363
kind: security-consideration
summary: The mechanism used to obtain permissions (consent) must not itself create DoS amplification opportunities; RFC 5360 avoids this by requiring the client to generate roughly the same amount of traffic toward the service as the service generates toward destinations.
section: "5.2"
topics:
    - sip
    - security
