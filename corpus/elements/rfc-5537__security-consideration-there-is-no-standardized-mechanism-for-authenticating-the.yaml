document: rfc-5537
kind: security-consideration
summary: There is no standardized mechanism for authenticating the sender of a control message or verifying that its contents were sent by the claimed originator. Unstandardized mechanisms such as PGP-based signature verification (PGPVERIFY) exist but are not required by this specification.
section: "5.1"
topics:
    - security
