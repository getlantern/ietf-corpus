document: rfc-7183
kind: normative-requirement
summary: During ICV generation, all existing ICV TLVs MUST be temporarily removed and msg-hop-count and msg-hop-limit MUST be temporarily set to 0; all TIMESTAMP TLVs MUST be inserted before adding ICV TLVs.
section: "6.2"
rfc2119_level: MUST
