document: rfc-7383
kind: interoperability-note
summary: Messages of the IKE_SESSION_RESUME exchange (RFC 5723) cannot be fragmented using this mechanism because they do not contain an Encrypted payload. Large ticket-based session resumption messages should instead use a 'ticket by reference' approach to avoid IP fragmentation.
section: "3"
topics:
