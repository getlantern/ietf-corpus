document: rfc-2536
kind: security-consideration
summary: DSA requires frequent generation of high-quality random numbers. Use of manipulated rather than random numbers enables high-bandwidth covert channels, and the leakage of an entire DSA private key in only two DSA signatures has been demonstrated.
