document: rfc-2211
kind: design-rationale
summary: When nonconformant packets arrive, implementations may either degrade all packets equally (preserving ordering, preferred for TCP which interprets reordering as loss) or split packets into conformant and nonconformant sets with different service levels (preferred for time-sensitive applications such as interactive conferencing). The specification permits either approach.
section: "9"
topics:
