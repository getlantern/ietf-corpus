document: rfc-8919
kind: protocol-element
summary: The Application-Specific SRLG TLV (Type 238) is a new TLV that advertises application-specific SRLGs for a link. Unlike TLVs 138 and 139, it supports IPv4, IPv6, and unnumbered link identifiers in a single TLV using sub-TLVs, and includes the Application Identifier Bit Mask.
section: "4.3"
topics:
    - routing
    - mpls
