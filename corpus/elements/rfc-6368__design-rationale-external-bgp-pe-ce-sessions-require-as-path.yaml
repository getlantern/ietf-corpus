document: rfc-6368
kind: design-rationale
summary: External BGP PE-CE sessions require AS_PATH manipulation (AS remapping, loop suppression) that obscures the customer network topology. This document introduces iBGP PE-CE sessions with transparent carriage of customer BGP path attributes through the VPN core, eliminating the need for such workarounds.
section: "1"
topics:
