document: rfc-8323
kind: normative-requirement
summary: A security solution MUST be implemented to protect CoAP over reliable transports and MUST be enabled by default. TLS is the defined binding, but alternative solutions at other protocol layers MAY be used when appropriate.
section: "9"
rfc2119_level: MUST
