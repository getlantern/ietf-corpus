document: rfc-7138
kind: design-rationale
summary: For ODUflex, Unreserved Bandwidth is included even though it does not precisely indicate how many LSPs can be set up (since spatial TS allocation is unknown). It is included as a heuristic aid during path computation to differentiate links with the same MAX LSP Bandwidth but different amounts of total free capacity.
section: "5.3"
topics:
