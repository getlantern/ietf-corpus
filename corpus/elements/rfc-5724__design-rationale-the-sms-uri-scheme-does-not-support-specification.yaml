document: rfc-5724
kind: design-rationale
summary: The 'sms' URI scheme does not support specification of SMSC (SMS Center) numbers. In scenarios where messages must be sent through a certain SMSC, some other context must establish this requirement, or message delivery may fail. This is a deliberate scope limitation.
section: 1.2.2.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
