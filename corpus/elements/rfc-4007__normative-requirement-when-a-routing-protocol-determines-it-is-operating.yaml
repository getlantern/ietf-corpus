document: rfc-4007
kind: normative-requirement
summary: When a routing protocol determines it is operating on a zone boundary, it MUST protect inter-zone integrity and maintain intra-zone connectivity. A router transmitting routing information MUST NOT include information about zones other than the zones assigned to the interface used to transmit.
section: "10"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
