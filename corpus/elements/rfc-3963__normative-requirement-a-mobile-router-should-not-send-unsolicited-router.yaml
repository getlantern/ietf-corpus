document: rfc-3963
kind: normative-requirement
summary: A Mobile Router SHOULD NOT send unsolicited Router Advertisements and SHOULD NOT reply to Router Solicitations on egress interfaces attached to visited links. However, it MUST NOT ignore Router Advertisements received on the egress interface (used for address configuration, default router selection, or movement detection).
section: "5.6"
rfc2119_level: MUST NOT
topics:
    - mobility
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
