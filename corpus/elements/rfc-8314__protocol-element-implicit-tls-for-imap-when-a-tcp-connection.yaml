document: rfc-8314
kind: protocol-element
summary: 'Implicit TLS for IMAP: when a TCP connection is established for ''imaps'' (default port 993), a TLS handshake begins immediately. If the server accepts the client certificate, it MAY issue PREAUTH (entering AUTHENTICATED state); otherwise an OK greeting places both parties in NOT AUTHENTICATED state.'
section: "3.2"
topics:
    - tls
    - email
