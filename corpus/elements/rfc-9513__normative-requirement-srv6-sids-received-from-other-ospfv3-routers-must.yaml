document: rfc-9513
kind: normative-requirement
summary: SRv6 SIDs received from other OSPFv3 routers MUST NOT be installed directly in the forwarding plane; reachability depends on the existence of a covering locator. If the locator is the longest prefix match for those SIDs, correct forwarding is ensured.
section: "5"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
