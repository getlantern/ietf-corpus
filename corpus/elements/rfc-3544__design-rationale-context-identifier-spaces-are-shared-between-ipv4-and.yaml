document: rfc-3544
kind: design-rationale
summary: Context identifier spaces are shared between IPv4 and IPv6 compression but are not shared between TCP and non-TCP/UDP/RTP. Sharing TCP and non-TCP context spaces would require additional mechanisms to prevent errors when switching a context identifier from TCP to non-TCP use.
section: "3.1"
topics:
    - ip
