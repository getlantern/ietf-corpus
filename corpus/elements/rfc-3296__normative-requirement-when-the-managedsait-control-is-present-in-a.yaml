document: rfc-3296
kind: normative-requirement
summary: When the ManageDsaIT control is present in a request, the server SHALL NOT generate a referral or continuation reference based on information held in referral objects; it SHALL treat the referral object as a normal entry. The server remains free to return referrals for other reasons.
section: "3"
rfc2119_level: SHALL NOT
topics:
