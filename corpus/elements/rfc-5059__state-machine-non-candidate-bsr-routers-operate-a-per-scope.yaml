document: rfc-5059
kind: state-machine
summary: 'Non-Candidate-BSR routers operate a per-scope-zone state machine with states: NoInfo (no knowledge of scope), Accept Any (AA, accepts any BSM as authoritative), and Accept Preferred (AP, only accepts BSMs from the current BSR or a higher-weight BSR). Transitions are driven by BSM receipt and Bootstrap Timer or Scope-Zone Expiry Timer expiry.'
section: 3.1.2
topics:
    - multicast
    - routing
