document: rfc-9668
kind: security-consideration
summary: The rebuilt OSCORE-protected application request from Step 7 of server processing MUST undergo the same access-control checks that would be performed on a traditional OSCORE-protected request. Validated authorization information must be available at the server before processing begins; successful EDHOC completion alone does not authorize access to the protected resource.
section: "7"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
