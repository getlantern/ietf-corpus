document: rfc-9359
kind: security-consideration
summary: A deployment MUST ensure that border filtering drops inbound echo requests with an IOAM Capabilities Container Header from outside the domain, and drops outbound echo requests or replies with IOAM Capabilities Headers leaving the domain, to prevent capability information leakage.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - measurement
