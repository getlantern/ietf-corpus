document: rfc-6009
kind: security-consideration
summary: The redirect-dsn extension allows specification of the NOTIFY parameter, which can cause generation of notification messages (especially success notifications) that might otherwise not be generated. Sites limiting success notification requests must also restrict their use via redirect-dsn.
section: "8"
topics:
    - email
    - security
