summary: 'docsDevEvReporting is a BITS object controlling per-priority event reporting: local(0) logs to non-volatile internal log, traps(1) sends SNMP trap, syslog(2) sends syslog message, localVolatile(8) logs to volatile internal log only, stdInterface(9) delegates to RFC 3413/RFC 3014 mechanisms.'
