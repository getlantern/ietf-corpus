document: rfc-9067
kind: protocol-element
summary: Policy subroutines are implemented via the call-policy condition, which invokes another policy definition and returns a Boolean result (accept-route = true, reject-route = false) to the calling statement. Route accept/reject is determined solely by the top-level policy, not by subroutines.
section: "4.4"
topics:
