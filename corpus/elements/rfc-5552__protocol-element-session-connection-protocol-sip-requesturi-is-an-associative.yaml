document: rfc-5552
kind: protocol-element
summary: session.connection.protocol.sip.requesturi is an associative array of URI parameters from the initial INVITE Request-URI. ccxml-param and aai-param values are evaluated as JSON values; others as strings. The array's toString() returns the full Request-URI. session.connection.aai and session.connection.ccxml are aliases for the corresponding requesturi array entries.
section: "2.4"
topics:
    - sip
    - voip
    - json
