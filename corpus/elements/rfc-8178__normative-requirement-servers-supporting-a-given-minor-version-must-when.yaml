document: rfc-8178
kind: normative-requirement
summary: Servers supporting a given minor version MUST, when returning errors for operations valid in an earlier minor version, return the errors allowed for the current operation in the minor version actually being used by the client — not errors from the server's newer XDR definition.
section: "8.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
