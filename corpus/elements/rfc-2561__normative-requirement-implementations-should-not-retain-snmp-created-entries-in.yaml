document: rfc-2561
kind: normative-requirement
summary: Implementations SHOULD NOT retain SNMP-created entries in the tn3270eSrvrConfTable, tn3270eSrvrPortTable, tn3270eClientGroupTable, tn3270eResPoolTable, and tn3270eClientResMapTable across reIPLs of the corresponding TN3270E server, so management applications see consistent behavior.
section: "3.5"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
