document: rfc-8794
kind: registry
summary: RFC 8794 creates the 'EBML DocTypes' IANA registry for registering EBML Document Type identifiers (the string value stored in the DocType Element). The DocType value for any EBML Document Type MUST be unique, persistent, and listed in this registry.
section: "17.2"
topics:
