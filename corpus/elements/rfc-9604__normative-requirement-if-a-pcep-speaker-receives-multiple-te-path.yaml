document: rfc-9604
kind: normative-requirement
summary: If a PCEP speaker receives multiple TE-PATH-BINDING TLVs with the same SRv6 SID or MPLS Label but different BT values, it MUST send a PCErr with Error-Type=32, Error-value=5 ('Inconsistent binding types').
section: "5"
rfc2119_level: MUST
