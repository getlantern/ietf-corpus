document: rfc-7522
kind: privacy-consideration
summary: SAML Assertions may contain privacy-sensitive information and SHOULD only be transmitted over encrypted channels such as TLS. Subject and/or attributes SHOULD be encrypted to the authorization server when necessary to prevent disclosure to the client.
