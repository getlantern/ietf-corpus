document: rfc-2589
kind: normative-requirement
summary: The requestTtl field in a Refresh request must be between 1 and 31557600 seconds. Servers are not required to honor this value and may return a different TTL; clients must be able to use the server-dictated value as their Client Refresh Period (CRP).
section: "4.1"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
