document: rfc-5059
kind: protocol-element
summary: Administrative scoping is supported by running a separate copy of the BSR mechanism within each admin-scope zone. Scoped BSMs carry the scope identity in the first group range (Admin Scope Zone bit set) and are not forwarded by Zone Border Routers (ZBRs) across the scope boundary.
section: "1.3"
topics:
    - multicast
    - routing
