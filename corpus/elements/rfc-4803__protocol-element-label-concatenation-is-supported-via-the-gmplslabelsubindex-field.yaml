document: rfc-4803
kind: protocol-element
summary: Label concatenation is supported via the gmplsLabelSubindex field (Unsigned32), allowing a single GMPLS label to be composed of multiple sub-labels stored as distinct rows sharing the same gmplsLabelInterface and gmplsLabelIndex. Sub-labels are ordered strictly by ascending gmplsLabelSubindex; for non-concatenated labels this SHOULD be zero.
section: "8"
topics:
