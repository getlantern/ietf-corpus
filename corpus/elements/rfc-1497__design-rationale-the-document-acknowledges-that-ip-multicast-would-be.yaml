document: rfc-1497
kind: design-rationale
summary: 'The document acknowledges that IP multicast would be a superior alternative to BOOTP extensions for service discovery: it eliminates dependency on a potentially unavailable or incorrect BOOTP server, reduces administrative overhead of keeping the BOOTP database current, and can reduce packet traffic. The main drawback is that IP multicasting was not widely implemented at the time.'
section: Comparison to Alternative Approaches
topics:
    - multicast
