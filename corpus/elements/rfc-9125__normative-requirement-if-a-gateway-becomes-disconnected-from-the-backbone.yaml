document: rfc-9125
kind: normative-requirement
summary: If a gateway becomes disconnected from the backbone network or if the site operator decides to terminate the gateway's activity, it MUST withdraw the auto-discovery and route advertisements so that remote gateways stop seeing advertisements from or about this gateway.
section: "3"
rfc2119_level: MUST
topics:
    - bgp
    - routing
