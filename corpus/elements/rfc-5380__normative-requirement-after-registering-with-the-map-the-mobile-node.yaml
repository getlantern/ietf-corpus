document: rfc-5380
kind: normative-requirement
summary: After registering with the MAP, the mobile node MUST register its new RCoA with its home agent. The binding lifetime with the HA and CNs MUST NOT be larger than the mobile node's binding lifetime with the MAP as received in the binding acknowledgement.
section: "6.1"
rfc2119_level: MUST NOT
topics:
