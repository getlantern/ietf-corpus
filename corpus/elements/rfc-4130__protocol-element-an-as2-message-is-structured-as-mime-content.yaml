document: rfc-4130
kind: protocol-element
summary: An AS2 message is structured as MIME content inside an HTTP POST request, with additional AS2-specific headers. The Request-URI identifies the process for unpacking and handling data, and the MDN reply is returned either in the HTTP response body or via a separate HTTP POST to the sender.
section: "4.1"
