document: rfc-8929
kind: protocol-element
summary: A Bridging Proxy provides IPv6 ND proxy functions while preserving Layer 2 forwarding continuity, including for link-local addresses. It advertises the Registering Node's link-layer address in the TLLAO of proxied NAs and preferably forwards NS(Lookup) and NUD messages as unicast to the Registering Node rather than responding directly on its behalf.
section: "8"
