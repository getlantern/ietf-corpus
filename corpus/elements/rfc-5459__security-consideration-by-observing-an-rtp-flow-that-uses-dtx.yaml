document: rfc-5459
kind: security-consideration
summary: By observing an RTP flow that uses DTX, an attacker can determine when and for how long participants are speaking. This is a general property of DTX schemes; G.729.1 DTX introduces no new specific issue beyond what applies to DTX in general.
section: "7"
