document: rfc-2231
kind: design-rationale
summary: Existing MIME mechanisms are limited to 7-bit US-ASCII and the RFC 2047 encoded-word mechanism is unavailable for parameter values, making it impossible to use non-ASCII values without private per-parameter encoding. Additionally, character set information alone is insufficient for correct display—language information is also required, e.g., for text-to-speech accessibility.
