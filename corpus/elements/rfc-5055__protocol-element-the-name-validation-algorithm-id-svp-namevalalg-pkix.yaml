document: rfc-5055
kind: protocol-element
summary: The name validation algorithm (id-svp-nameValAlg, pkix arc 19.2) extends the basic algorithm by requiring one or more subject names to appear in the end certificate. Its parameters (NameValidationAlgParms) carry a nameCompAlgId OID and validationNames GeneralNames. Servers MUST support matching rules for id-nva-dnCompAlg (directory names), id-kp-serverAuth (DNS names with wildcard support), and id-kp-mailProtection (RFC 822 names).
section: 3.2.4.2.3
topics:
    - pkix
