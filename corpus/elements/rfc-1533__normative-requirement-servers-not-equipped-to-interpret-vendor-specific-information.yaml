document: rfc-1533
kind: normative-requirement
summary: Servers not equipped to interpret vendor-specific information (option 43) sent by a client MUST ignore it. Clients that do not receive desired vendor-specific information SHOULD attempt to operate without it, possibly in a degraded mode.
section: "8.4"
rfc2119_level: MUST
