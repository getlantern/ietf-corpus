document: rfc-8265
kind: registry
summary: IANA has added the OpaqueString profile to the 'PRECIS Profiles' registry. It is based on FreeformClass, replaces the SASLprep profile of Stringprep, maps non-ASCII spaces to SPACE (U+0020), applies NFC normalization, and has no Width Mapping, Case Mapping, or Directionality Rule.
section: "7.3"
topics:
