document: rfc-9788
kind: normative-requirement
summary: An MUA SHOULD warn the user when both a From Header Field Mismatch exists (inner and outer addr-spec differ) and there is no valid, correctly bound signature. The warning should be comparable to a spam/phishing warning and SHOULD show both non-matching From values.
section: 4.4.2
rfc2119_level: SHOULD
topics:
    - email
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
