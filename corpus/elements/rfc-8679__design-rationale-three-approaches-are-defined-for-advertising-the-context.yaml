document: rfc-8679
kind: design-rationale
summary: Three approaches are defined for advertising the context ID — proxy mode (virtual proxy node with asymmetric IGP/TE metrics), alias mode (context ID label binding advertisement via IGP, e.g., IS-IS Mirroring Context segment per RFC 8667), and stub link mode (anycast address, no schema knowledge required on PLR/E) — to accommodate different network topologies and protocol capabilities without mandating a single approach.
section: "5.8"
topics:
