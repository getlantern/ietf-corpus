document: rfc-9555
kind: normative-requirement
summary: The JSPTR parameter MUST be set on every JSPROP vCard property. The JSON value of JSPROP MUST be compact (no insignificant whitespace). All JSPROP properties in a vCard form a PatchObject; this PatchObject MUST only be applied after all other vCard properties have been converted, and MUST NOT be applied if invalid.
section: 3.2.1
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
