document: rfc-5610
kind: protocol-element
summary: 'Valid informationElementSemantics values are constrained by informationElementDataType: any value is valid for unsigned types; ''flags'' is excluded for signed types; ''identifier'' and ''flags'' are excluded for floating-point types; only ''default'' is valid for all other types (boolean, string, IP address, datetime, macAddress, octetArray).'
