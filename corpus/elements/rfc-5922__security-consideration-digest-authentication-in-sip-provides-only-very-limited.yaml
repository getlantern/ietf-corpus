document: rfc-5922
kind: security-consideration
summary: Digest authentication in SIP provides only very limited integrity protection and no binding to the transport. Using Digest authentication of one message to authenticate an entire TCP connection or UDP peer address goes beyond the mechanism's designed assurances and SHOULD NOT be done.
section: "8.1"
topics:
    - sip
    - security
    - tls
