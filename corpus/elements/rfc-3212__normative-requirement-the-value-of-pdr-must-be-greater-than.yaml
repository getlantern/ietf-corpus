document: rfc-3212
kind: normative-requirement
summary: The value of PDR MUST be greater than or equal to the value of CDR in a correctly encoded Traffic Parameters TLV. If an LSR receives a TLV where PDR < CDR in a Label Request, it MUST send a Notification with status 'Traffic Parameters Unavailable'.
section: "4.3"
rfc2119_level: MUST
topics:
    - mpls
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
