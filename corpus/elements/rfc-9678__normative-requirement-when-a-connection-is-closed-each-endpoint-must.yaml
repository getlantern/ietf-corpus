document: rfc-9678
kind: normative-requirement
summary: When a connection is closed, each endpoint MUST destroy not only the ephemeral keys used by the connection but also any information that could be used to recompute those keys, in order to realize the forward secrecy property.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
