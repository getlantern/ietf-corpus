document: rfc-8419
kind: protocol-element
summary: The SignedData digestAlgorithms collection MAY contain any number of elements including zero. When signing with Ed25519 using signed attributes, it SHOULD include id-sha512; with Ed448 it SHOULD include id-shake256-len with a 512-bit length parameter.
section: "3.1"
