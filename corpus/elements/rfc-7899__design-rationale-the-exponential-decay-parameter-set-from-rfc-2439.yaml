document: rfc-7899
kind: design-rationale
summary: The exponential-decay parameter set from RFC 2439 and RFC 7196 is reused for multicast damping to help operators deploy the feature based on consistent configuration parameters and obtain predictable results without the drawbacks of rate-limiting or repurposing PIM/IGMP timers.
