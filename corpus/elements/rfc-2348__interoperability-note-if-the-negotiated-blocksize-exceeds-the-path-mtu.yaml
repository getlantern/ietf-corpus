document: rfc-2348
kind: interoperability-note
summary: If the negotiated blocksize exceeds the path MTU, IP fragmentation and reassembly will add overhead, increasingly noticeable with more intermediate gateways. Implementations should choose a blocksize that fits within the path MTU to avoid fragmentation penalties.
section: Proof of Concept
