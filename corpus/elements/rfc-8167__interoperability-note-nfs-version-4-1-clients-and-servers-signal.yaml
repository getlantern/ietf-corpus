document: rfc-8167
kind: interoperability-note
summary: NFS version 4.1 clients and servers signal backchannel capability via the CREATE_SESSION or BIND_CONN_TO_SESSION operations. Without a backchannel, NFS version 4.1 servers do not grant delegations and pNFS operation is not possible.
section: "3.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
