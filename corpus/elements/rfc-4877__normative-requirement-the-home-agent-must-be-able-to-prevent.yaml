document: rfc-4877
kind: normative-requirement
summary: The home agent MUST be able to prevent a mobile node from using its security association to send a Binding Update on behalf of another mobile node. With manual IPsec configuration, the home agent MUST verify that an SA was created for a particular home address; with dynamic keying, the home agent MUST verify the IKE_AUTH identity is authorized for that home address.
section: "4.2"
rfc2119_level: MUST
topics:
    - ipsec
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
