kind: protocol-element
summary: OPTION_S46_RULE (code 89) conveys Basic Mapping Rule (BMR) and Forwarding Mapping Rule (FMR) parameters including flags, EA bit length, IPv4 prefix, and IPv6 prefix. It is the primary provisioning option for MAP-E and MAP-T CEs.
