document: rfc-3193
kind: security-consideration
summary: Machine certificate enrollment must be strictly controlled since the value of a machine certificate is inversely proportional to the ease with which an attacker can obtain one. Similarly, user certificate enrollment periods should be time-limited to prevent attackers from using stolen passwords to obtain certificates.
section: 5.1.3
topics:
    - ipsec
    - pkix
    - security
