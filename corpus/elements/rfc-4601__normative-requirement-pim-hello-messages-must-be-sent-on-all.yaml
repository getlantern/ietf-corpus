document: rfc-4601
kind: normative-requirement
summary: PIM Hello messages MUST be sent on all active interfaces, including physical point-to-point links, multicast to the ALL-PIM-ROUTERS group address (224.0.0.13 for IPv4, ff02::d for IPv6). Implementations that omit Hello messages on point-to-point interfaces are explicitly non-compliant.
section: 4.3.1
rfc2119_level: MUST
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
