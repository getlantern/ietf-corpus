document: rfc-8691
kind: security-consideration
summary: Any node can join an 802.11-OCB subnet and directly communicate with or impersonate any other node, enabling threats outlined in RFC 6959. SEND (RFC 3971/3972) is identified as a solution to spoof-based attack vectors, though not widely deployed. IPsec (RFC 4301) may provide data security protection at the network layer.
section: "5"
topics:
