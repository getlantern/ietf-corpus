document: rfc-5520
kind: protocol-element
summary: The PATH-KEY Object (Object-Class 16, Object-Type 1) is a new PCEP object that carries a PKS in a PCReq message when a PCC is requesting expansion of a CPS. It MUST contain at least one Path-Key Subobject; subsequent subobjects beyond the first SHOULD be ignored.
