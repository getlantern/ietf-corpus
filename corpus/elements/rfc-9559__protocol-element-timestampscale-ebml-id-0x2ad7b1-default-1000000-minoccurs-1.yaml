document: rfc-9559
kind: protocol-element
summary: TimestampScale (EBML ID 0x2AD7B1, default 1000000, minOccurs=1) is the base unit in nanoseconds for Segment Ticks and Track Ticks. A value of 1000000 makes timestamps milliseconds. The value MUST NOT be 0.
section: 5.1.2.9
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
