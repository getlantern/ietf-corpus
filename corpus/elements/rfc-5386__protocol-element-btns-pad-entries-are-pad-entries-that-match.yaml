document: rfc-5386
kind: protocol-element
summary: BTNS PAD entries are PAD entries that match on PUBLICKEY IDs. A wildcard BTNS PAD entry matches all peer public keys and must be the last entry in the PAD. All other PAD entries are non-BTNS PAD entries.
