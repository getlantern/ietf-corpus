document: rfc-3329
kind: normative-requirement
summary: A server receiving an unprotected request containing a Require or Proxy-Require header with value 'sec-agree' MUST respond with a 494 (Security Agreement Required) response and MUST include a Security-Server header field listing supported mechanisms. The server's list MUST NOT depend on the contents of the client's list.
section: 2.3.1
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
