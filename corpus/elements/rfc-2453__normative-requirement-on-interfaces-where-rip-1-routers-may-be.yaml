document: rfc-2453
kind: normative-requirement
summary: On interfaces where RIP-1 routers may be present, RIP-2 MUST NOT advertise information internal to one network into another network, MUST NOT advertise more-specific subnet routes where RIP-1 would treat them as host routes, and MUST NOT advertise supernet routes where RIP-1 routers could misinterpret them.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - routing
    - ip
