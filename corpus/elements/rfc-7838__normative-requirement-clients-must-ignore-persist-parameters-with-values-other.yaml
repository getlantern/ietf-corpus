document: rfc-7838
kind: normative-requirement
summary: Clients MUST ignore 'persist' parameters with values other than '1'. When an Alt-Svc response header field is received from an origin, its value invalidates and replaces all cached alternative services for that origin.
section: "3.1"
rfc2119_level: MUST
topics:
    - http
