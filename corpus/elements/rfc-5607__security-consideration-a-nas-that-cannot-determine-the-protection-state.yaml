document: rfc-5607
kind: security-consideration
summary: A NAS that cannot determine the protection state of the remote management connection MUST treat an Access-Accept containing a Management-Transport-Protection Attribute with a value other than No-Protection (1) as an Access-Reject, unless specifically overridden by local policy. Use of No-Protection is NOT RECOMMENDED where secure management is required.
section: "12.1"
topics:
    - radius
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
