document: rfc-3830
kind: normative-requirement
summary: When DH is supported, OAKLEY group 5 (1536-bit) is MANDATORY to implement. OAKLEY groups 1 (768-bit) and 2 (1024-bit) are OPTIONAL. New DH groups MUST be specified in a companion standards-track RFC before IANA assignment.
section: 4.2.7
rfc2119_level: REQUIRED
