document: rfc-5777
kind: normative-requirement
summary: When S-VID-Start and S-VID-End AVPs are both specified in a VLAN-ID-Range AVP, Ethernet packets without IEEE 802.1ad encapsulation MUST NOT match the classifier. Similarly, when C-VID-Start and C-VID-End are specified, packets without IEEE 802.1ad or IEEE 802.1Q encapsulation MUST NOT match.
section: 4.1.8.18
rfc2119_level: MUST NOT
topics:
