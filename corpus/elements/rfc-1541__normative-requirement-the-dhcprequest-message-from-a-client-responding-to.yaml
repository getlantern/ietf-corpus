document: rfc-1541
kind: normative-requirement
summary: The DHCPREQUEST message from a client responding to a DHCPOFFER MUST include the 'server identifier' option to indicate which server was selected. The DHCPREQUEST must use the same 'secs' value and be sent to the same broadcast address as the original DHCPDISCOVER.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
