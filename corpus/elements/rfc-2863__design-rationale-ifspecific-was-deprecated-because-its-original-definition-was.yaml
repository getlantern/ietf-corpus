document: rfc-2863
kind: design-rationale
summary: ifSpecific was deprecated because its original definition was ambiguous, leading to three different incompatible interpretations by implementors. The only unambiguous definition (pointing to the media-specific MIB module OID) conveys no more information than ifType, making the object redundant.
