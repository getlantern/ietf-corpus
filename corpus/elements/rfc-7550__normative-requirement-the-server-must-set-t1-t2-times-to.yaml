document: rfc-7550
kind: normative-requirement
summary: The server MUST set T1/T2 times to the same values across all IA options in a Reply or Advertise message. The server MUST determine T1/T2 times considering all of the client's applicable bindings, to enable the client to renew all bindings simultaneously.
section: "4.3"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
