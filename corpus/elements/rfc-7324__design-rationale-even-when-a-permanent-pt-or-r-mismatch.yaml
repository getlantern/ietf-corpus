document: rfc-7324
kind: design-rationale
summary: Even when a permanent PT or R mismatch exists, the protection domain SHOULD still be allowed to forward traffic on the Working LSP under no-failure conditions, since the mismatch only affects recovery behavior and not normal data-plane operation.
