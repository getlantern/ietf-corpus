document: rfc-7800
kind: normative-requirement
summary: Confirmation method names registered in the JWT Confirmation Methods registry SHOULD be short, not exceeding eight characters without a compelling reason, and are case sensitive. Names may not match other registered names in a case-insensitive manner unless Designated Experts approve an exception.
section: 6.2.1
rfc2119_level: RECOMMENDED
