document: rfc-9826
kind: design-rationale
summary: The session list uses 'initiator' (local vs. remote) as the key rather than a single entry per peer because RFC 5440 allows two sessions to coexist transiently during establishment — one initiated locally and one by the remote — until one reaches the active state and the other is discarded.
section: 4.1.1.1
topics:
