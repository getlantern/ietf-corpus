document: rfc-2684
kind: normative-requirement
summary: A bridge using Bridged Ethernet/802.3 encapsulation with preserved LAN FCS MUST include Ethernet minimum-size padding. Without FCS, padding MAY be included or omitted, but the receiving bridge MUST be able to insert padding before forwarding to an Ethernet/802.3 subnetwork.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
