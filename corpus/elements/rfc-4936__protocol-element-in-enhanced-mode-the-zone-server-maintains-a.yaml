document: rfc-4936
kind: protocol-element
summary: In Enhanced mode, the Zone Server maintains a 'copy' database (a snapshot taken at Fabric lock acquisition) that absorbs SNMP SetRequest changes. Changes become permanent only after a commit via t11ZsServerCommit; uncommitted changes are discarded when the lock is released.
