document: rfc-8182
kind: normative-requirement
summary: A Relying Party MUST download and verify the Update Notification File format per Section 3.5.1.3; if verification fails the file MUST be rejected. The session_id MUST be verified against the last known session_id for that URL, and MUST NOT be used as a unique identifier without also considering the file's location.
section: 3.4.1
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
