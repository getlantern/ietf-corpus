document: rfc-4011
kind: wire-format
summary: SNMP Object Identifiers are encoded in policy scripts and library functions as ASCII dotted-decimal strings of the form 'subid[.subid]*' where each subid is '0' or a decimal constant. ASCII descriptors (e.g., 'ifIndex') are never used in these encodings and must be translated to dotted-decimal before being placed in MIB objects.
section: 8.1.2
topics:
    - snmp
