document: rfc-4740
kind: normative-requirement
summary: When SIP-User-Authorization-Type is REGISTRATION and no prior SIP server is known, the Diameter server MUST set Result-Code to DIAMETER_FIRST_REGISTRATION and SHOULD include SIP-Server-Capabilities. When a prior assigned SIP server is known without returning capabilities, it MUST set DIAMETER_SUBSEQUENT_REGISTRATION.
section: "8.2"
rfc2119_level: MUST
topics:
    - sip
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
