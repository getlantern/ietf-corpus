document: rfc-5027
kind: interoperability-note
summary: Current SDP and offer/answer procedures (RFC 4566, RFC 3264) allow only a single transport protocol type per media stream; negotiation of alternative transport protocols (e.g., plain vs. secure RTP) is not defined, so if the offered secure transport is unsupported the media stream is simply rejected.
section: "5"
topics:
