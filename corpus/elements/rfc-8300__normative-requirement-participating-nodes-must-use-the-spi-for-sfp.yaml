document: rfc-8300
kind: normative-requirement
summary: Participating nodes MUST use the SPI for SFP selection. The initial Classifier MUST set the appropriate SPI and MUST send the packet to the first SFF in the identified SFP. The Service Index MUST be decremented by 1 by SFs or SFC Proxy nodes after performing required services.
section: "2.3"
rfc2119_level: MUST
topics:
    - security
