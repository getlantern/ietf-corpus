document: rfc-959
kind: wire-format
summary: 'The PORT command argument encodes a 32-bit IP address and 16-bit TCP port as six comma-separated decimal octets: PORT h1,h2,h3,h4,p1,p2, where h1 is the high-order byte of the internet host address and p1,p2 encode the port number.'
section: 4.1.2
