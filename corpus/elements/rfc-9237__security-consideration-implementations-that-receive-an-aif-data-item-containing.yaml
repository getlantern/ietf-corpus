document: rfc-9237
kind: security-consideration
summary: Implementations that receive an AIF data item containing Dynamic-X permissions they do not understand must either reject the entire data item or act only on permissions they do understand; they must not silently grant unrecognized permissions, preserving allow-list semantics.
section: "6"
topics:
    - security
