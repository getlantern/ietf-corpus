document: rfc-4945
kind: normative-requirement
summary: IKE implementations MUST support validating that the distributionPointName in CRLDistributionPoints matches the distributionPoint in IssuingDistributionPoint to prevent CRL substitution attacks where a known-good CRL from a different distribution point is substituted.
