document: rfc-8130
kind: interoperability-note
summary: Early implementations used MELP2400, MELP1200, and MELP600 media type names to indicate both coder type and bitrate; these names are preserved in the registration. These names have been observed in systems that do not support dynamic frame-rate switching via the 'bitrate' parameter.
section: "4.1"
topics:
