document: rfc-1304
kind: protocol-element
summary: 'sipL2Table provides per-port L2 error counters: sipL2HcsOrCRCErrors, sipL2PayloadLengthErrors, sipL2SequenceNumberErrors, sipL2MidCurrentlyActiveErrors, sipL2BomOrSSMsMIDErrors, and sipL2EomsMIDErrors. Total L2 errors equal the sum of all six counters.'
