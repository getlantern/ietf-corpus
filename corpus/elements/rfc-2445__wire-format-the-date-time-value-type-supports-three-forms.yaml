document: rfc-2445
kind: wire-format
summary: 'The DATE-TIME value type supports three forms: (1) floating local time — no UTC designator and no TZID; (2) UTC time — trailing ''Z'' suffix (US-ASCII decimal 90); and (3) local time with time zone reference using the TZID parameter. The UTC offset form (e.g., -0800 appended directly) MUST NOT be used.'
section: 4.3.5
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
