document: rfc-8182
kind: security-consideration
summary: All RPKI objects (certificates, CRLs, CMS-wrapped signed objects) are protected by object-level security including signed manifests, so they can be validated even when the Repository Server itself is not trusted. RRDP makes no change to RPKI validation procedures.
