document: rfc-8727
kind: design-rationale
summary: JSON and CBOR alternatives to IODEF XML are defined because JSON is a well-used structured format suitable for machine processing, enabling automation of incident response operations. IODEF JSON provides all the expressivity of IODEF XML while giving implementers and operators an alternative exchange format.
