document: rfc-8185
kind: protocol-element
summary: The Dual-Node Switching TLV (Type=2) is used by one dual-homing PE to send protection state coordination to its peer. The S bit indicates which service PW carries traffic (0=working, 1=protection), and the P bit identifies the sender's role.
