document: rfc-9270
kind: normative-requirement
summary: Primary working LSPs are signaled with the PROTECTION object S bit=0, P bit=0, N bit=1, and the ASSOCIATION object Association ID set to the associated secondary protecting LSP_ID. The N bit indicates protection switching signaling is done via the data plane.
section: "5.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
