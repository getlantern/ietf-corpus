document: rfc-4210
kind: normative-requirement
summary: If the CA grants an ImplicitConfirm request, it MUST include the implicitConfirm extension (OID {id-it 13}, value NULL) in the PKIHeader of the response. If the EE does not find the extension in the response, it MUST send a certificate confirmation (certConf) message.
section: 5.1.1.1
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
