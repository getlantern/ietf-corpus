document: rfc-9766
kind: normative-requirement
summary: 'The LAYOUT_WCC operation MUST provide all eight mapped attributes to the metadata server: size, space_used, mode, owner (uid), owner_group (gid), time_access (atime), time_modify (mtime), and time_metadata (ctime), as listed in the NFSv3-to-NFSv4.2 attribute mapping table.'
section: 3.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
