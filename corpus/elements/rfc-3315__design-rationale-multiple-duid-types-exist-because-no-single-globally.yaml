document: rfc-3315
kind: design-rationale
summary: 'Multiple DUID types exist because no single globally-unique identifier suits all device classes: general-purpose hosts with writable storage use DUID-LLT for uniqueness; embedded devices with factory-assigned IDs use DUID-EN; devices with a permanent NIC but no writable storage use DUID-LL.'
