document: rfc-698
kind: protocol-element
summary: IAC WILL EXTEND-ASCII requests permission to begin transmitting extended ASCII. IAC WON'T EXTEND-ASCII refuses or cancels extended ASCII transmission. IAC DO EXTEND-ASCII grants permission; IAC DON'T EXTEND-ASCII demands cessation of extended ASCII mode.
section: "2"
