document: rfc-933
kind: design-rationale
summary: Transmitting the banner once via subnegotiation and having User-Telnet maintain it automatically is more efficient than Server-Telnet embedding the banner in every screen of data. It also frees Server-Telnet from needing to know the output device's page size.
section: "4"
