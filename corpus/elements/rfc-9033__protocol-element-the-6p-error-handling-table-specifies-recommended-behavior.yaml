document: rfc-9033
kind: protocol-element
summary: 'The 6P error handling table specifies recommended behavior for each 6P return code: RC_SUCCESS and RC_EOL require no action; RC_ERR_SEQNUM and RC_ERR_CELLLIST trigger ''clear'' (abort transaction, issue CLEAR, remove all cells); RC_ERR and RC_RESET trigger ''quarantine'' (clear plus remove from neighbor/routing tables and blacklist); RC_ERR_BUSY and RC_ERR_LOCKED trigger ''waitretry''.'
section: "12"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
