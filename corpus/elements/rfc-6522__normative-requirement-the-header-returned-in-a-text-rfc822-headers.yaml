document: rfc-6522
kind: normative-requirement
summary: The header returned in a text/rfc822-headers body part SHOULD NOT be returned using the message/rfc822 media type, as it is not the complete message. It includes all header fields prior to the first blank line, including MIME-Version and MIME content description fields.
section: "4"
rfc2119_level: SHOULD NOT
topics:
    - email
