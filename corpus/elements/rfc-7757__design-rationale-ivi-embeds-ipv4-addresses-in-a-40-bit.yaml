document: rfc-7757
kind: design-rationale
summary: IVI embeds IPv4 addresses in a 40-bit translation prefix with a non-RFC-6052 layout (bits 33-40 set to 1, IPv4 in bits 41-72). EAMs allow SIIT to support this address format by expressing the IVI mapping as a /0-to-/40 EAM entry.
section: A.2
topics:
    - v6ops
    - ip
