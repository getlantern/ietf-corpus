document: rfc-6787
kind: wire-format
summary: 'The request-line format is: ''mrcp-version SP message-length SP method-name SP request-id CRLF''. The response-line format is: ''mrcp-version SP message-length SP request-id SP status-code SP request-state CRLF''. Clients and servers MUST indicate mrcp-version ''MRCP/2.0''.'
section: "5.2"
