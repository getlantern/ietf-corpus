document: rfc-9803
kind: normative-requirement
summary: A server that receives a <create> or <update> command that includes a restricted record type MUST respond with a 2306 'Parameter value policy' error. Clients can discover permitted record types via a Policy Mode <info> command.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
