document: rfc-5323
kind: protocol-element
summary: The Query Schema Discovery (QSD) mechanism allows clients to retrieve the schema for a specific query grammar on a given arbiter and scope by issuing a SEARCH with a DAV:query-schema-discovery root element instead of DAV:searchrequest. The response is a DAV:multistatus with DAV:query-schema container elements holding grammar-specific schema descriptions.
section: "4"
