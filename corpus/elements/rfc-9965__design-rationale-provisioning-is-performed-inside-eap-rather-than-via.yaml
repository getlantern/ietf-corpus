document: rfc-9965
kind: design-rationale
summary: Provisioning is performed inside EAP (rather than via a captive portal) because the EAP/AAA administrator may not have control over the network and it is not always possible to define a captive portal. All provisioning must be doable via EAP, not via IP-based protocols.
section: 1.1.3
topics:
    - security
