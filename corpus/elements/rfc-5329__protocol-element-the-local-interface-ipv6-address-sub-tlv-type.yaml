document: rfc-5329
kind: protocol-element
summary: The Local Interface IPv6 Address sub-TLV (type 19) specifies one or more IPv6 addresses of the local interface. Multiple addresses MAY be listed; link-local addresses MUST NOT be included. Length is always a multiple of 16 octets.
section: "4.3"
