document: rfc-5420
kind: normative-requirement
summary: The LSP_REQUIRED_ATTRIBUTES object SHOULD only be used for attributes that require support at some transit LSRs and therefore must be examined at all transit LSRs. End-to-end or selective attributes that need only be inspected by key LSRs should instead use the LSP_ATTRIBUTES object.
section: "5"
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
