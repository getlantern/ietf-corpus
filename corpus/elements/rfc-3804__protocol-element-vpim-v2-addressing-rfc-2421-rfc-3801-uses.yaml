document: rfc-3804
kind: protocol-element
summary: VPIM v2 addressing (RFC 2421/RFC 3801) uses a mailbox number format as the LHS of an email address, e.g., '6137637582@nortelnetworks.com'; this is the most commonly deployed format in existing VPIM v2 systems.
