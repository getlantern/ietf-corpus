document: rfc-8362
kind: normative-requirement
summary: All OSPFv3 implementations supporting Extended LSAs MUST ignore unrecognized TLVs and sub-TLVs when parsing Extended LSAs. A TLV or sub-TLV whose length is below the defined minimum SHOULD NOT be acknowledged and SHOULD be logged with LSA type, Link State ID, originator, sequence number, and TLV identification.
section: "6.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
