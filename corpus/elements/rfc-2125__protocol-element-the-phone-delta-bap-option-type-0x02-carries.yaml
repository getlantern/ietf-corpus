document: rfc-2125
kind: protocol-element
summary: 'The Phone-Delta BAP option (type 0x02) carries calling information as a delta from a previously known number via sub-options: Unique-Digits (1 octet count of differing rightmost digits), Subscriber-Number (ASCII string), and optional Phone-Number-Sub-Address. It MUST appear in Callback-Request and in Call-Response packets with Request-Ack unless No-Phone-Number was sent.'
section: "6.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
