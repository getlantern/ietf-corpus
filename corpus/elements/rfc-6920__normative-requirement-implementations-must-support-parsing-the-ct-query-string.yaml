document: rfc-6920
kind: normative-requirement
summary: Implementations MUST support parsing the 'ct=' query string attribute in ni URIs, which specifies the MIME Content Type of the associated data. Implementations SHOULD support name-data integrity validation for at least the application/octet-stream Content Type (equivalent to binary, no Content-Transfer-Encoding).
section: "3.1"
rfc2119_level: MUST
topics:
    - security
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
