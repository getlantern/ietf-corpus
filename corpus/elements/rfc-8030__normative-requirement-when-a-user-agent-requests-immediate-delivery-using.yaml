document: rfc-8030
kind: normative-requirement
summary: 'When a user agent requests immediate delivery using Prefer: wait=0, the push service MUST generate a server push for all push messages that have not yet been delivered. A 204 (No Content) with no server pushes indicates no messages are currently available.'
section: "6"
rfc2119_level: MUST
topics:
    - http
