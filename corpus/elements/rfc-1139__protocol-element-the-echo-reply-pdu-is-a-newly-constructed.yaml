document: rfc-1139
kind: protocol-element
summary: The echo-reply PDU is a newly constructed PDU whose destination address is taken from the source address of the echo-request. The entire echo-request PDU (header and data) is included in the data portion of the echo-reply, allowing fields such as the echo-request lifetime to be examined upon receipt. Segmentation rules for DT PDUs apply.
section: "2.2"
topics:
    - ip
