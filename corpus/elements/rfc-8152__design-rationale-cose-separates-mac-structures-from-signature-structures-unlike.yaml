document: rfc-8152
kind: design-rationale
summary: 'COSE separates MAC structures from signature structures (unlike some prior formats), because their security properties differ: signatures provide non-repudiation, while MACs require a shared secret and only authenticate to parties holding that secret. The separation prevents misuse and simplifies security analysis.'
section: "1.1"
topics:
    - crypto
    - security
