document: rfc-3755
kind: normative-requirement
summary: Resolvers MUST NOT treat answers with NSEC RRs as negative answers merely because they contain an NSEC; positive responses such as wildcard proofs and unsecure referrals will legitimately contain NSEC RRs.
section: "3"
rfc2119_level: MUST NOT
