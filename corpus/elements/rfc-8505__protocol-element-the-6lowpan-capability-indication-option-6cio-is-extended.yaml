document: rfc-8505
kind: protocol-element
summary: 'The 6LoWPAN Capability Indication Option (6CIO) is extended with five new bits: E (EARO support), P (Routing Registrar capable), B (6LBR capable), L (6LR capable), and D (EDAR/EDAC support by 6LBR). A 6LR that supports this specification MUST set the E flag.'
section: "4.3"
topics:
    - ip
    - v6ops
