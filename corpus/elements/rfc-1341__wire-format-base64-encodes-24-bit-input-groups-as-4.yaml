document: rfc-1341
kind: wire-format
summary: Base64 encodes 24-bit input groups as 4-character output strings using a 65-character alphabet (A–Z, a–z, 0–9, '+', '/', and '=' for padding). Output lines must not exceed 76 characters. Fewer than 24 trailing input bits are zero-padded and output positions not representing actual data are set to '='.
section: "5.2"
