document: rfc-4174
kind: protocol-element
summary: The Default Discovery Domain bit (bit 12) controls whether newly registered devices not explicitly placed into a Discovery Domain are automatically added to a default DD and DDS. If set to one, a default DD contains all unassigned devices; if zero, such devices are not members of any DD.
section: "2.3"
topics:
