document: rfc-5280
kind: normative-requirement
summary: A CRL entry MUST NOT be removed from the CRL until it appears on one regularly scheduled CRL issued beyond the revoked certificate's validity period. This ensures relying parties can always detect revocation during a certificate's valid lifetime.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - pkix
    - security
