document: rfc-5304
kind: normative-requirement
summary: After password rollover, if an inbound LSP with an authentication failure has the local System ID and a higher Sequence Number than the IS-IS process has, the IS-IS process SHOULD increase its own LSP Sequence Number accordingly and re-flood the LSPs.
section: "2.1"
rfc2119_level: SHOULD
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
