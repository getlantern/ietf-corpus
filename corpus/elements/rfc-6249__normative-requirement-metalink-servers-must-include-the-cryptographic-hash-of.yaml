document: rfc-6249
kind: normative-requirement
summary: Metalink servers MUST include the cryptographic hash of a resource via Instance Digests in HTTP (RFC 3230), and MUST include SHA-256 as specified in FIPS-180-3. Other hash algorithms MAY also be included.
section: "2"
rfc2119_level: MUST
topics:
