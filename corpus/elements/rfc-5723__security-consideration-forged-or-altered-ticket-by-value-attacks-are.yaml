document: rfc-5723
kind: security-consideration
summary: Forged or altered 'ticket by value' attacks are defeated by strong integrity protection. For 'ticket by reference', forging a fake reference fails because the adversary lacks the keying material; it is recommended to integrity-protect the reference to also prevent SQL injection and SSRF-style attacks.
section: "9.2"
topics:
    - ipsec
    - security
