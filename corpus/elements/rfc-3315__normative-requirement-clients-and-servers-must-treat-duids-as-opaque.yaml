document: rfc-3315
kind: normative-requirement
summary: Clients and servers MUST treat DUIDs as opaque values and MUST only compare DUIDs for equality; they MUST NOT interpret a DUID's internal structure, and MUST NOT restrict DUIDs to the types defined in this document since additional types may be defined in the future.
section: "9"
rfc2119_level: MUST
topics:
    - ip
