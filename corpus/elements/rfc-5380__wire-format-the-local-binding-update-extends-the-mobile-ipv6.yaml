document: rfc-5380
kind: wire-format
summary: The Local Binding Update extends the Mobile IPv6 Binding Update with a new M flag (bit 4 in the flags field). When set to 1, M indicates a MAP registration. Both the A and M flags MUST be set when a mobile node registers with the MAP.
