document: rfc-3841
kind: protocol-element
summary: Implicit preferences are derived by a proxy when no explicit Accept-Contact or Reject-Contact header fields are present. The proxy infers preferences from the request method (route to UAs supporting that method) and, for subscriptions, from the Event header field (route to UAs supporting that event package).
section: 7.2.2
topics:
    - sip
    - realtime
