document: rfc-7727
kind: protocol-element
summary: The STP Connect TLV (Type=0x2000) is included in the RG Connect Message to signal initiation of an ICCP STP application connection. It contains a Protocol Version field (this document defines version 0x0001) and an Acknowledgement bit (A-bit) indicating whether the sender has received a corresponding STP Connect TLV from the recipient.
section: "3.1"
topics:
    - routing
    - mpls
