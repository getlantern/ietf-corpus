document: rfc-5730
kind: normative-requirement
summary: All XML instances SHOULD begin with an <?xml?> declaration. EPP clients and servers MUST accept a UTF-8 BOM if present, though emitting a UTF-8 BOM is NOT RECOMMENDED. UTF-8 is the RECOMMENDED character encoding for use with EPP per RFC 2277.
section: "2"
rfc2119_level: RECOMMENDED
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
