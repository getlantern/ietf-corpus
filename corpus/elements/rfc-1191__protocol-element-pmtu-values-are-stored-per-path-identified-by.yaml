document: rfc-1191
kind: protocol-element
summary: PMTU values are stored per-path (identified by source address, destination address, and IP type-of-service) as fields in per-host routing table entries. Per-network and default route entries are initialized to the first-hop link MTU and MUST never be modified by PMTU Discovery; only per-host route entries are created or updated.
section: "6.2"
topics:
    - ip
