document: rfc-2751
kind: design-rationale
summary: 'A wide gap between preemption and defending priority provides added stability: moderate preemption priority makes it harder for a flow to preempt others, but once admitted the higher defending priority makes it easier to avoid preemption itself, balancing order dependency against priority.'
