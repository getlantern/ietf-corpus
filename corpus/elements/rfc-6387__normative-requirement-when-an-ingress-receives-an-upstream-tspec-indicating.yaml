document: rfc-6387
kind: normative-requirement
summary: When an ingress receives an UPSTREAM_TSPEC indicating the original reservation is insufficient, it MAY tear down the LSP with a PathTear, or MAY issue a Path message with an updated UPSTREAM_FLOWSPEC to request more resources; the update might require re-routing or result in teardown if resources are unavailable.
section: 2.2.1
rfc2119_level: MAY
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
