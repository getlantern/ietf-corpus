document: rfc-4211
kind: security-consideration
summary: Implementations MUST enforce POP during enrollment. Failure to do so allows an attacker to obtain a certificate for a key they do not possess, enabling impersonation on signature keys and interception of messages encrypted to key-management keys.
section: "9"
topics:
    - pkix
    - security
    - crypto
