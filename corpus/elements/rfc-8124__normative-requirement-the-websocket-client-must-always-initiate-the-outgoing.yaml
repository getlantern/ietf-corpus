document: rfc-8124
kind: normative-requirement
summary: The WebSocket client MUST always initiate the outgoing TCP connection; therefore the SDP 'setup' attribute MUST always be 'active' for the WebSocket client in its SDP offer/answer. The WebSocket server MUST always use 'setup:passive'.
section: "5"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
