document: rfc-3530
kind: protocol-element
summary: 'File attributes are classified into three types: mandatory (server must support, e.g., fsid, fh_expire_type), recommended (server should support, e.g., ACL, fs_locations), and named (opaque byte streams accessed via OPENATTR and identified by string names, intended for application-specific metadata). Mandatory and recommended attributes use numbered bit-vector encoding.'
section: "5"
extracted_by: claude-sonnet-4-6
