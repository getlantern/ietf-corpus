document: rfc-4396
kind: normative-requirement
summary: In an aggregate payload, TYPE 1 units MUST be placed in play-out order (earliest first). The timestamp of each subsequent TYPE 1 unit MUST be obtained by adding the preceding unit's SDUR to its timestamp. TYPE 5 unit timestamps reflect when the description becomes available, not play-out time.
section: "4.6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
