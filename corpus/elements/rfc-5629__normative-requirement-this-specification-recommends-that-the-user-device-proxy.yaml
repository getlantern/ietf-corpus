document: rfc-5629
kind: normative-requirement
summary: This specification RECOMMENDS that the User Device Proxy monitor the first stream (defined by ordering of media sessions within a session description) for user input. As such, user agents SHOULD send their user input on the first stream, absent a policy directing otherwise.
section: "7.3"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
