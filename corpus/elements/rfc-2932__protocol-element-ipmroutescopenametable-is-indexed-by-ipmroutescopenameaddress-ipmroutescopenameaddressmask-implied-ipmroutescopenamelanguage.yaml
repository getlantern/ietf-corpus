document: rfc-2932
kind: protocol-element
summary: ipMRouteScopeNameTable is indexed by (ipMRouteScopeNameAddress, ipMRouteScopeNameAddressMask, IMPLIED ipMRouteScopeNameLanguage) providing human-readable, language-tagged names for multicast scopes; scoped addresses must come from 239.x.x.x. ipMRouteScopeNameDefault (TruthValue, default false) indicates a preferred fallback language.
