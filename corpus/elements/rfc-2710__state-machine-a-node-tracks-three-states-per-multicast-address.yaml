document: rfc-2710
kind: state-machine
summary: 'A node tracks three states per (multicast address, interface) pair: Non-Listener (initial), Delaying Listener (listening with a running report timer), and Idle Listener (listening without a timer). Transitions are triggered by: start listening, stop listening, query received, report received, and timer expired.'
