document: rfc-7800
kind: protocol-element
summary: The "cnf" (confirmation) claim is a JWT claim whose value is a JSON object containing members that identify the proof-of-possession key. By including it, the issuer declares that the presenter possesses a particular key that the recipient can cryptographically confirm.
