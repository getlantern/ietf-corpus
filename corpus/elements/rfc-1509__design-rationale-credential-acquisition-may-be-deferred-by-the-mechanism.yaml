document: rfc-1509
kind: design-rationale
summary: Credential acquisition may be deferred by the mechanism until the credential is actually needed at context-establishment time. This design choice is implementation-specific and must be invisible to the caller; it avoids unnecessary credential-fetch overhead when credentials are acquired but not immediately used.
section: "3"
topics:
    - security
