document: rfc-5901
kind: protocol-element
summary: The Contact element within DomainContacts is extended with a required Confidence enumeration (known-fraudulent, looks-fraudulent, known-real, looks-real, unknown) assessing registrant contact veracity, and with ext-role values from RFC 3982 plus hostingProvider for identifying the server operator.
section: 5.9.2.6.2
topics:
