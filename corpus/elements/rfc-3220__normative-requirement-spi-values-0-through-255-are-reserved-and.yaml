document: rfc-3220
kind: normative-requirement
summary: SPI values 0 through 255 are reserved and MUST NOT be used in any Mobility Security Association. All mobility agents MUST process packets addressed to the Mobile-Agents multicast group at 224.0.0.11.
section: "1.6"
rfc2119_level: MUST NOT
