document: rfc-3202
kind: interoperability-note
summary: The IF-MIB (RFC 2233/2863) is required for ifIndex information. The Frame Relay DTE MIB (RFC 2115) and Frame Relay Network Services MIB (RFC 2954) are not required but provide DLCI information. DLCI state must be correlated with frCircuitState/frPVCEndptRcvdSigStatus from those MIBs to determine PVC readiness.
