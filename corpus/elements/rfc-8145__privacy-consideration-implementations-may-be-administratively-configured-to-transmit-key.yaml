document: rfc-8145
kind: privacy-consideration
summary: Implementations MAY be administratively configured to transmit Key Tags only for certain zones. Since the primary motivation is root zone key rollover measurement, implementations SHOULD at least include edns-key-tag for root zone DNSKEY queries.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - dns
    - privacy
extracted_by: claude-sonnet-4-6
