document: rfc-9697
kind: normative-requirement
summary: If the session_id matches the last known session_id, the Relying Party SHOULD compare whether hash values associated with previously seen files for serials match the hash values of the corresponding serials in the newly fetched Update Notification File. If any differences are detected, files were unexpectedly mutated.
section: "5"
rfc2119_level: SHOULD
topics:
    - routing
    - bgp
    - security
