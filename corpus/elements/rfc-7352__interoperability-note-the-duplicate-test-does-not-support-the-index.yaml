document: rfc-7352
kind: interoperability-note
summary: The 'duplicate' test does not support the 'index' [DATE-INDEX] or 'mime' [SIEVE-MIME] extensions directly; none of the ':index', ':mime', or associated arguments are added to the test. The ':uniqueid' argument combined with the 'variables' extension can achieve equivalent behavior indirectly.
