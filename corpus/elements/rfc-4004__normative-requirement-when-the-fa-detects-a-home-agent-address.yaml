document: rfc-4004
kind: normative-requirement
summary: When the FA detects a home agent address of 0.0.0.0 or 255.255.255.255 in the Registration Request, it MUST add a MIP-Feature-Vector AVP with Home-Agent-Requested set to one; address 255.255.255.255 additionally requires Home-Address-Allocatable-Only-in-Home-Realm set to one.
section: "3.2"
rfc2119_level: MUST
topics:
    - diameter
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
