document: rfc-5475
kind: protocol-element
summary: Hash-Based Selection is a Filtering method defined by a Hash Domain, Hash Function, Hash Range, and Hash Selection Range. A packet is selected if the hash result falls in the Hash Selection Range. It is classified as Filtering because hashing is a deterministic operation on Packet Content.
