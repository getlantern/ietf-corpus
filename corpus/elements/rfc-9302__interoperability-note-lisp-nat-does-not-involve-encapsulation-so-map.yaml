document: rfc-9302
kind: interoperability-note
summary: LISP-NAT does not involve encapsulation, so Map-Versioning does not apply. Proxy-ETRs ignore the Dest Map-Version field but MAY use the Source Map-Version to validate that incoming LISP-encapsulated traffic arrives from a currently authorized source RLOC.
section: A.2.2
topics:
    - routing
    - ip
