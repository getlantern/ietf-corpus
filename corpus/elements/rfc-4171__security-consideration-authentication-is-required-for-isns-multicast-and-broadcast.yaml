document: rfc-4171
kind: security-consideration
summary: Authentication is required for iSNS multicast and broadcast messages (Section 5.5) to prevent spoofed heartbeat attacks. Only Control Nodes are authorized to create or delete Discovery Domains and to register for Management SCNs; authorization for Control Node registration is administratively controlled.
section: "7.2"
topics:
    - security
