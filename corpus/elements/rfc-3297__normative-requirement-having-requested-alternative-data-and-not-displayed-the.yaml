document: rfc-3297
kind: normative-requirement
summary: Having requested alternative data and not displayed the original, the receiver MUST remember this fact and be prepared to take corrective action (re-send MDN, present original, or generate error) if alternative data is not received within a reasonable time.
section: 3.2.3
rfc2119_level: MUST
topics:
