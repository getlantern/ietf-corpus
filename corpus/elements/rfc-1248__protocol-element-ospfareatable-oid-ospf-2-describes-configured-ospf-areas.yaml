summary: ospfAreaTable (OID ospf 2) describes configured OSPF areas; each OspfAreaEntry is indexed by ospfAreaId and includes ospfAuthType (none=0, simplePassword=1), ospfImportASExtern (TruthValue), ospfSpfRuns (Counter), ospfAreaBdrRtrCount, ospfASBdrRtrCount, ospfAreaLSACount, and ospfAreaLSACksumSum.
