document: rfc-6040
kind: normative-requirement
summary: For currently unused (CU) combinations of inner and outer ECN fields (marked '(!!!)' or '(!)' in Figure 4), the decapsulator SHOULD log the event and MAY raise an alarm. Alarms SHOULD be rate-limited, and it MUST be possible to suppress alarms or logging entirely.
section: "4.2"
rfc2119_level: SHOULD
topics:
