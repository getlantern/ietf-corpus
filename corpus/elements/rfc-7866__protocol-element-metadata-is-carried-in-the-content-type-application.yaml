document: rfc-7866
kind: protocol-element
summary: Metadata is carried in the content type 'application/rs-metadata' with Content-Disposition 'recording-session'. When a SIP message contains both an SDP offer and metadata, the body MUST be 'multipart/mixed' with separate subordinate parts for SDP and metadata. Metadata may be a full snapshot or an incremental partial update.
section: "9.1"
topics:
    - sip
    - realtime
