document: rfc-8077
kind: wire-format
summary: The PW Status TLV (type 0x096A) carries a 4-octet bit-field Status Code within an LDP Notification message. Each bit represents an independent fault condition; the lowest bit (PW Not Forwarding) is a generic failure indicator.
