document: rfc-4008
kind: interoperability-note
summary: Full Cone NAT may be identified when UDP NAT sessions have zero values for PrivateDstAddr, PrivateDstPort, PublicDstAddr, and PublicDstPort (wildcard match), or when the natSessionPrivateSrcEPBindId TranslationEntity is set bidirectionally. Port Restricted Cone NAT has all four address/port objects non-zero with no wildcard matches.
section: "4.6"
topics:
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
