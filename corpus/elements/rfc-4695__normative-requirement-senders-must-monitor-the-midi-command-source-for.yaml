document: rfc-4695
kind: normative-requirement
summary: Senders MUST monitor the MIDI command source for patterns that result in excessive packet rates and take actions during RTP transcoding to reduce the RTP packet rate, as required by RFC 3550 congestion control. RTP MIDI sessions using UDP SHOULD monitor packet loss via RTCP.
section: "8"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
