document: rfc-4447
kind: wire-format
summary: The Interface Parameters Sub-TLV has a 1-byte Sub-TLV Type, a 1-byte Length (inclusive of type and length fields), and a variable-length Value. The Interface MTU sub-TLV carries a 2-octet MTU value excluding encapsulation overhead; the Optional Interface Description string is 0–80 octets in UTF-8.
section: "5.5"
topics:
