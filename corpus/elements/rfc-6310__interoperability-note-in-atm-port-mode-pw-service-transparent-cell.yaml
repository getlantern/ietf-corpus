document: rfc-6310
kind: interoperability-note
summary: In ATM port mode PW service (transparent cell transport), the PE does not track individual VPC/VCC status and cannot relay PW defect state over those connections. End-to-end ATM CC cells running CE-to-CE or across a segment spanning the PSN will time out and independently cause CEs or ATM switches to enter AIS state.
section: 7.3.3
topics:
    - mpls
