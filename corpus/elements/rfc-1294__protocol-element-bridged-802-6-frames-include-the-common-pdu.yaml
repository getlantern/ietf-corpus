document: rfc-1294
kind: protocol-element
summary: Bridged 802.6 frames include the Common PDU Header (with BAsize field) and Common PDU Trailer to enable pipelining at the egress bridge; however, the BEtag value must not be copied directly to the outgoing 802.6 subnetwork as it may conflict with a previously transmitted BEtag.
section: "7.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
