document: rfc-4422
kind: security-consideration
summary: Most SASL security layers do not themselves defend against truncation attacks in which an active attacker closes the session, truncating the integrity-protected data stream. Protocols can defend by ensuring information exchanges have clear final results and graceful closure mechanisms protected by integrity.
section: 6.1.4
topics:
    - security
