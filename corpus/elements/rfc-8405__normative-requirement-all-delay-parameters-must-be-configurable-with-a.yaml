document: rfc-8405
kind: normative-requirement
summary: All delay parameters MUST be configurable with a granularity of at least a tenth of a second, and SHOULD be configurable with millisecond granularity. The configurable range SHOULD extend from 0 ms to at least 6000 ms.
section: "6"
rfc2119_level: MUST
topics:
    - routing
