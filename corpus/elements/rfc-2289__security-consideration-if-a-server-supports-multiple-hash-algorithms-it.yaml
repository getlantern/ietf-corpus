document: rfc-2289
kind: security-consideration
summary: If a server supports multiple hash algorithms it is only as secure as its weakest algorithm. MD4 is believed to be less strong than MD5; a server offering MD4 downgrades overall security.
section: "10"
topics:
    - security
    - crypto
