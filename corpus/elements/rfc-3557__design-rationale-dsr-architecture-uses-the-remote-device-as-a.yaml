document: rfc-3557
kind: design-rationale
summary: DSR architecture uses the remote device as a thin front-end client that processes and compresses speech optimally for recognition, sending feature streams to a speech engine server. This avoids the degradation caused by using mobile voice codecs (designed for audible quality) as input to speech recognizers.
