document: rfc-5436
kind: security-consideration
summary: When notification messages pass through gateways to other services (e.g., SMS), critical information including trace headers and Auto-Submitted fields may be lost, removing the ability to detect loops, contact script owners, or resolve problems. Gateway developers should preserve this information.
section: "5"
topics:
    - email
    - security
