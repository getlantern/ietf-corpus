document: rfc-3413
kind: interoperability-note
summary: When an Internal-Class PDU (e.g., Report PDU) is received by a proxy forwarder in response to a previously forwarded request, if the original incoming management target indicated an SNMP version that does not support Report PDUs, processing of the Internal-Class PDU is halted and it is not forwarded back.
section: 3.5.1.3
topics:
    - snmp
