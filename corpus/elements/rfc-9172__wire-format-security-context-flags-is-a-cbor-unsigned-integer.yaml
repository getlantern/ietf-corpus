document: rfc-9172
kind: wire-format
summary: Security Context Flags is a CBOR unsigned integer interpreted as a bit field. Bit 0 (0x01) is the 'Security context parameters present' flag. Implementations MUST set reserved bits to 0 when writing and MUST ignore reserved bits when reading.
