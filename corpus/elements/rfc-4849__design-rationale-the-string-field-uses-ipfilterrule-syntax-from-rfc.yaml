summary: The String field uses IPFilterRule syntax (from RFC 3588 Section 4.3) and the attribute mirrors Diameter NAS-Filter-Rule AVP (400) from RFC 4005 to enable straightforward Diameter/RADIUS interoperability and reuse of an existing, well-defined filter syntax.
