document: rfc-8010
kind: normative-requirement
summary: Clients MUST send requests with the highest supported version-number and SHOULD retry with alternate version numbers if they receive 'server-error-version-not-supported'. IPP objects MUST accept requests with version-number '1.1' or reject them for reasons other than version unsupported.
section: "9.1"
rfc2119_level: MUST
topics:
    - http
