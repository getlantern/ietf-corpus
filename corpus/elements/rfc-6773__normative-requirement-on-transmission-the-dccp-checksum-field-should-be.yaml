document: rfc-6773
kind: normative-requirement
summary: On transmission, the DCCP Checksum field SHOULD be set to zero. On receipt, the DCCP Checksum field MUST be ignored. The function of the DCCP Checksum is performed by the UDP Checksum field.
section: "3.3"
rfc2119_level: MUST
topics:
    - udp
    - nat
