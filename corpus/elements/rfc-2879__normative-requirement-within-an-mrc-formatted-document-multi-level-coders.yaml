document: rfc-2879
kind: normative-requirement
summary: Within an MRC-formatted document, multi-level coders MUST be used for foreground and background images (odd-numbered layers 1, 3, 5, …) and bi-level coders for mask layers (even-numbered layers 2, 4, 6, …). MRC format also imposes constraints on usable resolutions.
section: "3.8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
