document: rfc-4661
kind: design-rationale
summary: The expression syntax in Section 5 is defined to be XPath-compatible but deliberately restricted, providing only a subset of XPath capabilities. This limits complexity while retaining sufficient expressiveness for filtering PIDF and similar presence documents.
