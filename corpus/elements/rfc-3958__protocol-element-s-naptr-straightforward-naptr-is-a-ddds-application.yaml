document: rfc-3958
kind: protocol-element
summary: 'S-NAPTR (Straightforward NAPTR) is a DDDS Application that maps domain name, application service name, and application protocol to target server and port using NAPTR and SRV DNS resource records. It uses only a subset of NAPTR capabilities: only substitution rules (replacement expressions), not regular expressions.'
