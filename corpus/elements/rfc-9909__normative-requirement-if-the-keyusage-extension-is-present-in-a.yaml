document: rfc-9909
kind: normative-requirement
summary: If the keyUsage extension is present in a certificate bearing an SLH-DSA or HashSLH-DSA public key, at least one of digitalSignature, nonRepudiation, keyCertSign, or cRLSign MUST be set; keyEncipherment, dataEncipherment, keyAgreement, encipherOnly, and decipherOnly MUST NOT be set.
section: "6"
rfc2119_level: MUST
topics:
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
