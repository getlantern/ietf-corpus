document: rfc-9835
kind: protocol-element
summary: BFD OAM sessions are configured per AC under the 'oam' container. Each session (keyed by 'dest-addr') supports 'source-address', a failure-detection profile reference, 'session-type', 'desired-min-tx-interval', and 'required-min-rx-interval'. BFD can additionally be enabled per static route or BGP neighbor.
section: "5.7"
topics:
