document: rfc-4995
kind: interoperability-note
summary: RFC 3095 profiles assume in-order delivery between compressor and decompressor, while ROHCv2 profiles (RFC 4996 companion) assume out-of-order delivery is possible; implementations mixing profile generations must respect these distinct ordering assumptions.
section: "4.4"
