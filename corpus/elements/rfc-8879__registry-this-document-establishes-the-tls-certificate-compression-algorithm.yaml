summary: 'This document establishes the ''TLS Certificate Compression Algorithm IDs'' registry under ''Transport Layer Security (TLS) Extensions'', with initial entries: 0 (Reserved), 1 (zlib), 2 (brotli), 3 (zstd), 16384-65535 (Reserved for Experimental Use). Allocation policy: IETF Review for values < 256, Specification Required for 256-16383, Experimental Use for 16384-65535.'
