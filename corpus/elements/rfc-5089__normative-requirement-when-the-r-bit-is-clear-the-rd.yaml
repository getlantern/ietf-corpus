document: rfc-5089
kind: normative-requirement
summary: When the R bit is clear, the Rd bit SHOULD be clear on transmission and MUST be ignored on receipt. When the S bit is clear, the Sd bit SHOULD be clear on transmission and MUST be ignored on receipt. Similarly, when L/R/S/Y bits are cleared, the corresponding PrefL/PrefR/PrefS/PrefY fields SHOULD be set to 0 on transmission and MUST be ignored on receipt.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
