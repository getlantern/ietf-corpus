document: rfc-9444
kind: security-consideration
summary: Clients should deactivate authorization objects for ancestor domains or their accounts entirely if an account key is compromised or if a subdomain authorization is no longer needed, using the mechanisms specified in RFC 8555 Sections 7.5.2 and 7.3.6 respectively.
section: "7.1"
topics:
    - acme
    - security
