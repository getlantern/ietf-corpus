document: rfc-7030
kind: protocol-element
summary: 'EST defines six operations mapped to URI path suffixes under /.well-known/est/: /cacerts (distribution of CA certificates), /simpleenroll (initial enrollment), /simplereenroll (renewal/rekey), /fullcmc (Full CMC, optional), /serverkeygen (server-side key generation, optional), and /csrattrs (CSR attributes, optional). An optional CA label path segment between ''est'' and the operation path allows a single server to serve multiple CAs.'
section: 3.2.2
topics:
    - pkix
    - http
    - registry
