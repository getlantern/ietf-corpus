document: rfc-1368
kind: protocol-element
summary: rptrMonitorPortFCSErrors counts frames with FCSError asserted and FramingError and CollisionEvent deasserted, with OctetCount in [minFrameSize, maxFrameSize]. If AlignmentErrors is incremented for a frame, FCSErrors shall not also be incremented for the same frame.
