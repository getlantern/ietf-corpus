document: rfc-2725
kind: normative-requirement
summary: When adding an aut-num, the submission must match the authentication specified in the maintainer for the most specific AS-block. If the aut-num does not exist on a route add, the addition is rejected.
section: "9.9"
rfc2119_level: MUST
