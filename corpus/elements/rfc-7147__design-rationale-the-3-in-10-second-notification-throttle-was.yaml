document: rfc-7147
kind: design-rationale
summary: The 3-in-10-second notification throttle was chosen because three notifications per 10 seconds allows short bursts of concurrent notifications (e.g., simultaneous authentication and negotiation failures) without suppressing them, while preventing sustained flooding of the management network.
