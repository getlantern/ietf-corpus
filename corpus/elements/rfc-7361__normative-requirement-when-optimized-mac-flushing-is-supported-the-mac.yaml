document: rfc-7361
kind: normative-requirement
summary: When optimized MAC flushing is supported, the MAC Flush TLV MUST be sent in an LDP address withdraw message with an empty MAC list by the core PE-rs upon detection of failure of its local/primary spoke PW. The N-bit MUST be set to 1 to indicate flush-all-from-me.
section: 5.1.2
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
