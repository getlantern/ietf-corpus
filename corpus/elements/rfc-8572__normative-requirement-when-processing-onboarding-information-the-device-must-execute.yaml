document: rfc-8572
kind: normative-requirement
summary: 'When processing onboarding information, the device MUST execute steps in strict order: (1) process boot image, (2) execute pre-configuration script, (3) commit initial configuration, (4) execute post-configuration script. If any step fails, the device MUST stop and return to the bootstrapping sequence.'
section: "5.6"
rfc2119_level: MUST
topics:
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
