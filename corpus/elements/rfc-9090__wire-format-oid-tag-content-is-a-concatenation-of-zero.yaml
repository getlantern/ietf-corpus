document: rfc-9090
kind: wire-format
summary: OID tag content is a concatenation of zero or more SDNV values. Each SDNV is a sequence of one or more bytes with their MSB set, except for the last byte. For absolute OIDs, the first two arcs X and Y are encoded as the single value X*40+Y.
