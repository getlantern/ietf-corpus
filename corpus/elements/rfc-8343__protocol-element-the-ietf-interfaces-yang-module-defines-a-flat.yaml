document: rfc-8343
kind: protocol-element
summary: The 'ietf-interfaces' YANG module defines a flat list '/interfaces/interface' keyed by 'name', with a mandatory 'type' leaf (identityref based on 'interface-type' identity). Each entry carries configuration leaves (enabled, description, link-up-down-trap-enable) and read-only state leaves (admin-status, oper-status, last-change, if-index, phys-address, higher-layer-if, lower-layer-if, speed, statistics).
section: "3"
topics:
