document: rfc-4004
kind: normative-requirement
summary: An AMA message with Result-Code DIAMETER_SUCCESS MUST include MIP-Home-Agent-Address and MIP-Mobile-Node-Address AVPs. It MUST contain MIP-FA-to-HA-MSA and MIP-FA-to-MN-MSA if they were requested and present in the HAR; MIP-MN-to-HA-MSA and MIP-HA-to-MN-MSA MUST be present if session keys were requested and Co-Located-Mobile-Node was set.
section: "5.2"
rfc2119_level: MUST
topics:
    - diameter
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
