document: rfc-9560
kind: normative-requirement
summary: RDAP responses that contain values defined in this specification MUST indicate conformance by including 'farv1' in the rdapConformance array. An RDAP server MUST determine during an authenticated query whether the end user is authorized to perform the query and MAY reject or redact responses based on the user's authorization level.
section: "8"
rfc2119_level: MUST
topics:
    - oauth
