summary: 'Two complementary mechanisms are defined for a CA to assert that a certificate is a Qualified Certificate: inclusion of an appropriate certificate policy OID in the certificatePolicies extension, and a statement in the QCStatements extension. These are designed to be complementary rather than mutually exclusive.'
