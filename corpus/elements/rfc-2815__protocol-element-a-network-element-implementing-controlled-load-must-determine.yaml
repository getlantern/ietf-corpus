document: rfc-2815
kind: protocol-element
summary: A network element implementing Controlled Load must determine receive and transmit resource requirements (e.g., buffering) for each candidate flow to support admission control. Controlled Load exports no service-specific characterization parameters; internal estimates must account for statistical aggregation of CL flows into 802 traffic classes.
section: "4.3"
topics:
    - qos
