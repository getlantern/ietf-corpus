document: rfc-4363
kind: design-rationale
summary: ifStackTable from IF-MIB cannot fully represent IEEE 802.1Q VLAN bridging because 802.1Q distinguishes VLAN bindings on ingress from those on egress (asymmetric), whereas IF-MIB assumes a symmetric transmit/receive binding. This necessitates separate per-port VLAN membership objects in Q-BRIDGE-MIB.
section: 3.4.2.2
topics:
    - snmp
