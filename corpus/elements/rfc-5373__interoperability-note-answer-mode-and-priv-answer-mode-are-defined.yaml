document: rfc-5373
kind: interoperability-note
summary: Answer-Mode and Priv-Answer-Mode are defined only for initial (dialog-forming) INVITE requests and 200 OK responses to those requests. Usage in ACK, CANCEL, re-INVITE, or any mid-dialog context is explicitly not defined and such headers in other requests are ignored.
section: "3"
topics:
