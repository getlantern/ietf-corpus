document: rfc-4769
kind: wire-format
summary: 'A NAPTR record for a ported number using ''pstn:sip'' takes the form: NAPTR 10 100 "u" "E2U+pstn:sip" "!^.*$!sip:+1-215-555-0123;npdi;rn=+1-215-555-0199@gw.example.com;user=phone!". Conversion from tel to SIP URI follows RFC 3261 Section 19.1.6 and RFC 4694 Section 6.'
section: "4.2"
topics:
    - dns
    - sip
