document: rfc-8733
kind: wire-format
summary: The Sample-Interval Sub-TLV (Type=1, Length=4) carries a 4-octet integer interval in seconds (range 1–604800; default 300). The Sample-Interval MUST NOT exceed the Adjustment-Interval; an invalid value causes the sub-TLV to be ignored and the previous value maintained.
section: 5.2.1
rfc2119_level: MUST NOT
topics:
