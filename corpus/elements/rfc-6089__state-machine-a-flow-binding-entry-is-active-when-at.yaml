document: rfc-6089
kind: state-machine
summary: A flow binding entry is Active when at least one of its associated BIDs points to a valid care-of address, and Inactive when all associated BIDs are deregistered. Inactive entries are skipped during packet matching. An inactive entry returns to Active when any of its BIDs is re-registered.
section: "4.3"
topics:
    - ip
    - mobility
