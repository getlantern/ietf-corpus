document: rfc-4862
kind: interoperability-note
summary: 'Link-layer implementations that discard received packets whose source link-layer address equals the receiving interface''s address (e.g., per IEEE 802.11) will cause DAD to fail silently: the node performing DAD will discard the Neighbor Advertisement or Solicitation from another node using the same link-layer address, resulting in a non-unique address being configured.'
section: Appendix A
topics:
