document: rfc-4995
kind: protocol-element
summary: The IR packet associates a CID with a profile and initializes or refreshes context; it carries an 8-bit CRC, a 1-octet Profile field (8 LSBs of profile identifier), optional CID octets, and profile-specific information of variable length.
