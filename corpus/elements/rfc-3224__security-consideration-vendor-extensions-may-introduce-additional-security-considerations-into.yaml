document: rfc-3224
kind: security-consideration
summary: Vendor extensions may introduce additional security considerations into SLP beyond those in RFC 2608. The Vendor Opaque Extension mechanism itself is no less secure than 'private use' extensions defined in SLPv2, but vendor-defined payloads are unreviewed by the IETF community.
section: "8.0"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
