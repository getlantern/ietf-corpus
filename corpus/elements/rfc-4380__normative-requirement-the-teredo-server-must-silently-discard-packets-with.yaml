document: rfc-4380
kind: normative-requirement
summary: The Teredo server MUST silently discard packets with non-global-unicast IPv4 source addresses or malformed Teredo encapsulation, MUST accept Router Solicitations with valid link-local source addresses, and MUST verify authentication when secure qualification is configured.
