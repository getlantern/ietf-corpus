document: rfc-1341
kind: security-consideration
summary: Active (computational) email types such as application subtypes that execute programs entail security risks including unauthorized file access, arbitrary resource consumption, and sending of forged mail on the user's behalf. User agents must inform users before executing such content.
section: "7.4"
topics:
    - email
    - security
