document: rfc-9774
kind: design-rationale
summary: 'When AS_SET aggregation does occur in practice, it is often used incorrectly: the most common case is a single AS in the AS_SET, the same AS often appears in both the AS_SEQUENCE and the AS_SET, and reserved AS numbers appear with some frequency.'
