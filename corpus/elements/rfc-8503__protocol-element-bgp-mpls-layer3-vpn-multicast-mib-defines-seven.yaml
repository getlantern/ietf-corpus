document: rfc-8503
kind: protocol-element
summary: 'BGP-MPLS-LAYER3-VPN-MULTICAST-MIB defines seven conceptual tables: mvpnGenericTable, mvpnBgpTable, mvpnPmsiTable, mvpnSpmsiTable, mvpnAdvtStatsTable, mvpnMrouteTable, and mvpnMrouteNextHopTable. Together they support monitoring and configuration of MVPN instances on a Provider Edge (PE) router for both PIM-MVPN and BGP-MVPN deployments.'
