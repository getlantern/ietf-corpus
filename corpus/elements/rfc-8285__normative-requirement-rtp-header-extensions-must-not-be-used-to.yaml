document: rfc-8285
kind: normative-requirement
summary: RTP header extensions MUST NOT be used to extend RTP itself in a backward-incompatible manner; they MAY carry metadata in addition to normal RTP header information, provided the RTP layer can function if that metadata is missing.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
