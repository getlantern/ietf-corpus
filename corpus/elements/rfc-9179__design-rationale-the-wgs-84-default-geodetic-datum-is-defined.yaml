document: rfc-9179
kind: design-rationale
summary: The 'wgs-84' default geodetic datum is defined to include the EGM96 geoid update for height values, so that a single 'wgs-84' entry is sufficient for most GPS-based use cases without requiring separate EGM96 or EGM08 entries unless higher precision is needed.
section: "6.1"
topics:
