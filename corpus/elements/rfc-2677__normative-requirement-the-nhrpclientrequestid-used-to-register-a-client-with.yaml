document: rfc-2677
kind: normative-requirement
summary: The nhrpClientRequestID used to register a client with its server MUST be kept in non-volatile storage so that after an NHC crash and re-initialization, it uses a different RequestID when re-registering with the same NHS, as required by RFC 2332 Section 5.2.3.
section: 3.2.1
rfc2119_level: MUST
topics:
    - snmp
