document: rfc-3471
kind: protocol-element
summary: The Acceptable Label Set is used in error messages to indicate which labels would be acceptable when an 'Unacceptable label value' error occurs. Its format is identical to a Label Set (Section 3.5.1) and is carried in protocol-specific error messages as defined in RFC 3472 and RFC 3473.
