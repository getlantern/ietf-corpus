document: rfc-2225
kind: normative-requirement
summary: All IP stations MUST support ATMARP and InATMARP protocols as updated and extended in this memo. All members in the LIS MUST use the same address resolution service, which MUST have authoritative responsibility for resolving ATMARP requests of all IP members within the LIS.
section: "8.1"
rfc2119_level: MUST
topics:
    - ip
