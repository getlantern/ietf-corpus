document: rfc-1252
kind: protocol-element
summary: ospfLsdbSequence is a signed 32-bit integer starting at 0x80000001 and incrementing to 0x7FFFFFFF, used to detect old and duplicate LSAs; larger values indicate more recent advertisements. ospfLsdbChecksum stores the Fletcher checksum of the complete LSA excluding the age field, allowing age to be incremented without updating the checksum.
section: "5.4"
topics:
    - snmp
    - routing
