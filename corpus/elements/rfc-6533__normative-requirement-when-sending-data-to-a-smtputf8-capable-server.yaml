document: rfc-6533
kind: normative-requirement
summary: When sending data to a SMTPUTF8-capable server, native UTF-8 characters SHOULD be used instead of EmbeddedUnicodeChar syntax; when sending to a server that does not advertise SMTPUTF8, EmbeddedUnicodeChar MUST be used instead of raw UTF-8.
section: "3"
rfc2119_level: MUST
topics:
