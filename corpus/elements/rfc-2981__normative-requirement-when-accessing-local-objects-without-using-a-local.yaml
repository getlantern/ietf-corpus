document: rfc-2981
kind: normative-requirement
summary: When accessing local objects without using a local target tag, the system MUST (conceptually) use isAccessAllowed from the SNMP Architecture to ensure it does not violate access control. Security credentials are recorded from the creator of the trigger entry.
section: "6"
rfc2119_level: MUST
topics:
