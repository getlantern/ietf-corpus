document: rfc-6757
kind: normative-requirement
summary: If the LMA understands the ANI mobility option received in a PBU and supports the sub-option(s), it MUST echo the ANI mobility option with the accepted sub-options back to the MAG in the PBA, and MUST NOT alter the ANI sub-options.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
    - mobility
