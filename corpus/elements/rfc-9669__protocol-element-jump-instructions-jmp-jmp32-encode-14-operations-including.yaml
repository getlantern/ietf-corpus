document: rfc-9669
kind: protocol-element
summary: Jump instructions (JMP/JMP32) encode 14 operations including unconditional jump (JA), equality/inequality comparisons (JEQ, JNE), signed and unsigned ordered comparisons (JGT, JGE, JLT, JLE, JSGT, JSGE, JSLT, JSLE), bit-test (JSET), function call (CALL), and return (EXIT). The PC offset is in units of 64-bit instructions relative to the instruction after the jump.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
