document: rfc-8144
kind: protocol-element
summary: 'The ''return=minimal'' preference from RFC 7240 is given precise WebDAV semantics: for PROPFIND/REPORT it means omit 404 propstat elements; for PROPPATCH it means return 200/204 instead of 207; for MKCALENDAR/MKCOL it means return 201 with empty body on success.'
