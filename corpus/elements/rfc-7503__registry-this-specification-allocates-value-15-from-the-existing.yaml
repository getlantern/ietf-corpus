document: rfc-7503
kind: registry
summary: 'This specification allocates value 15 from the existing ''OSPFv3 LSA Function Codes'' registry for the OSPFv3 Autoconfiguration (AC) LSA, and creates a new ''OSPFv3 Autoconfiguration (AC) LSA TLVs'' registry under the OSPFv3 IANA registry. New values are allocated via IETF Review or IESG Approval. Initial values: 0 (Reserved), 1 (Router-Hardware-Fingerprint TLV), 65535 (Autoconfiguration-Experiment-TLV).'
section: "10"
topics:
