document: rfc-4918
kind: normative-requirement
summary: A successful LOCK request to an unmapped URL MUST result in the creation of a locked non-collection resource with empty content. The server MUST respond with 201 Created and include the DAV:lockdiscovery property in the body.
section: "7.3"
rfc2119_level: MUST
topics:
    - http
