document: rfc-4342
kind: normative-requirement
summary: When Ack Vector or Data Dropped is used, an active sender MUST acknowledge the receiver's acknowledgements approximately once per RTT (within a factor of two or three), typically via a DCCP-DataAck packet, so the receiver can free up state.
section: "6.3"
rfc2119_level: MUST
topics:
    - congestion
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
