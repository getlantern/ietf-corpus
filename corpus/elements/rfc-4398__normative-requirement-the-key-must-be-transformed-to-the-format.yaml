document: rfc-4398
kind: normative-requirement
summary: The key MUST be transformed to the format it would have as the public key portion of a DNSKEY RR before the key tag is computed. If the key is not applicable to a DNS security algorithm, the algorithm field MUST be zero and the key tag SHOULD be zero.
section: "2"
rfc2119_level: MUST
topics:
    - dns
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
