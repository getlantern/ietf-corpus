document: rfc-8796
kind: normative-requirement
summary: When forwarding an RSVP Resv message upstream, the PLR node SHOULD remove any B-SFRR-Ready Extended ASSOCIATION objects whose Bypass_Source_IPv4_Address or Bypass_Source_IPv6_Address matches any PLR node address. Similarly, the MP SHOULD remove objects whose Bypass_Destination address matches any MP node address when forwarding Path messages downstream.
section: 3.3.1
rfc2119_level: SHOULD
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
