document: rfc-5555
kind: normative-requirement
summary: The home agent MUST be able to find the IPv4 home address of a mobile node when given the IPv6 home address; if a dynamic IPv4 address was requested, the home agent MUST store the allocated address associated with the IPv6 home address.
