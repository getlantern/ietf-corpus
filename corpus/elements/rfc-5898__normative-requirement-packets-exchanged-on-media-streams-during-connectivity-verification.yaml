document: rfc-5898
kind: normative-requirement
summary: Packets exchanged on media streams during connectivity verification SHOULD be limited to those necessary to verify connectivity; the underlying media stream SHOULD NOT be cut through. ICE connectivity checks and TCP handshake packets are cited as examples.
section: "3.2"
rfc2119_level: SHOULD NOT
topics:
