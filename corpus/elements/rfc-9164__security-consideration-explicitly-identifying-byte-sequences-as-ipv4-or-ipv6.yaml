document: rfc-9164
kind: security-consideration
summary: Explicitly identifying byte sequences as IPv4 or IPv6 addresses via these tags may allow an attacker or eavesdropper to better understand which parts of a packet to target. Applications must consider the security implications of exposing address information in their specific deployment context.
