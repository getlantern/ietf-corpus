document: rfc-5550
kind: errata
summary: 'Four verified technical errata (IDs 1807–1810) for RFC 5162 (QRESYNC) are incorporated: (1807) servers MUST include UID in all unsolicited FETCH responses after a CONDSTORE-enabling command; (1808) servers MUST NOT send HIGHESTMODSEQ in the tagged OK response to CLOSE; (1809) clients MUST prefer the HIGHESTMODSEQ response code over MODSEQ FETCH item values; (1810) servers MUST send HIGHESTMODSEQ below any delayed EXPUNGE mod-sequence to prevent client sync loss.'
section: A
topics:
