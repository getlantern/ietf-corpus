document: rfc-5766
kind: security-consideration
summary: An authenticated client can use a TURN server to anonymously relay malicious traffic. The permission/channel system and authentication requirements provide partial mitigation, but operators should consider blacklisting known-bad IP address ranges from receiving relayed traffic.
section: 17.3.2
topics:
    - nat
    - security
