document: rfc-4007
kind: normative-requirement
summary: When an implementation supports a default zone for each scope, the index value zero at each scope SHOULD be reserved to mean 'use the default zone'. Unlike other zone indices, the default index does not encode the scope; the scope is determined by the accompanying address.
section: "6"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
