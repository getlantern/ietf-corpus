summary: 'The TRANSACTION_TRANSMIT_COUNTER attribute value is 32 bits: 16 bits Reserved (Padding, MUST be set to zero), 8-bit Req field (request transmit count), and 8-bit Resp field (response transmit count). The padding exists to satisfy STUN''s 32-bit attribute boundary requirement.'
