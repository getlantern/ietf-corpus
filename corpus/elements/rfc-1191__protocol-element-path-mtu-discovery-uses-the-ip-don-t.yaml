document: rfc-1191
kind: protocol-element
summary: 'Path MTU Discovery uses the IP Don''t Fragment (DF) bit: a source host sets DF on all datagrams and initially assumes the PMTU equals the first-hop MTU. ICMP Destination Unreachable messages with Code 4 (''fragmentation needed and DF set''), called ''Datagram Too Big'' messages, signal that the current PMTU estimate is too high, causing the host to reduce it.'
section: "2"
topics:
