document: rfc-6786
kind: normative-requirement
summary: If Encryption-Encap AVPs are being sent from the PaC to the PAA and the sequence number is about to wrap, the PaC SHALL initiate PANA re-authentication. Similarly, if sending from PAA to PaC with a sequence number about to wrap, the PAA SHALL initiate re-authentication.
section: "4.1"
rfc2119_level: SHALL
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
