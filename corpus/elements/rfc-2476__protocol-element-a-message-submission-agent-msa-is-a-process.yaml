document: rfc-2476
kind: protocol-element
summary: A Message Submission Agent (MSA) is a process that accepts messages from MUAs on port 587 (or optionally port 25) and either delivers them or relays them to an MTA. It is distinct from an MTA, which accepts messages from MSAs or other MTAs.
section: "2.1"
topics:
