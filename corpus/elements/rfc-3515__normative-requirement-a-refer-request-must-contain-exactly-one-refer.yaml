document: rfc-3515
kind: normative-requirement
summary: A REFER request MUST contain exactly one Refer-To header field value. An agent responding to REFER MUST return a 400 (Bad Request) if the request contained zero or more than one Refer-To header field values.
section: 2.4.1
rfc2119_level: MUST
topics:
    - sip
    - realtime
