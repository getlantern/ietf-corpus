document: rfc-5453
kind: security-consideration
summary: By utilizing a reserved interface identifier, an IPv6 node might receive requests it is not authorized to receive. Information that creates or updates a registration in the reserved IID registry must be authenticated and authorized by IANA per RFC5226.
section: "5"
topics:
