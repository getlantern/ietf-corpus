document: rfc-7668
kind: security-consideration
summary: Bluetooth LE Link Layer provides encryption and authentication using Counter with CBC-MAC (CCM) with a 128-bit AES cipher. Key management is handled by the Security Manager Protocol (SMP). CCM overhead does not consume per-packet L2CAP data space.
