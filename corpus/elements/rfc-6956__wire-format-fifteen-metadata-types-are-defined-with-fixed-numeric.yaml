summary: 'Fifteen metadata types are defined with fixed numeric IDs: PHYPortID (1, uint32), SrcMAC (2, 6 bytes), DstMAC (3, 6 bytes), LogicalPortID (4, uint32), EtherType (5, uint16), VlanID (6, uint16), VlanPriority (7, uchar), NextHopIPv4Addr (8, 4 bytes), NextHopIPv6Addr (9, 16 bytes), HopSelector (10, uint32), ExceptionID (11), ValidateErrorID (12), L3PortID (13), RedirectIndex (14), MediaEncapInfoIndex (15, uint32).'
