document: rfc-6909
kind: normative-requirement
summary: The LMA MUST NOT make changes to the mobile node's offload policy during the middle of a mobility session as long as the MN remains attached to the same MAG. The Traffic Selector option delivered during initial signaling MUST be the same as the one delivered for lifetime extension from the same MAG.
section: "3.3"
rfc2119_level: MUST NOT
topics:
    - pcp
    - nat
    - mobility
