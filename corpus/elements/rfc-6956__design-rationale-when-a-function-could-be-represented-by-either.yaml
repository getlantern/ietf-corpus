document: rfc-6956
kind: design-rationale
summary: When a function could be represented by either one LFB or two or more LFBs at equal cost, the design choice is to use two or more LFBs to provide greater implementer flexibility. Additionally, LFBs should have minimal coupling with other LFBs to maximize independence.
section: 3.2.1
topics:
    - routing
