document: rfc-3995
kind: normative-requirement
summary: For Push Delivery Methods, a client MUST supply 'notify-recipient-uri' in the Subscription Creation Request. For Pull Delivery Methods, a client MUST supply 'notify-pull-method'. A client MUST NOT supply both attributes in the same Subscription Creation Request.
section: "5.3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
