document: rfc-7522
kind: design-rationale
summary: The format and processing rules for SAML Assertions in this specification are intentionally similar (though not identical) to those in the SAML Web Browser SSO profile, deliberately reusing well-established patterns to ease adoption for parties already familiar with SAML SSO deployments.
