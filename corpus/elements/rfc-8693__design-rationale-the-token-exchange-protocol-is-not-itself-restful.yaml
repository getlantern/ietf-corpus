kind: design-rationale
summary: The token exchange protocol is not itself RESTful because an STS doesn't lend itself well to a REST approach, but it does use communication patterns (HTTP POST, JSON) familiar to REST developers, avoiding the XML/SOAP complexity of WS-Trust.
