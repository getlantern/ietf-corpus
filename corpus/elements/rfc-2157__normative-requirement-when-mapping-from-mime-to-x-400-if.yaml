document: rfc-2157
kind: normative-requirement
summary: When mapping from MIME to X.400, if the IPMS.Body contains multiple body parts and the first IA5 body part starts with 'RFC-822-Headers:' as the first line, a gateway shall check the consistency and syntax of this body part to ensure the resulting message conforms to RFC 822.
section: "2.2"
rfc2119_level: REQUIRED
topics:
    - email
