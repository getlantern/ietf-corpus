summary: 'USM defines six read-only Counter32 statistics objects: usmStatsUnsupportedSecLevels, usmStatsNotInTimeWindows, usmStatsUnknownUserNames, usmStatsUnknownEngineIDs, usmStatsWrongDigests, and usmStatsDecryptionErrors. Each is incremented when the corresponding error causes a message to be dropped.'
