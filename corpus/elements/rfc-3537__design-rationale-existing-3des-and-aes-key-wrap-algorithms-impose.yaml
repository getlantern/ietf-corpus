document: rfc-3537
kind: design-rationale
summary: Existing 3DES and AES key wrap algorithms impose parity restrictions (for 3DES) and fixed key-size restrictions that make them unsuitable for wrapping variable-length HMAC keys. This document introduces a padding and length-prefix scheme to handle arbitrary HMAC key lengths, deviating from the standard CEK wrap approach.
section: "1"
topics:
