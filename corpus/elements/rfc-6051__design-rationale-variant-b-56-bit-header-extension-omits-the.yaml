document: rfc-6051
kind: design-rationale
summary: Variant B/56-bit header extension omits the upper 8 bits of NTP Seconds (which change only every ~256 seconds) to save 1 byte per packet compared to Variant A/64-bit, at the cost of requiring RTCP SR reception to reconstruct the full timestamp. This is a bandwidth/completeness trade-off for high-rate flows.
section: "3.3"
topics:
    - rtp
    - realtime
