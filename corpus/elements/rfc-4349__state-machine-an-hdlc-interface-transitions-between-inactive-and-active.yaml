kind: state-machine
summary: An HDLC interface transitions between INACTIVE and ACTIVE states. Provisioning triggers optional session initiation; the interface becoming ACTIVE triggers ICRQ (or SLI if session already exists). Unprovisioning triggers CDN and session teardown.
