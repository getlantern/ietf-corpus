document: rfc-8841
kind: design-rationale
summary: TCP/DTLS/SCTP forces ordered and reliable delivery of SCTP packets due to TCP's characteristics, limiting the utility of SCTP's unordered or unreliable delivery options. It is therefore RECOMMENDED to use TCP/DTLS/SCTP only when UDP traffic is blocked.
