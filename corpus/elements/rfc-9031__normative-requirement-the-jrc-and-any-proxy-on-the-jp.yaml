document: rfc-9031
kind: normative-requirement
summary: The JRC and any proxy on the JP-JRC path MUST support extended CoAP token lengths per RFC 8974. When the JP operates statelessly, the CoAP message type it forwards on behalf of the pledge MUST be non-confirmable (NON) regardless of the message type received from the pledge.
section: "7.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
