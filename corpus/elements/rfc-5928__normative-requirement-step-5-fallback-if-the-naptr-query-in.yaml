document: rfc-5928
kind: normative-requirement
summary: 'Step 5 (fallback): If the NAPTR query in Step 4 returns no result, the RFC 2782 SRV algorithm is applied for each transport in the filtered supported-transport list using ''turn''/''turns'' as Service. If no tuples are reachable, the resolution MUST stop with an error.'
section: "3"
rfc2119_level: MUST
