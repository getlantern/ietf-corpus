document: rfc-1534
kind: normative-requirement
summary: A DHCP client MAY use a reply from a BOOTP server if the configuration returned is acceptable. The DHCP client MUST assume that an IP address returned in a message from a BOOTP server has an infinite lease.
section: "3"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
