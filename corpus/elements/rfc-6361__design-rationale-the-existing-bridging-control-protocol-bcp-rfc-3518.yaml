document: rfc-6361
kind: design-rationale
summary: The existing Bridging Control Protocol (BCP, RFC 3518) allows direct bridging of Ethernet frames over PPP but is inefficient and inadequate for TRILL. A dedicated set of protocol numbers enables TRILL to be optimized for use over PPP links.
section: "1"
topics:
