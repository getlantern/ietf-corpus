document: rfc-6384
kind: normative-requirement
summary: In language negotiation, if a language is negotiated, text transmitted by the client or the server MUST be assumed to be encoded in UTF-8. An ALG that implements the first or second option MUST translate and/or forward commands and responses containing UTF-8-encoded text.
section: "5.1"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
