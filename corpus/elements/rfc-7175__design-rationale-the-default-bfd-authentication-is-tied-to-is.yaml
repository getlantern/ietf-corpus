document: rfc-7175
kind: design-rationale
summary: The default BFD authentication is tied to IS-IS shared secret state to minimize configuration burden, consistent with TRILL's goal of operating with minimum configuration. Port and System IDs are included in the key derivation input to minimize reuse of the same key and improve resistance to cryptanalysis.
