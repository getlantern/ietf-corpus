document: rfc-9014
kind: normative-requirement
summary: Within the same MAC-VRF, a GW is not allowed to simultaneously have both an EVPN binding and a PW to the same far-end PE. If both can be established, the EVPN binding prevails and the PW MUST be brought down operationally.
section: 4.2.1
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
