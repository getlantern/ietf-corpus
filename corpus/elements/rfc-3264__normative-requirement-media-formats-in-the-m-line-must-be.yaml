document: rfc-3264
kind: normative-requirement
summary: Media formats in the m= line MUST be listed in order of preference, with the first format being most preferred. The recipient of the offer SHOULD use the format with the highest preference that is acceptable to it.
section: "5.1"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
