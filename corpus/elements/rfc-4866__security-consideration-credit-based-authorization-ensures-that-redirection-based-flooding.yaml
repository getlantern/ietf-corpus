document: rfc-4866
kind: security-consideration
summary: Credit-Based Authorization ensures that redirection-based flooding via UNVERIFIED care-of addresses cannot exceed the rate of direct flooding, because the correspondent node's credit is bounded by the actual traffic received from the mobile node. Credit aging prevents slow, long-term credit accumulation followed by a burst attack.
section: "6.3"
topics:
    - security
    - mobility
