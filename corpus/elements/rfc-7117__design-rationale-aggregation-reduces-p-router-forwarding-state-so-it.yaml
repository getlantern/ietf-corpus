document: rfc-7117
kind: design-rationale
summary: Aggregation reduces P-router forwarding state so it grows as (AveVPLS / Aggr) × (NPE / AvePTree) rather than linearly with the number of VPLS instances. The Aggregation Factor (Aggr) is the number of VPLS instances sharing a single P-multicast tree.
section: "3.5"
topics:
