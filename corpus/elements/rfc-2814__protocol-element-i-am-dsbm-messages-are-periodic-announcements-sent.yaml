document: rfc-2814
kind: protocol-element
summary: I_AM_DSBM messages are periodic announcements sent by the active DSBM. DSBM clients use these to detect and verify DSBM presence on an attached segment; non-DSBM SBMs monitor them to detect DSBM failure and trigger re-election.
section: "5.5"
topics:
