kind: protocol-element
summary: New datastore resources are defined at the path {+restconf}/ds/<datastore>, where <datastore> is a namespace-qualified identityref derived from the 'datastore' identity in 'ietf-datastores'. Defined resources include operational, running, and intended configuration datastores.
