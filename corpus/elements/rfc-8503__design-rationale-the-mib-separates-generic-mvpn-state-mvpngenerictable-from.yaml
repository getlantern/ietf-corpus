document: rfc-8503
kind: design-rationale
summary: The MIB separates generic MVPN state (mvpnGenericTable) from BGP-MVPN-specific state (mvpnBgpTable) because the two C-multicast signaling methods (PIM-MVPN and BGP-MVPN) share most managed objects but differ in BGP-specific parameters such as extended communities, route advertisement throttles, and inter-site C-tree mode.
