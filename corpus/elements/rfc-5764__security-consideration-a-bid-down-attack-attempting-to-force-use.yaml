document: rfc-5764
kind: security-consideration
summary: A bid-down attack attempting to force use of plain DTLS instead of SRTP is automatically detected because use_srtp negotiation is covered by the DTLS Finished messages. The attack degrades to a denial-of-service rather than an undetected downgrade.
section: "7.1"
topics:
    - tls
    - rtp
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
