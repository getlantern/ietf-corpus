document: rfc-5939
kind: interoperability-note
summary: Entities that do not support the SDP Capability Negotiation framework will ignore the new attributes ('a=csup', 'a=creq', 'a=acap', 'a=tcap', 'a=pcfg', 'a=acfg') and perform standard RFC 3264 offer/answer using only the actual configuration in the 'm=' line. This ensures introduction of the framework does not cause session failures with legacy endpoints.
section: "3.2"
topics:
    - realtime
