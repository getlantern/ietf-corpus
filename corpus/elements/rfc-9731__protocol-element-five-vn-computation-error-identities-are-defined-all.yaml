document: rfc-9731
kind: protocol-element
summary: 'Five VN computation error identities are defined, all based on ''vn-computation-error-reason'': vn-computation-error-not-ready, vn-computation-error-no-cnc, vn-computation-error-no-resource, vn-computation-error-path-not-found, and vn-computation-ap-unknown. These are used as the ''error-reason'' identityref in the vn-compute RPC output.'
