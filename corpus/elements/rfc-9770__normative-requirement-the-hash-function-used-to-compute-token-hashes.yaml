document: rfc-9770
kind: normative-requirement
summary: The hash function used to compute token hashes MUST be collision resistant on byte strings and MUST be selected from the Named Information Hash Algorithm Registry. SHA-256 is mandatory to implement, consistent with RFC 6920 Section 2.
section: "4.4"
rfc2119_level: MUST
topics:
    - crypto
    - security
