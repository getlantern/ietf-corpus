document: rfc-4567
kind: normative-requirement
summary: When creating an initial SDP offer, the key management protocol identifier MUST be placed in the prtcl-id field, and the keymgmt-data field MUST be created by the key management protocol, base64 encoded, and encapsulated in the attribute.
