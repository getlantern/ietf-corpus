document: rfc-8020
kind: design-rationale
summary: The SOA record owner name returned in an NXDOMAIN response cannot be used to infer the NXDOMAIN cut boundary, because the SOA indicates the zone apex rather than the closest existing domain name. Using it would be incorrect.
section: A
