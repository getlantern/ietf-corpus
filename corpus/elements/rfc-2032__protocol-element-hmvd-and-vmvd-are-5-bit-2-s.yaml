document: rfc-2032
kind: protocol-element
summary: HMVD and VMVD are 5-bit 2's complement fields encoding the reference horizontal and vertical motion vector data. The value '10000' (−16) is forbidden; valid motion vector fields range from +/−15. Set to 0 when V=0, at a GOB header, or when the last MB's MTYPE was not motion-compensated.
section: "4.1"
topics:
    - rtp
    - realtime
