document: rfc-6794
kind: normative-requirement
summary: A UA MUST disclose the session description(s) to policy servers through the policy channel and MUST apply received session policies to the offer and answer before use. If policies are unacceptable, the UA MUST NOT continue with the session.
section: 4.5.3
rfc2119_level: MUST
topics:
    - sip
