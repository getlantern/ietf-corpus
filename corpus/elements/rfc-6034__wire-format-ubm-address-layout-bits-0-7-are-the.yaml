document: rfc-6034
kind: wire-format
summary: 'UBM address layout: bits 0–7 are the fixed value 234; bits 8 through N carry the unicast prefix of the organization; bits N+1 through 31 carry the Group ID assigned by the organization. Total address length is 32 bits (standard IPv4).'
