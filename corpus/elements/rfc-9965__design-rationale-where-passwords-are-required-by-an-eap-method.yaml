document: rfc-9965
kind: design-rationale
summary: Where passwords are required by an EAP method (e.g., EAP-MSCHAPv2, EAP-pwd, EAP-TTLS inner methods), the password SHOULD be the same as the provisioning identifier, since there are few reasons to define a separate method-specific password for a well-known public identity.
section: "4"
topics:
    - security
