document: rfc-9246
kind: normative-requirement
summary: Prior to URI comparison, the signed JWT MUST be removed from the URI and the URI MUST be normalized per RFC 7230 Section 2.7.3 and RFC 3986 Sections 6.2.2 and 6.2.3. Percent-encoded form per RFC 3986 Section 2.1 MUST be used when comparing URIs.
section: 2.1.15
rfc2119_level: MUST
topics:
    - jose
    - http
