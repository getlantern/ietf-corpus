document: rfc-6512
kind: security-consideration
summary: Unauthorized modification of the Recursive or VPN-Recursive FEC elements can disrupt MP LSP creation or cause multipoint LSPs to traverse unintended network segments, potentially enabling illegitimate insertion or interception of multicast traffic. The document notes these FEC elements are not inherently more vulnerable than previously defined FEC elements, so no new security vulnerabilities are introduced beyond those in RFC 5036 (LDP) and RFC 6388 (mLDP).
section: "5"
topics:
