document: rfc-8006
kind: normative-requirement
summary: If a dCDN cannot retrieve the complete set of CDNI Metadata for a User Agent request, or the metadata is stale and cannot be revalidated (e.g., uCDN unreachable or returning 4xx/5xx), the dCDN MUST NOT serve the requested content.
section: "6.2"
rfc2119_level: MUST NOT
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
