document: rfc-9624
kind: protocol-element
summary: IMET (Inclusive Multicast Ethernet Tag) A-D routes carry a PMSI Tunnel Attribute (PTA) to identify the provider tunnel for BUM flows in a BD. The same PTA structure defined in RFC 6514 and extended by RFC 8556 for BIER is reused for EVPN.
