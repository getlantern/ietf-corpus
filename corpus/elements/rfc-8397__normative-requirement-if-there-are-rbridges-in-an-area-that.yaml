document: rfc-8397
kind: normative-requirement
summary: If there are RBridges in an area that do not understand the NickBlockFlags APPsub-TLV, border RBridges of the area MUST also use the traditional Nickname Sub-TLV (RFC 7176) to announce those nicknames covered by NickBlockFlags blocks with OK=0.
section: "4.4"
rfc2119_level: MUST
topics:
    - routing
