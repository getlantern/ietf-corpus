document: rfc-7222
kind: normative-requirement
summary: When the LMA accepts a MAG-initiated QoS Service Request, it assigns a SR-ID to each accepted request and copies all QoS option instances from the PBU into the PBA with OC set to RESPONSE; if only partial support is possible, unacceptable QoS options are omitted and acceptable ones carry OC set to NEGOTIATE with SR-ID reset to (0).
section: "5.1"
rfc2119_level: REQUIRED
topics:
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
