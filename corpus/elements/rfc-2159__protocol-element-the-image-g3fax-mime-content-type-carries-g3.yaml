document: rfc-2159
kind: protocol-element
summary: 'The image/g3fax MIME content-type carries G3 Facsimile byte streams. It encodes three pieces of information: a set of flags indicating the coding scheme (carried as MIME content-type parameters), a page-break structure using T.4 ''return to command mode'' strings, and per-page T.4 bit image data with the highest bit of the first byte being the first bit of the T.4 bitstream.'
section: "2"
