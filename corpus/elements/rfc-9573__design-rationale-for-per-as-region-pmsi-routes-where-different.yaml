document: rfc-9573
kind: design-rationale
summary: For per-AS/region PMSI routes where different ASBRs/RBRs for the same source AS/region advertise the same route, using a common label requires coordination; the simpler approach is for each ASBR/RBR to allocate from its own assigned label block, avoiding the coordination requirement.
section: 3.2.2
topics:
    - mpls
    - routing
