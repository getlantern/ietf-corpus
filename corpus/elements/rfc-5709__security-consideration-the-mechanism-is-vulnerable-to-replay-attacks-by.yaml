document: rfc-5709
kind: security-consideration
summary: The mechanism is vulnerable to replay attacks by any on-link node. An attacker could record a legitimate OSPF packet and replay it when the sequence number is again valid, causing significant routing disruptions within the OSPF domain.
section: "4"
topics:
