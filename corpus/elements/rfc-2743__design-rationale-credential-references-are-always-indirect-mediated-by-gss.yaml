document: rfc-2743
kind: design-rationale
summary: Credential references are always indirect, mediated by GSS-API implementations via cred_handles, never requiring callers to access credential elements directly. This isolates callers from mechanism-specific credential formats and enables the GSS-API implementation to enforce access controls on behalf of the underlying security mechanisms.
section: 1.1.1.1
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
