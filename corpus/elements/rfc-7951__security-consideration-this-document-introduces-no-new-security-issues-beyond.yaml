document: rfc-7951
kind: security-consideration
summary: This document introduces no new security issues beyond those in RFC 7950 Section 17. No signing or encryption mechanisms are defined; data security relies on the management protocol (NETCONF, RESTCONF), or external mechanisms such as PKCS#7 or JOSE if the protocol does not provide it.
