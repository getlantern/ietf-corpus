summary: The Padding field (0–255 bytes) ensures that (a) the plaintext is a multiple of the encryption algorithm's block size and (b) the ICV field is aligned on a 4-byte boundary. When no algorithm-specific padding content is required, bytes are filled with the monotonically increasing sequence 1, 2, 3, …
