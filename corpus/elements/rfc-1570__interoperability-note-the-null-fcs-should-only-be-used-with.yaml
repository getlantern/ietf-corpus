document: rfc-1570
kind: interoperability-note
summary: The Null FCS SHOULD only be used with network-layer and transport protocols that have an end-to-end checksum available (e.g., TCP/IP, or UDP/IP with checksum enabled). In a heterogeneous environment, Null FCS SHOULD be negotiated together with a non-null FCS option.
section: 2.1.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
