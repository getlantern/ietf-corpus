document: rfc-5810
kind: protocol-element
summary: 'The heartbeat mechanism is traffic-sensitive: an HB message is sent only when no PL traffic has been exchanged within a configured interval. The CE may request a response from the FE in an HB; the FE generates HBs only when explicitly configured to do so by the CE via the FE Protocol LFB.'
section: 4.3.3
topics:
    - routing
