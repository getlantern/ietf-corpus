document: rfc-3986
kind: protocol-element
summary: 'Base URI is established in order of precedence: (1) embedded in content, (2) from the encapsulating entity, (3) from the retrieval URI (the last URI after redirects), (4) application-defined default. A base URI must conform to the absolute-URI syntax rule.'
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
