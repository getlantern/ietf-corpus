document: rfc-7317
kind: security-consideration
summary: The RADIUS shared-secret leaf is marked nacm:default-deny-all to prevent unauthorized read access via NETCONF get or get-config operations, since exposure of the shared secret would compromise the entire RADIUS authentication channel.
