summary: mplsL3VpnVrfRteTable indexes route entries by VRF name, destination address type, destination, prefix length, policy OID, next-hop type, and next-hop address. Implementers must ensure OIDs of column instances do not exceed 128 sub-identifiers to maintain SNMPv1/v2c/v3 accessibility.
