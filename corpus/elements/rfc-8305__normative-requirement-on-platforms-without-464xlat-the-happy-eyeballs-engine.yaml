document: rfc-8305
kind: normative-requirement
summary: On platforms without 464XLAT, the Happy Eyeballs engine SHOULD follow the NAT64/DNS64 recommendations in Section 7. These features SHOULD only be enabled when the host detects an IPv6-only network with NAT64 (routable IPv6, no routable IPv4, DNS resolver available).
section: "7"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
