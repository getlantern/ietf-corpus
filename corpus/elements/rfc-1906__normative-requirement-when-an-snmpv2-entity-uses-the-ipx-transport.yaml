document: rfc-1906
kind: normative-requirement
summary: When an SNMPv2 entity uses the IPX transport mapping, it MUST be capable of accepting messages of at least 546 octets in size (larger than the 484-octet minimum for UDP/OSI/DDP mappings).
section: "6.2"
rfc2119_level: MUST
