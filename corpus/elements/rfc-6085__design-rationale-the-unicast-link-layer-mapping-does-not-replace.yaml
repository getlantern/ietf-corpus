document: rfc-6085
kind: design-rationale
summary: The unicast link-layer mapping does not replace the multicast mapping described in RFC 2464 Section 7; it is an additional permitted mapping. The determination of the unicast Ethernet link-layer address and construction of the outgoing IPv6 packet are explicitly left out of scope.
section: "1"
topics:
