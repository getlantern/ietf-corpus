kind: design-rationale
summary: The tedLocalIfAddrTable, tedRemoteIfAddrTable, tedSwCapTable, and tedSrlgTable are defined as separate tables (rather than columns in tedTable) because their corresponding sub-TLVs may appear multiple times within the same Link-TLV, requiring a one-to-many relationship.
