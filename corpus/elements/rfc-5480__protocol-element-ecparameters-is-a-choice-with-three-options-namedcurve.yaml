document: rfc-5480
kind: protocol-element
summary: 'ECParameters is a CHOICE with three options: namedCurve (OBJECT IDENTIFIER naming a well-known curve), implicitCurve (NULL, inherited), and specifiedCurve (SpecifiedECDomain). Only namedCurve is permitted in PKIX; implicitCurve and specifiedCurve MUST NOT be used.'
section: 2.1.1
topics:
