document: rfc-6772
kind: design-rationale
summary: An extension mechanism (the Location Profile Registry) is defined rather than mandating a single obfuscation algorithm, because no single algorithm suits all application domains. The registry with Specification Required policy allows future algorithms to be added as requirements evolve.
section: "1"
