document: rfc-7303
kind: design-rationale
summary: The '+xml' suffix convention is preferred over leaving XML-based types opaque because generic XML processing—by browsers, editors, and search engines—is useful in many situations that are difficult to predict ahead of time. Types wishing to remain opaque may deliberately omit the '+xml' suffix.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
