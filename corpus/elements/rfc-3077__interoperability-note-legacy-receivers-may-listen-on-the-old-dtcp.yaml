document: rfc-3077
kind: interoperability-note
summary: Legacy receivers may listen on the old DTCP announcement address 224.0.1.124. Feeds SHOULD support dual announcement to both old and new addresses during transition. Old feeds MUST be updated to support the new announcement address.
section: Appendix B
topics:
