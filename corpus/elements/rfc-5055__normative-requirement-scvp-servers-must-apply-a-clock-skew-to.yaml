document: rfc-5055
kind: normative-requirement
summary: SCVP servers MUST apply a clock skew to the validation time to allow for minor time synchronization errors; the default clock skew value is 10 minutes. If a server uses a non-default value, it MUST include the clock skew in the validation policy response.
section: 3.2.7
rfc2119_level: MUST
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
