summary: 'The pwCepType object specifies the CEP sub-type: ''spe''(1) for SONET STS-Nc signals, ''vt''(2) for SONET VT-x signals, or ''fracSpe''(3) for fractional STS-1/VC-3/VC-4. Support for ''vt'' and ''fracSpe'' modes is optional.'
