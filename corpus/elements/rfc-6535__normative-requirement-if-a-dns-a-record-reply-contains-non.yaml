document: rfc-6535
kind: normative-requirement
summary: If a DNS A record reply contains non-excluded real IPv4 addresses, the ENR MUST NOT synthesize IPv4 addresses; synthesis only occurs when the A query returns no usable real IPv4 result.
section: "2.3"
rfc2119_level: MUST NOT
topics:
