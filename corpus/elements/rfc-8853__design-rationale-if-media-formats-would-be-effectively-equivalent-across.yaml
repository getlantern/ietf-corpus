document: rfc-8853
kind: design-rationale
summary: If media formats would be effectively equivalent across simulcast streams, RTP duplication (RFC 7104) is RECOMMENDED instead of simulcast, to avoid implementation complexity. Simulcast is intended for meaningfully different encoded versions of the same media source.
section: "5.2"
topics:
    - realtime
    - rtp
