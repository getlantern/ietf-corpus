document: rfc-8931
kind: normative-requirement
summary: The ARQ process MUST be protected by a Retransmission Timeout (RTO) timer, with the fragment carrying the 'X' flag retried upon timeout for a configurable number of times (default MaxFragRetries=3, RECOMMENDED) with exponential backoff.
section: "6"
rfc2119_level: MUST
topics:
