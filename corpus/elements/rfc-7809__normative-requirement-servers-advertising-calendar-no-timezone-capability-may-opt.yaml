document: rfc-7809
kind: normative-requirement
summary: Servers advertising 'calendar-no-timezone' capability MAY opt to not send standard VTIMEZONE components in the absence of a 'CalDAV-Timezones' request header field. Servers that do so MUST provide an administrator configuration setting to override this default behavior based on client User-Agent values.
section: 3.1.3
rfc2119_level: MAY
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
