document: rfc-5059
kind: wire-format
summary: 'The Bootstrap message format includes: a 2-byte Fragment Tag, 1-byte Hash Mask Len, 1-byte BSR Priority, a variable-length BSR Address in Encoded-Unicast format, followed by repeating Group Address (Encoded-Group), RP Count (1 byte), Frag RP Cnt (1 byte), and per-RP records each containing an Encoded-Unicast RP Address, 2-byte Holdtime, 1-byte Priority, and 1 reserved byte.'
section: "4.1"
topics:
    - multicast
    - routing
