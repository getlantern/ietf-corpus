summary: 'The module ietf-igmp-mld augments the ietf-routing module''s control-plane-protocol data node with separate ''igmp'' and ''mld'' containers, each structured as a three-level hierarchy: global, interface-global, and interface levels. Interface-level values override interface-global-level values for the same configuration node.'
