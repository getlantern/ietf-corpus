document: rfc-1850
kind: interoperability-note
summary: ospfAreaRangeTable is marked obsolete and replaced by ospfAreaAggregateTable, which adds ospfAreaAggregateLsdbType and ospfAreaAggregateMask indexes to accommodate NSSA aggregates and more precisely express address ranges. Implementations should migrate to the new table.
