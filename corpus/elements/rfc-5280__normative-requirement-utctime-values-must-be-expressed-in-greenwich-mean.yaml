document: rfc-5280
kind: normative-requirement
summary: UTCTime values MUST be expressed in Greenwich Mean Time (Zulu) and MUST include seconds in the format YYMMDDHHMMSSZ. Years 50–99 SHALL be interpreted as 19YY; years 00–49 SHALL be interpreted as 20YY.
section: 4.1.2.5.1
rfc2119_level: MUST
