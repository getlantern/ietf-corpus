document: rfc-9768
kind: normative-requirement
summary: A Data Receiver MUST increment the CE packet counter (r.cep) for every Acceptable packet received with CE in the IP-ECN field, including CE-marked control packets and retransmissions, but excluding CE on SYN packets (SYN=1; ACK=0).
section: "3.2"
rfc2119_level: MUST
topics:
    - tcp
    - congestion
    - ecn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
