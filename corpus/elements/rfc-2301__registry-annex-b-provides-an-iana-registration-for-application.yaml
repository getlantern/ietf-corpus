document: rfc-2301
kind: registry
summary: Annex B provides an IANA registration for Application parameter values used with the image/tiff MIME content type for facsimile applications (as referenced in Section 9). The Application parameter identifies the TIFF-FX profile or class of fax content to enable capability negotiation over Internet fax.
