document: rfc-6528
kind: design-rationale
summary: The secret key should be rotated on system bootstrap, after a predefined/random time interval, or after sufficient uses; after rotation, either dead-connection state must be kept or a quiet time of two MSLs must be observed to avoid breaking the 4.4BSD incarnation heuristics.
section: "3"
topics:
