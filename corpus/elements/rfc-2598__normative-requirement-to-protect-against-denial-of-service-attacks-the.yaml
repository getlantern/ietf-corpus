document: rfc-2598
kind: normative-requirement
summary: To protect against denial of service attacks, the edge of a DS domain MUST strictly police all EF marked packets to a rate negotiated with the adjacent upstream domain (which must be <= the EF PHB configured rate). Packets in excess of the negotiated rate MUST be dropped.
section: "3"
rfc2119_level: MUST
topics:
    - diffserv
    - security
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
