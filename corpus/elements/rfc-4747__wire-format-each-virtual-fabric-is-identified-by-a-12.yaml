document: rfc-4747
kind: wire-format
summary: Each Virtual Fabric is identified by a 12-bit Virtual Fabric ID (VF_ID). Frames from multiple Virtual Fabrics share a physical link via a Virtual Fabric Tagging Header (VFT_Header) that carries the VF_ID to identify the frame's Virtual Fabric membership.
