document: rfc-5790
kind: state-machine
summary: In LW-IGMPv3, when a source timer expires, the corresponding source record is deleted immediately, regardless of the group timer state. This contrasts with full IGMPv3 where an expired source timer under EXCLUDE filter-mode keeps the record until the group timer expires.
section: "5.1"
topics:
    - multicast
    - routing
