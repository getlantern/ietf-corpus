document: rfc-3977
kind: design-rationale
summary: The WILDMAT format deliberately excludes backslash (escape) and bracket (character class) syntax despite common use in other pattern matchers. Interpretation of these characters in UTF-8 strings is complex and differs across existing implementations, so they were omitted to avoid ambiguity.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
