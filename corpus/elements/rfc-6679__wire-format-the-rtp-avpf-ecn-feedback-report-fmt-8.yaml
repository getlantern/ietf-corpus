kind: wire-format
summary: 'The RTP/AVPF ECN Feedback Report (FMT=8, PT=205) contains six fields: a 32-bit Extended Highest Sequence Number, 32-bit ECT(0) Counter, 32-bit ECT(1) Counter, 16-bit ECN-CE Counter, 16-bit not-ECT Counter, 16-bit Lost Packets Counter, and 16-bit Duplication Counter; all counters are cumulative and initialized to 0.'
