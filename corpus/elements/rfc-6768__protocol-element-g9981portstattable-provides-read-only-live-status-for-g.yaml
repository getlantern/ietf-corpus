document: rfc-6768
kind: protocol-element
summary: 'g9981PortStatTable provides read-only live status for G.Bond/ATM ports with four Counter32/Unsigned32 objects: g9981PortStatRxLostCells (ATM cells lost in receive direction), g9981PortStatTxLostCells (peer-detected cells lost in transmit direction, GBS-C only), g9981PortStatMaxUpDiffDelay, and g9981PortStatMaxDnDiffDelay (both in units of 0.1 ms). This table is NOT persistent.'
section: "6"
