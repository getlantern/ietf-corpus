document: rfc-4805
kind: interoperability-note
summary: DS1, J1, E1, DS2, and E2 interfaces all use ifType ds1(18); ifTypes e1(19) and g703at2mb(67) have been obsoleted. No separate J1 ifType exists. DS2 and E2 are distinguished from DS1/E1 by ifSpeed or dsx1LineType, not by a distinct ifType value.
