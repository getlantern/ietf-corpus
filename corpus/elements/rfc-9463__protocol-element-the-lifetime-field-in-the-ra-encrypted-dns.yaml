document: rfc-9463
kind: protocol-element
summary: The Lifetime field in the RA Encrypted DNS option is a 32-bit unsigned integer in seconds representing the validity period of the discovered ADN. The default SHOULD be at least 3 * MaxRtrAdvInterval. A value of 0xffffffff means infinity; a value of zero means the ADN MUST no longer be used.
section: "6.1"
topics:
    - dns
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
