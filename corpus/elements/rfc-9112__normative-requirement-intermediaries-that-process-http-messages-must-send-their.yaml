document: rfc-9112
kind: normative-requirement
summary: Intermediaries that process HTTP messages MUST send their own HTTP-version in forwarded messages, unless purposefully downgraded as a workaround for an upstream issue. Blindly forwarding the start-line version can cause communication errors with downstream recipients.
section: "2.3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
