document: rfc-1730
kind: interoperability-note
summary: IMAP4 is designed to be upward compatible from IMAP2. Obsolete IMAP2 commands (FIND ALL.MAILBOXES, FIND MAILBOXES, SUBSCRIBE MAILBOX, UNSUBSCRIBE MAILBOX) and responses (MAILBOX, COPY, STORE) are preserved in appendices for backward compatibility with IMAP2 clients.
section: A
