document: rfc-5170
kind: security-consideration
summary: Content corruption attacks can be mitigated at the object level via digital signatures (e.g., RSASSA-PKCS1-v1_5) or at the packet level via per-packet digital signatures, Group MAC (HMAC-SHA-1 with shared key), or TESLA. It is RECOMMENDED that at least one of these techniques be used when object corruption is a concern.
section: 8.2.2
rfc2119_level: RECOMMENDED
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
