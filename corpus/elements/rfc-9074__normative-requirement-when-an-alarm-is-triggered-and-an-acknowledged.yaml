document: rfc-9074
kind: normative-requirement
summary: When an alarm is triggered and an ACKNOWLEDGED property is present with a value greater than or equal to the computed trigger time, the client SHOULD NOT trigger the alarm. If an alert has already been presented, clients SHOULD dismiss or cancel it when the ACKNOWLEDGED value becomes greater than or equal to the trigger time.
section: "6.1"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
