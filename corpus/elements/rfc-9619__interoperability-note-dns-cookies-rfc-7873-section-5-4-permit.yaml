document: rfc-9619
kind: interoperability-note
summary: DNS Cookies (RFC 7873, Section 5.4) permit a client to receive a valid Server Cookie by sending OPCODE = 0 with QDCOUNT = 0 and no question; the response also contains no question. This is a defined, valid use of QDCOUNT = 0.
section: A.1
topics:
    - dns
