document: rfc-9516
kind: normative-requirement
summary: When Reply Mode is 'Reply via Specified Path' (4) but no Reply Service Function Path TLV is present, the responding SFF MUST send an Echo Reply with Return Code 6. If the requested SFP cannot be found, it MUST send Return Code 7 and include the original Reply Service Function Path TLV.
section: 6.5.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
