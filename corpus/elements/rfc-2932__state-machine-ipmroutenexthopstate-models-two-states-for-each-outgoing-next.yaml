summary: 'ipMRouteNextHopState models two states for each outgoing next-hop: forwarding(2) indicates the interface is actively forwarding datagrams; pruned(1) indicates it is not. When in pruned(1), ipMRouteNextHopExpiryTime reflects the remaining time until the prune expires and state reverts to forwarding(2).'
