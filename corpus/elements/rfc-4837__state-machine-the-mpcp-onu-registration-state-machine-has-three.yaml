document: rfc-4837
kind: state-machine
summary: 'The MPCP ONU registration state machine has three states: unregistered → registering (on receipt of Discovery GATE) → registered (after REGISTER message assigns LLID and REGISTER_ACK is exchanged). A random backoff mechanism handles collision among multiple ONUs attempting registration simultaneously.'
