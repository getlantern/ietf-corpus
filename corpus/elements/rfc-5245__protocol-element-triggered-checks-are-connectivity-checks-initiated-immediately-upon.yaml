document: rfc-5245
kind: protocol-element
summary: Triggered checks are connectivity checks initiated immediately upon receiving a STUN Binding request from a peer on a candidate pair, rather than waiting for the periodic timer. They accelerate convergence by allowing both directions to be verified quickly and are enqueued at the head of the triggered check queue.
section: 7.2.1.4
topics:
