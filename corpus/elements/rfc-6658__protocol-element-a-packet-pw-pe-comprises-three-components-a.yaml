document: rfc-6658
kind: protocol-element
summary: 'A packet PW PE comprises three components: a client LSR, a PW processor, and a server LSR. The client LSR encapsulates client packets in an Ethernet header (Ethertype set to the client protocol type, e.g., MPLS), and passes the result to the PW instance, which then processes it as an Ethernet PW per RFC 4448.'
section: "4"
topics:
