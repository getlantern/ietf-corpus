document: rfc-6048
kind: normative-requirement
summary: 'In a LIST MODERATORS submission template, the case-sensitive string ''%s'' MUST occur zero or one time; a literal ''%'' MUST be written as ''%%''; and ''%'' MUST NOT appear except as ''%s'' or ''%%''. The order of lines is significant: the first matching line is used.'
section: 2.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
