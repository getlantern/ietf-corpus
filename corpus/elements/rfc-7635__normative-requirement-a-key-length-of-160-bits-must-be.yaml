document: rfc-7635
kind: normative-requirement
summary: A key_length of 160 bits MUST be supported for the mac_key field within the token's encrypted_block, enabling use with HMAC-SHA-1 for STUN message integrity and supporting the hash agility plan in RFC 5389 Section 16.3.
section: "6.2"
rfc2119_level: MUST
topics:
