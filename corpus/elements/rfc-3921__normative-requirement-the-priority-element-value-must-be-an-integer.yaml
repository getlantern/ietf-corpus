document: rfc-3921
kind: normative-requirement
summary: The <priority/> element value MUST be an integer between -128 and +127. A presence stanza MUST NOT contain more than one <priority/> element; if absent, a server SHOULD treat the priority as zero.
section: 2.2.2.3
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
