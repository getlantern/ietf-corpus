document: rfc-7521
kind: design-rationale
summary: Client assertion authentication is orthogonal to and separable from using assertions as an authorization grant; they may be combined or used independently. Whether client authentication is required alongside an assertion authorization grant is a policy decision left to the authorization server.
section: "1"
topics:
