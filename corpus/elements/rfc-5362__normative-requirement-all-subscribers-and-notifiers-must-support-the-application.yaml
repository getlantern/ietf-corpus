document: rfc-5362
kind: normative-requirement
summary: All subscribers and notifiers MUST support the 'application/resource-lists+xml' data format (RFC 4826) and its extension to carry consent-related state information. If the SUBSCRIBE request's Accept header field is present, it MUST include 'application/resource-lists+xml'.
section: 5.1.4
rfc2119_level: MUST
topics:
    - sip
    - realtime
