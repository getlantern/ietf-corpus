document: rfc-9854
kind: wire-format
summary: 'The RREP option (Type 0x0C) contains: Option Type (8-bit), Option Length (8-bit), G/H/X flags (3 bits), Compr (4 bits), L (2 bits), RankLimit (8 bits), Delta (6 bits), 2 reserved bits, and an optional variable-length Address Vector (H=0 only). For symmetric routes the Address Vector is copied unchanged from the arriving RREQ-DIO; for asymmetric routes it records the RREP-DIO path.'
section: "4.2"
topics:
    - routing
