document: rfc-1288
kind: normative-requirement
summary: A {C} (null command line) query is a request for a list of all online users. An RUIP MUST either answer or actively refuse. If it answers, it MUST provide at least the user's full name.
section: 2.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
