document: rfc-6797
kind: normative-requirement
summary: When connecting to a Known HSTS Host, the UA MUST terminate the connection if there are any errors or warnings with the underlying secure transport, including certificate validity errors (CRL, OCSP) and TLS server identity checking failures. No user recourse is permitted.
section: "8.4"
rfc2119_level: MUST
topics:
    - tls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
