document: rfc-9833
kind: protocol-element
summary: Layer 2 encapsulation groupings cover dot1q (tag-type + cvlan-id uint16 range 1..4094), priority-tagged (tag-type only), and qinq (tag-type + svlan-id + cvlan-id, both uint16 range 1..4094). These are used to represent VLAN tagging schemes on AC bearers.
