document: rfc-8804
kind: protocol-element
summary: 'The HttpTarget object specifies the target Location URI for HTTP redirection and consists of: ''host'' (mandatory, hostname/IP with optional port), ''scheme'' (optional, MUST be ''http'' or ''https''), ''path-prefix'' (optional, MUST end with trailing slash), and ''include-redirecting-host'' (optional boolean, default false).'
section: "2.5"
