document: rfc-8581
kind: normative-requirement
summary: When there is an existing reporting-node peer-report OCS entry, the reporting node MUST include an OC-OLR AVP with report type PEER-REPORT in all answer messages sent to peers that support OC_PEER_REPORT, and MUST include its DiameterIdentity in the SourceID AVP.
section: 6.2.4
rfc2119_level: MUST
