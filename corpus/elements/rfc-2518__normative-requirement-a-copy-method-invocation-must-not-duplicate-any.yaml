document: rfc-2518
kind: normative-requirement
summary: A COPY method invocation MUST NOT duplicate any write locks active on the source. A successful MOVE request on a write locked resource MUST NOT move the write lock with the resource.
section: "7.7"
rfc2119_level: MUST
topics:
