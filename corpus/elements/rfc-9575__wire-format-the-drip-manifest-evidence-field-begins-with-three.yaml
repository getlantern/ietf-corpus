summary: The DRIP Manifest Evidence field begins with three mandatory 8-octet hashes (Previous Manifest Hash, Current Manifest Hash, and DRIP Link BE:HDA,UA Hash) followed by up to 11 ASTM Message Hashes of 8 octets each. A maximum of 10 ASTM Message Hashes is RECOMMENDED.
