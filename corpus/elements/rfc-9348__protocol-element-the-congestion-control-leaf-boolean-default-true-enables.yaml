document: rfc-9348
kind: protocol-element
summary: The congestion-control leaf (boolean, default true) enables or disables on-the-wire congestion control data exchange as required by RFC 5348 (TFRC). When false, IP-TFS sends fixed-size packets at a constant rate with no congestion adaptation.
section: "3.2"
topics:
    - ipsec
    - congestion
    - yang
