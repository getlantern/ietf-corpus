summary: 'The `ietf-service-assurance-interface` module augments the `parameter` choice with a `parameters` container (conditioned on `interface-type`) containing two mandatory string leaves: `device` (the hosting device) and `interface` (the interface name), aligned with the `ietf-interfaces` model from RFC 8343.'
