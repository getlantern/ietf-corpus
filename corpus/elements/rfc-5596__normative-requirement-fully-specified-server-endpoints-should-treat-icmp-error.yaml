document: rfc-5596
kind: normative-requirement
summary: Fully specified server endpoints SHOULD treat ICMP error messages received in response to a DCCP-Listen packet as 'soft errors' that do not cause a state transition, since network failures may be transient and a subsequent DCCP-Request may still succeed.
section: 2.2.2
rfc2119_level: SHOULD
topics:
    - nat
    - congestion
