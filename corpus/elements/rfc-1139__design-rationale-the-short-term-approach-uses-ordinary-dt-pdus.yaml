document: rfc-1139
kind: design-rationale
summary: The short term approach uses ordinary DT PDUs with special NSAP selectors so that echo packets are indistinguishable from normal data PDUs and can be switched by routers that do not implement the echo function. This backward compatibility was the primary reason for adopting it as an Elective Internet Standard, even though it cannot be incorporated into future versions of ISO 8473.
section: "1"
