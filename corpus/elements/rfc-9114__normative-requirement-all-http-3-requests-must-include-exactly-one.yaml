document: rfc-9114
kind: normative-requirement
summary: All HTTP/3 requests MUST include exactly one value for the :method, :scheme, and :path pseudo-header fields unless the request is a CONNECT request. The :status pseudo-header field MUST be included in all responses; otherwise the response is malformed.
section: 4.3.1
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
