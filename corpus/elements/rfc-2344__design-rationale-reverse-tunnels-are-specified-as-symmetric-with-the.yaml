document: rfc-2344
kind: design-rationale
summary: Reverse tunnels are specified as symmetric with the corresponding forward tunnel, using the same encapsulation method and IP address endpoints. This simplifies negotiation and avoids requiring a separate capability exchange for the reverse direction.
section: "1.2"
