document: rfc-6554
kind: design-rationale
summary: When an SRH specifies only a subset of the path (source or destination outside the RPL domain), IPv6-in-IPv6 tunneling is used to place the SRH in the outer header. This ensures the inner datagram is delivered unmodified and that ICMPv6 errors generated by SRH processing are returned to the router that generated the SRH rather than the original packet source.
section: "2"
topics:
    - ip
    - routing
