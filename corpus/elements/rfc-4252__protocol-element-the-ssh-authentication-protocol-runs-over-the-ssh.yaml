document: rfc-4252
kind: protocol-element
summary: The SSH authentication protocol runs over the SSH transport layer protocol and provides a single authenticated tunnel for the SSH connection protocol. Its service name is 'ssh-userauth'. It receives the session identifier (exchange hash H from first key exchange) from the lower-level protocol.
