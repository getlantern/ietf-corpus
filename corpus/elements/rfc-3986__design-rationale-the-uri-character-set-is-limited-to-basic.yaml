document: rfc-3986
kind: design-rationale
summary: The URI character set is limited to basic Latin letters, digits, and a few special characters to support global transcription — the ability to write a URI on a napkin and type it into any computer. Transcribability was given higher priority than using the most semantically meaningful characters.
section: 1.2.1
extracted_by: claude-sonnet-4-6
