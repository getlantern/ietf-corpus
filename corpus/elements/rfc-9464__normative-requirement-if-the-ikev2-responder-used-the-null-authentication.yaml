document: rfc-9464
kind: normative-requirement
summary: If the IKEv2 responder used the NULL Authentication method (RFC 7619), the initiator MUST NOT use the returned ENCDNS_IP* resolver configuration unless the initiator is preconfigured (e.g., in the OS or application).
section: "6"
rfc2119_level: MUST NOT
