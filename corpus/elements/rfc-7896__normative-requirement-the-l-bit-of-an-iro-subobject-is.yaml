document: rfc-7896
kind: normative-requirement
summary: 'The L bit of an IRO subobject is set based on the loose or strict hop property: it is set if the subobject represents a loose hop, and not set if it represents a strict hop. Interpretation follows Section 4.3.3.1 of RFC 3209. This removes the prior RFC 5440 statement that ''the L bit of such sub-object has no meaning within an IRO.'''
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
