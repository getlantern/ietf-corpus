document: rfc-5040
kind: protocol-element
summary: The STag Invalidation mechanism prevents a Remote Peer from accessing a previously Advertised Tagged Buffer after it has been invalidated. Invalidation is triggered by Send with Invalidate or Send with Solicited Event and Invalidate Messages, or directly by the Local ULP; the buffer cannot be accessed remotely again until explicitly re-Advertised.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
