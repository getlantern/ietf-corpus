document: rfc-7022
kind: normative-requirement
summary: For per-session RTCP CNAMEs, a new CNAME MUST be generated via the Section 5 procedure for every new RTP session, with the least significant 96 bits SHOULD be Base64-encoded. The 'user@' part MUST be omitted. The CNAME cannot change over the life of a session.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
