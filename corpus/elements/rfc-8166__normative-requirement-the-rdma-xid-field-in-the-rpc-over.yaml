document: rfc-8166
kind: normative-requirement
summary: The rdma_xid field in the RPC-over-RDMA header MUST contain the same XID as the encapsulated RPC message. A mismatch is an XDR error requiring an ERR_CHUNK RDMA_ERROR response from the Responder.
section: 4.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
