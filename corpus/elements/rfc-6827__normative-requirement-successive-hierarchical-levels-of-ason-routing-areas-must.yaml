document: rfc-6827
kind: normative-requirement
summary: Successive hierarchical levels of ASON Routing Areas MUST be represented by separate instances of the OSPFv2 protocol. Inter-level routing information exchange involves export and import of routing information between protocol instances, not OSPF area hierarchy.
section: "2"
rfc2119_level: MUST
topics:
    - routing
