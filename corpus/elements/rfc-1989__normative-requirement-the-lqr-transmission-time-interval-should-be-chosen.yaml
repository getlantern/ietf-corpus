document: rfc-1989
kind: normative-requirement
summary: The LQR transmission time interval SHOULD be chosen to be long enough to smooth data while short enough to ensure fast response to complete failure; implementations SHOULD send at least one additional LQR when a LQR does not arrive within the expected time or indicates truly bad links.
section: "2.9"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
