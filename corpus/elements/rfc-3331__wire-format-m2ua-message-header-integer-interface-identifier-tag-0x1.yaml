document: rfc-3331
kind: wire-format
summary: 'M2UA Message Header (integer Interface Identifier): Tag=0x1, Length=8, followed by 32-bit Interface Identifier. Alternatively, text-based Interface Identifier uses Tag=0x3, variable length, encoded in ANSI X3.4-1986, max 255 octets. This header immediately follows the Common Message Header and is only used with MAUP messages.'
section: "3.2"
