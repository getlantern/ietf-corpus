document: rfc-8441
kind: interoperability-note
summary: When a client connecting via HTTP/2 to an HTTP forward proxy wishes to speak WebSockets, it should continue to use traditional CONNECT (without :protocol) to tunnel through the proxy. The resulting HTTP version on that tunnel then determines whether WebSockets is initiated directly or via modified CONNECT.
section: "7"
topics:
    - websocket
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
