document: rfc-2215
kind: normative-requirement
summary: A router sending packets into an IP tunnel MUST assume that tunneled packets will not receive QoS control services unless it or the setup protocol can prove otherwise; the NON_IS_HOP determination must be conservative.
section: "3.1"
rfc2119_level: MUST
