document: rfc-9856
kind: wire-format
summary: 'The ESI Label Extended Community (Type=0x06, Sub-Type=0x01) is extended with an ESI-DCB-flag at bit 5 of the Flags octet. When set, this bit indicates the ESI label is a Domain-wide Common Block (DCB) label. The community is 8 octets: Type (1), Sub-Type (1), Flags (1), Reserved (1), Reserved (1), ESI Label (3).'
section: "5.2"
topics:
    - routing
    - multicast
    - mpls
