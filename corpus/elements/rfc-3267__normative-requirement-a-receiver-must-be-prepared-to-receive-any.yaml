document: rfc-3267
kind: normative-requirement
summary: A receiver MUST be prepared to receive any speech frame multiple times, in exact duplicates or different AMR rate modes. If multiple versions of the same speech frame are received, it is RECOMMENDED that the mode with the highest rate be used by the speech decoder.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
