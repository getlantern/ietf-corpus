document: rfc-8044
kind: wire-format
summary: The 'string' data type (value 5) encodes binary data as one or more undistinguished octets. Standard-space attributes are limited to 253 octets. Zero-length strings MUST NOT be sent; it MUST be used for encapsulating complex or opaque data structures when TLVs cannot be used.
section: "3.5"
