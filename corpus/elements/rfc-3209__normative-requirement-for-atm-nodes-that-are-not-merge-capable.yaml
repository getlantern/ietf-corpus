document: rfc-3209
kind: normative-requirement
summary: For ATM nodes that are not merge-capable (M-bit not set in LABEL_REQUEST), the downstream node MUST assign unique labels to those senders. Any node intending to police individual senders to a session MUST assign unique labels to those senders.
section: 4.1.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
