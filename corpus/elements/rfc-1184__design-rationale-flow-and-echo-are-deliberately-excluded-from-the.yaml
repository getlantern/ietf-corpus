document: rfc-1184
kind: design-rationale
summary: FLOW and ECHO are deliberately excluded from the MODE bitmask even though they logically belong there, because they would overlap with the existing Telnet TOGGLE-FLOW-CONTROL and ECHO options. Reusing the existing options avoids redundant mechanisms.
section: "2.2"
