document: rfc-5083
kind: security-consideration
summary: Implementations must randomly generate content-authenticated-encryption keys, padding, and unpredictable nonce values. Inadequate PRNGs can result in little or no security; RFC 4086 offers guidance on quality random number generation.
section: "3"
topics:
