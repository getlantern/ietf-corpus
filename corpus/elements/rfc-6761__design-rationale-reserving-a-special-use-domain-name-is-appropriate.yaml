document: rfc-6761
kind: design-rationale
summary: Reserving a Special-Use Domain Name is appropriate only when special handling is required that cannot be achieved via existing DNS mechanisms or normal domain name registration processes. If declaring a given name special would result in no implementation change, reservation is likely inappropriate.
section: "3"
topics:
