document: rfc-6696
kind: design-rationale
summary: Co-location of the home EAP Re-authentication (ER) server and the EAP server is no longer required, relaxing a constraint from RFC 5296. The ER server is now defined as a logical entity that may not be physically part of a full EAP server, improving deployment flexibility.
section: "1.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
