document: rfc-5060
kind: design-rationale
summary: The MIB is designed to be IP-version independent, using InetAddressType/InetAddress pairs throughout instead of IPv4-only types. This is a major departure from RFC 2934, which only supported IPv4, enabling the same MIB module to manage both IPv4 and IPv6 PIM instances on dual-stack routers.
section: "1"
topics:
    - multicast
