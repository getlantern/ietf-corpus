document: rfc-3925
kind: interoperability-note
summary: OPTION_V-I_VENDOR_CLASS may be used wherever Vendor Class Identifier (option 60) may be used, except in DHCPNAK messages where other options are not permitted. It does not replace options 60 and 43 but may be used in addition to them.
section: "3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
