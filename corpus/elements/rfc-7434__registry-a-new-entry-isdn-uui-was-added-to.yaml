document: rfc-7434
kind: registry
summary: A new entry 'isdn-uui' was added to the 'UUI Content' subregistry of the SIP parameter registry. It indicates that the contents conform to the ISDN User-to-User service format (protocol discriminator octet followed by up to 128 octets). This is the default for the isdn-uui purpose and need not be explicitly included.
