document: rfc-9880
kind: interoperability-note
summary: 'Given Names containing ''/'' or space require two-layer encoding when used in JSON Pointer fragment identifiers: tilde-encoding of ''~'' and ''/'' per RFC 6901 Section 3, followed by percent-encoding per RFC 6901 Section 6. Avoiding such characters is recommended to sidestep interoperability problems.'
section: 2.3.2
topics:
