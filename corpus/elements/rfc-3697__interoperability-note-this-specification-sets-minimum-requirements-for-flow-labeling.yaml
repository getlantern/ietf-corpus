document: rfc-3697
kind: interoperability-note
summary: This specification sets minimum requirements for flow labeling and flow state establishment co-existence, but deliberately leaves specific flow state establishment methods and service models to separate specifications. This allows different methods to co-exist in IPv6 nodes without mandating a single approach.
section: "1"
