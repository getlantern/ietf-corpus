document: rfc-1212
kind: interoperability-note
summary: When placing an experimental MIB into Internet-standard space, optional objects must either be removed or placed in an optional group where all members must be implemented together. The document recommends defining a core MIB first with only essential objects and adding others later based on operational experience.
