document: rfc-4951
kind: interoperability-note
summary: When a session ID mismatch exists (e.g., Sid=A paired with Remote=B on one side, but B paired with C on the other), clearing the local session immediately upon receiving a mismatched FSR could leave its counterpart stale. The protocol instead marks the session stale and generates a subsequent FSQ to allow the peer to discover and clear its end, as illustrated in Appendix C.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
