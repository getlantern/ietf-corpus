document: rfc-9480
kind: protocol-element
summary: CRL Update Retrieval uses id-it-crlStatusList (id-it 22) in the GenMsg with a SEQUENCE of CRLStatus structures (each containing a CRLSource and optional thisUpdate Time), and id-it-crls (id-it 23) in the GenRep with fresh CertificateList entries. The server only returns CRLs more recent than those indicated by the client.
section: "2.17"
topics:
