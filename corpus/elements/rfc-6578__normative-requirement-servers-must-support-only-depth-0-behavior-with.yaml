document: rfc-6578
kind: normative-requirement
summary: Servers MUST support only Depth:0 behavior with the DAV:sync-collection report. Clients MUST include a DAV:sync-level XML element with value '1' (immediate children) or 'infinite' (all descendants) to specify scope.
section: "3.3"
rfc2119_level: MUST
