document: rfc-3489
kind: design-rationale
summary: STUN requires no modifications to existing NAT devices and works through an arbitrary number of tandem NATs, making it deployable without cooperation from network operators—addressing the core limitation of MIDCOM, which requires NAT upgrades and a control relationship.
