document: rfc-8341
kind: interoperability-note
summary: For <copy-config> from running to startup, only execute permission on the operation is required. For all other copy-config cases, the source is silently filtered for unreadable nodes and the target requires create/update/delete access on affected nodes.
section: 3.2.6
topics:
    - netconf
    - security
