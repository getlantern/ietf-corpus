document: rfc-3010
kind: normative-requirement
summary: The SPKM-3 GSS-API mechanism MUST be implemented and provide security triples for none, integrity, and privacy services using OID 1.3.6.1.5.5.1.3. SPKM-3 is mandatory to handle anonymous initiators or initiators with their own certificates.
section: 3.2.1.3
rfc2119_level: MUST
topics:
