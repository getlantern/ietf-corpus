document: rfc-6749
kind: protocol-element
summary: A refresh token is an opaque string used to obtain new access tokens when the current one expires or to obtain tokens with narrower scope. Unlike access tokens, refresh tokens are sent only to the authorization server and never to resource servers; issuance is optional at the authorization server's discretion.
section: "1.5"
topics:
    - oauth
