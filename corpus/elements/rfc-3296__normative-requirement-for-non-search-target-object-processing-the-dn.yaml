document: rfc-3296
kind: normative-requirement
summary: For non-search target object processing, the DN part of any returned LDAP URL MUST be modified to refer to the appropriate target in the referenced server. Critical extensions MUST NOT be trimmed or modified. Scope, filter, or attribute list SHOULD be trimmed from LDAP URLs before returning.
section: "5.2"
rfc2119_level: MUST
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
