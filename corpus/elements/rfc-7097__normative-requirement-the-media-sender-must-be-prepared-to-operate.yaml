document: rfc-7097
kind: normative-requirement
summary: The media sender MUST be prepared to operate without receiving any Discard RLE report blocks. It cannot rely on all reports being received nor on a regular generation pattern from the media receiver.
section: "4.2"
rfc2119_level: MUST
