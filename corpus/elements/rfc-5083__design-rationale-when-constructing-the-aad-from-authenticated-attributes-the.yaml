document: rfc-5083
kind: design-rationale
summary: When constructing the AAD from authenticated attributes, the IMPLICIT [1] tag is not used; instead a universal SET OF tag is used for DER encoding. This ensures a consistent encoding of authenticated attributes as AAD input regardless of context tagging.
section: "2.2"
topics:
