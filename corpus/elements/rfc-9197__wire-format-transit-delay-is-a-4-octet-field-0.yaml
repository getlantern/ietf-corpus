document: rfc-9197
kind: wire-format
summary: Transit delay is a 4-octet field (0 to 2^31-1 nanoseconds). When transit delay exceeds 2^31-1 ns, the top 'O' bit is set and value is 0x80000000 to indicate overflow; 0xFFFFFFFF indicates not populated.
