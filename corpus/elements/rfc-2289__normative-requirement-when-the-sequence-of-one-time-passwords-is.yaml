document: rfc-2289
kind: normative-requirement
summary: When the sequence of one-time passwords is reinitialized, implementations MUST verify that the seed or the pass-phrase is changed. Installations SHOULD discourage sending the secret pass-phrase over the network in clear-text.
section: "8"
rfc2119_level: MUST
topics:
    - security
