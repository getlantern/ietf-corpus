document: rfc-3030
kind: normative-requirement
summary: When converting binary MIME to 7-bit or 8-bit MIME for a non-BINARYMIME receiver, the conversion MUST cause no loss of information and the resulting message MUST be valid 7-bit or 8-bit MIME. The transformation MUST NOT result in nested Base-64 or Quoted-Printable content-transfer-encodings.
section: "3"
rfc2119_level: MUST
topics:
    - email
