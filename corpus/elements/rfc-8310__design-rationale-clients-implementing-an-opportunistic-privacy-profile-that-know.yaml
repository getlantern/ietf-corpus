document: rfc-8310
kind: design-rationale
summary: Clients implementing an Opportunistic Privacy profile that know authentication information for a server SHOULD attempt authentication to detect (but not prevent) active attacks; an authentication failure signals a likely active attack in progress even though the client cannot determine the exact cause.
section: "6.5"
topics:
    - dns
    - tls
