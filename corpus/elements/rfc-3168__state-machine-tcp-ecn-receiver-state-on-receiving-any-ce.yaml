document: rfc-3168
kind: state-machine
summary: 'TCP ECN receiver state: on receiving any CE data packet, enter ''echoing'' state and set ECE on every ACK; remain in ''echoing'' state until a CWR packet is received from the sender; then return to ''idle'' state (ECE cleared) for subsequent non-CE packets.'
section: 6.1.3
topics:
    - ecn
    - tcp
