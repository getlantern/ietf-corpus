document: rfc-6088
kind: wire-format
summary: 'The IPv6 binary traffic selector sub-option carries a 16-bit flags word (A–P) followed by optional fields: 128-bit source/destination address ranges, 32-bit IPsec SPI range, 32-bit flow label range, 16-bit source/destination port ranges, 8-bit traffic class range, and 8-bit next header range. Alignment is 8n if IPv6 address fields are set, 4n for SPI/flow label, 2n for ports, and n for TC/NH fields.'
section: "3.2"
topics:
    - ip
    - ipsec
    - mobility
