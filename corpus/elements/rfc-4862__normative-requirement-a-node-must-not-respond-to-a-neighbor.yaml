document: rfc-4862
kind: normative-requirement
summary: A node MUST NOT respond to a Neighbor Solicitation for a tentative address. If the NS source is the unspecified address and the solicitation is from another node (not a loopback), the tentative address is a duplicate and MUST NOT be assigned to the interface.
section: 5.4.3
rfc2119_level: MUST NOT
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
