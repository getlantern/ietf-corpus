document: rfc-2907
kind: design-rationale
summary: The Multicast Scope Nesting State option is made dependent on the Multicast Scope List option because the information describing each scope can change, so both pieces of state must be delivered atomically in the same message to avoid inconsistency between scope identity and nesting relationships.
section: "3.3"
topics:
    - multicast
