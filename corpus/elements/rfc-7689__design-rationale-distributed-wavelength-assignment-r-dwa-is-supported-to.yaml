document: rfc-7689
kind: design-rationale
summary: Distributed wavelength assignment (R+DWA) is supported to enable fast provisioning during equipment failure recovery, where quick recovery is critical. Allowing selection of a specific distributed WA method is beneficial when more than one algorithm is implemented along the path.
