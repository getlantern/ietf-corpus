document: rfc-4364
kind: normative-requirement
summary: A route whose Site of Origin attribute identifies a particular site MUST NOT be redistributed to any CE at that site, preventing routing loops when a site is multi-homed across multiple PE/CE connections.
section: "8"
rfc2119_level: MUST NOT
topics:
