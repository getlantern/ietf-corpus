document: rfc-5034
kind: security-consideration
summary: Plaintext password mechanisms MUST NOT be advertised or permitted unless a TLS session has been negotiated via STLS. Client implementations MUST verify TLS server certificates before using plaintext passwords over TLS. Implementations SHOULD additionally support SASL mechanisms that do not send plaintext passwords, such as GSSAPI.
section: "7"
topics:
    - email
    - security
    - tls
