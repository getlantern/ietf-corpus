document: rfc-9625
kind: wire-format
summary: For BIER encapsulation of OISM frames, a 4-octet MPLS label stack entry (RFC 3032) is prepended to the Ethernet frame with the Label field set to the upstream-assigned label for the source BD. The resulting MPLS packet is then encapsulated in a BIER encapsulation (RFC 8296) with the BIER Proto field set to indicate 'MPLS packet with upstream-assigned label at top of stack'.
section: 3.2.4
topics:
    - routing
    - mpls
