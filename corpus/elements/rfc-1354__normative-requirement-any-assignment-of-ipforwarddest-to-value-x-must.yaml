document: rfc-1354
kind: normative-requirement
summary: Any assignment of ipForwardDest to value x MUST be rejected if the bitwise logical-AND of x with the corresponding ipForwardMask is not equal to x, ensuring the destination address is consistent with its mask.
section: "4.1"
rfc2119_level: MUST
topics:
