document: rfc-9582
kind: security-consideration
summary: The integrity of a ROA MUST be established. The ROA uses the RPKI signed object format (CMS signed message), so all security considerations of RFC 6488 and CMS apply. The signer's right to authorize the target AS is established through the address space and AS number PKI described in RFC 6480.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - routing
    - pkix
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
