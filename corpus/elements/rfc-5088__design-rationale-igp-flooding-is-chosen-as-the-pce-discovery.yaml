document: rfc-5088
kind: design-rationale
summary: IGP flooding is chosen as the PCE discovery mechanism because when PCEs are LSRs or servers participating in the IGP, it provides a simple and efficient way to announce PCEs dynamically. This avoids requiring a separate discovery protocol and leverages existing OSPF infrastructure.
