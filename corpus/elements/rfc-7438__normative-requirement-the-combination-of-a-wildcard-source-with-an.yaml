document: rfc-7438
kind: normative-requirement
summary: The combination of a wildcard source with an ASM group address MUST NOT be used unless it is known a priori that neither source discovery nor source pruning are needed. Use of mLDP in-band signaling is NOT RECOMMENDED for cases that require source discovery or source pruning, as no such procedures are specified in this document.
section: "3.4"
rfc2119_level: MUST NOT
topics:
    - mpls
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
