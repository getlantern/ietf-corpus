document: rfc-4776
kind: protocol-element
summary: 'Civic Address (CA) types 1–6 represent a five-level administrative hierarchy: A1=national subdivision (state/province), A2=county/parish, A3=city/township, A4=city division/borough/ward, A5=neighborhood/block, A6=group of streets. Country-specific instantiations are provided for CA, DE, JP, KR, and US.'
section: "3.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
