document: rfc-5650
kind: design-rationale
summary: The profile-and-template system was introduced because managed nodes may handle hundreds or thousands of xTU lines, most provisioned identically. Profiles allow parameter sets to be shared across multiple entities; templates compose one line profile with one to four channel profiles into a complete line configuration, reducing provisioning burden significantly.
section: "2.8"
topics:
