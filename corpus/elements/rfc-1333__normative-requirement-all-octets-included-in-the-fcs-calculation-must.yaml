document: rfc-1333
kind: normative-requirement
summary: All octets included in the FCS calculation MUST be counted (header, information, padding, and FCS itself), and exactly one flag octet per frame MUST be counted. Additional flag sequences and escape bits or octets MUST NOT be counted.
section: "2.3"
rfc2119_level: MUST
topics:
