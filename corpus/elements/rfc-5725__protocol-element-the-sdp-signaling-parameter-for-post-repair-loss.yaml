document: rfc-5725
kind: protocol-element
summary: The SDP signaling parameter for Post-repair Loss RLE uses the syntax 'post-repair-loss-rle [= max-size]' within the 'rtcp-xr' attribute, where max-size specifies the maximum block size in octets. It is compatible with the 'format-ext' definition in RFC 3611.
section: "4"
topics:
