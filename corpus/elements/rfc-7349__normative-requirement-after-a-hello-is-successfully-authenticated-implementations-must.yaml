document: rfc-7349
kind: normative-requirement
summary: After a Hello is successfully authenticated, implementations MUST store the 64-bit cryptographic sequence number for subsequent replay checking for packets received from that source IP address. The authentication key MUST NOT be carried in the packet.
section: "6.2"
rfc2119_level: MUST
topics:
    - mpls
    - security
