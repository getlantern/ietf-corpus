document: rfc-3388
kind: normative-requirement
summary: An application receiving LS-grouped 'm' lines MUST synchronize the playout of the corresponding media streams. For non-RTP streams, the application MUST recover the original timing relationship using whatever available mechanism.
section: "6"
rfc2119_level: MUST
topics:
    - realtime
    - rtp
