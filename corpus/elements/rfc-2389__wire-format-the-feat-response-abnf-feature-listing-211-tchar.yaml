summary: 'The FEAT response ABNF: `feature-listing = "211-" *TCHAR CRLF / 1*(SP feature CRLF) / "211 End" CRLF`. Each feature line is `feature = feature-label [SP feature-parms]` where feature-label is 1*VCHAR and feature-parms is 1*TCHAR.'
