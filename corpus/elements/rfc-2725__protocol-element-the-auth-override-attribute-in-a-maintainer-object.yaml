document: rfc-2725
kind: protocol-element
summary: The auth-override attribute in a maintainer object, added by the referral-by maintainer, contains only the future date when it takes effect. After that date, the referral-by maintainer gains authorization to modify the maintained object, enabling recovery from unresponsive maintainers.
section: "10.1"
topics:
    - routing
    - registry
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
