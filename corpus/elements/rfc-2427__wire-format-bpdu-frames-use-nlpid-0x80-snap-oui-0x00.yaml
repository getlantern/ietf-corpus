document: rfc-2427
kind: wire-format
summary: BPDU frames use NLPID 0x80 (SNAP), OUI 0x00-80-C2, and PID 0x00-0E for standard BPDUs (802.1d/802.1g) or PID 0x00-0F for Source Routing BPDUs. Unlike other bridged frames, no pad octet precedes the NLPID in the single-octet-per-line BPDU format.
section: "4.2"
