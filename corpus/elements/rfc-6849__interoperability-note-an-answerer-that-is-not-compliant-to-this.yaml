document: rfc-6849
kind: interoperability-note
summary: An answerer that is not compliant to this specification will ignore the loopback media attributes and treat the offer as a normal media request. The offerer MUST handle this case and may terminate the session if a normal RTP session is not desired.
section: "3.2"
topics:
    - rtp
    - realtime
    - sip
