document: rfc-2445
kind: security-consideration
summary: 'Procedural alarms: A VALARM of type PROCEDURE can carry an ATTACH property containing executable content. Implementations that execute such attachments are subject to virus or malicious attack. Implementers should follow electronic mail security practices when accepting and parsing iCalendar objects.'
section: "3.5"
topics:
    - security
