document: rfc-9929
kind: normative-requirement
summary: For OSPF UPA propagation, the normal requirement that a prefix be reachable in the source area MUST NOT be applied. When readvertising, the original LSInfinity metric MUST be preserved and the cost to reach the UPA originator MUST NOT be added.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
