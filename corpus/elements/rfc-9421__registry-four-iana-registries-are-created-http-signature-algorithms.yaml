document: rfc-9421
kind: registry
summary: 'Four IANA registries are created: ''HTTP Signature Algorithms'' (string identifiers like rsa-pss-sha512), ''HTTP Signature Metadata Parameters'' (signature parameter names like created/expires/nonce/alg/keyid/tag), ''HTTP Signature Derived Component Names'' (names like @method, @authority, @path), and ''HTTP Signature Component Parameters'' (field component parameter names like sf, key, bs, req, tr). All use Specification Required policy.'
