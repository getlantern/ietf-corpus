document: rfc-9876
kind: design-rationale
summary: The update was motivated by the absence of any requirement to check that a requested Content-Type and Content Coding combination is semantically valid. This task is non-trivial, requires multi-document knowledge, and should not be solely demanded from the registrar — the gap had already led to erroneous registrations.
section: "1"
topics:
