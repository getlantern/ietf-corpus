document: rfc-3270
kind: protocol-element
summary: 'The Mandatory EXP/PSC→PHB mapping for L-LSPs defines: EXP=000 maps to DF, CSn, or EF (per PSC); EXP=001 maps to AFn1; EXP=010 maps to AFn2; EXP=011 maps to AFn3. This mapping is mandatory and must be used by LSRs for incoming L-LSPs carried over Shim Header encapsulations.'
section: 4.2.1.1
topics:
