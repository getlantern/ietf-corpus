document: rfc-8359
kind: design-rationale
summary: This mechanism is meant to be used only for bidirectional LSPs that assign symmetric labels at each hop along the path. It allows a node to offload upstream label assignment to downstream nodes when the upstream node lacks sufficient information (e.g., wavelength visibility in optical networks).
