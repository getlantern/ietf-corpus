document: rfc-1989
kind: design-rationale
summary: Counters in LQR packets are relative (monotonically increasing sequence numbers) rather than absolute loss counts. Comparing values in successive LQRs yields a 'delta' measurement; relative numbers greatly simplify link synchronization.
section: "2.2"
