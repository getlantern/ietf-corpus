document: rfc-3621
kind: protocol-element
summary: pethPsePortPowerPriority exposes three priority levels — critical(1), high(2), low(3) — that a power management algorithm may use to determine which ports to disconnect first when an over-current condition occurs. Critical ports (e.g., E911 phones) should be assigned higher priority.
