document: rfc-5228
kind: protocol-element
summary: Match types :is (exact), :contains (substring), and :matches (wildcard with '*' and '?') control string comparison behavior. Commands default to ':is' if no match type is supplied. It is an error to use ':contains' or ':matches' with a comparator that does not support substring matching.
section: 2.7.1
topics:
