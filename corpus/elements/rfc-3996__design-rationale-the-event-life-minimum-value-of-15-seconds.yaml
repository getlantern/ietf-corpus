document: rfc-3996
kind: design-rationale
summary: The Event Life minimum value of 15 seconds is designed to allow a client to create a Per-Job Subscription and then perform Get-Notifications within that window without missing events. 60 seconds is recommended to align with PWG Job Monitoring MIB persistence values.
section: "8.1"
