document: rfc-6917
kind: design-rationale
summary: HTTP is chosen as the transport for the Query mode Consumer interface because combining HTTP and XML reduces complexity and leverages widely available tooling. The MRB view of Media Server resources is explicitly described as 'best effort' and approximate, since resource information is only reported periodically over the Publish interface.
section: 5.2.1
topics:
    - http
    - realtime
