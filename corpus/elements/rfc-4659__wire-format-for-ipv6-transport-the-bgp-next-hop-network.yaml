document: rfc-4659
kind: wire-format
summary: For IPv6 transport, the BGP Next Hop Network Address field contains a VPN-IPv6 address with RD set to zero and the 16-octet field set to the advertising speaker's global IPv6 address. Length is 24 octets for global-only, 48 octets when a link-local address is also included.
section: 3.2.1.1
topics:
