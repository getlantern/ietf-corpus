document: rfc-6929
kind: normative-requirement
summary: The Reserved field (7 bits) in the Long Extended Type format MUST be set to zero when encoding. Implementations MUST NOT treat a non-zero Reserved field as invalid on reception, as future specifications may assign meaning to it.
section: "2.2"
rfc2119_level: MUST
