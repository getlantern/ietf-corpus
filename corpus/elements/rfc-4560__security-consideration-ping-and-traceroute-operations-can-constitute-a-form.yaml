document: rfc-4560
kind: security-consideration
summary: 'Ping and traceroute operations can constitute a form of system attack when used excessively: sending requests too often can degrade target performance, and TCP port-connect probes to supposedly unused ports are unpredictable. SNMP write access to control tables must be secured using SNMPv3 or other access control mechanisms to prevent unauthorized initiation of probe operations.'
section: "5"
topics:
