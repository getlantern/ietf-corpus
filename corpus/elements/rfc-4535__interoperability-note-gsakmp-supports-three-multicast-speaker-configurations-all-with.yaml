document: rfc-4535
kind: interoperability-note
summary: 'GSAKMP supports three multicast speaker configurations, all with different anti-replay properties: single authorized speaker (sequence number checking feasible, default), all GMs as speakers sharing one GTPK (anti-replay sequence checking not feasible), and authorized subset with per-speaker SA state (supports anti-replay but does not scale to large speaker counts). Implementations MUST support the first two; the third is optional.'
section: 4.1.5
topics:
    - security
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
