document: rfc-3862
kind: wire-format
summary: 'Header syntax (ABNF): Header = Header-name ":" *(";") Parameter) SP Header-value CRLF. Header-name may include an optional namespace prefix separated by ".". Header values are sequences of HEADERCHAR (any UCS character except CTLs or escape sequences) encoded in UTF-8.'
