document: rfc-5275
kind: security-consideration
summary: A corrupt GLA can always cause havoc in the key distribution system. Even if KMA and GMA are separated, a corrupted GMA could manipulate requests sent to the KMA, forcing duplicative cross-checking that undermines the separation of functions.
