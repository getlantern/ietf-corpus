document: rfc-9462
kind: protocol-element
summary: Opportunistic Discovery allows a client to use a Designated Resolver without certificate name validation when the Designated Resolver shares the same private or local IP address as the Unencrypted DNS Resolver, analogous to the opportunistic privacy profile defined for DoT in RFC 7858 Section 4.1.
section: "4.3"
topics:
    - dns
    - tls
    - privacy
