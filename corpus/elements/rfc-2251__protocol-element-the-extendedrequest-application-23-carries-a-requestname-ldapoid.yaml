kind: protocol-element
summary: The ExtendedRequest ([APPLICATION 23]) carries a requestName (LDAPOID) and optional requestValue (OCTET STRING). The ExtendedResponse ([APPLICATION 24]) adds responseName and response fields to LDAPResult, enabling arbitrary new operations to be defined without changing the protocol version.
