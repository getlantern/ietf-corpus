document: rfc-2327
kind: registry
summary: 'Appendix B defines IANA registration procedures for seven SDP name spaces: ''media'' (top-level MIME content types), ''proto'' (transport protocols; new proprietary protocols require an RFC), ''fmt'' (format names, context-dependent on proto), ''att-field'' (attribute names; registration optional), ''bwtype'' (bandwidth modifiers; requires standards-track RFC), ''nettype'' (network types; requires RFC), and ''addrtype'' (address types; requires RFC). Currently defined: nettype ''IN'', addrtype ''IP4''/''IP6'', proto ''RTP/AVP''/''udp'', bwtype ''CT''/''AS''.'
section: Appendix B
