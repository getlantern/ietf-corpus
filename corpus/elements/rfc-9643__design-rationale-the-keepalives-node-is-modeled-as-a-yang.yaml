document: rfc-9643
kind: design-rationale
summary: The 'keepalives' node is modeled as a YANG 'presence' container rather than a plain container so that its mandatory descendant nodes do not imply that keepalives must always be configured, aligning with RFC 9293's requirement that keepalives default to off.
section: 2.1.3.1
topics:
