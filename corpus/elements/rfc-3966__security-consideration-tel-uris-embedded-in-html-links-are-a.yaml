document: rfc-3966
kind: security-consideration
summary: 'Tel URIs embedded in HTML links are a phishing vector: a malicious party may disguise a premium-rate or harmful number in link text (e.g., displaying ''tel:+1-800-555-0191'' while linking to ''+1-900-555-0191''). User agents should display the actual URI before placing a call.'
section: "11"
topics:
    - security
    - voip
    - realtime
