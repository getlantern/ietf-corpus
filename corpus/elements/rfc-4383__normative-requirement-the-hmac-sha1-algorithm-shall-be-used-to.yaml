document: rfc-4383
kind: normative-requirement
summary: The HMAC-SHA1 algorithm SHALL be used to generate the TESLA MAC, applied to the TESLA chain key K'_i and input M'. The HMAC output SHALL be truncated to the n_m left-most bits (default 80 bits).
section: "4.6"
rfc2119_level: SHALL
