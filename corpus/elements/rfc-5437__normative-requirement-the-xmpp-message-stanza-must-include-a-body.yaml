document: rfc-5437
kind: normative-requirement
summary: The XMPP <message/> stanza MUST include a <body/> child element. The ':message' tag value takes precedence over the 'body' key from the XMPP URI query component; otherwise, the 'body' key value SHOULD be used, or fallback configurable text.
section: "2.7"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
