document: rfc-5890
kind: protocol-element
summary: XN-labels are R-LDH labels that begin with the 'xn--' prefix. Those whose remaining characters are valid Punycode output and that meet other IDNA-validity criteria are A-labels; those that fail these tests are called 'Fake A-labels'.
