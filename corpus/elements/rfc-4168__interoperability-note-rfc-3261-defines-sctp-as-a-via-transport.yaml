document: rfc-4168
kind: interoperability-note
summary: RFC 3261 defines 'SCTP' as a Via transport value but does not define a value for TLS over SCTP; 'TLS' in RFC 3261 is intended for TLS over TCP only. This document fills that gap by defining 'TLS-SCTP'.
section: "4"
topics:
