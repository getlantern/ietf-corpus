document: rfc-7273
kind: normative-requirement
summary: The NTP/RTP timestamp mapping provided by RTCP Sender Reports (SRs) takes precedence over any mapping signalled through SDP; however, the media clock rate implied by RTCP SRs MUST be consistent with the rate signalled in SDP.
section: "5.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
