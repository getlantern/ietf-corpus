document: rfc-5023
kind: protocol-element
summary: AtomPub defines a 'type' parameter for the application/atom+xml media type with values 'entry' or 'feed', distinguishing Atom Entry Documents (root element MUST be atom:entry) from Atom Feed Documents (root element MUST be atom:feed). Processors that do not recognize the parameter MUST ignore it and examine the root element.
section: "12"
topics:
