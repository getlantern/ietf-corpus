document: rfc-5053
kind: protocol-element
summary: 'The triple generator Trip[K, X] derives (d, a, b) from the systematic index J(K) and ESI X via: A=(53591+J(K)*997)%Q, B=10267*(J(K)+1)%Q, Y=(B+X*A)%Q, then d=Deg[Rand[Y,0,2^^20]], a=1+Rand[Y,1,L''-1], b=Rand[Y,2,L''], where Q=65521.'
section: 5.4.4.4
