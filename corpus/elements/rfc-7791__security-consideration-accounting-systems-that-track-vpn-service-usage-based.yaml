document: rfc-7791
kind: security-consideration
summary: Accounting systems that track VPN service usage based on the liveliness of a single IKE SA may be circumvented if the original IKE SA is deleted while service continues on the cloned SA. Accounting implementations should track service from the first IKE SA establishment until the last associated IKE SA is removed.
section: "8"
topics:
