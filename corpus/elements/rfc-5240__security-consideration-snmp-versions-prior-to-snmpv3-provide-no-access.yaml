document: rfc-5240
kind: security-consideration
summary: SNMP versions prior to SNMPv3 provide no access control independent of network-level security (e.g., IPsec). Even on a secure network, there is no per-principal control over who may read, write, create, or delete MIB objects.
section: "6"
topics:
    - security
    - snmp
extracted_by: claude-sonnet-4-6
