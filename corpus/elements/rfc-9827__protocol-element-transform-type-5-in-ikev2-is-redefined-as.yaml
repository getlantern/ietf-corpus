document: rfc-9827
kind: protocol-element
summary: Transform Type 5 in IKEv2 is redefined as negotiating 'the set of properties of sequence numbers of IPsec packets of a given SA when these packets enter the network.' Sequence numbers may be logical entities not fully transmitted on the wire, and properties are assessed at network ingress, not at the receiver.
section: "3"
topics:
    - ipsec
    - security
