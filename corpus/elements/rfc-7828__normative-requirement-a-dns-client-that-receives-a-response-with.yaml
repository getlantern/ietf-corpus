document: rfc-7828
kind: normative-requirement
summary: A DNS client that receives a response with an edns-tcp-keepalive TIMEOUT value of 0 SHOULD send no more queries on that connection and initiate closing the connection as soon as all outstanding responses are received.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
