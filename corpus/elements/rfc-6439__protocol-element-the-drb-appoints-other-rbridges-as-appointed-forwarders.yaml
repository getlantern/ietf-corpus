document: rfc-6439
kind: protocol-element
summary: The DRB appoints other RBridges as Appointed Forwarders by including one or more Appointed Forwarders sub-TLVs in a TRILL Hello sent on the Designated VLAN from the DRB-election-winning port. When the DRB sends any appointments it must send all appointments for that link in that Hello; any prior appointment not included is implicitly revoked.
section: "2.2"
topics:
    - routing
