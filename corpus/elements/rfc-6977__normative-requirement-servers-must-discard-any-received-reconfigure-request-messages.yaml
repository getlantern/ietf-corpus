document: rfc-6977
kind: normative-requirement
summary: Servers MUST discard any received Reconfigure-Request messages that lack a Client Identifier Option, lack a Link Address Option, or include a Server Identifier Option whose contents do not match the server's identifier.
section: 6.2.1
rfc2119_level: MUST
