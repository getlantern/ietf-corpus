document: rfc-4072
kind: normative-requirement
summary: A Diameter-EAP-Answer containing an EAP-Payload of type EAP-Success or EAP-Failure MUST NOT have the Result-Code AVP set to DIAMETER_MULTI_ROUND_AUTH; the Result-Code SHOULD match the contained EAP packet to avoid contradictory outcomes between the NAS and the peer.
section: 2.8.2
rfc2119_level: MUST NOT
topics:
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
