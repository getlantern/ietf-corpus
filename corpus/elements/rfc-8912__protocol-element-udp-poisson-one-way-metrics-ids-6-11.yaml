document: rfc-8912
kind: protocol-element
summary: UDP Poisson One-Way metrics (IDs 6–11) use TWAMP-Test packet format (RFC 5357 Section 4.1.2) with 250 bytes total payload. Poisson stream parameters are Reciprocal_lambda=1 second (average packet interval) and Trunc=30.0000 seconds (upper limit on inter-packet times). Five delay statistics (95Percentile, Mean, Min, Max, StdDev) plus LossRatio are defined as separate registry entries.
section: "7"
