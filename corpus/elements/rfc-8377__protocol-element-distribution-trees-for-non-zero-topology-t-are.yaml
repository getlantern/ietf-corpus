document: rfc-8377
kind: protocol-element
summary: Distribution trees for non-zero topology T are built using only links usable with topology T, and automatically span only internally connected islands of that topology. Only Nickname, Trees, Tree Identifiers, and Trees Used sub-TLVs occurring in MT Router Capabilities TLV (#144) specifying topology T are used for tree root determination.
section: 3.4.1
topics:
