document: rfc-6602
kind: interoperability-note
summary: The Mobile Node Group Identifier option is a generic option; this specification uses only sub-type 1. Future specifications may define additional sub-types. When the LMA does not enable bulk binding update support, it MUST NOT include the option with sub-type 1, though other sub-types may appear.
section: 5.2.2
topics:
    - mobility
