document: rfc-9442
kind: interoperability-note
summary: RuleID value 0b'111 in a 3-bit Single-byte Header is reserved to signal that a Two-byte SCHC Header follows; within the Two-byte space, 0b'111111 signals Option 2. Implementations must parse RuleID left-to-right to distinguish header lengths before interpreting fragmentation fields.
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
