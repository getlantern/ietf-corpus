document: rfc-5370
kind: interoperability-note
summary: The URI syntax required to encode a recipient-list body into a '?body=' parameter in the 302 Contact header is complex. RFC 5370 notes it is simpler for callees to use the 3pcc transcoding model (RFC 4117) instead.
