document: rfc-3550
kind: wire-format
summary: When the X bit is set, a header extension MUST immediately follow the CSRC list. It begins with a 16-bit profile-defined identifier and a 16-bit length field counting 32-bit words in the extension body (zero is valid, header not counted). Only one extension may be appended per packet.
section: 5.3.1
topics:
    - rtp
    - realtime
