document: rfc-6607
kind: security-consideration
summary: DHCPv4 relay agents should consider using the Authentication sub-option (RFC 4030) when employing VSS sub-options, and implementations should consider the DHCPv4 Authentication option (RFC 3118) to protect client access. DHCPv6 security threats are detailed in RFC 3315.
section: "9"
topics:
    - dns
    - security
