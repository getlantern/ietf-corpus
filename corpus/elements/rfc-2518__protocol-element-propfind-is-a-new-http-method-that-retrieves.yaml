document: rfc-2518
kind: protocol-element
summary: PROPFIND is a new HTTP method that retrieves properties on resources, optionally traversing collections to a specified depth (0, 1, or infinity). It accepts an XML propfind body specifying which properties to retrieve (named, allprop, or propname) and returns a 207 Multi-Status XML response.
section: "8.1"
topics:
    - http
