document: rfc-5107
kind: normative-requirement
summary: In a situation where the DHCP relay agent is configured to forward messages to more than one server, the relay agent SHOULD forward all DHCP messages (including RENEW DHCPREQUESTs) to all servers, so the relay does not need to maintain lease state.
section: "4"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
