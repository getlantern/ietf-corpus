document: rfc-9990
kind: interoperability-note
summary: When a DMARC policy changes mid-reporting-period, a Mail Receiver may generate a single report mixing dispositions from both policies (with only one policy_published element) or separate reports per policy. Report Consumers must expect and tolerate mixed-policy reports during policy propagation.
section: "3.3"
topics:
