document: rfc-3637
kind: interoperability-note
summary: 802.3ae mandates ERDI-P (Enhanced RDI-Path) which signals both server defects (path AIS, LOP) and payload defects (PLM-P, LCD-P); RFC 3592 defines only one-bit RDI-P for server defects. Only ERDI-P server defects map to sonetPathSTSRDI; payload defects are exclusively reported in etherWisFarEndPathCurrentStatus.
section: "3.5"
topics:
    - snmp
