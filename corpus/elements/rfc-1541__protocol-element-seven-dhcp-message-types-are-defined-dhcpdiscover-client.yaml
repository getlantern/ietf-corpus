kind: protocol-element
summary: 'Seven DHCP message types are defined: DHCPDISCOVER (client broadcast to locate servers), DHCPOFFER (server offer), DHCPREQUEST (client selects server or renews), DHCPACK (server confirms), DHCPNAK (server refuses), DHCPDECLINE (client rejects parameters), and DHCPRELEASE (client relinquishes address).'
