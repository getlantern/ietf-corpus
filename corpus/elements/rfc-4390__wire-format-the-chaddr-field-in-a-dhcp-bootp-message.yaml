document: rfc-4390
kind: wire-format
summary: The 'chaddr' field in a DHCP/BOOTP message is 16 octets in length, while the IPoIB link-layer address is 20 octets (per RFC 4391). When used over IPoIB, 'chaddr' MUST be zeroed, 'hlen' MUST be 0, and 'htype' MUST be 32.
section: "2.1"
topics:
    - ip
