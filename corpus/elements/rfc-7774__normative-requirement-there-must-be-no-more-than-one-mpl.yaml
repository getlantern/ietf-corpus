document: rfc-7774
kind: normative-requirement
summary: There MUST be no more than one MPL Parameter Configuration Option for a given MPL Domain or for the wildcard in any DHCPv6 message, so the order of options in the packet has no effect on precedence.
section: "2.3"
rfc2119_level: MUST
