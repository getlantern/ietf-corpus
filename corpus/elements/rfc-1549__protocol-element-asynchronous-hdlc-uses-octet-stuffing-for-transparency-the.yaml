document: rfc-1549
kind: protocol-element
summary: Asynchronous HDLC uses octet stuffing for transparency. The Control Escape octet is 0x7d. Each end maintains sending and receiving Async-Control-Character-Maps (ACCMs); the receiving ACCM is 32 bits and the sending ACCM may be up to 256 bits. The default for both is 0xffffffff.
section: "4"
