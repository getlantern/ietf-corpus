document: rfc-1508
kind: protocol-element
summary: 'GSS-API uses two name representation classes: a printable form (OCTET STRING) tagged with an OID identifying the namespace, used for user-facing input/output; and an internal form (INTERNAL NAME) opaque to callers, defined by the GSS-API implementation. OID tagging prevents name aliasing across different namespace types.'
section: 1.1.5
topics:
    - security
