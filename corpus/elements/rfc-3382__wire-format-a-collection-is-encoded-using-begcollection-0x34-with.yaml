document: rfc-3382
kind: wire-format
summary: A collection is encoded using begCollection (0x34) with the collection attribute name and a zero-length value, followed by pairs of memberAttrName (0x4A) values (holding member attribute names) and the member attribute values, terminated by endCollection (0x37) with zero name and value lengths.
section: "7.1"
