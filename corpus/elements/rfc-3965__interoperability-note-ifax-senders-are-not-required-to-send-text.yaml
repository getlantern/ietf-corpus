document: rfc-3965
kind: interoperability-note
summary: IFax senders are not required to send text/plain messages (relaxing RFC 2049 requirement 4), but IFax recipients are required to accept and process text/plain. Recipients are also not required to offer to save results to a file, and MAY directly print/fax received messages rather than display them.
section: Appendix A
topics:
    - email
