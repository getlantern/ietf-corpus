document: rfc-2849
kind: design-rationale
summary: The base64 encoding used in LDIF removes RFC 2045's requirement that base64 output lines be no more than 76 characters, instead relying solely on LDIF's own line-folding rules. This avoids conflicts between two independent folding schemes.
section: Notes on LDIF Syntax
topics:
    - ldap
