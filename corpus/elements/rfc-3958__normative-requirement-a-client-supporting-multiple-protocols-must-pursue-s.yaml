document: rfc-3958
kind: normative-requirement
summary: A client supporting multiple protocols MUST pursue S-NAPTR resolution completely for one protocol, exploring all potential terminal lookups in PREF and ORDER ranking, until the application connects successfully or there are no more possibilities for that protocol before trying another protocol.
section: 2.2.5
rfc2119_level: MUST
topics:
    - dns
