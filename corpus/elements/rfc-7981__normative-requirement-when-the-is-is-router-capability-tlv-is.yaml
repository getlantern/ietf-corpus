document: rfc-7981
kind: normative-requirement
summary: When the IS-IS Router CAPABILITY TLV is leaked from Level 2 to Level 1, the D bit MUST be set. IS-IS Router CAPABILITY TLVs with the D bit set MUST NOT be leaked from Level 1 to Level 2, preventing TLV looping.
section: "2"
rfc2119_level: MUST
topics:
    - routing
