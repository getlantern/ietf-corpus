document: rfc-8896
kind: design-rationale
summary: The Calendar extension intentionally introduces no new media types, no new cost modes, and no new IRD structure, relying on RFC 7285's 'unknown fields MUST be ignored' rule for backwards compatibility. Calendar capabilities are embedded in existing resource capabilities under a 'calendar-attributes' member.
