document: rfc-7618
kind: normative-requirement
summary: If the client's DHCP 4o6 IPv6 source address changes for any reason, the client MUST re-initiate the shared-address provisioning process by sending a DHCPDISCOVER message rather than attempting a DHCPREQUEST renewal.
