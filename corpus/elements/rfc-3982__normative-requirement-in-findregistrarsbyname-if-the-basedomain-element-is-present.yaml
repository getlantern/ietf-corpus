document: rfc-3982
kind: normative-requirement
summary: In <findRegistrarsByName>, if the <baseDomain> element is present it MUST restrict results to registrars capable of registering subdomains in the specified domain. If <namePart> is absent, the query MUST return all applicable registrars.
section: 3.1.1
rfc2119_level: MUST
topics:
    - dns
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
