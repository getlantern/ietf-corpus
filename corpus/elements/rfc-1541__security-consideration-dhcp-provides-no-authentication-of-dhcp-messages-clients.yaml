document: rfc-1541
kind: security-consideration
summary: DHCP provides no authentication of DHCP messages. Clients may be misled by rogue servers, and the address pool may be exhausted by malicious clients sending many DHCPDISCOVER messages with spoofed hardware addresses. The protocol relies on the network infrastructure to limit exposure to such attacks.
section: "7"
topics:
    - security
    - ip
