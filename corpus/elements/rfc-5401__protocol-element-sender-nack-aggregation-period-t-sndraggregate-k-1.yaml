document: rfc-5401
kind: protocol-element
summary: Sender NACK aggregation period T_sndrAggregate = (K+1)*GRTT accumulates NACKs from the receiver set before initiating repair. Sender hold-off T_sndrHoldoff = 1*GRTT follows. Receiver hold-off T_rcvrHoldoff = (K+2)*GRTT accounts for worst-case NACK propagation, sender aggregation time, and repair response propagation back to the receiver.
section: 3.2.4
topics:
    - multicast
