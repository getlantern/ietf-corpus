document: rfc-3611
kind: normative-requirement
summary: For per-packet accounting in Loss RLE blocks, the next arriving sequence number MUST be judged to fall no more than 32,768 packets ahead or behind the most recently received one; when both choices are equally distant the one that does not require a rollover MUST be chosen.
section: "4.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
