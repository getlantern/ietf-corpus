document: rfc-3745
kind: normative-requirement
summary: JPEG 2000 files registered under these MIME types are binary and MUST be transmitted in a suitable encoding without CR/LF conversion, 7-bit stripping, or similar transformations; base64 is identified as a suitable encoding.
section: "4.1"
rfc2119_level: SHOULD
