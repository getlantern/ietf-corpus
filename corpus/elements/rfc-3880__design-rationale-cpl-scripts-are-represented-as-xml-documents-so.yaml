document: rfc-3880
kind: design-rationale
summary: CPL scripts are represented as XML documents so that parsing is easy, many parsers are publicly available, and graphical tools can create and edit any valid script. The tree structure of XML maps directly to the acyclic node-output graph of CPL actions.
