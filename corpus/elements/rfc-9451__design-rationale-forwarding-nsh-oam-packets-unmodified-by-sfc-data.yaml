document: rfc-9451
kind: design-rationale
summary: Forwarding NSH OAM packets unmodified by SFC data plane elements that do not support SFC OAM procedures may be acceptable for a subset of OAM functions but can result in unexpected outcomes for others. The default-disabled configuration for this forwarding mode reflects a secure-by-default posture requiring explicit operator opt-in.
section: "3"
topics:
