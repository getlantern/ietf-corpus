document: rfc-4701
kind: protocol-element
summary: Updaters compute a client identity hash from DHCP client request data and the desired FQDN, then compare it to existing DHCID RRs on that name. If RDATA does not match, the updater SHOULD conclude a different client is currently associated with the name.
section: "5"
topics:
