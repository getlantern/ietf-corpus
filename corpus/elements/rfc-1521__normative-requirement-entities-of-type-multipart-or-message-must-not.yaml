document: rfc-1521
kind: normative-requirement
summary: Entities of type 'multipart' or 'message' MUST NOT use Content-Transfer-Encoding values other than '7bit', '8bit', or 'binary'. All encoding of inner content must be applied at the innermost level, by encoding the actual body that needs encoding.
section: "5"
rfc2119_level: MUST NOT
topics:
    - email
