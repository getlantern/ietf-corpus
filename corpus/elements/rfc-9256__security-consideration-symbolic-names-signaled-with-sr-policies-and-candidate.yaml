document: rfc-9256
kind: security-consideration
summary: Symbolic names signaled with SR Policies and candidate paths are unrestricted free-form text from external parties; implementations should display them in a manner that differentiates them from known-good information and users should validate using the specific policy identifiers rather than relying on symbolic names.
