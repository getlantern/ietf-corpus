document: rfc-8888
kind: normative-requirement
summary: RTCP Congestion Control Feedback Packets SHOULD include a report block for every active SSRC. If a packet was reported as received in one report, it MUST also be reported as received in any overlapping reports that cover its sequence number range.
section: "3.1"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
    - realtime
