document: rfc-7472
kind: interoperability-note
summary: The 'query' component in 'ipps' URIs has no defined semantics in IPP and was never used in examples in RFC 2910 or RFC 3510. It is retained for consistency, but IPP Clients SHOULD avoid its use.
