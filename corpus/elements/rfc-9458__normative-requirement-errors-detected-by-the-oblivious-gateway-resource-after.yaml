document: rfc-9458
kind: normative-requirement
summary: Errors detected by the Oblivious Gateway Resource after successfully removing encapsulation, and errors from the Target Resource, MUST be sent inside an Encapsulated Response. Only errors that occur before or during decapsulation may be sent unencrypted.
section: "5.2"
rfc2119_level: MUST
topics:
    - http
    - security
    - privacy
