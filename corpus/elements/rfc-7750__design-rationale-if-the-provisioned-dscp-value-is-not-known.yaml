document: rfc-7750
kind: design-rationale
summary: If the provisioned DSCP value is not known (e.g., in TWAMP Light mode), the Session-Reflector MAY copy the DSCP from the received packet or MAY set it to CS0 (zero), leaving the choice implementation-specific because TWAMP Light lacks a TWAMP-Control synchronization mechanism.
section: 2.2.1
topics:
