document: rfc-5428
kind: interoperability-note
summary: Compliance with PKTC-IETF-EVENT-MIB requires implementing mandatory groups from both SNMP-TARGET-MIB (snmpTargetBasicGroup, snmpTargetResponseGroup) and SNMP-NOTIFICATION-MIB (snmpNotifyGroup, snmpNotifyFilterGroup). MTA implementations MUST consult the corresponding PacketCable or IPCablecom specifications for compliance, as this MIB uses PacketCable references by convention when requirements are equivalent.
section: "5"
topics:
    - snmp
