document: rfc-4750
kind: protocol-element
summary: The ospfGeneralGroup (OID ospf 1) contains global variables for the OSPF process, including ospfRouterId (32-bit router identifier), ospfAdminStat (enabled/disabled), ospfVersionNumber (fixed at 2), ospfExternLsaCount, ospfOriginateNewLsas, ospfRxNewLsas, and ospfDiscontinuityTime. These apply globally across all OSPF interfaces on the device.
section: "3"
topics:
