document: rfc-1172
kind: wire-format
summary: 'Link-Quality-Report packet: Code=12, 1-octet Identifier, 2-octet Length, 4-octet Magic-Number, 1-octet In-Tx-LQRs, 1-octet Last-In-Id, 15-bit Reserved, 1-bit V (validity), then four 4-octet measurement fields (In-Tx-Packets, In-Tx-Octets, In-Rx-Packets, In-Rx-Octets) and two 4-octet counter fields (Out-Tx-Packets-Ctr, Out-Tx-Octets-Ctr) transmitted over the wire; In-Rx-Packets-Ctr and In-Rx-Octets-Ctr are appended by the Rx process after reception.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
