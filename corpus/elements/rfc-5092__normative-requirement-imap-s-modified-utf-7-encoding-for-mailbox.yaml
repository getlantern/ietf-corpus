document: rfc-5092
kind: normative-requirement
summary: IMAP's modified UTF-7 encoding for mailbox names MUST be converted to UTF-8. Since 8-bit octets are not permitted in URLs, the UTF-8 octets are then percent-encoded. IMAP user names (UTF-8 strings) and 8-bit octets in SEARCH criteria MUST also be percent-encoded.
section: "8"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
