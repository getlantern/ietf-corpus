document: rfc-7145
kind: normative-requirement
summary: The iSER layer at the initiator MUST set IRD to 1 or higher if R2Ts are to be used on the connection, and the iSER-IRD value MUST NOT exceed the IRD value at the initiator. The initiator MAY set IRD to zero to indicate that no R2Ts will be used.
section: 5.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
