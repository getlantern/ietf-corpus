document: rfc-6340
kind: interoperability-note
summary: SNMP lexicographical ordering for INDEX objects using these floating-point TCs will be that of the corresponding octet strings, which will not always reflect the numerical ordering of the floating-point values. MIB designers should warn users in the DESCRIPTION clause.
