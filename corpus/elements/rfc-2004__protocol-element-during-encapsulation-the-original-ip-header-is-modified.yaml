kind: protocol-element
summary: 'During encapsulation the original IP header is modified in-place: Protocol field is replaced with 55 (minimal encapsulation), Destination Address is replaced with the tunnel exit point address, Source Address is replaced with the encapsulator''s address if the encapsulator is not the original source, Total Length is incremented by 8 or 12 octets, and Header Checksum is recomputed.'
