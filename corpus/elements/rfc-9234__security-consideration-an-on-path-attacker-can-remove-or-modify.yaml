document: rfc-9234
kind: security-consideration
summary: An on-path attacker can remove or modify the OTC Attribute to circumvent route leak detection, then re-advertise a leaked route upward. This threat is inherent to BGP attribute manipulation and is not addressed by this specification (BGPsec only protects AS_PATH).
section: "8"
topics:
    - bgp
    - security
    - routing
