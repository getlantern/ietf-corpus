summary: The IANA-ITU-ALARM-TC-MIB (OID mib-2 119) defines the IANAItuProbableCause and IANAITUEventType textual conventions. IANA manages enumeration assignments; values 1–1023 are reserved for ITU-T causes, new causes assigned from 1025 upward on a first-come basis with OPS Area Director-appointed expert review.
