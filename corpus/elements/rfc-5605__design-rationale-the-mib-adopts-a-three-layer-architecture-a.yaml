document: rfc-5605
kind: design-rationale
summary: 'The MIB adopts a three-layer architecture: a service layer (this module, ATM-specific), a generic PW layer (PW-STD-MIB), and a PSN layer (e.g., PW-MPLS-MIB). This layering sufficiently isolates PW services from the PSN so that any service can be carried over any supported PSN type without structural changes.'
