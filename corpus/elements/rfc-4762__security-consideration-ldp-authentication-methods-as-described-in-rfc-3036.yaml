document: rfc-4762
kind: security-consideration
summary: LDP authentication methods as described in RFC 3036 SHOULD be applied to prevent unauthenticated messages from disrupting a PE in a VPLS. Additionally, some means to limit the number of MAC addresses per site per VPLS that a PE can learn SHOULD be implemented to prevent denial-of-service attacks.
section: "14"
rfc2119_level: SHOULD
topics:
    - security
    - mpls
