document: rfc-9298
kind: normative-requirement
summary: Context IDs MUST NOT be re-allocated within a given HTTP request namespace, but MAY be allocated in any order. The even/odd allocation restriction applies only at allocation time; once allocated, any endpoint may use the Context ID.
section: "4"
rfc2119_level: MUST NOT
topics:
    - udp
    - http
