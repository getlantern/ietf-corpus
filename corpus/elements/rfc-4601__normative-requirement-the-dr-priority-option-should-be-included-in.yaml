document: rfc-4601
kind: normative-requirement
summary: The DR_Priority option SHOULD be included in every Hello message even if no DR Priority is explicitly configured, because priority-based DR election is only enabled when all neighbors on an interface advertise support. The default priority is 1.
section: 4.3.1
rfc2119_level: SHOULD
topics:
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
