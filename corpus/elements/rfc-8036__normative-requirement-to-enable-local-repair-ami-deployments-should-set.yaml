document: rfc-8036
kind: normative-requirement
summary: To enable local repair, AMI deployments SHOULD set MaxRankIncrease to a value that allows a device to move a small number of hops away from the root; with MinHopRankIncrease of 256, a value of 1024 allows up to 4 hops.
section: 7.4.2
rfc2119_level: SHOULD
topics:
    - routing
