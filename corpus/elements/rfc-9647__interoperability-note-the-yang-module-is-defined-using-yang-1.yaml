document: rfc-9647
kind: interoperability-note
summary: The YANG module is defined using YANG 1.1 (RFC 7950) and is compatible with the Network Management Datastore Architecture (NMDA, RFC 8342). It is based on the Babel information model (RFC 9046) and only includes data nodes useful for managing Babel over IPv6.
