document: rfc-3161
kind: protocol-element
summary: MessageImprint is an ASN.1 SEQUENCE containing hashAlgorithm (AlgorithmIdentifier) and hashedMessage (OCTET STRING). The hash value length MUST match the length expected for the identified algorithm (e.g., 20 bytes for SHA-1, 16 bytes for MD5).
section: 2.4.1
topics:
