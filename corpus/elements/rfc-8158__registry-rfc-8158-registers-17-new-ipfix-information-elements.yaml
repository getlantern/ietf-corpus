document: rfc-8158
kind: registry
summary: 'RFC 8158 registers 17 new IPFIX Information Elements in the IANA ''IPFIX Information Elements'' registry: natInstanceID (463), internalAddressRealm (464), externalAddressRealm (465), natQuotaExceededEvent (466), natThresholdEvent (467), and limit/threshold IEs maxSessionEntries through globalAddressMappingHighThreshold (471-481). It also updates natEvent (230) from a fixed three-value IE to a registry-backed IE.'
section: "6.1"
