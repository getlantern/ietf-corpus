document: rfc-7956
kind: security-consideration
summary: Correct configuration of Tenant IDs across all participating edge RBridges is critical; misconfiguration can cause traffic to be delivered to the wrong tenant, violating tenant isolation. IS-IS security (RFC 5310) can be used to protect LSP and FS-LSP advertisements from tampering.
