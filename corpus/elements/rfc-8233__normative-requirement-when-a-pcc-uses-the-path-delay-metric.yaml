document: rfc-8233
kind: normative-requirement
summary: When a PCC uses the Path Delay metric in a PCReq message with a bound constraint, the B bit MUST be set to indicate a maximum for the Path Delay metric that must not be exceeded. When used to optimize path delay, the B bit MUST be cleared.
section: 3.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
