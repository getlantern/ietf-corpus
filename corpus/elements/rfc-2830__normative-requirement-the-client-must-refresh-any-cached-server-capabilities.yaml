document: rfc-2830
kind: normative-requirement
summary: The client MUST refresh any cached server capabilities information (e.g. root DSE) upon TLS session establishment to protect against active-intermediary attacks that may have altered pre-TLS capability data.
section: "3.7"
rfc2119_level: MUST
topics:
