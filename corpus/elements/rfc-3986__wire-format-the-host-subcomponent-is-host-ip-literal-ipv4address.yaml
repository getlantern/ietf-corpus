document: rfc-3986
kind: wire-format
summary: 'The host subcomponent is: host = IP-literal / IPv4address / reg-name. IPv6 and future IP literals are enclosed in square brackets: IP-literal = "[" ( IPv6address / IPvFuture ) "]". A "first-match-wins" rule disambiguates IPv4address from reg-name.'
section: 3.2.2
topics:
