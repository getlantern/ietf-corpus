document: rfc-3986
kind: wire-format
summary: 'The host subcomponent is: host = IP-literal / IPv4address / reg-name. IPv6 and future IP literals are enclosed in square brackets: IP-literal = "[" ( IPv6address / IPvFuture ) "]". IPv4 addresses use dotted-decimal notation (four decimal octets 0–255).'
