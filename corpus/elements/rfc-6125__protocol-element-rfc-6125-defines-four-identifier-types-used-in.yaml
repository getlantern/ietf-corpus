document: rfc-6125
kind: protocol-element
summary: 'RFC 6125 defines four identifier types used in PKIX certificates for application service identity: CN-ID (Common Name in subject field matching a DNS domain name form), DNS-ID (subjectAltName dNSName entry), SRV-ID (subjectAltName otherName of type SRVName), and URI-ID (subjectAltName uniformResourceIdentifier with scheme and host components).'
section: "1.8"
topics:
    - tls
    - pkix
    - security
    - dns
