document: rfc-4701
kind: protocol-element
summary: The DHCID RR is defined with mnemonic DHCID and type code 49, defined only in the IN class. It stores a DHCP client identity hash to unambiguously associate DNS domain names with DHCP clients, enabling conflict resolution in dynamic DNS updates.
