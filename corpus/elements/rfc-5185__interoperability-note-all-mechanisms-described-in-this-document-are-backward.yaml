document: rfc-5185
kind: interoperability-note
summary: All mechanisms described in this document are backward compatible with standard OSPF implementations. A router at the far end of a multi-area adjacency need only model the adjacency as a point-to-point link; however, symmetric configuration of both neighbors as multi-area adjacencies simplifies topology representation and troubleshooting.
