document: rfc-9803
kind: state-machine
summary: 'Out-of-band TTL changes: server operators MAY change TTL values outside the EPP <update> flow to address operational or security issues. Servers MAY also implement automatic TTL reset to default after a configurable period. When an out-of-band change occurs, servers MAY notify the sponsoring client via the EPP Change Poll Extension (RFC 8590).'
section: "4"
topics:
    - dns
