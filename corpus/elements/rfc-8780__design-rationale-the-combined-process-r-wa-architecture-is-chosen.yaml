summary: The Combined Process (R&WA) architecture is chosen as the base, where a single PCE handles both routing and wavelength assignment. This simplifies the PCC interface and reflects the interdependency between routing and wavelength selection in transparent optical networks, where wavelength continuity constrains path choice.
