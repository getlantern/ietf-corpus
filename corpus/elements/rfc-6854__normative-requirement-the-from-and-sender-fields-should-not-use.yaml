document: rfc-6854
kind: normative-requirement
summary: The 'From:' and 'Sender:' fields SHOULD NOT use group syntax; rather, 'From:' SHOULD use only mailbox-list syntax and 'Sender:' SHOULD use only mailbox syntax. Group syntax is defined as Limited Use.
section: "2.1"
rfc2119_level: SHOULD NOT
topics:
    - email
