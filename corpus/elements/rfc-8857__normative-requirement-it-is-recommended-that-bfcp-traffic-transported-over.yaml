document: rfc-8857
kind: normative-requirement
summary: It is RECOMMENDED that BFCP traffic transported over WebSocket be protected by using a Secure WebSocket connection (WSS using TLS over TCP). The BFCP WebSocket client MUST follow RFC 7525 procedures when setting up TLS.
