document: rfc-2067
kind: design-rationale
summary: 'Camp-on must be used in the initial 64-bit connection attempt because without it a rejection is ambiguous: it could mean the Destination lacks Cable B or is simply busy. Camp-on removes this ambiguity, allowing the Source to correctly interpret a rejection as a capability limitation rather than transient congestion.'
section: "8"
