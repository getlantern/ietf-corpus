document: rfc-4227
kind: design-rationale
summary: 'The boot message serves two purposes: resource identification (each channel provides access to a single resource) and feature negotiation (allowing optional SOAP features such as compression to be negotiated per-channel). This mirrors HTTP''s Host header and abs_path conventions.'
section: "2.1"
extracted_by: claude-sonnet-4-6
