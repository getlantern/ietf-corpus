document: rfc-1374
kind: normative-requirement
summary: All ARP requests shall be sent with I-field bit 28 (Double_Wide/W) set to zero, requesting a 32-bit connection; HIPPI-LE and Internet ARP messages should be sent together as a single HIPPI packet.
section: Address Resolution/ARP and RARP Message Format
rfc2119_level: MUST
topics:
    - ip
