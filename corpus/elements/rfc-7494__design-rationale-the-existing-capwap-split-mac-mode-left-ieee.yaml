document: rfc-7494
kind: design-rationale
summary: The existing CAPWAP Split MAC mode left IEEE 802.11 encryption/decryption location ambiguous (WTP or AC), causing interoperability failures between multi-vendor deployments. This document introduces the MAC Profile to eliminate that ambiguity by explicitly assigning encryption and dependent functions to one entity.
section: "1"
topics:
