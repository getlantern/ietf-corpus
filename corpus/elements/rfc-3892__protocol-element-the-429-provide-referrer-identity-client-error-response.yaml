document: rfc-3892
kind: protocol-element
summary: The 429 'Provide Referrer Identity' client error response is used by a refer target to indicate that a valid Referred-By token must be provided. The referee forwards this to the referrer via a NOTIFY containing a message/sipfrag body with 'SIP/2.0 429 Provide Referrer Identity'.
section: "5"
topics:
    - sip
