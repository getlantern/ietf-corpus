document: rfc-8846
kind: normative-requirement
summary: When <allowSubsetChoice> is true and the MCC references other captures, the Consumer MAY specify a subset via CONFIGURE, and the Provider MUST then include only that subset. If <allowSubsetChoice> is false or absent, the Consumer MUST NOT select a subset.
section: "11.9"
rfc2119_level: MUST
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
