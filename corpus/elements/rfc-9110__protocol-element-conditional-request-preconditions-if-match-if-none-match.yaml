document: rfc-9110
kind: protocol-element
summary: Conditional request preconditions—If-Match, If-None-Match, If-Modified-Since, If-Unmodified-Since, and If-Range—allow clients to make requests contingent on the current state of a resource as identified by ETags (strong or weak validators) or Last-Modified timestamps.
section: "13.1"
