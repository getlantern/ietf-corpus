document: rfc-8177
kind: security-consideration
summary: The YANG module MUST be accessed via NETCONF over SSH or RESTCONF over HTTPS (TLS). The NETCONF access control model (NACM, RFC 6536) restricts access; key strings are not accessible by default and require explicit NACM rules to configure or retrieve.
section: "5"
rfc2119_level: MUST
topics:
    - security
    - yang
    - netconf
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
