document: rfc-9300
kind: interoperability-note
summary: The LISP data plane protocol defined in RFC 9300 is not backwards compatible with RFC 6830 and has no explicit version field. Forward-compatibility for data plane capabilities is instead handled through the LISP control plane (RFC 9301) via new LISP Canonical Address Format (LCAF) types (RFC 8060), allowing an ITR to learn an ETR's capabilities before encapsulating.
section: "5.3"
topics:
