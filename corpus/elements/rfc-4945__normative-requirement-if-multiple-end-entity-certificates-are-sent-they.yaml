document: rfc-4945
kind: normative-requirement
summary: If multiple end-entity certificates are sent, they MUST have the same public key. Implementations SHOULD NOT send multiple end-entity certificates, and recipients SHOULD NOT be expected to iterate over them.
section: 3.3.9
rfc2119_level: MUST
topics:
    - ipsec
    - pkix
