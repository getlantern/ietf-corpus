document: rfc-3497
kind: wire-format
summary: 'The XYZ timing reference word is a 10-bit word (bit 9 always 1) carrying flags: F (field 1=0, field 2=1), V (field blanking=1), H (SAV=0, EAV=1), and six P bits (protected parity bits defined in SMPTE 292M Table 2). The EAV preamble is 3FF 000 000 XYZ; the SAV preamble is also 3FF 000 000 XYZ.'
