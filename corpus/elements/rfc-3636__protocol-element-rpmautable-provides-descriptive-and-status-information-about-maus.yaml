kind: protocol-element
summary: rpMauTable provides descriptive and status information about MAUs attached to repeater ports. Each entry is indexed by rpMauGroupIndex, rpMauPortIndex, and rpMauIndex, and contains MAU type, status, media availability, jabber state, and false carrier counters.
