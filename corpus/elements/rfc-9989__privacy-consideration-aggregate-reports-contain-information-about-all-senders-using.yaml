document: rfc-9989
kind: privacy-consideration
summary: Aggregate reports contain information about all senders using the Author Domain, including potentially sensitive data about mail volumes and sources. Domain Owners and PSOs should consider who receives these reports, since third-party Report Consumers can learn about an organization's internal mail streams.
section: "10.1"
topics:
    - email
    - privacy
