document: rfc-3606
kind: interoperability-note
summary: The ATM2-MIB requires concurrent use of the ATM-MIB (RFC 2515) and ATM-specific textual conventions (RFC 2514). It imports core types (AtmAddr, AtmVcIdentifier, AtmVpIdentifier, AtmTrafficDescrParamIndex, AtmInterfaceType, AtmIlmiNetworkPrefix) from ATM-TC-MIB and table entries from ATM-MIB.
section: "2.1"
