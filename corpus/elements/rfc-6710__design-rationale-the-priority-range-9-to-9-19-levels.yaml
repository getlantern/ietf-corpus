document: rfc-6710
kind: design-rationale
summary: 'The priority range -9 to 9 (19 levels) was chosen to: accommodate existing 3-level MTA implementations and the 6-level military use case as a minimum, provide extensibility for future use cases without further specification changes, and use zero as the intuitive ''normal'' default so negatives are below-normal and positives are above-normal.'
section: Appendix E
