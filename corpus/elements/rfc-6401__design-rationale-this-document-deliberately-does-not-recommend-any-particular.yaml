document: rfc-6401
kind: design-rationale
summary: This document deliberately does not recommend any particular merge strategy for Admission Priority (unlike RFC 3181, which recommends a specific strategy for Preemption Priority), because no single strategy is universally appropriate for admission control across multicast merges.
