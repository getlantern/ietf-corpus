document: rfc-3892
kind: interoperability-note
summary: In nested REFER scenarios (e.g., A refers B to send a REFER to C which sends an INVITE to D), the original Referred-By token from A passes through all intermediaries unchanged. B does not provide its own Referred-By token to C; A's token is forwarded by B and C all the way to D.
section: "7.4"
topics:
    - sip
