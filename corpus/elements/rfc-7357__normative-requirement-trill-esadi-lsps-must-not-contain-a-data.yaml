document: rfc-7357
kind: normative-requirement
summary: TRILL ESADI-LSPs MUST NOT contain a Data Label ID in their payload; the applicable Data Label is taken from the enclosing TRILL Data packet. If a VLAN or FGL ID field within an ESADI-LSP PDU includes a value, that field's contents MUST be ignored.
section: "2.3"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
