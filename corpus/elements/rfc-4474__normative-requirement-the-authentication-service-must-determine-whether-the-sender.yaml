document: rfc-4474
kind: normative-requirement
summary: The authentication service MUST determine whether the sender is authorized to claim the identity in the From header field by authenticating them, e.g., via Digest challenge (407) or by having the UA provision the domain's private key. Authorization of the From username is a matter of local policy.
section: "5"
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
