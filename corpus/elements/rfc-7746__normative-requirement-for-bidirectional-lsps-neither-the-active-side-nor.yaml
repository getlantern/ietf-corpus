document: rfc-7746
kind: normative-requirement
summary: For bidirectional LSPs, neither the active side nor the passive side MUST forward traffic through the LSP until its local LSP Self-ping session returns TRUE. Each side runs an independent session and may begin forwarding as soon as its own session succeeds, without waiting for the other side.
section: "5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
