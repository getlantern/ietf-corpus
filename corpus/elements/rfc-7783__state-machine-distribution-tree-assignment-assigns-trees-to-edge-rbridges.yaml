document: rfc-7783
kind: state-machine
summary: Distribution tree assignment assigns trees to edge RBridges sorted by IS-IS System ID in ascending order. If n >= k, each RBridge RBi is assigned trees where tree_number % k + 1 == i. If n < k, only RB1 through RBn participate in active-active forwarding; RBn+1 through RBk do not.
section: "5.1"
topics:
    - routing
    - multicast
