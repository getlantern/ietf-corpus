document: rfc-4149
kind: normative-requirement
summary: Implementers SHOULD NOT deploy SNMP versions prior to SNMPv3. Instead, SNMPv3 with full cryptographic mechanisms (authentication and privacy) is RECOMMENDED for managing this MIB module.
