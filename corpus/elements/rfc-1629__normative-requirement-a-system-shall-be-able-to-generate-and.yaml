document: rfc-1629
kind: normative-requirement
summary: A system shall be able to generate and forward data packets containing addresses in any format specified by ISO 8348. Within an IS-IS routing domain, the lower-order octets of the NSAP should be structured as ID and SEL fields; end systems that do not conform may require additional manual configuration and are subject to inferior routing performance.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
