document: rfc-7891
kind: interoperability-note
summary: For PIM Asserts, the route metric included in the Assert should be the route metric of the first Explicit RPF Vector address in the list. Because the first Explicit Vector should always be directly connected, the metric is likely zero and will typically not act as a tie breaker in Assert selection.
section: "8"
topics:
    - routing
    - multicast
