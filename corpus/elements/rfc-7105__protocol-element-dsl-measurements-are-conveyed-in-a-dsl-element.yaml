document: rfc-7105
kind: protocol-element
summary: 'DSL measurements are conveyed in a ''dsl'' element supporting four sub-types: L2TP (src, dest, session), RADIUS/AN (an, slot, port), Ethernet VLAN (stag, ctag), and ATM virtual circuit (vpi, vci). These allow an ISP-operated LIS to pass identifying information to an infrastructure-provider LIS that lacks knowledge of Device identifiers.'
section: "5.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
