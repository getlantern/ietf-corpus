document: rfc-3288
kind: normative-requirement
summary: Because BEEP provides an 8-bit-wide path, a transformative Content-Transfer-Encoding (e.g., 'base64' or 'quoted-printable') SHOULD NOT be used for multipart/related SOAP messages. MIME requires the 'Content-ID' header value to be globally unique.
section: "3"
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
