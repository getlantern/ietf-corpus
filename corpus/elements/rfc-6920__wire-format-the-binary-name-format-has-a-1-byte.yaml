document: rfc-6920
kind: wire-format
summary: The binary name format has a 1-byte header with a 2-bit reserved field (Res, MUST be zero) and a 6-bit Suite ID, followed by the (possibly truncated) hash value. The Suite ID encodes both the hash algorithm and truncation length as registered in the IANA Named Information Hash Algorithm Registry.
section: "6"
