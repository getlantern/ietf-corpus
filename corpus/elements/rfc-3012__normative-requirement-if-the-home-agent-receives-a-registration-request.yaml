document: rfc-3012
kind: normative-requirement
summary: If the Home Agent receives a Registration Request containing the MN-FA Challenge extension and recognizes it, it MUST include the Challenge extension in the Registration Reply, placed after the Mobile-Home authentication extension.
section: "3.4"
rfc2119_level: MUST
