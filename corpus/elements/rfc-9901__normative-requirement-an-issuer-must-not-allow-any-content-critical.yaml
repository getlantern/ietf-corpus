document: rfc-9901
kind: normative-requirement
summary: An Issuer MUST NOT allow any content critical to evaluating authenticity or validity to be selectively disclosable, including iss, exp, nbf, and cnf. Verifiers MUST ensure that all claims they deem necessary for validity checking are present and disclosed during validation.
section: "9.7"
rfc2119_level: MUST NOT
