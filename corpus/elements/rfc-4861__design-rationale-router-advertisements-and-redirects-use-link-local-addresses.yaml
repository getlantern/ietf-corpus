document: rfc-4861
kind: design-rationale
summary: Router Advertisements and Redirects use link-local addresses to identify routers, making it possible for hosts to maintain router associations during site renumbering to new global prefixes. Unlike IPv4 router discovery, RA messages carry no preference field because NUD detects dead routers and switches to a working one.
section: "3.1"
topics:
