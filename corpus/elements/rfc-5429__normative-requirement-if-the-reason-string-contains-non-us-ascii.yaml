document: rfc-5429
kind: normative-requirement
summary: If the 'reason' string contains non-US-ASCII characters and no SMTP extension for UTF-8 reply text has been negotiated, the Sieve engine MUST replace the reason string with an implementation-defined US-ASCII-only string at the protocol level.
section: 2.1.1
rfc2119_level: MUST
topics:
    - email
