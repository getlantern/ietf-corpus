document: rfc-2734
kind: design-rationale
summary: The MCAP 100 ms delay between the initial advertisement of a newly allocated channel and first data transmission allows all prospective receivers on the bus to observe the channel advertisement before data arrives, preventing silent packet loss at receivers that have not yet tuned to the new channel.
section: "9.4"
topics:
