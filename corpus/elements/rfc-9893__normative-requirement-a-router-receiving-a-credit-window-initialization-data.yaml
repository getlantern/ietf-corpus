document: rfc-9893
kind: normative-requirement
summary: A router receiving a Credit Window Initialization Data Item MUST locate or initialize the credit window for the indicated FID. If an associated credit window is found, the router MUST update it; if the resultant credit value exceeds the Credit Window Max Size, the max size is used as the new window size.
section: 2.3.1
rfc2119_level: MUST
topics:
    - qos
    - congestion
