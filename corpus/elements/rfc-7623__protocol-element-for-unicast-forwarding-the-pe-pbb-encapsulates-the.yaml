document: rfc-7623
kind: protocol-element
summary: For unicast forwarding, the PE PBB-encapsulates the frame using the site's B-MAC as source address and the C-MAC-to-B-MAC binding (learned via reverse data-plane learning) as the B-MAC destination. The frame is then encapsulated with an LSP tunnel label and an EVPN label associated with the B-MAC destination.
section: 6.4.1
topics:
    - mpls
    - routing
