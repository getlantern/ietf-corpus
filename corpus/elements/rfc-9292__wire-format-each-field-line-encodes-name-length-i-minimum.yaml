document: rfc-9292
kind: wire-format
summary: Each Field Line encodes Name Length (i, minimum 1), Name bytes, Value Length (i), and Value bytes. The Name Length minimum of 1 distinguishes field lines from the Content Terminator value of 0 in indeterminate-length sections.
