document: rfc-6737
kind: normative-requirement
summary: When Diameter is run over SCTP, which allows connections to span multiple interfaces and IP addresses, the CUR message MUST contain one Host-IP-Address AVP for each potential IP address that may be locally used when transmitting Diameter messages.
section: 4.1.1
rfc2119_level: MUST
topics:
    - diameter
    - sctp
