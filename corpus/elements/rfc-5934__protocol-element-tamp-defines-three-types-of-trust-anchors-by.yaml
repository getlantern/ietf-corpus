document: rfc-5934
kind: protocol-element
summary: 'TAMP defines three types of trust anchors by function: apex (the single ultimate authority over a trust anchor store, unconstrained), management (used to validate TAMP messages and signed firmware), and identity (used to validate certification paths for non-management applications). All trust anchors are distinguished by their public key.'
