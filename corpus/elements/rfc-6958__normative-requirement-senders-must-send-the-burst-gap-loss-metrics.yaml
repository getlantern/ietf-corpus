document: rfc-6958
kind: normative-requirement
summary: Senders MUST send the Burst/Gap Loss Metrics Block in the same compound RTCP packet as the Measurement Information Block. Receivers MUST verify that the measurement period is received in the same compound RTCP packet; if not, the Metrics Block MUST be discarded.
section: "3"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
