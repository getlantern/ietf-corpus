document: rfc-9471
kind: protocol-element
summary: Glue records are A or AAAA address records for delegation name servers placed in the additional section of a referral response. At the time of writing, addresses (A or AAAA records) for a delegation's authoritative name servers are the only type of glue defined for the DNS.
section: "1"
