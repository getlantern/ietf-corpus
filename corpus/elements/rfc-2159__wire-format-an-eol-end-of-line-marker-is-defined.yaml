document: rfc-2159
kind: wire-format
summary: An EOL (End-of-Line) marker is defined as the bit sequence 000000000001 (eleven zeroes and a one), as specified by T.4. Each page boundary is delimited by exactly six consecutive EOLs that MUST start on a byte boundary; the image bit stream is zero-padded as needed to achieve byte alignment.
section: "2.2"
topics:
