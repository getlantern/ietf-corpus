document: rfc-9777
kind: normative-requirement
summary: When sending a Query, an MLDv2 implementation MUST NOT include additional octets beyond the defined fields. When receiving a Query or Report with extra octets indicated by the IPv6 Payload Length, implementations MUST include them in the checksum computation but MUST otherwise ignore them.
section: 5.1.12
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
