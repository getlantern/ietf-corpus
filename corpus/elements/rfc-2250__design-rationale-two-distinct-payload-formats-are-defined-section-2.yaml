summary: 'Two distinct payload formats are defined: Section 2 encapsulates MPEG System/Transport/Program streams to maximize interoperability with native MPEG System environments (TIU/RIU), while Section 3 encapsulates Elementary Streams directly in RTP to maximize compatibility with Internet architecture and other RTP media streams (TAES/RAES).'
