document: rfc-5990
kind: security-consideration
summary: Implementations MUST protect the RSA private key and the content-encryption key. Compromise of the RSA private key may result in disclosure of all messages protected with that key; compromise of the content-encryption key may result in disclosure of the associated encrypted content.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
