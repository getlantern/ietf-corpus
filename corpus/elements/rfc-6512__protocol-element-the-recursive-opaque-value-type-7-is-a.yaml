document: rfc-6512
kind: protocol-element
summary: The Recursive Opaque Value (Type 7) is a new mLDP opaque value type whose value field encodes an entire P2MP or MP2MP FEC element. It enables a PE router to embed the original FEC (with the true root) inside an outer FEC whose root is a BGP next-hop reachable by the BGP-free core.
section: "2"
topics:
