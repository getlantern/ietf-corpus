document: rfc-5654
kind: normative-requirement
summary: The MPLS-TP data plane MUST be a subset of the MPLS data plane as defined by IETF. When MPLS offers multiple options, MPLS-TP SHOULD select the minimum (necessary and sufficient) subset applicable to a transport network application.
section: "2.1"
rfc2119_level: MUST
topics:
    - mpls
