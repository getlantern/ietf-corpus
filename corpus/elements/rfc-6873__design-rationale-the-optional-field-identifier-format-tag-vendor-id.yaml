document: rfc-6873
kind: design-rationale
summary: The optional field identifier format (Tag@Vendor-ID) is modeled after the syslog protocol's private use option (RFC 5424 Section 6.3.2) and uses IANA Private Enterprise Numbers (PEN) to create a globally unique namespace for vendor-specific SIP CLF extensions, avoiding collision without requiring central registration of each field.
section: "4.4"
topics:
    - sip
    - realtime
    - syslog
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
