document: rfc-7050
kind: interoperability-note
summary: DNS64 cannot perform IPv6 address synthesis for nodes running DNSSEC-validating resolvers; those nodes must perform synthesis locally using a discovered Pref64::/n. This is the primary motivation for the discovery mechanism.
