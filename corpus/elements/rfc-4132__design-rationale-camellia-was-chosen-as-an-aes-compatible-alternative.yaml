document: rfc-4132
kind: design-rationale
summary: Camellia was chosen as an AES-compatible alternative because it supports the same 128-bit block size and 128/192/256-bit key sizes as AES, offering comparable speed in both software and hardware implementations. Its small hardware footprint makes it suitable for low-power embedded and smart card environments where AES may be less efficient.
