document: rfc-4995
kind: wire-format
summary: 'The Feedback element format starts with type octet (11110|Code), an optional Size octet when Code=0, optional Add-CID or large CID, and a variable-length FEEDBACK data field (FEEDBACK-1: 1 octet; FEEDBACK-2: ≥2 octets with 2-bit Acktype).'
section: 5.2.4.1
