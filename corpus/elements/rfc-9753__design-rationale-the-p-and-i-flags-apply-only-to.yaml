document: rfc-9753
kind: design-rationale
summary: The P and I flags apply only to an entire PCEP object; they cannot be applied at the granularity of optional TLVs encoded within a PCEP object. This scope limitation is inherited from RFC 5440 and is explicitly preserved unchanged by this document.
section: "2.1"
topics:
