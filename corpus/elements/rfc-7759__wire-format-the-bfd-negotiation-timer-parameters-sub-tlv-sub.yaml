summary: 'The BFD Negotiation Timer Parameters Sub-TLV (sub-type 102, Length 12) carries three 32-bit fields: Acceptable Min. Asynchronous TX interval, Acceptable Min. Asynchronous RX interval (both in microseconds), and Required Echo TX Interval (microseconds, default 0 meaning echo not supported).'
