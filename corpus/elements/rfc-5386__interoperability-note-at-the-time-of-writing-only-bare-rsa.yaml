document: rfc-5386
kind: interoperability-note
summary: 'At the time of writing, only bare RSA public key CERT payloads are defined for BTNS, meaning BTNS operates only with RSA public keys. Suitable IKEv2 AUTH methods are RSA Digital Signature (method #1) and DSS Digital Signature (method #3).'
