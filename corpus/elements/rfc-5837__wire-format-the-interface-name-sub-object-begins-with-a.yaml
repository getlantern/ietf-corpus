document: rfc-5837
kind: wire-format
summary: The Interface Name Sub-Object begins with a 1-octet length field, followed by up to 63 octets of interface name. The total length MUST be a multiple of 4 octets, MUST NOT exceed 64 octets, and the name MUST be padded with ASCII NUL characters to reach a 4-octet boundary.
section: "4.3"
topics:
    - ip
