document: rfc-3953
kind: interoperability-note
summary: SIP (RFC 3261) is one protocol that can convey presence information and manage subscriptions/notifications via pres URIs, but the 'pres' URI scheme is protocol-agnostic and the mechanism in RFC 3861 is used to discover mutually supported presence protocols.
