document: rfc-5040
kind: protocol-element
summary: The Terminate Message carries structured error diagnostics including the offending DDP Segment Length, the Terminated DDP Header (if available), and for RDMA Read Request errors, an updated Terminated RDMA Header reflecting the current Data Sink and Data Source Tagged Offsets and remaining data size at the time of termination.
