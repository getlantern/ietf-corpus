document: rfc-3813
kind: protocol-element
summary: mplsInterfaceTable represents each MPLS-capable interface on an LSR. It is indexed by InterfaceIndexOrZero; index 0 represents the per-platform label space. Each entry carries label range limits (min/max in and out), total and available bandwidth (in Kbps), and a participation type bitmap indicating per-platform and/or per-interface label space usage.
section: "5.1"
topics:
