document: rfc-8159
kind: normative-requirement
summary: The ingress router encapsulates the entire Ethernet frame without the preamble and FCS per RFC 4719. The L2-specific sublayer MAY be carried if VCCV and/or frame sequencing is required, but SHOULD NOT be carried otherwise.
