document: rfc-4577
kind: wire-format
summary: 'The OSPF Route Type Extended Communities attribute (type 0306) carries six bytes of data: Area Number (4 bytes, 0 for external routes), Route Type (1 byte: 1/2 for intra-area, 3 for inter-area, 5 for external, 7 for NSSA), and Options (1 byte, LSB indicates type 2 metric for route types 5 and 7).'
