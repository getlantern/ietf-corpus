document: rfc-5905
kind: protocol-element
summary: The clock filter algorithm maintains a shift register of the eight most recent (offset, delay, dispersion, time) samples per server and selects the sample with the smallest delay as the best estimate. It outputs the statistics theta, delta, epsilon, and psi that are passed to the system process.
