document: rfc-8871
kind: protocol-element
summary: The SRTP double transform (RFC 8723) is used by endpoints to apply both E2E and HBH encryption contexts in a single SRTP operation. Media Distributors use only the corresponding single AES-GCM transform keyed with the appropriate HBH keys.
section: "4.1"
