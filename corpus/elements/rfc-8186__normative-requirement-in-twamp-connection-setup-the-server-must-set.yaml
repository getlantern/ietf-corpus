document: rfc-8186
kind: normative-requirement
summary: In TWAMP connection setup, the Server MUST set the PTPv2 Timestamp flag to 1 in its greeting message if the Session-Reflector can produce PTPv2 timestamps; otherwise the flag MUST be set to 0.
