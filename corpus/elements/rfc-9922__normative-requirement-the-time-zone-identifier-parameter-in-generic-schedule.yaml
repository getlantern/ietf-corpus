document: rfc-9922
kind: normative-requirement
summary: The 'time-zone-identifier' parameter in generic-schedule-params MUST be specified if any date and time values are in local time format. It MUST NOT be applied to date and time values specified in UTC or time zone offset to UTC format.
section: 3.3.1
rfc2119_level: MUST
topics:
