document: rfc-5055
kind: protocol-element
summary: The basic validation algorithm (id-svp-basicValAlg, pkix arc 19.3) MUST implement RFC 5280 Section 6 path validation for public key certificates and RFC 3281 Section 5 for attribute certificates. All other validation algorithms MUST generate results compliant with the basic algorithm; none of its requirements may be omitted, though algorithms MAY reject paths that the basic algorithm would accept.
section: 3.2.4.2.1
topics:
    - pkix
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
