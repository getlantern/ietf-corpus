document: rfc-4860
kind: security-consideration
summary: Malicious modification of the IP protocol number in a Path message traversing an aggregation region would cause the message to be ignored by all subsequent RSVP devices, preventing reservations. Implementations SHOULD restrict this facility to Path, PathTear, and ResvConf messages only.
section: "6"
topics:
    - security
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
