document: rfc-4480
kind: security-consideration
summary: RPID reveals substantially more sensitive information about a presentity than basic PIDF (activities, mood, location type, time zone, etc.). Systems MUST offer mechanisms for selective disclosure to particular watchers and for inspecting automatically generated presence data before publication.
section: "9"
topics:
    - security
    - privacy
    - realtime
    - sip
