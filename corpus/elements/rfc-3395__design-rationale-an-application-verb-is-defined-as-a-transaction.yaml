document: rfc-3395
kind: design-rationale
summary: An application verb is defined as a transaction type, not a single PDU opcode, because a single verb (e.g., SNMP Get) may involve multiple PDU types (Get-PDU and Response-PDU) and may span multiple protocol directory entries (e.g., ftp and ftp-data).
