document: rfc-9767
kind: normative-requirement
summary: When deriving a downstream token, the RS MUST identify itself with its own key in the client field and sign the request. The AS MUST determine that the token being presented is appropriate for use at the RS making the token chaining request.
section: "4"
rfc2119_level: MUST
topics:
    - oauth
    - security
