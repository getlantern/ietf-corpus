document: rfc-9129
kind: protocol-element
summary: The graceful restart feature models restart configuration (enabled, helper-enabled, restart-interval, helper-strict-lsa-checking) and exposes restart status via the restart-status-type enumeration (not-restarting, planned-restart, unplanned-restart) and exit reason (none, in-progress, completed, timed-out, topology-changed), covering RFC 3623 (OSPFv2) and RFC 5187 (OSPFv3).
section: "2.5"
