document: rfc-7513
kind: security-consideration
summary: 'Fragmented DHCP messages pose a risk: a SAVI device may be unable to inspect the full message payload in a fragment, allowing an attacker to bypass DHCP snooping checks by deliberately fragmenting DHCP packets. Implementations should handle or drop fragmented DHCP messages appropriately.'
section: "11.7"
topics:
    - security
    - ip
