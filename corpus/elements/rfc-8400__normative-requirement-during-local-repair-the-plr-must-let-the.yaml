document: rfc-8400
kind: normative-requirement
summary: During local repair, the PLR MUST let the upstream part of the primary LSP stay alive after the primary egress node fails by sending Resv messages upstream; when a bypass LSP protects the primary egress node, the PLR MUST NOT send any Path message for the primary LSP through the bypass LSP to the backup egress node.
section: 5.4.4
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
