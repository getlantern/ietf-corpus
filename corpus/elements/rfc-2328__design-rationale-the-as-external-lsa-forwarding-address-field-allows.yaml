document: rfc-2328
kind: design-rationale
summary: The AS-external-LSA 'forwarding address' field allows an ASBR to direct traffic directly to a non-OSPF next-hop router, avoiding an extra hop through the advertising ASBR. It also enables interior routers to function as 'route servers' that redistribute external routes with correct exit points.
section: "2.3"
topics:
    - routing
