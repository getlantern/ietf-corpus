summary: 'The Content-Format type field in each multipart-part is an unsigned integer of size 2 (uint .size 2), and the part is either a byte string or null. The CDDL definition is: multipart-core = [* multipart-part]; multipart-part = (type: uint .size 2, part: bytes / null).'
