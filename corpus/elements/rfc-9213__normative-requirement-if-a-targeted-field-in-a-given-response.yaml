document: rfc-9213
kind: normative-requirement
summary: If a targeted field in a given response is empty or a parsing error is encountered, that field MUST be ignored by the cache — it behaves as if the field were not present, falling back to other cache-control mechanisms.
section: "2.1"
rfc2119_level: MUST
topics:
    - http
