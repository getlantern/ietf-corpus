document: rfc-9184
kind: protocol-element
summary: BGP Transitive Extended Community type values 0x80, 0x81, and 0x82 are defined as Generic Transitive Extended Community (Parts 1, 2, and 3). Sub-types for each are defined in their respective sub-type registries. The range 0x00-0x3F and 0x80-0x82 use First Come First Served allocation; 0x83-0x8F remain experimental; 0x90-0xBF require Standards Action.
section: "2.1"
topics:
