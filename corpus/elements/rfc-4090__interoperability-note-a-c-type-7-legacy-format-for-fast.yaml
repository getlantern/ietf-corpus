document: rfc-4090
kind: interoperability-note
summary: A C-Type 7 legacy format for FAST_REROUTE (Class-Num 205) is documented for pre-standard implementations. It lacks the Flags byte and has a Reserved byte instead. C-Type 7 is reserved in the IANA registry to avoid breaking these deployments.
