document: rfc-2183
kind: security-consideration
summary: A receiving MUA must take care that the sender's suggested filename does not represent a hazard, including creating startup or system files, overwriting existing files, placing executables in command search paths, or sending files to a pipe. The MUA should not name or place the file such that it will be interpreted or executed without explicit user action.
section: "5"
topics:
