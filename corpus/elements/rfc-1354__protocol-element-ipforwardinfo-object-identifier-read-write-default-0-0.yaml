document: rfc-1354
kind: protocol-element
summary: ipForwardInfo (OBJECT IDENTIFIER, read-write, default {0 0}) is a reference to MIB definitions specific to the routing protocol responsible for this route. If absent, it MUST be set to { 0 0 }, a syntactically valid OID that all ASN.1/BER implementations must support.
section: "4.1"
topics:
    - routing
    - snmp
