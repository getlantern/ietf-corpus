document: rfc-2971
kind: interoperability-note
summary: Intermediaries (proxies, firewalls) that modify an IMAP session must also change the ID command to advertise their presence. A firewall MAY block specific fields but SHOULD NOT disable the extension entirely or unconditionally remove the client or server list.
