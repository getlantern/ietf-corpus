document: rfc-9366
kind: normative-requirement
summary: A SIP message MAY contain more than one Reason value. If the registered protocol for the Reason value specifies what it means for multiple values to occur in one message, more than one value for that protocol MAY be present.
section: "3"
rfc2119_level: MAY
topics:
