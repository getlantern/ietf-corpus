document: rfc-2640
kind: normative-requirement
summary: To avoid data loss, clients and servers SHOULD use UTF-8 encoded pathnames when they cannot convert them to a usable code set; when the encoding cannot be determined, raw bytes SHOULD be used.
section: "3.1"
rfc2119_level: SHOULD
