document: rfc-4188
kind: wire-format
summary: dot1dStaticAllowedToGoTo is encoded as an OCTET STRING up to 512 bytes; the first octet covers ports 1-8, second covers ports 9-16, etc., with the most significant bit representing the lowest-numbered port in each octet. This allows representing up to 4096 ports.
