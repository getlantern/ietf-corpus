document: rfc-7671
kind: wire-format
summary: TLSA records using a matching type of Full(0) are NOT RECOMMENDED because even a single certificate is generally too large for reliable DNS UDP delivery; digest-based matching types such as SHA2-256(1) SHOULD be used instead.
section: 10.1.2
topics:
    - dns
    - tls
    - security
