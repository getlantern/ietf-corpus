document: rfc-7904
kind: interoperability-note
summary: Keepalives for NAT/firewall traversal are a mandatory component of ICE (RFC 5245 Section 10), so no additional operations are required. Applications needing session-level keepalives should use SIP keep-alive techniques per RFC 5626 Section 3.5.
section: "5.2"
topics:
    - sip
    - realtime
    - nat
