document: rfc-4604
kind: normative-requirement
summary: An SSM-aware host MUST NOT allow its IGMPv3 or MLDv2 report to be suppressed by an older-version report when operating on an SSM address (MODIFICATION). Suppression in this scenario would allow an attacker to deny SSM service to other hosts on the link.
section: 2.2.1
rfc2119_level: MUST NOT
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
