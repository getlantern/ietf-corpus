document: rfc-9457
kind: protocol-element
summary: The 'about:blank' problem type is registered as the default type URI. When used, it indicates the problem has no additional semantics beyond the HTTP status code. The title SHOULD be the same as the recommended HTTP status phrase for that code (e.g., 'Not Found' for 404).
section: 4.2.1
