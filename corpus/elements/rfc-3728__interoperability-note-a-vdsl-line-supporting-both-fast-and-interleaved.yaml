document: rfc-3728
kind: interoperability-note
summary: 'A VDSL line supporting both fast and interleaved channels requires three ifTable entries: one for the physical line (ifType=97), one for fast (ifType=125), and one for interleaved (ifType=124). The ifStackTable is used to represent the stacking relationship between these entries.'
