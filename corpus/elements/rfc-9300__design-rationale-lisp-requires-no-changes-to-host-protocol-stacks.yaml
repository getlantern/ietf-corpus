document: rfc-9300
kind: design-rationale
summary: LISP requires no changes to host protocol stacks or underlay routers. Hosts continue using EIDs as normal IP addresses; only Tunnel Routers (ITRs/ETRs) at the edges of LISP sites intercept and encapsulate/decapsulate packets. This incremental deployability was a core architectural goal.
section: "1"
topics:
