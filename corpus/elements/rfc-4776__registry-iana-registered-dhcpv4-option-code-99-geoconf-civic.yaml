summary: IANA registered DHCPv4 option code 99 (GEOCONF_CIVIC) and DHCPv6 option code 36 (OPTION_GEOCONF_CIVIC) for the civic address options. This document corrects an error in RFC 4676, which had assigned an incorrect numeric value to the DHCPv6 option-code.
