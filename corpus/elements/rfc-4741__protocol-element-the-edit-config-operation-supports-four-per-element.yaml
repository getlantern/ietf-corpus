document: rfc-4741
kind: protocol-element
summary: 'The <edit-config> operation supports four per-element ''operation'' attribute values: merge (default), replace, create (fails with data-exists if present), and delete. The ''default-operation'' parameter sets the operation for elements without an explicit attribute.'
