document: rfc-9127
kind: protocol-element
summary: 'The ''iana-bfd-types'' YANG module defines the ''auth-type'' typedef enumerating BFD authentication types (0–255): reserved, simple-password, keyed-md5, meticulous-keyed-md5, keyed-sha1, meticulous-keyed-sha1. Values are maintained in the IANA ''BFD Authentication Types'' registry.'
section: "2.11"
topics:
