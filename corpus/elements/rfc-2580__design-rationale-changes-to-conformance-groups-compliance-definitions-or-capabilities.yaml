document: rfc-2580
kind: design-rationale
summary: Changes to conformance groups, compliance definitions, or capabilities definitions that alter their semantics are not permitted in-place; such changes require defining a new definition with a new descriptor and new OBJECT IDENTIFIER. Only non-semantic changes (status deprecation, reference updates, description clarifications, editorial changes) are allowed in existing definitions.
