document: rfc-2244
kind: design-rationale
summary: Client simplicity was explicitly preferred over server or protocol simplicity because many applications were expected to become ACAP-enabled. Features like server-side sorting, selective fetching, change notification, and modification times were added to reduce client complexity in handling potentially large datasets over slow or intermittent connections.
section: "1.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
