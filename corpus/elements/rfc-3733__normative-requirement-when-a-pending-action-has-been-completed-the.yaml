document: rfc-3733
kind: normative-requirement
summary: When a pending action has been completed, the pendingCreate, pendingDelete, pendingTransfer, or pendingUpdate status MUST be removed and all clients involved in the transaction MUST be notified using a service message.
section: "2.2"
rfc2119_level: MUST
