document: rfc-9588
kind: normative-requirement
summary: A KDC offering SPAKE pre-authentication as a stand-alone mechanism MUST supply a PA-ETYPE-INFO2 value containing a single ETYPE-INFO2-ENTRY, ensuring the initial KDC pre-authentication state contains a singular reply key.
section: "3.1"
rfc2119_level: MUST
topics:
