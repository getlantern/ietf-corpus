document: rfc-7795
kind: state-machine
summary: S-PE protection switching is driven by matching local and remote Up/Down status and Preferential Forwarding status on the multi-homed side. On AC failure, the affected T-PE sends a PW status Notification (Down); the peer T-PE advertises Active; the S-PE selects the new active PW segment without changing status toward the single-homed side as long as any Active segment remains.
section: "4.1"
topics:
    - mpls
