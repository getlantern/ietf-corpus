document: rfc-9375
kind: protocol-element
summary: The link-level augmentation defines a 'perf-mon' container with configurable percentile parameters (low, intermediate, high), a 'measurement-interval' in seconds, and a 'pm' list keyed by 'pm-type'. Each PM entry carries start/end times, pm-source, one-way loss/delay/jitter statistics, and per-class statistics.
