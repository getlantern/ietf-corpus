document: rfc-9157
kind: normative-requirement
summary: Any algorithm listed in the DNSKEY-IANA and DS-IANA registries that is not mentioned in RFC 8624 MAY be implemented. An algorithm is specified as MAY in RFC 8624 only when it has been downgraded from MUST or RECOMMENDED.
section: "3"
rfc2119_level: MAY
topics:
