document: rfc-4325
kind: normative-requirement
summary: Where information is available via HTTP or FTP, accessLocation MUST be a uniformResourceIdentifier and the URI MUST point to a certificate-containing file with either a .cer (single DER-encoded certificate) or .p7c (certs-only CMS message) extension.
section: "2"
rfc2119_level: MUST
topics:
