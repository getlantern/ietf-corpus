document: rfc-1582
kind: design-rationale
summary: Periodic broadcasting of routing updates on demand circuits (X.25, ISDN) is expensive because circuits must be kept open to every destination for the duration of routing traffic, even when no user data is flowing. On a network of N routers, N*(N-1) updates are sent over N*(N-1)/2 connections every broadcast period.
section: "1"
topics:
    - routing
