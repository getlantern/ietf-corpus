summary: The SECONDARY_RECORD_ROUTE object uses class number 201 (11bbbbbb range) with the same format as RECORD_ROUTE (class 21), and also supports the protection subobject (type 37). Both SERO and SRRO share the same subobject definitions as their ERO/RRO counterparts.
