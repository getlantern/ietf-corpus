document: rfc-7482
kind: protocol-element
summary: 'RDAP defines three search path segments using plural forms: ''domains'' (search domain names), ''nameservers'' (search nameservers), and ''entities'' (search entities). Search queries are formed as HTTP query strings appended to the plural segment, e.g., ''domains?name=example*.com''.'
section: "3.2"
