document: rfc-4482
kind: security-consideration
summary: Implementors must verify the identity in the referenced server's certificate against the URI (e.g., for https URIs, the domain must match the subjectAltName per RFC 2818 section 3.1); failure to verify MUST prevent use of the referenced content.
section: "8"
topics:
