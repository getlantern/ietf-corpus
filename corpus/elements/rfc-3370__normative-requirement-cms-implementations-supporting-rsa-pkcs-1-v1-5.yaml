document: rfc-3370
kind: normative-requirement
summary: 'CMS implementations supporting RSA (PKCS #1 v1.5) signatures MUST implement SHA-1, MUST support the rsaEncryption signature value algorithm identifier, and SHOULD also support MD5. The rsaEncryption, sha1WithRSAEncryption, and md5WithRSAEncryption AlgorithmIdentifier parameters fields MUST be NULL.'
section: "3.2"
rfc2119_level: MUST
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
