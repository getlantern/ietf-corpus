document: rfc-6525
kind: normative-requirement
summary: The default behavior for an SCTP endpoint is to deny all incoming re-configuration requests. Applications MUST explicitly enable processing via the SCTP_ENABLE_STREAM_RESET socket option before requests will be honored.
section: 6.3.1
rfc2119_level: MUST
topics:
    - sctp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
