document: rfc-5542
kind: state-machine
summary: 'PwOperStatusTC defines six operational states for a pseudowire: up(1) — passing packets; down(2) — signaling incomplete or service-level fault; testing(3) — admin test mode; dormant(4) — pending external event; notPresent(5) — missing configuration or hardware; lowerLayerDown(6) — underlying PSN interface not up.'
