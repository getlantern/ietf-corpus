document: rfc-8765
kind: design-rationale
summary: The guiding principle is that clients using DNS Push Notifications will receive the same results as sufficiently rapid polling, just more efficiently. Subscription matching rules are identical to existing DNS query matching rules (RFC 1034), including case-insensitive name comparison and CNAME handling.
section: "2"
