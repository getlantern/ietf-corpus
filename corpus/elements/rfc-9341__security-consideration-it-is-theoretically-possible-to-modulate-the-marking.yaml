document: rfc-9341
kind: security-consideration
summary: It is theoretically possible to modulate the marking bit pattern to serve as a covert channel for an on-path observer, though this would have a very low data rate if it is to avoid adversely affecting measurement systems that monitor the marking. The controlled-domain constraint limits exposure.
