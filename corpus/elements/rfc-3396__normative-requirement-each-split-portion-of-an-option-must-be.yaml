document: rfc-3396
kind: normative-requirement
summary: Each split portion of an option MUST be stored in the aggregate option buffer as if it were a normal variable-length option as described in RFC 2132. The length fields of each split portion MUST add up to the total length of the option data, and the option code field in each split portion MUST be the same.
section: "6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
