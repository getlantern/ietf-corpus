document: rfc-8808
kind: protocol-element
summary: The 'factory-default' datastore is an optional read-only datastore holding preset initial configuration used to initialize a server's configuration. A device MAY implement factory-reset without implementing this datastore, which only removes the ability to programmatically determine the factory default configuration.
