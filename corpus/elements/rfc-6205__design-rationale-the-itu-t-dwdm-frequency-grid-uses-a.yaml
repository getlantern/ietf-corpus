document: rfc-6205
kind: design-rationale
summary: The ITU-T DWDM frequency grid uses a formula (193.1 THz + n * channel spacing) rather than an index because the grids are not numbered and change with evolving frequency spacing technology. An index would therefore not be appropriate.
section: "3.1"
topics:
