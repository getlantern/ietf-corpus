document: rfc-9784
kind: security-consideration
summary: All security considerations from RFC 7432 (BGP MPLS-Based EVPN) and RFC 7623 (PBB-EVPN) apply directly to this document. No new security considerations are introduced because vES advertisements and processing of ES routes follow the same procedures as physical ESs in those RFCs.
