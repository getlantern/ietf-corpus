document: rfc-5644
kind: protocol-element
summary: 'Type-P-Segment-Packet-Loss-Stream between Ha and Hb is: Lk=0 if both Ha and Hb observed the packet, Lk=1 if Ha observed it but Hb did not, and undefined if neither observed it; the metric is invalid if the packet reached Dst but was deemed lost between Ha and Hb.'
