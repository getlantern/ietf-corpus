document: rfc-5926
kind: protocol-element
summary: 'TCP-AO Key Derivation Functions (KDFs) take a Master_Key, a Context (connection-specific binary string as defined in RFC 5925 Section 5.2), and an Output_Length (in bits) to produce a Traffic_Key. The interface is: Traffic_Key = KDF_alg(Master_Key, Context, Output_Length).'
section: "3.1"
topics:
