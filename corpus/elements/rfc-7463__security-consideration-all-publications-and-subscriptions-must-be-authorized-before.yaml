document: rfc-7463
kind: security-consideration
summary: All publications and subscriptions must be authorized before they are accepted to prevent UAs outside the group from selecting, seizing, or manipulating appearance numbers. Registrar and Appearance Agent must accept credentials of the shared AOR or the individual user depending on the domain's authorization policy.
