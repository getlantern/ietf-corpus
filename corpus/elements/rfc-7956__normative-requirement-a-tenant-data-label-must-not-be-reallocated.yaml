document: rfc-7956
kind: normative-requirement
summary: A tenant Data Label MUST NOT be reallocated to a new tenant until a reasonable time — for example, twice the IS-IS Holding Time in use — has passed, allowing in-flight traffic using the old label to be discarded and preventing its delivery into the wrong tenant's routing instance.
section: "5.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
