document: rfc-9461
kind: protocol-element
summary: 'Two identity concepts are distinguished: the "binding authority" (service name and optional port used as input to Port Prefix Naming) and the "authentication name" (used for secure transport authentication). The authentication name MUST be a DNS hostname or literal IP address, and defaults to the service name from the binding authority.'
section: "3"
topics:
