document: rfc-2743
kind: design-rationale
summary: GSS-API defines no initialization calls, requiring implementations to be self-initializing. This avoids requiring callers to invoke setup routines before using the API, improving application portability and eliminating a class of usage errors.
section: 1.2.6
topics:
    - security
