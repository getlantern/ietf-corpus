document: rfc-7306
kind: registry
summary: 'A new ''RDMAP DDP Untagged Queue Numbers'' registry is created under ''Remote Direct Data Placement (RDDP)''. Values are 32-bit codes assigned by Standards Action. Initial contents: 0x0 (Send operations), 0x1 (RDMA Read Request), 0x2 (Terminate), 0x3 (Atomic Response, this specification). Sequential assignment is recommended for hardware compatibility.'
section: "10.2"
