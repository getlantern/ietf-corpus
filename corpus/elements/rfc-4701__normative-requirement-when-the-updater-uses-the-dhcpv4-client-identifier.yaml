document: rfc-4701
kind: normative-requirement
summary: When the updater uses the DHCPv4 Client Identifier option, the first two octets of the DHCID RR MUST be 0x0001 in network byte order, and the rest MUST contain SHA-256 of the option's Type and Client-Identifier fields followed by the FQDN.
section: 3.5.2
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
