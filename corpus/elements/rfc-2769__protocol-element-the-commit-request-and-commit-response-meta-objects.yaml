document: rfc-2769
kind: protocol-element
summary: The 'commit-request' and 'commit-response' meta-objects implement an optional two-party commit confirmation protocol. commit-response carries commit-status of 'held', 'error', or 'succeeded'; 'held' is returned when a dependent repository has expired.
section: "7.4"
