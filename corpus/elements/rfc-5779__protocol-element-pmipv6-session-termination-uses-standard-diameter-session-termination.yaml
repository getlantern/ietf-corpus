document: rfc-5779
kind: protocol-element
summary: PMIPv6 session termination uses standard Diameter Session-Termination-Request (STR) sent by LMA or MAG to HAAA, answered by Session-Termination-Answer (STA). Conversely, HAAA MAY send Abort-Session-Request (ASR) to LMA or MAG to request session termination, answered by Abort-Session-Answer (ASA).
section: "6.1"
topics:
    - diameter
    - mobility
