document: rfc-8341
kind: protocol-element
summary: 'Five global enforcement controls govern NACM behavior: enable-nacm (on/off master switch, default true), read-default (permit/deny when no rule matches reads, default permit), write-default (permit/deny when no rule matches writes, default deny), exec-default (permit/deny when no rule matches execution, default permit), and enable-external-groups (whether transport-layer group names are honored, default true).'
section: 3.3.4
topics:
