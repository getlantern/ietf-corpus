document: rfc-9029
kind: design-rationale
summary: The allocation policy was changed from 'Specification Required' to 'Expert Review' to remove the requirement that values be documented in a permanent, publicly available formal specification. Under Expert Review, code points may be allocated based on technical documentation that need not take the form of a finalized RFC, lowering the barrier for extensions while retaining expert oversight.
section: "1"
