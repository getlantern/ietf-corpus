summary: 'RFC 8859 adds a "Mux Category" column to fifteen existing IANA SDP-related subregistries, including: SDP bwtype, attribute-name, content SDP Parameters, group semantics, rtcp-fb attribute values, ack/nack attribute values, depend SDP attribute values, cs-correlation attribute values, ssrc-group semantics, SDP/RTSP key management protocol identifiers, codec control messages, QoS mechanism tokens, SDP capability negotiation option tags, timestamp reference clock source parameters, and media clock source parameters.'
