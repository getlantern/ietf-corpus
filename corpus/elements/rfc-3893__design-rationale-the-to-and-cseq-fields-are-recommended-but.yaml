document: rfc-3893
kind: design-rationale
summary: 'The To and CSeq fields are RECOMMENDED but not required in AIBs because their utility is context-dependent: CSeq provides per-transaction replay protection only if a new AIB is issued per transaction, and To may be inappropriate in third-party call scenarios where retargeting is involved.'
section: "10"
topics:
