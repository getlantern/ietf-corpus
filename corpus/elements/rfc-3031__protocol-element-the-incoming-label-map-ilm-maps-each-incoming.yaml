document: rfc-3031
kind: protocol-element
summary: The Incoming Label Map (ILM) maps each incoming label to a set of NHLFEs used when forwarding labeled packets. The FEC-to-NHLFE map (FTN) maps each FEC to a set of NHLFEs used when forwarding unlabeled packets that are to be labeled before forwarding. Either map may return multiple NHLFEs to support load balancing.
section: "3.11"
topics:
    - routing
