document: rfc-9834
kind: protocol-element
summary: The parent/child AC relationship enables a stable Parent AC to anchor dynamic Child ACs via 'parent-ref' and 'child-ref' nodes. A Child AC may reference multiple Parent ACs (e.g., separate L2 and L3 parents), and the 'server-reference' read-only node returns a provider-assigned internal identifier for each AC.
section: 5.2.5
topics:
