document: rfc-5147
kind: design-rationale
summary: Fragment identifiers are interpreted solely by the client after retrieval; a server cannot determine whether a requesting client supports or will interpret a fragment identifier. This client-side-only scope simplifies the protocol but means robustness must be handled on the client.
section: "1.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
