document: rfc-6704
kind: security-consideration
summary: The protocol is vulnerable to a denial-of-service attack through flooding a client with bogus FORCERENEW messages; the HMAC-MD5 computations required to authenticate each bogus message may overwhelm the client device.
section: "5.1"
topics:
    - security
