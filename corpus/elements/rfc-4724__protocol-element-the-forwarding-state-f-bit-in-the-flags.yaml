document: rfc-4724
kind: protocol-element
summary: The Forwarding State (F) bit in the Flags for Address Family field indicates whether forwarding state for routes advertised with the given AFI/SAFI was preserved during the previous BGP restart. When set (value 1), forwarding state has been preserved.
