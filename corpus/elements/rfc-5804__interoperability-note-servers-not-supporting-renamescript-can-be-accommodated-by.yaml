document: rfc-5804
kind: interoperability-note
summary: Servers not supporting RENAMESCRIPT can be accommodated by clients emulating the operation via LISTSCRIPTS, GETSCRIPT, PUTSCRIPT, SETACTIVE, and DELETESCRIPT. The VERSION capability signals whether RENAMESCRIPT is natively supported.
