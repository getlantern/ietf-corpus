document: rfc-8045
kind: protocol-element
summary: IP-Port-Forwarding-Map (Type 241, Extended-Type 7) specifies a static internal-to-external IP port mapping (internal IPv4 or IPv6 address and port to external IPv4 address and port). It MAY appear in Access-Accept, Access-Request, CoA-Request, and Accounting-Request packets.
section: 3.1.3
topics:
