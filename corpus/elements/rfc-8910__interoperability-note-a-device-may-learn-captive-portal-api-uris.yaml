document: rfc-8910
kind: interoperability-note
summary: A device may learn Captive Portal API URIs via multiple options (IPv4 DHCP, IPv6 DHCP, IPv6 RA). If URIs learned via more than one option are not identical, this condition should be logged as it represents a network configuration error. Implementations may select their own precedence order.
section: "3"
topics:
