document: rfc-9553
kind: normative-requirement
summary: Vendor-specific property names MUST start with a domain-name v-prefix followed by a colon and a v-name (the 'v-extension' ABNF). Implementations MUST preserve vendor-specific properties regardless of whether they understand them and MUST NOT reject their values as invalid.
section: 1.8.1
rfc2119_level: MUST
topics:
    - json
