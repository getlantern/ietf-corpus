document: rfc-5177
kind: normative-requirement
summary: The Mobile Router MUST drop any packets received on the Mobile Network that do not have a source address belonging to the Mobile Network, and MUST ensure no packet's source address matches the Mobile Router's own IP address on any interface.
section: "10"
rfc2119_level: MUST
