document: rfc-6178
kind: normative-requirement
summary: When processing of signaling messages or data packets with more specific forwarding rules is enabled (e.g., RSVP per RFC 2205, source routing per RFC 791), the ingress LER SHOULD NOT alter those specific processing rules.
