document: rfc-1220
kind: normative-requirement
summary: When a system that does not implement LAN Frame Checksum preservation receives a frame with an embedded FCS, it converts it by removing the trailing four octets; when forwarding a frame with no embedded FCS to a LAN, it forwards in a way that causes the FCS to be calculated.
section: "5.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
