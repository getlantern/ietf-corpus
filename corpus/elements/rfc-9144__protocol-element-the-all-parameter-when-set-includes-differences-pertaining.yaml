document: rfc-9144
kind: protocol-element
summary: The 'all' parameter, when set, includes differences pertaining to schema nodes that exist in only one datastore. When omitted, a prefiltering step automatically excludes data nodes whose schema node is not present in both datastores, specifically excluding config:false nodes when comparing a configuration datastore against <operational>.
section: "3"
