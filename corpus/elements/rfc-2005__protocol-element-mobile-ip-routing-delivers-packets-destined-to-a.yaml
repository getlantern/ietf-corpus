document: rfc-2005
kind: protocol-element
summary: Mobile IP routing delivers packets destined to a mobile node to its home network, where the home agent tunnels them to the mobile node's most recently reported care-of address. In the reverse direction, packets from mobile nodes are routed directly using standard IP routing mechanisms.
section: "1"
topics:
