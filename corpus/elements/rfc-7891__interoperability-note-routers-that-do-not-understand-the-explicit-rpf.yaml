document: rfc-7891
kind: interoperability-note
summary: Routers that do not understand the Explicit RPF Vector TLV (F bit clear) will discard it and continue processing the Join per RFC 5384 Section 3.3.2. Administrators should compute explicit paths that include only routers supporting the Explicit Vector and verify state creation using tools like mtrace.
section: "10"
topics:
