document: rfc-6325
kind: protocol-element
summary: The Designated RBridge (DRB) is elected per LAN link via TRILL-Hello priority and source MAC address. The DRB designates a VLAN for all inter-RBridge communication on the link, assigns pseudonode IDs, issues CSNPs, and appoints an RBridge as the single VLAN-x forwarder for each VLAN appearing on the link.
section: 4.2.4.2
topics:
    - routing
