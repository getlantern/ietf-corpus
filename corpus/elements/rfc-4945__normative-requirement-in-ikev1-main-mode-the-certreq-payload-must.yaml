document: rfc-4945
kind: normative-requirement
summary: In IKEv1 Main Mode, the CERTREQ payload MUST be in messages 4 and 5; the CERT payload MUST be in messages 5 and 6. In IKEv2, CERTREQ must be in messages 2 and 3, and CERT MUST be in messages 3 and 4.
section: 3.2.5
rfc2119_level: MUST
