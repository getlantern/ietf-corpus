document: rfc-4695
kind: normative-requirement
summary: If different RTP MIDI streams in a multimedia session send different classes of media (e.g., audio vs. lighting control), the streams MUST be sent over different RTP sessions, each with its own media line.
section: "2.1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
