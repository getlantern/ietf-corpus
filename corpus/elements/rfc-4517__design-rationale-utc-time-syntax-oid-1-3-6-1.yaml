document: rfc-4517
kind: design-rationale
summary: UTC Time syntax (OID 1.3.6.1.4.1.1466.115.121.1.53) is deprecated in favor of Generalized Time because UTC Time uses only a two-digit year, creating century ambiguity. New attribute types should use Generalized Time.
section: 3.3.34
topics:
