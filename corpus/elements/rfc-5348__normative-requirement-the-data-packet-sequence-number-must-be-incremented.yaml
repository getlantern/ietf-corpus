document: rfc-5348
kind: normative-requirement
summary: The data packet sequence number MUST be incremented by one for each packet transmitted, and the field must be large enough that it does not wrap such that two different packets with the same sequence number exist in the receiver's recent history simultaneously.
section: 3.2.1
rfc2119_level: MUST
topics:
    - congestion
