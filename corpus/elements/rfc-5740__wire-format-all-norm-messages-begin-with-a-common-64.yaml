document: rfc-5740
kind: wire-format
summary: 'All NORM messages begin with a common 64-bit header containing four fields: a 4-bit ''version'' (currently 1), a 4-bit ''type'' (message kind), an 8-bit ''hdr_len'' (header length in 32-bit words), a 16-bit ''sequence'', and a 32-bit ''source_id'' (NormNodeId).'
