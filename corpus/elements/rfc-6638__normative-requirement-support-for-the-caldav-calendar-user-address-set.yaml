document: rfc-6638
kind: normative-requirement
summary: 'Support for the CALDAV:calendar-user-address-set property is REQUIRED on principal resources. It maps calendar user addresses (e.g., mailto: URIs) to principal resources and their associated scheduling collections. If absent, the calendar user is not enabled for scheduling.'
section: 2.4.1
rfc2119_level: REQUIRED
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
