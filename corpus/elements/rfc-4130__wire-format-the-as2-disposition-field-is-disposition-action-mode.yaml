document: rfc-4130
kind: wire-format
summary: 'The AS2-disposition-field is ''Disposition: action-mode/sending-mode; AS2-disposition-type[/AS2-disposition-modifier]''. Disposition types are ''processed'' or ''failed''. Modifiers include ''error'', ''warning'', and extensions such as ''error: authentication-failed'', ''error: decryption-failed'', ''error: integrity-check-failed'', ''error: unexpected-processing-error''.'
section: 7.4.3
topics:
