summary: 'The Link Management Protocol (LMP) provides four services between adjacent nodes: control channel management and link property correlation (both mandatory), and link connectivity verification and fault management (both optional). LMP runs between data-plane adjacent nodes and is specified independently of GMPLS signaling.'
