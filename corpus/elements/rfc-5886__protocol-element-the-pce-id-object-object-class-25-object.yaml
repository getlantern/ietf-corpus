document: rfc-5886
kind: protocol-element
summary: The PCE-ID object (Object-Class 25, Object-Type 1 for IPv4, 2 for IPv6) specifies a PCE's IP address. It is used in requests to identify PCEs for monitoring and in replies to record IP addresses of PCEs involved in the computation chain.
