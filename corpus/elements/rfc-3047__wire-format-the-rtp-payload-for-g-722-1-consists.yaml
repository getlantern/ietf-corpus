document: rfc-3047
kind: wire-format
summary: The RTP payload for G.722.1 consists of the standard RTP header followed by one or more complete G.722.1 frames, with no additional payload-specific header. At 24 kbit/s, each frame is 60 octets; at 32 kbit/s, each frame is 80 octets.
