document: rfc-1933
kind: protocol-element
summary: 'IPv6/IPv4 nodes implement complete support for both IPv4 and IPv6, enabling direct interoperation with IPv4-only nodes via IPv4 packets and with IPv6 nodes via IPv6 packets. Three tunneling configurations are possible: no tunneling, configured tunneling only, or both configured and automatic tunneling.'
