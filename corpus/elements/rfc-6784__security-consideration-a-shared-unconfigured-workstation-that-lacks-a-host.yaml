document: rfc-6784
kind: security-consideration
summary: A shared, unconfigured workstation that lacks a host key cannot validate the Ticket-Granting Ticket issued by the KDC. A modified DHCPv6 response pointing to a malicious KDC would go undetected by such a workstation, potentially allowing unauthorized access.
section: "6"
topics:
    - security
