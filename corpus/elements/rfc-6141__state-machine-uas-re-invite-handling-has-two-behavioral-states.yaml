document: rfc-6141
kind: state-machine
summary: 'UAS re-INVITE handling has two behavioral states based on whether changes have been executed: (1) ''no changes executed'' — UAS may return an error response or 2xx; (2) ''changes executed'' — UAS MUST return 2xx and use UPDATE to undo unwanted changes rather than issuing an error response.'
section: "3.3"
topics:
    - sip
    - realtime
