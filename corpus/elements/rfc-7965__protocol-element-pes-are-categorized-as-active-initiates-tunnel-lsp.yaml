document: rfc-7965
kind: protocol-element
summary: PEs are categorized as active (initiates tunnel/LSP selection and informs remote PE) or passive (obeys the active PE's suggestion). For SS-PW both PEs may assume active roles; for MS-PW one PE is active and the other passive.
