document: rfc-5586
kind: normative-requirement
summary: If an ACH Channel Type definition states that ACH TLVs MAY be used, an ACH TLV Header MUST follow the ACH. If no TLVs are needed but the Channel Type permits them, the ACH TLV Header MUST still be present with a Length field of zero.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
