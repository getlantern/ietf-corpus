document: rfc-3861
kind: interoperability-note
summary: Clients supporting multiple IM or presence protocols may make several SRV queries in application-specific order until they find a protocol supported in common with the target domain. Resolvers must follow RFC 2782 procedures for handling priority and weight fields.
