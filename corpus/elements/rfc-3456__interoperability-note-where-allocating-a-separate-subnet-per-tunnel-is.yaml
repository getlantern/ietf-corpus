document: rfc-3456
kind: interoperability-note
summary: Where allocating a separate subnet per tunnel is not feasible and the DHCP server does not support the Relay Agent Information Option, stateless relay behavior is not possible; implementations MAY devise a mapping between xid, chaddr, and tunnel, though this creates substantial state on large VPN servers.
section: "4.2"
topics:
    - ipsec
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
