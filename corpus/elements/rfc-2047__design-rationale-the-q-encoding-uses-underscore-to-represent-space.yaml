document: rfc-2047
kind: design-rationale
summary: The 'Q' encoding uses '_' (underscore) to represent SPACE to greatly enhance readability on ASCII terminals that do not support encoded-word decoding. The underscore always means 0x20 regardless of the code position of SPACE in the charset, even though it may not survive all mail gateways.
section: "4.2"
topics:
