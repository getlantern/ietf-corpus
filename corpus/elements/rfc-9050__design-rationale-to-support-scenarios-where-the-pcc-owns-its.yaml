document: rfc-9050
kind: design-rationale
summary: To support scenarios where the PCC owns its label space, the C bit in the CCI object allows the PCE to request PCC-side label allocation (C=1, Label=0 for any allocation; C=1, Label=n for a specific value), enabling PCECC even when the PCE does not control the label space.
section: 5.5.8
topics:
