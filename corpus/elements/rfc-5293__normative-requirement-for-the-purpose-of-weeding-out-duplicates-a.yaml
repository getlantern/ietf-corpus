document: rfc-5293
kind: normative-requirement
summary: For the purpose of weeding out duplicates, a message modified by addheader or deleteheader MUST be considered the same as the original message; redundant keep/fileinto actions after header modification still count as a single delivery.
section: "7"
rfc2119_level: MUST
