document: rfc-3111
kind: normative-requirement
summary: A SLPv2 Agent MUST NOT propagate service advertisements from one zone to another. A SA or DA MUST NOT respond to a request from one zone with service information associated with a service in a different zone.
section: 4.2.4
rfc2119_level: MUST NOT
topics:
