document: rfc-8970
kind: normative-requirement
summary: A client SHOULD NOT continually issue FETCH PREVIEW requests with the LAZY modifier in a selected mailbox, as the server is under no requirement to return preview information for this command, which could waste system and network resources.
section: "4.2"
rfc2119_level: SHOULD NOT
topics:
