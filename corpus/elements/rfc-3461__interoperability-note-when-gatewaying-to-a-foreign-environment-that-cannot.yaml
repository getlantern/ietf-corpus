document: rfc-3461
kind: interoperability-note
summary: When gatewaying to a foreign environment that cannot return positive delivery notifications, the MTA SHOULD issue a 'relayed' DSN for SUCCESS-requesting recipients. The return-of-content conditions from RET are nonbinding in foreign environments but SHOULD be honored using available mechanisms.
section: 5.2.4
topics:
    - email
