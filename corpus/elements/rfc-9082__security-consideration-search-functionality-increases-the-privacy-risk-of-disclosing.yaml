document: rfc-9082
kind: security-consideration
summary: Search functionality increases the privacy risk of disclosing object relationships not otherwise obvious; for example, returning IDN variants that do not explicitly match the search pattern can reveal information about registered domain names. Implementers must consider policy and privacy implications of returning unrequested information.
section: "8"
topics:
    - security
    - privacy
    - dns
