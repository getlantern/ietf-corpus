document: rfc-6970
kind: design-rationale
summary: PortMappingEnabled is restricted to value "1" only because PCP's initial goal is to ease traversal of Carrier Grade NAT and does not support deactivating dynamic NAT mappings; supporting per-subscriber deactivation would overload the Carrier Grade NAT.
section: "4.1"
topics:
    - nat
