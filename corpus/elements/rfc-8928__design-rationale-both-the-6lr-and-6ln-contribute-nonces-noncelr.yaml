document: rfc-8928
kind: design-rationale
summary: Both the 6LR and 6LN contribute nonces (NonceLR and NonceLN), both included in the signed material. This 'contributory nonce' design provides protection against replay attacks even when one party's nonces are not generated with strong randomness.
section: "6.1"
