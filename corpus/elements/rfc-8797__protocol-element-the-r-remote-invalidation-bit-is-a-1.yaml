document: rfc-8797
kind: protocol-element
summary: The R (remote invalidation) bit is a 1-bit flag indicating that the sender supports remote invalidation for all STags it exposes on the connection. When set by both peers, the responder may use RDMA Send with Invalidate when transmitting RPC replies.
section: "4"
extracted_by: claude-sonnet-4-6
