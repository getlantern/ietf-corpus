document: rfc-4842
kind: normative-requirement
summary: For MPLS PSN transport, the bottom label in the MPLS label stack MUST be used to de-multiplex individual CEP channels (the PW Label). The CEP header follows the generic PWE3 Control Word format specified in PWE3-MPLSCW. Transport of CEP over non-MPLS PSNs is out of scope.
section: "5.4"
rfc2119_level: MUST
topics:
    - mpls
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
