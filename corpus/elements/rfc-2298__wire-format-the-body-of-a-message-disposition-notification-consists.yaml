document: rfc-2298
kind: wire-format
summary: The body of a message/disposition-notification consists of optional Reporting-UA, MDN-Gateway, and Original-Recipient fields, a mandatory Final-Recipient field, an optional Original-Message-ID field, a mandatory Disposition field, and zero or more Failure, Error, Warning, and extension fields, each terminated by CRLF.
