document: rfc-9168
kind: protocol-element
summary: The Flow Filter TLV (Type=52) is carried within the FLOWSPEC object and contains one or more Flow Specification TLVs representing the complete flow definition. Only one Flow Filter TLV is permitted per FLOWSPEC object; additional flows require additional FLOWSPEC objects.
