document: rfc-2060
kind: normative-requirement
summary: If an APPEND fails for any reason, the mailbox MUST be restored to its state before the APPEND attempt; no partial appending is permitted. If the destination mailbox does not exist, the server MUST NOT automatically create it and MUST send '[TRYCREATE]' unless creation is certainly impossible.
section: 6.3.11
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
