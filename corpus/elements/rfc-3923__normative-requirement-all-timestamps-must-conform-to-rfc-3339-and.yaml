document: rfc-3923
kind: normative-requirement
summary: All timestamps MUST conform to RFC 3339 and be presented as UTC with no offset. The sending agent MUST ensure timestamps increase monotonically. The receiving application MUST verify that the timestamp is within five minutes of the current time.
section: "6.9"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
