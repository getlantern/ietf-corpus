summary: 'Four LDP-specific SNMP notifications are defined: mplsLdpInitSessionThresholdExceeded (session initialization retry count exceeds mplsLdpEntityInitSessionThreshold; a value of 0 disables), mplsLdpPathVectorLimitMismatch (PVL mismatch between entity and peer), mplsLdpSessionUp, and mplsLdpSessionDown.'
