document: rfc-1349
kind: interoperability-note
summary: 'OSPF encodes TOS values in Link State Advertisements using even integers 0–30 (decimal), where the OSPF integer divided by 2 gives the TOS binary value''s position. For example: OSPF 0 = TOS 0000, OSPF 2 = TOS 0001 (minimize cost), OSPF 16 = TOS 1000 (minimize delay). This memo provides an updated mapping table for RFC-1247.'
section: A.5
