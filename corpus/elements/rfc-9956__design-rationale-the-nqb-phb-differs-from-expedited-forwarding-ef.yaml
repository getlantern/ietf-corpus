document: rfc-9956
kind: design-rationale
summary: The NQB PHB differs from Expedited Forwarding (EF, RFC 3246) in that NQB has no guaranteed minimum rate requirement and no requirement to police incoming traffic to such a rate. NQB traffic is given the same forwarding preference as Default traffic, whereas EF is a premium service with rate guarantees and associated policing requirements.
section: "3.2"
topics:
