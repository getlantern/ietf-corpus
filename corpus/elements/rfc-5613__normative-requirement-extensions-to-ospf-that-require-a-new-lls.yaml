document: rfc-5613
kind: normative-requirement
summary: Extensions to OSPF that require a new LLS TLV type MUST be reviewed by a Designated Expert from the routing area. LLS should not be used for information better suited to a link-local LSA, should be confined to signaling between direct neighbors, and volume should be kept small due to MTU and performance implications.
section: "3"
rfc2119_level: MUST
topics:
    - routing
    - registry
