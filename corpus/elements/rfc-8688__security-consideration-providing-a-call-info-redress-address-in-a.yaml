document: rfc-8688
kind: security-consideration
summary: Providing a Call-Info redress address in a 608 response to a truly malicious caller gives them a vector to attack the intermediary operator. Intermediary operators SHOULD only include Call-Info for INVITE requests that pass STIR (RFC 8224) validation to reduce the risk of arming malicious callers.
section: "6"
topics:
    - sip
    - security
