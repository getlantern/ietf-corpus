document: rfc-5163
kind: wire-format
summary: 'TimeStamp Extension Header format: 8-bit HLEN (0x03), 8-bit H-Type (0x01), 16-bit TimeStamp HI, 16-bit TimeStamp LO, 16-bit Type field (next header or payload type). Total size is 8 bytes including the Type field; the 32-bit timestamp value is right-justified.'
