document: rfc-6672
kind: interoperability-note
summary: Target names of MX, NS, PTR, and SRV records must be canonical hostnames — no CNAME or DNAME redirection may be present during address record lookup for these names. DNAME-redirected names cannot appear in MX, NS, SRV, or PTR RDATA.
section: "5.1"
topics:
    - dns
