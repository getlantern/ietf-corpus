document: rfc-3007
kind: design-rationale
summary: Message-based authentication (TSIG/SIG(0)) is used instead of per-RRset SIG records for update requests because SIG records do not cover the message header (including record counts), making it possible to maliciously insert or remove RRsets without causing verification failure.
section: "1.3"
topics:
    - dns
    - security
