document: rfc-4362
kind: interoperability-note
summary: The CSP format defined in RFC 3242 was non-interoperable when carrying an RHP header with a 3-bit or 7-bit CRC because payload length was not included; RFC 4362 corrects this by adding a 2-octet RTP Payload Length field to the CSP.
section: "1.1"
topics:
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
