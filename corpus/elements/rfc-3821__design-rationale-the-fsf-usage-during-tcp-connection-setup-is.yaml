document: rfc-3821
kind: design-rationale
summary: The FSF usage during TCP Connection setup is deliberately not a login or parameter negotiation mechanism. Because FCIP is only a tunnel for a FC Fabric, and the Fabric has its own complex link setup algorithm, complexity was delegated to FC-layer processes rather than duplicated in FCIP.
section: "7.2"
