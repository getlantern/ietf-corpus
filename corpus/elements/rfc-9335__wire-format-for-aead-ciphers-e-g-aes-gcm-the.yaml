document: rfc-9335
kind: wire-format
summary: For AEAD ciphers (e.g., AES-GCM), the Additional Authenticated Data (AAD) consists of the 12-byte fixed RTP header and the 4-byte extension header ('defined by profile' + length), even though these are non-contiguous in the packet when CSRCs are present.
section: "6.2"
topics:
