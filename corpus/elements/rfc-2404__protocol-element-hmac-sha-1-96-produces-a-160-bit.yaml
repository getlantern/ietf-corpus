document: rfc-2404
kind: protocol-element
summary: HMAC-SHA-1-96 produces a 160-bit authenticator value which is truncated to the first 96 bits for storage in the authenticator field of ESP or AH. Upon receipt, the full 160-bit value is computed and the first 96 bits are compared to the stored value.
section: "2"
topics:
    - ipsec
    - crypto
    - security
