document: rfc-4685
kind: protocol-element
summary: The 'total' extension element (thr:total) indicates the total number of unique responses to an entry known to the publisher. Its content MUST be an unsigned nonNegativeInteger. An entry MUST NOT contain more than one thr:total element.
