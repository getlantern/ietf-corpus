document: rfc-5392
kind: protocol-element
summary: The Inter-AS-TE-v2 LSA is a new Opaque LSA type (Opaque type 6) for advertising OSPFv2 inter-AS TE links. It has the same format as the Traffic Engineering LSA defined in OSPF-TE and may be carried as a Type 10 (area-scoped) or Type 11 (AS-scoped) Opaque LSA.
section: 3.1.1
topics:
