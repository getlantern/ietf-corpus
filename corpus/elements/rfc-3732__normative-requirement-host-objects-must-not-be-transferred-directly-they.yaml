document: rfc-3732
kind: normative-requirement
summary: Host objects MUST NOT be transferred directly; they MUST be transferred implicitly when the host object's superordinate domain object is transferred. There is no EPP <transfer> command mapping for host objects.
section: 3.1.3
rfc2119_level: MUST NOT
