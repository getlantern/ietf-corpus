document: rfc-4022
kind: design-rationale
summary: RFC 2452 (IPV6-TCP-MIB) was moved to Historic status because having separate IP-version-specific tables is no longer the IETF approach; implementation of RFC 2452 is no longer suggested in favor of the version-neutral tcpConnectionTable.
