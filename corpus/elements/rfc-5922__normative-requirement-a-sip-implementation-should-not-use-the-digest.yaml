document: rfc-5922
kind: normative-requirement
summary: A SIP implementation SHOULD NOT use the Digest Authentication of one message on a TCP connection or from a UDP peer to infer authentication of any other messages on that connection or from that peer. Domain authentication SHOULD be accomplished using TLS and certificate validation.
section: "8.1"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - tls
    - security
