document: rfc-8926
kind: protocol-element
summary: The C bit in the Geneve base header indicates that one or more options have their critical bit set. When C is set, tunnel endpoints MUST parse the options list; tunnel endpoints that cannot parse options MUST drop the packet on the basis of this bit alone. Transit devices MUST NOT drop packets on the basis of the C bit.
section: "3.4"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
