document: rfc-9665
kind: normative-requirement
summary: When a hostname lease expires, the SRP registrar MUST simultaneously remove the hostname and all service instances and Service Discovery PTR records referencing it. If KEY-LEASE is nonzero, KEY records for those service instances MUST be retained.
section: "5.1"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
