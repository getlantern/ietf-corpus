document: rfc-9396
kind: privacy-consideration
summary: Even with encryption, an attacker could inject an encrypted authorization request on their own device and use the AS consent screen to reveal decrypted user data. Implementations must consider this attack vector and apply countermeasures such as showing only portions of data or verifying that the user context is unchanged.
section: "13"
topics:
    - oauth
    - privacy
    - security
