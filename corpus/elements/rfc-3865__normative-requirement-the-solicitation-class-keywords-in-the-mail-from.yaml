document: rfc-3865
kind: normative-requirement
summary: The solicitation class keywords in the MAIL FROM 'SOLICIT=' parameter MUST be identical to those in the 'Solicitation:' message header. They MUST NOT be supplemented by keywords derived from 'Received:' trace fields.
section: "2.3"
rfc2119_level: MUST
topics:
    - email
