document: rfc-2127
kind: design-rationale
summary: Speech (speech(2)) and 3.1 kHz Audio (audio31(6)) bearer capabilities are sometimes used to carry 56 kbit/s data to exploit favorable speech tariffs. Implementations typically ignore the bearer capability on the receive side and answer such calls as data, using separate directory numbers for voice vs. data.
section: 3.4.8
topics:
