document: rfc-6492
kind: protocol-element
summary: The Resource Class List Query (type='list') carries no payload and asks the server to return all resources allocated to the client across all resource classes, along with currently issued certificates. The response (type='list_response') includes one class element per resource class where the client holds allocations.
section: "3.3"
