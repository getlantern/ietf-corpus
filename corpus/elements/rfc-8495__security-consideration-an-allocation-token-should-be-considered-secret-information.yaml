document: rfc-8495
kind: security-consideration
summary: An Allocation Token should be considered secret information; it SHOULD be protected at rest and MUST be protected in transit. It should be single-use (unique per object and allocation operation), have a limited lifetime with expiry, use a strong random value if unsigned, and leverage digital signatures if generated by a trusted third party.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
