document: rfc-6716
kind: protocol-element
summary: The SILK LP layer of an Opus frame may contain one 10 ms or up to three 20 ms regular SILK frames, optionally preceded by Low Bit-Rate Redundancy (LBRR) frames encoding previous frames at reduced bitrate for packet-loss recovery. For stereo, mid and side channel frames are interleaved.
