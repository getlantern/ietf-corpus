kind: protocol-element
summary: 'DCCP defines 10 packet types (0–9): Request, Response, Data, Ack, DataAck, CloseReq, Close, Reset, Sync, SyncAck. Types 10–15 are reserved; receivers MUST ignore packets with reserved type and MUST NOT acknowledge them.'
