document: rfc-1894
kind: normative-requirement
summary: The Will-Retry-Until field MUST NOT appear in DSNs other than those of type "delayed". It gives the date after which the Reporting MTA expects to abandon all delivery attempts for the recipient.
section: 2.3.8
rfc2119_level: MUST NOT
