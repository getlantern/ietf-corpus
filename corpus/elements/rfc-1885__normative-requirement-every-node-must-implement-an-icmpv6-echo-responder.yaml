document: rfc-1885
kind: normative-requirement
summary: Every node MUST implement an ICMPv6 Echo responder that receives Echo Requests and sends Echo Replies. A node SHOULD also implement an application-layer interface for sending Echo Requests and receiving Echo Replies for diagnostic purposes.
section: "4.1"
rfc2119_level: MUST
topics:
    - ip
