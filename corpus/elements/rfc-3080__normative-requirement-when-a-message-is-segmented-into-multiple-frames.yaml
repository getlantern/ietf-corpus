document: rfc-3080
kind: normative-requirement
summary: When a message is segmented into multiple frames, those frames MUST be sent sequentially on the same channel without interleaving frames from other messages on that channel. The exception is ANS frames in a one-to-many exchange, which MAY be interleaved using the ansno for collation.
section: 2.2.1.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
