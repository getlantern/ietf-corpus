document: rfc-4517
kind: protocol-element
summary: caseIgnoreMatch (OID 2.5.13.2) is an equality matching rule for DirectoryString and related syntaxes. Characters are case-folded in the Map step and only Insignificant Space Handling is applied. String preparation per RFC 4518 is required.
