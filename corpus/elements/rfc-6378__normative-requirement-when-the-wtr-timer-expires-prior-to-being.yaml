document: rfc-6378
kind: normative-requirement
summary: When the WTR timer expires prior to being stopped, it SHALL generate a WTR Expires local signal. If a Stop command is issued while the timer is running, it SHALL reset and stop the timer but SHALL NOT generate a WTR Expires signal.
section: "3.5"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
