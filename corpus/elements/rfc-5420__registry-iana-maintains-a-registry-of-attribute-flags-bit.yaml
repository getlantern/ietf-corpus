document: rfc-5420
kind: registry
summary: IANA maintains a registry of Attribute Flags bit numbers (starting at zero), tracking the bit number, defining RFC, bit name, and whether the bit has meaning in the Attribute Flags TLV on Path, on Resv, and in the RRO Attributes subobject. New bit allocations require IETF Consensus. No bits are defined by this document.
