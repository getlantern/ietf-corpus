document: rfc-9354
kind: normative-requirement
summary: For dissemination of context information, RAs MUST be used as per RFC 6775. The 6LoWPAN context option (6CO) MUST be included in the RA to disseminate the Context IDs used for prefix and/or address compression.
section: "4.4"
rfc2119_level: MUST
topics:
