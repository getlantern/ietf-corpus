document: rfc-791
kind: interoperability-note
summary: 'Implementations must be conservative in sending and liberal in receiving: send only well-formed datagrams, but accept any datagram that can be interpreted, not objecting to technical errors where the meaning remains clear. This Robustness Principle is load-bearing for interoperability across independently developed implementations.'
section: "3.2"
topics:
    - ip
