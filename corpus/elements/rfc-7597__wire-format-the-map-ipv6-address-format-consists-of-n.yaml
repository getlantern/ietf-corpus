document: rfc-7597
kind: wire-format
summary: 'The MAP IPv6 address format consists of: n-bit Rule IPv6 prefix, o-bit EA bits (encoding IPv4 address/prefix and PSID), s-bit subnet ID, and (128-n-o-s)-bit interface identifier. The End-user IPv6 prefix spans the Rule IPv6 prefix plus the EA bits fields.'
section: "5.2"
topics:
