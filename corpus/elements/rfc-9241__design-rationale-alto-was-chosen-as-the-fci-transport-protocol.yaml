document: rfc-9241
kind: design-rationale
summary: ALTO was chosen as the FCI transport protocol because it is application-layer-oriented, provides RESTful design, supports server-initiated notifications and incremental updates via SSE (RFC 8895), and its network map semantics match the footprint representation needs of CDNI. These properties satisfy RFC 8008's requirements for push, pull, and efficient update delivery.
section: "2.3"
topics:
