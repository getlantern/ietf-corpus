document: rfc-9193
kind: design-rationale
summary: Both CoAP Content-Format numbers and Content-Format-Strings use a string value in the 'ct' field to keep the data type consistent across uses. When 'ct' contains only digits, it is interpreted as a CoAP Content-Format number, providing a simple disambiguation rule.
