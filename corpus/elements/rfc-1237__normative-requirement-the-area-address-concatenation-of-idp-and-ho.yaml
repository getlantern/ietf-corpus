document: rfc-1237
kind: normative-requirement
summary: The area address (concatenation of IDP and HO-DSP) must be globally unique. If the area address of an NSAP matches one of the area addresses of a system, the destination is considered to be in that system's area and is routed to by level 1 routing.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
