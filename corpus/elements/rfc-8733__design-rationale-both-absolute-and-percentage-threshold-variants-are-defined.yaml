document: rfc-8733
kind: design-rationale
summary: Both absolute and percentage threshold variants are defined and may be used simultaneously; an adjustment fires when either is crossed. This accommodates LSPs whose reserved bandwidth ranges across several orders of magnitude, where pure percentage thresholds become impractical at very low values.
