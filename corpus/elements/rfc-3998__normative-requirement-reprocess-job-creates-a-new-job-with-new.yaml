document: rfc-3998
kind: normative-requirement
summary: Reprocess-Job creates a new Job with new job-uri and job-id that is a copy of a retained completed, canceled, or aborted job; the target job is left unchanged. Job progress attributes (job-impressions-completed, etc.) are initialized to 0 in the new job, and if Set-Job-Attributes is supported, 'job-hold-until' with at least 'indefinite' MUST be supported.
section: "4.1"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
