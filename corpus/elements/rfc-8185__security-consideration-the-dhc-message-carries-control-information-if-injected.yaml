document: rfc-8185
kind: security-consideration
summary: The DHC message carries control information; if injected or modified by an attacker, the dual-homing PEs might disagree on which PE delivers CE traffic, enabling a denial-of-service attack against the CE. The DHC message MUST be used within a trusted MPLS-TP network domain as described in RFC 6941.
section: "6"
topics:
    - mpls
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
