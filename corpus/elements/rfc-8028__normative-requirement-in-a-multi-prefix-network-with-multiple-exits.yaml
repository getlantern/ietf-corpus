document: rfc-8028
kind: normative-requirement
summary: In a multi-prefix network with multiple exits, the host's characterization of each default router SHOULD include the prefixes it has announced, extending Section 6.3.4 of RFC 4861. The PIO is reinterpreted to imply the advertising router is a reasonable first hop for any packet using a source address in any advertised prefix.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
