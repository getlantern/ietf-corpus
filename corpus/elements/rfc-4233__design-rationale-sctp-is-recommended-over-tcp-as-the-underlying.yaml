document: rfc-4233
kind: design-rationale
summary: SCTP is recommended over TCP as the underlying transport because it provides explicit packet-oriented delivery, multi-stream sequencing, multi-homing for network-level fault tolerance, resistance to flooding and masquerade attacks, and data segmentation. TCP MAY be used only in scenarios without redundancy requirements.
section: 1.3.1
topics:
    - sctp
