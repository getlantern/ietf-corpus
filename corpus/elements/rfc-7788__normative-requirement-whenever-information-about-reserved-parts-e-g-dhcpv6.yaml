document: rfc-7788
kind: normative-requirement
summary: Whenever information about reserved parts (e.g., DHCPv6-PD Exclude Prefix) is received for a delegated prefix, the reserved parts MUST be advertised using Assigned-Prefix TLVs with the greatest priority (15), as if assigned to a Private Link.
section: "6.2"
rfc2119_level: MUST
topics:
