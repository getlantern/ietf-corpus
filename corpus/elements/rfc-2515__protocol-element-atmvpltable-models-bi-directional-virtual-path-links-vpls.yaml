kind: protocol-element
summary: atmVplTable models bi-directional Virtual Path Links (VPLs), indexed by ifIndex and VPI. Each entry carries admin/oper status, last-change time, receive/transmit traffic descriptor indices, a cross-connect identifier, row status, cast type, and connection kind. Used for PVCs, SVCs, and Soft PVCs.
