document: rfc-7666
kind: design-rationale
summary: 'The MIB was derived from and generalizes three product-specific MIBs: a Xen guest MIB, a VMware VM MIB, and a libvirt-based MIB. The design goal was to define managed objects common to multiple hypervisor implementations rather than being tied to any one product.'
