document: rfc-5121
kind: normative-requirement
summary: The MS MUST use its 48-bit globally unique MAC address (as specified in 802.16) to generate a modified EUI-64 format-based interface identifier as specified in RFC 4291. Other mechanisms such as random interface identifiers per RFC 4941 MAY also be used.
section: "9.1"
rfc2119_level: MUST
topics:
