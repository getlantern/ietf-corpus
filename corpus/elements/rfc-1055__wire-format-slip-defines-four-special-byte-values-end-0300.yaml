document: rfc-1055
kind: wire-format
summary: 'SLIP defines four special byte values: END = 0300 (decimal 192) marks packet boundaries; ESC = 0333 (decimal 219) introduces a byte-stuffed escape sequence; ESC_END = 0334 (decimal 220) represents a literal END byte in data; ESC_ESC = 0335 (decimal 221) represents a literal ESC byte in data.'
