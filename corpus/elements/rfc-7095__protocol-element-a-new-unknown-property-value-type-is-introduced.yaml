document: rfc-7095
kind: protocol-element
summary: A new "unknown" property value type is introduced in jCard to preserve unrecognized property values during round-tripping between jCard and vCard. When a vCard property has no VALUE parameter and its default value type is not known, the value MUST be converted to a primitive JSON string with type set to "unknown".
section: "5"
topics:
    - json
    - interoperability-note
