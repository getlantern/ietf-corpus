document: rfc-5255
kind: normative-requirement
summary: A server advertising I18NLEVEL=2 MUST list I18NLEVEL=2 in its CAPABILITY data in authenticated state and MUST implement i;unicode-casemap. The default comparator MUST remain static for the remainder of a connection once the authenticated state is entered.
