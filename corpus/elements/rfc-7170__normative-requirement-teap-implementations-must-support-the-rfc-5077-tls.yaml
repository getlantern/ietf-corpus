document: rfc-7170
kind: normative-requirement
summary: TEAP implementations MUST support the RFC 5077 TLS SessionTicket mechanism for distributing a PAC-Opaque. It is RECOMMENDED that implementations also support distributing the PAC ticket and secret key within the TEAP Phase 2 tunnel.
