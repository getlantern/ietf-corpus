document: rfc-4320
kind: interoperability-note
summary: A non-INVITE transaction must complete immediately or risk losing a race condition; losing the race causes the requester to temporarily blacklist the responder and stop sending traffic to it, making rapid completion a critical interoperability constraint.
section: "1"
topics:
    - sip
    - realtime
