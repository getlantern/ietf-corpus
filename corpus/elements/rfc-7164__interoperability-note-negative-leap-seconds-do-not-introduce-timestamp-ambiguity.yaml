document: rfc-7164
kind: interoperability-note
summary: Negative leap seconds do not introduce timestamp ambiguity or complications, so no special treatment is needed to avoid RTP timestamp ambiguity in their presence; however, receivers SHOULD still account for them when computing playout times.
