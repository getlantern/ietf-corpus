document: rfc-7180
kind: normative-requirement
summary: When examining the link-state database for nickname conflicts, nicknames held by IS-IS unreachable TRILL Switches MUST be ignored, but nicknames held by IS-IS reachable TRILL Switches MUST NOT be ignored even if they are data unreachable.
section: "4"
rfc2119_level: MUST
topics:
    - routing
