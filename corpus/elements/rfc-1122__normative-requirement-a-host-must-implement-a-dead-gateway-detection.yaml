document: rfc-1122
kind: normative-requirement
summary: A host MUST implement a dead gateway detection mechanism. When evidence of failure accumulates (e.g., repeated TCP retransmissions without progress), the host SHOULD select an alternative first-hop gateway from its known candidate gateway list.
section: 3.3.1.4
rfc2119_level: MUST
topics:
    - ip
    - routing
