document: rfc-2243
kind: normative-requirement
summary: Implementations that support OTP extended responses MUST support the 'init-hex' and 'init-word' response types, which provide a standard mechanism for a client to re-initialize its OTP sequence and change parameters including the secret pass phrase.
section: "4"
rfc2119_level: MUST
topics:
