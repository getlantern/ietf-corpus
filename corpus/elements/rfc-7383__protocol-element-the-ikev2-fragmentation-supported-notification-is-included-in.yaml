document: rfc-7383
kind: protocol-element
summary: The IKEV2_FRAGMENTATION_SUPPORTED notification is included in the IKE_SA_INIT request by the initiator and echoed in the response by the responder to negotiate use of IKE fragmentation. The notification contains no data, Protocol ID MUST be 0, SPI Size MUST be 0, and Notify Message Type MUST be 16430.
section: "2.3"
topics:
    - ipsec
