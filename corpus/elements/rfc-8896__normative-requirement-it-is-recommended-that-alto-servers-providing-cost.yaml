summary: It is RECOMMENDED that ALTO Servers providing Cost Calendars also provide the ALTO Incremental Updates Using SSE Service (RFC 8895), and ALTO Clients using Calendars SHOULD also use the SSE Service to receive timely Calendar updates when network conditions change unexpectedly.
