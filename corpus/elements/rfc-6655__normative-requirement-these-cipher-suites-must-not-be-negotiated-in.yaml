document: rfc-6655
kind: normative-requirement
summary: These cipher suites MUST NOT be negotiated in TLS versions earlier than 1.2, since AEAD support was introduced in TLS 1.2 and the TLSCiphertext structure lacked the 'aead' option before that version.
section: "5"
rfc2119_level: MUST NOT
topics:
