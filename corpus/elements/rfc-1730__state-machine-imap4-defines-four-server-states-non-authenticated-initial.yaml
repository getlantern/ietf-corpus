document: rfc-1730
kind: state-machine
summary: 'IMAP4 defines four server states: Non-Authenticated (initial, credentials required), Authenticated (post-login, mailbox not yet selected), Selected (mailbox open for message access), and Logout (session terminating, connection closing). Transitions occur via LOGIN/AUTHENTICATE, SELECT/EXAMINE, CLOSE/failed-SELECT, and LOGOUT/shutdown.'
