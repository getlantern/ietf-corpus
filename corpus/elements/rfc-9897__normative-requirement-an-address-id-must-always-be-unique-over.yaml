document: rfc-9897
kind: normative-requirement
summary: An Address ID MUST always be unique over the lifetime of a subflow and can only be reassigned if sender and receiver no longer have them in use. A host MUST store the mappings between Address IDs and addresses for both itself and the remote host.
section: 3.2.2
rfc2119_level: MUST
topics:
    - multipath
    - nat
