document: rfc-9536
kind: normative-requirement
summary: All mappings for a reverse search property MUST point to response fields with the same meaning; registrants SHOULD NOT map a registered reverse search property to a response field with a meaning other than that of the fields already referenced by existing mappings for that property.
section: 11.2.1
rfc2119_level: MUST
topics:
    - registry
