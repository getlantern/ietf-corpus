document: rfc-2671
kind: normative-requirement
summary: The presence of an OPT RR in a request indicates that the requestor fully implements the given EDNS version. Absence of an OPT RR MUST be taken as indication that the requestor does not implement any part of EDNS, and the responder may make no use of any extension in its response.
section: "5.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
