document: rfc-3620
kind: protocol-element
summary: When the outermost 'tunnel' element has attributes but no nested child and the attributes are not 'profile' or 'endpoint', this peer is the final BEEP hop. It establishes the transport connection to the target and immediately returns 'ok' and begins transparent forwarding without expecting a BEEP greeting from the final host.
