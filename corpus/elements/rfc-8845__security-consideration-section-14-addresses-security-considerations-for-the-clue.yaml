document: rfc-8845
kind: security-consideration
summary: Section 14 addresses security considerations for the CLUE framework. Because CLUE operates over a data channel established via SIP and SDP, it inherits the security properties of those protocols; implementors must ensure the CLUE channel is protected (e.g., via DTLS) and that Advertisement/Configure messages cannot be spoofed or tampered with to redirect media streams.
section: "14"
topics:
    - security
    - realtime
    - sip
