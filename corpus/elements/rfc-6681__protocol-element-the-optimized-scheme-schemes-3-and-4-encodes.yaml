document: rfc-6681
kind: protocol-element
summary: The optimized scheme (Schemes 3 and 4) encodes all source blocks using a fixed MSBL by zero-padding shorter blocks before encoding and discarding the padding symbols after decoding; this allows pre-calculated encode/decode operation sequences for the restricted set of block lengths.
section: "7.1"
