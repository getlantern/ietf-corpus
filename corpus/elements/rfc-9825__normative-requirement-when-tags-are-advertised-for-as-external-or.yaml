document: rfc-9825
kind: normative-requirement
summary: When tags are advertised for AS External or NSSA LSA prefixes, the existing tag in the OSPFv2/OSPFv3 AS-External-LSA and NSSA-LSA encodings MUST be utilized for the first tag; additional tags MAY be advertised using the new Administrative Tag Sub-TLV.
section: "4"
rfc2119_level: MUST
topics:
    - routing
