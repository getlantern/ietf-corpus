document: rfc-8308
kind: normative-requirement
summary: Servers that implement public key authentication SHOULD implement the 'server-sig-algs' extension. If a server does not send this extension, a client MUST NOT make any assumptions about the server's public key algorithm support.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
