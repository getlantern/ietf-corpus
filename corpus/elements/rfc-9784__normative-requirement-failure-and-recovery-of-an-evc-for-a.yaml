document: rfc-9784
kind: normative-requirement
summary: Failure and recovery of an EVC for a single-homed or All-Active vES SHALL NOT impact any other EVCs or service instances; for PBB-EVPN, it SHALL NOT trigger MAC flushing in any I-SID (R6a, R6b). For a Single-Active vES, MAC flushing MUST be limited to C-MACs associated with the multihomed device for that single service instance only (R6d).
section: "3.6"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
