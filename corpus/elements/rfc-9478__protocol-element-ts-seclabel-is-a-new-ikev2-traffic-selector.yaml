document: rfc-9478
kind: protocol-element
summary: TS_SECLABEL is a new IKEv2 Traffic Selector Type (value 10) that carries a single opaque security label for use in Mandatory Access Control (MAC) environments. It enables negotiating security labels as additional selectors for the Security Policy Database (SPD) to restrict traffic allowed over an IPsec SA.
section: "2"
topics:
    - ipsec
    - security
