document: rfc-5989
kind: normative-requirement
summary: In the aberrant circumstance that a SUBSCRIBE request is forked, the subscriber SHOULD terminate all but one subscription, as described in RFC 3265 Section 4.4.9, since multiple notifiers for a single HTTP resource is semantically nonsensical.
section: "4.9"
rfc2119_level: SHOULD
topics:
    - sip
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
