document: rfc-5102
kind: security-consideration
summary: Section 8 addresses security considerations for the IPFIX information model. The model defines Information Elements (IP addresses, port numbers, packet and byte counts, flow keys) that constitute sensitive traffic metadata capable of revealing communication patterns; implementations must apply appropriate access controls to IPFIX collection infrastructure and consider using secure transport for IPFIX messages.
section: "8"
topics:
    - security
    - privacy
