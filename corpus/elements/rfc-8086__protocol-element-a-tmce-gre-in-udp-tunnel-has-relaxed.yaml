kind: protocol-element
summary: 'A TMCE GRE-in-UDP tunnel has relaxed requirements compared to the default tunnel: it MAY disable UDP checksum over IPv4, MAY override the IPv6 checksum default via UDP zero-checksum mode (subject to additional constraints in Section 6.2), and MAY carry non-congestion-controlled traffic.'
