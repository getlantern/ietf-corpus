document: rfc-4720
kind: wire-format
summary: The FCS Retention Indicator Sub-TLV includes a 16-bit FCS length field indicating the length of the original FCS being retained. For Ethernet pseudowires this is always 4; for HDLC, PPP, and Frame Relay pseudowires it is either 2 or 4.
