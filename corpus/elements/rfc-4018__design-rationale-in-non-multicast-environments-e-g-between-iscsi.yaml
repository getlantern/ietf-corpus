document: rfc-4018
kind: design-rationale
summary: In non-multicast environments (e.g., between iSCSI gateways across provider networks), an initiator may be configured with SA addresses and use unicast SLP requests directly to those SAs, bypassing multicast discovery entirely. This is within current SLP scope.
section: 4.1.3
extracted_by: claude-sonnet-4-6
