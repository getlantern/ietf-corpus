document: rfc-4945
kind: normative-requirement
summary: When validating certificates, IKE implementations MUST use certificate revocation information. When multiple revocation sources disagree, a certificate reported as revoked by any one trusted source MUST be considered revoked.
section: "5.2"
rfc2119_level: MUST
topics:
    - ipsec
    - pkix
    - security
