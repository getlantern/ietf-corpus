document: rfc-9007
kind: design-rationale
summary: MDN/parse's 'forEmailId' property can be null or missing when the originalMessageId does not refer to an existing message or when the server cannot efficiently calculate the related message (e.g., multiple messages share the same Message-ID), avoiding a mandatory expensive lookup.
section: "2.2"
