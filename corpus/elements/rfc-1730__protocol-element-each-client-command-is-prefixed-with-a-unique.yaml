document: rfc-1730
kind: protocol-element
summary: Each client command is prefixed with a unique tag (e.g., A0001). The server completion response carries the matching tag, allowing multiple commands to be in progress simultaneously. Untagged responses use '*' and command continuation requests use '+'.
section: 2.2.1
