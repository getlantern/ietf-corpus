document: rfc-8503
kind: normative-requirement
summary: For each entry in mvpnGenericTable, there MUST be a corresponding VRF entry in MPLS-L3VPN-STD-MIB (RFC 4382). This coupling ensures that every MVPN management entry is anchored to an existing VRF.
