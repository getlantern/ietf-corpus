document: rfc-9493
kind: privacy-consideration
summary: Presenting two or more identifiers for a single subject together (e.g., in an "aliases" Subject Identifier or via "sub" and "sub_id") may communicate more information than intended, enabling correlation. Transmitters SHOULD only send multiple identifiers together when the recipient is already known to know they are related, or when correlation is essential.
section: "6.1"
topics:
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
