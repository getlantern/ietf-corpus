document: rfc-1854
kind: protocol-element
summary: Commands RSET, MAIL FROM, SEND FROM, SOML FROM, SAML FROM, and RCPT TO may appear anywhere in a pipelined command group. Commands EHLO, DATA, VRFY, EXPN, TURN, QUIT, and NOOP may only appear as the last command in a group because their success or failure changes state the client must accommodate.
section: "2.1"
topics:
    - email
