document: rfc-8434
kind: normative-requirement
summary: Each new Standards Track document for a layout type MUST address how the client, metadata server, and storage devices interact to meet the control protocol requirements. A document that does not impose implementation requirements sufficient to ensure semantic requirements are met is not appropriate for publication as an RFC from the IETF stream.
section: "3.3"
rfc2119_level: MUST
topics:
    - process
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
