document: rfc-2096
kind: protocol-element
summary: ipCidrRouteInfo (OBJECT IDENTIFIER, read-create) references MIB definitions specific to the routing protocol responsible for the route. When absent, it must be set to { 0 0 }, which every ASN.1/BER implementation must be able to generate and recognize.
