document: rfc-6772
kind: interoperability-note
summary: When used as part of a presence system, geolocation policy documents use the same XCAP AUID ('geolocation-policy') and inherit the MIME type application/auth-policy+xml from Common Policy (RFC 4745). Geolocation policy is aligned with the presence architecture per RFC 4079, so Presence Servers act as Location Servers.
section: "10"
topics:
    - privacy
    - realtime
