document: rfc-5679
kind: registry
summary: IANA maintains a registry mapping NAPTR service field values to transport protocols for MIH services. Initial entries include MIHIS+M2T/M2U/M2S, MIHES+M2T/M2U/M2S, and MIHCS+M2T/M2U/M2S mapped to TCP, UDP, and SCTP respectively. New entries require Standards Action.
