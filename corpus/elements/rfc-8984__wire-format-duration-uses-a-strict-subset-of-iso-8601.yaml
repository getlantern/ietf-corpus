document: rfc-8984
kind: wire-format
summary: Duration uses a strict subset of ISO 8601 duration format defined by a specific ABNF grammar (P followed by optional week/day components and/or time components). Fractional seconds MUST NOT appear unless non-zero and MUST NOT have trailing zeros. Leap seconds MUST NOT be considered when adding or subtracting durations from LocalDateTime.
section: 1.4.6
rfc2119_level: MUST
topics:
    - json
