document: rfc-9356
kind: protocol-element
summary: The L2 Bundle Member Attributes sub-TLV is a new sub-TLV introduced for both OSPFv2 and OSPFv3 to advertise link attributes of individual L2 bundle member links. In OSPFv2 it is an optional sub-TLV of the Extended Link TLV (type 24); in OSPFv3 it is an optional sub-TLV of the Router-Link TLV of the E-Router-LSA (type 29).
section: "2"
topics:
