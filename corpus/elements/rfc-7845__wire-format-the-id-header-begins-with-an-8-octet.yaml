document: rfc-7845
kind: wire-format
summary: The ID header begins with an 8-octet magic signature 'OpusHead', followed by Version (8-bit unsigned), Channel Count (8-bit unsigned), Pre-skip (16-bit unsigned little-endian), Input Sample Rate (32-bit unsigned little-endian), Output Gain (16-bit signed Q7.8 little-endian), Channel Mapping Family (8-bit unsigned), and optional Channel Mapping Table.
section: "5.1"
