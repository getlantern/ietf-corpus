summary: 'Three use cases for the Active flag are defined: (1) endpoint active measurement where the flag is not used; (2) IOAM probe packets generated by the encapsulating node with the Active flag set, terminated by the decapsulating node; and (3) replicated data packets with the Active flag set, terminated by the decapsulating node.'
