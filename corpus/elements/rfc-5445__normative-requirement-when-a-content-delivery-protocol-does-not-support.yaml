document: rfc-5445
kind: normative-requirement
summary: When a Content Delivery Protocol does not support external signaling of the total FEC OTI length, the Scheme-Specific FEC OTI field MUST be included for schemes using the Section 4.2.2.3 format (IDs 128, 129, 130). If Length is zero, three zero-valued padding bytes SHALL follow the Length field to maintain 4-octet alignment.
section: 4.2.2.3
rfc2119_level: MUST
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
