document: rfc-8379
kind: interoperability-note
summary: The mechanism is fully backward compatible. If the remote node does not support Graceful-Link-Shutdown, it will continue to use the graceful-shutdown link without adverse effects; for broadcast links using two-part metrics, backward-compatibility procedures from RFC 8042 apply.
