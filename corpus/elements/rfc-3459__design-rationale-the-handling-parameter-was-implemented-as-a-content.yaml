document: rfc-3459
kind: design-rationale
summary: The Handling parameter was implemented as a Content-Disposition parameter rather than a new MIME entity because IMAP servers would need to extend BODYSTRUCTURE or add new retrieval methods to expose a standalone Critical-Content MIME entity, an approach that had already proved difficult with Content-Location.
section: "9.2"
