document: rfc-6625
kind: protocol-element
summary: 'For data reception, a PE matches a (C-S,C-G) flow against installed S-PMSI A-D routes originated by the upstream PE, using the same priority order as for transmission: exact (C-S,C-G), then (C-S,C-*) for SSM, then (C-*,C-G) for ASM, then (C-*,C-*). Route selection is independent of the order routes were received.'
section: 3.2.1
topics:
    - multicast
    - routing
