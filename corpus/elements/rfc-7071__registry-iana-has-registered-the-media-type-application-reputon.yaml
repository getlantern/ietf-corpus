document: rfc-7071
kind: registry
summary: IANA has registered the media type "application/reputon+json" for JSON-encoded reputation data. The type takes no required or optional parameters and uses "7bit" encoding. It carries the reputation response set for a specific application context as defined by the Reputation Applications registry.
section: "7.1"
topics:
