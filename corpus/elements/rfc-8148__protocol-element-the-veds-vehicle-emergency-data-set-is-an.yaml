kind: protocol-element
summary: The VEDS (Vehicle Emergency Data Set) is an XML structure defined by APCO and NENA, transported in SIP using the application/EmergencyCallData.VEDS+xml MIME media type, and carries crash-related vehicle data such as airbag deployment, location, spatial orientation, crash pulse, seat belt status, and injury indicators.
