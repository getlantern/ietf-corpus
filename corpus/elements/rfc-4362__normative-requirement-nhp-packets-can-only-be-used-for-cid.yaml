document: rfc-4362
kind: normative-requirement
summary: NHP packets can only be used for CID=0. If the decompressor receives an NHP packet, it is assumed to belong to CID=0 regardless of which CID size has been negotiated.
section: "4.7"
rfc2119_level: MUST
