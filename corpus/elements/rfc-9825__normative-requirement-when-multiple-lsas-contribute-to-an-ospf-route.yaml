document: rfc-9825
kind: normative-requirement
summary: When multiple LSAs contribute to an OSPF route (ECMP), the ABR propagating the route MUST associate tags from one of the contributing LSAs and MAY associate tags from multiple contributing LSAs up to the maximum supported. It is RECOMMENDED that tags be added in ascending order of LSA originator Router-ID.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
