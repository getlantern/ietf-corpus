document: rfc-9946
kind: normative-requirement
summary: 'The KDF algorithm SHALL be a Key Derivation Function in Counter Mode (NIST SP 800-108 Section 4.1) using HMAC-SHA-256 as the PRF. The total derived key material SHALL be 512 bits: 256 bits for the Client Authentication Key and 256 bits for the Server Authentication Key.'
section: 5.4.1
rfc2119_level: MUST
topics:
    - crypto
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
