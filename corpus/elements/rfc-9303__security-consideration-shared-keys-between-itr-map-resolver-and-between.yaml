document: rfc-9303
kind: security-consideration
summary: Shared keys between ITR/Map-Resolver and between Map-Server/ETR should be provisioned via an orchestration infrastructure, refreshed at periodic intervals to address key aging, and must be unpredictable random values. Key provisioning is out of scope for LISP-SEC.
section: "7.5"
topics:
