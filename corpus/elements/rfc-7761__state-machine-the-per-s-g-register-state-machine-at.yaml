document: rfc-7761
kind: state-machine
summary: 'The per-(S,G) Register State Machine at the DR has four states: NoInfo (NI), Join (J), Join-Pending (JP), and Prune (P). Key transitions: CouldRegister becoming true moves NI→J; receiving Register-Stop moves J→P and starts Register-Stop Timer; timer expiry in P sends a Null-Register and moves P→JP; timer expiry in JP adds register tunnel and moves JP→J.'
section: 4.4.1
topics:
    - multicast
    - routing
