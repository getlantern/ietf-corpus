document: rfc-5227
kind: normative-requirement
summary: If a host experiences MAX_CONFLICTS (10) or more address conflicts on a given interface, it MUST limit the rate at which it probes for new addresses to no more than one new address per RATE_LIMIT_INTERVAL (60 seconds), to prevent catastrophic ARP storms from defective DHCP servers.
section: 2.1.1
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
