kind: protocol-element
summary: 'Structured Fields define three top-level types: List (ordered array of Items or Inner Lists), Dictionary (ordered map of key/value pairs), and Item (a single typed value). Lists and Dictionaries are containers whose members may be parameterized; Items carry the primitive values.'
