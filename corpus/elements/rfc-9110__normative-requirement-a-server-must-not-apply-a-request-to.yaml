document: rfc-9110
kind: normative-requirement
summary: A server MUST NOT apply a request to the target resource until it receives the entire request header section, since later header fields might include conditionals, authentication credentials, or deliberately misleading duplicate fields that could impact request processing.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - http
    - security
