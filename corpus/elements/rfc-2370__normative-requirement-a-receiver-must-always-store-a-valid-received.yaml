document: rfc-2370
kind: normative-requirement
summary: A receiver must always store a valid received Opaque LSA in its link-state database. The receiver must not accept Opaque LSAs that violate the flooding scope (e.g., a type-11 domain-wide Opaque LSA must not be accepted in a stub area).
section: "3.0"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
