document: rfc-6750
kind: design-rationale
summary: The Bearer authentication scheme is designed primarily for server authentication using WWW-Authenticate and Authorization headers but does not preclude use for proxy authentication. It defines a general HTTP authorization method usable with bearer tokens from any source, not only OAuth.
section: "1"
topics:
