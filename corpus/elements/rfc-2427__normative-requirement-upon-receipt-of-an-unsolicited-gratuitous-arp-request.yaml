document: rfc-2427
kind: normative-requirement
summary: Upon receipt of an unsolicited (gratuitous) ARP request announcing a new IP-to-DLCI association, the receiving station must store the new association and remove any old existing association for that IP address from any other DLCI on the interface.
section: "6"
rfc2119_level: MUST
topics:
    - ip
