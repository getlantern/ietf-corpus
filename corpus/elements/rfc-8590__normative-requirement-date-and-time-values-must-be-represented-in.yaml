document: rfc-8590
kind: normative-requirement
summary: Date and time values MUST be represented in UTC using the Gregorian calendar, using the extended date-time form with uppercase 'T' and 'Z' characters as defined in XML Schema Part 2. Truncated date-time forms and lowercase 'T'/'Z' are not permitted.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
