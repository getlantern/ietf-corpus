document: rfc-1382
kind: normative-requirement
summary: All objects defined in the MIB are mandatory. To claim conformance, an implementation must support all objects. For optional features not supported, the agent must return the defined 'not supported' value and reject set requests.
section: "3.6"
rfc2119_level: MUST
