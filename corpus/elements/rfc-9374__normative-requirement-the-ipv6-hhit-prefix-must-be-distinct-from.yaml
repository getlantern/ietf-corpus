document: rfc-9374
kind: normative-requirement
summary: The IPv6 HHIT prefix MUST be distinct from the flat-space HIT prefix (2001:20::/28) allocated in RFC 7343. Without a distinct prefix, the first 4 bits of the RAA would be misinterpreted as the HIT Suite ID by HIPv2.
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
