document: rfc-2280
kind: protocol-element
summary: 'The mntner class defines entities authorized to create, delete, and update RPSL objects. Key attributes include ''auth'' (authentication scheme: NONE, MAIL-FROM, PGP, or CRYPT-PW), ''upd-to'' (notified on unauthorized update attempts), and ''mnt-nfy'' (notified on any change).'
