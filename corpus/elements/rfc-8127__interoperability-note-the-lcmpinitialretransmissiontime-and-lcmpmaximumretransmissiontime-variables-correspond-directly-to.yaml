document: rfc-8127
kind: interoperability-note
summary: The LCMPInitialRetransmissionTime and LCMPMaximumRetransmissionTime variables correspond directly to INITIAL_BINDACK_TIMEOUT and MAX_BINDACK_TIMEOUT from RFC 5213 Section 6.9.4, and LCMPHeartbeatInterval and LCMPHeartbeatMaxRetransmissions MAY be derived from HEARTBEAT_INTERVAL and MISSING_HEARTBEATS_ALLOWED in RFC 5847 if those are configured on the LMA.
section: "4.1"
topics:
