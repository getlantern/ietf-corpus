document: rfc-9769
kind: protocol-element
summary: In interleaved client/server mode, a client request carries an origin timestamp equal to the receive timestamp from the last valid server response; the server response carries an origin timestamp equal to the client request's receive timestamp, and the transmit timestamp corresponds to the previous response (not the current one).
