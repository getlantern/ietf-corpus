document: rfc-8154
kind: normative-requirement
summary: When open stateids are revoked, the server MUST recall all layouts that allow I/O on any files affected by the revocation. If those layouts are not successfully returned, the client MUST be fenced.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
