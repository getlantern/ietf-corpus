document: rfc-2996
kind: protocol-element
summary: 'For simple configurable resource-based admission control, routers should support two tables: a service-type-to-DSCP mapping table (mapping intserv service types such as Guaranteed, Controlled Load, and Best-Effort to DSCPs) and a quantitative resource availability table (mapping DSCPs to token bucket profiles representing total available resources for that service class).'
section: A
topics:
