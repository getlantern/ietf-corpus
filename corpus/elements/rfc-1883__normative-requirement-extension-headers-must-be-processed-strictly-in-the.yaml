document: rfc-1883
kind: normative-requirement
summary: Extension headers must be processed strictly in the order they appear in the packet. A receiver must not scan for a particular kind of extension header and process it prior to processing all preceding ones.
section: "4"
rfc2119_level: MUST NOT
