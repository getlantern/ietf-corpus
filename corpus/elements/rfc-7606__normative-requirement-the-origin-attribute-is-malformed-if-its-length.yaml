document: rfc-7606
kind: normative-requirement
summary: The ORIGIN attribute is malformed if its length is not 1 or if it has an undefined value. An UPDATE with a malformed ORIGIN SHALL be handled using treat-as-withdraw.
section: "7.1"
rfc2119_level: MUST
topics:
