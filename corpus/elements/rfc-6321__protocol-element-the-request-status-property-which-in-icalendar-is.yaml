document: rfc-6321
kind: protocol-element
summary: The REQUEST-STATUS property, which in iCalendar is a semicolon-separated list of two or three TEXT values, is represented in xCal as IC:request-status containing IC:code, IC:description, and optionally IC:data child elements. The IC:data element SHOULD NOT be present if there is no additional data.
section: 3.4.1.3
rfc2119_level: SHOULD NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
