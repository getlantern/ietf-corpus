document: rfc-5316
kind: normative-requirement
summary: The Router ID in the Inter-AS Reachability TLV MUST be unique within the ISIS area. If the TLV is flooded with domain-wide scope (S bit=1), the Router ID MUST also be unique within the entire ISIS routing domain.
section: "3.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
