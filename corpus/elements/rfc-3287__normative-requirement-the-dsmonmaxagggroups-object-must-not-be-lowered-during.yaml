document: rfc-3287
kind: normative-requirement
summary: The dsmonMaxAggGroups object MUST NOT be lowered during system operation. The agent SHOULD set this object to an appropriate value during system initialization and SHOULD support at least one profile with at least two counter aggregation groups.
section: "4"
rfc2119_level: MUST NOT
