document: rfc-4572
kind: security-consideration
summary: RFC 4572 explicitly does not define a mechanism for securely transporting RTP/RTCP over a connection-oriented channel. The working group deferred the question of whether to use SRTP over connection-oriented transport or standard RTP over TLS until a concrete use case was presented.
section: "7"
topics:
    - tls
    - rtp
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
