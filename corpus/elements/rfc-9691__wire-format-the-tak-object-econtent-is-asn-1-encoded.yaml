document: rfc-9691
kind: wire-format
summary: The TAK object eContent is ASN.1 encoded using Distinguished Encoding Rules (DER). The TAK ASN.1 type is a SEQUENCE with version INTEGER DEFAULT 0, current TAKey, predecessor [0] TAKey OPTIONAL, and successor [1] TAKey OPTIONAL. TAKey is a SEQUENCE of comments, certificateURIs (IA5String), and subjectPublicKeyInfo.
