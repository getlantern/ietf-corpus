document: rfc-4008
kind: design-rationale
summary: Address map entries are applied in ascending order of natAddrMapIndex, giving operators deterministic control over translation rule precedence. This ordered lookup is fundamental to correct NAT behavior when multiple overlapping map entries exist on the same interface.
section: "4.2"
topics:
