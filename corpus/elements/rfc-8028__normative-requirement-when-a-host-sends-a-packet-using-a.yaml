document: rfc-8028
kind: normative-requirement
summary: When a host sends a packet using a source address in a given prefix and has no history directing it otherwise, it SHOULD send it to the indicated default router (the one that advertised that prefix).
section: "3.2"
rfc2119_level: SHOULD
