document: rfc-8630
kind: normative-requirement
summary: It is RECOMMENDED that when a TAL contains multiple TA URIs, the domain name parts resolve to distinct IP addresses served by diverse repository publication points, and that these IPs be covered by distinct ROA objects signed by different CAs, to increase operational resilience.
section: "2.3"
rfc2119_level: RECOMMENDED
