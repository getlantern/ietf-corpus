document: rfc-3307
kind: interoperability-note
summary: These guidelines are not limited to MADCAP servers; they apply to any environment where IPv6 multicast addresses are delegated, assigned, or selected, including SSM application servers and zeroconf nodes. All approved permanent IPv6 multicast address requests result in a unique group ID reserved across all valid IPv6 multicast scopes.
section: "3"
topics:
