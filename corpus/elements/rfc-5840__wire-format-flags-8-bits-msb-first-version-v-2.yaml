document: rfc-5840
kind: wire-format
summary: 'Flags (8 bits), MSB first: Version (V, 2 bits), Encrypted Payload (E, 1 bit), Padding Present (P, 1 bit), and Reserved (Rsvd, 4 bits). Version MUST be sent as 0; E=1 indicates encrypted payload; P=1 indicates 4-octet padding is present; Reserved bits MUST be sent as 0.'
