document: rfc-2677
kind: protocol-element
summary: 'nhrpCacheType indicates how a cache entry was created, with values: other(1), register(2), resolveAuthoritative(3), resolveNonauthoritative(4), transit(5), administrativelyAdded(6), atmarp(7), scsp(8). When creating a row via nhrpCacheRowStatus, only administrativelyAdded(6) may be specified; the value cannot be changed once the entry is active.'
