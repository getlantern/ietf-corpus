document: rfc-4515
kind: design-rationale
summary: The escaping mechanism using backslash followed by two hex digits was chosen because it eliminates filter-parsing ambiguities and allows any LDAP filter to be represented as a NUL-terminated string. Other octets in the normal set may also use this mechanism, e.g., for non-printing ASCII characters.
