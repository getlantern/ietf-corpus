document: rfc-8506
kind: state-machine
summary: Section 7 defines the credit-control application state machines. Key states include Idle, PendingI (awaiting initial answer), Open (session active), PendingU (awaiting update answer), PendingT (awaiting termination answer), and PendingE (one-time event pending); transitions are triggered by CCR/CCA exchanges, timer expiry (Tx, Tcc), and failure events.
