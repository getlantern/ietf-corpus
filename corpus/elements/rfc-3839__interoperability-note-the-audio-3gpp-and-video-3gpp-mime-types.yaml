document: rfc-3839
kind: interoperability-note
summary: The audio/3gpp and video/3gpp MIME types are used only for files; separate MIME types and RTP payload formats are used for real-time transfer (e.g., RFC 2429 for H.263 video, RFC 3267 for AMR audio).
