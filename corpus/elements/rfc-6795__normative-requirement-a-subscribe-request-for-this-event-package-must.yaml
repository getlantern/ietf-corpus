document: rfc-6795
kind: normative-requirement
summary: A SUBSCRIBE request for this event package MUST contain a body describing the SIP session. All subscribers and notifiers MUST support the MIME type "application/media-policy-dataset+xml" as the default format for SUBSCRIBE and NOTIFY bodies.
section: "3.3"
rfc2119_level: MUST
topics:
    - sip
