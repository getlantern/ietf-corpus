document: rfc-6117
kind: normative-requirement
summary: IANA MUST reject registration requests where Type or Subtype uses '-' as first, second, or last character, or starts with 'E2U'. IANA must also not register Type or Subtype set to 'foo', 'bar', or 'sbar' (reserved for examples) without explicit expert confirmation.
section: "11.8"
rfc2119_level: MUST
topics:
    - registry
