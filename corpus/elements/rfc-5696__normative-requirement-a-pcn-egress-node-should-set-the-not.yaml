document: rfc-5696
kind: normative-requirement
summary: A PCN-egress-node SHOULD set the not-PCN (00) codepoint on all packets it forwards out of the PCN-domain, unless it is certain that revealing other codepoints outside the domain will not contravene RFC 4774 guidance.
section: "4.2"
rfc2119_level: SHOULD
topics:
