document: rfc-3035
kind: normative-requirement
summary: If a hop count has been associated with the label binding used for forwarding, the outgoing TTL is set to the larger of 0 or the difference between the incoming TTL and the hop count. If no hop count is associated, the outgoing TTL is set to the larger of 0 or one less than the incoming TTL.
section: "10"
rfc2119_level: MUST
topics:
    - mpls
