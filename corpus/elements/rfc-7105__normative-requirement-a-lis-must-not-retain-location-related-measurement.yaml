document: rfc-7105
kind: normative-requirement
summary: A LIS MUST NOT retain location-related measurement data in memory, storage, or logs beyond the time indicated in the 'expires' attribute. If the 'expires' attribute is absent, the LIS MUST NOT retain the measurement data at all.
section: "6.3"
rfc2119_level: MUST NOT
topics:
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
