document: rfc-8214
kind: interoperability-note
summary: The MPLS label value in the Ethernet A-D route can be set to a VXLAN VNI for VXLAN encapsulation per RFC 7348, with the BGP Encapsulation extended community included in the route; the EVPN-VPWS techniques have no dependency on the tunneling technology.
