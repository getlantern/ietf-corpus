document: rfc-3730
kind: protocol-element
summary: The <greeting> element is returned by the server on connection or in response to <hello>. It contains <svID> (server name), <svDate> (UTC timestamp), <svcMenu> (protocol versions, languages, object namespace URIs, optional extension URIs), and a required <dcp> data collection policy element.
