document: rfc-3095
kind: wire-format
summary: 'UO-0 is the most compressed packet type: 4-bit SN LSBs + 3-bit CRC in a single octet (first bit 0), used in U/O-mode SO state. R-0 is the R-mode equivalent; R-0-CRC adds a 7-bit CRC and is used when the compressor needs context-update acknowledgment.'
