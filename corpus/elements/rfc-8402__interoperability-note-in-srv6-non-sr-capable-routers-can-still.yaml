document: rfc-8402
kind: interoperability-note
summary: In SRv6, non-SR-capable routers can still forward packets toward a node that owns an SRv6 SID because standard IPv6 FIB entries for shorter-mask covering prefixes suffice. This allows SR traffic to traverse nodes that do not understand SR, which is a key backward-compatibility property of SRv6.
section: 3.1.3
topics:
    - routing
    - ip
