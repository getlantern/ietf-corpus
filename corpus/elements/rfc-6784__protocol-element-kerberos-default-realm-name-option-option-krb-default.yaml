document: rfc-6784
kind: protocol-element
summary: Kerberos Default Realm Name Option (OPTION_KRB_DEFAULT_REALM_NAME = 77) is sent by a DHCPv6 server to specify the default Kerberos realm to both clients and application servers. Its format is identical to the Realm Name Option.
