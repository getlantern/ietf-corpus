document: rfc-4341
kind: normative-requirement
summary: An active sender DCCP A MUST occasionally acknowledge its peer DCCP B's acknowledgements so that DCCP B can free up Ack Vector state, and SHOULD do so at least once per congestion window.
section: "6.2"
rfc2119_level: MUST
topics:
    - congestion
    - udp
