document: rfc-5286
kind: normative-requirement
summary: A router SHOULD NOT specify the 'local protection available' IS-IS flag as a result of having LFAs, and SHOULD NOT use an alternate next-hop along a link advertised with 'link excluded from local protection path' or 'local maintenance required' attributes (per RFC 5029).
section: 3.5.1
rfc2119_level: SHOULD NOT
topics:
    - routing
    - ip
