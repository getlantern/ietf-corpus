document: rfc-9554
kind: protocol-element
summary: 'The PHONETIC parameter indicates that a property contains the phonetic representation of a same-named property. Defined values are: ''ipa'' (IPA), ''jyut'' (Cantonese Jyutping), ''piny'' (Mandarin Hanyu Pinyin), ''script'' (unknown system). The parameter is currently defined for use with ADR and N properties.'
section: "4.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
