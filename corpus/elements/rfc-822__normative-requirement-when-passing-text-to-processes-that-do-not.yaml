document: rfc-822
kind: normative-requirement
summary: When passing text to processes that do not interpret data according to this standard (e.g., mail protocol servers), NO linear-white-space characters should occur between a period or at-sign and a word; exactly ONE SPACE should replace arbitrary whitespace and comment sequences.
section: 3.4.2
rfc2119_level: SHOULD NOT
topics:
