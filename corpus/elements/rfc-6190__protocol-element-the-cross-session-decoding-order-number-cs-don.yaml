summary: The Cross-Session Decoding Order Number (CS-DON) is a derived variable indicating NAL unit decoding order across all session-multiplexed RTP sessions carrying the same SVC bitstream, used by NI-C, NI-TC, and I-C modes for decoding order recovery.
