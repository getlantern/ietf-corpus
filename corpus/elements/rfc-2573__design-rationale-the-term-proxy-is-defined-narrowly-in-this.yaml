document: rfc-2573
kind: design-rationale
summary: The term 'proxy' is defined narrowly in this document to mean only a proxy forwarder application that forwards SNMP messages irrespective of what managed objects are contained within them. This avoids the historical confusion of the term covering version translation, non-SNMP protocol bridging, and managed object aggregation under a single label.
section: "1.5"
topics:
    - snmp
