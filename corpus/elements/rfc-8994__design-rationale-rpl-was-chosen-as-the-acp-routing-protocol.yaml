document: rfc-8994
kind: design-rationale
summary: RPL was chosen as the ACP routing protocol because it produces a smaller routing table footprint in large networks compared to link-state protocols operating in a single autonomically configured area. Large-scale IoT deployments provide operational validation of RPL at scale. The ACP profile intentionally avoids RPI extension headers to keep ACP a pure software control-plane addition.
section: A.4
topics:
