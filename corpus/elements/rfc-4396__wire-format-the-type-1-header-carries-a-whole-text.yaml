document: rfc-4396
kind: wire-format
summary: The TYPE 1 header carries a whole text sample and adds SIDX (8 bits, sample description index), SDUR (24 bits, sample duration in RTP timestamp units), and TLEN (16 bits, text string byte count) after the common header. LEN MUST always be >= 8.
