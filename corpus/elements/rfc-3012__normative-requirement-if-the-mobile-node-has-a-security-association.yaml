document: rfc-3012
kind: normative-requirement
summary: If the mobile node has a security association with the Foreign Agent, it MUST include a Mobile-Foreign Authentication extension per the base Mobile IP specification, and the Mobile-Foreign Authentication MUST follow the Challenge extension when one is present.
section: "3.1"
rfc2119_level: MUST
topics:
