document: rfc-5464
kind: interoperability-note
summary: The SETMETADATA and GETMETADATA commands are available only in authenticated or selected IMAP state as defined in [RFC3501]. Servers advertising METADATA-SERVER rather than METADATA indicate support only for server-level annotations, not per-mailbox annotations.
section: "4.2"
topics:
    - email
