document: rfc-4425
kind: security-consideration
summary: VC-1 is particularly vulnerable to denial-of-service attacks because an attacker can inject pathological RTP packets containing frames that affect the decoding of many future frames. Therefore, data origin authentication and data integrity protection of at least the RTP packet is RECOMMENDED, for example using SRTP.
section: "7"
topics:
