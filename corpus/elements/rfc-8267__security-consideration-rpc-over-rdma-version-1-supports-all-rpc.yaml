document: rfc-8267
kind: security-consideration
summary: RPC-over-RDMA version 1 supports all RPC security models including RPCSEC_GSS and transport-level security (RFC 7861). The choice of DDP mechanism to convey RPC arguments and results does not affect security, as it changes only the method of data transfer; all relevant security considerations are addressed at the RFC 8166 layer.
section: "8"
topics:
    - security
