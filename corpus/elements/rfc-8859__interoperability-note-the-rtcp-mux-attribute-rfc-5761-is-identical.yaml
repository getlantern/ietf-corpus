document: rfc-8859
kind: interoperability-note
summary: 'The rtcp-mux attribute (RFC 5761) is IDENTICAL: RTP/RTCP multiplexing affects the entire RTP session, so all "m=" lines sharing a 5-tuple must consistently enable or disable it. Similarly, rtcp-rsize (RFC 5506) and rtcp-unicast (RFC 5760) are IDENTICAL.'
section: "5.3"
topics:
    - realtime
    - rtp
