document: rfc-3550
kind: normative-requirement
summary: All RTP implementations MUST be prepared to detect and resolve SSRC collisions. If a source changes its transport address, it MUST choose a new SSRC identifier to avoid being misidentified as a forwarding loop.
section: "8"
rfc2119_level: MUST
topics:
