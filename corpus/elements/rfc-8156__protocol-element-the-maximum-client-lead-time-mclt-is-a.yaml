document: rfc-8156
kind: protocol-element
summary: 'The Maximum Client Lead Time (MCLT) is a configured interval that bounds the difference between the valid lifetime given to a DHCP client and the lifetime known by the partner server. The fundamental relationship is: lease expiration time given to a client MUST NOT exceed the later of the partner''s acknowledged partner lifetime or the current time by more than the MCLT.'
section: "4.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
