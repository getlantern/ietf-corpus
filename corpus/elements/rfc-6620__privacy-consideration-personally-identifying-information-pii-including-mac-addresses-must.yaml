document: rfc-6620
kind: privacy-consideration
summary: Personally identifying information (PII), including MAC addresses, MUST NOT be stored in the FCFS SAVI DB except during an identified attack attempt. Implementations MUST NOT log binding anchor information unless there is specific reason to believe it is involved in source address spoofing; information MUST be deleted as soon as the address state returns to NO_BIND.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - ip
    - privacy
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
