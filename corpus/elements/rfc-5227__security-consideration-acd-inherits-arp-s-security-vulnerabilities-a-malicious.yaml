document: rfc-5227
kind: security-consideration
summary: 'ACD inherits ARP''s security vulnerabilities: a malicious host can send fraudulent ARP packets, including answering all ARP Requests with its own hardware address to claim ownership of every address on the network. This specification does not worsen the existing ARP vulnerability but improves visibility by causing hosts to either reconfigure automatically or alert the user rather than failing silently.'
section: "5"
topics:
