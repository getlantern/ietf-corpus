document: rfc-5766
kind: protocol-element
summary: A permission consists of a peer IP address (not port) and a time-to-expiry. When a UDP datagram arrives at the relayed transport address, the server compares the source IP address against the permission list; if no match is found the datagram is silently discarded.
section: "8"
topics:
