document: rfc-8577
kind: security-consideration
summary: RFC 8577 does not introduce new security issues. The security considerations from the original RSVP protocol (RFC 2205), RSVP-TE (RFC 3209), and the MPLS/GMPLS security framework (RFC 5920) remain relevant and applicable.
