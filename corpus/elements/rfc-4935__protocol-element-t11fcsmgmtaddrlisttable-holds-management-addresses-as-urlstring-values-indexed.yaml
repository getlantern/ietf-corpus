summary: t11FcsMgmtAddrListTable holds management addresses as URLString values, indexed by fcmInstanceIndex, fcmSwitchIndex, t11FcsMgmtAddrListIndex, and t11FcsMgmtAddrIndex. It is shared between IE (t11FcsIeMgmtAddrListIndex) and Platform (t11FcsPlatformMgmtAddrListIndex) references via the T11FcListIndexPointerOrZero indirection pattern.
