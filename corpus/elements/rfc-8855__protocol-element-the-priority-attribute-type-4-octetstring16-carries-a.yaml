document: rfc-8855
kind: protocol-element
summary: The PRIORITY attribute (Type 4, OctetString16) carries a 3-bit priority value (0=Lowest through 4=Highest). Senders SHOULD NOT use values above 4; receivers MUST treat values above 4 as 4. The default priority when the attribute is absent is 2 (Normal).
section: 5.2.4
topics:
