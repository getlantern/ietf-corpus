document: rfc-8047
kind: security-consideration
summary: HIP multihoming is resistant to redirection attacks because locators are listed in HIP packets signed using the host's identifier key, cryptographically binding locators to the host identity. Address verification (from RFC 8046) prevents third-party flooding-based DoS redirection attacks.
section: "6"
topics:
