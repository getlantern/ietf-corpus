kind: protocol-element
summary: 'MPLS CC Types: Type 1 (0x01) uses PW-ACH (in-band with control word), Type 2 (0x02) uses MPLS Router Alert Label (out-of-band), Type 3 (0x04) uses PW label with TTL=1. L2TPv3 defines only Type 1 (0x01): L2-Specific Sublayer with V-bit set.'
