document: rfc-2625
kind: protocol-element
summary: 'Address resolution requires two levels of mapping: (1) IP address to WW_PN (handled by ARP), and (2) WW_PN to Port_ID (handled by FARP). Port_IDs are volatile and all mapped Port_IDs MUST be valid before use.'
section: "4.1"
