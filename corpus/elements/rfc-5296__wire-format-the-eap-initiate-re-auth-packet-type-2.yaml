summary: 'The EAP-Initiate/Re-auth packet (Type=2) contains: 1-octet flags field with R/B/L bits; 16-bit SEQ field for replay protection; one or more TV/TLV attributes (including mandatory keyName-NAI TLV); 1-octet cryptosuite field; and a variable-length Authentication Tag over the entire packet excluding the tag itself.'
