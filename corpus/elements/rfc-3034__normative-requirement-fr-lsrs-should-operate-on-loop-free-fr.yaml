document: rfc-3034
kind: normative-requirement
summary: FR-LSRs SHOULD operate on loop-free FR-LSPs or LSP Frame Relay segments. Therefore, FR-LSRs SHOULD use loop detection and MAY use loop prevention mechanisms as described in the MPLS architecture and LDP specifications.
section: "5.4"
rfc2119_level: SHOULD
topics:
    - mpls
