document: rfc-4043
kind: design-rationale
summary: The permanent identifier was introduced because subject names change (due to organizational moves, legal name changes, or relocation), while entities need a stable identifier across multiple certificates. The permanent identifier enables linking certificates to the same entity even across DN or subjectAltName changes.
section: "1"
