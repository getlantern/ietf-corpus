document: rfc-2726
kind: design-rationale
summary: The existing MAIL-FROM authentication is easily forged and CRYPT-PW exposes the password unencrypted in the update email, necessitating a stronger digital signature mechanism. PGP was chosen as the first method because it is widely deployed both inside and outside the US.
section: "1"
topics:
