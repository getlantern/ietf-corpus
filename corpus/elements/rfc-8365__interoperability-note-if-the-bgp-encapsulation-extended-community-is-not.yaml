document: rfc-8365
kind: interoperability-note
summary: If the BGP Encapsulation Extended Community is not present in an EVPN route advertisement, either MPLS encapsulation or a statically configured encapsulation is assumed. An advertising node that only supports MPLS encapsulation does not need to advertise any encapsulation tunnel types.
section: 5.1.3
topics:
    - routing
    - bgp
    - mpls
