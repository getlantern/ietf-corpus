document: rfc-3558
kind: normative-requirement
summary: ToC entries with reserved frame type values SHOULD be considered invalid. Frame type 2 (Rate 1/4) MUST be considered reserved when the EVRC codec is in use, as EVRC has no 1/4 rate frames.
section: "5.1"
rfc2119_level: MUST
