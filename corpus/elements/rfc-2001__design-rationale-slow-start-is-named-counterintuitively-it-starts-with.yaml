document: rfc-2001
kind: design-rationale
summary: 'Slow start is named counterintuitively: it starts with cwnd=1 but grows exponentially. The name reflects that it is slower than the original TCP behavior of immediately injecting a full window of segments, which could overwhelm intermediate routers with limited queue space.'
section: "1"
