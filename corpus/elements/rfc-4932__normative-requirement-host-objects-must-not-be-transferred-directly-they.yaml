document: rfc-4932
kind: normative-requirement
summary: Host objects MUST NOT be transferred directly; they MUST be transferred implicitly when the host object's superordinate domain object is transferred. <host:upID> and <host:upDate> MUST NOT be present if the host has never been modified; <host:trDate> MUST NOT be provided if the host has never been transferred.
section: 3.1.2
rfc2119_level: MUST NOT
topics:
    - registry
    - dns
