summary: docsIfCmRangingRespTimeout (TimeTicks) and docsIfCmtsInsertionInterval (TimeTicks) were obsoleted and replaced by docsIfCmRangingTimeout and docsIfCmtsInsertInterval (both TimeInterval) because the original SYNTAX type was incorrect for the intended semantics. New implementations must use the replacement objects.
