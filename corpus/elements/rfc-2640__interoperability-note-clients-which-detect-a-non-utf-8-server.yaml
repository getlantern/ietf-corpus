document: rfc-2640
kind: interoperability-note
summary: Clients which detect a non-UTF-8 server via absence of the UTF8 FEAT response SHOULD adjust display appropriately. They MAY assume another encoding, allow user configuration, or persist encoding assumptions across sessions — this is a quality-of-implementation issue.
section: "3.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
