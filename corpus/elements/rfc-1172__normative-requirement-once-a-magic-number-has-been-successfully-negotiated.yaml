document: rfc-1172
kind: normative-requirement
summary: Once a Magic-Number has been successfully negotiated, an LCP implementation MUST transmit Echo-Request, Echo-Reply, Discard-Request, and Link-Quality-Report packets with the Magic-Number field set to its negotiated value. Reception of the local Magic-Number in these packets indicates a looped-back link.
section: "2.4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
