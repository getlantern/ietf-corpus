document: rfc-4666
kind: protocol-element
summary: 'Routing Key Management (RKM) messages provide optional dynamic provisioning of Routing Keys at an SGP: Registration Request (REG REQ, type 1) lets an ASP register a Routing Key and receive an assigned Routing Context; Registration Response (REG RSP, type 2) conveys the result; Deregistration Request (DEREG REQ, type 3) removes a Routing Key; Deregistration Response (DEREG RSP, type 4) confirms the result.'
section: "3.6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
