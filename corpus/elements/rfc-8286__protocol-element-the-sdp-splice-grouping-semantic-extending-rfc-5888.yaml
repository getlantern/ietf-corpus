document: rfc-8286
kind: protocol-element
summary: The SDP 'SPLICE' grouping semantic (extending RFC 5888) relates a main RTP stream 'm=' line to a substitutive RTP stream 'm=' line. Only two 'm=' lines are allowed per SPLICE group, and the main stream is identified by having the 'extmap' splicing-interval attribute.
