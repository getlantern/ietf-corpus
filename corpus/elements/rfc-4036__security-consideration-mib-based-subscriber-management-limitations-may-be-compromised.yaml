document: rfc-4036
kind: security-consideration
summary: MIB-based subscriber management limitations may be compromised if the cable modem's identity or registration process is spoofed. The DOCSIS RFI and BPI+ specifications define mechanisms for assuring modem identity that underpin the security model of this MIB.
section: "9"
topics:
