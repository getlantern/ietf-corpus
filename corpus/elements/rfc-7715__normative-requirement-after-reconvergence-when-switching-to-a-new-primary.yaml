document: rfc-7715
kind: normative-requirement
summary: After reconvergence when switching to a new primary path, a Label Withdraw message MUST be sent to the old upstream LSR, and both LSR2 and LSR3 SHOULD use Make-Before-Break (MBB) procedures as described in RFC 6388 to switch to the new primary upstream node.
section: 4.1.3
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
