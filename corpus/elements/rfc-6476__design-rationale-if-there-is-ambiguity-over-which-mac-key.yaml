document: rfc-6476
kind: design-rationale
summary: If there is ambiguity over which MAC key size to use, it is RECOMMENDED that the size be specified explicitly in the macAlgorithm AlgorithmIdentifier or defined in an RFC, because de facto standard key sizes vary by algorithm (e.g., HMAC-SHA1 uses 160 bits, AES-based MACs use the AES key size).
section: "4.2"
rfc2119_level: RECOMMENDED
topics:
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
