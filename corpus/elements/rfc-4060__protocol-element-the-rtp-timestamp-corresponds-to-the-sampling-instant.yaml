document: rfc-4060
kind: protocol-element
summary: The RTP timestamp corresponds to the sampling instant of the first sample encoded for the first FP in the packet. The timestamp clock frequency equals the sampling frequency (in samples). The timestamp increases by 160, 220, or 320 for each consecutive FP at 8, 11, or 16 kHz respectively.
section: 3.1.3
topics:
