document: rfc-1497
kind: design-rationale
summary: The BOOTP approach retains an advantage when all needed configuration can be returned in a single reply and consumed from a local table, and when an administrator needs centralized control over which hosts use which servers — a level of control that the multicast approach (which gives each server authority over which hosts to serve) cannot provide.
section: Comparison to Alternative Approaches
