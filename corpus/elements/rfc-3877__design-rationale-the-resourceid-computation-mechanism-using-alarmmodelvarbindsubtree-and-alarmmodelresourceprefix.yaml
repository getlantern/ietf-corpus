document: rfc-3877
kind: design-rationale
summary: The ResourceId computation mechanism using alarmModelVarbindSubtree and alarmModelResourcePrefix was designed to let both the managed element and a manager independently compute the same resource identifier from Notification varbinds, enabling correlation of separate alarm instances against the same physical or logical resource without a shared registry.
section: 4.1.4
