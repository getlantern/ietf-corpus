document: rfc-6426
kind: protocol-element
summary: A new Non-IP address type (type 5, 12 octets) is defined for use in DSMAP and DDMAP TLVs. It indicates no address is present but includes ingress IF_Num and egress IF_Num (4 octets each) for interface identification. When this address type is used, interface verification MUST be bypassed on receipt.
section: "2.1"
topics:
    - mpls
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
