document: rfc-6141
kind: normative-requirement
summary: A UAC that receives an error response to a re-INVITE for which changes have already been executed SHOULD generate a new re-INVITE or UPDATE request to synchronize both UAs. The offer in this new exchange SHOULD reflect session parameters as close to the pre-re-INVITE state as possible.
section: "3.4"
rfc2119_level: SHOULD
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
