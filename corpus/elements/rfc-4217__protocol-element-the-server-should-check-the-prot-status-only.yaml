document: rfc-4217
kind: protocol-element
summary: The server SHOULD check the PROT status only at the data-transfer command (STOR, RETR, NLST, LIST, STOU, APPE) that initiates the connection, not at PORT or PASV time. The server may also insist that the data connection use a previously cached TLS session.
section: "10.2"
topics:
    - tls
