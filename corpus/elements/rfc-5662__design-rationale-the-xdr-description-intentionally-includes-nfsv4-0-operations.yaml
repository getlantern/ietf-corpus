document: rfc-5662
kind: design-rationale
summary: The XDR description intentionally includes NFSv4.0 operations (SETCLIENTID, SETCLIENTID_CONFIRM, OPEN_CONFIRM, RENEW, RELEASE_LOCKOWNER) that are obsolete in NFSv4.1, so that a single .x file can be used to build implementations supporting both minor versions without maintaining two separate files.
section: "2"
topics:
