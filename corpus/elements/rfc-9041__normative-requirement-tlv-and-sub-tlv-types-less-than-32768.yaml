document: rfc-9041
kind: normative-requirement
summary: TLV and sub-TLV types less than 32768 (high-order bit 0) MUST either be supported by an implementation or result in a Return Code of 2 ('One or more of the TLVs was not understood') being sent in the echo response.
section: "4.1"
rfc2119_level: MUST
