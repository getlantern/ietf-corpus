document: rfc-1772
kind: normative-requirement
summary: Under the Tagged IGP method, a border gateway A must immediately propagate to all external peers any internal-peer-learned unreachability information, and must not propagate reachability information about prefix X to external peers until A has an IGP route with a tag matching the BGP tag for X.
section: A.2.2
rfc2119_level: MUST
topics:
    - bgp
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
