document: rfc-5892
kind: protocol-element
summary: The contextual rule pseudo-code language used in the Contextual Rules Registry supports Boolean expressions, set membership (.in.), equality (.eq.), character position functions (Before(cp), After(cp), FirstChar, LastChar), Script(cp), Canonical_Combining_Class(cp), RegExpMatch(), and a For-All-Characters loop construct. Undefined propagates immediately to terminate rule evaluation.
section: A
