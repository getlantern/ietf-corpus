document: rfc-5188
kind: normative-requirement
summary: A 16-kHz RTP clock rate MUST always be used for EVRC-WB, even when the encoder or decoder is configured at 8 kHz. The RTP timestamp is increased by 320 for each 20 milliseconds.
section: "5"
rfc2119_level: MUST
topics:
