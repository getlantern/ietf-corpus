document: rfc-1493
kind: protocol-element
summary: dot1dStpPriority (dot1dStp 2) is the read-write two-octet writable portion of the Bridge ID, range 0..65535. Combined with dot1dBaseBridgeAddress it forms the full 8-octet BridgeIdentifier used in STP Configuration BPDUs.
