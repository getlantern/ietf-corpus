document: rfc-8308
kind: protocol-element
summary: 'The ''delay-compression'' extension, sent by either party, carries two name-lists encoded as strings within the extension-value string: compression_algorithms_client_to_server and compression_algorithms_server_to_client. It takes effect only if both parties send it and share a common algorithm, activating immediately after SSH_MSG_USERAUTH_SUCCESS (server side) or SSH_MSG_NEWCOMPRESS (client side).'
section: "3.2"
topics:
    - security
    - crypto
