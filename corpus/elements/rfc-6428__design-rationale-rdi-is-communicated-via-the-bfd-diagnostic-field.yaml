document: rfc-6428
kind: design-rationale
summary: RDI is communicated via the BFD diagnostic field in CC messages rather than as a separate PDU. This keeps RDI associated with the continuity check mechanism and avoids adding a new message type. The diagnostic code field in CV messages is ignored for RDI purposes.
section: "3.2"
topics:
