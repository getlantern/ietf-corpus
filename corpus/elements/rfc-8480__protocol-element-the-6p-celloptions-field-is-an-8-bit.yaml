document: rfc-8480
kind: protocol-element
summary: The 6P CellOptions field is an 8-bit bitmap with TX, RX, and S (shared) bits mapped to macTxType, macRxType, and macSharedType in the 802.15.4 macLinkTable. Its interpretation differs between ADD/DELETE/RELOCATE requests (cell type to operate on at the receiver) and COUNT/LIST requests (selector for filtering). The SF MAY redefine the bitmap format.
section: 3.2.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
