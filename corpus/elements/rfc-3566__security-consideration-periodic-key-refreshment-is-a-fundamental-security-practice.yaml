document: rfc-3566
kind: security-consideration
summary: Periodic key refreshment is a fundamental security practice for AES-XCBC-MAC-96; it helps against potential weaknesses of the function and keys, reduces information available to a cryptanalyst, and limits damage from a compromised key, even though current attacks do not necessitate a specific key-change frequency.
section: "4.1"
topics:
    - crypto
    - ipsec
    - security
