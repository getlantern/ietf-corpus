document: rfc-6190
kind: normative-requirement
summary: Dependency between RTP sessions in multi-session transmission MUST be signaled according to Section 7.2.3. SST SHOULD be used for point-to-point unicast; MST SHOULD be used for point-to-multipoint multicast with heterogeneous receivers.
section: 3.1.2
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - multicast
