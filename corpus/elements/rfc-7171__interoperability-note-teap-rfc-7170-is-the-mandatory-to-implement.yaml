document: rfc-7171
kind: interoperability-note
summary: TEAP (RFC 7170) is the mandatory-to-implement EAP tunnel method for use with PT-EAP. PT-EAP may also be carried within EAP-FAST (RFC 4851) or EAP-TTLS (RFC 5281), each of which uses TLS to establish a protected tunnel before running inner methods.
section: "4.3"
