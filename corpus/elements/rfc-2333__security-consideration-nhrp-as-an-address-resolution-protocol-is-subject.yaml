document: rfc-2333
kind: security-consideration
summary: NHRP, as an address resolution protocol, is subject to server spoofing and denial-of-service attacks. NHRP provides authentication mechanisms to mitigate spoofing concerns; details are in RFC 2332, Section 5.3.4.
