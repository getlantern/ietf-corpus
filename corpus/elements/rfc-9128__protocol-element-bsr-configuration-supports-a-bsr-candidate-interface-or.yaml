document: rfc-9128
kind: protocol-element
summary: BSR configuration supports a bsr-candidate (interface or explicit IPv4/IPv6 address, hash-mask-length, priority) and rp-candidate (interface or explicit addresses with optional policy and mode). Operational state exposes current BSR address, election state (candidate-bsr-state or non-candidate-bsr-state), and next bootstrap/advertisement timers.
section: 3.2.2
topics:
