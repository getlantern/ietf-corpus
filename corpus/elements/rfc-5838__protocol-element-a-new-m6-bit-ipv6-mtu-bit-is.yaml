document: rfc-5838
kind: protocol-element
summary: A new M6-bit (IPv6 MTU bit) is defined in the OSPFv3 Database Description packet flags field (octets 20-23). When set, it indicates the sender uses a different IPv6 MTU than the address-family-specific MTU, and the AF MTU in the packet MUST NOT be checked against the local IPv6 MTU.
section: "2.7"
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
