document: rfc-9168
kind: normative-requirement
summary: An implementation that cannot resolve a new Flow Specification against already-installed ones (e.g., irresolvable conflicts) MUST respond with PCErr Error-Type 30, Error-value 3 (Unresolvable Conflict) and MUST NOT install the Flow Specification.
section: "8.7"
rfc2119_level: MUST
topics:
    - routing
    - mpls
