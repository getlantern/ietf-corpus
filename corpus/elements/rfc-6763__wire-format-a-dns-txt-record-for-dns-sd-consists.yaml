document: rfc-6763
kind: wire-format
summary: A DNS TXT record for DNS-SD consists of one or more constituent strings packed contiguously in memory. Each string is a single length byte (0–255) followed by 0–255 bytes of data in 'key=value' form. There is no overall length count or null terminator in the record data itself.
section: "6.1"
