document: rfc-6721
kind: protocol-element
summary: A Deleted Entry Document is a standalone XML 1.0 document whose root element is at:deleted-entry, representing exactly one deleted entry outside the context of an Atom feed. It is identified by the 'application/atomdeleted+xml' media type and MUST be well-formed XML.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
