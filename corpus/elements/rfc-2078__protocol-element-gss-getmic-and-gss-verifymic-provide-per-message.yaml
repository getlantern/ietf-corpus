document: rfc-2078
kind: protocol-element
summary: GSS_GetMIC() and GSS_VerifyMIC() provide per-message data origin authentication and integrity as a MIC token separate from the message data. GSS_GetMIC() takes a message and returns a per-message token; GSS_VerifyMIC() validates that token against the corresponding message.
section: 2.3.1
topics:
    - security
    - crypto
