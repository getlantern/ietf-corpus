document: rfc-4997
kind: protocol-element
summary: The CONTROL section declares fields that do not appear in the uncompressed header but carry an uncompressed value (ULENGTH > 0). Control fields communicate per-flow information (e.g., IP-ID behavior) not explicitly present in protocol headers, enabling profile-specific compression optimizations.
section: 4.12.1.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
