document: rfc-3748
kind: security-consideration
summary: The EAP Identity Request and Response are sent in cleartext, allowing an attacker to snoop, modify, or spoof the peer identity. It is RECOMMENDED that the Identity Response be used primarily for routing, and that EAP methods include a method-specific identity exchange with per-packet authentication, integrity protection, replay protection, and confidentiality.
section: "7.3"
topics:
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
