document: rfc-5844
kind: normative-requirement
summary: Mobility agents at tunnel entry and exit points MUST handle ECN as specified in RFC 5213 Section 5.6.3, and MUST apply IP fragmentation and tunnel error processing per Sections 7 and 8 of RFC 2473, for IPv4 payload packets.
