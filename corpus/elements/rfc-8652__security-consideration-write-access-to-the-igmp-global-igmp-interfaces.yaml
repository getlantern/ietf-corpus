document: rfc-8652
kind: security-consideration
summary: 'Write access to the igmp/global, igmp/interfaces, igmp/interfaces/interface, mld/global, mld/interfaces, and mld/interfaces/interface subtrees is sensitive: unauthorized modification can cause IGMP/MLD membership to be deleted or reconstructed, leading to network malfunctions and delivery of packets to inappropriate destinations.'
