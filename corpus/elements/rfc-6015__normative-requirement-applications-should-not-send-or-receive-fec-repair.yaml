document: rfc-6015
kind: normative-requirement
summary: Applications SHOULD NOT send or receive FEC repair flows if doing so would not help recover missing packets. It is RECOMMENDED that FEC protection levels are adjusted dynamically based on observed packet loss rates.
section: "8"
rfc2119_level: SHOULD NOT
