document: rfc-5952
kind: wire-format
summary: An IPv6 address in canonical text form consists of up to eight colon-separated 16-bit fields in lowercase hexadecimal with no leading zeros, with the longest consecutive run of all-zero fields replaced by '::' (first occurrence wins on ties), and '::' never used to abbreviate a single zero field.
