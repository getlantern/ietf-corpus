document: rfc-3339
kind: design-rationale
summary: Fractional seconds (time-secfrac) are the only rarely used optional element retained in the format, expected only for applications requiring strict timestamp ordering or unusual precision. All other rarely used ISO 8601 options were omitted to reduce interoperability risk.
section: "5.3"
