document: rfc-8152
kind: protocol-element
summary: 'The Enc_structure provides the AAD byte stream for AEAD encryption: [context: tstr, protected: bstr, external_aad: bstr]. Context strings distinguish the layer: ''Encrypt0'', ''Encrypt'', ''Enc_Recipient'', ''Mac_Recipient'', or ''Rec_Recipient''. AE algorithms require an empty protected header and no external AAD.'
section: "5.3"
