summary: The service name 'brski-reg-cmp' uses the suffix 'cmp' rather than 'lcmpp' because BRSKI-CMP implies adherence to the LCMPP—compliance with the profile is necessary and sufficient—so 'cmp' is less verbose while still conveying the constraint.
