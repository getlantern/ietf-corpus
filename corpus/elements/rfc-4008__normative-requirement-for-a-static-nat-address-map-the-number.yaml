summary: For a static NAT address map, the number of addresses in the local range (natAddrMapLocalAddrFrom to natAddrMapLocalAddrTo) MUST equal the number of addresses in the global range (natAddrMapGlobalAddrFrom to natAddrMapGlobalAddrTo).
