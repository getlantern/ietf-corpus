document: rfc-3986
kind: normative-requirement
summary: Use of "user:password" in the userinfo field is deprecated. Applications should not render as clear text any data after the first colon in userinfo unless that data is the empty string, and should reject storage of such data in unencrypted form.
section: 3.2.1
rfc2119_level: SHOULD
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
