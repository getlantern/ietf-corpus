document: rfc-7848
kind: normative-requirement
summary: The digital signature algorithm used in Signed Mark objects SHOULD be RSA-SHA256, and the RSA key SHOULD be at least 2048 bits. Deviation is only justified if RSA-SHA256 is deemed insufficient.
section: "5"
rfc2119_level: SHOULD
topics:
