document: rfc-2735
kind: normative-requirement
summary: A VPN-aware NHRP entity MUST be configured to associate the correct VPN-ID with information received from non-VPN-aware entities, and it MUST be ensured by administrative means that non-VPN-aware NHRP entities only communicate with entities in the same VPN or with VPN-aware entities pre-configured with their VPN-ID.
section: "3.2"
rfc2119_level: MUST
topics:
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
