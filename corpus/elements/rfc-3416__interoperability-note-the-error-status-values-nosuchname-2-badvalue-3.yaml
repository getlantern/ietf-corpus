document: rfc-3416
kind: interoperability-note
summary: The error-status values noSuchName (2), badValue (3), and readOnly (4) are marked 'for proxy compatibility' in the ASN.1 definition and are not generated by SNMPv2 command responders. Command generator applications must nonetheless handle them correctly when operating as proxies to SNMPv1 agents, per RFC 2576.
section: "3"
topics:
    - snmp
