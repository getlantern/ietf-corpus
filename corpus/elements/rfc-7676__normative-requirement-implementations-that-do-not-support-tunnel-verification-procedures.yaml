document: rfc-7676
kind: normative-requirement
summary: Implementations that do not support tunnel verification procedures MUST be configured so that GRE endpoints can fragment and reassemble the GRE delivery packet, unless deployed where GMTU is guaranteed greater than 1280.
section: "3.2"
rfc2119_level: MUST
