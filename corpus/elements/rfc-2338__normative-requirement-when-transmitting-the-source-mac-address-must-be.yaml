document: rfc-2338
kind: normative-requirement
summary: When transmitting, the source MAC address MUST be set to the Virtual Router MAC Address to ensure learning bridges correctly locate the virtual router's LAN segment. VRRP packets are sent to the VRRP IP multicast group 224.0.0.18.
section: "7.2"
rfc2119_level: MUST
topics:
    - routing
    - ip
