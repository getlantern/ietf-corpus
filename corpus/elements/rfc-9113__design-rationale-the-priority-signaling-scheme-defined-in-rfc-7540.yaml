document: rfc-9113
kind: design-rationale
summary: The priority signaling scheme defined in RFC 7540 is deprecated in this document. The RFC 7540 scheme was complex, not uniformly implemented, and server deployments often ignored client signals. Implementations are encouraged to use the scheme described in [HTTP-PRIORITY] instead.
section: "5.3"
topics:
    - http
