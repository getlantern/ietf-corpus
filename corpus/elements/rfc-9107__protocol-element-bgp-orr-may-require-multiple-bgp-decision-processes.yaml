document: rfc-9107
kind: protocol-element
summary: BGP ORR may require multiple BGP Decision Processes or subsets thereof in order to consider different IGP locations or BGP policies for different sets of clients. If only IGP cost optimization is needed, only step e) and subsequent steps need to run multiple times; if different BGP policies are needed, a larger portion or the entire Decision Process must run multiple times.
section: "3.2"
topics:
    - bgp
    - routing
