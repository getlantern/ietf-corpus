document: rfc-5142
kind: interoperability-note
summary: When the home agent addresses in the Home Agent Switch message have a different prefix from the mobile node's home link, choosing such a home agent may require a change of the mobile node's home address, potentially causing loss of connectivity for connections using the current home address.
section: "6.2"
topics:
    - mobility
    - v6ops
