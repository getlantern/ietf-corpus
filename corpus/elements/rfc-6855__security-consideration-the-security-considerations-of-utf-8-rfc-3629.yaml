document: rfc-6855
kind: security-consideration
summary: The security considerations of UTF-8 (RFC 3629) and SASLprep (RFC 4013) apply, particularly regarding use of UTF-8 in usernames and passwords. Special security considerations arise when a server conforming to this specification is accessed by a non-conforming client or when the same message is accessed by multiple clients using different protocols or capabilities.
section: "10"
topics:
