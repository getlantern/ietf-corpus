document: rfc-2640
kind: normative-requirement
summary: Clients MUST support the FEAT command and recognize the "UTF8" feature to determine whether a server supports UTF-8 encoding. Clients presented with UTF-8 pathnames SHOULD parse UTF-8 correctly and attempt display.
section: "3.3"
rfc2119_level: MUST
