document: rfc-6915
kind: design-rationale
summary: Certain NAT types, particularly Carrier Grade NATs, require the complete 6-tuple (Layer 3 protocol, Layer 4 protocol, source address, source port, destination address, destination port) to unambiguously identify a flow and thus the true Device. The RFC 6155 port-only approach is insufficient for these NAT scenarios.
section: "1"
topics:
