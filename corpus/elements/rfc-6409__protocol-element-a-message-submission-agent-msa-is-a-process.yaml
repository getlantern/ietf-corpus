document: rfc-6409
kind: protocol-element
summary: A Message Submission Agent (MSA) is a process that conforms to this specification, acting as a submission server to accept messages from MUAs, then either delivering them or relaying them to an MTA as an SMTP client. It is distinct from an MTA, which relays between MTAs.
section: "2.1"
