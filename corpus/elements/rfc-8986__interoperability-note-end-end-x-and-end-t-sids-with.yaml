document: rfc-8986
kind: interoperability-note
summary: End, End.X, and End.T SIDs (with flavors PSP/USP/USD) are signaled in the IGP and BGP-LS. Decapsulation SIDs (End.DX4, End.DX6, End.DT4, End.DT6, End.DT46, End.DX2, End.DX2V, End.DT2U, End.DT2M) are signaled in BGP-LS and BGP IP/VPN/EVPN. Binding SIDs (End.B6.Encaps, End.B6.Encaps.Red, End.BM) are signaled only in BGP-LS.
section: "8.4"
topics:
    - routing
    - bgp
