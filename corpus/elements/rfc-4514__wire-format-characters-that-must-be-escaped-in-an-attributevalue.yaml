summary: 'Characters that MUST be escaped in an AttributeValue string include: leading space or ''#'', trailing space, the characters ''"'', ''+'', '','', '';'', ''<'', ''>'', ''\'', and the null character (U+0000). Escaping is done via backslash-hex-pair or backslash-prefix for certain special characters.'
