document: rfc-9266
kind: design-rationale
summary: The 'tls-unique' binding defined in RFC 5929 is susceptible to the triple handshake vulnerability without the extended master secret extension (RFC 7627). TLS 1.3 was not analyzed for channel binding safety during its core protocol work, so channel bindings for TLS 1.3 were deferred and are now defined here via 'tls-exporter'.
section: "1"
topics:
    - tls
    - security
    - crypto
