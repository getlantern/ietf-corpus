document: rfc-9026
kind: normative-requirement
summary: The Source IP Address TLV (Type=1) MUST be included in the BFD Discriminator attribute when the BFD Mode is P2MP BFD Session; a BFD Discriminator attribute missing this TLV MUST be handled using the 'attribute discard' approach per RFC 7606.
section: 3.1.6
rfc2119_level: MUST
topics:
    - vpn
    - bgp
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
