document: rfc-6072
kind: normative-requirement
summary: 'If a UA receives a 437 (Unsupported Certificate) response, it SHOULD remove the used certificate from cache and fetch a new one. If a UA cannot decrypt a received PKCS #8 object, it MUST send a 437 response.'
section: "7.10"
rfc2119_level: SHOULD
topics:
    - sip
    - security
