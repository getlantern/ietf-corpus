document: rfc-5420
kind: normative-requirement
summary: Unassigned bits in the Attribute Flags TLV MUST be set to zero on transmission. Bits not contained in the TLV and bits in an absent TLV or absent object MUST be assumed to be set to zero, as if the bits were present and zero.
section: "3.1"
rfc2119_level: MUST
topics:
