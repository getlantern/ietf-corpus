document: rfc-6786
kind: protocol-element
summary: The Encryption-Encap AVP (AVP code 12) encapsulates one or more PANA AVPs in encrypted form. When AES128_CTR is negotiated, the AVP data payload is occupied by the ciphertext of the encapsulated AVPs.
