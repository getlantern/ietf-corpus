document: rfc-4462
kind: normative-requirement
summary: When calling GSS_Init_sec_context() during key exchange, the client MUST set mutual_req_flag to 'true' to request mutual authentication and MUST set integ_req_flag to 'true' to request per-message integrity protection. If the resulting context does not have mutual_state or integ_avail set, the key exchange MUST fail.
section: "2.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
