document: rfc-9956
kind: normative-requirement
summary: By default, a node supporting the NQB PHB SHOULD classify packets marked with DSCP value 45 (decimal) into the NQB queue. A node MUST support the ability to configure the DSCP used to classify packets into the NQB queue, and MAY support multiple configurable DSCPs for this purpose.
section: "5.1"
rfc2119_level: MUST
topics:
    - diffserv
    - qos
    - registry
