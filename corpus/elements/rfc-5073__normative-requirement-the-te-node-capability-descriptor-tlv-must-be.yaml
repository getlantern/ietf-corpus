document: rfc-5073
kind: normative-requirement
summary: The TE Node Capability Descriptor TLV MUST be carried within an OSPFv2 type 10 Router Information LSA or an OSPFv3 Router Information LSA with the S1 bit set and the S2 bit cleared, limiting flooding scope to area-local.
section: "5.1"
rfc2119_level: MUST
topics:
