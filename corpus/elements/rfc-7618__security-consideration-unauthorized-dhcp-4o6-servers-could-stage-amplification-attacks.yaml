document: rfc-7618
kind: security-consideration
summary: Unauthorized DHCP 4o6 servers could stage amplification attacks or supply invalid configurations causing service disruption. The risk is mitigated by using unicast DHCP 4o6 message flows, enabled by supplying server unicast addresses within OPTION_DHCP4_O_DHCP6_SERVER.
section: "10"
