document: rfc-9819
kind: normative-requirement
summary: When AL values are both non-zero and equal across the two route types, the ARG from the Ethernet A-D per ES route MUST be encoded within the LOC:FUNC SID at offset LBL+LNL+FL, and all bits beyond LBL+LNL+FL+AL MUST be set to zero to form the complete SRv6 Service SID.
section: "3.3"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
