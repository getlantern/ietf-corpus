document: rfc-2402
kind: interoperability-note
summary: If the IPsec implementation encounters an IPv4 option it does not recognize, it should zero the whole option using the second byte (length) of the option. IPv6 options carry a per-option mutability bit that determines whether the Option Data is zeroed during ICV computation.
section: 3.3.3.1
topics:
    - ipsec
    - ip
