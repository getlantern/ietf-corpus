document: rfc-4993
kind: security-consideration
summary: Because IRIS-LWZ is UDP-based, servers can be exploited in reflection-based distributed denial-of-service attacks similar to DNS reflection. Operators should apply DNS-equivalent mitigation techniques and follow BCP 38 (RFC 2827) for ingress filtering.
section: "8"
topics:
    - security
    - udp
