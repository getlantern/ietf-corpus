document: rfc-6544
kind: interoperability-note
summary: ICE TCP has lower NAT traversal success probability than UDP-based ICE when both hosts are behind NATs, because many deployed NATs have endpoint-dependent mapping behavior or do not correctly handle TCP simultaneous-open handshake packets. Measurements from 2005 found TCP simultaneous-open succeeded in roughly 45% of cases.
section: A
topics:
    - nat
    - tcp
