document: rfc-2131
kind: interoperability-note
summary: DHCP must interoperate with BOOTP relay agents as specified in RFC 951 and RFC 1542; existing BOOTP clients interoperate with DHCP servers because DHCP is a superset of the BOOTP message format. DHCP servers must also provide service to BOOTP clients.
section: "1.6"
topics:
    - ip
