summary: 'Sample metrics for each singleton metric use Poisson sampling: given T0, Tf, and Lambda, a pseudo-random Poisson process generates arrival times and the sample is the resulting sequence of <time, delay> pairs. This approach is adopted directly from the IPPM framework (RFC 2330).'
