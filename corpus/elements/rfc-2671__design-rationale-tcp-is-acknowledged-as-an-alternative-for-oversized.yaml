document: rfc-2671
kind: design-rationale
summary: TCP is acknowledged as an alternative for oversized requests, but using EDNS to discover and exploit a responder's larger UDP payload size is preferred over outright TCP when there is reason to believe the responder supports EDNS and the request would not fit in 512 bytes.
section: 4.5.4
topics:
    - dns
