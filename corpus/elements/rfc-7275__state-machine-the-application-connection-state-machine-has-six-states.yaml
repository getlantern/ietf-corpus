document: rfc-7275
kind: state-machine
summary: 'The Application Connection State Machine has six states: NONEXISTENT, RESET, CONNSENT, CONNREC, CONNECTING, and OPERATIONAL. It is triggered by Application Connect/Disconnect TLVs, NAK TLVs, and ICCP connection establishment or teardown; the A-bit in Connect TLVs signals mutual acknowledgment.'
section: 4.4.2
topics:
