document: rfc-3382
kind: interoperability-note
summary: IPP 1.x Printers and Clients will gracefully ignore collections and their member attributes if they do not understand the collection syntax. The begCollection and endCollection elements each look like an attribute with an unsupported attribute syntax, causing the recipient to ignore the entire attribute and all its values.
section: "8"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
