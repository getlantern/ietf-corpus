document: rfc-6658
kind: wire-format
summary: 'The packet PW encapsulation stack consists of (bottom to top): server MPLS tunnel labels (n*4 octets), PW label (4 octets), optional control word (4 octets), Ethernet header (14 octets), and the client network-layer packet. The Ethernet header and control word do not maintain 32-bit alignment, which is intentional for backwards compatibility with RFC 4448.'
