document: rfc-6926
kind: normative-requirement
summary: Each DHCPBULKLEASEQUERY request MUST contain exactly one primary query type; having more than one MUST cause the server to terminate the request immediately with DHCPLEASEQUERYDONE and a status-code of NotAllowed.
section: "8.2"
rfc2119_level: MUST
