document: rfc-9686
kind: normative-requirement
summary: The client MUST refresh registrations to keep the server's view current. For SLAAC addresses, refresh is triggered whenever the network changes the Valid Lifetime by more than 1%, using AddrRegRefreshInterval = 80% × Valid Lifetime × AddrRegDesyncMultiplier (random 0.9–1.1).
section: 4.6.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
