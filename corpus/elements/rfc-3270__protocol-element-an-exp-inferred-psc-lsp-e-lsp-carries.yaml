document: rfc-3270
kind: protocol-element
summary: An EXP-Inferred-PSC LSP (E-LSP) carries one or more Ordered Aggregates on a single LSP; the LSR determines both the PHB Scheduling Class and drop precedence for each packet by mapping the 3-bit EXP field of the MPLS Shim Header to a PHB. A single E-LSP can support up to eight Behavior Aggregates of a given FEC.
section: "1.2"
topics:
    - mpls
    - diffserv
    - qos
