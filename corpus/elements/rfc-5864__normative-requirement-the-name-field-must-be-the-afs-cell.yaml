document: rfc-5864
kind: normative-requirement
summary: The <name> field MUST be the AFS cell name for which the server provides services. Clients MUST query DNS SRV RRs only for a <name> value exactly matching the AFS cell of interest and MUST NOT remove leading components to search for more general DNS SRV RRs.
section: "4"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
