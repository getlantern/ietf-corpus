document: rfc-9432
kind: security-consideration
summary: Catalog zone transfers SHOULD be protected via TSIG (RFC 8945) or Strict/Mutual TLS using DNS Zone Transfer over TLS/QUIC (RFC 9103). DNS UPDATE modifications to catalog zones SHOULD similarly be authenticated. Zone transfers of member zones SHOULD also be authenticated.
section: "7"
topics:
    - dns
    - security
    - tls
