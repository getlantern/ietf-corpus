document: rfc-6721
kind: normative-requirement
summary: When a Deleted Entry Document is both signed and encrypted, it MUST be signed first and then encrypted. When MACs are used with symmetric encryption, the same key SHOULD NOT be used for both the MAC and the encryption.
section: "6"
rfc2119_level: MUST
topics:
    - crypto
    - security
