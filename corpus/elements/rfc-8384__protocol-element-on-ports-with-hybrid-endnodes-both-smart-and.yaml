document: rfc-8384
kind: protocol-element
summary: 'On ports with hybrid endnodes (both Smart and non-Smart), RB1 sends two copies of multicast frames: one native (for normal endnodes) and one TRILL-encapsulated (for Smart Endnodes). Avoiding hybrid ports is RECOMMENDED to reduce complexity and bandwidth waste.'
