document: rfc-5629
kind: normative-requirement
summary: If a user agent supports presentation-free user interfaces, it MUST support the SUBSCRIBE method and the KPML event package, MUST include SUBSCRIBE in the Allow header field, MUST include KPML in the Allow-Events header field, and MUST support the 'application/kpml-request+xml' MIME type.
section: "9.1"
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
