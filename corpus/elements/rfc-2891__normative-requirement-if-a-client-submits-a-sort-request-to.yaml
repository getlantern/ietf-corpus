document: rfc-2891
kind: normative-requirement
summary: If a client submits a sort request to a server that chains the request and the criticality is TRUE, the server MUST merge sort all results before returning them to the client or MUST return unwillingToPerform.
section: "2.1"
rfc2119_level: MUST
