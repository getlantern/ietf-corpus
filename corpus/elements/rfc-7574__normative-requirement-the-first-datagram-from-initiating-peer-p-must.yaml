document: rfc-7574
kind: normative-requirement
summary: The first datagram from initiating Peer P MUST NOT include any heavy payload (DATA messages, SIGNED_INTEGRITY messages, or a large number of smaller messages). This prevents an amplification attack where a spoofed source address causes the responder to flood a victim.
section: 3.1.1
rfc2119_level: MUST NOT
topics:
    - realtime
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
