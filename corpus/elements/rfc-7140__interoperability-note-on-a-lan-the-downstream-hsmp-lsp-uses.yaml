document: rfc-7140
kind: interoperability-note
summary: On a LAN, the downstream HSMP LSP uses an upstream LSR context label (RFC 5331) as the top label and the LSP label as the second label, enabling context-specific forwarding table lookup. The upstream path on a LAN uses only the label allocated for the upstream HSMP FEC, identical to non-LAN upstream operation.
section: "4"
topics:
