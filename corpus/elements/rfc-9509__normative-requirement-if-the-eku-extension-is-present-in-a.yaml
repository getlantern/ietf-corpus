document: rfc-9509
kind: normative-requirement
summary: If the EKU extension is present in a certificate, then the certificate MUST only be used for one of the purposes indicated, as specified in RFC 5280. If multiple key purposes are indicated, the application need not recognize all purposes as long as the intended purpose is present.
section: "3"
rfc2119_level: MUST
topics:
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
