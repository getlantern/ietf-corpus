document: rfc-3019
kind: normative-requirement
summary: The document RECOMMENDS that implementers use SNMPv3 with the User-based Security Model (RFC 2574) and View-based Access Control Model (RFC 2575) to protect MIB access, rather than the insecure SNMPv1 environment.
section: Security Considerations
rfc2119_level: RECOMMENDED
