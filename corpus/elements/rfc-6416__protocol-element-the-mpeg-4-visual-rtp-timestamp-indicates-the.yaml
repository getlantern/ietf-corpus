document: rfc-6416
kind: protocol-element
summary: The MPEG-4 Visual RTP timestamp indicates the sampling instance of the VOP in the packet. When multiple VOPs are in one packet, the timestamp indicates the earliest VOP time; timestamps for remaining VOPs are derived from VOP header fields (modulo_time_base, vop_time_increment). Default resolution is 90 kHz.
section: "5.1"
topics:
    - rtp
    - realtime
