document: rfc-5611
kind: wire-format
summary: The TDM PW AVP (Attribute Type 99) is a 12-byte AVP carried in ICRQ/OCRQ messages. It contains a Reserved/SP/CAS flags field, a 16-bit Bit Rate field (in units of 64 Kbit/s), and a 16-bit Payload Bytes field. The M bit SHOULD be set to 0; the H bit MAY be 0 or 1.
section: "2.1"
topics:
