document: rfc-9488
kind: normative-requirement
summary: If a PCE cannot infer the protection status of a resource, it MAY use local policy. For Segment Routing paths, it is RECOMMENDED that a PCE assume a Node SID is protected, and that an Adjacency SID is protected if the backup flag advertised with the Adjacency SID is set.
section: "5"
rfc2119_level: RECOMMENDED
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
