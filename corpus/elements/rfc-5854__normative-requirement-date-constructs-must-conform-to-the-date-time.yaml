document: rfc-5854
kind: normative-requirement
summary: Date constructs MUST conform to the 'date-time' production in RFC 3339. An uppercase 'T' MUST separate date and time, and an uppercase 'Z' MUST be present in the absence of a numeric time zone offset.
section: "3.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
