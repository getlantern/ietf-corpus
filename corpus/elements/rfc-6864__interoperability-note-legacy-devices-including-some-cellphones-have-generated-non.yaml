document: rfc-6864
kind: interoperability-note
summary: Legacy devices including some cellphones have generated non-varying (constant zero) IPv4 IDs for atomic datagrams for many years, predating this specification. ROHC already accommodates non-changing IDs as an optimization, and IP/ICMP translation standards also describe constant-zero IDs.
section: "5.1"
topics:
    - ip
