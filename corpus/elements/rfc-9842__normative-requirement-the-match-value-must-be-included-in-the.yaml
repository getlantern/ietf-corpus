document: rfc-9842
kind: normative-requirement
summary: The 'match' value MUST be included in the 'Use-As-Dictionary' response header for the dictionary to be considered valid. The URL Pattern MUST NOT use regular expressions and MUST be for the same origin as the dictionary.
section: 2.1.1
rfc2119_level: MUST
topics:
    - http
    - security
