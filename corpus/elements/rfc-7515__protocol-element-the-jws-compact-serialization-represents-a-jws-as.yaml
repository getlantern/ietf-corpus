document: rfc-7515
kind: protocol-element
summary: The JWS Compact Serialization represents a JWS as BASE64URL(UTF8(JWS Protected Header)) || '.' || BASE64URL(JWS Payload) || '.' || BASE64URL(JWS Signature). It is a compact, URL-safe string supporting exactly one signature or MAC and no JWS Unprotected Header.
