document: rfc-5195
kind: protocol-element
summary: BGP Route Target Extended Communities are used for PIT route filtering. Each PIT is configured with 'export Route Targets' for tagging local information advertised into the provider BGP, and 'import Route Targets' that restrict which remote routes may be imported into the PIT.
