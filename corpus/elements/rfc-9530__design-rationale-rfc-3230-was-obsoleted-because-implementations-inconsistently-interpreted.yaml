document: rfc-9530
kind: design-rationale
summary: 'RFC 3230 was obsoleted because implementations inconsistently interpreted its ''instance'' concept: many computed digests over message content rather than representation data as intended. Because a content digest also proves useful for certain cases, non-conformance was difficult to detect. The new field names (Repr-Digest, Content-Digest) explicitly disambiguate the two inputs.'
section: "1.3"
topics:
    - http
