document: rfc-7828
kind: normative-requirement
summary: A DNS client receiving an edns-tcp-keepalive option over TCP SHOULD honour the timeout received, overriding any previous timeout, and initiate close of the connection before the timeout expires.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
