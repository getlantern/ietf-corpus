document: rfc-7555
kind: wire-format
summary: 'The Upstream Neighbor Address TLV encodes: Upst Addr Type (1 octet), Local Addr Type (1 octet), MBZ (2 octets), Upstream Address (0/4/16 octets per type), Local Address (0/4/16 octets per type). Address types: 0=no address, 1=IPv4, 3=IPv6. The upstream address MUST be the address used in the protocol exchange that established the label binding.'
section: "5.3"
topics:
    - mpls
    - routing
