document: rfc-6672
kind: protocol-element
summary: In DNSSEC negative responses, the NSEC or NSEC3 type bitmap SHOULD be checked for the DNAME bit. If the DNAME bit is set and the query name is a subdomain of the closest encloser, DNAME substitution should have been performed; its absence indicates a bogus response.
section: 5.3.2
topics:
    - dns
    - security
extracted_by: claude-sonnet-4-6
