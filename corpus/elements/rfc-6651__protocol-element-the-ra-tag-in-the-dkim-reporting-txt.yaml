document: rfc-6651
kind: protocol-element
summary: The 'ra=' tag in the DKIM Reporting TXT record specifies the local-part of the address to which failure reports should be sent. The full address is constructed by appending '@' and the 'd=' domain from the DKIM-Signature.
section: "3.2"
