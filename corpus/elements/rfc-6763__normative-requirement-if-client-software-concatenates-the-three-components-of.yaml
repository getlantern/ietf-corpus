document: rfc-6763
kind: normative-requirement
summary: If client software concatenates the three components of a Service Instance Name into a single string, dots within the <Instance> portion MUST be escaped with a backslash ('.' → '\.') and backslashes must also be escaped ('\' → '\\') to preserve DNS label boundaries.
section: "4.3"
rfc2119_level: MUST
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
