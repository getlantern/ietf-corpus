document: rfc-2049
kind: design-rationale
summary: Local newline formats (LF-only, bare CR, CRLF, counted records) are considered encodings of canonical RFC 822/MIME, not canonical form itself. Formats that encode CRLF as LF cannot represent binary MIME content containing LF octets that are not line separators.
