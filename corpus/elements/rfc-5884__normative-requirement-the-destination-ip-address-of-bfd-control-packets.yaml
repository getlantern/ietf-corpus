document: rfc-5884
kind: normative-requirement
summary: The destination IP address of BFD Control packets sent by the ingress LSR MUST be randomly chosen from the 127/8 range for IPv4 or 0:0:0:0:0:FFFF:7F00/104 for IPv6, except when exercising a specific alternate path discovered by LSP Ping traceroute.
section: "7"
rfc2119_level: MUST
topics:
