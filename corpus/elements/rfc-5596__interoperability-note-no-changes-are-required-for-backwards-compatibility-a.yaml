document: rfc-5596
kind: interoperability-note
summary: 'No changes are required for backwards compatibility: a client conforming to this document interoperates with an RFC 4340 server without issue, and an RFC 4340 client silently ignores DCCP-Listen packets per existing step-1 processing. Servers performing passive-open without fully binding addresses/ports/Service Codes are unaffected.'
