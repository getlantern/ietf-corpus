document: rfc-2274
kind: security-consideration
summary: The principal threats USM addresses are modification of in-transit messages and masquerade (impersonation). Secondary threats with limited protection are disclosure (eavesdropping) and message stream modification (replay/reordering beyond normal network behavior). DoS and traffic analysis are explicitly out of scope.
section: "1.1"
topics:
