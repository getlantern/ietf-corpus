document: rfc-8437
kind: normative-requirement
summary: A NO response to UNAUTHENTICATE is not permitted. A BAD response is only permitted if UNAUTHENTICATE is issued in an invalid state, not advertised, or syntactically invalid. Servers that cannot reset connection state MAY close the connection with an untagged BYE instead.
section: "3"
rfc2119_level: MAY
topics:
    - email
