document: rfc-8349
kind: design-rationale
summary: The 'routing-state' container and its subtree are retained in the YANG module with 'status obsolete' rather than removed outright, because NMDA (RFC 8342) supersedes the pre-NMDA pattern of separate config and state containers; the unified '/routing' container serves both roles via NMDA datastores.
