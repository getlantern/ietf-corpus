document: rfc-3923
kind: normative-requirement
summary: If the receiving agent is unable to decrypt the encrypted XML stanza, it SHOULD NOT present the stanza to the recipient and SHOULD provide alternate processing (e.g., a warning that the stanza cannot be decrypted).
