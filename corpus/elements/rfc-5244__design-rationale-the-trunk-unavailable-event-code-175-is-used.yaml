document: rfc-5244
kind: design-rationale
summary: The trunk unavailable event (code 175) is used statelessly rather than sending a continuous RTP stream, avoiding unnecessary bandwidth consumption during downtime. In T1 applications, trunk conditioning via ABCD transitional events can serve the same purpose.
