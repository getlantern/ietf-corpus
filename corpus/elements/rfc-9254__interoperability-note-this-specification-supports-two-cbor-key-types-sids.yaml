document: rfc-9254
kind: interoperability-note
summary: This specification supports two CBOR key types — SIDs and names — which are distinguishable by their CBOR type (integer vs. text string). Protocols or mechanisms implementing this specification can mandate one key type or allow the generator to choose freely per key.
