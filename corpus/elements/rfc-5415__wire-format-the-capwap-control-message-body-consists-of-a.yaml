document: rfc-5415
kind: wire-format
summary: The CAPWAP Control Message body consists of a 4-byte Message Type, 1-byte Sequence Number, 2-byte Message Element Length, 1-byte Flags, followed by zero or more Message Elements. Each Message Element has a 2-byte Type, 2-byte Length, and variable-length Value field.
section: 4.5.1
