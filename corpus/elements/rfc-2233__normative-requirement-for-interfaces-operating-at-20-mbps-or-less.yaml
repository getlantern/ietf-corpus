document: rfc-2233
kind: normative-requirement
summary: For interfaces operating at 20 Mbps or less, 32-bit byte and packet counters MUST be used. For interfaces between 20 Mbps and 650 Mbps, 32-bit packet counters MUST be used and 64-bit octet counters MUST be used. For interfaces at 650 Mbps or faster, 64-bit packet AND 64-bit octet counters MUST be used.
section: 3.1.6
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
