document: rfc-4206
kind: protocol-element
summary: A Forwarding Adjacency (FA) is a TE link formed by advertising an FA-LSP into the same ISIS/OSPF instance that created the LSP. The FA is applicable only when an LSP is both created and used as a TE link by exactly the same instance of the GMPLS control plane.
section: "1"
topics:
    - mpls
    - routing
