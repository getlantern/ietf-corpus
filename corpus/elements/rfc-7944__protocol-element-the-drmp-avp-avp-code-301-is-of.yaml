document: rfc-7944
kind: protocol-element
summary: The DRMP AVP (AVP code 301) is of type Enumerated and carries the routing message priority for a Diameter transaction. It defines 16 priority levels (PRIORITY_0 through PRIORITY_15), where PRIORITY_0 is highest and PRIORITY_15 is lowest.
