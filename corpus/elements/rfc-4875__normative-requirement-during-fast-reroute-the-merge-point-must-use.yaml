document: rfc-4875
kind: normative-requirement
summary: During fast reroute, the Merge Point MUST use the LSP-ID to identify corresponding S2L sub-LSPs and MUST NOT use the <Sub-Group Originator ID, Sub-Group ID> tuple, because the Sub-Group Originator ID may have been changed by an LSR bypassed by the bypass tunnel.
section: 15.1.2
rfc2119_level: MUST NOT
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
