document: rfc-7524
kind: normative-requirement
summary: For global table multicast, an egress PE MUST be auto-configured to import routes carrying an AS-specific Route Target Extended Community with the Global Administrator field set to the AS of the PE and Local Administrator set to 0. Similarly, an egress ABR MUST auto-configure an import AS-based Route Target Extended Community for the same purpose.
section: "6"
rfc2119_level: MUST
topics:
    - bgp
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
