document: rfc-4544
kind: protocol-element
summary: The iscsiSessionAttributesTable tracks active iSCSI sessions per node. Each session has a type (normal SCSI or SendTargets discovery) and a direction (Inbound from an outside initiator to a local target, or Outbound from a local initiator to an outside target). Negotiated attributes such as authentication and integrity schemes are stored as OIDs rather than enumerated types.
section: "6.12"
topics:
