document: rfc-1964
kind: wire-format
summary: 'All GSS-API tokens use an InitialContextToken framing: [APPLICATION 0] IMPLICIT SEQUENCE containing a MechType OID and an innerContextToken. Context establishment tokens carry a 2-byte TOK_ID field: 01 00 for KRB_AP_REQ, 02 00 for KRB_AP_REP, 03 00 for KRB_ERROR.'
