document: rfc-8586
kind: design-rationale
summary: Hostnames are preferred over pseudonyms for cdn-id values to help avoid accidental collisions. When pseudonyms are used, values should be a well-known CDN name or a high-entropy generated value (e.g., a UUID per RFC 4122) to reduce collision probability.
section: "2"
