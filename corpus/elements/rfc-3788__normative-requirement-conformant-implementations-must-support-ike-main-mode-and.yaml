document: rfc-3788
kind: normative-requirement
summary: Conformant implementations MUST support IKE Main Mode and Aggressive Mode. For transport mode with pre-shared keys, IKE Aggressive Mode SHOULD be used and Main Mode SHOULD NOT be used. When digital signatures are used, either mode MAY be used.
section: "5"
rfc2119_level: MUST
topics:
    - ipsec
    - security
