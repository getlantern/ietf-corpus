kind: protocol-element
summary: When P and Q nodes are not adjacent along the post-convergence path, the PLR may encode the inter-segment path as a list of Adjacency SIDs or compute a shorter optimized segment list. The general RL form is (Node-SID(P), EP(P,Q)) where EP(P,Q) is an explicit SR path.
