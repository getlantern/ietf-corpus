document: rfc-6594
kind: security-consideration
summary: Users of SSHFP are encouraged to deploy SHA-256 as soon as implementations allow. The SHA-2 family is widely believed to be more resilient to attack than SHA-1, and confidence in SHA-1's strength is being eroded by announced attacks.
