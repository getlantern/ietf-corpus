document: rfc-7324
kind: security-consideration
summary: The changes and clarifications in this document raise no new security concerns. RFC 6941 ('MPLS Transport Profile (MPLS-TP) Security Framework') provides the baseline security discussion for MPLS-TP, and PSC as described in RFC 6378 and this document falls under that umbrella. Section 2.2 additionally clarifies how to react to malformed or unexpected messages.
