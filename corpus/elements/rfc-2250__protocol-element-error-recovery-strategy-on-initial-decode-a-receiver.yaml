document: rfc-2250
kind: protocol-element
summary: 'Error recovery strategy: on initial decode, a receiver may discard all packets until the S (Sequence-header-present) bit is set to 1, at which point sufficient state for MPEG decoding is present. After any packet loss (detected by RTP sequence number gap), the receiver may discard packets until the B (Beginning-of-slice) bit is set.'
section: Appendix 1
topics:
