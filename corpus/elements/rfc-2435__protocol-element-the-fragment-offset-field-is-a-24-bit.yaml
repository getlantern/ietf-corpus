document: rfc-2435
kind: protocol-element
summary: The Fragment Offset field is a 24-bit value (network byte order) giving the byte offset of the current packet's payload within the JPEG frame. The Fragment Offset plus payload length MUST NOT exceed 2^24 bytes.
section: 3.1.2
rfc2119_level: MUST NOT
