summary: 'Transparency to SNMP managers is a fundamental requirement: from a manager''s perspective, an extensible AgentX agent behaves identically to a monolithic agent with equivalent MIB instrumentation. This distinguishes AgentX subagents from SNMP proxy agents, where the proxy relationship is externally visible.'
