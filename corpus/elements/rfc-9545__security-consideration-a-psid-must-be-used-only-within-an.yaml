document: rfc-9545
kind: security-consideration
summary: A PSID must be used only within an SR-MPLS trusted domain and must not leak outside the domain. SR domain boundary routers MUST filter any external traffic destined to a label associated with a segment within the trusted domain, including PSIDs.
section: "4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
    - security
