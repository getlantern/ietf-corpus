document: rfc-4028
kind: protocol-element
summary: The Min-SE header field indicates the minimum value for the session interval in delta-seconds. It appears in INVITE or UPDATE requests and MUST NOT appear in responses except for 422 responses. Its default value when absent is 90 seconds.
