document: rfc-8572
kind: registry
summary: The service name '_sztp' is registered in the Service Name and Transport Protocol Port Number Registry for SZTP bootstrap server discovery via DNS SRV records. The DNS node name '_sztp' is also registered in the Underscored and Globally Scoped DNS Node Names Registry per RFC 8552 for use in device-specific TXT record queries.
section: "10.6"
