document: rfc-8600
kind: state-machine
summary: 'XMPP-Grid workflow: (a) Platform requests connection to Controller; (b) Controller authenticates Platform; (c) Platform establishes authorized privileges (publish/subscribe) with Broker; (d) Platform publishes, subscribes, or queries Topics; (e) Provider unicasts updates through Broker, which replicates to Consumers.'
