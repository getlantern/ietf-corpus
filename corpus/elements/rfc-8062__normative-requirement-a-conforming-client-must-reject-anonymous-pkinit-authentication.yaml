document: rfc-8062
kind: normative-requirement
summary: A conforming client MUST reject anonymous PKINIT authentication if PA_PKINIT_KX is absent from the KDC reply, or if the ticket session key is not the combined key of the KDC contribution key and the reply key as specified.
section: "7"
rfc2119_level: MUST
topics:
