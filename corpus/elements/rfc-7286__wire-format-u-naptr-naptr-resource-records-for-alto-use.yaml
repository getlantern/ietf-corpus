document: rfc-7286
kind: wire-format
summary: U-NAPTR NAPTR resource records for ALTO use the flags field "u", the service field "ALTO:https" (or "ALTO:http"), and a regex that rewrites the domain to the full ALTO server URI (e.g., "!.*!https://alto1.example.net/ird!"). Order and preference fields follow standard NAPTR conventions.
section: "3.2"
topics:
