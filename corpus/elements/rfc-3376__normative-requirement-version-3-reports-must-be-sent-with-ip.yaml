document: rfc-3376
kind: normative-requirement
summary: Version 3 Reports MUST be sent with IP destination address 224.0.0.22, to which all IGMPv3-capable multicast routers listen. Routers MUST accept a report with a source address of 0.0.0.0, which may be used by systems not yet having an IP address.
section: 4.2.13
rfc2119_level: MUST
topics:
    - multicast
    - ip
