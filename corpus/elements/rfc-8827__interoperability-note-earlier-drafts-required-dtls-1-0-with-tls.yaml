document: rfc-8827
kind: interoperability-note
summary: Earlier drafts required DTLS 1.0 with TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA. At time of publication, some implementations do not support DTLS 1.2; endpoints which support only DTLS 1.2 might encounter interoperability issues with those older implementations.
