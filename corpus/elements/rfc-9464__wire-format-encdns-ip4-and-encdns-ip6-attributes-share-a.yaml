summary: 'ENCDNS_IP4 and ENCDNS_IP6 attributes share a common format: 1-bit R (reserved), 15-bit Attribute Type, 2-octet Length, 2-octet Service Priority, 1-octet Num Addresses, 1-octet ADN Length, variable IP Address(es) (4 octets each for IPv4, 16 for IPv6), variable Authentication Domain Name, and variable SvcParams.'
