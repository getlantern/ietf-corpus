document: rfc-8739
kind: state-machine
summary: 'The ACME Order state machine is extended with a ''canceled'' terminal state. Transitions: valid -> canceled (STAR certificate canceled by IdO); valid -> expired (natural expiration). The existing states pending, ready, processing, valid, and invalid from RFC 8555 remain; ''canceled'' is new.'
section: 3.1.2
topics:
    - acme
