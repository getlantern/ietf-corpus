document: rfc-3016
kind: design-rationale
summary: LATM's multiple-object and scalable-layer multiplexing features are omitted from the RTP mapping because RTP carries streams individually; audio for scalable streams should be on separate RTP packets to allow differentiated IP-level treatment.
