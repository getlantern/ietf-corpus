document: rfc-2531
kind: security-consideration
summary: Capability negotiation reveals information about one party to others, potentially allowing a malicious party to make better guesses about specific security holes. Implementors should ensure that capability information is revealed only to appropriate persons, systems, and agents through the mechanisms employed.
section: "6.1"
topics:
    - security
