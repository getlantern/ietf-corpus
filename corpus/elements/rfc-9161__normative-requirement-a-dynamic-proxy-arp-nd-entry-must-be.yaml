document: rfc-9161
kind: normative-requirement
summary: A dynamic Proxy ARP/ND entry MUST be flushed from the table if the IP->MAC has not been refreshed within a configured age-time; the entry is refreshed upon receipt of an ARP or NA message for the same IP->MAC.
section: "3.5"
rfc2119_level: MUST
topics:
    - ip
    - routing
