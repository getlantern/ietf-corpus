document: rfc-3119
kind: protocol-element
summary: An MP3 ADU (Application Data Unit) is defined by the 'side info' structure's main_data_begin field, which is a back-pointer in bytes to the start of the ADU counted from the beginning of the frame, excluding header, CRC, and side info. ADUs vary in length but average the MP3 frame size minus header, CRC, and side info; in MPEG literature this is called the 'bit reservoir'.
