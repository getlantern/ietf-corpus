document: rfc-4145
kind: normative-requirement
summary: If an offerer wants to continue using the previously-established TCP connection, it MUST use a connection value of 'existing'. If it wants a new connection, it MUST use a connection value of 'new'.
section: "5.1"
rfc2119_level: MUST
topics:
    - tcp
    - realtime
