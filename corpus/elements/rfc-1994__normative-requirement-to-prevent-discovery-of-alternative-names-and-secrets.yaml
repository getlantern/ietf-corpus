document: rfc-1994
kind: normative-requirement
summary: To prevent discovery of alternative Names and Secrets, any Response packet received bearing the current Challenge Identifier MUST return the same reply Code previously returned for that specific Challenge; only the Message portion MAY differ.
section: "4.1"
rfc2119_level: MUST
topics:
    - security
