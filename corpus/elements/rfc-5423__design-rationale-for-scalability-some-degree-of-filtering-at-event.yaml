document: rfc-5423
kind: design-rationale
summary: For scalability, some degree of filtering at event generation is necessary; at minimum, the ability to enable/disable groups of related events and suppress large parameters (such as messageContent) is required. A sophisticated publish/subscribe system may propagate cumulative subscription information upstream to the publisher.
section: "3"
