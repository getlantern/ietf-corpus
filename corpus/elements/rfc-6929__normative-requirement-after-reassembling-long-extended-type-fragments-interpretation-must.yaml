document: rfc-6929
kind: normative-requirement
summary: After reassembling Long Extended Type fragments, interpretation MUST occur only after full reassembly. If reassembled data does not match the expected format, all fragments MUST be treated as invalid attributes and the data MUST be discarded.
section: "2.2"
rfc2119_level: MUST
