kind: interoperability-note
summary: 'The strict base64 control operators (.b64u, .b64c) differ from CDDL''s ''b64'' literal prefix notation: the control operators only match characters from their specific alphabet, while the ''b64'' literal prefix accepts characters from either alphabet.'
