document: rfc-5089
kind: wire-format
summary: 'The NEIG-PCE-DOMAIN sub-TLV (Type 4, variable length) has the same format as PCE-DOMAIN: one octet domain-type (1=Area ID, 2=AS Number) followed by a variable-length IS-IS area ID or 32-bit AS number. Multiple instances are permitted when the PCE can compute paths toward several neighbor PCE-Domains.'
section: "4.4"
topics:
    - routing
