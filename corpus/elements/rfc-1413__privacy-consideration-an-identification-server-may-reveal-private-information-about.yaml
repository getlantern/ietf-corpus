document: rfc-1413
kind: privacy-consideration
summary: An Identification server may reveal private information about users, entities, objects, or processes. The privacy considerations are analogous to telephone CallerID services; operators who would not run a 'finger' server due to privacy concerns may not want to run this protocol either.
section: "6"
topics:
