document: rfc-4398
kind: protocol-element
summary: The IPGP certificate type contains a one-octet fingerprint length, followed by the OpenPGP fingerprint (computed as per RFC 2440), followed by the URL. A zero-length fingerprint or zero-length URL is legal (URL-only or fingerprint-only), but both being zero-length is invalid.
section: "2.1"
topics:
