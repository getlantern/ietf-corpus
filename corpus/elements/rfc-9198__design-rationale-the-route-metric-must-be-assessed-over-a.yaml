document: rfc-9198
kind: design-rationale
summary: The Route metric must be assessed over a time interval (not a single instant) because active path detection methods like Paris-traceroute rely on incrementing Hop Limits and cannot discover all Hosts on a path using a single packet.
section: "1.1"
