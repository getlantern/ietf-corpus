document: rfc-7750
kind: normative-requirement
summary: The six least-significant bits of the Differentiated Service field MUST be copied from the received Session-Sender test packet into the Sender DSCP (S-DSCP) field, and the two ECN bits MUST be copied into the Sender ECN (S-ECN) field.
section: 2.2.1
rfc2119_level: MUST
topics:
