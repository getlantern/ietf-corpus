document: rfc-9964
kind: protocol-element
summary: The Algorithm Key Pair (AKP) key type is a generic cryptographic key structure for expressing public and private keys for use with algorithms. It uses an 'alg' parameter to indicate the algorithm, a 'pub' parameter for public information, and an optional 'priv' parameter for private information. When expressed as JWKs, parameters are base64url encoded; in COSE keys, no encoding is needed.
