document: rfc-5952
kind: normative-requirement
summary: The style of combining an IPv6 address with a port number as 'address:port' (e.g., 2001:db8::1:80) is NOT RECOMMENDED due to ambiguity. The bracket style [address]:port as specified in RFC 3986 SHOULD be employed.
section: "6"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
