document: rfc-7780
kind: interoperability-note
summary: The distribution tree numbering change (from 'j mod p' to '(j-1) mod p') is not backward compatible with RFC 6325. If RBridges in a campus use different formulas, the RPFC will drop most multi-destination packets before proper delivery in all but trivial topologies.
section: "1.2"
topics:
    - routing
    - multicast
