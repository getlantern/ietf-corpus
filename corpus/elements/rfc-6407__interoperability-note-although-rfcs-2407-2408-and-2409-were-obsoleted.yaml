document: rfc-6407
kind: interoperability-note
summary: Although RFCs 2407, 2408, and 2409 were obsoleted by RFC 4306 (IKEv2) and subsequently RFC 5996, GDOI continues to reference them because the ISAKMP Phase 1 protocol definitions remain valid for non-IKEv2 ISAKMP protocols. GDOI is not based on IKEv2.
section: "1"
