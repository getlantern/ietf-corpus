document: rfc-6330
kind: wire-format
summary: The Scheme-Specific FEC OTI is a 4-octet field containing number of source blocks Z (8-bit), number of sub-blocks N (16-bit), and symbol alignment parameter Al (8-bit). The full encoded FEC OTI is the 12-octet concatenation of Common and Scheme-Specific OTI.
section: 3.3.3
