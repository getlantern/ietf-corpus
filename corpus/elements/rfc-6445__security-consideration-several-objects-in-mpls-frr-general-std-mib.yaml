document: rfc-6445
kind: security-consideration
summary: Several objects in MPLS-FRR-GENERAL-STD-MIB and MPLS-FRR-FACILITY-STD-MIB have read-write or read-create access; unauthorized modification of FRR constraints or the protection method could disrupt traffic protection and lead to data loss during link or node failures.
