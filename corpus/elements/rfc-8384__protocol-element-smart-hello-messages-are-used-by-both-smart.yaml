document: rfc-8384
kind: protocol-element
summary: Smart-Hello messages are used by both Smart Endnodes and edge RBridges to announce capabilities and parameters. They are a type of TRILL ES-IS PDU as specified in RFC 8171, and carry TRILL IS-IS TLVs using non-extended (8-bit type/length) format.
