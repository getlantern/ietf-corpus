document: rfc-8054
kind: interoperability-note
summary: Private compression algorithms with unregistered names are allowed, but SHOULD NOT be used because it is difficult to achieve interoperability with them. Different entries in the 'NNTP Compression Algorithms' registry MUST use different names.
section: "8.1"
rfc2119_level: SHOULD NOT
topics:
