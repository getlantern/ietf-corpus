document: rfc-7176
kind: wire-format
summary: 'The MTU sub-TLV (sub-TLV type 28, within Extended IS Reachability TLV #22 and MT-ISN TLV #222) is 3 bytes: 1 byte with an F (Failed) flag and 7-bit RESV, plus 2 bytes for the MTU value. F=1 indicates MTU testing failed at the required campus-wide MTU.'
section: "2.4"
topics:
