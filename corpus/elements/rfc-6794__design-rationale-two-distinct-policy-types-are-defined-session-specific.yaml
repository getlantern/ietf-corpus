document: rfc-6794
kind: design-rationale
summary: 'Two distinct policy types are defined: session-specific policies (created per-session from the session description at setup time, e.g., to open firewall pinholes) and session-independent policies (created independently of any session, applied to all sessions, delivered via subscription). Their different requirements necessitate two separate delivery mechanisms.'
