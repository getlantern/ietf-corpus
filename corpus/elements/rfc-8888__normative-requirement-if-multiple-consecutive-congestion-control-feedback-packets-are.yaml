document: rfc-8888
kind: normative-requirement
summary: If multiple consecutive congestion control feedback packets are lost, the media sender SHOULD rapidly reduce its sending rate, as this likely indicates a path failure. The RTP circuit breaker specification (RFC 8083) provides further guidance.
section: "5"
rfc2119_level: SHOULD
topics:
    - rtp
    - congestion
    - realtime
