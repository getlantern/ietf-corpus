kind: protocol-element
summary: The Excess-Treatment AVP (AVP Code 577, Grouped) specifies how out-of-profile traffic is handled, carrying its own Treatment-Action, QoS-Profile-Template, and QoS-Parameters. If absent, out-of-profile treatment is left to the node's discretion.
