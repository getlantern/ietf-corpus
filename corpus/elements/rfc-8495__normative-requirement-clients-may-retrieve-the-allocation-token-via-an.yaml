document: rfc-8495
kind: normative-requirement
summary: Clients MAY retrieve the Allocation Token via an <info> command by supplying the empty <allocationToken:info> marker element. If the client is not authorized to receive it, the server MUST return EPP error 2201; if authorized but no token exists, the server MUST return EPP error 2303.
section: 3.1.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
