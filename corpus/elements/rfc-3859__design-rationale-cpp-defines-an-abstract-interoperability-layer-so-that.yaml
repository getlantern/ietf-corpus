document: rfc-3859
kind: design-rationale
summary: CPP defines an abstract interoperability layer so that gateways between diverse presence protocols can carry a common payload without each protocol needing direct knowledge of the others. The choice of concrete encoding strategy (key/value, binary, nested containers) is left to each presence service, as long as the abstract operations are faithfully realized.
