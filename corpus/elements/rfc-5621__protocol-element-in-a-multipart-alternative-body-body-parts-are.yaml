document: rfc-5621
kind: protocol-element
summary: In a 'multipart/alternative' body, body parts are ordered so that the last one is the richest representation. The recipient chooses the last body part it understands. Each part within a 'multipart/alternative' represents the same data, but the mapping between parts may not be lossless.
section: "6.1"
topics:
    - sip
    - realtime
