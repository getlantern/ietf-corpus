document: rfc-6153
kind: normative-requirement
summary: To request an ANDSF server address via DHCPv4, the mobile node MUST include an ANDSF IPv4 Address Option in the Parameter Request List (PRL) in the respective DHCP messages as defined in RFC 2131 and RFC 2132.
section: 4.1.1
rfc2119_level: MUST
