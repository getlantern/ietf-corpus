document: rfc-1356
kind: normative-requirement
summary: Systems supporting NLPIDs other than hex CC SHOULD allow their use to be configured per-peer address. Use of hex CC for IP MUST always be allowed between peers and cannot be disabled by configuration.
section: "3.2"
rfc2119_level: MUST
topics:
    - ip
