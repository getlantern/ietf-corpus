document: rfc-5445
kind: normative-requirement
summary: In non-unique SBN mode, packets for two different source blocks mapped to the same Source Block Number SHOULD NOT be sent within an interval shorter than the transport time of a source block (sender processing + network transit + receiver processing). This ensures receivers can unambiguously assign packets to source blocks.
section: 3.2.1
rfc2119_level: SHOULD NOT
topics:
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
