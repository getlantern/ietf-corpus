document: rfc-7260
kind: design-rationale
summary: The OAM configuration framework is intentionally technology-agnostic at the generic level, with technology-specific OAM parameters carried in separate sub-TLVs. This allows the framework to support MPLS, MPLS-TP, Ethernet PBB-TE, SDH/SONET, and WSON without requiring changes to the base specification.
section: "3"
