document: rfc-8360
kind: wire-format
summary: The id-pe-ipAddrBlocks-v2 extension encodes an IPAddrBlocks value — a SEQUENCE OF IPAddressFamily, each containing a 2-3 octet addressFamily (AFI + optional SAFI) and an IPAddressChoice (either NULL for inherit or a SEQUENCE OF IPAddressOrRange). The SAFI field MUST NOT be used in the public Internet context.
section: 4.2.2.2
topics:
    - pkix
    - routing
    - ip
