document: rfc-2935
kind: state-machine
summary: 'An IOTP transaction ends in one of four terminal states: (1) successful completion — client directs browser to SuccessNetLocn via HTTP GET; (2) error block received — display error, stop transaction, GET ErrorNetLocn; (3) cancel block received — stop transaction, GET CancelNetLocn; (4) non-conforming message — send Error Trading Block, stop, GET ErrorNetLocn.'
section: "4.3"
topics:
    - http
