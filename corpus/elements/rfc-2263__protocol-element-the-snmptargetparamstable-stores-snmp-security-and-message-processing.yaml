document: rfc-2263
kind: protocol-element
summary: The snmpTargetParamsTable stores SNMP security and message-processing parameters for use when sending messages to a management target. Each SnmpTargetParamsEntry contains snmpTargetParamsMPModel, snmpTargetParamsSecurityModel (constrained to 0–254 or 256–2147483647, excluding 255), snmpTargetParamsSecurityName, snmpTargetParamsSecurityLevel, snmpTargetParamsStorageType, and snmpTargetParamsRowStatus.
section: 4.1.2
