summary: 'Multi-domain VPLS connects fully meshed VPLS networks via a single inter-domain spoke PW per VPLS service between border PEs, creating a three-tier hierarchy: MTU-s to PE-rs (hub-and-spoke), intra-domain PE-rs full mesh, and inter-domain PE-rs full mesh.'
