document: rfc-5685
kind: normative-requirement
summary: When EAP is used and the gateway redirects based on unauthenticated identity in the first IKE_AUTH exchange, the server MUST still include its own AUTH payload and the client MUST verify it before acting on the REDIRECT, even though no IKEv2 SA is created.
section: "6"
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - security
