document: rfc-854
kind: design-rationale
summary: The NVT defaults to half-duplex, line-buffered operation to reduce the high cost of processing network input interrupts on many hosts. Data is accumulated until a complete line is ready or an explicit local signal to transmit occurs.
section: THE NETWORK VIRTUAL TERMINAL
