document: rfc-5023
kind: protocol-element
summary: The Slug HTTP entity-header allows a client to suggest a string for use in constructing the URI of a newly created Resource. Servers MAY use, alter, or ignore the value. The field value is the percent-encoded UTF-8 encoding of the desired character sequence.
section: "9.7"
topics:
    - http
