document: rfc-3807
kind: normative-requirement
summary: The SG SHOULD send an Error Indication message with reason Overload if it cannot process all Layer 3 messages on a C-channel in a timely manner. The SG SHALL resend this message while the overload persists; a resend interval of 120 seconds is RECOMMENDED. The MGC SHOULD take appropriate actions to clear the overload.
section: 4.6, 5.3
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
