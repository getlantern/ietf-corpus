document: rfc-1516
kind: protocol-element
summary: 'rptrMonitorPortLateEvents (rptrMonitorPortEntry 11) counts CarrierEvents where the CollIn(X) variable transitions to SQE while ActivityDuration exceeds LateEventThreshold (between 480 and 565 bit times). Each such event is counted twice: once as a collision and once as a lateEvent.'
