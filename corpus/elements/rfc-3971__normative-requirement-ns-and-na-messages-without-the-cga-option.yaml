document: rfc-3971
kind: normative-requirement
summary: NS and NA messages without the CGA option MUST be treated as unsecured. Receivers that do not support CGA for a given interface may still verify packets using trust anchors, leaving the CGA property unverified.
section: 5.1.2
rfc2119_level: MUST
topics:
    - security
    - ip
