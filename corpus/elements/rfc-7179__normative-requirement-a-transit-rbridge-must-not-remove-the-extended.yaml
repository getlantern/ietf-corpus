document: rfc-7179
kind: normative-requirement
summary: A transit RBridge MUST NOT remove the extended header flags word unless it is all zero (either on arrival or after permitted modifications), and MUST NOT set or clear ingress-to-egress or reserved extended header flags except as specifically permitted in the specification of such flags.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
