document: rfc-6006
kind: normative-requirement
summary: For P2MP path reoptimization, the user MUST insert the list of RROs and SRROs after each END-POINTS object (using the R-bit in the RP object). END-POINTS type 3 is used for leaves whose path can be modified.
section: "3.9"
rfc2119_level: MUST
topics:
