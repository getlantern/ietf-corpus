document: rfc-1730
kind: normative-requirement
summary: If the COPY command is unsuccessful for any reason, server implementations MUST restore the destination mailbox to its state before the COPY attempt. The flags and internal date of copied messages SHOULD be preserved.
section: 6.4.8
rfc2119_level: MUST
topics:
    - email
