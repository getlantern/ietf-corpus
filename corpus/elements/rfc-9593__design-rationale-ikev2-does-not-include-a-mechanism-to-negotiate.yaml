document: rfc-9593
kind: design-rationale
summary: IKEv2 does not include a mechanism to negotiate authentication methods, unlike IKEv1. This causes SA establishment failures when peers have multiple credentials of different types and the other side only supports some of them. SUPPORTED_AUTH_METHODS is introduced to resolve this ambiguity by allowing peers to advertise their capabilities.
section: "1"
topics:
    - ipsec
    - crypto
    - security
