document: rfc-1196
kind: state-machine
summary: 'The Finger connection lifecycle: (1) client opens TCP connection to port 79; (2) RUIP becomes available; (3) client sends a one-line query ({Q1} or {Q2}); (4) RUIP processes query and returns answer; (5) RUIP closes connection normally. For {Q2}, the intermediate RUIP must keep {F1-2} open until {F2-3} closes.'
section: "2.1"
topics:
    - tcp
