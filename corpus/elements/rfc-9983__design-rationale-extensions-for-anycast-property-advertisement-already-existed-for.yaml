document: rfc-9983
kind: design-rationale
summary: Extensions for anycast property advertisement already existed for IS-IS (RFC 9352) and OSPFv3 (RFC 9513) in the context of Segment Routing over IPv6; this document extends the same concept to OSPFv2 because the anycast property applies to any IP prefix advertisement, not just SR/IPv6.
section: "1"
topics:
    - routing
