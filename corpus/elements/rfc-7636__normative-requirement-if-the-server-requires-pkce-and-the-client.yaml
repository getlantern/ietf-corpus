document: rfc-7636
kind: normative-requirement
summary: If the server requires PKCE and the client does not send code_challenge, the authorization endpoint MUST return an error response with 'error' set to 'invalid_request'. If the server does not support the requested transformation, it MUST also return 'invalid_request'.
section: 4.4.1
rfc2119_level: MUST
topics:
    - oauth
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
