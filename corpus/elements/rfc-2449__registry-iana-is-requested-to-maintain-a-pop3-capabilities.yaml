document: rfc-2449
kind: registry
summary: 'IANA is requested to maintain a POP3 capabilities registry. New capabilities MUST be defined in a standards track or IESG-approved experimental RFC, MUST NOT begin with ''X'', and MUST include: CAPA tag, arguments, added commands, affected standard commands, announced states/differences, valid command states, specification reference, and discussion.'
