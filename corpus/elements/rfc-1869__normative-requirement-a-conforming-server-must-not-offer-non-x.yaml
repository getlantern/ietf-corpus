document: rfc-1869
kind: normative-requirement
summary: A conforming server must not offer non-'X'-prefixed EHLO keyword values that are not described in a registered extension. Keywords beginning with 'X' refer to local bilateral extensions and may not be used in a registered service extension.
section: "4.3"
rfc2119_level: MUST NOT
