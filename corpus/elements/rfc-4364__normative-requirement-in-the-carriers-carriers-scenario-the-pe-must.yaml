document: rfc-4364
kind: normative-requirement
summary: In the Carriers' Carriers scenario, the PE must not distribute the same label to two different CEs unless those CEs are associated with exactly the same set of VRFs or the PE maintains a separate Incoming Label Map per CE. The PE must verify that the top label on any packet received from a CE was actually distributed to that CE.
section: "9"
rfc2119_level: MUST NOT
topics:
    - mpls
    - vpn
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
