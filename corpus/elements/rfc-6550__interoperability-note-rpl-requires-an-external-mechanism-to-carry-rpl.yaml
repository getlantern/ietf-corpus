document: rfc-6550
kind: interoperability-note
summary: RPL requires an external mechanism to carry RPL Packet Information (RPLInstanceID, sender Rank, loop-detection flags) in data packets. The RPL option (RFC 6553) is the designated mechanism; strict source routing in Non-Storing Downward mode is the one exception where RPL Packet Information is not required.
section: "1.1"
topics:
    - routing
    - ip
