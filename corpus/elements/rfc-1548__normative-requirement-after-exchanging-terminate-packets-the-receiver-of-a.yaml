document: rfc-1548
kind: normative-requirement
summary: After exchanging Terminate packets, the receiver of a Terminate-Request MUST NOT disconnect until at least one Restart time has passed after sending a Terminate-Ack. Any non-LCP packets received during Link Termination MUST be silently discarded.
section: "3.7"
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
