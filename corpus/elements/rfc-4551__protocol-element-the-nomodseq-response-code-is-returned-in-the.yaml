document: rfc-4551
kind: protocol-element
summary: 'The NOMODSEQ response code is returned in the OK untagged response to SELECT/EXAMINE when the mailbox does not support persistent storage of mod-sequences: `OK [NOMODSEQ]`. After sending NOMODSEQ, the server MUST reject FETCH CHANGEDSINCE, FETCH/SEARCH MODSEQ, and STORE UNCHANGEDSINCE commands with a tagged BAD response.'
section: 3.1.2
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
