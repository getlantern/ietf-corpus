summary: 'OSPF defines five LSA types: Router links advertisements (type 1, area-scoped, all routers), Network links advertisements (type 2, area-scoped, originated by DR), Summary links for networks (type 3) and AS boundary routers (type 4) originated by ABRs, and AS external link advertisements (type 5, AS-wide scope, originated by ASBRs).'
