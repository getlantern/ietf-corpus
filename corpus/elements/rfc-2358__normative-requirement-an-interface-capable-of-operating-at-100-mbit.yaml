document: rfc-2358
kind: normative-requirement
summary: An interface capable of operating at 100 Mbit/sec MUST implement the ether100MbsCompliance compliance statement, even if currently operating at a lower speed. Counters specific to 100 Mbit operation simply will not increment when running at lower speeds.
section: 3.2.6
rfc2119_level: MUST
topics:
