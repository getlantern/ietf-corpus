document: rfc-6059
kind: normative-requirement
summary: When a Neighbor Advertisement is received in response to an NS probe, the host MUST verify that both the IPv6 and link-layer (MAC) addresses of the router match the expected SDAT values before utilizing the associated configuration. The host MUST then mark all addresses associated with that router in the SDAT as operable.
section: 5.7.1
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
