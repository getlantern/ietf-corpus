document: rfc-3181
kind: design-rationale
summary: Priority merging with heterogeneous QoS flows creates the 'free-rider' problem (a low-QoS flow acquires high priority undeservedly) and 'denial of service' (a high-priority flow is rejected after merging with a lower-priority one), motivating the three distinct merge strategies.
