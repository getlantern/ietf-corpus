document: rfc-8841
kind: protocol-element
summary: The SDP 'max-message-size' media-level attribute indicates the maximum SCTP user message size (in bytes) an endpoint is willing to receive. A value of zero means any size is accepted (subject to memory). If absent, the default is 64 KB.
