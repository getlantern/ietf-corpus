document: rfc-8000
kind: design-rationale
summary: The preferred method for resolving multi-domain authorization information is a mechanism-specific GSS-API authorization payload (e.g., PAC or PAD) delivered as part of GSS-API authentication, because it avoids requiring knowledge of the remote authoritative service configuration and has a well-known syntax.
