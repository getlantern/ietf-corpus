document: rfc-8614
kind: security-consideration
summary: Bit-flipping media errors that cause C/S-bit mismatches between PEs no longer adversely affect PW availability (under the updated rules); they cause CW non-use or disable sequence number expectations. This is no worse than the prior RFC 4761 behavior where such errors caused the PW to not come up at all.
section: "7"
topics:
    - mpls
    - bgp
    - security
    - routing
