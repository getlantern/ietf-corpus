document: rfc-8124
kind: normative-requirement
summary: If the answerer assigns 'setup:active', it MUST initiate the WebSocket connection handshake as client toward the URI in 'a=websocket-uri' per RFC 6455 Section 4. If 'setup:passive', the answerer MUST include a ws-URI or wss-URI in 'a=websocket-uri'.
section: "4.3"
rfc2119_level: MUST
topics:
    - websocket
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
