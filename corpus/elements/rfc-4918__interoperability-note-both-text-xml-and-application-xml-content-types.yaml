document: rfc-4918
kind: interoperability-note
summary: Both text/xml and application/xml content types MUST be accepted in request and response bodies, though application/xml is preferred and text/xml is deprecated. This ensures compatibility with older RFC 2518 implementations.
section: "8.2"
topics:
