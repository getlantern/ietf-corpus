document: rfc-6020
kind: design-rationale
summary: Grouping, type, and identity names are resolved in the context where they are defined (static scoping), not where they are used. This eliminates ambiguity when two importing modules define the same local name, and means users of a grouping do not need to import all modules the grouping internally references.
section: "5.4"
topics:
    - yang
