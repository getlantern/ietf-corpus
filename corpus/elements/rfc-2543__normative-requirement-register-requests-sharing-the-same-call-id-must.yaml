document: rfc-2543
kind: normative-requirement
summary: REGISTER requests sharing the same Call-ID MUST have increasing CSeq values. All registrations from a client SHOULD use the same Call-ID within a reboot cycle. Clients SHOULD avoid sending a new registration until the previous response is received.
section: 4.2.6
rfc2119_level: MUST
topics:
    - sip
    - realtime
    - mobility
