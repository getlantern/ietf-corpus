document: rfc-6858
kind: design-rationale
summary: The surrogate message is not intended to convey any information to client software that would require or enable special handling. Client authors wishing to handle internationalized messages are encouraged to implement full UTF-8 support via RFC6856 (POP) or RFC6855 (IMAP) instead.
section: "2"
