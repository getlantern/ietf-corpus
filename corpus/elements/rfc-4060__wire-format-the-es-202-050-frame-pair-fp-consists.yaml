summary: The ES 202 050 Frame Pair (FP) consists of two 44-bit mel-cepstral frames plus a 4-bit CRC, padded with 4 zero bits to the MSB of the last octet, totaling 96 bits (12 octets) per FP. Each FP represents 20 ms of speech.
