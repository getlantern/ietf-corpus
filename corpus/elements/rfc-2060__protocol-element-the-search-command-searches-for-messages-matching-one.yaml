document: rfc-2060
kind: protocol-element
summary: The SEARCH command searches for messages matching one or more keys; multiple keys are ANDed. Defined keys include flag tests (ANSWERED, DELETED, SEEN, etc.), header field substring matches (FROM, TO, SUBJECT, HEADER), size comparisons (LARGER, SMALLER), date comparisons (BEFORE, SINCE, SENTBEFORE, SENTSINCE), and logical operators (NOT, OR).
section: 6.4.4
topics:
