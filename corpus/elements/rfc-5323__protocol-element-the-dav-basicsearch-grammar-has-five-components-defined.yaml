document: rfc-5323
kind: protocol-element
summary: 'The DAV:basicsearch grammar has five components defined by XML elements: DAV:select (result record definition), DAV:from (search scope with depth), DAV:where (search criteria with Boolean operators), DAV:orderby (sort specification), and DAV:limit (constraint on result size). The DTD root is: <!ELEMENT basicsearch (select, from, where?, orderby?, limit?)>.'
section: "5.2"
