document: rfc-4556
kind: normative-requirement
summary: All PKINIT implementations SHOULD support the public key encryption key delivery method. When supported, rsaEncryption (RSAES-PKCS1-v1_5) MUST be supported for key transport and des-ede3-cbc MUST be supported for content encryption.
section: 3.1.2
rfc2119_level: SHOULD
topics:
