document: rfc-5195
kind: design-rationale
summary: The distribution rules ensure no single PE ever needs to maintain all routes for all L1VPNs, and no single route reflector is required to hold all VPN-related information. Route reflectors can be partitioned among VPNs, enabling the total network capacity to support VPNs without being limited by any single component.
