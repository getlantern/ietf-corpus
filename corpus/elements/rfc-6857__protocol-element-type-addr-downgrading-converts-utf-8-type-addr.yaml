document: rfc-6857
kind: protocol-element
summary: Type-Addr downgrading converts <utf-8-type-addr> containing raw non-ASCII strings from utf-8-address form to utf-8-addr-xtext form (RFC 6533); if the address type is unrecognized and contains non-ASCII strings, the entire header field is encapsulated.
section: 3.1.9
