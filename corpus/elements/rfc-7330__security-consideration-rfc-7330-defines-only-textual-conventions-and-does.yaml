document: rfc-7330
kind: security-consideration
summary: RFC 7330 defines only Textual Conventions and does not define any management objects itself. Because meaningful security considerations can only be written in MIB modules that define management objects, this document has no direct impact on Internet security; security considerations are deferred to BFD MIB modules that import these TCs.
section: "4"
topics:
