document: rfc-6733
kind: state-machine
summary: The Authorization Session State Machine defines client and server state machines with states Idle, Pending, Open, and Discon. Transitions occur on access requests (AA-Request), authorization responses (AA-Answer), Re-Auth-Request, Session-Termination-Request, and session timeout. Separate machines handle stateful (server stores session state) and stateless (server does not maintain state) modes.
section: "8.1"
