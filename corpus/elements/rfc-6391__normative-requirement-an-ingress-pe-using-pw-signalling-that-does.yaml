document: rfc-6391
kind: normative-requirement
summary: An ingress PE using PW signalling that does not send an FL Sub-TLV MUST NOT include a flow label in PW packets. Similarly, if it does not receive an FL Sub-TLV from its egress peer, it MUST NOT include a flow label. This preserves backwards compatibility.
section: "4"
rfc2119_level: MUST NOT
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
