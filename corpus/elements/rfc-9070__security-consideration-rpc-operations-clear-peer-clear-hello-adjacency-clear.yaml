document: rfc-9070
kind: security-consideration
summary: RPC operations (clear-peer, clear-hello-adjacency, clear-peer-statistics) can cause service disruption if invoked by unauthorized parties. Access to these RPCs must be controlled via NETCONF access control mechanisms (e.g., NACM per RFC 8341).
section: 10.1.3
topics:
    - security
    - yang
    - mpls
