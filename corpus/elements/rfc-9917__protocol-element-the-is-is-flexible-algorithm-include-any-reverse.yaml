document: rfc-9917
kind: protocol-element
summary: 'The IS-IS Flexible Algorithm Include-Any Reverse Admin Group Sub-TLV (Type 11) advertises an include-any rule: during Flex-Algorithm path computation, any link whose reverse direction has no Admin Group matching the include-any rule is pruned. Its format is identical to the FAERAG Sub-TLV.'
