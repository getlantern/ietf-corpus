document: rfc-6873
kind: protocol-element
summary: 'The mandatory fields logged in the SIP CLF record (in pointer order) are: CSeq, Response Status-Code, R-URI, Destination IP:port, Source IP:port, To URI, To Tag, From URI, From Tag, Call-Id, Server-Txn (server transaction ID), and Client-Txn (client transaction ID). Each field is tab-delimited and subject to a 4096-byte maximum size.'
