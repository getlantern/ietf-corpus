document: rfc-4103
kind: protocol-element
summary: The 'cps' MIME/SDP parameter (in 'a=fmtp') specifies the maximum number of characters that may be received per second, as a mean value over any 10-second interval. The default value is 30. Devices receiving this parameter MUST transmit at or below the specified rate.
