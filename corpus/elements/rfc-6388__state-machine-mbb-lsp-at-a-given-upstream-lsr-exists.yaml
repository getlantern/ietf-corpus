document: rfc-6388
kind: state-machine
summary: 'MBB LSP at a given upstream LSR exists in one of three states: (1) no state for the FEC, (2) state exists but waiting for MBB notification that the path from root to this LSR exists, (3) state exists and MBB notification received or node is root. An upstream LSR MUST NOT send an MBB notification to a downstream LSR until it reaches state 3.'
section: "8.1"
topics:
    - mpls
    - routing
