document: rfc-8071
kind: protocol-element
summary: 'The call home sequence is: (1) the NETCONF/RESTCONF server initiates a TCP connection to the client; (2) the client initiates an SSH or TLS session to the server over that TCP connection; (3) the client initiates a NETCONF or RESTCONF session to the server over the SSH/TLS session.'
