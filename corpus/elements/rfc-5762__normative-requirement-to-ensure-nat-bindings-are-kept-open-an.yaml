document: rfc-5762
kind: normative-requirement
summary: To ensure NAT bindings are kept open, an end system SHOULD send a zero-length DCCP-Data packet once every 15 seconds during periods when it has no other data to send. This removes the need for RTP no-op packets when using RTP over DCCP.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - rtp
    - nat
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
