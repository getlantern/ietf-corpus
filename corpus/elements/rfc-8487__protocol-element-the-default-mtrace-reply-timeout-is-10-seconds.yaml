document: rfc-8487
kind: protocol-element
summary: 'The default [Mtrace Reply Timeout] is 10 seconds and is used to time out an Mtrace2 Reply in multiple contexts: proxy relay (Section 4.5), client hop-by-hop search (Section 5.2), and non-supported router detection (Section 5.7). The value can be manually changed on both clients and routers.'
section: 5.8.4
