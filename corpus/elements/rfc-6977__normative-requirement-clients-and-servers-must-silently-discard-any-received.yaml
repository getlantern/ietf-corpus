document: rfc-6977
kind: normative-requirement
summary: Clients and servers MUST silently discard any received Reconfigure-Reply messages. The relay MUST silently discard Reconfigure-Reply messages where the transaction-id does not match, the Server Identifier Option is absent, or the Status Code Option is absent.
section: 6.2.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
