document: rfc-6409
kind: security-consideration
summary: Separating submission from relay allows a site to require authentication for submission while rejecting relay of non-local users at the MTA, providing a coherent email security policy. Failure to require any authorization allows open use of the site's resources for injecting unsolicited bulk email.
section: "9"
topics:
    - email
    - security
