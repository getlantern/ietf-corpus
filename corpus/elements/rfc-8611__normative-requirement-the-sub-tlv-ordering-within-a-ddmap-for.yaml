document: rfc-8611
kind: normative-requirement
summary: 'The sub-TLV ordering within a DDMAP for a LAG member link MUST be: Local Interface Index Sub-TLV immediately followed by Multipath Data Sub-TLV (with optional Remote Interface Index Sub-TLV between them), and blocks for each member link MUST appear adjacent and in order of increasing local interface index.'
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
