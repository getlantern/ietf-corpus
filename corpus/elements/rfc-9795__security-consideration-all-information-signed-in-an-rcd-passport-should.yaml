document: rfc-9795
kind: security-consideration
summary: All information signed in an "rcd" PASSporT should undergo a vetting process by an authoritative entity enforcing ecosystem policies. The chain of trust—where signers are either directly authoritative or have been delegated authority via JWT Claim Constraints and integrity mechanisms—is critical to maintaining ecosystem integrity.
