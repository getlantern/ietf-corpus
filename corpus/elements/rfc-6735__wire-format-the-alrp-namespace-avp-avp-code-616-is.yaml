summary: The ALRP-Namespace AVP (AVP Code 616) is described as type Unsigned16 in Section 3.4.1, containing a numerical namespace identifier per RFC 6401. The ALRP-Value AVP (AVP Code 617) is described as type Unsigned8 in Section 3.4.2, containing the numeric priority value within the namespace.
