document: rfc-5666
kind: protocol-element
summary: 'The RPC-over-RDMA header contains four fixed 32-bit fields always present: XID (mirroring the RPC header), version (currently 1), credit value (requested in calls, granted in replies), and message type (RDMA_MSG, RDMA_NOMSG, RDMA_MSGP, RDMA_DONE, or RDMA_ERROR). These fields MUST remain at fixed offsets for all versions.'
section: "4.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
