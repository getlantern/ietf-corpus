document: rfc-5857
kind: normative-requirement
summary: ROHC channel parameters MUST be signaled separately for each ROHC-enabled IPsec SA. A new ROHC_SUPPORTED Notify message MUST be included in the IKE_AUTH and CREATE_CHILD_SA exchanges whenever a new ROHC-enabled SA is created or rekeyed.
section: "3.1"
rfc2119_level: MUST
topics:
