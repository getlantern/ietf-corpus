document: rfc-8279
kind: protocol-element
summary: A BIER domain is divided into one or more sub-domains, each identified by a sub-domain-id in the range [0,255]. Sub-domain 0 is the mandatory default sub-domain. Each sub-domain is associated with a single routing underlay, and a BFR may belong to multiple sub-domains with potentially different BFR-ids and BFR-prefixes in each.
section: "1"
topics:
