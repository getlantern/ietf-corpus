document: rfc-2037
kind: protocol-element
summary: The entConfigChange NOTIFICATION-TYPE is sent when entLastChangeTime changes, enabling an NMS to trigger entity table maintenance polls. An agent must not generate more than one entConfigChange trap-event in a five-second throttling period; additional changes during that window must be suppressed.
section: "4"
