document: rfc-4682
kind: normative-requirement
summary: When the MTA receives wake-up or re-key messages from a CMS, it performs key management based on the corresponding entry in the CMS table. If the matching CMS entry does not exist, it must ignore the wake-up or re-key messages.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
    - diameter
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
