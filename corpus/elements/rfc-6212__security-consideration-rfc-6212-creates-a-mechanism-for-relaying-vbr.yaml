document: rfc-6212
kind: security-consideration
summary: RFC 6212 creates a mechanism for relaying VBR results using the Authentication-Results structure defined in RFC 5451. The security considerations of both RFC 5451 (Authentication-Results) and RFC 5518 (VBR) apply and should be consulted; no additional security analysis is provided here.
