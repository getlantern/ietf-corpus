document: rfc-1903
kind: protocol-element
summary: VariablePointer is an OBJECT IDENTIFIER pointing to a specific object instance (e.g., sysContact.0 or ifInOctets.3). RowPointer is an OBJECT IDENTIFIER pointing to the first accessible columnar instance in a conceptual row. InstancePointer (obsolete) has been replaced by these two types.
