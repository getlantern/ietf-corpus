document: rfc-4035
kind: design-rationale
summary: The absence of DNSSEC data in a response MUST NOT by itself be taken as an indication that no authentication information exists, because an adversary could forge a response, strip DNSSEC RRs, or modify a query so that DNSSEC RRs appear not to be requested.
section: "5"
topics:
    - dns
    - security
