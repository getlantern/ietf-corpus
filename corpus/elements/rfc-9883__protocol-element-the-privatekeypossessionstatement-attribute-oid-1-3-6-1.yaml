summary: The `privateKeyPossessionStatement` attribute (OID 1.3.6.1.4.1.22112.2.1) is an ASN.1 ATTRIBUTE typed as `PrivateKeyPossessionStatement`, included in a certificate request to assert that the subject has possession of the private key corresponding to the requested public key, without providing technical proof.
