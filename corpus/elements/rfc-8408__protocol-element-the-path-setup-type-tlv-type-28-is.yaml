document: rfc-8408
kind: protocol-element
summary: The PATH-SETUP-TYPE TLV (Type 28) is an optional TLV associated with the RP object (RFC 5440) and the SRP object (RFC 8231) used to specify which path setup method should be used for a given LSP. Absence of this TLV implies RSVP-TE (PST=0).
