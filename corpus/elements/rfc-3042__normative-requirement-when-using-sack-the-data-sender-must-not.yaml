document: rfc-3042
kind: normative-requirement
summary: When using SACK, the data sender MUST NOT send new segments in response to duplicate ACKs that contain no new SACK information, to prevent a misbehaving receiver from triggering inappropriate data transmission.
section: "2"
rfc2119_level: MUST NOT
topics:
    - tcp
    - congestion
    - security
