document: rfc-6494
kind: security-consideration
summary: Incorrect EKU values in SEND certificates can enable the same attacks SEND was designed to prevent. For example, a malicious host obtaining a certificate with id-kp-sendRouter for a given prefix can masquerade as a router for that prefix to attract traffic from local nodes.
section: "11"
topics:
