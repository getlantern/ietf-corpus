document: rfc-4193
kind: protocol-element
summary: 'The recommended pseudo-random Global ID algorithm: (1) obtain current time in 64-bit NTP format, (2) obtain an EUI-64 identifier, (3) concatenate them, (4) compute SHA-1 digest, (5) use the least significant 40 bits as the Global ID, (6) prepend FC00::/7 with L=1.'
section: 3.2.2
topics:
