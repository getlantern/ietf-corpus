document: rfc-7373
kind: security-consideration
summary: The 'string' abstract data type may be vulnerable to ill-formed UTF-8 string attacks as discussed in RFC 7011 Section 6.1.6; all other ADT encodings are representable in US-ASCII and are not subject to this risk.
