document: rfc-5321
kind: normative-requirement
summary: When a mail delivery attempt fails, the client SHOULD retry using an exponential or similar backoff strategy and SHOULD continue retrying for at least 4–5 days before generating a non-delivery notification. Bounce messages MUST use a null reverse-path.
section: 4.5.4
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-23"
