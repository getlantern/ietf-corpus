summary: 'The PW-TDM-MIB module (pwTDMMIB, OID mib-2 186) consists of five tables: pwTDMTable (generic TDM PW info), pwTDMCfgTable (generic configuration parameters), pwTDMPerfCurrentTable (current 15-minute statistics), pwTDMPerfIntervalTable (historical 15-minute intervals), and pwTDMPerf1DayIntervalTable (daily interval statistics).'
