document: rfc-5175
kind: protocol-element
summary: The Expanded Flags Option (EFO) is a new NDP option (Type=26) for Router Advertisement messages that provides 48 additional flag bits (bits 8–55) beyond the 8 bits in the RA header. Bits are numbered left to right starting at bit offset 16 in the option.
