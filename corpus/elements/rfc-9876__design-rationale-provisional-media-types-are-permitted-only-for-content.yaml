document: rfc-9876
kind: design-rationale
summary: Provisional media types are permitted only for Content-Format identifiers in the 0-255 and 256-9999 ranges because those ranges involve heavier standards review processes (Expert Review and IETF Review/IESG Approval) that can track the provisional status through to permanence.
