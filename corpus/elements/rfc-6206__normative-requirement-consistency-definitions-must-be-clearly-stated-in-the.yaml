document: rfc-6206
kind: normative-requirement
summary: Consistency definitions MUST be clearly stated in the protocol and SHOULD NOT be configured at runtime, because unlike k, Imin, and Imax, mismatched consistency definitions can prevent the network from ever reaching a consistent state.
section: "6.4"
rfc2119_level: MUST
topics:
    - realtime
