document: rfc-7472
kind: security-consideration
summary: An 'ipps' URI might be used to access an IPP secure print service by an unauthorized IPP Client, extracting privacy-sensitive information such as 'job-originating-user-name'. Client authentication mechanisms in RFC 2910, RFC 7230, and TLS/1.2 can address this threat.
section: 6.2.2
topics:
    - security
    - tls
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
