document: rfc-2283
kind: registry
summary: 'This document defines Subsequent Address Family Identifier (SAFI) values: 1 for unicast forwarding, 2 for multicast forwarding, 3 for both unicast and multicast forwarding. Values 128-255 are reserved for vendor-specific applications. Value 0 is reserved. New SAFI values (other than vendor-specific) are assigned only by IETF consensus process and IESG approval.'
section: "7"
