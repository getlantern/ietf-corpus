document: rfc-7045
kind: security-consideration
summary: The default configuration allowing standard extension headers avoids connectivity failures while still permitting firewalls to be configured to filter unwanted or suspect extension headers. Firewalls must be capable of permitting any or all extension headers if configured to do so.
