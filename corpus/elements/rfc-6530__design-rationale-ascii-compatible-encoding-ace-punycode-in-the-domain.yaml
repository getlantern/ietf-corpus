document: rfc-6530
kind: design-rationale
summary: ASCII-compatible encoding (ACE/Punycode) in the domain part is discouraged when the local part of an address includes non-ASCII characters, in order to promote consistent processing of characters throughout the entire address and avoid user confusion from mixed encoding forms.
section: "7.1"
topics:
    - email
