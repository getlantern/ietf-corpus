document: rfc-6584
kind: interoperability-note
summary: ECDSA-256, ECDSA-384, and ECDSA-521 are defined to promote interoperability (referencing RFC 4754 and RFC 5480). Only these three suites are considered; alternative ECC techniques such as KT-I signatures from RFC 6090 are noted as possible future additions but not specified.
section: 4.3.1
topics:
