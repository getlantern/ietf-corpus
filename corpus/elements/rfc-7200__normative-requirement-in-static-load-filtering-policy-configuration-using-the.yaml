document: rfc-7200
kind: normative-requirement
summary: In static load-filtering policy configuration, using the <rate> sub-element is RECOMMENDED over <percent> or <win> because it is hard to enforce percentage-rate or window-based filtering when incoming load from upstream or reactions from downstream are uncertain.
section: "5.4"
rfc2119_level: RECOMMENDED
topics:
    - sip
    - realtime
