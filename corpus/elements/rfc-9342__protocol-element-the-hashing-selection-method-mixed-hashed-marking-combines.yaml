document: rfc-9342
kind: protocol-element
summary: The Hashing Selection Method (Mixed Hashed Marking) combines Single Marking with hash-based packet selection (per RFC 5474/5475) to enable delay measurements across all paths of a multipoint flow simultaneously in the same marking period. Alternate-Marking periods serve as temporal anchors for hashing samples, and dynamic hash length adaptation can bound samples per period.
section: 7.2.2
topics:
    - measurement
