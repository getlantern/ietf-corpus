document: rfc-7273
kind: security-consideration
summary: Timestamp reference clocks negotiated by this protocol SHOULD NOT be relied upon to provide a secure time reference for security-critical operations such as the expiration of public key certificates, since the clocks may be manipulated through spoofed SDP.
