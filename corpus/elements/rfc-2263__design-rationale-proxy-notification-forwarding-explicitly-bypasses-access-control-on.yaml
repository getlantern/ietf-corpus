document: rfc-2263
kind: design-rationale
summary: 'Proxy notification forwarding explicitly bypasses access control on variable-bindings: the variable-bindings from the original received notification are forwarded as-is, rather than being retrieved from local MIB instrumentation. This is intentional because the proxy forwarder is an intermediary without knowledge of the managed object definitions.'
section: 3.5.2
topics:
    - snmp
