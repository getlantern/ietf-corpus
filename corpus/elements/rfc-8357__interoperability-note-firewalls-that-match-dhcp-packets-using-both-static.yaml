document: rfc-8357
kind: interoperability-note
summary: Firewalls that match DHCP packets using both static UDP source and destination port numbers will no longer match packets from upgraded relay agents and servers using non-standard ports. Firewall rules must be modified to match only the server-side DHCP UDP port and other attributes as needed.
section: "5.4"
topics:
    - udp
    - security
