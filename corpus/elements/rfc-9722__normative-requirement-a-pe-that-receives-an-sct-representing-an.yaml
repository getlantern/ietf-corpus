document: rfc-9722
kind: normative-requirement
summary: A PE that receives an SCT representing an offset larger than the local peering timer MUST discard the SCT and SHALL treat the DF Election at the peer as having already occurred, reverting to RFC 7432 behavior.
section: "2.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
    - ntp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
