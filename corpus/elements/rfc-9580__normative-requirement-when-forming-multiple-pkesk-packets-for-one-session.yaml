document: rfc-9580
kind: normative-requirement
summary: When forming multiple PKESK packets for one session key (multi-recipient message), the implementation MUST make a new PKCS#1 EME-PKCS1-v1_5 encoding for each recipient key, defending against Hastad's broadcast attack.
section: 5.1.3
rfc2119_level: MUST
topics:
    - crypto
    - security
