document: rfc-5373
kind: protocol-element
summary: The SIP option tag 'answermode' indicates support for the Answer-Mode and Priv-Answer-Mode extensions. A supporting UA SHOULD include this in the Supported header of all requests and MAY advertise it via the extensions parameter in Contact headers of REGISTER requests.
