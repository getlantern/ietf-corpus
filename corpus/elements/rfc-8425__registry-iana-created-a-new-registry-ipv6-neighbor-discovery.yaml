summary: 'IANA created a new registry ''IPv6 Neighbor Discovery Prefix Information Option Flags'' at http://www.iana.org/assignments/icmpv6-parameters. Initial entries: bit 0 = L (On-link Flag, RFC4861), bit 1 = A (Autonomous Address Configuration Flag, RFC4861), bit 2 = R (Router Address Flag, RFC6275), bits 3-7 = Reserved.'
