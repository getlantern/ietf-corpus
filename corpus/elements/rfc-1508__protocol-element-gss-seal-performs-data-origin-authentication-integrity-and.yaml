document: rfc-1508
kind: protocol-element
summary: GSS_Seal() performs data origin authentication, integrity, and optionally confidentiality (when conf_req_flag is TRUE) on input_message, producing a single encapsulated output_message. GSS_Unseal() reverses this, deciphering if needed, validating integrity, and returning plaintext output_message along with conf_state and qop_state.
section: 2.3.3
topics:
    - security
    - crypto
