document: rfc-8029
kind: design-rationale
summary: The DDMAP TLV was designed to replace the deprecated Downstream Mapping (DSMAP) TLV by converting its variable-length and optional fields into sub-TLVs. This refactoring enables per-downstream Return Code reporting required for P2MP and ECMP scenarios, and improves extensibility without revising the fixed portion of the structure.
section: "3.4"
topics:
