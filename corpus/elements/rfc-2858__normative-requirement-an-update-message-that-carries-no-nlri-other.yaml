document: rfc-2858
kind: normative-requirement
summary: An UPDATE message that carries no NLRI other than that encoded in MP_REACH_NLRI SHOULD NOT carry the NEXT_HOP attribute; if it does, the receiving BGP speaker SHOULD ignore the NEXT_HOP attribute.
section: "2"
rfc2119_level: SHOULD NOT
topics:
