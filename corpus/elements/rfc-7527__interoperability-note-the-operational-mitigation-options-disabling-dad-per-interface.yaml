document: rfc-7527
kind: interoperability-note
summary: The operational mitigation options (disabling DAD per interface or using Layer 2 loopback detection) do not require both ends of the circuit to support Enhanced DAD simultaneously. They are effective for unidirectional loopback but may not be effective for bidirectional loopback unless both ends comply.
section: "3.3"
topics:
