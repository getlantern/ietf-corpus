document: rfc-9130
kind: normative-requirement
summary: An implementation MUST prefer a level-specific parameter over a top-level parameter. For example, if priority is 100 for level-1 and 250 at the top level, the implementation must use 100 for level-1 and 250 for level-2.
section: "2.3"
rfc2119_level: MUST
