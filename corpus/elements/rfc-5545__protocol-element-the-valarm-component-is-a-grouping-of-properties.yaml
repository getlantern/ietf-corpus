document: rfc-5545
kind: protocol-element
summary: The VALARM component is a grouping of properties that define an alarm or reminder associated with a VEVENT or VTODO. It MUST include ACTION (AUDIO, DISPLAY, EMAIL) and TRIGGER properties. REPEAT and DURATION MUST both be present if either is present.
section: 3.6.6
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
