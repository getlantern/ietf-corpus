document: rfc-6610
kind: security-consideration
summary: Attackers cannot trick mobile nodes into using incorrect home agents in a meaningful way because MIPv6 communication between mobile nodes and home agents employs mutual authentication; the authentic source of home agent information is MIPv6 signaling, not DHCP.
