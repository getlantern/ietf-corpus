document: rfc-8405
kind: protocol-element
summary: SHORT_SPF_DELAY is the delay used in SHORT_WAIT state when multiple IGP events arrive within TIME_TO_LEARN_INTERVAL, recommended at 200 ms (default). It handles single-component failures (e.g., node or SRLG failure) that generate multiple IGP events.
