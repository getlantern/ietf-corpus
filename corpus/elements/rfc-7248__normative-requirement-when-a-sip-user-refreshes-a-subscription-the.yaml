document: rfc-7248
kind: normative-requirement
summary: When a SIP user refreshes a subscription, the presence-aware SIP-to-XMPP gateway MUST send a SIP NOTIFY to the user agent; if it has meaningful XMPP availability state the NOTIFY MUST communicate that information with a PIDF body, otherwise the NOTIFY MUST be empty.
section: 4.3.2
rfc2119_level: MUST
topics:
    - sip
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
