document: rfc-5592
kind: security-consideration
summary: When SNMPv1 or SNMPv2c message processing is used (RFC 3584), the security model derives securityName and securityLevel from the SNMP message contents rather than from the authenticated SSH identity, effectively bypassing the security benefits of the SSH Transport Model.
section: "9.6"
topics:
    - snmp
    - security
