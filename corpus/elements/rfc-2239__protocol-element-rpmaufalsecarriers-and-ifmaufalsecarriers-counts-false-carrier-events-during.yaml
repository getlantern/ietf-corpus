document: rfc-2239
kind: protocol-element
summary: rpMauFalseCarriers (and ifMauFalseCarriers) counts false carrier events during IDLE on 100BASE-X links, incrementing at most once per 100 ms after a valid carrier completion. This counter applies only to dot3MauType100BaseT4, 100BaseTX, and 100BaseFX; approximate rollover time is 7.4 hours.
