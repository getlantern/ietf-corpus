document: rfc-1832
kind: wire-format
summary: String (string identifier<m>) encodes a 4-byte unsigned integer length n followed by n ASCII bytes and 0–3 zero padding bytes. Default maximum m is 2^32-1. It is an error to encode a length greater than the specified maximum.
section: "3.11"
