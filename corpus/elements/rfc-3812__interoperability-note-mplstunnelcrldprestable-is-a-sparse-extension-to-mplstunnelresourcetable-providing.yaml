kind: interoperability-note
summary: mplsTunnelCRLDPResTable is a sparse extension to mplsTunnelResourceTable providing CR-LDP-specific parameters (excess burst size, frequency, weight). It is indexed by the same mplsTunnelResourceIndex and may be supported only by implementations that implement the CR-LDP signaling protocol.
