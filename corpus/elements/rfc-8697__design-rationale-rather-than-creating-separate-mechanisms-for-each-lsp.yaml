document: rfc-8697
kind: design-rationale
summary: Rather than creating separate mechanisms for each LSP grouping use case (make-before-break, protection, diversity, policy), the document defines a single generic ASSOCIATION object and Association Type extensibility point, so future documents can define new Association Types without protocol changes.
