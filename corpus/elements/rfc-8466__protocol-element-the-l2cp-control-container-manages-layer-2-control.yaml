summary: The l2cp-control container manages Layer 2 Control Protocol handling for STP/RSTP/MSTP, PAUSE, LACP/LAMP, Link OAM, ESMC, 802.1x, E-LMI, LLDP, PTP peer delay, and GARP/MRP. Each protocol is assigned discard-mode, peer-mode, or tunnel-mode action.
