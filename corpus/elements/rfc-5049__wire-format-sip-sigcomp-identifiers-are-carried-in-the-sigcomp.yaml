document: rfc-5049
kind: wire-format
summary: SIP/SigComp identifiers are carried in the 'sigcomp-id' SIP URI parameter (defined as 'uri-sip-sigcomp-id = "sigcomp-id=" 1*paramchar') and as a Via header field parameter (defined as 'via-sip-sigcomp-id = "sigcomp-id" EQUAL LDQUOT *( qdtext / quoted-pair ) RDQUOT'). Both MUST contain a URN per RFC 2141.
section: "9.1"
topics:
