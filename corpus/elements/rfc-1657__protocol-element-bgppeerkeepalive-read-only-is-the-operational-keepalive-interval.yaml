document: rfc-1657
kind: protocol-element
summary: bgpPeerKeepAlive (read-only) is the operational KeepAlive interval in seconds, scaled proportionally from bgpPeerKeepAliveConfigured relative to bgpPeerHoldTimeConfigured. bgpPeerKeepAliveConfigured (read-write, suggested 30 seconds, recommended ≤ 1/3 of HoldTime) controls KeepAlive frequency; zero disables periodic KEEPALIVEs.
