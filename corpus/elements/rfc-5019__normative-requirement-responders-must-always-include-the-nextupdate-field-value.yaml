document: rfc-5019
kind: normative-requirement
summary: Responders MUST always include the nextUpdate field value to aid in response caching. ASN.1 GeneralizedTime values (thisUpdate, nextUpdate, producedAt) MUST be expressed in GMT (Zulu) and MUST include seconds (YYYYMMDDHHMMSSZ); fractional seconds MUST NOT be included.
section: 2.2.4
rfc2119_level: MUST
topics:
    - pkix
    - security
