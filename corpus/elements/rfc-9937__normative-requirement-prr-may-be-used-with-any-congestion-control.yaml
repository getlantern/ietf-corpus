document: rfc-9937
kind: normative-requirement
summary: PRR MAY be used with any congestion control algorithm that intends to make a multiplicative decrease in sending rate over approximately one RTT, where in-flight data is limited by cwnd and the target volume during reduction is a fixed ssthresh value. PRR is explicitly applicable to Reno and CUBIC.
section: "5"
rfc2119_level: MAY
topics:
    - tcp
    - congestion
