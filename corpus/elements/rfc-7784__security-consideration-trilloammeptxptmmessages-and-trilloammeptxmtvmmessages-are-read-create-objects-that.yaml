document: rfc-7784
kind: security-consideration
summary: trillOamMepTxPtmMessages and trillOamMepTxMtvmMessages are read-create objects that control the volume of PTM and MTVM traffic; unprotected write access can be exploited to generate large amounts of CPU-driven OAM traffic, causing CPU spikes on destination RBridges.
