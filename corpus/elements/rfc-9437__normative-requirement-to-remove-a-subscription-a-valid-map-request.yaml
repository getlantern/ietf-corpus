document: rfc-9437
kind: normative-requirement
summary: To remove a subscription, a valid Map-Request with the N-bit set and only one ITR-RLOC with AFI=0 (Unknown Address) signals unsubscription. The Map-Server MUST remove the subscription state and MUST send a Map-Notify to confirm the removal.
section: "5"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
