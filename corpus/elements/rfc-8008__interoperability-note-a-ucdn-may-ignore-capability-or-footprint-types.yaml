document: rfc-8008
kind: interoperability-note
summary: A uCDN MAY ignore capability or footprint types it does not understand; it selects a dCDN based only on the types it does understand. If a dCDN omits an optional capability supported by the uCDN, this causes no functional problem because the uCDN decides using remaining conveyed information.
section: "4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
