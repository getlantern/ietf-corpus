document: rfc-9747
kind: protocol-element
summary: Initial demultiplexing of Unaffiliated BFD Echo packets with a zeroed 'Your Discriminator' field is performed based on source IP address or UDP source port. After the remote system loops back the local discriminator, all further received packets are demultiplexed based solely on the 'Your Discriminator' field, per RFC 5880 Section 6.3.
section: "2"
topics:
    - routing
