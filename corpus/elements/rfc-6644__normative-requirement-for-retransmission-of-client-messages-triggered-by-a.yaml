document: rfc-6644
kind: normative-requirement
summary: For retransmission of client messages triggered by a Reconfigure, the client uses the same variables and retransmission algorithm as for Renew, Rebind, or Information-request messages in client-initiated exchanges (RFC 3315 Sections 18.1.3, 18.1.4, and 18.1.5). If no response is received by end of retransmission, the Reconfigure is ignored and discarded.
section: "5"
rfc2119_level: REQUIRED
topics:
    - ip
