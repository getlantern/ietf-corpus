document: rfc-7009
kind: security-consideration
summary: Malicious clients could attempt denial-of-service attacks against the revocation endpoint; countermeasures MUST be applied, equivalent to those for the token endpoint. Invalid token_type_hint values can cause additional database lookups, so care MUST be taken to prevent exploitation for DoS.
section: "5"
topics:
