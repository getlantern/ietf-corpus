document: rfc-7495
kind: registry
summary: 'This document creates the IANA ''Security External Enumeration Registry'' (located at http://www.iana.org/assignments/sec-ext-enum) to manage external enumeration specifications. Each entry records: Full Name, Abbreviation (>=2 uppercase ASCII letters), IANA-assigned positive integer SpecIndex, Version, and one or more Specification URIs. Allocation policy is Specification Required with Expert Review by the MILE WG. The initial entry is CVE 1.0 with SpecIndex 1.'
section: "4"
