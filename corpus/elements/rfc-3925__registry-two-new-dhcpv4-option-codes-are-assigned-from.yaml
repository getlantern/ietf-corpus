summary: 'Two new DHCPv4 option codes are assigned from the public DHCP Options numbering space defined in RFC 2939: OPTION_V-I_VENDOR_CLASS (124) and OPTION_V-I_VENDOR_OPTS (125). Vendor-specific sub-option codes within option 125 are defined by each vendor and are not managed by IANA.'
