document: rfc-4733
kind: interoperability-note
summary: If a zero volume is indicated for an event for which the volume field is defined, the receiver MAY reconstruct volume from non-event audio or use the nominal ITU value, ensuring backward compatibility with RFC 2833 where volume was defined only for DTMF events.
section: 2.5.2.2
topics:
    - rtp
    - realtime
    - voip
