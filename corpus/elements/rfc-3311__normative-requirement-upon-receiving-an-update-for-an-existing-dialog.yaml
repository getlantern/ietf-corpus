document: rfc-3311
kind: normative-requirement
summary: Upon receiving an UPDATE for an existing dialog, a UA MUST check version identifiers (or content) of the session description. If changed, the UAS MUST adjust session parameters and generate an answer in the 2xx response.
section: "5.2"
rfc2119_level: MUST
topics:
    - sip
    - realtime
