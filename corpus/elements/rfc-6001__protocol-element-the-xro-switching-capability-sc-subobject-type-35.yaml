document: rfc-6001
kind: protocol-element
summary: The XRO Switching Capability (SC) subobject (Type 35) enables explicit identification of switching capabilities to be excluded during multi-region resource selection. It carries an L bit (0=MUST exclude, 1=SHOULD avoid), Attribute field (1=applies to preceding interface subobject), and the Switching Cap value to exclude, with a fixed length of 4 bytes.
section: 4.1.1
topics:
    - mpls
    - routing
