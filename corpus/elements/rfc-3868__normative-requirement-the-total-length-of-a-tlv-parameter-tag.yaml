document: rfc-3868
kind: normative-requirement
summary: The total length of a TLV parameter (Tag + Length + Value fields) MUST be a multiple of 4 bytes. The sender pads with all-zero bytes after the Parameter Value field as needed; padding length is not included in the Parameter Length field.
section: 3.1.5
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
