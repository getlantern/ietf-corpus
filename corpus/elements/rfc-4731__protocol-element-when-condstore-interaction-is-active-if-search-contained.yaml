document: rfc-4731
kind: protocol-element
summary: 'When CONDSTORE interaction is active: if SEARCH contained only MIN or only MAX, the MODSEQ result contains the mod-sequence for that one found message; if both MIN and MAX with no ALL/COUNT, MODSEQ contains the highest mod-sequence of those two messages; otherwise MODSEQ contains the highest mod-sequence across all returned messages.'
section: "3.2"
topics:
