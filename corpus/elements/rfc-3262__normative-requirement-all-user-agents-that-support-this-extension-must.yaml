document: rfc-3262
kind: normative-requirement
summary: All user agents that support this extension MUST support all offer/answer exchanges that are possible based on the rules in Section 13.2 of RFC 3261, based on the existence of INVITE and PRACK as requests, and 2xx and reliable 1xx as non-failure reliable responses.
section: "5"
rfc2119_level: MUST
topics:
