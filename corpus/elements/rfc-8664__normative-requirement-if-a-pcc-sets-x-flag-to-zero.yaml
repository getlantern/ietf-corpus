document: rfc-8664
kind: normative-requirement
summary: If a PCC sets X-Flag to zero, it MUST set the MSD to a number greater than zero. If a PCE receives an SR-PCE-CAPABILITY sub-TLV with X-Flag=0 and MSD=0, it MUST send PCErr Error-Type=10, Error-value=21 ('Maximum SID depth must be non-zero') and MUST close the PCEP session.
section: "5.1"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
