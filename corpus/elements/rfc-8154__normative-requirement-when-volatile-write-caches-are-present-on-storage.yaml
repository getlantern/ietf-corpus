document: rfc-8154
kind: normative-requirement
summary: When volatile write caches are present on storage devices (indicated by WCE=1 in the Caching mode page), the pNFS server MUST ensure the volatile write cache has been committed to stable storage before the LAYOUTCOMMIT operation returns, using SYNCHRONIZE CACHE commands.
section: "2.8"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
