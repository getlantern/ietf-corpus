document: rfc-8000
kind: design-rationale
summary: The NFSv4 Domain name is intentionally defined loosely as a DNS domain name (per RFC 5661 Section 5.9) because DNS domain names are globally unique, making them a natural basis for ensuring cross-deployment NFSv4 Domain uniqueness.
