document: rfc-6333
kind: interoperability-note
summary: The B4 element SHOULD NOT initialize if the host or CPE selects native dual-stack mode during interface initialization; the selection mechanism between DS-Lite and native dual-stack is out of scope and left to implementation. Running both simultaneously is discouraged.
section: "5.6"
