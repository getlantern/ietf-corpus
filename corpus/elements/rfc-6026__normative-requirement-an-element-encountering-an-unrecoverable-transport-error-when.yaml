document: rfc-6026
kind: normative-requirement
summary: An element encountering an unrecoverable transport error when sending a response to an INVITE request MUST NOT immediately destroy the associated INVITE server transaction state, to ensure correct processing of retransmissions of the request.
section: "6"
rfc2119_level: MUST NOT
