summary: componentFilterMatch (OID 1.2.36.79672281.1.13.2) is the primary matching rule defined by this document. It applies a ComponentFilter assertion to an attribute value and returns the result of evaluating the ComponentFilter. Its LDAP assertion syntax is ComponentFilter encoded via GSER.
