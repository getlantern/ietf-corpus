document: rfc-8505
kind: interoperability-note
summary: An updated 6LN registering with an RFC 6775-only 6LR MUST use a 64-bit ROVR and MUST behave in a backward-compatible manner per RFC 6775. An updated 6LBR communicating with an RFC 6775-only 6LR MUST use only the 64 leftmost bits of the ROVR in EDAR messages.
section: "6.3"
topics:
    - ip
    - v6ops
