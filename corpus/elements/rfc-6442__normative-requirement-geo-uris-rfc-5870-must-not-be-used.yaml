document: rfc-6442
kind: normative-requirement
summary: GEO-URIs (RFC 5870) MUST NOT be used in the SIP Geolocation header because they do not include retention and re-transmission flags required by RFC 3693 for a Using Protocol. Any other URI scheme used MUST be reviewed against RFC 3693 Using Protocol criteria.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
