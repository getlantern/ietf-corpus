document: rfc-5278
kind: design-rationale
summary: Separate Enumservice types ('voicemsg', 'videomsg', 'unifmsg') were defined to allow service providers and clients to explicitly identify the nature of the messaging endpoint (voice-only, video-only, or unified). This distinction cannot be reliably inferred from SIP URIs alone without non-standards-based routing logic.
section: "1.2"
topics:
    - sip
    - dns
    - voip
