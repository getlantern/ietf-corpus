document: rfc-6753
kind: privacy-consideration
summary: Using authorization-by-possession location URIs in hop-by-hop protocols like SIP introduces on-path adversaries who may intercept the URI. This has implications for location-based applications such as emergency services and location-based routing, as discussed in RFC 6442.
section: "4.1"
topics:
    - privacy
    - security
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
