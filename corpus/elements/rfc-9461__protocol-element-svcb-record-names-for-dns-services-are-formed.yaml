document: rfc-9461
kind: protocol-element
summary: 'SVCB record names for DNS services are formed using Port Prefix Naming with a scheme of "dns". For a DNS service at dns1.example.com, records are queried at _dns.dns1.example.com. When a non-default port is specified (e.g., port 9953), an additional port prefix is added: _9953._dns.dns1.example.com.'
section: "3"
topics:
    - dns
    - routing
