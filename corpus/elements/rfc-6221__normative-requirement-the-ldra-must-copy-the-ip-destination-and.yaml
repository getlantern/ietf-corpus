document: rfc-6221
kind: normative-requirement
summary: The LDRA MUST copy the IP destination and link-layer destination addresses from the client-originated message into the Relay-Forward message, and MUST copy the IP source address into the peer-address field and the link-layer source address into the link-layer source address.
section: "6.1"
rfc2119_level: MUST
topics:
    - ip
