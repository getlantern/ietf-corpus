summary: 'IANA created a ''6LoWPAN Capability Bits'' subregistry under ICMPv6 Parameters with bits numbered 0–47 (16th bit onward of the 6CIO). Initial assignments: bits 0–7 reserved for experimental use, bits 8–14 unassigned, bit 15 is the GHC capable (G) bit, bits 16–47 unassigned. Assignment policy is IETF Review or IESG Approval.'
