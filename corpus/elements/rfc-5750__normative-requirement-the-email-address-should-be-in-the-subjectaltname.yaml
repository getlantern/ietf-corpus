document: rfc-5750
kind: normative-requirement
summary: The email address SHOULD be in the subjectAltName extension and SHOULD NOT be in the subject distinguished name. Sending agents SHOULD make the address in the From or Sender header match an Internet mail address in the signer's certificate.
section: "3"
rfc2119_level: SHOULD
topics:
