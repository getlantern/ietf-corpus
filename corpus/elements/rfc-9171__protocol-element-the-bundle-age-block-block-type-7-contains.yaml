document: rfc-9171
kind: protocol-element
summary: The Bundle Age Block (block type 7) contains the number of milliseconds elapsed since bundle creation, updated at each forwarding hop. If the bundle's creation time is zero, the bundle MUST contain exactly one Bundle Age Block. At forwarding, the bundle age value MUST be increased by the elapsed time since reception or creation.
section: 4.4.2
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
