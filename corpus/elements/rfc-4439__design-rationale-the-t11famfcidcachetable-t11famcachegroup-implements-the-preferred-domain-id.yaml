document: rfc-4439
kind: design-rationale
summary: 'The t11FamFcIdCacheTable (t11FamCacheGroup) implements the Preferred Domain_ID concept: after a port releases a Fibre Channel Address Identifier, the switch makes a best-effort attempt to re-assign the same identifier on the next request from that port. This group is therefore conditional mandatory only for switches that support this concept.'
section: "5.7"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
