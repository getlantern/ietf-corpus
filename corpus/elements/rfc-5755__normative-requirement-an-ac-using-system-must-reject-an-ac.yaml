document: rfc-5755
kind: normative-requirement
summary: An AC-using system MUST reject an AC if it encounters a critical extension it does not recognize. Non-critical unrecognized extensions MAY be ignored. If any critical extension outside the defined profile set is present, the AC does not conform to this profile.
section: 4.2.9
rfc2119_level: MUST
topics:
