document: rfc-8655
kind: design-rationale
summary: The DetNet service sub-layer and forwarding sub-layer separation is helpful for exploring combinations of data-plane solutions but is not a formal requirement; some technologies may violate strict sub-layer boundaries and still deliver a DetNet service. Service examples include PW/UDP/GRE for the service sub-layer and IPv4/IPv6/MPLS-TE/MPLS-SR for the forwarding sub-layer.
section: 4.1.2
topics:
