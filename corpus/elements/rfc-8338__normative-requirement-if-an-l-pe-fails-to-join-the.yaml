document: rfc-8338
kind: normative-requirement
summary: If an L-PE fails to join the P2MP PSN LSP, it MUST NOT enable the PW, MUST notify the user, and MUST send a PW status message with status code 0x00000008 (Local PSN-facing PW Receive Fault) to the R-PE.
section: "3"
rfc2119_level: MUST
topics:
    - mpls
