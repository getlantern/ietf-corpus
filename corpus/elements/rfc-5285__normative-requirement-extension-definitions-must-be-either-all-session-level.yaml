document: rfc-5285
kind: normative-requirement
summary: Extension definitions MUST be either all session-level or all media-level in SDP; mixing the two styles is not permitted. An extension URI with the same attributes MUST NOT appear more than once applying to the same stream.
section: "5"
rfc2119_level: MUST
topics:
