document: rfc-6901
kind: protocol-element
summary: 'A JSON Pointer is a Unicode string containing a sequence of zero or more reference tokens, each prefixed by a ''/'' (%x2F) character. The ABNF is: json-pointer = *( "/" reference-token ), reference-token = *( unescaped / escaped ), where escaped = "~" ( "0" / "1" ).'
section: "3"
topics:
    - json
