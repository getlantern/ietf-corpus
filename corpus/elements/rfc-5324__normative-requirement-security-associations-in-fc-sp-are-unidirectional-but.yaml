document: rfc-5324
kind: normative-requirement
summary: Security Associations in FC-SP are unidirectional but always exist as an SA pair of the same type in opposite directions. Each SA in the SADB includes the SPI (carried in transmitted frames to identify the SA to the receiver), a Sequence Number counter, and the negotiated transform parameters.
section: 3.4.2
rfc2119_level: MUST
topics:
    - security
    - crypto
