document: rfc-4650
kind: normative-requirement
summary: Each party SHALL generate xi or xr using a strong, unpredictable PRNG and SHALL keep these values private. It is RECOMMENDED that the secret DH exponent values be destroyed once the common TGK has been established.
section: "5.3"
rfc2119_level: MUST
