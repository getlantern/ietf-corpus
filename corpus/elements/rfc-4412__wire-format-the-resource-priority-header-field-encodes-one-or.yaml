document: rfc-4412
kind: wire-format
summary: 'The ''Resource-Priority'' header field encodes one or more r-values, each formatted as ''namespace''.''r-priority'' where both tokens are case-insensitive ASCII that do not contain periods. Example: ''Resource-Priority: dsn.flash''. Multiple r-values may appear comma-separated in one header or as multiple header fields; ordering is insignificant.'
section: "3.1"
topics:
