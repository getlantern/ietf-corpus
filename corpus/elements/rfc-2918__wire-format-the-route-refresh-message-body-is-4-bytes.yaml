document: rfc-2918
kind: wire-format
summary: 'The ROUTE-REFRESH message body is 4 bytes: AFI (16-bit Address Family Identifier), Res (8-bit Reserved field), and SAFI (8-bit Subsequent Address Family Identifier), encoded in that order. The encoding and semantics of <AFI, SAFI> match RFC 2858 section 7.'
