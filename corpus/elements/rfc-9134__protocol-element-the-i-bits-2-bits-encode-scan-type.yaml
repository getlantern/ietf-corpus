document: rfc-9134
kind: protocol-element
summary: 'The I bits (2 bits) encode scan type: 00 = progressive, 01 = reserved, 10 = first picture segment of interlaced frame (top-field-first or per frat), 11 = second picture segment of interlaced frame. The codestream height in an interlaced segment is half the full display height.'
section: "4.3"
