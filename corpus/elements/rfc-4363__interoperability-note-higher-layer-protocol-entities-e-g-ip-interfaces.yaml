document: rfc-4363
kind: interoperability-note
summary: Higher-layer protocol entities (e.g., IP interfaces) on a VLAN should be represented in ifTable as interfaces of type propVirtual(53). Protocol-specific types such as l3ipxvlan(137) should not be used, as no protocol filtering before delivery to these virtual interfaces is implied.
section: 3.4.2.1
topics:
    - snmp
