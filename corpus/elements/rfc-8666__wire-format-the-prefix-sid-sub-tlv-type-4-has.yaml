summary: The Prefix-SID sub-TLV (Type 4) has a Flags octet with NP (No-PHP), M (Mapping Server), E (Explicit Null), V (Value/Index), and L (Local/Global) bits; an Algorithm octet; and a 3- or 4-octet SID/Index/Label field depending on the V-Flag. Length is 7 or 8 octets.
