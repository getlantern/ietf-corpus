document: rfc-3497
kind: design-rationale
summary: 'The 11-bit line number is carried in the payload header to provide application-level resiliency: if the packet containing the EAV is lost, downstream receivers can still identify the current line. It also enables higher-level monitoring without full SMPTE 292M stream parsing.'
