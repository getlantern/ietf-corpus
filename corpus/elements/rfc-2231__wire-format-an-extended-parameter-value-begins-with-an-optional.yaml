document: rfc-2231
kind: wire-format
summary: An extended parameter value begins with an optional registered character set name, followed by a single quote, an optional RFC 1766 language tag, a second single quote, and the value encoded with percent-sign hex escaping for non-ASCII octets (e.g., title*=us-ascii'en-us'This%20is%20%2A%2A%2Afun%2A%2A%2A). The asterisk suffix on the parameter name signals this encoding.
