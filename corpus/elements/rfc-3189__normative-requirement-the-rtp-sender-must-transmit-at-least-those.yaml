document: rfc-3189
kind: normative-requirement
summary: The RTP sender MUST transmit at least those VAUX DIF blocks and/or audio DIF blocks with AAUX information bytes that include 'source' and 'source control' packs, which carry indispensable decoding information such as aspect ratio, audio quantization, and channel assignment.
section: "2.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
