document: rfc-3010
kind: security-consideration
summary: NFS version 4 servers must be able to recover without data loss from multiple power failures, OS failures, and hardware failures other than storage medium failure. Stable storage options include media commit, battery-backed drives, and UPS with recovery software.
section: "1.2"
topics:
    - security
