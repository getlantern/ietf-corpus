document: rfc-6116
kind: normative-requirement
summary: ENUM clients MUST sort NAPTR RRSet records by ORDER (major, ascending) and PREFERENCE/PRIORITY (minor, ascending). A record with a worse ORDER value MUST NOT be discarded before consideration unless a record has already been accepted.
section: "5.2"
rfc2119_level: MUST
topics:
