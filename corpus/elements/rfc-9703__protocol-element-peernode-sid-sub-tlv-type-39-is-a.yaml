kind: protocol-element
summary: PeerNode SID Sub-TLV (Type 39) is a new sub-TLV for the Target FEC Stack TLV that identifies a multi-hop EBGP session between two ASBRs using Local AS Number, Remote AS Number, Local BGP Router ID, and Remote BGP Router ID, each 4 octets, for a fixed length of 16 octets.
