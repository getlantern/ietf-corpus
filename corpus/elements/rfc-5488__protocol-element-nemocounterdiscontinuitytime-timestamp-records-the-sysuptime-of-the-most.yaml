document: rfc-5488
kind: protocol-element
summary: nemoCounterDiscontinuityTime (TimeStamp) records the sysUpTime of the most recent counter discontinuity across nemoMrConf, nemoMrRegnCounters, nemoMrGlobalStats, and nemoHaGlobalStats counter groups. A zero value indicates no discontinuity since last re-initialization.
