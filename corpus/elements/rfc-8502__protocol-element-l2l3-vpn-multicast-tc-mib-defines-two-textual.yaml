document: rfc-8502
kind: protocol-element
summary: 'L2L3-VPN-MULTICAST-TC-MIB defines two textual conventions: L2L3VpnMcastProviderTunnelType (enumeration of P-tunnel types) and L2L3VpnMcastProviderTunnelId (identifier of a P-tunnel). These TCs are intended for reuse by other MIB modules monitoring or configuring L2L3VpnMCast networks.'
