document: rfc-5888
kind: normative-requirement
summary: In SIP offer/answer, the 'mid' value in the offer MUST be the same as the 'mid' value in the answer. Subsequent offers SHOULD use the same 'mid' value for already existing media streams.
section: "9.1"
rfc2119_level: MUST
topics:
