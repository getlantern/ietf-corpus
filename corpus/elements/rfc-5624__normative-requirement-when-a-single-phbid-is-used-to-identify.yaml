document: rfc-5624
kind: normative-requirement
summary: When a single PHBID is used to identify a set of PHBs (bit 14 set to 1), that set of PHBs MUST constitute a PHB Scheduling Class, meaning use of PHBs from the set MUST NOT cause intra-microflow traffic reordering when different PHBs from the set are applied to traffic in the same microflow.
section: 3.4.3
rfc2119_level: MUST
topics:
    - qos
    - diffserv
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
