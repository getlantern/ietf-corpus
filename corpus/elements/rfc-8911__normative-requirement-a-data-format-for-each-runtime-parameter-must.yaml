document: rfc-8911
kind: normative-requirement
summary: A data format for each Runtime Parameter MUST be specified in the Runtime Parameters column. IPv6 addresses and options MUST be accommodated in all Registered Performance Metrics, allowing use in that address family; other address families are permissible.
section: 7.3.5
rfc2119_level: MUST
