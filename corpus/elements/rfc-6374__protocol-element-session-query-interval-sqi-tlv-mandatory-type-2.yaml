document: rfc-6374
kind: protocol-element
summary: 'Session Query Interval (SQI) TLV (mandatory Type 2): a 32-bit unsigned millisecond value. The querier sends SQI=0 to request the responder''s minimum interval; the responder replies with its minimum; the querier selects an interval ≥ that value, confirms it in subsequent queries, and MAY then stop including the SQI object once acknowledged.'
section: 3.5.4
topics:
    - mpls
    - measurement
