document: rfc-7756
kind: normative-requirement
summary: For a node-based ER, the IPv6 network MUST forward traffic destined for the ER's IPv6 Service Addresses to the node, and the node's operating system MUST in turn forward those packets to the ER. One method is assigning these as secondary IPv6 addresses so the upstream router learns of them via IPv6 Neighbor Discovery (RFC 4861).
section: "3.1"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
