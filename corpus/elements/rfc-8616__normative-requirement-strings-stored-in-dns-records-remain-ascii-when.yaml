document: rfc-8616
kind: normative-requirement
summary: Strings stored in DNS records remain ASCII. When a domain name found in a mail header field includes U-labels, those labels MUST be translated to A-labels before being looked up in the DNS.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - dns
