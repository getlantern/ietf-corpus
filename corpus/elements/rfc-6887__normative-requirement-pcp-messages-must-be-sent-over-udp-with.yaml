document: rfc-6887
kind: normative-requirement
summary: PCP messages MUST be sent over UDP with a maximum UDP payload of 1100 octets. All numeric quantities larger than one octet are in network (big-endian) byte order; IP addresses and ports use the same representation as in IP/TCP headers (no byte swapping).
section: "8"
rfc2119_level: MUST
topics:
    - nat
    - udp
