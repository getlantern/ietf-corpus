document: rfc-2380
kind: normative-requirement
summary: Subnet senders MUST establish all QoS VCs and RSVP-enabled subnet receivers MUST be able to accept incoming QoS VCs. This sender-initiated VC control is consistent with RSVP version 1 processing rules.
section: "2.2"
rfc2119_level: MUST
