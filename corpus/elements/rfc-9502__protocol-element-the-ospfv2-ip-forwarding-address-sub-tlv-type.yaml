document: rfc-9502
kind: protocol-element
summary: The OSPFv2 IP Forwarding Address Sub-TLV (Type 7 of OSPFv2 Extended Prefix TLV) carries a 4-octet forwarding address for IP Algorithm Prefix reachability computation. It is optional; if absent, the forwarding address defaults to 0.0.0.0. It is only applicable to AS External and NSSA External route types.
section: 6.3.1
topics:
    - routing
    - ip
