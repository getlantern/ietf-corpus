document: rfc-4873
kind: normative-requirement
summary: At a branch node, the Sender_template MUST be updated with the local node address and LSP ID updated for uniqueness; the Session object MUST use the SERO final subobject address as tunnel endpoint and the extended tunnel ID MUST be set to the local node address. Any RROs and EROs from the incoming Path message MUST NOT be included in the recovery LSP.
section: "4.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
