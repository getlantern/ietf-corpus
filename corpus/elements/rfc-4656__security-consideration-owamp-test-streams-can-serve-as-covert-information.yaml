document: rfc-4656
kind: security-consideration
summary: OWAMP test streams can serve as covert information channels because inter-packet timing and content can be modulated. Encrypted mode prevents undetectable timestamp modification by intermediaries attempting to falsify one-way delay measurements.
section: "6.3"
topics:
    - security
    - privacy
    - measurement
