document: rfc-7369
kind: security-consideration
summary: 'Automatic establishment of OAM entities via RSVP-TE introduces a denial-of-service risk: a remote attacker could overload a network element by sending frequent Path messages requesting liveliness monitoring for a large number of LSPs. This can be mitigated by deploying RSVP message integrity and node authentication per RFC 2747.'
section: "5"
topics:
    - security
    - mpls
    - routing
