document: rfc-3206
kind: design-rationale
summary: RFC 2449's IN-USE and LOGIN-DELAY response codes were insufficient because clients could not determine whether an unrecognized error required new user credentials or merely a retry; some clients resorted to parsing free-text error strings from known servers to infer mailbox-lock status.
section: "3"
topics:
