document: rfc-1661
kind: wire-format
summary: 'Magic-Number Configuration Option: Type=5, Length=6, Magic-Number field is 4 octets chosen as randomly as possible. Used to detect looped-back links; if received Magic-Number equals the last sent Magic-Number, a Configure-Nak MUST be sent with a different value.'
section: "6.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-21"
