document: rfc-4404
kind: protocol-element
summary: The FCIP TCP Connection Table (fcipTcpConnTable) records existing TCP connections per FCIP link, including local port, remote port, maximum TCP receiver window size, and Maximum Segment Size (MSS). Each FCIP link manages one or more TCP connections via a Data Engine.
