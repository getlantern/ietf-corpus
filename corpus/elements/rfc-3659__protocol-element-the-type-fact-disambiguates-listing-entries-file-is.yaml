summary: 'The ''type'' fact disambiguates listing entries: ''file'' is a transferable data file; ''cdir'' is the listed directory itself (usable as a heading); ''pdir'' is a parent directory; ''dir'' is a subdirectory; OS-specific types use the ''OS.osname=kind'' format.'
