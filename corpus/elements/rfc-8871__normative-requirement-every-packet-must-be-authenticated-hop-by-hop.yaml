document: rfc-8871
kind: normative-requirement
summary: Every packet MUST be authenticated hop by hop between an endpoint and a Media Distributor, as well as between Media Distributors. The use of the replay protection mechanism specified in Section 3.3.2 of RFC 3711 is REQUIRED at each hop.
section: "4.4"
rfc2119_level: REQUIRED
topics:
    - rtp
    - security
    - realtime
