document: rfc-5244
kind: normative-requirement
summary: 'For ABCD signalling, implementations SHOULD use triple-redundancy: at the time of a transition, the same ABCD information is sent 3 times at an interval of 5 ms, with continuous sending if another transition occurs. After a stable period, ABCD information is sent every 5 seconds.'
section: "2.4"
rfc2119_level: SHOULD
topics:
    - realtime
    - rtp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
