summary: 'Four modes of WebRTC IP-handling behavior are defined: Mode 1 (enumerate all addresses), Mode 2 (default route plus associated local addresses), Mode 3 (default route only), and Mode 4 (force proxy). Each mode represents a different trade-off between media performance and privacy.'
