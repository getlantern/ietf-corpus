document: rfc-3230
kind: design-rationale
summary: Content-MD5 is locked to MD5; other algorithms such as SHA-1 and fingerprinting algorithms may be more appropriate in some circumstances. HTTP/1.1 also lacks any mechanism for a client to request a digest or indicate which algorithms it understands.
section: "1.1"
topics:
    - http
    - crypto
