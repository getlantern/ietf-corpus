document: rfc-2138
kind: normative-requirement
summary: The Vendor-Specific attribute (Type 26) MUST NOT affect RADIUS protocol operation. Servers not equipped to interpret vendor-specific data MUST ignore it; clients that do not receive desired vendor-specific data SHOULD attempt to operate without it.
section: "5.26"
rfc2119_level: MUST
topics:
    - security
