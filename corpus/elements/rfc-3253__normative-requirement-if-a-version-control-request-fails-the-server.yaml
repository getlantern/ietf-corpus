document: rfc-3253
kind: normative-requirement
summary: If a VERSION-CONTROL request fails, the server state preceding the request MUST be restored. The postcondition DAV:put-under-version-control requires a new version history and version resource to have been created with content, dead properties, and DAV:resourcetype matching the source resource.
section: "3.5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
