document: rfc-5952
kind: normative-requirement
summary: The '::' symbol MUST NOT be used to shorten just one 16-bit 0 field. For example, 2001:db8:0:1:1:1:1:1 is correct but 2001:db8::1:1:1:1:1 is not correct.
section: 4.2.2
rfc2119_level: MUST NOT
