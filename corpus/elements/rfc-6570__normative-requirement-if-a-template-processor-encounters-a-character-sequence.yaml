document: rfc-6570
kind: normative-requirement
summary: If a template processor encounters a character sequence outside an expression that does not match the URI-Template grammar, processing SHOULD cease, the result SHOULD contain the expanded part followed by the remainder unexpanded, and the error SHOULD be indicated to the invoking application.
section: "3"
rfc2119_level: SHOULD
topics:
