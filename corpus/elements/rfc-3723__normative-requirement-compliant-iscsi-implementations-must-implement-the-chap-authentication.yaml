document: rfc-3723
kind: normative-requirement
summary: Compliant iSCSI implementations MUST implement the CHAP authentication method (RFC 1994) including support for bi-directional authentication. Implementations MUST support random CHAP secrets of up to 128 bits and MUST NOT provide secret generation means other than random generation.
section: 2.4.1
rfc2119_level: MUST
topics:
    - security
