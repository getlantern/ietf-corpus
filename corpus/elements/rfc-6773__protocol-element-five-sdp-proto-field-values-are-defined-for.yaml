summary: 'Five SDP proto field values are defined for DCCP-UDP: ''UDP/DCCP'', ''UDP/DCCP/RTP/AVP'', ''UDP/DCCP/RTP/SAVP'', ''UDP/DCCP/RTP/AVPF'', and ''UDP/DCCP/RTP/SAVPF''. The port in the ''m='' line indicates the UDP port used for DCCP-UDP encapsulation.'
