document: rfc-5546
kind: interoperability-note
summary: Clients that cannot handle the REQUEST method MAY degrade and treat a REQUEST VEVENT as a PUBLISH. This fallback is defined in Section 5.1.1 to ensure partial implementations can still consume event information even without full interactive scheduling support.
section: 3.2.2, 5.1.1
