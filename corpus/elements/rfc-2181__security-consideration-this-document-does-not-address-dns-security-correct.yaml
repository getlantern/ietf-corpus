document: rfc-2181
kind: security-consideration
summary: This document does not address DNS security. Correct implementation of the clarifications herein may limit the spread of non-malicious bad data in the DNS, but only DNSSEC (RFC2065) can protect against deliberate attempts to subvert DNS data. The data ranking rules in section 5.4.1 are not security mechanisms.
section: "12"
topics:
