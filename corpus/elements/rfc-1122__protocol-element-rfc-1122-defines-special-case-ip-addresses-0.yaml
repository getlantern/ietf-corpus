document: rfc-1122
kind: protocol-element
summary: 'RFC-1122 defines special-case IP addresses: {0,0} and {0,host} are source-only initialization addresses; {-1,-1} is limited broadcast; {net,-1}, {net,subnet,-1}, and {net,-1,-1} are directed broadcasts; {127,any} is loopback. Broadcast addresses MUST NOT be used as source addresses, and loopback addresses MUST NOT appear outside a host.'
section: 3.2.1.3
topics:
