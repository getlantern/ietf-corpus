document: rfc-8684
kind: protocol-element
summary: MP_FASTCLOSE is an abrupt connection close analogous to TCP RST. It can be sent on an ACK (reliable) or RST (unreliable). It carries the peer's key and causes the receiver to RST all subflows. It is the only time after the handshake that a key is sent in the clear.
section: "3.5"
topics:
    - multipath
    - tcp
