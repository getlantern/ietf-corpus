document: rfc-4268
kind: interoperability-note
summary: When alarms are active, the alarmActiveTable in the Alarm MIB (RFC 3877) should be searched for rows whose alarmActiveResourceId matches the entPhysicalIndex. Conversely, entStateAlarm can quickly confirm additional alarms of different severities once an active alarm is found via the Alarm MIB.
