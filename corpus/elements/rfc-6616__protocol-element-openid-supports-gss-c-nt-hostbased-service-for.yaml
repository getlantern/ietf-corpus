document: rfc-6616
kind: protocol-element
summary: OpenID supports GSS_C_NT_HOSTBASED_SERVICE for acceptors and only GSS_C_NT_USER_NAME for initiators. The default name type is GSS_C_NT_USER_NAME. No OpenID-specific name syntaxes are defined.
