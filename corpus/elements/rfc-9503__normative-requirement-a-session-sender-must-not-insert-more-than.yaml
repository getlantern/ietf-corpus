document: rfc-9503
kind: normative-requirement
summary: A Session-Sender MUST NOT insert more than one Return Path TLV in the STAMP test packet. A Session-Reflector that supports this TLV MUST only process the first Return Path TLV and ignore others if present.
section: "4"
rfc2119_level: MUST NOT
