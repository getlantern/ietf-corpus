document: rfc-7531
kind: protocol-element
summary: The open_delegation_type4 enum (OPEN_DELEGATE_NONE=0, READ=1, WRITE=2) controls delegation grants. open_read_delegation4 includes a recall bool and nfsace4 permissions; open_write_delegation4 additionally includes nfs_space_limit4 to govern client-side flush behavior.
