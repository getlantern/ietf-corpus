document: rfc-5142
kind: wire-format
summary: The Home Agent Switch message data begins with an 8-bit '# of Addresses' field indicating the count of IPv6 home agent addresses, followed by an 8-bit Reserved field, a variable-length list of IPv6 Home Agent Addresses (16 bytes each), and variable-length Mobility Options. If '# of Addresses' is zero, the mobile node MUST perform home agent discovery.
section: "4"
topics:
    - mobility
