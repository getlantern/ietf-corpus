document: rfc-9010
kind: wire-format
summary: The updated RPL Target Option (Type=0x05) adds F (1 bit, full 128-bit advertiser address), X (1 bit, proxy EDAR requested), Flg (2 reserved bits), ROVRsz (4 bits, ROVR size 64–256 bits encoded as 1–4), Prefix Length (8 bits), variable Target Prefix, and optional ROVR field. The format is backward compatible with RFC 6550.
section: "6.1"
topics:
    - routing
    - registry
