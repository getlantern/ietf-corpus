document: rfc-8528
kind: protocol-element
summary: A mount point is defined by placing the 'mount-point' extension statement (from 'ietf-yang-schema-mount') inside a 'container' or 'list' statement. The extension's argument is a YANG identifier that labels the mount point. A module MAY contain multiple mount points with the same label.
section: "3.1"
topics:
    - yang
    - netconf
