document: rfc-6553
kind: design-rationale
summary: IPv6-in-IPv6 tunneling is mandated for attaching a RPL Option to packets not originated by the forwarding router so that the original packet remains unmodified and ICMPv6 errors are returned to the RPL Option source rather than the original packet source.
