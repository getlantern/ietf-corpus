document: rfc-5332
kind: protocol-element
summary: Upstream-assigned labels are those where the binding between label L and FEC F was made by the transmitting LSR (or a third party) and advertised to the receiving LSR, as opposed to downstream-assigned labels where the receiver makes and advertises the binding. Upstream-assigned labels are not required to come from the same label space as downstream-assigned labels.
