document: rfc-4629
kind: design-rationale
summary: Encoders are generally discouraged from sending EOS and EOSBS codes because some decoders may misinterpret the loss of such a packet as loss of essential video data, causing them to suppress display of subsequent video — even though EOS/EOSBS do not affect picture decoding.
section: 6.1.3
topics:
    - rtp
    - realtime
