document: rfc-5890
kind: interoperability-note
summary: URI (RFC 3986), SMTP (RFC 5321), and HTTP (RFC 2616) do not permit non-ASCII labels in DNS names, allowing only A-label form of IDNs. Compatibility problems between IDNA2003 and IDNA2008 arise only for characters whose interpretation actually changed between the two versions.
section: "4.6"
topics:
    - dns
    - http
    - email
