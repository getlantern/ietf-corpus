document: rfc-8147
kind: protocol-element
summary: The <request> element allows the PSAP to request IVS actions. Its mandatory 'action' attribute references the Emergency Call Actions IANA registry. For 'send-data', the 'datatype' attribute (also mandatory outside <capabilities>) specifies the requested data block using Emergency Call Data Types registry identifiers.
section: 9.1.3
topics:
    - sip
    - registry
