document: rfc-8519
kind: protocol-element
summary: 'Port matching is expressed via the ''port-range-or-operator'' grouping, which offers two cases: a ''range'' case with mandatory lower-port and upper-port leaves (both inet:port-number, range inclusive), and an ''operator'' case with an operator enum (lte, gte, eq, neq; default eq) and a mandatory port leaf.'
section: "4.2"
