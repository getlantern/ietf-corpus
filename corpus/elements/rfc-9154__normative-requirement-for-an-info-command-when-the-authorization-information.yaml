document: rfc-9154
kind: normative-requirement
summary: For an <info> command, when the authorization information is not set or the passed value does not match, the registry MUST return EPP error result code 2202. The registry MUST NOT return any indication of whether authorization information is set or unset to the non-sponsoring registrar.
section: "5.3"
rfc2119_level: MUST NOT
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
