document: rfc-8536
kind: design-rationale
summary: Version 1 data blocks are retained in version 2+ files solely for backward compatibility with obsolete readers; the 32-bit transition times limit coverage to 1901–2038. Implementations SHOULD ignore version 1 data when reading version 2+ files.
