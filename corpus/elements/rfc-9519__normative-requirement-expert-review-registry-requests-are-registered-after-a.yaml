document: rfc-9519
kind: normative-requirement
summary: Expert Review registry requests are registered after a three-week review period on the ssh-reg-review@ietf.org mailing list, on the advice of one or more designated experts. Designated experts may approve registration prior to publication if satisfied that a specification will be published.
section: "3"
rfc2119_level: SHOULD
