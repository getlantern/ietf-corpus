document: rfc-8148
kind: interoperability-note
summary: The same service URNs ('urn:service:sos.ecall.automatic' and 'urn:service:sos.ecall.manual') are used for both NG-ACN and NG-eCall since only one system is supported in any given region, and PSAP equipment may support multiple data formats allowing handling of vehicles that erroneously send the wrong data object.
