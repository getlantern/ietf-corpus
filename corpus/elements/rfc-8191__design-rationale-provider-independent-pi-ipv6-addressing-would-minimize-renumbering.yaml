document: rfc-8191
kind: design-rationale
summary: Provider-Independent (PI) IPv6 addressing would minimize renumbering needs but causes BGP scaling problems (RFC 7010). This motivated developing renumbering tools and practices (RFC 6879), and specifically this extension to support HNP renumbering in PMIPv6 when the HNP is not a PI prefix.
section: "1"
topics:
