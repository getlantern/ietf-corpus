document: rfc-5665
kind: normative-requirement
summary: For Standards Action assignments to the netid registry, the description field must include the RFC numbers of the associated protocol, including transport and network protocol RFCs. For First Come First Served assignments, a reference to the transport and network protocols should be included where applicable.
section: "5.1"
rfc2119_level: MUST
topics:
