document: rfc-9849
kind: normative-requirement
summary: After ECH rejection, if the server supplied valid retry_configs, the client MUST abort the current connection with an ech_required alert after handshake completion and SHOULD retry on a new transport connection using the retry configurations. The client MUST NOT fall back to unencrypted ClientHellos and MUST NOT use IP addresses from a new DNS query for the retry.
section: 6.1.6
rfc2119_level: MUST
topics:
    - tls
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
