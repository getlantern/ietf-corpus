document: rfc-1532
kind: interoperability-note
summary: Unless otherwise specified, the requirements in this document also apply to extensions to BOOTP such as DHCP (RFC 1531). In particular, the prohibition on round-robin relay-agent load-balancing is explicitly motivated by DHCP's dependence on multiple sequential BOOTREQUEST/BOOTREPLY exchanges with the same server.
section: "1"
topics:
