document: rfc-3768
kind: normative-requirement
summary: While in Backup state, a VRRP router MUST NOT respond to ARP requests for the virtual router IP addresses, MUST discard packets destined to the virtual router MAC address, and MUST NOT accept packets addressed to the virtual router IP addresses.
section: 6.4.2
rfc2119_level: MUST NOT
topics:
