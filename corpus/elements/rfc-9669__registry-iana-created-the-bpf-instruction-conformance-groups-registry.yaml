document: rfc-9669
kind: registry
summary: 'IANA created the ''BPF Instruction Conformance Groups'' registry (under the ''BPF Instructions'' registry group) with seven initial entries: atomic32, atomic64, base32, base64, divmul32, divmul64 (all Permanent), and packet (Historical). Registration requires Standards Action or IESG Approval for Permanent entries, or Specification Required for Provisional/Historical.'
