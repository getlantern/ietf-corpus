document: rfc-5651
kind: registry
summary: 'This document creates the ''LCT Header Extension Types'' namespace for integer values 0–255. Values 0–63 (variable-length) and 128–191 (fixed-length) require IETF Review; values 64–127 (variable-length) and 192–255 (fixed-length) require Specification Required. Initial registrations: EXT_NOP=0, EXT_AUTH=1, EXT_TIME=2.'
