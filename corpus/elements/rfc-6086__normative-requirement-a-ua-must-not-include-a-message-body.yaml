document: rfc-6086
kind: normative-requirement
summary: A UA MUST NOT include a message body associated with an Info Package in an INFO response; Info Package message bodies MUST only be sent in INFO requests. A UA MAY include a message body not associated with an Info Package in an INFO response.
section: 4.3.2
rfc2119_level: MUST NOT
topics:
