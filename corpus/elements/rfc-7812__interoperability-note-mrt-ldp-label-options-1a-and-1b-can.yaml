document: rfc-7812
kind: interoperability-note
summary: MRT LDP Label Options 1A and 1B can coexist in the same network, with a packet forwarded using Option 1A for some hops and Option 1B for others along a single MRT path. However, all routers in an MRT Island must support at least one common forwarding mechanism to ensure consistent MRT forwarding paths can be established.
section: 6.1.1.3
topics:
    - routing
    - mpls
