document: rfc-8322
kind: security-consideration
summary: Primitive authentication mechanisms like HTTP Basic Authentication are rarely appropriate for sensitive ROLIE resources. Sharing communities handling sensitive data should adopt stronger approaches such as HOBA, SCRAM-SHA-256, OAuth with JWT, or SAML-based federated identity with multi-factor or risk-based authentication.
section: "9"
topics:
