document: rfc-9301
kind: wire-format
summary: The Map-Reply message (Type=2) echoes the 64-bit Nonce from the Map-Request and contains one or more Records each with a 32-bit Record TTL (in minutes), Locator Count, EID mask-len, a 3-bit ACT field for negative replies, and a Locator-Set with per-Locator Priority, Weight, M Priority, M Weight, and L/p/R flags.
