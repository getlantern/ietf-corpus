document: rfc-4790
kind: security-consideration
summary: Collations will normally be used with UTF-8 strings, so the security considerations for UTF-8 (RFC 3629), stringprep (RFC 3454), and Unicode TR-36 apply and are normative to this specification. Implementers must consider Unicode security considerations including homograph attacks and normalization issues.
section: "11"
topics:
