document: rfc-8214
kind: normative-requirement
summary: The Ethernet A-D per-EVI route MUST NOT be used for traffic forwarding by a remote PE until it also receives the associated set of Ethernet A-D per-ES routes, consistent with RFC 7432 baseline behavior.
