document: rfc-1654
kind: protocol-element
summary: MULTI_EXIT_DISC (Type Code 4) is an optional non-transitive 4-octet unsigned integer used to discriminate among multiple exit/entry points to the same neighboring AS. Lower metric is preferred. It may propagate over internal links but never to neighboring ASes.
section: 5.1.4
topics:
    - bgp
    - routing
