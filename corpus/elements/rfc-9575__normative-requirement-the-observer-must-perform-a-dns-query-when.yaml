document: rfc-9575
kind: normative-requirement
summary: The Observer MUST perform a DNS query, when connectivity allows, to obtain a previously unknown Host Identity. If a query cannot be performed, the message SHOULD be cached by the Observer to be validated once the HI is obtained.
section: 3.1.1
rfc2119_level: MUST
topics:
    - dns
    - security
