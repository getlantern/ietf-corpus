document: rfc-3950
kind: normative-requirement
summary: The image/tiff-fx content type MAY be used when black-and-white image data is encoded using TIFF-FX Profiles S or F, however the image/tiff content type SHOULD be used instead.
section: "3"
rfc2119_level: SHOULD
