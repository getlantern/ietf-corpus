document: rfc-4755
kind: normative-requirement
summary: The link MTU MUST be able to support the minimum MTU required by the protocols using the IB connection. The default IPoIB-CM MTU is 2044 octets (2048-octet IPoIB-link MTU minus the 4-octet encapsulation header).
section: "5"
rfc2119_level: MUST
topics:
