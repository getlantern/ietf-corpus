document: rfc-8841
kind: protocol-element
summary: 'The SDP ''sctp-port'' media-level attribute indicates the SCTP port associated with an m= line using UDP/DTLS/SCTP or TCP/DTLS/SCTP. The m= line port field carries the underlying UDP/TCP port, while ''sctp-port'' carries the SCTP port. Syntax: sctp-port-value = 1*5(DIGIT); range 0–65535; leading zeroes MUST NOT be used.'
section: "5"
topics:
    - sctp
    - realtime
