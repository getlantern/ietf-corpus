document: rfc-5958
kind: interoperability-note
summary: PEM-encoded .p8 files use the .pem extension. Encrypted keys are bracketed by '-----BEGIN ENCRYPTED PRIVATE KEY-----' / '-----END ENCRYPTED PRIVATE KEY-----'; unencrypted keys use '-----BEGIN PRIVATE KEY-----' / '-----END PRIVATE KEY-----'. The content is Base64-encoded DER.
