document: rfc-4462
kind: normative-requirement
summary: Either side MUST NOT send or accept Diffie-Hellman values e or f that are not in the range [1, p-1]. If this condition is violated, the key exchange fails.
section: "2.1"
rfc2119_level: MUST NOT
topics:
