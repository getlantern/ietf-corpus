document: rfc-8689
kind: registry
summary: IANA added 'REQUIRETLS' to the 'SMTP Service Extensions' subregistry of the 'Mail Parameters' registry. The EHLO keyword 'REQUIRETLS' has no parameters, no additional SMTP verbs, adds the REQUIRETLS parameter to MAIL, and increments the command length by 11 characters.
