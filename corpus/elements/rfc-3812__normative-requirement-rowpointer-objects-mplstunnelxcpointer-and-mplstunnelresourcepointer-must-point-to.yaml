document: rfc-3812
kind: normative-requirement
summary: RowPointer objects mplsTunnelXCPointer and mplsTunnelResourcePointer MUST point to the first instance of the first accessible columnar object in the target conceptual row. A value of zeroDotZero indicates no LSP (for XCPointer) or best-effort treatment (for ResourcePointer).
section: "10"
rfc2119_level: MUST
