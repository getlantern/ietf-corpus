document: rfc-7542
kind: design-rationale
summary: Decorated NAI routing (using prefix/suffix decorations to specify explicit AAA routing paths) is NOT RECOMMENDED in RADIUS environments because it is fragile, unresponsive to network changes, requires out-of-band updates to millions of edge systems, and creates namespace conflicts between networks. DNS-based realm names already provide a globally unique namespace.
section: 3.3.1
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
