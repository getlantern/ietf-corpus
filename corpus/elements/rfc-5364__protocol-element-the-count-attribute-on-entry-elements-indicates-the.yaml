document: rfc-5364
kind: protocol-element
summary: The 'count' attribute on <entry> elements indicates the number of equal (aggregated) URIs it represents. It is primarily used in recipient-history lists to indicate how many anonymized URIs were collapsed into a single anonymous entry. The default value is '1'.
