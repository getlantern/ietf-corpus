document: rfc-9568
kind: design-rationale
summary: The Skew_Time formula ((256 - Priority) × Active_Adver_Interval / 256) was chosen so that higher-priority Backup Routers have a shorter wait before promoting to Active, ensuring priority-ordered convergence without requiring explicit coordination between Backup Routers during failover.
section: "6.1"
topics:
    - routing
