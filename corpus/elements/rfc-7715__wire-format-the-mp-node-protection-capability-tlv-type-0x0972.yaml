summary: 'The MP Node Protection Capability TLV (Type=0x0972) has U=1, F=0, Length=2, and a 2-octet value field containing: S bit (announce/withdraw), P bit (PLR capable), M bit (MPT capable), with all Reserved bits MUST be zero on transmit and ignored on receipt.'
