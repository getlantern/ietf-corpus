document: rfc-2817
kind: security-consideration
summary: Widespread use of 'http:' URIs for both secure and insecure resources (enabled by this mechanism) means the URI scheme alone no longer signals security properties. The choice of required security characteristics is delegated to client and server policy, such as user preferences or server-side resource access rules.
section: "8.1"
topics:
    - http
    - tls
    - security
