document: rfc-6594
kind: wire-format
summary: 'An SSHFP RR encodes a public key fingerprint using two index octets — one for the public key algorithm (e.g., 1=RSA, 2=DSA, 3=ECDSA) and one for the fingerprint type (1=SHA-1, 2=SHA-256) — followed by the fingerprint value. Example: ''server.example.net IN SSHFP 3 2 ( 821eb6c1... )''.'
