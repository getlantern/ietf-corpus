document: rfc-4790
kind: protocol-element
summary: The equality test MUST be reflexive and symmetric, and for valid input MUST be transitive. It returns 'match', 'no-match', or 'undefined'. If a collation provides substring or ordering, it MUST also provide equality, and those operations MUST be consistent with equality.
section: 4.2.2
