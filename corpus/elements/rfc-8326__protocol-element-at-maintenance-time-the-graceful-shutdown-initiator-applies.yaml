document: rfc-8326
kind: protocol-element
summary: At maintenance time, the graceful shutdown initiator applies an outbound BGP route policy tagging all active advertised paths with GRACEFUL_SHUTDOWN, triggers re-advertisement, applies an inbound policy setting LOCAL_PREF low, waits for convergence on both ASBRs, then shuts the session.
section: "4.2"
topics:
    - bgp
    - routing
