document: rfc-4819
kind: normative-requirement
summary: The server SHOULD respond with SSH_MSG_CHANNEL_FAILURE if the user is not allowed access to the Public Key Subsystem (e.g., authenticated with a restricted public key). Clients SHOULD request and check the reply for the subsystem open request.
section: "3.1"
rfc2119_level: SHOULD
topics:
