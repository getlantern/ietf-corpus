document: rfc-7155
kind: protocol-element
summary: The CHAP-Auth AVP (AVP Code 402, Grouped) carries PPP CHAP authentication data and contains CHAP-Algorithm, CHAP-Ident, and optionally CHAP-Response. If CHAP-Auth is present, the CHAP-Challenge AVP (Code 60) MUST also be present.
