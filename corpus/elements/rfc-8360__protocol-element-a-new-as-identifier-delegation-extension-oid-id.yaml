summary: A new AS identifier delegation extension OID id-pe-autonomousSysIds-v2 (id-pe 29) is defined. Its ASN.1 syntax is identical to RFC 3779's ASIdentifiers but it MUST only be used together with the id-cp-ipAddr-asNumber-v2 certificate policy OID.
