document: rfc-5583
kind: protocol-element
summary: The 'lay' dependency type identifies the described media stream as one or more Media Partitions of a layered Media Bitstream. When 'lay' is used, all media streams required for decoding the Operation Point MUST be identified by identification-tag and fmt-dependency following the 'lay' string.
