summary: 'Four BM subnegotiation subcommands are defined: DEFINE (1) to propose a macro mapping; ACCEPT (2) to confirm a definition; REFUSE (3) to reject a definition with a reason code; LITERAL (4) to treat a macro byte as real data rather than its replacement string.'
