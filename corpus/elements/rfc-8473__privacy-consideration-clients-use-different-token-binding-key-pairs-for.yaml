document: rfc-8473
kind: privacy-consideration
summary: Clients use different Token Binding key pairs for different servers to prevent Token Binding from becoming a cross-site tracking tool. The scope of key pairs MUST be no wider than eTLD+1 for cookie-binding use cases, matching the cookie scoping rules in RFC 6265.
section: "8.1"
topics:
    - privacy
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
