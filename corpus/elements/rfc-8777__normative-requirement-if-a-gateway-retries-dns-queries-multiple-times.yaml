document: rfc-8777
kind: normative-requirement
summary: If a gateway retries DNS queries multiple times, the timeout period SHOULD use random exponential back-off with a recommended initial_timeout of 1 second and maximum_timeout of 120 seconds.
section: "3.5"
rfc2119_level: SHOULD
topics:
    - dns
    - multicast
