document: rfc-2085
kind: state-machine
summary: 'Replay Prevention state: the 64-bit counter starts at 1 and increments per packet. Upon receipt, the replay value is assured to be increasing. An implementation may optionally maintain an out-of-order acceptance window but must ensure no packet is accepted more than once.'
section: "2.1"
topics:
    - ipsec
    - security
