document: rfc-2257
kind: protocol-element
summary: The agentx-Open-PDU (h.type=1) is sent by a subagent to establish a session. It carries o.timeout (subagent-wide default timeout in seconds, 0 means no override), o.id (OID identifying the subagent), and o.descr (DisplayString description). The master assigns the sessionID in the agentx-Response-PDU.
section: 6.2.1
topics:
