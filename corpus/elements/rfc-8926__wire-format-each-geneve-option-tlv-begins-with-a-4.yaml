kind: wire-format
summary: 'Each Geneve option TLV begins with a 4-byte header: Option Class (16 bits, namespace), Type (8 bits, high-order bit is the critical ''C'' flag), three reserved R bits (must be zero), and Length (5 bits, in 4-byte multiples excluding the header, giving a total option size of 4–128 bytes), followed by variable-length option data.'
