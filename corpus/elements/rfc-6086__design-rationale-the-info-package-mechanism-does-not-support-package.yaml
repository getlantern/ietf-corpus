document: rfc-6086
kind: design-rationale
summary: The Info Package mechanism does not support package versioning at the framework level. If versioning is needed, specific Info Package message body payloads must carry version information handled at the application level. This keeps the framework simple while allowing flexibility in individual packages.
section: "10.4"
topics:
    - sip
    - realtime
