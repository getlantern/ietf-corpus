document: rfc-9130
kind: protocol-element
summary: Multi-topology IS-IS (RFC 5120) is supported via a 'topologies' container (feature 'multi-topology') containing a list of topology instances keyed by name, which must reference an existing RIB defined in RFC 8349. Per-topology interface metrics can be configured.
