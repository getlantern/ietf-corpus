document: rfc-3380
kind: wire-format
summary: The 'admin-define' out-of-band attribute value is encoded as 0x17 (per RFC 2910). The value-length MUST be 0 and the value empty. It is returned by the Printer in Get-Printer-Supported-Values responses to indicate that arbitrary 'name' values may be defined for that 'xxx-supported' attribute.
section: 8.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
