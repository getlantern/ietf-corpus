document: rfc-9166
kind: protocol-element
summary: Per-interface statistics are exposed read-only under each snooping instance. IGMP statistics track query, membership-report-v1/v2/v3, leave, and pim-hello counts (received and sent). MLD statistics track query, report-v1/v2, done, and pim-hello counts. A discontinuity-time leaf marks counter resets.
