document: rfc-5844
kind: normative-requirement
summary: When serving a mobile node, the LMA MUST advertise a connected route into the routing infrastructure for the mobile node's IPv4 home address or home subnet so that IPv4 routers treat the LMA as the last-hop router for that subnet.
section: 3.1.3
rfc2119_level: MUST
topics:
    - mobility
    - ip
    - routing
