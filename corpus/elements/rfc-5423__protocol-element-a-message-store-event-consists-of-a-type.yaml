document: rfc-5423
kind: protocol-element
summary: A message store event consists of a type and parameters. The type determines the event category; parameters supply context. Type and parameter names are restricted to US-ASCII printable characters, enabling mapping to arbitrary notification systems, though large or multi-line parameter values must be encodable.
