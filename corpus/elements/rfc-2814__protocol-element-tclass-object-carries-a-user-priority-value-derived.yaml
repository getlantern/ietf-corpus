document: rfc-2814
kind: protocol-element
summary: TCLASS object carries a user_priority value derived from IEEE 802.1p traffic class mappings. DSBMs insert or adjust TCLASS in outgoing PATH messages; senders extract the user_priority from the TCLASS in a received RESV and use it to mark the IEEE 802.1Q extended frame header on admitted data flows.
section: 4.2.2.7
topics:
    - qos
