document: rfc-6763
kind: normative-requirement
summary: When used with Multicast DNS, the target host field of a placeholder flagship SRV record MUST NOT be the empty root label, because Multicast DNS conflict detection requires a real target host name to detect conflicts between different devices.
section: "8"
rfc2119_level: MUST NOT
topics:
