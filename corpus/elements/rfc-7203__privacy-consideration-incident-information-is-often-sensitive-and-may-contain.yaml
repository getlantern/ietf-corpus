document: rfc-7203
kind: privacy-consideration
summary: Incident information is often sensitive and may contain privacy-related data about individuals, organizations, or endpoints. Organizations SHOULD establish policies and legal reviews prior to data exchange, anonymize identifying information where possible, and may use information brokers to further anonymize the source.
section: "6.2"
topics:
