document: rfc-3736
kind: security-consideration
summary: Authenticated DHCP, as described in sections 21 and 22.11 of the DHCP specification (RFC 3315), can be used to avoid attacks mounted through the stateless DHCP service. The Authentication option (RFC 3315 section 21) is available as an optional element for stateless DHCP implementations.
section: "7"
topics:
