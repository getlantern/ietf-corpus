document: rfc-7469
kind: normative-requirement
summary: When the PKP-RO header is used, the UA MUST NOT enforce Pin Validation — it performs the check only to determine whether to POST a report. The UA MUST process the PKP header and SHOULD process both headers when both are present.
section: 2.3.2
rfc2119_level: MUST NOT
topics:
    - http
    - security
