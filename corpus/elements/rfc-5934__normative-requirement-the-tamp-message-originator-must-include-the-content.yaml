document: rfc-5934
kind: normative-requirement
summary: The TAMP message originator MUST include the content-type and message-digest signed attributes in every signed TAMP message. The SignedAttributes SET MUST contain only one instance of any particular attribute; messages violating this rule MUST be rejected as malformed.
section: 2.2.3
rfc2119_level: MUST
topics:
    - security
    - crypto
