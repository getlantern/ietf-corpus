document: rfc-792
kind: security-consideration
summary: ICMP Redirect messages advise hosts to change their routing tables based on gateway instructions; a malicious or misconfigured gateway could redirect traffic inappropriately. RFC 792 does not include authentication for ICMP messages, leaving implementations vulnerable to spoofed redirects and other ICMP-based attacks.
section: Redirect Message
topics:
    - ip
    - security
