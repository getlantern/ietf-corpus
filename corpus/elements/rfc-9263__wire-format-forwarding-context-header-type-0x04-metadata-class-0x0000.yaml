document: rfc-9263
kind: wire-format
summary: Forwarding Context header (Type=0x04, Metadata Class=0x0000) uses a 4-bit Context Type (CT) field to encode VLAN (CT=0x0, 12-bit), QinQ (CT=0x1, 24-bit), MPLS VPN label (CT=0x2, 20-bit), VNI (CT=0x3, 24-bit), or Session ID (CT=0x4, 32-bit). Length is 4 octets for CT 0x0-0x3 and 8 octets for CT=0x4.
section: "4.1"
topics:
    - mpls
