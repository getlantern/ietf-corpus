document: rfc-4880
kind: normative-requirement
summary: An implementation SHOULD ignore any Signature subpacket of a type it does not recognize. If an unrecognized subpacket has the critical bit (bit 7 of type octet) set, the evaluator SHOULD consider the signature to be in error.
section: 5.2.3.1
rfc2119_level: SHOULD
topics:
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
