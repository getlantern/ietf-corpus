document: rfc-1327
kind: normative-requirement
summary: When mapping to X.400, the UTCTime format specifying the timezone offset shall be used. When mapping to RFC 822, the date-time format shall include a numeric timezone offset (e.g., +0000). The timezone shall be preserved as specified; dates shall not be normalized to any other timezone.
section: 3.3.5
rfc2119_level: MUST
topics:
    - email
