document: rfc-4848
kind: wire-format
summary: 'Service parameters follow the ABNF: service-parms = [ [app-service] *('':'' app-protocol)]. Tags are limited to 32 characters, must start with an alphabetic character, and are case-insensitive. The separator '':'' is used instead of ''+'' (used in RFC 3404) because ''+'' is a valid URI scheme character.'
section: "4.5"
topics:
    - dns
