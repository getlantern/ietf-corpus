document: rfc-8231
kind: interoperability-note
summary: Active and passive stateful PCE capabilities MAY be advertised via IGP (bits 11 and 12 of PCE-CAP-FLAGS), but PCEP speakers MUST negotiate stateful PCEP capabilities during PCEP session setup regardless of IGP advertisements. A PCC MAY initiate stateful negotiation even without IGP discovery.
section: "5.5"
topics:
    - mpls
    - routing
