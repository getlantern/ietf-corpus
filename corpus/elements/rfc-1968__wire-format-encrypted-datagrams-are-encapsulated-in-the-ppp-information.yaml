document: rfc-1968
kind: wire-format
summary: Encrypted datagrams are encapsulated in the PPP Information field with PPP Protocol field type hex 0053. On individual links within a multilink bundle where encryption is negotiated, the Protocol field MUST be type hex 0055.
section: "2.1"
