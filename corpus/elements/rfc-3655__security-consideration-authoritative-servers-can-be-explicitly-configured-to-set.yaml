document: rfc-3655
kind: security-consideration
summary: Authoritative servers can be explicitly configured to set the AD bit without performing cryptographic checks; this behavior MUST be off by default and SHOULD only be used on servers acting as both authoritative and recursive name servers.
section: "5"
