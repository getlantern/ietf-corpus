document: rfc-3388
kind: design-rationale
summary: Defining new 'group' semantics beyond LS and FID is explicitly discouraged; implementors are RECOMMENDED to use other session description mechanisms such as SDPng for additional grouping needs. This limits scope creep of the 'group' framework.
