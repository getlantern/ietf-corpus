document: rfc-2492
kind: normative-requirement
summary: When null encapsulation is enabled on PVC links, both ends of the PVC MUST be configured to use null encapsulation; the PVC will not be available for use by protocols other than IPv6.
section: "3.2"
rfc2119_level: MUST
