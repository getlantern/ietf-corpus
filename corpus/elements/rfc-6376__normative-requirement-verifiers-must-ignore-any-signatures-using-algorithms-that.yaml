document: rfc-6376
kind: normative-requirement
summary: Verifiers MUST ignore any signatures using algorithms that they do not implement. Verifiers SHOULD continue checking signatures until one successfully verifies, and MAY limit the total number of signatures they verify.
section: 3.3.4
rfc2119_level: MUST
topics:
