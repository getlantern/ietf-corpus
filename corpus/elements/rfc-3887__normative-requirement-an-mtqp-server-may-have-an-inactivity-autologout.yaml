document: rfc-3887
kind: normative-requirement
summary: An MTQP server MAY have an inactivity autologout timer, which MUST be at least 10 minutes in duration. An MTQP client waiting for a server response MAY have a timer that MUST be at least 2 minutes in duration.
section: "2.5"
rfc2119_level: MUST
topics:
