document: rfc-2605
kind: security-consideration
summary: All MIB objects are read-only (no MAX-ACCESS read-write or read-create). A correct implementation therefore has no risk of an intruder altering or creating management objects via SNMP SET operations.
section: Security Considerations
topics:
