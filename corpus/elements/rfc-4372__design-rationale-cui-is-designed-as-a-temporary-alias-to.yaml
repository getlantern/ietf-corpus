document: rfc-4372
kind: design-rationale
summary: CUI is designed as a temporary alias to the real user identity to satisfy billing and fraud-prevention business requirements of roaming partners while preserving user anonymity. The binding lifetime of the CUI reference should be long enough to be useful (e.g., one billing period) but short enough to prevent long-term user identification.
section: "1"
topics:
    - radius
    - privacy
    - security
