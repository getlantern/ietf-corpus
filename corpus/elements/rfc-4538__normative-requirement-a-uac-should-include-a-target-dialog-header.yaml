document: rfc-4538
kind: normative-requirement
summary: A UAC SHOULD include a Target-Dialog header field in a request sent outside any existing dialog when the UAC believes the request may not be authorized unless it can prove awareness of an existing dialog's identifiers, and the request does not otherwise prove such awareness, and the UAS is known to support Target-Dialog.
section: "3"
rfc2119_level: SHOULD
topics:
    - sip
