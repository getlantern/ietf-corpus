document: rfc-8846
kind: security-consideration
summary: CLUE data model information SHOULD be accessed only by authenticated endpoints; vCard data in <personInfo> mandatorily contains a person's identity and optionally contact addresses, photos, and other personal data, making unauthenticated access a privacy risk. Authentication is not mandated because some sessions may legitimately require no protection.
section: "25"
rfc2119_level: SHOULD
topics:
    - security
    - privacy
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
