document: rfc-1994
kind: state-machine
summary: After Link Establishment, the authenticator sends a Challenge; the peer responds with a Response; the authenticator evaluates and sends Success (advancing to Network-Layer Protocol phase) or Failure (link SHOULD be terminated). During Network-Layer phase, new Challenges MAY be issued at random intervals, restarting the handshake.
section: "2"
topics:
