document: rfc-6731
kind: design-rationale
summary: The option is not enabled by default because DHCP itself cannot determine whether it is operating on a secure channel or whether the client performs DNSSEC validation; enabling without preconditions would allow untrusted networks to redirect DNS resolution silently.
section: "4.5"
topics:
    - dns
    - security
