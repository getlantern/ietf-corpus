document: rfc-7216
kind: normative-requirement
summary: A network that operates NAT SHOULD provide NAPTR records referencing a LIS endpoint with a public address. Networks can also provide a direct route to the LIS to prevent requests from traversing the NAT.
section: "4.8"
rfc2119_level: SHOULD
topics:
    - dns
    - nat
