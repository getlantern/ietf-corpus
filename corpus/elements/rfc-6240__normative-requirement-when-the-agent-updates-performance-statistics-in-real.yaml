document: rfc-6240
kind: normative-requirement
summary: When the agent updates performance statistics in real time, it MUST retroactively reduce ES and SES counts by the SesToUas value and increase UAS count by that value when UAS state is entered (mirroring RFC 3592 behavior).
section: "7"
rfc2119_level: MUST
topics:
    - realtime
    - measurement
