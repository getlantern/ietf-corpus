document: rfc-2743
kind: protocol-element
summary: A GSS-API credential structure may contain multiple credential elements, each containing mechanism-specific information for a particular mech_type, all representing a common entity. Multiple credential elements with overlapping combinations of mechanism, usage mode, and validity period are not permitted within a single credential structure.
section: 1.1.1.1
topics:
    - security
    - crypto
