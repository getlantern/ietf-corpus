document: rfc-1342
kind: normative-requirement
summary: A mail composing program claiming compliance MUST ensure that any string of printable ASCII characters in a message header beginning with '=?' and ending with '?=' is a valid encoded-word, to avoid ambiguous constructs.
section: Conformance
rfc2119_level: MUST
topics:
