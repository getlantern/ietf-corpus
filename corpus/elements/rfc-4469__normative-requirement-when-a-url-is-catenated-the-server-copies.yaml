document: rfc-4469
kind: normative-requirement
summary: When a URL is catenated, the server copies octets unchanged from the indicated message or message part. The server performs no data conversion (e.g., MIME transfer encodings) and no verification that the data is appropriate for the target MIME part.
section: "3"
rfc2119_level: MUST NOT
topics:
    - email
