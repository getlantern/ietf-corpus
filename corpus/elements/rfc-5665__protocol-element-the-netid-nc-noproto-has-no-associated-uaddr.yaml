document: rfc-5665
kind: protocol-element
summary: The netid '-' (NC_NOPROTO) has no associated uaddr format (cross-reference 1 in Table 3 designates 'no address'). It is reserved for internal use in some RFC 1833 implementations and carries no transport or network protocol.
