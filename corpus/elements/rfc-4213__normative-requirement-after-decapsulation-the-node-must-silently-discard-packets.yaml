document: rfc-4213
kind: normative-requirement
summary: After decapsulation, the node MUST silently discard packets with invalid IPv6 source addresses, including all multicast addresses (FF00::/8), the loopback address (::1), IPv4-compatible addresses (::/96 excluding ::/128 for DAD), and IPv4-mapped addresses (::ffff:0:0/96).
section: "3.6"
rfc2119_level: MUST
topics:
    - ip
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
