document: rfc-1519
kind: interoperability-note
summary: When CIDR is extended to class A address space, all routers within the class A domain must run a classless IGP supporting variable-length subnet masks. Using a single fixed subnet mask throughout a sub-allocated class A is likely to require advertising tens of thousands of subnets and is impractical.
section: "6"
topics:
