document: rfc-1752
kind: design-rationale
summary: The Hop-by-Hop Options header is the only extension header that must be examined by every intermediate router; all other extension headers are processed only at the final destination. This design yields a major improvement in router performance for packets containing options compared to IPv4's inline options.
section: "12.2"
topics:
    - ip
