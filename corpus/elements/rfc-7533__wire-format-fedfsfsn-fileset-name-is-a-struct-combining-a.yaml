document: rfc-7533
kind: wire-format
summary: FedFsFsn (Fileset Name) is a struct combining a FedFsUuid (fsnUuid) with a FedFsNsdbName (nsdbName), providing a globally unique, platform-independent fileset identifier. FedFsFsl (Fileset Location) is a union on FedFsFslType; the only defined type, FEDFS_NFS_FSL, contains fslUuid, port, hostname, and a FedFsPathName path.
