document: rfc-7730
kind: protocol-element
summary: 'The TAL (Trust Anchor Locator) is an ordered sequence consisting of: (1) a URI section with one or more rsync URIs each followed by a line break, (2) a CRLF or LF line break, and (3) a subjectPublicKeyInfo in DER format encoded in Base64. Line breaks may be inserted into the Base64-encoded string to avoid long lines.'
section: "2.1"
