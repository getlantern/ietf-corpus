document: rfc-4920
kind: normative-requirement
summary: For LSP recovery downstream of the fault, if the reservation style is Shared Explicit (SE), the detecting LSR MAY choose not to send a PathTear — this leaves downstream LSP state in place to facilitate make-before-break repair. If no PathTear is sent immediately, the unused state will timeout per RFC 2205 rules.
section: "7.2"
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
