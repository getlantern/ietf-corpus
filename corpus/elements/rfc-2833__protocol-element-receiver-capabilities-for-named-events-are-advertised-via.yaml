document: rfc-2833
kind: protocol-element
summary: Receiver capabilities for named events are advertised via the SDP 'fmtp' attribute as a comma-separated list of event values or hyphen-delimited ranges (e.g., 'a=fmtp:100 0-15,66,70'). The MIME parameter equivalent is 'events'. Events 0–15 need not be listed as all implementations must support them.
section: "3.9"
topics:
    - rtp
    - realtime
    - voip
