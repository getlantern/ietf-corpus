document: rfc-1519
kind: interoperability-note
summary: CIDR supernetting is incompatible with older inter-domain protocols such as EGP2 that lack classless network representation. The recommended interoperability strategy is for new routers peering with old routers to advertise a default route rather than exploding supernet information into individual class-based entries.
