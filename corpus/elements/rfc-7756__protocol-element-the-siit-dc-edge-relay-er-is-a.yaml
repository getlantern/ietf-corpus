document: rfc-7756
kind: protocol-element
summary: The SIIT-DC Edge Relay (ER) is a device or logical function that provides 'native' IPv4 connectivity to IPv4-only devices or application software by implementing the Stateless IP/ICMP Translation Algorithm (RFC 6145) with Explicit Address Mapping (EAM) support. It reverses translations made by the Border Relay (BR) for inbound traffic and re-translates IPv4 to IPv6 for outbound traffic. It may be either node-based or network-based.
section: "2"
