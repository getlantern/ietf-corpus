document: rfc-8572
kind: security-consideration
summary: When a device blindly authenticates a bootstrap server (provisional connection), it discloses its IDevID certificate serial number and other identity information to a potentially untrusted server. Operators should be aware that this exposes device inventory data; bootstrap servers are recommended to promote untrusted connections to trusted ones to mitigate this.
section: "9.5"
topics:
    - security
    - privacy
    - netconf
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
