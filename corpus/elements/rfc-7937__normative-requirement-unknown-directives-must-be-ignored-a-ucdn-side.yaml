document: rfc-7937
kind: normative-requirement
summary: Unknown directives MUST be ignored. A uCDN-side implementation MUST ignore a CDNI Logging File that does not comply with the occurrence rules for each directive (e.g., zero or two SHA256-hash directives).
section: "3.3"
rfc2119_level: MUST
