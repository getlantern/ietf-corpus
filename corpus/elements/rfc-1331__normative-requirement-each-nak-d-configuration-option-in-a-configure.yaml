document: rfc-1331
kind: normative-requirement
summary: Each Nak'd Configuration Option in a Configure-Nak MUST be modified to a value acceptable to the sender. Boolean options (no value fields) MUST use Configure-Reject instead. Options MUST NOT be reordered within the Configure-Nak.
section: "6.3"
rfc2119_level: MUST
topics:
    - tcp
    - ip
