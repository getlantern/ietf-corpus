document: rfc-4001
kind: normative-requirement
summary: DNS names MUST be resolved to IP addresses when communication with the named host is required. The DESCRIPTION clause of objects using DNS names SHOULD precisely define how and when name-to-address resolution is done.
section: "4.4"
rfc2119_level: MUST
topics:
    - snmp
    - dns
