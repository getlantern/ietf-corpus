document: rfc-9103
kind: normative-requirement
summary: Implementations SHOULD use the edns-tcp-keepalive EDNS(0) option (RFC 7828) to manage persistent connections for XFR transfers, as this is more flexible than fixed timeouts. Servers that do not support edns-tcp-keepalive allow the client to keep the connection open for a few seconds.
section: "6"
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
