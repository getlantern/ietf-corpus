document: rfc-3518
kind: interoperability-note
summary: By default, PPP Source Route Bridges use the independent-bridge model. To use the split-bridge model, a system MUST successfully negotiate the Bridge-Identification Configuration Option; the Line-Identification option is strongly recommended for the independent-bridge model to verify LAN Segment ID configuration.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
