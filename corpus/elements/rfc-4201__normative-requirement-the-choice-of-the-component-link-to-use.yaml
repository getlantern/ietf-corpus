document: rfc-4201
kind: normative-requirement
summary: The choice of the component link to use for an LSP is always made by the sender of the Path/REQUEST message. For a bidirectional LSP, the sender chooses a component link in each direction.
section: "2.3"
rfc2119_level: MUST
topics:
    - mpls
    - routing
