document: rfc-7529
kind: interoperability-note
summary: The Hebrew calendar as implemented by Unicode ICU uses a 1–13 month numbering scheme where month 6 is the leap month. ICU months 1–5 map to iCalendar months 1–5, ICU month 6 maps to iCalendar '5L', and ICU months 7–13 map to iCalendar months 6–12.
section: "4.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
