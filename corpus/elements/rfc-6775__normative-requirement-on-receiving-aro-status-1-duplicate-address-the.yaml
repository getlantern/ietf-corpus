document: rfc-6775
kind: normative-requirement
summary: On receiving ARO Status=1 (Duplicate Address), the host MUST NOT use the address it tried to register. Any valid registrations with other routers MUST be removed by sending a zero-lifetime ARO to each.
section: 5.5.3
rfc2119_level: MUST NOT
