document: rfc-6440
kind: normative-requirement
summary: A DHCPv6 relay agent that has pre-existing knowledge of the ERP local domain name for a client (e.g., from a prior AAA exchange) SHOULD include it in an instance of the ERP Local Domain Name option forwarded to the DHCPv6 server as a suboption of the Relay-Supplied Options option (RFC 6422).
section: "5"
rfc2119_level: SHOULD
topics:
    - security
    - diameter
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
