document: rfc-6333
kind: normative-requirement
summary: A DS-Lite CPE SHOULD operate its own DHCPv4 server handing out RFC 1918 address space to home hosts, SHOULD advertise itself as the default IPv4 router and as a DNS server (DHCP Option 6), and SHOULD operate a DNS proxy to forward IPv4 DNS requests over IPv6 to service-provider DNS servers.
section: "4.2"
rfc2119_level: SHOULD
topics:
    - nat
    - v6ops
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
