document: rfc-3830
kind: design-rationale
summary: MIKEY was designed for peer-to-peer, simple one-to-many, and small interactive group scenarios (e.g., SIP calls, multicast presentations). Key design goals are end-to-end security, low bandwidth consumption, minimal round trips, small code size, and the ability to tunnel within session establishment protocols such as SDP and RTSP.
section: "2.2"
