document: rfc-3810
kind: normative-requirement
summary: When a packet is received, the ICMPv6 checksum MUST be verified before processing. The checksum covers the entire MLDv2 message plus a pseudo-header of IPv6 header fields; the Checksum field is set to zero for computation.
section: 5.1.2
rfc2119_level: MUST
topics:
    - multicast
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
