document: rfc-2630
kind: normative-requirement
summary: The recipient must not rely on any message digest values computed by the originator; it must independently compute the digest and verify it equals the messageDigest attribute in signedAttributes for the signature to be considered valid.
section: "5.6"
rfc2119_level: MUST NOT
topics:
