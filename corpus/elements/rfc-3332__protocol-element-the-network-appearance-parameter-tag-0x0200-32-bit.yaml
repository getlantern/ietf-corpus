document: rfc-3332
kind: protocol-element
summary: The Network Appearance parameter (Tag 0x0200, 32-bit unsigned integer) identifies the SS7 network context for a message, implicitly specifying the Point Code format, Network Indicator value, and MTP3 variant/version. Its value has local significance only and is coordinated between SGP and ASP; the same SS7 network may map to different Network Appearance values at different SGPs.
section: 3.3.1
topics:
    - realtime
    - voip
