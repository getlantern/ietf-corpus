document: rfc-7899
kind: state-machine
summary: The damping state for an (S,G) transitions from inactive to active when the recomputed figure-of-merit strictly exceeds the cutoff-threshold. When active, the upstream state machine is held in Joined state. The damping state transitions back to inactive when the figure-of-merit decays strictly below the reuse-threshold, at which point the upstream state machine is recomputed from downstream state machines.
section: "5.1"
topics:
    - multicast
    - routing
