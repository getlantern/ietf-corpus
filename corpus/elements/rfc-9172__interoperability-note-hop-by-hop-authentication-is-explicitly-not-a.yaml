document: rfc-9172
kind: interoperability-note
summary: Hop-by-hop authentication is explicitly NOT a supported BPSec security service. The term 'hop-by-hop' is ambiguous in BP overlays since adjacent overlay nodes may not be physically adjacent, and incompatible security capabilities at adjacent nodes make enforcement infeasible.
section: "1.1"
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
