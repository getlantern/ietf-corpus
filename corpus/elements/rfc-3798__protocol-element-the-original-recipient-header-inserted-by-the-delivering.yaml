document: rfc-3798
kind: protocol-element
summary: 'The Original-Recipient header, inserted by the delivering MTA using ORCPT information from the SMTP RCPT TO command, carries the original recipient address so it can be returned in MDNs. Its syntax is: "Original-Recipient" ":" address-type ";" generic-address.'
section: "2.3"
topics:
