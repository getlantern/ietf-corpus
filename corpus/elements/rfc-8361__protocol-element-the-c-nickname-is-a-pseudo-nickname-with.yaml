document: rfc-8361
kind: protocol-element
summary: The C-nickname is a pseudo-nickname with the C flag set in the Nickname Flags APPsub-TLV, assigned to an edge group using centralized replication. Transit RBridges receiving TRILL data packets with a C-nickname as the ingress nickname apply the centralized replication-specific RPF check algorithm instead of the standard one.
section: "11"
topics:
    - routing
