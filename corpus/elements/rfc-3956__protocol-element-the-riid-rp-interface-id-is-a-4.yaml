document: rfc-3956
kind: protocol-element
summary: The RIID (RP Interface ID) is a 4-bit field encoding the last 4 bits of the RP's IPv6 interface identifier. RIID=0 is reserved; valid values are 1–F, providing at most 15 distinct RPs per (scope, network prefix, group ID) combination.
