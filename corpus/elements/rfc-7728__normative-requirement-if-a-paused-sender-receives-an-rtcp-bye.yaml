document: rfc-7728
kind: normative-requirement
summary: If a paused sender receives an RTCP BYE from the receiver that originally caused the stream to pause, the sender SHALL resume the RTP stream. Additionally, receivers observing an RTCP BYE from a paused sender SHALL NOT send further PAUSE or RESUME requests to it.
section: 6.3.1
rfc2119_level: SHALL
topics:
    - rtp
    - realtime
