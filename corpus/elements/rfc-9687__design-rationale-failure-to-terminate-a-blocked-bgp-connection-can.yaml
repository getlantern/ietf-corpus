document: rfc-9687
kind: design-rationale
summary: Failure to terminate a blocked BGP connection can cause the affected speaker to operate with outdated routing information, negatively impacting convergence for an entire autonomous system or group of autonomous systems. This phenomenon is believed to have contributed to IP traffic packet loss events in the global Internet routing system (described as 'BGP zombies').
section: "1"
topics:
    - bgp
    - routing
