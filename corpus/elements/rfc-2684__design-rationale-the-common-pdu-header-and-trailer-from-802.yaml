document: rfc-2684
kind: design-rationale
summary: 'The Common PDU Header and Trailer from 802.6 frames are included in the encapsulation to enable pipelining at egress bridges: the BAsize field allows the egress bridge to begin transmitting the segmented PDU to the 802.6 subnetwork before it has received the entire PDU.'
section: "5.2"
