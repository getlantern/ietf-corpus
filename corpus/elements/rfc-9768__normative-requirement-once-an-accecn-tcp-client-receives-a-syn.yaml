document: rfc-9768
kind: normative-requirement
summary: Once an AccECN TCP Client receives a SYN/ACK confirming AccECN support (one of the four combinations in Table 2), it MUST set both its half-connections into AccECN mode. The Client MUST NOT enter AccECN mode before receiving the first SYN/ACK.
section: 3.1.1
rfc2119_level: MUST
topics:
    - tcp
    - congestion
    - ecn
