document: rfc-6554
kind: security-consideration
summary: To mitigate bandwidth exhaustion attacks (the primary concern that deprecated RH0), RPL routers are required to check for loops in the SRH and drop datagrams containing them. Because the SRH is confined to the RPL routing domain, external attackers cannot exploit it; however, internal attackers remain a threat.
section: "5.1"
topics:
