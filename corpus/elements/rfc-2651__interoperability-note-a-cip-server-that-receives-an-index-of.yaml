document: rfc-2651
kind: interoperability-note
summary: A CIP server that receives an index of an unknown type may pass it forward untouched, or return an error. This behavior exists to allow heterogeneous mesh experiments, though such meshes are considered ill-defined and dangerous.
section: 3.2.2
