document: rfc-5104
kind: design-rationale
summary: TMMBR expresses limits as a (max total media bit rate, per-packet overhead) tuple rather than net media bit rate alone because endpoints observe overhead at different protocol layers. Calculations carried out in terms of packet rate and net media rate have the same value at both sender and receiver, making the algorithm layer-agnostic.
