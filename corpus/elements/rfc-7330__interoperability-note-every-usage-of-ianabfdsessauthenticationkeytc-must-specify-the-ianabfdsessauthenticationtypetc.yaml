document: rfc-7330
kind: interoperability-note
summary: Every usage of IANAbfdSessAuthenticationKeyTC must specify the IANAbfdSessAuthenticationTypeTC object that provides context for interpreting the key, and it is suggested that the type object be logically registered before the key object when they appear in the same logical row.
