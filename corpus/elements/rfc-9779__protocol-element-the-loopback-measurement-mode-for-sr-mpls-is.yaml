document: rfc-9779
kind: protocol-element
summary: The loopback measurement mode for SR-MPLS is implemented by setting the Response flag to 1 and adding a Loopback Request object (Type 3). The label stack carries both forward and reverse path labels; the responder does not punt packets to the control plane but simply returns the query to the querier.
