document: rfc-8234
kind: normative-requirement
summary: When the local SF-P is cleared and local/remote request priorities are re-evaluated, the last received remote message MUST be treated as NR (since it may be invalid due to the previous protection path failure) and only the local request shall be evaluated.
section: "4.3"
rfc2119_level: MUST
topics:
