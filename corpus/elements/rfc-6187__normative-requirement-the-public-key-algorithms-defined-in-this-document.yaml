document: rfc-6187
kind: normative-requirement
summary: The public key algorithms defined in this document SHOULD be accepted anywhere in the SSH protocol suite where public keys are used, including SSH_MSG_USERAUTH_REQUEST (publickey and hostbased), SSH_MSG_KEXDH_REPLY, SSH_MSG_KEXRSA_PUBKEY, SSH_MSG_KEXGSS_HOSTKEY, SSH_MSG_KEX_ECDH_REPLY, and SSH_MSG_KEX_ECMQV_REPLY.
section: "4"
rfc2119_level: SHOULD
topics:
    - pkix
    - security
    - crypto
