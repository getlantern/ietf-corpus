document: rfc-4356
kind: normative-requirement
summary: When converting Internet mail to MMS, 'To:' and 'Cc:' headers MUST be retained. Each recipient in the SMTP envelope (RCPT TO) MUST be considered a recipient; recipients in headers but not the envelope MUST be ignored.
section: 2.1.3.3
rfc2119_level: MUST
topics:
    - email
