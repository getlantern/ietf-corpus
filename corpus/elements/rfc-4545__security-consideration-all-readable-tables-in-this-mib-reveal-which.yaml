document: rfc-4545
kind: security-consideration
summary: All readable tables in this MIB reveal which names, addresses, and credentials are required to access services on the managed system. If credentials such as names or addresses can be easily spoofed, read access must be tightly controlled via SNMP access control.
section: "9.1"
topics:
    - snmp
    - security
