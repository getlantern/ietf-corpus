document: rfc-8154
kind: protocol-element
summary: 'The pnfs_scsi_extent_state4 enumeration defines four extent states: PNFS_SCSI_READ_WRITE_DATA (valid for reading and writing), PNFS_SCSI_READ_DATA (read-only), PNFS_SCSI_INVALID_DATA (allocated but uninitialized; reads return zeros), and PNFS_SCSI_NONE_DATA (hole in the file; invalid location).'
section: "2.4"
