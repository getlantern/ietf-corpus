summary: 'Appendix A documents a real-world routing loop caused by different vendors interpreting the up/down bit in Level 2 LSPs inconsistently: one vendor preferring routes without the up/down bit set (higher preference), another ignoring the bit and selecting by metric, resulting in a forwarding loop between R1 and R2.'
