document: rfc-3861
kind: normative-requirement
summary: For reliable operations, the client MUST be able to try each of the relevant addresses in the list of alternative delivery addresses in order, until a delivery attempt succeeds. The client SHOULD try at least two addresses.
section: "6"
rfc2119_level: MUST
topics:
    - dns
    - realtime
