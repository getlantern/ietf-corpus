document: rfc-7357
kind: protocol-element
summary: ESADI-LSP contents consist of zero or more MAC-Reachability TLVs [RFC6165], an optional Authentication TLV, and exactly one ESADI Parameter APPsub-TLV. Because PDUs use E-L1CS format, Type and Length fields in TLVs are 16-bit. Unknown TLVs and sub-TLVs are ignored.
section: "6"
topics:
