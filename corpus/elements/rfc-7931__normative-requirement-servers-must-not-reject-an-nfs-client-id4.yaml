document: rfc-7931
kind: normative-requirement
summary: Servers MUST NOT reject an nfs_client_id4 simply because the id string does not follow the rules of UTF-8 encoding. Although the id field is often called a string, it is defined by the protocol as opaque data and must be treated as such.
section: 5.2.1
rfc2119_level: MUST NOT
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
