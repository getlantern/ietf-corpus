document: rfc-9326
kind: normative-requirement
summary: An IOAM encapsulating node that supports the DEX Option-Type MUST support the ability to incorporate the DEX Option-Type selectively into a subset of the packets it forwards, to prevent excessive exported data that could overload the network or receiving entity.
section: 3.1.1
rfc2119_level: MUST
topics:
