document: rfc-8599
kind: protocol-element
summary: 'Four new SIP feature-capability indicators are defined: ''sip.pns'' (proxy supports a given PNS type), ''sip.vapid'' (proxy supports VAPID for push authentication), ''sip.pnsreg'' (proxy expects periodic binding-refresh REGISTERs without push, value is minimum lead time in seconds), and ''sip.pnspurr'' (proxy will store PRID keyed by PURR for mid-dialog push).'
section: "8.2"
topics:
    - sip
