document: rfc-5416
kind: protocol-element
summary: The IEEE 802.11 Station Session Key message element (type 1038) delivers pairwise encryption keys from the AC to the WTP. The Flag field's 'A' bit signals initial key delivery prior to key exchange (no pairwise key yet); the 'C' bit signals that the AC will provide all crypto services and the WTP should not apply its own encryption to unicast frames.
section: "6.15"
topics:
    - security
    - crypto
