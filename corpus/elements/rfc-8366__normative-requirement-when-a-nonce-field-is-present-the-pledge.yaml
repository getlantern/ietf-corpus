document: rfc-8366
kind: normative-requirement
summary: When a 'nonce' field is present, the pledge MUST compare it with a value the pledge randomly generated and sent to a bootstrap server earlier. If the values do not match, the pledge MUST NOT process the voucher.
section: "5.3"
rfc2119_level: MUST
topics:
    - security
