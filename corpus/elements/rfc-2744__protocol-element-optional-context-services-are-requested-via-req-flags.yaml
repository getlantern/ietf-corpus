document: rfc-2744
kind: protocol-element
summary: 'Optional context services are requested via req_flags to gss_init_sec_context(): delegation (GSS_C_DELEG_FLAG), mutual authentication (GSS_C_MUTUAL_FLAG), replay detection (GSS_C_REPLAY_FLAG), out-of-sequence detection (GSS_C_SEQUENCE_FLAG), anonymous authentication (GSS_C_ANON_FLAG), and confidentiality via gss_wrap (GSS_C_CONF_FLAG). Actual services provided are reported back in ret_flags.'
section: "4"
topics:
    - security
