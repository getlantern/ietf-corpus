document: rfc-7873
kind: interoperability-note
summary: 'DNS Cookies are designed for incremental deployment: a Cookie-aware server or client interoperates successfully with a non-implementing peer, merely forgoing the security benefit. Servers that do not implement the COOKIE option ignore it and respond normally; Cookie-aware clients and servers gain mutual security benefits only when both sides support it.'
section: "7"
topics:
    - dns
