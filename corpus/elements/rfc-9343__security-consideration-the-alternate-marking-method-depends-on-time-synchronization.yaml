document: rfc-9343
kind: security-consideration
summary: The Alternate-Marking method depends on time synchronization; attacking the time protocol (or GPS clock source) can compromise measurement integrity. RFC 7384 discusses time-protocol threats, and RFC 8915 Network Time Security is recommended as a mitigation.
section: "6"
topics:
