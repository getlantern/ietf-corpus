document: rfc-9684
kind: security-consideration
summary: Requesting a large volume of logs via the log-retrieval RPC could require significant system resources and create a denial of service. Event logs containing hash values (digests) of boot and OS software are sensitive, as passive attackers can use them to identify software versions and launch targeted attacks.
section: "4"
topics:
