document: rfc-3920
kind: normative-requirement
summary: All XML character data within SASL negotiation elements MUST be base64-encoded per RFC 3548 Section 3. A zero-length initial response MUST be transmitted as a single equals sign ('=') to distinguish its presence from absence of data. White space MUST NOT be sent within the stream root element during SASL negotiation.
section: "6.1"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
