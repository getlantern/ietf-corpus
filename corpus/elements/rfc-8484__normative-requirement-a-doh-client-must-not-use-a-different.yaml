document: rfc-8484
kind: normative-requirement
summary: A DoH client MUST NOT use a different URI simply because it was discovered outside of the client's configuration (such as through HTTP/2 server push) or because a server offers an unsolicited response that appears to be a valid answer to a DNS query.
section: "3"
rfc2119_level: MUST NOT
topics:
    - dns
    - http
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
