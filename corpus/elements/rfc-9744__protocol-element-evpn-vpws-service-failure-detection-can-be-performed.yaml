document: rfc-9744
kind: protocol-element
summary: EVPN-VPWS service failure detection can be performed via OAM mechanisms such as BFD for pseudowire VCCV (RFC 5885). Upon such failure detection, the switchover procedure to the backup PE follows the same multi-homing convergence procedures defined in RFC 8214.
section: "5.1"
topics:
    - vpn
    - routing
