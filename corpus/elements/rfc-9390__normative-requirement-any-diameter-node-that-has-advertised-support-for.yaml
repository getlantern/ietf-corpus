document: rfc-9390
kind: normative-requirement
summary: Any Diameter node that has advertised support for session grouping and group operations MUST store and maintain the group assignment as part of each session's state, and MUST keep a record of sessions it has assigned to a session group.
section: "4.2"
rfc2119_level: MUST
topics:
    - diameter
