document: rfc-4211
kind: protocol-element
summary: The certReq regInfo control (id-regInfo-certReq) allows an RA to supply a replacement CertRequest when the RA must modify the certificate template but cannot alter the original without invalidating POP. If present, the original certTemplate in the request MUST be ignored.
section: "7.2"
topics:
    - pkix
