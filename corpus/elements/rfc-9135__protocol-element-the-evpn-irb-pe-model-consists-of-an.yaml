document: rfc-9135
kind: protocol-element
summary: The EVPN IRB PE model consists of an IP-VRF connected to one or more MAC-VRFs via IRB interfaces, where each MAC-VRF contains one or more bridge tables (one per VLAN/BD), and each bridge table is connected to the IP-VRF via a dedicated IRB interface.
