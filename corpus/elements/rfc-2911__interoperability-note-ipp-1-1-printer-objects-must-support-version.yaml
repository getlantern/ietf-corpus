document: rfc-2911
kind: interoperability-note
summary: IPP/1.1 Printer objects MUST support version '1.1' and SHOULD support '1.0'. The Printer returns the highest version it supports that is not greater than the client-requested version. If the requested major version is not supported, the Printer returns 'server-error-version-not-supported' with the closest supported version.
section: 3.1.8
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
