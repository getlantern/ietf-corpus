document: rfc-3230
kind: design-rationale
summary: The term 'instance' is introduced because HTTP/1.1 has no term for 'the value that would be returned in response to a GET at the current time for the selected variant.' The MIME-derived 'entity' concept is a poor fit for HTTP responses that may be partial or delta-encoded.
section: "3"
