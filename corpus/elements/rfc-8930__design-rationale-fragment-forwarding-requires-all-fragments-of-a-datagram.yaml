document: rfc-8930
kind: design-rationale
summary: Fragment forwarding requires all fragments of a datagram to follow the same path as the first fragment because subsequent fragments carry no IP header for routing; this is a fundamental caveat labeled 'No Per-Fragment Routing' that precludes per-fragment multipath.
