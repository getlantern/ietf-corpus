document: rfc-3842
kind: design-rationale
summary: A notifier MAY quarantine NOTIFY requests for a short period when message status is changing rapidly, replacing stale queued notifications with newer ones, to reduce notification volume. This is encouraged for implementations with heavy interactive use.
section: "3.11"
topics:
