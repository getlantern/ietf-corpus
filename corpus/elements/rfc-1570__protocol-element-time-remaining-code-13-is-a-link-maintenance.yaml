document: rfc-1570
kind: protocol-element
summary: Time-Remaining (Code 13) is a Link Maintenance packet for notifying the peer of seconds remaining in the session. It is advisory only, may only be sent in the LCP Opened state, and requires no response. A value of 0xffffffff in the Seconds-Remaining field indicates no timeout.
section: "1.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
