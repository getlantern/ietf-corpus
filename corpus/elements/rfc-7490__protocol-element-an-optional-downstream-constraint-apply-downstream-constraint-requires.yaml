document: rfc-7490
kind: protocol-element
summary: An optional downstream constraint (Apply_Downstream_Constraint) requires that the PQ node be strictly closer to the destination than the repairing node, i.e., D_opt(PQ,dest) < D_opt(self,dest). This prevents loop formation when the failure is worse than expected (e.g., node failure) at the cost of reduced repair coverage.
section: "5.3"
topics:
    - routing
