document: rfc-5568
kind: normative-requirement
summary: An MN returning to the PAR before updating bindings at NAR MUST send an FBU with the Home Address equal to PCoA and Lifetime of zero, causing PAR to terminate the fast-handover tunnel and resume direct delivery.
section: "5.6"
rfc2119_level: MUST
topics:
