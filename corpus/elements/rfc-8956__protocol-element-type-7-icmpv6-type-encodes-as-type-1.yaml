document: rfc-8956
kind: protocol-element
summary: Type 7 (ICMPv6 Type) encodes as type (1 octet) followed by {numeric_op, value} pairs matching the Type field of an ICMPv6 packet. If present, only ICMPv6 packets (upper-layer protocol value 58) can match the entire Flow Specification; the component never matches fragmented non-first fragments.
section: "3.4"
