document: rfc-2058
kind: normative-requirement
summary: If the RADIUS server cannot perform CHAP authentication (e.g., because it does not have the user's cleartext password), it MUST send an Access-Reject to the client. CHAP requires the cleartext password to be available at the server to encrypt the challenge and compare to the response.
section: "2.2"
rfc2119_level: MUST
topics:
    - radius
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
