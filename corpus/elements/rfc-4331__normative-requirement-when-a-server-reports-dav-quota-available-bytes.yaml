document: rfc-4331
kind: normative-requirement
summary: When a server reports DAV:quota-available-bytes and there are multiple overlapping limits, it SHOULD choose among those limits in a repeatable way — either configured per repository or by selecting the smallest value.
section: "3"
rfc2119_level: SHOULD
