document: rfc-5807
kind: protocol-element
summary: The PEMK key name is computed as PEMKname = SHA1(EPID | SID | KID), using SHA-1 as specified in FIPS PUB 180-2. Inclusion of EPID, SID, and KID guarantees uniqueness of PEMK names among multiple PaC-EP pairs under a given PAA.
section: "3.1"
topics:
    - crypto
    - security
