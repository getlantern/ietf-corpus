document: rfc-6266
kind: design-rationale
summary: RFC 2047 encoded-word encoding was rejected for the filename parameter because the RFC 2047 specification explicitly prohibits its use in Content-Disposition parameters, and in practice implementations vary widely between fully implementing it, ignoring it, or displaying the raw encoded string to users.
