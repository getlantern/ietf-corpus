document: rfc-8985
kind: protocol-element
summary: RACK.segment is the segment (among all selectively or cumulatively acknowledged segments) that was sent most recently, including retransmissions. Its transmission timestamp and highest sequence number are tracked in RACK.xmit_ts and RACK.end_seq, and the time it was acknowledged in RACK.ack_ts.
section: "5.1"
