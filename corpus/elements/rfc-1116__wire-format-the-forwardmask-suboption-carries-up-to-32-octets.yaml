document: rfc-1116
kind: wire-format
summary: The FORWARDMASK suboption carries up to 32 octets encoding a bitmask of ASCII character codes 0–255. The high-order bit of mask0 represents ASCII 0; the low-order bit represents ASCII 7; successive octets cover the next 8 codes each. In non-binary mode only the first 16 octets are used. Any octet equal to IAC must be doubled.
section: "2.3"
