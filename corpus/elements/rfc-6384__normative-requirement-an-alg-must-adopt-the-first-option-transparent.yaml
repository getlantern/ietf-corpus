document: rfc-6384
kind: normative-requirement
summary: An ALG MUST adopt the first option (transparent copy) and allow a client and server to negotiate security mechanisms. As soon as the initial AUTH command is issued by the client, an ALG MUST stop translating commands and responses and start transparently copying TCP data.
section: "5"
rfc2119_level: MUST
topics:
    - nat
    - v6ops
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
