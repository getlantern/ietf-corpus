document: rfc-8267
kind: interoperability-note
summary: GSS services increase the size of credential material in RPC headers when Kerberos integrity or privacy is in use, potentially requiring more frequent use of Long messages and increasing chunk list complexity independent of the NFS version 4 COMPOUND being conveyed.
