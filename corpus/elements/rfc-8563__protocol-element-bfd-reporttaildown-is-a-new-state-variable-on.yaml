document: rfc-8563
kind: protocol-element
summary: bfd.ReportTailDown is a new state variable on the head. When set to 1, tails will notify the head via periodic BFD Control packets when they detect session failure. Default value MUST be zero. Only pertinent when bfd.SessionType is MultipointHead or MultipointClient.
section: 6.3.1
topics:
    - routing
    - multicast
