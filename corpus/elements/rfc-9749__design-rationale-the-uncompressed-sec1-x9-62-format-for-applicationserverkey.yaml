document: rfc-9749
kind: design-rationale
summary: The uncompressed SEC1/X9.62 format for applicationServerKey was chosen to ensure direct compatibility with the browser Push API (W3C), so the key can be used without additional transformation. Additionally, X9.62 encoding simplifies key comparisons and is more compact than alternative formats.
