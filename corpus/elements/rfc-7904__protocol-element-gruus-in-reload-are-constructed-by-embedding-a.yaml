document: rfc-7904
kind: protocol-element
summary: GRUUs in RELOAD are constructed by embedding a base64-encoded destination list in the 'gr' URI parameter, using the RFC 4648 Table 1 alphabet with '~' replacing '='. GRUUs do not require storing data in the overlay; the embedded destination list is used directly for routing.
