document: rfc-9588
kind: normative-requirement
summary: The KDC and client MUST NOT reuse scalar values x or y for authentications involving different initial reply keys. If reused, an attacker who observes both exchanges and knows one reply key can conduct an offline dictionary attack on the other.
section: "5"
rfc2119_level: MUST NOT
topics:
    - crypto
    - security
