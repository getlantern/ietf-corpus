document: rfc-5389
kind: normative-requirement
summary: For STUN over TCP/TLS-over-TCP, if no response is received within Ti seconds (SHOULD default to 39.5 s) after the SYN, the transaction times out. A TCP connection failure or reset before a response is received also causes the transaction to fail.
section: 7.2.2
rfc2119_level: SHOULD
topics:
    - nat
    - tcp
