document: rfc-6848
kind: interoperability-note
summary: The XML namespace URI used for extensions is expressed as a URL in DHCP but MUST NOT be dereferenced or treated as a schema source location; it serves only as a unique identifier. Existing implementations conforming to RFC 4776 or RFC 5139 may discard extension elements but are not broken by their presence.
section: "3.1"
topics:
    - registry
