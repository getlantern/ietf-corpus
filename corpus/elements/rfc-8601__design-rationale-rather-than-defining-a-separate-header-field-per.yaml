document: rfc-8601
kind: design-rationale
summary: Rather than defining a separate header field per authentication method (as SPF's Received-SPF and DomainKeys' DomainKey-Status did), this specification consolidates all authentication results into a single extensible header field. This creates a common location and a common framework for current and future methods.
section: "1"
topics:
