document: rfc-3411
kind: registry
summary: IANA maintains a registry of Message Processing Model numbers for use in SNMP. Values 0 (SNMPv1), 1 (SNMPv2c), 2 (SNMPv2u/SNMPv2*), and 3 (SNMPv3) are assigned. Values 0–255 are standards-track; 256–65535 are enterprise-specific.
