document: rfc-6575
kind: normative-requirement
summary: A PE that supports IPv6 on an IP PW MUST signal the Stack Capability Interface Parameter sub-TLV in the initial Label Mapping message. Both PEs compare advertised values and use only capabilities supported by both.
