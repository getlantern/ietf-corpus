document: rfc-7761
kind: state-machine
summary: 'The per-interface (S,G) Assert state machine has three states: NoInfo (NI), I Won Assert (W), and I Lost Assert (L). Transitions are triggered by receiving Assert(S,G) messages, data packets arriving on the interface from a non-RPF direction, and Assert Timer expiry. The loser suppresses forwarding and sends subsequent Joins to the assert winner.'
section: 4.6.1
topics:
    - multicast
    - routing
