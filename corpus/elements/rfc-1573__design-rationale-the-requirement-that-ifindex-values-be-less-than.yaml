document: rfc-1573
kind: design-rationale
summary: The requirement that ifIndex values be less than ifNumber was removed, allowing 'holes' in the ifTable and supporting dynamically added/removed interfaces. The original combined restriction was problematic for devices supporting dynamic SLIP/PPP configuration over character ports.
section: 3.2.1
