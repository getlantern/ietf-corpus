document: rfc-9601
kind: wire-format
summary: The L2TP ECN Capability AVP has Attribute Type 103, is 6 octets in length (before hiding), carries IETF Vendor ID of 0, and is optional (M-bit not set). It may be present in SCCRQ and SCCRP messages. Its presence signals ECN propagation support; its absence signals lack of support.
section: 6.1.1.2.1
topics:
