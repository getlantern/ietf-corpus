document: rfc-3723
kind: normative-requirement
summary: To provide confidentiality with ESP, 3DES in CBC mode MUST be supported and AES in Counter mode (RFC 3686) SHOULD be supported. DES in CBC mode SHOULD NOT be used due to inherent weakness.
section: 2.3.1
rfc2119_level: MUST
topics:
