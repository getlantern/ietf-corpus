document: rfc-9244
kind: protocol-element
summary: The 'vendor-attack-mapping' data (YANG module 'ietf-dots-mapping', path over DOTS data channel) allows DOTS clients to pre-populate an attack taxonomy database mapping vendor-id and attack-id to attack type, description, and aliases. This avoids re-sending verbose attack descriptions during active signal-channel exchanges.
section: 8.1.6
topics:
    - security
    - yang
    - netconf
