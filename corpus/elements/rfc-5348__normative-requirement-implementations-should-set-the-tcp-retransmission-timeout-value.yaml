document: rfc-5348
kind: normative-requirement
summary: Implementations SHOULD set the TCP retransmission timeout value t_RTO = 4*R. Implementations MAY use max(4*R, one second) to match the recommended minimum RTO from RFC 2988.
section: "3.1"
rfc2119_level: SHOULD
topics:
    - congestion
    - tcp
