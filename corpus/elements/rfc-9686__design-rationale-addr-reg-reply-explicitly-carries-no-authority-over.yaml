document: rfc-9686
kind: design-rationale
summary: ADDR-REG-REPLY explicitly carries no authority over address validity because the registration is informational only; requiring a successful reply before using an address would create a hard dependency on DHCPv6 reachability that would break SLAAC semantics.
section: "4.3"
topics:
