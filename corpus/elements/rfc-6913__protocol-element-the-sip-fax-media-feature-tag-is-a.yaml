document: rfc-6913
kind: protocol-element
summary: 'The ''sip.fax'' media feature tag is a new string parameter that allows a call to indicate a fax preference. It has two allowed values: ''t38'' (for ITU-T T.38 fax protocol) and ''passthrough'' (for G.711 codec-based fax transport).'
section: "4"
topics:
