document: rfc-9322
kind: security-consideration
summary: An attacker setting the Active flag on en route packets can cause those packets to be terminated by the decapsulating device, preventing them from reaching their destination. An attacker can also trigger amplification by inducing transit switches to replicate more packets than intended.
section: "8"
topics:
