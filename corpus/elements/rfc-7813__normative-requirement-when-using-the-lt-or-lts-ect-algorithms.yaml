document: rfc-7813
kind: normative-requirement
summary: When using the LT or LTS ECT Algorithms, if equal cost (sub-)paths are found during MRT computation, the tie-breaking specified by Section 11 of RFC 6329 MUST be used, based on the lower BridgeID.
