document: rfc-8046
kind: normative-requirement
summary: Hosts using link-local addresses as source addresses in their HIP handshakes SHOULD provide a globally routable address either in the initial handshake or via the LOCATOR_SET parameter, because link-local addresses may not be reachable by a mobile peer.
section: "3.2"
rfc2119_level: SHOULD
topics:
    - ip
    - mobility
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
