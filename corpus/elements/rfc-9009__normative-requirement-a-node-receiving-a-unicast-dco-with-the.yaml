document: rfc-9009
kind: normative-requirement
summary: A node receiving a unicast DCO with the K flag set SHOULD respond with a DCO-ACK. The DCO-ACK SHOULD be sent as a unicast packet. A sender that sets the K flag but does not receive a DCO-ACK MAY reschedule the DCO, and a node that does not set the K flag SHOULD NOT retry the DCO.
section: 4.3.4
rfc2119_level: SHOULD
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
