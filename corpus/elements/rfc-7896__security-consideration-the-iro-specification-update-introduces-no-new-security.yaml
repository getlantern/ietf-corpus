document: rfc-7896
kind: security-consideration
summary: The IRO specification update introduces no new security considerations beyond those in RFC 5440. Clarification of IRO ordering and L bit handling does not have a negative security impact. PCEP operates over TCP and security analysis for TCP-based routing protocols is covered in RFC 6952.
section: "4"
topics:
    - security
    - routing
