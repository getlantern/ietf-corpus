document: rfc-8227
kind: interoperability-note
summary: In dual-node interconnected rings, both interconnection nodes in the virtual node group MUST be assigned the same LSP label for each traversed LSP, allowing either node to terminate working or protection ring tunnels targeted to the group and stitch service LSPs from source to destination ring.
