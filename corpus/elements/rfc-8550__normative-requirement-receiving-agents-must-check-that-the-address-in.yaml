document: rfc-8550
kind: normative-requirement
summary: Receiving agents MUST check that the address in the From or Sender header of a mail message matches an Internet mail address in the signer's certificate, if mail addresses are present in the certificate. A receiving agent SHOULD provide explicit alternate processing if this comparison fails.
section: "3"
rfc2119_level: MUST
topics:
    - email
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
