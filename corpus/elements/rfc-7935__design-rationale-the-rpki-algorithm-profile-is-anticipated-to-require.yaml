document: rfc-7935
kind: design-rationale
summary: The RPKI algorithm profile is anticipated to require updates over time as cryptographic security requirements evolve; the transition procedures for changing key sizes and algorithms are specified in RFC 6916 (algorithm agility). This document defers future algorithm transitions to that procedure rather than specifying them inline.
section: "5"
topics:
