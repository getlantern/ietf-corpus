document: rfc-9133
kind: interoperability-note
summary: If the DOTS signal and data channels are not established with the same DOTS server in a domain, the request-processing operations described in Section 3.2.1 (ACL lookup, activation-type update, lifetime refresh) are performed using whatever inter-server coordination mechanism the domain employs. RFC 9133 does not specify this coordination mechanism.
section: 3.2.1
topics:
    - security
