document: rfc-3895
kind: normative-requirement
summary: The far end cannot undo loopbacks set by a manager; a manager can undo loopbacks set by the far end. A LineLoopback request from the far end is incremental to an existing InwardLoopback established by a manager; when far-end sends NoLoopback, the InwardLoopback remains.
section: 2.2.5
rfc2119_level: MUST NOT
topics:
    - snmp
