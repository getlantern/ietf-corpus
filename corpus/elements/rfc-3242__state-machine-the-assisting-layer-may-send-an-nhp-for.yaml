document: rfc-3242
kind: state-machine
summary: The assisting layer MAY send an NHP for RTP SN=X only if (a) an NHP was delivered by the LLA compressor AND (b) the decompressor has the means to infer sequencing for SN=X-1 AND has received either a loss indication or the packet itself for SN=X-1. This two-condition gate governs the transition from RHP transmission to header-free operation.
section: 4.1.1
topics:
    - rtp
