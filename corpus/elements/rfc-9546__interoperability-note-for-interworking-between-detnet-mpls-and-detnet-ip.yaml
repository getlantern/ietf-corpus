document: rfc-9546
kind: interoperability-note
summary: For interworking between DetNet MPLS and DetNet IP OAM domains, using the same protocol (e.g., BFD) over both segments simplifies error mapping in the peering model; respective BFD sessions can be in a concatenated relationship per RFC 5880 Section 6.8.17.
section: "4.2"
