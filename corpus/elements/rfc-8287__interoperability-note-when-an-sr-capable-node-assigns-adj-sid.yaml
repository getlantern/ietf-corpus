document: rfc-8287
kind: interoperability-note
summary: When an SR-capable node assigns Adj-SID for a non-SR-capable node, LSP traceroute may fail because the non-SR-capable node is unaware of the 'IGP Adjacency Segment ID' sub-TLV and may not reply with FEC Stack Change sub-TLVs, causing downstream nodes to return code 4.
section: "8"
topics:
    - mpls
    - routing
