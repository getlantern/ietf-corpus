document: rfc-3006
kind: security-consideration
summary: The extensions pose essentially the same security risks as RFC 2210. A sender falsely declaring data to be compressible is equivalent to providing an insufficiently large TSpec; the risk is addressed the same way — flows that exceed their compressed TSpec are policed according to standard intserv rules.
section: "6"
topics:
