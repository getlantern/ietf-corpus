document: rfc-6006
kind: security-consideration
summary: P2MP path computation requests are more CPU-intensive and consume more link bandwidth than P2P, making them a higher-risk target for unauthorized requests and denial-of-service attacks. Implementations MUST conform to RFC 5440 security requirements including TCP security, PCEP authentication, and IP access-list policy controls.
section: "5"
topics:
    - security
    - mpls
    - routing
