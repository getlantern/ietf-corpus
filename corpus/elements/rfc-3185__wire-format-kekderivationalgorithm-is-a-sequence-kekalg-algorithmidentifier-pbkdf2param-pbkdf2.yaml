kind: wire-format
summary: KEKDerivationAlgorithm is a SEQUENCE { kekAlg AlgorithmIdentifier, pbkdf2Param PBKDF2-params }, where PBKDF2-params contains salt (MUST use 'specified' OCTET STRING CHOICE), iterationCount INTEGER, and optional keyLength INTEGER; the prf field MUST be omitted (defaulting to algid-hmacWithSHA1).
