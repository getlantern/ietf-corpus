document: rfc-5132
kind: normative-requirement
summary: For IPv6 SSM address ranges in ipMcastSsmRangeTable, only ranges prefixed by FF3x::/16 are permitted, where 'x' is a valid IPv6 RFC 4291 multicast address scope. The syntax of the address range is given by RFC 3306 Sections 4 and 7.
section: "6"
rfc2119_level: MUST
topics:
    - multicast
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
