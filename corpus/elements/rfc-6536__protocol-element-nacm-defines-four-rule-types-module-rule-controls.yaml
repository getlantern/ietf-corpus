document: rfc-6536
kind: protocol-element
summary: 'NACM defines four rule types: module rule (controls all content in a named YANG module), protocol-operation rule (controls a specific RPC identified by module and name), data-node rule (controls access by XPath instance identifier path), and notification rule (controls a specific notification event type).'
