document: rfc-3461
kind: normative-requirement
summary: A conforming SMTP server MUST NOT refuse a MAIL command based on the presence or absence of valid ENVID or RET parameters, and MUST NOT refuse a RCPT command based on the presence or absence of NOTIFY or ORCPT parameters. Invalid parameter values or duplicate parameters MUST result in a 501 reply.
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - email
