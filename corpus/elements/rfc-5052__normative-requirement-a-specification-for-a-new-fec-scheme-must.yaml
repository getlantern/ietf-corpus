document: rfc-5052
kind: normative-requirement
summary: 'A specification for a new FEC scheme MUST include: the FEC Encoding ID registered with IANA; the type, semantics, and encoding format of one or two FEC Payload IDs; the type and semantics of the FEC OTI; and an encoding format for Common FEC OTI elements used. Fully-Specified schemes MUST additionally provide a full FEC code specification and description of practical encoding/decoding algorithms.'
section: "7"
rfc2119_level: MUST
topics:
    - multicast
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
