document: rfc-2491
kind: normative-requirement
summary: Specific multicast addresses (solicited-node link-local, all-nodes link-local, all-routers link-local, DHCPv6 relay/server) SHALL be sent over the IPv6/NBMA driver's direct pt-pt VC to the MARS, which redistributes them per section 3.1.1. If the MARS VC has been idle-timed out, it MUST be re-established before forwarding.
section: 4.4.2
rfc2119_level: SHALL
topics:
    - ip
    - v6ops
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
