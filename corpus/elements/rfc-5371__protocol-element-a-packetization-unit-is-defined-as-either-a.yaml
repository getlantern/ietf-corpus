document: rfc-5371
kind: protocol-element
summary: A 'packetization unit' is defined as either a JPEG 2000 main header, a tile-part header, or a JPEG 2000 packet. Senders may put an arbitrary number of packetization units into an RTP packet, but codestream order must be preserved.
