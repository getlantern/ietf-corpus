document: rfc-5121
kind: design-rationale
summary: The point-to-point link model for IPv6 over 802.16 is used because each MS is connected to the AR via a unique CID-identified transport connection, making each MS belong to a separate subnet. This model is fully consistent with RFC 4861's definition of a point-to-point link.
section: "6.1"
topics:
    - ip
    - v6ops
