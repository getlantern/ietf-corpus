document: rfc-8613
kind: protocol-element
summary: 'The OSCORE option (CoAP option number 9) is Critical, safe to forward, part of the cache key, and not repeatable. It carries compressed COSE object metadata: OSCORE flag bits, Partial IV, Sender ID (''kid''), and optionally an ID Context (''kid context''). If all flag bits are zero the option value SHALL be empty.'
section: "2"
topics:
