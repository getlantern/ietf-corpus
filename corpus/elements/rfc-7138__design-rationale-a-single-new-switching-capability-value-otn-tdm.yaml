document: rfc-7138
kind: design-rationale
summary: A single new Switching Capability value (OTN-TDM = 110) is used for both fixed and flexible ODUs to avoid proliferating switching type values. The distinction between fixed and variable containers is made inside the SCSI via sub-TLV types (Type 1 vs Type 2), not via separate switching capabilities.
section: "2"
topics:
