document: rfc-2749
kind: design-rationale
summary: PEP caching of COPS decisions for RSVP refreshes (rather than re-querying on each refresh) is justified because valid credentials are already established, RSVP refresh periods are relatively long, and PEP-PDP response times are short — the tradeoff between expedient updates and attack prevention leans toward expediency for refreshes of already-admitted flows.
section: "3.5"
topics:
