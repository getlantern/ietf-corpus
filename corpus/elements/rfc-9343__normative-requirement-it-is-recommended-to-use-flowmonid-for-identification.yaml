document: rfc-9343
kind: normative-requirement
summary: It is RECOMMENDED to use FlowMonID for identification in combination with source and destination addresses. This allows monitoring of 145 concurrent flows per host pair with 1% collision probability (pseudo-random) or 1,048,576 flows with a centralized controller.
