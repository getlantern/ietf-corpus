document: rfc-9960
kind: normative-requirement
summary: 'For simple use cases where the Replication-ID is a 32-bit number (per RFC 9524), the Root MUST be zero (0.0.0.0 for IPv4 and :: for IPv6) and the Instance-ID MUST be zero, effectively mapping to <[0.0.0.0 or ::], Tree-ID, 0, Node-ID>.'
section: "2.3"
rfc2119_level: MUST
topics:
