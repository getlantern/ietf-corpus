document: rfc-2554
kind: security-consideration
summary: Before SASL negotiation begins, all protocol interactions are in the clear and may be modified by an active attacker; therefore clients and servers MUST discard any knowledge obtained prior to the start of SASL negotiation upon completion of a negotiation resulting in a security layer.
section: "9"
