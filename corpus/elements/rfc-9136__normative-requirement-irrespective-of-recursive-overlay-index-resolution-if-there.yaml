document: rfc-9136
kind: normative-requirement
summary: Irrespective of recursive Overlay Index resolution, if there is no IGP or BGP route to the BGP next hop of an RT-5, BGP MUST NOT install the RT-5 even if the Overlay Index can be resolved.
section: "3.2"
rfc2119_level: MUST NOT
topics:
    - routing
    - bgp
