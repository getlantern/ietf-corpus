document: rfc-7078
kind: normative-requirement
summary: 'The client implementation SHOULD provide two choices to the user: (a) replace existing flags and active policy table with DHCPv6-distributed values, or (b) preserve the existing flags and table. Choice (a) SHOULD be the default when no explicit user configuration exists.'
section: "3.1"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
