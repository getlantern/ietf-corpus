document: rfc-9173
kind: design-rationale
summary: 'AES-GCM was chosen for BCB-AES-GCM for four reasons: symmetric keys allow smaller key sizes and work without PKI; GCM produces ciphertext equal in size to plaintext (no padding), simplifying target block replacement; and AES-GCM provides authenticated encryption as required by BPSec.'
section: "4.1"
topics:
