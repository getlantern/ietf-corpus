summary: A new Target FEC Stack sub-TLV (SR MPLS P2MP Policy Tree Instance, Sub-Type 41) was required because existing P2MP RSVP-TE and Multicast LDP identifiers cannot uniquely identify SR P2MP Policy CPs and PTIs; each protocol uses its own identifier scheme.
