document: rfc-9168
kind: interoperability-note
summary: When both BGP (RFC 8955) and PCEP distribute Flow Specifications to the same implementation, the same RFC 8955 precedence ordering MUST be applied regardless of distribution protocol. Implementations MAY provide a configuration control to give one protocol precedence over the other for identical matches with different actions.
section: "8.7"
topics:
    - routing
    - mpls
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
