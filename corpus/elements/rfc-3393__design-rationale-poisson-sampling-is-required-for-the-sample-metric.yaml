document: rfc-3393
kind: design-rationale
summary: Poisson sampling is required for the sample metric to ensure statistically unbiased, uniformly distributed sampling of transmission times across the interval [T0, Tf] and to avoid self-synchronization artifacts. Periodic (constant-bit-rate) sampling is noted as an alternative but risks aliasing.
section: "2.5"
