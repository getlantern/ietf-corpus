document: rfc-6307
kind: normative-requirement
summary: FC links using 64b/66b transmission code (e.g., 10GFC and 16GFC) MUST NOT be attached to an FC PW PE unless their link speed can be negotiated to one that uses 8b/10b encoding. If an invalid 10b code is received, the PE sends an FC PW control frame to report the error.
section: "3"
rfc2119_level: MUST NOT
topics:
    - mpls
