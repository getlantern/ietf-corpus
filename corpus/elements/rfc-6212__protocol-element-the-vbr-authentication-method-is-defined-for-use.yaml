document: rfc-6212
kind: protocol-element
summary: The 'vbr' authentication method is defined for use in Authentication-Results header fields. It reports the outcome of a Vouch By Reference DNS query, including which domain was vouched and which vouching service was queried, using the 'header.md' and 'header.mv' properties.
