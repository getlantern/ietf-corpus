document: rfc-8797
kind: protocol-element
summary: The Send Size and Receive Size fields are each 8 bits and encode inline threshold values from 1024 to 262144 octets. The encoded value equals (actual_bytes / 1024) - 1, representing additional kilo-octets beyond the minimum 1024-octet baseline.
section: "4.2"
