document: rfc-7750
kind: design-rationale
summary: The Session-Reflector in DSCP and ECN Monitoring mode does not analyze or act on the ECN value of received test packets, ignoring congestion indications. This is justified because TWAMP deployment experience has shown sending rates are low enough that ignoring ECN will not significantly contribute to network congestion.
section: 2.2.1
topics:
    - measurement
    - ecn
    - congestion
