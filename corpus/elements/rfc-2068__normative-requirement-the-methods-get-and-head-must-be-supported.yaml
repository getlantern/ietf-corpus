document: rfc-2068
kind: normative-requirement
summary: The methods GET and HEAD MUST be supported by all general-purpose servers. Servers SHOULD return 405 (Method Not Allowed) if a known method is not allowed for the resource, and 501 (Not Implemented) if the method is unrecognized.
section: 5.1.1
rfc2119_level: MUST
topics:
    - http
