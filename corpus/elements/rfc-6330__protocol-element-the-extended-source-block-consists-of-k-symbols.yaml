document: rfc-6330
kind: protocol-element
summary: 'The Extended Source Block consists of K'' symbols: the original K source symbols (ISI 0..K-1), K''-K zero-valued padding symbols (ISI K..K''-1), and repair symbols (ISI K'' onward). Padding symbols are never transmitted; ESIs for repair symbols equal ISI minus (K''-K).'
section: 5.3.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
