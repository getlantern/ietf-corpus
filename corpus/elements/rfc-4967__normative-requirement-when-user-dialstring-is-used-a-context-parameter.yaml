document: rfc-4967
kind: normative-requirement
summary: When 'user=dialstring' is used, a context parameter as defined in RFC 3966 MUST be specified. The context domain does not have to resolve to an actual host but MUST be under the administrative control of the entity managing the local phone context.
section: "4"
rfc2119_level: MUST
topics:
    - sip
    - voip
