document: rfc-3945
kind: normative-requirement
summary: Each node must verify that the Switching Type indicated in the Generalized Label Request is supported on its incoming interface. If not, the node must generate a notification message with a 'Routing problem/Switching Type' indication.
section: "7.2"
rfc2119_level: MUST
