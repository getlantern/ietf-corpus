document: rfc-4268
kind: security-consideration
summary: 'The entStateAdmin object (read-write) is sensitive: setting it to ''locked'' or ''shuttingDown'' can disrupt services ranging from a single port to an entire device. Access must be properly protected, especially in non-secure environments where SET operations lack protection.'
