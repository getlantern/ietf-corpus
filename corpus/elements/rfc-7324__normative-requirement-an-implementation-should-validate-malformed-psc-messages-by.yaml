document: rfc-7324
kind: normative-requirement
summary: An implementation SHOULD validate malformed PSC messages by checking field consistency per RFC 6378 Section 4.2, verifying overall message length equals TLV Length plus 12, and confirming the sum of all TLV lengths matches the TLV Length field.
section: 2.2.1
rfc2119_level: SHOULD
