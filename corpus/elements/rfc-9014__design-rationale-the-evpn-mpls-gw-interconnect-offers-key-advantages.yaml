document: rfc-9014
kind: design-rationale
summary: 'The EVPN-MPLS GW interconnect offers key advantages over ''DCI using ASBRs'': it supports local ACs on GWs, allows different encapsulations in DC and WAN, provides independent multicast trees, enables MPLS label aggregation (one label per GW MAC-VRF instead of per NVE), and localizes intra-DC MAC mobility handling.'
section: 4.4.6
topics:
