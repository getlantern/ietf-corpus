document: rfc-8341
kind: protocol-element
summary: 'NACM defines four rule types: module rules (scope a YANG module by name), protocol-operation rules (match a specific RPC or action by module and name), data-node rules (match a data node and its descendants by XPath path), and notification rules (match a notification event type by module and name).'
