document: rfc-3246
kind: normative-requirement
summary: Packets marked for EF PHB MAY be remarked at a DS domain boundary only to other codepoints that satisfy the EF PHB. Packets marked for EF SHOULD NOT be demoted or promoted to another PHB by a DS domain.
