document: rfc-8191
kind: interoperability-note
summary: In Mobile IPv6 (MIPv6), HNP changes are handled by the Home Agent actively notifying the MN; PMIPv6 lacks this mechanism since binding is MAG-triggered, requiring the new UPN/UPA-based extension described in this document for equivalent functionality.
