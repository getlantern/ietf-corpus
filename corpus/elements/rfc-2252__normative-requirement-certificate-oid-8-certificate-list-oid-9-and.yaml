document: rfc-2252
kind: normative-requirement
summary: Certificate (OID .8), Certificate List (OID .9), and Certificate Pair (OID .10) syntax values MUST only be transferred using binary encoding, by requesting or returning attributes with descriptions such as 'userCertificate;binary'. The RFC 1778 BNF notation for these syntaxes is not recommended.
section: "6.5"
rfc2119_level: MUST
topics:
    - ldap
    - pkix
    - security
