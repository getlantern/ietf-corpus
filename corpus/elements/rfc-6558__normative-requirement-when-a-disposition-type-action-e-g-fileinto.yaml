document: rfc-6558
kind: normative-requirement
summary: When a disposition-type action (e.g., 'fileinto' or 'redirect') is encountered, the implementation MUST perform the action on the message as it stood at that point in script processing, and MUST NOT include subsequent conversions encountered later in the script.
section: "2.1"
rfc2119_level: MUST
topics:
    - email
