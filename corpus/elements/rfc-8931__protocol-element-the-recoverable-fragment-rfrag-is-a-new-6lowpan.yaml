document: rfc-8931
kind: protocol-element
summary: The Recoverable Fragment (RFRAG) is a new 6LoWPAN fragment type that carries a Sequence number (0–31), an Ack-Request ('X') flag, an ECN ('E') flag, a Datagram_Tag (8 bits), a Fragment_Size (10 bits), and a dual-use Fragment_Offset field (16 bits). The first fragment is identified by Sequence=0 and carries the Datagram_Size in the Fragment_Offset field; all subsequent fragments carry the byte offset of the fragment.
section: "5.1"
topics:
    - ip
    - routing
