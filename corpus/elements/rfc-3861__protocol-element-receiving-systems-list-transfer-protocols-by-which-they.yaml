document: rfc-3861
kind: protocol-element
summary: Receiving systems list transfer protocols by which they can be reached (directly or through a translating gateway) using combinations of Service and Protocol labels in SRV records. A separate RR for a gateway must be present for each transfer protocol and domain pair it serves.
