document: rfc-7273
kind: protocol-element
summary: 'The `mediaclk` SDP attribute signals the media clock source for RTP streams, usable at session, media, or source level. The ABNF form is `media-clksrc = "mediaclk:" [media-clkid SP] mediaclock`. Three built-in values are defined: `sender`, `direct`, and `IEEE1722`.'
section: "5.4"
topics:
