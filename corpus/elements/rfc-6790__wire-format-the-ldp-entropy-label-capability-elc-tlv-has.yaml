summary: 'The LDP Entropy Label Capability (ELC) TLV has a 4-byte header: U-bit=1 (ignore if unknown), F-bit=1 (forward even if unknown), Type=0x0206 (16 bits), and Length=0 (16 bits, no value field). It appears as an Optional Parameter of the LDP Label Mapping Message TLV.'
