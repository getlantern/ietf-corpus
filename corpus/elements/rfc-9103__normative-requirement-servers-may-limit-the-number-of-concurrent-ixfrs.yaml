document: rfc-9103
kind: normative-requirement
summary: Servers MAY limit the number of concurrent IXFRs, AXFRs, or total XFR transfers. Servers SHOULD return SERVFAIL when this limit is hit, since it is a transient error and a retry at a later time might succeed.
section: 6.3.3
rfc2119_level: SHOULD
topics:
    - dns
    - tcp
