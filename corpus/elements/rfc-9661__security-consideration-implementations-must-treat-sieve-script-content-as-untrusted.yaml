document: rfc-9661
kind: security-consideration
summary: Implementations MUST treat Sieve script content as untrusted data. Script parsers MUST fail gracefully on syntactically invalid or malicious content and MUST be prepared to handle resource exhaustion (e.g., allocation of enormous strings, lists, or command blocks).
section: "5"
rfc2119_level: MUST
topics:
    - security
    - email
