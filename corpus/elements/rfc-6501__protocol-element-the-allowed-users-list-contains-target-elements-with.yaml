document: rfc-6501
kind: protocol-element
summary: The <allowed-users-list> contains <target> elements with mandatory 'uri' and 'method' attributes. Method values are 'dial-in' (who can join), 'dial-out' (who the focus initiates sessions toward), and 'refer' (who the focus refers to the conference). It also has a <persistent-list> child for storing persistent user profile data.
section: 4.6.3
topics:
    - realtime
    - sip
