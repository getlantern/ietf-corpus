document: rfc-4103
kind: normative-requirement
summary: The default loss-protection method that MUST be used (when no other method is explicitly selected) is redundancy per RFC 2198. When used, the original text and two redundant generations SHOULD be transmitted unless application or network conditions call for other redundancy levels.
section: "4"
rfc2119_level: MUST
topics:
