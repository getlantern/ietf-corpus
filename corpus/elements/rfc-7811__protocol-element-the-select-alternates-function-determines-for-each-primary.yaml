document: rfc-7811
kind: protocol-element
summary: The Select_Alternates function determines for each primary next-hop node F toward destination D whether to use MRT-Blue or MRT-Red as the alternate. It uses the partial-order relationships (higher/lower flags) and topological order of F and D's order_proxy to make this determination, returning USE_BLUE, USE_RED, USE_RED_OR_BLUE, PRIM_NH_IS_D_OR_OP_FOR_D, or PRIM_NH_IN_DIFFERENT_BLOCK.
section: "5.8"
topics:
    - routing
