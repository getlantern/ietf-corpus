document: rfc-5677
kind: security-consideration
summary: The MIH protocol as defined in IEEE 802.21 provides no protocol-level security. It is assumed that lower-layer (e.g., link-layer) security or system-specific proprietary solutions are used. The specification recommends careful analysis before deployment and encourages future standardization work (IEEE 802.21a).
section: "8"
topics:
    - mobility
    - security
