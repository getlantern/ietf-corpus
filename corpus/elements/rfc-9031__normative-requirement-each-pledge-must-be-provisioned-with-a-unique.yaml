document: rfc-9031
kind: normative-requirement
summary: Each pledge MUST be provisioned with a unique PSK that is a cryptographically strong key with at least 128 bits of entropy, indistinguishable from a random uniform string. In the case of recommissioning a device to a new owner, the PSK MUST be changed.
section: "3"
rfc2119_level: MUST
topics:
    - security
    - crypto
