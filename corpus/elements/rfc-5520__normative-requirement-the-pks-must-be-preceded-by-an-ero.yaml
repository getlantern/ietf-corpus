document: rfc-5520
kind: normative-requirement
summary: The PKS MUST be preceded by an ERO subobject that identifies the LSR responsible for expanding the PKS, ensuring (per RFC 3209 ERO processing rules) that the PKS is not encountered until processing reaches the capable LSR.
section: "2.1"
rfc2119_level: MUST
topics:
    - routing
