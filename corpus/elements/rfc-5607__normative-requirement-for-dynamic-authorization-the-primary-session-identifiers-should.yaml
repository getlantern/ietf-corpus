document: rfc-5607
kind: normative-requirement
summary: For Dynamic Authorization, the primary session identifiers SHOULD be User-Name (1) and Service-Type (6). A NAS supporting Dynamic Authorization SHOULD maintain additional internal session identifiers (e.g., Acct-Session-Id, NAS-Port) and SHOULD include them in Access-Request messages.
section: "7"
rfc2119_level: SHOULD
topics:
