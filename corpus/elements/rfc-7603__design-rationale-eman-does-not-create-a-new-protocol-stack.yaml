document: rfc-7603
kind: design-rationale
summary: EMAN does not create a new protocol stack; instead it defines a data and information model for measuring and reporting energy over SNMP. This leverages SNMP's existing, industry-proven discovery, security, and device-control mechanisms across a large range of devices.
