document: rfc-2473
kind: normative-requirement
summary: 'During encapsulation, the original packet header''s hop field must be decremented by one: IPv6 original packet hop limit is decremented by 1, and IPv4 original packet TTL is decremented by 1, before prepending the tunnel IPv6 header.'
