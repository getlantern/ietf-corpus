document: rfc-4572
kind: protocol-element
summary: RFC 4572 defines a new SDP protocol identifier 'TCP/TLS' indicating that the described media will use TLS over TCP. The 'TCP/TLS' identifier describes only the transport, not the upper-layer protocol; an 'm' line using it must further qualify the protocol with a fmt identifier for the application running over TLS.
section: "4"
topics:
    - tls
    - realtime
    - security
