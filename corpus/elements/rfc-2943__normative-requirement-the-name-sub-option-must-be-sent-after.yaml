document: rfc-2943
kind: normative-requirement
summary: The NAME sub-option must be sent after the server sends the list of supported authentication types and before the client finishes the authentication exchange, ensuring the server will not prompt for a user name and password in the clear.
section: "3.1"
rfc2119_level: MUST
topics:
    - security
