document: rfc-4412
kind: interoperability-note
summary: If S/MIME encapsulation is used, the Resource-Priority header MUST also be placed in the outer message if the UAC wants proxy servers to act on it, since proxies need to inspect or modify it. The header is classified as proxy-modifiable and is exempted from S/MIME integrity checking per RFC 3261 Section 23.4.1.1.
section: 4.7.3
topics:
    - sip
    - security
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
