document: rfc-4551
kind: normative-requirement
summary: If the client's cached UIDVALIDITY differs from the server's, the client MUST delete its cached HIGHESTMODSEQ value, as the server is not required to preserve HIGHESTMODSEQ across UIDVALIDITY changes.
