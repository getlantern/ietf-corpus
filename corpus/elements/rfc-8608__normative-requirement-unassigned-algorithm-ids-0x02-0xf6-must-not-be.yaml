document: rfc-8608
kind: normative-requirement
summary: Unassigned algorithm IDs (0x02–0xF6) MUST NOT be used until officially assigned. A router encountering an unassigned algorithm ID in a Signature_Block SHOULD process it as an unsupported algorithm per RFC 8205 Section 5.2.
section: "2.1"
rfc2119_level: MUST NOT
topics:
    - bgp
    - routing
    - registry
