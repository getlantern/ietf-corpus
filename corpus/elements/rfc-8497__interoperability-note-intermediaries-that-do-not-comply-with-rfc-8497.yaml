document: rfc-8497
kind: interoperability-note
summary: Intermediaries that do not comply with RFC 8497 might pass the 'log me' marker unchanged or drop it entirely. This means marking may be absent or inconsistently present on parts of the path, and stateful entities on either side must handle these gaps gracefully.
section: 3.4.3
topics:
    - sip
    - realtime
