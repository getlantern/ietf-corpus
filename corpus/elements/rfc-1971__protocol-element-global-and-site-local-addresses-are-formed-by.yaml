document: rfc-1971
kind: protocol-element
summary: Global and site-local addresses are formed by appending the N-bit interface token to the (128-N)-bit link prefix obtained from a Prefix Information option in a Router Advertisement. The sum of prefix length and interface token length must equal exactly 128 bits.
section: 5.5.3
topics:
