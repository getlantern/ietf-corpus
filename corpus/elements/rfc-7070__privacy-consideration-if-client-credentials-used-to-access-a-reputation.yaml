document: rfc-7070
kind: privacy-consideration
summary: If client credentials used to access a reputation service are compromised, the primary victims are the third parties whose reputation data is improperly revealed — not the client or server. Safeguarding credentials is therefore as important as securing the data itself.
section: "8.5"
topics:
    - privacy
    - security
