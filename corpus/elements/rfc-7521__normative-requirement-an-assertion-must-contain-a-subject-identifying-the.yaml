document: rfc-7521
kind: normative-requirement
summary: An assertion MUST contain a Subject identifying the principal. When the client is acting on behalf of itself, the Subject MUST be the value of the client's 'client_id'.
section: "5.2"
rfc2119_level: MUST
topics:
