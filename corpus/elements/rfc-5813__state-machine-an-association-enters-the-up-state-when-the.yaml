document: rfc-5813
kind: state-machine
summary: An association enters the UP state when the CE sends an Association Setup Response with a successful result; it is added to the MIB at that point. The association leaves UP state (and is immediately removed from the MIB) if no message is received from the FE within a timeout period or an Association Teardown message is sent.
