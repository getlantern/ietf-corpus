document: rfc-5812
kind: state-machine
summary: 'The metadata lifecycle within an LFB defines six per-metadatum operations: IGNORE (forward unchanged), READ (read and forward), READ/RE-WRITE (modify and forward), WRITE (create or overwrite and forward), READ-AND-CONSUME (read and terminate lifecycle), CONSUME (terminate without reading). The last two prevent the metadatum from being forwarded to the next LFB.'
section: 3.2.4.3
topics:
    - routing
