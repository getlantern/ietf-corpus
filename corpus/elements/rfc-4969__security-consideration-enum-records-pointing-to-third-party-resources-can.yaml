document: rfc-4969
kind: security-consideration
summary: ENUM records pointing to third-party resources can be provisioned on purpose by the ENUM domain owner, so any assumption about the association between a number and an entity could be completely bogus unless identity verification is in place.
section: "5.1"
topics:
    - security
    - dns
