document: rfc-5120
kind: design-rationale
summary: MT extensions do not support MT-based partition repair to prevent unnecessary complexity. The overload, partition, and attached bits in the LSP header only reflect the status of the default topology, while per-MT overload/attach bits are carried in the MT TLV.
section: "4"
topics:
    - routing
