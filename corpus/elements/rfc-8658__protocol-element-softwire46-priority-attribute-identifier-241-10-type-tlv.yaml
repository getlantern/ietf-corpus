document: rfc-8658
kind: protocol-element
summary: Softwire46-Priority Attribute (identifier 241.10, type 'tlv') conveys an ordered list of Softwire46 mechanism option codes allowing a CE to prioritize which softwire mechanism to use, corresponding to OPTION_S46_PRIORITY (RFC 8026). Mechanisms are prioritized by appearance order.
