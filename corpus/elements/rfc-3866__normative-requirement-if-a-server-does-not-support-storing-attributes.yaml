document: rfc-3866
kind: normative-requirement
summary: If a server does not support storing attributes with language tag options, then any assertion including a language tag option will not match; a presence assertion evaluates to FALSE and all other assertions to Undefined. No error is returned.
section: "2.2"
rfc2119_level: MUST
topics:
