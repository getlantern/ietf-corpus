document: rfc-2615
kind: design-rationale
summary: Payload scrambling using X^43+1 was added (replacing RFC 1619) because RFC 1619 was operationally found to permit malicious users to generate packets with bit patterns that could create SONET/SDH-layer low-transition-density synchronization problems, emulate the SDH set-reset scrambler pattern, and replicate the STM-N frame alignment word.
section: "6"
topics:
    - security
