kind: protocol-element
summary: 'The puzzle computation for IKE_SA_INIT uses the cookie as the unpredictable string S: find four distinct equal-sized keys Ki such that PRF(Ki, cookie) each has at least ZBC trailing zero bits. Cookie content only (not the Notify header) is used.'
