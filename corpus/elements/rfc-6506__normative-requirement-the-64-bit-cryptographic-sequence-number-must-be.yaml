document: rfc-6506
kind: normative-requirement
summary: The 64-bit Cryptographic Sequence Number MUST be incremented for every OSPFv3 packet sent. Upon reception, the sequence number MUST be greater than the sequence number in the last accepted packet from that neighbor; otherwise the packet MUST be treated as a replay and dropped.
section: "4.1"
rfc2119_level: MUST
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
