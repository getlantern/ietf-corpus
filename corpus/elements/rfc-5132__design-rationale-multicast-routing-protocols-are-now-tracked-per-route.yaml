document: rfc-5132
kind: design-rationale
summary: Multicast routing protocols are now tracked per-route (ipMcastRouteProtocol) rather than per-interface, because multiple multicast routing protocols may operate on a single interface simultaneously. This is a deliberate departure from the RFC 2932 model.
section: "2"
topics:
    - multicast
    - snmp
    - routing
