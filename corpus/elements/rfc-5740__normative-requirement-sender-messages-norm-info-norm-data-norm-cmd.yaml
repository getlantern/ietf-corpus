document: rfc-5740
kind: normative-requirement
summary: Sender messages (NORM_INFO, NORM_DATA, NORM_CMD) SHALL be governed by congestion control for Internet use. In the general Internet, the congestion control policy SHALL be compatible with coexistent TCP flows.
section: "2.1"
rfc2119_level: SHALL
topics:
    - multicast
    - congestion
    - tcp
