document: rfc-5260
kind: normative-requirement
summary: In the restricted ISO 8601 format used for the 'iso8601' date-part, the letters 'T' and 'Z' MUST be in upper case, and a time zone offset of zero MUST be represented by 'Z' and not '+00:00'.
