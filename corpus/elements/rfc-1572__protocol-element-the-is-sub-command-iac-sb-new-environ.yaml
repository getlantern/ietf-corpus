document: rfc-1572
kind: protocol-element
summary: The IS sub-command (IAC SB NEW-ENVIRON IS type...[VALUE...] IAC SE) transmits environment variables in response to SEND. Type/VALUE pairs must be returned in the same order as the SEND request, with a response for each explicitly requested type.
