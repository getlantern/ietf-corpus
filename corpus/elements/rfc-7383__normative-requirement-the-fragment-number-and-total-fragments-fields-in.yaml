document: rfc-7383
kind: normative-requirement
summary: The Fragment Number and Total Fragments fields in the Encrypted Fragment payload MUST NOT be zero, and Fragment Number MUST be less than or equal to Total Fragments. Invalid fragments MUST be silently discarded.
section: "2.6"
rfc2119_level: MUST NOT
