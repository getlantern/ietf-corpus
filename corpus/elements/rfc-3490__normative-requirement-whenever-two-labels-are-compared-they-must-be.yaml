document: rfc-3490
kind: normative-requirement
summary: Whenever two labels are compared, they MUST be considered to match if and only if they are equivalent — their ASCII forms (obtained by applying ToASCII) match using a case-insensitive ASCII comparison. Whenever two names are compared, they MUST be considered to match if and only if their corresponding labels match, regardless of label separator form.
section: "3.1"
rfc2119_level: MUST
topics:
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
