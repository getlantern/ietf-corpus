document: rfc-4643
kind: normative-requirement
summary: When both TLS and SASL security layers are in effect, TLS encoding MUST be applied after SASL encoding (cleartext is SASL-encoded first, then TLS-encoded).
section: 2.4.2
rfc2119_level: MUST
