document: rfc-3393
kind: protocol-element
summary: Type-P-One-way-ipdv-Poisson-stream is a sample metric defined as a sequence of triples (T1, T2, dT), where T1 and T2 are transmission times of the first and second packets of each singleton pair and dT is the ipdv value in seconds or undefined. The stream is generated by a pseudo-random Poisson process with average rate lambda over [T0, Tf].
section: "3.4"
