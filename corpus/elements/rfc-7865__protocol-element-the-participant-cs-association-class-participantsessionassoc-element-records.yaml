document: rfc-7865
kind: protocol-element
summary: The Participant-CS Association class ('participantsessionassoc' element) records the period and capabilities of a participant's association to a CS. Attributes include associate-time, disassociate-time, param (Contact header capabilities per RFC 3840), participant_id, and session_id. A participant may associate/disassociate multiple times within a session.
section: "6.6"
topics:
    - sip
    - realtime
