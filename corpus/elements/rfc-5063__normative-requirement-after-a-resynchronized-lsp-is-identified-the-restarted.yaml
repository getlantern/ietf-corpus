document: rfc-5063
kind: normative-requirement
summary: After a resynchronized LSP is identified, the restarted node MUST send a trigger Path message downstream; the ERO in that Path message SHOULD match the ERO received in the RecoveryPath message to avoid triggering unnecessary reprocessing at downstream nodes.
section: 4.5.2.2
rfc2119_level: MUST
topics:
    - routing
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
