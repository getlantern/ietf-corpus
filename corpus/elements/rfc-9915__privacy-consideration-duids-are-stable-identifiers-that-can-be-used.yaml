document: rfc-9915
kind: privacy-consideration
summary: DUIDs are stable identifiers that can be used to track clients across networks and over time. Clients concerned about privacy may change their DUID as specified in RFC 7844. Parsing a DUID to extract a link-layer address is unreliable and inadvisable due to growing adoption of privacy measures.
section: "23"
topics:
    - ip
    - privacy
