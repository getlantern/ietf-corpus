document: rfc-821
kind: interoperability-note
summary: SMTP is assigned TCP port 25 (octal 31) for the receiver process. The transmission channel is a single full-duplex TCP connection. SMTP data is 7-bit ASCII transmitted right-justified in 8-bit bytes with the high-order bit cleared to zero.
section: Appendix A
topics:
    - email
    - tcp
