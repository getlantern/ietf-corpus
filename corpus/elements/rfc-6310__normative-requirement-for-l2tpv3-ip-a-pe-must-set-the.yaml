document: rfc-6310
kind: normative-requirement
summary: For L2TPv3/IP, a PE MUST set the Active bit in the Circuit Status AVP to clear all faults and MUST clear the Active bit to convey any defect that cannot be explicitly represented with specific Circuit Status flags from RFC 3931 or RFC 5641.
