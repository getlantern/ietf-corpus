document: rfc-4302
kind: normative-requirement
summary: If no valid SA exists for a received packet, the receiver MUST discard the packet. This is an auditable event; the audit log SHOULD include SPI, date/time, Source Address, Destination Address, and (IPv6) Flow ID.
section: 3.4.2
rfc2119_level: MUST
topics:
    - ipsec
    - security
