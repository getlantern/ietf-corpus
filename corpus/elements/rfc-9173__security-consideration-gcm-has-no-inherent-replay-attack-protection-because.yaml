document: rfc-9173
kind: security-consideration
summary: GCM has no inherent replay attack protection; because delay-tolerant networks have a higher occurrence of replay attacks due to store-and-forward behavior, implementors SHOULD detect replay attacks using mechanisms such as those in Appendix D of NIST SP 800-38D.
section: "4.6"
rfc2119_level: SHOULD
