document: rfc-4712
kind: protocol-element
summary: 'The RAQMON-RDS-MIB defines two notification types for the SNMP transport: raqmonDsStaticNotification (sent once per session with session-invariant parameters; MUST include raqmonDsAppName) and raqmonDsDynamicNotification (sent periodically with QoS metrics; MUST include raqmonDsTotalPacketsReceived). A third notification, raqmonDsByeNotification, is equivalent to the NULL PDU.'
section: 2.3.1
topics:
    - snmp
    - realtime
