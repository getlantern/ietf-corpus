document: rfc-1516
kind: normative-requirement
summary: Agents MUST throttle consecutive traps of the same type so there is at least a five-second gap between transmissions. When traps are throttled they are dropped, not queued. This applies independently to rptrHealth, rptrGroupChange, and rptrResetEvent.
section: "3.5"
rfc2119_level: MUST
topics:
    - snmp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
