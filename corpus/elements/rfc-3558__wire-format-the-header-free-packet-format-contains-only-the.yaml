document: rfc-3558
kind: wire-format
summary: The Header-Free packet format contains only the standard RTP header followed by exactly one codec data frame; no payload header fields (LLL, NNN, MMM, Count) or ToC entries are present. The codec rate is inferred from the frame length.
section: "4.2"
