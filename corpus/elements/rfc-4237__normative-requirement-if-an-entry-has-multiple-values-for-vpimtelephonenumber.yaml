document: rfc-4237
kind: normative-requirement
summary: If an entry has multiple values for vPIMTelephoneNumber, those values MUST be distinct from each other in the telephone number portion. Each submailbox of a single telephone number is expected to have its own vPIMUser entry.
section: "2.1"
rfc2119_level: MUST
topics:
