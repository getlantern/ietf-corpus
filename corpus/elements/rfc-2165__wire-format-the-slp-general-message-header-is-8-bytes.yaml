document: rfc-2165
kind: wire-format
summary: 'The SLP general message header is 8 bytes: Version (1), Function (1), Length (2), a flags byte containing O/M/U/A/F bits and reserved bits, Dialect (1), Language Code (2), Character Encoding (2), and XID (2). All SLP messages share this header.'
