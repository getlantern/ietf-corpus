document: rfc-3461
kind: protocol-element
summary: The 'rfc822' address-type is used for Internet email addresses in Original-Recipient and Final-Recipient DSN fields. The 'smtp' diagnostic-type carries SMTP reply codes as Diagnostic-Code values. The 'dns' MTA-name-type carries fully-qualified domain names in Reporting-MTA fields.
