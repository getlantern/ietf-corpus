document: rfc-1812
kind: normative-requirement
summary: Routers MUST implement BGP (Border Gateway Protocol) for inter-AS routing when connecting to the global Internet, and MUST validate BGP UPDATE messages for correctness before installing routes. BGP authentication SHOULD be used.
section: 7.3.2
rfc2119_level: MUST
topics:
    - routing
    - bgp
    - security
