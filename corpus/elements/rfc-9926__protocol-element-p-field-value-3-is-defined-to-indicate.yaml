document: rfc-9926
kind: protocol-element
summary: P-Field value 3 is defined to indicate that the Registered Address represents a unicast prefix rather than a single address. This value completes the 2-bit P-Field originally introduced in RFC 9685, which previously defined values 0 (unicast address), 1 (multicast address), and 2 (anycast address).
section: "7.1"
