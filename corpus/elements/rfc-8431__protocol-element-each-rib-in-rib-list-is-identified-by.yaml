document: rfc-8431
kind: protocol-element
summary: Each RIB in rib-list is identified by a name and has an address-family (IPv4, IPv6, MPLS, or IEEE MAC), an optional ip-rpf-check boolean, a route-list keyed by route-index (uint64), and a nexthop-list keyed by nexthop-member-id (uint32). Multiple RIBs per routing instance are supported.
section: "2.2"
topics:
    - yang
    - routing
    - netconf
