document: rfc-8005
kind: interoperability-note
summary: The HIP RR presentation format uses whitespace as a delimiter between the Public Key and Rendezvous Server fields, and between multiple RVS domain names; this whitespace is NOT part of the wire format and must not be included when encoding the RR on the wire.
