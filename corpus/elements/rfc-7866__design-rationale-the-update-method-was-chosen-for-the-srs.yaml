document: rfc-7866
kind: design-rationale
summary: The UPDATE method was chosen for the SRS to request a metadata snapshot (rather than re-INVITE) because UPDATE can be sent regardless of the state of the SIP dialog. This avoids requiring support for both UPDATE and re-INVITE for this single operation.
section: "9.2"
topics:
    - sip
    - realtime
