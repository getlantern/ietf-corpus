document: rfc-2744
kind: wire-format
summary: gss_OID_desc encodes an ASN.1 object identifier as a void* elements pointer to the BER-encoded value portion (tag and length octets excluded) and an OM_uint32 length giving the byte count. For example, the DASS mechanism OID has length 7 and seven octal-valued bytes.
section: "3.3"
topics:
    - security
