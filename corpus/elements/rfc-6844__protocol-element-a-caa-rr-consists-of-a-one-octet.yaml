document: rfc-6844
kind: protocol-element
summary: A CAA RR consists of a one-octet Flags field and a tag-value pair (property). Multiple CAA RRs MAY be published at a domain name. The Issuer Critical flag (bit 0, MSB) signals that the property tag MUST be understood for correct processing.
