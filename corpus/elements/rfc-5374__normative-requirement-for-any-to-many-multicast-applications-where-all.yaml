document: rfc-5374
kind: normative-requirement
summary: For any-to-many multicast applications where all Group Members may be senders, the group SHOULD share one IPsec SA for all senders, and the IPsec SA SHOULD NOT use the anti-replay protection service because maintaining per-sender anti-replay state does not scale to large groups.
section: A.3
rfc2119_level: SHOULD NOT
topics:
    - ipsec
    - multicast
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
