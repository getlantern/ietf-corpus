document: rfc-7550
kind: interoperability-note
summary: Implementations of DHCPv6 servers have varied on placement of the NoAddrsAvail status code in Advertise messages — some strictly following RFC 3315 (top-level) and others encapsulating it in the IA option as for Reply messages. Clients must tolerate both placements for backward compatibility.
section: "4.1"
topics:
