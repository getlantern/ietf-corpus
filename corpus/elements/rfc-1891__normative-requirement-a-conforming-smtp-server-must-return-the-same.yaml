document: rfc-1891
kind: normative-requirement
summary: A conforming SMTP server MUST return the same reply-code for MAIL commands with valid ENVID/RET parameters as it would without them, and MUST NOT refuse a MAIL command based on the presence or absence of these parameters. The same rule applies to NOTIFY/ORCPT on RCPT commands.
section: "6.1"
rfc2119_level: MUST
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
