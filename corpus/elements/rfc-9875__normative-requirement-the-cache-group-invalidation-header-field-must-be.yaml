document: rfc-9875
kind: normative-requirement
summary: The Cache-Group-Invalidation header field MUST be ignored on responses to requests that have a safe method (e.g., GET). Only unsafe request responses may carry meaningful Cache-Group-Invalidation signals.
section: "3"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
