document: rfc-5541
kind: normative-requirement
summary: If the objective function is supported but policy does not permit applying it and the P bit is set, the PCE MUST send a PCErr with error type 5 (policy-violation) and error value 3 (objective function not allowed).
section: 3.1.1
rfc2119_level: MUST
topics:
