document: rfc-7343
kind: interoperability-note
summary: ORCHIDs are allocated under the IPv6 global unicast address block and are indistinguishable from global unicast addresses by prefix inspection alone. However, they do not conform to the IPv6 global unicast address format (RFC 4291 §2.5.4) because they lack a standard 64-bit Interface ID.
