document: rfc-9266
kind: interoperability-note
summary: The 'tls-unique' channel binding type from RFC 5929 is not defined for TLS 1.3 and greater; 'tls-exporter' is its replacement for these versions. RFC 5929 is updated by this document to add 'tls-exporter' as an additional unique channel binding type.
section: "1"
topics:
    - tls
    - security
