document: rfc-9584
kind: design-rationale
summary: The EVC RTP payload format deliberately shares its basic design with the NAL unit-based formats for H.264 (RFC 6184), SVC (RFC 6190), HEVC (RFC 7798), and VVC (RFC 9328). This is a conscious choice to leverage the wide deployment and community familiarity of RFC 6184, keeping implementation complexity and learning curve low for practitioners who already know those formats.
