document: rfc-8551
kind: protocol-element
summary: The SMIMECapabilities attribute announces an ordered partial list of the sender's supported cryptographic algorithms (signature, symmetric, authenticated symmetric, key encipherment) with OIDs listed by preference within each category. Parameters MUST specify all differentiating information; absent parameters MUST be omitted, not encoded as NULL.
