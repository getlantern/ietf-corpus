document: rfc-3560
kind: design-rationale
summary: 'PKCS #1 Version 1.5 key transport is vulnerable to adaptive chosen ciphertext attacks (the ''Million Message Attack''), requiring hundreds of thousands of oracle queries to exploit. RSAES-OAEP was adopted as an improved cryptographic technique to resolve this vulnerability rather than embedding countermeasures within protocols.'
section: "1"
topics:
    - crypto
    - security
