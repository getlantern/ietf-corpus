document: rfc-9553
kind: normative-requirement
summary: Implementations MUST reject a PatchObject in its entirety if any of its patches are invalid; implementations MUST NOT apply partial patches. A patch pointer MUST NOT use '-' as an array index, and there MUST NOT be two patches where one pointer is a prefix of the other.
section: 1.4.3
rfc2119_level: MUST
topics:
    - json
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
