document: rfc-9559
kind: protocol-element
summary: The SeekHead element (EBML ID 0x114D9B74) contains Seek entries mapping Top-Level Element IDs (SeekID, 4-byte binary) to their Segment Positions (SeekPosition, uinteger). Its use is RECOMMENDED; without it, a parser must scan the entire file to locate Top-Level Elements.
section: 5.1.1
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
