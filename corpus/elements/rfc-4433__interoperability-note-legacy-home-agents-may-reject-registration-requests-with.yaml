document: rfc-4433
kind: interoperability-note
summary: Legacy home agents may reject Registration Requests with the HA field set to ALL-ZERO-ONE-ADDR using error code 136 (non-unicast HA address). Some legacy implementations may coincidentally process such requests correctly, but this cannot be relied upon.
