document: rfc-8537
kind: normative-requirement
summary: In the one-to-one backup method, if the associated bidirectional bypass tunnel is already in use at the upstream PLR, it SHOULD send a Notify message with Error Code 44 and Sub-code 'One-to-One Bypass Already in Use' (value 2) to the downstream PLR.
section: 4.1.5
rfc2119_level: SHOULD
topics:
    - routing
    - mpls
