document: rfc-4467
kind: protocol-element
summary: The RESETKEY command generates a new mailbox access key for a specified mailbox (revoking all existing URLAUTH URLs for that mailbox), or with no arguments removes all mailbox access keys for the user (revoking all URLAUTH URLs). The server returns a URLMECH status response code on success.
section: BASE.6.3.RESETKEY
topics:
    - email
    - security
