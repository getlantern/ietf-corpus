document: rfc-3730
kind: interoperability-note
summary: The specific namespace prefix strings used in EPP (e.g., 'xmlns:foo') are illustrative and not required for interoperability; only the URI values matter. Object mapping documents MUST define specific object schemas and are explicitly outside the scope of the base EPP specification.
section: "2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
