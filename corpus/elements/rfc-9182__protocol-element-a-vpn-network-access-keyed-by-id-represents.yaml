document: rfc-9182
kind: protocol-element
summary: A 'vpn-network-access' (keyed by 'id') represents a PE-side attachment point; 'vpn-network-access-type' may be point-to-point, multipoint, irb (from an L2VPN identified by 'l2vpn-id'), or loopback. It aggregates connection, ip-connection, routing-protocols, oam, security, and service sub-containers.
