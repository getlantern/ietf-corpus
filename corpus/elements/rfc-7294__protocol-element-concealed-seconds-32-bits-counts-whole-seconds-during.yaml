document: rfc-7294
kind: protocol-element
summary: Concealed Seconds (32 bits) counts whole seconds during which any frame loss or discard due to late arrival occurred. The count MUST include the count of Severely Concealed Seconds. Buffer Adjustment-Type concealment SHOULD NOT cause Concealed Seconds to be incremented, except for audible 'emergency' buffer adjustments during talkspurts.
section: "4.2"
topics:
    - rtp
    - realtime
