document: rfc-8601
kind: registry
summary: The 'Email Authentication Result Names' registry records result codes per authentication method. New entries require Expert Review; no two entries may share the same method/code combination. RFC 8601 updates result codes for auth, dkim, iprev, and spf methods and deprecates domainkeys and sender-id entries.
section: "6.6"
topics:
