document: rfc-3971
kind: normative-requirement
summary: The Router Authorization Certificate is an X.509v3 certificate whose IP address delegation extension MUST contain at least one addressesOrRanges element with an IPv6 address prefix (AFI 0002). The IP addresses in each certificate's delegation extension MUST be a subset of those in the issuer's certificate.
section: 6.3.1
rfc2119_level: MUST
topics:
    - security
    - pkix
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
