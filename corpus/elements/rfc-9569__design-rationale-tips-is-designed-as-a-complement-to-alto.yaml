document: rfc-9569
kind: design-rationale
summary: TIPS is designed as a complement to ALTO/SSE, not a replacement. ALTO/SSE optimizes latency by immediately pushing new events, while TIPS optimizes throughput by enabling concurrent, out-of-order transport. ALTO/SSE also lacks naming for individual incremental updates, preventing use of HTTP/2 and HTTP/3 concurrent streams.
section: "1"
topics:
