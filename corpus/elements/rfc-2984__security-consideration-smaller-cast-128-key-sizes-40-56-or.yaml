document: rfc-2984
kind: security-consideration
summary: Smaller CAST-128 key sizes (40, 56, or 64 bits) may be unacceptably weak for some environments. The use of larger key sizes (128 bits) is always RECOMMENDED when laws permit, and the content-encryption key and key-encryption key sizes SHOULD be equal.
