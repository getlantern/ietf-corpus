document: rfc-4443
kind: security-consideration
summary: ICMPv6 messages can be authenticated using the IP Authentication Header (AH) or protected for confidentiality using the Encapsulating Security Payload (ESP). AH protects source and destination addresses; the combination of ICMPv6 checksum and ESP also provides protection against redirection attacks.
section: "5.1"
topics:
    - ip
    - security
    - ipsec
