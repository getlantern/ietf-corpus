document: rfc-7825
kind: state-machine
summary: 'The ICE-RTSP connectivity establishment follows the states: candidate gathering (client, then server after SETUP received), connectivity checks (server initiates per ICE §5.7-5.8; client initiates per ICE §6), nomination, and PLAY. PLAY can only succeed after both sides conclude checks; failures yield 150 (pending) or 480 (failed) responses.'
section: "6"
topics:
