document: rfc-8083
kind: normative-requirement
summary: If the RTP/AVPF or RTP/SAVPF profile is used and T_rr_interval reduces regular RTCP report frequency, the value of Tdr in the CB_INTERVAL expression MUST be replaced by max(T_rr_interval, Tdr).
section: "4.3"
rfc2119_level: MUST
topics:
    - rtp
    - congestion
