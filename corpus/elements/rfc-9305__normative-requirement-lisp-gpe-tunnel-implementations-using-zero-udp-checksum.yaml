document: rfc-9305
kind: normative-requirement
summary: LISP-GPE tunnel implementations using zero UDP checksum over IPv6 MUST use a non-zero UDP checksum as the default configuration, MUST meet RFC 6936 Section 4 requirements, and the ETR SHOULD validate source/destination IPv6 addresses before decapsulation.
section: 4.3.1
rfc2119_level: MUST
topics:
