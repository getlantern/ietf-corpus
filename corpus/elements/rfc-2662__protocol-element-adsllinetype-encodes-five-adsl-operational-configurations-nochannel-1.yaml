document: rfc-2662
kind: protocol-element
summary: 'adslLineType encodes five ADSL operational configurations: noChannel(1), fastOnly(2), interleavedOnly(3), fastOrInterleaved(4) (at most one channel type active at any time, manager-selectable), and fastAndInterleaved(5) (both channels coexist). The physical ifEntry always exists; channel ifEntrys exist only when the corresponding channel type is configured.'
section: "5.2"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
