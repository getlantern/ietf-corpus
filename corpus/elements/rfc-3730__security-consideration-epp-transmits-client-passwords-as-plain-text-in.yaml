document: rfc-3730
kind: security-consideration
summary: EPP transmits client passwords as plain text in the <pw> element of <login>. The specification requires that additional identification and authorization schemes MUST be provided at other protocol layers (e.g., TLS) to provide more robust security; plain-text transmission is modeled on the PLAIN SASL mechanism but EPP omits the session-level authorization identifier.
section: "7"
topics:
    - security
    - tls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
