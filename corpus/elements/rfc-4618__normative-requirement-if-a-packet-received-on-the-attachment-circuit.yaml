document: rfc-4618
kind: normative-requirement
summary: If a packet received on the attachment circuit exceeds the interface MTU subTLV value from RFC4447, it MUST be dropped. It is also RECOMMENDED that PPP devices be configured to not negotiate PPP MRUs larger than the AC MTU.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
