document: rfc-8048
kind: design-rationale
summary: The XMPP <show/> element (qualified by the 'jabber:client' namespace) can be included directly in PIDF XML rather than defining a new PIDF extension, because PIDF is already extensible. Including <show/> in PIDF is RECOMMENDED as the most interoperable way to convey detailed availability states like 'away' and 'dnd'.
section: "6.2"
topics:
    - sip
    - realtime
