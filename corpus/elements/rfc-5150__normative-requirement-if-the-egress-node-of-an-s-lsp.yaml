document: rfc-5150
kind: normative-requirement
summary: If the egress node of an S-LSP recognizes the 'LSP stitching desired' bit and supports stitching, it MUST allocate a non-NULL label for that S-LSP in the corresponding Resv message and MUST set the 'LSP segment stitching ready' bit in the RRO Attributes subobject.
section: 5.1.1
rfc2119_level: MUST
topics:
    - mpls
    - routing
