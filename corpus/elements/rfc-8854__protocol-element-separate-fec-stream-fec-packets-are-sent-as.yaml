document: rfc-8854
kind: protocol-element
summary: 'Separate FEC stream: FEC packets are sent as an independent RTP stream with its own SSRC and payload type, multiplexed with the primary encoding. Can protect multiple primary packets with a single FEC packet but carries full IP/UDP/RTP/FEC header overhead per packet.'
