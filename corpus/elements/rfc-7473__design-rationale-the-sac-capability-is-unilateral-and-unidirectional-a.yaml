document: rfc-7473
kind: design-rationale
summary: 'The SAC capability is unilateral and unidirectional: a receiving LSR is not required to send a similar SAC capability back to the sender. This conforms to the unilateral procedures defined in Section 6 of RFC 5561, keeping the mechanism simple while still achieving the goal of suppressing unwanted state.'
section: "4.2"
topics:
    - routing
    - mpls
