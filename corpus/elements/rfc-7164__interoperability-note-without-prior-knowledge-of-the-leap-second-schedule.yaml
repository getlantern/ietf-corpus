document: rfc-7164
kind: interoperability-note
summary: Without prior knowledge of the leap-second schedule, NTP servers and clients may become offset by exactly one second with respect to their UTC reference, with the discrepancy lasting anywhere from a few seconds to a few days and disrupting NTP-referenced RTP streams.
section: "4"
topics:
