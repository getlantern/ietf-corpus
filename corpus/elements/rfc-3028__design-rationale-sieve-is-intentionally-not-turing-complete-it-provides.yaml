document: rfc-3028
kind: design-rationale
summary: 'Sieve is intentionally not Turing-complete: it provides no variables, loops, or ability to shell out to external programs. This makes it safe to run server-side on systems where users cannot execute arbitrary code, such as black-box IMAP servers, and facilitates GUI-based filter editors.'
