document: rfc-7182
kind: normative-requirement
summary: When calculating the ICV for an ICV Packet TLV, any existing ICV Packet TLVs MUST be removed from the Packet TLV Block before computing, and an empty Packet TLV Block MUST be removed with the phastlv bit cleared; both MUST be restored after computation.
section: "8.1"
rfc2119_level: MUST
topics:
    - security
    - crypto
