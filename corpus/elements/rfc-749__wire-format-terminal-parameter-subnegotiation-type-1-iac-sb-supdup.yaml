document: rfc-749
kind: wire-format
summary: 'Terminal parameter subnegotiation (type 1): IAC SB SUPDUP-OUTPUT 1 byte1 byte2 ... byteN IAC SE. The terminal parameters from RFC 734 are encoded as six-bit values in eight-bit TELNET bytes; the first six bytes specify the count of 36-bit words to follow. May optionally include RFC 747 line speed and graphics parameters.'
