document: rfc-6955
kind: protocol-element
summary: The digest expansion algorithm for Discrete Log Signature iteratively appends HASH(m) to m for n = FLOOR(L/b) iterations (where L is the bit length of q and b is hash output bits), then takes the LEFTMOST(m, L-1) bits, ensuring 0 <= m < q without adding security beyond the underlying hash.
section: "5.1"
