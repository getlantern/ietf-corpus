document: rfc-4006
kind: wire-format
summary: The Credit-Control-Answer (CCA) uses Command-Code 272 with the R bit cleared. Mandatory AVPs include Session-Id, Result-Code, Origin-Host, Origin-Realm, Auth-Application-Id, CC-Request-Type, and CC-Request-Number. Optional AVPs include Granted-Service-Unit, Multiple-Services-Credit-Control, Final-Unit-Indication, and Validity-Time.
section: "3.2"
