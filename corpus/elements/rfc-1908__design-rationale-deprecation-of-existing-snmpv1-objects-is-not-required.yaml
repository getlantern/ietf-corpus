document: rfc-1908
kind: design-rationale
summary: Deprecation of existing SNMPv1 objects is not required during MIB conversion to SNMPv2; only objects whose semantics truly change should be deprecated. This preserves backward compatibility and avoids unnecessary churn in deployed MIBs.
section: "2.1"
