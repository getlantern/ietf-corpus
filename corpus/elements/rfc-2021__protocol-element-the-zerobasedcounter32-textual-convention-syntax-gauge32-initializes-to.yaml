document: rfc-2021
kind: protocol-element
summary: The ZeroBasedCounter32 textual convention (syntax Gauge32) initializes to zero on entry creation and wraps at 2^32. It is used in tables with constantly changing index space and/or TimeFilter indexing, where a management station can treat the initial value as a delta since last poll.
