document: rfc-3165
kind: security-consideration
summary: Running scripts are associated with an owner (smLaunchOwner) that the runtime system uses to enforce security profiles and sandbox permissions. The distinction between smLaunchOwner and smScriptOwner allows scripts owned by one manager to be executed under the identity of another.
section: "10"
topics:
    - snmp
    - security
