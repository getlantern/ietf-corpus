document: rfc-7512
kind: protocol-element
summary: 'The ''pin-source'' query attribute specifies where to find the normal user''s token PIN (URI, pipe command via ''|<absolute-command-path>'', or implementation-specific). The ''pin-value'' attribute provides the PIN directly inline. The ''module-name'' and ''module-path'' attributes modify default PKCS #11 provider settings.'
