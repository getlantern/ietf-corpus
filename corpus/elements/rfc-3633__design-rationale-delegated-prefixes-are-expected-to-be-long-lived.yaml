document: rfc-3633
kind: design-rationale
summary: Delegated prefixes are expected to be long-lived even though the mechanism makes automatic renumbering easier. During renumbering the old and new prefix are expected to co-exist for some time. This design choice reflects that many applications depend on stable addresses.
section: "1"
topics:
