document: rfc-9530
kind: protocol-element
summary: The Content-Digest HTTP field communicates digests of actual message content (Section 6.4 of [HTTP]). It is a Structured Fields Dictionary where each key is a hashing algorithm identifier and each value is a Byte Sequence encoding of the digest output.
