document: rfc-8796
kind: protocol-element
summary: The B-SFRR-Ready Extended ASSOCIATION object is added by the PLR in the RSVP Path message of each protected LSP to record the bypass tunnel assignment, including the Bypass_Group_Identifier and a MESSAGE_ID. The MP acknowledges by echoing the object in the RSVP Resv message, completing the pre-failure handshake required before Summary FRR can be activated.
section: "3.1"
topics:
    - mpls
    - routing
