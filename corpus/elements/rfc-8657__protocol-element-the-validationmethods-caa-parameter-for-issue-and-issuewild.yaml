document: rfc-8657
kind: protocol-element
summary: The "validationmethods" CAA parameter for "issue" and "issuewild" Properties takes a comma-separated string of zero or more validation method labels. A CA MUST only consider the Property to authorize issuance when the validation method in use is identified by one of the listed labels.
