document: rfc-8778
kind: security-consideration
summary: The generation of private keys and hash-based signatures relies on random numbers; use of inadequate PRNGs can result in little or no security. RFC 4086 guidance on randomness requirements is important for both key generation and signature generation.
section: "4"
topics:
    - crypto
    - security
