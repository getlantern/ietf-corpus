document: rfc-1377
kind: normative-requirement
summary: When sending, an implementation MAY insert one to three octets of zero between the PPP header and the OSI NPDU for alignment purposes. On reception, any such leading zero octets MUST be removed.
section: "2.2"
rfc2119_level: MAY
topics:
