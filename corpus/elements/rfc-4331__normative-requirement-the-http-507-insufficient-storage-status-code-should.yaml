document: rfc-4331
kind: normative-requirement
summary: The HTTP 507 (Insufficient Storage) status code SHOULD be used when a client request (PUT, PROPFIND, MKCOL, MOVE, or COPY) fails because it would exceed quota or physical storage limits. The server SHOULD include an XML error body with the appropriate precondition tag.
section: "6"
rfc2119_level: SHOULD
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
