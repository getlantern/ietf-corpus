document: rfc-1253
kind: protocol-element
summary: ospfAreaTable (ospf 2) describes configured OSPF areas, indexed by ospfAreaId (AreaID = IpAddress format). Each entry includes ospfAuthType (none=0, simplePassword=1), ospfImportASExtern, ospfSpfRuns (Dijkstra run counter), ospfAreaBdrRtrCount, ospfASBdrRtrCount, ospfAreaLSACount, and ospfAreaLSACksumSum.
section: "5.2"
topics:
