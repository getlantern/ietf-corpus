document: rfc-3497
kind: wire-format
summary: Line number is encoded in two 10-bit words LN0 and LN1 following EAV. LN0 carries bits L0–L6 of the 11-bit line number; LN1 carries bits L7–L10. Remaining bits are reserved and set to 0.
