document: rfc-5357
kind: interoperability-note
summary: 'TWAMP is derived from OWAMP (RFC 4656) and reuses its connection setup, integrity protection, accept field values, and test packet formats. Key differences are: Request-TW-Session replaces Request-Session; Fetch-Session is absent; the Timeout field has a different meaning; and the Session-Reflector replaces the Session-Receiver. Implementations interoperating with OWAMP must account for these differences.'
section: "3"
topics:
