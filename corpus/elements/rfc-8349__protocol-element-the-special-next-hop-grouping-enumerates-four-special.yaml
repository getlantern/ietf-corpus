summary: 'The ''special-next-hop'' grouping enumerates four special next-hop actions: ''blackhole'' (silently discard), ''unreachable'' (discard with host-unreachable error), ''prohibit'' (discard with administratively-prohibited error), and ''receive'' (deliver to local system).'
