document: rfc-5692
kind: security-consideration
summary: The generic IP over Ethernet network over IEEE 802.16 emulates a standard Ethernet link, so existing IPv4 and IPv6 security mechanisms apply. The public access network can secure upstream isolation between hosts and the AR by adopting SEND (RFC 3971) for neighbor discovery processes.
