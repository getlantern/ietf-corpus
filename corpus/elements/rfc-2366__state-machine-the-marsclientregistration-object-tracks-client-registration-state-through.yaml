summary: 'The marsClientRegistration object tracks client registration state through five values: notRegistered(1), registering(2), registered(3), reRegisteringFault(4) triggered by fault conditions, and reRegisteringRedirMap(5) triggered upon receipt of a MARS_REDIRECT_MAP directing the client to a different MARS.'
