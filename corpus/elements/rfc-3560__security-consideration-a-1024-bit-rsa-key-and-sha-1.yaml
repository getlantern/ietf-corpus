document: rfc-3560
kind: security-consideration
summary: A 1024-bit RSA key and SHA-1 each provide approximately 80 bits of security, which NIST considered adequate until 2015. For higher security, longer RSA keys and hash functions with longer outputs (SHA-256, SHA-384, SHA-512) are needed; the hash value bit length should be at least twice the desired security level in bits.
section: "6"
topics:
    - crypto
    - security
