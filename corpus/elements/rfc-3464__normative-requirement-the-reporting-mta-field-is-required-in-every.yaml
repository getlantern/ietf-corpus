document: rfc-3464
kind: normative-requirement
summary: The Reporting-MTA field is required in every DSN. The Final-Recipient, Action, and Status fields MUST be present for each recipient described in the DSN. These four fields constitute the minimal conforming implementation.
section: "3"
rfc2119_level: MUST
