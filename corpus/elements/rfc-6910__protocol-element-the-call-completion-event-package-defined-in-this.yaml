document: rfc-6910
kind: protocol-element
summary: The 'call-completion' event package defined in this specification allows callers' agents to subscribe to CC status at callee's monitors. Notifications carry an 'application/call-completion' body reporting the CCE's cc-state ('queued' or 'ready'). The default and required MIME type is application/call-completion.
section: "9"
topics:
