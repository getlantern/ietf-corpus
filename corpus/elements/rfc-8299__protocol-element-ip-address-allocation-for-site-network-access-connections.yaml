document: rfc-8299
kind: protocol-element
summary: 'IP address allocation for site-network-access connections supports five methods: `provider-dhcp`, `provider-dhcp-relay`, `static-address` (both IPv4 and IPv6), `slaac` (IPv6 only), and `provider-dhcp-slaac` (IPv6 only). The `slaac` and `provider-dhcp-slaac` options are enforced by YANG `when` statements to apply only to IPv6 contexts.'
section: 6.3.2.2.1
topics:
    - yang
    - vpn
    - ip
