document: rfc-8471
kind: normative-requirement
summary: If the token is bound and a Token Binding has not been established for the client connection, the server MUST reject the token. If the Token Binding ID for the token does not match the Token Binding ID established for the client connection, the server MUST reject the token.
section: "5"
rfc2119_level: MUST
topics:
    - tls
    - security
    - oauth
