document: rfc-1725
kind: state-machine
summary: 'A POP3 session progresses through three states: AUTHORIZATION (client must identify itself), TRANSACTION (client issues commands on maildrop), and UPDATE (server releases resources and deletes marked messages). The session enters TRANSACTION after successful authentication and enters UPDATE only when the client issues QUIT from TRANSACTION state.'
