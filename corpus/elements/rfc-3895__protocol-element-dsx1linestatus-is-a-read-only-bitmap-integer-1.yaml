document: rfc-3895
kind: protocol-element
summary: 'dsx1LineStatus is a read-only bitmap (INTEGER 1..131071) representing simultaneous line alarms and loopback state. Seventeen bit positions are defined: NoAlarm(1), RcvFarEndLOF(2), XmtFarEndLOF(4), RcvAIS(8), XmtAIS(16), LossOfFrame(32), LossOfSignal(64), LoopbackState(128), T16AIS(256), and DS2-specific conditions up to bit 65536.'
