document: rfc-7613
kind: normative-requirement
summary: SASL mechanisms that follow this document's recommendations MUST specify whether and when case mapping is applied to authentication identifiers, and SHOULD delay any case mapping to the last possible moment (e.g., at username lookup or comparison on the server).
section: "3.4"
rfc2119_level: MUST
topics:
    - security
