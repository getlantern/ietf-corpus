document: rfc-8668
kind: wire-format
summary: 'The L2 Bundle Member Adj-SID Sub-TLV (Type 41) wire format: Type (1 octet) = 41, Length (1 octet, variable), Flags (1 octet: F|*|V|L|S|P|rr), Weight (1 octet), followed by one SID/Index/Label field per bundle member — either a 3-octet local label (20 rightmost bits used, V- and L-Flags SET) or a 4-octet index (V- and L-Flags unset).'
section: "4.1"
topics:
    - routing
    - mpls
