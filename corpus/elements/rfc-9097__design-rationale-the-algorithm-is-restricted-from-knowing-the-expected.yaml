document: rfc-9097
kind: design-rationale
summary: The algorithm is restricted from knowing the expected capacity value a priori to ensure fairness and to prevent nefarious operation. A test operator who is certain of the capacity MAY start with a fixed-rate test, but the diagnostic context (subscriber complaint) implies uncertainty, making the load adjustment algorithm RECOMMENDED.
section: "2"
topics:
    - measurement
    - security
