document: rfc-9622
kind: privacy-consideration
summary: Setting the multipath property to Active (Section 6.2.14) or enabling advertisesAltaddr (Section 6.2.15) can result in users being linkable across multiple paths, even if address advertisement is disabled. The API exposes these privacy implications explicitly so applications can make informed choices.
section: 6.2.14
topics:
    - privacy
    - multipath
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
