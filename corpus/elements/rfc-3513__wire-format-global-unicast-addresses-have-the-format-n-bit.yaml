document: rfc-3513
kind: wire-format
summary: 'Global unicast addresses have the format: n-bit global routing prefix | m-bit subnet ID | (128-n-m)-bit interface ID. All global unicast addresses other than those starting with binary 000 have a 64-bit interface ID field (n+m=64) in Modified EUI-64 format.'
