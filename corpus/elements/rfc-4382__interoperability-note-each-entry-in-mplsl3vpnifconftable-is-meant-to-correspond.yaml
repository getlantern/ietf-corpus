document: rfc-4382
kind: interoperability-note
summary: Each entry in mplsL3VpnIfConfTable is meant to correspond to an entry in the Interfaces MIB (RFC 2863). Traffic counters are deliberately absent from this MIB to avoid overlap with IF-MIB counters.
