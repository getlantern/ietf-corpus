document: rfc-7737
kind: normative-requirement
summary: When sending an echo request, the Reply Mode MUST be set to 'Reply via Specified Path'; a Reply Path TLV SHOULD be carried correspondingly. If the Reply Path TLV is absent, it indicates the reverse LSP as the reply path. This updates RFC 7110 Section 5.1.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
