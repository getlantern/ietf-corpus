document: rfc-6125
kind: normative-requirement
summary: When issuing certificates, a certification authority SHOULD include a DNS-ID as a baseline for interoperability. The certificate SHOULD NOT include a CN-ID unless the issuing specification explicitly encourages continued CN-ID support for a given application technology.
section: "4.1"
rfc2119_level: SHOULD
topics:
    - tls
    - pkix
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
