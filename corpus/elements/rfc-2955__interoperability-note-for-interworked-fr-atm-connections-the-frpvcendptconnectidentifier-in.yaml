document: rfc-2955
kind: interoperability-note
summary: For interworked FR/ATM connections, the frPVCEndptConnectIdentifier in the Frame Relay Service MIB is set to zero and frPVCEndptAtmIwfConnIndex is set to the FR/ATM IWF cross-connect index; the Frame Relay cross-connect table (frPVCConnectTable) does not contain an entry for the interworked connection.
section: 3.3.1
topics:
