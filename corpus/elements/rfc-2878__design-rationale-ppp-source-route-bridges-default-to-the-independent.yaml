document: rfc-2878
kind: design-rationale
summary: PPP Source Route Bridges default to the independent-bridge model (where the PPP link is a LAN segment between two bridges) rather than the split-bridge model to ensure interoperability in the absence of option negotiation. The split-bridge model requires explicit negotiation of the Bridge-Identification option.
section: "2.4"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
