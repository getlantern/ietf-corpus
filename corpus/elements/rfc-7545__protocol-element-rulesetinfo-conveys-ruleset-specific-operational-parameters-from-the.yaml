document: rfc-7545
kind: protocol-element
summary: RulesetInfo conveys ruleset-specific operational parameters from the Database to a device, including the rulesetId string, maxLocationChange (meters, threshold triggering a re-query), and maxPollingSecs (time threshold for re-query). These bound how long a device may operate on cached spectrum data.
section: "5.6"
