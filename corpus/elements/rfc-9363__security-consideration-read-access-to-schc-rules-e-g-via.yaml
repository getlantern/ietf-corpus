document: rfc-9363
kind: security-consideration
summary: Read access to SCHC Rules (e.g., via NETCONF get or get-config) must be controlled because an attacker reading the module can infer traffic patterns, application addresses, and REST API structure of constrained devices. Access control on readable data nodes is therefore important.
section: "8"
topics:
    - security
    - netconf
    - privacy
