document: rfc-7171
kind: normative-requirement
summary: The NEA Server MUST set the Version field in the Start message to the maximum PT-EAP version it supports and is willing to accept. Version 0 is reserved and MUST never be sent.
section: "3.2"
rfc2119_level: MUST
