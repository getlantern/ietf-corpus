document: rfc-9209
kind: protocol-element
summary: The 'proxy_loop_detected' proxy error type (recommended HTTP 502) indicates the intermediary tried to forward the request to itself or detected a loop via other means (e.g., RFC 8586). It is exclusively generated by intermediaries.
