document: rfc-822
kind: protocol-element
summary: The Resent- prefix on field names (e.g., Resent-From, Resent-To, Resent-Date) indicates forwarded mail. Resent- fields carry the same semantics as their un-prefixed equivalents but represent the forwarder's information and take precedence over the original fields.
section: "4.2"
topics:
    - email
