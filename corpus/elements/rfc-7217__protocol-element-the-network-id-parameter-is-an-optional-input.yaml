document: rfc-7217
kind: protocol-element
summary: The Network_ID parameter is an OPTIONAL input to F() that identifies the specific subnet (e.g., IEEE 802.11 SSID). Including it causes the algorithm to produce a different Interface Identifier even for the same prefix when connecting to different networks, such as different link-local or ULA deployments.
