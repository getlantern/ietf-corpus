document: rfc-5592
kind: interoperability-note
summary: Because naming policies may differ between administrative domains, the SnmpSSHAddress 'user@hostname:port' syntax allows operators to align non-equivalent account names. If no 'user@' prefix is specified, the tmSecurityName is used as the SSH user name. For GSSAPI authentication, a mapping algorithm may be required to transform between SSH identity and tmSecurityName.
section: 3.1.4
topics:
    - snmp
