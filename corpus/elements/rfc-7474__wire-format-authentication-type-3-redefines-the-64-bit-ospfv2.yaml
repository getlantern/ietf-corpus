document: rfc-7474
kind: wire-format
summary: 'Authentication Type 3 redefines the 64-bit OSPFv2 header authentication field: a 24-bit zero field, an 8-bit Auth Data Length, and a 32-bit Key ID (expanded from 16 bits). The 64-bit sequence number (32-bit boot count followed by 32-bit packet counter) is placed in the 8 octets immediately following the OSPFv2 packet, protected by the authentication digest but excluded from the OSPF packet header length field.'
section: "3"
topics:
