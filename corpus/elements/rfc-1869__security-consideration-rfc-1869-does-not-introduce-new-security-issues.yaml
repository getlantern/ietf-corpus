document: rfc-1869
kind: security-consideration
summary: RFC 1869 does not introduce new security issues beyond those already endemic in electronic mail and RFC 821. The EHLO response does announce server capabilities, but all such information can be deduced by selectively probing mandatory SMTP verbs. Security implications of individual extensions should be addressed in their defining RFCs.
section: "9"
topics:
    - email
    - security
