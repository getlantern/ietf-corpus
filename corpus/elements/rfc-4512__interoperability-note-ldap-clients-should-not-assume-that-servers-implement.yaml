document: rfc-4512
kind: interoperability-note
summary: LDAP clients SHOULD NOT assume that servers implement any aspects of X.500 subschema beyond those described in RFC 4512. Servers following X.500(93) models SHOULD use X.500 subentry mechanisms, but other servers may use ordinary object entries belonging to the 'subschema' auxiliary class.
section: "4.2"
topics:
    - ldap
