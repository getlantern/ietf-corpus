document: rfc-7950
kind: normative-requirement
summary: A NETCONF server MUST announce the modules it implements by implementing 'ietf-yang-library' (RFC 7895) and listing all implemented modules in the '/modules-state/module' list, replacing the YANG 1 capability-advertisement approach.
section: 5.6.4
rfc2119_level: MUST
topics:
    - yang
    - netconf
