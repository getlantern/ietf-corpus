document: rfc-2684
kind: normative-requirement
summary: An ATM bridge interface MUST be able to flood, forward, and filter bridged PDUs. To support dynamic MAC learning, bridged PDUs sent through the ATM network MUST conform to the LLC encapsulation format in section 5.
section: "7"
rfc2119_level: MUST
