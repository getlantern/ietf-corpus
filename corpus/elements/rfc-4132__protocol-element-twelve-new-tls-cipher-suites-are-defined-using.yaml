summary: Twelve new TLS cipher suites are defined using Camellia in CBC mode, split between 128-bit and 256-bit key variants. The 128-bit suites occupy code points 0x00,0x41–0x00,0x46 and the 256-bit suites occupy 0x00,0x84–0x00,0x89.
