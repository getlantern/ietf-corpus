document: rfc-8500
kind: normative-requirement
summary: For LDP/IGP synchronization on LANs, a new node SHOULD advertise the maximum metric offset value in the Reverse Metric TLV in its IIH PDUs until all LDP label binding exchanges complete or the provisioned timeout is exceeded.
section: "3.4"
rfc2119_level: SHOULD
