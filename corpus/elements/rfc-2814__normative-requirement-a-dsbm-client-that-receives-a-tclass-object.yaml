document: rfc-2814
kind: normative-requirement
summary: A DSBM client that receives a TCLASS object in a RESV message after successful local admission control MUST pass the user_priority value to its local packet classifier so that subsequent data packets in the admitted flow are marked with the correct IEEE 802 frame header value.
section: 4.2.2.8
rfc2119_level: MUST
topics:
    - qos
