document: rfc-4194
kind: interoperability-note
summary: A parser reading an SHF file SHOULD silently ignore any alien characters (non-hex, non-whitespace) that appear in block data or numeric attribute values, treating them as if they did not exist. Malformed blocks (e.g., odd number of hex digits) should be ignored by implementations.
section: "6"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
