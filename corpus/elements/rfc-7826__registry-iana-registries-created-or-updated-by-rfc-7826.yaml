summary: 'IANA registries created or updated by RFC 7826 include: RTSP Feature Tags, RTSP Methods, RTSP Status Codes, RTSP Headers, Accept-Credentials Policies and Hash Algorithms, Cache-Control Cache Directive Extensions, Media Properties, Notify-Reason Values, Range Header Formats, Terminate-Reason Header parameters, RTP-Info Header Parameters, Seek-Style Policies, Transport Protocol Identifiers/Modes/Parameters, URI schemes (rtsp, rtsps, rtspu), SDP attributes, and the text/parameters media type.'
