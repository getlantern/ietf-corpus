document: rfc-9103
kind: normative-requirement
summary: If an OPT record is present in a received AXFR request, compliant responders MUST include an OPT record in each subsequent AXFR response. This enables servers to signal a desire to close a connection via edns-tcp-keepalive with a timeout of 0.
section: 6.3.4
rfc2119_level: MUST
topics:
    - dns
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
