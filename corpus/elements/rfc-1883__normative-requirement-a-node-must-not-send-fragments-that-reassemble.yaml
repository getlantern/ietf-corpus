document: rfc-1883
kind: normative-requirement
summary: A node must not send fragments that reassemble to a size greater than 1500 octets unless it has explicit knowledge that the destination(s) can reassemble a packet of that size. A node must be able to accept a fragmented packet that, after reassembly, is as large as 1500 octets including the IPv6 header.
section: "5"
rfc2119_level: MUST NOT
topics:
    - ip
