document: rfc-5674
kind: interoperability-note
summary: For SNMP resources, the 'resourceURI' value must use RFC 4088 URI syntax and must point to the same resource as alarmActiveResourceId (RFC 3877), enabling correlation between syslog alarms and SNMP alarms.
