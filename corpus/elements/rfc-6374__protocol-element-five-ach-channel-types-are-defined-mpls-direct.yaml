document: rfc-6374
kind: protocol-element
summary: 'Five ACH Channel Types are defined: MPLS Direct Loss Measurement (DLM), MPLS Inferred Loss Measurement (ILM), MPLS Delay Measurement (DM), MPLS Direct Loss and Delay Measurement (DLM+DM), and MPLS Inferred Loss and Delay Measurement (ILM+DM). For all these types, the ACH SHALL NOT be followed by an ACH TLV Header.'
