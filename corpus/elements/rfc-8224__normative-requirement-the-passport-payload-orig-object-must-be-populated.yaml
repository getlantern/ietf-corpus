document: rfc-8224
kind: normative-requirement
summary: The PASSporT payload 'orig' object MUST be populated with a 'tn' element for telephone number identities (canonicalized per Section 8.3) or a 'uri' element for SIP AoR identities. The 'dest' array MUST similarly be populated with 'tn' or 'uri' elements derived from the To header field.
section: "4.1"
rfc2119_level: MUST
topics:
