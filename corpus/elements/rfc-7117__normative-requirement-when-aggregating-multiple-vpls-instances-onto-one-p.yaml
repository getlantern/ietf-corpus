document: rfc-7117
kind: normative-requirement
summary: When aggregating multiple VPLS instances onto one P-multicast tree, the PMSI Tunnel attribute of each re-advertised or newly advertised Intra-AS A-D route MUST carry the tree identity and an MPLS upstream-assigned label that is distinct within the scope of the advertising PE.
section: "4.1"
rfc2119_level: MUST
topics:
    - mpls
    - multicast
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
