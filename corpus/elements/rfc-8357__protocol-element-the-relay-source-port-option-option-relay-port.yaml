document: rfc-8357
kind: protocol-element
summary: The 'Relay Source Port Option' (OPTION_RELAY_PORT, code 135) is a new DHCPv6 option used by relay agents to record the downstream relay's non-standard UDP source port. It contains a 16-bit 'Downstream Source Port' field set to the downstream relay's port, or zero if only the local relay uses a non-standard port.
section: "4.2"
topics:
