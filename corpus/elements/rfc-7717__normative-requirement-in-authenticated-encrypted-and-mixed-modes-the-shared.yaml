document: rfc-7717
kind: normative-requirement
summary: 'In authenticated, encrypted, and mixed modes, the shared secret key MUST be derived from the IKEv2 SA using the formula: Shared secret key = prf(SK_d, "IPPM"), where "IPPM" is ASCII-encoded and prf is a pseudorandom function.'
section: "5.1"
rfc2119_level: MUST
topics:
    - ipsec
    - security
    - measurement
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-28"
