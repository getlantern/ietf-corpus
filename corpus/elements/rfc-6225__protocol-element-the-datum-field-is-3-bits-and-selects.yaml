document: rfc-6225
kind: protocol-element
summary: 'The Datum field is 3 bits and selects the coordinate reference system: 1 = WGS84 (EPSG 4979/4326), 2 = NAD83 horizontal + NAVD88 vertical (North American land), 3 = NAD83 horizontal + MLLW vertical (North American tidal). Datum 0 is reserved; values 4–7 are unassigned.'
