document: rfc-3480
kind: normative-requirement
summary: When processing the Explicit Route TLV and the outgoing link is unnumbered, the REQUEST message sent to the next hop MUST include the IF_ID TLV with the IP address field set to the node's Router ID and the Interface ID field set to the identifier assigned to the link by the node.
section: "4.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
