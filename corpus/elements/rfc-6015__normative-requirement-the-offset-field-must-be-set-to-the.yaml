document: rfc-6015
kind: normative-requirement
summary: The Offset field MUST be set to the number of columns L, and the NA field MUST be set to the number of rows D. These two fields, together with SN base low, uniquely identify the source packets associated with a repair packet.
section: "6.2"
rfc2119_level: MUST
