document: rfc-9240
kind: normative-requirement
summary: If entity domains in a property map depend on other resources, the 'dependent-vtags' field in the response 'meta' MUST be an array including version tags of those resources in the same order as the 'uses' field. For filtered property maps with resource-agnostic entities, all dependent resource vtags from 'uses' MUST be included.
section: "7.6"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
