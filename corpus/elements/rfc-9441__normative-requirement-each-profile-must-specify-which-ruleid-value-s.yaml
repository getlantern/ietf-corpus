document: rfc-9441
kind: normative-requirement
summary: Each Profile MUST specify which RuleID value(s) correspond to SCHC F/R messages in ACK-on-Error mode, and for each RuleID must define tile size, M, N, WINDOW_SIZE (strictly less than 2^N), RCS field size and algorithm, T, MAX_ACK_REQUESTS, Retransmission Timer, Inactivity Timer, last tile fragment type, penultimate tile size option, and usage of SCHC Compound ACK and Compressed Bitmap.
section: 3.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
