document: rfc-5066
kind: design-rationale
summary: Profile-based provisioning was chosen to reduce management burden when a node has a large number of EFMCu PHYs, since most PMEs are provisioned identically. A port-level profile (efmCuAdminProfile) applies to all PMEs on a PCS, while per-PME overrides (efmCuPmeAdminProfile) allow individual customization, following the model used in HDSL2-SHDSL-LINE-MIB and VDSL-LINE-EXT-MCM-MIB.
section: "4.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
