document: rfc-2463
kind: wire-format
summary: 'Echo Request (Type=128) and Echo Reply (Type=129): 4-byte header followed by a 2-byte Identifier, a 2-byte Sequence Number (both may be zero), and zero or more octets of arbitrary Data. Echo Reply copies Identifier, Sequence Number, and Data verbatim from the request.'
section: "4.1"
