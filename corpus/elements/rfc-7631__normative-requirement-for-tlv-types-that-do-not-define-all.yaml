document: rfc-7631
kind: normative-requirement
summary: For TLV types that do not define all type extensions, it is RECOMMENDED that the 'description' field for the allocated TLV type be set to 'Defined by Type Extension', and that the type extension registry be named 'Type XX Packet/Message/Address Block TLV Type Extensions' with XX replaced by the numerical TLV type value.
section: "3.1"
rfc2119_level: RECOMMENDED
topics:
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-22"
