document: rfc-5085
kind: design-rationale
summary: L2TPv3 already has a built-in Hello keepalive for the L2TP Control Connection, but this only detects dead peers for the entire connection. VCCV provides per-session (per-pseudowire) granularity to troubleshoot individual L2TP sessions independently.
