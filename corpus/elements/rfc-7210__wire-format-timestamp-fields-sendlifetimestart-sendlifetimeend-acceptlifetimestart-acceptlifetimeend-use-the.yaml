document: rfc-7210
kind: wire-format
summary: Timestamp fields (SendLifetimeStart, SendLifeTimeEnd, AcceptLifeTimeStart, AcceptLifeTimeEnd) use the format YYYYMMDDHHSSZ encoding year (4 digits), month, day, hour, minute, and second (each 2 digits) in UTC. The trailing 'Z' explicitly indicates UTC.
