document: rfc-5048
kind: interoperability-note
summary: Initiators SHOULD NOT use ACA on multi-connection iSCSI sessions to targets complying only with RFC 3720 due to the absence of ACA-related fencing requirements there. Initiators wanting ACA on multi-connection sessions SHOULD first negotiate ResponseFence or FastAbort for the TaskReporting key.
section: 3.3.3
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
