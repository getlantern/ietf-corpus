document: rfc-3744
kind: interoperability-note
summary: Access control properties (DAV:acl, DAV:supported-privilege-set, DAV:current-user-privilege-set, etc.) SHOULD NOT be returned by a PROPFIND allprop request because retrieving ACL information is expensive on many servers. Clients must request these properties explicitly by name.
section: "5"
topics:
    - security
    - http
