document: rfc-5092
kind: interoperability-note
summary: IMAP URLs always use '/' as the hierarchy delimiter for relative URL resolution. Because IMAP4 permits any hierarchy delimiter in mailbox names, relative mailbox paths will only work if the mailbox uses '/' as the delimiter. For other delimiters, the entire mailbox name MUST be specified or inherited as a whole.
section: "7"
topics:
