document: rfc-1981
kind: protocol-element
summary: 'Stale PMTU values are aged: when a PMTU value has not been decreased for approximately 10 minutes, the PMTU estimate is reset to the MTU of the first-hop link and packetization layers are notified, triggering a fresh Path MTU Discovery cycle. Implementations should allow configuring the timeout duration, including setting it to infinity.'
section: "5.3"
topics:
    - ip
