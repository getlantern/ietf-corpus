document: rfc-6463
kind: design-rationale
summary: For multi-homed mobile nodes, runtime LMA assignment should be applied only on the very first initial attach; the assigned r2LMA address is then stored in the policy profile so that all subsequent mobility sessions for the same MN are anchored to the same r2LMA without contacting the rfLMA again.
section: "6"
topics:
