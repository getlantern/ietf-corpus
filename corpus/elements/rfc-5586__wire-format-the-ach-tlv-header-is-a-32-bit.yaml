document: rfc-5586
kind: wire-format
summary: 'The ACH TLV Header is a 32-bit field: a 16-bit Length field specifying the total length in octets of all following TLVs, and a 16-bit Reserved field that MUST be set to zero on transmission. A length of zero indicates no ACH TLVs follow.'
