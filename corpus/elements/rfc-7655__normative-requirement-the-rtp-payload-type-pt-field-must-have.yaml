document: rfc-7655
kind: normative-requirement
summary: The RTP payload type (PT) field MUST have a value corresponding to the dynamic payload type assigned to the G.711.0 flow. The existing G.711 PT values of 0 (PCMU) and 8 (PCMA) MUST NOT be used for G.711.0, except in rare PT exhaustion cases.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
