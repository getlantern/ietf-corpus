document: rfc-6780
kind: security-consideration
summary: This document does not introduce new security risks. The broader usage of the ASSOCIATION object in Section 3 does not fundamentally expand the association function from RFC 4872/4873, and the Extended ASSOCIATION objects in Section 4 add only 32 bits of additional information not fundamentally different from existing RSVP information. For general MPLS/GMPLS security, RFC 5920 applies.
section: "6"
topics:
    - security
    - mpls
    - routing
