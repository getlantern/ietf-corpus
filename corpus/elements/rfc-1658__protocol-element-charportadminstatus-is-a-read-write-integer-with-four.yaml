kind: protocol-element
summary: 'charPortAdminStatus is a read-write INTEGER with four values: enabled(1) allows character passing and new sessions, disabled(2) allows characters but not new sessions, off(3) disallows both, and maintenance(4) indicates an exclusive test mode. These map to ifAdminStatus up/down/test.'
