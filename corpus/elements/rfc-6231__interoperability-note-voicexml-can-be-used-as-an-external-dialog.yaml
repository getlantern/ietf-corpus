document: rfc-6231
kind: interoperability-note
summary: VoiceXML can be used as an external dialog language by referencing it via a src URI with type 'application/voicexml+xml'. Section 9 defines how session protocol, media stream, and parameter information are mapped to VoiceXML session variables, and how VoiceXML exit information is conveyed in the <dialogexit> event.
section: "9"
topics:
    - realtime
    - voip
