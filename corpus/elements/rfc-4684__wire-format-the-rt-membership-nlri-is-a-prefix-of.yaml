document: rfc-4684
kind: wire-format
summary: 'The RT membership NLRI is a prefix of 0 to 96 bits structured as: origin-as (4 octets) followed by route-target (8 octets), encoded as a BGP prefix per RFC 2858 Section 4. The minimum non-default prefix length is 32 bits, as the origin-as field cannot itself be interpreted as a prefix.'
section: "4"
topics:
