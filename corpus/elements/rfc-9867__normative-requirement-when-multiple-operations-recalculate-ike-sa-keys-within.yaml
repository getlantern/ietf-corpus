document: rfc-9867
kind: normative-requirement
summary: When multiple operations recalculate IKE SA keys within the same IKE_INTERMEDIATE exchange (e.g., RFC 9370 additional key exchanges), applying the PPK MUST be done last so that PPK-based key recalculation is the final step before keys are used in the next exchange.
section: 3.1.1
rfc2119_level: MUST
topics:
    - ipsec
    - vpn
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
