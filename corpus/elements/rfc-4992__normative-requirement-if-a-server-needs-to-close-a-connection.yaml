document: rfc-4992
kind: normative-requirement
summary: If a server needs to close a connection due to error, it SHOULD send a response block with a block-error, data-error, or version information chunk with KO=0, then close the TCP connection. For unsupported protocol versions, the server SHOULD follow this same procedure.
section: "8"
rfc2119_level: SHOULD
topics:
    - tcp
