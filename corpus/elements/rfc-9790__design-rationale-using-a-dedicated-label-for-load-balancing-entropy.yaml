document: rfc-9790
kind: design-rationale
summary: Using a dedicated label for load balancing (Entropy Label or FAT PW Label) is identified as the best of four load-balancing approaches because it provides reliable and deterministic entropy without requiring payload-type guessing. The heuristic approach led to the workaround of inserting PSHs with non-IP PFNs purely to prevent misidentification, which this document aims to eventually make unnecessary.
section: 2.1.1
topics:
