document: rfc-3292
kind: interoperability-note
summary: A switch may support multiple label types but each port supports exactly one; connections may be established between ports of different label types using the Adaptation Method field (N flag for null/same-type adaptation, O flag for opaque/vendor-defined adaptation, or explicit Input/Output Adaptation codes such as 0x100=PPP, 0x200=FRF.5, 0x201=FRF.8).
section: "4.1"
topics:
    - mpls
