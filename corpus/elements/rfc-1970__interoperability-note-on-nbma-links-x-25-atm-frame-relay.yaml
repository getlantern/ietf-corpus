summary: On NBMA links (X.25, ATM, Frame Relay), address resolution and the delivery mechanism for Router Solicitations/Advertisements are not specified by this document. Redirect, Neighbor Unreachability Detection, and next-hop determination SHOULD be implemented as specified here.
