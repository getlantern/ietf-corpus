document: rfc-7533
kind: security-consideration
summary: Fileservers supporting the FedFS administration protocol MUST support RPCSEC_GSS (RFC 2203). Both clients and servers MUST support RPCSEC_GSS integrity and authentication services. Servers MUST support RPCSEC_GSS privacy; clients SHOULD support it. When RPCSEC_GSS is in use, data integrity SHOULD be employed.
section: "6"
rfc2119_level: MUST
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
