document: rfc-1253
kind: protocol-element
summary: ospfVirtIfTable (ospf 9) describes virtual links, indexed by ospfVirtIfAreaID (the transit area, never 0.0.0.0) and ospfVirtIfNeighbor (RouterID). Includes the same timer parameters as ospfIfTable plus ospfVirtIfAuthKey. ospfVirtIfState is limited to down(1) and pointToPoint(4).
section: "5.9"
topics:
    - snmp
    - routing
