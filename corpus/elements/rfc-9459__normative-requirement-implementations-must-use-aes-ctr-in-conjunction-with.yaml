document: rfc-9459
kind: normative-requirement
summary: Implementations MUST use AES-CTR in conjunction with an authentication and integrity mechanism, such as a digital signature. Without this companion mechanism, it is trivial for an attacker to forge ciphertexts.
section: "4"
rfc2119_level: MUST
topics:
