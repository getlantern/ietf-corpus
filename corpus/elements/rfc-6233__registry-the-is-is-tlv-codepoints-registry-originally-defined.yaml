document: rfc-6233
kind: registry
summary: The 'IS-IS TLV Codepoints' registry (originally defined in RFC 3563) is extended with a new 'Purge' column. A 'y' indicates the TLV MAY appear in a purge; an 'n' indicates it MUST NOT. Initially, TLV type 10 (Authentication) and TLV type 137 (Dynamic hostname) are marked 'y'; all others are 'n'.
section: "4"
topics:
