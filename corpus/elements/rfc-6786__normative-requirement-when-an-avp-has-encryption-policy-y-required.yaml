document: rfc-6786
kind: normative-requirement
summary: When an AVP has encryption policy 'Y' (required), if the AVP is encountered not encrypted it SHALL be considered invalid and the containing message SHALL be discarded. When policy is 'N' (forbidden), an encrypted occurrence SHALL also be discarded.
section: "6.1"
rfc2119_level: SHALL
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
