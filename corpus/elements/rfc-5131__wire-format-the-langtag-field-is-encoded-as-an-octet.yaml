document: rfc-5131
kind: wire-format
summary: The LangTag field is encoded as an OCTET STRING with SIZE (0 | 2..63). A zero-length value is not a valid language tag but can be used to express 'language tag absent' when used as an index field. The DISPLAY-HINT is '1a'.
