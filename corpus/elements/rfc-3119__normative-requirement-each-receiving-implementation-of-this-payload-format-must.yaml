document: rfc-3119
kind: normative-requirement
summary: Each receiving implementation of this payload format MUST recognize the ISN and be able to perform deinterleaving of incoming ADU frames. A sending implementation MAY choose not to perform interleaving, in which case the high-order 11 bits of each MPEG header remain 0xFFE.
section: "6"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
