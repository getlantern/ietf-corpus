document: rfc-7035
kind: design-rationale
summary: TLV type codes for relative location parameters are constrained to avoid overlap with the Civic Address Types (CAtypes) registry, enabling both location reference TLVs and relative offset TLVs to coexist in a single binary object without type collisions.
