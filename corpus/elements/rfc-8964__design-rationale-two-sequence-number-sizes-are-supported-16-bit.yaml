document: rfc-8964
kind: design-rationale
summary: Two sequence number sizes are supported (16-bit and 28-bit) because the 16-bit size is needed for legacy client compatibility, while the 28-bit size prevents sequence number space wrap-around in high-speed networks where packets may be in flight for extended periods.
section: "4.1"
topics:
