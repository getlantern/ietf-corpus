document: rfc-2456
kind: protocol-element
summary: appnPortOperStateChangeTrap notifies of APPN port operational state transitions, carrying appnPortTableChanges and appnPortOperState. It is only sent when appnPortOperState transitions to 'active' or 'inactive', on row creation only if initial state is 'active', and on row deletion only if the last state was 'active'.
section: "4"
topics:
