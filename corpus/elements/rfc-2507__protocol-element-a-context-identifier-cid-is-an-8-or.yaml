document: rfc-2507
kind: protocol-element
summary: A Context Identifier (CID) is an 8- or 16-bit number identifying which stored context to use for decompression. The CID spaces for TCP and non-TCP packet streams are separate, so a TCP CID and a non-TCP CID with the same value never identify the same context, effectively doubling the available CID space.
section: "5.1"
topics:
    - ip
