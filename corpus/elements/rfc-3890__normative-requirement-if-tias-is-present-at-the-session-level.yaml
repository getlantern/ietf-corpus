document: rfc-3890
kind: normative-requirement
summary: If TIAS is present at the session level, it SHOULD also be present at the media level. The session-level TIAS value MAY be less than the sum of individual media stream values when not all streams reach their maximum simultaneously.
section: 6.2.3
rfc2119_level: SHOULD
topics:
