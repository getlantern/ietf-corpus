document: rfc-5792
kind: normative-requirement
summary: PA-TNC Attribute Vendor ID 0xffffff is reserved; implementations MUST NOT send it and SHOULD respond with an Invalid Parameter error on receipt. PA-TNC Attribute Type 0xffffffff carries the same prohibition.
section: "4.1"
rfc2119_level: MUST NOT
topics:
    - security
