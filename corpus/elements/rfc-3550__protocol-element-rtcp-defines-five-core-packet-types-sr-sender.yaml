document: rfc-3550
kind: protocol-element
summary: 'RTCP defines five core packet types: SR (Sender Report, type 200), RR (Receiver Report, type 201), SDES (Source Description, type 202), BYE (Goodbye, type 203), and APP (Application-defined, type 204). Each begins with a fixed header similar to RTP and MUST end on a 32-bit boundary.'
