document: rfc-9760
kind: normative-requirement
summary: Clocks SHOULD include support for multiple domains to support multiple simultaneous timeTransmitters for redundancy; whenever feasible, the underlying network transport SHOULD be configured so that timing messages in different domains traverse different network paths.
section: "6"
rfc2119_level: SHOULD
