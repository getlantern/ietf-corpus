document: rfc-1516
kind: protocol-element
summary: rptrPortAdminStatus (rptrPortEntry 3) is a read-write INTEGER {enabled(1), disabled(2)}. A disabled port neither transmits nor receives; a port disabled when power is lost or reset occurs shall remain disabled on resumption. Enabling a port exerts BEGIN on the auto-partition state machine, resetting rptrPortAutoPartitionState to notAutoPartitioned(1).
section: "3.2"
topics:
    - snmp
