summary: 'Three new 1-bit flags are added to the RP object: F-bit (bit 18) signals message fragmentation; N-bit (bit 19) signals a P2MP PCReq or PCRep; E-bit (bit 20) signals ERO-compressed format. All three share the existing RP object flag field.'
