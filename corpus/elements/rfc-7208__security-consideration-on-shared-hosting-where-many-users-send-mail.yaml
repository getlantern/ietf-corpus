document: rfc-7208
kind: security-consideration
summary: On shared hosting where many users send mail through a common MTA, an SPF 'pass' authorizes all users of that MTA, not just the domain owner. SPF cannot distinguish between legitimate and malicious senders sharing an IP address.
section: "11.4"
topics:
    - email
    - security
