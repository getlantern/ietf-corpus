document: rfc-5393
kind: normative-requirement
summary: When a SIP proxy forks a particular request to more than one location, it MUST ensure that request is not looping through this proxy. It is RECOMMENDED that proxies meet this requirement by performing the loop-detection steps defined in RFC 5393.
section: "4.1"
rfc2119_level: MUST
topics:
    - sip
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
