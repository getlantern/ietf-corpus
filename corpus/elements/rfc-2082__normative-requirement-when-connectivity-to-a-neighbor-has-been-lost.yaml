document: rfc-2082
kind: normative-requirement
summary: When connectivity to a neighbor has been lost, the receiver SHOULD be ready to accept either a message with a sequence number of zero or a message with a higher sequence number than the last received, to handle sequence number resets after router restarts.
section: 3.2.2
rfc2119_level: SHOULD
topics:
    - routing
    - security
