document: rfc-9035
kind: normative-requirement
summary: Nodes other than the DODAG root MUST NOT modify the DODAG Configuration option when propagating it; legacy parents therefore propagate the 'T' flag exactly as set by the Root, transparently flooding it to all nodes in the DODAG.
section: "3"
rfc2119_level: MUST NOT
topics:
    - routing
