document: rfc-5046
kind: interoperability-note
summary: iSER requires that OFMarker and IFMarker be negotiated to No (Section 6.6), since iSCSI markers are a TCP-specific mechanism for framing PDUs in a byte stream and have no meaning in the RDMA message-based transport used by iSER.
section: "6.6"
topics:
    - tcp
