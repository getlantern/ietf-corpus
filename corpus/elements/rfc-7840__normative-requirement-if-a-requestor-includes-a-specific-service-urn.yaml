document: rfc-7840
kind: normative-requirement
summary: If a requestor includes a specific service URN in the routing request, that service MUST exist in the IANA 'Service URN Labels' repository created by RFC 5031. If the LIS does not understand the requested service, it MUST follow the URN traversal rules defined in RFC 5031 and return URIs for urn:service:sos.
section: "4"
rfc2119_level: MUST
topics:
    - realtime
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
