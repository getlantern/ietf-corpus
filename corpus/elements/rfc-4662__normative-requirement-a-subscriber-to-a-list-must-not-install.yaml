document: rfc-4662
kind: normative-requirement
summary: A subscriber to a list MUST NOT install multiple subscriptions when the initial request is forked. Forking makes little sense with event list subscriptions since the whole idea is centralization of the notification source.
section: "4.7"
rfc2119_level: MUST NOT
topics:
