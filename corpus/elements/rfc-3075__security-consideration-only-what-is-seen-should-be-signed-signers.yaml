document: rfc-3075
kind: security-consideration
summary: 'Only what is ''seen'' should be signed: signers should use canonicalization methods that reflect the data as it appears to users. Non-XML-aware canonicalization algorithms may fail to account for entity expansions or comments, creating a gap between what is displayed and what is signed.'
section: 8.1.2
topics:
    - security
    - crypto
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
