document: rfc-2447
kind: design-rationale
summary: CID and MID references within iCalendar objects (e.g., in ATTACH properties) should be self-contained in a single MIME entity because there is no guarantee that the receiving Calendar User will have access or authorization to retrieve externally referenced objects.
