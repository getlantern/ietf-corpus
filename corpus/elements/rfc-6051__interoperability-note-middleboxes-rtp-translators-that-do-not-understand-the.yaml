document: rfc-6051
kind: interoperability-note
summary: Middleboxes (RTP translators) that do not understand the RTP header extensions defined in this memo may remove them or fail to update their content correctly. This is the primary reason regular RTCP SR packets must still be sent even when in-band NTP timestamps are present.
section: "3.3"
topics:
    - rtp
    - realtime
