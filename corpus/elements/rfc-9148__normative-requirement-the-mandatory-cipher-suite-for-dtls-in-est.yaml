document: rfc-9148
kind: normative-requirement
summary: The mandatory cipher suite for DTLS in EST-coaps is TLS_ECDHE_ECDSA_WITH_AES_128_CCM_8. Curve secp256r1 MUST be supported; this curve is equivalent to the NIST P-256 curve.
section: "3"
rfc2119_level: MUST
