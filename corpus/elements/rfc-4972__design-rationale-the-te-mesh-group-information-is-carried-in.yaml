document: rfc-4972
kind: design-rationale
summary: The TE-MESH-GROUP information is carried in the existing OSPF Router Information LSA and IS-IS Router Capability TLV (defined in RFC 4970 and RFC 4971) rather than new LSA types. This choice leverages established advertisement and flooding mechanisms without introducing new IGP machinery.
