document: rfc-2535
kind: interoperability-note
summary: Request SIGs (type-covered = 0 on a query) are unnecessary for any currently defined request other than dynamic update and will cause some legacy DNS servers to return errors or ignore the query. Servers are not required to check request SIGs except where needed to authenticate an update or similarly privileged request.
section: 4.1.8.1
topics:
    - dns
    - security
