document: rfc-8855
kind: design-rationale
summary: BFCP uses compact binary TLV encoding to minimize message size in low-bandwidth environments. Delay-sensitive primitives (FloorRequest, FloorRelease, FloorRequestStatus, ChairAction) are specifically designed to be small; future extensions are expected not to increase these sizes significantly.
