document: rfc-8435
kind: normative-requirement
summary: When FF_FLAGS_WRITE_ONE_MIRROR is set, the storage device MUST ensure all mirror copies are updated when any one mirror is updated; if the storage device gets an error updating a mirror, it MUST inform the client, who MUST then inform the metadata server.
section: 8.2.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
