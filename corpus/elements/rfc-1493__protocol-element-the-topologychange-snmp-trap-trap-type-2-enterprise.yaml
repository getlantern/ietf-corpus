document: rfc-1493
kind: protocol-element
summary: The topologyChange SNMP trap (TRAP-TYPE ::= 2, enterprise dot1dBridge) is sent when any configured port transitions from Learning to Forwarding or from Forwarding to Blocking. It is suppressed when a newRoot trap is sent for the same transition. Implementation is optional.
