document: rfc-8497
kind: normative-requirement
summary: The 'log me' marker MUST be removed at a network boundary if no agreement exists between peer networks, because the marker may cause a SIP entity to log the SIP header and body of requests or responses.
section: 3.4.2
rfc2119_level: MUST
topics:
