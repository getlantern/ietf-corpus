document: rfc-3606
kind: interoperability-note
summary: When atmIntfConfigType is set to autoConfig(2), the interface type and side are determined automatically via ATM Forum ILMI auto-configuration procedures; manual configuration of atmIntfConfigSide is not needed. PNNI and BICI interfaces are always symmetric and also do not require side configuration.
section: 3.1.13
topics:
    - realtime
