document: rfc-5065
kind: normative-requirement
summary: If a BGP speaker receives an UPDATE with AS_CONFED_SEQUENCE or AS_CONFED_SET segments from a neighbor not in the same confederation, it SHALL treat the message as having a malformed AS_PATH per BGP-4 Section 6.3 UPDATE Message Error Handling.
section: "5"
rfc2119_level: REQUIRED
