document: rfc-8779
kind: design-rationale
summary: The BANDWIDTH and LOAD-BALANCING objects reuse RSVP-TE SENDER_TSPEC C-Type encodings rather than defining new encodings, because RSVP-TE already provides unambiguous technology-specific bandwidth representations for SDH/SONET, G.709/OTN, Ethernet, and other GMPLS technologies. This avoids duplication and ensures consistency with the data-plane signaling.
section: "2.3"
topics:
