document: rfc-9200
kind: security-consideration
summary: AS Request Creation Hints are sent unprotected (before a security association is established) and could be modified by an attacker to redirect the client to a malicious AS. Clients MUST independently validate that the indicated AS is authorized to issue tokens for the RS.
section: "6.4"
topics:
    - oauth
    - security
