document: rfc-9000
kind: interoperability-note
summary: Transport parameter values used for 0-RTT data must be compatible with those negotiated in the original connection's session ticket. If a server changes parameters that affect 0-RTT (e.g., flow control limits), the client must respect the remembered parameters or reject early data.
section: 7.4.1
topics:
    - quic
    - tls
