document: rfc-9826
kind: state-machine
summary: 'The ''sess-state'' typedef enumerates four PCEP session states: tcp-pending(1), open-wait(2), keep-wait(3), and session-up(4). The idle state is excluded because session list entries do not exist in the idle state; transitions follow the session establishment procedure defined in RFC 5440.'
section: "8.1"
topics:
    - yang
    - routing
