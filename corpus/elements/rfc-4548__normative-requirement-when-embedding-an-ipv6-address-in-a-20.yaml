document: rfc-4548
kind: normative-requirement
summary: When embedding an IPv6 address in a 20-octet NSAP address, the format defined in section 3.2 MUST be used. The final selector octet MUST be present but has no intrinsic significance for IPv6; its default value is zero.
section: "3.2"
rfc2119_level: MUST
topics:
