document: rfc-3736
kind: protocol-element
summary: The DNS Recursive Name Servers option specifies the DNS recursive name servers the client uses for name resolution (RFC 3646). The DNS search list option specifies domain names to be searched during name resolution. Both are primary configuration options for stateless DHCP.
