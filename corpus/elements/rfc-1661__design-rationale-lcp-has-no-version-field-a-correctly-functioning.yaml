document: rfc-1661
kind: design-rationale
summary: LCP has no version field. A correctly functioning LCP implementation always responds to unknown Protocols and Codes with recognizable LCP packets, providing a deterministic fallback for implementations of other versions without needing an explicit version negotiation field.
section: "5"
