document: rfc-3865
kind: interoperability-note
summary: An EHLO response of '250-NO-SOLICITING' with no keywords is a valid no-op invocation of the extension. It is useful for MTAs that wish to relay all messages but still propagate SOLICIT= parameters on a per-message basis without enforcing any class restrictions themselves.
section: "2.2"
topics:
    - email
