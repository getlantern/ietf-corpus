kind: wire-format
summary: 'Global Unicast addresses have the structure: n-bit global routing prefix | m-bit subnet ID | 128-n-m-bit interface ID. For all global unicast addresses not starting with binary 000, n+m=64 and the interface ID is 64 bits in Modified EUI-64 format.'
