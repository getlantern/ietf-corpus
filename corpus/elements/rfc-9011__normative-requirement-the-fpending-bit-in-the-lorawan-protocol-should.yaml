document: rfc-9011
kind: normative-requirement
summary: The FPending bit in the LoRaWAN protocol SHOULD NOT be used for the SCHC-over-LoRaWAN protocol; it may be set by the Network Gateway for other purposes but not for SCHC needs.
section: 5.6.3
rfc2119_level: SHOULD NOT
