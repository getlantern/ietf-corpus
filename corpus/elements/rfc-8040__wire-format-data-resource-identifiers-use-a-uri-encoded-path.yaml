document: rfc-8040
kind: wire-format
summary: 'Data resource identifiers use a URI-encoded path following the ''api-path'' ABNF: ''api-path = root *("/" (api-identifier / list-instance))''. List key values are encoded as comma-separated values after ''=''. Reserved characters MUST be percent-encoded per RFC 3986. Module names are prepended with a colon when crossing module boundaries.'
section: 3.5.3.1
