document: rfc-9176
kind: protocol-element
summary: Simple registration uses a POST to /.well-known/rd with an empty body; the RD then performs a GET to the registrant's /.well-known/core to obtain links. No registration location is returned, so subsequent management operations are unavailable.
section: "5.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
