document: rfc-7035
kind: normative-requirement
summary: An 'http:' or 'https:' URL MUST be used for the map URL unless the PIDF-LO creator can ensure that authorized recipients can use other URI schemes. A 'type' attribute MUST be present on the map URL element, specifying the MIME media type of the map document.
section: 4.11.1
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
