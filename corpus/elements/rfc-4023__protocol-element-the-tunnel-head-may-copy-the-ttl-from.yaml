document: rfc-4023
kind: protocol-element
summary: The tunnel head MAY copy the TTL from the MPLS label stack into the TTL/Hop Limit field of the encapsulating IP header. The tunnel tail MAY copy the TTL/Hop Limit from the encapsulating IP header into the MPLS header, but only if this does not increase the MPLS TTL value.
section: "5.2"
topics:
    - mpls
    - ip
