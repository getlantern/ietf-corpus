document: rfc-8560
kind: normative-requirement
summary: EVPN PEs MUST advertise both the BGP VPLS auto-discovery (A-D) route and the BGP EVPN Inclusive Multicast Ethernet Tag (IMET) route for a given VPN instance. VPLS PEs advertise only the BGP VPLS A-D route.
section: "3.1"
rfc2119_level: MUST
topics:
