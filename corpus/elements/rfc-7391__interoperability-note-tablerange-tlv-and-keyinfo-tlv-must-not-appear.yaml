document: rfc-7391
kind: interoperability-note
summary: TABLERANGE-TLV and KEYINFO-TLV must not appear together on the same path, and multiple nested TABLERANGE-TLVs are not allowed. These combinations are rejected for simplicity of operations, with E_INVALID_TFLAGS returned on violation.
section: "3.1"
