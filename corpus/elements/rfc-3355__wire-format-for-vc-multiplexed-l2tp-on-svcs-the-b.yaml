document: rfc-3355
kind: wire-format
summary: For VC-multiplexed L2TP on SVCs, the B-LLI IE User Information layer 3 protocol field SHALL be encoded as 0B 80 00 00 5E 00 07, using the SNAP IPI followed by IANA OUI (0x00-00-5E) and L2TP PID (0x0007) as specified in DSL Forum TR-037.
section: "7.1"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
