document: rfc-4842
kind: protocol-element
summary: Explicit Pointer Adjustment Relay (EPAR) is an OPTIONAL mechanism to relay SONET/SDH pointer adjustment events across the PSN using the N and P bits of the CEP header. EPAR is only effective when both PW ends share a common timing reference; when N=0,P=1 indicates positive adjustment; N=1,P=0 indicates negative; N=1,P=1 indicates Loss of Pointer. Pointer adjustment events MUST be transmitted in three consecutive packets.
section: "9.1"
topics:
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
