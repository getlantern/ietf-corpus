document: rfc-7197
kind: design-rationale
summary: The attribute is defined generically to support more than two redundant streams (multiple duplications) by specifying multiple delay values, even though in practice more than two redundant streams are unlikely due to added delay and overhead. Multiple period values represent relative delays between successive duplicates.
