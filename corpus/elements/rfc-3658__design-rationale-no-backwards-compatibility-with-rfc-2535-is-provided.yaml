document: rfc-3658
kind: design-rationale
summary: No backwards compatibility with RFC 2535 is provided. The DNSEXT Working Group determined that rapid adoption of DS is preferable to dealing with both RFC 2535-secured and DS-secured zones simultaneously, requiring a 'flag day' upgrade of nameservers and resolvers.
section: "2.6"
topics:
    - dns
