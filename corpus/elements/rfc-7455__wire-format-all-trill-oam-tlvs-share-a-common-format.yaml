document: rfc-7455
kind: wire-format
summary: 'All TRILL OAM TLVs share a common format: Type (1 octet), Length (2 octets specifying the length of the Value field), Value (variable). The TRILL OAM Application Identifier TLV (Type 64) MUST be the first TLV; an End TLV (Type 0) MUST be the last.'
section: "8.3"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
