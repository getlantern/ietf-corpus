document: rfc-4188
kind: protocol-element
summary: dot1dStpPortPathCost (Integer32, 1..65535) carries the 16-bit path cost for a port; if the actual cost exceeds 65535, this object reports 65535 and implementations SHOULD also support dot1dStpPortPathCost32 (Integer32, 1..200000000) for IEEE 802.1t 32-bit path costs.
