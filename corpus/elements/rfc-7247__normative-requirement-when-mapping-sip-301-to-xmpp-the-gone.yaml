document: rfc-7247
kind: normative-requirement
summary: When mapping SIP 301 to XMPP, the <gone/> element MUST include XML character data specifying the new address. When mapping SIP 410 to XMPP, the <gone/> element MUST NOT include XML character data specifying a new address.
section: "7.2"
rfc2119_level: MUST
