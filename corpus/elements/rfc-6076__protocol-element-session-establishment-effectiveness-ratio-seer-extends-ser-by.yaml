document: rfc-6076
kind: protocol-element
summary: Session Establishment Effectiveness Ratio (SEER) extends SER by including 480, 486, 600, and 603 responses in the numerator alongside 200 OK responses, to exclude the effects of individual user behavior at the target UA. It is analogous to the ITU-T E.411 Network Effectiveness Ratio (NER). Measured at the originating UA only.
section: "4.7"
topics:
    - realtime
    - voip
    - measurement
