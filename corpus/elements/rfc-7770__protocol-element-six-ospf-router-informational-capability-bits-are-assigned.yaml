document: rfc-7770
kind: protocol-element
summary: 'Six OSPF Router Informational Capability bits are assigned: bit 0 (graceful restart capable), bit 1 (graceful restart helper), bit 2 (stub router support), bit 3 (TE support), bit 4 (point-to-point over LAN), and bit 5 (experimental TE). Bits 6-31 are unassigned and require IETF Review.'
