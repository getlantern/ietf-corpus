document: rfc-9509
kind: design-rationale
summary: Although vendor-defined KeyPurposeIds can be safely ignored when unrecognized (as non-critical extensions), using them outside their intended vendor-controlled environment causes interoperability issues. Standard KeyPurposeIds are defined here to ensure interoperability across implementations and are intentionally scoped broadly enough for use beyond 5G deployments.
section: "1"
topics:
