document: rfc-5627
kind: privacy-consideration
summary: 'Temporary GRUUs replace the RFC 3323 user-provided privacy Contact format (bare IP address) and provide equivalent or better privacy: using a different temporary GRUU per call prevents call correlation by correspondents via the Contact header, though SDP IP address information still allows correlation independent of GRUU usage.'
section: "10.3"
topics:
    - sip
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
