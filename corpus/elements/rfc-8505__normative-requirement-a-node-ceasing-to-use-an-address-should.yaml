document: rfc-8505
kind: normative-requirement
summary: A node ceasing to use an address SHOULD attempt to de-register by sending NS(EARO) with Registration Lifetime of 0. The 6LR MUST report a lifetime-0 registration to the 6LBR via an EDAR exchange, conveying the latest TID known to the 6LR.
section: "5.7"
rfc2119_level: SHOULD
topics:
    - ip
    - v6ops
