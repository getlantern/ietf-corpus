document: rfc-4511
kind: protocol-element
summary: A Referral result (resultCode 10) contains one or more URIs (Referral ::= SEQUENCE SIZE (1..MAX) OF uri URI) pointing to other servers that may be able to complete the operation. At least one URI MUST be present. Referrals may be returned for any operation except Unbind and Abandon.
section: 4.1.10
topics:
