document: rfc-5815
kind: protocol-element
summary: The IPFIX SELECTOR MIB defines the ipfixSelectorFunctions subtree as a placeholder for standard Filtering and Sampling functions. It currently contains only ipfixFuncSelectAll. Each function subtree SHOULD contain an availability TruthValue (ipfixFuncFxAvail) and, if parameterized, an ipfixFuncFxParameters table whose entries are referenced by the Selection Process Table.
section: "6.1"
topics:
    - snmp
    - measurement
    - registry
