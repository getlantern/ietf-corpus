document: rfc-6321
kind: normative-requirement
summary: When converting xCal to iCalendar, component/property/parameter names SHOULD be converted to uppercase to follow common iCalendar practice. BACKSLASH character encoding and line folding MUST be applied as required by RFC 5545. Non-binary value types MUST NOT be base64 encoded.
section: "4"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
