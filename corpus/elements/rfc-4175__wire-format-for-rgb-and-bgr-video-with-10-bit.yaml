document: rfc-4175
kind: wire-format
summary: For RGB and BGR video with 10-bit samples, four adjacent pixels form 15-octet pgroups. For 12-bit samples, two adjacent pixels form 9-octet pgroups. For 8-bit samples, pgroup is 3 octets. For 16-bit samples, each pixel forms a 6-octet pgroup.
