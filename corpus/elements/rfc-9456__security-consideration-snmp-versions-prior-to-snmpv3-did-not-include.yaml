document: rfc-9456
kind: security-consideration
summary: SNMP versions prior to SNMPv3 did not include adequate security. Even on a secured network (e.g., using IPsec), there is no access control over who can GET/SET objects in this MIB module. Only SNMPv3 with TSM or another secure-transport-aware security model should be used over TLSTM.
section: "5"
topics:
    - tls
    - snmp
    - security
