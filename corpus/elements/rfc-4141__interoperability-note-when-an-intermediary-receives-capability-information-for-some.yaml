document: rfc-4141
kind: interoperability-note
summary: When an intermediary receives capability information for some recipients but not others, those without capability information are treated as if no CONNEG took place — the intermediary MAY split the address list and continue CONPERM forwarding for the uncovered recipients rather than failing them outright.
section: "3"
