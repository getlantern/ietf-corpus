document: rfc-5059
kind: security-consideration
summary: Implementations SHOULD provide a per-interface option to suppress sending and accepting Bootstrap messages. This should be enabled on all PIM Multicast Border Routers (PMBRs) and leaf interfaces to prevent cross-domain BSR attacks and receipt of conflicting BSR information from neighboring domains.
section: "6.3"
rfc2119_level: SHOULD
topics:
    - multicast
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
