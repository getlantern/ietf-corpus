document: rfc-2508
kind: normative-requirement
summary: Both uncompressed and compressed packets MUST carry the context ID and the 4-bit link sequence number. This sequence number is used to detect packet loss between compressor and decompressor, and each context has its own separate sequence number space.
section: "3.3"
rfc2119_level: MUST
topics:
