document: rfc-7551
kind: design-rationale
summary: An associated bidirectional LSP consists of two reverse unidirectional LSPs set up in opposite directions between a pair of nodes. This design satisfies MPLS-TP requirements (RFC 5654) that the endpoints be aware of the pairing relationship and that independent provisioning and protection of each direction be supported.
