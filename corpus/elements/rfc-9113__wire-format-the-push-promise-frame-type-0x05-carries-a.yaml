document: rfc-9113
kind: wire-format
summary: The PUSH_PROMISE frame (type=0x05) carries a Reserved (1-bit) field, a 31-bit Promised Stream ID, and a Field Block Fragment. It MUST only be sent on a peer-initiated stream in 'open' or 'half-closed (remote)' state. The promised stream identifier MUST be in the 'idle' state.
section: "6.6"
topics:
