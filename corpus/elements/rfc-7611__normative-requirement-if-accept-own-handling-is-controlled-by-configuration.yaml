document: rfc-7611
kind: normative-requirement
summary: If ACCEPT_OWN handling is controlled by configuration, it MUST default to being disabled. When disabled (explicitly or by default), the router MUST NOT apply the special route acceptance rules of Section 2.1.
section: "2.3"
rfc2119_level: MUST
topics:
