document: rfc-7172
kind: normative-requirement
summary: On a link with mixed FGL and VL ports where an FGL switch is DRB, it MUST appoint only other FGL TRILL switch ports as Appointed Forwarder for any VLANs that are to be mapped to FGL. If Step (B) is in effect, an FGL DRB MUST only appoint FGL Appointed Forwarders.
section: "5.2"
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
