summary: 'Two complementary integration scenarios are defined: (1) NSH-based SFC with SR as the transport plane between SFFs, and (2) SR-based SFC where each service hop is a segment and NSH maintains the service plane and SFC instance context. Either SR-MPLS or SRv6 may be used for both.'
