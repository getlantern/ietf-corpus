document: rfc-7603
kind: interoperability-note
summary: The data center UPS MIB can monitor battery capacity, input load, and output load of UPS devices, but there is currently no defined link between the UPS MIB and the ENTITY-MIB, leaving a gap in hierarchical containment modeling for UPS units.
