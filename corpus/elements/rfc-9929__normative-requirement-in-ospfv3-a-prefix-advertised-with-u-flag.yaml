document: rfc-9929
kind: normative-requirement
summary: In OSPFv3, a prefix advertised with U-Flag or UP-Flag MUST have its metric set to LSInfinity and the NU-bit set in the PrefixOptions of the parent TLV. If either condition is not met, both flags MUST be ignored.
section: 4.2.2
rfc2119_level: MUST
topics:
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-19"
