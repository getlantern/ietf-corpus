document: rfc-7581
kind: wire-format
summary: 'The Processing Capability List Subfield encodes a 16-bit Processing Cap ID (0=Reserved, 1=Regeneration, 2=Fault/performance monitoring, 3=Vendor-specific) plus optional additional parameters. For regeneration (Cap ID=1), a 3-bit regenerator type (T: 1R/2R/3R) and 2-bit capability (C: Fixed Point or Selective Pools) are included.'
section: "4.4"
topics:
