summary: 'The Graceful Restart Capability value encodes: Restart Flags (4 bits, MSB is Restart State R bit), Restart Time in seconds (12 bits), followed by per-AFI tuples each containing AFI (16 bits), SAFI (8 bits), and Flags for Address Family (8 bits, MSB is Forwarding State F bit).'
