summary: 'Label matching in step 3 traverses the zone tree label by label against QNAME. The process terminates in exactly one of three outcomes: exact match (part ''a''), referral at a zone cut (part ''b''), or no match / wildcard check (part ''c''). Parts are mutually exclusive; once one is chosen the others are not considered.'
