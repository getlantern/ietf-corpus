document: rfc-8936
kind: security-consideration
summary: Bearer tokens SHOULD have a limited lifetime. Implementers should prefer stronger authentication methods over HTTP Basic, and must account for RFC 7521 threats when using OAuth access tokens.
section: 4.4.1
topics:
