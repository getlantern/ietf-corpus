document: rfc-9784
kind: normative-requirement
summary: A PE device MUST handle single-homed vESes on a single physical port such as a single ENNI (R1a), and MUST support a combination of single-homed vESes and Single-Active multihomed vESes simultaneously on a single physical port (R1b).
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
