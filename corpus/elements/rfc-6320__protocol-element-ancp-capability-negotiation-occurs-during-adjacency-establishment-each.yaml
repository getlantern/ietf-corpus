document: rfc-6320
kind: protocol-element
summary: 'ANCP capability negotiation occurs during adjacency establishment: each peer advertises its supported capabilities in SYN/SYNACK Capability Fields (each with a 16-bit Capability Type, 16-bit Capability Length, and optional Capability Data padded to 4-byte boundary). The session operates using only the intersection of capabilities supported by both peers.'
section: 3.5.2
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
