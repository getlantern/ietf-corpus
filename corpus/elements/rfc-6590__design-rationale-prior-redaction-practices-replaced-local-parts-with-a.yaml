document: rfc-6590
kind: design-rationale
summary: Prior redaction practices replaced local-parts with a uniform string (e.g., "xxxxxxxx"), which prevented any grouping or prioritization of reports. The hash-based approach allows a report receiver to detect that two reports originated from the same end user without revealing that user's identity, enabling prioritization based on repeated offenders.
section: "1"
topics:
