document: rfc-1073
kind: state-machine
summary: NAWS negotiation follows the standard Telnet WILL/DO/WON'T/DON'T four-way handshake. Either side may initiate; if both agree, the client sends the subnegotiation. The server may subsequently send DON'T NAWS to terminate further subnegotiations.
section: "2"
