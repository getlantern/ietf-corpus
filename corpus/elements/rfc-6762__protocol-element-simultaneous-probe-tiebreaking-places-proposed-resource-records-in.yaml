document: rfc-6762
kind: protocol-element
summary: Simultaneous probe tiebreaking places proposed resource records in the Authority Section of probe queries. When two hosts probe for the same name concurrently, the host with lexicographically later rdata wins, where comparison is by class, then rrtype, then raw binary rdata bytes treated as unsigned values.
section: "8.2"
topics:
    - dns
    - zeroconf
extracted_by: claude-sonnet-4-6
