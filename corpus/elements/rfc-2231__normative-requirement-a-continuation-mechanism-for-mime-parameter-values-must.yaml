document: rfc-2231
kind: normative-requirement
summary: A continuation mechanism for MIME parameter values MUST NOT change the syntax of MIME media type and disposition lines, and MUST NOT depend on parameter ordering, since MIME states parameters are not order-sensitive and parameters may be reordered during user-agent processing.
section: "3"
rfc2119_level: MUST NOT
