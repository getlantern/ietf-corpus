document: rfc-9648
kind: design-rationale
summary: The module intentionally omits Retransmission Timeout (RTO) configuration and a maximum connection limit from the TCP MIB, as these parameters 'hardly matter in a state-of-the-art TCP implementation.' The model is kept minimal and focused on parameters important for network elements such as routers.
