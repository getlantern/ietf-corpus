document: rfc-8549
kind: security-consideration
summary: BGP communities can be used as an attack vector ('weaponizing BGP'); systems processing IPFIX-collected BGP community information MUST NOT blindly trust it. It is RECOMMENDED to use only community information from consecutive neighboring ASes within the same trust domain as the processing system.
section: "8"
rfc2119_level: RECOMMENDED
topics:
    - security
    - bgp
