document: rfc-7033
kind: design-rationale
summary: Easy, unauthenticated discovery of user information is a deliberate design goal, not a flaw. Administrators who need to restrict access should use standard web authentication and access-control mechanisms rather than expecting the WebFinger protocol itself to enforce privacy.
section: "9.2"
topics:
    - security
    - privacy
