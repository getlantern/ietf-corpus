document: rfc-4566
kind: wire-format
summary: Timing fields use decimal NTP timestamps (seconds since 1900). The `t=<start-time> <stop-time>` field specifies session activity bounds; a stop-time of zero means unbounded. The `r=` field encodes repeat intervals using compact time units (d, h, m, s).
