document: rfc-7766
kind: design-rationale
summary: TCP is elevated from a fallback option to a valid alternative transport on equal footing with UDP. Resolvers MAY use TCP before ever trying UDP, which departs from RFC 5966's requirement to send UDP queries first.
section: "5"
topics:
    - dns
    - tcp
