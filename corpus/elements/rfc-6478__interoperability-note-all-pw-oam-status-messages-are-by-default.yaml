document: rfc-6478
kind: interoperability-note
summary: All PW OAM status messages are by default sent to the adjacent PE to preserve backward compatibility with PEs that do not understand MS-PWs and cannot distinguish whether the adjacent PE is an S-PE or a T-PE. Direct T-PE-to-T-PE messaging (S-PE bypass) is an enhanced optional mode.
section: "5.4"
topics:
    - mpls
