document: rfc-2733
kind: protocol-element
summary: The length recovery field in the FEC header is computed by XOR-ing the unsigned network-ordered 16-bit representation of the sum of lengths (in bytes) of the media payload, CSRC list, extension, and padding of each associated media packet. This allows recovery even when media packet lengths differ.
section: "6.2"
topics:
    - rtp
    - realtime
