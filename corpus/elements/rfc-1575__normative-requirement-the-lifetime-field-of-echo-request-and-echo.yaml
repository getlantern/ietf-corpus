document: rfc-1575
kind: normative-requirement
summary: The lifetime field of echo-request and echo-response packets SHOULD be set to the value normally used for a data packet. The memo does not define a mechanism for varying the lifetime field set in the echo-response packet.
section: "5.3"
rfc2119_level: SHOULD
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
