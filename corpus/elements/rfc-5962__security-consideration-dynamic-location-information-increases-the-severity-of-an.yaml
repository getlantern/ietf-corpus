document: rfc-5962
kind: security-consideration
summary: Dynamic location information increases the severity of an information leak compared to static snapshots because attackers can use velocity, heading, and orientation data to anticipate the future location of a presentity. Deployers are strongly advised to provide users with access control mechanisms over location distribution.
section: "5"
topics:
    - security
    - privacy
