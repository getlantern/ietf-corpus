document: rfc-6125
kind: design-rationale
summary: The document recommends against multiple CN-IDs (SHOULD NOT rather than MUST NOT) because at least one major technology community (CA/Browser Forum EV-CERTS) and at least one major CA explicitly allow them, and many service providers require them in virtual hosting environments due to lack of TLS SNI support in some widely deployed operating systems.
section: "7.4"
topics:
    - tls
    - pkix
    - security
