document: rfc-8010
kind: normative-requirement
summary: When converting an ipp-URI for the HTTP layer, the Client MUST change the 'ipp' scheme to 'http' (or 'ipps' to 'https') and add explicit port 631 if no port is specified. The ipp-URI or ipps-URI MUST be used for operation attributes within the application/ipp body.
section: "5"
rfc2119_level: MUST
topics:
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
