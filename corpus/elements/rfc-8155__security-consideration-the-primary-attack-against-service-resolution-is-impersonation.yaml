document: rfc-8155
kind: security-consideration
summary: The primary attack against Service Resolution is impersonation of a TURN server through compromise of S-NAPTR resolution or control of the input domain name. Attackers who control the domain name can control the discovered TURN server; every method used to determine the domain name introduces its own attack surface.
section: "9.1"
topics:
    - dns
    - nat
    - security
