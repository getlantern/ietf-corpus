document: rfc-5004
kind: design-rationale
summary: 'The parallel-session exclusion is intentional: peering addresses for parallel sessions are typically allocated by one AS with route selection in mind, so applying the stability algorithm could disrupt existing routing setup and should not override that deliberate configuration.'
