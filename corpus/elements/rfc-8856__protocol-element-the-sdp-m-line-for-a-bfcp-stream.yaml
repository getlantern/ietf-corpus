document: rfc-8856
kind: protocol-element
summary: 'The SDP ''m='' line for a BFCP stream MUST have media field ''application'', a fmt list containing only ''*'', and one of five proto values: ''TCP/BFCP'', ''TCP/TLS/BFCP'', ''TCP/DTLS/BFCP'', ''UDP/BFCP'', or ''UDP/TLS/BFCP''. A port value of zero indicates rejection of the media stream regardless of proto.'
section: "4"
topics:
