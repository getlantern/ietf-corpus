document: rfc-8826
kind: privacy-consideration
summary: WebRTC provides persistent identifiers (DTLS certificates reused between connections, RTCP CNAMEs generated per RFC 6222) that can be used to correlate anonymous calls. Browsers must provide mechanisms to reset these identifiers, and the API should allow sites intended for anonymous calling to force fresh identifiers to be minted.
section: 4.4.1
topics:
    - webrtc
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
