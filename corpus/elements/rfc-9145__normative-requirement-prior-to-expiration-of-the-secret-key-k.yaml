document: rfc-9145
kind: normative-requirement
summary: Prior to expiration of the secret key K, all participating NSH-aware nodes SHOULD have the control plane distribute a new key identifier and associated keying material. It is RECOMMENDED that the next key identifier be distributed well prior to the secret key expiration time.
section: "9"
rfc2119_level: SHOULD
topics:
    - security
    - crypto
