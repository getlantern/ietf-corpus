document: rfc-9159
kind: security-consideration
summary: The ROVR can be derived from the Bluetooth device address, but such a ROVR can be spoofed; any node on the subnet aware of a registered-address-to-ROVR mapping could perform address theft and impersonation attacks. Use of Address Protected Neighbor Discovery (RFC 8928) provides protection against such attacks.
section: "5"
topics:
    - security
    - ip
