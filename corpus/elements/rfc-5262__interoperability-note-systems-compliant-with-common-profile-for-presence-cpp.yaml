document: rfc-5262
kind: interoperability-note
summary: Systems compliant with Common Profile for Presence (CPP, RFC 3859) will not support this specification by default. This is not problematic because all endpoints must support the baseline 'application/pidf+xml' type; partial PIDF is only used when both sides negotiate support via SIP content type negotiation.
