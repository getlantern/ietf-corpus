document: rfc-2747
kind: interoperability-note
summary: The RSVP checksum MAY be disabled (set to zero) when the INTEGRITY object is present, as the message digest provides a much stronger integrity check. Implementations MUST set the checksum field to zero before computing the keyed digest and before recomputing on receipt.
section: "1"
rfc2119_level: MAY
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
