document: rfc-4511
kind: normative-requirement
summary: Implementations MUST NOT display or attempt to decode an attribute value if its syntax is not known. Clients MUST only send attribute values in a request that are valid according to the syntax defined for the attributes. Implementations MUST be prepared to handle arbitrary contents of controlValue and Extended operation value fields, including zero bytes.
section: 4.1.5
rfc2119_level: MUST NOT
topics:
    - ldap
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
