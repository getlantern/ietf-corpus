document: rfc-9463
kind: protocol-element
summary: The Service Priority field is a 16-bit unsigned integer present in all three option formats (DHCPv6, DHCPv4, RA), interpreted per RFC 9460 Section 2.4.1. A smaller value indicates higher preference. Clients MUST process multiple resolver instances in service priority order.
section: 3.1.7
topics:
    - dns
