document: rfc-3080
kind: normative-requirement
summary: Once transport security (TLS) is successfully negotiated, a SASL security layer MUST NOT be negotiated; conversely, once any SASL negotiation is successful, a transport security profile MUST NOT begin its underlying negotiation process.
section: "4.1"
rfc2119_level: MUST NOT
topics:
