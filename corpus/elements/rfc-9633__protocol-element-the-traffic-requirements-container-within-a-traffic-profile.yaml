document: rfc-9633
kind: protocol-element
summary: 'The ''traffic-requirements'' container within a traffic-profile captures DetNet service requirements: ''min-bandwidth'' (uint64, octets/sec), ''max-latency'' (uint32, nanoseconds, max ~4.29 sec), ''max-latency-variation'' (uint32, nanoseconds), ''max-loss'' (decimal64, percent), ''max-consecutive-loss-tolerance'' (uint32, packets), and ''max-misordering'' (uint32, packets; 0 = strict in-order required).'
section: "8"
topics:
    - yang
    - routing
    - qos
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
