document: rfc-8685
kind: interoperability-note
summary: Per RFC 5440 Section 7.1, unrecognized TLVs MUST be ignored. A PCE that does not support RFC 8685 will ignore the H-PCE-CAPABILITY TLV and will not include it in its own Open message, so no H-PCE relationship is created but the session proceeds normally.
section: 3.2.1.1
topics:
    - routing
    - mpls
