document: rfc-4301
kind: protocol-element
summary: The Security Policy Database (SPD) is an ordered database logically divided into SPD-S (IPsec-protected traffic), SPD-I (inbound bypassed/discarded traffic), and SPD-O (outbound bypassed/discarded traffic). Each entry specifies DISCARD, BYPASS, or PROTECT action keyed by a set of traffic selectors.
section: 4.4.1
topics:
