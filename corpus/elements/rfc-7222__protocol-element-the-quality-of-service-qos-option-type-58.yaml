document: rfc-7222
kind: protocol-element
summary: The Quality-of-Service (QoS) option (Type 58) is a new PMIPv6 mobility header option used by LMAs and MAGs to negotiate QoS parameters for a mobile node's IP flows. It can be carried in PBU, PBA, UPN, and UPA messages; multiple instances may appear in a single message, each representing a distinct QoS Service Request.
section: "4.1"
topics:
