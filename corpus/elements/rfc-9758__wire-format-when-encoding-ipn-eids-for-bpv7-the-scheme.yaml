document: rfc-9758
kind: wire-format
summary: When encoding ipn EIDs for BPv7, the scheme-specific part MUST be represented as a CBOR array of either two (2) or three (3) elements, each encoded as a CBOR unsigned integer. Both encodings represent the same logical tuple of (Allocator Identifier, Node Number, Service Number).
section: "6.1"
rfc2119_level: MUST
topics:
    - cbor
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
