document: rfc-4877
kind: design-rationale
summary: Per-interface configuration of security policies is no longer required for protecting mobility header messages because the Mobility Header message type can now be used directly as a selector. Without per-interface policies, however, payload packet protection is limited to packets originating or terminating at the home address.
section: "4.2"
topics:
    - ipsec
    - mobility
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
