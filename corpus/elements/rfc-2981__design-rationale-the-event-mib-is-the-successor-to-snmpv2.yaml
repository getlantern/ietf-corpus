document: rfc-2981
kind: design-rationale
summary: The Event MIB is the successor to SNMPv2's Manager-to-Manager MIB (RFC 1451), which was declared Historic pending this work. Event MIB events extend RMON's notification concept by adding the ability to set a MIB object as an event action.
