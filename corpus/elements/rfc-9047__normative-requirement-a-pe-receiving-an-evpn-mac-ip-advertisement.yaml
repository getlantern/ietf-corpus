document: rfc-9047
kind: normative-requirement
summary: A PE receiving an EVPN MAC/IP Advertisement route with an IP->MAC and the I flag set SHOULD install that entry as an 'immutable binding', overriding an existing non-immutable binding for the same IP->MAC.
section: "3.2"
rfc2119_level: SHOULD
topics:
