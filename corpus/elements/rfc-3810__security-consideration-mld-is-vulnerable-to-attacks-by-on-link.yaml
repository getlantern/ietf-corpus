document: rfc-3810
kind: security-consideration
summary: 'MLD is vulnerable to attacks by on-link nodes: a malicious node can forge membership reports to cause routers to forward unwanted multicast traffic, or forge leave messages to stop delivery of wanted traffic. Use of IPsec Authentication Header is recommended to authenticate MLD messages, though it is complicated by MLD''s link-local addressing requirements.'
section: "10"
topics:
    - multicast
    - ip
    - security
