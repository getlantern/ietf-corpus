document: rfc-3108
kind: normative-requirement
summary: For class 4 parameters (those representable in either decimal or hexadecimal), a '0x' prefix SHALL always be used to distinguish the hexadecimal format from the decimal format. Leading zeros SHALL NOT be used in decimal representations; parsers shall not reject leading zeros in hex values.
section: "2.2"
rfc2119_level: SHALL
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
