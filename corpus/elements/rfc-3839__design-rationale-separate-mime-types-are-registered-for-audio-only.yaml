document: rfc-3839
kind: design-rationale
summary: Separate MIME types are registered for audio-only (audio/3gpp) versus any content (video/3gpp) to allow correct content negotiation and identification when files are served over HTTP or included in multi-part documents, without requiring examination of file contents.
