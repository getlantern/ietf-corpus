document: rfc-1516
kind: protocol-element
summary: rptrMonitorPortDataRateMismatches (rptrMonitorPortEntry 13) counts frames received without CollisionEvent, with ActivityDuration > ValidPacketMinTime, and a detectably mismatched data rate relative to the local transmit frequency. The threshold for mismatch detection is vendor-specific.
