summary: 'The Decision Process runs in three sequential phases: Phase 1 calculates degree of preference for external routes and advertises best to internal peers; Phase 2 selects the best route per destination and installs it in the Loc-RIB; Phase 3 disseminates Loc-RIB routes to external peers with optional aggregation.'
