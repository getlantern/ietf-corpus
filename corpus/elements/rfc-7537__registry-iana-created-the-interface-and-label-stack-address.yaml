summary: 'IANA created the ''Interface and Label Stack Address Types'' registry for MPLS LSP Ping. Values 0-250 and 255 require Standards Action; 251-254 are Experimental Use. Initial values: 0 (Reserved), 1 (IPv4 Numbered), 2 (IPv4 Unnumbered), 3 (IPv6 Numbered), 4 (IPv6 Unnumbered), all from RFC 4379.'
