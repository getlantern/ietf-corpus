document: rfc-8147
kind: normative-requirement
summary: When the IVS is unable to fulfill a PSAP request (e.g., to send an MSD), it MUST send a metadata/control object containing an <actionResult> element with 'success' set to 'false' and a 'reason' attribute indicating why the request could not be accomplished.
section: "6"
rfc2119_level: MUST
topics:
    - sip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
