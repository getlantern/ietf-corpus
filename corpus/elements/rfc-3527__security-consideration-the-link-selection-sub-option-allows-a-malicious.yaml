document: rfc-3527
kind: security-consideration
summary: The link-selection sub-option allows a malicious DHCP client to perform a more complete address-pool exhaustion attack than without it, since the client is no longer restricted to attacking address pools on its local subnet. This is analogous to the risk introduced by the subnet-selection option (RFC 3011).
section: "4"
topics:
