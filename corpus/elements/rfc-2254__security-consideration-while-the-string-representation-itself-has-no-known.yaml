document: rfc-2254
kind: security-consideration
summary: While the string representation itself has no known security implications, LDAP search filters are interpreted by servers to select entries from which data is retrieved. LDAP servers should take care to protect the data they maintain from unauthorized access.
section: "6"
topics:
