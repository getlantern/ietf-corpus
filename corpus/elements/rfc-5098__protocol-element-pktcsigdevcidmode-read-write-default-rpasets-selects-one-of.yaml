document: rfc-5098
kind: protocol-element
summary: 'pktcSigDevCidMode (read-write, default rpAsETS) selects one of five on-hook caller ID delivery methods: duringRingingETS (FSK/DTMF between first and second ring), dtAsETS (after Dual Tone Alert Signal), rpAsETS (after Ring Pulse), lrAsETS (Line Reversal then DTAS then FSK/DTMF), or lrETS (Line Reversal then FSK/DTMF). Value MUST NOT persist across reboots.'
section: "5"
topics:
    - snmp
    - voip
