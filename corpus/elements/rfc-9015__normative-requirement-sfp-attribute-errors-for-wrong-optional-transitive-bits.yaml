document: rfc-9015
kind: normative-requirement
summary: SFP attribute errors for wrong Optional/Transitive bits, length overruns, missing Hop TLV, or missing Sub-TLV MUST be treated as malformed using treat-as-withdraw (RFC 7606). Unknown TLV types MUST be ignored and message processing MUST continue.
section: 3.2.1
rfc2119_level: MUST
topics:
