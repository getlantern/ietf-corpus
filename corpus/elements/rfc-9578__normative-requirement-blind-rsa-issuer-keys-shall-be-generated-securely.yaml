document: rfc-9578
kind: normative-requirement
summary: Blind RSA Issuer keys SHALL be generated securely (e.g., per FIPS 186-5) and MUST NOT be reused in other protocols. The key identifier is token_key_id = SHA256(DER-encoded SPKI of pkI).
section: "6.5"
rfc2119_level: MUST NOT
topics:
