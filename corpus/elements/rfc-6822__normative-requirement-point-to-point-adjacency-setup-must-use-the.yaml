document: rfc-6822
kind: normative-requirement
summary: Point-to-point adjacency setup MUST use the three-way handshaking procedure defined in RFC 5303 to prevent a non-MI-capable neighbor from prematurely establishing an adjacency based on reception of an IIH with a non-zero IID-TLV.
section: 2.6.2
rfc2119_level: MUST
topics:
    - routing
