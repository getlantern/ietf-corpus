document: rfc-8359
kind: normative-requirement
summary: If the upstream node that signals an Unassigned Upstream Label receives a label with the all-ones pattern or any other unacceptable label in the LABEL object of the Resv message, it MUST issue a ResvErr message with a 'Routing Problem/Unacceptable Label Value' indication.
section: "3.1"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-05"
