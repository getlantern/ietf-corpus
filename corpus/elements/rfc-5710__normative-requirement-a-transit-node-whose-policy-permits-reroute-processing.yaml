document: rfc-5710
kind: normative-requirement
summary: A transit node whose policy permits reroute processing MUST examine incoming PathErr messages and MUST check for any of the three error code/value combinations from Section 2.1. When local repair is possible, standard local repair processing MUST be followed.
section: "2.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
