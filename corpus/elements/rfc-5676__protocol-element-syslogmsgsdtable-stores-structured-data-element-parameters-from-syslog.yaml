document: rfc-5676
kind: protocol-element
summary: syslogMsgSDTable stores structured data element parameters from SYSLOG messages, indexed by (syslogMsgIndex, syslogMsgSDParamIndex, syslogMsgSDID, syslogMsgSDParamName). The relationship to syslogMsgTable ranges from one-to-zero to one-to-many since structured data is optional.
