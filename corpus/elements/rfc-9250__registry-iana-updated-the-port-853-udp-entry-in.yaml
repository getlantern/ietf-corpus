document: rfc-9250
kind: registry
summary: IANA updated the port 853/UDP entry in the Service Name and Transport Protocol Port Number Registry to add DoQ, changing the description to 'DNS query-response protocol run over DTLS or QUIC'. UDP port 853 is now shared between DoD (RFC 8094) and DoQ; QUIC version 1 can coexist with DTLS on the same port via the second most significant bit in the UDP payload.
section: "8.2"
topics:
    - dns
    - quic
    - registry
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
