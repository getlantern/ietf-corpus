document: rfc-2290
kind: interoperability-note
summary: 'This specification updates RFC 2002 Appendix B behavior: a mobile node connecting to a foreign link SHOULD send Request(IP=0) rather than Request(IP=home) when falling back to IP-Address-only negotiation, since the peer might have no means for assigning addresses other than IPCP.'
