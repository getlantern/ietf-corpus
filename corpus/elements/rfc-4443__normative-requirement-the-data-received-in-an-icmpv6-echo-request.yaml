document: rfc-4443
kind: normative-requirement
summary: The data received in an ICMPv6 Echo Request message MUST be returned entirely and unmodified in the ICMPv6 Echo Reply message. The source address of an Echo Reply to a unicast Echo Request MUST be the same as the destination address of that Echo Request.
section: "4.2"
rfc2119_level: MUST
topics:
    - ip
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-22"
