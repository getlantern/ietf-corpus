document: rfc-2646
kind: normative-requirement
summary: A sequence of quoted lines of the same quote depth SHOULD be encoded as a paragraph. If a receiving agent reformats quoted flowed lines, the lines SHOULD be de-quoted, reformatted, and then re-quoted using the original quote depth.
section: "4.5"
rfc2119_level: SHOULD
topics:
    - email
