document: rfc-2935
kind: normative-requirement
summary: If a secure connection is required or desired, a secure channel that both the HTTP server and client support MUST be used. Examples include SSL version 3 or TLS (RFC 2246).
section: "3"
rfc2119_level: MUST
topics:
