document: rfc-2911
kind: security-consideration
summary: 'IPP security relies on Transport Layer Security (TLS) [RFC2246] for message privacy and integrity. The ''uri-security-supported'' Printer attribute indicates the security mechanism per URI. Three deployment scenarios are identified: client and server in the same security domain, different security domains, and print-by-reference (Printer fetches document from third-party URI).'
section: "8"
topics:
