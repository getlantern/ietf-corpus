document: rfc-8198
kind: interoperability-note
summary: 'Aggressive negative caching changes cache indexing: in addition to exact QNAME/QCLASS/QTYPE/CD-bit lookups, the validator checks whether any cached validated NSEC record covers the sought record. Synthesized negative answers must not be returned when the CD bit was set on the incoming query.'
section: A
topics:
    - dns
