document: rfc-9309
kind: normative-requirement
summary: To evaluate if access to a URI is allowed, a crawler MUST match paths in 'allow' and 'disallow' rules against the URI starting with the first octet of the path; the most specific match (most octets) MUST be used.
section: 2.2.2
rfc2119_level: MUST
topics:
    - http
