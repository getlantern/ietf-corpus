document: rfc-7166
kind: protocol-element
summary: The AT-bit is defined in the OSPFv3 Options field (bit position 0x000400) to indicate the presence of an Authentication Trailer. OSPFv3 routers MUST set the AT-bit in Hello and Database Description packets to signal that all packets on the link will include an Authentication Trailer.
section: "2.1"
topics:
    - routing
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
