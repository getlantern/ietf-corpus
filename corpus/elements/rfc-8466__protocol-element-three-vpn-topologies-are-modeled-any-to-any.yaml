document: rfc-8466
kind: protocol-element
summary: 'Three VPN topologies are modeled: any-to-any (all sites communicate freely, single RT; default), Hub-and-Spoke (Spokes reach only Hubs, two RTs), and Hub-and-Spoke Disjoint (Hubs cannot communicate with each other, at least two RTs). Route Target allocation is performed by the management system.'
section: 5.2.2
