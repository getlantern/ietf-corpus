document: rfc-2856
kind: protocol-element
summary: CounterBasedGauge64 is a textual convention defining a 64-bit gauge using Counter64 syntax. It represents a non-negative integer that may increase or decrease between 0 and 2^64-1, clamping at its maximum or minimum when the modeled information exceeds those bounds.
