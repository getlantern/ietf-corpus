document: rfc-3776
kind: security-consideration
summary: SA outer-header destination updates MUST only be performed based on Binding Updates received and protected by IPsec; allowing such modifications from other sources (correspondent-node BUs or open API access) creates security vulnerabilities enabling traffic hijacking.
section: "4.3"
topics:
    - ipsec
    - mobility
    - security
