document: rfc-5465
kind: protocol-element
summary: The UPDATE return option for SEARCH/SORT (RFC 5267) is extended to allow specifying fetch attributes to be returned when a new message is added to the search context. The EXISTS response MUST precede any FETCH responses, which together MUST precede the ESEARCH response.
