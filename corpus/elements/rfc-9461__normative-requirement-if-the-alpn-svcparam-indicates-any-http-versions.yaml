document: rfc-9461
kind: normative-requirement
summary: If the "alpn" SvcParam indicates any HTTP versions (e.g., "h2", "h3"), the record indicates DoH support and the "dohpath" key MUST be present. All SvcParamKeys valid for HTTPS records are also permissible and apply to the resulting HTTP connection.
section: "4.1"
rfc2119_level: MUST
topics:
    - dns
    - http
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-06"
