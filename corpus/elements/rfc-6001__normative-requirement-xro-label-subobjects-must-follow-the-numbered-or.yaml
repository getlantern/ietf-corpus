kind: normative-requirement
summary: XRO Label subobjects MUST follow the numbered or unnumbered interface subobjects to which they refer and, when present, MUST also follow the Switching Capability subobject. The corresponding label values MUST be compatible with the SC capability to be explicitly excluded.
