document: rfc-4466
kind: security-consideration
summary: Extensions to IMAP commands permitted in NOT AUTHENTICATED state are particularly sensitive because the attacker community is larger before authentication and some servers run with elevated privileges in that state. This document does not extend any NOT AUTHENTICATED commands; future extensions to such commands should favor simplicity over extensibility.
section: "4"
topics:
