document: rfc-2581
kind: interoperability-note
summary: The experimental extension in RFC 2414 allows IW = min(4*SMSS, max(2*SMSS, 4380 bytes)) and RW = min(IW, cwnd), but this is explicitly NOT part of the standard defined by RFC 2581; implementations conforming to this document must use IW <= 2*SMSS.
section: "3.1"
topics:
