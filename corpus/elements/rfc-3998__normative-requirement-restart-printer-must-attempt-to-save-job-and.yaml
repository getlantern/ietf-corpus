document: rfc-3998
kind: normative-requirement
summary: Restart-Printer MUST attempt to save job and printer information before re-initializing. After restart, printer-state MUST be initialized to 'idle', state reasons cleared, and printer-is-accepting-jobs set to 'true'. Clients SHOULD first try Deactivate-Printer to minimize disruption, as Restart-Printer may have drastic consequences.
section: 3.5.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
