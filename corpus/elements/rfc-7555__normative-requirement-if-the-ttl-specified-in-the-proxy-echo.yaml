document: rfc-7555
kind: normative-requirement
summary: If the TTL specified in the Proxy Echo Parameters TLV is outside the range [1,255], the Return Code MUST be set to 17 ('Proxy Ping parameters need to be modified') and, unless Reply Mode is 1, an MPLS Proxy Ping Reply SHOULD be sent.
section: "3.2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
