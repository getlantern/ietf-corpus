document: rfc-7636
kind: design-rationale
summary: The 'plain' transformation method exists solely for compatibility with existing deployments and constrained environments that cannot perform SHA-256 hashing. It provides no protection against eavesdroppers who can observe the authorization request, unlike S256.
section: "4.2"
