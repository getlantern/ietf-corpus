document: rfc-5555
kind: protocol-element
summary: The IPv4 Address Acknowledgement Option (Type 30) is carried in the binding acknowledgement mobility header. It contains a Status field (0–127 success, 128+ failure), a Pref-len field for the allocated prefix length, and the IPv4 home address. Defined status codes include 128 (unspecified failure), 130 (incorrect address), 131 (invalid address), 132 (dynamic allocation unavailable), and 133 (prefix allocation unauthorized).
section: 3.2.1
topics:
    - mobility
    - ip
