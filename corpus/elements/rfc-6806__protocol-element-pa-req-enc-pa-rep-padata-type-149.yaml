document: rfc-6806
kind: protocol-element
summary: PA-REQ-ENC-PA-REP (padata type 149) is sent by clients in AS requests (and optionally TGS requests) to indicate support for the FAST negotiation mechanism. Its value SHOULD be empty and MUST be ignored by the KDC upon receipt.
