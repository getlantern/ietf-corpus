document: rfc-3281
kind: protocol-element
summary: The Audit Identity extension (id-pe-ac-auditIdentity, { id-pe 4 }) carries an opaque 1-to-20 octet OCTET STRING for audit/logging that does not directly reveal holder identity. This extension MUST be critical when present, allowing tracking without identification unless the AC issuer cooperates.
section: 4.3.1
topics:
    - pkix
    - security
    - privacy
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-25"
