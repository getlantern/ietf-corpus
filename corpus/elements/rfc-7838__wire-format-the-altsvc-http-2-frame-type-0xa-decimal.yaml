kind: wire-format
summary: 'The ALTSVC HTTP/2 frame (type 0xa, decimal 10) payload contains: Origin-Len (16-bit unsigned integer), an optional Origin field (ASCII serialization of an origin), and Alt-Svc-Field-Value (remaining octets, identical to the Alt-Svc header field value). The frame defines no flags.'
