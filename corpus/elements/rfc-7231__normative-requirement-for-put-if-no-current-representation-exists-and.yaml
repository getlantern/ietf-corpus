document: rfc-7231
kind: normative-requirement
summary: 'For PUT: if no current representation exists and PUT creates one, the origin server MUST send 201 (Created); if an existing representation is successfully modified, the server MUST send 200 (OK) or 204 (No Content).'
section: 4.3.4
rfc2119_level: MUST
topics:
