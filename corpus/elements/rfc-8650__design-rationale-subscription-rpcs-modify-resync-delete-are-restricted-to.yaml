document: rfc-8650
kind: design-rationale
summary: Subscription RPCs (modify, resync, delete) are restricted to the same RESTCONF username that invoked 'establish-subscription' to preserve user privacy, with exceptions allowed for administrators needing to manage other users' subscriptions.
section: "3.4"
topics:
