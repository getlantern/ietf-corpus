document: rfc-6463
kind: protocol-element
summary: The Redirect option is returned by the rfLMA in a PBA to convey the unicast address of the assigned r2LMA. The address family of the r2LMA address MUST match the transport family currently used between the MAG and rfLMA, and there can be at most one Redirect option per PBA.
section: "4.2"
topics:
    - mobility
