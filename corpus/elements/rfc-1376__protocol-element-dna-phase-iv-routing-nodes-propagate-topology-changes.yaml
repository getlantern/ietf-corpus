summary: DNA Phase IV Routing nodes propagate topology changes immediately via Level 1 and Level 2 Routing messages with a 1-second minimum delay between updates. They also periodically retransmit complete Level 1 and Level 2 distance vectors to guard against data corruption and packet loss.
