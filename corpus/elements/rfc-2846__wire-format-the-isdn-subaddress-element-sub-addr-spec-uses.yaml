document: rfc-2846
kind: wire-format
summary: The ISDN subaddress element sub-addr-spec uses the separator "/ISUB=" (case INSENSITIVE) followed by isub-addr, which is 1*( DIGIT ) or 1*( DIGIT / written-sep ). The written-sep is allowed only to enhance human readability.
