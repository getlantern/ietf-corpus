document: rfc-2359
kind: protocol-element
summary: The UID EXPUNGE command permanently removes from the currently selected mailbox all messages that both have the \Deleted flag set AND have a UID included in the specified message set. Messages lacking \Deleted or not matching the UID set are unaffected.
section: "4.1"
topics:
    - email
