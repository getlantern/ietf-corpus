document: rfc-1832
kind: design-rationale
summary: XDR intentionally lacks bit fields, bitmaps, and packed decimals because its scope is limited to the most common data types of high-level languages (C, Pascal), not a universal encoding for all existing protocols. Extensions for variable block sizes and byte orders would be needed to describe protocols like TCP.
section: "3.20"
