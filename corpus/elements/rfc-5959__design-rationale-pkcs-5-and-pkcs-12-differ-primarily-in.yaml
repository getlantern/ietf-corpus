summary: 'PKCS #5 and PKCS #12 differ primarily in their password encoding: PKCS #5 uses ASCII encoding while PKCS #12 uses Unicode encoding as specified in Section B.1 of PKCS #12. RFC 2898 recommends PBES2 for new specifications over PBES1.'
