document: rfc-9015
kind: normative-requirement
summary: A BGP UPDATE containing one or more SFIRs MUST include a tunnel encapsulation attribute (RFC 9012), and that attribute MUST contain sufficient information to allow the advertising SFF to identify the overlay or VPN network of a received packet.
section: "3.1"
rfc2119_level: MUST
topics:
    - bgp
    - routing
