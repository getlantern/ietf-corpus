document: rfc-3543
kind: normative-requirement
summary: Upon receipt of an authenticated revocation message, the receiving agent MUST check the 'A' bit and Revocation Identifier for replay. It MUST also check that the message is not a reflection of a revocation it sent. If the packet is a replay, the revocation message MUST be silently discarded.
section: "3.5"
rfc2119_level: MUST
topics:
    - mobility
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
