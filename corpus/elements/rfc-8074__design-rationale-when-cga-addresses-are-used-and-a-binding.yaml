document: rfc-8074
kind: design-rationale
summary: When CGA addresses are used and a binding collision is detected, preference should be given to the anchor that carries verifiable CGA credentials (CGA parameters and RSA options), because CGA cryptographic verification provides stronger assurance than arrival order alone.
