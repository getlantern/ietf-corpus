document: rfc-6165
kind: design-rationale
summary: Layer-2 routing technologies such as RBridges, 802.1aq, and OTV encapsulate classical Layer-2 packets with an outer header and route them using IS-IS link state PDUs carrying Layer-2 addresses. This document provides the common IS-IS TLV infrastructure these technologies share.
