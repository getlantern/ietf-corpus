document: rfc-1490
kind: protocol-element
summary: The Network Level Protocol ID (NLPID) field, administered by ISO and CCITT per ISO/IEC TR 9577, identifies the encapsulation or protocol following it. A NLPID of 0x00 (Null Network Layer) is invalid under this encapsulation because it is indistinguishable from a pad octet.
