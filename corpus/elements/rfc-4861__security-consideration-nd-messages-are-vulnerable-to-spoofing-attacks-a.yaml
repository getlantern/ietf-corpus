document: rfc-4861
kind: security-consideration
summary: 'ND messages are vulnerable to spoofing attacks: a malicious node can forge Router Advertisements, Neighbor Advertisements, or Redirect messages to perform man-in-the-middle or denial-of-service attacks. The Hop Limit 255 check prevents off-link attackers but cannot prevent on-link attackers.'
section: "11.1"
topics:
