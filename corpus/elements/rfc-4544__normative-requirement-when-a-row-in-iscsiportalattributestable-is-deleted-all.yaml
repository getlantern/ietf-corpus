document: rfc-4544
kind: normative-requirement
summary: When a row in iscsiPortalAttributesTable is deleted, all connections associated with that portal are terminated — either immediately or via clean shutdown per RFC 3720. An outbound connection matches if iscsiCxnLocalAddr matches iscsiPortalAddr; an inbound connection also requires iscsiCxnLocalPort to match iscsiTargetPortalPort.
section: "6.4"
rfc2119_level: MUST
topics:
    - snmp
    - tcp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
