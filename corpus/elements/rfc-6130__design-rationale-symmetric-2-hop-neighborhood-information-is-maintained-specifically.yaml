document: rfc-6130
kind: design-rationale
summary: Symmetric 2-hop neighborhood information is maintained specifically to enable MANET routing protocols to employ relay set reductions (e.g., MPR selection) for efficient network-wide flooding, as described in RFC 3626 and RFC 5449. This is the primary motivation for NHDP's 2-hop discovery.
section: "1.1"
topics:
    - routing
    - mobility
