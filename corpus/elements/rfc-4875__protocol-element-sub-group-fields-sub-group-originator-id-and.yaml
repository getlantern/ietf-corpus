document: rfc-4875
kind: protocol-element
summary: Sub-Group fields (Sub-Group Originator ID and Sub-Group ID) are added to SENDER_TEMPLATE and FILTER_SPEC objects to represent a portion of a P2MP LSP's signaling state, disambiguating multiple Path messages for the same P2MP LSP. The Sub-Group Originator ID is set to the TE Router ID of the originating LSR and is globally unique.
section: "4.3"
topics:
    - mpls
    - routing
