document: rfc-5934
kind: protocol-element
summary: 'The TargetIdentifier in TAMPMsgRef allows a TAMP message to address: a specific list of hardware modules (by OID type and serial number or range), one or more community OIDs, all modules (NULL), a URI, or an AnotherName. Implementations MUST support the allModules option.'
section: "4.1"
topics:
    - security
