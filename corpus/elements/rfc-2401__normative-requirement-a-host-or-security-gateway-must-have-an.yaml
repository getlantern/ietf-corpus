document: rfc-2401
kind: normative-requirement
summary: A host or security gateway MUST have an administrative interface that allows configuration of the address of a relevant security gateway for destination addresses requiring its use, including authentication information and backup gateway information needed to verify the gateway's authorization to represent the destination host.
section: 4.6.3
rfc2119_level: MUST
topics:
    - ipsec
    - security
