document: rfc-7589
kind: normative-requirement
summary: The TLS client MUST send the TLS ClientHello message to begin the TLS handshake. Client and server identity verification MUST be done before the NETCONF <hello> message is sent.
section: "2"
rfc2119_level: MUST
