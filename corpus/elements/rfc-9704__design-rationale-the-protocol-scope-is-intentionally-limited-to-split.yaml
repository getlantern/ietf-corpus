document: rfc-9704
kind: design-rationale
summary: The protocol scope is intentionally limited to split-horizon views authorized by the domain owner; DNS filtering by any other entity is explicitly not enabled, preserving the principle that only the domain owner can authorize alternative resolution of their names.
section: "3"
