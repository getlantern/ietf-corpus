summary: 'The DSMAP/DDMAP Non-IP address format is 12 octets: MTU (2 octets), Address Type (1 octet, value 5), DS Flags (1 octet), Ingress IF_Num (4 octets), Egress IF_Num (4 octets), followed by Multipath Type, Depth Limit, and Multipath Length fields.'
