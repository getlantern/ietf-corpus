document: rfc-9806
kind: errata
summary: RFC 9806 resolves Erratum ID 7987 against RFC 7866, which reported that RFC 7866 used 'application/rs-metadata' while RFC 7865 (the normative metadata specification) used 'application/rs-metadata+xml'. Every instance of 'application/rs-metadata' in RFC 7866 is replaced with 'application/rs-metadata+xml'.
section: "1"
topics:
    - sip
    - realtime
