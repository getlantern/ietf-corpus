document: rfc-9528
kind: normative-requirement
summary: After sending an error message the sender MUST abort the EDHOC session. Error messages in EDHOC are always fatal. Error code 0 MUST NOT be used in the message exchange; if received, the endpoint MUST abort the session and MUST NOT reply with another error.
section: "6"
rfc2119_level: MUST
topics:
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
