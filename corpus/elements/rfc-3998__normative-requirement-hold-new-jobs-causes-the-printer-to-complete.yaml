document: rfc-3998
kind: normative-requirement
summary: Hold-New-Jobs causes the Printer to complete all current 'pending' and 'processing' jobs but place any subsequently created jobs into 'pending-held' with 'job-held-on-create' in job-state-reasons. The Printer MUST accept the request in any state, MUST NOT change printer-state, and MUST add 'hold-new-jobs' to printer-state-reasons.
section: 3.3.1
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
