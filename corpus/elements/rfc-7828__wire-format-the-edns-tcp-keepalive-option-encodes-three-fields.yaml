summary: 'The edns-tcp-keepalive option encodes three fields: OPTION-CODE (2 octets, value 11), OPTION-LENGTH (2 octets, value 0 if TIMEOUT omitted or 2 if present), and an optional TIMEOUT field (2 octets, network byte order) specifying the idle timeout in units of 100 milliseconds.'
