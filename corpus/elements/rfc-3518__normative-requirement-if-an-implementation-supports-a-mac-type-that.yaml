document: rfc-3518
kind: normative-requirement
summary: If an implementation supports a MAC Type that is the higher-numbered format of that MAC Type, then it MUST also support the lower-numbered format of that MAC Type (e.g., FDDI canonical requires FDDI non-canonical support).
section: "4.2"
rfc2119_level: MUST
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
