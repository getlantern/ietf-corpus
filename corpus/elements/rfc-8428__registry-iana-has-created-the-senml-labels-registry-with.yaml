document: rfc-8428
kind: registry
summary: IANA has created the 'SenML Labels' registry with 15 initial entries (Table 7) covering all base and regular SenML fields, including their string label, CBOR integer label, JSON type, XML type, and EXI schema ID. New base labels MUST start with 'b'; new Value labels MUST include 'Value' in their long-form name. New entries require Expert Review.
