document: rfc-5651
kind: design-rationale
summary: LCT does not specify which congestion control protocol to use because different applications (content delivery vs. streaming) have different congestion control requirements — content delivery strives to use all available bandwidth while streaming may maintain a constant rate. Mandating a specific scheme would limit applicability.
section: "2"
topics:
    - congestion
    - multicast
