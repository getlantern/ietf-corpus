document: rfc-3939
kind: normative-requirement
summary: For an international external call, the calling party's number MUST be the full international number per E.164 (CC + NDC + SN). Other information such as prefixes or the '+' symbol MUST NOT be included.
section: "3.2"
rfc2119_level: MUST NOT
