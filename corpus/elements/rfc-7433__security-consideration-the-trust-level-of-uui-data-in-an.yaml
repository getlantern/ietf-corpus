document: rfc-7433
kind: security-consideration
summary: The trust level of UUI data in an INVITE equals the trust level of the INVITE itself. If a border element (proxy or B2BUA) removes a History-Info header field containing a User-to-User parameter, the consuming UA may not be able to identify the source of the UUI data at the SIP level.
section: "7"
topics:
    - sip
    - security
    - realtime
