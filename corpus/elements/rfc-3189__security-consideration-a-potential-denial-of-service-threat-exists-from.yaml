document: rfc-3189
kind: security-consideration
summary: A potential denial-of-service threat exists from flooding a receiver with too many packets. Network-layer authentication may discard packets from undesired sources, though the authentication processing cost itself may be prohibitive. DV encoding does not exhibit significant non-uniform decoder load, mitigating the computational DoS vector.
