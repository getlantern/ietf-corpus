document: rfc-3920
kind: protocol-element
summary: A Jabber Identifier (JID) consists of an optional node identifier (before '@'), a required domain identifier, and an optional resource identifier (after '/'), forming [node@]domain[/resource]. JIDs are the universal addressing scheme for all XMPP entities and are consistent with RFC 2396 URI syntax.
section: "3.1"
