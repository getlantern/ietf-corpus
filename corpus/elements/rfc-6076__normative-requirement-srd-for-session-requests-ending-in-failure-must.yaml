document: rfc-6076
kind: normative-requirement
summary: SRD for session requests ending in failure MUST NOT be combined in the same result with successful requests, because the durations associated with success and failure will vary substantially. The output value MUST indicate whether it covers successful or failed session requests.
section: "4.3"
rfc2119_level: MUST NOT
topics:
    - realtime
    - voip
    - measurement
