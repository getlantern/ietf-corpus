document: rfc-1220
kind: design-rationale
summary: The PPP link is modeled as a standard IEEE 802.1 LAN interface rather than a separate serial-link mode, adopting the first of two competing IEEE 802.1 Interworking Committee models, because it simplifies the specification while still accommodating the ring-number-visibility requirements of Source Routing via optional BNCP options.
section: "4.2"
