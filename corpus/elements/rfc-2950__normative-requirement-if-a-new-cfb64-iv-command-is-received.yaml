document: rfc-2950
kind: normative-requirement
summary: If a new CFB64_IV command is received while encryption is enabled, the encryption machine must be re-initialized immediately after the command using the new initial vector and the keyid from the last START command.
section: "3"
rfc2119_level: MUST
topics:
    - crypto
