document: rfc-7023
kind: normative-requirement
summary: Upon exit from the PW transmit defect state, if PE1 has a Down MEP with CCM enabled, the MEP MUST clear the RDI bit in CCM frames or send a Status TLV with interface up to CE1, and PE1 MUST clear the FDI to PE2 if applicable.
section: "6.4"
rfc2119_level: MUST
topics:
