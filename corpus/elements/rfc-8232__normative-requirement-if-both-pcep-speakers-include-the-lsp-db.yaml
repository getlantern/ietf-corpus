document: rfc-8232
kind: normative-requirement
summary: If both PCEP speakers include the LSP-DB-VERSION TLV in the OPEN object and the TLV values match, the PCC MAY skip State Synchronization. Otherwise, the PCC MUST perform full State Synchronization or incremental State Synchronization.
section: "3.2"
rfc2119_level: MUST
topics:
    - routing
    - mpls
