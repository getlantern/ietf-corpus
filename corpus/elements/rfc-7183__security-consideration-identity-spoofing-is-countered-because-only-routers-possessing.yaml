document: rfc-7183
kind: security-consideration
summary: Identity spoofing is countered because only routers possessing the shared secret key can generate a valid ICV TLV. However, when using shared keys, individual routers cannot be distinguished, so a compromised router with valid keys may still spoof another router's identity.
section: 8.1.1
topics:
    - security
    - routing
