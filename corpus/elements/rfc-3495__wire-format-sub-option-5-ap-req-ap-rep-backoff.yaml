document: rfc-3495
kind: wire-format
summary: 'Sub-option 5 (AP-REQ/AP-REP Backoff and Retry) has a fixed length of 12 octets: 4 octets nominal timeout (seconds, uint32), 4 octets maximum timeout (seconds, uint32), 4 octets maximum retry count (uint32). Note the nominal timeout unit is seconds, unlike sub-option 4''s milliseconds.'
