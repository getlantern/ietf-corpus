document: rfc-3414
kind: design-rationale
summary: The snmpEngineBoots/snmpEngineTime approach for timeliness was chosen to avoid any dependency on a real-time clock that ticks while the engine is powered off or on NTP. On each reboot, snmpEngineBoots is incremented from non-volatile storage and snmpEngineTime is reset to zero.
section: 2.2.2
topics:
    - snmp
    - security
