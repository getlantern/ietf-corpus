document: rfc-2931
kind: design-rationale
summary: SIG(0) provides transaction and request authentication for DNS that the regular SIG, KEY, and NXT RRs do not provide. Standard DNSSEC data-origin services offer no protection for glue records, message headers, or overall response integrity.
section: "2"
topics:
