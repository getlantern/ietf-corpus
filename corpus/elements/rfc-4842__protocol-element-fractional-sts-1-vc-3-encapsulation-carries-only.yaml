document: rfc-4842
kind: protocol-element
summary: Fractional STS-1 (VC-3) encapsulation carries only selected VTs within an STS-1 container by removing fixed column bytes (columns 30 and 59) and bytes of unselected VTs. An optional 4-byte header extension adds a 28-bit Equipped Bit Mask (EBM) divided into 7 groups of 4 bits, one per VTG, where each bit indicates whether a specific VT is equipped and carried in the payload.
section: 11.2.1
topics:
    - realtime
