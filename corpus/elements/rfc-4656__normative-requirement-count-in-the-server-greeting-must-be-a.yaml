document: rfc-4656
kind: normative-requirement
summary: Count in the Server Greeting MUST be a power of 2 and MUST be at least 1024; it SHOULD be increased as computing power grows. Salt MUST be generated pseudo-randomly, independently of all other protocol values. These are parameters for PBKDF2 key derivation.
section: "3.1"
rfc2119_level: MUST
topics:
    - measurement
    - crypto
    - security
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
