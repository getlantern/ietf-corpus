document: rfc-8181
kind: protocol-element
summary: The <list/> operation allows the client to request a complete listing of objects the server believes the client has published; the reply contains zero or more PDUs each conveying the URI and hash of one published object. It is intended primarily for synchronization recovery.
section: "2.3"
topics:
    - security
