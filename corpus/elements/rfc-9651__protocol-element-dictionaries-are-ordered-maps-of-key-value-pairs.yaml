document: rfc-9651
kind: protocol-element
summary: Dictionaries are ordered maps of key/value pairs where keys follow the same syntax as Parameter keys and values are Items or Inner Lists (both optionally parameterized). Duplicate keys result in all but the last instance being ignored. Recipients MUST ignore members with undefined or unknown keys unless the field specification explicitly disallows them.
section: "3.2"
topics:
