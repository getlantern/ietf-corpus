document: rfc-3329
kind: normative-requirement
summary: If 'tls' is chosen as the security mechanism, the client MUST treat the SIP URI scheme as if it were sips. If the URI scheme is not sip, the request MUST be sent using TLS.
section: "2.4"
rfc2119_level: MUST
topics:
