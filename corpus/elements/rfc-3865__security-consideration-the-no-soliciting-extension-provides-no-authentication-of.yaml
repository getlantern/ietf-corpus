document: rfc-3865
kind: security-consideration
summary: The NO-SOLICITING extension provides no authentication of senders and does not address consent. Absence of the extension on a receiving MTA SHALL NOT be interpreted as consent to receive solicitations; non-use must not imply permission.
section: "3"
rfc2119_level: SHALL NOT
topics:
    - email
    - security
