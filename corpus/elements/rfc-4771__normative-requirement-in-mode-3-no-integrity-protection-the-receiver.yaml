document: rfc-4771
kind: normative-requirement
summary: In mode 3 (no integrity protection), the receiver's SRTP layer SHOULD ignore the ROC from the packet if the application layer indicates the local ROC is already synchronized; the received ROC still MUST be removed from the packet before further processing.
section: "3"
rfc2119_level: SHOULD
topics:
