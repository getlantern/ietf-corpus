document: rfc-5151
kind: design-rationale
summary: For failure of a border node when stitching or nesting is in use, the PLR must be the upstream domain entry point and the MP must be the downstream domain exit point, because the failed node is the start or end of a stitching segment or H-LSP. For contiguous LSPs, normal PLR and MP selection applies without these constraints.
section: 5.1.3
topics:
    - mpls
    - routing
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
