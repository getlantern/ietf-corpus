document: rfc-6876
kind: protocol-element
summary: 'PT-TLS uses a vendor-namespaced message type scheme: a 24-bit SMI Private Enterprise Number (Vendor ID) combined with a 32-bit Message Type. IETF namespace types use Vendor ID 0; vendor ID 0xffffff and Message Type 0xffffffff are reserved and MUST NOT be sent.'
section: "3.5"
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-21"
