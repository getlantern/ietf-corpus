document: rfc-8920
kind: design-rationale
summary: Zero-length Application Identifier Bit Masks (both SABM and UDABM absent) mean the link attributes are permitted for use by any standard or user-defined application. This is intentional to allow legacy-style shared advertisements, but requires care when introducing new applications that infer enablement from attribute presence (e.g., RSVP-TE).
section: "5"
topics:
    - routing
