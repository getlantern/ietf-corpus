document: rfc-8912
kind: interoperability-note
summary: The 16-bit DNS Identification field in DNS queries limits the number of simultaneous outstanding DNS queries to 65,535 from a single Src address during stress testing, which implementors must account for when designing concurrent measurement campaigns.
section: 6.3.1
topics:
    - measurement
    - dns
