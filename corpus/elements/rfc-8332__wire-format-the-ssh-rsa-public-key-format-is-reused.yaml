document: rfc-8332
kind: wire-format
summary: 'The ''ssh-rsa'' public key format is reused unchanged for both new algorithms: a string ''ssh-rsa'', followed by mpint e and mpint n. The encoded string ''ssh-rsa'' is retained even when the algorithm name is ''rsa-sha2-256'' or ''rsa-sha2-512''.'
