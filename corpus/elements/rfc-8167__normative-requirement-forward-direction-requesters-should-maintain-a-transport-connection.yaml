document: rfc-8167
kind: normative-requirement
summary: Forward-direction Requesters SHOULD maintain a transport connection as long as there is the possibility that the connection peer can send reverse-direction requests, to avoid leaving the reverse-direction Requester unable to retransmit.
section: "5.4"
rfc2119_level: SHOULD
