document: rfc-8349
kind: design-rationale
summary: The model distinguishes 'system-controlled entries' (created by the server in operational state regardless of configuration) from 'user-controlled entries' (created as a direct result of configuration). Deleting a system-controlled entry from the intended configuration removes only its supplemental configuration, not the operational state entry itself.
section: "4.1"
topics:
    - yang
    - netconf
