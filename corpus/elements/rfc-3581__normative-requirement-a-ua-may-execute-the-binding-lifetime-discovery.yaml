document: rfc-3581
kind: normative-requirement
summary: A UA MAY execute the binding lifetime discovery algorithm (RFC 3489 Section 10.2) to determine NAT binding lifetime. If longer than 1 minute, the client SHOULD increase retransmission intervals up to half the discovered lifetime; if shorter, it SHOULD decrease to half the discovered lifetime.
section: "3"
rfc2119_level: MAY
topics:
    - sip
    - nat
    - realtime
