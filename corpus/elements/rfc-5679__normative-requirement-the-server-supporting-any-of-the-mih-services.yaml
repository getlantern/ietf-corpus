document: rfc-5679
kind: normative-requirement
summary: The server supporting any of the MIH services (MIHIS, MIHES, MIHCS) MUST support at least UDP and TCP as transport; SCTP and other transport protocols MAY also be supported.
section: "2.1"
rfc2119_level: MUST
topics:
