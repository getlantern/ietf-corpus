document: rfc-8049
kind: protocol-element
summary: 'Site VPN flavor determines how VPN multiplexing is performed: ''site-vpn-flavor-single'' (one VPN), ''site-vpn-flavor-multi'' (all logical accesses map to the same set of VPNs), ''site-vpn-flavor-sub'' (each logical access maps to a different set of VPNs), and ''site-vpn-flavor-nni'' (option A NNI).'
section: 6.5.1
topics:
    - yang
    - vpn
    - routing
