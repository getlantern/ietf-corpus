document: rfc-5041
kind: protocol-element
summary: 'DDP supports two buffer models: the Tagged Buffer Model, where the Data Sink advertises a named buffer (STag) to the Data Source for remote placement at arbitrary offsets, and the Untagged Buffer Model, where the Data Sink queues anonymous receive buffers consumed in order by incoming DDP Messages.'
