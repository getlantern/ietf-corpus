document: rfc-3915
kind: security-consideration
summary: Redemption of a deleted domain object MUST be restricted to the sponsoring client as authenticated using the mechanisms described in RFC 3730. Any attempt to recover a deleted domain object by any client other than the sponsoring client MUST be rejected with an appropriate EPP authorization error.
section: "8"
rfc2119_level: MUST
topics:
    - security
    - dns
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-16"
