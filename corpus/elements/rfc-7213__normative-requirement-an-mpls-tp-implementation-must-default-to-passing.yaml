document: rfc-7213
kind: normative-requirement
summary: An MPLS-TP implementation MUST default to passing to the MPLS sub-system any MPLS packets received from a point-to-point Ethernet link with the destination MAC address 01-00-5E-90-00-00 (the IANA-allocated MPLS-TP multicast address for point-to-point links).
section: "2"
rfc2119_level: MUST
topics:
    - mpls
    - routing
