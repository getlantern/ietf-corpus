document: rfc-6478
kind: wire-format
summary: The PW Status TLV (type 0x096A, 4-octet Status Code) is transported in the TLV field of the PW OAM message. The first 2 bits of the type field are reserved and MUST be zero on transmit and ignored on receipt (unlike RFC 4447 where those bits carry the 'E' and 'F' bits).
section: "5.2"
topics:
    - mpls
