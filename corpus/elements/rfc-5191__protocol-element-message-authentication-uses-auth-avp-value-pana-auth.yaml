document: rfc-5191
kind: protocol-element
summary: 'Message authentication uses: AUTH AVP value = PANA_AUTH_HASH(PANA_AUTH_KEY, PANA_PDU), where PANA_PDU is the full PANA message (header + payload) with the AUTH AVP Value field initialized to zero. The integrity algorithm is the one negotiated via Integrity-Algorithm AVP in the initial S-bit exchange.'
section: "5.4"
topics:
