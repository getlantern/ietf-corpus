document: rfc-3077
kind: interoperability-note
summary: To ensure interoperability, implementations must agree on a usage profile specifying the MAC format, tunneling mechanism (GRE recommended), and tunnel type indication if GRE is not used. Claiming conformance with the mechanism alone is insufficient.
section: Appendix A
topics:
    - routing
