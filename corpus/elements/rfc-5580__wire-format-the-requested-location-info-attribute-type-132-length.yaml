document: rfc-5580
kind: wire-format
summary: 'The Requested-Location-Info Attribute (Type 132, length 6) carries a 32-bit integer bitmap: CIVIC_LOCATION=1, GEO_LOCATION=2, USERS_LOCATION=4, NAS_LOCATION=8, FUTURE_REQUESTS=16, NONE=32. It is sent by the RADIUS server to specify which location information it requires.'
