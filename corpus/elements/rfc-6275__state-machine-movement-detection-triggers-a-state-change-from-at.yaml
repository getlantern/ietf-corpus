document: rfc-6275
kind: state-machine
summary: 'Movement detection triggers a state change from ''at home'' to ''away from home'': the mobile node detects L2 or L3 handover, forms a new care-of address, sends Binding Update to home agent (home registration), optionally performs return routability with correspondent nodes, then transitions to route-optimized or bidirectional-tunneled communication. Returning home triggers de-registration by sending BU with lifetime=0.'
section: "11.5"
topics:
