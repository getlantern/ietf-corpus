document: rfc-9606
kind: normative-requirement
summary: If a DNS client sees unknown keys in a RESINFO RR type, it MUST silently ignore them. The same rules for keys defined in Section 6.4 of RFC 6763 MUST be followed for RESINFO.
section: "4"
rfc2119_level: MUST
topics:
    - dns
