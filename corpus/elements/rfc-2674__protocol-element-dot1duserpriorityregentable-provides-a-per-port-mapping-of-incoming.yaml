document: rfc-2674
kind: protocol-element
summary: dot1dUserPriorityRegenTable provides a per-port mapping of incoming User Priority (0–7) to a Regenerated User Priority (0–7), applicable only to media that support native User Priority. Default regenerated values equal the incoming values.
