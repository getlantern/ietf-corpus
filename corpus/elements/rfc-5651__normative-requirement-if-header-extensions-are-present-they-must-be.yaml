document: rfc-5651
kind: normative-requirement
summary: If Header Extensions are present, they MUST be processed to ensure they are recognized before performing any congestion control procedure or otherwise accepting a packet. The default action for unrecognized Header Extensions is to ignore them.
section: 5.2.1
rfc2119_level: MUST
topics:
    - multicast
    - congestion
