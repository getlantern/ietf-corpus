document: rfc-2911
kind: security-consideration
summary: Print-URI and Send-URI operations cause the Printer to fetch document data from a third-party URI, making the Printer act as a client to a potentially hostile server. URIs embedded in job and printer attributes may also leak sensitive location information about document origins.
section: 8.1.3
topics:
    - security
