document: rfc-3986
kind: protocol-element
summary: The remove_dot_segments algorithm iteratively processes a path input buffer, removing "./" and "../" prefixes, replacing "/./" with "/", removing the last output segment when "/../" is encountered, and finally removing lone "." or ".." from the buffer. The result is the normalized path.
section: 5.2.4
topics:
    - http
