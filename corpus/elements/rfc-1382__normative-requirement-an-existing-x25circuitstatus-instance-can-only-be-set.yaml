document: rfc-1382
kind: normative-requirement
summary: An existing x25CircuitStatus instance can only be set to startClear, startPvcResetting, or invalid. The values startClear and startPvcResetting will never be returned by an agent. Any attempt to set an unsupported value results in an error.
section: "4"
rfc2119_level: MUST
topics:
    - snmp
