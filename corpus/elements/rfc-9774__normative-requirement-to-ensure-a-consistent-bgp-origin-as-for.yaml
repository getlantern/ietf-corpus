document: rfc-9774
kind: normative-requirement
summary: To ensure a consistent BGP origin AS for aggregate routes, the implementation MUST be configured to truncate the AS_PATH after the right-most instance of the desired origin AS for the aggregate. This is called 'consistent brief' BGP aggregation.
section: "5.2"
rfc2119_level: MUST
topics:
    - bgp
    - routing
