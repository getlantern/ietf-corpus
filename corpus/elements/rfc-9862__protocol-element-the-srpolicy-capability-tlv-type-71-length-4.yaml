summary: 'The SRPOLICY-CAPABILITY TLV (Type 71, Length 4) is carried in the OPEN object and declares peer support for four features via flags: P-flag (Computation Priority), E-flag (Explicit NULL Label Policy), I-flag (Invalidation/Drop-Upon-Invalid), and L-flag (Stateless PCReq/PCRep operation).'
