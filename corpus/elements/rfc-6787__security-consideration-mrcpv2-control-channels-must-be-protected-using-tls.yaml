document: rfc-6787
kind: security-consideration
summary: MRCPv2 control channels MUST be protected using TLS to prevent eavesdropping and tampering. SIP signaling used for rendezvous and session establishment SHOULD also be protected. Servers in controlled environments MAY use plain TCP, but MUST NOT expose plain TCP outside a protected perimeter.
section: "12.2"
topics:
    - security
    - tls
    - realtime
