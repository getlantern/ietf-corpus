document: rfc-2280
kind: normative-requirement
summary: 'When the same peering or route set is covered by multiple policy expressions, the specification-order rule applies: the action of the first matching peering specification is used. Later, more-specific peering entries that are fully subsumed by an earlier entry have no effect.'
section: "6.4"
rfc2119_level: MUST
topics:
    - routing
    - bgp
extracted_by: claude-sonnet-4-6
extracted_at: "2026-05-24"
