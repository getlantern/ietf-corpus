document: rfc-3841
kind: normative-requirement
summary: If a proxy server receives a request with the cancel-directive set to 'no-cancel', it SHOULD NOT CANCEL any outstanding branches upon receipt of a 2xx. It would still send CANCEL on outstanding branches upon receipt of a 6xx.
section: "9.1"
rfc2119_level: SHOULD NOT
topics:
    - sip
    - realtime
