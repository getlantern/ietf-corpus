document: rfc-3202
kind: normative-requirement
summary: When the DLCI does not exist and frsldPvcCtrlStatus is not active(1), the status SHOULD report notReady(3). If frsldPvcCtrlDeleteOnPurge is all(3), all associated rows SHOULD be deleted after the purge interval.
