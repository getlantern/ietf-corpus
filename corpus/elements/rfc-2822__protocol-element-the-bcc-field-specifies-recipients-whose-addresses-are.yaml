document: rfc-2822
kind: protocol-element
summary: The 'Bcc:' field specifies recipients whose addresses are not revealed to other recipients. Implementations may handle 'Bcc:' by either removing the field entirely from all copies, or sending a separate copy with the 'Bcc:' field to blind recipients only; which method is implementation-dependent.
section: 3.6.3
topics:
