document: rfc-1989
kind: design-rationale
summary: Policy suggestions include a K-out-of-N hysteresis algorithm to prevent link bouncing. When quality is poor, closing Network-Layer protocols (e.g., sending IPCP Terminate-Request) while continuing to send LQRs is a suggested recovery approach.
section: "2.10"
