document: rfc-1519
kind: design-rationale
summary: Deploying the new addressing plan before classless inter-domain protocols are available will cause routing tables to temporarily grow faster than baseline, since individual class-C assignments will be visible before aggregation is possible. This deployment sequencing risk must be considered when planning rollout.
section: "2.1"
topics:
