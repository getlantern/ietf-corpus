document: rfc-8019
kind: normative-requirement
summary: Rate limiting for IPv4 SHOULD be done per IP address; for IPv6 it SHOULD be done per /48 or /64 prefix rather than per single IPv6 address, since ISPs assign address blocks to subscribers.
