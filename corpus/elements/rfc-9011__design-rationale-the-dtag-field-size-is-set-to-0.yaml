document: rfc-9011
kind: design-rationale
summary: The DTag field size is set to 0 bits (not used) because a LoRaWAN device cannot interleave several fragmented SCHC datagrams on the same FPort. Multiple SCHC gateways can still be addressed using distinct sets of FPorts.
section: 5.6.1
