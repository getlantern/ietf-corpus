document: rfc-7198
kind: normative-requirement
summary: RTP duplication MUST NOT be used when the primary cause of packet loss is congestion, since duplication worsens congestion. Duplication SHOULD NOT be used where there is a risk of congestion upon duplicating an RTP stream.
section: "7"
rfc2119_level: MUST NOT
topics:
