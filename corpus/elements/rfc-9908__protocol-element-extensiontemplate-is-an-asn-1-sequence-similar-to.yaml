document: rfc-9908
kind: protocol-element
summary: ExtensionTemplate is an ASN.1 SEQUENCE similar to Extension (RFC 5280) but with an OPTIONAL 'extnValue' OCTET STRING. When extnValue is absent, the client is expected to fill in an appropriate extension value; when present, the client SHOULD use the provided value.
section: "3.4"
topics:
    - pkix
    - security
