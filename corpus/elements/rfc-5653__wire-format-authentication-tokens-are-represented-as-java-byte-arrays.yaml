document: rfc-5653
kind: wire-format
summary: Authentication tokens are represented as Java byte arrays. Overloaded GSSContext methods also accept java.io InputStream/OutputStream pairs; callers must ensure streams will not block until a complete single token is available, as only one GSS-API token is processed per invocation.
