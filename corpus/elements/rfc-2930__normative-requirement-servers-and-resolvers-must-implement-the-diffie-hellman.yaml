document: rfc-2930
kind: normative-requirement
summary: Servers and resolvers MUST implement the Diffie-Hellman key agreement mode and the key deletion mode. A server supporting TKEY that receives a TKEY request with an unsupported mode MUST return the BADMODE error.
section: "2.5"
rfc2119_level: MUST
topics:
    - dns
    - crypto
