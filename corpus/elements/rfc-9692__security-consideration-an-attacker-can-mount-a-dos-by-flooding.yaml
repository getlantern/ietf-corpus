document: rfc-9692
kind: security-consideration
summary: An attacker can mount a DoS by flooding a node with TIEs bearing valid-looking but forged origin fingerprints, forcing expensive cryptographic verification. Section 9.8 notes that rate-limiting TIE processing and validating origin fingerprints early in the processing pipeline mitigates this risk.
section: "9.8"
topics:
    - routing
    - security
