document: rfc-9628
kind: normative-requirement
summary: The B bit MUST be set to one if the first payload octet is the beginning of a new VP9 frame; otherwise it MUST NOT be one. The E bit MUST be set to one for the final RTP packet of a VP9 frame; otherwise it is zero.
section: "4.2"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
extracted_by: claude-sonnet-4-6
extracted_at: "2026-07-12"
