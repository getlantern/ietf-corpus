document: rfc-1570
kind: protocol-element
summary: FCS-Alternatives (Configuration Option Type 9) allows negotiating a different FCS format (Null, CCITT 16-bit, or CCITT 32-bit) or eliminating the FCS altogether. It is negotiated independently in each direction and takes effect only during Authentication and Network-Layer Protocol phases.
section: "2.1"
