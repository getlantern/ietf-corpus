document: rfc-4556
kind: protocol-element
summary: The KDC indicates PKINIT support by including an empty PA_PK_AS_REQ element (zero-length OCTET STRING padata-value) in the METHOD-DATA of a KRB-ERROR response. KDCs MUST leave this field empty and clients MUST ignore any value present.
section: "3.4"
topics:
    - security
