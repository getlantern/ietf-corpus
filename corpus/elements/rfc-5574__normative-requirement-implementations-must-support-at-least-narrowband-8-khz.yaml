document: rfc-5574
kind: normative-requirement
summary: Implementations MUST support at least narrowband (8 kHz) encoding and decoding at 8 kbit/s (narrowband mode 3). Support for narrowband at 15 kbit/s (mode 5) is RECOMMENDED, and wideband at 27.8 kbit/s (mode 8) is also RECOMMENDED.
section: "1"
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - voip
