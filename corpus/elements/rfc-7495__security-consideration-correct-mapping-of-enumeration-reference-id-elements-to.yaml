document: rfc-7495
kind: security-consideration
summary: Correct mapping of enumeration reference ID elements to the corresponding SpecIndex is critical; incorrect mappings can result in inaccurate references and distribution of misinformation. Use of enumeration reference IDs from trusted sources is preferred to mitigate this risk.
