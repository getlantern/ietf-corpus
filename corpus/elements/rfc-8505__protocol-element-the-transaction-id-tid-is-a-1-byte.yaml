document: rfc-8505
kind: protocol-element
summary: The Transaction ID (TID) is a 1-byte sequence counter in the EARO that the 6LN increments with each re-registration transaction. The network uses the most recent TID to determine the most recent known location of a mobile 6LN; the same TID MUST be used across simultaneous registrations to multiple 6LRs.
section: "5.2"
topics:
    - ip
    - v6ops
    - mobility
