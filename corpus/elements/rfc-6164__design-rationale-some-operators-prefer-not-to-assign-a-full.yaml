document: rfc-6164
kind: design-rationale
summary: Some operators prefer not to assign a full /64 to each individual point-to-point link for address management reasons; using /127 prefixes allows all point-to-point links to be numbered out of a single /64 or small number of /64s, simplifying address planning.
section: "5.3"
