document: rfc-3503
kind: normative-requirement
summary: A server conforming to section 4.1 or 4.2 that also supports the IMAP ACL extension SHOULD preserve the $MDNSent keyword on COPY even if the client does not have 'w' (write) rights, to prevent duplicate MDN generation. The server MUST still enforce ACL rights for the COPY operation itself.
section: "4.3"
rfc2119_level: SHOULD
topics:
    - email
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-15"
