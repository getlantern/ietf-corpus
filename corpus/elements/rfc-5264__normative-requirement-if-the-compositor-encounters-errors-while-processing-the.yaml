kind: normative-requirement
summary: If the compositor encounters errors while processing the 'application/pidf-diff+xml' document, it MUST reject the request with a 400 (Bad Request) response, and MAY include diagnostics in the body using error condition elements from RFC 5261 Section 5.1.
