document: rfc-8667
kind: wire-format
summary: The LAN-Adj-SID sub-TLV (Type 32, variable length) is used on LAN subnetworks and includes a 1-octet Flags field, 1-octet Weight, a Neighbor System-ID of 'ID Length' octets, and a variable SID/Label/Index. LAN-Adj-SID MUST NOT appear in TLV 141 (inter-AS reachability).
section: 2.2.2
topics:
    - routing
    - mpls
