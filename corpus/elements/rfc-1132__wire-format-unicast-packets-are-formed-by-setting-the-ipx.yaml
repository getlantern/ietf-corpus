document: rfc-1132
kind: wire-format
summary: Unicast packets are formed by setting the IPX header Packet Type to 0x04, with Destination Network and Destination Node taken from ARP resolution, and the Immediate Address of the IPX Event Control Block set to the physical address of the destination node or the appropriate IPX bridge.
section: Unicast Addresses
