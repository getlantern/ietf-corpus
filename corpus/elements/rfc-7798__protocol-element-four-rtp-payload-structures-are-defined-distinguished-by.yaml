kind: protocol-element
summary: 'Four RTP payload structures are defined, distinguished by the Type field in the payload header: single NAL unit packet (Type 1–47), Aggregation Packet (AP, Type=48), Fragmentation Unit (FU, Type=49), and PACI carrying RTP packet (Type=50). A receiver identifies the structure type from the Type field.'
