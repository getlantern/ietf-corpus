document: rfc-4025
kind: interoperability-note
summary: 'The IPSECKEY RR replaces the functionality of KEY RR sub-type #4, which was obsoleted by RFC 3445. Public key encodings are inherited from the KEY RR format (algorithm-specific portion after the first four octets), ensuring consistency with existing DNSSEC algorithm definitions.'
section: "2.6"
topics:
    - dns
    - ipsec
