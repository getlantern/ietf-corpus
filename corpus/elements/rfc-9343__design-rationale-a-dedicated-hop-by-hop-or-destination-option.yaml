document: rfc-9343
kind: design-rationale
summary: A dedicated Hop-by-Hop or Destination Option was chosen over reusing an existing Extension Header, the IPv6 destination address, or the Flow Label. Reusing existing headers is non-optimized; using the destination address is expensive; using the Flow Label conflicts with load-distribution use (RFC 6438).
section: "2"
topics:
