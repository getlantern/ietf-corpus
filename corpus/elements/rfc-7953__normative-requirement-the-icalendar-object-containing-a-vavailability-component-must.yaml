document: rfc-7953
kind: normative-requirement
summary: The iCalendar object containing a VAVAILABILITY component MUST include appropriate VTIMEZONE components for each unique TZID parameter used in any DATE-TIME property across all components, unless RFC 7809 (timezones by reference) is in effect.
section: "3.1"
rfc2119_level: MUST
