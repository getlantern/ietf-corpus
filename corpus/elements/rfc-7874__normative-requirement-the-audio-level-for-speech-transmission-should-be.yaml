document: rfc-7874
kind: normative-requirement
summary: The audio level for speech transmission SHOULD be normalized to -19 dBm0, considering only frequencies above 300 Hz regardless of sampling rate. The level SHOULD be adapted to avoid clipping, either by lowering gain or using a compressor.
section: "4"
rfc2119_level: SHOULD
