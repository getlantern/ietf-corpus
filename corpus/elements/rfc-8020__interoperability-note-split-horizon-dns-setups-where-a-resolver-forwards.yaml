document: rfc-8020
kind: interoperability-note
summary: Split-horizon DNS setups where a resolver forwards queries for a locally administered zone that appears nonexistent to public authoritative servers may be broken by NXDOMAIN cut; this document assumes such setups are rare and need not be supported.
