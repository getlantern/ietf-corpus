document: rfc-4681
kind: normative-requirement
summary: The list of hint types in the server hello's UserMappingTypeList SHALL be either equal to or a subset of the list provided by the client. If none of the client's hint types are supported, the server SHALL omit the user_mapping extension in the server hello.
section: "2"
rfc2119_level: SHALL
topics:
    - tls
