document: rfc-5875
kind: normative-requirement
summary: Each URL in the subscription body MUST be an HTTP URL that identifies a collection, an XCAP document, or an XCAP component. Collection URLs MUST have a trailing forward slash '/', and the client MUST NOT subscribe to namespaces.
section: "4.1"
rfc2119_level: MUST
topics:
