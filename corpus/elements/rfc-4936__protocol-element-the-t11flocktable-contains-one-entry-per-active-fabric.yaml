document: rfc-4936
kind: protocol-element
summary: The t11FLockTable contains one entry per active Fabric lock, representing a current lock, an in-progress SNMP-initiated lock attempt, or a failed SNMP-initiated lock attempt. It is indexed by fcmInstanceIndex, fcmSwitchIndex, t11FLockFabricIndex, and t11FLockApplicationID.
