document: rfc-3887
kind: wire-format
summary: Multi-line responses terminate each line with CRLF (max 998 chars), end with a single '.' followed by CRLF, and dot-stuff any data line beginning with a period by prepending a second period. Clients strip the leading period from dot-stuffed lines.
