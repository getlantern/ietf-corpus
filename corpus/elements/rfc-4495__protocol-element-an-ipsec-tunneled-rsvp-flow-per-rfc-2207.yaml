document: rfc-4495
kind: protocol-element
summary: An IPsec-tunneled RSVP flow (per RFC 2207) is treated as an individual reservation flow for purposes of bandwidth reduction and partial preemption. The identification method differs from non-encrypted flows, but the reduction mechanism is identical.
