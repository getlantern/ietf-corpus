document: rfc-7385
kind: design-rationale
summary: RFC 6514 allocated PMSI Tunnel Type code points 0–7 but omitted creating a corresponding IANA registry. The need to allocate additional code points (specifically for Inter-Area P2MP Segmented LSPs) made creating a formal registry necessary, prompting this update to RFC 6514.
section: "1"
topics:
