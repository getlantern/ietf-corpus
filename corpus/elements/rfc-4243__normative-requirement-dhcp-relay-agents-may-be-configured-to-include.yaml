document: rfc-4243
kind: normative-requirement
summary: DHCP relay agents MAY be configured to include Vendor-Specific suboptions when they include a relay agent information option in relayed DHCP messages. The suboption types and data are assigned through mechanisms outside the scope of this memo.
section: "4"
