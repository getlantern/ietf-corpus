document: rfc-9660
kind: protocol-element
summary: The SOA-SERIAL ZONEVERSION type (TYPE value 0, mnemonic 'SOA-SERIAL') carries the zone's SOA SERIAL number. The EDNS(0) OPTION-LENGTH for this type MUST be set to 6 in responses (2 octets for LABELCOUNT+TYPE, 4 octets for the 32-bit SERIAL).
