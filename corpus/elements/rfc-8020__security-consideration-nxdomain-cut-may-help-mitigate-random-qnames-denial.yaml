document: rfc-8020
kind: security-consideration
summary: NXDOMAIN cut may help mitigate 'random qnames' denial-of-service attacks where queries with a fixed nonexistent suffix and random prefixes flood resolvers; once the resolver caches the NXDOMAIN for the fixed suffix, it stops forwarding the flood to authoritative servers.
section: "7"
