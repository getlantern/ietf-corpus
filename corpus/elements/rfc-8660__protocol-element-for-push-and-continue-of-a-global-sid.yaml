document: rfc-8660
kind: protocol-element
summary: 'For PUSH and CONTINUE of a global SID Si toward neighbor N: if N lacks SR capability or has an invalid/too-small SRGB, the router falls back to standard MPLS forwarding, an alternative next hop, or drops the packet in that order. Otherwise, the outgoing label is calculated from N''s SRGB and the SID index per Section 2.4.'
section: 2.10.1
topics:
    - mpls
    - routing
