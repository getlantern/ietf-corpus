summary: 'IANA created the ''Service Function Chaining (SFC) Active OAM'' group of registries containing: SFC Active OAM Message Types (0-31 IETF Review, 32-62 FCFS); SFC Echo Request Flags (0-15 Standards Action); SFC Echo Types (0-175 IETF Review, 176-239 FCFS, 240-251 Experimental, 252-254 Private); SFC Echo Reply Modes (same policy as Echo Types); SFC Echo Return Codes (0-191 IETF Review, 192-251 FCFS); SFC Active OAM TLV Types (same as Echo Types); and SF Identifier Types (0-191 IETF Review, 192-251 FCFS).'
