document: rfc-3331
kind: protocol-element
summary: 'State Indication Event parameter (Tag 0x303, Length=8) carries a 32-bit Event value reporting SS7 link conditions: EVENT_RPO_ENTER (0x1), EVENT_RPO_EXIT (0x2), EVENT_LPO_ENTER (0x3), EVENT_LPO_EXIT (0x4), indicating remote/local processor outage entry and exit.'
section: 3.3.1.7
