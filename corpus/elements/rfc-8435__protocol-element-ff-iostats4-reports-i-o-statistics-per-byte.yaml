document: rfc-8435
kind: protocol-element
summary: 'ff_iostats4 reports I/O statistics per byte range at layout return: ffis_offset, ffis_length, ffis_stateid, ffis_read/write (io_info4 counts and bytes), ffis_deviceid, and ffis_layoutupdate (ff_layoutupdate4 with latency and network path details). Statistics are voluntary and client may report only ''hot'' ranges.'
section: 9.2.3
extracted_by: claude-sonnet-4-6
