document: rfc-8957
kind: design-rationale
summary: An aggregate SFL can be introduced as an additional label to record actions against a group of application labels, used when the number of labels needed to support per-label SFL actions becomes too large to be viable. This is not strictly synonymous action since the SFL is not replacing an existing label.
section: "4.3"
topics:
    - mpls
