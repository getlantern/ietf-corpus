document: rfc-2110
kind: interoperability-note
summary: 'Using a CID URL in HTML markup is equivalent to using a Content-Location header with the same CID value. The headers ''Content-ID: foo@bar.net'' and ''Content-Location: CID: foo@bar.net'' are identical in meaning, so either referencing mechanism can identify the same body part.'
section: "8.3"
topics:
    - email
