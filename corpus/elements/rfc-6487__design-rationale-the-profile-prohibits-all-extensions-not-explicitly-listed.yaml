document: rfc-6487
kind: design-rationale
summary: The profile prohibits all extensions not explicitly listed, including non-critical ones, because this is a specific-use certificate. Non-critical extensions an RP does not understand might, if understood, contradict or qualify the validity judgment—so the profile adopts minimalism over extensibility.
