document: rfc-2590
kind: design-rationale
summary: Although Frame Relay allows distinct maximum frame sizes for input and output directions, this specification assumes symmetry (same MTU for both) for simplification. Implementations may also enforce the Frame Relay maximum frame size at the interface (card) level, applied uniformly to all PVCs and SVCs on that interface.
