document: rfc-9773
kind: normative-requirement
summary: Clients MUST attempt renewal at a time of their choosing based on the suggested renewal window. The RECOMMENDED algorithm selects a uniform random time within the window; if that time is in the past, the client renews immediately.
section: "4.2"
rfc2119_level: MUST
