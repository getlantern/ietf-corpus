document: rfc-8860
kind: normative-requirement
summary: Payload types of different media types SHALL NOT be multiplexed within a single RTP session unless RFC 8860 is used and the application conforms to its applicability constraints (updating RFC 3551).
section: "5.1"
rfc2119_level: MUST NOT
topics:
    - rtp
    - realtime
