document: rfc-3640
kind: normative-requirement
summary: Each additional mode definition MUST be in full compliance with this specification and MUST be registered with IANA. A mode MUST NOT specify new default values for MIME parameters, and MIME parameters that configure the RTP payload MUST be present even if redundant for a given mode.
section: 3.3.7
rfc2119_level: MUST
topics:
    - rtp
    - realtime
    - registry
