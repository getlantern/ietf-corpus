document: rfc-2596
kind: interoperability-note
summary: If a server does not support storing language codes with attribute values in the DIT, any search filter including a language code will always fail to match (presence filter evaluates to FALSE, other forms to Undefined) without returning an error, since the language-coded attribute is treated as an unrecognized type.
section: "3.3"
topics:
    - ldap
