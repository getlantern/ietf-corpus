document: rfc-3490
kind: security-consideration
summary: If different applications implement different transcoding rules between local character sets and Unicode, they could interpret the same internationalized name differently and contact different servers. This problem is not solved by TLS or other security protocols that do not account for local character sets.
section: "10"
topics:
    - security
    - dns
