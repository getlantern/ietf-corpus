document: rfc-3265
kind: normative-requirement
summary: Upon successfully accepting or refreshing a subscription, notifiers MUST send a NOTIFY message immediately to communicate current resource state. This applies regardless of whether authorization has already been granted.
section: 3.1.6.2
rfc2119_level: MUST
