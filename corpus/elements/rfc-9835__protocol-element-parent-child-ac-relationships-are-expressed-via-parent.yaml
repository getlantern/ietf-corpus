document: rfc-9835
kind: protocol-element
summary: Parent/Child AC relationships are expressed via 'parent-ref' (read-write, pointing to a parent AC on a specific node/network) and 'child-ref' (read-only, listing child ACs). Child ACs inherit parent properties; values set at the child level take precedence.
