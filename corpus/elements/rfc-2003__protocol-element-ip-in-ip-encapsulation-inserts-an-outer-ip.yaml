document: rfc-2003
kind: protocol-element
summary: IP-in-IP encapsulation inserts an outer IP header before the original (inner) IP header. The outer header's Source and Destination Addresses identify the tunnel entry and exit points; the inner header identifies the original sender and recipient and is not modified during tunnel transit except for TTL decrement.
section: "3"
topics:
    - ip
    - mobility
    - vpn
