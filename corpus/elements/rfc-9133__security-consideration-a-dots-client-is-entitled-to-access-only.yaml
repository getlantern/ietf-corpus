document: rfc-9133
kind: security-consideration
summary: A DOTS client is entitled to access only the filtering resources it created; it cannot modify filtering rules created by other DOTS clients of the same domain. DOTS servers must enforce this association, and failure to do so will have severe impact on DOTS client domains.
section: "6"
topics:
    - security
