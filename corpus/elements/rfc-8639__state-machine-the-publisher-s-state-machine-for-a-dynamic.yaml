document: rfc-8639
kind: state-machine
summary: 'The publisher''s state machine for a dynamic subscription has two states: ''active'' and ''suspended''. Successful establish-subscription or modify-subscription RPCs move the subscription to ''active''; insufficient CPU or bandwidth transitions it to ''suspended''; delete-subscription, kill-subscription, or reaching stop-time ends the subscription.'
section: 2.4.1
topics:
