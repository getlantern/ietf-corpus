document: rfc-5654
kind: normative-requirement
summary: The MPLS-TP control plane MUST support control-plane topology and data-plane topology independence; a failure of the control plane does not imply a failure of the data plane. The control plane MUST also fit within the ASON architecture (ITU-T G.8080).
section: "2.4"
rfc2119_level: MUST
topics:
    - mpls
    - routing
