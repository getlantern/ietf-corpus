document: rfc-5607
kind: normative-requirement
summary: The management access policy named in the Management-Policy-Id (135) Attribute, when received in an Access-Accept, MUST be applied to the session. If the NAS supports this attribute but the policy name is unknown or incorrectly formatted, the NAS MUST treat the Access-Accept as an Access-Reject.
section: "6.3"
rfc2119_level: MUST
topics:
    - radius
extracted_by: claude-sonnet-4-6
extracted_at: "2026-06-17"
