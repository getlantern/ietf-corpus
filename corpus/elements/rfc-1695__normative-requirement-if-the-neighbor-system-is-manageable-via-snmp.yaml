document: rfc-1695
kind: normative-requirement
summary: If the neighbor system is manageable via SNMP and supports ifName, then atmInterfaceMyNeighborIfName MUST be identical to the ifName value of the lowest-level physical interface for that port on the neighbor.
section: 6.2.1
