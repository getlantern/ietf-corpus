document: rfc-5969
kind: design-rationale
summary: 6rd uses the SP's own IPv6 prefix rather than the well-known 6to4 2002::/16 prefix, limiting the operational domain to the SP network under its direct control and making the IPv6 service equivalent to native IPv6 from the perspective of customer sites and the IPv6 Internet.
