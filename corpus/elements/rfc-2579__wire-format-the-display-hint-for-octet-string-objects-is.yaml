document: rfc-2579
kind: wire-format
summary: 'The DISPLAY-HINT for OCTET STRING objects is one or more octet-format specifications, each with five optional parts: repeat indicator (''*''), octet length, display format (''x'',''d'',''o'',''a'',''t'' for UTF-8), separator character, and repeat terminator. Trailing separator and terminator characters are suppressed; excess specifications are ignored; if octets remain after all specifications, the last specification is reapplied.'
section: "3.1"
topics:
    - snmp
