document: rfc-9728
kind: normative-requirement
summary: Implementations MUST support TLS and MUST follow the guidance in BCP 195. TLS certificate checking MUST be performed by the client as described in RFC 9525 when making a protected resource metadata request.
section: "7.1"
rfc2119_level: MUST
