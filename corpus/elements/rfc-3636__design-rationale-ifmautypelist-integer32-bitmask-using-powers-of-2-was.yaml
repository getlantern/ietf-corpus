document: rfc-3636
kind: design-rationale
summary: ifMauTypeList (Integer32 bitmask using powers of 2) was deprecated in favor of ifMauTypeListBits (SMIv2 BITS type). The BITS type is the preferred SMIv2 mechanism for encoding sets of capabilities and allows direct bit-level access without arithmetic on Integer32 sums.
section: "4"
