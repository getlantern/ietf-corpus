document: rfc-2668
kind: state-machine
summary: 'rpMauMediaAvailable / ifMauMediaAvailable reports link/media status via eleven states: other, unknown, available, notAvailable, remoteFault, invalidSignal, remoteJabber, remoteLinkLoss, remoteTest, offline, and autoNegError. For 100/1000 Mbps MAUs the states map to the link integrity state diagrams in IEEE 802.3 sections 23, 24, and 32.'
