document: rfc-2784
kind: interoperability-note
summary: Existing deployed GRE implementations over IPv4 do not implement Path MTU Discovery and do not set the Don't Fragment bit in the Delivery Header, causing large packets to be fragmented within the tunnel and reassembled at the exit. PMTU relay of ICMP 'fragmentation needed' messages back to the originator is not required by this specification.
section: "9"
topics:
    - ip
    - vpn
