document: rfc-3986
kind: wire-format
summary: 'An IP literal address (IPv6 or future versions) in a URI host is encapsulated within square brackets: IP-literal = "[" ( IPv6address / IPvFuture ) "]". This is the only place where square brackets are allowed in the URI syntax. The full IPv6address ABNF with eight 16-bit hex pieces and elision via "::" is specified.'
section: 3.2.2
topics:
