document: rfc-1748
kind: protocol-element
summary: 'dot5RingSpeed is a read-write INTEGER specifying the ring speed at the next insertion: unknown(1), oneMegabit(2), fourMegabit(3), sixteenMegabit(4). This indicates the speed at next insertion, not the current operational speed (which is given by MIB-II''s ifSpeed). Interfaces that do not support changing ring-speed may only be set to their current value.'
